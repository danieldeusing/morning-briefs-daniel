<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Thin espresso frame, just enough to anchor the icon against any
       browser tab background. -->
  <rect width="64" height="64" rx="9" fill="#221a13"/>

  <!-- Cream page fills most of the tile, leaving a ~2px brown frame. -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>

  <!-- Signature double-rule masthead in economy red. -->
  <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
  <rect x="9" y="17" width="46" height="2"   fill="#b9462a"/>

  <!-- Bold serif M for Morning. -->
  <text x="32" y="52"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="800"
        font-size="38"
        text-anchor="middle"
        fill="#1f1812">M</text>
</svg>
