<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);

    text-transform: uppercase;

    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;

    outline: 2px solid var(--cat-accent);

  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;

  .tldr-empty-block {
    display: flex;

  .tldr-empty-kicker {

  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }

  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,

    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }

    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;

    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }

    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>

             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern stand hier noch, dass ein fallender Ölpreis das Inflations-Argument von EZB und Fed untergräbt. Diese Karte liegt seit dem 7. Juli anders: Irans Revolutionsgarden trafen drei Handelsschiffe in der Straße von Hormuz, das US-Zentralkommando schlug in derselben Nacht zurück, und Brent steht wieder bei <strong>76,35 $</strong>. Das Überraschende ist nicht der Ölpreis, sondern die Reaktion des Real: Er wurde <em>fester</em>, nicht schwächer — der ECB-Fix fiel von 5,9130 auf <strong>5,8781</strong>. Brasilien ist Netto-Öl-Exporteur; ein Ölschock ist für den Real erst einmal eine gute Nachricht, solange er kein globales Risk-off auslöst. Genau daran hängt heute alles.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8781</strong> (ECB-Fix, Di 07.07.) — <span class=\"stat\">−0,59 %</span> gegenüber dem Montags-Fix (5,9130). Der Real hat am Angriffstag zugelegt.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1729</strong> (Intraday-Spot, Mi 08.07.), laut Quelle +0,02 % zur Vorsitzung. Heute gibt der Real einen Teil zurück.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101,09</strong> (Mi 08.07.), praktisch flach. Kein Dollar-Safe-Haven-Sprung trotz Kriegs-Schlagzeilen — das ist das wichtigste Signal des Tages.</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check sauber</strong>: ECB-Fix 5,8781 vs. rechnerisch 5,878 (0,001 % Abweichung), EUR/USD unabhängig gezogen. Kein Zirkelschluss.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Hormuz-Eskalation</strong>: drei getroffene Handelsschiffe (07.07.), CENTCOM-Vergeltung auf 80+ iranische Ziele und 60+ IRGC-Schnellboote.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 76,35 $</strong> (+2,95 % zum Vortag) — in zwei Sitzungen rund 6 % gutgemacht gegenüber den ~72 $ vom 06.07.</li>\n      <li><span class=\"chip good\">Global</span> <strong>US-10J-Rendite steigt</strong> auf 4,51 % (von 4,48 %). In echter Panik <em>fallen</em> Treasury-Renditen. Sie steigen — der Markt preist Inflation, nicht Flucht.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tesouro warnt</strong>: Ab 2028 sind die Fiskalziele ohne neue Maßnahmen nicht erreichbar. Finanzierungslücke 2029 <span class=\"stat\">R$ 80,6 Mrd.</span>, 2030 <span class=\"stat\">R$ 136,4 Mrd.</span></li>\n      <li><span class=\"chip\">BR</span> <strong>Primärdefizit Zentralregierung</strong> 12 Monate bis Mai: R$ 142,3 Mrd. = 1,06 % des BIP. Ziel wäre ein Überschuss von 0,25 %.</li>\n      <li><span class=\"chip\">BR</span> <strong>5J-CDS ~126 bp</strong> (07.07.) — unverändert zur Anfang-Juni-Spanne. Der Kreditmarkt preist weder Hormuz noch das Fiskal-Loch.</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>IPCA am Freitag (10.07.)</strong>, danach EZB (23.07.) und Copom + FOMC in derselben Woche (28.–29.07.).</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

gt</strong> auf 4,51 % (von 4,48 %). In echter Panik <em>fallen</em> Treasury-Renditen. Sie steigen — der Markt preist Inflation, nicht Flucht.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tesouro warnt</strong>: Ab 2028 sind die Fiskalziele ohne neue Maßnahmen nicht erreichbar. Finanzierungslücke 2029 <span class=\"stat\">R$ 80,6 Mrd.</span>, 2030 <span class=\"stat\">R$ 136,4 Mrd.</span></li>\n      <li><span class=\"chip\">BR</span> <strong>Primärdefizit Zentralregierung</strong> 12 Monate bis Mai: R$ 142,3 Mrd. = 1,06 % des BIP. Ziel wäre ein Überschuss von 0,25 %.</li>\n      <li><span class=\"chip\">BR</span> <strong>5J-CDS ~126 bp</strong> (07.07.) — unverändert zur Anfang-Juni-Spanne. Der Kreditmarkt preist weder Hormuz noch das Fiskal-Loch.</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>IPCA am Freitag (10.07.)</strong>, danach EZB (23.07.) und Copom + FOMC in derselben Woche (28.–29.07.).</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday this space still said a falling oil price was undermining the ECB's and the Fed's inflation argument. That picture has looked different since July 7: Iran's Revolutionary Guard hit three merchant ships in the Strait of Hormuz, US Central Command struck back the same night, and Brent is back at <strong>$76.35</strong>. The surprise isn't the oil price — it's the real's reaction: it got <em>firmer</em>, not weaker — the ECB fix fell from 5.9130 to <strong>5.8781</strong>. Brazil is a net oil exporter; an oil shock is, for now, good news for the real, as long as it doesn't trigger a global risk-off. That's exactly what today hinges on.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8781</strong> (ECB fix, Tue 07/07) — <span class=\"stat\">−0.59%</span> vs. Monday's fix (5.9130). The real gained ground on the day of the attack.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1729</strong> (intraday spot, Wed 07/08), per source +0.02% vs. the prior session. Today the real is giving back some ground.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101.09</strong> (Wed 07/08), practically flat. No dollar safe-haven jump despite war headlines — that's today's most important signal.</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: ECB fix 5.8781 vs. calculated 5.878 (0.001% deviation), EUR/USD pulled independently. No circular reasoning.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Hormuz escalation</strong>: three merchant ships hit (07/07), CENTCOM retaliation on 80+ Iranian targets and 60+ IRGC fast boats.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $76.35</strong> (+2.95% vs. the prior day) — up roughly 6% over two sessions from the ~$72 seen on 07/06.</li>\n      <li><span class=\"chip good\">Global</span> <strong>US 10-year yield rises</strong> to 4.51% (from 4.48%). In genuine panic, Treasury yields <em>fall</em>. They're rising — the market is pricing inflation, not flight.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Treasury warns</strong>: from 2028 the fiscal targets are unreachable without new measures. Financing gap 2029 <span class=\"stat\">R$80.6 billion</span>, 2030 <span class=\"stat\">R$136.4 billion</span>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Central government primary deficit</strong>, 12 months through May: R$142.3 billion = 1.06% of GDP. The target was a surplus of 0.25%.</li>\n      <li><span class=\"chip\">BR</span> <strong>5-year CDS ~126 bp</strong> (07/07) — unchanged from the early-June range. The credit market isn't pricing in Hormuz or the fiscal hole.</li>\n      <li><span class=\"chip\">Outlook</span> <strong>IPCA on Friday (07/10)</strong>, then the ECB (07/23) and Copom + FOMC in the same week (07/28–29).</li>\n      <li><span class=\"chip\">Note</span> Forecast probabilities below = <strong>my confidence</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, este espaço ainda dizia que a queda do preço do petróleo minava o argumento inflacionário do BCE e do Fed. Esse cenário mudou desde o dia 7 de julho: a Guarda Revolucionária do Irã atingiu três navios mercantes no Estreito de Ormuz, o Comando Central dos EUA revidou na mesma noite, e o Brent voltou a <strong>US$ 76,35</strong>. O surpreendente não é o preço do petróleo, e sim a reação do real: ele ficou <em>mais firme</em>, não mais fraco — a fixação do BCE caiu de 5,9130 para <strong>5,8781</strong>. O Brasil é exportador líquido de petróleo; um choque de petróleo é, por enquanto, uma boa notícia para o real, desde que não desencadeie uma fuga global para ativos seguros. É exatamente disso que tudo depende hoje.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,8781</strong> (fixação do BCE, ter. 07/07) — <span class=\"stat\">−0,59%</span> frente à fixação de segunda-feira (5,9130). O real avançou no dia do ataque.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>USD/BRL 5,1729</strong> (à vista intradiário, qua. 08/07), segundo a fonte +0,02% frente ao pregão anterior. Hoje o real devolve parte do ganho.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 101,09</strong> (qua. 08/07), praticamente estável. Nenhum salto do dólar como porto seguro apesar das manchetes de guerra — esse é o sinal mais importante do dia.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>Checagem de câmbio cruzado limpa</strong>: fixação do BCE 5,8781 vs. cálculo de 5,878 (0,001% de desvio), EUR/USD obtido de forma independente. Sem raciocínio circular.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Escalada em Ormuz</strong>: três navios mercantes atingidos (07/07), retaliação do CENTCOM contra mais de 80 alvos iranianos e mais de 60 lanchas rápidas da Guarda Revolucionária.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent US$ 76,35</strong> (+2,95% frente ao dia anterior) — recuperação de cerca de 6% em duas sessões frente aos ~US$ 72 de 06/07.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Rendimento dos Treasuries de 10 anos dos EUA sobe</strong> para 4,51% (de 4,48%). Em pânico de verdade, os rendimentos dos Treasuries <em>caem</em>. Eles estão subindo — o mercado está precificando inflação, não fuga.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tesouro adverte</strong>: a partir de 2028, as metas fiscais não serão alcançáveis sem novas medidas. Lacuna de financiamento em 2029: <span class=\"stat\">R$ 80,6 bilhões</span>; em 2030: <span class=\"stat\">R$ 136,4 bilhões</span>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Déficit primário do governo central</strong> nos 12 meses até maio: R$ 142,3 bilhões = 1,06% do PIB. A meta seria um superávit de 0,25%.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS de 5 anos ~126 pb</strong> (07/07) — inalterado frente à faixa do início de junho. O mercado de crédito não precifica nem Ormuz nem o buraco fiscal.</li>\n      <li><span class=\"chip\">Perspectiva</span> <strong>IPCA na sexta-feira (10/07)</strong>, depois o BCE (23/07) e Copom + FOMC na mesma semana (28–29/07).</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades de previsão abaixo = <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer, este espacio todavía decía que la caída del precio del petróleo socavaba el argumento inflacionario del BCE y la Fed. Ese panorama cambió desde el 7 de julio: la Guardia Revolucionaria de Irán atacó tres buques mercantes en el Estrecho de Ormuz, el Comando Central de EE. UU. respondió esa misma noche, y el Brent volvió a <strong>$76.35</strong>. Lo sorprendente no es el precio del petróleo, sino la reacción del real: se <em>fortaleció</em>, no se debilitó — la fijación del BCE cayó de 5.9130 a <strong>5.8781</strong>. Brasil es exportador neto de petróleo; un choque petrolero es, por ahora, una buena noticia para el real, siempre que no desate una fuga global hacia activos seguros. De eso depende todo hoy.</p>\n    <ul>\n      <li><span class=\"chip hot\">Divisas</span> <strong>EUR/BRL 5.8781</strong> (fijación del BCE, mar. 07/07) — <span class=\"stat\">−0.59%</span> frente a la fijación del lunes (5.9130). El real avanzó el mismo día del ataque.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>USD/BRL 5.1729</strong> (spot intradía, mié. 08/07), según la fuente +0.02% frente a la sesión anterior. Hoy el real devuelve parte de la ganancia.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>DXY 101.09</strong> (mié. 08/07), prácticamente plano. Sin salto del dólar como refugio pese a los titulares de guerra — esa es la señal más importante del día.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>Verificación de tipo cruzado limpia</strong>: fijación del BCE 5.8781 vs. cálculo de 5.878 (0.001% de desviación), EUR/USD obtenido de forma independiente. Sin razonamiento circular.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Escalada en Ormuz</strong>: tres buques mercantes atacados (07/07), represalia del CENTCOM contra más de 80 objetivos iraníes y más de 60 lanchas rápidas de la Guardia Revolucionaria.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $76.35</strong> (+2.95% frente al día anterior) — recuperación de cerca de 6% en dos sesiones frente a los ~$72 del 06/07.</li>\n      <li><span class=\"chip good\">Global</span> <strong>El rendimiento del bono de EE. UU. a 10 años sube</strong> a 4.51% (desde 4.48%). En un pánico real, los rendimientos de los Treasuries <em>caen</em>. Están subiendo — el mercado está descontando inflación, no fuga.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>El Tesoro advierte</strong>: a partir de 2028, las metas fiscales serán inalcanzables sin nuevas medidas. Brecha de financiamiento en 2029: <span class=\"stat\">R$80.6 mil millones</span>; en 2030: <span class=\"stat\">R$136.4 mil millones</span>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Déficit primario del gobierno central</strong> en los 12 meses hasta mayo: R$142.3 mil millones = 1.06% del PIB. La meta habría sido un superávit de 0.25%.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS a 5 años ~126 pb</strong> (07/07) — sin cambios frente al rango de principios de junio. El mercado de crédito no está descontando ni Ormuz ni el agujero fiscal.</li>\n      <li><span class=\"chip\">Perspectiva</span> <strong>IPCA el viernes (10/07)</strong>, luego el BCE (23/07) y el Copom + la Fed (FOMC) en la misma semana (28–29/07).</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades de pronóstico abajo = <strong>mi nivel de confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern trug das billige Öl noch die These vom geduldigen Geld. Heute ist es der Riss darin. Nach US-Schlägen gegen über 80 Ziele im Iran — Vergeltung für IRGC-Angriffe auf drei Tanker in der Straße von Hormuz — und dem Widerruf der Iran-Öllizenz sprang <strong>Brent um +2,95 % auf 76,35 $</strong> (08.07.). Wichtiger als der Tages-Move ist das Datum, das er mitbringt: Der Widerruf gilt sofort — neue Käufe sind seit dem 07.07. untersagt; die enge Abwicklungs-Lizenz <em>General License X1</em> läuft am <strong>Fr, 17.07., 00:01 EDT</strong> aus — iranische Fässer verschwinden nach Kalender vom Markt, nicht nach Schlagzeile. Die zweite Ordnung zählt für Daniel: Teureres Öl heißt höhere Headline-Inflation, heißt weniger Spielraum für die Fed — und genau die Zinssenkungs-Hoffnung trug diese Woche Aktien, Gold und Krypto. Der <strong>US-CPI Mitte Juli</strong> ist der Kipppunkt. Zweiter Faden: <strong>Tesla −4,02 % auf 402,90 $</strong> (07.07.) nach −7,49 % am 02.07. — <em>trotz</em> Rekord-Auslieferung von 480.126 Fahrzeugen. Wenn ein Rekord-Beat den schlechtesten Tag seit fast einem Jahr auslöst, redet der Markt nicht über Absatz, sondern über das Vielfache. Drittens: <span class=\"update-since\">Update seit Di</span> Mein Bitcoin-Kauf-Trigger ist ausgelöst — zweiter ETF-Zufluss-Tag in Folge, +265,7 Mio. $, IBIT allein +209,4 Mio. $.</p>\n    <ul>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 76,35 $</strong> (+2,95 %, 08.07.), Sep-Future 76,07 $ — höchster Stand seit 23.06. WTI 72,2–72,8 $ (Quellen-Spanne). Treiber: US-Schläge gegen Iran + widerrufene Öl-Lizenz.</li>\n      <li><span class=\"chip hot\">KALENDER</span> <strong>Seit Di 07.07.:</strong> Washington hat die Iran-Öllizenz <em>General License X</em> (lief eigentlich bis 21.08.) widerrufen — neue Käufe und Verladungen sind sofort untersagt. Die enge <em>General License X1</em> deckt nur noch die Abwicklung bereits genehmigter Geschäfte, <strong>Frist Fr 17.07., 00:01 EDT</strong>. Hormuz-Durchsatz laut Analysten „viele Monate\" unter 50 % des Vorkriegsniveaus.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA 402,90 $</strong> (−4,02 %, Schluss 07.07.), zuvor −7,49 % am 02.07. — trotz <strong>Rekord-Auslieferung 480.126</strong> Fahrzeuge (Beat ~74.000). Bewertung ~204× Forward-Gewinn.</li>\n      <li><span class=\"chip good\">MAG-7</span> Der Rest war grün: <strong>META +2,55 %</strong> (615,58 $), AMZN +0,75 %, NVDA +0,71 % (196,93 $), MSFT +0,54 %, GOOGL +0,16 %, AAPL −0,64 % — alle Schluss 07.07. Tesla ist idiosynkratisch, kein Tech-Ausverkauf.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~62.738 $</strong> (−0,30 % 24h, <strong>+6,18 % 7d</strong>, 08.07. 05:24 UTC). <strong>Zweiter ETF-Zufluss-Tag in Folge: +265,7 Mio. $</strong> (Print 06.07.), IBIT +209,4 Mio. $, GBTC weiter −44,5 Mio. $.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.754 $</strong> (−0,39 % 24h, <strong>+9,84 % 7d</strong>) — schlägt BTC über die Woche. Aber das ist Hebel, nicht relative Stärke; siehe die ehrliche Korrektur meines eigenen Kriteriums unten.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold 4.127,19 $/oz</strong> (+0,52 %, 08.07.); −3,14 % im Monat, +24,55 % im Jahr. Auffällig <em>schwache</em> Reaktion auf eine echte Militär-Eskalation — der Markt preist ein Öl-Angebots-Ereignis, keine System-Panik.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Krypto-Long-Tail 24h durchweg rot, 7d gespalten: IMX <strong>+16,87 %</strong> und PEPE +12,42 % führen, AI-Token hinken (FET −7,84 %, GALA −7,32 % über 7d).</li>\n      <li><span class=\"chip\">REVIERE</span> Microsofts „Frontier Company\" (2,5 Mrd. $) und HP × OpenAI stehen im <em>ai-usecases</em>-Brief; GPT-5.6 Sol/Terra/Luna und Claude Fable 5 im <em>ai-dev</em>-Brief. Hier nur die Kursreaktion — und die ist bei MSFT unauffällig.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday, cheap oil was still carrying the patient-money thesis. Today it's the crack in it. After US strikes on over 80 targets in Iran — retaliation for IRGC attacks on three tankers in the Strait of Hormuz — and the revocation of the Iran oil license, <strong>Brent jumped +2,95 % to 76,35 $</strong> (08.07.). More important than the day's move is the date that comes with it: the revocation bites immediately — new purchases have been barred since 07.07.; the narrow wind-down license <em>General License X1</em> expires <strong>Fri, 17.07., 00:01 EDT</strong> — Iranian barrels leave the market on a calendar, not on a headline. The second-order effect is what matters for Daniel: pricier oil means higher headline inflation, means less room for the Fed — and it was exactly that rate-cut hope that carried stocks, gold and crypto this week. The <strong>US CPI in mid-July</strong> is the tipping point. Second thread: <strong>Tesla −4,02 % to 402,90 $</strong> (07.07.) after −7,49 % on 02.07. — <em>despite</em> a record delivery of 480.126 vehicles. When a record beat triggers the worst day in almost a year, the market isn't talking about sales anymore — it's talking about the multiple. Third: <span class=\"update-since\">Update since Tue</span> My Bitcoin buy trigger has fired — second straight ETF inflow day, +265,7 Mio. $, IBIT alone +209,4 Mio. $.</p>\n    <ul>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent 76,35 $</strong> (+2,95 %, 08.07.), Sep future 76,07 $ — highest level since 23.06. WTI 72,2–72,8 $ (source range). Driver: US strikes on Iran + revoked oil license.</li>\n      <li><span class=\"chip hot\">CALENDAR</span> <strong>Since Tue 07.07.:</strong> Washington revoked the Iran oil license <em>General License X</em> (it was set to run until 21.08.) — new purchases and loadings are barred immediately. The narrow <em>General License X1</em> only covers winding down already-authorized transactions, <strong>deadline Fri 17.07., 00:01 EDT</strong>. Hormuz throughput, per analysts, \"many months\" below 50 % of pre-war levels.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA 402,90 $</strong> (−4,02 %, close 07.07.), previously −7,49 % on 02.07. — despite a <strong>record delivery of 480.126</strong> vehicles (beat ~74.000). Valuation ~204× forward earnings.</li>\n      <li><span class=\"chip good\">MAG 7</span> The rest was green: <strong>META +2,55 %</strong> (615,58 $), AMZN +0,75 %, NVDA +0,71 % (196,93 $), MSFT +0,54 %, GOOGL +0,16 %, AAPL −0,64 % — all close 07.07. Tesla is idiosyncratic, not a tech sell-off.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~62.738 $</strong> (−0,30 % 24h, <strong>+6,18 % 7d</strong>, 08.07. 05:24 UTC). <strong>Second straight ETF inflow day: +265,7 Mio. $</strong> (print 06.07.), IBIT +209,4 Mio. $, GBTC still −44,5 Mio. $.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.754 $</strong> (−0,39 % 24h, <strong>+9,84 % 7d</strong>) — beats BTC over the week. But that's leverage, not relative strength; see the honest correction of my own criterion below.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold 4.127,19 $/oz</strong> (+0,52 %, 08.07.); −3,14 % on the month, +24,55 % on the year. A strikingly <em>weak</em> reaction to a real military escalation — the market is pricing an oil-supply event, not systemic panic.</li>\n      <li><span class=\"chip\">SECTORS</span> Crypto long tail all red over 24h, split over 7d: IMX <strong>+16,87 %</strong> and PEPE +12,42 % lead, AI tokens lag (FET −7,84 %, GALA −7,32 % over 7d).</li>\n      <li><span class=\"chip\">TERRITORY</span> Microsoft's \"Frontier Company\" (2,5 Mrd. $) and HP × OpenAI belong in the <em>ai-usecases</em> brief; GPT-5.6 Sol/Terra/Luna and Claude Fable 5 in the <em>ai-dev</em> brief. Here only the price reaction — and for MSFT it's unremarkable.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, o petróleo barato ainda sustentava a tese do dinheiro paciente. Hoje é a rachadura nela. Após ataques dos EUA a mais de 80 alvos no Irã — retaliação a ataques do CGRI a três petroleiros no Estreito de Ormuz — e a revogação da licença de petróleo do Irã, o <strong>Brent saltou +2,95 % para 76,35 $</strong> (08.07.). Mais importante que o movimento do dia é a data que ele traz: a revogação vale de imediato — novas compras estão proibidas desde 07.07.; a restrita licença de liquidação <em>General License X1</em> expira na <strong>sex., 17.07., 00:01 EDT</strong> — os barris iranianos saem do mercado por calendário, não por manchete. A segunda ordem é o que importa para Daniel: petróleo mais caro significa inflação headline mais alta, significa menos espaço para o Fed — e foi justamente essa esperança de corte de juros que sustentou ações, ouro e cripto nesta semana. O <strong>CPI dos EUA em meados de julho</strong> é o ponto de inflexão. Segundo fio condutor: a <strong>Tesla caiu −4,02 % para 402,90 $</strong> (07.07.) depois de −7,49 % em 02.07. — <em>apesar</em> de uma entrega recorde de 480.126 veículos. Quando um recorde de entregas dispara o pior dia em quase um ano, o mercado não está falando de vendas, está falando do múltiplo. Terceiro: <span class=\"update-since\">Atualização desde ter.</span> Meu gatilho de compra de Bitcoin foi acionado — segundo dia seguido de entrada em ETFs, +265,7 Mio. $, só o IBIT +209,4 Mio. $.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 76,35 $</strong> (+2,95 %, 08.07.), futuro de setembro 76,07 $ — maior nível desde 23.06. WTI 72,2–72,8 $ (faixa entre fontes). Gatilho: ataques dos EUA ao Irã + revogação da licença de petróleo.</li>\n      <li><span class=\"chip hot\">CALENDÁRIO</span> <strong>Desde ter. 07.07.:</strong> Washington revogou a licença de petróleo do Irã <em>General License X</em> (que originalmente valeria até 21.08.) — novas compras e embarques estão proibidos de imediato. A restrita <em>General License X1</em> cobre apenas a liquidação de operações já autorizadas, <strong>prazo sex. 17.07., 00:01 EDT</strong>. Fluxo em Ormuz, segundo analistas, \"muitos meses\" abaixo de 50 % do nível pré-guerra.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA 402,90 $</strong> (−4,02 %, fechamento 07.07.), antes −7,49 % em 02.07. — apesar da <strong>entrega recorde de 480.126</strong> veículos (acima da expectativa em ~74.000). Avaliação ~204× o lucro projetado.</li>\n      <li><span class=\"chip good\">MAG-7</span> O resto fechou no verde: <strong>META +2,55 %</strong> (615,58 $), AMZN +0,75 %, NVDA +0,71 % (196,93 $), MSFT +0,54 %, GOOGL +0,16 %, AAPL −0,64 % — todos fechamento 07.07. A Tesla é um caso isolado, não uma liquidação de tecnologia.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~62.738 $</strong> (−0,30 % em 24h, <strong>+6,18 % em 7 dias</strong>, 08.07. 05:24 UTC). <strong>Segundo dia seguido de entrada em ETFs: +265,7 Mio. $</strong> (dado de 06.07.), IBIT +209,4 Mio. $, GBTC ainda em −44,5 Mio. $.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.754 $</strong> (−0,39 % em 24h, <strong>+9,84 % em 7 dias</strong>) — supera o BTC na semana. Mas isso é alavancagem, não força relativa; veja a correção honesta do meu próprio critério abaixo.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro 4.127,19 $/oz</strong> (+0,52 %, 08.07.); −3,14 % no mês, +24,55 % no ano. Reação chamativamente <em>fraca</em> a uma escalada militar real — o mercado está precificando um evento de oferta de petróleo, não um pânico sistêmico.</li>\n      <li><span class=\"chip\">SETORES</span> Cauda longa das criptos toda no vermelho em 24h, dividida em 7 dias: IMX <strong>+16,87 %</strong> e PEPE +12,42 % lideram, tokens de IA ficam para trás (FET −7,84 %, GALA −7,32 % em 7 dias).</li>\n      <li><span class=\"chip\">TERRITÓRIO</span> A \"Fron         "es": "<div class=\"tldr\"><p class=\"lead\">Ayer el petróleo barato todavía sostenía la tesis del dinero paciente. Hoy es precisamente la grieta en esa tesis. Tras los ataques de Estados Unidos contra más de 80 objetivos en Irán — represalia por los ataques del CGRI contra tres petroleros en el estrecho de Ormuz — y la revocación de la licencia petrolera de Irán, <strong>el Brent saltó +2,95 % hasta 76,35 $</strong> (08.07.). Más importante que el movimiento del día es la fecha que trae consigo: la revocación rige de inmediato — las nuevas compras están prohibidas desde el 07.07.; la estricta licencia de liquidación <em>General License X1</em> vence el <strong>vie. 17.07., 00:01 EDT</strong> — los barriles iraníes desaparecerán del mercado según el calendario, no según el titular. El segundo orden de efectos es lo que le importa a Daniel: petróleo más caro significa mayor inflación general, significa menos margen para la Fed — y precisamente la esperanza de un recorte de tasas sostuvo esta semana a las acciones, el oro y las criptomonedas. El <strong>IPC de EE. UU. de mediados de julio</strong> es el punto de inflexión. Segundo hilo: <strong>Tesla −4,02 % hasta 402,90 $</strong> (07.07.) tras un −7,49 % el 02.07. — <em>a pesar de</em> una entrega récord de 480.126 vehículos. Cuando un récord de entregas provoca el peor día en casi un año, el mercado no está hablando de ventas, sino del múltiplo. Tercero: <span class=\"update-since\">Actualización desde el mar.</span> Mi disparador de compra de Bitcoin se activó — segundo día consecutivo de entradas netas a los ETF, +265,7 millones de $, solo IBIT sumó +209,4 millones de $.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 76,35 $</strong> (+2,95 %, 08.07.), futuro de septiembre 76,07 $ — el nivel más alto desde el 23.06. WTI 72,2–72,8 $ (rango entre fuentes). Detonante: ataques de EE. UU. contra Irán + revocación de la licencia petrolera.</li>\n      <li><span class=\"chip hot\">CALENDARIO</span> <strong>Desde el mar. 07.07.:</strong> Washington revocó la licencia petrolera de Irán <em>General License X</em> (que en teoría tenía vigencia hasta el 21.08.) — las nuevas compras y cargas quedan prohibidas de inmediato. La estricta <em>General License X1</em> solo cubre la liquidación de operaciones ya autorizadas, <strong>plazo vie. 17.07., 00:01 EDT</strong>. Según analistas, el tránsito por Ormuz se mantendrá „muchos meses\" por debajo del 50 % del nivel previo a la guerra.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA 402,90 $</strong> (−4,02 %, cierre 07.07.), tras un −7,49 % el 02.07. — a pesar de una <strong>entrega récord de 480.126</strong> vehículos (superó las estimaciones por ~74.000). Valuación de ~204× las utilidades futuras.</li>\n      <li><span class=\"chip good\">MAG-7</span> El resto cerró en verde: <strong>META +2,55 %</strong> (615,58 $), AMZN +0,75 %, NVDA +0,71 % (196,93 $), MSFT +0,54 %, GOOGL +0,16 %, AAPL −0,64 % — todos al cierre del 07.07. Tesla es idiosincrático, no una venta masiva del sector tecnológico.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~62.738 $</strong> (−0,30 % en 24 h, <strong>+6,18 % en 7 d</strong>, 08.07. 05:24 UTC). <strong>Segundo día consecutivo de entradas netas a los ETF: +265,7 millones de $</strong> (dato del 06.07.), IBIT +209,4 millones de $, GBTC sigue en −44,5 millones de $.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.754 $</strong> (−0,39 % en 24 h, <strong>+9,84 % en 7 d</strong>) — supera a BTC en la semana. Pero eso es apalancamiento, no fortaleza relativa; ver más abajo la corrección honesta de mi propio criterio.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro 4.127,19 $/oz</strong> (+0,52 %, 08.07.); −3,14 % en el mes, +24,55 % en el año. Reacción llamativamente <em>débil</em> ante una escalada militar real — el mercado lo lee como un evento de oferta petrolera, no como pánico sistémico.</li>\n       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ende Juni hat jemand die Spielregeln der Branche ignoriert: Ein anonymer Forscher unter dem Handle „bikini\" veröffentlichte funktionierende Exploit-Prototypen für Docker, Gitea, libssh2, PHP und Firefox — ohne einen einzigen Hersteller vorab zu informieren. Zwei Funde sind schwer, einer hat bis heute keine gefixte Version. Parallel räumt der Kernel eine Lücke ab, die seit August 2010 im Code stand und Gäste aus ihrer VM auf den Host lässt. Kein Alarm — aber ein guter Tag für die Frage: wer darf bei uns CI-Workflows starten?</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>„Exploitarium\"</strong>: anonymer PoC-Dump über ~22 OSS-Projekte ohne Vendor-Vorwarnung, 27. Juni – 1. Juli. Der Zähler ist zwischen den Outlets uneinheitlich — belastbar ist der Umstand, nicht die Zahl.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Gitea act_runner</strong>: CVE-2026-58053, NVD-Score <strong>9,9 kritisch</strong>. Wer einen Workflow auf einem Docker-Runner starten darf, kommt als root auf den Host. NVD nennt <em>keine</em> gefixte Version.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2</strong>: CVE-2026-55200 — Fix nur als Upstream-Commit <code>7acf3df</code>, bis heute kein getaggtes Release (neueste Version bleibt 1.11.1). Eine <strong>Client-Lücke</strong> — der bösartige SSH-<em>Server</em> greift dich an. Score-Divergenz: 9,2 (CVSS 4.0) vs. 8,3 (NVD, CVSS 3.1).</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>„Januscape\"</strong>: CVE-2026-53359, 16 Jahre alter Use-after-free in KVMs Shadow-MMU. Guest-to-Host-Ausbruch auf Intel <em>und</em> AMD. Kernel seit 4. Juli gefixt — Companion CVE-2026-46113 nicht vergessen.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: SharePoint-RCE CVE-2026-45659 am 1. Juli, am 7. Juli drei weitere — darunter Langflow CVE-2026-55255 (8,4 laut NVD vs. 9,9 laut Sekundär-Trackern).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12</strong>: <code>postinstall</code> standardmäßig aus, Git- und Remote-URLs nur noch opt-in. Die späte, richtige Antwort auf elf Wochen Lieferketten-Vergiftung.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU-Kommission</strong>: „Action Plan on Cybersecurity and AI\" gestern vorgestellt — aufgesetzt auf AI Act, CRA, NIS2. Viel Struktur, keine Fristen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Confidential Computing</strong>: Forscher brechen die Ortsgarantie von attestiertem TLS. Ein Fix im Handshake sei womöglich unmöglich.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ende Juni hat jemand die Spielregeln der Branche ignoriert: Ein anonymer Forscher unter dem Handle „bikini\" veröffentlichte funktionierende Exploit-Prototypen für Docker, Gitea, libssh2, PHP und Firefox — ohne einen einzigen Hersteller vorab zu informieren. Zwei Funde sind schwer, einer hat bis heute keine gefixte Version. Parallel räumt der Kernel eine Lücke ab, die seit August 2010 im Code stand und Gäste aus ihrer VM auf den Host lässt. Kein Alarm — aber ein guter Tag für die Frage: wer darf bei uns CI-Workflows starten?</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>„Exploitarium\"</strong>: anonymer PoC-Dump über ~22 OSS-Projekte ohne Vendor-Vorwarnung, 27. Juni – 1. Juli. Der Zähler ist zwischen den Outlets uneinheitlich — belastbar ist der Umstand, nicht die Zahl.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Gitea act_runner</strong>: CVE-2026-58053, NVD-Score <strong>9,9 kritisch</strong>. Wer einen Workflow auf einem Docker-Runner starten darf, kommt als root auf den Host. NVD nennt <em>keine</em> gefixte Version.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2</strong>: CVE-2026-55200 — Fix nur als Upstream-Commit <code>7acf3df</code>, bis heute kein getaggtes Release (neueste Version bleibt 1.11.1). Eine <strong>Client-Lücke</strong> — der bösartige SSH-<em>Server</em> greift dich an. Score-Divergenz: 9,2 (CVSS 4.0) vs. 8,3 (NVD, CVSS 3.1).</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>„Januscape\"</strong>: CVE-2026-53359, 16 Jahre alter Use-after-free in KVMs Shadow-MMU. Guest-to-Host-Ausbruch auf Intel <em>und</em> AMD. Kernel seit 4. Juli gefixt — Companion CVE-2026-46113 nicht vergessen.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: SharePoint-RCE CVE-2026-45659 am 1. Juli, am 7. Juli drei weitere — darunter Langflow CVE-2026-55255 (8,4 laut NVD vs. 9,9 laut Sekundär-Trackern).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12</strong>: <code>postinstall</code> standardmäßig aus, Git- und Remote-URLs nur noch opt-in. Die späte, richtige Antwort auf elf Wochen Lieferketten-Vergiftung.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU-Kommission</strong>: „Action Plan on Cybersecurity and AI\" gestern vorgestellt — aufgesetzt auf AI Act, CRA, NIS2. Viel Struktur, keine Fristen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Confidential Computing</strong>: Forscher brechen die Ortsgarantie von attestiertem TLS. Ein Fix im Handshake sei womöglich unmöglich.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">In late June, someone ignored the industry's rulebook: an anonymous researcher going by the handle \"bikini\" published working exploit prototypes for Docker, Gitea, libssh2, PHP, and Firefox — without notifying a single vendor beforehand. Two of the findings are severe, and one still has no fixed version today. In parallel, the kernel closed a flaw that had sat in the code since August 2010 and lets guests escape their VM onto the host. No alarm mode — but a good day to ask: who's allowed to start CI workflows at your org?</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>\"Exploitarium\"</strong>: anonymous PoC dump covering ~22 OSS projects with no vendor warning, June 27 – July 1. The count varies between outlets — what's solid is the fact of it, not the number.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Gitea act_runner</strong>: CVE-2026-58053, NVD score <strong>9.9 critical</strong>. Anyone allowed to run a workflow on a Docker runner lands on the host as root. NVD lists <em>no</em> fixed version.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2</strong>: CVE-2026-55200 — fix exists only as upstream commit <code>7acf3df</code>, still no tagged release (latest remains 1.11.1). A <strong>client-side flaw</strong> — the malicious SSH <em>server</em> is the one attacking you. Score divergence: 9.2 (CVSS 4.0) vs. 8.3 (NVD, CVSS 3.1).</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>\"Januscape\"</strong>: CVE-2026-53359, a 16-year-old use-after-free in KVM's shadow MMU. Guest-to-host escape on Intel <em>and</em> AMD. Fixed in the kernel since July 4 — don't forget companion CVE-2026-46113.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: SharePoint RCE CVE-2026-45659 on July 1, three more on July 7 — including Langflow CVE-2026-55255 (8.4 per NVD vs. 9.9 per secondary trackers).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12</strong>: <code>postinstall</code> off by default, Git and remote URLs now opt-in only. The late but correct answer to eleven weeks of supply-chain poisoning.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>European Commission</strong>: \"Action Plan on Cybersecurity and AI\" unveiled yesterday — built on the AI Act, CRA, NIS2. Lots of structure, no deadlines.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Confidential Computing</strong>: researchers break the location guarantee of attested TLS. A fix inside the handshake may be impossible.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">No fim de junho, alguém ignorou as regras do jogo do setor: um pesquisador anônimo sob o codinome \"bikini\" publicou protótipos de exploits funcionais para Docker, Gitea, libssh2, PHP e Firefox — sem avisar um único fornecedor com antecedência. Duas das descobertas são graves, e uma ainda não tem versão corrigida até hoje. Paralelamente, o kernel eliminou uma falha que estava no código desde agosto de 2010 e permite que convidados escapem da VM para o host. Não é modo de alarme — mas é um bom dia para perguntar: quem pode iniciar workflows de CI na sua empresa?</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>\"Exploitarium\"</strong>: despejo anônimo de PoCs cobrindo ~22 projetos open source sem aviso prévio a fornecedores, 27 de junho a 1º de julho. A contagem varia entre veículos — o que é sólido é o fato em si, não o número.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Gitea act_runner</strong>: CVE-2026-58053, score do NVD <strong>9,9 crítico</strong>. Quem pode rodar um workflow em um runner Docker chega como root no host. O NVD não lista <em>nenhuma</em> versão corrigida.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2</strong>: CVE-2026-55200 — a correção existe apenas como commit upstream <code>7acf3df</code>, ainda sem release com tag (a versão mais recente continua sendo a 1.11.1). Uma <strong>falha do lado cliente</strong> — é o <em>servidor</em> SSH malicioso que ataca você. Divergência de score: 9,2 (CVSS 4.0) vs. 8,3 (NVD, CVSS 3.1).</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>\"Januscape\"</strong>: CVE-2026-53359, um use-after-free de 16 anos na shadow MMU do KVM. Fuga de VM para o host, em Intel <em>e</em> AMD. Corrigido no kernel desde 4 de julho — não esqueça a CVE companheira CVE-2026-46113.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EUA</span> <strong>CISA KEV</strong>: RCE de SharePoint CVE-2026-45659 em 1º de julho, mais três em 7 de julho — entre elas o Langflow CVE-2026-55255 (8,4 segundo o NVD vs. 9,9 segundo rastreadores secundários).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12</strong>: <code>postinstall</code> desativado por padrão, URLs Git e remotas agora só via opt-in. A resposta tardia, mas correta, a onze semanas de envenenamento de cadeia de suprimentos.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">UE</span> <strong>Comissão Europeia</strong>: \"Action Plan on Cybersecurity and AI\" apresentado ontem — construído sobre o AI Act, o CRA e a NIS2. Muita estrutura, nenhum prazo.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Confidential Computing</strong>: pesquisadores quebram a garantia de localização do TLS atestado. Uma correção dentro do handshake pode ser impossível.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">A fines de junio, alguien ignoró las reglas del juego de la industria: un investigador anónimo bajo el alias \"bikini\" publicó prototipos de exploits funcionales para Docker, Gitea, libssh2, PHP y Firefox — sin avisar a un solo proveedor de antemano. Dos de los hallazgos son graves, y uno todavía no tiene versión corregida. En paralelo, el kernel eliminó una falla que llevaba en el código desde agosto de 2010 y permite que los invitados escapen de su VM hacia el host. No es momento de alarma, pero sí un buen día para preguntarse: ¿quién puede iniciar workflows de CI en tu organización?</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>\"Exploitarium\"</strong>: filtración anónima de PoCs sobre ~22 proyectos de código abierto sin aviso previo a los proveedores, 27 de junio – 1 de julio. La cifra varía entre medios — lo sólido es el hecho, no el número.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Gitea act_runner</strong>: CVE-2026-58053, puntuación NVD <strong>9,9 crítica</strong>. Quien pueda ejecutar un workflow en un runner de Docker llega como root al host. NVD no indica <em>ninguna</em> versión corregida.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2</strong>: CVE-2026-55200 — la corrección existe solo como commit upstream <code>7acf3df</code>, todavía sin release etiquetado (la versión más reciente sigue siendo la 1.11.1). Una <strong>falla del lado cliente</strong> — es el <em>servidor</em> SSH malicioso el que te ataca. Divergencia de puntuación: 9,2 (CVSS 4.0) vs. 8,3 (NVD, CVSS 3.1).</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>\"Januscape\"</strong>: CVE-2026-53359, un use-after-free de 16 años en la shadow MMU de KVM. Fuga de la VM al host, en Intel <em>y</em> AMD. Corregido en el kernel desde el 4 de julio — no olvides la CVE complementaria CVE-2026-46113.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EE. UU.</span> <strong>CISA KEV</strong>: RCE de SharePoint CVE-2026-45659 el 1 de julio, tres más el 7 de julio — entre ellas Langflow CVE-2026-55255 (8,4 según NVD vs. 9,9 según rastreadores secundarios).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12</strong>: <code>postinstall</code> desactivado por defecto, las URLs Git y remotas ahora solo por opt-in. La respuesta tardía, pero correcta, a once semanas de envenenamiento de la cadena de suministro.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>Comisión Europea</strong>: \"Action Plan on Cybersecurity and AI\" presentado ayer — construido sobre la AI Act, el CRA y la NIS2. Mucha estructura, ningún plazo.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Confidential Computing</strong>: investigadores rompen la garantía de ubicación del TLS atestiguado. Una corrección dentro del handshake podría ser imposible.</li>\n    </ul></div>"
