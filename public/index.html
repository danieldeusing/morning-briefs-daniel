<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }

    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;

    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);

    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {

    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {

  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,

    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;

    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }

    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">

    </button>
  </div>
</header>

<div class="app-shell">

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">

      <span class="nav-rail-title">~/briefs</span>
    </div>

        <span class="cat-color"></span>

           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers

        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Selten stehen die großen Notenbanken so offen gegeneinander: Die <strong>EZB hat gehoben</strong> (erste Erhöhung seit ~3 Jahren), die <strong>Fed unter dem neuen Chef Warsh ist hawkish gedreht</strong> (das Zins-Bild zeigt jetzt einen möglichen 2026-Hike statt einer Senkung), und Brasiliens <strong>Copom hat gesenkt</strong> — auf 14,25 %. Alle drei nennen denselben Grund: vom Nahost-Krieg getriebene Inflation. Dann kam Mittwoch der US-Job-Bericht mit nur +57.000 Stellen und dämpfte die Hike-Fantasie wieder etwas. Für Daniels Euro-Umtausch bleibt der Anker heute festerer Real: EUR/BRL 5,9130 (ECB-Fix, 06.07.).</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9130</strong> (ECB-Fix Mo 06.07.) — Kreuzkurs-Check intern sauber (0,001 % Abweichung). Real leicht fester vs. vergangene Woche.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,18</strong> (Frankfurter, Mo 06.07.). Für Euro-Umtausch eher abwarten als eilen.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,88</strong> (TradingEconomics, Di 07.07.) — ein Tag jünger als die BRL-Beine, praktisch flach. Frühwarn-Ampel heute grün.</li>\n      <li><span class=\"chip hot\">EZB</span> <strong>Erste EZB-Erhöhung seit ~3 Jahren</strong>: Einlagensatz 2,00 → 2,25 % (11.06., wirksam 17.06.), explizit gegen Nahost-Inflation.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Warshs Fed dreht hawkish</strong>: 9 von 18 sehen jetzt ≥1 Hike 2026 — Kehrtwende von einer erwarteten Senkung drei Monate zuvor. Leitzins gehalten bei 3,50–3,75 %.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom senkt Selic auf 14,25 %</strong> (einstimmig) — mahnt aber „Gelassenheit\" wegen Nahost-Unsicherheit. Nächste Sitzung 28.–29.07.</li>\n      <li><span class=\"chip\">USA</span> <strong>US-Jobs Juni: nur +57.000</strong> (erwartet 115.000). Arbeitslosenquote 4,2 % — aber nur, weil weniger Menschen überhaupt suchen.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Brent ~72 $</strong>, −23 % im Monat nach OPEC+-Fördererhöhung — untergräbt die Nahost-Inflations-Story, auf die sich EZB und Fed berufen.</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>BR-IPCA am Freitag (10.07.)</strong> ist der nächste harte Datenpunkt — Schlüssel-Input für die Copom-Sitzung Ende Juli.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

chen.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Brent ~72 $</strong>, −23 % im Monat nach OPEC+-Fördererhöhung — untergräbt die Nahost-Inflations-Story, auf die sich EZB und Fed berufen.</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>BR-IPCA am Freitag (10.07.)</strong> ist der nächste harte Datenpunkt — Schlüssel-Input für die Copom-Sitzung Ende Juli.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Rarely do the major central banks stand so openly against each other: the <strong>ECB hiked</strong> (first increase in ~3 years), the <strong>Fed under new chair Warsh turned hawkish</strong> (the rate dot plot now shows a possible 2026 hike instead of a cut), and Brazil's <strong>Copom cut</strong> — to 14.25%. All three cite the same reason: inflation driven by the Middle East war. Then on Wednesday the US jobs report came in at just +57,000 and dampened the hike narrative again somewhat. For Daniel's euro exchange, the anchor today remains a slightly firmer real: EUR/BRL 5.9130 (ECB fix, 07/06).</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9130</strong> (ECB fix Mon 07/06) — internal cross-rate check clean (0.001% deviation). Real slightly firmer vs. last week.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.18</strong> (Frankfurter, Mon 07/06). For euro exchange, better to wait than rush.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.88</strong> (TradingEconomics, Tue 07/07) — a day newer than the BRL legs, practically flat. Early-warning signal green today.</li>\n      <li><span class=\"chip hot\">ECB</span> <strong>First ECB hike in ~3 years</strong>: deposit rate 2.00 → 2.25% (06/11, effective 06/17), explicitly against Middle East-driven inflation.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Warsh's Fed turns hawkish</strong>: 9 of 18 now see ≥1 hike in 2026 — a reversal from an expected cut three months earlier. Policy rate held at 3.50–3.75%.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom cuts Selic to 14.25%</strong> (unanimous) — but warns of \"composure\" given Middle East uncertainty. Next meeting 07/28–29.</li>\n      <li><span class=\"chip\">USA</span> <strong>US June jobs: just +57,000</strong> (expected 115,000). Unemployment rate 4.2% — but only because fewer people are looking at all.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Brent ~$72</strong>, −23% over the month after OPEC+ raised output — undermines the Middle East inflation narrative that the ECB and Fed both cite.</li>\n      <li><span class=\"chip\">Outlook</span> <strong>BR-IPCA on Friday (07/10)</strong> is the next hard data point — a key input for the late-July Copom meeting.</li>\n      <li><span class=\"chip\">Note</span> Forecast probabilities below = <strong>my confidence</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Raramente os grandes bancos centrais ficam tão abertamente em lados opostos: o <strong>BCE subiu os juros</strong> (primeira alta em ~3 anos), o <strong>Fed sob o novo presidente Warsh virou hawkish</strong> (o gráfico de projeções de juros agora mostra uma possível alta em 2026 em vez de um corte), e o <strong>Copom do Brasil cortou</strong> — para 14,25%. Os três citam o mesmo motivo: inflação impulsionada pela guerra no Oriente Médio. Depois, na quarta-feira, veio o relatório de empregos dos EUA com apenas +57.000 vagas, o que esfriou um pouco de novo a expectativa de alta de juros. Para a troca de euros do Daniel, a âncora hoje segue um real ligeiramente mais firme: EUR/BRL 5,9130 (fixação do BCE, 06/07).</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,9130</strong> (fixação do BCE, seg. 06/07) — checagem interna de câmbio cruzado limpa (0,001% de desvio). Real ligeiramente mais firme frente à semana passada.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>USD/BRL 5,18</strong> (Frankfurter, seg. 06/07). Para a troca de euros, melhor esperar do que se apressar.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 100,88</strong> (TradingEconomics, ter. 07/07) — um dia mais recente que as pernas do BRL, praticamente estável. Sinal de alerta antecipado verde hoje.</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>Primeira alta do BCE em ~3 anos</strong>: taxa de depósito 2,00 → 2,25% (11/06, em vigor desde 17/06), justificada explicitamente pela inflação do Oriente Médio.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Fed de Warsh vira hawkish</strong>: 9 de 18 membros agora veem ≥1 alta em 2026 — uma reviravolta em relação a um corte esperado três meses antes. Juros básicos mantidos em 3,50–3,75%.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom corta a Selic para 14,25%</strong> (unânime) — mas pede \"serenidade\" diante da incerteza no Oriente Médio. Próxima reunião: 28–29/07.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Empregos nos EUA em junho: apenas +57.000</strong> (esperado 115.000). Taxa de desemprego em 4,2% — mas só porque menos pessoas estão procurando emprego.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Brent ~US$ 72</strong>, −23% no mês após a OPEP+ aumentar a produção — mina a narrativa de inflação do Oriente Médio à qual BCE e Fed recorrem.</li>\n      <li><span class=\"chip\">Perspectiva</span> <strong>IPCA do Brasil na sexta-feira (10/07)</strong> é o próximo dado concreto — insumo-chave para a reunião do Copom no fim de julho.</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades de previsão abaixo = <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Pocas veces los grandes bancos centrales están tan abiertamente enfrentados: el <strong>BCE subió las tasas</strong> (primer aumento en ~3 años), la <strong>Fed bajo el nuevo presidente Warsh viró hacia una postura restrictiva</strong> (el gráfico de expectativas de tasas ahora muestra una posible alza en 2026 en lugar de un recorte), y el <strong>Copom de Brasil recortó</strong> — hasta 14.25%. Los tres citan el mismo motivo: inflación impulsada por la guerra en Medio Oriente. Luego, el miércoles llegó el reporte de empleo de EE. UU. con apenas +57,000 puestos, lo que enfrió de nuevo un poco la narrativa de alza de tasas. Para el cambio de euros de Daniel, el ancla de hoy sigue siendo un real ligeramente más firme: EUR/BRL 5.9130 (fijación del BCE, 06/07).</p>\n    <ul>\n      <li><span class=\"chip hot\">Divisas</span> <strong>EUR/BRL 5.9130</strong> (fijación del BCE, lun. 06/07) — verificación interna de tipo cruzado limpia (0.001% de desviación). Real ligeramente más firme frente a la semana pasada.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>USD/BRL 5.18</strong> (Frankfurter, lun. 06/07). Para el cambio de euros, mejor esperar que apresurarse.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>DXY 100.88</strong> (TradingEconomics, mar. 07/07) — un día más reciente que las piernas del BRL, prácticamente plano. Semáforo de alerta temprana en verde hoy.</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>Primer aumento del BCE en ~3 años</strong>: tasa de depósito 2.00 → 2.25% (11/06, vigente desde el 17/06), justificado explícitamente por la inflación de Medio Oriente.</li>\n      <li><span class=\"chip hot\">EE. UU.</span> <strong>La Fed de Warsh vira hacia lo restrictivo</strong>: 9 de 18 miembros ahora ven ≥1 alza en 2026 — un giro de 180 grados respecto a un recorte esperado tres meses antes. Tasa de referencia se mantiene en 3.50–3.75%.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>El Copom recorta la Selic a 14.25%</strong> (unánime) — pero pide \"serenidad\" ante la incertidumbre de Medio Oriente. Próxima reunión: 28–29/07.</li>\n      <li><span class=\"chip\">EE. UU.</span> <strong>Empleo en EE. UU. en junio: solo +57,000</strong> (se esperaban 115,000). Tasa de desempleo en 4.2% — pero solo porque menos personas están buscando trabajo.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Brent ~72 dólares</strong>, −23% en el mes tras el aumento de producción de la OPEP+ — socava la narrativa de inflación de Medio Oriente que citan tanto el BCE como la Fed.</li>\n      <li><span class=\"chip\">Perspectiva</span> <strong>El IPCA de Brasil el viernes (10/07)</strong> es el próximo dato duro — insumo clave para la reunión del Copom a fines de julio.</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades de pronóstico abajo = <strong>mi nivel de confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein einziger Datenpunkt trägt gerade den ganzen Markt: Der US-Jobs-Report für Juni (veröffentlicht 02.07.) zeigte <strong>nur +57.000 neue Stellen</strong> gegen erwartete 115.000 — der schwächste Print seit 2024, dazu wurden April und Mai zusammen um 74.000 nach unten revidiert. Für die Kurse ist ein schwacher Arbeitsmarkt paradoxerweise gute Nachricht: Er nimmt der Notenbank jeden Grund für eine Zinserhöhung — die Wette steht bei <strong>75,6 % auf ein Halten</strong> beim nächsten Fed-Termin. Genau dieser „mildere-Fed\"-Faden zieht sich durch alles: <strong>S&amp;P 500 und Nasdaq schlossen am 06.07. auf Rekordhochs</strong> (7.537 / 26.121), Gold hält sein erhöhtes Niveau, billiges Öl bestätigt die niedrige Inflation. Das Gegenstück für Daniel vor Ort: Der <strong>Ibovespa fiel −0,93 %</strong> — Auslandskapital fließt ab, BR-Politik und die frisch gestarteten Brasilien-USA-Handelsgespräche belasten. Bei Krypto ist die ETF-Wende <strong>zerbrochen</strong>: Der +221,7-Mio.-$-Zufluss vom 02.07. war eine Eintagsfliege — die vier Folgetage brachten wieder 526,6 Mio. $ Abfluss.</p>\n    <ul>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>US-Jobs nur +57.000</strong> (Erwartung 115.000), Arbeitslosenquote 4,2 %, April+Mai −74.000 revidiert — schwächster Print seit 2024 (02.07.).</li>\n      <li><span class=\"chip good\">FED</span> <strong>75,6 % Wahrscheinlichkeit für Zins-Halten</strong> beim nächsten Termin (CME FedWatch, 04.07.) — der schwache Arbeitsmarkt killt die Hike-Angst. Leitzins aktuell 3,50–3,75 %.</li>\n      <li><span class=\"chip good\">AKTIEN</span> <strong>S&amp;P 500 Rekord 7.537,43</strong> (+0,72 %), <strong>Nasdaq 26.121,16</strong> (+1,12 %), DAX 25.848,27 (+0,27 %) — alles Schluss 06.07.</li>\n      <li><span class=\"chip hot\">BRASILIEN</span> <strong>Ibovespa −0,93 % auf 172.447</strong> (06.07.) — Auslands-Abfluss, Wahl-Nervosität, Start der BR-US-Handelsgespräche. Divergenz zum US-Rekord.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC ~62.998 $</strong> (−0,3 % 24h, Cap ~1,26 Bio. $, 07.07.) — die ETF-Wende hält NICHT: +221,7 Mio. $ am 02.07. war Eintagsfliege, danach −526,6 Mio. $.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.762 $</strong> (−0,7 % 24h, Cap ~213 Mrd. $, 07.07.) — reines Beta auf BTC, kein eigener Katalysator.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~4.152 $/oz</strong> (06.07.) — hält das erhöhte Niveau, ~25 % unter dem Jan-Hoch (5.602 $); mildere Fed trägt.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~72,00 $</strong>, WTI ~68,50 $ (06.07.) — nahe Tiefs seit Ende Februar; OPEC+-Mehrförderung + Hormuz normalisiert.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Mag-7-Schere H1: NVDA +7,3 %, MSFT −22,9 %. DOGE ~0,0771 $, RENDER 1,61 $ (06.07.) — TAO/NEAR/SHIB heute nicht sauber datierbar, bewusst ohne Zahl.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Ein einziger Datenpunkt trägt gerade den ganzen Markt: Der US-Jobs-Report für Juni (veröffentlicht 02.07.) zeigte <strong>nur +57.000 neue Stellen</strong> gegen erwartete 115.000 — der schwächste Print seit 2024, dazu wurden April und Mai zusammen um 74.000 nach unten revidiert. Für die Kurse ist ein schwacher Arbeitsmarkt paradoxerweise gute Nachricht: Er nimmt der Notenbank jeden Grund für eine Zinserhöhung — die Wette steht bei <strong>75,6 % auf ein Halten</strong> beim nächsten Fed-Termin. Genau dieser „mildere-Fed\"-Faden zieht sich durch alles: <strong>S&amp;P 500 und Nasdaq schlossen am 06.07. auf Rekordhochs</strong> (7.537 / 26.121), Gold hält sein erhöhtes Niveau, billiges Öl bestätigt die niedrige Inflation. Das Gegenstück für Daniel vor Ort: Der <strong>Ibovespa fiel −0,93 %</strong> — Auslandskapital fließt ab, BR-Politik und die frisch gestarteten Brasilien-USA-Handelsgespräche belasten. Bei Krypto ist die ETF-Wende <strong>zerbrochen</strong>: Der +221,7-Mio.-$-Zufluss vom 02.07. war eine Eintagsfliege — die vier Folgetage brachten wieder 526,6 Mio. $ Abfluss.</p>\n    <ul>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>US-Jobs nur +57.000</strong> (Erwartung 115.000), Arbeitslosenquote 4,2 %, April+Mai −74.000 revidiert — schwächster Print seit 2024 (02.07.).</li>\n      <li><span class=\"chip good\">FED</span> <strong>75,6 % Wahrscheinlichkeit für Zins-Halten</strong> beim nächsten Termin (CME FedWatch, 04.07.) — der schwache Arbeitsmarkt killt die Hike-Angst. Leitzins aktuell 3,50–3,75 %.</li>\n      <li><span class=\"chip good\">AKTIEN</span> <strong>S&amp;P 500 Rekord 7.537,43</strong> (+0,72 %), <strong>Nasdaq 26.121,16</strong> (+1,12 %), DAX 25.848,27 (+0,27 %) — alles Schluss 06.07.</li>\n      <li><span class=\"chip hot\">BRASILIEN</span> <strong>Ibovespa −0,93 % auf 172.447</strong> (06.07.) — Auslands-Abfluss, Wahl-Nervosität, Start der BR-US-Handelsgespräche. Divergenz zum US-Rekord.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC ~62.998 $</strong> (−0,3 % 24h, Cap ~1,26 Bio. $, 07.07.) — die ETF-Wende hält NICHT: +221,7 Mio. $ am 02.07. war Eintagsfliege, danach −526,6 Mio. $.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.762 $</strong> (−0,7 % 24h, Cap ~213 Mrd. $, 07.07.) — reines Beta auf BTC, kein eigener Katalysator.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~4.152 $/oz</strong> (06.07.) — hält das erhöhte Niveau, ~25 % unter dem Jan-Hoch (5.602 $); mildere Fed trägt.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~72,00 $</strong>, WTI ~68,50 $ (06.07.) — nahe Tiefs seit Ende Februar; OPEC+-Mehrförderung + Hormuz normalisiert.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Mag-7-Schere H1: NVDA +7,3 %, MSFT −22,9 %. DOGE ~0,0771 $, RENDER 1,61 $ (06.07.) — TAO/NEAR/SHIB heute nicht sauber datierbar, bewusst ohne Zahl.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A single data point is carrying the whole market right now: the June US jobs report (released 07/02) showed <strong>just +57,000 new jobs</strong> against expectations of 115,000 — the weakest print since 2024, with April and May combined revised down 74,000. For prices, a weak labor market is paradoxically good news: it removes any reason for the Fed to hike — the market is pricing <strong>75.6% odds of a hold</strong> at the next Fed meeting. That \"softer Fed\" thread runs through everything: <strong>the S&amp;P 500 and Nasdaq closed at record highs on 07/06</strong> (7,537 / 26,121), gold is holding its elevated level, and cheap oil confirms low inflation. The counterpart for Daniel on the ground: the <strong>Ibovespa fell −0.93%</strong> — foreign capital is flowing out, Brazilian politics and the newly launched Brazil–US trade talks are weighing on it. In crypto, the ETF turnaround has <strong>broken down</strong>: the +$221.7 million inflow on 07/02 was a one-day wonder — the four following days brought $526.6 million back out.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>US jobs just +57,000</strong> (expected 115,000), unemployment rate 4.2%, April+May revised −74,000 — weakest print since 2024 (07/02).</li>\n      <li><span class=\"chip good\">FED</span> <strong>75.6% probability of a rate hold</strong> at the next meeting (CME FedWatch, 07/04) — the weak labor market kills hike fears. Policy rate currently 3.50–3.75%.</li>\n      <li><span class=\"chip good\">STOCKS</span> <strong>S&amp;P 500 record 7,537.43</strong> (+0.72%), <strong>Nasdaq 26,121.16</strong> (+1.12%), DAX 25,848.27 (+0.27%) — all as of the 07/06 close.</li>\n      <li><span class=\"chip hot\">BRAZIL</span> <strong>Ibovespa −0.93% to 172,447</strong> (07/06) — foreign outflows, election jitters, start of Brazil–US trade talks. Divergence from the US record.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC ~$62,998</strong> (−0.3% 24h, cap ~$1.26T, 07/07) — the ETF turnaround does NOT hold: +$221.7M on 07/02 was a one-day wonder, followed by −$526.6M.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~$1,762</strong> (−0.7% 24h, cap ~$213B, 07/07) — pure beta on BTC, no catalyst of its own.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~$4,152/oz</strong> (07/06) — holding the elevated level, ~25% below the January high ($5,602); the softer Fed is supportive.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$72.00</strong>, WTI ~$68.50 (07/06) — near lows since late February; OPEC+ output increase + Hormuz normalization.</li>\n      <li><span class=\"chip\">SECTORS</span> Mag-7 split H1: NVDA +7.3%, MSFT −22.9%. DOGE ~$0.0771, RENDER $1.61 (07/06) — TAO/NEAR/SHIB couldn't be cleanly dated today, deliberately left without a figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um único dado está sustentando o mercado inteiro agora: o relatório de empregos dos EUA referente a junho (divulgado em 02/07) mostrou <strong>apenas +57 mil novas vagas</strong> contra uma expectativa de 115 mil — o pior resultado desde 2024, com abril e maio revisados juntos para baixo em 74 mil. Para as bolsas, um mercado de trabalho fraco é, paradoxalmente, uma boa notícia: tira do banco central qualquer motivo para subir os juros — a aposta está em <strong>75,6% de chance de manutenção</strong> na próxima reunião do Fed. Esse fio condutor de \"Fed mais branda\" atravessa tudo: <strong>S&amp;P 500 e Nasdaq fecharam em 06/07 em máximas históricas</strong> (7.537 / 26.121), o ouro mantém seu patamar elevado, e o petróleo barato confirma a inflação baixa. A contrapartida para Daniel, no Brasil: o <strong>Ibovespa caiu −0,93%</strong> — capital estrangeiro está saindo, a política brasileira e as recém-iniciadas negociações comerciais Brasil-EUA pesam. Nas criptos, a virada dos ETFs <strong>se desfez</strong>: a entrada de US$ 221,7 milhões em 02/07 foi um evento isolado — os quatro dias seguintes trouxeram de volta US$ 526,6 milhões em saídas.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Empregos nos EUA apenas +57 mil</strong> (esperado 115 mil), taxa de desemprego 4,2%, abril+maio revisados em −74 mil — pior resultado desde 2024 (02/07).</li>\n      <li><span class=\"chip good\">FED</span> <strong>75,6% de probabilidade de manutenção dos juros</strong> na próxima reunião (CME FedWatch, 04/07) — o mercado de trabalho fraco elimina o medo de alta de juros. Taxa básica atual em 3,50–3,75%.</li>\n      <li><span class=\"chip good\">AÇÕES</span> <strong>S&amp;P 500 recorde de 7.537,43</strong> (+0,72%), <strong>Nasdaq 26.121,16</strong> (+1,12%), DAX 25.848,27 (+0,27%) — tudo no fechamento de 06/07.</li>\n      <li><span class=\"chip hot\">BRASIL</span> <strong>Ibovespa −0,93% aos 172.447 pontos</strong> (06/07) — saída de capital estrangeiro, nervosismo eleitoral, início das negociações comerciais Brasil-EUA. Divergência frente ao recorde americano.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC ~US$ 62.998</strong> (−0,3% em 24h, cap ~US$ 1,26 tri, 07/07) — a virada dos ETFs NÃO se sustenta: +US$ 221,7 mi em 02/07 foi evento isolado, seguido de −US$ 526,6 mi.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~US$ 1.762</strong> (−0,7% em 24h, cap ~US$ 213 bi, 07/07) — beta puro em relação ao BTC, sem catalisador próprio.</li>\n      <li><span class=\"chip good\">OURO</span> <strong>Ouro ~US$ 4.152/oz</strong> (06/07) — mantém o patamar elevado, ~25% abaixo da máxima de janeiro (US$ 5.602); o Fed mais brando sustenta.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~US$ 72,00</strong>, WTI ~US$ 68,50 (06/07) — perto das mínimas desde o fim de fevereiro; aumento de produção da OPEP+ + normalização em Hormuz.</li>\n      <li><span class=\"chip\">SETORES</span> Divisão entre as Mag-7 no primeiro semestre: NVDA +7,3%, MSFT −22,9%. DOGE ~US$ 0,0771, RENDER US$ 1,61 (06/07) — TAO/NEAR/SHIB não puderam ser datados com precisão hoje, deixados propositalmente sem número.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un solo dato está sosteniendo todo el mercado en este momento: el reporte de empleo de EE. UU. de junio (publicado el 02/07) mostró <strong>solo +57,000 nuevos empleos</strong> frente a una expectativa de 115,000 — el dato más débil desde 2024, con abril y mayo revisados juntos a la baja en 74,000. Para los mercados, un mercado laboral débil es, paradójicamente, buena noticia: le quita a la Fed cualquier motivo para subir las tasas — la apuesta está en un <strong>75.6% de probabilidad de que se mantengan</strong> en la próxima reunión de la Fed. Ese hilo conductor de \"Fed más suave\" atraviesa todo: <strong>el S&amp;P 500 y el Nasdaq cerraron el 06/07 en máximos históricos</strong> (7,537 / 26,121), el oro mantiene su nivel elevado, y el petróleo barato confirma la baja inflación. La contraparte para Daniel en Brasil: el <strong>Ibovespa cayó −0.93%</strong> — sale capital extranjero, la política brasileña y las recién iniciadas negociaciones comerciales entre Brasil y EE. UU. pesan sobre el índice. En cripto, el giro de los ETF se <strong>rompió</strong>: la entrada de 221.7 millones de dólares del 02/07 fue un evento aislado — los cuatro días siguientes trajeron de vuelta 526.6 millones de dólares en salidas.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Empleo en EE. UU. solo +57,000</strong> (esperado 115,000), tasa de desempleo 4.2%, abril+mayo revisados en −74,000 — el dato más débil desde 2024 (02/07).</li>\n      <li><span class=\"chip good\">FED</span> <strong>75.6% de probabilidad de que se mantengan las tasas</strong> en la próxima reunión (CME FedWatch, 04/07) — el débil mercado laboral elimina el temor a una subida. Tasa de referencia actual en 3.50–3.75%.</li>\n      <li><span class=\"chip good\">ACCIONES</span> <strong>S&amp;P 500 récord de 7,537.43</strong> (+0.72%), <strong>Nasdaq 26,121.16</strong> (+1.12%), DAX 25,848.27 (+0.27%) — todo al cierre del 06/07.</li>\n      <li><span class=\"chip hot\">BRASIL</span> <strong>Ibovespa −0.93%, a 172,447 puntos</strong> (06/07) — salida de capital extranjero, nerviosismo electoral, inicio de las negociaciones comerciales Brasil-EE. UU. Divergencia frente al récord estadounidense.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC ~62,998 dólares</strong> (−0.3% en 24h, cap ~1.26 billones de dólares, 07/07) — el giro de los ETF NO se sostiene: +221.7 millones el 02/07 fue un evento aislado, seguido de −526.6 millones.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1,762 dólares</strong> (−0.7% en 24h, cap ~213 mil millones de dólares, 07/07) — beta puro respecto al BTC, sin catalizador propio.</li>\n      <li><span class=\"chip good\">ORO</span> <strong>Oro ~4,152 dólares/oz</strong> (06/07) — mantiene el nivel elevado, ~25% por debajo del máximo de enero (5,602 dólares); la Fed más suave respalda.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~72.00 dólares</strong>, WTI ~68.50 dólares (06/07) — cerca de los mínimos desde finales de febrero; el aumento de producción de la OPEP+ + la normalización en Ormuz.</li>\n      <li><span class=\"chip\">SECTORES</span> Brecha entre las Mag-7 en el primer semestre: NVDA +7.3%, MSFT −22.9%. DOGE ~0.0771 dólares, RENDER 1.61 dólares (06/07) — TAO/NEAR/SHIB no se pudieron fechar con precisión hoy, deliberadamente sin cifra.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Geschichten prägen den Tag, und beide erzählen dieselbe unbequeme Wahrheit: Angreifer werden schneller, weil sie automatisieren. FortiBleed zeigt, wie eine simple Brute-Force-Kampagne 86.644 echte FortiGate-Zugangsdaten aus 194 Ländern erntete — bis hinein ins britische Außenministerium. Und Sysdig dokumentiert mit JADEPUFFER die erste Ransomware, die einen KI-Agenten die komplette Attacke selbst fahren lässt. Passend dazu warnen die Five Eyes: der Zeithorizont für KI-gestützte Cyberangriffe sei „Monate, keine Jahre\". Kein Alarm-Modus — aber ein guter Tag, um Zugangs-Hygiene und Patch-Stände ernst zu nehmen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>FortiBleed</strong>: eine russischsprachige Gruppe erntete per Brute-Force <strong>86.644 gültige FortiGate-Admin-/VPN-Logins</strong> aus 194 Ländern. Kein CVE — reine Zugangsdaten-Hygiene. NCSC-Warnung vom 18. Juni; betroffen u. a. UK-Außenministerium und Kommunen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>JADEPUFFER</strong>: Sysdig dokumentiert die erste vollständig KI-agentische Ransomware — Einstieg über Langflow-RCE (CVE-2025-3248), 600+ autonome Payloads, 31-Sekunden-Selbstkorrektur. Der AES-Schlüssel wurde nie gespeichert: selbst bei Zahlung keine Wiederherstellung.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Five Eyes</strong>: gemeinsame Erklärung (22. Juni) — Frontier-KI verändere Angriff und Verteidigung „auf einer Zeitskala von Monaten, nicht Jahren\". Fünf konkrete Verteidiger-Maßnahmen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CloudNativePG</strong>: CVE-2026-44477 (CVSS 9.4) — der Metrics-Exporter lässt sich zu OS-Befehlen im Primary-Pod eskalieren, teils ganz ohne Custom-Config. Fix in 1.29.1 / 1.28.3.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">USA</span> <strong>NIST SP 1800-41</strong>: der Draft zur Cyber-Incident-Recovery für die Fertigung läuft — Kommentarfrist endet <strong>morgen, 8. Juli</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: die SharePoint-RCE CVE-2026-45659 bleibt aktiv ausgenutzt — wer den Out-of-Band-Patch von Ende Mai noch nicht drin hat, ist überfällig.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Docker</strong>: zur Erinnerung — CVE-2026-34040 (AuthZ-Bypass, CVSS 8.8) ist seit April bekannt und in 29.3.1 gefixt. Ungepatchte Flotten prüfen.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Geschichten prägen den Tag, und beide erzählen dieselbe unbequeme Wahrheit: Angreifer werden schneller, weil sie automatisieren. FortiBleed zeigt, wie eine simple Brute-Force-Kampagne 86.644 echte FortiGate-Zugangsdaten aus 194 Ländern erntete — bis hinein ins britische Außenministerium. Und Sysdig dokumentiert mit JADEPUFFER die erste Ransomware, die einen KI-Agenten die komplette Attacke selbst fahren lässt. Passend dazu warnen die Five Eyes: der Zeithorizont für KI-gestützte Cyberangriffe sei „Monate, keine Jahre\". Kein Alarm-Modus — aber ein guter Tag, um Zugangs-Hygiene und Patch-Stände ernst zu nehmen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>FortiBleed</strong>: eine russischsprachige Gruppe erntete per Brute-Force <strong>86.644 gültige FortiGate-Admin-/VPN-Logins</strong> aus 194 Ländern. Kein CVE — reine Zugangsdaten-Hygiene. NCSC-Warnung vom 18. Juni; betroffen u. a. UK-Außenministerium und Kommunen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>JADEPUFFER</strong>: Sysdig dokumentiert die erste vollständig KI-agentische Ransomware — Einstieg über Langflow-RCE (CVE-2025-3248), 600+ autonome Payloads, 31-Sekunden-Selbstkorrektur. Der AES-Schlüssel wurde nie gespeichert: selbst bei Zahlung keine Wiederherstellung.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Five Eyes</strong>: gemeinsame Erklärung (22. Juni) — Frontier-KI verändere Angriff und Verteidigung „auf einer Zeitskala von Monaten, nicht Jahren\". Fünf konkrete Verteidiger-Maßnahmen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CloudNativePG</strong>: CVE-2026-44477 (CVSS 9.4) — der Metrics-Exporter lässt sich zu OS-Befehlen im Primary-Pod eskalieren, teils ganz ohne Custom-Config. Fix in 1.29.1 / 1.28.3.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">USA</span> <strong>NIST SP 1800-41</strong>: der Draft zur Cyber-Incident-Recovery für die Fertigung läuft — Kommentarfrist endet <strong>morgen, 8. Juli</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: die SharePoint-RCE CVE-2026-45659 bleibt aktiv ausgenutzt — wer den Out-of-Band-Patch von Ende Mai noch nicht drin hat, ist überfällig.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Docker</strong>: zur Erinnerung — CVE-2026-34040 (AuthZ-Bypass, CVSS 8.8) ist seit April bekannt und in 29.3.1 gefixt. Ungepatchte Flotten prüfen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two stories define the day, and both tell the same uncomfortable truth: attackers are getting faster because they're automating. FortiBleed shows how a simple brute-force campaign harvested 86,644 real FortiGate credentials from 194 countries — reaching all the way into the UK Foreign Office. And Sysdig documents JADEPUFFER, the first ransomware to let an AI agent run the entire attack itself. Fittingly, the Five Eyes warn that the timeline for AI-powered cyberattacks is \"months, not years.\" No alarm mode — but a good day to take access hygiene and patch status seriously.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>FortiBleed</strong>: a Russian-speaking group harvested <strong>86,644 valid FortiGate admin/VPN logins</strong> via brute force across 194 countries. No CVE — pure credential hygiene. NCSC warning from June 18; UK Foreign Office and local councils among those affected.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>JADEPUFFER</strong>: Sysdig documents the first fully AI-agentic ransomware — entry via Langflow RCE (CVE-2025-3248), 600+ autonomous payloads, 31-second self-correction. The AES key was never stored: no recovery even if the ransom is paid.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Five Eyes</strong>: joint statement (June 22) — frontier AI is changing offense and defense \"on a timescale of months, not years.\" Five concrete defender measures.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CloudNativePG</strong>: CVE-2026-44477 (CVSS 9.4) — the metrics exporter can be escalated to OS commands in the primary pod, in some cases with no custom config at all. Fixed in 1.29.1 / 1.28.3.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">USA</span> <strong>NIST SP 1800-41</strong>: the draft on cyber incident recovery for manufacturing is out — comment period closes <strong>tomorrow, July 8</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: the SharePoint RCE CVE-2026-45659 remains actively exploited — anyone who hasn't applied the late-May out-of-band patch is overdue.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Docker</strong>: reminder — CVE-2026-34040 (AuthZ bypass, CVSS 8.8) has been known since April and is fixed in 29.3.1. Check unpatched fleets.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas histórias marcam o dia, e ambas contam a mesma verdade incômoda: os atacantes estão ficando mais rápidos porque estão automatizando. O FortiBleed mostra como uma campanha simples de força bruta coletou 86.644 credenciais reais de FortiGate em 194 países — chegando até o Ministério das Relações Exteriores britânico. E a Sysdig documenta, com o JADEPUFFER, o primeiro ransomware em que um agente de IA conduz todo o ataque sozinho. Não por acaso, os Five Eyes alertam: o horizonte de tempo para ataques cibernéticos com IA é de \"meses, não anos\". Não é modo de alarme — mas é um bom dia para levar a sério a higiene de acessos e o status dos patches.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>FortiBleed</strong>: um grupo de língua russa coletou por força bruta <strong>86.644 logins de admin/VPN válidos do FortiGate</strong> em 194 países. Sem CVE — puramente higiene de credenciais. Alerta do NCSC de 18 de junho; atingiu, entre outros, o Ministério das Relações Exteriores do Reino Unido e prefeituras.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>JADEPUFFER</strong>: a Sysdig documenta o primeiro ransomware totalmente agêntico com IA — entrada via RCE no Langflow (CVE-2025-3248), mais de 600 payloads autônomos, autocorreção em 31 segundos. A chave AES nunca foi armazenada: nem pagando o resgate há recuperação.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Five Eyes</strong>: declaração conjunta (22 de junho) — a IA de fronteira está mudando ataque e defesa \"numa escala de meses, não de anos\". Cinco medidas concretas para defensores.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CloudNativePG</strong>: CVE-2026-44477 (CVSS 9,4) — o exportador de métricas permite escalar para comandos de sistema operacional no pod primário, em alguns casos sem qualquer configuração customizada. Corrigido nas versões 1.29.1 / 1.28.3.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EUA</span> <strong>NIST SP 1800-41</strong>: a minuta sobre recuperação de incidentes cibernéticos para a indústria está em consulta — prazo para comentários termina <strong>amanhã, 8 de julho</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EUA</span> <strong>CISA KEV</strong>: o RCE de SharePoint CVE-2026-45659 continua sendo explorado ativamente — quem ainda não aplicou o patch fora de banda do fim de maio está atrasado.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Docker</strong>: um lembrete — a CVE-2026-34040 (bypass de AuthZ, CVSS 8,8) é conhecida desde abril e foi corrigida na versão 29.3.1. Verifique frotas não corrigidas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos historias marcan el día, y ambas cuentan la misma verdad incómoda: los atacantes son cada vez más rápidos porque automatizan. FortiBleed muestra cómo una campaña simple de fuerza bruta recolectó 86,644 credenciales reales de FortiGate en 194 países — llegando incluso hasta el Ministerio de Relaciones Exteriores británico. Y Sysdig documenta con JADEPUFFER el primer ransomware que deja a un agente de IA conducir todo el ataque por sí mismo. En consonancia, los Five Eyes advierten que el horizonte de tiempo para los ciberataques impulsados por IA es de \"meses, no años\". No es momento de alarma, pero sí un buen día para tomarse en serio la higiene de accesos y el estado de los parches.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>FortiBleed</strong>: un grupo de habla rusa recolectó por fuerza bruta <strong>86,644 accesos válidos de administrador/VPN de FortiGate</strong> en 194 países. Sin CVE — higiene pura de credenciales. Alerta del NCSC del 18 de junio; afectó, entre otros, al Ministerio de Relaciones Exteriores del Reino Unido y a municipios.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>JADEPUFFER</strong>: Sysdig documenta el primer ransomware totalmente agéntico con IA — entrada vía RCE en Langflow (CVE-2025-3248), más de 600 payloads autónomos, autocorrección en 31 segundos. La clave AES nunca se almacenó: ni pagando el rescate hay recuperación posible.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Five Eyes</strong>: declaración conjunta (22 de junio) — la IA de frontera está transformando el ataque y la defensa \"en una escala de meses, no de años\". Cinco medidas concretas para los defensores.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CloudNativePG</strong>: CVE-2026-44477 (CVSS 9.4) — el exportador de métricas permite escalar a comandos del sistema operativo en el pod primario, en algunos casos sin ninguna configuración personalizada. Corregido en 1.29.1 / 1.28.3.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">EE. UU.</span> <strong>NIST SP 1800-41</strong>: el borrador sobre recuperación ante incidentes cibernéticos para el sector manufacturero está en consulta — el plazo de comentarios cierra <strong>mañana, 8 de julio</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EE. UU.</span> <strong>CISA KEV</strong>: el RCE de SharePoint CVE-2026-45659 sigue siendo explotado activamente — quien todavía no haya aplicado el parche fuera de banda de finales de mayo va con retraso.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Docker</strong>: un recordatorio — la CVE-2026-34040 (bypass de AuthZ, CVSS 8.8) se conoce desde abril y está corregida en la 29.3.1. Revisen sus flotas sin parchar.</li>\n    </ul></div>"
      }
