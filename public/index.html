<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Diese Woche ist die wichtigste für deinen Umtausch seit Wochen: am Mittwoch leitet Kevin Warsh seine erste Fed-Sitzung als Chef — und am Abend desselben Mittwochs verkündet Brasiliens Copom. Beide Entscheidungen ziehen EUR/BRL — die eine über den Dollar, die andere über den Real. Der Spot steht ruhig bei 5,86, aber das ist die Ruhe vor der Schlagzeile, nicht danach.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Warsh, erste Sitzung</strong>: Zins-Hold bei 3,50–3,75 % gilt als so gut wie sicher (CME FedWatch 97,4 %). Das Risiko liegt im Ton der ersten Pressekonferenz, nicht in der Zahl. <span class=\"src-date\">17.06.</span></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom am Mittwochabend</strong>: Konsens erwartet −25 Bp auf 14,25 % Selic. Aber IPCA mit 4,72 % über der 4,5-%-Decke schafft echtes Pausen-Risiko. <span class=\"src-date\">Beschluss 17.06. 18:30 BRT</span></li>\n      <li><span class=\"chip\">EZB</span> <strong>EZB hat erhöht</strong>: +25 Bp auf 2,25 % — erste Anhebung seit 2023, getrieben von Energie-Inflation (3,2 %). Stützt den Euro, drückt EUR/BRL tendenziell nach oben.</li>\n      <li><span class=\"chip good\">ÖL</span> <strong>Brent fällt auf rund 81 $</strong> (TradingEconomics 80,94 $, Stand 16.06.; Intraday-Spanne ~81–83 $ je nach Quelle/Handelszeit) auf USA-Iran-Deal-Hoffnung. Billiges Öl = Inflations-Entlastung für Brasilien = stützt den Real.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8613</strong> (ECB-Referenz 15.06.), Cross-Check sauber: USD/BRL 5,0498 × EUR/USD 1,1607 = 5,8613, Abweichung 0,0 %.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 99,56</strong> (Stand 15.06.) — der Dollar global eher schwach, einer der Gründe, warum der Real sich hält.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus-Umfrage hawkish</strong>: IPCA-Jahresende-Schätzung 13 Wochen in Folge gestiegen auf 5,11 %, USD/BRL-Jahresende auf 5,15 (Stand 08.06.).</li>\n      <li><span class=\"chip\">BR</span> <strong>Bovespa nahe Rekord</strong>: 170.510 Schluss (15.06.), Rekord 171.497 am 12.06. — Aktien stützen die Real-Nachfrage.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This week is the most critical for your exchange rate in weeks: on Wednesday, Kevin Warsh holds his first Fed meeting as chair — and that same Wednesday evening Brazil's Copom decides. Both decisions tug EUR/BRL — one through the dollar, the other through the real. The spot sits calm at 5.86, but this is the quiet before the headlines, not after.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Warsh, first meeting</strong>: Rate hold at 3.50–3.75% all but certain (CME FedWatch 97.4%). The risk lies in the tone of his first press conference, not the number. <span class=\"src-date\">06-17</span></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom Wednesday evening</strong>: Consensus expects −25 bp to 14.25% Selic. But IPCA at 4.72%, above the 4.5% ceiling, creates real pause risk. <span class=\"src-date\">Decision 06-17 18:30 BRT</span></li>\n      <li><span class=\"chip\">ECB</span> <strong>ECB has hiked</strong>: +25 bp to 2.25% — first hike since 2023, driven by energy inflation (3.2%). Supports the euro, nudges EUR/BRL up structurally.</li>\n      <li><span class=\"chip good\">OIL</span> <strong>Brent falls to around $81</strong> (TradingEconomics $80.94, as of 06-16; intraday range ~$81–$83 depending on source/trading time) on US-Iran deal hopes. Cheap oil = inflation relief for Brazil = supports the real.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5.8613</strong> (ECB reference 06-15), cross-check clean: USD/BRL 5.0498 × EUR/USD 1.1607 = 5.8613, deviation 0.0%.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 99.56</strong> (as of 06-15) — the dollar globally rather soft, one reason the real is holding firm.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus survey hawkish</strong>: IPCA year-end estimate up 13 weeks straight to 5.11%, USD/BRL year-end to 5.15 (as of 06-08).</li>\n      <li><span class=\"chip\">BR</span> <strong>Bovespa near record</strong>: 170,510 close (06-15), record 171,497 on 06-12 — equities support real demand.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Esta semana é a mais crítica para sua taxa de câmbio em semanas: na quarta-feira, Kevin Warsh preside sua primeira reunião do Fed como presidente — e nessa mesma noite de quarta-feira o Copom do Brasil decide. Ambas as decisões puxam EUR/BRL — uma pelo dólar, outra pelo real. O spot fica calmo em 5,86, mas essa é a calma antes dos destaques, não depois.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Warsh, primeira reunião</strong>: Manutenção da taxa em 3,50–3,75% praticamente certa (CME FedWatch 97,4%). O risco está no tom de sua primeira coletiva de imprensa, não no número. <span class=\"src-date\">17/06</span></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom noite de quarta-feira</strong>: Consenso espera −25 pb para 14,25% Selic. Mas IPCA em 4,72%, acima do teto de 4,5%, cria risco real de pausa. <span class=\"src-date\">Decisão 17/06 18:30 BRT</span></li>\n      <li><span class=\"chip\">ECB</span> <strong>ECB subiu</strong>: +25 pb para 2,25% — primeiro aumento desde 2023, impulsionado por inflação de energia (3,2%). Sustenta o euro, pressiona EUR/BRL para cima estruturalmente.</li>\n      <li><span class=\"chip good\">ÓL</span> <strong>Brent cai para cerca de $81</strong> (TradingEconomics $80,94, dados de 16/06; amplitude intraday ~$81–$83 conforme fonte/horário de negociação) com esperança de acordo EUA-Irã. Óleo barato = alívio inflacionário para Brasil = sustenta o real.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8613</strong> (referência ECB 15/06), validação cruzada limpa: USD/BRL 5,0498 × EUR/USD 1,1607 = 5,8613, desvio 0,0%.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 99,56</strong> (dados de 15/06) — o dólar globalmente fraco, um dos motivos pelo qual o real se mantém firme.</li>\n      <li><span class=\"chip\">BR</span> <strong>Pesquisa Focus hawkish</strong>: Estimativa de IPCA no final do ano subiu 13 semanas seguidas para 5,11%, USD/BRL final do ano para 5,15 (dados de 08/06).</li>\n      <li><span class=\"chip\">BR</span> <strong>Bovespa perto do recorde</strong>: 170.510 fechamento (15/06), recorde 171.497 em 12/06 — ações sustentam demanda pelo real.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta semana es la más crítica para tu tipo de cambio en semanas: el miércoles, Kevin Warsh preside su primera reunión del Fed como presidente — y esa misma noche de miércoles Copom de Brasil decide. Ambas decisiones tiran del EUR/BRL — una a través del dólar, la otra a través del real. El spot está tranquilo en 5,86, pero esta es la calma antes de los titulares, no después.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Warsh, primera reunión</strong>: Mantención de tasa en 3,50–3,75% prácticamente segura (CME FedWatch 97,4%). El riesgo está en el tono de su primera conferencia de prensa, no en el número. <span class=\"src-date\">17/06</span></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom noche de miércoles</strong>: Consenso espera −25 pb a 14,25% Selic. Pero IPCA en 4,72%, arriba del techo de 4,5%, crea riesgo real de pausa. <span class=\"src-date\">Decisión 17/06 18:30 BRT</span></li>\n      <li><span class=\"chip\">ECB</span> <strong>ECB subió</strong>: +25 pb a 2,25% — primer aumento desde 2023, impulsado por inflación de energía (3,2%). Sostiene el euro, impulsa EUR/BRL hacia arriba estructuralmente.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Brent cae a alrededor de $81</strong> (TradingEconomics $80,94, datos de 16/06; amplitud intraday ~$81–$83 según fuente/horario de negociación) por esperanza de acuerdo EUA-Irán. Petróleo barato = alivio inflacionario para Brasil = sostiene el real.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8613</strong> (referencia ECB 15/06), validación cruzada limpia: USD/BRL 5,0498 × EUR/USD 1,1607 = 5,8613, desviación 0,0%.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 99,56</strong> (datos 15/06) — el dólar globalmente débil, una de las razones por las que el real se mantiene firme.</li>\n      <li><span class=\"chip\">BR</span> <strong>Encuesta Focus alcista</strong>: Estimación de IPCA fin de año subió 13 semanas seguidas a 5,11%, USD/BRL fin de año a 5,15 (datos 08/06).</li>\n      <li><span class=\"chip\">BR</span> <strong>Bovespa cerca del récord</strong>: Cierre de 170.510 (15/06), récord de 171.497 el 12/06 — acciones sostienen demanda de real.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Dienstag, der 16.06. — und heute fallen die zwei Termine zusammen, auf die diese Woche zugelaufen ist. Erstens: <strong>BlackRock startet heute an der Nasdaq seinen ersten Yield-Bitcoin-ETF — Ticker BITA</strong> (iShares Bitcoin Premium Income), der erste seiner Art von einem großen traditionellen Wall-Street-Vermögensverwalter (Grayscales BTCC/BPI existieren seit April 2025 bereits in dieser Nische); er verkauft Call-Optionen auf den IBIT-Bestand und zielt auf <strong>15–25 % Jahres-Rendite bei 0,65 % Gebühr</strong> — und schlägt Goldman damit knapp zur Markt-Premiere.<sup>[10]</sup> Zweitens: <strong>Heute beginnt die FOMC-Sitzung (16.–17.06.), Kevin Warshs erste als Fed-Chef</strong>; die Entscheidung kommt morgen, ein Zins-Halten bei 3,50–3,75 % ist faktisch sicher (CME ~97–98 %), das Risiko ist allein der Ton.<sup>[14]</sup> Vor diesem Filter konsolidiert <strong>BTC bei ~66.000 $</strong> (kurz 67k berührt, von 59.130 $ erholt), <strong>ETH ~1.760 $</strong>.<sup>[8]</sup> Der entscheidende strukturelle Dreh seit gestern: <strong>Die jüngste fünftägige BTC-ETF-Abfluss-Serie ist gebrochen — ~85,8 Mio. $ Netto-Zufluss am 13.06.</strong>, der stärkste Einzeltag seit vier Wochen, angeführt von IBIT; Strategy kaufte 1.587 BTC für 100 Mio. $. Kontext: Die historische 13-Tage-Serie (~4,4 Mrd. $) lief 15.05.–03.06. und endete bereits Anfang Juni — der heutige Dreh ist die kleinere, jüngste Wende.<sup>[9]</sup> Bei den Rohstoffen hält die Iran-Entspannung an: <strong>Brent ~83 $, WTI ~81 $</strong> (von über 108 $ gefallen), <strong>Gold ~4.314 $</strong> (dritter Tag in Folge im Plus).<sup>[6][7]</sup> Big Tech läuft live: <strong>NVDA ~205 $</strong> (Eröffnung 204,86 $, ~13 % unter ATH 235,47 $), <strong>AAPL ~296 $, MSFT ~399 $</strong>.<sup>[1]</sup> Roter Faden: Heute startet ein echter neuer Institutionen-Baustein für Krypto — aber bis morgen Abend filtert Warshs Ton jede Position. Alle Empfehlungen unten sind darauf ausgerichtet.</p>\n    <ul>\n      <li><span class=\"chip hot\">KRYPTO</span> <strong>BlackRock BITA startet heute — erster Yield-Bitcoin-ETF eines großen traditionellen Wall-Street-Vermögensverwalters</strong>: Der iShares Bitcoin Premium Income ETF (Ticker BITA) listet heute an der Nasdaq, Form-8-A am 11.06. eingereicht. Er hält IBIT-Anteile und verkauft Call-Optionen darauf, zielt auf <strong>15–25 % Jahres-Rendite</strong> und will dabei mind. 70 % von Bitcoins Aufwärtsbewegung mitnehmen. Gebühr 0,65 % — deutlich unter den 0,95–0,99 % bestehender Covered-Call-BTC-ETFs. BlackRock schlägt Goldman (ähnliches Produkt ~Anfang Juli) zur Premiere; Grayscales BTCC/BPI bedienen die Nische bereits seit April 2025.</li>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>FOMC startet heute, Entscheidung morgen — Warshs Antritts-Sitzung</strong>: Zwei-Tages-Sitzung 16.–17.06., die erste unter dem am 22.05. vereidigten Kevin Warsh. Zins-Halten bei 3,50–3,75 % gilt als sicher (CME ~97–98 %); das einzige Risiko ist ein hawkischer Ton. Mai-CPI lag bei 4,2 % (Kern 2,9 %), Mai-Payrolls +172k, Arbeitslosenquote 4,3 % — eine hartnäckige Inflation, die einen Bias-Shift von Lockerung Richtung neutral/Straffung rechtfertigen könnte. Dot-Plot und Pressekonferenz-Stil unter Warsh sind selbst noch unbekannt.</li>\n      <li><span class=\"chip good\">KRYPTO-CORE</span> <strong>BTC ~66.000 $ — die jüngste Abfluss-Serie ist gebrochen</strong>: BTC konsolidiert um 66k (kurz 67k berührt), erholt von 59.130 $; ETH ~1.760 $. Der wichtigste Dreh: Eine <strong>~85,8 Mio. $ Netto-Zufluss am 13.06.</strong> beendet eine fünftägige Abfluss-Serie und ist der stärkste Tag seit vier Wochen, angeführt von IBIT. Strategy kaufte 1.587 BTC für 100 Mio. $ (Schnitt 63.024 $, 08.–14.06.). Historischer Kontext zur Juni-Korrektur: Die ältere 13-Tage-Serie (~4,4 Mrd. $ Abfluss, 15.05.–03.06.) endete bereits Anfang Juni; vier-Wochen-Summe ~5,4 Mrd. $. Support 64k/63,3k, Widerstand 67k.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~83 $, WTI ~81 $ — Iran-Entspannung hält</strong>: Der US-Iran-Friedensvertrag (Unterzeichnung am 19.06. in der Schweiz geplant) hat die Angst-Prämie verdampft; Brent fiel von über 108 $ auf ~83 $, die Straße von Hormus soll offen bleiben. Billiges Öl drückt die Energie-Komponente der Inflation — markt-positiv über den Umweg, ein zusätzlicher disinflationärer Datenpunkt vor der Fed.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>~4.314 $ — dritter Tag in Folge im Plus, gegen die Risk-on-Logik</strong>: Obwohl die Geopolitik-Entspannung Krisen-Prämie aus dem Markt nimmt, klettert Gold weiter (Vortags-Schluss 4.309 $) — getrieben von Notenbank-Unsicherheit vor Warshs Auftritt und Dollar-Schwäche. Der Markt liest es als reines Realzins-/Notenbank-Spiel, unabhängig von der Tages-Geopolitik.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~205 $ live, ~13 % unter ATH — GOOGL bleibt der bessere Plattform-Kauf</strong>: NVDA Eröffnung 204,86 $ (Spanne 203–207 $), ~13 % unter dem ATH 235,47 $ (14.05.), Konsens-Ziel 303,71 $ (~+48 %). AAPL ~296 $, MSFT ~399 $ (15.06.). S&amp;P 7.554 (+1,65 %), Nasdaq 26.684 (+3,07 %) am 15.06. — der breite Markt trägt die Erleichterung, aber Vorsicht vor der Fed.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>AI-Token vorn: TAO ~275 $, RENDER ~7 $, FET +15 %</strong>: Die dezentrale-KI-Ecke zieht an — ein US-Export-Stopp für Anthropic-Modell-Zugang löste eine breite Rotation in dezentrale-KI-Token aus. Reines Risk-on-Beta auf der frühen Erholung, kein fundamentaler Boden. DOGE/IMX/GALA/BONK heute ohne sauberen Cross-Check-Preis — weggelassen statt geraten.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Tuesday, June 16th — and today two events converge that the week has been building toward. First: <strong>BlackRock launches its first Yield-Bitcoin ETF on Nasdaq today — ticker BITA</strong> (iShares Bitcoin Premium Income), the first from a major traditional Wall Street asset manager (Grayscale's BTCC/BPI have existed in this niche since April 2025); it sells call options on IBIT holdings and targets <strong>15–25% annual returns at 0.65% fee</strong> — beating Goldman to market debut.<sup>[10]</sup> Second: <strong>The FOMC meeting begins today (June 16–17), Kevin Warsh's first as Fed Chair</strong>; the decision comes tomorrow, a rate hold at 3.50–3.75% is virtually certain (CME ~97–98%), the only risk is tone.<sup>[14]</sup> Against this backdrop, <strong>BTC consolidates near 66,000</strong> (briefly touched 67k, recovered from 59,130), <strong>ETH ~1,760</strong>.<sup>[8]</sup> The crucial structural shift since yesterday: <strong>the most recent five-day BTC ETF outflow streak is broken — ~85.8M net inflow on June 13</strong>, the strongest single day in four weeks, led by IBIT; Strategy bought 1,587 BTC for 100M. Context: the historical 13-day streak (~4.4B) ran May 15–June 3 and ended already in early June — today's pivot is the smaller, recent reversal.<sup>[9]</sup> In commodities, Iran relief holds: <strong>Brent ~83, WTI ~81</strong> (down from above 108), <strong>gold ~4,314</strong> (third straight day up).<sup>[6][7]</sup> Big Tech is live: <strong>NVDA ~205</strong> (open 204.86, ~13% below ATH 235.47), <strong>AAPL ~296, MSFT ~399</strong>.<sup>[1]</sup> Bottom line: today marks a real new institutional building block for crypto — but Warsh's tone tomorrow filters every position through end of day. All recommendations below are aligned with that filter.</p>\n    <ul>\n      <li><span class=\"chip hot\">CRYPTO</span> <strong>BlackRock BITA launches today — first Yield-Bitcoin ETF from a major traditional Wall Street asset manager</strong>: The iShares Bitcoin Premium Income ETF (ticker BITA) lists on Nasdaq today, Form 8-A filed June 11. It holds IBIT shares and sells call options on them, targets <strong>15–25% annual returns</strong> while capturing at least 70% of Bitcoin's upside. Fee 0.65% — well below the 0.95–0.99% of existing covered-call BTC ETFs. BlackRock beats Goldman (similar product expected ~early July) to market; Grayscale's BTCC/BPI have served this niche since April 2025.</li>\n      <li><span class=\"chip hot\">MACRO</span> <strong>FOMC starts today, decision tomorrow — Warsh's inaugural meeting</strong>: Two-day meeting June 16–17, the first under Kevin Warsh, sworn in May 22. Rate hold at 3.50–3.75% is considered certain (CME ~97–98%); the only risk is a hawkish tone. May CPI at 4.2% (core 2.9%), May payrolls +172k, unemployment 4.3% — stubborn inflation that could justify a bias shift from ease toward neutral/tightening. Dot-plot and press-conference style under Warsh are still unknown.</li>\n      <li><span class=\"chip good\">CRYPTO-CORE</span> <strong>BTC ~66,000 — the most recent outflow streak is broken</strong>: BTC consolidates around 66k (briefly touched 67k), recovered from 59,130; ETH ~1,760. The critical pivot: a <strong>~85.8M net inflow on June 13</strong> ends a five-day outflow streak and is the strongest day in four weeks, led by IBIT. Strategy bought 1,587 BTC for 100M (avg 63,024, June 8–14). Historical context on the June correction: the older 13-day streak (~4.4B outflows, May 15–June 3) ended already in early June; four-week total ~5.4B. Support 64k/63.3k, resistance 67k.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~83, WTI ~81 — Iran relief holds</strong>: The US-Iran peace treaty (signing June 19 in Switzerland) vaporized the fear premium; Brent fell from over 108 to ~83, Strait of Hormuz stays open. Cheap oil presses inflation's energy component — market-positive as an extra disinflationary data point ahead of the Fed.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>~4,314 — third straight day up, defying risk-on logic</strong>: Although geopolitical relief is draining the crisis premium, gold keeps climbing (prior close 4,309) — driven by central-bank uncertainty before Warsh's debut and dollar weakness. The market reads it as a pure real-rate/central-bank play, independent of daily geopolitics.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~205 live, ~13% below ATH — GOOGL remains the better platform buy</strong>: NVDA open 204.86 (range 203–207), ~13% below ATH 235.47 (May 14), consensus target 303.71 (~+48%). AAPL ~296, MSFT ~399 (June 15). S&amp;P 7,554 (+1.65%), Nasdaq 26,684 (+3.07%) on June 15 — the broad market carries the relief, but caution before the Fed.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>AI tokens leading: TAO ~275, RENDER ~7, FET +15%</strong>: The decentralized-AI corner is surging — a US export ban restricting Anthropic model access triggered a broad rotation into decentralized-AI tokens. Pure risk-on beta on early recovery, no fundamental floor. DOGE/IMX/GALA/BONK lack clean cross-check prices today — omitted rather than guessed.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É terça-feira, 16 de junho — e hoje se convergem os dois eventos para os quais esta semana corria. Primeiro: <strong>BlackRock lança hoje na Nasdaq seu primeiro ETF de Bitcoin com rendimento — ticker BITA</strong> (iShares Bitcoin Premium Income), o primeiro desta classe de um grande gestor de ativos tradicional de Wall Street (Grayscale BTCC/BPI já existem neste nicho desde abril de 2025); vende opções de compra sobre a carteira de IBIT e apunta para <strong>15–25% de retorno anual com taxa de 0,65%</strong> — e supera Goldman na estreia de mercado.<sup>[10]</sup> Segundo: <strong>hoje começa a reunião do FOMC (16–17 de junho), a primeira de Kevin Warsh como chefe do Fed</strong>; a decisão sai amanhã, um hold de taxa em 3,50–3,75% é praticamente certo (CME ~97–98%), o risco é apenas o tom.<sup>[14]</sup> Sob este filtro, <strong>BTC consolida em ~66.000 $</strong> (tocou 67k por pouco, recuperado de 59.130 $), <strong>ETH ~1.760 $</strong>.<sup>[8]</sup> O ponto estrutural decisivo desde ontem: <strong>A série recente de cinco dias de saída de ETF de BTC foi quebrada — ~85,8 milhões $ de entrada líquida em 13 de junho</strong>, o dia mais forte em quatro semanas, liderado pela IBIT; Strategy comprou 1.587 BTC por 100 milhões $. Contexto: A série histórica de 13 dias (~4,4 bilhões $) correu de 15 de maio a 3 de junho e terminou no início de junho — o giro de hoje é a mudança menor e mais recente.<sup>[9]</sup> Nas commodities, o alívio Irã continua: <strong>Brent ~83 $, WTI ~81 $</strong> (caiu de mais de 108 $), <strong>Ouro ~4.314 $</strong> (terceiro dia seguido em alta).<sup>[6][7]</sup> Big Tech está ao vivo: <strong>NVDA ~205 $</strong> (abertura 204,86 $, ~13% abaixo da máxima 235,47 $), <strong>AAPL ~296 $, MSFT ~399 $</strong>.<sup>[1]</sup> Fio condutor: hoje começa um verdadeiro novo bloco institucional para cripto — mas até amanhã à noite o tom de Warsh filtra cada posição. Todas as recomendações abaixo estão alinhadas com isso.</p>\n    <ul>\n      <li><span class=\"chip hot\">CRIPTO</span> <strong>BlackRock BITA lança hoje — primeiro ETF de Bitcoin com rendimento de um grande gestor de ativos tradicional de Wall Street</strong>: O ETF iShares Bitcoin Premium Income (ticker BITA) listado hoje na Nasdaq, formulário 8-A apresentado em 11 de junho. Detém ações do IBIT e vende opções de compra sobre elas, apunta para <strong>15–25% de retorno anual</strong> e visa capturar pelo menos 70% dos movimentos de alta do Bitcoin. Taxa de 0,65% — bem abaixo dos 0,95–0,99% dos ETFs de Bitcoin com cobertura de chamada existentes. BlackRock supera Goldman (produto similar ~início de julho) na estreia; Grayscale BTCC/BPI servem o nicho desde abril de 2025.</li>\n      <li><span class=\"chip hot\">MACRO</span> <strong>FOMC começa hoje, decisão amanhã — primeira reunião de Warsh</strong>: Reunião de dois dias 16–17 de junho, a primeira sob Kevin Warsh, empossado em 22 de maio. Um hold de taxa em 3,50–3,75% é considerado certo (CME ~97–98%); o único risco é um tom mais falcão. CPI de maio em 4,2% (núcleo 2,9%), folha de pagamento de maio +172k, taxa de desemprego 4,3% — uma inflação teimosa que justificaria uma mudança de viés de flexibilização em direção a neutro/aperto. Dot-Plot e estilo de coletiva de Warsh ainda são desconhecidos.</li>\n      <li><span class=\"chip good\">CRIPTO-CORE</span> <strong>BTC ~66.000 $ — a série recente de saídas foi quebrada</strong>: BTC consolida em 66k (tocou 67k por pouco), recuperado de 59.130 $; ETH ~1.760 $. O ponto mais importante: Uma <strong>entrada líquida de ~85,8 milhões $ em 13 de junho</strong> encerra uma série de cinco dias de saídas e é o dia mais forte em quatro semanas, liderado pela IBIT. Strategy comprou 1.587 BTC por 100 milhões $ (média de 63.024 $, 8–14 de junho). Contexto histórico da correção de junho: A série mais antiga de 13 dias (~4,4 bilhões $ de saída, 15 de maio–3 de junho) terminou no início de junho; soma de quatro semanas ~5,4 bilhões $. Suporte 64k/63,3k, resistência 67k.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~83 $, WTI ~81 $ — alívio Irã mantém</strong>: O tratado de paz EUA-Irã (assinatura planejada para 19 de junho na Suíça) evaporou o prêmio de medo; Brent caiu de mais de 108 $ para ~83 $, o Estreito de Ormuz deve permanecer aberto. Petróleo barato pressiona o componente de energia da inflação — mercado positivo pelo desvio, um ponto de dados desinflacionário adicional antes do Fed.</li>\n      <li><span class=\"chip good\">OURO</span> <strong>~4.314 $ — terceiro dia seguido em alta, contra a lógica risk-on</strong>: Embora o alívio geopolítico retire o prêmio de crise do mercado, o ouro continua subindo (fechamento anterior 4.309 $) — impulsionado pela incerteza do banco central antes da estreia de Warsh e fraqueza do dólar. O mercado a lê como um jogo puro de taxa real/banco central, independente da geopolítica do dia.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~205 $ ao vivo, ~13% abaixo da máxima — GOOGL permanece a melhor compra de plataforma</strong>: Abertura NVDA 204,86 $ (faixa 203–207 $), ~13% abaixo da máxima 235,47 $ (14 de maio), alvo de consenso 303,71 $ (~+48%). AAPL ~296 $, MSFT ~399 $ (15 de junho). S&amp;P 7.554 (+1,65%), Nasdaq 26.684 (+3,07%) em 15 de junho — o mercado amplo carrega o alívio, mas cuidado com o Fed.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>AI tokens à frente: TAO ~275 $, RENDER ~7 $, FET +15%</strong>: O setor de IA descentralizada está puxando — uma proibição de exportação dos EUA para acesso ao modelo Anthropic desencadeou uma ampla rotação em tokens de IA descentralizada. Puro beta de risk-on na recuperação inicial, nenhum fundo fundamental. DOGE/IMX/GALA/BONK hoje sem preço de cross-check limpo — omitido em vez de adivinhar.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es martes, 16 de junio — y hoy convergen los dos eventos hacia los que corría esta semana. Primero: <strong>BlackRock lanza hoy en el Nasdaq su primer ETF de Bitcoin con rendimiento — ticker BITA</strong> (iShares Bitcoin Premium Income), el primero de esta clase de un gran gestor patrimonial tradicional de Wall Street (Grayscale BTCC/BPI ya existen en este nicho desde abril de 2025); vende opciones de compra sobre la cartera de IBIT y apunta a <strong>15–25% de rendimiento anual con comisión de 0,65%</strong> — y supera a Goldman en el debut de mercado.<sup>[10]</sup> Segundo: <strong>hoy comienza la junta del FOMC (16–17 de junio), la primera de Kevin Warsh como jefe del Fed</strong>; la decisión llega mañana, una pausa de tasa en 3,50–3,75% es prácticamente segura (CME ~97–98%), el riesgo es solo el tono.<sup>[14]</sup> Bajo este filtro, <strong>BTC se consolida en ~66.000 $</strong> (tocó 67k brevemente, recuperado de 59.130 $), <strong>ETH ~1.760 $</strong>.<sup>[8]</sup> El giro estructural decisivo desde ayer: <strong>La serie reciente de cinco días de salidas de ETF de BTC fue rota — ~85,8 millones $ de entrada neta el 13 de junio</strong>, el día más fuerte en cuatro semanas, encabezado por IBIT; Strategy compró 1.587 BTC por 100 millones $. Contexto: La serie histórica de 13 días (~4,4 mil millones $) corrió del 15 de mayo al 3 de junio y ya terminó a principios de junio — el giro de hoy es el cambio más pequeño y reciente.<sup>[9]</sup> En materias primas, el alivio de Irán continúa: <strong>Brent ~83 $, WTI ~81 $</strong> (cayó de más de 108 $), <strong>Oro ~4.314 $</strong> (tercer día seguido al alza).<sup>[6][7]</sup> Big Tech está en vivo: <strong>NVDA ~205 $</strong> (apertura 204,86 $, ~13% por debajo del máximo 235,47 $), <strong>AAPL ~296 $, MSFT ~399 $</strong>.<sup>[1]</sup> Hilo conductor: hoy comienza un verdadero nuevo bloque institucional para cripto — pero hasta mañana por la noche el tono de Warsh filtra cada posición. Todas las recomendaciones a continuación están alineadas con esto.</p>\n    <ul>\n      <li><span class=\"chip hot\">CRIPTO</span> <strong>BlackRock BITA lanza hoy — primer ETF de Bitcoin con rendimiento de un gran gestor patrimonial tradicional de Wall Street</strong>: El ETF iShares Bitcoin Premium Income (ticker BITA) listado hoy en el Nasdaq, formulario 8-A presentado el 11 de junio. Posee acciones de IBIT y vende opciones de compra sobre ellas, apunta a <strong>15–25% de rendimiento anual</strong> y busca capturar al menos 70% de los movimientos alcistas de Bitcoin. Comisión de 0,65% — muy por debajo del 0,95–0,99% de los ETFs de Bitcoin con cobertura de llamada existentes. BlackRock supera a Goldman (producto similar ~principios de julio) en el debut; Grayscale BTCC/BPI sirven el nicho desde abril de 2025.</li>\n      <li><span class=\"chip hot\">MACRO</span> <strong>FOMC comienza hoy, decisión mañana — primera junta de Warsh</strong>: Junta de dos días 16–17 de junio, la primera bajo Kevin Warsh, quien fue juramentado el 22 de mayo. Una pausa de tasa en 3,50–3,75% se considera segura (CME ~97–98%); el único riesgo es un tono más halcón. CPI de mayo en 4,2% (núcleo 2,9%), nóminas de mayo +172k, tasa de desempleo 4,3% — una inflación obstinada que justificaría un cambio de sesgo de aflojaniento hacia neutral/endurecimiento. Dot-Plot y estilo de conferencia de Warsh aún son desconocidos.</li>\n      <li><span class=\"chip good\">CRIPTO-CORE</span> <strong>BTC ~66.000 $ — la serie reciente de salidas fue rota</strong>: BTC se consolida en 66k (tocó 67k brevemente), recuperado de 59.130 $; ETH ~1.760 $. El punto más importante: Una <strong>entrada neta de ~85,8 millones $ el 13 de junio</strong> termina una serie de cinco días de salidas y es el día más fuerte en cuatro semanas, encabezado por IBIT. Strategy compró 1.587 BTC por 100 millones $ (promedio 63.024 $, 8–14 de junio). Contexto histórico de la corrección de junio: Una serie más antigua de 13 días (~4,4 mil millones $ de salida, 15 de mayo–3 de junio) terminó a principios de junio; suma de cuatro semanas ~5,4 mil millones $. Soporte 64k/63,3k, resistencia 67k.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~83 $, WTI ~81 $ — alivio de Irán se mantiene</strong>: El tratado de paz EUA-Irán (firma planeada para el 19 de junio en Suiza) evaporó la prima de miedo; Brent cayó de más de 108 $ a ~83 $, el Estrecho de Ormuz debe permanecer abierto. El petróleo barato presiona el componente energético de la inflación — mercado positivo por el desvío, un punto de datos desinflacionario adicional antes del Fed.</li>\n      <li><span class=\"chip good\">ORO</span> <strong>~4.314 $ — tercer día seguido al alza, contra la lógica de riesgo</strong>: Aunque el alivio geopolítico saca la prima de crisis del mercado, el oro sigue subiendo (cierre anterior 4.309 $) — impulsado por la incertidumbre del banco central antes del debut de Warsh y debilidad del dólar. El mercado lo lee como un juego puro de tasa real/banco central, independiente de la geopolítica del día.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~205 $ en vivo, ~13% por debajo del máximo — GOOGL sigue siendo la mejor compra de plataforma</strong>: Apertura de NVDA 204,86 $ (rango 203–207 $), ~13% por debajo del máximo 235,47 $ (14 de mayo), objetivo de consenso 303,71 $ (~+48%). AAPL ~296 $, MSFT ~399 $ (15 de junio). S&amp;P 7.554 (+1,65%), Nasdaq 26.684 (+3,07%) el 15 de junio — el mercado amplio carga el alivio, pero cuidado con el Fed.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Tokens de IA al frente: TAO ~275 $, RENDER ~7 $, FET +15%</strong>: El sector de IA descentralizada está jalando — una prohibición de exportación de EUA para acceso al modelo Anthropic desencadenó una amplia rotación hacia tokens de IA descentralizada. Beta puro de riesgo en la recuperación inicial, sin base fundamental. DOGE/IMX/GALA/BONK hoy sin precio de verificación limpio — omitido en lugar de adivinar.</li>\n    </ul></div>"
