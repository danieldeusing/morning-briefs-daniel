      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die schlimmste Lieferketten-Woche des Jahres hat ein neues Muster: Der Miasma-Wurm springt nicht mehr nur über package.json, sondern über die Config-Dateien deiner KI-Coding-Tools — und persistiert in der Agenten-Schicht. Daneben ein Patch Tuesday mit Rekord-Volumen, eine aktiv ausgenutzte 10.0er-Lücke in Ivanti Sentry und, als Kontrast, ein wirklich gutes Release: PostgreSQL 19 Beta 1.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Miasma + IronWorm</strong>: zwei npm-Würmer gleichzeitig, ~10 Mio. Downloads betroffen, Wave 3 über <code>.claude/</code>- und <code>AGENTS.md</code>-Injektion in 73 Microsoft-Repos.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Oracle PeopleSoft CVE-2026-35273</strong>: CVSS 9.8, no-auth RCE, aktiv ausgenutzt von ShinyHunters/UNC6240 — 100+ Organisationen, CISA-KEV-Frist war der 15.06.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Patch Tuesday Juni</strong>: 206 CVEs (Jahres-Rekord), 37 kritisch, dazu ein wurmfähiger Windows-Kernel-RCE (9.8).</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Ivanti Sentry CVE-2026-10520</strong>: CVSS 10.0, Root-RCE, PoC public + aktive Exploitation — KEV-Frist 14.06.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 19 Beta 1</strong>: Graph-Queries (SQL/PGQ), paralleles Autovacuum, REPACK CONCURRENTLY, ~2× schnellere FK-Inserts.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring Framework 7.0.8</strong> ist die aktuelle Linie; <strong>6.2</strong> fällt am 30.06. aus dem OSS-Support.</li>\n      <li><span class=\"chip\">Release · Web</span> <strong>Angular 22</strong>: Signal Forms stabil, selectorless Components, OnPush als Default für neue Components.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: 8–9 % JIT-Speedup, Lazy Imports per Default, stabile ABI für Free-Threading.</li>\n      <li><span class=\"chip\">Regulierung · EU</span> <strong>EU CRA</strong>: seit 11.06. greifen die Notifizierungs-Regeln für Konformitäts-Bewertungsstellen; nächste harte Stufe 11.09.</li>\n      <li><span class=\"chip\">Sec · DE</span> <strong>BSI-Warnung</strong>: Check Point Remote-Access-VPN aktiv ausgenutzt, Warnstufe 2 (Hoch).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die schlimmste Lieferketten-Woche des Jahres hat ein neues Muster: Der Miasma-Wurm springt nicht mehr nur über package.json, sondern über die Config-Dateien deiner KI-Coding-Tools — und persistiert in der Agenten-Schicht. Daneben ein Patch Tuesday mit Rekord-Volumen, eine aktiv ausgenutzte 10.0er-Lücke in Ivanti Sentry und, als Kontrast, ein wirklich gutes Release: PostgreSQL 19 Beta 1.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Miasma + IronWorm</strong>: zwei npm-Würmer gleichzeitig, ~10 Mio. Downloads betroffen, Wave 3 über <code>.claude/</code>- und <code>AGENTS.md</code>-Injektion in 73 Microsoft-Repos.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Oracle PeopleSoft CVE-2026-35273</strong>: CVSS 9.8, no-auth RCE, aktiv ausgenutzt von ShinyHunters/UNC6240 — 100+ Organisationen, CISA-KEV-Frist war der 15.06.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Patch Tuesday Juni</strong>: 206 CVEs (Jahres-Rekord), 37 kritisch, dazu ein wurmfähiger Windows-Kernel-RCE (9.8).</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Ivanti Sentry CVE-2026-10520</strong>: CVSS 10.0, Root-RCE, PoC public + aktive Exploitation — KEV-Frist 14.06.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 19 Beta 1</strong>: Graph-Queries (SQL/PGQ), paralleles Autovacuum, REPACK CONCURRENTLY, ~2× schnellere FK-Inserts.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring Framework 7.0.8</strong> ist die aktuelle Linie; <strong>6.2</strong> fällt am 30.06. aus dem OSS-Support.</li>\n      <li><span class=\"chip\">Release · Web</span> <strong>Angular 22</strong>: Signal Forms stabil, selectorless Components, OnPush als Default für neue Components.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: 8–9 % JIT-Speedup, Lazy Imports per Default, stabile ABI für Free-Threading.</li>\n      <li><span class=\"chip\">Regulierung · EU</span> <strong>EU CRA</strong>: seit 11.06. greifen die Notifizierungs-Regeln für Konformitäts-Bewertungsstellen; nächste harte Stufe 11.09.</li>\n      <li><span class=\"chip\">Sec · DE</span> <strong>BSI-Warnung</strong>: Check Point Remote-Access-VPN aktiv ausgenutzt, Warnstufe 2 (Hoch).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The worst supply-chain week of the year reveals a new pattern: the Miasma worm no longer just hops across package.json, but through the config files of your AI coding tools — and persists in the agent layer. Plus a Patch Tuesday with record volume, an actively exploited 10.0 flaw in Ivanti Sentry, and, by contrast, a genuinely good release: PostgreSQL 19 Beta 1.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Miasma + IronWorm</strong>: two npm worms in parallel, ~10 million downloads affected, Wave 3 via <code>.claude/</code> and <code>AGENTS.md</code> injection across 73 Microsoft repos.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Oracle PeopleSoft CVE-2026-35273</strong>: CVSS 9.8, no-auth RCE, actively exploited by ShinyHunters/UNC6240 — 100+ organizations, CISA KEV deadline was 06-15.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Patch Tuesday June</strong>: 206 CVEs (per CrowdStrike; 198–208 depending on count), 37 critical, yearly record including a wormable Windows kernel RCE (9.8).</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Ivanti Sentry CVE-2026-10520</strong>: CVSS 10.0, root RCE, public PoC + active exploitation — KEV deadline 06-14.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 19 Beta 1</strong>: Graph queries (SQL/PGQ), parallel autovacuum, REPACK CONCURRENTLY, ~2× faster FK inserts.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring Framework 7.0.8</strong> is the current line; <strong>6.2</strong> falls out of OSS support on 06-30.</li>\n      <li><span class=\"chip\">Release · Web</span> <strong>Angular 22</strong>: Signal Forms stable, selectorless components, OnPush as default for new components.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: 8–9% JIT speedup, lazy imports by default, stable ABI for free-threading.</li>\n      <li><span class=\"chip\">Regulation · EU</span> <strong>EU CRA</strong>: notification rules for conformity assessment bodies in effect since 06-11; next hard deadline 09-11.</li>\n      <li><span class=\"chip\">Sec · DE</span> <strong>BSI warning</strong>: Check Point remote-access VPN actively exploited, alert level 2 (high).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A pior semana de cadeia de suprimentos do ano revela um novo padrão: o worm Miasma não salta mais apenas pelos package.json, mas pelos arquivos de configuração das suas ferramentas de IA para programação — e persiste na camada de agentes. Além disso, um Patch Tuesday com volume recorde, uma vulnerabilidade 10,0 ativa em Ivanti Sentry e, em contraste, um lançamento realmente bom: PostgreSQL 19 Beta 1.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Miasma + IronWorm</strong>: dois worms npm em paralelo, ~10 milhões de downloads afetados, Wave 3 via injeção em <code>.claude/</code> e <code>AGENTS.md</code> em 73 repositórios da Microsoft.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Oracle PeopleSoft CVE-2026-35273</strong>: CVSS 9,8, RCE sem autenticação, explorado ativamente por ShinyHunters/UNC6240 — 100+ organizações, prazo CISA KEV era 15-06.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Patch Tuesday junho</strong>: 206 CVEs (segundo CrowdStrike; 198–208 dependendo da contagem), 37 críticas, recorde anual incluindo worm-RCE de kernel Windows (9,8).</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Ivanti Sentry CVE-2026-10520</strong>: CVSS 10,0, RCE raiz, PoC público + exploração ativa — prazo KEV 14-06.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 19 Beta 1</strong>: Graph queries (SQL/PGQ), autovacuum paralelo, REPACK CONCURRENTLY, ~2× inserts de FK mais rápidos.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring Framework 7.0.8</strong> é a linha atual; <strong>6.2</strong> sai do suporte OSS em 30-06.</li>\n      <li><span class=\"chip\">Release · Web</span> <strong>Angular 22</strong>: Signal Forms estável, componentes sem seletor, OnPush padrão para novos componentes.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: aceleração JIT de 8–9%, importações lazy por padrão, ABI estável para free-threading.</li>\n      <li><span class=\"chip\">Regulação · EU</span> <strong>EU CRA</strong>: regras de notificação para organismos de avaliação de conformidade em vigor desde 11-06; próximo prazo crítico 11-09.</li>\n      <li><span class=\"chip\">Seg · DE</span> <strong>Aviso BSI</strong>: VPN de acesso remoto Check Point explorada ativamente, nível de alerta 2 (alto).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La peor semana de cadena de suministro del año revela un nuevo patrón: el gusano Miasma ya no solo salta entre package.json, sino por los archivos de configuración de tus herramientas de IA para programación — y persiste en la capa de agentes. Además, un Patch Tuesday con volumen récord, una vulnerabilidad 10.0 activamente explotada en Ivanti Sentry y, en contraste, un lanzamiento realmente bueno: PostgreSQL 19 Beta 1.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Miasma + IronWorm</strong>: dos gusanos npm en paralelo, ~10 millones de descargas afectadas, Onda 3 vía inyección en <code>.claude/</code> y <code>AGENTS.md</code> en 73 repositorios de Microsoft.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Oracle PeopleSoft CVE-2026-35273</strong>: CVSS 9.8, RCE sin autenticación, explotado activamente por ShinyHunters/UNC6240 — 100+ organizaciones, plazo CISA KEV era 15-06.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Patch Tuesday junio</strong>: 206 CVEs (según CrowdStrike; 198–208 dependiendo de la contabilidad), 37 críticas, récord anual incluyendo RCE de kernel Windows capaz de gusano (9.8).</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Ivanti Sentry CVE-2026-10520</strong>: CVSS 10.0, RCE raíz, PoC público + explotación activa — plazo KEV 14-06.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 19 Beta 1</strong>: Graph queries (SQL/PGQ), autovacuum paralelo, REPACK CONCURRENTLY, ~2× inserts de FK más rápidos.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring Framework 7.0.8</strong> es la línea actual; <strong>6.2</strong> sale del soporte OSS en 30-06.</li>\n      <li><span class=\"chip\">Release · Web</span> <strong>Angular 22</strong>: Signal Forms estable, componentes sin selector, OnPush por defecto para componentes nuevos.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: aceleración JIT de 8–9%, importaciones lazy por defecto, ABI estable para free-threading.</li>\n      <li><span class=\"chip\">Regulación · EU</span> <strong>EU CRA</strong>: reglas de notificación para organismos de evaluación de conformidad en vigor desde 11-06; próximo plazo crítico 11-09.</li>\n      <li><span class=\"chip\">Seg · DE</span> <strong>Aviso BSI</strong>: VPN de acceso remoto Check Point explotado activamente, nivel de alerta 2 (alto).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der spannendste Move der Woche ist nicht das nächste 95-Prozent-Frontier-Modell, sondern eine sparse Mixture-of-Experts-Architektur mit kleinem aktivem Fußabdruck: Microsofts MAI-Code-1-Flash (137 Mrd. Parameter gesamt, nur 5 Mrd. aktiv pro Token) schlägt im eigenen Benchmark-Sheet das deutlich größere Claude Haiku 4.5 — und markiert, dass jetzt auch Microsoft und Google ihre eigenen Coding-Modelle gegen Anthropic und OpenAI stellen. Auf dem unabhängigen SWE-Bench-Verified-Board bleibt Anthropic derweil unangefochten. Dazwischen: eine ernste MCP-Lücke und die Copilot-Abrechnung, die viele Entwickler ärgert.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsofts erstes hauseigenes Coding-Modell — sparse MoE mit 5 Mrd. aktiven Parametern pro Token (137 Mrd. gesamt), laut Anbieter 71,6 % auf SWE-Bench Verified vs. 66,6 % bei Haiku 4.5 — Anbieter-Zahl, nicht unabhängig gemessen.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (Stand 16.06.)</strong>: Claude Fable 5 führt mit 95,0 %, Anthropic hält Platz 1–6; Gemini 3.1 Pro und DeepSeek-V4-Pro-Max teilen sich Platz 7 mit 80,6 %.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>CVE-2026-42559</strong>: DNS-Rebinding gegen lokale MCP-Server (rmcp &lt; 1.4.0, CVSS 8,8) — auf rmcp 1.4.0 updaten oder stdio statt HTTP nutzen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong> stellte zum 1.6. auf nutzungsbasierte AI-Credits um (1 Credit = 0,01 $) — Basispreise gleich, aber spürbarer Frust über schnell verbrauchte Credits.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Bugbot</strong> (10.06.): Reviews jetzt ~90 s statt ~5 min, 10 % mehr gefundene Bugs, ~22 % günstiger pro Lauf.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Daybreak</strong> (seit 11.05., Kontext): Codex-Security-Harness hat ökosystemweit &gt; 3.000 kritische/hohe CVEs gefixt; Trusted-Access verlangt seit 1.6. Hardware-Key.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.30.8</strong> (12.06.) erweitert GGUF-Hardware-Support und die Apple-Silicon-MLX-Engine; OpenHands v1.8.0 (10.06.) bringt Sub-Agent-Delegation.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> hängt weiter im Vertex-Preview ohne Modellkarte und ohne veröffentlichte Benchmarks — keine vergleichbaren Zahlen.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">This week's most compelling move isn't the next 95-percent frontier model, but a sparse mixture-of-experts architecture with a small active footprint: Microsoft's MAI-Code-1-Flash (137 billion parameters total, only 5 billion active per token) beats the significantly larger Claude Haiku 4.5 on its own benchmark sheet — signaling that Microsoft and Google are now fielding their own coding models against Anthropic and OpenAI. On the independent SWE-Bench Verified leaderboard, Anthropic remains uncontested. In between: a serious MCP gap and Copilot billing that frustrates many developers.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsoft's first fully in-house coding model — sparse MoE with 5 billion active parameters per token (137 billion total), achieving 71.6% on SWE-Bench Verified vs. 66.6% on Haiku 4.5 according to the vendor — not independently measured.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (as of 06-16)</strong>: Claude Fable 5 leads at 95.0%, Anthropic holds positions 1–6; Gemini 3.1 Pro and DeepSeek-V4-Pro-Max tie for 7th with 80.6%.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>CVE-2026-42559</strong>: DNS rebinding against local MCP servers (rmcp &lt; 1.4.0, CVSS 8.8) — update to rmcp 1.4.0 or use stdio instead of HTTP.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong> switched to usage-based AI credits on 1.6 (1 credit = $0.01 USD) — base plan prices unchanged, but noticeable frustration over rapidly consumed credits.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Bugbot</strong> (06-10): Reviews now ~90 s instead of ~5 min, 10% more bugs found, ~22% cheaper per run.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Daybreak</strong> (since 05-11, context): Codex Security Harness has fixed &gt; 3,000 critical/high CVEs ecosystem-wide; Trusted Access requires hardware key since 1.6.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.30.8</strong> (06-12) expands GGUF hardware support and the Apple Silicon MLX engine; OpenHands v1.8.0 (06-10) brings sub-agent delegation.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> remains stuck in Vertex Preview without a model card and without published benchmarks — no comparable figures.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O movimento mais interessante da semana não é o próximo modelo frontier com 95%, mas uma arquitetura sparse mixture-of-experts com pequeno fator de ativação: o MAI-Code-1-Flash da Microsoft (137 bilhões de parâmetros totais, apenas 5 bilhões ativos por token) supera o significativamente maior Claude Haiku 4.5 em sua própria tabela de benchmarks — e marca que agora Microsoft e Google também colocam seus próprios modelos de coding contra Anthropic e OpenAI. No leaderboard independente SWE-Bench Verified, Anthropic permanece incontestada. No meio do caminho: uma lacuna séria no MCP e a cobrança do Copilot que irrita muitos desenvolvedores.</p>\n    <ul>\n      <li><span class=\"chip hot\">Ferramenta</span> <strong>MAI-Code-1-Flash</strong>: primeiro modelo de coding totalmente próprio da Microsoft — sparse MoE com 5 bilhões de parâmetros ativos por token (137 bilhões totais), alcançando 71,6% em SWE-Bench Verified contra 66,6% do Haiku 4.5 — número do fornecedor, não medido independentemente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (em 16.06.)</strong>: Claude Fable 5 lidera com 95,0%, Anthropic ocupa posições 1–6; Gemini 3.1 Pro e DeepSeek-V4-Pro-Max compartilham 7º lugar com 80,6%.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>CVE-2026-42559</strong>: DNS rebinding contra servidores MCP locais (rmcp &lt; 1.4.0, CVSS 8,8) — atualize para rmcp 1.4.0 ou use stdio em vez de HTTP.</li>\n      <li><span class=\"chip\">Ferramenta</span> <strong>GitHub Copilot</strong> mudou para créditos de AI baseados em uso em 1.6 (1 crédito = $0,01 USD) — preços base dos planos inalterados, mas frustração visível sobre créditos consumidos rapidamente.</li>\n      <li><span class=\"chip good\">Ferramenta</span> <strong>Cursor Bugbot</strong> (10.06.): reviews agora ~90 s em vez de ~5 min, 10% mais bugs encontrados, ~22% mais barato por execução.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Daybreak</strong> (desde 11.05., contexto): Codex Security Harness corrigiu &gt; 3.000 CVEs críticas/altas em todo o ecossistema; Trusted Access exige chave de hardware desde 1.6.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.30.8</strong> (12.06.) expande suporte de hardware GGUF e o motor Apple Silicon MLX; OpenHands v1.8.0 (10.06.) traz delegação de sub-agentes.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> permanece preso em Preview no Vertex sem card de modelo e sem benchmarks publicados — sem números comparáveis.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El movimiento más emocionante de la semana no es el próximo modelo frontier del 95%, sino una arquitectura sparse mixture-of-experts con pequeño factor de activación: el MAI-Code-1-Flash de Microsoft (137 mil millones de parámetros totales, apenas 5 mil millones activos por token) supera al significativamente más grande Claude Haiku 4.5 en su propia tabla de puntuaciones — y marca que ahora Microsoft y Google también enfrentan sus propios modelos de codificación contra Anthropic y OpenAI. En el leaderboard independiente SWE-Bench Verified, Anthropic permanece incontestada. En medio: una brecha seria en MCP y la facturación de Copilot que frustra a muchos desarrolladores.</p>\n    <ul>\n      <li><span class=\"chip hot\">Herramienta</span> <strong>MAI-Code-1-Flash</strong>: primer modelo de codificación completamente propio de Microsoft — sparse MoE con 5 mil millones de parámetros activos por token (137 mil millones totales), alcanzando 71,6% en SWE-Bench Verified versus 66,6% en Haiku 4.5 — número del proveedor, no medido independientemente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (al 16.06.)</strong>: Claude Fable 5 lidera con 95,0%, Anthropic ocupa posiciones 1–6; Gemini 3.1 Pro y DeepSeek-V4-Pro-Max comparten 7º lugar con 80,6%.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>CVE-2026-42559</strong>: DNS rebinding contra servidores MCP locales (rmcp &lt; 1.4.0, CVSS 8,8) — actualiza a rmcp 1.4.0 o usa stdio en lugar de HTTP.</li>\n      <li><span class=\"chip\">Herramienta</span> <strong>GitHub Copilot</strong> cambió a créditos de AI basados en uso el 1.6 (1 crédito = $0,01 USD) — precios base de planes sin cambios, pero frustración visible por créditos consumidos rápidamente.</li>\n      <li><span class=\"chip good\">Herramienta</span> <strong>Cursor Bugbot</strong> (10.06.): reviews ahora ~90 s en lugar de ~5 min, 10% más bugs encontrados, ~22% más barato por ejecución.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Daybreak</strong> (desde 11.05., contexto): Codex Security Harness ha corregido &gt; 3.000 CVEs críticas/altas en todo el ecosistema; Trusted Access requiere clave de hardware desde 1.6.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.30.8</strong> (12.06.) expande soporte de hardware GGUF y el motor Apple Silicon MLX; OpenHands v1.8.0 (10.06.) trae delegación de sub-agentes.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> sigue atrapado en Preview de Vertex sin tarjeta de modelo y sin puntuaciones publicadas — sin números comparables.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute dreht sich alles um den Spalt zwischen Einsatz und Kontrolle. Gartner warnt, dass Unternehmen ihre KI-Agenten falsch steuern — entweder komplett zugesperrt oder blind vertraut — und genau das wird über 40 % der Agenten-Projekte killen. Gleichzeitig drückt JPMorgan aufs Gas: Agenten, die zwei Stunden am Stück arbeiten statt zwei Minuten. Die spannende Frage für twiceD ist nicht „kommt KI in Produktion\" — das tut sie schon — sondern „wer macht die Drecksarbeit dazwischen\": Guardrails, Audit-Trails, der EU-AI-Act-Stichtag am 2. August.</p>\n    <ul>\n      <li><span class=\"chip hot\">STUDY · EU</span> <strong>Gartner-Governance-Warnung (26.05.)</strong>: „binäre\" Steuerung — alles gesperrt oder voll vertraut — ist die Wurzel des Scheiterns; bis 2027 werden 40 % der Unternehmen mindestens einen ihrer autonomen Agenten zurückstufen oder abschalten.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>JPMorgan (09.06.)</strong>: lang laufende autonome Agenten (60–120 Min. statt 2–3 Min.), 450+ Use-Cases in Produktion, +20 % Brutto-Verkauf im Private Banking — laut CNBC.</li>\n      <li><span class=\"chip good\">M&A · US</span> <strong>Netomi-Series-C (29.04.)</strong>: 110 Mio. $ von Accenture &amp; Adobe Ventures; No-Code-Agenten-CX, globale Allianz mit Accenture zum Ausrollen.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>NICE Q1 2026</strong>: KI-ARR 345 Mio. $ (+66 % YoY), in 100 % der CXone-Enterprise-Deals; Lufthansa fuhr in 7 Streik-Tagen ~2 Mio. Interaktionen über die Agenten.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>Adoptions-Realität</strong>: 57 % der Firmen haben Agenten in Produktion (G2, n=1 035); Gartner sieht 40 % der Enterprise-Apps mit Task-Agenten bis Ende 2026.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Pflichten ab 02.08.2026; bis 15 Mio. € oder 3 % Umsatz Strafe; Agenten brauchen Audit-Trail, menschliche Aufsicht, schnelle Abschaltbarkeit.</li>\n      <li><span class=\"chip good\">B2B</span> <strong>twiceD-Ideen</strong>: zwei recherchierte Wetten — ein Agent-Governance-/AI-Act-Audit als Beratung, und Hands-on-Agenten-Einpassung für den DE-Mittelstand.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute dreht sich alles um den Spalt zwischen Einsatz und Kontrolle. Gartner warnt, dass Unternehmen ihre KI-Agenten falsch steuern — entweder komplett zugesperrt oder blind vertraut — und genau das wird über 40 % der Agenten-Projekte killen. Gleichzeitig drückt JPMorgan aufs Gas: Agenten, die zwei Stunden am Stück arbeiten statt zwei Minuten. Die spannende Frage für twiceD ist nicht „kommt KI in Produktion\" — das tut sie schon — sondern „wer macht die Drecksarbeit dazwischen\": Guardrails, Audit-Trails, der EU-AI-Act-Stichtag am 2. August.</p>\n    <ul>\n      <li><span class=\"chip hot\">STUDY · EU</span> <strong>Gartner-Governance-Warnung (26.05.)</strong>: „binäre\" Steuerung — alles gesperrt oder voll vertraut — ist die Wurzel des Scheiterns; bis 2027 werden 40 % der Unternehmen mindestens einen ihrer autonomen Agenten zurückstufen oder abschalten.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>JPMorgan (09.06.)</strong>: lang laufende autonome Agenten (60–120 Min. statt 2–3 Min.), 450+ Use-Cases in Produktion, +20 % Brutto-Verkauf im Private Banking — laut CNBC.</li>\n      <li><span class=\"chip good\">M&A · US</span> <strong>Netomi-Series-C (29.04.)</strong>: 110 Mio. $ von Accenture &amp; Adobe Ventures; No-Code-Agenten-CX, globale Allianz mit Accenture zum Ausrollen.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>NICE Q1 2026</strong>: KI-ARR 345 Mio. $ (+66 % YoY), in 100 % der CXone-Enterprise-Deals; Lufthansa fuhr in 7 Streik-Tagen ~2 Mio. Interaktionen über die Agenten.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>Adoptions-Realität</strong>: 57 % der Firmen haben Agenten in Produktion (G2, n=1 035); Gartner sieht 40 % der Enterprise-Apps mit Task-Agenten bis Ende 2026.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Pflichten ab 02.08.2026; bis 15 Mio. € oder 3 % Umsatz Strafe; Agenten brauchen Audit-Trail, menschliche Aufsicht, schnelle Abschaltbarkeit.</li>\n      <li><span class=\"chip good\">B2B</span> <strong>twiceD-Ideen</strong>: zwei recherchierte Wetten — ein Agent-Governance-/AI-Act-Audit als Beratung, und Hands-on-Agenten-Einpassung für den DE-Mittelstand.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today it's all about the gap between deployment and control. Gartner warns that companies are steering their AI agents wrong — either locked down tight or trusted blindly — and that alone will kill over 40% of agent projects. Meanwhile, JPMorgan is pushing hard: agents that work for two hours straight instead of two minutes. The real question for twiceD is not \"does AI go into production\" — it already is — but \"who does the grunt work in between\": guardrails, audit trails, the August 2nd EU AI Act deadline.</p>\n    <ul>\n      <li><span class=\"chip hot\">STUDY · EU</span> <strong>Gartner governance warning (May 26)</strong>: \"binary\" control — everything locked or fully trusted — is the root of failure; by 2027, 40% of companies will downgrade or shut down at least one of their autonomous agents.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>JPMorgan (June 9)</strong>: long-running autonomous agents (60–120 min instead of 2–3 min), 450+ use cases in production, +20% gross sales in private banking — per CNBC.</li>\n      <li><span class=\"chip good\">M&A · US</span> <strong>Netomi Series C (April 29)</strong>: $110M from Accenture &amp; Adobe Ventures; no-code agent CX, global rollout alliance with Accenture.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>NICE Q1 2026</strong>: AI ARR $345M (+66% YoY), in 100% of new CXone enterprise deals; Lufthansa ran ~2M agent interactions during a 7-day strike — full rebookings and refunds.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>Adoption reality</strong>: 57% of firms have agents in production (G2, n=1,035); Gartner sees 40% of enterprise apps with task agents by end of 2026.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: high-risk obligations in force from Aug 2, 2026; fines up to €15M or 3% of revenue; agents need audit trail, human oversight, instant shutoff.</li>\n      <li><span class=\"chip good\">B2B</span> <strong>twiceD ideas</strong>: two researched bets — an agent-governance / AI-Act audit as advisory, and hands-on agent fit for German midmarket.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é tudo sobre a lacuna entre implantação e controle. Gartner avisa que as empresas estão guiando seus agentes de IA errado — ou completamente trancado ou confiança cega — e isso sozinho vai eliminar mais de 40% dos projetos de agentes. Enquanto isso, JPMorgan está acelerando: agentes que trabalham duas horas seguidas em vez de dois minutos. A pergunta real para twiceD não é \"a IA vai para produção\" — ela já está — mas \"quem faz o trabalho pesado no meio\": guardrails, trilhas de auditoria, o prazo da Lei de IA da UE em 2 de agosto.</p>\n    <ul>\n      <li><span class=\"chip hot\">ESTUDO · UE</span> <strong>Aviso de governança da Gartner (26.05.)</strong>: controle \"binário\" — tudo bloqueado ou totalmente confiante — é a raiz do fracasso; até 2027, 40% das empresas vão degradar ou desligar pelo menos um de seus agentes autônomos.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>JPMorgan (09.06.)</strong>: agentes autônomos de longa duração (60–120 min em vez de 2–3 min), 450+ casos de uso em produção, +20% de vendas brutas em private banking — segundo CNBC.</li>\n      <li><span class=\"chip good\">M&A · US</span> <strong>Netomi Series C (29.04.)</strong>: $ 110 milhões de Accenture &amp; Adobe Ventures; CX de agentes sem código, aliança global com Accenture para implementação.</li>\n      <li><span class=\"chip\">DEPLOY · UE</span> <strong>NICE Q1 2026</strong>: IA ARR de $ 345 milhões (+66% YoY), em 100% dos novos contratos CXone Enterprise; Lufthansa processou ~2 milhões de interações via agentes durante 7 dias de greve — remarcações e reembolsos completos.</li>\n      <li><span class=\"chip\">ESTUDO</span> <strong>Realidade de adoção</strong>: 57% das empresas têm agentes em produção (G2, n=1 035); Gartner vê 40% dos aplicativos empresariais com agentes de tarefa até o final de 2026.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Lei de IA da UE</strong>: obrigações de alto risco a partir de 02.08.2026; multas até € 15 milhões ou 3% da receita; agentes precisam de trilha de auditoria, supervisão humana, desligamento instantâneo.</li>\n      <li><span class=\"chip good\">B2B</span> <strong>Ideias twiceD</strong>: duas apostas pesquisadas — uma auditoria de governança de agentes / Lei de IA como consultoria, e ajuste prático de agentes para o mercado intermediário alemão.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy todo se trata de la brecha entre despliegue y control. Gartner advierte que las empresas están guiando mal sus agentes de IA — o completamente bloqueado o confianza ciega — y eso solo va a eliminar más del 40% de los proyectos de agentes. Mientras tanto, JPMorgan está acelerando: agentes que funcionan dos horas seguidas en lugar de dos minutos. La pregunta real para twiceD no es \"¿entra la IA en producción?\" — ya está — sino \"¿quién hace el trabajo pesado en el medio?\": guardias, pistas de auditoría, el plazo de la Ley de IA de la UE el 2 de agosto.</p>\n    <ul>\n      <li><span class=\"chip hot\">ESTUDIO · UE</span> <strong>Advertencia de gobernanza de Gartner (26.05.)</strong>: control \"binario\" — todo bloqueado o totalmente confiado — es la raíz del fracaso; hacia 2027, 40% de las empresas van a degradar o apagar al menos uno de sus agentes autónomos.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>JPMorgan (09.06.)</strong>: agentes autónomos de larga duración (60–120 min en lugar de 2–3 min), 450+ casos de uso en producción, +20% de ventas brutas en banca privada — según CNBC.</li>\n      <li><span class=\"chip good\">M&A · US</span> <strong>Netomi Series C (29.04.)</strong>: $110 millones de Accenture &amp; Adobe Ventures; CX de agentes sin código, alianza global con Accenture para despliegue.</li>\n      <li><span class=\"chip\">DEPLOY · UE</span> <strong>NICE Q1 2026</strong>: IA ARR de $345 millones (+66% YoY), en 100% de los nuevos acuerdos CXone empresariales; Lufthansa procesó ~2 millones de interacciones vía agentes durante 7 días de huelga — reservas completas y reembolsos.</li>\n      <li><span class=\"chip\">ESTUDIO</span> <strong>Realidad de adopción</strong>: 57% de las empresas tienen agentes en producción (G2, n=1 035); Gartner ve 40% de aplicaciones empresariales con agentes de tareas hacia fin de 2026.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Ley de IA de la UE</strong>: obligaciones de alto riesgo a partir del 02.08.2026; multas hasta €15 millones o 3% de ingresos; los agentes necesitan pista de auditoría, supervisión humana, apagado instantáneo.</li>\n      <li><span class=\"chip good\">B2B</span> <strong>Ideas de twiceD</strong>: dos apuestas investigadas — una auditoría de gobernanza de agentes / Ley de IA como consultoría, y ajuste de agentes manos a la obra para el mercado intermedio alemán.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist offiziell ein Käufermarkt: Der durchschnittliche DACH-Freelance-Stundensatz ist 2026 erstmals seit Erhebungs-Beginn gefallen — auf 103 €/h, bei einem monatlichen Projektumsatz von nur noch 6.653 € (−17 %). Gleichzeitig spaltet sich der Markt nach Rolle: Spezialisten- und Beratungsrollen erzielen Spitzensätze (Beratung &amp; Management ~121 €/h laut Freelancer-Kompass 2026), während Java-Generalisten flach bei ~88 €/h liegen. Das Board bleibt mit 138 Listings stark (8 Fits ≥ 85, 5 neu), die zwei TED-Tender sind fortgeführt — heute aber nicht live nachprüfbar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>103 €/h — erste Senkung überhaupt</strong>: Freelancer-Kompass 2026 (n=5.400). Monats-Projektumsatz von 8.022 € auf 6.653 € gefallen (−17 %). 62 % planen keine Preiserhöhung.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>Spezialist vs. Generalist</strong>: Beratung &amp; Management bei ~121 €/h (Freelancer-Kompass 2026, Spitze nach Tätigkeitsfeld), Java-Generalist bei ~88 €/h flach. Auf dem Board 34 AI/LLM/RAG-Listings, etliche im Band 100–135 €/h.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Volumen-Kollaps</strong>: IT-Projekte auf Plattformen von ~97.400 (2022) auf ~56.000 (2025); IT-Anteil aller Projekte von 29 % (2024) auf 20 % (2025).</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — bestes Employee-Offer im Filter. Personio AI-Team (86) daneben.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Java + GenAI/RAG/Kiro, Frankfurt 80 % remote, 110–135 €/h, 24 Monate — der AI-Premium-Punkt.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nürnberg 90 % remote — sauberer Brot-und-Butter-Fit.</li>\n      <li><span class=\"chip\">Board</span> <strong>5 neu heute</strong>: One Day Ahead KI-Developer (79), JetBrains Principal Cloud (77), 1st solution AI Engineer (76), TEKsystems GenAI (76), Michael Page Interim Java (74).</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + KI, 100 % remote, 110–135 €/h — Nischen-Premium mit Daniels OEM-Referenzen.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn (€13 Mio., Frist 30.06.) + SH-Navi (€320k, Frist 29.06.)</strong>: beide <span class=\"chip\">⚠️ Partner</span> — heute aber nur fortgeführt, nicht live re-verifiziert.</li>\n      <li><span class=\"chip\">Board</span> <strong>138 Listings</strong>: 8 ≥ 85, 42 im Band 80–84, 120 mit Remote-Tag — fast das ganze Spitzenfeld ist BR-zeitzonentauglich.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist offiziell ein Käufermarkt: Der durchschnittliche DACH-Freelance-Stundensatz ist 2026 erstmals seit Erhebungs-Beginn gefallen — auf 103 €/h, bei einem monatlichen Projektumsatz von nur noch 6.653 € (−17 %). Gleichzeitig spaltet sich der Markt nach Rolle: Spezialisten- und Beratungsrollen erzielen Spitzensätze (Beratung &amp; Management ~121 €/h laut Freelancer-Kompass 2026), während Java-Generalisten flach bei ~88 €/h liegen. Das Board bleibt mit 138 Listings stark (8 Fits ≥ 85, 5 neu), die zwei TED-Tender sind fortgeführt — heute aber nicht live nachprüfbar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>103 €/h — erste Senkung überhaupt</strong>: Freelancer-Kompass 2026 (n=5.400). Monats-Projektumsatz von 8.022 € auf 6.653 € gefallen (−17 %). 62 % planen keine Preiserhöhung.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>Spezialist vs. Generalist</strong>: Beratung &amp; Management bei ~121 €/h (Freelancer-Kompass 2026, Spitze nach Tätigkeitsfeld), Java-Generalist bei ~88 €/h flach. Auf dem Board 34 AI/LLM/RAG-Listings, etliche im Band 100–135 €/h.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Volumen-Kollaps</strong>: IT-Projekte auf Plattformen von ~97.400 (2022) auf ~56.000 (2025); IT-Anteil aller Projekte von 29 % (2024) auf 20 % (2025).</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — bestes Employee-Offer im Filter. Personio AI-Team (86) daneben.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Java + GenAI/RAG/Kiro, Frankfurt 80 % remote, 110–135 €/h, 24 Monate — der AI-Premium-Punkt.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nürnberg 90 % remote — sauberer Brot-und-Butter-Fit.</li>\n      <li><span class=\"chip\">Board</span> <strong>5 neu heute</strong>: One Day Ahead KI-Developer (79), JetBrains Principal Cloud (77), 1st solution AI Engineer (76), TEKsystems GenAI (76), Michael Page Interim Java (74).</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + KI, 100 % remote, 110–135 €/h — Nischen-Premium mit Daniels OEM-Referenzen.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn (€13 Mio., Frist 30.06.) + SH-Navi (€320k, Frist 29.06.)</strong>: beide <span class=\"chip\">⚠️ Partner</span> — heute aber nur fortgeführt, nicht live re-verifiziert.</li>\n      <li><span class=\"chip\">Board</span> <strong>138 Listings</strong>: 8 ≥ 85, 42 im Band 80–84, 120 mit Remote-Tag — fast das ganze Spitzenfeld ist BR-zeitzonentauglich.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's officially a buyer's market: The average DACH freelance hourly rate fell for the first time since records began, to 103 €/h — down from historical highs, with monthly project revenue dropping to just 6,653 € (−17 %). At the same time, the market is fracturing by role: specialist and consulting roles command premium rates (Consulting &amp; Management ~121 €/h per Freelancer Compass 2026), while Java generalists stagnate at ~88 €/h. The board stays strong with 138 listings (8 fits ≥ 85, 5 new), with two TED tenders carried forward — not live-verified today.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>103 €/h — first decline ever</strong>: Freelancer Compass 2026 (n=5,400). Monthly project revenue down from 8,022 € to 6,653 € (−17 %). 62 % plan no rate increases.</li>\n      <li><span class=\"chip hot\">Market</span> <strong>Specialist vs. Generalist</strong>: Consulting &amp; Management at ~121 €/h (Freelancer Compass 2026, top by role), Java Generalist at ~88 €/h flat. Board shows 34 AI/LLM/RAG listings, many in the 100–135 €/h band.</li>\n      <li><span class=\"chip\">Market</span> <strong>Volume collapse</strong>: IT projects on platforms down from ~97,400 (2022) to ~56,000 (2025); IT share of all projects down from 29 % (2024) to 20 % (2025).</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — best employee offer in filter. Personio AI Team (86) close behind.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Java + GenAI/RAG/Kiro, Frankfurt 80 % remote, 110–135 €/h, 24 months — the AI premium point.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nuremberg 90 % remote — clean bread-and-butter fit.</li>\n      <li><span class=\"chip\">Board</span> <strong>5 new toda       "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">WM-Tag in den USA, Kanada und Mexiko — und für einmal kein Freiburg-Spiel im Kalender: Die Bundesliga ist seit Mitte Mai durch, die Tabelle steht final, der Brasileirão pausiert bis 19. Juli. Was zählt, ist das Turnier. Deutschland hat zum Auftakt ein Ausrufezeichen gesetzt, Brasilien stolpert dagegen mürrisch in die K.o.-Runden-Rechnung. Heute Abend (BRT) rollt der Ball in Gruppe I und J weiter — Frankreich gegen Senegal mit historischem Beigeschmack.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Deutschland 7:1 Curaçao</strong>: Havertz-Doppelpack, Musiala, Schlotterbeck &amp; Co. — Gruppen-E-Spitze nach Spieltag 1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nächstes DFB-Spiel</strong>: Sa 20.06. gegen die Elfenbeinküste, 22:00 MESZ / 17:00 BRT in Toronto.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasilien nur 1:1 gegen Marokko</strong>: Vinícius rettet das Remis, Seleção liegt nach Fair-Play-Punkten auf Platz 3 — hinter Schottland.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Nächstes Seleção-Spiel</strong>: Fr 19.06. gegen Haiti, 03:00 MESZ (20.06.) / 22:00 BRT in Philadelphia.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute Abend</strong>: Frankreich–Senegal (21:00 MESZ / 16:00 BRT), Irak–Norwegen, Argentinien–Algerien — bei Druck noch nicht angepfiffen.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Sommer-Markt</strong>: Goto kommt aus Anderlecht, Adamu geht für 800 Tsd. € nach Schalke.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison-Bilanz</strong>: Freiburg final 7. (47 Pkt.), Conference-League-Qualifikation, EL-Finale knapp verloren.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão eingefroren</strong>: WM-Pause 11.06.–19.07., Palmeiras führt mit 41 Punkten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">World Cup day in the USA, Canada, and Mexico — and for once, no Freiburg match on the calendar: the Bundesliga wrapped mid-May, the table is final, and the Brasileirão won't resume until July 19. What matters is the tournament. Germany made a statement with its opener, but Brazil stumbled into the knockout-round equation. Tonight (BRT) the ball rolls on in Groups I and J — France vs. Senegal carries historic baggage.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Germany 7:1 Curaçao</strong>: Havertz double, Musiala, Schlotterbeck & Co. — Group E leaders after matchday one.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Next DFB Match</strong>: Sat 20.06. vs. Côte d'Ivoire, 22:00 MESZ / 17:00 BRT in Toronto.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brazil Only 1:1 Against Morocco</strong>: Vinícius rescues the draw, Seleção sits third by fair play points — behind Scotland.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Next Seleção Match</strong>: Fri 19.06. vs. Haiti, 03:00 MESZ (20.06.) / 22:00 BRT in Philadelphia.</li>\n      <li><span class=\"chip\">WM</span> <strong>Tonight</strong>: France–Senegal (21:00 MESZ / 16:00 BRT), Iraq–Norway, Argentina–Algeria — not yet kicked off at deadline.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Summer Market</strong>: Goto arrives from Anderlecht, Adamu departs for €800k to Schalke.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season Summary</strong>: Freiburg finishes 7th (47 pts), Conference League qualification, narrowly lost EL final.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão On Hold</strong>: World Cup break June 11–July 19, Palmeiras leads with 41 points.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dia de Copa do Mundo nos EUA, Canadá e México — e, por uma vez, nenhum jogo do Freiburg no calendário: a Bundesliga encerrou em meados de maio, a tabela está final, e o Brasileirão pausa até 19 de julho. O que importa é o torneio. A Alemanha marcou presença na estreia, mas o Brasil tropeçou rumo aos cálculos de mata-mata. Nesta noite (horário de Brasília) a bola rola nos grupos I e J — França contra Senegal carrega peso histórico.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemanha 7:1 Curaçao</strong>: Doblete de Havertz, Musiala, Schlotterbeck e cia. — líderes do Grupo E após a rodada 1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Próximo jogo da DFB</strong>: sáb. 20.06. contra Costa do Marfim, 22:00 MESZ / 17:00 BRT em Toronto.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasil apenas 1:1 contra Marrocos</strong>: Vinícius salva o empate, Seleção fica em 3º por critério de fair play — atrás da Escócia.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Próximo jogo da Seleção</strong>: sex. 19.06. contra Haiti, 03:00 MESZ (20.06.) / 22:00 BRT em Filadélfia.</li>\n      <li><span class=\"chip\">WM</span> <strong>Nesta Noite</strong>: França–Senegal (21:00 MESZ / 16:00 BRT), Iraque–Noruega, Argentina–Argélia — ainda não apitadas no fechamento.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Mercado de Verão</strong>: Goto chega de Anderlecht, Adamu sai por 800 mil € para Schalke.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Balanço da Temporada</strong>: Freiburg termina em 7º (47 pts), qualificação para Conference League, perdeu final da EL por pouco.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão Congelado</strong>: Pausa de Copa 11.06.–19.07., Palmeiras lidera com 41 pontos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Día de Mundial en Estados Unidos, Canadá y México — y, por una vez, sin partido del Freiburg en el calendario: la Bundesliga terminó a mediados de mayo, la tabla es definitiva, y el Brasileirão se pausa hasta el 19 de julio. Lo que cuenta es el torneo. Alemania marcó presencia en su debut, pero Brasil tropezó rumbo a los cálculos de octavos. Esta noche (horario de Brasil) la pelota rueda en los Grupos I y J — Francia contra Senegal tiene peso histórico.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemania 7:1 Curaçao</strong>: Doblete de Havertz, Musiala, Schlotterbeck y cia. — líderes del Grupo E tras la jornada 1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Próximo partido de Alemania</strong>: sáb. 20.06. vs. Costa de Marfil, 22:00 MESZ / 17:00 BRT en Toronto.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasil Solo 1:1 Contra Marruecos</strong>: Vinícius rescata el empate, Seleção queda tercera por puntos de fair play — atrás de Escocia.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Próximo partido de Brasil</strong>: vie. 19.06. vs. Haití, 03:00 MESZ (20.06.) / 22:00 BRT en Filadelfia.</li>\n      <li><span class=\"chip\">WM</span> <strong>Esta Noche</strong>: Francia–Senegal (21:00 MESZ / 16:00 BRT), Irak–Noruega, Argentina–Argelia — aún sin definirse al cierre.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Mercado de Verano</strong>: Goto llega de Anderlecht, Adamu se va por 800 mil € a Schalke.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Resumen de Temporada</strong>: Freiburg termina 7º (47 pts), calificación a Conference League, perdió final de EL por poco.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão Congelado</strong>: Pausa de Mundial 11.06.–19.07., Palmeiras lidera con 41 puntos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das Barcelona-Wochenende hat die Formel-1-WM kräftig durchgeschüttelt: <strong>Lewis Hamilton</strong> holte seinen <strong>ersten Sieg im Ferrari</strong> — und damit den ersten Nicht-Mercedes-Sieg der Saison 2026 überhaupt. WM-Leader <strong>Kimi Antonelli</strong> fuhr lange auf P2, schied aber vier Runden vor Schluss aus, nachdem beim Überholmanöver gegen Russell sein Frontflügel-Endplate brach. Resultat: Antonellis Vorsprung schrumpft auf <strong>41 Punkte</strong> (156 zu 115). In den nächsten sieben Tagen ist Renn-Pause in der F1 — dafür rollt die <strong>MotoGP</strong> nach Brno (Tschechien-GP, 19.–21.06.), wo Marc Marquez nach seinem 100.-Sieg-Wochenende in Ungarn Boden auf die WM-Spitze gutmachen will. Danach kommt die F1 in Spielberg (Österreich-GP, 26.–28.06., ohne Sprint) wieder. Alle Zeiten unten in MESZ + BRT.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong>: Barcelona-Catalunya, Lauf 7/24 (So 14.06.). Russell P2, Norris P3 — <em>erstes rein-britisches Podium seit 1968</em>. Erster Nicht-Mercedes-Sieg 2026.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli scheidet auf P2 aus</strong> (Runde 62/66): nach dem Überholen Russells brach sein Endplate. Hamilton holt +25 Pkt, Russell +18 Pkt auf.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106, −50). Konstrukteure: <strong>Mercedes 262</strong> vor Ferrari 190 (−72), McLaren 141. Verstappen nur P7 (55).</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Tschechien-GP, Brno, 19.–21.06.</strong> (Sprint-Format). Rennen So 21.06. <strong>14:00 MESZ / 09:00 BRT</strong>. Bezzecchi führt die WM mit 180 Pkt.</li>\n      <li><span class=\"chip\">MOTOGP-WM</span> <strong>Marquez holte in Ungarn Sprint + Rennen</strong> (sein 100. GP-Sieg) — nach Lap-1-Aprilia-Crash Martin/Bezzecchi. Stand nach Lauf 8 (07.06.).</li>\n      <li><span class=\"chip\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/24), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen So 28.06. <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Das Barcelona-Wochenende hat die Formel-1-WM kräftig durchgeschüttelt: <strong>Lewis Hamilton</strong> holte seinen <strong>ersten Sieg im Ferrari</strong> — und damit den ersten Nicht-Mercedes-Sieg der Saison 2026 überhaupt. WM-Leader <strong>Kimi Antonelli</strong> fuhr lange auf P2, schied aber vier Runden vor Schluss aus, nachdem beim Überholmanöver gegen Russell sein Frontflügel-Endplate brach. Resultat: Antonellis Vorsprung schrumpft auf <strong>41 Punkte</strong> (156 zu 115). In den nächsten sieben Tagen ist Renn-Pause in der F1 — dafür rollt die <strong>MotoGP</strong> nach Brno (Tschechien-GP, 19.–21.06.), wo Marc Marquez nach seinem 100.-Sieg-Wochenende in Ungarn Boden auf die WM-Spitze gutmachen will. Danach kommt die F1 in Spielberg (Österreich-GP, 26.–28.06., ohne Sprint) wieder. Alle Zeiten unten in MESZ + BRT.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong>: Barcelona-Catalunya, Lauf 7/24 (So 14.06.). Russell P2, Norris P3 — <em>erstes rein-britisches Podium seit 1968</em>. Erster Nicht-Mercedes-Sieg 2026.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli scheidet auf P2 aus</strong> (Runde 62/66): nach dem Überholen Russells brach sein Endplate. Hamilton holt +25 Pkt, Russell +18 Pkt auf.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106, −50). Konstrukteure: <strong>Mercedes 262</strong> vor Ferrari 190 (−72), McLaren 141. Verstappen nur P7 (55).</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Tschechien-GP, Brno, 19.–21.06.</strong> (Sprint-Format). Rennen So 21.06. <strong>14:00 MESZ / 09:00 BRT</strong>. Bezzecchi führt die WM mit 180 Pkt.</li>\n      <li><span class=\"chip\">MOTOGP-WM</span> <strong>Marquez holte in Ungarn Sprint + Rennen</strong> (sein 100. GP-Sieg) — nach Lap-1-Aprilia-Crash Martin/Bezzecchi. Stand nach Lauf 8 (07.06.).</li>\n      <li><span class=\"chip\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/24), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen So 28.06. <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The Barcelona weekend has shaken up the Formula 1 championship significantly: <strong>Lewis Hamilton</strong> claimed his <strong>first victory in a Ferrari</strong> — and with it, the first non-Mercedes win of the entire 2026 season. Championship leader <strong>Kimi Antonelli</strong> ran second for long stretches but retired four laps from the finish after his front wing endplate broke during an overtaking attempt on Russell. Result: Antonelli's lead shrinks to <strong>41 points</strong> (156 to 115). Over the next seven days there's a break in the F1 calendar — instead, <strong>MotoGP</strong> heads to Brno (Czech Grand Prix, June 19–21), where Marc Marquez aims to make up ground after his 100th-win milestone weekend in Hungary. Then F1 returns to Spielberg (Austrian Grand Prix, June 26–28, no sprint). All times below in MESZ + BRT.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 WIN</span> <strong>Hamilton's first Ferrari victory</strong>: Barcelona-Catalunya, race 7/24 (Sun June 14). Russell P2, Norris P3 — <em>first all-British podium since 1968</em>. First non-Mercedes win in 2026.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli retires while running second</strong> (lap 62/66): after overtaking Russell, his endplate broke. Hamilton gains +25 pts, Russell gains +18 pts.</li>\n      <li><span class=\"chip\">F1 CHAMPIONSHIP</span> <strong>Antonelli leads with 156 pts</strong> ahead of Hamilton (115, −41) and Russell (106, −50). Constructors: <strong>Mercedes 262</strong> ahead of Ferrari 190 (−72), McLaren 141. Verstappen only P7 (55).</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Czech Grand Prix, Brno, June 19–21</strong> (sprint format). Race Sun June 21 <strong>14:00 MESZ / 09:00 BRT</strong>. Bezzecchi leads the championship with 180 pts.</li>\n      <li><span class=\"chip\">MOTOGP CHAMPIONSHIP</span> <strong>Marquez claimed sprint and race in Hungary</strong> (his 100th GP win) — after lap-1 Aprilia crash involving Martin/Bezzecchi. Standing after race 8 (June 7).</li>\n      <li><span class=\"chip\">NEXT F1</span> <strong>Austrian Grand Prix (race 8/24), Red Bull Ring</strong>, June 26–28, no sprint. Race Sun June 28 <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O fim de semana de Barcelona sacudiu bastante o campeonato de Fórmula 1: <strong>Lewis Hamilton</strong> conquistou sua <strong>primeira vitória na Ferrari</strong> — e com ela, a primeira vitória fora da Mercedes em toda a temporada 2026. O líder do campeonato <strong>Kimi Antonelli</strong> rodou em segundo lugar por muito tempo, mas se retirou quatro voltas antes do final após quebrar seu endplate do aerofólio dianteiro durante uma tentativa de ultrapassagem contra Russell. Resultado: a vantagem de Antonelli encolhe para <strong>41 pontos</strong> (156 para 115). Nos próximos sete dias há pausa na F1 — em vez disso, a <strong>MotoGP</strong> vai para Brno (Grande Prêmio da República Tcheca, 19–21.06.), onde Marc Marquez quer recuperar terreno após seu fim de semana do 100º vitória na Hungria. Depois a F1 volta em Spielberg (Grande Prêmio da Áustria, 26–28.06., sem sprint). Todos os horários abaixo em MESZ + BRT.</p>\n    <ul>\n      <li><span class=\"chip hot\">VITÓRIA F1</span> <strong>Primeira vitória de Hamilton na Ferrari</strong>: Barcelona-Catalunya, corrida 7/24 (dom 14.06.). Russell P2, Norris P3 — <em>primeiro pódio totalmente britânico desde 1968</em>. Primeira vitória fora da Mercedes em 2026.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli se retira em P2</strong> (volta 62/66): após ultrapassar Russell, seu endplate quebrou. Hamilton ganha +25 pts, Russell ganha +18 pts.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera com 156 pts</strong> à frente de Hamilton (115, −41) e Russell (106, −50). Construtores: <strong>Mercedes 262</strong> à frente de Ferrari 190 (−72), McLaren 141. Verstappen apenas P7 (55).</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Grande Prêmio da República Tcheca, Brno, 19–21.06.</strong> (formato sprint). Corrida dom 21.06. <strong>14:00 MESZ / 09:00 BRT</strong>. Bezzecchi lidera o campeonato com 180 pts.</li>\n      <li><span class=\"chip\">CAMPEONATO MOTOGP</span> <strong>Marquez conquistou sprint e corrida na Hungria</strong> (sua 100ª vitória em GP) — após crash de Aprilia de Martin/Bezzecchi na volta 1. Situação após corrida 8 (07.06.).</li>\n      <li><span class=\"chip\">PRÓXIMA F1</span> <strong>Grande Prêmio da Áustria (corrida 8/24), Red Bull Ring</strong>, 26–28.06., sem sprint. Corrida dom 28.06. <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El fin de semana de Barcelona ha sacudido fuertemente el campeonato de Fórmula 1: <strong>Lewis Hamilton</strong> consiguió su <strong>primera victoria en Ferrari</strong> — y con ella, la primera victoria ajena a Mercedes en toda la temporada 2026. El líder del campeonato <strong>Kimi Antonelli</strong> rodó segundo durante largo tiempo, pero se retiró cuatro vueltas antes del final tras romper su aleta de alerón delantero durante un intento de adelantamiento contra Russell. Resultado: la ventaja de Antonelli se reduce a <strong>41 puntos</strong> (156 contra 115). En los próximos siete días hay pausa en la F1 — en su lugar, la <strong>MotoGP</strong> se va a Brno (Gran Premio de República Checa, 19–21.06.), donde Marc Marquez quiere recuperar terreno tras su fin de semana del 100º triunfo en Hungría. Luego la F1 vuelve en Spielberg (Gran Premio de Austria, 26–28.06., sin sprint). Todos los horarios abajo en MESZ + BRT.</p>\n    <ul>\n      <li><span class=\"chip hot\">VICTORIA F1</span> <strong>Primera victoria de Hamilton en Ferrari</strong>: Barcelona-Catalunya, carrera 7/24 (dom 14.06.). Russell P2, Norris P3 — <em>primer podio completamente británico desde 1968</em>. Primera victoria ajena a Mercedes en 2026.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli se retira en P2</strong> (vuelta 62/66): tras adelantar a Russell, su aleta se rompió. Hamilton suma +25 pts, Russell suma +18 pts.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera con 156 pts</strong> ante Hamilton (115, −41) y Russell (106, −50). Constructores: <strong>Mercedes 262</strong> ante Ferrari 190 (−72), McLaren 141. Verstappen apenas P7 (55).</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Gran Premio de República Checa, Brno, 19–21.06.</strong> (formato sprint). Carrera dom 21.06. <strong>14:00 MESZ / 09:00 BRT</strong>. Bezzecchi lidera el campeonato con 180 pts.</li>\n      <li><span class=\"chip\">CAMPEONATO MOTOGP</span> <strong>Márquez consiguió sprint y carrera en Hungría</strong> (su 100ª victoria en GP) — tras crash de Aprilia de Martín/Bezzecchi en la vuelta 1. Situación tras carrera 8 (07.06.).</li>\n      <li><span class=\"chip\">PRÓXIMA F1</span> <strong>Gran Premio de Austria (carrera 8/24), Red Bull Ring</strong>, 26–28.06., sin sprint. Carrera dom 28.06. <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Dienstag, der 16. Juni. Der wichtigste Punkt heute ist ein Gesundheits-Alert: Paraná steht in der landesweiten SRAG-Statistik auf Alarmstufe, getrieben vom RS-Virus, das Babys unter vier Jahren am härtesten trifft. Mit einem einen Monat alten Mädchen im Haus ist das kein abstraktes Diagramm, sondern die Schutz-Frage der Woche. Daneben: das Wetter teilt sich (nasses Wochenende, trockenes So-Fenster), die Festa-Junina-Saison läuft auf Hochtouren, und Ribeirão Claros eigene Mega-Woche — die 28. FesCafé — rückt auf Anfang Juli.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>RSV/SRAG-Alert</strong>: Paraná auf Alarmstufe (InfoGripe SE 22/2026). VSR füllt die Kinderkliniken bei unter-4-Jährigen — Babyschutz-Routine jetzt anziehen.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>28ª FesCafé</strong>: 2.–5. Juli im Centro de Eventos Ribeirão Claro — Rodeio indoor, Parque de Diversões, Shows infantis, Fernando &amp; Sorocaba und Israel &amp; Rodolffo. Tickets noch nicht online.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina, Londrina</strong>: zwei Paróquias 19.–21.06., Iate Clube 27.06., Concha Acústica gratis 11.07. Lokal (Jacarezinho/Ribeirão Claro) bitte vor Ort prüfen.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Geteiltes Wochenende</strong>: Sa 20.06. 81 % Regen + Gewitter, So 21.06. trocken und sonnig — Outdoor-Pläne auf Sonntag legen.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Kälteeinbruch</strong>: zum Monatsende (27.–30.06.) Tiefstwerte bis 5 °C, Geada-Risiko — warme Schichten und Säuglings-Wärme im Blick behalten.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue weiter niedrig</strong>: Paraná −96 % Fälle ggü. 2025 (Stand SE 14/2026); aktuellstes Boletim nº 19 nur als PDF.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Winterferien PR</strong>: rede estadual 13.–24. Juli — passt zur FesCafé-Woche und ist das Planungsfenster für Juli-Trips.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Dienstag, der 16. Juni. Der wichtigste Punkt heute ist ein Gesundheits-Alert: Paraná steht in der landesweiten SRAG-Statistik auf Alarmstufe, getrieben vom RS-Virus, das Babys unter vier Jahren am härtesten trifft. Mit einem einen Monat alten Mädchen im Haus ist das kein abstraktes Diagramm, sondern die Schutz-Frage der Woche. Daneben: das Wetter teilt sich (nasses Wochenende, trockenes So-Fenster), die Festa-Junina-Saison läuft auf Hochtouren, und Ribeirão Claros eigene Mega-Woche — die 28. FesCafé — rückt auf Anfang Juli.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>RSV/SRAG-Alert</strong>: Paraná auf Alarmstufe (InfoGripe SE 22/2026). VSR füllt die Kinderkliniken bei unter-4-Jährigen — Babyschutz-Routine jetzt anziehen.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>28ª FesCafé</strong>: 2.–5. Juli im Centro de Eventos Ribeirão Claro — Rodeio indoor, Parque de Diversões, Shows infantis, Fernando &amp; Sorocaba und Israel &amp; Rodolffo. Tickets noch nicht online.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina, Londrina</strong>: zwei Paróquias 19.–21.06., Iate Clube 27.06., Concha Acústica gratis 11.07. Lokal (Jacarezinho/Ribeirão Claro) bitte vor Ort prüfen.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Geteiltes Wochenende</strong>: Sa 20.06. 81 % Regen + Gewitter, So 21.06. trocken und sonnig — Outdoor-Pläne auf Sonntag legen.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Kälteeinbruch</strong>: zum Monatsende (27.–30.06.) Tiefstwerte bis 5 °C, Geada-Risiko — warme Schichten und Säuglings-Wärme im Blick behalten.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue weiter niedrig</strong>: Paraná −96 % Fälle ggü. 2025 (Stand SE 14/2026); aktuellstes Boletim nº 19 nur als PDF.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Winterferien PR</strong>: rede estadual 13.–24. Juli — passt zur FesCafé-Woche und ist das Planungsfenster für Juli-Trips.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Tuesday, June 16th. The top priority today is a health alert: Paraná ranks at alarm level in the nationwide SRAG statistics, driven by RSV, which hits babies under four years hardest. With a one-month-old daughter in the house, that's no abstract chart — it's this week's protection question. On the side: weather splits (wet weekend, dry window), Festa Junina season in full swing, and Ribeirão Claro's own mega-week — the 28th FesCafé — moves into early July.</p>\n    <ul>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>RSV/SRAG alert</strong>: Paraná at alarm level (InfoGripe SE 22/2026). RSV fills pediatric wards for under-4s — tighten baby protection routine now.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>28th FesCafé</strong>: July 2–5 at Centro de Eventos Ribeirão Claro — indoor rodeo, amusement park, kids shows, Fernando &amp; Sorocaba and Israel &amp; Rodolffo. Tickets not yet online.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina, Londrina</strong>: two parishes June 19–21, Iate Clube June 27, Concha Acústica free July 11. Local (Jacarezinho/Ribeirão Claro) — check on the ground.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Split weekend</strong>: Sat June 20, 81% rain + thunderstorms; Sun June 21, dry and sunny — save outdoor plans for Sunday.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Cold snap</strong>: month-end (June 27–30) lows to 5 °C, frost risk — keep warm layers and infant warmth in mind.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue stays low</strong>: Paraná −96% cases vs. 2025 (as of SE 14/2026); latest bulletin no. 19 only as PDF.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Winter break PR</strong>: state schools July 13–24 — aligns with FesCafé week and is the window to plan July trips.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É terça-feira, 16 de junho. O ponto prioritário hoje é um alerta de saúde: o Paraná está em nível de alarme na estatística nacional de SRAG, impulsionado pelo VSR, que atinge mais duramente bebês menores de quatro anos. Com uma filha de um mês em casa, não é um gráfico abstrato — é a questão de proteção da semana. Além disso: o tempo se divide (fim de semana molhado, janela seca), a temporada de Festa Junina está em pleno vapor, e a própria megassemana de Ribeirão Claro — a 28ª FesCafé — se aproxima no início de julho.</p>\n    <ul>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Alerta VSR/SRAG</strong>: Paraná em nível de alarme (InfoGripe SE 22/2026). VSR enche enfermarias pediátricas em menores de 4 anos — aperte a rotina de proteção do bebê agora.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>28ª FesCafé</strong>: 2–5 de julho no Centro de Eventos Ribeirão Claro — rodeio coberto, parque de diversões, shows infantis, Fernando &amp; Sorocaba e Israel &amp; Rodolffo. Ingressos ainda não on-line.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Festa Junina, Londrina</strong>: duas paróquias 19–21 de junho, Iate Clube 27 de junho, Concha Acústica grátis 11 de julho. Local (Jacarezinho/Ribeirão Claro) — verifique no local.</li>\n      <li><span class=\"chip\">TEMPO</span> <strong>Fim de semana dividido</strong>: sábado 20/06, 81% de chuva + tempestades; domingo 21/06, seco e ensolarado — reserve planos ao ar livre para domingo.</li>\n      <li><span class=\"chip\">TEMPO</span> <strong>Queda de temperatura</strong>: final do mês (27–30/06) mínimas até 5 °C, risco de geada — mantenha camadas quentes e calor do bebê em mente.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue continua baixa</strong>: Paraná −96% de casos em relação a 2025 (até SE 14/2026); boletim mais recente nº 19 apenas em PDF.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Recesso escolar PR</strong>: rede estadual 13–24 de julho — alinha com semana da FesCafé e é a janela para planejar viagens de julho.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es martes, 16 de junio. La prioridad hoy es una alerta de salud: Paraná está en nivel de alarma en la estadística nacional de SRAG, impulsada por VRS, que afecta más duramente a bebés menores de cuatro años. Con una hija de un mes en casa, no es un gráfico abstracto — es la pregunta de protección de la semana. Además: el clima se divide (fin de semana mojado, ventana seca), la temporada de Festa Junina en pleno apogeo, y la propia megasemana de Ribeirão Claro — la 28ª FesCafé — se acerca a principios de julio.</p>\n    <ul>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Alerta VRS/SRAG</strong>: Paraná en nivel de alarma (InfoGripe SE 22/2026). VRS llena salas pediátricas en menores de 4 años — aprieta la rutina de protección del bebé ahora.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>28ª FesCafé</strong>: 2–5 de julio en Centro de Eventos Ribeirão Claro — rodeo cubierto, parque de diversiones, shows infantiles, Fernando &amp; Sorocaba e Israel &amp; Rodolffo. Boletos aún no en línea.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Festa Junina, Londrina</strong>: dos parroquias 19–21 de junio, Iate Clube 27 de junio, Concha Acústica gratis 11 de julio. Local (Jacarezinho/Ribeirão Claro) — verifica en el lugar.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Fin de semana dividido</strong>: sábado 20/06, 81% lluvia + tormentas; domingo 21/06, seco y soleado — guarda planes al aire libre para domingo.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Ola de frío</strong>: final del mes (27–30/06) mínimas hasta 5 °C, riesgo de helada — mantén capas cálidas y calor del bebé en mente.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue sigue bajo</strong>: Paraná −96% casos vs. 2025 (al SE 14/2026); boletín más reciente nº 19 solo en PDF.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Receso escolar PR</strong>: rede estadual 13–24 de julio — se alinea con semana FesCafé y es la ventana para planear viajes de julio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Dienstag ist Technik-Tag — und diesmal geht es um die Werkzeuge, die dir die Arbeit abnehmen: KI-Assistenten, Automatisierung, Workflows. 15 Verben mit voller Konjugation (drei davon Wiederholung), dazu 20 Substantive &amp; Adjektive aus dem Dev-Alltag — in DE, EN, PT-BR und ES-MX nebeneinander. Heute lauern gleich drei fiese Konjugations-Fallen: das starke deutsche <strong>entwerfen</strong>, die spanischen/portugiesischen <em>-uir</em>-Verben (substituir/sustituir) und der e→i-Wechsel bei <em>sugerir</em>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>actual ≠ aktuell</strong> — engl. „actual\" und span. „actual\" heißen „tatsächlich/derzeitig\", nie „aktuell\" im deutschen Sinn. „la versión actual\" = die aktuelle Version.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>realizar ≠ realisieren</strong> — PT „realizar uma tarefa\" = eine Aufgabe <em>ausführen</em>, nicht „realisieren\" (= merken/begreifen).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>entwerfen</strong> ist stark: du entw<em>i</em>rfst, Präteritum <em>entwarf</em>, Perfekt <em>hat entworfen</em> — nicht „*entwurfte\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>sustituir / substituir</strong> schiebt ein <em>y</em>/i ein: yo sustitu<em>y</em>o (ES), eu substitu<em>o</em> (PT).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>sugerir</strong> wechselt den Stamm: ES yo sug<em>ie</em>ro / nosotros sug<em>e</em>rimos; PT eu sug<em>i</em>ro.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>aplicativo</strong> (BR), nicht „aplicação\" (EU-PT), für „App\". Und „o computador\", nie „la computadora\" — das ist Spanisch.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>gatilho</strong> = „Trigger/Auslöser\" im Alltags-Dev-Sprech; „acionar\" = den Trigger auslösen.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Prompt</strong> (m, geliehen) ↔ die formale <strong>Eingabeaufforderung</strong> (f). PT/ES: „o prompt\" / „el prompt\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>lokal ausführen</strong> = „executar localmente\" (PT) / „ejecutar localmente\" (ES) — Modell läuft auf deinem Rechner, nicht in der Cloud.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>-ieren-Verben</strong> bilden das Partizip <em>ohne</em> „ge-\": „hat automatisiert\", nie „*geautomatisiert\".</li>\n    </ul></div>",

r Prompt</strong> (m, geliehen) ↔ die formale <strong>Eingabeaufforderung</strong> (f). PT/ES: „o prompt\" / „el prompt\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>lokal ausführen</strong> = „executar localmente\" (PT) / „ejecutar localmente\" (ES) — Modell läuft auf deinem Rechner, nicht in der Cloud.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>-ieren-Verben</strong> bilden das Partizip <em>ohne</em> „ge-\": „hat automatisiert\", nie „*geautomatisiert\".</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Tuesday is tech day — and today we're diving into the tools that take work off your plate: AI assistants, automation, workflows. 15 verbs with full conjugation (three of them review), plus 20 nouns &amp; adjectives from dev life — in DE, EN, PT-BR, and ES-MX side by side. Watch out for three tricky conjugation traps today: the strong German <strong>entwerfen</strong>, the Spanish/Portuguese <em>-uir</em> verbs (substituir/sustituir), and the e→i stem change in <em>sugerir</em>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>actual ≠ aktuell</strong> — English \"actual\" and Spanish \"actual\" mean \"real/current\", never \"topical\" in the German sense. \"la versión actual\" = the current version.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>realizar ≠ realisieren</strong> — PT \"realizar uma tarefa\" = to <em>carry out</em> a task, not \"to realize\" (= to notice/understand).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>entwerfen</strong> is strong: du entw<em>i</em>rfst, past <em>entwarf</em>, perfect <em>hat entworfen</em> — never \"*entwurfte\".</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>sustituir / substituir</strong> inserts a <em>y</em>/i: yo sustitu<em>y</em>o (ES), eu substitu<em>o</em> (PT).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>sugerir</strong> changes its stem: ES yo sug<em>ie</em>ro / nosotros sug<em>e</em>rimos; PT eu sug<em>i</em>ro.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>aplicativo</strong> (BR), not \"aplicação\" (EU-PT), for \"app\". And \"o computador\", never \"la computadora\" — that's Spanish.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>gatilho</strong> = \"trigger\" in everyday dev talk; \"acionar\" = to fire the trigger.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>der Prompt</strong> (m, borrowed) ↔ the formal <strong>Eingabeaufforderung</strong> (f). PT/ES: \"o prompt\" / \"el prompt\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>lokal ausführen</strong> = \"executar localmente\" (PT) / \"ejecutar localmente\" (ES) — model runs on your machine, not in the cloud.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>-ieren verbs</strong> form the past participle <em>without</em> \"ge-\": \"hat automatisiert\", never \"*geautomatisiert\".</li>\n    </ul></div>",

trong>Eingabeaufforderung</strong> (f). PT/ES: \"o prompt\" / \"el prompt\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>lokal ausführen</strong> = \"executar localmente\" (PT) / \"ejecutar localmente\" (ES) — o modelo roda na sua máquina, não na nuvem.</li>\n      <li><span class=\"chip\">GÊNERO</span> <strong>verbos -ieren</strong> formam o particípio <em>sem</em> \"ge-\": \"hat automatisiert\", nunca \"*geautomatisiert\".</li>\n    </ul></div>",

prestado) ↔ la formal <strong>Eingabeaufforderung</strong> (f). PT/ES: \"o prompt\" / \"el prompt\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>lokal ausführen</strong> = \"executar localmente\" (PT) / \"ejecutar localmente\" (ES) — el modelo corre en tu máquina, no en la nube.</li>\n      <li><span class=\"chip\">GÉNERO</span> <strong>verbos -ieren</strong> forman el participio <em>sin</em> \"ge-\": \"hat automatisiert\", nunca \"*geautomatisiert\".</li>\n    </ul></div>"
