<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

        "de": "<div class=\"tldr\"><p class=\"lead\">Der Doppel-Notenbanktag gestern war das wichtigste FX-Ereignis seit Wochen — und er zieht in beide Richtungen. Die brasilianische Zentralbank hat zwar gesenkt, aber den Ton verschärft (gut für den Real). Die Fed hat gehalten, aber ebenfalls falkenhaft gedreht (gut für den Dollar). Für deine EUR/BRL-Rechnung heben sich die beiden BRL-Effekte teils auf — entscheidend wird, was der Euro gegen den Dollar macht.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ECB-Fix 5,8929</strong> (17.06., ~16:00 CET / 11:00 BRT). Kreuzkurs-Check perfekt konsistent (Abweichung 0,001 %), kein Flag.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>COPOM senkt Selic auf 14,25 %</strong> (−25 bp), aber <em>falkenhaft</em>: Versprechen weiterer Senkungen gestrichen, 2026er-Inflationsprognose auf 5,2 % angehoben.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed hält 3,50–3,75 %</strong> an Warshs Debüt — Dot-Plot dreht falkenhaft: 9 von 18 sehen 2026 eine <em>Erhöhung</em>, Median-Endstand jetzt 3,8 %.</li>\n      <li><span class=\"chip\">USA</span> <strong>Wall Street kippt</strong>: S&amp;P −1,21 %, Nasdaq −1,34 %, Dow −507 Pkt — schärfste Reaktion auf das Debüt eines Fed-Chefs seit 1994.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Hormus wieder offen</strong>: nach dem US-Iran-Deal (15.06.) fällt Brent auf 77,57 $ (−2,49 %) — Disinflations-Rückenwind auf Wochensicht.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,59 (+0,50 %)</strong> nach dem Fed-Entscheid — fester Dollar drückt tendenziell auf BRL und EUR/USD.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiskal bleibt der Bremsklotz</strong>: Bruttoschuld 80,4 % des BIP (April), Primärdefizit −0,97 % — limitiert, wie weit der Real von der COPOM-Härte profitieren kann.</li>\n      <li><span class=\"chip\">FX</span> <strong>Prognose-Bias diese Woche: seitwärts-leicht-fest, 5,84–5,92.</strong> Wahrscheinlichkeiten = meine Konfidenz, nicht markt-implizit.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday's dual central bank day was the most significant FX event in weeks — and it cuts both ways. Brazil's central bank did cut, but hardened its tone (good for the real). The Fed held, but also turned hawkish (good for the dollar). For your EUR/BRL calculation, the two BRL effects partially offset — what matters is what the euro does against the dollar.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ECB fix 5.8929</strong> (06.17, ~16:00 CET / 11:00 BRT). Cross-check perfect consistency (0.001 % deviation), no flag.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>COPOM cuts Selic to 14.25 %</strong> (−25 bp), but <em>hawkish</em>: forward guidance removed, 2026 inflation forecast raised to 5.2 %.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed holds 3.50–3.75 %</strong> at Warsh's debut — Dot-Plot turns hawkish: 9 of 18 now see a <em>hike</em> in 2026, median endpoint now 3.8 %.</li>\n      <li><span class=\"chip\">USA</span> <strong>Wall Street tumbles</strong>: S&amp;P −1.21 %, Nasdaq −1.34 %, Dow −507 pts — sharpest reaction to a Fed chair debut since 1994.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Hormuz open again</strong>: following the US-Iran deal (06.15), Brent falls to 77.57 $ (−2.49 %) — disinflationary tailwind on the week.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.59 (+0.50 %)</strong> after Fed decision — stronger dollar pressures BRL and EUR/USD.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal remains the brake</strong>: gross debt 80.4 % of GDP (April), primary deficit −0.97 % — limits how much the real can gain from COPOM hardness.</li>\n      <li><span class=\"chip\">FX</span> <strong>Forecast bias this week: sideways-to-firm, 5.84–5.92.</strong> Probabilities = my confidence, not market-implied.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O dia duplo do banco central ontem foi o evento de câmbio mais importante em semanas — e ele corta em ambas as direções. O banco central do Brasil cortou, mas endureceu o tom (bom para o real). O Fed se manteve, mas também virou para o lado falcão (bom para o dólar). Para sua conta EUR/BRL, os dois efeitos no real se anulam parcialmente — o que importa é o que o euro faz contra o dólar.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ECB-Fix 5,8929</strong> (17.06., ~16:00 CET / 11:00 BRT). Verificação cruzada perfeitamente consistente (desvio 0,001 %), sem sinalizador.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>COPOM reduz Selic para 14,25 %</strong> (−25 bp), mas <em>falcão</em>: promessa de novos cortes removida, previsão de inflação 2026 elevada para 5,2 %.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed mantém 3,50–3,75 %</strong> na estreia de Warsh — Dot-Plot vira falcão: 9 de 18 veem <em>alta</em> em 2026, ponto final da mediana agora 3,8 %.</li>\n      <li><span class=\"chip\">USA</span> <strong>Wall Street desaba</strong>: S&amp;P −1,21 %, Nasdaq −1,34 %, Dow −507 pts — reação mais acentuada ao debut de um presidente do Fed desde 1994.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Hormuz aberto novamente</strong>: após acordo EUA-Irã (15.06.), Brent cai para 77,57 $ (−2,49 %) — vento de desinflação na semana.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,59 (+0,50 %)</strong> após decisão do Fed — dólar mais forte pressiona BRL e EUR/USD.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal continua como freio</strong>: dívida bruta 80,4 % do PIB (abril), déficit primário −0,97 % — limita quanto o real pode ganhar com dureza da COPOM.</li>\n      <li><span class=\"chip\">FX</span> <strong>Viés de previsão esta semana: lateral-ligeiramente firme, 5,84–5,92.</strong> Probabilidades = minha confiança, não implícita no mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día dual del banco central ayer fue el evento de divisas más importante en semanas — y corta en ambas direcciones. El banco central de Brasil sí cortó, pero endurecio el tono (bueno para el real). La Fed se mantuvo, pero también giró hacia el halcón (bueno para el dólar). Para tu cálculo EUR/BRL, los dos efectos en el real se anulan parcialmente — lo que importa es qué hace el euro contra el dólar.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ECB-Fix 5,8929</strong> (17.06., ~16:00 CET / 11:00 BRT). Verificación cruzada perfectamente consistente (desviación 0,001 %), sin bandera.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>COPOM reduce Selic a 14,25 %</strong> (−25 bp), pero <em>halcón</em>: promesa de futuros cortes removida, pronóstico de inflación 2026 elevado a 5,2 %.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed se mantiene en 3,50–3,75 %</strong> en debut de Warsh — Dot-Plot gira halcón: 9 de 18 ven <em>alza</em> en 2026, punto final de mediana ahora 3,8 %.</li>\n      <li><span class=\"chip\">USA</span> <strong>Wall Street colapsa</strong>: S&amp;P −1,21 %, Nasdaq −1,34 %, Dow −507 pts — reacción más aguda al debut de un presidente de la Fed desde 1994.</li>\n      <li><span class=\"chip good\">Global</span> <strong>Ormuz abierto de nuevo</strong>: tras el acuerdo EUA-Irán (15.06.), Brent cae a 77,57 $ (−2,49 %) — vientos de desinflación en la semana.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,59 (+0,50 %)</strong> tras decisión de la Fed — dólar más fuerte presiona BRL y EUR/USD.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal sigue siendo el freno</strong>: deuda bruta 80,4 % del PIB (abril), déficit primario −0,97 % — limita cuánto el real puede ganar de la dureza de COPOM.</li>\n      <li><span class=\"chip\">FX</span> <strong>Sesgo de pronóstico esta semana: lateral-levemente firme, 5,84–5,92.</strong>       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Donnerstag, der 18.06. — der Tag danach. <strong>Kevin Warshs erster Fed-Entscheid ist gestern (17.06.) gelandet, und er war hawkisch:</strong> Zins-Halten bei <strong>3,50–3,75 %</strong> (einstimmig 12:0), aber der aktualisierte Dot-Plot hob den Median-Pfad für Ende 2026 auf <strong>3,8 %</strong> (von 3,4 % im März) — 9 von 18 Mitgliedern sehen jetzt mindestens eine <em>Erhöhung</em>, und das Statement strich die letzte Sprach-Andeutung in Richtung Lockerung.<sup>[1][2]</sup> Die Reaktion war ein breiter Ausverkauf: <strong>S&amp;P 500 −1,21 % auf 7.420, Nasdaq 100 (NDX) −0,99 %</strong>, angeführt von der Mag-7 — <strong>META −5,44 %, MSFT −3,79 %, AMZN −3,46 %, GOOGL −2,53 %, TSLA −2,05 %, NVDA −1,33 %</strong>.<sup>[3][4]</sup> Vorbörslich heute (18.06.) erholt sich alles vorsichtig (+0,5 bis +1,1 %), aber das ändert nichts am neuen Regime: höher für länger.<sup>[3]</sup> Krypto leidet als Long-Duration-Risiko zuerst — <strong>BTC ~64.311 $</strong> (−0,9 % auf 24 h, aber +2,3 % auf 7 Tage), <strong>ETH ~1.745 $</strong> (+5,2 % auf 7 Tage); die Bitcoin-ETFs flossen die <strong>dritte Woche in Folge ab (−1,67 Mrd. $)</strong>, der Fear-&amp;-Greed-Index steht bei 23 (extreme Angst).<sup>[5][6]</sup> Rohstoffe gehen den anderen Weg: Der US-Iran-Vertrag (Unterzeichnung morgen, 19.06., Schweiz) hat die Angst-Prämie verdampft — <strong>Brent ~77,66 $, WTI ~74,79 $</strong> (tiefster Stand seit Anfang März), <strong>Gold ~4.267 $</strong> (+0,18 % am Tag, aber −4,93 % im Monat).<sup>[7][8][9]</sup> Roter Faden: Der Katalysator ist durch, die Richtung steht — höher-für-länger drückt Wachstums-Bewertungen und Krypto, billiges Öl ist der disinflationäre Gegenpol. Empfehlungen unten richten sich am neuen Dot-Plot und an der Iran-Unterzeichnung morgen aus.</p>\n    <ul>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>Warshs erster Entscheid war hawkisch: Hold bei 3,50–3,75 %, aber Dot-Median auf 3,8 % gehoben (von 3,4 %), 9/18 sehen ≥1 Erhöhung</strong> — das Statement strich die dovische Andeutung, Warshs Antritts-Botschaft ist „höher für länger\". Der Markt hatte ein neutrales Halten erwartet; der angehobene Dot-Plot war die Überraschung und löste den Ausverkauf aus.</li>\n      <li><span class=\"chip hot\">BIG TECH</span> <strong>Mag-7 führt den Ausverkauf an: META −5,44 %, MSFT −3,79 %, AMZN −3,46 % am 17.06.</strong> — S&amp;P −1,21 % (7.420), Nasdaq 100 (NDX) −0,99 % (zweiter Verlusttag in Folge). Höhere-für-länger-Zinsen treffen Wachstums-Bewertungen am härtesten. Vorbörslich 18.06. erholen sich alle leicht (+0,5 bis +1,1 %), aber das ist Stabilisierung, keine Wende.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA hat am 15./16.06. eine Anleihe über 25 Mrd. $ begeben — erste Schulden seit 2021, Orderbuch ~85 Mrd. $</strong>: Der Chip-Riese (Market-Cap ~4,96 Bio. $) finanziert seine KI-Infrastruktur-Offensive damit erstmals seit vier Jahren auch über den Anleihemarkt statt nur aus dem Cashflow — die 3,4-fache Überzeichnung zeigt, wie stark die Nachfrage nach NVDA-Papier ist. NVDA hielt sich gestern mit −1,33 % relativ gut; Quartalszahlen am 26.08.</li>\n      <li><span class=\"chip good\">KRYPTO-CORE</span> <strong>BTC ~64.311 $ (−0,9 % 24 h / +2,3 % 7 Tage), ETF-Abfluss dritte Woche in Folge (−1,67 Mrd. $)</strong>: Über drei Wochen flossen 4,21 Mrd. $ aus den Bitcoin-Fonds ab. Der Fear-&amp;-Greed-Index steht bei 23 (extreme Angst), nur 33 % bullisch. ETH ~1.745 $ (+5,2 % auf 7 Tage) hält sich relativ besser. Der hawkische Dot-Plot ist Gegenwind für die ganze Risk-on-Klasse.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~77,66 $ (−2,37 %), WTI ~74,79 $ (−2,61 %) — Iran-Entspannung drückt, Unterzeichnung morgen</strong>: Der US-Iran-Vertrag (formelle Unterzeichnung 19.06. in der Schweiz) öffnet die Straße von Hormus und löst US-Sanktions-Ausnahmen für iranisches Öl aus. WTI auf dem tiefsten Stand seit Anfang März; die IEA warnt vor einem strukturellen Angebots-Überschuss bis 2027.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>~4.267 $ (+0,18 % am Tag, −4,93 % im Monat, aber +26,6 % im Jahr)</strong>: Der hawkische Warsh-Fed (Inflation „mehrere Jahre\" über dem 2-%-Ziel) drückte Gold, die Iran-Entspannung nahm zusätzlich Krisen-Prämie raus. Der langfristige Notenbank-/Diversifizierungs-Treiber bleibt aber intakt — +26,6 % im Jahresvergleich, ATH 5.608 $ im Januar.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>AI-Token gegen den Strom: TAO ~239,76 $ (+5,25 %), FET ~0,20 $ (+2,79 %), NEAR ~2,21 $ (+2,97 %)</strong>: Während BTC/ETH am Boden klebten, liefen dezentrale-KI-Token grün. DOGE ~0,085 $ (−1,2 %), SHIB ~0,0000049 $ (−1,46 %). RENDER ~1,70 $ flach. Reines Risk-on-Beta — am Tag nach einem hawkischen Dot-Plot kein Boden. PEPE/BONK/IMX/FLOKI heute ohne sauberen Cross-Check-Preis — weggelassen statt geraten.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Thursday, June 18th — the day after. <strong>Kevin Warsh's first Fed decision landed yesterday (6/17), and it was hawkish:</strong> rate hold at <strong>3.50–3.75 %</strong> (unanimous 12:0), but the updated dot plot lifted the median path for end-2026 to <strong>3.8 %</strong> (from 3.4 % in March) — nine of eighteen members now see at least one <em>rate hike</em>, and the statement removed the last dovish language hint toward easing.<sup>[1][2]</sup> The reaction was a broad selloff: <strong>S&amp;P 500 −1.21 % to 7,420, Nasdaq 100 (NDX) −0.99 %</strong>, led by Mag-7 — <strong>META −5.44 %, MSFT −3.79 %, AMZN −3.46 %, GOOGL −2.53 %, TSLA −2.05 %, NVDA −1.33 %</strong>.<sup>[3][4]</sup> Pre-market today (6/18) everything recovers cautiously (+0.5 to +1.1 %), but that changes nothing in the new regime: higher for longer.<sup>[3]</sup> Crypto suffers as a long-duration risk first — <strong>BTC ~$64,311</strong> (−0.9 % on 24 h, but +2.3 % on 7 d), <strong>ETH ~$1,745</strong> (+5.2 % on 7 d); Bitcoin ETFs saw outflows for the <strong>third straight week (−$1.67 B)</strong>, Fear &amp; Greed index at 23 (extreme fear).<sup>[5][6]</sup> Commodities go the other way: the US-Iran deal (signing tomorrow, 6/19, Switzerland) has evaporated fear premium — <strong>Brent ~$77.66, WTI ~$74.79</strong> (lowest since early March), <strong>Gold ~$4,267</strong> (+0.18 % on day, but −4.93 % on month).<sup>[7][8][9]</sup> Through-line: the catalyst is done, the direction is set — higher-for-longer crushes growth valuations and crypto, cheap oil is the disinflationary counterweight. Recommendations below are keyed to the new dot plot and tomorrow's Iran signing.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Warsh's first decision was hawkish: hold at 3.50–3.75 %, but dot median raised to 3.8 % (from 3.4 %), 9/18 see ≥1 hike</strong> — the statement removed the dovish hint, Warsh's opening message is \"higher for longer\". The market expected a neutral hold; the raised dot plot was the surprise and triggered the selloff.</li>\n      <li><span class=\"chip hot\">BIG TECH</span> <strong>Mag-7 leads the selloff: META −5.44 %, MSFT −3.79 %, AMZN −3.46 % on 6/17.</strong> — S&amp;P −1.21 % (7,420), Nasdaq 100 (NDX) −0.99 % (second down day in a row). Higher-for-longer rates hit growth valuations hardest. Pre-market 6/18 all recover slightly (+0.5 to +1.1 %), but that's stabilization, not a turn.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA priced a $25 B bond on Jun 15–16 (order book ~$85 B, 3.4× oversubscribed, first since 2021)</strong>: The chip giant (market cap ~$4.96 T) financed its AI infrastructure push for the first time in four years via the bond market instead of pure cash flow — the massive oversubscription shows demand for NVDA paper remains intense despite the market backdrop. NVDA held up yesterday at −1.33 %; earnings on 8/26.</li>\n      <li><span class=\"chip good\">CRYPTO-CORE</span> <strong>BTC ~$64,311 (−0.9 % 24 h / +2.3 % 7 d), ETF outflow third straight week (−$1.67 B)</strong>: Over three weeks, $4.21 B flowed out of Bitcoin funds. Fear &amp; Greed Index at 23 (extreme fear), only 33 % bullish. ETH ~$1,745 (+5.2 % on 7 d) holding up relatively better. The hawkish dot plot is headwind for the whole risk-on class.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$77.66 (−2.37 %), WTI ~$74.79 (−2.61 %) — Iran thaw pushing down, signing tomorrow</strong>: The US-Iran deal (formal signing 6/19 in Switzerland) opens the Strait of Hormuz and triggers US sanction waivers for Iranian oil. WTI at lowest level since early March; the IEA warns of structural supply surplus through 2027.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>~$4,267 (+0.18 % on day, −4.93 % on month, but +26.6 % on year)</strong>: Hawkish Warsh Fed (inflation \"several years\" above 2 % target) pushed gold lower, Iran thaw stripped out additional crisis premium. The structural driver — central bank buying and portfolio diversification — stays intact — +26.6 % year-over-year, all-time high $5,608 in January.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>AI tokens bucking the trend: TAO ~$239.76 (+5.25 %), FET ~$0.20 (+2.79 %), NEAR ~$2.21 (+2.97 %)</strong>: While BTC/ETH stuck to the floor, decentralized-AI tokens ran green. DOGE ~$0.085 (−1.2 %), SHIB ~$0.0000049 (−1.46 %). RENDER ~$1.70 flat. Pure risk-on beta — no bottom the day after a hawkish dot plot. PEPE/BONK/IMX/FLOKI missing clean cross-check prices today — omitted rather than guessed.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É quinta-feira, 18 de junho — o dia seguinte. <strong>A primeira decisão de Kevin Warsh como presidente do Fed saiu ontem (17.06), e foi beligerante:</strong> manteve a taxa em <strong>3,50–3,75 %</strong> (unânime 12:0), mas o gráfico de pontos atualizado elevou a trajetória mediana para fim de 2026 a <strong>3,8 %</strong> (de 3,4 % em março) — nove dos dezoito membros agora veem pelo menos um <em>aumento</em> de taxa, e o comunicado removeu a última insinuação de lenidade.<sup>[1][2]</sup> A reação foi uma liquidação generalizada: <strong>S&amp;P 500 −1,21 % a 7.420, Nasdaq 100 (NDX) −0,99 %</strong>, liderada pela Mag-7 — <strong>META −5,44 %, MSFT −3,79 %, AMZN −3,46 %, GOOGL −2,53 %, TSLA −2,05 %, NVDA −1,33 %</strong>.<sup>[3][4]</sup> No pré-mercado hoje (18.06) tudo recupera cautelosamente (+0,5 a +1,1 %), mas isso não muda nada no novo regime: mais alto por mais tempo.<sup>[3]</sup> Cripto sofre como ativo de risco de longa duração primeiro — <strong>BTC ~64.311 $</strong> (−0,9 % em 24 h, mas +2,3 % em 7 dias), <strong>ETH ~1.745 $</strong> (+5,2 % em 7 dias); os ETFs de Bitcoin tiveram saídas pela <strong>terceira semana consecutiva (−1,67 bilhões $)</strong>, índice de Medo &amp; Ganância em 23 (medo extremo).<sup>[5][6]</sup> Commodities vão para o outro lado: o acordo EUA-Irã (assinatura amanhã, 19.06, Suíça) evaporou o prêmio de risco — <strong>Brent ~77,66 $, WTI ~74,79 $</strong> (piso desde início de março), <strong>Ouro ~4.267 $</strong> (+0,18 % no dia, mas −4,93 % no mês).<sup>[7][8][9]</sup> Fio condutor: o catalisador passou, a direção está definida — mais-alto-por-mais-tempo esmaga avaliações de crescimento e cripto, petróleo barato é o contrapeso desinflacionário. As recomendações abaixo estão alinhadas ao novo gráfico de pontos e à assinatura do Irã amanhã.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>A primeira decisão de Warsh foi beligerante: mantém em 3,50–3,75 %, mas mediana de pontos elevada a 3,8 % (de 3,4 %), 9/18 veem ≥1 aumento</strong> — o comunicado removeu a insinuação dovish, a mensagem inaugural de Warsh é \"mais alto por mais tempo\". O mercado esperava uma manutenção neutra; o gráfico de pontos elevado foi a surpresa e disparou a liquidação.</li>\n      <li><span class=\"chip hot\">BIG TECH</span> <strong>Mag-7 lidera a liquidação: META −5,44 %, MSFT −3,79 %, AMZN −3,46 % em 17.06.</strong> — S&amp;P −1,21 % (7.420), Nasdaq 100 (NDX) −0,99 % (segundo dia de queda seguido). Taxas mais-altas-por-mais-tempo atingem avaliações de crescimento com dureza. Pré-mercado 18.06 todos se recuperam um pouco (+0,5 a +1,1 %), mas isso é estabilização, não uma reviravolta.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA precificou uma emissão de títulos de 25 bilhões $ nos dias 15./16.06 (ordem ~85 bilhões $, 3,4x sobrescrita, primeira desde 2021)</strong>: O gigante de chips (cap de mercado ~4,96 trilhões $) financiou sua ofensiva de infraestrutura de IA pela primeira vez em quatro anos via mercado de títulos em vez de puro fluxo de caixa — a massiva sobrescrita mostra que a demanda por papéis de NVDA permanece intensa. NVDA se manteve bem ontem em −1,33 %; resultados em 26.08.</li>\n      <li><span class=\"chip good\">NÚCLEO-CRIPTO</span> <strong>BTC ~64.311 $ (−0,9 % 24 h / +2,3 % 7 dias), saída de ETF terceira semana consecutiva (−1,67 bilhões $)</strong>: Ao longo de três semanas, 4,21 bilhões $ saíram dos fundos Bitcoin. O Índice de Medo &amp; Ganância está em 23 (medo extremo), apenas 33 % estão bullish. ETH ~1.745 $ (+5,2 % em 7 dias) se mantém relativamente melhor. O gráfico de pontos beligerante é vento contrário para toda a classe de risco-on.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~77,66 $ (−2,37 %), WTI ~74,79 $ (−2,61 %) — amaciamento do Irã pressiona, assinatura amanhã</strong>: O acordo EUA-Irã (assinatura formal 19.06 na Suíça) abre o Estreito de Ormuz e dispara isenções de sanções dos EUA para petróleo iraniano. WTI no piso desde início de março; a AIE avisa de um excedente de oferta estrutural até 2027.</li>\n      <li><span class=\"chip\">OURO</span> <strong>~4.267 $ (+0,18 % no dia, −4,93 % no mês, mas +26,6 % no ano)</strong>: O Fed beligerante de Warsh (inflação \"vários anos\" acima da meta de 2 %) pressionou ouro, o amaciamento do Irã removeu prêmio de crise adicional. O impulsionador estrutural — compras do banco central e diversificação de portfólio — permanece intacto — +26,6 % em comparação anual, máxima de 5.608 $ em janeiro.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Tokens de IA contra a corrente: TAO ~239,76 $ (+5,25 %), FET ~0,20 $ (+2,79 %), NEAR ~2,21 $ (+2,97 %)</strong>: Enquanto BTC/ETH grudam no chão, tokens de IA descentralizada correram verdes. DOGE ~0,085 $ (−1,2 %), SHIB ~0,0000049 $ (−1,46 %). RENDER ~1,70 $ plano. Puro beta de risco-on — sem fundo o dia após um gráfico de pontos beligerante. PEPE/BONK/IMX/FLOKI hoje sem preços limpos de verificação cruzada — omitidos em vez de adivinhados.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es jueves, 18 de junio — el día después. <strong>La primera decisión de Kevin Warsh como presidente de la Fed salió ayer (17.06), y fue halcona:</strong> mantiene la tasa en <strong>3,50–3,75 %</strong> (unánime 12:0), pero el gráfico de puntos actualizado elevó la trayectoria mediana para fin de 2026 a <strong>3,8 %</strong> (de 3,4 % en marzo) — nueve de dieciocho miembros ahora ven al menos un <em>aumento</em> de tasa, y la declaración eliminó la última insinuación de flexibilización.<sup>[1][2]</sup> La reacción fue una venta generalizada: <strong>S&amp;P 500 −1,21 % a 7.420, Nasdaq 100 (NDX) −0,99 %</strong>, liderada por Mag-7 — <strong>META −5,44 %, MSFT −3,79 %, AMZN −3,46 %, GOOGL −2,53 %, TSLA −2,05 %, NVDA −1,33 %</strong>.<sup>[3][4]</sup> En el pre-mercado hoy (18.06) todo se recupera cautelosamente (+0,5 a +1,1 %), pero eso no cambia nada en el nuevo régimen: más alto por más tiempo.<sup>[3]</sup> Cripto sufre como activo de riesgo de larga duración primero — <strong>BTC ~64.311 $</strong> (−0,9 % en 24 h, pero +2,3 % en 7 días), <strong>ETH ~1.745 $</strong> (+5,2 % en 7 días); los ETFs de Bitcoin tuvieron salidas por la <strong>tercera semana consecutiva (−1,67 mil millones $)</strong>, índice de Miedo &amp; Codicia en 23 (miedo extremo).<sup>[5][6]</sup> Commodities van al otro lado: el acuerdo EUA-Irán (firma mañana, 19.06, Suiza) evaporó la prima de riesgo — <strong>Brent ~77,66 $, WTI ~74,79 $</strong> (piso desde principios de marzo), <strong>Oro ~4.267 $</strong> (+0,18 % en el día, pero −4,93 % en el mes).<sup>[7][8][9]</sup> Hilo conductor: el catalizador pasó, la dirección está establecida — más-alto-por-más-tiempo aplasta valuaciones de crecimiento y cripto, petróleo barato es el contrapeso desinflacionario. Las recomendaciones abajo están alineadas al nuevo gráfico de puntos y a la firma de Irán mañana.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>La primera decisión de Warsh fue halcona: mantiene en 3,50–3,75 %, pero mediana de puntos elevada a 3,8 % (de 3,4 %), 9/18 ven ≥1 aumento</strong> — la declaración eliminó la insinuación dovish, el mensaje inaugural de Warsh es \"más alto por más tiempo\". El mercado esperaba un mantenimiento neutral; el gráfico de puntos elevado fue la sorpresa y disparó la venta.</li>\n      <li><span class=\"chip hot\">BIG TECH</span> <strong>Mag-7 lidera la venta: META −5,44 %, MSFT −3,79 %, AMZN −3,46 % en 17.06.</strong> — S&amp;P −1,21 % (7.420), Nasdaq 100 (NDX) −0,99 % (segundo día de baja seguido). Tasas más-altas-por-más-tiempo golpean valuaciones de crecimiento duramente. Pre-mercado 18.06 todos se recuperan un poco (+0,5 a +1,1 %), pero eso es estabilización, no un giro.</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA precificó una emisión de bonos de 25 mil millones $ en 15./16.06 (cartera de órdenes ~85 mil millones $, 3,4× sobresuscrita, primera desde 2021)</strong>: El gigante de chips (capitalización de mercado ~4,96 billones $) financió su ofensiva de infraestructura de IA por primera vez en cuatro años vía mercado de bonos. NVDA se mantuvo bien ayer en −1,33 %; ganancias recién el 26.08.</li>\n      <li><span class=\"chip good\">NÚCLEO-CRIPTO</span> <strong>BTC ~64.311 $ (−0,9 % 24 h / +2,3 % 7 días), salida de ETF tercera semana consecutiva (−1,67 mil millones $)</strong>: Durante tres semanas, 4,21 mil millones $ salieron de los fondos Bitcoin. El Índice de Miedo &amp; Codicia está en 23 (miedo extremo), apenas 33 % alcistas. ETH ~1.745 $ (+5,2 % en 7 días) se mantiene relativamente mejor. El gráfico de puntos halcón es viento contrario para toda la clase risk-on.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~77,66 $ (−2,37 %), WTI ~74,79 $ (−2,61 %) — alivio de Irán presiona, firma mañana</strong>: El acuerdo EUA-Irán (firma formal 19.06 en Suiza) abre el Estrecho de Ormuz y dispara exenciones de sanciones estadounidenses para petróleo iraní. WTI en piso desde principios de marzo; la AIE advierte de un excedente de oferta estructural hasta 2027.</li>\n      <li><span class=\"chip\">ORO</span> <strong>~4.267 $ (+0,18 % en el día, −4,93 % en el mes, pero +26,6 % en el año)</strong>: La Fed halcona de Warsh (inflación \"varios años\" arriba de la meta de 2 %) presionó oro, el alivio de Irán eliminó prima de crisis adicional. El impulsor estructural — compras de banco central y diversificación de cartera — permanece intacto — +26,6 % en comparación anual, máximo histórico 5.608 $ en enero.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Tokens de IA contra la corriente: TAO ~239,76 $ (+5,25 %), FET ~0,20 $ (+2,79 %), NEAR ~2,21 $ (+2,97 %)</strong>: Mientras BTC/ETH se adhieren al piso, tokens de IA descentralizada corrieron verde. DOGE ~0,085 $ (−1,2 %), SHIB ~0,0000049 $ (−1,46 %). RENDER ~1,70 $ plano. Puro beta risk-on — sin fondo el día después de un gráfico de puntos halcón. PEPE/BONK/IMX/FLOKI hoy sin precios de verificación cruzada limpia — omitidos en lugar de adivinados.</li>\n    </ul></div>"
