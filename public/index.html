      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein wuchtiges Coding-Wochenende: OpenAI hat am Freitag GPT-5.6 mit drei Stufen (Sol, Terra, Luna) in eine streng limitierte Preview geschickt, während Claude Fable 5 nach der Export-Kontroll-Verfügung weiter komplett offline ist. Wer heute ein Frontier-Coding-Modell braucht, das man auch buchen kann, landet faktisch bei Opus 4.8 — das aktive Spitzenmodell, weil die beiden besseren (Fable, Mythos) gesperrt bzw. nur teilrestauriert sind. Dazu eine still gestartete, aber strukturell wichtige Neuerung: die ARD-Spec macht MCP-Server für Agenten auffindbar.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong>: Preview für ~20 vorab freigegebene Partner. Sol führt Terminal-Bench 2.1 mit 91,91 % (Anbieter-Zahl) — aber <em>kein</em> SWE-Bench-Score veröffentlicht.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 weiter offline</strong>: Mythos 5 seit 27.06. nur teilrestauriert (US-Gov / Annex-A). Aktives Frontier-Fallback: <strong>Opus 4.8</strong> (88,6 % SWE-Bench Verified).</li>\n      <li><span class=\"chip good\">MCP</span> <strong>ARD-Spec</strong>: 11 Firmen (Google, Microsoft, GitHub, NVIDIA …) standardisieren, wie Agenten MCP-Server zur Laufzeit <em>finden</em>. Apache 2.0.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro GA rutscht auf Juli</strong> — weiter nur Vertex-Limited-Preview, null öffentliche Benchmarks. Vier Senior-DeepMind-Forscher zu Anthropic abgewandert.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code</strong>: verschachtelte Sub-Agenten (bis 5 Ebenen), <code>/rewind</code>, ~37 % weniger CPU beim Streaming, Auto-Mode blockt jetzt destruktive git-Befehle.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong> Automations + Computer-Use für Cloud-Agenten; <strong>OpenHands 1.40.0</strong> mit Multi-Modell-Discovery und zwei CVE-Fixes.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 (59,0 % SWE-Bench Pro, self-reported, 1M-Kontext) und Kimi K2.7 Code (30 % weniger Reasoning-Tokens).</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepsis-Hinweis</strong>: 99 von 100 SWE-Bench-Verified-Einträgen sind anbieter-gemeldet, nicht unabhängig verifiziert. Jede Zahl unten ist entsprechend gelabelt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein wuchtiges Coding-Wochenende: OpenAI hat am Freitag GPT-5.6 mit drei Stufen (Sol, Terra, Luna) in eine streng limitierte Preview geschickt, während Claude Fable 5 nach der Export-Kontroll-Verfügung weiter komplett offline ist. Wer heute ein Frontier-Coding-Modell braucht, das man auch buchen kann, landet faktisch bei Opus 4.8 — das aktive Spitzenmodell, weil die beiden besseren (Fable, Mythos) gesperrt bzw. nur teilrestauriert sind. Dazu eine still gestartete, aber strukturell wichtige Neuerung: die ARD-Spec macht MCP-Server für Agenten auffindbar.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong>: Preview für ~20 vorab freigegebene Partner. Sol führt Terminal-Bench 2.1 mit 91,91 % (Anbieter-Zahl) — aber <em>kein</em> SWE-Bench-Score veröffentlicht.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 weiter offline</strong>: Mythos 5 seit 27.06. nur teilrestauriert (US-Gov / Annex-A). Aktives Frontier-Fallback: <strong>Opus 4.8</strong> (88,6 % SWE-Bench Verified).</li>\n      <li><span class=\"chip good\">MCP</span> <strong>ARD-Spec</strong>: 11 Firmen (Google, Microsoft, GitHub, NVIDIA …) standardisieren, wie Agenten MCP-Server zur Laufzeit <em>finden</em>. Apache 2.0.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro GA rutscht auf Juli</strong> — weiter nur Vertex-Limited-Preview, null öffentliche Benchmarks. Vier Senior-DeepMind-Forscher zu Anthropic abgewandert.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code</strong>: verschachtelte Sub-Agenten (bis 5 Ebenen), <code>/rewind</code>, ~37 % weniger CPU beim Streaming, Auto-Mode blockt jetzt destruktive git-Befehle.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong> Automations + Computer-Use für Cloud-Agenten; <strong>OpenHands 1.40.0</strong> mit Multi-Modell-Discovery und zwei CVE-Fixes.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 (59,0 % SWE-Bench Pro, self-reported, 1M-Kontext) und Kimi K2.7 Code (30 % weniger Reasoning-Tokens).</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepsis-Hinweis</strong>: 99 von 100 SWE-Bench-Verified-Einträgen sind anbieter-gemeldet, nicht unabhängig verifiziert. Jede Zahl unten ist entsprechend gelabelt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A heavy coding weekend: OpenAI launched GPT-5.6 with three tiers (Sol, Terra, Luna) in a heavily restricted preview on Friday, while Claude Fable 5 remains completely offline following export-control orders. If you need a frontier coding model that's actually bookable today, you land on Opus 4.8 — the active top model, since the two better ones (Fable, Mythos) are blocked or only partially restored. Plus a quiet but structurally important update: the ARD spec makes MCP servers discoverable to agents at runtime.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong>: Preview for ~20 pre-approved partners. Sol leads Terminal-Bench 2.1 at 91.91 % (vendor number) — but <em>no</em> SWE-Bench score published.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 remains offline</strong>: Mythos 5 as of 06-27 only partially restored (US-Gov / Annex-A). Active frontier fallback: <strong>Opus 4.8</strong> (88.6 % SWE-Bench Verified).</li>\n      <li><span class=\"chip good\">MCP</span> <strong>ARD Spec</strong>: 11 companies (Google, Microsoft, GitHub, NVIDIA …) standardize how agents <em>discover</em> MCP servers at runtime. Apache 2.0.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro GA slips to July</strong> — still Vertex-Limited-Preview only, zero public benchmarks. Four senior DeepMind researchers defected to Anthropic.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code</strong>: nested sub-agents (up to 5 levels), <code>/rewind</code>, ~37 % less CPU during streaming, Auto-Mode now blocks destructive git commands.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong> Automations + Computer-Use for cloud agents; <strong>OpenHands 1.40.0</strong> with Multi-Model-Discovery and two CVE fixes.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 (59.0 % SWE-Bench Pro, self-reported, 1M context) and Kimi K2.7 Code (30 % fewer reasoning tokens).</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepticism note</strong>: 99 of 100 SWE-Bench-Verified entries are vendor-submitted, not independently verified. Every number below is labeled accordingly.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um fim de semana de programação pesado: OpenAI lançou GPT-5.6 com três camadas (Sol, Terra, Luna) em uma prévia severamente restrita na sexta-feira, enquanto Claude Fable 5 permanece completamente offline seguindo ordens de controle de exportação. Se você precisa de um modelo de programação na fronteira que seja realmente acessível hoje, você vai cair em Opus 4.8 — o modelo ativo de topo, já que os dois melhores (Fable, Mythos) estão bloqueados ou apenas parcialmente restaurados. Além disso, uma atualização silenciosa mas estruturalmente importante: a especificação ARD torna servidores MCP descobertos por agentes em tempo de execução.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong>: Prévia para ~20 parceiros pré-aprovados. Sol lidera Terminal-Bench 2.1 em 91,91 % (número do fornecedor) — mas <em>nenhuma</em> pontuação de SWE-Bench publicada.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 permanece offline</strong>: Mythos 5 a partir de 27.06. apenas parcialmente restaurado (US-Gov / Annex-A). Fallback ativo da fronteira: <strong>Opus 4.8</strong> (88,6 % SWE-Bench Verified).</li>\n      <li><span class=\"chip good\">MCP</span> <strong>Especificação ARD</strong>: 11 empresas (Google, Microsoft, GitHub, NVIDIA …) padronizam como agentes <em>descobrem</em> servidores MCP em tempo de execução. Apache 2.0.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro GA escorrega para julho</strong> — ainda apenas Vertex-Limited-Preview, zero benchmarks públicos. Quatro pesquisadores sênior da DeepMind desertaram para Anthropic.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code</strong>: sub-agentes aninhados (até 5 níveis), <code>/rewind</code>, ~37 % menos CPU durante streaming, Auto-Mode agora bloqueia comandos git destrutivos.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong> Automações + Computer-Use para agentes em nuvem; <strong>OpenHands 1.40.0</strong> com Multi-Model-Discovery e dois CVE fixes.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 (59,0 % SWE-Bench Pro, auto-relatado, contexto de 1M) e Kimi K2.7 Code (30 % menos tokens de raciocínio).</li>\n      <li><span class=\"chip\">Bench</span> <strong>Nota de ceticismo</strong>: 99 de 100 entradas SWE-Bench-Verified são enviadas por fornecedores, não verificadas independentemente. Cada número abaixo é rotulado de acordo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un fin de semana de programación pesado: OpenAI lanzó GPT-5.6 con tres niveles (Sol, Terra, Luna) en una vista previa muy restringida el viernes, mientras que Claude Fable 5 permanece completamente offline siguiendo órdenes de control de exportación. Si necesitas un modelo de programación de frontera que sea realmente accesible hoy, terminas en Opus 4.8 — el modelo activo principal, ya que los dos mejores (Fable, Mythos) están bloqueados o solo parcialmente restaurados. Además, una actualización silenciosa pero estructuralmente importante: la especificación ARD hace que los servidores MCP sean detectables por agentes en tiempo de ejecución.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong>: Vista previa para ~20 socios preaprobados. Sol lidera Terminal-Bench 2.1 con 91,91 % (número del proveedor) — pero <em>sin</em> puntuación de SWE-Bench publicada.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 permanece offline</strong>: Mythos 5 desde 27.06. solo parcialmente restaurado (US-Gov / Annex-A). Alternativa activa de frontera: <strong>Opus 4.8</strong> (88,6 % SWE-Bench Verified).</li>\n      <li><span class=\"chip good\">MCP</span> <strong>Especificación ARD</strong>: 11 empresas (Google, Microsoft, GitHub, NVIDIA …) estandarizan cómo los agentes <em>descubren</em> servidores MCP en tiempo de ejecución. Apache 2.0.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro GA se retrasa a julio</strong> — aún solo Vertex-Limited-Preview, cero benchmarks públicos. Cuatro investigadores sénior de DeepMind desertaron a Anthropic.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code</strong>: sub-agentes anidados (hasta 5 niveles), <code>/rewind</code>, ~37 % menos CPU al transmitir, Auto-Mode ahora bloquea comandos git destructivos.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong> Automaciones + Computer-Use para agentes en la nube; <strong>OpenHands 1.40.0</strong> con Multi-Model-Discovery y dos correcciones CVE.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 (59,0 % SWE-Bench Pro, auto-reportado, contexto de 1M) y Kimi K2.7 Code (30 % menos tokens de razonamiento).</li>\n      <li><span class=\"chip\">Bench</span> <strong>Nota de escepticismo</strong>: 99 de 100 entradas SWE-Bench-Verified son enviadas por proveedores, no verificadas independientemente. Cada número a continuación está etiquetado en consecuencia.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der DMA hat zum ersten Mal ein KI-Flaggschiff-Feature an Europas Grenze gestoppt: Apples neue Siri-KI kommt mit iOS 27 überall — nur nicht in der EU, und Apple nennt kein Datum. Daneben ein ruhiger, aber substanzieller Tag: Hollywood kauft sich KI-Werkzeuge ein, Werbe-Konzerne bauen agentische Pipelines, und aus Brasilien kommt mit einem 1,2-Mrd.-$-Legal-KI-Startup die spannendste twiceD-Vorlage seit Wochen.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>Siri-KI fällt in der EU aus</strong>: iOS 27, iPadOS 27 und watchOS 27 liefern die neue Siri-KI in Deutschland nicht aus — DMA-Streit, kein Zeitplan. macOS bleibt verschont.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Enter</strong>: brasilianisches Legal-KI-Startup auf 1,2 Mrd. $ Bewertung; 250 000+ Massen-Klagen 2026, Nubank +6 Prozentpunkte Gewinnquote. Founders Fund + Sequoia.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google DeepMind × A24</strong>: 75 Mio. $ für gemeinsame KI-Filmwerkzeuge (Storyboards) — non-exklusiv, ohne Zugriff auf A24s Filmkatalog.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Warner Bros. Discovery × AWS</strong>: agentische Werbe-Plattform auf Bedrock AgentCore + SageMaker; einheitliche Mediaplanung ab Q3 2026.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Zeta × Palantir</strong>: Marketing-Datenwolke auf Foundry; 100 Mio. $+ Jahresumsatz-Potenzial, ZETA-Aktie +5 %.</li>\n      <li><span class=\"chip hot\">POLICY · EU</span> <strong>EU AI Act</strong>: Transparenzpflichten (Chatbot-Hinweis, KI-Inhalts-Kennzeichnung) ab 02.08.2026 scharf; Hochrisiko-Frist auf Dez. 2027 verschoben.</li>\n      <li><span class=\"chip\">STUDY · global</span> <strong>Deloitte State of AI 2026</strong>: KI-Zugang der Belegschaft +50 % auf ~60 % — aber nur 25 % der Firmen haben 40 %+ ihrer Piloten produktiv. (Befragung Aug–Sep 2025.)</li>\n      <li><span class=\"chip good\">IDEE · DE</span> <strong>twiceD</strong>: 2 recherchierte Projekt-Ideen — Massen-Forderungs-KS für den Mittelstand, und ein Article-50-Compliance-Kit zum August-Stichtag.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der DMA hat zum ersten Mal ein KI-Flaggschiff-Feature an Europas Grenze gestoppt: Apples neue Siri-KI kommt mit iOS 27 überall — nur nicht in der EU, und Apple nennt kein Datum. Daneben ein ruhiger, aber substanzieller Tag: Hollywood kauft sich KI-Werkzeuge ein, Werbe-Konzerne bauen agentische Pipelines, und aus Brasilien kommt mit einem 1,2-Mrd.-$-Legal-KI-Startup die spannendste twiceD-Vorlage seit Wochen.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>Siri-KI fällt in der EU aus</strong>: iOS 27, iPadOS 27 und watchOS 27 liefern die neue Siri-KI in Deutschland nicht aus — DMA-Streit, kein Zeitplan. macOS bleibt verschont.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Enter</strong>: brasilianisches Legal-KI-Startup auf 1,2 Mrd. $ Bewertung; 250 000+ Massen-Klagen 2026, Nubank +6 Prozentpunkte Gewinnquote. Founders Fund + Sequoia.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google DeepMind × A24</strong>: 75 Mio. $ für gemeinsame KI-Filmwerkzeuge (Storyboards) — non-exklusiv, ohne Zugriff auf A24s Filmkatalog.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Warner Bros. Discovery × AWS</strong>: agentische Werbe-Plattform auf Bedrock AgentCore + SageMaker; einheitliche Mediaplanung ab Q3 2026.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Zeta × Palantir</strong>: Marketing-Datenwolke auf Foundry; 100 Mio. $+ Jahresumsatz-Potenzial, ZETA-Aktie +5 %.</li>\n      <li><span class=\"chip hot\">POLICY · EU</span> <strong>EU AI Act</strong>: Transparenzpflichten (Chatbot-Hinweis, KI-Inhalts-Kennzeichnung) ab 02.08.2026 scharf; Hochrisiko-Frist auf Dez. 2027 verschoben.</li>\n      <li><span class=\"chip\">STUDY · global</span> <strong>Deloitte State of AI 2026</strong>: KI-Zugang der Belegschaft +50 % auf ~60 % — aber nur 25 % der Firmen haben 40 %+ ihrer Piloten produktiv. (Befragung Aug–Sep 2025.)</li>\n      <li><span class=\"chip good\">IDEE · DE</span> <strong>twiceD</strong>: 2 recherchierte Projekt-Ideen — Massen-Forderungs-KS für den Mittelstand, und ein Article-50-Compliance-Kit zum August-Stichtag.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The DMA has stopped a flagship AI feature at Europe's border for the first time: Apple's new Siri AI launches worldwide on iOS 27 — except in the EU, with no timeline. Meanwhile, a quiet but substantive day: Hollywood is buying AI tools, ad firms are building agentic pipelines, and from Brazil comes the most compelling twiceD template in weeks — a 1.2 billion dollar legal AI startup.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>Siri AI blocked in the EU</strong>: iOS 27, iPadOS 27, and watchOS 27 won't deliver the new Siri AI in Germany — DMA dispute, no timeline. macOS is spared.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Enter</strong>: Brazilian legal-AI startup at 1.2 billion dollar valuation; 250,000+ mass litigation cases in 2026, Nubank +6 percentage points profit margin. Founders Fund + Sequoia.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google DeepMind × A24</strong>: 75 million dollars for joint AI film tools (storyboards) — non-exclusive, no access to A24's film catalog.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Warner Bros. Discovery × AWS</strong>: agentic ad platform on Bedrock AgentCore + SageMaker; unified media planning from Q3 2026.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Zeta × Palantir</strong>: Marketing data cloud on Foundry; 100 million dollar+ annual revenue potential, ZETA stock +5 %.</li>\n      <li><span class=\"chip hot\">POLICY · EU</span> <strong>EU AI Act</strong>: Transparency obligations (chatbot disclosure, AI-generated content labeling) in effect from August 2, 2026; high-risk deadline pushed to Dec. 2027.</li>\n      <li><span class=\"chip\">STUDY · global</span> <strong>Deloitte State of AI 2026</strong>: Workforce AI access +50 % to ~60 % — but only 25 % of companies have 40 %+ of their pilots in production. (Survey Aug–Sep 2025.)</li>\n      <li><span class=\"chip good\">IDEA · DE</span> <strong>twiceD</strong>: 2 researched project ideas — mass-demand defense AI for mid-market, and an Article 50 compliance kit for the August deadline.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O DMA parou um recurso de IA de ponta na fronteira europeia pela primeira vez: a nova Siri IA da Apple chega em todo o mundo no iOS 27 — exceto na UE, sem previsão. Enquanto isso, um dia tranquilo mas substancial: Hollywood compra ferramentas de IA, agências de publicidade constroem pipelines agentivos, e do Brasil vem o template twiceD mais interessante em semanas — uma startup de IA legal avaliada em 1,2 bilhão de dólares.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE/DE</span> <strong>Siri IA bloqueada na UE</strong>: iOS 27, iPadOS 27 e watchOS 27 não entregam a nova Siri IA na Alemanha — disputa do DMA, sem previsão. macOS se mantém protegido.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Enter</strong>: startup brasileira de IA legal com avaliação de 1,2 bilhão de dólares; mais de 250 mil casos de litígio em massa em 2026, Nubank +6 pontos percentuais de margem de lucro. Founders Fund + Sequoia.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google DeepMind × A24</strong>: 75 milhões de dólares para ferramentas de IA para filmes conjuntas (storyboards) — não-exclusivo, sem acesso ao catálogo de filmes da A24.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Warner Bros. Discovery × AWS</strong>: plataforma de publicidade agentiva em Bedrock AgentCore + SageMaker; planejamento de mídia unificado a partir do Q3 2026.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Zeta × Palantir</strong>: nuvem de dados de marketing em Foundry; potencial de 100 milhões de dólares+ de receita anual, ação ZETA +5 %.</li>\n      <li><span class=\"chip hot\">POLICY · UE</span> <strong>EU AI Act</strong>: obrigações de transparência (aviso de chatbot, marcação de conteúdo gerado por IA) em vigor a partir de 02/08/2026; prazo de alto risco adiado para dezembro de 2027.</li>\n      <li><span class=\"chip\">STUDY · global</span> <strong>Deloitte State of AI 2026</strong>: acesso de IA da força de trabalho +50 % para ~60 % — mas apenas 25 % das empresas têm 40 %+ de seus pilotos em produção. (Pesquisa ago–set 2025.)</li>\n      <li><span class=\"chip good\">IDEIA · DE</span> <strong>twiceD</strong>: 2 ideias de projeto pesquisadas — IA de defesa de demandas para o mercado intermediário, e um kit de conformidade do Artigo 50 para o prazo de agosto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La DMA detuvo un producto de IA estrella en la frontera europea por primera vez: la nueva Siri IA de Apple se lanza en todo el mundo en iOS 27 — excepto en la UE, sin línea de tiempo. Mientras tanto, un día tranquilo pero sustancial: Hollywood compra herramientas de IA, agencias publicitarias construyen canales agentivos, y desde Brasil llega la plantilla de twiceD más interesante en semanas — una startup de IA legal valorada en 1,2 mil millones de dólares.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE/DE</span> <strong>Siri IA bloqueada en la UE</strong>: iOS 27, iPadOS 27 y watchOS 27 no entregarán la nueva Siri IA en Alemania — disputa de la DMA, sin línea de tiempo. macOS se mantiene sin afectar.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Enter</strong>: startup brasileña de IA legal valorada en 1,2 mil millones de dólares; más de 250 mil casos de litigio masivo en 2026, Nubank +6 puntos porcentuales de margen de ganancia. Founders Fund + Sequoia.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google DeepMind × A24</strong>: 75 millones de dólares para herramientas de IA de películas conjuntas (guiones gráficos) — no exclusivo, sin acceso al catálogo de películas de A24.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Warner Bros. Discovery × AWS</strong>: plataforma de publicidad agentiva en Bedrock AgentCore + SageMaker; planificación de medios unificada a partir del Q3 2026.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Zeta × Palantir</strong>: nube de datos de marketing en Foundry; potencial de 100 millones de dólares+ de ingresos anuales, acción ZETA +5 %.</li>\n      <li><span class=\"chip hot\">POLICY · UE</span> <strong>EU AI Act</strong>: obligaciones de transparencia (aviso de chatbot, etiquetado de contenido generado por IA) en vigor a partir del 02/08/2026; plazo de alto riesgo pospuesto para diciembre de 2027.</li>\n      <li><span class=\"chip\">STUDY · global</span> <strong>Deloitte State of AI 2026</strong>: acceso de IA de la fuerza laboral +50 % a ~60 % — pero solo el 25 % de las empresas tienen 40 %+ de sus pilotos en producción. (Encuesta ago–sep 2025.)</li>\n      <li><span class=\"chip good\">IDEA · DE</span> <strong>twiceD</strong>: 2 ideas de proyecto investigadas — IA de defensa de demandas para el mercado medio, y un kit de cumplimiento del Artículo 50 para la fecha límite de agosto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der DACH-Freelancer-Markt dreht 2026 erstmals ins Negative — der Freelancer-Kompass meldet den ersten Durchschnitts-Rückgang seit über einem Jahrzehnt, und fast jeder Vierte hatte zuletzt weniger als 50 bezahlte Arbeitstage. Aber das ist ein Durchschnitt über alle Skills. Daniels Revier — Senior Java/Spring + Full-Stack Java/Angular — bleibt das dichteste Segment im Board: 64 der 81 Listings stammen allein aus dem Java/Spring-Strom. Soft im Mittel, dicht in der Nische.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Top-Fit heute:</strong> iSAX (Java/Spring/Angular + Auth, 100% Remote Frankfurt, Fit 90) führt vor iSAX Consulting (Backend-Microservices, 90% Remote, 41 Monate, 89).</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Lange Laufzeiten:</strong> teclift (Fullstack Java/Spring/Angular, 12 Monate+, Fit 88) und RED SAP Solutions (2 Jahre, 100% Remote Berlin, Juli-Start, 87) bieten Planbarkeit.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Erster Rate-Rückgang:</strong> Schnitt ~103 €/h, −1 % YoY — kein Crash, aber die erste Trendwende seit 10+ Jahren. Standard-Band heute 90–120 €/h*.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Auslastung schwach:</strong> 24 % der Freelancer hatten zuletzt &lt;50 bezahlte Tage; Monatsumsatz im Schnitt von €8.022 auf €6.653 gefallen (~−17 % YoY).</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Über Band:</strong> E-Mobility (Computer Futures, EU-Remote) und Automotive (HENNING, Ingolstadt) bei 100–130 €/h* — die Nische zahlt weiter Premium.</li>\n      <li><span class=\"chip good\">Intriguing</span> <strong>JetBrains 6× IntelliJ-AI:</strong> agentic-IDE-Rollen in Berlin/Munich/EU, alle live über greenhouse.io bestätigt — Frontier-Coding-Tooling im DACH-Raum.</li>\n      <li><span class=\"chip good\">AI-Integration</span> <strong>Camunda Agentic:</strong> Senior SWE Enterprise Agentic Automation (Remote EMEA, £90,3k–148,5k) mit Java + LangChain4j — produktnahe Workflow-AI.</li>\n      <li><span class=\"chip\">Employee</span> <strong>DACH-AI-Cluster:</strong> Camunda Backend (€77,4k–128,1k) + Engineering Operations (€92,9k–153,7k) + Aleph Alpha Java (Heidelberg, Gehalt n/a).</li>\n      <li><span class=\"chip\">TED</span> <strong>Spur 3:</strong> Heute keine verifizierte TED-Ausschreibung im Filter — siehe Hinweis unten.</li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute beginnt mit Südafrika–Kanada das WM-Sechzehntelfinale (Round of 32, die neue erste K.-o.-Runde) — und für Daniel laufen die zwei wichtigsten Spiele beide morgen, Montag: Deutschland trifft 22:30 MESZ / 17:30 BRT auf Paraguay, Brasilien schon 19:00 MESZ / 14:00 BRT auf Japan. Beides sind Vorschauen — angepfiffen wird erst morgen, hier steht kein Ergebnis, das es noch nicht gibt. Dazu SC Freiburg im Umbruch: Doan und Röhl raus, zwei Japaner und ein Keeper rein. Und der Bundesliga-Spielplan kommt am Donnerstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland – Paraguay</strong>: WM-Sechzehntelfinale (Round of 32) Mo 29.06., 22:30 MESZ / 17:30 BRT, Gillette Stadium (Boston). DFB als Gruppensieger trotz 1:2 gegen Ecuador.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasilien – Japan</strong>: Mo 29.06., 19:00 MESZ / 14:00 BRT, NRG Stadium (Houston). Seleção ungeschlagen, Vinícius mit vier Toren.</li>\n      <li><span class=\"chip\">WM</span> <strong>Round of 32 startet heute</strong>: Südafrika – Kanada, So 28.06., 21:00 MESZ / 16:00 BRT (SoFi Stadium) — Auftakt der neuen 32er-K.o.-Runde im 48-Team-Format.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg verkauft Doan</strong> für 21 Mio. € nach Frankfurt und Röhl für 25 Mio. € nach Everton.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt zwei</strong>: Keeper Mio Backhaus (12 Mio. €, Bremen) und Stürmer Keisuke Goto (10 Mio. €, Anderlecht). Transfer-Saldo nahezu ausgeglichen.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Spielplan-Release Do 02.07.</strong> — Saisonstart erst 28.08. (eine Woche später wegen der WM).</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale (Round of 16)</strong> ab Sa 04.07., das Finale am So 19.07.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute beginnt mit Südafrika–Kanada das WM-Sechzehntelfinale (Round of 32, die neue erste K.-o.-Runde) — und für Daniel laufen die zwei wichtigsten Spiele beide morgen, Montag: Deutschland trifft 22:30 MESZ / 17:30 BRT auf Paraguay, Brasilien schon 19:00 MESZ / 14:00 BRT auf Japan. Beides sind Vorschauen — angepfiffen wird erst morgen, hier steht kein Ergebnis, das es noch nicht gibt. Dazu SC Freiburg im Umbruch: Doan und Röhl raus, zwei Japaner und ein Keeper rein. Und der Bundesliga-Spielplan kommt am Donnerstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland – Paraguay</strong>: WM-Sechzehntelfinale (Round of 32) Mo 29.06., 22:30 MESZ / 17:30 BRT, Gillette Stadium (Boston). DFB als Gruppensieger trotz 1:2 gegen Ecuador.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasilien – Japan</strong>: Mo 29.06., 19:00 MESZ / 14:00 BRT, NRG Stadium (Houston). Seleção ungeschlagen, Vinícius mit vier Toren.</li>\n      <li><span class=\"chip\">WM</span> <strong>Round of 32 startet heute</strong>: Südafrika – Kanada, So 28.06., 21:00 MESZ / 16:00 BRT (SoFi Stadium) — Auftakt der neuen 32er-K.o.-Runde im 48-Team-Format.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg verkauft Doan</strong> für 21 Mio. € nach Frankfurt und Röhl für 25 Mio. € nach Everton.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt zwei</strong>: Keeper Mio Backhaus (12 Mio. €, Bremen) und Stürmer Keisuke Goto (10 Mio. €, Anderlecht). Transfer-Saldo nahezu ausgeglichen.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Spielplan-Release Do 02.07.</strong> — Saisonstart erst 28.08. (eine Woche später wegen der WM).</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale (Round of 16)</strong> ab Sa 04.07., das Finale am So 19.07.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today South Africa–Canada kicks off the World Cup Round of 32 (the new first knockout round) — and for Daniel the two most important matches both play tomorrow, Monday: Germany face Paraguay at 22:30 MESZ / 17:30 BRT, Brazil face Japan at 19:00 MESZ / 14:00 BRT. Both are previews — kickoff is tomorrow, so there's no result yet. Plus SC Freiburg in transition: Doan and Röhl out, two Japanese players and a goalkeeper in. And the Bundesliga fixture list comes Thursday.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany – Paraguay</strong>: World Cup Round of 32, Mon 06/29, 22:30 MESZ / 17:30 BRT, Gillette Stadium (Boston). DFB as group winners despite 1:2 vs Ecuador.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brazil – Japan</strong>: Mon 06/29, 19:00 MESZ / 14:00 BRT, NRG Stadium (Houston). Seleção unbeaten, Vinícius with four goals.</li>\n      <li><span class=\"chip\">WM</span> <strong>Round of 32 starts today</strong>: South Africa – Canada, Sun 06/28, 21:00 MESZ / 16:00 BRT (SoFi Stadium) — opening of the new 32-team knockout round in 48-team format.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg sells Doan</strong> for 21 million € to Frankfurt and Röhl for 25 million € to Everton.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg buys two</strong>: Goalkeeper Mio Backhaus (12 million €, Bremen) and striker Keisuke Goto (10 million €, Anderlecht). Transfer balance nearly even.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Fixture release Thu 07/02</strong> — season starts 08/28 (one week later due to World Cup).</li>\n      <li><span class=\"chip\">WM</span> <strong>Round of 16</strong> from Sat 07/04, final on Sun 07/19.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje começa com África do Sul contra Canadá a fase de 16-avos de final (Round of 32) da Copa do Mundo — e para Daniel os dois jogos mais importantes saem amanhã, segunda-feira: Alemanha enfrenta Paraguai às 22:30 MESZ / 17:30 BRT, Brasil enfrenta Japão às 19:00 MESZ / 14:00 BRT. Ambos são antecipações — o apito soa amanhã, então aqui não há resultado que ainda não existe. Além disso SC Freiburg em transição: Doan e Röhl saem, dois jogadores japoneses e um goleiro chegam. E o calendário da Bundesliga sai quinta-feira.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha – Paraguai</strong>: Oitavas da Copa do Mundo, seg 29.06., 22:30 MESZ / 17:30 BRT, Gillette Stadium (Boston). DFB como campeã do grupo apesar de 1:2 contra Equador.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasil – Japão</strong>: seg 29.06., 19:00 MESZ / 14:00 BRT, NRG Stadium (Houston). Seleção invicta, Vinícius com quatro gols.</li>\n      <li><span class=\"chip\">WM</span> <strong>Oitavas começam hoje</strong>: África do Sul – Canadá, dom 28.06., 21:00 MESZ / 16:00 BRT (SoFi Stadium) — abertura da nova fase de oitavas no formato de 48 times.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg vende Doan</strong> por 21 milhões € para Frankfurt e Röhl por 25 milhões € para Everton.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg contrata dois</strong>: Goleiro Mio Backhaus (12 milhões €, Bremen) e atacante Keisuke Goto (10 milhões €, Anderlecht). Saldo de transferências quase equilibrado.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Calendário divulgado qui 02.07.</strong> — Início da temporada 28.08. (uma semana depois por causa da Copa).</li>\n      <li><span class=\"chip\">WM</span> <strong>Quartas de final (Round of 16)</strong> a partir de sab 04.07., final dom 19.07.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy comienza con Sudáfrica-Canadá la fase de dieciseisavos (Round of 32) de la Copa del Mundo — y para Daniel los dos partidos más importantes juegan mañana, lunes: Alemania enfrenta Paraguay a las 22:30 MESZ / 17:30 BRT, Brasil enfrenta Japón a las 19:00 MESZ / 14:00 BRT. Ambos son adelantos — el silbato suena mañana, aquí no hay resultado que aún no existe. Además SC Freiburg en transición: Doan y Röhl se van, dos jugadores japoneses y un portero llegan. Y el calendario de la Bundesliga sale el jueves.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania – Paraguay</strong>: Dieciseisavos de final Copa del Mundo, lun 29.06., 22:30 MESZ / 17:30 BRT, Gillette Stadium (Boston). DFB como campeona de grupo a pesar de 1:2 contra Ecuador.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasil – Japón</strong>: lun 29.06., 19:00 MESZ / 14:00 BRT, NRG Stadium (Houston). Selección invicta, Vinícius con cuatro goles.</li>\n      <li><span class=\"chip\">WM</span> <strong>Dieciseisavos comienzan hoy</strong>: Sudáfrica – Canadá, dom 28.06., 21:00 MESZ / 16:00 BRT (SoFi Stadium) — apertura de la nueva fase de dieciseisavos en formato de 48 equipos.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg vende Doan</strong> por 21 millones € a Frankfurt y Röhl por 25 millones € a Everton.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg adquiere dos</strong>: Portero Mio Backhaus (12 millones €, Bremen) y delantero Keisuke Goto (10 millones €, Anderlecht). Saldo de traspasos casi equilibrado.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Calendario publicado jue 02.07.</strong> — Temporada comienza 28.08. (una semana después por la Copa).</li>\n      <li><span class=\"chip\">WM</span> <strong>Cuartos de final (Round of 16)</strong> a partir de sáb 04.07., final dom 19.07.</li>\n    </ul></div>"

Punkten</strong>, nur 9 vor Martin (177) und 22 vor Di Giannantonio (164). Im Samstags-Sprint feierte Trackhouse-Aprilia einen 1-2-Sieg (Fernandez vor Ogura).</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>Nächste Woche Sprint-Wochenende</strong>: F1 in Silverstone (Sprint-Format, 03.–05.07), MotoGP am Sachsenring (10.–12.07).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute fallen zwei Entscheidungen, die das Briefing nicht vorwegnehmen kann: In Spielberg startet der Österreich-GP um 10:00 BRT, in Assen der Große Preis der Niederlande schon um 09:00 BRT. Beide Rennen liefen bei Redaktionsschluss (~06:00 BRT) noch nicht — was steht, sind die Startaufstellungen, und die sind in beiden Serien eine kleine Sensation. In der Formel 1 holte George Russell die Pole, mit zwei Ferrari direkt dahinter und einem Verstappen-Crash im entscheidenden Moment; in der MotoGP fuhr Aprilia mit Jorge Martin die ersten vier Startplätze unter sich aus. Dieses Briefing ist die Grid-Vorschau, nicht das Ergebnis-Protokoll.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Österreich-GP heute, Russell auf Pole</strong>: George Russell (Mercedes) holte in 1:06.113 die Pole vor Leclerc und Hamilton (beide Ferrari). Rennen So 28.06, <strong>15:00 CEST / 10:00 BRT</strong>, 71 Runden. Ergebnis bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip\">F1</span> <strong>Verstappen-Crash, Ferrari-Front-Row</strong>: Max Verstappen schlug in Q3 in Kurve 9 ein (Startplatz 5), Ferrari sperrte Reihe eins komplett ab — Leclerc P2, Hamilton P3. WM-Leader Antonelli nur P4.</li>\n      <li><span class=\"chip good\">F1-WM</span> <strong>Antonelli souverän vorn</strong>: Kimi Antonelli (Mercedes) führt nach 7 Rennen mit <strong>156 Punkten</strong>, 41 vor dem Zweiten Hamilton und 50 vor Teamkollege Russell. Mercedes dominiert die Konstrukteurs-WM (262 zu 190 gegen Ferrari).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Assen-GP heute, Martin auf Pole</strong>: Jorge Martin (Aprilia) führt einen historischen Aprilia-Top-4-Sweep der Startaufstellung an. Großer Preis So 28.06, <strong>14:00 CEST / 09:00 BRT</strong>, 26 Runden.</li>\n      <li><span class=\"chip good\">MotoGP-WM</span> <strong>Bezzecchi knapp vorn</strong>: Marco Bezzecchi (Aprilia) führt mit <strong>186 Punkten</strong>, nur 9 vor Martin (177) und 22 vor Di Giannantonio (164). Im Samstags-Sprint feierte Trackhouse-Aprilia einen 1-2-Sieg (Fernandez vor Ogura).</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>Nächste Woche Sprint-Wochenende</strong>: F1 in Silverstone (Sprint-Format, 03.–05.07), MotoGP am Sachsenring (10.–12.07).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today brings two decisions that this brief cannot anticipate: the Austrian GP starts at 10:00 BRT in Spielberg, the Dutch Grand Prix at 09:00 BRT in Assen. Both races were still running at editorial close (~06:00 BRT) — what's set are the starting grids, and they are a minor sensation in both series. In Formula 1, George Russell claimed pole, with two Ferraris right behind and a Verstappen crash in the decisive moment; in MotoGP, Aprilia locked down the first four grid spots with Jorge Martin. This brief is the grid preview, not the results report.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Austrian GP today, Russell on pole</strong>: George Russell (Mercedes) took pole in 1:06.113 ahead of Leclerc and Hamilton (both Ferrari). Race Sun 28.06, <strong>15:00 CEST / 10:00 BRT</strong>, 71 laps. Result at editorial close remains open.</li>\n      <li><span class=\"chip\">F1</span> <strong>Verstappen crash, Ferrari front row</strong>: Max Verstappen crashed in Q3 at Turn 9 (grid slot 5), Ferrari locked down row one — Leclerc P2, Hamilton P3. WM leader Antonelli only P4.</li>\n      <li><span class=\"chip good\">F1 Championship</span> <strong>Antonelli commanding the lead</strong>: Kimi Antonelli (Mercedes) leads after 7 races with <strong>156 points</strong>, 41 ahead of second-place Hamilton and 50 ahead of teammate Russell. Mercedes dominates the Constructors' Championship (262 to 190 over Ferrari).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Assen GP today, Martin on pole</strong>: Jorge Martin (Aprilia) leads a historic Aprilia top-4 sweep of the starting grid. Grand Prix Sun 28.06, <strong>14:00 CEST / 09:00 BRT</strong>, 26 laps.</li>\n      <li><span class=\"chip good\">MotoGP Championship</span> <strong>Bezzecchi narrowly ahead</strong>: Marco Bezzecchi (Aprilia) leads with <strong>186 points</strong>, only 9 ahead of Martin (177) and 22 ahead of Di Giannantonio (164). Saturday's sprint saw Trackhouse-Aprilia score a 1-2 (Fernandez ahead of Ogura).</li>\n      <li><span class=\"chip\">Outlook</span> <strong>Sprint weekend next week</strong>: F1 at Silverstone (sprint format, 03.–05.07), MotoGP at Sachsenring (10.–12.07).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje caem duas decisões que este briefing não consegue antecipar: na Áustria, o GP da Áustria sai às 10:00 BRT em Spielberg, em Assen o Grande Prêmio dos Países Baixos já sai às 09:00 BRT. Ambas as corridas ainda estavam em andamento no fechamento (~06:00 BRT) — o que está definido são os grids de largada, e eles são uma pequena sensação nas duas séries. Na Fórmula 1, George Russell conquistou a pole, com dois Ferraris logo atrás e um acidente de Verstappen no momento decisivo; na MotoGP, a Aprilia trancou os primeiros quatro lugares de largada com Jorge Martin. Este briefing é a prévia do grid, não o relatório dos resultados.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>GP da Áustria hoje, Russell na pole</strong>: George Russell (Mercedes) conquistou a pole em 1:06.113 à frente de Leclerc e Hamilton (ambos Ferrari). Corrida dom 28.06, <strong>15:00 CEST / 10:00 BRT</strong>, 71 voltas. Resultado no fechamento permanece aberto.</li>\n      <li><span class=\"chip\">F1</span> <strong>Acidente de Verstappen, Ferraris na frente</strong>: Max Verstappen bateu na Q3 na curva 9 (lugar de largada 5), a Ferrari trancou a primeira fila — Leclerc P2, Hamilton P3. Líder do campeonato Antonelli apenas P4.</li>\n      <li><span class=\"chip good\">Campeonato F1</span> <strong>Antonelli dominante na liderança</strong>: Kimi Antonelli (Mercedes) lidera após 7 corridas com <strong>156 pontos</strong>, 41 à frente do segundo lugar Hamilton e 50 do companheiro Russell. Mercedes domina o Campeonato de Construtores (262 contra 190 sobre Ferrari).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>GP de Assen hoje, Martin na pole</strong>: Jorge Martin (Aprilia) lidera um varredura histórica de top-4 da Aprilia no grid de largada. Grande Prêmio dom 28.06, <strong>14:00 CEST / 09:00 BRT</strong>, 26 voltas.</li>\n      <li><span class=\"chip good\">Campeonato MotoGP</span> <strong>Bezzecchi levemente à frente</strong>: Marco Bezzecchi (Aprilia) lidera com <strong>186 pontos</strong>, apenas 9 à frente de Martin (177) e 22 do Di Giannantonio (164). No sprint do sábado, a Trackhouse-Aprilia marcou 1-2 (Fernandez à frente de Ogura).</li>\n      <li><span class=\"chip\">Perspectiva</span> <strong>Fim de semana sprint semana que vem</strong>: F1 em Silverstone (formato sprint, 03.–05.07), MotoGP em Sachsenring (10.–12.07).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy se definen dos carreras que este boletín no puede anticipar: en Austria el GP de Austria sale a las 10:00 BRT en Spielberg, en Holanda el Gran Premio de Holanda ya sale a las 09:00 BRT. Ambas carreras todavía estaban en curso al cierre (~06:00 BRT) — lo que está definido son las alineaciones de salida, y son una pequeña sensación en ambas series. En Fórmula 1, George Russell consiguió la pole, con dos Ferrari justo detrás y un accidente de Verstappen en el momento decisivo; en MotoGP, Aprilia acaparó los primeros cuatro lugares de salida con Jorge Martin. Este boletín es la previa de la alineación, no el informe de resultados.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>GP de Austria hoy, Russell en la pole</strong>: George Russell (Mercedes) consiguió la pole en 1:06.113 por delante de Leclerc y Hamilton (ambos Ferrari). Carrera dom 28.06, <strong>15:00 CEST / 10:00 BRT</strong>, 71 vueltas. Resultado al cierre permanece abierto.</li>\n      <li><span class=\"chip\">F1</span> <strong>Accidente de Verstappen, Ferrari en primera fila</strong>: Max Verstappen se estrelló en Q3 en la curva 9 (lugar de salida 5), Ferrari cerró la primera fila — Leclerc P2, Hamilton P3. Líder del campeonato Antonelli solo P4.</li>\n      <li><span class=\"chip good\">Campeonato F1</span> <strong>Antonelli domina la punta</strong>: Kimi Antonelli (Mercedes) lidera tras 7 carreras con <strong>156 puntos</strong>, 41 por delante del segundo Hamilton y 50 del compañero Russell. Mercedes domina el Campeonato de Constructores (262 sobre 190 ante Ferrari).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>GP de Assen hoy, Martin en la pole</strong>: Jorge Martin (Aprilia) encabeza un barrido histórico de top-4 de Aprilia en la alineación de salida. Gran Premio dom 28.06, <strong>14:00 CEST / 09:00 BRT</strong>, 26 vueltas.</li>\n      <li><span class=\"chip good\">Campeonato MotoGP</span> <strong>Bezzecchi ligeramente adelante</strong>: Marco Bezzecchi (Aprilia) lidera con <strong>186 puntos</strong>, solo 9 por delante de Martin (177) y 22 de Di Giannantonio (164). En el sprint del sábado, Trackhouse-Aprilia logró 1-2 (Fernandez por delante de Ogura).</li>\n      <li><span class=\"chip\">Perspectiva</span> <strong>Fin de semana de sprint la próxima semana</strong>: F1 en Silverstone (formato sprint, 03.–05.07), MotoGP en Sachsenring (10.–12.07).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Brasilien ist mitten im Winter — und damit in der Atemwegs-Saison. Paraná steht beim InfoGripe-Monitor auf der Warnliste, VSR und Grippe steigen. Mit einem einen Monat alten Baby im Haus ist das heute die wichtigste Zeile, noch vor dem Spaß. Und Spaß gibt es reichlich: Die Festa-Junina-Saison läuft auf Hochtouren, und nächstes Wochenende rollt direkt vor der Haustür die 28. FesCafé an.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>Winter-Atemwegswelle</strong>: Paraná unter 11 Staaten mit SRAG-Alarmstufe (InfoGripe SE 22/2026). VSR + Grippe steigen — Schutz fürs Baby priorisieren.</li>\n      <li><span class=\"chip hot\">Event</span> <strong>28. FesCafé Ribeirão Claro</strong>: 02.–05.07 direkt im Ort. Rodeio, Sertanejo-Shows, So Show infantil „Sonhos e Magia\". ~50.000 Besucher erwartet.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina heute</strong>: Royal Plaza Londrina letzter Tag bis 16h (gratis). Quermesse N.S. Aparecida heute + nächstes Wochenende, gratis.</li>\n      <li><span class=\"chip good\">Event</span> <strong>JuninFest São Vicente</strong> (Londrina): Sa+So 04.–05.07, gratis, eigener Espaço Kids mit Hüpfburg &amp; Bällebad.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Sonnig &amp; mild</strong> bis Do: Max 24–26°C, kein Regen. Fr 03.07 kommt eine Kaltfront (30% Regen, runter auf 18°C).</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue bleibt niedrig</strong>: nur 2.028 Fälle in PR (KW 1–14/2026), −96% zum Vorjahr. Mückenschutz trotzdem nicht abstellen.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Ferien ab 13.07</strong>: PR-Schulrecess 13.–24.07. FesCafé liegt noch davor — danach beginnt die Reisezeit.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Vormerken für die Ferien</strong>: Kidzhouse Festival São Paulo 24.–26.07 — Bluey, Patrulha Canina, Stillraum &amp; Wickeltische.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Brasilien ist mitten im Winter — und damit in der Atemwegs-Saison. Paraná steht beim InfoGripe-Monitor auf der Warnliste, VSR und Grippe steigen. Mit einem einen Monat alten Baby im Haus ist das heute die wichtigste Zeile, noch vor dem Spaß. Und Spaß gibt es reichlich: Die Festa-Junina-Saison läuft auf Hochtouren, und nächstes Wochenende rollt direkt vor der Haustür die 28. FesCafé an.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>Winter-Atemwegswelle</strong>: Paraná unter 11 Staaten mit SRAG-Alarmstufe (InfoGripe SE 22/2026). VSR + Grippe steigen — Schutz fürs Baby priorisieren.</li>\n      <li><span class=\"chip hot\">Event</span> <strong>28. FesCafé Ribeirão Claro</strong>: 02.–05.07 direkt im Ort. Rodeio, Sertanejo-Shows, So Show infantil „Sonhos e Magia\". ~50.000 Besucher erwartet.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina heute</strong>: Royal Plaza Londrina letzter Tag bis 16h (gratis). Quermesse N.S. Aparecida heute + nächstes Wochenende, gratis.</li>\n      <li><span class=\"chip good\">Event</span> <strong>JuninFest São Vicente</strong> (Londrina): Sa+So 04.–05.07, gratis, eigener Espaço Kids mit Hüpfburg &amp; Bällebad.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Sonnig &amp; mild</strong> bis Do: Max 24–26°C, kein Regen. Fr 03.07 kommt eine Kaltfront (30% Regen, runter auf 18°C).</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue bleibt niedrig</strong>: nur 2.028 Fälle in PR (KW 1–14/2026), −96% zum Vorjahr. Mückenschutz trotzdem nicht abstellen.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Ferien ab 13.07</strong>: PR-Schulrecess 13.–24.07. FesCafé liegt noch davor — danach beginnt die Reisezeit.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Vormerken für die Ferien</strong>: Kidzhouse Festival São Paulo 24.–26.07 — Bluey, Patrulha Canina, Stillraum &amp; Wickeltische.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Brazil is in the middle of winter — which means respiratory season. Paraná is on the alert list in the InfoGripe monitor, with RSV and flu on the rise. With a one-month-old baby in the house, that's today's most important line—before the fun. And there's plenty of fun: Festa Junina season is in full swing, and next weekend the 28th FesCafé rolls in just outside our door.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>Winter respiratory wave</strong>: Paraná among 11 states with SRAG alert level (InfoGripe SE 22/2026). RSV + flu rising — prioritize baby protection.</li>\n      <li><span class=\"chip hot\">Event</span> <strong>28th FesCafé Ribeirão Claro</strong>: July 2–5 right in town. Rodeo, Sertanejo shows, kids show \"Dreams and Magic\". ~50,000 visitors expected.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina today</strong>: Royal Plaza Londrina last day until 4 PM (free). Quermesse N.S. Aparecida today + next weekend, free.</li>\n      <li><span class=\"chip good\">Event</span> <strong>JuninFest São Vicente</strong> (Londrina): Sat+Sun July 4–5, free, own Kids Space with bounce house &amp; ball pit.</li>\n      <li><span class=\"chip good\">Weather</span> <strong>Sunny &amp; mild</strong> through Thu: High 24–26°C, no rain. Fri July 3 cold front arrives (30% rain, down to 18°C).</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue stays low</strong>: only 2,028 cases in PR (weeks 1–14/2026), −96% year-over-year. Mosquito protection still needed.</li>\n      <li><span class=\"chip\">School</span> <strong>Break starts July 13</strong>: PR school recess July 13–24. FesCafé comes first — then travel season starts.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Mark for break</strong>: Kidzhouse Festival São Paulo July 24–26 — Bluey, Paw Patrol, nursing area &amp; changing tables.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O Brasil está no meio do inverno — o que significa estação das vias respiratórias. Paraná está na lista de alerta do monitor InfoGripe, com VSR e gripe em alta. Com um bebê de um mês de idade em casa, essa é a linha mais importante de hoje — antes da diversão. E há muita diversão: a temporada de Festa Junina está em pleno andamento, e no próximo fim de semana a 28ª FesCafé vai rolar logo adiante.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Onda respiratória de inverno</strong>: Paraná entre os 11 estados com nível de alerta SRAG (InfoGripe SE 22/2026). VSR + gripe em alta — priorizar proteção do bebê.</li>\n      <li><span class=\"chip hot\">Evento</span> <strong>28ª FesCafé Ribeirão Claro</strong>: 02–05 de julho direto na cidade. Rodeio, shows sertanejos, show infantil \"Sonhos e Magia\". ~50 mil visitantes esperados.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Festa Junina hoje</strong>: Royal Plaza Londrina último dia até 16h (gratuito). Quermesse N.S. Aparecida hoje + próximo fim de semana, gratuito.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>JuninFest São Vicente</strong> (Londrina): sábado + domingo 04–05 de julho, gratuito, com Espaço Kids próprio com cama elástica &amp; piscina de bolinhas.</li>\n      <li><span class=\"chip good\">Clima</span> <strong>Ensolarado &amp; ameno</strong> até quinta: máx. 24–26°C, sem chuva. Sexta 03 de julho frente fria (30% de chuva, mínima de 18°C).</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue continua baixa</strong>: apenas 2.028 casos no PR (semanas 1–14/2026), −96% em relação ao ano anterior. Proteção contra mosquitos ainda é necessária.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias a partir de 13 de julho</strong>: recesso escolar PR 13–24 de julho. FesCafé vem antes — depois começa a temporada de viagens.</li>\n      <li><span class=\"chip\">Viagem</span> <strong>Marcar para as férias</strong>: Kidzhouse Festival São Paulo 24–26 de julho — Bluey, Patrulha Canina, sala de amamentação &amp; trocadores.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Brasil está en medio del invierno — lo que significa temporada de infecciones respiratorias. Paraná está en la lista de alerta del monitor InfoGripe, con VRS y gripe en aumento. Con un bebé de un mes en casa, esa es la línea más importante de hoy — antes de la diversión. Y hay mucha diversión: la temporada de Festa Junina está en pleno apogeo, y el próximo fin de semana la 28ª FesCafé llega justo afuera.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Onda respiratoria de invierno</strong>: Paraná entre 11 estados con nivel de alerta SRAG (InfoGripe SE 22/2026). VRS + gripe en aumento — priorizar protección del bebé.</li>\n      <li><span class=\"chip hot\">Evento</span> <strong>28ª FesCafé Ribeirão Claro</strong>: 02–05 de julio directo en la ciudad. Rodeo, shows sertanejos, espectáculo infantil \"Sueños y Magia\". ~50 mil visitantes esperados.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Festa Junina hoy</strong>: Royal Plaza Londrina último día hasta las 16h (gratis). Quermesse N.S. Aparecida hoy + próximo fin de semana, gratis.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>JuninFest São Vicente</strong> (Londrina): sábado + domingo 04–05 de julio, gratis, con Espacio Infantil propio con trampolín &amp; piscina de pelotas.</li>\n      <li><span class=\"chip good\">Clima</span> <strong>Soleado &amp; templado</strong> hasta jueves: máx. 24–26°C, sin lluvia. Viernes 03 de julio frente frío (30% lluvia, máx. 18°C).</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue sigue bajo</strong>: solo 2.028 casos en PR (semanas 1–14/2026), −96% respecto al año anterior. Protección contra mosquitos aún necesaria.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones a partir del 13 de julio</strong>: receso escolar PR 13–24 de julio. FesCafé viene antes — luego comienza la temporada de viajes.</li>\n      <li><span class=\"chip\">Viaje</span> <strong>Marcar para vacaciones</strong>: Kidzhouse Festival São Paulo 24–26 de julio — Bluey, Patrulla Canina, sala de lactancia &amp; cambiadores.</li>\n    </ul></div>"
