        "de": "<div class=\"tldr\"><p class=\"lead\">Samstag, ruhiger Nachrichtentag nach einer lauten Modell-Woche. Gestern versprach dieser Brief die Wochenend-Nachmessungen auf SWE-Bench Pro — sie sind noch nicht da: Epoch AIs unabhängige Pro-Auswertung von Fable 5 steht weiter aus. Was stattdessen vorliegt, ist lehrreicher. Claude Fable 5 ist seit dem 01.07. nach einer Export-Kontroll-Sperre wieder verfügbar und führt das (kontaminierte) Verified-Board mit 95 %. Seine Schlagzeilen-Zahl auf dem eigentlich fälschungsresistenten SWE-Bench Pro — <strong>80,3 %</strong> — stammt aber aus Anthropics eigenem Harness, nicht aus einem neutralen. Die Lektion des Tages: Auch der Benchmark, auf den alle umgestiegen sind, wird schon gespielt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 zurück in GA seit 01.07.</strong> (nach Export-Kontroll-Sperre 12.–30.06.). Neuer Safety-Classifier blockt die gemeldete Jailbreak-Technik in &gt;99 % der Fälle; geblockte Requests gehen an Opus 4.8.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Fable 5s 80,3 % auf SWE-Bench <em>Pro</em></strong> = Anthropics eigenes Scaffolding, kein neutraler Harness. Epoch AIs unabhängige Pro-Auswertung steht aus — die Zahl ist bis dahin faktisch anbieter-berichtet.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench <em>Verified</em></strong> (vals.ai, Stand 09.07., <em>anderer</em> Benchmark): Fable 5 95,00 %, Opus 4.8 88,60 %, Grok 4.5 86,60 %, GPT-5.5 82,60 %. Nicht mit den Pro-Zahlen verwechseln.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Mythos 5 (reales Claude-Modell) tauscht mit Fable 5 tageweise die #1</strong> auf Verified (95,5 % vs 95,0 %) — das Board ist von Tag zu Tag in Bewegung.</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5s CursorBench-Vorsprung ist kontaminiert</strong>: ein alter Cursor-Codebase-Snapshot lag im Training. Kein sauberes Coding-Signal (Modell vom 08.07., gestern im Detail).</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> (09.07.): die Zahlen MCP Atlas 88,1 / JobBench 54,7 / HLE 62,1 sind Meta-eigen — kein unabhängiger Coding-Bench.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.11 (10.07.)</strong>: Side-Chats, Suche über Agent-Transkripte, Grok-4.5-Zugang. JetBrains AI v262 (08.07.): Claude Agent + Codex als wählbare Agenten; Copilot bekommt Kimi K2.7 Code (erstes Open-Weight).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Still im Schatten</strong>: Continue.dev-Löschdeadline 15.07. (in 4 Tagen), OpenHands (1.11.0, 09.07.), Cline (~v4.0), Plandex (v2.2.1, dormant), DeepSeek (V4-Preview, kein Juli-Move).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Saturday, a quiet news day after a loud model week. Yesterday this brief promised weekend re-measurements on SWE-Bench Pro — they haven't landed yet: Epoch AI's independent Pro evaluation of Fable 5 is still pending. What we do have instead is more instructive. Claude Fable 5 has been back since July 1 after an export-control suspension and leads the (contaminated) Verified board at 95%. But its headline number on the supposedly gaming-resistant SWE-Bench Pro — <strong>80.3%</strong> — comes from Anthropic's own harness, not a neutral one. Today's lesson: even the benchmark everyone just switched to is already being gamed.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 back in GA since July 1</strong> (after an export-control suspension June 12–30). A new safety classifier blocks the reported jailbreak technique in over 99% of cases; blocked requests fall back to Opus 4.8.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Fable 5's 80.3% on SWE-Bench <em>Pro</em></strong> = Anthropic's own scaffolding, not a neutral harness. Epoch AI's independent Pro evaluation is still pending — until then the number is effectively vendor-reported.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench <em>Verified</em></strong> (vals.ai, as of July 9, a <em>different</em> benchmark): Fable 5 95.00%, Opus 4.8 88.60%, Grok 4.5 86.60%, GPT-5.5 82.60%. Don't confuse these with the Pro numbers.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Mythos 5 (a real Claude model) trades #1 with Fable 5 day to day</strong> on Verified (95.5% vs. 95.0%) — the board moves daily.</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5's CursorBench lead is contaminated</strong>: an old Cursor codebase snapshot was in the training data. Not a clean coding signal (model from July 8, covered in detail yesterday).</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> (July 9): the numbers MCP Atlas 88.1 / JobBench 54.7 / HLE 62.1 are all Meta's own — not an independent coding benchmark.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.11 (July 10)</strong>: side chats, search across agent transcripts, Grok 4.5 access. JetBrains AI v262 (July 8): Claude Agent and Codex as selectable agents; Copilot gets Kimi K2.7 Code (its first open-weight model).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Still in the shadows</strong>: Continue.dev deletion deadline July 15 (in 4 days), OpenHands (1.11.0, July 9), Cline (~v4.0), Plandex (v2.2.1, dormant), DeepSeek (V4 preview, no July move).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado, dia de notícias tranquilo depois de uma semana barulhenta de modelos. Ontem este brief prometeu as remedições de fim de semana no SWE-Bench Pro — elas ainda não chegaram: a avaliação independente do Pro pela Epoch AI para o Fable 5 continua pendente. O que temos em vez disso é mais instrutivo. Claude Fable 5 está de volta desde 01/07 depois de uma suspensão por controle de exportação e lidera o (contaminado) placar Verified com 95%. Mas seu número de destaque no SWE-Bench Pro, supostamente resistente a manipulação — <strong>80,3%</strong> — vem do próprio harness da Anthropic, não de um neutro. A lição do dia: até o benchmark para o qual todo mundo acabou de migrar já está sendo manipulado.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 de volta em GA desde 01/07</strong> (após suspensão por controle de exportação de 12 a 30/06). Um novo classificador de segurança bloqueia a técnica de jailbreak relatada em mais de 99% dos casos; requisições bloqueadas caem para o Opus 4.8.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Os 80,3% do Fable 5 no SWE-Bench <em>Pro</em></strong> = scaffolding da própria Anthropic, não um harness neutro. A avaliação independente do Pro pela Epoch AI continua pendente — até lá, o número é efetivamente reportado pelo fornecedor.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench <em>Verified</em></strong> (vals.ai, em 09/07, um benchmark <em>diferente</em>): Fable 5 95,00%, Opus 4.8 88,60%, Grok 4.5 86,60%, GPT-5.5 82,60%. Não confundir com os números do Pro.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Mythos 5 (um modelo Claude real) troca o #1 com o Fable 5 dia a dia</strong> no Verified (95,5% vs. 95,0%) — o placar se mexe diariamente.</li>\n      <li><span class=\"chip\">xAI</span> <strong>A vantagem do Grok 4.5 no CursorBench está contaminada</strong>: um snapshot antigo da base de código do Cursor estava no treinamento. Não é um sinal limpo de coding (modelo de 08/07, detalhado ontem).</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> (09/07): os números MCP Atlas 88,1 / JobBench 54,7 / HLE 62,1 são todos da própria Meta — não é um coding bench independente.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.11 (10/07)</strong>: side chats, busca nos transcritos de agentes, acesso ao Grok 4.5. JetBrains AI v262 (08/07): Claude Agent e Codex como agentes selecionáveis; Copilot ganha o Kimi K2.7 Code (primeiro open-weight).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Ainda na sombra</strong>: prazo de exclusão do Continue.dev em 15/07 (em 4 dias), OpenHands (1.11.0, 09/07), Cline (~v4.0), Plandex (v2.2.1, dormente), DeepSeek (V4-Preview, sem movimento em julho).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Sábado, día de noticias tranquilo tras una semana ruidosa de modelos. Ayer este boletín prometió las remediciones de fin de semana en SWE-Bench Pro — todavía no llegan: la evaluación independiente de Pro por parte de Epoch AI para Fable 5 sigue pendiente. Lo que sí tenemos en su lugar es más instructivo. Claude Fable 5 volvió desde el 01/07 tras una suspensión por control de exportaciones y lidera el (contaminado) tablero Verified con 95%. Pero su cifra estrella en SWE-Bench Pro, supuestamente resistente a la manipulación — <strong>80,3%</strong> — proviene del propio harness de Anthropic, no de uno neutral. La lección del día: hasta el benchmark al que todos acaban de migrar ya se está manipulando.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 de vuelta en GA desde el 01/07</strong> (tras una suspensión por control de exportaciones del 12 al 30/06). Un nuevo clasificador de seguridad bloquea la técnica de jailbreak reportada en más del 99% de los casos; las solicitudes bloqueadas caen al Opus 4.8.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>El 80,3% de Fable 5 en SWE-Bench <em>Pro</em></strong> = scaffolding de la propia Anthropic, no un harness neutral. La evaluación independiente de Pro por Epoch AI sigue pendiente — hasta entonces, la cifra es en la práctica reportada por el proveedor.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench <em>Verified</em></strong> (vals.ai, al 09/07, un benchmark <em>distinto</em>): Fable 5 95,00%, Opus 4.8 88,60%, Grok 4.5 86,60%, GPT-5.5 82,60%. No confundir con las cifras de Pro.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Mythos 5 (un modelo Claude real) se turna el #1 con Fable 5 día a día</strong> en Verified (95,5% vs. 95,0%) — el tablero se mueve a diario.</li>\n      <li><span class=\"chip\">xAI</span> <strong>La ventaja de Grok 4.5 en CursorBench está contaminada</strong>: una captura antigua del código de Cursor estaba en el entrenamiento. No es una señal limpia de coding (modelo del 08/07, detallado ayer).</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> (09/07): las cifras MCP Atlas 88,1 / JobBench 54,7 / HLE 62,1 son todas propias de Meta — no es un coding bench independiente.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.11 (10/07)</strong>: side chats, búsqueda en transcripciones de agentes, acceso a Grok 4.5. JetBrains AI v262 (08/07): Claude Agent y Codex como agentes seleccionables; Copilot obtiene Kimi K2.7 Code (su primer modelo open-weight).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Todavía en la sombra</strong>: fecha límite de eliminación de Continue.dev el 15/07 (en 4 días), OpenHands (1.11.0, 09/07), Cline (~v4.0), Plandex (v2.2.1, inactivo), DeepSeek (V4-Preview, sin movimiento en julio).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhige Nachrichtenwoche, aber eine mit Richtung: Angewandte KI verschiebt sich sichtbar von „Launch\" zu „Umsetzung\". Die EU hat die härteste Compliance-Frist um 16 Monate nach hinten geschoben, Google drückt die Bildgenerierung unter einen Cent, und Microsoft steckt Milliarden nicht mehr in Modelle, sondern in Leute, die sie beim Kunden zum Laufen bringen. Das ist genau die Schicht, in der twiceD arbeitet — deshalb heute zwei recherchierte Projekt-Ideen statt Modell-Benchmarks.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI-Act-Hochrisiko-Frist verschoben</strong>: 2. Aug 2026 → <strong>2. Dez 2027</strong>. Parlament final durch (16. Juni, 423–57–174).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Nano Banana 2 Lite</strong> ist GA: Text-zu-Bild in unter 4 Sekunden, <strong>$0,034 pro 1.000 Bildern</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Interactions API</strong> auf GA — Googles neues Standard-Interface für Gemini-Agenten (Coding-Seite: siehe ai-dev-Brief).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Microsoft „Frontier Company\"</strong>: 2,5 Mrd. $, ~6.000 Experten, nur für Enterprise-KI-Umsetzung.</li>\n      <li><span class=\"chip good\">STUDY · DE</span> <strong>Bitkom</strong>: aktive KI-Nutzung deutscher Firmen bei <strong>41 %</strong> (2024: 17 %) — Methodik-Flag.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: 66 % melden Produktivitätsgewinne, aber nur 30 % bauen Prozesse um — Methodik-Flag.</li>\n      <li><span class=\"chip\">POLICY · EU</span> <strong>Watermarking-Pflicht</strong> für KI-Inhalte greift ab <strong>2. Dez 2026</strong> — die Frist, die zuerst beißt.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen heute: <strong>AI-Act-Readiness für den Mittelstand</strong> und <strong>Produktfoto-Automatisierung</strong> auf Sub-Cent-Bildkosten.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhige Nachrichtenwoche, aber eine mit Richtung: Angewandte KI verschiebt sich sichtbar von „Launch\" zu „Umsetzung\". Die EU hat die härteste Compliance-Frist um 16 Monate nach hinten geschoben, Google drückt die Bildgenerierung unter einen Cent, und Microsoft steckt Milliarden nicht mehr in Modelle, sondern in Leute, die sie beim Kunden zum Laufen bringen. Das ist genau die Schicht, in der twiceD arbeitet — deshalb heute zwei recherchierte Projekt-Ideen statt Modell-Benchmarks.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI-Act-Hochrisiko-Frist verschoben</strong>: 2. Aug 2026 → <strong>2. Dez 2027</strong>. Parlament final durch (16. Juni, 423–57–174).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Nano Banana 2 Lite</strong> ist GA: Text-zu-Bild in unter 4 Sekunden, <strong>$0,034 pro 1.000 Bildern</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Interactions API</strong> auf GA — Googles neues Standard-Interface für Gemini-Agenten (Coding-Seite: siehe ai-dev-Brief).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Microsoft „Frontier Company\"</strong>: 2,5 Mrd. $, ~6.000 Experten, nur für Enterprise-KI-Umsetzung.</li>\n      <li><span class=\"chip good\">STUDY · DE</span> <strong>Bitkom</strong>: aktive KI-Nutzung deutscher Firmen bei <strong>41 %</strong> (2024: 17 %) — Methodik-Flag.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: 66 % melden Produktivitätsgewinne, aber nur 30 % bauen Prozesse um — Methodik-Flag.</li>\n      <li><span class=\"chip\">POLICY · EU</span> <strong>Watermarking-Pflicht</strong> für KI-Inhalte greift ab <strong>2. Dez 2026</strong> — die Frist, die zuerst beißt.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen heute: <strong>AI-Act-Readiness für den Mittelstand</strong> und <strong>Produktfoto-Automatisierung</strong> auf Sub-Cent-Bildkosten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet news week, but one with direction: applied AI is visibly shifting from \"launch\" to \"deployment.\" The EU pushed its toughest compliance deadline back by 16 months, Google drove image generation below a cent, and Microsoft is now pouring billions not into models but into people who get them running at the customer. That's exactly the layer where twiceD operates — so today brings two researched project ideas instead of model benchmarks.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI Act high-risk deadline pushed back</strong>: Aug 2, 2026 → <strong>Dec 2, 2027</strong>. Parliament vote final (June 16, 423–57–174).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Nano Banana 2 Lite</strong> is GA: text-to-image in under 4 seconds, <strong>$0.034 per 1,000 images</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Interactions API</strong> hits GA — Google's new standard interface for Gemini agents (coding side: see the ai-dev brief).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Microsoft \"Frontier Company\"</strong>: $2.5B, ~6,000 experts, dedicated purely to enterprise AI deployment.</li>\n      <li><span class=\"chip good\">STUDY · DE</span> <strong>Bitkom</strong>: active AI use among German firms at <strong>41%</strong> (2024: 17%) — methodology flag.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: 66% report productivity gains, but only 30% are redesigning processes — methodology flag.</li>\n      <li><span class=\"chip\">POLICY · EU</span> <strong>Watermarking requirement</strong> for AI content kicks in <strong>Dec 2, 2026</strong> — the deadline that bites first.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas today: <strong>AI Act readiness for SMEs</strong> and <strong>product-photo automation</strong> at sub-cent image costs.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma semana tranquila de notícias, mas com direção clara: a IA aplicada está migrando visivelmente de \"lançamento\" para \"implementação\". A UE empurrou seu prazo mais duro de conformidade em 16 meses, o Google derrubou o custo de geração de imagens para abaixo de um centavo, e a Microsoft agora investe bilhões não em modelos, mas em pessoas que fazem tudo funcionar de fato no cliente. É exatamente essa a camada em que a twiceD atua — por isso hoje trazemos duas ideias de projeto pesquisadas em vez de benchmarks de modelos.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Prazo de alto risco do AI Act adiado</strong>: 02/08/2026 → <strong>02/12/2027</strong>. Parlamento aprovou em definitivo (16/06, 423–57–174).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Nano Banana 2 Lite</strong> está em GA: texto para imagem em menos de 4 segundos, <strong>US$ 0,034 por 1.000 imagens</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Interactions API</strong> chega ao GA — a nova interface padrão do Google para agentes Gemini (lado de programação: ver o brief de ai-dev).</li>\n      <li><span class=\"chip\">M&amp;A · EUA</span> <strong>Microsoft \"Frontier Company\"</strong>: US$ 2,5 bi, ~6.000 especialistas, dedicados só à implementação de IA corporativa.</li>\n      <li><span class=\"chip good\">STUDY · Alemanha</span> <strong>Bitkom</strong>: uso ativo de IA nas empresas alemãs em <strong>41%</strong> (2024: 17%) — ressalva de metodologia.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: 66% relatam ganhos de produtividade, mas apenas 30% reestruturam processos — ressalva de metodologia.</li>\n      <li><span class=\"chip\">POLICY · UE</span> <strong>Obrigação de marca d'água</strong> para conteúdo de IA entra em vigor em <strong>02/12/2026</strong> — o prazo que aperta primeiro.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias hoje: <strong>preparação para o AI Act nas PMEs</strong> e <strong>automação de fotos de produto</strong> a custos de imagem abaixo de um centavo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una semana de noticias tranquila, pero con una dirección clara: la IA aplicada está pasando visiblemente de \"lanzamiento\" a \"implementación\". La UE recorrió su plazo de cumplimiento más duro 16 meses hacia adelante, Google bajó el costo de generar imágenes a menos de un centavo, y Microsoft ya no invierte miles de millones en modelos, sino en gente que los hace funcionar de verdad con el cliente. Esa es exactamente la capa en la que trabaja twiceD — por eso hoy traemos dos ideas de proyecto investigadas en lugar de benchmarks de modelos.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Plazo de alto riesgo del AI Act se recorre</strong>: 02/08/2026 → <strong>02/12/2027</strong>. El Parlamento lo aprobó de forma final (16/06, 423–57–174).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Nano Banana 2 Lite</strong> ya está en GA: texto a imagen en menos de 4 segundos, <strong>$0.034 dólares por 1,000 imágenes</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Interactions API</strong> llega a GA — la nueva interfaz estándar de Google para agentes Gemini (el lado de programación: ver el brief de ai-dev).</li>\n      <li><span class=\"chip\">M&amp;A · EE. UU.</span> <strong>Microsoft \"Frontier Company\"</strong>: $2,500 millones de dólares, ~6,000 expertos, dedicados solo a la implementación de IA empresarial.</li>\n      <li><span class=\"chip good\">STUDY · Alemania</span> <strong>Bitkom</strong>: uso activo de IA en empresas alemanas en <strong>41%</strong> (2024: 17%) — alerta de metodología.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: 66% reporta ganancias de productividad, pero solo 30% rediseña sus procesos — alerta de metodología.</li>\n      <li><span class=\"chip\">POLICY · UE</span> <strong>Obligación de marca de agua</strong> para contenido de IA entra en vigor el <strong>02/12/2026</strong> — el plazo que aprieta primero.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas hoy: <strong>preparación para el AI Act en pymes</strong> y <strong>automatización de fotos de producto</strong> a costos de imagen menores a un centavo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Nachricht des Tages steht nicht auf dem Board, sondern in der Ausschreibungs-Datenbank: <strong>fünf frische, stack-nahe TED-Tender</strong> von deutschen Behörden und Kliniken, Fristen zwischen dem <strong>20.07. und 03.08.</strong> — und keiner davon ist für twiceD allein bietbar. Bei jedem liegt mindestens eine Pflicht-Anforderung über der Solo-Kapazität: mal ein Mindestumsatz von einer bis über vier Millionen Euro, mal ein fertiges SaaS-Produkt, einmal — bei GSI/FAIR — eine harte <strong>Pflicht-Integration in SAP S/4HANA</strong>, die eine echte Skill-Lücke ist, nicht nur eine Größenfrage. Das Board selbst ist Kontinuität: <strong>74 Listings</strong>, angeführt vom unveränderten Java/Spring/Angular-Kern, die Sätze im Band der beiden 2026-Umfragen (~90–102 €/h), nicht darüber.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Fünf Tender, fünf Partner-Lücken</strong>: Kliniken Köln (Umsatz 1 Mio. €, 20.07.), Bezirk Schwaben (SaaS-Produkt, 23.07.), SBK Treasury (23.07.), GSI/FAIR (SAP-S/4HANA-Zwang, 23.07.), DPMA/BMJ (Umsatz 2,6–4,5 Mio. €, 03.08.).</li>\n      <li><span class=\"chip\">SAP</span> <strong>GSI/FAIR ist der harte Fall</strong>: das Lagerlogistik-System muss vollständig in SAP S/4HANA integriert sein oder per zertifizierter FIAA-Schnittstelle anbinden — eine Zertifikats-/Skill-Lücke, plus ISO 27001 schon <em>mit dem Angebot</em>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board im Band, nicht drüber</strong>: 74 Listings (60 Freelance / 11 Employee / 3 Intriguing), Ø Fit 69, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil) — alle 80–100 % remote, Sätze 85–130 €/h*.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Zwei Umfragen, ein Band</strong>: freelancermap-Kompass median 95 €/h DACH (Software &amp; Web nur 90 €/h), freelance.de-Studie mean 101,98 €/h IT-weit — Median-vs-Mittelwert-Lücke erwartbar, kein Widerspruch.</li>\n      <li><span class=\"chip\">CH</span> <strong>Schweizer Freelance taucht auf</strong>: ITech Consult und Wavestone bei CHF 140–180/h* — aber onsite-lastig (30 % bzw. reines Onsite in Zürich), deshalb Standort gedeckelt.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische verbreitert sich</strong>: Michael Page (E-Mobility-SaaS, Fit 75), A3Watt (Smart-Home/MQTT, 70), Etengo (IoT-Protokolle/ESP32, 66) — die IoT-Ecke wächst, aber im Standard-Preisband.</li>\n      <li><span class=\"chip\">Kontext</span> <strong>Breiter Freeze als Kulisse</strong>: Arbeitslosenquote Juni 6,2 % (2,936 Mio.); Einstellungs-Stopp konzentriert in Auto/Maschinenbau/Banken-Backoffice, Software/IT gemischt. <em>Keine</em> SAP-2026-Layoff-Zahl — die kursierende Angabe ist ein 2023er Altbestand.</li>\n      <li><span class=\"chip\">Daten</span> <strong>Ehrlichkeits-Marker</strong>: keiner der fünf Tender veröffentlicht einen Schätzwert (nichts erfunden); SBKs dünne Eignung ist tentativ (Volltext-Kriterien vermutlich in den Vergabeunterlagen); die meisten Freelance-Listings tragen kein Posting-Datum.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die Nachricht des Tages steht nicht auf dem Board, sondern in der Ausschreibungs-Datenbank: <strong>fünf frische, stack-nahe TED-Tender</strong> von deutschen Behörden und Kliniken, Fristen zwischen dem <strong>20.07. und 03.08.</strong> — und keiner davon ist für twiceD allein bietbar. Bei jedem liegt mindestens eine Pflicht-Anforderung über der Solo-Kapazität: mal ein Mindestumsatz von einer bis über vier Millionen Euro, mal ein fertiges SaaS-Produkt, einmal — bei GSI/FAIR — eine harte <strong>Pflicht-Integration in SAP S/4HANA</strong>, die eine echte Skill-Lücke ist, nicht nur eine Größenfrage. Das Board selbst ist Kontinuität: <strong>74 Listings</strong>, angeführt vom unveränderten Java/Spring/Angular-Kern, die Sätze im Band der beiden 2026-Umfragen (~90–102 €/h), nicht darüber.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Fünf Tender, fünf Partner-Lücken</strong>: Kliniken Köln (Umsatz 1 Mio. €, 20.07.), Bezirk Schwaben (SaaS-Produkt, 23.07.), SBK Treasury (23.07.), GSI/FAIR (SAP-S/4HANA-Zwang, 23.07.), DPMA/BMJ (Umsatz 2,6–4,5 Mio. €, 03.08.).</li>\n      <li><span class=\"chip\">SAP</span> <strong>GSI/FAIR ist der harte Fall</strong>: das Lagerlogistik-System muss vollständig in SAP S/4HANA integriert sein oder per zertifizierter FIAA-Schnittstelle anbinden — eine Zertifikats-/Skill-Lücke, plus ISO 27001 schon <em>mit dem Angebot</em>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board im Band, nicht drüber</strong>: 74 Listings (60 Freelance / 11 Employee / 3 Intriguing), Ø Fit 69, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil) — alle 80–100 % remote, Sätze 85–130 €/h*.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Zwei Umfragen, ein Band</strong>: freelancermap-Kompass median 95 €/h DACH (Software &amp; Web nur 90 €/h), freelance.de-Studie mean 101,98 €/h IT-weit — Median-vs-Mittelwert-Lücke erwartbar, kein Widerspruch.</li>\n      <li><span class=\"chip\">CH</span> <strong>Schweizer Freelance taucht auf</strong>: ITech Consult und Wavestone bei CHF 140–180/h* — aber onsite-lastig (30 % bzw. reines Onsite in Zürich), deshalb Standort gedeckelt.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische verbreitert sich</strong>: Michael Page (E-Mobility-SaaS, Fit 75), A3Watt (Smart-Home/MQTT, 70), Etengo (IoT-Protokolle/ESP32, 66) — die IoT-Ecke wächst, aber im Standard-Preisband.</li>\n      <li><span class=\"chip\">Kontext</span> <strong>Breiter Freeze als Kulisse</strong>: Arbeitslosenquote Juni 6,2 % (2,936 Mio.); Einstellungs-Stopp konzentriert in Auto/Maschinenbau/Banken-Backoffice, Software/IT gemischt. <em>Keine</em> SAP-2026-Layoff-Zahl — die kursierende Angabe ist ein 2023er Altbestand.</li>\n      <li><span class=\"chip\">Daten</span> <strong>Ehrlichkeits-Marker</strong>: keiner der fünf Tender veröffentlicht einen Schätzwert (nichts erfunden); SBKs dünne Eignung ist tentativ (Volltext-Kriterien vermutlich in den Vergabeunterlagen); die meisten Freelance-Listings tragen kein Posting-Datum.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today's headline story isn't on the board — it's in the tender database: <strong>five fresh, stack-adjacent TED tenders</strong> from German public authorities and hospitals, deadlines between <strong>07/20 and 08/03</strong> — and not one of them is biddable for twiceD alone. Every single one carries at least one mandatory requirement above solo capacity: sometimes a minimum revenue of one to over four million euros, sometimes a finished SaaS product, once — at GSI/FAIR — a hard <strong>mandatory SAP S/4HANA integration</strong>, which is a genuine skill gap, not just a size question. The board itself is continuity: <strong>74 listings</strong>, led by the unchanged Java/Spring/Angular core, rates within the band of both 2026 surveys (~€90–102/h), not above it.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Five tenders, five partner gaps</strong>: Cologne hospitals (revenue €1M, 07/20), Bezirk Schwaben (SaaS product, 07/23), SBK Treasury (07/23), GSI/FAIR (SAP-S/4HANA mandate, 07/23), DPMA/BMJ (revenue €2.6–4.5M, 08/03).</li>\n      <li><span class=\"chip\">SAP</span> <strong>GSI/FAIR is the hard case</strong>: the warehouse-logistics system must be fully integrated into SAP S/4HANA or connect via a certified FIAA interface — a certification/skill gap, plus ISO 27001 already <em>with the bid</em>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board within the band, not above it</strong>: 74 listings (60 freelance / 11 employee / 3 intriguing), avg. fit 69, three-way tie at the top at fit 88 (iSAX, BridgingIT, Keil) — all 80–100% remote, rates €85–130/h*.</li>\n      <li><span class=\"chip\">Market</span> <strong>Two surveys, one band</strong>: freelancermap Compass median €95/h DACH (Software &amp; Web only €90/h), freelance.de study mean €101.98/h IT-wide — the median-vs-mean gap is expected, not a contradiction.</li>\n      <li><span class=\"chip\">CH</span> <strong>Swiss freelance shows up</strong>: ITech Consult and Wavestone at CHF 140–180/h* — but onsite-heavy (30% remote and pure onsite in Zurich, respectively), so location score is capped.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Niche widens</strong>: Michael Page (e-mobility SaaS, fit 75), A3Watt (smart home/MQTT, 70), Etengo (IoT protocols/ESP32, 66) — the IoT corner is growing, but within the standard price band.</li>\n      <li><span class=\"chip\">Context</span> <strong>Broad freeze as backdrop</strong>: unemployment rate June 6.2% (2.936M); hiring freeze concentrated in auto/machinery/bank back-office, software/IT mixed. <em>No</em> SAP 2026 layoff figure — the number in circulation is 2023 leftovers.</li>\n      <li><span class=\"chip\">Data</span> <strong>Honesty marker</strong>: none of the five tenders publishes an estimated value (nothing invented); SBK's thin eligibility read is tentative (full-text criteria likely sit in the procurement documents); most freelance listings carry no posting date.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A notícia do dia não está no board, mas no banco de dados de licitações: <strong>cinco licitações novas do TED, próximas da nossa stack</strong>, de órgãos públicos e hospitais alemães, com prazos entre <strong>20/07 e 03/08</strong> — e nenhuma delas pode ser disputada pela twiceD sozinha. Em cada uma, pelo menos um requisito obrigatório fica acima da capacidade solo: ora um faturamento mínimo de um a mais de quatro milhões de euros, ora um produto SaaS pronto, uma vez — no caso da GSI/FAIR — uma <strong>integração obrigatória com o SAP S/4HANA</strong>, que é uma lacuna real de competência, não só uma questão de tamanho. O board em si é continuidade: <strong>74 vagas</strong>, lideradas pelo núcleo inalterado Java/Spring/Angular, com taxas dentro da faixa das duas pesquisas de 2026 (~90–102 €/h), não acima dela.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Cinco licitações, cinco lacunas de parceiro</strong>: Hospitais de Colônia (faturamento 1 mi €, 20/07), Bezirk Schwaben (produto SaaS, 23/07), SBK Treasury (23/07), GSI/FAIR (exigência de SAP S/4HANA, 23/07), DPMA/BMJ (faturamento 2,6–4,5 mi €, 03/08).</li>\n      <li><span class=\"chip\">SAP</span> <strong>GSI/FAIR é o caso mais difícil</strong>: o sistema de logística de armazém precisa estar totalmente integrado ao SAP S/4HANA ou se conectar por uma interface FIAA certificada — uma lacuna de certificação/competência, além da ISO 27001 já <em>na proposta</em>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board dentro da faixa, não acima</strong>: 74 vagas (60 freelance / 11 CLT / 3 intriguing), Fit médio 69, empate triplo no topo com Fit 88 (iSAX, BridgingIT, Keil) — todas 80–100% remoto, taxas 85–130 €/h*.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Duas pesquisas, uma faixa</strong>: mediana do Freelancer-Kompass da freelancermap 95 €/h DACH (Software &amp; Web só 90 €/h), média do estudo da freelance.de 101,98 €/h em todo o setor de TI — a diferença mediana vs. média é esperada, não uma contradição.</li>\n      <li><span class=\"chip\">CH</span> <strong>Freelance suíço aparece</strong>: ITech Consult e Wavestone a CHF 140–180/h* — mas fortemente presenciais (30% remoto e puramente presencial em Zurique, respectivamente), por isso a localização fica limitada.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nicho se amplia</strong>: Michael Page (SaaS de e-mobility, Fit 75), A3Watt (smart home/MQTT, 70), Etengo (protocolos IoT/ESP32, 66) — o canto de IoT cresce, mas dentro da faixa de preço padrão.</li>\n      <li><span class=\"chip\">Contexto</span> <strong>Congelamento amplo como pano de fundo</strong>: taxa de desemprego em junho 6,2% (2,936 mi); paralisação de contratações concentrada em automotivo/maquinário/back-office bancário, software/TI misto. <em>Nenhum</em> número de corte da SAP em 2026 — o dado que circula é resquício de 2023.</li>\n      <li><span class=\"chip\">Dados</span> <strong>Marcador de honestidade</strong>: nenhuma das cinco licitações publica um valor estimado (nada inventado); a leitura de elegibilidade rasa da SBK é tentativa (os critérios completos provavelmente estão nos documentos de licitação); a maioria das vagas freelance não tem data de publicação.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La noticia del día no está en el tablero, sino en la base de datos de licitaciones: <strong>cinco licitaciones nuevas del TED, cercanas a nuestro stack</strong>, de autoridades y hospitales alemanes, con plazos entre el <strong>20/07 y el 03/08</strong> — y ninguna de ellas es licitable por twiceD en solitario. En cada una, al menos un requisito obligatorio supera la capacidad en solitario: unas veces una facturación mínima de entre uno y más de cuatro millones de euros, otras un producto SaaS terminado, y una vez — en GSI/FAIR — una <strong>integración obligatoria con SAP S/4HANA</strong>, que es una brecha real de habilidades, no solo una cuestión de tamaño. El tablero en sí es continuidad: <strong>74 listados</strong>, encabezados por el núcleo inalterado de Java/Spring/Angular, con tarifas dentro de la banda de las dos encuestas de 2026 (~90–102 €/h), no por encima.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Cinco licitaciones, cinco brechas de socio</strong>: hospitales de Colonia (facturación 1 M €, 20/07), Bezirk Schwaben (producto SaaS, 23/07), SBK Treasury (23/07), GSI/FAIR (exigencia de SAP S/4HANA, 23/07), DPMA/BMJ (facturación 2,6–4,5 M €, 03/08).</li>\n      <li><span class=\"chip\">SAP</span> <strong>GSI/FAIR es el caso más difícil</strong>: el sistema de logística de almacén debe estar totalmente integrado en SAP S/4HANA o conectarse mediante una interfaz FIAA certificada — una brecha de certificación/habilidad, más la ISO 27001 ya <em>con la oferta</em>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Tablero dentro de la banda, no por encima</strong>: 74 listados (60 freelance / 11 empleo / 3 intriguing), fit prom. 69, triple empate en la cima con fit 88 (iSAX, BridgingIT, Keil) — todos 80–100 % remoto, tarifas 85–130 €/h*.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Dos encuestas, una banda</strong>: mediana del Freelancer-Kompass de freelancermap 95 €/h en DACH (Software y Web solo 90 €/h), media del estudio de freelance.de 101,98 €/h en todo el sector TI — la brecha mediana-vs-media es esperable, no una contradicción.</li>\n      <li><span class=\"chip\">CH</span> <strong>Aparece el freelance suizo</strong>: ITech Consult y Wavestone a CHF 140–180/h* — pero muy presenciales (30 % remoto y totalmente presencial en Zúrich, respectivamente), por lo que la puntuación de ubicación queda limitada.</li>\n      <li><span class=\"chip\">IoT</span> <strong>El nicho se amplía</strong>: Michael Page (SaaS de e-mobility, fit 75), A3Watt (smart home/MQTT, 70), Etengo (protocolos IoT/ESP32, 66) — el rincón de IoT crece, pero dentro de la banda de precio estándar.</li>\n      <li><span class=\"chip\">Contexto</span> <strong>Congelamiento amplio como telón de fondo</strong>: tasa de desempleo en junio 6,2 % (2,936 millones); la paralización de contrataciones se concentra en automotriz/maquinaria/back-office bancario, software/TI mixto. <em>Ninguna</em> cifra de recortes de SAP en 2026 — el dato que circula es un remanente de 2023.</li>\n      <li><span class=\"chip\">Datos</span> <strong>Marcador de honestidad</strong>: ninguna de las cinco licitaciones publica un valor estimado (nada inventado); la lectura de elegibilidad escasa de SBK es tentativa (los criterios completos probablemente estén en los documentos de licitación); la mayoría de los listados freelance no llevan fecha de publicación.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Bundesliga schläft Sommerpause, und für Daniels beide Nationen ist die WM längst vorbei — trotzdem hat der Tag zwei heiße Fäden. In Freiburg bahnt sich der teuerste Verkauf der Vereinsgeschichte an: Johan Manzambi soll für rund 60 Mio. € nach Newcastle, spielt aber heute Nacht noch mit der Schweiz im Viertelfinale. Und beim DFB ist die große Personalie entschieden — Nagelsmann ist weg, Klopp soll übernehmen.</p>\n    <ul>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi vor Newcastle</strong>: Paket von rund 60 Mio. € — Freiburg-Rekord und teuerster Schweizer-Transfer überhaupt. Offiziell noch nicht vollzogen.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Nacht</strong>: Norwegen–England 23:00 MESZ / 18:00 BRT (Miami Gardens); Argentinien–Schweiz 03:00 MESZ (So-Nacht) / 22:00 BRT (Kansas City) — mit Freiburgs Manzambi.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann zurückgetreten</strong>: DFB löste den Vertrag (bis 2028) am 03.07. auf seinen Wunsch auf. Klopp ist Wunschkandidat und hat grundsätzliche Bereitschaft signalisiert.</li>\n      <li><span class=\"chip\">WM</span> <strong>Halbfinale 1 steht</strong>: Frankreich–Spanien, Di 14.07., 21:00 MESZ / 16:00 BRT (Arlington). Spanien schlug Belgien 2:1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay, 3:4 im Elfmeterschießen (Mo 29.06.) — im Sechzehntelfinale, der ersten K.-o.-Runde des 48er-Formats.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen im Achtelfinale (So 05.07.), Haaland-Doppelpack. Schwächste WM seit 1990.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt &amp; gibt ab</strong>: Torwart Backhaus (~12–15 Mio. €, Bremen) fix; Adamu geht zu Schalke. Trainingsauftakt So 12.07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 ist Geschichte</strong>: Bayern Meister (89 Pkt), Freiburg 7. (47 Pkt) → Conference-League-Quali. Neustart 28.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: eingefroren nach Rodada 18, Palmeiras führt (41 Pkt). Neustart in der Woche des 16.–22.07.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Freiburgs Los</strong>: 1. Runde auswärts bei Fortuna Düsseldorf (3. Liga), gespielt 21.–24.08.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die Bundesliga schläft Sommerpause, und für Daniels beide Nationen ist die WM längst vorbei — trotzdem hat der Tag zwei heiße Fäden. In Freiburg bahnt sich der teuerste Verkauf der Vereinsgeschichte an: Johan Manzambi soll für rund 60 Mio. € nach Newcastle, spielt aber heute Nacht noch mit der Schweiz im Viertelfinale. Und beim DFB ist die große Personalie entschieden — Nagelsmann ist weg, Klopp soll übernehmen.</p>\n    <ul>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi vor Newcastle</strong>: Paket von rund 60 Mio. € — Freiburg-Rekord und teuerster Schweizer-Transfer überhaupt. Offiziell noch nicht vollzogen.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Nacht</strong>: Norwegen–England 23:00 MESZ / 18:00 BRT (Miami Gardens); Argentinien–Schweiz 03:00 MESZ (So-Nacht) / 22:00 BRT (Kansas City) — mit Freiburgs Manzambi.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann zurückgetreten</strong>: DFB löste den Vertrag (bis 2028) am 03.07. auf seinen Wunsch auf. Klopp ist Wunschkandidat und hat grundsätzliche Bereitschaft signalisiert.</li>\n      <li><span class=\"chip\">WM</span> <strong>Halbfinale 1 steht</strong>: Frankreich–Spanien, Di 14.07., 21:00 MESZ / 16:00 BRT (Arlington). Spanien schlug Belgien 2:1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay, 3:4 im Elfmeterschießen (Mo 29.06.) — im Sechzehntelfinale, der ersten K.-o.-Runde des 48er-Formats.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen im Achtelfinale (So 05.07.), Haaland-Doppelpack. Schwächste WM seit 1990.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt &amp; gibt ab</strong>: Torwart Backhaus (~12–15 Mio. €, Bremen) fix; Adamu geht zu Schalke. Trainingsauftakt So 12.07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 ist Geschichte</strong>: Bayern Meister (89 Pkt), Freiburg 7. (47 Pkt) → Conference-League-Quali. Neustart 28.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: eingefroren nach Rodada 18, Palmeiras führt (41 Pkt). Neustart in der Woche des 16.–22.07.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Freiburgs Los</strong>: 1. Runde auswärts bei Fortuna Düsseldorf (3. Liga), gespielt 21.–24.08.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The Bundesliga is asleep for the summer, and for both of Daniel's nations the World Cup is long over — but the day still has two hot threads. In Freiburg, the most expensive sale in club history is taking shape: Johan Manzambi is set to move to Newcastle for around €60m, but tonight he's still playing the quarterfinal for Switzerland. And at the DFB, the big personnel question is settled — Nagelsmann is out, Klopp is set to take over.</p>\n    <ul>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi headed to Newcastle</strong>: package worth around €60m — a Freiburg record and the most expensive Swiss transfer ever. Not officially completed yet.</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Tonight</strong>: Norway–England 23:00 MESZ / 18:00 BRT (Miami Gardens); Argentina–Switzerland 03:00 MESZ (Sunday night) / 22:00 BRT (Kansas City) — with Freiburg's Manzambi.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann resigns</strong>: the DFB dissolved his contract (running through 2028) on 07/03 at his own request. Klopp is the top choice and has signaled basic willingness.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Semifinal 1 set</strong>: France–Spain, Tue. 07/14, 21:00 MESZ / 16:00 BRT (Arlington). Spain beat Belgium 2-1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Germany out</strong>: 1-1 vs. Paraguay, 3-4 on penalties (Mon. 06/29) — in the round of 32, the first knockout round of the 48-team format.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil out</strong>: 1-2 vs. Norway in the round of 16 (Sun. 07/05), Haaland brace. Weakest World Cup since 1990.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg buys &amp; sells</strong>: goalkeeper Backhaus (~€12–15m, Bremen) done; Adamu moves to Schalke. Preseason kickoff Sun. 07/12.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 is history</strong>: Bayern champions (89 pts), Freiburg 7th (47 pts) → Conference League qualifying. Restart 08/28.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão on hold</strong>: frozen after Round 18, Palmeiras leads (41 pts). Restart in the week of 07/16-22.</li>\n      <li><span class=\"chip\">Cup</span> <strong>Freiburg's draw</strong>: 1st round away at Fortuna Düsseldorf (3rd division), played 08/21-24.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Bundesliga está em pausa de verão, e para as duas seleções de Daniel a Copa do Mundo já acabou faz tempo — mesmo assim, o dia tem dois assuntos quentes. Em Freiburg, se desenha a venda mais cara da história do clube: Johan Manzambi deve ir para o Newcastle por cerca de € 60 milhões, mas hoje à noite ainda joga pela Suíça nas quartas de final. E no DFB (federação alemã), a grande questão do técnico está resolvida — Nagelsmann saiu, Klopp deve assumir.</p>\n    <ul>\n      <li><span class=\"chip good\">Transferência</span> <strong>Manzambi rumo ao Newcastle</strong>: pacote de cerca de € 60 milhões — recorde do Freiburg e a transferência mais cara de um suíço na história. Ainda não oficializada.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Hoje à noite</strong>: Noruega–Inglaterra 23h00 MESZ / 18h00 BRT (Miami Gardens); Argentina–Suíça 03h00 MESZ (madrugada de domingo) / 22h00 BRT (Kansas City) — com o Manzambi, do Freiburg.</li>\n      <li><span class=\"chip hot\">Seleção Alemã</span> <strong>Nagelsmann renuncia</strong>: o DFB rescindiu o contrato (que ia até 2028) em 03/07, a pedido dele mesmo. Klopp é o nome preferido e sinalizou disposição em princípio.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Semifinal 1 definida</strong>: França–Espanha, ter. 14/07, 21h00 MESZ / 16h00 BRT (Arlington). Espanha venceu a Bélgica por 2 a 1.</li>\n      <li><span class=\"chip\">Seleção Alemã</span> <strong>Alemanha fora</strong>: 1 a 1 com o Paraguai, 3 a 4 nos pênaltis (seg. 29/06) — na fase de 32, a primeira rodada eliminatória do formato com 48 seleções.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil fora</strong>: 1 a 2 para a Noruega nas oitavas de final (dom. 05/07), dobradinha de Haaland. Pior Copa desde 1990.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Freiburg contrata e vende</strong>: goleiro Backhaus (~€ 12–15 milhões, Bremen) fechado; Adamu vai para o Schalke. Início dos treinos dom. 12/07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 é passado</strong>: Bayern campeão (89 pts), Freiburg em 7º (47 pts) → vaga na Conference League (fase preliminar). Retorno em 28/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão em pausa</strong>: congelado após a Rodada 18, Palmeiras lidera (41 pts). Retorno na semana de 16 a 22/07.</li>\n      <li><span class=\"chip\">Copa da Alemanha</span> <strong>Adversário do Freiburg</strong>: 1ª rodada fora de casa contra o Fortuna Düsseldorf (3ª divisão), jogo entre 21 e 24/08.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La Bundesliga está en receso de verano, y para las dos selecciones de Daniel el Mundial ya terminó hace tiempo — aun así, el día trae dos temas candentes. En el Freiburg se perfila la venta más cara en la historia del club: Johan Manzambi iría al Newcastle por unos 60 millones de euros, pero esta noche todavía juega con Suiza en los cuartos de final. Y en la federación alemana (DFB), la gran pregunta del entrenador ya está resuelta — Nagelsmann se fue, Klopp asumiría.</p>\n    <ul>\n      <li><span class=\"chip good\">Transferencia</span> <strong>Manzambi, rumbo al Newcastle</strong>: paquete de alrededor de 60 millones de euros — récord del Freiburg y la transferencia más cara de un suizo en la historia. Aún no es oficial.</li>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Esta noche</strong>: Noruega–Inglaterra 23:00 MESZ / 18:00 BRT (Miami Gardens); Argentina–Suiza 03:00 MESZ (madrugada del domingo) / 22:00 BRT (Kansas City) — con Manzambi, del Freiburg.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann renuncia</strong>: la DFB rescindió su contrato (que corría hasta 2028) el 03/07, a petición propia. Klopp es el candidato preferido y ha señalado disposición en principio.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Semifinal 1 definida</strong>: Francia–España, mar. 14/07, 21:00 MESZ / 16:00 BRT (Arlington). España venció a Bélgica 2-1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Alemania eliminada</strong>: 1-1 contra Paraguay, 3-4 en penales (lun. 29/06) — en la ronda de 32, la primera ronda eliminatoria del formato con 48 selecciones.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil eliminado</strong>: 1-2 contra Noruega en octavos de final (dom. 05/07), doblete de Haaland. Su peor Mundial desde 1990.</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>El Freiburg compra y vende</strong>: el portero Backhaus (~12–15 millones de euros, Bremen) ya es fichaje cerrado; Adamu se va al Schalke. Arranque de pretemporada dom. 12/07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>La 25/26 ya es historia</strong>: el Bayern es campeón (89 pts), el Freiburg terminó 7º (47 pts) → fase previa de la Conference League. Reinicio el 28/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>El Brasileirão está en pausa</strong>: congelado tras la Jornada 18, el Palmeiras es líder (41 pts). Reinicio en la semana del 16 al 22/07.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Rival del Freiburg</strong>: 1ª ronda de visitante ante el Fortuna Düsseldorf (3ª división), se juega entre el 21 y el 24/08.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Samstag, der 11. Juli — der Tag, an dem beide Startaufstellungen für morgen gesetzt werden. In Interlagos, Daniels Heimstrecke, fällt am Nachmittag die <strong>Hypercar-Hyperpole um 15:45 BRT / 20:45 MESZ</strong>; das Sechs-Stunden-Rennen folgt am Sonntag um 11:30 BRT. Parallel fährt die MotoGP am <strong>Sachsenring</strong> ihren Sprint-Samstag: Qualifying am Vormittag, der punktebringende <strong>Sprint um 10:00 BRT / 15:00 MESZ</strong>. Die Formel 1 pausiert weiter bis Spa (17.–19.07.). Wichtig: Die kursierende „Cadillac-Doppelführung\" aus Interlagos stammt vom <strong>2025er</strong> Rennen — die diesjährige Pole ist erst heute Nachmittag fällig, es gibt noch kein Ergebnis.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Interlagos-Quali heute Nachmittag</strong>: LMGT3- und Hypercar-Quali, danach die Hyperpole um <strong>15:45 BRT / 20:45 MESZ</strong>. Im Freitags-Training war die Aston Martin Valkyrie (Tincknell) mit <strong>1:25,457</strong> vorn — hauchdünn vor dem Ferrari #50.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sprint-Samstag am Sachsenring</strong>: Qualifying 05:50 BRT, Sprint <strong>10:00 BRT / 15:00 MESZ</strong>. Marc Márquez war am Freitag mit <strong>1:19,394</strong> Schnellster.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>WM eng an der Spitze</strong>: Jorge Martín (Aprilia) führt mit <strong>193</strong> nur sieben Punkte vor Marco Bezzecchi (186); Di Giannantonio (177) und Ai Ogura (168) lauern.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Hersteller-Stand vor der Runde</strong>: Toyota 132 vor BMW 96 und Ferrari 62 — dahinter drängen sich Alpine (38), Cadillac (32) und Aston Martin (26) auf zwölf Punkte.</li>\n      <li><span class=\"chip\">F1</span> <strong>Pause bis Spa</strong>: keine Session dieses Wochenende. Antonelli (179) und Mercedes (333) führen unverändert; nächste Runde ist der GP Belgien, 17.–19.07. (Runde 10, kein Sprint).</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag ist konfliktfrei</strong>: MotoGP-Rennen 09:00 BRT (nach ~45 min vorbei), dann rund 1¾ Stunden Puffer bis zum Interlagos-Start um 11:30 BRT.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Samstag, der 11. Juli — der Tag, an dem beide Startaufstellungen für morgen gesetzt werden. In Interlagos, Daniels Heimstrecke, fällt am Nachmittag die <strong>Hypercar-Hyperpole um 15:45 BRT / 20:45 MESZ</strong>; das Sechs-Stunden-Rennen folgt am Sonntag um 11:30 BRT. Parallel fährt die MotoGP am <strong>Sachsenring</strong> ihren Sprint-Samstag: Qualifying am Vormittag, der punktebringende <strong>Sprint um 10:00 BRT / 15:00 MESZ</strong>. Die Formel 1 pausiert weiter bis Spa (17.–19.07.). Wichtig: Die kursierende „Cadillac-Doppelführung\" aus Interlagos stammt vom <strong>2025er</strong> Rennen — die diesjährige Pole ist erst heute Nachmittag fällig, es gibt noch kein Ergebnis.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Interlagos-Quali heute Nachmittag</strong>: LMGT3- und Hypercar-Quali, danach die Hyperpole um <strong>15:45 BRT / 20:45 MESZ</strong>. Im Freitags-Training war die Aston Martin Valkyrie (Tincknell) mit <strong>1:25,457</strong> vorn — hauchdünn vor dem Ferrari #50.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sprint-Samstag am Sachsenring</strong>: Qualifying 05:50 BRT, Sprint <strong>10:00 BRT / 15:00 MESZ</strong>. Marc Márquez war am Freitag mit <strong>1:19,394</strong> Schnellster.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>WM eng an der Spitze</strong>: Jorge Martín (Aprilia) führt mit <strong>193</strong> nur sieben Punkte vor Marco Bezzecchi (186); Di Giannantonio (177) und Ai Ogura (168) lauern.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Hersteller-Stand vor der Runde</strong>: Toyota 132 vor BMW 96 und Ferrari 62 — dahinter drängen sich Alpine (38), Cadillac (32) und Aston Martin (26) auf zwölf Punkte.</li>\n      <li><span class=\"chip\">F1</span> <strong>Pause bis Spa</strong>: keine Session dieses Wochenende. Antonelli (179) und Mercedes (333) führen unverändert; nächste Runde ist der GP Belgien, 17.–19.07. (Runde 10, kein Sprint).</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag ist konfliktfrei</strong>: MotoGP-Rennen 09:00 BRT (nach ~45 min vorbei), dann rund 1¾ Stunden Puffer bis zum Interlagos-Start um 11:30 BRT.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Saturday, July 11 — the day both starting grids for tomorrow are set. At Interlagos, Daniel's home track, the <strong>Hypercar hyperpole falls in the afternoon at 15:45 BRT / 20:45 MESZ</strong>; the six-hour race follows on Sunday at 11:30 BRT. In parallel, MotoGP runs its sprint Saturday at the <strong>Sachsenring</strong>: qualifying in the morning, the points-paying <strong>sprint at 10:00 BRT / 15:00 MESZ</strong>. Formula 1 remains on its break until Spa (17.–19.07.). Important: the \"Cadillac front-row lockout\" from Interlagos circulating around is from the <strong>2025</strong> race — this year's pole isn't due until this afternoon, and there's no result yet.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Interlagos qualifying this afternoon</strong>: LMGT3 and Hypercar qualifying, then the hyperpole at <strong>15:45 BRT / 20:45 MESZ</strong>. In Friday's practice, the Aston Martin Valkyrie (Tincknell) topped the times with <strong>1:25.457</strong> — a hair ahead of the Ferrari #50.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sprint Saturday at the Sachsenring</strong>: qualifying 05:50 BRT, sprint <strong>10:00 BRT / 15:00 MESZ</strong>. Marc Márquez was fastest on Friday with <strong>1:19.394</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Championship tight at the top</strong>: Jorge Martín (Aprilia) leads with <strong>193</strong>, just seven points ahead of Marco Bezzecchi (186); Di Giannantonio (177) and Ai Ogura (168) lurk close behind.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Manufacturer standings ahead of the round</strong>: Toyota 132 leads BMW 96 and Ferrari 62 — behind them, Alpine (38), Cadillac (32) and Aston Martin (26) are packed within twelve points.</li>\n      <li><span class=\"chip\">F1</span> <strong>Break until Spa</strong>: no session this weekend. Antonelli (179) and Mercedes (333) still lead unchanged; next round is the Belgian GP, 17.–19.07. (round 10, no sprint).</li>\n      <li><span class=\"chip\">Aside</span> <strong>Daniel's Sunday is conflict-free</strong>: MotoGP race at 09:00 BRT (over after ~45 min), then roughly 1¾ hours of buffer until the Interlagos start at 11:30 BRT.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É sábado, 11 de julho — o dia em que os dois grids de largada de amanhã são definidos. Em Interlagos, pista da casa de Daniel, a <strong>hyperpole da Hypercar acontece à tarde, às 15:45 BRT / 20:45 MESZ</strong>; a corrida de seis horas vem no domingo, às 11:30 BRT. Em paralelo, a MotoGP disputa seu sábado de sprint no <strong>Sachsenring</strong>: classificação pela manhã, o <strong>sprint que dá pontos às 10:00 BRT / 15:00 MESZ</strong>. A Fórmula 1 segue de folga até Spa (17.–19.07.). Importante: a \"dobradinha da Cadillac\" em Interlagos que circula por aí é da corrida de <strong>2025</strong> — a pole deste ano só sai hoje à tarde, ainda não há resultado.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Classificação de Interlagos hoje à tarde</strong>: classificação de LMGT3 e Hypercar, seguida da hyperpole às <strong>15:45 BRT / 20:45 MESZ</strong>. No treino de sexta-feira, o Aston Martin Valkyrie (Tincknell) liderou com <strong>1:25,457</strong> — na frente por pouco do Ferrari #50.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sábado de sprint no Sachsenring</strong>: classificação às 05:50 BRT, sprint <strong>às 10:00 BRT / 15:00 MESZ</strong>. Marc Márquez foi o mais rápido na sexta-feira, com <strong>1:19,394</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Mundial disputado na ponta</strong>: Jorge Martín (Aprilia) lidera com <strong>193</strong>, apenas sete pontos à frente de Marco Bezzecchi (186); Di Giannantonio (177) e Ai Ogura (168) espreitam logo atrás.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Classificação de fabricantes antes da rodada</strong>: Toyota lidera com 132 sobre BMW (96) e Ferrari (62) — atrás, Alpine (38), Cadillac (32) e Aston Martin (26) estão espremidos em doze pontos.</li>\n      <li><span class=\"chip\">F1</span> <strong>Pausa até Spa</strong>: sem sessão neste fim de semana. Antonelli (179) e a Mercedes (333) seguem líderes sem mudanças; a próxima rodada é o GP da Bélgica, 17.–19.07. (rodada 10, sem sprint).</li>\n      <li><span class=\"chip\">Aparte</span> <strong>Domingo de Daniel é sem conflito</strong>: corrida da MotoGP às 09:00 BRT (termina em ~45 min), depois cerca de 1¾ hora de folga até a largada em Interlagos, às 11:30 BRT.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es sábado 11 de julio — el día en que se definen las dos parrillas de salida de mañana. En Interlagos, la pista de casa de Daniel, la <strong>hyperpole de Hypercar cae en la tarde, a las 15:45 BRT / 20:45 MESZ</strong>; la carrera de seis horas sigue el domingo a las 11:30 BRT. En paralelo, MotoGP corre su sábado de sprint en el <strong>Sachsenring</strong>: clasificación en la mañana, el <strong>sprint que reparte puntos a las 10:00 BRT / 15:00 MESZ</strong>. La Fórmula 1 sigue de descanso hasta Spa (17.–19.07.). Importante: el \"doblete de Cadillac\" en Interlagos que circula por ahí es de la carrera de <strong>2025</strong> — la pole de este año se define hasta esta tarde, todavía no hay resultado.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Clasificación de Interlagos esta tarde</strong>: clasificación de LMGT3 e Hypercar, seguida de la hyperpole a las <strong>15:45 BRT / 20:45 MESZ</strong>. En la práctica del viernes, el Aston Martin Valkyrie (Tincknell) marcó el mejor tiempo con <strong>1:25,457</strong> — por muy poco delante del Ferrari #50.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sábado de sprint en el Sachsenring</strong>: clasificación a las 05:50 BRT, sprint <strong>a las 10:00 BRT / 15:00 MESZ</strong>. Marc Márquez fue el más rápido el viernes, con <strong>1:19,394</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Mundial muy peleado en la punta</strong>: Jorge Martín (Aprilia) lidera con <strong>193</strong>, apenas siete puntos por delante de Marco Bezzecchi (186); Di Giannantonio (177) y Ai Ogura (168) acechan de cerca.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Clasificación de fabricantes antes de la fecha</strong>: Toyota lidera con 132 sobre BMW (96) y Ferrari (62) — detrás, Alpine (38), Cadillac (32) y Aston Martin (26) están apretados en doce puntos.</li>\n      <li><span class=\"chip\">F1</span> <strong>Descanso hasta Spa</strong>: sin sesión este fin de semana. Antonelli (179) y Mercedes (333) siguen al frente sin cambios; la próxima fecha es el GP de Bélgica, 17.–19.07. (ronda 10, sin sprint).</li>\n      <li><span class=\"chip\">Aparte</span> <strong>El domingo de Daniel no tiene conflictos</strong>: carrera de MotoGP a las 09:00 BRT (termina tras ~45 min), luego cerca de 1¾ hora de margen hasta la salida en Interlagos, a las 11:30 BRT.</li>\n    </ul></div>"

 <strong>Großraum SP — Ferien-Highlights dieses Wochenende</strong>: Turma-da-Mônica-Hüpfpark (11.–12.07., Shopping Eldorado), Festa do Morango (11./12./18./19.07., Atibaia/Jarinu, gratis), Museu da Língua Portuguesa „Estação Férias\" (bis 19.07., gratis). Alle nur eine Quelle — als Trip-Idee, nicht als Zusage.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien ab Montag, 13.07.</strong> — rede estadual PR, zwei Wochen, Rückkehr 27.07. Heute + morgen sind ohnehin Wochenende.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>RSV-Welle dreht weiter</strong>: Das letzte Bulletin (InfoGripe SE 26/2026, publ. 09.07.) zählt Paraná zu den Staaten mit „início de queda\". Kein frischeres heute — VSR aber noch 55,9 % der Fälle, mit Baby wachsam bleiben.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>Dengue-Rückgang ist eine Jahresanfangs-Zahl</strong>: −96,1 % Fälle / −98,8 % Tote gelten für SE 1–14/2026 (Jan.–Mitte März), kein aktueller Juli-Wert, kein aktiver Alarm.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Today is the second-to-last day of the biggest local fair around: the <strong>31st Fetexas</strong> in Jacarezinho runs through tomorrow — free admission, rodeo, motocross, live stage, about a 20-minute drive away. The real question mark stays the weather. For <em>today</em>, two portals agree: dry, 0% rain, a warm 28°. Yet weather service INMET has a thunderstorm risk on the books for Paraná for Friday and Saturday — exactly the window today falls in. And for <em>tomorrow</em>, the portals openly disagree: Climatempo says 0%, a second portal says 50% rain. We won't quietly pick one figure over the other. On top of that, winter break starts Monday — opening a window full of kids' events in Londrina and the greater São Paulo area.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>31st Fetexas — Leonardo today, Sorriso Maroto tomorrow</strong>: Centro de Eventos PR-431, Jacarezinho (~15 km), free admission. Motocross Sat/Sun, rodeo, amusement park, food court. Last day is Sunday.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Dry today per the portals — INMET storm risk says otherwise</strong>: Climatempo and theweather.com both report 0% rain for Saturday; INMET's national bulletin (published 07/09) names a \"risco potencial para tempestades\" over the central Paraná axis for 7/10–7/11. Both are in the brief.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Sunday: 0% vs. 50%</strong> — Climatempo 25°/16°, 0%; theweather.com 24°/12°, 50% light rain. Two portals, two calls. For a Fetexas finale under the open sky, pack the rain plan.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Kids' theater in Londrina — tomorrow afternoon</strong>: \"João e Maria\" (Sessão Aurorinha), Sundays in July, ~110 km, R$ 20 / R$ 10, open to all ages. A rain-proof indoor pick for the little ones.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Greater São Paulo — this weekend's break highlights</strong>: Turma da Mônica bounce park (7/11–7/12, Shopping Eldorado), Festa do Morango (7/11, 7/12, 7/18, 7/19, Atibaia/Jarinu, free), Museu da Língua Portuguesa \"Estação Férias\" (through 7/19, free). All single-sourced — treat as trip ideas, not confirmed plans.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break starts Monday, 7/13</strong> — Paraná's state school system, two weeks, back 7/27. Today and tomorrow are already the weekend.</li>\n      <li><span class=\"chip good\">Health</span> <strong>RSV wave keeps easing</strong>: The latest bulletin (InfoGripe week 26/2026, published 7/9) puts Paraná among the states showing \"início de queda.\" Nothing newer today — but RSV still accounts for 55.9% of cases, so stay watchful with the baby.</li>\n      <li><span class=\"chip\">Health</span> <strong>The dengue drop is a start-of-year figure</strong>: −96.1% cases / −98.8% deaths cover weeks 1–14/2026 (Jan.–mid-March), no current July figure, no active alert.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o penúltimo dia da maior festa popular por aqui: a <strong>31ª Fetexas</strong>, em Jacarezinho, vai até amanhã — entrada gratuita, rodeio, motocross, palco, cerca de 20 minutos de carro. A verdadeira dúvida continua sendo o tempo. Para <em>hoje</em>, dois portais concordam: seco, 0% de chuva, 28° quentinhos. Mas o INMET tem no radar um risco de tempestade para o Paraná na sexta e no sábado — exatamente a janela em que hoje cai. E para <em>amanhã</em>, os portais discordam abertamente: a Climatempo diz 0%, um segundo portal diz 50% de chuva. Não escolhemos silenciosamente nenhum dos valores. A partir de segunda começam as férias de inverno — o que abre uma janela cheia de eventos para crianças em Londrina e na Grande São Paulo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>31ª Fetexas — hoje Leonardo, amanhã Sorriso Maroto</strong>: Centro de Eventos PR-431, Jacarezinho (~15 km), entrada gratuita. Motocross sáb/dom, rodeio, parque de diversões, praça de alimentação. Último dia é domingo.</li>\n      <li><span class=\"chip hot\">Tempo</span> <strong>Hoje seco segundo os portais — risco de tempestade do INMET diz o contrário</strong>: Climatempo e theweather.com anunciam 0% de chuva para sábado; o boletim nacional do INMET (publ. em 09/07) cita para 10 e 11/07 um \"risco potencial para tempestades\" ao longo do eixo central do Paraná. Ambos no boletim.</li>\n      <li><span class=\"chip hot\">Tempo</span> <strong>Domingo: 0% contra 50%</strong> — Climatempo 25°/16°, 0%; theweather.com 24°/12°, 50% de chuva leve. Dois portais, duas versões. Para uma final de Fetexas ao ar livre, leve o plano B contra chuva.</li>\n      <li><span class=\"chip good\">Passeio</span> <strong>Teatro infantil em Londrina — amanhã à tarde</strong>: \"João e Maria\" (Sessão Aurorinha), aos domingos de julho, ~110 km, R$ 20 / R$ 10, classificação livre. Um destino coberto à prova de chuva para os pequenos.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Grande SP — destaques das férias neste fim de semana</strong>: parque de pula-pula da Turma da Mônica (11–12/07, Shopping Eldorado), Festa do Morango (11, 12, 18 e 19/07, Atibaia/Jarinu, gratuita), Museu da Língua Portuguesa \"Estação Férias\" (até 19/07, gratuito). Todos com fonte única — encare como ideia de passeio, não como programação confirmada.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno a partir de segunda, 13/07</strong> — rede estadual do PR, duas semanas, retorno em 27/07. Hoje e amanhã já são fim de semana.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Onda de VSR continua em queda</strong>: o último boletim (InfoGripe SE 26/2026, publ. 09/07) inclui o Paraná entre os estados com \"início de queda\". Nada mais recente hoje — mas o VSR ainda responde por 55,9% dos casos, então vale manter atenção com o bebê.</li>\n      <li><span class=\"chip\">Saúde</span> <strong>Queda da dengue é um número do início do ano</strong>: −96,1% de casos / −98,8% de mortes se referem à SE 1–14/2026 (jan.–meados de março), sem valor atual de julho, sem alerta ativo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es el penúltimo día de la feria popular más grande de la zona: la <strong>31ª Fetexas</strong> en Jacarezinho sigue hasta mañana — entrada gratuita, rodeo, motocross, escenario, a unos 20 minutos en carro. La verdadera incógnita sigue siendo el clima. Para <em>hoy</em>, dos portales coinciden: seco, 0% de lluvia, unos cálidos 28°. Pero el servicio meteorológico INMET tiene registrado un riesgo de tormenta para Paraná el viernes y el sábado — justo la ventana en la que cae hoy. Y para <em>mañana</em>, los portales se contradicen abiertamente: Climatempo dice 0%, un segundo portal dice 50% de lluvia. No elegimos en silencio ninguno de los dos valores. Además, el lunes empiezan las vacaciones de invierno — lo que abre una ventana llena de eventos infantiles en Londrina y en la zona metropolitana de São Paulo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>31ª Fetexas — hoy Leonardo, mañana Sorriso Maroto</strong>: Centro de Eventos PR-431, Jacarezinho (~15 km), entrada gratuita. Motocross sáb/dom, rodeo, parque de diversiones, zona de comida. El último día es el domingo.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Hoy seco según los portales — el riesgo de tormenta del INMET dice lo contrario</strong>: Climatempo y theweather.com reportan 0% de lluvia para el sábado; el boletín nacional del INMET (public. el 09/07) menciona para el 10 y 11 de julio un \"risco potencial para tempestades\" a lo largo del eje central de Paraná. Ambos aparecen en el boletín.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Domingo: 0% contra 50%</strong> — Climatempo 25°/16°, 0%; theweather.com 24°/12°, 50% de lluvia ligera. Dos portales, dos versiones. Para una final de Fetexas al aire libre, hay que llevar plan B contra la lluvia.</li>\n      <li><span class=\"chip good\">Paseo</span> <strong>Teatro infantil en Londrina — mañana por la tarde</strong>: \"João e Maria\" (Sessão Aurorinha), los domingos de julio, ~110 km, R$ 20 / R$ 10, apto para todo público. Un destino techado a prueba de lluvia para los más pequeños.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Zona metropolitana de SP — lo más destacado de las vacaciones este fin de semana</strong>: parque de inflables de la Turma da Mônica (11–12/07, Shopping Eldorado), Festa do Morango (11, 12, 18 y 19/07, Atibaia/Jarinu, gratis), Museu da Língua Portuguesa \"Estação Férias\" (hasta el 19/07, gratis). Todos con una sola fuente — tómalos como idea de paseo, no como algo confirmado.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno a partir del lunes 13/07</strong> — sistema estatal de Paraná, dos semanas, regreso el 27/07. Hoy y mañana ya son fin de semana.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>La ola de VSR sigue bajando</strong>: el último boletín (InfoGripe SE 26/2026, public. el 09/07) incluye a Paraná entre los estados con \"início de queda\". Nada más reciente hoy — pero el VSR todavía representa el 55.9% de los casos, así que hay que mantenerse atentos con el bebé.</li>\n      <li><span class=\"chip\">Salud</span> <strong>La baja del dengue es una cifra de principios de año</strong>: −96.1% de casos / −98.8% de muertes corresponden a la SE 1–14/2026 (enero–mediados de marzo), sin cifra actual de julio, sin alerta activa.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstag, der 11. Juli — Wochenthema <em>Essen &amp; Kochen</em>, heute am Feuer: der <em>churrasco</em>, das brasilianische Grillfest, gegen die mexikanische <em>carne asada</em>. Frühere Ess-Tage haben das Restaurant, die Küchentechnik und die Festa-Junina-Süßigkeiten abgedeckt; heute stehst du am <em>Rost</em>: die <em>Grillkohle anzünden</em>, das Fleisch <em>aufspießen</em> und <em>wenden</em>, es gegen die Faser <em>schneiden</em> und <em>ruhen lassen</em>, dazu <em>Farofa</em> und <em>vinagrete</em> — und wissen, warum <em>picanha</em> ein Lehnwort bleibt und der <em>Gargrad</em> in Brasilien und Mexiko unterschiedlich gezählt wird. 34 Einträge, 11 Verben mit voller Konjugation (davon 1 Auffrischung), plus die BR-typischen Churrasco-Wörter und der falsche Freund des Tages.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>esquisito (PT) ≠ exquisite</strong> — PT <em>esquisito</em> heißt „seltsam / komisch\", nicht „exquisit\". „A carne está esquisita\" = das Fleisch schmeckt <em>komisch</em>, nicht <em>köstlich</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>churrasco</strong> — in Brasilien das ganze gesellige Grill-Ereignis; in Chile ein Steak-Sandwich, in Argentinien ein zartes Filetstück. Ein Wort, vier Bedeutungen.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>carne asada</strong> — das gesellige Grillfest heißt in Mexiko <em>carne asada</em>, nicht <em>churrasco</em> (MX kennt „churrasco\" nur als einzelnen Fleisch-Schnitt).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES encender diphthongiert e→ie</strong> — das Feuer anzünden: <em>enciendo</em>, <em>enciende</em>, aber <em>encendemos</em> (nosotros bleibt ohne Diphthong).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT &amp; ES servir e→i</strong> — <em>eu sirvo / yo sirvo</em>, aber <em>nós servimos / nosotros servimos</em>. Die Hebung nur unter Betonung.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE wenden hat ZWEI Vergangenheiten</strong> — Fleisch wenden: <em>wendete / gewendet</em> (schwach); sich an jdn. <em>wenden</em>: <em>wandte / gewandt</em> (stark). Beim Grillen immer die e-Formen.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>mitbringen · trazer · traer</strong> — alle drei unregelmäßig: <em>brachte mit</em>, <em>trouxe</em>, <em>traje</em>. Zum Churrasco bringt jeder etwas mit.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES probar diphthongiert o→ue</strong> (<em>pruebo</em>) — aber PT <em>provar</em> bleibt regelmäßig (<em>provo</em>). Gleiche Wurzel, zwei Muster.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE ruhen lassen → Ersatzinfinitiv</strong> — „ich habe das Fleisch <em>ruhen lassen</em>\", nicht <em>*ruhen gelassen</em> (doppelter Infinitiv im Perfekt).</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>Jeder bringt etwas mit</strong> — das Potluck-Prinzip beim Grillen: BR <em>cada um leva alguma coisa</em>, MX <em>cada quien lleva algo</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>picanha · maminha · farofa bleiben Lehnwörter</strong> — Mexiko zerlegt das Rind anders; es gibt kein exaktes MX-Wort. Am Grill liegt dort eher <em>arrachera</em>.</li>\n      <li><span class=\"chip\">WIEDERHOLUNG</span> <strong>probieren · lecker/köstlich · die Beilage</strong> — aufgefrischt aus dem Restaurant-Tag vom 20.06, alle drei passen direkt zum Churrasco.</li>\n    </ul></div>",
