      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Eine fette Security-Woche klingt am Wochenende nach. Microsoft hat den umfangreichsten Patch Tuesday seiner Geschichte ausgeliefert — über 200 Lücken, darunter eine wurmfähige Kernel-RCE mit dem Profil von EternalBlue. Spring hat parallel seinen kompletten Portfolio-Patchzug abgeladen: ein gutes Dutzend CVEs quer durch Framework, Boot, Cloud und Integration — Daniels Java-Stack ist direkt dabei. Und der npm/PyPI-Wurm „Miasma\" frisst sich seit Anfang Juni durch das Paket-Ökosystem, diesmal sogar durch Red-Hat-Scopes. Releases sind ruhig, Sicherheit ist laut.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Patch Tuesday</strong>: 208 CVEs — Rekord. Wurmfähige Kernel-RCE CVE-2026-45657 (CVSS 9,8), kein Klick, kein Login nötig.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Spring-Patchzug</strong>: ~12 Advisories vom 8.–12.06. quer durchs Portfolio — u. a. Deserialisierungs-RCE in Statemachine, Arbitrary-File-Write in Integration.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Miasma/Shai-Hulud</strong>: npm/PyPI-Wurm seit 1.6., 100+ Pakete, Red-Hat-Cloud-Scope gekapert — klaut Cloud-Credentials, propagiert sich selbst.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ivanti Sentry</strong>: CVE-2026-10520 (CVSS 10,0), unauth Root-RCE, in CISA-KEV — Behörden-Frist 14.06.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Defender</strong>: CVE-2026-41091 (EoP) wird aktiv ausgenutzt; „RoguePlanet\"-Zero-Day weiter ohne Patch.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Docker Engine 29</strong>: BuildKit-Path-Traversal (CVE-2026-33747) und AuthZ-Bypass (CVE-2026-34040) gefixt.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Python 3.15</strong>: Feature Freeze — <code>frozendict</code> als Builtin, saubereres asyncio-TaskGroup-Cancel, GA am 1.10.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>CRA</strong>: weniger als 100 Tage bis zur scharfen Melde­pflicht (11.09.) — ENISA-Plattform noch nicht aufgesetzt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Eine fette Security-Woche klingt am Wochenende nach. Microsoft hat den umfangreichsten Patch Tuesday seiner Geschichte ausgeliefert — über 200 Lücken, darunter eine wurmfähige Kernel-RCE mit dem Profil von EternalBlue. Spring hat parallel seinen kompletten Portfolio-Patchzug abgeladen: ein gutes Dutzend CVEs quer durch Framework, Boot, Cloud und Integration — Daniels Java-Stack ist direkt dabei. Und der npm/PyPI-Wurm „Miasma\" frisst sich seit Anfang Juni durch das Paket-Ökosystem, diesmal sogar durch Red-Hat-Scopes. Releases sind ruhig, Sicherheit ist laut.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Patch Tuesday</strong>: 208 CVEs — Rekord. Wurmfähige Kernel-RCE CVE-2026-45657 (CVSS 9,8), kein Klick, kein Login nötig.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Spring-Patchzug</strong>: ~12 Advisories vom 8.–12.06. quer durchs Portfolio — u. a. Deserialisierungs-RCE in Statemachine, Arbitrary-File-Write in Integration.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Miasma/Shai-Hulud</strong>: npm/PyPI-Wurm seit 1.6., 100+ Pakete, Red-Hat-Cloud-Scope gekapert — klaut Cloud-Credentials, propagiert sich selbst.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ivanti Sentry</strong>: CVE-2026-10520 (CVSS 10,0), unauth Root-RCE, in CISA-KEV — Behörden-Frist 14.06.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Defender</strong>: CVE-2026-41091 (EoP) wird aktiv ausgenutzt; „RoguePlanet\"-Zero-Day weiter ohne Patch.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Docker Engine 29</strong>: BuildKit-Path-Traversal (CVE-2026-33747) und AuthZ-Bypass (CVE-2026-34040) gefixt.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Python 3.15</strong>: Feature Freeze — <code>frozendict</code> als Builtin, saubereres asyncio-TaskGroup-Cancel, GA am 1.10.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>CRA</strong>: weniger als 100 Tage bis zur scharfen Melde­pflicht (11.09.) — ENISA-Plattform noch nicht aufgesetzt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A major security week echoes into the weekend. Microsoft shipped the largest Patch Tuesday in its history — over 200 holes, including a wormable kernel RCE with the profile of EternalBlue. Spring dumped its entire portfolio patch train in parallel: a good dozen CVEs across Framework, Boot, Cloud, and Integration — Daniel's Java stack is directly affected. And the npm/PyPI worm \"Miasma\" has been chewing through the package ecosystem since early June, this time even through Red Hat scopes. Releases are quiet, security is loud.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Patch Tuesday</strong>: 208 CVEs — record. Wormable kernel RCE CVE-2026-45657 (CVSS 9.8), no click, no login required.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Spring patch train</strong>: ~12 advisories from June 8–12 across the portfolio — including deserialization RCE in Statemachine, arbitrary file write in Integration.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Miasma/Shai-Hulud</strong>: npm/PyPI worm since June 1, 100+ packages, Red Hat Cloud scope compromised — steals cloud credentials, propagates itself.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ivanti Sentry</strong>: CVE-2026-10520 (CVSS 10.0), unauthenticated root RCE, in CISA KEV — agency deadline June 14.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Defender</strong>: CVE-2026-41091 (EoP) actively exploited; \"RoguePlanet\" zero-day still without a patch.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Docker Engine 29</strong>: BuildKit path traversal (CVE-2026-33747) and AuthZ bypass (CVE-2026-34040) fixed.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Python 3.15</strong>: Feature freeze — <code>frozendict</code> as builtin, cleaner asyncio TaskGroup cancellation, GA on Oct 1.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>CRA</strong>: less than 100 days to mandatory reporting (Sept 11) — ENISA platform not yet live.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma semana de segurança significativa ecoa pelo fim de semana. A Microsoft lançou o maior Patch Tuesday de sua história — mais de 200 falhas, incluindo uma RCE de kernel transmissível com o perfil do EternalBlue. A Spring despejou todo seu trem de patches de portfólio em paralelo: aproximadamente uma dúzia de CVEs em Framework, Boot, Cloud e Integration — a stack Java de Daniel é atingida diretamente. E o worm npm/PyPI \"Miasma\" está percorrendo o ecossistema de pacotes desde o início de junho, desta vez até através de escopos Red Hat. Lançamentos estão quietos, segurança está em alta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <strong>Patch Tuesday</strong>: 208 CVEs — recorde. RCE de kernel transmissível CVE-2026-45657 (CVSS 9,8), sem clique, sem login necessário.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Trem de patches Spring</strong>: ~12 avisos de 8 a 12 de junho através do portfólio — incluindo RCE de desserialização no Statemachine, escrita arbitrária de arquivo no Integration.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Miasma/Shai-Hulud</strong>: worm npm/PyPI desde 1º de junho, 100+ pacotes, escopo Red Hat Cloud comprometido — rouba credenciais na nuvem, se propaga.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Ivanti Sentry</strong>: CVE-2026-10520 (CVSS 10,0), RCE root não autenticado, em CISA KEV — prazo da agência 14 de junho.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Defender</strong>: CVE-2026-41091 (EoP) explorado ativamente; zero-day \"RoguePlanet\" continua sem patch.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Docker Engine 29</strong>: travessia de caminho BuildKit (CVE-2026-33747) e bypass de AuthZ (CVE-2026-34040) corrigidos.</li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>Python 3.15</strong>: congelamento de recursos — <code>frozendict</code> como builtin, cancelamento mais limpo de TaskGroup asyncio, GA em 1º de outubro.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>CRA</strong>: menos de 100 dias para relatório obrigatório (11 de setembro) — plataforma ENISA ainda não ativa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una semana de seguridad significativa se extiende hasta el fin de semana. Microsoft lanzó el mayor Patch Tuesday de su historia — más de 200 brechas, incluida una RCE de kernel transmisible con el perfil de EternalBlue. Spring descargó todo su tren de parches de portafolio en paralelo: aproximadamente una docena de CVEs en Framework, Boot, Cloud e Integration — la stack Java de Daniel se ve directamente afectada. Y el gusano npm/PyPI \"Miasma\" ha estado devorando el ecosistema de paquetes desde principios de junio, esta vez incluso a través de alcances Red Hat. Los lanzamientos están tranquilos, la seguridad está ruidosa.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <strong>Patch Tuesday</strong>: 208 CVEs — récord. RCE de kernel transmisible CVE-2026-45657 (CVSS 9,8), sin clic, sin inicio de sesión requerido.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Tren de parches Spring</strong>: ~12 avisos del 8 al 12 de junio en todo el portafolio — incluida RCE de deserialización en Statemachine, escritura arbitraria de archivos en Integration.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Miasma/Shai-Hulud</strong>: gusano npm/PyPI desde el 1º de junio, 100+ paquetes, alcance Red Hat Cloud comprometido — roba credenciales en la nube, se propaga.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Ivanti Sentry</strong>: CVE-2026-10520 (CVSS 10,0), RCE root sin autenticación, en CISA KEV — plazo de agencia 14 de junio.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Defender</strong>: CVE-2026-41091 (EoP) explotado activamente; zero-day \"RoguePlanet\" sin parche.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Docker Engine 29</strong>: traversal de ruta BuildKit (CVE-2026-33747) y bypass de AuthZ (CVE-2026-34040) corregidos.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>Python 3.15</strong>: congelamiento de características — <code>frozendict</code> como builtin, cancelación más limpia de TaskGroup asyncio, GA el 1º de octubre.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>CRA</strong>: menos de 100 días para reporte obligatorio (11 de septiembre) — plataforma ENISA aún no activa.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Genau die Lektion von gestern, einen Tag später als Fallstudie: Moonshot hat am 12.06. das offene Coding-Modell <strong>Kimi K2.7-Code</strong> veröffentlicht — 1-Billion-Parameter-MoE, freie Gewichte unter Modified-MIT-Lizenz, ein realer Kandidat für Daniels lokale Box. Die Schlagzeile lautet <strong>+21,8 %</strong>. Nur: Diese Zahl und fast alle anderen stammen aus Moonshots <em>eigener</em> Benchmark-Suite (Kimi Code Bench v2). Auf den unabhängigen Standard-Boards — SWE-Bench Pro, Terminal-Bench, Aider — taucht K2.7-Code noch gar nicht auf. Das offene Lager bleibt dort, wo es seit April war: stark in den Hausnummern, dünn in der standardisierten Messung. Ein ruhiger Tools-Tag drumherum.</p>\n    <ul>\n      <li><span class=\"chip hot\">Local</span> <strong>Kimi K2.7-Code</strong> (12.06.) — 1T-MoE, 32B aktiv, 256k Kontext, offene Gewichte. Moonshot meldet <span class=\"stat\">+21,8 %</span> auf Kimi Code Bench v2 (50,9 → 62,0) und ~30 % weniger Reasoning-Token. <span class=\"chip good\">probieren</span></li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Alles Hausnummern</strong>: die Gewinn-Zahlen kommen aus Moonshots eigener Suite. Auf dem standardisierten Scale-SEAL-Board (Stand 09.06.) ist K2.7-Code <em>nicht gelistet</em> — kein unabhängiger SWE-Bench-Pro-/Terminal-Bench-Lauf bisher.</li>\n      <li><span class=\"chip\">Local</span> <strong>Kimi Work</strong> (12.06.) — lokaler Desktop-Agent (macOS/Windows), laut Moonshot bis zu <span class=\"stat\">300</span> Sub-Agenten parallel auf der eigenen Maschine, mit Datei- und Browser-Zugriff. Vendor-Claim, keine unabhängige Verifikation.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Offenes Lager im Realitäts-Check</strong>: einziges Open-Weights-Modell mit standardisiertem SEAL-Eintrag bleibt Qwen3-Coder-480B bei <span class=\"stat\">38,7 %</span>; für DeepSeek V4 Pro und Kimi existieren nur Vendor-Scaffold-Zahlen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>OpenCode</strong> hält die OSS-Spitze (#1 im LogRocket-Juni-Ranking, ~160k Stars) — der modell-agnostische Terminal-Agent ist das natürliche Zuhause für ein frisches K2.7-Code.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> schiebt <em>Auto-Review</em> nach: ein Kontext-Klassifikator, der risikoarme Agent-Schritte laufen lässt und bei heiklen bremst. Kein neues Modell.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Aider</strong> weiter dormant (letzter Push 22.05.), <strong>Cline/OpenHands/Continue</strong> stabil, <strong>Codestral</strong> seit 25.08 unverändert — Mistral steckt die Coding-Energie in Vibe Code Mode. Details unten.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code</strong> steht weiter bei <strong>v2.1.173</strong> (11.06.) — kein Wochenend-Release.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Genau die Lektion von gestern, einen Tag später als Fallstudie: Moonshot hat am 12.06. das offene Coding-Modell <strong>Kimi K2.7-Code</strong> veröffentlicht — 1-Billion-Parameter-MoE, freie Gewichte unter Modified-MIT-Lizenz, ein realer Kandidat für Daniels lokale Box. Die Schlagzeile lautet <strong>+21,8 %</strong>. Nur: Diese Zahl und fast alle anderen stammen aus Moonshots <em>eigener</em> Benchmark-Suite (Kimi Code Bench v2). Auf den unabhängigen Standard-Boards — SWE-Bench Pro, Terminal-Bench, Aider — taucht K2.7-Code noch gar nicht auf. Das offene Lager bleibt dort, wo es seit April war: stark in den Hausnummern, dünn in der standardisierten Messung. Ein ruhiger Tools-Tag drumherum.</p>\n    <ul>\n      <li><span class=\"chip hot\">Local</span> <strong>Kimi K2.7-Code</strong> (12.06.) — 1T-MoE, 32B aktiv, 256k Kontext, offene Gewichte. Moonshot meldet <span class=\"stat\">+21,8 %</span> auf Kimi Code Bench v2 (50,9 → 62,0) und ~30 % weniger Reasoning-Token. <span class=\"chip good\">probieren</span></li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Alles Hausnummern</strong>: die Gewinn-Zahlen kommen aus Moonshots eigener Suite. Auf dem standardisierten Scale-SEAL-Board (Stand 09.06.) ist K2.7-Code <em>nicht gelistet</em> — kein unabhängiger SWE-Bench-Pro-/Terminal-Bench-Lauf bisher.</li>\n      <li><span class=\"chip\">Local</span> <strong>Kimi Work</strong> (12.06.) — lokaler Desktop-Agent (macOS/Windows), laut Moonshot bis zu <span class=\"stat\">300</span> Sub-Agenten parallel auf der eigenen Maschine, mit Datei- und Browser-Zugriff. Vendor-Claim, keine unabhängige Verifikation.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Offenes Lager im Realitäts-Check</strong>: einziges Open-Weights-Modell mit standardisiertem SEAL-Eintrag bleibt Qwen3-Coder-480B bei <span class=\"stat\">38,7 %</span>; für DeepSeek V4 Pro und Kimi existieren nur Vendor-Scaffold-Zahlen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>OpenCode</strong> hält die OSS-Spitze (#1 im LogRocket-Juni-Ranking, ~160k Stars) — der modell-agnostische Terminal-Agent ist das natürliche Zuhause für ein frisches K2.7-Code.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> schiebt <em>Auto-Review</em> nach: ein Kontext-Klassifikator, der risikoarme Agent-Schritte laufen lässt und bei heiklen bremst. Kein neues Modell.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Aider</strong> weiter dormant (letzter Push 22.05.), <strong>Cline/OpenHands/Continue</strong> stabil, <strong>Codestral</strong> seit 25.08 unverändert — Mistral steckt die Coding-Energie in Vibe Code Mode. Details unten.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code</strong> steht weiter bei <strong>v2.1.173</strong> (11.06.) — kein Wochenend-Release.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Exactly yesterday's lesson, one day later as a case study: on 06.12, Moonshot released the open-source coding model <strong>Kimi K2.7-Code</strong> — one-trillion-parameter MoE, free weights under Modified MIT License, a real candidate for Daniel's local box. The headline reads <strong>+21.8 %</strong>. Except: this number and nearly all the others come from Moonshot's <em>own</em> benchmark suite (Kimi Code Bench v2). On independent standard boards — SWE-Bench Pro, Terminal-Bench, Aider — K2.7-Code hasn't appeared yet. The open-weights camp remains where it's been since April: strong in proprietary numbers, thin in standardized measurement. A quiet tools day otherwise.</p>\n    <ul>\n      <li><span class=\"chip hot\">Local</span> <strong>Kimi K2.7-Code</strong> (06.12) — 1T-MoE, 32B active, 256k context, open weights. Moonshot reports <span class=\"stat\">+21.8 %</span> on Kimi Code Bench v2 (50.9 → 62.0) and ~30 % fewer reasoning tokens. <span class=\"chip good\">try it</span></li>\n      <li><span class=\"chip hot\">Bench</span> <strong>All house numbers</strong>: winning figures come from Moonshot's own suite. On the standardized Scale-SEAL board (as of 06.09) K2.7-Code is <em>not listed</em> — no independent SWE-Bench-Pro/Terminal-Bench run yet.</li>\n      <li><span class=\"chip\">Local</span> <strong>Kimi Work</strong> (06.12) — local desktop agent (macOS/Windows), per Moonshot up to <span class=\"stat\">300</span> sub-agents in parallel on your own machine, with file and browser access. Vendor claim, no independent verification.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Open-weights camp reality-check</strong>: only open-weights model with standardized SEAL entry remains Qwen3-Coder-480B at <span class=\"stat\">38.7 %</span>; for DeepSeek V4 Pro and Kimi only vendor-scaffold numbers exist.</li>\n      <li><span class=\"chip\">Tool</span> <strong>OpenCode</strong> holds the OSS top spot (#1 in LogRocket's June ranking, ~160k stars) — the model-agnostic terminal agent is the natural home for a fresh K2.7-Code.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> pushes <em>Auto-Review</em>: a context classifier that lets low-risk agent steps run and brakes on the risky ones. No new model.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Aider</strong> still dormant (last push 05.22), <strong>Cline/OpenHands/Continue</strong> stable, <strong>Codestral</strong> unchanged since 08.25 — Mistral puts coding energy into Vibe Code Mode. Details below.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code</strong> remains at <strong>v2.1.173</strong> (06.11) — no weekend release.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Exatamente a lição de ontem, um dia depois como estudo de caso: no dia 12.06, Moonshot lançou o modelo de código aberto <strong>Kimi K2.7-Code</strong> — MoE com um trilhão de parâmetros, pesos livres sob licença Modified MIT, um candidato real para a máquina local de Daniel. A manchete diz <strong>+21,8 %</strong>. Exceto: este número e quase todos os outros vêm da <em>própria</em> suite de benchmarks da Moonshot (Kimi Code Bench v2). Em placares padrão independentes — SWE-Bench Pro, Terminal-Bench, Aider — K2.7-Code ainda não apareceu. O acampamento de pesos abertos permanece onde estava desde abril: forte em números proprietários, fraco em medição padronizada. Um dia de ferramentas tranquilo fora isso.</p>\n    <ul>\n      <li><span class=\"chip hot\">Local</span> <strong>Kimi K2.7-Code</strong> (12.06) — MoE 1T, 32B ativo, contexto 256k, pesos abertos. Moonshot relata <span class=\"stat\">+21,8 %</span> em Kimi Code Bench v2 (50,9 → 62,0) e ~30 % menos tokens de raciocínio. <span class=\"chip good\">experimentar</span></li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Todos números da casa</strong>: os números de ganho vêm da própria suite da Moonshot. No placar Scale-SEAL padronizado (até 09.06), K2.7-Code <em>não está listado</em> — nenhuma execução independente de SWE-Bench-Pro/Terminal-Bench ainda.</li>\n      <li><span class=\"chip\">Local</span> <strong>Kimi Work</strong> (12.06) — agente local de desktop (macOS/Windows), segundo Moonshot até <span class=\"stat\">300</span> sub-agentes em paralelo em sua própria máquina, com acesso a arquivos e navegador. Afirmação do fornecedor, sem verificação independente.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Verificação de realidade do acampamento de pesos abertos</strong>: apenas modelo de código aberto com entrada SEAL padronizada permanece Qwen3-Coder-480B em <span class=\"stat\">38,7 %</span>; para DeepSeek V4 Pro e Kimi existem apenas números de andaime do fornecedor.</li>\n      <li><span class=\"chip\">Tool</span> <strong>OpenCode</strong> mantém o topo do OSS (#1 no ranking de junho do LogRocket, ~160k estrelas) — o agente de terminal agnóstico a modelos é o lar natural para um K2.7-Code fresco.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> empurra <em>Auto-Review</em>: um classificador de contexto que deixa as etapas de agente de baixo risco rodar e freia as arriscadas. Nenhum modelo novo.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Aider</strong> ainda inativo (último push 22.05), <strong>Cline/OpenHands/Continue</strong> estáveis, <strong>Codestral</strong> sem alterações desde 25.08 — Mistral coloca energia de codificação em Vibe Code Mode. Detalhes abaixo.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code</strong> permanece em <strong>v2.1.173</strong> (11.06) — nenhum lançamento de fim de semana.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Exactamente la lección de ayer, un día después como estudio de caso: el 12.06, Moonshot lanzó el modelo de código abierto <strong>Kimi K2.7-Code</strong> — MoE de un billón de parámetros, pesos libres bajo licencia Modified MIT, un candidato real para la caja local de Daniel. El titular dice <strong>+21,8 %</strong>. Excepto: este número y casi todos los demás provienen de la <em>propia</em> suite de benchmarks de Moonshot (Kimi Code Bench v2). En tableros estándar independientes — SWE-Bench Pro, Terminal-Bench, Aider — K2.7-Code aún no aparece. El campamento de pesos abiertos permanece donde estaba desde abril: fuerte en números propietarios, débil en medición estandarizada. Un día de herramientas tranquilo por lo demás.</p>\n    <ul>\n      <li><span class=\"chip hot\">Local</span> <strong>Kimi K2.7-Code</strong> (12.06) — MoE 1T, 32B activo, contexto 256k, pesos abiertos. Moonshot reporta <span class=\"stat\">+21,8 %</span> en Kimi Code Bench v2 (50,9 → 62,0) y ~30 % menos tokens de razonamiento. <span class=\"chip good\">pruébalo</span></li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Todos números de la casa</strong>: los números ganadores provienen de la suite de Moonshot. En el tablero Scale-SEAL estandarizado (hasta 09.06), K2.7-Code <em>no está listado</em> — ninguna ejecución independiente de SWE-Bench-Pro/Terminal-Bench aún.</li>\n      <li><span class=\"chip\">Local</span> <strong>Kimi Work</strong> (12.06) — agente local de escritorio (macOS/Windows), según Moonshot hasta <span class=\"stat\">300</span> sub-agentes en paralelo en tu propia máquina, con acceso a archivos y navegador. Afirmación del proveedor, sin verificación independiente.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Revisión de realidad del campamento de pesos abiertos</strong>: solo modelo de código abierto con entrada SEAL estandarizada sigue siendo Qwen3-Coder-480B en <span class=\"stat\">38,7 %</span>; para DeepSeek V4 Pro y Kimi solo existen números de andamio del proveedor.</li>\n      <li><span class=\"chip\">Tool</span> <strong>OpenCode</strong> mantiene la cima del OSS (#1 en ranking de junio de LogRocket, ~160k estrellas) — el agente de terminal agnóstico de modelos es el hogar natural para un K2.7-Code fresco.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> impulsa <em>Auto-Review</em>: un clasificador de contexto que deja ejecutar pasos de agente de bajo riesgo y frena los riesgosos. Sin modelo nuevo.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Aider</strong> aún dormido (último push 22.05), <strong>Cline/OpenHands/Continue</strong> estables, <strong>Codestral</strong> sin cambios desde 25.08 — Mistral invierte energía de programación en Vibe Code Mode. Detalles abajo.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code</strong> se mantiene en <strong>v2.1.173</strong> (11.06) — sin lanzamiento de fin de semana.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Drei Meldungen dieser Woche erzählen dieselbe Geschichte aus drei Branchen: Nubank in Brasilien, Sanofi in Frankreich, SAP in Deutschland — keiner gewinnt mehr mit dem nächsten Allzweck-Chatbot, sondern mit einem Spezial-Modell, das auf den eigenen, proprietären Daten sitzt. Nubank stellte am 11.06. seine KI-Strategie vor: Kern ist <em>nuFormer</em>, ein hauseigenes Fundament-Modell für Finanzdaten, das schon im Kreditgeschäft läuft. Sanofi lizenziert für fünf Jahre Owkins KI-Wissenschaftler „K Pro\" für agentische Wirkstoff-Forschung. Und SAPs Milliarden-Wette auf Prior Labs zielt genau auf denselben Punkt — KI für die strukturierten Tabellendaten, die Firmen wirklich steuern. Der rote Faden: Wer die Daten besitzt, baut den Burggraben. Genau diese Lücke — Domänen-Modell auf eigenen Daten, ohne Enterprise-Preis — ist twiceDs Revier (Idee unten).</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: hauseigenes Finanzdaten-Fundament-Modell, läuft im Kerngeschäft Kredit; KI-„Private Banker\" mit &gt;15 Mio. monatlichen Test-Nutzern. Test-Zyklen von Monaten auf einen Tag.</li>\n      <li><span class=\"chip good\">Deploy · EU</span> <strong>Sanofi × Owkin</strong>: Fünf-Jahres-Lizenz für Owkins KI-Wissenschaftler „K Pro\" — agentische Agenten für die Wirkstoff-Forschung. Aufbau auf 90-Mio.-€-Partnerschaft seit 2021.</li>\n      <li><span class=\"chip\">M&amp;A · DE</span> <strong>SAP × Prior Labs</strong>: &gt;1 Mrd. € über vier Jahre für „Tabular Foundation Models\" — KI für strukturierte Geschäftsdaten statt Sprache. Abschluss Q2/Q3 2026.</li>\n      <li><span class=\"chip\">Deploy · EU</span> <strong>Gemini 3.5 Flash</strong>: in Global/US/EU allgemein verfügbar — ab 16.06. ist der Admin-Schalter weg, das Modell standardmäßig an und nicht mehr abschaltbar. Governance-Detail mit Folgen.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Transparenz-Kodex (10.06.) jetzt zum Unterzeichnen offen — Anbieter <em>und</em> Einsetzer unter Art. 50. Pflichten ab 2. August.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Skepsis-Check</strong>: „94 % des Mittelstands ohne KI\" — aber das ist eine Meta-Synthese alter Studien (Jan. 2026), kein frischer Befund. Gartner: &gt;40 % der Agenten-Projekte bis 2027 abgebrochen.</li>\n      <li><span class=\"chip\">Ideen</span> <strong>twiceD</strong>: Vorhersage-Modell für den Mittelstand — Zahlungsausfall, Lieferanten-Risiko, Kundenabwanderung — auf TabPFN, on-prem, ohne DataRobot-Preisschild.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Drei Meldungen dieser Woche erzählen dieselbe Geschichte aus drei Branchen: Nubank in Brasilien, Sanofi in Frankreich, SAP in Deutschland — keiner gewinnt mehr mit dem nächsten Allzweck-Chatbot, sondern mit einem Spezial-Modell, das auf den eigenen, proprietären Daten sitzt. Nubank stellte am 11.06. seine KI-Strategie vor: Kern ist <em>nuFormer</em>, ein hauseigenes Fundament-Modell für Finanzdaten, das schon im Kreditgeschäft läuft. Sanofi lizenziert für fünf Jahre Owkins KI-Wissenschaftler „K Pro\" für agentische Wirkstoff-Forschung. Und SAPs Milliarden-Wette auf Prior Labs zielt genau auf denselben Punkt — KI für die strukturierten Tabellendaten, die Firmen wirklich steuern. Der rote Faden: Wer die Daten besitzt, baut den Burggraben. Genau diese Lücke — Domänen-Modell auf eigenen Daten, ohne Enterprise-Preis — ist twiceDs Revier (Idee unten).</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: hauseigenes Finanzdaten-Fundament-Modell, läuft im Kerngeschäft Kredit; KI-„Private Banker\" mit &gt;15 Mio. monatlichen Test-Nutzern. Test-Zyklen von Monaten auf einen Tag.</li>\n      <li><span class=\"chip good\">Deploy · EU</span> <strong>Sanofi × Owkin</strong>: Fünf-Jahres-Lizenz für Owkins KI-Wissenschaftler „K Pro\" — agentische Agenten für die Wirkstoff-Forschung. Aufbau auf 90-Mio.-€-Partnerschaft seit 2021.</li>\n      <li><span class=\"chip\">M&amp;A · DE</span> <strong>SAP × Prior Labs</strong>: &gt;1 Mrd. € über vier Jahre für „Tabular Foundation Models\" — KI für strukturierte Geschäftsdaten statt Sprache. Abschluss Q2/Q3 2026.</li>\n      <li><span class=\"chip\">Deploy · EU</span> <strong>Gemini 3.5 Flash</strong>: in Global/US/EU allgemein verfügbar — ab 16.06. ist der Admin-Schalter weg, das Modell standardmäßig an und nicht mehr abschaltbar. Governance-Detail mit Folgen.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Transparenz-Kodex (10.06.) jetzt zum Unterzeichnen offen — Anbieter <em>und</em> Einsetzer unter Art. 50. Pflichten ab 2. August.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Skepsis-Check</strong>: „94 % des Mittelstands ohne KI\" — aber das ist eine Meta-Synthese alter Studien (Jan. 2026), kein frischer Befund. Gartner: &gt;40 % der Agenten-Projekte bis 2027 abgebrochen.</li>\n      <li><span class=\"chip\">Ideen</span> <strong>twiceD</strong>: Vorhersage-Modell für den Mittelstand — Zahlungsausfall, Lieferanten-Risiko, Kundenabwanderung — auf TabPFN, on-prem, ohne DataRobot-Preisschild.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Three announcements this week tell the same story from three industries: Nubank in Brazil, Sanofi in France, SAP in Germany — no one wins anymore with the next generic chatbot, but with a specialist model built on their own proprietary data. Nubank unveiled its AI strategy on June 11: the core is <em>nuFormer</em>, a proprietary foundation model for financial data already running in its lending business. Sanofi is licensing Owkin's AI scientist \"K Pro\" for five years for agentic drug discovery. And SAP's billion-euro bet on Prior Labs targets the same point — AI for the structured tabular data that actually runs companies. The through-line: whoever owns the data builds the moat. That exact gap — domain model on proprietary data, no enterprise price tag — is twiceD's territory (idea below).</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: proprietary financial-data foundation model, running in core lending business; AI \"Private Banker\" with &gt;15 million monthly test users. Test cycles cut from months to one day.</li>\n      <li><span class=\"chip good\">Deploy · EU</span> <strong>Sanofi × Owkin</strong>: Five-year license for Owkin's AI scientist \"K Pro\" — agentic agents for drug discovery. Built on 90 million euro partnership since 2021.</li>\n      <li><span class=\"chip\">M&amp;A · DE</span> <strong>SAP × Prior Labs</strong>: &gt;1 billion euro over four years for \"Tabular Foundation Models\" — AI for structured business data instead of language. Close expected Q2/Q3 2026.</li>\n      <li><span class=\"chip\">Deploy · EU</span> <strong>Gemini 3.5 Flash</strong>: now generally available in Global/US/EU — as of June 16, the admin toggle disappears, the model defaults on and cannot be disabled. A governance detail with consequences.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Code of Practice on Transparency (June 10) now open for signature — both providers <em>and users</em> under Article 50. Obligations begin August 2.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Skepticism Check</strong>: \"94% of mid-market without AI\" — but that's a meta-synthesis of old studies (Jan. 2026), not fresh data. Gartner: &gt;40% of agent projects shelved by 2027.</li>\n      <li><span class=\"chip\">Ideas</span> <strong>twiceD</strong>: Prediction model for mid-market — payment default, supplier risk, customer churn — on TabPFN, on-prem, no DataRobot price tag.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Três anúncios esta semana contam a mesma história em três indústrias: Nubank no Brasil, Sanofi na França, SAP na Alemanha — ninguém vence mais com o próximo chatbot genérico, mas com um modelo especializado construído sobre seus próprios dados proprietários. Nubank revelou sua estratégia de IA em 11.06: o núcleo é <em>nuFormer</em>, um modelo fundamental proprietário para dados financeiros, que já está em operação no negócio de crédito. A Sanofi licencia por cinco anos o \"K Pro\", o cientista de IA da Owkin, para descoberta de medicamentos agentiva. E a aposta de bilhões da SAP em Prior Labs visa exatamente o mesmo — IA para dados tabulares estruturados, que realmente dirigem as empresas. O fio condutor: quem possui os dados constrói o fosso. Exatamente essa lacuna — modelo de domínio em dados proprietários, sem preço empresarial — é o território da twiceD (ideia abaixo).</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: modelo fundamental de dados financeiros proprietário, em operação no negócio principal de crédito; \"Assessor Privado\" de IA com &gt;15 milhões de usuários de teste mensais. Ciclos de teste reduzidos de meses para um dia.</li>\n      <li><span class=\"chip good\">Deploy · EU</span> <strong>Sanofi × Owkin</strong>: Licença de cinco anos para o \"K Pro\", cientista de IA da Owkin — agentes agentivos para descoberta de medicamentos. Construído sobre parceria de 90 milhões de euros desde 2021.</li>\n      <li><span class=\"chip\">M&amp;A · DE</span> <strong>SAP × Prior Labs</strong>: &gt;1 bilhão de euros em quatro anos para \"Modelos Fundamentais Tabulares\" — IA para dados empresariais estruturados em vez de linguagem. Fechamento previsto Q2/Q3 2026.</li>\n      <li><span class=\"chip\">Deploy · EU</span> <strong>Gemini 3.5 Flash</strong>: agora disponível globalmente em Global/US/EU — a partir de 16.06, o botão de admin desaparece, o modelo está ativo por padrão e não pode ser desativado. Um detalhe de governança com consequências.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Código de Prática em Transparência (10.06) agora aberto para assinatura — provedores <em>e usuários</em> sob Art. 50. Obrigações a partir de 2 de agosto.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Verificação de Ceticismo</strong>: \"94% do mercado médio sem IA\" — mas é uma meta-síntese de estudos antigos (jan. 2026), não dados novos. Gartner: &gt;40% dos projetos de agentes abandonados até 2027.</li>\n      <li><span class=\"chip\">Ideias</span> <strong>twiceD</strong>: Modelo de previsão para mercado médio — inadimplência, risco de fornecedor, churn de cliente — em TabPFN, on-prem, sem preço DataRobot.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Tres anuncios esta semana cuentan la misma historia en tres industrias: Nubank en Brasil, Sanofi en Francia, SAP en Alemania — nadie vence ya con el próximo chatbot genérico, sino con un modelo especializado construido sobre sus propios datos propietarios. Nubank reveló su estrategia de IA el 11.06: el núcleo es <em>nuFormer</em>, un modelo fundamental propietario para datos financieros que ya está operando en el negocio de crédito. Sanofi licencia por cinco años \"K Pro\", el científico de IA de Owkin, para descubrimiento de medicamentos agentivo. Y la apuesta de mil millones de SAP en Prior Labs apunta exactamente a lo mismo — IA para datos tabulares estructurados que realmente impulsan las empresas. El hilo conductor: quien posee los datos construye la barrera defensiva. Exactamente esa brecha — modelo de dominio en datos propietarios, sin precio empresarial — es el territorio de twiceD (idea abajo).</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: modelo fundamental de datos financieros propietario, operando en el negocio principal de crédito; \"Asesor Privado\" de IA con &gt;15 millones de usuarios de prueba mensuales. Ciclos de prueba reducidos de meses a un día.</li>\n      <li><span class=\"chip good\">Deploy · EU</span> <strong>Sanofi × Owkin</strong>: Licencia de cinco años para \"K Pro\", el científico de IA de Owkin — agentes agentivos para descubrimiento de medicamentos. Construido sobre una asociación de 90 millones de euros desde 2021.</li>\n      <li><span class=\"chip\">M&amp;A · DE</span> <strong>SAP × Prior Labs</strong>: &gt;1 mil millones de euros en cuatro años para \"Modelos Fundamentales Tabulares\" — IA para datos empresariales estructurados en lugar de lenguaje. Se espera cierre Q2/Q3 2026.</li>\n      <li><span class=\"chip\">Deploy · EU</span> <strong>Gemini 3.5 Flash</strong>: ahora disponible globalmente en Global/US/EU — a partir del 16.06, el botón de admin desaparece, el modelo está habilitado por defecto y no puede desactivarse. Un detalle de gobernanza con consecuencias.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Código de Práctica en Transparencia (10.06) ahora abierto para firma — proveedores <em>y usuarios</em> bajo Art. 50. Obligaciones a partir del 2 de agosto.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Verificación de Escepticismo</strong>: \"94% de la mediana empresa sin IA\" — pero es una meta-síntesis de estudios antiguos (ene. 2026), no datos nuevos. Gartner: &gt;40% de proyectos de agentes abandonados para 2027.</li>\n      <li><span class=\"chip\">Ideas</span> <strong>twiceD</strong>: Modelo de predicción para mediana empresa — impago de pagos, riesgo de proveedor, abandono de clientes — en TabPFN, on-prem, sin precio DataRobot.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstag, der 13. Juni — trotz Wochenende ein voll besetztes Board. 131 verifizierte Listings (119 Freelance · 9 Intriguing · 3 Employee), Schwerpunkt wie immer Senior Java/Spring + Angular, voll remote. Spitzen-Fit heute wieder Aleph Alpha (Employee, Fit 88) und KMG Advisory AI Engineer (Freelance, Fit 87). Auffällig gegenüber gestern: neben dem Java-Mittelbau steht heute eine breite <strong>Applied-AI-/RAG-Freelance-Spur</strong> — Nemensis, RED SAP, thryve, BLUECHILLED, HOSSMANN, 10X, HiSimply und mehr, alle Python/FastAPI/LangChain/LLM im Band Fit 72–77. Fünf Listings bleiben hart geschlossen (drei SÜ2-Clearance, zwei Schweiz-only) — sichtbar im Board, aber nie als Pitch.</p>\n    <ul>\n      <li><span class=\"chip good\">EMPLOYEE</span> <strong>Aleph Alpha, Senior Java (Heidelberg)</strong>: Fit 88, geschätzt 110–150 k€*. Bestes Stack-Match heute, Industrial-Vertical — reiner Java-Kern bei einem etablierten DACH-AI-Haus.</li>\n      <li><span class=\"chip hot\">TWICED</span> <strong>KMG Advisory — AI Engineer (Java + GenAI/RAG/LLM)</strong>: Fit 87, 110–135 €/h*. Premium-Nische: Daniels Java-Kern trifft angewandte KI.</li>\n      <li><span class=\"chip\">TWICED</span> <strong>infoteam — Senior Java Fullstack</strong>: Fit 87, 95–110 €/h*. Solider Brot-und-Butter-Match, 90 % Remote.</li>\n      <li><span class=\"chip good\">EMPLOYEE</span> <strong>Personio — AI Team (München/Berlin hybrid)</strong>: Fit 86, 100–140 k€*. Enterprise-AI im HR-Produkt, Series-E.</li>\n      <li><span class=\"chip\">REMOTE</span> <strong>One Day Ahead / iSAX / BridgingIT / 1st solution — Java + Angular</strong>: dichtes Fit-83/85-Mittelfeld, 90–115 €/h*, 100 % Remote.</li>\n      <li><span class=\"chip hot\">AI-INTEGRATION</span> <strong>Applied-AI-Spur breit</strong>: Nemensis RAG, RED SAP AI Engineer, thryve, BLUECHILLED, HOSSMANN, 10X, HiSimply — Python/FastAPI/LangChain/LLM, Fit 72–77. Python/FastAPI rückt ins Freelance-Board.</li>\n      <li><span class=\"chip hot\">AUTO</span> <strong>EnCo Software — Java/Spring/EMF (autonomes Fahren, KI)</strong>: Fit 85 + 84, 110–135 €/h*. Plus VARIUS Smart Energy (Fit 84) und Amoria Bond IoT (Fit 78).</li>\n      <li><span class=\"chip\">AI-HARNESS</span> <strong>JetBrains — fünf AI-Tooling-Rollen + Anthropic + Mistral + Helsing</strong>: Fit 76–78, Remote-DE bzw. Mission-getrieben. Intriguing-Block.</li>\n      <li><span class=\"chip\">DE</span> <strong>Markt-Puls</strong>: DACH-Freelancer-Schnitt 2026 erstmals seit 2016 <em>rückläufig</em>, bei 103 €/h; 43 % ohne gesicherte Auslastung. Senior Java Remote im Board trotzdem bei 90–135 €/h.</li>\n      <li><span class=\"chip warn\">GATE</span> <strong>Fünf harte Gates</strong>: 3× SÜ2-Clearance (DE-Wohnsitz-Pflicht), 2× Schweiz-only (Zürich + Bern). Sichtbar, nicht pitchbar — BR-Konflikt.</li>\n      <li><span class=\"chip\">TED</span> <strong>EU-Ausschreibungen</strong>: kein neuer Sweep heute (Samstag); die fünf Treffer vom 11.06. bleiben über ihre Fristen (frühester 22.06.) weiter aktiv. Nächster Sweep zum Wochenstart.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Saturday, June 13th — despite the weekend, a fully packed board. 131 verified listings (119 freelance · 9 intriguing · 3 employee), focus as always on senior Java/Spring + Angular, fully remote. Top fits today again: Aleph Alpha (employee, fit 88) and KMG Advisory AI Engineer (freelance, fit 87). Notable versus yesterday: alongside the Java midmarket stands today a broad <strong>applied-AI/RAG-freelance track</strong> — Nemensis, RED SAP, thryve, BLUECHILLED, HOSSMANN, 10X, HiSimply and more, all Python/FastAPI/LangChain/LLM in the fit 72–77 band. Five listings remain hard-gated (three SI clearance, two Switzerland-only) — visible on the board, but never pitched.</p>\n    <ul>\n      <li><span class=\"chip good\">EMPLOYEE</span> <strong>Aleph Alpha, Senior Java (Heidelberg)</strong>: Fit 88, estimated 110–150 k€*. Best stack match today, industrial vertical — pure Java core at an established DACH AI house.</li>\n      <li><span class=\"chip hot\">TWICED</span> <strong>KMG Advisory — AI Engineer (Java + GenAI/RAG/LLM)</strong>: Fit 87, 110–135 €/h*. Premium niche: Daniel's Java core meets applied AI.</li>\n      <li><span class=\"chip\">TWICED</span> <strong>infoteam — Senior Java Fullstack</strong>: Fit 87, 95–110 €/h*. Solid bread-and-butter match, 90% remote.</li>\n      <li><span class=\"chip good\">EMPLOYEE</span> <strong>Personio — AI Team (Munich/Berlin hybrid)</strong>: Fit 86, 100–140 k€*. Enterprise AI in HR product, Series E.</li>\n      <li><span class=\"chip\">REMOTE</span> <strong>One Day Ahead / iSAX / BridgingIT / 1st solution — Java + Angular</strong>: dense fit-83/85 midfield, 90–115 €/h*, 100% remote.</li>\n      <li><span class=\"chip hot\">AI-INTEGRATION</span> <strong>Applied-AI track broad</strong>: Nemensis RAG, RED SAP AI Engineer, thryve, BLUECHILLED, HOSSMANN, 10X, HiSimply — Python/FastAPI/LangChain/LLM, fit 72–77. Python/FastAPI moves into the freelance board.</li>\n      <li><span class=\"chip hot\">AUTO</span> <strong>EnCo Software — Java/Spring/EMF (autonomous driving, AI)</strong>: Fit 85 + 84, 110–135 €/h*. Plus VARIUS Smart Energy (fit 84) and Amoria Bond IoT (fit 78).</li>\n      <li><span class=\"chip\">AI-HARNESS</span> <strong>JetBrains — five AI-tooling roles + Anthropic + Mistral + Helsing</strong>: Fit 76–78, remote DE or mission-driven. Intriguing block.</li>\n      <li><span class=\"chip\">DE</span> <strong>Market pulse</strong>: DACH freelancer average 2026 for the first time since 2016 <em>declining</em>, at 103 €/h; 43% without secure workload. Senior Java remote on the board nonetheless at 90–135 €/h.</li>\n      <li><span class=\"chip warn\">GATE</span> <strong>Five hard gates</strong>: 3× SI clearance (DE residency required), 2× Switzerland-only (Zurich + Bern). Visible, not pitchable — Brazil conflict.</li>\n      <li><span class=\"chip\">TED</span> <strong>EU tenders</strong>: no fresh sweep today (Saturday); the five hits from 06.11. remain active over their deadlines (earliest 06.22.). Next sweep at week start.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado, 13 de junho — apesar do fim de semana, um painel bem preenchido. 131 ofertas verificadas (119 Freelance · 9 Intriguing · 3 Emprego), com ênfase — como sempre — em Java/Spring Senior + Angular, totalmente remoto. O destaque de hoje volta a ser Aleph Alpha (Emprego, Fit 88) e KMG Advisory AI Engineer (Freelance, Fit 87). Novidade em comparação com ontem: além do núcleo Java de nível médio, hoje há uma <strong>trilha sólida de IA Aplicada/RAG em Freelance</strong> — Nemensis, RED SAP, thryve, BLUECHILLED, HOSSMANN, 10X, HiSimply e outros, todos com Python/FastAPI/LangChain/LLM na faixa de Fit 72–77. Cinco ofertas permanecem duras (três SÜ2, duas apenas para Suíça) — visíveis no painel, mas nunca para pitch.</p>\n    <ul>\n      <li><span class=\"chip good\">EMPREGO</span> <strong>Aleph Alpha, Senior Java (Heidelberg)</strong>: Fit 88, estimado 110–150 k€*. Melhor alinhamento de stack hoje, vertical Industrial — núcleo Java puro em uma empresa DACH de IA estabelecida.</li>\n      <li><span class=\"chip hot\">TWICED</span> <strong>KMG Advisory — AI Engineer (Java + GenAI/RAG/LLM)</strong>: Fit 87, 110–135 €/h*. Nicho premium: o núcleo Java de Daniel encontra IA aplicada.</li>\n      <li><span class=\"chip\">TWICED</span> <strong>infoteam — Senior Java Fullstack</strong>: Fit 87, 95–110 €/h*. Alinhamento sólido de pão com manteiga, 90% Remoto.</li>\n      <li><span class=\"chip good\">EMPREGO</span> <strong>Personio — AI Team (Munique/Berlin híbrido)</strong>: Fit 86, 100–140 k€*. IA corporativa em produto de RH, Series-E.</li>\n      <li><span class=\"chip\">REMOTO</span> <strong>One Day Ahead / iSAX / BridgingIT / 1st solution — Java + Angular</strong>: campo denso de Fit 83/85, 90–115 €/h*, 100% Remoto.</li>\n      <li><span class=\"chip hot\">IA-INTEGRAÇÃO</span> <strong>Trilha de IA Aplicada ampla</strong>: Nemensis RAG, RED SAP AI Engineer, thryve, BLUECHILLED, HOSSMANN, 10X, HiSimply — Python/FastAPI/LangChain/LLM, Fit 72–77. Python/FastAPI ganha destaque no painel Freelance.</li>\n      <li><span class=\"chip hot\">AUTO</span> <strong>EnCo Software — Java/Spring/EMF (direção autônoma, IA)</strong>: Fit 85 + 84, 110–135 €/h*. Mais VARIUS Smart Energy (Fit 84) e Amoria Bond IoT (Fit 78).</li>\n      <li><span class=\"chip\">IA-HARNESS</span> <strong>JetBrains — cinco papéis de IA Tooling + Anthropic + Mistral + Helsing</strong>: Fit 76–78, Remoto-DE ou mission-driven. Bloco Intriguing.</li>\n      <li><span class=\"chip\">DE</span> <strong>Pulso de Mercado</strong>: média de freelancer DACH 2026 pela primeira vez desde 2016 <em>em declínio</em>, em 103 €/h; 43% sem utilização garantida. Senior Java Remoto no painel ainda assim em 90–135 €/h.</li>\n      <li><span class=\"chip warn\">GATE</span> <strong>Cinco portões duros</strong>: 3× SÜ2 (obrigatoriedade de residência DE), 2× apenas Suíça (Zurique + Berna). Visíveis, não pitchable — conflito BR.</li>\n      <li><span class=\"chip\">TED</span> <strong>Editais EU</strong>: nenhuma varredura nova hoje (sábado); os cinco acertos de 11.06. permanecem dentro de prazos (mais cedo 22.06.). Próxima varredura no início da semana.</li>\n    </ul></div>",

BLUECHILLED, HOSSMANN, 10X, HiSimply — Python/FastAPI/LangChain/LLM, Match 72–77. Python/FastAPI se abre paso en el tablero de Freelance.</li>\n      <li><span class=\"chip hot\">AUTO</span> <strong>EnCo Software — Java/Spring/EMF (conducción autónoma, IA)</strong>: Match 85 + 84, 110–135 €/h*. Más VARIUS Smart Energy (Match 84) y Amoria Bond IoT (Match 78).</li>\n      <li><span class=\"chip\">AI-HARNESS</span> <strong>JetBrains — cinco roles de herramientas de IA + Anthropic + Mistral + Helsing</strong>: Match 76–78, Remoto-DE o orientado a misión. Bloque Intriguing.</li>\n      <li><span class=\"chip\">DE</span> <strong>Pulso del mercado</strong>: promedio de Freelancer DACH 2026 <em>en declive por primera vez desde 2016</em>, en 103 €/h; 43% sin carga de trabajo asegurada. Senior Java Remoto en el tablero aún a 90–135 €/h.</li>\n      <li><span class=\"chip warn\">GATE</span> <strong>Cinco barreras duras</strong>: 3× verificación de seguridad SÜ2 (residencia requerida en DE), 2× solo Suiza (Zúrich + Berna). Visibles, no ofertables — conflicto BR.</li>\n      <li><span class=\"chip\">TED</span> <strong>Convocatorias públicas de EU</strong>: sin barrido nuevo hoy (sábado); los cinco resultados del 11.06. permanecen activos sobre sus plazos (más próximo 22.06.). Próximo barrido al inicio de la semana.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Für Daniel ist das der Tag, auf den er wartet: <strong>Brasilien startet heute um 19:00 BRT gegen Marokko</strong> in die WM — und der Gegner ist ausgerechnet der Halbfinalist von 2022, kein Aufwärm-Spiel. Ancelotti hat seine Elf festgelegt, Vinicius und Raphinha vorn. Davor war Freitag schon WM-Alltag: Kanada holt mit einem späten Tor den ersten Punkt der eigenen WM-Geschichte, die USA überrollen Paraguay 4:1. Morgen kommt dann Deutschland gegen Curaçao. Und bei Freiburg gibt es einen neuen Namen im Atubolu-Poker.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Heute, Anpfiff für die Seleção</strong>: Brasilien–Marokko <strong>00:00 MESZ (So) / 19:00 BRT</strong>, MetLife Stadium. Ancelottis Elf steht, Vinicius–Raphinha im Fokus — erwartete Aufstellung siehe unten.</li>\n      <li><span class=\"chip warn\">BRA</span> <strong>Wesley raus</strong>: Rechtsverteidiger fällt mit Muskelverletzung WM-komplett aus, <strong>Danilo</strong> rückt rechts hinten. Neymar (Wadenfaser) noch nicht fit, Ziel Spiel 2.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Kanada schreibt Geschichte</strong>: 1:1 gegen Bosnien — Larin (78.) holt den <strong>ersten WM-Punkt überhaupt</strong> für Kanada (vorher 6 Spiele, 6 Niederlagen).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>USA überrollt Paraguay 4:1</strong>: Balogun-Doppelpack, höchster WM-Sieg der US-Männer aller Zeiten.</li>\n      <li><span class=\"chip\">WM</span> <strong>Weiter heute</strong>: Katar–Schweiz <strong>21:00 MESZ / 16:00 BRT</strong>, Haiti–Schottland <strong>03:00 MESZ (So) / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Morgen dran</strong>: Deutschland–Curaçao am Sonntag <strong>19:00 MESZ / 14:00 BRT</strong>, Houston. Neuer fit und Nr. 1, 4-2-3-1 mit Wirtz als Zehner.</li>\n      <li><span class=\"chip warn\">Freiburg</span> <strong>Neue Spur im Tor-Poker</strong>: Real Sociedad als Interessent für Atubolu gehandelt (~25 Mio. €, ~15 %, Stand 09.06.) — Ex-Bundesliga-Coach Matarazzo will ihn.</li>\n      <li><span class=\"chip\">Liga</span> <strong>Pause</strong>: Bundesliga in Sommerpause, Brasileirão im WM-Loch (01.06.–22.07.) — statt Liga-Tabellen die WM-Gruppen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Für Daniel ist das der Tag, auf den er wartet: <strong>Brasilien startet heute um 19:00 BRT gegen Marokko</strong> in die WM — und der Gegner ist ausgerechnet der Halbfinalist von 2022, kein Aufwärm-Spiel. Ancelotti hat seine Elf festgelegt, Vinicius und Raphinha vorn. Davor war Freitag schon WM-Alltag: Kanada holt mit einem späten Tor den ersten Punkt der eigenen WM-Geschichte, die USA überrollen Paraguay 4:1. Morgen kommt dann Deutschland gegen Curaçao. Und bei Freiburg gibt es einen neuen Namen im Atubolu-Poker.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Heute, Anpfiff für die Seleção</strong>: Brasilien–Marokko <strong>00:00 MESZ (So) / 19:00 BRT</strong>, MetLife Stadium. Ancelottis Elf steht, Vinicius–Raphinha im Fokus — erwartete Aufstellung siehe unten.</li>\n      <li><span class=\"chip warn\">BRA</span> <strong>Wesley raus</strong>: Rechtsverteidiger fällt mit Muskelverletzung WM-komplett aus, <strong>Danilo</strong> rückt rechts hinten. Neymar (Wadenfaser) noch nicht fit, Ziel Spiel 2.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Kanada schreibt Geschichte</strong>: 1:1 gegen Bosnien — Larin (78.) holt den <strong>ersten WM-Punkt überhaupt</strong> für Kanada (vorher 6 Spiele, 6 Niederlagen).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>USA überrollt Paraguay 4:1</strong>: Balogun-Doppelpack, höchster WM-Sieg der US-Männer aller Zeiten.</li>\n      <li><span class=\"chip\">WM</span> <strong>Weiter heute</strong>: Katar–Schweiz <strong>21:00 MESZ / 16:00 BRT</strong>, Haiti–Schottland <strong>03:00 MESZ (So) / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Morgen dran</strong>: Deutschland–Curaçao am Sonntag <strong>19:00 MESZ / 14:00 BRT</strong>, Houston. Neuer fit und Nr. 1, 4-2-3-1 mit Wirtz als Zehner.</li>\n      <li><span class=\"chip warn\">Freiburg</span> <strong>Neue Spur im Tor-Poker</strong>: Real Sociedad als Interessent für Atubolu gehandelt (~25 Mio. €, ~15 %, Stand 09.06.) — Ex-Bundesliga-Coach Matarazzo will ihn.</li>\n      <li><span class=\"chip\">Liga</span> <strong>Pause</strong>: Bundesliga in Sommerpause, Brasileirão im WM-Loch (01.06.–22.07.) — statt Liga-Tabellen die WM-Gruppen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This is the day Daniel has been waiting for: <strong>Brazil kicks off today at 19:00 BRT against Morocco</strong> in the World Cup — and the opponent is none other than the 2022 semifinalist, no warm-up match. Ancelotti has named his XI, Vinicius and Raphinha up front. Before that, Friday was standard World Cup action: Canada claimed its first-ever World Cup point with a late goal, the USA hammered Paraguay 4:1. Tomorrow Germany takes on Curaçao. And at Freiburg there's a new name in the Atubolu goalkeeper saga.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Today, Seleção kickoff</strong>: Brazil–Morocco <strong>00:00 MESZ (Sun) / 19:00 BRT</strong>, MetLife Stadium. Ancelotti's XI is set, Vinicius–Raphinha in focus — expected lineup below.</li>\n      <li><span class=\"chip warn\">BRA</span> <strong>Wesley out</strong>: Right-back sidelined with muscle injury for the entire tournament, <strong>Danilo</strong> moves to right-back. Neymar (calf strain) not yet fit, targeting match 2.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Canada makes history</strong>: 1:1 vs Bosnia — Larin (78th) secures the <strong>first-ever World Cup point</strong> for Canada (previously 6 matches, 6 losses).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>USA crushes Paraguay 4:1</strong>: Balogun brace, highest World Cup win for the US men ever.</li>\n      <li><span class=\"chip\">WM</span> <strong>More today</strong>: Qatar–Switzerland <strong>21:00 MESZ / 16:00 BRT</strong>, Haiti–Scotland <strong>03:00 MESZ (Sun) / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Tomorrow's turn</strong>: Germany–Curaçao on Sunday <strong>19:00 MESZ / 14:00 BRT</strong>, Houston. Neuer fit and No. 1, 4-2-3-1 with Wirtz as No. 10.</li>\n      <li><span class=\"chip warn\">Freiburg</span> <strong>New lead in goalkeeper poker</strong>: Real Sociedad interested in Atubolu (~25 million €, ~15 %, as of 09.06.) — former Bundesliga coach Matarazzo wants him.</li>\n      <li><span class=\"chip\">Liga</span> <strong>Break</strong>: Bundesliga on summer break, Brasileirão in World Cup hiatus (01.06.–22.07.) — World Cup groups instead of league tables.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Este é o dia que Daniel estava esperando: <strong>Brasil começa hoje às 19:00 BRT contra Marrocos</strong> na Copa do Mundo — e o adversário é justamente o semifinalista de 2022, nada de jogo de aquecimento. Ancelotti escalou sua equipe, Vinicius e Raphinha na frente. Antes disso, sexta-feira foi rotina de Copa: Canadá arranca seu primeiro ponto da história com gol nos acréscimos, EUA massacre Paraguai 4:1. Amanhã vem Alemanha contra Curaçao. E no Freiburg há um novo nome na novela do Atubolu.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Hoje, toque de saída da Seleção</strong>: Brasil–Marrocos <strong>00:00 MESZ (domingo) / 19:00 BRT</strong>, MetLife Stadium. Equipe de Ancelotti escalada, Vinicius–Raphinha em foco — escalação prevista abaixo.</li>\n      <li><span class=\"chip warn\">BRA</span> <strong>Wesley desfalcado</strong>: Lateral-direito cai com lesão muscular e fica fora da Copa inteira, <strong>Danilo</strong> vai para lateral-direito. Neymar (distensão de panturrilha) ainda não está 100%, meta é jogo 2.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Canadá entra para a história</strong>: 1:1 contra Bósnia — Larin (78º) arranca o <strong>primeiro ponto da história da Copa</strong> para o Canadá (antes eram 6 jogos, 6 derrotas).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>EUA massacra Paraguai 4:1</strong>: Doblete de Balogun, maior vitória da seleção masculina na Copa.</li>\n      <li><span class=\"chip\">WM</span> <strong>Mais hoje</strong>: Catar–Suíça <strong>21:00 MESZ / 16:00 BRT</strong>, Haiti–Escócia <strong>03:00 MESZ (domingo) / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Amanhã é a vez</strong>: Alemanha–Curaçao no domingo <strong>19:00 MESZ / 14:00 BRT</strong>, Houston. Neuer em forma e nº 1, 4-2-3-1 com Wirtz como meia-atacante.</li>\n      <li><span class=\"chip warn\">Freiburg</span> <strong>Nova pista na novela do goleiro</strong>: Real Sociedad entra para disputar Atubolu (~25 milhões €, ~15 %, de acordo com 09.06.) — ex-técnico da Bundesliga Matarazzo quer.</li>\n      <li><span class=\"chip\">Liga</span> <strong>Pausa</strong>: Bundesliga em recesso, Brasileirão em pausa de Copa (01.06.–22.07.) — grupos da Copa em vez de tabelas de liga.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Este es el día que Daniel ha estado esperando: <strong>Brasil comienza hoy a las 19:00 BRT contra Marruecos</strong> en la Copa del Mundo — y el rival es nada menos que el semifinalista de 2022, no es un partido de calentamiento. Ancelotti ha confirmado su once, Vinicius y Raphinha arriba. Antes de eso, el viernes fue rutina de Copa: Canadá logra su primer punto en la historia con un gol tardío, Estados Unidos aplasta a Paraguay 4:1. Mañana viene Alemania contra Curazao. Y en el Freiburg hay un nuevo nombre en la novela de Atubolu.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Hoy, saque de salida de la Selección</strong>: Brasil–Marruecos <strong>00:00 MESZ (domingo) / 19:00 BRT</strong>, MetLife Stadium. Once de Ancelotti confirmada, Vinicius–Raphinha en foco — alineación esperada abajo.</li>\n      <li><span class=\"chip warn\">BRA</span> <strong>Wesley fuera</strong>: Lateral derecho se pierde por lesión muscular toda la Copa, <strong>Danilo</strong> asume la lateral derecha. Neymar (distensión de pantorrilla) aún no está listo, objetivo es juego 2.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Canadá entra a la historia</strong>: 1:1 contra Bosnia — Larin (78º) asegura el <strong>primer punto de Copa</strong> para Canadá (antes 6 partidos, 6 derrotas).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Estados Unidos aplasta Paraguay 4:1</strong>: Doblete de Balogun, mayor victoria de la selección masculina de EE. UU. en la Copa.</li>\n      <li><span class=\"chip\">WM</span> <strong>Más hoy</strong>: Catar–Suiza <strong>21:00 MESZ / 16:00 BRT</strong>, Haití–Escocia <strong>03:00 MESZ (domingo) / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Mañana le toca</strong>: Alemania–Curazao el domingo <strong>19:00 MESZ / 14:00 BRT</strong>, Houston. Neuer en forma y nº 1, 4-2-3-1 con Wirtz de media punta.</li>\n      <li><span class=\"chip warn\">Freiburg</span> <strong>Nueva pista en la novela del arquero</strong>: Real Sociedad interesada en Atubolu (~25 millones €, ~15 %, a partir del 09.06.) — el exentrenador de Bundesliga Matarazzo lo quiere.</li>\n      <li><span class=\"chip\">Liga</span> <strong>Pausa</strong>: Bundesliga en receso, Brasileirão en pausa de Copa (01.06.–22.07.) — grupos de Copa en lugar de tablas de liga.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstagmorgen in Ribeirão Claro — und heute geht es endlich los: Um <strong>11:00 BRT (16:00 CEST)</strong> rollt die <strong>94. Auflage der 24 Stunden von Le Mans</strong> los, mit <strong>BMW</strong> auf der ersten Le-Mans-Pole seiner Werks-Historie (das #15 von Dries Vanthoor, geerbt nach Cadillacs Strafe vom Donnerstag). 62 Autos, 18 Hypercars aus acht Herstellern, trockenes Sommerwetter um 28 °C. Genau zur selben Uhrzeit — <strong>11:00 BRT / 16:00 CEST</strong> — fällt in Barcelona die <strong>F1-Quali</strong>; ein Zeit-Clash für jeden, der beides sehen will. Aus den Freitags-Trainings liegt das schärfste Pace-Bild seit Wochen vor: <strong>McLaren</strong> meldet sich zurück (Norris vorn in FP2, +0,009 auf Russell), Mercedes ist eng dran, WM-Leader <strong>Antonelli</strong> klagte über Bremsprobleme und blieb nur Fünfter. Kein neuer WM-Lauf seit Monaco (07.06.), aber das Monaco-Ergebnis selbst wurde am 12.06. revidiert: Alpines Right of Review war erfolgreich und gab Gasly sein Podium (P3) zurück — die F1-Tabellen spiegeln jetzt diese Korrektur (Gasly P8, Alpine P5). Le Mans zählt doppelt und kann die WEC-Saison drehen. Alle Zeiten via tz-Datenbank gerechnet (Frankreich/Spanien = CEST, 5 h vor BRT).</p>\n    <ul>\n      <li><span class=\"chip hot\">Le Mans</span> <strong>Renntag: 24 Stunden ab 11:00 BRT / 16:00 CEST</strong> — die 94. Auflage über 24 Stunden, 62 Autos, 18 Hypercars aus acht Herstellern. BMW (#15 Pole, #20 = P4) führt das Feld an, Warm-up 07:00 BRT, Zieleinlauf morgen So 11:00 BRT / 16:00 CEST. Trocken, ~28 °C. <a href=\"https://racingnews365.com/2026-le-mans-24-hours-time-schedule\">racingnews365.com</a></li>\n      <li><span class=\"chip hot\">F1</span> <strong>Barcelona-Quali um 11:00 BRT / 16:00 CEST — zeitgleich mit dem Le-Mans-Start</strong> — FP3 lief heute früh um 07:30 BRT / 12:30 CEST. Aus den Trainings: McLaren vorn (Norris FP2), Mercedes dicht dahinter, Hamilton nur Neunter. Rennen morgen So 10:00 BRT / 15:00 CEST über 66 Runden. <a href=\"https://www.motorsport.com/f1/news/f1-barcelona-catalunya-gp-saturday-schedule-weather-forecast-and-how-to-watch/10829588/\">motorsport.com</a></li>\n      <li><span class=\"chip good\">F1</span> <strong>McLaren zurück auf Pace — Norris führt FP2 mit 0,009 s vor Russell</strong> — Norris (1:15.426) schlug Russell um neun Tausendstel, Piastri P3 (+0,057). FP1 hatte Russell angeführt (1:16.363); Norris, Antonelli und Hamilton saßen für Rookie-Einsätze aus. <a href=\"https://www.formula1.com/en/latest/article/norris-heads-russell-and-piastri-in-fp2-ahead-of-barcelona-catalunya-grand-prix.5Ot32uuMMaW0tDC9lLpB71\">formula1.com</a></li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli mit Bremsproblemen — nur FP2-Fünfter</strong> — der WM-Leader (156 Pkt, +66) klagte über die Bremsen und lag fast sechs Zehntel zurück; Hamilton sogar fast eine Sekunde hinter Teamkollege Leclerc, nur Neunter. Auf der Mercedes-freundlichen Aero-Strecke bleibt Mercedes Quali-Favorit. <a href=\"https://www.f1-fansite.com/f1-result/second-free-practice-report-results-2026-catalunya-f1-gp/\">f1-fansite.com</a></li>\n      <li><span class=\"chip\">Le Mans</span> <strong>Titelverteidiger Ferrari startet zerstreut — bester 499P auf P8</strong> — das #51 (P8) ist die beste der drei Werks-Ferraris; der Titelverteidiger #83 startet von P17. Beide Peugeots flogen in der Quali raus, Genesis (Hyundai) gibt sein Le-Mans-Debüt aus den Top 9. <a href=\"https://www.motorsportmagazine.com/articles/sports-cars/le-mans/full-starting-grid-for-2026-le-mans-24-hours-bmw-takes-pole-after-qualifying-drama/\">motorsportmagazine.com</a></li>\n      <li><span class=\"chip\">Stände</span> <strong>Kein neuer Lauf seit Monaco — aber das Monaco-Ergebnis am 12.06. revidiert</strong> — Alpines Right of Review war erfolgreich (FOM-Messfehler), Gaslys Podium (P3) wiederhergestellt: F1-Fahrer Antonelli 156 (+66 auf Hamilton), Gasly jetzt P8 mit 35, Alpine P5 (50). WEC-Hersteller: BMW 59 vor Toyota 52 und Ferrari 42 — Le Mans zählt doppelt. MotoGP: Bezzecchi 180, +20 auf Martín, nächster Lauf Brno 19.–21.06. <a href=\"https://racingnews365.com/adjusted-2026-f1-championship-standings-after-monaco-penalty-rescinded\">racingnews365.com</a></li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Saturday morning in Ribeirão Claro — and finally it's happening: At <strong>11:00 BRT (16:00 CEST)</strong>, the <strong>94th running of the 24 Hours of Le Mans</strong> gets under way, with <strong>BMW</strong> on pole for the first time in factory Le Mans history (the #15 driven by Dries Vanthoor, inherited after Cadillac's penalty on Thursday). 62 cars, 18 Hypercars from eight manufacturers, dry summer weather around 28 °C. At exactly the same time — <strong>11:00 BRT / 16:00 CEST</strong> — qualifying begins in Barcelona for <strong>F1</strong>; a scheduling clash for anyone wanting to watch both. From Friday's practice, the sharpest pace picture in weeks: <strong>McLaren</strong> is back (Norris leading FP2, +0.009 to Russell), Mercedes close behind, championship leader <strong>Antonelli</strong> complained of brake problems and finished only fifth. No new championship race since Monaco (06/07), but the Monaco result itself was revised on 12/06: Alpine's Right of Review succeeded and restored Gasly's podium (P3) — the F1 standings now reflect this correction (Gasly P8, Alpine P5). Le Mans counts double and can turn the WEC season on its head. All times via timezone database (France/Spain = CEST, 5 hours ahead of BRT).</p>\n    <ul>\n      <li><span class=\"chip hot\">Le Mans</span> <strong>Race day: 24 Hours starting 11:00 BRT / 16:00 CEST</strong> — the 94th running over 24 hours, 62 cars, 18 Hypercars from eight manufacturers. BMW (#15 pole, #20 = P4) leads the field, warm-up 07:00 BRT, finish tomorrow Sun 11:00 BRT / 16:00 CEST. Dry, ~28 °C. <a href=\"https://racingnews365.com/2026-le-mans-24-hours-time-schedule\">racingnews365.com</a></li>\n      <li><span class=\"chip hot\">F1</span> <strong>Barcelona qualifying at 11:00 BRT / 16:00 CEST — simultaneous with the Le Mans start</strong> — FP3 ran early this morning at 07:30 BRT / 12:30 CEST. From practice: McLaren leading (Norris FP2), Mercedes right there, Hamilton only ninth. Race tomorrow Sun 10:00 BRT / 15:00 CEST over 66 laps. <a href=\"https://www.motorsport.com/f1/news/f1-barcelona-catalunya-gp-saturday-schedule-weather-forecast-and-how-to-watch/10829588/\">motorsport.com</a></li>\n      <li><span class=\"chip good\">F1</span> <strong>McLaren back on pace — Norris leads FP2 by 0.009 seconds from Russell</strong> — Norris (1:15.426) beat Russell by nine thousandths, Piastri third (+0.057). FP1 was led by Russell (1:16.363); Norris, Antonelli, and Hamilton sat out the session for rookie runs. <a href=\"https://www.formula1.com/en/latest/article/norris-heads-russell-and-piastri-in-fp2-ahead-of-barcelona-catalunya-grand-prix.5Ot32uuMMaW0tDC9lLpB71\">formula1.com</a></li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli with brake issues — only fifth in FP2</strong> — the championship leader (156 pts, +66) complained about the brakes and was almost six tenths behind; Hamilton even nearly a second back from teammate Leclerc, only ninth. On the Mercedes-friendly aero circuit, Mercedes remains qualifying favorite. <a href=\"https://www.f1-fansite.com/f1-result/second-free-practice-report-results-2026-catalunya-f1-gp/\">f1-fansite.com</a></li>\n      <li><span class=\"chip\">Le Mans</span> <strong>Defending champion Ferrari starts scattered — best 499P in P8</strong> — the #51 (P8) is the best of the three factory Ferraris; the defending champion #83 starts from P17. Both Peugeots crashed out in qualifying, Genesis (Hyundai) makes its Le Mans debut from the top nine. <a href=\"https://www.motorsportmagazine.com/articles/sports-cars/le-mans/full-starting-grid-for-2026-le-mans-24-hours-bmw-takes-pole-after-qualifying-drama/\">motorsportmagazine.com</a></li>\n      <li><span class=\"chip\">Standings</span> <strong>No new race since Monaco — but the Monaco result was revised on 12/06</strong> — Alpine's Right of Review succeeded (FOM measurement error), Gasly's podium (P3) restored: F1 drivers Antonelli 156 (+66 over Hamilton), Gasly now P8 with 35, Alpine P5 (50). WEC manufacturers: BMW 59 ahead of Toyota 52 and Ferrari 42 — Le Mans counts double. MotoGP: Bezzecchi 180, +20 over Martín, next race Brno 19–21/06. <a href=\"https://racingnews365.com/adjusted-2026-f1-championship-standings-after-monaco-penalty-rescinded\">racingnews365.com</a></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado de manhã em Ribeirão Claro — e finalmente está acontecendo: Às <strong>11:00 BRT (16:00 CEST)</strong>, a <strong>94ª edição das 24 Horas de Le Mans</strong> começa, com <strong>BMW</strong> na pole pela primeira vez na história da fábrica em Le Mans (o #15 pilotado por Dries Vanthoor, herdado depois da penalidade da Cadillac na quinta). 62 carros, 18 Hypercars de oito fabricantes, tempo seco e ensolarado em torno de 28 °C. Exatamente no mesmo horário — <strong>11:00 BRT / 16:00 CEST</strong> — a <strong>classificação da F1</strong> acontece em Barcelona; um conflito de horários para quem quer assistir aos dois. Dos treinos de sexta-feira, o melhor panorama de ritmo em semanas: <strong>McLaren</strong> voltou (Norris na frente no TL2, +0,009 em relação a Russell), Mercedes bem perto, o líder do campeonato <strong>Antonelli</strong> reclamou de problemas de freio e ficou apenas em quinto. Nenhuma corrida do campeonato desde Mônaco (07/06), mas o resultado de Mônaco em si foi revisado em 12/06: o direito de revisão da Alpine foi bem-sucedido e restaurou o pódio de Gasly (P3) — as tabelas de F1 agora refletem essa correção (Gasly P8, Alpine P5). Le Mans conta em dobro e pode virar a temporada da WEC. Todos os horários via banco de dados de zona horária (França/Espanha = CEST, 5 horas à frente de BRT).</p>\n    <ul>\n      <li><span class=\"chip hot\">Le Mans</span> <strong>Dia de corrida: 24 Horas começando 11:00 BRT / 16:00 CEST</strong> — a 94ª edição ao longo de 24 horas, 62 carros, 18 Hypercars de oito fabricantes. BMW (#15 pole, #20 = P4) lidera o grid, warm-up 07:00 BRT, chegada amanhã dom 11:00 BRT / 16:00 CEST. Seco, ~28 °C. <a href=\"https://racingnews365.com/2026-le-mans-24-hours-time-schedule\">racingnews365.com</a></li>\n      <li><span class=\"chip hot\">F1</span> <strong>Classificação em Barcelona 11:00 BRT / 16:00 CEST — simultânea ao início de Le Mans</strong> — TL3 foi executado cedo esta manhã 07:30 BRT / 12:30 CEST. Dos treinos: McLaren na frente (Norris TL2), Mercedes bem perto, Hamilton apenas em nono. Corrida amanhã dom 10:00 BRT / 15:00 CEST em 66 voltas. <a href=\"https://www.motorsport.com/f1/news/f1-barcelona-catalunya-gp-saturday-schedule-weather-forecast-and-how-to-watch/10829588/\">motorsport.com</a></li>\n      <li><span class=\"chip good\">F1</span> <strong>McLaren de volta ao ritmo — Norris lidera TL2 por 0,009 segundos de Russell</strong> — Norris (1:15.426) venceu Russell por nove milésimos, Piastri terceiro (+0,057). TL1 foi liderado por Russell (1:16.363); Norris, Antonelli e Hamilton ficaram fora da sessão para estreias de pilotos novatos. <a href=\"https://www.formula1.com/en/latest/article/norris-heads-russell-and-piastri-in-fp2-ahead-of-barcelona-catalunya-grand-prix.5Ot32uuMMaW0tDC9lLpB71\">formula1.com</a></li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli com problemas de freio — apenas quinto no TL2</strong> — o líder do campeonato (156 pts, +66) reclamou sobre os freios e ficou quase seis décimos atrás; Hamilton até quase um segundo atrás do companheiro de equipe Leclerc, apenas nono. Na pista amiga de aerodinâmica da Mercedes, Mercedes continua favorita na classificação. <a href=\"https://www.f1-fansite.com/f1-result/second-free-practice-report-results-2026-catalunya-f1-gp/\">f1-fansite.com</a></li>\n      <li><span class=\"chip\">Le Mans</span> <strong>Campeão defensor Ferrari sai disperso — melhor 499P em P8</strong> — o #51 (P8) é o melhor dos três 499Ps de fábrica; o campeão defensor #83 sai de P17. Ambos os Peugeots foram eliminados na classificação, Genesis (Hyundai) faz sua estreia em Le Mans entre os top 9. <a href=\"https://www.motorsportmagazine.com/articles/sports-cars/le-mans/full-starting-grid-for-2026-le-mans-24-hours-bmw-takes-pole-after-qualifying-drama/\">motorsportmagazine.com</a></li>\n      <li><span class=\"chip\">Campeonatos</span> <strong>Nenhuma corrida nova desde Mônaco — mas o resultado de Mônaco foi revisado em 12/06</strong> — direito de revisão da Alpine foi bem-sucedido (erro de medição da FOM), pódio de Gasly (P3) restaurado: pilotos F1 Antonelli 156 (+66 sobre Hamilton), Gasly agora P8 com 35, Alpine P5 (50). Fabricantes WEC: BMW 59 à frente de Toyota 52 e Ferrari 42 — Le Mans conta em dobro. MotoGP: Bezzecchi 180, +20 sobre Martín, próxima corrida Brno 19–21/06. <a href=\"https://racingnews365.com/adjusted-2026-f1-championship-standings-after-monaco-penalty-rescinded\">racingnews365.com</a></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Sábado por la mañana en Ribeirão Claro — y por fin está sucediendo: A las <strong>11:00 BRT (16:00 CEST)</strong>, la <strong>94ª edición de las 24 Horas de Le Mans</strong> comienza, con <strong>BMW</strong> en pole por primera vez en la historia de la fábrica en Le Mans (el #15 pilotado por Dries Vanthoor, heredado después de la penalización de Cadillac el jueves). 62 autos, 18 Hypercars de ocho fabricantes, clima seco y verano alrededor de 28 °C. Exactamente a la misma hora — <strong>11:00 BRT / 16:00 CEST</strong> — la <strong>clasificación de F1</strong> ocurre en Barcelona; un conflicto de horarios para quien quiera ver ambos. De los entrenamientos del viernes, el panorama de ritmo más agudo en semanas: <strong>McLaren</strong> volvió (Norris liderando en E2, +0,009 sobre Russell), Mercedes muy cerca, el líder del campeonato <strong>Antonelli</strong> se quejó de problemas de frenos y quedó solo quinto. Ninguna carrera del campeonato desde Mónaco (07/06), pero el resultado de Mónaco en sí fue revisado el 12/06: el derecho de revisión de Alpine fue exitoso y restauró el podio de Gasly (P3) — las tablas de F1 ahora reflejan esta corrección (Gasly P8, Alpine P5). Le Mans cuenta doble y puede cambiar la temporada de WEC. Todos los horarios vía base de datos de zona horaria (Francia/España = CEST, 5 horas adelante de BRT).</p>\n    <ul>\n      <li><span class=\"chip hot\">Le Mans</span> <strong>Día de carrera: 24 Horas comenzando 11:00 BRT / 16:00 CEST</strong> — la 94ª edición a lo largo de 24 horas, 62 autos, 18 Hypercars de ocho fabricantes. BMW (#15 pole, #20 = P4) lidera el grid, calentamiento 07:00 BRT, meta mañana dom 11:00 BRT / 16:00 CEST. Seco, ~28 °C. <a href=\"https://racingnews365.com/2026-le-mans-24-hours-time-schedule\">racingnews365.com</a></li>\n      <li><span class=\"chip hot\">F1</span> <strong>Clasificación en Barcelona 11:00 BRT / 16:00 CEST — simultánea al inicio de Le Mans</strong> — E3 se ejecutó temprano esta mañana 07:30 BRT / 12:30 CEST. De los entrenamientos: McLaren adelante (Norris E2), Mercedes muy cerca, Hamilton apenas noveno. Carrera mañana dom 10:00 BRT / 15:00 CEST en 66 vueltas. <a href=\"https://www.motorsport.com/f1/news/f1-barcelona-catalunya-gp-saturday-schedule-weather-forecast-and-how-to-watch/10829588/\">motorsport.com</a></li>\n      <li><span class=\"chip good\">F1</span> <strong>McLaren de vuelta al ritmo — Norris lidera E2 por 0,009 segundos sobre Russell</strong> — Norris (1:15.426) venció a Russell por nueve milésimas, Piastri tercero (+0,057). E1 fue liderado por Russell (1:16.363); Norris, Antonelli y Hamilton se perdieron la sesión para debutes de novatos. <a href=\"https://www.formula1.com/en/latest/article/norris-heads-russell-and-piastri-in-fp2-ahead-of-barcelona-catalunya-grand-prix.5Ot32uuMMaW0tDC9lLpB71\">formula1.com</a></li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli con problemas de freno — apenas quinto en E2</strong> — el líder del campeonato (156 pts, +66) se quejó de los frenos y quedó casi seis décimas atrás; Hamilton incluso casi un segundo atrás del compañero Leclerc, apenas noveno. En la pista amiga de aerodinámico de Mercedes, Mercedes sigue siendo favorita en clasificación. <a href=\"https://www.f1-fansite.com/f1-result/second-free-practice-report-results-2026-catalunya-f1-gp/\">f1-fansite.com</a></li>\n      <li><span class=\"chip\">Le Mans</span> <strong>Campeón defensor Ferrari sale disperso — mejor 499P en P8</strong> — el #51 (P8) es el mejor de los tres 499Ps de fábrica; el campeón defensor #83 sale de P17. Ambos Peugeots fueron eliminados en clasificación, Genesis (Hyundai) hace su debut en Le Mans entre los top 9. <a href=\"https://www.motorsportmagazine.com/articles/sports-cars/le-mans/full-starting-grid-for-2026-le-mans-24-hours-bmw-takes-pole-after-qualifying-drama/\">motorsportmagazine.com</a></li>\n      <li><span class=\"chip\">Campeonatos</span> <strong>Ninguna carrera nueva desde Mónaco — pero el resultado de Mónaco fue revisado el 12/06</strong> — derecho de revisión de Alpine fue exitoso (error de medición de FOM), podio de Gasly (P3) restaurado: pilotos F1 Antonelli 156 (+66 sobre Hamilton), Gasly ahora P8 con 35, Alpine P5 (50). Fabricantes WEC: BMW 59 por delante de Toyota 52 y Ferrari 42 — Le Mans cuenta doble. MotoGP: Bezzecchi 180, +20 sobre Martín, próxima carrera Brno 19–21/06. <a href=\"https://racingnews365.com/adjusted-2026-f1-championship-standings-after-monaco-penalty-rescinded\">racingnews365.com</a></li>\n    </ul></div>"
