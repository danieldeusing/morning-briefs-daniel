<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Montag, der 15.06. — der Handelstag selbst beginnt erst, die Aktien-Zahlen unten sind der <strong>Freitags-Schluss (12.06.)</strong>, MSFT zusätzlich live aus dem heutigen Handel; Krypto, Öl und Gold laufen live (Stand Mo 15.06.). Über Nacht hat sich der zentrale Aufhänger gedreht: Der <strong>US-Iran-Friedensvertrag wurde am 14.06. unterzeichnet</strong> (Unterzeichnungs-Zeremonie in der Schweiz geplant, Hormus soll bis Wochenende wieder öffnen) — und das pulverisiert die Öl-Angst-Prämie: <strong>Brent ~83,00 $ (Tag −4,96 %, Zwei-Monats-Tief), WTI ~80,33 $ (−5,36 %)</strong>, der größte Tages-Absturz seit Monaten.<sup>[6]</sup> Gegenläufig: <strong>Gold steigt auf ~4.334 $ (+2,66 %)</strong> — nicht trotz, sondern wegen der Unsicherheit über Warshs erste Sitzung.<sup>[7]</sup> Krypto erholt sich weiter: <strong>BTC ~65.639 $ (24h +1,9 %, 7d +4,0 %), ETH ~1.719 $ (+2,7 %)</strong> — die Risk-on-Stimmung kommt zurück, nachdem die 13-tägige BTC-ETF-Abfluss-Serie (~4,33 Mrd. $) Anfang Juni endete.<sup>[8][9]</sup> Die Big-Tech-Schlussbilanz vom Freitag bleibt selektiv: <strong>TSLA 406,43 $ (+1,82 %)</strong> und <strong>GOOGL 359,68 $</strong> (vorbörslich heute 364,68 $ / +1,39 %) vorn, <strong>NVDA 205,19 $ (+0,16 %)</strong> flach, <strong>AMZN 238,55 $ (−1,23 %)</strong> und <strong>AAPL ~290 $</strong> (Post-WWDC-Schwäche) im Minus.<sup>[1][3]</sup> Der rote Faden für die Woche: Alles hängt jetzt am <strong>FOMC morgen und Mittwoch (16.–17.06.)</strong> — Kevin Warshs Antritts-Sitzung als Fed-Chef. Eine Zinssenkung ist faktisch vom Tisch (~98 % Markt-Wahrscheinlichkeit für Halten bei 3,50–3,75 %); das Risiko ist allein der Ton. Alle Empfehlungen unten sind auf diesen datierten Filter ausgerichtet.</p>\n    <ul>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>FOMC 16.–17.06. — Warshs erste Sitzung ist der einzige Termin, der zählt</strong>: Zins-Halten bei 3,50–3,75 % gilt als sicher (~98 %); das Risiko ist ein <em>Hawkish-Bias-Shift</em> im Ton des neuen Chefs. Liest die Fed den crashenden Öl-Preis als Disinflations-Signal, trägt das Risk-on weiter; betont sie die Unsicherheit als Grund für mehr Härte, kippt die Stimmung — ohne dass sich ein Zins bewegt. Dot-Plot- und Pressekonferenz-Format unter Warsh sind selbst noch unbekannt.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent ~83,00 $ (−4,96 %) — Iran-Deal unterschrieben, Angst-Prämie verdampft</strong>: Der am 14.06. unterzeichnete US-Iran-Friedensvertrag soll die Straße von Hormus bis Wochenende wieder öffnen (vorher ~ein Fünftel des globalen Öl-Verkehrs blockiert). Brent berührt ein Zwei-Monats-Tief, liegt ~26 % unter dem Vor-Monats-Stand und ~30 % unter dem April-Hoch (~118 $). Markt-positiv über den Umweg: Billiges Öl drückt genau die Energie-Komponente der Inflation. (TradingEconomics, 15.06.)</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Steigt paradox auf ~4.334 $ (+2,66 %)</strong>: Obwohl die Geopolitik-Entspannung Krisen-Prämie aus dem Markt nimmt, klettert Gold über 4.300 $ — getrieben von der Unsicherheit über Warshs Kurs plus einer EZB-Zinsanhebung (erste seit 2023) mit angehobenen Inflations-Prognosen. Jahr +28,07 %, aber Monat −5,10 %; der Rücksetzer macht die Versicherung billiger. (TradingEconomics, 15.06.)</li>\n      <li><span class=\"chip good\">KRYPTO-CORE</span> <strong>BTC ~65.639 $ (24h +1,9 %, 7d +4,0 %), ETH ~1.719 $ (+2,7 %)</strong>: Die Risk-on-Stimmung kehrt mit dem Iran-Deal zurück. Der wichtigste strukturelle Kontext: Die 13-tägige BTC-ETF-Abfluss-Serie (~4,33 Mrd. $, 15.05.–03.06., Rekord seit ETF-Start) ist beendet — eine Woche mit bestätigten Netto-Zuflüssen mid-Juni ließ sich aber noch nicht verifizieren. BTC ~48 % unter dem ATH (126.198 $, Okt 2025), ETH ~65 % unter seinem ATH. (CoinGecko, 15.06.)</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>Mag-7 schließen Freitag gemischt — GOOGL bleibt der robusteste Akkumulations-Kandidat</strong>: TSLA +1,82 %, NVDA +0,16 % im Plus; AMZN −1,23 % und AAPL (Post-WWDC, ~290 $) im Minus. GOOGL vorbörslich heute +1,39 %; MSFT live ~390,69 $ (+0,18 %). Die Stärke war selektiv, nicht breit — ein leiser Hinweis auf FOMC-Vorsicht. (Yahoo Finance / Nasdaq, 12.–15.06.)</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>Risk-on-Peripherie springt: Memecoins +4–22 %, AI-Token FET 1,30 $ / RENDER 7,09 $</strong>: DOGE ~0,1003 $ (+4,5 % 24h, +10 % 7d), SHIB +7 %, PEPE +22 % 7d, BONK +15 % 7d; AI-Sektor-Cap ~26,6 Mrd. $. Reines Risk-on-Beta auf der frühen Erholung, kein fundamentaler Boden. (coingape u. a., mid-Juni)</li>\n      <li><span class=\"chip\">IPO</span> <strong>SpaceX-Read-through hält</strong>: Das größte IPO aller Zeiten schloss Freitag bei 161 $ (+19 % über IPO-Preis 135 $) — ein echtes Risk-on-Signal, das sauber durch das nervöse Umfeld lief, aber am selben Iran-/FOMC-Setup wie alles andere hängt.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Monday, June 15th — the trading day itself hasn't started yet, the stock figures below are Friday's close (June 12th), Microsoft additionally live from today's trading; crypto, oil and gold are live (status Mon June 15th). Overnight, the central thesis has flipped: The <strong>US-Iran peace treaty was signed on June 14th</strong> (signing ceremony in Switzerland planned, Hormuz to reopen by weekend) — and that vaporizes the oil fear premium: <strong>Brent ~$83.00 (day −4.96%, two-month low), WTI ~$80.33 (−5.36%)</strong>, the largest single-day plunge in months.<sup>[6]</sup> Counter-trend: <strong>Gold rises to ~$4,334 (+2.66%)</strong> — not despite, but because of uncertainty about Warsh's first meeting.<sup>[7]</sup> Crypto recovers further: <strong>BTC ~$65,639 (24h +1.9%, 7d +4.0%), ETH ~$1,719 (+2.7%)</strong> — risk-on sentiment is back after the 13-day BTC ETF outflow series (~$4.33B) ended in early June.<sup>[8][9]</sup> The Big Tech close Friday stayed selective: <strong>TSLA $406.43 (+1.82%)</strong> and <strong>GOOGL $359.68</strong> (pre-market today $364.68 / +1.39%) ahead, <strong>NVDA $205.19 (+0.16%)</strong> flat, <strong>AMZN $238.55 (−1.23%)</strong> and <strong>AAPL ~$290</strong> (post-WWDC weakness) in the red.<sup>[1][3]</sup> The thread for the week: Everything hinges now on <strong>FOMC tomorrow and Wednesday (June 16–17)</strong> — Kevin Warsh's inaugural meeting as Fed chair. A rate cut is practically off the table (~98% market probability for hold at 3.50–3.75%); the risk is the tone alone. All recommendations below are calibrated to this dated filter.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>FOMC June 16–17 — Warsh's first meeting is the only event that matters</strong>: Rate hold at 3.50–3.75% is near certain (~98%); the risk is a <em>hawkish-bias shift</em> in tone from the new chair. If the Fed reads the crashing oil price as a disinflation signal, risk-on carries further; if it stresses uncertainty as cause for more tightness, sentiment flips — without a single basis point moving. Dot-plot and press-conference format under Warsh are still unknown.</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent ~$83.00 (−4.96%) — Iran deal signed, fear premium evaporates</strong>: The June 14th US-Iran peace treaty is meant to reopen the Strait of Hormuz by weekend (previously ~one-fifth of global oil trade blocked). Brent touches a two-month low, ~26% below month-ago levels and ~30% below the April high (~$118). Market-positive via the detour: cheap oil presses down the energy component of inflation. (TradingEconomics, June 15th)</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Rises paradoxically to ~$4,334 (+2.66%)</strong>: Although geopolitical easing removes crisis premium from the market, gold climbs above $4,300 — driven by uncertainty about Warsh's direction plus an ECB rate hike (first since 2023) with raised inflation forecasts. Year +28.07%, but month −5.10%; the pullback makes the insurance cheaper. (TradingEconomics, June 15th)</li>\n      <li><span class=\"chip good\">CRYPTO CORE</span> <strong>BTC ~$65,639 (24h +1.9%, 7d +4.0%), ETH ~$1,719 (+2.7%)</strong>: Risk-on sentiment returns with the Iran deal. The most important structural context: The 13-day BTC ETF outflow series (~$4.33B, May 15–June 3, a record since ETF inception) is over — but a week of confirmed net inflows mid-June has yet to be verified. BTC ~48% below ATH ($126,198, Oct 2025), ETH ~65% below its ATH. (CoinGecko, June 15th)</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>Mag-7 close Friday mixed — GOOGL remains the most robust accumulation candidate</strong>: TSLA +1.82%, NVDA +0.16% in the black; AMZN −1.23% and AAPL (post-WWDC, ~$290) in the red. GOOGL pre-market today +1.39%; MSFT live ~$390.69 (+0.18%). Strength was selective, not broad — a quiet signal of FOMC caution. (Yahoo Finance / Nasdaq, June 12–15)</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>Risk-on fringe springs: Memecoins +4–22%, AI tokens FET $1.30 / RENDER $7.09</strong>: DOGE ~$0.1003 (+4.5% 24h, +10% 7d), SHIB +7%, PEPE +22% 7d, BONK +15% 7d; AI sector cap ~$26.6B. Pure risk-on beta on the early recovery, no fundamental floor. (coingape et al., mid-June)</li>\n      <li><span class=\"chip\">IPO</span> <strong>SpaceX read-through holds</strong>: The largest IPO ever closed Friday at $161 (+19% from IPO price $135) — a true risk-on signal that cleaned through the jittery backdrop, but rides the same Iran/FOMC setup as everything else.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É segunda-feira, 15 de junho — o pregão propriamente dito ainda não começou, os números das ações abaixo são do fechamento de sexta (12 de junho), Microsoft adicionalmente ao vivo da operação de hoje; cripto, petróleo e ouro funcionam em tempo real (status seg 15 de junho). Noite passada o eixo central virou: o <strong>tratado de paz EUA-Irã foi assinado em 14 de junho</strong> (cerimônia formal na Suíça planejada, Ormuz deve reabrir até o fim de semana) — e isto evapora o prêmio de risco do petróleo: <strong>Brent ~R$ 413 (dia −4,96 %, mínimo de dois meses), WTI ~R$ 401 (−5,36 %)</strong>, o maior desabamento em um único dia em meses.<sup>[6]</sup> Movimento contrário: <strong>ouro sobe para ~R$ 21.670 (+2,66 %)</strong> — não apesar, mas por causa da incerteza sobre a primeira reunião de Warsh.<sup>[7]</sup> Cripto se recupera ainda mais: <strong>BTC ~R$ 328.195 (24h +1,9 %, 7d +4,0 %), ETH ~R$ 8.597 (+2,7 %)</strong> — o sentiment de risco retorna após a série de saída de 13 dias do ETF de BTC (~R$ 21,65 bi) terminar no início de junho.<sup>[8][9]</sup> O fechamento das Big Tech na sexta permanece seletivo: <strong>TSLA R$ 2.032 (+1,82 %)</strong> e <strong>GOOGL R$ 1.798</strong> (pré-mercado hoje R$ 1.823 / +1,39 %) à frente, <strong>NVDA R$ 1.026 (+0,16 %)</strong> estável, <strong>AMZN R$ 1.193 (−1,23 %)</strong> e <strong>AAPL ~R$ 1.450</strong> (fraqueza pós-WWDC) no vermelho.<sup>[1][3]</sup> O fio condutor da semana: tudo agora depende do <strong>FOMC amanhã e quarta (16–17 de junho)</strong> — a primeira reunião de Kevin Warsh como presidente do Fed. Um corte de taxa é praticamente descartado (~98% de probabilidade de mercado para manutenção em 3,50–3,75 %); o risco é apenas o tom. Todas as recomendações abaixo são calibradas para este filtro datado.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>FOMC 16–17 de junho — a primeira reunião de Warsh é o único evento que importa</strong>: manutenção de taxa em 3,50–3,75 % é praticamente certa (~98%); o risco é uma <em>mudança para viés mais agressivo</em> no tom do novo presidente. Se o Fed lê o desabamento do petróleo como sinal de desinflação, o risco-sim carrega adiante; se ele enfatiza a incerteza como razão para mais aperto, o sentiment vira — sem um único ponto-base se movendo. Dot-plot e formato de coletiva sob Warsh ainda são desconhecidos.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~R$ 413 (−4,96 %) — acordo com Irã assinado, prêmio de risco evapora</strong>: O tratado de paz EUA-Irã de 14 de junho deve reabrir o Estreito de Ormuz até o fim de semana (anteriormente ~um quinto do comércio global de petróleo bloqueado). Brent toca uma mínimo de dois meses, ~26% abaixo dos níveis de mês atrás e ~30% abaixo da máxima de abril (~R$ 589). Mercado-positivo pela via indireta: petróleo barato pressiona a componente de energia da inflação. (TradingEconomics, 15 de junho)</li>\n      <li><span class=\"chip good\">OURO</span> <strong>Sobe paradoxalmente para ~R$ 21.670 (+2,66 %)</strong>: Embora o alívio geopolítico remova prêmio de crise do mercado, ouro sobe acima de R$ 21 mil — impulsionado pela incerteza sobre o rumo de Warsh mais uma alta de taxa do BCE (primeira desde 2023) com previsões de inflação elevadas. Ano +28,07 %, mas mês −5,10 %; o recuo torna o seguro mais barato. (TradingEconomics, 15 de junho)</li>\n      <li><span class=\"chip good\">CRIPTO-CORE</span> <strong>BTC ~R$ 328.195 (24h +1,9 %, 7d +4,0 %), ETH ~R$ 8.597 (+2,7 %)</strong>: O sentiment de risco retorna com o acordo com o Irã. O contexto estrutural mais importante: a série de saída de 13 dias do ETF de BTC (~R$ 21,65 bi, 15 de maio–3 de junho, recorde desde o início do ETF) terminou — mas uma semana com entradas líquidas confirmadas em meados de junho ainda não foi verificada. BTC ~48% abaixo do ATH (R$ 631 mil, out 2025), ETH ~65% abaixo seu ATH. (CoinGecko, 15 de junho)</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>Mag-7 fecham sexta misturado — GOOGL permanece o melhor candidato a acumulação</strong>: TSLA +1,82 %, NVDA +0,16 % no azul; AMZN −1,23 % e AAPL (pós-WWDC, ~R$ 1.450) no vermelho. GOOGL pré-mercado hoje +1,39 %; MSFT ao vivo ~R$ 1.953 (+0,18 %). A força foi seletiva, não ampla — um sinal silencioso de cautela do FOMC. (Yahoo Finance / Nasdaq, 12–15 de junho)</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Periferia de risco-sim salta: memecoins +4–22 %, tokens de IA FET R$ 6,50 / RENDER R$ 35,45</strong>: DOGE ~R$ 0,50 (+4,5 % 24h, +10 % 7d), SHIB +7%, PEPE +22 % 7d, BONK +15 % 7d; cap do setor IA ~R$ 133 bi. Puro beta de risco-sim na recuperação inicial, sem piso fundamental. (coingape e outros, meados de junho)</li>\n      <li><span class=\"chip\">IPO</span> <strong>Leitura do SpaceX se sustenta</strong>: O maior IPO de todos os tempos fechou sexta em R$ 805 (+19% do preço de IPO R$ 675) — um sinal verdadeiro de risco-sim que operou limpo através do ambiente nervoso, mas anda na mesma configuração Irã/FOMC que tudo mais.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es lunes, 15 de junio — la sesión de operaciones aún no comienza, los números de acciones abajo son del cierre del viernes (12 de junio), Microsoft adicionalmente en vivo de la operación de hoy; cripto, petróleo y oro corren en tiempo real (estatus lun 15 de junio). Anoche cambió el eje central: el <strong>tratado de paz entre EE.UU. e Irán fue firmado el 14 de junio</strong> (ceremonia formal en Suiza programada, el Estrecho de Ormuz debe reabrirse para el fin de semana) — y eso evapora la prima de miedo del petróleo: <strong>Brent ~$83.00 (día −4.96 %, mínimo de dos meses), WTI ~$80.33 (−5.36 %)</strong>, el mayor desplome diario en meses.<sup>[6]</sup> Movimiento contrario: <strong>el oro sube a ~$4.334 (+2.66 %)</strong> — no a pesar, sino por la incertidumbre sobre la primera reunión de Warsh.<sup>[7]</sup> Cripto se recupera aún más: <strong>BTC ~$65.639 (24h +1.9 %, 7d +4.0 %), ETH ~$1.719 (+2.7 %)</strong> — el sentimiento de riesgo regresa después de que la serie de salida de 13 días del ETF de BTC (~$4.33B) terminó a principios de junio.<sup>[8][9]</sup> El cierre de Big Tech el viernes sigue siendo selectivo: <strong>TSLA $406.43 (+1.82 %)</strong> y <strong>GOOGL $359.68</strong> (pre-mercado hoy $364.68 / +1.39 %) adelante, <strong>NVDA $205.19 (+0.16 %)</strong> estable, <strong>AMZN $238.55 (−1.23 %)</strong> y <strong>AAPL ~$290</strong> (debilidad post-WWDC) en rojo.<sup>[1][3]</sup> El hilo conductor de la semana: todo depende ahora de la <strong>reunión de la Reserva Federal mañana y miércoles (16–17 de junio)</strong> — la reunión inaugural de Kevin Warsh como presidente de la Reserva Federal. Un corte de tasas está prácticamente descartado (~98% de probabilidad de mercado para mantener en 3,50–3,75 %); el riesgo es solo el tono. Todas las recomendaciones abajo están calibradas a este filtro con fecha.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Reunión de la Reserva Federal 16–17 de junio — la primera reunión de Warsh es el único evento que importa</strong>: el mantenimiento de la tasa en 3,50–3,75 % es prácticamente seguro (~98%); el riesgo es un <em>cambio hacia sesgo más agresivo</em> en el tono del nuevo presidente. Si la Reserva Federal lee la caída del precio del petróleo como una señal de desinflación, el sentimiento de riesgo continúa; si enfatiza la incertidumbre como razón para más austeridad, el sentimiento gira — sin que se mueva un solo punto base. El gráfico de puntos y el formato de conferencia de prensa bajo Warsh aún son desconocidos.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~$83.00 (−4.96 %) — acuerdo con Irán firmado, prima de miedo se evapora</strong>: el tratado de paz entre EE.UU. e Irán del 14 de junio debe reabrir el Estrecho de Ormuz para el fin de semana (previamente ~una quinta parte del comercio mundial de petróleo bloqueado). Brent toca un mínimo de dos meses, ~26 % por debajo de hace un mes y ~30 % por debajo del máximo de abril (~$118). Mercado positivo por vía indirecta: petróleo barato presiona el componente energético de la inflación. (TradingEconomics, 15 de junio)</li>\n      <li><span class=\"chip good\">ORO</span> <strong>Sube paradójicamente a ~$4.334 (+2.66 %)</strong>: aunque la relajación geopolítica elimina la prima de crisis del mercado, el oro sube por encima de $4.300 — impulsado por la incertidumbre sobre el rumbo de Warsh más una subida de tasas del BCE (la primera desde 2023) con pronósticos de inflación elevados. Año +28.07 %, pero mes −5.10 %; el retroceso abarata el seguro. (TradingEconomics, 15 de junio)</li>\n      <li><span class=\"chip good\">CRIPTO-NÚCLEO</span> <strong>BTC ~$65.639 (24h +1.9 %, 7d +4.0 %), ETH ~$1.719 (+2.7 %)</strong>: el sentimiento de riesgo regresa con el acuerdo con Irán. El contexto estructural más importante: la serie de salida de 13 días del ETF de BTC (~$4.33B, 15 de mayo–3 de junio, un récord desde el inicio del ETF) termina — pero una semana con entradas netas confirmadas a mediados de junio aún no se ha verificado. BTC ~48 % por debajo del máximo de todos los tiempos ($126.198, oct 2025), ETH ~65 % por debajo su máximo. (CoinGecko, 15 de junio)</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>Mag-7 cierra viernes mixto — GOOGL sigue siendo el mejor candidato para acumulación</strong>: TSLA +1.82 %, NVDA +0.16 % en positivo; AMZN −1.23 % y AAPL (post-WWDC, ~$290) en rojo. GOOGL pre-mercado hoy +1.39 %; MSFT en vivo ~$390.69 (+0.18 %). La fortaleza fue selectiva, no amplia — una señal silenciosa de cautela de la Reserva Federal. (Yahoo Finance / Nasdaq, 12–15 de junio)</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Periferia de riesgo salta: memecoins +4–22 %, tokens de IA FET $1.30 / RENDER $7.09</strong>: DOGE ~$0.1003 (+4.5 % 24h, +10 % 7d), SHIB +7 %, PEPE +22 % 7d, BONK +15 % 7d; capitalización del sector IA ~$26.6B. Puro beta de riesgo en la recuperación inicial, sin piso fundamental. (coingape et al., mediados de junio)</li>\n      <li><span class=\"chip\">IPO</span> <strong>La lectura de SpaceX se sostiene</strong>: la IPO más grande de todos los tiempos cerró el viernes en $161 (+19 % desde precio de IPO $135) — una verdadera señal de sentimiento de riesgo que operó limpiamente a través del ambiente nervioso, pero monta la misma configuración Irán/Reserva Federal que todo lo demás.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Wochenstart bringt zwei strukturelle Geschichten und eine ruhige Bestätigung. Die laute: ein Authentisierungs-Bypass im Check-Point-VPN (CVSS 9,3) wird seit dem 7. Mai aktiv von einer Qilin-Ransomware-Affiliate ausgenutzt — wer ein Check-Point-Gateway am Rand hat, kennt seinen Patch-Stand jetzt. Die strukturelle: GitHub zieht in npm v12 (Juli) den Stecker bei <code>preinstall</code>/<code>install</code>/<code>postinstall</code> — die direkte Antwort auf die laufende Shai-Hulud-/Miasma-Welle, die quer durch npm und PyPI 471 Artefakte verseucht hat. Und übermorgen kommt eine Node.js-Sicherheits-Release mit HIGH-Schweregrad — Kalender frei halten.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Check-Point-VPN-Zero-Day</strong>: CVE-2026-50751 (CVSS 9,3), Authentisierungs-Bypass im IKEv1-Code, aktiv ausgenutzt seit 7.5. — Qilin-Ransomware-Affiliate bestätigt.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>npm v12 (Juli)</strong>: Install-Skripte, Git-Deps und Remote-URL-Deps standardmäßig blockiert. Direkte Antwort auf Shai-Hulud — jetzt schon auf npm 11.16+ updaten, um die Warnungen zu sehen.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js-Release Mi 17.6.</strong>: HIGH-Schweregrad für 22.x/24.x/26.x angekündigt; CVE-IDs werden erst am Tag selbst veröffentlicht.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Juni-Patch-Tuesday klingt nach</strong>: 198 CVEs (32 kritisch). Hervorzuheben: Windows-Kernel-RCE CVE-2026-45657 (CVSS 9,8) und HTTP.sys-RCE CVE-2026-47291 (CVSS 9,8).</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA-KEV-Adds 9.6.</strong>: Chrome V8 (CVE-2026-11645), Arista EOS, Cisco Catalyst SD-WAN Manager — FCEB-Frist 23.6. Auch für Nicht-Bundes-Stellen ein klares Priorisierungs-Signal.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Angular 22</strong> (3.6.): Signal Forms, Zoneless und OnPush sind produktions-stabil — die Experimente sind durch, jetzt der Konsolidierungs-Schnitt.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (4.6.): SQL/PGQ-Graph-Queries, paralleles Autovacuum, ~2× FK-Inserts. GA-Ziel September/Oktober.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU CRA</strong>: Seit 11.6. dürfen Mitgliedsstaaten ihre Konformitäts-Bewertungsstellen benennen. Operativer Stichtag bleibt der 11.9. (Meldepflicht).</li>\n      <li><span class=\"chip\">Infra</span> <strong>Kubernetes 1.33</strong> erreicht am 28.6. End-of-Life — wer noch drauf ist, plant das Upgrade jetzt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Wochenstart bringt zwei strukturelle Geschichten und eine ruhige Bestätigung. Die laute: ein Authentisierungs-Bypass im Check-Point-VPN (CVSS 9,3) wird seit dem 7. Mai aktiv von einer Qilin-Ransomware-Affiliate ausgenutzt — wer ein Check-Point-Gateway am Rand hat, kennt seinen Patch-Stand jetzt. Die strukturelle: GitHub zieht in npm v12 (Juli) den Stecker bei <code>preinstall</code>/<code>install</code>/<code>postinstall</code> — die direkte Antwort auf die laufende Shai-Hulud-/Miasma-Welle, die quer durch npm und PyPI 471 Artefakte verseucht hat. Und übermorgen kommt eine Node.js-Sicherheits-Release mit HIGH-Schweregrad — Kalender frei halten.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Check-Point-VPN-Zero-Day</strong>: CVE-2026-50751 (CVSS 9,3), Authentisierungs-Bypass im IKEv1-Code, aktiv ausgenutzt seit 7.5. — Qilin-Ransomware-Affiliate bestätigt.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>npm v12 (Juli)</strong>: Install-Skripte, Git-Deps und Remote-URL-Deps standardmäßig blockiert. Direkte Antwort auf Shai-Hulud — jetzt schon auf npm 11.16+ updaten, um die Warnungen zu sehen.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js-Release Mi 17.6.</strong>: HIGH-Schweregrad für 22.x/24.x/26.x angekündigt; CVE-IDs werden erst am Tag selbst veröffentlicht.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Juni-Patch-Tuesday klingt nach</strong>: 198 CVEs (32 kritisch). Hervorzuheben: Windows-Kernel-RCE CVE-2026-45657 (CVSS 9,8) und HTTP.sys-RCE CVE-2026-47291 (CVSS 9,8).</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA-KEV-Adds 9.6.</strong>: Chrome V8 (CVE-2026-11645), Arista EOS, Cisco Catalyst SD-WAN Manager — FCEB-Frist 23.6. Auch für Nicht-Bundes-Stellen ein klares Priorisierungs-Signal.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Angular 22</strong> (3.6.): Signal Forms, Zoneless und OnPush sind produktions-stabil — die Experimente sind durch, jetzt der Konsolidierungs-Schnitt.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (4.6.): SQL/PGQ-Graph-Queries, paralleles Autovacuum, ~2× FK-Inserts. GA-Ziel September/Oktober.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU CRA</strong>: Seit 11.6. dürfen Mitgliedsstaaten ihre Konformitäts-Bewertungsstellen benennen. Operativer Stichtag bleibt der 11.9. (Meldepflicht).</li>\n      <li><span class=\"chip\">Infra</span> <strong>Kubernetes 1.33</strong> erreicht am 28.6. End-of-Life — wer noch drauf ist, plant das Upgrade jetzt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The week's start brings two structural stories and one quiet confirmation. The loud one: an authentication bypass in Check Point VPN (CVSS 9.3) has been actively exploited since May 7 by a Qilin ransomware affiliate — anyone with a Check Point gateway at the edge knows their patch status now. The structural one: GitHub is pulling the plug on <code>preinstall</code>/<code>install</code>/<code>postinstall</code> in npm v12 (July) — the direct answer to the ongoing Shai-Hulud/Miasma wave that has contaminated 471 artifacts across npm and PyPI. And in two days comes a Node.js security release with HIGH severity — clear the calendar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Check Point VPN zero-day</strong>: CVE-2026-50751 (CVSS 9.3), authentication bypass in IKEv1 code, actively exploited since 5/7 — Qilin ransomware affiliate confirmed.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>npm v12 (July)</strong>: install scripts, git deps, and remote-URL deps blocked by default. Direct response to Shai-Hulud — start updating to npm 11.16+ now to see the warnings.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js release Wed 6/17</strong>: HIGH severity announced for 22.x/24.x/26.x; CVE IDs published on the day itself.</li>\n      <li><span class=\"chip\">Sec</span> <strong>June Patch Tuesday aftermath</strong>: 198 CVEs (32 critical, 166 important). Notable: Windows Kernel RCE CVE-2026-45657 (CVSS 9.8) and HTTP.sys RCE CVE-2026-47291 (CVSS 9.8).</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV adds 6/9</strong>: Chrome V8 (CVE-2026-11645), Arista EOS, Cisco Catalyst SD-WAN Manager — FCEB deadline 6/23. Clear prioritization signal even for non-federal entities.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Angular 22</strong> (6/3): Signal Forms, Zoneless, and OnPush are production-stable — the experiments are done, now the consolidation cut.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (6/4): SQL/PGQ graph queries, parallel autovacuum, ~2× faster FK inserts. GA target September/October.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>EU CRA</strong>: As of 6/11, member states may name their conformity assessment bodies. Operative deadline remains 9/11 (reporting obligation).</li>\n      <li><span class=\"chip\">Infra</span> <strong>Kubernetes 1.33</strong> reaches end-of-life on 6/28 — if you're still on it, plan the upgrade now.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O início da semana traz duas histórias estruturais e uma confirmação tranquila. A ruidosa: um bypass de autenticação no Check Point VPN (CVSS 9,3) está sendo explorado ativamente desde 7 de maio por um afiliado da Qilin ransomware — quem tem um gateway Check Point na borda já conhece seu status de patch. A estrutural: o GitHub está desligando <code>preinstall</code>/<code>install</code>/<code>postinstall</code> no npm v12 (julho) — a resposta direta à onda contínua de Shai-Hulud/Miasma que contaminou 471 artefatos entre npm e PyPI. E em dois dias vem uma release de segurança do Node.js com severidade HIGH — deixe a agenda livre.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <strong>Check Point VPN zero-day</strong>: CVE-2026-50751 (CVSS 9,3), bypass de autenticação em código IKEv1, explorado ativamente desde 7/5 — afiliado Qilin ransomware confirmado.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>npm v12 (julho)</strong>: scripts de instalação, git deps e remote-URL deps bloqueados por padrão. Resposta direta a Shai-Hulud — comece a atualizar para npm 11,16+ agora para ver os avisos.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Release Node.js qua 17/6</strong>: severidade HIGH anunciada para 22.x/24.x/26.x; IDs de CVE publicados no próprio dia.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Patch Tuesday de junho repercute</strong>: 198 CVEs (32 críticos, 166 importantes). Notáveis: RCE do Kernel Windows CVE-2026-45657 (CVSS 9,8) e RCE HTTP.sys CVE-2026-47291 (CVSS 9,8).</li>\n      <li><span class=\"chip\">Seg</span> <strong>CISA KEV adiciona 9/6</strong>: Chrome V8 (CVE-2026-11645), Arista EOS, Cisco Catalyst SD-WAN Manager — prazo FCEB 23/6. Sinal claro de priorização mesmo para entidades não-federais.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Angular 22</strong> (3/6): Signal Forms, Zoneless e OnPush são estáveis em produção — os experimentos terminaram, agora o corte de consolidação.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (4/6): consultas de grafo SQL/PGQ, autovacuum paralelo, ~2× inserts mais rápidos com FK. Alvo GA setembro/outubro.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>CRA da UE</strong>: Desde 11/6, estados-membros podem nomear seus órgãos de avaliação de conformidade. Prazo operacional permanece 11/9 (obrigação de relatório).</li>\n      <li><span class=\"chip\">Infra</span> <strong>Kubernetes 1,33</strong> atinge fim da vida em 28/6 — se você ainda está nele, planeje a atualização agora.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El inicio de la semana trae dos historias estructurales y una confirmación tranquila. La ruidosa: un bypass de autenticación en Check Point VPN (CVSS 9,3) está siendo explotado activamente desde el 7 de mayo por un afiliado de ransomware Qilin — quien tenga un gateway Check Point en el perímetro ya conoce su estado de parches. La estructural: GitHub está desactivando <code>preinstall</code>/<code>install</code>/<code>postinstall</code> en npm v12 (julio) — la respuesta directa a la onda Shai-Hulud/Miasma continua que ha contaminado 471 artefactos entre npm y PyPI. Y en dos días viene una release de seguridad de Node.js con severidad HIGH — déjate libre la agenda.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <strong>Check Point VPN zero-day</strong>: CVE-2026-50751 (CVSS 9,3), bypass de autenticación en código IKEv1, explotado activamente desde 7/5 — afiliado de ransomware Qilin confirmado.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>npm v12 (julio)</strong>: scripts de instalación, git deps y remote-URL deps bloqueados por defecto. Respuesta directa a Shai-Hulud — comienza a actualizar a npm 11,16+ ahora para ver los avisos.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Release Node.js mié 17/6</strong>: severidad HIGH anunciada para 22.x/24.x/26.x; IDs de CVE publicados el mismo día.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Patch Tuesday de junio repercute</strong>: 198 CVEs (32 críticos, 166 importantes). Notables: RCE del Kernel Windows CVE-2026-45657 (CVSS 9,8) y RCE HTTP.sys CVE-2026-47291 (CVSS 9,8).</li>\n      <li><span class=\"chip\">Seg</span> <strong>CISA KEV adiciona 9/6</strong>: Chrome V8 (CVE-2026-11645), Arista EOS, Cisco Catalyst SD-WAN Manager — plazo FCEB 23/6. Señal clara de priorización incluso para entidades no-federales.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Angular 22</strong> (3/6): Signal Forms, Zoneless y OnPush son estables en producción — los experimentos terminaron, ahora el corte de consolidación.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (4/6): consultas de grafo SQL/PGQ, autovacuum paralelo, ~2× inserts más rápidos con FK. Objetivo GA septiembre/octubre.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>CRA de la UE</strong>: Desde 11/6, los estados miembros pueden nombrar sus órganos de evaluación de conformidad. El plazo operacional sigue siendo 11/9 (obligación de reporte).</li>\n      <li><span class=\"chip\">Infra</span> <strong>Kubernetes 1,33</strong> llega al final de vida el 28/6 — si aún estás en él, planifica la actualización ahora.</li>\n    </ul></div>"

      "latestTldrHtmlByLang": {
