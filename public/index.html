      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Nach dem ruhigen Dienstag ist die Woche jetzt voll: gleich drei echte Bewegungen laufen parallel, und alle drei betreffen genau deine Werkzeugkiste. Ein offenes Modell — Kimi K3 — steht an der Spitze einer Coding-Arena, vor den geschlossenen Frontier-Modellen. DeepSeek stellt V4 diese Woche in Aussicht, zeitgleich zur WAIC in Shanghai. Und das MCP-Protokoll, das inzwischen unter fast jedem Agenten-Tool steckt, bekommt am Montag seine größte Überarbeitung seit dem Start. Zwei davon sind noch Versprechen, kein Release — genau darauf liegt heute der Fokus: was gesichert ist, was nur angekündigt, und was der Rang an der Spitze noch wert ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 auf Platz 1</strong>: 1.679 Elo in der Arena.ai Frontend Code Arena, vor Claude Fable 5 (1.631) und GPT-5.6 Sol (1.618). 2,8-Billionen-MoE, API seit 16.07. live — offene Gewichte <em>versprochen</em> für 27.07., noch nicht da.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4 „diese Woche“</strong>: WAIC-getimte GA erwartet (V4-Pro + V4-Flash) — offiziell aber nicht bestätigt. Berichtet werden Peak/Off-Peak-Preise nach Tageszeit.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>MCP-Spec final am 28.07. (RC seit 21.05.)</strong>: der Kern wird zustandslos (kein Handshake, keine Session-ID), neu sind MCP Apps + Tasks, raus fliegen Roots/Sampling/Logging — größte Revision seit dem Start.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified gesättigt</strong>: Aggregator-Snapshot (22.07.) — Fable 5 95,0 %, Mythos Preview 93,9 % (nur per Einladung), Opus 4.8 88,6 %. Die Reihenfolge widerspricht dem 20.07.-Stand.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Ranglisten unlesbar</strong>: Aider-Board ist Monate alt (Stand 20.11.2025), LiveCodeBench nennt zwei verschiedene „aktuelle“ Führende — kein belastbares #1.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.32.1</strong>: neue interaktive Agent-CLI (Chat, Code, Websuche, Delegation) — einen Blick wert für dein lokales Setup.</li>\n      <li><span class=\"chip\">Tool</span> <strong>CLIs rücken nach</strong>: GitHub Copilot CLI v1.0.73 (21.07.), OpenAI Codex CLI v0.144.6 korrigiert das Kontextfenster für GPT-5.6 auf 272K.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor in Slack</strong>: plant jetzt vor dem Start, arbeitet über mehrere Repos und Kanäle hinweg.</li>\n      <li><span class=\"chip\">Quelle</span> <strong>Beleglage</strong>: DeepSeek-V4-GA unbestätigt, SWE-Bench-Primärseite JS-only (llm-stats-Fallback), Kimi-Arena-Zahlen aus Sekundärquellen.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">After Tuesday's quiet news day, the week is now packed: three real developments are running in parallel, and all three land squarely on your toolbox. An open model — Kimi K3 — sits at the top of a coding arena, ahead of the closed frontier models. DeepSeek is teasing V4 this week, timed to the WAIC in Shanghai. And the MCP protocol, which by now sits underneath nearly every agent tool, gets its biggest overhaul since launch on Monday. Two of these are still promises, not releases — and that's exactly today's focus: what's confirmed, what's only been announced, and what the rank at the top is actually worth.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 at #1</strong>: 1,679 Elo in the Arena.ai Frontend Code Arena, ahead of Claude Fable 5 (1,631) and GPT-5.6 Sol (1,618). 2.8-trillion MoE, API live since 07/16 — open weights promised for 07/27, not out yet.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4 \"this week\"</strong>: WAIC-timed GA expected (V4-Pro + V4-Flash) — but not officially confirmed. Peak/off-peak, time-of-day pricing is being reported.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>MCP spec final on 07/28 (RC since 05/21)</strong>: the core goes stateless (no handshake, no session ID), new are MCP Apps + Tasks, Roots/Sampling/Logging get dropped — the biggest revision since launch.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified saturates</strong>: aggregator snapshot (07/22) — Fable 5 95.0%, Mythos Preview 93.9% (invite-only), Opus 4.8 88.6%. The order contradicts the 07/20 snapshot.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Leaderboards unreadable</strong>: the Aider board is months old (as of 11/20/2025), LiveCodeBench names two different \"current\" leaders — no reliable #1.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.32.1</strong>: new interactive agent CLI (chat, code, web search, delegation) — worth a look for your local setup.</li>\n      <li><span class=\"chip\">Tool</span> <strong>CLIs catch up</strong>: GitHub Copilot CLI v1.0.73 (07/21), OpenAI Codex CLI v0.144.6 fixes the context window for GPT-5.6 to 272K.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor in Slack</strong>: now shares a plan before it starts, works across multiple repos and channels.</li>\n      <li><span class=\"chip\">Source</span> <strong>Evidence base</strong>: DeepSeek V4 GA unconfirmed, SWE-Bench primary site JS-only (llm-stats fallback), Kimi arena figures from secondary sources.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Depois da terça-feira mais parada, a semana agora está cheia: três movimentos de verdade acontecem em paralelo, e os três mexem direto com a sua caixa de ferramentas. Um modelo aberto — o Kimi K3 — está na ponta de uma arena de código, à frente dos modelos fechados de fronteira. A DeepSeek dá indícios de trazer o V4 esta semana, encaixado no calendário da WAIC em Xangai. E o protocolo MCP, que hoje está por trás de quase toda ferramenta de agente, ganha na segunda-feira sua maior reforma desde o lançamento. Dois desses três ainda são promessas, não lançamentos — e é exatamente nisso que o foco de hoje está: o que já está confirmado, o que é só anúncio, e quanto ainda vale a posição na ponta do ranking.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 em 1º lugar</strong>: 1.679 de Elo na Arena.ai Frontend Code Arena, à frente do Claude Fable 5 (1.631) e do GPT-5.6 Sol (1.618). MoE de 2,8 trilhões, API ativa desde 16/07 — pesos abertos prometidos para 27/07, ainda não chegaram.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4 \"esta semana\"</strong>: GA esperada, encaixada na WAIC (V4-Pro + V4-Flash) — mas ainda não confirmada oficialmente. Há relatos de preços por horário, pico/fora de pico.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Especificação MCP final em 28/07 (RC desde 21/05)</strong>: o núcleo fica sem estado (sem handshake, sem ID de sessão), chegam o MCP Apps + Tasks, saem Roots/Sampling/Logging — a maior revisão desde o lançamento.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified satura</strong>: retrato de agregador (22/07) — Fable 5 com 95,0%, Mythos Preview com 93,9% (só por convite), Opus 4.8 com 88,6%. A ordem contradiz o retrato de 20/07.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Rankings ilegíveis</strong>: o ranking da Aider está com meses de atraso (dados de 20/11/2025), o LiveCodeBench aponta dois líderes \"atuais\" diferentes — nenhum #1 confiável.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.32.1</strong>: nova CLI interativa de agente (chat, código, busca na web, delegação) — vale a pena conferir no seu setup local.</li>\n      <li><span class=\"chip\">Tool</span> <strong>CLIs avançam</strong>: GitHub Copilot CLI v1.0.73 (21/07), OpenAI Codex CLI v0.144.6 corrige a janela de contexto do GPT-5.6 para 272K.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor no Slack</strong>: agora compartilha um plano antes de começar, atua em vários repositórios e canais.</li>\n      <li><span class=\"chip\">Fonte</span> <strong>Base de evidências</strong>: GA do DeepSeek V4 não confirmada, site primário do SWE-Bench só via JavaScript (fallback no llm-stats), números da arena da Kimi vindos de fontes secundárias.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Después del martes tranquilo, la semana ya está a tope: hay tres movimientos reales ocurriendo en paralelo, y los tres tocan directamente tu caja de herramientas. Un modelo abierto — Kimi K3 — está en la cima de una arena de código, por delante de los modelos cerrados de frontera. DeepSeek deja entrever que traerá V4 esta semana, coincidiendo con la WAIC en Shanghái. Y el protocolo MCP, que hoy está detrás de casi toda herramienta de agente, recibe el lunes su mayor reforma desde su lanzamiento. Dos de estos tres siguen siendo promesas, no lanzamientos — y ahí está justo el enfoque de hoy: qué está confirmado, qué es solo un anuncio, y cuánto vale todavía el lugar en la cima del ranking.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 en el 1er lugar</strong>: 1.679 de Elo en la Arena.ai Frontend Code Arena, por delante de Claude Fable 5 (1.631) y GPT-5.6 Sol (1.618). MoE de 2,8 billones, API activa desde el 16/07 — pesos abiertos prometidos para el 27/07, todavía no están.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4 \"esta semana\"</strong>: se espera una GA encajada con la WAIC (V4-Pro + V4-Flash) — pero aún sin confirmación oficial. Se reportan precios por franja horaria, pico/fuera de pico.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Especificación MCP final el 28/07 (RC desde el 21/05)</strong>: el núcleo se vuelve sin estado (sin handshake, sin ID de sesión), se suman MCP Apps + Tasks, se eliminan Roots/Sampling/Logging — la mayor revisión desde su lanzamiento.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified se satura</strong>: instantánea de agregador (22/07) — Fable 5 con 95,0%, Mythos Preview con 93,9% (solo por invitación), Opus 4.8 con 88,6%. El orden contradice la instantánea del 20/07.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Rankings ilegibles</strong>: el tablero de Aider tiene meses de atraso (al 20/11/2025), LiveCodeBench señala dos líderes \"actuales\" distintos — ningún #1 confiable.</li>\n      <li><span class=\"chip good\">Local</span> <strong>Ollama v0.32.1</strong>: nueva CLI interactiva de agente (chat, código, búsqueda web, delegación) — vale la pena verla en tu setup local.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Las CLI avanzan</strong>: GitHub Copilot CLI v1.0.73 (21/07), OpenAI Codex CLI v0.144.6 corrige la ventana de contexto de GPT-5.6 a 272K.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor en Slack</strong>: ahora comparte un plan antes de empezar, opera en varios repositorios y canales.</li>\n      <li><span class=\"chip\">Fuente</span> <strong>Respaldo documental</strong>: GA de DeepSeek V4 sin confirmar, sitio primario de SWE-Bench solo vía JavaScript (respaldo en llm-stats), cifras de la arena de Kimi provenientes de fuentes secundarias.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">In den letzten zwei Wochen hat jeder große Cloud-Anbieter still dieselbe Schicht gebaut: die <strong>Agenten-Orchestrierung</strong> — die Software, die viele KI-Agenten koordiniert, überwacht und absichert. Alibaba auf der WAIC in Shanghai, Google mit AlphaEvolve „GA\", OpenAI bei der Deutschen Telekom, Meta mit seiner ersten bezahlten Modell-API. Es sieht aus wie ein Wettrennen um eine gewonnene Zukunft. Der ehrliche Gegen-Datensatz sagt etwas anderes: McKinsey misst nur <strong>~6 %</strong> „High Performer\", der beste Computer-Agent schafft bei echten Langaufgaben <strong>20,6 %</strong>, im deutschen Mittelstand nutzen <strong>16,6 %</strong> überhaupt Agenten. Die Plattformen sind fertig — der Wert ist es nicht. Für twiceD liegt die Lücke nicht im Bau einer weiteren Plattform, sondern in der Governance und dem letzten Meter, den die Großen auslassen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · China</span> <strong>Alibaba „Agent Native Cloud\"</strong> auf der WAIC 2026 (18.–20.07.): neuer Orchestrierungs-Stack (AgentTeams, AgentLoop, AgentRun). Zhenwu-Chips kumuliert <strong>560.000</strong> Stück, 400+ Kunden.</li>\n      <li><span class=\"chip good\">DEPLOY · DE</span> <strong>OpenAI ChatGPT Work</strong> bei der Deutschen Telekom: <strong>50.000</strong> aktive Nutzer von 200.000, Nutzung <strong>+546 %</strong> seit Jahresanfang (laut rcrwireless, Sekundärquelle).</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Google AlphaEvolve</strong> „allgemein verfügbar\" auf der Gemini Enterprise Agent Platform; FM Logistic meldet <strong>+10,4 %</strong> auf bereits optimierter Baseline (GA-Datum gehedged).</li>\n      <li><span class=\"chip\">PRODUKT · Global</span> <strong>Meta</strong> verlangt erstmals Geld für ein Modell (Muse Spark 1.1, 09.07.): <strong>~25 %</strong> des OpenAI-/Anthropic-Preises.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Alterion „Draco\"</strong> (16.07.), Governance-Laufzeitschicht; AI-Act-Stufe „Small Mid-Cap\" (bis <strong>750</strong> Beschäftigte) — vom EU-Parlament (16.06.) und Rat (29.06.2026) förmlich angenommen, es fehlt nur noch die Amtsblatt-Veröffentlichung.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>McKinsey:</strong> 88 % nutzen KI, aber nur <strong>~6 %</strong> schreiben ihr &gt;5 % des EBIT zu; zwei Drittel skalieren noch nicht.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand-KI-Index:</strong> 51,2 % nutzen/testen KI; Agenten-Einsatz fast verdoppelt (8,7 % → <strong>16,6 %</strong>).</li>\n      <li><span class=\"chip hot\">SKEPSIS</span> <strong>Realitäts-Check:</strong> Computer-Agenten <strong>85 %</strong> im gesättigten Benchmark, aber <strong>20,6 %</strong> bei echten Langaufgaben.</li>\n      <li><span class=\"chip\">BR</span> <strong>AI Summit Brasil</strong> (22.–23.07., São Paulo) läuft heute; Marco Legal da IA weiter in der Warteschleife.</li>\n      <li><span class=\"chip good\">twiceD</span> Eine tief recherchierte Idee: <strong>Agenten-Governance für den Mittelstand</strong> — zwischen Beratungsprojekt und 200k-Enterprise-Plattform.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">In den letzten zwei Wochen hat jeder große Cloud-Anbieter still dieselbe Schicht gebaut: die <strong>Agenten-Orchestrierung</strong> — die Software, die viele KI-Agenten koordiniert, überwacht und absichert. Alibaba auf der WAIC in Shanghai, Google mit AlphaEvolve „GA\", OpenAI bei der Deutschen Telekom, Meta mit seiner ersten bezahlten Modell-API. Es sieht aus wie ein Wettrennen um eine gewonnene Zukunft. Der ehrliche Gegen-Datensatz sagt etwas anderes: McKinsey misst nur <strong>~6 %</strong> „High Performer\", der beste Computer-Agent schafft bei echten Langaufgaben <strong>20,6 %</strong>, im deutschen Mittelstand nutzen <strong>16,6 %</strong> überhaupt Agenten. Die Plattformen sind fertig — der Wert ist es nicht. Für twiceD liegt die Lücke nicht im Bau einer weiteren Plattform, sondern in der Governance und dem letzten Meter, den die Großen auslassen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · China</span> <strong>Alibaba „Agent Native Cloud\"</strong> auf der WAIC 2026 (18.–20.07.): neuer Orchestrierungs-Stack (AgentTeams, AgentLoop, AgentRun). Zhenwu-Chips kumuliert <strong>560.000</strong> Stück, 400+ Kunden.</li>\n      <li><span class=\"chip good\">DEPLOY · DE</span> <strong>OpenAI ChatGPT Work</strong> bei der Deutschen Telekom: <strong>50.000</strong> aktive Nutzer von 200.000, Nutzung <strong>+546 %</strong> seit Jahresanfang (laut rcrwireless, Sekundärquelle).</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Google AlphaEvolve</strong> „allgemein verfügbar\" auf der Gemini Enterprise Agent Platform; FM Logistic meldet <strong>+10,4 %</strong> auf bereits optimierter Baseline (GA-Datum gehedged).</li>\n      <li><span class=\"chip\">PRODUKT · Global</span> <strong>Meta</strong> verlangt erstmals Geld für ein Modell (Muse Spark 1.1, 09.07.): <strong>~25 %</strong> des OpenAI-/Anthropic-Preises.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Alterion „Draco\"</strong> (16.07.), Governance-Laufzeitschicht; AI-Act-Stufe „Small Mid-Cap\" (bis <strong>750</strong> Beschäftigte) — vom EU-Parlament (16.06.) und Rat (29.06.2026) förmlich angenommen, es fehlt nur noch die Amtsblatt-Veröffentlichung.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>McKinsey:</strong> 88 % nutzen KI, aber nur <strong>~6 %</strong> schreiben ihr &gt;5 % des EBIT zu; zwei Drittel skalieren noch nicht.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand-KI-Index:</strong> 51,2 % nutzen/testen KI; Agenten-Einsatz fast verdoppelt (8,7 % → <strong>16,6 %</strong>).</li>\n      <li><span class=\"chip hot\">SKEPSIS</span> <strong>Realitäts-Check:</strong> Computer-Agenten <strong>85 %</strong> im gesättigten Benchmark, aber <strong>20,6 %</strong> bei echten Langaufgaben.</li>\n      <li><span class=\"chip\">BR</span> <strong>AI Summit Brasil</strong> (22.–23.07., São Paulo) läuft heute; Marco Legal da IA weiter in der Warteschleife.</li>\n      <li><span class=\"chip good\">twiceD</span> Eine tief recherchierte Idee: <strong>Agenten-Governance für den Mittelstand</strong> — zwischen Beratungsprojekt und 200k-Enterprise-Plattform.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Over the past two weeks, every major cloud provider has quietly built the same layer: <strong>agent orchestration</strong> — the software that coordinates, monitors, and secures many AI agents at once. Alibaba at WAIC in Shanghai, Google with AlphaEvolve going \"GA,\" OpenAI at Deutsche Telekom, Meta with its first paid model API. It looks like a race for an already-won future. The honest counter-dataset says something else: McKinsey measures only <strong>~6%</strong> \"high performers,\" the best computer-use agent hits <strong>20.6%</strong> on real long-horizon tasks, and in the German Mittelstand only <strong>16.6%</strong> use agents at all. The platforms are finished — the value isn't. For twiceD, the gap isn't in building yet another platform, but in governance and the last mile the giants skip.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · China</span> <strong>Alibaba \"Agent Native Cloud\"</strong> at WAIC 2026 (Jul 18–20): new orchestration stack (AgentTeams, AgentLoop, AgentRun). Zhenwu chips reach <strong>560,000</strong> units cumulative, 400+ customers.</li>\n      <li><span class=\"chip good\">DEPLOY · DE</span> <strong>OpenAI ChatGPT Work</strong> at Deutsche Telekom: <strong>50,000</strong> active users out of 200,000, usage up <strong>546%</strong> since the start of the year (per rcrwireless, secondary source).</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Google AlphaEvolve</strong> goes \"generally available\" on the Gemini Enterprise Agent Platform; FM Logistic reports <strong>+10.4%</strong> on an already-optimized baseline (GA date hedged).</li>\n      <li><span class=\"chip\">PRODUCT · Global</span> <strong>Meta</strong> charges for a model for the first time (Muse Spark 1.1, Jul 9): <strong>~25%</strong> of the OpenAI/Anthropic price.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Alterion \"Draco\"</strong> (Jul 16), a governance runtime layer; new AI Act tier \"Small Mid-Cap\" (up to <strong>750</strong> employees) — formally adopted by the European Parliament (Jun 16) and the Council (Jun 29, 2026), only the Official Journal publication remains.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>McKinsey:</strong> 88% use AI, but only <strong>~6%</strong> credit it with &gt;5% of EBIT; two-thirds still haven't started scaling.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand AI Index:</strong> 51.2% use/test AI; agent adoption nearly doubled (8.7% → <strong>16.6%</strong>).</li>\n      <li><span class=\"chip hot\">REALITY CHECK</span> Computer-use agents <strong>85%</strong> on the saturated benchmark, but only <strong>20.6%</strong> on real long-horizon tasks.</li>\n      <li><span class=\"chip\">BR</span> <strong>AI Summit Brasil</strong> (Jul 22–23, São Paulo) is underway today; Marco Legal da IA remains stuck in limbo.</li>\n      <li><span class=\"chip good\">twiceD</span> One deeply researched idea: <strong>agent governance for the Mittelstand</strong> — between a consulting project and a $200k enterprise platform.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Nas últimas duas semanas, cada grande provedor de nuvem construiu, em silêncio, a mesma camada: a <strong>orquestração de agentes</strong> — o software que coordena, monitora e protege muitos agentes de IA ao mesmo tempo. A Alibaba na WAIC em Xangai, o Google com o AlphaEvolve \"GA\", a OpenAI na Deutsche Telekom, a Meta com sua primeira API de modelo paga. Parece uma corrida por um futuro já ganho. O conjunto de dados honesto que contradiz isso diz outra coisa: a McKinsey mede apenas <strong>~6 %</strong> de \"alto desempenho\", o melhor agente de computador atinge <strong>20,6 %</strong> em tarefas longas reais, e no Mittelstand alemão apenas <strong>16,6 %</strong> sequer usam agentes. As plataformas estão prontas — o valor, não. Para a twiceD, a lacuna não está em construir mais uma plataforma, mas na governança e na última milha que os grandes deixam de lado.</p>\n    <ul>\n      <li><span class=\"chip hot\">IMPLANTAÇÃO · China</span> <strong>Alibaba \"Agent Native Cloud\"</strong> na WAIC 2026 (18–20/07): nova stack de orquestração (AgentTeams, AgentLoop, AgentRun). Chips Zhenwu somam <strong>560.000</strong> unidades, mais de 400 clientes.</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO · DE</span> <strong>OpenAI ChatGPT Work</strong> na Deutsche Telekom: <strong>50.000</strong> usuários ativos de 200.000, uso <strong>+546 %</strong> desde o início do ano (segundo a rcrwireless, fonte secundária).</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO · Global</span> <strong>Google AlphaEvolve</strong> fica \"geralmente disponível\" na Gemini Enterprise Agent Platform; a FM Logistic registra <strong>+10,4 %</strong> sobre uma base já otimizada (data de GA incerta).</li>\n      <li><span class=\"chip\">PRODUTO · Global</span> <strong>Meta</strong> cobra pela primeira vez por um modelo (Muse Spark 1.1, 09/07): <strong>~25 %</strong> do preço da OpenAI/Anthropic.</li>\n      <li><span class=\"chip\">REGULAÇÃO · UE</span> <strong>Alterion \"Draco\"</strong> (16/07), camada de governança em tempo de execução; novo nível do AI Act \"Small Mid-Cap\" (até <strong>750</strong> funcionários) — aprovado formalmente pelo Parlamento Europeu (16/06) e pelo Conselho (29/06/2026), falta só a publicação no Jornal Oficial.</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>McKinsey:</strong> 88 % usam IA, mas apenas <strong>~6 %</strong> atribuem a ela &gt;5 % do EBIT; dois terços ainda não começaram a escalar.</li>\n      <li><span class=\"chip\">ESTUDO · DE</span> <strong>Índice de IA no Mittelstand:</strong> 51,2 % usam/testam IA; o uso de agentes quase dobrou (8,7 % → <strong>16,6 %</strong>).</li>\n      <li><span class=\"chip hot\">CETICISMO</span> <strong>Checagem de realidade:</strong> agentes de computador chegam a <strong>85 %</strong> no benchmark saturado, mas só <strong>20,6 %</strong> em tarefas longas reais.</li>\n      <li><span class=\"chip\">BR</span> <strong>AI Summit Brasil</strong> (22–23/07, São Paulo) acontece hoje; o Marco Legal da IA segue parado.</li>\n      <li><span class=\"chip good\">twiceD</span> Uma ideia bem pesquisada: <strong>governança de agentes para o Mittelstand</strong> — entre um projeto de consultoria e uma plataforma enterprise de 200 mil dólares.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">En las últimas dos semanas, cada gran proveedor de nube construyó, en silencio, la misma capa: la <strong>orquestación de agentes</strong> — el software que coordina, supervisa y protege a muchos agentes de IA a la vez. Alibaba en la WAIC de Shanghái, Google con AlphaEvolve en \"GA\", OpenAI en Deutsche Telekom, Meta con su primera API de modelo de pago. Parece una carrera por un futuro ya ganado. El contraargumento honesto dice otra cosa: McKinsey mide solo <strong>~6 %</strong> de \"alto desempeño\", el mejor agente de computadora logra <strong>20,6 %</strong> en tareas largas reales, y en la mediana empresa alemana solo <strong>16,6 %</strong> usa agentes siquiera. Las plataformas están listas — el valor no. Para twiceD, la brecha no está en construir otra plataforma más, sino en la gobernanza y la última milla que los grandes se saltan.</p>\n    <ul>\n      <li><span class=\"chip hot\">DESPLIEGUE · China</span> <strong>Alibaba \"Agent Native Cloud\"</strong> en la WAIC 2026 (18–20/07): nuevo stack de orquestación (AgentTeams, AgentLoop, AgentRun). Los chips Zhenwu suman <strong>560.000</strong> unidades, más de 400 clientes.</li>\n      <li><span class=\"chip good\">DESPLIEGUE · DE</span> <strong>OpenAI ChatGPT Work</strong> en Deutsche Telekom: <strong>50.000</strong> usuarios activos de 200.000, uso <strong>+546 %</strong> desde inicios de año (según rcrwireless, fuente secundaria).</li>\n      <li><span class=\"chip good\">DESPLIEGUE · Global</span> <strong>Google AlphaEvolve</strong> queda \"disponible de forma general\" en la Gemini Enterprise Agent Platform; FM Logistic reporta <strong>+10,4 %</strong> sobre una línea base ya optimizada (fecha de GA con reserva).</li>\n      <li><span class=\"chip\">PRODUCTO · Global</span> <strong>Meta</strong> cobra por primera vez por un modelo (Muse Spark 1.1, 09/07): <strong>~25 %</strong> del precio de OpenAI/Anthropic.</li>\n      <li><span class=\"chip\">REGULACIÓN · UE</span> <strong>Alterion \"Draco\"</strong> (16/07), capa de gobernanza en tiempo de ejecución; nuevo nivel del AI Act \"Small Mid-Cap\" (hasta <strong>750</strong> empleados) — adoptado formalmente por el Parlamento Europeo (16/06) y el Consejo (29/06/2026), solo falta la publicación en el Diario Oficial.</li>\n      <li><span class=\"chip\">ESTUDIO · Global</span> <strong>McKinsey:</strong> 88 % usa IA, pero solo <strong>~6 %</strong> le atribuye &gt;5 % de su EBIT; dos tercios todavía no empiezan a escalar.</li>\n      <li><span class=\"chip\">ESTUDIO · DE</span> <strong>Índice de IA para la mediana empresa:</strong> 51,2 % usa/prueba IA; el uso de agentes casi se duplicó (8,7 % → <strong>16,6 %</strong>).</li>\n      <li><span class=\"chip hot\">ESCEPTICISMO</span> <strong>Chequeo de realidad:</strong> los agentes de computadora llegan a <strong>85 %</strong> en el benchmark saturado, pero solo <strong>20,6 %</strong> en tareas largas reales.</li>\n      <li><span class=\"chip\">BR</span> <strong>AI Summit Brasil</strong> (22–23/07, São Paulo) se realiza hoy; el Marco Legal da IA sigue en pausa.</li>\n      <li><span class=\"chip good\">twiceD</span> Una idea muy investigada: <strong>gobernanza de agentes para la mediana empresa</strong> — entre un proyecto de consultoría y una plataforma enterprise de 200 mil dólares.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein ruhigerer Mittwoch. <strong>69 Listings</strong> live gescort — deutlich weniger als die 150 von gestern, aber die Spitze ist unverändert: dieselben drei Java/Spring/Angular-Contracts teilen sich Fit <strong>88</strong>. Neu und interessant sind zwei Ränder: ein Freelance-Auftrag, der ausdrücklich <strong>Claude Code und MCP</strong> verlangt, und — nach dem gestrigen Nulltag — heute wieder ein <strong>TED-Verfahren, das twiceD allein bieten könnte</strong>. Dazu ein sauber belegtes Markt-Signal: Der Freelance-Markt wächst insgesamt, aber die IT-Nische kühlt.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit 88, dreifach</strong>: iSAX (Java 21/Spring Boot 3/Angular/Kafka, FFM 80 % remote), BridgingIT (Spring Boot/Kubernetes/Kafka, FFM 100 % remote), Keil (Java/Angular + Telematikinfrastruktur, München 100 % remote). Recherchierte Rate 90–130 €/h*.</li>\n      <li><span class=\"chip hot\">AI-Integration</span> <strong>Freelance-Auftrag will Claude Code/MCP</strong>: WeMatch Consulting sucht einen „Senior AI Software Engineer – Full-Stack\" (Java/Spring oder Python + React/Angular, Anthropic-SDK/autonome Agenten), 100 % remote, Fit <strong>84</strong> — exakter Match zu Daniels KI-gestützter Entwicklung.</li>\n      <li><span class=\"chip\">Remote</span> <strong>62 der 69 Listings</strong> tragen ein Remote-Tag; nur eine Handvoll bindet an festes Onsite. Die BR-Zeitzone bleibt selten das K.o.</li>\n      <li><span class=\"chip\">Employee</span> <strong>11 Stellen im Filter</strong>, KI-lastig und überwiegend Schweiz: ELCA „Senior Java Engineer – Agentic AI\" Zürich (Fit 81, CHF 140–190k*), AXA (Python/AI, CHF 130–170k*), Camunda (Kubernetes, remote worldwide, US$126.800–190.100).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Intriguing-Spitze JetBrains</strong>: „Principal Forward Deployed Engineer – AI-Native\" (Fit 82, EU-Multi-City). Dahinter Cursor (AI Adoption EMEA) und Cognition. Die Tier ist heute schmal — nur vier Einträge.</li>\n      <li><span class=\"chip good\">DE</span> <strong>TED-Direct-Fit-Kandidat</strong>: Bauhaus-Universität Weimar schreibt „Softwareentwicklung MOVEwell\" aus — nur eine Referenzliste als Eignungshürde, keine Umsatz-/Personal-/Zertifikatswand. Frist 11.08. Der Stack steht nicht im Notice-Text und ist vor einem Angebot zu prüfen.</li>\n      <li><span class=\"chip\">DE</span> <strong>Drei TED-Verfahren nur mit Partner</strong>: Helaba-Infoportal (explizit Java/Groovy/Jenkins, aber €750k-Mindestumsatz + nur Festangestellte), Land RLP DIP 2027 (€1,5 Mio.), DB KI-Medienmonitoring (€12,9 Mio., angewandte KI).</li>\n      <li><span class=\"chip warn\">Markt</span> <strong>IT-Nische kühlt, Markt wächst</strong>: freelance.de (03.07.2026) meldet das Q2-Projektvolumen <strong>+9,6 % YoY</strong> — aber der IT-/Software-Anteil fiel von <strong>33,4 % auf 27,9 %</strong> (Q1→Q2), rund −21 % innerhalb der Kategorie.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Externe Anker 2026</strong>: freelancermap nennt den IT-Median DACH bei <strong>95 €/h</strong> (Software/Web 90 €/h); Malt-Tarifbarometer Java 526 €/Tag (3–7 J) bis 720 €/Tag (15+ J). Java-Senior-Band bleibt 90–120 €/h.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Stack-Mix heute</strong>: Java 43×, Spring Boot 32×, Angular 27×, Kubernetes 16×, AI-Integration 16×, AWS 13×, Kafka 13×, Python 10×.</li>\n      <li><span class=\"chip warn\">Achtung</span> <strong>Layoff-Schlagzeilen im Auto-/Industriesektor</strong> (VW, Porsche, Bosch) — nicht im IT-Freelance-Markt, und die Zahlen widersprechen sich zwischen Quellen; kein einzelner Wert wird hier headlined.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">A quieter Wednesday. <strong>69 listings</strong> scored live — well below yesterday's 150, but the top tier is unchanged: the same three Java/Spring/Angular contracts share a fit of <strong>88</strong>. Two interesting edges are new today: a Freelance contract that explicitly asks for <strong>Claude Code and MCP</strong>, and — after yesterday's blank day — once again a <strong>TED tender that twiceD could bid on solo</strong>. Plus a cleanly sourced market signal: the freelance market overall is growing, but the IT niche is cooling.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top fit 88, tied three ways</strong>: iSAX (Java 21/Spring Boot 3/Angular/Kafka, Frankfurt 80% remote), BridgingIT (Spring Boot/Kubernetes/Kafka, Frankfurt 100% remote), Keil (Java/Angular + healthcare telematics infrastructure, Munich 100% remote). Researched rate €90–130/h*.</li>\n      <li><span class=\"chip hot\">AI-Integration</span> <strong>Freelance contract wants Claude Code/MCP</strong>: WeMatch Consulting is hiring a \"Senior AI Software Engineer – Full-Stack\" (Java/Spring or Python + React/Angular, Anthropic SDK/autonomous agents), 100% remote, fit <strong>84</strong> — an exact match to Daniel's AI-assisted development.</li>\n      <li><span class=\"chip\">Remote</span> <strong>62 of the 69 listings</strong> carry a Remote tag; only a handful tie to fixed onsite work. The Brazil time zone rarely turns out to be a dealbreaker.</li>\n      <li><span class=\"chip\">Employee</span> <strong>11 positions in the filter</strong>, AI-heavy and mostly Switzerland: ELCA \"Senior Java Engineer – Agentic AI\" Zurich (fit 81, CHF 140–190k*), AXA (Python/AI, CHF 130–170k*), Camunda (Kubernetes, remote worldwide, US$126,800–190,100).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Intriguing top pick: JetBrains</strong>: \"Principal Forward Deployed Engineer – AI-Native\" (fit 82, EU multi-city). Behind it Cursor (AI Adoption EMEA) and Cognition. The tier is thin today — just four entries.</li>\n      <li><span class=\"chip good\">DE</span> <strong>TED direct-fit candidate</strong>: Bauhaus-Universität Weimar is tendering \"Software development MOVEwell\" — only a reference list as the eligibility bar, no revenue/staffing/certification wall. Deadline Aug 11. The stack isn't stated in the notice text and needs checking before any bid.</li>\n      <li><span class=\"chip\">DE</span> <strong>Three TED tenders, partner only</strong>: Helaba info portal (explicitly Java/Groovy/Jenkins, but €750,000 minimum revenue + staff-only employees), State of Rhineland-Palatinate DIP 2027 (€1.5M), DB AI media monitoring (€12.9M, applied AI).</li>\n      <li><span class=\"chip warn\">Market</span> <strong>IT niche cooling, market growing</strong>: freelance.de (Jul 3, 2026) reports Q2 project volume <strong>+9.6% YoY</strong> — but the IT/software share fell from <strong>33.4% to 27.9%</strong> (Q1→Q2), roughly −21% within the category.</li>\n      <li><span class=\"chip\">Rate</span> <strong>External anchors 2026</strong>: freelancermap puts the DACH IT median at <strong>€95/h</strong> (software/web €90/h); Malt's rate barometer shows Java at €526/day (3–7 yrs) up to €720/day (15+ yrs). The Java senior band stays €90–120/h.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Today's stack mix</strong>: Java 43×, Spring Boot 32×, Angular 27×, Kubernetes 16×, AI-Integration 16×, AWS 13×, Kafka 13×, Python 10×.</li>\n      <li><span class=\"chip warn\">Heads up</span> <strong>Layoff headlines in the auto/industrial sector</strong> (VW, Porsche, Bosch) — not in the IT freelance market, and the numbers conflict between sources; no single figure is headlined here.</li>\n    </ul></div>",

I-Native\" (fit 82, multi-cidade na UE). Atrás vêm Cursor (AI Adoption EMEA) e Cognition. O nível está estreito hoje — só quatro vagas.</li>\n      <li><span class=\"chip good\">DE</span> <strong>Candidato TED direct-fit</strong>: a Bauhaus-Universität Weimar publicou a licitação \"Desenvolvimento de software MOVEwell\" — só uma lista de referências como barreira de habilitação, sem exigência de faturamento, pessoal ou certificação. Prazo 11/08. O stack não aparece no texto do edital e precisa ser confirmado antes de qualquer proposta.</li>\n      <li><span class=\"chip\">DE</span> <strong>Três processos do TED só com parceiro</strong>: portal de informações da Helaba (exige explicitamente Java/Groovy/Jenkins, mas com faturamento mínimo de €750.000 + só funcionários efetivos), Estado de Rheinland-Pfalz DIP 2027 (€1,5 mi), monitoramento de mídia com IA da DB (€12,9 mi, IA aplicada).</li>\n      <li><span class=\"chip warn\">Mercado</span> <strong>Nicho de TI esfria, mercado cresce</strong>: a freelance.de (03/07/2026) reporta volume de projetos no Q2 de <strong>+9,6% em relação ao ano anterior</strong> — mas a fatia de TI/software caiu de <strong>33,4% para 27,9%</strong> (Q1→Q2), cerca de −21% dentro da categoria.</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Referências externas de 2026</strong>: a freelancermap aponta a mediana de TI no DACH em <strong>95 €/h</strong> (software/web 90 €/h); o barômetro de tarifas da Malt mostra Java de 526 €/dia (3–7 anos) a 720 €/dia (15+ anos). A faixa sênior de Java permanece em 90–120 €/h.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Mix de stack de hoje</strong>: Java 43×, Spring Boot 32×, Angular 27×, Kubernetes 16×, AI-Integration 16×, AWS 13×, Kafka 13×, Python 10×.</li>\n      <li><span class=\"chip warn\">Atenção</span> <strong>Manchetes de demissões no setor automotivo/industrial</strong> (VW, Porsche, Bosch) — não no mercado freelance de TI, e os números se contradizem entre as fontes; nenhum v       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute beginnt für den SC Freiburg das Trainingslager im Montafon — und der Kader, der dort aufläuft, ist ein anderer als der, der im Mai die Saison beendete. Rekordeinnahme durch den Manzambi-Verkauf, neuer Stammtorwart, ein Rückkehrer im Mittelfeld. Beim DFB dreht sich derweil alles um die Nagelsmann-Nachfolge: Jürgen Klopp soll sich grundsätzlich geeinigt haben, unterschrieben ist aber nichts. Die Bundesliga liegt in tiefer Sommerpause, Spanien ist seit Sonntag Weltmeister, und in Brasilien rollt der Ball nach der WM-Zwangspause heute Abend wieder — Coritiba gegen Spitzenreiter Palmeiras.</p>\n    <ul>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Trainingslager ab heute</strong>: Schruns/Montafon, 22.–31.07., mit Tests gegen Derby County (Fr 24.07.) und Greuther Fürth (Fr 31.07.).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi-Rekordverkauf</strong>: zu Aston Villa, Ablöse laut Medienberichten rund 60–70 Mio. € — höchste Einnahme der Vereinsgeschichte. Klub nennt keine Zahl.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Neuer Kader</strong>: Torwart Mio Backhaus (Bremen), Rihito Yamamoto (St. Truiden) und Rückkehrer Yannick Engelhardt (Como) — Summen laut Berichten.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp vor der Unterschrift?</strong>: grundsätzliche Einigung laut Tagesspiegel und Sky, angeblich Freitag fix — noch nicht offiziell. Nagelsmann-Vertrag am 03.07. aufgelöst.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien Weltmeister</strong>: 1:0 n. V. gegen Argentinien, Ferran Torres in der 106. Zweiter Titel nach 2010, Finale So 19.07. im MetLife Stadium.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland früh raus</strong>: 3:4 i. E. gegen Paraguay im Sechzehntelfinale (Mo 29.06.) — laut Al Jazeera Deutschlands erste WM-Niederlage im Elfmeterschießen überhaupt.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Sommerpause</strong>: Meister 2025/26 ist Bayern (89 Pkt), Freiburg wurde Siebter. Neue Saison ab Fr 28.08. (Bayern – Stuttgart).</li>\n      <li><span class=\"chip\">Pokal</span> <strong>DFB-Pokal 1. Runde</strong>: Fenster 21.–24.08., Auslosung war bereits am 06.06. in Dortmund.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A zurück</strong>: heute Coritiba – Palmeiras (00:30 MESZ / 19:30 BRT), erstes Pflichtspiel beider nach der WM-Pause. Palmeiras führt mit 41 Punkten.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Heute beginnt für den SC Freiburg das Trainingslager im Montafon — und der Kader, der dort aufläuft, ist ein anderer als der, der im Mai die Saison beendete. Rekordeinnahme durch den Manzambi-Verkauf, neuer Stammtorwart, ein Rückkehrer im Mittelfeld. Beim DFB dreht sich derweil alles um die Nagelsmann-Nachfolge: Jürgen Klopp soll sich grundsätzlich geeinigt haben, unterschrieben ist aber nichts. Die Bundesliga liegt in tiefer Sommerpause, Spanien ist seit Sonntag Weltmeister, und in Brasilien rollt der Ball nach der WM-Zwangspause heute Abend wieder — Coritiba gegen Spitzenreiter Palmeiras.</p>\n    <ul>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Trainingslager ab heute</strong>: Schruns/Montafon, 22.–31.07., mit Tests gegen Derby County (Fr 24.07.) und Greuther Fürth (Fr 31.07.).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi-Rekordverkauf</strong>: zu Aston Villa, Ablöse laut Medienberichten rund 60–70 Mio. € — höchste Einnahme der Vereinsgeschichte. Klub nennt keine Zahl.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Neuer Kader</strong>: Torwart Mio Backhaus (Bremen), Rihito Yamamoto (St. Truiden) und Rückkehrer Yannick Engelhardt (Como) — Summen laut Berichten.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp vor der Unterschrift?</strong>: grundsätzliche Einigung laut Tagesspiegel und Sky, angeblich Freitag fix — noch nicht offiziell. Nagelsmann-Vertrag am 03.07. aufgelöst.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien Weltmeister</strong>: 1:0 n. V. gegen Argentinien, Ferran Torres in der 106. Zweiter Titel nach 2010, Finale So 19.07. im MetLife Stadium.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland früh raus</strong>: 3:4 i. E. gegen Paraguay im Sechzehntelfinale (Mo 29.06.) — laut Al Jazeera Deutschlands erste WM-Niederlage im Elfmeterschießen überhaupt.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Sommerpause</strong>: Meister 2025/26 ist Bayern (89 Pkt), Freiburg wurde Siebter. Neue Saison ab Fr 28.08. (Bayern – Stuttgart).</li>\n      <li><span class=\"chip\">Pokal</span> <strong>DFB-Pokal 1. Runde</strong>: Fenster 21.–24.08., Auslosung war bereits am 06.06. in Dortmund.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A zurück</strong>: heute Coritiba – Palmeiras (00:30 MESZ / 19:30 BRT), erstes Pflichtspiel beider nach der WM-Pause. Palmeiras führt mit 41 Punkten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today SC Freiburg's training camp in the Montafon begins — and the squad taking the field there looks different from the one that finished the season in May. A record fee from the Manzambi sale, a new starting goalkeeper, a returnee in midfield. At the DFB, meanwhile, everything revolves around the Nagelsmann succession: Jürgen Klopp is said to have reached a basic agreement, but nothing is signed yet. The Bundesliga is deep in its summer break, Spain has been world champion since Sunday, and in Brazil the ball starts rolling again tonight after the World Cup-forced pause — Coritiba against league leaders Palmeiras.</p>\n    <ul>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Training camp starts today</strong>: Schruns/Montafon, Jul 22–31, with friendlies against Derby County (Fri, Jul 24) and Greuther Fürth (Fri, Jul 31).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi record sale</strong>: to Aston Villa, fee reportedly around €60–70m per media reports — the biggest sale in club history. The club has not confirmed a figure.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>New squad</strong>: goalkeeper Mio Backhaus (Bremen), Rihito Yamamoto (St. Truiden), and returnee Yannick Engelhardt (Como) — fees per reports.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp about to sign?</strong>: basic agreement reached per Tagesspiegel and Sky, reportedly set to be finalized Friday — not yet official. Nagelsmann's contract was terminated on Jul 3.</li>\n      <li><span class=\"chip good\">World Cup</span> <strong>Spain are world champions</strong>: 1-0 after extra time against Argentina, Ferran Torres in the 106th minute. Second title since 2010, final Sun, Jul 19 at MetLife Stadium.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Germany out early</strong>: 3-4 on penalties against Paraguay in the round of 32 (Mon, Jun 29) — per Al Jazeera, Germany's first-ever World Cup penalty-shootout loss.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Summer break</strong>: 2025/26 champions are Bayern (89 pts), Freiburg finished seventh. New season starts Fri, Aug 28 (Bayern – Stuttgart).</li>\n      <li><span class=\"chip\">Cup</span> <strong>DFB Cup 1st round</strong>: window Aug 21–24, the draw already took place on Jun 6 in Dortmund.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A returns</strong>: today Coritiba – Palmeiras (00:30 CEST / 19:30 BRT), first competitive match for both since the World Cup break. Palmeiras lead with 41 points.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje começa a pré-temporada do SC Freiburg no Montafon — e o elenco que vai a campo por lá é diferente daquele que terminou a temporada, em maio. Receita recorde com a venda de Manzambi, novo goleiro titular, um retorno no meio-campo. No DFB, por sua vez, tudo gira em torno da sucessão de Nagelsmann: Jürgen Klopp teria chegado a um acordo em princípio, mas nada foi assinado ainda. A Bundesliga está em plena pausa de verão, a Espanha é campeã do mundo desde domingo, e no Brasil a bola volta a rolar hoje à noite depois da pausa forçada pela Copa — Coritiba contra o líder Palmeiras.</p>\n    <ul>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Pré-temporada a partir de hoje</strong>: Schruns/Montafon, 22 a 31/07, com amistosos contra o Derby County (sex. 24/07) e o Greuther Fürth (sex. 31/07).</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Venda recorde de Manzambi</strong>: para o Aston Villa, valor da transferência segundo a imprensa entre € 60 e € 70 milhões — maior receita da história do clube. O clube não confirma o valor.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Novo elenco</strong>: o goleiro Mio Backhaus (Bremen), Rihito Yamamoto (St. Truiden) e o retorno de Yannick Engelhardt (Como) — valores segundo a imprensa.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp perto de assinar?</strong>: acordo em princípio segundo Tagesspiegel e Sky, supostamente fechado na sexta-feira — ainda não oficial. Contrato de Nagelsmann rescindido em 03/07.</li>\n      <li><span class=\"chip good\">Copa</span> <strong>Espanha é campeã do mundo</strong>: 1 a 0 na prorrogação contra a Argentina, gol de Ferran Torres aos 106. Segundo título depois de 2010, final dom. 19/07 no MetLife Stadium.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Alemanha cai cedo</strong>: 3 a 4 nos pênaltis contra o Paraguai nos dezesseis avos de final (seg. 29/06) — segundo a Al Jazeera, a primeira derrota da Alemanha em disputa de pênaltis na história das Copas do Mundo.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Pausa de verão</strong>: campeão de 2025/26 é o Bayern (89 pts), Freiburg terminou em sétimo. Nova temporada a partir de sex. 28/08 (Bayern – Stuttgart).</li>\n      <li><span class=\"chip\">Copa</span> <strong>DFB-Pokal 1ª rodada</strong>: janela de 21 a 24/08, o sorteio já aconteceu em 06/06, em Dortmund.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A está de volta</strong>: hoje, Coritiba – Palmeiras (00:30 horário de Berlim / 19:30 BRT), primeiro jogo oficial de ambos depois da pausa da Copa. Palmeiras lidera com 41 pontos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy comienza para el SC Freiburg el campamento de entrenamiento en el Montafon — y la plantilla que sale al campo ahí es distinta de la que terminó la temporada en mayo. Ingreso récord por la venta de Manzambi, nuevo portero titular, un retorno al mediocampo. En el DFB, mientras tanto, todo gira en torno a la sucesión de Nagelsmann: Jürgen Klopp habría llegado a un acuerdo en principio, pero todavía no hay nada firmado. La Bundesliga está en pleno receso de verano, España es campeona del mundo desde el domingo, y en Brasil el balón vuelve a rodar esta noche tras la pausa obligada por el Mundial — Coritiba ante el líder Palmeiras.</p>\n    <ul>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Campamento de entrenamiento desde hoy</strong>: Schruns/Montafon, 22–31/07, con amistosos ante el Derby County (vie 24/07) y el Greuther Fürth (vie 31/07).</li>\n      <li><span class=\"chip\">Fichajes</span> <strong>Venta récord de Manzambi</strong>: al Aston Villa, traspaso según medios entre 60 y 70 millones de € — el mayor ingreso en la historia del club. El club no confirma la cifra.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Nueva plantilla</strong>: el portero Mio Backhaus (Bremen), Rihito Yamamoto (St. Truiden) y el retorno de Yannick Engelhardt (Como) — cifras según medios.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>¿Klopp a punto de firmar?</strong>: acuerdo en principio según Tagesspiegel y Sky, supuestamente cerrado el viernes — todavía no es oficial. Contrato de Nagelsmann rescindido el 03/07.</li>\n      <li><span class=\"chip good\">Mundial</span> <strong>España es campeona del mundo</strong>: 1-0 en la prórroga ante Argentina, Ferran Torres al minuto 106. Segundo título tras 2010, final Dom 19/07 en el MetLife Stadium.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Alemania cae temprano</strong>: 3-4 en penales ante Paraguay en dieciseisavos de final (Lun 29/06) — según Al Jazeera, la primera derrota de Alemania en una tanda de penales en la historia de los Mundiales.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Receso de verano</strong>: campeón de 2025/26 es el Bayern (89 pts), Freiburg terminó séptimo. Nueva temporada desde el vie 28/08 (Bayern – Stuttgart).</li>\n      <li><span class=\"chip\">Copa</span> <strong>Copa de Alemania (DFB-Pokal), 1.ª ronda</strong>: ventana 21–24/08, el sorteo ya se celebró el 06/06 en Dortmund.</li>\n      <li><span class=\"chip\">BRA</span> <strong>La Serie A está de vuelta</strong>: hoy, Coritiba – Palmeiras (00:30 CEST / 19:30 BRT), primer partido oficial de ambos tras la pausa del Mundial. Palmeiras lidera con 41 puntos.</li>\n    </ul></div>"

6:00 MESZ. Alle Zeiten per Zeitzonen-Datenbank umgerechnet.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.). Heute korrigiert: noch <strong>vier</strong> Läufe, nicht fünf; nächster in Austin, 04.–06.09. (heute frisch bestätigt).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP-Restart Silverstone 07.–09.08.</strong> (heute doppelt belegt), <strong>Formel-E-Finale London 15.–16.08.</strong> (weiter nur Sekundärquelle — Details unten).</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nach Ungarn: Sommerpause.</strong> Nächster F1-Lauf ist der GP der Niederlande, Runde 12, 21.–23.08.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Wednesday, July 22 — just two days until the first session at the Hungaroring. Since the <strong>Belgian Grand Prix</strong> (Sunday, 19.07.), not a single lap has been driven — no F1, no WEC, no MotoGP, no Formula E. All the standings below are therefore <strong>unchanged since Spa</strong> — refetched today and checked against a second source, but with no new number. This weekend brings the <strong>Hungarian Grand Prix</strong> (Fri–Sun 24.–26.07.), the <strong>last race before the summer break</strong>. Antonelli leads by <strong>45 points</strong>; for Max Verstappen, meanwhile, a contract question is mathematically settled before a single lap has been driven. Two things have moved since yesterday — <strong>in the calendar</strong>, not on track: the World Endurance Championship now confirms <strong>four</strong> remaining rounds (not five), and today the MotoGP Silverstone date is double-sourced. Race start Sunday <strong>10:00 BRT</strong> (15:00 CEST).</p>\n    <ul>\n      <li><span class=\"chip hot\">Preview</span> <strong>Hungarian GP, Hungaroring, Fri–Sun 24.–26.07.</strong> Classic format, no sprint, race distance 70 laps, last round before the break. Session times in three zones below.</li>\n      <li><span class=\"chip\">Drivers' standings</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unchanged since Spa, re-checked today. Leclerc fourth (126).</li>\n      <li><span class=\"chip\">Constructors</span> <strong>Mercedes 358 ahead of Ferrari 285</strong> (+73 points), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Exit-clause threshold mathematically dead.</strong> P7 with 91 points, one race until the break, 116 maximum possible — second place stands at 159. Hungary won't change that anymore.</li>\n      <li><span class=\"chip\">Schedule</span> <strong>Race Sun 26.07. 10:00 BRT / 15:00 CEST</strong>, qualifying Sat 25.07. 11:00 BRT / 16:00 CEST. All times converted via time zone database.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — frozen since São Paulo (12.07.). Corrected today: four rounds remain, not five; next up is Austin, 04.–06.09. (freshly confirmed today).</li>\n      <li><span class=\"chip\">Other series</span> <strong>MotoGP restart Silverstone 07.–09.08.</strong> (double-sourced today), <strong>Formula E finale London 15.–16.08.</strong> (still only a secondary source — details below).</li>\n      <li><span class=\"chip\">Calendar</span> <strong>After Hungary: summer break.</strong> The next F1 round is the Dutch GP, round 12, 21.–23.08.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é quarta-feira, 22 de julho — faltam apenas dois dias para a primeira sessão no Hungaroring. Desde o <strong>Grande Prêmio da Bélgica</strong> (domingo, 19/07), nenhuma volta foi disputada — nem na Fórmula 1, nem na WEC, na MotoGP ou na Fórmula E. Todas as classificações abaixo estão, portanto, <strong>inalteradas desde Spa</strong> — atualizadas hoje e conferidas em uma segunda fonte, mas sem nenhum número novo. No fim de semana chega o <strong>Grande Prêmio da Hungria</strong> (sex–dom 24–26/07), a <strong>última corrida antes da pausa de verão</strong>. Antonelli lidera com <strong>45 pontos</strong> de vantagem; para Max Verstappen, por sua vez, uma questão contratual já está matematicamente resolvida antes mesmo da primeira volta. Duas coisas se mexeram desde ontem — <strong>no calendário</strong>, não na pista: o Mundial de Endurance agora confirma <strong>quatro</strong> etapas restantes (não cinco), e a data da MotoGP em Silverstone hoje tem duas fontes. Largada da corrida no domingo às <strong>10h00 BRT</strong> (15h00 CEST).</p>\n    <ul>\n      <li><span class=\"chip hot\">Prévia</span> <strong>GP da Hungria, Hungaroring, sex–dom 24–26/07.</strong> Formato clássico sem sprint, corrida de 70 voltas, última etapa antes da pausa. Horários das sessões em três fusos abaixo.</li>\n      <li><span class=\"chip\">Classificação de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — inalterado desde Spa, reconferido hoje. Leclerc em quarto (126).</li>\n      <li><span class=\"chip\">Construtores</span> <strong>Mercedes 358 à frente de Ferrari 285</strong> (+73 pontos), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Limite da cláusula de saída matematicamente morto.</strong> P7 com 91 pontos, uma corrida até a pausa, máximo de 116 possível — o segundo lugar está em 159. A Hungria não muda mais nada nisso.</li>\n      <li><span class=\"chip\">Horários</span> <strong>Corrida dom 26/07 10h00 BRT / 15h00 CEST</strong>, classificação sáb 25/07 11h00 BRT / 16h00 CEST. Todos os horários convertidos por banco de dados de fusos horários.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07). Corrigido hoje: restam quatro etapas, não cinco; a próxima é Austin, 04–06/09 (confirmada hoje).</li>\n      <li><span class=\"chip\">Outras séries</span> <strong>Retorno da MotoGP em Silverstone, 07–09/08</strong> (hoje com duas fontes), <strong>final da Fórmula E em Londres, 15–16/08</strong> (ainda só uma fonte secundária — detalhes abaixo).</li>\n      <li><span class=\"chip\">Calendário</span> <strong>Depois da Hungria: pausa de verão.</strong> A próxima etapa da F1 é o GP dos Países Baixos, rodada 12, 21–23/08.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es miércoles 22 de julio — quedan apenas dos días para la primera sesión en el Hungaroring. Desde el <strong>Gran Premio de Bélgica</strong> (domingo 19/07), no se ha disputado ninguna vuelta — ni en la Fórmula 1, ni en la WEC, la MotoGP o la Fórmula E. Todas las clasificaciones de abajo están, por lo tanto, <strong>sin cambios desde Spa</strong> — actualizadas hoy y verificadas con una segunda fuente, pero sin ningún número nuevo. El fin de semana llega el <strong>Gran Premio de Hungría</strong> (vie–dom 24–26/07), la <strong>última carrera antes del receso de verano</strong>. Antonelli lidera con <strong>45 puntos</strong> de ventaja; para Max Verstappen, en cambio, una cuestión contractual ya está resuelta matemáticamente antes de la primera vuelta. Dos cosas se movieron desde ayer — <strong>en el calendario</strong>, no en la pista: el Mundial de Resistencia ahora confirma <strong>cuatro</strong> carreras restantes (no cinco), y hoy la fecha de la MotoGP en Silverstone tiene dos fuentes. Arranque de la carrera el domingo a las <strong>10:00 BRT</strong> (15:00 CEST).</p>\n    <ul>\n      <li><span class=\"chip hot\">Vista previa</span> <strong>GP de Hungría, Hungaroring, vie–dom 24–26/07.</strong> Formato clásico sin sprint, carrera de 70 vueltas, última cita antes de la pausa. Horarios de sesión en tres zonas más abajo.</li>\n      <li><span class=\"chip\">Clasificación de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — sin cambios desde Spa, reverificado hoy. Leclerc, cuarto (126).</li>\n      <li><span class=\"chip\">Constructores</span> <strong>Mercedes 358 por delante de Ferrari 285</strong> (+73 puntos), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Umbral de la cláusula de salida, matemáticamente muerto.</strong> P7 con 91 puntos, una carrera antes de la pausa, máximo 116 posibles — el segundo puesto está en 159. Hungría ya no cambia nada de esto.</li>\n      <li><span class=\"chip\">Horarios</span> <strong>Carrera dom 26/07 10:00 BRT / 15:00 CEST</strong>, clasificación sáb 25/07 11:00 BRT / 16:00 CEST. Todos los horarios convertidos mediante base de datos de husos horarios.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07). Corregido hoy: quedan cuatro carreras, no cinco; la siguiente es Austin, 04–06/09 (confirmada hoy).</li>\n      <li><span class=\"chip\">Otras series</span> <strong>Regreso de la MotoGP en Silverstone, 07–09/08</strong> (hoy con dos fuentes), <strong>final de la Fórmula E en Londres, 15–16/08</strong> (todavía solo una fuente secundaria — detalles más abajo).</li>\n      <li><span class=\"chip\">Calendario</span> <strong>Después de Hungría: receso de verano.</strong> La próxima carrera de F1 es el GP de los Países Bajos, ronda 12, 21–23/08.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Mittwoch, der 22. Juli — die letzte Ferienwoche läuft, und der Himmel spielt nicht mit. INMET führt für große Teile Paranás eine gelbe Gewitter-Warnung, und lokal sagen Climatempo und SIMEPAR für heute Nacht kräftigen Regen. Ein Indoor-Tag also. Zum Glück gibt es genug drinnen zu tun, allen voran die kostenlose Kinderbücherei in Londrina, die noch bis Freitag jeden Vormittag ein Ferienprogramm fährt. Am Montag ist der Ferien-Zauber vorbei — dann klingelt wieder die Schulglocke.</p>\n    <ul>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Gelbe Gewitter-Warnung heute</strong>: INMET meldet für große Teile Paranás eine Gewitter-Warnung mit möglichem Hagel; für die Region Londrina nennt o tempo bis zu ~50 mm/Tag und Böen bis ~60 km/h; lokal konzentriert sich der Starkregen auf die Nacht.</li>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Kostenlos, jeden Vormittag 10 Uhr</strong>: Kinderbücherei Londrina, Ferienprogramm bis Fr 24.07. — heute Tanz, Do Briefeschreiben, Fr Papierfalten. Drinnen — perfekt für die Regentage.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Regensicher</strong>: Parque Fundo do Mar im Catuaí Londrina — Indoor-Spielpark, läuft bis Ende Juli.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: letzter Ferientag Fr 24.07., Unterricht der rede estadual ab Mo 27.07.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Day-Trip-Ring</strong>: Aveshow Bandeirantes (Do–Sa) und Paraná em Ação in Cornélio Procópio (bis Do, kostenlose Bürgerdienste).</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue-Informe nº 23 erschienen (21.07.)</strong>: die Fallzahlen dahinter waren heute nicht abrufbar (Quelle 403) — nach jedem Starkregen stehendes Wasser ausleeren.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>Winter = Atemwegs-Saison</strong>: letzter verifizierter Stand InfoGripe SE 26/2026 mit RSV erhöht — mit dem einen Monat alten Baby vorsichtig sein.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range</strong>: WM-Erlebnisausstellung „Brasil em Todas\" im MIS Experience noch bis 02.08.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern-Ring diese Woche still</strong>: für Ribeirão Claro und Jacarezinho ließ sich kein datiertes Familien-Event bestätigen — die Seiten wurden geprüft.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Mittwoch, der 22. Juli — die letzte Ferienwoche läuft, und der Himmel spielt nicht mit. INMET führt für große Teile Paranás eine gelbe Gewitter-Warnung, und lokal sagen Climatempo und SIMEPAR für heute Nacht kräftigen Regen. Ein Indoor-Tag also. Zum Glück gibt es genug drinnen zu tun, allen voran die kostenlose Kinderbücherei in Londrina, die noch bis Freitag jeden Vormittag ein Ferienprogramm fährt. Am Montag ist der Ferien-Zauber vorbei — dann klingelt wieder die Schulglocke.</p>\n    <ul>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Gelbe Gewitter-Warnung heute</strong>: INMET meldet für große Teile Paranás eine Gewitter-Warnung mit möglichem Hagel; für die Region Londrina nennt o tempo bis zu ~50 mm/Tag und Böen bis ~60 km/h; lokal konzentriert sich der Starkregen auf die Nacht.</li>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Kostenlos, jeden Vormittag 10 Uhr</strong>: Kinderbücherei Londrina, Ferienprogramm bis Fr 24.07. — heute Tanz, Do Briefeschreiben, Fr Papierfalten. Drinnen — perfekt für die Regentage.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Regensicher</strong>: Parque Fundo do Mar im Catuaí Londrina — Indoor-Spielpark, läuft bis Ende Juli.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: letzter Ferientag Fr 24.07., Unterricht der rede estadual ab Mo 27.07.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Day-Trip-Ring</strong>: Aveshow Bandeirantes (Do–Sa) und Paraná em Ação in Cornélio Procópio (bis Do, kostenlose Bürgerdienste).</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue-Informe nº 23 erschienen (21.07.)</strong>: die Fallzahlen dahinter waren heute nicht abrufbar (Quelle 403) — nach jedem Starkregen stehendes Wasser ausleeren.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>Winter = Atemwegs-Saison</strong>: letzter verifizierter Stand InfoGripe SE 26/2026 mit RSV erhöht — mit dem einen Monat alten Baby vorsichtig sein.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range</strong>: WM-Erlebnisausstellung „Brasil em Todas\" im MIS Experience noch bis 02.08.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern-Ring diese Woche still</strong>: für Ribeirão Claro und Jacarezinho ließ sich kein datiertes Familien-Event bestätigen — die Seiten wurden geprüft.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Wednesday, July 22 — the last week of break is underway, and the sky isn't cooperating. INMET has issued a yellow thunderstorm advisory for large parts of Paraná, and locally, Climatempo and SIMEPAR both call for heavy rain tonight. An indoor day, then. Luckily there's plenty to do inside, starting with the free children's library in Londrina, which is running a vacation program every morning through Friday. On Monday, the vacation magic ends — then the school bell rings again.</p>\n    <ul>\n      <li><span class=\"chip hot\">WEATHER</span> <strong>Yellow thunderstorm advisory today</strong>: INMET reports a thunderstorm advisory for large parts of Paraná with possible hail; for the Londrina region, o tempo cites up to ~50 mm/day and gusts up to ~60 km/h; locally, the heavy rain is concentrated overnight.</li>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Free, every morning at 10 am</strong>: children's library Londrina, vacation program through Fri 07/24 — today dance, Thu letter writing, Fri paper folding. Indoors — perfect for the rainy days.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Rain-proof</strong>: Parque Fundo do Mar at Catuaí Londrina — indoor play park, running through the end of July.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Recesso ends</strong>: last day of break is Fri 07/24, classes in the rede estadual resume Mon 07/27.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Day-trip ring</strong>: Aveshow Bandeirantes (Thu–Sat) and Paraná em Ação in Cornélio Procópio (through Thu, free civic services).</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue bulletin no. 23 released (07/21)</strong>: the case numbers behind it weren't retrievable today (source 403) — empty standing water after every heavy rain.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>Winter = respiratory season</strong>: last verified InfoGripe status, epi week 26/2026, shows RSV elevated — be careful with the one-month-old baby.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP range</strong>: World Cup experience exhibit \"Brasil em Todas\" at MIS Experience, through 08/02.</li>\n      <li><span class=\"chip\">GAP</span> <strong>Core ring quiet this week</strong>: no dated family event could be confirmed for Ribeirão Claro and Jacarezinho — the sites were checked.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É quarta-feira, 22 de julho — a última semana de férias está em curso, e o céu não está colaborando. O INMET emitiu um aviso amarelo de tempestade para grande parte do Paraná, e localmente o Climatempo e o SIMEPAR preveem chuva forte para esta noite. Um dia para ficar em casa, portanto. Felizmente há bastante o que fazer em ambientes fechados, sobretudo a biblioteca infantil gratuita de Londrina, que segue com um programa de férias toda manhã até sexta-feira. Na segunda-feira, a magia das férias acaba — e o sinal da escola volta a tocar.</p>\n    <ul>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>Aviso amarelo de tempestade hoje</strong>: o INMET registra aviso de tempestade para grande parte do Paraná, com possibilidade de granizo; para a região de Londrina, o tempo indica até ~50 mm/dia e rajadas de até ~60 km/h; localmente, a chuva forte se concentra durante a noite.</li>\n      <li><span class=\"chip hot\">EVENTO</span> <strong>Grátis, toda manhã às 10h</strong>: biblioteca infantil de Londrina, programa de férias até sex 24/07 — hoje dança, qui carta, sex dobradura de papel. Em ambiente fechado — perfeito para os dias de chuva.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>À prova de chuva</strong>: Parque Fundo do Mar no Catuaí Londrina — parque infantil coberto, funciona até o fim de julho.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Recesso termina</strong>: último dia de férias sex 24/07, aulas da rede estadual retomam seg 27/07.</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>Anel de passeio de um dia</strong>: Aveshow Bandeirantes (qui–sáb) e Paraná em Ação em Cornélio Procópio (até qui, serviços gratuitos ao cidadão).</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Informe de dengue nº 23 divulgado (21/07)</strong>: os números de casos por trás dele não puderam ser acessados hoje (fonte com erro 403) — esvazie a água parada depois de toda chuva forte.</li>\n      <li><span class=\"chip hot\">BEBÊ</span> <strong>Inverno = temporada de vírus respiratórios</strong>: último dado verificado do InfoGripe, SE 26/2026, mostra VSR elevado — cuidado com o bebê de um mês.</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>Raio de SP</strong>: exposição imersiva da Copa \"Brasil em Todas\" no MIS Experience até 02/08.</li>\n      <li><span class=\"chip\">LACUNA</span> <strong>Anel central sem novidades esta semana</strong>: não foi possível confirmar nenhum evento familiar com data para Ribeirão Claro e Jacarezinho — as páginas foram checadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es miércoles 22 de julio — la última semana de vacaciones está en marcha, y el cielo no coopera. El INMET emitió un aviso amarillo de tormenta para gran parte de Paraná, y localmente Climatempo y SIMEPAR pronostican lluvia fuerte para esta noche. Un día para quedarse en casa, entonces. Por suerte hay bastante que hacer bajo techo, sobre todo la biblioteca infantil gratuita en Londrina, que sigue con un programa vacacional cada mañana hasta el viernes. El lunes termina la magia de las vacaciones — y vuelve a sonar la campana escolar.</p>\n    <ul>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>Aviso amarillo de tormenta hoy</strong>: el INMET reporta un aviso de tormenta para gran parte de Paraná con posible granizo; para la región de Londrina, o tempo indica hasta ~50 mm al día y ráfagas de hasta ~60 km/h; localmente, la lluvia fuerte se concentra en la noche.</li>\n      <li><span class=\"chip hot\">EVENTO</span> <strong>Gratis, todas las mañanas a las 10 h</strong>: biblioteca infantil de Londrina, programa vacacional hasta el vie 24/07 — hoy danza, jue escritura de cartas, vie papiroflexia. En interiores — perfecto para los días de lluvia.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>A prueba de lluvia</strong>: Parque Fundo do Mar en el Catuaí Londrina — parque infantil techado, abierto hasta fines de julio.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Termina el receso</strong>: último día de vacaciones vie 24/07, clases de la rede estadual retoman lun 27/07.</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Anillo de excursiones de un día</strong>: Aveshow Bandeirantes (jue–sáb) y Paraná em Ação en Cornélio Procópio (hasta el jue, servicios gratuitos al ciudadano).</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Informe de dengue nº 23 publicado (21/07)</strong>: las cifras de casos detrás de él no se pudieron consultar hoy (fuente con error 403) — vacía el agua estancada después de cada lluvia fuerte.</li>\n      <li><span class=\"chip hot\">BEBÉ</span> <strong>Invierno = temporada de virus respiratorios</strong>: el último dato verificado de InfoGripe, SE 26/2026, muestra VSR elevado — cuidado con el bebé de un mes.</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Radio de SP</strong>: exposición inmersiva del Mundial «Brasil em Todas» en el MIS Experience hasta el 02/08.</li>\n      <li><span class=\"chip\">VACÍO</span> <strong>Anillo central sin novedades esta semana</strong>: no se pudo confirmar ningún evento familiar con fecha para Ribeirão Claro y Jacarezinho — se revisaron las páginas.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Mittwoch, der 22. Juli — Wochenthema <em>Familie &amp; Alltag</em>, heute mit einem konkreten Anlass: In Paraná neigt sich der Juli-Recesso dem Ende zu. Die staatlichen Schulen (<em>rede estadual</em>) hatten frei vom <strong>13. bis 24./26. Juli</strong> und starten den zweiten Halbjahres-Block am <strong>Montag, 27. Juli 2026</strong> (<a href=\"https://diariodosudoeste.com.br/recesso-escolar-comeca-dia-13-na-rede-estadual/\">diariodosudoeste.com.br</a>, <a href=\"https://www.bemparana.com.br/noticias/parana/ferias-julho-rede-estadual/\">bemparana.com.br</a>). Heute sind es also fünf Tage bis zum Schulstart — genau die Zeit, in der man den <em>Schulranzen</em> packt, das <em>Schulmaterial beschriftet</em>, die <em>Schlafenszeit</em> wieder vorzieht und die Kinder (halb <em>aufgeregt</em>, halb <em>übermüdet</em>) auf den ersten Schultag <em>vorbereitet</em>. 39 neue Einträge, 12 Verben mit voller Konjugation — inklusive der ES-Stammwechsel <em>sonar</em> (o→ue) und <em>despertar</em> (e→ie), der c→qu-Falle <em>clasificar/classificar</em> und der 1.-Person-Falle <em>conozco/conheço</em> — plus 3 Auffrischungen (<em>die Schultasche</em>, <em>die Hausaufgaben</em>, <em>der Lehrer</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>die Note ≠ EN note</strong> — DE <em>Note</em> = Schulnote/Zensur, auf Englisch <em>grade</em>/<em>mark</em>. Das englische <em>note</em> ist die Notiz, der Zettel oder der Geldschein. Kurios: PT <em>a nota</em> heißt <em>beides</em> — die Schulnote <em>und</em> den Geldschein.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a apostila</strong> — das typisch brasilianische, schlanke Lehrheft der Privat-Systeme (COC, Positivo, Objetivo), abzugrenzen vom <em>livro didático</em>, dem klassischen ISBN-Lehrbuch (<a href=\"https://www.r5ensino.com.br/livro-e-apostila/\">r5ensino.com.br</a>). Im Deutschen gibt es kein exaktes Wort dafür.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES klingeln = <em>sonar</em> (o→ue)</strong> — <em>el timbre suena</em> („die Glocke klingelt\"), aber <em>nosotros sonamos</em> behält den nackten Stamm. Diphthong nur unter Betonung.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES wecken = <em>despertar</em> (e→ie)</strong> — <em>yo despierto, tú despiertas</em>, aber <em>nosotros despertamos</em>. PT <em>acordar</em> ist dagegen brav regelmäßig.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>sortieren → ES <em>clasificar</em> / PT <em>classificar</em></strong> — 1. Person Prät. <em>clasifiqué</em> / <em>classifiquei</em> (c→qu vor -e), nie <em>*clasificé</em>. Gleiches Muster bei PT <em>toquei</em> (tocar = klingeln).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>kennenlernen → yo <em>conozco</em> / eu <em>conheço</em></strong> — die 1. Person Singular Präsens ist unregelmäßig: ES c→zc (<em>conozco</em>), PT c→ç (<em>conheço</em>) — nie <em>*conoco</em> / <em>*conheco</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Schulranzen · die Federmappe · das Lineal</strong> — drei Genera in einem einzigen Mäppchen. Das grammatische Geschlecht muss man Wort für Wort mitlernen.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>der Schulranzen → a mochila</strong> — der steife deutsche Ranzen (Tornister) existiert in Brasilien nicht; hier tragen alle Kinder eine weiche <em>mochila</em> (Rucksack), es-MX ebenso <em>la mochila</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>die Brotdose</strong> — BR <em>a marmita</em> / <em>a lancheira</em>, es-MX <em>la lonchera</em> (vom englischen <em>lunch</em>). Und das Schulmaterial heißt in Mexiko <em>los útiles escolares</em>.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>mit dem falschen Fuß aufstehen</strong> = schlecht gelaunt in den Tag starten. PT <em>acordar com o pé esquerdo</em>, ES <em>levantarse con el pie izquierdo</em> — hier wandert der Fuß nach links.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>„Hast du alles eingepackt?\"</strong> — der Morgen-Satz vor dem Losgehen: BR <em>„Você guardou tudo na mochila?\"</em>, es-MX <em>„¿Ya guardaste todo?\"</em></li>\n    </ul></div>",
