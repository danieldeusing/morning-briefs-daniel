<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  .loading {

  /* Color helpers per category */

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
          <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>

        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">

      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"

        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>

            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>

        </div>
      </div>
      <details class="dropdown theme-dropdown" id="theme-dropdown">

          <span class="dd-dot" aria-hidden="true"></span>
          <span class="theme-label">warm</span>

        </ul>

      <button class="status-btn anim-toggle" id="anim-toggle" type="button"

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Zoll <strong>ist da</strong>: seit heute Nacht <strong>01:01 Uhr</strong> in Ribeirão Claro (0:01 US-Ostküstenzeit) gelten die <strong>25 %</strong> auf brasilianische Waren. Und der Real? Firmt einfach weiter. Der jüngste ECB-Fix — jetzt der von <strong>Dienstag, 21.07.</strong> — steht bei <strong>EUR/BRL 5,7997</strong>, nochmal <strong>0,56 % unter</strong> Montag. Neu ist der <em>zweite</em> Motor: <strong>Brent springt auf 92,23 $</strong> (+1,35 %, höchster Stand seit Mitte Juni), weil die USA in der elften Nacht in Folge Iran angreifen — und teureres Öl ist Rückenwind für den Netto-Ölexporteur Brasilien. Für Daniel ist das die unangenehme Richtung: <strong>5.000 € bringen heute R$ 28.999</strong> — rund <strong>R$ 162 weniger als Montag</strong> und <strong>R$ 744 unter</strong> dem Monatshoch vom 03.07. Der Zoll war das Thema von Montag/Dienstag; hier zählt, was sich seither bewegt hat.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,7997</strong> (ECB-Referenzfix, Di 21.07., <strong>−0,56 %</strong> ggü. Mo) — der Mittwochs-Fix (~16:00 CET) stand bei Redaktionsschluss noch aus.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Kreuzkurs-Check:</strong> Der USD-Schenkel gegen eine echte Zweitquelle — Dollar-Schluss der brasilianischen Börse 21.07. <strong>R$ 5,073</strong> gegen ECB-basiert <strong>5,0794</strong> = <strong>+0,13 %</strong>, klar unter der 0,5-%-Schwelle. Konsistent.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 92,23 $</strong> (+1,35 %, 22.07.) — <em>höchster Stand seit Mitte Juni</em>. Treiber: elfte Nacht US-Schläge gegen Iran, Houthi drohen mit See-Blockade. Öl ist jetzt die zweite Stütze des Real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>25-%-Zoll seit heute 01:01 BRT in Kraft</strong> — planmäßig. Übergang für rollende Ware bis 29.07.; Kaffee, Rind, Orangensaft, Zivilluftfahrt u. a. ausgenommen. Am Vorabend (21.07.) schloss der Ibovespa praktisch unverändert — der Markt hatte den Zoll da schon verdaut.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY ~101,1</strong> (22.07., −0,05 % am Tag) — gut 0,2 % <em>fester</em> als an den beiden Vortagen (~100,9). Ein kleiner Dollar-Gegenwind — dass EUR/BRL trotzdem fiel, ist die Arbeit des Öls, nicht des Dollars.</li>\n      <li><span class=\"chip\">EU</span> <strong>EZB morgen, Do 23.07., 13:45 CET</strong> — „keine Änderung\" ist Konsens. Depo bei 2,25 %. Der <em>Ton</em> der Lagarde-PK (14:30 CET) bewegt den Euro-Schenkel, nicht den Real.</li>\n      <li><span class=\"chip\">USA</span> <strong>FOMC 28./29.07.</strong>, Fed hält seit 17.06. bei 3,50–3,75 %. Markt preist ~80 % Halten. Carry gegen die Selic (14,25 %) bleibt bei <strong>rund 10,6 pp</strong>.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiskal bleibt der wunde Punkt:</strong> Primärdefizit der Zentralregierung im Mai <strong>R$ 53,3 Mrd.</strong>; 12-Monats-Defizit <strong>R$ 142,3 Mrd. = 1,06 % des BIP</strong> — gegen das Regierungsziel eines Überschusses von 0,25 %.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Kein Stress-Signal:</strong> 5J-CDS <strong>123,08 bp</strong> (21.07., −1,19 % am Tag) — sogar leicht entspannter als vergangene Woche.</li>\n      <li><span class=\"chip\">Hinweis</span> Die Prognose-Wahrscheinlichkeiten unten sind <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The tariff <strong>is here</strong>: as of <strong>01:01</strong> last night in Ribeirão Claro (0:01 US Eastern Time), the <strong>25%</strong> tariff on Brazilian goods took effect. And the real? It just keeps firming up. The latest ECB fix — now <strong>Tuesday, Jul 21's</strong> — puts <strong>EUR/BRL at 5.7997</strong>, another <strong>0.56% below</strong> Monday. New today is the <em>second</em> engine: <strong>Brent jumps to $92.23</strong> (+1.35%, the highest level since mid-June), as the US strikes Iran for an eleventh consecutive night — and pricier oil is a tailwind for net oil exporter Brazil. For Daniel, that's the uncomfortable direction: <strong>€5,000 buys R$28,999</strong> today — about <strong>R$162 less than Monday</strong> and <strong>R$744 below</strong> the monthly high from Jul 3. The tariff was Monday/Tuesday's story; what matters here is what's moved since then.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.7997</strong> (ECB reference fix, Tue Jul 21, <strong>−0.56%</strong> vs. Mon) — Wednesday's fix (~16:00 CET) hadn't been published at press time.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Cross-rate check:</strong> The USD leg against a genuine second source — the Brazilian exchange's dollar close on Jul 21 was <strong>R$5.073</strong> versus the ECB-based <strong>5.0794</strong> = <strong>+0.13%</strong>, well below the 0.5% threshold. Consistent.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $92.23</strong> (+1.35%, Jul 22) — <em>highest level since mid-June</em>. Driver: eleventh night of US strikes on Iran, Houthis threaten a naval blockade. Oil is now the real's second pillar.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>25% tariff in effect since 01:01 BRT today</strong> — as scheduled. Transition for goods already in transit runs through Jul 29; coffee, beef, orange juice, civil aviation, and others are exempt. The night before (Jul 21), the Ibovespa closed essentially unchanged — the market had already digested the tariff.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY ~101.1</strong> (Jul 22, −0.05% on the day) — a good 0.2% <em>firmer</em> than the two prior days (~100.9). A small dollar headwind — that EUR/BRL fell anyway is oil's doing, not the dollar's.</li>\n      <li><span class=\"chip\">EU</span> <strong>ECB tomorrow, Thu Jul 23, 13:45 CET</strong> — \"no change\" is consensus. Deposit rate at 2.25%. The <em>tone</em> of Lagarde's press conference (14:30 CET) moves the euro leg, not the real.</li>\n      <li><span class=\"chip\">US</span> <strong>FOMC Jul 28-29</strong>, the Fed has held at 3.50–3.75% since Jun 17. Market prices ~80% odds of a hold. The carry against the Selic (14.25%) stays around <strong>10.6 pp</strong>.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal remains the sore spot:</strong> the central government's primary deficit in May was <strong>R$53.3 billion</strong>; the 12-month deficit totals <strong>R$142.3 billion = 1.06% of GDP</strong> — against the government's target of a 0.25% surplus.</li>\n      <li><span class=\"chip good\">BR</span> <strong>No stress signal:</strong> the 5-year CDS is at <strong>123.08 bp</strong> (Jul 21, −1.19% on the day) — even slightly calmer than last week.</li>\n      <li><span class=\"chip\">Heads up</span> The forecast probabilities below are <strong>my confidence levels</strong>, not market-implied figures.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A tarifa <strong>chegou</strong>: desde a <strong>01:01</strong> de hoje em Ribeirão Claro (0:01 no horário do leste dos EUA) vigoram os <strong>25%</strong> sobre produtos brasileiros. E o real? Simplesmente segue se firmando. O fixing mais recente do BCE — agora o de <strong>terça-feira, 21/07</strong> — está em <strong>EUR/BRL 5,7997</strong>, mais <strong>0,56% abaixo</strong> de segunda-feira. O novo fator é o <em>segundo</em> motor: <strong>o Brent salta para US$ 92,23</strong> (+1,35%, maior nível desde meados de junho), porque os EUA atacam o Irã pela décima primeira noite seguida — e petróleo mais caro é vento a favor para o Brasil, exportador líquido de petróleo. Para Daniel, essa é a direção desconfortável: <strong>5.000 € rendem hoje R$ 28.999</strong> — cerca de <strong>R$ 162 a menos que segunda-feira</strong> e <strong>R$ 744 abaixo</strong> da máxima do mês, registrada em 03/07. A tarifa foi o tema de segunda/terça; aqui o que importa é o que se moveu desde então.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,7997</strong> (fixing de referência do BCE, ter 21/07, <strong>−0,56%</strong> vs. seg) — o fixing de quarta-feira (~16h CET) ainda não havia sido divulgado no fechamento desta edição.</li>\n      <li><span class=\"chip good\">Câmbio</span> <strong>Checagem de câmbio cruzado:</strong> a perna em dólar contra uma fonte secundária de verdade — fechamento do dólar na bolsa brasileira em 21/07 <strong>R$ 5,073</strong> contra o valor baseado no BCE, <strong>5,0794</strong> = <strong>+0,13%</strong>, claramente abaixo do limiar de 0,5%. Consistente.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent US$ 92,23</strong> (+1,35%, 22/07) — <em>maior nível desde meados de junho</em>. Motivo: décima primeira noite de ataques dos EUA contra o Irã, houthis ameaçam bloqueio naval. O petróleo agora é o segundo pilar do real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tarifa de 25% em vigor desde as 01:01 (BRT) de hoje</strong> — conforme previsto. Transição para mercadorias já em trânsito vai até 29/07; café, carne bovina, suco de laranja, aviação civil, entre outros, estão isentos. Na véspera (21/07), o Ibovespa fechou praticamente estável — o mercado já havia digerido a tarifa.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY ~101,1</strong> (22/07, −0,05% no dia) — cerca de 0,2% <em>mais firme</em> que nos dois dias anteriores (~100,9). Um pequeno vento contrário do dólar — o fato de o EUR/BRL ter caído mesmo assim é obra do petróleo, não do dólar.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE amanhã, qui 23/07, 13:45 CET</strong> — \"nenhuma mudança\" é o consenso. Depósito em 2,25%. O <em>tom</em> da coletiva de Lagarde (14:30 CET) mexe com a perna do euro, não com o real.</li>\n      <li><span class=\"chip\">EUA</span> <strong>FOMC 28/29 de julho</strong>, o Fed mantém desde 17/06 entre 3,50% e 3,75%. O mercado precifica ~80% de chance de manutenção. O carry contra a Selic (14,25%) segue em <strong>cerca de 10,6 p.p.</strong></li>\n      <li><span class=\"chip hot\">BR</span> <strong>O fiscal segue sendo o ponto sensível:</strong> déficit primário do governo central em maio de <strong>R$ 53,3 bilhões</strong>; déficit em 12 meses de <strong>R$ 142,3 bilhões = 1,06% do PIB</strong> — contra a meta do governo de um superávit de 0,25%.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Sem sinal de estresse:</strong> CDS de 5 anos em <strong>123,08 pontos-base</strong> (21/07, −1,19% no dia) — até um pouco mais tranquilo que na semana passada.</li>\n      <li><span class=\"chip\">Atenção</span> As probabilidades de previsão abaixo são <strong>minha confiança pessoal</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El arancel <strong>ya llegó</strong>: desde la <strong>01:01</strong> de esta madrugada en Ribeirão Claro (0:01 hora del este de EE. UU.) rige el <strong>25%</strong> sobre los productos brasileños. ¿Y el real? Simplemente sigue afianzándose. El fixing más reciente del BCE — ahora el de <strong>martes 21/07</strong> — se ubica en <strong>EUR/BRL 5,7997</strong>, otro <strong>0,56% por debajo</strong> del lunes. Lo nuevo es el <em>segundo</em> motor: <strong>el Brent salta a 92,23 dólares</strong> (+1,35%, el nivel más alto desde mediados de junio), porque Estados Unidos ataca Irán por undécima noche consecutiva — y el petróleo más caro es viento a favor para Brasil, exportador neto de petróleo. Para Daniel, esa es la dirección incómoda: <strong>5.000 € rinden hoy R$ 28.999</strong> — unos <strong>R$ 162 menos que el lunes</strong> y <strong>R$ 744 por debajo</strong> del máximo mensual del 03/07. El arancel fue el tema de lunes y martes; aquí importa lo que se ha movido desde entonces.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,7997</strong> (fixing de referencia del BCE, mar 21/07, <strong>−0,56%</strong> vs. lun) — el fixing del miércoles (~16:00 CET) aún no se había publicado al cierre de esta edición.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificación de tipo cruzado:</strong> la pata en dólares frente a una segunda fuente real — el cierre del dólar en la bolsa brasileña del 21/07 fue de <strong>R$ 5,073</strong> contra el valor basado en el BCE de <strong>5,0794</strong> = <strong>+0,13%</strong>, claramente por debajo del umbral de 0,5%. Consistente.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 92,23 dólares</strong> (+1,35%, 22/07) — <em>el nivel más alto desde mediados de junio</em>. Motivo: undécima noche de ataques de EE. UU. contra Irán, los hutíes amenazan con un bloqueo naval. El petróleo ya es el segundo pilar del real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Arancel del 25% en vigor desde la 01:01 hora de Brasilia de hoy</strong> — según lo previsto. La transición para mercancía ya en tránsito corre hasta el 29/07; café, carne de res, jugo de naranja, aviación civil, entre otros, quedan exentos. La noche anterior (21/07), el Ibovespa cerró prácticamente sin cambios — el mercado ya había digerido el arancel.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY ~101,1</strong> (22/07, −0,05% en el día) — cerca de 0,2% <em>más firme</em> que los dos días previos (~100,9). Un pequeño viento en contra del dólar — que el EUR/BRL cayera de todos modos es obra del petróleo, no del dólar.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE mañana, jue 23/07, 13:45 CET</strong> — \"sin cambios\" es el consenso. Depósito en 2,25%. El <em>tono</em> de la conferencia de Lagarde (14:30 CET) mueve la pata del euro, no la del real.</li>\n      <li><span class=\"chip\">EUA</span> <strong>FOMC 28-29 de julio</strong>, la Fed se mantiene desde el 17/06 entre 3,50% y 3,75%. El mercado descuenta ~80% de probabilidad de que no haya cambios. El carry frente a la Selic (14,25%) se mantiene en <strong>alrededor de 10,6 pp</strong>.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Lo fiscal sigue siendo el punto delicado:</strong> el déficit primario del gobierno central en mayo fue de <strong>R$ 53,3 mil millones</strong>; el déficit de 12 meses suma <strong>R$ 142,3 mil millones = 1,06% del PIB</strong> — contra la meta del gobierno de un superávit de 0,25%.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Sin señal de estrés:</strong> el CDS a 5 años está en <strong>123,08 puntos base</strong> (21/07, −1,19% en el día) — incluso un poco más relajado que la semana pasada.</li>\n      <li><span class=\"chip\">Atención</span> Las probabilidades de pronóstico de abajo son <strong>mi propia confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

/strong>, nicht live. Chip-getragen, nicht breit.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Nvidia +1,97 % trug die Rally, aber Alphabet −1,38 %, Microsoft −1,13 %, Amazon −0,98 % fielen.</strong> Tesla <strong>+2,53 %</strong> (378,93 $), Apple <strong>+0,35 %</strong>. Chips rauf, Clouds runter — in dieselben Zahlen hinein, die heute Abend kommen.</li>\n      <li><span class=\"chip hot\">ÖL LIVE</span> <strong>Brent 92,23 $ (+1,35 %), WTI 85,47 $ (+1,33 %)</strong> — live <strong>22.07.</strong> Zurück über 90 $ (gestern früh noch 88,49 $), weil die Hormuz-Waffenruhe gebrochen bleibt und ein 10-Tage-Vorschlag „große Differenzen\" ausweist.</li>\n      <li><span class=\"chip good\">GOLD LIVE</span> <strong>4.128,25 $/Unze (+1,24 %)</strong> — live 22.07. Heute steigt Gold <em>zusammen</em> mit Öl: der Fluchtkanal führt, nicht der Zinskanal — Spiegelbild der Vortage.</li>\n      <li><span class=\"chip good\">KRYPTO LIVE</span> <strong>BTC 66.222 $ (24 h +1,14 %, 7 d +2,36 %, 30 d +3,44 %), ETH 1.931 $ (24 h +0,45 %, 7 d +2,95 %, 30 d +11,77 %)</strong> — live 22.07., 05:14 UTC, zwei Quellen unter 0,1 % deckungsgleich. Ruhig, ETH auf 30 Tage weiter vorn.</li>\n      <li><span class=\"chip\">ETF</span> <strong>BTC-Spot-ETFs: Woche zum 17.07. +75,7 Mio. $ (2. Zuflusswoche).</strong> Kontext: Juni <strong>−4,5 Mrd. $</strong>, 2026 YTD <strong>−5,2 Mrd. $</strong>. Zahlen sekundär belegt und eine Woche alt — Richtung gedreht, Größenordnung winzig.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>Heute gemischt bis rot: IMX +3,3 %, TAO +2,8 %, GALA +2,6 % im Plus; Memes und mehrere AI-Token im Minus.</strong> NEAR-Bewegung zwischen den Quellen umstritten (−5,8 % CoinGecko vs. −1,9 % Tagesrückblick) — keine Schlagzeilen-Zahl.</li>\n      <li><span class=\"chip hot\">URTEIL</span> <strong>Fünf von sechs Calls: HOLD — durch den Bericht hindurch.</strong> In den letzten Stunden vor einem binären Ereignis zu handeln, ist der klassische Fehler.         "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday's waiting mode unwinds tonight. Tuesday saw a <strong>semiconductor-driven rally</strong>: the <strong>Nasdaq</strong> climbed <strong>1.29%</strong> to <strong>25,837.21</strong>, led by <strong>Nvidia +1.97%</strong> (to <strong>$207.29</strong>, market cap <strong>$5.02 trillion</strong>) after it announced an investment in cloud provider Nebius. But the rally was narrow: while the chips rose, of all things the big cloud and software names fell — <strong>Alphabet −1.38%</strong>, <strong>Microsoft −1.13%</strong>, <strong>Amazon −0.98%</strong> — each of them heading into its own earnings report. So the market bought the AI data centers' suppliers while simultaneously selling their biggest customers. Both readings converge <strong>tonight</strong>: Alphabet and Tesla report after the US close, and Alphabet's statement on <strong>AI capital-spending budgets</strong> is the one hard answer the entire chip week has been buying ahead of. Oil climbed back above 90 $ overnight — <strong>Brent $92.23</strong> — gold rose to <strong>$4,128</strong>, both driven by the reignited Hormuz situation. And because the decision lands within hours, five of the six verdicts in this brief read: <strong>Hold — through the report.</strong></p>\n    <ul>\n      <li><span class=\"chip hot\">DATE</span> <strong>Today, Wed Jul 22: Alphabet and Tesla report after the US close</strong> (starting around 22:00 CEST / 17:00 BRT), <strong>Intel follows Thu Jul 23.</strong> Alphabet's <strong>AI capex guidance</strong> is the first audited answer to the question that has moved semiconductors all week: are the data-center budgets holding?</li>\n      <li><span class=\"chip\">STOCKS</span> <strong>S&amp;P 500 7,509.20 (+0.89%), Nasdaq 25,837.21 (+1.29%), Dow 52,224.64 (+0.74%)</strong> — as of: <strong>Tuesday's close, Jul 21, 4:00 p.m. EDT</strong>, not live. Chip-carried, not broad.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Nvidia +1.97% carried the rally, but Alphabet −1.38%, Microsoft −1.13%, Amazon −0.98% fell.</strong> Tesla <strong>+2.53%</strong> ($378.93), Apple <strong>+0.35%</strong>. Chips up, clouds down — heading straight into the numbers due tonight.</li>\n      <li><span class=\"chip hot\">OIL LIVE</span> <strong>Brent $92.23 (+1.35%), WTI $85.47 (+1.33%)</strong> — live <strong>Jul 22.</strong> Back above $90 (was $88.49 yesterday morning), as the Hormuz ceasefire remains broken and a 10-day proposal shows \"major differences.\"</li>\n      <li><span class=\"chip good\">GOLD LIVE</span> <strong>$4,128.25/oz (+1.24%)</strong> — live Jul 22. Today gold is rising <em>together</em> with oil: the safe-haven channel is leading, not the rate channel — a mirror image of the prior days.</li>\n      <li><span class=\"chip good\">CRYPTO LIVE</span> <strong>BTC $66,222 (24h +1.14%, 7d +2.36%, 30d +3.44%), ETH $1,931 (24h +0.45%, 7d +2.95%, 30d +11.77%)</strong> — live Jul 22, 05:14 UTC, two sources agreeing within 0.1%. Calm, with ETH still ahead over 30 days.</li>\n      <li><span class=\"chip\">ETF</span> <strong>BTC spot ETFs: week to Jul 17 +$75.7 million (2nd straight inflow week).</strong> Context: June <strong>−$4.5 billion</strong>, 2026 YTD <strong>−$5.2 billion</strong>. Figures secondhand and a week old — direction has turned, magnitude still tiny.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>Mixed to red today: IMX +3.3%, TAO +2.8%, GALA +2.6% in the green; memes and several AI tokens in the red.</strong> NEAR's move is disputed between sources (−5.8% CoinGecko vs. −1.9% daily recap) — not a headline number.</li>\n      <li><span class=\"chip hot\">VERDICT</span> <strong>Five of six calls: HOLD — through the report.</strong> Trading in the final hours before a binary event is the classic mistake. First possible action at the earliest <strong>Thu Jul 23.</strong> For the crypto sectors, it stays a trim.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O modo de espera de ontem se resolve hoje à noite. Na terça-feira houve um <strong>rali puxado pelos semicondutores</strong>: o <strong>Nasdaq</strong> subiu <strong>1,29%</strong>, para <strong>25.837,21</strong>, liderado pela <strong>Nvidia +1,97%</strong> (a <strong>207,29 $</strong>, valor de mercado <strong>5,02 tri $</strong>) depois de anunciar um investimento na provedora de nuvem Nebius. Mas o rali foi estreito: enquanto os chips subiam, justamente os grandes nomes de nuvem e software recuaram — <strong>Alphabet −1,38%</strong>, <strong>Microsoft −1,13%</strong>, <strong>Amazon −0,98%</strong> —, cada um deles às vésperas de divulgar seu próprio resultado. O mercado comprou, portanto, os fornecedores dos data centers de IA e vendeu, ao mesmo tempo, os maiores clientes deles. As duas leituras se encontram <strong>hoje à noite</strong>: Alphabet e Tesla divulgam resultados após o fechamento do pregão americano, e a declaração da Alphabet sobre os <strong>orçamentos de investimento em IA</strong> é a única resposta dura sobre a qual toda a semana dos chips já apostou antecipadamente. O petróleo voltou a subir acima de 90 $ durante a noite — <strong>Brent 92,23 $</strong> —, o ouro avançou para <strong>4.128 $</strong>, ambos puxados pela reacendida crise em Ormuz. E como a decisão se resolve em questão de horas, cinco dos seis vereditos desta edição são: <strong>manter — até o resultado sair.</strong></p>\n    <ul>\n      <li><span class=\"chip hot\">AGENDA</span> <strong>Hoje, qua 22/07: Alphabet e Tesla divulgam resultados após o fechamento do pregão americano</strong> (a partir de cerca de 22h00 horário de Berlim / 17h00 BRT), <strong>a Intel segue na qui 23/07.</strong> A orientação de capex em IA da Alphabet é a primeira resposta testada à pergunta que moveu os semicondutores a semana toda: os orçamentos de data center se sustentam?</li>\n      <li><span class=\"chip\">AÇÕES</span> <strong>S&amp;P 500 7.509,20 (+0,89%), Nasdaq 25.837,21 (+1,29%), Dow 52.224,64 (+0,74%)</strong> — dado de: <strong>fechamento de terça, 21/07, 16h00 EDT</strong>, não ao vivo. Sustentado pelos chips, não amplo.</li>\n      <li><span class=\"chip hot\">DIVISÃO</span> <strong>Nvidia +1,97% sustentou o rali, mas Alphabet −1,38%, Microsoft −1,13%, Amazon −0,98% caíram.</strong> Tesla <strong>+2,53%</strong> (378,93 $), Apple <strong>+0,35%</strong>. Chips para cima, nuvens para baixo — véspera dos mesmos números que saem hoje à noite.</li>\n      <li><span class=\"chip hot\">PETRÓLEO AO VIVO</span> <strong>Brent 92,23 $ (+1,35%), WTI 85,47 $ (+1,33%)</strong> — ao vivo <strong>22/07.</strong> De volta acima de 90 $ (ontem de manhã ainda 88,49 $), porque o cessar-fogo em Ormuz segue quebrado e uma proposta de trégua de 10 dias registra \"grandes divergências\".</li>\n      <li><span class=\"chip good\">OURO AO VIVO</span> <strong>4.128,25 $/onça (+1,24%)</strong> — ao vivo 22/07. Hoje o ouro sobe <em>junto</em> com o petróleo: quem comanda é o canal de fuga, não o canal dos juros — espelho invertido dos dias anteriores.</li>\n      <li><span class=\"chip good\">CRIPTO AO VIVO</span> <strong>BTC 66.222 $ (24h +1,14%, 7d +2,36%, 30d +3,44%), ETH 1.931 $ (24h +0,45%, 7d +2,95%, 30d +11,77%)</strong> — ao vivo 22/07, 05h14 UTC, duas fontes convergindo com menos de 0,1% de diferença. Calmo, com o ETH ainda à frente nos 30 dias.</li>\n      <li><span class=\"chip\">ETF</span> <strong>ETFs spot de BTC: semana até 17/07, +75,7 mi $ (2ª semana seguida de entradas).</strong> Contexto: junho <strong>−4,5 bi $</strong>, acumulado de 2026 <strong>−5,2 bi $</strong>. Números com fonte secundária e uma semana de idade — a direção virou, a magnitude é minúscula.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Hoje misto a vermelho: IMX +3,3%, TAO +2,8%, GALA +2,6% no verde; memecoins e vários tokens de IA no vermelho.</strong> Movimento do NEAR contestado entre as fontes (−5,8% CoinGecko vs. −1,9% retrospectiva do dia) — não é um número de manchete.</li>\n      <li><span class=\"chip hot\">VEREDITO</span> <strong>Cinco dos seis calls: HOLD — até o resultado sair.</strong> Operar nas últimas horas antes de um evento binário é o erro clássico. Primeira ação possível, no mínimo, na qui 23/07. Nos setores cripto, vale a regra de reduzir posição.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El modo de espera de ayer se resuelve esta noche. El martes hubo un <strong>repunte impulsado por semiconductores</strong>: el <strong>Nasdaq</strong> subió <strong>1,29 %</strong> hasta <strong>25.837,21</strong>, encabezado por <strong>Nvidia +1,97 %</strong> (a <strong>207,29 $</strong>, valor de mercado <strong>5,02 billones de $</strong>) tras una inversión en el proveedor de nube Nebius. Pero el repunte fue estrecho: mientras los chips subían, justo los grandes nombres de nube y software cedieron — <strong>Alphabet −1,38 %</strong>, <strong>Microsoft −1,13 %</strong>, <strong>Amazon −0,98 %</strong> —, cada uno camino a su propio reporte. El mercado, entonces, compró a los proveedores de los centros de datos de IA y al mismo tiempo vendió a sus mayores clientes. Ambas lecturas se encuentran <strong>esta noche</strong>: Alphabet y Tesla reportan después del cierre de la bolsa de EU, y lo que Alphabet diga sobre el <strong>presupuesto de inversión en IA</strong> es la única respuesta contundente para la que toda la semana de chips se adelantó a comprar. El petróleo subió durante la noche de vuelta por encima de 90 $ — <strong>Brent 92,23 $</strong> —, el oro avanzó hasta <strong>4.128 $</strong>, ambos impulsados por la reactivada crisis de Ormuz. Y como la decisión se juega en horas, cinco de los seis veredictos de este boletín son: <strong>mantener — hasta que se conozca el reporte.</strong></p>\n    <ul>\n      <li><span class=\"chip hot\">FECHA</span> <strong>Hoy, mié 22/07: Alphabet y Tesla reportan después del cierre de la bolsa de EU</strong> (desde aprox. 22:00 CEST / 17:00 hora de Brasilia), <strong>Intel sigue el jue 23/07.</strong> La guía de capex en IA de Alphabet es la primera respuesta contundente a la pregunta que ha movido a los semiconductores toda la semana: ¿se sostienen los presupuestos de los centros de datos?</li>\n      <li><span class=\"chip\">ACCIONES</span> <strong>S&amp;P 500 7.509,20 (+0,89 %), Nasdaq 25.837,21 (+1,29 %), Dow 52.224,64 (+0,74 %)</strong> — dato: cierre del martes 21/07, 16:00 EDT, no en vivo. Impulsado por chips, no de forma amplia.</li>\n      <li><span class=\"chip hot\">DIVISIÓN</span> <strong>Nvidia +1,97 % impulsó el repunte, pero Alphabet −1,38 %, Microsoft −1,13 %, Amazon −0,98 % cayeron.</strong> Tesla <strong>+2,53 %</strong> (378,93 $), Apple <strong>+0,35 %</strong>. Chips arriba, nube abajo — justo hacia las cifras que llegan esta noche.</li>\n      <li><span class=\"chip hot\">PETRÓLEO EN VIVO</span> <strong>Brent 92,23 $ (+1,35 %), WTI 85,47 $ (+1,33 %)</strong> — en vivo <strong>22/07</strong>. De vuelta por encima de 90 $ (ayer temprano todavía en 88,49 $), porque la tregua en Ormuz sigue rota y una propuesta a 10 días muestra \"grandes diferencias\".</li>\n      <li><span class=\"chip good\">ORO EN VIVO</span> <strong>4.128,25 $/onza (+1,24 %)</strong> — en vivo 22/07. Hoy el oro sube <em>junto</em> con el petróleo: manda el canal de refugio, no el de tasas — reflejo inverso de los días anteriores.</li>\n      <li><span class=\"chip good\">CRIPTO EN VIVO</span> <strong>BTC 66.222 $ (24 h +1,14 %, 7 d +2,36 %, 30 d +3,44 %), ETH 1.931 $ (24 h +0,45 %, 7 d +2,95 %, 30 d +11,77 %)</strong> — en vivo 22/07, 05:14 UTC, dos fuentes con una coincidencia por debajo del 0,1 %. Tranquilo, ETH sigue arriba a 30 días.</li>\n      <li><span class=\"chip\">ETF</span> <strong>ETF spot de BTC: semana al 17/07 +75,7 millones $ (2.ª semana consecutiva de entradas).</strong> Contexto: junio <strong>−4,5 mil millones $</strong>, 2026 en lo que va del año <strong>−5,2 mil millones $</strong>. Cifras respaldadas de forma secundaria y con una semana de antigüedad — la dirección cambió, la magnitud es diminuta.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Hoy mixto a rojo: IMX +3,3 %, TAO +2,8 %, GALA +2,6 % en positivo; memecoins y varios tokens de IA en negativo.</strong> El movimiento de NEAR es disputado entre fuentes (−5,8 % CoinGecko frente a −1,9 % del resumen diario) — no es una cifra de titular.</li>\n      <li><span class=\"chip hot\">VEREDICTO</span> <strong>Cinco de seis recomendaciones: HOLD — hasta que se conozca el reporte.</strong> Operar en las últimas horas antes de un evento binario es el error clásico. La primera acción posible es, lo antes posible, el <strong>jue 23/07.</strong> En los sectores cripto, la reducción continúa.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Nicht-KI-Software-Tag hat zwei Gesichter: eine große regulatorische Weichenstellung aus Brüssel — zwei bindende DMA-Entscheidungen, die Android und die Google-Suche für Wettbewerber aufmachen — und eine Handvoll Lücken in Infrastruktur, die praktisch überall läuft. WordPress-Core wird aktiv ausgenutzt, ein nginx-Bug steckt seit 2011 in jeder Version, und für einen 15 Jahre alten Kernel-Fehler ist jetzt ein zuverlässiger Root-Exploit öffentlich.</p>\n    <ul>\n      <li><span class=\"chip hot\">Regulierung</span> <strong>DMA gegen Google</strong>: Android muss fremde KI-Assistenten an elf Funktionsgruppen lassen (ab Android 18, Frist ~Aug 2027), Google muss anonymisierte Search-Daten mit Rivalen teilen. Strafe: bis 10 % / 20 % des Alphabet-Weltumsatzes. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>wp2shell</strong>: verkettete RCE im WordPress-<em>Core</em> (CVE-2026-63030, CVSS 9,8 laut Tenable), seit ~19.07. aktiv ausgenutzt; Fix in 7.0.2 / 6.9.5 / 6.8.6. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>nginx</strong>: Heap-Overflow in der <code>map</code>-Regex-Engine (CVE-2026-42533, CVSS 8,1) trifft <em>jede</em> Version seit 2011 (0.9.6–1.31.2); gepatcht, noch kein öffentlicher Exploit. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>GhostLock</strong>: 15 Jahre alter Linux-Kernel-Use-after-free (CVE-2026-43499), Root-PoC jetzt öffentlich; Kernel-Fix seit April, Distro-Rollout (Ubuntu LTS) hinkt noch. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Autodesk Fusion</strong> Juli-Update (v.2704.1.15): Konfigurationen on-demand, Altium-Import, TypeScript-API (Beta) — plus zwei Crash-Fix-Builds. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Django 6.0.7 / 5.2.16</strong>: drei Fixes niedriger Schwere (Cookie-Cache-Poisoning, GDALRaster-Over-Read, Header-Injection). <span class=\"chip\">OSS</span></li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Nicht-KI-Software-Tag hat zwei Gesichter: eine große regulatorische Weichenstellung aus Brüssel — zwei bindende DMA-Entscheidungen, die Android und die Google-Suche für Wettbewerber aufmachen — und eine Handvoll Lücken in Infrastruktur, die praktisch überall läuft. WordPress-Core wird aktiv ausgenutzt, ein nginx-Bug steckt seit 2011 in jeder Version, und für einen 15 Jahre alten Kernel-Fehler ist jetzt ein zuverlässiger Root-Exploit öffentlich.</p>\n    <ul>\n      <li><span class=\"chip hot\">Regulierung</span> <strong>DMA gegen Google</strong>: Android muss fremde KI-Assistenten an elf Funktionsgruppen lassen (ab Android 18, Frist ~Aug 2027), Google muss anonymisierte Search-Daten mit Rivalen teilen. Strafe: bis 10 % / 20 % des Alphabet-Weltumsatzes. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>wp2shell</strong>: verkettete RCE im WordPress-<em>Core</em> (CVE-2026-63030, CVSS 9,8 laut Tenable), seit ~19.07. aktiv ausgenutzt; Fix in 7.0.2 / 6.9.5 / 6.8.6. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>nginx</strong>: Heap-Overflow in der <code>map</code>-Regex-Engine (CVE-2026-42533, CVSS 8,1) trifft <em>jede</em> Version seit 2011 (0.9.6–1.31.2); gepatcht, noch kein öffentlicher Exploit. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>GhostLock</strong>: 15 Jahre alter Linux-Kernel-Use-after-free (CVE-2026-43499), Root-PoC jetzt öffentlich; Kernel-Fix seit April, Distro-Rollout (Ubuntu LTS) hinkt noch. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Autodesk Fusion</strong> Juli-Update (v.2704.1.15): Konfigurationen on-demand, Altium-Import, TypeScript-API (Beta) — plus zwei Crash-Fix-Builds. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Django 6.0.7 / 5.2.16</strong>: drei Fixes niedriger Schwere (Cookie-Cache-Poisoning, GDALRaster-Over-Read, Header-Injection). <span class=\"chip\">OSS</span></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today's non-AI software news has two faces: a major regulatory shift out of Brussels — two binding DMA decisions that pry open Android and Google Search for competitors — and a handful of flaws in infrastructure that runs practically everywhere. WordPress core is under active exploitation, an nginx bug has been sitting in every version since 2011, and a reliable root exploit is now public for a 15-year-old kernel flaw.</p>\n    <ul>\n      <li><span class=\"chip hot\">Regulation</span> <strong>DMA vs. Google</strong>: Android must let rival AI assistants into eleven functional areas (starting with Android 18, deadline ~Aug 2027), and Google must share anonymized search data with rivals. Penalty: up to 10% / 20% of Alphabet's global revenue. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>wp2shell</strong>: chained RCE in WordPress <em>core</em> (CVE-2026-63030, CVSS 9.8 per Tenable), actively exploited since ~Jul 19; fixed in 7.0.2 / 6.9.5 / 6.8.6. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>nginx</strong>: heap overflow in the <code>map</code> regex engine (CVE-2026-42533, CVSS 8.1) hits <em>every</em> version since 2011 (0.9.6–1.31.2); patched, no public exploit yet. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>GhostLock</strong>: 15-year-old Linux kernel use-after-free (CVE-2026-43499), root PoC now public; kernel fix since April, distro rollout (Ubuntu LTS) still lagging. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Autodesk Fusion</strong> July update (v.2704.1.15): on-demand configurations, Altium import, TypeScript API (beta) — plus two crash-fix builds. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Django 6.0.7 / 5.2.16</strong>: three low-severity fixes (cookie cache poisoning, GDALRaster over-read, header injection). <span class=\"chip\">OSS</span></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O dia de software sem IA tem duas caras: uma grande virada regulatória vinda de Bruxelas — duas decisões vinculantes do DMA que abrem o Android e a Busca do Google para concorrentes — e um punhado de falhas em infraestrutura que roda praticamente em todo lugar. O núcleo do WordPress está sendo explorado ativamente, um bug do nginx está presente desde 2011 em toda versão, e um exploit root confiável para uma falha de 15 anos no kernel agora é público.</p>\n    <ul>\n      <li><span class=\"chip hot\">Regulação</span> <strong>DMA contra o Google</strong>: o Android terá que dar acesso a assistentes de IA de terceiros em onze grupos de funcionalidades (a partir do Android 18, prazo ~ago/2027), e o Google terá que compartilhar dados de busca anonimizados com rivais. Multa: até 10% / 20% do faturamento global da Alphabet. <span class=\"chip\">UE</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>wp2shell</strong>: RCE encadeada no <em>núcleo</em> do WordPress (CVE-2026-63030, CVSS 9,8 segundo a Tenable), sendo explorada ativamente desde ~19/07; correção nas versões 7.0.2 / 6.9.5 / 6.8.6. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>nginx</strong>: heap overflow no mecanismo de regex do módulo <code>map</code> (CVE-2026-42533, CVSS 8,1) afeta <em>toda</em> versão desde 2011 (0.9.6–1.31.2); já corrigido, ainda sem exploit público. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>GhostLock</strong>: use-after-free de 15 anos no kernel do Linux (CVE-2026-43499), PoC de root agora pública; correção no kernel desde abril, mas o rollout nas distribuições (Ubuntu LTS) ainda está atrasado. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>Autodesk Fusion</strong> atualização de julho (v.2704.1.15): configurações sob demanda, importação do Altium, API em TypeScript (beta) — mais dois builds de correção de crashes. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Django 6.0.7 / 5.2.16</strong>: três correções de baixa severidade (envenenamento de cache de cookie, leitura além do limite no GDALRaster, injeção de cabeçalho). <span class=\"chip\">OSS</span></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día de software sin IA tiene dos caras: un gran giro regulatorio desde Bruselas — dos decisiones vinculantes del DMA que abren Android y la Búsqueda de Google a competidores — y un puñado de fallas en infraestructura que corre prácticamente en todas partes. El núcleo de WordPress está siendo explotado activamente, un bug de nginx lleva desde 2011 en todas las versiones, y para una falla de 15 años en el kernel ahora es público un exploit root confiable.</p>\n    <ul>\n      <li><span class=\"chip hot\">Regulación</span> <strong>DMA contra Google</strong>: Android tendrá que dar acceso a asistentes de IA de terceros en once grupos de funciones (a partir de Android 18, plazo ~ago 2027), y Google tendrá que compartir datos de búsqueda anonimizados con rivales. Multa: hasta 10% / 20% de los ingresos globales de Alphabet. <span class=\"chip\">UE</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>wp2shell</strong>: RCE encadenada en el <em>núcleo</em> de WordPress (CVE-2026-63030, CVSS 9,8 según Tenable), explotada activamente desde ~19/07; corregida en 7.0.2 / 6.9.5 / 6.8.6. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>nginx</strong>: desbordamiento de heap en el motor de expresiones regulares del módulo <code>map</code> (CVE-2026-42533, CVSS 8,1), afecta a <em>toda</em> versión desde 2011 (0.9.6–1.31.2); ya parcheada, todavía sin exploit público. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>GhostLock</strong>: use-after-free de 15 años en el kernel de Linux (CVE-2026-43499), PoC de root ahora pública; el parche del kernel existe desde abril, pero el despliegue en distribuciones (Ubuntu LTS) sigue rezagado. <span class=\"chip\">Infra</span></li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>Autodesk Fusion</strong> actualización de julio (v.2704.1.15): configuraciones bajo demanda, importación de Altium, API en TypeScript (beta) — más dos builds de corrección de fallos. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Django 6.0.7 / 5.2.16</strong>: tres correcciones de severidad baja (envenenamiento de caché de cookies, lectura fuera de límites en GDALRaster, inyección de encabezados). <span class=\"chip\">OSS</span></li>\n    </ul></div>"
