      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Plattform-Eingriffe von oben prägen die Woche: Washington hat Anthropics Spitzen-Coding-Modell abgeschaltet, und Google hat den Consumer-Service seines Open-Source-CLI (über 100.000 Sterne) abgeschaltet. Beide Male entscheidet nicht der Markt, wer welches Tool nutzen darf — sondern eine Behörde oder ein Konzern-Budget. Für deine Toolbox heißt das: Vendor-Lock-in ist diese Woche kein abstraktes Risiko, sondern ein realer Ausfall. Halte deine Fallback-Kette griffbereit.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 &amp; Mythos 5 offline</strong>: US-Handelsministerium hat Anthropics Top-Modelle am 12.06. per Export-Kontrolle gesperrt — Stand 25.06. weiter down, für <em>alle</em> Kunden weltweit.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini-CLI-Service offline</strong>: Consumer-Endpunkt am 18.06. abgeschaltet, ersetzt durch das closed-source Antigravity CLI — Free-Tier von 1.000 auf ~20 Requests/Tag, CI-Pipelines brechen still (das Open-Source-Repo bekommt weiter Releases).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Enterprise-Token-Schock</strong>: Microsoft zieht laut Cybernews bis 30.06. Claude-Code-Lizenzen für ~5.000 Engineers; Uber soll in ~4 Monaten KI-Coding-Ausgaben in Höhe seines ganzen 2025-F&amp;E-Budgets (~3,4 Mrd. $) verbrannt haben (berichtet).</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.193</strong> heute: höchste Release-Kadenz im Feld — verschachtelte Sub-Agents (5 Ebenen), <code>/rewind</code>, <code>/cd</code>, Fallback-Modell-Ketten, Safe-Mode.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot CLI GA</strong>: neues Tab-Terminal (Issues/PRs inline), <code>/mcp add</code>, „Rubber Duck\"-Kritiker, Voice-Input.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench bei 95 %</strong> (Fable 5, offline) — aber 99 von 102 Einträgen sind Anbieter-selbstgemeldet. Skeptisch lesen.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6: nichts</strong>. Prognose-Märkte für 22.–28.06. von ~83 % auf ~18 % eingebrochen; offizielles Top-Modell bleibt GPT-5.5 (23.04.).</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> weiter nicht GA — berichtete Verschiebung auf Juli, von Google unbestätigt.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>DeepSeek V4-Pro-Max &amp; Qwen 3.7 Max</strong> halten oben mit: LiveCodeBench 93,5 % bzw. 91,6 %, frei nutzbar.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Plattform-Eingriffe von oben prägen die Woche: Washington hat Anthropics Spitzen-Coding-Modell abgeschaltet, und Google hat den Consumer-Service seines Open-Source-CLI (über 100.000 Sterne) abgeschaltet. Beide Male entscheidet nicht der Markt, wer welches Tool nutzen darf — sondern eine Behörde oder ein Konzern-Budget. Für deine Toolbox heißt das: Vendor-Lock-in ist diese Woche kein abstraktes Risiko, sondern ein realer Ausfall. Halte deine Fallback-Kette griffbereit.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 &amp; Mythos 5 offline</strong>: US-Handelsministerium hat Anthropics Top-Modelle am 12.06. per Export-Kontrolle gesperrt — Stand 25.06. weiter down, für <em>alle</em> Kunden weltweit.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini-CLI-Service offline</strong>: Consumer-Endpunkt am 18.06. abgeschaltet, ersetzt durch das closed-source Antigravity CLI — Free-Tier von 1.000 auf ~20 Requests/Tag, CI-Pipelines brechen still (das Open-Source-Repo bekommt weiter Releases).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Enterprise-Token-Schock</strong>: Microsoft zieht laut Cybernews bis 30.06. Claude-Code-Lizenzen für ~5.000 Engineers; Uber soll in ~4 Monaten KI-Coding-Ausgaben in Höhe seines ganzen 2025-F&amp;E-Budgets (~3,4 Mrd. $) verbrannt haben (berichtet).</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.193</strong> heute: höchste Release-Kadenz im Feld — verschachtelte Sub-Agents (5 Ebenen), <code>/rewind</code>, <code>/cd</code>, Fallback-Modell-Ketten, Safe-Mode.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot CLI GA</strong>: neues Tab-Terminal (Issues/PRs inline), <code>/mcp add</code>, „Rubber Duck\"-Kritiker, Voice-Input.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench bei 95 %</strong> (Fable 5, offline) — aber 99 von 102 Einträgen sind Anbieter-selbstgemeldet. Skeptisch lesen.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6: nichts</strong>. Prognose-Märkte für 22.–28.06. von ~83 % auf ~18 % eingebrochen; offizielles Top-Modell bleibt GPT-5.5 (23.04.).</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> weiter nicht GA — berichtete Verschiebung auf Juli, von Google unbestätigt.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>DeepSeek V4-Pro-Max &amp; Qwen 3.7 Max</strong> halten oben mit: LiveCodeBench 93,5 % bzw. 91,6 %, frei nutzbar.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two platform interventions from above define the week: Washington has shut down Anthropic's top coding model, and Google has shut down the consumer service of its open-source CLI (over 100,000 stars). Both times, it's not the market deciding who gets to use which tool — it's a government agency or a corporate budget. For your toolbox, that means vendor lock-in is no longer an abstract risk this week, but a real outage. Keep your fallback chain ready.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 & Mythos 5 offline</strong>: US Commerce Department blocked Anthropic's top models via export control on 06-12. As of 06-25, still down for <em>all</em> customers worldwide.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI service offline</strong>: Consumer endpoint shut down on 06-18, replaced by closed-source Antigravity CLI — free tier drops from 1,000 to ~20 requests/day, CI pipelines break silently (the open-source repo continues to get releases).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Enterprise token shock</strong>: Microsoft is pulling Claude Code licenses for ~5,000 engineers by 06-30, per Cybernews; Uber reportedly burned through AI coding costs equivalent to its entire 2025 R&D budget (~$3.4B) in ~four months (reported).</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.193</strong> today: highest release cadence in the field — nested sub-agents (5 levels deep), <code>/rewind</code>, <code>/cd</code>, fallback model chains, safe-mode.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot CLI GA</strong>: new tab-based terminal (issues/PRs inline), <code>/mcp add</code>, \"rubber duck\" reviewer, voice input.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench at 95%</strong> (Fable 5, offline) — but 99 of 102 entries are vendor-reported. Read skeptically.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6: nothing</strong>. Prediction markets for 06-22–28 collapsed from ~83% to ~18%; official top model remains GPT-5.5 (04-23).</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> still not GA — reported delay to July, unconfirmed by Google.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>DeepSeek V4-Pro-Max & Qwen 3.7 Max</strong> holding strong: LiveCodeBench 93.5% and 91.6% respectively, freely available.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas intervenções de plataforma de cima definem a semana: Washington desligou o melhor modelo de codificação da Anthropic, e o Google desligou o serviço de consumidor de sua CLI de código aberto (com mais de 100.000 estrelas). Nos dois casos, não é o mercado que decide quem pode usar qual ferramenta — é uma agência governamental ou um orçamento corporativo. Para sua caixa de ferramentas, isso significa que dependência de fornecedor não é um risco abstrato esta semana — é uma falha real. Mantenha sua cadeia de fallback pronta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 &amp; Mythos 5 offline</strong>: Departamento de Comércio dos EUA bloqueou os melhores modelos da Anthropic via controle de exportação em 12/06. Em 25/06, ainda offline para <em>todos</em> os clientes em todo o mundo.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI serviço offline</strong>: endpoint de consumidor desligado em 18/06, substituído por CLI Antigravity fechada — nível gratuito cai de 1.000 para ~20 solicitações/dia, pipelines de CI quebram silenciosamente (o repositório de código aberto continua recebendo versões).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Choque de tokens enterprise</strong>: Microsoft está cancelando licenças do Claude Code para ~5.000 engenheiros até 30/06 segundo Cybernews; Uber supostamente queimou através de custos de codificação de IA equivalentes a todo seu orçamento de P&amp;D de 2025 (~3,4 bi USD) em ~quatro meses (reportado).</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.193</strong> hoje: maior cadência de lançamento do setor — sub-agentes aninhados (5 níveis), <code>/rewind</code>, <code>/cd</code>, cadeias de modelo fallback, modo seguro.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot CLI GA</strong>: novo terminal em abas (issues/PRs inline), <code>/mcp add</code>, crítico \"Rubber Duck\", entrada de voz.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench em 95 %</strong> (Fable 5, offline) — mas 99 de 102 entradas são auto-informadas por fornecedor. Leia com ceticismo.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6: nada</strong>. Mercados de previsão para 22–28/06 caíram de ~83 % para ~18 %; modelo oficial superior permanece GPT-5.5 (23/04).</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> ainda não está GA — adiamento reportado para julho, não confirmado pelo Google.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>DeepSeek V4-Pro-Max &amp; Qwen 3.7 Max</strong> mantêm-se fortes: LiveCodeBench 93,5 % e 91,6 % respectivamente, livremente disponíveis.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos intervenciones de plataforma desde arriba definen la semana: Washington ha desconectado el mejor modelo de programación de Anthropic, y Google ha desconectado el servicio de consumidor de su CLI de código abierto (con más de 100.000 estrellas). En ambos casos, no es el mercado quien decide qué herramienta puedes usar — es una agencia gubernamental o un presupuesto corporativo. Para tu caja de herramientas, esto significa que la dependencia del proveedor no es un riesgo abstracto esta semana — es una falla real. Mantén tu cadena de respaldo lista.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 &amp; Mythos 5 offline</strong>: Departamento de Comercio de EUA bloqueó los mejores modelos de Anthropic mediante control de exportación el 12/06. Al 25/06, aún offline para <em>todos</em> los clientes en todo el mundo.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI servicio offline</strong>: endpoint de consumidor desconectado el 18/06, reemplazado por CLI Antigravity de código cerrado — nivel gratuito cae de 1.000 a ~20 solicitudes/día, pipelines de CI se rompen silenciosamente (el repositorio de código abierto continúa recibiendo versiones).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Shock de tokens empresariales</strong>: Microsoft está cancelando licencias de Claude Code para ~5.000 ingenieros hasta 30/06 según Cybernews; Uber supuestamente quemó costos de codificación de IA equivalentes a todo su presupuesto de P&amp;D de 2025 (~$3,4 mil millones) en ~cuatro meses (reportado).</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.193</strong> hoy: cadencia de lanzamiento más alta del sector — sub-agentes anidados (5 niveles), <code>/rewind</code>, <code>/cd</code>, cadenas de modelo fallback, modo seguro.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot CLI GA</strong>: nueva terminal con pestañas (issues/PRs inline), <code>/mcp add</code>, crítico \"Rubber Duck\", entrada de voz.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench en 95 %</strong> (Fable 5, offline) — pero 99 de 102 entradas son auto-reportadas por proveedor. Lee con escepticismo.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6: nada</strong>. Mercados de predicción para 22–28/06 se desplomaron de ~83 % a ~18 %; modelo oficial superior sigue siendo GPT-5.5 (23/04).</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro</strong> aún no es GA — retraso reportado a julio, no confirmado por Google.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>DeepSeek V4-Pro-Max &amp; Qwen 3.7 Max</strong> se mantienen fuertes: LiveCodeBench 93,5 % y 91,6 % respectivamente, libremente disponibles.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist der Tag, an dem angewandte KI ihren Awareness-Charakter verliert und operativ wird: ein Cyber-Modell findet einen 23 Jahre alten Root-Bug, ein Nobelpreisträger wechselt zur KI-Pharmaforschung, und in 37 Tagen wird die erste scharfe EU-AI-Act-Stufe — Transparenz- und GPAI-Pflichten — fällig. Drei dieser Stränge zahlen direkt auf twiceD-Geschäft ein.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US/EU</span> <strong>GPT-5.5-Cyber</strong>: 85,6 % CyberGym (SOTA), nur an verifizierte Verteidiger — Deutschland und ENISA sind dabei. Fand u. a. einen 23 Jahre alten OpenBSD-Root-Bug.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>John Jumper</strong> (AlphaFold, Chemie-Nobelpreis 2024) verlässt DeepMind für Anthropics KI-für-Wissenschaft-Programm. Titel offiziell nicht genannt.</li>\n      <li><span class=\"chip\">DEAL · US</span> <strong>SpaceX × Reflection AI × Nvidia</strong>: 6,3 Mrd. $ Compute über 3,5 Jahre. Nvidia steckt auf beiden Seiten der Transaktion.</li>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>EU AI Act</strong>: ab 02.08.2026 greifen Transparenz- (Art. 50) und GPAI-Sanktionspflichten — Bußgeld bis 15 Mio. € oder 3 % Weltumsatz. Die Hochrisiko-Stufe (Anhang III) hat das Digital-Omnibus-Paket auf 02.12.2027 verschoben. Deutschlands KI-MIG macht die Bundesnetzagentur zum Vollzieher.</li>\n      <li><span class=\"chip\">CONSUMER · US/BR</span> <strong>Google Finance</strong> bekommt eine Android-App mit Gemini-„Key Moments\", die Kursbewegungen erklärt. Parallel: Google for Brazil zielt auf 1 Mio.+ KMU.</li>\n      <li><span class=\"chip good\">HEALTH · US</span> <strong>Ambient-AI im Gesundheitswesen</strong>: ~2/3 der Epic-Kliniken nutzen KI-Mitschreiber, das US-Veteranenministerium rollt flächendeckend aus. 60–90 Min./Tag gespart.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner</strong> sieht KI-Agenten-Software bei 206,5 Mrd. $ in 2026 — mit der üblichen Skepsis-Fußnote.</li>\n      <li><span class=\"chip\">IDEEN · twiceD</span> <strong>Zwei recherchierte Projekt-Ideen</strong>: ein EU-AI-Act-Inventur-Service und ein KMU-Schwachstellen-Triage-Aufsatz.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute ist der Tag, an dem angewandte KI ihren Awareness-Charakter verliert und operativ wird: ein Cyber-Modell findet einen 23 Jahre alten Root-Bug, ein Nobelpreisträger wechselt zur KI-Pharmaforschung, und in 37 Tagen wird die erste scharfe EU-AI-Act-Stufe — Transparenz- und GPAI-Pflichten — fällig. Drei dieser Stränge zahlen direkt auf twiceD-Geschäft ein.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US/EU</span> <strong>GPT-5.5-Cyber</strong>: 85,6 % CyberGym (SOTA), nur an verifizierte Verteidiger — Deutschland und ENISA sind dabei. Fand u. a. einen 23 Jahre alten OpenBSD-Root-Bug.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>John Jumper</strong> (AlphaFold, Chemie-Nobelpreis 2024) verlässt DeepMind für Anthropics KI-für-Wissenschaft-Programm. Titel offiziell nicht genannt.</li>\n      <li><span class=\"chip\">DEAL · US</span> <strong>SpaceX × Reflection AI × Nvidia</strong>: 6,3 Mrd. $ Compute über 3,5 Jahre. Nvidia steckt auf beiden Seiten der Transaktion.</li>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>EU AI Act</strong>: ab 02.08.2026 greifen Transparenz- (Art. 50) und GPAI-Sanktionspflichten — Bußgeld bis 15 Mio. € oder 3 % Weltumsatz. Die Hochrisiko-Stufe (Anhang III) hat das Digital-Omnibus-Paket auf 02.12.2027 verschoben. Deutschlands KI-MIG macht die Bundesnetzagentur zum Vollzieher.</li>\n      <li><span class=\"chip\">CONSUMER · US/BR</span> <strong>Google Finance</strong> bekommt eine Android-App mit Gemini-„Key Moments\", die Kursbewegungen erklärt. Parallel: Google for Brazil zielt auf 1 Mio.+ KMU.</li>\n      <li><span class=\"chip good\">HEALTH · US</span> <strong>Ambient-AI im Gesundheitswesen</strong>: ~2/3 der Epic-Kliniken nutzen KI-Mitschreiber, das US-Veteranenministerium rollt flächendeckend aus. 60–90 Min./Tag gespart.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner</strong> sieht KI-Agenten-Software bei 206,5 Mrd. $ in 2026 — mit der üblichen Skepsis-Fußnote.</li>\n      <li><span class=\"chip\">IDEEN · twiceD</span> <strong>Zwei recherchierte Projekt-Ideen</strong>: ein EU-AI-Act-Inventur-Service und ein KMU-Schwachstellen-Triage-Aufsatz.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today is the day applied AI loses its awareness-raising character and becomes operational: a cyber model finds a 23-year-old root bug, a Nobel laureate moves to AI-powered pharma research, and in 37 days the first sharp EU AI Act threshold—transparency and GPAI obligations—takes effect. Three of these threads pay directly into twiceD's business.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US/EU</span> <strong>GPT-5.5-Cyber</strong>: 85.6% CyberGym (SOTA), released only to verified defenders—Germany and ENISA are in. Found, among others, a 23-year-old OpenBSD root bug.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>John Jumper</strong> (AlphaFold, Chemistry Nobel 2024) leaves DeepMind for Anthropic's AI-for-science program. Title not officially announced.</li>\n      <li><span class=\"chip\">DEAL · US</span> <strong>SpaceX × Reflection AI × Nvidia</strong>: $6.3B compute over 3.5 years. Nvidia sits on both sides of the transaction.</li>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>EU AI Act</strong>: starting Aug 2, 2026 transparency requirements (Art. 50) and GPAI enforcement powers take effect—penalties up to €15M or 3% of global revenue. The high-risk tier (Annex III) was deferred to Dec 2, 2027 by the Digital Omnibus package. Germany's AI-MIG makes the Bundesnetzagentur the enforcer.</li>\n      <li><span class=\"chip\">CONSUMER · US/BR</span> <strong>Google Finance</strong> gets an Android app with Gemini \"Key Moments\" that explain price movements. Separately: Google for Brazil targets 1M+ SMEs.</li>\n      <li><span class=\"chip good\">HEALTH · US</span> <strong>Ambient AI in healthcare</strong>: ~2/3 of Epic clinics use AI scribes, US Veterans Affairs rolling out nationwide. 60–90 min/day saved.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner</strong> sees AI agent software at $206.5B in 2026—with the usual skepticism footnote.</li>\n      <li><span class=\"chip\">IDEAS · twiceD</span> <strong>Two researched project ideas</strong>: an EU AI Act inventory service and an SME vulnerability triage write-up.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o dia em que a IA aplicada perde seu caráter de conscientização e se torna operacional: um modelo de cyber encontra um bug raiz de 23 anos, um ganhador do Prêmio Nobel muda para pesquisa de IA em farmacologia, e em 37 dias a primeira etapa aguda da Lei de IA da UE — obrigações de transparência e GPAI — entra em vigor. Três desses fios pagam diretamente para o negócio da twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US/EU</span> <strong>GPT-5.5-Cyber</strong>: 85,6% CyberGym (SOTA), apenas para defensores verificados — Alemanha e ENISA estão incluídas. Encontrou um bug raiz do OpenBSD de 23 anos, entre outros.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>John Jumper</strong> (AlphaFold, Prêmio Nobel de Química 2024) deixa DeepMind para o programa de IA para Ciência da Anthropic. Título oficialmente não divulgado.</li>\n      <li><span class=\"chip\">DEAL · US</span> <strong>SpaceX × Reflection AI × Nvidia</strong>: R$ 6,3 bilhões em computação ao longo de 3,5 anos. Nvidia está dos dois lados da transação.</li>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>Lei de IA da UE</strong>: a partir de 02/08/2026 entram em vigor obrigações de transparência (Art. 50) e competências de sanção GPAI — multa até €15 milhões ou 3% de faturamento global. A etapa de alto risco (Anexo III) foi adiada para 02/12/2027 pelo pacote Digital Omnibus. O marco alemão KI-MIG torna a Bundesnetzagentur executora.</li>\n      <li><span class=\"chip\">CONSUMER · US/BR</span> <strong>Google Finance</strong> ganha app Android com \"Key Moments\" do Gemini explicando movimentos de preço. Paralelamente: Google para Brasil visando 1 milhão+ PMEs.</li>\n      <li><span class=\"chip good\">HEALTH · US</span> <strong>IA Ambiente em saúde</strong>: ~2/3 das clínicas Epic usam escribas de IA, Ministério dos Veteranos dos EUA implementando em todo sistema. 60–90 min/dia economizados.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner</strong> vê software de agentes de IA em R$ 206,5 bilhões em 2026 — com a nota de ceticismo usual.</li>\n      <li><span class=\"chip\">IDEIAS · twiceD</span> <strong>Duas ideias de projeto pesquisadas</strong>: um serviço de inventário da Lei de IA da UE e um ensaio de triagem de vulnerabilidades de PME.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es el día en que la IA aplicada pierde su carácter de fase de conciencia y se vuelve operacional: un modelo de ciberseguridad encuentra un bug raíz de 23 años, un premio Nobel cambia a investigación de IA en farmacología, y en 37 días entra en vigencia la primera etapa aguda de la Ley de IA de la UE — obligaciones de transparencia y GPAI. Tres de estos hilos pagan directamente en el negocio de twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US/EU</span> <strong>GPT-5.5-Cyber</strong>: 85,6% CyberGym (SOTA), solo para defensores verificados — Alemania y ENISA están incluidas. Encontró un bug raíz de OpenBSD de 23 años, entre otros.</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>John Jumper</strong> (AlphaFold, Premio Nobel de Química 2024) se va de DeepMind al programa de IA para Ciencia de Anthropic. Título oficialmente no divulgado.</li>\n      <li><span class=\"chip\">DEAL · US</span> <strong>SpaceX × Reflection AI × Nvidia</strong>: $6.3 mil millones en computación durante 3.5 años. Nvidia está en ambos lados de la transacción.</li>\n      <li><span class=\"chip hot\">REG · EU/DE</span> <strong>Ley de IA de la UE</strong>: a partir del 02/08/2026 entran en vigencia obligaciones de transparencia (Art. 50) y competencias de sanción GPAI — multa hasta €15 millones o 3% de ingresos globales. La etapa de alto riesgo (Anexo III) fue postergada al 02/12/2027 por el paquete Digital Omnibus. El marco KI-MIG alemán convierte a Bundesnetzagentur en ejecutora.</li>\n      <li><span class=\"chip\">CONSUMER · US/BR</span> <strong>Google Finance</strong> obtiene app Android con \"Key Moments\" de Gemini explicando movimientos de precios. En paralelo: Google para Brasil buscando 1 millón+ PyMEs.</li>\n      <li><span class=\"chip good\">HEALTH · US</span> <strong>IA Ambiental en salud</strong>: ~2/3 de las clínicas Epic usan escribas de IA, Departamento de Veteranos de EE.UU. implementando en todo el sistema. 60–90 min/día ahorrados.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner</strong> ve software de agentes de IA en $206.5 mil millones en 2026 — con la acostumbrada nota de escepticismo.</li>\n      <li><span class=\"chip\">IDEAS · twiceD</span> <strong>Dos ideas de proyecto investigadas</strong>: un servicio de inventario de la Ley de IA de la UE y un documento sobre triaje de vulnerabilidades de PyMEs.</li>\n    </ul></div>"

h nicht extrahiert. HZD Wiesbaden (€54,9M) als Fallstudie: Frist 19.06. bereits abgelaufen.</li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Gruppenphase ist durch, und die zwei Mannschaften, die Daniel angehen, sind weiter: Deutschland als Erster der Gruppe E, Brasilien als Erster der Gruppe C. Am Montag steigt für Nagelsmann das erste K.-o.-Spiel der WM 2026 — voraussichtlich gegen Paraguay, aber das ist erst nach den heutigen und morgigen Schlussspielen amtlich. Heute Abend laufen noch die Entscheidungen in Gruppe H und I (Norwegen–Frankreich, Spanien–Uruguay). Bundesliga schläft bis August — also nebenbei: der Freiburger Torwart-Tausch.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Gruppensieg E:</strong> Deutschland 6 Punkte trotz 1:2 gegen Ecuador zum Abschluss — Sechzehntelfinale Mo 29.06, <strong>22:30 MESZ / 17:30 BRT</strong> in Foxborough/Boston.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Gegner:</strong> Paraguay zu ~99 % — aber offiziell erst nach Abschluss der letzten Gruppen (26.–27.06). Noch nicht in Stein gemeißelt.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasilien Erster der Gruppe C</strong> (7 Punkte, +6) — Sechzehntelfinale gegen Japan, Mo 29.06, <strong>19:00 MESZ / 14:00 BRT</strong> in Houston.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Vinícius Jr.:</strong> 4 Tore in 3 Spielen, erster Brasilianer seit Ronaldo/Rivaldo 2002 mit Tor in allen drei Gruppenspielen. Neymar zurück.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute Abend:</strong> Norwegen–Frankreich (21:00 MESZ / 16:00 BRT) und Spanien–Uruguay (02:00 MESZ / 21:00 BRT) — Gruppensieger H und I noch offen.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SC Freiburg:</strong> Mio Backhaus (22) aus Bremen für ~12–15 Mio. € — Vereinsrekord. Stammkeeper Atubolu will weg (Brighton, Milan im Gespräch).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Sommerpause:</strong> keine Liga-Spiele bis August 2026. Statt Tabelle heute die WM-Gruppentabellen E und C als Anker.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die Gruppenphase ist durch, und die zwei Mannschaften, die Daniel angehen, sind weiter: Deutschland als Erster der Gruppe E, Brasilien als Erster der Gruppe C. Am Montag steigt für Nagelsmann das erste K.-o.-Spiel der WM 2026 — voraussichtlich gegen Paraguay, aber das ist erst nach den heutigen und morgigen Schlussspielen amtlich. Heute Abend laufen noch die Entscheidungen in Gruppe H und I (Norwegen–Frankreich, Spanien–Uruguay). Bundesliga schläft bis August — also nebenbei: der Freiburger Torwart-Tausch.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Gruppensieg E:</strong> Deutschland 6 Punkte trotz 1:2 gegen Ecuador zum Abschluss — Sechzehntelfinale Mo 29.06, <strong>22:30 MESZ / 17:30 BRT</strong> in Foxborough/Boston.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Gegner:</strong> Paraguay zu ~99 % — aber offiziell erst nach Abschluss der letzten Gruppen (26.–27.06). Noch nicht in Stein gemeißelt.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasilien Erster der Gruppe C</strong> (7 Punkte, +6) — Sechzehntelfinale gegen Japan, Mo 29.06, <strong>19:00 MESZ / 14:00 BRT</strong> in Houston.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Vinícius Jr.:</strong> 4 Tore in 3 Spielen, erster Brasilianer seit Ronaldo/Rivaldo 2002 mit Tor in allen drei Gruppenspielen. Neymar zurück.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute Abend:</strong> Norwegen–Frankreich (21:00 MESZ / 16:00 BRT) und Spanien–Uruguay (02:00 MESZ / 21:00 BRT) — Gruppensieger H und I noch offen.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SC Freiburg:</strong> Mio Backhaus (22) aus Bremen für ~12–15 Mio. € — Vereinsrekord. Stammkeeper Atubolu will weg (Brighton, Milan im Gespräch).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Sommerpause:</strong> keine Liga-Spiele bis August 2026. Statt Tabelle heute die WM-Gruppentabellen E und C als Anker.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The group stage is done, and the two teams that matter to Daniel are through: Germany as Group E winners, Brazil as Group C winners. On Monday, Nagelsmann faces his first knockout game of the World Cup 2026 — likely against Paraguay, but that's only official after today's and tomorrow's final matches. Tonight, the decisive matches in Groups H and I are on (Norway–France, Spain–Uruguay). The Bundesliga is asleep until August — in the meantime: the Freiburg goalkeeper swap.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Group E victory:</strong> Germany 6 points despite losing 1:2 to Ecuador in the finale — Round of 32, Mon 29.06, <strong>22:30 MESZ / 17:30 BRT</strong> in Foxborough/Boston.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Opponent:</strong> Paraguay at ~99 % — but officially only after the last groups wrap (26–27.06). Not set in stone yet.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brazil tops Group C</strong> (7 points, +6 goal difference) — Round of 32 vs. Japan, Mon 29.06, <strong>19:00 MESZ / 14:00 BRT</strong> in Houston.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Vinícius Jr.:</strong> 4 goals in 3 matches, first Brazilian since Ronaldo/Rivaldo 2002 to score in all three group matches. Neymar back.</li>\n      <li><span class=\"chip\">WM</span> <strong>Tonight:</strong> Norway–France (21:00 MESZ / 16:00 BRT) and Spain–Uruguay (02:00 MESZ / 21:00 BRT) — Group H and I winners still to be decided.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SC Freiburg:</strong> Mio Backhaus (22) from Bremen for ~€12–15 million — club record. Keeper Noah Atubolu wants out (Brighton, Milan in talks).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Summer break:</strong> no league matches until August 2026. Instead of the table, today we're anchored to World Cup group standings from Groups E and C.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A fase de grupos acabou, e os dois times que importam para Daniel avançaram: Alemanha como primeira do Grupo E, Brasil como primeiro do Grupo C. Na segunda-feira, Nagelsmann enfrenta seu primeiro jogo eliminatório da Copa 2026 — provavelmente contra Paraguai, mas é apenas oficial depois dos jogos finais de hoje e amanhã. Nesta noite ainda há decisões nos Grupos H e I (Noruega–França, Espanha–Uruguai). Bundesliga dorme até agosto — portanto, enquanto isso: a troca de goleiro no Freiburg.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Primeiro do Grupo E:</strong> Alemanha 6 pontos apesar de perder 1:2 para Equador no fechamento — Dezesseis-avos seg 29.06, <strong>22:30 MESZ / 17:30 BRT</strong> em Foxborough/Boston.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Adversário:</strong> Paraguai em ~99% — mas oficialmente apenas após conclusão dos últimos grupos (26–27.06). Ainda não é certo.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasil primeiro do Grupo C</strong> (7 pontos, +6) — Dezesseis-avos contra Japão, seg 29.06, <strong>19:00 MESZ / 14:00 BRT</strong> em Houston.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Vinícius Jr.:</strong> 4 gols em 3 jogos, primeiro brasileiro desde Ronaldo/Rivaldo 2002 a marcar em todos os três jogos de grupo. Neymar volta.</li>\n      <li><span class=\"chip\">WM</span> <strong>Nesta noite:</strong> Noruega–França (21:00 MESZ / 16:00 BRT) e Espanha–Uruguai (02:00 MESZ / 21:00 BRT) — Primeiros dos Grupos H e I ainda não definidos.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SC Freiburg:</strong> Mio Backhaus (22) do Bremen por ~12–15 milhões de € — recorde do clube. Goleiro Atubolu quer sair (Brighton, Milan em conversa).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Recesso de verão:</strong> sem jogos da liga até agosto de 2026. Em vez da tabela, hoje temos as tabelas de grupos E e C da Copa do Mundo como âncora.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Terminó la fase de grupos, y los dos equipos que importan para Daniel avanzan: Alemania como campeona del Grupo E, Brasil como campeona del Grupo C. El lunes, Nagelsmann enfrenta su primer partido eliminatorio de la Copa 2026 — probablemente contra Paraguay, pero eso es oficial solo después de los partidos finales de hoy y mañana. Esta noche aún hay decisiones en los Grupos H e I (Noruega–Francia, España–Uruguay). La Bundesliga descansa hasta agosto — así que mientras tanto: el cambio de portero en Freiburg.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Ganadora Grupo E:</strong> Alemania 6 puntos a pesar de perder 1:2 contra Ecuador en el cierre — Dieciséisavos de final lun 29.06, <strong>22:30 MESZ / 17:30 BRT</strong> en Foxborough/Boston.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Rival:</strong> Paraguay al ~99% — pero oficialmente solo después que terminen los últimos grupos (26–27.06). Aún no es definitivo.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasil campeona del Grupo C</strong> (7 puntos, +6) — Dieciséisavos de final contra Japón, lun 29.06, <strong>19:00 MESZ / 14:00 BRT</strong> en Houston.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Vinícius Jr.:</strong> 4 goles en 3 partidos, primer brasileño desde Ronaldo/Rivaldo 2002 en anotar en los tres partidos de grupo. Neymar regresa.</li>\n      <li><span class=\"chip\">WM</span> <strong>Esta noche:</strong> Noruega–Francia (21:00 MESZ / 16:00 BRT) y España–Uruguay (02:00 MESZ / 21:00 BRT) — Campeonas de Grupos H e I aún por definirse.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SC Freiburg:</strong> Mio Backhaus (22) de Bremen por ~12–15 millones € — récord del club. Portero Atubolu quiere irse (Brighton, Milan en conversaciones).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Receso estival:</strong> sin partidos de liga hasta agosto 2026. En lugar de la tabla, hoy tenemos las tablas de grupos E y C de la Copa como referencia.</li>\n    </ul></div>"

   <li><span class=\"chip hot\">MotoGP-WM</span> <strong>Bezzecchi 180, Martin 172 (&minus;8), Di&nbsp;Giannantonio 157, Márquez 140 (&minus;40)</strong> — Aprilia stellt die Top&nbsp;2, aber Márquez holte zuletzt 62&nbsp;Punkte in zwei Rennen auf.</li>\n      <li><span class=\"chip\">F1-Konstrukteure</span> <strong>Mercedes 262</strong> vor Ferrari (190, &minus;72) und McLaren (141). Der Team-Titel sitzt fester in Mercedes-Hand als der Fahrer-Titel.</li>\n      <li><span class=\"chip\">DOPPEL-SONNTAG</span> <strong>Beide Hauptrennen am So 28.06.</strong> — MotoGP 14:00 MESZ / 09:00 BRT, F1 15:00 MESZ / 10:00 BRT. MotoGP-Sprint schon Sa 27.06. um 15:00 MESZ / 10:00 BRT.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today, <strong>both premier classes</strong> take to the track: In Formula&nbsp;1, the <strong>Austrian Grand Prix</strong> at the Red&nbsp;Bull&nbsp;Ring (race 8/22) kicks off with two Friday practice sessions, and simultaneously, <strong>MotoGP</strong> begins the Dutch TT weekend in Assen (race 10/22). In F1, <strong>Kimi Antonelli</strong> leads with 156&nbsp;points, but after his Barcelona crash, just <strong>41</strong> ahead of Hamilton, who scored his first Ferrari win there at age 41. In MotoGP, it's tighter: <strong>Bezzecchi</strong> (180) leads after returning from his Brno suspension by just 8&nbsp;points over Martin (172), with Márquez (140) pressing hard. <strong>No lap times today</strong> — the practice sessions are just starting. All times in two zones: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · TODAY</span> <strong>FP1 13:30 MESZ / 08:30 BRT, FP2 17:00 MESZ / 12:00 BRT</strong> at the Red&nbsp;Bull&nbsp;Ring. These are the <strong>first practice sessions of the weekend</strong> — no lap times were available at deadline.</li>\n      <li><span class=\"chip\">F1 · WILDCARD</span> <strong>Thin air meets new power units:</strong> Spielberg sits at 678&nbsp;m (~8&nbsp;% thinner air), and the 2026 engines lack the MGU-H that used to support the turbo at altitude. This hits manufacturers unevenly — a real unknown.</li>\n      <li><span class=\"chip\">F1 · FERRARI</span> <strong>Leclerc skips FP1</strong> — Ferrari hands its car for the first practice to rookie <strong>Dino Beganovic</strong>. Mercedes arrives with reported power-unit reliability concerns.</li>\n      <li><span class=\"chip hot\">MotoGP · ASSEN</span> <strong>Bezzecchi was banned in Brno</strong> (hit a track marshal) and is back in Assen. First sign: He led FP1 Friday morning, while <strong>Márquez crashed</strong>.</li>\n      <li><span class=\"chip hot\">MotoGP-WM</span> <strong>Bezzecchi 180, Martin 172 (&minus;8), Di&nbsp;Giannantonio 157, Márquez 140 (&minus;40)</strong> — Aprilia holds the top 2, but Márquez grabbed 62&nbsp;points in two races recently.</li>\n      <li><span class=\"chip\">F1-Constructors</span> <strong>Mercedes 262</strong> ahead of Ferrari (190, &minus;72) and McLaren (141). The team title is safer in Mercedes hands than the driver's title.</li>\n      <li><span class=\"chip\">DOUBLE SUNDAY</span> <strong>Both main races on Sun 28.06.</strong> — MotoGP 14:00 MESZ / 09:00 BRT, F1 15:00 MESZ / 10:00 BRT. MotoGP Sprint already on Sat 27.06. at 15:00 MESZ / 10:00 BRT.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje, <strong>ambas as categorias principais</strong> entram em pista: Na Fórmula&nbsp;1, o <strong>Grande Prêmio da Áustria</strong> no circuito do Red&nbsp;Bull&nbsp;Ring (corrida 8/22) começa com dois treinos livres de sexta, enquanto isso, a <strong>MotoGP</strong> inicia o fim de semana da Holanda em Assen (corrida 10/22). Na F1, <strong>Kimi Antonelli</strong> lidera com 156&nbsp;pontos, mas após seu abandono em Barcelona, apenas <strong>41</strong> na frente de Hamilton, que conquistou sua primeira vitória pela Ferrari aos 41 anos. Na MotoGP, está mais acirrado: <strong>Bezzecchi</strong> (180) lidera após voltar de seu banimento de Brno com apenas 8&nbsp;pontos sobre Martin (172), enquanto Márquez (140) pressiona por trás. <strong>Sem voltas cronometradas hoje</strong> — as sessões de treino estão começando. Todos os horários em dois fusos: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · HOJE</span> <strong>TL1 13:30 MESZ / 08:30 BRT, TL2 17:00 MESZ / 12:00 BRT</strong> no circuito do Red&nbsp;Bull&nbsp;Ring. São os <strong>primeiros treinos do fim de semana</strong> — nenhuma volta cronometrada estava disponível no fechamento.</li>\n      <li><span class=\"chip\">F1 · SURPRESA</span> <strong>Ar rarefeito encontra novas unidades de potência:</strong> Spielberg fica a 678&nbsp;m (~8&nbsp;% de ar mais rarefeito), e os motores de 2026 não têm mais MGU-H para suportar o turbo na altitude. Isso afeta os fabricantes desigualmente — uma verdadeira incógnita.</li>\n      <li><span class=\"chip\">F1 · FERRARI</span> <strong>Leclerc pula o TL1</strong> — Ferrari entrega o carro para o primeiro treino ao estreante <strong>Dino Beganovic</strong>. Mercedes chega com problemas relatados de confiabilidade da unidade de potência.</li>\n      <li><span class=\"chip hot\">MotoGP · ASSEN</span> <strong>Bezzecchi foi banido em Brno</strong> (atingiu um assistente de pista) e volta em Assen. Primeiro sinal: ele liderou o TL1 da sexta de manhã, enquanto <strong>Márquez caiu</strong>.</li>\n      <li><span class=\"chip hot\">MotoGP-CM</span> <strong>Bezzecchi 180, Martin 172 (&minus;8), Di&nbsp;Giannantonio 157, Márquez 140 (&minus;40)</strong> — Aprilia tem os dois primeiros, mas Márquez fez 62&nbsp;pontos em duas corridas recentemente.</li>\n      <li><span class=\"chip\">F1-Construtores</span> <strong>Mercedes 262</strong> na frente de Ferrari (190, &minus;72) e McLaren (141). O título de equipes está mais seguro nas mãos da Mercedes que o título de pilotos.</li>\n      <li><span class=\"chip\">DOMINGO DUPLO</span> <strong>Ambas as corridas principais no dom 28.06.</strong> — MotoGP 14:00 MESZ / 09:00 BRT, F1 15:00 MESZ / 10:00 BRT. Sprint MotoGP já no sáb 27.06. às 15:00 MESZ / 10:00 BRT.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy, <strong>ambas las categorías principales</strong> salen a pista: En Fórmula&nbsp;1, el <strong>Gran Premio de Austria</strong> en el Red&nbsp;Bull&nbsp;Ring (carrera 8/22) comienza con dos sesiones de entrenamiento del viernes, mientras que simultáneamente la <strong>MotoGP</strong> inicia el fin de semana del TT Holandés en Assen (carrera 10/22). En F1, <strong>Kimi Antonelli</strong> lidera con 156&nbsp;puntos, pero tras su abandono en Barcelona, solo <strong>41</strong> por delante de Hamilton, quien logró su primera victoria con Ferrari a los 41 años. En MotoGP está más cerrado: <strong>Bezzecchi</strong> (180) lidera tras regresar de su suspensión de Brno solo 8&nbsp;puntos sobre Martin (172), con Márquez (140) presionando desde atrás. <strong>Sin vueltas cronometradas hoy</strong> — las sesiones de entrenamiento acaban de comenzar. Todos los horarios en dos zonas: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · HOY</span> <strong>EL1 13:30 MESZ / 08:30 BRT, EL2 17:00 MESZ / 12:00 BRT</strong> en el Red&nbsp;Bull&nbsp;Ring. Son los <strong>primeros entrenamientos del fin de semana</strong> — no había vueltas cronometradas disponibles en cierre.</li>\n      <li><span class=\"chip\">F1 · SORPRESA</span> <strong>Aire delgado encuentra nuevas unidades de potencia:</strong> Spielberg está a 678&nbsp;m (~8&nbsp;% aire más delgado), y los motores de 2026 ya no tienen MGU-H para soportar el turbo en altitud. Esto afecta a los fabricantes desigualmente — una verdadera incógnita.</li>\n      <li><span class=\"chip\">F1 · FERRARI</span> <strong>Leclerc se salta el EL1</strong> — Ferrari entrega su auto para el primer entrenamiento al novato <strong>Dino Beganovic</strong>. Mercedes llega con problemas reportados de confiabilidad de la unidad de potencia.</li>\n      <li><span class=\"chip hot\">MotoGP · ASSEN</span> <strong>Bezzecchi fue suspendido en Brno</strong> (golpeó un marshal) y regresa en Assen. Primer indicio: lideró el EL1 viernes por la mañana, mientras <strong>Márquez se cayó</strong>.</li>\n      <li><span class=\"chip hot\">MotoGP-CM</span> <strong>Bezzecchi 180, Martin 172 (&minus;8), Di&nbsp;Giannantonio 157, Márquez 140 (&minus;40)</strong> — Aprilia ocupa los dos primeros lugares, pero Márquez sumó 62&nbsp;puntos en dos carreras recientemente.</li>\n      <li><span class=\"chip\">F1-Constructores</span> <strong>Mercedes 262</strong> adelante de Ferrari (190, &minus;72) y McLaren (141). El título de equipos está más asegurado en manos de Mercedes que el título de pilotos.</li>\n      <li><span class=\"chip\">DOMINGO DOBLE</span> <strong>Ambas carreras principales el dom 28.06.</strong> — MotoGP 14:00 MESZ / 09:00 BRT, F1 15:00 MESZ / 10:00 BRT. Sprint de MotoGP ya el sáb 27.06. a las 15:00 MESZ / 10:00 BRT.</li>\n    </ul></div>"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Sonniger, trockener Winter — perfekt für Ausflüge, aber kalt am Morgen. Das Wochenende hat ein starkes Theater-Highlight in Londrina und zwei große Festas vor der Tür. Zugleich steht Paraná im Atemwegs-Hochrisiko: Mit einem vier Wochen alten Mädchen im Haus ist das diese Woche die wichtigste Zeile.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>Paraná auf „Hochrisiko\" für schwere Atemwegsinfekte</strong>: RSV trifft vor allem Babys unter 6 Monaten. Schutz-Tipps unten.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Trocken &amp; sonnig</strong>: Sa 24°, So 26°, 0 % Regen — morgens aber nur 15°, dick anziehen.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>„A Saga do Gelo Musical\" (Frozen)</strong>: Sa 15:00, Teatro Marista Londrina, R$ 90 — das Wochenend-Highlight für die Großen.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>Hora do Conto (Geschichten)</strong> im SESC Londrina, samstags, gratis — kleiner, ruhiger, kostenlos.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Festas vor der Tür</strong>: 28ª Fescafé hier in Ribeirão Claro (2.–5.7.), 31ª FETEXAS in Jacarezinho (9.–12.7., gratis).</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Winterferien Paraná</strong>: 13.–26. Juli — schon mal vormerken für die Planung.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue diesen Sommer entspannt</strong>: −96 % gegenüber 2025 — eine seltene gute Nachricht.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Sunny, dry winter — perfect for outings, but cold mornings. The weekend has a strong theater highlight in Londrina and two big festivals coming up. At the same time, Paraná is at high respiratory risk: with a four-week-old girl in the house, this is the week's most important line.</p>\n    <ul>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>Paraná on \"high risk\" for severe respiratory infections</strong>: RSV hits babies under 6 months especially hard. Protection tips below.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Dry &amp; sunny</strong>: Sat 24°, Sun 26°, 0% rain — but only 15° in the morning, bundle up.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>\"A Saga do Gelo Musical\" (Frozen)</strong>: Sat 3:00 PM, Teatro Marista Londrina, R$ 90 — the weekend highlight for the older kids.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>Hora do Conto (Story Hour)</strong> at SESC Londrina, Saturdays, free — smaller, quieter, no cost.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Festivals ahead</strong>: 28th Fescafé here in Ribeirão Claro (July 2–5), 31st FETEXAS in Jacarezinho (July 9–12, free).</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Paraná winter break</strong>: July 13–26 — mark it down for family planning.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue this summer relaxed</strong>: −96% versus 2025 — a rare good-news story.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Inverno ensolarado e seco — perfeito para passeios, mas manhãs frias. O fim de semana traz um grande destaque de teatro em Londrina e duas grandes festas à vista. Ao mesmo tempo, o Paraná enfrenta alto risco respiratório: com uma menina de quatro semanas em casa, essa é a linha mais importante da semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Paraná em \"alto risco\" para infecções respiratórias graves</strong>: VSR atinge principalmente bebês menores de 6 meses. Dicas de proteção abaixo.</li>\n      <li><span class=\"chip\">TEMPO</span> <strong>Seco &amp; ensolarado</strong>: Sáb 24°, Dom 26°, 0% de chuva — mas apenas 15° pela manhã, vista casacos.</li>\n      <li><span class=\"chip good\">EVENTO</span> <strong>\"A Saga do Gelo Musical\" (Frozen)</strong>: Sáb 15:00, Teatro Marista Londrina, R$ 90 — o destaque do fim de semana para os maiores.</li>\n      <li><span class=\"chip good\">EVENTO</span> <strong>Hora do Conto (Histórias)</strong> no SESC Londrina, sábados, grátis — menor, mais tranquilo, sem custo.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Festas à vista</strong>: 28ª Fescafé aqui em Ribeirão Claro (2–5 jul.), 31ª FETEXAS em Jacarezinho (9–12 jul., entrada franca).</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Férias de inverno Paraná</strong>: 13–26 de julho — já marque para planejar.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue neste verão tranquilo</strong>: −96% contra 2025 — uma rara notícia positiva.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Invierno soleado y seco — perfecto para paseos, pero mañanas frías. El fin de semana tiene un gran destaque de teatro en Londrina y dos grandes fiestas en el horizonte. Al mismo tiempo, Paraná está en alto riesgo respiratorio: con una niña de cuatro semanas en casa, esta es la línea más importante de la semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Paraná en \"alto riesgo\" para infecciones respiratorias graves</strong>: VRS afecta especialmente a bebés menores de 6 meses. Consejos de protección abajo.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Seco &amp; soleado</strong>: Sáb 24°, Dom 26°, 0% lluvia — pero solo 15° en la mañana, abríguense bien.</li>\n      <li><span class=\"chip good\">EVENTO</span> <strong>\"A Saga do Gelo Musical\" (Frozen)</strong>: Sáb 15:00, Teatro Marista Londrina, R$ 90 — el destaque del fin de semana para los niños mayores.</li>\n      <li><span class=\"chip good\">EVENTO</span> <strong>Hora do Conto (Cuentacuentos)</strong> en SESC Londrina, sábados, gratis — más tranquilo, más pequeño, sin costo.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Fiestas en el horizonte</strong>: 28ª Fescafé aquí en Ribeirão Claro (2–5 jul.), 31ª FETEXAS en Jacarezinho (9–12 jul., entrada gratis).</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Vacaciones de invierno Paraná</strong>: 13–26 de julio — ya marquen para planificar.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue este verano tranquilo</strong>: −96% vs. 2025 — una rara buena noticia.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Mittwoch, der 25. Juni — Wochenthema <em>Familie &amp; Alltag</em>, heute mit dem Schwerpunkt <em>Schule, Lernen &amp; Kinder-Bildung</em>. Genau das Vokabular, mit dem du im Norte Pioneiro über die Schule deiner Kinder reden kannst: einen <em>Elternabend</em> mitnehmen, die <em>Hausaufgaben</em> besprechen, der <em>professora</em> auf PT-BR sagen, dass dein Kind <em>neugierig</em> und <em>aufmerksam</em> ist. 32 neue Einträge, 14 Verben mit voller Konjugation, 3 Wiederholungen aus dem Organisations-Tag vom 3. Juni (<em>erledigen, sich kümmern, der Schulausflug</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Gymnasium ≠ gym</strong> — das DE <em>Gymnasium</em> ist die akademische Oberschule (Abi-Zweig). EN <em>gymnasium</em>, PT <em>ginásio</em>, ES <em>gimnasio</em> = Turnhalle/Fitness. „Mein Sohn geht aufs Gymnasium\" heißt PT <em>vai para o colégio / o ensino médio</em>, ES <em>va al bachillerato</em> — niemals <em>ginásio/gimnasio</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Note = Schul-Note</strong>, aber EN <em>note</em> = Notiz. Schulnote ist EN <em>grade</em>, PT <em>nota</em> (passt!), ES-MX <em>calificación</em>. Die Musik-Note ist in allen vieren dieselbe — Kontext entscheidet.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE lesen</strong> ist stark mit e→ie im Präsens: <em>ich lese, aber du liest / er liest</em>; Präteritum <em>las</em>, Perfekt <em>habe gelesen</em>. PT <em>ler</em> ebenfalls unregelmäßig: <em>eu leio, você lê, nós lemos</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE schreiben</strong> stark, ei–ie–ie: <em>schreibe / schrieb / habe geschrieben</em>. ES <em>escribir</em> hat ein unregelmäßiges Partizip: <em>escrito</em> (nicht <em>*escribido</em>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE helfen</strong> stark mit e→i: <em>ich helfe, aber du hilfst / er hilft</em>; Präteritum <em>half</em>, Perfekt <em>habe geholfen</em>. PT <em>ajudar</em> / ES <em>ayudar</em> regelmäßig.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE vergessen</strong> stark mit e→i: <em>du vergisst / er vergisst</em>; Präteritum <em>vergaß</em>. PT <em>esquecer</em> hat den Schreibwechsel c→ç vor a/o: <em>eu esqueço, que eu esqueça</em> — erhält den weichen ç-Laut.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES explicar &amp; praticar/practicar</strong> tragen den c→qu-Wechsel vor e: <em>eu expliquei / pratiquei</em>, <em>yo expliqué / practiqué</em>, Subjunktiv <em>explique / pratique / practique</em>. Erhält den /k/-Laut.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>das Heft (n), die Schultasche (f), der Schüler (m)</strong> — drei Genera. PT: <em>o caderno (m), a mochila (f), o aluno (m)</em>; ES-MX: <em>el cuaderno, la mochila, el alumno</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>dever de casa / tarefa de casa</strong> — Brasilianer sagen beides für „Hausaufgaben\"; <em>dever de casa</em> ist die häufigere Sprechform. ES-MX: <em>la tarea</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>sala de aula</strong> (Klassenzimmer), <em>a prova</em> (Prüfung), <em>o boletim</em> (Zeugnis), <em>o recreio</em> (Pause). Lehrer = <em>o professor / a professora</em>; Brasilianer reden ihre Lehrer respektvoll mit „professora\" an.</li>\n      <li><span class=\"chip\">ES-MX</span> <strong>calificación, pizarrón, salón de clases</strong> — Mexiko weicht ab: Schul-Note = <em>calificación</em> (nicht <em>nota</em>), Tafel = <em>pizarrón</em> (nicht <em>pizarra</em>), Klassenzimmer = <em>salón de clases</em> (nicht <em>aula</em>). Lehrer = <em>el maestro</em> (informell) / <em>el profesor</em> (formell).</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Darf ich auf die Toilette?</strong> = <em>Posso ir ao banheiro?</em> (BR-PT: <em>banheiro</em>, nicht <em>casa de banho</em>) = <em>¿Puedo ir al baño?</em> (ES-MX: <em>baño</em>, nicht <em>servicio</em>). Der Klassiker für jedes Schulkind.</li>\n    </ul></div>",

ht <em>casa de banho</em>) = <em>¿Puedo ir al baño?</em> (ES-MX: <em>baño</em>, nicht <em>servicio</em>). Der Klassiker für jedes Schulkind.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Wednesday, June 25 — weekly theme <em>Family &amp; Daily Life</em>, today's focus: <em>School, Learning &amp; Children's Education</em>. The exact vocabulary you need to talk about your children's schooling in the Norte Pioneiro: attending a <em>parents' evening</em>, discussing <em>homework</em>, telling the <em>professora</em> in PT-BR that your child is <em>curious</em> and <em>attentive</em>. 32 new entries, 14 verbs with full conjugation, 3 reviews from the Organization Day of June 3 (<em>erledigen, sich kümmern, der Schulausflug</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Gymnasium ≠ gym</strong> — the German <em>Gymnasium</em> is the academic secondary school (university-track). EN <em>gymnasium</em>, PT <em>ginásio</em>, ES <em>gimnasio</em> = sports hall / fitness center. \"Mein Sohn geht aufs Gymnasium\" translates to PT <em>vai para o colégio / o ensino médio</em>, ES <em>va al bachillerato</em> — never <em>ginásio/gimnasio</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Note = school grade</strong>, but EN <em>note</em> = a written note. The school grade is EN <em>grade</em>, PT <em>nota</em> (a match!), ES-MX <em>calificación</em>. The musical note is the same in all four languages — context decides.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE lesen</strong> is a strong verb with e→ie in the present: <em>ich lese, aber du liest / er liest</em>; simple past <em>las</em>, perfect <em>habe gelesen</em>. PT <em>ler</em> is equally irregular: <em>eu leio, você lê, nós lemos</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE schreiben</strong> strong, ei–ie–ie: <em>schreibe / schrieb / habe geschrieben</em>. ES <em>escribir</em> has an irregular past participle: <em>escrito</em> (not <em>*escribido</em>).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE helfen</strong> strong with e→i: <em>ich helfe, aber du hilfst / er hilft</em>; simple past <em>half</em>, perfect <em>habe geholfen</em>. PT <em>ajudar</em> / ES <em>ayudar</em> are regular.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE vergessen</strong> strong with e→i: <em>du vergisst / er vergisst</em>; simple past <em>vergaß</em>. PT <em>esquecer</em> has the spelling shift c→ç before a/o: <em>eu esqueço, que eu esqueça</em> — preserving the soft ç sound.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT/ES explicar &amp; praticar/practicar</strong> carry the c→qu shift before e: <em>eu expliquei / pratiquei</em>, <em>yo expliqué / practiqué</em>, subjunctive <em>explique / pratique / practique</em>. Preserves the /k/ sound.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>das Heft (n), die Schultasche (f), der Schüler (m)</strong> — three genders. PT: <em>o caderno (m), a mochila (f), o aluno (m)</em>; ES-MX: <em>el cuaderno, la mochila, el alumno</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>dever de casa / tarefa de casa</strong> — Brazilians use both for \"homework\"; <em>dever de casa</em> is the more common spoken form. ES-MX: <em>la tarea</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>sala de aula</strong> (classroom), <em>a prova</em> (exam), <em>o boletim</em> (report card), <em>o recreio</em> (recess). Teacher = <em>o professor / a professora</em>; Brazilians address their teachers respectfully as \"professora\".</li>\n      <li><span class=\"chip\">ES-MX</span> <strong>calificación, pizarrón, salón de clases</strong> — Mexico diverges: school grade = <em>calificación</em> (not <em>nota</em>), board = <em>pizarrón</em> (not <em>pizarra</em>), classroom = <em>salón de clases</em> (not <em>aula</em>). Teacher = <em>el maestro</em> (informal) / <em>el profesor</em> (formal).</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Darf ich auf die Toilette?</strong> = <em>Posso ir ao banheiro?</em> (BR-PT: <em>banheiro</em>, not <em>casa de banho</em>) = <em>¿Puedo ir al baño?</em> (ES-MX: <em>baño</em>, not <em>servicio</em>). The classroom classic for every schoolchild.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Quarta-feira, 25 de junho — tema semanal <em>Família &amp; Cotidiano</em>, hoje com foco em <em>Escola, Aprendizado &amp; Educação Infantil</em>. Exatamente o vocabulário que você precisa para falar sobre a escola dos seus filhos no Norte Pioneiro: participar de uma <em>Elternabend</em> (reunião de pais), discutir o <em>dever de casa</em>, dizer à <em>professora</em> que seu filho é <em>curioso</em> e <em>atento</em>. 32 novos verbetes, 14 verbos com conjugação completa, 3 revisões do Dia de Organização de 3 de junho (<em>erledigen, sich kümmern, der Schulausflug</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>DE Gymnasium ≠ ginásio</strong> — o <em>Gymnasium</em> alemão é o colégio acadêmico (rumo ao Abitur). EN <em>gymnasium</em>, PT <em>ginásio</em>, ES <em>gimnasio</em> = academia/quadra esportiva. \"Mein Sohn geht aufs Gymnasium\" em PT é <em>vai para o colégio / o ensino médio</em>, em ES <em>va al bachillerato</em> — nunca <em>ginásio</em>.</li>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>DE Note = nota escolar</strong>, mas EN <em>note</em> = bilhete/anotação. A nota escolar em EN é <em>grade</em>, em PT é <em>nota</em> (coincide!), em ES-MX é <em>calificación</em>. A nota musical é igual nas quatro — o contexto decide.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>DE lesen</strong> é um verbo forte com e→ie no presente: <em>ich lese, aber du liest / er liest</em>; pretérito simples <em>las</em>, perfeito <em>habe gelesen</em>. PT <em>ler</em> também irregular: <em>eu leio, você lê, nós lemos</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>DE schreiben</strong> forte, ei–ie–ie: <em>schreibe / schrieb / habe geschrieben</em>. ES <em>escribir</em> tem particípio irregular: <em>escrito</em> (não <em>*escribido</em>).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>DE helfen</strong> forte com e→i: <
