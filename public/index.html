<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">

    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red

             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

        <span class="nav-label-text">Übersicht</span>

      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

        "en": "<div class=\"tldr\"><p class=\"lead\">Quiet FX weekend: the last tradable rate before the pause was a <strong>firmer real</strong> — EUR/BRL 5.9486, USD/BRL 5.1962 (both ECB/Frankfurter, Friday July 3). The dollar index is trading slightly higher today (100.97), but that's a separate reading three days newer — not a signal that the real opens weaker on Monday. This week's real story isn't a rate number: it's the sheer size of the money stream now flowing into AI — and that it's starting to seep into classic macro metrics.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9486</strong> (ECB fix Fri Jul 3) — cross-rate check internally consistent (0.0% deviation). Not a weekend fix, this is the Monday anchor.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1962</strong> (Frankfurter, Fri Jul 3). Real firmer over the week — for euro conversion, better to wait than rush.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.97</strong> (TradingEconomics, Sun Jul 6) — slightly firmer, +0.9% over the month. Early-warning signal, but only yellow today.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>OpenAI IPO</strong>: confidential S-1 filed with the SEC, target September, valuation disputed — sources range from $730B to over $1T.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>5% of OpenAI for the US government?</strong> Alaska-fund-style proposal to Lutnick &amp; Bessent — conceptual, ~$42.6B equivalent.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Record VC: $510B in H1 2026</strong> — more than all of 2025. OpenAI + Anthropic alone $217B (43%).</li>\n      <li><span class=\"chip good\">USA</span> <strong>Amazon chips = a $20B business</strong> (annual run rate, Q1). In-house silicon as a quiet macro force.</li>\n      <li><span class=\"chip\">Forecast</span> <strong>EUR/BRL this week 5.88–6.00</strong> (65%) — slightly directional, low on catalysts. Most likely ~5.95.</li>\n      <li><span class=\"chip\">Note</span> Probabilities below are <strong>my confidence</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Fim de semana tranquilo no câmbio: a última cotação negociável antes da pausa foi um <strong>real mais forte</strong> — EUR/BRL 5,9486, USD/BRL 5,1962 (ambas BCE/Frankfurter, sexta-feira 03/07). O índice do dólar está hoje levemente mais alto (100,97), mas essa é uma leitura separada, três dias mais recente — não é sinal de que o real abre mais fraco na segunda. A verdadeira história da semana não é um número de juros: é o tamanho puro do fluxo de dinheiro que está indo para a IA agora — e que ele começa a vazar para indicadores macro clássicos.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,9486</strong> (fixing do BCE, sex 03/07) — checagem de câmbio cruzado internamente consistente (0,0% de desvio). Não é um fixing de fim de semana, é a âncora de segunda-feira.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>USD/BRL 5,1962</strong> (Frankfurter, sex 03/07). Real mais forte na semana — para câmbio de euros, melhor esperar do que apressar.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 100,97</strong> (TradingEconomics, dom 06/07) — levemente mais forte, +0,9% no mês. Sinal de alerta precoce, mas hoje só amarelo.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>IPO da OpenAI</strong>: S-1 confidencial protocolado na SEC, meta setembro, avaliação disputada — fontes variam de US$ 730 bi a mais de US$ 1 tri.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>5% da OpenAI para o governo dos EUA?</strong> Proposta no estilo do fundo do Alasca a Lutnick e Bessent — conceitual, equivalente a ~US$ 42,6 bi.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Recorde de VC: US$ 510 bi no 1º semestre de 2026</strong> — mais do que todo o 2025. OpenAI + Anthropic sozinhas: US$ 217 bi (43%).</li>\n      <li><span class=\"chip good\">EUA</span> <strong>Chips da Amazon = negócio de US$ 20 bi</strong> (taxa anual, T1). Silício próprio pan class=\"chip good\">BITCOIN</span> <strong>BTC ~63.400 $</strong> — der +221,7-Mio.-$-ETF-Zufluss vom 02.07. hält, 10-Tage-Abfluss-Serie gebrochen. Boden-These lebt weiter.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.775 $</strong> (Cap ~214 Mrd. $) — folgt BTC, weniger relative Dynamik als letzte Woche.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~4.153 $/oz</strong> (−0,40 %, 06.07.) — leicht schwächer, aber hält das erhöhte Niveau; weicher Arbeitsmarkt trägt.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~71,84 $</strong> (−0,36 %), WTI ~68,68 $ (−0,12 %, 06.07.) — nahe Tiefs seit Ende Februar, Hormuz entspannt.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Memecoins fest (DOGE 0,0768 $, +5,2 % 7d; PEPE +14,7 % 7d), AI-Token TAO 213 $, RENDER 1,60 $, FET 0,171 $, NEAR 1,99 $.</li>\n    </ul></div>",

07-02 holds, 10-day outflow streak broken. Bottom thesis lives on.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~$1,775</strong> (cap ~$214B) — tracking BTC, less relative momentum than last week.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~$4,153/oz</strong> (-0.40%, 07-06) — slightly weaker but holding the elevated level; soft labor market supports.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$71.84</strong> (-0.36%), WTI ~$68.68 (-0.12%, 07-06) — near lows since late February, Hormuz tensions easing.</li>\n      <li><span class=\"chip\">SECTORS</span> Memecoins firm (DOGE $0.0768, +5.2% 7d; PEPE +14.7% 7d), AI tokens TAO $213, RENDER $1.60, FET $0.171, NEAR $1.99.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O feriado acabou, o pregão voltou a viver — e traz duas histórias estruturais, não solavancos diários. Primeiro: a OpenAI discute ceder ao governo dos EUA uma <strong>participação de 5% no valor de ~US$ 42,6 bi</strong>, inspirada no fundo do petróleo do Alasca — com base em uma avaliação de US$ 852 bi e um IPO cujo cronograma a própria OpenAI deixa explicitamente <em>em aberto</em> (\"ainda pode demorar\"), mesmo que outras reportagens apontem para setembro. Segundo: <strong>a SpaceX (SPCX) entra no Nasdaq-100 na terça-feira, 7 de julho</strong> — o que obriga os fundos indexados ao QQQ a compras forçadas estimadas em <strong>US$ 4,3 bi</strong> em uma ação com apenas 3-5% de free float: um catalisador mecânico e datado para amanhã. Além disso, o mercado americano sobe de forma ampla (Dow +1,1%), mas a tecnologia fica para trás (Nasdaq-100 −1,6%) — a rotação para fora da tecnologia continua. Nas criptos, a virada dos ETFs se mantém: Bitcoin ~US$ 63.400, e a entrada de +US$ 221,7 mi de 2 de julho não se reverteu. Os chips da Amazon superam US$ 20 bi de receita anualizada — a tese silenciosa da AMZN.</p>\n    <ul>\n      <li><span class=\"chip hot\">OPENAI</span> <strong>Participação de 5% ao governo ~US$ 42,6 bi</strong> em discussão (base: avaliação de US$ 852 bi) — cronograma do IPO oficialmente <strong>indefinido</strong>, meta de setembro só em reportagens de terceiros.</li>\n      <li><span class=\"chip hot\">SPACEX</span> <strong>SPCX entra no Nasdaq-100 em 07/07</strong> — ~US$ 4,3 bi em compras forçadas do QQQ em apenas 3-5% de free float: catalisador mecânico de squeeze amanhã.</li>\n      <li><span class=\"chip good\">AMAZON</span> <strong>Chips próprios &gt; US$ 20 bi de receita anualizada</strong> (+100% na comparação anual) — hipoteticamente US$ 50 bi como negócio isolado; a AWS negocia venda externa de Trainium. Tese silenciosa de infraestrutura da AMZN.</li>\n      <li><span class=\"chip\">AÇÕES</sp       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Monatswechsel hat es in sich: Microsoft dreht zum 1. Juli an der M365-Preisschraube, ein anonymer Forscher kippt über 100 unpatchte Zero-Day-Exploits ins Netz, und drei große Patch-Wellen (UniFi, SharePoint, Chrome) rollen praktisch am selben Tag an. Kein „heute Nacht patchen\"-Alarm — aber ein Tag, an dem sich das Aufräumen lohnt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Exploitarium</strong>: anonymer Forscher „bikini\" veröffentlicht 100+ unpatchte Zero-Day-PoCs quer über 22–24 OSS-Projekte (Firefox, Docker, PHP, libssh2, Gitea) — ohne Hersteller-Vorwarnung. Inzwischen sind rund 13 CVEs vergeben (Stand 2. Juli 2026).</li>\n      <li><span class=\"chip hot\">Preis</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: Commercial-Preise seit 1. Juli hoch — Business Basic +16 %, Standard +12 %, E3 +8 %, E5 +5 %, Frontline bis +33 %. Bestandskunden zahlen erst ab der nächsten Verlängerung.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi</strong>: Bulletin 066 schließt 25 Lücken; CVE-2026-50746 (UniFi Connect) mit CVSS 10.0 — Command-Injection allein über Netzzugang, kein Login nötig.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: SharePoint-RCE CVE-2026-45659 (CVSS 8.8) aufgenommen, aktiv ausgenutzt — ein Angreifer mit bloßer „Site Member\"-Berechtigung reicht. Federal-Frist war der 4. Juli.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Web</span> <strong>Chrome 150</strong>: 382 Schwachstellen gestopft (15 Critical), darunter ein High-Sandbox-Escape (CVE-2026-13789). Zweite XXL-Runde in Folge.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> und 22.1.0-next.4 am 1. Juli — reine Point-Releases, nichts, was drängt.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU Cyber Resilience Act</strong>: die Meldepflicht für ausgenutzte Lücken (Art. 14) wird zum 11. September scharf — jetzt Prozesse aufsetzen.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">BR</span> <strong>Nubank</strong> beendet fünf Jahre Vollremote — ab 1. Juli hybrid, zwei Tage Büro, ab Januar drei.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Monatswechsel hat es in sich: Microsoft dreht zum 1. Juli an der M365-Preisschraube, ein anonymer Forscher kippt über 100 unpatchte Zero-Day-Exploits ins Netz, und drei große Patch-Wellen (UniFi, SharePoint, Chrome) rollen praktisch am selben Tag an. Kein „heute Nacht patchen\"-Alarm — aber ein Tag, an dem sich das Aufräumen lohnt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Exploitarium</strong>: anonymer Forscher „bikini\" veröffentlicht 100+ unpatchte Zero-Day-PoCs quer über 22–24 OSS-Projekte (Firefox, Docker, PHP, libssh2, Gitea) — ohne Hersteller-Vorwarnung. Inzwischen sind rund 13 CVEs vergeben (Stand 2. Juli 2026).</li>\n      <li><span class=\"chip hot\">Preis</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: Commercial-Preise seit 1. Juli hoch — Business Basic +16 %, Standard +12 %, E3 +8 %, E5 +5 %, Frontline bis +33 %. Bestandskunden zahlen erst ab der nächsten Verlängerung.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi</strong>: Bulletin 066 schließt 25 Lücken; CVE-2026-50746 (UniFi Connect) mit CVSS 10.0 — Command-Injection allein über Netzzugang, kein Login nötig.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: SharePoint-RCE CVE-2026-45659 (CVSS 8.8) aufgenommen, aktiv ausgenutzt — ein Angreifer mit bloßer „Site Member\"-Berechtigung reicht. Federal-Frist war der 4. Juli.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Web</span> <strong>Chrome 150</strong>: 382 Schwachstellen gestopft (15 Critical), darunter ein High-Sandbox-Escape (CVE-2026-13789). Zweite XXL-Runde in Folge.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> und 22.1.0-next.4 am 1. Juli — reine Point-Releases, nichts, was drängt.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU Cyber Resilience Act</strong>: die Meldepflicht für ausgenutzte Lücken (Art. 14) wird zum 11. September scharf — jetzt Prozesse aufsetzen.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">BR</span> <strong>Nubank</strong> beendet fünf Jahre Vollremote — ab 1. Juli hybrid, zwei Tage Büro, ab Januar drei.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The start of the month packs a punch: Microsoft cranks up M365 pricing on July 1, an anonymous researcher dumps over 100 unpatched zero-day exploits online, and three major patch waves (UniFi, SharePoint, Chrome) roll out on practically the same day. No \"patch tonight\" alarm — but a day where cleanup pays off.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Exploitarium</strong>: anonymous researcher \"bikini\" publishes 100+ unpatched zero-day PoCs across 22–24 OSS projects (Firefox, Docker, PHP, libssh2, Gitea) — with no vendor notification. About 13 CVEs have been assigned so far (as of July 2, 2026).</li>\n      <li><span class=\"chip hot\">Price</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: commercial prices up since July 1 — Business Basic +16%, Standard +12%, E3 +8%, E5 +5%, Frontline up to +33%. Existing customers only pay the new rate at their next renewal.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi</strong>: Bulletin 066 closes 25 flaws; CVE-2026-50746 (UniFi Connect) with CVSS 10.0 — command injection over mere network access, no login required.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>CISA KEV</strong>: SharePoint RCE CVE-2026-45659 (CVSS 8.8) added, actively exploited — an attacker with just \"Site Member\" permission is enough. Federal deadline was July 4.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Web</span> <strong>Chrome 150</strong>: 382 vulnerabilities patched (15 Critical), including a High-severity sandbox escape (CVE-2026-13789). Second XXL round in a row.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> and 22.1.0-next.4 on July 1 — plain point releases, nothing urgent.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>EU Cyber Resilience Act</strong>: the reporting obligation for exploited flaws (Art. 14) becomes mandatory on September 11 — set up processes now.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">BR</span> <strong>Nubank</strong> ends five years of full remote work — hybrid from July 1 with two office days, three from January.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A virada do mês veio forte: a Microsoft mexe no preço do M365 a partir de 1º de julho, um pesquisador anônimo despeja mais de 100 exploits de dia zero sem correção na rede, e três grandes ondas de patches (UniFi, SharePoint, Chrome) chegam praticamente no mesmo dia. Não é alerta de \"corrigir hoje à noite\" — mas é um dia em que vale a pena colocar a casa em ordem.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Exploitarium</strong>: pesquisador anônimo \"bikini\" publica mais de 100 PoCs de dia zero sem correção em 22–24 projetos open-source (Firefox, Docker, PHP, libssh2, Gitea) — sem aviso prévio aos fabricantes. Cerca de 13 CVEs já foram atribuídos até agora (situação em 2 de julho de 2026).</li>\n      <li><span class=\"chip hot\">Preço</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: preços comerciais sobem desde 1º de julho — Business Basic +16%, Standard +12%, E3 +8%, E5 +5%, Frontline até +33%. Clientes atuais só pagam a partir da próxima renovação.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi</strong>: boletim 066 corrige 25 falhas; CVE-2026-50746 (UniFi Connect) com CVSS 10.0 — injeção de comando só com acesso à rede, sem precisar de login.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EUA</span> <strong>CISA KEV</strong>: RCE do SharePoint CVE-2026-45659 (CVSS 8.8) incluído, ativamente explorado — basta um invasor com permissão de \"Site Member\". Prazo federal era 4 de julho.</li>\n      <li><span class=\"chip\">Navegador</span> <span class=\"chip\">Web</span> <strong>Chrome 150</strong>: 382 vulnerabilidades corrigidas (15 críticas), incluindo um sandbox escape de severidade alta (CVE-2026-13789). Segunda rodada XXL seguida.</li>\n      <li><span class=\"chip good\">Lançamento</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> e 22.1.0-next.4 em 1º de julho — apenas point releases, nada urgente.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">UE</span> <strong>EU Cyber Resilience Act</strong>: a obrigação de notificação de falhas exploradas (Art. 14) passa a valer em 11 de setembro — comece a estruturar os processos agora.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">BR</span> <strong>Nubank</strong> encerra cinco anos de trabalho totalmente remoto — a partir de 1º de julho é híbrido, dois dias de escritório, três a partir de janeiro.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El cambio de mes vino cargado: Microsoft ajusta el precio de M365 a partir del 1 de julio, un investigador anónimo publica más de 100 exploits de día cero sin parchar, y tres grandes oleadas de parches (UniFi, SharePoint, Chrome) llegan prácticamente el mismo día. No es alerta de \"parchar esta noche\", pero sí un día en el que vale la pena poner las cosas en orden.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Exploitarium</strong>: el investigador anónimo \"bikini\" publica más de 100 PoC de día cero sin parchar en 22–24 proyectos de código abierto (Firefox, Docker, PHP, libssh2, Gitea) — sin aviso previo a los fabricantes. Hasta ahora ya se han asignado unos 13 CVE (al 2 de julio de 2026).</li>\n      <li><span class=\"chip hot\">Precio</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: los precios comerciales suben desde el 1 de julio — Business Basic +16 %, Standard +12 %, E3 +8 %, E5 +5 %, Frontline hasta +33 %. Los clientes actuales pagan la nueva tarifa hasta su próxima renovación.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi</strong>: el boletín 066 corrige 25 fallas; CVE-2026-50746 (UniFi Connect) con CVSS 10.0 — inyección de comandos con solo acceso a la red, sin necesidad de iniciar sesión.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EUA</span> <strong>CISA KEV</strong>: se agrega el RCE de SharePoint CVE-2026-45659 (CVSS 8.8), activamente explotado — basta un atacante con permiso de \"Site Member\". El plazo federal era el 4 de julio.</li>\n      <li><span class=\"chip\">Navegador</span> <span class=\"chip\">Web</span> <strong>Chrome 150</strong>: 382 vulnerabilidades corregidas (15 críticas), incluida una fuga de sandbox de severidad alta (CVE-2026-13789). Segunda ronda XXL consecutiva.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> y 22.1.0-next.4 el 1 de julio — simples point releases, nada urgente.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>EU Cyber Resilience Act</strong>: la obligación de reportar fallas explotadas (Art. 14) se vuelve exigible el 11 de septiembre — hay que armar los procesos desde ahora.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">BR</span> <strong>Nubank</strong> termina cinco años de trabajo totalmente remoto — desde el 1 de julio es híbrido, dos días de oficina, tres a partir de enero.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei große Bewegungen prägen die AI-Coding-Woche: Anthropic hat mit Claude Sonnet 5 sein bislang „agentischstes\" Sonnet-Modell zum neuen Standard in Claude Code gemacht — Opus-4.8-nahe Leistung zum halben Preis, mit 1-Million-Token-Kontext. Und SpaceX kauft Cursor-Mutter Anysphere für 60 Milliarden Dollar, die größte Startup-Übernahme aller Zeiten. Der Rest ist Werkzeug-Alltag: Copilot CLI und Codex Remote rücken nach, die Open-Weights-Front hält still.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 (30.06.)</strong>: jetzt Standardmodell in Claude Code, nativer 1M-Token-Kontext, Leistung „nahe Opus 4.8\" bei deutlich niedrigerem Preis.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Einführungspreis</strong>: 2 $/10 $ pro Mio. Token (Input/Output) bis 31.08. — danach 3 $/15 $. Der günstige Fahrplan für Agenten-Läufe.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX ⟶ Cursor</strong>: 60 Mrd. $ All-Stock (angekündigt 16.06., Closing Q3 2026). Cursor-Daten sollen Groks Training füttern.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepsis-Pflicht</strong>: die einzigen Sonnet-5-Coding-Zahlen sind Anthropics eigene — SWE-Bench Verified listet Sonnet 5 noch nicht.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Copilot CLI v1.0.69-1</strong> (04.07.): <code>/mcp list</code>, Auto-Allow-Modus, <code>stayInAutopilot</code>. Nachrücker im Terminal-Agenten-Rennen.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Remote GA</strong>: jetzt allgemein verfügbar über alle ChatGPT-Pläne, plus Trace-Log-Leak-Fix.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Open-Weights ruhig</strong>: keine neue Coding-Modell-Version im 24-48h-Fenster; DeepSeek-V4-Vollversion „Mitte Juli erwartet\".</li>\n      <li><span class=\"chip\">Tool</span> <strong>Im Schatten still</strong>: Aider, Cline, Continue, OpenHands ohne datierten Move diese Runde.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei große Bewegungen prägen die AI-Coding-Woche: Anthropic hat mit Claude Sonnet 5 sein bislang „agentischstes\" Sonnet-Modell zum neuen Standard in Claude Code gemacht — Opus-4.8-nahe Leistung zum halben Preis, mit 1-Million-Token-Kontext. Und SpaceX kauft Cursor-Mutter Anysphere für 60 Milliarden Dollar, die größte Startup-Übernahme aller Zeiten. Der Rest ist Werkzeug-Alltag: Copilot CLI und Codex Remote rücken nach, die Open-Weights-Front hält still.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 (30.06.)</strong>: jetzt Standardmodell in Claude Code, nativer 1M-Token-Kontext, Leistung „nahe Opus 4.8\" bei deutlich niedrigerem Preis.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Einführungspreis</strong>: 2 $/10 $ pro Mio. Token (Input/Output) bis 31.08. — danach 3 $/15 $. Der günstige Fahrplan für Agenten-Läufe.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX ⟶ Cursor</strong>: 60 Mrd. $ All-Stock (angekündigt 16.06., Closing Q3 2026). Cursor-Daten sollen Groks Training füttern.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepsis-Pflicht</strong>: die einzigen Sonnet-5-Coding-Zahlen sind Anthropics eigene — SWE-Bench Verified listet Sonnet 5 noch nicht.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Copilot CLI v1.0.69-1</strong> (04.07.): <code>/mcp list</code>, Auto-Allow-Modus, <code>stayInAutopilot</code>. Nachrücker im Terminal-Agenten-Rennen.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Remote GA</strong>: jetzt allgemein verfügbar über alle ChatGPT-Pläne, plus Trace-Log-Leak-Fix.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Open-Weights ruhig</strong>: keine neue Coding-Modell-Version im 24-48h-Fenster; DeepSeek-V4-Vollversion „Mitte Juli erwartet\".</li>\n      <li><span class=\"chip\">Tool</span> <strong>Im Schatten still</strong>: Aider, Cline, Continue, OpenHands ohne datierten Move diese Runde.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two big moves define this week in AI coding: Anthropic made Claude Sonnet 5 — its \"most agentic\" Sonnet model yet — the new default in Claude Code, delivering near-Opus-4.8 performance at half the price, with a 1-million-token context window. And SpaceX is buying Cursor parent Anysphere for $60 billion, the largest startup acquisition ever. The rest is tooling business as usual: Copilot CLI and Codex Remote catch up, while the open-weights front stays quiet.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 (Jun 30)</strong>: now the default model in Claude Code, native 1M-token context, performance \"near Opus 4.8\" at a significantly lower price.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Launch pricing</strong>: $2/$10 per million tokens (input/output) through Aug 31 — then $3/$15. The cheap window for agentic runs.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX ⟶ Cursor</strong>: $60B all-stock deal (announced Jun 16, closing expected Q3 2026). Cursor's data is set to feed Grok's training.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepticism required</strong>: the only Sonnet 5 coding numbers are Anthropic's own — SWE-Bench Verified doesn't list Sonnet 5 yet.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Copilot CLI v1.0.69-1</strong> (Jul 4): <code>/mcp list</code>, auto-allow mode, <code>stayInAutopilot</code>. A challenger in the terminal-agent race.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Remote GA</strong>: now generally available across all ChatGPT plans, plus a trace-log leak fix.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Open weights quiet</strong>: no new coding model release in the 24-48h window; DeepSeek-V4 full release \"expected mid-July.\"</li>\n      <li><span class=\"chip\">Tool</span> <strong>Quiet in the shadows</strong>: Aider, Cline, Continue, OpenHands with no dated move this round.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois grandes movimentos marcam a semana da IA para programação: a Anthropic tornou o Claude Sonnet 5 — seu modelo Sonnet \"mais agêntico\" até agora — o novo padrão no Claude Code, com desempenho próximo ao do Opus 4.8 pela metade do preço e uma janela de contexto nativa de 1 milhão de tokens. E a SpaceX está comprando a Anysphere, controladora da Cursor, por US$ 60 bilhões, a maior aquisição de startup da história. O resto é rotina de ferramentas: Copilot CLI e Codex Remote avançam, e a frente de pesos abertos segue quieta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 (30/06)</strong>: agora é o modelo padrão no Claude Code, contexto nativo de 1M de tokens, desempenho \"próximo ao Opus 4.8\" com preço bem mais baixo.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Preço de lançamento</strong>: US$ 2/US$ 10 por milhão de tokens (entrada/saída) até 31/08 — depois US$ 3/US$ 15. A janela barata para rodadas com agentes.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX ⟶ Cursor</strong>: US$ 60 bi em ações (anunciado em 16/06, fechamento previsto para o 3º tri de 2026). Os dados da Cursor devem alimentar o treinamento do Grok.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Ceticismo obrigatório</strong>: os únicos números de coding do Sonnet 5 são da própria Anthropic — o SWE-Bench Verified ainda não lista o Sonnet 5.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Copilot CLI v1.0.69-1</strong> (04/07): <code>/mcp list</code>, modo de auto-permissão, <code>stayInAutopilot</code>. Mais um concorrente na corrida dos agentes de terminal.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Remote GA</strong>: agora disponível em todos os planos do ChatGPT, além de correção de vazamento em logs de trace.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Pesos abertos parados</strong>: nenhuma versão nova de modelo de coding na janela de 24-48h; versão completa do DeepSeek-V4 \"esperada para meados de julho\".</li>\n      <li><span class=\"chip\">Tool</span> <strong>Quietos nos bastidores</strong>: Aider, Cline, Continue, OpenHands sem movimento datado nesta rodada.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos grandes movimientos marcan la semana de la IA para programación: Anthropic convirtió a Claude Sonnet 5 —su modelo Sonnet \"más agéntico\" hasta ahora— en el nuevo estándar de Claude Code, con un desempeño cercano al de Opus 4.8 a mitad de precio y una ventana de contexto nativa de 1 millón de tokens. Y SpaceX está comprando a Anysphere, la matriz de Cursor, por 60 mil millones de dólares, la mayor adquisición de una startup en la historia. El resto es rutina de herramientas: Copilot CLI y Codex Remote avanzan, mientras el frente de pesos abiertos sigue tranquilo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 (30/06)</strong>: ahora es el modelo estándar en Claude Code, contexto nativo de 1M de tokens, desempeño \"cercano a Opus 4.8\" con un precio notablemente más bajo.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Precio de lanzamiento</strong>: 2 $/10 $ por millón de tokens (entrada/salida) hasta el 31/08 — después 3 $/15 $. La ventana barata para corridas con agentes.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX ⟶ Cursor</strong>: 60 mil millones de dólares en acciones (anunciado el 16/06, cierre esperado en el 3er trimestre de 2026). Se espera que los datos de Cursor alimenten el entrenamiento de Grok.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Escepticismo obligatorio</strong>: las únicas cifras de coding de Sonnet 5 son de la propia Anthropic — SWE-Bench Verified todavía no incluye a Sonnet 5.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Copilot CLI v1.0.69-1</strong> (04/07): <code>/mcp list</code>, modo de auto-permisos, <code>stayInAutopilot</code>. Un contendiente más en la carrera de agentes de terminal.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Remote GA</strong>: ahora disponible en general para todos los planes de ChatGPT, más una corrección de fuga en los logs de traza.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Pesos abiertos en calma</strong>: ninguna versión nueva de modelo de coding en la ventana de 24-48h; se \"espera para mediados de julio\" la versión completa de DeepSeek-V4.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Quietos entre bambalinas</strong>: Aider, Cline, Continue y OpenHands sin movimiento con fecha en esta ronda.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Bewegungen, dieselbe Ursache: KI ist zu teuer geworden, und jetzt wird die Rechnung von beiden Seiten gedrückt. Auf der <em>Angebots</em>-Seite bauen die Labore eigene Chips, um Inferenz billiger zu machen — OpenAI hat mit Broadcom „Jalapeño\" vorgestellt (Deployment Ende 2026, ~50 % günstiger pro Token, laut Broadcom), und Anthropic sondiert mit Samsung einen eigenen 2-nm-Chip. Auf der <em>Nachfrage</em>-Seite drehen Konzerne die Ausgaben-Disziplin auf: Uber deckelte pro Mitarbeiter, Microsoft zog Lizenzen ein, eine Bain-Umfrage zeigt, dass die versprochenen Einsparungen ausbleiben. Dazwischen wird generative KI selbst zur Massenware — Googles Nano Banana 2 Lite erzeugt ein Bild für 3,4 Cent pro Tausend. Und in Genf trifft sich ab Mittwoch eine 44-köpfige UN-Kommission, die das alles einhegen soll.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>OpenAI + Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-Chip, ~50 % günstiger pro Token (Broadcom-Angabe), Deployment bis Ende 2026. Angekündigt 24.06.</li>\n      <li><span class=\"chip\">M&amp;A · Asien</span> <strong>Anthropic + Samsung</strong>: frühe Gespräche über einen eigenen Chip auf Samsungs 2-nm-Prozess — kein Spec, kein Prototyp, kein Zeitplan (02.07.).</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Effizienz statt „Tokenmaxxing\"</strong>: Uber deckelte KI-Coding-Ausgaben auf 1.500 $/Mitarbeiter/Monat; Bain-Umfrage — Einsparungen meist ≤ 10 % statt der erwarteten 10–20 %.</li>\n      <li><span class=\"chip good\">Deploy · US</span> <strong>Google Nano Banana 2 Lite</strong>: billigstes/schnellstes Bildmodell bislang — 0,034 $ pro 1.000 Bilder, &lt; 4 Sekunden. GA seit 30.06.</li>\n      <li><span class=\"chip good\">Deploy · US</span> <strong>Gemini Omni Flash</strong>: konversationelles Video-Modell in Public Preview, 0,10 $/Sekunde (Preis wie Veo 3.1 Fast).</li>\n      <li><span class=\"chip\">Policy · Genf</span> <strong>AI for Good Global Commission</strong>: 44 Gründungsmitglieder (Huang, Jassy, Smith, Clark), Auftakt-Sitzung 08.07. in Genf.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Zwei Ideen</strong>: LLM-Kosten-Gateway für den Mittelstand · Marken-treue Bild-Pipeline auf der neuen Billig-Ökonomie.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Bewegungen, dieselbe Ursache: KI ist zu teuer geworden, und jetzt wird die Rechnung von beiden Seiten gedrückt. Auf der <em>Angebots</em>-Seite bauen die Labore eigene Chips, um Inferenz billiger zu machen — OpenAI hat mit Broadcom „Jalapeño\" vorgestellt (Deployment Ende 2026, ~50 % günstiger pro Token, laut Broadcom), und Anthropic sondiert mit Samsung einen eigenen 2-nm-Chip. Auf der <em>Nachfrage</em>-Seite drehen Konzerne die Ausgaben-Disziplin auf: Uber deckelte pro Mitarbeiter, Microsoft zog Lizenzen ein, eine Bain-Umfrage zeigt, dass die versprochenen Einsparungen ausbleiben. Dazwischen wird generative KI selbst zur Massenware — Googles Nano Banana 2 Lite erzeugt ein Bild für 3,4 Cent pro Tausend. Und in Genf trifft sich ab Mittwoch eine 44-köpfige UN-Kommission, die das alles einhegen soll.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>OpenAI + Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-Chip, ~50 % günstiger pro Token (Broadcom-Angabe), Deployment bis Ende 2026. Angekündigt 24.06.</li>\n      <li><span class=\"chip\">M&amp;A · Asien</span> <strong>Anthropic + Samsung</strong>: frühe Gespräche über einen eigenen Chip auf Samsungs 2-nm-Prozess — kein Spec, kein Prototyp, kein Zeitplan (02.07.).</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Effizienz statt „Tokenmaxxing\"</strong>: Uber deckelte KI-Coding-Ausgaben auf 1.500 $/Mitarbeiter/Monat; Bain-Umfrage — Einsparungen meist ≤ 10 % statt der erwarteten 10–20 %.</li>\n      <li><span class=\"chip good\">Deploy · US</span> <strong>Google Nano Banana 2 Lite</strong>: billigstes/schnellstes Bildmodell bislang — 0,034 $ pro 1.000 Bilder, &lt; 4 Sekunden. GA seit 30.06.</li>\n      <li><span class=\"chip good\">Deploy · US</span> <strong>Gemini Omni Flash</strong>: konversationelles Video-Modell in Public Preview, 0,10 $/Sekunde (Preis wie Veo 3.1 Fast).</li>\n      <li><span class=\"chip\">Policy · Genf</span> <strong>AI for Good Global Commission</strong>: 44 Gründungsmitglieder (Huang, Jassy, Smith, Clark), Auftakt-Sitzung 08.07. in Genf.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Zwei Ideen</strong>: LLM-Kosten-Gateway für den Mittelstand · Marken-treue Bild-Pipeline auf der neuen Billig-Ökonomie.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two movements, one cause: AI has gotten too expensive, and now the bill is being squeezed from both sides. On the <em>supply</em> side, the labs are building their own chips to make inference cheaper — OpenAI unveiled \"Jalapeño\" with Broadcom (deployment by late 2026, ~50% cheaper per token, per Broadcom), and Anthropic is exploring a custom 2nm chip with Samsung. On the <em>demand</em> side, corporations are cranking up spending discipline: Uber capped per-employee spend, Microsoft pulled licenses, and a Bain survey shows the promised savings aren't materializing. In between, generative AI itself is becoming a commodity — Google's Nano Banana 2 Lite generates an image for 3.4 cents per thousand. And in Geneva, starting Wednesday, a 44-member UN commission convenes to try to rein it all in.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>OpenAI + Broadcom \"Jalapeño\"</strong>: first custom inference chip, ~50% cheaper per token (Broadcom's figure), deployment by end of 2026. Announced 06/24.</li>\n      <li><span class=\"chip\">M&amp;A · Asia</span> <strong>Anthropic + Samsung</strong>: early talks about a custom chip on Samsung's 2nm process — no spec, no prototype, no timeline (07/02).</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Efficiency over \"tokenmaxxing\"</strong>: Uber capped AI coding spend at $1,500/employee/month; Bain survey — savings mostly ≤10% instead of the expected 10-20%.</li>\n      <li><span class=\"chip good\">Deploy · US</span> <strong>Google Nano Banana 2 Lite</strong>: cheapest/fastest image model yet — $0.034 per 1,000 images, &lt; 4 seconds. GA since 06/30.</li>\n      <li><span class=\"chip good\">Deploy · US</span> <strong>Gemini Omni Flash</strong>: conversational video model in public preview, $0.10/second (priced like Veo 3.1 Fast).</li>\n      <li><span class=\"chip\">Policy · Geneva</span> <strong>AI for Good Global Commission</strong>: 44 founding members (Huang, Jassy, Smith, Clark), kickoff session 07/08 in Geneva.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Two ideas</strong>: an LLM cost gateway for mid-market companies · a brand-consistent image pipeline built for the new low-cost economy.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois movimentos, uma só causa: a IA ficou cara demais, e agora a conta está sendo espremida dos dois lados. No lado da <em>oferta</em>, os laboratórios estão construindo seus próprios chips para baratear a inferência — a OpenAI apresentou o \"Jalapeño\" com a Broadcom (implantação prevista para o fim de 2026, ~50% mais barato por token, segundo a Broadcom), e a Anthropic está sondando um chip próprio de 2 nm com a Samsung. No lado da <em>demanda</em>, as empresas estão apertando a disciplina de gastos: a Uber limitou o gasto por funcionário, a Microsoft cortou licenças, e uma pesquisa da Bain mostra que a economia prometida não está se concretizando. No meio disso tudo, a própria IA generativa vira commodity — o Nano Banana 2 Lite do Google gera uma imagem por 3,4 centavos de dólar por mil. E em Genebra, a partir de quarta-feira, uma comissão da ONU com 44 integrantes se reúne para tentar colocar ordem em tudo isso.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · EUA</span> <strong>OpenAI + Broadcom \"Jalapeño\"</strong>: primeiro chip próprio de inferência, ~50% mais barato por token (dado da Broadcom), implantação até o fim de 2026. Anunciado em 24/06.</li>\n      <li><span class=\"chip\">M&amp;A · Ásia</span> <strong>Anthropic + Samsung</strong>: conversas iniciais sobre um chip próprio no processo de 2 nm da Samsung — sem especificações, sem protótipo, sem cronograma (02/07).</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Eficiência em vez de \"tokenmaxxing\"</strong>: a Uber limitou os gastos com ferramentas de codificação por IA a US$ 1.500/funcionário/mês; pesquisa da Bain — economia geralmente ≤10% em vez dos 10-20% esperados.</li>\n      <li><span class=\"chip good\">Deploy · EUA</span> <strong>Google Nano Banana 2 Lite</strong>: modelo de imagem mais barato/rápido até agora — US$ 0,034 por 1.000 imagens, &lt; 4 segundos. GA desde 30/06.</li>\n      <li><span class=\"chip good\">Deploy · EUA</span> <strong>Gemini Omni Flash</strong>: modelo de vídeo conversacional em pré-visualização pública, US$ 0,10/segundo (mesmo preço do Veo 3.1 Fast).</li>\n      <li><span class=\"chip\">Policy · Genebra</span> <strong>AI for Good Global Commission</strong>: 44 membros fundadores (Huang, Jassy, Smith, Clark), sessão de abertura em 08/07 em Genebra.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Duas ideias</strong>: gateway de custos de LLM para médias empresas · pipeline de imagens fiel à marca sobre a nova economia de centavos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos movimientos, una misma causa: la IA se volvió demasiado cara, y ahora la cuenta se está exprimiendo por ambos lados. Del lado de la <em>oferta</em>, los laboratorios están construyendo sus propios chips para abaratar la inferencia — OpenAI presentó \"Jalapeño\" junto con Broadcom (despliegue previsto para fines de 2026, ~50% más barato por token, según Broadcom), y Anthropic está sondeando con Samsung un chip propio de 2 nm. Del lado de la <em>demanda</em>, las corporaciones están apretando la disciplina de gasto: Uber limitó el gasto por empleado, Microsoft retiró licencias, y una encuesta de Bain muestra que los ahorros prometidos no se están cumpliendo. En medio de todo esto, la propia IA generativa se vuelve una mercancía de bajo costo — el Nano Banana 2 Lite de Google genera una imagen por 3.4 centavos de dólar por millar. Y en Ginebra, a partir del miércoles, se reúne una comisión de la ONU con 44 integrantes que busca poner orden en todo esto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · EE. UU.</span> <strong>OpenAI + Broadcom \"Jalapeño\"</strong>: primer chip propio de inferencia, ~50% más barato por token (dato de Broadcom), despliegue para fines de 2026. Anunciado el 24/06.</li>\n      <li><span class=\"chip\">M&amp;A · Asia</span> <strong>Anthropic + Samsung</strong>: pláticas iniciales sobre un chip propio en el proceso de 2 nm de Samsung — sin especificaciones, sin prototipo, sin cronograma (02/07).</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Eficiencia en vez de \"tokenmaxxing\"</strong>: Uber limitó el gasto en herramientas de codificación con IA a 1,500 USD por empleado al mes; encuesta de Bain — ahorros mayormente ≤10% en vez del 10-20% esperado.</li>\n      <li><span class=\"chip good\">Deploy · EE. UU.</span> <strong>Google Nano Banana 2 Lite</strong>: el modelo de imagen más barato y rápido hasta ahora — 0.034 USD por 1,000 imágenes, &lt; 4 segundos. Disponible de forma general desde el 30/06.</li>\n      <li><span class=\"chip good\">Deploy · EE. UU.</span> <strong>Gemini Omni Flash</strong>: modelo de video conversacional en vista previa pública, 0.10 USD/segundo (mismo precio que Veo 3.1 Fast).</li>\n      <li><span class=\"chip\">Policy · Ginebra</span> <strong>AI for Good Global Commission</strong>: 44 miembros fundadores (Huang, Jassy, Smith, Clark), sesión inaugural el 08/07 en Ginebra.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dos ideas</strong>: un gateway de costos de LLM para empresas medianas · un pipeline de imágenes fiel a la marca sobre la nueva economía de centavos.</li>\n    </ul></div>"

ass=\"chip\">AI-Integration</span> <strong>Agentic-Coding gefragt</strong>: Randstad Digital nennt explizit agentic-coding/Kiro als Anforderung; ELCA und AXA (beide Zürich) bauen Agentic-AI-Plattformen mit Claude-Code-Klasse-Tools.</li>\n      <li><span class=\"chip\">Employee</span> <strong>CH-Employee selektiv</strong>: ELCA Zürich (Java + Agentic AI, Fit 81) und AXA Zürich (Python + Agentic AI, 80) treffen die Track-1-Kriterien — beide hybrid, CH-Basis nötig.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong>: Principal Forward Deployed Engineer, AI-Native Software Development (EU-remote inkl. München/Berlin) — Fit 82, Mission über Stack-1:1.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Eine passende Ausschreibung</strong>: NRW-Polizei-IT „iBMS 3.0\" (Anwendungs-Transformation, 48 Monate) — Stack passt, aber ⚠️ Partner nötig (3 Mio. € Umsatz, ISO 27001/9001, Referenz). Frist 14.07.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Markt kühlt</strong>: Freelancer-Kompass 2026 — Ø 103 €/h (von 104), 43% ohne gesicherte Auslastung, 23% mit rückläufigen Aufträgen. Daniels Band liegt darüber.</li>\n    </ul></div>",
