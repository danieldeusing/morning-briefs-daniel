        "en": "<div class=\"tldr\"><p class=\"lead\">Today is the day the whole week was building toward. FIML in Londrina plays its second-to-last day almost entirely outdoors and free of charge, and — of all places — a flu-vaccine drive-thru runs from 9am to 3pm on that very same avenue: vaccination from the car, no waiting room, no baby caught in a crush. Add four dry, sunny days in a row, and tomorrow's choice between motocross right on your doorstep and the festival finale. One thing you should strike from your plans, though: the music festival in Ourinhos that search engines are surfacing for tonight actually took place in 2025.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENT</span> <strong>FIML free and outdoors</strong>: today, 10h choro-and-samba workshop on the front steps of Teatro Ouro Verde, 11h youth ensemble on Av. Higienópolis, 14h choirs at Teatro Crystal — all free admission.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Vaccination without getting out of the car</strong>: flu drive-thru today 9h–15h at Iate Clube, Av. Higienópolis 2135. With a one-month-old baby in the household, protecting the parents is really the protective measure.</li>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>Paraná stays under respiratory alert</strong>: InfoGripe SE 26/2026 lists PR among the states with SARI at alarm, risk, or high-risk level; RSV accounts for <strong>55.9%</strong> of positive cases nationwide.</li>\n      <li><span class=\"chip good\">WEATHER</span> <strong>Four days, zero rain</strong>: today 16–26°, Sunday 26°, Monday 27°, Tuesday 28° — two forecasters agree, each with 0% chance of rain.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Sunday splits two ways</strong>: Velocross Camiloti at the Centro de Eventos right here in town (time and admission unconfirmed) or the free FIML closing concert at 10h30 in Londrina.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Two neighborhood festivals in Londrina</strong>: today 15h–19h \"Orgulho do Meu Bairro\" in Vista Bela, tomorrow 9h–15h Arraiá da Lourdes in Vila Siam — both with a vaccination station on site.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Last week of break starts Monday</strong>: state-network recess runs through Fri 07/24.</li>\n      <li><span class=\"chip hot\">HEADS UP</span> <strong>Year trap</strong>: \"XXIII Festival de Música de Ourinhos, July 14–18\" is an article from <strong>06/30/2025</strong>. Don't plan a trip into the day-trip ring for it.</li>\n      <li><span class=\"chip\">HEALTH</span> <strong>Dengue count has no update today</strong>: the most recent Informe Epidemiológico listed is still No. 22 from 07/07/2026; the state health portal wasn't reachable today. So there's deliberately no case figure today.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o dia para o qual a semana vinha se preparando. O FIML em Londrina cumpre seu penúltimo dia quase inteiramente ao ar livre e de graça, e bem na mesma avenida acontece, das 9h às 15h, um drive-thru de vacinação contra a gripe — vacina sem sair do carro, sem sala de espera, sem bebê no meio da aglomeração. Some-se a isso quatro dias seguidos de sol e sem chuva, e amanhã a escolha entre motocross na porta de casa e o encerramento do festival. Uma coisa vocês precisam tirar da cabeça: o festival de música em Ourinhos que os mecanismos de busca exibem para hoje à noite aconteceu em 2025.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENTO</span> <strong>FIML grátis e ao ar livre</strong>: hoje, 10h, oficina de choro e samba na escadaria do Teatro Ouro Verde; 11h, conjunto jovem na Av. Higienópolis; 14h, corais no Teatro Crystal — tudo sem cobrança de entrada.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Vacinar sem sair do carro</strong>: drive-thru de vacinação contra a gripe hoje das 9h às 15h no Iate Clube, Av. Higienópolis 2135. Com um bebê de um mês em casa, a vacinação dos pais é a verdadeira medida de proteção.</li>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Paraná segue em alerta respiratório</strong>: o InfoGripe SE 26/2026 lista o PR entre os estados com SRAG em nível de alerta, risco ou alto risco; o VSR responde por <strong>55,9%</strong> dos casos positivos em todo o país.</li>\n      <li><span class=\"chip good\">CLIMA</span> <strong>Quatro dias sem chuva</strong>: hoje 16–26°, domingo 26°, segunda 27°, terça 28° — dois portais concordam, ambos com 0% de chance de chuva.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Domingo dividido em dois</strong>: Velocross Camiloti no Centro de Eventos aqui na cidade (horário e entrada não confirmados) ou, às 10h30, o show de encerramento gratuito do FIML em Londrina.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Duas festas de bairro em Londrina</strong>: hoje das 15h às 19h \"Orgulho do Meu Bairro\" no Vista Bela, amanhã das 9h às 15h Arraiá da Lourdes na Vila Siam — ambas com posto de vacinação no local.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Última semana de férias começa na segunda-feira</strong>: recesso na rede estadual segue até sex 24/07.</li>\n      <li><span class=\"chip hot\">ATENÇÃO</span> <strong>Armadilha de ano</strong>: \"XXIII Festival de Música de Ourinhos, 14 a 18 de julho\" é uma matéria de <strong>30/06/2025</strong>. Não planejem um passeio no raio de excursão de um dia com base nisso.</li>\n      <li><span class=\"chip\">SAÚDE</span> <strong>Números de dengue hoje sem atualização</strong>: o Informe Epidemiológico mais recente listado continua sendo o nº 22, de 07/07/2026; o portal estadual de saúde não pôde ser acessado hoje. Por isso, hoje, propositalmente, nenhum número de casos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es el día hacia el que apuntaba toda la semana. El FIML en Londrina toca su penúltimo día casi por completo al aire libre y gratis, y justo en la misma avenida hay, entre las 9h y las 15h, un módulo de vacunación contra la gripe en modalidad drive-thru — vacunación desde el carro, sin sala de espera, sin bebé entre el gentío. A eso se suman cuatro días secos y soleados seguidos, y mañana la opción entre motocross a la vuelta de la esquina y el cierre del festival. Una cosa sí deben sacarse de la cabeza: el festival de música de Ourinhos que los buscadores muestran para esta noche se realizó en 2025.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENTO</span> <strong>FIML gratis y al aire libre</strong>: hoy taller de choro y samba a las 10h en la escalinata del Teatro Ouro Verde, ensamble juvenil a las 11h en la Av. Higienópolis, coros a las 14h en el Teatro Crystal — todo sin costo de entrada.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Vacunación sin bajarse del carro</strong>: módulo drive-thru de vacuna contra la gripe hoy de 9h a 15h en el Iate Clube, Av. Higienópolis 2135. Con un bebé de un mes en casa, la protección de los padres es la verdadera medida de cuidado.</li>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Paraná se mantiene en alerta respiratoria</strong>: el InfoGripe SE 26/2026 ubica a PR entre los estados con SRAG en nivel de alerta, riesgo o alto riesgo; el VSR representa a nivel nacional el <strong>55,9 %</strong> de los casos positivos.</li>\n      <li><span class=\"chip good\">CLIMA</span> <strong>Cuatro días sin lluvia</strong>: hoy 16–26°, domingo 26°, lunes 27°, martes 28° — dos portales coinciden, 0 % de probabilidad de lluvia en cada caso.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Domingo dividido en dos</strong>: Velocross Camiloti en el Centro de Eventos aquí en la ciudad (horario y entrada sin confirmar) o a las 10h30 el concierto gratuito de cierre del FIML en Londrina.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Dos fiestas de barrio en Londrina</strong>: hoy de 15h a 19h „Orgulho do Meu Bairro\" en Vista Bela, mañana de 9h a 15h Arraiá da Lourdes en Vila Siam — ambas con puesto de vacunación en el lugar.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Última semana de vacaciones empieza el lunes</strong>: el receso en la red estatal sigue hasta el vie 24.07.</li>\n      <li><span class=\"chip hot\">ATENCIÓN</span> <strong>Trampa de año equivocado</strong>: „XXIII Festival de Música de Ourinhos, 14 al 18 de julio\" es un artículo del <strong>30.06.2025</strong>. No planeen una salida a ese anillo de day-trip.</li>\n      <li><span class=\"chip\">SALUD</span> <strong>Cifras de dengue hoy sin actualización</strong>: el Informe Epidemiológico más reciente listado sigue siendo el nº 22 del 07.07.2026; el portal estatal de salud no estuvo disponible hoy. Por eso hoy, deliberadamente, no hay cifra de casos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstag, der 18. Juli — Wochenthema <em>Essen, Kochen, Restaurant</em>, siebter Teil. Nach Grundlagen (23.05), Restaurant II (30.05), Festa Junina (06.06), „Im Restaurant\" III (20.06), Küche zuhause (04.07) und Churrasco (11.07) fehlt genau die Ebene, auf der in Brasilien am häufigsten gegessen wird: nicht das Restaurant, nicht der Grill, sondern die <strong>Lanchonete</strong> — der Tresen an der Ecke, an dem man im Stehen einen <em>salgado</em> isst und ein <em>guaraná</em> dazu trinkt. Dieses Register hat im Deutschen kaum Entsprechungen, und die brauchbarsten Wörter des Tages sind ausgerechnet die, die es im europäischen Portugiesisch so nicht gibt. Zwei datierte Aufhänger rahmen das: Seit <strong>Lei 15.330 vom 08.01.2026</strong> ist <strong>Açaí</strong> per Gesetz brasilianische <em>fruta nacional</em> — gemeinsam mit dem Cupuaçu, der diesen Status schon seit 2008 hatte (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>). Und am <em>Dia da Pizza</em> (10.07.) meldete <strong>iFood 50 Millionen Pizza-Bestellungen im ersten Halbjahr 2026</strong> — rechnerisch <strong>195 pro Minute</strong> (<a href=\"https://centraldovarejo.com.br/dia-da-pizza-ifood-registra-50-milhoes-de-pedidos-no-primeiro-semestre-de-2026/\">centraldovarejo.com.br</a>). Der <em>motoboy</em> ist damit kein Randwort, sondern Infrastruktur. Grammatisch ist heute ein Orthografie-Tag: <strong>PT <em>adoçar → adocei</em></strong> gegen <strong>ES <em>endulzar → endulcé</em></strong> — zwei Endungen, die gleich aussehen und sich genau entgegengesetzt verhalten. 30 Einträge, 11 Verben mit voller Konjugation, davon 3 Auffrischungen (<em>der Kellner</em>, <em>die Portion</em>, <em>reklamieren</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>die Marmelade ≠ marmalade</strong> — im Deutschen ist <em>Marmelade</em> der Oberbegriff für jeden gekochten Fruchtaufstrich, Erdbeere wie Aprikose. Englisch <em>marmalade</em> meint <strong>ausschließlich</strong> den Zitrus-Aufstrich, praktisch immer Orange; alles andere heißt <em>jam</em>. Wer im Englischen „strawberry marmalade\" sagt, klingt wie jemand, der Rotwein als Weißwein bestellt. PT sagt <em>a geleia</em>, ES-MX <em>la mermelada</em> — beide wieder ohne Zitrus-Einschränkung.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a lanchonete</strong> — der Imbiss/Snackbar-Tresen. Das Wort ist eine brasilianische Eindeutschung von <em>luncheonette</em>; im europäischen Portugiesisch würde man eher <em>snack-bar</em> oder <em>pastelaria</em> sagen. <em>(Register-Einschätzung der Redaktion, keine Wörterbuch-Quelle.)</em></li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o salgado</strong> — Sammelbegriff für alles Herzhafte aus der Vitrine: Coxinha, Pastel, Empada, Quibe, Esfirra, Pão de queijo. Deutsch hat dafür kein einziges Wort — „Teigtasche\" trifft nur die Hälfte. Der iFood-Partnerblog nennt die Coxinha „sem dúvidas, o salgado mais famoso do Brasil\" (<a href=\"https://blog-parceiros.ifood.com.br/tipos-de-salgados/\">blog-parceiros.ifood.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o motoboy</strong> — der Kurierfahrer auf dem Motorrad, englisches Lehnwort mit brasilianischer Bedeutung. Wie zentral er ist, zeigt eine Zahl: iFood registrierte im ersten Halbjahr 2026 <span class=\"stat\">50 Mio.</span> Pizza-Bestellungen, im Schnitt <span class=\"stat\">195 pro Minute</span> (iFood-Pressezahlen zum Dia da Pizza, 10.07.2026, <a href=\"https://centraldovarejo.com.br/dia-da-pizza-ifood-registra-50-milhoes-de-pedidos-no-primeiro-semestre-de-2026/\">centraldovarejo.com.br</a>).</li>\n      <li><span class=\"chip good\">GESETZ</span> <strong>o açaí ist seit 08.01.2026 <em>fruta nacional</em></strong> — festgeschrieben in <strong>Lei 15.330/2026</strong>, veröffentlicht im Diário Oficial da União. Das Gesetz änderte die Lei 11.675 von 2008, „que já reconhecia o cupuaçu como fruta nacional\" — Brasilien hat also jetzt zwei offizielle Nationalfrüchte (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT <em>adoçar</em> → <em>eu adocei</em>, ES <em>endulzar</em> → <em>yo endulcé</em></strong> — die Falle des Tages. Beide Endungen sehen verwandt aus, verhalten sich aber gegenläufig: Im Portugiesischen <strong>verschwindet</strong> die Cedilha vor <em>e</em> (das <em>c</em> ist dort ohnehin weich), im Spanischen <strong>wird z zu c</strong>. Niemals <em>*adoquei</em>, niemals <em>*endulzé</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE <em>-ieren</em>-Verben nehmen im Partizip II <em>kein</em> ge-</strong> — <em>ich habe frittiert / paniert / reklamiert</em>, nie <em>*gefrittiert</em>. Faustregel: Fremdverben auf <em>-ieren</em> sind endbetont, und das deutsche <em>ge-</em> setzt sich nur vor unbetonte erste Silben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES <em>freír → yo frío</em>, Partizip <em>frito</em></strong> — Stammwechsel e→í wie bei <em>reír</em>, dazu ein unregelmäßiges Partizip, das man täglich isst: <em>papas fritas</em>. Ebenso <strong><em>envolver → yo envuelvo</em>, Partizip <em>envuelto</em></strong> — nie <em>*envolvido</em>.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>eine Extrawurst wollen</strong> (DE) — wörtlich „eine zusätzliche Wurst verlangen\", gemeint ist laut Duden „im saloppen Sprachgebrauch Sonderbehandlung, Ausnahmeregelung oder Erfüllung eines individuellen Wunsches\" (<a href=\"https://www.duden.de/sprachwissen/sprachratgeber/Die-beruehmte-Extrawurst\">duden.de</a>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>pagar o pato</strong> (PT-BR) — „die Ente bezahlen\" = für etwas geradestehen, das jemand anderes verbockt hat, „muitas vezes de forma injusta\" (<a href=\"https://www.dicio.com.br/pagar-o-pato/\">dicio.com.br</a>). Deutsch am nächsten: <em>die Zeche zahlen</em>.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>me vale un cacahuate</strong> (ES-MX) — „es ist mir eine Erdnuss wert\" = ist mir völlig egal. Mexikanismus; die Erdnuss steht für den geringstmöglichen Wert. Verstärkte Variante: <em>me vale un reverendo cacahuate</em> (<a href=\"https://languagetool.org/insights/es/publicaciones/mexicanismos/\">languagetool.org</a>).</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>„Zum Hier-Essen oder zum Mitnehmen?\"</strong> — PT <em>„Para comer aqui ou para levar?\"</em>, ES-MX <em>„¿Para aquí o para llevar?\"</em>. Der wichtigste Satz am Tresen, und im Spanischen der kürzeste: das Verb fällt komplett weg.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Saturday, July 18 — weekly theme <em>Food, Cooking, Restaurant</em>, part seven. After the basics (05/23), Restaurant II (05/30), Festa Junina (06/06), \"In the Restaurant\" III (06/20), Kitchen at Home (07/04), and Churrasco (07/11), exactly one level is still missing — the one where Brazilians eat most often: not the restaurant, not the grill, but the <strong>lanchonete</strong> — the corner counter where you eat a <em>salgado</em> standing up and wash it down with a <em>guaraná</em>. German has almost no equivalents for this register, and, fittingly, today's most useful words are precisely the ones that don't even exist in European Portuguese. Two dated hooks frame the day: since <strong>Lei 15.330 of 01/08/2026</strong>, <strong>açaí</strong> is by law Brazil's <em>fruta nacional</em> — alongside cupuaçu, which has held that status since 2008 (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>). And on <em>Dia da Pizza</em> (07/10), <strong>iFood reported 50 million pizza orders in the first half of 2026</strong> — the equivalent of <strong>195 per minute</strong> (<a href=\"https://centraldovarejo.com.br/dia-da-pizza-ifood-registra-50-milhoes-de-pedidos-no-primeiro-semestre-de-2026/\">centraldovarejo.com.br</a>). The <em>motoboy</em>, then, is not a marginal word but infrastructure. Grammar-wise, today is a spelling day: <strong>PT <em>adoçar → adocei</em></strong> versus <strong>ES <em>endulzar → endulcé</em></strong> — two endings that look alike and behave in exactly opposite ways. 30 entries, 11 verbs with full conjugation, of which 3 are refreshers (<em>the waiter</em>, <em>the portion</em>, <em>to complain</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>die Marmelade ≠ marmalade</strong> — in German, <em>Marmelade</em> is the umbrella term for any cooked fruit spread, strawberry as much as apricot. English <em>marmalade</em> means <strong>exclusively</strong> the citrus spread, practically always orange; everything else is called <em>jam</em>. Anyone who says \"strawberry marmalade\" in English sounds like someone ordering red wine as white wine. PT says <em>a geleia</em>, ES-MX <em>la mermelada</em> — both again without the citrus restriction.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a lanchonete</strong> — the snack-bar counter. The word is a Brazilian re-spelling of <em>luncheonette</em>; in European Portuguese you'd more likely say <em>snack-bar</em> or <em>pastelaria</em>. <em>(Editorial register assessment, not a dictionary source.)</em></li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o salgado</strong> — umbrella term for everything savory in the display case: coxinha, pastel, empada, quibe, esfirra, pão de queijo. German has no single word for this — \"Teigtasche\" (pastry pocket) only covers half of it. iFood's partner blog calls the coxinha \"sem dúvidas, o salgado mais famoso do Brasil\" (\"without a doubt, Brazil's most famous salgado\") (<a href=\"https://blog-parceiros.ifood.com.br/tipos-de-salgados/\">blog-parceiros.ifood.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o motoboy</strong> — the motorcycle courier, an English loanword with a Brazilian meaning. A single number shows how central he is: iFood logged <span class=\"stat\">50 million</span> pizza orders in the first half of 2026, an average of <span class=\"stat\">195 per minute</span> (iFood press figures for Dia da Pizza, 07/10/2026, <a href=\"https://centraldovarejo.com.br/dia-da-pizza-ifood-registra-50-milhoes-de-pedidos-no-primeiro-semestre-de-2026/\">centraldovarejo.com.br</a>).</li>\n      <li><span class=\"chip good\">LAW</span> <strong>açaí has been <em>fruta nacional</em> since 01/08/2026</strong> — enshrined in <strong>Lei 15.330/2026</strong>, published in the Diário Oficial da União. The law amended Lei 11.675 from 2008, \"que já reconhecia o cupuaçu como fruta nacional\" (\"which had already recognized cupuaçu as a national fruit\") — Brazil now has two official national fruits (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT <em>adoçar</em> → <em>eu adocei</em>, ES <em>endulzar</em> → <em>yo endulcé</em></strong> — today's trap. Both endings look related but behave in opposite directions: in Portuguese, the cedilla <strong>disappears</strong> before <em>e</em> (the <em>c</em> is already soft there anyway); in Spanish, <strong>z becomes c</strong>. Never <em>*adoquei</em>, never <em>*endulzé</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE <em>-ieren</em> verbs take <em>no</em> ge- in the past participle</strong> — <em>ich habe frittiert / paniert / reklamiert</em>, never <em>*gefrittiert</em>. Rule of thumb: loan verbs ending in <em>-ieren</em> are stressed on the final syllable, and German <em>ge-</em> only attaches before an unstressed first syllable.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES <em>freír → yo frío</em>, participle <em>frito</em></strong> — a stem change e→í like <em>reír</em>, plus an irregular participle you eat every day: <em>papas fritas</em>. Likewise <strong><em>envolver → yo envuelvo</em>, participle <em>envuelto</em></strong> — never <em>*envolvido</em>.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>eine Extrawurst wollen</strong> (DE) — literally \"to demand an extra sausage,\" meaning, per Duden, \"informally, special treatment, an exception, or the fulfillment of an individual request\" (<a href=\"https://www.duden.de/sprachwissen/sprachratgeber/Die-beruehmte-Extrawurst\">duden.de</a>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>pagar o pato</strong> (PT-BR) — \"to pay for the duck\" = to take the blame for something someone else messed up, \"muitas vezes de forma injusta\" (\"often unfairly\") (<a href=\"https://www.dicio.com.br/pagar-o-pato/\">dicio.com.br</a>). Closest English equivalent: to be left holding the bag.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>me vale un cacahuate</strong> (ES-MX) — \"it's worth a peanut to me\" = I couldn't care less. A Mexicanism; the peanut stands for the lowest possible value. Emphatic variant: <em>me vale un reverendo cacahuate</em> (<a href=\"https://languagetool.org/insights/es/publicaciones/mexicanismos/\">languagetool.org</a>).</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>\"For here or to go?\"</strong> — PT <em>„Para comer aqui ou para levar?\"</em>, ES-MX <em>„¿Para aquí o para llevar?\"</em>. The single most important sentence at the counter, and shortest in Spanish: the verb disappears entirely.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado, 18 de julho — tema da semana <em>Comida, Cozinha, Restaurante</em>, sétima parte. Depois de Fundamentos (23.05), Restaurante II (30.05), Festa Junina (06.06), „No restaurante\" III (20.06), Cozinha em casa (04.07) e Churrasco (11.07), falta justamente o nível em que mais se come no Brasil: não o restaurante, não a churrasqueira, e sim a <strong>lanchonete</strong> — o balcão da esquina onde se come um <em>salgado</em> em pé e se toma um <em>guaraná</em> junto. Esse registro quase não tem equivalente em alemão, e as palavras mais úteis do dia são justamente aquelas que nem existem no português europeu. Dois ganchos datados emolduram o tema: desde a <strong>Lei 15.330, de 08/01/2026</strong>, o <strong>açaí</strong> é por lei <em>fruta nacional</em> brasileira — junto com o cupuaçu, que já tinha esse status desde 2008 (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>). E no <em>Dia da Pizza</em> (10.07), o <strong>iFood registrou 50 milhões de pedidos de pizza no primeiro semestre de 2026</strong> — o equivalente a <strong>195 por minuto</strong> (<a href=\"https://centraldovarejo.com.br/dia-da-pizza-ifood-registra-50-milhoes-de-pedidos-no-primeiro-semestre-de-2026/\">centraldovarejo.com.br</a>). O <em>motoboy</em>, portanto, não é uma palavra marginal, e sim infraestrutura. Na gramática, hoje é dia de ortografia: <strong>PT <em>adoçar → adocei</em></strong> contra <strong>ES <em>endulzar → endulcé</em></strong> — duas terminações que parecem iguais e se comportam de modo exatamente oposto. 30 entradas, 11 verbos com conjugação completa, sendo 3 revisões (<em>der Kellner</em>, <em>die Portion</em>, <em>reklamieren</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO AMIGO</span> <strong>die Marmelade ≠ marmalade</strong> — em alemão, <em>Marmelade</em> é o termo genérico para qualquer geleia de fruta cozida, seja de ei alterou a Lei 11.675, de 2008, „que já reconhecia o cupuaçu como fruta nacional\" — o Brasil tem agora, portanto, duas frutas nacionais oficiais (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT <em>adoçar</em> → <em>eu adocei</em>, ES <em>endulzar</em> → <em>yo endulcé</em></strong> — a armadilha do dia. As duas terminações parecem parentes, mas se comportam de modo oposto: em português, a cedilha <strong>desaparece</strong> antes de <em>e</em> (ali o <em>c</em> já é suave por natureza); em espanhol, <strong>o z vira c</strong>. Nunca <em>*adoquei</em>, nunca <em>*endulzé</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>verbos alemães em <em>-ieren</em> não recebem <em>ge-</em> no particípio II</strong> — <em>ich habe frittiert / paniert / reklamiert</em>, nunca <em>*gefrittiert</em>. Regra prática: verbos estrangeiros terminados em <em>-ieren</em> são tônicos no final, e o <em>ge-</em> alemão só se gruda antes de sílabas iniciais átonas.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES <em>freír → yo frío</em>, particípio <em>frito</em></strong> — mudança de radical e→í, como em <em>reír</em>, mais um particípio irregular que se come todo dia: <em>papas fritas</em>. Do mesmo jeito, <strong><em>envolver → yo envuelvo</em>, particípio <em>envuelto</em></strong> — nunca <em>*envolvido</em>.</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>eine Extrawurst wollen</strong> (DE) — literalmente „pedir uma salsicha extra\", quer dizer, segundo o Duden, „no uso coloquial, tratamento especial, exceção à regra ou realização de um desejo individual\" (<a href=\"https://www.duden.de/sprachwissen/sprachratgeber/Die-beruehmte-Extrawurst\">duden.de</a>).</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>pagar o pato</strong> (PT-BR) — expressão brasileira para arcar com algo que foi erro de outra pessoa, „muitas vezes de forma injusta\" (<a href=\"https://www.dicio.com.br/pagar-o-pato/\">dicio.com.br</a>). Mais próximo em alemão: <em>die Zeche zahlen</em> (literalmente „pagar a conta\").</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>me vale un cacahuate</strong> (ES-MX) — literalmente „vale para mim um amendoim\" = não me importa nem um pouco. Mexicanismo; o amendoim representa o menor valor possível. Variante reforçada: <em>me vale un reverendo cacahuate</em> (<a href=\"https://languagetool.org/insights/es/publicaciones/mexicanismos/\">languagetool.org</a>).</li>\n      <li><span class=\"chip\">FRASE</span> <strong>„Zum Hier-Essen oder zum Mitnehmen?\"</strong> — PT <em>„Para comer aqui ou para levar?\"</em>, ES-MX <em>„¿Para aquí o para llevar?\"</em>. A frase mais importante do balcão, e em espanhol é a mais curta: o verbo desaparece por completo.</li>\n    </ul></div>",

lquier untable de fruta cocida, tanto de fresa como de chabacano. En inglés, <em>marmalade</em> significa <strong>exclusivamente</strong> el untable de cítricos, casi siempre de naranja; todo lo demás se llama <em>jam</em>. Quien dice \"strawberry marmalade\" en inglés suena como alguien que pide vino tinto como si fuera blanco. El PT dice <em>a geleia</em>, el ES-MX <em>la mermelada</em> — ambos de nuevo sin la restricción de cítricos.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a lanchonete</strong> — el mostrador de comida rápida/snack bar. La palabra es una adaptación brasileña de <em>luncheonette</em>; en el portugués europeo se diría más bien <em>snack-bar</em> o <em>pastelaria</em>. <em>(Valoración de registro de la redacción, no es una fuente lexicográfica.)</em></li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o salgado</strong> — término colectivo para todo lo salado de la vitrina: coxinha, pastel, empada, quibe, esfirra, pão de queijo. El alemán no tiene ni una sola palabra para eso — \"empanada\" solo cubre la mitad. El blog de socios de iFood llama a la coxinha \"sem dúvidas, o salgado mais famoso do Brasil\" (<a href=\"https://blog-parceiros.ifood.com.br/tipos-de-salgados/\">blog-parceiros.ifood.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o motoboy</strong> — el repartidor en motocicleta, un préstamo del inglés con significado brasileño. Qué tan central es se ve en una cifra: iFood registró en el primer semestre de 2026 <span class=\"stat\">50 millones</span> de pedidos de pizza, en promedio <span class=\"stat\">195 por minuto</span> (cifras de prensa de iFood sobre el Dia da Pizza, 10/07/2026, <a href=\"https://centraldovarejo.com.br/dia-da-pizza-ifood-registra-50-milhoes-de-pedidos-no-primeiro-semestre-de-2026/\">centraldovarejo.com.br</a>).</li>\n      <li><span class=\"chip good\">LEY</span> <strong>el açaí es, desde el 08/01/2026, <em>fruta nacional</em></strong> — establecido en la <strong>Lei 15.330/2026</strong>, publicada en el Diário Oficial da União. La ley modificó la Lei 11.675 de 2008, \"que já reconhecia o cupuaçu como fruta nacional\" — Brasil tiene ahora dos frutas nacionales oficiales (<a href=\"https://www12.senado.leg.br/noticias/materias/2026/01/08/acai-e-reconhecido-em-lei-como-fruta-nacional\">senado.leg.br</a>).</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>PT <em>adoçar</em> → <em>eu adocei</em>, ES <em>endulzar</em> → <em>yo endulcé</em></strong> — la trampa del día. Ambas terminaciones parecen emparentadas, pero se comportan en direcciones opuestas: en portugués la cedilla <strong>desaparece</strong> antes de <em>e</em> (ahí la <em>c</em> ya suena suave de por sí), en español <strong>la z se convierte en c</strong>. Nunca <em>*adoquei</em>, nunca <em>*endulzé</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>los verbos alemanes en <em>-ieren</em> no llevan <em>ge-</em> en el participio</strong> — <em>ich habe frittiert / paniert / reklamiert</em>, nunca <em>*gefrittiert</em>. Regla práctica: los verbos de origen extranjero en <em>-ieren</em> llevan el acento al final, y el <em>ge-</em> alemán solo se antepone a primeras sílabas átonas.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>ES <em>freír → yo frío</em>, participio <em>frito</em></strong> — cambio de raíz e→í como en <em>reír</em>, además un participio irregular que se come todos los días: <em>papas fritas</em>. Igualmente <strong><em>envolver → yo envuelvo</em>, participio <em>envuelto</em></strong> — nunca <em>*envolvido</em>.</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>eine Extrawurst wollen</strong> (DE) — literalmente \"pedir una salchicha extra\", según Duden significa, en uso coloquial, \"trato especial, una excepción o el cumplimiento de un deseo individual\" (<a href=\"https://www.duden.de/sprachwissen/sprachratgeber/Die-beruehmte-Extrawurst\">duden.de</a>).</li>\n      <li><span class=\"chip good\ // ============================================================
// Dashboard logic
// ============================================================
(function () {
  const $ = (s, root) => (root || document).querySelector(s);
  const $$ = (s, root) => Array.from((root || document).querySelectorAll(s));
  const M = window.__MANIFESTS;
  const frame = $('#frame');
  const home = $('#home-view');
  const loading = $('#loading');
  const tldrGrid = $('#tldr-grid');

  // ── Language state ──────────────────────────────────────────────────
  // DE is the canonical language (always present). EN/PT/ES are produced
  // alongside by the nightly tasks; if a translation is missing for a
  // given date, urlFor() and the home/sidebar renderers transparently
  // fall back to the DE version so the dashboard keeps working as
  // translations roll out.
  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];
  const LANG_KEY = 'mb-lang';
  let currentLang = (function () {
    try {
      const v = localStorage.getItem(LANG_KEY);
      return SUPPORTED_LANGS.includes(v) ? v : 'de';
    } catch (_) { return 'de'; }
  })();

  function urlFor(catId, date, lang) {
    const cat = M.categories.find(c => c.id === catId);
    let useLang = 'de';
    if (cat) {
      const entry = cat.entries.find(e => e.date === date);
      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function headlineFor(entry, lang) {
    if (!entry) return '';
    if (entry.headlines && entry.headlines[lang]) return entry.headlines[lang];
    return entry.headline || '';
  }

  function tldrFor(cat, lang) {
    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {
      return cat.latestTldrHtmlByLang[lang];
    }
    return cat.latestTldrHtml || '';
  }
  const navGroups = $('#nav-groups');
  // Grouped nav config — drives BOTH the sidebar and the home tile grid so the
  // two never drift. Each group has a `header` (the .nav-label text, or null for
  // a standalone/unheadered group like jobs) and the ordered category ids it
  // contains. The flat order here must match build_manifest.CATEGORIES; a
  // category missing from every group would silently never render, so
  // renderSidebar/renderHome assert coverage against M.categories.
  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport
    { header: 'Sport',      cats: ['football', 'motorsport'] },
    { header: 'Freizeit',   cats: ['family'] },
    { header: 'Sprachen',   cats: ['learn-language'] }, // own trailing section
  ];
  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids
  // not present in M (defensive) and warns in the console about any manifest
  // category not placed in a group, so adding a category without updating
  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };
    }).filter(g => g.cats.length);
    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {
      console.warn('NAV_GROUPS missing categories (appended ungrouped):',
                   orphans.map(c => c.id));
      groups.push({ header: null, cats: orphans });
    }
    return groups;
  }

  function fmtDate(d) {
    const parts = d.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);
      }
    });
  }

  // Home-card TL;DR snapshot caps the bullet list at this many items — the
  // card is a scan teaser, the full set is one click away in the brief.
  const HOME_TLDR_BULLET_CAP = 5;
  // The active route as {catId, date}, parsed from the hash (#cat/date).
  function currentRoute() {
    const parts = location.hash.replace(/^#/, '').split('/');
    return { catId: parts[0] || null, date: parts[1] || null };
  }

  // The category dropdown holds only the month-calendar archive picker — no
  // flat date list. The calendar marks the selected day, jumps to its month,
  // and previews titles on hover.
  function renderDates(container, cat, activeDate) {
    container.innerHTML = '';
    if (cat.entries.length === 0) {
      container.innerHTML = '<div class="cat-empty">Heute kein Brief</div>';
      return;
    }
    if (activeDate === undefined) {
      const r = currentRoute();
      activeDate = r.catId === cat.id ? r.date : null;
    }
    const cal = document.createElement('div');
    cal.className = 'cat-cal';
    container.appendChild(cal);
    renderCalendar(cal, cat, activeDate);
  }

  // Month-calendar archive picker: only days that actually have a brief are
  // clickable; hovering/focusing one previews its title, clicking opens it.
  // Replaces the unbounded "show everything" list so the picker stays usable
  // once a category has hundreds of back-issues.
  const CAL_WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
  const CAL_MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
    'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
  const pad2 = n => String(n).padStart(2, '0');
  const monthIndex = iso => {
    const [y, m] = iso.split('-').map(Number);
    return y * 12 + (m - 1);
  };

  function renderCalendar(calEl, cat, activeDate) {
    const byDate = new Map(cat.entries.map(e => [e.date, e]));
    const newest = cat.entries[0].date;                       // manifest is newest-first
    const oldest = cat.entries[cat.entries.length - 1].date;
    const minMonth = monthIndex(oldest);
    const maxMonth = monthIndex(newest);
    const hasActive = activeDate && byDate.has(activeDate);
    // Open on the selected day's month when one is selected, else the newest.
    let cur = Math.min(maxMonth, Math.max(minMonth,
      hasActive ? monthIndex(activeDate) : maxMonth));

    calEl.innerHTML = `
      <div class="cal-bar">
        <button class="cal-nav" type="button" data-dir="-1" aria-label="Vorheriger Monat">‹</button>
        <span class="cal-title"></span>
        <button class="cal-nav" type="button" data-dir="1" aria-label="Nächster Monat">›</button>
      </div>
      <div class="cal-week">${CAL_WEEKDAYS.map(w => '<span>' + w + '</span>').join('')}</div>
      <div class="cal-grid"></div>
      <div class="cal-preview" aria-live="polite"></div>`;

    const title = calEl.querySelector('.cal-title');
    const grid = calEl.querySelector('.cal-grid');
    const preview = calEl.querySelector('.cal-preview');
    const prevBtn = calEl.querySelector('.cal-nav[data-dir="-1"]');
    const nextBtn = calEl.querySelector('.cal-nav[data-dir="1"]');

    function draw() {
      const year = Math.floor(cur / 12);
      const month = cur % 12;                                 // 0-based
      title.textContent = CAL_MONTHS[month] + ' ' + year;
      prevBtn.disabled = cur <= minMonth;
      nextBtn.disabled = cur >= maxMonth;
      grid.innerHTML = '';
      const startCol = (new Date(year, month, 1).getDay() + 6) % 7;   // shift so Monday = 0
      for (let i = 0; i < startCol; i++) {
        const blank = document.createElement('span');
        blank.className = 'cal-day blank';
        grid.appendChild(blank);
      }
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = year + '-' + pad2(month + 1) + '-' + pad2(d);
        const entry = byDate.get(iso);
        const cell = document.createElement(entry ? 'a' : 'span');
        cell.className = 'cal-day ' + (entry ? 'has' : 'none');
        cell.textContent = d;
        if (entry) {
          cell.href = '#' + cat.id + '/' + iso;
          if (iso === activeDate) cell.classList.add('current');
          const show = () => {
            preview.textContent = fmtDate(iso) + ' — ' + headlineFor(entry, currentLang);
          };
          cell.addEventListener('mouseenter', show);
          cell.addEventListener('focus', show);
          cell.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigate(cat.id, iso);
          });
        }
        grid.appendChild(cell);
      }
      // Seed the preview line with the selected day's title (else a prompt).
      preview.textContent = hasActive
        ? fmtDate(activeDate) + ' — ' + headlineFor(byDate.get(activeDate), currentLang)
        : 'Tag mit Brief wählen …';
    }

    [prevBtn, nextBtn].forEach(btn => btn.addEventListener('click', (e) => {
      e.stopPropagation();
      cur = Math.min(maxMonth, Math.max(minMonth, cur + Number(btn.dataset.dir)));
      draw();
    }));
    draw();
  }

  // Render one category row (head + collapsible dates list) and append
  // it to the given container. Extracted so both the Newsletter group
  // and the Sprachen group share identical row markup + behaviour.
  function renderCategoryRow(container, cat) {
    const wrap = document.createElement('div');
    wrap.className = 'cat';
    wrap.dataset.cat = cat.id;

    const head = document.createElement('div');
    head.className = 'cat-head';
    // Tooltip carries the label so it stays identifiable when the sidebar is collapsed.
    head.title = cat.label + (cat.entries.length ? ' · ' + fmtDate(cat.entries[0].date) : '');
    head.innerHTML = `
      <span class="cat-color"></span>
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <button class="cat-toggle" type="button" aria-label="Verlauf für ${cat.label} einblenden">▶</button>
    `;

    const dates = document.createElement('div');
    dates.className = 'cat-dates';

    // Row click: navigate to latest (or expand empty-state for empty categories).
    addClickAndKey(head, (e) => {
      if (e.target && e.target.closest && e.target.closest('.cat-toggle')) return;
      if (cat.entries.length === 0) {
        wrap.classList.toggle('open');
        renderDates(dates, cat);
        return;
      }
      navigate(cat.id, cat.entries[0].date);
    });

    // Chevron click: toggle the dropdown without navigating.
    const toggleBtn = head.querySelector('.cat-toggle');
    toggleBtn.setAttribute('aria-expanded', 'false');
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const willOpen = !wrap.classList.contains('open');
      wrap.classList.toggle('open');
      toggleBtn.setAttribute('aria-expanded', String(willOpen));
      if (willOpen) renderDates(dates, cat);
    });

    wrap.appendChild(head);
    wrap.appendChild(dates);
    container.appendChild(wrap);
  }

  // Render sidebar: one labelled section per NAV_GROUPS group, each holding its
  // category rows in order. A group with a null header renders its rows with no
  // label (the standalone jobs group); a group with a header gets a .nav-label
  // above its rows.
  function renderSidebar() {
    navGroups.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const label = document.createElement('div');
        label.className = 'nav-label';
        label.textContent = group.header;
        navGroups.appendChild(label);
      }
      group.cats.forEach(cat => renderCategoryRow(navGroups, cat));
    });
  }

  // Local date as YYYY-MM-DD (not toISOString — that's UTC and would flip the
  // "stale" check across midnight in BRT/CEST). Used to compare the manifest's
  // build date against "today" for the freshness banner.
  function todayLocalISO() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }

  // "Stand: DD.MM.YYYY" dateline above the home grid, from the manifest's
  // `generated` date. If the manifest wasn't rebuilt today the line goes to the
  // warn accent and appends a hint — so a silently-failed nightly task shows up
  // instead of stale cards masquerading as fresh.
  function renderFreshness() {
    const el = $('#home-stand');
    if (!el) return;
    const gen = M.generated;
    if (!gen || !/^\d{4}-\d{2}-\d{2}$/.test(gen)) { el.hidden = true; return; }
    const stale = gen < todayLocalISO();
    el.classList.toggle('stale', stale);
    const parts = gen.split('-');
    const long = parts[2] + '.' + parts[1] + '.' + parts[0];
    el.innerHTML = `Stand: <span class="stand-date">${long}</span>`
      + (stale ? ' <span class="stand-note">— heute noch nicht aktualisiert</span>' : '');
    el.hidden = false;
  }

  // Build one TL;DR card for a category (the actual TL;DR HTML embedded). Pulled
  // out of renderHome so the grid can interleave group headers between cards.
  function buildCard(cat) {
      const latest = cat.entries[0];
      const card = document.createElement('article');
      card.className = 'tldr-card';
      card.dataset.cat = cat.id;

      const dateStr = latest ? fmtDate(latest.date) : '— · —';
      const headline = headlineFor(latest, currentLang);
      const tldrHtml = tldrFor(cat, currentLang);

      // Fallback flag: the active language has no file for this date, so the
      // card is showing the DE original. Surface a small "DE" chip so the
      // reader knows the snapshot isn't in their chosen language.
      const usesFallback = currentLang !== 'de' && latest
        && Array.isArray(latest.langs) && !latest.langs.includes(currentLang);

      // Three states: full TL;DR loaded · entry exists but TL;DR not yet
      // extracted · no entry at all (the scheduled task hasn't produced one).
      // The third state gets dedicated "out-of-print" treatment.
      let bodyHtml;
      if (tldrHtml) {
        bodyHtml = `<div class="tldr-card-body">${tldrHtml}</div>`;
      } else if (latest) {
        bodyHtml = `<div class="tldr-empty">(TL;DR wird beim nächsten Dashboard-Update extrahiert — bis dahin Headline + Klick öffnet den Brief.)</div>`;
      } else {
        card.classList.add('tldr-card--empty');
        bodyHtml = `
          <div class="tldr-empty-block">
            <span class="tldr-empty-kicker">Heute kein Brief</span>
            <p class="tldr-empty-msg">Der geplante Task hat heute noch keine Ausgabe geliefert.
            Erscheint täglich — morgen wieder hier.</p>
          </div>`;
      }

      card.innerHTML = `
        <header class="tldr-card-head">
          <span class="tile-icon" aria-hidden="true">${cat.icon}</span>
          <span class="tile-name">${cat.label}</span>
          <span class="tile-date">${dateStr}</span>
          ${usesFallback ? '<span class="fallback-flag" title="Keine Übersetzung für diesen Tag — DE-Original">DE</span>' : ''}
        </header>
        ${headline ? `<div class="tldr-card-headline">${headline}</div>` : ''}
        ${bodyHtml}
        ${latest ? '<button class="tldr-read" type="button">Vollständiger Brief →</button>' : ''}
      `;
      // Cap the TL;DR snapshot bullets — long lists make the home grid hard to
      // scan, and the full set is one click away. Trim the overflow and leave a
      // muted "+N weitere" cue so the truncation is honest.
      const bulletList = card.querySelector('.tldr-card-body .tldr ul');
      if (bulletList) {
        const items = Array.from(bulletList.children).filter(el => el.tagName === 'LI');
        const overflow = items.length - HOME_TLDR_BULLET_CAP;
        if (overflow > 0) {
          items.slice(HOME_TLDR_BULLET_CAP).forEach(li => li.remove());
          const more = document.createElement('li');
          more.className = 'tldr-more';
          more.textContent = '+ ' + overflow + ' weitere im Brief';
          bulletList.appendChild(more);
        }
      }
      // Make the whole card keyboard-activatable. Skip non-newsletter cards
      // (empty categories) — they have no navigation target.
      if (latest) {
        card.setAttribute('aria-label', cat.label + ' · ' + dateStr + (headline ? ' · ' + headline : ''));
        addClickAndKey(card, (e) => {
          if (e.target && e.target.closest && e.target.closest('a')) return;
          navigate(cat.id, latest.date);
        });
      }

      // The embedded TL;DR HTML carries plain <a href="https://…"> source
      // links (no target). The dashboard has no <base target="_blank">, so
      // without forcing _blank a click would replace the dashboard window.
      card.querySelectorAll('.tldr-card-body a').forEach(a => {
        a.setAttribute('target', '_blank');
        if (!a.getAttribute('rel')) a.setAttribute('rel', 'noopener noreferrer');
      });

      return card;
  }

  // Render home view: the TL;DR cards, laid out in NAV_GROUPS order with a
  // full-width group header before each headed group (mirrors the sidebar). The
  // header is a grid item spanning all columns so the column flow restarts under
  // each group — same grouping the reader sees in the nav.
  function renderHome() {
    renderFreshness();
    tldrGrid.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const h = document.createElement('h3');
        h.className = 'tldr-group-head';
        h.textContent = group.header;
        tldrGrid.appendChild(h);
      }
      group.cats.forEach((cat, i) => {
        const card = buildCard(cat);
        // First card of each group starts a fresh visual run — clear its left
        // column rule so the group reads as its own block (the nth-child rules
        // can't track per-group position once headers are interspersed).
        if (i === 0) card.classList.add('group-first');
        tldrGrid.appendChild(card);
      });
    });
  }

  // Brand wordmark → back to the dashboard.
  const brandHome = $('#brand-home');
  if (brandHome) brandHome.addEventListener('click', (e) => { e.preventDefault(); showHome(); });

  // ── Breadcrumb / status path ─────────────────────────────────────────
  // Terminal path shown in the footer status line (`~` or `~/section[/date]`).
  const statusLoc = $('#status-loc');

  function updateBreadcrumb(catId, date) {
    if (!statusLoc) return;
    const cat = catId ? M.categories.find(c => c.id === catId) : null;
    let path = '~';
    if (cat) path += '/' + cat.label + (date ? '/' + fmtDate(date) : '');
    statusLoc.textContent = path;
  }

  // Navigate to a specific newsletter
  function navigate(catId, date) {
    home.classList.remove('show');
    frame.style.display = 'block';
    loading.classList.add('show');
    frame.src = urlFor(catId, date, currentLang);
    // Give the iframe a meaningful AT label so screen-reader users know what
    // they entered (the static title="Newsletter" on the element is generic).
    const cat = M.categories.find(c => c.id === catId);
    frame.title = cat ? cat.label + ' · ' + fmtDate(date) : 'Newsletter';
    frame.onload = () => { loading.classList.remove('show'); };
    frame.onerror = () => { loading.classList.remove('show'); };

    // Update active state in sidebar. Expansion stays user-controlled (the
    // chevron) — clicking a category just loads its latest brief, the list
    // stays hidden. But if the dropdown is already open, re-render it so the
    // calendar jumps to the selected day's month and marks it, and the list
    // keeps its expanded state.
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    $$('.cal-day.current').forEach(el => el.classList.remove('current'));
    const catEl = $('.cat[data-cat="' + catId + '"]');
    if (catEl) {
      catEl.classList.add('active');
      catEl.querySelector('.cat-head')?.setAttribute('aria-current', 'true');
      if (cat && cat.entries.length && catEl.classList.contains('open')) {
        renderDates(catEl.querySelector('.cat-dates'), cat, date);
      }
    }
    const hb = $('#home-btn');
    hb.classList.remove('active');
    hb.removeAttribute('aria-current');

    // Header title picks up the loaded newsletter's accent. The token names
    // line up: --c-economy / --c-economy-text, etc.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--c-' + catId + '-text)');

    updateBreadcrumb(catId, date);

    // Push a real history entry so the browser back button returns to the
    // previous view. Skip when we're already at this URL (handleHash got here
    // from a back/forward — re-pushing would clobber the stack).
    const targetHash = '#' + catId + '/' + date;
    if (location.hash !== targetHash) {
      history.pushState(null, '', targetHash);
    }
  }

  function showHome() {
    frame.style.display = 'none';
    home.classList.add('show');
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    const hb = $('#home-btn');
    hb.classList.add('active');
    hb.setAttribute('aria-current', 'page');
    // Dashboard's own "house" accent on the home view — black in light
     // mode, cream in dark mode (= var(--fg)). This keeps the header
     // title from defaulting to economy red when no newsletter is loaded;
     // home is its own thing, not a borrowed accent.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--fg)');
    updateBreadcrumb(null);
    // Same back-button logic as navigate(): only push when this is a fresh
    // transition, not when handleHash got here from back/forward.
    if (location.hash !== '#home' && location.hash !== '') {
      history.pushState(null, '', '#home');
    }
  }

  addClickAndKey($('#home-btn'), showHome);

  // Hash-based deep links
  function handleHash() {
    const hash = location.hash.replace(/^#/, '');
    if (!hash || hash === 'home') { showHome(); return; }
    const parts = hash.split('/');
    if (parts.length === 2) {
      const catId = parts[0];
      const date = parts[1];
      const cat = M.categories.find(c => c.id === catId);
      if (!cat) { showHome(); return; }
      if (date === 'latest' && cat.entries.length) {
        navigate(catId, cat.entries[0].date);
      } else {
        navigate(catId, date);
      }
    } else {
      showHome();
    }
  }

  // Animations toggle (footer) — default on; turning off adds html.anim-off
  // (components.css then kills every keyframe + the brand cursor blink) and
  // removes term-anim, persisting "anim"=off/on (read pre-paint in <head>).
  const animToggle = $('#anim-toggle');
  function syncAnim() {
    if (!animToggle) return;
    const on = !document.documentElement.classList.contains('anim-off');
    animToggle.setAttribute('aria-pressed', String(on));
    const box = animToggle.querySelector('.anim-box');
    if (box) box.textContent = on ? '[x]' : '[ ]';
  }
  if (animToggle) {
    syncAnim();
    animToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const turningOff = !html.classList.contains('anim-off');
      if (turningOff) {
        html.classList.add('anim-off');
        html.classList.remove('term-anim');
      } else {
        html.classList.remove('anim-off');
      }
      try { localStorage.setItem('anim', turningOff ? 'off' : 'on'); } catch (_) {}
      syncAnim();
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Language picker — single trigger button with flag + native short
     label, opens an upward dropdown menu with all four locales. The
     trigger updates its flag/label to mirror the active selection;
     menu options use aria-selected for active state.

     Switching re-renders the sidebar + home (so headlines + TL;DR HTML
     refresh) and, if a newsletter is currently loaded in the iframe,
     swaps to the matching language URL via urlFor() (falls back to DE
     when a translation is missing for that date).
     ────────────────────────────────────────────────────────────────── */
  const LANG_DISPLAY = {
    de: { short: 'DE', native: 'Deutsch' },
    en: { short: 'EN', native: 'English' },
    pt: { short: 'PT', native: 'Português' },
    es: { short: 'ES', native: 'Español' },
  };
  const langTrigger = $('#lang-trigger');
  const langMenu    = $('#lang-menu');
  const langOptions = $$('.lang-option');

  function setLangMenuOpen(open) {
    if (!langMenu || !langTrigger) return;
    langMenu.hidden = !open;
    langTrigger.setAttribute('aria-expanded', String(open));
  }

  function applyLang(lang) {
    if (!SUPPORTED_LANGS.includes(lang)) lang = 'de';
    currentLang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
    // Update trigger label + flag.
    if (langTrigger) {
      const d = LANG_DISPLAY[lang] || LANG_DISPLAY.de;
      const flagEl  = langTrigger.querySelector('.dd-flag');
      const labelEl = langTrigger.querySelector('.lang-label-short');
      if (flagEl)  flagEl.className    = 'dd-flag dd-flag-' + lang;
      if (labelEl) labelEl.textContent = d.short;
      langTrigger.title = 'Sprache: ' + d.native + ' (klicken zum Wechseln)';
    }
    // Update aria-selected on options.
    langOptions.forEach(opt => {
      opt.setAttribute('aria-selected', String(opt.dataset.lang === lang));
    });
    // Re-render so headlines + TL;DR pick up the chosen language.
    renderSidebar();
    renderHome();
    // If a specific newsletter is currently open, reload it in the new
    // language (handleHash re-enters navigate() which uses urlFor()).
    if (location.hash && location.hash !== '#home' && location.hash !== '') {
      handleHash();
    }
  }

  if (langTrigger && langMenu) {
    langTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      setLangMenuOpen(langMenu.hidden);
    });
    langOptions.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applyLang(opt.dataset.lang);
        setLangMenuOpen(false);
      });
    });
    // Click-outside + Escape close the menu.
    document.addEventListener('click', (e) => {
      if (!langMenu.hidden && !e.target.closest('.lang-picker')) setLangMenuOpen(false);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !langMenu.hidden) {
        setLangMenuOpen(false);
        langTrigger.focus();
      }
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Theme toggle — three states (auto / light / dark). Auto follows
     prefers-color-scheme; light and dark force the palette regardless
     of the system setting. Persisted in localStorage.
     ────────────────────────────────────────────────────────────────── */
  const THEME_KEY = 'mb-theme';
  const themeDropdown = $('#theme-dropdown');
  const themeOrder = ['warm', 'green', 'mono', 'paper'];
  const themeLabel = { warm: 'warm', green: 'grün', mono: 'mono', paper: 'paper' };
  function applyTheme(state) {
    document.documentElement.setAttribute('data-theme', state);
    if (themeDropdown) {
      const label = themeDropdown.querySelector('.theme-label');
      if (label) label.textContent = themeLabel[state];
      themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((item) => {
        item.setAttribute('aria-current', item.dataset.themeValue === state ? 'true' : 'false');
      });
    }
    try { localStorage.setItem(THEME_KEY, state); } catch (_) {}
    // Mirror into the iframed content page. Same-origin, so direct DOM
    // access works. The newsletter's lib/tokens.css already defines the
    // warm-dark + light overrides; we just toggle the data-theme attr.
    syncIframeTheme();
  }

  // Set/clear data-theme on the iframe's <html>. Called from applyTheme()
  // and from the iframe's load event so it sticks across navigation.
  function syncIframeTheme() {
    try {
      const doc = frame && frame.contentDocument;
      if (!doc || !doc.documentElement) return;
      const cur = document.documentElement.getAttribute('data-theme');
      if (cur) doc.documentElement.setAttribute('data-theme', cur);
      else     doc.documentElement.removeAttribute('data-theme');
    } catch (_) { /* cross-origin or not yet loaded — ignore */ }
  }
  // Re-apply on every iframe load (navigating between newsletters).
  if (frame) frame.addEventListener('load', syncIframeTheme);
  // Theme dropdown: pick a theme → apply + close. Click-away / Escape also close it.
  if (themeDropdown) {
    themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((btn) => {
      addClickAndKey(btn, () => {
        applyTheme(btn.dataset.themeValue);
        themeDropdown.removeAttribute('open');
      });
    });
    document.addEventListener('click', (e) => {
      if (themeDropdown.open && !themeDropdown.contains(e.target)) themeDropdown.removeAttribute('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && themeDropdown.open) themeDropdown.removeAttribute('open');
    });
  }
  try {
    const saved = localStorage.getItem(THEME_KEY);
    applyTheme(saved && themeOrder.includes(saved) ? saved : 'warm');
  } catch (_) { applyTheme('warm'); }

  // Re-render on hashchange (initial load + browser back/forward). Browser
  // back/forward still work via the hash URLs + pushState in navigate()/showHome().
  function handleHashAndSettle() { handleHash(); }

  /* ──────────────────────────────────────────────────────────────────
     Nav-rail minimize toggle. The chevron (#rail-toggle) collapses the rail
     to an icon-only strip on desktop; the FAB (#rail-fab) opens it as a drawer
     on mobile. Collapsed state persists in localStorage (mb-nav-rail).
     ────────────────────────────────────────────────────────────────── */
  const RAIL_KEY = 'mb-nav-rail';
  const appShell  = $('.app-shell');
  const railToggle = $('#rail-toggle');
  const railFab    = $('#rail-fab');

  function setRailCollapsed(collapsed) {
    if (!appShell) return;
    appShell.classList.toggle('rail-collapsed', collapsed);
    if (railToggle) {
      railToggle.setAttribute('aria-expanded', String(!collapsed));
      const glyph = railToggle.querySelector('.rail-toggle-glyph');
      if (glyph) glyph.textContent = collapsed ? '«' : '»';
    }
    try { localStorage.setItem(RAIL_KEY, collapsed ? 'collapsed' : 'expanded'); } catch (_) {}
  }

  if (railToggle) {
    railToggle.addEventListener('click', () => {
      setRailCollapsed(!appShell.classList.contains('rail-collapsed'));
    });
  }
  // Mobile FAB toggles the off-canvas drawer (a separate .rail-open state).
  if (railFab && appShell) {
    railFab.addEventListener('click', () => appShell.classList.toggle('rail-open'));
    // A nav click inside the drawer closes it; click-away closes it too.
    $('#nav-rail')?.addEventListener('click', (e) => {
      if (e.target.closest('.cat-head, .home-btn, .cat-date, .cal-day.has')) {
        appShell.classList.remove('rail-open');
      }
    });
    document.addEventListener('click', (e) => {
      if (appShell.classList.contains('rail-open')
          && !e.target.closest('#nav-rail') && !e.target.closest('#rail-fab')) {
        appShell.classList.remove('rail-open');
      }
    });
  }
  // Restore persisted collapsed state.
  try {
    setRailCollapsed(localStorage.getItem(RAIL_KEY) === 'collapsed');
  } catch (_) { setRailCollapsed(false); }

  // Init — set the lang button states from the restored currentLang (re-renders
  // sidebar/home implicitly), then resolve the initial hash.
  applyLang(currentLang);
  handleHash();
  window.addEventListener('hashchange', handleHashAndSettle);
})();
</script>
</body>
</html>
