<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block, then a `visitor@briefs:~`
     breadcrumb. RIGHT: the `$ ls -l ▾` nav dropdown. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
    flex-wrap: wrap;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    flex: 1 1 auto;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }
  /* Breadcrumb: `visitor@briefs:~/path`. The host part is muted, `~` is the
     accent, the active path segment is --foreground. Truncates on overflow. */
  .header-crumb {
    min-width: 0;
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.72rem;
    color: var(--muted-foreground);
  }
  .header-crumb .crumb-host { color: var(--muted-foreground); }
  .header-crumb .crumb-root {
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
  }
  .header-crumb .crumb-root:hover { text-decoration: underline; }
  .header-crumb .crumb-sep { color: var(--muted-foreground); }
  .header-crumb .crumb-seg {
    color: var(--muted-foreground);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .header-crumb .crumb-seg:hover { color: var(--primary); }
  .header-crumb .crumb-seg.current { color: var(--foreground); cursor: default; }
  .header-nav { flex: none; display: flex; align-items: center; }

  /* `$ ls -l ▾` nav trigger — terminal directory listing dropped flush-right
     below the summary. */
  .ls-summary { white-space: nowrap; }
  .ls-summary .ls-cmd { color: inherit; }
  .ls-panel {
    top: calc(100% + 8px);
    bottom: auto;
    right: 0;
    left: auto;
    min-width: max-content;
    max-width: min(86vw, 360px);
    max-height: min(72vh, 560px);
    overflow-y: auto;
    padding: 6px 0;
  }

  /* Layout: single full-width column. The fixed footer is 2rem tall, so the
     shell is the viewport minus the header (3rem) and the footer (2rem). */
  .app-shell {
    display: block;
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }

  /* The nav lives inside the header's `$ ls -l ▾` dropdown panel. The panel
     holds the Übersicht control (#home-btn) and #nav-groups (the grouped
     category nav, populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] visitor@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, print, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  .theme-dot { width: 11px; height: 11px; flex: none; }
  .lang-flag { font-size: 1rem; line-height: 1; }
  .dropdown-item .lang-flag { font-size: 1.05rem; }

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --cat-accent: var(--c-jobs);           --cat-accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); --cat-accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport);     --cat-accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto);  --cat-accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted-ink); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --cat-accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    margin: 0;
    border-radius: 0;
    cursor: pointer; font-weight: 600; font-size: 0.8rem;
    color: var(--foreground);
    transition: background 120ms, color 0.15s ease;
    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the header nav dropdown serves mobile
     too (no separate drawer), so only a few layout tweaks are needed.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    /* Drop the breadcrumb on the smallest widths — the brand + nav dropdown
       carry the chrome; the path would otherwise crowd the row. */
    .header-crumb { display: none; }
    .status-controls { gap: 0.9rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — hide the header + footer chrome and let the iframe content (or
     home grid) take the full page. Same-origin iframes print their content
     natively, so the visible newsletter prints with its own @media print
     rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, footer.status-bar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted-ink);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--cat-accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--cat-accent-text);
    color: var(--bg);
    border: 1px solid var(--cat-accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<!-- Terminal header bar: brand wordmark + cursor + breadcrumb (left), the
     `$ ls -l ▾` nav dropdown (right). The nav dropdown holds the Übersicht
     control (#home-btn) and the grouped category nav (#nav-groups), serving
     desktop and mobile alike (no separate drawer). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
    <span class="header-crumb" id="header-crumb" aria-live="polite">
      <span class="crumb-host">visitor@briefs:</span><a class="crumb-root" href="#home">~</a>
    </span>
  </div>

  <div class="header-nav">
    <details class="dropdown" id="nav-dropdown">
      <summary class="ls-summary" aria-label="Navigation">
        <span aria-hidden="true">$</span>
        <span class="ls-cmd">ls -l</span>
        <span aria-hidden="true">▾</span>
      </summary>
      <div class="dropdown-panel ls-panel">
        <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
          <span class="cat-color"></span>
          <!-- Full favicon design inline: dark frame + cream page + red
               double-rule + serif M. Identical SVG to favicon.svg so the
               browser tab and the home control read as the same "house" mark. -->
          <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <rect width="64" height="64" rx="9" fill="#221a13"/>
            <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
            <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
            <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
            <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
                  font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
          </svg>
          <span>Übersicht</span>
        </div>
        <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
             nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
             with its own .nav-label header (standalone groups render headerless). --></div>
      </div>
    </details>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">
      <p class="home-stand" id="home-stand" hidden><!-- populated by JS: "Stand: DD.MM.YYYY" --></p>
      <div class="tldr-grid" id="tldr-grid"><!-- populated by JS --></div>
    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>
</div>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, print, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">
      <span class="status-tag">[briefs]</span> <span class="status-host">visitor@briefs:</span><span class="status-loc" id="status-loc">~</span>
    </span>
    <nav class="status-controls" aria-label="Einstellungen">
      <button class="status-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Theme umschalten" title="Theme umschalten"
              data-theme-state="warm">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">warm</span>
      </button>
      <button class="status-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <span class="status-sep" aria-hidden="true"></span>
      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-label="Sprache wählen" title="Sprache wählen">
          <span class="lang-flag" aria-hidden="true">🇩🇪</span>
          <span class="lang-label-short">DE</span>
          <span class="lang-caret" aria-hidden="true">▾</span>
        </button>
        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="de" aria-selected="true">
            <span class="lang-flag" aria-hidden="true">🇩🇪</span><span>Deutsch</span>
          </button>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="en" aria-selected="false">
            <span class="lang-flag" aria-hidden="true">🇺🇸</span><span>English</span>
          </button>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="pt" aria-selected="false">
            <span class="lang-flag" aria-hidden="true">🇧🇷</span><span>Português</span>
          </button>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="es" aria-selected="false">
            <span class="lang-flag" aria-hidden="true">🇲🇽</span><span>Español</span>
          </button>
        </div>
      </div>
      <span class="status-sep" aria-hidden="true"></span>
      <button class="status-btn anim-toggle" id="anim-toggle" type="button"
              aria-pressed="true" title="Animationen umschalten">
        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

<!-- Print picker dialog. Native <dialog> with showModal() gives focus
     trap, Escape-close, and backdrop click-out for free. The options
     list is populated dynamically from the manifest when the dialog
     opens (so today's available newsletters are always accurate). -->
<dialog id="print-dialog" class="print-dialog" aria-labelledby="print-dialog-title">
  <h2 id="print-dialog-title">Drucken</h2>
  <p class="print-dialog-lead">Wählen, welche Ausgaben gedruckt werden sollen.
    Das Layout ist eine zweispaltige A4-Broadsheet-Seite pro Newsletter
    — nicht der Browser-Default.</p>
  <ul class="print-options" id="print-options"></ul>
  <div class="print-actions">
    <button type="button" class="print-cancel" id="print-cancel">Abbrechen</button>
    <button type="button" class="print-run" id="print-run">Drucken</button>
  </div>
</dialog>

<!-- Print container: filled at print time with selected newsletter
     content, hidden on screen via display:none, made visible only
     under @media print when body.printing is set. -->
<div class="print-root" id="print-root" hidden></div>

ng>: gestiegen von 3,8 % — genau warum die Fed nicht senkt.</li>\n      <li><span class=\"chip\">MARKT</span> <strong>Ibovespa 173.295 (+0,76 %)</strong>; BR 5J-CDS 128 bp; 10J-Rendite 14,47 %.</li>\n      <li><span class=\"chip good\">PLAN</span> <strong>Ruhige Woche</strong>: Fr 04.07. US-Feiertag (Märkte zu); Mo 30.06. neuer Focus-Survey aus Brasília.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The euro has pulled off a complete central bank pivot in two weeks: the ECB has raised rates for the first time since 2023, while the Fed stays hawkish in place. Both moves push the euro — and your main exposure, EUR/BRL — higher. The ECB fix stands at <strong>5.9010</strong> (Friday, June 26). Today is Saturday, FX is closed; all numbers below are Friday's close. If you want to swap EUR for BRL: the rate is working in your favor right now, but Brazilian fiscal risk lurks in the background.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9010</strong>: ECB reference from Friday June 26; cross-rate check confirmed (0.001% deviation) — clean.</li>\n      <li><span class=\"chip hot\">ECB</span> <strong>First hike since 2023</strong>: Deposit rate +25 bp to 2.25% (effective June 17), due to energy/Middle East inflation. Strengthens the euro.</li>\n      <li><span class=\"chip\">FED</span> <strong>Hawkish hold</strong>: Benchmark rate stays at 3.50–3.75%, but the dot plot median was lifted to 3.8% — 9 of 18 members see at least one more hike in 2026.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic at 14.25%</strong>: third cut in a row (June 17) — despite inflation at 4.72%. Reduces the real's yield advantage.</li>\n      <li><span class=\"chip hot\">BR-Fiscal</span> <strong>R$143.7 billion election-year package</strong>: 11 new programs; total 2026 stimulus heading toward R$700 billion — twice 2025. That's the biggest BRL risk.</li>\n      <li><span class=\"chip good\">OIL</span> <strong>Brent −3% to ~$72</strong>: Hormuz open again, US-Iran rapprochement. Eases Brazilian inflation, but pressures Petrobras dividend story.</li>\n      <li><span class=\"chip\">BR</span> <strong>GDP Q1 +1.1% QoQ</strong>: solid growth (+1.8% YoY), BBVA raises 2026 forecast to 2.1%.</li>\n      <li><span class=\"chip\">USA</span> <strong>PCE inflation 4.1%</strong>: up from 3.8% — exactly why the Fed is not cutting.</li>\n      <li><span class=\"chip\">MARKET</span> <strong>Ibovespa 173,295 (+0.76%)</strong>; BR 5Y-CDS 128 bp; 10Y yield 14.47%.</li>\n      <li><span class=\"chip good\">PLAN</span> <strong>Quiet week</strong>: Fri July 4 US holiday (markets closed); Mon June 30 new Focus survey from Brasília.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O euro fez uma reversão completa do banco central em duas semanas: o BCE elevou as taxas pela primeira vez desde 2023, enquanto o Fed mantém sua dureza. Ambos os movimentos empurram o euro — e sua exposição principal, EUR/BRL — para cima. A fixação do BCE está em <strong>5,9010</strong> (sexta-feira, 26.06.). Hoje é sábado, câmbio fechado; todos os números abaixo são do fechamento de sexta-feira. Se você quer trocar EUR por BRL: o câmbio está funcionando a seu favor agora, mas o risco fiscal brasileiro está à espreita no fundo.</p>\n    <ul>\n      <li><span class=\"chip hot\">CÂMBIO</span> <strong>EUR/BRL 5,9010</strong>: referência do BCE de sexta 26.06.; cruzamento confirmado (0,001% de desvio) — limpo.</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>Primeira elevação desde 2023</strong>: taxa de depósito +25 bp para 2,25% (vigência 17.06.), por inflação de energia/Oriente Médio. Fortalece o euro.</li>\n      <li><span class=\"chip\">FED</span> <strong>Mantém durão</strong>: taxa de referência fica em 3,50–3,75%, mas a mediana do dot plot foi elevada para 3,8% — 9 de 18 membros veem pelo menos um aumento em 2026.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic em 14,25%</strong>: terceiro corte consecutivo (17.06.) — apesar da inflação em 4,72%. Reduz a vantagem de rendimento do real.</li>\n      <li><span class=\"chip hot\">BR-Fiscal</span> <strong>Pacote de eleição de R$ 143,7 bilhões</strong>: 11 novos programas; estímulo total 2026 rumo a R$ 700 bilhões — o dobro de 2025. Esse é o maior risco para o BRL.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Brent −3% para ~$72</strong>: Hormuz aberto novamente, aproximação EUA-Irã. Alivia inflação brasileira, mas pressiona história de dividendos da Petrobras.</li>\n      <li><span class=\"chip\">BR</span> <strong>PIB Q1 +1,1% a.a. / +1,8% a.a.</strong>: crescimento sólido, BBVA eleva previsão 2026 para 2,1%.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Inflação PCE 4,1%</strong>: subiu de 3,8% — exatamente por isso o Fed não corta.</li>\n      <li><span class=\"chip\">MERCADO</span> <strong>Ibovespa 173.295 (+0,76%)</strong>; CDS 5A BR 128 bp; rendimento 10A 14,47%.</li>\n      <li><span class=\"chip good\">AGENDA</span> <strong>Semana calma</strong>: sex 04.07. feriado EUA (mercados fechados); seg 30.06. novo levantamento Focus de Brasília.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El euro hizo un giro completo del banco central en dos semanas: el BCE subió tasas por primera vez desde 2023, mientras la Fed se mantiene dura. Ambos movimientos empujan el euro —y tu exposición principal, EUR/BRL— hacia arriba. La fijación del BCE está en <strong>5,9010</strong> (viernes, 26.06.). Hoy es sábado, tipo de cambio cerrado; todos los números abajo son cierre de viernes. Si quieres cambiar EUR por BRL: el tipo está a tu favor en este momento, pero el riesgo fiscal brasileño acecha en el fondo.</p>\n    <ul>\n      <li><span class=\"chip hot\">TIPO</span> <strong>EUR/BRL 5,9010</strong>: referencia BCE de viernes 26.06.; cruzamiento confirmado (0,001% de desviación) — limpio.</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>Primer alza desde 2023</strong>: tasa de depósito +25 pb a 2,25% (vigencia 17.06.), por inflación de energía/Oriente Medio. Fortalece el euro.</li>\n      <li><span class=\"chip\">FED</span> <strong>Se mantiene duro</strong>: tasa de referencia en 3,50–3,75%, pero la mediana dot plot subió a 3,8% — 9 de 18 miembros ven al menos una subida en 2026.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic en 14,25%</strong>: tercer corte consecutivo (17.06.) — a pesar de inflación en 4,72%. Reduce la ventaja de rendimiento del real.</li>\n      <li><span class=\"chip hot\">BR-Fiscal</span> <strong>Paquete electoral de R$ 143,7 mil millones</strong>: 11 programas nuevos; estímulo total 2026 rumbo a R$ 700 mil millones — el doble de 2025. Ese es el riesgo mayor para BRL.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Brent −3% a ~$72</strong>: Ormuz abierto nuevamente, acercamiento EUA-Irán. Alivio de inflación brasileña, pero presiona historia de dividendos de Petrobras.</li>\n      <li><span class=\"chip\">BR</span> <strong>PIB Q1 +1,1% t.a. / +1,8% a.a.</strong>: crecimiento sólido, BBVA sube previsión 2026 a 2,1%.</li>\n      <li><span class=\"chip\ tungen traf — aber −3 % auf Wochensicht (vierte Verlustwoche).</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>BTC ~60.144 $</strong> (live Sa, +0,6 % 24h, −5,3 % 7d) erholt sich von einer 13-Tage-ETF-Abfluss-Serie (4,4 Mrd. $); <strong>ETH ~1.573 $</strong>. BTC −23 % auf 30-Tage-Sicht.</li>\n      <li><span class=\"chip\">Öl</span> <strong>WTI 69,40 $</strong> (−3,51 %), Brent ~72 $: Überangebots-Sorgen; OPEC+ erhöht im Juli zum zweiten Mal um 188.000 b/d.</li>\n    </ul></div>",

f — aber −3 % auf Wochensicht (vierte Verlustwoche).</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>BTC ~60.144 $</strong> (live Sa, +0,6 % 24h, −5,3 % 7d) erholt sich von einer 13-Tage-ETF-Abfluss-Serie (4,4 Mrd. $); <strong>ETH ~1.573 $</strong>. BTC −23 % auf 30-Tage-Sicht.</li>\n      <li><span class=\"chip\">Öl</span> <strong>WTI 69,40 $</strong> (−3,51 %), Brent ~72 $: Überangebots-Sorgen; OPEC+ erhöht im Juli zum zweiten Mal um 188.000 b/d.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Saturday — markets are closed, so the <strong>Friday closing prices</strong> (06.26.) are below; crypto runs around the clock, values live from Saturday. The weekend begins with a split picture: a handful of Mag-7 names (above all <strong>Microsoft +5.7%</strong> thanks to Azure) kept the indices afloat, but beneath the surface the AI bet is crumbling. The trigger is word that <strong>OpenAI could push its IPO to 2027</strong> — the AI complex sold broadly, chip stocks (Nvidia &amp; Co.) are in their <em>fifth</em> losing week in a row. In the background, the PCE inflation report released Thursday buried the last rate-cut hopes for 2026.</p>\n    <ul>\n      <li><span class=\"chip good\">Stock</span> <strong>Microsoft +5.71%</strong> to $372.97 (06.26.): strong Azure growth and bullish analyst outlooks — the clear bright spot against AI headwinds.</li>\n      <li><span class=\"chip hot\">AI Trade</span> <strong>OpenAI considers IPO delay to 2027</strong> (NYT report): triggered broad AI sell-off — SoftBank in Tokyo −12%, ARM −4%, AMD −3.5% premarket.</li>\n      <li><span class=\"chip hot\">Macro</span> <strong>Core PCE 3.40% (May)</strong>, released Thu 06.25. — highest level since Oct 2023; headline PCE at 4.1%. Rate cuts before 2027 essentially off the table.</li>\n      <li><span class=\"chip\">Chips</span> <strong>NVDA −1.64%</strong> to $192.53 — fifth losing week for semiconductors in a row. Money rotates out of tech, into defensives.</li>\n      <li><span class=\"chip\">Index</span> <strong>Nasdaq −0.24%</strong> (25,297.62) — fifth losing day in a row; S&amp;P 500 −0.05% (7,354.02), Dow −0.09% (51,876.11).</li>\n      <li><span class=\"chip good\">Gold</span> <strong>XAU/USD $4,087</strong> (+1.49% on Fri): two recovery days after PCE met expectations — but −3% week-to-date (fourth losing week).</li>\n      <li><span class=\"chip hot\">Crypto</span> <strong>BTC ~$60,144</strong> (live Sat, +0.6% 24h, −5.3% 7d) recovers from a 13-day ETF outflow streak ($4.4B); <strong>ETH ~$1,573</strong>. BTC −23% on 30-day view.</li>\n      <li><span class=\"chip\">Oil</span> <strong>WTI $69.40</strong> (−3.51%), Brent ~$72: oversupply concerns; OPEC+ raises output in July for the second time by 188,000 b/d.</li>\n    </ul></div>",

PCE atender expectativas — mas −3% na semana (quarta semana de perda).</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>BTC ~$60.144</strong> (ao vivo sab, +0,6% 24h, −5,3% 7d) se recupera de uma série de 13 dias de saída de ETF ($4,4 bi); <strong>ETH ~$1.573</strong>. BTC −23% em 30 dias.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>WTI $69,40</strong> (−3,51%), Brent ~$72: preocupações de excesso de oferta; OPEC+ aumenta produção em julho pela segunda vez em 188.000 b/d.</li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Wochenend-Newstag, aber die Woche hatte Wucht: OpenAI hat mit Broadcom seinen ersten eigenen Inferenz-Chip vorgestellt — ein Schritt weg von der reinen Nvidia-Abhängigkeit. Parallel zeigt der „Miasma\"-npm-Wurm, dass selbst eine korrekt signierte SLSA-Provenance kein Vertrauensanker mehr ist, wenn das CI-Konto kompromittiert ist. Und die CISA-KEV-Liste hat eine seltene Dreifach-CVSS-10 für UniFi-Geräte bekommen. Drei Themen, die alle dieselbe Frage stellen: Wem oder was vertraut deine Build-Pipeline eigentlich noch?</p>\n    <ul>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>OpenAI × Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-ASIC, TSMC-3nm, reticle-groß, 9-Monate-Tape-out. ~50 % günstigere Inferenz — aber das ist Sekundär-Zahl, nicht OpenAIs offizielle Angabe.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Miasma-npm-Wurm</strong>: kompromittiertes Red-Hat-GitHub-Konto, 32+ Pakete, ~80k Downloads/Woche — mit <em>gültigen</em> SLSA-Attestierungen via OIDC. Lieferketten-Vertrauen unter Beschuss.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>UniFi OS Triple-CVSS-10</strong>: CVE-2026-34908/09/10, unauth RCE-Kette, seit 23.06. in CISA-KEV, Bundes-Frist 26.06. (vorbei). Patch: UniFi OS Server v5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Splunk pre-auth RCE</strong>: CVE-2026-20253, CVSS 9.8 über PostgreSQL-Sidecar, PoC seit 13.06. öffentlich, in KEV. Fix: 10.4.0/10.2.4/10.0.7.</li>\n      <li><span class=\"chip good\">Standards</span> <span class=\"chip\">Global</span> <strong>ARD-Spec</strong>: 11 Firmen (Google, Microsoft, NVIDIA, HF …) veröffentlichen offenen Apache-2.0-Discovery-Standard — `ai-catalog.json` als robots.txt fürs Agenten-Zeitalter.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Apple Xcode 26.6 stabil</strong> (25.06.) raus; Xcode 27 Dev-Beta läuft nur noch auf Apple Silicon, spricht MCP + Agent Client Protocol.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Django 6.1 Beta 1</strong> (24.06.): konfigurierbare Field-Fetch-Modi, PostgreSQL ≥ 15 jetzt Pflicht, Python 3.12–3.14.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA-Countdown</strong>: Melde-Pflicht für Vorfälle ab 11.09.2026 — &lt; 100 Tage. ENISA macht im Juni Dry-Runs.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome V8 Zero-Day</strong> CVE-2026-11645 (in KEV seit 09.06.), gefixt in Chrome 149; Chrome 150 stabil für 30.06. terminiert.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI-Warnung</strong> (22.06.): KI-Systeme schnell genug, um Schwachstellen eigenständig in Angriffspfade zu verwandeln — kein Modell-Hype, sondern eine Threat-Model-Aktualisierung.</li>\n    </ul></div>",

lass=\"chip\">Global</span> <strong>Apple Xcode 26.6 stabil</strong> (25.06.) raus; Xcode 27 Dev-Beta läuft nur noch auf Apple Silicon, spricht MCP + Agent Client Protocol.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Django 6.1 Beta 1</strong> (24.06.): konfigurierbare Field-Fetch-Modi, PostgreSQL ≥ 15 jetzt Pflicht, Python 3.12–3.14.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA-Countdown</strong>: Melde-Pflicht für Vorfälle ab 11.09.2026 — &lt; 100 Tage. ENISA macht im Juni Dry-Runs.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome V8 Zero-Day</strong> CVE-2026-11645 (in KEV seit 09.06.), gefixt in Chrome 149; Chrome 150 stabil für 30.06. terminiert.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI-Warnung</strong> (22.06.): KI-Systeme schnell genug, um Schwachstellen eigenständig in Angriffspfade zu verwandeln — kein Modell-Hype, sondern eine Threat-Model-Aktualisierung.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet weekend news day, but the week packed a punch: OpenAI unveiled its first custom inference chip with Broadcom — a step away from pure Nvidia dependence. Meanwhile, the \"Miasma\" npm worm shows that even a correctly signed SLSA provenance is no longer a trust anchor if the CI account is compromised. And CISA's KEV list just got a rare triple CVSS-10 for UniFi devices. Three stories that all ask the same question: Who or what does your build pipeline actually trust anymore?</p>\n    <ul>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>OpenAI × Broadcom \"Jalapeño\"</strong>: first custom inference ASIC, TSMC 3nm, reticle-sized, nine-month tape-out. ~50% cheaper inference — but that's a secondary number, not OpenAI's official claim.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Miasma npm worm</strong>: compromised Red Hat GitHub account, 32+ packages, ~80k downloads/week — with <em>valid</em> SLSA attestations via OIDC. Supply chain trust under attack.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>UniFi OS Triple CVSS-10</strong>: CVE-2026-34908/09/10, unauthenticated RCE chain, in CISA KEV since 06-23. Federal deadline 06-26 (past). Patch: UniFi OS Server v5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Splunk pre-auth RCE</strong>: CVE-2026-20253, CVSS 9.8 via PostgreSQL sidecar, PoC public since 06-13, in KEV. Fix: 10.4.0/10.2.4/10.0.7.</li>\n      <li><span class=\"chip good\">Standards</span> <span class=\"chip\">Global</span> <strong>ARD spec</strong>: 11 companies (Google, Microsoft, NVIDIA, HF…) publish open Apache 2.0 discovery standard — `ai-catalog.json` as robots.txt for the agent era.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Apple Xcode 26.6 stable</strong> (06-25) out; Xcode 27 dev beta runs on Apple Silicon only, speaks MCP and Agent Client Protocol.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Django 6.1 Beta 1</strong> (06-24): configurable field-fetch modes, PostgreSQL ≥ 15 now required, Python 3.12–3.14.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>CRA countdown</strong>: reporting obligation begins 09-11-2026 — less than 100 days. ENISA running dry-runs in June.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome V8 Zero-Day</strong> CVE-2026-11645 (in KEV since 06-09), fixed in Chrome 149; Chrome 150 stable due 06-30.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI warning</strong> (06-22): AI systems now fast enough to autonomously turn weaknesses into attack paths — no hype, a genuine threat-model update.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um dia tranquilo de notícias de fim de semana, mas a semana teve peso: a OpenAI apresentou seu primeiro chip de inferência customizado com a Broadcom — um passo para longe da pura dependência da Nvidia. Enquanto isso, o worm npm \"Miasma\" mostra que até uma SLSA provenance corretamente assinada não é mais âncora de confiança se a conta CI está comprometida. E a lista KEV da CISA recebeu um raro triplo CVSS-10 para dispositivos UniFi. Três histórias que fazem a mesma pergunta: em quem ou no quê sua pipeline de build realmente confia?</p>\n    <ul>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>OpenAI × Broadcom \"Jalapeño\"</strong>: primeiro ASIC de inferência customizado, TSMC 3nm, reticle-sized, tape-out de nove meses. ~50% mais barata a inferência — mas esse é um número secundário, não a reivindicação oficial da OpenAI.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Worm npm Miasma</strong>: conta GitHub comprometida da Red Hat, 32+ pacotes, ~80k downloads/semana — com <em>válidas</em> atestações SLSA via OIDC. Confiança na cadeia de suprimentos sob ataque.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>UniFi OS Triplo CVSS-10</strong>: CVE-2026-34908/09/10, cadeia RCE não autenticada, em KEV da CISA desde 23.06. Prazo federal 26.06 (passado). Patch: UniFi OS Server v5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Splunk RCE pré-autenticação</strong>: CVE-2026-20253, CVSS 9.8 via sidecar PostgreSQL, PoC público desde 13.06, em KEV. Fix: 10.4.0/10.2.4/10.0.7.</li>\n      <li><span class=\"chip good\">Standards</span> <span class=\"chip\">Global</span> <strong>Especificação ARD</strong>: 11 empresas (Google, Microsoft, NVIDIA, HF…) publicam padrão aberto Apache 2.0 de discovery — `ai-catalog.json` como robots.txt para a era dos agentes.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Apple Xcode 26.6 estável</strong> (25.06) lançado; Xcode 27 dev beta roda apenas em Apple Silicon, fala MCP e Agent Client Protocol.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Django 6.1 Beta 1</strong> (24.06): modos de field-fetch configuráveis, PostgreSQL ≥ 15 agora obrigatório, Python 3.12–3.14.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EU</span> <strong>Contagem regressiva CRA</strong>: obrigação de relatório a partir de 11.09.2026 — menos de 100 dias. ENISA fazendo dry-runs em junho.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome V8 Zero-Day</strong> CVE-2026-11645 (em KEV desde 09.06), corrigido em Chrome 149; Chrome 150 estável previsto para 30.06.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>Aviso BSI</strong> (22.06): sistemas IA agora rápidos o suficiente para autonomamente converter fraquezas em caminhos de ataque — sem hype, uma atualização genuína de modelo de ameaça.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un tranquilo día de noticias de fin de semana, pero la semana tuvo peso: OpenAI presentó su primer chip de inferencia personalizado con Broadcom — un paso alejado de la pura dependencia de Nvidia. Mientras tanto, el gusano npm \"Miasma\" muestra que incluso una SLSA provenance correctamente firmada ya no es un anclaje de confianza si la cuenta CI está comprometida. Y la lista KEV de CISA acaba de recibir un raro triple CVSS-10 para dispositivos UniFi. Tres historias que hacen la misma pregunta: ¿en quién o en qué confía realmente tu pipeline de compilación?</p>\n    <ul>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>OpenAI × Broadcom \"Jalapeño\"</strong>: primer ASIC de inferencia personalizado, TSMC 3nm, reticle-sized, tape-out de nueve meses. ~50% más barata la inferencia — pero ese es un número secundario, no la afirmación oficial de OpenAI.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Gusano npm Miasma</strong>: cuenta GitHub comprometida de Red Hat, 32+ paquetes, ~80k descargas/semana — con <em>válidas</em> atestaciones SLSA vía OIDC. Confianza en la cadena de suministro bajo ataque.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>UniFi OS Triple CVSS-10</strong>: CVE-2026-34908/09/10, cadena RCE no autenticada, en KEV de CISA desde 23.06. Plazo federal 26.06 (pasado). Patch: UniFi OS Server v5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Splunk RCE pre-autenticación</strong>: CVE-2026-20253, CVSS 9.8 vía sidecar PostgreSQL, PoC público desde 13.06, en KEV. Fix: 10.4.0/10.2.4/10.0.7.</li>\n      <li><span class=\"chip good\">Estándares</span> <span class=\"chip\">Global</span> <strong>Especificación ARD</strong>: 11 empresas (Google, Microsoft, NVIDIA, HF…) publican estándar abierto Apache 2.0 de descubrimiento — `ai-catalog.json` como robots.txt para la era de los agentes.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Apple Xcode 26.6 estable</strong> (25.06) lanzado; Xcode 27 dev beta se ejecuta solo en Apple Silicon, habla MCP y Agent Client Protocol.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Django 6.1 Beta 1</strong> (24.06): modos de field-fetch configurables, PostgreSQL ≥ 15 ahora requerido, Python 3.12–3.14.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">EU</span> <strong>Cuenta atrás CRA</strong>: obligación de reporte a partir del 11.09.2026 — menos de 100 días. ENISA realizando dry-runs en junio.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome V8 Zero-Day</strong> CVE-2026-11645 (en KEV desde 09.06), reparado en Chrome 149; Chrome 150 estable previsto para 30.06.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>Advertencia BSI</strong> (22.06): sistemas IA ahora lo suficientemente rápidos para autónomamente convertir debilidades en caminos de ataque — sin hype, una actualización genuina del modelo de amenaza.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Samstag im Tooling, lauter Monat im Modell-Stack. Die kurze Version: Anthropics zwei stärkste Coding-Modelle sind seit zwei Wochen für niemanden mehr erreichbar — eine US-Export-Direktive, kein Bug. Wer auf einem Frontier-Modell baut, sollte die Abhängigkeit gerade jetzt hinterfragen. Und ausgerechnet die Open-Weights-Welt liefert die plausibelste Brücke.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 weltweit abgeschaltet</strong>: Anthropic deaktivierte am 12.06. beide Modelle für <em>alle</em> Kunden, um einer US-Export-Direktive nachzukommen. Andere Claude-Modelle laufen weiter.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 (Zhipu, MIT)</strong>: 753B-MoE, 1M-Kontext, selbst-hostbar, #1 der Open-Weights auf dem Artificial-Analysis-Index. Die naheliegendste Anbieter-unabhängige Alternative.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash für Copilot GA</strong>: Microsofts hauseigenes 5B-Coding-Modell ist seit 26.06. allgemein für Copilot Business + Enterprise verfügbar.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor kauft Continue</strong>: Continue wird eingestellt, Repo read-only — Nutzer müssen ihre Daten bis 15.07. exportieren.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7-Code (Moonshot)</strong>: 1T/32B-aktiv, Modified MIT — aber nur Anbieter-Benchmarks, kein unabhängiger SWE-Bench-Eintrag. Skeptisch lesen.</li>\n      <li><span class=\"chip\">Claude</span> <strong>ID-Pflicht ab 08.07.</strong>: Anthropic verlangt für markierte Consumer-Accounts Ausweis + Selfie. Enterprise unberührt.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Benchmark-Vorsicht</strong>: alle frischen Coding-Scores unten sind als <em>Anbieter</em> vs. <em>unabhängig</em> gekennzeichnet — viele neue Modelle haben noch keinen Dritt-Eintrag.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Stille im Schatten</strong>: Aider weiter v0.86.2 (12.02.), Roo Code archiviert (Forks Zoo/Kilo Code), OpenHands ohne neuen Release.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Samstag im Tooling, lauter Monat im Modell-Stack. Die kurze Version: Anthropics zwei stärkste Coding-Modelle sind seit zwei Wochen für niemanden mehr erreichbar — eine US-Export-Direktive, kein Bug. Wer auf einem Frontier-Modell baut, sollte die Abhängigkeit gerade jetzt hinterfragen. Und ausgerechnet die Open-Weights-Welt liefert die plausibelste Brücke.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 weltweit abgeschaltet</strong>: Anthropic deaktivierte am 12.06. beide Modelle für <em>alle</em> Kunden, um einer US-Export-Direktive nachzukommen. Andere Claude-Modelle laufen weiter.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 (Zhipu, MIT)</strong>: 753B-MoE, 1M-Kontext, selbst-hostbar, #1 der Open-Weights auf dem Artificial-Analysis-Index. Die naheliegendste Anbieter-unabhängige Alternative.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash für Copilot GA</strong>: Microsofts hauseigenes 5B-Coding-Modell ist seit 26.06. allgemein für Copilot Business + Enterprise verfügbar.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor kauft Continue</strong>: Continue wird eingestellt, Repo read-only — Nutzer müssen ihre Daten bis 15.07. exportieren.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7-Code (Moonshot)</strong>: 1T/32B-aktiv, Modified MIT — aber nur Anbieter-Benchmarks, kein unabhängiger SWE-Bench-Eintrag. Skeptisch lesen.</li>\n      <li><span class=\"chip\">Claude</span> <strong>ID-Pflicht ab 08.07.</strong>: Anthropic verlangt für markierte Consumer-Accounts Ausweis + Selfie. Enterprise unberührt.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Benchmark-Vorsicht</strong>: alle frischen Coding-Scores unten sind als <em>Anbieter</em> vs. <em>unabhängig</em> gekennzeichnet — viele neue Modelle haben noch keinen Dritt-Eintrag.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Stille im Schatten</strong>: Aider weiter v0.86.2 (12.02.), Roo Code archiviert (Forks Zoo/Kilo Code), OpenHands ohne neuen Release.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Quiet Saturday on the tooling side, loud month in the model stack. The short version: Anthropic's two strongest coding models have been unreachable for two weeks — a US export directive, not a bug. Anyone building on a frontier model should question that dependency right now. And it's the open-weights world that delivers the most plausible bridge.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 shut down worldwide</strong>: Anthropic disabled both models on 12.06. for <em>all</em> customers to comply with a US export directive. Other Claude models continue to run.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 (Zhipu, MIT)</strong>: 753B-MoE, 1M-context, self-hostable, #1 open-weights on the Artificial-Analysis Index. The most obvious vendor-independent alternative.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash for Copilot GA</strong>: Microsoft's in-house 5B coding model is available as of 26.06. for Copilot Business + Enterprise.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor acquires Continue</strong>: Continue is being shut down, repo read-only — users must export their data by 15.07.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7-Code (Moonshot)</strong>: 1T/32B-active, Modified MIT — but only vendor benchmarks, no independent SWE-Bench entry. Read skeptically.</li>\n      <li><span class=\"chip\">Claude</span> <strong>ID requirement starting 08.07.</strong>: Anthropic requires ID verification + selfie for flagged consumer accounts. Enterprise untouched.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Benchmark caution</strong>: all fresh coding scores below are marked as <em>vendor</em> vs. <em>independent</em> — many new models lack a third-party entry yet.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Quiet in the shadows</strong>: Aider still v0.86.2 (12.02.), Roo Code archived (forks Zoo/Kilo Code), OpenHands without new release.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado tranquilo nas ferramentas, mês turbulento na pilha de modelos. A versão curta: os dois modelos de codificação mais fortes da Anthropic estão inacessíveis há duas semanas — uma diretiva de exportação dos EUA, não um bug. Quem constrói em cima de um modelo frontier deveria questionar essa dependência agora. E é exatamente o mundo dos pesos abertos que fornece a ponte mais plausível.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 desativados globalmente</strong>: A Anthropic desativou ambos os modelos em 12.06. para <em>todos</em> os clientes para estar em conformidade com uma diretiva de exportação dos EUA. Outros modelos Claude continuam funcionando.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 (Zhipu, MIT)</strong>: 753B-MoE, contexto de 1M, auto-hospedável, #1 entre pesos abertos no Índice de Análise Artificial. A alternativa mais óbvia independente de fornecedor.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash para Copilot em GA</strong>: O modelo de codificação interno da Microsoft de 5B está disponível a partir de 26.06. para Copilot Business + Enterprise.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor adquire Continue</strong>: Continue está sendo descontinuado, repositório somente leitura — usuários devem exportar seus dados até 15.07.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7-Code (Moonshot)</strong>: 1T/32B-ativo, MIT Modificada — mas apenas benchmarks do fornecedor, nenhuma entrada SWE-Bench independente. Leia com ceticismo.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Requisito de ID a partir de 08.07.</strong>: A Anthropic exige verificação de identidade + selfie para contas de consumidor sinalizadas. Enterprise intocada.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Cuidado com benchmarks</strong>: todos os scores de codificação recentes abaixo estão marcados como <em>fornecedor</em> vs. <em>independente</em> — muitos modelos novos ainda carecem de entrada de terceiros.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Silêncio nas sombras</strong>: Aider continua em v0.86.2 (12.02.), Roo Code arquivado (forks Zoo/Kilo Code), OpenHands sem novo lançamento.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Sábado tranquilo en herramientas, mes ruidoso en la pila de modelos. La versión corta: los dos modelos de codificación más fuertes de Anthropic están inaccesibles durante dos semanas — una directiva de exportación de EE. UU., no un error. Cualquiera que construya sobre un modelo frontier debería cuestionarse esa dependencia ahora. Y es precisamente el mundo de pesos abiertos que proporciona el puente más plausible.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 desactivados globalmente</strong>: Anthropic deshabilitó ambos modelos el 12.06. para <em>todos</em> los clientes para cumplir con una directiva de exportación de EE. UU. Otros modelos Claude continúan ejecutándose.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 (Zhipu, MIT)</strong>: 753B-MoE, contexto de 1M, autohospedable, #1 entre pesos abiertos en el Índice de Análisis Artificial. La alternativa más obvia independiente de proveedor.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash para Copilot en GA</strong>: El modelo de codificación interno de Microsoft de 5B está disponible a partir del 26.06. para Copilot Business + Enterprise.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor adquiere Continue</strong>: Continue se está descontinuando, repositorio de solo lectura — los usuarios deben exportar sus datos antes del 15.07.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7-Code (Moonshot)</strong>: 1T/32B-activo, MIT Modificada — pero solo benchmarks del proveedor, sin entrada SWE-Bench independiente. Lee con escepticismo.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Requisito de ID a partir del 08.07.</strong>: Anthropic requiere verificación de identidad + selfie para cuentas de consumidor marcadas. Enterprise sin afectar.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Precaución de benchmark</strong>: todos los scores de codificación recientes a continuación están marcados como <em>proveedor</em> vs. <em>independiente</em> — muchos modelos nuevos aún carecen de entrada de terceros.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Silencio en las sombras</strong>: Aider sigue en v0.86.2 (12.02.), Roo Code archivado (forks Zoo/Kilo Code), OpenHands sin nuevo lanzamiento.</li>\n    </ul></div>"
