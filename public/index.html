<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

        "en": "<div class=\"tldr\"><p class=\"lead\">EUR/BRL stands at 5.90 today — at the top of the recent range and not a good time to exchange. The pressure isn't coming from Brazil but from Europe: the ECB raised rates for the first time since 2023 because the Iran war pushed energy prices higher. That supports the euro — and that's exactly what makes your EUR→BRL exchanges expensive. The real itself is holding up surprisingly well, underpinned by falling oil and a massive interest rate advantage. The cracks are showing in the Brazilian bond market.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9000</strong> (ECB fix 06/25) — at the top of the range; cross-check 5.2019 × 1.1342 = 5.9000, consistent (0.0 %).</li>\n      <li><span class=\"chip hot\">Oil</span> <strong>Brent −3.64 % to 72.52 $</strong> — down 21 % in the month; drone strike on freighter \"Ever Lovely\" at Hormuz (06/25) reopens the crisis.</li>\n      <li><span class=\"chip\">ECB</span> <strong>+25 bp on 06/11</strong> — deposit rate 2.25 %, first increase since 2023; stagflation hike (EZ-GDP Q1 −0.2 %), mixed signal for EUR.</li>\n      <li><span class=\"chip\">Fed</span> <strong>3.50–3.75 % held</strong> (06/17) — but Dot Plot now hawkish: median 3.8 % for end-2026, 9 of 18 see a hike.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic cut to 14.25 %</strong> (06/17, 3rd cut in a row) — pace \"data-dependent\".</li>\n      <li><span class=\"chip hot\">BR bonds</span> <strong>NTN-B real yield above 8 %</strong> — IPCA+ 2032 at 8.44 %; Treasury cancelled 06/23 auction. Fiscal stress signal.</li>\n      <li><span class=\"chip\">Focus</span> <strong>IPCA 2026 now 5.33 %</strong> (06/22, was 5.11 % on 06/08) — 15th upward revision in a row; Selic expectation for end-2026 raised to 14.00 %.</li>\n      <li><span class=\"chip good\">Real</span> <strong>BRL holding firm</strong> despite fiscal worry — CFTC shows asset managers strongly net-long real (57,275 long / 1,298 short, 06/16).</li>\n      <li><span class=\"chip\">DXY</span> <strong>~101.42</strong> — dollar near multi-month high; dampens real tailwind.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">EUR/BRL está em 5,90 hoje — no topo da faixa recente e não é um bom momento para trocar. A pressão não vem do Brasil, mas da Europa: o BCE subiu as taxas pela primeira vez desde 2023 porque a guerra do Irã empurrou os preços de energia para cima. Isso sustenta o euro — e é justamente isso que torna tuas trocas EUR→BRL caras. O real em si está se segurando surpreendentemente bem, apoiado pela queda do petróleo e por uma enorme vantagem de taxa de juros. As rachaduras estão aparecendo no mercado de títulos brasileiro.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,9000</strong> (taxa BCE 25/06) — no topo da faixa; verificação cruzada 5,2019 × 1,1342 = 5,9000, consistente (0,0 %).</li>\n      <li><span class=\"chip hot\">Petróleo</span> <strong>Brent −3,64 % para 72,52 $</strong> — queda de 21 % no mês; ataque de drone ao navio cargueiro \"Ever Lovely\" no Hormuz (25/06) reabre a crise.</li>\n      <li><span class=\"chip\">BCE</span> <strong>+25 pb em 11/06</strong> — taxa de depósito 2,25 %, primeira alta desde 2023; hike de estagflação (PIB zona euro Q1 −0,2 %), sinal misto para EUR.</li>\n      <li><span class=\"chip\">Fed</span> <strong>3,50–3,75 % mantida</strong> (17/06) — mas Dot Plot agora hawkish: mediana 3,8 % para fim de 2026, 9 de 18 veem uma alta.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic reduzida para 14,25 %</strong> (17/06, 3ª redução seguida) — ritmo \"dependente de dados\".</li>\n      <li><span class=\"chip hot\">Títulos BR</span> <strong>Rendimento real NTN-B acima de 8 %</strong> — IPCA+ 2032 em 8,44 %; Tesouro cancelou leilão em 23/06. Sinal de stress fiscal.</li>\n      <li><span class=\"chip\">Focus</span> <strong>IPCA 2026 agora 5,33 %</strong> (22/06, era 5,11 % em 08/06) — 15ª revisão para cima seguida; expectativa Selic para fim de 2026 elevada para 14,00 %.</li>\n      <li><span class=\"chip good\">Real</span> <strong>BRL se segura fir         "es": "<div class=\"tldr\"><p class=\"lead\">EUR/BRL está en 5,90 hoy — en el tope del rango reciente y no es buen momento para cambiar. La presión no viene de Brasil, sino de Europa: el BCE subió tasas por primera vez desde 2023 porque la guerra de Irán empujó los precios de energía. Eso sustenta el euro — y es justamente eso lo que hace tus cambios EUR→BRL caros. El real en sí se sostiene sorprendentemente bien, apuntalado por petróleo en caída y una enorme ventaja de tasa de interés. Las grietas se muestran en el mercado de bonos brasileño.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tipo de cambio</span> <strong>EUR/BRL 5,9000</strong> (tasa BCE 25/06) — en el tope del rango; verificación cruzada 5,2019 × 1,1342 = 5,9000, consistente (0,0 %).</li>\n      <li><span class=\"chip hot\">Petróleo</span> <strong>Brent −3,64 % a 72,52 $</strong> — caída de 21 % en el mes; ataque de dron al carguero \"Ever Lovely\" en Hormuz (25/06) reabre la crisis.</li>\n      <li><span class=\"chip\">BCE</span> <strong>+25 pb el 11/06</strong> — tasa de depósito 2,25 %, primer aumento desde 2023; alza de estanflación (PIB eurozona Q1 −0,2 %), señal mixta para EUR.</li>\n      <li><span class=\"chip\">Fed</span> <strong>3,50–3,75 % mantenida</strong> (17/06) — pero Dot Plot ahora hawkish: mediana 3,8 % para fin de 2026, 9 de 18 ven un alza.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic reducida a 14,25 %</strong> (17/06, 3er corte seguido) — ritmo \"dependiente de datos\".</li>\n      <li><span class=\"chip hot\">Bonos BR</span> <strong>Rendimiento real NTN-B arriba de 8 %</strong> — IPCA+ 2032 en 8,44 %; Tesorería canceló subasta el 23/06. Señal de estrés fiscal.</li>\n      <li><span class=\"chip\">Focus</span> <strong>IPCA 2026 ahora 5,33 %</strong> (22/06, fue 5,11 % el 08/06) — 15ª revisión al alza seguida; expectativa Selic para fin de 2026 elevada a 14,00 %.</li>\n      <li><span class=\"chip good\">Real</span> <strong>BRL se sostiene firme</strong>       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein einziger Faktor zieht sich heute durch fast jeden Markt: <strong>Geld wird wieder teurer und knapper</strong>. Die neue Fed-Spitze unter Kevin Warsh hat am 17. Juni nicht nur die Zinsen oben gelassen, sondern im „Dot-Plot\" eine mögliche <em>Erhöhung</em> ins Spiel gebracht. Das drückt den Dollar auf ein 52-Wochen-Hoch, schickt Gold in die vierte Verlustwoche und treibt Bitcoin unter 60.000 $. Obendrauf legt Apple einen 6-Prozent-Absturz hin — wegen explodierender Speicherkosten, die ironischerweise der KI-Boom selbst verursacht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Aktie</span> <strong>Apple −6,15 %</strong> auf 275,15 $ (25.06.): Preiserhöhungen quer durch die Hardware-Palette, weil DRAM/NAND-Kosten durch KI-Rechenzentren explodieren — Cook nennt es eine „Jahrhundertflut\".</li>\n      <li><span class=\"chip hot\">Makro</span> <strong>Fed dreht falkenhaft</strong>: Leitzins bei 3,50–3,75 % gehalten, Dot-Plot-Median für Ende 2026 auf 3,8 % — eine Erhöhung liegt auf dem Tisch, 9 von 18 Mitgliedern dafür. PCE-Prognose auf 3,6 % angehoben.</li>\n      <li><span class=\"chip\">Dollar</span> <strong>DXY am Jahreshoch</strong> ~101,4 (26.06.), RSI überkauft. Stärkerer Dollar = Gegenwind für Gold, Krypto und Rohstoffe.</li>\n      <li><span class=\"chip\">Gold</span> <strong>XAU/USD ~4.037 $</strong> — vierte Verlustwoche in Folge (~−5 %), weil reale Zinsen steigen.</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>BTC ~60.034 $</strong> (−2,6 % 24h, −4,0 % 7d), <strong>ETH 1.559 $</strong> (−5,6 % 24h). Fear-&amp;-Greed bei 12 („Extreme Angst\"). Neue ETF-Abfluss-Serie läuft: 469 Mio. $ allein am 24.06. raus — größter Tagesabfluss seit dem 2. Juni.</li>\n      <li><span class=\"chip\">Öl</span> <strong>Brent 72,52 $</strong> (−3,55 %): Hormuz-Spike von Donnerstag wieder abverkauft, Öl fließt trotz Vorfall im Rekordtempo.</li>\n      <li><span class=\"chip\">KI-Infra</span> <strong>SpaceX–Reflection–Nvidia 6,3-Mrd.-$-Deal</strong>: zirkulärer Compute-Handel, Nvidia sitzt auf beiden Seiten. NVDA −1,59 % auf 195,74 $, vorbörslich 192,80 $.</li>\n      <li><span class=\"chip good\">Setup</span> <strong>Nasdaq vierter Verlusttag</strong> in Folge — erste solche Serie seit Februar. Risk-off, aber kein Crash.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Ein einziger Faktor zieht sich heute durch fast jeden Markt: <strong>Geld wird wieder teurer und knapper</strong>. Die neue Fed-Spitze unter Kevin Warsh hat am 17. Juni nicht nur die Zinsen oben gelassen, sondern im „Dot-Plot\" eine mögliche <em>Erhöhung</em> ins Spiel gebracht. Das drückt den Dollar auf ein 52-Wochen-Hoch, schickt Gold in die vierte Verlustwoche und treibt Bitcoin unter 60.000 $. Obendrauf legt Apple einen 6-Prozent-Absturz hin — wegen explodierender Speicherkosten, die ironischerweise der KI-Boom selbst verursacht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Aktie</span> <strong>Apple −6,15 %</strong> auf 275,15 $ (25.06.): Preiserhöhungen quer durch die Hardware-Palette, weil DRAM/NAND-Kosten durch KI-Rechenzentren explodieren — Cook nennt es eine „Jahrhundertflut\".</li>\n      <li><span class=\"chip hot\">Makro</span> <strong>Fed dreht falkenhaft</strong>: Leitzins bei 3,50–3,75 % gehalten, Dot-Plot-Median für Ende 2026 auf 3,8 % — eine Erhöhung liegt auf dem Tisch, 9 von 18 Mitgliedern dafür. PCE-Prognose auf 3,6 % angehoben.</li>\n      <li><span class=\"chip\">Dollar</span> <strong>DXY am Jahreshoch</strong> ~101,4 (26.06.), RSI überkauft. Stärkerer Dollar = Gegenwind für Gold, Krypto und Rohstoffe.</li>\n      <li><span class=\"chip\">Gold</span> <strong>XAU/USD ~4.037 $</strong> — vierte Verlustwoche in Folge (~−5 %), weil reale Zinsen steigen.</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>BTC ~60.034 $</strong> (−2,6 % 24h, −4,0 % 7d), <strong>ETH 1.559 $</strong> (−5,6 % 24h). Fear-&amp;-Greed bei 12 („Extreme Angst\"). Neue ETF-Abfluss-Serie läuft: 469 Mio. $ allein am 24.06. raus — größter Tagesabfluss seit dem 2. Juni.</li>\n      <li><span class=\"chip\">Öl</span> <strong>Brent 72,52 $</strong> (−3,55 %): Hormuz-Spike von Donnerstag wieder abverkauft, Öl fließt trotz Vorfall im Rekordtempo.</li>\n      <li><span class=\"chip\">KI-Infra</span> <strong>SpaceX–Reflection–Nvidia 6,3-Mrd.-$-Deal</strong>: zirkulärer Compute-Handel, Nvidia sitzt auf beiden Seiten. NVDA −1,59 % auf 195,74 $, vorbörslich 192,80 $.</li>\n      <li><span class=\"chip good\">Setup</span> <strong>Nasdaq vierter Verlusttag</strong> in Folge — erste solche Serie seit Februar. Risk-off, aber kein Crash.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A single thread runs through almost every market today: <strong>money is getting expensive and scarce again</strong>. The new Fed leadership under Kevin Warsh didn't just hold rates on June 17—they signaled a possible <em>hike</em> in the Dot Plot. This pushes the dollar to a 52-week high, sends gold into its fourth consecutive losing week, and drives Bitcoin below $60,000. On top of that, Apple drops 6% — because ballooning storage costs, ironically caused by the AI boom itself, are squeezing margins.</p>\n    <ul>\n      <li><span class=\"chip hot\">Stock</span> <strong>Apple −6.15%</strong> to $275.15 (06/25): price increases across the hardware lineup because DRAM/NAND costs are exploding from AI data centers — Cook calls it a \"once-in-a-century flood.\"</li>\n      <li><span class=\"chip hot\">Macro</span> <strong>Fed turns hawkish</strong>: fed funds held at 3.50–3.75%, Dot Plot median for end-2026 at 3.8% — a hike is on the table, 9 of 18 members favor it. PCE forecast raised to 3.6%.</li>\n      <li><span class=\"chip\">Dollar</span> <strong>DXY at year high</strong> ~101.4 (06/26), RSI overbought. Stronger dollar = headwind for gold, crypto, and commodities.</li>\n      <li><span class=\"chip\">Gold</span> <strong>XAU/USD ~$4,037</strong> — fourth straight losing week (~−5%), as real rates rise.</li>\n      <li><span class=\"chip hot\">Crypto</span> <strong>BTC ~$60,034</strong> (−2.6% 24h, −4.0% 7d), <strong>ETH $1,559</strong> (−5.6% 24h). Fear &amp; Greed at 12 (\"Extreme Fear\"). New ETF outflow streak running: $469M alone on 06/24 — biggest single-day outflow since June 2.</li>\n      <li><span class=\"chip\">Oil</span> <strong>Brent $72.52</strong> (−3.55%): Hormuz spike from Thursday sold off; oil flowing at record pace despite the incident.</li>\n      <li><span class=\"chip\">AI Infra</span> <strong>SpaceX–Reflection–Nvidia $6.3B deal</strong>: circular compute trade, Nvidia on both sides. NVDA −1.59% to $195.74, premarket $192.80.</li>\n      <li><span class=\"chip good\">Setup</span> <strong>Nasdaq fourth straight losing day</strong> — first such streak since February. Risk-off, but no crash.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um fio único passa por quase todos os mercados hoje: <strong>dinheiro fica caro e escasso de novo</strong>. A nova liderança do Fed sob Kevin Warsh não apenas manteve as taxas em 17 de junho — sinalizou um possível <em>aumento</em> no Dot Plot. Isso empurra o dólar para uma máxima de 52 semanas, envia ouro para sua quarta semana consecutiva de perdas e derruba Bitcoin abaixo de 60.000 dólares. Por cima disso, Apple cai 6% — porque custos de memória em alta, ironicamente causados pelo boom de IA, estão espremendo margens.</p>\n    <ul>\n      <li><span class=\"chip hot\">Ação</span> <strong>Apple −6,15%</strong> para $275,15 (25/06): aumentos de preço em toda a linha de hardware porque custos de DRAM/NAND estão explodindo de data centers de IA — Cook chama de uma \"inundação centenária\".</li>\n      <li><span class=\"chip hot\">Macro</span> <strong>Fed fica falcão</strong>: taxa de fundos federais mantida em 3,50–3,75%, mediana do Dot Plot para fim de 2026 em 3,8% — um aumento está sobre a mesa, 9 de 18 membros a favor. Previsão de PCE elevada para 3,6%.</li>\n      <li><span class=\"chip\">Dólar</span> <strong>DXY em máxima anual</strong> ~101,4 (26/06), RSI sobrecomprado. Dólar mais forte = contravento para ouro, cripto e commodities.</li>\n      <li><span class=\"chip\">Ouro</span> <strong>XAU/USD ~$4.037</strong> — quarta semana consecutiva de perdas (~−5%), com aumento de taxas reais.</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>BTC ~$60.034</strong> (−2,6% 24h, −4,0% 7d), <strong>ETH $1.559</strong> (−5,6% 24h). Medo e Ganância em 12 (\"Medo Extremo\"). Nova série de saídas de ETF em andamento: $469 M apenas em 24/06 — maior saída em dia único desde 2 de junho.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>Brent $72,52</strong> (−3,55%): pico de Hormuz de quinta-feira vendido; petróleo fluindo em ritmo recorde apesar do incidente.</li>\n      <li><span class=\"chip\">IA Infra</span> <strong>SpaceX–Reflection–Nvidia acordo de $6,3B</strong>: comércio circular de computação, Nvidia em ambos os lados. NVDA −1,59% para $195,74, pré-mercado $192,80.</li>\n      <li><span class=\"chip good\">Setup</span> <strong>Nasdaq quarto dia consecutivo de perdas</strong> — primeira série assim desde fevereiro. Risk-off, mas sem crash.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un único hilo corre a través de casi todos los mercados hoy: <strong>el dinero se vuelve caro y escaso nuevamente</strong>. El nuevo liderazgo de la Fed bajo Kevin Warsh no solo mantuvo las tasas el 17 de junio, sino que señaló un posible <em>aumento</em> en el Dot Plot. Esto empuja el dólar a un máximo de 52 semanas, envía el oro a su cuarta semana consecutiva de pérdidas y derriba Bitcoin por debajo de 60.000 dólares. Además, Apple cae 6% — porque los costos de memoria en aumento, irónicamente causados por el boom de IA, están apretando márgenes.</p>\n    <ul>\n      <li><span class=\"chip hot\">Acción</span> <strong>Apple −6,15%</strong> a 275,15 dólares (25/06): aumentos de precio en toda la línea de hardware porque los costos de DRAM/NAND están explotando por centros de datos de IA — Cook lo llama una \"inundación centenaria\".</li>\n      <li><span class=\"chip hot\">Macro</span> <strong>Fed se vuelve halcón</strong>: tasa de fondos federales mantenida en 3,50–3,75%, mediana del Dot Plot para fin de 2026 en 3,8% — un aumento está sobre la mesa, 9 de 18 miembros a favor. Pronóstico de PCE elevado a 3,6%.</li>\n      <li><span class=\"chip\">Dólar</span> <strong>DXY en máximo anual</strong> ~101,4 (26/06), RSI sobrecomprado. Dólar más fuerte = contraviento para oro, cripto y materias primas.</li>\n      <li><span class=\"chip\">Oro</span> <strong>XAU/USD ~4.037 dólares</strong> — cuarta semana consecutiva de pérdidas (~−5%), con aumento de tasas reales.</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>BTC ~60.034 dólares</strong> (−2,6% 24h, −4,0% 7d), <strong>ETH 1.559 dólares</strong> (−5,6% 24h). Miedo y Codicia en 12 (\"Miedo Extremo\"). Nueva serie de salidas de ETF en marcha: 469 millones de dólares solo en 24/06 — mayor salida en un solo día desde 2 de junio.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>Brent 72,52 dólares</strong> (−3,55%): pico de Hormuz de jueves se vendió; petróleo fluyendo a ritmo récord a pesar del incidente.</li>\n      <li><span class=\"chip\">IA Infra</span> <strong>SpaceX–Reflection–Nvidia acuerdo de 6,3 mil millones de dólares</strong>: comercio circular de computación, Nvidia en ambos lados. NVDA −1,59% a 195,74 dólares, pre-mercado 192,80 dólares.</li>\n      <li><span class=\"chip good\">Setup</span> <strong>Nasdaq cuarto día consecutivo de pérdidas</strong> — primera serie así desde febrero. Risk-off, pero sin crash.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Sicherheits-schwerer Freitag. Heute läuft die CISA-Frist für drei UniFi-Lücken mit Höchstwert 10 ab, die schon aktiv ausgenutzt werden — wenn du einen UniFi-OS-Server betreibst, ist das dein einziger Punkt, der heute zählt. Daneben: ein kompromittierter Red-Hat-Account hat 32 npm-Pakete vergiftet, Apple übernimmt den Swift Package Index, und Spring Framework 6.2 stirbt am Dienstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>UniFi-Triple-KEV</strong>: CVE-2026-34908/09/10, CVSS 10, aktiv ausgenutzt — CISA-Patchfrist ist <em>heute</em>.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>„Miasma\"</strong>: 32 <code>@redhat-cloud-services</code>-npm-Pakete trojanisiert, ~80k Downloads/Woche, Credential-Diebstahl.</li>\n      <li><span class=\"chip\">M&amp;A · OSS</span> <strong>Apple kauft Swift Package Index</strong> — bleibt Open Source, plant Paket-Signierung + eigene Registry.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Check-Point-VPN</strong> CVE-2026-50751 (CVSS 9,3): IKEv1-Auth-Bypass, Qilin-Ransomware bestätigt, KEV.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Oracle PeopleSoft</strong> CVE-2026-35273 (CVSS 9,8): ShinyHunters-Kampagne, 100+ Orgs, 68 % Hochschulen.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Patch Tuesday Juni</strong>: 200 Lücken, 3–6 Zero-Days inkl. Exchange-XSS (aktiv ausgenutzt).</li>\n      <li><span class=\"chip good\">Release · Web</span> <strong>Angular 22</strong> ist da: Signal Forms stabil, OnPush als Default, Fetch-HTTP-Client.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Spring Framework 7.0.8</strong> härtet JMS-Deserialisierung + SpEL — 6.2.x EOL <em>am Dienstag</em>.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL</strong>-Sammelupdate (11 CVEs), PG19 Beta 1, PG14 EOL im November.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Azure Linux 4.0</strong> (Preview) + Azure Container Linux GA — erste echte Server-Distro.</li>\n      <li><span class=\"chip\">Regulierung · EU</span> <strong>CRA Kapitel IV</strong> gilt seit 11.06 — Konformitätsstellen-Notifizierung ist aktiv.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein Sicherheits-schwerer Freitag. Heute läuft die CISA-Frist für drei UniFi-Lücken mit Höchstwert 10 ab, die schon aktiv ausgenutzt werden — wenn du einen UniFi-OS-Server betreibst, ist das dein einziger Punkt, der heute zählt. Daneben: ein kompromittierter Red-Hat-Account hat 32 npm-Pakete vergiftet, Apple übernimmt den Swift Package Index, und Spring Framework 6.2 stirbt am Dienstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>UniFi-Triple-KEV</strong>: CVE-2026-34908/09/10, CVSS 10, aktiv ausgenutzt — CISA-Patchfrist ist <em>heute</em>.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>„Miasma\"</strong>: 32 <code>@redhat-cloud-services</code>-npm-Pakete trojanisiert, ~80k Downloads/Woche, Credential-Diebstahl.</li>\n      <li><span class=\"chip\">M&amp;A · OSS</span> <strong>Apple kauft Swift Package Index</strong> — bleibt Open Source, plant Paket-Signierung + eigene Registry.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Check-Point-VPN</strong> CVE-2026-50751 (CVSS 9,3): IKEv1-Auth-Bypass, Qilin-Ransomware bestätigt, KEV.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Oracle PeopleSoft</strong> CVE-2026-35273 (CVSS 9,8): ShinyHunters-Kampagne, 100+ Orgs, 68 % Hochschulen.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Patch Tuesday Juni</strong>: 200 Lücken, 3–6 Zero-Days inkl. Exchange-XSS (aktiv ausgenutzt).</li>\n      <li><span class=\"chip good\">Release · Web</span> <strong>Angular 22</strong> ist da: Signal Forms stabil, OnPush als Default, Fetch-HTTP-Client.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Spring Framework 7.0.8</strong> härtet JMS-Deserialisierung + SpEL — 6.2.x EOL <em>am Dienstag</em>.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL</strong>-Sammelupdate (11 CVEs), PG19 Beta 1, PG14 EOL im November.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Azure Linux 4.0</strong> (Preview) + Azure Container Linux GA — erste echte Server-Distro.</li>\n      <li><span class=\"chip\">Regulierung · EU</span> <strong>CRA Kapitel IV</strong> gilt seit 11.06 — Konformitätsstellen-Notifizierung ist aktiv.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A security-heavy Friday. Today marks the CISA deadline for three UniFi vulnerabilities with max severity 10, already being actively exploited — if you run a UniFi OS server, that's your only priority today. Beyond that: a compromised Red Hat account poisoned 32 npm packages, Apple acquires the Swift Package Index, and Spring Framework 6.2 reaches end-of-life on Tuesday.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>UniFi Triple-KEV</strong>: CVE-2026-34908/09/10, CVSS 10, actively exploited — CISA patch deadline is <em>today</em>.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>\"Miasma\"</strong>: 32 <code>@redhat-cloud-services</code> npm packages trojanned, ~80k downloads/week, credential theft.</li>\n      <li><span class=\"chip\">M&amp;A · OSS</span> <strong>Apple acquires Swift Package Index</strong> — stays open source, plans package signing + own registry.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Check Point VPN</strong> CVE-2026-50751 (CVSS 9.3): IKEv1 auth bypass, Qilin ransomware confirmed, KEV.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Oracle PeopleSoft</strong> CVE-2026-35273 (CVSS 9.8): ShinyHunters campaign, 100+ orgs, 68% higher education.</li>\n      <li><span class=\"chip\">Sec</span> <strong>June Patch Tuesday</strong>: 200 flaws, 3–6 zero-days including Exchange XSS (actively exploited).</li>\n      <li><span class=\"chip good\">Release · Web</span> <strong>Angular 22</strong> is here: Signal Forms stable, OnPush as default, Fetch HTTP client.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Spring Framework 7.0.8</strong> hardens JMS deserialization + SpEL — 6.2.x EOL <em>Tuesday</em>.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL</strong> rollup update (11 CVEs), PG19 Beta 1, PG14 EOL in November.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Azure Linux 4.0</strong> (Preview) + Azure Container Linux GA — first real server distro.</li>\n      <li><span class=\"chip\">Regulation · EU</span> <strong>CRA Chapter IV</strong> in effect since 06-11 — conformity body notification is live.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma sexta pesada em segurança. Hoje vence o prazo da CISA para três vulnerabilidades UniFi com severidade máxima 10, já sendo ativamente exploradas — se você administra um servidor UniFi OS, esta é sua única prioridade hoje. Além disso: uma conta Red Hat comprometida contaminou 32 pacotes npm, a Apple adquire o Swift Package Index, e o Spring Framework 6.2 chega ao fim de vida na terça.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>UniFi Triplo-KEV</strong>: CVE-2026-34908/09/10, CVSS 10, ativamente explorado — prazo de patch da CISA é <em>hoje</em>.</li>\n      <li><span class=\"chip hot\">Seg · OSS</span> <strong>\"Miasma\"</strong>: 32 pacotes npm <code>@redhat-cloud-services</code> contaminados, ~80 mil downloads/semana, roubo de credenciais.</li>\n      <li><span class=\"chip\">F&amp;A · OSS</span> <strong>Apple adquire Swift Package Index</strong> — permanece código aberto, planeja assinatura de pacotes + seu próprio registro.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Check Point VPN</strong> CVE-2026-50751 (CVSS 9,3): bypass de autenticação IKEv1, ransomware Qilin confirmado, KEV.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Oracle PeopleSoft</strong> CVE-2026-35273 (CVSS 9,8): campanha ShinyHunters, 100+ organizações, 68% ensino superior.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Patch Tuesday de junho</strong>: 200 vulnerabilidades, 3–6 zero-days incluindo XSS do Exchange (ativamente explorado).</li>\n      <li><span class=\"chip good\">Lançamento · Web</span> <strong>Angular 22</strong> chegou: Signal Forms estável, OnPush como padrão, cliente HTTP Fetch.</li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>Spring Framework 7.0.8</strong> fortalece desserialização JMS + SpEL — 6.2.x EOL <em>terça</em>.</li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>PostgreSQL</strong> atualização consolidada (11 CVEs), PG19 Beta 1, PG14 EOL em novembro.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Azure Linux 4.0</strong> (Preview) + Azure Container Linux GA — primeira distro de servidor real.</li>\n      <li><span class=\"chip\">Regulação · EU</span> <strong>CRA Capítulo IV</strong> em vigor desde 11/06 — notificação de organismos de conformidade está ativa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un viernes pesado de seguridad. Hoy vence el plazo de la CISA para tres vulnerabilidades UniFi con severidad máxima 10, siendo activamente explotadas — si administras un servidor UniFi OS, esta es tu única prioridad hoy. Además: una cuenta Red Hat comprometida contaminó 32 paquetes npm, Apple adquiere el Swift Package Index, y Spring Framework 6.2 llega a su fin de vida el martes.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>UniFi Triple-KEV</strong>: CVE-2026-34908/09/10, CVSS 10, activamente explotado — plazo de parche de CISA es <em>hoy</em>.</li>\n      <li><span class=\"chip hot\">Seg · OSS</span> <strong>\"Miasma\"</strong>: 32 paquetes npm <code>@redhat-cloud-services</code> contaminados, ~80 mil descargas/semana, robo de credenciales.</li>\n      <li><span class=\"chip\">F&amp;A · OSS</span> <strong>Apple adquiere Swift Package Index</strong> — permanece código abierto, planea firma de paquetes + su propio registro.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Check Point VPN</strong> CVE-2026-50751 (CVSS 9,3): bypass de autenticación IKEv1, ransomware Qilin confirmado, KEV.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Oracle PeopleSoft</strong> CVE-2026-35273 (CVSS 9,8): campaña ShinyHunters, 100+ organizaciones, 68% educación superior.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Patch Tuesday de junio</strong>: 200 vulnerabilidades, 3–6 zero-days incluido XSS de Exchange (activamente explotado).</li>\n      <li><span class=\"chip good\">Lanzamiento · Web</span> <strong>Angular 22</strong> llegó: Signal Forms estable, OnPush como predeterminado, cliente HTTP Fetch.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>Spring Framework 7.0.8</strong> endurece deserialización JMS + SpEL — 6.2.x EOL <em>martes</em>.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>PostgreSQL</strong> actualización consolidada (11 CVEs), PG19 Beta 1, PG14 EOL en noviembre.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Azure Linux 4.0</strong> (Preview) + Azure Container Linux GA — primera distro de servidor real.</li>\n      <li><span class=\"chip\">Regulación · UE</span> <strong>CRA Capítulo IV</strong> en vigor desde 11/06 — notificación de organismos de conformidad está activa.</li>\n    </ul></div>"
