        "en": "<div class=\"tldr\"><p class=\"lead\">The throughline of the day is the sales channel, not the model. OpenAI is putting ready-made support and sales agents into production with <strong>Presence</strong> — but <em>not</em> as a download; instead, its own engineers show up at the customer's door. That's an admission: turning a model into a running agent is project work, not a purchase. In parallel, Washington is escalating the model cold war — the White House calls China's catch-up effort <strong>theft</strong> — and Germany's numbers land honestly: AI usage has doubled, but one in five companies has already cut jobs.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>OpenAI Presence:</strong> platform for production voice/chat agents, launched <strong>Jul 22, 2026</strong>. No self-service — rollout via <strong>OpenAI engineers + systems integrators</strong>. OpenAI says its own support hotline resolves <strong>75%</strong> of calls without a human.</li>\n      <li><span class=\"chip hot\">POLICY · US/CN</span> <strong>\"Theft\":</strong> OSTP director <strong>Kratsios</strong> accuses Moonshot AI of distilling Anthropic's model <strong>Fable</strong> and using banned <strong>Nvidia GB300</strong> chips via Thailand. Anthropic backs the claim, China denies it, experts are skeptical — <em>allegations, not facts</em>.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Bitkom:</strong> AI usage at German companies has <strong>doubled to 41%</strong> (2025: 17%), but <strong>19%</strong> of users have already cut jobs, <strong>33%</strong> call AI more expensive than expected.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>McKinsey:</strong> 88% use AI, only <strong>39%</strong> see EBIT impact, <strong>23%</strong> scale agents — a scaling gap. Methodology only secondarily sourced (flag below).</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>AI Act:</strong> Consultation on the high-risk guidelines ran until <strong>Jul 23</strong>; the transparency obligations and the formal Omnibus adoption are due before <strong>Aug 2</strong> (procedural details in yesterday's brief).</li>\n      <li><span class=\"chip good\">MARKET</span> <strong>Agent market:</strong> enterprise agentic AI <strong>$5.3B → $24.5B</strong> by 2030 (Grand View, search-snippet only). Voice platforms starting at <strong>$0.07/min</strong> — all self-serve, US-hosted.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas: an <strong>EU-hosted, hands-on voice agent</strong> for the Mittelstand (the Presence gap) and an <strong>on-prem agent control tower</strong> (registry + guardrails + audit log).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O fio condutor do dia é o canal de distribuição, não o modelo. Com o <strong>Presence</strong>, a OpenAI coloca em produção agentes prontos de suporte e vendas — mas <em>não</em> para baixar, e sim com engenheiros próprios que vão até o cliente. É uma confissão: transformar um modelo em um agente em operação é trabalho de projeto, não uma compra. Em paralelo, Washington escala a guerra fria dos modelos — a Casa Branca chama a corrida chinesa de recuperação de <strong>furto</strong> — e os números alemães chegam honestos: o uso de IA dobrou, mas uma em cada cinco empresas já cortou vagas.</p>\n    <ul>\n      <li><span class=\"chip hot\">IMPLANTAÇÃO · EUA</span> <strong>OpenAI Presence:</strong> plataforma para agentes de voz/chat em produção, lançada em <strong>22/07/2026</strong>. Sem autoatendimento — implantação via <strong>engenheiros da OpenAI + integradores de sistemas</strong>. A própria central de suporte resolve, segundo a OpenAI, <strong>75 %</strong> das ligações sem intervenção humana.</li>\n      <li><span class=\"chip hot\">POLÍTICA · EUA/CN</span> <strong>\"Furto\":</strong> o diretor do OSTP, <strong>Kratsios</strong>, acusa a Moonshot AI de ter destilado o modelo <strong>Fable</strong>, da Anthropic, e usado <strong>Nvidia GB300</strong> sob embargo via Tailândia. Anthropic reforça a acusação, China nega, especialistas duvidam — <em>acusações, não fatos</em>.</li>\n      <li><span class=\"chip\">ESTUDO · DE</span> <strong>Bitkom:</strong> o uso de IA em empresas alemãs <strong>dobrou para 41 %</strong> (2025: 17 %), mas <strong>19 %</strong> das usuárias já cortaram vagas, <strong>33 %</strong> dizem que a IA saiu mais cara do que o esperado.</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>McKinsey:</strong> 88 % usam IA, apenas <strong>39 %</strong> veem efeito no EBIT, <strong>23 %</strong> escalam agentes — a lacuna de escala. Metodologia comprovada apenas por fonte secundária (alerta abaixo).</li>\n      <li><span class=\"chip\">REGULAÇÃO · UE</span> <strong>AI Act:</strong> a consulta sobre as diretrizes de alto risco terminou em <strong>23/07</strong>; as obrigações de transparência e a aprovação formal do Omnibus estão previstas para antes de <strong>02/08</strong> (detalhes processuais na edição de ontem).</li>\n      <li><span class=\"chip good\">MERCADO</span> <strong>Mercado de agentes:</strong> IA agêntica corporativa de <strong>US$ 5,3 bi → US$ 24,5 bi</strong> até 2030 (Grand View, apenas trecho de busca). Plataformas de voz a partir de <strong>US$ 0,07/min.</strong> — todas self-serve, hospedadas nos EUA.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias: um <strong>agente de voz hands-on hospedado na UE</strong> para o Mittelstand (a lacuna do Presence) e uma <strong>torre de controle de agentes on-premise</strong> (registro + guardrails + log de auditoria).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El hilo conductor del día es el canal de venta, no el modelo. OpenAI pone en producción, con <strong>Presence</strong>, agentes de soporte y ventas listos para usar — pero <em>no</em> para descargar, sino con ingenieros propios que llegan hasta el cliente. Es una confesión: convertir un modelo en un agente en funcionamiento es trabajo de proyecto, no una compra. En paralelo, Washington escala la guerra fría de los modelos — la Casa Blanca llama <strong>robo</strong> al avance de China — y las cifras alemanas aterrizan con honestidad: el uso de IA se duplicó, pero una de cada cinco empresas ya recortó puestos de trabajo.</p>\n    <ul>\n      <li><span class=\"chip hot\">DESPLIEGUE · US</span> <strong>OpenAI Presence:</strong> plataforma para agentes de voz/chat productivos, lanzada el <strong>22/07/2026</strong>. Sin autoservicio — implementación a través de <strong>ingenieros de OpenAI + integradores de sistemas</strong>. Según OpenAI, su propia línea de soporte resuelve el <strong>75 %</strong> de las llamadas sin intervención humana.</li>\n      <li><span class=\"chip hot\">POLÍTICA · US/CN</span> <strong>\"Robo\":</strong> el director de la OSTP, <strong>Kratsios</strong>, acusa a Moonshot AI de haber destilado el modelo <strong>Fable</strong> de Anthropic y de haber usado <strong>Nvidia GB300</strong> restringidas a través de Tailandia. Anthropic respalda la acusación, China la desmiente, los expertos dudan — <em>son señalamientos, no hechos</em>.</li>\n      <li><span class=\"chip\">ESTUDIO · DE</span> <strong>Bitkom:</strong> el uso de IA en empresas alemanas se duplicó <strong>al 41 %</strong> (2025: 17 %), pero el <strong>19 %</strong> de las usuarias ya recortó puestos, y el <strong>33 %</strong> dice que la IA salió más cara de lo esperado.</li>\n      <li><span class=\"chip\">ESTUDIO · Global</span> <strong>McKinsey:</strong> el 88 % usa IA, solo el <strong>39 %</strong> ve impacto en el EBIT, el <strong>23 %</strong> escala agentes — brecha de escalamiento. Metodología solo respaldada de forma secundaria (alerta más abajo).</li>\n      <li><span class=\"chip\">REGULACIÓN · UE</span> <strong>AI Act:</strong> la consulta sobre las directrices de alto riesgo venció el <strong>23/07</strong>; las obligaciones de transparencia y la aprobación formal del Omnibus llegan antes del <strong>02/08</strong> (detalles del proceso en el boletín de ayer).</li>\n      <li><span class=\"chip good\">MERCADO</span> <strong>Mercado de agentes:</strong> la IA agéntica empresarial pasa de <strong>5,3 a 24,5 mil millones de dólares</strong> para 2030 (Grand View, solo fragmento de búsqueda). Plataformas de voz desde <strong>0,07 $/min</strong> — todas de autoservicio, alojadas en EE. UU.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas: <strong>un agente de voz hands-on alojado en la UE</strong> para la mediana empresa (la brecha de Presence) y una <strong>torre de control de agentes on-prem</strong> (registro + barreras de seguridad + bitácora de auditoría).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Board-Tag — <strong>107 Listings</strong>, aber nur <strong>zehn davon neu</strong>, und die Java-Spitze steht den vierten Tag auf Fit 88. Wenn sich die Liste nicht bewegt, lohnt der Blick auf die Zahlen dahinter, und die sind heute unbequem: Der überall zitierte Freelancer-Schnitt von <strong>103 €/h</strong> ist ein Durchschnitt über <em>alle</em> Disziplinen. Für Software- und Webentwicklung nennt dieselbe Quelle <strong>90 €/h</strong> — das untere Ende des IT-Korbs. Dazu drei frisch im Volltext geprüfte EU-Ausschreibungen — zwei davon hinter Eignungswänden, die ein Zwei-Personen-Betrieb nicht überspringt, und nur die dritte ganz ohne Umsatz- und Personalschwelle.</p>\n    <ul>\n      <li><span class=\"chip hot\">Rate</span> <strong>Der Anker stimmt nicht</strong>: Der Freelancer-Kompass 2026 nennt <strong>103 €/h</strong> als Durchschnitt über alle Disziplinen (Befragung 17.11.2025–08.02.2026, ~5.400 Teilnehmende). Der IT-Schnitt im DACH-Raum liegt bei <strong>95 €/h</strong> — und Software-/Webentwicklung bildet mit <strong>90 €/h</strong> das <em>untere</em> Ende, unter Data &amp; Analytics (100 €) und SAP/ERP (120 €).</li>\n      <li><span class=\"chip warn\">Achtung</span> <strong>Nur zwei Freelance-Raten stehen heute offen dran</strong> — und beide liegen darunter: Right People Group nennt <strong>70 €/h</strong> für Angular München (100 % remote), ProTIP <strong>680 €/Tag</strong> (≈ 85 €/h) im DB-Systel-Umfeld. Die 90–120-€-Bänder im Board sind recherchierter Benchmark, kein Angebot.</li>\n      <li><span class=\"chip\">Board</span> <strong>107 Listings</strong>: 83 Freelance, 13 Employee, 11 Intriguing. Median-Fit <strong>70</strong>, 17 Einträge ab 80, 8 ab 85, <strong>101 von 107</strong> mit Remote-Tag. Gegenüber gestern: 10 neu, 1 verschwunden.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Spitze unverändert, vierter Tag</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, FFM 80 % remote), BridgingIT (Spring Boot/Kubernetes/Kafka, 100 % remote), Keil Business Solutions (Java/Angular + Telematikinfrastruktur, 100 % remote) — alle drei Fit 88.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>govdigital „gd.KI\": perfekter Stack, verschlossene Tür</strong>. Rahmenvereinbarung für KI-Softwareentwicklung, <strong>56.400 Personentage</strong> über vier Jahre, Frist 04.08. Eignung: <strong>je ≥ 5 Mio. € KI-spezifischer Umsatz</strong> in 2023, 2024 <em>und</em> 2025 plus <strong>≥ 100 fest angestellte</strong> KI-Entwickelnde.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>ITZBund MNSW: kleiner Auftrag, große Eignungswand</strong>. 72-Monats-Rahmenvertrag über maximal <strong>10.195 Personentage</strong> (≈ 8 Vollzeit-Äquivalente), Frist 31.08. — die Eignung verlangt aber <strong>3.300.000 € bereichsspezifischen Netto-Umsatz in jedem</strong> der letzten drei Geschäftsjahre, eine Mindestbesetzung von <strong>15 VZÄ pro Vertragsjahr</strong> über zehn Rollenprofile (allein 5 Software-Entwickler, 2 Systemadministratoren), Deutsch auf <strong>C2</strong>, Bereitschaft zur <strong>Ü2</strong>-Sicherheitsüberprüfung und Zertifikate nach <strong>ISO 27001 und ISO 9001</strong>. Kein Zwei-Personen-Fall.</li>\n      <li><span class=\"chip good\">DE</span> <strong>Uniklinikum Magdeburg ist der einzige halbwegs offene Fall</strong>: SaaS für digitales Entlass- und Überleitungsmanagement mit optionalen KI-Modulen, Frist 07.08. Als <em>einziges</em> der drei Verfahren <strong>ohne festen Mindestumsatz und ohne FTE-Schwelle</strong> — Referenzen werden relativ bewertet statt als Ausschluss gesetzt. Die Hürde ist hier das Produkt, nicht die Bilanz: gesucht ist eine fertige Plattform, kein Entwicklungsauftrag.</li>\n      <li><span class=\"chip hot\">Remote</span> <strong>Seltene Brasilien-Klausel</strong>: Oscilar sucht einen Sr./Staff Backend Engineer (Java/Kafka) und listet <strong>Brasilien ausdrücklich als zulässigen Remote-Standort</strong> — US$ 150.000–190.000*, Fit 69.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 Stellen, Schweiz vorn</strong>: ELCA Zürich „Agentic AI\" (Fit 81), AXA Agentic-AI-Plattform (80), Camunda „work from anywhere\" (80, US$ 126.800–190.100 — offen genannt). Die CHF-Bänder sind Benchmark-Schätzungen und heute <em>nicht</em> neu verifiziert.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Stack-Mix</strong>: Java 54×, Spring Boot 39×, Angular 31×, AI-Integration 27×, Kubernetes 21×, AWS 18×, Kafka 15×, Python 14×, TypeScript 13×, IoT 8×, Automotive 6×.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {

n Remote-Standort</strong> — US$ 150.000–190.000*, Fit 69.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 Stellen, Schweiz vorn</strong>: ELCA Zürich „Agentic AI\" (Fit 81), AXA Agentic-AI-Plattform (80), Camunda „work from anywhere\" (80, US$ 126.800–190.100 — offen genannt). Die CHF-Bänder sind Benchmark-Schätzungen und heute <em>nicht</em> neu verifiziert.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Stack-Mix</strong>: Java 54×, Spring Boot 39×, Angular 31×, AI-Integration 27×, Kubernetes 21×, AWS 18×, Kafka 15×, Python 14×, TypeScript 13×, IoT 8×, Automotive 6×.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet board day — <strong>107 listings</strong>, but only <strong>ten of them new</strong>, and the Java lead has now held Fit 88 for the fourth day running. When the list doesn't move, it's worth looking at the numbers behind it, and today those are uncomfortable: the freelancer average of <strong>€103/h</strong> quoted everywhere is an average across <em>all</em> disciplines. For software and web development, the same source names <strong>€90/h</strong> — the low end of the IT basket. On top of that, three EU tenders freshly checked in full text — two of them behind eligibility walls a two-person shop can't clear, and only the third with no revenue or headcount threshold at all.</p>\n    <ul>\n      <li><span class=\"chip hot\">Rate</span> <strong>The anchor is wrong</strong>: the Freelancer Compass 2026 names <strong>€103/h</strong> as the average across all disciplines (survey Nov 17, 2025–Feb 8, 2026, ~5,400 respondents). The DACH IT average sits at <strong>€95/h</strong> — and software/web development forms the <em>low</em> end at <strong>€90/h</strong>, below Data &amp; Analytics (€100) and SAP/ERP (€120).</li>\n      <li><span class=\"chip warn\">Heads up</span> <strong>Only two freelance rates are actually posted today</strong> — and both sit below that: Right People Group names <strong>€70/h</strong> for Angular in Munich (100% remote), ProTIP <strong>€680/day</strong> (≈ €85/h) in the DB Systel environment. The €90–120 bands seen across the board are researched benchmarks, not actual offers.</li>\n      <li><span class=\"chip\">Board</span> <strong>107 listings</strong>: 83 freelance, 13 employee, 11 intriguing. Median fit <strong>70</strong>, 17 entries at 80+, 8 at 85+, <strong>101 of 107</strong> tagged remote. Versus yesterday: 10 new, 1 gone.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Same leaders, fourth day running</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, Frankfurt 80% remote), BridgingIT (Spring Boot/Kubernetes/Kafka, 100% remote), Keil Business Solutions (Java/Angular plus telematics infrastructure, 100% remote) — all three Fit 88.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>govdigital \"gd.KI\": perfect stack, closed door</strong>. Framework agreement for AI software development, <strong>56,400 person-days</strong> over four years, deadline Aug 4. Eligibility: <strong>≥ €5M in AI-specific revenue each</strong> in 2023, 2024 <em>and</em> 2025, plus <strong>≥ 100 permanently employed</strong> AI developers.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>ITZBund MNSW: small contract, huge eligibility wall</strong>. A 72-month framework contract for at most <strong>10,195 person-days</strong> (≈ 8 full-time equivalents), deadline Aug 31 — yet eligibility requires <strong>€3,300,000 in sector-specific net turnover in each</strong> of the last three fiscal years, minimum staffing of <strong>15 FTE per contract year</strong> across ten role profiles (including 5 FTE software developers, 2 FTE sysadmins), German at <strong>C2</strong>, willingness for <strong>Ü2</strong> security clearance, and certification to <strong>ISO 27001 and ISO 9001</strong>. Not a two-person case.</li>\n      <li><span class=\"chip good\">DE</span> <strong>Uniklinikum Magdeburg is the only somewhat open case</strong>: SaaS for digital discharge and transition management with optional AI modules, deadline Aug 7. The <em>only</em> one of the three procedures <strong>with no fixed minimum revenue and no FTE threshold</strong> — references are scored relatively rather than applied as an exclusion criterion. Here the hurdle is the product, not the balance sheet: they're looking for a finished platform, not a development contract.</li>\n      <li><span class=\"chip hot\">Remote</span> <strong>A rare Brazil clause</strong>: Oscilar is hiring a Sr./Staff Backend Engineer (Java/Kafka) and explicitly lists <strong>Brazil as an allowed remote location</strong> — US$150,000–190,000*, Fit 69.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 roles, Switzerland leads</strong>: ELCA Zurich \"Agentic AI\" (Fit 81), AXA agentic-AI platform (80), Camunda \"work from anywhere\" (80, US$126,800–190,100 — openly listed). The CHF bands are benchmark estimates and were <em>not</em> re-verified today.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Stack mix</strong>: Java 54×, Spring Boot 39×, Angular 31×, AI integration 27×, Kubernetes 21×, AWS 18×, Kafka 15×, Python 14×, TypeScript 13×, IoT 8×, Automotive 6×.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dia tranquilo no board — <strong>107 vagas</strong>, mas apenas <strong>dez delas novas</strong>, e o topo de Java segue no fit 88 pelo quarto dia. Quando a lista não se mexe, vale olhar para os números por trás dela, e hoje eles são incômodos: a média de freelancer citada por toda parte, <strong>103 €/h</strong>, é uma média sobre <em>todas</em> as disciplinas. Para desenvolvimento de software e web, a mesma fonte aponta <strong>90 €/h</strong> — a ponta inferior da cesta de TI. Além disso, três licitações da UE recém-verificadas com texto completo — duas delas atrás de barreiras de habilitação que uma operação de duas pessoas não consegue superar, e apenas a terceira totalmente sem limite de faturamento ou de pessoal.</p>\n    <ul>\n      <li><span class=\"chip hot\">Taxa</span> <strong>A âncora não bate</strong>: o Freelancer-Kompass 2026 aponta <strong>103 €/h</strong> como média sobre todas as disciplinas (pesquisa entre 17/11/2025 e 08/02/2026, ~5.400 participantes). A média de TI na região DACH fica em <strong>95 €/h</strong> — e desenvolvimento de software/web forma, com <strong>90 €/h</strong>, a ponta <em>inferior</em>, abaixo de Data &amp; Analytics (100 €) e SAP/ERP (120 €).</li>\n      <li><span class=\"chip warn\">Atenção</span> <strong>Só duas taxas freelance estão abertamente informadas hoje</strong> — e ambas ficam abaixo: a Right People Group informa <strong>70 €/h</strong> para Angular em Munique (100% remoto), a ProTIP <strong>680 €/dia</strong> (≈ 85 €/h) no ambiente da DB Systel. As faixas de 90–120 € no board são benchmark pesquisado, não oferta.</li>\n      <li><span class=\"chip\">Board</span> <strong>107 vagas</strong>: 83 Freelance, 13 Employee, 11 Intriguing. Fit mediano <strong>70</strong>, 17 vagas a partir de 80, 8 a partir de 85, <strong>101 das 107</strong> com marcação Remote. Em relação a ontem: 10 novas, 1 desapareceu.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Topo inalterado, quarto dia</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, Frankfurt 80% remoto), BridgingIT (Spring Boot/Kubernetes/Kafka, 100% remoto), Keil Business Solutions (Java/Angular + infraestrutura de telemática, 100% remoto) — os três com fit 88.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>govdigital \"gd.KI\": stack perfeito, porta trancada</strong>. Contrato-quadro para desenvolvimento de software de IA, <strong>56.400 pessoas-dia</strong> ao longo de quatro anos, prazo 04/08. Habilitação: <strong>faturamento específico de IA de pelo menos 5 mi €</strong> em cada um de 2023, 2024 <em>e</em> 2025, além de <strong>pelo menos 100 desenvolvedores de IA</strong> contratados de forma fixa.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>ITZBund MNSW: contrato pequeno, barreira de habilitação grande</strong>. Contrato-quadro de 72 meses com no máximo <strong>10.195 pessoas-dia</strong> (≈ 8 equivalentes de tempo integral), prazo 31/08 — mas a habilitação exige <strong>3.300.000 € de faturamento líquido específico da área em cada um</strong> dos últimos três exercícios fiscais, um quadro mínimo de <strong>15 equivalentes de tempo integral por ano de contrato</strong> distribuídos em dez perfis de função (só isso, 5 desenvolvedores de software, 2 administradores de sistema), alemão em nível <strong>C2</strong>, disposição para a verificação de segurança <strong>Ü2</strong> e certificados <strong>ISO 27001 e ISO 9001</strong>. Não é um caso para uma operação de duas pessoas.</li>\n      <li><span class=\"chip good\">DE</span> <strong>Uniklinikum Magdeburg é o único caso razoavelmente aberto</strong>: SaaS para gestão digital de alta e transição de pacientes com módulos opcionais de IA, prazo 07/08. É o único dos três processos <strong>sem faturamento mínimo fixo e sem limite de FTE</strong> — as referências são avaliadas de forma relativa, não usadas como critério de exclusão. Aqui, a barreira é o produto, não o balanço: busca-se uma plataforma pronta, não um contrato de desenvolvimento.</li>\n      <li><span class=\"chip hot\">Remote</span> <strong>Cláusula rara para o Brasil</strong>: a Oscilar busca um Sr./Staff Backend Engineer (Java/Kafka) e lista o <strong>Brasil explicitamente como local remoto permitido</strong> — US$ 150.000–190.000*, fit 69.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 vagas, Suíça na frente</strong>: ELCA Zurique \"Agentic AI\" (fit 81), plataforma Agentic AI da AXA (80), Camunda \"work from anywhere\" (80, US$ 126.800–190.100 — informado abertamente). As faixas em CHF são estimativas de benchmark e hoje <em>não</em> foram reverificadas.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Mix de stack</strong>: Java 54×, Spring Boot 39×, Angular 31×, AI-Integration 27×, Kubernetes 21×, AWS 18×, Kafka 15×, Python 14×, TypeScript 13×, IoT 8×, Automotive 6×.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Día tranquilo en el board — <strong>107 vacantes</strong>, pero solo <strong>diez de ellas nuevas</strong>, y la punta de Java lleva cuatro días con fit 88. Cuando la lista no se mueve, vale la pena mirar las cifras detrás, y hoy resultan incómodas: el promedio de freelancers de <strong>103 €/h</strong>, citado por todas partes, es un promedio sobre <em>todas</em> las disciplinas. Para desarrollo de software y web, la misma fuente reporta <strong>90 €/h</strong> — el extremo inferior de la canasta de TI. A eso se suman tres licitaciones de la UE recién revisadas en texto completo — dos de ellas detrás de muros de idoneidad que una empresa de dos personas no puede superar, y solo la tercera sin ningún umbral de facturación ni de personal.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tarifa</span> <strong>El ancla no cuadra</strong>: el Freelancer-Kompass 2026 reporta <strong>103 €/h</strong> como promedio de todas las disciplinas (encuesta 17/11/2025–08/02/2026, ~5.400 participantes). El promedio de TI en la región DACH es de <strong>95 €/h</strong> — y desarrollo de software/web forma, con <strong>90 €/h</strong>, el extremo <em>inferior</em>, por debajo de Data &amp; Analytics (100 €) y SAP/ERP (120 €).</li>\n      <li><span class=\"chip warn\">Atención</span> <strong>Hoy solo hay dos tarifas de freelance publicadas abiertamente</strong> — y ambas están por debajo: Right People Group ofrece <strong>70 €/h</strong> para Angular en Múnich (100 % remoto), ProTIP <strong>680 €/día</strong> (≈ 85 €/h) en el entorno de DB Systel. Las bandas de 90–120 € en el board son un benchmark investigado, no una oferta.</li>\n      <li><span class=\"chip\">Board</span> <strong>107 vacantes</strong>: 83 Freelance, 13 Employee, 11 Intriguing. Fit mediano <strong>70</strong>, 17 entradas con 80 o más, 8 con 85 o más, <strong>101 de 107</strong> con etiqueta Remoto. Frente a ayer: 10 nuevas, 1 desaparecida.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Punta sin cambios, cuarto día</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, Fráncfort 80 % remoto), BridgingIT (Spring Boot/Kubernetes/Kafka, 100 % remoto), Keil Business Solutions (Java/Angular + infraestructura de telemática, 100 % remoto) — las tres con fit 88.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>govdigital \"gd.KI\": stack perfecto, puerta cerrada</strong>. Contrato marco para desarrollo de software de IA, <strong>56.400 días-persona</strong> a lo largo de cuatro años, plazo 04/08. Idoneidad: <strong>al menos 5 millones de € de facturación específica en IA</strong> en cada uno de 2023, 2024 <em>y</em> 2025, más <strong>al menos 100 desarrolladores de IA fijos en plantilla</strong>.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>ITZBund MNSW: contrato pequeño, gran muro de idoneidad</strong>. Contrato marco de 72 meses por un máximo de <strong>10.195 días-persona</strong> (≈ 8 equivalentes de tiempo completo), plazo 31/08 — pero la idoneidad exige <strong>3.300.000 € de facturación anual mínima específica en cada uno</strong> de los últimos tres ejercicios, una plantilla mínima que suma <strong>~15 FTE por año de contrato</strong> en diez perfiles de rol (solo en desarrollo de software 5 FTE, 2 administradores de sistemas), alemán <strong>C2</strong>, disposición para la habilitación de seguridad <strong>Ü2</strong>, y certificación <strong>ISO 27001 + ISO 9001</strong>. No es un caso para una empresa de dos personas.</li>\n      <li><span class=\"chip good\">DE</span> <strong>El Hospital Universitario de Magdeburgo es el único caso medianamente abierto</strong>: SaaS para gestión digital de altas y transferencias con módulos opcionales de IA, plazo 07/08. Como <em>único</em> de los tres procedimientos, <strong>sin facturación mínima fija ni umbral de FTE</strong> — las referencias se evalúan de forma relativa en lugar de imponerse como causa de exclusión. Aquí el obstáculo es el producto, no el balance: se busca una plataforma terminada, no un encargo de desarrollo.</li>\n      <li><span class=\"chip hot\">Remoto</span> <strong>Cláusula poco común de Brasil</strong>: Oscilar busca un Sr./Staff Backend Engineer (Java/Kafka) y lista <strong>Brasil explícitamente como sede remota permitida</strong> — US$150.000–190.000*, fit 69.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 vacantes, Suiza a la cabeza</strong>: ELCA Zúrich \"Agentic AI\" (fit 81), plataforma Agentic AI de AXA (80), Camunda \"work from anywhere\" (80, US$126.800–190.100 — publicado abiertamente). Las bandas en CHF son estimaciones de benchmark y hoy <em>no</em> se verificaron de nuevo.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Mezcla de stack</strong>: Java 54×, Spring Boot 39×, Angular 31×, AI-Integration 27×, Kubernetes 21×, AWS 18×, Kafka 15×, Python 14×, TypeScript 13×, IoT 8×, Automotive 6×.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Termine bestimmen den Fußball-Freitag, und beide fallen auf heute: Vormittags stellt der DFB in Frankfurt Jürgen Klopp als neuen Bundestrainer vor — der Schlusspunkt hinter einem WM-Sommer, der für Deutschland früh und bitter endete. Nachmittags testet der SC Freiburg im österreichischen Trainingslager erstmals gegen Derby County, zum ersten Mal ohne Johan Manzambi, dessen Rekordabgang zu Aston Villa längst verbucht ist. Die Bundesliga selbst schläft noch bis Ende August; in Brasilien dagegen rollt der Ball nach der WM-Pause wieder, und Palmeiras zieht davon.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp-Vorstellung heute</strong>: Fr 24.07., 11:00 MESZ / 06:00 BRT, Verbandszentrale Frankfurt. Vertrag bis 2030 — über die EM 2028 hinaus.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Warum der Wechsel</strong>: WM-Aus in der Runde der letzten 32 gegen Paraguay (1:1 n.V., 3:4 i.E., Mo 29.06.). Nagelsmanns Vertrag wurde am Fr 03.07. aufgelöst.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Test heute gegen Derby County</strong>: 16:00 MESZ / 11:00 BRT, Belly-Arena Imst/Tirol. Ergebnis stand bei Redaktionsschluss aus.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi-Rekordabgang verbucht</strong>: rund 60 Mio. € + bis zu 10 Mio. € Boni zu Aston Villa (17.–18.07.). Newcastle ging leer aus.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Trainingslager Schruns</strong>: 22.–31.07. (20. Jahr in Folge). Zweiter Test Fr 31.07. gegen Greuther Fürth, 14:00 MESZ / 09:00 BRT.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Neuzugänge bestätigt</strong>: Mio Backhaus, Rihito Yamamoto, Keisuke Goto (Klub-Bestätigung, ohne Ablöse/Datum). Atubolu-Zukunft weiter offen.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>1. Hauptrunde auswärts</strong>: SCF bei Fortuna Düsseldorf, Fenster Fr–Mo 21.–24.08. Auslosung war Sa 06.06.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Liga pausiert</strong>: Auftakt erst Fr 28.08., Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Unten die Abschlusstabelle 2025/26.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras zieht davon</strong>: 44 Punkte aus 19 Spielen, sieben vor Flamengo (37 aus 18, Nachholspiel offen). Corinthians ist zurück im G7.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Termine bestimmen den Fußball-Freitag, und beide fallen auf heute: Vormittags stellt der DFB in Frankfurt Jürgen Klopp als neuen Bundestrainer vor — der Schlusspunkt hinter einem WM-Sommer, der für Deutschland früh und bitter endete. Nachmittags testet der SC Freiburg im österreichischen Trainingslager erstmals gegen Derby County, zum ersten Mal ohne Johan Manzambi, dessen Rekordabgang zu Aston Villa längst verbucht ist. Die Bundesliga selbst schläft noch bis Ende August; in Brasilien dagegen rollt der Ball nach der WM-Pause wieder, und Palmeiras zieht davon.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp-Vorstellung heute</strong>: Fr 24.07., 11:00 MESZ / 06:00 BRT, Verbandszentrale Frankfurt. Vertrag bis 2030 — über die EM 2028 hinaus.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Warum der Wechsel</strong>: WM-Aus in der Runde der letzten 32 gegen Paraguay (1:1 n.V., 3:4 i.E., Mo 29.06.). Nagelsmanns Vertrag wurde am Fr 03.07. aufgelöst.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Test heute gegen Derby County</strong>: 16:00 MESZ / 11:00 BRT, Belly-Arena Imst/Tirol. Ergebnis stand bei Redaktionsschluss aus.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi-Rekordabgang verbucht</strong>: rund 60 Mio. € + bis zu 10 Mio. € Boni zu Aston Villa (17.–18.07.). Newcastle ging leer aus.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Trainingslager Schruns</strong>: 22.–31.07. (20. Jahr in Folge). Zweiter Test Fr 31.07. gegen Greuther Fürth, 14:00 MESZ / 09:00 BRT.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Neuzugänge bestätigt</strong>: Mio Backhaus, Rihito Yamamoto, Keisuke Goto (Klub-Bestätigung, ohne Ablöse/Datum). Atubolu-Zukunft weiter offen.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>1. Hauptrunde auswärts</strong>: SCF bei Fortuna Düsseldorf, Fenster Fr–Mo 21.–24.08. Auslosung war Sa 06.06.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Liga pausiert</strong>: Auftakt erst Fr 28.08., Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Unten die Abschlusstabelle 2025/26.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras zieht davon</strong>: 44 Punkte aus 19 Spielen, sieben vor Flamengo (37 aus 18, Nachholspiel offen). Corinthians ist zurück im G7.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two fixtures define football Friday, and both fall today: this morning the DFB presents Jürgen Klopp in Frankfurt as the new head coach — the final chapter of a World Cup summer that ended early and bitterly for Germany. This afternoon SC Freiburg plays its first test of the training camp in Austria against Derby County, for the first time without Johan Manzambi, whose record departure to Aston Villa is long since settled. The Bundesliga itself is still asleep until the end of August; in Brazil, meanwhile, the ball is rolling again after the World Cup break, and Palmeiras is pulling away.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp presentation today</strong>: Fri 24.07, 11:00 MESZ / 06:00 BRT, federation headquarters, Frankfurt. Contract through 2030 — beyond Euro 2028.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Why the change</strong>: World Cup exit in the round of 32 against Paraguay (1-1 a.e.t., 3-4 on penalties, Mon 29.06). Nagelsmann's contract was terminated on Fri 03.07.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Test today against Derby County</strong>: 16:00 MESZ / 11:00 BRT, Belly-Arena, Imst/Tyrol. Result was not yet available at press time.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi's record departure settled</strong>: around €60m + up to €10m in bonuses to Aston Villa (17.–18.07). Newcastle came away empty-handed.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Training camp in Schruns</strong>: 22.–31.07 (20th year in a row). Second test Fri 31.07 against Greuther Fürth, 14:00 MESZ / 09:00 BRT.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>New signings confirmed</strong>: Mio Backhaus, Rihito Yamamoto, Keisuke Goto (club-confirmed, no fee/date given). Atubolu's future remains open.</li>\n      <li><span class=\"chip\">Cup</span> <strong>1st round away</strong>: SCF at Fortuna Düsseldorf, window Fri–Mon 21.–24.08. Draw was Sat 06.06.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>League on hold</strong>: kickoff not until Fri 28.08, Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Final table 2025/26 below.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras pulls away</strong>: 44 points from 19 matches, seven ahead of Flamengo (37 from 18, game in hand). Corinthians is back in the top 7.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois compromissos definem esta sexta-feira do futebol, e ambos caem hoje: pela manhã, a DFB apresenta em Frankfurt Jürgen Klopp como novo técnico da seleção alemã — o ponto final de um verão de Copa do Mundo que terminou cedo e amargo para a Alemanha. À tarde, o SC Freiburg faz seu primeiro amistoso da pré-temporada na Áustria contra o Derby County, pela primeira vez sem Johan Manzambi, cuja saída recorde para o Aston Villa já está resolvida há tempos. A própria Bundesliga ainda dorme até o fim de agosto; no Brasil, por outro lado, a bola volta a rolar após a pausa da Copa do Mundo, e o Palmeiras dispara na frente.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Apresentação de Klopp hoje</strong>: Sex 24/07, 11:00 MESZ / 06:00 BRT, sede da DFB em Frankfurt. Contrato até 2030 — além da Eurocopa de 2028.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Por que a troca</strong>: eliminação na Copa do Mundo na rodada dos 32 contra o Paraguai (1 a 1 na prorrogação, 3 a 4 nos pênaltis, Seg 29/06). O contrato de Nagelsmann foi rescindido na Sex 03/07.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Amistoso hoje contra o Derby County</strong>: 16:00 MESZ / 11:00 BRT, Belly-Arena, Imst/Tirol. O resultado ainda não estava disponível no fechamento desta edição.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Saída recorde de Manzambi fechada</strong>: cerca de € 60 milhões + até € 10 milhões em bônus para o Aston Villa (17–18/07). O Newcastle ficou de fora.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Pré-temporada em Schruns</strong>: 22–31/07 (20º ano seguido no mesmo local). Segundo amistoso Sex 31/07 contra o Greuther Fürth, 14:00 MESZ / 09:00 BRT.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Contratações confirmadas</strong>: Mio Backhaus, Rihito Yamamoto, Keisuke Goto (confirmação do clube, sem valores/data). O futuro de Atubolu segue em aberto.</li>\n      <li><span class=\"chip\">Copa</span> <strong>1ª rodada principal fora de casa</strong>: SCF visita o Fortuna Düsseldorf, janela Sex–Seg 21–24/08. O sorteio foi em Sáb 06/06.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Liga em pausa</strong>: abertura só em Sex 28/08, Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Abaixo, a tabela final 2025/26.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras dispara na frente</strong>: 44 pontos em 19 jogos, sete à frente do Flamengo (37 em 18, com jogo atrasado). O Corinthians está de volta ao G7.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos citas marcan el viernes futbolero, y ambas caen hoy: por la mañana, el DFB presenta en Fráncfort a Jürgen Klopp como nuevo seleccionador de Alemania — el punto final de un verano mundialista que terminó temprano y amargo para Alemania. Por la tarde, el SC Freiburg disputa en su campamento de entrenamiento en Austria su primer amistoso ante el Derby County, por primera vez sin Johan Manzambi, cuya salida récord al Aston Villa ya quedó resuelta hace tiempo. La Bundesliga en sí sigue en receso hasta finales de agosto; en Brasil, en cambio, el balón vuelve a rodar tras la pausa del Mundial, y Palmeiras se escapa en la tabla.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Presentación de Klopp hoy</strong>: vie 24/07, 11:00 MESZ / 06:00 BRT, sede de la federación en Fráncfort. Contrato hasta 2030 — más allá de la Eurocopa de 2028.</li>\n      <li><span class=\"chip\">DFB</span> <strong>¿Por qué el cambio?</strong>: eliminación mundialista en la ronda de los últimos 32 ante Paraguay (1-1 tras la prórroga, 3-4 en penales, lun 29/06). El contrato de Nagelsmann se rescindió el vie 03/07.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Amistoso hoy ante el Derby County</strong>: 16:00 MESZ / 11:00 BRT, Belly-Arena, Imst/Tirol. El resultado no estaba disponible al cierre de esta edición.</li>\n      <li><span class=\"chip\">Fichajes</span> <strong>Salida récord de Manzambi, ya cerrada</strong>: cerca de 60 millones de € de base + hasta 10 millones de € en bonos al Aston Villa (17–18/07). El Newcastle se quedó sin nada.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Campamento de entrenamiento en Schruns</strong>: 22–31/07 (20.º año consecutivo). Segundo amistoso vie 31/07 ante el Greuther Fürth, 14:00 MESZ / 09:00 BRT.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Nuevas incorporaciones confirmadas</strong>: Mio Backhaus, Rihito Yamamoto, Keisuke Goto (confirmación del club, sin cifras de traspaso ni fecha). El futuro de Atubolu sigue abierto.</li>\n      <li><span class=\"chip\">Copa</span> <strong>1.ª ronda como visitante</strong>: el SCF se mide al Fortuna Düsseldorf, ventana vie–lun 21–24/08. El sorteo fue el sáb 06/06.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>La liga sigue en receso</strong>: el arranque será hasta el vie 28/08, Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Abajo, la tabla final de 2025/26.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras se escapa</strong>: 44 puntos en 19 partidos, siete por delante del Flamengo (37 en 18, con un partido pendiente). El Corinthians está de vuelta en el G7.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 24. Juli. Heute um <strong>13:30 MESZ / 08:30 BRT</strong> rollt in Budapest das erste Auto zum Freien Training, um <strong>17:00 MESZ / 12:00 BRT</strong> folgt FP2. Der <strong>Große Preis von Ungarn</strong> ist der letzte Lauf vor vier Wochen Pause, und er findet auf der Strecke statt, auf der Überholen im ganzen Kalender am schwersten ist — was den heutigen Tag ungewöhnlich wichtig macht: Was am Freitag im Longrun nicht funktioniert, lässt sich am Sonntag kaum noch über die Strecke reparieren. Einen <strong>Sprint gibt es an diesem Wochenende nicht</strong>. Gefahren wurde bis zum Redaktionsschluss noch nichts — alle Zeiten unten sind <em>geplante</em> Termine, alle Tabellen stehen auf dem Stand nach dem Belgien-GP vom 19.07. Dazu eine Warnung in eigener Sache: Die offizielle F1-Rennseite liefert die Sessionzeiten <strong>ohne Zeitzonen-Label</strong> und in UTC aus — wer sie für Ortszeit hält, liegt zwei Stunden daneben.</p>\n    <ul>\n      <li><span class=\"chip hot\">Heute</span> <strong>FP1 13:30 MESZ / 08:30 BRT, FP2 17:00 MESZ / 12:00 BRT.</strong> Budapest liegt in derselben Sommerzeit wie Berlin — Streckenzeit und MESZ sind dieselbe Uhr.</li>\n      <li><span class=\"chip hot\">Zeitzonen-Falle</span> <strong>Zwei Stunden Differenz zwischen zwei F1-Seiten.</strong> Die Rennseite zeigt 11:30 (UTC, unbeschriftet), der offizielle Zeitplan 13:30 Ortszeit. Wir rechnen mit Ortszeit — doppelt belegt.</li>\n      <li><span class=\"chip\">Wochenende</span> <strong>Qualifying Sa 16:00 MESZ / 11:00 BRT, Rennen So 15:00 MESZ / 10:00 BRT</strong>, 70 Runden, kein Sprint.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unverändert seit Spa, heute erneut abgerufen und gegengeprüft.</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip\">Letztes Rennen</span> <strong>Antonelli gewann in Spa mit 1,9 s vor Leclerc</strong>, Verstappen Dritter — sein sechster Saisonsieg.</li>\n      <li><span class=\"chip\">Rechnung</span> <strong>91 + max. 25 = 116 &lt; 159.</strong> Verstappen kann die Top 2 zur Sommerpause nicht mehr erreichen — die Bedingung seiner Ausstiegsklausel ist ab Sonntag erfüllt.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.), vier Läufe offen, nächster in Austin (04.–06.09.).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP und Formel E pausieren</strong> — Stand dieser Angaben: Abruf vom 22./23.07., heute nicht neu geprüft.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 24. Juli. Heute um <strong>13:30 MESZ / 08:30 BRT</strong> rollt in Budapest das erste Auto zum Freien Training, um <strong>17:00 MESZ / 12:00 BRT</strong> folgt FP2. Der <strong>Große Preis von Ungarn</strong> ist der letzte Lauf vor vier Wochen Pause, und er findet auf der Strecke statt, auf der Überholen im ganzen Kalender am schwersten ist — was den heutigen Tag ungewöhnlich wichtig macht: Was am Freitag im Longrun nicht funktioniert, lässt sich am Sonntag kaum noch über die Strecke reparieren. Einen <strong>Sprint gibt es an diesem Wochenende nicht</strong>. Gefahren wurde bis zum Redaktionsschluss noch nichts — alle Zeiten unten sind <em>geplante</em> Termine, alle Tabellen stehen auf dem Stand nach dem Belgien-GP vom 19.07. Dazu eine Warnung in eigener Sache: Die offizielle F1-Rennseite liefert die Sessionzeiten <strong>ohne Zeitzonen-Label</strong> und in UTC aus — wer sie für Ortszeit hält, liegt zwei Stunden daneben.</p>\n    <ul>\n      <li><span class=\"chip hot\">Heute</span> <strong>FP1 13:30 MESZ / 08:30 BRT, FP2 17:00 MESZ / 12:00 BRT.</strong> Budapest liegt in derselben Sommerzeit wie Berlin — Streckenzeit und MESZ sind dieselbe Uhr.</li>\n      <li><span class=\"chip hot\">Zeitzonen-Falle</span> <strong>Zwei Stunden Differenz zwischen zwei F1-Seiten.</strong> Die Rennseite zeigt 11:30 (UTC, unbeschriftet), der offizielle Zeitplan 13:30 Ortszeit. Wir rechnen mit Ortszeit — doppelt belegt.</li>\n      <li><span class=\"chip\">Wochenende</span> <strong>Qualifying Sa 16:00 MESZ / 11:00 BRT, Rennen So 15:00 MESZ / 10:00 BRT</strong>, 70 Runden, kein Sprint.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unverändert seit Spa, heute erneut abgerufen und gegengeprüft.</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip\">Letztes Rennen</span> <strong>Antonelli gewann in Spa mit 1,9 s vor Leclerc</strong>, Verstappen Dritter — sein sechster Saisonsieg.</li>\n      <li><span class=\"chip\">Rechnung</span> <strong>91 + max. 25 = 116 &lt; 159.</strong> Verstappen kann die Top 2 zur Sommerpause nicht mehr erreichen — die Bedingung seiner Ausstiegsklausel ist ab Sonntag erfüllt.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.), vier Läufe offen, nächster in Austin (04.–06.09.).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP und Formel E pausieren</strong> — Stand dieser Angaben: Abruf vom 22./23.07., heute nicht neu geprüft.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Friday, July 24. Today at <strong>13:30 CEST / 08:30 BRT</strong> the first car rolls out in Budapest for Free Practice, with FP2 following at <strong>17:00 CEST / 12:00 BRT</strong>. The <strong>Hungarian Grand Prix</strong> is the last round before a four-week break, and it takes place on the track where overtaking is hardest anywhere on the calendar — which makes today unusually important: whatever doesn't work in Friday's long runs can barely be fixed on track by Sunday. There's <strong>no sprint this weekend</strong>. Nothing has been driven as of press time — all times below are <em>scheduled</em>, and all tables reflect the standings after the Belgian GP on 19.07. On top of that, a warning about our own sourcing: the official F1 race page lists the session times <strong>without a time-zone label</strong>, in UTC — anyone who takes them for local time is off by two hours.</p>\n    <ul>\n      <li><span class=\"chip hot\">Today</span> <strong>FP1 13:30 CEST / 08:30 BRT, FP2 17:00 CEST / 12:00 BRT.</strong> Budapest is on the same summer time as Berlin — track time and CEST are the same clock.</li>\n      <li><span class=\"chip hot\">Time-zone trap</span> <strong>Two-hour gap between two F1 pages.</strong> The race page shows 11:30 (UTC, unlabeled), the official schedule shows 13:30 local time. We're using local time — it's double-sourced.</li>\n      <li><span class=\"chip\">Weekend</span> <strong>Qualifying Sat 16:00 CEST / 11:00 BRT, race Sun 15:00 CEST / 10:00 BRT</strong>, 70 laps, no sprint.</li>\n      <li><span class=\"chip\">Drivers' standings</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unchanged since Spa, refetched and cross-checked again today.</li>\n      <li><span class=\"chip\">Constructors</span> <strong>Mercedes 358 ahead of Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip\">Last race</span> <strong>Antonelli won at Spa, 1.9s ahead of Leclerc</strong>, Verstappen third — his sixth win of the season.</li>\n      <li><span class=\"chip\">The math</span> <strong>91 + max. 25 = 116 &lt; 159.</strong> Verstappen can no longer reach the top two by the summer break — the condition in his exit clause is met as of Sunday.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — frozen since São Paulo (12.07.), four rounds remain, next up is Austin (04.–06.09.).</li>\n      <li><span class=\"chip\">Other series</span> <strong>MotoGP and Formula E are on break</strong> — this info dates from the 22./23.07. fetch and wasn't rechecked today.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é sexta-feira, 24 de julho. Hoje, às <strong>13h30 CEST / 08h30 BRT</strong>, o primeiro carro entra na pista em Budapeste para o treino livre, e às <strong>17h00 CEST / 12h00 BRT</strong> segue o TL2. O <strong>Grande Prêmio da Hungria</strong> é a última etapa antes de quatro semanas de pausa, e acontece na pista em que ultrapassar é o mais difícil de todo o calendário — o que torna o dia de hoje incomumente importante: o que não funcionar na sexta-feira, no longrun, dificilmente se conserta na pista no domingo. Não há <strong>sprint neste fim de semana</strong>. Até o fechamento desta edição, nenhuma volta havia sido disputada — todos os horários abaixo são compromissos <em>previstos</em>, e todas as tabelas refletem a situação após o GP da Bélgica, de 19/07. Além disso, um alerta sobre nossa própria cobertura: a página oficial de corridas da F1 exibe os horários das sessões <strong>sem indicação de fuso horário</strong> e em UTC — quem achar que é horário local erra por duas horas.</p>\n    <ul>\n      <li><span class=\"chip hot\">Hoje</span> <strong>TL1 13h30 CEST / 08h30 BRT, TL2 17h00 CEST / 12h00 BRT.</strong> Budapeste está no mesmo horário de verão que Berlim — o horário da pista e o CEST são o mesmo relógio.</li>\n      <li><span class=\"chip hot\">Armadilha de fuso horário</span> <strong>Duas horas de diferença entre dois sites da F1.</strong> A página de corridas mostra 11h30 (UTC, sem indicação), o cronograma oficial mostra 13h30, horário local. Trabalhamos com o horário local — comprovado em dobro.</li>\n      <li><span class=\"chip\">Fim de semana</span> <strong>Classificação sáb 16h00 CEST / 11h00 BRT, corrida dom 15h00 CEST / 10h00 BRT</strong>, 70 voltas, sem sprint.</li>\n      <li><span class=\"chip\">Classificação de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — inalterado desde Spa, reconferido e checado novamente hoje.</li>\n      <li><span class=\"chip\">Construtores</span> <strong>Mercedes 358 à frente da Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip\">Última corrida</span> <strong>Antonelli venceu em Spa com 1,9 s de vantagem sobre Leclerc</strong>, Verstappen em terceiro — sua sexta vitória na temporada.</li>\n      <li><span class=\"chip\">A conta</span> <strong>91 + máx. 25 = 116 &lt; 159.</strong> Verstappen não consegue mais alcançar o top 2 até a pausa de verão — a condição de sua cláusula de saída está cumprida a partir de domingo.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07), quatro etapas em aberto, próxima em Austin (04–06/09).</li>\n      <li><span class=\"chip\">Outras séries</span> <strong>MotoGP e Fórmula E em pausa</strong> — dados obtidos em 22/23 de julho, não reconferidos hoje.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es viernes 24 de julio. Hoy a las <strong>13:30 CEST / 08:30 BRT</strong> rueda en Budapest el primer auto al primer entrenamiento libre, y a las <strong>17:00 CEST / 12:00 BRT</strong> sigue el FP2. El <strong>Gran Premio de Hungría</strong> es la última carrera antes de cuatro semanas de receso, y se disputa en la pista donde adelantar es más difícil que en cualquier otro punto del calendario — lo que hace que el día de hoy sea inusualmente importante: lo que no funcione el viernes en el longrun difícilmente se puede corregir el domingo sobre la pista. Este fin de semana <strong>no hay sprint</strong>. Hasta el cierre de esta edición no se ha disputado ninguna vuelta — todos los horarios de abajo son fechas <em>programadas</em>, y todas las tablas reflejan el estado tras el GP de Bélgica del 19/07. A esto se suma una advertencia sobre nuestra propia fuente: la página oficial de carreras de la F1 muestra los horarios de las sesiones <strong>sin etiqueta de huso horario</strong> y en UTC — quien las tome por hora local llega dos horas antes.</p>\n    <ul>\n      <li><span class=\"chip hot\">Hoy</span> <strong>FP1 13:30 CEST / 08:30 BRT, FP2 17:00 CEST / 12:00 BRT.</strong> Budapest está en el mismo horario de verano que Berlín — la hora de la pista y el CEST son el mismo reloj.</li>\n      <li><span class=\"chip hot\">Trampa de husos horarios</span> <strong>Dos horas de diferencia entre dos páginas de la F1.</strong> La página de carreras muestra 11:30 (UTC, sin etiqueta), el calendario oficial 13:30 hora local. Nosotros usamos la hora local — respaldada por partida doble.</li>\n      <li><span class=\"chip\">Fin de semana</span> <strong>Clasificación sáb 16:00 CEST / 11:00 BRT, carrera dom 15:00 CEST / 10:00 BRT</strong>, 70 vueltas, sin sprint.</li>\n      <li><span class=\"chip\">Clasificación de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — sin cambios desde Spa, hoy vuelto a consultar y verificado.</li>\n      <li><span class=\"chip\">Constructores</span> <strong>Mercedes 358 por delante de Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip\">Última carrera</span> <strong>Antonelli ganó en Spa con 1,9 s de ventaja sobre Leclerc</strong>, Verstappen tercero — su sexta victoria de la temporada.</li>\n      <li><span class=\"chip\">Cálculo</span> <strong>91 + máx. 25 = 116 &lt; 159.</strong> Verstappen ya no puede alcanzar el top 2 al llegar el receso de verano — la condición de su cláusula de salida se cumple a partir del domingo.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07), cuatro carreras pendientes, la siguiente en Austin (04–06/09).</li>\n      <li><span class=\"chip\">Otras series</span> <strong>MotoGP y Fórmula E están en pausa</strong> — estado de estos datos: consulta del 22–23/07, no verificado de nuevo hoy.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 24. Juli, und über uns liegt eine amtliche Warnung: INMET hat für Ribeirão Claro und Jacarezinho ein <em>Aviso de Tempestade</em> laufen, gültig noch bis heute <strong>23:59 BRT</strong> — Starkregen, Böen bis 60 km/h, Hagel möglich. Gelbe Stufe, also „kann passieren\", nicht „passiert sicher\": Der lokale Punkt-Wert liegt mit 12,4 mm weit unter der Obergrenze, die die Warnung nennt. Danach kommt die gute Nachricht — Samstag nass, Sonntag trocken und bis 26 °C, und diesmal sind sich beide Wetterportale einig. Beim Event-Radar dagegen steht ein ehrliches Nichts: In keinem der vier Ringe ließ sich ein datierter Familien-Termin belegen. Eine Datenlücke, kein Ruhe-Befund — und wir erfinden nichts, um die Tabelle zu füllen.</p>\n    <ul>\n      <li><span class=\"chip hot\">WARNUNG</span> <strong>INMET-Aviso 27882 „Tempestade\"</strong>, Stufe gelb (<em>Perigo Potencial</em>), gültig 23.07. 18:00 → 24.07. 23:59 BRT. Ribeirão Claro und Jacarezinho gehören zu den rund 350 erfassten PR-Kommunen.</li>\n      <li><span class=\"chip hot\">RISIKO</span> <strong>20–30 mm/h oder bis 50 mm/Tag</strong>, Böen 40–60 km/h, Hagelschlag. INMET nennt geringes Risiko für Stromausfälle, Astbruch und lokale Überflutungen.</li>\n      <li><span class=\"chip\">HEUTE</span> <strong>18°/15°, 93 % Regen, 12,4 mm</strong> (Climatempo) — o tempo zeigt für heute durchgehend Regen bei 15 °C. Kalt, nass, kurz: ein Drinnen-Freitag.</li>\n      <li><span class=\"chip good\">WOCHENENDE</span> <strong>Samstag nass, Sonntag trocken</strong>: Sa 15–23 °C bei 76 % Regen, So 16–26 °C bei <strong>0 %</strong> Regen. Der Sonntag ist der Outdoor-Tag der Woche.</li>\n      <li><span class=\"chip good\">UPDATE</span> <span class=\"update-since\">Update seit gestern</span> <strong>Die Sonntagsfrage ist beantwortet</strong>: o tempo hatte gestern noch „Tempestades\" für den 26.07. gemeldet, heute steht dort „teilweise bewölkt\" bei 15–24 °C. Der Widerspruch hat sich in Richtung Climatempo aufgelöst.</li>\n      <li><span class=\"chip hot\">LÜCKE</span> <strong>Event-Radar leer — in allen vier Ringen</strong>. Lokale Seiten stehen auf Mai, Aggregatoren melden „Nada por aqui ainda\", SESC-Termine sind nur per JavaScript sichtbar. Kein Event erfunden, dafür unten eine Selbst-Prüf-Liste.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Montag, 27.07., Schulstart</strong> der <em>rede estadual</em> — Stand vom 23.07.2026; die Quelle beim Landes-Nachrichtenportal antwortet heute mit HTTP 404, deshalb nicht neu bestätigt.</li>\n      <li><span class=\"chip\">GESUNDHEIT</span> <strong>Heute keine Dengue-Zahl</strong>: Informe nº 23 (21.07.2026) ist gelistet, die Zahlen dahinter stecken im nicht erreichbaren PDF-Viewer; auch der April-Stand ließ sich heute nicht nachprüfen. Fiocruz/InfoGripe ebenfalls 404.</li>\n      <li><span class=\"chip\">BABY</span> <strong>Nach dem Regen der Hof-Check</strong>, und am Sonntag lieber draußen als in einem vollen Innenraum — die RSV-Saison läuft weiter.</li>\n    </ul></div>",

er Widerspruch hat sich in Richtung Climatempo aufgelöst.</li>\n      <li><span class=\"chip hot\">LÜCKE</span> <strong>Event-Radar leer — in allen vier Ringen</strong>. Lokale Seiten stehen auf Mai, Aggregatoren melden „Nada por aqui ainda\", SESC-Termine sind nur per JavaScript sichtbar. Kein Event erfunden, dafür unten eine Selbst-Prüf-Liste.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Montag, 27.07., Schulstart</strong> der <em>rede estadual</em> — Stand vom 23.07.2026; die Quelle beim Landes-Nachrichtenportal antwortet heute mit HTTP 404, deshalb nicht neu bestätigt.</li>\n      <li><span class=\"chip\">GESUNDHEIT</span> <strong>Heute keine Dengue-Zahl</strong>: Informe nº 23 (21.07.2026) ist gelistet, die Zahlen dahinter stecken im nicht erreichbaren PDF-Viewer; auch der April-Stand ließ sich heute nicht nachprüfen. Fiocruz/InfoGripe ebenfalls 404.</li>\n      <li><span class=\"chip\">BABY</span> <strong>Nach dem Regen der Hof-Check</strong>, und am Sonntag lieber draußen als in einem vollen Innenraum — die RSV-Saison läuft weiter.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Friday, July 24, and an official warning hangs over us: INMET has an <em>Aviso de Tempestade</em> running for Ribeirão Claro and Jacarezinho, valid through today at <strong>23:59 BRT</strong> — heavy rain, gusts up to 60 km/h, hail possible. Yellow level, meaning \"could happen,\" not \"will happen\": the local point value sits at 12.4 mm, well below the ceiling the warning names. After that comes the good news — Saturday wet, Sunday dry and up to 26°C, and this time both weather portals agree. The event radar, though, shows an honest blank: in none of the four rings could a dated family event be confirmed. A data gap, not a quiet finding — and we're not inventing anything to fill the table.</p>\n    <ul>\n      <li><span class=\"chip hot\">WARNING</span> <strong>INMET Aviso 27882 \"Tempestade\"</strong>, yellow level (<em>Perigo Potencial</em>), valid 07/23 18:00 → 07/24 23:59 BRT. Ribeirão Claro and Jacarezinho are among the roughly 350 PR municipalities covered.</li>\n      <li><span class=\"chip hot\">RISK</span> <strong>20–30 mm/h or up to 50 mm/day</strong>, gusts 40–60 km/h, hail. INMET names a low risk for power outages, fallen branches, and localized flooding.</li>\n      <li><span class=\"chip\">TODAY</span> <strong>18°/15°, 93% rain, 12.4 mm</strong> (Climatempo) — o tempo shows rain all day at 15°C. Cold, wet, in short: an indoor Friday.</li>\n      <li><span class=\"chip good\">WEEKEND</span> <strong>Saturday wet, Sunday dry</strong>: Sat 15–23°C at 76% chance of rain, Sun 16–26°C at <strong>0%</strong> rain. Sunday is the week's outdoor day.</li>\n      <li><span class=\"chip good\">UPDATE</span> <span class=\"update-since\">Update since yesterday</span> <strong>The Sunday question is answered</strong>: o tempo had reported \"storms\" for 07/26 yesterday; today it shows \"partly cloudy\" at 15–24°C. The contradiction resolved in Climatempo's direction.</li>\n      <li><span class=\"chip hot\">GAP</span> <strong>Event radar empty — across all four rings</strong>. Local sites are stuck on May, aggregators report \"nothing here yet,\" SESC listings are only visible via JavaScript. No event invented — instead, a self-check list below.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Monday, 07/27, school starts</strong> for the <em>rede estadual</em> — as of 07/23/2026; the state news portal's source returns HTTP 404 today, so it isn't freshly confirmed.</li>\n      <li><span class=\"chip\">HEALTH</span> <strong>No dengue figure today</strong>: Informe no. 23 (07/21/2026) is listed, but the numbers behind it sit in an unreachable PDF viewer; even the April status couldn't be re-verified today. Fiocruz/InfoGripe also returned 404.</li>\n      <li><span class=\"chip\">BABY</span> <strong>After the rain, the yard check</strong>, and on Sunday, better outdoors than in a crowded indoor space — RSV season continues.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É sexta-feira, 24 de julho, e paira sobre nós um alerta oficial: o INMET mantém para Ribeirão Claro e Jacarezinho um <em>Aviso de Tempestade</em>, válido ainda até hoje às <strong>23:59 BRT</strong> — chuva forte, rajadas de até 60 km/h, granizo possível. Nível amarelo, ou seja, \"pode acontecer\", não \"vai acontecer com certeza\": o valor pontual local, de 12,4 mm, fica bem abaixo do teto que o alerta menciona. Depois vem a boa notícia — sábado chuvoso, domingo seco e com até 26 °C, e desta vez os dois portais de clima concordam. Já no radar de eventos, o que há é um vazio honesto: em nenhum dos quatro anéis foi possível comprovar um compromisso familiar com data confirmada. Uma lacuna de dados, não um sinal de calmaria — e não inventamos nada para preencher a tabela.</p>\n    <ul>\n      <li><span class=\"chip hot\">ALERTA</span> <strong>Aviso INMET 27882 \"Tempestade\"</strong>, nível amarelo (<em>Perigo Potencial</em>), válido de 23/07 18:00 até 24/07 23:59 BRT. Ribeirão Claro e Jacarezinho estão entre os cerca de 350 municípios paranaenses abrangidos.</li>\n      <li><span class=\"chip hot\">RISCO</span> <strong>20–30 mm/h ou até 50 mm/dia</strong>, rajadas de 40–60 km/h, queda de granizo. O INMET aponta risco baixo de falta de energia, queda de galhos e alagamentos localizados.</li>\n      <li><span class=\"chip\">HOJE</span> <strong>18°/15°, 93% de chuva, 12,4 mm</strong> (Climatempo) — o tempo mostra para hoje chuva contínua a 15 °C. Frio, molhado, em resumo: uma sexta-feira para ficar em casa.</li>\n      <li><span class=\"chip good\">FIM DE SEMANA</span> <strong>Sábado chuvoso, domingo seco</strong>: sáb 15–23 °C com 76% de chuva, dom 16–26 °C com <strong>0%</strong> de chuva. O domingo é o dia ao ar livre da semana.</li>\n      <li><span class=\"chip good\">ATUALIZAÇÃO</span> <span class=\"update-since\">Atualização desde ontem</span> <strong>A dúvida sobre o domingo foi resolvida</strong>: o tempo ainda registrava ontem \"Tempestades\" para 26/07, hoje aparece lá \"parcialmente nublado\" a 15–24 °C. A contradição se resolveu na direção do Climatempo.</li>\n      <li><span class=\"chip hot\">LACUNA</span> <strong>Radar de eventos vazio — nos quatro anéis</strong>. Sites locais estão parados em maio, agregadores informam \"Nada por aqui ainda\", os horários do SESC só aparecem via JavaScript. Nenhum evento inventado — mas abaixo há uma lista para checar por conta própria.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Segunda-feira, 27/07, volta às aulas</strong> da <em>rede estadual</em> — dado de 23/07/2026; a fonte no portal de notícias do estado responde hoje com HTTP 404, por isso não foi reconfirmado.</li>\n      <li><span class=\"chip\">SAÚDE</span> <strong>Hoje, nenhum número de dengue</strong>: o Informe nº 23 (21/07/2026) está listado, mas os números por trás dele estão presos num visualizador de PDF inacessível; também o dado de abril não pôde ser reverificado hoje. Fiocruz/InfoGripe também com 404.</li>\n      <li><span class=\"chip\">BEBÊ</span> <strong>Depois da chuva, a checagem do quintal</strong>, e no domingo melhor ao ar livre do que num ambiente fechado e lotado — a temporada de VSR continua.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es viernes 24 de julio, y sobre nosotros pesa una alerta oficial: el INMET tiene activo para Ribeirão Claro y Jacarezinho un <em>Aviso de Tempestade</em>, vigente todavía hasta hoy a las <strong>23:59 BRT</strong> — lluvia intensa, ráfagas de hasta 60 km/h, granizo posible. Nivel amarillo, es decir «puede pasar», no «va a pasar seguro»: el valor puntual local es de 12,4 mm, muy por debajo del límite superior que menciona la alerta. Después viene la buena noticia: sábado lluvioso, domingo seco y hasta 26 °C, y esta vez ambos portales meteorológicos coinciden. En el radar de eventos, en cambio, hay un vacío honesto: en ninguno de los cuatro anillos se pudo confirmar un evento familiar con fecha. Es un vacío de datos, no un hallazgo de calma — y no inventamos nada para llenar la tabla.</p>\n    <ul>\n      <li><span class=\"chip hot\">ALERTA</span> <strong>Aviso INMET 27882 «Tempestade»</strong>, nivel amarillo (<em>Perigo Potencial</em>), vigente 23/07 18:00 → 24/07 23:59 BRT. Ribeirão Claro y Jacarezinho están entre los cerca de 350 municipios de PR incluidos.</li>\n      <li><span class=\"chip hot\">RIESGO</span> <strong>20–30 mm/h o hasta 50 mm/día</strong>, ráfagas de 40–60 km/h, granizo. El INMET indica riesgo bajo de cortes de luz, caída de ramas e inundaciones locales.</li>\n      <li><span class=\"chip\">HOY</span> <strong>18°/15°, 93 % de lluvia, 12,4 mm</strong> (Climatempo) — o tempo muestra para hoy lluvia continua a 15 °C. Frío, mojado, en resumen: un viernes de interior.</li>\n      <li><span class=\"chip good\">FIN DE SEMANA</span> <strong>Sábado lluvioso, domingo seco</strong>: sáb 15–23 °C con 76 % de lluvia, dom 16–26 °C con <strong>0 %</strong> de lluvia. El domingo es el día al aire libre de la semana.</li>\n      <li><span class=\"chip good\">ACTUALIZACIÓN</span> <span class=\"update-since\">Actualización desde ayer</span> <strong>La pregunta del domingo quedó resuelta</strong>: ayer o tempo todavía anunciaba «Tempestades» para el 26/07, hoy dice «parcialmente nublado» con 15–24 °C. La contradicción se resolvió a favor de Climatempo.</li>\n      <li><span class=\"chip hot\">VACÍO</span> <strong>Radar de eventos vacío — en los cuatro anillos</strong>. Las páginas locales siguen en mayo, los agregadores reportan «Nada por aqui ainda», y las fechas del SESC solo son visibles vía JavaScript. No se inventó ningún evento; abajo hay una lista para verificar por cuenta propia.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Lunes 27/07, inicio de clases</strong> de la <em>rede estadual</em> — dato del 23/07/2026; la fuente del portal de noticias estatal responde hoy con HTTP 404, por eso no se pudo reconfirmar.</li>\n      <li><span class=\"chip\">SALUD</span> <strong>Hoy sin cifra de dengue</strong>: el Informe nº 23 (21/07/2026) está listado, pero sus cifras están dentro de un visor de PDF inaccesible; tampoco se pudo verificar hoy el dato de abril. Fiocruz/InfoGripe también con error 404.</li>\n      <li><span class=\"chip\">BEBÉ</span> <strong>Después de la lluvia, recorrer el patio</strong>, y el domingo mejor al aire libre que en un interior lleno de gente — la temporada de VRS sigue en curso.</li>\n    </ul></div>"

// ============================================================
