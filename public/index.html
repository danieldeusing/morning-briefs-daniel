<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule, in three zones. LEFT: the
     brand wordmark (mono + .glow) and a blinking .cursor-block. CENTER: the
     back/forward/history controls then a `reader@briefs:~` breadcrumb
     (flexible, truncating). RIGHT: the nav-rail minimize toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header (and its open history dropdown) above the content, which is
       also a positioned body child at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* CENTER zone — history controls then the breadcrumb. Takes the remaining
     width and centers; the breadcrumb truncates on overflow. */
  .header-center {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.2rem;
  }

  /* RIGHT zone — the nav-rail minimize toggle (or nothing). */
  .header-right {
    flex: none;
    display: flex;
    align-items: center;
  }

  /* Back / forward / history controls — 28px square, muted, warm to --primary on
     hover, dimmed when disabled (mirrors pagr's .nav-ctrl). */
  .nav-ctrl {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    list-style: none;
    cursor: pointer;
    color: var(--muted-foreground);
    background: none;
    border: 0;
    border-radius: 0;
    transition: color 0.15s ease;
  }
  .nav-ctrl::-webkit-details-marker { display: none; }
  .nav-ctrl:hover:not(:disabled) { color: var(--primary); }
  .nav-ctrl:disabled { opacity: 0.35; cursor: default; }

  /* The history dropdown sits at the top of the page, so it opens downward. */
  .nav-history { flex: none; }
  .nav-history-panel {
    min-width: 200px;
    max-width: min(80vw, 320px);
    max-height: min(60vh, 420px);
    overflow-y: auto;
  }
  .nav-history-panel .dropdown-item {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Breadcrumb: `reader@briefs:~/path`. The host part is muted, `~` is the
     accent, the active path segment is --foreground. Truncates on overflow.
     A left margin separates it from the history controls (mirrors pagr). */
  .header-crumb {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.72rem;
    color: var(--muted-foreground);
    margin-left: 0.6rem;
  }
  .header-crumb .crumb-host { color: var(--muted-foreground); }
  .header-crumb .crumb-root {
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
  }
  .header-crumb .crumb-root:hover { text-decoration: underline; }
  .header-crumb .crumb-sep { color: var(--muted-foreground); }
  .header-crumb .crumb-seg {
    color: var(--muted-foreground);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .header-crumb .crumb-seg:hover { color: var(--primary); }
  .header-crumb .crumb-seg.current { color: var(--foreground); cursor: default; }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, print, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  .theme-dot { width: 11px; height: 11px; flex: none; }
  .lang-flag { font-size: 1rem; line-height: 1; }
  .dropdown-item .lang-flag { font-size: 1.05rem; }

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --cat-accent: var(--c-jobs);           --cat-accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); --cat-accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport);     --cat-accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto);  --cat-accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted-ink); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --cat-accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    margin: 0;
    border-radius: 0;
    cursor: pointer; font-weight: 600; font-size: 0.8rem;
    color: var(--foreground);
    transition: background 120ms, color 0.15s ease;
    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    /* Drop the breadcrumb on the smallest widths — the brand + history
       controls carry the chrome; the path would otherwise crowd the row. */
    .header-crumb { display: none; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — hide the header + footer chrome and let the iframe content (or
     home grid) take the full page. Same-origin iframes print their content
     natively, so the visible newsletter prints with its own @media print
     rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, footer.status-bar, .loading, .print-dialog, .nav-rail, .rail-fab {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted-ink);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--cat-accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--cat-accent-text);
    color: var(--bg);
    border: 1px solid var(--cat-accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<!-- Terminal header bar, three zones (mirrors pagr): LEFT brand wordmark +
     cursor; CENTER back/forward/history controls then the `reader@briefs:~`
     breadcrumb (flexible, truncating); RIGHT the nav-rail minimize toggle.
     The grouped category nav now lives in the sticky right sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-center">
    <button class="nav-ctrl" id="nav-back" type="button" aria-label="Zurück" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m15 18-6-6 6-6"></path>
      </svg>
    </button>
    <button class="nav-ctrl" id="nav-forward" type="button" aria-label="Vorwärts" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m9 18 6-6-6-6"></path>
      </svg>
    </button>
    <details class="dropdown nav-history" id="nav-history" hidden>
      <summary class="nav-ctrl" aria-label="Verlauf">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
          <path d="M3 3v5h5"></path>
          <path d="M12 7v5l4 2"></path>
        </svg>
      </summary>
      <ul class="dropdown-panel dropdown-panel--down nav-history-panel" id="nav-history-list"><!-- populated by JS --></ul>
    </details>
    <span class="header-crumb" id="header-crumb" aria-live="polite">
      <span class="crumb-host">reader@briefs:</span><a class="crumb-root" href="#home">~</a>
    </span>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sonntag, kein Handel — also der Blick zurück auf die Woche, die für dich als Euro-Verdiener freundlich endete. Die EZB hat zum ersten Mal seit drei Jahren die Zinsen erhöht, das hebt den Euro; die brasilianische Notenbank senkt weiter; und der Ölpreis ist im Juni eingebrochen. Unterm Strich: dein Euro kauft gerade ~5,90 Real statt der ~5,77 vom Frühjahr — ein gutes Umtausch-Fenster, falls eines ansteht. Alle Kurse sind Freitagsschluss (26.06.); EUR/BRL, USD/BRL und DXY werden erst am Montag wieder live gehandelt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9010</strong> (EZB-Fix Fr 26.06.): praktisch unverändert ggü. Vortag (5,9000), aber nahe dem schwächsten Real seit Monaten — gut für dich.</li>\n      <li><span class=\"chip\">Timing</span> <strong>Fix vs. Spot</strong>: der EZB-Fix lag bei 5,9010, der Spot-Markt schloss in New York aber bei ~5,8840 — 1,2 % Unterschied, reine Tageszeit-Frage (siehe unten).</li>\n      <li><span class=\"chip hot\">EZB</span> <strong>+25 Bp auf 2,25 %</strong> (11.06.): erste EZB-Erhöhung seit drei Jahren, Iran-Krieg-Energieschock treibt die Inflation — der Euro-Hebel hinter dem 5,90er-Kurs.</li>\n      <li><span class=\"chip\">Fed</span> <strong>3,50–3,75 % gehalten</strong> (17.06.): Warsh-Premiere, Senkungs-Bias gestrichen, 9 von 18 sehen eine Erhöhung noch 2026 — Markt preist Oktober.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic auf 14,25 %</strong> gesenkt (3. Schnitt): IPCA-15 mit +0,41 % weicher als erwartet, aber 12-Monats-Inflation ~4,6 % über dem 4,5 %-Ziel-Dach.</li>\n      <li><span class=\"chip good\">Öl</span> <strong>Brent 71,99 $</strong> (−4,34 % am Fr, −21,96 % im Juni): Hormus-Schifffahrt normalisiert sich — der Disinflations-Rückenwind, der der BCB Spielraum gibt.</li>\n      <li><span class=\"chip\">BR-Fiskal</span> <strong>Primärdefizit ~59 Mrd. R$</strong> 2026 erwartet: Markt-Median im Juni leicht verschlechtert, Wahljahr-Ausgaben als Risiko voraus.</li>\n      <li><span class=\"chip\">Divergenz</span> <strong>Drei Notenbanken, drei Richtungen</strong>: EZB hoch, Fed seitwärts-hawkish, BCB runter — der schrumpfende US-BR-Zinsabstand ist struktureller BRL-Gegenwind.</li>\n      <li><span class=\"chip\">Wahl</span> <strong>Okt-Wahl rückt näher</strong>: Lula vs. Flávio Bolsonaro, simulierte Stichwahl 46–46 % — Unsicherheit, die den Real ab Q3 belasten kann.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Sunday, no trading — so we look back at a week that ended well if you earn in euros. The ECB raised rates for the first time in three years, which lifts the euro; Brazil's central bank cuts again; and oil prices collapsed in June. Bottom line: your euro is now buying ~5.90 reais instead of ~5.77 from spring — a good window for exchange if one comes up. All rates are Friday's close (June 26); EUR/BRL, USD/BRL, and DXY will trade live again Monday.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9010</strong> (ECB fix Fri June 26): practically flat vs. previous day (5.9000), but near the weakest real in months — good for you.</li>\n      <li><span class=\"chip\">Timing</span> <strong>Fix vs. Spot</strong>: the ECB fix was 5.9010, but the spot market closed in New York at ~5.8840 — a 1.2% difference, pure daytime effect (see below).</li>\n      <li><span class=\"chip hot\">ECB</span> <strong>+25 bp to 2.25%</strong> (June 11): first ECB hike in three years, Iran war energy shock driving inflation — the euro lever behind the 5.90 rate.</li>\n      <li><span class=\"chip\">Fed</span> <strong>3.50–3.75% held</strong> (June 17): Warsh's debut, cut bias removed, 9 of 18 see a hike before year-end — market prices October.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic cut to 14.25%</strong> (third cut): IPCA-15 came in at +0.41%, softer than expected, but 12-month inflation ~4.6%, above the 4.5% ceiling.</li>\n      <li><span class=\"chip good\">Oil</span> <strong>Brent $71.99</strong> (−4.34% on Fri, −21.96% in June): Hormuz shipping normalizing — the disinflation tailwind giving the BCB room.</li>\n      <li><span class=\"chip\">BR Fiscal</span> <strong>Primary deficit ~59B reais</strong> expected in 2026: market median in June weakened slightly, election-year spending a risk ahead.</li>\n      <li><span class=\"chip\">Divergence</span> <strong>Three central banks, three directions</strong>: ECB up, Fed sideways-hawkish, BCB down — the shrinking US-BR rate spread is structural BRL headwind.</li>\n      <li><span class=\"chip\">Election</span> <strong>October election looms</strong>: Lula vs. Flávio Bolsonaro, runoff simulation 46–46% — uncertainty that could weigh on the real from Q3 onward.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, sem negociações — então olhamos para trás em uma semana que terminou bem se você ganha em euros. O Banco Central Europeu aumentou juros pela primeira vez em três anos, o que valoriza o euro; o banco central brasileiro continua cortando; e o preço do petróleo desabou em junho. Na essência: seu euro está comprando agora ~5,90 reais em vez de ~5,77 da primavera — uma boa janela de câmbio se uma se apresentar. Todas as cotações são do fechamento de sexta (26.06.); EUR/BRL, USD/BRL e DXY voltam a operar ao vivo na segunda.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,9010</strong> (Fixação BCE sex 26.06.): praticamente inalterado ante o dia anterior (5,9000), mas perto do real mais fraco em meses — bom para você.</li>\n      <li><span class=\"chip\">Momento</span> <strong>Fixação vs. Spot</strong>: a fixação do BCE ficou em 5,9010, mas o mercado spot fechou em Nova York em ~5,8840 — uma diferença de 1,2%, pura questão de horário (veja abaixo).</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 bp para 2,25%</strong> (11.06.): primeiro aumento do BCE em três anos, choque energético pela guerra no Irã pressionando inflação — a alavanca do euro por trás da taxa de 5,90.</li>\n      <li><span class=\"chip\">Fed</span> <strong>3,50–3,75% mantida</strong> (17.06.): estreia de Warsh, viés de corte removido, 9 de 18 veem um aumento antes do fim do ano — mercado precifica outubro.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic reduzida para 14,25%</strong> (terceiro corte): IPCA-15 em +0,41%, mais macio que o esperado, mas inflação de 12 meses ~4,6% acima do teto de 4,5%.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent $71,99</strong> (−4,34% sex, −21,96% junho): navegação no Hormuz normalizando — o vento de desinflação dando espaço ao BC.</li>\n      <li><span class=\"chip\">Fiscal BR</span> <strong>Déficit primário ~59 bilhões R$</strong> esperado em 2026: mediana do mercado em junho piorou levemente, gastos de ano eleitoral como risco adiante.</li>\n      <li><span class=\"chip\">Divergência</span> <strong>Três bancos centrais, três direções</strong>: BCE alta, Fed neutra-agressiva, BC baixa — a redução do diferencial de juros EUA-Brasil é vento de cauda estrutural para o real.</li>\n      <li><span class=\"chip\">Eleição</span> <strong>Eleição de outubro se aproxima</strong>: Lula vs. Flávio Bolsonaro, simulação de segundo turno 46–46% — incerteza que pode pesar no real a partir de Q3.</li>\n    </ul></div>",

s rot</strong>: DOGE 0,0738 $ (−11,5 % 7T), TAO 207,65 $ (−12 % 7T) — Risk-off trifft die Ränder zuerst.</li>\n    </ul></div>",

ong>: DOGE 0,0738 $ (−11,5 % 7T), TAO 207,65 $ (−12 % 7T) — Risk-off trifft die Ränder zuerst.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday — US markets closed since Friday close, crypto trades round the clock. And it's a risk-off weekend: the report that OpenAI is pushing its IPO to 2027 triggered the Nasdaq's fifth straight loss session on Friday and punished everything labeled \"AI hardware.\" Meanwhile, money flowed into AI software (MSFT +5.71 %), out of oil (Brent −4.3 %), and consistently out of Bitcoin (7th straight ETF-outflow day). This is a rotation, not a crash — but the direction is clear.</p>\n    <ul>\n      <li><span class=\"chip hot\">AI HARDWARE</span> <strong>OpenAI IPO deferred to 2027</strong>: NVDA −1.64 % at $192.53, AMD −3.5 %, Micron −4.5 % — Nasdaq −4.6 % on the week, 5th straight loss day.</li>\n      <li><span class=\"chip good\">AI SOFTWARE</span> <strong>Microsoft +5.71 %</strong> at $372.97 — Burry reveals Dec-2028 LEAP calls (strike around $700); money rotates from hardware to software. Q4 earnings 28.07.</li>\n      <li><span class=\"chip\">ALPHABET</span> <strong>GOOGL −1.84 %</strong> at $337.39 — −15 % from May high ($408): talent departures, $80–85B capital raise, capex pressure on margins.</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC $59,949</strong> (−6.9 % over 7 days), −20.7 % in June; spot ETFs bleeding 7th straight day, IBIT alone −$445M on Friday.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1,569</strong> (−9.3 % over 7 days) — weaker than BTC, market cap below $190B.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent $71.99</strong> (−4.3 %), WTI $69.23 — Hormuz shipping back to ~75 % of pre-crisis level, Brent −22 % in June.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~$4,063–$4,087</strong>/oz (+25 % over 12 months) — intraday gain, but −8 % in June; FOMC eye on 29.07.</li>\n      <li><span class=\"chip\">CRYPTO SECTORS</span> <strong>All red</strong>: DOGE $0.0738 (−11.5 % 7D), TAO $207.65 (−12 % 7D) — risk-off hits the fringe first.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É domingo — os mercados dos EUA estão fechados desde o fechamento de sexta, cripto funciona 24/7. E é um fim de semana de risco-off: o relatório de que a OpenAI está adiando seu IPO para 2027 disparou a quinta sessão de perdas consecutivas do Nasdaq na sexta-feira e castigou tudo que se chama \"hardware de IA\". Enquanto isso, o dinheiro fluiu para software de IA (MSFT +5,71 %), para fora do petróleo (Brent −4,3 %) e consistentemente para fora do Bitcoin (7º dia consecutivo de saída de ETF). É uma rotação, não um crash — mas a direção é clara.</p>\n    <ul>\n      <li><span class=\"chip hot\">HARDWARE DE IA</span> <strong>IPO da OpenAI adiado para 2027</strong>: NVDA −1,64 % em $192,53, AMD −3,5 %, Micron −4,5 % — Nasdaq −4,6 % na semana, 5º dia de perda consecutivo.</li>\n      <li><span class=\"chip good\">SOFTWARE DE IA</span> <strong>Microsoft +5,71 %</strong> em $372,97 — Burry revela opções de compra LEAP de dez-2028 (strike em torno de $700); dinheiro rotaciona de hardware para software. Resultados Q4 em 28.07.</li>\n      <li><span class=\"chip\">ALPHABET</span> <strong>GOOGL −1,84 %</strong> em $337,39 — −15 % do máximo de maio ($408): saídas de talentos, aumento de capital de 80–85 bilhões $, pressão de capex sobre margens.</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC $59.949</strong> (−6,9 % em 7 dias), −20,7 % em junho; ETFs de spot sangram pelo 7º dia consecutivo, IBIT sozinho −$445 milhões na sexta-feira.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1.569</strong> (−9,3 % em 7 dias) — mais fraco que BTC, capitalização de mercado abaixo de $190 bilhões.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent $71,99</strong> (−4,3 %), WTI $69,23 — transporte por Hormuz de volta a ~75 % do nível pré-crise, Brent −22 % em junho.</li>\n      <li><span class=\"chip good\">OURO</span> <strong>Ouro ~$4.063–$4.087</strong>/oz (+25 % em 12 meses) — ganho intradiário, mas −8 % em junho; olho no FOMC em 29.07.</li>\n      <li><span class=\"chip\">SETORES CRIPTO</span> <strong>Tudo vermelho</strong>: DOGE $0,0738 (−11,5 % 7D), TAO $207,65 (−12 % 7D) — risco-off atinge as extremidades primeiro.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es domingo — los mercados de EE.UU. están cerrados desde el cierre de viernes, cripto funciona veinticuatro horas. Y es un fin de semana de riesgo-off: el reporte de que OpenAI está postergando su IPO a 2027 desencadenó la quinta sesión de pérdidas consecutivas del Nasdaq el viernes y castigó todo lo que se llama \"hardware de IA\". Mientras tanto, el dinero fluyó hacia software de IA (MSFT +5,71 %), fuera del petróleo (Brent −4,3 %) y consistentemente fuera de Bitcoin (séptimo día consecutivo de salidas de ETF). Esto es una rotación, no un crash — pero la dirección es clara.</p>\n    <ul>\n      <li><span class=\"chip hot\">HARDWARE DE IA</span> <strong>IPO de OpenAI pospuesto a 2027</strong>: NVDA −1,64 % en $192,53, AMD −3,5 %, Micron −4,5 % — Nasdaq −4,6 % en la semana, quinto día de pérdida consecutivo.</li>\n      <li><span class=\"chip good\">SOFTWARE DE IA</span> <strong>Microsoft +5,71 %</strong> en $372,97 — Burry revela opciones de compra LEAP dic-2028 (strike alrededor de $700); el dinero rota de hardware a software. Resultados Q4 el 28.07.</li>\n      <li><span class=\"chip\">ALPHABET</span> <strong>GOOGL −1,84 %</strong> en $337,39 — −15 % desde máximo de mayo ($408): salidas de talento, aumento de capital de 80–85 mil millones $, presión de capex sobre márgenes.</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC $59.949</strong> (−6,9 % en 7 días), −20,7 % en junio; ETFs de contado sangran el séptimo día consecutivo, IBIT solo −$445 millones el viernes.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1.569</strong> (−9,3 % en 7 días) — más débil que BTC, capitalización de mercado por debajo de $190 mil millones.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent $71,99</strong> (−4,3 %), WTI $69,23 — envíos por Hormuz de vuelta a ~75 % del nivel pre-crisis, Brent −22 % en junio.</li>\n      <li><span class=\"chip good\">ORO</span> <strong>Oro ~$4.06       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Eine ruhige Woche war das nicht. Drei Mal CVSS 10,0, ein Supply-Chain-Angriff direkt in Red Hats npm-Namespace und ein BSI, das zum Telefonhörer greift, statt nur ein PDF hochzuladen — die Sicherheits-Saison läuft heiß. Daneben, fast schon erholsam: ordentliche Releases. Spring Boot 4.1, PostgreSQL 19 Beta, Angular 22, Linux 7.1. Und im Hintergrund tickt die CRA-Uhr Richtung September.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>PTC Windchill (CVE-2026-12569)</strong>: CVSS 9,8, unauth RCE per Deserialisierung. BSI ruft Admins nachts an, Polizei besucht Firmen physisch. Patch seit 15.06.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Red Hat npm-Supply-Chain</strong>: 32 manipulierte Releases im <code>@redhat-cloud-services</code>-Namespace, ~80.000 Downloads/Woche. Kompromittierter Mitarbeiter-Account.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi OS</strong>: drei CVEs à CVSS 10,0 (laut CNA), in CISA KEV seit 23.06, aktive Mirai/Gaafgyt-Kampagne. Fix: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Browser</span> <strong>Chrome V8 0-Day (CVE-2026-11645)</strong>: CVSS 8,8, in aktiver Ausnutzung, fünfter Chrome-0-Day 2026. Auf 149.0.7827.103 aktualisieren.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Spring Boot 4.1.0</strong>: gRPC-Autokonfiguration, SSRF-Abwehr im HTTP-Client, Kotlin 2.3. Plus 4.0.7-Wartungspatch.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">DB</span> <strong>PostgreSQL 19 Beta 1</strong>: paralleles Autovacuum, <code>ON CONFLICT DO SELECT</code>, SQL/PGQ-Graph-Queries, 2× FK-Performance.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22</strong>: Signal Forms stabil, OnPush per Default, braucht TypeScript v6.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Infra</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs, 3 Zero-Days. Darunter „HTTP/2 Bomb\" — trifft auch NGINX, Apache, Envoy.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Infra</span> <strong>Linux 7.1</strong>: neuer NTFS-Treiber mit Schreibsupport, Intel FRED per Default, 140.000 Zeilen entfernt. 7.2-Merge-Window schließt heute.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU CRA Kapitel IV in Kraft</strong> — und 66 % der Entwickler weltweit kennen die CRA kaum. Die 24h/72h-Meldepflicht startet im September.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Eine ruhige Woche war das nicht. Drei Mal CVSS 10,0, ein Supply-Chain-Angriff direkt in Red Hats npm-Namespace und ein BSI, das zum Telefonhörer greift, statt nur ein PDF hochzuladen — die Sicherheits-Saison läuft heiß. Daneben, fast schon erholsam: ordentliche Releases. Spring Boot 4.1, PostgreSQL 19 Beta, Angular 22, Linux 7.1. Und im Hintergrund tickt die CRA-Uhr Richtung September.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>PTC Windchill (CVE-2026-12569)</strong>: CVSS 9,8, unauth RCE per Deserialisierung. BSI ruft Admins nachts an, Polizei besucht Firmen physisch. Patch seit 15.06.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Red Hat npm-Supply-Chain</strong>: 32 manipulierte Releases im <code>@redhat-cloud-services</code>-Namespace, ~80.000 Downloads/Woche. Kompromittierter Mitarbeiter-Account.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi OS</strong>: drei CVEs à CVSS 10,0 (laut CNA), in CISA KEV seit 23.06, aktive Mirai/Gaafgyt-Kampagne. Fix: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Browser</span> <strong>Chrome V8 0-Day (CVE-2026-11645)</strong>: CVSS 8,8, in aktiver Ausnutzung, fünfter Chrome-0-Day 2026. Auf 149.0.7827.103 aktualisieren.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Spring Boot 4.1.0</strong>: gRPC-Autokonfiguration, SSRF-Abwehr im HTTP-Client, Kotlin 2.3. Plus 4.0.7-Wartungspatch.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">DB</span> <strong>PostgreSQL 19 Beta 1</strong>: paralleles Autovacuum, <code>ON CONFLICT DO SELECT</code>, SQL/PGQ-Graph-Queries, 2× FK-Performance.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22</strong>: Signal Forms stabil, OnPush per Default, braucht TypeScript v6.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Infra</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs, 3 Zero-Days. Darunter „HTTP/2 Bomb\" — trifft auch NGINX, Apache, Envoy.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Infra</span> <strong>Linux 7.1</strong>: neuer NTFS-Treiber mit Schreibsupport, Intel FRED per Default, 140.000 Zeilen entfernt. 7.2-Merge-Window schließt heute.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU CRA Kapitel IV in Kraft</strong> — und 66 % der Entwickler weltweit kennen die CRA kaum. Die 24h/72h-Meldepflicht startet im September.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It was not a quiet week. Three CVSS 10.0 vulnerabilities, a supply-chain attack hitting Red Hat's npm namespace directly, and a German cyber agency picking up the phone instead of just posting a PDF — security season is running hot. On the brighter side, we got solid releases: Spring Boot 4.1, PostgreSQL 19 Beta, Angular 22, Linux 7.1. And in the background, the CRA countdown ticks toward September.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>PTC Windchill (CVE-2026-12569)</strong>: CVSS 9.8, unauthenticated RCE via deserialization. BSI calls admins at night; police visit companies in person. Patch available since 06/15.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Red Hat npm Supply-Chain</strong>: 32 tampered releases in the <code>@redhat-cloud-services</code> namespace, ~80,000 downloads/week. Compromised employee account.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi OS</strong>: three CVEs at CVSS 10.0 (per CNA), in CISA KEV since 06/23, active Mirai/Gaafgyt campaign. Fix: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Browser</span> <strong>Chrome V8 0-Day (CVE-2026-11645)</strong>: CVSS 8.8, actively exploited, fifth Chrome 0-day in 2026. Update to 149.0.7827.103.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Spring Boot 4.1.0</strong>: gRPC autoconfig, SSRF protection in HTTP client, Kotlin 2.3. Plus 4.0.7 maintenance patch.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">DB</span> <strong>PostgreSQL 19 Beta 1</strong>: parallel autovacuum, <code>ON CONFLICT DO SELECT</code>, SQL/PGQ graph queries, 2x FK performance.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22</strong>: Signal Forms stable, OnPush by default, requires TypeScript v6.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Infra</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs, 3 zero-days. Including \"HTTP/2 Bomb\" — impacts NGINX, Apache, Envoy too.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Infra</span> <strong>Linux 7.1</strong>: new NTFS driver with write support, Intel FRED enabled by default, 140,000 lines removed. 7.2 merge window closes today.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>EU CRA Chapter IV in effect</strong> — and 66% of developers worldwide barely know the CRA. The 24h/72h reporting obligation starts in September.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Não foi uma semana tranquila. Três vulnerabilidades com CVSS 10,0, um ataque à cadeia de suprimentos que atingiu direto o namespace npm da Red Hat e uma agência de segurança alemã pegando no telefone em vez de apenas publicar um PDF — a temporada de segurança está quente. No lado positivo, tivemos lançamentos sólidos: Spring Boot 4.1, PostgreSQL 19 Beta, Angular 22, Linux 7.1. E ao fundo, a contagem regressiva do CRA avança rumo a setembro.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">DE</span> <strong>PTC Windchill (CVE-2026-12569)</strong>: CVSS 9,8, RCE não autenticada por desserialização. A agência liga para admins à noite; polícia visita empresas pessoalmente. Patch disponível desde 15/06.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">OSS</span> <strong>Red Hat npm Cadeia de Suprimentos</strong>: 32 lançamentos adulterados no namespace <code>@redhat-cloud-services</code>, ~80.000 downloads/semana. Conta de funcionário comprometida.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi OS</strong>: três CVEs com CVSS 10,0 (segundo CNA), no catálogo KEV desde 23/06, campanha ativa Mirai/Gaafgyt. Solução: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Navegador</span> <strong>Chrome V8 0-Day (CVE-2026-11645)</strong>: CVSS 8,8, explorada ativamente, quinto 0-day do Chrome em 2026. Atualize para 149.0.7827.103.</li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>Spring Boot 4.1.0</strong>: autoconfiguração gRPC, proteção SSRF no cliente HTTP, Kotlin 2.3. Mais patch de manutenção 4.0.7.</li>\n      <li><span class=\"chip good\">Lançamento</span> <span class=\"chip\">BD</span> <strong>PostgreSQL 19 Beta 1</strong>: autovacuum paralelo, <code>ON CONFLICT DO SELECT</code>, consultas de grafo SQL/PGQ, 2x desempenho FK.</li>\n      <li><span class=\"chip good\">Lançamento</span> <span class=\"chip\">Web</span> <strong>Angular 22</strong>: Signal Forms estável, OnPush por padrão, requer TypeScript v6.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Infra</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs, 3 zero-days. Incluindo \"HTTP/2 Bomb\" — impacta NGINX, Apache, Envoy também.</li>\n      <li><span class=\"chip\">Lançamento</span> <span class=\"chip\">Infra</span> <strong>Linux 7.1</strong>: novo driver NTFS com suporte a escrita, Intel FRED habilitado por padrão, 140.000 linhas removidas. Janela de merge 7.2 fecha hoje.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">UE</span> <strong>Capítulo IV do CRA da UE em vigor</strong> — e 66% dos desenvolvedores mundiais mal conhecem o CRA. A obrigação de comunicação de 24h/72h começa em setembro.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">No fue una semana tranquila. Tres vulnerabilidades con CVSS 10,0, un ataque a la cadena de suministro que golpeó directamente al namespace npm de Red Hat, y una agencia de seguridad alemana levantando el teléfono en lugar de solo publicar un PDF — la temporada de seguridad está caliente. Por el lado positivo, tuvimos lanzamientos sólidos: Spring Boot 4.1, PostgreSQL 19 Beta, Angular 22, Linux 7.1. Y en el fondo, la cuenta regresiva del CRA avanza hacia septiembre.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">DE</span> <strong>PTC Windchill (CVE-2026-12569)</strong>: CVSS 9,8, RCE no autenticado por deserialización. La agencia llama a admins por la noche; la policía visita empresas en persona. Parche disponible desde 15/06.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">OSS</span> <strong>Red Hat Cadena de Suministro npm</strong>: 32 lanzamientos manipulados en el namespace <code>@redhat-cloud-services</code>, ~80.000 descargas/semana. Cuenta de empleado comprometida.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Infra</span> <strong>Ubiquiti UniFi OS</strong>: tres CVEs con CVSS 10,0 (según CNA), en el catálogo KEV desde 23/06, campaña activa Mirai/Gaafgyt. Solución: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Navegador</span> <strong>Chrome V8 0-Day (CVE-2026-11645)</strong>: CVSS 8,8, explotado activamente, quinto 0-day de Chrome en 2026. Actualiza a 149.0.7827.103.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>Spring Boot 4.1.0</strong>: autoconfiguración gRPC, protección SSRF en cliente HTTP, Kotlin 2.3. Más parche de mantenimiento 4.0.7.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <span class=\"chip\">BD</span> <strong>PostgreSQL 19 Beta 1</strong>: autovacuum paralelo, <code>ON CONFLICT DO SELECT</code>, consultas de gráficos SQL/PGQ, 2x rendimiento FK.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <span class=\"chip\">Web</span> <strong>Angular 22</strong>: Signal Forms estable, OnPush por defecto, requiere TypeScript v6.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Infra</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs, 3 0-days. Incluyendo \"HTTP/2 Bomb\" — impacta también NGINX, Apache, Envoy.</li>\n      <li><span class=\"chip\">Lanzamiento</span> <span class=\"chip\">Infra</span> <strong>Linux 7.1</strong>: nuevo controlador NTFS con soporte de escritura, Intel FRED habilitado por defecto, 140.000 líneas eliminadas. Ventana de fusión 7.2 cierra hoy.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>Capítulo IV del CRA de la UE en vigor</strong> — y el 66% de desarrolladores mundiales apenas conocen el CRA. La obligación de reporte de 24h/72h comienza en septiembre.</li>\n    </ul></div>"
