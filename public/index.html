        "en": "<div class=\"tldr\"><p class=\"lead\">Today's board is unusually deep and unusually long-term: three twiceD-core hits share the top fit score of 88, and a striking share of the Frankfurt-heavy Java/Angular projects run 45 to 60 months. That stands in contrast to the cooler overall market — the Freelancer-Kompass 2026 reports the first average decline in years. For Daniel's band (Java/Spring + Angular, €100/h+), that means demand in the upper senior segment holds steady while the market average slips.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Triple tie at fit 88</strong>: iSAX (Java/Angular/AWS, Frankfurt, 48 months), BridgingIT (Spring Boot/K8s/Kafka, 100% remote) and RED SAP Solutions (fullstack Java/Spring/PostgreSQL, Berlin, 24 months) — all three squarely twiceD's bread and butter.</li>\n      <li><span class=\"chip\">Remote</span> <strong>High remote density</strong>: the majority of the top 15 are 80–100% remote with bundleable onsite days — well plannable from the BR time zone.</li>\n      <li><span class=\"chip\">DE</span> <strong>Frankfurt cluster</strong>: iSAX, BridgingIT, a2a, 1st Solution, Brownian Motion, Randstad Digital — Rhein-Main remains the densest Java market.</li>\n      <li><span class=\"chip good\">Long-Term</span> <strong>Long durations</strong>: several contracts run 45–60 months (STINGEL 60M, iSAX 48M, Brownian Motion 48M, Kinteo 47M, 1st Solution 46M) — utilization security that's rare in today's market.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Automotive niche active</strong>: EnCo (autonomous driving, safety engineering + AI, up to €135/h) and HENNING (Ingolstadt/Audi environment) — a premium band matching Daniel's OEM track record.</li>\n      <li><span class=\"chip\">IoT</span> <strong>IoT hits</strong>: VARIUS Smart Energy, Amoria Bond industrial IoT, Randstad MQTT/Agentic — IoT-adjacent, upper rate band.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Agentic coding in demand</strong>: Randstad Digital explicitly lists agentic coding/Kiro as a requirement; ELCA and AXA (both Zurich) are building agentic AI platforms with Claude-Code-class tools.</li>\n      <li><span class=\"chip\">Employee</span> <strong>CH employee, selectively</strong>: ELCA Zurich (Java + agentic AI, fit 81) and AXA Zurich (Python + agentic AI, 80) meet the Track-1 criteria — both hybrid, CH base required.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong>: Principal Forward Deployed Engineer, AI-Native Software Development (EU-remote incl. Munich/Berlin) — fit 82, mission over 1:1 stack match.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>One matching tender</strong>: NRW police IT \"iBMS 3.0\" (application transformation, 48 months) — stack fits, but ⚠️ partner needed (€3M revenue, ISO 27001/9001, reference). Deadline 07/14.</li>\n      <li><span class=\"chip\">Market</span> <strong>Market cooling</strong>: Freelancer-Kompass 2026 — avg. €103/h (down from €104), 43% without secured utilization, 23% with declining orders. Daniel's band sits above that.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O board de hoje é incomumente profundo e incomumente de longo prazo: três acertos twiceD-core dividem o fit-score máximo de 88, e uma parcela chamativa dos projetos Java/Angular concentrados em Frankfurt roda de 45 a 60 meses. Isso contrasta com o mercado geral mais frio — o Freelancer-Kompass 2026 registra a primeira queda média em anos. Para a faixa do Daniel (Java/Spring + Angular, €100/h+), isso significa que a demanda no segmento sênior mais alto se mantém, enquanto a média do mercado recua.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Empate triplo no fit 88</strong>: iSAX (Java/Angular/AWS, Frankfurt, 48 meses), BridgingIT (Spring Boot/K8s/Kafka, 100% remoto) e RED SAP Solutions (fullstack Java/Spring/PostgreSQL, Berlim, 24 meses) — as três são o pão com manteiga da twiceD.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Alta densidade de remoto</strong>: a maioria das top 15 é 80–100% remota com dias presenciais agrupáveis — bem planejável a partir do fuso horário BR.</li>\n      <li><span class=\"chip\">DE</span> <strong>Cluster de Frankfurt</strong>: iSAX, BridgingIT, a2a, 1st Solution, Brownian Motion, Randstad Digital — Rhein-Main continua sendo o mercado Java mais denso.</li>\n      <li><span class=\"chip good\">Long-Term</span> <strong>Longas durações</strong>: vários contratos de 45–60 meses (STINGEL 60M, iSAX 48M, Brownian Motion 48M, Kinteo 47M, 1st Solution 46M) — segurança de ocupação, algo raro no mercado atual.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Nicho automotivo ativo</strong>: EnCo (direção autônoma, safety engineering + IA, até €135/h) e HENNING (ambiente Ingolstadt/Audi) — faixa premium alinhada com as referências OEM do Daniel.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Acertos em IoT</strong>: VARIUS Smart Energy, Amoria Bond IoT industrial, Randstad MQTT/Agentic — adjacente a IoT, faixa de taxa superior.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Agentic coding em alta</strong>: a Randstad Digital cita explicitamente agentic coding/Kiro como requisito; ELCA e AXA (ambas em Zurique) estão construindo plataformas de IA agêntica com ferramentas da classe Claude Code.</li>\n      <li><span class=\"chip\">Employee</span> <strong>CLT na Suíça, seletivo</strong>: ELCA Zurique (Java + IA agêntica, fit 81) e AXA Zurique (Python + IA agêntica, 80) atendem aos critérios do Track 1 — ambas híbridas, exigindo base na Suíça.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong>: Principal Forward Deployed Engineer, AI-Native Software Development (remoto na UE, incl. Munique/Berlim) — fit 82, missão acima do match 1:1 de stack.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Um edital compatível</strong>: TI da polícia de NRW \"iBMS 3.0\" (transformação de aplicação, 48 meses) — stack combina, mas ⚠️ é necessário parceiro (faturamento de €3 milhões, ISO 27001/9001, referência). Prazo 14/07.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Mercado esfria</strong>: Freelancer-Kompass 2026 — média de €103/h (antes €104), 43% sem ocupação garantida, 23% com pedidos em queda. A faixa do Daniel está acima disso.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El board de hoy es inusualmente profundo e inusualmente de largo plazo: tres coincidencias twiceD-core comparten el fit-score más alto, 88, y una parte notable de los proyectos Java/Angular concentrados en Fráncfort corre entre 45 y 60 meses. Eso contrasta con el mercado general, más frío — el Freelancer-Kompass 2026 reporta la primera caída promedio en años. Para la franja de Daniel (Java/Spring + Angular, 100 €/h+), eso significa que la demanda en el segmento sénior más alto se mantiene mientras el promedio del mercado cede.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Triple empate en fit 88</strong>: iSAX (Java/Angular/AWS, Fráncfort, 48 meses), BridgingIT (Spring Boot/K8s/Kafka, 100% remoto) y RED SAP Solutions (fullstack Java/Spring/PostgreSQL, Berlín, 24 meses) — las tres son el pan de cada día de twiceD.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Alta densidad remota</strong>: la mayoría del top 15 es 80–100% remoto con días presenciales agrupables — bien planeable desde el huso horario de Brasil.</li>\n      <li><span class=\"chip\">DE</span> <strong>Clúster de Fráncfort</strong>: iSAX, BridgingIT, a2a, 1st Solution, Brownian Motion, Randstad Digital — Rhein-Main sigue siendo el mercado Java más denso.</li>\n      <li><span class=\"chip good\">Long-Term</span> <strong>Duraciones largas</strong>: varios contratos de 45–60 meses (STINGEL 60M, iSAX 48M, Brownian Motion 48M, Kinteo 47M, 1st Solution 46M) — seguridad de ocupación, algo poco común en el mercado actual.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Nicho automotriz activo</strong>: EnCo (conducción autónoma, safety engineering + IA, hasta 135 €/h) y HENNING (entorno Ingolstadt/Audi) — franja premium que coincide con las referencias OEM de Daniel.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Coincidencias en IoT</strong>: VARIUS Smart Energy, Amoria Bond IoT industrial, Randstad MQTT/Agentic — adyacente a IoT, franja de tarifa alta.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Agentic coding en demanda</strong>: Randstad Digital menciona explícitamente agentic coding/Kiro como requisito; ELCA y AXA (ambas en Zúrich) están construyendo plataformas de IA agéntica con herramientas de la clase Claude Code.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Empleo en Suiza, selectivo</strong>: ELCA Zúrich (Java + IA agéntica, fit 81) y AXA Zúrich (Python + IA agéntica, 80) cumplen los criterios del Track 1 — ambas híbridas, requieren base en Suiza.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong>: Principal Forward Deployed Engineer, AI-Native Software Development (remoto UE, incl. Múnich/Berlín) — fit 82, la misión pesa más que el match 1:1 de stack.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Una licitación compatible</strong>: TI de la policía de NRW \"iBMS 3.0\" (transformación de aplicación, 48 meses) — el stack encaja, pero ⚠️ se necesita socio (3 millones de € en facturación, ISO 27001/9001, referencia). Plazo 14/07.</li>\n      <li><span class=\"chip\">Markt</span> <strong>El mercado se enfría</strong>: Freelancer-Kompass 2026 — promedio de 103 €/h (antes 104), 43% sin ocupación garantizada, 23% con pedidos a la baja. La franja de Daniel está por encima de eso.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein bitterer Fußball-Sommer aus deutscher und brasilianischer Sicht: Deutschland ist schon in der WM-Runde der 32 (Sechzehntelfinale) an Paraguay gescheitert, Bundestrainer Nagelsmann hat hingeschmissen, und mit Jürgen Klopp wird der prominenteste denkbare Nachfolger gehandelt — noch ohne Unterschrift. Brasilien flog gestern gegen Norwegen raus, wohl Neymars letztes WM-Spiel. Bei Freiburg dreht sich derweil das Transfer-Karussell, beide Ligen pausieren.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus</strong>: Deutschland scheitert in der Runde der 32 (Sechzehntelfinale) an Paraguay, 1:1, Niederlage im Elfmeterschießen (29.06.).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann tritt zurück</strong>: Bundestrainer verlässt den DFB am Freitag (03.07.), Vertrag sofort aufgelöst.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp im Gespräch</strong>: erklärt sich „bereit\", steht aber noch bei Red Bull bis 2029 unter Vertrag — nichts unterschrieben.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção raus</strong>: Brasilien verliert im WM-Achtelfinale (Runde der 16) 1:2 gegen Norwegen (Haaland-Doppelpack), Neymars mutmaßlicher WM-Abschied.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto kommt</strong>: SC verpflichtet Japan-Stürmer Keisuke Goto (21) von RSC Anderlecht.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Abgänge</strong>: Wagner (Dynamo Dresden) und Weißhaupt (Darmstadt) weg, Huth und Jung verlängert.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart</strong>: 2026/27 eröffnet Bayern–Stuttgart am 28.08., 20:30 MESZ / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão-Restart</strong>: CBF zieht die Wiederaufnahme auf den 16.07. vor (Tabelle nach 18. Spieltag: Palmeiras führt).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein bitterer Fußball-Sommer aus deutscher und brasilianischer Sicht: Deutschland ist schon in der WM-Runde der 32 (Sechzehntelfinale) an Paraguay gescheitert, Bundestrainer Nagelsmann hat hingeschmissen, und mit Jürgen Klopp wird der prominenteste denkbare Nachfolger gehandelt — noch ohne Unterschrift. Brasilien flog gestern gegen Norwegen raus, wohl Neymars letztes WM-Spiel. Bei Freiburg dreht sich derweil das Transfer-Karussell, beide Ligen pausieren.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus</strong>: Deutschland scheitert in der Runde der 32 (Sechzehntelfinale) an Paraguay, 1:1, Niederlage im Elfmeterschießen (29.06.).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann tritt zurück</strong>: Bundestrainer verlässt den DFB am Freitag (03.07.), Vertrag sofort aufgelöst.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp im Gespräch</strong>: erklärt sich „bereit\", steht aber noch bei Red Bull bis 2029 unter Vertrag — nichts unterschrieben.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção raus</strong>: Brasilien verliert im WM-Achtelfinale (Runde der 16) 1:2 gegen Norwegen (Haaland-Doppelpack), Neymars mutmaßlicher WM-Abschied.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto kommt</strong>: SC verpflichtet Japan-Stürmer Keisuke Goto (21) von RSC Anderlecht.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Abgänge</strong>: Wagner (Dynamo Dresden) und Weißhaupt (Darmstadt) weg, Huth und Jung verlängert.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart</strong>: 2026/27 eröffnet Bayern–Stuttgart am 28.08., 20:30 MESZ / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão-Restart</strong>: CBF zieht die Wiederaufnahme auf den 16.07. vor (Tabelle nach 18. Spieltag: Palmeiras führt).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A bitter football summer from both a German and a Brazilian perspective: Germany was already eliminated from the World Cup in the Round of 32 by Paraguay, head coach Nagelsmann has walked away, and Jürgen Klopp is being floated as the most prominent conceivable successor — still without a signature. Brazil crashed out yesterday against Norway, likely Neymar's last World Cup match. Meanwhile, the transfer carousel is spinning at Freiburg, and both leagues remain on their summer break.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>World Cup exit</strong>: Germany falls in the Round of 32 to Paraguay, 1-1, loses on penalties (06/29).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann resigns</strong>: head coach leaves the DFB on Friday (07/03), contract terminated immediately.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp in talks</strong>: says he's \"ready,\" but is still under contract with Red Bull through 2029 — nothing signed.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção out</strong>: Brazil loses in the World Cup Round of 16 1-2 to Norway (Haaland brace), likely Neymar's World Cup farewell.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto arrives</strong>: SC signs Japanese striker Keisuke Goto (21) from RSC Anderlecht.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Departures</strong>: Wagner (Dynamo Dresden) and Weißhaupt (Darmstadt) leave, Huth and Jung extend.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season kickoff</strong>: 2026/27 opens with Bayern-Stuttgart on 08/28, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão restart</strong>: CBF moves the resumption up to 07/16 (standings after matchday 18: Palmeiras leads).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um verão amargo de futebol tanto para a Alemanha quanto para o Brasil: a Alemanha já caiu na Copa do Mundo na rodada dos 32 diante do Paraguai, o técnico Nagelsmann jogou a toalha, e o nome mais cotado como sucessor é Jürgen Klopp — ainda sem assinatura. O Brasil caiu ontem diante da Noruega, provavelmente o último jogo de Neymar em Copas do Mundo. Enquanto isso, o carrossel de transferências gira no Freiburg, e as duas ligas seguem em pausa.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminação na Copa</strong>: a Alemanha cai na rodada dos 32 diante do Paraguai, 1 a 1, derrota nos pênaltis (29/06).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann renuncia</strong>: técnico deixa a DFB na sexta-feira (03/07), contrato rescindido de imediato.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp cotado</strong>: diz estar \"pronto\", mas ainda tem contrato com a Red Bull até 2029 — nada assinado.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção fora</strong>: o Brasil perde nas oitavas de final da Copa por 1 a 2 para a Noruega (dobradinha de Haaland), possível despedida de Neymar em Copas.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto chega</strong>: SC contrata o atacante japonês Keisuke Goto (21) do RSC Anderlecht.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Saídas</strong>: Wagner (Dynamo Dresden) e Weißhaupt (Darmstadt) saem, Huth e Jung renovam.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Início da temporada</strong>: 2026/27 abre com Bayern-Stuttgart em 28/08, 20h30 CEST / 15h30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Retorno do Brasileirão</strong>: CBF antecipa a retomada para 16/07 (tabela após a 18ª rodada: Palmeiras na liderança).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un verano futbolero amargo tanto para Alemania como para Brasil: Alemania ya quedó eliminada del Mundial en la ronda de 32 (dieciseisavos de final) ante Paraguay, el técnico Nagelsmann renunció, y Jürgen Klopp suena como el sucesor más notorio imaginable — todavía sin firma. Brasil quedó fuera ayer ante Noruega, en lo que probablemente fue el último partido mundialista de Neymar. Mientras tanto, el carrusel de fichajes gira en el Freiburg, y ambas ligas siguen de descanso.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminación mundialista</strong>: Alemania cae en la ronda de 32 (dieciseisavos de final) ante Paraguay, 1-1, derrota en penales (29/06).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann renuncia</strong>: el técnico deja la DFB el viernes (03/07), contrato rescindido de inmediato.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp suena</strong>: dice estar \"listo\", pero todavía tiene contrato con Red Bull hasta 2029 — nada firmado.</li>\n      <li><span class=\"chip\">BRA</span> <strong>La Seleção queda fuera</strong>: Brasil pierde en octavos de final del Mundial 1-2 ante Noruega (doblete de Haaland), probable despedida mundialista de Neymar.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Llega Goto</strong>: el SC ficha al delantero japonés Keisuke Goto (21) del RSC Anderlecht.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Salidas</strong>: Wagner (Dynamo Dresden) y Weißhaupt (Darmstadt) se van, Huth y Jung renuevan.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Arranque de temporada</strong>: la 2026/27 abre con Bayern-Stuttgart el 28/08, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Reinicio del Brasileirão</strong>: la CBF adelanta la reanudación al 16/07 (tabla tras la jornada 18: Palmeiras lidera).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Silverstone hat gestern das Titelrennen aufgemischt: <strong>Charles Leclerc</strong> holte seinen ersten Saisonsieg und seinen ersten Sieg überhaupt in Silverstone — vor George Russell und Lewis Hamilton. Ausgerechnet WM-Leader <strong>Kimi Antonelli</strong> erwischte es: Von der Pole gestartet, kostete ihn ein Radschild-Defekt in Runde 41 alles, am Ende stand P16. Das Rennen endete hinter dem Safety Car, nachdem Max Verstappen in Runde 48 ins Kies rutschte. Antonelli führt die WM zwar weiter an, aber der Vorsprung ist von 43 auf <strong>25 Punkte</strong> geschmolzen. Und die nächste Woche wird dicht: MotoGP am Sachsenring und die WEC in Interlagos fallen aufs selbe Wochenende (10.–12.07.), dann folgt Spa.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc gewinnt in Silverstone</strong> (05.07., Runde 9) — sein 9. Karrieresieg, 1. der Saison 2026, 1. in Silverstone. Vor Russell (Mercedes) und Hamilton (Ferrari).</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Antonelli-Drama</strong>: Von der Pole und als WM-Leader gestartet, Radschild-Defekt vorne links in Runde 41 — nach mehreren Stopps und einer 5-Sekunden-Strafe nur P16.</li>\n      <li><span class=\"chip\">F1</span> <strong>Verstappen-Aus</strong>: Runde 48 Dreher ins Kies in Stowe, das Rennen endete hinter dem Safety Car (52 Runden).</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt noch — knapper</strong>: 179 Pkt, nur noch 25 vor Russell (154). Leclerc springt durch den Sieg auf P4 (108).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes vorn</strong>: 333 zu 255 auf Ferrari bei den Konstrukteuren (+78). Nächste Runde: GP Belgien in Spa, 17.–19.07.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Offenes Titelrennen</strong>: Jorge Martin (Aprilia) führt mit 193 Pkt, nur 7 vor Bezzecchi. Márquez ist Fünfter, 40 Punkte zurück — nichts entschieden.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Heimspiel in acht Tagen</strong>: 6h von São Paulo (Interlagos), So 12.07., Start 11:30 BRT / 16:30 MESZ — Runde 5. Zeitgleich MotoGP am Sachsenring.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Silverstone hat gestern das Titelrennen aufgemischt: <strong>Charles Leclerc</strong> holte seinen ersten Saisonsieg und seinen ersten Sieg überhaupt in Silverstone — vor George Russell und Lewis Hamilton. Ausgerechnet WM-Leader <strong>Kimi Antonelli</strong> erwischte es: Von der Pole gestartet, kostete ihn ein Radschild-Defekt in Runde 41 alles, am Ende stand P16. Das Rennen endete hinter dem Safety Car, nachdem Max Verstappen in Runde 48 ins Kies rutschte. Antonelli führt die WM zwar weiter an, aber der Vorsprung ist von 43 auf <strong>25 Punkte</strong> geschmolzen. Und die nächste Woche wird dicht: MotoGP am Sachsenring und die WEC in Interlagos fallen aufs selbe Wochenende (10.–12.07.), dann folgt Spa.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc gewinnt in Silverstone</strong> (05.07., Runde 9) — sein 9. Karrieresieg, 1. der Saison 2026, 1. in Silverstone. Vor Russell (Mercedes) und Hamilton (Ferrari).</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Antonelli-Drama</strong>: Von der Pole und als WM-Leader gestartet, Radschild-Defekt vorne links in Runde 41 — nach mehreren Stopps und einer 5-Sekunden-Strafe nur P16.</li>\n      <li><span class=\"chip\">F1</span> <strong>Verstappen-Aus</strong>: Runde 48 Dreher ins Kies in Stowe, das Rennen endete hinter dem Safety Car (52 Runden).</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt noch — knapper</strong>: 179 Pkt, nur noch 25 vor Russell (154). Leclerc springt durch den Sieg auf P4 (108).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes vorn</strong>: 333 zu 255 auf Ferrari bei den Konstrukteuren (+78). Nächste Runde: GP Belgien in Spa, 17.–19.07.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Offenes Titelrennen</strong>: Jorge Martin (Aprilia) führt mit 193 Pkt, nur 7 vor Bezzecchi. Márquez ist Fünfter, 40 Punkte zurück — nichts entschieden.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Heimspiel in acht Tagen</strong>: 6h von São Paulo (Interlagos), So 12.07., Start 11:30 BRT / 16:30 MESZ — Runde 5. Zeitgleich MotoGP am Sachsenring.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Silverstone shook up the title race yesterday: <strong>Charles Leclerc</strong> took his first win of the season and his first-ever win at Silverstone — ahead of George Russell and Lewis Hamilton. Of all people, championship leader <strong>Kimi Antonelli</strong> got caught out: starting from pole, a wheel shield failure in lap 41 cost him everything, and he ended up P16. The race finished behind the safety car after Max Verstappen slid into the gravel in lap 48. Antonelli still leads the championship, but his margin has shrunk from 43 to <strong>25 points</strong>. And next week gets crowded: MotoGP at the Sachsenring and the WEC in Interlagos fall on the same weekend (July 10–12), followed by Spa.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc wins at Silverstone</strong> (Jul 5, round 9) — his 9th career win, his 1st of the 2026 season, his 1st at Silverstone. Ahead of Russell (Mercedes) and Hamilton (Ferrari).</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Antonelli drama</strong>: started from pole as championship leader, front-left wheel shield failure in lap 41 — after several stops and a 5-second penalty, only P16.</li>\n      <li><span class=\"chip\">F1</span> <strong>Verstappen out</strong>: spun into the gravel at Stowe in lap 48, the race finished behind the safety car (52 laps).</li>\n      <li><span class=\"chip\">F1 standings</span> <strong>Antonelli still leads — by less</strong>: 179 pts, now only 25 ahead of Russell (154). Leclerc jumps to P4 (108) with the win.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes out front</strong>: 333 to 255 over Ferrari in the constructors' standings (+78). Next round: Belgian GP at Spa, July 17–19.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Wide-open title race</strong>: Jorge Martin (Aprilia) leads with 193 pts, only 7 ahead of Bezzecchi. Márquez is fifth, 40 points back — nothing settled.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Home race in eight days</strong>: 6 Hours of São Paulo (Interlagos), Sun Jul 12, start 11:30 BRT / 16:30 CEST — round 5. Same weekend as MotoGP at the Sachsenring.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Silverstone agitou a corrida pelo título ontem: <strong>Charles Leclerc</strong> conquistou sua primeira vitória da temporada e sua primeira vitória em Silverstone — à frente de George Russell e Lewis Hamilton. Justo o líder do campeonato, <strong>Kimi Antonelli</strong>, foi pego de surpresa: largando da pole, uma falha no escudo da roda na volta 41 custou tudo, terminando em P16. A corrida terminou atrás do safety car, depois que Max Verstappen deslizou para o cascalho na volta 48. Antonelli ainda lidera o campeonato, mas a vantagem caiu de 43 para <strong>25 pontos</strong>. E a próxima semana promete ser concorrida: MotoGP em Sachsenring e o WEC em Interlagos caem no mesmo fim de semana (10 a 12/07), seguidos por Spa.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc vence em Silverstone</strong> (05/07, corrida 9) — sua 9ª vitória na carreira, a 1ª da temporada 2026, a 1ª em Silverstone. À frente de Russell (Mercedes) e Hamilton (Ferrari).</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Drama de Antonelli</strong>: largou da pole como líder do campeonato, falha no escudo da roda dianteira esquerda na volta 41 — depois de várias paradas e uma penalidade de 5 segundos, ficou apenas em P16.</li>\n      <li><span class=\"chip\">F1</span> <strong>Abandono de Verstappen</strong>: rodou para o cascalho em Stowe na volta 48, a corrida terminou atrás do safety car (52 voltas).</li>\n      <li><span class=\"chip\">Mundial F1</span> <strong>Antonelli ainda lidera — com margem menor</strong>: 179 pts, agora só 25 à frente de Russell (154). Leclerc salta para P4 (108) com a vitória.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes na frente</strong>: 333 a 255 sobre a Ferrari entre as construtoras (+78). Próxima etapa: GP da Bélgica em Spa, 17 a 19/07.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Disputa pelo título em aberto</strong>: Jorge Martin (Aprilia) lidera com 193 pts, apenas 7 à frente de Bezzecchi. Márquez está em quinto, 40 pontos atrás — nada decidido.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Jogo em casa em oito dias</strong>: 6 Horas de São Paulo (Interlagos), dom 12/07, largada às 11h30 BRT / 16h30 CEST — corrida 5. No mesmo fim de semana da MotoGP em Sachsenring.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Silverstone sacudió ayer la carrera por el título: <strong>Charles Leclerc</strong> logró su primera victoria de la temporada y su primera victoria en Silverstone — por delante de George Russell y Lewis Hamilton. Justo el líder del campeonato, <strong>Kimi Antonelli</strong>, fue el que salió perjudicado: partiendo desde la pole, una falla en el escudo de la rueda en la vuelta 41 le costó todo, terminando en el puesto 16. La carrera terminó detrás del auto de seguridad, después de que Max Verstappen se saliera hacia la grava en la vuelta 48. Antonelli sigue liderando el campeonato, pero su ventaja se redujo de 43 a <strong>25 puntos</strong>. Y la próxima semana se pondrá intensa: el MotoGP en Sachsenring y el WEC en Interlagos caen el mismo fin de semana (10 al 12/07), seguidos por Spa.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc gana en Silverstone</strong> (05/07, carrera 9) — su 9ª victoria en la carrera, la 1ª de la temporada 2026, la 1ª en Silverstone. Por delante de Russell (Mercedes) y Hamilton (Ferrari).</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Drama de Antonelli</strong>: partió desde la pole como líder del campeonato, falla en el escudo de la rueda delantera izquierda en la vuelta 41 — tras varias paradas y una penalización de 5 segundos, terminó apenas en el puesto 16.</li>\n      <li><span class=\"chip\">F1</span> <strong>Abandono de Verstappen</strong>: giró hacia la grava en la curva Stowe en la vuelta 48, la carrera terminó detrás del auto de seguridad (52 vueltas).</li>\n      <li><span class=\"chip\">Mundial F1</span> <strong>Antonelli sigue al frente — con menor margen</strong>: 179 pts, ahora solo 25 por delante de Russell (154). Leclerc sube al puesto 4 (108) con la victoria.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes al frente</strong>: 333 a 255 sobre Ferrari en constructores (+78). Próxima fecha: GP de Bélgica en Spa, 17 al 19/07.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Título abierto</strong>: Jorge Martin (Aprilia) lidera con 193 pts, solo 7 por delante de Bezzecchi. Márquez es quinto, a 40 puntos — nada está decidido.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Carrera de casa en ocho días</strong>: 6 Horas de São Paulo (Interlagos), dom 12/07, arranque 11:30 BRT / 16:30 CEST — carrera 5. El mismo fin de semana que el MotoGP en Sachsenring.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, und die Winterferien der PR-Landesschulen (Recesso 13.–24.07.) rücken näher — mit ihnen ein ganzes Bündel Ferienprogramme. Diese Woche bleibt es bis Freitag trocken und mild, ideal für draußen; die Nächte sind kalt. Das große gratis Highlight liegt im Kern-Ring und startet Donnerstag: die 31. FETEXAS in Jacarezinho, nur ~50 km entfernt.</p>\n    <ul>\n      <li><span class=\"chip good\">Event</span> <strong>31. FETEXAS in Jacarezinho</strong>: 4 Tage Texas-Fest, Do–So 09.–12.07., Kern-Ring (~50 km), <strong>Eintritt frei</strong> — Sa Leonardo, So Sorriso Maroto.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Trocken &amp; kalt-morgens</strong>: sonnige Nachmittage bis Freitag, Nächte teils einstellig. Zwei Portale einig bei der Temperatur (Regen-Detail leicht abweichend).</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien PR</strong> (rede estadual) — offizielles Recesso 13.–24.07. — die Ferienprogramme starten schon jetzt: SESC, Bibliothek, Shopping-Parks in Londrina.</li>\n      <li><span class=\"chip\">Event</span> <strong>SESC „Brincando nas Férias\"</strong> (Londrina Norte): betreutes Ferienprogramm 13.–24.07. für 4–12-Jährige.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Day-Trip Ourinhos</strong>: XXIII Festival de Música, 14.–18.07., gratis Konzerte (~150 km).</li>\n      <li><span class=\"chip\">Trip</span> <strong>Hopi Hari, São Paulo-Range</strong>: „Férias Spetakulares\" — Kinder bis 12 den ganzen Juli <strong>gratis</strong>, ohne zahlende Begleitung.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>BR-Winter</strong>: RSV-/Grippe-Saison — mit dem 1-Monats-Baby warm halten und Menschentrauben in geschlossenen Räumen meiden.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, and the winter break for Paraná's state schools (Jul 13–24 recess) is getting closer — bringing a whole bundle of holiday programs with it. This week stays dry and mild through Friday, ideal for the outdoors; nights are cold. The big free highlight is in the core ring and starts Thursday: the 31st FETEXAS in Jacarezinho, only about 50 km away.</p>\n    <ul>\n      <li><span class=\"chip good\">Event</span> <strong>31st FETEXAS in Jacarezinho</strong>: 4-day Texas festival, Thu–Sun Jul 9–12, core ring (~50 km), <strong>free admission</strong> — Sat Leonardo, Sun Sorriso Maroto.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Dry &amp; cold mornings</strong>: sunny afternoons through Friday, nights sometimes single digits. Two sources agree on temperature (rain detail slightly different).</li>\n      <li><span class=\"chip\">School</span> <strong>PR winter break</strong> (state school system): official recess Jul 13–24 — holiday programs are already starting: SESC, library, shopping-mall play parks in Londrina.</li>\n      <li><span class=\"chip\">Event</span> <strong>SESC \"Brincando nas Férias\"</strong> (Londrina Norte): supervised holiday program Jul 13–24 for ages 4–12.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Day trip to Ourinhos</strong>: XXIII Festival de Música, Jul 14–18, free concerts (~150 km).</li>\n      <li><span class=\"chip\">Trip</span> <strong>Hopi Hari, São Paulo range</strong>: \"Férias Spetakulares\" — kids up to 12 get in <strong>free</strong> all July, no paying companion required.</li>\n      <li><span class=\"chip\">Health</span> <strong>Brazilian winter</strong>: RSV/flu season — keep the 1-month-old baby warm and avoid crowds in enclosed spaces.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, e as férias de inverno da rede estadual do PR (recesso de 13 a 24/07) estão cada vez mais perto — trazendo consigo um pacote inteiro de programações de férias. Esta semana continua seca e amena até sexta, ideal para atividades ao ar livre; as noites estão frias. O grande destaque gratuito fica no raio próximo e começa quinta-feira: a 31ª FETEXAS em Jacarezinho, a apenas ~50 km de distância.</p>\n    <ul>\n      <li><span class=\"chip good\">Evento</span> <strong>31ª FETEXAS em Jacarezinho</strong>: 4 dias de festa Texana, qui–dom 09–12/07, raio próximo (~50 km), <strong>entrada gratuita</strong> — sáb Leonardo, dom Sorriso Maroto.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Seco e frio pela manhã</strong>: tardes ensolaradas até sexta, noites por vezes de um dígito. Duas fontes concordam na temperatura (detalhe da chuva ligeiramente diferente).</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno PR</strong> (rede estadual): recesso oficial 13–24/07 — as programações de férias já estão começando: SESC, biblioteca, parques de shoppings em Londrina.</li>\n      <li><span class=\"chip\">Evento</span> <strong>SESC \"Brincando nas Férias\"</strong> (Londrina Norte): programação de férias com monitores 13–24/07 para crianças de 4 a 12 anos.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Bate-volta a Ourinhos</strong>: XXIII Festival de Música, 14–18/07, shows gratuitos (~150 km).</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Hopi Hari, região de São Paulo</strong>: \"Férias Spetakulares\" — crianças até 12 anos entram <strong>de graça</strong> o mês de julho inteiro, sem precisar de acompanhante pagante.</li>\n      <li><span class=\"chip\">Saúde</span> <strong>Inverno no Brasil</strong>: temporada de VSR/gripe — manter o bebê de 1 mês agasalhado e evitar aglomerações em ambientes fechados.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, y las vacaciones de invierno de las escuelas estatales de PR (receso del 13 al 24/07) están cada vez más cerca — y con ellas, todo un paquete de programas vacacionales. Esta semana se mantiene seca y templada hasta el viernes, ideal para actividades al aire libre; las noches están frías. El gran evento gratuito de la semana está en el anillo cercano y arranca el jueves: la 31ª FETEXAS en Jacarezinho, a solo ~50 km de distancia.</p>\n    <ul>\n      <li><span class=\"chip good\">Evento</span> <strong>31ª FETEXAS en Jacarezinho</strong>: 4 días de fiesta al estilo Texas, jue–dom 09–12/07, anillo cercano (~50 km), <strong>entrada gratuita</strong> — sáb Leonardo, dom Sorriso Maroto.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Seco y frío por las mañanas</strong>: tardes soleadas hasta el viernes, noches a veces de un solo dígito. Dos fuentes coinciden en la temperatura (el detalle de lluvia difiere un poco).</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno PR</strong> (sistema estatal): receso oficial 13–24/07 — los programas vacacionales ya están comenzando: SESC, biblioteca, parques infantiles en centros comerciales de Londrina.</li>\n      <li><span class=\"chip\">Evento</span> <strong>SESC \"Brincando nas Férias\"</strong> (Londrina Norte): programa vacacional con supervisión 13–24/07 para niños de 4 a 12 años.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Excursión de un día a Ourinhos</strong>: XXIII Festival de Música, 14–18/07, conciertos gratuitos (~150 km).</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Hopi Hari, zona de São Paulo</strong>: \"Férias Spetakulares\" — niños hasta 12 años entran <strong>gratis</strong> todo julio, sin necesidad de acompañante que pague.</li>\n      <li><span class=\"chip\">Salud</span> <strong>Invierno en Brasil</strong>: temporada de VSR/gripe — mantener abrigada a la bebé de 1 mes y evitar aglomeraciones en espacios cerrados.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag ist Wirtschaftstag — und diesmal geht es an die Börse. Nach Banken, Krediten, Steuern und Unternehmensführung fehlte noch das, worüber Anleger im Alltag wirklich reden: Aktien kaufen und verkaufen, Kurse, die aufschlagen oder einbrechen, Dividenden, Depot-Apps und Bullen- gegen Bärenmarkt. Passt zum heutigen Wirtschafts-Newsletter, dessen Schlagzeile lautet „der KI-Kapitalstrom wird jetzt Makro\" — genau dieser Geldstrom in die Märkte ist das Umfeld für die heutigen Wörter. 32 Einträge, elf davon Verben mit voller Konjugation. Drei alte Bekannte vom 15.06. kommen zur Wiederholung zurück: <strong>investieren · die Börse · die Rendite</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>actual (ES) ≠ aktuell (DE)</strong> — spanisch <em>actual</em> = „gegenwärtig/heutig\"; das deutsche „aktuell\" ist damit fast identisch, aber engl. „actual\" heißt „tatsächlich/echt\" — die Falle sitzt zwischen ES/EN.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>apostar todas as fichas (em)</strong> (PT-BR) = „alles auf eine Karte setzen\" — wörtlich „alle Chips setzen\", aus dem Poker.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>apostar (ES)</strong> diphthongiert o→ue: yo ap<em>ue</em>sto, aber nosotros ap<em>o</em>stamos.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>invertir (ES)</strong> ist doppelt unregelmäßig: Präsens e→ie (yo inv<em>ie</em>rto), Prät. 3. Person e→i (él inv<em>i</em>rtió, ellos inv<em>i</em>rtieron).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>rendir (ES)</strong> und <strong>reventar (ES)</strong> — e→i (yo r<em>i</em>ndo) bzw. e→ie (yo rev<em>ie</em>nto); nosotros bleibt bar: rendimos, reventamos.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>einbrechen</strong> und <strong>platzen</strong> (Kurs/Blase) nehmen im Perfekt <em>sein</em>: der Kurs <em>ist</em> eingebrochen, die Blase <em>ist</em> geplatzt.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>despencar (PT)</strong> — c→qu vor e: eu despen<em>qu</em>ei (der Kurs stürzte ab).</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a corretora</strong> ist in Brasilien der Broker/das Depot-Haus; <strong>a carteira (de ações)</strong> = das Portfolio (dasselbe Wort wie „Brieftasche\" — hier finanziell gemeint).</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>apostar</strong> (wetten, Glück) vs. <strong>investir</strong> (investieren, Risiko gemanagt) — im PT ein bewusster Unterschied, nicht dasselbe.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>a ação</strong> (PT, f) / <strong>la acción</strong> (ES, f) = die Aktie; Plural <em>as ações</em> / <em>las acciones</em>.</li>\n      <li><span class=\"chip good\">WIEDERHOLUNG</span> Vom 15.06. zurück: <strong>investieren · die Börse · die Rendite</strong>.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Montag ist Wirtschaftstag — und diesmal geht es an die Börse. Nach Banken, Krediten, Steuern und Unternehmensführung fehlte noch das, worüber Anleger im Alltag wirklich reden: Aktien kaufen und verkaufen, Kurse, die aufschlagen oder einbrechen, Dividenden, Depot-Apps und Bullen- gegen Bärenmarkt. Passt zum heutigen Wirtschafts-Newsletter, dessen Schlagzeile lautet „der KI-Kapitalstrom wird jetzt Makro\" — genau dieser Geldstrom in die Märkte ist das Umfeld für die heutigen Wörter. 32 Einträge, elf davon Verben mit voller Konjugation. Drei alte Bekannte vom 15.06. kommen zur Wiederholung zurück: <strong>investieren · die Börse · die Rendite</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>actual (ES) ≠ aktuell (DE)</strong> — spanisch <em>actual</em> = „gegenwärtig/heutig\"; das deutsche „aktuell\" ist damit fast identisch, aber engl. „actual\" heißt „tatsächlich/echt\" — die Falle sitzt zwischen ES/EN.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>apostar todas as fichas (em)</strong> (PT-BR) = „alles auf eine Karte setzen\" — wörtlich „alle Chips setzen\", aus dem Poker.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>apostar (ES)</strong> diphthongiert o→ue: yo ap<em>ue</em>sto, aber nosotros ap<em>o</em>stamos.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>invertir (ES)</strong> ist doppelt unregelmäßig: Präsens e→ie (yo inv<em>ie</em>rto), Prät. 3. Person e→i (él inv<em>i</em>rtió, ellos inv<em>i</em>rtieron).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>rendir (ES)</strong> und <strong>reventar (ES)</strong> — e→i (yo r<em>i</em>ndo) bzw. e→ie (yo rev<em>ie</em>nto); nosotros bleibt bar: rendimos, reventamos.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>einbrechen</strong> und <strong>platzen</strong> (Kurs/Blase) nehmen im Perfekt <em>sein</em>: der Kurs <em>ist</em> eingebrochen, die Blase <em>ist</em> geplatzt.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>despencar (PT)</strong> — c→qu vor e: eu despen<em>qu</em>ei (der Kurs stürzte ab).</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a corretora</strong> ist in Brasilien der Broker/das Depot-Haus; <strong>a carteira (de ações)</strong> = das Portfolio (dasselbe Wort wie „Brieftasche\" — hier finanziell gemeint).</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>apostar</strong> (wetten, Glück) vs. <strong>investir</strong> (investieren, Risiko gemanagt) — im PT ein bewusster Unterschied, nicht dasselbe.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>a ação</strong> (PT, f) / <strong>la acción</strong> (ES, f) = die Aktie; Plural <em>as ações</em> / <em>las acciones</em>.</li>\n      <li><span class=\"chip good\">WIEDERHOLUNG</span> Vom 15.06. zurück: <strong>investieren · die Börse · die Rendite</strong>.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday is economy day — and this time we're heading to the stock market. After banks, loans, taxes, and corporate governance, what was still missing is what investors actually talk about day to day: buying and selling shares, prices that jump or crash, dividends, brokerage apps, and bull versus bear markets. It fits today's economy newsletter, whose headline reads \"the AI capital flow is now macro\" — that very flow of money into the markets is the backdrop for today's words. 32 entries, eleven of them verbs with full conjugation. Three old acquaintances from 06/15 return for review: <strong>investieren · die Börse · die Rendite</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>actual (ES) ≠ aktuell (DE)</strong> — Spanish <em>actual</em> = \"current/present-day\"; German \"aktuell\" is nearly identical, but English \"actual\" means \"real/genuine\" — the trap sits between ES/EN.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>apostar todas as fichas (em)</strong> (PT-BR) = \"to put all your eggs in one basket\" — literally \"to bet all the chips,\" from poker.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>apostar (ES)</strong> diphthongizes o→ue: yo ap<em>ue</em>sto, but nosotros ap<em>o</em>stamos.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>invertir (ES)</strong> is doubly irregular: present e→ie (yo inv<em>ie</em>rto), preterite 3rd person e→i (él inv<em>i</em>rtió, ellos inv<em>i</em>rtieron).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>rendir (ES)</strong> and <strong>reventar (ES)</strong> — e→i (yo r<em>i</em>ndo) and e→ie (yo rev<em>ie</em>nto); nosotros stays plain: rendimos, reventamos.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>einbrechen</strong> and <strong>platzen</strong> (price/bubble) take <em>sein</em> in the present perfect: der Kurs <em>ist</em> eingebrochen, die Blase <em>ist</em> geplatzt.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>despencar (PT)</strong> — c→qu before e: eu despen<em>qu</em>ei (the price plunged).</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a corretora</strong> is Brazilian for the broker/brokerage house; <strong>a carteira (de ações)</strong> = the portfolio (the same word as \"wallet\" — meant financially here).</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>apostar</strong> (to bet, chance) vs. <strong>investir</strong> (to invest, managed risk) — a deliberate distinction in Portuguese, not the same thing.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>a ação</strong> (PT, f) / <strong>la acción</strong> (ES, f) = the share; plural <em>as ações</em> / <em>las acciones</em>.</li>\n      <li><span class=\"chip good\">REVIEW</span> Back from 06/15: <strong>investieren · die Börse · die Rendite</strong>.</li>\n    </ul></div>",

o Perfekt: der Kurs <em>ist</em> eingebrochen, die Blase <em>ist</em> geplatzt.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>despencar (PT)</strong> — c→qu antes de e: eu despen<em>qu</em>ei (a cotação despencou).</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a corretora</strong> é no Brasil o broker/a casa de investimentos; <strong>a carteira (de ações)</strong> = o portfólio (a mesma palavra de \"carteira\" no sentido de bolsa/documento — aqui usada no sentido financeiro).</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>apostar</strong> (arriscar na sorte) vs. <strong>investir</strong> (investir com risco gerenciado) — no PT uma distinção proposital, não é a mesma coisa.</li>\n      <li><span class=\"chip\">GÊNERO</span> <strong>a ação</strong> (PT, f) / <strong>la acción</strong> (ES, f) = a ação; plural <em>as ações</em> / <em>las acciones</em>.</li>\n      <li><span class=\"chip good\">REVISÃO</span> De volta desde 15/06: <strong>investieren · die Börse · die Rendite</strong>.</li>\n    </ul></div>",

ón/burbuja) usan <em>sein</em> en el Perfekt: der Kurs <em>ist</em> eingebrochen, die Blase <em>ist</em> geplatzt.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>despencar (PT)</strong> — c→qu antes de e: eu despen<em>qu</em>ei (la cotización se desplomó).</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a corretora</strong> es en Brasil la casa de bolsa; <strong>a carteira (de ações)</strong> = el portafolio (la misma palabra que \"cartera/billetera\" — aquí con sentido financiero).</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>apostar</strong> (arriesgar por suerte) vs. <strong>investir</strong> (invertir con riesgo gestionado) — en PT una distinción deliberada, no es lo mismo.</li>\n      <li><span class=\"chip\">GÉNERO</span> <strong>a ação</strong> (PT, f) / <strong>la acción</strong> (ES, f) = la acción; plural <em>as ações</em> / <em>las acciones</em>.</li>\n      <li><span class=\"chip good\">REPASO</span> De vuelta desde el 15/06: <strong>investieren · die Börse · die Rendite</strong>.</li>\n    </ul></div>"
