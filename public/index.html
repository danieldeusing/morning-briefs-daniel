      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montagmorgen, und die Woche hinterlässt einen Rückstand, der sich nicht von selbst abarbeitet. Am Donnerstag hat die CISA <strong>CVE-2026-58644</strong> in ihren Katalog der aktiv ausgenutzten Schwachstellen aufgenommen — <strong>CVSS 9,8</strong>, Remote Code Execution in On-Prem-SharePoint, <em>ohne</em> Anmeldung. Das ist die vierte SharePoint-Lücke derselben laufenden Kampagne seit April, und das BSI hatte zwei Tage zuvor bereits vor dem SharePoint-Patchday-Bündel gewarnt. Wer letzte Woche nur die dritte gepatcht hat, ist wieder offen. Dazu: Chrome schiebt binnen 48 Stunden die zweite kritische Stable-Runde nach (bei der ich die CVE-Liste bewusst <em>nicht</em> aufzähle — dazu unten mehr), Angular verabschiedet sich vom Halbjahres-Takt, Caddy hat zwei Advisories liegen, die Daniels eigenen Reverse-Proxy betreffen, und die NIS-2-Registrierungsfrist steht in <strong>elf Tagen</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>CVE-2026-58644 (CVSS 9,8)</strong>: Deserialisierung nicht vertrauenswürdiger Daten in SharePoint Server (Subscription Edition, 2019, 2016) → Code-Ausführung <em>ohne Authentifizierung</em>. Seit <strong>16.07.</strong> im CISA-KEV, also nachweislich in freier Wildbahn ausgenutzt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI zieht nach</strong>: Cybersicherheitswarnung „Microsoft SharePoint — Zero-Day und kritische Schwachstellen geschlossen\" vom <strong>14.07.2026</strong>, Version 1.0.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Vier CVEs, eine Kampagne</strong>: KEV-Aufnahmen am 14.04., 01.07., 14.07. und 16.07. — SharePoint ist seit über drei Monaten ein laufendes Ziel, kein Einzelvorfall.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome 150.0.7871.128/.129</strong>: Googles eigener Release-Post datiert auf Donnerstag, 16.07. — die zweite kritische Stable-Runde innerhalb von zwei Tagen. Use-after-free-Fixes, aber die kursierenden CVE-Listen <strong>decken jeweils nur einen Teil ab</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>LegacyHive</strong>: Windows-Zero-Day zur lokalen Rechteausweitung im User Profile Service, veröffentlicht am 14./15.07. — Stunden nach dem Juli-Patchday, also ungepatcht.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular geht auf Jahres-Takt</strong>: Nach Community-Feedback zur Breaking-Change-Frequenz wechselt das Projekt vom ~6-Monats- auf einen jährlichen Major-Zyklus. 22.0.7 und 22.1.0-next.6 kamen am 16.07.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Caddy, zwei Advisories</strong> (beide 10.07., Moderate): falscher Upstream bei <code>forward_auth</code> + <code>reverse_proxy</code>, plus drei Lücken in v2.11.3. Steht direkt in Daniels Stack-DNA.</li>\n      <li><span class=\"chip hot\">Regulierung</span> <span class=\"chip\">DE</span> <strong>NIS-2: elf Tage</strong> — Registrierung beim BSI bis <strong>31.07.2026</strong>. Ende Mai waren erst ~18.500 von geschätzt ~29.500 pflichtigen Einrichtungen registriert.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Ruhiger Backlog</strong>: Kein frisches Postgres-, Python- oder SQLite-Advisory in diesem Fenster. Postgres' letzte Sicherheitsfreigabe ist vom 14.05., Python steht bei 3.14.6 (10.06.), Linux 7.2 zielt auf August.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Montagmorgen, und die Woche hinterlässt einen Rückstand, der sich nicht von selbst abarbeitet. Am Donnerstag hat die CISA <strong>CVE-2026-58644</strong> in ihren Katalog der aktiv ausgenutzten Schwachstellen aufgenommen — <strong>CVSS 9,8</strong>, Remote Code Execution in On-Prem-SharePoint, <em>ohne</em> Anmeldung. Das ist die vierte SharePoint-Lücke derselben laufenden Kampagne seit April, und das BSI hatte zwei Tage zuvor bereits vor dem SharePoint-Patchday-Bündel gewarnt. Wer letzte Woche nur die dritte gepatcht hat, ist wieder offen. Dazu: Chrome schiebt binnen 48 Stunden die zweite kritische Stable-Runde nach (bei der ich die CVE-Liste bewusst <em>nicht</em> aufzähle — dazu unten mehr), Angular verabschiedet sich vom Halbjahres-Takt, Caddy hat zwei Advisories liegen, die Daniels eigenen Reverse-Proxy betreffen, und die NIS-2-Registrierungsfrist steht in <strong>elf Tagen</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>CVE-2026-58644 (CVSS 9,8)</strong>: Deserialisierung nicht vertrauenswürdiger Daten in SharePoint Server (Subscription Edition, 2019, 2016) → Code-Ausführung <em>ohne Authentifizierung</em>. Seit <strong>16.07.</strong> im CISA-KEV, also nachweislich in freier Wildbahn ausgenutzt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI zieht nach</strong>: Cybersicherheitswarnung „Microsoft SharePoint — Zero-Day und kritische Schwachstellen geschlossen\" vom <strong>14.07.2026</strong>, Version 1.0.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Vier CVEs, eine Kampagne</strong>: KEV-Aufnahmen am 14.04., 01.07., 14.07. und 16.07. — SharePoint ist seit über drei Monaten ein laufendes Ziel, kein Einzelvorfall.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome 150.0.7871.128/.129</strong>: Googles eigener Release-Post datiert auf Donnerstag, 16.07. — die zweite kritische Stable-Runde innerhalb von zwei Tagen. Use-after-free-Fixes, aber die kursierenden CVE-Listen <strong>decken jeweils nur einen Teil ab</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>LegacyHive</strong>: Windows-Zero-Day zur lokalen Rechteausweitung im User Profile Service, veröffentlicht am 14./15.07. — Stunden nach dem Juli-Patchday, also ungepatcht.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular geht auf Jahres-Takt</strong>: Nach Community-Feedback zur Breaking-Change-Frequenz wechselt das Projekt vom ~6-Monats- auf einen jährlichen Major-Zyklus. 22.0.7 und 22.1.0-next.6 kamen am 16.07.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Caddy, zwei Advisories</strong> (beide 10.07., Moderate): falscher Upstream bei <code>forward_auth</code> + <code>reverse_proxy</code>, plus drei Lücken in v2.11.3. Steht direkt in Daniels Stack-DNA.</li>\n      <li><span class=\"chip hot\">Regulierung</span> <span class=\"chip\">DE</span> <strong>NIS-2: elf Tage</strong> — Registrierung beim BSI bis <strong>31.07.2026</strong>. Ende Mai waren erst ~18.500 von geschätzt ~29.500 pflichtigen Einrichtungen registriert.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Ruhiger Backlog</strong>: Kein frisches Postgres-, Python- oder SQLite-Advisory in diesem Fenster. Postgres' letzte Sicherheitsfreigabe ist vom 14.05., Python steht bei 3.14.6 (10.06.), Linux 7.2 zielt auf August.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday morning, and the week is leaving behind a backlog that won't clear itself. On Thursday, CISA added <strong>CVE-2026-58644</strong> to its catalog of actively exploited vulnerabilities — <strong>CVSS 9.8</strong>, remote code execution in on-prem SharePoint, <em>no login required</em>. That's the fourth SharePoint flaw in the same ongoing campaign since April, and the BSI had already warned about the SharePoint Patch Tuesday bundle two days earlier. Anyone who only patched the third one last week is exposed again. On top of that: Chrome is pushing out a second critical stable round within 48 hours (where I'm deliberately <em>not</em> listing the CVEs — more on that below), Angular is saying goodbye to its half-year cadence, Caddy has two advisories outstanding that touch Daniel's own reverse proxy, and the NIS2 registration deadline is <strong>eleven days</strong> out.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>CVE-2026-58644 (CVSS 9.8)</strong>: deserialization of untrusted data in SharePoint Server (Subscription Edition, 2019, 2016) → code execution <em>without authentication</em>. In the CISA KEV since <strong>16.07</strong> — meaning it's demonstrably being exploited in the wild.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI follows suit</strong>: cybersecurity warning \"Microsoft SharePoint — zero-day and critical vulnerabilities closed\" from <strong>14 Jul 2026</strong>, version 1.0.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Four CVEs, one campaign</strong>: KEV additions on 14.04, 01.07, 14.07, and 16.07 — SharePoint has been an ongoing target for over three months now, not a one-off incident.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome 150.0.7871.128/.129</strong>: Google's own release post is dated Thursday, 16.07 — the second critical stable round within two days. Use-after-free fixes, but the CVE lists circulating out there <strong>each cover only part of the release</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>LegacyHive</strong>: a Windows zero-day for local privilege escalation in the User Profile Service, published on 14/15.07 — hours after the July Patch Tuesday, so still unpatched.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular moves to an annual cadence</strong>: following community feedback on the frequency of breaking changes, the project is switching from its ~6-month to a yearly major-version cycle. 22.0.7 and 22.1.0-next.6 landed on 16.07.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Caddy, two advisories</strong> (both 10.07, Moderate): wrong upstream when combining <code>forward_auth</code> + <code>reverse_proxy</code>, plus three flaws in v2.11.3. Sits right in Daniel's stack DNA.</li>\n      <li><span class=\"chip hot\">Regulation</span> <span class=\"chip\">DE</span> <strong>NIS2: eleven days</strong> — registration with the BSI due by <strong>31 Jul 2026</strong>. By the end of May, only ~18,500 of an estimated ~29,500 obligated entities had registered.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Quiet backlog</strong>: no fresh Postgres, Python, or SQLite advisory in this window. Postgres' last security release was on 14.05, Python stands at 3.14.6 (10.06), Linux 7.2 is targeting August.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira de manhã, e a semana chega com um acúmulo que não se resolve sozinho. Na quinta-feira, a CISA incluiu a <strong>CVE-2026-58644</strong> em seu catálogo de vulnerabilidades ativamente exploradas — <strong>CVSS 9,8</strong>, execução remota de código no SharePoint on-premises, <em>sem</em> login. É a quarta falha do SharePoint da mesma campanha em curso desde abril, e o BSI já havia alertado dois dias antes sobre o pacote do patch day do SharePoint. Quem só corrigiu a terceira falha na semana passada volta a ficar exposto. Além disso: o Chrome lança, em 48 horas, sua segunda rodada crítica de estável (na qual, propositalmente, <em>não</em> listo as CVEs — mais sobre isso abaixo), o Angular se despede do ritmo semestral, o Caddy tem dois avisos pendentes que afetam o próprio proxy reverso do Daniel, e o prazo de registro da NIS-2 vence em <strong>onze dias</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>CVE-2026-58644 (CVSS 9,8)</strong>: desserialização de dados não confiáveis no SharePoint Server (Subscription Edition, 2019, 2016) → execução de código <em>sem autenticação</em>. No CISA-KEV desde <strong>16/07</strong>, ou seja, com exploração comprovada em ambiente real.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>BSI reage</strong>: alerta de cibersegurança \"Microsoft SharePoint — zero-day e vulnerabilidades críticas corrigidas\" de <strong>14/07/2026</strong>, versão 1.0.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Quatro CVEs, uma campanha</strong>: inclusões no KEV em 14/04, 01/07, 14/07 e 16/07 — o SharePoint é alvo contínuo há mais de três meses, não um caso isolado.</li>\n      <li><span class=\"chip\">Navegador</span> <span class=\"chip\">Global</span> <strong>Chrome 150.0.7871.128/.129</strong>: o próprio post de lançamento do Google é datado de quinta-feira, 16/07 — a segunda rodada crítica de estável em dois dias. Correções de use-after-free, mas as listas de CVEs em circulação <strong>cobrem apenas parte da versão</strong>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EUA</span> <strong>LegacyHive</strong>: zero-day do Windows para elevação local de privilégios no User Profile Service, publicado em 14–15/07 — horas após o patch day de julho, portanto ainda sem correção.</li>\n      <li><span class=\"chip good\">Lançamento</span> <span class=\"chip\">Web</span> <strong>Angular passa a ter ritmo anual</strong>: após feedback da comunidade sobre a frequência de breaking changes, o projeto troca o ciclo de ~6 meses por um ciclo major anual. As versões 22.0.7 e 22.1.0-next.6 saíram em 16/07.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Caddy, dois avisos</strong> (ambos de 10/07, moderados): upstream incorreto na combinação de <code>forward_auth</code> + <code>reverse_proxy</code>, além de três falhas na v2.11.3. Está diretamente no DNA da stack do Daniel.</li>\n      <li><span class=\"chip hot\">Regulação</span> <span class=\"chip\">DE</span> <strong>NIS-2: onze dias</strong> — registro no BSI até <strong>31/07/2026</strong>. No fim de maio, apenas ~18.500 das ~29.500 entidades obrigadas estimadas estavam registradas.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Backlog tranquilo</strong>: nenhum aviso novo de Postgres, Python ou SQLite nesta janela. O último lançamento de segurança do Postgres é de 14/05, o Python está na versão 3.14.6 (10/06), e o Linux 7.2 mira agosto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes por la mañana, y la semana deja un pendiente que no se resuelve solo. El jueves, la CISA incorporó <strong>CVE-2026-58644</strong> a su catálogo de vulnerabilidades explotadas activamente — <strong>CVSS 9,8</strong>, ejecución remota de código en SharePoint on-prem, <em>sin</em> inicio de sesión. Es la cuarta brecha de SharePoint de la misma campaña en curso desde abril, y el BSI ya había advertido dos días antes sobre el paquete del patch day de SharePoint. Quien la semana pasada solo parchó la tercera vuelve a estar expuesto. Además: Chrome lanza en menos de 48 horas su segunda ronda crítica de stable (en la que deliberadamente <em>no</em> enumero la lista de CVE — más abajo explico por qué), Angular se despide del ritmo semestral, Caddy tiene dos avisos pendientes que afectan directamente el reverse proxy propio de Daniel, y el plazo de registro de NIS-2 vence en <strong>once días</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>CVE-2026-58644 (CVSS 9,8)</strong>: deserialización de datos no confiables en SharePoint Server (Subscription Edition, 2019, 2016) → ejecución de código <em>sin autenticación</em>. En el CISA-KEV desde el <strong>16/07</strong>, es decir, con explotación comprobada en el mundo real.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">DE</span> <strong>El BSI se suma</strong>: advertencia de ciberseguridad «Microsoft SharePoint — zero-day y vulnerabilidades críticas corregidas» del <strong>14/07/2026</strong>, versión 1.0.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Global</span> <strong>Cuatro CVE, una sola campaña</strong>: ingresos al KEV el 14/04, 01/07, 14/07 y 16/07 — SharePoint lleva más de tres meses siendo un blanco activo, no un incidente aislado.</li>\n      <li><span class=\"chip\">Navegador</span> <span class=\"chip\">Global</span> <strong>Chrome 150.0.7871.128/.129</strong>: el propio post de lanzamiento de Google está fechado el jueves 16/07 — la segunda ronda crítica de stable en dos días. Correcciones de use-after-free, pero las listas de CVE que circulan <strong>cubren solo una parte de la versión</strong>.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">EE. UU.</span> <strong>LegacyHive</strong>: zero-day de Windows para escalada local de privilegios en el User Profile Service, publicado el 14 y 15 de julio — horas después del patch day de julio, es decir, sin parchar.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <span class=\"chip\">Web</span> <strong>Angular pasa al ritmo anual</strong>: tras los comentarios de la comunidad sobre la frecuencia de los breaking changes, el proyecto cambia de su ciclo de ~6 meses a un ciclo major anual. 22.0.7 y 22.1.0-next.6 salieron el 16/07.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Caddy, dos avisos</strong> (ambos del 10/07, Moderate): upstream equivocado con <code>forward_auth</code> + <code>reverse_proxy</code>, más tres vulnerabilidades en v2.11.3. Está justo en el ADN del stack de Daniel.</li>\n      <li><span class=\"chip hot\">Regulación</span> <span class=\"chip\">DE</span> <strong>NIS-2: once días</strong> — registro ante el BSI hasta el <strong>31/07/2026</strong>. A fines de mayo solo unas ~18.500 de las ~29.500 entidades obligadas estimadas estaban registradas.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Backlog tranquilo</strong>: ningún aviso nuevo de Postgres, Python o SQLite en esta ventana. La última liberación de seguridad de Postgres es del 14/05, Python va en 3.14.6 (10/06), Linux 7.2 apunta a agosto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Juli 2026 hat die Preisspanne für Coding-Modelle auseinandergezogen — in beide Richtungen. Innerhalb von 24–48 Stunden landeten Anfang des Monats drei Flaggschiffe mit Output-Preisen zwischen 4,25 und 6 $ pro Million Tokens, dort wo die etablierte Spitze 15 bis 30 $ verlangt. Gleichzeitig existiert <em>oberhalb</em> der alten Flaggschiffe inzwischen eine Premium-Stufe: Claude Fable 5 kostet laut Anthropics eigener Preisseite 10 $ Input / 50 $ Output. Billig wurde billiger <em>und</em> teuer wurde teurer. Dazu kam am Donnerstag Kimi K3, ein 2,8-Billionen-Parameter-Modell aus China, dessen offene Gewichte allerdings noch nicht existieren: sie sind für den 27.07. <em>versprochen</em>. Für dich heißt der Tag vor allem eines — dein Agenten-Budget ist gerade neu verhandelbar, und es lohnt sich, das nachzurechnen statt es zu glauben.</p>\n    <ul>\n      <li><span class=\"chip hot\">PREIS</span> <strong>Preiskrieg unten, Premium-Stufe oben</strong>: Grok 4.5 (6 $/M Output), GPT-5.6 Luna (6 $/M) und Muse Spark 1.1 (4,25 $/M) gegen Kimi K3 (15 $/M), Opus 4.8 (25 $/M), GPT-5.6 Sol (30 $/M) — und darüber Claude Fable 5 mit 50 $/M.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 ist da — aber nur als API</strong>: 2,8 Bio. Parameter, 1 Mio. Kontext, 15 $/M Output. Die offenen Gewichte sind für den 27.07. angekündigt und heute noch nirgends abrufbar.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Skepsis-Pflicht</strong>: K3 steht bei Artificial Analysis auf Index 57 (Platz 4 von 187). Die kursierende Frontend-Code-Arena-Punktetabelle konnten wir <em>nicht</em> nachprüfen — sie steht hier deshalb nicht.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> bringt FlexAttention auf Apple Silicon/MPS. Der viel zitierte 12,3-fache Speedup gilt für ein <em>sehr</em> dünnbesetztes Sliding-Window-Muster — nicht allgemein.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Anaconda kauft Kilo Code</strong> (15.07.): der modell-agnostische Coding-Agent mit 3 Mio. Entwicklern und ~10 Bio. Tokens/Monat geht an einen Enterprise-Python-Anbieter.</li>\n      <li><span class=\"chip good\">MCP</span> <strong>Gemini Managed Agents</strong> können jetzt asynchron im Hintergrund laufen (<code>background: true</code>) und aus Googles Sandbox heraus entfernte MCP-Server anzapfen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call</strong>: Cline liefert im Akkord (21 Releases im Juli), Copilot CLI wöchentlich — Continue seit vier Wochen still, Plandex seit einem Jahr, Aider ohne datierten Release.</li>\n      <li><span class=\"chip\">Quelle</span> <strong>Transparenz</strong>: x.ai und openai.com lieferten beim Abruf beide HTTP 403. Die Grok- und GPT-5.6-Zahlen unten stehen deshalb auf TechCrunch bzw. Simon Willison.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">July 2026 pulled the price range for coding models apart — in both directions. Within 24–48 hours early in the month, three flagships landed with output prices between $4.25 and $6 per million tokens, right where the established top tier charges $15 to $30. At the same time, a premium tier has emerged <em>above</em> the old flagships: Claude Fable 5 costs $10 input / $50 output, per Anthropic's own pricing page. Cheap got cheaper, and expensive got more expensive. Then on Thursday came Kimi K3, a 2.8-trillion-parameter model out of China, whose open weights don't actually exist yet: they're <em>promised</em> for July 27. For you, the day mainly means one thing — your agent budget is suddenly up for renegotiation, and it's worth doing the math on that instead of just believing it.</p>\n    <ul>\n      <li><span class=\"chip hot\">PRICE</span> <strong>Price war at the bottom, premium tier at the top</strong>: Grok 4.5 ($6/M output), GPT-5.6 Luna ($6/M), and Muse Spark 1.1 ($4.25/M) against Kimi K3 ($15/M), Opus 4.8 ($25/M), GPT-5.6 Sol ($30/M) — and above that, Claude Fable 5 at $50/M.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 is here — but only as an API</strong>: 2.8T parameters, 1M context, $15/M output. The open weights are announced for July 27 and still aren't available anywhere as of today.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Mandatory skepticism</strong>: K3 sits at Index 57 on Artificial Analysis (rank 4 of 187). The Frontend Code Arena score table circulating online could <em>not</em> be verified — so it doesn't appear here.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> brings FlexAttention to Apple Silicon/MPS. The widely cited 12.3x speedup applies to a <em>very</em> sparse sliding-window pattern — not generally.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Anaconda buys Kilo Code</strong> (07/15): the model-agnostic coding agent with 3M developers and ~10T tokens/month goes to an enterprise Python vendor.</li>\n      <li><span class=\"chip good\">MCP</span> <strong>Gemini Managed Agents</strong> can now run asynchronously in the background (<code>background: true</code>) and tap remote MCP servers from within Google's sandbox.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll call</strong>: Cline is shipping nonstop (21 releases in July), Copilot CLI weekly — Continue quiet for four weeks, Plandex for a year, Aider with no dated release.</li>\n      <li><span class=\"chip\">Source</span> <strong>Transparency</strong>: x.ai and openai.com both returned HTTP 403 on retrieval. The Grok and GPT-5.6 figures below therefore rest on TechCrunch and Simon Willison, respectively.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Julho de 2026 esticou a faixa de preços dos modelos de coding — nas duas direções. Em 24 a 48 horas, no início do mês, chegaram três modelos flagship com preços de output entre 4,25 e 6 $ por milhão de tokens, onde a ponta estabelecida cobra de 15 a 30 $. Ao mesmo tempo, surgiu acima dos antigos flagships um novo patamar premium: o Claude Fable 5 custa, segundo a própria página de preços da Anthropic, 10 $ de input / 50 $ de output. O barato ficou mais barato <em>e</em> o caro ficou mais caro. Na quinta-feira veio ainda o Kimi K3, um modelo chinês de 2,8 trilhões de parâmetros cujos pesos abertos, no entanto, ainda não existem: estão <em>prometidos</em> para 27/07. Para você, o dia significa acima de tudo uma coisa — seu orçamento de agentes está de novo negociável, e vale a pena recalcular em vez de simplesmente acreditar.</p>\n    <ul>\n      <li><span class=\"chip hot\">PREÇO</span> <strong>Guerra de preços embaixo, camada premium em cima</strong>: Grok 4.5 (6 $/M output), GPT-5.6 Luna (6 $/M) e Muse Spark 1.1 (4,25 $/M) contra Kimi K3 (15 $/M), Opus 4.8 (25 $/M), GPT-5.6 Sol (30 $/M) — e acima disso o Claude Fable 5, com 50 $/M.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 chegou — mas só como API</strong>: 2,8 tri. de parâmetros, 1 mi. de contexto, 15 $/M output. Os pesos abertos foram anunciados para 27/07 e hoje ainda não estão disponíveis em lugar nenhum.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Ceticismo obrigatório</strong>: o K3 está no índice 57 da Artificial Analysis (posição 4 de 187). A tabela de pontos da \"Frontend Code Arena\" que está circulando <em>não</em> pudemos verificar — por isso ela não aparece aqui.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> traz o FlexAttention para o Apple Silicon/MPS. O tão citado ganho de 12,3× vale para um padrão de sliding-window <em>muito</em> esparso — não de forma geral.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Anaconda compra o Kilo Code</strong> (15/07): o agente de coding agnóstico de modelo, com 3 mi. de desenvolvedores e ~10 tri. de tokens/mês, passa para um fornecedor de Python enterprise.</li>\n      <li><span class=\"chip good\">MCP</span> <strong>Gemini Managed Agents</strong> agora podem rodar em segundo plano de forma assíncrona (<code>background: true</code>) e acessar servidores MCP remotos a partir do sandbox do Google.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-call</strong>: Cline entrega em ritmo acelerado (21 releases em julho), Copilot CLI semanalmente — Continue parado há quatro semanas, Plandex há um ano, Aider sem release datado.</li>\n      <li><span class=\"chip\">Fonte</span> <strong>Transparência</strong>: x.ai e openai.com devolveram HTTP 403 no momento da consulta. Os números do Grok e do GPT-5.6 abaixo vêm, por isso, do TechCrunch e do Simon Willison.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Julio de 2026 separó la horquilla de precios de los modelos de programación — en las dos direcciones. En un lapso de 24 a 48 horas, a comienzos del mes aterrizaron tres modelos insignia con precios de salida de entre $4,25 y $6 por millón de tokens, justo donde la élite establecida cobra entre $15 y $30. Al mismo tiempo, por encima de los antiguos modelos insignia surgió una nueva capa premium: según la propia página de precios de Anthropic, Claude Fable 5 cuesta $10 de entrada / $50 de salida por millón de tokens. Lo barato se abarató y lo caro se encareció. A eso se sumó el jueves Kimi K3, un modelo de 2,8 billones de parámetros originario de China, cuyos pesos abiertos, sin embargo, todavía no existen: están prometidos para el 27/07. Para ti, el día de hoy significa sobre todo una cosa — tu presupuesto de agentes está en plena renegociación, y vale la pena hacer las cuentas en lugar de creérselo sin más.</p>\n    <ul>\n      <li><span class=\"chip hot\">PRECIO</span> <strong>Guerra de precios abajo, capa premium arriba</strong>: Grok 4.5 ($6/M de salida), GPT-5.6 Luna ($6/M) y Muse Spark 1.1 ($4,25/M) frente a Kimi K3 ($15/M), Opus 4.8 ($25/M), GPT-5.6 Sol ($30/M) — y por encima, Claude Fable 5 con $50/M.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3 ya está aquí — pero solo como API</strong>: 2,8 billones de parámetros, 1 millón de contexto, $15/M de salida. Los pesos abiertos están anunciados para el 27/07 y hoy todavía no están disponibles en ningún lado.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Escepticismo obligatorio</strong>: K3 tiene un índice de 57 en Artificial Analysis (puesto 4 de 187). La tabla de puntajes de Frontend Code Arena que está circulando <em>no</em> pudimos verificarla — por eso no aparece aquí.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> trae FlexAttention a Apple Silicon/MPS. El tan citado aumento de velocidad de 12,3× aplica a un patrón de ventana deslizante <em>muy</em> disperso — no de forma general.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Anaconda compra Kilo Code</strong> (15/07): el agente de programación agnóstico de modelo, con 3 millones de desarrolladores y ~10 billones de tokens al mes, pasa a manos de un proveedor de Python empresarial.</li>\n      <li><span class=\"chip good\">MCP</span> <strong>Gemini Managed Agents</strong> ya pueden ejecutarse en segundo plano de forma asíncrona (<code>background: true</code>) y acceder a servidores MCP remotos desde el sandbox de Google.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Pasando lista</strong>: Cline entrega sin parar (21 versiones en julio), Copilot CLI semanalmente — Continue en silencio desde hace cuatro semanas, Plandex desde hace un año, Aider sin versión con fecha.</li>\n      <li><span class=\"chip\">Fuente</span> <strong>Transparencia</strong>: x.ai y openai.com devolvieron ambos un HTTP 403 al momento de la consulta. Por eso las cifras de Grok y GPT-5.6 de más abajo provienen de TechCrunch y de Simon Willison, respectivamente.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Seit dem <strong>08.07.2026</strong> ist der „Digital Omnibus\" zur KI-Verordnung unterschrieben und wartet nur noch aufs Amtsblatt. Die Erzählung der letzten Monate lautete: „Am 2. August wird es ernst.\" Sie ist jetzt zur Hälfte falsch — und die falsche Hälfte ist ausgerechnet die, die alle wiederholen. Die schweren <strong>Hochrisiko-Pflichten rutschen um 16 Monate auf den 02.12.2027</strong>, produkt-eingebettete auf 2028. Was <em>nicht</em> verschoben wurde, ist die kleine, langweilige Pflicht, die fast jeden betrifft, der irgendwo einen Chatbot oder generierten Text ausliefert: <strong>Artikel 50, Transparenz, ab 02.08.2026</strong> — in 13 Tagen. Wer die beiden Uhren verwechselt, startet im August ein Projekt gegen eine Frist von 2027 und verpasst die von 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Digital Omnibus unterzeichnet am 08.07.2026</strong>, Amtsblatt steht aus; Inkrafttreten drei Tage danach.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Verschoben:</strong> Hochrisiko (Anhang III) von 02.08.2026 auf <strong>02.12.2027</strong>; produkt-eingebettet (Anhang I) auf <strong>02.08.2028</strong>.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Nicht verschoben:</strong> Art.-50-Transparenz ab <strong>02.08.2026</strong>. Nur das maschinenlesbare Markieren hat für Bestandssysteme Schonfrist bis 02.12.2026.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Preise fallen, Rechnungen steigen:</strong> Atlassian verdreifachte seine KI-Kosten „von 5 Mio. $\" — und liegt <strong>~120 Mio. $</strong> aufs Gesamtjahr hochgerechnet; die Flatrate ist beendet. Citi sperrte zeitweise neue Modelle.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>SAP/Oxford Economics</strong> (17.07., 2.600 Führungskräfte): deutsche Firmen erwarten <strong>24 %</strong> KI-Rendite 2026 — nur <strong>4 %</strong> fühlen sich für Agenten gerüstet. Anbieter-finanziert.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Febraban:</strong> R$ 50,4 Mrd. IT-Budget 2026, KI-Investitionen <strong>R$ 596 → 826 Mio.</strong> (+39 %), ROI-Wahrnehmung <strong>5 % → 19 %</strong>. Bradesco: 600 Anwendungsfälle produktiv.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Brasilien reguliert an der Seitentür:</strong> die ANPD positioniert sich als residuale KI-Aufsicht, während PL 2338/2023 in der Câmara feststeckt.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Zwei Dauerbrenner-Zahlen sind alt:</strong> Gartners „40 % Abbruchquote\" ist vom <strong>25.06.2025</strong>, MITs „95 % ohne Ergebnis\" vom August 2025 — beide zirkulieren als frische Erkenntnis.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: ein <strong>Art.-50-Sichtbarkeits-Audit</strong> als 13-Tage-Produkt — und ein <strong>KI-Kosten-Riegel</strong> für Firmen, die merken, dass billige Tokens teure Rechnungen ergeben.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Seit dem <strong>08.07.2026</strong> ist der „Digital Omnibus\" zur KI-Verordnung unterschrieben und wartet nur noch aufs Amtsblatt. Die Erzählung der letzten Monate lautete: „Am 2. August wird es ernst.\" Sie ist jetzt zur Hälfte falsch — und die falsche Hälfte ist ausgerechnet die, die alle wiederholen. Die schweren <strong>Hochrisiko-Pflichten rutschen um 16 Monate auf den 02.12.2027</strong>, produkt-eingebettete auf 2028. Was <em>nicht</em> verschoben wurde, ist die kleine, langweilige Pflicht, die fast jeden betrifft, der irgendwo einen Chatbot oder generierten Text ausliefert: <strong>Artikel 50, Transparenz, ab 02.08.2026</strong> — in 13 Tagen. Wer die beiden Uhren verwechselt, startet im August ein Projekt gegen eine Frist von 2027 und verpasst die von 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Digital Omnibus unterzeichnet am 08.07.2026</strong>, Amtsblatt steht aus; Inkrafttreten drei Tage danach.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Verschoben:</strong> Hochrisiko (Anhang III) von 02.08.2026 auf <strong>02.12.2027</strong>; produkt-eingebettet (Anhang I) auf <strong>02.08.2028</strong>.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Nicht verschoben:</strong> Art.-50-Transparenz ab <strong>02.08.2026</strong>. Nur das maschinenlesbare Markieren hat für Bestandssysteme Schonfrist bis 02.12.2026.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Preise fallen, Rechnungen steigen:</strong> Atlassian verdreifachte seine KI-Kosten „von 5 Mio. $\" — und liegt <strong>~120 Mio. $</strong> aufs Gesamtjahr hochgerechnet; die Flatrate ist beendet. Citi sperrte zeitweise neue Modelle.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>SAP/Oxford Economics</strong> (17.07., 2.600 Führungskräfte): deutsche Firmen erwarten <strong>24 %</strong> KI-Rendite 2026 — nur <strong>4 %</strong> fühlen sich für Agenten gerüstet. Anbieter-finanziert.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Febraban:</strong> R$ 50,4 Mrd. IT-Budget 2026, KI-Investitionen <strong>R$ 596 → 826 Mio.</strong> (+39 %), ROI-Wahrnehmung <strong>5 % → 19 %</strong>. Bradesco: 600 Anwendungsfälle produktiv.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Brasilien reguliert an der Seitentür:</strong> die ANPD positioniert sich als residuale KI-Aufsicht, während PL 2338/2023 in der Câmara feststeckt.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Zwei Dauerbrenner-Zahlen sind alt:</strong> Gartners „40 % Abbruchquote\" ist vom <strong>25.06.2025</strong>, MITs „95 % ohne Ergebnis\" vom August 2025 — beide zirkulieren als frische Erkenntnis.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: ein <strong>Art.-50-Sichtbarkeits-Audit</strong> als 13-Tage-Produkt — und ein <strong>KI-Kosten-Riegel</strong> für Firmen, die merken, dass billige Tokens teure Rechnungen ergeben.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Since <strong>July 8, 2026</strong>, the \"Digital Omnibus\" amending the AI Act has been signed and is only waiting on Official Journal publication. The story of the last few months has been: \"Things get serious on August 2.\" That's now half wrong — and the wrong half is, of all things, the one everyone keeps repeating. The heavy <strong>high-risk obligations slide 16 months to December 2, 2027</strong>, product-embedded ones to 2028. What was <em>not</em> deferred is the small, boring obligation that affects almost anyone shipping a chatbot or generated text anywhere: <strong>Article 50, transparency, effective August 2, 2026</strong> — in 13 days. Whoever confuses the two clocks starts a project in August against a 2027 deadline and misses the one from 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Digital Omnibus signed on July 8, 2026</strong>, Official Journal publication pending; takes effect three days after.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Postponed:</strong> high-risk (Annex III) from August 2, 2026 to <strong>December 2, 2027</strong>; product-embedded (Annex I) to <strong>August 2, 2028</strong>.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Not postponed:</strong> Art. 50 transparency from <strong>August 2, 2026</strong>. Only machine-readable marking has a grace period for existing systems, until December 2, 2026.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Prices fall, bills rise:</strong> Atlassian tripled its AI costs \"from $5M\" — and is tracking to <strong>~$120M</strong> for the full fiscal year; the flat rate is gone. Citi temporarily blocked new models.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>SAP/Oxford Economics</strong> (July 17, 2,600 executives): German companies expect <strong>24%</strong> AI ROI in 2026 — only <strong>4%</strong> feel ready for agents. Vendor-funded.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Febraban:</strong> R$50.4B IT budget for 2026, AI investment <strong>R$596M → 826M</strong> (+39%), perceived ROI <strong>5% → 19%</strong>. Bradesco: 600 use cases in production.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Brazil regulates through the side door:</strong> the ANPD is positioning itself as residual AI oversight while PL 2338/2023 stays stuck in the Câmara.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Two evergreen numbers are old:</strong> Gartner's \"40% cancellation rate\" is from June 25, 2025, MIT's \"95% no result\" from August 2025 — both still circulate as fresh findings.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas: an <strong>Art. 50 visibility audit</strong> as a 13-day product — and an <strong>AI cost brake</strong> for companies discovering that cheap tokens add up to expensive bills.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Desde <strong>08/07/2026</strong>, o \"Digital Omnibus\" relativo à Lei de IA da UE está assinado e só falta a publicação no Jornal Oficial. A narrativa dos últimos meses era: \"No dia 2 de agosto, vai ficar sério.\" Agora ela está pela metade errada — e justamente a metade errada é a que todo mundo repete. As pesadas <strong>obrigações de alto risco escorregam 16 meses, para 02/12/2027</strong>, e as embutidas em produtos vão para 2028. O que <em>não</em> foi adiado é a obrigação pequena e chata que atinge quase todo mundo que entrega, em algum lugar, um chatbot ou texto gerado: <strong>Artigo 50, transparência, a partir de 02/08/2026</strong> — em 13 dias. Quem confunde os dois relógios começa em agosto um projeto contra um prazo de 2027 e perde o de 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Digital Omnibus assinado em 08/07/2026</strong>, falta a publicação no Jornal Oficial; entrada em vigor três dias depois.</li>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Adiado:</strong> alto risco (Anexo III) de 02/08/2026 para <strong>02/12/2027</strong>; embutido em produto (Anexo I) para <strong>02/08/2028</strong>.</li>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Não adiado:</strong> transparência do Art. 50 a partir de <strong>02/08/2026</strong>. Só a marcação legível por máquina tem prazo de carência até 02/12/2026 para sistemas já existentes.</li>\n      <li><span class=\"chip\">ECONOMIA · Global</span> <strong>Preços caem, contas sobem:</strong> a Atlassian triplicou seus custos de IA \"de US$ 5 milhões\" — e projeta <strong>~US$ 120 milhões</strong> para o ano fiscal completo; o plano ilimitado acabou. a Citi bloqueou temporariamente novos modelos.</li>\n      <li><span class=\"chip\">ESTUDO · DE</span> <strong>SAP/Oxford Economics</strong> (17/07, 2.600 executivos): empresas alemãs esperam <strong>24 %</strong> de retorno de IA em 2026 — só <strong>4 %</strong> se sentem preparadas para agentes. Financiado por fornecedor.</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO · BR</span> <strong>Febraban:</strong> R$ 50,4 bi de orçamento de TI para 2026, investimentos em IA <strong>R$ 596 → 826 milhões</strong> (+39 %), percepção de ROI <strong>5 % → 19 %</strong>. Bradesco: 600 casos de uso em produção.</li>\n      <li><span class=\"chip\">REGULAÇÃO · BR</span> <strong>O Brasil regula pela porta lateral:</strong> a ANPD se posiciona como fiscalização residual de IA, enquanto o PL 2338/2023 fica travado na Câmara.</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>Dois números clássicos são velhos:</strong> os \"40 % de taxa de cancelamento\" da Gartner são de <strong>25/06/2025</strong>, os \"95 % sem resultado\" do MIT, de agosto de 2025 — os dois circulam como se fossem descobertas recentes.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias: uma <strong>auditoria de visibilidade do Art. 50</strong> como produto de 13 dias — e um <strong>freio de custo de IA</strong> para empresas que estão percebendo que tokens baratos viram contas caras.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Desde el <strong>08/07/2026</strong>, el «Digital Omnibus» del Reglamento de IA está firmado y solo espera su publicación en el Diario Oficial. El relato de los últimos meses decía: «El 2 de agosto se pone serio.» Ahora es a medias falso — y justo la mitad falsa es la que todos repiten. Las pesadas <strong>obligaciones de alto riesgo se corren 16 meses, hasta el 02/12/2027</strong>; las incorporadas en productos, hasta 2028. Lo que <em>no</em> se aplazó es la obligación pequeña y aburrida que afecta a casi cualquiera que entregue en algún lugar un chatbot o texto generado: <strong>el Artículo 50, transparencia, desde el 02/08/2026</strong> — en 13 días. Quien confunde ambos relojes arranca en agosto un proyecto contra un plazo de 2027 y se pierde el de 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Digital Omnibus firmado el 08/07/2026</strong>, pendiente el Diario Oficial; entra en vigor tres días después.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Aplazado:</strong> alto riesgo (Anexo III) del 02/08/2026 al <strong>02/12/2027</strong>; incorporado en productos (Anexo I) al <strong>02/08/2028</strong>.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>No aplazado:</strong> transparencia del Art. 50 desde el <strong>02/08/2026</strong>. Solo el marcado legible por máquina tiene plazo de gracia hasta el 02/12/2026 para sistemas ya existentes.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Los precios bajan, las facturas suben:</strong> Atlassian triplicó sus costos de IA «desde 5 millones de dólares» — y proyecta <strong>~120 millones</strong> para el año fiscal completo; la tarifa plana desapareció. Citi bloqueó temporalmente modelos nuevos.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>SAP/Oxford Economics</strong> (17/07, 2.600 directivos): las empresas alemanas esperan un <strong>24 %</strong> de retorno de la IA en 2026 — solo el <strong>4 %</strong> se siente preparado para agentes. Financiado por el proveedor.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Febraban:</strong> R$ 50,4 mil millones de presupuesto de TI 2026, inversión en IA <strong>R$ 596 → 826 millones</strong> (+39 %), percepción de ROI <strong>5 % → 19 %</strong>. Bradesco: 600 casos de uso en producción.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Brasil regula por la puerta trasera:</strong> la ANPD se posiciona como autoridad residual de supervisión de IA, mientras el PL 2338/2023 sigue estancado en la Câmara.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Dos cifras recurrentes son viejas:</strong> la «tasa de cancelación del 40 %» de Gartner es del <strong>25/06/2025</strong>, el «95 % sin resultados» del MIT es de agosto de 2025 — ambas circulan como hallazgos recientes.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas: una <strong>auditoría de visibilidad del Art. 50</strong> como producto de 13 días — y un <strong>freno de costos de IA</strong> para empresas que descubren que los tokens baratos generan facturas caras.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der Wochenstart hat <strong>zwölf neue Projekte</strong> ins Board gerollt — aber die Zahl des Tages steht nicht im Board. Ein Bericht vom <strong>19.07.2026</strong> schreibt <strong>101.743 von 139.156</strong> in den <strong>USA</strong> gestrichenen Tech-Stellen direkt der KI zu, rund drei Viertel, und <strong>83 %</strong> mehr Entlassungen als im Vorjahreszeitraum. Datenbasis ist die US-Auswertung von <strong>Challenger, Gray &amp; Christmas</strong> (139.156 Stellenstreichungen bei US-Tech-Arbeitgebern Jan–Jun 2026 gegen 76.214 im Vorjahreszeitraum) — es ist ausdrücklich <em>keine</em> weltweite Zählung.<sup>[3]</sup> Das klingt nach schlechter Nachricht und ist für Daniel zunächst keine: Derselbe Bericht nennt <strong>71 %</strong> der ausgeschriebenen Entwicklerstellen als ausdrücklich nur für Erfahrene geöffnet — eine Angabe, die sich nur in dieser einen Quelle findet (Einordnung unten). Der Markt schrumpft nicht gleichmäßig — er schrumpft am Einstieg und verdichtet sich oben. Was er dabei nicht mehr tut: teurer werden. <strong>Eine</strong> Erhebung aus 2026 — der Freelancer-Kompass — spannt in zwei verschiedenen Schnitten den DACH-Korridor bei <strong>95 bis 103 €/h</strong> auf, und der obere Wert ist der erste gemessene Rückgang seit Beginn dieser Erhebung 2016.</p>\n    <ul>\n      <li><span class=\"chip hot\">Layoffs</span> <strong>101.743 von 139.156 US-Tech-Kündigungen KI-attribuiert</strong> — Challenger-Daten für Jan–Jun 2026 (gegen 76.214 im Vorjahreszeitraum, <strong>+83 %</strong>), Bericht vom 19.07.2026. <strong>US-Zahlen, nicht weltweit.</strong> Genannte Einzelfälle: Meta rund <strong>8.000</strong> (Mai 2026), Microsoft <strong>4.800</strong> (Juli 2026).<sup>[3]</sup></li>\n      <li><span class=\"chip good\">Senior</span> <strong>71 % Senior-only bei Entwicklerstellen — gegenläufiges Signal, aber nur einfach belegt</strong>: Die Zahl steht in genau einer Quelle, und die einzige gefundene Nachbarangabe ist anders geschnitten (71 % des <em>Zuwachses</em> an Dev-Ausschreibungen Mai 2025–Mai 2026 waren Senior-Rollen). Richtung stimmt, der genaue Nenner ist unbestätigt.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Rate</span> <strong>Korridor 95–103 €/h — eine Erhebung, zwei Schnitte</strong>: Der freelancermap-Blog vom <strong>02.07.2026</strong> nennt den <strong>Median 95 €/h</strong> für IT-Freelancer (Software &amp; Web Development 90 €, SAP/ERP 120 €) und beruft sich dabei ausdrücklich auf den <strong>Freelancer-Kompass 2026</strong><sup>[2]</sup> — dieselbe Erhebung, aus der auch der DACH-weite <strong>Durchschnitt von 103 €/h</strong> über alle Branchen stammt.<sup>[1]</sup> Kein Widerspruch, aber auch keine unabhängige Bestätigung: Median gegen Mittelwert, IT-only gegen alle Branchen.</li>\n      <li><span class=\"chip hot\">Rate</span> <strong>Erster Rückgang seit 2016 — und das Monatseinkommen bricht stärker ein</strong>: 103 €/h nach 104 €/h, aber das monatliche Projekteinkommen fällt von <strong>8.022 € auf 6.653 €</strong>, rund <strong>17 %</strong>. Nicht der Preis pro Stunde bröckelt, sondern die Auslastung.<sup>[1]</sup></li>\n      <li><span class=\"chip\">Auslastung</span> <strong>24 % der Befragten waren im Vorjahr an weniger als 50 Tagen mit Projekten ausgelastet</strong>, <strong>62 %</strong> nennen Kundenakquise als größte Herausforderung.<sup>[1]</sup></li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board auf 149</strong> (gestern 137, <strong>12 neu</strong>, keines gefallen): 128 Freelance / 12 Employee / 9 Intriguing, Ø Fit <strong>61,4</strong>, <strong>17</strong> ≥ 80, <strong>42</strong> ≥ 70. Spitze unverändert bei Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Der Stack-Mix bleibt der gleiche</strong>: Java <strong>68×</strong>, Angular 48×, Spring Boot 48×, Kubernetes 31×, AWS 27×, TypeScript 27×, AI-Integration 23×; <strong>124</strong> von 149 Einträgen mit Remote-Tag.</li>\n      <li><span class=\"chip warn\">Gates</span> <strong>Fünf Listings sind bewusst mit 0 auf Standort und Spur bewertet</strong> — vier verlangen eine deutsche <strong>SÜ2</strong>, eines eine britische <strong>SC-Clearance</strong>. Beide setzen Wohnsitz im jeweiligen Land voraus, was mit Brasilien kollidiert. Sie bleiben sichtbar, sind aber keine Gelegenheit.</li>\n      <li><span class=\"chip\">TED</span> <strong>Vier Ausschreibungen mit Volltext gezogen, null direkte Treffer</strong>: jede hat einen konkreten Auslöser — Umsatzschwelle, FTE-Untergrenze, Zertifikat oder SÜ2 — und in keiner der ausgewerteten Anforderungstexte taucht Java oder Angular ausdrücklich auf.<sup>[7][8][9][10]</sup></li>\n      <li><span class=\"chip warn\">Struktur</span> <strong>Zwei Dauer-Baustellen, keine Tagesnachricht</strong>: Zwischen Deutschland und Brasilien gilt seit dem <strong>31.12.2005 kein Doppelbesteuerungsabkommen</strong> mehr<sup>[6]</sup>, und die Reform des Statusfeststellungsverfahrens ist weiterhin <strong>Referentenentwurf</strong> mit Zieldatum <strong>01.01.2028</strong> — kein geltendes Recht.<sup>[5]</sup></li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>13 von 149 datiert, 11 mit Listing-eigener Rate</strong>. Zwei Zahlen werden hier <em>nicht</em> als aktuell geführt: die Bitkom-Lücke von 109.000 IT-Fachkräften stammt vom <strong>07.08.2025</strong><sup>[4]</sup>, und eine kursierende 96-€-Stundensatz-Meldung beruht auf einer Erhebung von <strong>2022</strong>.</li>\n    </ul></div>",

e gefundene Nachbarangabe ist anders geschnitten (71 % des <em>Zuwachses</em> an Dev-Ausschreibungen Mai 2025–Mai 2026 waren Senior-Rollen). Richtung stimmt, der genaue Nenner ist unbestätigt.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Rate</span> <strong>Korridor 95–103 €/h — eine Erhebung, zwei Schnitte</strong>: Der freelancermap-Blog vom <strong>02.07.2026</strong> nennt den <strong>Median 95 €/h</strong> für IT-Freelancer (Software &amp; Web Development 90 €, SAP/ERP 120 €) und beruft sich dabei ausdrücklich auf den <strong>Freelancer-Kompass 2026</strong><sup>[2]</sup> — dieselbe Erhebung, aus der auch der DACH-weite <strong>Durchschnitt von 103 €/h</strong> über alle Branchen stammt.<sup>[1]</sup> Kein Widerspruch, aber auch keine unabhängige Bestätigung: Median gegen Mittelwert, IT-only gegen alle Branchen.</li>\n      <li><span class=\"chip hot\">Rate</span> <strong>Erster Rückgang seit 2016 — und das Monatseinkommen bricht stärker ein</strong>: 103 €/h nach 104 €/h, aber das monatliche Projekteinkommen fällt von <strong>8.022 € auf 6.653 €</strong>, rund <strong>17 %</strong>. Nicht der Preis pro Stunde bröckelt, sondern die Auslastung.<sup>[1]</sup></li>\n      <li><span class=\"chip\">Auslastung</span> <strong>24 % der Befragten waren im Vorjahr an weniger als 50 Tagen mit Projekten ausgelastet</strong>, <strong>62 %</strong> nennen Kundenakquise als größte Herausforderung.<sup>[1]</sup></li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board auf 149</strong> (gestern 137, <strong>12 neu</strong>, keines gefallen): 128 Freelance / 12 Employee / 9 Intriguing, Ø Fit <strong>61,4</strong>, <strong>17</strong> ≥ 80, <strong>42</strong> ≥ 70. Spitze unverändert bei Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Der Stack-Mix bleibt der gleiche</strong>: Java <strong>68×</strong>, Angular 48×, Spring Boot 48×, Kubernetes 31×, AWS 27×, TypeScript 27×, AI-Integration 23×; <strong>124</strong> von 149 Einträgen mit Remote-Tag.</li>\n      <li><span class=\"chip warn\">Gates</span> <strong>Fünf Listings sind bewusst mit 0 auf Standort und Spur bewertet</strong> — vier verlangen eine deutsche <strong>SÜ2</strong>, eines eine britische <strong>SC-Clearance</strong>. Beide setzen Wohnsitz im jeweiligen Land voraus, was mit Brasilien kollidiert. Sie bleiben sichtbar, sind aber keine Gelegenheit.</li>\n      <li><span class=\"chip\">TED</span> <strong>Vier Ausschreibungen mit Volltext gezogen, null direkte Treffer</strong>: jede hat einen konkreten Auslöser — Umsatzschwelle, FTE-Untergrenze, Zertifikat oder SÜ2 — und in keiner der ausgewerteten Anforderungstexte taucht Java oder Angular ausdrücklich auf.<sup>[7][8][9][10]</sup></li>\n      <li><span class=\"chip warn\">Struktur</span> <strong>Zwei Dauer-Baustellen, keine Tagesnachricht</strong>: Zwischen Deutschland und Brasilien gilt seit dem <strong>31.12.2005 kein Doppelbesteuerungsabkommen</strong> mehr<sup>[6]</sup>, und die Reform des Statusfeststellungsverfahrens ist weiterhin <strong>Referentenentwurf</strong> mit Zieldatum <strong>01.01.2028</strong> — kein geltendes Recht.<sup>[5]</sup></li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>13 von 149 datiert, 11 mit Listing-eigener Rate</strong>. Zwei Zahlen werden hier <em>nicht</em> als aktuell geführt: die Bitkom-Lücke von 109.000 IT-Fachkräften stammt vom <strong>07.08.2025</strong><sup>[4]</sup>, und eine kursierende 96-€-Stundensatz-Meldung beruht auf einer Erhebung von <strong>2022</strong>.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, the start of the week rolled <strong>twelve new projects</strong> onto the board — but today's number isn't in the board. A report from <strong>July 19, 2026</strong> attributes <strong>101,743 of 139,156</strong> US tech positions cut directly to AI, roughly three-quarters, and <strong>83%</strong> more layoffs than in the same period last year. The data comes from the US analysis by <strong>Challenger, Gray &amp; Christmas</strong> (139,156 job cuts at US tech employers Jan–Jun 2026 versus 76,214 in the same period the year before) — explicitly not a worldwide count.<sup>[3]</sup> That sounds like bad news, and for Daniel, at first it isn't: the same report puts <strong>71%</strong> of posted developer positions as explicitly open only to experienced hires — a figure found in only this one source (more on that below). The market isn't shrinking evenly — it's shrinking at the entry level and getting denser at the top. What it's no longer doing, though: getting more expensive. <strong>One</strong> 2026 survey — the Freelancer Compass — spans the DACH corridor at <strong>€95 to €103/h</strong> across two different cuts, and the upper figure marks the first measured decline since this survey began in 2016.</p>\n    <ul>\n      <li><span class=\"chip hot\">Layoffs</span> <strong>101,743 of 139,156 US tech layoffs AI-attributed</strong> — Challenger data for Jan–Jun 2026 (versus 76,214 in the same period last year, <strong>+83%</strong>), report dated July 19, 2026. <strong>US figures, not worldwide.</strong> Named cases: Meta around <strong>8,000</strong> (May 2026), Microsoft <strong>4,800</strong> (July 2026).<sup>[3]</sup></li>\n      <li><span class=\"chip good\">Senior</span> <strong>71% senior-only for developer positions — an encouraging signal, but single-sourced</strong>: the figure appears in exactly one source, and the only comparable figure found is scoped differently (71% of the growth in dev postings May 2025–May 2026 were senior roles). The direction holds, the exact denominator is unconfirmed.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Rate</span> <strong>€95–103/h corridor — one survey, two cuts</strong>: the freelancermap blog from <strong>July 2, 2026</strong> cites a <strong>median of €95/h</strong> for IT freelancers (software &amp; web development €90, SAP/ERP €120) and explicitly cites the <strong>2026 Freelancer Compass</strong><sup>[2]</sup> as its source — the same survey that also produced the DACH-wide <strong>average of €103/h</strong> across all industries.<sup>[1]</sup> No contradiction, but no independent confirmation either: median vs. mean, IT-only vs. all industries.</li>\n      <li><span class=\"chip hot\">Rate</span> <strong>First decline since 2016 — and monthly income is falling harder</strong>: €103/h after €104/h, but monthly project income drops from <strong>€8,022 to €6,653</strong>, around <strong>17%</strong>. It's not the hourly price that's crumbling, it's utilization.<sup>[1]</sup></li>\n      <li><span class=\"chip\">Utilization</span> <strong>24% of respondents had project work on fewer than 50 days over the past year</strong>, <strong>62%</strong> name client acquisition as their biggest challenge.<sup>[1]</sup></li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board at 149</strong> (yesterday 137, <strong>12 new</strong>, none dropped): 128 Freelance / 12 Employee / 9 Intriguing, avg. Fit <strong>61.4</strong>, <strong>17</strong> ≥ 80, <strong>42</strong> ≥ 70. Top spot unchanged at Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>The stack mix stays the same</strong>: Java <strong>68×</strong>, Angular 48×, Spring Boot 48×, Kubernetes 31×, AWS 27×, TypeScript 27×, AI integration 23×; <strong>124</strong> of 149 listings carry a remote tag.</li>\n      <li><span class=\"chip warn\">Gates</span> <strong>Five listings are deliberately scored 0 on location and track</strong> — four require a German <strong>SÜ2</strong>, one a British <strong>SC clearance</strong>. Both require residency in the respective country, which conflicts with Brazil. They stay visible, but they are not an opportunity.</li>\n      <li><span class=\"chip\">TED</span> <strong>Four tenders pulled with full text, zero direct matches</strong>: each has a specific blocker — revenue threshold, FTE minimum, certificate, or SÜ2 — and none of the reviewed requirement texts explicitly mentions Java or Angular.<sup>[7][8][9][10]</sup></li>\n      <li><span class=\"chip warn\">Structure</span> <strong>Two ongoing issues, not today's news</strong>: between Germany and Brazil, no <strong>double taxation treaty has applied since December 31, 2005</strong><sup>[6]</sup>, and the reform of the status determination process is still a <strong>ministerial draft</strong> targeting <strong>January 1, 2028</strong> — not yet law.<sup>[5]</sup></li>\n      <li><span class=\"chip\">Data Quality</span> <strong>13 of 149 dated, 11 with a listing's own rate</strong>. Two figures are <em>not</em> carried here as current: the Bitkom gap of 109,000 IT professionals dates from <strong>August 7, 2025</strong><sup>[4]</sup>, and a circulating €96 hourly-rate figure is based on a survey from <strong>2022</strong>.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, o início da semana trouxe <strong>doze novos projetos</strong> para o board — mas o número do dia não está no board. Uma reportagem de <strong>19/07/2026</strong> atribui <strong>101.743 de 139.156</strong> vagas de tecnologia cortadas nos <strong>Estados Unidos</strong> diretamente à IA, cerca de três quartos, e <strong>83 %</strong> mais demissões do que no mesmo período do ano anterior. A base de dados é o levantamento americano da <strong>Challenger, Gray &amp; Christmas</strong> (139.156 cortes de vagas em empregadores de tecnologia dos EUA em jan–jun de 2026, ante 76.214 no mesmo período do ano anterior) — não é, portanto, uma contagem mundial.<sup>[3]</sup> Isso soa como má notícia e, à primeira vista, não é para Daniel: a mesma reportagem aponta que <strong>71 %</strong> das vagas de desenvolvedor anunciadas estão explicitamente abertas apenas a profissionais experientes — um dado que aparece apenas nessa fonte (mais adiante). O mercado não encolhe de forma uniforme — encolhe na entrada e se adensa no topo. O que ele não faz mais: ficar mais caro. <strong>Uma</strong> pesquisa de 2026 — o Freelancer-Kompass — delimita, em dois recortes diferentes, o corredor DACH entre <strong>95 e 103 €/h</strong>, e o valor superior é a primeira queda medida desde o início desse levantamento, em 2016.</p>\n    <ul>\n      <li><span class=\"chip hot\">Layoffs</span> <strong>101.743 de 139.156 demissões em tecnologia nos EUA atribuídas à IA</strong> — dados da Challenger para jan–jun de 2026 (ante 76.214 no mesmo período do ano anterior, <strong>+83 %</strong>), reportagem de 19/07/2026. <strong>Números dos EUA, não mundiais.</strong> Casos citados nominalmente: Meta, cerca de <strong>8.000</strong> (maio de 2026), Microsoft, <strong>4.800</strong> (julho de 2026).<sup>[3]</sup></li>\n      <li><span class=\"chip good\">Senior</span> <strong>71 % de vagas sênior entre os anúncios de desenvolvedor — sinal oposto, mas apenas de fonte única</strong>: o número aparece em exatamente uma fonte, e o único dado vizinho encontrado tem outro recorte (71 % do <em>aumento</em> de anúncios de desenvolvedor entre maio de 2025 e maio de 2026 eram vagas sênior). A direção está correta, o denominador exato não está confirmado.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Taxa</span> <strong>Corredor de 95–103 €/h — um levantamento, dois recortes</strong>: o blog da freelancermap, de <strong>02/07/2026</strong>, aponta a <strong>mediana de 95 €/h</strong> para freelancers de TI (Software &amp; Web Development 90 €, SAP/ERP 120 €) e cita explicitamente o <strong>Freelancer-Kompass 2026</strong><sup>[2]</sup> como fonte — o mesmo levantamento de onde também vem a <strong>média de 103 €/h</strong> para toda a região DACH, em todos os setores.<sup>[1]</sup> Não há contradição, mas também não há confirmação independente: mediana contra média, apenas TI contra todos os setores.</li>\n      <li><span class=\"chip hot\">Taxa</span> <strong>Primeira queda desde 2016 — e a renda mensal cai ainda mais</strong>: 103 €/h ante 104 €/h, mas a renda mensal de projetos cai de <strong>8.022 € para 6.653 €</strong>, cerca de <strong>17 %</strong>. Não é o preço por hora que está se corroendo, e sim a utilização.<sup>[1]</sup></li>\n      <li><span class=\"chip\">Utilização</span> <strong>24 % dos entrevistados estiveram ocupados com projetos em menos de 50 dias no último ano</strong>, <strong>62 %</strong> citam a prospecção de clientes como maior desafio.<sup>[1]</sup></li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board em 149</strong> (ontem 137, <strong>12 novos</strong>, nenhum saiu): 128 Freelance / 12 Employee / 9 Intriguing, Fit médio <strong>61,4</strong>, <strong>17</strong> ≥ 80, <strong>42</strong> ≥ 70. Topo inalterado em Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>O mix de stack continua o mesmo</strong>: Java <strong>68×</strong>, Angular 48×, Spring Boot 48×, Kubernetes 31×, AWS 27×, TypeScript 27×, integração de IA 23×; <strong>124</strong> das 149 vagas com tag remota.</li>\n      <li><span class=\"chip warn\">Bloqueios</span> <strong>Cinco vagas foram deliberadamente pontuadas com 0 em local e trilha</strong> — quatro exigem a verificação de segurança alemã <strong>SÜ2</strong>, uma exige a <strong>SC-Clearance</strong> britânica. Ambas pressupõem residência no respectivo país, o que colide com o Brasil. Continuam visíveis, mas não são uma oportunidade.</li>\n      <li><span class=\"chip\">TED</span> <strong>Quatro licitações analisadas na íntegra, zero acertos diretos</strong>: cada uma tem um obstáculo concreto — limite de faturamento, piso de FTE, certificado ou SÜ2 — e em nenhum dos textos de requisitos avaliados Java ou Angular aparece explicitamente.<sup>[7][8][9][10]</sup></li>\n      <li><span class=\"chip warn\">Estrutura</span> <strong>Duas questões estruturais permanentes, sem novidade do dia</strong>: entre Alemanha e Brasil não há mais <strong>acordo de bitributação desde 31/12/2005</strong><sup>[6]</sup>, e a reforma do processo de verificação de status continua sendo apenas um <strong>anteprojeto ministerial</strong>, com data-alvo <strong>01/01/2028</strong> — ainda não é lei vigente.<sup>[5]</sup></li>\n      <li><span class=\"chip\">Qualidade dos dados</span> <strong>13 de 149 com data, 11 com taxa própria da vaga</strong>. Dois números aqui <em>não</em> são tratados como atuais: a lacuna de 109.000 profissionais de TI da Bitkom é de <strong>07/08/2025</strong><sup>[4]</sup>, e uma notícia recorrente sobre uma taxa horária de 96 € se baseia em um levantamento de <strong>2022</strong>.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, el arranque de semana metió <strong>doce proyectos nuevos</strong> al board — pero la cifra del día no está en el board. Un reporte del <strong>19/07/2026</strong> atribuye <strong>101.743 de 139.156</strong> puestos tech eliminados en <strong>Estados Unidos</strong> directamente a la IA, alrededor de tres cuartas partes, y <strong>83 %</strong> más despidos que en el mismo periodo del año anterior. La base de datos es el análisis para EE. UU. de <strong>Challenger, Gray &amp; Christmas</strong> (139.156 recortes de empleo en empleadores tech de EE. UU. entre enero y junio de 2026, frente a 76.214 en el mismo periodo del año anterior) — no es, expresamente, un conteo mundial.<sup>[3]</sup> Suena a mala noticia y, para Daniel, en principio no lo es: el mismo reporte señala que <strong>71 %</strong> de las vacantes de desarrollo publicadas están abiertas expresamente solo para perfiles con experiencia — un dato que se encuentra únicamente en esta fuente (contexto más abajo). El mercado no se encoge de manera pareja — se encoge en la entrada y se densifica arriba. Lo que no hace mientras tanto es encarecerse. <strong>Una</strong> encuesta de 2026 — el Freelancer-Kompass — despliega, en dos cortes distintos, el corredor DACH entre <strong>95 y 103 €/h</strong>, y el valor superior es la primera caída medida desde que este estudio empezó en 2016.</p>\n    <ul>\n      <li><span class=\"chip hot\">Despidos</span> <strong>101.743 de 139.156 despidos tech en EE. UU. atribuidos a la IA</strong> — datos de Challenger, Gray &amp; Christmas para enero–junio de 2026 (frente a 76.214 en el mismo periodo del año anterior, <strong>+83 %</strong>), reporte del 19/07/2026. <strong>Cifras de EE. UU., no mundiales.</strong> Casos citados: Meta con unos <strong>8.000</strong> (mayo de 2026), Microsoft con <strong>4.800</strong> (julio de 2026).<sup>[3]</sup></li>\n      <li><span class=\"chip good\">Sénior</span> <strong>71 % de senior-only en vacantes de desarrollo — señal contraria, pero solo con respaldo simple</strong>: la cifra aparece en exactamente una fuente, y el único dato vecino encontrado está medido de forma distinta (71 % del incremento de vacantes de desarrollo entre mayo de 2025 y mayo de 2026 correspondió a roles sénior). La dirección es correcta, el denominador exacto no está confirmado.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Corredor 95–103 €/h — una encuesta, dos cortes</strong>: el blog de freelancermap del <strong>02/07/2026</strong> reporta una <strong>mediana de 95 €/h</strong> para freelancers de TI (Software &amp; Web Development 90 €, SAP/ERP 120 €) y se basa expresamente en el <strong>Freelancer-Kompass 2026</strong><sup>[2]</sup> — la misma encuesta de la que también proviene el <strong>promedio de 103 €/h</strong> en toda la región DACH y todos los sectores.<sup>[1]</sup> No hay contradicción, pero tampoco una confirmación independiente: mediana contra promedio, solo TI contra todos los sectores.</li>\n      <li><span class=\"chip hot\">Tarifa</span> <strong>Primera caída desde 2016 — y el ingreso mensual cae más fuerte</strong>: 103 €/h frente a 104 €/h, pero el ingreso mensual por proyecto cae de <strong>8.022 € a 6.653 €</strong>, alrededor de <strong>17 %</strong>. No es el precio por hora lo que se erosiona, sino la ocupación.<sup>[1]</sup></li>\n      <li><span class=\"chip\">Ocupación</span> <strong>24 % de los encuestados estuvieron ocupados con proyectos menos de 50 días el año pasado</strong>, <strong>62 %</strong> menciona la captación de clientes como el mayor reto.<sup>[1]</sup></li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board en 149</strong> (ayer 137, <strong>12 nuevos</strong>, ninguno cayó): 128 freelance / 12 employee / 9 intriguing, fit promedio <strong>61,4</strong>, <strong>17</strong> ≥ 80, <strong>42</strong> ≥ 70. La cima sigue igual con fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>La mezcla de stack se mantiene igual</strong>: Java <strong>68×</strong>, Angular 48×, Spring Boot 48×, Kubernetes 31×, AWS 27×, TypeScript 27×, integración de IA 23×; <strong>124</strong> de 149 entradas con etiqueta remoto.</li>\n      <li><span class=\"chip warn\">Restricciones</span> <strong>Cinco listados quedan deliberadamente en 0 en ubicación y trayectoria</strong> — cuatro exigen una <strong>SÜ2</strong> alemana, uno una <strong>SC-clearance</strong> británica. Ambas exigen residencia en el país respectivo, lo cual choca con Brasil. Siguen visibles, pero no son una oportunidad.</li>\n      <li><span class=\"chip\">TED</span> <strong>Cuatro licitaciones consultadas con texto completo, cero coincidencias directas</strong>: cada una tiene un obstáculo concreto — umbral de facturación, mínimo de FTE, certificado o SÜ2 — y en ninguno de los textos de requisitos analizados aparece explícitamente Java o Angular.<sup>[7][8][9][10]</sup></li>\n      <li><span class=\"chip warn\">Estructura</span> <strong>Dos frentes permanentes, ninguna noticia del día</strong>: entre Alemania y Brasil no existe <strong>ningún convenio para evitar la doble imposición</strong> desde el <strong>31/12/2005</strong><sup>[6]</sup>, y la reforma del procedimiento de determinación de estatus sigue siendo un <strong>anteproyecto ministerial</strong> con fecha meta al <strong>01/01/2028</strong> — no es derecho vigente.<sup>[5]</sup></li>\n      <li><span class=\"chip\">Calidad de datos</span> <strong>13 de 149 con fecha, 11 con tarifa propia en el listado</strong>. Dos cifras aquí <em>no</em> se manejan como actuales: el faltante de Bitkom de 109.000 profesionales de TI data del <strong>07/08/2025</strong><sup>[4]</sup>, y un dato de 96 €/h que circula se basa en una encuesta de <strong>2022</strong>.</li>\n    </ul></div>"
