<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }

  .loading {

  /* Color helpers per category */

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>

        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">

            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>

          <span class="dd-dot" aria-hidden="true"></span>

      <button class="status-btn anim-toggle" id="anim-toggle" type="button"

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

g> — „keine Änderung\" ist Konsens, die Quellen streuen aber deutlich: <strong>~88–90 %</strong> markt-implizit, 98,7 % im Prognosemarkt; von 74 befragten Ökonomen (13.–16.07.) erwartet <em>keiner</em> eine Änderung. Depo 2,25 % nach der Erhöhung mit Wirkung 17.06.</li>\n      <li><span class=\"chip\">USA</span> <strong>FOMC 28./29.07.</strong>, Fed hält seit 17.06. bei 3,50–3,75 %. Carry gegen die Selic (14,25 %) bleibt bei <strong>rund 10,5 pp</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus (13.07.):</strong> IPCA 2026 auf <strong>5,16 %</strong> gesenkt (2. Woche in Folge), Selic-Jahresende <strong>14,00 %</strong>, USD/BRL-Jahresende <strong>R$ 5,20</strong>, BIP 1,99 %.</li>\n      <li><span class=\"chip\">BR</span> <strong>Kein Stress-Signal:</strong> 5J-CDS <strong>124,58 bp</strong> (17.07.), 10J-Staatsanleihe <strong>14,69 %</strong>. Der wunde Punkt bleibt das Fiskal: Netto-Schuld <strong>67,4 % des BIP</strong> (April 2026, Serienrekord).</li>\n      <li><span class=\"chip\">Hinweis</span> Die Prognose-Wahrscheinlichkeiten unten sind <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">On <strong>Wednesday, July 22</strong>, the US tariff of <strong>25%</strong> on most Brazilian goods takes effect — and so far the real is <em>ignoring</em> it. EUR/BRL stands at <strong>5.8499</strong> (ECB fix, Fri Jul 17), about <strong>1.7% below</strong> the monthly high from July 3. For Daniel that's the uncomfortable direction: a firmer real means fewer reais per euro billed. Concretely — <strong>€5,000 gets you R$29,250</strong> today; on July 3 it would have been R$29,743. <strong>About R$490 in purchasing power evaporated in two weeks.</strong> Why the tariff isn't denting the real is in the fine print and in the oil price.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8499</strong> (ECB reference fix, Fri Jul 17, +0.31% vs. Thu) — Monday's fix wasn't out yet at press time.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Cross-rate check against a genuine second source:</strong> BCB PTAX close Jul 17 <strong>5.8542</strong> vs. ECB fix 5.8499 — <strong>divergence +0.07%</strong> against a 0.5% threshold. Two separately collected datasets, no back-calculation.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>25% tariff (US Section 301) from Wed Jul 22</strong> — <strong>coffee and beef exempted</strong>. Brasília is responding via the reciprocity law, not with retaliatory tariffs.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $90.29</strong> (Jul 20, <strong>+2.48%</strong>) — the US strikes around Hormuz ran through Fri Jul 17 for a <strong>sixth consecutive night</strong> (CENTCOM), and tanker traffic on Thu Jul 16 stood at <strong>eight transits</strong> against roughly 88 before the crisis.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.70</strong> (Jul 20, −0.07%) — the dollar is soft globally. That's the real reason the real is holding.</li>\n      <li><span class=\"chip\">EU</span> <strong>ECB Thu Jul 23, 13:45 CET</strong> — \"no change\" is the consensus, but sources spread noticeably: <strong>~88–90%</strong> market-implied, 98.7% on prediction markets; of 74 economists surveyed (Jul 13–16), <em>none</em> expects a change. Deposit rate 2.25% after the hike effective Jun 17.</li>\n      <li><span class=\"chip\">USA</span> <strong>FOMC Jul 28–29</strong>, the Fed has held at 3.50–3.75% since Jun 17. The carry against the Selic (14.25%) stays at <strong>about 10.5 pp</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus (Jul 13):</strong> 2026 IPCA lowered to <strong>5.16%</strong> (2nd week running), year-end Selic <strong>14.00%</strong>, year-end USD/BRL <strong>R$5.20</strong>, GDP 1.99%.</li>\n      <li><span class=\"chip\">BR</span> <strong>No stress signal:</strong> 5Y CDS <strong>124.58 bp</strong> (Jul 17), 10Y government bond <strong>14.69%</strong>. The sore spot remains fiscal: net debt <strong>67.4% of GDP</strong> (April 2026, a series record).</li>\n      <li><span class=\"chip\">Heads up</span> The forecast probabilities below are <strong>my confidence levels</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Na <strong>quarta-feira, 22/07</strong>, entra em vigor a tarifa dos EUA de <strong>25%</strong> sobre a maioria dos produtos brasileiros — e até agora o real <em>ignora</em> isso. O EUR/BRL está em <strong>5,8499</strong> (fixing do BCE, sex. 17/07), cerca de <strong>1,7% abaixo</strong> da máxima do mês, de 03/07. Para Daniel, essa é a direção desconfortável: real mais forte significa menos reais por conta em euros. Em números — <strong>5.000 € rendem hoje R$ 29.250</strong>, em 03/07 teriam sido R$ 29.743. <strong>Cerca de R$ 490 de poder de compra evaporaram em duas semanas.</strong> Por que a tarifa não derruba o real está nas letras miúdas e no preço do petróleo.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8499</strong> (fixing de referência do BCE, sex. 17/07, +0,31% em relação a qui.) — o fixing de segunda-feira ainda não havia saído no fechamento desta edição.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificação cruzada contra uma segunda fonte real:</strong> fechamento do PTAX do BCB em 17/07, <strong>5,8542</strong>, contra o fixing do BCE de 5,8499 — <strong>divergência de +0,07%</strong>, dentro do limite de 0,5%. Dois conjuntos de dados apurados separadamente, sem cálculo circular.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tarifa de 25% (Seção 301 dos EUA) a partir de qua. 22/07</strong> — <strong>café e carne bovina estão isentos</strong>. Brasília responde pela Lei da Reciprocidade, não com tarifas espelhadas.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent a US$ 90,29</strong> (20/07, <strong>+2,48%</strong>) — os ataques dos EUA na região de Ormuz completaram, até sex. 17/07, a <strong>sexta noite seguida</strong> (CENTCOM); o tráfego de petroleiros em qui. 16/07 ficou em <strong>oito passagens</strong>, ante cerca de 88 antes da crise.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY em 100,70</strong> (20/07, −0,07%) — o dólar está fraco globalmente. Essa é a verdadeira razão pela qual o real se sustenta.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE qui. 23/07, 13h45 CET</strong> — \"nenhuma mudança\" é o consenso, mas as fontes divergem bastante: <strong>~88–90%</strong> implícito de mercado, 98,7% no mercado de previsões; dos 74 economistas consultados (13–16/07), <em>nenhum</em> espera mudança. Depósito em 2,25% após a alta com vigência em 17/06.</li>\n      <li><span class=\"chip\">EUA</span> <strong>FOMC em 28–29/07</strong>, o Fed mantém a taxa em 3,50–3,75% desde 17/06. O carry contra a Selic (14,25%) segue em <strong>cerca de 10,5 p.p.</strong></li>\n      <li><span class=\"chip\">BR</span> <strong>Focus (13/07):</strong> projeção do IPCA 2026 reduzida para <strong>5,16%</strong> (2ª semana seguida), Selic de fim de ano em <strong>14,00%</strong>, USD/BRL de fim de ano em <strong>R$ 5,20</strong>, PIB 1,99%.</li>\n      <li><span class=\"chip\">BR</span> <strong>Nenhum sinal de estresse:</strong> CDS de 5 anos em <strong>124,58 bp</strong> (17/07), título de 10 anos em <strong>14,69%</strong>. O ponto sensível continua sendo o fiscal: dívida líquida em <strong>67,4% do PIB</strong> (abril de 2026, recorde da série).</li>\n      <li><span class=\"chip\">Atenção</span> As probabilidades de projeção abaixo são <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El <strong>miércoles 22/07</strong> entra en vigor el arancel estadounidense del <strong>25 %</strong> sobre la mayoría de los productos brasileños — y hasta ahora el real lo <em>ignora</em>. El EUR/BRL está en <strong>5,8499</strong> (fix del BCE, vie. 17/07), alrededor de <strong>1,7 % por debajo</strong> del máximo mensual del 03/07. Para Daniel esa es la dirección incómoda: un real más fuerte significa menos reales por cada factura en euros. En concreto — <strong>5.000 € equivalen hoy a R$ 29.250</strong>, el 03/07 habrían sido R$ 29.743. <strong>Cerca de R$ 490 de poder adquisitivo se evaporaron en dos semanas.</strong> Por qué el arancel no dobla al real está en la letra pequeña y en el precio del petróleo.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8499</strong> (fix de referencia del BCE, vie. 17/07, +0,31 % frente al jueves) — el fix del lunes aún no estaba disponible al cierre de esta edición.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificación de cruce con una segunda fuente real:</strong> cierre PTAX del BCB del 17/07 <strong>5,8542</strong> frente al fix del BCE 5,8499 — <strong>divergencia +0,07 %</strong> frente a un umbral de 0,5 %. Dos conjuntos de datos recabados por separado, sin cálculo circular.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Arancel del 25 % (Sección 301 de EE. UU.) desde el mié. 22/07</strong> — <strong>café y carne de res quedan exentos</strong>. Brasilia responde mediante la ley de reciprocidad, no con aranceles espejo.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 90,29 $</strong> (20/07, <strong>+2,48 %</strong>) — los ataques estadounidenses cerca de Ormuz llegaron hasta la sexta noche consecutiva (CENTCOM) el vie. 17/07, y el tráfico de petroleros del jue. 16/07 fue de <strong>ocho pasos</strong>, frente a unos 88 al día antes de la crisis.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,70</strong> (20/07, −0,07 %) — el dólar está débil a nivel global. Esa es la verdadera razón por la que el real se mantiene firme.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE jue. 23/07, 13:45 CET</strong> — \"sin cambios\" es el consenso, pero las fuentes varían con claridad: <strong>~88–90 %</strong> de probabilidad implícita en el mercado, 98,7 % en el mercado de predicciones; de 74 economistas encuestados (13–16/07), <em>ninguno</em> espera un cambio. Depósito en 2,25 % tras el alza con efecto desde el 17/06.</li>\n      <li><span class=\"chip\">USA</span> <strong>FOMC 28–29/07</strong>, la Fed mantiene desde el 17/06 la tasa en 3,50–3,75 %. El carry frente a la Selic (14,25 %) se mantiene en <strong>alrededor de 10,5 pp</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Encuesta Focus (13/07):</strong> IPCA 2026 recortado a <strong>5,16 %</strong> (segunda semana consecutiva), Selic a fin de año en <strong>14,00 %</strong>, USD/BRL a fin de año en <strong>R$ 5,20</strong>, PIB 1,99 %.</li>\n      <li><span class=\"chip\">BR</span> <strong>Sin señales de estrés:</strong> CDS a 5 años <strong>124,58 pb</strong> (17/07), bono soberano a 10 años <strong>14,69 %</strong>. El punto débil sigue siendo lo fiscal: deuda neta <strong>67,4 % del PIB</strong> (abril de 2026, récord de la serie).</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades del pronóstico de abajo son <strong>mi nivel de confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Bewegungen, die nichts miteinander zu tun haben und trotzdem heute aufeinandertreffen. Erstens: Die vergangene Handelswoche war für die <strong>KI-Infrastruktur</strong> die schlechteste seit Längerem — TSMC verlor auf Wochensicht <strong>8,2 %</strong>, Broadcom <strong>7,3 %</strong>, Nvidia <strong>3,9 %</strong>. Der Auslöser war kein Umsatzeinbruch, sondern eine Frage: Wie lange halten die Konzerne ihre Rechenzentrums-Budgets durch? Zweitens: <strong>Brent handelt heute Morgen über 90 $</strong> — live, nicht eingefroren — weil an der Straße von Hormuz weiter geschossen wird. Das Entscheidende an diesem Montag ist aber der <strong>Mittwoch</strong>: Alphabet und Tesla legen nach US-Börsenschluss Zahlen vor. Damit bekommt die Capex-Frage in <strong>zwei Tagen</strong> ihre erste harte Antwort. Wer heute umschichtet, tut das genau zwei Tage zu früh.</p>\n    <ul>\n      <li><span class=\"chip hot\">HALBLEITER</span> <strong>TSM 398,37 $ (−8,2 % Woche), AVGO 370,83 $ (−7,3 %), NVDA 202,81 $ (−3,9 %)</strong> — Stand: <strong>Freitagsschluss 17.07.</strong>, nicht live. Der Halbleiter-ETF SOXX verlor auf Wochensicht <strong>10,24 %</strong> (Vergleichsschluss Fr 10.07. 581,34 $ → Freitagsschluss 17.07. 521,81 $) — <strong>mehr als jeder Einzelwert oben</strong>.</li>\n      <li><span class=\"chip hot\">ÖL LIVE</span> <strong>Brent 90,28 $, WTI 83,54 $</strong> — live heute <strong>20.07., 04:55 UTC</strong> (01:55 BRT). Höchster Brent-Stand seit Mitte Juni. Treiber: US-Iran-Eskalation, Angriffe auf Schiffe in der Straße von Hormuz, ein Angriff auf eine Öl-Anlage in Kuwait am Wochenende.</li>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>Mi 22.07.: Alphabet und Tesla berichten nach US-Börsenschluss</strong> (ab ca. 22:00 MESZ / 17:00 BRT). Das ist der erste harte Test der KI-Investitions-Frage, die die ganze vergangene Woche bewegt hat.</li>\n      <li><span class=\"chip\">INDIZES</span> <strong>S&amp;P 500 7.457,69 (Tag −1,01 %, Woche −1,6 %), Nasdaq 25.520,24 (Tag −1,4 %, Woche −2,9 %), Dow 52.146,42 (Tag −406,55 Punkte, Woche −0,9 %)</strong> — Freitagsschluss 17.07., von zwei Quellen deckungsgleich.</li>\n      <li><span class=\"chip\">GOLD LIVE</span> <strong>4.023,70 $/Unze (Future), Spot 4.001–4.008 $</strong> — live 20.07., 04:57 UTC. Damit rund <strong>28 % unter dem Januar-Hoch von 5.595,47 $</strong>. Gold hat auf den Ölsprung praktisch nicht reagiert.</li>\n      <li><span class=\"chip good\">KRYPTO LIVE</span> <strong>BTC 64.396 $ (24 h −0,48 %, 7 d +2,58 %), ETH 1.864,85 $ (24 h −0,13 %, 7 d +4,83 %)</strong> — live 20.07., 05:06 UTC, zwei Quellen auf 0,12 % übereinstimmend. Krypto war die einzige Anlageklasse, die die Woche im Plus beendete.</li>\n      <li><span class=\"chip\">ROTATION</span> <strong>Nicht alles war rot: MSFT +2,3 %, AMZN +0,8 % auf Wochensicht.</strong> Der Ausverkauf traf die Zulieferer der KI-Infrastruktur, nicht ihre Käufer — das ist die eigentliche Information der Woche.</li>\n      <li><span class=\"chip hot\">LÜCKE</span> <strong>Die BTC-ETF-Zuflüsse für den 17.07. sind nicht abgeglichen.</strong> Zwei Anbieter melden <strong>+83,22 Mio. $</strong> bzw. <strong>+132,3 Mio. $</strong> für denselben Tag — rund 49 Mio. $ Differenz. Die Primärquelle Farside lieferte HTTP 403. Dieser Brief nennt die Spanne und stützt keine Entscheidung darauf.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>Memecoins bröckeln weiter: BONK −29,7 % auf Sieben-Tage-Sicht</strong>, IMX 4,5 % im Minus und erst am 01.07. auf einem Allzeittief. Einziger klarer Gewinner: <strong>Virtuals Protocol +8,5 % (7 d)</strong>.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kein Apple-Kurs in diesem Lauf.</strong> AAPL wurde heute nicht abgefragt; der Mag-7-Bucket ist deshalb sechs- statt siebenteilig. Keine Zahl aus dem Gedächtnis ergänzt.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Two moves that have nothing to do with each other and still collide today. First: the past trading week was the worst in a while for <strong>AI infrastructure</strong> — TSMC lost <strong>8.2%</strong> on the week, Broadcom <strong>7.3%</strong>, Nvidia <strong>3.9%</strong>. The trigger wasn't a revenue miss but a question: how long can these companies keep funding their data-center budgets? Second: <strong>Brent is trading above $90 this morning</strong> — live, not frozen — because the fighting in the Strait of Hormuz continues. But what actually matters this Monday is <strong>Wednesday</strong>: Alphabet and Tesla report after the US close. That gives the capex question its first hard answer in <strong>two days</strong>. Anyone rotating positions today is doing it exactly two days too early.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEMICONDUCTORS</span> <strong>TSM $398.37 (−8.2% week), AVGO $370.83 (−7.3%), NVDA $202.81 (−3.9%)</strong> — as of: <strong>Friday's close, Jul 17</strong>, not live. The semiconductor ETF SOXX lost <strong>10.24%</strong> on the week (comparison close Fri Jul 10 $581.34 → Friday's close Jul 17 $521.81) — <strong>more than any single name above</strong>.</li>\n      <li><span class=\"chip hot\">OIL LIVE</span> <strong>Brent $90.28, WTI $83.54</strong> — live today <strong>Jul 20, 04:55 UTC</strong> (01:55 BRT). Highest Brent level since mid-June. Driver: US-Iran escalation, attacks on ships in the Strait of Hormuz, an attack on an oil facility in Kuwait over the weekend.</li>\n      <li><span class=\"chip hot\">DATE</span> <strong>Wed Jul 22: Alphabet and Tesla report after the US close</strong> (starting around 22:00 CEST / 17:00 BRT). That's the first hard test of the AI-spending question that drove the entire past week.</li>\n      <li><span class=\"chip\">INDEXES</span> <strong>S&amp;P 500 7,457.69 (day −1.01%, week −1.6%), Nasdaq 25,520.24 (day −1.4%, week −2.9%), Dow 52,146.42 (day −406.55 points, week −0.9%)</strong> — Friday's close, Jul 17, matching across two sources.</li>\n      <li><span class=\"chip\">GOLD LIVE</span> <strong>$4,023.70/oz (future), spot $4,001–4,008</strong> — live Jul 20, 04:57 UTC. That's roughly <strong>28% below the January high of $5,595.47</strong>. Gold has barely reacted to the oil spike.</li>\n      <li><span class=\"chip good\">CRYPTO LIVE</span> <strong>BTC $64,396 (24h −0.48%, 7d +2.58%), ETH $1,864.85 (24h −0.13%, 7d +4.83%)</strong> — live Jul 20, 05:06 UTC, two sources agreeing within 0.12%. Crypto was the only asset class that ended the week in the green.</li>\n      <li><span class=\"chip\">ROTATION</span> <strong>Not everything was red: MSFT +2.3%, AMZN +0.8% on the week.</strong> The sell-off hit AI infrastructure's suppliers, not its buyers — that's the real story of the week.</li>\n      <li><span class=\"chip hot\">GAP</span> <strong>The BTC ETF inflows for Jul 17 don't reconcile.</strong> Two providers report <strong>+$83.22 million</strong> and <strong>+$132.3 million</strong> for the same day — a gap of roughly $49 million. The primary source, Farside, returned HTTP 403. This brief states the range and doesn't base any decision on it.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>Memecoins keep crumbling: BONK −29.7% over seven days</strong>, IMX down 4.5% and only just hit an all-time low on Jul 1. The only clear winner: <strong>Virtuals Protocol +8.5% (7d)</strong>.</li>\n      <li><span class=\"chip\">GAP</span> <strong>No Apple price in this run.</strong> AAPL wasn't queried today; the Mag-7 bucket is therefore six names instead of seven. No figure was filled in from memory.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois movimentos que não têm nenhuma relação entre si e, ainda assim, colidem hoje. Primeiro: a semana de pregão que passou foi a pior para a infraestrutura de IA em bastante tempo — a TSMC caiu 8,2% na semana, a Broadcom 7,3%, a Nvidia 3,9%. O gatilho não foi uma queda de receita, mas uma pergunta: por quanto tempo as gigantes de tecnologia sustentam seus orçamentos de data center? Segundo: o Brent negocia nesta manhã acima de 90 $ — ao vivo, não congelado — porque os ataques continuam no Estreito de Ormuz. Mas o que decide esta segunda-feira é a quarta-feira: Alphabet e Tesla divulgam resultados após o fechamento do pregão americano. Com isso, a questão do capex ganha em dois dias sua primeira resposta dura. Quem reorganiza a carteira hoje o faz exatamente dois dias cedo demais.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEMICONDUTORES</span> <strong>TSM 398,37 $ (−8,2% na semana), AVGO 370,83 $ (−7,3%), NVDA 202,81 $ (−3,9%)</strong> — dado de: <strong>fechamento de sexta, 17/07</strong>, não ao vivo. O ETF de semicondutores SOXX caiu <strong>10,24%</strong> na semana (fechamento de referência sex 10/07 581,34 $ → fechamento de sexta 17/07 521,81 $) — <strong>mais que qualquer ativo individual acima</strong>.</li>\n      <li><span class=\"chip hot\">PETRÓLEO AO VIVO</span> <strong>Brent 90,28 $, WTI 83,54 $</strong> — ao vivo hoje, <strong>20/07, 04h55 UTC</strong> (01h55 BRT). Maior nível do Brent desde meados de junho. Gatilho: escalada entre EUA e Irã, ataques a navios no Estreito de Ormuz, um ataque a uma instalação de petróleo no Kuwait durante o fim de semana.</li>\n      <li><span class=\"chip hot\">AGENDA</span> <strong>Qua 22/07: Alphabet e Tesla divulgam resultados após o fechamento do pregão americano</strong> (a partir de cerca de 22h00 horário de Berlim / 17h00 BRT). É o primeiro teste duro da questão de investimento em IA que moveu toda a semana passada.</li>\n      <li><span class=\"chip\">ÍNDICES</span> <strong>S&amp;P 500 7.457,69 (dia −1,01%, semana −1,6%), Nasdaq 25.520,24 (dia −1,4%, semana −2,9%), Dow 52.146,42 (dia −406,55 pontos, semana −0,9%)</strong> — fechamento de sexta, 17/07, coincidente entre duas fontes.</li>\n      <li><span class=\"chip\">OURO AO VIVO</span> <strong>4.023,70 $/onça (futuro), à vista 4.001–4.008 $</strong> — ao vivo 20/07, 04h57 UTC. Isso é cerca de <strong>28% abaixo da máxima de janeiro, de 5.595,47 $</strong>. O ouro praticamente não reagiu ao salto do petróleo.</li>\n      <li><span class=\"chip good\">CRIPTO AO VIVO</span> <strong>BTC 64.396 $ (24h −0,48%, 7d +2,58%), ETH 1.864,85 $ (24h −0,13%, 7d +4,83%)</strong> — ao vivo 20/07, 05h06 UTC, duas fontes convergindo com 0,12% de diferença. Cripto foi a única classe de ativos que fechou a semana no positivo.</li>\n      <li><span class=\"chip\">ROTAÇÃO</span> <strong>Nem tudo foi vermelho: MSFT +2,3%, AMZN +0,8% na semana.</strong> A liquidação atingiu os fornecedores de infraestrutura de IA, não seus compradores — essa é a verdadeira informação da semana.</li>\n      <li><span class=\"chip hot\">LACUNA</span> <strong>Os fluxos dos ETFs de BTC do dia 17/07 não estão conciliados.</strong> Dois provedores relatam <strong>+83,22 mi $</strong> e <strong>+132,3 mi $</strong>, respectivamente, para o mesmo dia — uma diferença de cerca de 49 milhões de dólares. A fonte primária, Farside, retornou HTTP 403. Esta edição informa a faixa e não apoia nenhuma decisão nela.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Memecoins continuam corroendo: BONK −29,7% em sete dias</strong>, IMX no negativo em 4,5% e ainda numa mínima histórica registrada em 01/07. Único vencedor claro: <strong>Virtuals Protocol +8,5% (7d)</strong>.</li>\n      <li><span class=\"chip\">LACUNA</span> <strong>Sem cotação da Apple nesta rodada.</strong> A AAPL não foi consultada hoje; por isso, o bloco Mag-7 tem seis, e não sete, componentes. Nenhum número foi completado de memória.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos movimientos que no tienen nada que ver entre sí y que, sin embargo, coinciden hoy. Primero: la semana bursátil que acaba de terminar fue, para la infraestructura de IA, la peor en mucho tiempo — TSMC perdió 8,2 % en la semana, Broadcom 7,3 %, Nvidia 3,9 %. El detonante no fue una caída de ingresos, sino una pregunta: ¿cuánto tiempo sostendrán las empresas sus presupuestos de centros de datos? Segundo: esta mañana el Brent opera por encima de 90 $ — en vivo, no congelado — porque en el Estrecho de Ormuz los disparos continúan. Pero lo decisivo de este lunes es el miércoles: Alphabet y Tesla presentan resultados después del cierre de la bolsa de EU. Con eso, la pregunta del capex tendrá en dos días su primera respuesta contundente. Quien recomponga su cartera hoy lo hace exactamente dos días demasiado pronto.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEMICONDUCTORES</span> <strong>TSM 398,37 $ (−8,2 % semana), AVGO 370,83 $ (−7,3 %), NVDA 202,81 $ (−3,9 %)</strong> — dato: cierre del viernes 17/07, no en vivo. El ETF de semiconductores SOXX perdió <strong>10,24 %</strong> en la semana (cierre de comparación vie 10/07 581,34 $ → cierre del viernes 17/07 521,81 $) — <strong>más que cualquier valor individual arriba</strong>.</li>\n      <li><span class=\"chip hot\">PETRÓLEO EN VIVO</span> <strong>Brent 90,28 $, WTI 83,54 $</strong> — en vivo hoy 20/07, 04:55 UTC (01:55 hora de Brasilia). El nivel más alto del Brent desde mediados de junio. Detonantes: la escalada entre EU e Irán, ataques a barcos en el Estrecho de Ormuz y un ataque a una instalación petrolera en Kuwait durante el fin de semana.</li>\n      <li><span class=\"chip hot\">FECHA</span> <strong>Mié 22/07: Alphabet y Tesla reportan después del cierre de la bolsa de EU</strong> (desde aprox. 22:00 CEST / 17:00 hora de Brasilia). Es la primera prueba de fuego para la pregunta sobre la inversión en IA que movió toda la semana pasada.</li>\n      <li><span class=\"chip\">ÍNDICES</span> <strong>S&amp;P 500 7.457,69 (día −1,01 %, semana −1,6 %), Nasdaq 25.520,24 (día −1,4 %, semana −2,9 %), Dow 52.146,42 (día −406,55 puntos, semana −0,9 %)</strong> — cierre del viernes 17/07, coincidente en dos fuentes.</li>\n      <li><span class=\"chip\">ORO EN VIVO</span> <strong>4.023,70 $/onza (futuro), spot 4.001–4.008 $</strong> — en vivo 20/07, 04:57 UTC. Con esto, alrededor de 28 % por debajo del máximo de enero de 5.595,47 $. El oro prácticamente no reaccionó al salto del petróleo.</li>\n      <li><span class=\"chip good\">CRIPTO EN VIVO</span> <strong>BTC 64.396 $ (24 h −0,48 %, 7 d +2,58 %), ETH 1.864,85 $ (24 h −0,13 %, 7 d +4,83 %)</strong> — en vivo 20/07, 05:06 UTC, dos fuentes con una diferencia de 0,12 %. Las criptomonedas fueron la única clase de activo que cerró la semana en positivo.</li>\n      <li><span class=\"chip\">ROTACIÓN</span> <strong>No todo estuvo en rojo: MSFT +2,3 %, AMZN +0,8 % en la semana.</strong> La liquidación golpeó a los proveedores de infraestructura de IA, no a sus compradores — esa es la verdadera información de la semana.</li>\n      <li><span class=\"chip hot\">HUECO</span> <strong>Los flujos de los ETF de BTC para el 17/07 no están conciliados.</strong> Dos proveedores reportan +83,22 millones $ y +132,3 millones $ para el mismo día — una diferencia de unos 49 millones $. La fuente primaria, Farside, devolvió HTTP 403. Este boletín menciona el rango y no apoya ninguna decisión en él.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Las memecoins siguen desmoronándose: BONK −29,7 % a siete días</strong>, IMX cae 4,5 % y apenas el 01/07 tocó un mínimo histórico. Único ganador claro: Virtuals Protocol +8,5 % (7 d).</li>\n      <li><span class=\"chip\">HUECO</span> <strong>Sin cotización de Apple en esta edición.</strong> Hoy no se consultó AAPL; el bloque Mag-7 tiene, por tanto, seis valores en lugar de siete. No se completó ninguna cifra de memoria.</li>\n    </ul></div>"
