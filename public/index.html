ong>CodeQL 2.26.0 (10.07.)</strong>: neue Query <code>js/system-prompt-injection</code> + KI-SDK-Sinks (OpenAI, Anthropic, Google GenAI). Ein Scanner, der jetzt Prompt-Injection <em>im eigenen Code</em> findet.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot in VS Code, Juni-Releases (v1.123–1.127)</strong>: parallele Agenten-Sessions, Kosten-Transparenz pro Session/Subagent, Modell-Discovery über den Marketplace, Browser-Tools GA.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Continue.dev löscht Cloud-Daten nach dem 15.07.</strong> (in 3 Tagen); Cognitions <strong>Devin Security Swarm</strong> fand 36/50 Real-World-Lücken; Aider-Board weiter stale seit 20.11.2025.</li>\n      <li><span class=\"chip\">Local</span> <strong>Qwen3-Coder-Next</strong> (80B-MoE, 3B aktiv, SWE-rebench Pass@5 64,6 %) + <strong>DeepSeek-V4</strong>: der Open-Weights-Schub hält an. Genaue Release-Daten unklar — als „mid-2026\" geflaggt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Sunday, a quiet news day — but with a story that picks up right where yesterday's skeptical thread left off. Z.ai's <strong>GLM-5.2</strong> is an <strong>MIT-licensed</strong> coding model with a 1-million-token context that comes in at <strong>$1.40 / $4.40</strong> per million tokens on OpenRouter and is advertised at <strong>62.1%</strong> on SWE-Bench <em>Pro</em>. That's cheap and open — but the 62.1, like almost every number this week, is <strong>vendor-reported</strong>, and the widely cited \"80x customer growth on Vercel\" figure hangs on a single aggregator source. Alongside that: a quiet but practical change for Claude Code users and a code scanner that now understands AI SDK calls.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>GLM-5.2 (Z.ai)</strong>: MIT weights, 1M context, $1.40/$4.40. SWE-Bench <em>Pro</em> <strong>62.1%</strong> (vendor/aggregator) — ahead of GPT-5.5 (58.6), behind Claude Opus 4.8 (69.2 — Anthropic's own System Card figure, likewise vendor-reported).</li>\n      <li><span class=\"chip\">OSS</span> <strong>GLM-5.2 adoption on Vercel</strong>: \"80x customer, 27x token growth in the first week\" — appears in <em>one</em> aggregator blog, not on Vercel's own changelog. Not Vercel-confirmed.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Code v2.1.207 (Jul 10)</strong>: Auto mode now available <strong>without opt-in</strong> on Bedrock, Vertex, Foundry; <strong>Opus 4.8</strong> becomes the default model there. Anyone who wants the old behavior has to set model + mode explicitly.</li>\n      <li><span class=\"chip\">Bench</span> <strong>GPT-5.6 Sol</strong> leads the Artificial Analysis <strong>Coding Agent Index at 80.0</strong> (+2.8 ahead of Fable 5) — primary-confirmed (OpenAI's own post + AA). A different test than SWE-Bench Pro, don't conflate.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>CodeQL 2.26.0 (Jul 10)</strong>: new query <code>js/system-prompt-injection</code> + AI SDK sinks (OpenAI, Anthropic, Google GenAI). A scanner that now finds prompt injection <em>in its own code</em>.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot in VS Code, June releases (v1.123–1.127)</strong>: parallel agent sessions, cost transparency per session/subagent, model discovery via the Marketplace, browser tools GA.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Continue.dev deletes cloud data after Jul 15</strong> (in 3 days); Cognition's <strong>Devin Security Swarm</strong> found 36/50 real-world gaps; the Aider board remains stale since Nov 20, 2025.</li>\n      <li><span class=\"chip\">Local</span> <strong>Qwen3-Coder-Next</strong> (80B MoE, 3B active, SWE-rebench Pass@5 64.6%) + <strong>DeepSeek-V4</strong>: the open-weights push continues. Exact release dates unclear — flagged as \"mid-2026.\"</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, dia de notícias tranquilo — mas com uma matéria que retoma exatamente onde a linha cética de ontem parou. O <strong>GLM-5.2</strong> da Z.ai é um modelo de coding licenciado sob <strong>MIT</strong>, com contexto de 1 milhão de tokens, que sai por <strong>US$ 1,40 / US$ 4,40</strong> por milhão de tokens na OpenRouter e é anunciado com <strong>62,1%</strong> no SWE-Bench <em>Pro</em>. Isso é barato e aberto — mas o 62,1, como quase todos os números desta semana, é <strong>reportado pelo fornecedor</strong>, e o número tão citado de \"crescimento de 80× em clientes na Vercel\" depende de uma única fonte agregadora. Ao lado disso, uma mudança silenciosa mas prática para usuários do Claude Code e um scanner de código que agora entende chamadas de SDKs de IA.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>GLM-5.2 (Z.ai)</strong>: pesos MIT, contexto de 1M, US$ 1,40/US$ 4,40. SWE-Bench <em>Pro</em> <strong>62,1%</strong> (fornecedor/agregador) — à frente do GPT-5.5 (58,6), atrás do Claude Opus 4.8 (69,2 — número do próprio System Card da Anthropic, também reportado pelo fornecedor).</li>\n      <li><span class=\"chip\">OSS</span> <strong>Adoção do GLM-5.2 na Vercel</strong>: \"crescimento de 80× em clientes, 27× em tokens na primeira semana\" — está em <em>um</em> blog agregador, não no changelog da própria Vercel. Não confirmado pela Vercel.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Code v2.1.207 (10/07)</strong>: modo automático agora <strong>sem opt-in</strong> no Bedrock, Vertex, Foundry; o <strong>Opus 4.8</strong> vira o modelo padrão ali. Quem quiser o comportamento antigo precisa definir modelo + modo explicitamente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>GPT-5.6 Sol</strong> lidera o <strong>Coding Agent Index</strong> da Artificial Analysis <strong>com 80,0</strong> (+2,8 à frente do Fable 5) — confirmado na fonte primária (post da própria OpenAI + AA). Prova diferente do SWE-Bench Pro, não confundir.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>CodeQL 2.26.0 (10/07)</strong>: nova query <code>js/system-prompt-injection</code> + sinks de SDKs de IA (OpenAI, Anthropic, Google GenAI). Um scanner que agora encontra prompt injection <em>no próprio código</em>.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot no VS Code, releases de junho (v1.123–1.127)</strong>: sessões paralelas de agentes, transparência de custo por sessão/subagente, descoberta de modelos via Marketplace, browser tools GA.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Continue.dev apaga dados na nuvem depois de 15/07</strong> (em 3 dias); o <strong>Devin Security Swarm</strong> da Cognition encontrou 36 de 50 falhas reais; o placar do Aider segue estagnado desde 20/11/2025.</li>\n      <li><span class=\"chip\">Local</span> <strong>Qwen3-Coder-Next</strong> (80B-MoE, 3B ativos, SWE-rebench Pass@5 64,6%) + <strong>DeepSeek-V4</strong>: o impulso dos pesos abertos continua. Datas exatas de lançamento incertas — sinalizadas como \"meados de 2026\".</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo, día de noticias tranquilo — pero con una historia que retoma justo donde terminó el hilo escéptico de ayer. El <strong>GLM-5.2</strong> de Z.ai es un modelo de coding con licencia <strong>MIT</strong>, con un contexto de 1 millón de tokens, que en OpenRouter cuesta <strong>US$ 1,40 / US$ 4,40</strong> por millón de tokens y se anuncia con <strong>62,1%</strong> en SWE-Bench <em>Pro</em>. Eso es barato y abierto — pero el 62,1, como casi todas las cifras de esta semana, está <strong>reportado por el proveedor</strong>, y la muy citada cifra de \"crecimiento de 80× en clientes en Vercel\" depende de una sola fuente agregadora. Junto a eso, un cambio silencioso pero práctico para quienes usan Claude Code, y un escáner de código que ahora entiende las llamadas a SDKs de IA.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>GLM-5.2 (Z.ai)</strong>: pesos MIT, contexto de 1M, US$ 1,40/US$ 4,40. SWE-Bench <em>Pro</em> <strong>62,1%</strong> (proveedor/agregador) — por delante de GPT-5.5 (58,6), por detrás de Claude Opus 4.8 (69,2 — cifra propia del System Card de Anthropic, también reportada por el proveedor).</li>\n      <li><span class=\"chip\">OSS</span> <strong>Adopción de GLM-5.2 en Vercel</strong>: \"crecimiento de 80× en clientes, 27× en tokens en la primera semana\" — aparece en <em>un</em> blog agregador, no en el changelog propio de Vercel. No confirmado por Vercel.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Code v2.1.207 (10/07)</strong>: el modo automático ahora <strong>sin opt-in</strong> en Bedrock, Vertex, Foundry; <strong>Opus 4.8</strong> se vuelve el modelo predeterminado ahí. Quien quiera el comportamiento anterior debe configurar modelo + modo explícitamente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>GPT-5.6 Sol</strong> lidera el <strong>Coding Agent Index</strong> de Artificial Analysis <strong>con 80,0</strong> (+2,8 por delante de Fable 5) — confirmado en fuente primaria (post de la propia OpenAI + AA). Prueba distinta a SWE-Bench Pro, no confundir.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>CodeQL 2.26.0 (10/07)</strong>: nueva query <code>js/system-prompt-injection</code> + sinks de SDKs de IA (OpenAI, Anthropic, Google GenAI). Un escáner que ahora encuentra inyección de prompts <em>en su propio código</em>.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot en VS Code, releases de junio (v1.123–1.127)</strong>: sesiones paralelas de agentes, transparencia de costos por sesión/subagente, descubrimiento de modelos vía Marketplace, browser tools GA.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Continue.dev elimina los datos en la nube después del 15/07</strong> (en 3 días); el <strong>Devin Security Swarm</strong> de Cognition encontró 36 de 50 fallas reales; el tablero de Aider sigue estancado desde el 20/11/2025.</li>\n      <li><span class=\"chip\">Local</span> <strong>Qwen3-Coder-Next</strong> (80B-MoE, 3B activos, SWE-rebench Pass@5 64,6%) + <strong>DeepSeek-V4</strong>: el impulso de los pesos abiertos continúa. Fechas exactas de lanzamiento poco claras — marcadas como \"mediados de 2026\".</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Sonntag, laute Woche — und ein roter Faden: Angewandte KI verschiebt sich von „Launch\" zu „hält das eigentlich stand?\". Das Sinnbild liefert OpenAI selbst: GPT-5.6 Sol Ultra meldet einen Beweis für ein 50 Jahre offenes Mathe-Problem, in unter einer Stunde — und der interessante Teil ist nicht der Beweis, sondern die Prüf-Lücke dahinter. Genau dieses Muster (Output in Minuten, Verifikation in Wochen) kommt gerade in jedem Betrieb an, der Agenten „fertige Arbeit\" abliefern lässt. Deshalb heute zwei recherchierte twiceD-Ideen rund um die Frage: Wer prüft, was die Maschine ausspuckt?</p>\n    <ul>\n      <li><span class=\"chip hot\">SCIENCE · Global</span> <strong>GPT-5.6 Sol Ultra</strong> meldet Beweis der 50-Jahre-Vermutung „Cycle Double Cover\" — 64 Subagenten, unter 1 h. Aber: nicht peer-reviewed, Mathematiker flaggt fehlende Quellen-Angabe. <strong>Angekündigt ≠ bewiesen.</strong></li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>OpenAI ChatGPT Work</strong> (09.07): Agent, der quer über Slack/Teams/Drive/CRM fertige Dokumente, Folien, Tabellen und Web-Apps abliefert — läuft weiter, wenn du offline bist.</li>\n      <li><span class=\"chip\">DELAY · US</span> <strong>Gemini 3.5 Pro</strong> verpasst die Juni-GA erneut, hängt in der Vertex-Preview — neues Ziel Juli. Berichtet als Googles zweiter Liefer-Miss 2026.</li>\n      <li><span class=\"chip\">CONSUMER · US</span> <strong>Anthropic Reflect</strong> (Beta, 09.07): Nutzungs-Dashboard über 1/3/6/12 Monate, Ruhezeiten, Pausen-Nudges — Wohlbefinden oder sanfter Verkauf?</li>\n      <li><span class=\"chip\">POLICY · Genf</span> <strong>UN Global Dialogue on AI Governance</strong> (06.–07.07): erster UN-mandatierter KI-Gipfel, rund 170 Länder; Guterres nennt drei Top-Risiken.</li>\n      <li><span class=\"chip\">REG · EU</span> Erinnerung: Trotz Omnibus-Verschiebung bleibt der <strong>2. Aug 2026</strong> scharf — Art.-50-Transparenz + GPAI-Straf­befugnisse gehen live.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>KI-Ergebnis-Audit</strong> (wer prüft die Agenten-Outputs?) und <strong>souveräner Cross-App-Arbeitsagent</strong>.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Sonntag, laute Woche — und ein roter Faden: Angewandte KI verschiebt sich von „Launch\" zu „hält das eigentlich stand?\". Das Sinnbild liefert OpenAI selbst: GPT-5.6 Sol Ultra meldet einen Beweis für ein 50 Jahre offenes Mathe-Problem, in unter einer Stunde — und der interessante Teil ist nicht der Beweis, sondern die Prüf-Lücke dahinter. Genau dieses Muster (Output in Minuten, Verifikation in Wochen) kommt gerade in jedem Betrieb an, der Agenten „fertige Arbeit\" abliefern lässt. Deshalb heute zwei recherchierte twiceD-Ideen rund um die Frage: Wer prüft, was die Maschine ausspuckt?</p>\n    <ul>\n      <li><span class=\"chip hot\">SCIENCE · Global</span> <strong>GPT-5.6 Sol Ultra</strong> meldet Beweis der 50-Jahre-Vermutung „Cycle Double Cover\" — 64 Subagenten, unter 1 h. Aber: nicht peer-reviewed, Mathematiker flaggt fehlende Quellen-Angabe. <strong>Angekündigt ≠ bewiesen.</strong></li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>OpenAI ChatGPT Work</strong> (09.07): Agent, der quer über Slack/Teams/Drive/CRM fertige Dokumente, Folien, Tabellen und Web-Apps abliefert — läuft weiter, wenn du offline bist.</li>\n      <li><span class=\"chip\">DELAY · US</span> <strong>Gemini 3.5 Pro</strong> verpasst die Juni-GA erneut, hängt in der Vertex-Preview — neues Ziel Juli. Berichtet als Googles zweiter Liefer-Miss 2026.</li>\n      <li><span class=\"chip\">CONSUMER · US</span> <strong>Anthropic Reflect</strong> (Beta, 09.07): Nutzungs-Dashboard über 1/3/6/12 Monate, Ruhezeiten, Pausen-Nudges — Wohlbefinden oder sanfter Verkauf?</li>\n      <li><span class=\"chip\">POLICY · Genf</span> <strong>UN Global Dialogue on AI Governance</strong> (06.–07.07): erster UN-mandatierter KI-Gipfel, rund 170 Länder; Guterres nennt drei Top-Risiken.</li>\n      <li><span class=\"chip\">REG · EU</span> Erinnerung: Trotz Omnibus-Verschiebung bleibt der <strong>2. Aug 2026</strong> scharf — Art.-50-Transparenz + GPAI-Straf­befugnisse gehen live.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>KI-Ergebnis-Audit</strong> (wer prüft die Agenten-Outputs?) und <strong>souveräner Cross-App-Arbeitsagent</strong>.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Quiet Sunday, loud week — and one common thread: applied AI is shifting from \"launch\" to \"does it actually hold up?\". OpenAI itself supplies the perfect illustration: GPT-5.6 Sol Ultra reports a proof for a 50-year-old open math problem, in under an hour — and the interesting part isn't the proof, it's the verification gap behind it. That exact pattern (output in minutes, verification in weeks) is arriving right now in every company that lets agents deliver \"finished work.\" So today, two researched twiceD ideas built around one question: who checks what the machine spits out?</p>\n    <ul>\n      <li><span class=\"chip hot\">SCIENCE · Global</span> <strong>GPT-5.6 Sol Ultra</strong> reports a proof of the 50-year-old \"Cycle Double Cover\" conjecture — 64 subagents, under 1 hour. But: not peer-reviewed, a mathematician flags a missing citation. <strong>Announced ≠ proven.</strong></li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>OpenAI ChatGPT Work</strong> (07/09): an agent that delivers finished documents, slides, spreadsheets, and web apps across Slack/Teams/Drive/CRM — and keeps working while you're offline.</li>\n      <li><span class=\"chip\">DELAY · US</span> <strong>Gemini 3.5 Pro</strong> misses its June GA again, still stuck in Vertex preview — new target is July. Reported as Google's second delivery miss of 2026.</li>\n      <li><span class=\"chip\">CONSUMER · US</span> <strong>Anthropic Reflect</strong> (beta, 07/09): a usage dashboard over 1/3/6/12 months, quiet hours, break nudges — wellbeing or soft upsell?</li>\n      <li><span class=\"chip\">POLICY · Geneva</span> <strong>UN Global Dialogue on AI Governance</strong> (07/06–07): the first UN-mandated AI summit, around 170 countries; Guterres names three top risks.</li>\n      <li><span class=\"chip\">REG · EU</span> Reminder: despite the Omnibus delay, <strong>August 2, 2026</strong> stays live — Article 50 transparency + GPAI penalty powers go into effect.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas: an <strong>AI-output audit</strong> (who checks agent outputs?) and a <strong>sovereign cross-app work agent</strong>.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo calmo, semana barulhenta — e um fio condutor: a IA aplicada está passando de \"lançamento\" para \"isso realmente se sustenta?\". O exemplo perfeito vem da própria OpenAI: o GPT-5.6 Sol Ultra anuncia uma prova para um problema matemático de 50 anos em aberto, em menos de uma hora — e a parte interessante não é a prova, e sim a lacuna de verificação por trás dela. Exatamente esse padrão (resultado em minutos, verificação em semanas) está chegando agora em toda empresa que deixa agentes entregarem \"trabalho pronto\". Por isso, hoje trazemos duas ideias pesquisadas para a twiceD em torno da pergunta: quem verifica o que a máquina produz?</p>\n    <ul>\n      <li><span class=\"chip hot\">SCIENCE · Global</span> <strong>GPT-5.6 Sol Ultra</strong> anuncia prova da conjectura de 50 anos \"Cycle Double Cover\" — 64 subagentes, em menos de 1h. Mas: não revisado por pares, matemático aponta falta de citação de fonte. <strong>Anunciado ≠ provado.</strong></li>\n      <li><span class=\"chip\">DEPLOY · EUA</span> <strong>OpenAI ChatGPT Work</strong> (09/07): agente que entrega documentos, slides, planilhas e web apps prontos em Slack/Teams/Drive/CRM — continua trabalhando enquanto você está offline.</li>\n      <li><span class=\"chip\">DELAY · EUA</span> <strong>Gemini 3.5 Pro</strong> perde o GA de junho de novo, ainda preso na prévia do Vertex — nova meta é julho. Relatado como o segundo atraso de entrega do Google em 2026.</li>\n      <li><span class=\"chip\">CONSUMER · EUA</span> <strong>Anthropic Reflect</strong> (beta, 09/07): painel de uso ao longo de 1/3/6/12 meses, horários de silêncio, lembretes de pausa — bem-estar ou venda disfarçada?</li>\n      <li><span class=\"chip\">POLICY · Genebra</span> <strong>UN Global Dialogue on AI Governance</strong> (06–07/07): primeira cúpula de IA mandatada pela ONU, cerca de 170 países; Guterres cita três riscos principais.</li>\n      <li><span class=\"chip\">REG · UE</span> Lembrete: apesar do adiamento do Omnibus, <strong>2 de agosto de 2026</strong> segue valendo — a transparência do Art. 50 e os poderes de multa da GPAI entram em vigor.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias: <strong>auditoria de resultado de IA</strong> (quem verifica os outputs dos agentes?) e <strong>agente de trabalho soberano multi-app</strong>.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo tranquilo, semana ruidosa — y un hilo conductor: la IA aplicada está pasando de \"lanzamiento\" a \"¿esto realmente se sostiene?\". El ejemplo perfecto lo da la propia OpenAI: GPT-5.6 Sol Ultra anuncia una prueba de un problema matemático de 50 años sin resolver, en menos de una hora — y lo interesante no es la prueba, sino el hueco de verificación detrás de ella. Justo ese patrón (resultado en minutos, verificación en semanas) está llegando ahora mismo a toda empresa que deja que sus agentes entreguen \"trabajo terminado\". Por eso, hoy traemos dos ideas investigadas para twiceD alrededor de una pregunta: ¿quién verifica lo que produce la máquina?</p>\n    <ul>\n      <li><span class=\"chip hot\">SCIENCE · Global</span> <strong>GPT-5.6 Sol Ultra</strong> anuncia la prueba de la conjetura de 50 años \"Cycle Double Cover\" — 64 subagentes, en menos de 1 hora. Pero: no revisada por pares, un matemático señala que falta citar una fuente. <strong>Anunciado ≠ probado.</strong></li>\n      <li><span class=\"chip\">DEPLOY · EE. UU.</span> <strong>OpenAI ChatGPT Work</strong> (09/07): agente que entrega documentos, presentaciones, hojas de cálculo y web apps terminados en Slack/Teams/Drive/CRM — sigue trabajando aunque estés desconectado.</li>\n      <li><span class=\"chip\">DELAY · EE. UU.</span> <strong>Gemini 3.5 Pro</strong> vuelve a fallar el GA de junio, sigue atorado en la vista previa de Vertex — nueva meta: julio. Reportado como el segundo retraso de entrega de Google en 2026.</li>\n      <li><span class=\"chip\">CONSUMER · EE. UU.</span> <strong>Anthropic Reflect</strong> (beta, 09/07): panel de uso a 1/3/6/12 meses, horarios de silencio, recordatorios de pausa — ¿bienestar o venta sutil?</li>\n      <li><span class=\"chip\">POLICY · Ginebra</span> <strong>UN Global Dialogue on AI Governance</strong> (06–07/07): primera cumbre de IA con mandato de la ONU, alrededor de 170 países; Guterres nombra tres riesgos principales.</li>\n      <li><span class=\"chip\">REG · UE</span> Recordatorio: pese al retraso del Omnibus, el <strong>2 de agosto de 2026</strong> se mantiene vigente — la transparencia del Art. 50 y las facultades sancionadoras de la GPAI entran en vigor.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas: <strong>auditoría de resultados de IA</strong> (¿quién verifica los resultados de los agentes?) y <strong>agente de trabajo soberano multiplataforma</strong>.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Nachricht des Tages steht nicht auf dem Board, sondern in zwei Studien und einem Behörden-Tender. Der <strong>Freelancer-Kompass 2026</strong> meldet zum <strong>ersten Mal überhaupt einen sinkenden Durchschnitts-Stundensatz</strong> — 103 Euro DACH-weit, ein Euro unter dem Vorjahr, Software &amp; Web-Entwicklung am unteren Ende bei 90 Euro. Und die Studie ist deutlich in einem zweiten Punkt: der reine „ich nutze KI-Tools\"-Aufschlag ist <em>tot</em>; echten Premium (20–30 %) zahlt der Markt nur noch für spezialisiertes KI-Infrastruktur-Wissen. Das Board selbst ist Kontinuität pur: <strong>95 Listings</strong> (74 unverändert übernommen, 21 neu), dieselbe Drei-Wege-Spitze bei <strong>Fit 88</strong>, Java/Spring/Angular als Rückgrat — Sätze im Band der Studien, nicht darüber. Dazu ein einzelner TED-Tender aus Bayern, der als Lehrstück für die Partner-Lücke taugt: Java-IAM-Entwicklung, aber eine Referenz-Schwelle von <strong>3,2 Mio. €</strong>, die eine Solo-GmbH nicht allein liefert.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>Erster Satz-Rückgang der Geschichte</strong>: der Freelancer-Kompass 2026 nennt einen DACH-Durchschnitt von <strong>103 €/h</strong> (von 104 €), Software &amp; Web-Entwicklung mit <strong>90 €/h</strong> das niedrigste Segment.</li>\n      <li><span class=\"chip hot\">KI</span> <strong>KI-Tool-Aufschlag ist tot</strong>: 53 % nutzen KI-Tools täglich — das ist Standard, kein Differenzierer. Aufschlag von 20–30 % nur noch für ML-Produktion, Vektor-DBs, Cloud-Architektur, Compliance-Setups.</li>\n      <li><span class=\"chip\">Kontext</span> <strong>SAP friert breit ein</strong>: fast konzernweiter Einstellungs-Stopp (~110.000 MA, Stand 06.07.), nur „geschäftskritische KI-Rollen\" ausgenommen — bei gleichzeitig <strong>+530 %</strong> KI-Ausschreibungen 2023→2025.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board hält, breiter Boden</strong>: 95 Listings (80 Freelance / 11 Employee / 4 Intriguing), Ø Fit 68, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil), Java 60× / Spring 46× / Angular 38× — 72 remote, Sätze 85–130 €/h*.</li>\n      <li><span class=\"chip\">Neu</span> <strong>21 Neuzugänge, TI-Healthcare vorn</strong>: zwei Telematikinfrastruktur-Java-Stellen (VARIUS, TRIBAR, je Fit 80), ein Python-IaC-Projekt (Nemensis, 72), ein Gebäudeautomation-IoT-Treffer (APRIORI, 62).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische hält im Band</strong>: HENNING (Automotive/Ingolstadt, Fit 86), Michael Page (E-Mobility-SaaS, 75), Amoria Bond (IoT/Java, 72), A3Watt (Smart-Home/MQTT, 70) — verbreitert sich, bleibt beim Standard-Preis.</li>\n      <li><span class=\"chip\">CH</span> <strong>KI-Aufschlag hält, Java-Aufschlag nicht</strong>: ELCA (Agentic AI, CHF 140–190 k*, 81), Camunda (80), AXA (80) zahlen über Median — der breite Java/Spring-Freelance-Strom nicht. JetBrains Principal FDE (82) ist Mission, nicht Satz.</li>\n      <li><span class=\"chip\">TED</span> <strong>Ein Tender, eine Partner-Lücke</strong>: Bayerisches Landesamt für Steuern, Java + Web-Frontend im IAM — Referenz-Schwelle ≥ <strong>3,2 Mio. € netto</strong> bei ≥ 80 % Bieteranteil = klarer ⚠️ Partner-Fall. <strong>Frist und exakter CPV nicht bestätigt</strong> — direkt auf TED prüfen, nichts erfunden.</li>\n    </ul></div>",

istings (80 Freelance / 11 Employee / 4 Intriguing), Ø Fit 68, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil), Java 60× / Spring 46× / Angular 38× — 72 remote, Sätze 85–130 €/h*.</li>\n      <li><span class=\"chip\">Neu</span> <strong>21 Neuzugänge, TI-Healthcare vorn</strong>: zwei Telematikinfrastruktur-Java-Stellen (VARIUS, TRIBAR, je Fit 80), ein Python-IaC-Projekt (Nemensis, 72), ein Gebäudeautomation-IoT-Treffer (APRIORI, 62).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische hält im Band</strong>: HENNING (Automotive/Ingolstadt, Fit 86), Michael Page (E-Mobility-SaaS, 75), Amoria Bond (IoT/Java, 72), A3Watt (Smart-Home/MQTT, 70) — verbreitert sich, bleibt beim Standard-Preis.</li>\n      <li><span class=\"chip\">CH</span> <strong>KI-Aufschlag hält, Java-Aufschlag nicht</strong>: ELCA (Agentic AI, CHF 140–190 k*, 81), Camunda (80), AXA (80) zahlen über Median — der breite Java/Spring-Freelance-Strom nicht. JetBrains Principal FDE (82) ist Mission, nicht Satz.</li>\n      <li><span class=\"chip\">TED</span> <strong>Ein Tender, eine Partner-Lücke</strong>: Bayerisches Landesamt für Steuern, Java + Web-Frontend im IAM — Referenz-Schwelle ≥ <strong>3,2 Mio. € netto</strong> bei ≥ 80 % Bieteranteil = klarer ⚠️ Partner-Fall. <strong>Frist und exakter CPV nicht bestätigt</strong> — direkt auf TED prüfen, nichts erfunden.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today's real story isn't on the board — it's in two studies and one government tender. The <strong>Freelancer-Kompass 2026</strong> reports a <strong>declining average hourly rate for the first time ever</strong> — 103 euros DACH-wide, one euro below last year, with software &amp; web development at the low end at 90 euros. And the study is unambiguous on a second point: the plain \"I use AI tools\" premium is <em>dead</em>; the market still pays a real premium (20–30%) only for specialized AI-infrastructure expertise. The board itself is pure continuity: <strong>95 listings</strong> (74 carried over unchanged, 21 new), the same three-way tie at <strong>Fit 88</strong>, Java/Spring/Angular as the backbone — rates within the studies' band, not above it. Plus a single TED tender from Bavaria that serves as a case study for the partner gap: Java IAM development, but a reference threshold of <strong>€3.2M</strong> that a solo GmbH can't deliver alone.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>First rate decline in the survey's history</strong>: the Freelancer-Kompass 2026 puts the DACH average at <strong>€103/h</strong> (down from €104), with software &amp; web development at <strong>€90/h</strong> the lowest segment.</li>\n      <li><span class=\"chip hot\">AI</span> <strong>The AI-tool premium is dead</strong>: 53% use AI tools daily — that's now standard, not a differentiator. A 20–30% premium survives only for ML production, vector DBs, cloud architecture, compliance setups.</li>\n      <li><span class=\"chip\">Context</span> <strong>SAP freezes broadly</strong>: an almost company-wide hiring freeze (~110,000 staff, as of 07/06), with only \"business-critical AI roles\" exempt — even as AI project postings rose <strong>+530%</strong> from 2023 to 2025.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board holds, floor broadens</strong>: 95 listings (80 freelance / 11 employee / 4 intriguing), avg. Fit 68, three-way tie at Fit 88 (iSAX, BridgingIT, Keil), Java 60×/Spring 46×/Angular 38× — 72 remote-capable, rates €85–130/h*.</li>\n      <li><span class=\"chip\">New</span> <strong>21 new arrivals, telematics healthcare leads</strong>: two telematics-infrastructure Java roles (VARIUS, TRIBAR, Fit 80 each), one Python-IaC project (Nemensis, 72), one building-automation IoT hit (APRIORI, 62).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Niche holds within the band</strong>: HENNING (automotive/Ingolstadt, Fit 86), Michael Page (e-mobility SaaS, 75), Amoria Bond (IoT/Java, 72), A3Watt (smart home/MQTT, 70) — broadening, but staying at the standard rate.</li>\n      <li><span class=\"chip\">CH</span> <strong>AI premium holds, Java premium doesn't</strong>: ELCA (agentic AI, CHF 140–190k*, 81), Camunda (80), AXA (80) pay above median — the broad Java/Spring freelance stream doesn't. JetBrains Principal FDE (82) is mission, not rate.</li>\n      <li><span class=\"chip\">TED</span> <strong>One tender, one partner gap</strong>: Bavarian State Tax Office, Java + web frontend in IAM — reference threshold of ≥ <strong>€3.2M net</strong> at ≥ 80% bidder share = a clear ⚠️ partner case. <strong>Deadline and exact CPV not confirmed</strong> — verify directly on TED, nothing invented.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A notícia do dia não está no board, mas em dois estudos e uma licitação pública. O <strong>Freelancer-Kompass 2026</strong> registra, <strong>pela primeira vez, uma queda na taxa horária média</strong> — 103 euros em toda a região DACH, um euro a menos que no ano anterior, com desenvolvimento de software e web no fim mais baixo, a 90 euros. E o estudo é claro num segundo ponto: o prêmio puro por \"eu uso ferramentas de IA\" está <em>morto</em>; o mercado só paga um prêmio real (20–30 %) por conhecimento especializado em infraestrutura de IA. O board em si é continuidade pura: <strong>95 vagas</strong> (74 mantidas sem alteração, 21 novas), o mesmo empate triplo no topo com <strong>Fit 88</strong>, Java/Spring/Angular como espinha dorsal — taxas dentro da faixa dos estudos, não acima dela. Além disso, uma única licitação do TED na Baviera que serve como lição sobre a lacuna de parceiro: desenvolvimento Java para IAM, mas um limiar de referência de <strong>3,2 Mio. €</strong> que uma GmbH solo não entrega sozinha.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Primeira queda de taxa da história</strong>: o Freelancer-Kompass 2026 cita uma média DACH de <strong>103 €/h</strong> (ante 104 €), com desenvolvimento de software e web a <strong>90 €/h</strong> como o segmento mais baixo.</li>\n      <li><span class=\"chip hot\">IA</span> <strong>O prêmio por ferramentas de IA está morto</strong>: 53 % usam ferramentas de IA diariamente — isso já é padrão, não um diferencial. Prêmio de 20–30 % só para ML em produção, bancos de dados vetoriais, arquitetura cloud, configurações de compliance.</li>\n      <li><span class=\"chip\">Contexto</span> <strong>SAP congela amplamente</strong>: paralisação de contratações quase em todo o grupo (~110.000 funcionários, posição de 06.07.), com exceção só para \"funções de IA críticas para o negócio\" — ao mesmo tempo em que as licitações de projetos de IA sobem <strong>+530 %</strong> entre 2023 e 2025.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board se mantém, base mais ampla</strong>: 95 vagas (80 freelance / 11 CLT / 4 intriguing), Fit médio 68, empate triplo no topo com Fit 88 (iSAX, BridgingIT, Keil), Java 60× / Spring 46× / Angular 38× — 72 remotas, taxas 85–130 €/h*.</li>\n      <li><span class=\"chip\">Novo</span> <strong>21 novas entradas, TI de saúde na frente</strong>: duas vagas Java de infraestrutura de telemática (VARIUS, TRIBAR, ambas Fit 80), um projeto Python de IaC (Nemensis, 72), um achado de IoT para automação predial (APRIORI, 62).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nicho se mantém na faixa</strong>: HENNING (automotivo/Ingolstadt, Fit 86), Michael Page (SaaS de e-mobility, 75), Amoria Bond (IoT/Java, 72), A3Watt (smart home/MQTT, 70) — se amplia, mas permanece no preço padrão.</li>\n      <li><span class=\"chip\">CH</span> <strong>Prêmio de IA se mantém, prêmio de Java não</strong>: ELCA (IA agêntica, CHF 140–190 k*, 81), Camunda (80), AXA (80) pagam acima da mediana — o amplo fluxo freelance de Java/Spring, não. O Principal FDE da JetBrains (82) é missão, não taxa.</li>\n      <li><span class=\"chip\">TED</span> <strong>Uma licitação, uma lacuna de parceiro</strong>: Bayerisches Landesamt für Steuern, Java + frontend web em IAM — limiar de referência ≥ <strong>3,2 Mio. € líquidos</strong> com ≥ 80 % de participação do licitante = claro caso ⚠️ Parceiro. <strong>Prazo e CPV exato não confirmados</strong> — verificar diretamente no TED, nada inventado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La noticia del día no está en el tablero, sino en dos estudios y una licitación gubernamental. El <strong>Freelancer-Kompass 2026</strong> reporta <strong>por primera vez en su historia una tarifa promedio por hora a la baja</strong> — 103 euros en toda la región DACH, un euro menos que el año anterior, con desarrollo de software y web en el extremo inferior a 90 euros. Y el estudio es contundente en un segundo punto: el sobreprecio por el mero \"uso de herramientas de IA\" ya está <em>muerto</em>; el mercado solo sigue pagando una prima real (20–30 %) por conocimiento especializado en infraestructura de IA. El tablero en sí es pura continuidad: <strong>95 listados</strong> (74 heredados sin cambios, 21 nuevos), el mismo triple empate en la cima con <strong>fit 88</strong>, Java/Spring/Angular como columna vertebral — tarifas dentro de la banda de los estudios, no por encima. Además, una sola licitación del TED en Baviera que sirve de caso de estudio sobre la brecha de socio: desarrollo Java-IAM, pero con un umbral de referencia de <strong>3,2 millones de €</strong> que una GmbH solitaria no puede cumplir por sí sola.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Primera baja de tarifa en la historia</strong>: el Freelancer-Kompass 2026 reporta un promedio de <strong>103 €/h</strong> en la región DACH (antes 104 €), con desarrollo de software y web en <strong>90 €/h</strong> como el segmento más bajo.</li>\n      <li><span class=\"chip hot\">IA</span> <strong>El sobreprecio por herramientas de IA está muerto</strong>: 53 % usa herramientas de IA a diario — eso ya es el estándar, no un diferenciador. El sobreprecio de 20–30 % ahora es solo para ML en producción, bases de datos vectoriales, arquitectura cloud, configuraciones de cumplimiento normativo.</li>\n      <li><span class=\"chip\">Contexto</span> <strong>SAP congela ampliamente</strong>: paro casi total de contrataciones a nivel corporativo (~110,000 empleados, al 06/07), con excepción solo de \"roles de IA críticos para el negocio\" — mientras las licitaciones de proyectos de IA suben <strong>+530 %</strong> entre 2023 y 2025.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>El tablero se mantiene, piso amplio</strong>: 95 listados (80 freelance / 11 empleo / 4 intriguing), fit prom. 68, triple empate en la cima con fit 88 (iSAX, BridgingIT, Keil), Java 60×/Spring 46×/Angular 38× — 72 remotos, tarifas 85–130 €/h*.</li>\n      <li><span class=\"chip\">Nuevo</span> <strong>21 incorporaciones, TI de salud a la cabeza</strong>: dos puestos Java de infraestructura de telemática (VARIUS, TRIBAR, fit 80 cada uno), un proyecto Python-IaC (Nemensis, 72), un acierto en automatización de edificios/IoT (APRIORI, 62).</li>\n      <li><span class=\"chip\">IoT</span> <strong>El nicho se mantiene dentro de la banda</strong>: HENNING (automotriz/Ingolstadt, fit 86), Michael Page (SaaS de e-mobility, 75), Amoria Bond (IoT/Java, 72), A3Watt (smart home/MQTT, 70) — se amplía, pero se mantiene en el precio estándar.</li>\n      <li><span class=\"chip\">CH</span> <strong>El sobreprecio de IA se sostiene, el de Java no</strong>: ELCA (agentic AI, CHF 140–190 k*, 81), Camunda (80), AXA (80) pagan por encima de la mediana — el amplio flujo freelance de Java/Spring, no. El Principal FDE de JetBrains (82) es misión, no tarifa.</li>\n      <li><span class=\"chip\">TED</span> <strong>Una licitación, una brecha de socio</strong>: Bayerisches Landesamt für Steuern, Java + frontend web en IAM — umbral de referencia ≥ <strong>3,2 millones de € netos</strong> con ≥ 80 % de participación del licitante = claro caso de ⚠️ socio. <strong>Plazo y CPV exacto sin confirmar</strong> — verificar directamente en TED, nada inventado.</li>\n    </ul></div>"

        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Sonntag, die Bundesliga schläft Sommerpause, und für Daniels beide Nationen ist die WM lange vorbei. Trotzdem hat der Tag drei Fäden: In Nordamerika stehen nach den letzten beiden Viertelfinals über Nacht beide Halbfinal-Paarungen fest. In Freiburg beginnt heute die Vorbereitung auf 26/27 — mit dem teuersten Verkauf der Vereinsgeschichte im Anmarsch. Und beim DFB ist der Umbruch nach dem WM-Aus komplett: Nagelsmann ist weg, Klopp soll kommen.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Halbfinale steht</strong>: Frankreich–Spanien Di 14.07., England–Argentinien Mi 15.07. — beide 21:00 MESZ / 16:00 BRT. Finale So 19.07. (MetLife).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Über Nacht komplettiert</strong>: England 2:1 Norwegen n.V. (Bellingham-Doppelpack); Argentinien 3:1 Schweiz n.V. (Embolo Gelb-Rot).</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Trainingsauftakt heute</strong>: Start in die Saison 26/27 am 12.07.; Trainingslager Schruns/Österreich 22.–31.07.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi vor Newcastle</strong>: „vollständige Einigung\", ~60 Mio. € — Freiburg-Rekord. Offiziell noch nicht vollzogen.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Rein &amp; raus</strong>: Zugänge Yamamoto (St. Truiden) &amp; Goto (Anderlecht); Adamu → Schalke, Sturm → Braunschweig.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann zurückgetreten</strong>: Trennung am 03.07. nach dem WM-Aus. Klopp und DFB einigten sich auf die Vertrags-Eckpunkte (Stand 11.07.) — offen ist nur noch die Freigabe durch Red Bull.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay, 3:4 i. E. (Mo 29.06.) — im Sechzehntelfinale, der ersten K.-o.-Runde des 48er-Felds.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen im Achtelfinale (So 05.07.), Haaland-Doppelpack. Frühestes WM-Aus seit 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 abgehakt</strong>: Bayern Meister (89 Pkt), Freiburg 7. (47) → Conference-League-Quali. Neustart Fr 28.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Liga pausiert</strong>: eingefroren nach Rodada 18, Palmeiras führt (41 Pkt). Neustart in der Woche des 16.–22.07.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday, the Bundesliga is asleep for the summer, and for both of Daniel's nations the World Cup is long over. Still, the day has three threads: in North America, both semifinal pairings are now set after the last two quarterfinals played out overnight. In Freiburg, preparations for 26/27 begin today — with the most expensive sale in club history closing in. And at the DFB, the shake-up after the World Cup exit is complete: Nagelsmann is gone, Klopp is set to take over.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Semifinals set</strong>: France–Spain Tue. 07/14, England–Argentina Wed. 07/15 — both 21:00 MESZ / 16:00 BRT. Final Sun. 07/19 (MetLife).</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Completed overnight</strong>: England 2-1 Norway a.e.t. (Bellingham brace); Argentina 3-1 Switzerland a.e.t. (Embolo red card).</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Preseason kickoff today</strong>: season 26/27 begins 07/12; training camp in Schruns, Austria 07/22–31.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi close to Newcastle</strong>: a \"full agreement,\" ~€60m — a Freiburg record. Not yet officially completed.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Ins &amp; outs</strong>: signings Yamamoto (St. Truiden) &amp; Goto (Anderlecht); Adamu → Schalke, Sturm → Braunschweig.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann resigned</strong>: parted ways 07/03 after the World Cup exit. Klopp and the DFB agreed on the key contract points (as of 07/11) — only Red Bull's release is still outstanding.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Germany out</strong>: 1-1 vs. Paraguay, 3-4 on penalties (Mon. 06/29) — in the round of 32, the first knockout round of the 48-team format.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil out</strong>: 1-2 vs. Norway in the round of 16 (Sun. 07/05), Haaland brace. Earliest World Cup exit since 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 in the books</strong>: Bayern champions (89 pts), Freiburg 7th (47) → Conference League qualifying. Restart Fri. 08/28.</li>\n      <li><span class=\"chip\">BRA</span> <strong>League on hold</strong>: frozen after Round 18, Palmeiras leads (41 pts). Restart in the week of 07/16-22.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É domingo, a Bundesliga está em pausa de verão, e para as duas seleções de Daniel a Copa já ficou para trás há muito tempo. Mesmo assim, o dia tem três assuntos: na América do Norte, depois das duas últimas quartas de final, os dois confrontos de semifinal ficaram definidos durante a madrugada. Em Freiburg, começa hoje a preparação para a temporada 26/27 — com a venda mais cara da história do clube a caminho. E no DFB, a reformulação após a eliminação na Copa está completa: Nagelsmann saiu, Klopp deve assumir.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Semifinais definidas</strong>: França–Espanha ter. 14/07, Inglaterra–Argentina qua. 15/07 — ambas às 21h00 MESZ / 16h00 BRT. Final dom. 19/07 (MetLife).</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Completado durante a madrugada</strong>: Inglaterra 2 a 1 sobre a Noruega, na prorrogação (dobradinha de Bellingham); Argentina 3 a 1 sobre a Suíça, na prorrogação (expulsão de Embolo).</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Início dos treinos hoje</strong>: início da temporada 26/27 em 12/07; estágio de treinamento em Schruns, na Áustria, de 22 a 31/07.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Manzambi perto do Newcastle</strong>: \"acordo total\", cerca de € 60 milhões — recorde do Freiburg. Ainda não oficializado.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Entradas e saídas</strong>: chegam Yamamoto (St. Truiden) e Goto (Anderlecht); Adamu → Schalke, Sturm → Braunschweig.</li>\n      <li><span class=\"chip hot\">Seleção Alemã</span> <strong>Nagelsmann renuncia</strong>: separação em 03/07 após a eliminação na Copa. Klopp e o DFB fecharam os pontos-chave do contrato (dado de 11/07) — falta apenas a liberação do Red Bull.</li>\n      <li><span class=\"chip\">Seleção Alemã</span> <strong>Alemanha fora</strong>: 1 a 1 com o Paraguai, 3 a 4 nos pênaltis (seg. 29/06) — na fase de 32, a primeira rodada eliminatória do formato com 48 seleções.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil fora</strong>: 1 a 2 para a Noruega nas oitavas de final (dom. 05/07), dobradinha de Haaland. Pior eliminação em Copas desde 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 é passado</strong>: Bayern campeão (89 pts), Freiburg em 7º (47) → fase preliminar da Conference League. Retorno sex. 28/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Liga em pausa</strong>: congelado após a Rodada 18, Palmeiras lidera (41 pts). Retorno na semana de 16 a 22/07.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es domingo, la Bundesliga está en receso de verano, y para las dos selecciones de Daniel el Mundial ya quedó atrás hace tiempo. Aun así, el día trae tres temas: en Norteamérica, tras los dos últimos cuartos de final, ya quedaron definidos los dos cruces de semifinales durante la madrugada. En el SC Freiburg arranca hoy la preparación para la 26/27 — con la venta más cara en la historia del club acercándose. Y en la DFB, la reestructuración tras la eliminación del Mundial está completa: Nagelsmann se fue, Klopp asumiría.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Semifinales definidas</strong>: Francia–España mar. 14/07, Inglaterra–Argentina mié. 15/07 — ambas a las 21:00 MESZ / 16:00 BRT. Final dom. 19/07 (MetLife).</li>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Completado durante la madrugada</strong>: Inglaterra 2-1 Noruega en tiempo extra (doblete de Bellingham); Argentina 3-1 Suiza en tiempo extra (expulsión de Embolo).</li>\n      <li><span class=\"chip good\">SC Freiburg</span> <strong>Arranque de pretemporada hoy</strong>: inicio de la temporada 26/27 el 12/07; concentración en Schruns, Austria, del 22 al 31/07.</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>Manzambi cerca del Newcastle</strong>: \"acuerdo total\", ~60 millones de euros — récord del SC Freiburg. Aún no es oficial.</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>Entradas y salidas</strong>: llegan Yamamoto (St. Truiden) y Goto (Anderlecht); Adamu → Schalke, Sturm → Braunschweig.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann renuncia</strong>: ruptura el 03/07 tras la eliminación del Mundial. Klopp y la DFB acordaron los puntos clave del contrato (al 11/07) — solo falta la liberación del Red Bull.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Alemania eliminada</strong>: 1-1 contra Paraguay, 3-4 en penales (lun. 29/06) — en la ronda de 32, la primera ronda eliminatoria del formato con 48 selecciones.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil eliminado</strong>: 1-2 contra Noruega en octavos de final (dom. 05/07), doblete de Haaland. Su eliminación más temprana desde 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>La 25/26 ya es historia</strong>: el Bayern es campeón (89 pts), el SC Freiburg terminó 7º (47) → fase previa de la Conference League. Reinicio vie. 28/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Liga en pausa</strong>: congelado tras la Jornada 18, el Palmeiras es líder (41 pts). Reinicio en la semana del 16 al 22/07.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Sonntag, der 12. Juli — Renntag doppelt. In Interlagos, Daniels Heimstrecke, startet das <strong>Sechs-Stunden-Rennen der WEC um 11:30 BRT / 16:30 MESZ</strong>; am Sachsenring fährt die <strong>MotoGP um 09:00 BRT / 14:00 MESZ</strong> ihren Grand Prix. Beide Rennen laufen erst am Nachmittag europäischer Zeit — was schon feststeht, sind die Startaufstellungen: In Interlagos hat <strong>Cadillac die erste Reihe komplett belegt</strong> (Stevens auf Pole), am Sachsenring hat <strong>Marc Márquez das Wochenende bislang durchgezogen</strong> — Pole mit Streckenrekord, Sprint-Sieg, schnellstes Warm-up. Trotzdem ist er in der WM nur Fünfter. Die Formel 1 pausiert bis Spa (17.–19.07.).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo — heute 11:30 BRT / 16:30 MESZ</strong>. Cadillac Hertz Team JOTA sperrt die erste Startreihe: <strong>Will Stevens</strong> (#12) auf Pole mit <strong>1:23,041</strong>, Jack Aitken (#38) +0,048 s; die schnellste Alpine (Martins) folgt +0,067 s.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Deutschland-GP — heute 09:00 BRT / 14:00 MESZ</strong>. Márquez holte Pole (77. Premier-Class-Pole + Rundenrekord), gewann den Sprint (führte alle 15 Runden) und war heute früh im Warm-up Schnellster.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Der Haken: Márquez ist trotzdem nur Fünfter</strong> — 165 Punkte, <strong>32 hinter Leader Jorge Martín</strong> (197). Der Sprint bringt nur halbe Punkte, und Martín punktete als Sechster mit.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Herstellerwertung eingefroren</strong>: Toyota 132 vor BMW 96 und Ferrari 62. Der Stand ruht seit Le Mans — Interlagos ist zur Saisonhalbzeit (Runde 4 von 8) das erste Rennen, das ihn wieder bewegt.</li>\n      <li><span class=\"chip\">F1</span> <strong>Pause bis Spa</strong>: keine Session dieses Wochenende. Antonelli (179) und Mercedes (333) führen unverändert seit Silverstone; nächstes Rennen ist der GP Belgien, 17.–19.07. (Rennen So 15:00 MESZ / 10:00 BRT).</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag ist konfliktfrei</strong>: MotoGP-Start 09:00 BRT, nach rund 45 min vorbei — dann rund 1¾ Stunden Puffer bis zum Interlagos-Start um 11:30 BRT.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Sonntag, der 12. Juli — Renntag doppelt. In Interlagos, Daniels Heimstrecke, startet das <strong>Sechs-Stunden-Rennen der WEC um 11:30 BRT / 16:30 MESZ</strong>; am Sachsenring fährt die <strong>MotoGP um 09:00 BRT / 14:00 MESZ</strong> ihren Grand Prix. Beide Rennen laufen erst am Nachmittag europäischer Zeit — was schon feststeht, sind die Startaufstellungen: In Interlagos hat <strong>Cadillac die erste Reihe komplett belegt</strong> (Stevens auf Pole), am Sachsenring hat <strong>Marc Márquez das Wochenende bislang durchgezogen</strong> — Pole mit Streckenrekord, Sprint-Sieg, schnellstes Warm-up. Trotzdem ist er in der WM nur Fünfter. Die Formel 1 pausiert bis Spa (17.–19.07.).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo — heute 11:30 BRT / 16:30 MESZ</strong>. Cadillac Hertz Team JOTA sperrt die erste Startreihe: <strong>Will Stevens</strong> (#12) auf Pole mit <strong>1:23,041</strong>, Jack Aitken (#38) +0,048 s; die schnellste Alpine (Martins) folgt +0,067 s.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Deutschland-GP — heute 09:00 BRT / 14:00 MESZ</strong>. Márquez holte Pole (77. Premier-Class-Pole + Rundenrekord), gewann den Sprint (führte alle 15 Runden) und war heute früh im Warm-up Schnellster.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Der Haken: Márquez ist trotzdem nur Fünfter</strong> — 165 Punkte, <strong>32 hinter Leader Jorge Martín</strong> (197). Der Sprint bringt nur halbe Punkte, und Martín punktete als Sechster mit.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Herstellerwertung eingefroren</strong>: Toyota 132 vor BMW 96 und Ferrari 62. Der Stand ruht seit Le Mans — Interlagos ist zur Saisonhalbzeit (Runde 4 von 8) das erste Rennen, das ihn wieder bewegt.</li>\n      <li><span class=\"chip\">F1</span> <strong>Pause bis Spa</strong>: keine Session dieses Wochenende. Antonelli (179) und Mercedes (333) führen unverändert seit Silverstone; nächstes Rennen ist der GP Belgien, 17.–19.07. (Rennen So 15:00 MESZ / 10:00 BRT).</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag ist konfliktfrei</strong>: MotoGP-Start 09:00 BRT, nach rund 45 min vorbei — dann rund 1¾ Stunden Puffer bis zum Interlagos-Start um 11:30 BRT.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday, July 12 — a double race day. In Interlagos, Daniel's home track, the <strong>WEC six-hour race starts at 11:30 BRT / 16:30 CEST</strong>; at the Sachsenring, <strong>MotoGP runs its Grand Prix at 09:00 BRT / 14:00 CEST</strong>. Both races don't get underway until the afternoon European time — but the starting grids are already set: in Interlagos, <strong>Cadillac has locked out the front row</strong> (Stevens on pole), and at the Sachsenring <strong>Marc Márquez has swept the weekend so far</strong> — pole with a lap record, sprint win, fastest in warm-up. Yet he's only fifth in the championship. Formula 1 is on a break until Spa (July 17–19).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>6 Hours of São Paulo — today, 11:30 BRT / 16:30 CEST</strong>. Cadillac Hertz Team JOTA locks out the front row: <strong>Will Stevens</strong> (#12) on pole with <strong>1:23.041</strong>, Jack Aitken (#38) +0.048 s; the fastest Alpine (Martins) follows +0.067 s.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>German GP — today, 09:00 BRT / 14:00 CEST</strong>. Márquez took pole (his 77th premier-class pole plus a lap record), won the sprint (led all 15 laps), and was fastest in this morning's warm-up.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>The catch: Márquez is still only fifth</strong> — 165 points, <strong>32 behind leader Jorge Martín</strong> (197). The sprint only pays half points, and Martín scored too by finishing sixth.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Manufacturers' standings frozen</strong>: Toyota 132 ahead of BMW 96 and Ferrari 62. The standings have been static since Le Mans — Interlagos, at the season's halfway point (round 4 of 8), is the first race to move them again.</li>\n      <li><span class=\"chip\">F1</span> <strong>Break until Spa</strong>: no session this weekend. Antonelli (179) and Mercedes (333) still lead, unchanged since Silverstone; the next race is the Belgian GP, July 17–19 (race Sunday 15:00 CEST / 10:00 BRT).</li>\n      <li><span class=\"chip\">Aside</span> <strong>Daniel's Sunday has no conflict</strong>: MotoGP starts at 09:00 BRT and wraps up after about 45 minutes — leaving roughly 1¾ hours of buffer before the Interlagos start at 11:30 BRT.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é domingo, 12 de julho — dia duplo de corrida. Em Interlagos, a pista da casa de Daniel, a <strong>corrida de seis horas da WEC começa às 11h30 BRT / 16h30 CEST</strong>; em Sachsenring, a <strong>MotoGP disputa seu Grande Prêmio às 09h00 BRT / 14h00 CEST</strong>. As duas corridas só rolam à tarde no horário europeu — mas o que já está definido é o grid de largada: em Interlagos, a <strong>Cadillac fechou a primeira fila inteira</strong> (Stevens na pole); em Sachsenring, <strong>Marc Márquez arrasou o fim de semana até agora</strong> — pole com recorde da pista, vitória no sprint, mais rápido no warm-up. Mesmo assim, ele só é o quinto no campeonato. A Fórmula 1 tira folga até Spa (17 a 19/07).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>6 Horas de São Paulo — hoje, 11h30 BRT / 16h30 CEST</strong>. A Cadillac Hertz Team JOTA trava a primeira fila: <strong>Will Stevens</strong> (#12) na pole com <strong>1:23,041</strong>, Jack Aitken (#38) a +0,048 s; o Alpine mais rápido (Martins) vem logo atrás, a +0,067 s.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>GP da Alemanha — hoje, 09h00 BRT / 14h00 CEST</strong>. Márquez fez a pole (sua 77ª na categoria principal, com recorde da volta), venceu o sprint (liderou todas as 15 voltas) e foi o mais rápido no warm-up desta manhã.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>O detalhe: Márquez ainda é só o quinto</strong> — 165 pontos, <strong>32 atrás do líder Jorge Martín</strong> (197). O sprint só dá metade dos pontos, e Martín ainda pontuou ao terminar em sexto.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Classificação de fabricantes congelada</strong>: Toyota com 132 pontos, à frente de BMW (96) e Ferrari (62). A tabela está parada desde Le Mans — Interlagos, na metade da temporada (rodada 4 de 8), é a primeira corrida a mexer nela de novo.</li>\n      <li><span class=\"chip\">F1</span> <strong>Folga até Spa</strong>: nenhuma sessão neste fim de semana. Antonelli (179) e Mercedes (333) seguem na liderança, sem mudanças desde Silverstone; a próxima corrida é o GP da Bélgica, 17 a 19/07 (corrida no domingo, 15h00 CEST / 10h00 BRT).</li>\n      <li><span class=\"chip\">À parte</span> <strong>O domingo de Daniel não tem conflito</strong>: a MotoGP começa às 09h00 BRT e termina depois de cerca de 45 min — sobrando por volta de 1h45 de folga até a largada em Interlagos, às 11h30 BRT.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es domingo 12 de julio — día doble de carreras. En Interlagos, la pista de casa de Daniel, la <strong>carrera de seis horas de la WEC arranca a las 11:30 BRT / 16:30 CEST</strong>; en Sachsenring, la <strong>MotoGP corre su Gran Premio a las 09:00 BRT / 14:00 CEST</strong>. Ambas carreras no se ponen en marcha sino hasta la tarde en horario europeo — pero lo que ya está definido son las parrillas de salida: en Interlagos, <strong>Cadillac se adueñó de toda la primera fila</strong> (Stevens en la pole); en Sachsenring, <strong>Marc Márquez ha arrasado con todo el fin de semana</strong> — pole con récord de vuelta, victoria en el sprint, el más rápido en los libres de calentamiento. Aun así, es solo quinto en el campeonato. La Fórmula 1 está de descanso hasta Spa (17 al 19/07).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>6 Horas de São Paulo — hoy, 11:30 BRT / 16:30 CEST</strong>. Cadillac Hertz Team JOTA se queda con toda la primera fila: <strong>Will Stevens</strong> (#12) en la pole con <strong>1:23.041</strong>, Jack Aitken (#38) a +0.048 s; el Alpine más rápido (Martins) sigue a +0.067 s.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>GP de Alemania — hoy, 09:00 BRT / 14:00 CEST</strong>. Márquez logró la pole (su 77ª en la categoría reina, además de récord de vuelta), ganó el sprint (liderando las 15 vueltas) y esta mañana fue el más rápido en el calentamiento.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>El detalle: Márquez sigue siendo solo quinto</strong> — 165 puntos, <strong>32 detrás del líder Jorge Martín</strong> (197). El sprint solo reparte la mitad de los puntos, y Martín también sumó al terminar sexto.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Clasificación de fabricantes congelada</strong>: Toyota con 132 puntos, delante de BMW (96) y Ferrari (62). La tabla no se mueve desde Le Mans — Interlagos, en la mitad de la temporada (ronda 4 de 8), es la primera carrera que vuelve a moverla.</li>\n      <li><span class=\"chip\">F1</span> <strong>Descanso hasta Spa</strong>: no hay sesión este fin de semana. Antonelli (179) y Mercedes (333) siguen al frente, sin cambios desde Silverstone; la próxima carrera es el GP de Bélgica, 17 al 19/07 (carrera el domingo, 15:00 CEST / 10:00 BRT).</li>\n      <li><span class=\"chip\">Aparte</span> <strong>El domingo de Daniel no tiene conflicto</strong>: la MotoGP arranca a las 09:00 BRT y termina en unos 45 minutos — quedando alrededor de 1¾ horas de margen antes de la salida en Interlagos, a las 11:30 BRT.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute läuft das größte Volksfest im Nahbereich aus: Die <strong>31ª Fetexas</strong> in Jacarezinho schließt am Sonntagabend mit <strong>Sorriso Maroto</strong> — freier Eintritt, tagsüber die Motocross-Rennen, rund 20 Fahrminuten weg. Und ab morgen öffnet sich das eigentliche Ferienfenster: Die Winterferien der PR-Landesschulen beginnen und dauern zwei Wochen. Beim Wetter bleibt heute die Wildcard — Regen bzw. Gewitter am Morgen, dann Aufklaren; die Portale sind sich beim Höchstwert (24°) und beim Regen (~70–76 %) einig, streiten aber offen über den Tiefstwert (17° gegen 12°). Wir wählen keinen der Werte still aus. Danach kippt die Woche in trockenes, kühles Winterwetter mit kalten Morgen — der Ferien-Radar reicht heute vom Nahbereich bis in den Großraum São Paulo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>Fetexas-Finale heute — Sorriso Maroto</strong>: Centro de Eventos, PR-431, Jacarezinho (~20 Min.), Eintritt frei. Motocross-Rennen So ab 10:30 Uhr (Training ab 9:00), 17 Kategorien, über R$ 6.000 Preisgeld. Letzter Festtag.</li>\n      <li><span class=\"chip hot\">Schule</span> <strong>Winterferien ab morgen (13.–24.07.)</strong> — rede estadual PR, über 1,1 Mio. Schülerinnen und Schüler, Rückkehr 27.07. Heute ist ohnehin Sonntag; das Fenster für Ausflüge öffnet ab Montag.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Regen/Gewitter heute früh, dann Aufklaren</strong>: Climatempo + theweather.com einig bei ~70–76 % Regen und 24° Höchstwert — aber uneins beim Tiefstwert: 17° (Climatempo) gegen 12° (theweather.com). Beide Werte im Brief.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Danach trockene, kühle Winterwoche</strong> — nach heute wenig Regen, Morgentiefstwerte fallen in Teilen Paranás in den einstelligen Bereich (Climatempo Di 9°, Mi 11°). Warm anziehen, besonders das Baby.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Ferien-Trip: Museu do Videogame Itinerante (4.–26.07.)</strong> — über 550 spielbare Konsolen, Internacional Shopping Guarulhos, Großraum SP (~4–6 h). Für Schulkinder ideal — aus einem Ferien-Guide, vor der Fahrt Öffnungszeiten und Preis prüfen.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Großraum SP — weitere Ferien-Ideen</strong>: „Brilha Sonhos\"-Lichtspaziergang im Parque Villa-Lobos (Mai–Aug.), Kidzhouse Festival (24.–26.07.). Nur aus Kinder-Guides — als Ferien-Ideen, nicht als Zusage.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Kälte-Woche mit Baby</strong>: theweather.com flaggt für heute einen Kälte-Alarm (Portal-Hinweis, keine offizielle INMET-Warnung) — der Landes-Frostalarm der Vorwoche (8.–9.07.) ist bereits abgelaufen. Für das 1-Monats-Baby: warmhalten.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>Dengue-Zahl ist alt</strong>: Der letzte datierte Stand ist Mitte Mai (SE 18/2026); der viel zitierte −96,1-%-Rückgang gilt für den Jahresanfang (SE 1–14/2026). Kein Juli-Bulletin verfügbar, kein aktiver Alarm.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {

: Museu do Videogame Itinerante (4.–26.07.)</strong> — über 550 spielbare Konsolen, Internacional Shopping Guarulhos, Großraum SP (~4–6 h). Für Schulkinder ideal — aus einem Ferien-Guide, vor der Fahrt Öffnungszeiten und Preis prüfen.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Großraum SP — weitere Ferien-Ideen</strong>: „Brilha Sonhos\"-Lichtspaziergang im Parque Villa-Lobos (Mai–Aug.), Kidzhouse Festival (24.–26.07.). Nur aus Kinder-Guides — als Ferien-Ideen, nicht als Zusage.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Kälte-Woche mit Baby</strong>: theweather.com flaggt für heute einen Kälte-Alarm (Portal-Hinweis, keine offizielle INMET-Warnung) — der Landes-Frostalarm der Vorwoche (8.–9.07.) ist bereits abgelaufen. Für das 1-Monats-Baby: warmhalten.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>Dengue-Zahl ist alt</strong>: Der letzte datierte Stand ist Mitte Mai (SE 18/2026); der viel zitierte −96,1-%-Rückgang gilt für den Jahresanfang (SE 1–14/2026). Kein Juli-Bulletin verfügbar, kein aktiver Alarm.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today wraps up the biggest local street fair around: the <strong>31st Fetexas</strong> in Jacarezinho closes Sunday night with <strong>Sorriso Maroto</strong> — free admission, motocross races during the day, about a 20-minute drive away. And starting tomorrow, the real vacation window opens: Paraná's state-school winter break begins and runs two weeks. On the weather side, today is the wildcard — rain or thunderstorms in the morning, then clearing; the sources agree on the high (24°) and on rain odds (~70–76%), but openly disagree on the low: 17° versus 12°. We're not quietly picking one over the other. After today, the week turns dry and cool with cold mornings — this week's vacation radar spans from the local area all the way to greater São Paulo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>Fetexas finale today — Sorriso Maroto</strong>: Centro de Eventos, PR-431, Jacarezinho (~20 min.), free admission. Motocross races Sun from 10:30 a.m. (practice from 9:00 a.m.), 17 categories, over R$ 6,000 in prize money. Last day of the fair.</li>\n      <li><span class=\"chip hot\">School</span> <strong>Winter break starts tomorrow (Jul 13–24)</strong> — Paraná's state school network, over 1.1 million students, back to class Jul 27. Today is Sunday anyway; the window for outings opens starting Monday.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Rain/thunderstorms early today, then clearing</strong>: Climatempo and theweather.com agree on ~70–76% rain and a 24° high — but disagree on the low: 17° (Climatempo) vs. 12° (theweather.com). Both numbers in the brief.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Then a dry, cool winter week</strong> — after today, little rain, morning lows dropping into the single digits in parts of Paraná (Climatempo Tue 9°, Wed 11°). Bundle up, especially the baby.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Vacation trip: Museu do Videogame Itinerante (Jul 4–26)</strong> — over 550 playable consoles, Internacional Shopping Guarulhos, greater SP (~4–6 h). Great for school-age kids — from a vacation guide, confirm hours and price before driving out.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Greater São Paulo — more vacation ideas</strong>: \"Brilha Sonhos\" light walk at Parque Villa-Lobos (May–Aug.), Kidzhouse Festival (Jul 24–26). Sourced only from kids' guides — treat as vacation ideas, not confirmed plans.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Cold week with a baby in the house</strong>: theweather.com flags a cold alert for today (a portal-generated notice, not an official INMET warning) — last week's state frost alert (Jul 8–9) has already expired. For the one-month-old: keep her warm.</li>\n      <li><span class=\"chip\">Health</span> <strong>Dengue figure is stale</strong>: The latest dated update is from mid-May (epi week 18/2026); the widely cited 96.1% drop refers to the start of the year (epi weeks 1–14/2026). No July bulletin available, no active alert.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje termina a maior festa popular da região: a <strong>31ª Fetexas</strong>, em Jacarezinho, encerra no domingo à noite com <strong>Sorriso Maroto</strong> — entrada gratuita, corridas de motocross durante o dia, a cerca de 20 minutos de carro. E a partir de amanhã se abre a verdadeira janela de férias: começam as férias de inverno da rede estadual do PR, com duas semanas de duração. No clima, hoje é a carta coringa — chuva ou temporal pela manhã, depois abre o tempo; os portais concordam quanto à máxima (24°) e à chance de chuva (~70–76%), mas discordam abertamente sobre a mínima (17° contra 12°). Não escolhemos silenciosamente nenhum dos dois valores. Depois de hoje, a semana vira para um inverno seco e frio, com manhãs geladas — o radar de férias de hoje vai do entorno até a Grande São Paulo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>Final da Fetexas hoje — Sorriso Maroto</strong>: Centro de Eventos, PR-431, Jacarezinho (~20 min.), entrada gratuita. Corridas de motocross domingo a partir das 10h30 (treino a partir das 9h), 17 categorias, mais de R$ 6 mil em premiação. Último dia de festa.</li>\n      <li><span class=\"chip hot\">Escola</span> <strong>Férias de inverno a partir de amanhã (13 a 24/07)</strong> — rede estadual do PR, mais de 1,1 milhão de alunos, retorno em 27/07. Hoje ainda é domingo; a janela para passeios se abre a partir de segunda-feira.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Chuva/temporal no início da manhã, depois abre o tempo</strong>: Climatempo e theweather.com concordam em ~70–76% de chance de chuva e máxima de 24° — mas discordam sobre a mínima: 17° (Climatempo) contra 12° (theweather.com). Os dois valores estão no brief.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Depois, semana de inverno seca e fria</strong> — após hoje, pouca chuva, com mínimas matinais caindo para a casa de um dígito em partes do Paraná (Climatempo: terça 9°, quarta 11°). Agasalhar bem, principalmente o bebê.</li>\n      <li><span class=\"chip good\">Passeio</span> <strong>Viagem de férias: Museu do Videogame Itinerante (4 a 26/07)</strong> — mais de 550 consoles jogáveis, Internacional Shopping Guarulhos, Grande SP (~4–6 h). Ideal para crianças em idade escolar — vindo de um guia de férias, confira horários e preço antes de sair.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Grande São Paulo — mais ideias para as férias</strong>: passeio noturno de luzes \"Brilha Sonhos\" no Parque Villa-Lobos (mai.–ago.), Kidzhouse Festival (24 a 26/07). Vindo apenas de guias infantis — como ideias para as férias, não como programação confirmada.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Semana fria com bebê em casa</strong>: o theweather.com sinaliza um alerta de frio para hoje (aviso automático do portal, não um alerta oficial do INMET) — o alerta estadual de geada da semana passada (8 e 9/07) já venceu. Para a bebê de 1 mês: manter aquecida.</li>\n      <li><span class=\"chip\">Saúde</span> <strong>Número da dengue está desatualizado</strong>: o último balanço datado é de meados de maio (SE 18/2026); a queda de −96,1% tão citada se refere ao início do ano (SE 1 a 14/2026). Não há boletim de julho disponível, nem alerta ativo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy termina la feria popular más grande de la zona: la <strong>31ª Fetexas</strong> en Jacarezinho cierra el domingo por la noche con <strong>Sorriso Maroto</strong> — entrada gratuita, carreras de motocross durante el día, a unos 20 minutos en carro. Y a partir de mañana se abre la verdadera ventana de vacaciones: comienzan las vacaciones de invierno de las escuelas estatales de Paraná, con una duración de dos semanas. En cuanto al clima, hoy es el comodín — lluvia o tormenta en la mañana, luego despeja; las fuentes coinciden en la máxima (24°) y en la probabilidad de lluvia (~70–76%), pero discrepan abiertamente sobre la mínima: 17° contra 12°. No elegimos en silencio ninguno de los dos valores. Después de hoy, la semana vira hacia un invierno seco y frío, con mañanas heladas — el radar de vacaciones de hoy va desde la zona cercana hasta el área metropolitana de São Paulo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>Final de la Fetexas hoy — Sorriso Maroto</strong>: Centro de Eventos, PR-431, Jacarezinho (~20 min.), entrada gratuita. Carreras de motocross el domingo desde las 10:30 (entrenamiento desde las 9:00), 17 categorías, más de R$ 6,000 en premios. Último día de la feria.</li>\n      <li><span class=\"chip hot\">Escuela</span> <strong>Vacaciones de invierno a partir de mañana (13 al 24/07)</strong> — red estatal de Paraná, más de 1.1 millones de estudiantes, regreso el 27/07. Hoy sigue siendo domingo; la ventana para paseos se abre a partir del lunes.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Lluvia/tormenta al inicio de la mañana, luego despeja</strong>: Climatempo y theweather.com coinciden en ~70–76% de probabilidad de lluvia y una máxima de 24° — pero difieren en la mínima: 17° (Climatempo) contra 12° (theweather.com). Ambos valores están en el brief.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Después, semana de invierno seca y fría</strong> — tras hoy, poca lluvia, con mínimas matutinas que bajan a un solo dígito en partes de Paraná (Climatempo: martes 9°, miércoles 11°). Abrigar bien, sobre todo al bebé.</li>\n      <li><span class=\"chip good\">Paseo</span> <strong>Viaje de vacaciones: Museu do Videogame Itinerante (4 al 26/07)</strong> — más de 550 consolas jugables, Internacional Shopping Guarulhos, área metropolitana de SP (~4–6 h). Ideal para niños en edad escolar — proviene de una guía de vacaciones, confirmar horarios y precio antes de manejar hasta allá.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Área metropolitana de São Paulo — más ideas para las vacaciones</strong>: caminata nocturna de luces \"Brilha Sonhos\" en el Parque Villa-Lobos (mayo–ago.), Kidzhouse Festival (24 al 26/07). Provienen solo de guías infantiles — como ideas para las vacaciones, no como algo confirmado.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Semana fría con bebé en casa</strong>: theweather.com marca una alerta de frío para hoy (aviso automático del portal, no una advertencia oficial de INMET) — la alerta estatal de helada de la semana pasada (8 y 9/07) ya venció. Para la bebé de 1 mes: mantenerla abrigada.</li>\n      <li><span class=\"chip\">Salud</span> <strong>La cifra de dengue está desactualizada</strong>: el último corte con fecha es de mediados de mayo (SE 18/2026); la caída del −96.1% tan citada corresponde al inicio del año (SE 1 al 14/2026). No hay boletín de julio disponible, ni alerta activa.</li>\n    </ul></div>"

        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, 12 de julho — tema da semana <em>Política, Direito &amp; Saúde</em>, hoje a quinta parte: <em>Eleições &amp; Campanha eleitoral</em>. Em pouco mais de três meses o Brasil vai às urnas: primeiro turno em <strong>4 de outubro de 2026</strong>, eventual segundo turno em 25 de outubro. É a ocasião perfeita para o vocabulário eleitoral — de <em>candidatar-se</em>, <em>governar</em> e <em>reeleger</em>, passando pela <em>urna eletrônica</em>, pela <em>cédula</em> e pelo <em>comparecimento</em>, até o <em>santinho</em> brasileiro e o falso cognato <em>assistir</em>. 36 verbetes, 13 verbos com conjugação completa (sendo 3 revisões do dia da Justiça), além das duas pegadinhas de conjugação mais espinhosas do espanhol (<em>gobernar</em>, <em>reelegir</em>) e duas boxes de gramática.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>assistir (PT) ≠ to assist</strong> — <em>assistir</em> quer dizer „ver / acompanhar\", e não „ajudar\" (como sugere o inglês <em>to assist</em>). „Assisti ao debate\" = eu <em>acompanhei</em> o debate, não <em>ajudei</em> ninguém.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a urna eletrônica</strong> — o Brasil vota desde 1996 em máquinas sem conexão com a internet; segundo o TSE, „não pode ser invadida ou hackeada\". Uma palavra sem equivalente exato em alemão.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o santinho</strong> — o pequeno panfleto de campanha com foto e número do candidato, batizado a partir das estampas de santos católicas (<em>santinhos de santo</em>).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES gobernar ditonga e→ie</strong> (<em>gobierno</em>, não <em>*goberno</em>) — mas o PT <em>governar</em> permanece regular (<em>governo</em>). E atenção: <em>gobernar</em> é e→ie, <strong>não</strong> o→ue.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>wiederwählen é separável</strong> —
