      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute dreht sich alles ums Geld: Anthropic kappt den Gratis-Zugang zu Fable 5 und stellt es auf API-Preise um — doppelt so teuer wie Opus 4.8. Daneben ein Paukenschlag aus dem Lager der Coding-Startups (SpaceX will Cursor schlucken, gemeldet, nicht abgeschlossen) und ein Benchmark-Feld, das beeindruckende Zahlen liefert, die zu 99 % von den Anbietern selbst stammen. Tool-Kadenz ansonsten lebhaft bei Claude Code und Codex, ruhig bei den Open-Source-Harnesses.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 kostet jetzt</strong>: $10/M rein, $50/M raus — das teuerste Frontier-Modell, das Anthropic ausliefert, doppelter Opus-4.8-Preis. Gratis-Zugang seit 23.06. weg.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX will Cursor kaufen</strong>: $60 Mrd. all-stock, laut TechCrunch (16.06.) — gemeldet, Abschluss erst Q3 erwartet. Cursor bei ~$4 Mrd. ARR.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 führt mit 95,0 %, Opus 4.8 bei 88,6 % — aber 99 von 100 Einträgen sind anbieter-eingereicht, nur 1 unabhängig geprüft.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench</strong>: Codex + GPT-5.5 vorn (83,4 %), Claude Code + Fable 5 dicht dahinter — letztere Zahl aber nur aus Such-Snippet, Stand des 2.1-Boards unklar.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Managed Agents</strong> in der Gemini API (Preview): Agent mit sandboxed Linux per einem API-Call, läuft auf Gemini 3.5 Flash. <span class=\"chip good\">try</span></li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.187 (23.06.): MCP-Login/Logout-CLI, Sandbox-Credential-Schutz, Org-Modell-Restriktionen — dichte Kadenz die ganze Woche.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex CLI</strong> 0.142.0 (22.06.): Usage-Credit-Einlösung, Plugin-Kategorien, Token-Budgets; <code>/import</code> zur Claude-Code-Migration kam am 15.06.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Still im Schatten</strong>: Aider (Juni-Stand nicht verifizierbar), OpenHands weiter 1.7.0 (01.05.), Cline ohne frisches Tag.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute dreht sich alles ums Geld: Anthropic kappt den Gratis-Zugang zu Fable 5 und stellt es auf API-Preise um — doppelt so teuer wie Opus 4.8. Daneben ein Paukenschlag aus dem Lager der Coding-Startups (SpaceX will Cursor schlucken, gemeldet, nicht abgeschlossen) und ein Benchmark-Feld, das beeindruckende Zahlen liefert, die zu 99 % von den Anbietern selbst stammen. Tool-Kadenz ansonsten lebhaft bei Claude Code und Codex, ruhig bei den Open-Source-Harnesses.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 kostet jetzt</strong>: $10/M rein, $50/M raus — das teuerste Frontier-Modell, das Anthropic ausliefert, doppelter Opus-4.8-Preis. Gratis-Zugang seit 23.06. weg.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX will Cursor kaufen</strong>: $60 Mrd. all-stock, laut TechCrunch (16.06.) — gemeldet, Abschluss erst Q3 erwartet. Cursor bei ~$4 Mrd. ARR.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 führt mit 95,0 %, Opus 4.8 bei 88,6 % — aber 99 von 100 Einträgen sind anbieter-eingereicht, nur 1 unabhängig geprüft.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench</strong>: Codex + GPT-5.5 vorn (83,4 %), Claude Code + Fable 5 dicht dahinter — letztere Zahl aber nur aus Such-Snippet, Stand des 2.1-Boards unklar.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Managed Agents</strong> in der Gemini API (Preview): Agent mit sandboxed Linux per einem API-Call, läuft auf Gemini 3.5 Flash. <span class=\"chip good\">try</span></li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.187 (23.06.): MCP-Login/Logout-CLI, Sandbox-Credential-Schutz, Org-Modell-Restriktionen — dichte Kadenz die ganze Woche.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex CLI</strong> 0.142.0 (22.06.): Usage-Credit-Einlösung, Plugin-Kategorien, Token-Budgets; <code>/import</code> zur Claude-Code-Migration kam am 15.06.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Still im Schatten</strong>: Aider (Juni-Stand nicht verifizierbar), OpenHands weiter 1.7.0 (01.05.), Cline ohne frisches Tag.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today it's all about money: Anthropic cuts free access to Fable 5 and moves it to API pricing — double the cost of Opus 4.8. Alongside that, a bombshell from the coding-startup camp (SpaceX wants to acquire Cursor, reported but not closed) and a benchmark field that delivers impressive numbers that come 99% from the vendors themselves. Tool momentum otherwise brisk for Claude Code and Codex, quiet for the open-source harnesses.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 now costs money</strong>: $10/M input, $50/M output — the priciest frontier model Anthropic ships, double the Opus 4.8 rate. Free access gone as of 06-23.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX wants to buy Cursor</strong>: $60B all-stock, per TechCrunch (06-16) — reported, close expected Q3 2026. Cursor at ~$4B ARR.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 leads at 95.0 %, Opus 4.8 at 88.6 % — but 99 of 100 entries are vendor-submitted, only 1 independently verified.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench</strong>: Codex + GPT-5.5 on top (83.4 %), Claude Code + Fable 5 close behind — latter figure only from a search snippet, board version unclear.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Managed Agents</strong> in Gemini API (Preview): agent with sandboxed Linux via a single API call, runs on Gemini 3.5 Flash. <span class=\"chip good\">try</span></li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.187 (06-23): MCP login/logout CLI, sandbox credential protection, org model restrictions — dense cadence all week.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex CLI</strong> 0.142.0 (06-22): usage credit redemption, plugin categories, token budgets; <code>/import</code> for Claude Code migration landed 06-15.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Still in the shadows</strong>: Aider (June status not verifiable), OpenHands still on 1.7.0 (05-01), Cline without fresh tag.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje tudo é sobre dinheiro: a Anthropic cortou o acesso gratuito ao Fable 5 e o moveu para preços de API — o dobro do custo do Opus 4.8. Além disso, uma bomba do campo das startups de código (SpaceX quer comprar Cursor, anunciado mas não fechado) e um campo de benchmarks que entrega números impressionantes que vêm 99% dos próprios fornecedores. Dinâmica de ferramentas caso contrário ativa para Claude Code e Codex, tranquila para os harnesses de código aberto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 agora custa</strong>: $10/M entrada, $50/M saída — o modelo frontier mais caro que a Anthropic fornece, o dobro da taxa do Opus 4.8. Acesso gratuito encerrado em 23/06.</li>\n      <li><span class=\"chip hot\">Ferramenta</span> <strong>SpaceX quer comprar Cursor</strong>: $60 bilhões em ações, segundo TechCrunch (16/06) — anunciado, fechamento esperado Q3 2026. Cursor em ~$4 bilhões ARR.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 lidera em 95,0 %, Opus 4.8 em 88,6 % — mas 99 de 100 entradas foram submetidas pelo fornecedor, apenas 1 verificada independentemente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench</strong>: Codex + GPT-5.5 na frente (83,4 %), Claude Code + Fable 5 perto — último número apenas de snippet de busca, status do board 2.1 não está claro.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Managed Agents</strong> na API Gemini (Preview): agente com Linux em sandbox via uma única chamada de API, funciona no Gemini 3.5 Flash. <span class=\"chip good\">experimente</span></li>\n      <li><span class=\"chip\">Ferramenta</span> <strong>Claude Code</strong> v2.1.187 (23/06): login/logout MCP por CLI, proteção de credenciais em sandbox, restrições de modelo de org — cadência densa a semana toda.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex CLI</strong> 0.142.0 (22/06): resgate de crédito de uso, categorias de plugin, orçamentos de token; <code>/import</code> para migração do Claude Code chegou em 15/06.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Ainda na sombra</strong>: Aider (status de junho não verificável), OpenHands ainda em 1.7.0 (01/05), Cline sem tag recente.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy todo es sobre dinero: Anthropic cortó el acceso gratuito a Fable 5 y lo movió a precios de API — el doble del costo de Opus 4.8. Además, una bomba del campo de startups de codificación (SpaceX quiere comprar Cursor, reportado pero no cerrado) y un campo de benchmarks que entrega números impresionantes que vienen 99% de los propios proveedores. Dinámica de herramientas por lo demás activa para Claude Code y Codex, tranquila para los harnesses de código abierto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 ahora cuesta</strong>: $10/M entrada, $50/M salida — el modelo frontier más caro que Anthropic envía, el doble de la tarifa de Opus 4.8. Acceso gratuito terminado el 23/06.</li>\n      <li><span class=\"chip hot\">Herramienta</span> <strong>SpaceX quiere comprar Cursor</strong>: $60 mil millones en acciones, según TechCrunch (16/06) — reportado, cierre esperado Q3 2026. Cursor en ~$4 mil millones ARR.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 lidera en 95.0 %, Opus 4.8 en 88.6 % — pero 99 de 100 entradas fueron enviadas por el proveedor, solo 1 verificada independientemente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench</strong>: Codex + GPT-5.5 al frente (83.4 %), Claude Code + Fable 5 cerca — última cifra solo de snippet de búsqueda, estado del board 2.1 no está claro.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Managed Agents</strong> en la API Gemini (Preview): agente con Linux en sandbox mediante una única llamada de API, funciona en Gemini 3.5 Flash. <span class=\"chip good\">prueba</span></li>\n      <li><span class=\"chip\">Herramienta</span> <strong>Claude Code</strong> v2.1.187 (23/06): login/logout MCP por CLI, protección de credenciales en sandbox, restricciones de modelo de org — cadencia densa toda la semana.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex CLI</strong> 0.142.0 (22/06): canje de crédito de uso, categorías de plugin, presupuestos de token; <code>/import</code> para migración de Claude Code llegó el 15/06.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Aún en la sombra</strong>: Aider (estado de junio no verificable), OpenHands aún en 1.7.0 (01/05), Cline sin etiqueta reciente.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Innerhalb von acht Wochen haben die vier größten Enterprise-Plattformen ihre KI-Agenten von der Demo in den Verkaufskatalog gehoben: Google füllt einen Marktplatz mit 70+ Partner-Agenten, ServiceNow und Salesforce schalten ihre Agenten-Orchestrierung allgemein frei, und NVIDIA öffnet ein „Omnimodell\" für die physische KI. Die Agenten sind jetzt Produkte, keine Forschung mehr. Was hinterherhinkt, ist das Geld: Nur knapp jede dritte Organisation sieht laut Erhebung einen spürbaren ROI aus generativer KI. Heute schauen wir, was wirklich ausgeliefert wurde — und wo der Abstand zwischen Versprechen und Buchhaltung am größten ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Gemini Enterprise:</strong> Google macht den Agenten-Marktplatz mit 70+ Partner-Agenten allgemein verfügbar, legt einen 750-Mio.-$-Partnerfonds drauf und öffnet 460 Mrd. $ zugesagtes Enterprise-Budget.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>ServiceNow Autonomous Workforce:</strong> AI-Spezialisten für jede große Geschäftsfunktion; der L1-Service-Desk-Agent löst Fälle „99 % schneller\" — die breiten IT-Spezialisten sind aber noch <em>für Juni angekündigt</em>, nicht bestätigt.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Salesforce Agentforce:</strong> Multi-Agenten-Orchestrierung seit 15. Juni allgemein verfügbar; 800 Mio. $ ARR (+169 % YoY), 29.000 Deals.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>NVIDIA Cosmos 3:</strong> erstes offenes „Omnimodell\" für physische KI — Roboter und autonome Fahrzeuge sollen statt Monaten nur Tage zum Trainieren brauchen.</li>\n      <li><span class=\"chip\">Study</span> <strong>Rendite-Realität:</strong> nur ~29 % der Organisationen sehen spürbaren ROI aus GenAI — trotz 5×-Produktivitätssprüngen Einzelner.</li>\n      <li><span class=\"chip good\">Study</span> <strong>Gartner:</strong> 40 % der Unternehmens-Apps tragen bis Ende 2026 aufgaben-spezifische KI-Agenten (von &lt;5 % in 2025) — diese Zahl ist offiziell belegt.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI-Act:</strong> Der Digital-Omnibus ist durch — das EU-Parlament hat ihn am 16.06. angenommen (Rat-Votum am 29.06. erwartet). Ab 2. August greifen die Transparenzpflichten (Art. 50); die Hochrisiko-Pflichten (Annex III) rutschen auf 2. Dezember 2027.</li>\n      <li><span class=\"chip\">Idea · DE</span> <strong>twiceD:</strong> zwei recherchierte Projekt-Ideen am Schluss — Agenten-ROI-Audit und ein „letzter Meter\" zwischen Plattform-Agent und DE-Mittelstand-Prozess.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Innerhalb von acht Wochen haben die vier größten Enterprise-Plattformen ihre KI-Agenten von der Demo in den Verkaufskatalog gehoben: Google füllt einen Marktplatz mit 70+ Partner-Agenten, ServiceNow und Salesforce schalten ihre Agenten-Orchestrierung allgemein frei, und NVIDIA öffnet ein „Omnimodell\" für die physische KI. Die Agenten sind jetzt Produkte, keine Forschung mehr. Was hinterherhinkt, ist das Geld: Nur knapp jede dritte Organisation sieht laut Erhebung einen spürbaren ROI aus generativer KI. Heute schauen wir, was wirklich ausgeliefert wurde — und wo der Abstand zwischen Versprechen und Buchhaltung am größten ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Gemini Enterprise:</strong> Google macht den Agenten-Marktplatz mit 70+ Partner-Agenten allgemein verfügbar, legt einen 750-Mio.-$-Partnerfonds drauf und öffnet 460 Mrd. $ zugesagtes Enterprise-Budget.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>ServiceNow Autonomous Workforce:</strong> AI-Spezialisten für jede große Geschäftsfunktion; der L1-Service-Desk-Agent löst Fälle „99 % schneller\" — die breiten IT-Spezialisten sind aber noch <em>für Juni angekündigt</em>, nicht bestätigt.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Salesforce Agentforce:</strong> Multi-Agenten-Orchestrierung seit 15. Juni allgemein verfügbar; 800 Mio. $ ARR (+169 % YoY), 29.000 Deals.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>NVIDIA Cosmos 3:</strong> erstes offenes „Omnimodell\" für physische KI — Roboter und autonome Fahrzeuge sollen statt Monaten nur Tage zum Trainieren brauchen.</li>\n      <li><span class=\"chip\">Study</span> <strong>Rendite-Realität:</strong> nur ~29 % der Organisationen sehen spürbaren ROI aus GenAI — trotz 5×-Produktivitätssprüngen Einzelner.</li>\n      <li><span class=\"chip good\">Study</span> <strong>Gartner:</strong> 40 % der Unternehmens-Apps tragen bis Ende 2026 aufgaben-spezifische KI-Agenten (von &lt;5 % in 2025) — diese Zahl ist offiziell belegt.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI-Act:</strong> Der Digital-Omnibus ist durch — das EU-Parlament hat ihn am 16.06. angenommen (Rat-Votum am 29.06. erwartet). Ab 2. August greifen die Transparenzpflichten (Art. 50); die Hochrisiko-Pflichten (Annex III) rutschen auf 2. Dezember 2027.</li>\n      <li><span class=\"chip\">Idea · DE</span> <strong>twiceD:</strong> zwei recherchierte Projekt-Ideen am Schluss — Agenten-ROI-Audit und ein „letzter Meter\" zwischen Plattform-Agent und DE-Mittelstand-Prozess.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">In eight weeks, the four largest enterprise platforms have moved their AI agents from demo to sales catalog: Google is filling a marketplace with 70+ partner agents, ServiceNow and Salesforce are releasing their agent orchestration to the public, and NVIDIA is opening an \"omnimodel\" for physical AI. Agents are now products, not research anymore. What's lagging is the money: barely one in three organizations reports meaningful ROI from generative AI, according to surveys. Today we look at what was actually delivered — and where the gap between promise and the bottom line is widest.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Gemini Enterprise:</strong> Google is making the agent marketplace with 70+ partner agents publicly available, adding a $750M partner fund, and opening $460B in committed enterprise budget.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>ServiceNow Autonomous Workforce:</strong> AI specialists for every major business function; the L1 service-desk agent resolves cases \"99% faster\" — but the broader IT specialists are still <em>announced for June</em>, not confirmed.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Salesforce Agentforce:</strong> Multi-agent orchestration generally available as of June 15; $800M ARR (+169% YoY), 29,000 deals.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>NVIDIA Cosmos 3:</strong> first fully open \"omnimodel\" for physical AI — robots and autonomous vehicles should take days rather than months to train.</li>\n      <li><span class=\"chip\">Study</span> <strong>Return reality:</strong> only ~29% of organizations see meaningful ROI from GenAI — despite 5× productivity gains for individuals.</li>\n      <li><span class=\"chip good\">Study</span> <strong>Gartner:</strong> 40% of enterprise apps will carry task-specific AI agents by end of 2026 (from &lt;5% in 2025) — this figure is officially documented.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act:</strong> The Digital Omnibus is through — the EU Parliament adopted it June 16 (Council vote expected June 29). From August 2 the transparency obligations (Art. 50) bite; the high-risk obligations (Annex III) slip to December 2, 2027.</li>\n      <li><span class=\"chip\">Idea · DE</span> <strong>twiceD:</strong> two researched project ideas at the end — agent ROI audit and a \"last mile\" between platform agent and mid-market DE process.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Em oito semanas, as quatro maiores plataformas empresariais moveram seus agentes de IA da demonstração para o catálogo de vendas: o Google está preenchendo um marketplace com 70+ agentes parceiros, ServiceNow e Salesforce estão liberando sua orquestração de agentes para o público, e NVIDIA está abrindo um \"omnimodelo\" para IA física. Agentes são agora produtos, não mais pesquisa. O que fica para trás é o dinheiro: pouco mais de um em cada três públicos relata ROI significativo de IA generativa, segundo pesquisas. Hoje olhamos o que foi realmente entregue — e onde a lacuna entre promessa e resultado é maior.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Gemini Enterprise:</strong> Google está tornando o marketplace de agentes com 70+ agentes parceiros publicamente disponível, adicionando um fundo de parceiros de US$ 750M e abrindo US$ 460B em orçamento empresarial comprometido.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>ServiceNow Autonomous Workforce:</strong> Especialistas de IA para cada grande função comercial; o agente de help desk L1 resolve casos \"99% mais rápido\" — mas os especialistas de TI mais amplos ainda estão <em>anunciados para junho</em>, não confirmados.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Salesforce Agentforce:</strong> Orquestração multi-agente disponível para o público desde 15 de junho; US$ 800M ARR (+169% YoY), 29.000 deals.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>NVIDIA Cosmos 3:</strong> primeiro \"omnimodelo\" totalmente aberto para IA física — robôs e veículos autônomos devem levar dias em vez de meses para treinar.</li>\n      <li><span class=\"chip\">Study</span> <strong>Realidade do retorno:</strong> apenas ~29% das organizações veem ROI significativo de IA generativa — apesar de ganhos de produtividade de 5× para indivíduos.</li>\n      <li><span class=\"chip good\">Study</span> <strong>Gartner:</strong> 40% dos apps empresariais terão agentes de IA específicos de tarefas até o final de 2026 (de &lt;5% em 2025) — este número está documentado oficialmente.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act:</strong> O Omnibus Digital passou — o Parlamento da UE o adotou em 16/06 (votação do Conselho prevista para 29/06). A partir de 2 de agosto valem as obrigações de transparência (Art. 50); as obrigações de alto risco (Anexo III) passam para 2 de dezembro de 2027.</li>\n      <li><span class=\"chip\">Idea · DE</span> <strong>twiceD:</strong> duas ideias de projetos pesquisadas no final — auditoria de ROI de agentes e uma \"última milha\" entre agente de plataforma e processo de mercado médio DE.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">En ocho semanas, las cuatro plataformas empresariales más grandes han llevado sus agentes de IA de la demostración al catálogo de ventas: Google está llenando un marketplace con 70+ agentes de socios, ServiceNow y Salesforce están liberando su orquestación de agentes al público, y NVIDIA está abriendo un \"omnimodelo\" para IA física. Los agentes ahora son productos, no investigación. Lo que se queda atrás es el dinero: apenas uno de cada tres públicos reporta ROI significativo de IA generativa, según encuestas. Hoy miramos qué fue realmente entregado — y dónde la brecha entre promesa y resultado es mayor.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Gemini Enterprise:</strong> Google está haciendo el marketplace de agentes con 70+ agentes de socios públicamente disponible, agregando un fondo de socios de $750M y abriendo $460B en presupuesto empresarial comprometido.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>ServiceNow Autonomous Workforce:</strong> Especialistas de IA para cada función comercial importante; el agente L1 de help desk resuelve casos \"99% más rápido\" — pero los especialistas de TI más amplios aún están <em>anunciados para junio</em>, no confirmados.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Salesforce Agentforce:</strong> Orquestación multi-agente disponible públicamente desde el 15 de junio; $800M ARR (+169% YoY), 29.000 deals.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>NVIDIA Cosmos 3:</strong> primer \"omnimodelo\" completamente abierto para IA física — los robots y vehículos autónomos deben tomar días en lugar de meses para entrenar.</li>\n      <li><span class=\"chip\">Study</span> <strong>Realidad del retorno:</strong> solo ~29% de las organizaciones ven ROI significativo de IA generativa — a pesar de ganancias de productividad de 5× para individuos.</li>\n      <li><span class=\"chip good\">Study</span> <strong>Gartner:</strong> 40% de las aplicaciones empresariales tendrán agentes de IA específicos de tareas para finales de 2026 (desde &lt;5% en 2025) — esta cifra está documentada oficialmente.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act:</strong> El Omnibus Digital ya pasó — el Parlamento de la UE lo adoptó el 16/06 (votación del Consejo prevista para el 29/06). Desde el 2 de agosto rigen las obligaciones de transparencia (Art. 50); las obligaciones de alto riesgo (Anexo III) se aplazan al 2 de diciembre de 2027.</li>\n      <li><span class=\"chip\">Idea · DE</span> <strong>twiceD:</strong> dos ideas de proyectos investigadas al final — auditoría de ROI de agentes y una \"última milla\" entre agente de plataforma y proceso de mercado medio DE.</li>\n    </ul></div>"

n</span> <strong>Frontier-Cluster</strong>: fünf JetBrains-IntelliJ-Rollen (Remote EU, Java/Kotlin, Fit 65–78) — Dev-Tooling, das genau Daniels agentic-coding-Alltag bedient.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>Buyer's Market</strong>: DACH-Freelance-Schnitt ~103 €/h (2025: 104), Monatseinkommen im Mittel von 8.432 € auf 6.653 € gesunken, 24 % unter 50 Projekttagen — wer den Floor hält, verhandelt aus solider Position.</li>\n      <li><span class=\"chip\">TED</span> <strong>Keine offene Ausschreibung</strong>: heute kein verifizierter offener TED-Treffer im Java/Angular/Python-Filter — Methodik unten, ehrlich geflaggt statt aufgefüllt.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Midway through the World Cup, and both of Daniel's teams are showing contrasts: the Seleção loses their final group match and advances anyway, the DFB side has already locked in group victory before their last match. Meanwhile, in Freiburg, the transfer carousel is spinning — 29 million euros in, the Atubolu drama still unresolved.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Scotland 1:0 Brazil</strong> (Group C, provisional — late kickoff 19:00 BRT): the Seleção loses the group finale, stays at 4 points and advances provisionally as group third place into the knockout stage.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Germany advances to the knockout stage</strong> — 6 points from 2 matches, Group E victory already secured. Final group match against Ecuador on Thu, 25.06., 22:00 CEST / 17:00 BRT.</li>\n      <li><span class=\"chip\">DFB</span> <strong>7:1, 2:1</strong>: Germany has demolished Curaçao and Ivory Coast, Denis Undav leads the team scorers with 3 goals.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Group C decided</strong>: Morocco wins the group (1:0 vs Haiti, 7 pts), Scotland second (6 pts), Brazil third (4 pts), Haiti out.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg, summer window open</strong>: 3 signings for 29 million euros (Backhaus, Goto, Yamamoto), Röhl sold to Everton for 25 million euros.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Atubolu poker</strong>: Freiburg's keeper is being pursued — Brighton, AC Milan and Atlético interested; Backhaus already here as replacement. As of 24.06., nothing sealed.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão paused</strong>: League frozen since matchday 18 (World Cup break), Palmeiras lead with 41 points. Season resumes mid-July.</li>\n      <li><span class=\"chip\">DFB</span> <strong>World Cup top scorers</strong>: Messi (5), Mbappé and Haaland (4 each) at the front — Undav as Germany's top scorer with 3.</li>\n    </ul></div>",

land (4 cada) na frente — Undav como melhor alemão com 3.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">A mitad de la Copa Mundial, los dos equipos de Daniel muestran contrastes: la Selección pierde su último partido de grupo pero avanza de todas formas, la DFB ya tiene asegurada la victoria del grupo antes del último partido. Mientras tanto, en Freiburg el carrusel de transferencias gira — 29 millones de euros entrando, el drama de Atubolu aún abierto.</p>\n    <ul>\n      <li><span class=\"chip hot\">BRA</span> <strong>Escocia 1:0 Brasil</strong> (Grupo C, provisional — salida 19:00 BRT): la Selección pierde la final de grupo, se queda con 4 puntos y avanza provisionalmente como tercera del grupo a octavos.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemania avanza a octavos</strong> — 6 puntos en 2 partidos, victoria del Grupo E ya asegurada. Último partido de grupo contra Ecuador el jue, 25.06., 22:00 CEST / 17:00 BRT.</li>\n      <li><span class=\"chip\">DFB</span> <strong>7:1, 2:1</strong>: Alemania demolió a Curaçao e Costa de Marfil, Denis Undav lidera los artilleros internos con 3 goles.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Grupo C decidido</strong>: Marruecos gana el grupo (1:0 vs Haití, 7 pts), Escocia segundo (6 pts), Brasil tercero (4 pts), Haití eliminado.</li>\n      <li><span class=\"chip hot\">Transferencia</span> <strong>SC Freiburg, ventana de verano abierta</strong>: 3 llegadas por 29 millones de euros (Backhaus, Goto, Yamamoto), Röhl vendido a Everton por 25 millones.</li>\n      <li><span class=\"chip\">Transferencia</span> <strong>Póquer de Atubolu</strong>: arquero de Freiburg está en disputa — Brighton, AC Milan y Atlético interesados; Backhaus ya está como sustituto. Hasta 24.06., nada cerrado.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão en pausa</strong>: Liga congelada desde la jornada 18 (pausa de Copa), Palmeiras lidera con 41 puntos. Segunda vuelta comienza a mediados de julio.</li>\n      <li><span class=\"chip\">DFB</span>       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Tage bis zum nächsten Renn-Wochenende — und die Formel&nbsp;1 kommt mit einer kleinen Sensation aus Barcelona angereist: <strong>Lewis Hamilton</strong> holte am 14.&nbsp;Juni seinen <strong>ersten Sieg im Ferrari</strong>, während WM-Führer <strong>Kimi Antonelli</strong> (Mercedes) vier Runden vor Schluss von Platz&nbsp;2 ausfiel. Das halbierte fast seinen Vorsprung: von zuvor 66 auf nur noch <strong>41&nbsp;Punkte</strong>. Am Wochenende geht es zum <strong>Österreich-GP</strong> nach Spielberg (Lauf&nbsp;8/22), klassisch ohne Sprint. Parallel läuft die Langstrecken-WM weiter: <strong>Toyota</strong> führt die WEC-Herstellerwertung nach dem Le-Mans-Doppelsieg klar an — nächster Halt ist Anfang Juli <strong>Interlagos</strong>, ein Heimrennen vor Daniels Haustür. Alle Zeiten zweizonig: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip good\">F1 · BARCELONA</span> <strong>Hamiltons erster Ferrari-Sieg</strong> (Lauf&nbsp;7, 14.06.) — vor Russell&nbsp;(P2) und Norris&nbsp;(P3), dem <strong>ersten rein-britischen F1-Podium seit 1968</strong>. Antonelli fiel als Zweiter vier Runden vor Schluss aus.</li>\n      <li><span class=\"chip hot\">F1-WM</span> <strong>Antonelli führt mit 156&nbsp;Pkt</strong> (Stand nach Barcelona) — nur noch <strong>41</strong> vor Hamilton (Ferrari 115) und 50 vor Russell (Mercedes 106). Der Ausfall hat den Vorsprung von 66 auf 41 gedrückt.</li>\n      <li><span class=\"chip hot\">NÄCHSTES RENNEN · F1</span> <strong>Österreich-GP, Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22)</strong> — 26.–28.06., kein Sprint. Rennen <strong>So 28.06. 15:00&nbsp;MESZ / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip\">F1 · STRAFE</span> <strong>Antonelli kassierte 5&nbsp;Sekunden</strong> für Track-Limit-Verstöße in Barcelona — ohne Folge für Österreich (keine Startplatz-Strafe, da Ausfall erst nach &gt;90&nbsp;% Renndistanz). Eine separate Stewards-Prüfung wegen „erratic driving\" ist <strong>noch nicht bestätigt</strong> aufgelöst.</li>\n      <li><span class=\"chip\">F1-Konstrukteure</span> <strong>Mercedes führt mit 262&nbsp;Pkt</strong> vor Ferrari (190, &minus;72) und McLaren (141). Trotz Ferrari-Sieg blieb der Abstand zur Spitze bei 72 Punkten.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota gewinnt die 24h und übernimmt die WM-Spitze</strong> (132&nbsp;Pkt) — 36 vor BMW. Ein 1-3-Resultat in Le Mans schob die #7 (Kobayashi/Conway/de&nbsp;Vries) an die Fahrer-Spitze.</li>\n      <li><span class=\"chip\">WEC · NÄCHSTES RENNEN</span> <strong>6h von São&nbsp;Paulo, Interlagos (Lauf&nbsp;4)</strong> — So 12.07., Start <strong>11:30&nbsp;BRT / 16:30&nbsp;MESZ</strong>. Heimrennen praktisch vor Daniels Tür.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Tage bis zum nächsten Renn-Wochenende — und die Formel&nbsp;1 kommt mit einer kleinen Sensation aus Barcelona angereist: <strong>Lewis Hamilton</strong> holte am 14.&nbsp;Juni seinen <strong>ersten Sieg im Ferrari</strong>, während WM-Führer <strong>Kimi Antonelli</strong> (Mercedes) vier Runden vor Schluss von Platz&nbsp;2 ausfiel. Das halbierte fast seinen Vorsprung: von zuvor 66 auf nur noch <strong>41&nbsp;Punkte</strong>. Am Wochenende geht es zum <strong>Österreich-GP</strong> nach Spielberg (Lauf&nbsp;8/22), klassisch ohne Sprint. Parallel läuft die Langstrecken-WM weiter: <strong>Toyota</strong> führt die WEC-Herstellerwertung nach dem Le-Mans-Doppelsieg klar an — nächster Halt ist Anfang Juli <strong>Interlagos</strong>, ein Heimrennen vor Daniels Haustür. Alle Zeiten zweizonig: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip good\">F1 · BARCELONA</span> <strong>Hamiltons erster Ferrari-Sieg</strong> (Lauf&nbsp;7, 14.06.) — vor Russell&nbsp;(P2) und Norris&nbsp;(P3), dem <strong>ersten rein-britischen F1-Podium seit 1968</strong>. Antonelli fiel als Zweiter vier Runden vor Schluss aus.</li>\n      <li><span class=\"chip hot\">F1-WM</span> <strong>Antonelli führt mit 156&nbsp;Pkt</strong> (Stand nach Barcelona) — nur noch <strong>41</strong> vor Hamilton (Ferrari 115) und 50 vor Russell (Mercedes 106). Der Ausfall hat den Vorsprung von 66 auf 41 gedrückt.</li>\n      <li><span class=\"chip hot\">NÄCHSTES RENNEN · F1</span> <strong>Österreich-GP, Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22)</strong> — 26.–28.06., kein Sprint. Rennen <strong>So 28.06. 15:00&nbsp;MESZ / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip\">F1 · STRAFE</span> <strong>Antonelli kassierte 5&nbsp;Sekunden</strong> für Track-Limit-Verstöße in Barcelona — ohne Folge für Österreich (keine Startplatz-Strafe, da Ausfall erst nach &gt;90&nbsp;% Renndistanz). Eine separate Stewards-Prüfung wegen „erratic driving\" ist <strong>noch nicht bestätigt</strong> aufgelöst.</li>\n      <li><span class=\"chip\">F1-Konstrukteure</span> <strong>Mercedes führt mit 262&nbsp;Pkt</strong> vor Ferrari (190, &minus;72) und McLaren (141). Trotz Ferrari-Sieg blieb der Abstand zur Spitze bei 72 Punkten.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota gewinnt die 24h und übernimmt die WM-Spitze</strong> (132&nbsp;Pkt) — 36 vor BMW. Ein 1-3-Resultat in Le Mans schob die #7 (Kobayashi/Conway/de&nbsp;Vries) an die Fahrer-Spitze.</li>\n      <li><span class=\"chip\">WEC · NÄCHSTES RENNEN</span> <strong>6h von São&nbsp;Paulo, Interlagos (Lauf&nbsp;4)</strong> — So 12.07., Start <strong>11:30&nbsp;BRT / 16:30&nbsp;MESZ</strong>. Heimrennen praktisch vor Daniels Tür.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two days until the next race weekend — and Formula&nbsp;1 arrives with a shocker from Barcelona: <strong>Lewis Hamilton</strong> claimed his <strong>first win in a Ferrari</strong> on June 14, while championship leader <strong>Kimi Antonelli</strong> (Mercedes) retired from second place four laps before the end. It nearly halved his lead: from 66 down to just <strong>41&nbsp;points</strong>. This weekend brings the <strong>Austrian GP</strong> to Spielberg (round&nbsp;8/22), a classic format with no sprint. Meanwhile, the endurance championship continues: <strong>Toyota</strong> leads the WEC manufacturers' standings after a dominant Le Mans weekend — the next stop is early July at <strong>Interlagos</strong>, a home race practically on Daniel's doorstep. All times dual-zoned: <strong>CEST · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip good\">F1 · BARCELONA</span> <strong>Hamilton's first Ferrari win</strong> (round&nbsp;7, 6/14) — ahead of Russell&nbsp;(P2) and Norris&nbsp;(P3), the <strong>first all-British F1 podium since 1968</strong>. Antonelli retired from second place four laps before the finish.</li>\n      <li><span class=\"chip hot\">F1-CHAMPIONSHIP</span> <strong>Antonelli leads with 156&nbsp;pts</strong> (standings after Barcelona) — just <strong>41</strong> ahead of Hamilton (Ferrari 115) and 50 clear of Russell (Mercedes 106). The retirement pushed his lead down from 66 to 41 points.</li>\n      <li><span class=\"chip hot\">NEXT RACE · F1</span> <strong>Austrian GP, Red&nbsp;Bull&nbsp;Ring (round&nbsp;8/22)</strong> — 6/26–6/28, no sprint. Race <strong>Sun 6/28 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip\">F1 · PENALTY</span> <strong>Antonelli received a 5-second penalty</strong> for track limit violations in Barcelona — with no carry-over to Austria (no grid penalty, since the retirement came after&nbsp;&gt;90&nbsp;% race distance). A separate stewards review for \"erratic driving\" is <strong>not yet confirmed</strong> resolved.</li>\n      <li><span class=\"chip\">F1-Constructors</span> <strong>Mercedes leads with 262&nbsp;pts</strong> ahead of Ferrari (190, &minus;72) and McLaren (141). Despite the Ferrari win, the gap to the top stayed at 72 points.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota wins the 24h and takes the WEC lead</strong> (132&nbsp;pts) — 36 ahead of BMW. A 1-3 finish at Le Mans moved the #7 (Kobayashi/Conway/de&nbsp;Vries) to the front of the drivers' standings.</li>\n      <li><span class=\"chip\">WEC · NEXT RACE</span> <strong>6 Hours of São&nbsp;Paulo, Interlagos (round&nbsp;4)</strong> — Sun 7/12, start <strong>11:30&nbsp;BRT / 16:30&nbsp;CEST</strong>. Home race right on Daniel's doorstep.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Faltam dois dias para o próximo fim de semana de corridas — e a Fórmula&nbsp;1 chega com um choque de Barcelona: <strong>Lewis Hamilton</strong> conquistou sua <strong>primeira vitória na Ferrari</strong> em 14 de junho, enquanto o líder do campeonato <strong>Kimi Antonelli</strong> (Mercedes) abandonou a prova em segundo lugar a quatro voltas do final. Isso quase reduziu sua vantagem: de 66 para apenas <strong>41&nbsp;pontos</strong>. Neste fim de semana, o palco é o <strong>GP da Áustria</strong> em Spielberg (prova&nbsp;8/22), formato clássico sem sprint. Enquanto isso, o campeonato de resistência segue: <strong>Toyota</strong> lidera o campeonato de fabricantes da WEC após o fim de semana dominante de Le Mans — a próxima parada é no início de julho em <strong>Interlagos</strong>, uma corrida de casa praticamente na porta de Daniel. Todos os horários em duplo fuso: <strong>CEST · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip good\">F1 · BARCELONA</span> <strong>A primeira vitória de Hamilton na Ferrari</strong> (prova&nbsp;7, 14/06) — à frente de Russell&nbsp;(P2) e Norris&nbsp;(P3), o <strong>primeiro pódio 100% britânico da F1 desde 1968</strong>. Antonelli abandonou em segundo lugar a quatro voltas do final.</li>\n      <li><span class=\"chip hot\">CAMPEONATO F1</span> <strong>Antonelli lidera com 156&nbsp;pontos</strong> (classificação após Barcelona) — apenas <strong>41</strong> à frente de Hamilton (Ferrari 115) e 50 de Russell (Mercedes 106). O abandono reduziu sua vantagem de 66 para 41 pontos.</li>\n      <li><span class=\"chip hot\">PRÓXIMA CORRIDA · F1</span> <strong>GP da Áustria, Red&nbsp;Bull&nbsp;Ring (prova&nbsp;8/22)</strong> — 26–28/06, sem sprint. Corrida <strong>dom 28/06 15h00&nbsp;CEST / 10h00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip\">F1 · PUNIÇÃO</span> <strong>Antonelli recebeu uma penalidade de 5 segundos</strong> por violações de limite de pista em Barcelona — sem consequências para a Áustria (sem penalidade de grid, já que o abandono ocorreu após &gt;90&nbsp;% da distância). Uma análise separada dos comissários por \"comportamento errático\" <strong>ainda não foi confirmada</strong> como resolvida.</li>\n      <li><span class=\"chip\">F1-Construtores</span> <strong>Mercedes lidera com 262&nbsp;pontos</strong> à frente da Ferrari (190, &minus;72) e McLaren (141). Apesar da vitória da Ferrari, a diferença para o topo permaneceu em 72 pontos.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota vence as 24h e assume a liderança da WEC</strong> (132&nbsp;pontos) — 36 à frente da BMW. Um resultado 1-3 em Le Mans levou o #7 (Kobayashi/Conway/de&nbsp;Vries) para a frente da classificação dos pilotos.</li>\n      <li><span class=\"chip\">WEC · PRÓXIMA CORRIDA</span> <strong>6 Horas de São&nbsp;Paulo, Interlagos (prova&nbsp;4)</strong> — dom 12/07, largada <strong>11h30&nbsp;BRT / 16h30&nbsp;CEST</strong>. Corrida de casa praticamente na porta de Daniel.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Faltan dos días para el próximo fin de semana de carreras — y la Fórmula&nbsp;1 llega con un golpe desde Barcelona: <strong>Lewis Hamilton</strong> logró su <strong>primera victoria en Ferrari</strong> el 14 de junio, mientras que el líder del campeonato <strong>Kimi Antonelli</strong> (Mercedes) se retiró desde segundo lugar a cuatro vueltas del final. Eso casi cortó su ventaja a la mitad: de 66 a solo <strong>41&nbsp;puntos</strong>. Este fin de semana, la siguiente parada es el <strong>GP de Austria</strong> en Spielberg (carrera&nbsp;8/22), formato clásico sin sprint. Mientras tanto, el campeonato de resistencia continúa: <strong>Toyota</strong> lidera el campeonato de fabricantes de la WEC tras el fin de semana dominante de Le Mans — la próxima parada es a principios de julio en <strong>Interlagos</strong>, una carrera de casa prácticamente en la puerta de Daniel. Todos los horarios en doble zona: <strong>HORARIO CENTRAL EUROPEO · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip good\">F1 · BARCELONA</span> <strong>Primera victoria de Hamilton en Ferrari</strong> (carrera&nbsp;7, 14/06) — por delante de Russell&nbsp;(P2) y Norris&nbsp;(P3), el <strong>primer podio 100% británico de F1 desde 1968</strong>. Antonelli se retiró desde segundo lugar a cuatro vueltas del final.</li>\n      <li><span class=\"chip hot\">CAMPEONATO F1</span> <strong>Antonelli lidera con 156&nbsp;puntos</strong> (clasificación tras Barcelona) — solo <strong>41</strong> por delante de Hamilton (Ferrari 115) y 50 de Russell (Mercedes 106). La retirada redujo su ventaja de 66 a 41 puntos.</li>\n      <li><span class=\"chip hot\">PRÓXIMA CARRERA · F1</span> <strong>GP de Austria, Red&nbsp;Bull&nbsp;Ring (carrera&nbsp;8/22)</strong> — 26–28/06, sin sprint. Carrera <strong>dom 28/06 15:00&nbsp;HCE / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip\">F1 · SANCIÓN</span> <strong>Antonelli recibió una penalidad de 5 segundos</strong> por violaciones de límite de pista en Barcelona — sin consecuencias para Austria (sin penalidad en la parrilla, ya que la retirada ocurrió después de &gt;90&nbsp;% de la distancia). Una revisión separada de los comisarios por \"comportamiento errático\" <strong>aún no está confirmada</strong> resuelta.</li>\n      <li><span class=\"chip\">F1-Constructores</span> <strong>Mercedes lidera con 262&nbsp;puntos</strong> por delante de Ferrari (190, &minus;72) y McLaren (141). A pesar de la victoria de Ferrari, la diferencia con la cima se mantuvo en 72 puntos.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota gana las 24h y asume el liderato de la WEC</strong> (132&nbsp;puntos) — 36 por delante de BMW. Un resultado 1-3 en Le Mans colocó al #7 (Kobayashi/Conway/de&nbsp;Vries) al frente de la clasificación de pilotos.</li>\n      <li><span class=\"chip\">WEC · PRÓXIMA CARRERA</span> <strong>6 Horas de São&nbsp;Paulo, Interlagos (carrera&nbsp;4)</strong> — dom 12/07, salida <strong>11:30&nbsp;BRT / 16:30&nbsp;HCE</strong>. Carrera de casa prácticamente en la puerta de Daniel.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Eine echte Polar-Luftmasse drückt über Paraná — INMET hat 135 Gemeinden im Frost-/Kälte-Alert, und der kälteste Punkt der Woche ist morgen früh mit rund 9 °C. Das fällt mit der Atemwegs-Saison zusammen: RSV grassiert gerade bei Kleinkindern, und mit dem einen Monat alten Baby im Haus ist das heute der wichtigste Punkt. Danach wird es ruhig und sonnig — und ab nächster Woche wartet mit dem FESCAFÉ ein großes Familien-Wochenende vor der Haustür.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Welle bei den Kleinen</strong>: InfoGripe meldet PR im SRAG-Alert, RSV führend bei Kindern bis 4. Mit 1-Monats-Baby: Besucher-Disziplin, Hände, Stillen.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Frost-Alert 135 Gemeinden</strong>: INMET-Kältewarnung 23.–26.06. Morgen (Do) kältester Tag, ~9 °C früh — Babys und Kleinkind nachts warm anziehen.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Danach klart es auf</strong>: ab Fr/Sa trocken, Sonntag schon 15–23 °C — gutes Spielplatz-Wetter zum Wochenende.</li>\n      <li><span class=\"chip good\">Event</span> <strong>28. FESCAFÉ in Ribeirão Claro</strong>, 02.–05.07: Vergnügungspark, Kinder-Show „Sonhos e Magia\", Cavalgada, Rodeo. Vor der Haustür, 50.000 Gäste erwartet.</li>\n      <li><span class=\"chip\">Trip</span> <strong>46. FIML in Londrina</strong>, 10.–19.07: Sinfonik-Festival mit Kinder-Kursen (Musikalisierung, Blockflöte, Kinderchor). Karten R$ 25–70 (2025), vieles gratis.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue auf Tiefstand</strong>: PR meldet zu Jahresbeginn 96,1 % weniger Fälle als 2025 — und im Winter ist Aedes ohnehin am ruhigsten.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Juli-Winterferien stehen an</strong>: das FESCAFÉ-Wochenende fällt voraussichtlich in die PR-Schulferien — gute Brücke für einen Familien-Ausflug.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Eine echte Polar-Luftmasse drückt über Paraná — INMET hat 135 Gemeinden im Frost-/Kälte-Alert, und der kälteste Punkt der Woche ist morgen früh mit rund 9 °C. Das fällt mit der Atemwegs-Saison zusammen: RSV grassiert gerade bei Kleinkindern, und mit dem einen Monat alten Baby im Haus ist das heute der wichtigste Punkt. Danach wird es ruhig und sonnig — und ab nächster Woche wartet mit dem FESCAFÉ ein großes Familien-Wochenende vor der Haustür.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Welle bei den Kleinen</strong>: InfoGripe meldet PR im SRAG-Alert, RSV führend bei Kindern bis 4. Mit 1-Monats-Baby: Besucher-Disziplin, Hände, Stillen.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Frost-Alert 135 Gemeinden</strong>: INMET-Kältewarnung 23.–26.06. Morgen (Do) kältester Tag, ~9 °C früh — Babys und Kleinkind nachts warm anziehen.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Danach klart es auf</strong>: ab Fr/Sa trocken, Sonntag schon 15–23 °C — gutes Spielplatz-Wetter zum Wochenende.</li>\n      <li><span class=\"chip good\">Event</span> <strong>28. FESCAFÉ in Ribeirão Claro</strong>, 02.–05.07: Vergnügungspark, Kinder-Show „Sonhos e Magia\", Cavalgada, Rodeo. Vor der Haustür, 50.000 Gäste erwartet.</li>\n      <li><span class=\"chip\">Trip</span> <strong>46. FIML in Londrina</strong>, 10.–19.07: Sinfonik-Festival mit Kinder-Kursen (Musikalisierung, Blockflöte, Kinderchor). Karten R$ 25–70 (2025), vieles gratis.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue auf Tiefstand</strong>: PR meldet zu Jahresbeginn 96,1 % weniger Fälle als 2025 — und im Winter ist Aedes ohnehin am ruhigsten.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Juli-Winterferien stehen an</strong>: das FESCAFÉ-Wochenende fällt voraussichtlich in die PR-Schulferien — gute Brücke für einen Familien-Ausflug.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A real polar air mass is settling over Paraná — INMET has 135 municipalities in frost/cold alert, and the coldest point of the week is tomorrow morning around 9 °C. It coincides with respiratory season: RSV is surging in young children, and with a one-month-old baby in the house, that's the priority today. After that, things calm down and the sun returns — and next week brings FESCAFÉ, a major family weekend right on your doorstep.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV wave among young children</strong>: InfoGripe reports PR in SRAG alert, RSV leading cause in children under 4. With a 1-month-old baby: visitor discipline, handwashing, breastfeeding.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Frost alert 135 municipalities</strong>: INMET cold warning June 23–26. Tomorrow (Thu) coldest day, ~9 °C early morning — dress baby and toddler warmly at night.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Then it clears up</strong>: Fri/Sat dry, Sunday already 15–23 °C — good playground weather for the weekend.</li>\n      <li><span class=\"chip good\">Event</span> <strong>28th FESCAFÉ in Ribeirão Claro</strong>, July 2–5: amusement park, children's show \"Sonhos e Magia,\" Cavalgada, Rodeo. Right on your doorstep, 50,000 guests expected.</li>\n      <li><span class=\"chip\">Trip</span> <strong>46th FIML in Londrina</strong>, July 10–19: symphony festival with children's courses (music theory, recorder, children's choir). Tickets R$ 25–70 (2025), much free.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue at all-time low</strong>: PR reports 96.1% fewer cases at year-start than 2025 — and Aedes is quietest in winter anyway.</li>\n      <li><span class=\"chip\">School</span> <strong>July winter break coming</strong>: the FESCAFÉ weekend falls likely during PR school holidays — perfect bridge for a family outing.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma verdadeira massa de ar polar está se instalando sobre o Paraná — o INMET tem 135 municípios em alerta de geada/frio, e o ponto mais frio da semana é amanhã cedo com cerca de 9 °C. Coincide com a estação de doenças respiratórias: o VSR está crescendo em crianças pequenas, e com um bebê de um mês em casa, esse é o ponto prioritário hoje. Depois disso, as coisas se acalmam e o sol volta — e na próxima semana vem o FESCAFÉ, um grande fim de semana em família bem na sua porta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Onda de VSR em crianças pequenas</strong>: InfoGripe informa PR em alerta SRAG, VSR é a principal causa em menores de 4 anos. Com bebê de 1 mês: disciplina nas visitas, lavar mãos, amamentação.</li>\n      <li><span class=\"chip hot\">Tempo</span> <strong>Alerta de geada em 135 municípios</strong>: Aviso de frio do INMET 23–26.06. Amanhã (qui) o dia mais frio, ~9 °C de madrugada — vista o bebê e a criança pequena bem à noite.</li>\n      <li><span class=\"chip\">Tempo</span> <strong>Depois melhora</strong>: sex/sáb seco, domingo já 15–23 °C — bom tempo de parque para o fim de semana.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>28º FESCAFÉ em Ribeirão Claro</strong>, 02–05.07: parque de diversões, show infantil \"Sonhos e Magia\", Cavalgada, Rodeio. Bem na sua porta, 50 mil visitantes esperados.</li>\n      <li><span class=\"chip\">Trip</span> <strong>46º FIML em Londrina</strong>, 10–19.07: festival de sinfonia com cursos infantis (musicalização, flauta, coral infantil). Ingressos R$ 25–70 (2025), muita coisa grátis.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue em mínima histórica</strong>: PR reporta 96,1% menos casos no início de 2026 em relação a 2025 — e Aedes é mais tranquilo no inverno mesmo.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno em julho</strong>: o fim de semana do FESCAFÉ provavelmente cai nas férias escolares de PR — perfeito para uma saída em família.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una verdadera masa de aire polar se está asentando sobre Paraná — el INMET tiene 135 municipios en alerta por helada/frío, y el punto más frío de la semana es mañana temprano con alrededor de 9 °C. Coincide con la temporada de enfermedades respiratorias: el VSR está en auge en niños pequeños, y con un bebé de un mes en casa, ese es el punto prioritario hoy. Después de eso, las cosas se calman y el sol regresa — y la próxima semana llega el FESCAFÉ, un gran fin de semana familiar justo en tu puerta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Onda de VSR en niños pequeños</strong>: InfoGripe reporta PR en alerta SRAG, VSR es la causa principal en menores de 4 años. Con bebé de 1 mes: disciplina en visitas, lavarse las manos, lactancia.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Alerta de helada en 135 municipios</strong>: Advertencia de frío del INMET 23–26.06. Mañana (jue) el día más frío, ~9 °C de madrugada — abriga bien al bebé y al niño pequeño por la noche.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Luego mejora</strong>: vie/sáb seco, domingo ya 15–23 °C — buen clima de parque para el fin de semana.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>28º FESCAFÉ en Ribeirão Claro</strong>, 02–05.07: parque de diversiones, espectáculo infantil \"Sonhos e Magia\", Cavalgada, Rodeo. Justo en tu puerta, 50 mil visitantes esperados.</li>\n      <li><span class=\"chip\">Viaje</span> <strong>46º FIML en Londrina</strong>, 10–19.07: festival de sinfonía con cursos infantiles (musicalización, flauta dulce, coro infantil). Boletos R$ 25–70 (2025), mucho gratis.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue en mínimo histórico</strong>: PR reporta 96,1% menos casos al inicio de 2026 en comparación a 2025 — y Aedes está más tranquilo en invierno de todos modos.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno en julio</strong>: el fin de semana del FESCAFÉ probablemente cae durante las vacaciones escolares de PR — perfecto para una salida en familia.</li>\n    </ul></div>"
