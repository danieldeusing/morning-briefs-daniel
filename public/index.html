      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Samstag im Nachrichten-Takt, aber die 7-Tage-Sicht trägt: KPMG schaltet 276.000 Mitarbeiter auf eine governte Agenten-Schicht, ein halbes Dutzend Konzerne kauft sich die „Ausführungs-Schicht\" für KI-Agenten zusammen — und parallel zeigt jede Studie dieselbe Lücke: Agenten gehen in Produktion, die Governance hinkt hinterher. Genau diese Lücke ist twiceDs Chance.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft Agent 365</strong>: 276.000 Profis in 138 Ländern bekommen eine zentrale Verwaltungs-Schicht für KI-Agenten — der bislang größte Enterprise-AI-Rollout.</li>\n      <li><span class=\"chip hot\">M&amp;A · Global</span> <strong>Die Ausführungs-Schicht wird gekauft</strong>: Asana→StackAI (75 Mio. $), Coupa→Rossum, Salesforce→Contentful, Vertice→Vendr — vier Deals in vier Wochen schließen dieselbe Lücke.</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Governance-Lücke</strong>: Gartner erwartet, dass Ende 2026 40 % der Enterprise-Apps task-spezifische Agenten haben (von &lt;5 % 2025) — Deloitte sieht nur 30 % der Firmen bei Risk/Governance „gut vorbereitet\".</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>EY</strong> rollt agentische KI an 130.000 Auditoren / 160.000 Prüfungen aus — erste Big-4-Komplett-Ausrollung der Wirtschaftsprüfung.</li>\n      <li><span class=\"chip\">B2B · Global</span> <strong>OpenAI Frontier</strong>: Enterprise ist jetzt &gt;40 % des OpenAI-Umsatzes; Allianzen mit McKinsey, BCG, Accenture, Capgemini.</li>\n      <li><span class=\"chip good\">Consumer · Global</span> <strong>GPT-5.5 Instant</strong>: 52,5 % weniger Halluzinationen in Medizin/Recht/Finanzen — der Anwendungsfall, nicht das Modell-Innere (Details im ai-dev-Brief).</li>\n      <li><span class=\"chip\">Reg · Deutschland</span> <strong>KI-MIG</strong> ist in Kraft, Bundesnetzagentur wird zentrale KI-Aufsicht; KI-Kompetenz-Pflicht ab Aug. 2026.</li>\n      <li><span class=\"chip good\">Markt</span> <strong>twiceD-Ideen heute</strong>: KI-Agenten-Audit für den Mittelstand (Markt 0,6→23 Mrd. $) + Cross-System-Orchestrierung als „letzter Meter\".</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Samstag im Nachrichten-Takt, aber die 7-Tage-Sicht trägt: KPMG schaltet 276.000 Mitarbeiter auf eine governte Agenten-Schicht, ein halbes Dutzend Konzerne kauft sich die „Ausführungs-Schicht\" für KI-Agenten zusammen — und parallel zeigt jede Studie dieselbe Lücke: Agenten gehen in Produktion, die Governance hinkt hinterher. Genau diese Lücke ist twiceDs Chance.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft Agent 365</strong>: 276.000 Profis in 138 Ländern bekommen eine zentrale Verwaltungs-Schicht für KI-Agenten — der bislang größte Enterprise-AI-Rollout.</li>\n      <li><span class=\"chip hot\">M&amp;A · Global</span> <strong>Die Ausführungs-Schicht wird gekauft</strong>: Asana→StackAI (75 Mio. $), Coupa→Rossum, Salesforce→Contentful, Vertice→Vendr — vier Deals in vier Wochen schließen dieselbe Lücke.</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Governance-Lücke</strong>: Gartner erwartet, dass Ende 2026 40 % der Enterprise-Apps task-spezifische Agenten haben (von &lt;5 % 2025) — Deloitte sieht nur 30 % der Firmen bei Risk/Governance „gut vorbereitet\".</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>EY</strong> rollt agentische KI an 130.000 Auditoren / 160.000 Prüfungen aus — erste Big-4-Komplett-Ausrollung der Wirtschaftsprüfung.</li>\n      <li><span class=\"chip\">B2B · Global</span> <strong>OpenAI Frontier</strong>: Enterprise ist jetzt &gt;40 % des OpenAI-Umsatzes; Allianzen mit McKinsey, BCG, Accenture, Capgemini.</li>\n      <li><span class=\"chip good\">Consumer · Global</span> <strong>GPT-5.5 Instant</strong>: 52,5 % weniger Halluzinationen in Medizin/Recht/Finanzen — der Anwendungsfall, nicht das Modell-Innere (Details im ai-dev-Brief).</li>\n      <li><span class=\"chip\">Reg · Deutschland</span> <strong>KI-MIG</strong> ist in Kraft, Bundesnetzagentur wird zentrale KI-Aufsicht; KI-Kompetenz-Pflicht ab Aug. 2026.</li>\n      <li><span class=\"chip good\">Markt</span> <strong>twiceD-Ideen heute</strong>: KI-Agenten-Audit für den Mittelstand (Markt 0,6→23 Mrd. $) + Cross-System-Orchestrierung als „letzter Meter\".</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet Saturday by news volume, but the seven-day view delivers: KPMG is deploying 276,000 employees to a governed agent layer, a half-dozen corporations are buying the \"execution layer\" for AI agents—and at the same time, every study shows the same gap: agents go to production, governance lags. That gap is exactly twiceD's opportunity.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft Agent 365</strong>: 276,000 pros across 138 countries get a central management layer for AI agents—the largest single enterprise-AI rollout to date.</li>\n      <li><span class=\"chip hot\">M&amp;A · Global</span> <strong>The execution layer is being bought</strong>: Asana→StackAI ($75M), Coupa→Rossum, Salesforce→Contentful, Vertice→Vendr—four deals in four weeks closing the same gap.</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Governance gap</strong>: Gartner expects 40% of enterprise apps to have task-specific agents by end of 2026 (from &lt;5% in 2025)—Deloitte finds only 30% of firms \"well prepared\" on risk and governance.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>EY</strong> rolls agentic AI to 130,000 auditors / 160,000 audit mandates—first Big Four complete rollout in assurance.</li>\n      <li><span class=\"chip\">B2B · Global</span> <strong>OpenAI Frontier</strong>: Enterprise is now &gt;40% of OpenAI revenue; alliances with McKinsey, BCG, Accenture, Capgemini.</li>\n      <li><span class=\"chip good\">Consumer · Global</span> <strong>GPT-5.5 Instant</strong>: 52.5% fewer hallucinations in medicine/law/finance—the use case, not the model internals (details in ai-dev brief).</li>\n      <li><span class=\"chip\">Reg · Germany</span> <strong>AI-MIG</strong> is now in effect; Federal Network Agency becomes central AI regulator; AI competency mandate from Aug 2026.</li>\n      <li><span class=\"chip good\">Market</span> <strong>twiceD ideas today</strong>: AI agent audit for mid-market ($0.6B→$23B market) + cross-system orchestration as \"last mile\".</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um sábado tranquilo em volume de notícias, mas a visão de sete dias entrega: KPMG está implantando 276.000 funcionários em uma camada de agentes governada, meia dúzia de corporações está comprando a \"camada de execução\" para agentes de IA — e ao mesmo tempo, todo estudo mostra a mesma lacuna: agentes entram em produção, governança fica para trás. Essa lacuna é exatamente a oportunidade da twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft Agent 365</strong>: 276.000 profissionais em 138 países ganham uma camada de gerenciamento central para agentes de IA — o maior lançamento empresarial único de IA até agora.</li>\n      <li><span class=\"chip hot\">M&amp;A · Global</span> <strong>A camada de execução está sendo comprada</strong>: Asana→StackAI (US$ 75 milhões), Coupa→Rossum, Salesforce→Contentful, Vertice→Vendr — quatro negócios em quatro semanas fechando a mesma lacuna.</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Lacuna de governança</strong>: Gartner espera que 40% dos aplicativos empresariais tenham agentes específicos de tarefa até o final de 2026 (de &lt;5% em 2025) — Deloitte encontra apenas 30% das empresas \"bem preparadas\" em risco e governança.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>EY</strong> lança IA agentiva para 130.000 auditores / 160.000 mandatos de auditoria — primeiro lançamento completo Big Four em garantia.</li>\n      <li><span class=\"chip\">B2B · Global</span> <strong>OpenAI Frontier</strong>: Empresa agora é &gt;40% da receita OpenAI; alianças com McKinsey, BCG, Accenture, Capgemini.</li>\n      <li><span class=\"chip good\">Consumer · Global</span> <strong>GPT-5.5 Instant</strong>: 52,5% menos alucinações em medicina/direito/finanças — o caso de uso, não o interior do modelo (detalhes no briefing de IA-dev).</li>\n      <li><span class=\"chip\">Reg · Alemanha</span> <strong>KI-MIG</strong> está em vigor, Agência Federal de Redes torna-se reguladora central de IA; mandato de competência em IA a partir de agosto de 2026.</li>\n      <li><span class=\"chip good\">Mercado</span> <strong>Ideias twiceD hoje</strong>: Auditoria de agentes de IA para médias empresas (mercado US$ 0,6B→US$ 23B) + orquestração entre sistemas como \"última milha\".</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un sábado tranquilo en volumen de noticias, pero la vista de siete días lo entrega: KPMG está implementando 276.000 empleados en una capa de agentes gobernada, media docena de corporaciones está comprando la \"capa de ejecución\" para agentes de IA — y al mismo tiempo, cada estudio muestra la misma brecha: los agentes van a producción, la gobernanza se atrasa. Esa brecha es exactamente la oportunidad de twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft Agent 365</strong>: 276.000 profesionales en 138 países obtienen una capa de gestión central para agentes de IA — el mayor lanzamiento empresarial de IA individual hasta ahora.</li>\n      <li><span class=\"chip hot\">M&amp;A · Global</span> <strong>La capa de ejecución se está comprando</strong>: Asana→StackAI (75 mdd), Coupa→Rossum, Salesforce→Contentful, Vertice→Vendr — cuatro negocios en cuatro semanas cerrando la misma brecha.</li>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Brecha de gobernanza</strong>: Gartner espera que el 40% de las aplicaciones empresariales tengan agentes específicos de tareas para finales de 2026 (de &lt;5% en 2025) — Deloitte encuentra que solo el 30% de las empresas están \"bien preparadas\" en riesgo y gobernanza.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>EY</strong> implementa IA agentiva para 130.000 auditores / 160.000 mandatos de auditoría — primer lanzamiento completo Big Four en asuntos de garantía.</li>\n      <li><span class=\"chip\">B2B · Global</span> <strong>OpenAI Frontier</strong>: Empresa es ahora &gt;40% de los ingresos de OpenAI; alianzas con McKinsey, BCG, Accenture, Capgemini.</li>\n      <li><span class=\"chip good\">Consumer · Global</span> <strong>GPT-5.5 Instant</strong>: 52,5% menos alucinaciones en medicina/derecho/finanzas — el caso de uso, no las entrañas del modelo (detalles en el informe de IA-dev).</li>\n      <li><span class=\"chip\">Reg · Alemania</span> <strong>KI-MIG</strong> está en vigor, la Agencia Federal de Redes se convierte en reguladora central de IA; mandato de competencia en IA a partir de agosto de 2026.</li>\n      <li><span class=\"chip good\">Mercado</span> <strong>Ideas de twiceD hoy</strong>: Auditoría de agentes de IA para medianas empresas (mercado de 0,6 mdd → 23 mdd) + orquestación entre sistemas como \"última milla\".</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Wochenend-Tag, dichtes Board: 86 verifizierte Listings, davon zehn mit Fit-Score ≥ 85 — alle twiceD-Freelance, alle Remote-DE, alle Java/Spring-Full-Stack. Die Spitze ist heute außergewöhnlich sauber: sechs Projekte mit exaktem Stack-Match (iSAX, teclift, RED SAP, VARIUS, Keil), mehrere mit 12- bis 41-Monate-Laufzeit und Juli/August-Start. Eine TED-EU-Ausschreibung (IAM/Java, München) passt fachlich — aber die Pflicht-Kriterien ließen sich nicht verifizieren, deshalb nur als „Partner-pending\" mit sichtbarem Vorbehalt.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Auth-Focus (Fit 90)</strong>: Java/Spring Boot 3 + Angular + OAuth2/FIDO2/AWS Cognito — Security ist Daniels Kern-Stärke. 100 % Remote.</li>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Microservice 41 Monate (Fit 89)</strong>: ultra-lange Laufzeit, Juli-2026-Start, AI-Tooling-Integration. Stabilstes Mandat im Board.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>teclift Fullstack (Fit 88)</strong>: tiefste Stack-Überlappung — Java/Spring Boot/Angular/Kafka, 12 Monate+, Remote DE.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>RED SAP 2 Jahre (Fit 87)</strong>: 100 % Remote Berlin, Juli-Start bestätigt, PKI/Security-Bonus.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>VARIUS &amp; Keil (Fit 87/86)</strong>: München-Healthcare, Angular 18+, Telematikinfrastruktur — kanonischer twiceD-Stack.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Camunda-Cluster (Fit 79–82)</strong>: vier EMEA-Remote-Stellen, Workflow-/Agentic-AI, Gehälter teils publiziert (77,4–153,7 k €).</li>\n      <li><span class=\"chip\">EU-Tender</span> <strong>TED 86435-2026</strong>: IAM/Java München, 2+1+1 Jahre, bis 3.200 PT — ⚠️ Partner-pending, Pflicht-Kriterien nicht verifiziert.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Auftragslage gedämpft</strong>: 49 % der DACH-Freelancer melden schlechtere Pipeline; IT-Schnitt 95 €/h. Java-Backend bleibt robust.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet weekend day, a dense board: 86 verified listings, ten of them with a fit score ≥ 85 — all twiceD freelance, all remote-DE, all Java/Spring full-stack. The top tier is unusually clean today: six projects with an exact stack match (iSAX, teclift, RED SAP, VARIUS, Keil), several with 12- to 41-month durations and July/August start dates. One TED EU tender (IAM/Java, Munich) is a strong technical fit — but the mandatory criteria could not be verified, so it appears only as \"Partner-pending\" with a visible caveat.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Auth-Focus (Fit 90)</strong>: Java/Spring Boot 3 + Angular + OAuth2/FIDO2/AWS Cognito — security is Daniel's core strength. 100 % remote.</li>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Microservice 41 months (Fit 89)</strong>: ultra-long duration, July 2026 start, AI tooling integration. Most stable mandate on the board.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>teclift Fullstack (Fit 88)</strong>: deepest stack overlap — Java/Spring Boot/Angular/Kafka, 12 months+, remote DE.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>RED SAP 2 years (Fit 87)</strong>: 100 % remote Berlin, July start confirmed, PKI/security bonus.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>VARIUS &amp; Keil (Fit 87/86)</strong>: Munich healthcare, Angular 18+, telematics infrastructure — canonical twiceD stack.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Camunda cluster (Fit 79–82)</strong>: four EMEA remote roles, workflow/agentic AI, salaries partly published (77,400–153,700 €).</li>\n      <li><span class=\"chip\">EU-Tender</span> <strong>TED 86435-2026</strong>: IAM/Java Munich, 2+1+1 years, up to 3,200 PT — ⚠️ Partner-pending, mandatory criteria not verified.</li>\n      <li><span class=\"chip\">Market</span> <strong>Order pipeline subdued</strong>: 49 % of DACH freelancers report a worse pipeline; IT average 95 €/h. Java backend remains robust.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um sábado tranquilo, mas um board denso: 86 listagens verificadas, sendo dez com Fit-Score ≥ 85 — todas twiceD Freelance, todas Remote-DE, todas Java/Spring Full-Stack. O topo está incomumente limpo hoje: seis projetos com correspondência exata de stack (iSAX, teclift, RED SAP, VARIUS, Keil), vários com duração de 12 a 41 meses e início em julho/agosto. Uma licitação TED-EU (IAM/Java, Munique) se encaixa tecnicamente — mas os critérios obrigatórios não puderam ser verificados, portanto aparece apenas como \"Partner-pending\" com ressalva visível.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Auth-Focus (Fit 90)</strong>: Java/Spring Boot 3 + Angular + OAuth2/FIDO2/AWS Cognito — segurança é o ponto forte central de Daniel. 100 % remoto.</li>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Microservice 41 meses (Fit 89)</strong>: duração ultra-longa, início julho 2026, integração de ferramentas de IA. Mandato mais estável do board.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>teclift Fullstack (Fit 88)</strong>: maior sobreposição de stack — Java/Spring Boot/Angular/Kafka, 12 meses+, Remote DE.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>RED SAP 2 anos (Fit 87)</strong>: 100 % Remote Berlim, início em julho confirmado, bônus PKI/segurança.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>VARIUS &amp; Keil (Fit 87/86)</strong>: saúde em Munique, Angular 18+, infraestrutura de telemática — stack canônico twiceD.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Cluster Camunda (Fit 79–82)</strong>: quatro vagas EMEA remote, workflow/IA agêntica, salários parcialmente publicados (77.400–153.700 €).</li>\n      <li><span class=\"chip\">EU-Tender</span> <strong>TED 86435-2026</strong>: IAM/Java Munique, 2+1+1 anos, até 3.200 PT — ⚠️ Partner-pending, critérios obrigatórios não verificados.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Pipeline de projetos fraca</strong>: 49 % dos freelancers DACH relatam pipeline pior; média de TI 95 €/h. Java backend permanece robusto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un sábado tranquilo, un board denso: 86 listados verificados, diez de ellos con Fit-Score ≥ 85 — todos twiceD Freelance, todos Remote-DE, todos Java/Spring Full-Stack. El tope está inusualmente limpio hoy: seis proyectos con coincidencia exacta de stack (iSAX, teclift, RED SAP, VARIUS, Keil), varios con duración de 12 a 41 meses y arranque en julio/agosto. Una licitación TED-EU (IAM/Java, Múnich) encaja técnicamente — pero los criterios obligatorios no pudieron verificarse, así que aparece solo como \"Partner-pending\" con la advertencia visible.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Auth-Focus (Fit 90)</strong>: Java/Spring Boot 3 + Angular + OAuth2/FIDO2/AWS Cognito — la seguridad es el punto fuerte central de Daniel. 100 % remoto.</li>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX Microservice 41 meses (Fit 89)</strong>: duración ultra-larga, inicio julio 2026, integración de herramientas de IA. El mandato más estable del board.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>teclift Fullstack (Fit 88)</strong>: mayor solapamiento de stack — Java/Spring Boot/Angular/Kafka, 12 meses+, Remote DE.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>RED SAP 2 años (Fit 87)</strong>: 100 % Remote Berlín, inicio en julio confirmado, bono PKI/seguridad.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>VARIUS &amp; Keil (Fit 87/86)</strong>: salud en Múnich, Angular 18+, infraestructura de telemática — stack canónico twiceD.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Cluster Camunda (Fit 79–82)</strong>: cuatro puestos EMEA remote, workflow/IA agéntica, salarios parcialmente publicados (77.400–153.700 €).</li>\n      <li><span class=\"chip\">EU-Tender</span> <strong>TED 86435-2026</strong>: IAM/Java Múnich, 2+1+1 años, hasta 3.200 PT — ⚠️ Partner-pending, criterios obligatorios no verificados.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Pipeline de proyectos débil</strong>: 49 % de los freelancers DACH reportan pipeline peor; promedio TI 95 €/h. Java backend se mantiene robusto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Letzter Vorrunden-Tag der WM 2026 — heute Abend rollen die Gruppen J, K und L aus, und für Daniel sind die beiden wichtigen Tickets längst gelöst: Brasilien gewinnt Gruppe C, Deutschland gewinnt Gruppe E, beide stehen am Montag im Sechzehntelfinale. Drumherum dreht das Sommer-Transferkarussell beim SC Freiburg, und der Bundesliga-Restart hat jetzt feste Termine.</p>\n    <ul>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção im Sechzehntelfinale</strong>: Brasilien gewinnt Gruppe C mit 7 Punkten (2S 1U), zuletzt 3:0 gegen Schottland. Gegner am Mo, 29.06.: <strong>Japan</strong>, 19:00 MESZ / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland Gruppen-1.</strong>: Gruppe E mit 6 Punkten (2S 1N), 10:4 Tore. Sechzehntelfinale Mo, 29.06. gegen <strong>Paraguay</strong>, 22:30 MESZ / 17:30 BRT, Foxborough.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Vorrunden-Finale</strong>: Gruppe L ab 23:00 MESZ / 18:00 BRT (England, Kroatien), Gruppe K ab 01:30 MESZ / 20:30 BRT (Kolumbien–Portugal), Gruppe J ab 04:00 MESZ / 23:00 BRT (Jordanien–Argentinien). Ergebnisse bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg: Röhl ist weg</strong>: Merlin Röhl wechselt fest zu Everton, €25 Mio. Dafür kommen Stürmer Keisuke Goto (€10 Mio.), Torwart Mio Backhaus (€12 Mio.) und Sechser Rihito Yamamoto (€7 Mio.).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SCF-Netto knapp negativ</strong>: ca. −€1,85 Mio. — €29 Mio. rein, €27,15 Mio. raus. Adamu (Schalke), Weißhaupt (Darmstadt) und Wagner (Dresden) gehen.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Restart steht</strong>: Supercup Bayern–BVB am Sa, 22.08., 20:30 MESZ / 15:30 BRT. Liga-Start am 28.08. Spielplan wird am 2. Juli veröffentlicht.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: Liga ruht bis Mitte Juli (WM-Pause), Palmeiras führt nach 18 Spieltagen mit 41 Punkten klar. Volle Tabelle unten.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Letzter Vorrunden-Tag der WM 2026 — heute Abend rollen die Gruppen J, K und L aus, und für Daniel sind die beiden wichtigen Tickets längst gelöst: Brasilien gewinnt Gruppe C, Deutschland gewinnt Gruppe E, beide stehen am Montag im Sechzehntelfinale. Drumherum dreht das Sommer-Transferkarussell beim SC Freiburg, und der Bundesliga-Restart hat jetzt feste Termine.</p>\n    <ul>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção im Sechzehntelfinale</strong>: Brasilien gewinnt Gruppe C mit 7 Punkten (2S 1U), zuletzt 3:0 gegen Schottland. Gegner am Mo, 29.06.: <strong>Japan</strong>, 19:00 MESZ / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschland Gruppen-1.</strong>: Gruppe E mit 6 Punkten (2S 1N), 10:4 Tore. Sechzehntelfinale Mo, 29.06. gegen <strong>Paraguay</strong>, 22:30 MESZ / 17:30 BRT, Foxborough.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Vorrunden-Finale</strong>: Gruppe L ab 23:00 MESZ / 18:00 BRT (England, Kroatien), Gruppe K ab 01:30 MESZ / 20:30 BRT (Kolumbien–Portugal), Gruppe J ab 04:00 MESZ / 23:00 BRT (Jordanien–Argentinien). Ergebnisse bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg: Röhl ist weg</strong>: Merlin Röhl wechselt fest zu Everton, €25 Mio. Dafür kommen Stürmer Keisuke Goto (€10 Mio.), Torwart Mio Backhaus (€12 Mio.) und Sechser Rihito Yamamoto (€7 Mio.).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SCF-Netto knapp negativ</strong>: ca. −€1,85 Mio. — €29 Mio. rein, €27,15 Mio. raus. Adamu (Schalke), Weißhaupt (Darmstadt) und Wagner (Dresden) gehen.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Restart steht</strong>: Supercup Bayern–BVB am Sa, 22.08., 20:30 MESZ / 15:30 BRT. Liga-Start am 28.08. Spielplan wird am 2. Juli veröffentlicht.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: Liga ruht bis Mitte Juli (WM-Pause), Palmeiras führt nach 18 Spieltagen mit 41 Punkten klar. Volle Tabelle unten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Last day of World Cup 2026 group play — tonight the finals of groups J, K, and L roll out, and for Daniel the two crucial tickets are already secured: Brazil wins group C, Germany wins group E, both advance to the Round of 32 on Monday. Meanwhile the summer transfer carousel spins at SC Freiburg, and Bundesliga's restart now has firm dates.</p>\n    <ul>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção in the Round of 32</strong>: Brazil wins group C with 7 points (2W 1D), last match 3:0 over Scotland. Opponent Mon, 29.06.: <strong>Japan</strong>, 19:00 CEST / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Germany group winners</strong>: Group E with 6 points (2W 1L), 10:4 goals. Round of 32 Mon, 29.06. vs. <strong>Paraguay</strong>, 22:30 CEST / 17:30 BRT, Foxborough.</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Group stage final tonight</strong>: Group L starting 23:00 CEST / 18:00 BRT (England, Croatia), Group K starting 01:30 CEST / 20:30 BRT (Colombia–Portugal), Group J starting 04:00 CEST / 23:00 BRT (Jordan–Argentina). Results pending at deadline.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg: Röhl is gone</strong>: Merlin Röhl transfers permanently to Everton, €25 million. In exchange, striker Keisuke Goto (€10 million), goalkeeper Mio Backhaus (€12 million), and midfielder Rihito Yamamoto (€7 million) arrive.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg net barely negative</strong>: ca. −€1.85 million — €29 million in, €27.15 million out. Adamu (Schalke), Weißhaupt (Darmstadt), and Wagner (Dresden) depart.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Restart is set</strong>: Super Cup Bayern–BVB on Sat, 22.08., 20:30 CEST / 15:30 BRT. League starts 28.08. Schedule published July 2.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pauses</strong>: League rests until mid-July (World Cup break), Palmeiras leads after 18 matchdays with 41 points. Full table below.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Último dia da primeira fase da Copa 2026 — hoje à noite rolam as finalizações dos grupos J, K e L, e para Daniel os dois ingressos importantes já estão garantidos: Brasil vence grupo C, Alemanha vence grupo E, ambos avançam para os 16-avos na segunda-feira. Enquanto isso o carrossel de transferências gira no SC Freiburg, e o retorno da Bundesliga já tem datas confirmadas.</p>\n    <ul>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção nos 16-avos</strong>: Brasil vence grupo C com 7 pontos (2V 1E), último jogo 3:0 sobre Escócia. Próximo adversário seg, 29.06.: <strong>Japão</strong>, 19:00 MESZ / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Alemanha líder do grupo</strong>: Grupo E com 6 pontos (2V 1D), 10:4 gols. 16-avos seg, 29.06. contra <strong>Paraguai</strong>, 22:30 MESZ / 17:30 BRT, Foxborough.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Hoje final da primeira fase</strong>: Grupo L a partir 23:00 MESZ / 18:00 BRT (Inglaterra, Croácia), Grupo K a partir 01:30 MESZ / 20:30 BRT (Colômbia–Portugal), Grupo J a partir 04:00 MESZ / 23:00 BRT (Jordânia–Argentina). Resultados em aberto no fechamento.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg: Röhl sai</strong>: Merlin Röhl se transfere permanentemente para Everton, €25 mi. Em troca chegam o atacante Keisuke Goto (€10 mi), goleiro Mio Backhaus (€12 mi) e meia Rihito Yamamoto (€7 mi).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Saldo Freiburg pouco negativo</strong>: ca. −€1,85 mi — €29 mi de entrada, €27,15 mi de saída. Adamu (Schalke), Weißhaupt (Darmstadt) e Wagner (Dresden) saem.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Retorno confirmado</strong>: Supercopa Bayern–BVB no sáb, 22.08., 20:30 MESZ / 15:30 BRT. Início da liga 28.08. Tabela sai em 2 de julho.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão em pausa</strong>: Liga descansa até meados de julho (pausa Copa), Palmeiras lidera após 18 rodadas com 41 pontos. Tabela completa abaixo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Último día de fase de grupos de Copa 2026 — hoy por la noche se cierran los grupos J, K y L, y para Daniel los dos boletos importantes ya están asegurados: Brasil gana grupo C, Alemania gana grupo E, ambos avanzan a los dieciseisavos el lunes. Mientras tanto el carrusel de transferencias gira en el SC Freiburg, y el regreso de Bundesliga ya tiene fechas confirmadas.</p>\n    <ul>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção en los dieciseisavos</strong>: Brasil gana grupo C con 7 puntos (2V 1E), último partido 3:0 sobre Escocia. Próximo rival lun, 29.06.: <strong>Japón</strong>, 19:00 CEST / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Alemania líder de grupo</strong>: Grupo E con 6 puntos (2V 1D), 10:4 goles. Dieciseisavos lun, 29.06. contra <strong>Paraguay</strong>, 22:30 CEST / 17:30 BRT, Foxborough.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Hoy final de fase de grupos</strong>: Grupo L a partir 23:00 CEST / 18:00 BRT (Inglaterra, Croacia), Grupo K a partir 01:30 CEST / 20:30 BRT (Colombia–Portugal), Grupo J a partir 04:00 CEST / 23:00 BRT (Jordania–Argentina). Resultados pendientes al cierre.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg: Röhl se va</strong>: Merlin Röhl se transfiere permanentemente a Everton, €25 mi. A cambio llegan el delantero Keisuke Goto (€10 mi), portero Mio Backhaus (€12 mi) y medio Rihito Yamamoto (€7 mi).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Balance Freiburg casi negativo</strong>: ca. −€1,85 mi — €29 mi de entrada, €27,15 mi de salida. Adamu (Schalke), Weißhaupt (Darmstadt) y Wagner (Dresden) se van.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Regreso confirmado</strong>: Supercopa Bayern–BVB el sáb, 22.08., 20:30 CEST / 15:30 BRT. Inicio de liga 28.08. Tabla sale el 2 de julio.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão en pausa</strong>: Liga descansa hasta mediados de julio (pausa Copa), Palmeiras lidera tras 18 jornadas con 41 puntos. Tabla completa abajo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist Quali- und Sprint-Samstag: In Spielberg fährt die Formel 1 um die Startaufstellung für den Österreich-GP, in Assen geht zeitgleich der MotoGP-Sprint über die Bühne. Beide Sessions laufen vormittags brasilianischer Zeit — und beide Meisterschaften erzählen 2026 eine völlig neue Geschichte: In der F1 hat das große Reglement-Reset Mercedes nach vorn gespült und einen 19-jährigen an die Spitze gesetzt, in der MotoGP führt erstmals Aprilia mit drei Marken im Titelkampf auf Schlagdistanz. Die Quali- und Sprint-Ergebnisse von heute waren bei Redaktionsschluss noch offen — dieses Briefing ist die Vorschau, nicht das Protokoll.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Österreich-GP Quali heute</strong>: Red Bull Ring, Spielberg. Q1–Q3 ab <strong>16:00 CEST / 11:00 BRT</strong> (Sa 27.06). Rennen So 28.06, 15:00 CEST / 10:00 BRT, 71 Runden. Antonelli führte beide Trainings an. Ergebnis bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip good\">F1-WM</span> <strong>Antonelli souverän vorn</strong>: Kimi Antonelli (Mercedes) führt nach 7 Rennen mit <strong>156 Punkten</strong>, 41 vor Hamilton. Mercedes dominiert die Konstrukteurs-WM mit 262 zu 190 Punkten gegen Ferrari.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Assen-Sprint heute</strong>: TT Circuit Assen, 13 Runden, <strong>15:00 CEST / 10:00 BRT</strong> (Sa 27.06). Quali Q1/Q2 ab 10:50 CEST / 05:50 BRT. Großer Preis So 28.06, 14:00 CEST / 09:00 BRT, 26 Runden.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Dreikampf an der Spitze</strong>: Bezzecchi (Aprilia) führt mit 180 Punkten vor Martin (Aprilia, 172) und Di Giannantonio (Ducati VR46, 157). Marc Marquez nach Brno-Sieg auf 140 wieder dran.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Bezzecchi zurück nach Sperre</strong>: Nach der Brno-Sperre (Schlag gegen einen Streckenposten) war er Freitag in Assen sofort wieder Schnellster. Marc Marquez stürzte im FP1.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Brasilien-Wochenende naht</strong>: Nächster Lauf ist die <strong>6 Stunden von São Paulo am 12. Juli</strong>. Toyota führt die Hersteller-WM nach dem Le-Mans-Sieg mit 132 Punkten an.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute ist Quali- und Sprint-Samstag: In Spielberg fährt die Formel 1 um die Startaufstellung für den Österreich-GP, in Assen geht zeitgleich der MotoGP-Sprint über die Bühne. Beide Sessions laufen vormittags brasilianischer Zeit — und beide Meisterschaften erzählen 2026 eine völlig neue Geschichte: In der F1 hat das große Reglement-Reset Mercedes nach vorn gespült und einen 19-jährigen an die Spitze gesetzt, in der MotoGP führt erstmals Aprilia mit drei Marken im Titelkampf auf Schlagdistanz. Die Quali- und Sprint-Ergebnisse von heute waren bei Redaktionsschluss noch offen — dieses Briefing ist die Vorschau, nicht das Protokoll.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Österreich-GP Quali heute</strong>: Red Bull Ring, Spielberg. Q1–Q3 ab <strong>16:00 CEST / 11:00 BRT</strong> (Sa 27.06). Rennen So 28.06, 15:00 CEST / 10:00 BRT, 71 Runden. Antonelli führte beide Trainings an. Ergebnis bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip good\">F1-WM</span> <strong>Antonelli souverän vorn</strong>: Kimi Antonelli (Mercedes) führt nach 7 Rennen mit <strong>156 Punkten</strong>, 41 vor Hamilton. Mercedes dominiert die Konstrukteurs-WM mit 262 zu 190 Punkten gegen Ferrari.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Assen-Sprint heute</strong>: TT Circuit Assen, 13 Runden, <strong>15:00 CEST / 10:00 BRT</strong> (Sa 27.06). Quali Q1/Q2 ab 10:50 CEST / 05:50 BRT. Großer Preis So 28.06, 14:00 CEST / 09:00 BRT, 26 Runden.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Dreikampf an der Spitze</strong>: Bezzecchi (Aprilia) führt mit 180 Punkten vor Martin (Aprilia, 172) und Di Giannantonio (Ducati VR46, 157). Marc Marquez nach Brno-Sieg auf 140 wieder dran.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Bezzecchi zurück nach Sperre</strong>: Nach der Brno-Sperre (Schlag gegen einen Streckenposten) war er Freitag in Assen sofort wieder Schnellster. Marc Marquez stürzte im FP1.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Brasilien-Wochenende naht</strong>: Nächster Lauf ist die <strong>6 Stunden von São Paulo am 12. Juli</strong>. Toyota führt die Hersteller-WM nach dem Le-Mans-Sieg mit 132 Punkten an.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today is qualifying and sprint Saturday: Formula 1 is fighting for the grid at the Austrian GP in Spielberg, while the MotoGP sprint is taking place at the same time in Assen. Both sessions run in the morning Brazilian time — and both championships are telling a completely new story in 2026: In F1, the big regulation reset has pushed Mercedes to the front with a 19-year-old at the helm, while in MotoGP, Aprilia is leading the title fight for the first time with three bikes in striking distance. The qualifying and sprint results from today were still open at press time — this briefing is the preview, not the report.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Austrian GP qualifying today</strong>: Red Bull Ring, Spielberg. Q1–Q3 from <strong>16:00 CEST / 11:00 BRT</strong> (Sat 27.06). Race Sun 28.06, 15:00 CEST / 10:00 BRT, 71 laps. Antonelli led both practice sessions. Result open at press time.</li>\n      <li><span class=\"chip good\">F1 WDC</span> <strong>Antonelli leading comfortably</strong>: Kimi Antonelli (Mercedes) is ahead after 7 races with <strong>156 points</strong>, 41 clear of Hamilton. Mercedes dominates the constructors' championship with 262 to 190 points over Ferrari.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Assen sprint today</strong>: TT Circuit Assen, 13 laps, <strong>15:00 CEST / 10:00 BRT</strong> (Sat 27.06). Qualifying Q1/Q2 from 10:50 CEST / 05:50 BRT. Grand Prix Sun 28.06, 14:00 CEST / 09:00 BRT, 26 laps.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Three-way fight at the top</strong>: Bezzecchi (Aprilia) leads with 180 points ahead of Martin (Aprilia, 172) and Di Giannantonio (Ducati VR46, 157). Marc Marquez back in contention on 140 after Brno win.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Bezzecchi back after ban</strong>: After the Brno ban (striking a track marshal) he was immediately fastest again on Friday in Assen. Marc Marquez crashed in FP1.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Brazil weekend approaching</strong>: Next round is the <strong>6 Hours of São Paulo on July 12</strong>. Toyota leads the manufacturers' championship after the Le Mans win with 132 points.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é sábado de classificatória e sprint: em Spielberg, a Fórmula 1 disputa o grid de largada para o GP da Áustria, e ao mesmo tempo em Assen acontece o sprint da MotoGP. Ambas as sessões correm pela manhã no horário de Brasília — e ambos os campeonatos contam uma história completamente nova em 2026: na F1, o grande reset de regulamento catapultou a Mercedes para a frente com um jovem de 19 anos liderando, enquanto na MotoGP, a Aprilia lidera a disputa de título pela primeira vez com três pilotos na briga. Os resultados da classificatória e sprint de hoje ainda estavam abertos no fechamento — este briefing é um preview, não o resultado final.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Classificatória do GP da Áustria hoje</strong>: Red Bull Ring, Spielberg. Q1–Q3 a partir das <strong>16:00 CEST / 11:00 BRT</strong> (sáb 27.06). Prova domingo 28.06, 15:00 CEST / 10:00 BRT, 71 voltas. Antonelli liderou ambas as sessões de treino. Resultado em aberto no fechamento.</li>\n      <li><span class=\"chip good\">Campeonato F1</span> <strong>Antonelli na frente com folga</strong>: Kimi Antonelli (Mercedes) lidera após 7 corridas com <strong>156 pontos</strong>, 41 à frente de Hamilton. Mercedes domina o campeonato de construtores com 262 contra 190 pontos da Ferrari.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sprint de Assen hoje</strong>: TT Circuit Assen, 13 voltas, <strong>15:00 CEST / 10:00 BRT</strong> (sáb 27.06). Classificatória Q1/Q2 a partir das 10:50 CEST / 05:50 BRT. Grande Prêmio domingo 28.06, 14:00 CEST / 09:00 BRT, 26 voltas.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Luta tripla no topo</strong>: Bezzecchi (Aprilia) lidera com 180 pontos à frente de Martin (Aprilia, 172) e Di Giannantonio (Ducati VR46, 157). Marc Márquez de volta na briga com 140 após vitória em Brno.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Bezzecchi de volta após suspensão</strong>: Após a suspensão de Brno (golpe em um comissário de pista) foi imediatamente o mais rápido novamente na sexta em Assen. Marc Márquez caiu no FP1.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Fim de semana brasileiro se aproxima</strong>: Próxima etapa é as <strong>6 Horas de São Paulo em 12 de julho</strong>. Toyota lidera o campeonato de fabricantes após vitória em Le Mans com 132 pontos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es sábado de calificación y sprint: en Spielberg, la Fórmula 1 disputa la alineación para el GP de Austria, y simultáneamente en Assen se lleva a cabo el sprint de MotoGP. Ambas sesiones corren por la mañana en horario brasileño — y ambos campeonatos cuentan una historia completamente nueva en 2026: en F1, el gran reset de reglamentación impulsó a Mercedes al frente con un piloto de 19 años liderando, mientras que en MotoGP, Aprilia lidera la lucha por el título por primera vez con tres pilotos en la pelea. Los resultados de la calificación y sprint de hoy aún estaban abiertos en el cierre — este briefing es una vista previa, no el resultado.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Calificación del GP de Austria hoy</strong>: Red Bull Ring, Spielberg. Q1–Q3 a partir de las <strong>16:00 CEST / 11:00 BRT</strong> (sáb 27.06). Carrera dom 28.06, 15:00 CEST / 10:00 BRT, 71 vueltas. Antonelli lideró ambas sesiones de práctica. Resultado abierto en el cierre.</li>\n      <li><span class=\"chip good\">Campeonato F1</span> <strong>Antonelli al frente con ventaja</strong>: Kimi Antonelli (Mercedes) lidera tras 7 carreras con <strong>156 puntos</strong>, 41 adelante de Hamilton. Mercedes domina el campeonato de constructores con 262 contra 190 puntos de Ferrari.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sprint de Assen hoy</strong>: TT Circuit Assen, 13 vueltas, <strong>15:00 CEST / 10:00 BRT</strong> (sáb 27.06). Calificación Q1/Q2 a partir de las 10:50 CEST / 05:50 BRT. Gran Premio dom 28.06, 14:00 CEST / 09:00 BRT, 26 vueltas.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Lucha triple en el liderato</strong>: Bezzecchi (Aprilia) lidera con 180 puntos adelante de Martin (Aprilia, 172) y Di Giannantonio (Ducati VR46, 157). Marc Márquez de regreso en la lucha con 140 tras victoria en Brno.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Bezzecchi de vuelta tras sanción</strong>: Tras la sanción de Brno (golpear a un comisario de pista) fue inmediatamente el más rápido nuevamente el viernes en Assen. Marc Márquez se cayó en FP1.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Fin de semana brasileño se acerca</strong>: La siguiente ronda es las <strong>6 Horas de São Paulo el 12 de julio</strong>. Toyota lidera el campeonato de fabricantes tras la victoria en Le Mans con 132 puntos.</li>\n    </ul></div>"

        "en": "<div class=\"tldr\"><p class=\"lead\">Dry, clear winter weekend and two full days of Festa Junina at the 110-km anchor in Londrina — a perfect Saturday for the family. One caveat: the respiratory virus RSV is rolling through Paraná and hitting infants especially hard. With a one-month-old girl in the house, that doesn't mean \"stay home,\" it means \"plan smart\": outdoors is good, crowded spaces and cold evening air are the danger zones.</p>\n    <ul>\n      <li><span class=\"chip good\">Event</span> <strong>Quermesse Junina</strong> at Santuário NSA in Londrina runs TODAY and tomorrow — free entry, mini petting farm, carousels, World Cup on big screen.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Dry &amp; partly cloudy</strong>: 0% rain Sat+Sun, 15 °C at night to 24–26 °C by day. Layer the baby's clothing.</li>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV alert for Paraná</strong>: virus accounts for 53.1% of positive severe respiratory cases statewide, heaviest burden on infants. Practical protection routine below.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue is all-clear here</strong>: Jacarezinho region only 73 cases, 0 deaths, −94% year-on-year.</li>\n      <li><span class=\"chip good\">Event</span> <strong>JuninFest Londrina</strong> (35th edition) on July 4–5 — free, dedicated kids zone, gluten-free stand.</li>\n      <li><span class=\"chip\">School</span> <strong>School recess</strong> July 13–24: three weeks with kids at home — time to start gathering activities now.</li>\n      <li><span class=\"chip\">Region</span> Core ring (Ribeirão Claro/Jacarezinho) quiet today — no local events confirmed; Londrina carries the weekend.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Fim de semana de inverno seco e claro, e dois dias cheios de Festa Junina no pólo de Londrina a 110 km — um sábado em família perfeito. Uma ressalva: o vírus respiratório VSR está circulando por Paraná e afetando especialmente os bebês. Com uma menina de um mês em casa, isso não significa \"ficar em casa\", significa \"planejar com inteligência\": ar livre é bom, aglomerações e ar frio à noite são as zonas de risco.</p>\n    <ul>\n      <li><span class=\"chip good\">Evento</span> <strong>Quermesse Junina</strong> no Santuário NSA em Londrina acontece HOJE e amanhã — entrada franca, mini fazenda, carrosséis, Copa na telão.</li>\n      <li><span class=\"chip\">Tempo</span> <strong>Seco &amp; parcialmente nublado</strong>: 0% de chuva sábado e domingo, 15 °C à noite até 24–26 °C de dia. Vista o bebê em camadas.</li>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Alerta VSR em Paraná</strong>: vírus representa 53,1% dos casos positivos de SRAG no estado, maior carga em bebês. Rotina prática de proteção abaixo.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue é tudo bem por aqui</strong>: região de Jacarezinho apenas 73 casos, 0 mortes, −94% em relação ao ano anterior.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>JuninFest Londrina</strong> (35ª edição) em 4 e 5 de julho — entrada franca, espaço infantil dedicado, barraca sem glúten.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Recesso escolar</strong> 13 a 24 de julho: três semanas com crianças em casa — hora de começar a reunir atividades agora.</li>\n      <li><span class=\"chip\">Região</span> Anel central (Ribeirão Claro/Jacarezinho) tranquilo hoje — nenhum evento local confirmado; Londrina carrega o fim de semana.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Fin de semana de invierno seco y despejado, y dos días completos de Festa Junina en el polo de Londrina a 110 km — un sábado en familia perfecto. Un pero: el virus respiratorio VSR circula por Paraná y afecta especialmente a los bebés. Con una niña de un mes en casa, eso no significa \"quedarse en casa\", significa \"planear con inteligencia\": el aire libre es bueno, las aglomeraciones y el aire frío de la noche son las zonas de riesgo.</p>\n    <ul>\n      <li><span class=\"chip good\">Evento</span> <strong>Quermesse Junina</strong> en el Santuário NSA en Londrina corre HOY y mañana — entrada libre, mini granja, carruseles, Copa en la pantalla grande.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Seco &amp; parcialmente nublado</strong>: 0% lluvia sábado y domingo, 15 °C de noche hasta 24–26 °C de día. Viste al bebé en capas.</li>\n      <li><span class=\"chip hot\">Salud</span> <strong>Alerta VSR · Paraná</strong>: virus representa 53,1% de casos positivos de SRAG en el estado, mayor carga en bebés. Rutina práctica de protección abajo.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue está bien aquí</strong>: región de Jacarezinho solo 73 casos, 0 muertes, −94% respecto al año anterior.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>JuninFest Londrina</strong> (35ª edición) el 4 y 5 de julio — entrada libre, zona infantil dedicada, puesto sin gluten.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Receso escolar</strong> 13 a 24 de julio: tres semanas con niños en casa — hora de empezar a reunir actividades ahora.</li>\n      <li><span class=\"chip\">Región</span> Anillo central (Ribeirão Claro/Jacarezinho) tranquilo hoy — sin eventos locales confirmados; Londrina carga el fin de semana.</li>\n    </ul></div>"

// ============================================================

(function () {
  const $ = (s, root) => (root || document).querySelector(s);
  const $$ = (s, root) => Array.from((root || document).querySelectorAll(s));
  const M = window.__MANIFESTS;
  const frame = $('#frame');
  const home = $('#home-view');
  const loading = $('#loading');
  const tldrGrid = $('#tldr-grid');

  // ── Language state ──────────────────────────────────────────────────
  // DE is the canonical language (always present). EN/PT/ES are produced
  // alongside by the nightly tasks; if a translation is missing for a
  // given date, urlFor() and the home/sidebar renderers transparently
  // fall back to the DE version so the dashboard keeps working as
  // translations roll out.
  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];
  const LANG_KEY = 'mb-lang';
  let currentLang = (function () {
    try {
      const v = localStorage.getItem(LANG_KEY);
      return SUPPORTED_LANGS.includes(v) ? v : 'de';
    } catch (_) { return 'de'; }
  })();

  function urlFor(catId, date, lang) {
    const cat = M.categories.find(c => c.id === catId);
    let useLang = 'de';
    if (cat) {
      const entry = cat.entries.find(e => e.date === date);
      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function headlineFor(entry, lang) {
    if (!entry) return '';
    if (entry.headlines && entry.headlines[lang]) return entry.headlines[lang];
    return entry.headline || '';
  }

  function tldrFor(cat, lang) {
    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {
      return cat.latestTldrHtmlByLang[lang];
    }
    return cat.latestTldrHtml || '';
  }
  const navGroups = $('#nav-groups');
  // Grouped nav config — drives BOTH the sidebar and the home tile grid so the
  // two never drift. Each group has a `header` (the .nav-label text, or null for
  // a standalone/unheadered group like jobs) and the ordered category ids it
  // contains. The flat order here must match build_manifest.CATEGORIES; a
  // category missing from every group would silently never render, so
  // renderSidebar/renderHome assert coverage against M.categories.
  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport
    { header: 'Sport',      cats: ['football', 'motorsport'] },
    { header: 'Freizeit',   cats: ['family'] },
    { header: 'Sprachen',   cats: ['learn-language'] }, // own trailing section
  ];
  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids
  // not present in M (defensive) and warns in the console about any manifest
  // category not placed in a group, so adding a category without updating
  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };
    }).filter(g => g.cats.length);
    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {
      console.warn('NAV_GROUPS missing categories (appended ungrouped):',
                   orphans.map(c => c.id));
      groups.push({ header: null, cats: orphans });
    }
    return groups;
  }

  function fmtDate(d) {
    const parts = d.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);
      }
    });
  }

    return { catId: parts[0] || null, date: parts[1] || null };
  }

  // The category dropdown holds only the month-calendar archive picker — no
  // flat date list. The calendar marks the selected day, jumps to its month,
  // and previews titles on hover.
  function renderDates(container, cat, activeDate) {
    container.innerHTML = '';
    if (cat.entries.length === 0) {
      container.innerHTML = '<div class="cat-empty">Heute kein Brief</div>';
      return;
    }
    if (activeDate === undefined) {
      const r = currentRoute();
      activeDate = r.catId === cat.id ? r.date : null;
    }
    const cal = document.createElement('div');
    cal.className = 'cat-cal';
    container.appendChild(cal);
    renderCalendar(cal, cat, activeDate);
  }

  const CAL_WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
  const CAL_MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
    'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
  const pad2 = n => String(n).padStart(2, '0');
  const monthIndex = iso => {
    const [y, m] = iso.split('-').map(Number);
