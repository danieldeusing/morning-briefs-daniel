<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;

  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }

  .loading {

  /* Color helpers per category */

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>

        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Real ist so fest wie lange nicht — und diesmal trägt ihn nicht nur der weiche Dollar, sondern brasilianische Inflation, die weicher kam als jeder erwartet hatte. Am Freitag meldete das Statistikamt für Juni einen Verbraucherpreis-Anstieg von nur <strong>0,16 %</strong> — der schwächste Monatswert seit Oktober. Der Markt las das sofort als Freibrief für eine Zinssenkung im August und schaltete auf Risk-on: Die Börse in São Paulo sprang <strong>+2,97 %</strong>, der Dollar fiel auf <strong>R$ 5,1078</strong>, den tiefsten Schluss seit Mitte Juni. Der ECB-Euro-Real-Fix steht bei <strong>5,8505</strong>. Gegen diese Festigkeit läuft ein harter Countdown: In drei Tagen, am <strong>15.07.</strong>, endet die gesetzliche Frist für den 25-%-US-Zoll auf brasilianische Waren — und um genau diese Frist tobt ein politischer Streit, in dem Flávio Bolsonaro in Washington auf Aufschub drängt und Lula der Familie Bolsonaro „Verrat am Vaterland\" vorwirft. Fester Real, weiche Inflation — aber ein binärer Trigger am Mittwoch.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (ECB-Fix, Fr 10.07.) — der Real hat sich über die Woche klar gefestigt (USD/BRL B3 <span class=\"stat\">−1,18 %</span> Wo., <span class=\"stat\">−6,94 %</span> seit Jahresbeginn).</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1078</strong> (B3-Schluss 10.07.) — <span class=\"stat\">−0,31 %</span> am Tag, tiefster Schluss seit dem 16.06. (5,0894). ECB-gestützter Kreuz: 5,1185.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,97</strong> (10.07.) — nahe dem Jahres-Tief. Ein weicher Dollar ist die zweite Stütze unter dem Real.</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check 0,32 %</strong>: ECB-Fix 5,8505 gegen unabhängigen Marktschluss 5,8317 (investing.com) — unter der 0,5-%-Flag-Linie, erklärt durch den Zeitversatz (ECB-Fix ~14:15 CET vs. voller Tagesschluss).</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Juni-IPCA 0,16 %</strong> m/m (vs. 0,58 % Mai) — schwächster Monat seit Oktober. 12-Monats-Rate auf <span class=\"stat\">4,64 %</span> gefallen (von 4,72 %), noch über der 4,5-%-Obergrenze.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa +2,97 % auf 177.866</strong> (10.07.) — Risk-on-Rallye direkt nach der weichen Inflation. +2,18 % auf der Woche.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Zinssenkungs-Wette</strong>: Der Markt preist nach dem IPCA erstmals wieder eine 25-bp-Selic-Senkung beim Copom am <strong>04.–05.08.</strong> ein — Wende von der zuvor erwarteten Pause. Selic aktuell 14,25 %.</li>\n      <li><span class=\"chip hot\">USA/BR</span> <strong>Zoll-Stichtag 15.07.</strong> — USTR Section 301, 25 % auf BR-Waren, in <strong>3 Tagen</strong>. Über 1.600 Warengruppen (Kaffee, Rindfleisch, O-Saft, Eisenerz, Pharma, Flugzeugteile) sind ausgenommen.</li>\n      <li><span class=\"chip\">BR</span> <strong>Zoll-Politik</strong>: Flávio Bolsonaro bittet Washington um Aufschub bis nach der Oktober-Wahl; Lula spricht von „Verrat am Vaterland\". Quaest-Umfrage: 47 % glauben Lula, 35 % Flávio.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent ~76 $</strong> (10.07., ~+5 % Wo.) — Risikoprämie aus der Straße von Hormuz nach neuen US–Iran-Zusammenstößen.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The real is as firm as it's been in a long time — and this time it's not just the soft dollar carrying it, but Brazilian inflation that came in softer than anyone expected. On Friday the statistics agency reported a June consumer-price rise of just <strong>0.16%</strong> — the weakest monthly reading since October. The market instantly read that as a green light for a rate cut in August and flipped to risk-on: São Paulo's stock exchange jumped <strong>+2.97%</strong>, the dollar fell to <strong>R$ 5.1078</strong>, its lowest close since mid-June. The ECB euro-real fix stands at <strong>5.8505</strong>. Against this strength runs a hard countdown: in three days, on <strong>07/15</strong>, the legal deadline expires for the 25% US tariff on Brazilian goods — and around that very deadline a political fight is raging, with Flávio Bolsonaro pushing in Washington for a delay while Lula accuses the Bolsonaro family of \"betraying the fatherland.\" A firm real, soft inflation — but a binary trigger on Wednesday.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8505</strong> (ECB fix, Fri 07/10) — the real has clearly firmed over the week (USD/BRL B3 <span class=\"stat\">−1.18%</span> w/w, <span class=\"stat\">−6.94%</span> year to date).</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1078</strong> (B3 close 07/10) — <span class=\"stat\">−0.31%</span> on the day, lowest close since 06/16 (5.0894). ECB-backed cross: 5.1185.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.97</strong> (07/10) — near the year's low. A soft dollar is the second pillar under the real.</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check 0.32%</strong>: ECB fix 5.8505 vs. independent market close 5.8317 (investing.com) — below the 0.5% flag line, explained by the time lag (ECB fix ~14:15 CET vs. full daily close).</li>\n      <li><span class=\"chip hot\">BR</span> <strong>June IPCA 0.16%</strong> m/m (vs. 0.58% in May) — weakest month since October. 12-month rate fell to <span class=\"stat\">4.64%</span> (from 4.72%), still above the 4.5% ceiling.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa +2.97% to 177,866</strong> (07/10) — risk-on rally right after the soft inflation print. +2.18% on the week.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Rate-cut bet</strong>: after the IPCA print, the market is once again pricing a 25-bp Selic cut at the Copom meeting on <strong>08/04–05</strong> — a reversal from the previously expected pause. Selic currently 14.25%.</li>\n      <li><span class=\"chip hot\">US/BR</span> <strong>Tariff deadline 07/15</strong> — USTR Section 301, 25% on BR goods, in <strong>3 days</strong>. Over 1,600 product categories (coffee, beef, orange juice, iron ore, pharma, aircraft parts) are exempt.</li>\n      <li><span class=\"chip\">BR</span> <strong>Tariff politics</strong>: Flávio Bolsonaro asks Washington for a delay until after the October election; Lula calls it \"betrayal of the fatherland.\" Quaest poll: 47% believe Lula, 35% believe Flávio.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent ~$76</strong> (07/10, ~+5% w/w) — risk premium from the Strait of Hormuz after fresh US–Iran clashes.</li>\n      <li><span class=\"chip\">Heads up</span> The forecast probabilities below = <strong>my confidence</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O real está tão firme quanto não se via há tempos — e desta vez não é só o dólar fraco que o sustenta, mas uma inflação brasileira que veio mais branda do que qualquer um esperava. Na sexta-feira, o instituto de estatística divulgou uma alta dos preços ao consumidor em junho de apenas <strong>0,16%</strong> — o menor valor mensal desde outubro. O mercado leu isso de imediato como carta branca para um corte de juros em agosto e entrou em modo risk-on: a bolsa de São Paulo saltou <strong>+2,97%</strong>, o dólar caiu para <strong>R$ 5,1078</strong>, o menor fechamento desde meados de junho. O fixing euro-real do BCE está em <strong>5,8505</strong>. Contra essa firmeza corre uma contagem regressiva dura: em três dias, no dia <strong>15/07</strong>, vence o prazo legal para a tarifa de 25% dos EUA sobre produtos brasileiros — e é justamente em torno desse prazo que se acirra uma briga política, na qual Flávio Bolsonaro pressiona em Washington por um adiamento e Lula acusa a família Bolsonaro de \"traição à pátria\". Real firme, inflação branda — mas um gatilho binário na quarta-feira.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,8505</strong> (fixing do BCE, sex. 10/07) — o real se firmou claramente ao longo da semana (USD/BRL B3 <span class=\"stat\">−1,18%</span> na sem., <span class=\"stat\">−6,94%</span> no ano).</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>USD/BRL 5,1078</strong> (fechamento B3 10/07) — <span class=\"stat\">−0,31%</span> no dia, menor fechamento desde 16/06 (5,0894). Cruzamento apoiado no BCE: 5,1185.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 100,97</strong> (10/07) — perto da mínima do ano. Um dólar fraco é o segundo apoio sob o real.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>Checagem de cruzamento 0,32%</strong>: fixing do BCE 5,8505 contra o fechamento de mercado independente 5,8317 (investing.com) — abaixo da linha de alerta de 0,5%, explicado pela defasagem de horário (fixing do BCE ~14h15 CET vs. fechamento diário completo).</li>\n      <li><span class=\"chip hot\">BR</span> <strong>IPCA de junho 0,16%</strong> m/m (vs. 0,58% em maio) — mês mais fraco desde outubro. Taxa em 12 meses caiu para <span class=\"stat\">4,64%</span> (de 4,72%), ainda acima do teto de 4,5%.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa +2,97%, a 177.866</strong> (10/07) — rali de risk-on logo após a inflação branda. +2,18% na semana.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Aposta em corte de juros</strong>: depois do IPCA, o mercado volta a precificar um corte de 25 pontos-base na Selic na reunião do Copom de <strong>04–05/08</strong> — uma virada em relação à pausa antes esperada. Selic atualmente em 14,25%.</li>\n      <li><span class=\"chip hot\">EUA/BR</span> <strong>Prazo do tarifaço 15/07</strong> — Seção 301 do USTR, 25% sobre produtos do BR, em <strong>3 dias</strong>. Mais de 1.600 grupos de produtos (café, carne bovina, suco de laranja, minério de ferro, farmacêuticos, peças de aeronaves) estão isentos.</li>\n      <li><span class=\"chip\">BR</span> <strong>Política tarifária</strong>: Flávio Bolsonaro pede a Washington um adiamento até depois da eleição de outubro; Lula fala em \"traição à pátria\". Pesquisa Quaest: 47% acreditam em Lula, 35% em Flávio.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent ~US$ 76</strong> (10/07, ~+5% na sem.) — prêmio de risco vindo do Estreito de Ormuz após novos confrontos entre EUA e Irã.</li>\n      <li><span class=\"chip\">Atenção</span> As probabilidades de projeção abaixo = <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El real está tan firme como no se veía en mucho tiempo — y esta vez no lo sostiene solo el dólar débil, sino una inflación brasileña que resultó más suave de lo que todos esperaban. El viernes, la oficina de estadística reportó un aumento de los precios al consumidor en junio de apenas <strong>0.16%</strong> — el valor mensual más débil desde octubre. El mercado lo leyó de inmediato como luz verde para un recorte de tasas en agosto y pasó a modo risk-on: la bolsa de São Paulo saltó <strong>+2.97%</strong>, el dólar cayó a <strong>R$ 5.1078</strong>, su cierre más bajo desde mediados de junio. El fixing euro-real del BCE se ubica en <strong>5.8505</strong>. Contra esta firmeza corre una cuenta regresiva dura: en tres días, el <strong>15/07</strong>, vence el plazo legal para el arancel del 25% de EE. UU. a productos brasileños — y en torno a ese plazo se libra una disputa política, en la que Flávio Bolsonaro presiona en Washington por un aplazamiento y Lula acusa a la familia Bolsonaro de \"traición a la patria\". Real firme, inflación suave — pero un detonante binario el miércoles.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8505</strong> (fixing del BCE, vie. 10/07) — el real se ha afirmado claramente durante la semana (USD/BRL B3 <span class=\"stat\">−1.18%</span> sem., <span class=\"stat\">−6.94%</span> en lo que va del año).</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1078</strong> (cierre B3 10/07) — <span class=\"stat\">−0.31%</span> en el día, cierre más bajo desde el 16/06 (5.0894). Cruce respaldado en el BCE: 5.1185.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.97</strong> (10/07) — cerca del mínimo del año. Un dólar débil es el segundo soporte bajo el real.</li>\n      <li><span class=\"chip\">FX</span> <strong>Verificación de cruce 0.32%</strong>: fixing del BCE 5.8505 frente al cierre de mercado independiente 5.8317 (investing.com) — por debajo de la línea de alerta del 0.5%, explicado por el desfase horario (fixing del BCE ~14:15 CET vs. cierre diario completo).</li>\n      <li><span class=\"chip hot\">BR</span> <strong>IPCA de junio 0.16%</strong> m/m (vs. 0.58% en mayo) — mes más débil desde octubre. La tasa a 12 meses cayó a <span class=\"stat\">4.64%</span> (desde 4.72%), aún por encima del techo de 4.5%.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa +2.97%, a 177,866</strong> (10/07) — repunte risk-on justo después de la inflación suave. +2.18% en la semana.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Apuesta a recorte de tasas</strong>: tras el IPCA, el mercado vuelve a descontar un recorte de 25 puntos base en la Selic en la reunión del Copom del <strong>04–05/08</strong> — un giro respecto a la pausa antes esperada. Selic actualmente en 14.25%.</li>\n      <li><span class=\"chip hot\">EE. UU./BR</span> <strong>Plazo arancelario 15/07</strong> — Sección 301 del USTR, 25% sobre bienes brasileños, en <strong>3 días</strong>. Más de 1,600 grupos de productos (café, carne de res, jugo de naranja, mineral de hierro, farmacéuticos, partes de aviones) están exentos.</li>\n      <li><span class=\"chip\">BR</span> <strong>Política arancelaria</strong>: Flávio Bolsonaro pide a Washington un aplazamiento hasta después de la elección de octubre; Lula habla de \"traición a la patria\". Encuesta Quaest: 47% cree en Lula, 35% en Flávio.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent ~US$76</strong> (10/07, ~+5% sem.) — prima de riesgo por el Estrecho de Ormuz tras nuevos choques entre EE. UU. e Irán.</li>\n      <li><span class=\"chip\">Atención</span> Las probabilidades de pronóstico de abajo son <strong>mi confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

        "en": "<div class=\"tldr\"><p class=\"lead\">Two pictures that don't match — and that's exactly the story. At the stock table, the week closes near record highs: <strong>META +11.5%</strong> and <strong>Nvidia +7.9%</strong> pull the S&amp;P to <strong>7,575.39</strong>, carried by a possible China turnaround for Nvidia's H200 chip.<sup>[1][2]</sup> At the commodities table, meanwhile, a real Gulf crisis is raging — the IEA calls it the \"largest supply disruption in history\" — yet <strong>Brent trades at just $76.01</strong> (Friday −0.38%, +~5% for the week).<sup>[6][7]</sup> So the market is betting on a <em>limited</em> conflict and ongoing US-Iran talks, not an oil shock. And in the only market that keeps running over the weekend, the recovery is quietly crumbling: <strong>Bitcoin $63,810</strong> — the first ETF inflow week after eight outflow weeks remains a single, still-unconfirmed turnaround, and the price slipped back below $64,000 over the weekend.<sup>[8][11]</sup> The decisive question of the week: is the $76 calm in oil smart composure or dangerous complacency?</p>\n    <ul>\n      <li><span class=\"chip hot\">AI INFRA</span> <strong>META $669.21 (+11.5% wk), Nvidia $210.96 (+7.9% wk)</strong> lead the Mag-7 field (close 10.07.). Nvidia's driver: Beijing is reportedly considering a — capped — H200 release for Alibaba/ByteDance/DeepSeek. The market is pricing in the return of a multi-billion-dollar sales market that had recently sat near ~0.</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $76.01, WTI $71.41</strong> (10.07.). Despite the near-standstill in Hormuz, only +~5% for the week and −0.38% on Friday. The war premium is surprisingly thin — the market considers the crisis limited. That's the most interesting two-sided bet on the tape.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC $63,810</strong> (−0.48% 24h / +2.0% 7d, CoinGecko 12.07. 10:52 UTC). The week of 7.–11.07. brought the first net inflow into the spot ETFs (+$282 million) after eight outflow weeks — but mid-week on Thursday (09.07.), −$95 million BTC / −$52 million ETH flowed out, with Friday turning positive again depending on the source. One week, no confirmation.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold $4,121.05/oz</strong> (−0.06%, 10.07.) — roughly 27% below the January record ($5,589), but stabilized. No trend of its own — tied to real rates and the dollar (DXY 100.97). The Warsh Fed's hike risk caps it. Hold as insurance, don't add.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1,797.87</strong> (+0.06% 24h / +1.8% 7d). Lockstep beta to BTC, no catalyst of its own. Hold.</li>\n      <li><span class=\"chip\">SECTORS</span> Quiet weekend, everything slightly red 24h — but the 7-day spread is the story: <strong>BONK −16.8%, FET −9.0%, GALA −8.0%</strong> versus <strong>VIRTUAL +7.3%, PEPE +2.7%</strong>. No coherent sector, just BTC beta with a label. Memecoins down to ~3.7% of altcoin market cap — the lowest level since Feb 2024.</li>\n      <li><span class=\"chip\">MACRO</span> Every timeframe above leads to the <strong>FOMC on 28.–29.07.</strong>: the Warsh Fed held at 3.50–3.75% on 17.06., dropped the rate-<em>cut</em> language, and is now flagging hike risk (PCE forecast raised to 3.6%).</li>\n      <li><span class=\"chip\">TERRITORY</span> AI model and agent launches belong in the <em>ai-dev</em> brief, applied AI in the <em>ai-usecases</em> brief. Here, only the price reaction counts.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas imagens que não combinam entre si — e é exatamente essa a notícia. Na mesa das ações, a semana fecha perto do recorde: <strong>META +11,5 %</strong> e <strong>Nvidia +7,9 %</strong> puxam o S&amp;P para <strong>7.575,39</strong>, sustentados por uma possível guinada da China quanto ao chip H200 da Nvidia.<sup>[1][2]</sup> Na mesa das commodities, por sua vez, uma crise real no Golfo se agrava — a IEA a chama de \"maior disrupção de oferta da história\" —, mas o <strong>Brent opera a apenas 76,01 $</strong> (sexta-feira −0,38 %, +~5 % na semana).<sup>[6][7]</sup> O mercado está, portanto, apostando num conflito <em>limitado</em> e nas conversas EUA-Irã em curso, não num choque do petróleo. E no único mercado que segue operando no fim de semana, a recuperação perde força silenciosamente: <strong>Bitcoin 63.810 $</strong> — a primeira semana de entradas nos ETFs depois de oito semanas de saídas segue sendo uma virada isolada e ainda não confirmada, e o preço voltou a cair abaixo de 64.000 $ ao longo do fim de semana.<sup>[8][11]</sup> A pergunta decisiva da semana: a calmaria de 76 $ no petróleo é serenidade inteligente ou displicência perigosa?</p>\n    <ul>\n      <li><span class=\"chip hot\">AI-INFRA</span> <strong>META 669,21 $ (+11,5 % na sem.), Nvidia 210,96 $ (+7,9 % na sem.)</strong> lideram o grupo das Mag-7 (fechamento de 10.07.). O gatilho da Nvidia: Pequim avalia uma liberação — limitada — do chip H200 para Alibaba/ByteDance/DeepSeek. O mercado está precificando o retorno de um mercado bilionário que recentemente estava perto de zero.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 76,01 $, WTI 71,41 $</strong> (10.07.). Apesar do quase paralisia em Ormuz, apenas +~5 % na semana e −0,38 % na sexta-feira. O prêmio de guerra está surpreendentemente magro — o mercado considera a crise limitada. É a aposta de dois lados mais interessante do pregão.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 63.810 $</strong> (−0,48 % em 24h / +2,0 % em 7d, CoinGecko 12.07. 10:52 UTC). A semana de 7.–11.07. trouxe a primeira entrada líquida nos ETFs à vista (+282 mi $) depois de oito semanas seguidas de saídas — mas no meio da semana, na quinta-feira (09.07.), saíram −95 mi $ em BTC / −52 mi $ em ETH, e a sexta-feira já voltou a ficar positiva, dependendo da fonte. Uma semana, nenhuma confirmação.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro 4.121,05 $/oz</strong> (−0,06 %, 10.07.) — cerca de 27 % abaixo do recorde de janeiro (5.589 $), mas estabilizado. Sem tendência de alta própria — depende do juro real e do dólar (DXY 100,97). O Fed de Warsh, com risco de alta de juros, o mantém contido. Manter como seguro, sem reforçar.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.797,87 $</strong> (+0,06 % em 24h / +1,8 % em 7d). Beta em compasso com o BTC, sem gatilho próprio. Manter.</li>\n      <li><span class=\"chip\">SETORES</span> Fim de semana tranquilo, tudo levemente no vermelho em 24h — mas a dispersão de 7 dias é a história: <strong>BONK −16,8 %, FET −9,0 %, GALA −8,0 %</strong> contra <strong>VIRTUAL +7,3 %, PEPE +2,7 %</strong>. Nenhum setor coerente, apenas beta do BTC com rótulo. Memecoins em ~3,7 % da capitalização das altcoins — o nível mais baixo desde fev/2024.</li>\n      <li><span class=\"chip\">MACRO</span> Todos os horizontes convergem para o <strong>FOMC de 28.–29.07.</strong>: o Fed de Warsh manteve a taxa em 17.06. em 3,50–3,75 %, retirou a linguagem de <em>corte</em> de juros e agora sinaliza risco de alta (projeção de PCE elevada para 3,6 %).</li>\n      <li><span class=\"chip\">TERRITÓRIO</span> Lançamentos de modelos e agentes de IA ficam no boletim <em>ai-dev</em>, IA aplicada no boletim <em>ai-usecases</em>. Aqui, só conta a reação de preço.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos imágenes que no encajan — y esa es precisamente la noticia. En la mesa de las acciones, la semana cierra cerca de un récord: <strong>META +11,5 %</strong> y <strong>Nvidia +7,9 %</strong> impulsan al S&amp;P hasta <strong>7.575,39</strong>, sostenidos por un posible giro de China respecto al chip H200 de Nvidia.<sup>[1][2]</sup> En la mesa de las materias primas, mientras tanto, se desata una verdadera crisis en el Golfo — la AIE la llama la \"mayor disrupción de la oferta de la historia\" —, pero <strong>el Brent cotiza en solo 76,01 $</strong> (viernes −0,38 %, +~5 % en la semana).<sup>[6][7]</sup> El mercado, entonces, apuesta a un conflicto <em>limitado</em> y a las conversaciones en curso entre EE. UU. e Irán, no a un shock petrolero. Y en el único mercado que sigue operando el fin de semana, la recuperación se va desmoronando en silencio: <strong>Bitcoin en 63.810 $</strong> — la primera semana de entradas a los ETF tras ocho semanas de salidas sigue siendo un giro único, aún no confirmado, y el precio volvió a caer por debajo de los 64.000 $ durante el fin de semana.<sup>[8][11]</sup> La pregunta clave de la semana: ¿la calma del petróleo en 76 $ es serenidad inteligente o despreocupación peligrosa?</p>\n    <ul>\n      <li><span class=\"chip hot\">IA-INFRA</span> <strong>META 669,21 $ (+11,5 % sem.), Nvidia 210,96 $ (+7,9 % sem.)</strong> lideran el grupo de las Mag-7 (cierre 10.07.). El motor de Nvidia: Pekín estaría considerando una liberación — con tope — del H200 para Alibaba/ByteDance/DeepSeek. El mercado está poniendo precio al regreso de un mercado de miles de millones de dólares que hasta hace poco estaba prácticamente en cero.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 76,01 $, WTI 71,41 $</strong> (10.07.). Pese al casi paro total en Ormuz, solo +~5 % en la semana y −0,38 % el viernes. La prima de guerra es sorprendentemente delgada — el mercado considera la crisis limitada. Es la apuesta a dos bandas más interesante de la cinta.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 63.810 $</strong> (−0,48 % 24h / +2,0 % 7d, CoinGecko 12.07. 10:52 UTC). La semana del 7 al 11.07. trajo la primera entrada neta a los ETF spot (+282 millones $) tras ocho semanas de salidas — pero a mitad de semana, el jueves (09.07.), salieron −95 millones $ de BTC / −52 millones $ de ETH, y el viernes volvió a ser positivo según algunas fuentes. Una semana, ninguna confirmación.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro 4.121,05 $/oz</strong> (−0,06 %, 10.07.) — cerca de un 27 % por debajo del récord de enero (5.589 $), pero estabilizado. Sin tendencia alcista propia — depende de la tasa real y del dólar (DXY 100,97). La Fed de Warsh, con riesgo de alza, lo mantiene contenido. Mantener la cobertura, no ampliarla.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.797,87 $</strong> (+0,06 % 24h / +1,8 % 7d). Beta en sincronía con BTC, sin catalizador propio. Mantener.</li>\n      <li><span class=\"chip\">SECTORES</span> Fin de semana tranquilo, todo ligeramente en rojo en 24h — pero la dispersión de 7 días es la historia: <strong>BONK −16,8 %, FET −9,0 %, GALA −8,0 %</strong> frente a <strong>VIRTUAL +7,3 %, PEPE +2,7 %</strong>. No hay un sector coherente, solo beta de BTC con otra etiqueta. Las memecoins están en ~3,7 % de la capitalización de altcoins — el nivel más bajo desde febrero de 2024.</li>\n      <li><span class=\"chip\">MACRO</span> Todos los plazos apuntan al <strong>FOMC del 28 al 29.07.</strong>: la Fed de Warsh se mantuvo el 17.06. en 3,50–3,75 %, eliminó el lenguaje de <em>recortes</em> de tasas y ahora señala riesgo de alza (proyección de PCE en 3,6 %).</li>\n      <li><span class=\"chip\">ÁMBITOS</span> Los lanzamientos de modelos y agentes de IA están en el brief de <em>ai-dev</em>, la IA aplicada en el brief de <em>ai-usecases</em>. Aquí solo cuenta la reacción del precio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Sonntag, aber kein leerer: Der News-Faden dieser Woche ist die Software-Lieferkette, und die steht unter aktivem Beschuss. Innerhalb weniger Tage wurden zwei npm-Pakete gekapert — gestern <code>jscrambler</code> mit einem Rust-Infostealer, davor der Injective-SDK mit einem Wallet-Key-Backdoor. Das ist genau die Angriffsklasse, gegen die npm v12 seine neuen Defaults auffährt — Anlass, ehrlich zu fragen, was diese Härtung wirklich stoppt und was sie nur verschiebt. Dazu: eine stille Downgrade-Lücke im Postgres-JDBC-Treiber direkt in Daniels Stack, und CodeQL bekommt eine Query gegen Prompt-Injection.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>jscrambler-npm gekapert</strong> (11.07): fünf Malware-Releases in ~3 h, Rust-Infostealer für Browser-Profile, Bitwarden-Extension und Steam — bei 8.18.0 wanderte der Dropper aus dem Install-Hook in <code>dist/index.js</code>.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Injective-SDK backdoored</strong> (08.07): <code>@injectivelabs/sdk-ts</code> v1.20.21 stahl Seed-Phrasen und Private Keys — 18 Pakete, ~50.000 Downloads/Woche, &lt;1 h live, kein Schaden. Fix in 1.20.23.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12 — Einordnung</strong>: hätte den ersten jscrambler-Hook geblockt, nicht aber den Dropper in <code>dist/</code> oder den Injective-Backdoor im SDK-Code. Notwendig, nicht hinreichend.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>PostgreSQL-JDBC 42.7.12</strong>: schließt CVE-2026-54291 — <code>channelBinding=require</code> wurde still von SCRAM-PLUS auf einfaches SCRAM heruntergestuft. Betrifft 42.7.4–42.7.11.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GitHub CodeQL 2.26.0</strong> (10.07): Kotlin bis 2.4.0 — plus eine neue Query <code>js/system-prompt-injection</code>, die untrusted Input in KI-System-Prompts aufspürt.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Foundry hosted agents (GA)</strong>: hypervisor-isolierte Sandbox pro Session, framework-agnostisch, Scale-to-zero — die Isolations-Story, nicht die Agenten-Story.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow-CVE, Einordnung</strong>: NVD wertet 8,4 (hoch), der Vendor 9,9 (kritisch) — und trotzdem seit 25.06 aktiv ausgenutzt. KEV schlägt CVSS-Score.</li>\n      <li><span class=\"chip\">Release</span> <strong>Kurz notiert</strong>: Angular 22.0.5, Firefox 152.0.5 (153 am 21.07), SQLite 3.53.3 — und die OpenJDK-Quartals-CPU am 21.07.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Sonntag, aber kein leerer: Der News-Faden dieser Woche ist die Software-Lieferkette, und die steht unter aktivem Beschuss. Innerhalb weniger Tage wurden zwei npm-Pakete gekapert — gestern <code>jscrambler</code> mit einem Rust-Infostealer, davor der Injective-SDK mit einem Wallet-Key-Backdoor. Das ist genau die Angriffsklasse, gegen die npm v12 seine neuen Defaults auffährt — Anlass, ehrlich zu fragen, was diese Härtung wirklich stoppt und was sie nur verschiebt. Dazu: eine stille Downgrade-Lücke im Postgres-JDBC-Treiber direkt in Daniels Stack, und CodeQL bekommt eine Query gegen Prompt-Injection.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>jscrambler-npm gekapert</strong> (11.07): fünf Malware-Releases in ~3 h, Rust-Infostealer für Browser-Profile, Bitwarden-Extension und Steam — bei 8.18.0 wanderte der Dropper aus dem Install-Hook in <code>dist/index.js</code>.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Injective-SDK backdoored</strong> (08.07): <code>@injectivelabs/sdk-ts</code> v1.20.21 stahl Seed-Phrasen und Private Keys — 18 Pakete, ~50.000 Downloads/Woche, &lt;1 h live, kein Schaden. Fix in 1.20.23.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12 — Einordnung</strong>: hätte den ersten jscrambler-Hook geblockt, nicht aber den Dropper in <code>dist/</code> oder den Injective-Backdoor im SDK-Code. Notwendig, nicht hinreichend.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>PostgreSQL-JDBC 42.7.12</strong>: schließt CVE-2026-54291 — <code>channelBinding=require</code> wurde still von SCRAM-PLUS auf einfaches SCRAM heruntergestuft. Betrifft 42.7.4–42.7.11.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GitHub CodeQL 2.26.0</strong> (10.07): Kotlin bis 2.4.0 — plus eine neue Query <code>js/system-prompt-injection</code>, die untrusted Input in KI-System-Prompts aufspürt.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Foundry hosted agents (GA)</strong>: hypervisor-isolierte Sandbox pro Session, framework-agnostisch, Scale-to-zero — die Isolations-Story, nicht die Agenten-Story.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow-CVE, Einordnung</strong>: NVD wertet 8,4 (hoch), der Vendor 9,9 (kritisch) — und trotzdem seit 25.06 aktiv ausgenutzt. KEV schlägt CVSS-Score.</li>\n      <li><span class=\"chip\">Release</span> <strong>Kurz notiert</strong>: Angular 22.0.5, Firefox 152.0.5 (153 am 21.07), SQLite 3.53.3 — und die OpenJDK-Quartals-CPU am 21.07.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet Sunday, but not an empty one: this week's news thread is the software supply chain, and it's under active attack. Within a few days, two npm packages were hijacked — yesterday <code>jscrambler</code> with a Rust infostealer, before that the Injective SDK with a wallet-key backdoor. This is exactly the attack class npm v12's new defaults are meant to stop — reason enough to honestly ask what this hardening actually prevents and what it merely displaces. Also: a silent downgrade gap in the Postgres JDBC driver right in Daniel's stack, and CodeQL gets a query against prompt injection.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>jscrambler npm package hijacked</strong> (Jul 11): five malicious releases in ~3 hours, a Rust infostealer for browser profiles, the Bitwarden extension, and Steam — at 8.18.0 the dropper moved out of the install hook into <code>dist/index.js</code>.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Injective SDK backdoored</strong> (Jul 8): <code>@injectivelabs/sdk-ts</code> v1.20.21 stole seed phrases and private keys — 18 packages, ~50,000 downloads/week, live &lt;1 hour, no damage done. Fixed in 1.20.23.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12 — assessment</strong>: would have blocked the first jscrambler hook, but not the dropper in <code>dist/</code> or the Injective backdoor in the SDK code. Necessary, not sufficient.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>PostgreSQL JDBC 42.7.12</strong>: closes CVE-2026-54291 — <code>channelBinding=require</code> was silently downgraded from SCRAM-PLUS to plain SCRAM. Affects 42.7.4–42.7.11.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GitHub CodeQL 2.26.0</strong> (Jul 10): Kotlin up to 2.4.0 — plus a new query, <code>js/system-prompt-injection</code>, that detects untrusted input flowing into AI system prompts.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Foundry hosted agents (GA)</strong>: hypervisor-isolated sandbox per session, framework-agnostic, scale-to-zero — the isolation story, not the agent story.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow CVE, in context</strong>: NVD rates it 8.4 (high), the vendor 9.9 (critical) — and it's still been actively exploited since Jun 25. KEV beats CVSS score.</li>\n      <li><span class=\"chip\">Release</span> <strong>Briefly noted</strong>: Angular 22.0.5, Firefox 152.0.5 (153 on Jul 21), SQLite 3.53.3 — and the OpenJDK quarterly CPU on Jul 21.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um domingo tranquilo, mas não vazio: o fio condutor da semana é a cadeia de suprimentos de software, e ela está sob ataque ativo. Em poucos dias, dois pacotes npm foram sequestrados — ontem o <code>jscrambler</code>, com um infostealer em Rust, e antes disso o SDK da Injective, com um backdoor que roubava chaves de carteira. Essa é exatamente a classe de ataque que os novos padrões do npm v12 tentam barrar — motivo para perguntar com honestidade o que esse endurecimento realmente impede e o que apenas desloca. Além disso: uma brecha silenciosa de downgrade no driver JDBC do Postgres, bem dentro da stack do Daniel, e o CodeQL ganha uma query contra prompt injection.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>pacote npm jscrambler sequestrado</strong> (11/07): cinco releases maliciosos em ~3 h, infostealer em Rust para perfis de navegador, extensão do Bitwarden e Steam — na versão 8.18.0 o dropper migrou do install hook para <code>dist/index.js</code>.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>SDK da Injective com backdoor</strong> (08/07): <code>@injectivelabs/sdk-ts</code> v1.20.21 roubava seed phrases e chaves privadas — 18 pacotes, ~50.000 downloads/semana, &lt;1 h no ar, sem danos registrados. Correção na 1.20.23.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12 — avaliação</strong>: teria bloqueado o primeiro hook do jscrambler, mas não o dropper em <code>dist/</code> nem o backdoor da Injective no código do SDK. Necessário, mas não suficiente.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>PostgreSQL JDBC 42.7.12</strong>: corrige o CVE-2026-54291 — <code>channelBinding=require</code> era silenciosamente rebaixado de SCRAM-PLUS para SCRAM simples. Afeta as versões 42.7.4–42.7.11.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GitHub CodeQL 2.26.0</strong> (10/07): Kotlin até 2.4.0 — mais uma nova query, <code>js/system-prompt-injection</code>, que detecta entradas não confiáveis chegando a prompts de sistema de IA.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Foundry hosted agents (GA)</strong>: sandbox isolado por hypervisor a cada sessão, agnóstico de framework, scale-to-zero — a história é a isolação, não os agentes.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CVE do Langflow, em contexto</strong>: o NVD avalia em 8,4 (alto), o fabricante em 9,9 (crítico) — e mesmo assim explorada ativamente desde 25/06. KEV supera o score CVSS.</li>\n      <li><span class=\"chip\">Release</span> <strong>Notas rápidas</strong>: Angular 22.0.5, Firefox 152.0.5 (153 em 21/07), SQLite 3.53.3 — e o CPU trimestral do OpenJDK em 21/07.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un domingo tranquilo, pero no vacío: el hilo de noticias de esta semana es la cadena de suministro de software, y está bajo ataque activo. En pocos días secuestraron dos paquetes de npm: ayer <code>jscrambler</code>, con un infostealer en Rust, y antes de eso el SDK de Injective, con una puerta trasera que robaba claves de wallet. Esta es exactamente la clase de ataque que los nuevos valores predeterminados de npm v12 buscan detener, motivo para preguntarnos con honestidad qué detiene realmente este endurecimiento y qué solo desplaza. Además: una brecha silenciosa de downgrade en el driver JDBC de Postgres, justo en el stack de Daniel, y CodeQL suma una query contra la inyección de prompts.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>paquete npm jscrambler secuestrado</strong> (11/07): cinco lanzamientos maliciosos en ~3 horas, un infostealer en Rust para perfiles de navegador, la extensión de Bitwarden y Steam; en la 8.18.0 el dropper se movió del install hook a <code>dist/index.js</code>.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>SDK de Injective con puerta trasera</strong> (08/07): <code>@injectivelabs/sdk-ts</code> v1.20.21 robaba seed phrases y llaves privadas: 18 paquetes, ~50,000 descargas/semana, &lt;1 hora activo, sin daños. Corregido en 1.20.23.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12: evaluación</strong>: habría bloqueado el primer hook de jscrambler, pero no el dropper en <code>dist/</code> ni la puerta trasera de Injective en el código del SDK. Necesario, no suficiente.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>PostgreSQL JDBC 42.7.12</strong>: cierra el CVE-2026-54291: <code>channelBinding=require</code> se degradaba silenciosamente de SCRAM-PLUS a SCRAM simple. Afecta de la 42.7.4 a la 42.7.11.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GitHub CodeQL 2.26.0</strong> (10/07): Kotlin hasta 2.4.0, más una nueva query, <code>js/system-prompt-injection</code>, que detecta entradas no confiables que llegan a los prompts de sistema de una IA.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Microsoft Foundry hosted agents (GA)</strong>: sandbox aislado por hipervisor en cada sesión, agnóstico de framework, scale-to-zero: la historia es el aislamiento, no los agentes.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CVE de Langflow, en contexto</strong>: el NVD lo califica en 8.4 (alto), el fabricante en 9.9 (crítico), y aun así se explota activamente desde el 25/06. El KEV le gana al puntaje CVSS.</li>\n      <li><span class=\"chip\">Release</span> <strong>Notas breves</strong>: Angular 22.0.5, Firefox 152.0.5 (153 el 21/07), SQLite 3.53.3, y el CPU trimestral de OpenJDK el 21/07.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sonntag, ruhiger Nachrichtentag — aber mit einer Story, die genau dort ansetzt, wo gestern der skeptische Faden endete. Z.ais <strong>GLM-5.2</strong> ist ein <strong>MIT-lizenziertes</strong> Coding-Modell mit 1-Million-Token-Kontext, das für <strong>1,40 $ / 4,40 $</strong> je Mio. Token auf OpenRouter liegt und auf SWE-Bench <em>Pro</em> mit <strong>62,1 %</strong> beworben wird. Das ist günstig und offen — aber die 62,1 sind, wie fast alle Zahlen dieser Woche, <strong>anbieter-berichtet</strong>, und die vielzitierte „80× Kunden-Wachstum auf Vercel\"-Zahl hängt an einer einzigen Aggregator-Quelle. Daneben eine stille, aber praktische Änderung für Claude-Code-Nutzer und ein Code-Scanner, der jetzt KI-SDK-Aufrufe versteht.</p>\n    <ul>\n      <li><span class=\"chip hot\">OSS</span> <strong>GLM-5.2 (Z.ai)</strong>: MIT-Gewichte, 1M-Kontext, 1,40 $/4,40 $. SWE-Bench <em>Pro</em> <strong>62,1 %</strong> (Anbieter/Aggregator) — vor GPT-5.5 (58,6), hinter Claude Opus 4.8 (69,2 — Anthropics eigene System-Card-Angabe, ebenfalls anbieter-berichtet).</li>\n      <li><span class=\"chip\">OSS</span> <strong>GLM-5.2-Adoption auf Vercel</strong>: „80× Kunden-, 27× Token-Wachstum in der ersten Woche\" — steht in <em>einem</em> Aggregator-Blog, nicht auf Vercels eigenem Changelog. Nicht Vercel-bestätigt.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Code v2.1.207 (10.07.)</strong>: Auto-Modus jetzt <strong>ohne Opt-in</strong> auf Bedrock, Vertex, Foundry; <strong>Opus 4.8</strong> wird dort das Default-Modell. Wer das alte Verhalten will, muss Modell + Modus explizit setzen.</li>\n      <li><span class=\"chip\">Bench</span> <strong>GPT-5.6 Sol</strong> führt den Artificial-Analysis <strong>Coding Agent Index mit 80,0</strong> (+2,8 vor Fable 5) — primär-bestätigt (OpenAIs eigener Post + AA). Andere Prüfung als SWE-Bench Pro, nicht verwechseln.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>CodeQL 2.26.0 (10.07.)</strong>: neue Query <code>js/system-prompt-injection</code> + KI-SDK-Sinks (OpenAI, Anthropic, Google GenAI). Ein Scanner, der jetzt Prompt-Injection <em>im eigenen Code</em> findet.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot in VS Code, Juni-Releases (v1.123–1.127)</strong>: parallele Agenten-Sessions, Kosten-Transparenz pro Session/Subagent, Modell-Discovery über den Marketplace, Browser-Tools GA.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Continue.dev löscht Cloud-Daten nach dem 15.07.</strong> (in 3 Tagen); Cognitions <strong>Devin Security Swarm</strong> fand 36/50 Real-World-Lücken; Aider-Board weiter stale seit 20.11.2025.</li>\n      <li><span class=\"chip\">Local</span> <strong>Qwen3-Coder-Next</strong> (80B-MoE, 3B aktiv, SWE-rebench Pass@5 64,6 %) + <strong>DeepSeek-V4</strong>: der Open-Weights-Schub hält an. Genaue Release-Daten unklar — als „mid-2026\" geflaggt.</li>\n    </ul></div>",
