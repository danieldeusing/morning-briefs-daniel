<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat-more {
    display: block; margin: 0.4rem 0 0.1rem;
    background: transparent;
    border: 1px dashed var(--rule);
    padding: 0.55rem 0.7rem; border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.72rem; color: var(--muted);
    cursor: pointer;
    text-align: left; width: 100%;
    transition: color 120ms, border-color 120ms, background 120ms;
    min-height: 2.25rem;
  }
  .cat-more:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .cat-more:hover { color: var(--fg); border-color: var(--soft); background: var(--rule-soft); }
  .cat.open .cat-dates { display: block; }
  .cat-date {
    display: flex; flex-direction: column; justify-content: center;
    padding: 0.5rem 0.6rem;
    font-family: var(--font-mono);
    font-size: 0.74rem; color: var(--muted);
    text-decoration: none; border-radius: var(--radius-inline);
    font-feature-settings: "tnum";
    cursor: pointer;
    min-height: 2.25rem;
  }
  .cat-date:hover { background: var(--rule-soft); color: var(--fg); }
  .cat-date.current { color: var(--fg); font-weight: 600; background: var(--quote); }
  .cat-date .headline {
    font-family: var(--font-body);
    color: var(--soft); font-weight: 400; font-size: 0.78rem;
    display: block; margin-top: 0.1rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Archive month-picker (revealed by the "Älteren Brief wählen" button) —
     only days that have a brief are clickable; hovering one previews its title. */
  .cat-cal {
    margin: 0.4rem 0 0.2rem;
    padding: 0.5rem;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday — equity markets closed, the real rate sleeping. But the week behind us has shifted the EUR/BRL picture: the ECB has raised rates for the first time in three years — and the euro barely moved, because the dollar is stronger globally right now. For your euro payments, that means: the EUR/BRL anchor sits around 5.91, but this week's move comes from Washington (FOMC) and the Iran deal, not from Frankfurt.</p>\n    <ul>\n      <li><span class=\"chip hot\">ECB</span> <strong>First hike in ~3 years</strong>: deposit rate +25 bps to 2.25% (June 11), justified by war-driven energy inflation. EUR/USD stayed flat at ~1.155.</li>\n      <li><span class=\"chip\">EUR/BRL</span> <strong>Anchor 5.9076</strong> (ECB fix June 12). Cross-check via USD/BRL × EUR/USD consistent (~0.0% deviation).</li>\n      <li><span class=\"chip hot\">USA</span> <strong>FOMC June 16–17</strong>: 99.5% market probability of no change (band 3.5–3.75%) — but possible hawk turn under new chair Warsh is the real risk.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>US-Iran deal near signing</strong>: Trump announced today, Iran's foreign minister pushes back. Brent fell ~3.4% to ~$87.3 — risk-on strengthens dollar, pressures real.</li>\n      <li><span class=\"chip warn\">BR</span> <strong>\"Pauta-bomba\" in Senate</strong>: R$386 billion spending package + R$99 billion pension add-on. BofA downgrades Brazil to neutral.</li>\n      <li><span class=\"chip warn\">BR</span> <strong>Focus survey turns higher again</strong>: IPCA year-end forecast 5.11% (13th consecutive rise), Selic expectation 13.5%, USD/BRL target 5.20.</li>\n      <li><span class=\"chip\">USD/BRL</span> <strong>Real softer intraday</strong>: ~5.19 Sunday (one source) vs. 5.1073 ECB fix June 12 — dollar strength bleeding through.</li>\n      <li><span class=\"chip\">DXY</span> <strong>Dollar Index 99.81</strong> (as of June 12) — today's value not confirmed; near month-mid range.</li>\n      <li><span class=\"chip\">BR</span> <strong>Real interest rate tops globally</strong>: Selic 14.50%, real ~10.9% — supports real as long as foreigners tolerate fiscal risk.</li>\n      <li><span class=\"chip\">Positioning</span> <strong>EWZ bleeds near-term</strong>: −$450M over 1 month, but +$1.23B over 3 months — mixed picture.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É domingo — bolsas fechadas, o câmbio real dorme. Mas a semana que passou virou o quadro EUR/BRL: o BCE elevou juros pela primeira vez em três anos — e o euro mal se mexeu, porque o dólar está mais forte globalmente agora. Para suas contas em euros, isso significa: a âncora EUR/BRL fica em torno de 5,91, mas os movimentos desta semana saem de Washington (FOMC) e do acordo Irã, não de Frankfurt.</p>\n    <ul>\n      <li><span class=\"chip hot\">BCE</span> <strong>Primeiro aumento em ~3 anos</strong>: taxa de depósito +25 bps para 2,25% (11/06), justificado por inflação de energia da guerra. EUR/USD manteve-se plano em ~1,155.</li>\n      <li><span class=\"chip\">EUR/BRL</span> <strong>Âncora 5,9076</strong> (fixação BCE 12/06). Verificação cruzada via USD/BRL × EUR/USD consistente (desvio ~0,0%).</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>FOMC 16–17/06</strong>: 99,5% de probabilidade de mercado para nenhuma alteração (banda 3,5–3,75%) — mas possível virada hawkish sob novo presidente Warsh é o risco real.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Acordo EUA-Irã perto da assinatura</strong>: Trump anunciou hoje, chanceler iraniano freou. Brent caiu ~3,4% para ~87,3$ — risco elevado fortalece o dólar, pesa no real.</li>\n      <li><span class=\"chip warn\">BR</span> <strong>\"Pauta-bomba\" no Senado</strong>: R$386 bi de gastos + R$99 bi de adicional de aposentadorias. BofA rebaixou Brasil para neutro.</li>\n      <li><span class=\"chip warn\">BR</span> <strong>Focus segue subindo</strong>: previsão IPCA fim de ano 5,11% (13º aumento seguido), expectativa Selic 13,5%, alvo USD/BRL 5,20.</li>\n      <li><span class=\"chip\">USD/BRL</span> <strong>Real mais fraco intraday</strong>: ~5,19 domingo (uma fonte) vs 5,1073 fixação BCE 12/06 — força do dólar passando.</li>\n      <li><span class=\"chip\">DXY</span> <strong>Índice Dólar 99,81</strong> (em 12/06) — valor de hoje não confirmado; próximo ao meio da faixa mensal.</li>\n      <li><span class=\"chip\">BR</span> <strong>Taxa real de juros é topo global</strong>: Selic 14,50%, real ~10,9% — sustenta o real enquanto estrangeiros toleram risco fiscal.</li>\n      <li><span class=\"chip\">Posicionamento</span> <strong>EWZ sangra curto prazo</strong>: −450 mi$ em 1 mês, mas +1,23 bi$ em 3 meses — quadro misto.</li>\n    </ul></div>",

r 12/06) — valor de hoy no confirmado; cerca de mitad del rango mensual.</li>\n      <li><span class=\"chip\">BR</span> <strong>Tasa real de interés lidera globalmente</strong>: Selic 14,50%, real ~10,9% — sustenta el real mientras extranjeros toleren riesgo fiscal.</li>\n      <li><span class=\"chip\">Posicionamiento</span> <strong>EWZ sangra corto plazo</strong>: −450 millones$ en 1 mes, pero +1,23 mil millones$ en 3 meses — cuadro mixto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Sonntag — Aktien und Rohstoff-Futures sind übers Wochenende zu, also ist alles Nicht-Krypto der <strong>Freitags-Schluss (12.06.)</strong>; Krypto läuft live (Stand Sonntag 14.06.). Die große Frage ist jetzt nicht mehr das SpaceX-Debüt, sondern <strong>der FOMC am Dienstag–Mittwoch (16.–17.06.)</strong> — die erste Sitzung unter dem neuen Fed-Chef. Die Freitags-Rally war echt: <strong>SpaceX (SPCX) schloss bei 161,11 $ (+19 % über dem 135-$-IPO-Preis)</strong>, ~75 Mrd. $ Raise, größter IPO aller Zeiten, und hob die Stimmung — <strong>Dow 51.202 (+0,7 %), S&amp;P +0,5 %, Nasdaq +0,3 %</strong>.<sup>[1][3]</sup> Die Mag-7 schlossen aber <em>gemischt</em>: <strong>TSLA 406,43 $ (+1,82 %)</strong> vorn, <strong>NVDA 205,19 $ (+0,16 %), GOOGL 359,68 $ (+0,53 %)</strong> leicht im Plus, während <strong>AAPL 291,13 $ (−1,52 %), AMZN 238,55 $ (−1,23 %)</strong> abgaben.<sup>[5]</sup> Der rote Faden bleibt: Beide Stützen der Rally sind dünn. <strong>(1)</strong> Der Iran-Deal ist <em>weiter ein Entwurf</em> — ein 14-Punkte-Text zirkuliert (Öl-Sanktionen runter, Hormus offen in 30 Tagen), aber unterschrieben ist nichts.<sup>[8]</sup> <strong>(2)</strong> Genau dieser Öl-Optimismus crasht den Preis: <strong>Brent ~87,33 $ (Tag −3,37 %), WTI 84,88 $ (−3,23 %)</strong>.<sup>[7]</sup> Gold gibt nach — <strong>~4.211 $ (Fr-Schluss), Monat −10,9 %</strong> — weil die Krisen-Prämie schmilzt.<sup>[6]</sup> Krypto erholt sich live weiter: <strong>BTC ~64.300 $ (24h +1 %, 7d +5,8 %), ETH ~1.675 $</strong>, und nach 13 Tagen Abfluss drehten die Spot-BTC-ETFs am Freitag erstmals <strong>positiv (+85,85 Mio. $, IBIT +57,7 Mio. $)</strong>.<sup>[10][11]</sup> Am <strong>Di–Mi entscheidet der FOMC</strong>, ob ein Hawkish-Bias-Shift die Stimmung kippt — alle Empfehlungen unten sind auf diesen datierten Filter ausgerichtet.</p>\n    <ul>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>Der FOMC (16.–17.06.) ist jetzt der einzige Termin, der zählt</strong>: Eine Zinssenkung ist faktisch vom Tisch; das Risiko ist ein <em>Hawkish-Bias-Shift</em> im Ton. Die Risk-on-Rally hängt daran, dass die Fed den schmelzenden Öl-Preis als Disinflations-Signal liest — nicht die Geopolitik-Unsicherheit als Grund für mehr Härte. Das filtert jede Position diese Woche.</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>Mag-7 schlossen gemischt — kein einheitliches Risk-on</strong>: TSLA +1,82 %, GOOGL +0,53 %, NVDA +0,16 %, MSFT +0,10 % im Plus; AAPL −1,52 %, AMZN −1,23 %, META −0,26 % im Minus. Die Stärke war selektiv, nicht breit — ein leiser Hinweis, dass die Stimmung schon vor dem FOMC vorsichtig wird. GOOGL bleibt der robusteste Akkumulations-Kandidat. (Yahoo Finance, 12.06.)</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent ~87,33 $ — Crash setzt sich fort (−3,4 % am Tag)</strong>: Ein 14-Punkte-Iran-Entwurf (Öl-Sanktionen runter, Hormus-Wiedereröffnung in 30 Tagen) pulverisiert die Angst-Prämie weiter; Brent liegt ~20 % unter dem 2026-Hoch. Markt-positiv über den Umweg: Billiges Öl drückt genau die Energie-Komponente, die den Mai-CPI trieb. (oilprice.com / Gulf News, 12.06.)</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gibt nach — ~4.211 $ (Fr-Schluss), Monat −10,9 %</strong>: Die Iran-Entspannung schmilzt die Krisen-Prämie, der sichere Hafen verliert kurzfristig sein Argument. Aber: strukturelle Zentralbank-Nachfrage intakt, und ein hawkisher FOMC könnte die Inflations-These zurückbringen. Der Monats-Rücksetzer macht die Versicherung billiger. (Fortune / investing.com, 12.06.)</li>\n      <li><span class=\"chip good\">KRYPTO-CORE</span> <strong>Erholung läuft live — und die ETFs drehen</strong>: BTC ~64.300 $ (24h +1 %, 7d <strong>+5,8 %</strong>, Cap ~1,29 Bio. $, Dominanz ~56 %), ETH ~1.675 $. Der wichtigste Stimmungs-Wandel: Nach 13 Tagen mit ~4,4 Mrd. $ Abfluss zogen die Spot-BTC-ETFs am Freitag erstmals wieder <strong>+85,85 Mio. $</strong> an (IBIT +57,7 Mio. $, kein einziger Fonds mit Abfluss). Ein erster Riss in der ETF-Schwäche — aber ein Tag ist keine Serie. (CoinMarketCap / CoinGecko / news.bitcoin.com, 14.06.)</li>\n      <li><span class=\"chip hot\">KRYPTO-SEKTOREN</span> <strong>Risk-on-Periphere springt: Memecoins +12 %, TAO 274,61 $ (+4,4 %)</strong>: Der gesamte Memecoin-Markt sprang auf ~33,3 Mrd. $ (+12 % am Tag), DOGE ~0,1003 $ (+4,5 %), BONK +10 %; AI-Token Bittensor (TAO) 274,61 $. Reines Risk-on-Beta, kein fundamentaler Boden — in einem Markt, der gerade erst von „Extreme Fear\" hochkommt, das anfälligste Spielgeld. (coingape / WorldCoinIndex, 14.06.)</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.674,60 $ — hinkt BTC hinterher, ETF-Abflüsse halten an</strong>: ETH steht ~66 % unter dem ATH (4.953,73 $, Aug 2025), die ETH-ETFs verloren am Freitag den <em>vierten</em> Tag in Folge (−4,95 Mio. $). Während die BTC-ETFs drehten, bleiben die ETH-Flows negativ — kein Übergewichts-Grund gegen BTC. (CoinMarketCap / news.bitcoin.com, 14.06.)</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday — stocks and commodities are closed over the weekend, so all non-crypto data is <strong>Friday's close (June 12)</strong>; crypto runs live (as of Sunday, June 14). The big question now is no longer the SpaceX debut, but <strong>the FOMC on Tuesday–Wednesday (June 16–17)</strong> — the first meeting under the new Fed chair. Friday's rally was real: <strong>SpaceX (SPCX) closed at 161.11 USD (+19% from the 135-USD IPO price)</strong>, ~75 billion USD raised, largest IPO of all time, and lifted sentiment — <strong>Dow 51,202 (+0.7%), S&amp;P +0.5%, Nasdaq +0.3%</strong>.<sup>[1][3]</sup> But the Magnificent Seven closed <em>mixed</em>: <strong>TSLA 406.43 USD (+1.82%)</strong> leading, <strong>NVDA 205.19 USD (+0.16%), GOOGL 359.68 USD (+0.53%)</strong> slightly higher, while <strong>AAPL 291.13 USD (−1.52%), AMZN 238.55 USD (−1.23%)</strong> gave back gains.<sup>[5]</sup> The red thread remains: both props of the rally are thin. <strong>(1)</strong> The Iran deal is <em>still just a draft</em> — a fourteen-point text circulates (oil sanctions down, Hormuz open in 30 days), but nothing is signed.<sup>[8]</sup> <strong>(2)</strong> This very oil optimism crashes the price: <strong>Brent ~87.33 USD (day −3.37%), WTI 84.88 USD (−3.23%)</strong>.<sup>[7]</sup> Gold is giving way — <strong>~4,211 USD (Friday close), month −10.9%</strong> — because the crisis premium melts.<sup>[6]</sup> Crypto continues to bounce live: <strong>BTC ~64,300 USD (24h +1%, 7d +5.8%), ETH ~1,675 USD</strong>, and after 13 days of outflows, spot-BTC ETFs flipped positive for the first time on Friday — <strong>+85.85 million USD, IBIT +57.7 million USD</strong>.<sup>[10][11]</sup> On <strong>Tues–Wed the FOMC decides</strong> whether a hawkish-bias shift kills the mood — all recommendations below are filtered for this dated trigger.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>The FOMC (June 16–17) is now the only date that matters</strong>: A rate cut is basically off the table; the risk is a <em>hawkish-bias shift</em> in tone. The risk-on rally hangs on whether the Fed reads the collapsing oil price as a disinflation signal — not geopolitical uncertainty as a reason for more tightening. That filters every position this week.</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>Mag-7 closed mixed — no unified risk-on</strong>: TSLA +1.82%, GOOGL +0.53%, NVDA +0.16%, MSFT +0.10% higher; AAPL −1.52%, AMZN −1.23%, META −0.26% lower. The strength was selective, not broad — a quiet hint that sentiment is already cautious before the FOMC. GOOGL remains the most robust accumulation candidate. (Yahoo Finance, June 12)</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent ~87.33 USD — crash continues (−3.4% on the day)</strong>: A fourteen-point Iran draft (oil sanctions down, Hormuz reopening in 30 days) is pulverizing the fear premium further; Brent sits ~20% below the 2026 high. Market-positive via the detour: cheap oil pressures the energy component that drove May's CPI. (oilprice.com / Gulf News, June 12)</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Giving way — ~4,211 USD (Friday close), month −10.9%</strong>: Iran easing melts the crisis premium, the safe haven loses its near-term argument. But: structural central-bank demand intact, and a hawkish FOMC could bring back the inflation thesis. The monthly pullback makes insurance cheaper. (Fortune / investing.com, June 12)</li>\n      <li><span class=\"chip good\">CRYPTO CORE</span> <strong>Recovery is underway — and the ETFs are flipping</strong>: BTC ~64,300 USD (24h +1%, 7d <strong>+5.8%</strong>, cap ~1.29 trillion USD, dominance ~56%), ETH ~1,675 USD. The key mood shift: after 13 days of ~4.4 billion USD in outflows, spot-BTC ETFs drew in <strong>+85.85 million USD</strong> on Friday for the first time (IBIT +57.7 million USD, zero funds with outflows). A first crack in the ETF weakness — but one day is not a trend. (CoinMarketCap / CoinGecko / news.bitcoin.com, June 14)</li>\n      <li><span class=\"chip hot\">CRYPTO SECTORS</span> <strong>Risk-on periphery jumps: Memecoins +12%, TAO 274.61 USD (+4.4%)</strong>: The entire memecoin market jumped to ~33.3 billion USD (+12% on the day), DOGE ~0.1003 USD (+4.5%), BONK +10%; AI token Bittensor (TAO) 274.61 USD. Pure risk-on beta, no fundamental floor — in a market just bouncing from \"Extreme Fear,\" the most speculative corner. (coingape / WorldCoinIndex, June 14)</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1,674.60 USD — lagging BTC, ETF outflows persist</strong>: ETH sits ~66% below ATH (4,953.73 USD, Aug 2025), ETH ETFs lost for the <em>fourth</em> consecutive day on Friday (−4.95 million USD). While BTC ETFs flipped, ETH flows remain negative — no reason to overweight against BTC. (CoinMarketCap / news.bitcoin.com, June 14)</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É domingo — ações e futuros de commodities fecharam para o fim de semana, então tudo que não é cripto é do <strong>fechamento de sexta (12/06)</strong>; cripto está ao vivo (domingo 14/06). A grande pergunta agora não é o debut do SpaceX, mas <strong>o FOMC na terça–quarta (16–17/06)</strong> — a primeira reunião sob o novo presidente do Fed. O rally de sexta foi real: <strong>SpaceX (SPCX) fechou em 161,11 USD (+19% acima do preço IPO de 135 USD)</strong>, ~75 bilhões USD de arrecadação, maior IPO de todos os tempos, e elevou o sentimento — <strong>Dow 51.202 (+0,7%), S&amp;P +0,5%, Nasdaq +0,3%</strong>.<sup>[1][3]</sup> O Mag-7 fechou misto: <strong>TSLA 406,43 USD (+1,82%)</strong> liderando, <strong>NVDA 205,19 USD (+0,16%), GOOGL 359,68 USD (+0,53%)</strong> em alta, enquanto <strong>AAPL 291,13 USD (−1,52%), AMZN 238,55 USD (−1,23%)</strong> cedeu ganhos.<sup>[5]</sup> O fio condutor permanece: ambos os pilares do rally são frágeis. <strong>(1)</strong> O acordo do Irã é <em>ainda um rascunho</em> — um texto de 14 pontos está circulando (sanções de petróleo abaixo, Hormuz aberto em 30 dias), mas nada está assinado.<sup>[8]</sup> <strong>(2)</strong> Justamente este otimismo de petróleo derruba o preço: <strong>Brent ~87,33 USD (dia −3,37%), WTI 84,88 USD (−3,23%)</strong>.<sup>[7]</sup> Ouro recua — <strong>~4.211 USD (fech sexta), mês −10,9%</strong> — porque o prêmio de crise está derretendo.<sup>[6]</sup> Cripto continua se recuperando ao vivo: <strong>BTC ~64.300 USD (24h +1%, 7d +5,8%), ETH ~1.675 USD</strong>, e após 13 dias de saída, ETFs spot-BTC ficaram positivos pela primeira vez sexta — <strong>+85,85 milhões USD, IBIT +57,7 milhões USD</strong>.<sup>[10][11]</sup> Na <strong>terça–quarta o FOMC decide</strong> se uma virada hawkish-bias mata o sentimento — todas as recomendações abaixo estão alinhadas a este filtro datado.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>O FOMC (16–17/06) é agora a única data que importa</strong>: um corte de taxa está essencialmente fora da mesa; o risco é uma <em>virada de viés hawkish</em> no tom. O rally risk-on depende do Fed ler o preço de petróleo desabando como sinal de desinflação — não incerteza geopolítica como razão para mais dureza. Isso filtra todas as posições esta semana.</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>Mag-7 fechou misto — nenhum risk-on unificado</strong>: TSLA +1,82%, GOOGL +0,53%, NVDA +0,16%, MSFT +0,10% no verde; AAPL −1,52%, AMZN −1,23%, META −0,26% no vermelho. A força foi seletiva, não ampla — um sinal silencioso de que o sentimento já está ficando cauteloso antes do FOMC. GOOGL permanece o candidato de acumulação mais robusto. (Yahoo Finance, 12/06)</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~87,33 USD — queda continua (−3,4% no dia)</strong>: um rascunho de 14 pontos do Irã (sanções de petróleo abaixo, reabertura de Hormuz em 30 dias) vaporiza o prêmio de medo ainda mais; Brent senta ~20% abaixo da máxima de 2026. Positivo para o mercado via desvio: petróleo barato pressiona o componente de energia que impulsionou o CPI de maio. (oilprice.com / Gulf News, 12/06)</li>\n      <li><span class=\"chip\">OURO</span> <strong>Cedendo — ~4.211 USD (fech sexta), mês −10,9%</strong>: o alívio do Irã derrete o prêmio de crise, o porto seguro perdendo seu argumento no curto prazo. Mas: demanda estrutural de banco central intacta, e um FOMC hawkish poderia trazer de volta a tese de inflação. O pullback mensal torna o seguro mais barato. (Fortune / investing.com, 12/06)</li>\n      <li><span class=\"chip good\">CRIPTO-NÚCLEO</span> <strong>Recuperação em andamento ao vivo — e os ETFs estão virando</strong>: BTC ~64.300 USD (24h +1%, 7d <strong>+5,8%</strong>, cap ~1,29 trilhões USD, dominância ~56%), ETH ~1.675 USD. A mudança de sentimento mais importante: após 13 dias com ~4,4 bilhões USD de saída, os ETFs spot-BTC viraram positivos pela primeira vez sexta — <strong>+85,85 milhões USD</strong> (IBIT +57,7 milhões USD, nem um fundo com saída). Uma primeira rachadura na fraqueza de ETF — mas um dia não é uma série. (CoinMarketCap / CoinGecko / news.bitcoin.com, 14/06)</li>\n      <li><span class=\"chip hot\">CRIPTO-SETORES</span> <strong>Periferia risk-on saltando: Memecoins +12%, TAO 274,61 USD (+4,4%)</strong>: o mercado inteiro de memecoin saltou para ~33,3 bilhões USD (+12% no dia), DOGE ~0,1003 USD (+4,5%), BONK +10%; token de IA Bittensor (TAO) 274,61 USD. Puro beta risk-on, nenhum piso fundamental — em um mercado apenas emergindo de \"medo extremo\", o canto mais especulativo. (coingape / WorldCoinIndex, 14/06)</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.674,60 USD — fica para trás do BTC, saídas de ETF continuam</strong>: ETH está ~66% abaixo do ATH (4.953,73 USD, ago 2025), ETFs de ETH perderam o <em>quarto</em> dia seguido sexta (−4,95 milhões USD). Enquanto ETFs de BTC viraram, fluxos de ETH permanecem negativos — nenhuma razão para sobrepeso vs. BTC. (CoinMarketCap / news.bitcoin.com, 14/06)</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es domingo — las acciones y los futuros de materias primas cerraron el fin de semana, así que todo lo que no es cripto es del <strong>cierre de viernes (12/06)</strong>; cripto está en vivo (domingo 14/06). La gran pregunta ahora no es el debut de SpaceX, sino <strong>el FOMC en martes–miércoles (16–17/06)</strong> — la primera reunión bajo el nuevo presidente de la Fed. El rally de viernes fue real: <strong>SpaceX (SPCX) cerró en 161,11 USD (+19% por encima del precio IPO de 135 USD)</strong>, ~75 mil millones USD de recaudación, la mayor salida a bolsa de todos los tiempos, y elevó el sentimiento — <strong>Dow 51.202 (+0,7%), S&amp;P +0,5%, Nasdaq +0,3%</strong>.<sup>[1][3]</sup> El Mag-7 cerró mixto: <strong>TSLA 406,43 USD (+1,82%)</strong> liderando, <strong>NVDA 205,19 USD (+0,16%), GOOGL 359,68 USD (+0,53%)</strong> al alza, mientras <strong>AAPL 291,13 USD (−1,52%), AMZN 238,55 USD (−1,23%)</strong> cedió ganancias.<sup>[5]</sup> El hilo conductor permanece: ambos pilares del rally son frágiles. <strong>(1)</strong> El trato de Irán es <em>aún un borrador</em> — un texto de 14 puntos está circulando (sanciones petroleras abajo, Ormuz abierto en 30 días), pero nada está firmado.<sup>[8]</sup> <strong>(2)</strong> Justamente este optimismo petrolero derrumba el precio: <strong>Brent ~87,33 USD (día −3,37%), WTI 84,88 USD (−3,23%)</strong>.<sup>[7]</sup> El oro retrocede — <strong>~4.211 USD (cierre vie), mes −10,9%</strong> — porque la prima de crisis se está derritiendo.<sup>[6]</sup> Cripto continúa recuperándose en vivo: <strong>BTC ~64.300 USD (24h +1%, 7d +5,8%), ETH ~1.675 USD</strong>, y tras 13 días de salidas, los ETF spot-BTC se volvieron positivos por primera vez el viernes — <strong>+85,85 millones USD, IBIT +57,7 millones USD</strong>.<sup>[10][11]</sup> El <strong>martes–miércoles el FOMC decide</strong> si un giro hawkish-bias mata el sentimiento — todas las recomendaciones abajo están alineadas a este filtro fechado.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>El FOMC (16–17/06) es ahora la única fecha que importa</strong>: un corte de tasas está esencialmente fuera de la mesa; el riesgo es un <em>giro de sesgo hawkish</em> en el tono. El rally risk-on depende de que la Fed lea el precio de petróleo desplomándose como señal de desinflación — no incertidumbre geopolítica como razón para más dureza. Eso filtra cada posición esta semana.</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>Mag-7 cerraron mixtos — sin risk-on unificado</strong>: TSLA +1,82%, GOOGL +0,53%, NVDA +0,16%, MSFT +0,10% en verde; AAPL −1,52%, AMZN −1,23%, META −0,26% en rojo. La fortaleza fue selectiva, no amplia — una señal silenciosa de que el sentimiento ya se vuelve cauteloso antes del FOMC. GOOGL sigue siendo el candidato de acumulación más robusto. (Yahoo Finance, 12/06)</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~87,33 USD — la caída continúa (−3,4% en el día)</strong>: un borrador de 14 puntos de Irán (sanciones petroleras abajo, reapertura de Ormuz en 30 días) vaporiza la prima de miedo aún más; Brent se ubica ~20% por debajo del máximo de 2026. Positivo para mercado vía desvío: petróleo barato presiona el componente de energía que impulsó el IPC de mayo. (oilprice.com / Gulf News, 12/06)</li>\n      <li><span class=\"chip\">ORO</span> <strong>Retrocediendo — ~4.211 USD (cierre vie), mes −10,9%</strong>: la relajación del Irán derrite la prima de crisis, el activo seguro perdiendo su argumento a corto plazo. Pero: demanda estructural de banco central intacta, y un FOMC hawkish podría traer de vuelta la tesis de inflación. El retroceso mensual abarata el seguro. (Fortune / investing.com, 12/06)</li>\n      <li><span class=\"chip good\">CRIPTO-NÚCLEO</span> <strong>Recuperación en marcha en vivo — y los ETF se están volteando</strong>: BTC ~64.300 USD (24h +1%, 7d <strong>+5,8%</strong>, cap ~1,29 billones       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Release-Sonntag, eine klare To-do-Liste. Das dringendste Stück ist klein und schnell erledigt: eine aktiv ausgenutzte Lücke in der Chrome-/Edge-Engine ist seit dem 8. Juni gepatcht — Browser neu starten, fertig. Dahinter klingt der Rekord-Patch-Tuesday vom 9. Juni nach, diesmal mit Blick auf On-Prem-Exchange und einen HTTP/2-Denial-of-Service. Auf der erfreulichen Seite ist PostgreSQL 19 in die Beta gegangen, mit eingebauten Graph-Queries. Und der EU-Cyber-Resilience-Act hat am 11. Juni den nächsten Baustein scharf geschaltet.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Chrome/Edge-Zero-Day</strong>: CVE-2026-11645 in der V8-Engine (CVSS 8,8), aktiv ausgenutzt, seit 8.6. gepatcht. Browser updaten und neu starten.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Juni-Patch-Tuesday</strong>: Rekord-Stapel (rund 200 CVEs). Für Admins relevant: On-Prem-Exchange-OWA-XSS (CVE-2026-42897) und der HTTP.sys-„HTTP/2-Bomb\"-DoS (CVE-2026-49160).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (4.6.): Graph-Queries via SQL/PGQ, paralleles Autovacuum, ~2× schnellere FK-Inserts. GA-Ziel Sep/Okt.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU CRA</strong>: Seit 11.6. gelten die Regeln für notifizierte Konformitätsstellen — Mitgliedsstaaten müssen ihre Behörden benennen.</li>\n      <li><span class=\"chip\">Sec</span> <strong>npm/PyPI-Lieferkette</strong>: Shai-Hulud-/„Miasma\"-Welle läuft weiter; u. a. 32 Pakete im <code>@redhat-cloud-services</code>-Scope. Lockfiles prüfen, CI-Tokens rotieren.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Azure Linux 4.0</strong> (Public Preview): Microsofts Container-Host-Distro im neuen Major; GA im 2. Halbjahr 2026 erwartet.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Ubuntu Pastebin</strong> wird Ende Juni abgeschaltet — alte Links in Skripten/Doku jetzt aufräumen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Release-Sonntag, eine klare To-do-Liste. Das dringendste Stück ist klein und schnell erledigt: eine aktiv ausgenutzte Lücke in der Chrome-/Edge-Engine ist seit dem 8. Juni gepatcht — Browser neu starten, fertig. Dahinter klingt der Rekord-Patch-Tuesday vom 9. Juni nach, diesmal mit Blick auf On-Prem-Exchange und einen HTTP/2-Denial-of-Service. Auf der erfreulichen Seite ist PostgreSQL 19 in die Beta gegangen, mit eingebauten Graph-Queries. Und der EU-Cyber-Resilience-Act hat am 11. Juni den nächsten Baustein scharf geschaltet.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Chrome/Edge-Zero-Day</strong>: CVE-2026-11645 in der V8-Engine (CVSS 8,8), aktiv ausgenutzt, seit 8.6. gepatcht. Browser updaten und neu starten.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Juni-Patch-Tuesday</strong>: Rekord-Stapel (rund 200 CVEs). Für Admins relevant: On-Prem-Exchange-OWA-XSS (CVE-2026-42897) und der HTTP.sys-„HTTP/2-Bomb\"-DoS (CVE-2026-49160).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (4.6.): Graph-Queries via SQL/PGQ, paralleles Autovacuum, ~2× schnellere FK-Inserts. GA-Ziel Sep/Okt.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU CRA</strong>: Seit 11.6. gelten die Regeln für notifizierte Konformitätsstellen — Mitgliedsstaaten müssen ihre Behörden benennen.</li>\n      <li><span class=\"chip\">Sec</span> <strong>npm/PyPI-Lieferkette</strong>: Shai-Hulud-/„Miasma\"-Welle läuft weiter; u. a. 32 Pakete im <code>@redhat-cloud-services</code>-Scope. Lockfiles prüfen, CI-Tokens rotieren.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Azure Linux 4.0</strong> (Public Preview): Microsofts Container-Host-Distro im neuen Major; GA im 2. Halbjahr 2026 erwartet.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Ubuntu Pastebin</strong> wird Ende Juni abgeschaltet — alte Links in Skripten/Doku jetzt aufräumen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet release Sunday, a clear to-do list. The most urgent item is small and quickly dispatched: an actively exploited hole in the Chrome/Edge engine has been patched since June 8th — restart your browser, done. Behind it echoes the record-breaking Patch Tuesday from June 9th, this time with a look at on-prem Exchange and an HTTP/2 denial-of-service. On the bright side, PostgreSQL 19 has entered beta with built-in graph queries. And the EU Cyber Resilience Act flipped its next switch on June 11th.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Chrome/Edge Zero-Day</strong>: CVE-2026-11645 in the V8 engine (CVSS 8.8), actively exploited, patched since 6/8. Update your browsers.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>June Patch Tuesday</strong>: Record batch (around 200 CVEs). For admins: on-prem Exchange OWA XSS (CVE-2026-42897) and the HTTP.sys \"HTTP/2 Bomb\" DoS (CVE-2026-49160).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1</strong> (6/4): Graph queries via SQL/PGQ, parallel autovacuum, ~2× faster FK inserts. GA target Sep/Oct.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>EU CRA</strong>: As of 6/11, rules for notified conformity assessment bodies apply — member states must designate their authorities.</li>\n      <li><span class=\"chip\">Sec</span> <strong>npm/PyPI Supply Chain</strong>: Shai-Hulud/\"Miasma\" wave rolls on; including 32 packages in the <code>@redhat-cloud-services</code> scope. Check lockfiles, rotate CI tokens.</li>\n      <li><span class=\"chip good\">Release</span> <strong>Azure Linux 4.0</strong> (Public Preview): Microsoft's container-host distro in a new major; GA expected H2 2026.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Ubuntu Pastebin</strong> shutting down end of June — clean up old links in scripts/docs now.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um domingo tranquilo de lançamentos, uma lista de tarefas clara. O item mais urgente é pequeno e rápido de resolver: uma falha ativamente explorada no mecanismo Chrome/Edge foi corrigida desde 8 de junho — reinicie o navegador, pronto. Atrás dela repercute o Patch Tuesday recorde de 9 de junho, desta vez com uma olhada no Exchange local e um ataque de negação de serviço HTTP/2. Do lado positivo, PostgreSQL 19 entrou em beta com consultas de grafo incorporadas. E a Lei de Resiliência Cibernética da UE ativou seu próximo componente em 11 de junho.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <strong>Chrome/Edge Zero-Day</strong>: CVE-2026-11645 no mecanismo V8 (CVSS 8,8), ativamente explorada, corrigida desde 8/6. Atualize seus navegadores.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Patch Tuesday de junho</strong>: Lote recorde (cerca de 200 CVEs). Para administradores: XSS do OWA do Exchange local (CVE-2026-42897) e o DoS \"HTTP/2 Bomb\" do HTTP.sys (CVE-2026-49160).</li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>PostgreSQL 19 Beta 1</strong> (4/6): Consultas de grafo via SQL/PGQ, autovacuum paralelo, inserções com FK ~2× mais rápidas. Alvo GA set/out.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>CRA da UE</strong>: A partir de 11/6, as regras para organismos notificados de avaliação de conformidade se aplicam — os Estados-membros devem designar suas autoridades.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Cadeia npm/PyPI</strong>: Onda Shai-Hulud/\"Miasma\" continua; incluindo 32 pacotes no escopo <code>@redhat-cloud-services</code>. Verifique os arquivos de bloqueio, gire os tokens de CI.</li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>Azure Linux 4.0</strong> (Pré-visualização Pública): Distribuição de host de contêiner própria da Microsoft em uma nova versão principal; GA esperado em H2 2026.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Ubuntu Pastebin</strong> encerrando no final de junho — limpe os links antigos em scripts/docs agora.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un tranquilo domingo de lanzamientos, una lista de tareas clara. El elemento más urgente es pequeño y rápido de resolver: un agujero explotado activamente en el motor Chrome/Edge ha sido parcheado desde el 8 de junio — reinicia tu navegador, listo. Detrás de él repercute el Patch Tuesday récord del 9 de junio, esta vez con una mirada a Exchange local y un ataque de denegación de servicio HTTP/2. En el lado positivo, PostgreSQL 19 entró en beta con consultas de gráficos incorporadas. Y la Ley de Resiliencia Cibernética de la UE activó su próximo componente el 11 de junio.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <strong>Chrome/Edge Zero-Day</strong>: CVE-2026-11645 en el motor V8 (CVSS 8,8), explotado activamente, parcheado desde 8/6. Actualiza tus navegadores.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Patch Tuesday de junio</strong>: Lote récord (alrededor de 200 CVEs). Para administradores: XSS de OWA de Exchange local (CVE-2026-42897) y el DoS \"HTTP/2 Bomb\" de HTTP.sys (CVE-2026-49160).</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>PostgreSQL 19 Beta 1</strong> (4/6): Consultas de gráficos vía SQL/PGQ, autovacuum paralelo, inserciones con FK ~2× más rápidas. Objetivo GA sep/oct.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>CRA de la UE</strong>: A partir del 11/6, las normas para organismos notificados de evaluación de la conformidad se aplican — los Estados miembros deben designar sus autoridades.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Cadena npm/PyPI</strong>: Onda Shai-Hulud/\"Miasma\" continúa; incluyendo 32 paquetes en el ámbito <code>@redhat-cloud-services</code>. Verifica los archivos de bloqueo, gira los tokens de CI.</li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>Azure Linux 4.0</strong> (Vista Previa Pública): Distribución de host de contenedor propia de Microsoft en una nueva versión principal; GA esperado en H2 2026.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Ubuntu Pastebin</strong> cerrando a finales de junio — limpia los enlaces antiguos en scripts/docs ahora.</li>\n    </ul></div>"
