<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  /* Loading */
  .loading {

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --cat-accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); }

  .cat[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    margin: 0;
    border-radius: 0;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>

        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">

        <button class="status-btn lang-trigger" id="lang-trigger" type="button"

            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>

        </div>

          <span class="dd-dot" aria-hidden="true"></span>

        </ul>

      <button class="status-btn anim-toggle" id="anim-toggle" type="button"

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist der <strong>letzte ruhige Tag</strong> vor dem Zoll: morgen früh, <strong>22.07. um 0:01 Uhr US-Ostküstenzeit</strong> (das ist <strong>01:01 Uhr</strong> in Ribeirão Claro), tritt der US-Zoll von <strong>25 %</strong> in Kraft. Der jüngste ECB-Fix — jetzt der von <strong>Montag, 20.07.</strong> — steht bei <strong>EUR/BRL 5,8322</strong>, nochmal <strong>0,30 % unter</strong> Freitag. Der Real firmt <em>in</em> den Zoll hinein, nicht dagegen. Für Daniel ist das die unangenehme Richtung: <strong>5.000 € bringen heute R$ 29.161</strong> — rund <strong>R$ 88 weniger als Montag</strong> und <strong>R$ 582 unter</strong> dem Monatshoch vom 03.07. Warum der Real hält, ist im Kern die Story von Montag; hier die Änderungen.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8322</strong> (ECB-Referenzfix, Mo 20.07., <strong>−0,30 %</strong> ggü. Fr) — der Dienstags-Fix stand bei Redaktionsschluss noch aus.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Unabhängiger Kreuzkurs-Check:</strong> BCB-PTAX-Schluss 20.07. <strong>5,8074</strong> gegen ECB-Fix <strong>5,8322</strong> — <strong>+0,43 %</strong> bei 0,5 % Schwelle, erklärt durch ~4 h Stichzeit-Abstand (der Real festigte über den Montag). Zwei getrennt erhobene Datensätze, keine Rückrechnung.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>25-%-Zoll (US Section 301) ab morgen 22.07., 0:01 ET</strong> — Übergang für rollende Ware bis 29.07.; <strong>Kaffee, Rind, Orangensaft, Pharma-Vorprodukte, Zivilluftfahrt</strong> u. a. ausgenommen.</li>\n      <li><span class=\"chip\">BR</span> <strong>Mögliche Verschärfung:</strong> laut CNN könnte eine separate Untersuchung weitere <strong>12,5 %</strong> bringen — Gesamtlast dann <strong>37,5 %</strong>. Bislang nur über Nachrichten-Zusammenfassung belegt, <em>nicht</em> primär bestätigt.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Bren         "en": "<div class=\"tldr\"><p class=\"lead\">Today is the <strong>last quiet day</strong> before the tariff: tomorrow morning, <strong>Jul 22 at 12:01 a.m. US Eastern Time</strong> (that's <strong>1:01 a.m.</strong> in Ribeirão Claro), the US tariff of <strong>25%</strong> takes effect. The latest ECB fix — now <strong>Monday's, Jul 20</strong> — stands at <strong>EUR/BRL 5.8322</strong>, another <strong>0.30% below</strong> Friday. The real is firming <em>into</em> the tariff, not against it. For Daniel that's the uncomfortable direction: <strong>€5,000 gets you R$29,161</strong> today — about <strong>R$88 less than Monday</strong> and <strong>R$582 below</strong> the monthly high from Jul 3. Why the real is holding is essentially Monday's story; here's what's changed.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8322</strong> (ECB reference fix, Mon Jul 20, <strong>−0.30%</strong> vs. Fri) — Tuesday's fix wasn't out yet at press time.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Independent cross-rate check:</strong> BCB PTAX close Jul 20 <strong>5.8074</strong> vs. ECB fix <strong>5.8322</strong> — <strong>+0.43%</strong> against the 0.5% threshold, explained by the ~4-hour gap in sampling time (the real kept firming through Monday). Two separately collected datasets, no back-calculation.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>25% tariff (US Section 301) from tomorrow, Jul 22, 12:01 a.m. ET</strong> — a transition window for goods already in transit runs through Jul 29; <strong>coffee, beef, orange juice, pharmaceutical inputs, civil aviation</strong>, and others are exempt.</li>\n      <li><span class=\"chip\">BR</span> <strong>Possible escalation:</strong> according to CNN, a separate investigation could add another <strong>12.5%</strong> — bringing the total burden to <strong>37.5%</strong>. So far only sourced through a news summary, <em>not</em> primarily confirmed.</li>\n      <li><         "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o <strong>último dia tranquilo</strong> antes da tarifa: amanhã de madrugada, <strong>22/07, às 0h01 no horário da costa leste dos EUA</strong> (ou seja, <strong>1h01</strong> em Ribeirão Claro), entra em vigor a tarifa americana de <strong>25%</strong>. O fixing mais recente do BCE — agora o de <strong>segunda-feira, 20/07</strong> — está em <strong>EUR/BRL 5,8322</strong>, mais <strong>0,30% abaixo</strong> de sexta-feira. O real segue se fortalecendo <em>rumo</em> à tarifa, não contra ela. Para Daniel, essa é a direção desconfortável: <strong>5.000 € rendem hoje R$ 29.161</strong> — cerca de <strong>R$ 88 a menos</strong> que na segunda-feira e <strong>R$ 582 abaixo</strong> da máxima do mês, de 03/07. Por que o real se sustenta é, no fundo, a história de segunda-feira; aqui ficam as mudanças.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8322</strong> (fixing de referência do BCE, seg. 20/07, <strong>−0,30%</strong> em relação a sex.) — o fixing de terça-feira ainda não havia saído no fechamento desta edição.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificação cruzada independente:</strong> fechamento do PTAX do BCB em 20/07, <strong>5,8074</strong>, contra o fixing do BCE de <strong>5,8322</strong> — <strong>+0,43%</strong>, dentro do limite de 0,5%, explicado por uma diferença de ~4h no horário de apuração (o real se fortaleceu ao longo de segunda-feira). Dois conjuntos de dados apurados separadamente, sem cálculo circular.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tarifa de 25% (Seção 301 dos EUA) a partir de amanhã, 22/07, 0h01 ET</strong> — janela de transição para cargas já em trânsito até 29/07; <strong>café, carne bovina, suco de laranja, insumos farmacêuticos, aviação civil</strong>, entre outros, estão isentos.</li>\n      <li><span class=\"chip\">BR</span> <strong>Possível agravamento:</strong> segundo a CNN, uma investigação separada poderia trazer mais <strong>12,5%</strong> — a carga total seria então de <strong>37,5%</strong>. Isso ainda só está documentado por resumos de notícias, <em>não</em> confirmado na fonte primária.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent a US$ 88,42</strong> (−0,90%, 21/07) — <em>abaixo</em> dos US$ 90,29 de segunda-feira. O vento a favor do petróleo para o real começa a perder força, ainda que a situação em Ormuz continue tensa.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY em 100,94</strong> (21/07, −0,04% no dia) — praticamente estável ante a segunda-feira (~101), mas ainda fraco. Esse é o principal suporte do real.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE qui. 23/07, 13h45 CET</strong> — \"nenhuma mudança\" é o consenso (~88–90% implícito de mercado). Depósito em 2,25% após a alta com vigência em 17/06. O <em>tom</em> na coletiva de Lagarde mexe com o lado do euro.</li>\n      <li><span class=\"chip\">EUA</span> <strong>FOMC em 28–29/07</strong>, o Fed mantém a taxa em 3,50–3,75% desde 17/06. O carry contra a Selic (14,25%) segue em <strong>cerca de 10,5 p.p.</strong></li>\n      <li><span class=\"chip\">BR</span> <strong>Focus (13/07):</strong> IPCA 2026 em <strong>5,16%</strong>, Selic de fim de ano em <strong>14,00%</strong>, USD/BRL de fim de ano em <strong>R$ 5,20</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Nenhum sinal de estresse:</strong> CDS de 5 anos em cerca de <strong>124,6 bp</strong> (último dado com data confiável, 17/07). O ponto sensível continua sendo o fiscal.</li>\n      <li><span class=\"chip\">Atenção</span> As probabilidades de projeção abaixo são <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Montag war ein Warten mit den Füßen. Die Indizes gaben leicht nach — der Dow <strong>0,59 %</strong>, der Nasdaq praktisch gar nicht (<strong>−0,05 %</strong>) —, aber unter der Oberfläche schichtete der Markt um: <strong>Apple</strong> schloss bei <strong>326,59 $</strong>, keine zweieinhalb Prozent unter seinem 52-Wochen-Hoch, während <strong>Tesla</strong> bei <strong>369,57 $</strong> am unteren Ende seiner Tagesspanne aus dem Handel ging — zwei Tage bevor es selbst Zahlen vorlegt. Der Volatilitätsindex VIX stieg auf <strong>18,65</strong>. So sieht ein Markt aus, der sich vor einem binären Ereignis in die größten, sichersten Namen zurückzieht. Das Ereignis ist der <strong>Mittwoch</strong>: Alphabet und Tesla berichten nach US-Börsenschluss, und Alphabets Aussage zu den KI-Investitionsbudgets ist das eine Signal, auf das die ganze vergangene Halbleiter-Woche gewartet hat. Öl kühlt derweil vom 90-Dollar-Wochenende ab, Krypto läuft die zweite grüne Woche. Aber die Entscheidung fällt in <strong>zwei Tagen</strong> — und deshalb lauten fünf von sechs Urteilen in diesem Brief: Halten.</p>\n    <ul>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>Mi 22.07.: Alphabet und Tesla berichten nach US-Börsenschluss</strong> (ab ca. 22:00 MESZ / 17:00 BRT). Alphabets <strong>KI-Capex-Guidance</strong> ist die erste harte Antwort auf die Frage, die die Halbleiter der Vorwoche abverkauft hat: Halten die Rechenzentrums-Budgets?</li>\n      <li><span class=\"chip\">AKTIEN</span> <strong>S&amp;P 500 7.443,28 (−0,19 %), Nasdaq 25.508,07 (−0,05 %), Dow 51.839,26 (−0,59 %, −307 Punkte)</strong> — Stand <strong>Montagsschluss 20.07., 16:00 EDT</strong>, nicht live. VIX <strong>18,65</strong> (von 16,50 fünf Sitzungen zuvor).</li>\n      <li><span class=\"chip hot\">ROTATION</span> <strong>Apple 326,59 $</strong> (Tageshoch 333,71, 52-Wochen-Hoch 334,99) gegen <strong>Tesla 369,57 $</strong> am Tagestief (Spanne 369,43–386,49). Geld sammelt sich in den größten Bilanzen und flieht aus den beiden Werten, die Mittwoch berichten.</li>\n      <li><span class=\"chip hot\">ÖL LIVE</span> <strong>Brent 88,49 $, WTI 82,10 $</strong> — live <strong>21.07., 04:57 UTC</strong> (01:57 BRT). Zurück vom ~90-$-Wochenendhoch, nachdem Irans Außenamt einen diplomatischen Weg andeutete. Auf Wochensicht (ab 16.07.) trotzdem noch <strong>+5 %</strong>.</li>\n      <li><span class=\"chip good\">GOLD LIVE</span> <strong>4.053,60 $/Unze (Future), Spot 4.048 $</strong> — live 21.07., 04:59 UTC. <strong>+1 %</strong> am Tag, zurück über 4.000, aber weiter nahe dem tiefsten Stand seit neun Monaten.</li>\n      <li><span class=\"chip good\">KRYPTO LIVE</span> <strong>BTC 65.485 $ (24 h +2,0 %, 7 d +4,5 %), ETH 1.922 $ (7 d +7,8 %, 30 d +11 %)</strong> — live 21.07., 05:11 UTC, zwei Quellen auf 0,02 % deckungsgleich. Zweite grüne Woche in Folge, ETH schlägt BTC.</li>\n      <li><span class=\"chip\">ETF</span> <strong>BTC-Spot-ETFs: zweite Zuflusswoche in Folge (+75,7 Mio. $)</strong>, getragen vom Freitag (+132,3 Mio., BlackRock). Kontext: Juni <strong>−4,5 Mrd. $</strong> (schlechtester Monat seit ETF-Start), 2026 YTD <strong>−5,2 Mrd. $</strong>. Erholung real, aber winzig.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>24 h grün im Sog des Bounces: BONK +11,3 %, VIRTUAL +8,4 %, NEAR +6,6 %.</strong> Aber nur 24-Stunden-Werte — kein 7-Tage-Bild in diesem Lauf. Kein Trendsignal, nur Handelstiefe.</li>\n      <li><span class=\"chip hot\">URTEIL</span> <strong>Fünf von sechs Calls: HOLD.</strong> Der Grund ist der Mittwoch. Ein Verkauf oder eine Umschichtung heute ist genau zwei Tage zu früh. Bei den Krypto-Sektoren gilt: den grünen Tag zum Abbau nutzen, nicht zum Einstieg.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Monday was a waiting game played out with your feet. The indexes eased back only slightly — the Dow <strong>0.59%</strong>, the Nasdaq practically flat (<strong>−0.05%</strong>) — but beneath the surface, the market was rotating: <strong>Apple</strong> closed at <strong>$326.59</strong>, less than two and a half percent below its 52-week high, while <strong>Tesla</strong> closed at <strong>$369.57</strong>, at the low end of its daily range — two days before it reports its own earnings. The volatility index VIX rose to <strong>18.65</strong>. That's what a market looks like when it retreats into the biggest, safest names ahead of a binary event. The event is <strong>Wednesday</strong>: Alphabet and Tesla report after the US close, and Alphabet's statement on AI capital spending is the one signal the entire semiconductor sell-off of the past week has been waiting for. Oil, meanwhile, is cooling off from the $90 weekend, and crypto is running its second green week. But the decision lands in <strong>two days</strong> — which is why five of the six calls in this brief read: Hold.</p>\n    <ul>\n      <li><span class=\"chip hot\">DATE</span> <strong>Wed Jul 22: Alphabet and Tesla report after the US close</strong> (starting around 22:00 CEST / 17:00 BRT). Alphabet's <strong>AI capex guidance</strong> is the first hard answer to the question that sold off semiconductors the week before: are the data-center budgets holding?</li>\n      <li><span class=\"chip\">STOCKS</span> <strong>S&amp;P 500 7,443.28 (−0.19%), Nasdaq 25,508.07 (−0.05%), Dow 51,839.26 (−0.59%, −307 points)</strong> — as of: <strong>Monday's close, Jul 20, 4:00 p.m. EDT</strong>, not live. VIX <strong>18.65</strong> (up from 16.50 five sessions earlier).</li>\n      <li><span class=\"chip hot\">ROTATION</span> <strong>Apple $326.59</strong> (day high $333.71, 52-week high $334.99) versus <strong>Tesla $369.57</strong> at its daily low (range $369.43–386.49). Money is piling into the biggest balance sheets and fleeing the two names reporting on Wednesday.</li>\n      <li><span class=\"chip hot\">OIL LIVE</span> <strong>Brent $88.49, WTI $82.10</strong> — live <strong>Jul 21, 04:57 UTC</strong> (01:57 BRT). Back from the roughly $90 weekend high after Iran's foreign ministry hinted at a diplomatic path. Still up around <strong>+5%</strong> for the week (from Jul 16).</li>\n      <li><span class=\"chip good\">GOLD LIVE</span> <strong>$4,053.60/oz (future), spot $4,048</strong> — live Jul 21, 04:59 UTC. <strong>+1%</strong> on the day, back above $4,000, but still near its lowest level in nine months.</li>\n      <li><span class=\"chip good\">CRYPTO LIVE</span> <strong>BTC $65,485 (24h +2.0%, 7d +4.5%), ETH $1,922 (7d +7.8%, 30d +11%)</strong> — live Jul 21, 05:11 UTC, two sources agreeing within 0.02%. Second straight green week, with ETH beating BTC.</li>\n      <li><span class=\"chip\">ETF</span> <strong>BTC spot ETFs: second straight week of inflows (+$75.7 million)</strong>, driven by Friday (+$132.3 million, BlackRock). Context: June <strong>−$4.5 billion</strong> (worst month since the ETFs launched), 2026 YTD <strong>−$5.2 billion</strong>. The recovery is real but tiny.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>24h green, riding the bounce: BONK +11.3%, VIRTUAL +8.4%, NEAR +6.6%.</strong> But that's only 24-hour figures — no 7-day picture in this run. No trend signal, just thin trading depth.</li>\n      <li><span class=\"chip hot\">VERDICT</span> <strong>Five of six calls: HOLD.</strong> The reason is Wednesday. Selling or rotating today is exactly two days too early. For the crypto sectors: use the green day to trim, not to buy in.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A segunda-feira foi uma espera parada no lugar. Os índices recuaram pouco — o Dow 0,59%, o Nasdaq praticamente nada (−0,05%) —, mas por baixo da superfície o mercado se reorganizou: a <strong>Apple</strong> fechou a <strong>326,59 $</strong>, a menos de dois pontos e meio percentuais da sua máxima de 52 semanas, enquanto a <strong>Tesla</strong>, a <strong>369,57 $</strong>, encerrou o pregão na ponta inferior de sua faixa diária — dois dias antes de divulgar seus próprios resultados. O índice de volatilidade VIX subiu para <strong>18,65</strong>. É assim que se parece um mercado que se recolhe para os nomes maiores e mais seguros antes de um evento binário. O evento é a <strong>quarta-feira</strong>: Alphabet e Tesla divulgam resultados após o fechamento do pregão americano, e a declaração da Alphabet sobre os orçamentos de investimento em IA é o único sinal que toda a semana ruim dos semicondutores esperava. O petróleo, por sua vez, esfria depois do fim de semana a 90 dólares, e a cripto atravessa a segunda semana seguida no verde. Mas a decisão se resolve em <strong>dois dias</strong> — e por isso cinco dos seis vereditos desta edição são: manter.</p>\n    <ul>\n      <li><span class=\"chip hot\">AGENDA</span> <strong>Qua 22/07: Alphabet e Tesla divulgam resultados após o fechamento do pregão americano</strong> (a partir de cerca de 22h00 horário de Berlim / 17h00 BRT). A <strong>orientação de capex em IA</strong> da Alphabet é a primeira resposta dura à pergunta que derrubou os semicondutores na semana passada: os orçamentos de data center se sustentam?</li>\n      <li><span class=\"chip\">AÇÕES</span> <strong>S&amp;P 500 7.443,28 (−0,19%), Nasdaq 25.508,07 (−0,05%), Dow 51.839,26 (−0,59%, −307 pontos)</strong> — dado de: <strong>fechamento de segunda, 20/07, 16h00 EDT</strong>, não ao vivo. VIX <strong>18,65</strong> (ante 16,50 cinco pregões antes).</li>\n      <li><span class=\"chip hot\">ROTAÇÃO</span> <strong>Apple 326,59 $</strong> (máxima do dia 333,71, máxima de 52 semanas 334,99) contra <strong>Tesla 369,57 $</strong> na mínima do dia (faixa 369,43–386,49). O dinheiro se concentra nos maiores balanços e foge dos dois papéis que divulgam resultados na quarta-feira.</li>\n      <li><span class=\"chip hot\">PETRÓLEO AO VIVO</span> <strong>Brent 88,49 $, WTI 82,10 $</strong> — ao vivo <strong>21/07, 04h57 UTC</strong> (01h57 BRT). Recuo frente à máxima de fim de semana de ~90 $, depois de o Ministério das Relações Exteriores do Irã sinalizar uma via diplomática. Na comparação semanal (desde 16/07), ainda assim, <strong>+5%</strong>.</li>\n      <li><span class=\"chip good\">OURO AO VIVO</span> <strong>4.053,60 $/onça (futuro), à vista 4.048 $</strong> — ao vivo 21/07, 04h59 UTC. <strong>+1%</strong> no dia, de volta acima de 4.000, mas ainda perto da mínima em nove meses.</li>\n      <li><span class=\"chip good\">CRIPTO AO VIVO</span> <strong>BTC 65.485 $ (24h +2,0%, 7d +4,5%), ETH 1.922 $ (7d +7,8%, 30d +11%)</strong> — ao vivo 21/07, 05h11 UTC, duas fontes convergindo com 0,02% de diferença. Segunda semana seguida no verde, com o ETH batendo o BTC.</li>\n      <li><span class=\"chip\">ETF</span> <strong>ETFs spot de BTC: segunda semana seguida de entradas (+75,7 mi $)</strong>, sustentada pela sexta-feira (+132,3 mi $, BlackRock). Contexto: junho <strong>−4,5 bi $</strong> (pior mês desde o início dos ETFs), acumulado de 2026 <strong>−5,2 bi $</strong>. Recuperação real, mas minúscula.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>24h no verde na esteira do repique: BONK +11,3%, VIRTUAL +8,4%, NEAR +6,6%.</strong> Mas são só valores de 24 horas — sem retrato de sete dias nesta rodada. Não é sinal de tendência, só profundidade de negociação.</li>\n      <li><span class=\"chip hot\">VEREDITO</span> <strong>Cinco dos seis calls: HOLD.</strong> O motivo é a quarta-feira. Vender ou reorganizar a carteira hoje é exatamente dois dias cedo demais. Nos setores cripto vale a regra: usar o dia no verde para reduzir posição, não para entrar.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El lunes fue una espera jugada con los pies. Los índices cedieron poco — el Dow <strong>0,59 %</strong>, el Nasdaq prácticamente nada (<strong>−0,05 %</strong>) —, pero bajo la superficie el mercado se reacomodó: <strong>Apple</strong> cerró en <strong>326,59 $</strong>, a menos de dos y medio por ciento de su máximo de 52 semanas, mientras que <strong>Tesla</strong>, en <strong>369,57 $</strong>, terminó la sesión en el extremo inferior de su rango diario — dos días antes de presentar sus propios resultados. El índice de volatilidad VIX subió a <strong>18,65</strong>. Así luce un mercado que, antes de un evento binario, se repliega hacia los nombres más grandes y seguros. Ese evento es el <strong>miércoles</strong>: Alphabet y Tesla reportan después del cierre de la bolsa de EU, y la postura de Alphabet sobre el presupuesto de inversión en IA es la única señal que ha esperado toda la semana de semiconductores. El petróleo, mientras tanto, se enfría tras el fin de semana de 90 dólares, y las criptomonedas transitan su segunda semana consecutiva en verde. Pero la decisión se juega en <strong>dos días</strong> — y por eso cinco de los seis veredictos de este boletín son: mantener.</p>\n    <ul>\n      <li><span class=\"chip hot\">FECHA</span> <strong>Mié 22/07: Alphabet y Tesla reportan después del cierre de la bolsa de EU</strong> (desde aprox. 22:00 CEST / 17:00 hora de Brasilia). La guía de capex en IA de Alphabet es la primera respuesta contundente a la pregunta que provocó la liquidación de semiconductores la semana pasada: ¿se sostienen los presupuestos de los centros de datos?</li>\n      <li><span class=\"chip\">ÍNDICES</span> <strong>S&amp;P 500 7.443,28 (−0,19 %), Nasdaq 25.508,07 (−0,05 %), Dow 51.839,26 (−0,59 %, −307 puntos)</strong> — dato: cierre del lunes 20/07, 16:00 EDT, no en vivo. VIX <strong>18,65</strong> (desde 16,50 cinco sesiones antes).</li>\n      <li><span class=\"chip hot\">ROTACIÓN</span> <strong>Apple 326,59 $</strong> (máximo del día 333,71, máximo de 52 semanas 334,99) frente a <strong>Tesla 369,57 $</strong> en el mínimo del día (rango 369,43–386,49). El dinero se concentra en los balances más grandes y huye de los dos valores que reportan el miércoles.</li>\n      <li><span class=\"chip hot\">PETRÓLEO EN VIVO</span> <strong>Brent 88,49 $, WTI 82,10 $</strong> — en vivo 21/07, 04:57 UTC (01:57 hora de Brasilia). Retrocede desde el máximo de fin de semana de ~90 $, después de que el Ministerio de Relaciones Exteriores de Irán insinuara una vía diplomática. Aun así, en la semana (desde el 16/07) mantiene un alza de <strong>+5 %</strong>.</li>\n      <li><span class=\"chip good\">ORO EN VIVO</span> <strong>4.053,60 $/onza (futuro), spot 4.048 $</strong> — en vivo 21/07, 04:59 UTC. <strong>+1 %</strong> en el día, de vuelta por encima de 4.000, pero aún cerca de su nivel más bajo en nueve meses.</li>\n      <li><span class=\"chip good\">CRIPTO EN VIVO</span> <strong>BTC 65.485 $ (24 h +2,0 %, 7 d +4,5 %), ETH 1.922 $ (7 d +7,8 %, 30 d +11 %)</strong> — en vivo 21/07, 05:11 UTC, dos fuentes con una coincidencia del 0,02 %. Segunda semana consecutiva en verde, ETH supera a BTC.</li>\n      <li><span class=\"chip\">ETF</span> <strong>ETF spot de BTC: segunda semana consecutiva de entradas (+75,7 millones $)</strong>, impulsada por el viernes (+132,3 millones, BlackRock). Contexto: junio <strong>−4,5 mil millones $</strong> (peor mes desde el inicio de los ETF), 2026 en lo que va del año <strong>−5,2 mil millones $</strong>. La recuperación es real, pero diminuta.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>24 horas en verde, arrastrados por el rebote: BONK +11,3 %, VIRTUAL +8,4 %, NEAR +6,6 %.</strong> Pero son solo cifras de 24 horas — sin panorama de 7 días en este corte. No es una señal de tendencia, solo profundidad de mercado.</li>\n      <li><span class=\"chip hot\">VEREDICTO</span> <strong>Cinco de seis recomendaciones: HOLD.</strong> La razón es el miércoles. Vender o rotar hoy es exactamente dos días demasiado pronto. En los sectores cripto aplica: usar el día verde para reducir, no para entrar.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei npm-Kompromittierungen in vier Tagen, ein SharePoint-Zero-Day mit abgelaufener Bundes-Frist und ein 16 Jahre alter KVM-Bug, mit dem ein Gast zum Host ausbricht — der Nicht-KI-Software-Tag dreht sich fast komplett um Lieferkette und aktive Ausnutzung. Die gute Nachricht steckt mittendrin: npm v12 schaltet endlich die Install-Scripts standardmäßig ab.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>npm-Lieferkette, zweimal</strong>: die AsyncAPI-Org wird kompromittiert (Payload feuert beim <em>import</em>, umgeht <code>--ignore-scripts</code>) — Tage nach dem Jscrambler-Hack. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint-Zero-Day</strong> CVE-2026-58644 (CVSS 9,8) in der CISA-KEV, aktiv ausgenutzt; die Bundes-Frist lief am 19.07. ab. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Linux-KVM „Januscape\"</strong> (CVE-2026-53359): Gast bricht zum Host aus, Bug steckt seit 2010 im Code; Stable-Kernel seit 04.07. gepatcht.</li>\n      <li><span class=\"chip good\">Release</span> <strong>npm v12</strong> schaltet Install-Scripts standardmäßig <em>aus</em> — direkte Antwort auf die Lieferketten-Welle. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Release</span> <strong>PostgreSQL 19 Beta 2</strong>: <code>REPACK</code> statt <code>VACUUM FULL</code>, Graph-Queries (SQL/PGQ), temporale <code>UPDATE/DELETE</code>. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Notfall-Patches</strong>: Firefox 152.0.6 + Chrome 150 — für die Firefox-Lücke ist Exploit-Code öffentlich. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>11 vergessene UEFI-Shims</strong> hebeln Secure Boot seit über zehn Jahren aus (ESET); Widerruf über den Juni-Patchday.</li>\n      <li><span class=\"chip\">Release</span> <strong>Oracle Quartals-CPU</strong> heute erwartet (Kadenz) — laut Vorab-Roundups ~20 neue Java-SE-Fixes; die Oracle-Seite war blockiert. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub</strong> fiel zweimal teilweise aus (Actions 13.07., REST-API 16.07.) — interne Config-Regressionen.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU-Kommission</strong> entscheidet am 27.07. final über Googles DMA-Compliance. <span class=\"chip\">EU</span></li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei npm-Kompromittierungen in vier Tagen, ein SharePoint-Zero-Day mit abgelaufener Bundes-Frist und ein 16 Jahre alter KVM-Bug, mit dem ein Gast zum Host ausbricht — der Nicht-KI-Software-Tag dreht sich fast komplett um Lieferkette und aktive Ausnutzung. Die gute Nachricht steckt mittendrin: npm v12 schaltet endlich die Install-Scripts standardmäßig ab.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>npm-Lieferkette, zweimal</strong>: die AsyncAPI-Org wird kompromittiert (Payload feuert beim <em>import</em>, umgeht <code>--ignore-scripts</code>) — Tage nach dem Jscrambler-Hack. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint-Zero-Day</strong> CVE-2026-58644 (CVSS 9,8) in der CISA-KEV, aktiv ausgenutzt; die Bundes-Frist lief am 19.07. ab. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Linux-KVM „Januscape\"</strong> (CVE-2026-53359): Gast bricht zum Host aus, Bug steckt seit 2010 im Code; Stable-Kernel seit 04.07. gepatcht.</li>\n      <li><span class=\"chip good\">Release</span> <strong>npm v12</strong> schaltet Install-Scripts standardmäßig <em>aus</em> — direkte Antwort auf die Lieferketten-Welle. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Release</span> <strong>PostgreSQL 19 Beta 2</strong>: <code>REPACK</code> statt <code>VACUUM FULL</code>, Graph-Queries (SQL/PGQ), temporale <code>UPDATE/DELETE</code>. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Notfall-Patches</strong>: Firefox 152.0.6 + Chrome 150 — für die Firefox-Lücke ist Exploit-Code öffentlich. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>11 vergessene UEFI-Shims</strong> hebeln Secure Boot seit über zehn Jahren aus (ESET); Widerruf über den Juni-Patchday.</li>\n      <li><span class=\"chip\">Release</span> <strong>Oracle Quartals-CPU</strong> heute erwartet (Kadenz) — laut Vorab-Roundups ~20 neue Java-SE-Fixes; die Oracle-Seite war blockiert. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub</strong> fiel zweimal teilweise aus (Actions 13.07., REST-API 16.07.) — interne Config-Regressionen.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU-Kommission</strong> entscheidet am 27.07. final über Googles DMA-Compliance. <span class=\"chip\">EU</span></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two npm compromises in four days, a SharePoint zero-day with an expired federal deadline, and a 16-year-old KVM bug that lets a guest escape to the host — today's non-AI software news is almost entirely about the supply chain and active exploitation. The good news is buried in the middle: npm v12 finally turns off install scripts by default.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>npm supply chain, twice</strong>: the AsyncAPI org gets compromised (payload fires at <em>import</em>, bypassing <code>--ignore-scripts</code>) — days after the Jscrambler hack. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint zero-day</strong> CVE-2026-58644 (CVSS 9.8) in the CISA KEV, actively exploited; the federal deadline expired on 19.07. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Linux KVM \"Januscape\"</strong> (CVE-2026-53359): guest escapes to host, the bug has been in the code since 2010; stable kernel patched since 04.07.</li>\n      <li><span class=\"chip good\">Release</span> <strong>npm v12</strong> turns install scripts <em>off</em> by default — a direct response to the supply-chain wave. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Release</span> <strong>PostgreSQL 19 Beta 2</strong>: <code>REPACK</code> instead of <code>VACUUM FULL</code>, graph queries (SQL/PGQ), temporal <code>UPDATE/DELETE</code>. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Emergency patches</strong>: Firefox 152.0.6 + Chrome 150 — exploit code is public for the Firefox flaw. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>11 forgotten UEFI shims</strong> have undermined Secure Boot for over a decade (ESET); revoked via the June patch day.</li>\n      <li><span class=\"chip\">Release</span> <strong>Oracle quarterly CPU</strong> expected today (cadence) — pre-release roundups cite ~20 new Java SE fixes; Oracle's own page was blocked. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub</strong> had two partial outages (Actions 13.07, REST API 16.07) — internal config regressions.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>EU Commission</strong> makes its final ruling on Google's DMA compliance on 27.07. <span class=\"chip\">EU</span></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois comprometimentos do npm em quatro dias, um zero-day no SharePoint com prazo federal vencido e um bug de dezesseis anos no KVM que permite a um convidado escapar para o host — o dia do software não-IA gira quase inteiramente em torno de cadeia de suprimentos e exploração ativa. A boa notícia está no meio: o npm v12 finalmente desativa os scripts de instalação por padrão.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Cadeia de suprimentos do npm, duas vezes</strong>: a organização AsyncAPI é comprometida (payload dispara na importação, contornando <code>--ignore-scripts</code>) — dias após o hack da Jscrambler. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Zero-day no SharePoint</strong> CVE-2026-58644 (CVSS 9,8) no CISA KEV, ativamente explorada; o prazo federal venceu em 19/07. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Linux KVM \"Januscape\"</strong> (CVE-2026-53359): convidado escapa para o host, bug está no código desde 2010; kernel estável corrigido desde 04/07.</li>\n      <li><span class=\"chip good\">Release</span> <strong>npm v12</strong> desativa os scripts de instalação por padrão — resposta direta à onda na cadeia de suprimentos. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Release</span> <strong>PostgreSQL 19 Beta 2</strong>: <code>REPACK</code> em vez de <code>VACUUM FULL</code>, consultas em grafo (SQL/PGQ), <code>UPDATE/DELETE</code> temporal. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Patches de emergência</strong>: Firefox 152.0.6 + Chrome 150 — para a falha do Firefox há código de exploração público. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>11 shims UEFI esquecidos</strong> driblam o Secure Boot há mais de dez anos (ESET); revogação via patch day de junho.</li>\n      <li><span class=\"chip\">Release</span> <strong>CPU trimestral da Oracle</strong> esperada hoje (cadência) — segundo prévias, ~20 novas correções para Java SE; a página da Oracle estava bloqueada. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub</strong> teve duas quedas parciais (Actions 13/07, API REST 16/07) — regressões internas de configuração.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>Comissão Europeia</strong> decide de forma final em 27/07 sobre a conformidade do Google com o DMA. <span class=\"chip\">EU</span></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos vulneraciones de npm en cuatro días, un zero-day de SharePoint con un plazo federal vencido y un bug de dieciséis años en KVM que permite a un invitado escapar hacia el host — el día del software no relacionado con IA gira casi por completo en torno a la cadena de suministro y la explotación activa. La buena noticia está en medio: npm v12 por fin desactiva los scripts de instalación por defecto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Cadena de suministro de npm, dos veces</strong>: la organización AsyncAPI es vulnerada (el payload se dispara al hacer <em>import</em>, evitando <code>--ignore-scripts</code>) — días después del hackeo de Jscrambler. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Zero-day de SharePoint</strong> CVE-2026-58644 (CVSS 9,8) en el CISA KEV, explotado activamente; el plazo federal venció el 19/07. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Linux KVM «Januscape»</strong> (CVE-2026-53359): un invitado escapa hacia el host, el bug lleva en el código desde 2010; el kernel estable está parchado desde el 04/07.</li>\n      <li><span class=\"chip good\">Release</span> <strong>npm v12</strong> desactiva los scripts de instalación por defecto — respuesta directa a la ola en la cadena de suministro. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Release</span> <strong>PostgreSQL 19 Beta 2</strong>: <code>REPACK</code> en vez de <code>VACUUM FULL</code>, consultas de grafos (SQL/PGQ), <code>UPDATE/DELETE</code> temporal. <span class=\"chip\">OSS</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Parches de emergencia</strong>: Firefox 152.0.6 + Chrome 150 — para la falla de Firefox hay código de explotación público. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>11 shims UEFI olvidados</strong> burlan Secure Boot desde hace más de diez años (ESET); revocados en el patch day de junio.</li>\n      <li><span class=\"chip\">Release</span> <strong>CPU trimestral de Oracle</strong> esperado hoy (cadencia) — según resúmenes previos, ~20 nuevas correcciones para Java SE; la página de Oracle estaba bloqueada. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub</strong> tuvo dos caídas parciales (Actions 13/07, API REST 16/07) — regresiones internas de configuración.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>Comisión Europea</strong> decide de forma final el 27/07 sobre el cumplimiento de Google con la DMA. <span class=\"chip\">EU</span></li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Nachrichtentag — in den letzten 24 Stunden ist nichts Frisches gelandet. Gestern stand hier die Preis-Seite der Juli-Modellwelle; heute die Fähigkeits-Seite, und die ist deutlich unübersichtlicher. Denn während sich die Preise sauber sortieren lassen, tun die Benchmarks das gerade nicht mehr: SWE-Bench Verified ist an der Spitze so eng zusammengerückt, dass die Rangliste kaum noch trennt, SWE-Bench Pro und LiveCodeBench erzählen widersprüchliche Geschichten, und die eigentliche Bewegung findet ohnehin woanders statt — bei den Open-Weight-Modellen, die still an die geschlossene Spitze heranrücken. Der nützlichste Satz des Tages ist deshalb keine Zahl, sondern eine Warnung.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>SWE-Bench Verified sättigt</strong>: die Spitze klumpt bei ~88 %+; ein Sekundär-Snapshot (Stand 19.07.) nennt Mythos 5 mit 95,5 %, Fable 5 mit 95 %, Opus 4.8 mit 88,6 % — Einzelquelle, auf der Primärseite nicht bestätigt.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Widerspruch im System</strong>: auf dem härteren SWE-Bench Pro liegt Claude weiter klar vorn (Mythos 5 80,3 % vs. GPT-5.6 Sol 64,6 %, Einzelquelle), LiveCodeBench zeigt drei sich widersprechende „aktuelle“ Ranglisten.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 auf Opus-Niveau</strong>: das offene MIT-Modell (~744 Mrd. MoE) erreicht SWE-Bench Pro 62,1 gegen Opus 4.8 ~63 und führt die Open-Weights.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7 Code in Copilot</strong>: seit 01.07. GA — das erste Open-Weight-Modell in GitHub Copilot.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Effort ist ein Regler, kein Schalter</strong>: Anthropic erklärt, dass „Effort“ in Claude Code kein fester Token-Knopf ist, sondern kontinuierliches Verhalten steuert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Copilot-Credit-Zorn</strong>: das nutzungsbasierte Billing (seit 01.06.) zieht weiter Kritik — eine Claude-4.8-Sitzung soll ~16 % des Monats-Kontingents verbrannt haben.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7</strong>: 1000 Tokens/s über Cerebras; Devin macht GLM 5.2, Kimi K2.7 und Sonnet 5 als Modelle wählbar.</li>\n      <li><span class=\"chip\">Quelle</span> <strong>Beleglage</strong>: die Spitzen-Scores von SWE-Bench Verified/Pro stehen auf je einer Quelle; die Grok-4.5-Zahlen sind sekundär (xAI-Seite lieferte 403).</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Nachrichtentag — in den letzten 24 Stunden ist nichts Frisches gelandet. Gestern stand hier die Preis-Seite der Juli-Modellwelle; heute die Fähigkeits-Seite, und die ist deutlich unübersichtlicher. Denn während sich die Preise sauber sortieren lassen, tun die Benchmarks das gerade nicht mehr: SWE-Bench Verified ist an der Spitze so eng zusammengerückt, dass die Rangliste kaum noch trennt, SWE-Bench Pro und LiveCodeBench erzählen widersprüchliche Geschichten, und die eigentliche Bewegung findet ohnehin woanders statt — bei den Open-Weight-Modellen, die still an die geschlossene Spitze heranrücken. Der nützlichste Satz des Tages ist deshalb keine Zahl, sondern eine Warnung.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>SWE-Bench Verified sättigt</strong>: die Spitze klumpt bei ~88 %+; ein Sekundär-Snapshot (Stand 19.07.) nennt Mythos 5 mit 95,5 %, Fable 5 mit 95 %, Opus 4.8 mit 88,6 % — Einzelquelle, auf der Primärseite nicht bestätigt.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Widerspruch im System</strong>: auf dem härteren SWE-Bench Pro liegt Claude weiter klar vorn (Mythos 5 80,3 % vs. GPT-5.6 Sol 64,6 %, Einzelquelle), LiveCodeBench zeigt drei sich widersprechende „aktuelle“ Ranglisten.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 auf Opus-Niveau</strong>: das offene MIT-Modell (~744 Mrd. MoE) erreicht SWE-Bench Pro 62,1 gegen Opus 4.8 ~63 und führt die Open-Weights.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7 Code in Copilot</strong>: seit 01.07. GA — das erste Open-Weight-Modell in GitHub Copilot.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Effort ist ein Regler, kein Schalter</strong>: Anthropic erklärt, dass „Effort“ in Claude Code kein fester Token-Knopf ist, sondern kontinuierliches Verhalten steuert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Copilot-Credit-Zorn</strong>: das n
