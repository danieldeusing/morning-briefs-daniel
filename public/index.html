<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --cat-accent: var(--c-jobs);           --cat-accent-text: var(--c-jobs-text); }

  .loading {

  /* Color helpers per category */

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
          <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>

        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">
      <span class="status-tag">[briefs]</span> <span class="status-host">reader@briefs:</span><span class="status-loc" id="status-loc">~</span>
    </span>

      <span class="status-sep" aria-hidden="true"></span>
      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-label="Sprache wählen" title="Sprache wählen">

          <span class="lang-label-short">DE</span>
          <span class="lang-caret" aria-hidden="true">▾</span>
        </button>
        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="de" aria-selected="true">

          <button class="dropdown-item lang-option" type="button" role="option" data-lang="es" aria-selected="false">
            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>
          </button>
        </div>
      </div>
      <details class="dropdown theme-dropdown" id="theme-dropdown">
        <summary class="status-btn" aria-label="Theme wählen" title="Theme wählen">
          <span class="dd-dot" aria-hidden="true"></span>
          <span class="theme-label">warm</span>
          <span aria-hidden="true">▾</span>

        <ul class="dropdown-panel" role="list">

          <li><button type="button" class="dropdown-item" data-theme-value="mono">mono</button></li>
          <li><button type="button" class="dropdown-item" data-theme-value="paper">paper</button></li>
        </ul>
      </details>
      <button class="status-btn anim-toggle" id="anim-toggle" type="button"
              aria-pressed="true" title="Animationen umschalten">
        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der US-Arbeitsmarkt hat gestern kalt geduscht: nur 57.000 neue Jobs im Juni statt der erwarteten 113.000. Der Dollar fiel weltweit, der DXY rutschte auf gut 100,7 — für dich als EUR-Verdiener mit BRL-Ausgaben eine gemischte Nachricht: ein schwacher Dollar hilft dem Real und drückt tendenziell EUR/BRL. Der letzte gesicherte ECB-Fix steht bei <strong>5,9286</strong> (Stand 02.07.); der heutige Fix von ~16:00 CET war beim Redaktionsschluss noch nicht veröffentlicht.</p>\n    <ul>\n      <li><span class=\"chip hot\">USA</span> <strong>Job-Bericht enttäuscht</strong>: +57K statt +113K, Arbeitslosigkeit auf 4,2 %. Markt preist mehr Fed-Zurückhaltung ein.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,9286</strong> (ECB, 02.07.), Cross-Check sauber (0,0 % Abweichung). Heutiger Fix noch ausstehend.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,201</strong>, <strong>DXY 100,75</strong> — Dollar-Schwäche stützt den Real ins Wochenende.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25 %</strong> nach drittem 25-bp-Cut am 17.06. Nächste Copom-Sitzung 28.–29.07.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed hält 3,50–3,75 %</strong> (12-0 am 17.06.). Nächstes FOMC ebenfalls 28.–29.07. — ohne neue Projektionen.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiskal-Warnung</strong>: Schatzamt sieht die 2028–2030-Ziele ohne neue Maßnahmen als unerreichbar — der stille Bär für den Real.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus-Umfrage</strong>: IPCA-2026-Erwartung auf 5,33 % angehoben, USD/BRL-Jahresende bei R$5,20 gehalten.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent $72,15</strong> (+0,48 %) — Öl ruhig, kein akuter Inflations- oder BRL-Impuls.</li>\n      <li><span class=\"chip good\">Timing</span> <strong>Umtausch-Blick</strong>: Dollar-Schwäche zieht EUR/BRL eher runter — kurzfristig günstiger für BRL-Käufe, mittelfristig lauert das Fiskal-Risiko.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der US-Arbeitsmarkt hat gestern kalt geduscht: nur 57.000 neue Jobs im Juni statt der erwarteten 113.000. Der Dollar fiel weltweit, der DXY rutschte auf gut 100,7 — für dich als EUR-Verdiener mit BRL-Ausgaben eine gemischte Nachricht: ein schwacher Dollar hilft dem Real und drückt tendenziell EUR/BRL. Der letzte gesicherte ECB-Fix steht bei <strong>5,9286</strong> (Stand 02.07.); der heutige Fix von ~16:00 CET war beim Redaktionsschluss noch nicht veröffentlicht.</p>\n    <ul>\n      <li><span class=\"chip hot\">USA</span> <strong>Job-Bericht enttäuscht</strong>: +57K statt +113K, Arbeitslosigkeit auf 4,2 %. Markt preist mehr Fed-Zurückhaltung ein.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,9286</strong> (ECB, 02.07.), Cross-Check sauber (0,0 % Abweichung). Heutiger Fix noch ausstehend.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,201</strong>, <strong>DXY 100,75</strong> — Dollar-Schwäche stützt den Real ins Wochenende.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25 %</strong> nach drittem 25-bp-Cut am 17.06. Nächste Copom-Sitzung 28.–29.07.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed hält 3,50–3,75 %</strong> (12-0 am 17.06.). Nächstes FOMC ebenfalls 28.–29.07. — ohne neue Projektionen.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiskal-Warnung</strong>: Schatzamt sieht die 2028–2030-Ziele ohne neue Maßnahmen als unerreichbar — der stille Bär für den Real.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus-Umfrage</strong>: IPCA-2026-Erwartung auf 5,33 % angehoben, USD/BRL-Jahresende bei R$5,20 gehalten.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent $72,15</strong> (+0,48 %) — Öl ruhig, kein akuter Inflations- oder BRL-Impuls.</li>\n      <li><span class=\"chip good\">Timing</span> <strong>Umtausch-Blick</strong>: Dollar-Schwäche zieht EUR/BRL eher runter — kurzfristig günstiger für BRL-Käufe, mittelfristig lauert das Fiskal-Risiko.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday's US labor market delivered a cold shock: only 57,000 new jobs in June instead of the expected 113,000. The dollar fell globally, the DXY dropped to just 100.7 — for you as a EUR earner with BRL expenses, it's mixed news: a weaker dollar helps the real and tends to push EUR/BRL down. The last locked ECB fix stands at <strong>5.9286</strong> (as of July 2); today's fix around 16:00 CET had not been published at deadline.</p>\n    <ul>\n      <li><span class=\"chip hot\">USA</span> <strong>Jobs report disappoints</strong>: +57K instead of +113K, unemployment at 4.2%. Market prices in more Fed restraint.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5.9286</strong> (ECB, July 2), cross-check clean (0.0% deviation). Today's fix still pending.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.201</strong>, <strong>DXY 100.75</strong> — dollar weakness supports the real into the weekend.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> after third 25-bp cut on June 17. Next Copom meeting July 28–29.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed holds 3.50–3.75%</strong> (12-0 on June 17). Next FOMC also July 28–29 — with no new projections.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal warning</strong>: Treasury sees 2028–2030 targets as unachievable without new measures — the quiet bear for the real.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus survey</strong>: 2026 IPCA expectation raised to 5.33%, USD/BRL year-end held at R$5.20.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent $72.15</strong> (+0.48%) — oil quiet, no acute inflation or BRL impulse.</li>\n      <li><span class=\"chip good\">Timing</span> <strong>Exchange-rate look</strong>: Dollar weakness pulls EUR/BRL down — near-term cheaper for BRL purchases, medium-term fiscal risk lurks.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem o mercado de trabalho dos EUA levou um banho de água fria: apenas 57 mil novos empregos em junho, em vez dos esperados 113 mil. O dólar caiu no mundo todo, o DXY desabou para pouco mais de 100,7 — para você como ganhador de euros com despesas em reais, é notícia mista: um dólar fraco ajuda o real e tende a puxar EUR/BRL para baixo. O último fix do BCE garantido está em <strong>5,9286</strong> (de 02 de julho); o fix de hoje por volta das 16:00 CET não havia sido publicado no fechamento desta edição.</p>\n    <ul>\n      <li><span class=\"chip hot\">EUA</span> <strong>Relatório de empregos desaponta</strong>: +57 mil em vez de +113 mil, desemprego em 4,2%. Mercado precifica mais contenção do Fed.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,9286</strong> (BCE, 02 de julho), verificação cruzada limpa (0,0% de desvio). Fix de hoje ainda pendente.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,201</strong>, <strong>DXY 100,75</strong> — fraqueza do dólar apoia o real até o fim de semana.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> após terceiro corte de 25 bp em 17 de junho. Próxima reunião do Copom 28–29 de julho.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Fed mantém 3,50–3,75%</strong> (12-0 em 17 de junho). Próximo FOMC também em 28–29 de julho — sem novas projeções.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Aviso fiscal</strong>: Tesouro vê metas 2028–2030 como inalcançáveis sem novas medidas — o urso silencioso para o real.</li>\n      <li><span class=\"chip\">BR</span> <strong>Pesquisa Focus</strong>: Expectativa de IPCA 2026 elevada a 5,33%, USD/BRL no final do ano mantida em R$ 5,20.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent $72,15</strong> (+0,48%) — petróleo calmo, sem impulso agudo de inflação ou real.</li>\n      <li><span class=\"chip good\">Timing</span> <strong>Perspectiva de câmbio</strong>: Fraqueza do dólar puxa EUR/BRL para baixo — no curto prazo mais barato para compras de reais, no médio prazo o risco fiscal ronda.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer el mercado laboral de EUA se llevó una sorpresa fría: apenas 57 mil empleos nuevos en junio en lugar de los esperados 113 mil. El dólar cayó en todo el mundo, el DXY se desplomó a poco más de 100,7 — para ti como ganador de euros con gastos en reales, son noticias mixtas: un dólar débil ayuda al real y tiende a empujar EUR/BRL hacia abajo. El último fix del BCE garantizado está en <strong>5,9286</strong> (al 02 de julio); el fix de hoy alrededor de las 16:00 CET no había sido publicado en el cierre de esta edición.</p>\n    <ul>\n      <li><span class=\"chip hot\">EUA</span> <strong>Reporte de empleos decepciona</strong>: +57 mil en lugar de +113 mil, desempleo en 4,2%. El mercado presagia más contención de la Fed.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,9286</strong> (BCE, 02 de julio), verificación cruzada limpia (0,0% de desviación). Fix de hoy aún pendiente.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,201</strong>, <strong>DXY 100,75</strong> — debilidad del dólar sostiene el real hacia el fin de semana.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> tras tercer corte de 25 pb el 17 de junio. Próxima reunión del Copom 28–29 de julio.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Fed mantiene 3,50–3,75%</strong> (12-0 el 17 de junio). Próximo FOMC también 28–29 de julio — sin nuevas proyecciones.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Advertencia fiscal</strong>: Tesorería ve metas 2028–2030 como inalcanzables sin nuevas medidas — el oso silencioso para el real.</li>\n      <li><span class=\"chip\">BR</span> <strong>Encuesta Focus</strong>: Expectativa de IPCA 2026 elevada a 5,33%, USD/BRL fin de año mantenida en R$ 5,20.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent $72,15</strong> (+0,48%) — petróleo tranquilo, sin impulso agudo de inflación o real.</li>\n      <li><span class=\"chip good\">Timing</span> <strong>Perspectiva de tipo de cambio</strong>: Debilidad del dólar baja EUR/BRL — a corto plazo más barato para compras de reales, a mediano plazo el riesgo fiscal acecha.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der 2. Juli hat die Story des Jahres in einer Sitzung zusammengefasst: Der Dow schließt auf Allzeithoch, während die Nasdaq fällt — Geld rotiert aus teuren Wachstums-Namen in Industrials und Financials. Tesla stürzt 7,5 % ab (trotz starker Auslieferungen — reines Gewinnmitnehmen), Meta gibt 4,9 % ab, und ausgerechnet Apple rettet mit +4,8 % (Falt-iPhone-Story) den breiten Markt. Parallel: ein schwacher US-Arbeitsmarkt drückt die Zinsangst, Gold springt über 4.100 $, Öl fällt Richtung Mehrmonatstief, und Bitcoin klettert von seinem 21-Monats-Tief zurück über 60.000 $ — bei weiter fließenden ETF-Abflüssen. US-Handel ruht heute (Independence Day); die Zahlen sind der Donnerstags-Schluss.</p>\n    <ul>\n      <li><span class=\"chip hot\">AKTIEN</span> <strong>Dow-Rekord 52.900</strong> (+1,14 %), aber Nasdaq −0,80 % — Rotation raus aus Tech ist das Signal des Tages.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49 %</strong> auf 393,45 $ — Q2-Auslieferungen schlagen die Erwartung, Kurs fällt trotzdem: „Sell the news\" nach 13 % Rally.</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84 %</strong> auf 308,63 $ — Falt-iPhone-Rollout treibt, Apple stützt fast im Alleingang den S&amp;P 500.</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90 %</strong> auf 582,90 $, NVDA −1,39 % — die schweren Tech-Namen drücken die Nasdaq-100 auf −1,61 %.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold über 4.178 $/oz</strong> (+1,36 %) — schwacher US-Arbeitsmarkt (nur +57.000 Jobs) kühlt Zinsangst.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~72 $/Bbl</strong>, diese Woche kurz unter 71 $ — Hormus-Entspannung + US-Iran-Fortschritt drücken.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC zurück über 60.000 $</strong> (~61.500 $) vom 21-Monats-Tief — aber Juni: Rekord-ETF-Abflüsse ~4,5 Mrd. $.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH +10 % (7d)</strong> auf ~1.700 $ — schlägt Bitcoin diese Woche deutlich.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Memecoins gemischt (DOGE +2 %, SHIB −1,8 %), Gaming-Token IMX auf frischem Allzeittief.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der 2. Juli hat die Story des Jahres in einer Sitzung zusammengefasst: Der Dow schließt auf Allzeithoch, während die Nasdaq fällt — Geld rotiert aus teuren Wachstums-Namen in Industrials und Financials. Tesla stürzt 7,5 % ab (trotz starker Auslieferungen — reines Gewinnmitnehmen), Meta gibt 4,9 % ab, und ausgerechnet Apple rettet mit +4,8 % (Falt-iPhone-Story) den breiten Markt. Parallel: ein schwacher US-Arbeitsmarkt drückt die Zinsangst, Gold springt über 4.100 $, Öl fällt Richtung Mehrmonatstief, und Bitcoin klettert von seinem 21-Monats-Tief zurück über 60.000 $ — bei weiter fließenden ETF-Abflüssen. US-Handel ruht heute (Independence Day); die Zahlen sind der Donnerstags-Schluss.</p>\n    <ul>\n      <li><span class=\"chip hot\">AKTIEN</span> <strong>Dow-Rekord 52.900</strong> (+1,14 %), aber Nasdaq −0,80 % — Rotation raus aus Tech ist das Signal des Tages.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49 %</strong> auf 393,45 $ — Q2-Auslieferungen schlagen die Erwartung, Kurs fällt trotzdem: „Sell the news\" nach 13 % Rally.</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84 %</strong> auf 308,63 $ — Falt-iPhone-Rollout treibt, Apple stützt fast im Alleingang den S&amp;P 500.</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90 %</strong> auf 582,90 $, NVDA −1,39 % — die schweren Tech-Namen drücken die Nasdaq-100 auf −1,61 %.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold über 4.178 $/oz</strong> (+1,36 %) — schwacher US-Arbeitsmarkt (nur +57.000 Jobs) kühlt Zinsangst.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~72 $/Bbl</strong>, diese Woche kurz unter 71 $ — Hormus-Entspannung + US-Iran-Fortschritt drücken.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC zurück über 60.000 $</strong> (~61.500 $) vom 21-Monats-Tief — aber Juni: Rekord-ETF-Abflüsse ~4,5 Mrd. $.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH +10 % (7d)</strong> auf ~1.700 $ — schlägt Bitcoin diese Woche deutlich.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Memecoins gemischt (DOGE +2 %, SHIB −1,8 %), Gaming-Token IMX auf frischem Allzeittief.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">July 2 packaged the story of the year into a single session: The Dow closes at an all-time high while the Nasdaq falls — money rotates out of expensive growth names into industrials and financials. Tesla crashes 7.5% (despite strong deliveries — pure profit-taking), Meta gives back 4.9%, and Apple of all things salvages the broad market with +4.8% (foldable iPhone story). Meanwhile: a weak US labor market stokes rate-cut fears, gold jumps above $4,100, oil slides toward multi-month lows, and Bitcoin climbs back above $60,000 from its 21-month low — despite continued ETF outflows. US trading is closed today (Independence Day); figures are Thursday's close.</p>\n    <ul>\n      <li><span class=\"chip hot\">STOCKS</span> <strong>Dow record 52,900</strong> (+1.14%), but Nasdaq −0.80% — the rotation out of tech is today's signal.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7.49%</strong> to $393.45 — Q2 deliveries beat expectations, yet the price falls: \"Sell the news\" after a 13% rally.</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4.84%</strong> to $308.63 — the foldable iPhone rollout drives it; Apple almost single-handedly props up the S&amp;P 500.</li>\n      <li><span class=\"chip\">META</span> <strong>META −4.90%</strong> to $582.90, NVDA −1.39% — heavy tech names drag the Nasdaq-100 down to −1.61%.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold above $4,178/oz</strong> (+1.36%) — weak US labor market (only +57,000 jobs) cools rate-hike fears.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$72/bbl</strong>, dipped below $71 this week — Hormuz easing + US-Iran progress press down.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC back above $60,000</strong> (~$61,500) from its 21-month low — but June: record ETF outflows ~$4.5B.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH +10% (7d)</strong> to ~$1,700 — clearly outperforms Bitcoin this week.</li>\n      <li><span class=\"chip\">SECTORS</span> Memecoins mixed (DOGE +2%, SHIB −1.8%), Gaming token IMX at fresh all-time low.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O 2 de julho compactou a história do ano em uma única sessão: o Dow fecha em máxima histórica enquanto o Nasdaq cai — dinheiro rotaciona de ações caras de crescimento para industriais e financeiras. Tesla desaba 7,5% (apesar de entregas fortes — puro realização de lucros), Meta cede 4,9%, e justamente Apple salva o mercado amplo com +4,8% (história do iPhone dobrável). Enquanto isso: mercado de trabalho americano fraco aumenta temores de corte de juros, ouro salta acima de 4.100 dólares, petróleo cai em direção a mínimas de vários meses, e Bitcoin sobe de volta acima de 60.000 dólares de sua mínima de 21 meses — apesar de saídas contínuas de ETFs. Bolsas americanas fechadas hoje (Dia da Independência); números são do fechamento de quinta.</p>\n    <ul>\n      <li><span class=\"chip hot\">AÇÕES</span> <strong>Dow em recorde 52.900</strong> (+1,14%), mas Nasdaq −0,80% — a rotação para fora de tech é o sinal do dia.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49%</strong> para $393,45 — entregas do Q2 batem expectativa, mas o preço cai: \"vender a notícia\" após rally de 13%.</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84%</strong> para $308,63 — lançamento do iPhone dobrável impulsiona; Apple praticamente sustenta sozinha o S&amp;P 500.</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90%</strong> para $582,90, NVDA −1,39% — big techs pesadas puxam o Nasdaq-100 para −1,61%.</li>\n      <li><span class=\"chip good\">OURO</span> <strong>Ouro acima de $4.178/oz</strong> (+1,36%) — mercado de trabalho americano fraco esfria temores de aumento de juros.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~$72/barril</strong>, caiu brevemente abaixo de $71 esta semana — alívio no Hormuz + avanço EUA-Irã pressionam.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC acima de $60.000</strong> (~$61.500) de sua mínima de 21 meses — mas junho: saídas recorde de ETFs ~$4,5 bi.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH +10% (7d)</strong> para ~$1.700 — claramente supera Bitcoin esta semana.</li>\n      <li><span class=\"chip\">SETORES</span> Memecoins mistas (DOGE +2%, SHIB −1,8%), token de gaming IMX em nova mínima histórica.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El 2 de julio condensó la historia del año en una sola sesión: el Dow cierra en máximo histórico mientras el Nasdaq cae — dinero rota de nombres caros de crecimiento a industriales y financieros. Tesla se desploma 7.5% (a pesar de entregas sólidas — pura toma de ganancias), Meta cede 4.9%, y justamente Apple rescata el mercado amplio con +4.8% (historia del iPhone plegable). Mientras tanto: mercado laboral estadounidense débil alimenta temores de corte de tasas, oro salta arriba de $4.100, petróleo cae hacia mínimos de varios meses, y Bitcoin sube desde su mínimo de 21 meses nuevamente arriba de $60.000 — a pesar de salidas continuas de ETFs. Mercados estadounidenses cerrados hoy (Día de Independencia); cifras del cierre de jueves.</p>\n    <ul>\n      <li><span class=\"chip hot\">ACCIONES</span> <strong>Dow récord 52.900</strong> (+1,14%), pero Nasdaq −0,80% — la rotación fuera de tech es la señal del día.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49%</strong> a $393,45 — entregas Q2 superan expectativa, pero el precio cae: \"vender la noticia\" tras rally de 13%.</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84%</strong> a $308,63 — el lanzamiento del iPhone plegable impulsa; Apple sostiene casi por sí sola el S&amp;P 500.</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90%</strong> a $582,90, NVDA −1,39% — los grandes nombres de tech arrastran el Nasdaq-100 a −1,61%.</li>\n      <li><span class=\"chip good\">ORO</span> <strong>Oro arriba de $4.178/oz</strong> (+1,36%) — mercado laboral estadounidense débil enfría temores de aumento de tasas.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~$72/barril</strong>, cayó brevemente debajo de $71 esta semana — alivio en Ormuz + avance EUA-Irán presionan.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC arriba de $60.000</strong> (~$61.500) desde su mínimo de 21 meses — pero junio: salidas récord de ETFs ~$4,5 mil millones.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH +10% (7d)</strong> a ~$1.700 — claramente supera a Bitcoin esta semana.</li>\n      <li><span class=\"chip\">SECTORES</span> Memecoins mixtas (DOGE +2%, SHIB −1,8%), token de gaming IMX en nuevo mínimo histórico.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Sommer-Freitag, an dem nicht die Release-Notes den Tag machen, sondern die Lieferkette und der Patch-Kalender. CISA zwingt Bundesbehörden bis morgen zum SharePoint-Fix — für einen Bug, den Microsoft im Mai selbst als „unwahrscheinlich ausnutzbar\" abgestempelt hatte. Zwei frische libssh2-Löcher haben noch kein offizielles Release. Ein sich selbst kopierender npm-Wurm frisst sich durch `binding.gyp`. Und curl macht für einen Monat die Bug-Bounty-Tür zu, weil die Meldungen nicht mehr zu bewältigen sind.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint-RCE auf der KEV-Liste</strong>: CVE-2026-45659 (CVSS 8,8) aktiv ausgenutzt — Bundesbehörden müssen bis 04.07. patchen. Microsoft hatte den Bug im Mai als „Less Likely\" eingestuft.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2 pre-auth RCE</strong>: CVE-2026-55200 (CVSS 9,2) trifft alle Versionen ≤ 1.11.1, PoC ist öffentlich — Fix nur im master, noch kein getaggtes Release.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>npm-Wurm „Miasma\"</strong>: 57 Pakete, hunderte bösartige Versionen, kopiert sich über `binding.gyp` beim `npm install` selbst weiter. Härtester Treffer: `@vapi-ai/server-sdk` (~86.500 Downloads/Woche).</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>M365-Passwort-Spray</strong>: 81 Mio. Login-Versuche in zwei Wochen, 78 Konten in 64 Firmen übernommen — über einen ROPC-Flow, der interaktive MFA umgeht.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome 150</strong>: 382 Security-Fixes, 15 als Critical eingestuft — noch keiner in the wild ausgenutzt.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>curl macht die Bounty-Tür zu</strong>: HackerOne-Intake pausiert den ganzen Juli; Meldungsrate 4–5× über 2024. curl 8.22.0 rutscht auf den 02.09.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> raus (plus 22.1.0-next.4) — Routine-Patch im 6-Monats-Takt, kein Handlungsbedarf.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA-Countdown</strong>: die Melde-Pflicht des Cyber Resilience Act greift ab 11.09.2026 — Zeit, die Incident-Reporting-Kette jetzt aufzusetzen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein Sommer-Freitag, an dem nicht die Release-Notes den Tag machen, sondern die Lieferkette und der Patch-Kalender. CISA zwingt Bundesbehörden bis morgen zum SharePoint-Fix — für einen Bug, den Microsoft im Mai selbst als „unwahrscheinlich ausnutzbar\" abgestempelt hatte. Zwei frische libssh2-Löcher haben noch kein offizielles Release. Ein sich selbst kopierender npm-Wurm frisst sich durch `binding.gyp`. Und curl macht für einen Monat die Bug-Bounty-Tür zu, weil die Meldungen nicht mehr zu bewältigen sind.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint-RCE auf der KEV-Liste</strong>: CVE-2026-45659 (CVSS 8,8) aktiv ausgenutzt — Bundesbehörden müssen bis 04.07. patchen. Microsoft hatte den Bug im Mai als „Less Likely\" eingestuft.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2 pre-auth RCE</strong>: CVE-2026-55200 (CVSS 9,2) trifft alle Versionen ≤ 1.11.1, PoC ist öffentlich — Fix nur im master, noch kein getaggtes Release.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>npm-Wurm „Miasma\"</strong>: 57 Pakete, hunderte bösartige Versionen, kopiert sich über `binding.gyp` beim `npm install` selbst weiter. Härtester Treffer: `@vapi-ai/server-sdk` (~86.500 Downloads/Woche).</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>M365-Passwort-Spray</strong>: 81 Mio. Login-Versuche in zwei Wochen, 78 Konten in 64 Firmen übernommen — über einen ROPC-Flow, der interaktive MFA umgeht.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome 150</strong>: 382 Security-Fixes, 15 als Critical eingestuft — noch keiner in the wild ausgenutzt.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>curl macht die Bounty-Tür zu</strong>: HackerOne-Intake pausiert den ganzen Juli; Meldungsrate 4–5× über 2024. curl 8.22.0 rutscht auf den 02.09.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> raus (plus 22.1.0-next.4) — Routine-Patch im 6-Monats-Takt, kein Handlungsbedarf.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA-Countdown</strong>: die Melde-Pflicht des Cyber Resilience Act greift ab 11.09.2026 — Zeit, die Incident-Reporting-Kette jetzt aufzusetzen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A summer Friday when the supply chain and patch calendar steal the headlines. CISA is forcing US federal agencies to patch SharePoint by tomorrow—for a bug Microsoft itself flagged in May as \"unlikely to be exploited.\" Two fresh libssh2 holes remain patched in master only, with no official release yet. A self-propagating npm worm is eating through `binding.gyp`. And curl is closing the bounty door for a month because the intake has become unmanageable.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint RCE on KEV list</strong>: CVE-2026-45659 (CVSS 8.8) under active exploitation—federal agencies must patch by 07-04. Microsoft had downgraded this to \"Less Likely\" in May.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>libssh2 pre-auth RCE</strong>: CVE-2026-55200 (CVSS 9.2) affects all versions ≤ 1.11.1, public PoC available—fix only in master, no tagged release yet.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>npm worm \"Miasma\"</strong>: 57 packages, hundreds of malicious versions, self-propagates via `binding.gyp` on `npm install`. Hardest hit: `@vapi-ai/server-sdk` (~86,500 downloads/week).</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>M365 password spray</strong>: 81 million login attempts in two weeks, 78 accounts compromised across 64 organizations—via ROPC flow that bypasses interactive MFA.</li>\n      <li><span class=\"chip\">Browser</span> <span class=\"chip\">Global</span> <strong>Chrome 150</strong>: 382 security fixes, 15 rated Critical—none exploited in the wild so far.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>curl shuts bounty door</strong>: HackerOne intake pauses all of July; report rate 4–5× above 2024. curl 8.22.0 shifts to 2026-09-02.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> ships (plus 22.1.0-next.4)—routine patch on 6-month cadence, no action needed.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>CRA countdown</strong>: the Cyber Resilience Act disclosure duty kicks in on 2026-09-11—time to set up incident reporting now.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma sexta-feira de verão em que a cadeia de suprimentos e o calendário de correções roubam as manchetes. A CISA está forçando agências federais dos EUA a corrigir o SharePoint até amanhã — por um bug que a própria Microsoft rebaixou em maio para \"improvável de ser explorado\". Dois novos buracos no libssh2 permanecem corrigidos apenas no master, sem lançamento oficial ainda. Um worm npm que se auto-reproduz está se espalhando através do `binding.gyp`. E o curl está fechando a porta de recompensas por um mês porque o fluxo se tornou incontrolável.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">EUA</span> <strong>SharePoint RCE na lista KEV</strong>: CVE-2026-45659 (CVSS 8,8) em exploração ativa — agências federais devem corrigir até 04/07. A Microsoft tinha rebaixado isso para \"Improvável\" em maio.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">OSS</span> <strong>libssh2 RCE pré-autenticação</strong>: CVE-2026-55200 (CVSS 9,2) afeta todas as versões ≤ 1.11.1, PoC público disponível — correção apenas no master, sem lançamento marcado ainda.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">OSS</span> <strong>worm npm \"Miasma\"</strong>: 57 pacotes, centenas de versões maliciosas, auto-reprodução via `binding.gyp` em `npm install`. Mais afetado: `@vapi-ai/server-sdk` (~86.500 downloads/semana).</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Global</span> <strong>spray de senha M365</strong>: 81 milhões de tentativas de login em duas semanas, 78 contas comprometidas em 64 organizações — via fluxo ROPC que contorna MFA interativa.</li>\n      <li><span class=\"chip\">Navegador</span> <span class=\"chip\">Global</span> <strong>Chrome 150</strong>: 382 correções de segurança, 15 classificadas como Críticas — nenhuma explorada na prática ainda.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>curl fecha a porta de recompensas</strong>: intake do HackerOne pausa todo o julho; taxa de relatórios 4–5× acima de 2024. curl 8.22.0 deslocado para 02/09.</li>\n      <li><span class=\"chip\">Lançamento</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> lançado (mais 22.1.0-next.4) — correção rotineira em ciclo de 6 meses, sem ação necessária.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">UE</span> <strong>Contagem regressiva CRA</strong>: o dever de divulgação do Cyber Resilience Act entra em vigor em 11/09/2026 — hora de configurar o relatório de incidentes agora.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un viernes de verano donde la cadena de suministro y el calendario de parches roban los titulares. CISA está obligando a agencias federales de EUA a parchear SharePoint para mañana—por un error que la propia Microsoft rebajó en mayo a \"improbable de ser explotado\". Dos nuevos agujeros en libssh2 permanecen parcheados solo en master, sin lanzamiento oficial aún. Un gusano npm que se auto-replica se está propagando a través de `binding.gyp`. Y curl está cerrando la puerta de recompensas por un mes porque el flujo se ha vuelto incontrolable.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">EUA</span> <strong>SharePoint RCE en lista KEV</strong>: CVE-2026-45659 (CVSS 8,8) en explotación activa — agencias federales deben parchear para el 04/07. Microsoft había rebajado esto a \"Improbable\" en mayo.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">OSS</span> <strong>libssh2 RCE pre-autenticación</strong>: CVE-2026-55200 (CVSS 9,2) afecta todas las versiones ≤ 1.11.1, PoC público disponible — parche solo en master, sin lanzamiento etiquetado aún.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">OSS</span> <strong>gusano npm \"Miasma\"</strong>: 57 paquetes, cientos de versiones maliciosas, auto-replicación vía `binding.gyp` en `npm install`. Más afectado: `@vapi-ai/server-sdk` (~86.500 descargas/semana).</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Global</span> <strong>rociado de contraseña M365</strong>: 81 millones de intentos de inicio de sesión en dos semanas, 78 cuentas comprometidas en 64 organizaciones — vía flujo ROPC que elude MFA interactivo.</li>\n      <li><span class=\"chip\">Navegador</span> <span class=\"chip\">Global</span> <strong>Chrome 150</strong>: 382 parches de seguridad, 15 clasificados como Críticos — ninguno explotado en la práctica aún.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>curl cierra puerta de recompensas</strong>: entrada de HackerOne pausa todo julio; tasa de reportes 4–5× arriba de 2024. curl 8.22.0 desplazado para 02/09.</li>\n      <li><span class=\"chip\">Lanzamiento</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> lanzado (más 22.1.0-next.4) — parche rutinario en ciclo de 6 meses, no se requiere acción.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>Cuenta regresiva CRA</strong>: el deber de divulgación de la Ley de Resiliencia Cibernética entra en vigor el 11/09/2026 — es hora de configurar el reporte de incidentes ahora.</li>\n    </ul></div>"
