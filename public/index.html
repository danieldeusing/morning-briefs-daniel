<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;

  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);

    font-family: var(--font-body);

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,

  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }

    transform: none;

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }

    width: 6px; height: 18px; border-radius: 0; flex: none;

    width: 1.1rem;

  }
  .home-btn:focus-visible,

  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }

    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;

    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,

    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,

  }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the

     sidebar (.nav-rail). -->

  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">

</div>

    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Diese Woche stand hier die These, die sticky Öl-Prämie trage den Real. Heute fällt genau diese Prämie — Brent verliert <strong>2,45 $</strong> auf 76,80 $ —, und der Real steigt <em>trotzdem</em>. Die Stütze hat rotiert: weg vom Öl, hin zu einem weichen Dollar (DXY <strong>100,86</strong>) und Risk-on (Ibovespa +1,22 %). Der ECB-Fix von gestern steht bei <strong>5,8837</strong>, der Freitag-Spot driftet auf ~5,85 — der Real setzt seine Festigungs-Woche fort. Was das Bild aber wirklich dominiert, steht im Kalender: In fünf Tagen, am <strong>15.07.</strong>, läuft die gesetzliche Frist für die finale US-Entscheidung über einen 25-%-Zoll auf brasilianische Waren ab. Ein Binär-Ereignis, das der Markt heute erstaunlich ruhig preist (CDS enger auf 125 bp) — und das den EUR/BRL nächste Woche stärker bewegen kann als jeder Datenpunkt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8837</strong> (ECB-Fix, Do 09.07.) — <span class=\"stat\">−0,50 %</span> unter dem Montags-Fix (5,9130): Der Real ist über die Woche fester geworden. Der Freitag-Spot rechnet sich auf ~5,85, doch dieser Abstand zum Fix ist Sampling-Timing (der Fix ist eine 16:00-CET-Momentaufnahme), kein zusätzlicher Move.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1157</strong> (Spot, Fr 10.07.) — Real <span class=\"stat\">+0,40 %</span> am Tag. Der Dollar ist global weich.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,86</strong> (Fr 10.07.), <span class=\"stat\">−0,05 %</span> zur Vorsitzung — nahe dem Jahres-Tief. Der schwache Dollar ist heute der Haupt-Real-Treiber, nicht das Öl.</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check sauber</strong>: gleicher Tag (09.07.) 5,8837 vs. rechnerisch 5,8837 (0,001 %), EUR/USD unabhängig gezogen. Der Freitag-Spot ~5,85 liegt ~0,5 % unter dem Fix — das ist die Sampling-Verzögerung des Tagesfixes (16:00-CET-Momentaufnahme), kein frischer Kurs-Move und kein Datenfehler.</li>\n      <li><span class=\"chip hot\">USA/BR</span> <strong>Zoll-Stichtag 15.07.</strong>: USTR Section 301, 25 % auf brasilianische Waren, gesetzliche Frist für die finale US-Aktion in <strong>5 Tagen</strong>. Kommentarfrist geschlossen (01.07.), Anhörung war (06.07.), Verhandlungen laufen. Der eine Binär-Trigger des Monats.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Öl-Prämie verpufft</strong>: Brent <span class=\"stat\">76,80 $</span> (−2,45 $ am Tag) — die Stütze, die gestern noch den Real trug, fällt weg. Für den Copom ist das fallende Öl sogar hilfreich (weniger Importinflation).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa 172.742</strong> (+1,22 %, 09.07.) — beendet eine 3-Tage-Verlustserie, Banken und Retail führen. Risk-on zieht Kapital in Real-Assets.</li>\n      <li><span class=\"chip\">BR</span> <strong>Kalender-Klarstellung</strong>: Nächste Copom-Sitzung erst am <strong>04.–05.08.</strong> — <em>nicht</em> am 29.07. Das ist die Fed (FOMC 28.–29.07.). Selic steht bei <span class=\"stat\">14,25 %</span> (Beschluss 17.06.).</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiskal-Survey</strong>: Prisma-Median für das Primärdefizit der Zentralregierung 2026 auf <span class=\"stat\">R$ 59,0 Mrd.</span> gestiegen (von 57,8); Bruttoschuld/BIP-Median 83,0 %. Das strukturelle Gegengewicht zum festen Real.</li>\n      <li><span class=\"chip\">BR</span> <strong>5J-CDS 125,23 bp</strong> (09.07.), leicht enger — der Kreditmarkt preist den Zoll-Stichtag nicht.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">This week's thesis here was that the sticky oil premium was carrying the real. Today that very premium collapses — Brent sheds <strong>$2.45</strong> to $76.80 —, and the real rises <em>anyway</em>. The support has rotated: away from oil, toward a soft dollar (DXY <strong>100.86</strong>) and risk-on (Ibovespa +1.22%). Yesterday's ECB fix stands at <strong>5.8837</strong>, Friday's spot drifts to ~5.85 — the real continues its week of firming. But what really dominates the picture is on the calendar: in five days, on <strong>Jul 15</strong>, the statutory deadline expires for the final US decision on a 25% tariff on Brazilian goods. A binary event that the market is pricing remarkably calmly today (CDS tighter at 125 bp) — and one that could move EUR/BRL more next week than any data point.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8837</strong> (ECB fix, Thu Jul 9) — <span class=\"stat\">−0.50%</span> below Monday's fix (5.9130): the real has firmed over the week. Friday's spot computes to ~5.85, but that gap to the fix is sampling timing (the fix is a 16:00 CET snapshot), not an additional move.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1157</strong> (spot, Fri Jul 10) — real <span class=\"stat\">+0.40%</span> on the day. The dollar is soft globally.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.86</strong> (Fri Jul 10), <span class=\"stat\">−0.05%</span> vs. the prior session — near the year's low. The weak dollar, not oil, is today's main driver for the real.</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: same day (Jul 9) 5.8837 vs. computed 5.8837 (0.001%), EUR/USD pulled independently. Friday's spot ~5.85 sits ~0.5% below the fix — that's the daily fix's sampling delay (a 16:00 CET snapshot), not a fresh rate move and not a data error.</li>\n      <li><span class=\"chip hot\">US/BR</span> <strong>Tariff deadline Jul 15</strong>: USTR Section 301, 25% on Brazilian goods, statutory deadline for the final US action in <strong>5 days</strong>. Comment period closed (Jul 1), hearing held (Jul 6), negotiations ongoing. The month's one binary trigger.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Oil premium fizzles</strong>: Brent <span class=\"stat\">$76.80</span> (−$2.45 on the day) — the support that carried the real just yesterday is gone. For Copom, falling oil is actually helpful (less imported inflation).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa 172,742</strong> (+1.22%, Jul 9) — ends a 3-day losing streak, banks and retail lead. Risk-on pulls capital into real assets.</li>\n      <li><span class=\"chip\">BR</span> <strong>Calendar clarification</strong>: the next Copom meeting isn't until <strong>Aug 4–5</strong> — <em>not</em> Jul 29. That's the Fed (FOMC Jul 28–29). Selic stands at <span class=\"stat\">14.25%</span> (decided Jun 17).</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal survey</strong>: the Prisma median for the 2026 central government primary deficit rose to <span class=\"stat\">R$59.0 billion</span> (from 57.8); gross debt/GDP median 83.0%. The structural counterweight to the firm real.</li>\n      <li><span class=\"chip\">BR</span> <strong>5-year CDS 125.23 bp</strong> (Jul 9), slightly tighter — the credit market isn't pricing the tariff deadline.</li>\n      <li><span class=\"chip\">Note</span> The forecast probabilities below = <strong>my confidence level</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Nesta semana, a tese aqui era que o prêmio pegajoso do petróleo sustentava o real. Hoje é justamente esse prêmio que desaba — o Brent perde <strong>2,45 dólares</strong> e cai para 76,80 dólares —, e o real sobe <em>assim mesmo</em>. O suporte girou: saiu do petróleo e foi para um dólar fraco (DXY <strong>100,86</strong>) e o apetite por risco (Ibovespa +1,22%). O fix do BCE de ontem está em <strong>5,8837</strong>, e o spot de sexta-feira desliza para cerca de 5,85 — o real segue sua semana de fortalecimento. Mas o que realmente domina o quadro está no calendário: em cinco dias, no dia <strong>15/07</strong>, vence o prazo legal para a decisão final dos EUA sobre uma tarifa de 25% sobre produtos brasileiros. Um evento binário que o mercado precifica hoje com surpreendente calma (CDS mais apertado, em 125 pontos-base) — e que pode mexer mais no EUR/BRL na próxima semana do que qualquer dado econômico.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8837</strong> (fix do BCE, qui 09/07) — <span class=\"stat\">−0,50%</span> abaixo do fix de segunda-feira (5,9130): o real se fortaleceu ao longo da semana. O spot de sexta-feira se calcula em ~5,85, mas essa diferença em relação ao fix é uma questão de tempo de aferição (o fix é um retrato tirado às 16h CET), não um movimento adicional.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1157</strong> (à vista, sex 10/07) — real <span class=\"stat\">+0,40%</span> no dia. O dólar está fraco globalmente.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,86</strong> (sex 10/07), <span class=\"stat\">−0,05%</span> em relação ao pregão anterior — perto da mínima do ano. O dólar fraco é hoje o principal motor do real, não o petróleo.</li>\n      <li><span class=\"chip\">FX</span> <strong>Checagem de câmbio cruzado limpa</strong>: mesmo dia (09/07) 5,8837 vs. cálculo 5,8837 (0,001%), EUR/USD extraído de forma independente. O spot de sexta-feira ~5,85 fica ~0,5% abaixo do fix — isso é o atraso de aferição do fix diário (um retrato das 16h CET), não um novo movimento de câmbio nem erro de dado.</li>\n      <li><span class=\"chip hot\">EUA/BR</span> <strong>Prazo tarifário 15/07</strong>: Seção 301 do USTR, 25% sobre produtos brasileiros, prazo legal para a ação final dos EUA em <strong>5 dias</strong>. Prazo de comentários encerrado (01/07), audiência já ocorreu (06/07), negociações em curso. O único gatilho binário do mês.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Prêmio do petróleo se dissipa</strong>: Brent <span class=\"stat\">76,80 dólares</span> (−2,45 dólares no dia) — o suporte que ainda ontem sustentava o real desaparece. Para o Copom, a queda do petróleo até ajuda (menos inflação importada).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa 172.742</strong> (+1,22%, 09/07) — encerra uma sequência de 3 dias de perdas, com bancos e varejo à frente. O apetite por risco puxa capital para ativos em reais.</li>\n      <li><span class=\"chip\">BR</span> <strong>Esclarecimento de calendário</strong>: a próxima reunião do Copom só ocorre em <strong>04–05/08</strong> — <em>não</em> em 29/07. Essa data é do Fed (FOMC, 28–29/07). A Selic está em <span class=\"stat\">14,25%</span> (decisão de 17/06).</li>\n      <li><span class=\"chip\">BR</span> <strong>Pesquisa fiscal</strong>: a mediana do Prisma para o déficit primário do governo central em 2026 subiu para <span class=\"stat\">R$ 59,0 bilhões</span> (de 57,8); a mediana da dívida bruta/PIB está em 83,0%. O contrapeso estrutural ao real forte.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS de 5 anos em 125,23 pontos-base</strong> (09/07), levemente mais apertado — o mercado de crédito não está precificando o prazo tarifário.</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades de previsão abaixo são <strong>minha confiança pessoal</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta semana, la tesis de este boletín era que la persistente prima del petróleo sostenía al real. Hoy es justo esa prima la que se desploma — el Brent pierde <strong>2,45 dólares</strong> y cae a 76,80 dólares —, y el real sube <em>de todos modos</em>. El soporte rotó: dejó atrás al petróleo y pasó a un dólar débil (DXY <strong>100,86</strong>) y al apetito por riesgo (Ibovespa +1,22%). El fix del BCE de ayer está en <strong>5,8837</strong>, y el spot del viernes se desliza hacia ~5,85: el real continúa su semana de fortalecimiento. Pero lo que realmente domina el panorama está en el calendario: en cinco días, el <strong>15/07</strong>, vence el plazo legal para la decisión final de Estados Unidos sobre un arancel del 25% a los productos brasileños. Un evento binario que hoy el mercado cotiza con sorprendente calma (CDS más ajustado, en 125 puntos base) — y que la próxima semana podría mover el EUR/BRL más que cualquier dato económico.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8837</strong> (fix del BCE, jue 09/07) — <span class=\"stat\">−0,50%</span> por debajo del fix del lunes (5,9130): el real se ha fortalecido a lo largo de la semana. El spot del viernes se calcula en ~5,85, pero esa diferencia con el fix es cuestión de tiempo de medición (el fix es una foto tomada a las 16:00 CET), no un movimiento adicional.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1157</strong> (spot, vie 10/07) — real <span class=\"stat\">+0,40%</span> en el día. El dólar está débil a nivel global.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,86</strong> (vie 10/07), <span class=\"stat\">−0,05%</span> respecto a la sesión anterior — cerca del mínimo del año. El dólar débil es hoy el principal motor del real, no el petróleo.</li>\n      <li><span class=\"chip\">FX</span> <strong>Revisión del tipo de cambio cruzado limpia</strong>: mismo día (09/07) 5,8837 frente al cálculo 5,8837 (0,001%), con el EUR/USD tomado de forma independiente. El spot del viernes ~5,85 está ~0,5% por debajo del fix — es el rezago de medición del fix diario (una foto de las 16:00 CET), no un movimiento nuevo ni un error de datos.</li>\n      <li><span class=\"chip hot\">EE. UU./BR</span> <strong>Plazo arancelario 15/07</strong>: Sección 301 del USTR, 25% sobre productos brasileños, plazo legal para la acción final de EE. UU. en <strong>5 días</strong>. Periodo de comentarios cerrado (01/07), audiencia ya realizada (06/07), negociaciones en curso. El único detonante binario del mes.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>La prima del petróleo se desvanece</strong>: Brent a <span class=\"stat\">76,80 dólares</span> (−2,45 dólares en el día) — el soporte que apenas ayer sostenía al real desaparece. Para el Copom, la caída del petróleo hasta ayuda (menos inflación importada).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ibovespa en 172.742</strong> (+1,22%, 09/07) — pone fin a una racha de 3 días de pérdidas, con bancos y comercio minorista a la cabeza. El apetito por riesgo atrae capital hacia activos en reales.</li>\n      <li><span class=\"chip\">BR</span> <strong>Aclaración de calendario</strong>: la próxima reunión del Copom es hasta el <strong>04–05/08</strong> — <em>no</em> el 29/07. Esa fecha corresponde a la Fed (FOMC, 28–29/07). La Selic está en <span class=\"stat\">14,25%</span> (decisión del 17/06).</li>\n      <li><span class=\"chip\">BR</span> <strong>Encuesta fiscal</strong>: la mediana del Prisma para el déficit primario del gobierno central en 2026 subió a <span class=\"stat\">R$ 59,0 mil millones</span> (desde 57,8); la mediana de deuda bruta/PIB es de 83,0%. El contrapeso estructural al real firme.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS a 5 años en 125,23 puntos base</strong> (09/07), ligeramente más ajustado — el mercado de crédito no está descontando el plazo arancelario.</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades de pronóstico de abajo son <strong>mi confianza personal</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern drehte sich die Zins-Wette Richtung <em>Erhöhung</em> und drückte Gold, Dow und Krypto gleichzeitig. Heute bekommt genau diese hawkishe Erzählung ihren ersten Gegenwind — und die Kurse zeigen es. Der schwache Juni-Arbeitsmarktbericht (<strong>nur 57.000 neue Stellen</strong>, Arbeitslosenquote <strong>4,2 %</strong>) untergräbt die These „die Fed <em>erhöht</em> als Nächstes\" und kühlt die Zins-Angst.<sup>[19]</sup> Der sauberste Beleg ist <strong>Bitcoin: 64.340,78 $ (+2,67 % in 24h)</strong>, das erste Mal seit Tagen zurück über der 64.000er-Linie.<sup>[14]</sup> Damit ist das <em>Kurs</em>-Bein meines zweiten Bitcoin-Triggers erfüllt — das <em>Flow</em>-Bein aber nicht: Die US-Spot-ETF-Flows sind umstritten und wechselhaft, ein einzelner Zufluss-Print um den 06.07. (~143 Mio. $) steht gegen frische Netto-<em>Abflüsse</em> am 08.07. (−84,9 Mio. $) und 09.07. (−95,3 Mio. $).<sup>[18]</sup> Der Trigger, den ich am 08./09.07. gesetzt hatte, ist also nur halb grün. Der Dollar driftet passend dazu leicht tiefer (<strong>DXY 100,86</strong>), und <strong>Gold hat sich über 4.100 $ stabilisiert</strong> nach dem Bruch auf ~4.072 $ gestern.<sup>[11][13]</sup> Nur ein Baustein läuft heute gegen den Strom: <strong>Brent fällt −3,09 % auf 76,80 $</strong> — die Iran-Kriegsprämie bröckelt an einem Tag, während WTI (72,29 $) die Wochen-Bilanz von ~+5 % noch hält.<sup>[8][9]</sup> Und die vielleicht wichtigste stille Zahl: <strong>Nvidia (202,78 $, −0,66 %)</strong> handelt nach ~1 Bio. $ Kursverlust seit dem Mai-Rekord bei nur noch <strong>~18× erwartetem Gewinn — unter dem Multiple des breiten S&amp;P 500</strong>.<sup>[1][2]</sup> Der KI-Marktführer ist erstmals seit langem „billiger als der Durchschnitt\".</p>\n    <ul>\n      <li><span class=\"chip hot\">ZINS-WENDE</span> <strong>Schwache Jobs bremsen die Hike-These.</strong> 57.000 neue Stellen, Arbeitslosenquote 4,2 % — der Markt zweifelt an der „Fed erhöht\"-Wette von letzter Woche. Das ist der Faden unter fast allem heute.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.340,78 $</strong> (+2,67 % 24h, 10.07. 06:30 ET), zurück über 64.000 $; CoinGecko-Gegenprobe 64.310,71 $. Die US-Spot-ETF-Flows bleiben umstritten: ein Zufluss-Print um den 06.07. gegen frische Abflüsse am 08.07. (−84,9 Mio. $) und 09.07. (−95,3 Mio. $) — mein Flow-Trigger ist damit <em>nicht</em> erfüllt, nur das Kurs-Bein.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia 202,78 $</strong> (−0,66 %, Schluss 09.07.), ~4,91 Bio. $ Marktwert, ~1 Bio. $ unter dem Mai-Rekord. Bei <strong>~18× Forward-Gewinn</strong> handelt der KI-Marktführer <em>unter</em> dem S&amp;P-500-Multiple — die Bewertung hat sich zurückgesetzt.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 76,80 $</strong> (−3,09 %/−2,45 $, 10.07. 06:15 ET), <strong>WTI 72,29 $</strong> (+0,30 %, +~5 % Woche). Die Kriegsprämie gibt heute einen Tag ab — der erste echte Test meiner BUY-These, aber innerhalb der Basis-Spanne.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~4.099–4.107 $/oz</strong> (−0,4 bis −0,6 %, 10.07.), stabilisiert über 4.100 $ nach dem Gestern-Bruch, +22,48 % zum Vorjahr, −2,41 % im Monat. Ruhige Woche unterm Strich.</li>\n      <li><span class=\"chip\">TESLA</span> <strong>TSLA 406,55 $</strong> (+3,17 %, Schluss 09.07.), zurück über 400 $ nach drei roten Tagen — ohne datierten Katalysator. Für mich der bessere Ausstieg, nicht das Ende der SELL-These.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.796,10 $</strong> (+2,9 % 24h), ~233 Mrd. $ Marktwert. Steigt im Gleichschritt mit BTC — Hebel, keine eigenständige Stärke. Halten.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Long-Tail heute grün: AI-Token (TAO +4,2 %, RENDER +2,3 %, FET +2,2 %) und Memes (DOGE +2,9 %) im Risk-on mit. Bleibt Krypto-Beta mit KI-Etikett — kein KI-Investment.</li>\n      <li><span class=\"chip\">REVIERE</span> Modell- und Agent-Launches stehen im <em>ai-dev</em>-Brief, angewandte KI im <em>ai-usecases</em>-Brief. Hier zählt allein die Kursreaktion.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday the rate bet swung toward a hike and pushed down gold, the Dow, and crypto all at once. Today that same hawkish narrative gets its first real pushback — and prices show it. The weak June jobs report (only 57,000 new payrolls, unemployment rate 4.2%) undercuts the \"Fed hikes next\" thesis and cools the rate-hike fear.<sup>[19]</sup> The cleanest evidence is Bitcoin: <strong>$64,340.78 (+2.67% in 24h)</strong>, back above the $64,000 line for the first time in days.<sup>[14]</sup> That satisfies the price leg of my second Bitcoin trigger — but not the flow leg: the US spot ETF flows are contested and choppy, a single inflow print around 06.07. (~$143 million) sits against fresh net outflows on 08.07. (−$84.9 million) and 09.07. (−$95.3 million).<sup>[18]</sup> So the trigger I set on 08./09.07. is only half green. The dollar drifts a touch lower to match (DXY 100.86), and gold has stabilized above $4,100 after yesterday's break to ~$4,072.<sup>[11][13]</sup> Only one piece is swimming against the current today: <strong>Brent falls −3.09% to $76.80</strong> — the Iran war premium cracks for a day, while WTI ($72.29) still holds its ~+5% weekly gain.<sup>[8][9]</sup> And perhaps the most important quiet number: <strong>Nvidia ($202.78, −0.66%)</strong> now trades, after ~$1 trillion in lost market value since its May record, at just <strong>~18x forward earnings — below the multiple of the broad S&amp;P 500</strong>.<sup>[1][2]</sup> The AI market leader is, for the first time in a long while, \"cheaper than average.\"</p>\n    <ul>\n      <li><span class=\"chip hot\">RATE PIVOT</span> <strong>Weak jobs data undercuts the hike thesis.</strong> 57,000 new payrolls, unemployment rate 4.2% — the market doubts last week's \"Fed hikes\" bet. That's the thread running under almost everything today.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC $64,340.78</strong> (+2.67% 24h, 10.07. 06:30 ET), back above $64,000; CoinGecko cross-check $64,310.71. US spot ETF flows remain contested: an inflow print around 06.07. against fresh outflows on 08.07. (−$84.9 million) and 09.07. (−$95.3 million) — my flow trigger is therefore not met, only the price leg.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia $202.78</strong> (−0.66%, close 09.07.), ~$4.91 trillion market cap, ~$1 trillion below the May record. At <strong>~18x forward earnings</strong>, the AI market leader trades <em>below</em> the S&amp;P 500's multiple — the valuation has reset.</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $76.80</strong> (−3.09%/−$2.45, 10.07. 06:15 ET), <strong>WTI $72.29</strong> (+0.30%, +~5% week). The war premium gives back a day today — the first real test of my BUY thesis, but still within the base-case range.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~$4,099–$4,107/oz</strong> (−0.4 to −0.6%, 10.07.), stabilized above $4,100 after yesterday's break, +22.48% year-over-year, −2.41% for the month. A quiet week on balance.</li>\n      <li><span class=\"chip\">TESLA</span> <strong>TSLA $406.55</strong> (+3.17%, close 09.07.), back above $400 after three red sessions — with no dated catalyst. For me, that's a better exit, not the end of the SELL thesis.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1,796.10</strong> (+2.9% 24h), ~$233 billion market cap. Rising in lockstep with BTC — leverage, not independent strength. Hold.</li>\n      <li><span class=\"chip\">SECTORS</span> The long tail is green today: AI tokens (TAO +4.2%, RENDER +2.3%, FET +2.2%) and memes (DOGE +2.9%) riding along with the risk-on move. Still crypto beta with an AI label — not an AI investment.</li>\n      <li><span class=\"chip\">TERRITORY</span> Model and agent launches belong in the <em>ai-dev</em> brief, applied AI in the <em>ai-usecases</em> brief. Here, only the price reaction counts.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem a aposta de juros virou em direção à <em>alta</em> e derrubou ouro, Dow e cripto ao mesmo tempo. Hoje é exatamente essa narrativa hawkish que recebe seu primeiro contra-vento — e as cotações mostram isso. O relatório fraco de emprego de junho (<strong>apenas 57.000 novas vagas</strong>, taxa de desemprego de <strong>4,2 %</strong>) mina a tese de que \"o Fed <em>sobe</em> os juros na próxima reunião\" e esfria o medo de alta.<sup>[19]</sup> A prova mais limpa é o <strong>Bitcoin: 64.340,78 $ (+2,67 % em 24h)</strong>, de volta acima da linha de 64.000 $ pela primeira vez em dias.<sup>[14]</sup> Com isso, a perna de preço do meu segundo gatilho de Bitcoin está cumprida — mas a perna de fluxo, não: os fluxos dos ETFs à vista dos EUA são contestados e instáveis, um único registro de entrada por volta de 06.07. (~143 mi $) contrasta com saídas líquidas recentes em 08.07. (−84,9 mi $) e 09.07. (−95,3 mi $).<sup>[18]</sup> O gatilho que eu havia definido em 08./09.07. está, portanto, só meio verde. O dólar, coerente com isso, cede um pouco (<strong>DXY 100,86</strong>), e o <strong>ouro se estabilizou acima de 4.100 $</strong> depois da quebra para ~4.072 $ ontem.<sup>[11][13]</sup> Só uma peça hoje rema contra a maré: <strong>o Brent cai −3,09 % para 76,80 $</strong> — o prêmio de guerra do Irã racha num único dia, enquanto o WTI (72,29 $) ainda sustenta o balanço semanal de ~+5 %.<sup>[8][9]</sup> E talvez o número silencioso mais importante: a <strong>Nvidia (202,78 $, −0,66 %)</strong> negocia, depois de ~1 tri $ em perda de valor de mercado desde o recorde de maio, a apenas <strong>~18× o lucro esperado — abaixo do múltiplo do S&amp;P 500 amplo</strong>.<sup>[1][2]</sup> A líder de mercado em IA está, pela primeira vez em muito tempo, \"mais barata que a média\".</p>\n    <ul>\n      <li><span class=\"chip hot\">VIRADA NOS JUROS</span> <strong>Emprego fraco freia a tese de alta.</strong> 57.000 novas vagas, taxa de desemprego de 4,2 % — o mercado duvida da aposta de \"o Fed sobe os juros\" da semana passada. Esse é o fio condutor de quase tudo hoje.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.340,78 $</strong> (+2,67 % em 24h, 10.07. 06:30 ET), de volta acima de 64.000 $; contraprova do CoinGecko em 64.310,71 $. Os fluxos dos ETFs à vista dos EUA seguem contestados: um registro de entrada por volta de 06.07. contra saídas recentes em 08.07. (−84,9 mi $) e 09.07. (−95,3 mi $) — meu gatilho de fluxo não está, portanto, cumprido, só a perna de preço.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia 202,78 $</strong> (−0,66 %, fechamento de 09.07.), valor de mercado de ~4,91 tri $, ~1 tri $ abaixo do recorde de maio. Com <strong>~18× o lucro futuro</strong>, a líder de IA negocia <em>abaixo</em> do múltiplo do S&amp;P 500 — a avaliação se ajustou para baixo.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 76,80 $</strong> (−3,09 %/−2,45 $, 10.07. 06:15 ET), <strong>WTI 72,29 $</strong> (+0,30 %, +~5 % na semana). O prêmio de guerra cede um dia hoje — o primeiro teste real da minha tese de COMPRA, mas dentro da faixa-base.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro ~4.099–4.107 $/oz</strong> (−0,4 a −0,6 %, 10.07.), estabilizado acima de 4.100 $ depois da quebra de ontem, +22,48 % em relação ao ano anterior, −2,41 % no mês. Semana calma no fim das contas.</li>\n      <li><span class=\"chip\">TESLA</span> <strong>TSLA 406,55 $</strong> (+3,17 %, fechamento de 09.07.), de volta acima de 400 $ depois de três pregões no vermelho — sem catalisador datado. Para mim, é a melhor saída, não o fim da tese de VENDA.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.796,10 $</strong> (+2,9 % em 24h), ~233 bi $ de valor de mercado. Sobe em compasso com o BTC — alavancagem, não força própria. Manter.</li>\n      <li><span class=\"chip\">SETORES</span> Cauda longa no verde hoje: tokens de IA (TAO +4,2 %, RENDER +2,3 %, FET +2,2 %) e memes (DOGE +2,9 %) surfando no apetite por risco. Continua sendo beta cripto com rótulo de IA — não é investimento em IA.</li>\n      <li><span class=\"chip\">TERRITÓRIOS</span> Lançamentos de modelos e agentes ficam no boletim <em>ai-dev</em>, IA aplicada no boletim <em>ai-usecases</em>. Aqui só conta a reação do preço.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer la apuesta de tasas giró hacia una <em>subida</em> y presionó al mismo tiempo al oro, al Dow y a las criptomonedas. Hoy ese mismo relato hawkish recibe su primer contraviento — y las cotizaciones lo demuestran. El débil informe de empleo de junio (<strong>solo 57.000 nuevos puestos</strong>, tasa de desempleo <strong>4,2 %</strong>) socava la tesis de que \"la Fed sube tasas a continuación\" y enfría el miedo a las tasas.<sup>[19]</sup> La prueba más clara es <strong>Bitcoin: 64.340,78 $ (+2,67 % en 24 h)</strong>, de vuelta por primera vez en días sobre la línea de los 64.000.<sup>[14]</sup> Con eso se cumple la pata de <em>precio</em> de mi segundo disparador de Bitcoin — pero no la pata de <em>flujo</em>: los flujos de los ETF spot de EE. UU. son controvertidos y cambiantes, un único registro de entrada alrededor del 06.07. (~143 millones de $) contrasta con salidas netas recientes el 08.07. (−84,9 millones de $) y el 09.07. (−95,3 millones de $).<sup>[18]</sup> El disparador que fijé el 08./09.07. está, entonces, solo medio en verde. El dólar, en línea con esto, se debilita ligeramente (<strong>DXY 100,86</strong>), y <strong>el oro se estabilizó por encima de 4.100 $</strong> tras la ruptura de ayer a ~4.072 $.<sup>[11][13]</sup> Solo una pieza va hoy a contracorriente: <strong>el Brent cae −3,09 % hasta 76,80 $</strong> — la prima de guerra de Irán se erosiona en un solo día, mientras que el WTI (72,29 $) todavía sostiene el saldo semanal de ~+5 %.<sup>[8][9]</sup> Y quizá el dato silencioso más importante: <strong>Nvidia (202,78 $, −0,66 %)</strong> cotiza, tras perder ~1 billón de $ de valor de mercado desde su récord de mayo, a apenas <strong>~18× la ganancia esperada — por debajo del múltiplo del amplio S&amp;P 500</strong>.<sup>[1][2]</sup> El líder del mercado de IA es, por primera vez en mucho tiempo, \"más barato que el promedio\".</p>\n    <ul>\n      <li><span class=\"chip hot\">GIRO DE TASAS</span> <strong>Los débiles empleos frenan la tesis de subida.</strong> 57.000 nuevos puestos, tasa de desempleo 4,2 % — el mercado duda de la apuesta de \"la Fed sube tasas\" de la semana pasada. Es el hilo detrás de casi todo hoy.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.340,78 $</strong> (+2,67 % en 24 h, 10.07. 06:30 ET), de vuelta sobre los 64.000 $; verificación cruzada de CoinGecko en 64.310,71 $. Los flujos de los ETF spot de EE. UU. siguen siendo controvertidos: un registro de entrada alrededor del 06.07. frente a salidas recientes el 08.07. (−84,9 millones de $) y el 09.07. (−95,3 millones de $) — mi disparador de flujo <em>no</em> se cumple con esto, solo la pata de precio.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia 202,78 $</strong> (−0,66 %, cierre 09.07.), ~4,91 billones de $ de valor de mercado, ~1 billón de $ por debajo del récord de mayo. Con <strong>~18× la ganancia esperada</strong>, el líder del mercado de IA cotiza <em>por debajo</em> del múltiplo del S&amp;P 500 — la valuación se ha reajustado.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 76,80 $</strong> (−3,09 %/−2,45 $, 10.07. 06:15 ET), <strong>WTI 72,29 $</strong> (+0,30 %, +~5 % semanal). La prima de guerra cede un día — la primera prueba real de mi tesis de COMPRAR, pero dentro del rango base.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro ~4.099–4.107 $/oz</strong> (−0,4 a −0,6 %, 10.07.), estabilizado por encima de 4.100 $ tras la ruptura de ayer, +22,48 % frente al año anterior, −2,41 % en el mes. Semana tranquila en balance.</li>\n      <li><span class=\"chip\">TESLA</span> <strong>TSLA 406,55 $</strong> (+3,17 %, cierre 09.07.), de vuelta sobre los 400 $ tras tres días rojos — sin catalizador fechado. Para mí es un mejor punto de salida, no el fin de la tesis de VENDER.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.796,10 $</strong> (+2,9 % en 24 h), ~233 mil millones de $ de valor de mercado. Sube al mismo ritmo que BTC — apalancamiento, no fortaleza propia. Mantener.</li>\n      <li><span class=\"chip\">SECTORES</span> La cola larga hoy en verde: tokens de IA (TAO +4,2 %, RENDER +2,3 %, FET +2,2 %) y memes (DOGE +2,9 %) suben con el apetito de riesgo. Sigue siendo beta cripto con etiqueta de IA — no una inversión en IA.</li>\n      <li><span class=\"chip\">TEMAS</span> Los lanzamientos de modelos y agentes están en el boletín de <em>ai-dev</em>, la IA aplicada en el de <em>ai-usecases</em>. Aquí solo cuenta la reacción de precio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Kein spektakulärer Einzel-Bug heute, sondern ein Muster: Aufklärung und Fahrlässigkeit. Die öffentliche GitHub-API wird planvoll als Unternehmens-Spähwerkzeug missbraucht, die Nextcloud GmbH ließ eine interne Datenbank offen im Netz stehen, und ein CCC-Fund zeigt, wie ein ganzer Wechselrichter-Marktanteil sein Funk-Passwort im Klartext verschickt. Dazu läuft heute eine CISA-Patch-Frist ab, und die Release-Front ist voll: OpenSSH 10.4, ein Chrome-Whopper und npm v12, das die Lieferkette endlich zumacht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>KEV-Frist heute</strong>: Für vier am 7. Juli neu gelistete Lücken — angeführt von Adobe ColdFusion (CVE-2026-48282) — endet die US-Behörden-Patchfrist am 10. Juli, also heute.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>GitHub-Enumeration</strong>: Über 50 „Ghost\"-Accounts und gestohlene Tokens kartieren seit Oktober Firmen-Orgs und Repos — ein privates Repo wurde nachweislich geklont (Datadog).</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Nextcloud GmbH</strong>: 367.000 interne Datensätze (~8 GB) lagen offen im Netz — ein falsch konfigurierter Firmen-Elasticsearch, kein Produkt- oder Kunden-Bug.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Hoymiles-Wechselrichter</strong> funken ihr Funk-Passwort unverschlüsselt (CCC) — der Hersteller bedient rund 20 % des EU-Mikrowechselrichter-Marktes.</li>\n      <li><span class=\"chip\">Sec</span> <strong>SharePoint-On-Prem-RCE</strong> (CVE-2026-45659, CVSS 8,8) steht seit 1. Juli im KEV-Katalog — authentifizierte Codeausführung per Deserialisierung.</li>\n      <li><span class=\"chip good\">Sec</span> <strong>GitHubs Gegenzug</strong>: Secret-Scanning „Public Monitoring\" für Enterprises — Preview, ohne Aufpreis, scannt ganz github.com in Echtzeit.</li>\n      <li><span class=\"chip\">Release</span> <strong>OpenSSH 10.4</strong> (6. Juli): acht Fixes, u. a. SFTP-/SCP-Umleitungs-Bugs, plus experimentelle Post-Quanten-Signaturen.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (Juli) sperrt Install-Scripts, Git- und Remote-Deps per Default — die direkte Antwort auf das Lieferketten-Jahr.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome</strong>: 382 Sicherheitsfixes in einem Rutsch, 15 kritisch — Aushängeschild ist ein GPU-Use-after-free mit Sandbox-Escape-Potenzial.</li>\n      <li><span class=\"chip\">Release</span> <strong>Git 2.55</strong> &amp; <strong>Ubuntu Arm64</strong>: schnellere Repacks plus `git history fixup`; Live-Kernel-Patching jetzt auch auf Arm64.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU CRA</strong>: 24h/72h-Meldepflicht (Art. 14) ab 11. September — Bußgeld bis 15 Mio. € oder 2,5 % Umsatz.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Kein spektakulärer Einzel-Bug heute, sondern ein Muster: Aufklärung und Fahrlässigkeit. Die öffentliche GitHub-API wird planvoll als Unternehmens-Spähwerkzeug missbraucht, die Nextcloud GmbH ließ eine interne Datenbank offen im Netz stehen, und ein CCC-Fund zeigt, wie ein ganzer Wechselrichter-Marktanteil sein Funk-Passwort im Klartext verschickt. Dazu läuft heute eine CISA-Patch-Frist ab, und die Release-Front ist voll: OpenSSH 10.4, ein Chrome-Whopper und npm v12, das die Lieferkette endlich zumacht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>KEV-Frist heute</strong>: Für vier am 7. Juli neu gelistete Lücken — angeführt von Adobe ColdFusion (CVE-2026-48282) — endet die US-Behörden-Patchfrist am 10. Juli, also heute.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>GitHub-Enumeration</strong>: Über 50 „Ghost\"-Accounts und gestohlene Tokens kartieren seit Oktober Firmen-Orgs und Repos — ein privates Repo wurde nachweislich geklont (Datadog).</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Nextcloud GmbH</strong>: 367.000 interne Datensätze (~8 GB) lagen offen im Netz — ein falsch konfigurierter Firmen-Elasticsearch, kein Produkt- oder Kunden-Bug.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Hoymiles-Wechselrichter</strong> funken ihr Funk-Passwort unverschlüsselt (CCC) — der Hersteller bedient rund 20 % des EU-Mikrowechselrichter-Marktes.</li>\n      <li><span class=\"chip\">Sec</span> <strong>SharePoint-On-Prem-RCE</strong> (CVE-2026-45659, CVSS 8,8) steht seit 1. Juli im KEV-Katalog — authentifizierte Codeausführung per Deserialisierung.</li>\n      <li><span class=\"chip good\">Sec</span> <strong>GitHubs Gegenzug</strong>: Secret-Scanning „Public Monitoring\" für Enterprises — Preview, ohne Aufpreis, scannt ganz github.com in Echtzeit.</li>\n      <li><span class=\"chip\">Release</span> <strong>OpenSSH 10.4</strong> (6. Juli): acht Fixes, u. a. SFTP-/SCP-Umleitungs-Bugs, plus experimentelle Post-Quanten-Signaturen.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (Juli) sperrt Install-Scripts, Git- und Remote-Deps per Default — die direkte Antwort auf das Lieferketten-Jahr.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome</strong>: 382 Sicherheitsfixes in einem Rutsch, 15 kritisch — Aushängeschild ist ein GPU-Use-after-free mit Sandbox-Escape-Potenzial.</li>\n      <li><span class=\"chip\">Release</span> <strong>Git 2.55</strong> &amp; <strong>Ubuntu Arm64</strong>: schnellere Repacks plus `git history fixup`; Live-Kernel-Patching jetzt auch auf Arm64.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU CRA</strong>: 24h/72h-Meldepflicht (Art. 14) ab 11. September — Bußgeld bis 15 Mio. € oder 2,5 % Umsatz.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">No single spectacular bug today, but a pattern: reconnaissance and negligence. GitHub's public API is being deliberately abused as a corporate spying tool, Nextcloud GmbH left an internal database exposed on the open internet, and a CCC finding shows how an entire share of the inverter market broadcasts its radio password in plain text. On top of that, a CISA patch deadline expires today, and the release front is packed: OpenSSH 10.4, a Chrome whopper, and npm v12, which finally locks down the supply chain.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>KEV deadline today</strong>: for four flaws newly listed on July 7 — led by Adobe ColdFusion (CVE-2026-48282) — the US federal agency patch deadline ends on July 10, i.e. today.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>GitHub enumeration</strong>: Over 50 \"ghost\" accounts and stolen tokens have been mapping corporate orgs and repos since October — one private repo was demonstrably cloned (Datadog).</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Nextcloud GmbH</strong>: 367,000 internal records (~8 GB) sat exposed on the open internet — a misconfigured corporate Elasticsearch, not a product or customer bug.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Hoymiles inverters</strong> broadcast their radio password unencrypted (CCC) — the maker serves around 20% of the EU microinverter market.</li>\n      <li><span class=\"chip\">Sec</span> <strong>SharePoint on-prem RCE</strong> (CVE-2026-45659, CVSS 8.8) has been on the KEV catalog since July 1 — authenticated code execution via deserialization.</li>\n      <li><span class=\"chip good\">Sec</span> <strong>GitHub's countermove</strong>: Secret Scanning \"Public Monitoring\" for enterprises — preview, no extra cost, scans all of github.com in real time.</li>\n      <li><span class=\"chip\">Release</span> <strong>OpenSSH 10.4</strong> (July 6): eight fixes, including SFTP/SCP redirection bugs, plus experimental post-quantum signatures.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (July) blocks install scripts, git and remote deps by default — the direct answer to the year of supply-chain attacks.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome</strong>: 382 security fixes in one go, 15 critical — the standout is a GPU use-after-free with sandbox-escape potential.</li>\n      <li><span class=\"chip\">Release</span> <strong>Git 2.55</strong> &amp; <strong>Ubuntu Arm64</strong>: faster repacks plus `git history fixup`; live kernel patching now on Arm64 too.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>EU CRA</strong>: 24h/72h reporting duty (Art. 14) from September 11 — fines up to €15 million or 2.5% of revenue.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Nenhum bug isolado espetacular hoje, e sim um padrão: reconhecimento e negligência. A API pública do GitHub está sendo usada de forma planejada como ferramenta de espionagem corporativa, a Nextcloud GmbH deixou um banco de dados interno exposto na internet, e uma descoberta do CCC mostra como uma fatia inteira do mercado de microinversores transmite sua senha de rádio em texto puro. Some a isso o fato de que hoje vence um prazo da CISA, e a frente de releases está cheia: OpenSSH 10.4, uma atualização gigante do Chrome e o npm v12, que finalmente fecha a cadeia de suprimentos.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Prazo do KEV hoje</strong>: para quatro falhas listadas em 7 de julho — lideradas pela Adobe ColdFusion (CVE-2026-48282) — o prazo de correção das agências federais dos EUA termina em 10 de julho, ou seja, hoje.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Enumeração no GitHub</strong>: mais de 50 contas \"fantasma\" e tokens roubados mapeiam organizações e repositórios corporativos desde outubro — um repositório privado foi comprovadamente clonado (Datadog).</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Nextcloud GmbH</strong>: 367 mil registros internos (~8 GB) ficaram expostos na internet — um Elasticsearch corporativo mal configurado, não um bug de produto ou de cliente.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Inversores Hoymiles</strong> transmitem a senha de rádio sem criptografia (CCC) — o fabricante atende cerca de 20% do mercado europeu de microinversores.</li>\n      <li><span class=\"chip\">Sec</span> <strong>RCE no SharePoint on-prem</strong> (CVE-2026-45659, CVSS 8,8) está no catálogo KEV desde 1º de julho — execução de código autenticada via desserialização.</li>\n      <li><span class=\"chip good\">Sec</span> <strong>Contra-ataque do GitHub</strong>: Secret Scanning \"Public Monitoring\" para enterprises — em preview, sem custo adicional, varre todo o github.com em tempo real.</li>\n      <li><span class=\"chip\">Release</span> <strong>OpenSSH 10.4</strong> (6 de julho): oito correções, entre elas bugs de redirecionamento em SFTP/SCP, além de assinaturas pós-quânticas experimentais.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (julho) bloqueia scripts de instalação, dependências git e remotas por padrão — a resposta direta ao ano da cadeia de suprimentos.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome</strong>: 382 correções de segurança de uma só vez, 15 críticas — o destaque é um use-after-free de GPU com potencial de escape de sandbox.</li>\n      <li><span class=\"chip\">Release</span> <strong>Git 2.55</strong> &amp; <strong>Ubuntu Arm64</strong>: repacks mais rápidos e o comando `git history fixup`; live patching de kernel agora também em Arm64.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>EU CRA</strong>: obrigação de notificação em 24h/72h (Art. 14) a partir de 11 de setembro — multa de até 15 milhões de euros ou 2,5% do faturamento.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy no hay un bug espectacular aislado, sino un patrón: reconocimiento y negligencia. La API pública de GitHub está siendo usada de forma deliberada como herramienta de espionaje corporativo, Nextcloud GmbH dejó una base de datos interna expuesta en internet, y un hallazgo del CCC muestra cómo una porción entera del mercado de microinversores transmite su contraseña de radio en texto plano. A eso se suma que hoy vence un plazo de la CISA, y el frente de lanzamientos está lleno: OpenSSH 10.4, una actualización enorme de Chrome y npm v12, que por fin cierra la cadena de suministro.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Plazo del KEV hoy</strong>: para cuatro fallas listadas el 7 de julio — encabezadas por Adobe ColdFusion (CVE-2026-48282) — el plazo de parcheo de las agencias federales de EE. UU. termina el 10 de julio, es decir, hoy.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Enumeración en GitHub</strong>: más de 50 cuentas \"fantasma\" y tokens robados llevan desde octubre mapeando organizaciones y repositorios corporativos — un repositorio privado fue clonado de forma comprobada (Datadog).</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Nextcloud GmbH</strong>: 367,000 registros internos (~8 GB) quedaron expuestos en internet — un Elasticsearch corporativo mal configurado, no un bug de producto ni de cliente.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Inversores Hoymiles</strong> transmiten su contraseña de radio sin cifrar (CCC) — el fabricante atiende cerca del 20% del mercado europeo de microinversores.</li>\n      <li><span class=\"chip\">Sec</span> <strong>RCE en SharePoint on-prem</strong> (CVE-2026-45659, CVSS 8.8) está en el catálogo KEV desde el 1 de julio — ejecución de código autenticada vía deserialización.</li>\n      <li><span class=\"chip good\">Sec</span> <strong>Contraataque de GitHub</strong>: Secret Scanning \"Public Monitoring\" para enterprises — en preview, sin costo adicional, escanea todo github.com en tiempo real.</li>\n      <li><span class=\"chip\">Release</span> <strong>OpenSSH 10.4</strong> (6 de julio): ocho correcciones, entre ellas bugs de redirección en SFTP/SCP, más firmas poscuánticas experimentales.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (julio) bloquea por defecto los scripts de instalación y las dependencias de git y remotas — la respuesta directa al año de la cadena de suministro.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome</strong>: 382 correcciones de seguridad de un jalón, 15 críticas — lo más destacado es un use-after-free de GPU con potencial de escape de sandbox.</li>\n      <li><span class=\"chip\">Release</span> <strong>Git 2.55</strong> y <strong>Ubuntu Arm64</strong>: repacks más rápidos y el comando `git history fixup`; el live patching de kernel llega también a Arm64.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>EU CRA</strong>: obligación de reporte en 24h/72h (Art. 14) a partir del 11 de septiembre — multa de hasta 15 millones de euros o 2.5% de los ingresos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Innerhalb von drei Tagen sind drei Flaggschiff-Coding-Modelle erschienen: Grok 4.5 (08.07.), GPT-5.6 in den vollen Rollout (09.07.) und Metas Muse Spark 1.1 (09.07.). Der Reflex wäre, sie in eine Rangliste zu sortieren — nur ist genau die kaputt. Das wichtigste unabhängige Coding-Board, SWE-Bench Verified, gilt laut OpenAI selbst als kontaminiert; LiveCodeBench zeigt heute drei verschiedene „#1\" auf drei Trackern; Aiders Board ist acht Monate alt. Dieser Brief sortiert deshalb nicht nach Score, sondern danach, was wirklich neu ist — und markiert bei jeder Zahl, wer sie gemessen hat.</p>\n    <ul>\n      <li><span class=\"chip hot\">xAI</span> <strong>Grok 4.5 public seit 08.07.</strong>: 2 $/6 $ je Mio. Token (3–4× billiger als Opus 4.8), AA-Index 54, agentic Tool-Use #1. Coding-Zahlen anbieter-berichtet, gegen GPT-5.5 statt 5.6.</li>\n      <li><span class=\"chip hot\">Meta</span> <strong>Muse Spark 1.1 (09.07.)</strong>: 1M-Kontext, Computer-Use, Multi-Agent, 1,25 $/4,25 $ je Mio. Token. Bislang eine Fähigkeits-Ankündigung — kein unabhängiger Coding-Bench.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6-Zahlen sind da</strong>: AA Intelligence Index Sol 59 / Terra 55 / Luna 51; Coding Agent Index Sol 80 (führt). Auf SWE-Bench Verified noch gar nicht gelistet.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>OpenAI hat SWE-Bench Verified selbst für kaputt erklärt</strong> (23.02.): ~59 % der Failed-Tests fehlerhaft. Auf dem kontaminationsresistenten Pro fallen aktuelle Top-Modelle deutlich ab — Opus 4.8 88,6 %→69,2 %, GPT-5.5 82,6 %→58,6 %. Empfiehlt jetzt Pro.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Modell-Rangliste (AA Index v4.1)</strong>: unter verfügbaren Modellen Opus 4.8 (56) &gt; GPT-5.5 (55) &gt; Grok 4.5 (54); Fable 5 (60) top, aber „unavailable\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>LiveCodeBench: drei Tracker, drei #1</strong> (Gemini 3 Pro 91,7 % / Qwen3.7 Max 91,6 % / DeepSeek-V4-Pro-Max 93,5 %). Aider-Board 8 Monate alt — echte Fragmentierung.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>JetBrains AI für Teams/Orgs (07.07.)</strong>: herstelleragnostische Governance-Schicht (MCP + ACP), JetBrains Central, Lizenzen → on-demand-Credits.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7 (08.07.)</strong>, 1000 Token/s via Cerebras. Und: Claude Sonnet 5 ist jetzt Default in Devin UND Claude Code (~30 % weniger Quota).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Copilot Desktop-App + CLI v1.0.69</strong>; Cursor Automations/Bugbot 3× schneller; Plandex dormant (v2.2.1 seit 07/2025), OpenHands ohne Juli-Release.</li>\n    </ul></div>",
