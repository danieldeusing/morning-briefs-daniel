      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein bewegter Coding-Modell-Tag: OpenAI gibt mit der GPT-5.6-Familie (Sol/Terra/Luna) den ersten Blick auf seine nächste Generation frei — aber zunächst nur für „vertrauenswürdige Partner\" und die US-Regierung, was OpenAI selbst öffentlich kritisiert. Parallel zeigt sich, wie fragil Modell-Verfügbarkeit geworden ist: Anthropics Fable 5 war drei Tage lang in GitHub Copilot — bis eine US-Export-Control-Direktive es weltweit für alle ausländischen Nutzer sperrte. Und im Hintergrund tickt die MCP-Uhr: am 28. Juli wird der Protokoll-Unterbau, auf dem Daniels halbe Toolchain steht, umgekrempelt.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Preview seit 26.06, eingeschränkter Partner-Rollout. Sol $5/$30 pro 1M Token, neue „max\"/„ultra\"-Reasoning-Modi, Terminal-Bench 2.1 88,8 % — aber <em>kein</em> SWE-Bench-Score zum Start.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5</strong>: am 09.06 in Copilot GA, am 12.06 wieder raus — eine US-Export-Control-Direktive (Handelsminister Lutnick) zwang Anthropic, Fable 5 und Mythos 5 weltweit für alle ausländischen Nutzer zu sperren, ausgelöst durch einen gemeldeten „Jailbreak\". Ein <em>Export-Control</em>-/Sicherheits-Fall.</li>\n      <li><span class=\"chip\">MCP</span> <strong>MCP-RC 2026-07-28</strong>: stateless Kern (Session-Handshake fällt weg), volles JSON Schema 2020-12, OAuth/OIDC; Roots/Sampling/Logging werden deprecated. Finale Spec am 28.07.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex-Swap</strong>: GPT-5.6 wurde laut TechTimes still in Codex aktiviert — ein versteckter System-Prompt verriet den Tausch.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsofts 5B-Modell (kein Distillat), SWE-Bench Pro 51,2 % vs. Haiku 4.5 35,2 %, im VS-Code-Copilot-Picker in allen Tarifen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Copilot-Billing</strong>: seit 01.06 nutzungsbasiert mit AI-Credits pro Plan — agentische Sessions werden kosten-sensitiv.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong>: <code>/automate</code>-Skill, Slack-/GitHub-Trigger, Computer-Use. Claude Code v2.1.195 bringt <code>/rewind</code> und 37 % weniger CPU beim Streaming.</li>\n      <li><span class=\"chip\">Web</span> <strong>WebMCP</strong>: Google + Microsoft schlagen einen Web-Standard vor, der Webseiten-Funktionen als Agent-Tools annotiert — Chrome-149-Origin-Trial.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 (suspendiert) führt mit 95,0 %, Opus 4.8 mit 88,6 % das beste <em>aktiv verfügbare</em> Modell — aber die Aggregatoren widersprechen sich (siehe Skeptik-Box).</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">A busy day in the coding-model space: OpenAI gives its next-generation GPT-5.6 family (Sol/Terra/Luna) a first glimpse — but initially only to \"trusted partners\" and the US government, something OpenAI itself publicly criticizes. In parallel, model availability has proven fragile: Anthropic's Fable 5 was in GitHub Copilot for three days before a US export-control directive blocked it worldwide for all foreign users. And in the background, the MCP clock ticks: on July 28, the protocol infrastructure half the toolchain runs on gets rebuilt.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Preview since 06/26, limited partner rollout. Sol $5/$30 per 1M tokens, new \"max\"/\"ultra\" reasoning modes, Terminal Bench 2.1 88.8% — but <em>no</em> SWE-Bench score at launch.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5</strong>: GA in Copilot 06/09, pulled 06/12 — a US export-control directive (Commerce Secretary Lutnick) forced Anthropic to block Fable 5 and Mythos 5 worldwide for all foreign users, triggered by a reported \"jailbreak\". An <em>export-control</em>/security case.</li>\n      <li><span class=\"chip\">MCP</span> <strong>MCP-RC 2026-07-28</strong>: stateless core (session handshake removed), full JSON Schema 2020-12, OAuth/OIDC; Roots/Sampling/Logging deprecated. Final spec on 07/28.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex-Swap</strong>: GPT-5.6 was quietly activated in Codex for some users — a leaked system prompt revealed the swap.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsoft's 5B model (not a distillate), SWE-Bench Pro 51.2% vs. Haiku 4.5 35.2%, in VS Code Copilot picker across all tiers.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Copilot Billing</strong>: usage-based since 06/01 with AI Credits per plan — agentic sessions now cost- seletor Copilot do VS Code em todos os planos.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Copilot-Billing</strong>: baseado em uso desde 01/06 com AI-Credits por plano — sessões agênticas agora custam créditos.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.8</strong>: skill <code>/automate</code>, gatilhos Slack/GitHub, Computer Use. Claude Code v2.1.195 traz <code>/rewind</code> e 37% menos CPU durante streaming.</li>\n      <li><span class=\"chip\">Web</span> <strong>WebMCP</strong>: Google + Microsoft propõem um padrão web que anota funções de páginas como ferramentas de agentes — Chrome-149 Origin Trial em andamento.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 (suspenso) lidera com 95,0%, Opus 4.8 com 88,6% é o melhor modelo <em>disponível ativamente</em> — mas os agregadores se contradizem (veja caixa de ceticismo).</li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist Dienstag, der 30. Juni — und das beherrschende Thema in angewandter KI ist diese Woche kein neues Modell, sondern eine Rechnung. Seit Anthropic und OpenAI ihre Großkunden Anfang 2026 auf Token-Abrechnung umgestellt haben, sehen Firmen zum ersten Mal, was ihre KI wirklich kostet — und die Zahlen sind dramatisch: Uber verbrannte sein ganzes Jahresbudget für KI-Coding in vier Monaten, ein Anthropic-Kunde gab aus Versehen 500 Mio. $ in einem einzigen Monat aus, und Ubers COO sagt offen, dass die Verbindung zwischen Ausgabe und Geschäftsnutzen „noch nicht da\" ist. Daneben: HPE und NVIDIA bauen die „AI Factory\" für Konzerne aus, die EU hat ihre Hochrisiko-Frist-Verschiebung am 29. Juni formal beschlossen, und Schatten-KI frisst sich durch fast jede Belegschaft.</p>\n    <ul>\n      <li><span class=\"chip hot\">STUDY</span> <strong>Token-Rechnung kommt</strong>: Uber verbrauchte sein 2026-KI-Budget in 4 Monaten; 951 Mio. $ R&amp;D allein in Q1; pro Entwickler stieg der Token-Verbrauch um das 18,6-Fache in 9 Monaten.</li>\n      <li><span class=\"chip hot\">STUDY</span> <strong>ROI „noch nicht da\"</strong>: Uber-COO Macdonald kann die Linie von Token-Ausgabe zu Geschäftsnutzen nicht ziehen; ein Anthropic-Kunde verbrannte 500 Mio. $ in einem Monat aus Versehen.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>Gartner</strong>: Weltweite KI-Ausgaben 2,59 Bio. $ 2026 (+47 %); 80 % der Firmen bauen Stellen ab — aber <em>null</em> Korrelation zwischen Layoffs und höherem ROI.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>HPE + NVIDIA AI Factory</strong>: neue Vera-CPU-Server, NVIDIA Agent Toolkit, durchgängiges Confidential Computing — NYSE als früher Kunde.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: Der Rat hat den „Digital Omnibus\" am 29. Juni <em>formal angenommen</em> — die Hochrisiko-Frist (Annex III) rutscht 16 Monate auf den 2. Dez. 2027, die Kennzeichnungspflicht auf den 2. Dez. 2026. Beschlossen, tritt mit Veröffentlichung im Amtsblatt in Kraft.</li>\n      <li><span class=\"chip hot\">STUDY · Security</span> <strong>Schatten-KI</strong>: 59–78 % der Beschäftigten nutzen nicht freigegebene KI; nur 43 % der Firmen haben eine Richtlinie; +670.000 $ Schaden pro betroffenem Datenleck.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>Anthropic ↔ Microsoft</strong>: laut <em>The Information</em> frühe Gespräche über Claude-Inferenz auf Microsofts Maia-200-Chip — kein Deal, nur gemeldete Verhandlungen.</li>\n    </ul></div>",

 die Kennzeichnungspflicht auf den 2. Dez. 2026. Beschlossen, tritt mit Veröffentlichung im Amtsblatt in Kraft.</li>\n      <li><span class=\"chip hot\">STUDY · Security</span> <strong>Schatten-KI</strong>: 59–78 % der Beschäftigten nutzen nicht freigegebene KI; nur 43 % der Firmen haben eine Richtlinie; +670.000 $ Schaden pro betroffenem Datenleck.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>Anthropic ↔ Microsoft</strong>: laut <em>The Information</em> frühe Gespräche über Claude-Inferenz auf Microsofts Maia-200-Chip — kein Deal, nur gemeldete Verhandlungen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today is Tuesday, June 30 — and the dominant story in applied AI this week isn't a new model, it's a bill. Since Anthropic and OpenAI switched their large enterprise customers to token-based billing in early 2026, companies are seeing for the first time what their AI actually costs in production — and the numbers are dramatic: Uber burned through its entire annual AI coding budget in four months, an Anthropic customer accidentally spent $500M in a single month, and Uber's COO says openly that the link between spending and business value \"isn't there yet.\" Meanwhile: HPE and NVIDIA are scaling up the \"AI Factory\" for enterprises, the EU formally adopted its high-risk deadline extension on June 29, and shadow AI is spreading through nearly every workforce.</p>\n    <ul>\n      <li><span class=\"chip hot\">STUDY</span> <strong>Token bill arrives</strong>: Uber consumed its 2026 AI budget in 4 months; $951M in R&amp;D in Q1 alone; per-developer token consumption rose 18.6× in 9 months.</li>\n      <li><span class=\"chip hot\">STUDY</span> <strong>ROI \"not there yet\"</strong>: Uber COO Macdonald can't draw a line from token spend to business value; one Anthropic customer accidentally burned $500M in a single month.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>Gartner</strong>: Worldwide AI spending $2.59T in 2026 (+47%); 80% of firms are cutting headcount — but <em>zero</em> correlation between layoffs and higher ROI.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>HPE + NVIDIA AI Factory</strong>: new Vera CPU servers, NVIDIA Agent Toolkit, end-to-end Confidential Computing — NYSE as an early customer.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: The Council <em>formally adopted</em> the \"Digital Omnibus\" on June 29 — the high-risk deadline (Annex III) shifts 16 months to Dec. 2, 2027; the labeling obligation moves to Dec. 2, 2026. Decided; takes effect upon publication in the Official Journal.</li>\n      <li><span class=\"chip hot\">STUDY · Security</span> <strong>Shadow AI</strong>: 59–78% of employees use unsanctioned AI tools; only 43% of firms have a policy; +$670,000 in damages per affected data breach.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>Anthropic ↔ Microsoft</strong>: per <em>The Information</em>, early talks about running Claude inference on Microsoft's Maia 200 chip — no deal, only reported negotiations.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É terça-feira, 30 de junho — e o tema dominante em IA aplicada esta semana não é um novo modelo, mas uma conta. Desde que Anthropic e OpenAI migraram seus grandes clientes para cobrança por tokens no início de 2026, as empresas veem pela primeira vez o que sua IA realmente custa em produção — e os números são dramáticos: a Uber queimou seu orçamento anual inteiro de IA em quatro meses, um cliente da Anthropic gastou acidentalmente 500 milhões de dólares em um único mês, e o COO da Uber diz abertamente que a conexão entre gastos e valor comercial \"ainda não existe\". Enquanto isso: HPE e NVIDIA expandem a \"AI Factory\" para empresas, a UE formalmente adotou a prorrogação do prazo de alto risco em 29 de junho, e a IA nas sombras se espalha por quase toda a força de trabalho.</p>\n    <ul>\n      <li><span class=\"chip hot\">ESTUDO</span> <strong>Cobrança por tokens chega</strong>: a Uber consumiu seu orçamento de IA de 2026 em 4 meses; 951 milhões de dólares em P&amp;D apenas no Q1; consumo de tokens por desenvolvedor subiu 18,6 vezes em 9 meses.</li>\n      <li><span class=\"chip hot\">ESTUDO</span> <strong>ROI \"ainda não existe\"</strong>: o COO da Uber Macdonald não consegue traçar uma linha entre gastos com tokens e valor comercial; um cliente da Anthropic queimou 500 milhões de dólares em um mês por acidente.</li>\n      <li><span class=\"chip\">ESTUDO</span> <strong>Gartner</strong>: gastos globais com IA de 2,59 trilhões de dólares em 2026 (+47%); 80% das empresas reduziram quadro — mas <em>zero</em> correlação entre demissões e maior ROI.</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO</span> <strong>HPE + NVIDIA AI Factory</strong>: novos servidores Vera CPU, NVIDIA Agent Toolkit, Confidential Computing completo — NYSE como cliente antecipado.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>EU AI Act</strong>: O Conselho <em>adotou formalmente</em> o \"Omnibus Digital\" em 29 de junho — o prazo de alto risco (Anexo III) se desloca 16 meses para 02/12/2027; a obrigação de rotulagem vai para 02/12/2026. Decidido; entra em vigor com a publicação no Jornal Oficial.</li>\n      <li><span class=\"chip hot\">ESTUDO · Segurança</span> <strong>IA nas sombras</strong>: 59–78% dos funcionários usam IA não aprovada; apenas 43% das empresas têm política; +670.000 dólares de dano por violação afetada.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>Anthropic ↔ Microsoft</strong>: segundo <em>The Information</em>, negociações iniciais sobre inferência Claude no chip Maia-200 da Microsoft — sem acordo, apenas negociações relatadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es martes, 30 de junio — y el tema dominante en IA aplicada esta semana no es un modelo nuevo, sino una cuenta. Desde que Anthropic y OpenAI cambiaron a sus grandes clientes a facturación por tokens a principios de 2026, las empresas ven por primera vez lo que su IA realmente cuesta en producción — y los números son dramáticos: Uber quemó su presupuesto anual completo de IA en cuatro meses, un cliente de Anthropic gastó accidentalmente 500 millones de dólares en un mes, y el COO de Uber dice abiertamente que la conexión entre gasto y valor comercial \"no está ahí todavía\". Mientras tanto: HPE y NVIDIA amplían la \"AI Factory\" para empresas, la UE adoptó formalmente la prórroga del plazo de alto riesgo el 29 de junio, y la IA clandestina se extiende por casi toda la fuerza laboral.</p>\n    <ul>\n      <li><span class=\"chip hot\">ESTUDIO</span> <strong>La facturación por tokens llega</strong>: Uber consumió su presupuesto de IA de 2026 en 4 meses; 951 millones de dólares en I+D solo en Q1; consumo de tokens por desarrollador subió 18,6 veces en 9 meses.</li>\n      <li><span class=\"chip hot\">ESTUDIO</span> <strong>ROI \"no está ahí todavía\"</strong>: el COO de Uber Macdonald no puede trazar una línea entre gasto en tokens y valor comercial; un cliente de Anthropic quemó 500 millones de dólares en un mes por accidente.</li>\n      <li><span class=\"chip\">ESTUDIO</span> <strong>Gartner</strong>: gasto global en IA de 2,59 billones de dólares en 2026 (+47%); 80% de las empresas redujeron personal — pero <em>cero</em> correlación entre despidos y mayor ROI.</li>\n      <li><span class=\"chip good\">IMPLEMENTACIÓN</span> <strong>HPE + NVIDIA AI Factory</strong>: nuevos servidores Vera CPU, NVIDIA Agent Toolkit, Confidential Computing completo — NYSE como cliente anticipado.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>EU AI Act</strong>: El Consejo <em>adoptó formalmente</em> el \"Omnibus Digital\" el 29 de junio — el plazo de alto riesgo (Anexo III) se corre 16 meses al 02/12/2027; la obligación de etiquetado al 02/12/2026. Decidido; entra en vigor con la publicación en el Diario Oficial.</li>\n      <li><span class=\"chip hot\">ESTUDIO · Seguridad</span> <strong>IA clandestina</strong>: 59–78% de los empleados usan IA no aprobada; solo 43% de las empresas tienen política; +670.000 dólares de daño por brecha afectada.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>Anthropic ↔ Microsoft</strong>: según <em>The Information</em>, pláticas tempranas sobre inferencia Claude en el chip Maia-200 de Microsoft — sin acuerdo, solo negociaciones reportadas.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der DACH-Freelance-Markt dreht erstmals nach unten — und das ist für Daniel keine schlechte Nachricht, sondern ein Verhandlungs-Signal. Das Board ist voll (59 Treffer, 41 davon Fit ≥ 77), der Java/Angular-Strom läuft, aber die Gegenseite sitzt unter Druck: Wer jetzt eine gesicherte Pipeline liefert, verhandelt aus der stärkeren Position. Dazu zwei öffentliche Großtender, bei denen der Stack passt — aber die Umsatz- und Clearance-Hürde nur mit Partner zu nehmen ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX führt das Board</strong>: Java/Angular/AWS/Microservices Frankfurt, 80&nbsp;% remote, 48&nbsp;Monate, Fit&nbsp;90 — der nahezu perfekte Stack-Match des Tages.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Honorare kippen erstmals</strong>: DACH-Schnitt fällt auf 103&nbsp;€/h (von 104&nbsp;€), IT/Software bei 95&nbsp;€/h — erster gemessener Rückgang seit Beginn der Erhebung.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Käufermarkt-Beleg</strong>: 23&nbsp;% der IT/Software-Freelancer melden sinkende Auftragslage, 43&nbsp;% ohne gesicherte Pipeline — Druck liegt auf der Anbieterseite.</li>\n      <li><span class=\"chip good\">Remote</span> <strong>Volumen bleibt da</strong>: 54 Freelance-Listings, fast durchweg 80–100&nbsp;% remote, viele 24–48&nbsp;Monate Laufzeit — kein Auftrags-Loch, nur ein Preis-Loch.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Premium-Nische zieht an</strong>: Keil Telematik/IoT (Fit&nbsp;86) und Computer Futures E-Mobility/Automotive (Fit&nbsp;80) im 100–130&nbsp;€/h-Band — Daniels OEM-Referenzen ziehen.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>AI-Infra-Anker</strong>: JetBrains AI-Assistant-Infrastructure (Fit&nbsp;82, remote EU) und Anthropic Claude Code (Fit&nbsp;70) — beide AI-adjazent, beide im Filter.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>NRW-Polizei iBMS&nbsp;3.0</strong> (verifiziert, TED 406893-2026): €3&nbsp;Mio.+ Mindestumsatz, Frist 14.07.2026 — ISO&nbsp;27001 + ZÜP-Clearance → ⚠️&nbsp;Partner. Der solide Spur-3-Anker.</li>\n      <li><span class=\"chip\">TED</span> <strong>DPMA Patentsysteme</strong>: gemeldet, <strong>unabhängig nicht bestätigt</strong> — Eckdaten (Wert, Lose, Fristen, Umsatzschwellen) vor jeder Angebotsarbeit selbst prüfen. Falls real: Stack passt, aber Partner-Lücke.</li>\n      <li><span class=\"chip\">Start Juli</span> <strong>Sofort-Bedarf</strong>: mind. 5 Listings mit Start 01.07./Juli&nbsp;2026 (mund consulting, RED SAP, SPS, iSAX Consulting, Nemensis) — Kickoff in Tagen, nicht Wochen.</li>\n      <li><span class=\"chip\">Hinweis</span> <strong>Kein Posting-Datum</strong>: nahezu alle 59 Board-Einträge ohne Datums-Stempel im Quell-Board (eine Ausnahme; Aggregator-Limit) — als „n/a\" geführt, nicht geschätzt.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Der DACH-Freelance-Markt dreht erstmals nach unten — und das ist für Daniel keine schlechte Nachricht, sondern ein Verhandlungs-Signal. Das Board ist voll (59 Treffer, 41 davon Fit ≥ 77), der Java/Angular-Strom läuft, aber die Gegenseite sitzt unter Druck: Wer jetzt eine gesicherte Pipeline liefert, verhandelt aus der stärkeren Position. Dazu zwei öffentliche Großtender, bei denen der Stack passt — aber die Umsatz- und Clearance-Hürde nur mit Partner zu nehmen ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX führt das Board</strong>: Java/Angular/AWS/Microservices Frankfurt, 80&nbsp;% remote, 48&nbsp;Monate, Fit&nbsp;90 — der nahezu perfekte Stack-Match des Tages.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Honorare kippen erstmals</strong>: DACH-Schnitt fällt auf 103&nbsp;€/h (von 104&nbsp;€), IT/Software bei 95&nbsp;€/h — erster gemessener Rückgang seit Beginn der Erhebung.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Käufermarkt-Beleg</strong>: 23&nbsp;% der IT/Software-Freelancer melden sinkende Auftragslage, 43&nbsp;% ohne gesicherte Pipeline — Druck liegt auf der Anbieterseite.</li>\n      <li><span class=\"chip good\">Remote</span> <strong>Volumen bleibt da</strong>: 54 Freelance-Listings, fast durchweg 80–100&nbsp;% remote, viele 24–48&nbsp;Monate Laufzeit — kein Auftrags-Loch, nur ein Preis-Loch.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Premium-Nische zieht an</strong>: Keil Telematik/IoT (Fit&nbsp;86) und Computer Futures E-Mobility/Automotive (Fit&nbsp;80) im 100–130&nbsp;€/h-Band — Daniels OEM-Referenzen ziehen.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>AI-Infra-Anker</strong>: JetBrains AI-Assistant-Infrastructure (Fit&nbsp;82, remote EU) und Anthropic Claude Code (Fit&nbsp;70) — beide AI-adjazent, beide im Filter.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>NRW-Polizei iBMS&nbsp;3.0</strong> (verifiziert, TED 406893-2026): €3&nbsp;Mio.+ Mindestumsatz, Frist 14.07.2026 — ISO&nbsp;27001 + ZÜP-Clearance → ⚠️&nbsp;Partner. Der solide Spur-3-Anker.</li>\n      <li><span class=\"chip\">TED</span> <strong>DPMA Patentsysteme</strong>: gemeldet, <strong>unabhängig nicht bestätigt</strong> — Eckdaten (Wert, Lose, Fristen, Umsatzschwellen) vor jeder Angebotsarbeit selbst prüfen. Falls real: Stack passt, aber Partner-Lücke.</li>\n      <li><span class=\"chip\">Start Juli</span> <strong>Sofort-Bedarf</strong>: mind. 5 Listings mit Start 01.07./Juli&nbsp;2026 (mund consulting, RED SAP, SPS, iSAX Consulting, Nemensis) — Kickoff in Tagen, nicht Wochen.</li>\n      <li><span class=\"chip\">Hinweis</span> <strong>Kein Posting-Datum</strong>: nahezu alle 59 Board-Einträge ohne Datums-Stempel im Quell-Board (eine Ausnahme; Aggregator-Limit) — als „n/a\" geführt, nicht geschätzt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The DACH freelance market is turning down for the first time — and for Daniel that's not bad news, it's a negotiating signal. The board is full (59 hits, 41 with Fit ≥ 77), the Java/Angular stream is running, but the other side is under pressure: whoever can deliver a secured pipeline right now negotiates from the stronger position. Plus two large public tenders where the stack fits — but the revenue and clearance hurdle can only be cleared with a partner.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX leads the board</strong>: Java/Angular/AWS/Microservices Frankfurt, 80&nbsp;% remote, 48&nbsp;months, Fit&nbsp;90 — the day's near-perfect stack match.</li>\n      <li><span class=\"chip\">Market</span> <strong>Rates drop for the first time</strong>: DACH average falls to 103&nbsp;€/h (from 104&nbsp;€), IT/Software at 95&nbsp;€/h — first measured decline since the survey began.</li>\n      <li><span class=\"chip\">Market</span> <strong>Buyer's market confirmed</strong>: 23&nbsp;% of IT/Software freelancers report declining demand, 43&nbsp;% have no secured pipeline — pressure sits on the supply side.</li>\n      <li><span class=\"chip good\">Remote</span> <strong>Volume holds</strong>: 54 freelance listings, almost all 80–100&nbsp;% remote, many running 24–48&nbsp;months — no demand hole, just a price hole.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Premium niche is active</strong>: Keil Telematik/IoT (Fit&nbsp;86) and Computer Futures E-Mobility/Automotive (Fit&nbsp;80) in the 100–130&nbsp;€/h band — Daniel's OEM references pull weight.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>AI-infra anchor</strong>: JetBrains AI-Assistant-Infrastructure (Fit&nbsp;82, remote EU) and Anthropic Claude Code (Fit&nbsp;70) — both AI-adjacent, both in the filter.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>NRW Police iBMS&nbsp;3.0</strong> (verified, TED 406893-2026): €3&nbsp;M+ minimum revenue, deadline 2026-07-14 — ISO&nbsp;27001 + ZÜP clearance → ⚠️&nbsp;Partner. The solid Track-3 anchor.</li>\n      <li><span class=\"chip\">TED</span> <strong>DPMA Patent Systems</strong>: reported, <strong>could not independently verify</strong> — confirm key details (value, lots, deadlines, revenue thresholds) yourself before any bid work. If real: stack fits, but partner gap.</li>\n      <li><span class=\"chip\">July Start</span> <strong>Immediate demand</strong>: at least 5 listings starting 2026-07-01/July&nbsp;2026 (mund consulting, RED SAP, SPS, iSAX Consulting, Nemensis) — kickoff in days, not weeks.</li>\n      <li><span class=\"chip\">Heads up</span> <strong>No posting date</strong>: nearly all 59 board entries carry no date stamp in the source board (one exception; aggregator limit) — listed as \"n/a\", not estimated.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O mercado freelance DACH está caindo pela primeira vez — e para Daniel isso não é uma má notícia, é um sinal de negociação. O board está cheio (59 resultados, 41 com Fit ≥ 77), o fluxo Java/Angular está rodando, mas o outro lado está sob pressão: quem entregar uma pipeline garantida agora negocia da posição mais forte. Além disso, duas grandes licitações públicas onde o stack se encaixa — mas a barreira de faturamento e clearance só pode ser superada com um parceiro.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX lidera o board</strong>: Java/Angular/AWS/Microservices Frankfurt, 80&nbsp;% remoto, 48&nbsp;meses, Fit&nbsp;90 — o match de stack quase perfeito do dia.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Honorários caem pela primeira vez</strong>: média DACH cai para 103&nbsp;€/h (de 104&nbsp;€), TI/Software em 95&nbsp;€/h — primeira queda medida desde o início da pesquisa.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Mercado de comprador confirmado</strong>: 23&nbsp;% dos freelancers de TI/Software relatam queda na demanda, 43&nbsp;% sem pipeline garantida — pressão do lado da oferta.</li>\n      <li><span class=\"chip good\">Remoto</span> <strong>Volume se mantém</strong>: 54 listagens freelance, quase todas 80–100&nbsp;% remoto, muitas com duração de 24–48&nbsp;meses — não há lacuna de demanda, apenas de preço.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Nicho premium em alta</strong>: Keil Telematik/IoT (Fit&nbsp;86) e Computer Futures E-Mobility/Automotive (Fit&nbsp;80) na faixa de 100–130&nbsp;€/h — as referências OEM de Daniel pesam.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>Âncora AI-infra</strong>: JetBrains AI-Assistant-Infrastructure (Fit&nbsp;82, remoto EU) e Anthropic Claude Code (Fit&nbsp;70) — ambas AI-adjacentes, ambas no filtro.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>NRW-Polizei iBMS&nbsp;3.0</strong> (verificado, TED 406893-2026): faturamento mínimo €3&nbsp;M+, prazo 14/07/2026 — ISO&nbsp;27001 + ZÜP clearance → ⚠️&nbsp;Parceiro. A âncora sólida da Trilha 3.</li>\n      <li><span class=\"chip\">TED</span> <strong>DPMA Sistemas de Patentes</strong>: informado, <strong>não confirmado de forma independente</strong> — verificar os dados-chave (valor, lotes, prazos, limites de faturamento) antes de qualquer trabalho de proposta. Se real: stack se encaixa, mas há lacuna de parceiro.</li>\n      <li><span class=\"chip\">Início Julho</span> <strong>Demanda imediata</strong>: pelo menos 5 listagens com início em 01/07/julho&nbsp;2026 (mund consulting, RED SAP, SPS, iSAX Consulting, Nemensis) — kickoff em dias, não semanas.</li>\n      <li><span class=\"chip\">Atenção</span> <strong>Sem data de publicação</strong>: quase todas as 59 entradas do board não têm carimbo de data na fonte (uma exceção; limite do agregador) — registradas como \"n/a\", não estimadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El mercado freelance DACH cae por primera vez — y para Daniel eso no es una mala noticia, sino una señal de negociación. El tablero está lleno (59 resultados, 41 con Fit ≥ 77), el flujo Java/Angular está corriendo, pero el otro lado está bajo presión: quien entregue una pipeline garantizada ahora negocia desde la posición más fuerte. Además, dos grandes licitaciones públicas donde el stack encaja — pero la barrera de facturación y clearance solo se supera con un socio.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX lidera el tablero</strong>: Java/Angular/AWS/Microservices Frankfurt, 80&nbsp;% remoto, 48&nbsp;meses, Fit&nbsp;90 — el match de stack casi perfecto del día.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Tarifas caen por primera vez</strong>: promedio DACH baja a 103&nbsp;€/h (de 104&nbsp;€), TI/Software en 95&nbsp;€/h — primera caída registrada desde el inicio del estudio.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Mercado de compradores confirmado</strong>: 23&nbsp;% de los freelancers de TI/Software reportan caída en la demanda, 43&nbsp;% sin pipeline garantizada — presión del lado de la oferta.</li>\n      <li><span class=\"chip good\">Remoto</span> <strong>El volumen se mantiene</strong>: 54 listados freelance, casi todos 80–100&nbsp;% remoto, muchos con duración de 24–48&nbsp;meses — no hay brecha de demanda, solo de precio.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Nicho premium al alza</strong>: Keil Telematik/IoT (Fit&nbsp;86) y Computer Futures E-Mobility/Automotive (Fit&nbsp;80) en la banda de 100–130&nbsp;€/h — las referencias OEM de Daniel pesan.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>Ancla AI-infra</strong>: JetBrains AI-Assistant-Infrastructure (Fit&nbsp;82, remoto EU) y Anthropic Claude Code (Fit&nbsp;70) — ambas AI-adyacentes, ambas en el filtro.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>NRW-Polizei iBMS&nbsp;3.0</strong> (verificado, TED 406893-2026): facturación mínima €3&nbsp;M+, plazo 14/07/2026 — ISO&nbsp;27001 + ZÜP clearance → ⚠️&nbsp;Socio. El ancla sólida de la Pista 3.</li>\n      <li><span class=\"chip\">TED</span> <strong>DPMA Sistemas de Patentes</strong>: reportado, <strong>no confirmado de manera independiente</strong> — verificar los datos clave (valor, lotes, plazos, umbrales de facturación) antes de cualquier trabajo de propuesta. Si es real: el stack encaja, pero hay brecha de socio.</li>\n      <li><span class=\"chip\">Inicio Julio</span> <strong>Demanda inmediata</strong>: al menos 5 listados con inicio 01/07/julio&nbsp;2026 (mund consulting, RED SAP, SPS, iSAX Consulting, Nemensis) — arranque en días, no semanas.</li>\n      <li><span class=\"chip\">Atención</span> <strong>Sin fecha de publicación</strong>: casi todos los 59 registros del tablero no tienen sello de fecha en la fuente (una excepción; límite del agregador) — registrados como \"n/a\", no estimados.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist ein bitterer WM-Morgen. Paraguay hat die DFB-Elf gestern Nacht in Foxborough im Elfmeterschießen aus dem Turnier geworfen — die erste WM-Pleite Deutschlands vom Punkt überhaupt. Nagelsmann redet schon vom Abstieg in die zweite Reihe des Weltfußballs. Brasilien dagegen ist weiter, und heute Nacht laufen drei weitere Achtelfinals. Bei Freiburg läuft derweil das Transfer-Karussell heiß: Rekordverkauf Röhl, neuer Mittelstürmer aus Japan.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus</strong>: Deutschland 1:1 n.V. gegen Paraguay, 3:4 i.E. (Mo 29.06., 22:30 MESZ / 17:30 BRT, Foxborough). Erste Elfmeter-Pleite der DFB-WM-Geschichte.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Tah-Tor aberkannt</strong>: VAR nimmt den vermeintlichen Siegtreffer in der 105. zurück — Anton behindert den Keeper. Dann verschießt Tah den entscheidenden Elfer.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann</strong>: „Drittes Aus in Folge — wir gehören nicht mehr zur ersten Klasse.\"</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção weiter</strong>: Brasilien 2:1 gegen Japan (Mo 29.06., 19:00 MESZ / 14:00 BRT, Houston). Casemiro-Ausgleich, Martinelli-Siegtor in der 90.+6.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute, drei Achtelfinals</strong>: Elfenbeinküste–Norwegen 19:00 MESZ / 14:00 BRT, Frankreich–Schweden 23:00 MESZ / 18:00 BRT, Mexiko–Ecuador 03:00 MESZ (Mi) / 22:00 BRT.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg-Rekord</strong>: Merlin Röhl fest zu Everton, 25 Mio € — teuerster Verkauf der Vereinsgeschichte.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Neuer Neuner</strong>: Keisuke Goto (21, JPN) kommt für 13 Mio € aus Anderlecht. Torwart Mio Backhaus (22) für rund 12–15 Mio € aus Bremen.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Atubolu will weg</strong> — aber bisher keine Anfrage. Backhaus-Deal drängt ihn auf die Bank.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Abgeschlossen</strong>: Bayern Meister (89 Pkt, Rekord 122 Tore), Freiburg Siebter (47 Pkt) → Conference League.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: WM-Pause bis 23.07., Palmeiras führt mit 41 Punkten.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist ein bitterer WM-Morgen. Paraguay hat die DFB-Elf gestern Nacht in Foxborough im Elfmeterschießen aus dem Turnier geworfen — die erste WM-Pleite Deutschlands vom Punkt überhaupt. Nagelsmann redet schon vom Abstieg in die zweite Reihe des Weltfußballs. Brasilien dagegen ist weiter, und heute Nacht laufen drei weitere Achtelfinals. Bei Freiburg läuft derweil das Transfer-Karussell heiß: Rekordverkauf Röhl, neuer Mittelstürmer aus Japan.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus</strong>: Deutschland 1:1 n.V. gegen Paraguay, 3:4 i.E. (Mo 29.06., 22:30 MESZ / 17:30 BRT, Foxborough). Erste Elfmeter-Pleite der DFB-WM-Geschichte.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Tah-Tor aberkannt</strong>: VAR nimmt den vermeintlichen Siegtreffer in der 105. zurück — Anton behindert den Keeper. Dann verschießt Tah den entscheidenden Elfer.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann</strong>: „Drittes Aus in Folge — wir gehören nicht mehr zur ersten Klasse.\"</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção weiter</strong>: Brasilien 2:1 gegen Japan (Mo 29.06., 19:00 MESZ / 14:00 BRT, Houston). Casemiro-Ausgleich, Martinelli-Siegtor in der 90.+6.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute, drei Achtelfinals</strong>: Elfenbeinküste–Norwegen 19:00 MESZ / 14:00 BRT, Frankreich–Schweden 23:00 MESZ / 18:00 BRT, Mexiko–Ecuador 03:00 MESZ (Mi) / 22:00 BRT.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg-Rekord</strong>: Merlin Röhl fest zu Everton, 25 Mio € — teuerster Verkauf der Vereinsgeschichte.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Neuer Neuner</strong>: Keisuke Goto (21, JPN) kommt für 13 Mio € aus Anderlecht. Torwart Mio Backhaus (22) für rund 12–15 Mio € aus Bremen.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Atubolu will weg</strong> — aber bisher keine Anfrage. Backhaus-Deal drängt ihn auf die Bank.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Abgeschlossen</strong>: Bayern Meister (89 Pkt, Rekord 122 Tore), Freiburg Siebter (47 Pkt) → Conference League.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: WM-Pause bis 23.07., Palmeiras führt mit 41 Punkten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's a bitter World Cup morning. Paraguay knocked Germany out of the tournament last night in Foxborough on penalties — Germany's first-ever penalty shootout loss at a World Cup. Nagelsmann is already talking about a slide into the second tier of world football. Brazil, meanwhile, are through, and three more Round of 32 matches are on tap tonight. At Freiburg, the transfer carousel is spinning hard: a record sale in Röhl, a new striker from Japan.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>World Cup exit</strong>: Germany 1–1 a.e.t. vs. Paraguay, 3–4 on penalties (Mon 2026-06-29, 22:30 MESZ / 17:30 BRT, Foxborough). First penalty shootout defeat in DFB World Cup history.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Tah goal disallowed</strong>: VAR overturns the apparent winner in the 105th minute — Anton obstructs the keeper. Then Tah misses the decisive spot-kick.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann</strong>: \"Third exit in a row — we no longer belong to the top class.\"</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção through</strong>: Brazil 2–1 Japan (Mon 2026-06-29, 19:00 MESZ / 14:00 BRT, Houston). Casemiro equalizer, Martinelli winner in 90+6.</li>\n      <li><span class=\"chip\">WC</span> <strong>Today, three Round of 32 matches</strong>: Ivory Coast–Norway 19:00 MESZ / 14:00 BRT, France–Sweden 23:00 MESZ / 18:00 BRT, Mexico–Ecuador 03:00 MESZ (Wed) / 22:00 BRT.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg record</strong>: Merlin Röhl confirmed to Everton, €25 million — most expensive sale in club history.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>New striker</strong>: Keisuke Goto (21, JPN) joins for €13 million from Anderlecht. Goalkeeper Mio Backhaus (22) for around €12–15 million from Bremen.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Atubolu wants out</strong> — but no offer yet. The Backhaus deal pushes him to the bench.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season done</strong>: Bayern champions (89 pts, record 122 goals), Freiburg seventh (47 pts) → Conference League.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão on pause</strong>: World Cup break until 2026-07-23, Palmeiras lead with 41 points.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É uma manhã amarga na Copa do Mundo. O Paraguai eliminou a Alemanha em Foxborough na madrugada passada em uma disputa de pênaltis — a primeira derrota nos pênaltis da Alemanha na história de uma Copa do Mundo. Nagelsmann já fala em queda para a segunda divisão do futebol mundial. O Brasil, por sua vez, avançou, e hoje à noite mais três jogos das oitavas de final. No Freiburg, o carrossel de transferências esquenta: a venda recorde de Röhl e um novo atacante vindo do Japão.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminação da Copa</strong>: Alemanha 1:1 na prorrogação contra Paraguai, 3:4 nos pênaltis (seg 29/06, 22:30 MESZ / 17:30 BRT, Foxborough). Primeira derrota da DFB nos pênaltis na história da Copa do Mundo.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Gol de Tah anulado</strong>: VAR cancela o suposto gol da vitória no 105º minuto — Anton obstruiu o goleiro. Em seguida, Tah perde o pênalti decisivo.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann</strong>: \"Terceira eliminação seguida — não pertencemos mais à primeira classe.\"</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção avança</strong>: Brasil 2:1 contra Japão (seg 29/06, 19:00 MESZ / 14:00 BRT, Houston). Empate de Casemiro, gol da vitória de Martinelli no 90+6.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Hoje, três oitavas de final</strong>: Costa do Marfim–Noruega 19:00 MESZ / 14:00 BRT, França–Suécia 23:00 MESZ / 18:00 BRT, México–Equador 03:00 MESZ (qua) / 22:00 BRT.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Recorde do Freiburg</strong>: Merlin Röhl confirmado para o Everton, 25 Mio € — venda mais cara da história do clube.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Novo centroavante</strong>: Keisuke Goto (21, JPN) chega por ~13 Mio € do Anderlecht. Goleiro Mio Backhaus (22) por cerca de 12–15 Mio € do Bremen.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Atubolu quer sair</strong> — mas ainda sem oferta concreta. O acordo com Backhaus o coloca no banco.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Encerrada</strong>: Bayern campeão (89 pts, recorde de 122 gols), Freiburg sétimo (47 pts) → Conference League.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausado</strong>: Pausa da Copa até 23/07, Palmeiras lidera com 41 pontos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es una mañana amarga en el Mundial. Paraguay eliminó a Alemania anoche en Foxborough en una tanda de penales — la primera derrota de Alemania en penales en una Copa del Mundo. Nagelsmann ya habla de caer a la segunda división del fútbol mundial. Brasil, en cambio, avanzó, y esta noche hay tres octavos de final más. Mientras tanto, el carrusel de transferencias en Freiburg está a todo vapor: venta récord de Röhl y un nuevo delantero desde Japón.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Fuera del Mundial</strong>: Alemania 1:1 t.e. contra Paraguay, 3:4 en penales (lun 29/06, 22:30 MESZ / 17:30 BRT, Foxborough). Primera derrota de la DFB en penales en la historia de la Copa del Mundo.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Gol de Tah anulado</strong>: el VAR cancela el supuesto gol de la victoria en el minuto 105 — Antón obstruyó al portero. Después Tah falla el penal decisivo.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann</strong>: \"Tercera eliminación seguida — ya no pertenecemos a la primera clase.\"</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção avanza</strong>: Brasil 2:1 contra Japón (lun 29/06, 19:00 MESZ / 14:00 BRT, Houston). Empate de Casemiro, gol de la victoria de Martinelli en el 90+6.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Hoy, tres octavos de final</strong>: Costa de Marfil–Noruega 19:00 MESZ / 14:00 BRT, Francia–Suecia 23:00 MESZ / 18:00 BRT, México–Ecuador 03:00 MESZ (mié) / 22:00 BRT.</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>Récord Freiburg</strong>: Merlin Röhl confirmado al Everton, 25 Mio € — la venta más cara de la historia del club.</li>\n      <li><span class=\"chip\">Transferencia</span> <strong>Nuevo delantero</strong>: Keisuke Goto (21, JPN) llega por ~13 Mio € desde Anderlecht. El portero Mio Backhaus (22) por alrededor de 12–15 Mio € desde Bremen.</li>\n      <li><span class=\"chip\">Transferencia</span> <strong>Atubolu quiere irse</strong> — pero aún sin oferta concreta. El acuerdo con Backhaus lo manda a la banca.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada cerrada</strong>: Bayern campeón (89 pts, récord 122 goles), Freiburg séptimo (47 pts) → Conference League.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão en pausa</strong>: Pausa del Mundial hasta 23/07, Palmeiras lidera con 41 puntos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Doppel-Sonntag zum Saison-Höhepunkt: In Spielberg holt George Russell den Sieg und hält Mercedes auf einer makellosen Pole-Serie — alle acht Pole-Positions 2026 gingen an den Silberpfeil. In Assen krönt sich Ai Ogura zum ersten japanischen MotoGP-Sieger seit 22 Jahren, während Tabellenführer Bezzecchi im Kies landet und Jorge Martin die WM übernimmt. Beide Titelkämpfe sind so eng wie selten — und nächste Woche kommt der Motorsport nach Hause: die WEC fährt 6 Stunden in Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell siegt in Österreich</strong>: vor Verstappen (+1,6 s) und Antonelli (+2,0 s). Mercedes-Doppel-Podium.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> mit 171 Pkt vor Russell (131) — Lücke geschrumpft auf 40 Punkte.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes 8/8 Poles</strong>: makellose Pole-Serie 2026 — und 98 Punkte Vorsprung bei den Konstrukteuren.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Ogura gewinnt Assen</strong>: erster MotoGP-Sieg, erster japanischer Premier-Class-Sieger seit Tamada 2004.</li>\n      <li><span class=\"chip\">MotoGP-WM</span> <strong>Martin übernimmt</strong>: 193 Pkt vor Bezzecchi (186), der nach Sturz die Führung verliert. Vierkampf binnen 25 Punkten.</li>\n      <li><span class=\"chip\">F1</span> <strong>Nächstes Rennen Silverstone</strong> (3.–5. Juli): erstes Sprint-Wochenende dort seit 2021. Rennen So 12:00 BRT.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo</strong> (12. Juli, Interlagos): Toyota führt die Hersteller mit 132 Pkt. Rennstart So 06:30 BRT.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein Doppel-Sonntag zum Saison-Höhepunkt: In Spielberg holt George Russell den Sieg und hält Mercedes auf einer makellosen Pole-Serie — alle acht Pole-Positions 2026 gingen an den Silberpfeil. In Assen krönt sich Ai Ogura zum ersten japanischen MotoGP-Sieger seit 22 Jahren, während Tabellenführer Bezzecchi im Kies landet und Jorge Martin die WM übernimmt. Beide Titelkämpfe sind so eng wie selten — und nächste Woche kommt der Motorsport nach Hause: die WEC fährt 6 Stunden in Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell siegt in Österreich</strong>: vor Verstappen (+1,6 s) und Antonelli (+2,0 s). Mercedes-Doppel-Podium.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> mit 171 Pkt vor Russell (131) — Lücke geschrumpft auf 40 Punkte.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes 8/8 Poles</strong>: makellose Pole-Serie 2026 — und 98 Punkte Vorsprung bei den Konstrukteuren.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Ogura gewinnt Assen</strong>: erster MotoGP-Sieg, erster japanischer Premier-Class-Sieger seit Tamada 2004.</li>\n      <li><span class=\"chip\">MotoGP-WM</span> <strong>Martin übernimmt</strong>: 193 Pkt vor Bezzecchi (186), der nach Sturz die Führung verliert. Vierkampf binnen 25 Punkten.</li>\n      <li><span class=\"chip\">F1</span> <strong>Nächstes Rennen Silverstone</strong> (3.–5. Juli): erstes Sprint-Wochenende dort seit 2021. Rennen So 12:00 BRT.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo</strong> (12. Juli, Interlagos): Toyota führt die Hersteller mit 132 Pkt. Rennstart So 06:30 BRT.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A double-header Sunday at the season's peak: In Spielberg, George Russell takes victory and keeps Mercedes on a flawless pole streak — all eight pole positions in 2026 went to the Silver Arrows. In Assen, Ai Ogura crowns himself the first Japanese MotoGP winner in 22 years, while championship leader Bezzecchi ends up in the gravel and Jorge Martin takes the title lead. Both title fights are as tight as they come — and next week motorsport comes home: the WEC runs 6 hours at Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell wins in Austria</strong>: ahead of Verstappen (+1.6 s) and Antonelli (+2.0 s). Mercedes double podium.</li>\n      <li><span class=\"chip\">F1 WDC</span> <strong>Antonelli leads</strong> with 171 pts ahead of Russell (131) — gap shrinks to 40 points.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes 8/8 poles</strong>: flawless pole streak in 2026 — and 98-point lead in the constructors' championship.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Ogura wins Assen</strong>: maiden MotoGP victory, first Japanese premier-class winner since Tamada in 2004.</li>\n      <li><span class=\"chip\">MotoGP WDC</span> <strong>Martin takes the lead</strong>: 193 pts ahead of Bezzecchi (186), who loses the top spot after his crash. Four-way fight within 25 points.</li>\n      <li><span class=\"chip\">F1</span> <strong>Next race Silverstone</strong> (July 3–5): first sprint weekend there since 2021. Race Sun 12:00 BRT.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h of São Paulo</strong> (July 12, Interlagos): Toyota leads manufacturers with 132 pts. Race start Sun 06:30 BRT.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um fim de semana duplo no auge da temporada: em Spielberg, George Russell conquista a vitória e mantém a Mercedes em uma sequência impecável de pole positions — todas as oito pole positions de 2026 foram para as Flechas de Prata. Em Assen, Ai Ogura se torna o primeiro vencedor de MotoGP japonês em 22 anos, enquanto o líder do campeonato Bezzecchi termina na gravilha e Jorge Martin assume a liderança. Ambas as lutas pelo título estão extremamente apertadas — e na próxima semana o motorsport volta pra casa: o WEC tem 6 horas em Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell vence na Áustria</strong>: à frente de Verstappen (+1,6 s) e Antonelli (+2,0 s). Pódio duplo da Mercedes.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli lidera</strong> com 171 pts sobre Russell (131) — diferença reduz para 40 pontos.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes 8/8 pole</strong>: sequência impecável de pole positions em 2026 — e 98 pontos de vantagem no campeonato de construtores.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Ogura vence Assen</strong>: primeira vitória em MotoGP, primeiro piloto japonês da classe premier desde Tamada em 2004.</li>\n      <li><span class=\"chip\">MotoGP-WM</span> <strong>Martin assume a liderança</strong>: 193 pts sobre Bezzecchi (186), que perde a liderança após queda. Quatro pilotos em 25 pontos.</li>\n      <li><span class=\"chip\">F1</span> <strong>Próxima corrida Silverstone</strong> (3–5 julho): primeiro fim de semana sprint lá desde 2021. Corrida dom 12:00 BRT.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h de São Paulo</strong> (12 julho, Interlagos): Toyota lidera construtores com 132 pts. Saída dom 06:30 BRT.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un fin de semana doble en el apogeo de la temporada: en Spielberg, George Russell logra la victoria y mantiene a Mercedes en una racha de poles impecable — las ocho posiciones de salida de 2026 fueron para las Flechas de Plata. En Assen, Ai Ogura se convierte en el primer ganador de MotoGP japonés en 22 años, mientras el líder de campeonato Bezzecchi termina en la grava y Jorge Martin se adueña del liderato. Ambas luchas por el título son tan cerradas como pocas — y la próxima semana el motorsport regresa a casa: el WEC corre 6 horas en Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell gana en Austria</strong>: por delante de Verstappen (+1,6 s) y Antonelli (+2,0 s). Podio doble de Mercedes.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli lidera</strong> con 171 pts sobre Russell (131) — brecha se reduce a 40 puntos.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes 8/8 poles</strong>: racha impecable de poles en 2026 — y 98 puntos de ventaja en el campeonato de constructores.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Ogura gana Assen</strong>: primer triunfo en MotoGP, primer piloto japonés de la clase premier desde Tamada en 2004.</li>\n      <li><span class=\"chip\">MotoGP-WM</span> <strong>Martin toma el liderato</strong>: 193 pts sobre Bezzecchi (186), quien pierde el primero tras su caída. Pelea de cuatro en 25 puntos.</li>\n      <li><span class=\"chip\">F1</span> <strong>Próxima carrera Silverstone</strong> (3–5 julio): primer fin de semana sprint ahí desde 2021. Carrera dom 12:00 BRT.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h de São Paulo</strong> (12 julio, Interlagos): Toyota lidera constructores con 132 pts. Salida dom 06:30 BRT.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Zyklon ist durchgezogen, der Himmel klart auf — und ab Mittwoch wird es im Norte Pioneiro sieben Tage am Stück trocken und kühl. Genau richtig für das große Festa-Junina-Wochenende. Eine Sache aber zuerst: In Paraná steigen die Atemwegs-Klinikfälle bei Kleinkindern, fast die Hälfte davon durch das VSR-Virus. Mit einem einen Monat alten Baby im Haus ist das diese Woche der wichtigste Satz im Brief.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>VSR-Alert</strong>: Paraná auf SRAG-Risikolevel, VSR treibt ~48 % der Klinik-Atemwegsfälle bei Kindern bis 4 — Baby-Schutzmaßnahmen unten.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Aufklarung</strong>: Jacarezinho/Ribeirão Claro ab 01.07 sieben Tage trocken, kühl 12–27 °C. Der Stark-Regen-Alert betrifft den Süden PR, nicht uns.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina-Peak</strong>: Quermesse am Santuário N.S. Aparecida + JuninFest São Vicente, beide Sa/So 04.–05.07 in Londrina, Eintritt frei.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Família no Parque</strong> läuft im Parque Villa-Lobos (SP) bis 02.08 — Riesen-Aufblas-Rutsche, Eintritt frei. Wochenend-Trip-Material.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Anime Friends</strong> 02.–05.07 im Anhembi (SP) — was für den 8-Jährigen, nichts fürs Baby (200 000+ Besucher).</li>\n      <li><span class=\"chip\">Schule</span> <strong>Letzte Woche vor den Ferien</strong>: Landesschulen PR haben bis Fr 10.07 Unterricht, Ferien 13.–24.07.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue ruhig</strong>: Paraná 2026 fast 96 % unter Vorjahr; Region Jacarezinho 73 bestätigte Fälle, null Tote.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Zyklon ist durchgezogen, der Himmel klart auf — und ab Mittwoch wird es im Norte Pioneiro sieben Tage am Stück trocken und kühl. Genau richtig für das große Festa-Junina-Wochenende. Eine Sache aber zuerst: In Paraná steigen die Atemwegs-Klinikfälle bei Kleinkindern, fast die Hälfte davon durch das VSR-Virus. Mit einem einen Monat alten Baby im Haus ist das diese Woche der wichtigste Satz im Brief.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>VSR-Alert</strong>: Paraná auf SRAG-Risikolevel, VSR treibt ~48 % der Klinik-Atemwegsfälle bei Kindern bis 4 — Baby-Schutzmaßnahmen unten.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Aufklarung</strong>: Jacarezinho/Ribeirão Claro ab 01.07 sieben Tage trocken, kühl 12–27 °C. Der Stark-Regen-Alert betrifft den Süden PR, nicht uns.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina-Peak</strong>: Quermesse am Santuário N.S. Aparecida + JuninFest São Vicente, beide Sa/So 04.–05.07 in Londrina, Eintritt frei.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Família no Parque</strong> läuft im Parque Villa-Lobos (SP) bis 02.08 — Riesen-Aufblas-Rutsche, Eintritt frei. Wochenend-Trip-Material.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Anime Friends</strong> 02.–05.07 im Anhembi (SP) — was für den 8-Jährigen, nichts fürs Baby (200 000+ Besucher).</li>\n      <li><span class=\"chip\">Schule</span> <strong>Letzte Woche vor den Ferien</strong>: Landesschulen PR haben bis Fr 10.07 Unterricht, Ferien 13.–24.07.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue ruhig</strong>: Paraná 2026 fast 96 % unter Vorjahr; Region Jacarezinho 73 bestätigte Fälle, null Tote.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The cyclone has passed, the sky is clearing — and starting Wednesday it will be dry and cool in the Norte Pioneiro for seven straight days. Perfect timing for the big Festa Junina weekend. One thing first, though: respiratory clinic cases in young children are rising across Paraná, with RSV accounting for nearly half of them. With a one-month-old baby in the house, that's the most important sentence in this brief.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV alert</strong>: Paraná at SRAG risk level, RSV driving ~48% of respiratory hospitalizations in children under 4 — infant protection measures below.</li>\n      <li><span class=\"chip good\">Weather</span> <strong>Clearing up</strong>: Jacarezinho/Ribeirão Claro from 01.07 seven days dry, cool 12–27 °C. The heavy rain alert affects southern Paraná, not us.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina peak</strong>: Quermesse at Santuário N.S. Aparecida + JuninFest São Vicente, both Sat/Sun 04.–05.07 in Londrina, free admission.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Família no Parque</strong> runs at Parque Villa-Lobos (SP) through 02.08 — giant inflatable slide, free admission. Weekend trip material.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Anime Friends</strong> 02.–05.07 at Anhembi (SP) — great for the 8-year-old, not for baby (200,000+ attendees).</li>\n      <li><span class=\"chip\">School</span> <strong>Last week before vacation</strong>: Paraná state schools have classes through Fri 10.07, vacation 13.–24.07.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue quiet</strong>: Paraná 2026 nearly 96% below last year; Jacarezinho region 73 confirmed cases, zero deaths.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O ciclone passou, o céu está clareando — e a partir de quarta-feira será seco e fresco no Norte Pioneiro por sete dias seguidos. Perfeito para o grande fim de semana de Festa Junina. Uma coisa primeiro, porém: os casos de inflamação respiratória nas clínicas estão aumentando no Paraná entre crianças pequenas, com o VSR responsável por quase metade deles. Com um bebê de um mês em casa, essa é a frase mais importante deste briefing.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Alerta VSR</strong>: Paraná em nível de risco SRAG, VSR causando ~48% das hospitalizações respiratórias em menores de 4 — medidas de proteção do bebê abaixo.</li>\n      <li><span class=\"chip good\">Tempo</span> <strong>Clareando</strong>: Jacarezinho/Ribeirão Claro a partir de 01.07 sete dias secos, fresco 12–27 °C. O alerta de chuva intensa afeta o sul do Paraná, não a gente.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Pico Festa Junina</strong>: Quermesse no Santuário N.S. Aparecida + JuninFest São Vicente, ambas sab/dom 04.–05.07 em Londrina, entrada grátis.</li>\n      <li><span class=\"chip\">Viagem</span> <strong>Família no Parque</strong> funciona no Parque Villa-Lobos (SP) até 02.08 — tobogã inflável gigante, entrada grátis. Material para viagem de fim de semana.</li>\n      <li><span class=\"chip\">Viagem</span> <strong>Anime Friends</strong> 02.–05.07 no Anhembi (SP) — ótimo para o garoto de 8 anos, não para o bebê (200 mil+ visitantes).</li>\n      <li><span class=\"chip\">Escola</span> <strong>Última semana antes das férias</strong>: Escolas estaduais do Paraná têm aulas até sex 10.07, férias 13.–24.07.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue calma</strong>: Paraná 2026 quase 96% abaixo do ano anterior; região de Jacarezinho 73 casos confirmados, zero mortes.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El ciclón pasó, el cielo se está despejando — y a partir del miércoles será seco y fresco en el Norte Pioneiro durante siete días seguidos. Perfecto para el gran fin de semana de Festa Junina. Una cosa primero, sin embargo: los casos de problemas respiratorios en las clínicas están aumentando en Paraná entre niños pequeños, con el VRS responsable de casi la mitad de ellos. Con un bebé de un mes en casa, esa es la frase más importante de este boletín.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Alerta VRS</strong>: Paraná en nivel de riesgo SRAG, VRS causando ~48% de hospitalizaciones respiratorias en menores de 4 — medidas de protección del bebé abajo.</li>\n      <li><span class=\"chip good\">Clima</span> <strong>Despejándose</strong>: Jacarezinho/Ribeirão Claro a partir de 01.07 siete días secos, fresco 12–27 °C. La alerta de lluvia intensa afecta al sur de Paraná, no a nosotros.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Pico Festa Junina</strong>: Quermesse en Santuário N.S. Aparecida + JuninFest São Vicente, ambas sáb/dom 04.–05.07 en Londrina, entrada gratis.</li>\n      <li><span class=\"chip\">Viaje</span> <strong>Família no Parque</strong> funciona en Parque Villa-Lobos (SP) hasta 02.08 — tobogán inflable gigante, entrada gratis. Material para viaje de fin de semana.</li>\n      <li><span class=\"chip\">Viaje</span> <strong>Anime Friends</strong> 02.–05.07 en Anhembi (SP) — excelente para el niño de 8 años, no para el bebé (200 mil+ visitantes).</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Última semana antes de vacaciones</strong>: Las escuelas estatales de Paraná tienen clases hasta vie 10.07, vacaciones 13.–24.07.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue tranquilo</strong>: Paraná 2026 casi 96% por debajo del año anterior; región de Jacarezinho 73 casos confirmados, cero muertes.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 30. Juni — Wochenthema <em>Wirtschaft &amp; Finanzen</em>, heute Teil VI: <em>Unternehmensführung &amp; Management</em>. Das Vokabular, mit dem man ein Team, eine Strategie und seine Zahlen steuert: ein Team <em>führen</em> (<em>liderar</em>), Aufgaben <em>delegieren</em>, eine <em>Strategie</em> festlegen, Ziele <em>messen</em> und sehen, ob man <em>auf Kurs</em> ist. 31 Einträge, 11 Verben mit voller Konjugation — inklusive der berüchtigten Orthografie-Traps <em>deleguei / delegué</em> (g→gu) und <em>yo dirijo</em> (g→j) — plus 3 Auffrischungen aus dem Selbstständigen-Montag vom 1. Juni und dem Kapitalanlage-Montag vom 15. Juni (<em>gründen, diversifizieren, der Chef</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Chef ≠ EN chef</strong> — der deutsche <em>Chef</em> ist der Vorgesetzte (EN <em>boss / manager</em>), nicht der Koch. EN <em>chef</em> = DE <em>der Küchenchef</em> / PT <em>o chef de cozinha</em> / ES <em>el chef</em>. PT für „Chef\" = <em>o chefe</em>, ES = <em>el jefe</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Kontrolle ≠ EN control</strong> — die deutsche <em>Kontrolle</em> ist oft eine Prüfung/Überprüfung (EN <em>check / inspection</em>). EN <em>control</em> im Sinn von „Steuerung/Beherrschung\" ist DE <em>die Steuerung</em>. Beim <em>Controlling</em> stecken beide Bedeutungen drin.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>EN to assist ≠ „assistir\"</strong> — PT <em>assistir</em> heißt meist „zuschauen\" (<em>assistir à reunião</em> = an der Besprechung teilnehmen / zusehen). „Jemandem assistieren/helfen\" ist PT <em>ajudar</em>, ES <em>ayudar</em>. EN <em>to assist</em> = helfen.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>gerir vs. liderar/administrar</strong> — „ein Unternehmen leiten\" ist im BR-PT <em>gerir</em> oder <em>administrar</em>, ein Team „führen\" ist <em>liderar</em>. <em>Dirigir</em> heißt sowohl „leiten/lenken\" als auch „Auto fahren\" — Kontext entscheidet.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES delegar → deleguei / delegué</strong> — Orthografie-Trap: das Pretérito 1. Person fügt ein <em>u</em> ein, damit das <em>g</em> hart bleibt (<em>g→gu</em>). Niemals <em>*delegei</em> / <em>*delegé</em>. Im Subjuntivo: <em>delegue / delegue</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES dirigir → eu dirijo / yo dirijo</strong> — vor <em>o/a</em> wird <em>g→j</em>, damit der weiche Klang bleibt: 1. Person Präsens <em>dirijo</em>, ganzer Subjuntivo <em>dirija</em>. <em>Você dirige</em> behält das <em>g</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES medir → eu meço / yo mido</strong> — zwei verschiedene Traps: PT hat <em>c→ç</em> (<em>eu meço, que eu meça</em>), ES hat Stammwechsel <em>e→i</em> (<em>yo mido, él midió</em>, aber <em>nosotros medimos</em>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE scheitern → ich bin gescheitert</strong> — Zustands-Wechselverb, Perfekt mit <em>sein</em>, nie <em>*habe gescheitert</em>. „Die Verhandlung ist gescheitert\", „Das Projekt ist an den Kosten gescheitert\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE -ieren → kein „ge-\"</strong> — Verben auf <em>-ieren</em> bilden das Partizip II ohne <em>ge-</em>: <em>delegiert</em> (nicht <em>*gedelegiert</em>), <em>kommuniziert</em>, <em>diversifiziert</em>. Vergleich: <em>führen → geführt</em> (mit <em>ge-</em>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE messen → du misst, ich maß</strong> — starkes Verb mit <em>e→i</em>: <em>du misst, er misst</em> (nicht <em>*messt</em>), Präteritum <em>maß</em>, Konjunktiv II <em>mäße</em>, Partizip <em>gemessen</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>die Führung (f), das Ziel (n), das Controlling (n)</strong> — drei Genera. PT: <em>a liderança (f), a meta (f), o controle (m)</em>; ES-MX: <em>el liderazgo (m), la meta (f), el control (m)</em>. Genus nicht raten — es weicht zwischen den Sprachen ab.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>estar no caminho certo</strong> (PT) = „auf Kurs sein\" = ES <em>vamos por buen camino</em>. Das Gegenteil: <em>não atingir a meta</em> / <em>no alcanzar la meta</em> — das Ziel verfehlen.</li>\n    </ul></div>",

>liderar</em>. <em>Dirigir</em> heißt sowohl „leiten/lenken\" als auch „Auto fahren\" — Kontext entscheidet.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES delegar → deleguei / delegué</strong> — Orthografie-Trap: das Pretérito 1. Person fügt ein <em>u</em> ein, damit das <em>g</em> hart bleibt (<em>g→gu</em>). Niemals <em>*delegei</em> / <em>*delegé</em>. Im Subjuntivo: <em>delegue / delegue</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES dirigir → eu dirijo / yo dirijo</strong> — vor <em>o/a</em> wird <em>g→j</em>, damit der weiche Klang bleibt: 1. Person Präsens <em>dirijo</em>, ganzer Subjuntivo <em>dirija</em>. <em>Você dirige</em> behält das <em>g</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES medir → eu meço / yo mido</strong> — zwei verschiedene Traps: PT hat <em>c→ç</em> (<em>eu meço, que eu meça</em>), ES hat Stammwechsel <em>e→i</em> (<em>yo mido, él midió</em>, aber <em>nosotros medimos</em>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE scheitern → ich bin gescheitert</strong> — Zustands-Wechselverb, Perfekt mit <em>sein</em>, nie <em>*habe gescheitert</em>. „Die Verhandlung ist gescheitert\", „Das Projekt ist an den Kosten gescheitert\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE -ieren → kein „ge-\"</strong> — Verben auf <em>-ieren</em> bilden das Partizip II ohne <em>ge-</em>: <em>delegiert</em> (nicht <em>*gedelegiert</em>), <em>kommuniziert</em>, <em>diversifiziert</em>. Vergleich: <em>führen → geführt</em> (mit <em>ge-</em>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE messen → du misst, ich maß</strong> — starkes Verb mit <em>e→i</em>: <em>du misst, er misst</em> (nicht <em>*messt</em>), Präteritum <em>maß</em>, Konjunktiv II <em>mäße</em>, Partizip <em>gemessen</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>die Führung (f), das Ziel (n), das Controlling (n)</strong> — drei Genera. P // ============================================================
