      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Selten stapeln sich so viele Coding-Modell-Releases wie in der Woche vor diesem Montag: OpenAI, xAI/SpaceXAI und Meta haben binnen weniger Tage jeweils ein neues, aufs Programmieren zugeschnittenes Modell gedroppt — und Z.ais offen lizenziertes GLM-5.2 (Gewichte schon seit Mitte Juni) bleibt der Referenz-Pick fürs Self-Hosting. Der Haken — wer „führt\", hängt komplett davon ab, welchem Benchmark du glaubst, und die Anbieter streiten inzwischen offen über die Benchmarks selbst.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Sol führt den Coding Agent Index mit 80,0 — verliert aber SWE-bench Pro gegen Claude Fable 5. OpenAI hält SWE-bench Pro für kaputt (~30 % der Aufgaben).</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5</strong>: erstes xAI-Modell explizit fürs Coding/Agents; Highlight ist Token-Effizienz (Faktor 4,2 vs Opus 4.8), nicht die Spitzen-Scores.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Z.ai GLM-5.2</strong>: kein Neu-Release dieser Woche, sondern die offen lizenzierten Gewichte (MIT) von Mitte Juni (13.06.) — bleibt aber der Top-Pick fürs Self-Hosting: SWE-bench Pro 62,1 % schlägt GPT-5.5, zu ~1,40/4,40 $ pro Mtok.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong>: Metas erste bezahlte Model-API; beim Coden hinter Opus 4.8, aber vorn beim agentischen Tool-Use (MCP-Atlas 88,1).</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong>: FlexAttention läuft jetzt auf Apple Silicon, bis zu 12,3x schneller bei Sparse-Attention — relevant für lange Kontexte auf dem Mac.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini Managed Agents</strong>: Hintergrund-Tasks, Remote-MCP, Credential-Refresh — Schub Richtung Produktions-Reife.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code Woche 28</strong>: In-App-Browser auf Desktop, /doctor-Diagnose, Auto-Mode blockt rm -rf. (Die „Computer-Use im CLI\"-Meldung ist alt — von Ende März, kein neuer Move.)</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Skepsis-Merker</strong>: Fast alle Scores sind herstellergemeldet. Der Cross-Check ist konsistent bei den Gegner-Zahlen, aber die Sieger-Reihenfolge kippt je nach Board.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call</strong>: Cursor v3.11 (Side Chats), Copilot bekommt GPT-5.6, JetBrains AI Assistant holt Codex + Claude Agent, Devin SWE-1.7 via Cerebras (1.000 tok/s).</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev ist tot</strong>: letzter Release am 19.06., Cloud-Daten werden nach dem 15.07. gelöscht — übermorgen. Wer dort noch Daten hat: jetzt exportieren.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Selten stapeln sich so viele Coding-Modell-Releases wie in der Woche vor diesem Montag: OpenAI, xAI/SpaceXAI und Meta haben binnen weniger Tage jeweils ein neues, aufs Programmieren zugeschnittenes Modell gedroppt — und Z.ais offen lizenziertes GLM-5.2 (Gewichte schon seit Mitte Juni) bleibt der Referenz-Pick fürs Self-Hosting. Der Haken — wer „führt\", hängt komplett davon ab, welchem Benchmark du glaubst, und die Anbieter streiten inzwischen offen über die Benchmarks selbst.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Sol führt den Coding Agent Index mit 80,0 — verliert aber SWE-bench Pro gegen Claude Fable 5. OpenAI hält SWE-bench Pro für kaputt (~30 % der Aufgaben).</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5</strong>: erstes xAI-Modell explizit fürs Coding/Agents; Highlight ist Token-Effizienz (Faktor 4,2 vs Opus 4.8), nicht die Spitzen-Scores.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Z.ai GLM-5.2</strong>: kein Neu-Release dieser Woche, sondern die offen lizenzierten Gewichte (MIT) von Mitte Juni (13.06.) — bleibt aber der Top-Pick fürs Self-Hosting: SWE-bench Pro 62,1 % schlägt GPT-5.5, zu ~1,40/4,40 $ pro Mtok.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong>: Metas erste bezahlte Model-API; beim Coden hinter Opus 4.8, aber vorn beim agentischen Tool-Use (MCP-Atlas 88,1).</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong>: FlexAttention läuft jetzt auf Apple Silicon, bis zu 12,3x schneller bei Sparse-Attention — relevant für lange Kontexte auf dem Mac.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini Managed Agents</strong>: Hintergrund-Tasks, Remote-MCP, Credential-Refresh — Schub Richtung Produktions-Reife.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code Woche 28</strong>: In-App-Browser auf Desktop, /doctor-Diagnose, Auto-Mode blockt rm -rf. (Die „Computer-Use im CLI\"-Meldung ist alt — von Ende März, kein neuer Move.)</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Skepsis-Merker</strong>: Fast alle Scores sind herstellergemeldet. Der Cross-Check ist konsistent bei den Gegner-Zahlen, aber die Sieger-Reihenfolge kippt je nach Board.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call</strong>: Cursor v3.11 (Side Chats), Copilot bekommt GPT-5.6, JetBrains AI Assistant holt Codex + Claude Agent, Devin SWE-1.7 via Cerebras (1.000 tok/s).</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev ist tot</strong>: letzter Release am 19.06., Cloud-Daten werden nach dem 15.07. gelöscht — übermorgen. Wer dort noch Daten hat: jetzt exportieren.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Rarely do this many coding-model releases stack up in a single week: OpenAI, xAI/SpaceXAI, and Meta each dropped a new model tuned specifically for programming within a few days of each other — and Z.ai's openly licensed GLM-5.2 (weights out since mid-June) remains the go-to pick for self-hosting. The catch — who's \"leading\" depends entirely on which benchmark you trust, and the vendors are now openly fighting over the benchmarks themselves.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Sol tops the Coding Agent Index at 80.0 — but loses on SWE-bench Pro to Claude Fable 5. OpenAI considers SWE-bench Pro broken (~30% of tasks).</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5</strong>: xAI's first model built explicitly for coding/agents; the highlight is token efficiency (4.2x vs Opus 4.8), not the top scores.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Z.ai GLM-5.2</strong>: not a new release this week — it's the openly licensed weights (MIT) from mid-June (June 13) — but remains the top pick for self-hosting: SWE-bench Pro 62.1% beats GPT-5.5, at ~$1.40/$4.40 per Mtok.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong>: Meta's first paid model API; trails Opus 4.8 on coding, but leads on agentic tool use (MCP-Atlas 88.1).</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong>: FlexAttention now runs on Apple Silicon, up to 12.3x faster on sparse attention — relevant for long contexts on the Mac.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini Managed Agents</strong>: background tasks, remote MCP, credential refresh — a push toward production readiness.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code, Week 28</strong>: in-app browser on desktop, /doctor diagnostics, Auto Mode blocks rm -rf. (The \"computer use in the CLI\" story is old — from late March, not a new move.)</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Skepticism reminder</strong>: almost all scores are vendor-reported. The cross-check is consistent on rivals' numbers, but the winner's rank flips depending on the board.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll call</strong>: Cursor v3.11 (Side Chats), Copilot gets GPT-5.6, JetBrains AI Assistant adds Codex + Claude Agent, Devin SWE-1.7 via Cerebras (1,000 tok/s).</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev is dead</strong>: last release on 06/19, cloud data gets deleted after 07/15 — the day after tomorrow. If you still have data there, export it now.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Raramente se acumulam tantos lançamentos de modelos de código quanto na semana anterior a esta segunda-feira: OpenAI, xAI/SpaceXAI e Meta lançaram, cada uma, um novo modelo voltado à programação em poucos dias — e o GLM-5.2 da Z.ai, de licença aberta (com pesos já disponíveis desde meados de junho), segue como a escolha de referência para quem hospeda o próprio modelo. O detalhe incômodo: quem \"lidera\" depende inteiramente de qual benchmark você acredita, e os provedores agora brigam abertamente sobre os próprios benchmarks.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Sol lidera o Coding Agent Index com 80,0 — mas perde no SWE-bench Pro para o Claude Fable 5. A OpenAI considera o SWE-bench Pro quebrado (~30% das tarefas).</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5</strong>: primeiro modelo da xAI feito explicitamente para código/agentes; o destaque é a eficiência de tokens (fator 4,2 vs Opus 4.8), não os scores mais altos.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Z.ai GLM-5.2</strong>: não é um lançamento novo desta semana — são os pesos de licença aberta (MIT) de meados de junho (13/06) — mas segue como a principal escolha para hospedagem própria: SWE-bench Pro 62,1% supera o GPT-5.5, a ~$1,40/$4,40 por Mtok.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong>: primeira API paga de modelo da Meta; fica atrás do Opus 4.8 em código, mas na frente em uso agêntico de ferramentas (MCP-Atlas 88,1).</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong>: o FlexAttention agora roda no Apple Silicon, até 12,3x mais rápido em atenção esparsa — relevante para contextos longos no Mac.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini Managed Agents</strong>: tarefas em segundo plano, MCP remoto, renovação de credenciais — um empurrão rumo à maturidade de produção.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code, semana 28</strong>: navegador embutido no desktop, diagnóstico /doctor, Auto Mode bloqueia rm -rf. (A notícia de \"computer use na CLI\" é antiga — do fim de março, não é novidade.)</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Lembrete de ceticismo</strong>: quase todos os scores são reportados pelos próprios fabricantes. A conferência cruzada é consistente nos números dos concorrentes, mas a ordem de vencedores muda conforme o placar.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Panorama de ferramentas</strong>: Cursor v3.11 (Side Chats), Copilot recebe o GPT-5.6, JetBrains AI Assistant ganha Codex + Claude Agent, Devin SWE-1.7 via Cerebras (1.000 tok/s).</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev está morto</strong>: último lançamento em 19/06, os dados na nuvem serão apagados após 15/07 — depois de amanhã. Quem ainda tem dados lá: exporte agora.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Pocas veces se acumulan tantos lanzamientos de modelos de código como en la semana previa a este lunes: OpenAI, xAI/SpaceXAI y Meta lanzaron, cada una, un nuevo modelo enfocado en programación en pocos días — y el GLM-5.2 de Z.ai, de licencia abierta (con los pesos disponibles desde mediados de junio), sigue siendo la opción de referencia para autohospedaje. El detalle incómodo: quién \"lidera\" depende por completo de qué benchmark le creas, y los proveedores ahora discuten abiertamente sobre los benchmarks mismos.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 (Sol/Terra/Luna)</strong>: Sol encabeza el Coding Agent Index con 80.0, pero pierde en SWE-bench Pro frente a Claude Fable 5. OpenAI considera que SWE-bench Pro está roto (~30% de las tareas).</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5</strong>: primer modelo de xAI hecho explícitamente para código/agentes; el punto fuerte es la eficiencia de tokens (factor 4.2 vs Opus 4.8), no los puntajes más altos.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Z.ai GLM-5.2</strong>: no es un lanzamiento nuevo esta semana — son los pesos de licencia abierta (MIT) de mediados de junio (13/06) — pero sigue siendo la mejor opción para autohospedaje: SWE-bench Pro 62.1% supera a GPT-5.5, a ~$1.40/$4.40 por Mtok.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong>: la primera API de modelo de pago de Meta; queda por detrás de Opus 4.8 en código, pero por delante en uso agéntico de herramientas (MCP-Atlas 88.1).</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong>: FlexAttention ahora corre en Apple Silicon, hasta 12.3 veces más rápido en atención dispersa — relevante para contextos largos en la Mac.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini Managed Agents</strong>: tareas en segundo plano, MCP remoto, renovación de credenciales — un empujón hacia la madurez de producción.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code, semana 28</strong>: navegador integrado en la versión de escritorio, diagnóstico /doctor, el Auto Mode bloquea rm -rf. (La noticia de \"computer use en la CLI\" es vieja — de finales de marzo, no es novedad.)</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Recordatorio de escepticismo</strong>: casi todos los puntajes los reportan los propios fabricantes. La verificación cruzada es consistente en las cifras de la competencia, pero el orden de ganadores cambia según el tablero.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Repaso de herramientas</strong>: Cursor v3.11 (Side Chats), Copilot recibe GPT-5.6, JetBrains AI Assistant suma Codex + Claude Agent, Devin SWE-1.7 vía Cerebras (1,000 tok/s).</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev está muerto</strong>: último lanzamiento el 19/06, los datos en la nube se borrarán después del 15/07 — pasado mañana. Si todavía tienes datos ahí, expórtalos ya.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die große Nachricht der Woche ist keine neue Modell-Zahl, sondern ein Eingeständnis: Angewandte KI scheitert nicht am Modell, sondern an der Umsetzung. Innerhalb von zwei Wochen haben Microsoft und AWS zusammen <strong>3,5 Mrd. $</strong> zugesagt — nicht für bessere Modelle, sondern für Tausende von Menschen, die in Kundenfirmen einziehen und die KI dort tatsächlich zum Laufen bringen. Zugleich klafft die Gegen-Lücke auf: Nur jede fünfte Firma hat eine reife Governance für autonome Agenten (Deloitte), Gartner erwartet Agenten in 40 % der Unternehmens-Apps bis Jahresende — und die EU verschiebt ausgerechnet jetzt die schärfsten Pflichten nach hinten. Deployment wird industrialisiert; die Kontrolle hinkt hinterher. Genau in diese Lücke starten heute die beiden twiceD-Ideen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Microsoft Frontier Company</strong> (02.07): 2,5 Mrd. $, <strong>6.000 eingebettete Fach- und Engineering-Experten</strong> bei Kunden. Erste: LSEG, Unilever, Land O'Lakes, Novo Nordisk.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>AWS Forward Deployed Engineering</strong> (30.06): 1 Mrd. $, „Tausende\" Ingenieure. Konkret: BMW (23 Mio. vernetzte Fahrzeuge), Lyft (87 % schnellere Fahrer-Fälle).</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: nur <strong>1 von 5</strong> Firmen hat reife Agenten-Governance (n=3.235). <strong>Gartner</strong>: Agenten in 40 % der Enterprise-Apps bis Ende 2026 — aber eine 11 Monate alte Prognose.</li>\n      <li><span class=\"chip\">SEC · EU</span> <strong>First Recon AI Security Runtime</strong> (GA 08.07): prüft jede KI-Interaktion inline gegen Policy, protokolliert prüffest. Keine Finanzierungssumme genannt.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>AI-Act</strong>: Hochrisiko-Pflichten von Aug 2026 auf <strong>Dez 2027</strong> verschoben, produkt-eingebettete auf Aug 2028. Vorbereitungs-Runway, keine Entwarnung.</li>\n      <li><span class=\"chip\">B2B · DE</span> <strong>DIHK 2026</strong>: rund <strong>46 %</strong> der Firmen voll abhängig von Nicht-EU-Hardware/-Betriebssystemen — der Souveränitäts-Hebel für On-Prem-Angebote.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>KI-Governance-Layer für den Mittelstand</strong> und <strong>Forward-Deployed KI-Umsetzung</strong> für Firmen, die für Microsoft &amp; AWS zu klein sind.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die große Nachricht der Woche ist keine neue Modell-Zahl, sondern ein Eingeständnis: Angewandte KI scheitert nicht am Modell, sondern an der Umsetzung. Innerhalb von zwei Wochen haben Microsoft und AWS zusammen <strong>3,5 Mrd. $</strong> zugesagt — nicht für bessere Modelle, sondern für Tausende von Menschen, die in Kundenfirmen einziehen und die KI dort tatsächlich zum Laufen bringen. Zugleich klafft die Gegen-Lücke auf: Nur jede fünfte Firma hat eine reife Governance für autonome Agenten (Deloitte), Gartner erwartet Agenten in 40 % der Unternehmens-Apps bis Jahresende — und die EU verschiebt ausgerechnet jetzt die schärfsten Pflichten nach hinten. Deployment wird industrialisiert; die Kontrolle hinkt hinterher. Genau in diese Lücke starten heute die beiden twiceD-Ideen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Microsoft Frontier Company</strong> (02.07): 2,5 Mrd. $, <strong>6.000 eingebettete Fach- und Engineering-Experten</strong> bei Kunden. Erste: LSEG, Unilever, Land O'Lakes, Novo Nordisk.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>AWS Forward Deployed Engineering</strong> (30.06): 1 Mrd. $, „Tausende\" Ingenieure. Konkret: BMW (23 Mio. vernetzte Fahrzeuge), Lyft (87 % schnellere Fahrer-Fälle).</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: nur <strong>1 von 5</strong> Firmen hat reife Agenten-Governance (n=3.235). <strong>Gartner</strong>: Agenten in 40 % der Enterprise-Apps bis Ende 2026 — aber eine 11 Monate alte Prognose.</li>\n      <li><span class=\"chip\">SEC · EU</span> <strong>First Recon AI Security Runtime</strong> (GA 08.07): prüft jede KI-Interaktion inline gegen Policy, protokolliert prüffest. Keine Finanzierungssumme genannt.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>AI-Act</strong>: Hochrisiko-Pflichten von Aug 2026 auf <strong>Dez 2027</strong> verschoben, produkt-eingebettete auf Aug 2028. Vorbereitungs-Runway, keine Entwarnung.</li>\n      <li><span class=\"chip\">B2B · DE</span> <strong>DIHK 2026</strong>: rund <strong>46 %</strong> der Firmen voll abhängig von Nicht-EU-Hardware/-Betriebssystemen — der Souveränitäts-Hebel für On-Prem-Angebote.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>KI-Governance-Layer für den Mittelstand</strong> und <strong>Forward-Deployed KI-Umsetzung</strong> für Firmen, die für Microsoft &amp; AWS zu klein sind.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The big story of the week isn't a new model number — it's an admission: applied AI doesn't fail on the model, it fails on implementation. Within two weeks, Microsoft and AWS together committed <strong>$3.5B</strong> — not for better models, but for thousands of people moving into client companies to actually make the AI work there. At the same time, the counter-gap is opening up: only one in five firms has mature governance for autonomous agents (Deloitte), Gartner expects agents in 40% of enterprise apps by year-end — and the EU, of all moments, is pushing back its toughest obligations. Deployment is being industrialized; oversight is lagging behind. That's exactly the gap the two twiceD ideas launch into today.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Microsoft Frontier Company</strong> (07/02): $2.5B, <strong>6,000 embedded subject-matter and engineering experts</strong> at clients. First: LSEG, Unilever, Land O'Lakes, Novo Nordisk.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>AWS Forward Deployed Engineering</strong> (06/30): $1B, \"thousands\" of engineers. Concretely: BMW (23 million connected vehicles), Lyft (87% faster driver cases).</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: only <strong>1 in 5</strong> firms has mature agent governance (n=3,235). <strong>Gartner</strong>: agents in 40% of enterprise apps by end of 2026 — but an 11-month-old forecast.</li>\n      <li><span class=\"chip\">SEC · EU</span> <strong>First Recon AI Security Runtime</strong> (GA 07/08): checks every AI interaction inline against policy, logs it in an audit-ready way. No funding figure disclosed.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>AI Act</strong>: high-risk obligations pushed from Aug 2026 to <strong>Dec 2027</strong>, product-embedded ones to Aug 2028. Extra runway to prepare, not a reprieve.</li>\n      <li><span class=\"chip\">B2B · DE</span> <strong>DIHK 2026</strong>: around <strong>46%</strong> of firms fully dependent on non-EU hardware/operating systems — the sovereignty lever for on-prem offerings.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas: an <strong>AI governance layer for the Mittelstand</strong> and <strong>forward-deployed AI implementation</strong> for companies too small for Microsoft &amp; AWS.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A grande notícia da semana não é um novo número de modelo, mas uma confissão: a IA aplicada não fracassa no modelo, mas na implementação. Em duas semanas, Microsoft e AWS juntas comprometeram <strong>US$ 3,5 bi</strong> — não para modelos melhores, mas para milhares de pessoas que se instalam dentro das empresas-clientes para fazer a IA realmente funcionar lá. Ao mesmo tempo, abre-se a lacuna contrária: apenas uma em cada cinco empresas tem governança madura para agentes autônomos (Deloitte), a Gartner espera agentes em 40% dos apps corporativos até o fim do ano — e a UE, justo agora, adia as obrigações mais rígidas. O deployment está sendo industrializado; o controle fica para trás. É exatamente nessa lacuna que as duas ideias da twiceD entram hoje.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Microsoft Frontier Company</strong> (02/07): US$ 2,5 bi, <strong>6.000 especialistas de negócio e engenharia embarcados</strong> em clientes. Primeiros: LSEG, Unilever, Land O'Lakes, Novo Nordisk.</li>\n      <li><span class=\"chip hot\">DEPLOY · EUA</span> <strong>AWS Forward Deployed Engineering</strong> (30/06): US$ 1 bi, \"milhares\" de engenheiros. Concreto: BMW (23 milhões de veículos conectados), Lyft (87% mais rápido em casos de motoristas).</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: apenas <strong>1 em 5</strong> empresas tem governança madura de agentes (n=3.235). <strong>Gartner</strong>: agentes em 40% dos apps corporativos até o fim de 2026 — mas uma previsão de 11 meses atrás.</li>\n      <li><span class=\"chip\">SEC · UE</span> <strong>First Recon AI Security Runtime</strong> (GA 08/07): verifica cada interação de IA em tempo real contra política, com registro auditável. Nenhum valor de financiamento divulgado.</li>\n      <li><span class=\"chip\">REG · UE</span> <strong>AI Act</strong>: obrigações de alto risco adiadas de ago/2026 para <strong>dez/2027</strong>, as embutidas em produtos para ago/2028. Tempo extra de preparação, não um alívio definitivo.</li>\n      <li><span class=\"chip\">B2B · DE</span> <strong>DIHK 2026</strong>: cerca de <strong>46%</strong> das empresas totalmente dependentes de hardware/sistemas operacionais fora da UE — a alavanca de soberania para ofertas on-premise.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias: uma <strong>camada de governança de IA para médias empresas</strong> e <strong>implementação de IA com equipe embarcada</strong> para empresas pequenas demais para Microsoft e AWS.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La gran noticia de la semana no es una nueva cifra de modelo, sino una confesión: la IA aplicada no falla por el modelo, sino por la implementación. En dos semanas, Microsoft y AWS comprometieron juntas <strong>3,500 millones de dólares</strong> — no para modelos mejores, sino para miles de personas que se instalan en empresas clientes para hacer que la IA funcione ahí de verdad. Al mismo tiempo, se abre la brecha contraria: solo una de cada cinco empresas tiene una gobernanza madura para agentes autónomos (Deloitte), Gartner espera agentes en el 40% de las apps empresariales para fin de año — y la UE, justo ahora, pospone sus obligaciones más estrictas. El despliegue se está industrializando; el control va rezagado. Justo en esa brecha entran hoy las dos ideas de twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Microsoft Frontier Company</strong> (02/07): 2,500 millones de dólares, <strong>6,000 expertos de negocio e ingeniería integrados</strong> en clientes. Primeros: LSEG, Unilever, Land O'Lakes, Novo Nordisk.</li>\n      <li><span class=\"chip hot\">DEPLOY · EE. UU.</span> <strong>AWS Forward Deployed Engineering</strong> (30/06): 1,000 millones de dólares, \"miles\" de ingenieros. Concreto: BMW (23 millones de vehículos conectados), Lyft (87% más rápido en casos de conductores).</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Deloitte</strong>: solo <strong>1 de cada 5</strong> empresas tiene gobernanza madura de agentes (n=3,235). <strong>Gartner</strong>: agentes en 40% de las apps empresariales para fines de 2026 — pero es un pronóstico de hace 11 meses.</li>\n      <li><span class=\"chip\">SEC · UE</span> <strong>First Recon AI Security Runtime</strong> (GA 08/07): revisa cada interacción de IA en tiempo real contra la política, con registro auditable. No se dio a conocer monto de financiamiento.</li>\n      <li><span class=\"chip\">REG · UE</span> <strong>AI Act</strong>: obligaciones de alto riesgo pospuestas de ago 2026 a <strong>dic 2027</strong>; las integradas en producto, a ago 2028. Tiempo extra para prepararse, no una tregua.</li>\n      <li><span class=\"chip\">B2B · DE</span> <strong>DIHK 2026</strong>: cerca del <strong>46%</strong> de las empresas totalmente dependientes de hardware/sistemas operativos fuera de la UE — la palanca de soberanía para las ofertas on-premise.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas: una <strong>capa de gobernanza de IA para la mediana empresa</strong> y una <strong>implementación de IA con personal desplegado</strong> para empresas demasiado pequeñas para Microsoft y AWS.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Widerspruch des Tages steht nicht auf dem Board, sondern in den Zahlen darüber: <strong>Bitkom zählt weiter rund 109.000 unbesetzte IT-Stellen</strong> (Studie August 2025, immer noch die aktuellste Zahl), während die <strong>Zahl der IT-Stellenausschreibungen um 22 % zum Vorjahr gefallen ist</strong> — dieselbe Lücke, weniger Reqs, die sie füllen wollen. Konkret wird das in Daniels Segment durch drei Freezes: <strong>IKEA schließt seine IT Germany GmbH komplett</strong> (233 Jobs bis Ende 2026), <strong>BASF schneidet in seine ~8.500-Köpfe-IT</strong> und verlagert Digital Services nach Hyderabad. Das Board selbst ist ruhig und konsistent: <strong>43 verifizierte Listings</strong>, Java/Spring/Angular als Rückgrat, dieselbe Drei-Wege-Spitze bei <strong>Fit 88</strong> — Sätze im Band der Rate-Studien (90–120 €/h*), nicht darüber. Dazu zwei EU-Tender als Kontrast-Paar: eine Magdeburger Klinik-Cloud, die mit dem richtigen Partner bietbar ist, und ein govdigital-KI-Rahmenvertrag, dessen Schwellen jedes Partner-Modell sprengen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>Fachkräfte-Paradox</strong>: 109.000 unbesetzte IT-Stellen (Bitkom, Aug 2025) treffen auf <strong>−22 % Stellenausschreibungen</strong> zum Vorjahr (Jul 2026) — die strukturelle Lücke bleibt, die aktiven Reqs schrumpfen.</li>\n      <li><span class=\"chip hot\">Freeze</span> <strong>Drei Kürzungen im Kernsegment</strong>: IKEA IT Germany GmbH wird komplett geschlossen (233 Jobs bis Ende 2026), BASF kürzt in der ~8.500-Köpfe-IT und baut einen Digital Hub in Hyderabad auf.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Java-Band hält</strong>: Senior-Java-Remote DE recherchiert bei <strong>90–120 €/h*</strong>, IT-Freelancer im Schnitt 101,98 € — Daniels Kern liegt <em>im</em> Band, der Hebel ist Auswahl und Laufzeit.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board konsistent</strong>: 43 Listings (38 Freelance / 4 Employee / 1 Intriguing), Ø Fit 70, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil), Java 24× / Spring Boot 20× / Angular 24× — 40 remote-tauglich.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische hält, aber Gegenwind</strong>: HENNING (Automotive/Ingolstadt, Fit 86) führt, dahinter APRIORI (Gebäudeautomation), Codex (MQTT), CAES (Automotive) — bei <strong>Automotive-Freelance-Nachfrage −32 % zum Vorjahr</strong>.</li>\n      <li><span class=\"chip\">CH</span> <strong>KI-Aufschlag hält, Standard nicht</strong>: ELCA (Agentic AI, CHF 140–190 k*, Fit 81), AXA (Python-Agentic-AI, CHF 130–170 k*, 80), Camunda (80) über Median; JetBrains Principal FDE (82) ist Mission, nicht Satz.</li>\n      <li><span class=\"chip\">TED</span> <strong>Ein Partner-Fall, ein Skip</strong>: Uniklinik Magdeburg sucht eine Cloud-/KI-Plattform (⚠️ Partner für ISO-Zertifikate + Klinik-Referenzen), govdigital verlangt ≥5 Mio. € KI-Umsatz/Jahr + 100 FTE (✗ Skip — Partner-Modell unrealistisch).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Widerspruch des Tages steht nicht auf dem Board, sondern in den Zahlen darüber: <strong>Bitkom zählt weiter rund 109.000 unbesetzte IT-Stellen</strong> (Studie August 2025, immer noch die aktuellste Zahl), während die <strong>Zahl der IT-Stellenausschreibungen um 22 % zum Vorjahr gefallen ist</strong> — dieselbe Lücke, weniger Reqs, die sie füllen wollen. Konkret wird das in Daniels Segment durch drei Freezes: <strong>IKEA schließt seine IT Germany GmbH komplett</strong> (233 Jobs bis Ende 2026), <strong>BASF schneidet in seine ~8.500-Köpfe-IT</strong> und verlagert Digital Services nach Hyderabad. Das Board selbst ist ruhig und konsistent: <strong>43 verifizierte Listings</strong>, Java/Spring/Angular als Rückgrat, dieselbe Drei-Wege-Spitze bei <strong>Fit 88</strong> — Sätze im Band der Rate-Studien (90–120 €/h*), nicht darüber. Dazu zwei EU-Tender als Kontrast-Paar: eine Magdeburger Klinik-Cloud, die mit dem richtigen Partner bietbar ist, und ein govdigital-KI-Rahmenvertrag, dessen Schwellen jedes Partner-Modell sprengen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>Fachkräfte-Paradox</strong>: 109.000 unbesetzte IT-Stellen (Bitkom, Aug 2025) treffen auf <strong>−22 % Stellenausschreibungen</strong> zum Vorjahr (Jul 2026) — die strukturelle Lücke bleibt, die aktiven Reqs schrumpfen.</li>\n      <li><span class=\"chip hot\">Freeze</span> <strong>Drei Kürzungen im Kernsegment</strong>: IKEA IT Germany GmbH wird komplett geschlossen (233 Jobs bis Ende 2026), BASF kürzt in der ~8.500-Köpfe-IT und baut einen Digital Hub in Hyderabad auf.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Java-Band hält</strong>: Senior-Java-Remote DE recherchiert bei <strong>90–120 €/h*</strong>, IT-Freelancer im Schnitt 101,98 € — Daniels Kern liegt <em>im</em> Band, der Hebel ist Auswahl und Laufzeit.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board konsistent</strong>: 43 Listings (38 Freelance / 4 Employee / 1 Intriguing), Ø Fit 70, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil), Java 24× / Spring Boot 20× / Angular 24× — 40 remote-tauglich.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische hält, aber Gegenwind</strong>: HENNING (Automotive/Ingolstadt, Fit 86) führt, dahinter APRIORI (Gebäudeautomation), Codex (MQTT), CAES (Automotive) — bei <strong>Automotive-Freelance-Nachfrage −32 % zum Vorjahr</strong>.</li>\n      <li><span class=\"chip\">CH</span> <strong>KI-Aufschlag hält, Standard nicht</strong>: ELCA (Agentic AI, CHF 140–190 k*, Fit 81), AXA (Python-Agentic-AI, CHF 130–170 k*, 80), Camunda (80) über Median; JetBrains Principal FDE (82) ist Mission, nicht Satz.</li>\n      <li><span class=\"chip\">TED</span> <strong>Ein Partner-Fall, ein Skip</strong>: Uniklinik Magdeburg sucht eine Cloud-/KI-Plattform (⚠️ Partner für ISO-Zertifikate + Klinik-Referenzen), govdigital verlangt ≥5 Mio. € KI-Umsatz/Jahr + 100 FTE (✗ Skip — Partner-Modell unrealistisch).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today's contradiction isn't on the board — it's in the numbers above it: <strong>Bitkom still counts around 109,000 unfilled IT positions</strong> (August 2025 study, still the most recent figure), while the <strong>number of IT job postings has fallen 22% year-over-year</strong> — same gap, fewer reqs trying to fill it. In Daniel's segment, that plays out through three freezes: <strong>IKEA is shutting down its IT Germany GmbH entirely</strong> (233 jobs by end of 2026), and <strong>BASF is cutting into its ~8,500-strong IT department</strong> while shifting Digital Services to Hyderabad. The board itself is calm and consistent: <strong>43 verified listings</strong>, Java/Spring/Angular as the backbone, the same three-way tie at <strong>Fit 88</strong> — rates within the range of the rate studies (€90–120/h*), not above it. Plus two EU tenders as a contrast pair: a Magdeburg hospital cloud platform biddable with the right partner, and a govdigital AI framework contract whose thresholds break any partner model.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>Skilled-worker paradox</strong>: 109,000 unfilled IT positions (Bitkom, Aug 2025) meet a <strong>−22% drop in job postings</strong> year-over-year (Jul 2026) — the structural gap remains, the active reqs are shrinking.</li>\n      <li><span class=\"chip hot\">Freeze</span> <strong>Three cuts in the core segment</strong>: IKEA IT Germany GmbH is being shut down entirely (233 jobs by end of 2026), BASF is cutting into its ~8,500-strong IT department and building a Digital Hub in Hyderabad.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Java band holds</strong>: senior Java remote (Germany) researched at <strong>€90–120/h*</strong>, IT freelancer average €101.98 — Daniel's core sits <em>within</em> the band, the lever is selection and contract length.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board holds steady</strong>: 43 listings (38 freelance / 4 employee / 1 intriguing), avg. Fit 70, three-way tie at Fit 88 (iSAX, BridgingIT, Keil), Java 24× / Spring Boot 20× / Angular 24× — 40 remote-capable.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Niche holds, but headwinds</strong>: HENNING (automotive/Ingolstadt, Fit 86) leads, followed by APRIORI (building automation), Codex (MQTT), CAES (automotive) — against <strong>automotive freelance demand down 32%</strong> year-over-year.</li>\n      <li><span class=\"chip\">CH</span> <strong>AI premium holds, standard doesn't</strong>: ELCA (agentic AI, CHF 140–190k*, Fit 81), AXA (Python agentic AI, CHF 130–170k*, 80), Camunda (80) above median; JetBrains Principal FDE (82) is mission, not rate.</li>\n      <li><span class=\"chip\">TED</span> <strong>One partner case, one skip</strong>: Uniklinikum Magdeburg is seeking a cloud/AI platform (⚠️ Partner for ISO certifications + hospital references), govdigital requires ≥€5M AI revenue/year + 100 FTE (✗ Skip — partner model unrealistic).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A contradição do dia não está no board, mas nos números acima dele: o <strong>Bitkom continua contando cerca de 109.000 vagas de TI não preenchidas</strong> (estudo de agosto de 2025, ainda o dado mais atual), enquanto o <strong>número de anúncios de vagas de TI caiu 22 % em relação ao ano anterior</strong> — a mesma lacuna, menos vagas ativas tentando preenchê-la. Na prática, isso aparece no segmento de Daniel através de três congelamentos: a <strong>IKEA fecha completamente sua IT Germany GmbH</strong> (233 postos até o fim de 2026), a <strong>BASF corta em sua TI de ~8.500 pessoas</strong> e transfere Digital Services para Hyderabad. O board em si é estável e consistente: <strong>43 vagas verificadas</strong>, Java/Spring/Angular como espinha dorsal, o mesmo empate triplo no topo com <strong>Fit 88</strong> — taxas dentro da faixa dos estudos de mercado (90–120 €/h*), não acima dela. Além disso, duas licitações da UE como par de contraste: uma cloud hospitalar em Magdeburg, viável com o parceiro certo, e um contrato-quadro de IA da govdigital, cujos limiares estouram qualquer modelo de parceria.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Paradoxo de mão de obra</strong>: 109.000 vagas de TI não preenchidas (Bitkom, ago 2025) encontram −22 % de anúncios de vagas em relação ao ano anterior (jul 2026) — a lacuna estrutural permanece, as vagas ativas encolhem.</li>\n      <li><span class=\"chip hot\">Congelamento</span> <strong>Três cortes no segmento central</strong>: a IKEA IT Germany GmbH é completamente fechada (233 postos até o fim de 2026), a BASF corta na TI de ~8.500 pessoas e monta um Digital Hub em Hyderabad.</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Faixa de Java se mantém</strong>: Java sênior remoto na Alemanha pesquisado a <strong>90–120 €/h*</strong>, média dos freelancers de TI em 101,98 € — o núcleo de Daniel fica <em>dentro</em> da faixa, a alavanca é escolha e duração.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board consistente</strong>: 43 vagas (38 freelance / 4 CLT / 1 intriguing), Fit médio 70, empate triplo no topo com Fit 88 (iSAX, BridgingIT, Keil), Java 24× / Spring Boot 20× / Angular 24× — 40 compatíveis com remoto.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nicho se mantém, mas com vento contrário</strong>: HENNING (automotivo/Ingolstadt, Fit 86) lidera, seguida por APRIORI (automação predial), Codex (MQTT), CAES (automotivo) — com a <strong>demanda freelance automotiva em −32 % em relação ao ano anterior</strong>.</li>\n      <li><span class=\"chip\">CH</span> <strong>Prêmio de IA se mantém, o padrão não</strong>: ELCA (IA agêntica, CHF 140–190 k*, Fit 81), AXA (IA agêntica em Python, CHF 130–170 k*, 80), Camunda (80) acima da mediana; o Principal FDE da JetBrains (82) é missão, não taxa.</li>\n      <li><span class=\"chip\">TED</span> <strong>Um caso de parceria, um skip</strong>: o Uniklinik Magdeburg busca uma plataforma cloud/IA (⚠️ parceiro para certificados ISO + referências hospitalares), a govdigital exige ≥5 milhões de € de receita de IA/ano + 100 FTE (✗ skip — modelo de parceria inviável).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La contradicción del día no está en el tablero, sino en las cifras que lo rodean: <strong>Bitkom sigue contando alrededor de 109,000 vacantes de TI sin cubrir</strong> (estudio de agosto de 2025, todavía el dato más reciente), mientras que el <strong>número de publicaciones de empleo en TI cayó 22 % respecto al año anterior</strong> — la misma brecha, menos vacantes activas que quieren llenarla. En el segmento de Daniel esto se concreta en tres congelamientos: <strong>IKEA cierra por completo su IT Germany GmbH</strong> (233 empleos hasta finales de 2026), <strong>BASF recorta en su TI de ~8,500 personas</strong> y traslada Digital Services a Hyderabad. El tablero en sí está tranquilo y estable: <strong>43 vacantes verificadas</strong>, Java/Spring/Angular como columna vertebral, el mismo trío en la cima con <strong>Fit 88</strong> — tarifas dentro del rango de los estudios de mercado (90–120 €/h*), no por encima. A esto se suman dos licitaciones de la UE como par de contraste: una nube clínica en Magdeburgo que se puede ofertar con el socio adecuado, y un contrato marco de IA de govdigital cuyos umbrales rebasan cualquier modelo de socios.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Paradoja de talento</strong>: 109,000 vacantes de TI sin cubrir (Bitkom, ago 2025) chocan con <strong>−22 % en publicaciones de empleo</strong> respecto al año anterior (jul 2026) — la brecha estructural persiste, las vacantes activas se reducen.</li>\n      <li><span class=\"chip hot\">Congelamiento</span> <strong>Tres recortes en el segmento principal</strong>: IKEA IT Germany GmbH cierra por completo (233 empleos hasta finales de 2026), BASF recorta en su TI de ~8,500 personas y arma un hub digital en Hyderabad.</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>La banda de Java se mantiene</strong>: Java senior remoto en Alemania se cotiza en <strong>90–120 €/h*</strong>, el promedio de freelancers de TI es de 101.98 € — el núcleo de Daniel está <em>dentro</em> de la banda, la palanca es la selección y la duración.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Tablero estable</strong>: 43 vacantes (38 freelance / 4 empleado / 1 Intriguing), Fit promedio de 70, trío en la cima con Fit 88 (iSAX, BridgingIT, Keil), Java 24×, Spring Boot 20×, Angular 24× — 40 aptas para remoto.</li>\n      <li><span class=\"chip\">IoT</span> <strong>El nicho se sostiene, pero con viento en contra</strong>: HENNING (Automotive/Ingolstadt, Fit 86) encabeza, seguido de APRIORI (automatización de edificios), Codex (MQTT), CAES (Automotive) — con <strong>demanda freelance automotriz −32 % respecto al año anterior</strong>.</li>\n      <li><span class=\"chip\">CH</span> <strong>El sobreprecio de la IA se sostiene, el estándar no</strong>: ELCA (Agentic AI, CHF 140–190 k*, Fit 81), AXA (Python-Agentic-AI, CHF 130–170 k*, 80), Camunda (80) por encima de la mediana; JetBrains Principal FDE (82) es misión, no tarifa.</li>\n      <li><span class=\"chip\">TED</span> <strong>Un caso de socio, un skip</strong>: la Clínica Universitaria de Magdeburgo busca una plataforma de nube/IA (⚠️ Socio para certificados ISO + referencias clínicas), govdigital exige ≥5 millones € de ingresos por IA/año + 100 FTE (✗ Skip — modelo de socios poco realista).</li>\n    </ul></div>"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die WM 2026 geht in die Schlusswoche — und für dich als Zuschauer ohne Herzverein: Deutschland flog schon im Sechzehntelfinale gegen Paraguay raus, die Seleção im Achtelfinale gegen Norwegen. Bleibt das Neutralen-Vergnügen mit vier großen Namen — und das eigentliche Heim-Thema läuft ohnehin daheim in Freiburg, wo der Kader gerade kräftig umgebaut wird.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Halbfinals</strong>: Di 14.07. Frankreich–Spanien, Mi 15.07. England–Argentinien — je 21:00 MESZ / 16:00 BRT. Finale So 19.07.</li>\n      <li><span class=\"chip\">WM</span> <strong>Beide früh raus</strong>: DFB im Sechzehntelfinale (Paraguay, 3:4 i.E.), Brasilien im Achtelfinale (Norwegen 1:2, Haaland-Doppelpack).</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt</strong>: Torwart Mio Backhaus (Werder) — neuer Vereins-Transferrekord — und Stürmer Keisuke Gotō (Anderlecht, ~11 Mio.). Beide offiziell.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi zu Newcastle</strong>: ~60 Mio. laut Medien fixiert — aber Stand 13.07. noch <em>nicht</em> offiziell unterschrieben.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Vorbereitung</strong>: Trainingsauftakt war gestern (12.07.), Trainingslager Schruns 22.–31.07., Saisoneröffnung 15.08. gegen Crystal Palace.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 abgehakt</strong>: Bayern Meister (89 Pkt., 122 Tore — Klubrekord), Freiburg 7. → Conference-League-Playoff.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2026/27</strong> startet 28.08. mit Bayern–Stuttgart (20:30 MESZ / 15:30 BRT).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong> nach dem 18. Spieltag (WM-Pause), Palmeiras führt (41 Pkt.). Restart 22.07.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The 2026 World Cup heads into its final week — and for you as a neutral without a team in the mix: Germany was already out in the round of 32 against Paraguay, and the Seleção fell in the round of 16 against Norway. What's left is neutral-fan pleasure with four big names — and the real home story is playing out in Freiburg anyway, where the squad is being rebuilt hard.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Semifinals</strong>: Tue 07/14 France–Spain, Wed 07/15 England–Argentina — both 9:00 PM CEST / 4:00 PM BRT. Final Sun 07/19.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Both out early</strong>: Germany in the round of 32 (Paraguay, 3-4 on penalties), Brazil in the round of 16 (Norway 1-2, Haaland brace).</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg lands</strong>: goalkeeper Mio Backhaus (Werder) — new club transfer record — and forward Keisuke Gotō (Anderlecht, ~€11m). Both official.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi to Newcastle</strong>: ~€60m fixed per media reports — but as of 07/13 still <em>not</em> officially signed.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Preseason</strong>: training kicked off yesterday (07/12), training camp in Schruns 07/22–31, season opener 08/15 against Crystal Palace.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 wrapped</strong>: Bayern champions (89 pts., 122 goals — club record), Freiburg 7th → Conference League playoff.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2026/27</strong> kicks off 08/28 with Bayern–Stuttgart (8:30 PM CEST / 3:30 PM BRT).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão on pause</strong> after matchday 18 (World Cup break), Palmeiras leads (41 pts.). Restart 07/22.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Copa do Mundo de 2026 entra na semana final — e para você, torcedor sem time do coração no torneio: a Alemanha já caiu nos dezesseis avos de final contra o Paraguai, e a Seleção nas oitavas contra a Noruega. Sobra o prazer de assistir sem paixão, com quatro nomes de peso — e o verdadeiro assunto de casa está mesmo em Friburgo, onde o elenco está passando por uma reformulação e tanto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Semifinais</strong>: ter 14/07 França–Espanha, qua 15/07 Inglaterra–Argentina — ambas às 21h00 CEST / 16h00 BRT. Final dom 19/07.</li>\n      <li><span class=\"chip\">Copa</span> <strong>As duas caíram cedo</strong>: seleção alemã nos dezesseis avos (Paraguai, 3-4 nos pênaltis), Brasil nas oitavas (Noruega 1-2, dobradinha de Haaland).</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Friburgo contrata</strong>: o goleiro Mio Backhaus (Werder) — novo recorde de transferência do clube — e o atacante Keisuke Gotō (Anderlecht, ~11 milhões de euros). Ambos oficiais.</li>\n      <li><span class=\"chip hot\">Transferência</span> <strong>Manzambi para o Newcastle</strong>: ~60 milhões de euros acertados segundo a mídia — mas até 13/07 ainda <em>não</em> assinado oficialmente.</li>\n      <li><span class=\"chip\">Friburgo</span> <strong>Pré-temporada</strong>: retomada dos treinos foi ontem (12/07), estágio em Schruns de 22 a 31/07, abertura da temporada em 15/08 contra o Crystal Palace.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 encerrada</strong>: Bayern campeão (89 pts, 122 gols — recorde do clube), Friburgo em 7º → playoff da Conference League.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2026/27</strong> começa em 28/08 com Bayern–Stuttgart (20h30 CEST / 15h30 BRT).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão em pausa</strong> após a 18ª rodada (pausa para a Copa), Palmeiras na liderança (41 pts). Retorno em 22/07.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El Mundial 2026 entra en su semana final — y para ti, que ves el torneo sin un equipo del corazón: Alemania ya quedó eliminada en dieciseisavos de final contra Paraguay, y la Seleção en octavos contra Noruega. Queda el gusto neutral de ver a cuatro grandes nombres — y el verdadero tema de casa está pasando en Friburgo, donde la plantilla se está reconstruyendo a fondo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Semifinales</strong>: mar 14/07 Francia–España, mié 15/07 Inglaterra–Argentina — ambas a las 21:00 CEST / 16:00 BRT. Final dom 19/07.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Ambos cayeron temprano</strong>: la selección alemana en dieciseisavos (Paraguay, 3-4 en penales), Brasil en octavos (Noruega 1-2, doblete de Haaland).</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>El Friburgo ficha a</strong>: el portero Mio Backhaus (Werder) — nuevo récord de transferencia del club — y al delantero Keisuke Gotō (Anderlecht, ~11 millones de euros). Ambos oficiales.</li>\n      <li><span class=\"chip hot\">Transferencia</span> <strong>Manzambi al Newcastle</strong>: ~60 millones de euros acordados según la prensa — pero al 13/07 aún <em>sin</em> firma oficial.</li>\n      <li><span class=\"chip\">Friburgo</span> <strong>Pretemporada</strong>: arranque de entrenamientos fue ayer (12/07), campamento de entrenamiento en Schruns del 22 al 31/07, arranque de temporada el 15/08 contra el Crystal Palace.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 ya cerrada</strong>: el Bayern campeón (89 pts, 122 goles — récord del club), Friburgo 7º → repechaje de la Conference League.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2026/27</strong> arranca el 28/08 con Bayern–Stuttgart (20:30 CEST / 15:30 BRT).</li>\n      <li><span class=\"chip\">BRA</span> <strong>El Brasileirão en pausa</strong> tras la jornada 18 (descanso por el Mundial), Palmeiras al frente (41 pts). Regresa el 22/07.</li>\n    </ul></div>"

n, Spa, So 19.07. — Rennstart 15:00 MESZ / 10:00 BRT, kein Sprint.</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>Sommerpause erst nach Ungarn</strong>: Spa (19.07.) und Budapest (26.07.), dann die dreiwöchige Pause — die Saison geht in Zandvoort (23.08.) weiter.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Montag, der 13. Juli — die Ergebnisse des Doppel-Sonntags stehen. In Interlagos, Daniels Heimstrecke, gewann der <strong>BMW #15</strong> die 6h von São Paulo und schob die Herstellerwertung von einem Toyota-Vorsprung auf ein Fotofinish: <strong>Toyota 132, BMW 127</strong> — nur noch fünf Punkte. Am Sachsenring zog <strong>Marc Márquez</strong> ein perfektes Wochenende durch (Pole, Sprint, Rennen) und holte seinen <strong>zehnten Premier-Class-Sieg an diesem Ort</strong> — damit gleicht er Giacomo Agostinis Rekord. In der WM springt er von Rang fünf auf drei, nur noch 18 Punkte hinter Leader Martín. Die Formel 1 pausiert weiter; nächster Halt ist Spa am Sonntag (19.07.).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>BMW #15 gewinnt die 6h von São Paulo</strong> (Magnussen/Marciello/Vanthoor, 242 Runden) vor dem Ferrari #51 (+2,254 s) und beiden Cadillac. Es ist BMWs zweiter Saisonsieg.</li>\n      <li><span class=\"chip hot\">WEC</span> <strong>Titelkampf neu entfacht</strong>: BMW schließt von 36 Punkten Rückstand auf fünf auf — <strong>Toyota 132, BMW 127, Ferrari 88</strong>. Der Leader Toyota ging in Interlagos leer aus.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Márquez ist der Sachsenkönig</strong>: Sieg von der Pole bis zur Zielflagge (+1,996 s auf Ai Ogura), zehnter Premier-Class-Sieg am Sachsenring — <strong>gleichauf mit Agostini</strong>. Perfektes Wochenende: Pole, Sprint, Rennen.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>WM-Sprung auf Rang drei</strong>: Márquez jetzt 190 Punkte, <strong>18 hinter Martín</strong> (208). Ai Ogura ist neuer Zweiter (194). Bezzecchi blieb ohne Punkte, Álex Márquez und Di Giannantonio stürzten.</li>\n      <li><span class=\"chip\">F1</span> <strong>Weiter Pause</strong>: keine Session diese Woche. Antonelli (179) und Mercedes (333) führen unverändert seit Silverstone. Nächstes Rennen: GP Belgien, Spa, So 19.07. — Rennstart 15:00 MESZ / 10:00 BRT, kein Sprint.</li>\n      <li><span class=\"chip\">Ausblick</span> <strong>Sommerpause erst nach Ungarn</strong>: Spa (19.07.) und Budapest (26.07.), dann die dreiwöchige Pause — die Saison geht in Zandvoort (23.08.) weiter.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Monday, July 13 — the results from the double race Sunday are in. In Interlagos, Daniel's home track, <strong>BMW #15</strong> won the 6 Hours of São Paulo and pushed the manufacturers' standings from a Toyota lead to a photo finish: <strong>Toyota 132, BMW 127</strong> — just five points apart. At the Sachsenring, <strong>Marc Márquez</strong> delivered a flawless weekend (pole, sprint, race) and claimed his <strong>tenth premier-class win at this venue</strong> — matching Giacomo Agostini's record. In the championship he jumps from fifth to third, now just 18 points behind leader Martín. Formula 1 remains on its break; next stop is Spa on Sunday (07/19).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>BMW #15 wins the 6 Hours of São Paulo</strong> (Magnussen/Marciello/Vanthoor, 242 laps) ahead of Ferrari #51 (+2.254 s) and both Cadillacs. It's BMW's second win of the season.</li>\n      <li><span class=\"chip hot\">WEC</span> <strong>Title fight reignited</strong>: BMW closes a 36-point gap down to five — <strong>Toyota 132, BMW 127, Ferrari 88</strong>. Leader Toyota came away empty-handed in Interlagos.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Márquez is the king of the Sachsenring</strong>: a lights-to-flag win (+1.996 s over Ai Ogura), his tenth premier-class win at the Sachsenring — <strong>level with Agostini</strong>. A perfect weekend: pole, sprint, race.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Championship jump to third</strong>: Márquez now on 190 points, <strong>18 behind Martín</strong> (208). Ai Ogura is the new runner-up (194). Bezzecchi went scoreless, while Álex Márquez and Di Giannantonio crashed out.</li>\n      <li><span class=\"chip\">F1</span> <strong>Still on break</strong>: no session this week. Antonelli (179) and Mercedes (333) remain unchanged in the lead since Silverstone. Next race: Belgian GP, Spa, Sun 07/19 — race start 15:00 CEST / 10:00 BRT, no sprint.</li>\n      <li><span class=\"chip\">Outlook</span> <strong>Summer break only after Hungary</strong>: Spa (07/19) and Budapest (07/26), then the three-week break — the season resumes in Zandvoort (08/23).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É segunda-feira, 13 de julho — os resultados do domingo duplo de corridas já saíram. Em Interlagos, a pista de casa de Daniel, o <strong>BMW #15</strong> venceu as 6h de São Paulo e transformou a classificação de fabricantes de uma vantagem da Toyota em uma foto de chegada: <strong>Toyota 132, BMW 127</strong> — apenas cinco pontos de diferença. Em Sachsenring, <strong>Marc Márquez</strong> fez um fim de semana perfeito (pole, sprint, corrida) e conquistou sua <strong>décima vitória na categoria rainha</strong> nesse traçado — igualando o recorde de Giacomo Agostini. No mundial, ele salta da quinta para a terceira posição, agora apenas 18 pontos atrás do líder Martín. A Fórmula 1 continua em pausa; a próxima parada é Spa, no domingo (19/07).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>BMW #15 vence as 6h de São Paulo</strong> (Magnussen/Marciello/Vanthoor, 242 voltas) à frente da Ferrari #51 (+2,254 s) e dos dois Cadillac. É a segunda vitória da BMW na temporada.</li>\n      <li><span class=\"chip hot\">WEC</span> <strong>Briga pelo título reacesa</strong>: a BMW reduz uma diferença de 36 pontos para apenas cinco — <strong>Toyota 132, BMW 127, Ferrari 88</strong>. A líder Toyota saiu de Interlagos de mãos vazias.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Márquez é o rei do Sachsenring</strong>: vitória da pole à bandeira quadriculada (+1,996 s sobre Ai Ogura), décima vitória na categoria rainha em Sachsenring — <strong>empatado com Agostini</strong>. Fim de semana perfeito: pole, sprint, corrida.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Salto para o terceiro lugar no mundial</strong>: Márquez agora com 190 pontos, <strong>18 atrás de Martín</strong> (208). Ai Ogura é o novo vice-líder (194). Bezzecchi ficou sem pontuar, e Álex Márquez e Di Giannantonio caíram.</li>\n      <li><span class=\"chip\">F1</span> <strong>Pausa continua</strong>: nenhuma sessão esta semana. Antonelli (179) e Mercedes (333) seguem na liderança, sem mudanças desde Silverstone. Próxima corrida: GP da Bélgica, Spa, dom 19/07 — largada às 15h00 CEST / 10h00 BRT, sem sprint.</li>\n      <li><span class=\"chip\">Panorama</span> <strong>Pausa de verão só depois da Hungria</strong>: Spa (19/07) e Budapeste (26/07), depois a pausa de três semanas — a temporada continua em Zandvoort (23/08).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es lunes 13 de julio — ya están los resultados del domingo doble de carreras. En Interlagos, la pista de casa de Daniel, el <strong>BMW #15</strong> ganó las 6 horas de São Paulo y llevó la clasificación de fabricantes de una ventaja de Toyota a un final fotográfico: <strong>Toyota 132, BMW 127</strong> — apenas cinco puntos de diferencia. En Sachsenring, <strong>Marc Márquez</strong> tuvo un fin de semana perfecto (pole, sprint, carrera) y logró su <strong>décima victoria en la categoría reina</strong> en esa pista — con lo que iguala el récord de Giacomo Agostini. En el campeonato salta del quinto al tercer lugar, ahora a solo 18 puntos del líder Martín. La Fórmula 1 sigue de descanso; la próxima parada es Spa, el domingo (19/07).</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>El BMW #15 gana las 6 horas de São Paulo</strong> (Magnussen/Marciello/Vanthoor, 242 vueltas) por delante del Ferrari #51 (+2,254 s) y de los dos Cadillac. Es la segunda victoria de BMW en la temporada.</li>\n      <li><span class=\"chip hot\">WEC</span> <strong>La pelea por el título se reaviva</strong>: BMW recorta una diferencia de 36 puntos a solo cinco — <strong>Toyota 132, BMW 127, Ferrari 88</strong>. La líder Toyota se quedó sin puntos en Interlagos.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Márquez es el rey de Sachsenring</strong>: victoria de punta a punta (+1,996 s sobre Ai Ogura), décima victoria en la categoría reina en Sachsenring — <strong>empatado con Agostini</strong>. Fin de semana perfecto: pole, sprint, carrera.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Salto al tercer lugar del mundial</strong>: Márquez ahora con 190 puntos, <strong>18 detrás de Martín</strong> (208). Ai Ogura es el nuevo segundo lugar (194). Bezzecchi se quedó sin puntuar, y Álex Márquez y Di Giannantonio se cayeron.</li>\n      <li><span class=\"chip\">F1</span> <strong>Sigue el descanso</strong>: no hay sesión esta semana. Antonelli (179) y Mercedes (333) siguen al frente, sin cambios desde Silverstone. Próxima carrera: GP de Bélgica, Spa, dom 19/07 — arranque a las 15:00 CEST / 10:00 BRT, sin sprint.</li>\n      <li><span class=\"chip\">Panorama</span> <strong>El receso de verano llega hasta después de Hungría</strong>: Spa (19/07) y Budapest (26/07), luego la pausa de tres semanas — la temporada continúa en Zandvoort (23/08).</li>\n    </ul></div>"

        "de": "<div class=\"tldr\"><p class=\"lead\">Heute beginnen in Paraná die zweiwöchigen Winterferien — für rund 1,1 Millionen Schulkinder, eure vier mittendrin. Der Kern-Ring ist diese Woche ruhig (das große Rodeio in Jacarezinho ist schon vorbei), aber Londrina liefert: das internationale Musikfestival läuft noch bis Sonntag, mit mehreren Gratis-Konzerten und einem Kindermusical. Dazu ein kurzer Kälte-Einbruch, der ab Mittwoch wieder kippt — und ein Blick auf die São-Paulo-Férias, falls ein größerer Trip lockt.</p>\n    <ul>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien 13.–24.07</strong>: Unterricht startet wieder am Mo 27.07 — zwei freie Wochen zum Planen.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Kaltfront jetzt, Wärme ab Mi</strong>: heute/morgen frisch mit Frostgefahr im Süden PR, ab 15.07 zurück Richtung 25°, trocken.</li>\n      <li><span class=\"chip good\">Event</span> <strong>FIML Londrina bis 19.07</strong>: Gratis-Konzerte (Do/Fr/So) + Kindermusical „GATOS\" am Sa 18.07.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Wochenend-Pick</strong>: FIML-Familienwochenende in Londrina — gratis Abschlusskonzert So 10h30, ideal fürs Kleinkind.</li>\n      <li><span class=\"chip\">Trip</span> <strong>São-Paulo-Férias</strong>: Disney-Ausstellung (gratis), Zoo-Übernachtung, Zirkus — falls ein 4–6-h-Trip reizt.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Winter</strong>: Atemwegs-Saison läuft — mit dem Säugling vorsichtig sein. Dengue-Lage dagegen sehr entspannt.</li>\n      <li><span class=\"chip\">Event</span> <strong>Kern-Ring ruhig</strong>: kein Familien-Event vor Ort diese Woche — die Musik-Highlights liegen in Londrina.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today marks the start of Paraná's two-week winter break — for around 1.1 million schoolchildren, your four right in the middle of it. The core ring is quiet this week (the big rodeo in Jacarezinho already wrapped up), but Londrina delivers: the international music festival runs through Sunday, with several free concerts and a children's musical. On top of that, a brief cold snap that turns around from Wednesday — plus a look at São Paulo's school-holiday scene, in case a bigger trip appeals.</p>\n    <ul>\n      <li><span class=\"chip\">School</span> <strong>Winter break 13.–24.07</strong>: classes resume Mon 27.07 — two free weeks to plan around.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Cold front now, warmth from Wed</strong>: crisp today/tomorrow with frost risk in southern PR, back toward 25° from 15.07, dry.</li>\n      <li><span class=\"chip good\">Event</span> <strong>FIML Londrina through 19.07</strong>: free concerts (Thu/Fri/Sun) + children's musical \"GATOS\" on Sat 18.07.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Weekend pick</strong>: FIML family weekend in Londrina — free closing concert Sun 10h30, ideal for the toddler.</li>\n      <li><span class=\"chip\">Trip</span> <strong>São Paulo school holidays</strong>: Disney exhibit (free), zoo sleepover, circus — in case a 4–6-hour trip appeals.</li>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV winter</strong>: respiratory-illness season is in full swing — be careful with the infant. The dengue situation, by contrast, is very relaxed.</li>\n      <li><span class=\"chip\">Event</span> <strong>Core ring quiet</strong>: no local family event this week — the music highlights are in Londrina.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje começam no Paraná as férias de inverno de duas semanas — cerca de 1,1 milhão de estudantes, nossos quatro no meio disso. O anel central está tranquilo esta semana (o grande rodeio em Jacarezinho já acabou), mas Londrina entrega: o festival internacional de música segue até domingo, com vários shows gratuitos e um musical infantil. Além disso, uma friagem rápida que vira a partir de quarta — e um olhar para as férias em São Paulo, caso um passeio maior anime.</p>\n    <ul>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno 13.–24.07</strong>: as aulas voltam na seg 27.07 — duas semanas livres para planejar.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Frente fria agora, calor a partir de qua</strong>: hoje/amanhã frio, com risco de geada no sul do PR, de volta perto de 25° a partir de 15.07, seco.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>FIML Londrina até 19.07</strong>: shows gratuitos (qui/sex/dom) + musical infantil \"GATOS\" no sáb 18.07.</li>\n      <li><span class=\"chip good\">Passeio</span> <strong>Escolha do fim de semana</strong>: fim de semana em família com o FIML em Londrina — show de encerramento gratuito dom 10h30, ideal para a criança pequena.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Férias em São Paulo</strong>: exposição da Disney (gratuita), pernoite no zoológico, circo — caso um passeio de 4 a 6 h anime.</li>\n      <li><span class=\"chip hot\">Saúde</span> <strong>VSR no inverno</strong>: a temporada de doenças respiratórias está a todo vapor — cuidado com o bebê. Já a situação da dengue está bem tranquila.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Anel central tranquilo</strong>: nenhum evento familiar por perto esta semana — os destaques musicais estão em Londrina.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy empiezan en Paraná las vacaciones de invierno de dos semanas — para cerca de 1,1 millones de estudiantes, nuestros cuatro en medio de todo esto. El anillo central está tranquilo esta semana (el gran rodeo en Jacarezinho ya terminó), pero Londrina cumple: el festival internacional de música sigue hasta el domingo, con varios conciertos gratuitos y un musical infantil. Además, un breve frente frío que se revierte a partir del miércoles — y un vistazo a las vacaciones en São Paulo, por si un viaje más grande resulta tentador.</p>\n    <ul>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno 13.–24.07</strong>: las clases regresan el lun 27.07 — dos semanas libres para planear.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Frente frío ahora, calor desde el mié</strong>: hoy/mañana fresco con riesgo de helada en el sur de PR, de vuelta hacia los 25° desde el 15.07, seco.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>FIML Londrina hasta el 19.07</strong>: conciertos gratuitos (jue/vie/dom) + musical infantil \"GATOS\" el sáb 18.07.</li>\n      <li><span class=\"chip good\">Paseo</span> <strong>Elección del fin de semana</strong>: fin de semana familiar con el FIML en Londrina — concierto de cierre gratuito el dom 10h30, ideal para la niña o el niño pequeño.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Vacaciones en São Paulo</strong>: exposición de Disney (gratis), pijamada en el zoológico, circo — por si un viaje de 4 a 6 h anima.</li>\n      <li><span class=\"chip hot\">Salud</span> <strong>VSR en invierno</strong>: la temporada de enfermedades respiratorias está en pleno apogeo — hay que tener cuidado con el bebé. La situación del dengue, en cambio, está muy tranquila.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Anillo central tranquilo</strong>: ningún evento familiar cerca esta semana — los destacados musicales están en Londrina.</li>\n    </ul></div>"
