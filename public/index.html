      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute Abend endet ein Turnier, und es endet mit der Paarung, die vor vier Wochen jeder auf dem Zettel hatte und trotzdem niemand für gesetzt hielt: Der Europameister gegen den Titelverteidiger. Spanien gegen Argentinien, MetLife Stadium, <strong>21:00 MESZ / 16:00 BRT</strong>. Für dich in Ribeirão Claro heißt das: Sonntagnachmittag, kein Wecker nötig, keine Ausrede. Der Rest des Fußball-Kalenders ist an diesem Tag höflich zur Seite getreten — Europa ist in der Sommerpause, der Brasileirão spielt seine erste Runde nach der WM-Unterbrechung zu Ende, und beim SC Freiburg passiert das Lauteste des Sommers ohnehin nicht auf dem Platz, sondern auf dem Transfermarkt.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Finale heute</strong>: Spanien – Argentinien, MetLife Stadium (East Rutherford, NJ), Anstoß 15:00 ET = <strong>21:00 MESZ / 16:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Der Weg dorthin</strong>: Spanien schlug Frankreich 2:0, Argentinien drehte gegen England ein 2:1 — Ausgleich in der 85., Siegtor per Kopf in der Nachspielzeit.</li>\n      <li><span class=\"chip\">WM</span> <strong>Halbzeitshow im Super-Bowl-Format</strong> — erstmals bei einem WM-Finale: Madonna, Justin Bieber, Shakira, BTS, Burna Boy, Gustavo Dudamel und der PS22 Chorus mit Coldplay.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburgs Rekordsommer</strong>: Johan Manzambi geht für rund 60 Mio. € Basis (Paket bis ~70 Mio. €) zu Aston Villa — mit Abstand der teuerste Verkauf der Vereinsgeschichte.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Engelhardt kommt zurück</strong>: 7 Mio. € an Como 1907 für den 25-jährigen Sechser — Como hatte 2024 selbst 8 Mio. € gezahlt.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Atubolu-Frage offen</strong>: Der Torhüter trainiert laut Sport1 individuell, Ersatz (Mio Backhaus) ist bereits da. Alles Weitere ist Gerücht, kein Fakt.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Erster Pflichtspiel-Termin</strong>: DFB-Pokal, 1. Runde bei Fortuna Düsseldorf, So 23.08.2026, 18:00 MESZ / 13:00 BRT.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart</strong>: Fr 28.08.2026, Bayern – Stuttgart, 20:30 MESZ / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão ist zurück</strong>: seit Do 16.07. läuft die 19. Runde. Palmeiras führt mit 41 Punkten aus 18 Spielen — sieben Zähler vor Flamengo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Rückkehr mit Rot</strong>: Fluminense 1:1 Bragantino im Maracanã — Ausgleich in der Nachspielzeit, drei Platzverweise.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute Abend endet ein Turnier, und es endet mit der Paarung, die vor vier Wochen jeder auf dem Zettel hatte und trotzdem niemand für gesetzt hielt: Der Europameister gegen den Titelverteidiger. Spanien gegen Argentinien, MetLife Stadium, <strong>21:00 MESZ / 16:00 BRT</strong>. Für dich in Ribeirão Claro heißt das: Sonntagnachmittag, kein Wecker nötig, keine Ausrede. Der Rest des Fußball-Kalenders ist an diesem Tag höflich zur Seite getreten — Europa ist in der Sommerpause, der Brasileirão spielt seine erste Runde nach der WM-Unterbrechung zu Ende, und beim SC Freiburg passiert das Lauteste des Sommers ohnehin nicht auf dem Platz, sondern auf dem Transfermarkt.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Finale heute</strong>: Spanien – Argentinien, MetLife Stadium (East Rutherford, NJ), Anstoß 15:00 ET = <strong>21:00 MESZ / 16:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Der Weg dorthin</strong>: Spanien schlug Frankreich 2:0, Argentinien drehte gegen England ein 2:1 — Ausgleich in der 85., Siegtor per Kopf in der Nachspielzeit.</li>\n      <li><span class=\"chip\">WM</span> <strong>Halbzeitshow im Super-Bowl-Format</strong> — erstmals bei einem WM-Finale: Madonna, Justin Bieber, Shakira, BTS, Burna Boy, Gustavo Dudamel und der PS22 Chorus mit Coldplay.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburgs Rekordsommer</strong>: Johan Manzambi geht für rund 60 Mio. € Basis (Paket bis ~70 Mio. €) zu Aston Villa — mit Abstand der teuerste Verkauf der Vereinsgeschichte.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Engelhardt kommt zurück</strong>: 7 Mio. € an Como 1907 für den 25-jährigen Sechser — Como hatte 2024 selbst 8 Mio. € gezahlt.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Atubolu-Frage offen</strong>: Der Torhüter trainiert laut Sport1 individuell, Ersatz (Mio Backhaus) ist bereits da. Alles Weitere ist Gerücht, kein Fakt.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Erster Pflichtspiel-Termin</strong>: DFB-Pokal, 1. Runde bei Fortuna Düsseldorf, So 23.08.2026, 18:00 MESZ / 13:00 BRT.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart</strong>: Fr 28.08.2026, Bayern – Stuttgart, 20:30 MESZ / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão ist zurück</strong>: seit Do 16.07. läuft die 19. Runde. Palmeiras führt mit 41 Punkten aus 18 Spielen — sieben Zähler vor Flamengo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Rückkehr mit Rot</strong>: Fluminense 1:1 Bragantino im Maracanã — Ausgleich in der Nachspielzeit, drei Platzverweise.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Tonight a tournament ends, and it ends with the matchup everybody circled four weeks ago and nobody quite believed would actually happen: the European champion against the defending champion. Spain against Argentina, MetLife Stadium, <strong>21:00 CEST / 16:00 BRT</strong>. For you in Ribeirão Claro that means a Sunday afternoon, no alarm needed, no excuses. The rest of the football calendar has politely stepped aside for the day — Europe is on its summer break, the Brasileirão is finishing its first round back after the World Cup pause, and at SC Freiburg the loudest thing happening this summer isn't on the pitch anyway, it's on the transfer market.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Final today</strong>: Spain – Argentina, MetLife Stadium (East Rutherford, NJ), kickoff 15:00 ET = <strong>21:00 CEST / 16:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>The road there</strong>: Spain beat France 2-0, Argentina turned around a 2-1 win over England — equalizer in the 85th, winning header in stoppage time.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Super Bowl-style halftime show</strong> — a first for a World Cup final: Madonna, Justin Bieber, Shakira, BTS, Burna Boy, Gustavo Dudamel, and the PS22 Chorus with Coldplay.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg's record-breaking summer</strong>: Johan Manzambi moves for a base fee of around €60m (package up to ~€70m) to Aston Villa — by far the biggest sale in club history.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Engelhardt comes back</strong>: €7m to Como 1907 for the 25-year-old holding midfielder — Como itself had paid €8m for him in 2024.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Atubolu question open</strong>: The goalkeeper is training individually per Sport1, with a replacement (Mio Backhaus) already in place. Everything else is rumor, not fact.</li>\n      <li><span class=\"chip\">Cup</span> <strong>First competitive fixture set</strong>: DFB Cup, 1st round away at Fortuna Düsseldorf, Sun, August 23, 2026, 18:00 CEST / 13:00 BRT.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season start</strong>: Fri August 28, 2026, Bayern – Stuttgart, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão is back</strong>: Round 19 has been underway since Thu, July 16. Palmeiras leads with 41 points from 18 matches — seven clear of Flamengo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Return with red cards</strong>: Fluminense 1-1 Bragantino at the Maracanã — stoppage-time equalizer, three red cards.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje à noite termina um torneio, e termina com o confronto que todo mundo já esperava há quatro semanas e que mesmo assim ninguém dava como certo: o campeão europeu contra o atual campeão mundial. Espanha contra Argentina, MetLife Stadium, <strong>21:00 CEST / 16:00 BRT</strong>. Para você aí em Ribeirão Claro, isso significa domingo à tarde, sem despertador, sem desculpa. O resto do calendário do futebol educadamente deu espaço nesse dia — a Europa está de férias de verão, o Brasileirão termina sua primeira rodada após a pausa da Copa, e no SC Freiburg o barulho maior do verão nem acontece em campo, e sim no mercado da bola.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Final hoje</strong>: Espanha – Argentina, MetLife Stadium (East Rutherford, NJ), bola rolando às 15:00 ET = <strong>21:00 CEST / 16:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>O caminho até aqui</strong>: Espanha bateu a França por 2 a 0, Argentina virou contra a Inglaterra por 2 a 1 — empate aos 85, gol de cabeça da vitória nos acréscimos.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Show do intervalo em formato Super Bowl</strong> — pela primeira vez em uma final de Copa do Mundo: Madonna, Justin Bieber, Shakira, BTS, Burna Boy, Gustavo Dudamel e o Coral PS22 com o Coldplay.</li>\n      <li><span class=\"chip hot\">Transferência</span> <strong>Verão recorde do Freiburg</strong>: Johan Manzambi vai para o Aston Villa por cerca de € 60 milhões de base (pacote de até ~€ 70 milhões) — de longe a venda mais cara da história do clube.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Engelhardt está de volta</strong>: € 7 milhões pagos ao Como 1907 pelo volante de 25 anos — o Como havia desembolsado ele próprio € 8 milhões em 2024.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Questão Atubolu em aberto</strong>: o goleiro treina separadamente do grupo, segundo a Sport1, e o substituto (Mio Backhaus) já está no elenco. O resto é boato, não fato.</li>\n      <li><span class=\"chip\">Copa da Alemanha</span> <strong>Primeiro compromisso oficial</strong>: DFB-Pokal, 1ª rodada fora de casa contra o Fortuna Düsseldorf, dom. 23/08/2026, 18:00 CEST / 13:00 BRT.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Início da temporada</strong>: sex. 28/08/2026, Bayern – Stuttgart, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão está de volta</strong>: desde qui. 16/07 rola a 19ª rodada. Palmeiras lidera com 41 pontos em 18 jogos — sete pontos à frente do Flamengo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Retorno com vermelho</strong>: Fluminense 1 a 1 com o Bragantino no Maracanã — empate nos acréscimos, três expulsões.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta noche termina un torneo, y termina con el enfrentamiento que hace cuatro semanas todos tenían en mente y que, sin embargo, nadie daba por seguro: el campeón de Europa contra el campeón defensor del título. España contra Argentina, MetLife Stadium, <strong>21:00 CEST / 16:00 BRT</strong>. Para ti en Ribeirão Claro eso significa: domingo por la tarde, sin necesidad de despertador, sin excusas. El resto del calendario futbolístico se hizo educadamente a un lado este día — Europa está de descanso veraniego, el Brasileirão termina de disputar su primera jornada tras la pausa mundialista, y en el SC Freiburg lo más ruidoso del verano de todos modos no ocurre en la cancha, sino en el mercado de fichajes.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Final hoy</strong>: España – Argentina, MetLife Stadium (East Rutherford, Nueva Jersey), inicio 15:00 hora del Este = <strong>21:00 CEST / 16:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Mundial</span> <strong>El camino hasta aquí</strong>: España venció a Francia 2-0, Argentina remontó ante Inglaterra para un 2-1 — empate en el 85', gol de la victoria de cabeza en el tiempo agregado.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Show de medio tiempo al estilo Super Bowl</strong> — por primera vez en una final de Mundial: Madonna, Justin Bieber, Shakira, BTS, Burna Boy, Gustavo Dudamel y el Coro PS22 junto con Coldplay.</li>\n      <li><span class=\"chip hot\">Fichajes</span> <strong>El verano récord del Freiburg</strong>: Johan Manzambi se va al Aston Villa por unos 60 millones de € de traspaso base (paquete de hasta ~70 millones de €) — con diferencia, la venta más cara en la historia del club.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Engelhardt regresa</strong>: 7 millones de € al Como 1907 por el volante de 25 años — el Como había pagado 8 millones de € por él en 2024.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>La cuestión Atubolu sigue abierta</strong>: el portero entrena de forma individual, según Sport1; su reemplazo (Mio Backhaus) ya está en el club. Todo lo demás es rumor, no un hecho.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Primera fecha oficial</strong>: Copa de Alemania (DFB-Pokal), 1.ª ronda ante el Fortuna Düsseldorf, dom. 23/08/2026, 18:00 CEST / 13:00 BRT.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Arranque de temporada</strong>: vie. 28/08/2026, Bayern – Stuttgart, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>El Brasileirão está de vuelta</strong>: desde el jue. 16/07 se juega la jornada 19. Palmeiras lidera con 41 puntos en 18 partidos — siete unidades por delante del Flamengo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Regreso con expulsiones</strong>: Fluminense 1-1 Bragantino en el Maracaná — empate en el tiempo agregado, tres expulsados.</li>\n    </ul></div>"

pan class=\"chip good\">WEC</span> <strong>BMW gewann São Paulo</strong> (12.07.) vor Ferrari (+2,254 s) — <strong>Toyota führt trotzdem 132:127</strong>. Nächster Lauf erst Austin, 04.–06.09.</li>\n      <li><span class=\"chip\">Quellen-Konflikt</span> <strong>WEC-Tabelle: zwei Stände im Umlauf.</strong> Wir nehmen die offizielle fiawec.com-Wertung; motorsport.com wirkt auf fast allen Zeilen veraltet. Details im Kasten.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nur Formel 1 an diesem Wochenende.</strong> MotoGP pausiert bis Silverstone (07.–09.08., jetzt primär bestätigt), Formel E hat keinen Lauf. Nächster F1-Termin: Ungarn, 24.–26.07.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday, July 19 — <strong>race day in Spa</strong>. At <strong>10:00 BRT</strong> (15:00 CEST) the field rolls off for 44 laps, and the starting grid reads like a screenwriter's fantasy: up front sits championship leader <strong>Kimi Antonelli</strong>, with <strong>Max Verstappen</strong> right beside him — whose contract future has, since yesterday, become the season's second big storyline. Antonelli's pole lap of 1:44.361 was 0.317 seconds faster than Verstappen's best — on a track where Verstappen is historically strong. But the real reason this race matters is in the standings: Antonelli leads Russell <strong>179 to 154</strong>, <strong>despite scoring zero points at Silverstone</strong>. A title contender who loses a race outright and still holds a 25-point lead has a very comfortable cushion — and today, the chance to extend it. Otherwise it's a quiet motorsport Sunday: WEC, MotoGP, and Formula E are all off.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · today</span> <strong>Race start 15:00 CEST / 10:00 BRT</strong>, 44 laps at Spa-Francorchamps, a classic weekend with no sprint.</li>\n      <li><span class=\"chip hot\">Starting grid</span> <strong>Antonelli on pole (1:44.361)</strong> ahead of Verstappen (+0.317 s). Russell starts third, Leclerc fourth, Hamilton fifth.</li>\n      <li><span class=\"chip\">Penalty</span> <strong>Norris qualifies P3 but starts 13th</strong> — ten grid places dropped for exceeding his power unit component allocation.</li>\n      <li><span class=\"chip\">Title fight</span> <strong>Antonelli 179, Russell 154</strong> — a 25-point lead, built despite a <strong>zero at Silverstone</strong> (won there by Leclerc).</li>\n      <li><span class=\"chip\">Constructors</span> <strong>Mercedes 333</strong> ahead of Ferrari 255 and McLaren 179 — a 78-point lead, both Mercedes drivers in the top two.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>BMW won São Paulo</strong> (Jul 12) ahead of Ferrari (+2.254 s) — <strong>Toyota still leads 132:127</strong>. Next round not until Austin, Sep 4–6.</li>\n      <li><span class=\"chip\">Source conflict</span> <strong>WEC standings: two versions in circulation.</strong> We use the official fiawec.com classification; motorsport.com looks stale on nearly every row. Details in the box below.</li>\n      <li><span class=\"chip\">Calendar</span> <strong>Only Formula 1 this weekend.</strong> MotoGP is on break until Silverstone (Aug 7–9, now confirmed at the primary source), Formula E has no round. Next F1 date: Hungary, Jul 24–26.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é domingo, 19 de julho — <strong>dia de corrida em Spa</strong>. Às <strong>10h00 BRT</strong> (15h00 CEST) o pelotão larga para 44 voltas, e o grid de largada parece roteiro de filme: na frente está <strong>Kimi Antonelli</strong>, o líder do campeonato, e logo ao lado, <strong>Max Verstappen</strong>, cujo futuro contratual é, desde ontem, o segundo grande assunto da temporada. A volta de pole de Antonelli, 1:44,361, foi 0,317 segundos mais rápida que a melhor de Verstappen — numa pista em que Verstappen é historicamente forte. Mas o verdadeiro motivo pelo qual esta corrida importa está na tabela: Antonelli lidera por <strong>179 a 154</strong> sobre Russell, <strong>mesmo tendo somado zero pontos em Silverstone</strong>. Um candidato ao título que perde uma corrida inteira e ainda assim mantém 25 pontos de vantagem tem uma folga bastante confortável — e hoje tem a chance de ampliá-la. Fora isso, o domingo de automobilismo está enxuto: WEC, MotoGP e Fórmula E não correm.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · hoje</span> <strong>Largada 15h00 CEST / 10h00 BRT</strong>, 44 voltas em Spa-Francorchamps, fim de semana clássico sem sprint.</li>\n      <li><span class=\"chip hot\">Grid de largada</span> <strong>Antonelli na pole (1:44,361)</strong> à frente de Verstappen (+0,317 s). Russell larga em terceiro, Leclerc em quarto, Hamilton em quinto.</li>\n      <li><span class=\"chip\">Penalização</span> <strong>Norris faz o P3 no treino, mas larga em 13º.</strong> — dez posições de penalização por excesso de componentes de unidade de potência.</li>\n      <li><span class=\"chip\">Disputa pelo título</span> <strong>Antonelli 179, Russell 154</strong> — 25 pontos de vantagem, construída apesar de uma <strong>zerada em Silverstone</strong> (onde Leclerc venceu).</li>\n      <li><span class=\"chip\">Construtores</span> <strong>Mercedes 333</strong> à frente de Ferrari 255 e McLaren 179 — 78 pontos de vantagem, com os dois pilotos da Mercedes no top 2.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>A BMW venceu em São Paulo</strong> (12/07) à frente da Ferrari (+2,254 s) — <strong>a Toyota segue líder, 132 a 127</strong>. Próxima etapa só em Austin, 04–06/09.</li>\n      <li><span class=\"chip\">Conflito de fontes</span> <strong>Classificação do WEC: dois números circulando.</strong> Adotamos a classificação oficial do fiawec.com; o motorsport.com parece desatualizado em quase todas as linhas. Detalhes no quadro.</li>\n      <li><span class=\"chip\">Calendário</span> <strong>Só a Fórmula 1 neste fim de semana.</strong> A MotoGP está de pausa até Silverstone (07–09/08, agora confirmado por fonte primária), a Fórmula E não tem etapa. Próximo compromisso da F1: Hungria, 24–26/07.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es domingo 19 de julio — <strong>día de carrera en Spa</strong>. A las <strong>10:00 BRT</strong> (15:00 CEST) el pelotón arranca a lo largo de 44 vueltas, y la parrilla de salida parece sacada de un guion: al frente está <strong>Kimi Antonelli</strong>, el líder del campeonato, justo a su lado <strong>Max Verstappen</strong>, cuyo futuro contractual es desde ayer el segundo gran tema de la temporada. La vuelta de pole de Antonelli, 1:44,361, fue 0,317 segundos más rápida que la mejor de Verstappen — en una pista donde Verstappen suele ser históricamente fuerte. Pero la verdadera razón por la que esta carrera importa está en la tabla: Antonelli lidera <strong>179 a 154</strong> sobre Russell, <strong>a pesar de no haber sumado ningún punto en Silverstone</strong>. Un candidato al título que pierde por completo una carrera y aun así conserva 25 puntos de ventaja tiene un colchón muy cómodo — y hoy la oportunidad de ampliarlo. Fuera de eso, el domingo de automovilismo es escaso: la WEC, la MotoGP y la Fórmula E no corren.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · hoy</span> <strong>Salida de la carrera 15:00 CEST / 10:00 BRT</strong>, 44 vueltas en Spa-Francorchamps, fin de semana clásico sin sprint.</li>\n      <li><span class=\"chip hot\">Parrilla de salida</span> <strong>Antonelli en la pole (1:44,361)</strong> por delante de Verstappen (+0,317 s). Russell sale tercero, Leclerc cuarto, Hamilton quinto.</li>\n      <li><span class=\"chip\">Penalización</span> <strong>Norris marca P3 pero sale 13.</strong> — diez puestos atrás por exceso de componentes de la unidad de potencia.</li>\n      <li><span class=\"chip\">Pelea por el título</span> <strong>Antonelli 179, Russell 154</strong> — 25 puntos de ventaja, construidos pese a <strong>no sumar en Silverstone</strong> (ahí ganó Leclerc).</li>\n      <li><span class=\"chip\">Constructores</span> <strong>Mercedes 333</strong> por delante de Ferrari 255 y McLaren 179 — 78 puntos de ventaja, con ambos pilotos de Mercedes en el top dos.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>BMW ganó en São Paulo</strong> (12/07) por delante de Ferrari (+2,254 s) — <strong>Toyota sigue al frente 132:127</strong>. Próxima carrera hasta Austin, 04–06/09.</li>\n      <li><span class=\"chip\">Conflicto de fuentes</span> <strong>Tabla de la WEC: dos versiones en circulación.</strong> Tomamos la clasificación oficial de fiawec.com; motorsport.com parece desactualizada en casi todas las filas. Detalles en el recuadro.</li>\n      <li><span class=\"chip\">Calendario</span> <strong>Solo Fórmula 1 este fin de semana.</strong> La MotoGP está en pausa hasta Silverstone (07–09/08, ahora confirmado en fuente primaria), la Fórmula E no tiene carrera. Próxima cita de F1: Hungría, 24–26/07.</li>\n    </ul></div>"

        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist der vorletzte Sonntag der Schulferien — am Montag, 27.07., klingelt es wieder. Diese Woche ist damit das letzte offene Fenster, und ausgerechnet der Kern-Ring ist leer: rund um Ribeirão Claro und Jacarezinho hat diese Recherche keinen einzigen bestätigten Familien-Termin gefunden. Dafür ist Londrina (~110 km) im Ferienmodus randvoll — kostenloses Ferienprogramm, Kindertheater für R$ 10, Bibliotheks-Woche. Und das Wetter spielt bis Mittwoch mit.</p>\n    <ul>\n      <li><span class=\"chip good\">WETTER</span> <strong>Drei goldene Tage</strong>: heute bis Dienstag sonnig und trocken, 28–29 °C, 0 mm — beide geprüften Portale sind sich einig.</li>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Ab Mittwoch Streit unter den Prognosen</strong>: Climatempo sagt für 22.07. noch trocken, theweather.com 80 % Regen. Beide Werte stehen unten — nicht gemittelt.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Ferien-Endspurt</strong>: PR-Recesso läuft seit 13.07., Rückkehr in den Unterricht Montag, 27.07.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Heute in Londrina</strong>: gratis Ferien-Colônia im Norte Shopping (11–14 h), danach „Pinóquio\" im Teatro do Clubinho für R$ 10.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Bibliotheks-Woche</strong>: Mo–Fr täglich 10 h Gratis-Programm in der Biblioteca Municipal Infantil, Praça 1º de Maio 110.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>SESC Londrina Norte</strong>: „Brincando nas Férias\" noch bis Freitag, täglich 13:30 — Alter und Preis stehen aber nirgends bestätigt.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range nächstes Wochenende</strong>: Festa das Cerejeiras im Parque do Carmo (ab 24.07.) und Festival do Milho (25.–26.07.), beide Eintritt frei.</li>\n      <li><span class=\"chip hot\">TRIP</span> <strong>Nicht planen</strong>: Kidzhouse Festival SP (24.–26.07.) ist offiziell verschoben („ADIADO\").</li>\n      <li><span class=\"chip\">GESUNDHEIT</span> <strong>Norte Pioneiro nicht betroffen</strong>: INMET hat seit Fr 17.07. eine orange Vendaval-Warnung (Böen 60–100 km/h) für Oeste, Sudoeste, Noroeste und Centro-Sul do Paraná laufen, gültig bis heute 23:59 — unsere Region ist nicht darunter.</li>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>Dengue-Falle</strong>: die kursierende Zahl „22,2 Tsd. Fälle / 11 Tote\" ist aus der Saison 2023/24 — kein 2026er Wert. Details unten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's the second-to-last Sunday of school vacation — on Monday, 07/27, classes start again. That makes this week the last open window, and of all weeks, the core ring is empty: this research found not a single confirmed family event around Ribeirão Claro and Jacarezinho. Londrina (~110 km), on the other hand, is packed with vacation programming — free holiday activities, children's theater for R$ 10, a library week. And the weather cooperates until Wednesday.</p>\n    <ul>\n      <li><span class=\"chip good\">WEATHER</span> <strong>Three golden days</strong>: sunny and dry from today through Tuesday, 28–29 °C, 0 mm — both checked portals agree.</li>\n      <li><span class=\"chip hot\">WEATHER</span> <strong>The forecasts clash starting Wednesday</strong>: Climatempo still calls 07/22 dry, theweather.com says 80% rain. Both figures are listed below — not averaged.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Final stretch of vacation</strong>: PR recess has been running since 07/13, return to class Monday, 07/27.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Today in Londrina</strong>: free vacation day-camp at Norte Shopping (11 am–2 pm), then \"Pinóquio\" at Teatro do Clubinho for R$ 10.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Library week</strong>: Mon–Fri, daily 10 am free program at the Biblioteca Municipal Infantil, Praça 1º de Maio 110.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>SESC Londrina Norte</strong>: \"Brincando nas Férias\" runs through Friday, daily at 1:30 pm — but age range and price aren't confirmed anywhere.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP range next weekend</strong>: Festa das Cerejeiras at Parque do Carmo (from 07/24) and Festival do Milho (07/25–26), both free admission.</li>\n      <li><span class=\"chip hot\">TRIP</span> <strong>Don't plan around this</strong>: Kidzhouse Festival SP (07/24–26) has officially been postponed (\"ADIADO\").</li>\n      <li><span class=\"chip\">HEALTH</span> <strong>Norte Pioneiro not affected</strong>: since Fri 07/17 INMET has had an orange windstorm advisory (gusts 60–100 km/h) in effect for Oeste, Sudoeste, Noroeste and Centro-Sul do Paraná, valid through 11:59 pm today — our region is not on it.</li>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>Dengue trap</strong>: the figure circulating — \"22,200 cases / 11 deaths\" — is from the 2023/24 season, not a 2026 number. Details below.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É o penúltimo domingo das férias escolares — na segunda-feira, 27/07, as aulas voltam. Esta semana é, portanto, a última janela livre, e justamente o anel central está vazio: em torno de Ribeirão Claro e Jacarezinho, esta apuração não encontrou nenhum compromisso familiar confirmado. Em compensação, Londrina (~110 km) está lotada de programação de férias — colônia de férias gratuita, teatro infantil por R$ 10, semana da biblioteca. E o tempo colabora até quarta-feira.</p>\n    <ul>\n      <li><span class=\"chip good\">CLIMA</span> <strong>Três dias de ouro</strong>: hoje até terça-feira, sol e tempo seco, 28–29 °C, 0 mm — os dois portais consultados concordam.</li>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>A partir de quarta, previsões divergem</strong>: o Climatempo indica tempo seco ainda para 22/07, o theweather.com aponta 80% de chance de chuva. Os dois valores aparecem abaixo — sem fazer média.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Reta final das férias</strong>: o recesso do PR está em curso desde 13/07, volta às aulas na segunda-feira, 27/07.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Hoje em Londrina</strong>: colônia de férias gratuita no Norte Shopping (11h–14h), depois \"Pinóquio\" no Teatro do Clubinho por R$ 10.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Semana da biblioteca</strong>: de segunda a sexta, programação gratuita diária às 10h na Biblioteca Municipal Infantil, Praça 1º de Maio, 110.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>SESC Londrina Norte</strong>: \"Brincando nas Férias\" até sexta-feira, todos os dias às 13h30 — mas idade e preço não estão confirmados em lugar nenhum.</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>Roteiro em SP no próximo fim de semana</strong>: Festa das Cerejeiras no Parque do Carmo (a partir de 24/07) e Festival do Milho (25–26/07), ambos com entrada gratuita.</li>\n      <li><span class=\"chip hot\">PASSEIO</span> <strong>Não conte com isso</strong>: o Kidzhouse Festival SP (24–26/07) foi oficialmente adiado (\"ADIADO\").</li>\n      <li><span class=\"chip\">SAÚDE</span> <strong>Norte Pioneiro fora da área</strong>: desde sexta, 17/07, o INMET mantém um aviso laranja de vendaval (rajadas de 60–100 km/h) para o Oeste, Sudoeste, Noroeste e Centro-Sul do Paraná, válido até as 23h59 de hoje — a nossa região não está na lista.</li>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Armadilha da dengue</strong>: o número que circula, \"22,2 mil casos / 11 óbitos\", é da temporada 2023/24 — não é um dado de 2026. Detalhes abaixo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es el penúltimo domingo de las vacaciones escolares — el lunes 27/07 suena de nuevo la campana. Esta semana es, entonces, la última ventana abierta, y justo el anillo central está vacío: alrededor de Ribeirão Claro y Jacarezinho, esta investigación no encontró ni un solo evento familiar confirmado. En cambio, Londrina (~110 km) está a tope en modo vacacional — programa vacacional gratuito, teatro infantil por R$ 10, semana de biblioteca. Y el clima coopera hasta el miércoles.</p>\n    <ul>\n      <li><span class=\"chip good\">CLIMA</span> <strong>Tres días dorados</strong>: de hoy al martes, soleado y seco, 28–29 °C, 0 mm — ambos portales revisados coinciden.</li>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>Desde el miércoles, las previsiones se contradicen</strong>: Climatempo dice que el 22/07 seguirá seco, theweather.com dice 80 % de lluvia. Ambos valores aparecen abajo — sin promediar.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Recta final de vacaciones</strong>: el receso de PR está en marcha desde el 13/07, regreso a clases el lunes 27/07</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Hoy en Londrina</strong>: campamento de vacaciones gratuito en el Norte Shopping (11–14 h), después \"Pinóquio\" en el Teatro do Clubinho por R$ 10.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Semana de biblioteca</strong>: de lunes a viernes, programa gratuito todos los días a las 10 h en la Biblioteca Municipal Infantil, Praça 1º de Maio 110.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>SESC Londrina Norte</strong>: \"Brincando nas Férias\" hasta el viernes, todos los días a las 13:30 — pero la edad y el precio no aparecen confirmados en ninguna parte.</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Radio de São Paulo el próximo fin de semana</strong>: Festa das Cerejeiras en el Parque do Carmo (desde el 24/07) y Festival do Milho (25–26/07), ambos con entrada gratuita.</li>\n      <li><span class=\"chip hot\">VIAJE</span> <strong>No planear</strong>: el Kidzhouse Festival SP (24–26/07) está oficialmente pospuesto (\"ADIADO\").</li>\n      <li><span class=\"chip\">SALUD</span> <strong>Norte Pioneiro fuera del área</strong>: desde el viernes 17/07 INMET mantiene un aviso naranja de vendaval (ráfagas de 60–100 km/h) para el Oeste, Sudoeste, Noroeste y Centro-Sul de Paraná, vigente hasta las 23:59 de hoy — nuestra región no está en la lista.</li>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Trampa del dengue</strong>: la cifra que circula, \"22,2 mil casos / 11 muertes\", es de la temporada 2023/24 — no es un valor de 2026. Detalles abajo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sonntag, der 19. Juli — Wochenthema <em>Politik, Recht &amp; Gesundheit</em>, heute Teil sechs: <em>Bürokratie &amp; Behördengänge</em>. Nach Wahlen, Gericht, Versicherung und Arztpraxis fehlte genau der Teil, der im brasilianischen Alltag am meisten Zeit frisst: Dokumente besorgen, beglaubigen lassen, Anträge stellen, Fristen einhalten. Ein <em>comprovante de residência</em> wird hier für fast alles verlangt, und für viele Unterschriften muss man ins <em>cartório</em>, um <em>firma zu reconhecer</em> — ein Schritt, den es in Deutschland so nicht gibt. 30 Einträge, 12 Verben mit voller Konjugation (davon eine Auffrischung), dazu die fünf kniffligsten Konjugations-Fallen des Tages und ein falscher Freund, der Spanisch-Kenner regelmäßig erwischt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>asistir (ES) ≠ to assist</strong> — <em>asistir</em> heißt <em>teilnehmen / beiwohnen</em>, nicht „helfen\". Die RAE definiert es als „ir alguien a un lugar donde se celebra un acto\". „Helfen\" ist <em>ayudar</em>. Also: <em>asistí a la audiencia</em> = ich <em>war bei</em> der Anhörung, nicht ich <em>half</em> ihr.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>reconhecer firma</strong> — der Tabelião (Notar) bestätigt, dass die Unterschrift auf dem Dokument die der Person ist. Zwei Varianten: <em>por semelhança</em> (Abgleich mit der hinterlegten Unterschriftenkarte, ohne persönliches Erscheinen) und <em>por autenticidade</em> (man muss selbst hin).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>tirar uma xerox</strong> — in Brasilien sagt niemand <em>fotocópia</em> im Alltag. Der Markenname wurde zum Verb-Objekt; in Portugal hieße es <em>tirar uma fotocópia</em>.</li>\n      <li><span class=\"chip hot\">KONJUGATION</span> <strong>ES renovar diphthongiert o→ue</strong> (<em>yo renuevo</em>, nicht <em>*renovo</em>) — aber <em>nosotros renovamos</em> bleibt ohne Diphthong. Und Achtung: PT <em>renovar</em> macht das <strong>nicht</strong> mit — <em>eu renovo</em>.</li>\n      <li><span class=\"chip hot\">KONJUGATION</span> <strong>PT reconhecer → eu reconheço</strong> — vor <em>o</em> und <em>a</em> wird aus dem <em>c</em> ein <em>ç</em>, sonst klänge es hart. Im ganzen Subjuntivo: <em>que eu reconheça, que nós reconheçamos</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES requerir ist gemischt e→ie <em>und</em> e→i</strong> — <em>yo requiero</em>, aber <em>él requirió</em> und <em>que nosotros requiramos</em>. Nicht einfach ein e→ie-Verb.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES -zar-Verben: z→c vor e</strong> — <em>yo rechacé</em>, <em>yo legalicé</em>, Subjuntivo <em>rechace / legalice</em>. Gleiche Logik wie <em>c→qu</em> bei den -car-Verben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>teilnehmen ist stark <em>und</em> trennbar</strong> — <em>er nimmt teil</em> (Umlaut), <em>er nahm teil</em> (Ablaut), <em>hat teilgenommen</em>. Das <em>ge-</em> rutscht zwischen Präfix und Stamm.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>Urkunde ≠ acta ≠ certidão</strong> — die Geburtsurkunde ist PT <em>a certidão de nascimento</em>, ES-MX aber <em>el acta de nacimiento</em> (maskuliner Artikel <em>el</em> trotz femininem Wort — wegen des betonten Anlaut-<em>a</em>: <em>el acta</em>, aber <em>las actas</em>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>etwas auf die lange Bank schieben</strong> — eine Entscheidung so lange wie möglich verzögern. Die Redewendung stammt aus dem Gerichtswesen des 15. Jahrhunderts — passender geht es für einen Behörden-Tag kaum.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>der Amtsschimmel wiehert</strong> — Bürokratie in ihrer sturen, formverliebten Form. Kein Pferd im Spiel: vermutlich vom Kanzlei-Wort <em>Simile</em> („nach dem gleichen Muster\") verschliffen.</li>\n      <li><span class=\"chip\">WIEDERHOLUNG</span> <strong>beantragen · die Vollmacht · die Klage</strong> — aufgefrischt aus dem Arbeitsrechts- und dem Vertragsrechts-Tag (21. und 23. Juni). Alle drei sind heute Kern-Vokabeln: einen Antrag <em>beantragen</em>, mit <em>Vollmacht</em> für jemand anderen aufs Amt gehen, bei Ablehnung <em>Klage</em> erheben.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Sunday, July 19 — weekly theme <em>Politics, Law &amp; Health</em>, today part six: <em>Bureaucracy &amp; Government Errands</em>. After elections, court, insurance and the doctor's office, exactly the part that eats the most time in Brazilian daily life was still missing: getting documents together, having them notarized, filing applications, meeting deadlines. A <em>comprovante de residência</em> (proof of address) is required here for almost everything, and for many signatures you have to go to the <em>cartório</em> to have your <em>firma reconhecida</em> — a step that simply doesn't exist in Germany. 30 entries, 12 verbs with full conjugation (one of them a refresher), plus the five trickiest conjugation traps of the day and a false friend that regularly catches out Spanish speakers.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>asistir (ES) ≠ to assist</strong> — <em>asistir</em> means <em>to attend / to be present at</em>, not \"to help\". The RAE defines it as \"ir alguien a un lugar donde se celebra un acto\" (for someone to go to a place where an event is taking place). \"To help\" is <em>ayudar</em>. So: <em>asistí a la audiencia</em> = I <em>attended</em> the hearing, not I <em>helped</em> it.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>reconhecer firma</strong> — the tabelião (notary) confirms that the signature on the document is that of the person. Two variants: <em>por semelhança</em> (matched against the signature card on file, no need to appear in person) and <em>por autenticidade</em> (you have to show up yourself).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>tirar uma xerox</strong> — in Brazil nobody says <em>fotocópia</em> in everyday speech. The brand name became a verb-object; in Portugal it would be <em>tirar uma fotocópia</em>.</li>\n      <li><span class=\"chip hot\">CONJUGATION</span> <strong>ES renovar diphthongizes o→ue</strong> (<em>yo renuevo</em>, not <em>*renovo</em>) — but <em>nosotros renovamos</em> stays without the diphthong. And watch out: PT <em>renovar</em> does <strong>not</strong> do this — <em>eu renovo</em>.</li>\n      <li><span class=\"chip hot\">CONJUGATION</span> <strong>PT reconhecer → eu reconheço</strong> — before <em>o</em> and <em>a</em>, the <em>c</em> becomes a <em>ç</em>, otherwise it would sound hard. Throughout the subjunctive: <em>que eu reconheça, que nós reconheçamos</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES requerir is a mixed e→ie <em>and</em> e→i verb</strong> — <em>yo requiero</em>, but <em>él requirió</em> and <em>que nosotros requiramos</em>. Not simply an e→ie verb.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES -zar verbs: z→c before e</strong> — <em>yo rechacé</em>, <em>yo legalicé</em>, subjunctive <em>rechace / legalice</em>. Same logic as <em>c→qu</em> in -car verbs.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>teilnehmen (to take part) is strong <em>and</em> separable</strong> — <em>er nimmt teil</em> (umlaut), <em>er nahm teil</em> (ablaut), <em>hat teilgenommen</em>. The <em>ge-</em> slots in between the prefix and the stem.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>Urkunde (certificate) ≠ acta ≠ certidão</strong> — the birth certificate is PT <em>a certidão de nascimento</em>, but ES-MX <em>el acta de nacimiento</em> (masculine article <em>el</em> despite the feminine noun — because of the stressed initial <em>a</em>: <em>el acta</em>, but <em>las actas</em>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>etwas auf die lange Bank schieben</strong> (to put something on the long bench) — to delay a decision for as long as possible. The idiom comes from 15th-century court practice — a fitting one for a bureaucracy-themed day.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>der Amtsschimmel wiehert</strong> (the \"office white horse\" neighs) — bureaucracy at its most rigid, form-obsessed self. No actual horse involved: it likely comes from a garbled version of the chancery term <em>Simile</em> (\"following the same pattern\").</li>\n      <li><span class=\"chip\">REFRESHER</span> <strong>beantragen (to apply for) · die Vollmacht (power of attorney) · die Klage (lawsuit)</strong> — refreshed from the labor-law and contract-law days (June 21 and 23). All three are core vocabulary today: you <em>beantragen</em> an application, go to the office with someone else's <em>Vollmacht</em>, and file a <em>Klage</em> if you're turned down.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, dia 19 de julho — tema da semana <em>Política, Direito &amp; Saúde</em>, hoje a sexta parte: <em>Burocracia e repartições públicas</em>. Depois de eleições, tribunal, seguro e consultório médico, faltava justamente a parte que mais consome tempo no dia a dia brasileiro: providenciar documentos, autenticá-los, protocolar pedidos, cumprir prazos. Aqui se exige um <em>comprovante de residência</em> para quase tudo, e para muitas assinaturas é preciso ir ao <em>cartório</em> reconhecer firma — uma etapa que não existe assim na Alemanha. São 30 verbetes, 12 verbos com conjugação completa (um deles é revisão), além das cinco pegadinhas de conjugação mais complicadas do dia e um falso cognato que costuma pegar quem conhece espanhol.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>asistir (ES) ≠ to assist</strong> — <em>asistir</em> significa <em>participar / comparecer</em>, não “ajudar”. A RAE o define como „ir alguien a un lugar donde se celebra un acto\". “Ajudar” é <em>ayudar</em>. Ou seja: <em>asistí a la audiencia</em> = eu <em>estive presente</em> na audiência, não eu <em>ajudei</em> nela.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>reconhecer firma</strong> — o tabelião (notário) confirma que a assinatura no documento é da pessoa. Duas variantes: <em>por semelhança</em> (comparação com a ficha de assinatura arquivada, sem comparecimento pessoal) e <em>por autenticidade</em> (é preciso comparecer pessoalmente).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>tirar uma xerox</strong> — no Brasil, ninguém diz <em>fotocópia</em> no dia a dia. O nome da marca virou objeto do verbo; em Portugal seria <em>tirar uma fotocópia</em>.</li>\n      <li><span class=\"chip hot\">CONJUGAÇÃO</span> <strong>ES renovar diptonga o→ue</strong> (<em>yo renuevo</em>, não <em>*renovo</em>) — mas <em>nosotros renovamos</em> fica sem ditongo. E atenção: PT <em>renovar</em> <strong>não</strong> faz isso — <em>eu renovo</em>.</li>\n      <li><span class=\"chip hot\">CONJUGAÇÃO</span> <strong>PT reconhecer → eu reconheço</strong> — antes de <em>o</em> e <em>a</em>, o <em>c</em> vira <em>ç</em>, senão o som ficaria duro. Em todo o subjuntivo: <em>que eu reconheça, que nós reconheçamos</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES requerir é misto e→ie <em>e</em> e→i</strong> — <em>yo requiero</em>, mas <em>él requirió</em> e <em>que nosotros requiramos</em>. Não é simplesmente um verbo e→ie.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES verbos -zar: z→c antes de e</strong> — <em>yo rechacé</em>, <em>yo legalicé</em>, subjuntivo <em>rechace / legalice</em>. Mesma lógica do <em>c→qu</em> nos verbos -car.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>teilnehmen é forte <em>e</em> separável</strong> — <em>er nimmt teil</em> (Umlaut), <em>er nahm teil</em> (Ablaut), <em>hat teilgenommen</em>. O <em>ge-</em> se encaixa entre o prefixo e o radical.</li>\n      <li><span class=\"chip\">GÊNERO</span> <strong>Urkunde ≠ acta ≠ certidão</strong> — a certidão de nascimento é PT <em>a certidão de nascimento</em>, mas ES-MX <em>el acta de nacimiento</em> (artigo masculino <em>el</em> apesar de a palavra ser feminina — por causa do <em>a</em> tônico inicial: <em>el acta</em>, mas <em>las actas</em>).</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>etwas auf die lange Bank schieben</strong> — adiar uma decisão o máximo possível. A expressão vem do sistema judicial do século 15 — dificilmente haveria algo mais apropriado para um dia sobre burocracia.</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>der Amtsschimmel wiehert</strong> — a burocracia em sua forma mais teimosa e apegada a formalidades. Nenhum cavalo envolvido: provavelmente uma corruptela da palavra de cartório <em>Simile</em> (“segundo o mesmo padrão”).</li>\n      <li><span class=\"chip\">REVISÃO</span> <strong>beantragen · die Vollmacht · die Klage</strong> — revisão dos dias de direito trabalhista e direito contratual (21 e 23 de junho). As três são hoje vocabulário central: <em>beantragen</em> um pedido, ir à repartição com <em>Vollmacht</em> (procuração) em nome de outra pessoa, mover uma <em>Klage</em> (ação judicial) em caso de recusa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo 19 de julio — tema semanal <em>Política, derecho y salud</em>, hoy la sexta entrega: <em>Burocracia y trámites gubernamentales</em>. Después de elecciones, tribunales, seguros y consultorio médico, faltaba justo la parte que más tiempo consume en el día a día brasileño: conseguir documentos, mandarlos legalizar, presentar solicitudes, cumplir plazos. Aquí piden un <em>comprovante de residência</em> para casi todo, y para muchas firmas hay que ir al <em>cartório</em> a <em>reconhecer firma</em> — un paso que en Alemania simplemente no existe. 30 entradas, 12 verbos con conjugación completa (uno de ellos un repaso), además las cinco trampas de conjugación más complicadas del día y un falso amigo que atrapa recurrentemente a quienes ya dominan el español.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO AMIGO</span> <strong>asistir (ES) ≠ to assist</strong> — <em>asistir</em> significa <em>participar / estar presente</em>, no \"ayudar\". La RAE lo define como \"ir alguien a un lugar donde se celebra un acto\". \"Ayudar\" se dice <em>ayudar</em>. Es decir: <em>asistí a la audiencia</em> = estuve presente en la audiencia, no la ayudé.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>reconhecer firma</strong> — el Tabelião (notario) certifica que la firma en el documento efectivamente pertenece a esa persona. Dos variantes: <em>por semelhança</em> (cotejo con la tarjeta de firma registrada, sin comparecencia personal) y <em>por autenticidade</em> (hay que presentarse en persona).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>tirar uma xerox</strong> — en Brasil nadie dice <em>fotocópia</em> en el habla cotidiana. El nombre de la marca se convirtió en el objeto del verbo; en Portugal se diría <em>tirar uma fotocópia</em>.</li>\n      <li><span class=\"chip hot\">CONJUGACIÓN</span> <strong>ES renovar diptonga o→ue</strong> (<em>yo renuevo</em>, no <em>*renovo</em>) — pero <em>nosotros renovamos</em> se queda sin diptongo. Y ojo: PT <em>renovar</em> <strong>no</strong> hace lo mismo — <em>eu renovo</em>.</li>\n      <li><span class=\"chip hot\">CONJUGACIÓN</span> <strong>PT reconhecer → eu reconheço</strong> — ante <em>o</em> y <em>a</em> la <em>c</em> se convierte en <em>ç</em>, porque de lo contrario sonaría dura. En todo el Subjuntivo: <em>que eu reconheça, que nós reconheçamos</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>ES requerir es un verbo mixto e→ie <em>y</em> e→i</strong> — <em>yo requiero</em>, pero <em>él requirió</em> y <em>que nosotros requiramos</em>. No es simplemente un verbo e→ie.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>Verbos ES en -zar: z→c ante e</strong> — <em>yo rechacé</em>, <em>yo legalicé</em>, Subjuntivo <em>rechace / legalice</em>. Misma lógica que el <em>c→qu</em> de los verbos en -car.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>teilnehmen es fuerte <em>y</em> separable</strong> — <em>er nimmt teil</em> (Umlaut), <em>er nahm teil</em> (Ablaut), <em>hat teilgenommen</em>. El <em>ge-</em> se desliza entre el prefijo y la raíz.</li>\n      <li><span class=\"chip\">GÉNERO</span> <strong>Urkunde ≠ acta ≠ certidão</strong> — el certificado de nacimiento es en PT <em>a certidão de nascimento</em>, pero en ES-MX <em>el acta de nacimiento</em> (artículo masculino <em>el</em> pese a ser palabra femenina — por la <em>a</em> inicial tónica: <em>el acta</em>, pero <em>las actas</em>).</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>etwas auf die lange Bank schieben</strong> — posponer una decisión todo lo posible. El dicho proviene del sistema judicial del siglo XV — difícilmente podría ser más adecuado para un día dedicado a trámites burocráticos.</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>der Amtsschimmel wiehert</strong> — la burocracia en su forma más terca y apegada a las formalidades. No hay ningún caballo de por medio
