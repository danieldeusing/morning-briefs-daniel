ss=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Firefox &amp; Chrome</strong>: Mozilla schließt zwei kritische Lücken mit bereits öffentlichem Exploit-Code (keine Angriffe bekannt), Chrome zwei kritische Use-after-free in Ozone. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Enterprise-Patchday</strong>: SAP 16 CVEs, Citrix NetScaler ADC/Gateway sechs, Samsungs Juli-Bulletin fünf kritische und 42 hohe. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Frontend-Kadenz</strong>: Angular 22.0.8 (22.07.), React 19.2.8 / 19.1.9 / 19.0.8 (21.07.) — Wartungs-Releases, nichts Bahnbrechendes. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulierung</span> <strong>Cyber Resilience Act</strong>: Die Meldepflicht für ausgenutzte Lücken startet am 11.09.2026 — in 50 Tagen. Kommissions-FAQ seit 02.07. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Brasilien</strong>: Microsoft-365-Preise seit 01.07. oben, alphanumerische CNPJ zwingt Systeme zur Anpassung, Datensouveränität als Leitthema. <span class=\"chip\">BR</span></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two record patch days in seven days: Microsoft on July 14, Oracle on July 21 — both the largest ever. The truly interesting part isn't the volume, but that the industry can't even agree on a single number for Microsoft: depending on how you count, 569 or 622 CVEs, and Microsoft's own overview page is a JavaScript shell that yields no solid figure. In between, on-prem SharePoint is burning again, this time with a government deadline on Saturday.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint on-prem</strong>: CVE-2026-50522 (deserialization RCE, CVSS 9.8) has been in CISA's KEV catalog since July 22, government deadline <strong>July 25</strong>. Public PoC since July 20, exploitation within hours — including theft of the Machine Keys. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft Patch Tuesday, July 14</strong>: the largest ever — but the number is disputed. Tenable/Krebs count 569–570 CVEs, Malwarebytes 622. Everyone agrees on three zero-days, two of them actively exploited. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Oracle July CPU</strong> (July 21): 1,449 new patches across 32 product families, the largest CPU in company history. Fusion Middleware alone accounts for 355 fixes, ten of them with CVSS 10.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">OSS</span> <strong>npm supply chain</strong>: at AsyncAPI, no token was stolen — the CI itself was hijacked (<code>pull_request_target</code> abuse). Five versions, four packages, 90 minutes. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>MDASH</strong>: Microsoft's agent swarm for vulnerability hunting hits 88.45% on CyberGym — and Microsoft itself publicly links it to the rising patch volume. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Firefox &amp; Chrome</strong>: Mozilla closes two critical flaws with already-public exploit code (no known attacks), Chrome fixes two critical use-after-free bugs in Ozone. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Enterprise Patch Day</strong>: SAP 16 CVEs, Citrix NetScaler ADC/Gateway six, Samsung's July bulletin five critical and 42 high. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Frontend cadence</strong>: Angular 22.0.8 (July 22), React 19.2.8 / 19.1.9 / 19.0.8 (July 21) — maintenance releases, nothing groundbreaking. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulation</span> <strong>Cyber Resilience Act</strong>: the reporting obligation for exploited flaws kicks in on September 11, 2026 — in 50 days. Commission FAQ published July 2. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Brazil</strong>: Microsoft 365 prices up since July 1, the alphanumeric CNPJ forces system adjustments, data sovereignty remains the leading theme. <span class=\"chip\">BR</span></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois patch days recordes em sete dias: Microsoft em 14/07, Oracle em 21/07 — ambos os maiores que já houve. O interessante aqui não é a quantidade, e sim que o setor nem consegue se entender sobre um número só para a Microsoft: dependendo de quem conta, são 569 ou 622 CVEs, e a própria página de resumo da Microsoft é uma casca em JavaScript da qual não se extrai um número confiável. No meio disso, o SharePoint on-prem volta a pegar fogo, agora com um prazo de órgão federal no sábado.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint on-prem</strong>: CVE-2026-50522 (RCE por desserialização, CVSS 9,8) está desde 22/07 no catálogo KEV da CISA, prazo para órgãos federais em <strong>25/07</strong>. PoC público desde 20/07, exploração em questão de horas — incluindo roubo das Machine Keys. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Patch day da Microsoft de 14/07</strong>: o maior de todos os tempos — mas o número é controverso. Tenable/Krebs contam 569–570 CVEs, a Malwarebytes, 622. Todos concordam em três zero-days, dois deles ativamente explorados. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CPU de julho da Oracle</strong> (21/07): 1.449 novos patches em 32 famílias de produtos, o maior CPU da história da empresa. Só o Fusion Middleware teve 355 correções, dez delas com CVSS 10,0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Cadeia de suprimentos do npm</strong>: no caso da AsyncAPI, nenhum token foi roubado — a própria CI foi sequestrada (abuso de <code>pull_request_target</code>). Cinco versões, quatro pacotes, 90 minutos. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>MDASH</strong>: o enxame de agentes da Microsoft para caça a falhas atinge 88,45% no CyberGym — e a própria Microsoft liga isso publicamente ao volume crescente de patches. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Firefox &amp; Chrome</strong>: a Mozilla fecha duas falhas críticas com código de exploit já público (nenhum ataque conhecido), o Chrome corrige duas use-after-free críticas no Ozone. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Patch day corporativo</strong>: SAP com 16 CVEs, Citrix NetScaler ADC/Gateway com seis, boletim de julho da Samsung com cinco críticas e 42 altas. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip good\">Lançamento</span> <strong>Cadência de frontend</strong>: Angular 22.0.8 (22/07), React 19.2.8 / 19.1.9 / 19.0.8 (21/07) — releases de manutenção, nada revolucionário. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulação</span> <strong>Cyber Resilience Act</strong>: a obrigação de notificar falhas exploradas começa em 11/09/2026 — daqui a 50 dias. FAQ da Comissão desde 02/07. <span class=\"chip\">UE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Brasil</strong>: preços do Microsoft 365 subiram desde 01/07, CNPJ alfanumérico obriga sistemas a se adaptarem, soberania de dados segue como tema central. <span class=\"chip\">BR</span></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos días récord de parches en siete días: Microsoft el 14/07, Oracle el 21/07 — ambos los más grandes que se han visto. Lo realmente interesante no es la cantidad, sino que la industria ni siquiera se pone de acuerdo en una cifra para Microsoft: según cómo se cuente, 569 o 622 CVE, y la propia página de resumen de Microsoft es una envoltura de JavaScript de la que no se puede extraer una cifra confiable. En medio de todo esto, SharePoint on-prem vuelve a arder, esta vez con un plazo de las autoridades el sábado.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint on-prem</strong>: CVE-2026-50522 (RCE por deserialización, CVSS 9.8) está desde el 22/07 en el catálogo KEV de CISA, con un plazo para las agencias del <strong>25/07</strong>. PoC público desde el 20/07, explotación en cuestión de horas — incluido el robo de las Machine Keys. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Martes de parches de Microsoft, 14/07</strong>: el más grande de la historia — pero la cifra está en disputa. Tenable/Krebs cuentan 569–570 CVE, Malwarebytes 622. Todos coinciden en tres días cero, dos de ellos explotados activamente. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CPU de julio de Oracle</strong> (21/07): 1,449 parches nuevos en 32 familias de productos, el CPU más grande en la historia de la empresa. Solo Fusion Middleware suma 355 correcciones, diez de ellas con CVSS 10.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Cadena de suministro de npm</strong>: en AsyncAPI no se robó ningún token — se secuestró la propia CI (abuso de <code>pull_request_target</code>). Cinco versiones, cuatro paquetes, 90 minutos. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>MDASH</strong>: el enjambre de agentes de Microsoft para buscar vulnerabilidades alcanza 88.45 % en CyberGym — y la propia Microsoft lo vincula públicamente con el aumento en la cantidad de parches. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Navegador</span> <strong>Firefox y Chrome</strong>: Mozilla cierra dos fallas críticas con código de explotación ya público (sin ataques conocidos), Chrome cierra dos use-after-free críticas en Ozone. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Martes de parches empresarial</strong>: SAP 16 CVE, Citrix NetScaler ADC/Gateway seis, el boletín de julio de Samsung cinco críticas y 42 altas. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip good\">Lanzamiento</span> <strong>Cadencia de frontend</strong>: Angular 22.0.8 (22/07), React 19.2.8 / 19.1.9 / 19.0.8 (21/07) — versiones de mantenimiento, nada revolucionario. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulación</span> <strong>Cyber Resilience Act</strong>: la obligación de reportar vulnerabilidades explotadas entra en vigor el 11/09/2026 — en 50 días. FAQ de la Comisión desde el 02/07. <span class=\"chip\">UE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Brasil</strong>: los precios de Microsoft 365 subieron desde el 01/07, el CNPJ alfanumérico obliga a los sistemas a adaptarse, la soberanía de datos sigue siendo tema central. <span class=\"chip\">BR</span></li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der rote Faden der letzten zwei Wochen ist kein Modell, sondern eine Preisleiter. Meta verlangt seit dem 09.07. zum ersten Mal Geld für ein eigenes Modell — und setzt sich mit 1,25 $/4,25 $ je Million Tokens bewusst unter alle Etablierten. Google hat am Dienstag mit einem Dreier-Drop nachgelegt, dessen billigstes Mitglied bei 0,30 $/2,50 $ liegt. Ganz oben steht weiterhin GPT-5.6 Sol mit 5 $/30 $. Zwischen dem teuersten und dem billigsten Output-Preis liegt inzwischen Faktor zwölf. Interessanter als die Zahlen ist allerdings das dritte Google-Modell: eine auf Sicherheit getrimmte Variante, die du als normaler Entwickler gar nicht bekommst.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.6 Flash</strong>: seit 21.07. live, <span class=\"stat\">1,50 $</span>/<span class=\"stat\">7,50 $</span> je Mio. Tokens. Google verspricht zusätzlich 17 % weniger Output-Tokens als 3.5 Flash — Anbieter-Angabe.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Gemini 3.5 Flash-Lite</strong>: 0,30 $/2,50 $ und „Computer Use“ als eingebautes Werkzeug — das günstigste Modell im Feld, das eine Oberfläche selbst bedienen darf.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>3.5 Flash Cyber ist real — aber gesperrt</strong>: auf DeepMinds eigenem Blog bestätigt, ausschließlich für Regierungen und „trusted partners“ via CodeMender. Ein Security-Modell, das die meisten Entwickler nie zu sehen bekommen.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Erste bezahlte Meta-API</strong>: Muse Spark 1.1, 1,25 $/4,25 $, spricht OpenAI-SDK <em>und</em> Anthropic-Messages. Zuckerberg beziffert das als rund ein Viertel der Top-Preise von OpenAI und Anthropic.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified: 104 selbst gemeldet, 0 verifiziert</strong>. Die Rangliste führt Claude Fable 5 mit 95,0 % — aber kein einziger Eintrag ist unabhängig nachgemessen.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08.07.) bringt FlexAttention auf Apple Silicon: bis <span class=\"stat\">12,3×</span> schneller als SDPA bei dünn besetzten Attention-Mustern.</li>\n      <li><span class=\"chip hot\">Achtung</span> <strong>Zwei CVEs in AI-Coding-Tools</strong> (14.07.): Copilot für JetBrains (CVE-2026-50510, CVSS 7,8) und VS Code (CVE-2026-50520, CVSS 8,4). Beide Scores stammen aus Sekundärquellen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> hat Grok 4.5 über alle Oberflächen ausgerollt und eine iOS-Beta gestartet. Bei Aider, Cline, Continue, JetBrains AI, Devin und Bolt: kein datierter Juli-Zug in diesem Durchgang.</li>\n      <li><span class=\"chip\">Quelle</span> <strong>Beleglage</strong>: Metas eigene API-Seite und beide MSRC-Seiten sind JS-Hüllen ohne lesbaren Text — Preise und CVSS-Werte kommen aus zitierenden Zweitquellen, der Gemini-Wissensstand-Sprung ausschließlich aus der Fachpresse.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The throughline of the past two weeks isn't a model, it's a price ladder. Since July 9, Meta has charged money for one of its own models for the first time — and deliberately undercuts every established player at $1.25/$4.25 per million tokens. Google followed up on Tuesday with a three-model drop, whose cheapest member comes in at $0.30/$2.50. At the top still sits GPT-5.6 Sol at $5/$30. The gap between the highest and lowest output price is now a factor of twelve. But more interesting than the numbers is the third Google model: a security-hardened variant that you, as an ordinary developer, don't get to use at all.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.6 Flash</strong>: live since July 21, <span class=\"stat\">$1.50</span>/<span class=\"stat\">$7.50</span> per million tokens. Google also claims 17% fewer output tokens than 3.5 Flash — a vendor claim.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Gemini 3.5 Flash-Lite</strong>: $0.30/$2.50 with \"Computer Use\" built in as a native tool — the cheapest model in the field allowed to operate a UI on its own.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>3.5 Flash Cyber is real — but locked down</strong>: confirmed on DeepMind's own blog, available exclusively to governments and \"trusted partners\" via CodeMender. A security model most developers will never get to see.</li>\n      <li><span class=\"chip\">Meta</span> <strong>First paid Meta API</strong>: Muse Spark 1.1, $1.25/$4.25, speaks the OpenAI SDK <em>and</em> Anthropic Messages. Zuckerberg puts that at roughly a quarter of OpenAI's and Anthropic's top prices.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified: 104 self-reported, 0 verified</strong>. The leaderboard is topped by Claude Fable 5 at 95.0% — but not a single entry has been independently re-measured.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (July 8) brings FlexAttention to Apple Silicon: up to <span class=\"stat\">12.3x</span> faster than SDPA on sparse attention patterns.</li>\n      <li><span class=\"chip hot\">Heads up</span> <strong>Two CVEs in AI coding tools</strong> (July 14): Copilot for JetBrains (CVE-2026-50510, CVSS 7.8) and VS Code (CVE-2026-50520, CVSS 8.4). Both scores come from secondary sources.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> rolled out Grok 4.5 across every surface and launched an iOS beta. For Aider, Cline, Continue, JetBrains AI, Devin, and Bolt: no dated July move found this round.</li>\n      <li><span class=\"chip\">Source</span> <strong>Sourcing note</strong>: Meta's own API page and both MSRC pages are JS shells with no readable text — the prices and CVSS scores come from citing secondary sources, and the Gemini knowledge-cutoff jump comes exclusively from trade press.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O fio condutor das últimas duas semanas não é um modelo, e sim uma escada de preços. Desde 09/07 a Meta cobra, pela primeira vez, por um modelo próprio — e se posiciona deliberadamente abaixo de todos os concorrentes estabelecidos, com 1,25 $/4,25 $ por milhão de tokens. Na terça-feira, o Google reforçou a jogada com um lançamento triplo, cujo membro mais barato fica em 0,30 $/2,50 $. No topo continua o GPT-5.6 Sol, com 5 $/30 $. Entre o preço de saída mais caro e o mais barato já existe hoje um fator doze. Mais interessante que os números, porém, é o terceiro modelo do Google: uma variante voltada para segurança que você, como desenvolvedor comum, simplesmente não vai conseguir usar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.6 Flash</strong>: ativo desde 21/07, <span class=\"stat\">1,50 $</span>/<span class=\"stat\">7,50 $</span> por milhão de tokens. O Google promete ainda 17 % menos tokens de saída que o 3.5 Flash — dado do próprio fornecedor.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Gemini 3.5 Flash-Lite</strong>: 0,30 $/2,50 $ e \"Computer Use\" como ferramenta embutida — o modelo mais barato do mercado que tem permissão para operar sozinho uma interface.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>3.5 Flash Cyber é real — mas trancado</strong>: confirmado no próprio blog da DeepMind, exclusivo para governos e \"parceiros de confiança\" via CodeMender. Um modelo de segurança que a maioria dos desenvolvedores nunca vai ver.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Primeira API paga da Meta</strong>: Muse Spark 1.1, 1,25 $/4,25 $, fala tanto o SDK da OpenAI <em>quanto</em> o Messages da Anthropic. Zuckerberg calcula isso como cerca de um quarto dos preços mais altos de OpenAI e Anthropic.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified: 104 autorrelatados, 0 verificados</strong>. O ranking é liderado pelo Claude Fable 5 com 95,0 % — mas nenhum registro foi conferido de forma independente.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08/07) traz o FlexAttention para o Apple Silicon: até <span class=\"stat\">12,3×</span> mais rápido que o SDPA em padrões de atenção esparsos.</li>\n      <li><span class=\"chip hot\">Atenção</span> <strong>Duas CVEs em ferramentas de programação com IA</strong> (14/07): Copilot para JetBrains (CVE-2026-50510, CVSS 7,8) e VS Code (CVE-2026-50520, CVSS 8,4). Os dois escores vêm de fontes secundárias.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> lançou o Grok 4.5 em todas as interfaces e abriu uma beta para iOS. Em Aider, Cline, Continue, JetBrains AI, Devin e Bolt: nenhum lançamento datado de julho nesta rodada.</li>\n      <li><span class=\"chip\">Fonte</span> <strong>Base de evidências</strong>: a própria página de API da Meta e as duas páginas do MSRC são cascas em JavaScript sem texto legível — preços e valores de CVSS vêm de fontes secundárias que os citam, e o avanço no corte de conhecimento do Gemini vem exclusivamente da imprensa especializada.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El hilo conductor de las últimas dos semanas no es un modelo, sino una escalera de precios. Desde el 09/07, Meta cobra por primera vez dinero por un modelo propio — y se coloca deliberadamente por debajo de todos los proveedores establecidos con 1,25 $/4,25 $ por millón de tokens. El martes, Google respondió con un lanzamiento triple, cuyo miembro más barato se ubica en 0,30 $/2,50 $. En la cima sigue estando GPT-5.6 Sol, con 5 $/30 $. Entre el precio de salida más caro y el más barato ya hay un factor de doce. Pero más interesante que las cifras es el tercer modelo de Google: una variante afinada para la seguridad que tú, como desarrollador común, ni siquiera vas a poder usar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.6 Flash</strong>: activo desde el 21/07, <span class=\"stat\">1,50 $</span>/<span class=\"stat\">7,50 $</span> por millón de tokens. Google promete además un 17 % menos de tokens de salida que 3.5 Flash — cifra del proveedor.</li>\n      <li><span class=\"chip good\">Google</span> <strong>Gemini 3.5 Flash-Lite</strong>: 0,30 $/2,50 $ y \"Computer Use\" como herramienta integrada — el modelo más barato del grupo capaz de manejar una interfaz por sí mismo.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>3.5 Flash Cyber es real — pero está bloqueado</strong>: confirmado en el propio blog de DeepMind, exclusivamente para gobiernos y \"socios de confianza\" vía CodeMender. Un modelo de seguridad que la mayoría de los desarrolladores nunca va a llegar a ver.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Primera API de pago de Meta</strong>: Muse Spark 1.1, 1,25 $/4,25 $, habla el SDK de OpenAI <em>y</em> el formato Messages de Anthropic. Zuckerberg lo calcula en alrededor de una cuarta parte de los precios máximos de OpenAI y Anthropic.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified: 104 autoinformados, 0 verificados</strong>. La tabla la encabeza Claude Fable 5 con 95,0 % — pero ni un solo dato ha sido comprobado de forma independiente.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08/07) lleva FlexAttention a Apple Silicon: hasta <span class=\"stat\">12,3×</span> más rápido que SDPA en patrones de atención dispersa.</li>\n      <li><span class=\"chip hot\">Atención</span> <strong>Dos CVEs en herramientas de codificación con IA</strong> (14/07): Copilot para JetBrains (CVE-2026-50510, CVSS 7,8) y VS Code (CVE-2026-50520, CVSS 8,4). Ambos puntajes provienen de fuentes secundarias.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong> desplegó Grok 4.5 en todas sus interfaces y lanzó una beta para iOS. En Aider, Cline, Continue, JetBrains AI, Devin y Bolt: ningún movimiento de julio con fecha en esta ronda.</li>\n      <li><span class=\"chip\">Fuente</span> <strong>Situación de las fuentes</strong>: la propia página de API de Meta y ambas páginas de MSRC son cáscaras de JavaScript sin texto legible — los precios y los valores CVSS provienen de fuentes secundarias que las citan, y el salto en el conocimiento de Gemini proviene exclusivamente de la prensa especializada.</li>\n    </ul></div>"

</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Nubank „nuFormer\":</strong> Transformer-Kreditmodell, <strong>−70 %</strong> projiziertes Risiko, <strong>+50 Basispunkte</strong> Anteil am brasilianischen Kartenumsatz in Q4 2025 — größter Einzelzuwachs eines Wettbewerbers seit zehn Jahren.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand:</strong> <strong>51,2 %</strong> nutzen oder testen KI (2024: 33,1 %), Agenten bei <strong>16,6 %</strong> — Index anbieternah, Methodik nicht belegt.</li>\n      <li><span class=\"chip\">GOVERNANCE · US</span> <strong>Nadella über Fable:</strong> „editorially controlled\" — gefallen in einem <em>internen</em> Copilot-Meeting, berichtet am 16./17.07.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>Artikel-50-Umsetzungs-Sprint</strong> (Achtung — <em>Legalithm bedient die Papier-Seite schon</em>) und <strong>Debitoren-Frühwarnung aus eigenen ERP-Daten</strong> nach dem nuFormer-Muster.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Regierungen, dieselbe Frage, gegensätzliche Antwort: <em>Wer trägt die Kosten dafür, dass KI in der Fläche ankommt?</em> Südkorea antwortet mit einem <strong>kostenlosen Staats-Chatbot für alle Bürger</strong> — Beta Ende September, GPUs vom Staat. Brüssel antwortet mit Pflichten: Die harten Hochrisiko-Fristen sind verschoben, die kleine Transparenz-Pflicht greift in <strong>zehn Tagen</strong> — und das Änderungsgesetz steht noch nicht im Amtsblatt. Dazwischen die stärkste Zahl des Tages: eine brasilianische Bank, die mit einem eigenen Modell <strong>70 % Risiko</strong> aus dem Kreditbuch geholt hat.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · KR</span> <strong>„AI for All\":</strong> Südkoreas Wissenschaftsministerium baut einen <strong>kostenlosen nationalen KI-Chatbot</strong> — Beta Ende <strong>September 2026</strong>, Vollausbau <strong>Dezember 2026</strong>. Bewerbungsschluss für Betreiber: 11.08.2026.</li>\n      <li><span class=\"chip\">POLICY · KR</span> <strong>Hardware statt Scheck:</strong> bis zu <strong>512 Nvidia B200</strong> an 2–3 Betreiber (bestätigt: Kakao, LG Uplus), die eigene Hardware beisteuern. Die <strong>550 Bio. Won (~371,2 Mrd. $)</strong> sind das Rechenzentrums-Programm, nicht das Chatbot-Budget — und wie lange „gratis\" gilt, sagen die Quellen widersprüchlich: <strong>bis 2028</strong> vs. <strong>bis Ende 2030</strong>.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Zehn Tage:</strong> Artikel-50-Transparenz und die entschärfte Artikel-4-Kompetenzpflicht gelten ab <strong>02.08.2026</strong> — von der Verschiebung nicht erfasst.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Verfahrensstand:</strong> Digital Omnibus am 16.06. vom Parlament angenommen, 29.06. vom Rat gebilligt, <strong>08.07. unterzeichnet</strong> — aber (Stand 15.07.) <strong>noch nicht im Amtsblatt</strong>. Bis dahin gilt formal der alte Zeitplan.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Nubank „nuFormer\":</strong> Transformer-Kreditmodell, <strong>−70 %</strong> projiziertes Risiko, <strong>+50 Basispunkte</strong> Anteil am brasilianischen Kartenumsatz in Q4 2025 — größter Einzelzuwachs eines Wettbewerbers seit zehn Jahren.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand:</strong> <strong>51,2 %</strong> nutzen oder testen KI (2024: 33,1 %), Agenten bei <strong>16,6 %</strong> — Index anbieternah, Methodik nicht belegt.</li>\n      <li><span class=\"chip\">GOVERNANCE · US</span> <strong>Nadella über Fable:</strong> „editorially controlled\" — gefallen in einem <em>internen</em> Copilot-Meeting, berichtet am 16./17.07.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>Artikel-50-Umsetzungs-Sprint</strong> (Achtung — <em>Legalithm bedient die Papier-Seite schon</em>) und <strong>Debitoren-Frühwarnung aus eigenen ERP-Daten</strong> nach dem nuFormer-Muster.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two governments, the same question, opposite answers: <em>Who pays for getting AI to reach everyone?</em> South Korea answers with a <strong>free state-run chatbot for every citizen</strong> — beta by late September, GPUs from the government. Brussels answers with obligations: the tough high-risk deadlines have been postponed, but the small transparency duty kicks in in <strong>ten days</strong> — and the amending law still hasn't been published in the Official Journal. In between sits the strongest number of the day: a Brazilian bank that used its own model to strip <strong>70% risk</strong> out of its loan book.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · KR</span> <strong>\"AI for All\":</strong> South Korea's science ministry is building a <strong>free national AI chatbot</strong> — beta by late <strong>September 2026</strong>, full rollout <strong>December 2026</strong>. Operator applications close August 11, 2026.</li>\n      <li><span class=\"chip\">POLICY · KR</span> <strong>Hardware instead of a check:</strong> up to <strong>512 Nvidia B200s</strong> go to 2–3 operators (confirmed: Kakao, LG Uplus), who must contribute their own hardware too. The <strong>550 trillion won (~$371.2bn)</strong> is the data-center program, not the chatbot budget — and how long \"free\" lasts is contradicted across sources: <strong>through 2028</strong> vs. <strong>through the end of 2030</strong>.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Ten days:</strong> Article 50 transparency and the softened Article 4 literacy duty take effect on <strong>August 2, 2026</strong> — not covered by the postponement.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Procedural status:</strong> Digital Omnibus adopted by Parliament June 16, approved by the Council June 29, <strong>signed July 8</strong> — but (as of July 15) <strong>still not in the Official Journal</strong>. Until then, the old timetable formally applies.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Nubank \"nuFormer\":</strong> transformer-based credit model, <strong>-70%</strong> projected risk, <strong>+50 basis points</strong> of Brazilian card-volume share in Q4 2025 — the biggest single gain by a competitor in ten years.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mid-market:</strong> <strong>51.2%</strong> use or are testing AI (2024: 33.1%), agents at <strong>16.6%</strong> — index has vendor ties, methodology unverified.</li>\n      <li><span class=\"chip\">GOVERNANCE · US</span> <strong>Nadella on Fable:</strong> \"editorially controlled\" — said in an <em>internal</em> Copilot meeting, reported July 16/17.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas: an <strong>Article 50 implementation sprint</strong> (heads up — <em>Legalithm already covers the paperwork side</em>) and an <strong>accounts-receivable early warning built from a company's own ERP data</strong>, following the nuFormer pattern.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois governos, a mesma pergunta, respostas opostas: <em>quem paga a conta para que a IA chegue à população em geral?</em> A Coreia do Sul responde com um <strong>chatbot estatal gratuito para todos os cidadãos</strong> — beta no fim de setembro, GPUs fornecidas pelo Estado. Bruxelas responde com obrigações: os prazos rígidos de alto risco foram adiados, a pequena obrigação de transparência entra em vigor em <strong>dez dias</strong> — e a lei de alteração ainda não foi publicada no Jornal Oficial. No meio do caminho, o número mais forte do dia: um banco brasileiro que, com um modelo próprio, tirou <strong>70 % de risco</strong> da carteira de crédito.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLÍTICA · KR</span> <strong>\"AI for All\":</strong> o Ministério da Ciência da Coreia do Sul está construindo um <strong>chatbot de IA nacional e gratuito</strong> — beta no fim de <strong>setembro de 2026</strong>, operação plena em <strong>dezembro de 2026</strong>. Prazo final de inscrição para operadores: 11/08/2026.</li>\n      <li><span class=\"chip\">POLÍTICA · KR</span> <strong>Hardware em vez de cheque:</strong> até <strong>512 Nvidia B200</strong> para 2–3 operadores (confirmados: Kakao, LG Uplus), que também contribuem com hardware próprio. Os <strong>550 trilhões de wons (~US$ 371,2 bi)</strong> são do programa de data centers, não do orçamento do chatbot — e por quanto tempo o serviço será \"gratuito\" as fontes divergem: <strong>até 2028</strong> vs. <strong>até o fim de 2030</strong>.</li>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Dez dias:</strong> a transparência do Artigo 50 e a obrigação atenuada de competência do Artigo 4 passam a valer a partir de <strong>02/08/2026</strong> — não abrangidas pelo adiamento.</li>\n      <li><span class=\"chip\">REGULAÇÃO · UE</span> <strong>Status processual:</strong> Digital Omnibus aprovado pelo Parlamento em 16/06, aprovado pelo Conselho em 29/06, <strong>assinado em 08/07</strong> — mas (situação em 15/07) <strong>ainda não publicado no Jornal Oficial</strong>. Até lá, vale formalmente o cronograma antigo.</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO · BR</span> <strong>Nubank \"nuFormer\":</strong> modelo de crédito baseado em transformer, <strong>−70 %</strong> de risco projetado, <strong>+50 pontos-base</strong> de participação no faturamento de cartões no Brasil no 4º trimestre de 2025 — o maior ganho isolado de um concorrente em dez anos.</li>\n      <li><span class=\"chip\">ESTUDO · DE</span> <strong>Mittelstand:</strong> <strong>51,2 %</strong> usam ou testam IA (2024: 33,1 %), agentes em <strong>16,6 %</strong> — índice próximo de um fornecedor, metodologia não comprovada.</li>\n      <li><span class=\"chip\">GOVERNANÇA · EUA</span> <strong>Nadella sobre o Fable:</strong> \"editorially controlled\" — dito em uma reunião interna do Copilot, noticiado em 16–17/07.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias: <strong>Sprint de Implementação do Artigo 50</strong> (atenção — <em>a Legalithm já atende o lado do papel</em>) e <strong>alerta precoce de inadimplência a partir dos próprios dados de ERP</strong>, seguindo o padrão nuFormer.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos gobiernos, la misma pregunta, respuestas opuestas: <em>¿quién paga para que la IA llegue a todos?</em> Corea del Sur responde con un <strong>chatbot estatal gratuito para toda la ciudadanía</strong> — beta a fines de septiembre, GPU puestas por el Estado. Bruselas responde con obligaciones: los plazos duros de alto riesgo se aplazaron, la pequeña obligación de transparencia entra en vigor en <strong>diez días</strong> — y la ley de reforma todavía no aparece en el Diario Oficial. En medio, la cifra más contundente del día: un banco brasileño que, con un modelo propio, le sacó <strong>70 % de riesgo</strong> a su cartera de crédito.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLÍTICA · KR</span> <strong>\"AI for All\":</strong> el Ministerio de Ciencia de Corea del Sur construye un <strong>chatbot nacional de IA gratuito</strong> — beta a fines de <strong>septiembre de 2026</strong>, despliegue total en <strong>diciembre de 2026</strong>. Fecha límite de postulación para operadores: 11/08/2026.</li>\n      <li><span class=\"chip\">POLÍTICA · KR</span> <strong>Hardware en vez de cheque:</strong> hasta <strong>512 Nvidia B200</strong> para 2–3 operadores (confirmados: Kakao, LG Uplus), que además aportan hardware propio. Los <strong>550 billones de wones (~371,2 mil millones de dólares)</strong> son el programa de centros de datos, no el presupuesto del chatbot — y cuánto dura lo \"gratis\" lo dicen las fuentes de forma contradictoria: <strong>hasta 2028</strong> frente a <strong>hasta fines de 2030</strong>.</li>\n      <li><span class=\"chip hot\">REGULACIÓN · UE</span> <strong>Diez días:</strong> la transparencia del Artículo 50 y la obligación de competencia del Artículo 4, ya suavizada, entran en vigor a partir del <strong>02/08/2026</strong> — no alcanzadas por el aplazamiento.</li>\n      <li><span class=\"chip\">REGULACIÓN · UE</span> <strong>Estado del proceso:</strong> el Digital Omnibus fue aprobado por el Parlamento el 16/06, avalado por el Consejo el 29/06, <strong>firmado el 08/07</strong> — pero (a fecha del 15/07) <strong>todavía no aparece en el Diario Oficial</strong>. Hasta entonces, formalmente sigue vigente el calendario anterior.</li>\n      <li><span class=\"chip good\">DESPLIEGUE · BR</span> <strong>Nubank \"nuFormer\":</strong> modelo de crédito basado en transformer, <strong>−70 %</strong> de riesgo proyectado, <strong>+50 puntos base</strong> de participación en el volumen de tarjetas de Brasil en el 4T de 2025 — el mayor incremento aislado de un competidor en diez años.</li>\n      <li><span class=\"chip\">ESTUDIO · DE</span> <strong>Mediana empresa:</strong> <strong>51,2 %</strong> usa o prueba IA (2024: 33,1 %), agentes en <strong>16,6 %</strong> — índice cercano a un proveedor, metodología sin comprobar.</li>\n      <li><span class=\"chip\">GOBERNANZA · US</span> <strong>Nadella sobre Fable:</strong> \"editorially controlled\" — dicho en una reunión interna de Copilot, reportado el 16 y 17/07.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas: <strong>sprint de implementación del Artículo 50</strong> (atención — <em>Legalithm ya atiende el lado del papeleo</em>) y <strong>alerta temprana de cartera vencida a partir de datos propios de ERP</strong> siguiendo el patrón de nuFormer.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das Board füllt sich wieder: <strong>98 Listings</strong> heute gegen 69 gestern — aber die Spitze bewegt sich nicht. Dieselben drei Java/Spring/Angular-Contracts teilen sich zum dritten Tag Fit <strong>88</strong>. Interessanter ist deshalb, was <em>unter</em> der Spitze passiert: ein KI-Auftrag, der Claude Code und MCP verlangt, ein IoT-Architekt im Premium-Band — und bei den öffentlichen Ausschreibungen ein sächsisches Verfahren, dessen veröffentlichter Anforderungstext <strong>überhaupt keine Umsatz-, Personal- oder Zertifikatshürde</strong> enthält. Dazu drei Listings, die Daniel bewusst nicht anfassen sollte.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit 88, unverändert dreifach</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, FFM 80 % remote), BridgingIT (Spring Boot/Kubernetes/Kafka, 100 % remote), Keil Business Solutions (Java/Angular + Telematikinfrastruktur, München 100 % remote). Recherchierte Rate 90–130 €/h*.</li>\n      <li><span class=\"chip\">Board</span> <strong>98 Listings</strong>: 75 Freelance, 13 Employee, 10 Intriguing. Median-Fit <strong>70</strong>, 17 Einträge ab 80, 8 ab 85. <strong>85 der 98</strong> tragen ein Remote-Tag.</li>\n      <li><span class=\"chip hot\">AI-Integration</span> <strong>KI-Auftrag bleibt oben</strong>: WeMatch Consulting sucht einen „Senior AI Software Engineer — Full-Stack\" (Java/Spring oder Python + React/Angular, ausdrücklich Claude Code/MCP/Anthropic-SDK), 100 % remote, Fit <strong>84</strong>, 100–130 €/h*.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Nischen-Premium doppelt besetzt</strong>: IoT-Architekt bei WeMatch (Fit 77, 100–130 €/h*, 100 % remote) und EnCo Software mit Java/Spring im Umfeld autonomes Fahren (Fit 76, 100–140 €/h*).</li>\n      <li><span class=\"chip warn\">Achtung</span> <strong>Drei Listings sind K.o.</strong>: zwei deutsche Contracts fordern eine SÜ2-Sicherheitsüberprüfung mit DE-Wohnsitz, einer eine aktive britische SC-Clearance. Sie stehen der Transparenz halber im Board (Fit 43/37/21) — bewerben wäre verlorene Zeit.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 Stellen im Filter</strong>, weiter KI-lastig und Schweiz-vorn: ELCA Zürich „Senior Java Engineer — Agentic AI\" (Fit 81, CHF 140–190k*), AXA Agentic-AI-Plattform (80), Camunda Kubernetes remote-worldwide (80, US$126.800–190.100).</li>\n      <li><span class=\"chip good\">DE</span> <strong>TED-Direct-Fit ohne Formalhürde</strong>: Das Sächsische Landesamt für Umwelt schreibt „KARLAS\" aus — Neubau einer webbasierten Datenbankanwendung, offenes Verfahren, Frist 24.08. Im veröffentlichten eForm steht <strong>kein einziges Eignungskriterium</strong>.</li>\n      <li><span class=\"chip\">DE</span> <strong>Zwei neue Partner-Fälle mit harten Zahlen</strong>: BIG direkt gesund (KI-Agent-Assist, 2 Mio. € Mindestumsatz je Jahr + Banken-/Versicherungs-Referenz ≥ 300k), Stadtwerke Leipzig (Microservices-Rahmenvertrag, 4 Mio. € Umsatz + <strong>20 Mitarbeitende</strong> + 3 Mio. € Haftpflicht).</li>\n      <li><span class=\"chip\">Rate</span> <strong>Externe Anker</strong>: freelancermap nennt den IT-Median im DACH-Raum bei <strong>95 €/h</strong> (Software-/Webentwicklung 90 €/h, 02.07.2026); das Malt-Tarifbarometer zeigt für Java <strong>699 €/Tag</strong> bei 8–15 Jahren, 720 € ab 15 Jahren.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Stack-Mix heute</strong>: Java 46×, Spring Boot 34×, Angular 29×, AI-Integration 26×, Kubernetes 19×, AWS 15×, Python 14×, Kafka 13×, IoT 8×.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The board is filling up again: <strong>98 listings</strong> today versus 69 yesterday — but the top tier isn't moving. The same three Java/Spring/Angular contracts share a fit of <strong>88</strong> for the third day running. More interesting, then, is what's happening below the peak: an AI mandate asking for Claude Code and MCP, an IoT architect in the premium band — and, among the public tenders, a Saxon procedure whose published requirements text contains <strong>no revenue, staffing, or certification hurdle at all</strong>. Plus three listings that Daniel should deliberately leave alone.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top fit 88, unchanged three-way tie</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, FFM 80% remote), BridgingIT (Spring Boot/Kubernetes/Kafka, 100% remote), Keil Business Solutions (Java/Angular + telematics infrastructure, Munich 100% remote). Researched rate €90–130/h*.</li>\n      <li><span class=\"chip\">Board</span> <strong>98 listings</strong>: 75 Freelance, 13 Employee, 10 Intriguing. Median fit <strong>70</strong>, 17 entries at 80+, 8 at 85+. <strong>85 of the 98</strong> carry a remote tag.</li>\n      <li><span class=\"chip hot\">AI-Integration</span> <strong>AI mandate stays on top</strong>: WeMatch Consulting is hiring a \"Senior AI Software Engineer — Full-Stack\" (Java/Spring or Python + React/Angular, explicitly Claude Code/MCP/Anthropic SDK), 100% remote, fit <strong>84</strong>, €100–130/h*.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Niche premium, doubled up</strong>: IoT architect at WeMatch (fit 77, €100–130/h*, 100% remote) and EnCo Software with Java/Spring in an autonomous-driving context (fit 76, €100–140/h*).</li>\n      <li><span class=\"chip warn\">Heads up</span> <strong>Three listings are dealbreakers</strong>: two German contracts require an SÜ2 security clearance with German residency, one requires an active British SC clearance. They stay on the board for transparency (fit 43/37/21) — applying would be wasted time.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 positions in the filter</strong>, still AI-heavy and Switzerland-led: ELCA Zurich \"Senior Java Engineer — Agentic AI\" (fit 81, CHF 140–190k*), AXA agentic AI platform (80), Camunda Kubernetes remote-worldwide (80, US$126,800–190,100).</li>\n      <li><span class=\"chip good\">DE</span> <strong>TED direct fit with no formal hurdle</strong>: Sächsisches Landesamt für Umwelt is tendering \"KARLAS\" — a new web-based database application, open procedure, deadline Aug 24. The published eForm contains not a single eligibility criterion.</li>\n      <li><span class=\"chip\">DE</span> <strong>Two new partner cases with hard numbers</strong>: BIG direkt gesund (AI agent-assist, €2M minimum revenue per year + banking/insurance reference ≥ €300k), Stadtwerke Leipzig (microservices framework agreement, €4M revenue + <strong>20 employees</strong> + €3M liability).</li>\n      <li><span class=\"chip\">Rate</span> <strong>External anchors</strong>: freelancermap puts the DACH IT median at <strong>€95/h</strong> (software/web development €90/h, Jul 2, 2026); Malt's rate barometer shows Java at <strong>€699/day</strong> for 8–15 years, €720 for 15+ years.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Today's stack mix</strong>: Java 46×, Spring Boot 34×, Angular 29×, AI-Integration 26×, Kubernetes 19×, AWS 15×, Python 14×, Kafka 13×, IoT 8×.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O board volta a se encher: <strong>98 vagas</strong> hoje contra 69 ontem — mas o topo não se mexe. Os mesmos três contratos Java/Spring/Angular dividem o fit <strong>88</strong> pelo terceiro dia seguido. Mais interessante, por isso, é o que acontece abaixo do topo: um contrato de IA que exige Claude Code e MCP, um arquiteto de IoT na faixa premium — e, entre as licitações públicas, um processo saxão cujo texto de exigências publicado <strong>não contém nenhuma barreira de faturamento, pessoal ou certificação</strong>. Além de três vagas que Daniel deveria propositalmente não tocar.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top fit 88, empate triplo inalterado</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, Frankfurt 80% remoto), BridgingIT (Spring Boot/Kubernetes/Kafka, 100% remoto), Keil Business Solutions (Java/Angular + infraestrutura de telemática, Munique 100% remoto). Taxa pesquisada 90–130 €/h*.</li>\n      <li><span class=\"chip\">Board</span> <strong>98 vagas</strong>: 75 Freelance, 13 Employee, 10 Intriguing. Fit mediano <strong>70</strong>, 17 vagas a partir de 80, 8 a partir de 85. <strong>85 das 98</strong> têm a marcação Remote.</li>\n      <li><span class=\"chip hot\">AI-Integration</span> <strong>Contrato de IA permanece no topo</strong>: a WeMatch Consulting busca um \"Senior AI Software Engineer — Full-Stack\" (Java/Spring ou Python + React/Angular, exigindo explicitamente Claude Code/MCP/SDK da Anthropic), 100% remoto, fit <strong>84</strong>, 100–130 €/h*.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Premium de nicho em dobro</strong>: arquiteto de IoT na WeMatch (fit 77, 100–130 €/h*, 100% remoto) e EnCo Software com Java/Spring no ambiente de condução autônoma (fit 76, 100–140 €/h*).</li>\n      <li><span class=\"chip warn\">Atenção</span> <strong>Três vagas são eliminatórias</strong>: dois contratos alemães exigem verificação de segurança SÜ2 com residência na Alemanha, um exige um SC-Clearance britânico ativo. Ficam no board por transparência (fit 43/37/21) — se candidatar seria tempo perdido.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 vagas no filtro</strong>, ainda carregadas de IA e com a Suíça na frente: ELCA Zurique \"Senior Java Engineer — Agentic AI\" (fit 81, CHF 140–190k*), plataforma Agentic AI da AXA (80), Camunda Kubernetes remoto no mundo todo (80, US$126.800–190.100).</li>\n      <li><span class=\"chip good\">DE</span> <strong>Direct-fit no TED sem barreira formal</strong>: o Sächsisches Landesamt für Umwelt (órgão estadual de meio ambiente da Saxônia) licita o \"KARLAS\" — construção de um novo sistema de banco de dados baseado na web, procedimento aberto, prazo 24/08. No eForm publicado não consta <strong>nenhum critério de habilitação</strong>.</li>\n      <li><span class=\"chip\">DE</span> <strong>Dois novos casos de parceria com números concretos</strong>: BIG direkt gesund (assistente de IA para agentes, faturamento mínimo de 2 mi € por ano + referência do setor bancário/de seguros ≥ 300 mil), Stadtwerke Leipzig (contrato-quadro de microsserviços, faturamento de 4 mi € + <strong>20 funcionários</strong> + responsabilidade civil de 3 mi €).</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Referências externas</strong>: a freelancermap aponta a mediana de TI na região DACH em <strong>95 €/h</strong> (desenvolvimento de software/web 90 €/h, 02/07/2026); o barômetro de tarifas da Malt mostra para Java <strong>699 €/dia</strong> entre 8–15 anos, 720 € a partir de 15 anos.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Mix de stack de hoje</strong>: Java 46×, Spring Boot 34×, Angular 29×, AI-Integration 26×, Kubernetes 19×, AWS 15×, Python 14×, Kafka 13×, IoT 8×.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El board vuelve a llenarse: <strong>98 vacantes</strong> hoy frente a las 69 de ayer — pero la cima no se mueve. Los mismos tres contratos de Java/Spring/Angular comparten un fit de <strong>88</strong> por tercer día consecutivo. Más interesante es entonces lo que pasa <em>debajo</em> de la cima: un contrato de IA que exige Claude Code y MCP, un arquitecto de IoT en la banda premium — y, entre las licitaciones públicas, un procedimiento sajón cuyo texto de requisitos publicado <strong>no contiene ninguna barrera de facturación, personal o certificados</strong>. A esto se suman tres vacantes que Daniel debería evitar deliberadamente.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top fit 88, triple empate sin cambios</strong>: iSAX Consulting (Java 21/Spring Boot 3/Angular/Kafka, Fráncfort 80 % remoto), BridgingIT (Spring Boot/Kubernetes/Kafka, 100 % remoto), Keil Business Solutions (Java/Angular + infraestructura de telemática, Múnich 100 % remoto). Tarifa investigada 90–130 €/h*.</li>\n      <li><span class=\"chip\">Board</span> <strong>98 vacantes</strong>: 75 Freelance, 13 Employee, 10 Intriguing. Fit mediano <strong>70</strong>, 17 entradas con 80 o más, 8 con 85 o más. <strong>85 de las 98</strong> llevan etiqueta Remote.</li>\n      <li><span class=\"chip hot\">AI-Integration</span> <strong>El contrato de IA se mantiene arriba</strong>: WeMatch Consulting busca un \"Senior AI Software Engineer — Full-Stack\" (Java/Spring o Python + React/Angular, explícitamente Claude Code/MCP/SDK de Anthropic), 100 % remoto, fit <strong>84</strong>, 100–130 €/h*.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Premium de nicho, doble presencia</strong>: arquitecto de IoT en WeMatch (fit 77, 100–130 €/h*, 100 % remoto) y EnCo Software con Java/Spring en el entorno de conducción autónoma (fit 76, 100–140 €/h*).</li>\n      <li><span class=\"chip warn\">Atención</span> <strong>Tres vacantes son descarte total</strong>: dos contratos alemanes exigen una verificación de seguridad SÜ2 con residencia en Alemania, uno una habilitación SC británica activa. Están en el board por transparencia (fit 43/37/21) — postularse sería tiempo perdido.</li>\n      <li><span class=\"chip\">Employee</span> <strong>13 puestos en el filtro</strong>, de nuevo cargados de IA y con Suiza a la cabeza: ELCA Zúrich \"Senior Java Engineer — Agentic AI\" (fit 81, CHF 140–190k*), plataforma de Agentic AI de AXA (80), Camunda Kubernetes remoto en cualquier parte del mundo (80, US$126.800–190.100).</li>\n      <li><span class=\"chip good\">DE</span> <strong>Direct-fit del TED sin barrera formal</strong>: el Sächsisches Landesamt für Umwelt (agencia estatal sajona de medio ambiente) licita \"KARLAS\" — desarrollo de una nueva aplicación de base de datos basada en web, procedimiento abierto, plazo 24/08. El eForm publicado no contiene ni un solo criterio de idoneidad.</li>\n      <li><span class=\"chip\">DE</span> <strong>Dos nuevos casos de socio con cifras duras</strong>: BIG direkt gesund (asistente de IA para agentes, 2 millones de € de facturación mínima por año + referencia bancaria/de seguros ≥ 300 mil), Stadtwerke Leipzig (contrato marco de microservicios, 4 millones de € de facturación + <strong>20 empleados</strong> + 3 millones de € de responsabilidad civil).</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Referencias externas</strong>: freelancermap ubica la mediana de TI en la región DACH en <strong>95 €/h</strong> (desarrollo de software/web 90 €/h, 02/07/2026); el barómetro de tarifas de Malt muestra para Java <strong>699 €/día</strong> con 8–15 años, 720 € a partir de 15 años.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Mezcla de stack de hoy</strong>: Java 46×, Spring Boot 34×, Angular 29×, AI-Integration 26×, Kubernetes 19×, AWS 15×, Python 14×, Kafka 13×, IoT 8×.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Aus dem Dauergerücht der letzten drei Wochen wird morgen früh ein Termin: Der DFB stellt Jürgen Klopp um 11:00 MESZ / 06:00 BRT in Frankfurt als Nachfolger von Julian Nagelsmann vor, mit einem Vertrag bis 2030. Beim SC Freiburg läuft parallel die leise Version desselben Themas — der Klub ist ins Trainingslager nach Schruns gereist, aber ohne Torwart Noah Atubolu, der wechseln will. Und der Rekordabgang ist längst geklärt: Johan Manzambi spielt nächste Saison für Aston Villa, nicht für Newcastle. In Brasilien läuft die Série A nach der WM-Pause wieder, Palmeiras zieht davon.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp-Vorstellung morgen</strong>: Fr 24.07., 11:00 MESZ / 06:00 BRT, DFB-Zentrale Frankfurt. Vertrag bis 2030.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Debüt am 24.09.</strong>: Do 24.09., 20:45 MESZ / 15:45 BRT in Amsterdam gegen die Niederlande — Nations League, kein Testspiel.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Atubolu bleibt daheim</strong>: Der Torwart reiste nicht mit ins Trainingslager nach Schruns — er sucht einen Wechsel, genannt werden Aston Villa, Bournemouth und Juventus.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi ist Villa-Spieler</strong>: £ 59,5 Mio., teuerster Transfer der Villa-Geschichte (Sky Sports, 17.07.). Die früheren Newcastle-Meldungen sind damit überholt.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Rückblick Saison 2025/26</strong>: Platz 7 mit 47 Punkten — und das erste Europapokal-Finale der Klubgeschichte, 0:3 gegen Aston Villa am Mi 20.05.</li>\n      <li><span class=\"chip\">UCL</span> <strong>Europapokal-Weg 2026/27</strong>: Freiburg startet im Conference-League-Playoff, Hinspiel Do 20.08., Rückspiel Do 27.08.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>1. Hauptrunde auswärts</strong>: SCF bei Drittligist Fortuna Düsseldorf im Fenster Fr–Mo 21.–24.08. — bislang nur von einer Quelle bestätigt.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Auftakt Fr 28.08.</strong>: Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Supercup BVB – Bayern schon Sa 22.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras zieht davon</strong>: 44 Punkte nach 19 Spielen, sieben vor Flamengo (37 aus 18). Stand: Rodada 19.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Copa do Brasil erst im August</strong>: Achtelfinal-Hinspiele am Wochenende des So 02.08., Rückspiele Mi 05.08. Diese Woche also keine Copa-Spiele.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Aus dem Dauergerücht der letzten drei Wochen wird morgen früh ein Termin: Der DFB stellt Jürgen Klopp um 11:00 MESZ / 06:00 BRT in Frankfurt als Nachfolger von Julian Nagelsmann vor, mit einem Vertrag bis 2030. Beim SC Freiburg läuft parallel die leise Version desselben Themas — der Klub ist ins Trainingslager nach Schruns gereist, aber ohne Torwart Noah Atubolu, der wechseln will. Und der Rekordabgang ist längst geklärt: Johan Manzambi spielt nächste Saison für Aston Villa, nicht für Newcastle. In Brasilien läuft die Série A nach der WM-Pause wieder, Palmeiras zieht davon.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp-Vorstellung morgen</strong>: Fr 24.07., 11:00 MESZ / 06:00 BRT, DFB-Zentrale Frankfurt. Vertrag bis 2030.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Debüt am 24.09.</strong>: Do 24.09., 20:45 MESZ / 15:45 BRT in Amsterdam gegen die Niederlande — Nations League, kein Testspiel.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Atubolu bleibt daheim</strong>: Der Torwart reiste nicht mit ins Trainingslager nach Schruns — er sucht einen Wechsel, genannt werden Aston Villa, Bournemouth und Juventus.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi ist Villa-Spieler</strong>: £ 59,5 Mio., teuerster Transfer der Villa-Geschichte (Sky Sports, 17.07.). Die früheren Newcastle-Meldungen sind damit überholt.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Rückblick Saison 2025/26</strong>: Platz 7 mit 47 Punkten — und das erste Europapokal-Finale der Klubgeschichte, 0:3 gegen Aston Villa am Mi 20.05.</li>\n      <li><span class=\"chip\">UCL</span> <strong>Europapokal-Weg 2026/27</strong>: Freiburg startet im Conference-League-Playoff, Hinspiel Do 20.08., Rückspiel Do 27.08.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>1. Hauptrunde auswärts</strong>: SCF bei Drittligist Fortuna Düsseldorf im Fenster Fr–Mo 21.–24.08. — bislang nur von einer Quelle bestätigt.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Auftakt Fr 28.08.</strong>: Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Supercup BVB – Bayern schon Sa 22.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras zieht davon</strong>: 44 Punkte nach 19 Spielen, sieben vor Flamengo (37 aus 18). Stand: Rodada 19.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Copa do Brasil erst im August</strong>: Achtelfinal-Hinspiele am Wochenende des So 02.08., Rückspiele Mi 05.08. Diese Woche also keine Copa-Spiele.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The three-week-long rumor finally becomes a fixed date tomorrow morning: the DFB will present Jürgen Klopp as Julian Nagelsmann's successor at 11:00 CEST / 06:00 BRT in Frankfurt, with a contract through 2030. At SC Freiburg, the quiet version of the same story is playing out in parallel — the club has traveled to its training camp in Schruns, but without goalkeeper Noah Atubolu, who wants to leave. And the club's record departure is already settled: Johan Manzambi will play for Aston Villa next season, not Newcastle. In Brazil, the Série A is back underway after the World Cup break, with Palmeiras pulling away at the top.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Klopp presentation tomorrow</strong>: Fri 24.07, 11:00 CEST / 06:00 BRT, DFB headquarters, Frankfurt. Contract through 2030.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Debut on 09/24</strong>: Thu 24.09, 20:45 CEST / 15:45 BRT in Amsterdam against the Netherlands — Nations League, not a friendly.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Atubolu stays home</strong>: The goalkeeper did not travel to the training camp in Schruns — he's seeking a move, with Aston Villa, Bournemouth, and Juventus mentioned.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi is a Villa player</strong>: £59.5m, the most expensive transfer in Villa's history (Sky Sports, 07/17). The earlier Newcastle reports are now superseded.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Season 2025/26 recap</strong>: 7th place with 47 points — and the club's first-ever European final, a 0-3 loss to Aston Villa on Wed 20.05.</li>\n      <li><span class=\"chip\">UCL</span> <strong>European path 2026/27</strong>: Freiburg starts in the Conference League playoff, first leg Thu 20.08, second leg Thu 27.08.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>1st round away</strong>: SCF at third-division side Fortuna Düsseldorf in the window Fri–Mon 21.–24.08 — confirmed by only one source so far.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Kickoff Fri 28.08</strong>: Bayern – VfB Stuttgart, 20:30 CEST / 15:30 BRT. Supercup BVB – Bayern already on Sat 22.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras pulls away</strong>: 44 points after 19 matches, seven ahead of Flamengo (37 from 18). As of: Rodada 19.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Copa do Brasil not until August</strong>: Round-of-16 first legs on the weekend of Sun 02.08, second legs Wed 05.08. So no Copa matches this week.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O boato constante das últimas três semanas vira compromisso marcado para amanhã de manhã: a DFB apresenta Jürgen Klopp às 11:00 MESZ / 06:00 BRT em Frankfurt como sucessor de Julian Nagelsmann, com contrato até 2030. No SC Freiburg, corre em paralelo a versão discreta do mesmo assunto — o clube viajou para a pré-temporada em Schruns, mas sem o goleiro Noah Atubolu, que quer se transferir. E a saída recorde já está resolvida: Johan Manzambi joga na próxima temporada pelo Aston Villa, não pelo Newcastle. No Brasil, o Brasileirão Série A volta a rodar após a pausa da Copa do Mundo, e o Palmeiras dispara na liderança.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Apresentação de Klopp amanhã</strong>: Sex 24/07, 11:00 MESZ / 06:00 BRT, sede da DFB em Frankfurt. Contrato até 2030.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Estreia em 24/09</strong>: Qui 24/09, 20:45 MESZ / 15:45 BRT em Amsterdã contra a Holanda — Liga das Nações, não é amistoso.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Atubolu fica em casa</strong>: o goleiro não viajou para a pré-temporada em Schruns — ele busca uma transferência, com Aston Villa, Bournemouth e Juventus mencionados.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Manzambi agora é jogador do Villa</strong>: £ 59,5 milhões, a transferência mais cara da história do Villa (Sky Sports, 17/07). As notícias anteriores sobre o Newcastle ficaram superadas.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Retrospecto da temporada 2025/26</strong>: 7º lugar com 47 pontos — e a primeira final de torneio europeu da história do clube, derrota por 0 a 3 para o Aston Villa em Qua 20/05.</li>\n      <li><span class=\"chip\">UCL</span> <strong>Caminho europeu 2026/27</strong>: o Freiburg começa no playoff da Liga Conferência, ida Qui 20/08, volta Qui 27/08.</li>\n      <li><span class=\"chip\">Copa</span> <strong>1ª rodada principal fora de casa</strong>: SCF visita o Fortuna Düsseldorf, da terceira divisão, na janela Sex–Seg 21–24/08 — até agora confirmado por apenas uma fonte.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Abertura Sex 28/08</strong>: Bayern – VfB Stuttgart, 20:30 MESZ / 15:30 BRT. Supercopa BVB – Bayern já em Sáb 22/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras dispara na liderança</strong>: 44 pontos em 19 jogos, sete à frente do Flamengo (37 em 18). Situação: Rodada 19.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Copa do Brasil só em agosto</strong>: jogos de ida das oitavas de final no fim de semana de Dom 02/08, volta na Qua 05/08. Esta semana, portanto, não há jogos da Copa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El rumor constante de las últimas tres semanas se convierte mañana por la mañana en una fecha concreta: el DFB presentará a Jürgen Klopp a las 11:00 CEST / 06:00 BRT en Fráncfort como sucesor de Julian Nagelsmann, con un contrato hasta 2030. En el SC Freiburg corre en paralelo la versión discreta del mismo tema — el club viajó al campamento de entrenamiento en Schruns, pero sin el portero Noah Atubolu, que busca un traspaso. Y la salida récord ya está resuelta: Johan Manzambi jugará la próxima temporada para el Aston Villa, no para el Newcastle. En Brasil, la Serie A volvió a rodar tras la pausa del Mundial, y Palmeiras se escapa en la tabla.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Presentación de Klopp mañana</strong>: vie 24/07, 11:00 CEST / 06:00 BRT, sede del DFB en Fráncfort. Contrato hasta 2030.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Debut el 24/09</strong>: jue 24/09, 20:45 CEST / 15:45 BRT en Ámsterdam ante los Países Bajos — Liga de Naciones, no es amistoso.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Atubolu se queda en casa</strong>: el portero no viajó al campamento de entrenamiento en Schruns — busca un traspaso, se mencionan el Aston Villa, el Bournemouth y la Juventus.</li>\n      <li><span class=\"chip\">Fichajes</span> <strong>Manzambi ya es jugador del Villa</strong>: £ 59,5 millones, el traspaso más caro en la historia del Villa (Sky Sports, 17/07). Las anteriores informaciones sobre el Newcastle quedan así superadas.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Repaso de la temporada 2025/26</strong>: 7.º lugar con 47 puntos — y la primera final europea de la historia del club, 0-3 ante el Aston Villa el mié 20/05.</li>\n      <li><span class=\"chip\">UCL</span> <strong>Camino europeo 2026/27</strong>: Freiburg arranca en el playoff de la Conference League, ida jue 20/08, vuelta jue 27/08.</li>\n      <li><span class=\"chip\">Copa</span> <strong>1.ª ronda como visitante</strong>: el SCF se mide al Fortuna Düsseldorf, de tercera división, en la ventana vie–lun 21–24/08 — confirmado hasta ahora solo por una fuente.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Arranque vie 28/08</strong>: Bayern – VfB Stuttgart, 20:30 CEST / 15:30 BRT. La Supercopa BVB – Bayern ya el sáb 22/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras se escapa</strong>: 44 puntos en 19 partidos, siete por delante del Flamengo (37 en 18). Estado: jornada 19.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Copa do Brasil hasta agosto</strong>: los partidos de ida de octavos de final se juegan el fin de semana del dom 02/08, la vuelta el mié 05/08. Esta semana, entonces, no hay partidos de Copa.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Donnerstag, der 23. Juli — morgen um <strong>13:30 MESZ / 08:30 BRT</strong> rollt am Hungaroring das erste Auto zum Freien Training. Der <strong>Große Preis von Ungarn</strong> (Fr–So, 24.–26.07.) ist der <strong>letzte Lauf vor der Sommerpause</strong>, und genau daran hängt die Geschichte des Wochenendes: Max Verstappens Vertrag bis 2028 enthält eine Klausel, die ihm den Ausstieg für 2027 erlaubt, <em>wenn er zur Sommerpause nicht unter den ersten zwei</em> der Fahrerwertung steht. Er ist <strong>Siebter mit 91 Punkten</strong>, <strong>113 hinter Antonelli</strong> — selbst ein Sieg am Sonntag bringt ihn auf höchstens 116, Platz zwei steht bei 159. Die Bedingung ist also erfüllt, bevor in Budapest ein Rad steht. In einem <strong>heute</strong> erschienenen Interview sagt Verstappen zu 2027 exakt nichts Verbindliches — und beschreibt seinen RB22 als „bestenfalls das viertschnellste Paket im Feld&ldquo;. Dazu kommt der zweite Red-Bull-Faden: Der nach Verstappens „super gefährlich&ldquo;-Kritik zurückgezogene <strong>rotierende Heckflügel</strong> ist für Ungarn wieder eingeplant, mit einer behaupteten Reparatur. Auf der Strecke ist seit Spa (19.07.) nichts passiert — alle Wertungen unten sind unverändert, heute erneut abgerufen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Aufmacher</span> <strong>Klausel-Bedingung ab Sonntag erfüllt.</strong> Ausstieg für 2027 möglich, wenn Verstappen zur Pause nicht Top&nbsp;2 ist — rechnerisch unmöglich zu verhindern.</li>\n      <li><span class=\"chip hot\">Verstappen heute</span> <strong>„Nichts zu sagen, weil nichts los ist.&ldquo;</strong> Kein Bekenntnis zu Red Bull für 2027; das Team sei „wie eine zweite Familie&ldquo;, das Auto nur viertschnellstes Paket.</li>\n      <li><span class=\"chip\">Rechnung</span> <strong>91 + max. 25 = 116 &lt; 159.</strong> Der Abstand zur Spitze ist <strong>113</strong> Punkte (204 − 91) — nicht die 101, die ein älterer ESPN-Schnipsel nennt.</li>\n      <li><span class=\"chip hot\">Technik</span> <strong>„Macarena&ldquo;-Heckflügel kehrt zurück.</strong> Nach Dreher in Österreich und Silverstone in Spa ausgebaut; Red Bull nennt zwei mechanische Ursachen und bringt die revidierte Version nach Budapest.</li>\n      <li><span class=\"chip\">Zeitplan</span> <strong>Qualifying Sa 16:00 MESZ / 11:00 BRT, Rennen So 15:00 MESZ / 10:00 BRT</strong>, 70 Runden. Budapest liegt in derselben Sommerzeit wie Deutschland — Ortszeit = MESZ.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unverändert seit dem Belgien-GP, heute gegengeprüft. Verstappen Siebter (91).</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.), vier Läufe offen, nächster in Austin (04.–06.09.).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP Silverstone 07.–09.08.</strong> (zwei offizielle Quellen; ein Ticket-Reseller nennt falsch den 1.–3.08.), <strong>Formel-E-Finale London 15.–16.08.</strong></li>\n    </ul></div>",
