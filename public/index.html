<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {

  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,

    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

  <div class="header-right">

      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red

             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

        <span class="nav-label-text">Übersicht</span>
      </div>

           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Drohnenangriff auf zwei saudische Tanker im Roten Meer hat <strong>Brent um 6,46 % auf 100,15 $</strong> katapultiert — und damit die ganze Kette in Gang gesetzt: teures Öl heißt in den USA Inflationsangst (<strong>10-Jahres-Rendite 4,70 %</strong>, höchster Stand seit Januar 2025), in Brasilien dagegen bessere Terms of Trade. Ergebnis am Abend: Der <strong>ECB-Referenzfix steht bei EUR/BRL 5,7775</strong> — <strong>0,30 % unter gestern</strong> und der <strong>tiefste Fix seit dem 13.05.2026</strong>. Für Daniel die falsche Richtung: <strong>5.000 € bringen heute R$ 28.887</strong>, rund <strong>R$ 855 weniger</strong> als am Monatshoch vom 03.07. Der Kreuzkurs-Check lief sauber durch (0,001 % Divergenz). Meine These, mit der man streiten darf: Der Markt feiert den Öl-Bonus für Brasilien — und übersieht, dass dasselbe Öl gerade eine <em>Zinserhöhung</em> der Fed auf den Tisch legt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,7775</strong> — ECB-Referenzfix vom 23.07., <strong>−0,30 %</strong> gegenüber gestern (5,7949) und der tiefste Fix seit dem 13.05.2026.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Kreuzkurs-Check sauber:</strong> veröffentlichter Fix gegen USD/BRL × unabhängig gezogenen EUR/USD = <strong>0,001 % Divergenz</strong>, weit unter der 0,5-%-Warnschwelle. Kein Datenzweifel heute.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 100,15 $</strong> (+6,46 % am Tag). Auslöser: Houthi-Angriff mit Drohnen und Raketen auf die saudischen Tanker <em>Encelia</em> und <em>Layla</em>; Trump will Iran dafür verantwortlich machen, CENTCOM meldet die 12. Runde US-Schläge.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>10-Jahres-Treasury 4,70 %</strong> (+0,03 pp) — höchster Stand seit Januar 2025. Der Anleihemarkt liest 100-$-Öl als Inflation, nicht als Wachstumsbremse.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Hike statt Cut?</strong> Unter dem seit 22.05. amtierenden Fed-Chef <strong>Kevin Warsh</strong> preist der Markt laut Forbes-Auswertung <strong>rund eine 1-zu-3-Chance auf eine Zinserhöhung</strong> beim FOMC am 28./29.07. — nach einem Juni-CPI von <strong>3,7 %</strong>.</li>\n      <li><span class=\"chip\">EU</span> <strong>EZB hält</strong> (Beschluss heute, 23.07.): drei Leitzinsen unverändert, Einlagensatz <strong>2,25 %</strong>. Der Euro-Schenkel bekommt keinen Rückenwind — das ist die halbe Miete für den tiefen Fix.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101,44</strong> (+0,31 %) — von Hand geprüft, weil der automatische Abgriff scheiterte; zweite Quelle bestätigt ~101,0 in der frühen Europa-Session.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25 %</strong> (gesenkt am 17.06.), nächster Copom <strong>04./05.08.</strong> Zinsvorsprung gegen die USA weiter rund <strong>10,6 Prozentpunkte</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiskal minimal freundlicher:</strong> Prisma-Fiscal-Median für das Primärdefizit 2026 auf <strong>R$ 58,08 Mrd.</strong> gesenkt; Bruttoschuld weiter <strong>83 % des BIP</strong>; 5-Jahres-CDS <strong>121,6 bp</strong> — kein Stress-Signal.</li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −0,60 % auf 176.480</strong> Punkte; Wall Street gemischt bis leichter.</li>\n      <li><span class=\"chip\">Hinweis</span> Die Wahrscheinlichkeiten in der Prognose sind <strong>meine Konfidenz</strong>, keine markt-implizite Größe. Spot-Anker sind live und datiert.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">A drone attack on two Saudi tankers in the Red Sea sent <strong>Brent up 6.46% to $100.15</strong> — kicking off the whole chain: expensive oil means inflation fears in the US (<strong>10-year yield at 4.70%</strong>, the highest level since January 2025), but better terms of trade for Brazil. The result by evening: the <strong>ECB reference fix stands at EUR/BRL 5.7775</strong> — <strong>0.30% below yesterday</strong> and the <strong>lowest fix since May 13, 2026</strong>. For Daniel, that's the wrong direction: <strong>€5,000 buys R$28,887</strong> today, about <strong>R$855 less</strong> than at the monthly high on Jul 3. The cross-rate check came through clean (0.001% divergence). My thesis, open for debate: the market is celebrating the oil bonus for Brazil — and missing that the same oil is putting a Fed <em>rate hike</em> on the table.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.7775</strong> — ECB reference fix from Jul 23, <strong>−0.30%</strong> versus yesterday (5.7949) and the lowest fix since May 13, 2026.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Cross-rate check clean:</strong> published fix versus USD/BRL × independently pulled EUR/USD = <strong>0.001% divergence</strong>, well below the 0.5% warning threshold. No data doubts today.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $100.15</strong> (+6.46% on the day). Trigger: a Houthi drone-and-missile attack on the Saudi tankers <em>Encelia</em> and <em>Layla</em>; Trump wants to hold Iran responsible, CENTCOM reports the 12th round of US strikes.</li>\n      <li><span class=\"chip hot\">US</span> <strong>10-year Treasury 4.70%</strong> (+0.03 pp) — the highest level since January 2025. The bond market is reading $100 oil as inflation, not as a growth brake.</li>\n      <li><span class=\"chip hot\">US</span> <strong>Hike instead of cut?</strong> Under Fed Chair <strong>Kevin Warsh</strong>, in office since May 22, the market prices in <strong>roughly 1-in-3 odds of a rate hike</strong> at the FOMC meeting on Jul 28-29, according to a Forbes analysis — after a June CPI reading of <strong>3.7%</strong>.</li>\n      <li><span class=\"chip\">EU</span> <strong>ECB holds</strong> (decision today, Jul 23): all three key rates unchanged, deposit rate at <strong>2.25%</strong>. The euro leg gets no tailwind — that's half the reason for today's low fix.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101.44</strong> (+0.31%) — hand-checked because the automated pull failed; a second source confirms ~101.0 in the early European session.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> (cut on Jun 17), next Copom meeting <strong>Aug 4-5</strong>. The rate spread against the US remains around <strong>10.6 percentage points</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal marginally friendlier:</strong> the Prisma Fiscal median for the 2026 primary deficit was lowered to <strong>R$58.08 billion</strong>; gross debt still <strong>83% of GDP</strong>; 5-year CDS <strong>121.6 bp</strong> — no stress signal.</li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −0.60% to 176,480</strong> points; Wall Street mixed to slightly lower.</li>\n      <li><span class=\"chip\">Heads up</span> The probabilities in the forecast are <strong>my confidence levels</strong>, not market-implied figures. Spot anchors are live and dated.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um ataque de drones a dois petroleiros sauditas no mar Vermelho catapultou o <strong>Brent em 6,46% para US$ 100,15</strong> — e com isso disparou toda a cadeia: petróleo caro significa medo de inflação nos EUA (<strong>rendimento de 10 anos em 4,70%</strong>, maior nível desde janeiro de 2025), já no Brasil, melhores termos de troca. Resultado à noite: o <strong>fixing de referência do BCE está em EUR/BRL 5,7775</strong> — <strong>0,30% abaixo de ontem</strong> e o <strong>fixing mais baixo desde 13/05/2026</strong>. Para Daniel, a direção errada: <strong>5.000 € rendem hoje R$ 28.887</strong>, cerca de <strong>R$ 855 a menos</strong> que na máxima do mês, em 03/07. A checagem de câmbio cruzado passou limpa (0,001% de divergência). Minha tese, que pode ser contestada: o mercado está comemorando o bônus do petróleo para o Brasil — e ignorando que o mesmo petróleo está colocando uma <em>alta de juros</em> do Fed na mesa.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,7775</strong> — fixing de referência do BCE de 23/07, <strong>−0,30%</strong> em relação a ontem (5,7949) e o fixing mais baixo desde 13/05/2026.</li>\n      <li><span class=\"chip good\">Câmbio</span> <strong>Checagem de câmbio cruzado limpa:</strong> fixing publicado contra USD/BRL × EUR/USD coletado de forma independente = <strong>0,001% de divergência</strong>, bem abaixo do limiar de alerta de 0,5%. Nenhuma dúvida sobre os dados hoje.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent US$ 100,15</strong> (+6,46% no dia). Gatilho: ataque houthi com drones e mísseis contra os petroleiros sauditas <em>Encelia</em> e <em>Layla</em>; Trump quer responsabilizar o Irã, o CENTCOM reporta a 12ª rodada de ataques dos EUA.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Título de 10 anos do Tesouro dos EUA em 4,70%</strong> (+0,03 p.p.) — maior nível desde janeiro de 2025. O mercado de renda fixa está lendo o petróleo a US$ 100 como inflação, não como freio de crescimento.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Alta em vez de corte?</strong> Sob o presidente do Fed <strong>Kevin Warsh</strong>, no cargo desde 22/05, o mercado precifica, segundo uma análise da Forbes, <strong>uma chance de cerca de 1 em 3</strong> de uma alta de juros no FOMC de 28/29 de julho — depois de um CPI de junho de <strong>3,7%</strong>.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE mantém</strong> (decisão de hoje, 23/07): as três taxas básicas de juros permanecem inalteradas, taxa de depósito em <strong>2,25%</strong>. A perna do euro não recebe vento a favor — isso explica metade do fixing baixo.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 101,44</strong> (+0,31%) — verificado manualmente, porque a coleta automática falhou; uma segunda fonte confirma ~101,0 no início do pregão europeu.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> (cortada em 17/06), próximo Copom <strong>04/05 de agosto.</strong> Diferencial de juros contra os EUA segue em cerca de <strong>10,6 pontos percentuais</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal levemente mais favorável:</strong> a mediana do Prisma Fiscal para o déficit primário de 2026 caiu para <strong>R$ 58,08 bilhões</strong>; dívida bruta segue em <strong>83% do PIB</strong>; CDS de 5 anos em <strong>121,6 bp</strong> — sem sinal de estresse.</li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −0,60%, aos 176.480</strong> pontos; Wall Street entre estável e em leve queda.</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades na previsão são <strong>minha confiança pessoal</strong>, não uma medida implícita de mercado. As âncoras de câmbio à vista são atuais e datadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un ataque con drones contra dos petroleros sauditas en el mar Rojo catapultó al Brent un 6,46% hasta 100,15 dólares — y con eso puso en marcha toda la cadena: el petróleo caro significa, en Estados Unidos, miedo a la inflación (rendimiento a 10 años de 4,70%, el nivel más alto desde enero de 2025); en Brasil, en cambio, mejores términos de intercambio. El resultado al cierre del día: el fixing de referencia del BCE se ubica en EUR/BRL 5,7775 — 0,30% por debajo de ayer y el fixing más bajo desde el 13/05/2026. Para Daniel, la dirección equivocada: 5.000 € rinden hoy R$ 28.887, unos R$ 855 menos que en el máximo mensual del 03/07. La verificación de tipo cruzado salió limpia (0,001% de divergencia). Mi tesis, discutible: el mercado celebra el bono petrolero para Brasil — y pasa por alto que ese mismo petróleo pone sobre la mesa un alza de tasas de la Fed.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,7775</strong> — fixing de referencia del BCE del 23/07, <strong>−0,30%</strong> respecto a ayer (5,7949) y el fixing más bajo desde el 13/05/2026.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificación de tipo cruzado limpia:</strong> fixing publicado frente a USD/BRL × EUR/USD obtenido de forma independiente = <strong>0,001% de divergencia</strong>, muy por debajo del umbral de alerta de 0,5%. Sin dudas sobre los datos hoy.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 100,15 dólares</strong> (+6,46% en el día). Detonante: ataque hutí con drones y misiles contra los petroleros sauditas <em>Encelia</em> y <em>Layla</em>; Trump quiere responsabilizar a Irán, CENTCOM reporta la 12ª ronda de ataques de EE. UU.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Bono del Tesoro de EE. UU. a 10 años 4,70%</strong> (+0,03 pp) — el nivel más alto desde enero de 2025. El mercado de bonos lee el petróleo a 100 dólares como inflación, no como freno al crecimiento.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>¿Alza en vez de recorte?</strong> Bajo el presidente de la Fed en funciones desde el 22/05, <strong>Kevin Warsh</strong>, el mercado descuenta, según un análisis de Forbes, <strong>una probabilidad de aproximadamente 1 a 3 de un alza de tasas</strong> en el FOMC del 28-29/07 — tras un IPC de junio del <strong>3,7%</strong>.</li>\n      <li><span class=\"chip\">UE</span> <strong>El BCE mantiene sin cambios</strong> (decisión de hoy, 23/07): las tres tasas de referencia sin cambios, tasa de depósito en <strong>2,25%</strong>. La pata del euro no recibe viento a favor — eso explica media historia del fixing bajo.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101,44</strong> (+0,31%) — verificado a mano porque falló la toma automática; una segunda fuente confirma ~101,0 en la sesión europea temprana.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> (recortada el 17/06), próximo Copom <strong>4-5/08</strong>. La ventaja de tasas frente a EE. UU. se mantiene en unos <strong>10,6 puntos porcentuales</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal un poco más amable:</strong> la mediana del Prisma Fiscal para el déficit primario de 2026 bajó a <strong>R$ 58,08 mil millones</strong>; la deuda bruta se mantiene en <strong>83% del PIB</strong>; el CDS a 5 años en <strong>121,6 bp</strong> — sin señal de estrés.</li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −0,60% a 176.480</strong> puntos; Wall Street de mixta a ligeramente a la baja.</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades del pronóstico son <strong>mi propia confianza</strong>, no una cifra implícita del mercado. Las anclas spot son en vivo y con fecha.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Frage von gestern Abend ist beantwortet, und die Antwort war teuer. <strong>Alphabet</strong> hat seine Zahlen geschlagen und trotzdem <strong>7,13 %</strong> verloren — weil das Unternehmen im selben Atemzug seine KI-Investitionen für 2026 auf <strong>195–205 Mrd. $</strong> hochgesetzt hat, sein freier Cashflow ins Minus gedreht ist (<strong>−5,855 Mrd. $</strong>) und die Aktienrückkäufe auf <strong>null</strong> gefallen sind. <strong>Tesla</strong> verlor <strong>14,52 %</strong> nach einer operativen Marge von <strong>1,4 %</strong> — bei gleichzeitig <em>rekordhohen</em> Auslieferungen, und im Kern aus demselben Grund: Teslas eigene Investitionen sprangen im Quartal um <strong>142 % auf 5,79 Mrd. $</strong>, die Jahresplanung steht jetzt bei <strong>über 25 Mrd. $</strong>. Zusammen zogen die beiden den <strong>Nasdaq 2,15 %</strong> nach unten, den <strong>S&amp;P 500 1,21 %</strong>. Der entscheidende Zug steckt aber in der Verteilung: Verkauft wurden die <em>Käufer</em> von KI-Rechenleistung — Amazon <strong>−4,57 %</strong>, Meta <strong>−3,36 %</strong>, Microsoft <strong>−2,24 %</strong> —, während der <em>Verkäufer</em> Nvidia mit <strong>−1,56 %</strong> fast unbeschadet blieb. Der Markt hat die Rechnung nicht der KI gestellt, sondern denen, die sie bezahlen. Und die drei anderen Großkäufer legen ihre eigenen Zahlen in <strong>sechs und sieben Tagen</strong> vor, in derselben Woche wie der <strong>FOMC-Entscheid am 29.07.</strong> Deshalb lautet heute keine einzige Empfehlung „Dip kaufen\".</p>\n    <ul>\n      <li><span class=\"chip hot\">CAPEX</span> <strong>Alphabet hebt die 2026er-Investitionen auf 195–205 Mrd. $</strong> (vorher 180–190 Mrd. $, Analystenerwartung 186,4 Mrd. $) — trotz EPS- und Umsatz-Beat. Aktie <strong>317,69 $, −7,13 %</strong> (Schluss 23.07.). Rund <strong>300 Mrd. $</strong> Börsenwert an einem Tag.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>Operative Marge 1,4 %</strong> (Vorjahr 4,1 %) bei <strong>Rekord-Auslieferungen von 480.126</strong> Fahrzeugen. Aktie <strong>319,69 $, −14,52 %</strong>. Zwei Treiber, nicht einer: schwächere Preise <em>und</em> ein eigener KI-Investitionsschub — Capex <strong>+142 % auf 5,79 Mrd. $</strong>, Betriebskosten <strong>+47 % auf 4,35 Mrd. $</strong>, freier Cashflow <strong>−1,09 Mrd. $</strong>.</li>\n      <li><span class=\"chip\">INDIZES</span> <strong>Nasdaq 25.137,69 (−2,15 %), S&amp;P 500 7.408,30 (−1,21 %), Dow 51.711,65 (−0,97 %)</strong> — Schluss <strong>Do 23.07., 16:00 EDT / 17:00 BRT</strong>. Der Tech-Index fiel doppelt so stark wie der Dow.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Käufer runter, Verkäufer stabil:</strong> AMZN −4,57 %, META −3,36 %, MSFT −2,24 %, GOOGL −7,13 % — <strong>NVDA nur −1,56 %</strong> (208,76 $). Höhere Capex ist für Nvidia Umsatz und für die Wolken-Konzerne Cashflow-Verlust.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent schließt bei 100,69 $ (+7 %)</strong>, im Tagesverlauf bis <strong>102 $</strong> — erstmals seit Mai über 100 $, nach Huthi-Angriffen auf zwei saudische Tanker im Roten Meer. Eine Vormittagsquelle nannte noch <strong>94 $</strong>; das Gewicht der unabhängigen Berichterstattung desselben Tages (Washington Post, NBC News, CNBC, Forbes, oilprice.com) steht beim <strong>100-$-plus-Schluss</strong>. WTI <strong>86,50–89 $</strong> im Tagesverlauf.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>4.053 $/Unze</strong> (23.07., 09:25 EDT), <strong>−1,55 %</strong> zum Vortag, aber <strong>+18,61 %</strong> zum Vorjahr. Gold fällt <em>obwohl</em> Öl springt und Aktien fallen — der Zinskanal schlägt heute den Fluchtkanal.</li>\n      <li><span class=\"chip good\">KRYPTO</span> <strong>BTC 65.658 $ (24 h −0,30 %), ETH 1.925 $ (24 h +0,13 %)</strong> — 23.07., 06:30 EDT. Bemerkenswert: An einem Tag mit <strong>−2,15 % Nasdaq</strong> bewegte sich Krypto praktisch nicht. Auf Jahressicht bleibt es brutal: <strong>BTC −44,73 %, ETH −46,97 %</strong>.</li>\n      <li><span class=\"chip\">ETF</span> <strong>Zwei Zuflusswochen in Folge</strong> (+197,4 Mio. $ zum 10.07., +75,7 Mio. $ zum 17.07.) — gegen <strong>−4,5 Mrd. $ im Juni</strong> und <strong>−5,2 Mrd. $ seit Jahresbeginn</strong>. Richtung gedreht, Größenordnung noch bedeutungslos.</li>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>Mi 29.07.: FOMC-Entscheid 14:00 EDT / 15:00 BRT — am selben Abend berichten Microsoft und Meta, am 30.07. Apple und Amazon.</strong> Drei weitere Capex-Ansagen in sieben Tagen, plus die Notenbank in einer Woche, die mit einem Brent-Schluss über 100 $ endete.</li>\n      <li><span class=\"chip hot\">URTEIL</span> <strong>Vier Halten, zwei Verkaufen — kein einziges Kaufen.</strong> Wer heute Alphabet oder Tesla „billig\" nachkauft, kauft vor drei baugleichen Ereignissen und einer Notenbanksitzung. Erste mögliche Aktion: <strong>Fr 31.07.</strong></li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Die Frage von gestern Abend ist beantwortet, und die Antwort war teuer. <strong>Alphabet</strong> hat seine Zahlen geschlagen und trotzdem <strong>7,13 %</strong> verloren — weil das Unternehmen im selben Atemzug seine KI-Investitionen für 2026 auf <strong>195–205 Mrd. $</strong> hochgesetzt hat, sein freier Cashflow ins Minus gedreht ist (<strong>−5,855 Mrd. $</strong>) und die Aktienrückkäufe auf <strong>null</strong> gefallen sind. <strong>Tesla</strong> verlor <strong>14,52 %</strong> nach einer operativen Marge von <strong>1,4 %</strong> — bei gleichzeitig <em>rekordhohen</em> Auslieferungen, und im Kern aus demselben Grund: Teslas eigene Investitionen sprangen im Quartal um <strong>142 % auf 5,79 Mrd. $</strong>, die Jahresplanung steht jetzt bei <strong>über 25 Mrd. $</strong>. Zusammen zogen die beiden den <strong>Nasdaq 2,15 %</strong> nach unten, den <strong>S&amp;P 500 1,21 %</strong>. Der entscheidende Zug steckt aber in der Verteilung: Verkauft wurden die <em>Käufer</em> von KI-Rechenleistung — Amazon <strong>−4,57 %</strong>, Meta <strong>−3,36 %</strong>, Microsoft <strong>−2,24 %</strong> —, während der <em>Verkäufer</em> Nvidia mit <strong>−1,56 %</strong> fast unbeschadet blieb. Der Markt hat die Rechnung nicht der KI gestellt, sondern denen, die sie bezahlen. Und die drei anderen Großkäufer legen ihre eigenen Zahlen in <strong>sechs und sieben Tagen</strong> vor, in derselben Woche wie der <strong>FOMC-Entscheid am 29.07.</strong> Deshalb lautet heute keine einzige Empfehlung „Dip kaufen\".</p>\n    <ul>\n      <li><span class=\"chip hot\">CAPEX</span> <strong>Alphabet hebt die 2026er-Investitionen auf 195–205 Mrd. $</strong> (vorher 180–190 Mrd. $, Analystenerwartung 186,4 Mrd. $) — trotz EPS- und Umsatz-Beat. Aktie <strong>317,69 $, −7,13 %</strong> (Schluss 23.07.). Rund <strong>300 Mrd. $</strong> Börsenwert an einem Tag.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>Operative Marge 1,4 %</strong> (Vorjahr 4,1 %) bei <strong>Rekord-Auslieferungen von 480.126</strong> Fahrzeugen. Aktie <strong>319,69 $, −14,52 %</strong>. Zwei Treiber, nicht einer: schwächere Preise <em>und</em> ein eigener KI-Investitionsschub — Capex <strong>+142 % auf 5,79 Mrd. $</strong>, Betriebskosten <strong>+47 % auf 4,35 Mrd. $</strong>, freier Cashflow <strong>−1,09 Mrd. $</strong>.</li>\n      <li><span class=\"chip\">INDIZES</span> <strong>Nasdaq 25.137,69 (−2,15 %), S&amp;P 500 7.408,30 (−1,21 %), Dow 51.711,65 (−0,97 %)</strong> — Schluss <strong>Do 23.07., 16:00 EDT / 17:00 BRT</strong>. Der Tech-Index fiel doppelt so stark wie der Dow.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Käufer runter, Verkäufer stabil:</strong> AMZN −4,57 %, META −3,36 %, MSFT −2,24 %, GOOGL −7,13 % — <strong>NVDA nur −1,56 %</strong> (208,76 $). Höhere Capex ist für Nvidia Umsatz und für die Wolken-Konzerne Cashflow-Verlust.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent schließt bei 100,69 $ (+7 %)</strong>, im Tagesverlauf bis <strong>102 $</strong> — erstmals seit Mai über 100 $, nach Huthi-Angriffen auf zwei saudische Tanker im Roten Meer. Eine Vormittagsquelle nannte noch <strong>94 $</strong>; das Gewicht der unabhängigen Berichterstattung desselben Tages (Washington Post, NBC News, CNBC, Forbes, oilprice.com) steht beim <strong>100-$-plus-Schluss</strong>. WTI <strong>86,50–89 $</strong> im Tagesverlauf.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>4.053 $/Unze</strong> (23.07., 09:25 EDT), <strong>−1,55 %</strong> zum Vortag, aber <strong>+18,61 %</strong> zum Vorjahr. Gold fällt <em>obwohl</em> Öl springt und Aktien fallen — der Zinskanal schlägt heute den Fluchtkanal.</li>\n      <li><span class=\"chip good\">KRYPTO</span> <strong>BTC 65.658 $ (24 h −0,30 %), ETH 1.925 $ (24 h +0,13 %)</strong> — 23.07., 06:30 EDT. Bemerkenswert: An einem Tag mit <strong>−2,15 % Nasdaq</strong> bewegte sich Krypto praktisch nicht. Auf Jah         "en": "<div class=\"tldr\"><p class=\"lead\">Last night's question has been answered, and the answer was expensive. <strong>Alphabet</strong> beat its numbers and still lost <strong>7.13%</strong> — because in the same breath the company raised its 2026 AI capex guidance to <strong>$195–205bn</strong>, its free cash flow turned negative (<strong>-$5.855bn</strong>), and buybacks fell to <strong>zero</strong>. <strong>Tesla</strong> lost <strong>14.52%</strong> after posting a <strong>1.4%</strong> operating margin — alongside <em>record</em> deliveries, and for essentially the same reason: Tesla's own capex jumped <strong>142% to $5.79bn</strong> for the quarter, and full-year guidance now stands above <strong>$25bn</strong>. Together the two dragged the <strong>Nasdaq down 2.15%</strong>, the <strong>S&amp;P 500 1.21%</strong>. But the decisive move is in the distribution: what got sold were the <em>buyers</em> of AI compute — Amazon <strong>-4.57%</strong>, Meta <strong>-3.36%</strong>, Microsoft <strong>-2.24%</strong> — while the <em>seller</em>, Nvidia, at <strong>-1.56%</strong>, came through almost unscathed. The market didn't send the bill to AI — it sent it to whoever pays for it. And the other three big buyers report their own numbers in <strong>six and seven days</strong>, the same week as the <strong>FOMC decision on July 29</strong>. That's why not a single recommendation today says \"buy the dip.\"</p>\n    <ul>\n      <li><span class=\"chip hot\">CAPEX</span> <strong>Alphabet raises 2026 capex guidance to $195–205bn</strong> (previously $180–190bn, analyst estimate $186.4bn) — despite an EPS and revenue beat. Stock <strong>$317.69, -7.13%</strong> (close 07/23). Roughly <strong>$300bn</strong> in market cap in a single day.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>Operating margin 1.4%</strong> (prior year 4.1%) on <strong>record deliveries of 480,126</strong> vehicles. Stock <strong>$319.69, -14.52%</strong>. Two drivers, bn in June</strong> and <strong>-$5.2bn year to date</strong>. Direction has turned, scale is still negligible.</li>\n      <li><span class=\"chip hot\">CALENDAR</span> <strong>Wed 07/29: FOMC decision 2:00pm EDT / 3:00pm BRT — Microsoft and Meta report that same evening, Apple and Amazon on 07/30.</strong> Three more capex announcements in seven days, plus the Fed, in a week that ended with a Brent close above $100.</li>\n      <li><span class=\"chip hot\">VERDICT</span> <strong>Four Holds, two Sells — not a single Buy.</strong> Anyone adding to Alphabet or Tesla today as a \"bargain\" is buying ahead of three near-identical events and a Fed meeting. First possible action: <strong>Fri 07/31</strong>.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A pergunta de ontem à noite foi respondida, e a resposta saiu cara. A <strong>Alphabet</strong> superou as expectativas e, mesmo assim, perdeu <strong>7,13%</strong> — porque, no mesmo balanço, a empresa elevou seus investimentos em IA para 2026 para <strong>195–205 bi $</strong>, viu o fluxo de caixa livre virar negativo (<strong>−5,855 bi $</strong>) e as recompras de ações caírem a <strong>zero</strong>. A <strong>Tesla</strong> perdeu <strong>14,52%</strong> depois de uma margem operacional de <strong>1,4%</strong> — com entregas simultaneamente <em>recordes</em>, e, no fundo, pelo mesmo motivo: os próprios investimentos da Tesla saltaram <strong>142% no trimestre, para 5,79 bi $</strong>, e o planejamento anual já está em <strong>mais de 25 bi $</strong>. Juntas, as duas puxaram o <strong>Nasdaq 2,15%</strong> para baixo, e o <strong>S&amp;P 500, 1,21%</strong>. Mas o movimento decisivo está na distribuição: quem foi vendido foram os <em>compradores</em> de capacidade computacional de IA — Amazon <strong>−4,57%</strong>, Meta <strong>−3,36%</strong>, Microsoft <strong>−2,24%</strong> —, enquanto a <em>vendedora</em> Nvidia, com <strong>−1,56%</strong>, saiu quase ilesa. O mercado não cobrou a conta da IA, e sim de quem a paga. E as outras três grandes compradoras apresentam seus próprios números em <strong>seis e sete dias</strong>, na mesma semana da decisão do <strong>FOMC em 29/07</strong>. Por isso, hoje nenhuma recomendação diz \"comprar na baixa\".</p>\n    <ul>\n      <li><span class=\"chip hot\">CAPEX</span> <strong>Alphabet eleva os investimentos de 2026 para 195–205 bi $</strong> (antes 180–190 bi $, expectativa dos analistas de 186,4 bi $) — apesar de superar as expectativas de lucro e receita. Ação a <strong>317,69 $, −7,13%</strong> (fechamento de 23/07). Cerca de <strong>300 bi $</strong> em valor de mercado perdidos em um dia.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>Margem praticamente não se moveu. No acumulado do ano, o quadro segue brutal: <strong>BTC −44,73%, ETH −46,97%</strong>.</li>\n      <li><span class=\"chip\">ETF</span> <strong>Duas semanas seguidas de entradas</strong> (+197,4 mi $ até 10/07, +75,7 mi $ até 17/07) — contra <strong>−4,5 bi $ em junho</strong> e <strong>−5,2 bi $ desde o início do ano</strong>. Direção virou, magnitude ainda irrelevante.</li>\n      <li><span class=\"chip hot\">AGENDA</span> <strong>Qua 29/07: decisão do FOMC às 14h00 EDT / 15h00 BRT — na mesma noite, Microsoft e Meta divulgam resultados; em 30/07, Apple e Amazon.</strong> Mais três anúncios de capex em sete dias, além do banco central numa semana que terminou com o Brent fechando acima de 100 $.</li>\n      <li><span class=\"chip hot\">VEREDITO</span> <strong>Quatro manter, dois vender — nenhum comprar.</strong> Quem comprar hoje Alphabet ou Tesla \"na barganha\" está comprando antes de três eventos idênticos e de uma reunião do banco central. Primeira ação possível: <strong>sex 31/07</strong>.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La pregunta de anoche ya tiene respuesta, y salió cara. <strong>Alphabet</strong> superó sus cifras y aun así perdió <strong>7,13 %</strong> — porque, en el mismo aliento, elevó su inversión en IA para 2026 a <strong>195–205 mil millones $</strong>, su flujo de caja libre se volvió negativo (<strong>−5,855 mil millones $</strong>) y las recompras de acciones cayeron a <strong>cero</strong>. <strong>Tesla</strong> perdió <strong>14,52 %</strong> tras un margen operativo de <strong>1,4 %</strong> — con entregas <em>récord</em> al mismo tiempo, y en el fondo por el mismo motivo: la inversión propia de Tesla saltó en el trimestre <strong>142 % hasta 5,79 mil millones $</strong>, y la meta anual ya está en <strong>más de 25 mil millones $</strong>. Juntas, ambas arrastraron al <strong>Nasdaq 2,15 %</strong> a la baja, al <strong>S&amp;P 500 1,21 %</strong>. Pero el movimiento decisivo está en la distribución: se vendió a los <em>compradores</em> de cómputo para IA — Amazon <strong>−4,57 %</strong>, Meta <strong>−3,36 %</strong>, Microsoft <strong>−2,24 %</strong> —, mientras que el <em>vendedor</em> Nvidia, con <strong>−1,56 %</strong>, salió casi ileso. El mercado no le pasó la cuenta a la IA, sino a quienes la pagan. Y las otras tres grandes compradoras presentan sus propias cifras en <strong>seis y siete días</strong>, en la misma semana que la <strong>decisión del FOMC del 29/07</strong>. Por eso hoy ninguna recomendación dice \"comprar la caída\".</p>\n    <ul>\n      <li><span class=\"chip hot\">CAPEX</span> <strong>Alphabet eleva la inversión de 2026 a 195–205 mil millones $</strong> (antes 180–190 mil millones $, expectativa de analistas 186,4 mil millones $) — pese a superar ganancias e ingresos. Acción <strong>317,69 $, −7,13 %</strong> (cierre 23/07). Cerca de <strong>300 mil millones $</strong> de valor de mercado en un solo día.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>Margen operativo de 1,4 %</strong> (año anterior 4,1 %) con <strong>entregas récord de 480.126</strong> vehículos. Acción <strong>319,69 $, −14,52 %</strong>. Dos motores, no uno: precios más débiles <em>y</em> un impulso propio de inversión en IA — capex <strong>+142 % hasta 5,79 mil millones $</strong>, gastos operativos <strong>+47 % hasta 4,35 mil millones $</strong>.</li>\n      <li><span class=\"chip\">ÍNDICES</span> <strong>Nasdaq 25.137,69 (−2,15 %), S&amp;P 500 7.408,30 (−1,21 %), Dow 51.711,65 (−0,97 %)</strong> — cierre <strong>jue 23/07, 16:00 EDT / 17:00 hora de Brasilia</strong>. El índice tecnológico cayó el doble que el Dow.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Compradores abajo, vendedor estable:</strong> AMZN −4,57 %, META −3,36 %, MSFT −2,24 %, GOOGL −7,13 % — <strong>NVDA solo −1,56 %</strong> (208,76 $). Más capex es ingreso para Nvidia y pérdida de flujo de caja para los gigantes de la nube.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>El Brent cierra en 100,69 $ (+7 %)</strong>, y llegó a tocar <strong>102 $</strong> en el día — por primera vez desde mayo por encima de 100 $, tras ataques hutíes contra dos petroleros sauditas en el mar Rojo. Una fuente de la mañana todavía citaba <strong>94 $</strong>; el peso de la cobertura independiente del mismo día (Washington Post, NBC News, CNBC, Forbes, oilprice.com) respalda el <strong>cierre por encima de 100 $</strong>. WTI <strong>86,50–89 $</strong> durante la jornada.</li>\n      <li><span class=\"chip\">ORO</span> <strong>4.053 $/onza</strong> (23/07, 09:25 EDT), <strong>−1,55 %</strong> frente al día anterior, pero <strong>+18,61 %</strong> frente al año pasado. El oro cae <em>aunque</em> el petróleo salta y las acciones caen — hoy el canal de tasas vence al canal de refugio.</li>\n      <li><span class=\"chip good\">CRIPTO</span> <strong>BTC 65.658 $ (24 h −0,30 %), ETH 1.925 $ (24 h +0,13 %)</strong> — 23/07, 06:30 EDT. Lo notable: en un día con <strong>Nasdaq −2,15 %</strong>, las criptomonedas prácticamente no se movieron. En el año, el panorama sigue siendo brutal: <strong>BTC −44,73 %, ETH −46,97 %</strong>.</li>\n      <li><span class=\"chip\">ETF</span> <strong>Dos semanas consecutivas de entradas</strong> (+197,4 millones $ al 10/07, +75,7 millones $ al 17/07) — frente a <strong>−4,5 mil millones $ en junio</strong> y <strong>−5,2 mil millones $ en lo que va del año</strong>. La dirección cambió, la magnitud sigue siendo insignificante.</li>\n      <li><span class=\"chip hot\">FECHA</span> <strong>Mié 29/07: decisión del FOMC 14:00 EDT / 15:00 hora de Brasilia — esa misma noche reportan Microsoft y Meta, el 30/07 Apple y Amazon.</strong> Tres anuncios más de capex en siete días, más el banco central en una semana que terminó con un cierre del Brent por encima de 100 $.</li>\n      <li><span class=\"chip hot\">VEREDICTO</span> <strong>Cuatro en mantener, dos en vender — ni una sola recomendación de compra.</strong> Quien hoy compre Alphabet o Tesla \"barato\" está comprando antes de tres eventos idénticos y una reunión del banco central. Primera acción posible: <strong>vie 31/07</strong>.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Rekord-Patchtage in sieben Tagen: Microsoft am 14.07., Oracle am 21.07. — beide die größten, die es je gab. Das eigentlich Interessante daran ist nicht die Menge, sondern dass die Branche sich bei Microsoft nicht mal auf eine Zahl einigen kann: je nach Zählweise 569 oder 622 CVEs, und Microsofts eigene Übersichtsseite ist eine JavaScript-Hülle, aus der man keine belastbare Zahl herausbekommt. Dazwischen brennt on-prem SharePoint zum wiederholten Mal, diesmal mit einer Behördenfrist am Samstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SharePoint on-prem</strong>: CVE-2026-50522 (Deserialisierungs-RCE, CVSS 9,8) steht seit 22.07. in CISAs KEV-Katalog, Behörden-Frist <strong>25.07.</strong> Öffentlicher PoC seit 20.07., Ausnutzung binnen Stunden — inklusive Diebstahl der Machine Keys. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft-Patchday 14.07.</strong>: größter aller Zeiten — aber die Zahl ist strittig. Tenable/Krebs zählen 569–570 CVEs, Malwarebytes 622. Einig sind alle bei drei Zero-Days, zwei davon aktiv ausgenutzt. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Oracle Juli-CPU</strong> (21.07.): 1.449 neue Patches über 32 Produktfamilien, größtes CPU der Firmengeschichte. Fusion Middleware allein 355 Fixes, davon zehn mit CVSS 10,0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">OSS</span> <strong>npm-Lieferkette</strong>: Bei AsyncAPI wurde kein Token gestohlen — die CI selbst wurde gekapert (<code>pull_request_target</code>-Missbrauch). Fünf Versionen, vier Pakete, 90 Minuten. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>MDASH</strong>: Microsofts Agenten-Schwarm zur Lückensuche erreicht 88,45 % auf CyberGym — und Microsoft selbst verknüpft ihn öffentlich mit der steigenden Patch-Menge. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Browser</span> <strong>Firefox &amp; Chrome</strong>: Mozilla schließt zwei kritische Lücken mit bereits öffentlichem Exploit-Code (keine Angriffe bekannt), Chrome zwei kritische Use-after-free in Ozone. <span class=\"chip\">Web</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Enterprise-Patchday</strong>: SAP 16 CVEs, Citrix NetScaler ADC/Gateway sechs, Samsungs Juli-Bulletin fünf kritische und 42 hohe. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Frontend-Kadenz</strong>: Angular 22.0.8 (22.07.), React 19.2.8 / 19.1.9 / 19.0.8 (21.07.) — Wartungs-Releases, nichts Bahnbrechendes. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulierung</span> <strong>Cyber Resilience Act</strong>: Die Meldepflicht für ausgenutzte Lücken startet am 11.09.2026 — in 50 Tagen. Kommissions-FAQ seit 02.07. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Brasilien</strong>: Microsoft-365-Preise seit 01.07. oben, alphanumerische CNPJ zwingt Systeme zur Anpassung, Datensouveränität als Leitthema. <span class=\"chip\">BR</span></li>\n    </ul></div>",
