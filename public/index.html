emini 3 Pro 91,7 % / Qwen3.7 Max 91,6 % / DeepSeek-V4-Pro-Max 93,5 %). Aider-Board 8 Monate alt — echte Fragmentierung.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>JetBrains AI für Teams/Orgs (07.07.)</strong>: herstelleragnostische Governance-Schicht (MCP + ACP), JetBrains Central, Lizenzen → on-demand-Credits.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7 (08.07.)</strong>, 1000 Token/s via Cerebras. Und: Claude Sonnet 5 ist jetzt Default in Devin UND Claude Code (~30 % weniger Quota).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Copilot Desktop-App + CLI v1.0.69</strong>; Cursor Automations/Bugbot 3× schneller; Plandex dormant (v2.2.1 seit 07/2025), OpenHands ohne Juli-Release.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Within three days, three flagship coding models shipped: Grok 4.5 (07/08), GPT-5.6's full rollout (07/09), and Meta's Muse Spark 1.1 (07/09). The instinct is to rank them — except the ranking itself is broken. The most important independent coding board, SWE-Bench Verified, is considered contaminated by OpenAI's own admission; LiveCodeBench shows three different \"#1\"s across three trackers today; Aider's board is eight months old. So this brief doesn't sort by score — it sorts by what's actually new, and flags who measured each number.</p>\n    <ul>\n      <li><span class=\"chip hot\">xAI</span> <strong>Grok 4.5 public since 07/08</strong>: $2/$6 per million tokens (3–4x cheaper than Opus 4.8), AA Index 54, #1 in agentic tool use. Coding numbers vendor-reported, benchmarked against GPT-5.5 rather than 5.6.</li>\n      <li><span class=\"chip hot\">Meta</span> <strong>Muse Spark 1.1 (07/09)</strong>: 1M-token context, computer use, multi-agent, $1.25/$4.25 per million tokens. So far a capability announcement — no independent coding benchmark yet.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 numbers are in</strong>: AA Intelligence Index Sol 59 / Terra 55 / Luna 51; Coding Agent Index Sol 80 (leads). Not yet listed on SWE-Bench Verified at all.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>OpenAI itself declared SWE-Bench Verified broken</strong> (02/23): ~59% of failed tests were flawed. On the contamination-resistant Pro, current top models drop sharply — Opus 4.8 88.6%→69.2%, GPT-5.5 82.6%→58.6%. Now recommends Pro.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Model ranking (AA Index v4.1)</strong>: among available models Opus 4.8 (56) &gt; GPT-5.5 (55) &gt; Grok 4.5 (54); Fable 5 (60) tops the chart but is \"unavailable.\"</li>\n      <li><span class=\"chip\">Bench</span> <strong>LiveCodeBench: three trackers, three #1s</strong> (Gemini 3 Pro 91.7% / Qwen3.7 Max 91.6% / DeepSeek-V4-Pro-Max 93.5%). Aider board 8 months old — genuine fragmentation.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>JetBrains AI for Teams/Orgs (07/07)</strong>: vendor-agnostic governance layer (MCP + ACP), JetBrains Central, licenses → on-demand credits.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7 (07/08)</strong>, 1000 tokens/s via Cerebras. And: Claude Sonnet 5 is now default in both Devin AND Claude Code (~30% less quota).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Copilot desktop app + CLI v1.0.69</strong>; Cursor Automations/Bugbot 3x faster; Plandex dormant (v2.2.1 since 07/2025), OpenHands with no July release.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Em três dias, surgiram três modelos de coding de ponta: Grok 4.5 (08/07), o rollout completo do GPT-5.6 (09/07) e o Muse Spark 1.1 da Meta (09/07). O reflexo seria colocá-los em um ranking — só que o próprio ranking está quebrado. O principal board independente de coding, o SWE-Bench Verified, é considerado contaminado pela própria OpenAI; o LiveCodeBench mostra hoje três \"#1\" diferentes em três trackers; o board da Aider tem oito meses. Por isso este brief não ordena por score, mas pelo que realmente é novo — e marca, em cada número, quem mediu.</p>\n    <ul>\n      <li><span class=\"chip hot\">xAI</span> <strong>Grok 4.5 público desde 08/07</strong>: US$ 2/US$ 6 por milhão de tokens (3–4× mais barato que o Opus 4.8), AA Index 54, #1 em uso agentic de ferramentas. Números de coding reportados pelo fornecedor, comparados ao GPT-5.5 e não ao 5.6.</li>\n      <li><span class=\"chip hot\">Meta</span> <strong>Muse Spark 1.1 (09/07)</strong>: contexto de 1M de tokens, computer-use, multiagente, US$ 1,25/US$ 4,25 por milhão de tokens. Até agora, um anúncio de capacidade — sem benchmark de coding independente.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Números do GPT-5.6 chegaram</strong>: AA Intelligence Index Sol 59 / Terra 55 / Luna 51; Coding Agent Index Sol 80 (lidera). Ainda não listado no SWE-Bench Verified.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>A própria OpenAI declarou o SWE-Bench Verified quebrado</strong> (23/02): ~59% dos testes reprovados eram falhos. No Pro, resistente a contaminação, os modelos de ponta atuais caem bastante — Opus 4.8 88,6%→69,2%, GPT-5.5 82,6%→58,6%. Agora recomenda o Pro.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Ranking de modelos (AA Index v4.1)</strong>: entre os modelos disponíveis, Opus 4.8 (56) &gt; GPT-5.5 (55) &gt; Grok 4.5 (54); Fable 5 (60) no topo, mas \"indisponível\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>LiveCodeBench: três trackers, três #1</strong> (Gemini 3 Pro 91,7% / Qwen3.7 Max 91,6% / DeepSeek-V4-Pro-Max 93,5%). Board da Aider com 8 meses — fragmentação real.</li>\n      <li><span class=\"chip good\">Ferramenta</span> <strong>JetBrains AI para Times/Organizações (07/07)</strong>: camada de governança agnóstica de fornecedor (MCP + ACP), JetBrains Central, licenças → créditos sob demanda.</li>\n      <li><span class=\"chip\">Ferramenta</span> <strong>Devin SWE-1.7 (08/07)</strong>, 1000 tokens/s via Cerebras. E: o Claude Sonnet 5 agora é o padrão no Devin E no Claude Code (~30% menos consumo de cota).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>App desktop do Copilot + CLI v1.0.69</strong>; Cursor Automations/Bugbot 3× mais rápido; Plandex dormente (v2.2.1 desde 07/2025), OpenHands sem lançamento em julho.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">En tres días aparecieron tres modelos insignia de coding: Grok 4.5 (08/07), el rollout completo de GPT-5.6 (09/07) y Muse Spark 1.1 de Meta (09/07). El reflejo sería ordenarlos en un ranking — solo que ese ranking está roto. El principal board independiente de coding, SWE-Bench Verified, es considerado contaminado según la propia OpenAI; LiveCodeBench muestra hoy tres \"#1\" distintos en tres trackers; el board de Aider tiene ocho meses. Por eso este brief no ordena por puntaje, sino por lo que realmente es nuevo — y marca, en cada cifra, quién la midió.</p>\n    <ul>\n      <li><span class=\"chip hot\">xAI</span> <strong>Grok 4.5 público desde el 08/07</strong>: 2 $/6 $ por millón de tokens (3–4× más barato que Opus 4.8), AA Index 54, #1 en uso agentic de herramientas. Cifras de coding reportadas por el proveedor, comparadas contra GPT-5.5 y no contra 5.6.</li>\n      <li><span class=\"chip hot\">Meta</span> <strong>Muse Spark 1.1 (09/07)</strong>: contexto de 1M de tokens, computer-use, multiagente, 1,25 $/4,25 $ por millón de tokens. Hasta ahora es un anuncio de capacidad — sin benchmark de coding independiente.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Ya llegaron las cifras de GPT-5.6</strong>: AA Intelligence Index Sol 59 / Terra 55 / Luna 51; Coding Agent Index Sol 80 (lidera). Todavía no aparece en SWE-Bench Verified.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>La propia OpenAI declaró roto a SWE-Bench Verified</strong> (23/02): ~59 % de las pruebas fallidas tenían errores. En el Pro, resistente a la contaminación, los modelos de punta actuales caen fuerte — Opus 4.8 88,6 %→69,2 %, GPT-5.5 82,6 %→58,6 %. Ahora recomienda Pro.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Ranking de modelos (AA Index v4.1)</strong>: entre los modelos disponibles, Opus 4.8 (56) &gt; GPT-5.5 (55) &gt; Grok 4.5 (54); Fable 5 (60) va a la cabeza, pero está \"no disponible\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>LiveCodeBench: tres trackers, tres #1</strong> (Gemini 3 Pro 91,7 % / Qwen3.7 Max 91,6 % / DeepSeek-V4-Pro-Max 93,5 %). Board de Aider con 8 meses — fragmentación real.</li>\n      <li><span class=\"chip good\">Herramienta</span> <strong>JetBrains AI para equipos/organizaciones (07/07)</strong>: capa de gobernanza agnóstica de proveedor (MCP + ACP), JetBrains Central, licencias → créditos bajo demanda.</li>\n      <li><span class=\"chip\">Herramienta</span> <strong>Devin SWE-1.7 (08/07)</strong>, 1000 tokens/s vía Cerebras. Y: Claude Sonnet 5 ahora es el modelo por defecto tanto en Devin COMO en Claude Code (~30 % menos consumo de cuota).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>App de escritorio de Copilot + CLI v1.0.69</strong>; Cursor Automations/Bugbot 3× más rápido; Plandex dormido (v2.2.1 desde 07/2025), OpenHands sin lanzamiento en julio.</li>\n    </ul></div>"

g.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: GenAI erreicht 53 % Bevölkerungs-Adoption in 3 Jahren; US-Konsumwert 172 Mrd. $/Jahr.</li>\n      <li><span class=\"chip\">POLICY · EU/US</span> <strong>Zugangsregeln ziehen an</strong>: Microsoft sperrt Claude Fable 5 (Retention-Politik); AI Act — alle Hochrisiko-Uses inkl. Beschäftigung einheitlich auf 02.12.2027 verschoben.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Souveräner KI-Kollege</strong>: beide Großen sind US-Cloud-only. Der Agenten-Markt liegt bei 9,89 Mrd. $ (2026) — die On-Prem-Lücke fürs KMU bedient keiner.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Innerhalb einer Woche haben die zwei größten Labore denselben Zug gemacht: Sie verkaufen nicht mehr ein Modell, sondern einen KI-Kollegen — einen Agenten, der ganze Wissensarbeit übernimmt, nicht nur Code schreibt. Anthropic brachte Claude Cowork am 7. Juli auf Handy und Browser, OpenAI konterte am 9. Juli mit ChatGPT Work. Der eigentliche Beweis, dass hier angewandte KI läuft und keine Entwickler-Spielerei, liefert ausgerechnet Anthropic selbst: In 1,2 Millionen ausgewerteten Cowork-Sitzungen ist Programmieren mit 8,7 % ein Randthema — ein Drittel ist stumpfe Geschäftsprozess-Arbeit. Darunter ein Compute-Fundament von über 700 Milliarden Dollar. Dagegen die nüchterne Bilanz: Nur rund ein Drittel der Firmen skaliert KI überhaupt, unter 6 % sehen sie im Gewinn. Und beide Kollegen wohnen in der US-Cloud — die souveräne Lücke fürs KMU steht offen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>ChatGPT Work</strong>: OpenAI startet am 09.07 einen agentischen Arbeitsplatz-Assistenten auf GPT-5.6 — zuerst Pro/Enterprise/Edu, dann Plus/Business.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Claude Cowork</strong>: Anthropic bringt Cowork am 07.07 auf Mobile + Web (Beta, Max zuerst); der Agent arbeitet weiter, wenn der Laptop zu ist.</li>\n      <li><span class=\"chip good\">STUDY · Global</span> <strong>„Arbeit um die Arbeit\"</strong>: Cowork-Nutzungsdaten — 33,4 % Geschäftsprozesse, nur 8,7 % Softwareentwicklung (1,2 Mio. Sessions). Angewandt, nicht Dev.</li>\n      <li><span class=\"chip\">Wirtschaft · US</span> <strong>Capex-Welle</strong>: Hyperscaler planen 2026 rund 700–725 Mrd. $ — plus ca. 77 % gegenüber Vorjahr. Das Fundament unter beiden Launches.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Ehrliche Bilanz</strong>: nur ~1/3 der Firmen skaliert KI unternehmensweit, &lt;6 % mit spürbarem EBIT-Effekt (McKinsey) — sekundär, Methodik-Flag.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: GenAI erreicht 53 % Bevölkerungs-Adoption in 3 Jahren; US-Konsumwert 172 Mrd. $/Jahr.</li>\n      <li><span class=\"chip\">POLICY · EU/US</span> <strong>Zugangsregeln ziehen an</strong>: Microsoft sperrt Claude Fable 5 (Retention-Politik); AI Act — alle Hochrisiko-Uses inkl. Beschäftigung einheitlich auf 02.12.2027 verschoben.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Souveräner KI-Kollege</strong>: beide Großen sind US-Cloud-only. Der Agenten-Markt liegt bei 9,89 Mrd. $ (2026) — die On-Prem-Lücke fürs KMU bedient keiner.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Within a single week, the two biggest labs made the same move: they're no longer selling a model, but an AI colleague — an agent that takes on whole swaths of knowledge work, not just writing code. Anthropic brought Claude Cowork to phone and browser on July 7; OpenAI countered on July 9 with ChatGPT Work. The real proof that this is applied AI at work, not a developer toy, comes from Anthropic itself: across 1.2 million analyzed Cowork sessions, coding is a niche topic at 8.7% — a third is plain business-process work. Underneath it all sits a compute foundation of more than $700 billion. Against that, the sober scorecard: only about a third of companies scale AI at all, and fewer than 6% see it hit profit. And both colleagues live in the US cloud — the sovereign gap for SMEs stands wide open.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>ChatGPT Work</strong>: OpenAI launches an agentic workplace assistant on GPT-5.6 on 07/09 — first Pro/Enterprise/Edu, then Plus/Business.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Claude Cowork</strong>: Anthropic brings Cowork to mobile + web on 07/07 (beta, Max first); the agent keeps working even when the laptop is closed.</li>\n      <li><span class=\"chip good\">STUDY · Global</span> <strong>\"The work around the work\"</strong>: Cowork usage data — 33.4% business processes, only 8.7% software development (1.2 million sessions). Applied, not dev.</li>\n      <li><span class=\"chip\">Economy · US</span> <strong>Capex wave</strong>: Hyperscalers plan roughly $700–725 billion in 2026 — up about 77% year over year. The foundation under both launches.</li>\n      <li><span class=\"chip\">Heads up</span> <strong>Honest scorecard</strong>: only ~1/3 of companies scale AI company-wide, &lt;6% with a noticeable EBIT effect (McKinsey) — secondary source, methodology flag.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: GenAI reaches 53% population adoption in 3 years; US consumer value $172 billion/year.</li>\n      <li><span class=\"chip\">POLICY · EU/US</span> <strong>Access rules tighten</strong>: Microsoft blocks Claude Fable 5 (retention policy); AI Act — all high-risk uses incl. employment uniformly deferred to 12/02/2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Sovereign AI colleague</strong>: both giants are US-cloud-only. The agent market sits at $9.89 billion (2026) — nobody serves the on-prem gap for SMEs.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Em uma única semana, os dois maiores laboratórios fizeram exatamente o mesmo movimento: pararam de vender um modelo e passaram a vender um colega de IA — um agente que assume trabalhos inteiros de conhecimento, não só escreve código. A Anthropic levou o Claude Cowork para celular e navegador em 7 de julho, e a OpenAI revidou em 9 de julho com o ChatGPT Work. A melhor prova de que aqui é IA aplicada de verdade, e não brincadeira de desenvolvedor, vem justamente da própria Anthropic: em 1,2 milhão de sessões do Cowork analisadas, programação é um tema marginal, com 8,7% — um terço é trabalho pesado de processo de negócio. Por trás de tudo isso, um alicerce de computação de mais de 700 bilhões de dólares. Do outro lado, o balanço sóbrio: apenas cerca de um terço das empresas sequer escala a IA, e menos de 6% veem isso no lucro. E os dois colegas moram na nuvem dos EUA — a lacuna soberana para as PMEs continua aberta.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>ChatGPT Work</strong>: a OpenAI lança em 09/07 um assistente agentivo de local de trabalho baseado no GPT-5.6 — primeiro Pro/Enterprise/Edu, depois Plus/Business.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Claude Cowork</strong>: a Anthropic leva o Cowork para mobile + web em 07/07 (beta, primeiro para Max); o agente continua trabalhando mesmo com o notebook fechado.</li>\n      <li><span class=\"chip good\">STUDY · Global</span> <strong>\"O trabalho em torno do trabalho\"</strong>: dados de uso do Cowork — 33,4% processos de negócio, apenas 8,7% desenvolvimento de software (1,2 milhão de sessões). Aplicado, não dev.</li>\n      <li><span class=\"chip\">Economia · US</span> <strong>Onda de capex</strong>: as hyperscalers planejam cerca de US$ 700–725 bi em 2026 — alta de cerca de 77% frente ao ano anterior. O alicerce sob os dois lançamentos.</li>\n      <li><span class=\"chip\">Atenção</span> <strong>Balanço honesto</strong>: apenas ~1/3 das empresas escala IA em toda a organização, &lt;6% com efeito perceptível no EBIT (McKinsey) — fonte secundária, alerta metodológico.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: a IA generativa atinge 53% de adoção populacional em 3 anos; valor de consumo nos EUA de US$ 172 bi/ano.</li>\n      <li><span class=\"chip\">POLICY · EU/US</span> <strong>Regras de acesso apertam</strong>: a Microsoft bloqueia o Claude Fable 5 (política de retenção); AI Act — todos os usos de alto risco, incl. emprego, adiados uniformemente para 02/12/2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Colega de IA soberano</strong>: os dois gigantes são exclusivamente nuvem dos EUA. O mercado de agentes está em US$ 9,89 bi (2026) — ninguém atende à lacuna on-prem para PMEs.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">En una sola semana, los dos laboratorios más grandes hicieron exactamente el mismo movimiento: dejaron de vender un modelo y empezaron a vender un colega de IA — un agente que se hace cargo de trabajo de conocimiento completo, no solo de escribir código. Anthropic llevó Claude Cowork a celular y navegador el 7 de julio, y OpenAI contraatacó el 9 de julio con ChatGPT Work. La mejor prueba de que aquí hay IA aplicada de verdad, y no un juguete de desarrolladores, viene justamente de la propia Anthropic: en 1,2 millones de sesiones de Cowork analizadas, la programación es un tema marginal, con 8,7 % — un tercio es trabajo puro de proceso de negocio. Detrás de todo esto, un cimiento de cómputo de más de 700 mil millones de dólares. Del otro lado, el balance sobrio: solo cerca de un tercio de las empresas siquiera escala la IA, y menos del 6 % la ve reflejada en las ganancias. Y ambos colegas viven en la nube de EE. UU. — la brecha soberana para las pymes sigue abierta.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>ChatGPT Work</strong>: OpenAI lanza el 09/07 un asistente agéntico de lugar de trabajo basado en GPT-5.6 — primero Pro/Enterprise/Edu, luego Plus/Business.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Claude Cowork</strong>: Anthropic lleva Cowork a celular + web el 07/07 (beta, primero para Max); el agente sigue trabajando aunque la laptop esté cerrada.</li>\n      <li><span class=\"chip good\">STUDY · Global</span> <strong>\"El trabajo alrededor del trabajo\"</strong>: datos de uso de Cowork — 33,4 % procesos de negocio, solo 8,7 % desarrollo de software (1,2 millones de sesiones). Aplicado, no dev.</li>\n      <li><span class=\"chip\">Economía · US</span> <strong>Ola de capex</strong>: los hyperscalers planean unos US$700–725 mil millones en 2026 — un alza de cerca de 77 % frente al año anterior. El cimiento bajo ambos lanzamientos.</li>\n      <li><span class=\"chip\">Atención</span> <strong>Balance honesto</strong>: solo ~1/3 de las empresas escala la IA en toda la organización, &lt;6 % con un efecto perceptible en el EBIT (McKinsey) — fuente secundaria, alerta metodológica.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: la IA generativa alcanza el 53 % de adopción poblacional en 3 años; valor de consumo en EE. UU. de US$172 mil millones al año.</li>\n      <li><span class=\"chip\">POLICY · EU/US</span> <strong>Las reglas de acceso se endurecen</strong>: Microsoft bloquea Claude Fable 5 (política de retención); Ley de IA — todos los usos de alto riesgo, incl. empleo, se posponen de manera uniforme al 02/12/2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Colega de IA soberano</strong>: ambos gigantes son exclusivamente nube de EE. UU. El mercado de agentes está en US$9,89 mil millones (2026) — nadie atiende la brecha on-premise para las pymes.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zum ersten Mal seit Beginn der Erhebung fällt der durchschnittliche DACH-Freelancer-Stundensatz — von <strong>104 € auf 103 €</strong>, das monatliche Durchschnittseinkommen sogar um <strong>rund 21 %</strong> (6.653 € statt 8.432 €), so der Freelancer-Kompass 2026 von freelancermap. Daniels eigenes Board bestätigt das Bild von der Preisseite: die <strong>36 Freelance-Listings</strong> — dominiert vom Java/Spring/Angular-Kern — liegen recherchiert bei <strong>85–130 €/h</strong>, also <em>im</em> Band, nicht darüber. Die Menge stimmt (49 Listings, Ø Fit 73,5, Drei-Wege-Spitze bei 88), der Aufschlag fehlt. Gegenläufig auf der Angestellten-Seite: der Schweizer Agentic-AI-Cluster (ELCA, AXA, Camunda) zahlt <em>über</em> dem Zürcher Senior-Median von CHF 115k. Auf der Ausschreibungsseite drei heute frisch aus dem eForm-Volltext geprüfte TED-Kandidaten — mit echten Zitaten statt der WAF-Sperre der Vortage.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>Erste Satz-Senkung überhaupt</strong>: Freelancer-Kompass 2026 nennt <strong>103 €/h</strong> DACH-Schnitt (Vorjahr 104 €) und ein Monatseinkommen −21 % — erhoben 17.11.2025–08.02.2026, Basis 5.412 Selbstständige.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Cluster im Band, nicht drüber</strong>: 36 Freelance-Listings, Java/Spring/Angular bei 85–130 €/h* — Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil Business Solutions), alle 80–100 % remote.</li>\n      <li><span class=\"chip good\">CH</span> <strong>Agentic-AI zahlt über Median</strong>: ELCA (CHF 140–190 k*) und AXA (CHF 130–170 k*) liegen klar über dem Zürcher Senior-Median CHF 115k — hier ist der Aufschlag real, im Freelance-Kern nicht.</li>\n      <li><span class=\"chip\">TED</span> <strong>Drei eForm-geprüfte Kandidaten</strong>: Münsterland (KI/Graph-DB, 04.08., ✅ mit Vorbehalt), Land BW Verkehr (500k-Umsatz-Gate, 23.07., ⚠️ Partner), Berlin PV-Monitoring (Solar-Referenz, ~28.07. laut Aggregator, ⚠️ Partner).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Nische bleibt Premium</strong>: EnCo Hamburg (Fit 87, autonomes Fahren) und HENNING Ingolstadt (Fit 86, Audi-Umfeld) bei 100–135 €/h* — die einzigen Listings sichtbar über dem Standard-Band.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Harness-Baustelle im Board</strong>: JetBrains (Fit 82 + 58), Camunda-Agentic (Fit 73) und Cognition/Devin (Fit 32, nur SF-onsite).</li>\n      <li><span class=\"chip\">Daten</span> <strong>Frische nicht behauptbar</strong>: 44 der 49 Listings tragen kein Posting-Datum (systemisch freelancermap, kein Bug); die Tempton-Notiz zeigt ein 5 Monate altes Datum (19.02.) trotz heutigem Scrape — als Vorsicht markiert.</li>\n      <li><span class=\"chip\">Kontext</span> <strong>Breite Abkühlung</strong>: VW (bis zu 100.000 Stellen im Gespräch) und Porsche (bis zu 4.000 zusätzlich, Zukunftspaket bis Ende Juli) — die Mood-Kulisse hinter der Satz-Senkung, aggregierte Berichte, keine harte Einzelzahl.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {

 ~28.07. laut Aggregator, ⚠️ Partner).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Nische bleibt Premium</strong>: EnCo Hamburg (Fit 87, autonomes Fahren) und HENNING Ingolstadt (Fit 86, Audi-Umfeld) bei 100–135 €/h* — die einzigen Listings sichtbar über dem Standard-Band.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Harness-Baustelle im Board</strong>: JetBrains (Fit 82 + 58), Camunda-Agentic (Fit 73) und Cognition/Devin (Fit 32, nur SF-onsite).</li>\n      <li><span class=\"chip\">Daten</span> <strong>Frische nicht behauptbar</strong>: 44 der 49 Listings tragen kein Posting-Datum (systemisch freelancermap, kein Bug); die Tempton-Notiz zeigt ein 5 Monate altes Datum (19.02.) trotz heutigem Scrape — als Vorsicht markiert.</li>\n      <li><span class=\"chip\">Kontext</span> <strong>Breite Abkühlung</strong>: VW (bis zu 100.000 Stellen im Gespräch) und Porsche (bis zu 4.000 zusätzlich, Zukunftspaket bis Ende Juli) — die Mood-Kulisse hinter der Satz-Senkung, aggregierte Berichte, keine harte Einzelzahl.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">For the first time since the survey began, the average DACH freelance hourly rate is falling — from <strong>€104 to €103</strong>, with average monthly income down by <strong>roughly 21%</strong> (€6,653 instead of €8,432), according to freelancermap's Freelancer Compass 2026. Daniel's own board confirms the picture from the pricing side: the <strong>36 freelance listings</strong> — dominated by the Java/Spring/Angular core — come in, researched, at <strong>€85–130/h</strong>, that is <em>within</em> the band, not above it. The volume checks out (49 listings, avg. fit 73.5, a three-way tie at the top at 88), but the markup is missing. The counterpoint is on the employee side: the Swiss agentic-AI cluster (ELCA, AXA, Camunda) pays <em>above</em> the Zurich senior median of CHF 115k. On the tender side, three TED candidates freshly checked today straight from the eForm full text — with real eligibility quotes instead of the WAF block of the past few days.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>First-ever rate decline</strong>: Freelancer Compass 2026 puts the DACH average at <strong>€103/h</strong> (prior year €104) and monthly income down 21% — surveyed 11/17/2025–02/08/2026, base of 5,412 self-employed.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Cluster within the band, not above it</strong>: 36 freelance listings, Java/Spring/Angular at €85–130/h* — three-way tie at fit 88 (iSAX, BridgingIT, Keil Business Solutions), all 80–100% remote.</li>\n      <li><span class=\"chip good\">CH</span> <strong>Agentic AI pays above the median</strong>: ELCA (CHF 140–190k*) and AXA (CHF 130–170k*) sit clearly above the Zurich senior median of CHF 115k — here the markup is real; in the freelance core, it isn't.</li>\n      <li><span class=\"chip\">TED</span> <strong>Three eForm-checked candidates</strong>: Münsterland (AI/graph DB, 08/04, ✅ with caveat), Baden-Württemberg transport (€500k revenue gate, 07/23, ⚠️ partner), Berlin PV monitoring (solar reference, ~07/28 per aggregator, ⚠️ partner).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Niche stays premium</strong>: EnCo Hamburg (fit 87, autonomous driving) and HENNING Ingolstadt (fit 86, Audi environment) at €100–135/h* — the only listings visibly above the standard band.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>AI-harness corner of the board</strong>: JetBrains (fit 82 + 58), Camunda Agentic (fit 73), and Cognition/Devin (fit 32, SF-onsite only).</li>\n      <li><span class=\"chip\">Data</span> <strong>Freshness can't be claimed</strong>: 44 of the 49 listings carry no posting date (systemic to freelancermap, not a bug); the Tempton listing shows a 5-month-old date (02/19) despite today's scrape — flagged as a caveat.</li>\n      <li><span class=\"chip\">Context</span> <strong>Broad cooldown</strong>: VW (up to 100,000 positions under discussion) and Porsche (up to 4,000 additional, future package due by end of July) — the mood backdrop behind the rate decline, aggregated reports, no confirmed single figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Pela primeira vez desde o início do levantamento, a taxa horária média dos freelancers na região DACH cai — de <strong>104 € para 103 €</strong>, e a renda mensal média chega a cair cerca de <strong>21%</strong> (6.653 € em vez de 8.432 €), segundo o Freelancer-Kompass 2026 da freelancermap. O próprio board de Daniel confirma esse quadro pelo lado dos preços: as <strong>36 vagas freelance</strong> — dominadas pelo núcleo Java/Spring/Angular — ficam, segundo pesquisa, em <strong>85–130 €/h</strong>, ou seja, <em>dentro</em> da faixa, não acima dela. O volume está certo (49 vagas, Fit médio 73,5, empate triplo no topo com 88), mas falta o prêmio. Na contramão, do lado CLT: o cluster suíço de IA agêntica (ELCA, AXA, Camunda) paga <em>acima</em> da mediana sênior de Zurique, CHF 115 mil. No lado das licitações, três candidatos do TED verificados hoje a partir do texto completo do eForm — com citações reais, em vez do bloqueio WAF dos dias anteriores.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Primeira queda de taxa da história</strong>: o Freelancer-Kompass 2026 aponta média DACH de <strong>103 €/h</strong> (ano anterior, 104 €) e renda mensal −21% — levantamento de 17/11/2025 a 08/02/2026, base de 5.412 autônomos.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Cluster dentro da faixa, não acima</strong>: 36 vagas freelance, Java/Spring/Angular a 85–130 €/h* — empate triplo no topo com Fit 88 (iSAX, BridgingIT, Keil Business Solutions), todas 80–100% remoto.</li>\n      <li><span class=\"chip good\">CH</span> <strong>IA agêntica paga acima da mediana</strong>: ELCA (CHF 140–190 mil*) e AXA (CHF 130–170 mil*) ficam claramente acima da mediana sênior de Zurique, CHF 115 mil — aqui o prêmio é real; no núcleo freelance, não.</li>\n      <li><span class=\"chip\">TED</span> <strong>Três candidatos verificados pelo eForm</strong>: Münsterland (IA/banco de dados em grafo, 04/08, ✅ com ressalva), Land BW Trânsito (gate de faturamento de 500 mil, 23/07, ⚠️ Parceiro), Berlim monitoramento fotovoltaico (referência solar, ~28/07 segundo agregador, ⚠️ Parceiro).</li>\n      <li><span class=\"chip\">Automotivo</span> <strong>Nicho continua premium</strong>: EnCo Hamburgo (Fit 87, condução autônoma) e HENNING Ingolstadt (Fit 86, ambiente Audi) a 100–135 €/h* — as únicas vagas visivelmente acima da faixa padrão.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Canteiro de obras de harness no board</strong>: JetBrains (Fit 82 + 58), Camunda Agentic (Fit 73) e Cognition/Devin (Fit 32, só presencial em SF).</li>\n      <li><span class=\"chip\">Dados</span> <strong>Atualidade não é comprovável</strong>: 44 das 49 vagas não têm data de publicação (algo sistêmico do freelancermap, não um bug); o registro da Tempton traz uma data de 5 meses atrás (19/02) apesar da coleta de hoje — marcado como ressalva.</li>\n      <li><span class=\"chip\">Contexto</span> <strong>Desaceleração ampla</strong>: VW (até 100.000 vagas em discussão) e Porsche (até 4.000 adicionais, pacote de futuro até o fim de julho) — o pano de fundo por trás da queda da taxa, reportagens agregadas, sem número único confirmado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Por primera vez desde que comenzó el relevamiento, la tarifa promedio por hora de los freelancers en la región DACH cae — de <strong>104 € a 103 €</strong>, y el ingreso mensual promedio incluso alrededor de <strong>21 %</strong> (6.653 € en lugar de 8.432 €), según el Freelancer-Kompass 2026 de freelancermap. El propio tablero de Daniel confirma esta imagen desde el lado de los precios: los <strong>36 listados freelance</strong> — dominados por el núcleo Java/Spring/Angular — se ubican, según la investigación, en <strong>85–130 €/h</strong>, es decir, <em>dentro</em> de la banda, no por encima. La cantidad es correcta (49 listados, fit promedio 73,5, triple empate en la cima con 88), pero falta el sobreprecio. En sentido contrario, del lado de los empleados: el clúster suizo de IA agéntica (ELCA, AXA, Camunda) paga <em>por encima</em> de la mediana sénior de Zúrich, CHF 115k. Del lado de las licitaciones, hoy hay tres candidatos de TED recién verificados a partir del texto completo del eForm — con citas reales en lugar del bloqueo WAF de los días anteriores.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Primera baja de tarifa en la historia</strong>: el Freelancer-Kompass 2026 cifra el promedio DACH en <strong>103 €/h</strong> (año anterior 104 €) y un ingreso mensual −21 % — relevado del 17/11/2025 al 08/02/2026, base de 5.412 independientes.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Clúster dentro de la banda, no por encima</strong>: 36 listados freelance, Java/Spring/Angular a 85–130 €/h* — triple empate en la cima con fit 88 (iSAX, BridgingIT, Keil Business Solutions), todos 80–100 % remoto.</li>\n      <li><span class=\"chip good\">CH</span> <strong>La IA agéntica paga por encima de la mediana</strong>: ELCA (CHF 140–190 k*) y AXA (CHF 130–170 k*) se ubican claramente por encima de la mediana sénior de Zúrich, CHF 115k — aquí el sobreprecio es real, en el núcleo freelance no.</li>\n      <li><span class=\"chip\">TED</span> <strong>Tres candidatos verificados por eForm</strong>: Münsterland (IA/base de datos de grafos, 04/08, ✅ con salvedad), estado de BW, Transporte (umbral de facturación 500k, 23/07, ⚠️ socio), Berlín monitoreo fotovoltaico (referencia solar, ~28/07 según agregador, ⚠️ socio).</li>\n      <li><span class=\"chip\">Auto</span> <strong>El nicho sigue siendo premium</strong>: EnCo Hamburgo (fit 87, conducción autónoma) y HENNING Ingolstadt (fit 86, entorno Audi) a 100–135 €/h* — los únicos listados visiblemente por encima de la banda estándar.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Obra en construcción de \"harness\" en el tablero</strong>: JetBrains (fit 82 + 58), Camunda-Agentic (fit 73) y Cognition/Devin (fit 32, solo presencial en SF).</li>\n      <li><span class=\"chip\">Datos</span> <strong>No se puede afirmar frescura</strong>: 44 de los 49 listados no llevan fecha de publicación (algo sistémico de freelancermap, no un error); el aviso de Tempton muestra una fecha de 5 meses de antigüedad (19/02) pese al scrape de hoy — marcado como precaución.</li>\n      <li><span class=\"chip\">Contexto</span> <strong>Enfriamiento generalizado</strong>: VW (hasta 100.000 puestos en discusión) y Porsche (hasta 4.000 adicionales, paquete de futuro para fines de julio) — el telón de fondo anímico detrás de la baja de tarifa, informes agregados, sin una cifra individual dura.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Bundesliga schläft Sommerpause, doch die WM 2026 in Nordamerika biegt in die Finalwoche ein — und für Daniels zwei Nationen ist sie längst vorbei: Deutschland und Brasilien sind draußen, Frankreich steht als erster Halbfinalist fest. Dazu bahnt sich in Freiburg der teuerste Verkauf der Vereinsgeschichte an.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Frankreich 2:0 Marokko</strong>: Mbappé und Dembélé schießen die Équipe als ersten Team ins Halbfinale (09.07.).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay, 3:4 im Elfmeterschießen — erste WM-Elfer-Pleite überhaupt. Nagelsmanns Zukunft offen, Klopp als Name im Raum.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen (Haaland-Doppelpack), schwächste WM seit 1990. Ancelotti bleibt (Vertrag bis 2030).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute</strong>: Spanien–Belgien, Viertelfinale, <strong>21:00 MESZ / 16:00 BRT</strong> (SoFi Stadium, Inglewood).</li>\n      <li><span class=\"chip\">WM</span> <strong>Restprogramm</strong>: Sa Norwegen–England &amp; Argentinien–Schweiz, Halbfinals Di/Mi, Finale So 19.07.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi vor Newcastle</strong>: Paket von rund 60 Mio. € — Freiburg-Rekord, offiziell aber noch nicht vollzogen.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt ein</strong>: Backhaus (~15 Mio. €, Werder) und Goto (10 Mio. €, Anderlecht) sind fix.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 ist Geschichte</strong>: Bayern Meister (89 Pkt), Freiburg Siebter (47 Pkt). Transferfenster bis 31.08. offen.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: Neustart Woche des 22.07., Palmeiras führt nach 18 Runden (41 Pkt).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die Bundesliga schläft Sommerpause, doch die WM 2026 in Nordamerika biegt in die Finalwoche ein — und für Daniels zwei Nationen ist sie längst vorbei: Deutschland und Brasilien sind draußen, Frankreich steht als erster Halbfinalist fest. Dazu bahnt sich in Freiburg der teuerste Verkauf der Vereinsgeschichte an.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Frankreich 2:0 Marokko</strong>: Mbappé und Dembélé schießen die Équipe als ersten Team ins Halbfinale (09.07.).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay, 3:4 im Elfmeterschießen — erste WM-Elfer-Pleite überhaupt. Nagelsmanns Zukunft offen, Klopp als Name im Raum.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen (Haaland-Doppelpack), schwächste WM seit 1990. Ancelotti bleibt (Vertrag bis 2030).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute</strong>: Spanien–Belgien, Viertelfinale, <strong>21:00 MESZ / 16:00 BRT</strong> (SoFi Stadium, Inglewood).</li>\n      <li><span class=\"chip\">WM</span> <strong>Restprogramm</strong>: Sa Norwegen–England &amp; Argentinien–Schweiz, Halbfinals Di/Mi, Finale So 19.07.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi vor Newcastle</strong>: Paket von rund 60 Mio. € — Freiburg-Rekord, offiziell aber noch nicht vollzogen.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg holt ein</strong>: Backhaus (~15 Mio. €, Werder) und Goto (10 Mio. €, Anderlecht) sind fix.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 ist Geschichte</strong>: Bayern Meister (89 Pkt), Freiburg Siebter (47 Pkt). Transferfenster bis 31.08. offen.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: Neustart Woche des 22.07., Palmeiras führt nach 18 Runden (41 Pkt).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The Bundesliga is asleep for the summer, but the 2026 World Cup in North America is turning into finals week — and for Daniel's two nations it's already over: Germany and Brazil are out, France is confirmed as the first semifinalist. Meanwhile, Freiburg is closing in on the most expensive sale in club history.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>France 2-0 Morocco</strong>: Mbappé and Dembélé send Les Bleus into the semifinal as the first team through (07/09).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany out</strong>: 1-1 vs. Paraguay, 3-4 on penalties — the first-ever World Cup shootout loss. Nagelsmann's future uncertain, Klopp's name in the mix.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil out</strong>: 1-2 vs. Norway (Haaland brace), the weakest World Cup showing since 1990. Ancelotti stays (contract through 2030).</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Today</strong>: Spain–Belgium, quarterfinal, <strong>21:00 MESZ / 16:00 BRT</strong> (SoFi Stadium, Inglewood).</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Remaining schedule</strong>: Sat. Norway–England &amp; Argentina–Switzerland, semifinals Tue./Wed., final Sun. 07/19.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Manzambi close to Newcastle</strong>: package worth around €60m — a Freiburg record, though not officially completed yet.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg brings in</strong>: Backhaus (~€15m, Werder) and Goto (€10m, Anderlecht) are done deals.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 is history</strong>: Bayern champions (89 pts), Freiburg seventh (47 pts). Transfer window open until 08/31.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão on pause</strong>: restart in the week of 07/22, Palmeiras leads after 18 rounds (41 pts).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Bundesliga está em pausa de verão, mas a Copa do Mundo de 2026 na América do Norte entra na semana decisiva — e, para as duas seleções de Daniel, ela já acabou: Alemanha e Brasil estão fora, a França é a primeira semifinalista confirmada. Enquanto isso, o Freiburg se aproxima da venda mais cara da história do clube.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>França 2 a 0 no Marrocos</strong>: Mbappé e Dembélé levam a seleção francesa à semifinal como o primeiro time classificado (09/07).</li>\n      <li><span class=\"chip hot\">Seleção Alemã</span> <strong>Alemanha fora</strong>: 1 a 1 com o Paraguai, 3 a 4 nos pênaltis — a primeira eliminação em Copa nos pênaltis da história do país. Futuro de Nagelsmann em aberto, nome de Klopp cotado.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil fora</strong>: 1 a 2 para a Noruega (dobradinha de Haaland), a pior Copa desde 1990. Ancelotti permanece (contrato até 2030).</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Hoje</strong>: Espanha–Bélgica, quartas de final, <strong>21h00 MESZ / 16h00 BRT</strong> (SoFi Stadium, Inglewood).</li>\n      <li><span class=\"chip\">Copa</span> <strong>Resto da tabela</strong>: sáb. Noruega–Inglaterra &amp; Argentina–Suíça, semifinais ter./qua., final dom. 19/07.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Manzambi perto do Newcastle</strong>: pacote de cerca de € 60 milhões — recorde do Freiburg, mas ainda não oficializado.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>Freiburg contrata</strong>: Backhaus (~€ 15 milhões, Werder) e Goto (€ 10 milhões, Anderlecht) já são negócios fechados.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>25/26 é passado</strong>: Bayern campeão (89 pts), Freiburg em sétimo (47 pts). Janela de transferências aberta até 31/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão em pausa</strong>: retorno na semana de 22/07, Palmeiras lidera após 18 rodadas (41 pts).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La Bundesliga está en receso de verano, pero el Mundial 2026 en Norteamérica entra en la semana final — y para las dos selecciones de Daniel, el torneo ya terminó: Alemania y Brasil están eliminados, Francia ya es el primer semifinalista confirmado. Mientras tanto, el Freiburg se acerca a la venta más cara de su historia como club.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Francia 2-0 Marruecos</strong>: Mbappé y Dembélé meten a la selección francesa en semifinales como el primer equipo clasificado (09/07).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania eliminada</strong>: 1-1 contra Paraguay, 3-4 en penales — la primera eliminación por penales en un Mundial en la historia del equipo. El futuro de Nagelsmann está en el aire, el nombre de Klopp suena como opción.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil eliminado</strong>: 1-2 contra Noruega (doblete de Haaland), su peor Mundial desde 1990. Ancelotti se queda (contrato hasta 2030).</li>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Hoy</strong>: España–Bélgica, cuartos de final, <strong>21:00 MESZ / 16:00 BRT</strong> (SoFi Stadium, Inglewood).</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Resto del calendario</strong>: sáb. Noruega–Inglaterra y Argentina–Suiza, semifinales mar./mié., final dom. 19/07.</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>Manzambi, cerca del Newcastle</strong>: paquete de alrededor de 60 millones de euros — récord para el Freiburg, aunque aún no es oficial.</li>\n      <li><span class=\"chip good\">Transferencia</span> <strong>El Freiburg refuerza su plantilla</strong>: Backhaus (~15 millones de euros, Werder) y Goto (10 millones de euros, Anderlecht) ya son fichajes cerrados.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>La 25/26 ya es historia</strong>: el Bayern es campeón (89 pts), el Freiburg terminó séptimo (47 pts). El mercado de fichajes sigue abierto hasta el 31/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>El Brasileirão hace pausa</strong>: regresa en la semana del 22/07, el Palmeiras es líder tras 18 jornadas (41 pts).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 10. Juli — und heute Vormittag rollt die FIA-Langstrecken-WM erstmals in dieser Saison in Interlagos aufs Feld. Die <strong>Rolex 6 Hours of São Paulo</strong> sind Daniels Heimspiel: Freies Training heute, Qualifying morgen, das Sechs-Stunden-Rennen am Sonntag um <strong>11:30 BRT / 16:30 MESZ</strong>. In der Formel 1 ist unterdessen Pause bis Spa — die letzte Runde, der <strong>Große Preis von Großbritannien</strong> in Silverstone, ging überraschend an Charles Leclerc: sein erster Silverstone-Sieg, das Rennen endete hinter dem Safety Car nach Verstappens Crash. Die Tabellen führen weiter Kimi Antonelli (Fahrer) und Mercedes (Konstrukteure) an. Nächster F1-Halt: Spa-Francorchamps, 17.–19.07.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Heimspiel in Interlagos beginnt heute</strong>: Freies Training Fr, Hypercar-Quali Sa, Rennstart So 12.07. <strong>11:30 BRT / 16:30 MESZ</strong> (6 Stunden). Toyota führt die Herstellerwertung an.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc gewinnt in Silverstone</strong>: sein 9. Karrieresieg und erster Großbritannien-Sieg, erster Monegasse überhaupt in diesem Rennen. Das Rennen endete hinter dem <strong>Safety Car</strong> nach Verstappens Ausritt in Runde 48.</li>\n      <li><span class=\"chip\">F1</span> <strong>Fahrerwertung</strong>: Antonelli 179 vor Russell 154 und Hamilton 147 — der Italiener führt 25 Punkte vor seinem Teamkollegen. Leclerc rückt mit dem Sieg auf Rang 4 (108) vor.</li>\n      <li><span class=\"chip\">F1</span> <strong>Konstrukteure</strong>: Mercedes <strong>333</strong> vor Ferrari 255 und McLaren 179 (offiziell formula1.com — eine kursierende Aggregator-Zahl „244/165\" ist veraltet, siehe unten).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Hersteller-Stand vor der Runde</strong>: Toyota 132, BMW 96, Ferrari 62 — dahinter drängen sich Alpine (38), Cadillac (32) und Aston Martin (26) auf zwölf Punkte.</li>\n      <li><span class=\"chip\">F1</span> <strong>Nächste Runde: GP Belgien</strong>, Spa-Francorchamps, 17.–19.07. — kein Sprint. Rennstart So 19.07. <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag ist konfliktfrei</strong>: MotoGP Sachsenring-Rennen 09:00 BRT, danach rund 1¾ Stunden Puffer zwischen MotoGP-Ziel und Interlagos-Start (11:30 BRT).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 10. Juli — und heute Vormittag rollt die FIA-Langstrecken-WM erstmals in dieser Saison in Interlagos aufs Feld. Die <strong>Rolex 6 Hours of São Paulo</strong> sind Daniels Heimspiel: Freies Training heute, Qualifying morgen, das Sechs-Stunden-Rennen am Sonntag um <strong>11:30 BRT / 16:30 MESZ</strong>. In der Formel 1 ist unterdessen Pause bis Spa — die letzte Runde, der <strong>Große Preis von Großbritannien</strong> in Silverstone, ging überraschend an Charles Leclerc: sein erster Silverstone-Sieg, das Rennen endete hinter dem Safety Car nach Verstappens Crash. Die Tabellen führen weiter Kimi Antonelli (Fahrer) und Mercedes (Konstrukteure) an. Nächster F1-Halt: Spa-Francorchamps, 17.–19.07.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Heimspiel in Interlagos beginnt heute</strong>: Freies Training Fr, Hypercar-Quali Sa, Rennstart So 12.07. <strong>11:30 BRT / 16:30 MESZ</strong> (6 Stunden). Toyota führt die Herstellerwertung an.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc gewinnt in Silverstone</strong>: sein 9. Karrieresieg und erster Großbritannien-Sieg, erster Monegasse überhaupt in diesem Rennen. Das Rennen endete hinter dem <strong>Safety Car</strong> nach Verstappens Ausritt in Runde 48.</li>\n      <li><span class=\"chip\">F1</span> <strong>Fahrerwertung</strong>: Antonelli 179 vor Russell 154 und Hamilton 147 — der Italiener führt 25 Punkte vor seinem Teamkollegen. Leclerc rückt mit dem Sieg auf Rang 4 (108) vor.</li>\n      <li><span class=\"chip\">F1</span> <strong>Konstrukteure</strong>: Mercedes <strong>333</strong> vor Ferrari 255 und McLaren 179 (offiziell formula1.com — eine kursierende Aggregator-Zahl „244/165\" ist veraltet, siehe unten).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Hersteller-Stand vor der Runde</strong>: Toyota 132, BMW 96, Ferrari 62 — dahinter drängen sich Alpine (38), Cadillac (32) und Aston Martin (26) auf zwölf Punkte.</li>\n      <li><span class=\"chip\">F1</span> <strong>Nächste Runde: GP Belgien</strong>, Spa-Francorchamps, 17.–19.07. — kein Sprint. Rennstart So 19.07. <strong>15:00 MESZ / 10:00 BRT</strong>.</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag ist konfliktfrei</strong>: MotoGP Sachsenring-Rennen 09:00 BRT, danach rund 1¾ Stunden Puffer zwischen MotoGP-Ziel und Interlagos-Start (11:30 BRT).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Friday, July 10 — and this morning the FIA World Endurance Championship rolls onto the grid at Interlagos for the first time this season. The <strong>Rolex 6 Hours of São Paulo</strong> is Daniel's home race: free practice today, qualifying tomorrow, the six-hour race on Sunday at <strong>11:30 BRT / 16:30 CEST</strong>. In Formula 1, meanwhile, it's a break until Spa — the last round, the <strong>British Grand Prix</strong> at Silverstone, went surprisingly to Charles Leclerc: his first Silverstone win, the race ending behind the safety car after Verstappen's crash. Kimi Antonelli (drivers) and Mercedes (constructors) remain at the top of the standings. Next F1 stop: Spa-Francorchamps, July 17–19.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Home race at Interlagos kicks off today</strong>: free practice Fri, Hypercar qualifying Sat, race start Sun 07/12. <strong>11:30 BRT / 16:30 CEST</strong> (6 hours). Toyota leads the manufacturers' standings.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc wins at Silverstone</strong>: his 9th career win and first British GP win, the first ever by a Monegasque driver in this race. The race ended behind the <strong>safety car</strong> after Verstappen's off in lap 48.</li>\n      <li><span class=\"chip\">F1</span> <strong>Drivers' standings</strong>: Antonelli 179 ahead of Russell 154 and Hamilton 147 — the Italian leads by 25 points over his teammate. Leclerc moves up to 4th (108) with the win.</li>\n      <li><span class=\"chip\">F1</span> <strong>Constructors</strong>: Mercedes <strong>333</strong> ahead of Ferrari 255 and McLaren 179 (official formula1.com — a circulating aggregator figure of \"244/165\" is outdated, see below).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Manufacturers' standings ahead of the round</strong>: Toyota 132, BMW 96, Ferrari 62 — behind them, Alpine (38), Cadillac (32), and Aston Martin (26) are bunched within twelve points.</li>\n      <li><span class=\"chip\">F1</span> <strong>Next round: Belgian GP</strong>, Spa-Francorchamps, July 17–19 — no sprint. Race start Sun 07/19, <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n      <li><span class=\"chip\">Sidenote</span> <strong>Daniel's Sunday has no conflicts</strong>: MotoGP Sachsenring race at 09:00 BRT, then about 1¾ hours of buffer between the MotoGP finish and the Interlagos start (11:30 BRT).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é sexta-feira, 10 de julho — e nesta manhã o Mundial de Endurance da FIA entra na pista de Interlagos pela primeira vez nesta temporada. As <strong>Rolex 6 Hours of São Paulo</strong> são o jogo em casa de Daniel: treino livre hoje, classificação amanhã, a corrida de seis horas no domingo às <strong>11h30 BRT / 16h30 CEST</strong>. Na Fórmula 1, é pausa até Spa — a última etapa, o <strong>Grande Prêmio da Grã-Bretanha</strong> em Silverstone, foi surpreendentemente para Charles Leclerc: sua primeira vitória em Silverstone, com a corrida terminando atrás do safety car após o acidente de Verstappen. As tabelas seguem lideradas por Kimi Antonelli (pilotos) e Mercedes (construtores). Próxima parada da F1: Spa-Francorchamps, 17 a 19/07.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Jogo em casa em Interlagos começa hoje</strong>: treino livre sex, classificação Hypercar sáb, largada dom 12/07. <strong>11h30 BRT / 16h30 CEST</strong> (6 horas). A Toyota lidera o campeonato de construtores.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc vence em Silverstone</strong>: sua 9ª vitória na carreira e a primeira na Grã-Bretanha, a primeira de um monegasco na história dessa corrida. A prova terminou atrás do <strong>safety car</strong> após o acidente de Verstappen na volta 48.</li>\n      <li><span class=\"chip\">F1</span> <strong>Campeonato de pilotos</strong>: Antonelli 179 à frente de Russell 154 e Hamilton 147 — o italiano lidera com 25 pontos de vantagem sobre o companheiro de equipe. Leclerc sobe para o 4º lugar (108) com a vitória.</li>\n      <li><span class=\"chip\">F1</span> <strong>Construtores</strong>: Mercedes com <strong>333</strong> à frente de Ferrari 255 e McLaren 179 (dado oficial formula1.com — um número de agregador em circulação, \"244/165\", está desatualizado, veja abaixo).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Campeonato de construtores antes da etapa</strong>: Toyota 132, BMW 96, Ferrari 62 — logo atrás, Alpine (38), Cadillac (32) e Aston Martin (26) estão separados por apenas doze pontos.</li>\n      <li><span class=\"chip\">F1</span> <strong>Próxima etapa: GP da Bélgica</strong>, Spa-Francorchamps, 17 a 19/07 — sem sprint. Largada dom 19/07, <strong>15h00 CEST / 10h00 BRT</strong>.</li>\n      <li><span class=\"chip\">Detalhe</span> <strong>Domingo de Daniel não tem conflitos</strong>: corrida de MotoGP no Sachsenring às 09h00 BRT, seguida de cerca de 1¾ horas de folga entre a chegada da MotoGP e a largada em Interlagos (11h30 BRT).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es viernes 10 de julio — y esta mañana el Mundial de Resistencia de la FIA rueda por primera vez esta temporada en Interlagos. Las <strong>Rolex 6 Hours of São Paulo</strong> son el juego de casa de Daniel: entrenamientos libres hoy, clasificación mañana, la carrera de seis horas el domingo a las <strong>11:30 BRT / 16:30 CEST</strong>. En la Fórmula 1, mientras tanto, hay pausa hasta Spa — la última fecha, el <strong>Gran Premio de Gran Bretaña</strong> en Silverstone, se la llevó de forma sorpresiva Charles Leclerc: su primer triunfo en Silverstone, con la carrera terminando detrás del auto de seguridad tras el choque de Verstappen. Las tablas siguen encabezadas por Kimi Antonelli (pilotos) y Mercedes (constructores). Próxima parada de la F1: Spa-Francorchamps, del 17 al 19/07.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>El juego de casa en Interlagos arranca hoy</strong>: entrenamientos libres vie, clasificación Hypercar sáb, arranque de la carrera dom 12/07. <strong>11:30 BRT / 16:30 CEST</strong> (6 horas). Toyota lidera el campeonato de constructores.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Leclerc gana en Silverstone</strong>: su 9ª victoria de carrera y primer triunfo en Gran Bretaña, el primero de un monegasco en la historia de esta carrera. La prueba terminó detrás del <strong>auto de seguridad</strong> tras el trompo de Verstappen en la vuelta 48.</li>\n      <li><span class=\"chip\">F1</span> <strong>Campeonato de pilotos</strong>: Antonelli con 179 por delante de Russell con 154 y Hamilton con 147 — el italiano lidera con 25 puntos de ventaja sobre su compañero de equipo. Leclerc sube al 4º lugar (108) con el triunfo.</li>\n      <li><span class=\"chip\">F1</span> <strong>Constructores</strong>: Mercedes con <strong>333</strong> por delante de Ferrari con 255 y McLaren con 179 (dato oficial de formula1.com — una cifra de agregador que circula, \"244/165\", está desactualizada, ver más abajo).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Campeonato de constructores antes de la fecha</strong>: Toyota 132, BMW 96, Ferrari 62 — detrás, Alpine (38), Cadillac (32) y Aston Martin (26) están separados por apenas doce puntos.</li>\n      <li><span class=\"chip\">F1</span> <strong>Próxima fecha: GP de Bélgica</strong>, Spa-Francorchamps, del 17 al 19/07 — sin sprint. Arranque de la carrera dom 19/07, <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n      <li><span class=\"chip\">Al margen</span> <strong>El domingo de Daniel no tiene conflictos</strong>: la carrera de MotoGP en Sachsenring a las 09:00 BRT, seguida de cerca de 1¾ horas de margen entre la llegada de la MotoGP y el arranque en Interlagos (11:30 BRT).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das große Volksfest vor der Haustür läuft noch bis Sonntag — rund 20 Fahrminuten entfernt, freier Eintritt, Rodeo und Bühne. Nur beim Wetter herrscht diese Woche echter Streit: Climatempos Seite für Ribeirão Claro sagt für jeden Tag bis Ende Juli <strong>0 % Regen</strong> voraus, während der Landeswetterdienst INMET laut zwei Portalen eine <strong>Sturmwarnung über 116 Gemeinden Paranás</strong> ausgegeben hat, mit Samstag als kritischstem Tag. Wir wählen keine der beiden Zahlen still aus — bei vier Kindern plant man auf den schlechteren Fall. Dazu zwei ruhigere Nachrichten: Ab Montag beginnen die Winterferien, und die RSV-Welle in Paraná zeigt erstmals Zeichen, dass sie dreht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Sturmwarnung gegen Null-Prozent</strong>: INMET warnt (via zwei Portalen) vor Gewitter über 116 PR-Gemeinden — 20–30 mm/h, Hagel-Risiko, Samstag am kritischsten. Climatempo Ribeirão Claro sagt dagegen 0 % Regen. Beide Werte im Brief, Konflikt offen benannt.</li>\n      <li><span class=\"chip hot\">Event</span> <strong>31ª Fetexas läuft bis So 12.07.</strong> — Centro de Eventos PR-431, Jacarezinho (~15 km), Eintritt frei. Motocross Sa/So, Bühne: Leonardo (Sa), Sorriso Maroto (So).</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>RSV-Welle dreht</strong>: Das neue InfoGripe-Bulletin (SE 26/2026, publ. 09.07.) zählt Paraná zu den Staaten mit „indícios de […] início de queda\" — nach „alto risco crescente\" in SE 23/2026. Bessere Nachricht fürs Baby, aber VSR noch 55,9 % der Fälle.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien ab Montag, 13.07.</strong> — rede estadual PR, bis 24.07., Rückkehr 27.07. Diese Woche noch Unterricht.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>Dengue-Rückgang ist eine Jahresanfangs-Zahl</strong>: −96,1 % Fälle / −98,8 % Tote gelten für SE 1–14/2026 (Jan.–Mitte März). Kein frisches Juli-Bulletin, kein aktiver Alarm.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina-Fenster (~110 km):</strong> 46º FIML (10.–19.07., 30+ Konzerte) und Coffee Festival (10.–26.07., ~50 Cafés) — beide nur zweit-quelle, mehr Kultur als Kinder.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Frostwelle vorbei</strong>: Der geada-Alarm für 150 Städte vom Wochenanfang ist durch; laut SIMEPAR keine neue geada — dafür jetzt die Sturmfront.</li>\n      <li><span class=\"chip\">Hinweis</span> <strong>Day-Trip- und SP-Ring waren heute nicht durchsuchbar</strong> (Aggregatoren blockiert) — das ist eine Recherche-Lücke, kein „ruhige Woche\". Vor einem Ausflug selbst prüfen.</li>\n    </ul></div>",

 Juli-Bulletin, kein aktiver Alarm.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina-Fenster (~110 km):</strong> 46º FIML (10.–19.07., 30+ Konzerte) und Coffee Festival (10.–26.07., ~50 Cafés) — beide nur zweit-quelle, mehr Kultur als Kinder.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Frostwelle vorbei</strong>: Der geada-Alarm für 150 Städte vom Wochenanfang ist durch; laut SIMEPAR keine neue geada — dafür jetzt die Sturmfront.</li>\n      <li><span class=\"chip\">Hinweis</span> <strong>Day-Trip- und SP-Ring waren heute nicht durchsuchbar</strong> (Aggregatoren blockiert) — das ist eine Recherche-Lücke, kein „ruhige Woche\". Vor einem Ausflug selbst prüfen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The big county fair right on our doorstep runs through Sunday — a ~20-minute drive, free admission, rodeo and stage acts. But the weather this week is genuinely in dispute: Climatempo's page for Ribeirão Claro forecasts <strong>0% rain</strong> for every single day through the end of July, while the national weather service INMET, per two news portals, has issued a <strong>storm warning covering 116 municipalities in Paraná</strong>, with Saturday flagged as the most critical day. We're not quietly picking one number over the other — with four kids in the house, you plan for the worse case. Two calmer notes besides: winter break starts Monday, and Paraná's RSV wave is showing its first signs of turning.</p>\n    <ul>\n      <li><span class=\"chip hot\">Weather</span> <strong>Storm warning vs. zero percent</strong>: INMET warns (via two portals) of thunderstorms across 116 PR municipalities — 20–30 mm/h, hail risk, Saturday the most critical day. Climatempo Ribeirão Claro says 0% rain instead. Both figures in the brief, the conflict stated plainly.</li>\n      <li><span class=\"chip hot\">Event</span> <strong>31st Fetexas runs through Sun 07/12.</strong> — Centro de Eventos, PR-431, Jacarezinho (~15 km), free admission. Motocross Sat/Sun, stage acts: Leonardo (Sat), Sorriso Maroto (Sun).</li>\n      <li><span class=\"chip good\">Health</span> <strong>RSV wave turning</strong>: The new InfoGripe bulletin (epi week 26/2026, publ. 07/09) lists Paraná among the states showing \"indícios de […] início de queda\" (\"signs of […] a decline beginning\") — up from \"alto risco crescente\" (\"high, growing risk\") in epi week 23/2026. Better news for the baby, but RSV is still 55.9% of cases.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break starts Monday, 07/13</strong> — PR state school system, through 07/24, return 07/27. Classes still in session this week.</li>\n      <li><span class=\"chip\">Health</span> <strong>The dengue drop is a start-of-year figure</strong>: −96.1% cases / −98.8% deaths apply to epi weeks 1–14/2026 (Jan.–mid-March). No fresh July bulletin, no active alert.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina window (~110 km):</strong> the 46th FIML (07/10–19, 30+ concerts) and the Coffee Festival (07/10–26, ~50 cafés) — both secondary-sourced only, more culture than kids' fare.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Frost wave over</strong>: the geada (frost) alert for 150 towns from earlier this week has passed; per SIMEPAR no new frost is expected — the storm front takes its place now.</li>\n      <li><span class=\"chip\">Note</span> <strong>The day-trip and São Paulo rings weren't searchable today</strong> (aggregators blocked) — that's a research gap, not a \"quiet week.\" Check for yourself before any outing.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A grande festa popular bem na nossa porta continua até domingo — cerca de 20 minutos de carro, entrada gratuita, rodeio e shows no palco. Só que o clima esta semana está em disputa mesmo: a página do Climatempo para Ribeirão Claro prevê <strong>0% de chuva</strong> para todos os dias até o fim de julho, enquanto o serviço meteorológico nacional, o INMET, segundo dois portais, emitiu um <strong>alerta de temporal para 116 municípios do Paraná</strong>, com o sábado como o dia mais crítico. Não vamos escolher silenciosamente um dos dois números — com quatro crianças em casa, o planejamento tem que considerar o cenário pior. Além disso, duas notícias mais tranquilas: a partir de segunda-feira começam as férias de inverno, e a onda de VSR no Paraná mostra pela primeira vez sinais de reversão.</p>\n    <ul>\n      <li><span class=\"chip hot\">Clima</span> <strong>Alerta de temporal contra zero por cento</strong>: o INMET alerta (via dois portais) para temporais em 116 municípios do PR — 20–30 mm/h, risco de granizo, sábado como o dia mais crítico. O Climatempo Ribeirão Claro, por outro lado, prevê 0% de chuva. Os dois valores no boletim, com o conflito declarado abertamente.</li>\n      <li><span class=\"chip hot\">Evento</span> <strong>31ª Fetexas continua até dom. 12/07.</strong> — Centro de Eventos, PR-431, Jacarezinho (~15 km), entrada gratuita. Motocross sáb./dom., palco: Leonardo (sáb.), Sorriso Maroto (dom.).</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Onda de VSR dá sinais de reversão</strong>: o novo boletim do InfoGripe (SE 26/2026, publ. 09/07) inclui o Paraná entre os estados com \"indícios de […] início de queda\" — depois de \"alto risco crescente\" na SE 23/2026. Notícia melhor para o bebê, mas o VSR ainda responde por 55,9% dos casos.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno a partir de segunda, 13/07</strong> — rede estadual PR, até 24/07, retorno em 27/07. Ainda tem aula esta semana.</li>\n      <li><span class=\"chip\">Saúde</span> <strong>A queda da dengue é um número do início do ano</strong>: −96,1% de casos / −98,8% de óbitos referem-se às SE 1–14/2026 (jan.–meados de março). Sem boletim fresco de julho, sem alerta ativo.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Janela de Londrina (~110 km):</strong> o 46º FIML (10 a 19/07, mais de 30 concertos) e o Coffee Festival (10 a 26/07, ~50 cafés) — ambos só com fonte secundária, mais cultura que programação infantil.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Onda de frio já passou</strong>: o alerta de geada para 150 cidades do início da semana já passou; segundo o SIMEPAR não há nova geada prevista — em seu lugar vem agora a frente de temporal.</li>\n      <li><span class=\"chip\">Aviso</span> <strong>Os anéis de bate-volta e de SP não puderam ser pesquisados hoje</strong> (agregadores bloqueados) — isso é uma lacuna de pesquisa, não uma \"semana tranquila\". Verifique você mesmo antes de qualquer passeio.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La gran feria popular a la vuelta de la esquina sigue hasta el domingo — unos 20 minutos en carro, entrada gratuita, rodeo y escenario. Solo que el clima esta semana está en verdadera disputa: la página de Climatempo para Ribeirão Claro pronostica <strong>0 % de lluvia</strong> para cada día hasta finales de julio, mientras que el servicio meteorológico nacional, INMET, según dos portales, emitió una <strong>alerta de tormenta para 116 municipios de Paraná</strong>, con el sábado como el día más crítico. No elegimos en silencio ninguna de las dos cifras — con cuatro hijos en casa, uno planea para el peor escenario. Además, dos noticias más tranquilas: desde el lunes empiezan las vacaciones de invierno, y la ola de VSR en Paraná muestra por primera vez señales de estar cediendo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Clima</span> <strong>Alerta de tormenta contra cero por ciento</strong>: el INMET advierte (vía dos portales) sobre tormentas eléctricas en 116 municipios de PR — 20–30 mm/h, riesgo de granizo, sábado como el día más crítico. Climatempo Ribeirão Claro, en cambio, dice 0 % de lluvia. Ambos valores en el boletín, con el conflicto declarado abiertamente.</li>\n      <li><span class=\"chip hot\">Evento</span> <strong>La 31ª Fetexas sigue hasta el dom. 12/07.</strong> — Centro de Eventos, PR-431, Jacarezinho (~15 km), entrada gratuita. Motocross sáb./dom., escenario: Leonardo (sáb.), Sorriso Maroto (dom.).</li>\n      <li><span class=\"chip good\">Salud</span> <strong>La ola de VSR empieza a ceder</strong>: el nuevo boletín de InfoGripe (SE 26/2026, publ. 09/07) incluye a Paraná entre los estados con \"indícios de […] início de queda\" (\"indicios de […] inicio de caída\") — tras \"alto risco crescente\" (\"alto riesgo creciente\") en la SE 23/2026. Mejor noticia para la bebé, pero el VSR aún representa el 55.9 % de los casos.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno desde el lunes 13/07</strong> — rede estadual de PR, hasta el 24/07, regreso el 27/07. Esta semana todavía hay clases.</li>\n      <li><span class=\"chip\">Salud</span> <strong>La baja de dengue es una cifra de principios de año</strong>: −96.1 % de casos / −98.8 % de muertes corresponden a las SE 1–14/2026 (enero–mediados de marzo). Sin boletín fresco de julio, sin alerta activa.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Ventana de Londrina (~110 km):</strong> el 46º FIML (10 al 19/07, más de 30 conciertos) y el Coffee Festival (10 al 26/07, ~50 cafeterías) — ambos solo con fuente secundaria, más cultura que actividad infantil.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Ola de frío ya pasó</strong>: la alerta de geada (helada) para 150 ciudades de principios de semana ya terminó; según el SIMEPAR no hay nueva geada prevista — en su lugar llega ahora el frente de tormenta.</li>\n      <li><span class=\"chip\">Aviso</span> <strong>Los anillos de excursión de un día y de SP no se pudieron consultar hoy</strong> (agregadores bloqueados) — es un vacío de investigación, no una \"semana tranquila\". Verifica tú mismo antes de cualquier paseo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Freitag, der 10. Juli — Wochenthema <em>Reise &amp; Verkehr</em>, heute mit dem Schwerpunkt <em>Fliegen: Einchecken, Sicherheitskontrolle &amp; Verspätung</em>. Die früheren Reisetage haben Flughafen-Basics, Grenze &amp; Bus, Unterkunft &amp; Stadt, das Online-Buchen und das Autofahren abgedeckt; heute stehst du im Terminal: am <em>Check-in-Schalter</em> (in Brasilien am <em>guichê</em>) <em>einchecken</em>, den Ausweis <em>vorzeigen</em>, an der <em>Sicherheitskontrolle</em> die Schuhe <em>ausziehen</em> und das Handgepäck <em>durchsuchen</em> lassen — und wissen, was zu sagen ist, wenn der Flug <em>ausfällt</em>, du den <em>Anschlussflug verpasst</em> oder eine <em>Entschädigung</em> forderst. 33 Einträge, 11 Verben mit voller Konjugation (davon 1 Auffrischung), plus die brasilianischen Flughafen-Wörter und der falsche Freund des Tages.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>eventuell (DE) ≠ eventually (EN)</strong> — DE <em>eventuell</em> heißt „möglicherweise / vielleicht\", EN <em>eventually</em> heißt „schließlich / irgendwann\". „Der Flug ist eventuell verspätet\" = <em>possibly</em>, nicht <em>eventually</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o guichê</strong> — der Check-in-Schalter heißt in Brasilien <em>guichê</em> (nicht das allgemeinere <em>balcão</em>). „Zum Schalter der Fluggesellschaft gehen\" = <em>ir ao guichê da companhia aérea</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>despachar a bagagem</strong> — Gepäck aufgeben heißt BR <em>despachar a bagagem</em>, ES-MX <em>facturar el equipaje</em> (oder <em>documentar</em>). Beide neben <em>fazer o check-in</em> / <em>hacer el check-in</em> gebräuchlich.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE ausfallen → Perfekt mit „sein\"</strong> — wenn der Flug gestrichen wird: <em>der Flug ist ausgefallen</em>, nicht <em>*hat ausgefallen</em> (Zustandswechsel). Aber <em>einchecken</em> nimmt <em>haben</em>: <em>ich habe eingecheckt</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE durchsuchen (untrennbar) → „durchsucht\"</strong>, kein <em>ge-</em>: <em>sie haben mein Handgepäck durchsucht</em>, nicht <em>*durchgesucht</em>. Genauso ohne <em>ge-</em>: <em>annulliert</em> (-ieren), <em>entschädigt</em> (ent-).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ausziehen (trennbar &amp; stark)</strong> — <em>ich ziehe die Schuhe aus</em>, Perfekt <em>ausgezogen</em> (ge- in der Mitte): <em>ich habe die Schuhe ausgezogen</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT escanear (-ear) → eu escaneio</strong> mit eingeschobenem <em>i</em> (nicht <em>*escaneo</em>). ES <em>escanear</em> dagegen regelmäßig: <em>yo escaneo</em>. Ein Verb, zwei Sprachen, zwei Muster.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES indemnizar → yo indemnicé</strong> mit <em>z→c</em> vor e (nicht <em>*indemnizé</em>). PT <em>indenizar</em> behält das z: <em>eu indenizei</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES fazer &amp; hacer, sair &amp; salir sind stark unregelmäßig</strong> — <em>eu faço / fiz</em>, <em>yo hago / hice / haré</em>; <em>eu saio / saí</em>, <em>yo salgo / saldré</em>. Nie aus dem Gefühl bilden.</li>\n      <li><span class=\"chip good\">PHRASE</span> <strong>EU-Fluggastrechte</strong> — bei großer Verspätung/Annullierung Entschädigung <em>250 € / 400 € / 600 €</em> nach Distanz, ab <em>3 Stunden</em> Verspätung. Die 2026er Reform behält beides bei.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>den Anschluss verpassen</strong> — wörtlich den Anschlussflug verpassen, bildlich „den Anschluss verlieren / abgehängt werden\".</li>\n      <li><span class=\"chip\">WIEDERHOLUNG</span> <strong>der Koffer · das Gepäck · verpassen</strong> — heute aufgefrischt aus dem Reisetag vom 27.06, alle drei passen direkt zum Fliegen.</li>\n    </ul></div>",
