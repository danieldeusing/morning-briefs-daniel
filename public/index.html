GA „Mitte Juli\" angekündigt (kein exaktes Kalenderdatum bestätigt) — mit neuem Peak/Off-Peak-Pricing.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.11</strong>: Side-Chats (<code>/side</code>, <code>/btw</code>) und Agent-Transkript-Suche.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today is the day Continue's hosted cloud data gets permanently deleted — a concrete, dated tool-balance moment. Behind it runs the real story of the week: GPT-5.6 has been generally available since 07/09, and Meta Muse Spark 1.1 entered public preview the same day (API, US-only for now) — yet neither dethrones Anthropic's newest Claude tier (Fable 5) on pure coding benchmarks. And both Claude Code and GitHub Copilot pushed browser tools into the IDE in the same week.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev</strong>: acquired by Cursor, hosted cloud data (chat history, configs, team settings) gets deleted <strong>after today, 07/15</strong> — anyone who used the platform should export now.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6</strong> (Sol/Terra/Luna) GA since 07/09; leads the Artificial Analysis Coding Index (80 pts), but publishes <em>no</em> SWE-Bench Verified score.</li>\n      <li><span class=\"chip\">Bench</span> On <strong>SWE-Bench Pro</strong>, Claude Fable 5 (~80%) beats GPT-5.6 Sol (64.6%) — OpenAI responded by dismissing the benchmark itself as \"~30% broken.\"</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Claude Code</strong> now has a built-in sandbox browser (Cmd/Ctrl+Shift+B); CLI is at v2.1.210 (07/14).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Meta Muse Spark 1.1</strong> (1M context, MCP+Skills) — public preview (API, US-only for now); leads on tool use (MCP Atlas 88.1), but loses every pure coding bench to Opus 4.8 / GPT-5.5.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: agentic browser tools GA (07/01), <code>/security-review</code> in preview (07/14), JetBrains BYOK expanded.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4</strong> GA announced for \"mid-July\" (no exact calendar date confirmed) — with new peak/off-peak pricing.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.11</strong>: side chats (<code>/side</code>, <code>/btw</code>) and agent transcript search.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o dia em que os dados hospedados na nuvem da Continue são apagados de vez — um momento concreto e datado de equilíbrio entre ferramentas. Por trás disso corre a semana de verdade: o GPT-5.6 está disponível publicamente desde 09/07, e o Meta Muse Spark 1.1 entrou em prévia pública no mesmo dia (API, por ora só nos EUA) — mas nenhum dos dois derruba do trono o mais novo nível da Anthropic (Claude Fable 5) nos benchmarks puros de programação. E tanto o Claude Code quanto o GitHub Copilot colocaram ferramentas de navegador dentro da IDE na mesma semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev</strong>: adquirida pela Cursor, os dados hospedados na nuvem (histórico de chat, configurações, ajustes de equipe) serão apagados <strong>após hoje, 15/07</strong> — quem usou a plataforma deve exportar agora.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6</strong> (Sol/Terra/Luna) em GA desde 09/07; lidera o Artificial Analysis Coding Index (80 pts), mas não publica <em>nenhum</em> valor de SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Bench</span> No <strong>SWE-Bench Pro</strong>, o Claude Fable 5 (~80%) supera o GPT-5.6 Sol (64,6%) — o que levou a OpenAI a descartar o próprio benchmark como \"~30% quebrado\".</li>\n      <li><span class=\"chip good\">Claude</span> O <strong>Claude Code</strong> agora tem um navegador sandbox embutido (Cmd/Ctrl+Shift+B); a CLI está na v2.1.210 (14/07).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Meta Muse Spark 1.1</strong> (contexto de 1M, MCP+Skills) — prévia pública (API, por ora só nos EUA); lidera no uso de ferramentas (MCP Atlas 88,1), mas perde em todo benchmark puro de programação para Opus 4.8 / GPT-5.5.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: ferramentas de navegador agênticas em GA (01/07), <code>/security-review</code> em prévia (14/07), BYOK do JetBrains ampliado.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4</strong> tem GA anunciado para \"meados de julho\" (nenhuma data exata confirmada) — com novo modelo de preços de pico/fora de pico.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.11</strong>: side chats (<code>/side</code>, <code>/btw</code>) e busca em transcrições de agentes.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es el día en que se eliminan definitivamente los datos alojados en la nube de Continue — un momento de equilibrio entre herramientas concreto y con fecha exacta. Detrás de eso corre la semana real: GPT-5.6 está disponible de forma general desde el 09/07, y Meta Muse Spark 1.1 entró en vista previa pública ese mismo día (API, por ahora solo en EE. UU.) — pero ninguno de los dos destrona en los benchmarks puros de programación al nivel más reciente de Anthropic (Claude Fable 5). Y tanto Claude Code como GitHub Copilot metieron herramientas de navegador dentro del IDE en la misma semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev</strong>: adquirida por Cursor, los datos alojados en la nube (historial de chat, configuraciones, ajustes de equipo) se eliminarán <strong>después de hoy, 15/07</strong> — quien haya usado la plataforma debe exportar ahora.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6</strong> (Sol/Terra/Luna) en disponibilidad general desde el 09/07; lidera el Artificial Analysis Coding Index (80 pts), pero no publica <em>ningún</em> valor de SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Bench</span> En <strong>SWE-Bench Pro</strong>, Claude Fable 5 (~80%) le gana a GPT-5.6 Sol (64.6%) — ante lo cual OpenAI calificó al propio benchmark de \"~30% roto\".</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Claude Code</strong> ahora tiene un navegador sandbox integrado (Cmd/Ctrl+Shift+B); la CLI va en la v2.1.210 (14/07).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Meta Muse Spark 1.1</strong> (contexto de 1M, MCP+Skills) — vista previa pública (API, por ahora solo en EE. UU.); lidera en uso de herramientas (MCP Atlas 88.1), pero pierde en todo benchmark puro de programación frente a Opus 4.8 / GPT-5.5.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: herramientas de navegador agénticas en disponibilidad general (01/07), <code>/security-review</code> en vista previa (14/07), BYOK de JetBrains ampliado.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4</strong> anuncia su disponibilidad general para \"mediados de julio\" (sin fecha exacta de calendario confirmada) — con un nuevo esquema de precios pico/fuera de pico.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.11</strong>: side chats (<code>/side</code>, <code>/btw</code>) y búsqueda en transcripciones de agentes.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Wert in der Unternehmens-KI ist diese Woche sichtbar <strong>vom Modell zur Einführung</strong> gewandert — und drei Signale zeigen es fast gleichzeitig. Die Hyperscaler kaufen Armeen von „vor Ort eingebetteten\" Ingenieuren: Microsoft steckt <strong>2,5 Mrd. $</strong> und 6.000 Experten in eine neue Deployment-Firma, AWS legt <strong>1 Mrd. $</strong> daneben, Meta gründet eine Enterprise-Einheit. Cisco schiebt einen KI-Agenten auf <strong>90.000</strong> Schreibtische — on-prem, kostenrouted. Und Brüssel schaltet am 2. August die Durchsetzung gegen Modell-Anbieter scharf, verschiebt aber die Hochrisiko-Pflichten um zwei Jahre. Dazwischen adoptiert der deutsche Mittelstand schnell (54,5 % oder 41 % — je nach Studie), ist aber kaum Act-bereit. Genau in diese Lücke zielt die twiceD-Idee unten.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Deployment-Krieg</strong> (02.07): Microsoft Frontier (2,5 Mrd. $, 6.000 Experten), AWS (1 Mrd. $), Meta Enterprise Solutions — alle in einer Woche. Der Engpass ist nicht das Modell, sondern der Einbau.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Cisco</strong>: ein persönlicher KI-Agent für rund <strong>90.000</strong> Mitarbeitende, ab Ende Juli — läuft on-prem und routet jede Aufgabe aufs billigste ausreichende Modell.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI Act, 02.08</strong>: GPAI-Durchsetzung geht an (Bußen bis <strong>3 % Umsatz</strong> bzw. 15 Mio. €), während der Digital Omnibus die Hochrisiko-Pflichten auf Dez 2027 / Aug 2028 verschiebt.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand-Adoption</strong>: ifo meldet <strong>54,5 %</strong> (Mai 2026), Bitkom <strong>41 %</strong> (April 2026) — zwei Studien, zwei Populationen, beide echt.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Readiness-Lücke</strong>: 48,6 % der deutschen Firmen haben sich noch nicht ernsthaft mit der Act-Umsetzung befasst.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Bradesco</strong>: 600 Live-Anwendungsfälle auf eigener Plattform; der Assistent BIA bei <strong>25 Mio.</strong> Interaktionen und 87 % Lösungsquote.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner-Prognose</strong>: 40 % der Unternehmens-Apps mit aufgaben­spezifischen Agenten bis Ende 2026 (von &lt;5 %) — Prognose, kein Ist.</li>\n      <li><span class=\"chip good\">twiceD</span> Die Lücke: <strong>Runtime-Governance</strong> für KI-Agenten, zugeschnitten und bepreist für den Mittelstand — die niemand füllt.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Der Wert in der Unternehmens-KI ist diese Woche sichtbar <strong>vom Modell zur Einführung</strong> gewandert — und drei Signale zeigen es fast gleichzeitig. Die Hyperscaler kaufen Armeen von „vor Ort eingebetteten\" Ingenieuren: Microsoft steckt <strong>2,5 Mrd. $</strong> und 6.000 Experten in eine neue Deployment-Firma, AWS legt <strong>1 Mrd. $</strong> daneben, Meta gründet eine Enterprise-Einheit. Cisco schiebt einen KI-Agenten auf <strong>90.000</strong> Schreibtische — on-prem, kostenrouted. Und Brüssel schaltet am 2. August die Durchsetzung gegen Modell-Anbieter scharf, verschiebt aber die Hochrisiko-Pflichten um zwei Jahre. Dazwischen adoptiert der deutsche Mittelstand schnell (54,5 % oder 41 % — je nach Studie), ist aber kaum Act-bereit. Genau in diese Lücke zielt die twiceD-Idee unten.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Deployment-Krieg</strong> (02.07): Microsoft Frontier (2,5 Mrd. $, 6.000 Experten), AWS (1 Mrd. $), Meta Enterprise Solutions — alle in einer Woche. Der Engpass ist nicht das Modell, sondern der Einbau.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Cisco</strong>: ein persönlicher KI-Agent für rund <strong>90.000</strong> Mitarbeitende, ab Ende Juli — läuft on-prem und routet jede Aufgabe aufs billigste ausreichende Modell.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI Act, 02.08</strong>: GPAI-Durchsetzung geht an (Bußen bis <strong>3 % Umsatz</strong> bzw. 15 Mio. €), während der Digital Omnibus die Hochrisiko-Pflichten auf Dez 2027 / Aug 2028 verschiebt.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand-Adoption</strong>: ifo meldet <strong>54,5 %</strong> (Mai 2026), Bitkom <strong>41 %</strong> (April 2026) — zwei Studien, zwei Populationen, beide echt.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Readiness-Lücke</strong>: 48,6 % der deutschen Firmen haben sich noch nicht ernsthaft mit der Act-Umsetzung befasst.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Bradesco</strong>: 600 Live-Anwendungsfälle auf eigener Plattform; der Assistent BIA bei <strong>25 Mio.</strong> Interaktionen und 87 % Lösungsquote.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner-Prognose</strong>: 40 % der Unternehmens-Apps mit aufgaben­spezifischen Agenten bis Ende 2026 (von &lt;5 %) — Prognose, kein Ist.</li>\n      <li><span class=\"chip good\">twiceD</span> Die Lücke: <strong>Runtime-Governance</strong> für KI-Agenten, zugeschnitten und bepreist für den Mittelstand — die niemand füllt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The value in enterprise AI visibly shifted this week <strong>from the model to the deployment</strong> — and three signals show it almost simultaneously. Hyperscalers are buying armies of \"forward-deployed\" engineers: Microsoft is putting <strong>$2.5 billion</strong> and 6,000 experts into a new deployment company, AWS adds <strong>$1 billion</strong> alongside it, and Meta is launching an enterprise unit. Cisco is rolling an AI agent out to <strong>90,000</strong> desks — on-prem, cost-routed. And Brussels flips on enforcement against model providers on August 2, while pushing the high-risk obligations back by two years. In between, the German Mittelstand is adopting fast (54.5% or 41% — depending on the study), but is barely Act-ready. That's exactly the gap today's twiceD idea below targets.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Deployment war</strong> (07/02): Microsoft Frontier ($2.5 billion, 6,000 experts), AWS ($1 billion), Meta Enterprise Solutions — all in one week. The bottleneck isn't the model, it's the integration.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Cisco</strong>: a personal AI agent for around <strong>90,000</strong> employees, starting late July — runs on-prem and routes every task to the cheapest model that's good enough.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI Act, 08/02</strong>: GPAI enforcement goes live (fines up to <strong>3% of revenue</strong> or €15 million), while the Digital Omnibus pushes the high-risk obligations to Dec 2027 / Aug 2028.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Mittelstand adoption</strong>: ifo reports <strong>54.5%</strong> (May 2026), Bitkom <strong>41%</strong> (April 2026) — two studies, two populations, both real.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Readiness gap</strong>: 48.6% of German firms haven't seriously engaged with Act implementation yet.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Bradesco</strong>: 600 live use cases on its own platform; the assistant BIA at <strong>25 million</strong> interactions and an 87% resolution rate.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner forecast</strong>: 40% of enterprise apps with task-specific agents by end of 2026 (up from &lt;5%) — a forecast, not a measured reality.</li>\n      <li><span class=\"chip good\">twiceD</span> The gap: <strong>runtime governance</strong> for AI agents, sized and priced for the Mittelstand — that nobody is filling.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O valor da IA corporativa migrou visivelmente esta semana <strong>do modelo para a implementação</strong> — e três sinais mostram isso quase ao mesmo tempo. As big techs de nuvem estão comprando exércitos de engenheiros \"embarcados no cliente\": a Microsoft coloca <strong>US$ 2,5 bi</strong> e 6.000 especialistas em uma nova empresa de implementação, a AWS soma mais <strong>US$ 1 bi</strong>, e a Meta cria uma unidade corporativa. A Cisco leva um agente de IA para <strong>90.000</strong> mesas de trabalho — on-premise, com roteamento por custo. E Bruxelas ativa, em 2 de agosto, a fiscalização contra os provedores de modelos, mas adia as obrigações de alto risco em dois anos. No meio disso, as médias empresas alemãs adotam IA rapidamente (54,5% ou 41% — dependendo do estudo), mas estão longe de prontas para o AI Act. É exatamente nessa brecha que mira a ideia twiceD abaixo.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Guerra do deployment</strong> (02/07): Microsoft Frontier (US$ 2,5 bi, 6.000 especialistas), AWS (US$ 1 bi), Meta Enterprise Solutions — tudo em uma semana. O gargalo não é o modelo, é a implementação.</li>\n      <li><span class=\"chip hot\">DEPLOY · EUA</span> <strong>Cisco</strong>: um agente de IA pessoal para cerca de <strong>90.000</strong> funcionários, a partir do fim de julho — roda on-premise e direciona cada tarefa para o modelo mais barato que dá conta do recado.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>AI Act, 02/08</strong>: a fiscalização de GPAI entra em vigor (multas de até <strong>3% do faturamento</strong> ou € 15 milhões), enquanto o Digital Omnibus adia as obrigações de alto risco para dez/2027 e ago/2028.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Adoção nas médias empresas</strong>: o ifo registra <strong>54,5%</strong> (maio de 2026), o Bitkom <strong>41%</strong> (abril de 2026) — dois estudos, duas populações, ambos reais.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Lacuna de preparação</strong>: 48,6% das empresas alemãs ainda não trataram a implementação do AI Act com seriedade.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Bradesco</strong>: 600 casos de uso em produção em plataforma própria; o assistente BIA soma <strong>25 milhões</strong> de interações e 87% de taxa de resolução.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Previsão da Gartner</strong>: 40% dos apps corporativos com agentes específicos por tarefa até o fim de 2026 (ante &lt;5%) — previsão, não realidade medida.</li>\n      <li><span class=\"chip good\">twiceD</span> A brecha: <strong>governança de runtime</strong> para agentes de IA, sob medida e com preço acessível para médias empresas — que ninguém está preenchendo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El valor de la IA corporativa migró visiblemente esta semana <strong>del modelo a la implementación</strong> — y tres señales lo muestran casi al mismo tiempo. Las hiperescaladoras están comprando ejércitos de ingenieros \"desplegados en sitio\": Microsoft pone <strong>US$ 2,5 mil millones</strong> y 6.000 expertos en una nueva empresa de implementación, AWS suma otros <strong>US$ 1 mil millones</strong>, y Meta crea una unidad empresarial. Cisco lleva un agente de IA a <strong>90.000</strong> escritorios — on-premise y con enrutamiento por costo. Y Bruselas activa, el 2 de agosto, la aplicación de la ley contra los proveedores de modelos, pero pospone dos años las obligaciones de alto riesgo. En medio de esto, la mediana empresa alemana adopta IA rápido (54,5% o 41%, según el estudio), pero apenas está lista para el AI Act. Justo en ese hueco apunta la idea twiceD de abajo.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Guerra del deployment</strong> (02/07): Microsoft Frontier (US$ 2,5 mil millones, 6.000 expertos), AWS (US$ 1 mil millones), Meta Enterprise Solutions — todo en una semana. El cuello de botella no es el modelo, es la implementación.</li>\n      <li><span class=\"chip hot\">DEPLOY · EE. UU.</span> <strong>Cisco</strong>: un agente de IA personal para cerca de <strong>90.000</strong> empleados, a partir de finales de julio — corre on-premise y enruta cada tarea al modelo más barato que sea suficiente.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>AI Act, 02/08</strong>: la aplicación de las reglas de GPAI entra en vigor (multas de hasta <strong>3% de los ingresos</strong> o €15 millones), mientras el Digital Omnibus pospone las obligaciones de alto riesgo a dic 2027 / ago 2028.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Adopción en la mediana empresa</strong>: el ifo reporta <strong>54,5%</strong> (mayo de 2026), Bitkom <strong>41%</strong> (abril de 2026) — dos estudios, dos poblaciones, ambos reales.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Brecha de preparación</strong>: 48,6% de las empresas alemanas todavía no se ha tomado en serio la implementación del AI Act.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>Bradesco</strong>: 600 casos de uso en producción sobre plataforma propia; el asistente BIA con <strong>25 millones</strong> de interacciones y 87% de tasa de resolución.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Pronóstico de Gartner</strong>: 40% de las apps empresariales con agentes específicos por tarea para fines de 2026 (desde &lt;5%) — un pronóstico, no una realidad medida.</li>\n      <li><span class=\"chip good\">twiceD</span> El hueco: <strong>gobernanza de runtime</strong> para agentes de IA, hecha a la medida y con precio accesible para la mediana empresa — que nadie está cubriendo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das Signatur-Stück des Tages sind drei EU-Ausschreibungen — und zum ersten Mal seit Tagen ist eine dabei, die twiceD womöglich <em>allein</em> bieten könnte. <strong>Dataport</strong> (Linux-Client-Distribution + 3rd-Level-Support, Frist 27.07) und <strong>Helaba</strong> (Oracle-Data-Warehouse, Frist 10.08) bleiben klare Partner-Fälle — Personal-, Umsatz- und Referenz-Schwellen liegen über twiceDs Solo-Kapazität. Aber das <strong>Leibniz-Institut IWT Bremen</strong> (modulare Datenveredelungs-/Workflow-Komponenten, Frist 06.08) zeigt in der TED-API nur eine niedrige Hürde — Eigenerklärung plus drei Referenzen, keine Umsatz-/Personal-Schwelle. Das wäre ein möglicher ✅ Direkt-Fit — <strong>aber ich verifiziere das nicht als bestätigt</strong>: die API lieferte für diese Notiz nur eine einzige Eignungs-Klausel, das kann Trunkierung sein. Verlässlich erst nach Blick in die volle Notiz. Darunter läuft das Board unverändert voll: <strong>70 verifizierte Listings</strong> (60 Freelance / 6 Employee / 4 Intriguing), dieselbe Frankfurter Drei-Wege-Spitze bei <strong>Fit 88</strong> (iSAX, BridgingIT, Keil), Sätze recherchiert bei <strong>90–120 €/h*</strong> — genau am Software-Boden von 90 €/h des Freelancer-Kompass 2026, nicht darüber. Und ein neues Regulatorik-Signal, das Daniels Remote-aus-Brasilien-Setup direkt betrifft.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Drei Ausschreibungen, drei Modelle</strong>: Dataport (⚠️ Partner — Linux-Client-Distro/3rd-Level, ≥10 FTE + Public-Sector-Linux-Referenz + 5-Mio.-Versicherung, Frist 27.07); Helaba (⚠️ Partner — Oracle-DWH, ≥1,5 Mio. € Umsatz + eigenes DWH-Personal + Oracle-Referenz, Frist 10.08); IWT Bremen (möglicher ✅ Alleingang — nur Eigenerklärung + 3 Referenzen sichtbar, Frist 06.08, <em>zu verifizieren</em>).</li>\n      <li><span class=\"chip\">Rate</span> <strong>Software-Median am Boden</strong>: Freelancer-Kompass 2026 (02.07) nennt DACH-IT-Median <strong>95 €/h</strong>, Software-/Webentwicklung <strong>90 €/h</strong> (niedrigste Spezialisierung), SAP/ERP 120 €/h. Die kursierende <strong>103–104-€/h-Zahl</strong> ist eine <em>andere</em> Grundgesamtheit (alle Freelancer-Typen, design-/beratungslastig) — nicht der IT-Satz, und die Sekundärquellen widersprechen sich sogar bei der Richtung.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board voll und stabil</strong>: 70 Listings, Ø Fit <strong>66</strong>, Drei-Wege-Spitze Fit 88 (iSAX, BridgingIT, Keil), Java 35× / Angular 31× / Spring Boot 29× — 58 tragen den Remote-Tag, 17 Listings ≥ 80, 31 ≥ 70.</li>\n      <li><span class=\"chip\">Regulatorik</span> <strong>Neu fürs BR-Remote-Setup</strong>: Das KI-Prüftool „KIRA\" der Deutschen Rentenversicherung soll 2026 bundesweit ausrollen und greift laut Bericht auch bei Auftragnehmern mit <em>ausländischem Wohnsitz</em>, wenn der Auftraggeber deutsch ist; die EU-Plattformarbeits-Richtlinie ist bis 02.12.2026 in DE-Recht umzusetzen (Beweislast-Umkehr).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nische hält, Volumen dünn</strong>: HENNING (Automotive Ingolstadt, Java/Groovy/Spring Boot, Fit 86) führt; dahinter CAES (Java-Backend Automotive Stuttgart, Spring Boot/Kotlin, 59). Skill-Match stark, wenige Slots.</li>\n      <li><span class=\"chip\">CH</span> <strong>KI-Aufschlag hält</strong>: ELCA (Agentic AI, CHF 140–190 k*, Fit 81), AXA (Python-Agentic-AI, CHF 130–170 k*, 80), Camunda (Kubernetes, work-from-anywhere, 80) über Median; JetBrains Principal FDE (82) ist Mission, nicht Satz.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Freeze ≠ Freelance-Flaute</strong>: VW-Aufsichtsrat lehnte am 09.07 die Schließung von vier deutschen Werken ab — nächster Punkt der Halbjahresbericht am 23.07; SAPs Restrukturierung soll (sekundär berichtet) auf 9.000–10.000 Stellen geweitet sein. Konzern-/Automotive-Ebene, nicht der KMU-Freelance-Markt des Boards.</li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>Nur 6 von 70 datiert</strong>: freelancermap gibt für die meisten Projekte kein Posting-Datum aus („n/a\") — systemisch, kein Scrape-Fehler. Und die viel zitierte Bitkom-Zahl (109.000 offene IT-Stellen) ist ~11 Monate alt — heute bewusst kein Signal.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Today's signature piece is three EU tenders — and for the first time in days, one of them might be a case twiceD could bid on <em>alone</em>. <strong>Dataport</strong> (Linux client distribution + 3rd-level support, deadline 27.07) and <strong>Helaba</strong> (Oracle data warehouse, deadline 10.08) remain clear partner cases — the staffing, revenue, and reference thresholds sit above twiceD's solo capacity. But the <strong>Leibniz Institute IWT Bremen</strong> (modular data-refinement/workflow components, deadline 06.08) shows only a low hurdle in the TED API — a self-declaration plus three references, no revenue/staffing threshold. That would be a possible ✅ direct fit — <strong>but I'm not verifying this as confirmed</strong>: the API returned only a single eligibility clause for this notice, which could be truncation. Reliable only after checking the full notice. Below that, the board keeps running full and unchanged: <strong>70 verified listings</strong> (60 freelance / 6 employee / 4 intriguing), the same Frankfurt three-way tie at <strong>fit 88</strong> (iSAX, BridgingIT, Keil), rates researched at <strong>€90–120/h*</strong> — right at the software floor of €90/h from the Freelancer Kompass 2026, not above it. And a new regulatory signal that directly affects Daniel's remote-from-Brazil setup.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Three tenders, three models</strong>: Dataport (⚠️ partner — Linux client distro/3rd-level, ≥10 FTE + public-sector Linux reference + €5M insurance, deadline 27.07); Helaba (⚠️ partner — Oracle DWH, ≥€1.5M revenue + own DWH staff + Oracle reference, deadline 10.08); IWT Bremen (possible ✅ solo shot — only a self-declaration + 3 references visible, deadline 06.08, <em>to be verified</em>).</li>\n      <li><span class=\"chip\">Rate</span> <strong>Software median at the floor</strong>: Freelancer Kompass 2026 (07/02) puts the DACH IT median at <strong>€95/h</strong>, software/web development <strong>€90/h</strong> (lowest specialization), SAP/ERP €120/h. The circulating <strong>€103–104/h figure</strong> is a <em>different</em> population (all freelancer types, design-/consulting-heavy) — not the IT rate, and the secondary sources even disagree on the direction.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board full and stable</strong>: 70 listings, avg. fit <strong>66</strong>, three-way top at fit 88 (iSAX, BridgingIT, Keil), Java 35× / Angular 31× / Spring Boot 29× — 58 carry the remote tag, 17 listings ≥ 80, 31 ≥ 70.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>New for the BR remote setup</strong>: The German pension insurer's AI audit tool \"KIRA\" is set to roll out nationwide in 2026 and, per the report, also applies to contractors with <em>foreign residence</em> when the client is German; the EU Platform Work Directive must be transposed into German law by 02.12.2026 (reversal of the burden of proof).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Niche holds, volume thin</strong>: HENNING (automotive Ingolstadt, Java/Groovy/Spring Boot, fit 86) leads; behind it CAES (Java backend automotive Stuttgart, Spring Boot/Kotlin, 59). Skill match strong, few slots.</li>\n      <li><span class=\"chip\">CH</span> <strong>AI premium holds</strong>: ELCA (agentic AI, CHF 140–190k*, fit 81), AXA (Python agentic AI, CHF 130–170k*, 80), Camunda (Kubernetes, work-from-anywhere, 80) above median; JetBrains Principal FDE (82) is mission, not rate.</li>\n      <li><span class=\"chip\">Market</span> <strong>Freeze ≠ freelance slump</strong>: VW's supervisory board rejected closing four German plants on 07/09 — next item is the half-year report on 07/23; SAP's restructuring is reported (secondhand) to have been widened to 9,000–10,000 positions. Corporate/automotive level, not the SME freelance market of the board.</li>\n      <li><span class=\"chip\">Data quality</span> <strong>Only 6 of 70 dated</strong>: freelancermap gives no posting date for most projects (\"n/a\") — systemic, not a scrape error. And the widely cited Bitkom figure (109,000 open IT positions) is ~11 months old — deliberately not treated as a signal today.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A peça de assinatura do dia são três licitações da UE — e pela primeira vez em dias, há uma em que a twiceD talvez pudesse concorrer <em>sozinha</em>. <strong>Dataport</strong> (distribuição Linux para estações de trabalho + suporte de 3º nível, prazo 27/07) e <strong>Helaba</strong> (data warehouse Oracle, prazo 10/08) seguem como casos claros de parceria — os limites de pessoal, faturamento e referências ficam acima da capacidade solo da twiceD. Mas o <strong>Instituto Leibniz IWT Bremen</strong> (componentes modulares de refinamento de dados/fluxos de trabalho, prazo 06/08) mostra na API do TED apenas uma barreira baixa — autodeclaração mais três referências, sem limite de faturamento/pessoal. Isso seria um possível ✅ encaixe direto — <strong>mas eu não confirmo isso como certo</strong>: a API retornou apenas uma única cláusula de habilitação para essa nota, o que pode ser truncamento. Só fica confiável depois de olhar a nota completa. Abaixo disso, o board segue rodando cheio e inalterado: <strong>70 vagas verificadas</strong> (60 freelance / 6 CLT/efetivo / 4 intrigantes), a mesma liderança tripla de Frankfurt com <strong>Fit 88</strong> (iSAX, BridgingIT, Keil), taxas pesquisadas entre <strong>90–120 €/h*</strong> — exatamente no piso de software de 90 €/h do Freelancer Kompass 2026, não acima dele. E um novo sinal regulatório que afeta diretamente o esquema remoto do Daniel a partir do Brasil.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Três licitações, três modelos</strong>: Dataport (⚠️ parceria — distro Linux/3º nível, ≥10 FTE + referência Linux no setor público + seguro de 5 milhões de euros, prazo 27/07); Helaba (⚠️ parceria — DWH Oracle, ≥1,5 milhão de euros de faturamento + pessoal próprio de DWH + referência Oracle, prazo 10/08); IWT Bremen (possível ✅ investida solo — só autodeclaração + 3 referências visíveis, prazo 06/08, <em>a ser verificado</em>).</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Mediana de software no piso</strong>: Freelancer Kompass 2026 (02/07) indica mediana de TI na DACH de <strong>95 €/h</strong>, desenvolvimento de software/web em <strong>90 €/h</strong> (especialização mais baixa), SAP/ERP 120 €/h. O número de <strong>103–104 €/h</strong> que anda circulando é de <em>outra</em> população (todos os tipos de freelancer, com peso em design/consultoria) — não é a taxa de TI, e as fontes secundárias nem concordam sobre a direção.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board cheio e estável</strong>: 70 vagas, fit médio <strong>66</strong>, liderança tripla com fit 88 (iSAX, BridgingIT, Keil), Java 35× / Angular 31× / Spring Boot 29× — 58 têm a tag remote, 17 vagas ≥ 80, 31 ≥ 70.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>Novidade para o esquema remoto do Brasil</strong>: A ferramenta de auditoria com IA \"KIRA\", do instituto alemão de previdência, deve ser implantada em todo o país em 2026 e, segundo a reportagem, também alcança contratados com <em>residência no exterior</em> quando o contratante é alemão; a Diretiva de Trabalho em Plataformas da UE precisa virar lei alemã até 02/12/2026 (com inversão do ônus da prova).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nicho se mantém, volume escasso</strong>: HENNING (automotivo em Ingolstadt, Java/Groovy/Spring Boot, fit 86) lidera; atrás dela CAES (backend Java automotivo em Stuttgart, Spring Boot/Kotlin, 59). Combinação de skills forte, poucas vagas.</li>\n      <li><span class=\"chip\">CH</span> <strong>Prêmio de IA se mantém</strong>: ELCA (IA agêntica, CHF 140–190 mil*, fit 81), AXA (plataforma de IA agêntica em Python, CHF 130–170 mil*, 80), Camunda (Kubernetes, trabalho de qualquer lugar, 80) acima da mediana; JetBrains Principal FDE (82) é missão, não taxa.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Congelamento ≠ retração no mercado freelance</strong>: o conselho de administração da VW rejeitou em 09/07 o fechamento de quatro fábricas alemãs — próximo ponto é o relatório semestral em 23/07; a reestruturação da SAP teria sido ampliada (segundo reportagem secundária) para 9.000–10.000 vagas. Nível de grandes corporações/automotivo, não o mercado freelance de PMEs do board.</li>\n      <li><span class=\"chip\">Qualidade dos dados</span> <strong>Só 6 de 70 datadas</strong>: a freelancermap não indica data de publicação para a maioria dos projetos (\"n/a\") — é sistêmico, não erro de coleta. E o número tão citado da Bitkom (109 mil vagas abertas de TI) tem ~11 meses — hoje, propositalmente, não é tratado como sinal.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La pieza distintiva del día son tres licitaciones de la UE — y por primera vez en días, hay una en la que twiceD podría ofertar <em>sola</em>. <strong>Dataport</strong> (distribución Linux de estación de trabajo + soporte de 3er nivel, plazo 27/07) y <strong>Helaba</strong> (data warehouse Oracle, plazo 10/08) siguen siendo casos claros de socio — los umbrales de personal, facturación y referencias quedan por encima de la capacidad en solitario de twiceD. Pero el <strong>Instituto Leibniz IWT Bremen</strong> (componentes modulares de refinamiento de datos/flujos de trabajo, plazo 06/08) muestra en la API de TED solo una barrera baja — declaración jurada más tres referencias, sin umbral de facturación ni de personal. Eso sería un posible ✅ encaje directo — <strong>pero no lo doy por confirmado</strong>: la API devolvió una única cláusula de aptitud para este aviso, y eso puede ser truncamiento. Solo será confiable tras revisar el aviso completo. Debajo de eso, el tablero sigue corriendo lleno y sin cambios: <strong>70 vacantes verificadas</strong> (60 freelance / 6 en plantilla / 4 intrigantes), el mismo triple empate de Frankfurt con <strong>Fit 88</strong> (iSAX, BridgingIT, Keil), tarifas investigadas en <strong>90–120 €/h*</strong> — justo en el piso de software de 90 €/h del Freelancer Kompass 2026, no por encima. Y una nueva señal regulatoria que afecta directamente el esquema remoto de Daniel desde Brasil.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Tres licitaciones, tres modelos</strong>: Dataport (⚠️ socio — distro Linux/3er nivel, ≥10 FTE + referencia Linux en sector público + seguro de 5 millones de euros, plazo 27/07); Helaba (⚠️ socio — DWH Oracle, ≥1.5 millones de euros de facturación + personal propio de DWH + referencia Oracle, plazo 10/08); IWT Bremen (posible ✅ tiro en solitario — solo declaración jurada + 3 referencias visibles, plazo 06/08, <em>por verificar</em>).</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Mediana de software en el piso</strong>: el Freelancer Kompass 2026 (02/07) marca una mediana de TI en la región DACH de <strong>95 €/h</strong>, desarrollo de software/web en <strong>90 €/h</strong> (la especialización más baja), SAP/ERP 120 €/h. La cifra de <strong>103–104 €/h</strong> que anda circulando es de <em>otra</em> población (todos los tipos de freelancer, con peso en diseño/consultoría) — no es la tarifa de TI, y las fuentes secundarias ni siquiera coinciden en la dirección.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Tablero lleno y estable</strong>: 70 vacantes, fit promedio <strong>66</strong>, triple empate en la cima con fit 88 (iSAX, BridgingIT, Keil), Java 35× / Angular 31× / Spring Boot 29× — 58 llevan la etiqueta remote, 17 vacantes ≥ 80, 31 ≥ 70.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>Novedad para el esquema remoto desde Brasil</strong>: la herramienta de auditoría con IA \"KIRA\", del instituto alemán de pensiones, se espera que se despliegue a nivel nacional en 2026 y, según el reporte, también alcanza a contratistas con <em>residencia en el extranjero</em> cuando el cliente es alemán; la Directiva de Trabajo en Plataformas de la UE debe convertirse en ley alemana a más tardar el 02/12/2026 (con inversión de la carga de la prueba).</li>\n      <li><span class=\"chip\">IoT</span> <strong>El nicho se mantiene, el volumen es escaso</strong>: HENNING (automotriz en Ingolstadt, Java/Groovy/Spring Boot, fit 86) encabeza; detrás CAES (backend Java automotriz en Stuttgart, Spring Boot/Kotlin, 59). Coincidencia de habilidades fuerte, pocos espacios.</li>\n      <li><span class=\"chip\">CH</span> <strong>La prima de IA se mantiene</strong>: ELCA (IA agéntica, CHF 140–190 mil*, fit 81), AXA (plataforma de IA agéntica en Python, CHF 130–170 mil*, 80), Camunda (Kubernetes, trabajo desde cualquier lugar, 80) por encima de la mediana; JetBrains Principal FDE (82) es misión, no tarifa.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Congelamiento ≠ caída del mercado freelance</strong>: el consejo de vigilancia de VW rechazó el 09/07 el cierre de cuatro plantas alemanas — el próximo punto es el informe semestral el 23/07; la reestructuración de SAP habría sido ampliada (según reporte secundario) a 9,000–10,000 puestos. Nivel corporativo/automotriz, no el mercado freelance de pymes del tablero.</li>\n      <li><span class=\"chip\">Calidad de datos</span> <strong>Solo 6 de 70 con fecha</strong>: freelancermap no indica fecha de publicación para la mayoría de los proyectos (\"n/a\") — es sistémico, no un error de extracción. Y la muy citada cifra de Bitkom (109,000 vacantes de TI abiertas) tiene ~11 meses — hoy, deliberadamente, no se trata como señal.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute Abend rollt der Ball im zweiten WM-Halbfinale — Argentinien gegen England in Atlanta, für dich in Brasilien um 16:00 Uhr. Der Finalgegner steht schon fest: Spanien hat gestern Frankreich 2:0 geschlagen und wartet am Sonntag in New Jersey. Für einen deutschen Fan mit Wohnsitz in Südbrasilien ist es ein Turnier ohne Herzverein — Deutschland und die Seleção sind beide früh raus. Dafür läuft daheim der eigentliche Sommer-Krimi: In Freiburg steht mit Manzambi der teuerste Verkauf der Klubgeschichte kurz vor dem Abschluss.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Halbfinale HEUTE</strong>: Argentinien–England, Atlanta (Mercedes-Benz Stadium), 21:00 MESZ / 16:00 BRT. Der Sieger trifft im Finale (So 19.07.) auf Spanien.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien im Finale</strong>: 2:0 gegen Frankreich gestern (Oyarzabal 22' Foulelfmeter, Porro 58') — erstes spanisches WM-Finale seit 2010.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi-Rekordabgang</strong>: Wechsel zu Aston Villa, Paket bis ~70 Mio. € inkl. Boni — Freiburgs teuerster Verkauf. Laut Sky (Stand 15.07.) noch nicht offiziell.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Kader-Umbau</strong>: Neuzugänge Backhaus (Tor, ex-Bremen), Yamamoto (~7 Mio., ex-St. Truiden), Gotō (Japan-WM); Adamu zu Schalke, Wagner fest nach Dresden.</li>\n      <li><span class=\"chip\">WM</span> <strong>Beide Herzensteams raus</strong>: Deutschland im Sechzehntelfinale an Paraguay (1:1, 3:4 i.E.), Brasilien im Achtelfinale an Norwegen (1:2, Haaland-Doppelpack, 05.07.).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 abgehakt</strong>: Bayern Meister (89 Pkt., 122 Tore — Klubrekord), Freiburg 7. (47 Pkt.), Wolfsburg nach 29 Jahren abgestiegen.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão in der WM-Pause</strong>: Palmeiras führt (41 Pkt.), Chapecoense Schlusslicht (9 Pkt.). Volle Tabelle im Body.</li>\n      <li><span class=\"chip\">WM</span> <strong>Restprogramm</strong>: Spiel um Platz 3 Sa 18.07. Miami (23:00 MESZ / 18:00 BRT), Finale So 19.07. New York/New Jersey (21:00 MESZ / 16:00 BRT).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute Abend rollt der Ball im zweiten WM-Halbfinale — Argentinien gegen England in Atlanta, für dich in Brasilien um 16:00 Uhr. Der Finalgegner steht schon fest: Spanien hat gestern Frankreich 2:0 geschlagen und wartet am Sonntag in New Jersey. Für einen deutschen Fan mit Wohnsitz in Südbrasilien ist es ein Turnier ohne Herzverein — Deutschland und die Seleção sind beide früh raus. Dafür läuft daheim der eigentliche Sommer-Krimi: In Freiburg steht mit Manzambi der teuerste Verkauf der Klubgeschichte kurz vor dem Abschluss.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Halbfinale HEUTE</strong>: Argentinien–England, Atlanta (Mercedes-Benz Stadium), 21:00 MESZ / 16:00 BRT. Der Sieger trifft im Finale (So 19.07.) auf Spanien.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien im Finale</strong>: 2:0 gegen Frankreich gestern (Oyarzabal 22' Foulelfmeter, Porro 58') — erstes spanisches WM-Finale seit 2010.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi-Rekordabgang</strong>: Wechsel zu Aston Villa, Paket bis ~70 Mio. € inkl. Boni — Freiburgs teuerster Verkauf. Laut Sky (Stand 15.07.) noch nicht offiziell.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Kader-Umbau</strong>: Neuzugänge Backhaus (Tor, ex-Bremen), Yamamoto (~7 Mio., ex-St. Truiden), Gotō (Japan-WM); Adamu zu Schalke, Wagner fest nach Dresden.</li>\n      <li><span class=\"chip\">WM</span> <strong>Beide Herzensteams raus</strong>: Deutschland im Sechzehntelfinale an Paraguay (1:1, 3:4 i.E.), Brasilien im Achtelfinale an Norwegen (1:2, Haaland-Doppelpack, 05.07.).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 abgehakt</strong>: Bayern Meister (89 Pkt., 122 Tore — Klubrekord), Freiburg 7. (47 Pkt.), Wolfsburg nach 29 Jahren abgestiegen.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão in der WM-Pause</strong>: Palmeiras führt (41 Pkt.), Chapecoense Schlusslicht (9 Pkt.). Volle Tabelle im Body.</li>\n      <li><span class=\"chip\">WM</span> <strong>Restprogramm</strong>: Spiel um Platz 3 Sa 18.07. Miami (23:00 MESZ / 18:00 BRT), Finale So 19.07. New York/New Jersey (21:00 MESZ / 16:00 BRT).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Tonight the ball rolls in the second World Cup semifinal — Argentina against England in Atlanta, kicking off at 4:00 PM for you in Brazil. The finalist on the other side is already set: Spain beat France 2-0 yesterday and awaits on Sunday in New Jersey. For a German fan living in southern Brazil, it's a tournament without a favorite to root for — both Germany and the Seleção are long gone. Back home, though, the real summer drama is unfolding: in Freiburg, Manzambi's transfer is close to becoming the club's most expensive sale ever.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Semifinal TODAY</strong>: Argentina–England, Atlanta (Mercedes-Benz Stadium), 9:00 PM CEST / 4:00 PM BRT. The winner meets Spain in the final (Sun, July 19).</li>\n      <li><span class=\"chip good\">World Cup</span> <strong>Spain reaches the final</strong>: 2-0 win over France yesterday (Oyarzabal 22' penalty, Porro 58') — Spain's first World Cup final since 2010.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi record sale</strong>: Move to Aston Villa, package up to roughly €70 million including bonuses — Freiburg's most expensive sale. Per Sky (as of July 15), still not official.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Squad rebuild</strong>: New arrivals Backhaus (keeper, ex-Bremen), Yamamoto (~€7m, ex-St. Truiden), Gotō (Japan World Cup squad); Adamu to Schalke, Wagner made permanent at Dresden.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Both favorite teams eliminated</strong>: Germany lost in the round of 32 to Paraguay (1-1, 3-4 on penalties), Brazil lost in the round of 16 to Norway (1-2, Haaland brace, July 5).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 in the books</strong>: Bayern champions (89 pts, 122 goals — club record), Freiburg 7th (47 pts), Wolfsburg relegated after 29 years.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão on its World Cup break</strong>: Palmeiras lead (41 pts), Chapecoense bottom (9 pts). Full table in the body.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Remaining schedule</strong>: Third-place match Sat, July 18, Miami (11:00 PM CEST / 6:00 PM BRT), final Sun, July 19, New York/New Jersey (9:00 PM CEST / 4:00 PM BRT).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje à noite a bola rola na segunda semifinal da Copa do Mundo — Argentina contra Inglaterra em Atlanta, com bola rolando às 16h para quem está no Brasil. O adversário da final já está definido: a Espanha bateu a França por 2 a 0 ontem e espera o rival no domingo, em Nova Jersey. Para um torcedor alemão morando no sul do Brasil, é um torneio sem time do coração — Alemanha e Seleção já caíram cedo. Em compensação, o verdadeiro drama do verão acontece em casa: em Freiburg, a transferência de Manzambi está perto de se tornar a venda mais cara da história do clube.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Semifinal HOJE</strong>: Argentina–Inglaterra, Atlanta (Mercedes-Benz Stadium), 21h00 CEST / 16h00 BRT. O vencedor enfrenta a Espanha na final (dom, 19/07).</li>\n      <li><span class=\"chip good\">Copa</span> <strong>Espanha na final</strong>: vitória por 2 a 0 sobre a França ontem (Oyarzabal 22', pênalti, Porro 58') — primeira final de Copa da Espanha desde 2010.</li>\n      <li><span class=\"chip hot\">Transferência</span> <strong>Venda recorde de Manzambi</strong>: transferência para o Aston Villa, pacote de até cerca de € 70 milhões com bônus incluídos — a venda mais cara da história do Freiburg. Segundo a Sky (até 15/07), ainda não oficial.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Reformulação de elenco</strong>: chegadas de Backhaus (gol, ex-Bremen), Yamamoto (~€ 7 milhões, ex-St. Truiden), Gotō (Copa do Japão); Adamu vai para o Schalke, Wagner é efetivado no Dresden.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Os dois times do coração já caíram</strong>: Alemanha eliminada na fase de 32 pelo Paraguai (1 a 1, 3 a 4 nos pênaltis), Brasil eliminado nas oitavas pela Noruega (1 a 2, dobradinha de Haaland, 05/07).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 encerrada</strong>: Bayern campeão (89 pts, 122 gols — recorde do clube), Freiburg em 7º (47 pts), Wolfsburg rebaixado após 29 anos.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão na pausa da Copa</strong>: Palmeiras na liderança (41 pts), Chapecoense na lanterna (9 pts). Tabela completa no corpo do texto.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Restante do calendário</strong>: disputa de 3º lugar sáb, 18/07, Miami (23h00 CEST / 18h00 BRT), final dom, 19/07, Nova York/Nova Jersey (21h00 CEST / 16h00 BRT).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta noche rueda el balón en la segunda semifinal del Mundial — Argentina contra Inglaterra en Atlanta, con inicio a las 16:00 horas para ti en Brasil. El rival de la final ya está definido: España venció a Francia 2-0 ayer y espera el domingo en Nueva Jersey. Para un aficionado alemán radicado en el sur de Brasil, es un torneo sin equipo del corazón — Alemania y la Selección brasileña quedaron eliminadas desde temprano. En cambio, en casa se vive el verdadero drama del verano: en Friburgo, la transferencia de Manzambi está a punto de convertirse en la venta más cara en la historia del club.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Semifinal HOY</strong>: Argentina–Inglaterra, Atlanta (Mercedes-Benz Stadium), 21:00 CEST / 16:00 BRT. El ganador se enfrenta a España en la final (dom 19/07).</li>\n      <li><span class=\"chip good\">Mundial</span> <strong>España a la final</strong>: victoria 2-0 sobre Francia ayer (Oyarzabal 22', penal, Porro 58') — la primera final mundialista de España desde 2010.</li>\n      <li><span class=\"chip hot\">Transferencia</span> <strong>Venta récord de Manzambi</strong>: traspaso al Aston Villa, paquete de hasta unos 70 millones de euros con bonos incluidos — la venta más cara de Friburgo. Según Sky (al 15/07), aún no es oficial.</li>\n      <li><span class=\"chip good\">Friburgo</span> <strong>Renovación de plantilla</strong>: llegadas de Backhaus (portero, ex-Bremen), Yamamoto (~7 millones de euros, ex-St. Truiden), Gotō (Mundial de Japón); Adamu se va al Schalke, Wagner queda de forma definitiva en el Dresden.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Los dos equipos del corazón, eliminados</strong>: Alemania cayó en la ronda de 32 ante Paraguay (1-1, 3-4 en penales), Brasil cayó en octavos ante Noruega (1-2, doblete de Haaland, 05/07).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 cerrada</strong>: Bayern campeón (89 pts, 122 goles — récord del club), Friburgo 7º (47 pts), Wolfsburg descendió tras 29 años.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão en pausa por el Mundial</strong>: Palmeiras lidera (41 pts), Chapecoense es el último lugar (9 pts). Tabla completa en el cuerpo del texto.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Calendario restante</strong>: partido por el tercer lugar sáb 18/07, Miami (23:00 CEST / 18:00 BRT), final dom 19/07, Nueva York/Nueva Jersey (21:00 CEST / 16:00 BRT).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Mittwoch, der 15. Juli. Die Formel 1 pausiert noch bis Freitag, wenn in Spa die erste Session der zweiten Saisonhälfte rollt — doch der Fahrermarkt kocht weiter. Die <strong>Verstappen-Klausel</strong> ist rechnerisch schon jetzt entriegelt: Er kann bis zur Sommerpause die Top zwei nicht mehr erreichen. Was danach passiert, ist dagegen <em>offen</em> — und die Berichte widersprechen sich: Zak Brown von McLaren dementiert öffentlich, während andere Quellen von laufenden Gesprächen sprechen. Dazu heute aufgelöst: der WEC-Zwischenfall aus São Paulo, der hier gestern noch als ungeklärt lief. Und ein Blick aufs Spa-Wochenende, das übermorgen beginnt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Fahrermarkt</span> <strong>Klausel greift, Zukunft offen</strong>: Die Auslöse-Bedingung ist rechnerisch erfüllt — aber ob Verstappen bleibt oder zu McLaren wechselt, ist <em>umstritten</em>. Zak Brown dementiert, laut <a href=\"https://www.motorsportweek.com/2026/07/08/max-verstappen-red-bull-mclaren-f1-rumours/\">Motorsport Week</a> ist eine McLaren-Option dennoch im Spiel.</li>\n      <li><span class=\"chip\">Fahrermarkt · Mathe</span> <strong>Top-2 nicht mehr erreichbar</strong>: 76 Punkte (P7), höchstens 126 bis Ungarn (26.07.), Russell steht auf P2 bereits bei 154. Bedingung sicher erfüllt.</li>\n      <li><span class=\"chip good\">F1 · Spa</span> <strong>Dieses Wochenende</strong> (17.–19.07.): Rennen So 19.07. <strong>15:00 MESZ / 10:00 BRT</strong>, kein Sprint — alle Sessions liegen für Daniel am Vormittag.</li>\n      <li><span class=\"chip hot\">WEC · geklärt</span> <strong>São-Paulo-Zwischenfall aufgelöst</strong>: 5-Sekunden-Strafe für den <strong>BMW #20</strong>, Endplatz 8, 4 Punkte. Einzelquelle (gpkingdom.it) — vorsichtig attribuiert; die Herstellerwertung ändert sich an der Spitze nicht.</li>\n      <li><span class=\"chip\">F1 · Technik</span> <strong>Newey-Upgrade erst in Ungarn</strong> (24.–26.07.), nicht in Spa — Aston Martin liegt mit einem Punkt auf P10.</li>\n      <li><span class=\"chip\">F1 · Tabelle</span> <strong>Unverändert seit Silverstone</strong>: Antonelli 179, Mercedes 333 — heute erneut über formula1.com bestätigt (kein Rennen in der Pause).</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martín 208 führt</strong>; Restart British GP Silverstone 07.–09.08. — Session-Zeiten offiziell noch nicht bestätigt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Mittwoch, der 15. Juli. Die Formel 1 pausiert noch bis Freitag, wenn in Spa die erste Session der zweiten Saisonhälfte rollt — doch der Fahrermarkt kocht weiter. Die <strong>Verstappen-Klausel</strong> ist rechnerisch schon jetzt entriegelt: Er kann bis zur Sommerpause die Top zwei nicht mehr erreichen. Was danach passiert, ist dagegen <em>offen</em> — und die Berichte widersprechen sich: Zak Brown von McLaren dementiert öffentlich, während andere Quellen von laufenden Gesprächen sprechen. Dazu heute aufgelöst: der WEC-Zwischenfall aus São Paulo, der hier gestern noch als ungeklärt lief. Und ein Blick aufs Spa-Wochenende, das übermorgen beginnt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Fahrermarkt</span> <strong>Klausel greift, Zukunft offen</strong>: Die Auslöse-Bedingung ist rechnerisch erfüllt — aber ob Verstappen bleibt oder zu McLaren wechselt, ist <em>umstritten</em>. Zak Brown dementiert, laut <a href=\"https://www.motorsportweek.com/2026/07/08/max-verstappen-red-bull-mclaren-f1-rumours/\">Motorsport Week</a> ist eine McLaren-Option dennoch im Spiel.</li>\n      <li><span class=\"chip\">Fahrermarkt · Mathe</span> <strong>Top-2 nicht mehr erreichbar</strong>: 76 Punkte (P7), höchstens 126 bis Ungarn (26.07.), Russell steht auf P2 bereits bei 154. Bedingung sicher erfüllt.</li>\n      <li><span class=\"chip good\">F1 · Spa</span> <strong>Dieses Wochenende</strong> (17.–19.07.): Rennen So 19.07. <strong>15:00 MESZ / 10:00 BRT</strong>, kein Sprint — alle Sessions liegen für Daniel am Vormittag.</li>\n      <li><span class=\"chip hot\">WEC · geklärt</span> <strong>São-Paulo-Zwischenfall aufgelöst</strong>: 5-Sekunden-Strafe für den <strong>BMW #20</strong>, Endplatz 8, 4 Punkte. Einzelquelle (gpkingdom.it) — vorsichtig attribuiert; die Herstellerwertung ändert sich an der Spitze nicht.</li>\n      <li><span class=\"chip\">F1 · Technik</span> <strong>Newey-Upgrade erst in Ungarn</strong> (24.–26.07.), nicht in Spa — Aston Martin liegt mit einem Punkt auf P10.</li>\n      <li><span class=\"chip\">F1 · Tabelle</span> <strong>Unverändert seit Silverstone</strong>: Antonelli 179, Mercedes 333 — heute erneut über formula1.com bestätigt (kein Rennen in der Pause).</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martín 208 führt</strong>; Restart British GP Silverstone 07.–09.08. — Session-Zeiten offiziell noch nicht bestätigt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Wednesday, July 15. Formula 1 stays on break until Friday, when the first session of the second half of the season rolls in Spa — but the driver market keeps boiling. The <strong>Verstappen clause</strong> is already mathematically unlocked: he can no longer reach the top two before the summer break. What happens after that, though, remains <em>open</em> — and the reports contradict each other: McLaren's Zak Brown publicly denies it, while other sources speak of ongoing talks. Also resolved today: the WEC incident from São Paulo, which was still listed as unresolved here yesterday. Plus a look ahead to the Spa weekend, which starts the day after tomorrow.</p>\n    <ul>\n      <li><span class=\"chip hot\">Driver market</span> <strong>Clause kicks in, future open</strong>: The trigger condition is mathematically met — but whether Verstappen stays or moves to McLaren is <em>disputed</em>. Zak Brown denies it; per <a href=\"https://www.motorsportweek.com/2026/07/08/max-verstappen-red-bull-mclaren-f1-rumours/\">Motorsport Week</a>, a McLaren option is still in play.</li>\n      <li><span class=\"chip\">Driver market · math</span> <strong>Top two out of reach</strong>: 76 points (P7), a maximum of 126 by Hungary (07/26), Russell already at 154 in P2. Condition definitively met.</li>\n      <li><span class=\"chip good\">F1 · Spa</span> <strong>This weekend</strong> (07/17–19): Race Sun 07/19, <strong>3:00 PM CEST / 10:00 AM BRT</strong>, no sprint — all sessions fall in the morning for Daniel.</li>\n      <li><span class=\"chip hot\">WEC · resolved</span> <strong>São Paulo incident resolved</strong>: 5-second penalty for the <strong>#20 BMW</strong>, finished 8th, 4 points. Single source (gpkingdom.it) — carefully attributed; the top of the manufacturers' standings doesn't change.</li>\n      <li><span class=\"chip\">F1 · Tech</span> <strong>Newey upgrade not until Hungary</strong> (07/24–26), not Spa — Aston Martin sits 10th with one point.</li>\n      <li><span class=\"chip\">F1 · Standings</span> <strong>Unchanged since Silverstone</strong>: Antonelli 179, Mercedes 333 — reconfirmed today via formula1.com (no race during the break).</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martín leads with 208</strong>; MotoGP restarts at the British GP Silverstone 08/07–09 — session times not yet officially confirmed.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É quarta-feira, 15 de julho. A Fórmula 1 segue em pausa até sexta-feira, quando a primeira sessão da segunda metade da temporada roda em Spa — mas o mercado de pilotos continua fervendo. A <strong>cláusula de Verstappen</strong> já está matematicamente destravada: ele não consegue mais alcançar os dois primeiros lugares até a pausa de verão. O que acontece depois, porém, é uma <em>incógnita</em> — e os relatos se contradizem: Zak Brown, da McLaren, nega publicamente, enquanto outras fontes falam em conversas em andamento. Também esclarecido hoje: o incidente da WEC em São Paulo, que aqui ontem ainda constava como sem solução. E um olhar para o fim de semana de Spa, que começa depois de amanhã.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado de pilotos</span> <strong>Cláusula vale, futuro em aberto</strong>: A condição de acionamento está matematicamente cumprida — mas se Verstappen fica ou vai para a McLaren é <em>controverso</em>. Zak Brown nega, mas segundo a <a href=\"https://www.motorsportweek.com/2026/07/08/max-verstappen-red-bull-mclaren-f1-rumours/\">Motorsport Week</a> uma opção McLaren ainda está em jogo.</li>\n      <li><span class=\"chip\">Mercado de pilotos · matemática</span> <strong>Top 2 fora de alcance</strong>: 76 pontos (P7), no máximo 126 até a Hungria (26/07), Russell já está em 154 no P2. Condição definitivamente cumprida.</li>\n      <li><span class=\"chip good\">F1 · Spa</span> <strong>Este fim de semana</strong> (17–19/07): Corrida dom 19/07, <strong>15h00 CEST / 10h00 BRT</strong>, sem sprint — todas as sessões caem pela manhã para Daniel.</li>\n      <li><span class=\"chip hot\">WEC · resolvido</span> <strong>Incidente de São Paulo esclarecido</strong>: punição de 5 segundos para a <strong>BMW #20</strong>, chegada em 8º, 4 pontos. Fonte única (gpkingdom.it) — atribuída com cautela; a liderança da classificação de fabricantes não muda.</li>\n      <li><span class=\"chip\">F1 · Técnica</span> <strong>Upgrade de Newey só na Hungria</strong> (24–26/07), não em Spa — Aston Martin está com um ponto no P10.</li>\n      <li><span class=\"chip\">F1 · Classificação</span> <strong>Inalterada desde Silverstone</strong>: Antonelli 179, Mercedes 333 — reconfirmado hoje via formula1.com (sem corrida na pausa).</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martín lidera com 208</strong>; retorno no British GP em Silverstone 07–09/08 — horários de sessão ainda não confirmados oficialmente.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es miércoles 15 de julio. La Fórmula 1 sigue de descanso hasta el viernes, cuando la primera sesión de la segunda mitad de la temporada arranca en Spa — pero el mercado de pilotos sigue hirviendo. La <strong>cláusula de Verstappen</strong> ya está matemáticamente desbloqueada: no puede alcanzar el top dos antes del receso de verano. Lo que pase después, en cambio, sigue <em>abierto</em> — y los reportes se contradicen: Zak Brown, de McLaren, lo niega públicamente, mientras otras fuentes hablan de conversaciones en curso. También resuelto hoy: el incidente de la WEC en São Paulo, que aquí ayer todavía figuraba como sin aclarar. Y un vistazo al fin de semana de Spa, que empieza pasado mañana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado de pilotos</span> <strong>La cláusula rige, futuro abierto</strong>: La condición para activarla está matemáticamente cumplida — pero si Verstappen se queda o se va a McLaren es motivo de <em>disputa</em>. Zak Brown lo niega; según <a href=\"https://www.motorsportweek.com/2026/07/08/max-verstappen-red-bull-mclaren-f1-rumours/\">Motorsport Week</a>, una opción con McLaren sigue en juego.</li>\n      <li><span class=\"chip\">Mercado de pilotos · matemáticas</span> <strong>Top 2 fuera de alcance</strong>: 76 puntos (P7), máximo 126 antes de Hungría (26/07), Russell ya está en 154 en el P2. Condición cumplida sin lugar a dudas.</li>\n      <li><span class=\"chip good\">F1 · Spa</span> <strong>Este fin de semana</strong> (17–19/07): Carrera dom 19/07, <strong>15:00 CEST / 10:00 BRT</strong>, sin sprint — todas las sesiones caen en la mañana para Daniel.</li>\n      <li><span class=\"chip hot\">WEC · resuelto</span> <strong>Incidente de São Paulo aclarado</strong>: sanción de 5 segundos para el <strong>BMW #20</strong>, llegó 8°, 4 puntos. Fuente única (gpkingdom.it) — atribuida con cautela; el liderato de la clasificación de fabricantes no cambia.</li>\n      <li><span class=\"chip\">F1 · Técnica</span> <strong>El upgrade de Newey llega hasta Hungría</strong> (24–26/07), no en Spa — Aston Martin está con un punto en el P10.</li>\n      <li><span class=\"chip\">F1 · Clasificación</span> <strong>Sin cambios desde Silverstone</strong>: Antonelli 179, Mercedes 333 — reconfirmado hoy vía formula1.com (no hubo carrera durante el receso).</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martín lidera con 208</strong>; regreso en el GP de Gran Bretaña, Silverstone, 07–09/08 — horarios de sesión aún sin confirmar oficialmente.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ferien-Tag drei — und der Tag hat zwei Gesichter. Draußen ist es freundlich: mild, sonnig, staubtrocken, ab morgen wieder Richtung 27°. Nebenan läuft Programm: In Ourinhos spielt heute Abend das Gratis-Musikfestival weiter, in Londrina füllt sich die Ferienwoche mit Kinder-Theater und Spielparks. Aber das wichtigste Thema steht drinnen: Der brasilianische Winter ist Atemwegssaison, und das neue InfoGripe-Bulletin zeigt zwar bundesweit erstmals einen Rückgang — für Paraná und unser vier Wochen altes Baby heißt das aber noch keine Entwarnung. Deshalb steht die Gesundheit heute oben. Immerhin: Bei Dengue gibt es endlich eine frische Zahl, und die ist ruhig.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Winter, Baby-Vorsicht</strong>: bundesweit dreht der SRAG-Trend erstmals nach 5 Monaten nach unten — aber RSV macht 55,9 % der positiven Tests aus und Paraná steigt weiter. InfoGripe SE 26/2026.</li>\n      <li><span class=\"chip good\">Event</span> <strong>Ourinhos-Festival heute</strong>: Badi Assad, 20h30, gratis, Teatro Roque Quagliato (~39 km) — läuft jeden Abend bis Sa (Abschluss: Hamilton de Holanda Trio).</li>\n      <li><span class=\"chip good\">Event</span> <strong>Londrina-Ferienprogramm</strong>: Gratis-Colônia + Theaterstück „Pinóquio\" (R$10) im Teatro do Clubinho, Spielparks im Catuaí, ab 20.07 Bibliotheks-Woche.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Mild &amp; trocken</strong>: heute 24°/11°, 0 % Regen, ab Do bis 27° — sonnig durch die ganze Woche, ideal fürs Draußen-Toben.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue jetzt frisch belegt &amp; ruhig</strong>: 19ª RS Jacarezinho 73 Fälle, 0 Tote im ganzen Jahr (Informe nº 22, SE 1–26/2026).</li>\n      <li><span class=\"chip hot\">Achtung</span> <strong>BR-153-Sperrungen</strong>: Di/Do Total-Sperrung ab 14h (Fels-Sprengung, Rio-Ubá-Brücke) — nur sekundär belegt, vor der Fahrt gegenprüfen.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Ferien Tag 3 von 14</strong>: Recess seit 13.07, ~1,1 Mio. Schüler, Unterricht wieder ab Mo 27.07.</li>\n      <li><span class=\"chip\">Event</span> <strong>Kern-Ring ruhig</strong>: vor Ort (Ribeirão Claro/Jacarezinho) diese Woche kein bestätigtes Familien-Event — die Highlights liegen in Ourinhos und Londrina.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ferien-Tag drei — und der Tag hat zwei Gesichter. Draußen ist es freundlich: mild, sonnig, staubtrocken, ab morgen wieder Richtung 27°. Nebenan läuft Programm: In Ourinhos spielt heute Abend das Gratis-Musikfestival weiter, in Londrina füllt sich die Ferienwoche mit Kinder-Theater und Spielparks. Aber das wichtigste Thema steht drinnen: Der brasilianische Winter ist Atemwegssaison, und das neue InfoGripe-Bulletin zeigt zwar bundesweit erstmals einen Rückgang — für Paraná und unser vier Wochen altes Baby heißt das aber noch keine Entwarnung. Deshalb steht die Gesundheit heute oben. Immerhin: Bei Dengue gibt es endlich eine frische Zahl, und die ist ruhig.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Winter, Baby-Vorsicht</strong>: bundesweit dreht der SRAG-Trend erstmals nach 5 Monaten nach unten — aber RSV macht 55,9 % der positiven Tests aus und Paraná steigt weiter. InfoGripe SE 26/2026.</li>\n      <li><span class=\"chip good\">Event</span> <strong>Ourinhos-Festival heute</strong>: Badi Assad, 20h30, gratis, Teatro Roque Quagliato (~39 km) — läuft jeden Abend bis Sa (Abschluss: Hamilton de Holanda Trio).</li>\n      <li><span class=\"chip good\">Event</span> <strong>Londrina-Ferienprogramm</strong>: Gratis-Colônia + Theaterstück „Pinóquio\" (R$10) im Teatro do Clubinho, Spielparks im Catuaí, ab 20.07 Bibliotheks-Woche.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Mild &amp; trocken</strong>: heute 24°/11°, 0 % Regen, ab Do bis 27° — sonnig durch die ganze Woche, ideal fürs Draußen-Toben.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue jetzt frisch belegt &amp; ruhig</strong>: 19ª RS Jacarezinho 73 Fälle, 0 Tote im ganzen Jahr (Informe nº 22, SE 1–26/2026).</li>\n      <li><span class=\"chip hot\">Achtung</span> <strong>BR-153-Sperrungen</strong>: Di/Do Total-Sperrung ab 14h (Fels-Sprengung, Rio-Ubá-Brücke) — nur sekundär belegt, vor der Fahrt gegenprüfen.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Ferien Tag 3 von 14</strong>: Recess seit 13.07, ~1,1 Mio. Schüler, Unterricht wieder ab Mo 27.07.</li>\n      <li><span class=\"chip\">Event</span> <strong>Kern-Ring ruhig</strong>: vor Ort (Ribeirão Claro/Jacarezinho) diese Woche kein bestätigtes Familien-Event — die Highlights liegen in Ourinhos und Londrina.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Break day three — and the day has two faces. Outside it's pleasant: mild, sunny, bone-dry, climbing back toward 27° from tomorrow. Next door there's a full program: tonight the free music festival continues in Ourinhos, and in Londrina the break week fills up with children's theater and play parks. But the most important topic is indoors: Brazilian winter is respiratory season, and the new InfoGripe bulletin shows a nationwide decline for the first time — but that's no all-clear yet for Paraná and our four-week-old baby. That's why health leads today. At least there's good news on dengue: a fresh number, finally, and it's calm.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV winter, baby caution</strong>: nationwide, the SRAG trend turns down for the first time in 5 months — but RSV accounts for 55.9% of positive tests and Paraná keeps climbing. InfoGripe SE 26/2026.</li>\n      <li><span class=\"chip good\">Event</span> <strong>Ourinhos festival today</strong>: Badi Assad, 8:30 pm, free, Teatro Roque Quagliato (~39 km) — runs every evening through Sat (closing: Hamilton de Holanda Trio).</li>\n      <li><span class=\"chip good\">Event</span> <strong>Londrina break program</strong>: free vacation camp + the play \"Pinóquio\" (R$10) at Teatro do Clubinho, play parks at Catuaí, library week from Jul 20.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Mild &amp; dry</strong>: today 24°/11°, 0% rain, up to 27° from Thu — sunny all week, ideal for outdoor play.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue now freshly documented &amp; calm</strong>: 19ª RS Jacarezinho 73 cases, 0 deaths for the whole year (Informe nº 22, SE 1–26/2026).</li>\n      <li><span class=\"chip hot\">Heads up</span> <strong>BR-153 closures</strong>: Tue/Thu full closure from 2 pm (rock blasting, Rio Ubá bridge) — only secondarily confirmed, double-check before driving.</li>\n      <li><span class=\"chip\">School</span> <strong>Break day 3 of 14</strong>: recess since Jul 13, ~1.1 million students, classes resume Mon Jul 27.</li>\n      <li><span class=\"chip\">Event</span> <strong>Home base quiet</strong>: locally (Ribeirão Claro/Jacarezinho) no confirmed family event this week — the highlights are in Ourinhos and Londrina.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dia três de férias — e o dia tem duas caras. Lá fora está agradável: ameno, ensolarado, bem seco, subindo de volta para 27° a partir de amanhã. Ali do lado tem programação: em Ourinhos, o festival de música gratuito segue hoje à noite; em Londrina, a semana de férias se enche de teatro infantil e parques de diversão. Mas o assunto mais importante está dentro de casa: o inverno brasileiro é temporada de doenças respiratórias, e o novo boletim InfoGripe mostra, pela primeira vez, uma queda em todo o país — mas isso ainda não é sinal verde para o Paraná nem para o nosso bebê de quatro semanas. Por isso a saúde vem em primeiro lugar hoje. Ao menos na dengue há finalmente um número atualizado, e ele está tranquilo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Inverno de VSR, cuidado com o bebê</strong>: em todo o país, a tendência de SRAG cai pela primeira vez em 5 meses — mas o VSR responde por 55,9% dos testes positivos e o Paraná continua subindo. InfoGripe SE 26/2026.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>Festival de Ourinhos hoje</strong>: Badi Assad, 20h30, grátis, Teatro Roque Quagliato (~39 km) — segue todas as noites até sáb (encerramento: Hamilton de Holanda Trio).</li>\n      <li><span class=\"chip good\">Evento</span> <strong>Programação de férias em Londrina</strong>: colônia gratuita + peça \"Pinóquio\" (R$10) no Teatro do Clubinho, parques no Catuaí, a partir de 20/07 semana da biblioteca.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Ameno e seco</strong>: hoje 24°/11°, 0% de chuva, a partir de qui até 27° — ensolarado a semana toda, ideal para as crianças brincarem lá fora.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue agora com dado atualizado e tranquila</strong>: 19ª RS Jacarezinho 73 casos, 0 óbitos no ano inteiro (Informe nº 22, SE 1–26/2026).</li>\n      <li><span class=\"chip hot\">Atenção</span> <strong>Bloqueios na BR-153</strong>: ter/qui bloqueio total a partir das 14h (detonação de rocha, ponte do Rio Ubá) — confirmado apenas por fonte secundária, confira antes de sair.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Dia 3 de 14 de férias</strong>: recesso desde 13/07, ~1,1 milhão de alunos, aulas voltam na seg 27/07.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Núcleo tranquilo</strong>: aqui perto (Ribeirão Claro/Jacarezinho) sem evento familiar confirmado nesta semana — os destaques estão em Ourinhos e Londrina.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Día tres de vacaciones — y el día tiene dos caras. Afuera se ve agradable: templado, soleado, muy seco, y desde mañana el termómetro vuelve a subir hacia 27°. Aquí cerca hay programación: en Ourinhos sigue esta noche el festival de música gratuito, y en Londrina la semana de vacaciones se llena de teatro infantil y parques de juegos. Pero el tema más importante está adentro: el invierno brasileño es temporada de enfermedades respiratorias, y el nuevo boletín InfoGripe muestra, por primera vez, una baja a nivel nacional — pero eso todavía no es luz verde para Paraná ni para nuestro bebé de cuatro semanas. Por eso la salud encabeza la edición de hoy. Al menos con el dengue hay por fin una cifra reciente, y está tranquila.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Invierno de VSR, precaución con el bebé</strong>: a nivel nacional, la tendencia de SRAG baja por primera vez en 5 meses — pero el VSR representa el 55,9% de las pruebas positivas y Paraná sigue subiendo. InfoGripe SE 26/2026.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>Festival de Ourinhos hoy</strong>: Badi Assad, 20:30, gratis, Teatro Roque Quagliato (~39 km) — continúa todas las noches hasta el sáb (cierre: Hamilton de Holanda Trio).</li>\n      <li><span class=\"chip good\">Evento</span> <strong>Programa de vacaciones en Londrina</strong>: colonia gratuita + obra \"Pinóquio\" (R$10) en el Teatro do Clubinho, parques en el Catuaí, desde el 20/07 semana de la biblioteca.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Templado y seco</strong>: hoy 24°/11°, 0% de lluvia, desde el jue hasta 27° — soleado toda la semana, ideal para que los niños jueguen afuera.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue ahora con dato actualizado y tranquila</strong>: 19ª RS Jacarezinho 73 casos, 0 muertes en todo el año (Informe nº 22, SE 1–26/2026).</li>\n      <li><span class=\"chip hot\">Atención</span> <strong>Cierres en la BR-153</strong>: mar/jue cierre total desde las 14:00 (voladura de roca, puente del Río Ubá) — confirmado solo por fuente secundaria, verifica antes de manejar.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Día 3 de 14 de vacaciones</strong>: receso desde el 13/07, ~1,1 millones de alumnos, las clases retoman el lun 27/07.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Núcleo tranquilo</strong>: en la zona local (Ribeirão Claro/Jacarezinho) no hay evento familiar confirmado esta semana — lo más destacado está en Ourinhos y Londrina.</li>\n    </ul></div>"
