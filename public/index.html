        "en": "<div class=\"tldr\"><p class=\"lead\">Today, Anthropic decouples programmatic use—Agent SDK, <code>claude -p</code>, GitHub Actions—from interactive subscription and moves it into its own, monthly-fresh credit bucket. Daniel pays the same, but the money is now in two drawers. Also: Fable 5, Anthropic's new flagship model, has been globally disabled for three days—US export-control directive. And Gemini CLI gets shut down Thursday.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Billing split live today</strong>: Agent SDK + <code>claude -p</code> + Claude Code GitHub Actions draw from separate credit bucket ($20/$100/$200 for Pro/Max 5×/Max 20×), interactive TUI stays on subscription.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 disabled worldwide</strong> since 06/12, 5:21 PM ET—US export-control directive from Commerce Secretary Lutnick to Dario Amodei.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini CLI EOL Thu 06/18, 11:59 PM PT</strong>; Antigravity CLI (Go, multi-agent) GA since 05/19 takes over.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 leads at 95.0 % (suspended, thus not bookable)—Opus 4.8 at 88.6 % is the best available Anthropic model.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: usage-based billing live since 06/01, new Max tier ($100/mo, $200 credits); Fable 5 in Copilot 06/09.–06/12 (same suspension).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenCode</strong> at 172,198 GitHub stars—new leader among open-source coding agents, ahead of Claude Code (~124k) and Gemini CLI (~105k).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor Bugbot</strong>: review time from ~5 min to ~90 s, 10 % more bugs, 22 % cheaper per run.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje, Anthropic desacopla o uso programático—SDK de agentes, <code>claude -p</code>, GitHub Actions—da assinatura interativa e o leva para seu próprio fundo de créditos renovado mensalmente. Daniel paga a mesma coisa, mas o dinheiro está agora em duas gavetas. Além disso: Fable 5, o novo modelo de topo da Anthropic, foi desativado globalmente há três dias—diretiva de controle de exportação dos EUA. E Gemini CLI desligará quinta-feira.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Divisão de faturamento ativa hoje</strong>: SDK de agentes + <code>claude -p</code> + Claude Code GitHub Actions usam fundo de créditos separado ($20/$100/$200 para Pro/Max 5×/Max 20×), TUI interativa permanece na assinatura.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 desativados globalmente</strong> desde 12/06, 17h21 ET—diretiva de controle de exportação dos EUA do secretário de comércio Lutnick para Dario Amodei.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini CLI EOL qui 18/06, 23h59 PT</strong>; Antigravity CLI (Go, multi-agente) GA desde 19/05 assume.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 lidera com 95,0 % (suspenso, portanto não reservável)—Opus 4.8 com 88,6 % é o melhor modelo Anthropic disponível.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: faturamento por uso ativo desde 01/06, novo nível Max ($100/mês, $200 em créditos); Fable 5 no Copilot 09.–12/06 (mesma suspensão).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenCode</strong> com 172.198 estrelas GitHub—novo líder entre agentes de código open-source, à frente de Claude Code (~124k) e Gemini CLI (~105k).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor Bugbot</strong>: tempo de revisão de ~5 min para ~90 s, 10 % mais bugs, 22 % mais barato por execução.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy, Anthropic desvincula el uso programático—SDK de agentes, <code>claude -p</code>, GitHub Actions—de la suscripción interactiva y lo traslada a su propio fondo de créditos renovado mensualmente. Daniel paga lo mismo, pero el dinero está ahora en dos cajones. Además: Fable 5, el nuevo modelo estelar de Anthropic, ha estado deshabilitado globalmente durante tres días—directiva de control de exportación de EE.UU. Y Gemini CLI se apaga el jueves.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>División de facturación activa hoy</strong>: SDK de agentes + <code>claude -p</code> + Claude Code GitHub Actions usan fondo de créditos separado ($20/$100/$200 para Pro/Max 5×/Max 20×), TUI interactivo permanece en suscripción.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 deshabilitados globalmente</strong> desde 12/06, 17h21 ET—directiva de control de exportación de EE.UU. del secretario de comercio Lutnick a Dario Amodei.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini CLI EOL jue 18/06, 23h59 PT</strong>; Antigravity CLI (Go, multi-agente) GA desde 19/05 se hace cargo.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Fable 5 lidera con 95,0 % (suspendido, por lo tanto no reservable)—Opus 4.8 con 88,6 % es el mejor modelo disponible de Anthropic.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: facturación por uso viva desde 01/06, nuevo nivel Max ($100/mes, $200 en créditos); Fable 5 en Copilot 09.–12/06 (misma suspensión).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenCode</strong> con 172.198 estrellas GitHub—nuevo líder entre agentes de codificación de código abierto, por delante de Claude Code (~124k) y Gemini CLI (~105k).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor Bugbot</strong>: tiempo de revisión de ~5 min a ~90 s, 10 % más bugs, 22 % más barato por ejecución.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Woche eröffnet mit der größten namentlich genannten Enterprise-Agentic-Rollout-Zahl bisher: KPMG schaltet Microsoft Agent 365 für 276.000 Mitarbeitende in 138 Ländern frei. Parallel kündigt NTT DATA mit Google Cloud bis zu 500 Agenten an, IBM&nbsp;+&nbsp;ServiceNow zielen auf die Altlasten. Drei Konzern-Beratungen verkaufen im selben Quartal dieselbe Ware — Governance plus Integration — und das sagt mehr über den echten Engpass als jeder Modell-Benchmark. Für twiceD liegt die Lücke eine Etage tiefer: beim Mittelständler, der weder einen KPMG-Vertrag unterschreiben noch bezahlen will.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG&nbsp;×&nbsp;Microsoft</strong>: Agent 365 für <strong>276.000</strong> Mitarbeitende in <strong>138</strong> Ländern — größter benannter Enterprise-Agentic-Rollout bisher (09.06.).</li>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>NTT DATA&nbsp;×&nbsp;Google Cloud</strong>: bis zu <strong>500</strong> Agenten geplant, <strong>5.000</strong> Gemini-Enterprise-Experten als Ziel (08.06.).</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>IBM&nbsp;×&nbsp;ServiceNow</strong>: erweiterte Allianz gegen den „Legacy-Block\" — watsonx.data trifft Workflow Data Fabric, gemeinsame Produkte H2 2026 (11.06.).</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Microsoft Build 2026 — Enterprise-Lesart</strong>: Project Solara (agent-OS auf Android) pilotiert mit <em>CVS, Best Buy, Target, Levi's</em>; Maia 200 in Iowa+Arizona in Produktion (Coding-Modelle → ai-dev).</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act-Omnibus</strong>: Annex-III-Frist politisch von 02.08.2026 auf <strong>02.12.2027</strong> verschoben — formale Adoption im Amtsblatt steht aus; bis dahin gilt der alte Termin (Stand 07.05.).</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>KfW Fokus #533</strong>: <strong>20&nbsp;%</strong> der deutschen Mittelständler nutzen KI (von 4&nbsp;% 2016–18); Großfirmen 36&nbsp;%, F&amp;E-aktive 53&nbsp;%, Bau nur 8&nbsp;%.</li>\n      <li><span class=\"chip\">Study · EU</span> <strong>McKinsey MGI</strong> (Mai 2026): Deutschlands technisches Automatisierungspotenzial <strong>59&nbsp;%</strong>; <strong>$486&nbsp;Mrd.</strong> bis 2030 freisetzbar, ein Viertel davon Fertigung.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: Transformer-Kreditscoring senkt Risiko um <strong>70&nbsp;%</strong>; Q4'25 <strong>+50&nbsp;bps</strong> Kreditkarten-Marktanteil — größter Sprung seit zehn Jahren.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 Projekt-Ideen</strong>: AI-Act-Audit-as-a-Service für den Mittelstand & ein Agent-Governance-Light-Bundle für die Lücke unter Agent 365.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Die Woche eröffnet mit der größten namentlich genannten Enterprise-Agentic-Rollout-Zahl bisher: KPMG schaltet Microsoft Agent 365 für 276.000 Mitarbeitende in 138 Ländern frei. Parallel kündigt NTT DATA mit Google Cloud bis zu 500 Agenten an, IBM&nbsp;+&nbsp;ServiceNow zielen auf die Altlasten. Drei Konzern-Beratungen verkaufen im selben Quartal dieselbe Ware — Governance plus Integration — und das sagt mehr über den echten Engpass als jeder Modell-Benchmark. Für twiceD liegt die Lücke eine Etage tiefer: beim Mittelständler, der weder einen KPMG-Vertrag unterschreiben noch bezahlen will.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG&nbsp;×&nbsp;Microsoft</strong>: Agent 365 für <strong>276.000</strong> Mitarbeitende in <strong>138</strong> Ländern — größter benannter Enterprise-Agentic-Rollout bisher (09.06.).</li>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>NTT DATA&nbsp;×&nbsp;Google Cloud</strong>: bis zu <strong>500</strong> Agenten geplant, <strong>5.000</strong> Gemini-Enterprise-Experten als Ziel (08.06.).</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>IBM&nbsp;×&nbsp;ServiceNow</strong>: erweiterte Allianz gegen den „Legacy-Block\" — watsonx.data trifft Workflow Data Fabric, gemeinsame Produkte H2 2026 (11.06.).</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Microsoft Build 2026 — Enterprise-Lesart</strong>: Project Solara (agent-OS auf Android) pilotiert mit <em>CVS, Best Buy, Target, Levi's</em>; Maia 200 in Iowa+Arizona in Produktion (Coding-Modelle → ai-dev).</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act-Omnibus</strong>: Annex-III-Frist politisch von 02.08.2026 auf <strong>02.12.2027</strong> verschoben — formale Adoption im Amtsblatt steht aus; bis dahin gilt der alte Termin (Stand 07.05.).</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>KfW Fokus #533</strong>: <strong>20&nbsp;%</strong> der deutschen Mittelständler nutzen KI (von 4&nbsp;% 2016–18); Großfirmen 36&nbsp;%, F&amp;E-aktive 53&nbsp;%, Bau nur 8&nbsp;%.</li>\n      <li><span class=\"chip\">Study · EU</span> <strong>McKinsey MGI</strong> (Mai 2026): Deutschlands technisches Automatisierungspotenzial <strong>59&nbsp;%</strong>; <strong>$486&nbsp;Mrd.</strong> bis 2030 freisetzbar, ein Viertel davon Fertigung.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: Transformer-Kreditscoring senkt Risiko um <strong>70&nbsp;%</strong>; Q4'25 <strong>+50&nbsp;bps</strong> Kreditkarten-Marktanteil — größter Sprung seit zehn Jahren.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 Projekt-Ideen</strong>: AI-Act-Audit-as-a-Service für den Mittelstand & ein Agent-Governance-Light-Bundle für die Lücke unter Agent 365.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The week opens with the largest named enterprise-agentic rollout to date: KPMG activates Microsoft Agent 365 for 276,000 employees across 138 countries. In parallel, NTT DATA pairs with Google Cloud to deploy up to 500 agents; IBM + ServiceNow target legacy systems. Three consulting giants sell the same product in the same quarter — governance plus integration — and that tells you more about the real bottleneck than any model benchmark. For twiceD, the gap sits one layer deeper: with the mid-market firm that won't sign or pay for a KPMG contract.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft</strong>: Agent 365 for <strong>276,000</strong> employees in <strong>138</strong> countries — largest named enterprise-agentic rollout to date (06/09).</li>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>NTT DATA × Google Cloud</strong>: up to <strong>500</strong> agents planned, <strong>5,000</strong> Gemini Enterprise specialists targeted (06/08).</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>IBM × ServiceNow</strong>: expanded alliance against the \"legacy block\" — watsonx.data meets Workflow Data Fabric, joint products H2 2026 (06/11).</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Microsoft Build 2026 — enterprise reading</strong>: Project Solara (agent-OS on Android) pilots with <em>CVS, Best Buy, Target, Levi's</em>; Maia 200 in production in Iowa + Arizona (Coding models → ai-dev).</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act Omnibus</strong>: Annex-III deadline politically shifted from 08/02/2026 to <strong>12/02/2027</strong> — formal adoption in Official Journal pending; old deadline applies until then (as of 05/07).</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>KfW Focus #533</strong>: <strong>20%</strong> of German mid-market firms use AI (from 4% in 2016–18); large firms 36%, R&D-active 53%, construction only 8%.</li>\n      <li><span class=\"chip\">Study · EU</span> <strong>McKinsey MGI</strong> (May 2026): Germany's technical automation potential <strong>59%</strong>; <strong>$486 billion</strong> unlockable by 2030, a quarter of that in manufacturing.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: Transformer-based credit scoring cuts risk by <strong>70%</strong>; Q4'25 <strong>+50 bps</strong> credit card market share — largest leap in a decade.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 project ideas</strong>: AI-Act audit-as-a-service for mid-market & a light agent-governance bundle for the gap below Agent 365.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A semana abre com o maior lançamento de IA agentic nomeado até agora: KPMG ativa Microsoft Agent 365 para 276.000 funcionários em 138 países. Em paralelo, NTT DATA com Google Cloud anunciam até 500 agentes; IBM + ServiceNow miram nos sistemas legados. Três consultorias gigantes vendem o mesmo produto no mesmo trimestre — governance mais integração — e isso diz mais sobre o gargalo real do que qualquer benchmark de modelo. Para a twiceD, a lacuna está um nível abaixo: no fabricante médio que não vai assinar nem pagar um contrato KPMG.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft</strong>: Agent 365 para <strong>276.000</strong> funcionários em <strong>138</strong> países — maior rollout de IA agentic corporativa nomeado até agora (09/06).</li>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>NTT DATA × Google Cloud</strong>: até <strong>500</strong> agentes planejados, <strong>5.000</strong> especialistas Gemini Enterprise como meta (08/06).</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>IBM × ServiceNow</strong>: aliança expandida contra o \"bloco legado\" — watsonx.data encontra Workflow Data Fabric, produtos conjuntos H2 2026 (11/06).</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Microsoft Build 2026 — visão corporativa</strong>: Project Solara (agent-OS em Android) pilota com <em>CVS, Best Buy, Target, Levi's</em>; Maia 200 em produção em Iowa+Arizona (Modelos de codificação → ai-dev).</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act Omnibus</strong>: prazo Annex-III deslocado politicamente de 02/08/2026 para <strong>02/12/2027</strong> — adoção formal no Diário Oficial ainda pendente; prazo antigo vigorá até então (situação 07/05).</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>KfW Foco #533</strong>: <strong>20%</strong> das empresas médias alemãs usam IA (de 4% em 2016–18); grandes empresas 36%, ativas em P&amp;D 53%, construção apenas 8%.</li>\n      <li><span class=\"chip\">Study · EU</span> <strong>McKinsey MGI</strong> (maio 2026): potencial técnico de automação da Alemanha <strong>59%</strong>; <strong>R$ 2.520 bilhões</strong> liberáveis até 2030, um quarto em manufatura.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: pontuação de crédito baseada em Transformer reduz risco em <strong>70%</strong>; Q4'25 <strong>+50 bps</strong> de fatia de cartão de crédito — maior salto em dez anos.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 ideias de projeto</strong>: auditoria AI-Act-as-a-Service para o mercado médio &amp; um pacote leve de governança de agentes para a lacuna abaixo do Agent 365.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La semana abre con el lanzamiento de IA agentic más grande nombrado hasta ahora: KPMG activa Microsoft Agent 365 para 276.000 empleados en 138 países. En paralelo, NTT DATA con Google Cloud anuncian hasta 500 agentes; IBM + ServiceNow apuntan a sistemas heredados. Tres gigantes consultor venden el mismo producto en el mismo trimestre — governance más integración — y eso te dice más sobre el cuello de botella real que cualquier benchmark de modelo. Para twiceD, la brecha está un nivel abajo: con el fabricante mediano que no va a firmar ni pagar un contrato KPMG.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft</strong>: Agent 365 para <strong>276.000</strong> empleados en <strong>138</strong> países — lanzamiento más grande de IA agentic corporativa nombrado hasta ahora (09/06).</li>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>NTT DATA × Google Cloud</strong>: hasta <strong>500</strong> agentes planeados, <strong>5.000</strong> especialistas certificados Gemini Enterprise como meta (08/06).</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>IBM × ServiceNow</strong>: alianza expandida contra el \"bloque heredado\" — watsonx.data se encuentra con Workflow Data Fabric, productos conjuntos H2 2026 (11/06).</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Microsoft Build 2026 — visión empresarial</strong>: Project Solara (agent-OS en Android) pilota con <em>CVS, Best Buy, Target, Levi's</em>; Maia 200 en producción en Iowa+Arizona (Modelos de codificación → ai-dev).</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act Omnibus</strong>: plazo Annex-III desplazado políticamente de 02/08/2026 a <strong>02/12/2027</strong> — adopción formal en Diario Oficial aún pendiente; plazo antiguo se aplica hasta entonces (estado 07/05).</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>KfW Enfoque #533</strong>: <strong>20%</strong> de las empresas medianas alemanas usan IA (de 4% en 2016–18); grandes empresas 36%, activas en I+D 53%, construcción solo 8%.</li>\n      <li><span class=\"chip\">Study · EU</span> <strong>McKinsey MGI</strong> (mayo 2026): potencial técnico de automatización de Alemania <strong>59%</strong>; <strong>$486 mil millones</strong> liberables hasta 2030, un cuarto en manufactura.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Nubank nuFormer</strong>: puntuación de crédito basada en Transformer reduce riesgo en <strong>70%</strong>; Q4'25 <strong>+50 bps</strong> de participación en tarjeta de crédito — mayor salto en una década.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 ideas de proyecto</strong>: auditoría AI-Act-as-a-Service para mercado mediano &amp; un paquete ligero de governance de agentes para la brecha debajo de Agent 365.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Spur 3 lebt: Nach Wochen ohne auflösbare TED-Daten liegen heute zwei verifizierte EU-Ausschreibungen mit vollem Pflicht-Kriterien-Profil vor — Autobahn GmbH (C-ITS/V2X, €13 Mio.) und SH-Navi (Open-Source-Mobilität, €320k). Beide passen zum Stack, beide übersteigen twiceDs Solo-Kapazität: Es braucht eine Bietergemeinschaft. Daneben 143 Listings im Board, fast unverändert zu gestern (12 neu, 131 fortgeführt), mit denselben drei Spitzen-Fits.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Autobahn GmbH — Kooperative Zentrale (80)</strong>: C-ITS/V2X-Individualsoftware im AutobahnOS, Schätzwert €13 Mio., Frist 30.06.2026. <span class=\"chip\">⚠️ Partner</span> wegen Mindestjahresumsatz ≥ €1 Mio.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>SH-Navi Los 1 (80)</strong>: offene Open-Source-Mobilitätsplattform (Java/Web), Budget €320k, Frist 29.06.2026. <span class=\"chip\">⚠️ Partner</span> für ÖPNV/GTFS-Referenzen.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI-Engineer Java + GenAI/RAG/Kiro, Frankfurt 80 % remote, 110–135 €/h, 24 Monate. Top-Freelance-Fit.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nürnberg 90 % remote, 95–110 €/h, 6+ Monate.</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — bestes Employee-Offer im Filter. Personio AI-Team (86) daneben.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + KI, 100 % remote, Hamburg, 110–135 €/h — Nischen-Premium mit Daniels OEM-Referenzen.</li>\n      <li><span class=\"chip\">IoT</span> <strong>VARIUS Smart Energy (84)</strong>: Java/Spring + Smart Metering + Kafka + Azure, 100 % remote, 100–125 €/h — IoT-Nische im oberen Band.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains-Cluster</strong>: AI-nahe IDE-Rollen (IntelliJ AI, FDE), Remote-DE-fähig — der größte Intriguing-Block.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>103 €/h Durchschnitt</strong>: erste Stundensatz-Senkung seit 2016. AI-Stack-Rollen im Premium (100–135 €/h), Standard-Java im umkämpften Mittelfeld.</li>\n      <li><span class=\"chip\">Board</span> <strong>143 Listings</strong>, davon 8 mit Fit ≥ 85, 52 im Band 80–84 — fast das ganze Spitzenfeld ist BR-zeitzonentauglich.</li>\n    </ul></div>",

pan class=\"chip\">Intriguing</span> <strong>JetBrains-Cluster</strong>: AI-nahe IDE-Rollen (IntelliJ AI, FDE), Remote-DE-fähig — der größte Intriguing-Block.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>103 €/h Durchschnitt</strong>: erste Stundensatz-Senkung seit 2016. AI-Stack-Rollen im Premium (100–135 €/h), Standard-Java im umkämpften Mittelfeld.</li>\n      <li><span class=\"chip\">Board</span> <strong>143 Listings</strong>, davon 8 mit Fit ≥ 85, 52 im Band 80–84 — fast das ganze Spitzenfeld ist BR-zeitzonentauglich.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Track 3 is live: after weeks with no resolvable TED data, two verified EU tenders with full mandatory-criteria profiles are on the table today — Autobahn GmbH (C-ITS/V2X, €13 million) and SH-Navi (open-source mobility, €320k). Both fit the stack, both exceed twiceD's solo capacity: a bidding consortium is required. Alongside that, 143 listings on the board, nearly unchanged from yesterday (12 new, 131 carried forward), with the same three top fits.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Autobahn GmbH — Cooperative Control Center (80)</strong>: C-ITS/V2X custom software in AutobahnOS, estimated value €13 million, deadline 2026-06-30. <span class=\"chip\">⚠️ Partner</span> — minimum annual revenue ≥ €1 million required.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>SH-Navi Lot 1 (80)</strong>: open-source mobility platform (Java/Web), budget €320k, deadline 2026-06-29. <span class=\"chip\">⚠️ Partner</span> — public-transit/GTFS references needed.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Engineer Java + GenAI/RAG/Kiro, Frankfurt 80% remote, 110–135 €/h, 24 months. Top freelance fit.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nuremberg 90% remote, 95–110 €/h, 6+ months.</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — best employee offer in the filter. Personio AI Team (86) alongside.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + AI, 100% remote, Hamburg, 110–135 €/h — niche premium with Daniel's OEM references.</li>\n      <li><span class=\"chip\">IoT</span> <strong>VARIUS Smart Energy (84)</strong>: Java/Spring + Smart Metering + Kafka + Azure, 100% remote, 100–125 €/h — IoT niche in the upper rate band.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains cluster</strong>: AI-adjacent IDE roles (IntelliJ AI, FDE), remote-DE eligible — the largest Intriguing block.</li>\n      <li><span class=\"chip hot\">Market</span> <strong>103 €/h average</strong>: first hourly-rate drop since 2016. AI-stack roles at premium (100–135 €/h), standard Java in the contested midfield.</li>\n      <li><span class=\"chip\">Board</span> <strong>143 listings</strong>, 8 with fit ≥ 85, 52 in the 80–84 band — almost all top-tier listings are compatible with the BR time zone.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Pista 3 está viva: após semanas sem dados TED resolúveis, dois editais europeus verificados com perfil completo de critérios obrigatórios estão na mesa hoje — Autobahn GmbH (C-ITS/V2X, €13 milhões) e SH-Navi (mobilidade open-source, €320k). Ambos se encaixam no stack, ambos superam a capacidade solo da twiceD: é preciso um consórcio de licitação. Além disso, 143 vagas no board, quase iguais a ontem (12 novas, 131 mantidas), com os mesmos três melhores fits.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Autobahn GmbH — Central Cooperativa (80)</strong>: software customizado C-ITS/V2X no AutobahnOS, valor estimado €13 milhões, prazo 30/06/2026. <span class=\"chip\">⚠️ Parceiro</span> — faturamento mínimo anual ≥ €1 milhão exigido.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>SH-Navi Lote 1 (80)</strong>: plataforma de mobilidade open-source (Java/Web), orçamento €320k, prazo 29/06/2026. <span class=\"chip\">⚠️ Parceiro</span> — referências em transporte público/GTFS necessárias.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Engenheiro Fullstack/IA Java + GenAI/RAG/Kiro, Frankfurt 80% remoto, 110–135 €/h, 24 meses. Melhor fit freelance.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nuremberg 90% remoto, 95–110 €/h, 6+ meses.</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — melhor oferta de emprego CLT no filtro. Personio AI Team (86) ao lado.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotivo + IA, 100% remoto, Hamburgo, 110–135 €/h — nicho premium com as referências OEM do Daniel.</li>\n      <li><span class=\"chip\">IoT</span> <strong>VARIUS Smart Energy (84)</strong>: Java/Spring + Smart Metering + Kafka + Azure, 100% remoto, 100–125 €/h — nicho IoT na faixa superior de taxa.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Cluster JetBrains</strong>: vagas de IDE próximas à IA (IntelliJ AI, FDE), elegíveis para remoto-DE — o maior bloco Intriguing.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Média de 103 €/h</strong>: primeira queda de taxa horária desde 2016. Vagas com stack de IA no premium (100–135 €/h), Java padrão no campo médio disputado.</li>\n      <li><span class=\"chip\">Board</span> <strong>143 vagas</strong>, sendo 8 com fit ≥ 85, 52 na faixa 80–84 — quase todo o topo do ranking é compatível com o fuso horário do Brasil.</li>\n    </ul></div>",

va/Spring + Smart Metering + Kafka + Azure, 100% remoto, 100–125 €/h — nicho IoT en la banda de tarifa superior.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Clúster JetBrains</strong>: roles de IDE cercanos a la IA (IntelliJ AI, FDE), elegibles para remoto-DE — el bloque Intriguing más grande.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Promedio de 103 €/h</strong>: primera caída de tarifa horaria desde 2016. Roles con stack de IA en premium (100–135 €/h), Java estándar en el campo medio disputado.</li>\n      <li><span class=\"chip\">Board</span> <strong>143 vacantes</strong>, 8 con fit ≥ 85, 52 en la banda 80–84 — casi todo el nivel superior es compatible con la zona horaria de Brasil.</li>\n    </ul></div>"

Truiden) — netto −3,2 Mio. €. Röhl-Konstruktion finanziert das Paket.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Fahrplan</strong>: Sa. 20.06. Deutschland – Elfenbeinküste, Toronto, 22:00 MESZ / 17:00 BRT. Do. 25.06. Ecuador – Deutschland, East Rutherford, 22:00 / 17:00.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 15 — the day after Germany's perfect World Cup opener. Germany demolishes Curaçao 7:1, breaks the all-time World Cup goal record with the seventh goal, and vaults to first place on the all-time list with 239 goals, ahead of Brazil (238). Meanwhile, the Seleção stumbles: 1:1 against Morocco, Ancelotti says he's \"a little worried\". Today is Day 5 of the World Cup with Groups G and H — no Germany, no Brazil match, but three of the four games fall into Daniel's prime BRT window.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany 7:1 Curaçao</strong> (Sun. 14.06., Houston): Opening blitz, 3.91 xG from 26 shots, 65% possession. Seven different goalscorers.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>World Cup goal record for all time</strong>: 239 goals — Germany overtakes Brazil (238) as the all-time World Cup top scorer.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil 1:1 Morocco</strong> (Sat. 13.06., MetLife): Vinícius (32') saves the point, Saibari (21') had scored. Ancelotti: \"a little worried\".</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Group C</strong>: Scotland (3 pts.) leads ahead of Morocco and Brazil (each 1) — Brazil as group third with their backs against the wall.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Group E clear</strong>: Germany and Ivory Coast (1:0 against Ecuador, Diallo 90') each with 3 points — the direct duel on Saturday decides first place.</li>\n      <li><span class=\"chip\">WM</span> <strong>Today Groups G + H</strong>: Spain–Cape Verde 18:00 MESZ / 13:00 BRT (Atlanta), Belgium–Egypt 21:00 / 16:00 (Seattle), Saudi Arabia–Uruguay 00:00 (Tue.) / 19:00 (Miami), Iran–New Zealand 03:00 (Tue.) / 22:00 (Inglewood).</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>SC Freiburg</strong>: Backhaus (12m €, Bremen), Goto (10, Anderlecht), Yamamoto (7, Sint-Truiden) — net −3.2m €. Röhl structure finances the package.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Schedule</strong>: Sat. 20.06. Germany – Ivory Coast, Toronto, 22:00 MESZ / 17:00 BRT. Thu. 25.06. Ecuador – Germany, East Rutherford, 22:00 / 17:00.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, 15 de junho — o dia após o início perfeito da Alemanha na Copa do Mundo. A Alemanha destrói Curaçao com 7:1, quebra o recorde histórico de gols da Copa do Mundo com o sétimo gol e assume o primeiro lugar na lista de todos os tempos com 239 gols, à frente do Brasil (238). Enquanto isso, a Seleção tropeça: 1:1 contra Marrocos, Ancelotti diz estar \"a little worried\". Hoje é o dia 5 da Copa com os grupos G e H — sem jogo da Alemanha nem do Brasil, mas três das quatro partidas caem na janela horária BRT ideal para Daniel.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha 7:1 Curaçao</strong> (dom. 14.06., Houston): Abertura brilhante, 3,91 xG em 26 chutes, 65% de posse. Sete goleadores diferentes.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Recorde histórico de gols da Copa do Mundo</strong>: 239 gols — Alemanha ultrapassa Brasil (238) como o maior artilheiro histórico da Copa.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marrocos</strong> (sáb. 13.06., MetLife): Vinícius (32') salva o resultado, Saibari (21') havia aberto o placar. Ancelotti: \"a little worried\".</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Grupo C</strong>: Escócia (3 pts.) lidera, à frente de Marrocos e Brasil (1 ponto cada) — Brasil como terceiro colocado com as costas contra a parede.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Grupo E definido</strong>: Alemanha e Costa do Marfim (1:0 contra Equador, Diallo 90') cada uma com 3 pontos — o duelo direto no sábado decide o primeiro lugar.</li>\n      <li><span class=\"chip\">WM</span> <strong>Hoje Grupos G + H</strong>: Espanha–Cabo Verde 18:00 MESZ / 13:00 BRT (Atlanta), Bélgica–Egito 21:00 / 16:00 (Seattle), Arábia Saudita–Uruguai 00:00 (ter.) / 19:00 (Miami), Irã–Nova Zelândia 03:00 (ter.) / 22:00 (Inglewood).</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>SC Freiburg</strong>: Backhaus (12 mi €, Bremen), Goto (10, Anderlecht), Yamamoto (7, Sint-Truiden) — saldo líquido −3,2 mi €. Estrutura Röhl financia o pacote.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Calendário</strong>: sáb. 20.06. Alemanha – Costa do Marfim, Toronto, 22:00 MESZ / 17:00 BRT. qui. 25.06. Equador – Alemanha, East Rutherford, 22:00 / 17:00.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, 15 de junio — el día después del debut perfecto de Alemania en la Copa del Mundo. Alemania aniquila a Curazao 7:1, rompe el récord histórico de goles de la Copa del Mundo con el séptimo gol y se coloca en primer lugar en la lista de todos los tiempos con 239 goles, por delante de Brasil (238). Mientras tanto, la Seleção tropieza: 1:1 contra Marruecos, Ancelotti dice estar \"a little worried\". Hoy es el día 5 de la Copa con los grupos G y H — sin partido de Alemania ni de Brasil, pero tres de los cuatro partidos caen en la ventana horaria BRT ideal para Daniel.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania 7:1 Curazao</strong> (dom. 14.06., Houston): Debut espectacular, 3,91 xG en 26 tiros, 65% de posesión. Siete goleadores distintos.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>Récord histórico de goles de la Copa del Mundo</strong>: 239 goles — Alemania supera a Brasil (238) como máximo goleador histórico de la Copa.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marruecos</strong> (sáb. 13.06., MetLife): Vinícius (32') salva el empate, Saibari (21') había abierto. Ancelotti: \"a little worried\".</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Grupo C</strong>: Escocia (3 pts.) lidera, por delante de Marruecos y Brasil (1 punto cada) — Brasil como tercero con la espalda contra la pared.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Grupo E definido</strong>: Alemania y Costa de Marfil (1:0 contra Ecuador, Diallo 90') cada una con 3 puntos — el duelo directo el sábado decide el primer lugar.</li>\n      <li><span class=\"chip\">WM</span> <strong>Hoy Grupos G + H</strong>: España–Cabo Verde 18:00 MESZ / 13:00 BRT (Atlanta), Bélgica–Egipto 21:00 / 16:00 (Seattle), Arabia Saudita–Uruguay 00:00 (mar.) / 19:00 (Miami), Irán–Nueva Zelanda 03:00 (mar.) / 22:00 (Inglewood).</li>\n      <li><span class=\"chip good\">Mercado</span> <strong>SC Freiburg</strong>: Backhaus (12 mi €, Bremen), Goto (10, Anderlecht), Yamamoto (7, Sint-Truiden) — saldo neto −3,2 mi €. Estructura Röhl financia el paquete.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Calendario</strong>: sáb. 20.06. Alemania – Costa de Marfil, Toronto, 22:00 MESZ / 17:00 BRT. jue. 25.06. Ecuador – Alemania, East Rutherford, 22:00 / 17:00.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das Renn-Wochenende, auf das du gewartet hast: In Barcelona hat <strong>Lewis Hamilton seinen ersten Sieg im Ferrari</strong> geholt — sein erstes F1-Rennen überhaupt für Maranello-Rot, das nicht im Mittelfeld endete. WM-Leader Kimi Antonelli lag auf P2 hinter Hamilton, fuhr das Rennen aber nicht zu Ende: vier Runden vor Schluss schied er nach Kontakt mit technischem Defekt (Elektronik/Öldruck) aus. Parallel hat in Le Mans das <strong>#7-Toyota-Trio Conway/Kobayashi/de&nbsp;Vries</strong> die 24&nbsp;Stunden gewonnen — der erste Toyota-Erfolg an der Sarthe seit 2022. Antonelli bleibt trotz Null-Punkte-Sonntag WM-Erster, der Vorsprung schrumpft aber von 66 auf 41 Punkte. Nächste Etappe: F1 in Spielberg, in zwei Wochen, ohne Sprint.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong>: Barcelona-Catalunya, Lauf 7/24 (14.06.). Russell P2, Norris P3 — <em>erstes rein-britisches Podium seit 1968</em>.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli scheidet auf P2 aus</strong> (Runde 62/66, technischer Defekt nach Kontakt) — Hamilton +25 Pkt, Russell +18 Pkt aufgeholt.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115) und Russell (106). Konstrukteure: Mercedes 262, Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">LE&nbsp;MANS</span> <strong>Toyota #7 gewinnt die 24h</strong>: Conway/Kobayashi/de&nbsp;Vries vor BMW #20 (Frijns/Rast/van&nbsp;der&nbsp;Linde) und Toyota #8 — Toyotas erster La-Sarthe-Sieg seit 2022.</li>\n      <li><span class=\"chip\">WEC-WM</span> <strong>Toyota führt die Herstellerwertung mit 132 Pkt</strong> vor BMW (96) und Ferrari (62) — nach drei der acht Saisonläufe.</li>\n      <li><span class=\"chip\">NÄCHSTE</span> <strong>F1 Österreich-GP (Lauf 8/24), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen So 15:00 MESZ / 10:00 BRT.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Das Renn-Wochenende, auf das du gewartet hast: In Barcelona hat <strong>Lewis Hamilton seinen ersten Sieg im Ferrari</strong> geholt — sein erstes F1-Rennen überhaupt für Maranello-Rot, das nicht im Mittelfeld endete. WM-Leader Kimi Antonelli lag auf P2 hinter Hamilton, fuhr das Rennen aber nicht zu Ende: vier Runden vor Schluss schied er nach Kontakt mit technischem Defekt (Elektronik/Öldruck) aus. Parallel hat in Le Mans das <strong>#7-Toyota-Trio Conway/Kobayashi/de&nbsp;Vries</strong> die 24&nbsp;Stunden gewonnen — der erste Toyota-Erfolg an der Sarthe seit 2022. Antonelli bleibt trotz Null-Punkte-Sonntag WM-Erster, der Vorsprung schrumpft aber von 66 auf 41 Punkte. Nächste Etappe: F1 in Spielberg, in zwei Wochen, ohne Sprint.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong>: Barcelona-Catalunya, Lauf 7/24 (14.06.). Russell P2, Norris P3 — <em>erstes rein-britisches Podium seit 1968</em>.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli scheidet auf P2 aus</strong> (Runde 62/66, technischer Defekt nach Kontakt) — Hamilton +25 Pkt, Russell +18 Pkt aufgeholt.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115) und Russell (106). Konstrukteure: Mercedes 262, Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">LE&nbsp;MANS</span> <strong>Toyota #7 gewinnt die 24h</strong>: Conway/Kobayashi/de&nbsp;Vries vor BMW #20 (Frijns/Rast/van&nbsp;der&nbsp;Linde) und Toyota #8 — Toyotas erster La-Sarthe-Sieg seit 2022.</li>\n      <li><span class=\"chip\">WEC-WM</span> <strong>Toyota führt die Herstellerwertung mit 132 Pkt</strong> vor BMW (96) und Ferrari (62) — nach drei der acht Saisonläufe.</li>\n      <li><span class=\"chip\">NÄCHSTE</span> <strong>F1 Österreich-GP (Lauf 8/24), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen So 15:00 MESZ / 10:00 BRT.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The racing weekend you've been waiting for: In Barcelona, <strong>Lewis Hamilton claimed his first win with Ferrari</strong> — his first F1 race for the Maranello team that didn't end in the midfield. Championship leader Kimi Antonelli was running P2 behind Hamilton, but didn't finish the race: four laps from the end, he retired with a technical failure (electronics/oil pressure) following contact. Meanwhile at Le Mans, the <strong>#7 Toyota trio Conway/Kobayashi/de&nbsp;Vries</strong> took the 24-hour win — Toyota's first victory at La Sarthe since 2022. Despite a zero-point Sunday, Antonelli stays championship leader, but his advantage shrinks from 66 to 41 points. Next stop: F1 in Austria, in two weeks, no sprint.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-WIN</span> <strong>Hamilton's first Ferrari victory</strong>: Barcelona-Catalunya, race 7/24 (June 14). Russell P2, Norris P3 — <em>first all-British podium since 1968</em>.</li>\n      <li><span class=\"chip hot\">DNF</span> <strong>Antonelli retires from P2</strong> (lap 62/66, technical failure after contact) — Hamilton gains 25 pts, Russell gains 18 pts.</li>\n      <li><span class=\"chip\">F1-WDC</span> <strong>Antonelli leads with 156 pts</strong> ahead of Hamilton (115) and Russell (106). Constructors: Mercedes 262, Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">LE&nbsp;MANS</span> <strong>Toyota #7 wins the 24h</strong>: Conway/Kobayashi/de&nbsp;Vries ahead of BMW #20 (Frijns/Rast/van&nbsp;der&nbsp;Linde) and Toyota #8 — Toyota's first La Sarthe win since 2022.</li>\n      <li><span class=\"chip\">WEC-WDC</span> <strong>Toyota leads the manufacturers with 132 pts</strong> ahead of BMW (96) and Ferrari (62) — after three of eight season races.</li>\n      <li><span class=\"chip\">NEXT</span> <strong>F1 Austrian GP (race 8/24), Red Bull Ring</strong>, June 26–28, no sprint. Race Sun 15:00 CEST / 10:00 BRT.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O fim de semana de corridas que você esperava: em Barcelona, <strong>Lewis Hamilton conquistou sua primeira vitória na Ferrari</strong> — sua primeira corrida de F1 para a equipe vermelha que não terminou no meio do pelotão. O líder do campeonato Kimi Antonelli estava na segunda posição atrás de Hamilton, mas não terminou a prova: quatro voltas antes do final, abandonou com falha técnica (eletrônica/pressão de óleo) após contato. Enquanto isso, em Le Mans, o <strong>trio #7 da Toyota Conway/Kobayashi/de&nbsp;Vries</strong> venceu as 24 horas — a primeira vitória da Toyota na Sarthe desde 2022. Antonelli permanece líder do campeonato apesar de zero pontos no domingo, mas sua vantagem encolhe de 66 para 41 pontos. Próxima etapa: F1 na Áustria, daqui a duas semanas, sem sprint.</p>\n    <ul>\n      <li><span class=\"chip hot\">VITÓRIA F1</span> <strong>Primeira vitória de Hamilton na Ferrari</strong>: Barcelona-Catalunya, prova 7/24 (14.06.). Russell P2, Norris P3 — <em>primeiro pódio 100% britânico desde 1968</em>.</li>\n      <li><span class=\"chip hot\">ABANDONO</span> <strong>Antonelli abandona de P2</strong> (volta 62/66, falha técnica após contato) — Hamilton +25 pts, Russell +18 pts recuperados.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera com 156 pts</strong> à frente de Hamilton (115) e Russell (106). Construtores: Mercedes 262, Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">LE&nbsp;MANS</span> <strong>Toyota #7 vence as 24h</strong>: Conway/Kobayashi/de&nbsp;Vries à frente da BMW #20 (Frijns/Rast/van&nbsp;der&nbsp;Linde) e Toyota #8 — primeira vitória da Toyota na Sarthe desde 2022.</li>\n      <li><span class=\"chip\">CAMPEONATO WEC</span> <strong>Toyota lidera fabricantes com 132 pts</strong> à frente da BMW (96) e Ferrari (62) — após três de oito provas da temporada.</li>\n      <li><span class=\"chip\">PRÓXIMA</span> <strong>F1 GP da Áustria (prova 8/24), Red Bull Ring</strong>, 26–28.06., sem sprint. Corrida dom 15:00 CEST / 10:00 BRT.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El fin de semana de carreras que esperabas: en Barcelona, <strong>Lewis Hamilton consiguió su primera victoria con Ferrari</strong> — su primera carrera de F1 para el equipo rojo que no terminó en la mitad del pelotón. El líder del campeonato Kimi Antonelli estaba en segunda posición detrás de Hamilton, pero no terminó la carrera: cuatro vueltas antes del final, se retiró con una falla técnica (electrónica/presión de aceite) tras contacto. Mientras tanto, en Le Mans, el <strong>trío #7 de Toyota Conway/Kobayashi/de&nbsp;Vries</strong> ganó las 24 horas — la primera victoria de Toyota en La Sarthe desde 2022. A pesar de cero puntos el domingo, Antonelli sigue siendo líder del campeonato, pero su ventaja se reduce de 66 a 41 puntos. Próxima parada: F1 en Austria, en dos semanas, sin sprint.</p>\n    <ul>\n      <li><span class=\"chip hot\">VICTORIA F1</span> <strong>Primera victoria de Hamilton en Ferrari</strong>: Barcelona-Catalunya, carrera 7/24 (14.06.). Russell P2, Norris P3 — <em>primer podio 100% británico desde 1968</em>.</li>\n      <li><span class=\"chip hot\">ABANDONO</span> <strong>Antonelli se retira de P2</strong> (vuelta 62/66, falla técnica tras contacto) — Hamilton +25 pts, Russell +18 pts recuperados.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera con 156 pts</strong> sobre Hamilton (115) y Russell (106). Constructores: Mercedes 262, Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">LE&nbsp;MANS</span> <strong>Toyota #7 gana las 24h</strong>: Conway/Kobayashi/de&nbsp;Vries adelante de BMW #20 (Frijns/Rast/van&nbsp;der&nbsp;Linde) y Toyota #8 — primera victoria de Toyota en La Sarthe desde 2022.</li>\n      <li><span class=\"chip\">CAMPEONATO WEC</span> <strong>Toyota lidera fabricantes con 132 pts</strong> sobre BMW (96) y Ferrari (62) — tras tres de ocho carreras de la temporada.</li>\n      <li><span class=\"chip\">PRÓXIMO</span> <strong>F1 GP de Austria (carrera 8/24), Red Bull Ring</strong>, 26–28.06., sin sprint. Carrera dom 15:00 CEST / 10:00 BRT.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag im Norte Pioneiro: Regen praktisch sicher, die Tagestemperatur eine Wundertüte (zwei Portale, drei Grad Differenz), und im Hintergrund eine ernste Gesundheitslage — die Atemwegswelle bei Säuglingen läuft hoch, RSV ist der Haupttreiber. Drinnen-Tag, Babyschutz dazu. Diese Woche der Auftakt zur Festa Junina im Londrina-Ring; heute Nachmittag eine grätis Edição São João vor Ort, am 27.06 das Frozen-Musical als Wochenend-Ziel.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Welle bei Säuglingen</strong>: Fiocruz-InfoGripe SE 21/2026 — alle 27 Bundesstaaten in Alert; VSR/RSV macht 48,5 % der jüngsten positiven SRAG-Tests aus; Babys unter 2 Jahren die Hauptbetroffenen; Paraná unter den Staaten mit steigender Tendenz.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Nasser, kühler Montag</strong>: 97 % Regenwahrscheinlichkeit (Climatempo), 7 mm; Temperatur 17–23 °C laut Climatempo, 14–20 °C laut theweather — siehe Wetter-Card unten.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue weiter im Tief</strong>: PR-Bilanz SE 1–14/2026 = 2.028 Fälle, 1 Todesfall — Vorjahres-Zeitraum 52.193 Fälle, 90 Tote; Informe Nr. 19 vom 09.06 publiziert, Detail-Zahlen aktuell nicht extrahierbar.</li>\n      <li><span class=\"chip\">Event</span> <strong>Heute, 13–19 h, Londrina</strong>: Feira Flua Cultura — Edição São João, Concha Acústica, grätis. Kindershow „Tem Criança no Samba\".</li>\n      <li><span class=\"chip\">Event</span> <strong>27.06 Sa, 15 h</strong>: „A Saga do Gelo\" Musical (Frozen I + III), Teatro Marista Londrina — R$ 90/Person, unter 2 Jahre gratis.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Hopi Hari Arraiá (Vinhedo/SP)</strong>: Kinder bis 12 J. mit Trachten-Kleidung gratis, gültig bis 29.06; Erwachsene R$ 60–100, Code MDESTINOS15 = −15 %.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien</strong>: Rede Estadual PR 13.–24. Juli — Planungsfenster für einen Day-Trip oder das große SP-Wochenende.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Montag im Norte Pioneiro: Regen praktisch sicher, die Tagestemperatur eine Wundertüte (zwei Portale, drei Grad Differenz), und im Hintergrund eine ernste Gesundheitslage — die Atemwegswelle bei Säuglingen läuft hoch, RSV ist der Haupttreiber. Drinnen-Tag, Babyschutz dazu. Diese Woche der Auftakt zur Festa Junina im Londrina-Ring; heute Nachmittag eine grätis Edição São João vor Ort, am 27.06 das Frozen-Musical als Wochenend-Ziel.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Welle bei Säuglingen</strong>: Fiocruz-InfoGripe SE 21/2026 — alle 27 Bundesstaaten in Alert; VSR/RSV macht 48,5 % der jüngsten positiven SRAG-Tests aus; Babys unter 2 Jahren die Hauptbetroffenen; Paraná unter den Staaten mit steigender Tendenz.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Nasser, kühler Montag</strong>: 97 % Regenwahrscheinlichkeit (Climatempo), 7 mm; Temperatur 17–23 °C laut Climatempo, 14–20 °C laut theweather — siehe Wetter-Card unten.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue weiter im Tief</strong>: PR-Bilanz SE 1–14/2026 = 2.028 Fälle, 1 Todesfall — Vorjahres-Zeitraum 52.193 Fälle, 90 Tote; Informe Nr. 19 vom 09.06 publiziert, Detail-Zahlen aktuell nicht extrahierbar.</li>\n      <li><span class=\"chip\">Event</span> <strong>Heute, 13–19 h, Londrina</strong>: Feira Flua Cultura — Edição São João, Concha Acústica, grätis. Kindershow „Tem Criança no Samba\".</li>\n      <li><span class=\"chip\">Event</span> <strong>27.06 Sa, 15 h</strong>: „A Saga do Gelo\" Musical (Frozen I + III), Teatro Marista Londrina — R$ 90/Person, unter 2 Jahre gratis.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Hopi Hari Arraiá (Vinhedo/SP)</strong>: Kinder bis 12 J. mit Trachten-Kleidung gratis, gültig bis 29.06; Erwachsene R$ 60–100, Code MDESTINOS15 = −15 %.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien</strong>: Rede Estadual PR 13.–24. Juli — Planungsfenster für einen Day-Trip oder das große SP-Wochenende.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday in the Norte Pioneiro: rain almost certain, daytime temperature unpredictable (two forecasters, three-degree gap), and a serious health picture in the background — the respiratory wave in infants is ramping up, RSV is the main driver. Indoor day, baby protection on the agenda. This week opens the Festa Junina season in the Londrina region; today afternoon a free São João edition on-site, June 27 the Frozen musical as weekend plan.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV surge in infants</strong>: Fiocruz InfoGripe SE 21/2026 — all 27 Brazilian states in alert; RSV accounts for 48.5% of latest positive SRAG tests; babies under 2 the hardest hit; Paraná among states with rising trend.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Wet, cool Monday</strong>: 97% rain probability (Climatempo), 7 mm; temperature 17–23°C per Climatempo, 14–20°C per theweather — see weather card below.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue stays low</strong>: PR tally SE 1–14/2026 = 2,028 cases, 1 death — same period 2025 had 52,193 cases, 90 deaths; Report No. 19 dated 06-09 published, detailed numbers not currently machine-readable.</li>\n      <li><span class=\"chip\">Event</span> <strong>Today, 1–7 PM, Londrina</strong>: Feira Flua Cultura — São João Edition, Concha Acústica, free. Kids show \"Tem Criança no Samba\".</li>\n      <li><span class=\"chip\">Event</span> <strong>June 27 Sat, 3 PM</strong>: \"A Saga do Gelo\" Musical (Frozen I + III), Teatro Marista Londrina — R$ 90/person, free for kids under 2.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Hopi Hari Arraiá (Vinhedo/SP)</strong>: Kids up to 12 with traditional costume free, valid through June 29; adults R$ 60–100, code MDESTINOS15 = −15%.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break</strong>: PR State schools July 13–24 — planning window for a day trip or a big SP weekend.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira no Norte Pioneiro: chuva praticamente certa, temperatura do dia uma incerteza (dois portais, diferença de três graus), e ao fundo um quadro de saúde sério — a onda respiratória em lactentes está em alta, VSR é o principal fator. Dia de interior, proteção de bebê na agenda. Esta semana abre a temporada de Festa Junina na região de Londrina; hoje à tarde uma edição São João gratuita no local, 27 de junho o musical Frozen como plano de fim de semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Onda de VSR em lactentes</strong>: Fiocruz InfoGripe SE 21/2026 — todos os 27 estados em alerta; VSR representa 48,5% dos últimos testes SRAG positivos; bebês menores de 2 anos os mais atingidos; Paraná entre os estados com tendência crescente.</li>\n      <li><span class=\"chip\">Tempo</span> <strong>Segunda chuvosa e fresca</strong>: 97% de probabilidade de chuva (Climatempo), 7 mm; temperatura 17–23 °C segundo Climatempo, 14–20 °C segundo theweather — veja o card de tempo abaixo.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue segue em baixa</strong>: saldo PR SE 1–14/2026 = 2.028 casos, 1 óbito — mesmo período 2025 tinha 52.193 casos, 90 óbitos; Informe nº 19 de 09/06 publicado, números detalhados não extraíveis por máquina no momento.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Hoje, 13–19 h, Londrina</strong>: Feira Flua Cultura — Edição São João, Concha Acústica, gratuito. Show infantil \"Tem Criança no Samba\".</li>\n      <li><span class=\"chip\">Evento</span> <strong>27/06 sá, 15 h</strong>: Musical \"A Saga do Gelo\" (Frozen I + III), Teatro Marista Londrina — R$ 90/pessoa, grátis menores de 2 anos.</li>\n      <li><span class=\"chip good\">Passeio</span> <strong>Hopi Hari Arraiá (Vinhedo/SP)</strong>: crianças até 12 anos com roupa tradicional entrada gratuita, válido até 29/06; adultos R$ 60–100, código MDESTINOS15 = −15%.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno</strong>: Rede Estadual PR 13.–24. de julho — janela de planejamento para um passeio de dia ou um grande fim de semana SP.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes en el Norte Pioneiro: lluvia prácticamente segura, temperatura del día una incógnita (dos portales, diferencia de tres grados), y de fondo un cuadro de salud serio — la onda respiratoria en lactantes está al alza, VSR es el factor principal. Día de interior, protección de bebé en la agenda. Esta semana abre la temporada de Festa Junina en la región de Londrina; hoy a la tarde una edición São João gratuita en el lugar, el 27 de junio el musical Frozen como plan de fin de semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Onda de VSR en lactantes</strong>: Fiocruz InfoGripe SE 21/2026 — todos los 27 estados en alerta; VSR representa 48,5% de las últimas pruebas SRAG positivas; bebés menores de 2 años los más afectados; Paraná entre los estados con tendencia creciente.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Lunes lluvioso y fresco</strong>: 97% de probabilidad de lluvia (Climatempo), 7 mm; temperatura 17–23 °C según Climatempo, 14–20 °C según theweather — ve la tarjeta de clima abajo.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue sigue en baja</strong>: saldo PR SE 1–14/2026 = 2.028 casos, 1 muerte — mismo período 2025 tenía 52.193 casos, 90 muertes; Informe nº 19 del 09/06 publicado, números detallados no extraíbles por máquina en este momento.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Hoy, 13–19 h, Londrina</strong>: Feira Flua Cultura — Edición São João, Concha Acústica, gratuito. Show infantil \"Tem Criança no Samba\".</li>\n      <li><span class=\"chip\">Evento</span> <strong>27/06 sá, 15 h</strong>: Musical \"A Saga do Gelo\" (Frozen I + III), Teatro Marista Londrina — R$ 90/persona, gratis menores de 2 años.</li>\n      <li><span class=\"chip good\">Paseo</span> <strong>Hopi Hari Arraiá (Vinhedo/SP)</strong>: niños hasta 12 años con ropa tradicional entrada gratuita, válido hasta 29/06; adultos R$ 60–100, código MDESTINOS15 = −15%.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno</strong>: Red Estatal PR 13.–24. de julio — ventana de planificación para un paseo de día o un gran fin de semana SP.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 15. Juni — dritte Runde im Wochenthema Wirtschaft &amp; Finanzen. Nach Inflation/Zins (25.05) und Arbeit/Verträge (01.06) heute der Teil, der dich als deutschen Freelancer in Brasilien direkt im Geldbeutel trifft: <em>Steuern absetzen, Geld anlegen, Devisen schwanken</em>. 33 neue Einträge, 10 Verben mit voller Konjugation, 3 Wiederholungen aus der ersten Wirtschaftswoche (vor 21 Tagen — genau das Wiederhol-Fenster, in dem Wörter ins Langzeitgedächtnis kippen).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES gravar ≠ DE gravieren / PT gravar</strong> — auf Spanisch heißt „gravar\" <em>besteuern</em> (gravar con impuestos); auf Portugiesisch heißt es <em>aufnehmen/eingravieren</em> (gravar um vídeo); auf Deutsch nichts in der Finanzwelt. Drei Bedeutungen, ein Wort.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Rendite ≠ EN „rent\"</strong> — Rendite ist der <em>Ertrag</em> einer Anlage (EN: return/yield), nicht Miete. EN „rent\" = DE Miete.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>schwarze Zahlen schreiben</strong> = profitabel sein. PT dreht die Farben um: <em>estar no azul</em> („im Blauen\"); ES bleibt bei Schwarz: <em>estar en números negros</em>.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>das Geld arbeiten lassen</strong> = passiv investieren. PT <em>fazer o dinheiro trabalhar</em>; ES <em>poner el dinero a trabajar</em>. Gleiches Bild in allen drei Sprachen.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES invertir</strong> ist Stammwechsler e→ie: <em>yo invierto</em>, aber <em>nosotros invertimos</em> (kein Diphthong in der wir-Form). Im Préterito wird daraus e→i: <em>él invirtió</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES deducir</strong> macht zwei Tricks: <em>yo deduzco</em> (c→zc in der yo-Präsens) und <em>yo deduje</em> (Préterito mit Stamm <em>deduj-</em>, kein Akzent). Selbes Muster wie <em>traducir</em>, <em>producir</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT aplicar &amp; sacar</strong> brauchen c→qu vor e: <em>eu apliquei / saquei</em> (nicht *apliquei oder *sacei aussprechen — qu hält das harte K). Subjunktiv: <em>aplique, saque</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>diversificar</strong> (PT+ES) hat denselben c→qu-Trick: <em>eu diversifiquei / yo diversifiqué</em>, Subjunktiv <em>diversifique</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Fonds</strong> (m) — und im Plural <em>die Fonds</em> mit demselben -s. Falle: <em>*die Fonde</em> gibt es nicht.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>alíquota</strong> für „Steuersatz\" — Brasilianer sagen <em>a alíquota do IR é 27,5 %</em>, nicht <em>a taxa</em>. Europäer sagen <em>taxa</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>IRPF</strong> (Imposto de Renda Pessoa Física) — der brasilianische Alltagsbegriff für die Einkommensteuer-Erklärung. <em>Estou fazendo o IRPF</em> = ich mache gerade die Steuererklärung.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>PT estar no vermelho ↔ no azul</strong> — wörtlich „im Roten\" (Minus) bzw. „im Blauen\" (Plus). Brasilianische Bankauszüge sind tatsächlich rot/blau formatiert.</li>\n    </ul></div>",
