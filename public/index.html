<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, print, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons mirror pagr exactly: crisp SVGs, not emoji/glyphs, so they
     render identically everywhere and sit on the baseline (the old emoji flag
     rode high). Each icon slot is a flex box centring its SVG. */
  .theme-icon { display: inline-flex; align-items: center; flex: none; }
  .lang-flag  { display: inline-flex; align-items: center; flex: none; }
  .flag {
    display: inline-block;
    width: 15px; height: 10px;
    flex: none;
    border: 1px solid var(--border);
  }

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --cat-accent: var(--c-jobs);           --cat-accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); --cat-accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport);     --cat-accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto);  --cat-accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted-ink); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --cat-accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    margin: 0;
    border-radius: 0;
    cursor: pointer; font-weight: 600; font-size: 0.8rem;
    color: var(--foreground);
    transition: background 120ms, color 0.15s ease;
    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — hide the header + footer chrome and let the iframe content (or
     home grid) take the full page. Same-origin iframes print their content
     natively, so the visible newsletter prints with its own @media print
     rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, footer.status-bar, .loading, .print-dialog, .nav-rail, .rail-fab {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted-ink);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--cat-accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--cat-accent-text);
    color: var(--bg);
    border: 1px solid var(--cat-accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">
      <p class="home-stand" id="home-stand" hidden><!-- populated by JS: "Stand: DD.MM.YYYY" --></p>
      <div class="tldr-grid" id="tldr-grid"><!-- populated by JS --></div>
    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
          <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
          <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
          <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
                font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, print, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">
      <span class="status-tag">[briefs]</span> <span class="status-host">reader@briefs:</span><span class="status-loc" id="status-loc">~</span>
    </span>
    <nav class="status-controls" aria-label="Einstellungen">
      <a class="status-btn status-link" href="/datenschutz.html">datenschutz</a>
      <a class="status-btn status-link" href="/impressum.html">impressum</a>
      <span class="status-sep" aria-hidden="true"></span>
      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-label="Sprache wählen" title="Sprache wählen">
          <span class="lang-flag" aria-hidden="true"><!-- SVG flag injected by JS --></span>
          <span class="lang-label-short">DE</span>
          <span class="lang-caret" aria-hidden="true">▾</span>
        </button>
        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="de" aria-selected="true">
            <span class="lang-flag" aria-hidden="true"></span><span>Deutsch</span>
          </button>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="en" aria-selected="false">
            <span class="lang-flag" aria-hidden="true"></span><span>English</span>

nwind.</li>\n      <li><span class=\"chip good\">Öl</span> <strong>Brent ~72 $</strong> (−4 % am Fr): Hormus-Schifffahrt normalisiert, US-Iran-Interimsdeal — Disinflations-Rückenwind, der der BCB Spielraum gibt.</li>\n      <li><span class=\"chip\">BR-Fiskal</span> <strong>R$143,7 Mrd. Wahljahr-Paket</strong>: 11 neue Ausgaben-Maßnahmen vor der Oktober-Wahl — das größte mittelfristige Real-Risiko.</li>\n      <li><span class=\"chip\">Wahl</span> <strong>1. Runde 04.10., Stichwahl 25.10.</strong>: Wahljahr-Unsicherheit + Fiskal-Expansion können den Real ab Q3 belasten.</li>\n    </ul></div>",

>\n      <li><span class=\"chip good\">Öl</span> <strong>Brent ~72 $</strong> (−4 % am Fr): Hormus-Schifffahrt normalisiert, US-Iran-Interimsdeal — Disinflations-Rückenwind, der der BCB Spielraum gibt.</li>\n      <li><span class=\"chip\">BR-Fiskal</span> <strong>R$143,7 Mrd. Wahljahr-Paket</strong>: 11 neue Ausgaben-Maßnahmen vor der Oktober-Wahl — das größte mittelfristige Real-Risiko.</li>\n      <li><span class=\"chip\">Wahl</span> <strong>1. Runde 04.10., Stichwahl 25.10.</strong>: Wahljahr-Unsicherheit + Fiskal-Expansion können den Real ab Q3 belasten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, trading is back — and the picture shifts slightly against you as a euro earner. The dollar weakens today (DXY 101.33, second weakness session in a row), and the real firms through the carry advantage: USD/BRL falls to 5.1718 (−0.28 %). Result: the live-traded EUR/BRL spot sits around 5.88, below the official ECB fix of 5.9010 (Friday). For your exchange: the window remains good (euro near year-high against real), but today slightly pricier than Friday's fix suggests. The medium-term support stays the ECB hike from June 11 — the euro's leverage. The spot anchor is live today; the ECB Monday fix appears around 16:00 CET.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5.88 live</strong> vs. ECB fix 5.9010 (Fri): the spot drops below the fix because the real firms today — good, but slightly pricier than Friday.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY 101.33</strong> (−0.03 %, 2nd weakness session): soft dollar = global less pressure on the real → EUR/BRL move today comes from the real side.</li>\n      <li><span class=\"chip\">BR</span> <strong>USD/BRL 5.1718</strong> (−0.28 % on the day): real firm through the large carry advantage (Selic 14.25 % vs. Fed 3.50–3.75 %) — classic carry.</li>\n      <li><span class=\"chip\">Cross-check</span> <strong>Anchor consistent</strong>: ECB fix 5.9010 vs. implied 5.9011 (USD/BRL × EUR/USD) — 0.001 % divergence, no flag (fix legs from June 26).</li>\n      <li><span class=\"chip hot\">ECB</span> <strong>+25 bp to 2.25 %</strong> (June 11): first hike in three years, Iran energy shock drives inflation — the structural euro leverage behind the ~5.9 rate.</li>\n      <li><span class=\"chip\">Central banks</span> <strong>Three directions</strong>: ECB up, Fed holds (3.50–3.75 %), BCB cuts to 14.25 % — the narrowing US-BR rate spread is structural BRL headwind.</li>\n      <li><span class=\"chip good\">Oil</span> <strong>Brent ~72 $</strong> (−4 % on Fri): Hormuz shipping normalizes, US-Iran interim deal — disinflation tailwind giving the BCB room.</li>\n      <li><span class=\"chip\">BR fiscal</span> <strong>R$ 143.7 bn election-year package</strong>: 11 new spending measures ahead of October election — the biggest medium-term real risk.</li>\n      <li><span class=\"chip\">Election</span> <strong>Round 1 Oct 4, runoff Oct 25</strong>: election-year uncertainty + fiscal expansion can weigh on the real from Q3 onward.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, o comércio volta — e o quadro muda um pouco contra você como ganho em euros. O dólar enfraquece hoje (DXY 101,33, segunda sessão de fraqueza seguida), e o real se fortalece através da vantagem de carry: USD/BRL cai para 5,1718 (−0,28 %). Resultado: o EUR/BRL negociado ao vivo fica em torno de 5,88, abaixo da taxa do BCE de 5,9010 (sexta). Para sua troca: a janela permanece boa (euro perto da máxima do ano contra o real), mas hoje um pouco mais cara do que a taxa de sexta-feira sugere. O suporte de médio prazo permanece o aumento do BCE de 11 de junho — a alavancagem do euro. O âncora do spot é live hoje; a taxa do BCE de segunda-feira aparece por volta das 16:00 CET.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5,88 live</strong> vs. taxa do BCE 5,9010 (sex): o spot cai abaixo da taxa porque o real se fortalece hoje — bom, mas um pouco mais caro que sexta-feira.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY 101,33</strong> (−0,03 %, 2ª sessão de fraqueza): dólar fraco = menos pressão global no real → movimento EUR/BRL hoje vem do lado do real.</li>\n      <li><span class=\"chip\">BR</span> <strong>USD/BRL 5,1718</strong> (−0,28 % no dia): real forte através da grande vantagem de carry (Selic 14,25 % vs. Fed 3,50–3,75 %) — carry clássico.</li>\n      <li><span class=\"chip\">Verificação cruzada</span> <strong>Âncora consistente</strong>: taxa do BCE 5,9010 vs. implícita 5,9011 (USD/BRL × EUR/USD) — divergência de 0,001 %, sem sinal (pernas da taxa de 26 de junho).</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 pb para 2,25 %</strong> (11 de junho): primeiro aumento em três anos, choque energético do Irã impulsiona inflação — a alavancagem estrutural do euro por trás da taxa de ~5,9.</li>\n      <li><span class=\"chip\">Bancos Centrais</span> <strong>Três direções</strong>: BCE sobe, Fed mantém (3,50–3,75 %), BCB corta para 14,25 % — o estreitamento do diferencial de taxa EUA-BR é headwind estrutural do real.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent ~72 $</strong> (−4 % na sex): navegação em Ormuz normaliza, acordo interino EUA-Irã — tailwind de desinflação dando espaço ao BCB.</li>\n      <li><span class=\"chip\">Fiscal BR</span> <strong>R$ 143,7 bi pacote de ano eleitoral</strong>: 11 novas medidas de gastos antes da eleição de outubro — o maior risco de médio prazo para o real.</li>\n      <li><span class=\"chip\">Eleição</span> <strong>1ª volta 04 de outubro, 2ª volta 25 de outubro</strong>: incerteza de ano eleitoral + expansão fiscal podem pressionar o real a partir de Q3.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, el comercio regresa — y el panorama se inclina un poco en contra tuyo como ganador en euros. El dólar se debilita hoy (DXY 101,33, segunda sesión de debilidad consecutiva), y el real se fortalece a través de la ventaja de carry: USD/BRL cae a 5,1718 (−0,28 %). Resultado: el EUR/BRL negociado en vivo está alrededor de 5,88, por debajo de la tasa del BCE de 5,9010 (viernes). Para tu cambio: la ventana sigue siendo buena (euro cerca del máximo del año contra el real), pero hoy un poco más caro de lo que el viernes sugiere. El soporte de mediano plazo sigue siendo la subida del BCE del 11 de junio — el apalancamiento del euro. El ancla del spot es en vivo hoy; la tasa del BCE del lunes aparece alrededor de las 16:00 CET.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5,88 en vivo</strong> vs. tasa del BCE 5,9010 (vie): el spot cae por debajo de la tasa porque el real se fortalece hoy — bueno, pero un poco más caro que el viernes.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY 101,33</strong> (−0,03 %, 2ª sesión de debilidad): dólar débil = menos presión global en el real → movimiento EUR/BRL hoy viene del lado del real.</li>\n      <li><span class=\"chip\">BR</span> <strong>USD/BRL 5,1718</strong> (−0,28 % en el día): real fuerte a través de la gran ventaja de carry (Selic 14,25 % vs. Fed 3,50–3,75 %) — carry clásico.</li>\n      <li><span class=\"chip\">Verificación cruzada</span> <strong>Ancla consistente</strong>: tasa del BCE 5,9010 vs. implícita 5,9011 (USD/BRL × EUR/USD) — divergencia de 0,001 %, sin bandera (patas de la tasa del 26 de junio).</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 pb a 2,25 %</strong> (11 de junio): primera subida en tres años, choque energético del Irán impulsa la inflación — el apalancamiento estructural del euro detrás de la tasa de ~5,9.</li>\n      <li><span class=\"chip\">Bancos centrales</span> <strong>Tres direcciones</strong>: BCE sube, Fed mantiene (3,50–3,75 %), BCB baja a 14,25 % — el estrechamiento del diferencial de tasa EE.UU.-BR es headwind estructural del real.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent ~72 $</strong> (−4 % el vie): la navegación por Ormuz se normaliza, acuerdo interino EE.UU.-Irán — tailwind de desinflación dando espacio al BCB.</li>\n      <li><span class=\"chip\">Fiscal BR</span> <strong>R$ 143,7 mil millones paquete de año electoral</strong>: 11 nuevas medidas de gasto antes de las elecciones de octubre — el mayor riesgo de mediano plazo para el real.</li>\n      <li><span class=\"chip\">Elección</span> <strong>1ª vuelta 04 de octubre, 2ª vuelta 25 de octubre</strong>: incertidumbre de año electoral + expansión fiscal pueden presionar el real desde Q3.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Montag — die US-Börsen öffnen heute wieder, nach einer Woche, in der alles, was nach Risiko aussah, verkauft wurde. Das Schwergewicht des Tages liegt im Krypto-Markt: Die US-Spot-Bitcoin-ETFs verloren in der Woche bis zum 26. Juni netto 1,79 Mrd. $ — die zweitschlimmste Woche seit ihrem Start im Januar 2024. Bitcoin steht bei 59.459 $, mehr als die Hälfte unter dem Oktober-Hoch, und der durchschnittliche IBIT-Anleger sitzt jetzt auf rund 40 % Verlust. Daneben fällt Öl (Brent 71,99 $) weiter mit der Hormuz-Öffnung, Gold gibt die vierte Woche in Folge nach, und im Aktien-Tape (Stand: Freitagsschluss 26.06.) lief KI-Software gegen KI-Hardware. Heute zählt: Wie reagiert das US-Open auf all das?</p>\n    <ul>\n      <li><span class=\"chip hot\">BITCOIN-ETF</span> <strong>1,79 Mrd. $ Wochen-Abfluss</strong>: zweitschlimmste Woche seit 2024; IBIT allein −444,5 Mio. $ am 26.06. (7. Abfluss-Tag in Folge, größter Einzeltag seit Auflage).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC 59.459 $</strong> (−7,1 % auf 7 Tage), −52,9 % vom Okt-2025-Hoch (126.272 $) — der Durchschnitts-IBIT-Anleger liegt jetzt ~40 % im Minus.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.565 $</strong> (−0,9 % 24 h) — Ether-ETFs bluten parallel den 7. Tag in Folge.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent 71,99 $</strong> (Schluss 26.06., −4,3 %), &gt;10 % auf die Woche — Hormuz-Verschiffung bei ~75 % des Vorkriegs-Niveaus, niedrigster Stand seit Ende Februar.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~4.051 $</strong>/oz (29.06.) — vierte Verlust-Woche in Folge (~−3 %), hawkische Fed stützt den Dollar.</li>\n      <li><span class=\"chip good\">KI-SOFTWARE</span> <strong>MSFT +5,71 %</strong> auf 372,97 $ (Schluss 26.06.) — Geld rotiert von KI-Hardware in KI-Software; Q4-Zahlen am 28.07.</li>\n      <li><span class=\"chip\">KI-HARDWARE</span> <strong>NVDA 192,53 $</strong> (Schluss 26.06., −1,64 %), −7,1 % 7T, jetzt 1,5 Bio. $ unter dem Okt-Hoch; eigene Zahlen am 26.08.</li>\n      <li><span class=\"chip\">KRYPTO-SEKTOREN</span> <strong>Ränder rot</strong>: DOGE 0,0728 $ (−13 % 7T), SHIB 0,0000042 $ — Risk-off trifft die Spekulations-Ränder am härtesten.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Montag — die US-Börsen öffnen heute wieder, nach einer Woche, in der alles, was nach Risiko aussah, verkauft wurde. Das Schwergewicht des Tages liegt im Krypto-Markt: Die US-Spot-Bitcoin-ETFs verloren in der Woche bis zum 26. Juni netto 1,79 Mrd. $ — die zweitschlimmste Woche seit ihrem Start im Januar 2024. Bitcoin steht bei 59.459 $, mehr als die Hälfte unter dem Oktober-Hoch, und der durchschnittliche IBIT-Anleger sitzt jetzt auf rund 40 % Verlust. Daneben fällt Öl (Brent 71,99 $) weiter mit der Hormuz-Öffnung, Gold gibt die vierte Woche in Folge nach, und im Aktien-Tape (Stand: Freitagsschluss 26.06.) lief KI-Software gegen KI-Hardware. Heute zählt: Wie reagiert das US-Open auf all das?</p>\n    <ul>\n      <li><span class=\"chip hot\">BITCOIN-ETF</span> <strong>1,79 Mrd. $ Wochen-Abfluss</strong>: zweitschlimmste Woche seit 2024; IBIT allein −444,5 Mio. $ am 26.06. (7. Abfluss-Tag in Folge, größter Einzeltag seit Auflage).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC 59.459 $</strong> (−7,1 % auf 7 Tage), −52,9 % vom Okt-2025-Hoch (126.272 $) — der Durchschnitts-IBIT-Anleger liegt jetzt ~40 % im Minus.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~1.565 $</strong> (−0,9 % 24 h) — Ether-ETFs bluten parallel den 7. Tag in Folge.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent 71,99 $</strong> (Schluss 26.06., −4,3 %), &gt;10 % auf die Woche — Hormuz-Verschiffung bei ~75 % des Vorkriegs-Niveaus, niedrigster Stand seit Ende Februar.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~4.051 $</strong>/oz (29.06.) — vierte Verlust-Woche in Folge (~−3 %), hawkische Fed stützt den Dollar.</li>\n      <li><span class=\"chip good\">KI-SOFTWARE</span> <strong>MSFT +5,71 %</strong> auf 372,97 $ (Schluss 26.06.) — Geld rotiert von KI-Hardware in KI-Software; Q4-Zahlen am 28.07.</li>\n      <li><span class=\"chip\">KI-HARDWARE</span> <strong>NVDA 192,53 $</strong> (Schluss 26.06., −1,64 %), −7,1 % 7T, jetzt 1,5 Bio. $ unter dem Okt-Hoch; eigene Zahlen am 26.08.</li>\n      <li><span class=\"chip\">KRYPTO-SEKTOREN</span> <strong>Ränder rot</strong>: DOGE 0,0728 $ (−13 % 7T), SHIB 0,0000042 $ — Risk-off trifft die Spekulations-Ränder am härtesten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Monday — US markets reopen today after a week in which everything that looked risky got sold. The heavyweight of the day sits in crypto: US spot-Bitcoin ETFs posted net outflows of $1.79 billion in the week through June 26 — the second-worst week since launch in January 2024. Bitcoin trades at $59,459, more than half below the October high, and the average IBIT investor is now sitting on roughly 40% losses. Oil falls (Brent $71.99) along with the Hormuz opening, gold posts its fourth losing week in a row, and in equities (as of Friday close June 26), AI software traded against AI hardware. Today counts: how does the US open react to all of it?</p>\n    <ul>\n      <li><span class=\"chip hot\">BITCOIN-ETF</span> <strong>$1.79B weekly outflow</strong>: second-worst week since 2024; IBIT alone −$444.5M on June 26 (7th consecutive outflow day, largest single day since inception).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC $59,459</strong> (−7.1% on 7 days), −52.9% from Oct 2025 high ($126,272) — average IBIT investor now ~40% in the red.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~$1,565</strong> (−0.9% 24h) — Ether ETFs bleeding parallel to BTC for 7th consecutive day.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent $71.99</strong> (close June 26, −4.3%), &gt;−10% on the week — Hormuz shipments at ~75% of pre-crisis levels, lowest since late February.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~$4,051</strong>/oz (June 29) — fourth consecutive losing week (~−3%), hawkish Fed supports the dollar.</li>\n      <li><span class=\"chip good\">AI-SOFTWARE</span> <strong>MSFT +5.71%</strong> to $372.97 (close June 26) — money rotating from AI hardware into AI software; Q4 earnings July 28.</li>\n      <li><span class=\"chip\">AI-HARDWARE</span> <strong>NVDA $192.53</strong> (close June 26, −1.64%), −7.1% 7D, now $1.5T below Oct high; own earnings Aug 26.</li>\n      <li><span class=\"chip\">CRYPTO-SECTORS</span> <strong>Margins red</strong>: DOGE $0.0728 (−13% 7D), SHIB $0.0000042 — risk-off hits the speculative fringe hardest.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É segunda-feira — as bolsas norte-americanas reabrem hoje após uma semana em que praticamente tudo com aparência de risco foi vendido. O peso do dia está no mercado cripto: os ETFs spot-Bitcoin norte-americanos registraram saídas líquidas de $1,79 bilhão na semana até 26 de junho — a segunda pior semana desde seu lançamento em janeiro de 2024. Bitcoin está em $59.459, mais da metade abaixo da máxima de outubro, e o investidor médio em IBIT agora está com cerca de 40% de perdas. Petróleo cai (Brent $71,99) com a abertura de Ormuz, ouro registra sua quarta semana seguida de perdas, e no tape de ações (fechamento de sexta 26.06.) IA-software foi negociada contra IA-hardware. Hoje o que importa: como o mercado norte-americano reage a tudo isso?</p>\n    <ul>\n      <li><span class=\"chip hot\">ETF-BITCOIN</span> <strong>Saída de $1,79 bilhão na semana</strong>: segunda pior semana desde 2024; apenas IBIT −$444,5 milhões em 26.06. (7º dia consecutivo de saída, maior saída de um único dia desde o lançamento).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC $59.459</strong> (−7,1% em 7 dias), −52,9% da máxima de outubro de 2025 ($126.272) — investidor médio em IBIT agora ~40% no vermelho.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~$1.565</strong> (−0,9% 24h) — ETFs de Ether sangrando paralelamente por 7º dia consecutivo.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent $71,99</strong> (fechamento 26.06., −4,3%), &gt;−10% na semana — embarques por Ormuz em ~75% dos níveis pré-crise, menor desde fim de fevereiro.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro ~$4.051</strong>/onça (29.06.) — quarta semana consecutiva de perdas (~−3%), Fed hawkish suporta o dólar.</li>\n      <li><span class=\"chip good\">IA-SOFTWARE</span> <strong>MSFT +5,71%</strong> para $372,97 (fechamento 26.06.) — dinheiro rotacionando de IA-hardware para IA-software; resultados Q4 em 28.07.</li>\n      <li><span class=\"chip\">IA-HARDWARE</span> <strong>NVDA $192,53</strong> (fechamento 26.06., −1,64%), −7,1% 7D, agora $1,5 trilhão abaixo da máxima de outubro; resultados próprios em 26.08.</li>\n      <li><span class=\"chip\">SETORES-CRIPTO</span> <strong>Margens vermelhas</strong>: DOGE $0,0728 (−13% 7D), SHIB $0,0000042 — risco-off atinge as margens especulativas com mais força.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es lunes — los mercados estadounidenses reabrirán hoy después de una semana en la que prácticamente todo lo que parecía riesgoso fue vendido. El peso del día está en el mercado cripto: los ETFs spot-Bitcoin estadounidenses registraron salidas netas de $1,79 mil millones en la semana hasta el 26 de junio — la segunda peor semana desde su lanzamiento en enero de 2024. Bitcoin está en $59.459, más de la mitad por debajo del máximo de octubre, y el inversor promedio en IBIT ahora está en pérdidas de aproximadamente 40%. El petróleo baja (Brent $71,99) con la apertura de Ormuz, el oro registra su cuarta semana consecutiva de pérdidas, y en el tape de acciones (cierre del viernes 26.06.), el software de IA se negoció contra el hardware de IA. Hoy lo que importa: ¿cómo reacciona la apertura estadounidense a todo esto?</p>\n    <ul>\n      <li><span class=\"chip hot\">ETF-BITCOIN</span> <strong>Salida de $1,79 mil millones en la semana</strong>: segunda peor semana desde 2024; solo IBIT −$444,5 millones el 26.06. (séptimo día consecutivo de salida, mayor salida en un solo día desde el lanzamiento).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC $59.459</strong> (−7,1% en 7 días), −52,9% desde el máximo de octubre de 2025 ($126.272) — inversor promedio en IBIT ahora ~40% en rojo.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~$1.565</strong> (−0,9% 24h) — ETFs de Ether sangrando paralelos por séptimo día consecutivo.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent $71,99</strong> (cierre 26.06., −4,3%), &gt;−10% en la semana — embarques por Ormuz en ~75% de niveles precrisis, menor desde fin de febrero.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro ~$4.051</strong>/onza (29.06.) — cuarta semana consecutiva de pérdidas (~−3%), Fed hawkish respalda al dólar.</li>\n      <li><span class=\"chip good\">SOFTWARE-IA</span> <strong>MSFT +5,71%</strong> a $372,97 (cierre 26.06.) — dinero rotando de hardware-IA a software-IA; resultados Q4 el 28.07.</li>\n      <li><span class=\"chip\">HARDWARE-IA</span> <strong>NVDA $192,53</strong> (cierre 26.06., −1,64%), −7,1% 7D, ahora $1,5 billones por debajo del máximo de octubre; resultados propios el 26.08.</li>\n      <li><span class=\"chip\">SECTORES-CRIPTO</span> <strong>Márgenes rojos</strong>: DOGE $0,0728 (−13% 7D), SHIB $0,0000042 — riesgo-off golpea los márgenes especulativos más fuerte.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Wochenstart, aber ein lauter Vorabend: Qualcomm legt fast 4 Milliarden auf den Tisch, um die Software-Schicht zu kaufen, die AI-Code von Nvidia-Hardware löst — und parallel läuft eine Security-Woche, die man nicht verschlafen sollte. Cisco und Splunk haben aktiv ausgenutzte Bugs (CISA-KEV), SAP einen bereits gepatchten 9,9-Punkte-Bug; eine CISA-Frist ist gestern verstrichen.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm kauft Modular für ~3,92 Mrd. $</strong>: Mojo + MAX, der hardware-agnostische Compiler-Stack gegen Nvidias CUDA-Lock-in.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Cisco Unified CM CVE-2026-20230</strong> (CVSS 8,6): SSRF-zu-Root, aktiv ausgenutzt, in der CISA-KEV — Bundes-Frist 28.06. ist durch.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Splunk Enterprise CVE-2026-20253</strong> (CVSS 9,8): unauth File-Write über den Postgres-Sidecar, KEV-gelistet, aktiv ausgenutzt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EU</span> <strong>SAP NetWeaver CVE-2026-44748</strong> (CVSS 9,9): SAML-Signature-Wrapping in ABAP — alle unterstützten Releases betroffen, Patch ist da.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Defender-Zero-Day „RoguePlanet\"</strong> (CVE-2026-50656): SYSTEM-Shell auf voll gepatchten Win10/11, PoC public — Patch fehlt weiter.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">USA</span> <strong>Micron Rekord-Quartal</strong>: 41,46 Mrd. $ Umsatz (+346 % YoY), Q4-Guidance 50 Mrd. $ — der Memory-Supercycle ist real.</li>\n      <li><span class=\"chip\">Infra</span> <strong>SK Hynix Nasdaq-ADR</strong>: bis zu ~29 Mrd. $ — Rekord-ADR, Erlös komplett in Fabs, Listing-Ziel 10. Juli.</li>\n      <li><span class=\"chip\">Infra</span> <strong>OpenAI + Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-ASIC (TSMC 3 nm) — Hardware-Seite hier, Modell-Seite im ai-dev-Brief.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA Typ-A-Frist 30.08.2026</strong>: horizontale Produkte ~62 Tage vor Compliance, Meldepflichten ab 11.09.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Wochenstart, aber ein lauter Vorabend: Qualcomm legt fast 4 Milliarden auf den Tisch, um die Software-Schicht zu kaufen, die AI-Code von Nvidia-Hardware löst — und parallel läuft eine Security-Woche, die man nicht verschlafen sollte. Cisco und Splunk haben aktiv ausgenutzte Bugs (CISA-KEV), SAP einen bereits gepatchten 9,9-Punkte-Bug; eine CISA-Frist ist gestern verstrichen.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm kauft Modular für ~3,92 Mrd. $</strong>: Mojo + MAX, der hardware-agnostische Compiler-Stack gegen Nvidias CUDA-Lock-in.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Cisco Unified CM CVE-2026-20230</strong> (CVSS 8,6): SSRF-zu-Root, aktiv ausgenutzt, in der CISA-KEV — Bundes-Frist 28.06. ist durch.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Splunk Enterprise CVE-2026-20253</strong> (CVSS 9,8): unauth File-Write über den Postgres-Sidecar, KEV-gelistet, aktiv ausgenutzt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EU</span> <strong>SAP NetWeaver CVE-2026-44748</strong> (CVSS 9,9): SAML-Signature-Wrapping in ABAP — alle unterstützten Releases betroffen, Patch ist da.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Defender-Zero-Day „RoguePlanet\"</strong> (CVE-2026-50656): SYSTEM-Shell auf voll gepatchten Win10/11, PoC public — Patch fehlt weiter.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">USA</span> <strong>Micron Rekord-Quartal</strong>: 41,46 Mrd. $ Umsatz (+346 % YoY), Q4-Guidance 50 Mrd. $ — der Memory-Supercycle ist real.</li>\n      <li><span class=\"chip\">Infra</span> <strong>SK Hynix Nasdaq-ADR</strong>: bis zu ~29 Mrd. $ — Rekord-ADR, Erlös komplett in Fabs, Listing-Ziel 10. Juli.</li>\n      <li><span class=\"chip\">Infra</span> <strong>OpenAI + Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-ASIC (TSMC 3 nm) — Hardware-Seite hier, Modell-Seite im ai-dev-Brief.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA Typ-A-Frist 30.08.2026</strong>: horizontale Produkte ~62 Tage vor Compliance, Meldepflichten ab 11.09.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet Monday start, but a loud eve: Qualcomm is laying down nearly $4 billion to buy the software layer that runs AI code free from Nvidia hardware — and in parallel, a security week that's hard to miss. Cisco and Splunk have actively exploited bugs (CISA KEV), and SAP an already-patched near-perfect (9.9) bug; a CISA deadline expired yesterday.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm buys Modular for ~$3.92B</strong>: Mojo + MAX, the hardware-agnostic compiler stack against Nvidia's CUDA lock-in.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Cisco Unified CM CVE-2026-20230</strong> (CVSS 8.6): SSRF-to-root, actively exploited, in the CISA KEV — federal deadline June 28 has passed.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Splunk Enterprise CVE-2026-20253</strong> (CVSS 9.8): unauthenticated file-write via the Postgres sidecar, KEV-listed, actively exploited.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EU</span> <strong>SAP NetWeaver CVE-2026-44748</strong> (CVSS 9.9): SAML-signature wrapping in ABAP — all supported releases affected, patch available.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Defender zero-day \"RoguePlanet\"</strong> (CVE-2026-50656): SYSTEM shell on fully patched Win10/11, PoC public — patch still missing.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">USA</span> <strong>Micron record quarter</strong>: $41.46B revenue (+346% YoY), Q4 guidance $50B — the memory supercycle is real.</li>\n      <li><span class=\"chip\">Infra</span> <strong>SK Hynix Nasdaq ADR</strong>: up to ~$29B — record ADR, proceeds entirely for fabs, listing target July 10.</li>\n      <li><span class=\"chip\">Infra</span> <strong>OpenAI + Broadcom \"Jalapeño\"</strong>: first custom inference ASIC (TSMC 3nm) — hardware side here, model side in ai-dev brief.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>CRA Type-A deadline Aug 30, 2026</strong>: horizontal products ~62 days to compliance, reporting obligations start Sept 11.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma segunda-feira tranquila, mas uma véspera agitada: Qualcomm está investindo quase 4 bilhões de dólares para comprar a camada de software que executa código de IA livre do hardware da Nvidia — e em paralelo, uma semana de segurança que é impossível ignorar. Cisco e Splunk têm bugs sendo explorados ativamente (CISA KEV), e a SAP um bug 9,9 já corrigido; um prazo da CISA expirou ontem.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <span class=\"chip\">EUA</span> <strong>Qualcomm compra Modular por ~3,92 bilhões de dólares</strong>: Mojo + MAX, a pilha de compiladores agnóstica em relação ao hardware contra o lock-in CUDA da Nvidia.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Cisco Unified CM CVE-2026-20230</strong> (CVSS 8,6): SSRF para root, sendo explorado ativamente, na lista KEV da CISA — prazo federal 28 de junho expirou.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Splunk Enterprise CVE-2026-20253</strong> (CVSS 9,8): escrita de arquivo não autenticada via sidecar do Postgres, listado em KEV, sendo explorado ativamente.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">EU</span> <strong>SAP NetWeaver CVE-2026-44748</strong> (CVSS 9,9): wrapping de assinatura SAML em ABAP — todos os releases suportados afetados, patch disponível.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Zero-day do Defender \"RoguePlanet\"</strong> (CVE-2026-50656): shell SYSTEM em Win10/11 totalmente patchados, PoC público — patch ainda faltando.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">EUA</span> <strong>Micron trimestre recorde</strong>: receita de 41,46 bilhões de dólares (+346% YoY), orientação Q4 de 50 bilhões de dólares — o superciclo de memória é real.</li>\n      <li><span class=\"chip\">Infra</span> <strong>SK Hynix ADR na Nasdaq</strong>: até ~29 bilhões de dólares — ADR recorde, receitas inteiramente para fabs, data de listagem 10 de julho.</li>\n      <li><span class=\"chip\">Infra</span> <strong>OpenAI + Broadcom \"Jalapeño\"</strong>: primeiro ASIC de inferência customizado (TSMC 3 nm) — lado de hardware aqui, lado de modelo no brief de ai-dev.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EU</span> <strong>Prazo CRA Tipo-A 30.08.2026</strong>: produtos horizontais ~62 dias para conformidade, obrigações de reporte começam 11.09.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un lunes tranquilo, pero una víspera ruidosa: Qualcomm está invirtiendo casi 4 mil millones de dólares para comprar la capa de software que ejecuta código de IA libre del hardware de Nvidia — y en paralelo, una semana de seguridad que es imposible ignorar. Cisco y Splunk tienen bugs siendo activamente explotados (CISA KEV), y SAP un bug 9,9 ya parcheado; un plazo de CISA expiró ayer.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <span class=\"chip\">EUA</span> <strong>Qualcomm compra Modular por ~3,92 mil millones de dólares</strong>: Mojo + MAX, el stack de compiladores agnóstico al hardware contra el lock-in CUDA de Nvidia.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Cisco Unified CM CVE-2026-20230</strong> (CVSS 8,6): SSRF a root, siendo explotado activamente, en la lista KEV de CISA — plazo federal 28 de junio expiró.</li>\n      <li><span class=\"chip hot\">Seg</span> <strong>Splunk Enterprise CVE-2026-20253</strong> (CVSS 9,8): escritura de archivo sin autenticar vía sidecar de Postgres, listado en KEV, siendo explotado activamente.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">UE</span> <strong>SAP NetWeaver CVE-2026-44748</strong> (CVSS 9,9): wrapping de firma SAML en ABAP — todos los releases soportados afectados, patch disponible.</li>\n      <li><span class=\"chip\">Seg</span> <strong>Zero-day de Defender \"RoguePlanet\"</strong> (CVE-2026-50656): shell SYSTEM en Win10/11 completamente parcheados, PoC público — patch aún falta.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">EUA</span> <strong>Micron trimestre récord</strong>: ingresos por 41,46 mil millones de dólares (+346% YoY), guía Q4 de 50 mil millones de dólares — el superciclo de memoria es real.</li>\n      <li><span class=\"chip\">Infra</span> <strong>SK Hynix ADR en Nasdaq</strong>: hasta ~29 mil millones de dólares — ADR récord, ingresos completamente para fabs, fecha de listado 10 de julio.</li>\n      <li><span class=\"chip\">Infra</span> <strong>OpenAI + Broadcom \"Jalapeño\"</strong>: primer ASIC de inferencia personalizado (TSMC 3 nm) — lado hardware aquí, lado modelo en brief de ai-dev.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>Plazo CRA Tipo-A 30.08.2026</strong>: productos horizontales ~62 días para cumplimiento, obligaciones de reporte inician 11.09.</li>\n    </ul></div>"
