<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat-more {
    display: block; margin: 0.4rem 0 0.1rem;
    background: transparent;
    border: 1px dashed var(--rule);
    padding: 0.55rem 0.7rem; border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.72rem; color: var(--muted);
    cursor: pointer;
    text-align: left; width: 100%;
    transition: color 120ms, border-color 120ms, background 120ms;
    min-height: 2.25rem;
  }
  .cat-more:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .cat-more:hover { color: var(--fg); border-color: var(--soft); background: var(--rule-soft); }
  .cat.open .cat-dates { display: block; }
  .cat-date {
    display: flex; flex-direction: column; justify-content: center;
    padding: 0.5rem 0.6rem;
    font-family: var(--font-mono);
    font-size: 0.74rem; color: var(--muted);
    text-decoration: none; border-radius: var(--radius-inline);
    font-feature-settings: "tnum";
    cursor: pointer;
    min-height: 2.25rem;
  }
  .cat-date:hover { background: var(--rule-soft); color: var(--fg); }
  .cat-date.current { color: var(--fg); font-weight: 600; background: var(--quote); }
  .cat-date .headline {
    font-family: var(--font-body);
    color: var(--soft); font-weight: 400; font-size: 0.78rem;
    display: block; margin-top: 0.1rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-label="Sprache wählen" title="Sprache wählen">
          <span class="lang-flag" aria-hidden="true">🇩🇪</span>
          <span class="lang-label-short">DE</span>
          <span class="lang-caret" aria-hidden="true">▾</span>
        </button>
        <div class="lang-menu" id="lang-menu" role="listbox" hidden>
          <button class="lang-option" type="button" role="option" data-lang="de" aria-selected="true">
            <span class="lang-flag" aria-hidden="true">🇩🇪</span><span>Deutsch</span>
          </button>
          <button class="lang-option" type="button" role="option" data-lang="en" aria-selected="false">
            <span class="lang-flag" aria-hidden="true">🇺🇸</span><span>English</span>
          </button>
          <button class="lang-option" type="button" role="option" data-lang="pt" aria-selected="false">
            <span class="lang-flag" aria-hidden="true">🇧🇷</span><span>Português</span>
          </button>
          <button class="lang-option" type="button" role="option" data-lang="es" aria-selected="false">
            <span class="lang-flag" aria-hidden="true">🇲🇽</span><span>Español</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">
      <p class="home-stand" id="home-stand" hidden><!-- populated by JS: "Stand: DD.MM.YYYY" --></p>
      <div class="tldr-grid" id="tldr-grid"><!-- populated by JS --></div>
    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>
</div>

<!-- Print picker dialog. Native <dialog> with showModal() gives focus
     trap, Escape-close, and backdrop click-out for free. The options
     list is populated dynamically from the manifest when the dialog
     opens (so today's available newsletters are always accurate). -->
<dialog id="print-dialog" class="print-dialog" aria-labelledby="print-dialog-title">
  <h2 id="print-dialog-title">Drucken</h2>

        "de": "<div class=\"tldr\"><p class=\"lead\">Die EZB hat am Donnerstag genau wegen des Öl-Schocks aus der Iran-/Hormuz-Krise erhöht — und am Freitag begann genau diese Begründung zu zerfallen. Trump sagte, ein Iran-Abkommen könne <strong>dieses Wochenende in Europa</strong> unterschrieben werden: ein 14-Punkte-Entwurf, der die Straße von Hormuz binnen 30 Tagen wieder öffnet. <strong>Brent stürzte über 4 % auf ~86,71 $</strong> — Zwei-Monats-Tief. Parallel kam der Mai-IPCA aus Brasilien <strong>heiß</strong> herein (+0,58 % statt erwarteter 0,52–0,55 %), aber die Kerne kühlten ab — und genau wie hier am Freitag prognostiziert, <em>stützte</em> das den Real: Der ECB-Fix fiel zwei Sitzungen in Folge auf <strong>5,9076</strong> (12.06.), weiter weg von der 6,00. Dienstag/Mittwoch entscheidet COPOM — der letzte Cut auf 14,25 % bleibt trotz heißem IPCA wahrscheinlich.</p>\n    <ul>\n      <li><span class=\"chip hot\">Öl</span> <strong>Brent ~86,71 $</strong> [Global]: über <strong>−4 %</strong>, Zwei-Monats-Tief. Iran-14-Punkte-Entwurf, Hormuz-Wiederöffnung in 30 Tagen, Unterschrift evtl. dieses Wochenende. Trump bestreitet aber Irans geleakte Konditionen.</li>\n      <li><span class=\"chip hot\">EZB</span> <strong>Hike-Prämisse wackelt</strong> [DE]: Lagarde erhöhte am Do. <em>wegen</em> Hormuz auf 2,25 % und hob die 2026-Inflation auf 3,0 % an. Fällt das Öl, schwächt das den Juli/Sept.-Folge-Hike-Fall.</li>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9076</strong> [Global]: ECB-Fix 12.06., −0,77 % vs. Vortag, zweiter Tag in Folge abwärts. Cross-Check exakt (0,0 %).</li>\n      <li><span class=\"chip\">USD/BRL</span> 5,1073 (12.06.): Real fester. <span class=\"chip\">DXY</span> ~99,80 (−0,06 %) — gedrückt von schwindender Safe-Haven-Nachfrage.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>IPCA Mai +0,58 %</strong> [BR]: über Konsens; 12-Monats-Rate auf <strong>4,72 %</strong> (über dem 4,5-%-Deckel). Aber Kern-Schnitt fiel auf 0,4         "en": "<div class=\"tldr\"><p class=\"lead\">The ECB hiked on Thursday precisely because of the oil shock from the Iran/Hormuz crisis — and Friday that very rationale began to unravel. Trump said an Iran deal could be signed <strong>this weekend in Europe</strong>: a 14-point draft that reopens the Strait of Hormuz within 30 days. <strong>Brent plunged over 4% to ~$86.71</strong> — a two-month low. In parallel, Brazil's May IPCA came in <strong>hot</strong> (+0.58% vs. expected 0.52–0.55%), but the core measures cooled — and exactly as I predicted here on Friday, that <em>supported</em> the real: the ECB-fix fell for two straight sessions to <strong>5.9076</strong> (12.06.), moving further from 6.00. COPOM decides Tuesday/Wednesday — the last cut to 14.25% remains likely.</p>\n    <ul>\n      <li><span class=\"chip hot\">Oil</span> <strong>Brent ~$86.71</strong> [Global]: down over <strong>4%</strong>, two-month low. Iran 14-point draft, Hormuz reopening in 30 days, signature possibly this weekend. Trump disputes leaked Iranian conditions.</li>\n      <li><span class=\"chip hot\">ECB</span> <strong>Hike rationale shaky</strong> [DE]: Lagarde hiked on Thu. <em>because of</em> Hormuz at 2.25% and raised 2026 inflation outlook to 3.0%. If oil falls, that weakens the July/Sept. follow-up hike case.</li>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9076</strong> [Global]: ECB-fix June 12, −0.77% vs. prior day, second straight day down. Cross-check exact (0.0%).</li>\n      <li><span class=\"chip\">USD/BRL</span> 5.1073 (12.06.): real strengthens. <span class=\"chip\">DXY</span> ~99.80 (−0.06%) — depressed by fading safe-haven demand.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>IPCA May +0.58%</strong> [BR]: above consensus; 12-month rate to <strong>4.72%</strong> (above 4.5% ceiling). But core average fell to 0.45% (April 0.50%) — the cut lives.</li>\n      <li><span class=\"chip good\">COPOM</span> <strong>Tue/Wed 16–17.06.</strong> [BR]: Market split, but core cooling makes the last 25-bp <strong>cut to 14.25%</strong> likely. BofA sees long pause after.</li>\n      <li><span class=\"chip\">Forecast</span> This week: euro-weak, <strong>5.84–5.96</strong> (~55%). Oil/Iran turn dominates, COPOM is the switch.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O BCE aumentou as taxas na quinta-feira precisamente por causa do choque de petróleo da crise Irã/Hormuz — e na sexta-feira essa mesma justificativa começou a desmoronar. Trump disse que um acordo com o Irã poderia ser assinado <strong>neste fim de semana na Europa</strong>: um projeto de 14 pontos que reabre o Estreito de Hormuz em 30 dias. <strong>Brent caiu mais de 4% para ~US$ 86,71</strong> — mínimo de dois meses. Em paralelo, o IPCA de maio do Brasil veio <strong>quente</strong> (+0,58% vs. esperado 0,52–0,55%), mas os núcleos esfriaram — e exatamente como previ aqui na sexta-feira, isso <em>apoiou</em> o real: a cotação ECB caiu por dois dias seguidos para <strong>5,9076</strong> (12.06.), afastando-se ainda mais de 6,00. COPOM decide terça/quarta — o último corte para 14,25% continua provável.</p>\n    <ul>\n      <li><span class=\"chip hot\">Petróleo</span> <strong>Brent ~US$ 86,71</strong> [Global]: queda de mais de <strong>4%</strong>, mínimo de dois meses. Projeto iraniano de 14 pontos, reabertura de Hormuz em 30 dias, assinatura possível neste fim de semana. Trump nega as condições vazadas pelo Irã.</li>\n      <li><span class=\"chip hot\">BCE</span> <strong>Justificativa do aumento bambeia</strong> [DE]: Lagarde aumentou na qui. <em>por causa de</em> Hormuz a 2,25% e elevou a perspectiva de inflação de 2026 para 3,0%. Se o petróleo cair, isso enfraquece o caso do aumento de julho/setembro.</li>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,9076</strong> [Global]: cotação ECB de 12.06., −0,77% vs. dia anterior, segundo dia consecutivo em queda. Verificação cruzada exata (0,0%).</li>\n      <li><span class=\"chip\">USD/BRL</span> 5,1073 (12.06.): real se fortalece. <span class=\"chip\">DXY</span> ~99,80 (−0,06%) — deprimido pela redução na demanda por segurança.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>IPCA maio +0,58%</strong> [BR]: acima do consenso; taxa de 12 meses em <strong>4,72%</strong> (acima do teto de 4,5%). Mas a média dos núcleos caiu para 0,45% (abril 0,50%) — o corte segue.</li>\n      <li><span class=\"chip good\">COPOM</span> <strong>Ter/Qua 16–17.06.</strong> [BR]: Mercado dividido, mas esfriamento dos núcleos torna o último corte de 25 pb para <strong>14,25%</strong> provável. BofA vê pausa longa depois.</li>\n      <li><span class=\"chip\">Previsão</span> Esta semana: euro fraco, <strong>5,84–5,96</strong> (~55%). A virada de petróleo/Irã domina, COPOM é a chave.</li>\n    </ul></div>",

2%</strong> (por encima del techo de 4,5%). Pero el promedio de núcleos cayó a 0,45% (abril 0,50%) — el corte sigue vivo.</li>\n      <li><span class=\"chip good\">COPOM</span> <strong>Mar/Mié 16–17.06.</strong> [BR]: Mercado dividido, pero enfriamiento de núcleos hace probable el último corte de 25 pb a <strong>14,25%</strong>. BofA ve pausa larga después.</li>\n      <li><span class=\"chip\">Pronóstico</span> Esta semana: euro débil, <strong>5,84–5,96</strong> (~55%). El giro de petróleo/Irán domina, COPOM es la palanca.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Samstag — Börsen und Rohstoff-Futures sind übers Wochenende zu, also ist alles Nicht-Krypto der <strong>Freitags-Schluss (12.06.)</strong>; Krypto läuft live (Stand ~07:00 BRT, 13.06.). Die Woche endete risk-on: <strong>SpaceX (SPCX) debütierte mit einem Knaller</strong> — Eröffnung 150 $, Tageshoch 176,52 $ (+31 %), Schluss <strong>160,95 $ (+19 % über dem 135-$-IPO-Preis)</strong>, ~75 Mrd. $ Raise, &gt; 2 Bio. $ bewertet, größter IPO aller Zeiten.<sup>[3]</sup> Das hob die Stimmung: <strong>Dow 51.202,26 (+0,7 %), S&amp;P 7.431,46 (+0,5 %), Nasdaq 25.888,84 (+0,31 %)</strong>.<sup>[1]</sup> <strong>NVDA 205,19 $ (+0,16 %), GOOGL 359,68 $ (+0,53 %)</strong> schlossen leicht im Plus.<sup>[5]</sup> Aber zwei Annahmen von gestern wackeln: <strong>(1)</strong> Der Iran-Deal ist <em>weiter nicht unterschrieben</em> — der Entwurfs-Text steht (Pakistan vermittelte), Trump signalisiert eine baldige Unterzeichnung, doch Teheran nennt die Berichte „preliminary\" und das Nukleare bleibt separat.<sup>[2]</sup> <strong>(2)</strong> Der Mai-CPI war <em>kein</em> milder Druck: die Schlagzeile sprang auf <strong>4,2 % p.a. — 3-Jahres-Hoch</strong>, getrieben von Energie (+23,5 % p.a., Benzin +40,5 %); nur der Kern blieb mit 2,9 % in-line.<sup>[2]</sup> Damit wird der <strong>Öl-Crash zur Disinflations-Hoffnung</strong>: Brent ~<strong>86,71 $ (Tag −4,06 %, Monat −17,91 %)</strong>.<sup>[7]</sup> Gold hält <strong>~4.222 $ (+0,22 %)</strong>.<sup>[6]</sup> Krypto erholt sich weiter — <strong>BTC ~63.780 $ (24h +0,6 %, 7d +4,6 %), ETH ~1.675 $ (7d +5,8 %)</strong> — aber die Spot-BTC-ETFs verloren in der Woche <strong>~1,72 Mrd. $</strong> (größter Abfluss seit Feb 2025), und der Fear-&amp;-Greed klebt bei <strong>19</strong> in „Extreme Fear\".<sup>[8][9]</sup> Der rote Faden: Die Rally war echt, aber zwei ihrer Stützen (unterschriebener Deal, milde Inflation) sind dünner als das Tape glauben macht — und am <strong>Di–Mi (16.–17.06.) entscheidet der FOMC</strong>, ob ein Hawkish-Bias-Shift die Stimmung kippt.</p>\n    <ul>\n      <li><span class=\"chip hot\">STORY DES TAGES</span> <strong>SpaceX (SPCX) liefert ein Vorzeige-Debüt — +19 % auf 160,95 $</strong>: Eröffnung 150 $, Hoch 176,52 $, sauberer Schluss bei 161 $, &gt; 2 Bio. $ Bewertung. Die handelbare Mechanik kommt aber erst: MSCI nimmt SPCX <strong>zum 29.06.</strong> in seine Standard-/Large-Cap-Indizes, Russell 1000/Top-200 zum <strong>26.06.</strong> auf — Zwangskäufe der Passiv-Fonds in einen dünnen Float. (Korrektur zu gestern: nicht „ab 13.06.\".) (CNBC / Seeking Alpha, 12.06.)</li>\n      <li><span class=\"chip hot\">MAKRO / KORREKTUR</span> <strong>Mai-CPI war ein 3-Jahres-Hoch, kein milder Druck</strong>: Headline +4,2 % p.a. (+0,5 % m/m), getragen von Energie (+23,5 % p.a., Benzin +40,5 %); Kern 2,9 % p.a. in-line. Heißt: Der Öl-Crash ist jetzt die wichtigste Disinflations-Hoffnung für die Headline — und der FOMC (16.–17.06., ~99 % Hold) trägt ein Risiko zum hawkishen Bias-Shift. (CNBC / CBS, 10.06.)</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>NVDA &amp; GOOGL schließen die Woche leicht im Plus</strong>: NVDA 205,19 $ (+0,16 %, Cap 4,97 Bio. $, ~13 % unter 52-W-Hoch), GOOGL 359,68 $ (+0,53 %, Cap 4,39 Bio. $, ~20 % unter Konsens-Ziel). GOOGL bleibt der robustere, am wenigsten chip-zyklische Akkumulations-Kandidat als der teurere NVDA. (stockanalysis.com, 12.06.)</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent ~86,71 $ — Crash hält an (−4 % am Tag, −18 % im Monat)</strong>: Der Iran-Deal-Optimismus pulverisiert die Angst-Prämie weiter, dazu OPEC+-Mehrangebot. Tiefster Stand seit fast zwei Monaten. Markt-positiv über einen Umweg: Billiges Öl drückt genau die Energie-Komponente, die den CPI auf 4,2 % trieb. (TradingEconomics, Stand 12.06.)</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Boden gehalten — ~4.222 $ (+0,22 %)</strong>: Trotz Risk-on und Geopolitik-Entspannung kein Bruch nach unten. Der Monats-Rücksetzer (−9,91 %) macht die Versicherung billig — und der Hot-Headline-CPI plus FOMC-Hawkish-Risiko geben dem sicheren Hafen ein frisches Argument. (TradingEconomics, Stand 12.06.)</li>\n      <li><span class=\"chip\">KRYPTO-CORE</span> <strong>Erholung läuft, aber die ETFs bremsen weiter</strong>: BTC ~63.780 $ (24h +0,6 %, 7d +4,6 %; Cross-Check CoinDesk 63.778 $, Spread ~0,003 %), ETH ~1.675 $ (7d +5,8 %). Doch die Spot-BTC-ETFs verloren ~1,72 Mrd. $ in der Woche (IBIT −1,34 Mrd. $, größte Redemption seit Launch), und Fear-&amp;-Greed steht bei 19. Der Boden braucht eine ETF-Zufluss-Woche, keinen 7-Tage-Bounce. (CoinGecko / CoinMarketCap, 13.06.)</li>\n      <li><span class=\"chip hot\">KRYPTO-SEKTOREN</span> <strong>AI-Token-Rotation: Bittensor (TAO) +11,2 % auf 237 $</strong>: Die spekulativste Ecke springt — getrieben von einer AI-Token-Rotation rund um das SpaceX-IPO (Narrativ: „Musk-AI\"), nicht von belegter Nachfrage. In „Extreme Fear\" und vor dem FOMC ist das reines Spielgeld. (CoinGecko, 13.06.)</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Saturday — stock and commodity futures markets are closed for the weekend, so everything non-crypto is Friday's close (06/12); crypto trades live (as of ~07:00 BRT, 06/13). The week ended risk-on: <strong>SpaceX (SPCX) delivered a textbook debut</strong> — open $150, intraday high $176.52 (+31%), close <strong>$160.95 (+19% over the $135 IPO price)</strong>, ~$75B raise, &gt; $2T valuation, largest IPO of all time.<sup>[3]</sup> That lifted sentiment: <strong>Dow 51,202.26 (+0.7%), S&amp;P 7,431.46 (+0.5%), Nasdaq 25,888.84 (+0.31%)</strong>.<sup>[1]</sup> <strong>NVDA $205.19 (+0.16%), GOOGL $359.68 (+0.53%)</strong> closed slightly in the green.<sup>[5]</sup> But two assumptions from yesterday are wobbling: <strong>(1)</strong> The Iran deal is <em>still not signed</em> — draft text exists (Pakistan brokered it), Trump signals an imminent signature, but Tehran calls reports \"preliminary\" and the nuclear issue remains separate.<sup>[2]</sup> <strong>(2)</strong> May CPI was <em>not</em> mild pressure: the headline jumped to <strong>4.2% yoy — a 3-year high</strong>, driven by energy (+23.5% yoy, gasoline +40.5%); only core stayed in line at 2.9%.<sup>[2]</sup> So the <strong>oil crash becomes the disinflation hope</strong>: Brent ~<strong>$86.71 (day −4.06%, month −17.91%)</strong>.<sup>[7]</sup> Gold holds <strong>~$4,222 (+0.22%)</strong>.<sup>[6]</sup> Crypto recovers further — <strong>BTC ~$63,780 (24h +0.6%, 7d +4.6%), ETH ~$1,675 (7d +5.8%)</strong> — but spot BTC ETFs shed <strong>~$1.72B</strong> in the week (largest outflow since Feb 2025), and Fear &amp; Greed sticks at <strong>19</strong> in \"Extreme Fear\".<sup>[8][9]</sup> The through-line: The rally was real, but two of its supports (signed deal, mild inflation) are thinner than the tape suggests — and on <strong>Tue–Wed (06/16–17)</strong> the FOMC decides whether a hawkish-bias shift kills the mood.</p>\n    <ul>\n      <li><span class=\"chip hot\">STORY OF THE DAY</span> <strong>SpaceX (SPCX) delivers a textbook debut — +19% to $160.95</strong>: open $150, high $176.52, clean close at $161, &gt; $2T valuation. But the tradeable lever comes later: MSCI adds SPCX to its Standard/Large-Cap indices on <strong>06/29</strong>, Russell 1000/Top-200 on <strong>06/26</strong> — forced passive-fund buying into a thin float. (Correction to yesterday: not \"as of 06/13\" but end-of-month.) (CNBC / Seeking Alpha, 06/12)</li>\n      <li><span class=\"chip hot\">MACRO / CORRECTION</span> <strong>May CPI was a 3-year high, not mild pressure</strong>: headline +4.2% yoy (+0.5% mom), led by energy (+23.5% yoy, gasoline +40.5%); core 2.9% yoy in line. Meaning: The oil crash is now the key disinflation hope for the headline — and the FOMC (06/16–17, ~99% hold) carries hawkish-bias-shift risk. (CNBC / CBS, 06/10)</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>NVDA &amp; GOOGL close the week slightly in the green</strong>: NVDA $205.19 (+0.16%, cap $4.97T, ~13% below 52-week high), GOOGL $359.68 (+0.53%, cap $4.39T, ~20% below consensus target). GOOGL remains the sturdier, least chip-cyclical accumulation candidate vs. pricier NVDA. (stockanalysis.com, 06/12)</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent ~$86.71 — crash continues (−4% day, −18% month)</strong>: Iran-deal optimism obliterates the fear premium further, plus OPEC+ oversupply. Lowest in nearly two months. Market-positive via a roundabout: Cheap oil presses exactly the energy component that drove CPI to 4.2%. (TradingEconomics, as of 06/12)</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Floor held — ~$4,222 (+0.22%)</strong>: Despite risk-on and geopolitical thaw, no downside break. The month's pullback (−9.91%) makes insurance cheap — and the hot-headline CPI plus FOMC hawkish risk give safe-haven a fresh argument. (TradingEconomics, as of 06/12)</li>\n      <li><span class=\"chip\">CRYPTO CORE</span> <strong>Recovery intact, but ETFs still a drag</strong>: BTC ~$63,780 (24h +0.6%, 7d +4.6%; cross-check CoinDesk $63,778, spread ~0.003%), ETH ~$1,675 (7d +5.8%). Yet spot BTC ETFs shed ~$1.72B in the week (IBIT −$1.34B, largest redemption since launch), and Fear &amp; Greed at 19. The floor needs an ETF-inflow week, not a 7-day bounce. (CoinGecko / CoinMarketCap, 06/13)</li>\n      <li><span class=\"chip hot\">CRYPTO SECTORS</span> <strong>AI-token rotation: Bittensor (TAO) +11.2% to $237</strong>: The most speculative corner jumps — driven by AI-token rotation around the SpaceX IPO (narrative: \"Musk AI\"), not proven demand. In \"Extreme Fear\" and ahead of the FOMC, this is pure play money. (CoinGecko, 06/13)</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É sábado — bolsas e futuros de commodities fecham nos fins de semana, então tudo que não é cripto é do fechamento de sexta (12/06); cripto segue ao vivo (por volta das 07:00 BRT, 13/06). A semana terminou risk-on: <strong>SpaceX (SPCX) entregou um estreia impecável</strong> — abertura em R$ 750, máxima intraday em R$ 883 (+31%), fechamento em <strong>R$ 805 (+19% sobre o preço de IPO de R$ 675)</strong>, ~R$ 375 bi de captação, &gt; R$ 10 tri de avaliação, maior IPO de todos os tempos.<sup>[3]</sup> Isso elevou o sentimento: <strong>Dow 51.202,26 (+0,7%), S&amp;P 7.431,46 (+0,5%), Nasdaq 25.888,84 (+0,31%)</strong>.<sup>[1]</sup> <strong>NVDA R$ 1.026 (+0,16%), GOOGL R$ 1.798 (+0,53%)</strong> fecharam levemente em alta.<sup>[5]</sup> Mas duas premissas de ontem vacilam: <strong>(1)</strong> O acordo do Irã ainda <em>não é assinado</em> — texto de rascunho existe (Paquistão intermediou), Trump sinaliza assinatura iminente, mas Teerã chama relatos de \"preliminares\" e a questão nuclear segue separada.<sup>[2]</sup> <strong>(2)</strong> O CPI de maio <em>não era</em> pressão suave: a manchete pulou para <strong>4,2% a.a. — máxima em 3 anos</strong>, impulsionada por energia (+23,5% a.a., gasolina +40,5%); apenas o núcleo manteve-se em linha em 2,9%.<sup>[2]</sup> Então o <strong>crash do petróleo vira esperança de desinflação</strong>: Brent ~<strong>R$ 433 (dia −4,06%, mês −17,91%)</strong>.<sup>[7]</sup> Ouro se mantém <strong>~R$ 21.110 (+0,22%)</strong>.<sup>[6]</sup> Cripto se recupera — <strong>BTC ~R$ 319.000 (24h +0,6%, 7d +4,6%), ETH ~R$ 8.375 (7d +5,8%)</strong> — mas ETFs spot de BTC perderam <strong>~R$ 8,6 bi</strong> na semana (maior saída desde fev 2025), e Fear &amp; Greed fica em <strong>19</strong> em \"Extreme Fear\".<sup>[8][9]</sup> O fio condutor: o rally foi real, mas duas de suas bases (acordo assinado, inflação suave) são mais frágeis do que o tape sugere — e na <strong>ter–qua (16–17/06)</strong> o FOMC decide se uma virada hawkish-bias mata o clima.</p>\n    <ul>\n      <li><span class=\"chip hot\">HISTÓRIA DO DIA</span> <strong>SpaceX (SPCX) entrega estreia impecável — +19% para R$ 805</strong>: abertura em R$ 750, máxima em R$ 883, fechamento limpo em R$ 805, &gt; R$ 10 tri de avaliação. Mas a alavanca negociável vem depois: MSCI adiciona SPCX aos seus índices Standard/Large-Cap em <strong>29/06</strong>, Russell 1000/Top-200 em <strong>26/06</strong> — compras forçadas de fundos passivos em float fino. (Correção de ontem: não \"a partir de 13/06\" mas fim de junho.) (CNBC / Seeking Alpha, 12/06)</li>\n      <li><span class=\"chip hot\">MACRO / CORREÇÃO</span> <strong>CPI de maio foi máxima em 3 anos, não pressão suave</strong>: manchete +4,2% a.a. (+0,5% m/m), liderado por energia (+23,5% a.a., gasolina +40,5%); núcleo 2,9% a.a. em linha. Significado: O crash do petróleo é agora a esperança-chave de desinflação da manchete — e o FOMC (16–17/06, ~99% manutenção) carrega risco de virada hawkish-bias. (CNBC / CBS, 10/06)</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>NVDA &amp; GOOGL encerram a semana levemente em alta</strong>: NVDA R$ 1.026 (+0,16%, cap R$ 24,85 tri, ~13% abaixo máxima 52 semanas), GOOGL R$ 1.798 (+0,53%, cap R$ 21,95 tri, ~20% abaixo alvo consensual). GOOGL permanece o nome mais robusto e menos cíclico de chip para acumulação vs. NVDA mais caro. (stockanalysis.com, 12/06)</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~R$ 433 — crash continua (−4% dia, −18% mês)</strong>: Otimismo com acordo do Irã oblittera a prêmio de medo, além de excesso de OPEC+. Mais baixo em quase dois meses. Positivo para mercado por uma volta: Petróleo barato pressiona exatamente o componente de energia que elevou CPI a 4,2%. (TradingEconomics, conforme 12/06)</li>\n      <li><span class=\"chip good\">OURO</span> <strong>Piso mantido — ~R$ 21.110 (+0,22%)</strong>: Apesar de risk-on e desagravamento geopolítico, sem ruptura para baixo. O recuo do mês (−9,91%) torna o seguro barato — e o CPI hot-headline mais FOMC com risco hawkish dão ao porto seguro argumento fresco. (TradingEconomics, conforme 12/06)</li>\n      <li><span class=\"chip\">CRIPTO-CORE</span> <strong>Recuperação intacta, mas ETFs ainda freiam</strong>: BTC ~R$ 319.000 (24h +0,6%, 7d +4,6%; verificação cruzada CoinDesk R$ 318.890, spread ~0,003%), ETH ~R$ 8.375 (7d +5,8%). Mas ETFs spot de BTC perderam ~R$ 8,6 bi na semana (IBIT −R$ 6,7 bi, maior resgate desde lançamento), e Fear &amp; Greed em 19. O piso precisa de uma semana de fluxo positivo de ETF, não um bounce de 7 dias. (CoinGecko / CoinMarketCap, 13/06)</li>\n      <li><span class=\"chip hot\">SETORES CRIPTO</span> <strong>Rotação de AI-token: Bittensor (TAO) +11,2% para R$ 1.185</strong>: O canto mais especulativo pula — impulsionado por rotação de AI-token ao redor do IPO da SpaceX (narrativa: \"IA Musk\"), não demanda comprovada. Em \"Extreme Fear\" e antes do FOMC, isso é dinheiro de jogo puro. (CoinGecko, 13/06)</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es sábado — bolsas y futuros de materias primas cierran los fines de semana, así que todo excepto cripto es del cierre del viernes (12/06); cripto opera en vivo (alrededor de las 07:00 BRT, 13/06). La semana terminó con un tono risk-on: <strong>SpaceX (SPCX) entregó un debut impecable</strong> — apertura $150, máximo intraday $176.52 (+31%), cierre <strong>$160.95 (+19% sobre el precio IPO de $135)</strong>, ~$75B de fondos levantados, &gt; $2T de valuación, el IPO más grande de todos los tiempos.<sup>[3]</sup> Eso levantó el sentimiento: <strong>Dow 51,202.26 (+0,7%), S&amp;P 7,431.46 (+0,5%), Nasdaq 25,888.84 (+0,31%)</strong>.<sup>[1]</sup> <strong>NVDA $205.19 (+0,16%), GOOGL $359.68 (+0,53%)</strong> cerraron ligeramente al alza.<sup>[5]</sup> Pero dos supuestos de ayer tambalean: <strong>(1)</strong> El acuerdo con Irán todavía <em>no se firma</em> — existe texto de borrador (Pakistán lo negoció), Trump señala una firma inminente, pero Teherán llama a los reportes \"preliminares\" y el tema nuclear se mantiene separado.<sup>[2]</sup> <strong>(2)</strong> El CPI de mayo <em>no fue</em> presión suave: el titular saltó a <strong>4,2% anual — máximo en 3 años</strong>, impulsado por energía (+23,5% anual, gasolina +40,5%); solo el núcleo se mantuvo en línea en 2,9%.<sup>[2]</sup> Así que el <strong>colapso del petróleo se convierte en la esperanza de desinflación</strong>: Brent ~<strong>$86.71 (día −4,06%, mes −17,91%)</strong>.<sup>[7]</sup> El oro se mantiene <strong>~$4,222 (+0,22%)</strong>.<sup>[6]</sup> La cripto se recupera — <strong>BTC ~$63,780 (24h +0,6%, 7d +4,6%), ETH ~$1,675 (7d +5,8%)</strong> — pero los ETFs spot de BTC perdieron <strong>~$1.72B</strong> en la semana (mayor salida desde feb 2025), y Fear &amp; Greed se mantiene en <strong>19</strong> en \"Extreme Fear\".<sup>[8][9]</sup> El hilo conductor: el rally fue real, pero dos de sus apoyos (acuerdo firmado, inflación suave) son más frágiles que lo que sugiere la cinta — y el <strong>mar–mié (16–17/06)</strong> el FOMC decide si un giro hawkish-bias mata el sentimiento.</p>\n    <ul>\n      <li><span class=\"chip hot\">HISTORIA DEL DÍA</span> <strong>SpaceX (SPCX) entrega un debut impecable — +19% a $160.95</strong>: apertura $150, máximo $176.52, cierre limpio en $161, &gt; $2T de valuación. Pero el apalancamiento realmente negociable viene después: MSCI agrega SPCX a sus índices Standard/Large-Cap el <strong>29/06</strong>, Russell 1000/Top-200 el <strong>26/06</strong> — compras forzadas de fondos pasivos en un flotante delgado. (Corrección de ayer: no \"a partir de 13/06\" sino fin de mes.) (CNBC / Seeking Alpha, 12/06)</li>\n      <li><span class=\"chip hot\">MACRO / CORRECCIÓN</span> <strong>CPI de mayo fue máximo en 3 años, no presión suave</strong>: titular +4,2% anual (+0,5% mes a mes), encabezado por energía (+23,5% anual, gasolina +40,5%); núcleo 2,9% anual en línea. Significado: El colapso del petróleo es ahora la esperanza clave de desinflación para el titular — y el FOMC (16–17/06, ~99% mantener) conlleva riesgo de giro hawkish-bias. (CNBC / CBS, 10/06)</li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>NVDA &amp; GOOGL cierran la semana al alza</strong>: NVDA $205.19 (+0,16%, cap $4.97T, ~13% bajo máximo de 52 semanas), GOOGL $359.68 (+0,53%, cap $4.39T, ~20% bajo objetivo de consenso). GOOGL permanece como el nombre más sólido y menos cíclico de chip para acumular vs. el NVDA más caro. (stockanalysis.com, 12/06)</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~$86.71 — el colapso continúa (−4% día, −18% mes)</strong>: el optimismo sobre el acuerdo con Irán aniquila la prima de miedo, además del exceso de OPEC+. Lo más bajo en casi dos meses. Positivo para el mercado en una vuelta: el petróleo barato presiona exactamente el componente energético que elevó el CPI a 4,2%. (TradingEconomics, al 12/06)</li>\n      <li><span class=\"chip good\">ORO</span> <strong>Piso sostenido — ~$4,222 (+0,22%)</strong>: A pesar del risk-on y el destenso geopolítico, sin ruptura hacia abajo. La caída del mes (−9,91%) abarata el seguro — y el CPI del titular caliente más riesgo hawkish del FOMC dan al puerto seguro un argumento fresco. (TradingEconomics, al 12/06)</li>\n      <li><span class=\"chip\">CRIPTO-CORE</span> <strong>Recuperación intacta, pero los ETFs siguen siendo un freno</strong>: BTC ~$63,780 (24h +0,6%, 7d +4,6%; verificación cruzada CoinDesk $63,778, spread ~0,003%), ETH ~$1,675 (7d +5,8%). Pero los ETFs spot de BTC perdieron ~$1.72B en la semana (IBIT −$1.34B, mayor rescate desde el lanzamiento), y Fear &amp; Greed en 19. El piso necesita una semana de flujos de ETF positivos, no un rebote de 7 días. (CoinGecko / CoinMarketCap, 13/06)</li>\n      <li><span class=\"chip hot\">SECTORES CRIPTO</span> <strong>Rotación de AI-token: Bittensor (TAO) +11,2% a $237</strong>: La esquina más especulativa salta — impulsada por rotación de AI-token alrededor del IPO de SpaceX (narrativa: \"IA Musk\"), no demanda probada. En \"Extreme Fear\" y antes del FOMC, esto es dinero de juego puro. (CoinGecko, 13/06)</li>\n    </ul></div>"
