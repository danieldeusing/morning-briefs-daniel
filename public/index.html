        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet news day — nothing fresh landed in the past 24 hours. Yesterday we covered the pricing side of the July model wave; today it's the capability side, and that one is a lot messier. While prices sort cleanly, benchmarks right now don't: SWE-Bench Verified has bunched up so tightly at the top that the ranking barely distinguishes models anymore, SWE-Bench Pro and LiveCodeBench tell contradictory stories, and the real movement is happening elsewhere anyway — among the open-weight models quietly closing in on the closed frontier. So today's most useful sentence isn't a number, it's a warning.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>SWE-Bench Verified saturates</strong>: the top is clumped around ~88%+; a secondary snapshot (as of 07/19) puts Mythos 5 at 95.5%, Fable 5 at 95%, Opus 4.8 at 88.6% — single source, unconfirmed on the primary leaderboard.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Contradiction in the system</strong>: on the tougher SWE-Bench Pro, Claude remains clearly ahead (Mythos 5 80.3% vs. GPT-5.6 Sol 64.6%, single source), while LiveCodeBench shows three conflicting \"current\" leaderboards.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 at Opus level</strong>: the open MIT-licensed model (~744B MoE) hits SWE-Bench Pro 62.1 against Opus 4.8's ~63 and leads the open weights.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7 Code in Copilot</strong>: GA since 07/01 — the first open-weight model in GitHub Copilot.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Effort is a dial, not a switch</strong>: Anthropic explains that \"effort\" in Claude Code isn't a fixed token knob but continuous behavior control.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Copilot credit backlash</strong>: usage-based billing (since 06/01) keeps drawing criticism — one Claude 4.8 session reportedly burned ~16% of a month's quota.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7</strong>: 1,000 tokens/sec via Cerebras; Devin now makes GLM 5.2, Kimi K2.7 and Sonnet 5 selectable as models.</li>\n      <li><span class=\"chip\">Source</span> <strong>Evidence base</strong>: the top SWE-Bench Verified/Pro scores each rest on a single source; the Grok 4.5 figures are secondary (the xAI page returned a 403).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dia calmo de notícias — nada de novo surgiu nas últimas 24 horas. Ontem falamos do lado dos preços da leva de modelos de julho; hoje é o lado das capacidades, e esse está bem mais confuso. Enquanto os preços se organizam de forma limpa, os benchmarks agora não: o SWE-Bench Verified está tão apertado no topo que o ranking praticamente não separa mais os modelos, o SWE-Bench Pro e o LiveCodeBench contam histórias contraditórias, e o movimento real está acontecendo em outro lugar — nos modelos de peso aberto que avançam silenciosamente rumo à ponta fechada. A frase mais útil do dia, por isso, não é um número, é um alerta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>SWE-Bench Verified satura</strong>: o topo se aglomera em torno de ~88%+; um snapshot secundário (dados de 19/07) cita Mythos 5 com 95,5%, Fable 5 com 95%, Opus 4.8 com 88,6% — fonte única, não confirmada na página primária.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Contradição no sistema</strong>: no SWE-Bench Pro, mais rigoroso, a Claude segue claramente à frente (Mythos 5 com 80,3% vs. GPT-5.6 Sol com 64,6%, fonte única), enquanto o LiveCodeBench mostra três rankings \"atuais\" que se contradizem.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 no nível do Opus</strong>: o modelo aberto sob licença MIT (~744 bi MoE) atinge 62,1 no SWE-Bench Pro contra ~63 do Opus 4.8 e lidera os modelos de peso aberto.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7 Code no Copilot</strong>: GA desde 01/07 — o primeiro modelo de peso aberto no GitHub Copilot.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Effort é um controle contínuo, não um botão</strong>: a Anthropic explica que \"effort\" no Claude Code não é um botão fixo de tokens, mas controla um comportamento contínuo.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Revolta dos créditos do Copilot</strong>: a cobrança por uso (desde 01/06) segue sob críticas — uma sessão com Claude 4.8 teria consumido ~16% da cota mensal.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7</strong>: 1.000 tokens/s via Cerebras; a Devin agora deixa GLM 5.2, Kimi K2.7 e Sonnet 5 selecionáveis como modelos.</li>\n      <li><span class=\"chip\">Fonte</span> <strong>Base de evidências</strong>: os melhores escores do SWE-Bench Verified/Pro se apoiam cada um em uma única fonte; os números do Grok 4.5 são secundários (a página da xAI retornou 403).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Día tranquilo en noticias — en las últimas 24 horas no llegó nada nuevo. Ayer tocamos el lado de los precios de la ola de modelos de julio; hoy toca el lado de las capacidades, y ese está mucho más revuelto. Mientras los precios se ordenan de forma limpia, los benchmarks ahora mismo no: SWE-Bench Verified se apretujó tanto en la cima que el ranking casi ya no distingue entre modelos, SWE-Bench Pro y LiveCodeBench cuentan historias contradictorias, y el movimiento real está ocurriendo en otro lado de todos modos — en los modelos de peso abierto que se acercan en silencio a la cúspide cerrada. Por eso la frase más útil del día no es un número, es una advertencia.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>SWE-Bench Verified se satura</strong>: la cima se amontona en torno al ~88%+; una instantánea secundaria (al 19/07) da a Mythos 5 con 95.5%, Fable 5 con 95% y Opus 4.8 con 88.6% — fuente única, no confirmada en la página primaria.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Contradicción en el sistema</strong>: en el más exigente SWE-Bench Pro, Claude sigue claramente adelante (Mythos 5 con 80.3% vs. GPT-5.6 Sol con 64.6%, fuente única), mientras LiveCodeBench muestra tres rankings \"actuales\" que se contradicen entre sí.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2 al nivel de Opus</strong>: el modelo abierto con licencia MIT (~744 mil millones MoE) alcanza 62.1 en SWE-Bench Pro frente a ~63 de Opus 4.8, y lidera los modelos de peso abierto.</li>\n      <li><span class=\"chip\">OSS</span> <strong>Kimi K2.7 Code en Copilot</strong>: disponible de forma general desde el 01/07 — el primer modelo de peso abierto en GitHub Copilot.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Effort es un dial, no un interruptor</strong>: Anthropic explica que \"effort\" en Claude Code no es un botón fijo de tokens, sino que controla un comportamiento continuo.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Enojo por los créditos de Copilot</strong>: la facturación por uso (desde el 01/06) sigue generando críticas — una sesión con Claude 4.8 habría consumido ~16% de la cuota mensual.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Devin SWE-1.7</strong>: 1,000 tokens/s vía Cerebras; Devin ahora deja elegir GLM 5.2, Kimi K2.7 y Sonnet 5 como modelos.</li>\n      <li><span class=\"chip\">Fuente</span> <strong>Respaldo documental</strong>: los mejores puntajes de SWE-Bench Verified/Pro se apoyan cada uno en una sola fuente; las cifras de Grok 4.5 son secundarias (la página de xAI devolvió un error 403).</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern war die Geschichte: „Brüssel verschiebt die harten KI-Regeln um 16 Monate.\" Das stimmt — und ist trotzdem die halbe Wahrheit. Die andere Hälfte fällt in dasselbe Zeitfenster und wird kaum erzählt: <strong>genau jetzt sind die Schienen fertig geworden, auf denen Firmen KI-Agenten wirklich in Produktion schicken.</strong> Metas Business-Agent-Plattform steht seit dem 01.07. jeder Firma offen, Pinecone Nexus ging am selben Tag in die Public Preview. Die Bremse an der Regulierung wurde gelöst, während die Deploy-Rails verlegt wurden. Für twiceD ist das kein Zufall, sondern der Auftrag: nicht auf die 2027er-Frist starren, sondern auf die Infrastruktur, die heute produktiv ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Verschoben:</strong> Hochrisiko-KI (stand-alone) von <strong>02.08.2026 auf 02.12.2027</strong>, produkt-eingebettet auf <strong>02.08.2028</strong>. Rat-Zustimmung 29.06.2026, „Digital Omnibus\".</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Nicht verschoben:</strong> Artikel-50-Transparenz ab <strong>02.08.2026</strong> — Chatbots müssen sich als KI zu erkennen geben, KI-Inhalte gekennzeichnet werden.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Meta Business Agent Platform</strong> seit 01.07. für Partner offen: jede Firma baut einen WhatsApp-/Messenger-/Instagram-Agenten. <strong>&gt;1 Mio.</strong> Firmen nutzen schon einen, <strong>&gt;1 Mrd.</strong> Business-Threads täglich.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Meta-Preis:</strong> gratis bis 01.08.2026, danach <strong>$2/Mio. Tokens</strong> (~4–5 US-Cent/Gespräch, laut Berichten — kein Primärbeleg).</li>\n      <li><span class=\"chip good\">DEPLOY · B2B</span> <strong>Pinecone Nexus</strong> (Public Preview seit 01.07.): „Wissens-Compiler\" für Agenten, bis zu <strong>9× weniger Tokens</strong> pro Anfrage — Hersteller-Benchmark, nicht auditiert. DE-Cloud-Region, Builder-Tier $20/Monat.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner:</strong> 40 % der Enterprise-Apps mit KI-Agenten bis Ende 2026 (von &lt;5 % 2025) — <em>aber</em> das Ursprungs-Release ist vom <strong>26.08.2025</strong>, und Gartner warnt zugleich: <strong>&gt;40 %</strong> der Agenten-Projekte bis Ende 2027 abgebrochen.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Inferenz-Paradox:</strong> Stückkosten −95 % in zwei Jahren, Rechnungen steigen trotzdem — agentische Workloads brauchen 10–50× mehr Tokens (Sekundärquelle, Methodik-Flag).</li>\n      <li><span class=\"chip\">FRONTIER · Global</span> <strong>Kontext:</strong> GPT-5.6 (09.07.) und Gemini Omni Flash (Preview 30.06.) sind draußen — der Coding-Winkel gehört ins ai-dev-Brief.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen auf genau diesen Schienen: ein <strong>souveräner On-Prem-Wissens-Compiler</strong> für den Mittelstand und ein <strong>schlanker WhatsApp-Commerce-Agent</strong> unter Charles' Enterprise-Preis.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern war die Geschichte: „Brüssel verschiebt die harten KI-Regeln um 16 Monate.\" Das stimmt — und ist trotzdem die halbe Wahrheit. Die andere Hälfte fällt in dasselbe Zeitfenster und wird kaum erzählt: <strong>genau jetzt sind die Schienen fertig geworden, auf denen Firmen KI-Agenten wirklich in Produktion schicken.</strong> Metas Business-Agent-Plattform steht seit dem 01.07. jeder Firma offen, Pinecone Nexus ging am selben Tag in die Public Preview. Die Bremse an der Regulierung wurde gelöst, während die Deploy-Rails verlegt wurden. Für twiceD ist das kein Zufall, sondern der Auftrag: nicht auf die 2027er-Frist starren, sondern auf die Infrastruktur, die heute produktiv ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Verschoben:</strong> Hochrisiko-KI (stand-alone) von <strong>02.08.2026 auf 02.12.2027</strong>, produkt-eingebettet auf <strong>02.08.2028</strong>. Rat-Zustimmung 29.06.2026, „Digital Omnibus\".</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Nicht verschoben:</strong> Artikel-50-Transparenz ab <strong>02.08.2026</strong> — Chatbots müssen sich als KI zu erkennen geben, KI-Inhalte gekennzeichnet werden.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Meta Business Agent Platform</strong> seit 01.07. für Partner offen: jede Firma baut einen WhatsApp-/Messenger-/Instagram-Agenten. <strong>&gt;1 Mio.</strong> Firmen nutzen schon einen, <strong>&gt;1 Mrd.</strong> Business-Threads täglich.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Meta-Preis:</strong> gratis bis 01.08.2026, danach <strong>$2/Mio. Tokens</strong> (~4–5 US-Cent/Gespräch, laut Berichten — kein Primärbeleg).</li>\n      <li><span class=\"chip good\">DEPLOY · B2B</span> <strong>Pinecone Nexus</strong> (Public Preview seit 01.07.): „Wissens-Compiler\" für Agenten, bis zu <strong>9× weniger Tokens</strong> pro Anfrage — Hersteller-Benchmark, nicht auditiert. DE-Cloud-Region, Builder-Tier $20/Monat.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner:</strong> 40 % der Enterprise-Apps mit KI-Agenten bis Ende 2026 (von &lt;5 % 2025) — <em>aber</em> das Ursprungs-Release ist vom <strong>26.08.2025</strong>, und Gartner warnt zugleich: <strong>&gt;40 %</strong> der Agenten-Projekte bis Ende 2027 abgebrochen.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Inferenz-Paradox:</strong> Stückkosten −95 % in zwei Jahren, Rechnungen steigen trotzdem — agentische Workloads brauchen 10–50× mehr Tokens (Sekundärquelle, Methodik-Flag).</li>\n      <li><span class=\"chip\">FRONTIER · Global</span> <strong>Kontext:</strong> GPT-5.6 (09.07.) und Gemini Omni Flash (Preview 30.06.) sind draußen — der Coding-Winkel gehört ins ai-dev-Brief.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen auf genau diesen Schienen: ein <strong>souveräner On-Prem-Wissens-Compiler</strong> für den Mittelstand und ein <strong>schlanker WhatsApp-Commerce-Agent</strong> unter Charles' Enterprise-Preis.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday's story was: \"Brussels pushes back the tough AI rules by 16 months.\" That's true — and still only half the truth. The other half falls into the same window and rarely gets told: <strong>right now, the rails companies actually use to ship AI agents into production have just been finished.</strong> Meta's Business Agent Platform has been open to every company since July 1, and Pinecone Nexus entered public preview the same day. The brake on regulation was released just as the deploy rails were being laid. For twiceD that's no coincidence but the assignment: don't stare at the 2027 deadline — watch the infrastructure that's productive today.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Postponed:</strong> high-risk AI (stand-alone) from <strong>August 2, 2026 to December 2, 2027</strong>, product-embedded to <strong>August 2, 2028</strong>. Council approval June 29, 2026, \"Digital Omnibus.\"</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Not postponed:</strong> Article 50 transparency from <strong>August 2, 2026</strong> — chatbots must identify themselves as AI, AI content must be labeled.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Meta Business Agent Platform</strong> open to partners since July 1: any company can build a WhatsApp/Messenger/Instagram agent. <strong>&gt;1M</strong> companies already use one, <strong>&gt;1B</strong> business threads daily.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Meta pricing:</strong> free until August 1, 2026, then <strong>$2/M tokens</strong> (~4–5 US cents/conversation, per reports — no primary source).</li>\n      <li><span class=\"chip good\">DEPLOY · B2B</span> <strong>Pinecone Nexus</strong> (public preview since July 1): a \"knowledge compiler\" for agents, up to <strong>9x fewer tokens</strong> per query — vendor benchmark, not audited. Germany cloud region, Builder tier $20/month.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner:</strong> 40% of enterprise apps to feature AI agents by end of 2026 (up from &lt;5% in 2025) — <em>but</em> the original release dates to <strong>August 26, 2025</strong>, and Gartner also warns: <strong>&gt;40%</strong> of agentic projects will be abandoned by end of 2027.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Inference paradox:</strong> unit costs down 95% in two years, bills keep rising anyway — agentic workloads need 10–50x more tokens (secondary source, methodology flag).</li>\n      <li><span class=\"chip\">FRONTIER · Global</span> <strong>Context:</strong> GPT-5.6 (July 9) and Gemini Omni Flash (preview June 30) are out — the coding angle belongs in the ai-dev brief.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas riding exactly these rails: a <strong>sovereign on-prem knowledge compiler</strong> for the Mittelstand and a <strong>lean WhatsApp commerce agent</strong> priced below Charles' enterprise rate.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, a notícia era: \"Bruxelas adia as regras duras de IA em 16 meses.\" Isso é verdade — mas ainda é só metade da história. A outra metade cai na mesma janela de tempo e quase não é contada: <strong>é justamente agora que ficaram prontos os trilhos sobre os quais as empresas realmente colocam agentes de IA em produção.</strong> A Meta Business Agent Platform está aberta a qualquer empresa desde 1º de julho, e a Pinecone Nexus entrou em prévia pública no mesmo dia. O freio da regulação foi solto justamente quando os trilhos de deploy estavam sendo instalados. Para a twiceD, isso não é coincidência, é a tarefa: não ficar olhando para o prazo de 2027, e sim para a infraestrutura que já é produtiva hoje.</p>\n    <ul>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Adiado:</strong> IA de alto risco (independente) de <strong>02/08/2026 para 02/12/2027</strong>, embutida em produto para <strong>02/08/2028</strong>. Aprovação do Conselho em 29/06/2026, \"Digital Omnibus\".</li>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Não adiado:</strong> transparência do Artigo 50 a partir de <strong>02/08/2026</strong> — chatbots precisam se identificar como IA, conteúdo gerado por IA precisa ser sinalizado.</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO · Global</span> <strong>Meta Business Agent Platform</strong> aberta a parceiros desde 1º de julho: qualquer empresa constrói um agente de WhatsApp/Messenger/Instagram. <strong>&gt;1 mi.</strong> de empresas já usam um, <strong>&gt;1 bi.</strong> de conversas comerciais por dia.</li>\n      <li><span class=\"chip\">IMPLANTAÇÃO · Global</span> <strong>Preço da Meta:</strong> gratuito até 01/08/2026, depois <strong>US$ 2/mi. de tokens</strong> (~4–5 centavos de dólar/conversa, segundo relatos — sem fonte primária).</li>\n      <li><span class=\"chip good\">IMPLANTAÇÃO · B2B</span> <strong>Pinecone Nexus</strong> (prévia pública desde 1º de julho): \"compilador de conhecimento\" para agentes, até <strong>9× menos tokens</strong> por consulta — benchmark do fabricante, não auditado. Região de nuvem na Alemanha, plano Builder US$ 20/mês.</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>Gartner:</strong> 40 % dos apps corporativos com agentes de IA até o fim de 2026 (ante &lt;5 % em 2025) — <em>mas</em> o release original é de <strong>26/08/2025</strong>, e a Gartner também alerta: <strong>&gt;40 %</strong> dos projetos de agentes serão abandonados até o fim de 2027.</li>\n      <li><span class=\"chip\">ECONOMIA · Global</span> <strong>Paradoxo da inferência:</strong> custo unitário −95 % em dois anos, as contas sobem mesmo assim — cargas de trabalho agênticas exigem 10–50× mais tokens (fonte secundária, alerta de metodologia).</li>\n      <li><span class=\"chip\">FRONTEIRA · Global</span> <strong>Contexto:</strong> GPT-5.6 (09/07) e Gemini Omni Flash (prévia 30/06) já estão no ar — o ângulo de codificação fica no brief de ai-dev.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias exatamente sobre esses trilhos: um <strong>compilador de conhecimento soberano on-prem</strong> para o mercado de médio porte e um <strong>agente enxuto de comércio via WhatsApp</strong> abaixo do preço enterprise da Charles.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer la noticia fue: \"Bruselas aplaza las reglas duras de IA 16 meses.\" Es cierto — y sigue siendo solo la mitad de la verdad. La otra mitad cae en la misma ventana de tiempo y casi no se cuenta: <strong>justo ahora quedaron listos los rieles sobre los que las empresas realmente están llevando agentes de IA a producción.</strong> La Meta Business Agent Platform está abierta a cualquier empresa desde el 1 de julio, y Pinecone Nexus entró en vista previa pública ese mismo día. El freno regulatorio se soltó justo cuando se tendían los rieles de despliegue. Para twiceD eso no es casualidad, es el encargo: no quedarse mirando el plazo de 2027, sino la infraestructura que hoy ya es productiva.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Aplazado:</strong> IA de alto riesgo (independiente) del <strong>02/08/2026 al 02/12/2027</strong>, integrada en producto hasta el <strong>02/08/2028</strong>. Aprobación del Consejo el 29/06/2026, \"Digital Omnibus\".</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>No aplazado:</strong> transparencia del Artículo 50 desde el <strong>02/08/2026</strong> — los chatbots deben identificarse como IA, el contenido generado por IA debe estar etiquetado.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Meta Business Agent Platform</strong> abierta a socios desde el 1 de julio: cualquier empresa construye un agente de WhatsApp/Messenger/Instagram. <strong>&gt;1 millón</strong> de empresas ya usan uno, <strong>&gt;1 mil millones</strong> de hilos de negocio al día.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Precio de Meta:</strong> gratis hasta el 01/08/2026, después <strong>$2/millón de tokens</strong> (~4–5 centavos de dólar/conversación, según reportes — sin fuente primaria).</li>\n      <li><span class=\"chip good\">DEPLOY · B2B</span> <strong>Pinecone Nexus</strong> (vista previa pública desde el 1 de julio): \"compilador de conocimiento\" para agentes, hasta <strong>9× menos tokens</strong> por consulta — benchmark del fabricante, no auditado. Región de nube en Alemania, plan Builder $20/mes.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner:</strong> 40 % de las apps empresariales con agentes de IA para fines de 2026 (desde &lt;5 % en 2025) — <em>pero</em> el comunicado original es del <strong>26/08/2025</strong>, y Gartner también advierte: <strong>&gt;40 %</strong> de los proyectos de agentes serán abandonados para fines de 2027.</li>\n      <li><span class=\"chip\">ECON · Global</span> <strong>Paradoja de la inferencia:</strong> costo unitario −95 % en dos años, las facturas suben de todos modos — las cargas de trabajo agénticas necesitan 10–50× más tokens (fuente secundaria, señal de metodología).</li>\n      <li><span class=\"chip\">FRONTIER · Global</span> <strong>Contexto:</strong> GPT-5.6 (09/07) y Gemini Omni Flash (vista previa 30/06) ya están afuera — el ángulo de programación va en el brief de ai-dev.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas sobre exactamente estos rieles: un <strong>compilador de conocimiento soberano on-prem</strong> para la mediana empresa y un <strong>agente de comercio por WhatsApp</strong> ligero, por debajo del precio empresarial de Charles.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein voller Freelance-Dienstag. <strong>150 Listings</strong> live gescort — 128 twiceD-Contracts, davon drei ganz oben auf Fit <strong>88</strong>, alle Java/Spring/Angular aus dem Frankfurt-München-Cluster. Die Angestellten-Spur bleibt dünn und liegt fast komplett in der Schweiz, bei den Intriguing-Rollen bauen die KI-Firmen ihre Forward-Deployed-Teams in Europa aus — und bei den EU-Ausschreibungen ist heute <strong>keine</strong> dabei, die twiceD allein stemmen könnte. Sechs stack-nahe TED-Verfahren geprüft, alle landen bei ⚠️ Partner oder ✗ Skip.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit 88, dreifach</strong>: iSAX (Java/Angular/AWS/Kafka, FFM 80 % remote), BridgingIT (Spring Boot/Kubernetes/Kafka, FFM 100 % remote), Keil (Java/Angular + Telematikinfrastruktur, München 100 % remote). Recherchierte Rate 90–130 €/h*.</li>\n      <li><span class=\"chip\">Remote</span> <strong>124 der 150 Listings</strong> tragen ein Remote-Tag — die BR-Zeitzone ist selten ein K.o., der Frankfurt-Onsite bei den 80-%-Rollen bleibt bündelbar.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Nur 13 Stellen im Filter</strong>, Spitze in der Schweiz: ELCA „Senior Java Engineer – Agentic AI\" Zürich (Fit 81, CHF 140–190k*). Dazu AXA (Python/AI) und Camunda (Kubernetes, remote worldwide, US$126.800–190.100).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Intriguing-Spitze JetBrains</strong>: „Principal Forward Deployed Engineer – AI-Native\" (Fit 82, EU-Multi-City); dahinter Cohere-, Cognition- und Cursor-FDE-Rollen.</li>\n      <li><span class=\"chip\">CH</span> <strong>Schweizer Senior-Band heute CHF 110–190k/Jahr</strong> über fünf Arbeitgeber (jobs.ch): ELCA, AXA, SIX, Eraneos, Axpo.</li>\n      <li><span class=\"chip\">DE</span> <strong>TED-Spur-3: sechs stack-nahe DE-Ausschreibungen geprüft</strong> — alle ⚠️ Partner oder ✗ Skip. Heute kein Solo-Direct-Fit.</li>\n      <li><span class=\"chip hot\">Achtung</span> <strong>LZPD NRW verlangt SÜG-NRW-Clearance</strong> für alle Eingesetzten → harter Konflikt mit Daniels Brasilien-Wohnsitz. Kein Partner-Thema, sondern K.o.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Markt-Signal Camunda</strong>: Das BMI schreibt ein 43-Mio.-€-Framework über 4 Jahre für Camunda-7-Lizenzen aus — kein Fit, aber Camunda steht auf der Employee-Zielliste.</li>\n      <li><span class=\"chip\">Rate</span> <strong>freelancermap-Kompass 2026: 103 €/h Querschnitt</strong> (alle Disziplinen, ~5.400 Befragte, Feld bis 08.02.2026). Kein Tech-Breakout — Java-Senior-Band bleibt 90–120 €/h.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Stack-Mix heute</strong>: Java 68×, Angular 47×, Spring Boot 46×, Kubernetes 30×, AWS 27×, TypeScript 26×, AI-Integration 24×.</li>\n      <li><span class=\"chip warn\">Datenlage</span> <strong>Kein datiertes DACH-Freeze-/Layoff-Signal heute verifizierbar</strong> — die Web-Suche war in dieser Session nicht verfügbar; es wird bewusst keines behauptet.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">A full freelance Tuesday. <strong>150 listings</strong> scored live — 128 twiceD contracts, three of them tied at the top on Fit <strong>88</strong>, all Java/Spring/Angular out of the Frankfurt-Munich cluster. The employee track stays thin and sits almost entirely in Switzerland; among the Intriguing roles, the AI companies keep expanding their forward-deployed teams across Europe — and among today's EU tenders, <strong>none</strong> is one twiceD could take on solo. Six stack-adjacent TED procedures reviewed, all landing on ⚠️ Partner or ✗ Skip.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top Fit 88, three-way tie</strong>: iSAX (Java/Angular/AWS/Kafka, FFM 80% remote), BridgingIT (Spring Boot/Kubernetes/Kafka, FFM 100% remote), Keil (Java/Angular + telematics infrastructure, Munich 100% remote). Researched rate €90–130/h*.</li>\n      <li><span class=\"chip\">Remote</span> <strong>124 of the 150 listings</strong> carry a remote tag — the Brazil time zone is rarely a dealbreaker, and the Frankfurt onsite time on the 80% roles stays bundleable.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Only 13 positions in the filter</strong>, top spot in Switzerland: ELCA \"Senior Java Engineer – Agentic AI\" Zurich (Fit 81, CHF 140–190k*). Plus AXA (Python/AI) and Camunda (Kubernetes, remote worldwide, US$126,800–190,100).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Top Intriguing pick JetBrains</strong>: \"Principal Forward Deployed Engineer – AI-Native\" (Fit 82, EU multi-city); followed by Cohere, Cognition, and Cursor FDE roles.</li>\n      <li><span class=\"chip\">CH</span> <strong>Swiss senior band today CHF 110–190k/year</strong> across five employers (jobs.ch): ELCA, AXA, SIX, Eraneos, Axpo.</li>\n      <li><span class=\"chip\">DE</span> <strong>TED track 3: six stack-adjacent DE tenders reviewed</strong> — all ⚠️ Partner or ✗ Skip. No solo direct fit today.</li>\n      <li><span class=\"chip hot\">Heads up</span> <strong>LZPD NRW requires SÜG-NRW clearance</strong> for everyone deployed → a hard conflict with Daniel's Brazil residency. Not a partner issue, a dealbreaker.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Market signal: Camunda</strong>: Germany's Federal Ministry of the Interior (BMI) is tendering a €43 million, 4-year framework for Camunda 7 licenses — not a fit, but Camunda sits on the employee target list.</li>\n      <li><span class=\"chip\">Rate</span> <strong>freelancermap Compass 2026: €103/h average</strong> (all disciplines, ~5,400 respondents, fieldwork through February 8, 2026). No tech breakout — the Java senior band stays €90–120/h.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Today's stack mix</strong>: Java 68×, Angular 47×, Spring Boot 46×, Kubernetes 30×, AWS 27×, TypeScript 26×, AI integration 24×.</li>\n      <li><span class=\"chip warn\">Data Quality</span> <strong>No dated DACH freeze/layoff signal verifiable today</strong> — web search wasn't available in this session, so none is claimed.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma terça-feira de freelance cheia. <strong>150 vagas</strong> avaliadas ao vivo — 128 contratos twiceD, três delas no topo com fit <strong>88</strong>, todas em Java/Spring/Angular do cluster Frankfurt-Munique. A trilha Employee segue enxuta e quase toda concentrada na Suíça; nas vagas Intriguing, as empresas de IA continuam expandindo seus times forward-deployed na Europa — e, nas licitações da UE, hoje não há <strong>nenhuma</strong> que a twiceD pudesse assumir sozinha. Seis processos TED próximos do stack foram analisados, todos caem em ⚠️ Parceiro ou ✗ Skip.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-fit 88, em triplicata</strong>: iSAX (Java/Angular/AWS/Kafka, FFM 80% remoto), BridgingIT (Spring Boot/Kubernetes/Kafka, FFM 100% remoto), Keil (Java/Angular + Telematikinfrastruktur, Munique 100% remoto). Taxa pesquisada de 90–130 €/h*.</li>\n      <li><span class=\"chip\">Remote</span> <strong>124 das 150 vagas</strong> trazem a tag remoto — o fuso horário do Brasil raramente é um impeditivo, e o onsite de Frankfurt nas vagas de 80% continua agrupável.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Apenas 13 vagas no filtro</strong>, com o topo na Suíça: ELCA \"Senior Java Engineer – Agentic AI\" em Zurique (fit 81, CHF 140–190 mil*). Além de AXA (Python/AI) e Camunda (Kubernetes, remoto no mundo todo, US$126.800–190.100).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Topo Intriguing é da JetBrains</strong>: \"Principal Forward Deployed Engineer – AI-Native\" (fit 82, multi-cidade na UE); logo atrás, vagas de FDE da Cohere, Cognition e Cursor.</li>\n      <li><span class=\"chip\">CH</span> <strong>Faixa sênior suíça hoje é CHF 110–190 mil/ano</strong> em cinco empregadores (jobs.ch): ELCA, AXA, SIX, Eraneos, Axpo.</li>\n      <li><span class=\"chip\">DE</span> <strong>Trilha 3 do TED: seis licitações alemãs próximas do stack analisadas</strong> — todas ⚠️ Parceiro ou ✗ Skip. Hoje, nenhum encaixe direto solo.</li>\n      <li><span class=\"chip hot\">Atenção</span> <strong>A LZPD NRW exige clearance SÜG-NRW</strong> para todos os profissionais alocados → conflito duro com a residência de Daniel no Brasil. Não é uma questão de parceria, é um K.o.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Sinal de mercado: Camunda</strong>: o BMI está licitando um framework de 43 milhões de € ao longo de 4 anos para licenças Camunda 7 — não é um fit, mas a Camunda está na lista-alvo de Employee.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Kompass da freelancermap 2026: média de 103 €/h no total</strong> (todas as disciplinas, ~5.400 entrevistados, coleta até 08/02/2026). Sem recorte por tecnologia — a faixa sênior de Java continua em 90–120 €/h.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Mix de stack hoje</strong>: Java 68×, Angular 47×, Spring Boot 46×, Kubernetes 30×, AWS 27×, TypeScript 26×, AI-Integration 24×.</li>\n      <li><span class=\"chip warn\">Qualidade dos dados</span> <strong>Nenhum sinal datado de congelamento/demissão na DACH pôde ser verificado hoje</strong> — a busca na web não estava disponível nesta sessão; por isso, deliberadamente, nenhum é afirmado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un martes freelance a tope. <strong>150 vacantes</strong> evaluadas en vivo — 128 contratos twiceD, de las cuales tres están hasta arriba con fit <strong>88</strong>, todas Java/Spring/Angular del clúster Fráncfort-Múnich. La vía de empleado fijo sigue siendo delgada y se concentra casi por completo en Suiza; en los roles intriguing, las empresas de IA siguen ampliando sus equipos forward-deployed en Europa — y en las licitaciones de la UE hoy <strong>ninguna</strong> es viable para que twiceD la asuma en solitario. Se revisaron seis licitaciones TED cercanas al stack, y todas terminan en ⚠️ Partner o ✗ Skip.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Mejor fit 88, por triplicado</strong>: iSAX (Java/Angular/AWS/Kafka, FFM 80 % remoto), BridgingIT (Spring Boot/Kubernetes/Kafka, FFM 100 % remoto), Keil (Java/Angular + infraestructura de telemática, Múnich 100 % remoto). Tarifa investigada 90–130 €/h*.</li>\n      <li><span class=\"chip\">Remoto</span> <strong>124 de las 150 vacantes</strong> llevan etiqueta de remoto — la zona horaria de Brasil rara vez es un impedimento total, el onsite en Fráncfort de los roles al 80 % se puede seguir agrupando.</li>\n      <li><span class=\"chip\">Empleado</span> <strong>Solo 13 puestos en el filtro</strong>, la cima en Suiza: ELCA „Senior Java Engineer – Agentic AI\" en Zúrich (fit 81, CHF 140–190k*). A eso se suman AXA (Python/IA) y Camunda (Kubernetes, remoto worldwide, US$126.800–190.100).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Cima de Intriguing: JetBrains</strong>: „Principal Forward Deployed Engineer – AI-Native\" (fit 82, EU-Multi-City); detrás, los roles FDE de Cohere, Cognition y Cursor.</li>\n      <li><span class=\"chip\">CH</span> <strong>Banda sénior suiza hoy: CHF 110–190k/año</strong> repartida en cinco empleadores (jobs.ch): ELCA, AXA, SIX, Eraneos, Axpo.</li>\n      <li><span class=\"chip\">DE</span> <strong>Pista TED-3: seis licitaciones alemanas cercanas al stack, revisadas</strong> — todas ⚠️ Partner o ✗ Skip. Hoy no hay ningún fit directo en solitario.</li>\n      <li><span class=\"chip hot\">Atención</span> <strong>El LZPD NRW exige una habilitación SÜG-NRW</strong> para todo el personal asignado → conflicto duro con la residencia de Daniel en Brasil. No es un tema de socio, es un criterio de exclusión.</li>\n      <li><span class=\"chip\">AI-Integration</span> <strong>Señal de mercado: Camunda</strong>: El BMI licita un marco de 43 millones de € a 4 años para licencias de Camunda 7 — no es un fit, pero Camunda está en la lista de empleadores objetivo.</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Freelancer-Kompass 2026 de freelancermap: 103 €/h promedio</strong> (todas las disciplinas, ~5.400 encuestados, levantamiento hasta el 08/02/2026). Sin desglose por tecnología — la banda sénior de Java se mantiene en 90–120 €/h.</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>Mezcla de stack hoy</strong>: Java 68×, Angular 47×, Spring Boot 46×, Kubernetes 30×, AWS 27×, TypeScript 26×, AI-Integration 24×.</li>\n      <li><span class=\"chip warn\">Datos</span> <strong>Hoy no se pudo verificar ninguna señal fechada de congelamiento o despidos en la región DACH</strong> — la búsqueda web no estuvo disponible en esta sesión; por eso deliberadamente no se afirma ninguna.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Tage nach dem Finale in New Jersey ist die WM abgehakt, und Daniels Bilanz bleibt bitter: Deutschland flog schon im Sechzehntelfinale am Elfmeterpunkt raus, danach stand der Bundestrainer nicht mehr an der Seitenlinie. Weltmeister wurde Spanien — souverän, verdient, zum zweiten Mal. In Freiburg läuft derweil der größte Kader-Umbau seit Jahren: Rekordeinnahme für Manzambi, neuer Stammtorwart, und ab morgen das Trainingslager im Montafon. Bundesliga ist tiefe Sommerpause, in Brasilien rollt der Ball nach der WM-Zwangspause wieder.</p>\n    <ul>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien Weltmeister</strong>: 1:0 n. V. gegen Argentinien, Ferran Torres in der 106. Zweiter Titel nach 2010, Finale So 19.07., 21:00 MESZ / 16:00 BRT im MetLife Stadium.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland im Sechzehntelfinale raus</strong>: 1:1 n. V., 3:4 im Elfmeterschießen gegen Paraguay (Mo 29.06.). Erstes verlorenes WM-Elfmeterschießen der deutschen Geschichte.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann-Nachfolge offen</strong>: Vertrag am 03.07. aufgelöst. Klopp gilt laut Watzke als Favorit (&gt;50 %), aber „definitiv noch nicht entschieden“ — Gerücht, nicht Meldung.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi-Rekordverkauf</strong>: zum SC → Aston Villa für ~60 Mio. € Sockelablöse (bis ~70 Mio. € inkl. Boni). Rekordeinnahme der Vereinsgeschichte.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Trainingslager ab morgen</strong>: Schruns/Montafon, 22.–31.07., mit Tests gegen Derby County und Greuther Fürth.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Europa nur über den Umweg</strong>: als Bundesliga-Siebter ins Conference-League-Playoff (Hin 20.08., Rück 27.08., lt. Vorabplan) statt in EL oder CL.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Neue Saison ab Fr 28.08.</strong>: Meister Bayern eröffnet gegen Stuttgart, 20:30 MESZ / 15:30 BRT (lt. Vorabplan). Freiburg startet daheim gegen Werder.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Freiburg muss nach Düsseldorf</strong>: 1. DFB-Pokal-Runde bei Fortuna, Fenster 21.–24.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A wieder da</strong>: seit Do 16.07. läuft der gestreckte 19. Spieltag; Palmeiras führt mit 41 Punkten klar vor Flamengo (34).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Tage nach dem Finale in New Jersey ist die WM abgehakt, und Daniels Bilanz bleibt bitter: Deutschland flog schon im Sechzehntelfinale am Elfmeterpunkt raus, danach stand der Bundestrainer nicht mehr an der Seitenlinie. Weltmeister wurde Spanien — souverän, verdient, zum zweiten Mal. In Freiburg läuft derweil der größte Kader-Umbau seit Jahren: Rekordeinnahme für Manzambi, neuer Stammtorwart, und ab morgen das Trainingslager im Montafon. Bundesliga ist tiefe Sommerpause, in Brasilien rollt der Ball nach der WM-Zwangspause wieder.</p>\n    <ul>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien Weltmeister</strong>: 1:0 n. V. gegen Argentinien, Ferran Torres in der 106. Zweiter Titel nach 2010, Finale So 19.07., 21:00 MESZ / 16:00 BRT im MetLife Stadium.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland im Sechzehntelfinale raus</strong>: 1:1 n. V., 3:4 im Elfmeterschießen gegen Paraguay (Mo 29.06.). Erstes verlorenes WM-Elfmeterschießen der deutschen Geschichte.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann-Nachfolge offen</strong>: Vertrag am 03.07. aufgelöst. Klopp gilt laut Watzke als Favorit (&gt;50 %), aber „definitiv noch nicht entschieden“ — Gerücht, nicht Meldung.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi-Rekordverkauf</strong>: zum SC → Aston Villa für ~60 Mio. € Sockelablöse (bis ~70 Mio. € inkl. Boni). Rekordeinnahme der Vereinsgeschichte.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Trainingslager ab morgen</strong>: Schruns/Montafon, 22.–31.07., mit Tests gegen Derby County und Greuther Fürth.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Europa nur über den Umweg</strong>: als Bundesliga-Siebter ins Conference-League-Playoff (Hin 20.08., Rück 27.08., lt. Vorabplan) statt in EL oder CL.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Neue Saison ab Fr 28.08.</strong>: Meister Bayern eröffnet gegen Stuttgart, 20:30 MESZ / 15:30 BRT (lt. Vorabplan). Freiburg startet daheim gegen Werder.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Freiburg muss nach Düsseldorf</strong>: 1. DFB-Pokal-Runde bei Fortuna, Fenster 21.–24.08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A wieder da</strong>: seit Do 16.07. läuft der gestreckte 19. Spieltag; Palmeiras führt mit 41 Punkten klar vor Flamengo (34).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two days after the final in New Jersey, the World Cup is history, and Daniel's tally stays bitter: Germany was already out in the round of 32 at the penalty spot, and after that the head coach no longer stood on the touchline. Spain became world champions — commanding, deserved, for the second time. In Freiburg, meanwhile, the biggest squad overhaul in years is underway: a record fee for Manzambi, a new starting goalkeeper, and starting tomorrow the training camp in the Montafon. The Bundesliga is deep in its summer break, while in Brazil the ball is rolling again after the World Cup-forced pause.</p>\n    <ul>\n      <li><span class=\"chip good\">World Cup</span> <strong>Spain are world champions</strong>: 1-0 after extra time against Argentina, Ferran Torres in the 106th minute. Second title since 2010, final Sun, Jul 19, 21:00 CEST / 16:00 BRT at MetLife Stadium.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany out in the round of 32</strong>: 1-1 after extra time, 3-4 on penalties against Paraguay (Mon, Jun 29). First penalty shootout Germany has ever lost at a World Cup.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann succession open</strong>: contract terminated on Jul 3. Klopp is considered the favorite according to Watzke (&gt;50%), but \"definitely not decided yet\" — a rumor, not a report.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi record sale</strong>: from SC to Aston Villa for a ~€60m base fee (up to ~€70m including add-ons). The biggest sale in club history.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Training camp starts tomorrow</strong>: Schruns/Montafon, Jul 22–31, with friendlies against Derby County and Greuther Fürth.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Europe only the long way round</strong>: as the Bundesliga's 7th-place finisher, into the Conference League playoff (first leg Aug 20, second leg Aug 27, per preliminary schedule) instead of the Europa League or Champions League.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>New season starts Fri, Aug 28</strong>: champions Bayern open against Stuttgart, 20:30 CEST / 15:30 BRT (per preliminary schedule). Freiburg opens at home against Werder.</li>\n      <li><span class=\"chip\">Cup</span> <strong>Freiburg travel to Düsseldorf</strong>: 1st DFB Cup round away at Fortuna, window Aug 21–24.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A is back</strong>: the stretched-out Round 19 has been underway since Thu, Jul 16; Palmeiras lead clearly with 41 points ahead of Flamengo (34).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois dias depois da final em Nova Jersey, a Copa do Mundo já é passado, e o balanço de Daniel continua amargo: a Alemanha caiu ainda nos dezesseis avos de final, no ponto de pênalti, e depois disso o técnico da seleção não voltou mais à beira do campo. Quem se tornou campeã do mundo foi a Espanha — soberana, merecida, pela segunda vez. Em Freiburg, corre paralelamente a maior reformulação de elenco em anos: receita recorde com a venda de Manzambi, novo goleiro titular, e a partir de amanhã o treinamento de pré-temporada no Montafon. A Bundesliga está em plena pausa de verão, e no Brasil a bola volta a rolar depois da pausa forçada pela Copa.</p>\n    <ul>\n      <li><span class=\"chip good\">Copa</span> <strong>Espanha é campeã do mundo</strong>: 1 a 0 na prorrogação contra a Argentina, gol de Ferran Torres aos 106. Segundo título depois de 2010, final dom. 19/07, 21:00 horário de Berlim / 16:00 BRT no MetLife Stadium.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha cai nos dezesseis avos de final</strong>: 1 a 1 na prorrogação, 3 a 4 nos pênaltis contra o Paraguai (seg. 29/06). Primeira disputa de pênaltis perdida pela Alemanha em uma Copa do Mundo.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Sucessão de Nagelsmann em aberto</strong>: contrato rescindido em 03/07. Segundo Watzke, Klopp é o favorito (&gt;50%), mas \"definitivamente ainda não decidido\" — rumor, não fato confirmado.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Venda recorde de Manzambi</strong>: do SC para o Aston Villa por cerca de € 60 milhões de valor-base (até cerca de € 70 milhões com bônus). Maior receita da história do clube.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Pré-temporada a partir de amanhã</strong>: Schruns/Montafon, 22 a 31/07, com amistosos contra o Derby County e o Greuther Fürth.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Europa só pelo caminho mais longo</strong>: como 7º colocado da Bundesliga, vai ao playoff da Conference League (ida 20/08, volta 27/08, conforme cronograma provisório) em vez da Liga Europa ou da Champions.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Nova temporada a partir de sex. 28/08</strong>: o campeão Bayern abre a temporada contra o Stuttgart, 20:30 horário de Berlim / 15:30 BRT (conforme cronograma provisório). Freiburg estreia em casa contra o Werder.</li>\n      <li><span class=\"chip\">Copa da Alemanha</span> <strong>Freiburg vai a Düsseldorf</strong>: 1ª rodada da DFB-Pokal contra o Fortuna, janela de 21 a 24/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Série A está de volta</strong>: desde qui. 16/07 acontece a 19ª rodada, distribuída ao longo dos dias; o Palmeiras lidera com folga, com 41 pontos, à frente do Flamengo (34).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos días después de la final en Nueva Jersey, el Mundial ya es historia, y el balance de Daniel sigue siendo amargo: Alemania quedó eliminada ya en dieciseisavos de final en la tanda de penales, y después de eso el seleccionador ya no volvió a estar en la banca. El campeón del mundo fue España — con autoridad, merecido, por segunda vez. En Friburgo, mientras tanto, se vive la mayor remodelación de plantilla en años: ingreso récord por Manzambi, nuevo portero titular, y a partir de mañana el campamento de entrenamiento en el Montafon. La Bundesliga está en pleno receso de verano, mientras en Brasil el balón vuelve a rodar tras la pausa obligada por el Mundial.</p>\n    <ul>\n      <li><span class=\"chip good\">Mundial</span> <strong>España es campeona del mundo</strong>: 1-0 en la prórroga ante Argentina, Ferran Torres al minuto 106. Segundo título tras 2010, final Dom 19/07, 21:00 CEST / 16:00 BRT en el MetLife Stadium.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania eliminada en dieciseisavos de final</strong>: 1-1 en la prórroga, 3-4 en penales ante Paraguay (Lun 29/06). Primera tanda de penales perdida por Alemania en la historia de los Mundiales.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Sucesión de Nagelsmann, sin definir</strong>: contrato rescindido el 03/07. Según Watzke, Klopp es el favorito (&gt;50 %), pero „definitivamente todavía no está decidido\" — rumor, no una noticia confirmada.</li>\n      <li><span class=\"chip\">Fichajes</span> <strong>Venta récord de Manzambi</strong>: del SC al Aston Villa por ~60 millones de € de traspaso base (hasta ~70 millones de € con bonos incluidos). Mayor ingreso en la historia del club.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Campamento de entrenamiento desde mañana</strong>: Schruns/Montafon, 22–31/07, con amistosos ante el Derby County y el Greuther Fürth.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Europa solo por el camino largo</strong>: como séptimo de la Bundesliga, al playoff de la Conference League (ida 20/08, vuelta 27/08, según calendario preliminar) en lugar de la Europa League o la Champions League.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Nueva temporada desde el vie 28/08</strong>: el campeón Bayern abre la temporada ante el Stuttgart, 20:30 CEST / 15:30 BRT (según calendario preliminar). Freiburg arranca en casa ante el Werder.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Freiburg viaja a Düsseldorf</strong>: 1.ª ronda de la Copa de Alemania (DFB-Pokal) ante el Fortuna, ventana 21–24/08.</li>\n      <li><span class=\"chip\">BRA</span> <strong>La Serie A está de vuelta</strong>: desde el jue 16/07 se disputa la jornada 19, repartida en el calendario; Palmeiras lidera con claridad con 41 puntos, por delante de Flamengo (34).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Dienstag, der 21. Juli — ein ruhiger Aufbautag. Seit dem <strong>Großen Preis von Belgien</strong> (Sonntag, 19.07.) ist keine Session gefahren worden, keine F1-, WEC-, MotoGP- oder Formel-E-Runde. Alle Wertungen unten sind deshalb <strong>unverändert seit Spa</strong> — heute neu abgerufen und gegen zwei Quellen geprüft, aber ohne neue Zahl. Der Blick geht nach vorn: Am Wochenende steht der <strong>Große Preis von Ungarn</strong> am Hungaroring an (Fr–So 24.–26.07.), das <strong>letzte Rennen vor der Sommerpause</strong>. Antonelli führt mit <strong>45 Punkten</strong> Vorsprung und verteidigt vor der Pause ein komfortables Polster; für Max Verstappen ist derweil eine Vertragsfrage schon vor der ersten Runde entschieden. Rennstart Sonntag <strong>10:00 BRT</strong> (15:00 MESZ). Danach ist bis zum Großen Preis der Niederlande (21.–23.08.) gut drei Wochen Formel-1-Pause.</p>\n    <ul>\n      <li><span class=\"chip hot\">Vorschau</span> <strong>GP Ungarn, Hungaroring, Fr–So 24.–26.07.</strong> Klassisches Format ohne Sprint, Rennen 70 Runden. Letzter Lauf vor der Pause. Sessionzeiten in drei Zonen unten.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unverändert seit Spa, heute nachgeprüft. Leclerc Vierter (126).</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73 Punkte), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Ausstiegsklausel-Schwelle rechnerisch tot.</strong> P7 mit 91 Punkten, ein Rennen bis zur Pause, maximal 116 möglich — Platz zwei steht bei 159. Ungarn ändert daran nichts mehr.</li>\n      <li><span class=\"chip\">Zeitplan</span> <strong>Rennen So 26.07. 10:00 BRT / 15:00 MESZ</strong>, Qualifying Sa 25.07. 11:00 BRT / 16:00 MESZ. Alle Zeiten per Zeitzonen-Datenbank umgerechnet.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nach Ungarn: Sommerpause.</strong> Nächster F1-Lauf ist der GP der Niederlande, Runde 12, 21.–23.08.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.). Nächster Lauf laut Kalender in Austin, 04.–06.09. (Datum aus dem Brief von gestern, heute nicht neu geprüft).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP-Restart Silverstone 07.–09.08.</strong> (heute nur eine Quelle), <strong>Formel-E-Finale London 15.–16.08.</strong> (heute nur über Wikipedia belegbar — Details unten).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Dienstag, der 21. Juli — ein ruhiger Aufbautag. Seit dem <strong>Großen Preis von Belgien</strong> (Sonntag, 19.07.) ist keine Session gefahren worden, keine F1-, WEC-, MotoGP- oder Formel-E-Runde. Alle Wertungen unten sind deshalb <strong>unverändert seit Spa</strong> — heute neu abgerufen und gegen zwei Quellen geprüft, aber ohne neue Zahl. Der Blick geht nach vorn: Am Wochenende steht der <strong>Große Preis von Ungarn</strong> am Hungaroring an (Fr–So 24.–26.07.), das <strong>letzte Rennen vor der Sommerpause</strong>. Antonelli führt mit <strong>45 Punkten</strong> Vorsprung und verteidigt vor der Pause ein komfortables Polster; für Max Verstappen ist derweil eine Vertragsfrage schon vor der ersten Runde entschieden. Rennstart Sonntag <strong>10:00 BRT</strong> (15:00 MESZ). Danach ist bis zum Großen Preis der Niederlande (21.–23.08.) gut drei Wochen Formel-1-Pause.</p>\n    <ul>\n      <li><span class=\"chip hot\">Vorschau</span> <strong>GP Ungarn, Hungaroring, Fr–So 24.–26.07.</strong> Klassisches Format ohne Sprint, Rennen 70 Runden. Letzter Lauf vor der Pause. Sessionzeiten in drei Zonen unten.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unverändert seit Spa, heute nachgeprüft. Leclerc Vierter (126).</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73 Punkte), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Ausstiegsklausel-Schwelle rechnerisch tot.</strong> P7 mit 91 Punkten, ein Rennen bis zur Pause, maximal 116 möglich — Platz zwei steht bei 159. Ungarn ändert daran nichts mehr.</li>\n      <li><span class=\"chip\">Zeitplan</span> <strong>Rennen So 26.07. 10:00 BRT / 15:00 MESZ</strong>, Qualifying Sa 25.07. 11:00 BRT / 16:00 MESZ. Alle Zeiten per Zeitzonen-Datenbank umgerechnet.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nach Ungarn: Sommerpause.</strong> Nächster F1-Lauf ist der GP der Niederlande, Runde 12, 21.–23.08.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.). Nächster Lauf laut Kalender in Austin, 04.–06.09. (Datum aus dem Brief von gestern, heute nicht neu geprüft).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP-Restart Silverstone 07.–09.08.</strong> (heute nur eine Quelle), <strong>Formel-E-Finale London 15.–16.08.</strong> (heute nur über Wikipedia belegbar — Details unten).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Tuesday, July 21 — a quiet build week. Since the <strong>Belgian Grand Prix</strong> (Sunday, 19.07.), not a single session has run — no F1, WEC, MotoGP, or Formula E round. All the standings below are therefore <strong>unchanged since Spa</strong> — refetched today and checked against two sources, but with no new number. The view turns forward: this weekend brings the <strong>Hungarian Grand Prix</strong> at the Hungaroring (Fri–Sun 24.–26.07.), the <strong>last race before the summer break</strong>. Antonelli leads by <strong>45 points</strong> and defends a comfortable cushion heading into the pause; for Max Verstappen, meanwhile, a contract question is settled before a single lap has been driven. Race start Sunday <strong>10:00 BRT</strong> (15:00 CEST). After that, it's a good three weeks of Formula 1 break until the Dutch Grand Prix (21.–23.08.).</p>\n    <ul>\n      <li><span class=\"chip hot\">Preview</span> <strong>Hungarian GP, Hungaroring, Fri–Sun 24.–26.07.</strong> Classic format, no sprint, race distance 70 laps. Last round before the break. Session times in three zones below.</li>\n      <li><span class=\"chip\">Drivers' standings</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unchanged since Spa, re-checked today. Leclerc fourth (126).</li>\n      <li><span class=\"chip\">Constructors</span> <strong>Mercedes 358 ahead of Ferrari 285</strong> (+73 points), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Exit-clause threshold mathematically dead.</strong> P7 with 91 points, one race until the break, 116 maximum possible — second place stands at 159. Hungary won't change that anymore.</li>\n      <li><span class=\"chip\">Schedule</span> <strong>Race Sun 26.07. 10:00 BRT / 15:00 CEST</strong>, qualifying Sat 25.07. 11:00 BRT / 16:00 CEST. All times converted via time zone database.</li>\n      <li><span class=\"chip\">Calendar</span> <strong>After Hungary: summer break.</strong> The next F1 round is the Dutch GP, round 12, 21.–23.08.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — frozen since São Paulo (12.07.). Next round per the calendar is Austin, 04.–06.09. (date carried over from yesterday's brief, not re-checked today).</li>\n      <li><span class=\"chip\">Other series</span> <strong>MotoGP restart Silverstone 07.–09.08.</strong> (single-sourced today), <strong>Formula E finale London 15.–16.08.</strong> (only verifiable via Wikipedia today — details below).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é terça-feira, 21 de julho — um dia tranquilo de preparação. Desde o <strong>Grande Prêmio da Bélgica</strong> (domingo, 19/07), nenhuma sessão foi disputada — nem F1, nem WEC, nem MotoGP, nem Fórmula E. Todas as classificações abaixo estão, portanto, <strong>inalteradas desde Spa</strong> — atualizadas hoje e conferidas em duas fontes, mas sem nenhum número novo. O olhar agora vai para frente: no fim de semana acontece o <strong>Grande Prêmio da Hungria</strong> no Hungaroring (sex–dom 24–26/07), a <strong>última corrida antes da pausa de verão</strong>. Antonelli lidera com <strong>45 pontos</strong> de vantagem e defende uma folga confortável antes da pausa; para Max Verstappen, por sua vez, uma questão contratual já está resolvida antes mesmo da primeira volta. Largada da corrida no domingo às <strong>10h00 BRT</strong> (15h00 CEST). Depois disso, faltam boas três semanas de pausa da Fórmula 1 até o Grande Prêmio dos Países Baixos (21–23/08).</p>\n    <ul>\n      <li><span class=\"chip hot\">Prévia</span> <strong>GP da Hungria, Hungaroring, sex–dom 24–26/07.</strong> Formato clássico sem sprint, corrida de 70 voltas. Última etapa antes da pausa. Horários das sessões em três fusos abaixo.</li>\n      <li><span class=\"chip\">Classificação de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — inalterado desde Spa, reconferido hoje. Leclerc em quarto (126).</li>\n      <li><span class=\"chip\">Construtores</span> <strong>Mercedes 358 à frente de Ferrari 285</strong> (+73 pontos), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Limite da cláusula de saída matematicamente morto.</strong> P7 com 91 pontos, uma corrida até a pausa, máximo de 116 possível — o segundo lugar está em 159. A Hungria não muda mais nada nisso.</li>\n      <li><span class=\"chip\">Horários</span> <strong>Corrida dom 26/07 às 10h00 BRT / 15h00 CEST</strong>, classificação sáb 25/07 às 11h00 BRT / 16h00 CEST. Todos os horários convertidos por banco de dados de fusos horários.</li>\n      <li><span class=\"chip\">Calendário</span> <strong>Depois da Hungria: pausa de verão.</strong> A próxima etapa da F1 é o GP dos Países Baixos, rodada 12, 21–23/08.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07). Próxima etapa, segundo o calendário, em Austin, 04–06/09 (data vinda do brief de ontem, não reconferida hoje).</li>\n      <li><span class=\"chip\">Outras séries</span> <strong>Retorno da MotoGP em Silverstone, 07–09/08</strong> (hoje com apenas uma fonte), <strong>final da Fórmula E em Londres, 15–16/08</strong> (hoje só comprovável via Wikipédia — detalhes abaixo).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es martes 21 de julio — un día tranquilo de preparación. Desde el <strong>Gran Premio de Bélgica</strong> (domingo 19/07), no se ha disputado ninguna sesión — ni F1, ni WEC, ni MotoGP, ni Fórmula E. Todas las clasificaciones de abajo están, por lo tanto, <strong>sin cambios desde Spa</strong> — actualizadas hoy y verificadas con dos fuentes, pero sin ningún número nuevo. La mirada ahora va hacia adelante: este fin de semana llega el <strong>Gran Premio de Hungría</strong> en el Hungaroring (vie–dom 24–26/07), la <strong>última carrera antes del receso de verano</strong>. Antonelli lidera con <strong>45 puntos</strong> de ventaja y defiende un colchón cómodo antes de la pausa; para Max Verstappen, en cambio, una cuestión contractual ya está resuelta antes de la primera vuelta. Arranque de la carrera el domingo a las <strong>10:00 BRT</strong> (15:00 CEST). Después de eso, faltan poco más de tres semanas de receso de Fórmula 1 hasta el Gran Premio de los Países Bajos (21–23/08).</p>\n    <ul>\n      <li><span class=\"chip hot\">Vista previa</span> <strong>GP de Hungría, Hungaroring, vie–dom 24–26/07.</strong> Formato clásico sin sprint, carrera de 70 vueltas. Última cita antes de la pausa. Horarios de sesión en tres zonas más abajo.</li>\n      <li><span class=\"chip\">Clasificación de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — sin cambios desde Spa, reverificado hoy. Leclerc, cuarto (126).</li>\n      <li><span class=\"chip\">Constructores</span> <strong>Mercedes 358 por delante de Ferrari 285</strong> (+73 puntos), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Umbral de la cláusula de salida, matemáticamente muerto.</strong> P7 con 91 puntos, una carrera antes de la pausa, máximo 116 posibles — el segundo puesto está en 159. Hungría ya no cambia nada de esto.</li>\n      <li><span class=\"chip\">Horarios</span> <strong>Carrera dom 26/07 10:00 BRT / 15:00 CEST</strong>, clasificación sáb 25/07 11:00 BRT / 16:00 CEST. Todos los horarios convertidos mediante base de datos de husos horarios.</li>\n      <li><span class=\"chip\">Calendario</span> <strong>Después de Hungría: receso de verano.</strong> La próxima carrera de F1 es el GP de los Países Bajos, ronda 12, 21–23/08.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07). Próxima carrera, según el calendario, en Austin, 04–06/09 (fecha tomada del brief de ayer, no reverificada hoy).</li>\n      <li><span class=\"chip\">Otras series</span> <strong>Regreso de la MotoGP en Silverstone, 07–09/08</strong> (hoy con una sola fuente), <strong>final de la Fórmula E en Londres, 15–16/08</strong> (hoy solo verificable vía Wikipedia — detalles más abajo).</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute stimmen ausnahmsweise alle drei geprüften Wetterquellen überein: trocken, mild, kaum Wind — der beste Tag der Woche, um mit den Kindern rauszugehen. Ab Mittwoch zerfällt die Einigkeit wieder, dann sagt das eine Portal Sonnenschein und das andere Dauerregen. Und über Londrina — ausdrücklich nicht über Ribeirão Claro — hängt bis heute Nacht ein Wind-Hinweis der untersten Warnstufe. Wer heute in die Kinderbibliothek nach Londrina fährt, sollte ihn kennen, aber nicht davor zurückschrecken.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Kostenlos, ab 10 Uhr</strong>: Biblioteca Infantil Londrina, Ferien-Tag 2 — Kirigami und Pop-up-Karten. Läuft noch bis Fr 24.07.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Heute bester Outdoor-Tag</strong>: climatempo, theweather.com und INMET einig — rund 0 % Regen, 17–30 °C.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>Windhinweis über Londrina</strong>: INMET „Vendaval\" (gelb, 40–60 km/h) bis heute 23:59 über Londrina + ~250 PR-Gemeinden — Ribeirão Claro <em>nicht</em> in der Liste, lokal windstill.</li>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Ab Mittwoch strittig</strong>: climatempo lag gestern bei ~40 %, theweather.com heute bei 80–90 % Regen. Kein Mittelwert, keine Sicherheit.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: letzter Ferientag Fr 24.07., Unterricht der rede estadual ab Mo 27.07. für rund 1,1 Mio. Schüler.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue rückläufig</strong>: Londrina 1.292 bestätigte Fälle, 2 Todesfälle (Stand 15.07.2026).</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV dominiert</strong>: 55,9 % aller positiven Atemwegsproben, Paraná auf Alarm-Niveau (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern- und Day-Trip-Ring heute wieder blind</strong>: die lokalen Veranstaltungsseiten waren nicht auslesbar — das heißt nicht, dass nichts läuft.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range</strong>: „Hopi Arraiá\" im Hopi Hari bis 27.07. verlängert.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute stimmen ausnahmsweise alle drei geprüften Wetterquellen überein: trocken, mild, kaum Wind — der beste Tag der Woche, um mit den Kindern rauszugehen. Ab Mittwoch zerfällt die Einigkeit wieder, dann sagt das eine Portal Sonnenschein und das andere Dauerregen. Und über Londrina — ausdrücklich nicht über Ribeirão Claro — hängt bis heute Nacht ein Wind-Hinweis der untersten Warnstufe. Wer heute in die Kinderbibliothek nach Londrina fährt, sollte ihn kennen, aber nicht davor zurückschrecken.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Kostenlos, ab 10 Uhr</strong>: Biblioteca Infantil Londrina, Ferien-Tag 2 — Kirigami und Pop-up-Karten. Läuft noch bis Fr 24.07.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Heute bester Outdoor-Tag</strong>: climatempo, theweather.com und INMET einig — rund 0 % Regen, 17–30 °C.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>Windhinweis über Londrina</strong>: INMET „Vendaval\" (gelb, 40–60 km/h) bis heute 23:59 über Londrina + ~250 PR-Gemeinden — Ribeirão Claro <em>nicht</em> in der Liste, lokal windstill.</li>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Ab Mittwoch strittig</strong>: climatempo lag gestern bei ~40 %, theweather.com heute bei 80–90 % Regen. Kein Mittelwert, keine Sicherheit.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: letzter Ferientag Fr 24.07., Unterricht der rede estadual ab Mo 27.07. für rund 1,1 Mio. Schüler.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue rückläufig</strong>: Londrina 1.292 bestätigte Fälle, 2 Todesfälle (Stand 15.07.2026).</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV dominiert</strong>: 55,9 % aller positiven Atemwegsproben, Paraná auf Alarm-Niveau (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern- und Day-Trip-Ring heute wieder blind</strong>: die lokalen Veranstaltungsseiten waren nicht auslesbar — das heißt nicht, dass nichts läuft.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range</strong>: „Hopi Arraiá\" im Hopi Hari bis 27.07. verlängert.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">For once, all three weather sources we checked agree today: dry, mild, barely any wind — the best day of the week to get outside with the kids. Starting Wednesday, that agreement falls apart again, with one portal calling for sunshine and the other for steady rain. And over Londrina — explicitly not over Ribeirão Claro — a lowest-tier wind advisory holds until tonight. Anyone driving to the children's library in Londrina today should know about it, but shouldn't be put off by it.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Free, starting 10 am</strong>: Biblioteca Infantil Londrina, vacation day 2 — kirigami and pop-up cards. Running through Fri 07/24.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Best outdoor day today</strong>: climatempo, theweather.com, and INMET agree — around 0% rain, 17–30 °C.</li>\n      <li><span class=\"chip hot\">HEADS UP</span> <strong>Wind advisory over Londrina</strong>: INMET \"Vendaval\" (yellow, 40–60 km/h) until 11:59 pm tonight over Londrina + ~250 PR municipalities — Ribeirão Claro <em>not</em> on the list, locally calm.</li>\n      <li><span class=\"chip hot\">WEATHER</span> <strong>Disputed from Wednesday on</strong>: climatempo was at ~40% yesterday, theweather.com at 80–90% rain today. No averaging, no certainty.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Recesso ends</strong>: last day of break is Fri 07/24, classes in the rede estadual resume Mon 07/27 for roughly 1.1 million students.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue declining</strong>: Londrina 1,292 confirmed cases, 2 deaths (as of 07/15/2026).</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV dominates</strong>: 55.9% of all positive respiratory samples, Paraná at alert level (InfoGripe epi week 26/2026).</li>\n      <li><span class=\"chip\">GAP</span> <strong>Core and day-trip ring blind again today</strong>: the local event listing sites couldn't be retrieved — that doesn't mean nothing is happening.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP range</strong>: \"Hopi Arraiá\" at Hopi Hari extended through 07/27.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje, excepcionalmente, as três fontes meteorológicas que checamos concordam: seco, ameno, quase sem vento — o melhor dia da semana para sair com as crianças. A partir de quarta-feira o consenso se desfaz de novo, com um portal apostando em sol e o outro em chuva constante. E sobre Londrina — explicitamente não sobre Ribeirão Claro — pesa até hoje à noite um aviso de vento do nível mais baixo. Quem for à biblioteca infantil em Londrina hoje deve conhecê-lo, mas não precisa se assustar.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENTO</span> <strong>Grátis, a partir das 10h</strong>: Biblioteca Infantil Londrina, dia 2 de férias — kirigami e cartões pop-up. Segue até sex 24/07.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Melhor dia para atividades ao ar livre hoje</strong>: climatempo, theweather.com e o INMET concordam — cerca de 0% de chance de chuva, 17–30 °C.</li>\n      <li><span class=\"chip hot\">ATENÇÃO</span> <strong>Aviso de vento sobre Londrina</strong>: INMET \"Vendaval\" (amarelo, 40–60 km/h) até 23:59 de hoje sobre Londrina + ~250 municípios do PR — Ribeirão Claro <em>não</em> está na lista, sem vento localmente.</li>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>Divergente a partir de quarta</strong>: o climatempo estava em ~40% ontem, o theweather.com em 80–90% de chuva hoje. Sem média, sem certeza.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Recesso termina</strong>: último dia de férias é sex 24/07, as aulas da rede estadual voltam na seg 27/07 para cerca de 1,1 milhão de alunos.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue em queda</strong>: Londrina soma 1.292 casos confirmados, 2 óbitos (dados de 15/07/2026).</li>\n      <li><span class=\"chip hot\">BEBÊ</span> <strong>VSR domina</strong>: 55,9% de todas as amostras respiratórias positivas, Paraná em nível de alerta (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">LACUNA</span> <strong>Anel central e de passeio de um dia sem dados de novo hoje</strong>: as páginas locais de eventos não puderam ser acessadas — isso não significa que não há nada acontecendo.</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>Raio de SP</strong>: \"Hopi Arraiá\" no Hopi Hari prorrogado até 27/07.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy, por excepción, las tres fuentes meteorológicas que revisamos coinciden: seco, templado, casi sin viento — el mejor día de la semana para salir con los niños. A partir del miércoles el consenso se rompe de nuevo, con un portal anunciando sol y el otro lluvia constante. Y sobre Londrina —explícitamente no sobre Ribeirão Claro— pesa hasta esta noche un aviso de viento del nivel más bajo. Quien vaya hoy a la biblioteca infantil en Londrina debería conocerlo, pero no dejarse asustar por él.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENTO</span> <strong>Gratis, desde las 10 h</strong>: Biblioteca Infantil Londrina, día 2 de vacaciones — kirigami y tarjetas pop-up. Continúa hasta el vie 24/07.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Hoy, el mejor día para actividades al aire libre</strong>: climatempo, theweather.com y el INMET coinciden — alrededor de 0 % de lluvia, 17–30 °C.</li>\n      <li><span class=\"chip hot\">ATENCIÓN</span> <strong>Aviso de viento sobre Londrina</strong>: INMET «Vendaval» (amarillo, 40–60 km/h) hasta las 23:59 de hoy sobre Londrina + ~250 municipios de PR — Ribeirão Claro <em>no</em> está en la lista, sin viento localmente.</li>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>Incierto a partir del miércoles</strong>: climatempo estaba ayer en ~40 %, theweather.com hoy en 80–90 % de lluvia. Sin promedio, sin certeza.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Termina el receso</strong>: el último día de vacaciones es el vie 24/07, las clases de la rede estadual retoman el lun 27/07 para cerca de 1,1 millones de alumnos.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue a la baja</strong>: Londrina, 1.292 casos confirmados, 2 muertes (al 15/07/2026).</li>\n      <li><span class=\"chip hot\">BEBÉ</span> <strong>El VSR domina</strong>: 55,9 % de todas las muestras respiratorias positivas, Paraná en nivel de alerta (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">VACÍO</span> <strong>Anillo cercano y de excursiones, hoy otra vez sin datos</strong>: no pudimos leer las páginas de eventos locales — eso no significa que no haya nada programado.</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Radio de SP</strong>: «Hopi Arraiá» en Hopi Hari prorrogado hasta el 27/07.</li>\n    </ul></div>"
