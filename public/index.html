      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Tag hat einen harten Stichtag: <strong>heute</strong> ist der letzte, an dem Anthropics Claude Fable 5 noch im Plan enthalten ist — ab morgen zahlst du pro Token oder verlierst den Zugriff. Daneben zwei Sachen, die länger nachwirken als eine Preisänderung: ein neuer Multi-Turn-Benchmark, der zeigt, wie viel schwerer echte Agenten-Sessions sind als die SWE-Bench-Zahlen, die alle zitieren — und eine GitLab-Umfrage, die das „KI-Paradox\" mit Zahlen belegt: schneller getippt, nicht schneller ausgeliefert.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 · Stichtag heute</strong>: bis 7. Juli plan-inklusiv (bis 50 % des Wochenlimits), ab 8. Juli nur noch mit aktivierten Usage-Credits — sonst kein Zugriff mehr.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Together</strong>: Meta-Forscher veröffentlichen einen 109-Task-Multi-Turn-Benchmark aus 11.260 echten Sessions. Opus 4.8 führt mit <span class=\"stat\">63 %</span> pass@1 — gegenüber 88,6 % auf SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitLab AI-Accountability-Report</strong>: 78 % tippen schneller, aber 79 % sagen, die Auslieferung ist nicht mitgezogen. 85 % nennen Review den neuen Flaschenhals.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol</strong>: Security-Variante für Long-Horizon-Arbeit, aber nur Limited-Partner-Preview. „Schlägt Mythos mit 1/3 der Tokens\" ist OpenAIs eigene, unbestätigte Zahl.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code ist das erste Open-Weight-Modell im Copilot-Picker (CLI 1.0.68); Agent-Session-Streaming in Public Preview.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Der Rest still</strong>: Cursor, Cline, Continue, OpenHands, Devin — kein datierter Move diese Woche. JetBrains-AI-ToS greift heute.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Tag hat einen harten Stichtag: <strong>heute</strong> ist der letzte, an dem Anthropics Claude Fable 5 noch im Plan enthalten ist — ab morgen zahlst du pro Token oder verlierst den Zugriff. Daneben zwei Sachen, die länger nachwirken als eine Preisänderung: ein neuer Multi-Turn-Benchmark, der zeigt, wie viel schwerer echte Agenten-Sessions sind als die SWE-Bench-Zahlen, die alle zitieren — und eine GitLab-Umfrage, die das „KI-Paradox\" mit Zahlen belegt: schneller getippt, nicht schneller ausgeliefert.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 · Stichtag heute</strong>: bis 7. Juli plan-inklusiv (bis 50 % des Wochenlimits), ab 8. Juli nur noch mit aktivierten Usage-Credits — sonst kein Zugriff mehr.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Together</strong>: Meta-Forscher veröffentlichen einen 109-Task-Multi-Turn-Benchmark aus 11.260 echten Sessions. Opus 4.8 führt mit <span class=\"stat\">63 %</span> pass@1 — gegenüber 88,6 % auf SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitLab AI-Accountability-Report</strong>: 78 % tippen schneller, aber 79 % sagen, die Auslieferung ist nicht mitgezogen. 85 % nennen Review den neuen Flaschenhals.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol</strong>: Security-Variante für Long-Horizon-Arbeit, aber nur Limited-Partner-Preview. „Schlägt Mythos mit 1/3 der Tokens\" ist OpenAIs eigene, unbestätigte Zahl.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code ist das erste Open-Weight-Modell im Copilot-Picker (CLI 1.0.68); Agent-Session-Streaming in Public Preview.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Der Rest still</strong>: Cursor, Cline, Continue, OpenHands, Devin — kein datierter Move diese Woche. JetBrains-AI-ToS greift heute.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today has a hard deadline: <strong>today</strong> is the last day Anthropic's Claude Fable 5 is still included in your plan — starting tomorrow you pay per token or lose access. Beyond that, two stories that will matter longer than any price change: a new multi-turn benchmark showing how much harder real agent sessions are than the SWE-Bench numbers everyone quotes — and a GitLab survey that puts numbers on the \"AI paradox\": typing faster, not shipping faster.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 · deadline today</strong>: plan-included through July 7 (up to 50% of your weekly limit), from July 8 only with usage credits enabled — otherwise no access at all.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Together</strong>: Meta-affiliated researchers release a 109-task multi-turn benchmark drawn from 11,260 real sessions. Opus 4.8 leads with <span class=\"stat\">63%</span> pass@1 — versus 88.6% on SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitLab AI Accountability Report</strong>: 78% type faster, but 79% say delivery hasn't kept pace. 85% name review as the new bottleneck.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol</strong>: a security variant for long-horizon work, but only in limited-partner preview. \"Beats Mythos with 1/3 the tokens\" is OpenAI's own, unconfirmed figure.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code is the first open-weight model in the Copilot model picker (CLI 1.0.68); agent session streaming in public preview.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Everyone else quiet</strong>: Cursor, Cline, Continue, OpenHands, Devin — no dated move this week. JetBrains AI ToS takes effect today.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O dia tem um prazo definitivo: <strong>hoje</strong> é o último dia em que o Claude Fable 5 da Anthropic ainda está incluído no plano — a partir de amanhã você paga por token ou perde o acesso. Além disso, duas histórias que vão pesar mais do que qualquer mudança de preço: um novo benchmark multi-turno que mostra o quanto sessões reais de agentes são mais difíceis do que os números do SWE-Bench que todo mundo cita — e uma pesquisa do GitLab que coloca números no \"paradoxo da IA\": digitando mais rápido, mas sem entregar mais rápido.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 · prazo hoje</strong>: incluído no plano até 7 de julho (até 50% do limite semanal), a partir de 8 de julho só com créditos de uso ativados — do contrário, nenhum acesso.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Together</strong>: pesquisadores ligados à Meta lançam um benchmark multi-turno com 109 tarefas, extraído de 11.260 sessões reais. Opus 4.8 lidera com <span class=\"stat\">63%</span> de pass@1 — contra 88,6% no SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitLab AI Accountability Report</strong>: 78% digitam mais rápido, mas 79% dizem que a entrega não acompanhou o ritmo. 85% apontam a revisão como o novo gargalo.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol</strong>: variante de segurança para tarefas de longa duração, mas apenas em preview limitado a parceiros. \"Supera o Mythos com 1/3 dos tokens\" é número da própria OpenAI, não confirmado de forma independente.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code é o primeiro modelo de peso aberto no seletor do Copilot (CLI 1.0.68); streaming de sessões de agente em preview público.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>O resto em silêncio</strong>: Cursor, Cline, Continue, OpenHands, Devin — nenhum movimento datado esta semana. Os novos termos de uso de IA da JetBrains entram em vigor hoje.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día tiene una fecha límite dura: <strong>hoy</strong> es el último día en que Claude Fable 5 de Anthropic sigue incluido en el plan — a partir de mañana pagas por token o pierdes el acceso. Además, dos historias que van a pesar más que cualquier cambio de precio: un nuevo benchmark multi-turno que muestra cuánto más difíciles son las sesiones reales de agentes frente a las cifras de SWE-Bench que todos citan — y una encuesta de GitLab que pone números a la \"paradoja de la IA\": se escribe más rápido, pero no se entrega más rápido.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 · fecha límite hoy</strong>: incluido en el plan hasta el 7 de julio (hasta el 50% del límite semanal), a partir del 8 de julio solo con créditos de uso activados — de lo contrario, sin acceso.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Together</strong>: investigadores afiliados a Meta publican un benchmark multi-turno de 109 tareas, extraído de 11,260 sesiones reales. Opus 4.8 lidera con <span class=\"stat\">63%</span> de pass@1 — frente a 88.6% en SWE-Bench Verified.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitLab AI Accountability Report</strong>: 78% escribe más rápido, pero 79% dice que la entrega no ha seguido el mismo ritmo. 85% señala la revisión como el nuevo cuello de botella.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol</strong>: variante de seguridad para trabajo de largo alcance, pero solo en preview limitado a socios. \"Supera a Mythos con 1/3 de los tokens\" es una cifra propia de OpenAI, no confirmada de forma independiente.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code es el primer modelo de peso abierto en el selector de Copilot (CLI 1.0.68); streaming de sesiones de agente en preview público.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>El resto en silencio</strong>: Cursor, Cline, Continue, OpenHands, Devin — ningún movimiento fechado esta semana. Los nuevos términos de servicio de IA de JetBrains entran en vigor hoy.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Bewegungen laufen diese Woche parallel: Regierungen kaufen KI jetzt in großem Stil ein, und die Weltgemeinschaft versucht gleichzeitig, Leitplanken dafür zu ziehen. Kalifornien verhandelt mit Anthropic einen 50-%-Rabatt für den gesamten Staatsapparat — das ist der bislang größte dokumentierte KI-Rollout einer US-Verwaltung. In Genf sitzen seit gestern 193 UN-Mitgliedstaaten zusammen, um Governance zu diskutieren. Und im Enterprise-Markt eskaliert ein Milliarden-Wettrüsten um „Forward-Deployed\"-Teams, die KI-Projekte von Monaten auf Tage drücken sollen. Für twiceD sind heute zwei Hebel greifbar: die verschobene EU-AI-Act-Frist und der immer noch offene Mittelstand-Dokumentenmarkt.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Kalifornien–Anthropic</strong>: 50 % Rabatt auf Claude für alle Behörden plus Städte/Kreise — größter belegter Staats-Rollout der USA.</li>\n      <li><span class=\"chip\">POLICY · Global</span> <strong>UN Global Dialogue</strong>: 193 Mitgliedstaaten in Genf; Guterres legt eine KI-Kinderschutz-Verpflichtung mit drei Planken vor.</li>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>FDE-Wettrüsten</strong>: Amazon startet 1 Mrd. $ intern — nach OpenAI (4 Mrd. $) und Anthropic (1,5 Mrd. $).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Gemini Spark</strong>: Googles 24/7-Agent läuft auf eigener Cloud weiter, wenn dein Gerät aus ist — SharePoint-/ServiceNow-Konnektoren.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Claude Sonnet 5</strong>: seit 30.06 Standardmodell für Free/Pro — Intropreis 2/10 $ pro Mio. Token bis Ende August.</li>\n      <li><span class=\"chip\">CONSUMER · BR</span> <strong>Meta „Pocket\"</strong>: KI-Mini-Games ohne Code, still in Brasilien gestartet — von Meta bis heute nicht bestätigt.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>AI-Act-Frist rutscht</strong>: Hochrisiko-Pflichten von 02.08.2026 auf Dezember 2027 verschoben — Council-Green-Light am 29.06.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Zwei Ideen</strong>: AI-Act-Readiness-Audit (neue Frist als Verkaufsfenster) und Dokumenten-Agent für den Mittelstand.</li>\n    </ul></div>",

g>: Hochrisiko-Pflichten von 02.08.2026 auf Dezember 2027 verschoben — Council-Green-Light am 29.06.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Zwei Ideen</strong>: AI-Act-Readiness-Audit (neue Frist als Verkaufsfenster) und Dokumenten-Agent für den Mittelstand.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two movements are running in parallel this week: governments are now buying AI at massive scale, while the world community simultaneously tries to draw guardrails around it. California is negotiating a 50% discount with Anthropic for the entire state apparatus — the largest documented AI rollout by a US government to date. In Geneva, 193 UN member states have been meeting since yesterday to discuss governance. And in the enterprise market, a billion-dollar arms race over \"forward-deployed\" teams is escalating, aiming to compress AI projects from months to days. For twiceD, two levers are within reach today: the postponed EU AI Act deadline and the still-open mid-market document market.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>California–Anthropic</strong>: 50% discount on Claude for all agencies plus cities/counties — the largest documented state rollout in the US.</li>\n      <li><span class=\"chip\">POLICY · Global</span> <strong>UN Global Dialogue</strong>: 193 member states in Geneva; Guterres presents an AI child-safety pledge with three planks.</li>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>FDE arms race</strong>: Amazon launches $1B internally — following OpenAI ($4B) and Anthropic ($1.5B).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Gemini Spark</strong>: Google's 24/7 agent keeps running on its own cloud when your device is off — SharePoint/ServiceNow connectors.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Claude Sonnet 5</strong>: default model for Free/Pro since June 30 — intro price $2/$10 per million tokens through end of August.</li>\n      <li><span class=\"chip\">CONSUMER · BR</span> <strong>Meta \"Pocket\"</strong>: no-code AI mini-games, quietly launched in Brazil — unconfirmed by Meta to date.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>AI Act deadline slips</strong>: high-risk obligations pushed from 08/02/2026 to December 2027 — Council green light on June 29.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Two ideas</strong>: AI Act readiness audit (the new deadline as a sales window) and a document agent for the mid-market.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois movimentos acontecem em paralelo nesta semana: governos estão comprando IA em grande escala, enquanto a comunidade mundial tenta simultaneamente traçar diretrizes para isso. A Califórnia negocia com a Anthropic um desconto de 50% para todo o aparato estatal — o maior rollout de IA já documentado por um governo dos EUA. Em Genebra, 193 Estados-membros da ONU se reúnem desde ontem para discutir governança. E no mercado corporativo, escala uma corrida bilionária por times de \"forward-deployed\", que prometem reduzir projetos de IA de meses para dias. Para a twiceD, duas alavancas estão ao alcance hoje: o prazo adiado do AI Act da UE e o mercado ainda aberto de documentos para médias empresas.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · EUA</span> <strong>Califórnia–Anthropic</strong>: desconto de 50% no Claude para todas as agências mais cidades/condados — o maior rollout estatal documentado dos EUA.</li>\n      <li><span class=\"chip\">POLICY · Global</span> <strong>UN Global Dialogue</strong>: 193 Estados-membros em Genebra; Guterres apresenta um compromisso de proteção infantil na IA com três pilares.</li>\n      <li><span class=\"chip hot\">M&amp;A · EUA</span> <strong>Corrida FDE</strong>: Amazon lança US$ 1 bi internamente — depois de OpenAI (US$ 4 bi) e Anthropic (US$ 1,5 bi).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Gemini Spark</strong>: agente 24/7 do Google segue rodando na nuvem própria mesmo com seu aparelho desligado — conectores SharePoint/ServiceNow.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Claude Sonnet 5</strong>: modelo padrão do Free/Pro desde 30/06 — preço de introdução US$ 2/US$ 10 por milhão de tokens até o fim de agosto.</li>\n      <li><span class=\"chip\">CONSUMER · BR</span> <strong>Meta \"Pocket\"</strong>: mini-games de IA sem código, lançados discretamente no Brasil — ainda não confirmado pela Meta.</li>\n      <li><span class=\"chip\">REG · UE</span> <strong>Prazo do AI Act escorrega</strong>: obrigações de alto risco adiadas de 02/08/2026 para dezembro de 2027 — sinal verde do Conselho em 29/06.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Duas ideias</strong>: auditoria de prontidão para o AI Act (novo prazo como janela de vendas) e agente de documentos para médias empresas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta semana avanzan dos movimientos en paralelo: los gobiernos ahora compran IA a gran escala, mientras la comunidad mundial intenta al mismo tiempo trazar límites para ello. California negocia con Anthropic un descuento del 50% para todo el aparato estatal — el mayor despliegue de IA documentado hasta ahora por un gobierno de Estados Unidos. En Ginebra, 193 Estados miembros de la ONU llevan reunidos desde ayer para discutir gobernanza. Y en el mercado corporativo escala una carrera armamentista de miles de millones por equipos \"forward-deployed\", que prometen reducir proyectos de IA de meses a días. Para twiceD hay hoy dos palancas al alcance: el plazo pospuesto de la AI Act de la UE y el mercado, todavía abierto, de documentos para la mediana empresa.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · EE. UU.</span> <strong>California–Anthropic</strong>: 50% de descuento en Claude para todas las agencias más ciudades/condados — el mayor despliegue estatal documentado en EE. UU.</li>\n      <li><span class=\"chip\">POLICY · Global</span> <strong>UN Global Dialogue</strong>: 193 Estados miembros en Ginebra; Guterres presenta un compromiso de protección infantil en IA con tres ejes.</li>\n      <li><span class=\"chip hot\">M&amp;A · EE. UU.</span> <strong>Carrera FDE</strong>: Amazon lanza 1,000 millones de dólares internamente — después de OpenAI (4,000 millones) y Anthropic (1,500 millones).</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Gemini Spark</strong>: el agente 24/7 de Google sigue funcionando en su propia nube aunque tu dispositivo esté apagado — conectores SharePoint/ServiceNow.</li>\n      <li><span class=\"chip good\">DEPLOY · Global</span> <strong>Claude Sonnet 5</strong>: modelo predeterminado de Free/Pro desde el 30/06 — precio de lanzamiento de $2/$10 por millón de tokens hasta fines de agosto.</li>\n      <li><span class=\"chip\">CONSUMER · BR</span> <strong>Meta \"Pocket\"</strong>: mini-juegos de IA sin código, lanzados discretamente en Brasil — sin confirmar por Meta hasta la fecha.</li>\n      <li><span class=\"chip\">REG · UE</span> <strong>El plazo de la AI Act se retrasa</strong>: las obligaciones de alto riesgo se posponen del 02/08/2026 a diciembre de 2027 — luz verde del Consejo el 29/06.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Dos ideas</strong>: auditoría de preparación para la AI Act (el nuevo plazo como ventana de venta) y agente de documentos para la mediana empresa.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Auftrags-Trichter ist heute prall gefüllt — 48 verifizierte Listings, oben Java/Spring/Angular-Contracts im Frankfurt-Remote-Cluster mit Fit-Scores bis 88. Das ist gute Nachricht auf einem sich ehrlich abkühlenden Markt: Der durchschnittliche IT-Freelance-Satz in Deutschland ist zum ersten Mal seit Jahren gesunken, und fast jeder zweite Freelancer meldet keine gesicherte Auslastung. Für Daniel heißt das: die Nachfrage nach seinem Kern-Stack steht, aber die Verhandlungsposition wird enger — Rate halten, nicht ausdehnen.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Drei Contracts mit Fit 88</strong>: iSAX, BridgingIT, RED SAP — alle Java/Spring Boot/Angular, 80–100 % remote, Frankfurt-/Berlin-verankert.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Satz sinkt erstmals seit Jahren</strong>: DE-Freelancer-Schnitt aller Branchen bei 103 €/h (von 104 €); IT-Median 95 €/h, 43 % ohne gesicherte Auslastung.</li>\n      <li><span class=\"chip\">DE</span> <strong>IT/Software am stärksten unter Druck</strong>: 23 % der Freelancer im Segment melden weniger Aufträge als im Vorjahr.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Frankfurt-Achse dominiert</strong>: der Großteil der Top-Listings ist 80–100 % remote mit bündelbaren FFM-Onsite-Tagen.</li>\n      <li><span class=\"chip good\">AI-Harness</span> <strong>Zwei explizite Agentic-Coding-Slots</strong>: Randstad (Kiro/AI-assisted dev) und ELCA Zürich (Claude Code/Copilot benannt).</li>\n      <li><span class=\"chip\">CH</span> <strong>Zwei Employee-Treffer über Schwelle</strong>: Ärztekasse (CHF 160–200k) und ELCA Agentic-AI (CHF 140–190k*).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive-Nische aktiv</strong>: EnCo (autonomes Fahren, Java/React), HENNING (Ingolstadt/Audi-Umfeld) — beide 100–135 €/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Fünf DE-Ausschreibungen, alle Partner-Klasse</strong>: ITZBund (Frist 11.08.), DGUV (06.08.) bestätigt; Stuttgart/AOK/BITMARCK ohne abgerufene Frist.</li>\n      <li><span class=\"chip\">Makro</span> <strong>US-Juni-Jobs schwach</strong> (+57k statt ~115k) — Kontext im Economy-Brief, hier nur Verweis.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Auftrags-Trichter ist heute prall gefüllt — 48 verifizierte Listings, oben Java/Spring/Angular-Contracts im Frankfurt-Remote-Cluster mit Fit-Scores bis 88. Das ist gute Nachricht auf einem sich ehrlich abkühlenden Markt: Der durchschnittliche IT-Freelance-Satz in Deutschland ist zum ersten Mal seit Jahren gesunken, und fast jeder zweite Freelancer meldet keine gesicherte Auslastung. Für Daniel heißt das: die Nachfrage nach seinem Kern-Stack steht, aber die Verhandlungsposition wird enger — Rate halten, nicht ausdehnen.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Drei Contracts mit Fit 88</strong>: iSAX, BridgingIT, RED SAP — alle Java/Spring Boot/Angular, 80–100 % remote, Frankfurt-/Berlin-verankert.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Satz sinkt erstmals seit Jahren</strong>: DE-Freelancer-Schnitt aller Branchen bei 103 €/h (von 104 €); IT-Median 95 €/h, 43 % ohne gesicherte Auslastung.</li>\n      <li><span class=\"chip\">DE</span> <strong>IT/Software am stärksten unter Druck</strong>: 23 % der Freelancer im Segment melden weniger Aufträge als im Vorjahr.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Frankfurt-Achse dominiert</strong>: der Großteil der Top-Listings ist 80–100 % remote mit bündelbaren FFM-Onsite-Tagen.</li>\n      <li><span class=\"chip good\">AI-Harness</span> <strong>Zwei explizite Agentic-Coding-Slots</strong>: Randstad (Kiro/AI-assisted dev) und ELCA Zürich (Claude Code/Copilot benannt).</li>\n      <li><span class=\"chip\">CH</span> <strong>Zwei Employee-Treffer über Schwelle</strong>: Ärztekasse (CHF 160–200k) und ELCA Agentic-AI (CHF 140–190k*).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive-Nische aktiv</strong>: EnCo (autonomes Fahren, Java/React), HENNING (Ingolstadt/Audi-Umfeld) — beide 100–135 €/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Fünf DE-Ausschreibungen, alle Partner-Klasse</strong>: ITZBund (Frist 11.08.), DGUV (06.08.) bestätigt; Stuttgart/AOK/BITMARCK ohne abgerufene Frist.</li>\n      <li><span class=\"chip\">Makro</span> <strong>US-Juni-Jobs schwach</strong> (+57k statt ~115k) — Kontext im Economy-Brief, hier nur Verweis.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The contract pipeline is packed today — 48 verified listings, topped by Java/Spring/Angular contracts in the Frankfurt remote cluster with fit scores up to 88. That's good news in a market that's honestly cooling: Germany's average IT freelance rate has dropped for the first time in years, and almost every other freelancer reports no secured workload. For Daniel, that means: demand for his core stack holds, but the negotiating position is tightening — hold the rate, don't stretch it.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Three contracts at fit 88</strong>: iSAX, BridgingIT, RED SAP — all Java/Spring Boot/Angular, 80–100% remote, anchored to Frankfurt/Berlin.</li>\n      <li><span class=\"chip\">Market</span> <strong>Rate drops for the first time in years</strong>: DE all-sector freelancer average at €103/h (down from €104); IT median €95/h, 43% without secured workload.</li>\n      <li><span class=\"chip\">DE</span> <strong>IT/software under the most pressure</strong>: 23% of freelancers in the segment report fewer contracts than last year.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Frankfurt axis dominates</strong>: most of today's top listings are 80–100% remote with bundleable FFM onsite days.</li>\n      <li><span class=\"chip good\">AI harness</span> <strong>Two explicit agentic-coding slots</strong>: Randstad (Kiro/AI-assisted dev) and ELCA Zurich (Claude Code/Copilot named).</li>\n      <li><span class=\"chip\">CH</span> <strong>Two employee hits above threshold</strong>: Ärztekasse (CHF 160–200k) and ELCA Agentic AI (CHF 140–190k*).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive niche active</strong>: EnCo (autonomous driving, Java/React), HENNING (Ingolstadt/Audi environment) — both €100–135/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Five German tenders, all partner-class</strong>: ITZBund (deadline 08/11), DGUV (08/06) confirmed; Stuttgart/AOK/BITMARCK with no deadline retrieved.</li>\n      <li><span class=\"chip\">Macro</span> <strong>US June jobs weak</strong> (+57k vs. ~115k expected) — context in the Economy brief, just a reference here.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O funil de contratos está hoje bem cheio — 48 listagens verificadas, com contratos de Java/Spring/Angular no topo, no cluster remoto de Frankfurt, com fit scores de até 88. É uma boa notícia num mercado que está esfriando de verdade: a taxa média de freelancer de TI na Alemanha caiu pela primeira vez em anos, e quase um em cada dois freelancers relata não ter carga de trabalho garantida. Para Daniel, isso significa: a demanda pelo seu stack principal se mantém firme, mas a posição de negociação está mais apertada — manter a taxa, não esticá-la.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Três contratos com fit 88</strong>: iSAX, BridgingIT, RED SAP — todos Java/Spring Boot/Angular, 80–100% remoto, ancorados em Frankfurt/Berlim.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Taxa cai pela primeira vez em anos</strong>: média geral de freelancers na Alemanha em €103/h (vindo de €104); mediana de TI €95/h, 43% sem carga de trabalho garantida.</li>\n      <li><span class=\"chip\">DE</span> <strong>TI/software é o segmento mais pressionado</strong>: 23% dos freelancers do segmento relatam menos contratos que no ano anterior.</li>\n      <li><span class=\"chip\">Remoto</span> <strong>Eixo Frankfurt domina</strong>: a maioria das principais listagens de hoje é 80–100% remota, com dias presenciais agrupáveis em FFM.</li>\n      <li><span class=\"chip good\">AI-Harness</span> <strong>Duas vagas explícitas de codificação agêntica</strong>: Randstad (Kiro/desenvolvimento assistido por IA) e ELCA Zurique (Claude Code/Copilot citados nominalmente).</li>\n      <li><span class=\"chip\">CH</span> <strong>Duas vagas CLT acima do patamar</strong>: Ärztekasse (CHF 160–200 mil) e ELCA Agentic AI (CHF 140–190 mil*).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Nicho automotivo ativo</strong>: EnCo (direção autônoma, Java/React), HENNING (região de Ingolstadt/Audi) — ambos €100–135/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Cinco licitações públicas alemãs, todas classe parceria</strong>: ITZBund (prazo 11/08), DGUV (06/08) confirmados; Stuttgart/AOK/BITMARCK sem prazo recuperado.</li>\n      <li><span class=\"chip\">Macro</span> <strong>Payroll de junho nos EUA fraco</strong> (+57 mil em vez de ~115 mil) — contexto no brief de Economia, aqui só a referência.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El embudo de contratos está hoy repleto — 48 listados verificados, encabezados por contratos de Java/Spring/Angular en el clúster remoto de Frankfurt, con puntajes de encaje de hasta 88. Es una buena noticia en un mercado que se está enfriando de verdad: la tarifa promedio de freelance de TI en Alemania bajó por primera vez en años, y casi uno de cada dos freelancers reporta no tener carga de trabajo asegurada. Para Daniel, esto significa: la demanda por su stack principal se mantiene firme, pero la posición de negociación se aprieta — mantener la tarifa, no estirarla.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Tres contratos con encaje 88</strong>: iSAX, BridgingIT, RED SAP — todos Java/Spring Boot/Angular, 80–100% remoto, anclados a Frankfurt/Berlín.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>La tarifa baja por primera vez en años</strong>: promedio general de freelancers en Alemania en 103 €/h (bajando de 104 €); mediana de TI 95 €/h, 43% sin carga de trabajo asegurada.</li>\n      <li><span class=\"chip\">DE</span> <strong>TI/software es el segmento más presionado</strong>: 23% de los freelancers del segmento reportan menos contratos que el año anterior.</li>\n      <li><span class=\"chip\">Remoto</span> <strong>El eje Frankfurt domina</strong>: la mayoría de los listados destacados de hoy son 80–100% remotos, con días presenciales agrupables en FFM.</li>\n      <li><span class=\"chip good\">AI-Harness</span> <strong>Dos vacantes explícitas de codificación agéntica</strong>: Randstad (Kiro/desarrollo asistido por IA) y ELCA Zúrich (Claude Code/Copilot mencionados por nombre).</li>\n      <li><span class=\"chip\">CH</span> <strong>Dos vacantes de planta por encima del umbral</strong>: Ärztekasse (CHF 160–200 mil) y ELCA Agentic AI (CHF 140–190 mil*).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Nicho automotriz activo</strong>: EnCo (conducción autónoma, Java/React), HENNING (zona de Ingolstadt/Audi) — ambos 100–135 €/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Cinco licitaciones alemanas, todas clase asociación</strong>: ITZBund (fecha límite 11/08), DGUV (06/08) confirmadas; Stuttgart/AOK/BITMARCK sin fecha límite recuperada.</li>\n      <li><span class=\"chip\">Macro</span> <strong>Nómina de junio en EE. UU. débil</strong> (+57 mil en vez de ~115 mil) — contexto en el brief de Economía, aquí solo la referencia.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Für einen deutschen Fan in Brasilien ist diese WM ein doppelter Schlag: beide „meine\" Mannschaften sind draußen. Deutschland flog schon im Achtelfinale-Vorläufer, dem Sechzehntelfinale (Round of 32), gegen Paraguay im Elfmeterschießen raus — Havertz, Woltemade und Tah verschossen. Und am Sonntag zerlegte Erling Haaland Brasiliens Seleção fast im Alleingang (Doppelpack, 1:2). Heute füllen sich die letzten beiden Viertelfinal-Plätze; ab Donnerstag wird die K.-o.-Runde zur Zielgeraden. Bundesliga und Brasileirão pausieren — Transferfenster statt Spieltag.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland raus</strong>: Sechzehntelfinale gg. Paraguay 1:1, 3:4 i. E. (29.06). Havertz/Woltemade/Tah verschießen.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasilien raus</strong>: Achtelfinale gg. Norwegen 1:2 (05.07), Haaland-Doppelpack (79./90.). Ancelottis Seleção im Last 16 gestoppt.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute komplett</strong>: die letzten zwei Achtelfinals — Argentinien–Ägypten (18:00 MESZ / 13:00 BRT) und Schweiz–Kolumbien (19:00 MESZ / 14:00 BRT).</li>\n      <li><span class=\"chip good\">WM</span> <strong>Viertelfinale steht fast</strong>: Marokko, Frankreich, Norwegen, England, Spanien, Belgien sind durch — 6 von 8.</li>\n      <li><span class=\"chip\">WM</span> <strong>Erstes VF</strong>: Frankreich–Marokko, Do 09.07, 22:00 MESZ / 17:00 BRT (Boston).</li>\n      <li><span class=\"chip\">WM</span> <strong>Norwegen bleibt Thema</strong>: die Brasilien-Bezwinger treffen Sa 11.07 auf England (23:00 MESZ / 18:00 BRT).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg</strong>: Merlin Röhls Everton-Leihe fest gemacht — ~23 Mio. € (Berichte variieren), gültig ab 01.07.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SCF-Fenster</strong>: Backhaus, Gotō, Yamamota kommen; Adamu, Höfler (Karriereende) und Weißhaupt gehen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Für einen deutschen Fan in Brasilien ist diese WM ein doppelter Schlag: beide „meine\" Mannschaften sind draußen. Deutschland flog schon im Achtelfinale-Vorläufer, dem Sechzehntelfinale (Round of 32), gegen Paraguay im Elfmeterschießen raus — Havertz, Woltemade und Tah verschossen. Und am Sonntag zerlegte Erling Haaland Brasiliens Seleção fast im Alleingang (Doppelpack, 1:2). Heute füllen sich die letzten beiden Viertelfinal-Plätze; ab Donnerstag wird die K.-o.-Runde zur Zielgeraden. Bundesliga und Brasileirão pausieren — Transferfenster statt Spieltag.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland raus</strong>: Sechzehntelfinale gg. Paraguay 1:1, 3:4 i. E. (29.06). Havertz/Woltemade/Tah verschießen.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasilien raus</strong>: Achtelfinale gg. Norwegen 1:2 (05.07), Haaland-Doppelpack (79./90.). Ancelottis Seleção im Last 16 gestoppt.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute komplett</strong>: die letzten zwei Achtelfinals — Argentinien–Ägypten (18:00 MESZ / 13:00 BRT) und Schweiz–Kolumbien (19:00 MESZ / 14:00 BRT).</li>\n      <li><span class=\"chip good\">WM</span> <strong>Viertelfinale steht fast</strong>: Marokko, Frankreich, Norwegen, England, Spanien, Belgien sind durch — 6 von 8.</li>\n      <li><span class=\"chip\">WM</span> <strong>Erstes VF</strong>: Frankreich–Marokko, Do 09.07, 22:00 MESZ / 17:00 BRT (Boston).</li>\n      <li><span class=\"chip\">WM</span> <strong>Norwegen bleibt Thema</strong>: die Brasilien-Bezwinger treffen Sa 11.07 auf England (23:00 MESZ / 18:00 BRT).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg</strong>: Merlin Röhls Everton-Leihe fest gemacht — ~23 Mio. € (Berichte variieren), gültig ab 01.07.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SCF-Fenster</strong>: Backhaus, Gotō, Yamamota kommen; Adamu, Höfler (Karriereende) und Weißhaupt gehen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">For a German fan in Brazil, this World Cup is a double blow: both \"my\" teams are out. Germany already went out in the round before the actual round of 16 — the round of 32 — against Paraguay on penalties, with Havertz, Woltemade, and Tah all missing. And on Sunday, Erling Haaland tore apart Brazil's Seleção almost single-handedly (a brace, 1-2). Today the last two quarterfinal spots are filled; from Thursday the knockout rounds head into the home stretch. The Bundesliga and Brasileirão are on their summer break — transfer window instead of match day.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany out</strong>: round of 32 vs. Paraguay 1-1, 3-4 on penalties (06/29). Havertz/Woltemade/Tah miss.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brazil out</strong>: round of 16 vs. Norway 1-2 (07/05), Haaland brace (79'/90'). Ancelotti's Seleção stopped in the last 16.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Round of 16 wraps up today</strong>: the last two matches — Argentina–Egypt (18:00 CEST / 13:00 BRT) and Switzerland–Colombia (19:00 CEST / 14:00 BRT).</li>\n      <li><span class=\"chip good\">World Cup</span> <strong>Quarterfinal lineup nearly set</strong>: Morocco, France, Norway, England, Spain, Belgium are through — 6 of 8.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>First quarterfinal</strong>: France–Morocco, Thu 07/09, 22:00 CEST / 17:00 BRT (Boston).</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Norway stays in the spotlight</strong>: Brazil's conquerors face England on Sat 07/11 (23:00 CEST / 18:00 BRT).</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg</strong>: Merlin Röhl's Everton loan made permanent — roughly €23 million (reports vary), effective 07/01.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>SCF window</strong>: Backhaus, Gotō, Yamamota arrive; Adamu, Höfler (retiring), and Weißhaupt leave.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Para um torcedor alemão no Brasil, esta Copa é um golpe duplo: as duas seleções \"minhas\" estão fora. A Alemanha já caiu na fase anterior às oitavas de final propriamente ditas, os dezesseis avos de final (round of 32), contra o Paraguai nos pênaltis — Havertz, Woltemade e Tah desperdiçaram cobranças. E no domingo, Erling Haaland desmontou a Seleção brasileira praticamente sozinho (dois gols, 1 a 2). Hoje se definem as duas últimas vagas nas quartas de final; a partir de quinta-feira o mata-mata entra na reta final. Bundesliga e Brasileirão estão em pausa — janela de transferências no lugar da rodada.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha fora</strong>: dezesseis avos contra o Paraguai, 1 a 1, 3 a 4 nos pênaltis (29/06). Havertz/Woltemade/Tah desperdiçam.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasil fora</strong>: oitavas contra a Noruega, 1 a 2 (05/07), dois gols de Haaland (79'/90'). Seleção de Ancelotti parada nas oitavas.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Oitavas se completam hoje</strong>: os dois últimos jogos — Argentina–Egito (18h00 CEST / 13h00 BRT) e Suíça–Colômbia (19h00 CEST / 14h00 BRT).</li>\n      <li><span class=\"chip good\">Copa</span> <strong>Quartas quase definidas</strong>: Marrocos, França, Noruega, Inglaterra, Espanha e Bélgica já estão classificados — 6 de 8.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Primeira quartas</strong>: França–Marrocos, qui 09/07, 22h00 CEST / 17h00 BRT (Boston).</li>\n      <li><span class=\"chip\">Copa</span> <strong>Noruega segue em pauta</strong>: os algozes do Brasil enfrentam a Inglaterra no sáb 11/07 (23h00 CEST / 18h00 BRT).</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Freiburg</strong>: empréstimo de Merlin Röhl ao Everton vira definitivo — cerca de € 23 milhões (relatos variam), válido a partir de 01/07.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Janela do SCF</strong>: Backhaus, Gotō e Yamamota chegam; Adamu, Höfler (encerra carreira) e Weißhaupt saem.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Para un aficionado alemán en Brasil, este Mundial es un golpe doble: los dos equipos \"míos\" están eliminados. Alemania ya cayó en la ronda anterior a los octavos de final propiamente dichos, los dieciseisavos de final (round of 32), contra Paraguay en penales — Havertz, Woltemade y Tah fallaron. Y el domingo, Erling Haaland desarmó casi solo a la Selección brasileña (doblete, 1-2). Hoy se completan los últimos dos boletos a cuartos de final; a partir del jueves la ronda eliminatoria entra en la recta final. La Bundesliga y el Brasileirão están de vacaciones — mercado de fichajes en lugar de jornada.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania eliminada</strong>: dieciseisavos vs. Paraguay 1-1, 3-4 en penales (29/06). Havertz/Woltemade/Tah fallan.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Brasil eliminado</strong>: octavos vs. Noruega 1-2 (05/07), doblete de Haaland (79'/90'). La Selección de Ancelotti se detiene en los octavos.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Octavos se completan hoy</strong>: los últimos dos partidos — Argentina–Egipto (18:00 CEST / 13:00 BRT) y Suiza–Colombia (19:00 CEST / 14:00 BRT).</li>\n      <li><span class=\"chip good\">Mundial</span> <strong>Cuartos de final casi definidos</strong>: Marruecos, Francia, Noruega, Inglaterra, España y Bélgica ya están clasificados — 6 de 8.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Primeros cuartos</strong>: Francia–Marruecos, jue 09/07, 22:00 CEST / 17:00 BRT (Boston).</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Noruega sigue en el foco</strong>: los verdugos de Brasil enfrentan a Inglaterra el sáb 11/07 (23:00 CEST / 18:00 BRT).</li>\n      <li><span class=\"chip\">Fichaje</span> <strong>Friburgo</strong>: el préstamo de Merlin Röhl al Everton se hace definitivo — cerca de 23 millones de euros (los reportes varían), vigente desde el 01/07.</li>\n      <li><span class=\"chip\">Fichaje</span> <strong>Mercado del SCF</strong>: llegan Backhaus, Gotō y Yamamota; se van Adamu, Höfler (se retira) y Weißhaupt.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Nach Leclercs Silverstone-Sieg vom Sonntag richtet sich der Blick jetzt nach vorn — und das kommende Wochenende ist voll: Am selben Sonntag, dem <strong>12. Juli</strong>, fährt die MotoGP ihr letztes Rennen vor der Sommerpause am <strong>Sachsenring</strong>, und die Langstrecken-WM gastiert in <strong>Interlagos</strong> — Daniels Heimspiel. Die WEC-Runde in São Paulo ist noch nicht gefahren; ein früher, falscher „Cadillac-Sieg\" aus dem Netz ist ein Fehlalarm, die offizielle Seite zeigt einen Countdown, keine Ergebnisse. In der F1 bleibt Antonelli WM-Leader, aber mit nur noch <strong>25 Punkten</strong> Vorsprung; die Woche darauf folgt Spa. In der MotoGP hat Jorge Martin nach Assen erstmals seit COTA wieder die Führung — Bezzecchi stürzte aus, seit drei Wochenenden ohne Punkte.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Heimspiel Interlagos</strong>: 6h von São Paulo, So 12.07., Start <strong>11:30 BRT / 16:30 MESZ</strong> — Runde 4. <em>Noch nicht gefahren</em> (offizieller Countdown läuft).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring am selben Tag</strong>: Deutschland-GP 10.–12.07., letzte Runde vor der Sommerpause. Rennen So 12.07., <strong>14:00 CEST / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">MotoGP-WM</span> <strong>Martin übernimmt die Führung</strong>: 193 Pkt, nur 7 vor Bezzecchi (186), der in Assen ausstürzte. Márquez ist Fünfter, 40 zurück — offen wie selten.</li>\n      <li><span class=\"chip\">F1</span> <strong>Leclerc siegte in Silverstone</strong> (So 05.07., Runde 9) — sein 1. Saisonsieg, vor Russell und Hamilton. WM-Leader Antonelli fiel von der Pole auf P16 (Defekt).</li>\n      <li><span class=\"chip hot\">F1-WM</span> <strong>Antonelli führt knapper</strong>: 179 Pkt, nur noch 25 vor Russell (154). Leclerc auf P4 (108). Nächste Runde: Spa, 17.–19.07.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Spa-Rennstart korrigiert</strong>: So 19.07. um <strong>15:00 CEST / 10:00 BRT</strong> (= 14:00 BST) — nicht der früher kursierende 13:00-Slot.</li>\n      <li><span class=\"chip\">Rand</span> <strong>IndyCar &amp; Formel E</strong>: O'Ward gewann in Mid-Ohio (Palou führt weiter); in der Formel E führt Mitch Evans, Top 4 innerhalb 27 Pkt. Beide nur überschlägig (Suchmaschinen-Synthese).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Nach Leclercs Silverstone-Sieg vom Sonntag richtet sich der Blick jetzt nach vorn — und das kommende Wochenende ist voll: Am selben Sonntag, dem <strong>12. Juli</strong>, fährt die MotoGP ihr letztes Rennen vor der Sommerpause am <strong>Sachsenring</strong>, und die Langstrecken-WM gastiert in <strong>Interlagos</strong> — Daniels Heimspiel. Die WEC-Runde in São Paulo ist noch nicht gefahren; ein früher, falscher „Cadillac-Sieg\" aus dem Netz ist ein Fehlalarm, die offizielle Seite zeigt einen Countdown, keine Ergebnisse. In der F1 bleibt Antonelli WM-Leader, aber mit nur noch <strong>25 Punkten</strong> Vorsprung; die Woche darauf folgt Spa. In der MotoGP hat Jorge Martin nach Assen erstmals seit COTA wieder die Führung — Bezzecchi stürzte aus, seit drei Wochenenden ohne Punkte.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Heimspiel Interlagos</strong>: 6h von São Paulo, So 12.07., Start <strong>11:30 BRT / 16:30 MESZ</strong> — Runde 4. <em>Noch nicht gefahren</em> (offizieller Countdown läuft).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring am selben Tag</strong>: Deutschland-GP 10.–12.07., letzte Runde vor der Sommerpause. Rennen So 12.07., <strong>14:00 CEST / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">MotoGP-WM</span> <strong>Martin übernimmt die Führung</strong>: 193 Pkt, nur 7 vor Bezzecchi (186), der in Assen ausstürzte. Márquez ist Fünfter, 40 zurück — offen wie selten.</li>\n      <li><span class=\"chip\">F1</span> <strong>Leclerc siegte in Silverstone</strong> (So 05.07., Runde 9) — sein 1. Saisonsieg, vor Russell und Hamilton. WM-Leader Antonelli fiel von der Pole auf P16 (Defekt).</li>\n      <li><span class=\"chip hot\">F1-WM</span> <strong>Antonelli führt knapper</strong>: 179 Pkt, nur noch 25 vor Russell (154). Leclerc auf P4 (108). Nächste Runde: Spa, 17.–19.07.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Spa-Rennstart korrigiert</strong>: So 19.07. um <strong>15:00 CEST / 10:00 BRT</strong> (= 14:00 BST) — nicht der früher kursierende 13:00-Slot.</li>\n      <li><span class=\"chip\">Rand</span> <strong>IndyCar &amp; Formel E</strong>: O'Ward gewann in Mid-Ohio (Palou führt weiter); in der Formel E führt Mitch Evans, Top 4 innerhalb 27 Pkt. Beide nur überschlägig (Suchmaschinen-Synthese).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">After Leclerc's Silverstone win on Sunday, attention now turns forward — and next weekend is packed: on that same Sunday, <strong>July 12</strong>, MotoGP runs its last race before the summer break at the <strong>Sachsenring</strong>, and the endurance world championship visits <strong>Interlagos</strong> — Daniel's home race. The WEC round in São Paulo hasn't been run yet; an early, false \"Cadillac win\" from the web is a false alarm, the official site shows a countdown, not results. In F1, Antonelli remains championship leader, but with only <strong>25 points</strong> to spare; the following week brings Spa. In MotoGP, Jorge Martin retook the lead after Assen for the first time since COTA — Bezzecchi crashed out, now three race weekends without points.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Home race at Interlagos</strong>: 6 Hours of São Paulo, Sun 07/12, start <strong>11:30 BRT / 16:30 CEST</strong> — Round 4. <em>Not yet run</em> (official countdown is ticking).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring on the same day</strong>: German GP 07/10–12, last round before the summer break. Race Sun 07/12, <strong>14:00 CEST / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">MotoGP world championship</span> <strong>Martin takes over the lead</strong>: 193 pts, only 7 ahead of Bezzecchi (186), who crashed out in Assen. Márquez is fifth, 40 behind — as open as it's been in a while.</li>\n      <li><span class=\"chip\">F1</span> <strong>Leclerc won at Silverstone</strong> (Sun 07/05, round 9) — his 1st win of the season, ahead of Russell and Hamilton. Championship leader Antonelli dropped from pole to P16 (mechanical failure).</li>\n      <li><span class=\"chip hot\">F1 world championship</span> <strong>Antonelli's lead narrows</strong>: 179 pts, now only 25 ahead of Russell (154). Leclerc up to P4 (108). Next round: Spa, 07/17–19.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Spa race start corrected</strong>: Sun 07/19 at <strong>15:00 CEST / 10:00 BRT</strong> (= 14:00 BST) — not the 13:00 slot circulating earlier.</li>\n      <li><span class=\"chip\">Sidelines</span> <strong>IndyCar &amp; Formula E</strong>: O'Ward won at Mid-Ohio (Palou still leads); in Formula E, Mitch Evans leads, top 4 within 27 pts. Both figures rough only (search-engine synthesis).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Depois da vitória de Leclerc em Silverstone no domingo, o foco agora se volta para frente — e o próximo fim de semana está cheio: no mesmo domingo, dia <strong>12 de julho</strong>, a MotoGP disputa sua última corrida antes da pausa de verão no <strong>Sachsenring</strong>, e o Mundial de Endurance visita <strong>Interlagos</strong> — o jogo em casa de Daniel. A etapa da WEC em São Paulo ainda não foi disputada; um alarme falso de \"vitória da Cadillac\" circulou na internet, mas é um erro — o site oficial mostra uma contagem regressiva, sem resultados. Na F1, Antonelli segue como líder do campeonato, mas com apenas <strong>25 pontos</strong> de vantagem; na semana seguinte vem Spa. Na MotoGP, Jorge Martin retomou a liderança após Assen pela primeira vez desde COTA — Bezzecchi caiu, três fins de semana seguidos sem pontuar.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Jogo em casa em Interlagos</strong>: 6 Horas de São Paulo, dom 12/07, largada <strong>11h30 BRT / 16h30 CEST</strong> — Etapa 4. <em>Ainda não disputada</em> (contagem regressiva oficial em andamento).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring no mesmo dia</strong>: GP da Alemanha 10–12/07, última etapa antes da pausa de verão. Corrida dom 12/07, <strong>14h00 CEST / 09h00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Mundial de MotoGP</span> <strong>Martin assume a liderança</strong>: 193 pts, apenas 7 à frente de Bezzecchi (186), que caiu em Assen. Márquez é o quinto, 40 pontos atrás — tão aberto quanto raramente se viu.</li>\n      <li><span class=\"chip\">F1</span> <strong>Leclerc venceu em Silverstone</strong> (dom 05/07, etapa 9) — sua 1ª vitória na temporada, à frente de Russell e Hamilton. O líder do campeonato Antonelli caiu da pole para o P16 (problema mecânico).</li>\n      <li><span class=\"chip hot\">Mundial de F1</span> <strong>Vantagem de Antonelli encolhe</strong>: 179 pts, agora apenas 25 à frente de Russell (154). Leclerc sobe ao P4 (108). Próxima etapa: Spa, 17–19/07.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Largada de Spa corrigida</strong>: dom 19/07 às <strong>15h00 CEST / 10h00 BRT</strong> (= 14h00 BST) — não o horário de 13h00 que circulava antes.</li>\n      <li><span class=\"chip\">À margem</span> <strong>IndyCar e Fórmula E</strong>: O'Ward venceu em Mid-Ohio (Palou segue na liderança); na Fórmula E, Mitch Evans lidera, top 4 dentro de 27 pts. Ambos apenas estimados (síntese de buscadores).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Después de la victoria de Leclerc en Silverstone el domingo, la mirada ahora se dirige hacia adelante — y el próximo fin de semana está cargado: ese mismo domingo, <strong>12 de julio</strong>, MotoGP corre su última carrera antes del receso de verano en el <strong>Sachsenring</strong>, y el Mundial de Resistencia visita <strong>Interlagos</strong> — la carrera de casa de Daniel. La fecha de la WEC en São Paulo aún no se ha corrido; una falsa alarma de \"victoria de Cadillac\" circuló en la red, pero es un error — el sitio oficial muestra una cuenta regresiva, no resultados. En la F1, Antonelli sigue como líder del campeonato, pero con solo <strong>25 puntos</strong> de ventaja; la semana siguiente llega Spa. En MotoGP, Jorge Martin retomó el liderato después de Assen por primera vez desde COTA — Bezzecchi se cayó, tres fines de semana seguidos sin puntuar.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Carrera de casa en Interlagos</strong>: 6 Horas de São Paulo, dom 12/07, salida <strong>11:30 BRT / 16:30 CEST</strong> — Fecha 4. <em>Aún no se corre</em> (la cuenta regresiva oficial sigue en marcha).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring el mismo día</strong>: GP de Alemania 10–12/07, última fecha antes del receso de verano. Carrera dom 12/07, <strong>14:00 CEST / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Mundial de MotoGP</span> <strong>Martin toma el liderato</strong>: 193 pts, solo 7 por delante de Bezzecchi (186), quien se cayó en Assen. Márquez es quinto, 40 puntos atrás — tan abierto como pocas veces.</li>\n      <li><span class=\"chip\">F1</span> <strong>Leclerc ganó en Silverstone</strong> (dom 05/07, fecha 9) — su 1ª victoria de la temporada, por delante de Russell y Hamilton. El líder del campeonato Antonelli cayó de la pole al P16 (falla mecánica).</li>\n      <li><span class=\"chip hot\">Mundial de F1</span> <strong>La ventaja de Antonelli se reduce</strong>: 179 pts, ahora solo 25 por delante de Russell (154). Leclerc sube al P4 (108). Próxima fecha: Spa, 17–19/07.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Se corrige la salida de Spa</strong>: dom 19/07 a las <strong>15:00 CEST / 10:00 BRT</strong> (= 14:00 BST) — no el horario de las 13:00 que circulaba antes.</li>\n      <li><span class=\"chip\">Al margen</span> <strong>IndyCar y Fórmula E</strong>: O'Ward ganó en Mid-Ohio (Palou sigue al frente); en Fórmula E, Mitch Evans lidera, top 4 dentro de 27 pts. Ambos datos solo estimados (síntesis de buscadores).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Winterferien laufen, das Wetter meint es gut: eine ganze Woche trocken und klar, dafür kühle Nächte — perfekt für draußen tagsüber, warm anziehen morgens und abends. Zu Hause im Kern-Ring ist es diese Woche ruhig, aber der Großraum São Paulo platzt vor Ferienprogramm: Kirschblütenfest, Kino für R$ 3 und Gratis-Workshops in den Museen. Ein Wochenend- oder Brückentag-Trip lohnt sich gerade richtig.</p>\n    <ul>\n      <li><span class=\"chip good\">Wetter</span> <strong>Sieben Tage trocken</strong>: 0,0 mm Regen die ganze Woche, Höchstwerte 16–24 °C. Kaltluft-Spitze am Mo/Di (13./14.) mit Tiefstwerten um 8 °C.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Férias de julho</strong> laufen: Landesschulen frei bis 24./26. Juli (Quellen uneins), Rückkehr in den Unterricht am 3. August.</li>\n      <li><span class=\"chip hot\">Trip</span> <strong>Festa das Cerejeiras</strong> (Kirschblütenfest) im Parque do Carmo, SP — 24.–26. Juli (+ 31.7.–2.8.), gratis. 46. Auflage (2026); Datum kurz offiziell prüfen.</li>\n      <li><span class=\"chip\">Event</span> <strong>Toy Story 5</strong> im CineSesc, São Paulo — 9.–15. Juli, Tickets ab R$ 3. Ein perfekter Ferien-Kinotag.</li>\n      <li><span class=\"chip\">Event</span> <strong>Gratis-Ferienwerkstätten</strong> in MASP und Pinacoteca (São Paulo) — kostenlose Kunst-Angebote für Kinder ab 8 Jahren.</li>\n      <li><span class=\"chip\">Trip</span> <strong>31 kostenlose Ausflüge</strong> für die Ferien listet São Paulo Para Crianças — Ideen-Fundgrube für einen Wochenend-Trip.</li>\n      <li><span class=\"chip\">Region</span> <strong>Kern-Ring ruhig</strong>: keine neuen Familien-Events in Ribeirão Claro/Jacarezinho diese Woche — Londrina-Programm nicht bestätigt.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Kein akuter Alert</strong>: keine neuen Dengue-/Grippe-Zahlen für den Kreis in dieser Recherche. Kalte, trockene Winterluft trotzdem: Baby warm halten.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Winter break is underway and the weather is cooperating: a whole dry, clear week, but cold nights — perfect for outdoor time by day, bundle up morning and evening. At home in the core radius it's a quiet week, but greater São Paulo is bursting with break-time programming: a cherry blossom festival, movies for R$ 3, and free workshops at the museums. A weekend or long-weekend trip pays off right about now.</p>\n    <ul>\n      <li><span class=\"chip good\">Weather</span> <strong>Seven dry days</strong>: 0.0 mm of rain all week, highs of 16–24°C. Cold snap Mon/Tue (the 13th/14th) with lows around 8°C.</li>\n      <li><span class=\"chip\">School</span> <strong>July break</strong> is on: state schools out until July 24/26 (sources disagree), classes resume August 3.</li>\n      <li><span class=\"chip hot\">Trip</span> <strong>Festa das Cerejeiras</strong> (cherry blossom festival) in Parque do Carmo, SP — July 24–26 (+ Jul 31–Aug 2), free. 46th edition (2026); double-check the date officially.</li>\n      <li><span class=\"chip\">Event</span> <strong>Toy Story 5</strong> at CineSesc, São Paulo — July 9–15, tickets from R$ 3. A perfect break-week movie day.</li>\n      <li><span class=\"chip\">Event</span> <strong>Free holiday workshops</strong> at MASP and Pinacoteca (São Paulo) — free art programs for kids age 8+.</li>\n      <li><span class=\"chip\">Trip</span> <strong>31 free outings</strong> for the break, listed by São Paulo Para Crianças — a grab-bag of ideas for a weekend trip.</li>\n      <li><span class=\"chip\">Region</span> <strong>Core radius quiet</strong>: no new family events in Ribeirão Claro/Jacarezinho this week — Londrina's program unconfirmed.</li>\n      <li><span class=\"chip good\">Health</span> <strong>No acute alert</strong>: no new dengue/flu figures for the county in this research round. Cold, dry winter air regardless: keep the baby warm.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">As férias de inverno estão a todo vapor, e o tempo colabora: uma semana inteira seca e limpa, mas com noites frias — perfeito para atividades ao ar livre de dia, e casaco de manhã e à noite. Em casa, no raio próximo, a semana está tranquila, mas a Grande São Paulo está fervilhando de programação de férias: festa das cerejeiras, cinema por R$ 3 e oficinas gratuitas nos museus. Um passeio de fim de semana ou feriadão vale muito a pena agora.</p>\n    <ul>\n      <li><span class=\"chip good\">Tempo</span> <strong>Sete dias secos</strong>: 0,0 mm de chuva a semana inteira, máximas de 16–24 °C. Pico de frio na segunda/terça (dias 13/14) com mínimas em torno de 8 °C.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de julho</strong> em andamento: escolas estaduais de recesso até 24/26 de julho (fontes divergem), volta às aulas em 3 de agosto.</li>\n      <li><span class=\"chip hot\">Passeio</span> <strong>Festa das Cerejeiras</strong> no Parque do Carmo, SP — 24 a 26 de julho (+ 31/7–2/8), gratuita. 46ª edição (2026); confira a data no site oficial.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Toy Story 5</strong> no CineSesc, São Paulo — 9 a 15 de julho, ingressos a partir de R$ 3. Um dia perfeito de cinema nas férias.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Oficinas gratuitas de férias</strong> no MASP e na Pinacoteca (São Paulo) — atividades de arte gratuitas para crianças a partir de 8 anos.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>31 passeios gratuitos</strong> para as férias, listados pelo São Paulo Para Crianças — um garimpo de ideias para um passeio de fim de semana.</li>\n      <li><span class=\"chip\">Região</span> <strong>Raio próximo tranquilo</strong>: nenhum evento novo para famílias em Ribeirão Claro/Jacarezinho nesta semana — programação de Londrina ainda não confirmada.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Sem alerta agudo</strong>: nenhum número novo de dengue/gripe para o município nesta apuração. Ainda assim, ar seco e frio de inverno: mantenha o bebê agasalhado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Las vacaciones de invierno están en marcha y el clima se porta bien: toda una semana seca y despejada, aunque con noches frías — perfecto para actividades al aire libre de día, y hay que abrigarse bien en la mañana y en la noche. En casa, en el radio cercano, la semana está tranquila, pero la Gran São Paulo está a reventar de actividades vacacionales: festival de los cerezos, cine por R$ 3 y talleres gratuitos en los museos. Un viaje de fin de semana o puente vacacional vale mucho la pena en este momento.</p>\n    <ul>\n      <li><span class=\"chip good\">Clima</span> <strong>Siete días secos</strong>: 0.0 mm de lluvia en toda la semana, máximas de 16–24 °C. Pico de frío el lunes/martes (días 13/14) con mínimas de alrededor de 8 °C.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de julio</strong> en curso: escuelas estatales de descanso hasta el 24/26 de julio (las fuentes no coinciden), regreso a clases el 3 de agosto.</li>\n      <li><span class=\"chip hot\">Paseo</span> <strong>Festa das Cerejeiras</strong> (festival de los cerezos) en el Parque do Carmo, SP — 24 al 26 de julio (+ 31/7–2/8), gratuito. 46ª edición (2026); confirmen la fecha oficialmente.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Toy Story 5</strong> en el CineSesc, São Paulo — del 9 al 15 de julio, boletos desde R$ 3. Un día perfecto de cine vacacional.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Talleres vacacionales gratuitos</strong> en el MASP y la Pinacoteca (São Paulo) — actividades de arte gratuitas para niños a partir de 8 años.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>31 paseos gratuitos</strong> para las vacaciones, según la lista de São Paulo Para Crianças — una mina de ideas para un viaje de fin de semana.</li>\n      <li><span class=\"chip\">Región</span> <strong>Radio cercano tranquilo</strong>: ningún evento familiar nuevo en Ribeirão Claro/Jacarezinho esta semana — la programación de Londrina sigue sin confirmarse.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Sin alerta aguda</strong>: no hay cifras nuevas de dengue o gripe para el municipio en esta investigación. Aun así, el aire de invierno frío y seco: mantengan al bebé abrigado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Dienstag, der 7. Juli — Wochenthema <em>Software &amp; Technologie</em>, heute Teil VII: <em>Frontend, UI &amp; Qualitätssicherung (Testing/QA)</em>. Das Vokabular, mit dem man eine Oberfläche <em>klickt</em> und <em>scrollt</em>, ein Eingabefeld <em>ausfüllt</em>, einen Testfall <em>überprüft</em>, einen Bug <em>korrigiert</em> und schaut, ob der Test grün ist oder <em>fehlschlägt</em>. 33 neue Einträge, 12 Verben mit voller Konjugation — inklusive der berüchtigten Spanisch-Traps <em>yo corrijo</em> (g→j) und <em>yo introduzco</em> (c→zc) — plus 3 Auffrischungen aus den früheren Software-Dienstagen. Grammatik-Fokus: warum das deutsche <em>überprüfen</em> kein <em>ge-</em> im Partizip bekommt, aber <em>eingeben</em> schon, und der schöne Dreiklang aus PT <em>corrijo</em>, PT <em>insiro</em> und ES <em>introduzco</em>, wo Portugiesisch und Spanisch dieselbe Idee mit verschiedenen Buchstaben lösen.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Kontrolle ≠ EN control</strong> — EN <em>control</em> heißt „steuern/regeln\" (die <em>Steuerung</em>, das UI-<em>Control</em>-Element), DE <em>Kontrolle</em> heißt „Prüfung/Inspektion\". Ein Formular-<em>Control</em> ist ein Bedienelement, keine Kontrolle. PT <em>o controle</em> (BR) deckt beides ab, ES <em>el control</em> ebenso — nur DE trennt streng.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT realizar ≠ DE realisieren</strong> — PT <em>realizar</em> heißt „durchführen/ausführen\" (<em>realizar um teste</em> = einen Test durchführen), nicht „begreifen\". DE <em>realisieren</em> im Alltag = „bemerken\". Für „umsetzen\" in Software: DE <em>umsetzen/implementieren</em>, PT <em>implementar</em>, ES <em>implementar</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES corregir → yo corrijo</strong> — doppelter Trap: Orthografie g→j vor <em>o/a</em> (<em>corrijo</em>, nie <em>*corrigo</em>; Subjuntivo <em>corrija</em>) plus Stammwechsel e→i (<em>corriges, corrige</em>). PT <em>corrigir</em> hat nur den g→j-Trap: <em>eu corrijo</em>, aber <em>corriges</em> bleibt <em>corrige</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES introducir → yo introduzco</strong> — c→zc vor <em>o/a</em> (<em>introduzco</em>, Subjuntivo <em>introduzca</em>) UND unregelmäßiger Pretérito auf <em>-duje</em>: <em>yo introduje, él introdujo</em> (nie <em>*introdució</em>). Einer der irregulärsten -ir-Verben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT inserir → eu insiro</strong> — Stammwechsel e→i in der 1. Person: <em>eu insiro</em> (nie <em>*insero</em>), aber <em>você insere</em>. Subjuntivo <em>insira</em>. Dasselbe Muster wie ES <em>introducir</em>, nur mit anderem Buchstaben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE überprüfen → ich überprüfe</strong> — untrennbar: <em>über-</em> bleibt fest am Stamm. Partizip <em>überprüft</em> — <strong>ohne</strong> <em>ge-</em>. Vergleich zum trennbaren <em>eingeben → eingegeben</em>, das das <em>ge-</em> in die Mitte nimmt.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE fehlschlagen → ist fehlgeschlagen</strong> — trennbar <em>und</em> stark: <em>der Test schlägt fehl, schlug fehl</em>, Perfekt mit <em>sein</em> (Zustandswechsel): <em>der Build ist fehlgeschlagen</em>. Konjunktiv II <em>schlüge fehl</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Button (m), das Eingabefeld (n), die Oberfläche (f)</strong> — drei Genera nebeneinander. PT <em>o botão (m), o campo (m), a interface (f)</em>; ES <em>el botón (m), el campo (m), la interfaz (f)</em>. „die interface\" gibt es nicht — im DE heißt es <em>die Schnittstelle</em> (f) oder eben <em>das Interface</em> (n).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>printar / tirar um print</strong> — „einen Screenshot machen\" heißt im brasilianischen Tech-Alltag <em>printar</em> oder <em>tirar um print</em> (aus EN <em>print screen</em>); Standard-PT wäre <em>fazer uma captura de tela</em>. In ES-MX: <em>tomar una captura (de pantalla)</em>. Anglizismus, aber in BR-WhatsApp/Slack allgegenwärtig.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o mouse / clicar vs. o rato</strong> — die Maus heißt in Brasilien <em>o mouse</em> (Anglizismus, universell), im europäischen PT <em>o rato</em>. „Klicken\" ist <em>clicar</em>: <em>clicar no botão</em>. ES-MX <em>el ratón / hacer clic</em>.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>Der Test ist grün / rot.</strong> = PT <em>O teste passou / falhou.</em> = ES <em>La prueba pasó / falló.</em> — im QA-Alltag heißt „grün\" bestanden und „rot\" durchgefallen; die neutrale Form ist <em>der Test besteht / schlägt fehl</em>.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>auf den Button klicken und das Formular absenden</strong> = PT <em>clicar no botão e enviar o formulário</em> = ES <em>hacer clic en el botón y enviar el formulario</em>. „Das Layout ist kaputt auf dem Handy\" = <em>O layout está quebrado no celular</em> = <em>El diseño está roto en el celular</em>.</li>\n    </ul></div>",
