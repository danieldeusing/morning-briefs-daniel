      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Fable 5 steht oben auf jedem Leaderboard — und ist seit acht Tagen aus dem Verkehr gezogen. Das ist die Story der Woche: nicht ein neuer Benchmark-Rekord, sondern ein Modell, das die US-Regierung per Export-Kontrolle stillgelegt hat, während gleichzeitig zwei große Arbeitgeber das AI-Coding-Budget zusammenstreichen. Die Frage verschiebt sich von „welches Modell ist am stärksten\" zu „welches kann ich überhaupt einsetzen, und was kostet es mich\".</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 weiter weltweit gesperrt</strong>: Launch 9.6., US-Export-Direktive 12.6., kein Rückkehr-Termin. Erstattungs-Frist für Frühbucher läuft heute aus.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 führt SWE-bench Verified mit 95,0 %</strong> — aber Anbieter-gemeldet, nicht unabhängig geprüft, und das Modell ist gesperrt. Skepsis angebracht.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Microsoft zieht interne Claude-Code-Lizenzen bis 30.6. ein</strong>: tausende Engineers werden auf GitHub Copilot CLI geschoben. Kosten + Toolchain-Vereinheitlichung.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot: nutzungsbasiertes „Flex\"-Billing seit 1.6.</strong> + neuer $100-Max-Plan (20k Credits). Virale Screenshots von $29→$750-Rechnungen vor dem Start.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8 Automations</strong> (18.6.): Dauer-Agenten via <code>/automate</code>, Slack-Trigger. Separat: Bugbot seit 10.6. ~90 s statt ~5 min. Probieren wert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf ist jetzt Devin Desktop</strong> (2.6.): Cascade endet 1.7., Devin Local (Rust, ~30 % token-sparsamer), ACP-Standard für Fremd-Agenten.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Uber deckelt AI-Spend bei $1.500/Monat</strong> — voller 2026-Etat in 4 Monaten verbrannt. 70 % des committeten Codes kommt von AI.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro noch NICHT released</strong> (nur Vertex-Preview). Auf dem Board steht Gemini 3.1 Pro mit 80,6 % SWE-bench.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Fable 5 steht oben auf jedem Leaderboard — und ist seit acht Tagen aus dem Verkehr gezogen. Das ist die Story der Woche: nicht ein neuer Benchmark-Rekord, sondern ein Modell, das die US-Regierung per Export-Kontrolle stillgelegt hat, während gleichzeitig zwei große Arbeitgeber das AI-Coding-Budget zusammenstreichen. Die Frage verschiebt sich von „welches Modell ist am stärksten\" zu „welches kann ich überhaupt einsetzen, und was kostet es mich\".</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 weiter weltweit gesperrt</strong>: Launch 9.6., US-Export-Direktive 12.6., kein Rückkehr-Termin. Erstattungs-Frist für Frühbucher läuft heute aus.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 führt SWE-bench Verified mit 95,0 %</strong> — aber Anbieter-gemeldet, nicht unabhängig geprüft, und das Modell ist gesperrt. Skepsis angebracht.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Microsoft zieht interne Claude-Code-Lizenzen bis 30.6. ein</strong>: tausende Engineers werden auf GitHub Copilot CLI geschoben. Kosten + Toolchain-Vereinheitlichung.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot: nutzungsbasiertes „Flex\"-Billing seit 1.6.</strong> + neuer $100-Max-Plan (20k Credits). Virale Screenshots von $29→$750-Rechnungen vor dem Start.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8 Automations</strong> (18.6.): Dauer-Agenten via <code>/automate</code>, Slack-Trigger. Separat: Bugbot seit 10.6. ~90 s statt ~5 min. Probieren wert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf ist jetzt Devin Desktop</strong> (2.6.): Cascade endet 1.7., Devin Local (Rust, ~30 % token-sparsamer), ACP-Standard für Fremd-Agenten.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Uber deckelt AI-Spend bei $1.500/Monat</strong> — voller 2026-Etat in 4 Monaten verbrannt. 70 % des committeten Codes kommt von AI.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro noch NICHT released</strong> (nur Vertex-Preview). Auf dem Board steht Gemini 3.1 Pro mit 80,6 % SWE-bench.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Fable 5 tops every leaderboard — yet has been off the market for eight days. That's this week's story: not a new benchmark record, but a model that the US government has frozen via export controls, while two major employers simultaneously cut their AI-coding budgets. The question shifts from \"which model is strongest\" to \"which can I actually use, and what does it cost me\".</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 blocked worldwide</strong>: Launched 6/9, US export directive 6/12, no return date. Refund window for early buyers closes today.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 leads SWE-bench Verified at 95.0%</strong> — but vendor-reported, not independently verified, and the model is blocked. Skepticism warranted.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Microsoft pulling internal Claude Code licenses by 6/30</strong>: thousands of engineers moved to GitHub Copilot CLI. Cost + toolchain unification.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot: usage-based \"Flex\" billing since 6/1</strong> + new $100 Max plan (20k credits). Viral screenshots of $29→$750 invoices before launch.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8 Automations</strong> (6/18): long-running agents via <code>/automate</code>, Slack triggers. Separate: Bugbot since 6/10 ~90 s vs. ~5 min. Worth trying.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf is now Devin Desktop</strong> (6/2): Cascade ends 7/1, Devin Local (Rust, ~30% token-leaner), ACP standard for third-party agents.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Uber caps AI spending at $1,500/month</strong> — burned through full 2026 budget in 4 months. 70% of committed code from AI.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro not yet released</strong> (Vertex preview only). Leaderboard shows Gemini 3.1 Pro at 80.6% SWE-bench.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Fable 5 lidera todos os rankings — e está offline há oito dias. Essa é a história desta semana: não um novo recorde de benchmark, mas um modelo que o governo dos EUA congelou via controle de exportação enquanto dois grandes empregadores cortam orçamentos de IA-programação. A pergunta muda de \"qual modelo é o mais forte\" para \"qual realmente posso usar, e quanto isso vai custar\".</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 bloqueados mundialmente</strong>: Lançamento 9/6, diretiva de exportação dos EUA 12/6, sem data de retorno. Prazo de reembolso para compradores antigos encerra hoje.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 lidera SWE-bench Verified com 95,0%</strong> — mas reportado pelo fornecedor, não verificado independentemente, e o modelo está bloqueado. Ceticismo justificado.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Microsoft retirando licenças internas do Claude Code até 30/6</strong>: milhares de engenheiros deslocados para GitHub Copilot CLI. Custo + consolidação de ferramentas.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot: faturamento \"Flex\" baseado em uso desde 1/6</strong> + novo plano Max de $100 (20 mil créditos). Screenshots virais de faturas de $29→$750 antes do lançamento.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8 Automations</strong> (18/6): agentes contínuos via <code>/automate</code>, acionadores Slack; Bugbot agora ~90 s vs ~5 min. Vale a pena experimentar.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf agora é Devin Desktop</strong> (2/6): Cascade encerra 1/7, Devin Local (Rust, ~30% mais eficiente em tokens), padrão ACP para agentes terceirizados.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Uber limita gastos de IA em $1.500/mês</strong> — queimou orçamento completo de 2026 em 4 meses. 70% do código confirmado vem de IA.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro ainda não lançado</strong> (apenas Vertex Preview). Ranking mostra Gemini 3.1 Pro com 80,6% SWE-bench.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Fable 5 encabeza todos los rankings — y lleva ocho días desconectado. Esa es la historia de esta semana: no un nuevo récord de benchmark, sino un modelo que el gobierno de EE.UU. congeló mediante control de exportación mientras dos grandes empleadores recortan presupuestos de IA-programación. La pregunta cambia de \"¿cuál modelo es el más fuerte?\" a \"¿cuál puedo usar realmente, y cuánto me costará?\".</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 bloqueados mundialmente</strong>: Lanzamiento 9/6, directiva de exportación de EE.UU. 12/6, sin fecha de regreso. Período de reembolso para compradores tempranos vence hoy.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 lidera SWE-bench Verified con 95,0%</strong> — pero reportado por el proveedor, no verificado independientemente, y el modelo está bloqueado. Escepticismo justificado.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Microsoft retira licencias internas de Claude Code antes del 30/6</strong>: miles de ingenieros deslocalizados a GitHub Copilot CLI. Costo + consolidación de herramientas.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot: facturación \"Flex\" basada en uso desde 1/6</strong> + nuevo plan Max de $100 (20 mil créditos). Screenshots virales de facturas de $29→$750 antes del lanzamiento.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8 Automations</strong> (18/6): agentes contínuos vía <code>/automate</code>, disparadores Slack; Bugbot ahora ~90 s vs ~5 min. Vale la pena probar.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf ahora es Devin Desktop</strong> (2/6): Cascade finaliza 1/7, Devin Local (Rust, ~30% más eficiente en tokens), estándar ACP para agentes de terceros.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Uber limita gasto de IA en $1.500/mes</strong> — quemó presupuesto completo de 2026 en 4 meses. 70% del código comprometido viene de IA.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro aún no lanzado</strong> (solo Vertex Preview). Ranking muestra Gemini 3.1 Pro con 80,6% SWE-bench.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern noch „noch kein Gesetz\", heute durch das Parlament: Der <em>Digital Omnibus</em> verschiebt die EU-AI-Act-Hochrisiko-Pflichten von August 2026 auf <strong>Dezember 2027</strong>. Die operative Deadline, die wir die ganze Woche im Nacken hatten, rückt damit um über ein Jahr nach hinten — aber sie verschwindet nicht, und ein neues Verbot (Nudifier-Apps) kommt früher. Parallel zeigt die frische Bitkom-Zahl, dass der deutsche Mittelstand auch ohne Druck rennt: KI-Nutzung in einem Jahr von 17 auf 41 % verdoppelt — mit Schattenseite.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · EU</span> <strong>Digital Omnibus durch</strong>: EP stimmt am 16.06 mit 423/57/174 zu; Hochrisiko-Frist Annex III → 02.12.2027, eingebettet → 02.08.2028.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Neues Verbot</strong>: Nudifier-Apps + KI-CSAM ab 02.12.2026 verboten (neuer Art. 5) — kommt <em>vor</em> der verschobenen Hochrisiko-Frist.</li>\n      <li><span class=\"chip good\">STUDY · DE</span> <strong>Bitkom 2026</strong>: 41 % der Firmen nutzen KI aktiv (Vorjahr 17 %), 77 % sehen bessere Wettbewerbsposition — aber 19 % haben schon Stellen gestrichen.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>OpenAI Partner Network</strong>: 150 Mio. $, Ziel 300.000 geschulte Berater bis Jahresende — die Einführungs-Maschine bekommt einen Vertriebskanal.</li>\n      <li><span class=\"chip good\">STUDY · GLOBAL</span> <strong>Publicis Sapient</strong>: 73 % nutzen KI, nur 10 % „im Kern\" — Deutschland mit nur 10 % unternehmensweiter Integration Schlusslicht.</li>\n      <li><span class=\"chip\">DEPLOY · GLOBAL</span> <strong>Zensar AgentMesh</strong> (19.06): 80+ vorgebaute Agenten, 6–8-Wochen-Pilot-Versprechen — die „Agenten von der Stange\"-Welle.</li>\n      <li><span class=\"chip\">B2B-SaaS · GLOBAL</span> <strong>Agentik in Zahlen</strong>: 72 % der Großunternehmen haben Agenten in Produktion, aber 60 % Governance-Lücke; Gartner sieht &gt;40 % Projekt-Abbruch-Risiko bis 2027.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern noch „noch kein Gesetz\", heute durch das Parlament: Der <em>Digital Omnibus</em> verschiebt die EU-AI-Act-Hochrisiko-Pflichten von August 2026 auf <strong>Dezember 2027</strong>. Die operative Deadline, die wir die ganze Woche im Nacken hatten, rückt damit um über ein Jahr nach hinten — aber sie verschwindet nicht, und ein neues Verbot (Nudifier-Apps) kommt früher. Parallel zeigt die frische Bitkom-Zahl, dass der deutsche Mittelstand auch ohne Druck rennt: KI-Nutzung in einem Jahr von 17 auf 41 % verdoppelt — mit Schattenseite.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · EU</span> <strong>Digital Omnibus durch</strong>: EP stimmt am 16.06 mit 423/57/174 zu; Hochrisiko-Frist Annex III → 02.12.2027, eingebettet → 02.08.2028.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Neues Verbot</strong>: Nudifier-Apps + KI-CSAM ab 02.12.2026 verboten (neuer Art. 5) — kommt <em>vor</em> der verschobenen Hochrisiko-Frist.</li>\n      <li><span class=\"chip good\">STUDY · DE</span> <strong>Bitkom 2026</strong>: 41 % der Firmen nutzen KI aktiv (Vorjahr 17 %), 77 % sehen bessere Wettbewerbsposition — aber 19 % haben schon Stellen gestrichen.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>OpenAI Partner Network</strong>: 150 Mio. $, Ziel 300.000 geschulte Berater bis Jahresende — die Einführungs-Maschine bekommt einen Vertriebskanal.</li>\n      <li><span class=\"chip good\">STUDY · GLOBAL</span> <strong>Publicis Sapient</strong>: 73 % nutzen KI, nur 10 % „im Kern\" — Deutschland mit nur 10 % unternehmensweiter Integration Schlusslicht.</li>\n      <li><span class=\"chip\">DEPLOY · GLOBAL</span> <strong>Zensar AgentMesh</strong> (19.06): 80+ vorgebaute Agenten, 6–8-Wochen-Pilot-Versprechen — die „Agenten von der Stange\"-Welle.</li>\n      <li><span class=\"chip\">B2B-SaaS · GLOBAL</span> <strong>Agentik in Zahlen</strong>: 72 % der Großunternehmen haben Agenten in Produktion, aber 60 % Governance-Lücke; Gartner sieht &gt;40 % Projekt-Abbruch-Risiko bis 2027.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Not yet law yesterday, through parliament today: the <em>Digital Omnibus</em> pushes back the EU AI Act's high-risk obligations from August 2026 to <strong>December 2027</strong>. The operational deadline we've been watching all week now moves back more than a year — but it doesn't disappear, and a new prohibition (deepfake apps) arrives sooner. In parallel, fresh Bitkom numbers show German mid-market is running even without pressure: AI adoption jumped in one year from 17 to 41 percent — with a downside.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · EU</span> <strong>Digital Omnibus passes</strong>: EP votes 423/57/174 on June 16; high-risk deadline Annex III → Dec 02, 2027, embedded → Aug 02, 2028.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>New prohibition</strong>: deepfake apps + AI-CSAM banned from Dec 02, 2026 (new Art. 5) — arrives <em>before</em> the postponed high-risk deadline.</li>\n      <li><span class=\"chip good\">STUDY · DE</span> <strong>Bitkom 2026</strong>: 41 % of firms use AI actively (prior year 17 %), 77 % see improved competitive position — but 19 % have already cut headcount.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>OpenAI Partner Network</strong>: $150M, goal 300,000 trained advisors by year-end — the deployment machine gets a sales channel.</li>\n      <li><span class=\"chip good\">STUDY · GLOBAL</span> <strong>Publicis Sapient</strong>: 73 % use AI, only 10 % \"at the core\" — Germany ranks last with only 10 % enterprise-wide integration.</li>\n      <li><span class=\"chip\">DEPLOY · GLOBAL</span> <strong>Zensar AgentMesh</strong> (June 19): 80+ pre-built agents, 6–8-week pilot promise — the \"off-the-shelf agents\" wave.</li>\n      <li><span class=\"chip\">B2B-SaaS · GLOBAL</span> <strong>Agentic AI by the numbers</strong>: 72 % of large enterprises have agents in production, but 60 % governance gap; Gartner sees &gt;40 % project-cancellation risk through 2027.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem ainda \"sem lei\", hoje aprovado pelo Parlamento: o <em>Digital Omnibus</em> adia as obrigações de alto risco da Lei de IA da UE de agosto de 2026 para <strong>dezembro de 2027</strong>. O prazo operacional que acompanhamos a semana toda recua mais de um ano — mas não desaparece, e uma nova proibição (apps de nudificação) chega mais cedo. Ao mesmo tempo, números frescos do Bitkom mostram que o mercado médio alemão não está esperando pressão: uso de IA saltou de 17% para 41% em um ano — com um lado sombrio.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLÍTICA · UE</span> <strong>Digital Omnibus aprovado</strong>: PE vota 423/57/174 em 16/06; prazo de alto risco Anexo III → 02/12/2027, incorporado → 02/08/2028.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Nova proibição</strong>: apps de nudificação + IA-CSAM proibidos a partir de 02/12/2026 (novo art. 5) — chega <em>antes</em> do prazo de alto risco adiado.</li>\n      <li><span class=\"chip good\">ESTUDO · DE</span> <strong>Bitkom 2026</strong>: 41% das empresas usam IA ativamente (ano anterior 17%), 77% veem melhor posição competitiva — mas 19% já cortaram empregos.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Rede de Parceiros da OpenAI</strong>: R$ 780 mi, objetivo 300 mil consultores treinados até o final do ano — a máquina de implementação ganha um canal de vendas.</li>\n      <li><span class=\"chip good\">ESTUDO · GLOBAL</span> <strong>Publicis Sapient</strong>: 73% usam IA, apenas 10% \"no núcleo\" — Alemanha com apenas 10% de integração em toda a empresa fica para trás.</li>\n      <li><span class=\"chip\">DEPLOY · GLOBAL</span> <strong>Zensar AgentMesh</strong> (19/06): 80+ agentes pré-construídos, promessa de piloto 6–8 semanas — a onda de \"agentes prontos\".</li>\n      <li><span class=\"chip\">B2B-SaaS · GLOBAL</span> <strong>IA Agêntica em números</strong>: 72% das grandes empresas têm agentes em produção, mas lacuna de governança de 60%; Gartner vê >40% risco de fracasso de projeto até 2027.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer todavía \"sin ley\", hoy aprobado por el Parlamento: el <em>Digital Omnibus</em> pospone las obligaciones de alto riesgo de la Ley de IA de la UE de agosto de 2026 a <strong>diciembre de 2027</strong>. El plazo operacional que hemos seguido toda la semana se retrasa más de un año — pero no desaparece, y una nueva prohibición (aplicaciones de desnudización) llega más pronto. En paralelo, cifras frescas de Bitkom muestran que el mercado medio alemán no espera presión: el uso de IA saltó de 17% a 41% en un año — con un lado oscuro.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLÍTICA · UE</span> <strong>Digital Omnibus aprobado</strong>: PE vota 423/57/174 el 16/06; plazo de alto riesgo Anexo III → 02/12/2027, incorporado → 02/08/2028.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Nueva prohibición</strong>: aplicaciones de desnudización + IA-CSAM prohibidas desde 02/12/2026 (nuevo art. 5) — llega <em>antes</em> del plazo de alto riesgo pospuesto.</li>\n      <li><span class=\"chip good\">ESTUDIO · DE</span> <strong>Bitkom 2026</strong>: 41% de las empresas usan IA activamente (año anterior 17%), 77% ven mejor posición competitiva — pero 19% ya han cortado empleos.</li>\n      <li><span class=\"chip hot\">DEPLOY · US</span> <strong>Red de Socios de OpenAI</strong>: USD 150M, objetivo 300 mil asesores capacitados a fin de año — la máquina de implementación obtiene un canal de ventas.</li>\n      <li><span class=\"chip good\">ESTUDIO · GLOBAL</span> <strong>Publicis Sapient</strong>: 73% usan IA, solo 10% \"en el núcleo\" — Alemania con apenas 10% de integración en toda la empresa se queda atrás.</li>\n      <li><span class=\"chip\">DEPLOY · GLOBAL</span> <strong>Zensar AgentMesh</strong> (19/06): 80+ agentes prearmados, promesa piloto 6–8 semanas — la onda de \"agentes listos para usar\".</li>\n      <li><span class=\"chip\">B2B-SaaS · GLOBAL</span> <strong>IA Agéntica en números</strong>: 72% de las grandes empresas tienen agentes en producción, pero brecha de gobernanza de 60%; Gartner ve >40% riesgo de fallo de proyecto hasta 2027.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das Board ist heute voll (96 Listings, Top-Score 88), aber der Markt darunter ist kühl: Der <strong>Freelancer-Kompass 2026</strong> zeigt einen DACH-Freelance-Markt, der vom Anbieter- zum Käufermarkt gekippt ist — Sätze stagnieren, Einkommen fällt zweistellig, vier von zehn Selbstständigen sitzen ohne gesicherte Auslastung da. Für Daniel heißt das: die dichte Java/Spring-Wand im Board ist real, aber Rate-Verhandlung ist 2026 Verteidigung, nicht Offensive. Und zwei EU-Ausschreibungen laufen in 9 bzw. 10 Tagen ab.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>Käufermarkt</strong>: DACH-Durchschnittssatz auf <strong>103 €/h</strong> (−1 % YoY), Monatseinkommen −21 % auf <strong>6.653 €</strong>, <strong>43 %</strong> ohne gesicherte Projekt-Pipeline (Freelancer-Kompass 2026, n=5.412).</li>\n      <li><span class=\"chip\">twiceD</span> <strong>76 Freelance-Listings</strong> im Board, Top-Score 83 (Computer Futures E-Mobility Java-Backend, 100 % remote, ASAP–Dez 2026).</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Nischen-Premium aktiv</strong>: Smart-Home/IoT (Java, MQTT, Z-Wave) und Automotive (Java, CAN-Bus) beide bei <strong>110–140 €/h*</strong> — Daniels höchstbezahltes Segment.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Aleph Alpha</strong> „Senior Java Industrial-IoT Platform\" führt das Board mit <strong>Fit 88</strong> (Heidelberg, remote-DE-freundlich, 110–150 k€*).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Zwei Fristen ticken</strong>: Autobahn GmbH C-ITS/V2X (~13 Mio €, Frist <strong>30.06.</strong>) und SH-Navi Mobilitätsplattform (max 320 k€, Frist <strong>29.06.</strong>) — beide ⚠️ Partner.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Intriguing-Cluster</strong>: JetBrains (10× AI-Native-Rollen), Camunda AI-FDE, Anthropic, Mistral, Helsing — Fit 76–82.</li>\n      <li><span class=\"chip good\">Signal</span> <strong>H2-2026-Rebound</strong>: 78 % der Tech-Leader wollen Festanstellungen aufstocken, 66 % mehr Contract-Hires — aber nur 7 % fühlen sich für ihre Prioritäts-Projekte gerüstet.</li>\n      <li><span class=\"chip\">Skill-Signal</span> Java/Spring Boot dominiert (~60+ Listings), Kubernetes/Docker ~40, Angular/TS ~30, Kafka ~15, AI/LLM-Integration ~10.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {

trong>H2-2026-Rebound</strong>: 78 % der Tech-Leader wollen Festanstellungen aufstocken, 66 % mehr Contract-Hires — aber nur 7 % fühlen sich für ihre Prioritäts-Projekte gerüstet.</li>\n      <li><span class=\"chip\">Skill-Signal</span> Java/Spring Boot dominiert (~60+ Listings), Kubernetes/Docker ~40, Angular/TS ~30, Kafka ~15, AI/LLM-Integration ~10.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The board is full today (96 listings, top score 88), but the market underneath is cool: the <strong>Freelancer-Kompass 2026</strong> shows the DACH freelance market has flipped from a seller's to a buyer's market — rates stagnating, income down double digits, four in ten self-employed with no secured pipeline. For Daniel that means: the dense Java/Spring wall on the board is real, but rate negotiation in 2026 is defense, not offense. And two EU tenders expire in 9 and 10 days respectively.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>Buyer's market</strong>: DACH average rate at <strong>103 €/h</strong> (−1 % YoY), monthly income −21 % to <strong>6,653 €</strong>, <strong>43 %</strong> with no secured project pipeline (Freelancer-Kompass 2026, n=5,412).</li>\n      <li><span class=\"chip\">twiceD</span> <strong>76 freelance listings</strong> on the board, top score 83 (Computer Futures E-Mobility Java backend, 100 % remote, ASAP–Dec 2026).</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Niche premium active</strong>: Smart-Home/IoT (Java, MQTT, Z-Wave) and Automotive (Java, CAN-Bus) both at <strong>110–140 €/h*</strong> — Daniel's highest-paid segment.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Aleph Alpha</strong> \"Senior Java Industrial-IoT Platform\" leads the board with <strong>Fit 88</strong> (Heidelberg, remote-DE friendly, 110–150 k€*).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Two deadlines ticking</strong>: Autobahn GmbH C-ITS/V2X (~€13 M, deadline <strong>30.06.</strong>) and SH-Navi mobility platform (max 320 k€, deadline <strong>29.06.</strong>) — both ⚠️ Partner.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Intriguing cluster</strong>: JetBrains (10× AI-native roles), Camunda AI-FDE, Anthropic, Mistral, Helsing — Fit 76–82.</li>\n      <li><span class=\"chip good\">Signal</span> <strong>H2-2026 rebound</strong>: 78 % of tech leaders want to add permanent hires, 66 % more contract hires — but only 7 % feel equipped for their priority projects.</li>\n      <li><span class=\"chip\">Skill signal</span> Java/Spring Boot dominates (~60+ listings), Kubernetes/Docker ~40, Angular/TS ~30, Kafka ~15, AI/LLM integration ~10.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O board está cheio hoje (96 vagas, pontuação máxima 88), mas o mercado por baixo está frio: o <strong>Freelancer-Kompass 2026</strong> mostra o mercado freelance DACH virando de mercado do vendedor para mercado do comprador — taxas estagnadas, renda caindo dois dígitos, quatro em cada dez autônomos sem carteira de projetos assegurada. Para Daniel, isso significa: o denso muro de Java/Spring no board é real, mas negociação de taxa em 2026 é defesa, não ataque. E dois editais europeus vencem em 9 e 10 dias, respectivamente.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Mercado comprador</strong>: taxa média DACH em <strong>103 €/h</strong> (−1 % YoY), renda mensal −21 % para <strong>6.653 €</strong>, <strong>43 %</strong> sem carteira de projetos assegurada (Freelancer-Kompass 2026, n=5.412).</li>\n      <li><span class=\"chip\">twiceD</span> <strong>76 vagas freelance</strong> no board, pontuação máxima 83 (Computer Futures E-Mobility Java backend, 100 % remoto, ASAP–dez 2026).</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Prêmio de nicho ativo</strong>: Smart-Home/IoT (Java, MQTT, Z-Wave) e Automotivo (Java, CAN-Bus) ambos em <strong>110–140 €/h*</strong> — o segmento mais bem pago de Daniel.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Aleph Alpha</strong> \"Senior Java Industrial-IoT Platform\" lidera o board com <strong>Fit 88</strong> (Heidelberg, remoto-DE amigável, 110–150 k€*).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Dois prazos correndo</strong>: Autobahn GmbH C-ITS/V2X (~€13 M, prazo <strong>30/06</strong>) e SH-Navi plataforma de mobilidade (máx 320 k€, prazo <strong>29/06</strong>) — ambos ⚠️ Parceiro.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Cluster Intriguing</strong>: JetBrains (10× funções AI-native), Camunda AI-FDE, Anthropic, Mistral, Helsing — Fit 76–82.</li>\n      <li><span class=\"chip good\">Sinal</span> <strong>Recuperação H2-2026</strong>: 78 % dos líderes de tecnologia querem aumentar contratações CLT, 66 % mais contratos — mas apenas 7 % se sentem preparados para seus projetos prioritários.</li>\n      <li><span class=\"chip\">Sinal de skill</span> Java/Spring Boot domina (~60+ vagas), Kubernetes/Docker ~40, Angular/TS ~30, Kafka ~15, integração AI/LLM ~10.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El board está lleno hoy (96 listados, puntuación máxima 88), pero el mercado de fondo está frío: el <strong>Freelancer-Kompass 2026</strong> muestra que el mercado freelance DACH ha pasado de ser un mercado de vendedores a uno de compradores — tarifas estancadas, ingresos cayendo dos dígitos, cuatro de cada diez independientes sin cartera de proyectos asegurada. Para Daniel eso significa: el denso muro de Java/Spring en el board es real, pero negociar tarifas en 2026 es defensa, no ataque. Y dos licitaciones europeas vencen en 9 y 10 días respectivamente.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Mercado de compradores</strong>: tarifa promedio DACH en <strong>103 €/h</strong> (−1 % YoY), ingreso mensual −21 % a <strong>6.653 €</strong>, <strong>43 %</strong> sin cartera de proyectos asegurada (Freelancer-Kompass 2026, n=5.412).</li>\n      <li><span class=\"chip\">twiceD</span> <strong>76 listados freelance</strong> en el board, puntuación máxima 83 (Computer Futures E-Mobility Java backend, 100 % remoto, ASAP–dic 2026).</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Premio de nicho activo</strong>: Smart-Home/IoT (Java, MQTT, Z-Wave) y Automotriz (Java, CAN-Bus) ambos en <strong>110–140 €/h*</strong> — el segmento mejor pagado de Daniel.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Aleph Alpha</strong> \"Senior Java Industrial-IoT Platform\" encabeza el board con <strong>Fit 88</strong> (Heidelberg, remoto-DE amigable, 110–150 k€*).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Dos plazos corriendo</strong>: Autobahn GmbH C-ITS/V2X (~€13 M, plazo <strong>30/06</strong>) y SH-Navi plataforma de movilidad (máx 320 k€, plazo <strong>29/06</strong>) — ambos ⚠️ Socio.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Clúster Intriguing</strong>: JetBrains (10× roles AI-native), Camunda AI-FDE, Anthropic, Mistral, Helsing — Fit 76–82.</li>\n      <li><span class=\"chip good\">Señal</span> <strong>Rebote H2-2026</strong>: 78 % de los líderes tech quieren aumentar contrataciones de planta, 66 % más contratos — pero solo 7 % se sienten preparados para sus proyectos prioritarios.</li>\n      <li><span class=\"chip\">Señal de skill</span> Java/Spring Boot domina (~60+ listados), Kubernetes/Docker ~40, Angular/TS ~30, Kafka ~15, integración AI/LLM ~10.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist Samstag, der 20. Juni — Tag zwei des zweiten WM-Spieltags, und für Daniel der erste echte Pflichttermin: Um <strong>22:00 MESZ / 17:00 BRT</strong> spielt Deutschland in Toronto gegen die Elfenbeinküste. Ein Sieg, und das Achtelfinale ist so gut wie sicher. Die Bundesliga pausiert wegen des Turniers, Freiburg hat also frei — diese Woche dreht sich alles um die WM.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland – Elfenbeinküste heute 22:00 MESZ / 17:00 BRT</strong> (BMO Field, Toronto): beide nach 1. Spieltag mit 3 Punkten, Sieger steht praktisch im Achtelfinale. Buchmacher sehen die DFB-Elf klar vorn.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>7:1 gegen Curaçao</strong> zum Auftakt — damit zog Deutschland an Brasilien als WM-Rekordtorschütze aller Zeiten vorbei (239 Tore). Havertz traf doppelt.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 3:0 gegen Haiti</strong> (gestern): Matheus Cunha mit Doppelpack, Vinícius Júnior trifft auch. Seleção jetzt bei 4 Punkten.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Neymar weiter verletzt</strong> (Wade): verpasste beide Gruppenspiele, Einsatz im letzten Spiel gegen Schottland (24.06.) fraglich. Ancelotti schont ihn fürs Achtelfinale.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute auch</strong>: Niederlande – Schweden (19:00 MESZ / 14:00 BRT) als Schlüsselduell der Gruppe F, dazu Ecuador – Curaçao spät.</li>\n      <li><span class=\"chip\">WM</span> <strong>Überraschungen</strong>: Spanien kam gegen Kap Verde nicht über 0:0 hinaus — Gruppe H komplett offen, alle vier Teams bei einem Punkt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute ist Samstag, der 20. Juni — Tag zwei des zweiten WM-Spieltags, und für Daniel der erste echte Pflichttermin: Um <strong>22:00 MESZ / 17:00 BRT</strong> spielt Deutschland in Toronto gegen die Elfenbeinküste. Ein Sieg, und das Achtelfinale ist so gut wie sicher. Die Bundesliga pausiert wegen des Turniers, Freiburg hat also frei — diese Woche dreht sich alles um die WM.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland – Elfenbeinküste heute 22:00 MESZ / 17:00 BRT</strong> (BMO Field, Toronto): beide nach 1. Spieltag mit 3 Punkten, Sieger steht praktisch im Achtelfinale. Buchmacher sehen die DFB-Elf klar vorn.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>7:1 gegen Curaçao</strong> zum Auftakt — damit zog Deutschland an Brasilien als WM-Rekordtorschütze aller Zeiten vorbei (239 Tore). Havertz traf doppelt.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 3:0 gegen Haiti</strong> (gestern): Matheus Cunha mit Doppelpack, Vinícius Júnior trifft auch. Seleção jetzt bei 4 Punkten.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Neymar weiter verletzt</strong> (Wade): verpasste beide Gruppenspiele, Einsatz im letzten Spiel gegen Schottland (24.06.) fraglich. Ancelotti schont ihn fürs Achtelfinale.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute auch</strong>: Niederlande – Schweden (19:00 MESZ / 14:00 BRT) als Schlüsselduell der Gruppe F, dazu Ecuador – Curaçao spät.</li>\n      <li><span class=\"chip\">WM</span> <strong>Überraschungen</strong>: Spanien kam gegen Kap Verde nicht über 0:0 hinaus — Gruppe H komplett offen, alle vier Teams bei einem Punkt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today is Saturday, June 20 — day two of the second matchday, and for Daniel the first real must-win: At <strong>22:00 MESZ / 17:00 BRT</strong>, Germany plays Ivory Coast in Toronto. A win, and the Round of 16 is virtually assured. The Bundesliga is paused for the tournament, so Freiburg has a week off — everything this week is about the World Cup.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany – Ivory Coast today 22:00 MESZ / 17:00 BRT</strong> (BMO Field, Toronto): both on three points after matchday one, winner virtually books a Round of 16 spot. Bookmakers favor Germany decisively.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>7:1 against Curaçao</strong> to open — Germany surpassed Brazil as all-time World Cup top scorers (239 goals). Havertz scored twice.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil 3:0 over Haiti</strong> (yesterday): Matheus Cunha with a brace, Real Madrid's Vinícius Júnior also finds the net. Seleção now at four points.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Neymar remains sidelined</strong> (calf): missed both group matches, participation in the final match against Scotland (June 24) in doubt. Ancelotti is carefully managing him for the knockout stage.</li>\n      <li><span class=\"chip\">WM</span> <strong>Also today</strong>: Netherlands – Sweden (19:00 MESZ / 14:00 BRT) as the pivotal duel in Group F, plus Ecuador – Curaçao late.</li>\n      <li><span class=\"chip\">WM</span> <strong>Surprises</strong>: Spain drew 0:0 against Cape Verde — Group H is wide open with all four teams on one point each.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é sábado, 20 de junho — segundo dia da segunda rodada de jogos, e para Daniel o primeiro compromisso de verdade: às <strong>22:00 MESZ / 17:00 BRT</strong>, a Alemanha enfrenta a Costa do Marfim em Toronto. Uma vitória e as oitavas estão praticamente garantidas. A Bundesliga está em pausa para o torneio, então Freiburg tem a semana livre — tudo esta semana é Copa do Mundo.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha – Costa do Marfim hoje 22:00 MESZ / 17:00 BRT</strong> (BMO Field, Toronto): ambas com 3 pontos após primeira rodada, vencedor garante praticamente uma vaga nas oitavas. Casas de apostas favorecem a Alemanha com folga.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>7:1 contra Curaçau</strong> na estreia — Alemanha ultrapassou Brasil como maior artilheira de Copa do Mundo de todos os tempos (239 gols). Havertz marcou duas vezes.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 3:0 sobre o Haiti</strong> (ontem): Matheus Cunha com duas marcas, Vinícius Júnior do Real Madrid também marca. Seleção agora com 4 pontos.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Neymar continua lesionado</strong> (panturrilha): perdeu os dois primeiros jogos do grupo, participação no último jogo contra Escócia (24/06) é incerta. Ancelotti o poupa pensando nas oitavas.</li>\n      <li><span class=\"chip\">WM</span> <strong>Também hoje</strong>: Holanda – Suécia (19:00 MESZ / 14:00 BRT) como duelo-chave do Grupo F, além de Equador – Curaçau no final do dia.</li>\n      <li><span class=\"chip\">WM</span> <strong>Surpresas</strong>: Espanha não saiu do 0:0 contra Cabo Verde — Grupo H completamente aberto, todos os quatro times com um ponto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es sábado, 20 de junio — segundo día de la segunda jornada, y para Daniel el primer compromiso de verdad: a las <strong>22:00 MESZ / 17:00 BRT</strong>, Alemania enfrenta a Costa de Marfil en Toronto. Una victoria y los dieciseisavos están prácticamente garantizados. La Bundesliga está en pausa por el torneo, así que Friburgo tiene la semana libre — todo esta semana es Copa del Mundo.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania – Costa de Marfil hoy 22:00 MESZ / 17:00 BRT</strong> (BMO Field, Toronto): ambas con 3 puntos tras la primera jornada, quien gane hoy prácticamente asegura un lugar en dieciseisavos. Los casinos de apuestas favorecen a Alemania con claridad.</li>\n      <li><span class=\"chip good\">DFB</span> <strong>7:1 ante Curazao</strong> en el debut — Alemania superó a Brasil como máxima anotadora de Copa del Mundo de todos los tiempos (239 goles). Havertz marcó dos veces.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 3:0 sobre Haití</strong> (ayer): Matheus Cunha con un doblete, Vinícius Júnior del Real Madrid también marca. Selección ahora con 4 puntos.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Neymar sigue lesionado</strong> (pantorrilla): se perdió ambos partidos del grupo, su participación en el último partido contra Escocia (24/06) es incierta. Ancelotti lo preserva pensando en los dieciseisavos.</li>\n      <li><span class=\"chip\">WM</span> <strong>También hoy</strong>: Holanda – Suecia (19:00 MESZ / 14:00 BRT) como duelo clave del Grupo F, además de Ecuador – Curazao ya entrada la noche.</li>\n      <li><span class=\"chip\">WM</span> <strong>Sorpresas</strong>: España no pudo pasar de 0:0 ante Cabo Verde — Grupo H completamente abierto, los cuatro equipos con un punto.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Während die Formel 1 noch eine Woche bis Österreich pausiert, läuft heute die elektrische Bühne heiß: In <strong>Sanya</strong> hat <strong>Jake Dennis</strong> ein chaotisches Rennen gewonnen — und WM-Leader <strong>Mitch Evans</strong> kam auf P17 ins Ziel, was die Formel-E-WM nach einem Tag weit aufreißt. In Wisconsin fährt die <strong>IndyCar</strong> am Wochenende auf dem Naturkurs <strong>Road America</strong>: Qualifying heute, Rennen morgen. Im Hintergrund bleibt die große F1-Geschichte stehen: nach <strong>Hamiltons</strong> erstem Ferrari-Sieg in Barcelona und Antonellis Defekt trennen die Titel-Spitze nur noch <strong>41&nbsp;Punkte</strong>. Le Mans ist abgehakt — <strong>Toyota #7</strong> hat gewonnen. Alle Zeiten unten dreizonig: Streckenzeit, BRT und MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">FORMEL E</span> <strong>Dennis gewinnt Sanya, Evans nur P17</strong> — der bisherige WM-Führende patzt, der Titelkampf ist wieder offen. P2 Drugovich, P3 Martí (beide heute, 20.06.).</li>\n      <li><span class=\"chip good\">INDYCAR</span> <strong>Road America, Elkhart Lake/Wisconsin</strong>: Qualifying heute <strong>14:00&nbsp;ET / 15:00&nbsp;BRT / 20:00&nbsp;MESZ</strong>, Rennen So 21.06. zur selben Uhrzeit.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106). Nach Barcelona ist die zweite Saisonhälfte wieder ein Rennen.</li>\n      <li><span class=\"chip hot\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/22), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen <strong>So 28.06. — 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 gewinnt die 24h</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries. Toyota führt jetzt die WEC-Hersteller-WM mit <strong>132&nbsp;Pkt</strong>.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Bezzecchi führt mit 180 Pkt</strong> (+20 auf Martín) nach Ungarn. Nächster Lauf: Dutch TT Assen, 26.–28.06.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Während die Formel 1 noch eine Woche bis Österreich pausiert, läuft heute die elektrische Bühne heiß: In <strong>Sanya</strong> hat <strong>Jake Dennis</strong> ein chaotisches Rennen gewonnen — und WM-Leader <strong>Mitch Evans</strong> kam auf P17 ins Ziel, was die Formel-E-WM nach einem Tag weit aufreißt. In Wisconsin fährt die <strong>IndyCar</strong> am Wochenende auf dem Naturkurs <strong>Road America</strong>: Qualifying heute, Rennen morgen. Im Hintergrund bleibt die große F1-Geschichte stehen: nach <strong>Hamiltons</strong> erstem Ferrari-Sieg in Barcelona und Antonellis Defekt trennen die Titel-Spitze nur noch <strong>41&nbsp;Punkte</strong>. Le Mans ist abgehakt — <strong>Toyota #7</strong> hat gewonnen. Alle Zeiten unten dreizonig: Streckenzeit, BRT und MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">FORMEL E</span> <strong>Dennis gewinnt Sanya, Evans nur P17</strong> — der bisherige WM-Führende patzt, der Titelkampf ist wieder offen. P2 Drugovich, P3 Martí (beide heute, 20.06.).</li>\n      <li><span class=\"chip good\">INDYCAR</span> <strong>Road America, Elkhart Lake/Wisconsin</strong>: Qualifying heute <strong>14:00&nbsp;ET / 15:00&nbsp;BRT / 20:00&nbsp;MESZ</strong>, Rennen So 21.06. zur selben Uhrzeit.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106). Nach Barcelona ist die zweite Saisonhälfte wieder ein Rennen.</li>\n      <li><span class=\"chip hot\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/22), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen <strong>So 28.06. — 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 gewinnt die 24h</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries. Toyota führt jetzt die WEC-Hersteller-WM mit <strong>132&nbsp;Pkt</strong>.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Bezzecchi führt mit 180 Pkt</strong> (+20 auf Martín) nach Ungarn. Nächster Lauf: Dutch TT Assen, 26.–28.06.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">While Formula 1 takes another week off until Austria, the electric stage heats up today: In <strong>Sanya</strong>, <strong>Jake Dennis</strong> won a chaotic race — and championship leader <strong>Mitch Evans</strong> limped home in P17, blowing the Formula E title fight wide open. In Wisconsin, <strong>IndyCar</strong> races this weekend on the natural circuit <strong>Road America</strong>: qualifying today, race tomorrow. In the background, the big F1 story: after <strong>Hamilton's</strong> first Ferrari win in Barcelona and Antonelli's DNF, the title lead narrows to just <strong>41&nbsp;points</strong>. Le Mans is in the books — <strong>Toyota #7</strong> won. All times below are three-zone: track time, BRT, and MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">FORMULA E</span> <strong>Dennis wins Sanya, Evans down to P17</strong> — the former leader falters, the title fight is open again. P2 Drugovich, P3 Martí (both today, June 20).</li>\n      <li><span class=\"chip good\">INDYCAR</span> <strong>Road America, Elkhart Lake/Wisconsin</strong>: qualifying today <strong>14:00&nbsp;ET / 15:00&nbsp;BRT / 20:00&nbsp;MESZ</strong>, race Sun June 21 at the same time.</li>\n      <li><span class=\"chip\">F1-WDC</span> <strong>Antonelli leads with 156 pts</strong> over Hamilton (115, −41) and Russell (106). After Barcelona, the second half of the season is a title fight again.</li>\n      <li><span class=\"chip hot\">NEXT F1</span> <strong>Austria GP (race 8/22), Red Bull Ring</strong>, June 26–28, no sprint. Race <strong>Sun June 28 — 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 wins the 24h</strong> (June 13–14): Conway/Kobayashi/de&nbsp;Vries. Toyota now leads the WEC manufacturers' championship with <strong>132&nbsp;pts</strong>.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Bezzecchi leads with 180 pts</strong> (+20 over Martín) after Hungary. Next race: Dutch TT Assen, June 26–28.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Enquanto a Fórmula 1 faz uma pausa de uma semana até a Áustria, o palco elétrico ferve hoje: em <strong>Sanya</strong>, <strong>Jake Dennis</strong> venceu uma corrida caótica — e o líder do campeonato <strong>Mitch Evans</strong> terminou em P17, reabrindo completamente a briga pela Fórmula E. Em Wisconsin, a <strong>IndyCar</strong> corre neste fim de semana no circuito permanente <strong>Road America</strong>: treino classificatório hoje, corrida amanhã. Ao fundo, a grande história da F1: após a <strong>primeira vitória de Hamilton</strong> na Ferrari em Barcelona e o abandono de Antonelli, a liderança cai para apenas <strong>41&nbsp;pontos</strong>. Le Mans ficou para trás — <strong>Toyota #7</strong> venceu. Todos os horários abaixo com três fusos: horário da pista, BRT e MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">FÓRMULA E</span> <strong>Dennis vence Sanya, Evans apenas P17</strong> — o ex-líder vacila, a briga pelo título volta a estar aberta. P2 Drugovich, P3 Martí (ambos hoje, 20.06.).</li>\n      <li><span class=\"chip good\">INDYCAR</span> <strong>Road America, Elkhart Lake/Wisconsin</strong>: treino classificatório hoje <strong>14:00&nbsp;ET / 15:00&nbsp;BRT / 20:00&nbsp;MESZ</strong>, corrida dom 21.06. no mesmo horário.</li>\n      <li><span class=\"chip\">F1-WDC</span> <strong>Antonelli lidera com 156 pts</strong> sobre Hamilton (115, −41) e Russell (106). Após Barcelona, a segunda metade da temporada volta a ser uma briga pelo título.</li>\n      <li><span class=\"chip hot\">PRÓXIMA F1</span> <strong>GP da Áustria (prova 8/22), Red Bull Ring</strong>, 26.–28.06., sem sprint. Corrida <strong>dom 28.06. — 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 vence as 24h</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries. Toyota lidera agora o campeonato de fabricantes da WEC com <strong>132&nbsp;pts</strong>.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Bezzecchi lidera com 180 pts</strong> (+20 sobre Martín) após a Hungria. Próxima prova: Dutch TT Assen, 26.–28.06.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Mientras la Fórmula 1 descansa una semana hasta Austria, el escenario eléctrico hierve hoy: en <strong>Sanya</strong>, <strong>Jake Dennis</strong> ganó una carrera caótica — y el líder del campeonato <strong>Mitch Evans</strong> terminó en P17, reabriendo completamente la Fórmula E. En Wisconsin, <strong>IndyCar</strong> corre este fin de semana en el circuito permanente <strong>Road America</strong>: clasificación hoy, carrera mañana. De fondo, la gran historia de F1: tras la <strong>primera victoria de Hamilton</strong> en Ferrari en Barcelona y el retiro de Antonelli, el liderato baja a apenas <strong>41&nbsp;puntos</strong>. Le Mans quedó atrás — <strong>Toyota #7</strong> ganó. Todos los horarios abajo con tres zonas: hora de pista, BRT y MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">FÓRMULA E</span> <strong>Dennis gana Sanya, Evans apenas P17</strong> — el exlíder falla, la pelea por el título se reabre. P2 Drugovich, P3 Martí (ambos hoy, 20.06.).</li>\n      <li><span class=\"chip good\">INDYCAR</span> <strong>Road America, Elkhart Lake/Wisconsin</strong>: clasificación hoy <strong>14:00&nbsp;ET / 15:00&nbsp;BRT / 20:00&nbsp;MESZ</strong>, carrera dom 21.06. a la misma hora.</li>\n      <li><span class=\"chip\">F1-WDC</span> <strong>Antonelli lidera con 156 pts</strong> sobre Hamilton (115, −41) y Russell (106). Tras Barcelona, la segunda mitad de temporada es nuevamente una pelea por el título.</li>\n      <li><span class=\"chip hot\">PRÓXIMA F1</span> <strong>GP de Austria (carrera 8/22), Red Bull Ring</strong>, 26.–28.06., sin sprint. Carrera <strong>dom 28.06. — 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 gana las 24h</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries. Toyota ahora lidera el campeonato de fabricantes de la WEC con <strong>132&nbsp;pts</strong>.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Bezzecchi lidera con 180 pts</strong> (+20 sobre Martín) tras Hungría. Próxima carrera: Dutch TT Assen, 26.–28.06.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute bleibt das Wetter drinnen: 90–98 % Regen, Gewitter und drei aktive Climatempo-Warnungen über Ribeirão Claro. Das passt fast schon zur Lage — denn Paraná zählt zu den rund 14 Bundesstaaten mit erhöhtem, steigendem SRAG-Trend, und das RSV-Virus (VSR) ist gerade der häufigste Erreger; mit einem vier Wochen alten Säugling im Haus ist ein ruhiger, trockener Tag zu Hause keine schlechte Wahl. Wer raus will: Londrina hat heute ein kostenloses, überdachtes Familienprogramm. Und für die Urlaubsplanung steht das große Lokal-Event schon im Kalender.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>Atemwegs-Welle</strong>: Paraná zählt zu den rund 14 Bundesstaaten mit erhöhtem, <em>steigendem</em> SRAG-Trend — häufigster Erreger ist aktuell das RSV-Virus (51,4 % der positiven Fälle, alle Altersgruppen). Mit Säugling im Haus zählen jetzt simple Schutzregeln.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Regen &amp; Gewitter heute</strong>: 90–98 % Regenwahrscheinlichkeit, ~14 mm, 14–20°C. Climatempo meldet drei aktive Alerts (Starkregen ≥50 mm, Wind ≥50 km/h).</li>\n      <li><span class=\"chip good\">Event</span> <strong>Heute in Londrina</strong>: „Sábado em Família – Copa do Mundo\" im SESC Londrina Centro, 08:00–15:00, <strong>gratis</strong> und überdacht — die Schlechtwetter-Option (~110 km).</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue entspannt</strong>: Paraná −96,1 % Fälle gegenüber 2025 (2.028 statt 52.193, KW 1–14/2026). Kein akutes Warnniveau — die Mücken-Routine trotzdem beibehalten.</li>\n      <li><span class=\"chip\">Trip</span> <strong>28ª FesCafé</strong> in Ribeirão Claro: 02.–05. Juli, Rodeio, Shows und am Sonntag ein Kinder-Show („Sonhos e Magia\") — das Lokal-Highlight des Monats.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Schulferien PR</strong>: 13.–26. Juli 2026 — direkt nach der FesCafé, gut zum Verlängern.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Wochenende</strong>: Sonntag trockener, aber neblig (11–18°C); Montag wieder Gewitter (16–24°C).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute bleibt das Wetter drinnen: 90–98 % Regen, Gewitter und drei aktive Climatempo-Warnungen über Ribeirão Claro. Das passt fast schon zur Lage — denn Paraná zählt zu den rund 14 Bundesstaaten mit erhöhtem, steigendem SRAG-Trend, und das RSV-Virus (VSR) ist gerade der häufigste Erreger; mit einem vier Wochen alten Säugling im Haus ist ein ruhiger, trockener Tag zu Hause keine schlechte Wahl. Wer raus will: Londrina hat heute ein kostenloses, überdachtes Familienprogramm. Und für die Urlaubsplanung steht das große Lokal-Event schon im Kalender.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>Atemwegs-Welle</strong>: Paraná zählt zu den rund 14 Bundesstaaten mit erhöhtem, <em>steigendem</em> SRAG-Trend — häufigster Erreger ist aktuell das RSV-Virus (51,4 % der positiven Fälle, alle Altersgruppen). Mit Säugling im Haus zählen jetzt simple Schutzregeln.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Regen &amp; Gewitter heute</strong>: 90–98 % Regenwahrscheinlichkeit, ~14 mm, 14–20°C. Climatempo meldet drei aktive Alerts (Starkregen ≥50 mm, Wind ≥50 km/h).</li>\n      <li><span class=\"chip good\">Event</span> <strong>Heute in Londrina</strong>: „Sábado em Família – Copa do Mundo\" im SESC Londrina Centro, 08:00–15:00, <strong>gratis</strong> und überdacht — die Schlechtwetter-Option (~110 km).</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue entspannt</strong>: Paraná −96,1 % Fälle gegenüber 2025 (2.028 statt 52.193, KW 1–14/2026). Kein akutes Warnniveau — die Mücken-Routine trotzdem beibehalten.</li>\n      <li><span class=\"chip\">Trip</span> <strong>28ª FesCafé</strong> in Ribeirão Claro: 02.–05. Juli, Rodeio, Shows und am Sonntag ein Kinder-Show („Sonhos e Magia\") — das Lokal-Highlight des Monats.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Schulferien PR</strong>: 13.–26. Juli 2026 — direkt nach der FesCafé, gut zum Verlängern.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Wochenende</strong>: Sonntag trockener, aber neblig (11–18°C); Montag wieder Gewitter (16–24°C).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today the weather stays indoors: 90–98% rain, thunderstorms and three active Climatempo warnings over Ribeirão Claro. That fits the bigger picture — Paraná is among roughly 14 states with elevated, rising SRAG trends, and RSV is currently the most common pathogen; with a four-week-old infant in the house, a quiet, dry day at home is a smart choice. If you want to go out: Londrina has a free, covered family program today. And for vacation planning, the big local event is already on the calendar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>Respiratory wave</strong>: Paraná is among roughly 14 states with elevated, <em>rising</em> SRAG trends — the most common pathogen is currently RSV (51.4% of positive cases, all age groups). With an infant in the house, simple protection rules count now.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Rain &amp; thunderstorms today</strong>: 90–98% chance of rain, ~14 mm, 14–20°C. Climatempo reports three active alerts (heavy rain ≥50 mm, wind ≥50 km/h).</li>\n      <li><span class=\"chip good\">Event</span> <strong>Today in Londrina</strong>: \"Sábado em Família – Copa do Mundo\" at SESC Londrina Centro, 08:00–15:00, <strong>free</strong> and covered — the bad-weather option (~110 km).</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue easing</strong>: Paraná −96.1% cases vs. 2025 (2,028 vs. 52,193, weeks 1–14/2026). No acute alert level — keep the mosquito routine anyway.</li>\n      <li><span class=\"chip\">Trip</span> <strong>28ª FesCafé</strong> in Ribeirão Claro: July 2–5, rodeo, shows and Sunday a kids' show (\"Sonhos e Magia\") — the local highlight of the month.</li>\n      <li><span class=\"chip\">School</span> <strong>School holidays PR</strong>: July 13–26, 2026 — right after FesCafé, good for extending.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Weekend</strong>: Sunday drier but foggy (11–18°C); Monday storms again (16–24°C).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje o clima fica dentro de casa: 90–98% de chuva, trovoadas e três alertas ativos do Climatempo sobre Ribeirão Claro. Combina bem com a situação — pois Paraná conta entre os cerca de 14 estados com tendência de SRAG elevada e em alta, e o RSV é agora o agente mais frequente; com um bebê de quatro semanas em casa, um dia tranquilo e seco em casa é uma boa escolha. Quem quer sair: Londrina tem hoje um programa familiar grátis e coberto. E para planejamento de férias, o grande evento local já está no calendário.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Onda respiratória</strong>: Paraná conta entre cerca de 14 estados com tendência de SRAG elevada e <em>em alta</em> — agente mais frequente é o RSV (51,4% dos casos positivos, todas as faixas etárias). Com bebê em casa, regras de proteção simples contam agora.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Chuva &amp; trovoadas hoje</strong>: 90–98% de probabilidade de chuva, ~14 mm, 14–20°C. Climatempo relata três alertas ativos (chuva forte ≥50 mm, vento ≥50 km/h).</li>\n      <li><span class=\"chip good\">Evento</span> <strong>Hoje em Londrina</strong>: \"Sábado em Família – Copa do Mundo\" na SESC Londrina Centro, 08:00–15:00, <strong>grátis</strong> e coberto — a opção de mau tempo (~110 km).</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue em queda</strong>: Paraná −96,1% de casos vs. 2025 (2.028 vs. 52.193, semanas 1–14/2026). Nenhum nível de alerta agudo — mantenha a rotina de mosquitos mesmo assim.</li>\n      <li><span class=\"chip\">Viagem</span> <strong>28ª FesCafé</strong> em Ribeirão Claro: 02–05 de julho, rodeio, shows e domingo um show infantil (\"Sonhos e Magia\") — o destaque local do mês.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias escolares PR</strong>: 13–26 de julho de 2026 — logo após a FesCafé, bom para estender.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Fim de semana</strong>: domingo mais seco, mas nebuloso (11–18°C); segunda-feira trovoadas novamente (16–24°C).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy el clima se queda adentro: 90–98% de lluvia, tormentas y tres alertas activos de Climatempo sobre Ribeirão Claro. Eso combina bien con la situación — porque Paraná cuenta entre los cerca de 14 estados con tendencia de SRAG elevada y en alza, y el VSR es ahora el agente más frecuente; con un bebé de cuatro semanas en casa, un día tranquilo y seco en casa es una buena opción. Si quieres salir: Londrina tiene hoy un programa familiar gratis y cubierto. Y para planificar vacaciones, el gran evento local ya está en el calendario.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Onda respiratoria</strong>: Paraná cuenta entre cerca de 14 estados con tendencia de SRAG elevada y <em>en alza</em> — agente más frecuente es el VSR (51,4% de los casos positivos, todos los grupos de edad). Con bebé en casa, reglas de protección simple cuentan ahora.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Lluvia &amp; tormentas hoy</strong>: 90–98% de probabilidad de lluvia, ~14 mm, 14–20°C. Climatempo reporta tres alertas activos (lluvia fuerte ≥50 mm, viento ≥50 km/h).</li>\n      <li><span class=\"chip good\">Evento</span> <strong>Hoy en Londrina</strong>: \"Sábado em Família – Copa do Mundo\" en SESC Londrina Centro, 08:00–15:00, <strong>gratis</strong> y cubierto — la opción de mal clima (~110 km).</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue mejorando</strong>: Paraná −96,1% de casos vs. 2025 (2.028 vs. 52.193, semanas 1–14/2026). Sin nivel de alerta agudo — mantén la rutina de mosquitos de todos modos.</li>\n      <li><span class=\"chip\">Viaje</span> <strong>28ª FesCafé</strong> en Ribeirão Claro: 02–05 de julio, rodeo, shows y domingo un show infantil (\"Sonhos e Magia\") — el destaque local del mes.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones escolares PR</strong>: 13–26 de julio de 2026 — justo después de FesCafé, bueno para extender.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Fin de semana</strong>: domingo más seco pero nublado (11–18°C); lunes tormentas de nuevo (16–24°C).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstag ist Essens-Tag — und heute gehen wir essen statt zu kochen. Der ganze Restaurant-Bogen vom Tisch reservieren über Speisekarte und Bestellung bis zur Reklamation („das ist nicht, was ich bestellt habe\") und zum Zahlen mit Trinkgeld und Aufteilen der Rechnung. Zehn Verben mit voller Konjugation, dazu rund 23 Substantive, Adjektive und Phrasen — davon drei Wiederholungen — in DE, EN, PT-BR und ES-MX nebeneinander. Schwerpunkt liegt auf brasilianischem Restaurant-Register (o cardápio, o garçom, a conta, a gorjeta), mit mexikanischem Kontrast (el mesero, la cuenta, la propina). Konjugations-Fallen gibt es reichlich: PT „peço\" (d→ç), ES „pido\" (e→i), die hochirregulären Brüder <strong>trazer / traer</strong> und das g→gu in „paguei / pagué\".</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>a entrada (PT/ES)</strong> heißt im Restaurant <em>Vorspeise</em> — aber dasselbe Wort heißt auch <em>Eingang/Eintritt</em>. Kontext entscheidet: „de entrada, uma salada\" = als Vorspeise einen Salat.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>reklamieren (DE) ≠ reclamar (PT)</strong> — DE „reklamieren\" = nur einen Mangel rügen; PT „reclamar\" = ganz allgemein sich beschweren/meckern. In ES-MX sagt man dafür lieber „<em>quejarse</em>\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>pedir</strong>: PT „eu <em>peço</em>\" (d→ç, nicht *pedo!), Subjuntivo „que eu <em>peça</em>\"; ES „yo <em>pido</em>\", er „<em>pidió</em>\" (e→i).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>trazer (PT) / traer (ES)</strong> hochirregulär: „eu <em>trago</em> / eu <em>trouxe</em>\" — „yo <em>traigo</em> / yo <em>traje</em> / ellos <em>trajeron</em>\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>probar (ES)</strong> ist o→ue: „yo <em>pruebo</em>\", aber „nosotros <em>probamos</em>\" (kein Wechsel). PT „provar\" ist dagegen regelmäßig.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>pagar</strong>: vor -e wird g zu gu — PT „eu <em>paguei</em>\", ES „yo <em>pagué</em>\" (nie *pagei / *pagé).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>empfehlen (DE)</strong> ist stark: „er <em>empfiehlt</em>\", Präteritum <em>empfahl</em>, Perfekt „hat <em>empfohlen</em>\" — und ES „recomendar\" diphthongiert: „yo <em>recomiendo</em>\".</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>o cardápio</strong> = die Speisekarte (typisch brasilianisch; Portugal sagt „a ementa\"). Und „o garçom / a garçonete\" für Kellner/Kellnerin.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a conta</strong> = die Rechnung, „a gorjeta\" = das Trinkgeld (in BR meist die 10% des Kellners, freiwillig). Bezahl-Frage: „<em>A conta, por favor</em>\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>el mesero / la mesera (ES-MX)</strong> = der Kellner — nicht „camarero\" (Spanien). „La cuenta, por favor\" für die Rechnung.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>o cardápio (m!)</strong> — die -io-Endung sieht feminin aus, ist aber maskulin. Und „a xícara\" (f, BR) = Tasse vs. „o copo\" (m) = Glas.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Está frio / kalt</strong> — die häufigste Reklamation: „o prato está frio\" / „está frío\" („das Gericht ist kalt\").</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Samstag ist Essens-Tag — und heute gehen wir essen statt zu kochen. Der ganze Restaurant-Bogen vom Tisch reservieren über Speisekarte und Bestellung bis zur Reklamation („das ist nicht, was ich bestellt habe\") und zum Zahlen mit Trinkgeld und Aufteilen der Rechnung. Zehn Verben mit voller Konjugation, dazu rund 23 Substantive, Adjektive und Phrasen — davon drei Wiederholungen — in DE, EN, PT-BR und ES-MX nebeneinander. Schwerpunkt liegt auf brasilianischem Restaurant-Register (o cardápio, o garçom, a conta, a gorjeta), mit mexikanischem Kontrast (el mesero, la cuenta, la propina). Konjugations-Fallen gibt es reichlich: PT „peço\" (d→ç), ES „pido\" (e→i), die hochirregulären Brüder <strong>trazer / traer</strong> und das g→gu in „paguei / pagué\".</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>a entrada (PT/ES)</strong> heißt im Restaurant <em>Vorspeise</em> — aber dasselbe Wort heißt auch <em>Eingang/Eintritt</em>. Kontext entscheidet: „de entrada, uma salada\" = als Vorspeise einen Salat.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>reklamieren (DE) ≠ reclamar (PT)</strong> — DE „reklamieren\" = nur einen Mangel rügen; PT „reclamar\" = ganz allgemein sich beschweren/meckern. In ES-MX sagt man dafür lieber „<em>quejarse</em>\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>pedir</strong>: PT „eu <em>peço</em>\" (d→ç, nicht *pedo!), Subjuntivo „que eu <em>peça</em>\"; ES „yo <em>pido</em>\", er „<em>pidió</em>\" (e→i).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>trazer (PT) / traer (ES)</strong> hochirregulär: „eu <em>trago</em> / eu <em>trouxe</em>\" — „yo <em>traigo</em> / yo <em>traje</em> / ellos <em>trajeron</em>\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>probar (ES)</strong> ist o→ue: „yo <em>pruebo</em>\", aber „nosotros <em>probamos</em>\" (kein Wechsel). PT „provar\" ist dagegen regelmäßig.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>pagar</strong>: vor -e wird g zu gu — PT „eu <em>paguei</em>\", ES „yo <em>pagué</em>\" (nie *pagei / *pagé).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>empfehlen (DE)</strong> ist stark: „er <em>empfiehlt</em>\", Präteritum <em>empfahl</em>, Perfekt „hat <em>empfohlen</em>\" — und ES „recomendar\" diphthongiert: „yo <em>recomiendo</em>\".</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>o cardápio</strong> = die Speisekarte (typisch brasilianisch; Portugal sagt „a ementa\"). Und „o garçom / a garçonete\" für Kellner/Kellnerin.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a conta</strong> = die Rechnung, „a gorjeta\" = das Trinkgeld (in BR meist die 10% des Kellners, freiwillig). Bezahl-Frage: „<em>A conta, por favor</em>\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>el mesero / la mesera (ES-MX)</strong> = der Kellner — nicht „camarero\" (Spanien). „La cuenta, por favor\" für die Rechnung.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>o cardápio (m!)</strong> — die -io-Endung sieht feminin aus, ist aber maskulin. Und „a xícara\" (f, BR) = Tasse vs. „o copo\" (m) = Glas.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Está frio / kalt</strong> — die häufigste Reklamation: „o prato está frio\" / „está frío\" („das Gericht ist kalt\").</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Saturday is food day — and today we're going out to eat instead of cooking. The full restaurant arc: booking a table, reading the menu, ordering, lodging a complaint (\"this is not what I ordered\"), and paying with a tip and a split bill. Ten verbs with full conjugation, plus around 23 nouns, adjectives and phrases — three of them review items — in DE, EN, PT-BR and ES-MX side by side. The focus is on Brazilian restaurant register (o cardápio, o garçom, a conta, a gorjeta), with Mexican contrast (el mesero, la cuenta, la propina). Conjugation traps abound: PT \"peço\" (d→ç), ES \"pido\" (e→i), the highly irregular siblings <strong>trazer / traer</strong>, and the g→gu shift in \"paguei / pagué\".</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>a entrada (PT/ES)</strong> means <em>starter/appetizer</em> in a restaurant — but the same word also means <em>entrance/admission ticket</em>. Context decides: \"de entrada, uma salada\" = a salad as a starter.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>reklamieren (DE) ≠ reclamar (PT)</strong> — DE \"reklamieren\" = lodging a specific complaint; PT \"reclamar\" = complaining/grumbling in general. In ES-MX the preferred verb is \"<em>quejarse</em>\".</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>pedir</strong>: PT \"eu <em>peço</em>\" (d→ç, not *pedo!), subjunctive \"que eu <em>peça</em>\"; ES \"yo <em>pido</em>\", he/she \"<em>pidió</em>\" (e→i).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>trazer (PT) / traer (ES)</strong> highly irregular: \"eu <em>trago</em> / eu <em>trouxe</em>\" — \"yo <em>traigo</em> / yo <em>traje</em> / ellos <em>trajeron</em>\".</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>probar (ES)</strong> is o→ue: \"yo <em>pruebo</em>\", but \"nosotros <em>probamos</em>\" (no shift). PT \"provar\" is regular.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>pagar</strong>: before -e, g becomes gu — PT \"eu <em>paguei</em>\", ES \"yo <em>pagué</em>\" (never *pagei / *pagé).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>empfehlen (DE)</strong> is strong: \"er <em>empfiehlt</em>\", past <em>empfahl</em>, perfect \"hat <em>empfohlen</em>\" — and ES \"recomendar\" diphthongizes: \"yo <em>recomiendo</em>\".</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>o cardápio</strong> = the menu (typically Brazilian; Portugal says \"a ementa\"). And \"o garçom / a garçonete\" for waiter/waitress.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a conta</strong> = the bill, \"a gorjeta\" = the tip (in BR usually the waiter's 10%, optional). Standard phrase: \"<em>A conta, por favor</em>\".</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>el mesero / la mesera (ES-MX)</strong> = the waiter — not \"camarero\" (Spain). \"La cuenta, por favor\" for the bill.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>o cardápio (m!)</strong> — the -io ending looks feminine, but it's masculine. And \"a xícara\" (f, BR) = cup vs. \"o copo\" (m) = glass.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Está frio / frío</strong> — the most common complaint: \"o prato está frio\" / \"está frío\" (\"the dish is cold\").</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado é dia de comida — e hoje vamos comer fora em vez de cozinhar. O arco completo do restaurante: reservar uma mesa, ler o cardápio, pedir, fazer uma reclamação (\"não é isso que eu pedi\") e pagar com gorjeta e conta dividida. Dez verbos com conjugação completa, mais cerca de 23 substantivos, adjetivos e frases — três deles de revisão — em DE, EN, PT-BR e ES-MX lado a lado. O foco está no registro brasileiro de restaurante (o cardápio, o garçom, a conta, a gorjeta), com contraste mexicano (el mesero, la cuenta, la propina). Armadilhas de conjugação não faltam: PT \"peço\" (d→ç), ES \"pido\" (e→i), os irmãos altamente irregulares <strong>trazer / traer</strong> e o g→gu em \"paguei / pagué\".</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>a entrada (PT/ES)</strong> significa <em>entrada/aperitivo</em> no restaurante — mas a mesma palavra também significa <em>entrada do local/ingresso</em>. O contexto decide: \"de entrada, uma salada\" = uma salada como entrada.</li>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>reklamieren (DE) ≠ reclamar (PT)</strong> — DE \"reklamieren\" = reclamar apenas um defeito específico; PT \"reclamar\" = reclamar de forma geral. Em ES-MX prefere-se \"<em>quejarse</em>\".</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>pedir</strong>: PT \"eu <em>peço</em>\" (d→ç, nunca *pedo!), subjuntivo \"que eu <em>peça</em>\"; ES \"yo <em>pido</em>\", ele/ela \"<em>pidió</em>\" (e→i).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>trazer (PT) / traer (ES)</strong> altamente irregular: \"eu <em>trago</em> / eu <em>trouxe</em>\" — \"yo <em>traigo</em> / yo <em>traje</em> / ellos <em>trajeron</em>\".</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>probar (ES)</strong> tem o→ue: \"yo <em>pruebo</em>\", mas \"nosotros <em>probamos</em>\" (sem mudança). PT \"provar\" é regular.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>pagar</strong>: antes de -e, g vira gu — PT \"eu <em>paguei</em>\", ES \"yo <em>pagué</em>\" (nunca *pagei / *pagé).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>empfehlen (DE)</strong> é forte: \"er <em>empfiehlt</em>\", pretérito <em>empfahl</em>, perfeito \"hat <em>empfohlen</em>\" — e ES \"recomendar\" diptonga: \"yo <em>recomiendo</em>\".</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>o cardápio</strong> = o menu (tipicamente brasileiro; Portugal diz \"a ementa\"). E \"o garçom / a garçonete\" para garçom/garçonete.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a conta</strong> = a fatura, \"a gorjeta\" = a gorjeta (no BR geralmente 10% do garçom, opcional). Frase padrão: \"<em>A conta, por favor</em>\".</li>\n      <li><span class=\"chip\">FRASE</span> <strong>el mesero / la mesera (ES-MX)</strong> = o garçom — não \"camarero\" (Espanha). \"La cuenta, por favor\" para pedir a conta.</li>\n      <li><span class=\"chip\">GÊNERO</span> <strong>o cardápio (m!)</strong> — a terminação -io parece feminina, mas é masculina. E \"a xícara\" (f, BR) = xícara vs. \"o copo\" (m) = copo.</li>\n      <li><span class=\"chip\">FRASE</span> <strong>Está frio / frío</strong> — a reclamação mais comum: \"o prato está frio\" / \"está frío\" (\"o prato está frio\").</li>\n    </ul></div>",

li><span class=\"chip\">CONJUGACIÓN</span> <strong>pagar</strong>: antes de -e, g se convierte en gu — PT \"eu <em>paguei</em>\", ES \"yo <em>pagué</em>\" (nunca *pagei / *pagé).</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>empfehlen (DE)</strong> es fuerte: \"er <em>empfiehlt</em>\", pretérito <em>empfahl</em>, perfecto \"hat <em>empfohlen</em>\" — y ES \"recomendar\" diptonga: \"yo <em>recomiendo</em>\".</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>o cardápio</strong> = el menú (típicamente brasileño; Portugal dice \"a ementa\"). Y \"o garçom / a garçonete\" para mesero/mesera.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>a conta</strong> = la cuenta, \"a gorjeta\" = la propina (en BR suele ser el 10% del mesero, opcional). Frase estándar: \"<em>A conta, por favor</em>\".</li>\n      <li><span class=\"chip\">FRASE</span> <strong>el mesero / la mesera (ES-MX)</strong> = el mesero — no \"camarero\" (España). \"La cuenta, por favor\" para pedir la cuenta.</li>\n      <li><span class=\"chip\">GÉNERO</span> <strong>o cardápio (m!)</strong> — la terminación -io parece femenina, pero es masculina. Y \"a xícara\" (f, BR) = taza vs. \"o copo\" (m) = vaso.</li>\n      <li><span class=\"chip\">FRASE</span> <strong>Está frio / frío</strong> — la queja más común: \"o prato está frio\" / \"está frío\" (\"el platillo está frío\").</li>\n    </ul></div>"
