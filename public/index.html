      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Microsoft hat den größten Patch Tuesday der Programm-Geschichte ausgeliefert — und mittendrin eine Exchange-OWA-Lücke, die schon aktiv ausgenutzt wird. Daneben: ein npm-Lieferketten-Vorfall, der die TanStack-Pipeline selbst gekapert hat, statt nur Credentials zu klauen, ein fünfter Chrome-Zero-Day des Jahres, und eine neue Plattform-Baustelle von Microsoft, die als Agenten-API-Schicht für Enterprise-Dev-Teams aufmacht. Zum Ausgleich solide Releases: PostgreSQL-Security-Linie und Python 3.15 Beta 2.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Patch Tuesday Juni</strong>: ~198 CVEs (Tenable) — größter Patch Tuesday seit Programmstart; 32 kritisch, drei öffentlich bekannte Zero-Days.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Exchange OWA CVE-2026-42897</strong>: CVSS 8.1, aktiv ausgenutzte XSS-/Spoofing-Lücke in Exchange 2016/2019/SE — am 09.06. gepatcht.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>TanStack npm-Vorfall</strong>: 42 Pakete / 84 Versionen kompromittiert, CVE-2026-45321 (CVSS 9.6) — Angreifer kaperte die OIDC-Release-Pipeline selbst.</li>\n      <li><span class=\"chip hot\">Browser · Global</span> <strong>Chrome V8 CVE-2026-11645</strong>: aktiv ausgenutzter Zero-Day (OOB read/write), gepatcht in 149.0.7827.102/.103 — fünfter Chrome-0-Day des Jahres, auf der CISA-KEV.</li>\n      <li><span class=\"chip\">Infra · Global</span> <strong>Microsoft Work IQ API GA</strong> (16.06.): 10 M365-Tools über A2A/MCP/REST, Verbrauchsabrechnung, Rego-Policy-Engine — neue API-Fläche für Enterprise-Agenten.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Android Juni-Patchlevel</strong>: offiziell 96 CVEs (Medien melden 124); CVE-2025-48595 aktiv ausgenutzt, seit 02.06. auf der KEV.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 18.4/17.10/16.14/15.18/14.23</strong>: 11 CVEs, drei davon CVSS 8.8.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: 8–9 % JIT-Speedup auf x86-64, Lazy Imports (PEP 810), frozendict (PEP 814).</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU Juni</strong>: 67 CVEs, 10 kritisch — am 16.06. veröffentlicht.</li>\n      <li><span class=\"chip\">Regulierung · EU</span> <strong>EU CRA</strong>: seit 11.06. greifen die Notifizierungs-Regeln; harte Melde-Stufe kommt 11.09.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Microsoft hat den größten Patch Tuesday der Programm-Geschichte ausgeliefert — und mittendrin eine Exchange-OWA-Lücke, die schon aktiv ausgenutzt wird. Daneben: ein npm-Lieferketten-Vorfall, der die TanStack-Pipeline selbst gekapert hat, statt nur Credentials zu klauen, ein fünfter Chrome-Zero-Day des Jahres, und eine neue Plattform-Baustelle von Microsoft, die als Agenten-API-Schicht für Enterprise-Dev-Teams aufmacht. Zum Ausgleich solide Releases: PostgreSQL-Security-Linie und Python 3.15 Beta 2.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Patch Tuesday Juni</strong>: ~198 CVEs (Tenable) — größter Patch Tuesday seit Programmstart; 32 kritisch, drei öffentlich bekannte Zero-Days.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Exchange OWA CVE-2026-42897</strong>: CVSS 8.1, aktiv ausgenutzte XSS-/Spoofing-Lücke in Exchange 2016/2019/SE — am 09.06. gepatcht.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>TanStack npm-Vorfall</strong>: 42 Pakete / 84 Versionen kompromittiert, CVE-2026-45321 (CVSS 9.6) — Angreifer kaperte die OIDC-Release-Pipeline selbst.</li>\n      <li><span class=\"chip hot\">Browser · Global</span> <strong>Chrome V8 CVE-2026-11645</strong>: aktiv ausgenutzter Zero-Day (OOB read/write), gepatcht in 149.0.7827.102/.103 — fünfter Chrome-0-Day des Jahres, auf der CISA-KEV.</li>\n      <li><span class=\"chip\">Infra · Global</span> <strong>Microsoft Work IQ API GA</strong> (16.06.): 10 M365-Tools über A2A/MCP/REST, Verbrauchsabrechnung, Rego-Policy-Engine — neue API-Fläche für Enterprise-Agenten.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Android Juni-Patchlevel</strong>: offiziell 96 CVEs (Medien melden 124); CVE-2025-48595 aktiv ausgenutzt, seit 02.06. auf der KEV.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 18.4/17.10/16.14/15.18/14.23</strong>: 11 CVEs, drei davon CVSS 8.8.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: 8–9 % JIT-Speedup auf x86-64, Lazy Imports (PEP 810), frozendict (PEP 814).</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU Juni</strong>: 67 CVEs, 10 kritisch — am 16.06. veröffentlicht.</li>\n      <li><span class=\"chip\">Regulierung · EU</span> <strong>EU CRA</strong>: seit 11.06. greifen die Notifizierungs-Regeln; harte Melde-Stufe kommt 11.09.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Microsoft shipped the largest Patch Tuesday in program history — and in the middle of it, an Exchange OWA hole already under active exploitation. On the side: an npm supply-chain incident that hijacked the TanStack pipeline itself instead of just stealing credentials, the fifth Chrome zero-day of the year, and a new Microsoft platform building block launching as an agent-API layer for enterprise dev teams. On the bright side, solid releases: PostgreSQL security line and Python 3.15 Beta 2.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>June Patch Tuesday</strong>: ~198 CVEs (Tenable) — largest Patch Tuesday since program launch; 32 critical, three publicly known zero-days.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Exchange OWA CVE-2026-42897</strong>: CVSS 8.1, actively exploited XSS/spoofing hole in Exchange 2016/2019/SE — patched on 06/09.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>TanStack npm incident</strong>: 42 packages / 84 versions compromised, CVE-2026-45321 (CVSS 9.6) — attacker hijacked the OIDC release pipeline itself.</li>\n      <li><span class=\"chip hot\">Browser · Global</span> <strong>Chrome V8 CVE-2026-11645</strong>: actively exploited zero-day (OOB read/write), patched in 149.0.7827.102/.103 — fifth Chrome zero-day of the year, on CISA KEV.</li>\n      <li><span class=\"chip\">Infra · Global</span> <strong>Microsoft Work IQ API GA</strong> (06/16): 10 M365 tools via A2A/MCP/REST, consumption billing, Rego policy engine — new API surface for enterprise agents.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Android June patch level</strong>: officially 96 CVEs (media reports 124); CVE-2025-48595 actively exploited, on KEV since 06/02.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>PostgreSQL 18.4/17.10/16.14/15.18/14.23</strong>: 11 CVEs, three of them CVSS 8.8.</li>\n      <li><span class=\"chip\">Release</span> <strong>Python 3.15 Beta 2</strong>: 8–9% JIT speedup on x86-64, Lazy Imports (PEP 810), frozendict (PEP 814).</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU June</strong>: 67 CVEs, 10 critical — released 06/16.</li>\n      <li><span class=\"chip\">Regulation · EU</span> <strong>EU CRA</strong>: as of 06/11, notification rules take effect; hard reporting deadline comes 09/11.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Microsoft entregou o maior Patch Tuesday da história do programa — e no meio dele, uma brecha OWA do Exchange que já está sendo explorada ativamente. Além disso: um incidente de cadeia de suprimentos npm que sequestrou a própria pipeline do TanStack em vez de apenas roubar credenciais, o quinto zero-day do Chrome do ano, e um novo componente de plataforma Microsoft lançado como uma camada de API de agentes para equipes de dev empresariais. Como contrapartida, lançamentos sólidos: linha de segurança PostgreSQL e Python 3.15 Beta 2.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Patch Tuesday junho</strong>: ~198 CVEs (Tenable) — maior Patch Tuesday desde o início do programa; 32 críticas, três zero-days conhecidas publicamente.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Exchange OWA CVE-2026-42897</strong>: CVSS 8,1, brecha XSS/falsificação sendo explorada ativamente no Exchange 2016/2019/SE — corrigida em 09/06.</li>\n      <li><span class=\"chip hot\">Seg · OSS</span> <strong>Incidente npm TanStack</strong>: 42 pacotes / 84 versões comprometidas, CVE-2026-45321 (CVSS 9,6) — atacante sequestrou a pipeline OIDC de lançamento.</li>\n      <li><span class=\"chip hot\">Navegador · Global</span> <strong>Chrome V8 CVE-2026-11645</strong>: zero-day sendo explorado ativamente (leitura/escrita fora dos limites), corrigido em 149.0.7827.102/.103 — quinto zero-day Chrome do ano, na KEV do CISA.</li>\n      <li><span class=\"chip\">Infra · Global</span> <strong>Microsoft Work IQ API GA</strong> (16/06): 10 ferramentas M365 via A2A/MCP/REST, faturamento por consumo, mecanismo de política Rego — nova superfície de API para agentes empresariais.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Nível de patch junho Android</strong>: oficialmente 96 CVEs (mídia relata 124); CVE-2025-48595 sendo explorada ativamente, na KEV desde 02/06.</li>\n      <li><span class=\"chip good\">Lançamento · OSS</span> <strong>PostgreSQL 18.4/17.10/16.14/15.18/14.23</strong>: 11 CVEs, três delas CVSS 8,8.</li>\n      <li><span class=\"chip\">Lançamento</span> <strong>Python 3.15 Beta 2</strong>: aceleração JIT de 8–9% em x86-64, Lazy Imports (PEP 810), frozendict (PEP 814).</li>\n      <li><span class=\"chip\">Seg</span> <strong>Oracle CPU junho</strong>: 67 CVEs, 10 críticas — publicadas em 16/06.</li>\n      <li><span class=\"chip\">Regulação · UE</span> <strong>EU CRA</strong>: desde 11/06, regras de notificação entram em vigor; prazo de notificação obrigatória vem em 11/09.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Microsoft entregó el Patch Tuesday más grande en la historia del programa — y en medio de él, una brecha OWA del Exchange que ya está siendo explotada activamente. Además: un incidente de cadena de suministro npm que secuestró la propia pipeline de TanStack en lugar de solo robar credenciales, el quinto zero-day de Chrome del año, y un nuevo componente de plataforma Microsoft lanzado como una capa de API de agentes para equipos de desarrollo empresarial. Como contrapartida: lanzamientos sólidos: línea de seguridad PostgreSQL y Python 3.15 Beta 2.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Patch Tuesday junio</strong>: ~198 CVEs (Tenable) — mayor Patch Tuesday desde el inicio del programa; 32 críticos, tres zero-days conocidos públicamente.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Exchange OWA CVE-2026-42897</strong>: CVSS 8,1, brecha XSS/suplantación siendo explotada activamente en Exchange 2016/2019/SE — parcheada el 09/06.</li>\n      <li><span class=\"chip hot\">Seg · OSS</span> <strong>Incidente npm TanStack</strong>: 42 paquetes / 84 versiones comprometidas, CVE-2026-45321 (CVSS 9,6) — atacante secuestró la pipeline OIDC de lanzamiento.</li>\n      <li><span class=\"chip hot\">Navegador · Global</span> <strong>Chrome V8 CVE-2026-11645</strong>: zero-day siendo explotado activamente (lectura/escritura fuera de límites), parcheado en 149.0.7827.102/.103 — quinto zero-day Chrome del año, en KEV del CISA.</li>\n      <li><span class=\"chip\">Infra · Global</span> <strong>Microsoft Work IQ API GA</strong> (16/06): 10 herramientas M365 vía A2A/MCP/REST, facturación por consumo, motor de política Rego — nueva superficie de API para agentes empresariales.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Nivel de parche junio Android</strong>: oficialmente 96 CVEs (medios reportan 124); CVE-2025-48595 siendo explotada activamente, en KEV desde 02/06.</li>\n      <li><span class=\"chip good\">Lanzamiento · OSS</span> <strong>PostgreSQL 18.4/17.10/16.14/15.18/14.23</strong>: 11 CVEs, tres de ellas CVSS 8,8.</li>\n      <li><span class=\"chip\">Lanzamiento</span> <strong>Python 3.15 Beta 2</strong>: aceleración JIT de 8–9% en x86-64, Lazy Imports (PEP 810), frozendict (PEP 814).</li>\n      <li><span class=\"chip\">Seg</span> <strong>Oracle CPU junio</strong>: 67 CVEs, 10 críticos — publicados el 16/06.</li>\n      <li><span class=\"chip\">Regulación · UE</span> <strong>EU CRA</strong>: desde el 11/06, reglas de notificación entran en vigor; plazo de reporte obligatorio llega el 11/09.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Tag gehört zwei Schockwellen aus dem Coding-Tooling: SpaceX schluckt Anysphere, die Firma hinter Cursor, in einem 60-Mrd.-$-All-Stock-Deal — und Anthropics zwei beste Modelle bleiben fünf Tage nach dem Launch per US-Regierungs-Anordnung offline. Beides berührt direkt das Werkzeug, mit dem du jeden Tag arbeitest. Dazu: GitHub-Copilot-Nutzer brennen ihr Monats-Budget am ersten Tag durch.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEAL</span> <strong>SpaceX → Cursor</strong>: 60 Mrd. $ All-Stock für Anysphere, unterzeichnet 16.06. Größte Coding-Tool-Übernahme je. Closing Q3 2026.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 offline</strong>: US-Export-Kontroll-Anordnung vom 12.06. zwingt Anthropic zur Abschaltung — fünf Tage nach Launch immer noch nicht zurück.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench-Caveat</strong>: Fable 5 führt mit angeblich 0,950 Verified — aber nur 1 von 101 Einträgen ist unabhängig verifiziert. Anbieter-Zahl, kein Maß.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Copilot-Billing-Schock</strong>: Usage-based-Credits seit 01.06.; ein Pro+-Nutzer verbrannte 82 % seines Monats-Kontingents am ersten Tag. 958 Downvotes im Community-Thread.</li>\n      <li><span class=\"chip\">AWS</span> <strong>Summit New York heute</strong>: Keynote 11:00 ET (16:00 BRT). Kiro Pro Max ist live, AgentCore angekündigt — Keynote-Details laufen nach Redaktionsschluss.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 führt offene Modelle bei SWE-Bench Pro (59,0 %); DeepSeek V4 Pro (MIT) bei LiveCodeBench (93,5 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code 2.1.178</strong>: `/cd`-Befehl, verschachtelte Sub-Agenten, Safe-Mode (08.06.).</li>\n      <li><span class=\"chip\">Data</span> <strong>Stack-Overflow-Survey 2025</strong>: 84 % nutzen/planen AI-Tools — aber mehr misstrauen der Genauigkeit (46 %) als ihr vertrauen (33 %). (Daten Mai–Aug 2025, kein 2026-Wert.)</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Tag gehört zwei Schockwellen aus dem Coding-Tooling: SpaceX schluckt Anysphere, die Firma hinter Cursor, in einem 60-Mrd.-$-All-Stock-Deal — und Anthropics zwei beste Modelle bleiben fünf Tage nach dem Launch per US-Regierungs-Anordnung offline. Beides berührt direkt das Werkzeug, mit dem du jeden Tag arbeitest. Dazu: GitHub-Copilot-Nutzer brennen ihr Monats-Budget am ersten Tag durch.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEAL</span> <strong>SpaceX → Cursor</strong>: 60 Mrd. $ All-Stock für Anysphere, unterzeichnet 16.06. Größte Coding-Tool-Übernahme je. Closing Q3 2026.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 offline</strong>: US-Export-Kontroll-Anordnung vom 12.06. zwingt Anthropic zur Abschaltung — fünf Tage nach Launch immer noch nicht zurück.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench-Caveat</strong>: Fable 5 führt mit angeblich 0,950 Verified — aber nur 1 von 101 Einträgen ist unabhängig verifiziert. Anbieter-Zahl, kein Maß.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Copilot-Billing-Schock</strong>: Usage-based-Credits seit 01.06.; ein Pro+-Nutzer verbrannte 82 % seines Monats-Kontingents am ersten Tag. 958 Downvotes im Community-Thread.</li>\n      <li><span class=\"chip\">AWS</span> <strong>Summit New York heute</strong>: Keynote 11:00 ET (16:00 BRT). Kiro Pro Max ist live, AgentCore angekündigt — Keynote-Details laufen nach Redaktionsschluss.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 führt offene Modelle bei SWE-Bench Pro (59,0 %); DeepSeek V4 Pro (MIT) bei LiveCodeBench (93,5 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code 2.1.178</strong>: `/cd`-Befehl, verschachtelte Sub-Agenten, Safe-Mode (08.06.).</li>\n      <li><span class=\"chip\">Data</span> <strong>Stack-Overflow-Survey 2025</strong>: 84 % nutzen/planen AI-Tools — aber mehr misstrauen der Genauigkeit (46 %) als ihr vertrauen (33 %). (Daten Mai–Aug 2025, kein 2026-Wert.)</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today brings two shockwaves from the coding-tooling world: SpaceX acquires Anysphere, the company behind Cursor, in a $60B all-stock deal — and Anthropic's two strongest models remain offline per U.S. government order five days after launch. Both directly impact the tools you use every day. Plus: GitHub Copilot users are burning through their monthly budget on day one.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEAL</span> <strong>SpaceX → Cursor</strong>: $60B all-stock for Anysphere, signed 06-12. Largest coding-tool acquisition ever. Closing Q3 2026.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 offline</strong>: U.S. export-control order from 06-12 forces Anthropic shutdown — five days after launch, still down.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench caveat</strong>: Fable 5 leads with allegedly 0.950 Verified — but only 1 of 101 entries is independently verified. Vendor-submitted, not a measure.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>Copilot billing shock</strong>: Usage-based credits since 06-01; one Pro+ user burned 82% of monthly quota on day one. 958 downvotes in community thread.</li>\n      <li><span class=\"chip\">AWS</span> <strong>Summit New York today</strong>: Keynote 11:00 ET (16:00 BRT). Kiro Pro Max is live, AgentCore announced — keynote details break after deadline.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 leads open models on SWE-Bench Pro (59.0%); DeepSeek V4 Pro (MIT) on LiveCodeBench (93.5%).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code 2.1.178</strong>: `/cd` command, nested sub-agents, safe mode (06-08).</li>\n      <li><span class=\"chip\">Data</span> <strong>Stack Overflow Survey 2025</strong>: 84% use/plan AI tools — but more distrust accuracy (46%) than trust it (33%). (Data May–Aug 2025, no 2026 value.)</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O dia pertence a dois terremotos vindos do mundo das ferramentas de código: SpaceX está adquirindo Anysphere, a empresa por trás do Cursor, em um negócio de $60 bilhões em ações — e os dois modelos mais fortes da Anthropic continuam offline por ordem do governo americano, cinco dias após o lançamento. Ambos atingem as ferramentas que você usa todos os dias. Mais: usuários do GitHub Copilot estão queimando o orçamento mensal no primeiro dia.</p>\n    <ul>\n      <li><span class=\"chip hot\">NEGÓCIO</span> <strong>SpaceX → Cursor</strong>: $60 bilhões em ações para Anysphere, assinado em 16/06. Maior aquisição de ferramenta de código de IA de todos os tempos. Encerramento previsto para Q3 2026.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 offline</strong>: Ordem americana de controle de exportação de 12/06 força desligamento da Anthropic — cinco dias após lançamento, ainda offline.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Ressalva SWE-Bench</strong>: Fable 5 lidera com alegado 0,950 Verified — mas apenas 1 de 101 entradas é verificado independentemente. Número enviado pelo fornecedor, não uma medida.</li>\n      <li><span class=\"chip hot\">Ferramenta</span> <strong>Choque de faturamento do Copilot</strong>: Créditos baseados em uso desde 01/06; um usuário Pro+ queimou 82% da cota mensal no primeiro dia. 958 votos negativos no tópico da comunidade.</li>\n      <li><span class=\"chip\">AWS</span> <strong>Summit Nova York hoje</strong>: Keynote 11:00 ET (16:00 BRT). Kiro Pro Max está ativo, AgentCore anunciado — detalhes da keynote saem após o fechamento.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 lidera modelos abertos em SWE-Bench Pro (59,0%); DeepSeek V4 Pro (MIT) em LiveCodeBench (93,5%).</li>\n      <li><span class=\"chip\">Ferramenta</span> <strong>Claude Code 2.1.178</strong>: comando `/cd`, sub-agentes aninhados, Modo Seguro (08/06).</li>\n      <li><span class=\"chip\">Dados</span> <strong>Pesquisa Stack Overflow 2025</strong>: 84% usam/planejam ferramentas de IA — mas mais desconfiam da precisão (46%) do que confiam (33%). (Dados mai–ago 2025, sem valor de 2026.)</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día pertenece a dos terremotos del mundo de las herramientas de codificación: SpaceX está adquiriendo Anysphere, la empresa detrás de Cursor, en un trato de $60 mil millones en acciones — y los dos modelos más fuertes de Anthropic permanecen offline por orden del gobierno estadounidense cinco días después del lanzamiento. Ambos afectan las herramientas que usas todos los días. Además: los usuarios de GitHub Copilot están quemando su presupuesto mensual el primer día.</p>\n    <ul>\n      <li><span class=\"chip hot\">TRATO</span> <strong>SpaceX → Cursor</strong>: $60 mil millones en acciones para Anysphere, firmado 16/06. Mayor adquisición de herramienta de código de IA de todos los tiempos. Cierre esperado para Q3 2026.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 offline</strong>: Orden de control de exportación estadounidense del 12/06 fuerza apagón de Anthropic — cinco días después del lanzamiento, aún offline.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Salvedad SWE-Bench</strong>: Fable 5 lidera con supuestamente 0,950 Verified — pero solo 1 de 101 entradas está verificado de forma independiente. Número enviado por proveedor, no una medida.</li>\n      <li><span class=\"chip hot\">Herramienta</span> <strong>Conmoción de facturación de Copilot</strong>: Créditos basados en uso desde 01/06; un usuario Pro+ quemó el 82% de su cuota mensual el primer día. 958 votos negativos en el hilo de la comunidad.</li>\n      <li><span class=\"chip\">AWS</span> <strong>Cumbre Nueva York hoy</strong>: Keynote 11:00 ET (16:00 BRT). Kiro Pro Max está activo, AgentCore anunciado — detalles de keynote se divulgan después del cierre.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Open-Weights</strong>: MiniMax M3 lidera modelos abiertos en SWE-Bench Pro (59,0%); DeepSeek V4 Pro (MIT) en LiveCodeBench (93,5%).</li>\n      <li><span class=\"chip\">Herramienta</span> <strong>Claude Code 2.1.178</strong>: comando `/cd`, sub-agentes anidados, Modo Seguro (08/06).</li>\n      <li><span class=\"chip\">Datos</span> <strong>Encuesta Stack Overflow 2025</strong>: 84% usan/planean herramientas de IA — pero más desconfían de la precisión (46%) que confían (33%). (Datos may–ago 2025, sin valor 2026.)</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei echte Juni-Schlagzeilen tragen den Tag: OpenAI hat eine vertrauliche S-1 eingereicht und peilt einen Billionen-Börsengang an, und Apple lässt sein neues Siri ab WWDC von Googles Gemini denken. Beides sind keine Labor-Demos mehr — das ist angewandte KI im Produkt-Maßstab. Darunter aber dieselbe nüchterne Wahrheit wie jede Woche: viele Firmen haben Agenten ausgerollt, kaum eine sieht harten ROI. Genau diese Lücke ist twiceDs Markt.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>OpenAI</strong>: vertrauliche S-1 bei der SEC (8.–9. Juni), Ziel 852 Mrd.–1 Bio. $, Listing Q4 2026 — Zahlen bleiben aber geheim.</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Apple × Google</strong>: das neue Siri läuft auf Gemini (WWDC, 8. Juni); ~1 Mrd. $/Jahr laut Bloomberg-Berichten, nicht primär bestätigt.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>ROI-Lücke</strong>: 97 % haben KI-Agenten ausgerollt, nur 29 % sehen signifikanten ROI, 48 % nennen es „massive Enttäuschung\" (Writer, n=2.400).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google → Anthropic</strong> (24. April, Kontext): bis 40 Mrd. $, ~14 % Anteil, Bewertung 350 Mrd. $.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Gemini Enterprise</strong> (22.–23. April, Kontext): 60+ Partner-Agenten im Agent Gallery, 750-Mio.-$-Partnerfonds.</li>\n      <li><span class=\"chip good\">Deploy · DE</span> <strong>Souveräne KI</strong>: Telekom × NVIDIA Industrial AI Cloud (Go-live Q1 2026) und „OpenAI für Deutschland\" (SAP) bauen den deutschen On-Prem-Stack.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Frist (2. Aug. 2026) politisch auf Dez. 2027 verschoben — formal aber noch nicht beschlossen.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>LatAm-Infra</strong>: Vertical Data × Ascenty bauen AI-Rechenkapazität in BR/CL/MX/CO aus (15. Juni).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei echte Juni-Schlagzeilen tragen den Tag: OpenAI hat eine vertrauliche S-1 eingereicht und peilt einen Billionen-Börsengang an, und Apple lässt sein neues Siri ab WWDC von Googles Gemini denken. Beides sind keine Labor-Demos mehr — das ist angewandte KI im Produkt-Maßstab. Darunter aber dieselbe nüchterne Wahrheit wie jede Woche: viele Firmen haben Agenten ausgerollt, kaum eine sieht harten ROI. Genau diese Lücke ist twiceDs Markt.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>OpenAI</strong>: vertrauliche S-1 bei der SEC (8.–9. Juni), Ziel 852 Mrd.–1 Bio. $, Listing Q4 2026 — Zahlen bleiben aber geheim.</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Apple × Google</strong>: das neue Siri läuft auf Gemini (WWDC, 8. Juni); ~1 Mrd. $/Jahr laut Bloomberg-Berichten, nicht primär bestätigt.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>ROI-Lücke</strong>: 97 % haben KI-Agenten ausgerollt, nur 29 % sehen signifikanten ROI, 48 % nennen es „massive Enttäuschung\" (Writer, n=2.400).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google → Anthropic</strong> (24. April, Kontext): bis 40 Mrd. $, ~14 % Anteil, Bewertung 350 Mrd. $.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Gemini Enterprise</strong> (22.–23. April, Kontext): 60+ Partner-Agenten im Agent Gallery, 750-Mio.-$-Partnerfonds.</li>\n      <li><span class=\"chip good\">Deploy · DE</span> <strong>Souveräne KI</strong>: Telekom × NVIDIA Industrial AI Cloud (Go-live Q1 2026) und „OpenAI für Deutschland\" (SAP) bauen den deutschen On-Prem-Stack.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Frist (2. Aug. 2026) politisch auf Dez. 2027 verschoben — formal aber noch nicht beschlossen.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>LatAm-Infra</strong>: Vertical Data × Ascenty bauen AI-Rechenkapazität in BR/CL/MX/CO aus (15. Juni).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two genuine June headlines anchor the day: OpenAI has filed a confidential S-1 and is targeting a trillion-dollar IPO, and Apple is letting its new Siri think with Google's Gemini starting at WWDC. Neither is a lab demo anymore—this is AI in product-scale deployment. But underneath sits the same sober truth every week: many firms have rolled out agents, yet hardly any see hard ROI. That exact gap is twiceD's market.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>OpenAI</strong>: confidential S-1 filed with SEC (Jun 8–9), target $852B–$1T valuation, listing Q4 2026 — figures remain confidential.</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Apple × Google</strong>: new Siri runs on Gemini (WWDC, Jun 8); ~$1B/year per Bloomberg reports, not officially confirmed.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>ROI gap</strong>: 97 % have rolled out AI agents, only 29 % see significant ROI, 48 % call it a \"massive disappointment\" (Writer, n=2,400).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google → Anthropic</strong> (Apr 24, context): up to $40B, ~14 % stake, $350B valuation.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Gemini Enterprise</strong> (Apr 22–23, context): 60+ partner-built agents in Agent Gallery, $750M partner fund.</li>\n      <li><span class=\"chip good\">Deploy · DE</span> <strong>Sovereign AI</strong>: Telekom × NVIDIA Industrial AI Cloud (go-live Q1 2026) and \"OpenAI for Germany\" (SAP) build Germany's on-prem stack.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: high-risk deadline (Aug 2, 2026) politically deferred to Dec 2, 2027—formally still pending.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>LatAm Infrastructure</strong>: Vertical Data × Ascenty build AI compute capacity across BR/CL/MX/CO (Jun 15).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas manchetes reais de junho sustentam o dia: a OpenAI protocolou um S-1 confidencial e mira uma abertura de capital de trilhão de dólares, e a Apple deixa sua nova Siri pensar com o Gemini do Google a partir da WWDC. Ambas deixaram de ser demos de laboratório — isso é IA aplicada em escala de produto. Por baixo, porém, a mesma verdade sóbria de toda semana: muitas empresas implantaram agentes, quase nenhuma vê ROI concreto. Exatamente essa lacuna é o mercado da twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>OpenAI</strong>: S-1 confidencial na SEC (8–9 de junho), meta de US$ 852 bi–US$ 1 tri, listagem no 4T 2026 — os números continuam secretos.</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Apple × Google</strong>: a nova Siri roda no Gemini (WWDC, 8 de junho); ~US$ 1 bi/ano segundo relatos da Bloomberg, sem confirmação primária.</li>\n      <li><span class=\"chip\">Estudo · Global</span> <strong>Lacuna de ROI</strong>: 97 % implantaram agentes de IA, só 29 % veem ROI significativo, 48 % chamam de \"decepção enorme\" (Writer, n=2.400).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google → Anthropic</strong> (24 de abril, contexto): até US$ 40 bi, ~14 % de participação, avaliação de US$ 350 bi.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Gemini Enterprise</strong> (22–23 de abril, contexto): 60+ agentes parceiros na Agent Gallery, fundo de parceiros de US$ 750 mi.</li>\n      <li><span class=\"chip good\">Deploy · DE</span> <strong>IA Soberana</strong>: Telekom × NVIDIA Industrial AI Cloud (go-live 1T 2026) e \"OpenAI para a Alemanha\" (SAP) constroem o stack on-prem alemão.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: prazo de alto risco (2 de ago. de 2026) politicamente adiado para dez. de 2027 — ainda não formalmente aprovado.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Infraestrutura LatAm</strong>: Vertical Data × Ascenty expandem capacidade de computação de IA em BR/CL/MX/CO (15 de junho).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos titulares reales de junio sostienen el día: OpenAI presentó un S-1 confidencial y apunta a una salida a bolsa de un billón de dólares, y Apple deja que su nueva Siri piense con el Gemini de Google a partir de la WWDC. Ninguna es ya una demo de laboratorio — es IA aplicada a escala de producto. Debajo, sin embargo, la misma verdad sobria de cada semana: muchas empresas han desplegado agentes, casi ninguna ve ROI real. Exactamente esa brecha es el mercado de twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A · US</span> <strong>OpenAI</strong>: S-1 confidencial ante la SEC (8–9 de junio), meta de US$ 852,000 mi–US$ 1 bi, listado en 4T 2026 — los números siguen siendo secretos.</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Apple × Google</strong>: la nueva Siri corre sobre Gemini (WWDC, 8 de junio); ~US$ 1,000 mi/año según reportes de Bloomberg, sin confirmación primaria.</li>\n      <li><span class=\"chip\">Estudio · Global</span> <strong>Brecha de ROI</strong>: 97 % han desplegado agentes de IA, solo 29 % ven ROI significativo, 48 % lo llaman \"decepción enorme\" (Writer, n=2.400).</li>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Google → Anthropic</strong> (24 de abril, contexto): hasta US$ 40,000 mi, ~14 % de participación, valuación de US$ 350,000 mi.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Gemini Enterprise</strong> (22–23 de abril, contexto): 60+ agentes de socios en Agent Gallery, fondo de socios de US$ 750 mi.</li>\n      <li><span class=\"chip good\">Deploy · DE</span> <strong>IA Soberana</strong>: Telekom × NVIDIA Industrial AI Cloud (go-live 1T 2026) y \"OpenAI para Alemania\" (SAP) construyen el stack on-prem alemán.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: plazo de alto riesgo (2 de ago. de 2026) políticamente aplazado a dic. de 2027 — aún sin aprobación formal.</li>\n      <li><span class=\"chip good\">Deploy · BR</span> <strong>Infraestructura LatAm</strong>: Vertical Data × Ascenty amplían capacidad de cómputo de IA en BR/CL/MX/CO (15 de junio).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Aktiver Board-Tag: 100 gescorte Listings, elf davon mit Fit-Score 80+. Oben steht ein Employee-Treffer, der Daniels tiefste Nische trifft — Java plus Industrial-IoT bei einem DACH-Frontier-AI-Lab. Darunter ein dichtes twiceD-Feld aus Java-/Angular-Contracts. Zwei TED-Ausschreibungen laufen diese und nächste Woche aus — eine davon allein bietbar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha „Senior Java – Industrial IoT Platform\"</strong>: Fit 88, Top-Match des Tages. DACH-Frontier-AI plus Java+IoT-Stack (Z-Wave/MQTT/Spring Boot), remote-DE-freundlich, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Zwei frische Java-Contracts diese Woche</strong>: Computer Futures E-Mobility-Backend (Fit 83, 100 % remote, ASAP–Dez 2026) und BloomNow Fullstack Java/Angular/Azure (Fit 81, ASAP, 3 Monate).</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Los 1 (373604-2026)</strong>: €320k-Budget, Java/Web/Open-Source — klein genug für twiceD allein. Frist Mo 29.06, zwölf Tage.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: Schätzwert €13M, Stack passt, aber Umsatz-/Clearance-Schwelle → Partner nötig. Frist Di 30.06, dreizehn Tage.</li>\n      <li><span class=\"chip good\">TED</span> <strong>Vier neue Ausschreibungen heute gefunden</strong>: Bundes-Python-Rahmen, gematik ISiK, interne Entwicklungsplattform, internes Kommunikationstool — drei davon Partner-/Skip-Klasse.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nischen-Premium aktiv</strong>: Smart-Home- und Automotive-Java-Contracts im Band 110–140 €/h — Daniels höchste Match-Stärke, oberes Marktband.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains streut sechs Dev-Tools-Rollen ein</strong>: Forward-Deployed-Engineer und AI-Lead-Stellen, Remote-DE, JVM/agentic-Tooling — Intrigue-getrieben im Board.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Board liegt auf/über Markt</strong>: Freelancer-Kompass pegt DACH-IT auf 105 €/h-Schnitt; Board-Java-Band 90–120 €/h, IoT/Automotive 110–140 €/h.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Sechs High-Stack-Rollen sichtbar, aber blockiert</strong>: vier SÜ2-Clearance (DE-Wohnsitz-Pflicht) und zwei CH-Onsite — Konflikt mit BR-Wohnsitz, im Board mit niedrigem Score geführt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Aktiver Board-Tag: 100 gescorte Listings, elf davon mit Fit-Score 80+. Oben steht ein Employee-Treffer, der Daniels tiefste Nische trifft — Java plus Industrial-IoT bei einem DACH-Frontier-AI-Lab. Darunter ein dichtes twiceD-Feld aus Java-/Angular-Contracts. Zwei TED-Ausschreibungen laufen diese und nächste Woche aus — eine davon allein bietbar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha „Senior Java – Industrial IoT Platform\"</strong>: Fit 88, Top-Match des Tages. DACH-Frontier-AI plus Java+IoT-Stack (Z-Wave/MQTT/Spring Boot), remote-DE-freundlich, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Zwei frische Java-Contracts diese Woche</strong>: Computer Futures E-Mobility-Backend (Fit 83, 100 % remote, ASAP–Dez 2026) und BloomNow Fullstack Java/Angular/Azure (Fit 81, ASAP, 3 Monate).</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Los 1 (373604-2026)</strong>: €320k-Budget, Java/Web/Open-Source — klein genug für twiceD allein. Frist Mo 29.06, zwölf Tage.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: Schätzwert €13M, Stack passt, aber Umsatz-/Clearance-Schwelle → Partner nötig. Frist Di 30.06, dreizehn Tage.</li>\n      <li><span class=\"chip good\">TED</span> <strong>Vier neue Ausschreibungen heute gefunden</strong>: Bundes-Python-Rahmen, gematik ISiK, interne Entwicklungsplattform, internes Kommunikationstool — drei davon Partner-/Skip-Klasse.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nischen-Premium aktiv</strong>: Smart-Home- und Automotive-Java-Contracts im Band 110–140 €/h — Daniels höchste Match-Stärke, oberes Marktband.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains streut sechs Dev-Tools-Rollen ein</strong>: Forward-Deployed-Engineer und AI-Lead-Stellen, Remote-DE, JVM/agentic-Tooling — Intrigue-getrieben im Board.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Board liegt auf/über Markt</strong>: Freelancer-Kompass pegt DACH-IT auf 105 €/h-Schnitt; Board-Java-Band 90–120 €/h, IoT/Automotive 110–140 €/h.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Sechs High-Stack-Rollen sichtbar, aber blockiert</strong>: vier SÜ2-Clearance (DE-Wohnsitz-Pflicht) und zwei CH-Onsite — Konflikt mit BR-Wohnsitz, im Board mit niedrigem Score geführt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Active board day: 100 scored listings, eleven with a fit score of 80+. Top of the board is an employee hit squarely in Daniel's deepest niche — Java plus Industrial IoT at a DACH frontier-AI lab. Below that, a dense twiceD field of Java/Angular contracts. Two TED tenders expire this week and next — one of them biddable solo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha \"Senior Java – Industrial IoT Platform\"</strong>: Fit 88, top match of the day. DACH frontier-AI plus Java+IoT stack (Z-Wave/MQTT/Spring Boot), remote-DE friendly, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Two fresh Java contracts this week</strong>: Computer Futures E-Mobility backend (Fit 83, 100% remote, ASAP–Dec 2026) and BloomNow fullstack Java/Angular/Azure (Fit 81, ASAP, 3 months).</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Lot 1 (373604-2026)</strong>: €320k budget, Java/Web/open-source — small enough for twiceD alone. Deadline Mon 29.06, twelve days.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: Estimated value €13M, stack fits, but revenue/clearance threshold → partner required. Deadline Tue 30.06, thirteen days.</li>\n      <li><span class=\"chip good\">TED</span> <strong>Four new tenders found today</strong>: Federal Python framework, gematik ISiK, internal development platform, internal communication tool — three of them partner/skip class.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Niche premium active</strong>: Smart-home and automotive Java contracts in the 110–140 €/h band — Daniel's highest match strength, top of market.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains adds six dev-tools roles</strong>: Forward-deployed engineer and AI lead positions, remote-DE, JVM/agentic tooling — intrigue-driven on the board.</li>\n      <li><span class=\"chip\">Market</span> <strong>Board at or above market</strong>: Freelancer-Kompass pegs DACH IT at 105 €/h average; board Java band 90–120 €/h, IoT/Automotive 110–140 €/h.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Six high-stack roles visible but blocked</strong>: four SÜ2 clearance (German residency required) and two CH on-site — conflicts with BR residency, carried on board with low scores.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dia ativo no board: 100 vagas pontuadas, onze delas com fit score 80+. No topo, uma vaga de emprego que acerta direto no nicho mais profundo de Daniel — Java mais Industrial IoT em um lab de IA de fronteira no DACH. Abaixo, um campo denso de contratos Java/Angular pela twiceD. Dois editais TED expiram esta e na próxima semana — um deles acessível para proposta solo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Emprego</span> <strong>Aleph Alpha \"Senior Java – Industrial IoT Platform\"</strong>: Fit 88, melhor match do dia. IA de fronteira no DACH, stack Java+IoT (Z-Wave/MQTT/Spring Boot), compatível com remoto-DE, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dois contratos Java frescos esta semana</strong>: Computer Futures backend E-Mobility (Fit 83, 100% remoto, imediato–dez 2026) e BloomNow fullstack Java/Angular/Azure (Fit 81, imediato, 3 meses).</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Lote 1 (373604-2026)</strong>: orçamento €320k, Java/Web/open-source — pequeno o suficiente para a twiceD sozinha. Prazo seg 29/06, doze dias.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: valor estimado €13M, stack compatível, mas exige faturamento/clearance → parceiro necessário. Prazo ter 30/06, treze dias.</li>\n      <li><span class=\"chip good\">TED</span> <strong>Quatro novos editais encontrados hoje</strong>: framework Python federal, gematik ISiK, plataforma interna de desenvolvimento, ferramenta interna de comunicação — três deles na classe parceiro/skip.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Prêmio de nicho ativo</strong>: contratos Java smart-home e automotivo na faixa 110–140 €/h — maior força de match de Daniel, topo de mercado.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains adiciona seis vagas de dev-tools</strong>: Forward-Deployed Engineer e vagas de AI Lead, remoto-DE, tooling JVM/agêntico — impulsionado por intrigância no board.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Board no nível do mercado ou acima</strong>: Freelancer-Kompass registra média DACH-TI em 105 €/h; faixa Java no board 90–120 €/h, IoT/Automotivo 110–140 €/h.</li>\n      <li><span class=\"chip warn\">Bloqueado</span> <strong>Seis vagas high-stack visíveis, mas bloqueadas</strong>: quatro exigem clearance SÜ2 (residência na Alemanha obrigatória) e duas são presenciais na Suíça — conflito com residência no BR, mantidas no board com score baixo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Día activo en el board: 100 vacantes puntuadas, once de ellas con fit score 80+. Al frente hay una vacante de empleo que encaja justo en el nicho más profundo de Daniel — Java más Industrial IoT en un laboratorio de IA de frontera en DACH. Debajo, un campo denso de contratos Java/Angular para twiceD. Dos licitaciones TED vencen esta semana y la próxima — una se puede cotizar en solitario.</p>\n    <ul>\n      <li><span class=\"chip hot\">Empleo</span> <strong>Aleph Alpha \"Senior Java – Industrial IoT Platform\"</strong>: Fit 88, mejor match del día. IA de frontera en DACH, stack Java+IoT (Z-Wave/MQTT/Spring Boot), compatible con remoto-DE, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dos contratos Java frescos esta semana</strong>: Computer Futures backend E-Mobility (Fit 83, 100% remoto, inmediato–dic 2026) y BloomNow fullstack Java/Angular/Azure (Fit 81, inmediato, 3 meses).</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Lote 1 (373604-2026)</strong>: presupuesto €320k, Java/Web/open-source — suficientemente pequeño para twiceD en solitario. Plazo lun 29.06, doce días.</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: valor estimado €13M, el stack es compatible, pero hay umbral de facturación/clearance → se necesita socio. Plazo mar 30.06, trece días.</li>\n      <li><span class=\"chip good\">TED</span> <strong>Cuatro nuevas licitaciones encontradas hoy</strong>: framework Python federal, gematik ISiK, plataforma interna de desarrollo, herramienta interna de comunicación — tres de ellas en clase socio/skip.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Prima de nicho activa</strong>: contratos Java de casa inteligente y automotriz en la banda 110–140 €/h — mayor fortaleza de match de Daniel, tope del mercado.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains agrega seis roles de dev-tools</strong>: Forward-Deployed Engineer y puestos de AI Lead, remoto-DE, tooling JVM/agéntico — impulsado por intriga en el board.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Board al nivel del mercado o por encima</strong>: Freelancer-Kompass registra un promedio DACH-TI de 105 €/h; banda Java en el board 90–120 €/h, IoT/Automotriz 110–140 €/h.</li>\n      <li><span class=\"chip warn\">Bloqueado</span> <strong>Seis roles high-stack visibles pero bloqueados</strong>: cuatro con clearance SÜ2 (residencia en Alemania obligatoria) y dos presenciales en Suiza — conflicto con residencia en BR, mantenidos en el board con score bajo.</li>\n    </ul></div>"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Mitten in der Gruppenphase der WM 2026 in Kanada, Mexiko und den USA — und während Brasilien in der heißen Tageszeit darauf wartet — ist das deutsche Auftaktspiel schon erledigt: 7:1 gegen Curaçao, der höchste DFB-WM-Sieg seit Langem. Heute Abend rollt Spieltag 2 weiter: England gegen Kroatien, Portugal gegen die DR Kongo. Und Messi hat gestern getan, was vor ihm nur Klose konnte.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Deutschland 7:1 Curaçao</strong>: Auftakt-Gala in Houston, Havertz doppelt. DFB führt Gruppe E mit +6.</li>\n      <li><span class=\"chip hot\">HEUTE</span> <strong>England – Kroatien</strong> heute 22:00 MESZ / 17:00 BRT in Arlington — Anstoß steht noch aus.</li>\n      <li><span class=\"chip hot\">HEUTE</span> <strong>Portugal – DR Kongo</strong> heute 19:00 MESZ / 14:00 BRT in Houston — Anstoß steht noch aus.</li>\n      <li><span class=\"chip\">WM</span> <strong>Messi-Hattrick</strong>: Argentinien 3:0 gegen Algerien, mit 38 ältester WM-Dreierpacker, 16. WM-Tor = Klose-Rekord egalisiert.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 1:1 Marokko</strong>: Vinícius gleicht aus, Seleção noch ohne Sieg. Freitag gegen Haiti (Spiel 2).</li>\n      <li><span class=\"chip\">WM</span> <strong>Mbappé bricht Frankreich-Rekord</strong>: 14 WM-Tore, mehr als Just Fontaine. Frankreich 3:1 Senegal.</li>\n      <li><span class=\"chip\">WM</span> <strong>Österreich nach 36 Jahren</strong>: erster WM-Sieg seit 1990, 3:1 gegen Jordanien — Arnautović-Elfer in der 90.+12.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Adamu zu Schalke</strong>: SCF verkauft den Stürmer für rund 800.000 € — der einzige fixe Sommer-Move bisher.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Mid-group stage of the 2026 World Cup in Canada, Mexico, and the USA — and while Brazil waits in the midday heat — Germany's opening match is already done: 7-1 over Curaçao, the highest DFB World Cup win in years. Tonight, Day 2 continues rolling: England versus Croatia, Portugal versus the DR Congo. And Messi did yesterday what only Klose could do before him.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Germany 7-1 Curaçao</strong>: Dominant opener in Houston, Havertz with a brace. DFB leads Group E with +6.</li>\n      <li><span class=\"chip hot\">TODAY</span> <strong>England – Croatia</strong> today 22:00 MESZ / 17:00 BRT in Arlington — kickoff awaited.</li>\n      <li><span class=\"chip hot\">TODAY</span> <strong>Portugal – DR Congo</strong> today 19:00 MESZ / 14:00 BRT in Houston — kickoff awaited.</li>\n      <li><span class=\"chip\">WC</span> <strong>Messi hat-trick</strong>: Argentina 3-0 over Algeria, oldest World Cup hat-trick scorer at 38, 16th World Cup goal ties Klose record.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil 1-1 Morocco</strong>: Vinícius equalizes, Seleção still without a win. Friday vs. Haiti (Match 2).</li>\n      <li><span class=\"chip\">WC</span> <strong>Mbappé breaks France record</strong>: 14 World Cup goals, more than Just Fontaine. France 3-1 Senegal.</li>\n      <li><span class=\"chip\">WC</span> <strong>Austria after 36 years</strong>: first World Cup win since 1990, 3-1 over Jordan — Arnautović penalty in 90+12.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Adamu to Schalke</strong>: SCF sells striker for around €800k — the only confirmed summer move so far.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">No meio da fase de grupos da Copa do Mundo 2026 no Canadá, México e EUA — enquanto Brasil aguarda no calor do meio do dia — o jogo de abertura alemão já foi resolvido: 7 a 1 contra Curaçao, a maior vitória da DFB em Copa do Mundo em muitos anos. Hoje à noite, o Dia 2 segue: Inglaterra contra Croácia, Portugal contra a RD Congo. E ontem Messi fez o que antes dele apenas Klose conseguiu.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemanha 7:1 Curaçau</strong>: Partida de gala no início em Houston, Havertz marca duas vezes. DFB lidera o Grupo E com +6.</li>\n      <li><span class=\"chip hot\">HOJE</span> <strong>Inglaterra – Croácia</strong> hoje 22:00 MESZ / 17:00 BRT em Arlington — o apito ainda está por vir.</li>\n      <li><span class=\"chip hot\">HOJE</span> <strong>Portugal – RD Congo</strong> hoje 19:00 MESZ / 14:00 BRT em Houston — o apito ainda está por vir.</li>\n      <li><span class=\"chip\">CM</span> <strong>Trisal de Messi</strong>: Argentina 3 a 0 contra Argélia, aos 38 o marcador mais velho de trisal em Copa, gol 16 em Copa iguala recorde de Klose.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marrocos</strong>: Vinícius empata, Seleção ainda sem vitória. Sexta contra Haiti (Jogo 2).</li>\n      <li><span class=\"chip\">CM</span> <strong>Mbappé quebra recorde da França</strong>: 14 gols em Copa do Mundo, mais que Just Fontaine. França 3 a 1 Senegal.</li>\n      <li><span class=\"chip\">CM</span> <strong>Áustria após 36 anos</strong>: primeira vitória em Copa desde 1990, 3 a 1 contra Jordânia — pênalti de Arnautović aos 90+12.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Adamu para Schalke</strong>: SCF vende atacante por cerca de 800 mil € — o único movimento fixo do verão até agora.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">En plena fase de grupos de la Copa del Mundo 2026 en Canadá, México y EE.UU. — mientras Brasil aguarda en el calor del mediodía — el partido inaugural de Alemania ya está resuelto: 7 a 1 sobre Curaçao, la mayor victoria de la DFB en Copa del Mundo en años. Esta noche, la Jornada 2 continúa: Inglaterra contra Croacia, Portugal contra la RD Congo. Y ayer Messi hizo lo que antes de él solo Klose logró.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemania 7:1 Curaçao</strong>: Gala inaugural en Houston, Havertz marca dos. La DFB lidera el Grupo E con +6.</li>\n      <li><span class=\"chip hot\">HOY</span> <strong>Inglaterra – Croacia</strong> hoy 22:00 MESZ / 17:00 BRT en Arlington — el silbato aún está por sonar.</li>\n      <li><span class=\"chip hot\">HOY</span> <strong>Portugal – RD Congo</strong> hoy 19:00 MESZ / 14:00 BRT en Houston — el silbato aún está por sonar.</li>\n      <li><span class=\"chip\">CM</span> <strong>Triplete de Messi</strong>: Argentina 3 a 0 sobre Argelia, a los 38 años el marcador más viejo de un triplete en Copa, gol 16 en Copa iguala el récord de Klose.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marruecos</strong>: Vinícius iguala, Selección aún sin victoria. Viernes contra Haití (Partido 2).</li>\n      <li><span class=\"chip\">CM</span> <strong>Mbappé quiebra el récord de Francia</strong>: 14 goles en Copa del Mundo, más que Just Fontaine. Francia 3 a 1 Senegal.</li>\n      <li><span class=\"chip\">CM</span> <strong>Austria tras 36 años</strong>: primera victoria en Copa desde 1990, 3 a 1 sobre Jordania — penal de Arnautović a los 90+12.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Adamu a Schalke</strong>: SCF vende al delantero por alrededor de 800 mil € — el único movimiento confirmado del verano hasta ahora.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein dichtes Wochenende liegt hinter dem Motorsport-Kalender: In Le Mans gewann <strong>Toyota</strong> das berühmte 24-Stunden-Rennen zum ersten Mal seit 2022 — der <strong>#7</strong> mit Conway/Kobayashi/de&nbsp;Vries setzte sich nach 24 Stunden um knapp <strong>11&nbsp;Sekunden</strong> vor einem BMW durch. Parallel hat die Formel 1 in Barcelona ihre WM durchgeschüttelt: <strong>Lewis Hamiltons erster Ferrari-Sieg</strong> und das überraschende Aus von WM-Leader <strong>Kimi Antonelli</strong> auf P2 ließen dessen Vorsprung auf <strong>41&nbsp;Punkte</strong> schrumpfen (156 zu 115). Die nächsten sieben Tage gehören dann den anderen Serien: <strong>MotoGP</strong> in Brno, <strong>IndyCar</strong> in Road America und die <strong>Formel E</strong> erstmals seit 2019 wieder in Sanya. Die F1 pausiert noch bis Spielberg (26.–28.06.). Alle Zeiten unten mit Streckenzeit, BRT und MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">LE MANS</span> <strong>Toyota #7 gewinnt die 24h von Le Mans</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries, 381&nbsp;Runden, +10,913&nbsp;s vor BMW #20. Erster Toyota-Le-Mans-Sieg seit 2022.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota führt die Hersteller-WM</strong> mit 132&nbsp;Pkt vor BMW (96) und Ferrari (62). Nächster Lauf: <strong>6h von São Paulo, 10.07.</strong> (Brasilien!).</li>\n      <li><span class=\"chip hot\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong> in Barcelona (Lauf 7/22, So 14.06.). Russell P2, Norris P3 — erstes rein-britisches Podium seit 1968.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106). Konstrukteure: <strong>Mercedes 262</strong> vor Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Tschechien-GP, Brno, 19.–21.06.</strong> (Sprint-Format). Rennen So 21.06. <strong>14:00 CEST / 09:00 BRT</strong>. Bezzecchi führt mit 180 Pkt vor Martin (160).</li>\n      <li><span class=\"chip\">INDYCAR</span> <strong>Road America, So 21.06.</strong> <strong>14:00 EDT / 15:00 BRT</strong>. Palou führt mit 49&nbsp;Pkt Vorsprung auf Kirkwood (342 zu 293).</li>\n      <li><span class=\"chip\">FORMEL E</span> <strong>Sanya ePrix (Lauf 11), China — Rennen Sa 20.06. 15:05 CST / 04:05 BRT</strong>. Evans führt mit 128&nbsp;Pkt. Erste Sanya-Rückkehr seit 2019.</li>\n      <li><span class=\"chip\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/22), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen So 28.06. <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein dichtes Wochenende liegt hinter dem Motorsport-Kalender: In Le Mans gewann <strong>Toyota</strong> das berühmte 24-Stunden-Rennen zum ersten Mal seit 2022 — der <strong>#7</strong> mit Conway/Kobayashi/de&nbsp;Vries setzte sich nach 24 Stunden um knapp <strong>11&nbsp;Sekunden</strong> vor einem BMW durch. Parallel hat die Formel 1 in Barcelona ihre WM durchgeschüttelt: <strong>Lewis Hamiltons erster Ferrari-Sieg</strong> und das überraschende Aus von WM-Leader <strong>Kimi Antonelli</strong> auf P2 ließen dessen Vorsprung auf <strong>41&nbsp;Punkte</strong> schrumpfen (156 zu 115). Die nächsten sieben Tage gehören dann den anderen Serien: <strong>MotoGP</strong> in Brno, <strong>IndyCar</strong> in Road America und die <strong>Formel E</strong> erstmals seit 2019 wieder in Sanya. Die F1 pausiert noch bis Spielberg (26.–28.06.). Alle Zeiten unten mit Streckenzeit, BRT und MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">LE MANS</span> <strong>Toyota #7 gewinnt die 24h von Le Mans</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries, 381&nbsp;Runden, +10,913&nbsp;s vor BMW #20. Erster Toyota-Le-Mans-Sieg seit 2022.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota führt die Hersteller-WM</strong> mit 132&nbsp;Pkt vor BMW (96) und Ferrari (62). Nächster Lauf: <strong>6h von São Paulo, 10.07.</strong> (Brasilien!).</li>\n      <li><span class=\"chip hot\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong> in Barcelona (Lauf 7/22, So 14.06.). Russell P2, Norris P3 — erstes rein-britisches Podium seit 1968.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106). Konstrukteure: <strong>Mercedes 262</strong> vor Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Tschechien-GP, Brno, 19.–21.06.</strong> (Sprint-Format). Rennen So 21.06. <strong>14:00 CEST / 09:00 BRT</strong>. Bezzecchi führt mit 180 Pkt vor Martin (160).</li>\n      <li><span class=\"chip\">INDYCAR</span> <strong>Road America, So 21.06.</strong> <strong>14:00 EDT / 15:00 BRT</strong>. Palou führt mit 49&nbsp;Pkt Vorsprung auf Kirkwood (342 zu 293).</li>\n      <li><span class=\"chip\">FORMEL E</span> <strong>Sanya ePrix (Lauf 11), China — Rennen Sa 20.06. 15:05 CST / 04:05 BRT</strong>. Evans führt mit 128&nbsp;Pkt. Erste Sanya-Rückkehr seit 2019.</li>\n      <li><span class=\"chip\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/22), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen So 28.06. <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A packed weekend in motorsport: at Le Mans, <strong>Toyota</strong> won the legendary 24-hour race for the first time since 2022 — the <strong>#7</strong> with Conway/Kobayashi/de&nbsp;Vries prevailed after 24 hours by just <strong>11&nbsp;seconds</strong> ahead of a BMW. Meanwhile, Formula 1 in Barcelona shook up the championship: <strong>Lewis Hamilton's first Ferrari victory</strong> and the shock retirement of championship leader <strong>Kimi Antonelli</strong> from P2 shrunk his lead to just <strong>41&nbsp;points</strong> (156 to 115). The next seven days belong to the other series: <strong>MotoGP</strong> in Brno, <strong>IndyCar</strong> at Road America, and <strong>Formula E</strong> returning to Sanya for the first time since 2019. F1 pauses until Spielberg (June 26–28). All times below with track time, BRT, and CEST.</p>\n    <ul>\n      <li><span class=\"chip hot\">LE MANS</span> <strong>Toyota #7 wins the 24 Hours of Le Mans</strong> (June 13–14): Conway/Kobayashi/de&nbsp;Vries, 381&nbsp;laps, +10.913&nbsp;s ahead of BMW #20. Toyota's first Le Mans win since 2022.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota leads manufacturers' championship</strong> with 132&nbsp;pts ahead of BMW (96) and Ferrari (62). Next round: <strong>6 Hours of São Paulo, July 10</strong> (Brazil!).</li>\n      <li><span class=\"chip hot\">F1 WIN</span> <strong>Hamilton's first Ferrari victory</strong> in Barcelona (Round 7/22, Sun June 14). Russell P2, Norris P3 — first all-British podium since 1968.</li>\n      <li><span class=\"chip\">F1 CHAMPIONSHIP</span> <strong>Antonelli leads with 156 pts</strong> ahead of Hamilton (115, −41) and Russell (106). Constructors: <strong>Mercedes 262</strong> ahead of Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>Czech GP, Brno, June 19–21</strong> (sprint format). Race Sun June 21 <strong>14:00 CEST / 09:00 BRT</strong>. Bezzecchi leads with 180 pts ahead of Martin (160).</li>\n      <li><span class=\"chip\">INDYCAR</span> <strong>Road America, Sun June 21</strong> <strong>14:00 EDT / 15:00 BRT</strong>. Palou leads by 49&nbsp;pts over Kirkwood (342 to 293).</li>\n      <li><span class=\"chip\">FORMULA E</span> <strong>Sanya ePrix (Round 11), China — Race Sat June 20 15:05 CST / 04:05 BRT</strong>. Evans leads with 128&nbsp;pts. First Sanya return since 2019.</li>\n      <li><span class=\"chip\">NEXT F1</span> <strong>Austrian GP (Round 8/22), Red Bull Ring</strong>, June 26–28, no sprint. Race Sun June 28 <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um fim de semana intenso ficou para trás no calendário do motorsport: em Le Mans, <strong>Toyota</strong> venceu a famosa corrida de 24 horas pela primeira vez desde 2022 — o carro <strong>#7</strong> com Conway/Kobayashi/de&nbsp;Vries venceu por apenas <strong>11&nbsp;segundos</strong> de diferença para um BMW após 24 horas. Paralelamente, a Fórmula 1 em Barcelona sacudiu seu campeonato: a <strong>primeira vitória Ferrari de Hamilton</strong> e a aposentadoria surpresa do líder de campeonato <strong>Kimi Antonelli</strong> da P2 encolheram sua vantagem para apenas <strong>41&nbsp;pontos</strong> (156 a 115). Os próximos sete dias pertencem às outras séries: <strong>MotoGP</strong> em Brno, <strong>IndyCar</strong> em Road America e <strong>Fórmula E</strong> pela primeira vez desde 2019 em Sanya. F1 descansa até Spielberg (26–28.06.). Todos os horários abaixo com hora local da pista, BRT e CEST.</p>\n    <ul>\n      <li><span class=\"chip hot\">LE MANS</span> <strong>Toyota #7 vence as 24 Horas de Le Mans</strong> (13–14.06.): Conway/Kobayashi/de&nbsp;Vries, 381&nbsp;voltas, +10,913&nbsp;s à frente do BMW #20. Primeira vitória Toyota em Le Mans desde 2022.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota lidera o campeonato de construtores</strong> com 132&nbsp;pts à frente de BMW (96) e Ferrari (62). Próxima etapa: <strong>6h de São Paulo, 10.07.</strong> (Brasil!).</li>\n      <li><span class=\"chip hot\">VITÓRIA F1</span> <strong>Primeira vitória Ferrari de Hamilton</strong> em Barcelona (prova 7/22, dom 14.06.). Russell P2, Norris P3 — primeiro pódio totalmente britânico desde 1968.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera com 156 pts</strong> à frente de Hamilton (115, −41) e Russell (106). Construtores: <strong>Mercedes 262</strong> à frente de Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>GP da República Tcheca, Brno, 19–21.06.</strong> (formato sprint). Corrida dom 21.06. <strong>14:00 CEST / 09:00 BRT</strong>. Bezzecchi lidera com 180 pts à frente de Martin (160).</li>\n      <li><span class=\"chip\">INDYCAR</span> <strong>Road America, dom 21.06.</strong> <strong>14:00 EDT / 15:00 BRT</strong>. Palou lidera com 49&nbsp;pts de vantagem sobre Kirkwood (342 a 293).</li>\n      <li><span class=\"chip\">FÓRMULA E</span> <strong>ePrix de Sanya (prova 11), China — corrida sáb 20.06. 15:05 CST / 04:05 BRT</strong>. Evans lidera com 128&nbsp;pts. Primeira volta de Sanya desde 2019.</li>\n      <li><span class=\"chip\">PRÓXIMA F1</span> <strong>GP da Áustria (prova 8/22), Red Bull Ring</strong>, 26–28.06., sem sprint. Corrida dom 28.06. <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un fin de semana repleto quedó atrás en el calendario del motorsport: en Le Mans, <strong>Toyota</strong> ganó la famosa carrera de 24 horas por primera vez desde 2022 — el auto <strong>#7</strong> con Conway/Kobayashi/de&nbsp;Vries se impuso por apenas <strong>11&nbsp;segundos</strong> sobre un BMW después de 24 horas. Paralelamente, la Fórmula 1 en Barcelona revolvió su campeonato: la <strong>primera victoria Ferrari de Hamilton</strong> y el sorpresivo abandono del líder de campeonato <strong>Kimi Antonelli</strong> desde P2 encogieron su ventaja a apenas <strong>41&nbsp;puntos</strong> (156 contra 115). Los próximos siete días pertenecen a las otras series: <strong>MotoGP</strong> en Brno, <strong>IndyCar</strong> en Road America y <strong>Fórmula E</strong> por primera vez desde 2019 en Sanya. F1 descansa hasta Spielberg (26–28.06.). Todos los horarios abajo con hora de pista, BRT y CEST.</p>\n    <ul>\n      <li><span class=\"chip hot\">LE MANS</span> <strong>Toyota #7 gana las 24 Horas de Le Mans</strong> (13–14.06.): Conway/Kobayashi/de&nbsp;Vries, 381&nbsp;vueltas, +10,913&nbsp;s sobre BMW #20. Primera victoria Toyota en Le Mans desde 2022.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota lidera el campeonato de constructores</strong> con 132&nbsp;pts sobre BMW (96) y Ferrari (62). Próxima ronda: <strong>6h de São Paulo, 10.07.</strong> (¡Brasil!).</li>\n      <li><span class=\"chip hot\">VICTORIA F1</span> <strong>Primera victoria Ferrari de Hamilton</strong> en Barcelona (carrera 7/22, dom 14.06.). Russell P2, Norris P3 — primer podio puramente británico desde 1968.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera con 156 pts</strong> sobre Hamilton (115, −41) y Russell (106). Constructores: <strong>Mercedes 262</strong> sobre Ferrari 190, McLaren 141.</li>\n      <li><span class=\"chip good\">MOTOGP</span> <strong>GP Checo, Brno, 19–21.06.</strong> (formato sprint). Carrera dom 21.06. <strong>14:00 CEST / 09:00 BRT</strong>. Bezzecchi lidera con 180 pts sobre Martin (160).</li>\n      <li><span class=\"chip\">INDYCAR</span> <strong>Road America, dom 21.06.</strong> <strong>14:00 EDT / 15:00 BRT</strong>. Palou lidera con 49&nbsp;pts de ventaja sobre Kirkwood (342 contra 293).</li>\n      <li><span class=\"chip\">FÓRMULA E</span> <strong>ePrix de Sanya (carrera 11), China — carrera sab 20.06. 15:05 CST / 04:05 BRT</strong>. Evans lidera con 128&nbsp;pts. Primer regreso a Sanya desde 2019.</li>\n      <li><span class=\"chip\">PRÓXIMA F1</span> <strong>GP de Austria (carrera 8/22), Red Bull Ring</strong>, 26–28.06., sin sprint. Carrera dom 28.06. <strong>15:00 CEST / 10:00 BRT</strong>.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Mittwoch, 17. Juni. Brasilien steckt mitten im Winter-Höhepunkt der Atemwegs-Saison — und mit einem erst einen Monat alten Baby im Haus ist das diese Woche der wichtigste Punkt im Brief, vor allem Aktivitäten und Wochenende. Dazu: ein kostenloser Clown-Auftritt 30 km weiter, der São-João-Festas-Höhepunkt und ein nasser Samstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>SRAG/VSR-Anstieg</strong>: 18 Bundesstaaten (inkl. Paraná) im Aufwärtstrend, VSR trifft vor allem Kinder unter 2 — Baby-Schutz jetzt ernst nehmen.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>Palhaço Ritalino, gratis</strong>: Kinder-Show am Sa 20. + So 21. Juni im CAT Jacarezinho (~30 km), freier Eintritt, alle Altersstufen.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Nasser Samstag</strong>: Sa 20.06. ~90 % Regen (Einzelquelle), So 21.06. trocken — Outdoor lieber auf Sonntag legen.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festas Juninas auf dem Höhepunkt</strong>: São João am 24.06.; Festa in Cambé am 20.–21.06. (gratis), dazu Pfarr- und Schul-Festas in der Region.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Juli-Ferien</strong>: recesso escolar 13.–24. Juli, Unterricht wieder ab 27. Juli (SEED-Resolução 6.494/2025) — Urlaubsplanung lohnt jetzt.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue ruhig</strong>: Paraná 2026 deutlich unter Vorjahr — kein aktueller Alarm (letzter veröffentlichter Vergleich: April).</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Londrina-Radar</strong>: Festas-Juninas-Kalender der Stadt läuft den ganzen Juni/Juli, kostenlos und über Schulen/Pfarreien verteilt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Mittwoch, 17. Juni. Brasilien steckt mitten im Winter-Höhepunkt der Atemwegs-Saison — und mit einem erst einen Monat alten Baby im Haus ist das diese Woche der wichtigste Punkt im Brief, vor allem Aktivitäten und Wochenende. Dazu: ein kostenloser Clown-Auftritt 30 km weiter, der São-João-Festas-Höhepunkt und ein nasser Samstag.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>SRAG/VSR-Anstieg</strong>: 18 Bundesstaaten (inkl. Paraná) im Aufwärtstrend, VSR trifft vor allem Kinder unter 2 — Baby-Schutz jetzt ernst nehmen.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>Palhaço Ritalino, gratis</strong>: Kinder-Show am Sa 20. + So 21. Juni im CAT Jacarezinho (~30 km), freier Eintritt, alle Altersstufen.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Nasser Samstag</strong>: Sa 20.06. ~90 % Regen (Einzelquelle), So 21.06. trocken — Outdoor lieber auf Sonntag legen.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festas Juninas auf dem Höhepunkt</strong>: São João am 24.06.; Festa in Cambé am 20.–21.06. (gratis), dazu Pfarr- und Schul-Festas in der Region.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Juli-Ferien</strong>: recesso escolar 13.–24. Juli, Unterricht wieder ab 27. Juli (SEED-Resolução 6.494/2025) — Urlaubsplanung lohnt jetzt.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue ruhig</strong>: Paraná 2026 deutlich unter Vorjahr — kein aktueller Alarm (letzter veröffentlichter Vergleich: April).</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Londrina-Radar</strong>: Festas-Juninas-Kalender der Stadt läuft den ganzen Juni/Juli, kostenlos und über Schulen/Pfarreien verteilt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Wednesday, June 17. Brazil is in the peak of winter respiratory season — and with a one-month-old baby in the house, that's the focus this week, especially for activities and weekend plans. Plus: a free clown show 30 km away, the peak of the June festivals, and a rainy Saturday.</p>\n    <ul>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>SRAG/RSV surge</strong>: 18 states (incl. Paraná) trending upward, RSV hits especially children under 2 — take baby protection seriously now.</li>\n      <li><span class=\"chip good\">EVENT</span> <strong>Palhaço Ritalino, free</strong>: Kids show Sat 20 + Sun 21 June at CAT Jacarezinho (~30 km), free entry, all ages.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Rainy Saturday</strong>: Sat 20.06. ~90% rain (single source), Sun 21.06. dry — plan outdoor activities for Sunday.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>June Festivals at peak</strong>: São João on June 24; Festival in Cambé June 20–21 (free), plus parish and school festivals throughout the region.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>July break</strong>: school recess July 13–24, classes resume July 27 (SEED Resolution 6.494/2025) — vacation planning is worthwhile now.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue quiet</strong>: Paraná 2026 well below last year — no current alert (latest published comparison: April).</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Londrina calendar</strong>: City's June Festivals schedule runs all June/July, free and distributed through schools/parishes.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Quarta-feira, 17 de junho. Brasil está no auge da temporada de inverno das infecções respiratórias — e com um bebê de apenas um mês em casa, esse é o ponto mais crítico da semana, especialmente para atividades e fim de semana. Além disso: apresentação de palhaço gratuita 30 km adiante, o auge das Festas Juninas e um sábado chuvoso.</p>\n    <ul>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Aumento de SRAG/VSR</strong>: 18 estados (incluindo Paraná) em tendência de alta; VSR afeta especialmente crianças menores de 2 anos — proteção do bebê é urgente agora.</li>\n      <li><span class=\"chip good\">EVENTO</span> <strong>Palhaço Ritalino, grátis</strong>: Show infantil sáb 20 + dom 21 de junho no CAT Jacarezinho (~30 km), entrada gratuita, todas as idades.</li>\n      <li><span class=\"chip\">TEMPO</span> <strong>Sábado chuvoso</strong>: Sáb 20/06 ~90% chuva (fonte única), dom 21/06 seco — deixe atividades ao ar livre para domingo.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Festas Juninas no auge</strong>: São João em 24/06; Festa em Cambé 20–21/06 (grátis), além de festas de paróquia e escola na região.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Férias de julho</strong>: recesso escolar 13–24 de julho, aulas retomam 27 de julho (Resolução SEED 6.494/2025) — tempo de planejar uma viagem.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue tranquila</strong>: Paraná em 2026 bem abaixo do ano anterior — sem alerta atual (última comparação publicada: abril).</li>\n      <li><span class=\"chip\">VIAGEM</span> <strong>Radar Londrina</strong>: Calendário de Festas Juninas da cidade corre por junho/julho inteiros, gratuito e distribuído por escolas/paróquias.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Miércoles, 17 de junio. Brasil está en el pico de la temporada invernal de infecciones respiratorias — y con un bebé de apenas un mes en casa, ese es el punto más crítico de la semana, especialmente para actividades y fin de semana. Además: presentación de payaso gratuita 30 km adelante, el pico de las Festas Juninas y un sábado lluvioso.</p>\n    <ul>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Aumento de SRAG/VSR</strong>: 18 estados (incluido Paraná) en tendencia al alza; VSR afecta especialmente a niños menores de 2 años — protección del bebé es urgente ahora.</li>\n      <li><span class=\"chip good\">EVENTO</span> <strong>Payaso Ritalino, gratis</strong>: Espectáculo infantil sáb 20 + dom 21 de junio en CAT Jacarezinho (~30 km), entrada gratuita, todas las edades.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Sábado lluvioso</strong>: Sáb 20/06 ~90% lluvia (fuente única), dom 21/06 seco — deja actividades al aire libre para domingo.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Festas Juninas en pleno apogeo</strong>: San Juan en 24/06; Fiesta en Cambé 20–21/06 (gratis), más fiestas parroquiales y escolares en la región.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Vacaciones de julio</strong>: receso escolar 13–24 de julio, clases reanudan 27 de julio (Resolución SEED 6.494/2025) — momento de planificar un viaje.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue tranquilo</strong>: Paraná 2026 muy por debajo del año anterior — sin alerta actual (última comparación publicada: abril).</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Radar Londrina</strong>: Calendario de Festas Juninas de la ciudad corre en junio/julio completos, gratuito y distribuido por escuelas/parroquias.</li>\n    </ul></div>"

 „eu <em>durmo</em>\" (o→u), ES „yo <em>duermo</em>\" (o→ue) + Pretérito „él <em>durmió</em>\".</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>café da manhã</strong> = „Frühstück\" (nicht „pequeno-almoço\", das ist Portugal). Und „a soneca\" = der Mittagsschlaf/das Nickerchen.</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>educar c→qu</strong>: „eu <em>eduquei</em> meu filho assim\" — vor -ei wird c zu qu (wie brincar → <em>brinquei</em>).</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Jetzt ist Schluss!</strong> = „<em>Chega!</em>\" (PT) / „<em>¡Ya basta!</em>\" (ES) — die wohl meistgesagte Eltern-Phrase.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Schnuller</strong> ↔ ES-MX „el <em>chupón</em>\" (nicht „chupete\", das ist Spanien) ↔ PT „a chupeta\".</li>\n    </ul></div>",

(function () {

  // DE is the canonical language (always present). EN/PT/ES are produced

  // given date, urlFor() and the home/sidebar renderers transparently
  // fall back to the DE version so the dashboard keeps working as

  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];

    const cat = M.categories.find(c => c.id === catId);
