      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die größte Story diese Woche ist keine Release, sondern ein Verschwinden: Anthropics neues Top-Coding-Modell Fable 5 wurde nach drei Tagen per US-Export-Direktive global abgeschaltet — Anthropic widerspricht öffentlich. Das reißt nicht nur das #2 der frischen Terminal-Bench-Liste aus dem Rennen, es betrifft dich als Nicht-US-Bürger direkt. Drumherum: Copilot stellt auf nutzungsbasierte Abrechnung um, Google macht die Gemini CLI dicht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 &amp; Mythos 5 global abgeschaltet</strong>: US-Export-Direktive vom 12.06.; sperrt explizit „foreign nationals\" — also auch dich. Anthropic widerspricht.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1</strong>: Codex CLI + GPT-5.5 führt mit 83,4 %; Claude Code + Fable 5 zweiter mit 83,1 % — aber das Modell gibt's nicht mehr.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: seit 01.06. nutzungsbasierte „AI Credits\" für alle Pläne — 1 Credit = 1 US-Cent. Code-Completion bleibt frei.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini CLI tot</strong>: Free/Pro/Ultra seit 18.06. abgeschaltet, ersetzt durch closed-source Antigravity CLI — Gratis-Kontingent angeblich von 1.000 auf ~20 Anfragen/Tag.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf ist jetzt Devin Desktop</strong>: Cascade-EOL 01.07., neuer Rust-Agent „Devin Local\", ACP-Support für Fremd-Agenten.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8</strong>: „Automations\" mit Slack-/GitHub-Triggern; Bugbot reviewt jetzt in ~90 s statt ~5 min.</li>\n      <li><span class=\"chip\">OSS</span> <strong>OpenHands v1.8.0</strong> (10.06.): Sub-Agent-Delegation + ACP-UI. Aider weiter still bei v0.86.0 (Aug. 2025).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 nur Gerücht</strong>: keine offizielle Ankündigung; „Juni-Launch nah\" nur aus ungenannten Quellen.</li>\n    </ul></div>",

i-Launch nah\" nur aus ungenannten Quellen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The biggest story this week isn't a release—it's a disappearance: Anthropic's new top coding model Fable 5 was globally shut down by US export directive after just three days—Anthropic disputes it publicly. That doesn't just strike the #2 entry from the fresh Terminal-Bench leaderboard, it affects you directly as a non-US citizen. Around it: Copilot shifts to usage-based billing, Google kills the Gemini CLI.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 & Mythos 5 globally shut down</strong>: US export directive from 06/12; explicitly bars \"foreign nationals\"—meaning you too. Anthropic disputes it.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1</strong>: Codex CLI + GPT-5.5 leads at 83.4%; Claude Code + Fable 5 second at 83.1%—but that model no longer exists.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: since 06/01 usage-based \"AI Credits\" across all plans—1 Credit = 1 US cent. Code completion stays free.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini CLI dead</strong>: Free/Pro/Ultra shut down since 06/18, replaced by closed-source Antigravity CLI—free quota allegedly drops from 1,000 to ~20 requests/day.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf is now Devin Desktop</strong>: Cascade EOL 07/01, new Rust agent \"Devin Local\", ACP support for third-party agents.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8</strong>: \"Automations\" with Slack/GitHub triggers; Bugbot now reviews in ~90 s instead of ~5 min.</li>\n      <li><span class=\"chip\">OSS</span> <strong>OpenHands v1.8.0</strong> (06/10): Sub-agent delegation + ACP UI. Aider remains quiet at v0.86.0 (Aug 2025).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 rumor only</strong>: no official announcement; \"early June launch\" only from unnamed sources.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A maior história desta semana não é um lançamento—é um desaparecimento: o novo modelo de codificação de topo da Anthropic, Fable 5, foi desativado globalmente por diretiva de exportação americana após apenas três dias—Anthropic o contesta publicamente. Isso não só tira o #2 da lista fresca do Terminal-Bench, afeta você diretamente como cidadão não-americano. Ao redor: Copilot muda para cobrança por uso, Google mata a CLI do Gemini.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 & Mythos 5 desativadas globalmente</strong>: diretiva de exportação americana de 12/06; barra explicitamente \"estrangeiros\"—ou seja, você também. Anthropic a contesta.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1</strong>: Codex CLI + GPT-5.5 lidera com 83,4%; Claude Code + Fable 5 segundo com 83,1%—mas esse modelo não existe mais.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: desde 01/06 cobrança por uso \"AI Credits\" em todos os planos—1 Credit = 1 centavo americano. Conclusão de código fica grátis.</li>\n      <li><span class=\"chip\">Google</span> <strong>CLI Gemini morta</strong>: Gratuita/Pro/Ultra desativada desde 18/06, substituída por CLI Antigravity de código fechado—quota grátis alegadamente cai de 1.000 para ~20 requisições/dia.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf agora é Devin Desktop</strong>: Cascade EOL 01/07, novo agente Rust \"Devin Local\", suporte ACP para agentes de terceiros.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8</strong>: \"Automations\" com gatilhos Slack/GitHub; Bugbot agora revisa em ~90 s em vez de ~5 min.</li>\n      <li><span class=\"chip\">OSS</span> <strong>OpenHands v1.8.0</strong> (10/06): delegação de sub-agentes + interface ACP. Aider permanece quieta em v0.86.0 (ago 2025).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 apenas boato</strong>: nenhum anúncio oficial; \"lançamento de início de junho\" apenas de fontes não identificadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La historia más grande esta semana no es un lanzamiento—es una desaparición: el nuevo modelo de codificación de tope de Anthropic, Fable 5, fue desactivado globalmente por una directiva de exportación estadounidense después de solo tres días—Anthropic lo cuestiona públicamente. Eso no solo saca el #2 de la lista fresca de Terminal-Bench, te afecta directamente como ciudadano no estadounidense. Alrededor: Copilot cambia a facturación por uso, Google mata la CLI de Gemini.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 & Mythos 5 desactivadas globalmente</strong>: directiva de exportación estadounidense del 12/06; prohíbe explícitamente \"extranjeros\"—o sea, ustedes también. Anthropic la cuestiona.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1</strong>: Codex CLI + GPT-5.5 encabeza con 83,4%; Claude Code + Fable 5 segundo con 83,1%—pero ese modelo ya no existe.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: desde 01/06 facturación por uso \"AI Credits\" en todos los planes—1 Credit = 1 centavo estadounidense. Finalización de código permanece gratis.</li>\n      <li><span class=\"chip\">Google</span> <strong>CLI Gemini muerta</strong>: Gratuita/Pro/Ultra desactivada desde 18/06, reemplazada por CLI Antigravity de código cerrado—cuota gratuita alegadamente cae de 1.000 a ~20 solicitudes/día.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Windsurf ahora es Devin Desktop</strong>: Cascade EOL 01/07, nuevo agente Rust \"Devin Local\", soporte ACP para agentes de terceros.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.8</strong>: \"Automations\" con gatillos Slack/GitHub; Bugbot ahora revisa en ~90 s en lugar de ~5 min.</li>\n      <li><span class=\"chip\">OSS</span> <strong>OpenHands v1.8.0</strong> (10/06): delegación de sub-agentes + interfaz ACP. Aider permanece quieta en v0.86.0 (ago 2025).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 solo rumor</strong>: sin anuncio oficial; \"lanzamiento de principios de junio\" solo de fuentes sin identificar.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Tag, an dem die größte KI-Firma der Welt ihren Börsengang vorbereitet und gleichzeitig zugeben muss, dass sie pro Quartal mehr verbrennt als sie einnimmt. Dazwischen: Europa verschiebt die scharfen KI-Regeln um anderthalb Jahre, Snowflake macht aus seiner Datenplattform einen Agenten-Marktplatz, und Indien rollt einen Sprachassistenten für eine halbe Milliarde Menschen aus, der ohne App auskommt. Vier Geschichten über angewandte KI — und keine davon ist ein Dev-Tool.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <strong>OpenAI-IPO (US)</strong>: vertrauliche S-1 am 8. Juni eingereicht, Listing-Ziel September — mit −122 % operativer Marge im Q1.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act-Omnibus</strong>: Hochrisiko-Frist auf Dez. 2027 geschoben, aber der 2. August 2026 bleibt bindend, bis das Amtsblatt erscheint.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Snowflake CoWork</strong>: persönlicher Agent für 13.900+ Firmenkunden, 6 Mrd.-$-AWS-Deal, Claude in Cortex AI.</li>\n      <li><span class=\"chip good\">Deploy · Indien</span> <strong>Jio Call Agent</strong>: Sprach-Assistent fürs Telefonnetz, 500 Mio.+ Nutzer, 22 Sprachen, ohne App.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Mittelstand &amp; AI-Act</strong>: 80 % der KMU stellen fest, dass 95 % ihrer KI nur „Limited/Minimal Risk\" ist — die Pflicht ist das Inventar.</li>\n      <li><span class=\"chip\">Consumer</span> <strong>ChatGPT-Marktanteil</strong>: erstmals unter 50 % (46,4 %, Juni-Schätzung, Einzelquelle) — das Monopol-Gefühl bröckelt.</li>\n      <li><span class=\"chip good\">B2B-SaaS</span> <strong>twiceD-Ideen</strong>: Dokumenten-Agent für den Mittelstand + AI-Act-Schnell-Inventar — beide solo machbar.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Tag, an dem die größte KI-Firma der Welt ihren Börsengang vorbereitet und gleichzeitig zugeben muss, dass sie pro Quartal mehr verbrennt als sie einnimmt. Dazwischen: Europa verschiebt die scharfen KI-Regeln um anderthalb Jahre, Snowflake macht aus seiner Datenplattform einen Agenten-Marktplatz, und Indien rollt einen Sprachassistenten für eine halbe Milliarde Menschen aus, der ohne App auskommt. Vier Geschichten über angewandte KI — und keine davon ist ein Dev-Tool.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <strong>OpenAI-IPO (US)</strong>: vertrauliche S-1 am 8. Juni eingereicht, Listing-Ziel September — mit −122 % operativer Marge im Q1.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI-Act-Omnibus</strong>: Hochrisiko-Frist auf Dez. 2027 geschoben, aber der 2. August 2026 bleibt bindend, bis das Amtsblatt erscheint.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Snowflake CoWork</strong>: persönlicher Agent für 13.900+ Firmenkunden, 6 Mrd.-$-AWS-Deal, Claude in Cortex AI.</li>\n      <li><span class=\"chip good\">Deploy · Indien</span> <strong>Jio Call Agent</strong>: Sprach-Assistent fürs Telefonnetz, 500 Mio.+ Nutzer, 22 Sprachen, ohne App.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Mittelstand &amp; AI-Act</strong>: 80 % der KMU stellen fest, dass 95 % ihrer KI nur „Limited/Minimal Risk\" ist — die Pflicht ist das Inventar.</li>\n      <li><span class=\"chip\">Consumer</span> <strong>ChatGPT-Marktanteil</strong>: erstmals unter 50 % (46,4 %, Juni-Schätzung, Einzelquelle) — das Monopol-Gefühl bröckelt.</li>\n      <li><span class=\"chip good\">B2B-SaaS</span> <strong>twiceD-Ideen</strong>: Dokumenten-Agent für den Mittelstand + AI-Act-Schnell-Inventar — beide solo machbar.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The day the world's largest AI company prepares its IPO and simultaneously admits it burns more cash per quarter than it takes in. Meanwhile: Europe delays tough AI rules by eighteen months, Snowflake turns its data platform into an agent marketplace, and India rolls out a voice assistant for half a billion people that needs no app. Four stories about applied AI — and none of them is a dev tool.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <strong>OpenAI IPO (US)</strong>: confidential S-1 filed June 8, listing target September — operating margin −122 % in Q1.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI Act Omnibus</strong>: high-risk deadline pushed to Dec. 2027, but August 2, 2026 stays binding until the official journal is published.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Snowflake CoWork</strong>: personal agent for 13,900+ enterprise customers, $6B AWS deal, Claude in Cortex AI.</li>\n      <li><span class=\"chip good\">Deploy · India</span> <strong>Jio Call Agent</strong>: voice assistant on the telecom network, 500M+ users, 22 languages, no app needed.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Mid-market &amp; AI Act</strong>: 80 % of SMBs find that 95 % of their AI is only \"Limited/Minimal Risk\" — the obligation is inventory.</li>\n      <li><span class=\"chip\">Consumer</span> <strong>ChatGPT market share</strong>: below 50 % for the first time (46.4 %, June estimate, single source) — the monopoly feeling is cracking.</li>\n      <li><span class=\"chip good\">B2B SaaS</span> <strong>twiceD ideas</strong>: document agent for mid-market + AI Act quick audit — both solo feasible.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O dia em que a maior empresa de IA do mundo prepara sua abertura de capital e, simultaneamente, admite que queima mais dinheiro por trimestre do que fatura. Enquanto isso: a Europa adia as regras rígidas de IA em dezoito meses, a Snowflake transforma sua plataforma de dados em um mercado de agentes, e a Índia lança um assistente de voz para meio bilhão de pessoas que não precisa de app. Quatro histórias sobre IA aplicada — e nenhuma delas é uma ferramenta de desenvolvimento.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <strong>OpenAI IPO (EUA)</strong>: S-1 confidencial protocolada em 8 de junho, alvo de listagem setembro — margem operacional −122 % no Q1.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>Omnibus da Lei de IA</strong>: prazo para alto risco adiado para dez. 2027, mas 2 de agosto de 2026 permanece vinculante até a publicação no Diário Oficial.</li>\n      <li><span class=\"chip\">Deploy · EUA</span> <strong>Snowflake CoWork</strong>: agente pessoal para 13.900+ clientes empresariais, contrato de $6B com AWS, Claude em Cortex AI.</li>\n      <li><span class=\"chip good\">Deploy · Índia</span> <strong>Jio Call Agent</strong>: assistente de voz na rede de telecomunicações, 500M+ usuários, 22 idiomas, sem app.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>PME &amp; Lei de IA</strong>: 80 % das PMEs constatam que 95 % de sua IA é apenas \"Risco Limitado/Mínimo\" — a obrigação é o inventário.</li>\n      <li><span class=\"chip\">Consumer</span> <strong>Participação de mercado do ChatGPT</strong>: abaixo de 50 % pela primeira vez (46,4 %, estimativa junho, fonte única) — o sentimento de monopólio está rachando.</li>\n      <li><span class=\"chip good\">B2B SaaS</span> <strong>Ideias twiceD</strong>: agente de documentos para PME + auditoria rápida Lei de IA — ambas viáveis em solo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día en que la empresa de IA más grande del mundo prepara su salida a bolsa y, simultáneamente, admite que quema más dinero por trimestre de lo que genera. Mientras tanto: Europa pospone las reglas duras de IA dieciocho meses, Snowflake convierte su plataforma de datos en un mercado de agentes, e India lanza un asistente de voz para quinientos millones de personas que no necesita app. Cuatro historias sobre IA aplicada — y ninguna de ellas es una herramienta para desarrolladores.</p>\n    <ul>\n      <li><span class=\"chip hot\">M&amp;A</span> <strong>OpenAI IPO (EE.UU.)</strong>: S-1 confidencial presentada el 8 de junio, objetivo de cotización septiembre — margen operacional −122 % en Q1.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>Omnibus Ley de IA</strong>: plazo de riesgo alto pospuesto a dic. 2027, pero el 2 de agosto de 2026 sigue siendo vinculante hasta la publicación en el Diario Oficial.</li>\n      <li><span class=\"chip\">Deploy · EE.UU.</span> <strong>Snowflake CoWork</strong>: agente personal para 13.900+ clientes empresariales, acuerdo de $6B con AWS, Claude en Cortex AI.</li>\n      <li><span class=\"chip good\">Deploy · India</span> <strong>Jio Call Agent</strong>: asistente de voz en la red de telecomunicaciones, 500M+ usuarios, 22 idiomas, sin app.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>PyME &amp; Ley de IA</strong>: 80 % de las PyMEs constatan que 95 % de su IA es solo \"Riesgo Limitado/Mínimo\" — la obligación es el inventario.</li>\n      <li><span class=\"chip\">Consumer</span> <strong>Cuota de mercado ChatGPT</strong>: por debajo de 50 % por primera vez (46,4 %, estimación junio, fuente única) — el sentimiento de monopolio se agrieta.</li>\n      <li><span class=\"chip good\">B2B SaaS</span> <strong>Ideas twiceD</strong>: agente de documentos para PyME + auditoría rápida Ley de IA — ambas viables en solitario.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, 22. Juni. Der Wochenstart bringt Bewegung: acht neue Listings, davon sechs Java/Spring/Kafka-Freelance-Verträge mit Starts im Spätsommer — die DACH-Pipeline füllt sich für Q3. Die zwei EU-Ausschreibungen aus dem Wochenende ticken weiter (Fristen Mo 29.06. und Di 30.06.), beide nur mit Partner bietbar. Und für die Intriguing-Spur taucht ein echter Aufhänger auf: JetBrains startet mit „Spectrum\" einen eigenen AI-Inkubator und sucht dafür einen Founding ML Engineer — remote aus Deutschland.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Top-Match 88</strong>: Aleph Alpha sucht weiter Senior Java für seine Industrial-IoT-Plattform — Daniels tiefste Stack-Überlappung im ganzen Board (Java + Spring Boot + MQTT + Z-Wave).</li>\n      <li><span class=\"chip\">Neu</span> <strong>8 neue Listings heute</strong>: sechs Java/Spring/Kafka-Freelance-Verträge (infoteam 80, wynwood 80, SThree 78, mund 77, STINGEL 77, Contractor 77), die Bern-CH-Stelle und der JetBrains-Spectrum-ML-Posten.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Frist Mo 29.06.</strong>: SH-Navi Los 1 (KielRegion) — Open-Source-Java-Mobilitätsplattform, max. 320.000 €. twiceD-Größe, aber Public-Sector-Referenz fehlt → Partner.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Frist Di 30.06.</strong>: Autobahn GmbH C-ITS/V2X „Kooperative Zentrale\", Schätzwert 13 Mio. €. Stack passt, Volumen nicht — nur als Konsortial-Partner.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains startet „Spectrum\"</strong>: ein AI-Inkubator mit Founding-ML-Posten (LLM/RAG/Agentic, Python, Kotlin von Vorteil), remote-DE — der spannendste Einzeltreffer des Tages (76).</li>\n      <li><span class=\"chip\">CH</span> <strong>5-Jahres-Vertrag in Bern</strong>: ITech Consult, Java/Spring + Angular 20, 130–160 CHF/h — perfekter Stack, aber 2–3 Tage/Woche vor Ort drückt den Score (72).</li>\n      <li><span class=\"chip good\">Remote</span> <strong>90 Freelance-Projekte</strong>, Gros 100 % oder 80 % remote (DE), Senior-Java/Spring-Hauptstrom bei 90–115 €/h — über dem ~88-€/h-Plattform-Schnitt für Java.</li>\n      <li><span class=\"chip\">IoT/Auto</span> <strong>Nischen-Cluster aktiv</strong>: Smart-Home (Z-Wave), E-Mobility und Automotive (CAN-Bus) jeweils im 110–140-€/h-Band — Daniels Premium-Revier.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Aleph Alpha mit 3 Board-Rollen</strong> (Heidelberg, remote-DE): IoT-Java 88, Java-Backend 83, Full-Stack Vue/TS 77 — Frontier-AI mit hartem Java-Bedarf; dazu Personio (83).</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 22. The week kicks off with momentum: eight new listings, six of them Java/Spring/Kafka freelance contracts starting in late summer — the DACH pipeline is filling up for Q3. The two EU tenders from the weekend are still ticking (deadlines Mon 29.06. and Tue 30.06.), both require a partner to bid. And on the Intriguing track, a real hook emerges: JetBrains is launching its own AI incubator, \"Spectrum,\" and is looking for a Founding ML Engineer — remote from Germany.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Top Match 88</strong>: Aleph Alpha is still looking for a Senior Java engineer for its Industrial IoT Platform — Daniel's deepest stack overlap on the entire board (Java + Spring Boot + MQTT + Z-Wave).</li>\n      <li><span class=\"chip\">New</span> <strong>8 new listings today</strong>: six Java/Spring/Kafka freelance contracts (infoteam 80, wynwood 80, SThree 78, mund 77, STINGEL 77, Contractor 77), the Bern CH position, and the JetBrains Spectrum ML post.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Deadline Mon 29.06.</strong>: SH-Navi Lot 1 (KielRegion) — open-source Java mobility platform, max. 320,000 €. twiceD scale, but missing public-sector reference → partner needed.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Deadline Tue 30.06.</strong>: Autobahn GmbH C-ITS/V2X \"Cooperative Control Center\", estimated value 13 million €. Stack fits, volume does not — consortium partner only.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains launches \"Spectrum\"</strong>: an AI incubator with a Founding ML role (LLM/RAG/Agentic, Python, Kotlin a plus), remote-DE — the most exciting individual find of the day (76).</li>\n      <li><span class=\"chip\">CH</span> <strong>5-year contract in Bern</strong>: ITech Consult, Java/Spring + Angular 20, 130–160 CHF/h — perfect stack, but 2–3 on-site days per week hurts the score (72).</li>\n      <li><span class=\"chip good\">Remote</span> <strong>90 freelance projects</strong>, majority 100% or 80% remote (DE), mainstream Senior Java/Spring rates at 90–115 €/h — above the ~88 €/h platform average for Java.</li>\n      <li><span class=\"chip\">IoT/Auto</span> <strong>Niche cluster active</strong>: Smart Home (Z-Wave), E-Mobility, and Automotive (CAN-Bus) each in the 110–140 €/h band — Daniel's premium territory.</li>\n      <li><span class=\"chip\">Employee</span> <strong>Aleph Alpha with 3 board roles</strong> (Heidelberg, remote-DE): IoT-Java 88, Java Backend 83, Full-Stack Vue/TS 77 — frontier AI with strong Java demand; plus Personio (83).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, 22 de junho. O início da semana traz movimento: oito novas vagas, seis delas contratos freelance Java/Spring/Kafka com início no final do verão europeu — o pipeline DACH se abastece para o Q3. As duas licitações da UE do fim de semana continuam abertas (prazos seg. 29/06 e ter. 30/06), ambas exigem parceiro para ofertar. E na trilha Intrigante surge um gancho real: a JetBrains lança o próprio acelerador de IA, o \"Spectrum\", em busca de um Founding ML Engineer — remoto da Alemanha.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Melhor Match 88</strong>: Aleph Alpha continua buscando Senior Java para sua Plataforma Industrial IoT — a maior sobreposição de stack de Daniel em todo o board (Java + Spring Boot + MQTT + Z-Wave).</li>\n      <li><span class=\"chip\">Novo</span> <strong>8 novas vagas hoje</strong>: seis contratos freelance Java/Spring/Kafka (infoteam 80, wynwood 80, SThree 78, mund 77, STINGEL 77, Contractor 77), a vaga Berna-CH e o posto ML do JetBrains Spectrum.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Prazo seg. 29/06</strong>: SH-Navi Lote 1 (KielRegion) — plataforma de mobilidade Java open-source, máx. 320.000 €. Porte twiceD, mas falta referência no setor público → parceiro.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Prazo ter. 30/06</strong>: Autobahn GmbH C-ITS/V2X \"Central Cooperativa\", valor estimado 13 milhões €. Stack encaixa, volume não — somente como parceiro de consórcio.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>JetBrains lança \"Spectrum\"</strong>: incubadora de IA com vaga Founding ML (LLM/RAG/Agentes, Python, Kotlin como diferencial), remoto-DE — o achado individual mais interessante do dia (76).</li>\n      <li><span class=\"chip\">CH</span> <strong>Contrato de 5 anos em Berna</strong>: ITech Consult, Java/Spring + Angular 20, 130–160 CHF/h — stack perfeito, mas 2–3 dias presenciais por semana derruba o score (72).</li>\n      <li><span class=\"chip good\">Remoto</span> <strong>90 projetos freelance</strong>, maioria 100% ou 80% remoto (DE), corrente principal Senior Java/Spring em 90–115 €/h — acima da média da plataforma (~88 €/h) para Java.</li>\n      <li><span class=\"chip\">IoT/Auto</span> <strong>Cluster de nicho ativo</strong>: Smart Home (Z-Wave), E-Mobility e Automotive (CAN-Bus), cada um na faixa de 110–140 €/h — território premium de Daniel.</li>\n      <li><span class=\"chip\">CLT/PJ</span> <strong>Aleph Alpha com 3 vagas no board</strong> (Heidelberg, remoto-DE): IoT-Java 88, Java Backend 83, Full-Stack Vue/TS 77 — frontier AI com forte demanda por Java; mais Personio (83).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, 22 de junio. El inicio de semana trae movimiento: ocho nuevas vacantes, seis de ellas contratos freelance Java/Spring/Kafka con inicio a finales del verano europeo — el pipeline DACH se abastece para el Q3. Las dos licitaciones de la UE del fin de semana siguen abiertas (plazos lun. 29/06 y mar. 30/06), ambas requieren un socio para licitar. Y en la pista Intrigante aparece un gancho real: JetBrains lanza su propia incubadora de IA, \"Spectrum\", en busca de un Founding ML Engineer — remoto desde Alemania.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Mejor match 88</strong>: Aleph Alpha sigue buscando un Senior Java para su Plataforma Industrial IoT — la mayor superposición de stack de Daniel en todo el board (Java + Spring Boot + MQTT + Z-Wave).</li>\n      <li><span class=\"chip\">Nuevo</span> <strong>8 nuevas vacantes hoy</strong>: seis contratos freelance Java/Spring/Kafka (infoteam 80, wynwood 80, SThree 78, mund 77, STINGEL 77, Contractor 77), la plaza Berna-CH y el puesto ML de JetBrains Spectrum.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Plazo lun. 29/06</strong>: SH-Navi Lote 1 (KielRegion) — plataforma de movilidad Java open-source, máx. 320.000 €. Escala twiceD, pero falta referencia en sector público → socio.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Plazo mar. 30/06</strong>: Autobahn GmbH C-ITS/V2X \"Central Cooperativa\", valor estimado 13 millones €. El stack encaja, el volumen no — solo como socio de consorcio.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>JetBrains lanza \"Spectrum\"</strong>: incubadora de IA con puesto Founding ML (LLM/RAG/Agentes, Python, Kotlin como ventaja), remoto-DE — el hallazgo individual más interesante del día (76).</li>\n      <li><span class=\"chip\">CH</span> <strong>Contrato de 5 años en Berna</strong>: ITech Consult, Java/Spring + Angular 20, 130–160 CHF/h — stack perfecto, pero 2–3 días presenciales por semana bajan el score (72).</li>\n      <li><span class=\"chip good\">Remoto</span> <strong>90 proyectos freelance</strong>, mayoría 100% o 80% remoto (DE), corriente principal Senior Java/Spring en 90–115 €/h — por encima del promedio de plataforma (~88 €/h) para Java.</li>\n      <li><span class=\"chip\">IoT/Auto</span> <strong>Clúster de nicho activo</strong>: Smart Home (Z-Wave), E-Mobility y Automotive (CAN-Bus), cada uno en la banda de 110–140 €/h — territorio premium de Daniel.</li>\n      <li><span class=\"chip\">Empleado</span> <strong>Aleph Alpha con 3 roles en el board</strong> (Heidelberg, remoto-DE): IoT-Java 88, Java Backend 83, Full-Stack Vue/TS 77 — frontier AI con fuerte demanda de Java; más Personio (83).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">WM-Modus, kein Bundesliga-Spiel weit und breit: Die DFB-Elf hat das Achtelfinale schon sicher, Brasilien geht als Tabellenführer ins Gruppenfinale, und bei Daniels Herzensverein läuft im Hintergrund das Transfer-Karussell. Heute Abend rollt der Ball gleich viermal — vier Gruppenspiele in den USA, eines davon mit Messi.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Deutschland steht im Achtelfinale</strong>: Deniz Undav köpft und schießt die Elf in der Schlussphase zum 2:1 gegen die Elfenbeinküste — Gruppe E souverän geführt, 6 Punkte, 9:2 Tore.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Ecuador – Deutschland, Do 25.06, 22:00 MESZ / 17:00 BRT</strong>: nur noch um Platzierung und Rotation. ARD überträgt.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Schottland – Brasilien, Mi 24.06, 19:00 BRT</strong> (00:00 MESZ Do): das Gruppenfinale. Brasilien führt Gruppe C vor Marokko nur über die Tordifferenz.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção 4 Punkte</strong>: 1:1 gegen Marokko (Vini Jr.), 3:0 gegen Haiti. Haiti ist als erstes Team raus.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg verkauft Röhl</strong>: Merlin Röhl wechselt zu Everton (laut footballplace.co.uk ~23–25 Mio. €). Drei Neue kommen: Goto, Backhaus, Yamamoto.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg-Saisonbilanz</strong>: 7. Platz, 47 Punkte, Conference-League-Quali. Transfer-Saldo bislang ≈ −2,7 Mio. €.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Abend live</strong>: Argentinien – Österreich (19:00 MESZ / 14:00 BRT), Frankreich – Irak, Norwegen – Senegal, Jordanien – Algerien.</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale ab So 28.06</strong> — Deutschlands Gegner steht erst nach allen Gruppenspielen fest.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">WM-Modus, kein Bundesliga-Spiel weit und breit: Die DFB-Elf hat das Achtelfinale schon sicher, Brasilien geht als Tabellenführer ins Gruppenfinale, und bei Daniels Herzensverein läuft im Hintergrund das Transfer-Karussell. Heute Abend rollt der Ball gleich viermal — vier Gruppenspiele in den USA, eines davon mit Messi.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Deutschland steht im Achtelfinale</strong>: Deniz Undav köpft und schießt die Elf in der Schlussphase zum 2:1 gegen die Elfenbeinküste — Gruppe E souverän geführt, 6 Punkte, 9:2 Tore.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Ecuador – Deutschland, Do 25.06, 22:00 MESZ / 17:00 BRT</strong>: nur noch um Platzierung und Rotation. ARD überträgt.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Schottland – Brasilien, Mi 24.06, 19:00 BRT</strong> (00:00 MESZ Do): das Gruppenfinale. Brasilien führt Gruppe C vor Marokko nur über die Tordifferenz.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção 4 Punkte</strong>: 1:1 gegen Marokko (Vini Jr.), 3:0 gegen Haiti. Haiti ist als erstes Team raus.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg verkauft Röhl</strong>: Merlin Röhl wechselt zu Everton (laut footballplace.co.uk ~23–25 Mio. €). Drei Neue kommen: Goto, Backhaus, Yamamoto.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg-Saisonbilanz</strong>: 7. Platz, 47 Punkte, Conference-League-Quali. Transfer-Saldo bislang ≈ −2,7 Mio. €.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Abend live</strong>: Argentinien – Österreich (19:00 MESZ / 14:00 BRT), Frankreich – Irak, Norwegen – Senegal, Jordanien – Algerien.</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale ab So 28.06</strong> — Deutschlands Gegner steht erst nach allen Gruppenspielen fest.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">World Cup mode, no Bundesliga in sight: the DFB has already secured the Round of 16, Brazil enters its group finale as the table leader, and at Daniel's beloved Freiburg the transfer carousel spins on. Tonight the ball rolls four times — four group matches in the USA, one of them with Messi.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Germany advances to the Round of 16</strong>: Deniz Undav heads and scores in the final stages to seal a 2:1 win over Ivory Coast — Group E led decisively, 6 points, 9:2 goal tally.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Ecuador – Germany, Thu 25.06, 22:00 MESZ / 17:00 BRT</strong>: now just about seeding and rotation. ARD broadcasts.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Scotland – Brazil, Wed 24.06, 19:00 BRT</strong> (00:00 MESZ Thu): the group final. Brazil leads Group C over Morocco by goal difference alone.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção 4 points</strong>: 1:1 vs. Morocco (Vinícius Júnior), 3:0 vs. Haiti. Haiti is the first team out.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg sells Röhl</strong>: Merlin Röhl moves to Everton (per footballplace.co.uk ~23–25 million €). Three new faces: Goto, Backhaus, Yamamoto.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg season summary</strong>: 7th place, 47 points, Conference League qualification. Transfer balance so far ≈ −2.7 million €.</li>\n      <li><span class=\"chip hot\">WC</span> <strong>Tonight live</strong>: Argentina – Austria (19:00 MESZ / 14:00 BRT), France – Iraq, Norway – Senegal, Jordan – Algeria.</li>\n      <li><span class=\"chip\">WC</span> <strong>Round of 16 from Sun 28.06</strong> — Germany's opponent is set only after all group matches finish.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Modo Copa do Mundo, nenhum jogo da Bundesliga à vista: a seleção alemã já garantiu as oitavas, o Brasil entra na final do grupo como líder, e no clube do coração de Daniel roda o carrossel de transferências. Nesta noite a bola rola quatro vezes — quatro jogos de grupo nos EUA, um deles com Messi.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemanha garante as oitavas de final</strong>: Deniz Undav cabeceia e marca na reta final para selar 2:1 sobre a Costa do Marfim — Grupo E liderado com tranquilidade, 6 pontos, 9:2 em gols.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Equador – Alemanha, qui 25.06, 22:00 MESZ / 17:00 BRT</strong>: apenas por pontos e rodízio. ARD transmite.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Escócia – Brasil, qua 24.06, 19:00 BRT</strong> (00:00 MESZ qui): a final do grupo. Brasil lidera o Grupo C sobre Marrocos apenas pela diferença de gols.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção 4 pontos</strong>: 1:1 contra Marrocos (Vinícius Júnior), 3:0 contra Haiti. Haiti é o primeiro time eliminado.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg vende Röhl</strong>: Merlin Röhl vai para o Everton (segundo footballplace.co.uk ~23–25 mi. €). Três chegam: Goto, Backhaus, Yamamoto.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Balanço de temporada do Freiburg</strong>: 7º lugar, 47 pontos, qualificação para a Conference League. Saldo de transferências até agora ≈ −2,7 mi. €.</li>\n      <li><span class=\"chip hot\">CM</span> <strong>Hoje à noite ao vivo</strong>: Argentina – Áustria (19:00 MESZ / 14:00 BRT), França – Iraque, Noruega – Senegal, Jordânia – Argélia.</li>\n      <li><span class=\"chip\">CM</span> <strong>Oitavas a partir de dom 28.06</strong> — o adversário da Alemanha fica definido apenas após todos os grupos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Modo Mundial, sin partidos de Bundesliga a la vista: la selección alemana ya tiene asegurada la ronda de dieciséis, Brasil entra a la final de grupo como líder, y en el equipo del corazón de Daniel gira el carrusel de transferencias. Esta noche rueda el balón cuatro veces — cuatro partidos de grupo en EUA, uno de ellos con Messi.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemania asegura los dieciséisavos de final</strong>: Deniz Undav cabecea y anota en la recta final para sellar 2:1 sobre Costa de Marfil — Grupo E manejado con tranquilidad, 6 puntos, 9:2 en goles.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Ecuador – Alemania, jue 25.06, 22:00 MESZ / 17:00 BRT</strong>: solo por puntos y rotación. ARD transmite.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Escocia – Brasil, mié 24.06, 19:00 BRT</strong> (00:00 MESZ jue): la final del grupo. Brasil lidera el Grupo C sobre Marruecos solo por diferencia de goles.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Selección 4 puntos</strong>: 1:1 contra Marruecos (Vinícius Júnior), 3:0 contra Haití. Haití es el primer equipo eliminado.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg vende a Röhl</strong>: Merlin Röhl se va al Everton (según footballplace.co.uk ~23–25 mi. €). Llegan tres: Goto, Backhaus, Yamamoto.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Balance de temporada del Freiburg</strong>: 7º lugar, 47 puntos, calificación a Conference League. Balance de transferencias hasta ahora ≈ −2,7 mi. €.</li>\n      <li><span class=\"chip hot\">CM</span> <strong>Hoy por la noche en vivo</strong>: Argentina – Austria (19:00 MESZ / 14:00 BRT), Francia – Irak, Noruega – Senegal, Jordania – Argelia.</li>\n      <li><span class=\"chip\">CM</span> <strong>Dieciséisavos a partir de dom 28.06</strong> — el rival de Alemania se define solo después de que terminen todos los grupos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Wochenstart, große Woche voraus: An diesem Wochenende fährt die <strong>Formel&nbsp;1</strong> ihren <strong>Österreich-GP</strong> (Lauf&nbsp;8 von 22) auf dem <strong>Red Bull Ring</strong> in Spielberg — 26.–28.&nbsp;Juni, klassisches Format ohne Sprint. WM-Leader <strong>Kimi Antonelli</strong> (Mercedes) geht mit <strong>156&nbsp;Punkten</strong> ins Rennen, aber sein Vorsprung ist nach dem Barcelona-Ausfall auf <strong>41&nbsp;Zähler</strong> auf Hamilton zusammengeschmolzen. Auf der Langstrecke steht das Le-Mans-Ergebnis: <strong>Toyota</strong> gewann die 24&nbsp;Stunden zum ersten Mal seit vier Jahren und führt die WEC-Hersteller&shy;wertung an; nächster WEC-Lauf sind die <strong>6&nbsp;Stunden von São&nbsp;Paulo</strong> (Interlagos, 12.&nbsp;Juli). Alle Zeiten dreizonig: Streckenzeit&nbsp;· BRT&nbsp;· MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">NÄCHSTES RENNEN · F1</span> <strong>Österreich-GP, Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22)</strong> — 26.–28.06., kein Sprint. Rennen <strong>So 28.06. 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>, 71&nbsp;Runden.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156&nbsp;Pkt</strong> (Stand nach Barcelona, 14.06.) — nur noch <strong>41</strong> vor Hamilton (Ferrari 115) und Russell (Mercedes 106). Vier Siege in Serie, dann der Nuller.</li>\n      <li><span class=\"chip\">REGEL-RESET</span> <strong>Mercedes dominiert das Reset-Jahr 2026</strong> — neue Chassis + Power Units, neue Werksteams Audi und Cadillac. Mercedes führt die Konstrukteurs-WM mit großem Abstand.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota gewinnt die 24h von Le&nbsp;Mans</strong> (13.–14.06.) — #7 (de&nbsp;Vries/Kobayashi/Conway) vor BMW (#20) und der Schwester-Toyota #8. Erster Le-Mans-Sieg seit vier Jahren.</li>\n      <li><span class=\"chip\">WEC-WM</span> <strong>Toyota führt die Herstellerwertung mit 132&nbsp;Pkt</strong> vor BMW (96) und Ferrari (62) — Stand nach Le&nbsp;Mans (Lauf&nbsp;3).</li>\n      <li><span class=\"chip\">NÄCHSTER WEC-LAUF</span> <strong>6&nbsp;Stunden von São&nbsp;Paulo</strong>, Interlagos — Rennen <strong>So 12.07. 11:30&nbsp;BRT / 16:30&nbsp;CEST</strong>. Heimspiel-Wochenende für Daniel.</li>\n      <li><span class=\"chip\">RANDNOTIZ</span> <strong>Verstappen weiter ohne Saisonsieg</strong> (55&nbsp;Pkt, P7); Vorjahres&shy;champion Norris schon 83&nbsp;Punkte hinter Antonelli (73&nbsp;Pkt, P5).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Wochenstart, große Woche voraus: An diesem Wochenende fährt die <strong>Formel&nbsp;1</strong> ihren <strong>Österreich-GP</strong> (Lauf&nbsp;8 von 22) auf dem <strong>Red Bull Ring</strong> in Spielberg — 26.–28.&nbsp;Juni, klassisches Format ohne Sprint. WM-Leader <strong>Kimi Antonelli</strong> (Mercedes) geht mit <strong>156&nbsp;Punkten</strong> ins Rennen, aber sein Vorsprung ist nach dem Barcelona-Ausfall auf <strong>41&nbsp;Zähler</strong> auf Hamilton zusammengeschmolzen. Auf der Langstrecke steht das Le-Mans-Ergebnis: <strong>Toyota</strong> gewann die 24&nbsp;Stunden zum ersten Mal seit vier Jahren und führt die WEC-Hersteller&shy;wertung an; nächster WEC-Lauf sind die <strong>6&nbsp;Stunden von São&nbsp;Paulo</strong> (Interlagos, 12.&nbsp;Juli). Alle Zeiten dreizonig: Streckenzeit&nbsp;· BRT&nbsp;· MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">NÄCHSTES RENNEN · F1</span> <strong>Österreich-GP, Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22)</strong> — 26.–28.06., kein Sprint. Rennen <strong>So 28.06. 15:00&nbsp;CEST / 10:00&nbsp;BRT</strong>, 71&nbsp;Runden.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt mit 156&nbsp;Pkt</strong> (Stand nach Barcelona, 14.06.) — nur noch <strong>41</strong> vor Hamilton (Ferrari 115) und Russell (Mercedes 106). Vier Siege in Serie, dann der Nuller.</li>\n      <li><span class=\"chip\">REGEL-RESET</span> <strong>Mercedes dominiert das Reset-Jahr 2026</strong> — neue Chassis + Power Units, neue Werksteams Audi und Cadillac. Mercedes führt die Konstrukteurs-WM mit großem Abstand.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota gewinnt die 24h von Le&nbsp;Mans</strong> (13.–14.06.) — #7 (de&nbsp;Vries/Kobayashi/Conway) vor BMW (#20) und der Schwester-Toyota #8. Erster Le-Mans-Sieg seit vier Jahren.</li>\n      <li><span class=\"chip\">WEC-WM</span> <strong>Toyota führt die Herstellerwertung mit 132&nbsp;Pkt</strong> vor BMW (96) und Ferrari (62) — Stand nach Le&nbsp;Mans (Lauf&nbsp;3).</li>\n      <li><span class=\"chip\">NÄCHSTER WEC-LAUF</span> <strong>6&nbsp;Stunden von São&nbsp;Paulo</strong>, Interlagos — Rennen <strong>So 12.07. 11:30&nbsp;BRT / 16:30&nbsp;CEST</strong>. Heimspiel-Wochenende für Daniel.</li>\n      <li><span class=\"chip\">RANDNOTIZ</span> <strong>Verstappen weiter ohne Saisonsieg</strong> (55&nbsp;Pkt, P7); Vorjahres&shy;champion Norris schon 83&nbsp;Punkte hinter Antonelli (73&nbsp;Pkt, P5).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Quiet start to the week, big week ahead: This weekend, <strong>Formula&nbsp;1</strong> runs its <strong>Austrian Grand&nbsp;Prix</strong> (race 8 of 22) at the <strong>Red Bull Ring</strong> in Spielberg — June 26–28, classic format without a sprint. Championship leader <strong>Kimi Antonelli</strong> (Mercedes) enters with <strong>156&nbsp;points</strong>, but his margin has shrunk to just <strong>41 points</strong> ahead of Hamilton after his Barcelona retirement. On the endurance side, Le Mans is done: <strong>Toyota</strong> took the 24-hour race for the first time in four years and leads the WEC manufacturers' standings; the next WEC race is the <strong>6 Hours of São Paulo</strong> (Interlagos, July 12). All times three-zone: track time · BRT · CEST.</p>\n    <ul>\n      <li><span class=\"chip hot\">NEXT RACE · F1</span> <strong>Austrian Grand Prix, Red Bull Ring (race 8/22)</strong> — June 26–28, no sprint. Race <strong>Sun 28.06 15:00 CEST / 10:00 BRT</strong>, 71 laps.</li>\n      <li><span class=\"chip\">F1 CHAMPIONSHIP</span> <strong>Antonelli leads with 156 pts</strong> (standing after Barcelona, June 14) — only <strong>41</strong> ahead of Hamilton (Ferrari 115) and Russell (Mercedes 106). Four wins in a row, then a zero.</li>\n      <li><span class=\"chip\">REGULATION RESET</span> <strong>Mercedes dominates the 2026 reset year</strong> — new chassis + power units, new works teams Audi and Cadillac. Mercedes leads the constructors' championship by a wide margin.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota wins the 24 Hours of Le Mans</strong> (June 13–14) — #7 (de Vries/Kobayashi/Conway) ahead of BMW (#20) and sister car Toyota #8. First Le Mans victory in four years.</li>\n      <li><span class=\"chip\">WEC CHAMPIONSHIP</span> <strong>Toyota leads the manufacturers' standing with 132 pts</strong> ahead of BMW (96) and Ferrari (62) — standing after Le Mans (race 3).</li>\n      <li><span class=\"chip\">NEXT WEC RACE</span> <strong>6 Hours of São Paulo</strong>, Interlagos — race <strong>Sun 12.07 11:30 BRT / 16:30 CEST</strong>. Home-race weekend for Daniel.</li>\n      <li><span class=\"chip\">SIDE NOTE</span> <strong>Verstappen still without a season win</strong> (55 pts, P7); defending champion Norris already 83 points behind Antonelli (73 pts, P5).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Começo tranquilo de semana, mas semana repleta de ação: neste fim de semana, a <strong>Fórmula&nbsp;1</strong> disputa o <strong>Grande Prêmio da Áustria</strong> (prova 8 de 22) no <strong>Red Bull Ring</strong> em Spielberg — 26 a 28 de junho, formato clássico sem sprint. O líder do campeonato <strong>Kimi Antonelli</strong> (Mercedes) entra com <strong>156&nbsp;pontos</strong>, mas sua vantagem encolheu para apenas <strong>41&nbsp;pontos</strong> à frente de Hamilton após seu abandono em Barcelona. No front de resistência, Le Mans já foi: <strong>Toyota</strong> venceu a prova de 24 horas pela primeira vez em quatro anos e lidera o campeonato de construtores da WEC; a próxima prova é as <strong>6&nbsp;Horas de São&nbsp;Paulo</strong> (Interlagos, 12 de julho). Todos os horários em três fusos: horário de prova · BRT · CEST.</p>\n    <ul>\n      <li><span class=\"chip hot\">PRÓXIMA PROVA · F1</span> <strong>Grande Prêmio da Áustria, Red Bull Ring (prova 8/22)</strong> — 26 a 28.06, sem sprint. Prova <strong>dom 28.06 às 15h00 CEST / 10h00 BRT</strong>, 71 voltas.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera com 156 pts</strong> (standings após Barcelona, 14.06.) — apenas <strong>41</strong> à frente de Hamilton (Ferrari 115) e Russell (Mercedes 106). Quatro vitórias seguidas, aí veio o zero.</li>\n      <li><span class=\"chip\">RESET DE REGULAMENTO</span> <strong>Mercedes domina o ano de reset 2026</strong> — novo chassis + unidades de potência, novos times de fábrica Audi e Cadillac. Mercedes lidera o campeonato de construtores por larga margem.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota vence as 24 Horas de Le Mans</strong> (13 a 14.06.) — #7 (de Vries/Kobayashi/Conway) à frente da BMW (#20) e da segunda Toyota. Primeira vitória em Le Mans em quatro anos.</li>\n      <li><span class=\"chip\">CAMPEONATO WEC</span> <strong>Toyota lidera o campeonato de construtores com 132 pts</strong> à frente da BMW (96) e Ferrari (62) — standings após Le Mans (prova 3).</li>\n      <li><span class=\"chip\">PRÓXIMA PROVA WEC</span> <strong>6 Horas de São Paulo</strong>, Interlagos — prova <strong>dom 12.07 às 11h30 BRT / 16h30 CEST</strong>. Fim de semana em casa para Daniel.</li>\n      <li><span class=\"chip\">OBSERVAÇÃO</span> <strong>Verstappen ainda sem vitória na temporada</strong> (55 pts, P7); campeão da temporada anterior Norris já 83 pontos atrás de Antonelli (73 pts, P5).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Inicio tranquilo de semana, semana llena de acción por delante: este fin de semana, la <strong>Fórmula&nbsp;1</strong> disputa el <strong>Gran Premio de Austria</strong> (carrera 8 de 22) en el <strong>Red Bull Ring</strong> en Spielberg — 26 a 28 de junio, formato clásico sin sprint. El líder del campeonato <strong>Kimi Antonelli</strong> (Mercedes) entra con <strong>156&nbsp;puntos</strong>, pero su ventaja se ha reducido a apenas <strong>41&nbsp;puntos</strong> adelante de Hamilton tras su abandono en Barcelona. En el frente de resistencia, Le Mans ya fue: <strong>Toyota</strong> ganó la carrera de 24 horas por primera vez en cuatro años y lidera el campeonato de constructores de la WEC; la próxima carrera es las <strong>6 Horas de São Paulo</strong> (Interlagos, 12 de julio). Todos los tiempos en tres zonas: hora de pista · BRT · CEST.</p>\n    <ul>\n      <li><span class=\"chip hot\">PRÓXIMA CARRERA · F1</span> <strong>Gran Premio de Austria, Red Bull Ring (carrera 8/22)</strong> — 26 a 28.06, sin sprint. Carrera <strong>dom 28.06 15:00 CEST / 10:00 BRT</strong>, 71 vueltas.</li>\n      <li><span class=\"chip\">CAMPEONATO F1</span> <strong>Antonelli lidera con 156 pts</strong> (standings tras Barcelona, 14.06.) — sólo <strong>41</strong> adelante de Hamilton (Ferrari 115) y Russell (Mercedes 106). Cuatro victorias seguidas, luego vino el cero.</li>\n      <li><span class=\"chip\">RESET DE REGULACIÓN</span> <strong>Mercedes domina el año de reset 2026</strong> — nuevo chasis + unidades de potencia, nuevos equipos de fábrica Audi y Cadillac. Mercedes lidera el campeonato de constructores por amplio margen.</li>\n      <li><span class=\"chip good\">WEC · LE MANS</span> <strong>Toyota gana las 24 Horas de Le Mans</strong> (13 a 14.06.) — #7 (de Vries/Kobayashi/Conway) adelante de BMW (#20) y del segundo Toyota. Primera victoria en Le Mans en cuatro años.</li>\n      <li><span class=\"chip\">CAMPEONATO WEC</span> <strong>Toyota lidera el campeonato de constructores con 132 pts</strong> adelante de BMW (96) y Ferrari (62) — standings tras Le Mans (carrera 3).</li>\n      <li><span class=\"chip\">PRÓXIMA CARRERA WEC</span> <strong>6 Horas de São Paulo</strong>, Interlagos — carrera <strong>dom 12.07 11:30 BRT / 16:30 CEST</strong>. Fin de semana en casa para Daniel.</li>\n      <li><span class=\"chip\">NOTA AL MARGEN</span> <strong>Verstappen sigue sin victoria en la temporada</strong> (55 pts, P7); campeón de la temporada anterior Norris ya 83 puntos atrás de Antonelli (73 pts, P5).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der brasilianische Winter ist da — und mit ihm die Atemwegs-Saison. Paraná steht diese Woche auf der höchsten SRAG-Warnstufe, das Respiratorische Synzytial-Virus (VSR/RSV) dominiert. Für einen Haushalt mit einem einen Monat alten Baby ist das die wichtigste Zeile des Tages: kein Grund zur Panik, aber zwei, drei einfache Schutz-Reflexe lohnen jetzt. Dazu Regen und Kälte heute und morgen, ein klares Wochenende danach, und São João vor der Tür.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV/VSR-Alarm</strong>: Paraná auf höchster SRAG-Warnstufe (SE 23), VSR macht 51,4 % der positiven Fälle aus — Schutz-Tipps fürs Baby unten.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Gute Nachricht</strong>: PR-Baby-Krankenhausaufnahmen mit Atemwegs-Infekt 2026 um 83,5 % gefallen — die Schwangeren-Impfung wirkt.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Kaltfront + Regen</strong>: heute 90 %, morgen 93 % Regen, Dienstag nur 19 °C. Drinnen-Tag.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Wochenende klart auf</strong>: Sa 25.06 trocken, kalte Morgen (10 °C), Nachmittage bis 18–24 °C.</li>\n      <li><span class=\"chip\">Event</span> <strong>São João (24.06)</strong>: Festa-Junina-Saison läuft — Quermesses und Arraiás in Londrina ab Anfang Juli.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Família no Parque</strong>: Familien-Programm im Parque Villa-Lobos (SP), Eintritt frei (Fahrgeschäfte ab R$ 10), 29.06–02.08 — die Ferien-Option im SP-Radius.</li>\n      <li><span class=\"chip\">Region</span> <strong>Kern ruhig</strong>: für Ribeirão Claro/Jacarezinho diese Woche kein bestätigtes lokales Event — Blick geht nach Londrina und SP.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der brasilianische Winter ist da — und mit ihm die Atemwegs-Saison. Paraná steht diese Woche auf der höchsten SRAG-Warnstufe, das Respiratorische Synzytial-Virus (VSR/RSV) dominiert. Für einen Haushalt mit einem einen Monat alten Baby ist das die wichtigste Zeile des Tages: kein Grund zur Panik, aber zwei, drei einfache Schutz-Reflexe lohnen jetzt. Dazu Regen und Kälte heute und morgen, ein klares Wochenende danach, und São João vor der Tür.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV/VSR-Alarm</strong>: Paraná auf höchster SRAG-Warnstufe (SE 23), VSR macht 51,4 % der positiven Fälle aus — Schutz-Tipps fürs Baby unten.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Gute Nachricht</strong>: PR-Baby-Krankenhausaufnahmen mit Atemwegs-Infekt 2026 um 83,5 % gefallen — die Schwangeren-Impfung wirkt.</li>\n      <li><span class=\"chip hot\">Wetter</span> <strong>Kaltfront + Regen</strong>: heute 90 %, morgen 93 % Regen, Dienstag nur 19 °C. Drinnen-Tag.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Wochenende klart auf</strong>: Sa 25.06 trocken, kalte Morgen (10 °C), Nachmittage bis 18–24 °C.</li>\n      <li><span class=\"chip\">Event</span> <strong>São João (24.06)</strong>: Festa-Junina-Saison läuft — Quermesses und Arraiás in Londrina ab Anfang Juli.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Família no Parque</strong>: Familien-Programm im Parque Villa-Lobos (SP), Eintritt frei (Fahrgeschäfte ab R$ 10), 29.06–02.08 — die Ferien-Option im SP-Radius.</li>\n      <li><span class=\"chip\">Region</span> <strong>Kern ruhig</strong>: für Ribeirão Claro/Jacarezinho diese Woche kein bestätigtes lokales Event — Blick geht nach Londrina und SP.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Brazilian winter is here — and with it, respiratory season. Paraná is on the highest SRAG alert level this week, with Respiratory Syncytial Virus (RSV) dominant. For a household with a one-month-old baby, this is the most important line of the day: no reason to panic, but two or three simple protective habits are worth it now. Plus rain and cold today and tomorrow, clear weather this weekend, and São João around the corner.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV Alert</strong>: Paraná at highest SRAG alert level (Week 23), RSV accounts for 51.4% of confirmed cases — protection tips for baby below.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Good news</strong>: PR baby hospitalizations with respiratory infection dropped 83.5% in 2026 — maternal vaccination is working.</li>\n      <li><span class=\"chip hot\">Weather</span> <strong>Cold front + rain</strong>: today 90% rain, tomorrow 93% rain, Tuesday only 19°C. Indoor day.</li>\n      <li><span class=\"chip good\">Weather</span> <strong>Weekend clears up</strong>: Sat 25.06 dry, cold mornings (10°C), afternoons up to 18–24°C.</li>\n      <li><span class=\"chip\">Event</span> <strong>São João (24.06)</strong>: Festa-Junina season is on — festivals and street fairs in Londrina from early July.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Família no Parque</strong>: family program at Parque Villa-Lobos (SP), free entry (rides from R$10), June 29–Aug 2 — your school-break option in the SP region.</li>\n      <li><span class=\"chip\">Region</span> <strong>Local calm</strong>: no confirmed local events in Ribeirão Claro/Jacarezinho this week — eyes on Londrina and SP.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O inverno brasileiro chegou — e com ele a temporada de doenças respiratórias. Paraná está no nível de alerta máximo de SRAG esta semana, com o Vírus Sincicial Respiratório (VSR/RSV) dominando. Para uma casa com um bebê de um mês de idade, esta é a linha mais importante do dia: sem razão para pânico, mas dois ou três hábitos de proteção simples valem a pena agora. Além disso, chuva e frio hoje e amanhã, tempo claro neste fim de semana, e São João à porta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Alerta de RSV</strong>: Paraná no nível de alerta máximo de SRAG (Semana 23), RSV representa 51,4% dos casos confirmados — dicas de proteção para o bebê abaixo.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Boa notícia</strong>: internações de bebês em PR com infecção respiratória caíram 83,5% em 2026 — a vacinação materna está funcionando.</li>\n      <li><span class=\"chip hot\">Tempo</span> <strong>Frente fria + chuva</strong>: hoje 90% de chuva, amanhã 93% de chuva, terça-feira apenas 19°C. Dia de indoor.</li>\n      <li><span class=\"chip good\">Tempo</span> <strong>Fim de semana se clareia</strong>: sáb 25.06 seco, manhãs frias (10°C), tardes até 18–24°C.</li>\n      <li><span class=\"chip\">Evento</span> <strong>São João (24.06)</strong>: temporada de Festa Junina está em andamento — festas e quermesses em Londrina a partir de início de julho.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Família no Parque</strong>: programa de família no Parque Villa-Lobos (SP), entrada gratuita (brinquedos a partir de R$ 10), 29 de junho a 02 de agosto — sua opção de férias escolares na região de SP.</li>\n      <li><span class=\"chip\">Região</span> <strong>Núcleo tranquilo</strong>: sem eventos locais confirmados em Ribeirão Claro/Jacarezinho esta semana — atenção para Londrina e SP.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El invierno brasileño llegó — y con él la temporada de enfermedades respiratorias. Paraná está en el nivel de alerta máximo de SRAG esta semana, con el Virus Sincicial Respiratorio (VSR/RSV) dominando. Para una casa con un bebé de un mes de edad, esta es la línea más importante del día: sin razón para pánico, pero dos o tres hábitos de protección simples valen la pena ahora. Además, lluvia y frío hoy y mañana, tiempo claro este fin de semana, y São João a la vuelta de la esquina.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Alerta de RSV</strong>: Paraná en nivel de alerta máximo de SRAG (Semana 23), RSV representa 51,4% de casos confirmados — consejos de protección para bebé abajo.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Buena noticia</strong>: hospitalizaciones de bebés en PR con infección respiratoria cayeron 83,5% en 2026 — la vacunación materna está funcionando.</li>\n      <li><span class=\"chip hot\">Clima</span> <strong>Frente frío + lluvia</strong>: hoy 90% de lluvia, mañana 93% de lluvia, martes solo 19°C. Día de interior.</li>\n      <li><span class=\"chip good\">Clima</span> <strong>Fin de semana se aclara</strong>: sáb 25.06 seco, mañanas frías (10°C), tardes hasta 18–24°C.</li>\n      <li><span class=\"chip\">Evento</span> <strong>São João (24.06)</strong>: temporada de Festa Junina está en marcha — fiestas y quermeses en Londrina a partir de principios de julio.</li>\n      <li><span class=\"chip\">Excursión</span> <strong>Família no Parque</strong>: programa familiar en Parque Villa-Lobos (SP), entrada gratis (juegos desde R$ 10), 29 de junio a 02 de agosto — tu opción de vacaciones escolares en la región de SP.</li>\n      <li><span class=\"chip\">Región</span> <strong>Núcleo tranquilo</strong>: sin eventos locales confirmados en Ribeirão Claro/Jacarezinho esta semana — atención a Londrina y SP.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 22. Juni — vierte Runde im Wochenthema Wirtschaft &amp; Finanzen. Nach Inflation/Zins (25.05), Verträgen/Arbeit (01.06) und Steuern/Anlage (15.06) heute die Bank-Seite: <em>Kredit aufnehmen, Schulden tilgen, Zinsen zahlen, Kurse steigen und fallen</em>. 32 neue Einträge, 12 Verben mit voller Konjugation, 3 Wiederholungen aus der letzten Wirtschaftswoche (vor genau 7 Tagen — der erste echte Auffrisch-Termin im SRS-Rhythmus).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Provision ≠ EN „provision\"</strong> — die Provision ist die <em>Maklergebühr</em> (EN: commission); EN „provision\" = DE Rückstellung/Vorkehrung. PT/ES: <em>comissão / comisión</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES renta ≠ DE Rente</strong> — <em>renta fija</em> heißt <em>festverzinsliche Anlage</em> (EN: fixed income), nicht Rente; DE Rente = <em>pensión</em>. In MX heißt <em>renta</em> zusätzlich noch <em>Miete</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT lucro ≠ DE Luxus</strong> — <em>o lucro líquido</em> = der Nettogewinn (EN: profit); DE Luxus = PT <em>luxo</em>. Ähnliche Schreibweise, völlig anderer Sinn.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE wachsen / steigen / sinken</strong> bilden das Perfekt mit <em>sein</em>, nicht haben: <em>der Kurs ist gestiegen</em>, <em>der Preis ist gesunken</em>, <em>das Konto ist gewachsen</em> — niemals <em>*hat gestiegen</em>. Bewegungs-/Zustandswechsel-Verben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES reducir</strong> macht zwei Tricks: <em>yo reduzco</em> (c→zc in der yo-Präsens) und <em>yo reduje</em> (Präteritum mit Stamm <em>reduj-</em>, kein Akzent). Selbes Muster wie <em>traducir</em>, <em>conducir</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES crecer</strong> ist <em>nicht</em> regelmäßig: <em>yo crezco</em> (c→zc), Subjunktiv <em>crezca</em> — wie <em>parecer</em>. Aber Präteritum normal: <em>crecí, creció</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>caer (ES) / cair (PT)</strong> haben ein eingeschobenes i/g: ES <em>yo caigo</em>, PT <em>eu caio</em>. ES Präteritum 3. Person: <em>él cayó, ustedes cayeron</em> (i→y zwischen Vokalen).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>transferir</strong> wechselt den Stamm: ES <em>yo transfiero</em> (e→ie), aber <em>nosotros transferimos</em>; PT <em>eu transfiro</em> (e→i), aber <em>você transfere</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>cheque especial</strong> = der Überziehungskredit aufs Girokonto — ein brasilianisches Bankprodukt mit berüchtigt hohem Zins. <em>Entrar no cheque especial</em> = ins Minus rutschen. DE: Dispokredit, ES: sobregiro.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>parcelado em X vezes</strong> = Ratenkauf in X Monatsraten — die dominante Zahlungsweise in Brasilien (in Europa unüblich). <em>Posso pagar parcelado?</em> = Kann ich in Raten zahlen?</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a maquininha</strong> = das Kartenterminal (gíria; formal <em>maquineta</em>). <em>Aceita maquininha?</em> = Nehmt ihr Karte? — allgegenwärtig im brasilianischen Handel.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>auf Pump kaufen</strong> (DE) = auf Kredit kaufen. PT <em>comprar fiado / no crediário</em>; ES (MX) <em>comprar a crédito / a meses</em>. Und das rote Konto: DE <em>in den roten Zahlen sein</em> = PT <em>ficar no vermelho</em>.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Montag, der 22. Juni — vierte Runde im Wochenthema Wirtschaft &amp; Finanzen. Nach Inflation/Zins (25.05), Verträgen/Arbeit (01.06) und Steuern/Anlage (15.06) heute die Bank-Seite: <em>Kredit aufnehmen, Schulden tilgen, Zinsen zahlen, Kurse steigen und fallen</em>. 32 neue Einträge, 12 Verben mit voller Konjugation, 3 Wiederholungen aus der letzten Wirtschaftswoche (vor genau 7 Tagen — der erste echte Auffrisch-Termin im SRS-Rhythmus).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Provision ≠ EN „provision\"</strong> — die Provision ist die <em>Maklergebühr</em> (EN: commission); EN „provision\" = DE Rückstellung/Vorkehrung. PT/ES: <em>comissão / comisión</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES renta ≠ DE Rente</strong> — <em>renta fija</em> heißt <em>festverzinsliche Anlage</em> (EN: fixed income), nicht Rente; DE Rente = <em>pensión</em>. In MX heißt <em>renta</em> zusätzlich noch <em>Miete</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT lucro ≠ DE Luxus</strong> — <em>o lucro líquido</em> = der Nettogewinn (EN: profit); DE Luxus = PT <em>luxo</em>. Ähnliche Schreibweise, völlig anderer Sinn.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE wachsen / steigen / sinken</strong> bilden das Perfekt mit <em>sein</em>, nicht haben: <em>der Kurs ist gestiegen</em>, <em>der Preis ist gesunken</em>, <em>das Konto ist gewachsen</em> — niemals <em>*hat gestiegen</em>. Bewegungs-/Zustandswechsel-Verben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES reducir</strong> macht zwei Tricks: <em>yo reduzco</em> (c→zc in der yo-Präsens) und <em>yo reduje</em> (Präteritum mit Stamm <em>reduj-</em>, kein Akzent). Selbes Muster wie <em>traducir</em>, <em>conducir</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES crecer</strong> ist <em>nicht</em> regelmäßig: <em>yo crezco</em> (c→zc), Subjunktiv <em>crezca</em> — wie <em>parecer</em>. Aber Präteritum normal: <em>crecí, creció</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>caer (ES) / cair (PT)</strong> haben ein eingeschobenes i/g: ES <em>yo caigo</em>, PT <em>eu caio</em>. ES Präteritum 3. Person: <em>él cayó, ustedes cayeron</em> (i→y zwischen Vokalen).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>transferir</strong> wechselt den Stamm: ES <em>yo transfiero</em> (e→ie), aber <em>nosotros transferimos</em>; PT <em>eu transfiro</em> (e→i), aber <em>você transfere</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>cheque especial</strong> = der Überziehungskredit aufs Girokonto — ein brasilianisches Bankprodukt mit berüchtigt hohem Zins. <em>Entrar no cheque especial</em> = ins Minus rutschen. DE: Dispokredit, ES: sobregiro.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>parcelado em X vezes</strong> = Ratenkauf in X Monatsraten — die dominante Zahlungsweise in Brasilien (in Europa unüblich). <em>Posso pagar parcelado?</em> = Kann ich in Raten zahlen?</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a maquininha</strong> = das Kartenterminal (gíria; formal <em>maquineta</em>). <em>Aceita maquininha?</em> = Nehmt ihr Karte? — allgegenwärtig im brasilianischen Handel.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>auf Pump kaufen</strong> (DE) = auf Kredit kaufen. PT <em>comprar fiado / no crediário</em>; ES (MX) <em>comprar a crédito / a meses</em>. Und das rote Konto: DE <em>in den roten Zahlen sein</em> = PT <em>ficar no vermelho</em>.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 22 — round four of the weekly theme Economics &amp; Finance. After Inflation/Interest (May 25), Contracts/Work (Jun 1), and Taxes/Investing (Jun 15), today's focus is banking: <em>taking out a loan, paying off debt, paying interest, rates rising and falling</em>. 32 new entries, 12 verbs with full conjugation, 3 review items from last week's economics session (exactly 7 days ago — the first true spaced-repetition refresh point).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Provision ≠ EN \"provision\"</strong> — German <em>Provision</em> means broker commission; EN \"provision\" = a reserve or stipulation. PT/ES: <em>comissão / comisión</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES renta ≠ DE Rente</strong> — <em>renta fija</em> means fixed income, not a pension; DE Rente = <em>pensión</em>. In Mexico <em>renta</em> also means rent.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT lucro ≠ DE Luxus</strong> — <em>o lucro líquido</em> = net profit; DE Luxus (luxury) = PT <em>luxo</em>. Similar spelling, completely different meaning.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE wachsen / steigen / sinken</strong> form the perfect tense with <em>sein</em>, not haben: <em>der Kurs ist gestiegen</em>, <em>der Preis ist gesunken</em>, <em>das Konto ist gewachsen</em> — never <em>*hat gestiegen</em>. These are motion/change-of-state verbs.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES reducir</strong> has two quirks: <em>yo reduzco</em> (c→zc in the yo present) and <em>yo reduje</em> (preterite with stem <em>reduj-</em>, no accent). Same pattern as <em>traducir</em>, <em>conducir</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES crecer</strong> is <em>not</em> regular: <em>yo crezco</em> (c→zc), subjunctive <em>crezca</em> — like <em>parecer</em>. But the preterite is normal: <em>crecí, creció</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>caer (ES) / cair (PT)</strong> insert an extra letter: ES <em>yo caigo</em>, PT <em>eu caio</em>. ES 3rd-person preterite: <em>él cayó, ustedes cayeron</em> (i→y between vowels).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>transferir</strong> shifts its stem: ES <em>yo transfiero</em> (e→ie) but <em>nosotros transferimos</em>; PT <em>eu transfiro</em> (e→i) but <em>você transfere</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>cheque especial</strong> = overdraft on a checking account — a Brazilian banking product notorious for its high interest. <em>Entrar no cheque especial</em> = to slip into the red. DE: Dispokredit, ES: sobregiro.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>parcelado em X vezes</strong> = installment purchase in X monthly payments — the dominant payment method in Brazil (unusual in Europe). <em>Posso pagar parcelado?</em> = Can I pay in installments?</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a maquininha</strong> = the card terminal (slang; formal: <em>maquineta</em>). <em>Aceita maquininha?</em> = Do you take card? — ubiquitous in Brazilian retail.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>auf Pump kaufen</strong> (DE) = to buy on credit. PT <em>comprar fiado / no crediário</em>; ES (MX) <em>comprar a crédito / a meses</em>. And running a deficit: DE <em>in den roten Zahlen sein</em> = PT <em>ficar no vermelho</em>.</li>\n    </ul></div>",
