        "de": "<div class=\"tldr\"><p class=\"lead\">Sonntag, kein frisches Advisory in den beobachteten Quellen — also die Bilanz einer Woche, die es in sich hatte. In elf Tagen wurden drei npm-Pakete gekapert: <strong>@injectivelabs/sdk-ts</strong> (08.07), <strong>jscrambler</strong> (11.07), <strong>@asyncapi/*</strong> (14.07). Einzeln liefen die hier schon durch. Zusammen ergeben sie ein Muster, das mir wichtiger erscheint als jeder Einzelfall: <strong>jeder benutzte einen anderen Ausführungs-Pfad</strong>. Und ausgerechnet am 08.07, dem Tag des ersten Einbruchs, hat npm v12 <code>allowScripts</code> standardmäßig abgeschaltet — eine Abwehr, die genau einen der drei Wege blockiert hätte. Kein Argument gegen die Änderung; eines dagegen, sie für erledigt zu halten. Dazu: warum der „Rekord-Patchday\" zu rund drei Vierteln aus Chromium besteht, ein SharePoint-Score, bei dem Microsoft <strong>5,3</strong> und die NVD <strong>9,8</strong> sagen, und die NIS-2-Registrierung in zwölf Tagen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Drei Einbrüche, drei Mechaniken</strong>: Injective (<strong>Laufzeit — Hook auf die Key-Ableitung</strong> <code>PrivateKey.fromMnemonic()</code>/<code>fromHex()</code>, feuert erst beim Laden einer Wallet; Keys per <code>X-Request-Id</code>-Header exfiltriert)<sup>[24]</sup>, jscrambler (erst <code>preinstall</code>-Hook, dann Umstieg auf Paket-Hauptcode), AsyncAPI (Import-Zeit, Payload über einen <strong>CI-Pwn-Request</strong> — GitHub Actions <code>pull_request_target</code>)<sup>[25]</sup>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>npm v12 ist seit 08.07 draußen</strong>: <code>allowScripts</code> standardmäßig aus, <code>--allow-git</code> und <code>--allow-remote</code> auf none. Blockiert Install-Skripte — nicht Code, der beim <code>import</code> läuft.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Reaktionszeit ist die eigentliche Verteidigung</strong>: Injective nach ~49 Minuten gefixt, jscrambler nach 6 Minuten entdeckt, AsyncAPI nach 19 Minuten erstmals nachgeladen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint-Score, zwei Meinungen</strong>: <strong>CVE-2026-56164</strong> — Microsoft rechnet CVSS <strong>5,3</strong> (Medium), die NVD <strong>9,8</strong> (Critical). Gleicher Angriffsvektor, komplett andere Wirkungs-Annahme. Steht seit 14.07 im CISA-KEV.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Der Rekord ist zum Teil Buchhaltung</strong>: Von den <strong>621</strong> CVEs im Juli-Patchday entfallen laut ZDI rund <strong>480</strong> auf Chromium/Edge. Bleiben ~141 echte Microsoft-Bugs, davon <strong>63 Critical</strong>. Outlets melden 569, 570, 621 und 622 — alle rechnen anders.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Browser</span> <strong>Firefox 152.0.6</strong> (MFSA 2026-67, 14.07): zwei Critical-CVEs mit öffentlichem Exploit-Code, laut Mozilla keine bestätigte Ausnutzung. <strong>Chrome 150.0.7871.124/.125</strong> (16.07): 15 Fixes, zwei kritische Use-after-free in Ozone.</li>\n      <li><span class=\"chip hot\">Regulierung</span> <span class=\"chip\">DE</span> <strong>NIS-2: noch zwölf Tage</strong> — Nachfrist bis <strong>31.07.2026</strong>. Von ~29.500 erwarteten Einrichtungen waren Ende Mai erst ~18.500 registriert. Und juristisch ist das keine Fristverlängerung, sondern eine Duldung.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16.07) räumt bei den zwei großen Neuerungen auf: SQL/PGQ-Property-Graphs und <code>FOR PORTION OF</code>. GA ist für Sept./Okt. angepeilt.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.7</strong> (16.07) mit einem ReDoS-Fix in der Sourcemap-URL-Prüfung; <strong>Tailscale 1.98.9</strong> (14.07) schließt sechs Punkte, TS-2026-004 bis -009.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Sunday, no fresh advisory in the sources we monitor — so today's a tally of a week that had plenty going on. In eleven days, three npm packages were hijacked: <strong>@injectivelabs/sdk-ts</strong> (08.07), <strong>jscrambler</strong> (11.07), <strong>@asyncapi/*</strong> (14.07). Individually, these already ran here. Together they form a pattern that strikes me as more important than any single case: <strong>each one used a different execution path</strong>. And of all days, on 08.07 — the day of the first breach — npm v12 turned off <code>allowScripts</code> by default, a defense that would have blocked exactly one of the three routes. Not an argument against the change; one against considering it solved. Also in this issue: why the \"record Patch Tuesday\" is roughly three-quarters Chromium, a SharePoint score where Microsoft says <strong>5.3</strong> and the NVD says <strong>9.8</strong>, and the NIS2 registration deadline in twelve days.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Three breaches, three mechanisms</strong>: Injective (<strong>runtime — a hook on key derivation</strong>, <code>PrivateKey.fromMnemonic()</code>/<code>fromHex()</code>, firing only when a wallet is loaded; keys exfiltrated via the <code>X-Request-Id</code> header)<sup>[24]</sup>, jscrambler (first a <code>preinstall</code> hook, then a switch to the package's main code), AsyncAPI (import-time, payload delivered through a <strong>CI pwn request</strong> — GitHub Actions <code>pull_request_target</code>)<sup>[25]</sup>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>npm v12 has been out since 08.07</strong>: <code>allowScripts</code> off by default, <code>--allow-git</code> and <code>--allow-remote</code> set to none. Blocks install scripts — not code that runs on <code>import</code>.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Response time is the real defense</strong>: Injective fixed after ~49 minutes, jscrambler detected after 6 minutes, AsyncAPI first pulled downstream after 19 minutes.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint score, two opinions</strong>: <strong>CVE-2026-56164</strong> — Microsoft rates it CVSS <strong>5.3</strong> (Medium), the NVD <strong>9.8</strong> (Critical). Same attack vector, completely different impact assumption. In the CISA KEV since 14.07.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>The record is partly bookkeeping</strong>: Of the <strong>621</strong> CVEs in the July Patch Tuesday, around <strong>480</strong> are Chromium/Edge, per ZDI. That leaves ~141 genuine Microsoft bugs, of which <strong>63 are Critical</strong>. Outlets report 569, 570, 621, and 622 — they're all counting differently.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Browser</span> <strong>Firefox 152.0.6</strong> (MFSA 2026-67, 14.07): two Critical CVEs with public exploit code, no confirmed exploitation per Mozilla. <strong>Chrome 150.0.7871.124/.125</strong> (16.07): 15 fixes, two critical use-after-free bugs in Ozone.</li>\n      <li><span class=\"chip hot\">Regulation</span> <span class=\"chip\">DE</span> <strong>NIS2: twelve days left</strong> — grace period until <strong>31 Jul 2026</strong>. Of ~29,500 expected entities, only ~18,500 had registered by the end of May. And legally, this isn't a deadline extension — it's forbearance.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16.07) cleans up the cycle's two big new features: SQL/PGQ property graphs and <code>FOR PORTION OF</code>. GA is targeted for Sept./Oct.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.7</strong> (16.07) with a ReDoS fix in sourcemap URL validation; <strong>Tailscale 1.98.9</strong> (14.07) closes six issues, TS-2026-004 through -009.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, sem advisory novo nas fontes monitoradas — então o balanço de uma semana daquelas. Em onze dias, três pacotes npm foram sequestrados: <strong>@injectivelabs/sdk-ts</strong> (08/07), <strong>jscrambler</strong> (11/07), <strong>@asyncapi/*</strong> (14/07). Isolados, cada um já passou por aqui. Juntos, formam um padrão que me parece mais importante do que qualquer caso isolado: <strong>cada um usou um caminho de execução diferente</strong>. E justamente em 08/07, dia da primeira invasão, o npm v12 desativou <code>allowScripts</code> por padrão — uma defesa que teria bloqueado exatamente um dos três caminhos. Não é um argumento contra a mudança; é um argumento contra achar que o problema está resolvido. Além disso: por que o \"patch day recorde\" é, em cerca de três quartos, pura contagem de Chromium, um score do SharePoint em que a Microsoft diz <strong>5,3</strong> e a NVD diz <strong>9,8</strong>, e o registro da NIS-2 em doze dias.</p>\n    <ul>\n      <li><span class=\"chip hot\">Segurança</span> <span class=\"chip\">Global</span> <strong>Três invasões, três mecânicas</strong>: Injective (<strong>tempo de execução — hook na derivação de chaves</strong>, <code>PrivateKey.fromMnemonic()</code>/<code>fromHex()</code>, dispara só quando uma carteira é carregada; chaves exfiltradas via header <code>X-Request-Id</code>)<sup>[24]</sup>, jscrambler (primeiro hook <code>preinstall</code>, depois mudança para o código principal do pacote), AsyncAPI (tempo de importação, payload via um <strong>pwn request de CI</strong> — GitHub Actions <code>pull_request_target</code>)<sup>[25]</sup>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>O npm v12 está disponível desde 08/07</strong>: <code>allowScripts</code> desativado por padrão, <code>--allow-git</code> e <code>--allow-remote</code> em none. Bloqueia scripts de instalação — não código que roda no <code>import</code>.</li>\n      <li><span class=\"chip hot\">Segurança</span> <span class=\"chip\">Global</span> <strong>Tempo de reação é a verdadeira defesa</strong>: Injective corrigido depois de ~49 minutos, jscrambler descoberto após 6 minutos, AsyncAPI baixado pela primeira vez após 19 minutos.</li>\n      <li><span class=\"chip hot\">Segurança</span> <span class=\"chip\">EUA</span> <strong>Score do SharePoint, duas opiniões</strong>: <strong>CVE-2026-56164</strong> — a Microsoft calcula CVSS <strong>5,3</strong> (Médio), a NVD <strong>9,8</strong> (Crítico). Mesmo vetor de ataque, premissa de impacto completamente diferente. Está no CISA-KEV desde 14/07.</li>\n      <li><span class=\"chip\">Segurança</span> <span class=\"chip\">Global</span> <strong>O recorde é, em parte, contabilidade</strong>: Dos <strong>621</strong> CVEs no patch day de julho, cerca de <strong>480</strong> pertencem ao Chromium/Edge, segundo a ZDI. Restam ~141 falhas genuínas da Microsoft, das quais <strong>63 críticas</strong>. Veículos noticiam 569, 570, 621 e 622 — cada um conta de um jeito.</li>\n      <li><span class=\"chip\">Segurança</span> <span class=\"chip\">Navegador</span> <strong>Firefox 152.0.6</strong> (MFSA 2026-67, 14/07): duas CVEs críticas com código de exploit público, sem exploração confirmada segundo a Mozilla. <strong>Chrome 150.0.7871.124/.125</strong> (16/07): 15 correções, duas use-after-free críticas no Ozone.</li>\n      <li><span class=\"chip hot\">Regulação</span> <span class=\"chip\">DE</span> <strong>NIS-2: ainda doze dias</strong> — prazo de tolerância até <strong>31/07/2026</strong>. Das ~29.500 entidades esperadas, apenas ~18.500 estavam registradas no fim de maio. E juridicamente isso não é uma prorrogação de prazo, é uma tolerância.</li>\n      <li><span class=\"chip\">Lançamento</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16/07) arruma as duas grandes novidades: grafos de propriedades SQL/PGQ e <code>FOR PORTION OF</code>. GA previsto para set./out.</li>\n      <li><span class=\"chip\">Lançamento</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.7</strong> (16/07) com correção de ReDoS na checagem da URL do sourcemap; <strong>Tailscale 1.98.9</strong> (14/07) resolve seis pontos, TS-2026-004 a -009.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo, sin ningún aviso nuevo en las fuentes monitoreadas — así que hoy toca el balance de una semana que dio mucho de qué hablar. En once días secuestraron tres paquetes de npm: <strong>@injectivelabs/sdk-ts</strong> (08/07), <strong>jscrambler</strong> (11/07), <strong>@asyncapi/*</strong> (14/07). Por separado ya pasaron por aquí. Juntos forman un patrón que me parece más relevante que cualquier caso aislado: <strong>cada uno usó una ruta de ejecución distinta</strong>. Y justo el 08/07, el día de la primera brecha, npm v12 desactivó <code>allowScripts</code> de forma predeterminada — una defensa que habría bloqueado exactamente una de las tres rutas. No es un argumento en contra del cambio; sí lo es en contra de darlo por resuelto. Además: por qué el «patch day récord» consiste en unas tres cuartas partes de Chromium, un puntaje de SharePoint en el que Microsoft dice <strong>5,3</strong> y la NVD dice <strong>9,8</strong>, y el registro de NIS-2 en doce días.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Tres brechas, tres mecanismos</strong>: Injective (<strong>tiempo de ejecución — hook en la derivación de claves</strong>, <code>PrivateKey.fromMnemonic()</code>/<code>fromHex()</code>, se dispara solo al cargar una wallet; claves exfiltradas por el encabezado <code>X-Request-Id</code>)<sup>[24]</sup>, jscrambler (primero un hook <code>preinstall</code>, luego cambio al código principal del paquete), AsyncAPI (tiempo de importación, payload a través de un <strong>pwn request de CI</strong> — GitHub Actions <code>pull_request_target</code>)<sup>[25]</sup>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>npm v12 salió el 08/07</strong>: <code>allowScripts</code> desactivado de forma predeterminada, <code>--allow-git</code> y <code>--allow-remote</code> en none. Bloquea los scripts de instalación — no el código que se ejecuta al hacer <code>import</code>.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>El tiempo de reacción es la verdadera defensa</strong>: Injective se corrigió tras ~49 minutos, jscrambler se detectó a los 6 minutos, AsyncAPI se descargó por primera vez a los 19 minutos.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">EE. UU.</span> <strong>Puntaje de SharePoint, dos opiniones</strong>: <strong>CVE-2026-56164</strong> — Microsoft calcula un CVSS de <strong>5,3</strong> (Medio), la NVD de <strong>9,8</strong> (Crítico). Mismo vector de ataque, supuesto de impacto completamente distinto. Está en el CISA-KEV desde el 14/07.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Global</span> <strong>El récord es en parte contabilidad</strong>: De los <strong>621</strong> CVEs del patch day de julio, según ZDI, unos <strong>480</strong> corresponden a Chromium/Edge. Quedan ~141 bugs genuinamente de Microsoft, de los cuales <strong>63 son críticos</strong>. Los medios reportan 569, 570, 621 y 622 — cada uno cuenta distinto.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Navegador</span> <strong>Firefox 152.0.6</strong> (MFSA 2026-67, 14/07): dos CVE críticos con código de exploit público, según Mozilla sin explotación confirmada. <strong>Chrome 150.0.7871.124/.125</strong> (16/07): 15 correcciones, dos use-after-free críticos en Ozone.</li>\n      <li><span class=\"chip hot\">Regulación</span> <span class=\"chip\">DE</span> <strong>NIS-2: aún doce días</strong> — plazo de gracia hasta el <strong>31/07/2026</strong>. De las ~29.500 entidades esperadas, a fines de mayo solo ~18.500 estaban registradas. Y jurídicamente esto no es una prórroga, sino una tolerancia.</li>\n      <li><span class=\"chip\">Lanzamiento</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16/07) pule las dos grandes novedades: los property graphs de SQL/PGQ y <code>FOR PORTION OF</code>. La disponibilidad general (GA) se apunta para sept./oct.</li>\n      <li><span class=\"chip\">Lanzamiento</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.7</strong> (16/07) con una corrección de ReDoS en la verificación de URLs de sourcemaps; <strong>Tailscale 1.98.9</strong> (14/07) cierra seis puntos, TS-2026-004 a -009.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Wir reden seit zwei Jahren über Modelle, als wäre das Modell das Produkt. Eine Messung vom 12.07. legt nahe, dass wir damit die falsche Hälfte anschauen. Zwei Coding-Werkzeuge, <strong>dasselbe Modell darunter</strong> — Claude Code schiebt vor der eigentlichen Frage rund <strong>32.800 Tokens</strong> an Systemprompt, Werkzeug-Beschreibungen und Gerüst in den Kontext, OpenCode etwa <strong>6.900</strong>. Faktor 4,7. Wer das für Verschwendung hält, hat den Punkt verpasst: Genau diese Tokens <em>sind</em> der Unterschied, den man beim Arbeiten spürt. Zusammen mit dem versehentlich veröffentlichten TypeScript-Quellcode vom März — 512.000 Zeilen, fünf Kontext-Komprimierungsstrategien, 14 nachverfolgte Cache-Bruchstellen — ergibt das erste halbwegs scharfe Bild davon, wo die Arbeit in einem Coding-Agenten wirklich steckt. Daneben: MCP wird in neun Tagen final und wirft Zustand über Bord, PyTorch bringt FlexAttention auf den Mac, und Grok 4.5 liefert schöne Zahlen, die niemand nachgemessen hat.</p>\n    <ul>\n      <li><span class=\"chip hot\">Harness</span> <strong>4,7-facher Kontext-Overhead bei gleichem Modell</strong> — Claude Code 2.1.207 vs. OpenCode 1.17.18, beide auf <code>claude-sonnet-4-5</code> festgenagelt. Gemessen am 12.07.2026.</li>\n      <li><span class=\"chip\">Harness</span> <strong>53.839 Cache-Schreib-Tokens gegen 1.003.</strong> Claude Code hat seinen ~43k-Präfix mitten in der Aufgabe komplett neu geschrieben — teuer, aber offenbar Absicht.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Der Quellcode-Leak vom 31.03. erklärt das Warum</strong>: v2.1.88, ~1.900 Dateien, 46.000 Zeilen allein für die Anfrage-Maschine, 29.000 für Werkzeug-Definitionen.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Finale Spezifikation am 28.07. — in neun Tagen.</strong> Größte Revision seit Start: kein <code>initialize</code>-Handshake, keine <code>Mcp-Session-Id</code>, Roots/Sampling/Logging als veraltet markiert.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08.07.): FlexAttention läuft jetzt auf Apple Silicon, bis <strong>~12,3×</strong> schneller als SDPA bei dünn besetzten Aufmerksamkeits-Mustern. Für lokale Experimente auf dem Mac der interessanteste Eintrag der Woche.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Grok 4.5: 64,7 % auf SWE-Bench Pro — laut xAI.</strong> Eigener Abruf von Scales SEAL-Bestenliste heute: Grok 4.5 steht dort nicht. Anbieter-Zahl, nicht Messung. Deshalb heute bewusst <em>kein</em> Balkendiagramm.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.214</strong> (18.07.): ein ganzer Schwung geschlossener Lücken in der Berechtigungsprüfung — PowerShell-Bypass, <code>Edit(src/**)</code> griff zu weit, Kommandos über 10.000 Zeichen fragen jetzt immer nach.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> Cline heute Morgen auf <code>cli-v3.0.45</code>, OpenHands auf <code>cloud-1.46.2</code> (15.07.), Cursor unverändert 3.11, Aiders Bestenliste seit dem 20.11.2025 eingefroren, Continue.dev endgültig tot.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Wir reden seit zwei Jahren über Modelle, als wäre das Modell das Produkt. Eine Messung vom 12.07. legt nahe, dass wir damit die falsche Hälfte anschauen. Zwei Coding-Werkzeuge, <strong>dasselbe Modell darunter</strong> — Claude Code schiebt vor der eigentlichen Frage rund <strong>32.800 Tokens</strong> an Systemprompt, Werkzeug-Beschreibungen und Gerüst in den Kontext, OpenCode etwa <strong>6.900</strong>. Faktor 4,7. Wer das für Verschwendung hält, hat den Punkt verpasst: Genau diese Tokens <em>sind</em> der Unterschied, den man beim Arbeiten spürt. Zusammen mit dem versehentlich veröffentlichten TypeScript-Quellcode vom März — 512.000 Zeilen, fünf Kontext-Komprimierungsstrategien, 14 nachverfolgte Cache-Bruchstellen — ergibt das erste halbwegs scharfe Bild davon, wo die Arbeit in einem Coding-Agenten wirklich steckt. Daneben: MCP wird in neun Tagen final und wirft Zustand über Bord, PyTorch bringt FlexAttention auf den Mac, und Grok 4.5 liefert schöne Zahlen, die niemand nachgemessen hat.</p>\n    <ul>\n      <li><span class=\"chip hot\">Harness</span> <strong>4,7-facher Kontext-Overhead bei gleichem Modell</strong> — Claude Code 2.1.207 vs. OpenCode 1.17.18, beide auf <code>claude-sonnet-4-5</code> festgenagelt. Gemessen am 12.07.2026.</li>\n      <li><span class=\"chip\">Harness</span> <strong>53.839 Cache-Schreib-Tokens gegen 1.003.</strong> Claude Code hat seinen ~43k-Präfix mitten in der Aufgabe komplett neu geschrieben — teuer, aber offenbar Absicht.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Der Quellcode-Leak vom 31.03. erklärt das Warum</strong>: v2.1.88, ~1.900 Dateien, 46.000 Zeilen allein für die Anfrage-Maschine, 29.000 für Werkzeug-Definitionen.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Finale Spezifikation am 28.07. — in neun Tagen.</strong> Größte Revision seit Start: kein <code>initialize</code>-Handshake, keine <code>Mcp-Session-Id</code>, Roots/Sampling/Logging als veraltet markiert.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08.07.): FlexAttention läuft jetzt auf Apple Silicon, bis <strong>~12,3×</strong> schneller als SDPA bei dünn besetzten Aufmerksamkeits-Mustern. Für lokale Experimente auf dem Mac der interessanteste Eintrag der Woche.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Grok 4.5: 64,7 % auf SWE-Bench Pro — laut xAI.</strong> Eigener Abruf von Scales SEAL-Bestenliste heute: Grok 4.5 steht dort nicht. Anbieter-Zahl, nicht Messung. Deshalb heute bewusst <em>kein</em> Balkendiagramm.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.214</strong> (18.07.): ein ganzer Schwung geschlossener Lücken in der Berechtigungsprüfung — PowerShell-Bypass, <code>Edit(src/**)</code> griff zu weit, Kommandos über 10.000 Zeichen fragen jetzt immer nach.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> Cline heute Morgen auf <code>cli-v3.0.45</code>, OpenHands auf <code>cloud-1.46.2</code> (15.07.), Cursor unverändert 3.11, Aiders Bestenliste seit dem 20.11.2025 eingefroren, Continue.dev endgültig tot.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">We've spent two years talking about models as if the model were the product. A measurement from 07/12 suggests we've been looking at the wrong half. Two coding tools, <strong>the same model underneath</strong> — Claude Code shoves roughly <strong>32,800 tokens</strong> of system prompt, tool descriptions, and scaffolding into the context before the actual question even arrives; OpenCode gets by with about <strong>6,900</strong>. A factor of 4.7. Anyone who calls that waste has missed the point: those exact tokens <em>are</em> the difference you feel while working. Combined with the accidentally published TypeScript source from March — 512,000 lines, five context-compaction strategies, 14 tracked cache-break vectors — this gives us the first reasonably sharp picture of where the real work in a coding agent actually sits. Alongside that: MCP goes final in nine days and throws state overboard, PyTorch brings FlexAttention to the Mac, and Grok 4.5 delivers nice numbers that nobody has independently remeasured.</p>\n    <ul>\n      <li><span class=\"chip hot\">Harness</span> <strong>4.7x context overhead on the same model</strong> — Claude Code 2.1.207 vs. OpenCode 1.17.18, both pinned to <code>claude-sonnet-4-5</code>. Measured on 07/12/2026.</li>\n      <li><span class=\"chip\">Harness</span> <strong>53,839 cache-write tokens versus 1,003.</strong> Claude Code completely rewrote its ~43k prefix mid-task — expensive, but apparently deliberate.</li>\n      <li><span class=\"chip\">Claude</span> <strong>The source-code leak from 03/31 explains the why</strong>: v2.1.88, ~1,900 files, 46,000 lines for the request engine alone, 29,000 for tool definitions.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Final spec on 07/28 — in nine days.</strong> The biggest revision since launch: no <code>initialize</code> handshake, no <code>Mcp-Session-Id</code>, Roots/Sampling/Logging marked deprecated.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (07/08): FlexAttention now runs on Apple Silicon, up to <strong>~12.3x</strong> faster than SDPA on sparse attention patterns. For local experiments on the Mac, the most interesting entry of the week.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Grok 4.5: 64.7% on SWE-Bench Pro — per xAI.</strong> Our own pull of Scale's SEAL leaderboard today: Grok 4.5 isn't on it. A vendor figure, not a measurement. Which is why there is deliberately <em>no</em> bar chart today.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.214</strong> (07/18): a whole batch of closed gaps in permission checking — a PowerShell bypass, <code>Edit(src/**)</code> reached too far, commands over 10,000 characters now always prompt.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-call:</strong> Cline this morning at <code>cli-v3.0.45</code>, OpenHands at <code>cloud-1.46.2</code> (07/15), Cursor unchanged at 3.11, Aider's leaderboard frozen since 11/20/2025, Continue.dev finally dead.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Há dois anos falamos de modelos como se o modelo fosse o produto. Uma medição de 12/07 sugere que estamos olhando para a metade errada. Duas ferramentas de codificação, <strong>o mesmo modelo por baixo</strong> — o Claude Code empurra para o contexto cerca de <strong>32.800 tokens</strong> de prompt de sistema, descrições de ferramentas e estrutura antes da pergunta em si, o OpenCode cerca de <strong>6.900</strong>. Fator 4,7. Quem acha isso desperdício perdeu o ponto: são exatamente esses tokens a diferença que se sente ao trabalhar. Somado ao código-fonte TypeScript vazado por acidente em março — 512.000 linhas, cinco estratégias de compressão de contexto, 14 pontos de quebra de cache rastreados —, isso forma o primeiro retrato razoavelmente nítido de onde de fato está o trabalho em um agente de codificação. Além disso: a especificação do MCP fica definitiva em nove dias e descarta o estado, o PyTorch traz o FlexAttention para o Mac, e o Grok 4.5 apresenta números bonitos que ninguém conferiu de forma independente.</p>\n    <ul>\n      <li><span class=\"chip hot\">Harness</span> <strong>Overhead de contexto 4,7 vezes maior com o mesmo modelo</strong> — Claude Code 2.1.207 vs. OpenCode 1.17.18, ambos fixados em <code>claude-sonnet-4-5</code>. Medido em 12/07/2026.</li>\n      <li><span class=\"chip\">Harness</span> <strong>53.839 tokens de escrita em cache contra 1.003.</strong> O Claude Code reescreveu por completo seu prefixo de ~43k no meio da tarefa — caro, mas aparentemente proposital.</li>\n      <li><span class=\"chip\">Claude</span> <strong>O vazamento do código-fonte de 31/03 explica o porquê</strong>: v2.1.88, ~1.900 arquivos, 46.000 linhas só para o motor de requisições, 29.000 para definições de ferramentas.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Especificação final em 28/07 — daqui a nove dias.</strong> Maior revisão desde o início: sem handshake de <code>initialize</code>, sem <code>Mcp-Session-Id</code>, Roots/Sampling/Logging marcados como obsoletos.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08/07): o FlexAttention agora roda em Apple Silicon, até <strong>~12,3×</strong> mais rápido que o SDPA em padrões de atenção esparsos. Para experimentos locais no Mac, a entrada mais interessante da semana.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Grok 4.5: 64,7 % no SWE-Bench Pro — segundo a xAI.</strong> Consulta própria ao leaderboard SEAL da Scale hoje: o Grok 4.5 não aparece lá. Número do fornecedor, não medição. Por isso hoje, propositalmente, <em>sem</em> gráfico de barras.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.214</strong> (18/07): uma leva inteira de brechas fechadas na verificação de permissões — bypass do PowerShell, a regra <code>Edit(src/**)</code> alcançava longe demais, comandos com mais de 10.000 caracteres agora sempre pedem confirmação.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Chamada geral:</strong> Cline hoje de manhã na <code>cli-v3.0.45</code>, OpenHands na <code>cloud-1.46.2</code> (15/07), Cursor inalterado em 3.11, leaderboard do Aider congelado desde 20/11/2025, Continue.dev definitivamente morto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Llevamos dos años hablando de modelos, como si el modelo fuera el producto. Una medición del 12/07 sugiere que estamos mirando la mitad equivocada. Dos herramientas de programación, <strong>el mismo modelo por debajo</strong> — Claude Code mete cerca de <strong>32.800 tokens</strong> de system prompt, descripciones de herramientas y andamiaje en el contexto antes de la pregunta real, OpenCode unos <strong>6.900</strong>. Factor 4,7. Quien vea esto como desperdicio se perdió el punto: precisamente esos tokens <em>son</em> la diferencia que se siente al trabajar. Junto con el código fuente en TypeScript filtrado accidentalmente en marzo — 512.000 líneas, cinco estrategias de compresión de contexto, 14 puntos de ruptura de caché registrados — esto arma la primera imagen medianamente nítida de dónde está realmente el trabajo en un agente de programación. Aparte: MCP se vuelve definitivo en nueve días y elimina el estado, PyTorch trae FlexAttention a la Mac, y Grok 4.5 entrega cifras bonitas que nadie ha vuelto a medir.</p>\n    <ul>\n      <li><span class=\"chip hot\">Harness</span> <strong>Sobrecarga de contexto 4,7 veces mayor con el mismo modelo</strong> — Claude Code 2.1.207 vs. OpenCode 1.17.18, ambos fijados a <code>claude-sonnet-4-5</code>. Medido el 12/07/2026.</li>\n      <li><span class=\"chip\">Harness</span> <strong>53.839 tokens de escritura en caché contra 1.003.</strong> Claude Code reescribió por completo su prefijo de ~43k a mitad de la tarea — costoso, pero aparentemente intencional.</li>\n      <li><span class=\"chip\">Claude</span> <strong>La filtración del código fuente del 31/03 explica el porqué</strong>: v2.1.88, ~1.900 archivos, 46.000 líneas solo para el motor de solicitudes, 29.000 para definiciones de herramientas.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Especificación final el 28/07 — en nueve días.</strong> La mayor revisión desde el lanzamiento: sin handshake de <code>initialize</code>, sin <code>Mcp-Session-Id</code>, Roots/Sampling/Logging marcados como obsoletos.</li>\n      <li><span class=\"chip good\">Local</span> <strong>PyTorch 2.13</strong> (08/07): FlexAttention ya corre en Apple Silicon, hasta <strong>~12,3×</strong> más rápido que SDPA en patrones de atención dispersos. Para experimentos locales en la Mac, la entrada más interesante de la semana.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Grok 4.5: 64,7 % en SWE-Bench Pro — según xAI.</strong> Consulta propia de la tabla SEAL de Scale hoy: Grok 4.5 no aparece ahí. Cifra del proveedor, no una medición. Por eso hoy, deliberadamente, <em>ningún</em> gráfico de barras.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Claude Code 2.1.214</strong> (18/07): toda una serie de brechas cerradas en la verificación de permisos — bypass de PowerShell, <code>Edit(src/**)</code> alcanzaba demasiado lejos, los comandos de más de 10.000 caracteres ahora siempre piden confirmación.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Pasando lista:</strong> Cline esta mañana en <code>cli-v3.0.45</code>, OpenHands en <code>cloud-1.46.2</code> (15/07), Cursor sin cambios en 3.11, la tabla de Aider congelada desde el 20/11/2025, Continue.dev definitivamente muerto.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sonntag, wenig frische Nachrichten — und genau deshalb ein guter Tag, um die wichtigste Zahl der letzten zwei Wochen richtig zu lesen. Anthropic hat am 07.07. offengelegt, wofür sein Agenten-Werkzeug <strong>Cowork</strong> tatsächlich benutzt wird: <strong>über 90 % der Nutzung ist keine Softwareentwicklung.</strong> Das ist keine Marketing-Behauptung, sondern eine Auswertung von 1,2 Millionen Sitzungen aus über 600.000 Organisationen. Damit ist die Frage, die dieses Revier seit einem Jahr begleitet, empirisch beantwortet: Agenten sind aus dem Entwickler-Stuhl heraus. Bemerkenswerter noch ist, welches <em>eine</em> Beispiel Anthropic für gewöhnliche Büroarbeit gewählt hat — einen Ordner Verträge in einen Verlängerungs-Tracker mit markierten Risiken verwandeln. Das ist kein Feature. Das ist ein Geschäftsmodell, das gerade offen herumliegt.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Cowork-Nutzung offengelegt</strong>: <strong>&gt;90 %</strong> der Nutzung ist <em>nicht</em> Softwareentwicklung — Stichprobe 1,2 Mio. Sitzungen aus 600.000+ Organisationen, letzte zwei Mai-Wochen.</li>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Die Verteilung</strong>: Geschäftsprozesse <strong>33,4 %</strong>, Inhalte-Erstellung <strong>16,4 %</strong>, Softwareentwicklung nur <strong>8,7 %</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Das Vorzeige-Beispiel</strong>: „ein Ordner Verträge → Verlängerungs-Tracker mit markierten Risiken\". Ausgerechnet der Anwendungsfall, für den es einen eigenen, teuren Software-Markt gibt.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>ChatGPT Work</strong> (seit 09.07.) zielt ausdrücklich auf Leute, die nie eine Entwicklungsumgebung geöffnet haben — <span class=\"update-since\">Stand unverändert</span> weiterhin kein unabhängiger Praxis-Test.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>Payhawk</strong>: <strong>−50 %</strong> Zeit für die Spesen-Einreichung mit Gemini-Agenten; über <strong>6 Billionen</strong> Tokens/Monat laufen über Googles Agenten-Baukasten. Anbieter-veröffentlichte Zahlen, ohne Ausgangsbasis.</li>\n      <li><span class=\"chip hot\">Achtung · Methode</span> <strong>Drei Zahlen stehen heute bewusst NICHT hier</strong>: McKinsey-„91 % Adoption\", ein 31-Mrd.-$-KI-Vertragsmarkt und ein 18,2-%-Marktanteil — keine erreichbare Primärquelle.</li>\n      <li><span class=\"chip\">REG · EU/DE</span> <strong>02.08.</strong>: Transparenzpflichten (Art. 50) und Sanktionsbefugnisse greifen, die Bundesnetzagentur wird Marktüberwachung. <strong>Hochrisiko-Pflichten aber erst 02.12.2027.</strong></li>\n      <li><span class=\"chip good\">twiceD</span> Eine gründlich recherchierte Idee statt drei dünner: ein <strong>Vertrags-Radar</strong> für den Mittelstand. Markt <strong>2,07 → 5,09 Mrd. $</strong> (2026→2034), aber die Anbieter darin sind zu groß für den Kunden.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Sonntag, wenig frische Nachrichten — und genau deshalb ein guter Tag, um die wichtigste Zahl der letzten zwei Wochen richtig zu lesen. Anthropic hat am 07.07. offengelegt, wofür sein Agenten-Werkzeug <strong>Cowork</strong> tatsächlich benutzt wird: <strong>über 90 % der Nutzung ist keine Softwareentwicklung.</strong> Das ist keine Marketing-Behauptung, sondern eine Auswertung von 1,2 Millionen Sitzungen aus über 600.000 Organisationen. Damit ist die Frage, die dieses Revier seit einem Jahr begleitet, empirisch beantwortet: Agenten sind aus dem Entwickler-Stuhl heraus. Bemerkenswerter noch ist, welches <em>eine</em> Beispiel Anthropic für gewöhnliche Büroarbeit gewählt hat — einen Ordner Verträge in einen Verlängerungs-Tracker mit markierten Risiken verwandeln. Das ist kein Feature. Das ist ein Geschäftsmodell, das gerade offen herumliegt.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Cowork-Nutzung offengelegt</strong>: <strong>&gt;90 %</strong> der Nutzung ist <em>nicht</em> Softwareentwicklung — Stichprobe 1,2 Mio. Sitzungen aus 600.000+ Organisationen, letzte zwei Mai-Wochen.</li>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Die Verteilung</strong>: Geschäftsprozesse <strong>33,4 %</strong>, Inhalte-Erstellung <strong>16,4 %</strong>, Softwareentwicklung nur <strong>8,7 %</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Das Vorzeige-Beispiel</strong>: „ein Ordner Verträge → Verlängerungs-Tracker mit markierten Risiken\". Ausgerechnet der Anwendungsfall, für den es einen eigenen, teuren Software-Markt gibt.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>ChatGPT Work</strong> (seit 09.07.) zielt ausdrücklich auf Leute, die nie eine Entwicklungsumgebung geöffnet haben — <span class=\"update-since\">Stand unverändert</span> weiterhin kein unabhängiger Praxis-Test.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>Payhawk</strong>: <strong>−50 %</strong> Zeit für die Spesen-Einreichung mit Gemini-Agenten; über <strong>6 Billionen</strong> Tokens/Monat laufen über Googles Agenten-Baukasten. Anbieter-veröffentlichte Zahlen, ohne Ausgangsbasis.</li>\n      <li><span class=\"chip hot\">Achtung · Methode</span> <strong>Drei Zahlen stehen heute bewusst NICHT hier</strong>: McKinsey-„91 % Adoption\", ein 31-Mrd.-$-KI-Vertragsmarkt und ein 18,2-%-Marktanteil — keine erreichbare Primärquelle.</li>\n      <li><span class=\"chip\">REG · EU/DE</span> <strong>02.08.</strong>: Transparenzpflichten (Art. 50) und Sanktionsbefugnisse greifen, die Bundesnetzagentur wird Marktüberwachung. <strong>Hochrisiko-Pflichten aber erst 02.12.2027.</strong></li>\n      <li><span class=\"chip good\">twiceD</span> Eine gründlich recherchierte Idee statt drei dünner: ein <strong>Vertrags-Radar</strong> für den Mittelstand. Markt <strong>2,07 → 5,09 Mrd. $</strong> (2026→2034), aber die Anbieter darin sind zu groß für den Kunden.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Sunday, light on fresh news — and exactly for that reason, a good day to properly read the most important number of the last two weeks. On July 7 Anthropic disclosed what its agentic tool <strong>Cowork</strong> is actually used for: <strong>more than 90% of usage is not software development.</strong> That's not a marketing claim, it's an analysis of 1.2 million sessions across more than 600,000 organizations. That settles, empirically, the question this beat has carried for a year: agents are out of the developer's chair. Even more notable is the <em>one</em> example Anthropic chose for ordinary office work — turning a folder of contracts into a renewal tracker with flagged risks. That's not a feature. That's a business model just lying around in plain sight.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Cowork usage disclosed</strong>: <strong>&gt;90%</strong> of usage is <em>not</em> software development — sample of 1.2M sessions from 600,000+ organizations, last two weeks of May.</li>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>The breakdown</strong>: business operations <strong>33.4%</strong>, content creation <strong>16.4%</strong>, software development just <strong>8.7%</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>The showcase example</strong>: \"a folder of contracts → a renewal tracker with flagged risks.\" Of all things, the use case with its own, expensive software category.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>ChatGPT Work</strong> (since July 9) is explicitly aimed at people who have never opened a dev environment — <span class=\"update-since\">status unchanged</span>, still no independent hands-on test.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>Payhawk</strong>: <strong>−50%</strong> time on expense submission with Gemini agents; over <strong>6 trillion</strong> tokens/month run through Google's agent toolkit. Vendor-published figures, no stated baseline.</li>\n      <li><span class=\"chip hot\">Heads up · Method</span> <strong>Three numbers deliberately do NOT appear here today</strong>: McKinsey's \"91% adoption,\" a $31B AI contract market, and an 18.2% market-share figure — no reachable primary source.</li>\n      <li><span class=\"chip\">REG · EU/DE</span> <strong>August 2</strong>: Transparency obligations (Art. 50) and sanctioning powers take effect, with the Bundesnetzagentur becoming market surveillance authority. <strong>High-risk obligations, however, not until December 2, 2027.</strong></li>\n      <li><span class=\"chip good\">twiceD</span> One thoroughly researched idea instead of three thin ones: a <strong>Contract Radar</strong> for SMEs. Market <strong>$2.07B → $5.09B</strong> (2026→2034), but the vendors in it are too big for the target customer.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, poucas notícias frescas — e é justamente por isso um bom dia para ler com atenção o número mais importante das últimas duas semanas. A Anthropic revelou em 07/07 para que sua ferramenta de agentes <strong>Cowork</strong> é realmente usada: <strong>mais de 90 % do uso não é desenvolvimento de software.</strong> Não é uma afirmação de marketing, e sim uma análise de 1,2 milhão de sessões em mais de 600 mil organizações. Com isso, a pergunta que acompanha este setor há um ano tem resposta empírica: os agentes saíram da cadeira do desenvolvedor. Mais notável ainda é o <em>único</em> exemplo que a Anthropic escolheu para o trabalho de escritório comum — transformar uma pasta de contratos em um rastreador de renovações com riscos marcados. Isso não é um recurso. É um modelo de negócio que está literalmente exposto.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Uso do Cowork revelado</strong>: <strong>&gt;90 %</strong> do uso <em>não é</em> desenvolvimento de software — amostra de 1,2 milhão de sessões em mais de 600 mil organizações, últimas duas semanas de maio.</li>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>A distribuição</strong>: processos de negócio <strong>33,4 %</strong>, criação de conteúdo <strong>16,4 %</strong>, desenvolvimento de software apenas <strong>8,7 %</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>O exemplo-vitrine</strong>: \"uma pasta de contratos → rastreador de renovações com riscos marcados\". Justamente o caso de uso para o qual existe um mercado de software próprio e caro.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>ChatGPT Work</strong> (desde 09/07) mira explicitamente pessoas que nunca abriram um ambiente de desenvolvimento — <span class=\"update-since\">situação inalterada</span>, continua sem teste prático independente.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>Payhawk</strong>: <strong>−50 %</strong> no tempo de envio de despesas com agentes Gemini; mais de <strong>6 trilhões</strong> de tokens/mês passam pelo kit de agentes do Google. Números publicados pelo fornecedor, sem linha de base.</li>\n      <li><span class=\"chip hot\">Atenção · Método</span> <strong>Três números ficam deliberadamente FORA daqui hoje</strong>: \"91 % de adoção\" da McKinsey, um mercado de contratos de IA de US$ 31 bilhões e uma fatia de mercado de 18,2 % — sem fonte primária acessível.</li>\n      <li><span class=\"chip\">REG · EU/DE</span> <strong>02/08</strong>: obrigações de transparência (Art. 50) e poderes de sanção entram em vigor, a Bundesnetzagentur vira autoridade de fiscalização de mercado. <strong>Mas as obrigações de alto risco só valem em 02/12/2027.</strong></li>\n      <li><span class=\"chip good\">twiceD</span> Uma ideia bem pesquisada em vez de três rasas: um <strong>Radar de Contratos</strong> para o mercado de médio porte. Mercado de <strong>US$ 2,07 → 5,09 bi</strong> (2026→2034), mas os fornecedores nesse mercado são grandes demais para o cliente.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo, pocas noticias frescas — y precisamente por eso es un buen día para leer correctamente el dato más importante de las últimas dos semanas. Anthropic reveló el 07/07 para qué se usa realmente su herramienta de agentes <strong>Cowork</strong>: <strong>más del 90 % del uso no es desarrollo de software.</strong> No es una afirmación de marketing, sino un análisis de 1,2 millones de sesiones de más de 600.000 organizaciones. Con esto queda respondida empíricamente la pregunta que ha acompañado a este sector durante un año: los agentes salieron de la silla del desarrollador. Más notable aún es el único ejemplo que Anthropic eligió para el trabajo de oficina común — convertir una carpeta de contratos en un rastreador de renovaciones con riesgos marcados. Esto no es una función. Es un modelo de negocio que está ahí, a la vista de todos.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Uso de Cowork revelado</strong>: <strong>&gt;90 %</strong> del uso <em>no</em> es desarrollo de software — muestra de 1,2 millones de sesiones de más de 600.000 organizaciones, últimas dos semanas de mayo.</li>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>La distribución</strong>: procesos de negocio <strong>33,4 %</strong>, creación de contenido <strong>16,4 %</strong>, desarrollo de software solo <strong>8,7 %</strong>.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>El ejemplo estrella</strong>: «una carpeta de contratos → rastreador de renovaciones con riesgos marcados». Justo el caso de uso para el que existe todo un mercado de software propio y costoso.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>ChatGPT Work</strong> (desde el 09/07) apunta explícitamente a personas que nunca abrieron un entorno de desarrollo — <span class=\"update-since\">estado sin cambios</span> sigue sin haber una prueba de campo independiente.</li>\n      <li><span class=\"chip\">DEPLOY · EU</span> <strong>Payhawk</strong>: <strong>−50 %</strong> de tiempo para la presentación de gastos con agentes de Gemini; más de <strong>6 billones</strong> de tokens al mes pasan por el kit de agentes de Google. Cifras publicadas por el proveedor, sin línea base.</li>\n      <li><span class=\"chip hot\">Atención · Metodología</span> <strong>Tres cifras hoy deliberadamente NO aparecen aquí</strong>: el «91 % de adopción» de McKinsey, un mercado de contratos de IA de 31 mil millones de USD y una participación de mercado del 18,2 % — sin fuente primaria accesible.</li>\n      <li><span class=\"chip\">REG · EU/DE</span> <strong>02/08</strong>: entran en vigor las obligaciones de transparencia (Art. 50) y las facultades sancionadoras, la Bundesnetzagentur se convierte en autoridad de vigilancia de mercado. <strong>Pero las obligaciones de alto riesgo recién el 02/12/2027.</strong></li>\n      <li><span class=\"chip good\">twiceD</span> Una idea investigada a fondo en vez de tres superficiales: un <strong>radar de contratos</strong> para la pyme. Mercado <strong>2,07 → 5,09 mil millones de USD</strong> (2026→2034), pero los proveedores en él son demasiado grandes para el cliente.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute lohnt der Blick auf die eigene Datenbasis mehr als auf die Nachrichtenlage. Von 137 Board-Einträgen nennen nur <strong>elf</strong> überhaupt eine Zahl aus dem Listing selbst — und die sechs Freelance-Sätze darunter liegen bei <strong>50–65, 70, 70, ab 70, 80 und rund 85 €/h</strong>. Die <strong>90–120 €/h*</strong>, die im Board an 121 Einträgen stehen, sind recherchierte Benchmark-Werte, keine beobachteten Preise. Zwei Belege ziehen in dieselbe Richtung — ohne sich gegenseitig zu bestätigen: Malt setzt den <strong>Senior-Tagessatz (8–15 Jahre) auf 699 €</strong> — bei acht Stunden rund <strong>87 €/h</strong> —, und der DACH-Gesamtmarkt-Stundensatz fiel 2026 erstmals seit Jahren, von 104 auf 103 €/h. Die Malt-Zahl ist eine Einzelquelle (malt.de blockt automatisierte Abrufe), die 103 € stammen aus dem Freelancer-Kompass 2026 — derselben Erhebung wie der 95-€-Median weiter unten. Und die Nachfrage-Zahl, mit der solche Sätze sonst verteidigt werden, hält der Prüfung nicht stand: Die vielzitierten <strong>728.000</strong> fehlenden Fachkräfte bis 2027 sind eine IW-Zahl über <em>alle</em> Berufe aus einer Mitteilung vom <strong>09.08.2024</strong>; für Informatik-Experten nennt dieselbe Quelle <strong>19.000</strong>. Ruhiger Board-Tag, unveränderte Spitze — aber ein sehr klares Preissignal.</p>\n    <ul>\n      <li><span class=\"chip hot\">Rate</span> <strong>Die einzigen beobachtbaren Preise sind zweistellig</strong>: sechs Freelance-Listings nennen eine eigene €/h-Zahl — 50–65 (FERCHAU), 70 (Right People, 2×), ab 70 (Optimus), 80 (CIMPCO), ~85 bzw. 680 €/Tag (ProTIP für DB Systel). Kein einziges der Top-Listings nennt eine Rate.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Malt bestätigt die Größenordnung</strong>: Senior-Java 8–15 Jahre <strong>699 €/Tag</strong> (3–7 J.: 526 €, 15+ J.: 720 €; Frankfurt 764 €, München 676 €). Bei acht Stunden sind das <strong>87 €/h</strong> — die Board-Spitze wird bei 90–130 €/h* geführt, also darüber.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Erster Rückgang seit Jahren</strong>: Der Gesamtmarkt-Durchschnitt sank 2026 von 104 auf <strong>103 €/h</strong> — laut <strong>Freelancer-Kompass 2026</strong> von freelancermap (5.400+ Befragte), erstmals seit Beginn der Erhebung kein Anstieg.<sup>[5]</sup> Kleine Zahl, wichtige Richtung — der Preis steigt nicht mehr. Zu beachten: Diese Zahl und der 95-€-Median stammen aus <em>derselben</em> Erhebung, sind also ein Beleg und nicht zwei.</li>\n      <li><span class=\"chip hot\">Korrektur</span> <strong>Die 728.000 sind nicht die IT-Lücke</strong>: Die IW-Zahl stammt aus einer Mitteilung vom <strong>09.08.2024</strong>, gilt über alle Berufe und führt Informatik mit <strong>19.000</strong> unbesetzten Stellen auf Platz 5. Der MINT-Frühjahrsreport 2026 (05.05.2026) misst die MINT-Lücke im März 2026 mit <strong>133.900</strong>, davon 44.200 in Expertenberufen.<sup>[3][4]</sup></li>\n      <li><span class=\"chip warn\">Recht</span> <strong>Drei regulatorische Uhren laufen</strong>: KIRA — KI-gestützte Prüfsoftware der Rentenversicherung — soll <strong>2026</strong> in die Fläche; die EU-Plattformarbeits-Richtlinie muss Deutschland bis <strong>02.12.2026</strong> umsetzen (Beweislast kehrt sich um); die AÜG-Weisung der Bundesagentur gilt seit <strong>01.07.2026</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board auf 137</strong> (gestern 127, <strong>10 neu</strong>): 121 Freelance / 11 Employee / 5 Intriguing, Ø Fit <strong>61,5</strong>, <strong>17</strong> ≥ 80, <strong>39</strong> ≥ 70. Spitze unverändert bei Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Der Stack-Mix bleibt stehen</strong>: Java <strong>62×</strong>, Angular 47×, Spring Boot 45×, Kubernetes 29×, AWS 27×, AI-Integration 19×; <strong>112</strong> von 137 mit Remote-Tag.</li>\n      <li><span class=\"chip\">TED</span> <strong>Heute keine neue Ausschreibung im Filter</strong>. Die sechs vom 18.07. laufen weiter (Fristen 30.07.–11.08.) — Stand von gestern, heute nicht nachgeprüft. Zwei zusätzlich aufgetauchte Großverfahren sind <strong>nicht bietbar</strong> (Frist verstrichen bzw. unauffindbar) und stehen unten nur als Größenordnungs-Beispiel.</li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>13 von 137 datiert, 11 mit Listing-eigener Rate</strong>: freelancermap (116 der 137 Quellen) gibt für die meisten Projekte kein Posting-Datum aus. Eine kursierende Bitkom-Zahl (149.000 fehlende IT-Kräfte, +12 %) ließ sich diese Runde nicht gegenprüfen und wird deshalb <em>nicht</em> geführt.</li>\n    </ul></div>",

wird bei 90–130 €/h* geführt, also darüber.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Erster Rückgang seit Jahren</strong>: Der Gesamtmarkt-Durchschnitt sank 2026 von 104 auf <strong>103 €/h</strong> — laut <strong>Freelancer-Kompass 2026</strong> von freelancermap (5.400+ Befragte), erstmals seit Beginn der Erhebung kein Anstieg.<sup>[5]</sup> Kleine Zahl, wichtige Richtung — der Preis steigt nicht mehr. Zu beachten: Diese Zahl und der 95-€-Median stammen aus <em>derselben</em> Erhebung, sind also ein Beleg und nicht zwei.</li>\n      <li><span class=\"chip hot\">Korrektur</span> <strong>Die 728.000 sind nicht die IT-Lücke</strong>: Die IW-Zahl stammt aus einer Mitteilung vom <strong>09.08.2024</strong>, gilt über alle Berufe und führt Informatik mit <strong>19.000</strong> unbesetzten Stellen auf Platz 5. Der MINT-Frühjahrsreport 2026 (05.05.2026) misst die MINT-Lücke im März 2026 mit <strong>133.900</strong>, davon 44.200 in Expertenberufen.<sup>[3][4]</sup></li>\n      <li><span class=\"chip warn\">Recht</span> <strong>Drei regulatorische Uhren laufen</strong>: KIRA — KI-gestützte Prüfsoftware der Rentenversicherung — soll <strong>2026</strong> in die Fläche; die EU-Plattformarbeits-Richtlinie muss Deutschland bis <strong>02.12.2026</strong> umsetzen (Beweislast kehrt sich um); die AÜG-Weisung der Bundesagentur gilt seit <strong>01.07.2026</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board auf 137</strong> (gestern 127, <strong>10 neu</strong>): 121 Freelance / 11 Employee / 5 Intriguing, Ø Fit <strong>61,5</strong>, <strong>17</strong> ≥ 80, <strong>39</strong> ≥ 70. Spitze unverändert bei Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Der Stack-Mix bleibt stehen</strong>: Java <strong>62×</strong>, Angular 47×, Spring Boot 45×, Kubernetes 29×, AWS 27×, AI-Integration 19×; <strong>112</strong> von 137 mit Remote-Tag.</li>\n      <li><span class=\"chip\">TED</span> <strong>Heute keine neue Ausschreibung im Filter</strong>. Die sechs vom 18.07. laufen weiter (Fristen 30.07.–11.08.) — Stand von gestern, heute nicht nachgeprüft. Zwei zusätzlich aufgetauchte Großverfahren sind <strong>nicht bietbar</strong> (Frist verstrichen bzw. unauffindbar) und stehen unten nur als Größenordnungs-Beispiel.</li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>13 von 137 datiert, 11 mit Listing-eigener Rate</strong>: freelancermap (116 der 137 Quellen) gibt für die meisten Projekte kein Posting-Datum aus. Eine kursierende Bitkom-Zahl (149.000 fehlende IT-Kräfte, +12 %) ließ sich diese Runde nicht gegenprüfen und wird deshalb <em>nicht</em> geführt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today it's worth reading our own data rather than the headlines. Of 137 board listings, only <strong>eleven</strong> state any figure straight from the listing itself — and the six freelance rates among them come in at <strong>€50–65, €70, €70, from €70, €80, and around €85/h</strong>. The <strong>€90–120/h*</strong> shown against 121 listings on the board are researched benchmark figures, not observed prices. Two data points point the same way — without corroborating each other: Malt sets the <strong>senior day rate (8–15 years) at €699</strong> — around <strong>€87/h</strong> over an eight-hour day — and the DACH-wide average hourly rate fell in 2026 for the first time in years, from €104 to €103/h. The Malt figure is single-sourced (malt.de blocks automated fetches), and the €103 comes from the 2026 Freelancer Compass — the same survey as the €95 median cited below. And the demand figure usually cited to defend such rates doesn't hold up: the widely quoted <strong>728,000</strong> missing skilled workers by 2027 is an IW figure across <em>all</em> professions from a release dated <strong>August 9, 2024</strong>; for IT specialists, the same source states <strong>19,000</strong>. A quiet day on the board, an unchanged top spot — but a very clear pricing signal.</p>\n    <ul>\n      <li><span class=\"chip hot\">Rate</span> <strong>The only observable prices are double-digit</strong>: six freelance listings quote their own €/h figure — 50–65 (FERCHAU), 70 (Right People, 2×), from 70 (Optimus), 80 (CIMPCO), ~85 or €680/day (ProTIP for DB Systel). Not a single top listing states a rate.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Malt confirms the order of magnitude</strong>: senior Java, 8–15 years, <strong>€699/day</strong> (3–7 yrs: €526, 15+ yrs: €720; Frankfurt €764, Munich €676). Over eight hours that's <strong>€87/h</strong> — the board's top rates are listed at €90–130/h*, i.e. above that.</li>\n      <li><span class=\"chip\">Rate</span> <strong>First decline in years</strong>: the overall market average fell in 2026 from €104 to <strong>€103/h</strong> — per freelancermap's <strong>2026 Freelancer Compass</strong> (5,400+ respondents), the first time since the survey began that the rate hasn't risen.<sup>[5]</sup> A small number, an important direction — prices have stopped rising. Note: this figure and the €95 median come from the <em>same</em> survey, so they are one data point, not two.</li>\n      <li><span class=\"chip hot\">Correction</span> <strong>The 728,000 figure isn't the IT gap</strong>: the IW figure comes from a release dated <strong>August 9, 2024</strong>, applies across all professions, and ranks IT at fifth place with <strong>19,000</strong> unfilled positions. The MINT Spring Report 2026 (May 5, 2026) puts the STEM gap in March 2026 at <strong>133,900</strong>, of which 44,200 are in expert-level roles.<sup>[3][4]</sup></li>\n      <li><span class=\"chip warn\">Regulation</span> <strong>Three regulatory clocks are running</strong>: KIRA — the pension insurance system's AI-driven audit software — is set to roll out nationwide in <strong>2026</strong>; Germany must transpose the EU Platform Work Directive by <strong>December 2, 2026</strong> (reversing the burden of proof); the Federal Employment Agency's AÜG directive has been in force since <strong>July 1, 2026</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board at 137</strong> (yesterday 127, <strong>10 new</strong>): 121 Freelance / 11 Employee / 5 Intriguing, avg. Fit <strong>61.5</strong>, <strong>17</strong> ≥ 80, <strong>39</strong> ≥ 70. Top spot unchanged at Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>The stack mix holds steady</strong>: Java <strong>62×</strong>, Angular 47×, Spring Boot 45×, Kubernetes 29×, AWS 27×, AI integration 19×; <strong>112</strong> of 137 tagged remote.</li>\n      <li><span class=\"chip\">TED</span> <strong>No new tender in the filter today</strong>. The six from July 18 remain active (deadlines July 30 – August 11) — that's yesterday's status, not re-verified today. Two additional large-scale procedures that surfaced are <strong>not biddable</strong> (deadline passed or undiscoverable) and appear below only as a scale illustration.</li>\n      <li><span class=\"chip\">Data quality</span> <strong>13 of 137 dated, 11 with a listing-stated rate</strong>: freelancermap (116 of the 137 sources) doesn't publish a posting date for most projects. A circulating Bitkom figure (149,000 missing IT workers, +12%) couldn't be cross-checked this round and is therefore <em>not</em> used.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje vale mais olhar para a própria base de dados do que para o noticiário. Dos 137 anúncios do board, apenas <strong>onze</strong> trazem algum número vindo do próprio anúncio — e as seis taxas de freelancer entre eles ficam em <strong>50–65, 70, 70, a partir de 70, 80 e cerca de 85 €/h</strong>. Os <strong>90–120 €/h*</strong> que aparecem em 121 entradas do board são valores de benchmark pesquisados, não preços observados. Duas evidências apontam na mesma direção — sem se confirmarem mutuamente: a Malt fixa a <strong>diária sênior (8–15 anos) em 699 €</strong> — cerca de <strong>87 €/h</strong> em oito horas — e a taxa horária média do mercado DACH caiu em 2026 pela primeira vez em anos, de 104 para 103 €/h. O número da Malt tem fonte única (malt.de bloqueia acessos automatizados), e os 103 € vêm do Freelancer-Kompass 2026 — o mesmo levantamento de onde sai a mediana de 95 € citada mais abaixo. E o número de demanda com que essas taxas costumam ser defendidas não resiste ao exame: os tão citados <strong>728.000</strong> profissionais qualificados faltando até 2027 são um número do IW sobre <em>todas</em> as profissões, de um comunicado de <strong>09/08/2024</strong>; para especialistas em informática, a mesma fonte cita <strong>19.000</strong>. Dia calmo no board, topo inalterado — mas um sinal de preço bem claro.</p>\n    <ul>\n      <li><span class=\"chip hot\">Taxa</span> <strong>Os únicos preços observáveis são de dois dígitos</strong>: seis anúncios freelance trazem seu próprio valor em €/h — 50–65 (FERCHAU), 70 (Right People, 2×), a partir de 70 (Optimus), 80 (CIMPCO), ~85 ou 680 €/dia (ProTIP para DB Systel). Nenhum dos anúncios do topo menciona uma taxa.</li>\n      <li><span class=\"chip\">Taxa</span> <strong>A Malt confirma a ordem de grandeza</strong>: Java sênior 8–15 anos <strong>699 €/dia</strong> (3–7 anos: 526 €, 15+ anos: 720 €; Frankfurt 764 €, Munique 676 €). Em oito horas isso dá <strong>87 €/h</strong> — o topo do board fica em 90–130 €/h*, ou seja, acima disso.</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Primeira queda em anos</strong>: a média do mercado geral caiu em 2026 de 104 para <strong>103 €/h</strong> — segundo o <strong>Freelancer-Kompass 2026</strong> da freelancermap (mais de 5.400 respondentes), a primeira vez desde o início do levantamento em que a taxa não sobe.<sup>[5]</sup> Número pequeno, direção importante — o preço parou de subir. Atenção: esse número e a mediana de 95 € vêm do <em>mesmo</em> levantamento, ou seja, são uma evidência e não duas.</li>\n      <li><span class=\"chip hot\">Correção</span> <strong>Os 728.000 não são o gap de TI</strong>: o número do IW vem de um comunicado de <strong>09/08/2024</strong>, vale para todas as profissões e coloca a informática em 5º lugar com <strong>19.000</strong> vagas em aberto. O relatório MINT de primavera 2026 (05/05/2026) mede o gap de MINT em março de 2026 em <strong>133.900</strong>, dos quais 44.200 em profissões de especialista.<sup>[3][4]</sup></li>\n      <li><span class=\"chip warn\">Direito</span> <strong>Três relógios regulatórios em contagem</strong>: KIRA — software de checagem com IA da previdência alemã — deve entrar em uso <strong>generalizado em 2026</strong>; a diretiva europeia de trabalho em plataformas precisa ser implementada pela Alemanha até <strong>02/12/2026</strong> (inverte o ônus da prova); a instrução da AÜG da agência federal de emprego vale desde <strong>01/07/2026</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board em 137</strong> (ontem 127, <strong>10 novos</strong>): 121 freelance / 11 CLT / 5 Intriguing, Fit médio <strong>61,5</strong>, <strong>17</strong> ≥ 80, <strong>39</strong> ≥ 70. Topo inalterado em Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Skills</span> <strong>O mix de stack se mantém</strong>: Java <strong>62×</strong>, Angular 47×, Spring Boot 45×, Kubernetes 29×, AWS 27×, integração de IA 19×; <strong>112</strong> de 137 com tag remoto.</li>\n      <li><span class=\"chip\">TED</span> <strong>Hoje nenhuma licitação nova no filtro</strong>. As seis de 18/07 continuam abertas (prazos de 30/07 a 11/08) — situação de ontem, não reconferida hoje. Dois grandes processos que apareceram a mais <strong>não são licitáveis</strong> (prazo vencido ou inencontrável) e ficam abaixo apenas como exemplo de escala.</li>\n      <li><span class=\"chip\">Qualidade dos dados</span> <strong>13 de 137 datados, 11 com taxa própria no anúncio</strong>: freelancermap (116 das 137 fontes) não indica data de publicação para a maioria dos projetos. Um número da Bitkom em circulação (149.000 profissionais de TI faltando, +12 %) não pôde ser conferido nesta rodada e por isso <em>não</em> é usado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy vale más la pena mirar la propia base de datos que las noticias del día. De 137 entradas en el board, solo <strong>once</strong> mencionan siquiera una cifra tomada del propio listado — y las seis tarifas freelance que hay entre ellas son <strong>50–65, 70, 70, desde 70, 80 y unos 85 €/h</strong>. Los <strong>90–120 €/h*</strong> que aparecen en 121 entradas del board son valores de referencia investigados, no precios observados. Dos evidencias apuntan en la misma dirección — sin confirmarse mutuamente: Malt fija la <strong>tarifa diaria sénior (8–15 años) en 699 €</strong> — unos <strong>87 €/h</strong> en ocho horas — y la tarifa por hora del mercado DACH en su conjunto cayó en 2026 por primera vez en años, de 104 a 103 €/h. La cifra de Malt es de fuente única (malt.de bloquea las consultas automatizadas), y los 103 € provienen del Freelancer-Kompass 2026 — el mismo estudio del que sale la mediana de 95 € citada más abajo. Y la cifra de demanda con la que suelen defenderse esas tarifas no resiste el escrutinio: los muy citados <strong>728.000</strong> profesionales faltantes hasta 2027 son una cifra del IW sobre <em>todas</em> las profesiones, tomada de un comunicado del <strong>09/08/2024</strong>; para especialistas en informática, la misma fuente indica <strong>19.000</strong>. Día tranquilo en el board, cima sin cambios — pero una señal de precios muy clara.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tarifa</span> <strong>Los únicos precios observables son de dos cifras</strong>: seis listados freelance indican su propia cifra en €/h — 50–65 (FERCHAU), 70 (Right People, 2×), desde 70 (Optimus), 80 (CIMPCO), ~85 o bien 680 €/día (ProTIP para DB Systel). Ninguno de los listados top indica una tarifa.</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Malt confirma el orden de magnitud</strong>: Java sénior 8–15 años 699 €/día (3–7 años: 526 €, 15+ años: 720 €; Fráncfort 764 €, Múnich 676 €). En ocho horas eso equivale a <strong>87 €/h</strong> — la cima del board se ubica en 90–130 €/h*, es decir, por encima.</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Primera caída en años</strong>: el promedio del mercado global bajó en 2026 de 104 a <strong>103 €/h</strong> — según el <strong>Freelancer-Kompass 2026</strong> de freelancermap (más de 5.400 encuestados), la primera vez desde el inicio del estudio en que la tarifa no sube.<sup>[5]</sup> Cifra pequeña, dirección importante — el precio ya no sube. A tener en cuenta: esta cifra y la mediana de 95 € provienen del <em>mismo</em> estudio, es decir, son una evidencia y no dos.</li>\n      <li><span class=\"chip hot\">Corrección</span> <strong>Los 728.000 no son la brecha de TI</strong>: la cifra del IW proviene de un comunicado del <strong>09/08/2024</strong>, se refiere a todas las profesiones y ubica a informática con <strong>19.000</strong> puestos sin cubrir en el puesto 5. El informe de primavera MINT 2026 (05/05/2026) mide la brecha MINT en marzo de 2026 en <strong>133.900</strong>, de los cuales 44.200 en profesiones de especialistas.<sup>[3][4]</sup></li>\n      <li><span class=\"chip warn\">Legal</span> <strong>Corren tres relojes regulatorios</strong>: KIRA — software de auditoría con IA del seguro de pensiones — debe implementarse a escala nacional en <strong>2026</strong>; la Directiva europea de trabajo en plataformas debe transponerse en Alemania antes del <strong>02/12/2026</strong> (se invierte la carga de la prueba); la instrucción de la Agencia Federal sobre la AÜG rige desde el <strong>01/07/2026</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board en 137</strong> (ayer 127, <strong>10 nuevas</strong>): 121 Freelance / 11 Employee / 5 Intriguing, Fit promedio <strong>61,5</strong>, <strong>17</strong> ≥ 80, <strong>39</strong> ≥ 70. La cima sigue sin cambios en Fit <strong>88</strong> — iSAX, BridgingIT, Keil.</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>La mezcla de stack se mantiene igual</strong>: Java <strong>62×</strong>, Angular 47×, Spring Boot 45×, Kubernetes 29×, AWS 27×, integración de IA 19×; <strong>112</strong> de 137 con etiqueta remoto.</li>\n      <li><span class=\"chip\">TED</span> <strong>Hoy no hay ninguna licitación nueva en el filtro</strong>. Las seis del 18/07 siguen vigentes (plazos del 30/07 al 11/08) — es el estado de ayer, no verificado de nuevo hoy. Dos grandes procedimientos adicionales que aparecieron no son <strong>ofertables</strong> (plazo vencido o inencontrable) y aparecen abajo solo como ejemplo de magnitud.</li>\n      <li><span class=\"chip\">Calidad de datos</span> <strong>13 de 137 con fecha, 11 con tarifa propia del listado</strong>: freelancermap (116 de las 137 fuentes) no publica fecha de publicación para la mayoría de los proyectos. Una cifra de bitkom que circula (149.000 profesionales de TI faltantes, +12 %) no pudo confirmarse esta ronda y por eso <em>no</em> se incluye aquí.</li>\n    </ul></div>"
