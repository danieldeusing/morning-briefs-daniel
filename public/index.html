<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

        "en": "<div class=\"tldr\"><p class=\"lead\">Today is the loudest central bank day of the month — and both decisions are still ahead of us at deadline. At <strong>15:00 BRT</strong>, the Fed under new Chair Kevin Warsh speaks publicly for the first time, followed at <strong>18:30 BRT</strong> by Copom with the Selic decision. For your EUR/BRL pressure, the \"yes/no\" matters less than the tone afterward. In parallel, the US-Iran peace deal is pushing oil prices down and taking pressure off the real — good for you, as long as central banks don't surprise hawkishly.</p>\n    <ul>\n      <li><span class=\"chip hot\">TODAY</span> <strong>Fed 15:00 BRT</strong>: Hold at 3.50–3.75% expected (FedWatch ~97–98%). Not yet announced — the signal is Warsh's first press conference + Dot Plot.</li>\n      <li><span class=\"chip hot\">TODAY</span> <strong>Copom 18:30 BRT</strong>: Selic at 14.50%. Market leans toward −25 bp to 14.25% (~84.5% betting odds), but hot inflation makes a hold real possible. Still open.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL</strong>: live ~5.91 (XE, 06-17) vs ECB Fix 5.8669 (06-16). The spread is a timestamp artifact, not a data gap — same-day cross clean.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: 5.0880 (TE, 06-17, −0.31% d/d). Real up 7.38% vs USD over 12 months — robust.</li>\n      <li><span class=\"chip good\">OIL</span> <strong>US-Iran Deal</strong>: first tanker through Hormuz today; Brent ~78–79 $/bbl, −4.8% Monday. Lowest since early March.</li>\n      <li><span class=\"chip\">[USA]</span> <strong>US CPI May</strong> 4.2% YoY — reason the Fed isn't cutting. Easing bias likely to exit the statement.</li>\n      <li><span class=\"chip\">[BR]</span> <strong>IPCA May</strong> 4.72% YoY (from 4.39%), above the 4.5% ceiling. Focus raised 2026 forecast to 5.11% — 13th rise in a row.</li>\n      <li><span class=\"chip good\">[BR]</span> <strong>Q1 GDP</strong> +1.1% QoQ, strongest in a year         "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o dia mais barulhento de banco central do mês — e ambas as decisões ainda estão por vir até o fechamento. Às <strong>15:00 BRT</strong>, o Fed sob o novo presidente Kevin Warsh fala publicamente pela primeira vez, seguido às <strong>18:30 BRT</strong> pelo Copom com a decisão da Selic. Para sua exposição EUR/BRL, o \"sim/não\" importa menos que o tom depois. Paralelamente, o acordo de paz EUA-Irã está empurrando preços de petróleo para baixo e tirando pressão do real — bom para você, contanto que os bancos centrais não surpreendam hawkish.</p>\n    <ul>\n      <li><span class=\"chip hot\">HOJE</span> <strong>Fed 15:00 BRT</strong>: Hold entre 3,50–3,75% esperado (FedWatch ~97–98%). Ainda não anunciado — o sinal é a primeira coletiva de Warsh + Dot Plot.</li>\n      <li><span class=\"chip hot\">HOJE</span> <strong>Copom 18:30 BRT</strong>: Selic em 14,50%. Mercado aposta principalmente em −25 bp para 14,25% (~84,5% probabilidade nas casas de apostas), mas inflação quente torna um hold realmente possível. Ainda aberto.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL</strong>: ao vivo ~5,91 (XE, 17/06) vs ECB Fix 5,8669 (16/06). O spread é um artefato de timestamp, não uma lacuna de dados — cross do mesmo dia limpo.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: 5,0880 (TE, 17/06, −0,31% d/d). Real +7,38% vs USD nos últimos 12 meses — robusto.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Acordo EUA-Irã</strong>: primeiro navio-tanque pelo Hormuz hoje; Brent ~78–79 $/bbl, −4,8% segunda-feira. Menor desde início de março.</li>\n      <li><span class=\"chip\">[EUA]</span> <strong>CPI EUA maio</strong> 4,2% YoY — razão pela qual o Fed não corta. Viés de flexibilização deve sair do comunicado.</li>\n      <li><span class=\"chip\">[BR]</span> <strong>IPCA maio</strong> 4,72% YoY (de 4,39%), acima do teto de 4,5%. Focus elevou previsão 2026 para 5,11% — 13º aumento consecutivo.</li>\n      <li><span class=\"chip good\">[BR]</span> <strong>PIB Q1</strong> +1,1% QoQ, mais forte em um ano (consumo +1%, investimentos +3,5%).</li>\n      <li><span class=\"chip\">[UE]</span> <strong>BCE</strong> subiu em 11/06 pela primeira vez desde 2023: +25 bp para 2,25% taxa de depósitos. Euro mais firme = contravento para você.</li>\n      <li><span class=\"chip\">PREVISÃO</span> Esta semana EUR/BRL <strong>lateral-nervoso, 5,85–5,98</strong>; mais provável ~5,90 (~40%). Probabilidades = minha confiança, não implícita no mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es el día más ruidoso de banco central del mes — y ambas decisiones aún están por llegar hasta cierre. A las <strong>15:00 BRT</strong>, la Fed bajo el nuevo presidente Kevin Warsh habla públicamente por primera vez, seguida a las <strong>18:30 BRT</strong> por el Copom con la decisión de Selic. Para tu exposición EUR/BRL, el \"sí/no\" importa menos que el tono después. Paralelamente, el acuerdo de paz EUA-Irán está empujando los precios del petróleo hacia abajo y quitando presión del real — bueno para ti, siempre que los bancos centrales no sorprendan de forma hawkish.</p>\n    <ul>\n      <li><span class=\"chip hot\">HOY</span> <strong>Fed 15:00 BRT</strong>: Hold entre 3,50–3,75% esperado (FedWatch ~97–98%). Aún no anunciado — la señal es la primera conferencia de prensa de Warsh + Dot Plot.</li>\n      <li><span class=\"chip hot\">HOY</span> <strong>Copom 18:30 BRT</strong>: Selic en 14,50%. El mercado apuesta principalmente en −25 bp hacia 14,25% (~84,5% probabilidad en casas de apuestas), pero inflación caliente hace un hold realmente posible. Aún abierto.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL</strong>: en vivo ~5,91 (XE, 17/06) vs ECB Fix 5,8669 (16/06). El spread es un artefacto de timestamp, no una brecha de datos — cross del mismo día limpio.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: 5,0880 (TE, 17/06, −0,31% d/d). Real +7,38% vs USD en últimos 12 meses — robusto.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Acuerdo EUA-Irán</strong>: primer buque tanque por Hormuz hoy; Brent ~78–79 $/bbl, −4,8% lunes. Nivel más bajo desde principios de marzo.</li>\n      <li><span class=\"chip\">[EUA]</span> <strong>CPI EUA mayo</strong> 4,2% YoY — razón por la cual la Fed no corta. El sesgo de flexibilización probablemente salga del comunicado.</li>\n      <li><span class=\"chip\">[BR]</span> <strong>IPCA mayo</strong> 4,72% YoY (de 4,39%), por encima del techo de 4,5%. Focus elevó pronóstico 2026 a 5,11% — 13ª subida consecutiva.</li>\n      <li><span class=\"chip good\">[BR]</span> <strong>PIB Q1</strong> +1,1% QoQ, más fuerte en un año (consumo +1%, inversión +3,5%).</li>\n      <li><span class=\"chip\">[UE]</span> <strong>BCE</strong> subió el 11/06 por primera vez desde 2023: +25 bp a 2,25% tasa de depósitos. Euro más firme = contraviento para ti.</li>\n      <li><span class=\"chip\">PRONÓSTICO</span> Esta semana EUR/BRL <strong>lateral-nervioso, 5,85–5,98</strong>; más probable ~5,90 (~40%). Probabilidades = mi confianza, no implícita en mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Mittwoch, der 17.06. — Entscheidungstag. <strong>Heute um ca. 15:00 BRT (14:00 US-Ostküste) verkündet das FOMC seinen Zins-Entscheid, um ca. 15:30 BRT folgt Kevin Warshs allererste Pressekonferenz als Fed-Chef.</strong> Bei Redaktionsschluss (frühmorgens BRT) ist nichts davon öffentlich — dieser Brief beschreibt also den geplanten Katalysator und die Erwartung, nicht das Ergebnis. Ein Zins-Halten bei <strong>3,50–3,75 %</strong> ist faktisch sicher (CME FedWatch ~97–98 %); die ganze Spannung liegt im <strong>Dot-Plot</strong> und im Warsh-Ton.<sup>[13]</sup> Der Markt ist deshalb vorsichtig: <strong>BTC ist auf ~64.900 $ zurückgefallen</strong> (−2,8 % auf 24 h, aber +6,0 % auf 7 Tage), nachdem er am 16.06. vor der Sitzung noch ~66.300 $ berührt hatte — typisches Vor-Fed-Abladen.<sup>[8]</sup> <strong>ETH ~1.766 $</strong> (+7,8 % auf 7 Tage).<sup>[8]</sup> Bei Big Tech läuft die Erholung nach dem Halbleiter-Crash gemischt: <strong>NVDA ~207,41 $ (−2,37 %)</strong>, ~12 % unter dem 52-Wochen-Hoch, AMD am 16.06. −7,3 %; <strong>GOOGL ~373 $ (+1,06 %), META ~600 $, AAPL ~299 $</strong>.<sup>[1]</sup> Rohstoffe: Der Iran-Friedensvertrag (Unterzeichnung am 19.06. geplant) hat die Angst-Prämie verdampft — <strong>Brent ~79 $</strong> (−29,5 % im Monat!), <strong>WTI ~76 $</strong>, <strong>Gold ~4.322 $</strong> (−5,35 % im Monat, aber +28 % im Jahr).<sup>[6][7]</sup> Roter Faden: Bis heute ~15:30 BRT ist jede Position eine Wette auf den Warsh-Ton — alle Empfehlungen unten halten den Pulver-Vorrat bis dahin trocken.</p>\n    <ul>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>Heute ~15:00 BRT: FOMC-Entscheid + Dot-Plot, dann Warshs erste Pressekonferenz (~15:30 BRT)</strong> — bei Redaktionsschluss noch nicht verkündet. Zins-Halten bei 3,50–3,75 % gilt als sicher (CME ~97–98 %); das einzige Risiko ist ein hawkischer Dot-Plot oder Ton. Mai-CPI lag bei 4,2 % (höchster Stand seit April 2023) und zementierte das Halten. Offene Frage: Streicht der 2026er-Median die letzte eingepreiste Senkung — oder rückt ein Punkt sogar in Richtung Erhöhung? Warsh könnte seinen eigenen Punkt symbolisch weglassen.</li>\n      <li><span class=\"chip good\">KRYPTO-CORE</span> <strong>BTC ~64.900 $ — vor der Fed abverkauft, aber Wochen-Bilanz grün</strong>: −2,8 % auf 24 h (von ~66.300 $ am 16.06.), aber +6,0 % auf 7 Tage. Market-Cap ~1,30 Bio. $. Die strukturelle Wende der Vorwoche hält: Die 13-Tage-Abfluss-Serie (~4,4 Mrd. $) ist gebrochen, am 12.06. kamen ~85,8 Mio. $ Netto-Zufluss zurück (IBIT führte). Bitcoin fiel nach 8 von 9 Fed-Sitzungen — Vorsicht ist Pflicht. ETH ~1.766 $ (+7,8 % auf 7 Tage).</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~207 $ (−2,37 %), ~12 % unter 52-Wochen-Hoch — Halbleiter erholen sich nur zäh</strong>: Nach dem Sektor-Crash vom 5./6.06. (PHLX-Chip-Index −10 %, schlimmster Tag seit März 2020, ~1,3 Bio. $ vernichtet, ausgelöst von Broadcoms AI-Guidance-Miss) bleibt die Erholung ruckelig — AMD am 16.06. −7,3 %, Intel −8,5 %. Plattform-Namen halten besser: GOOGL +1,06 %, META +1,17 %, AAPL +0,96 %.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~79 $, WTI ~76 $ — Iran-Entspannung drückt weiter, Brent −29,5 % im Monat</strong>: Der US-Iran-Friedensvertrag (Unterzeichnung am 19.06. geplant) hat die Straße-von-Hormus-Prämie verdampft. WTI hat das Swing-Low-Support ~75,62 $ gebrochen — die Bären haben die Kontrolle. Billiges Öl ist ein zusätzlicher disinflationärer Datenpunkt vor der Fed.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>~4.322 $ — Monat −5,35 %, Jahr +28 %</strong>: Die Iran-Entspannung nimmt Krisen-Prämie raus, und die Wahrscheinlichkeit einer Dezember-2026-Zinserhöhung ist über 71 % gestiegen — beides drückt Gold kurzfristig. Der langfristige Notenbank-/Diversifizierungs-Treiber bleibt aber intakt; +28 % im Jahresvergleich.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>AI-Token vorn: TAO ~272 $ (+6 %), Memecoins erholen sich</strong>: PEPE sechs Tage in Folge im Plus, DOGE testet Widerstand 0,088 $, BONK ~0,00000477 $. RENDER ~4,69 $, FET ~1,24 $, NEAR ~4,24 $ — alle nahe Support, reines Risk-on-Beta vor der Fed. IMX/GALA/Virtuals heute ohne sauberen Cross-Check-Preis — weggelassen statt geraten.</li>\n      <li><span class=\"chip good\">IPO</span> <strong>SpaceX (SPCX) +49 % seit Börsengang — neue Nasdaq-Notierung der Woche</strong>: Vom IPO-Preis 135 $ (11.06.) auf ~201,80 $ (16.06.) gestiegen; Eröffnung 150 $, Ersttages-Hoch 176,52 $. Ein seltener Mega-Listing-Katalysator, der Risk-on-Appetit für Wachstums-Tech signalisiert — aber als frischer IPO mit Lock-up- und Volatilitäts-Risiken kein Brief-Kauf.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Wednesday, June 17th — decision day. <strong>Today at roughly 3:00 p.m. BRT (2:00 p.m. US Eastern) the FOMC announces its rate decision; at about 3:30 p.m. BRT, Kevin Warsh holds his first-ever press conference as Fed chair.</strong> At press time (early morning BRT), neither has happened yet — this brief describes the planned catalyst and expectation, not the outcome. A rate hold at <strong>3.50–3.75%</strong> is virtually certain (CME FedWatch ~97–98%); all the tension is in the <strong>Dot Plot</strong> and Warsh's tone.<sup>[13]</sup> The market is cautious accordingly: <strong>BTC has fallen to ~$64,900</strong> (−2.8% in 24h, but +6.0% over 7 days), after touching ~$66,300 on June 16th ahead of the meeting — classic pre-Fed unloading.<sup>[8]</sup> <strong>ETH ~$1,766</strong> (+7.8% over 7 days).<sup>[8]</sup> Big Tech's recovery from the semiconductor crash is mixed: <strong>NVDA ~$207.41 (−2.37%)</strong>, ~12% below the 52-week high; AMD down 7.3% on June 16th; <strong>GOOGL ~$373 (+1.06%), META ~$600, AAPL ~$299</strong>.<sup>[1]</sup> Commodities: The Iran peace treaty (signing scheduled for June 19th) has evaporated the fear premium — <strong>Brent ~$79</strong> (−29.5% for the month!), <strong>WTI ~$76</strong>, <strong>Gold ~$4,322</strong> (−5.35% for the month, but +28% year-to-date).<sup>[6][7]</sup> The through-line: until today at ~3:30 p.m. BRT, every position is a bet on Warsh's tone — all recommendations below keep powder dry until then.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Today at ~3:00 p.m. BRT: FOMC decision + Dot Plot, then Warsh's first press conference (~3:30 p.m. BRT)</strong> — not yet announced at press time. A rate hold at 3.50–3.75% is locked in (CME ~97–98%); the only risk is a hawkish Dot Plot or tone. May CPI came in at 4.2% (highest since April 2023) and cemented the hold. Open question: Does the 2026 median erase the last priced-in cut — or does a dot even shift upward, putting a 2026 hike on the table? Warsh could symbolically omit his own dot.</li>\n      <li><span class=\"chip good\">CRYPTO-CORE</span> <strong>BTC ~$64,900 — sold off ahead of the Fed, but the week is green</strong>: −2.8% in 24h (from ~$66,300 on June 16th), but +6.0% over 7 days. Market cap ~$1.30 trillion. The structural turn of last week holds: the 13-day outflow series (~$4.4 billion) is broken; on June 12th, ~$85.8 million in net inflows returned (IBIT leading). Bitcoin has fallen after 8 of 9 Fed meetings — caution is warranted. ETH ~$1,766 (+7.8% over 7 days).</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~$207 (−2.37%), ~12% below 52-week high — semiconductors are recovering only fitfully</strong>: After the sector crash of June 5–6 (PHLX Chip Index −10%, worst day since March 2020, ~$1.3 trillion destroyed, triggered by Broadcom's AI guidance miss), recovery remains choppy — AMD down 7.3% on June 16th, Intel −8.5%. Platform names holding better: GOOGL +1.06%, META +1.17%, AAPL +0.96%.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$79, WTI ~$76 — Iran easing continues to weigh, Brent −29.5% for the month</strong>: The U.S.–Iran peace treaty (signing planned for June 19th) has evaporated the Strait of Hormuz premium. WTI has broken the swing-low support ~$75.62 — bears are in control. Cheap oil is another disinflation data point heading into the Fed.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>~$4,322 — month −5.35%, year +28%</strong>: Iran easing removes crisis premium, and the probability of a December 2026 hike has risen above 71% — both weigh on gold near-term. The long-term driver (central bank purchases, diversification) remains intact; +28% year-to-date.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>AI tokens leading: TAO ~$272 (+6%), memecoins recovering</strong>: PEPE six days up in a row, DOGE testing resistance at 0.088, BONK ~0.00000477. RENDER ~$4.69, FET ~$1.24, NEAR ~$4.24 — all near support, pure risk-on beta ahead of the Fed. IMX/GALA/Virtuals lack clean cross-check pricing today — omitted rather than guessed.</li>\n      <li><span class=\"chip good\">IPO</span> <strong>SpaceX (SPCX) +49% since listing — this week's new Nasdaq entry</strong>: From IPO price $135 (June 11th) to ~$201.80 (June 16th); opened at $150, first-day high $176.52. A rare mega-cap IPO catalyst signaling risk-on appetite for growth tech — but as a fresh listing with lock-up and volatility risks, not a brief buy.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É quarta-feira, 17 de junho — dia de decisão. <strong>Hoje por volta das 15:00 BRT (14:00 horário de Nova York), o FOMC anuncia sua decisão sobre a taxa de juros; em torno das 15:30 BRT, Kevin Warsh faz sua primeira entrevista coletiva como presidente do Banco Central.</strong> No fechamento da redação (madrugada BRT), nada disso é público ainda — este briefing descreve o catalisador planejado e a expectativa, não o resultado. Uma manutenção da taxa em <strong>3,50–3,75%</strong> é praticamente certa (CME FedWatch ~97–98%); toda a tensão está no <strong>Dot Plot</strong> e no tom de Warsh.<sup>[13]</sup> O mercado é cauteloso: <strong>BTC caiu para ~US$ 64.900</strong> (−2,8% em 24h, mas +6,0% em 7 dias), após tocar ~US$ 66.300 no dia 16 de junho antes da reunião — venda típica pré-Fed.<sup>[8]</sup> <strong>ETH ~US$ 1.766</strong> (+7,8% em 7 dias).<sup>[8]</sup> A recuperação da Big Tech após o crash dos semicondutores é mista: <strong>NVDA ~US$ 207,41 (−2,37%)</strong>, ~12% abaixo da máxima de 52 semanas; AMD caiu 7,3% no dia 16; <strong>GOOGL ~US$ 373 (+1,06%), META ~US$ 600, AAPL ~US$ 299</strong>.<sup>[1]</sup> Commodities: O tratado de paz Iran-EUA (assinatura prevista para 19 de junho) evaporou o prêmio de risco — <strong>Brent ~US$ 79</strong> (−29,5% no mês!), <strong>WTI ~US$ 76</strong>, <strong>Ouro ~US$ 4.322</strong> (−5,35% no mês, mas +28% no ano).<sup>[6][7]</sup> Fio condutor: até hoje às ~15:30 BRT, cada posição é uma aposta no tom de Warsh — todas as recomendações abaixo mantêm a pólvora seca até lá.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Hoje às ~15:00 BRT: Decisão FOMC + Dot Plot, depois primeira coletiva de Warsh (~15:30 BRT)</strong> — ainda não anunciado no fechamento. Manutenção da taxa em 3,50–3,75% é certa (CME ~97–98%); o único risco é um Dot Plot ou tom hawkish. IPCA de maio em 4,2% (maior desde abril de 2023) cimentou a manutenção. Pergunta aberta: O mediano de 2026 apaga o último corte precificado — ou um ponto até se move para cima, colocando um aumento em 2026 na mesa? Warsh poderia simbolicamente omitir seu próprio ponto.</li>\n      <li><span class=\"chip good\">CRIPTO-CORE</span> <strong>BTC ~US$ 64.900 — vendido antes do Fed, mas saldo semanal verde</strong>: −2,8% em 24h (de ~US$ 66.300 no dia 16), mas +6,0% em 7 dias. Market cap ~US$ 1,30 trilhão. A virada estrutural da semana passada se mantém: a série de 13 dias de saídas (~US$ 4,4 bilhões) foi quebrada; no dia 12, ~US$ 85,8 milhões em entradas líquidas retornaram (IBIT liderando). Bitcoin caiu após 8 de 9 reuniões do Fed — cautela é necessária. ETH ~US$ 1.766 (+7,8% em 7 dias).</li>\n      <li><span class=\"chip\">BIG TECH</span> <strong>NVDA ~US$ 207 (−2,37%), ~12% abaixo da máxima de 52 semanas — semicondutores se recuperam apenas lentamente</strong>: Após o crash do setor em 5–6 de junho (Índice de Chips PHLX −10%, pior dia desde março de 2020, ~US$ 1,3 trilhão destruído, desencadeado pelo miss de guidance de IA da Broadcom), a recuperação continua irregular — AMD caiu 7,3% no dia 16, Intel −8,5%. Nomes de plataforma se saem melhor: GOOGL +1,06%, META +1,17%, AAPL +0,96%.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~US$ 79, WTI ~US$ 76 — flexibilização do Irã continua pressionando, Brent −29,5% no mês</strong>: O tratado de paz EUA-Irã (assinatura prevista para 19 de junho) evaporou o prêmio do Estreito de Ormuz. WTI rompeu o suporte de baixa de oscilação ~US$ 75,62 — ursos têm controle. Petróleo barato é outro ponto de desinflação antes do Fed.</li>\n      <li><span class=\"chip good\">OURO</span> <strong>~US$ 4.322 — mês −5,35%, ano +28%</strong>: Flexibilização do Irã remove prêmio de crise, e a probabilidade de aumento em dezembro de 2026 subiu acima de 71% — ambos pressionam ouro no curto prazo. O impulsionador de longo prazo (compras dos bancos centrais, diversificação) permanece intacto; +28% no ano.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Tokens de IA liderando: TAO ~US$ 272 (+6%), memecoins se recuperando</strong>: PEPE seis dias seguidos alta, DOGE testando resistência 0,088, BONK ~0,00000477. RENDER ~US$ 4,69, FET ~US$ 1,24, NEAR ~US$ 4,24 — todos perto de suporte, puro beta risk-on antes do Fed. IMX/GALA/Virtuals sem preço de cross-check limpo hoje — omitidos em vez de adivinhados.</li>\n      <li><span class=\"chip good\">IPO</span> <strong>SpaceX (SPCX) +49% desde a estreia — nova listagem Nasdaq da semana</strong>: Do preço IPO US$ 135 (11 de junho) para ~US$ 201,80 (16 de junho); abriu em US$ 150, máxima do primeiro dia US$ 176,52. Um raro catalisador mega-cap sinalizando apetite risk-on por tech de crescimento — mas como um IPO recente com riscos de lock-up e volatilidade, também não é uma compra do briefing.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es miércoles, 17 de junio — día de decisión. <strong>Hoy alrededor de las 15:00 BRT (14:00 Hora del Este de EE.UU.) el FOMC anuncia su decisión de tasas, alrededor de las 15:30 BRT sigue la primera conferencia de prensa de Kevin Warsh como Presidente de la Reserva Federal.</strong> Al cierre de edición (temprano en la mañana BRT) nada de esto es público — este boletín describe el catalizador previsto y la expectativa, no el resultado. Un mantenimiento de tasas en <strong>3,50–3,75 %</strong> es prácticamente seguro (CME FedWatch ~97–98 %); toda la tensión está en el <strong>Gráfico de Puntos</strong> y en el tono de Warsh.<sup>[13]</sup> El mercado es cauteloso: <strong>BTC se ha caído a ~64.900 $</strong> (−2,8 % en 24 h, pero +6,0 % en 7 días), después de tocar ~66.300 $ el 16.06. antes de la sesión — típico adelgazamiento pre-Fed.<sup>[8]</sup> <strong>ETH ~1.766 $</strong> (+7,8 % en 7 días).<sup>[8]</sup> Entre las grandes tecnologías, la recuperación del desplome de semiconductores es mixta: <strong>NVDA ~207,41 $ (−2,37 %)</strong>, ~12 % por debajo del máximo de 52 semanas, AMD el 16.06. −7,3 %; <strong>GOOGL ~373 $ (+1,06 %), META ~600 $, AAPL ~299 $</strong>.<sup>[1]</sup> Materias primas: El tratado de paz EE.UU.-Irán (firma prevista 19.06.) ha evaporado la prima de riesgo — <strong>Brent ~79 $</strong> (−29,5 % en el mes!), <strong>WTI ~76 $</strong>, <strong>Oro ~4.322 $</strong> (−5,35 % en el mes, pero +28 % en el año).<sup>[6][7]</sup> Hilo conductor: Hasta hoy ~15:30 BRT, cada posición es una apuesta al tono de Warsh — todas las recomendaciones abajo mantienen la munición seca hasta entonces.</p>\n    <ul>\n      <li><span class=\"chip hot\">MACRO</span> <strong>Hoy ~15:00 BRT: Decisión del FOMC + Gráfico de Puntos, luego primera conferencia de prensa de Warsh (~15:30 BRT)</strong> — aún no anunciado al cierre de edición. Mantenimiento de tasas en 3,50–3,75 % se considera seguro (CME ~97–98 %); el único riesgo es un gráfico de puntos alcista o tono. La inflación de mayo fue 4,2 % (el nivel más alto desde abril de 2023) y cementa el mantenimiento. Pregunta abierta: ¿Elimina el mediano de 2026 el último corte de tasa incluido en el precio — o se mueve un punto incluso hacia un aumento? Warsh podría omitir simbólicamente su propio punto.</li>\n      <li><span class=\"chip good\">CRIPTO-NÚCLEO</span> <strong>BTC ~64.900 $ — vendido antes de la Fed, pero el saldo semanal es verde</strong>: −2,8 % en 24 h (desde ~66.300 $ el 16.06.), pero +6,0 % en 7 días. Capitalización de mercado ~1,30 billones $. El giro estructural de la semana pasada aguanta: La serie de 13 días de salidas (~4,4 billones $) se rompió, el 12.06. regresaron ~85,8 millones $ de flujo neto entrada (IBIT lideraba). Bitcoin cayó después de 8 de 9 sesiones de la Fed — la precaución es obligatoria. ETH ~1.766 $ (+7,8 % en 7 días).</li>\n      <li><span class=\"chip\">GRANDES TECNOLOGÍAS</span> <strong>NVDA ~207 $ (−2,37 %), ~12 % por debajo del máximo de 52 semanas — los semiconductores se recuperan lentamente</strong>: Después del desplome del sector el 5./6.06. (Índice de Chips PHLX −10 %, el peor día desde marzo de 2020, ~1,3 billones $ destruidos, causado por el fracaso de orientación de IA de Broadcom) la recuperación es accidentada — AMD el 16.06. −7,3 %, Intel −8,5 %. Los nombres de plataforma se mantienen mejor: GOOGL +1,06 %, META +1,17 %, AAPL +0,96 %.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~79 $, WTI ~76 $ — la distensión de Irán sigue presionando, Brent −29,5 % en el mes</strong>: El tratado de paz EE.UU.-Irán (firma prevista 19.06.) ha evaporado la prima del Estrecho de Ormuz. WTI ha roto el soporte del mínimo oscilante ~75,62 $ — los bajistas tienen el control. El petróleo barato es un punto de datos desinflacionario adicional antes de la Fed.</li>\n      <li><span class=\"chip good\">ORO</span> <strong>~4.322 $ — Mes −5,35 %, Año +28 %</strong>: La distensión de Irán quita la prima de crisis, y la probabilidad de un aumento en diciembre de 2026 ha subido a más del 71 % — ambos presionan el oro a corto plazo. El impulsor a largo plazo de los bancos centrales / diversificación sigue intacto; +28 % en comparación interanual.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Tokens de IA al frente: TAO ~272 $ (+6 %), las memecoins se recuperan</strong>: PEPE seis días seguidos en positivo, DOGE prueba resistencia 0,088 $, BONK ~0,00000477 $. RENDER ~4,69 $, FET ~1,24 $, NEAR ~4,24 $ — todos cerca del soporte, beta puro de riesgo alcista antes de la Fed. IMX/GALA/Virtuals hoy sin precio de verificación limpio — omitidos en lugar de adivinados.</li>\n      <li><span class=\"chip good\">OPV</span> <strong>SpaceX (SPCX) +49 % desde la salida a bolsa — nueva cotización de Nasdaq de la semana</strong>: Del precio de OPV 135 $ (11.06.) a ~201,80 $ (16.06.); apertura 150 $, máximo del primer día 176,52 $. Un raro catalizador de mega-cotización que señala apetito de riesgo para tecnología de crecimiento — pero como OPV reciente con riesgos de bloqueo y volatilidad, no es una compra del boletín.</li>\n    </ul></div>"
