<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>

        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">

      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"

        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>

            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>

        </div>
      </div>
      <details class="dropdown theme-dropdown" id="theme-dropdown">

          <span class="dd-dot" aria-hidden="true"></span>

      <button class="status-btn anim-toggle" id="anim-toggle" type="button"

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Real steht heute an zwei Fronten unter Druck: Der Dollar-Index testet ein 15-Monats-Hoch, und die EZB hat — entgegen dem lauten „Zinssenkungs\"-Konsens — vor zwei Wochen sogar <em>erhöht</em>. Beides schiebt EUR/BRL nach oben: Der ECB-Fix steht bei 5,9048, den höchsten Stand seit Wochen. Für dich als Euro-Verdiener ist das die gute Seite der Medaille — dein Euro kauft gerade mehr Reais. Wer noch nicht umgetauscht hat, sitzt an einem freundlichen Fenster.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9048</strong> (ECB-Fix, 01.07.): Real seit Ende Mai (~5,80) spürbar schwächer — dein Umtausch-Fenster hat sich geöffnet.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY ~101,3</strong> (02.07.): Dollar-Index nahe 15-Monats-Hoch, +1,8 % im Monat — der Frühindikator zeigt weiter BRL-Druck an.</li>\n      <li><span class=\"chip\">EZB</span> <strong>EZB hat erhöht, nicht gesenkt</strong>: Einlagensatz jetzt 2,25 % (seit 17.06.) — das stützt den Euro und arbeitet gegen den Real.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Selic 14,25 %</strong>: Copom senkte am 17.06. zum dritten Mal in Folge um 25 bp — die hohe Verzinsung ist noch immer der Boden unter dem Real.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed hält 3,50–3,75 %</strong>: Nächste Entscheidung 28.–29.07., Markt preist ~89 % Halten. Kein Dot-Plot bei diesem Termin.</li>\n      <li><span class=\"chip\">Öl</span> <strong>Brent ~71 $</strong> (02.07., −2,3 %): Angebotsschwemme durch offene Straße von Hormus + Iran/Russland-Exporte — dämpft globalen Risiko-Appetit.</li>\n      <li><span class=\"chip\">USA</span> <strong>S&amp;P 500 −0,22 %</strong> (01.07.): Q3 startet leiser nach dem stärksten Halbjahr seit 2020 — Gewinnmitnahmen bei Tech/Halbleitern.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus: IPCA 2026 auf 5,30 %</strong> angehoben (von 5,11 %), Selic-Erwartung stabil bei ~14 % — die Inflations-Skepsis bleibt.</li>\n      <li><span class=\"chip warn\">Termine</span> <strong>EZB 23.07., Fed 28.–29.07.</strong>: die beiden Notenbank-Termine, die diesen Monat die EUR/BRL-Richtung setzen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Real steht heute an zwei Fronten unter Druck: Der Dollar-Index testet ein 15-Monats-Hoch, und die EZB hat — entgegen dem lauten „Zinssenkungs\"-Konsens — vor zwei Wochen sogar <em>erhöht</em>. Beides schiebt EUR/BRL nach oben: Der ECB-Fix steht bei 5,9048, den höchsten Stand seit Wochen. Für dich als Euro-Verdiener ist das die gute Seite der Medaille — dein Euro kauft gerade mehr Reais. Wer noch nicht umgetauscht hat, sitzt an einem freundlichen Fenster.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9048</strong> (ECB-Fix, 01.07.): Real seit Ende Mai (~5,80) spürbar schwächer — dein Umtausch-Fenster hat sich geöffnet.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY ~101,3</strong> (02.07.): Dollar-Index nahe 15-Monats-Hoch, +1,8 % im Monat — der Frühindikator zeigt weiter BRL-Druck an.</li>\n      <li><span class=\"chip\">EZB</span> <strong>EZB hat erhöht, nicht gesenkt</strong>: Einlagensatz jetzt 2,25 % (seit 17.06.) — das stützt den Euro und arbeitet gegen den Real.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Selic 14,25 %</strong>: Copom senkte am 17.06. zum dritten Mal in Folge um 25 bp — die hohe Verzinsung ist noch immer der Boden unter dem Real.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed hält 3,50–3,75 %</strong>: Nächste Entscheidung 28.–29.07., Markt preist ~89 % Halten. Kein Dot-Plot bei diesem Termin.</li>\n      <li><span class=\"chip\">Öl</span> <strong>Brent ~71 $</strong> (02.07., −2,3 %): Angebotsschwemme durch offene Straße von Hormus + Iran/Russland-Exporte — dämpft globalen Risiko-Appetit.</li>\n      <li><span class=\"chip\">USA</span> <strong>S&amp;P 500 −0,22 %</strong> (01.07.): Q3 startet leiser nach dem stärksten Halbjahr seit 2020 — Gewinnmitnahmen bei Tech/Halbleitern.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus: IPCA 2026 auf 5,30 %</strong> angehoben (von 5,11 %), Selic-Erwartung stabil bei ~14 % — die Inflations-Skepsis bleibt.</li>\n      <li><span class=\"chip warn\">Termine</span> <strong>EZB 23.07., Fed 28.–29.07.</strong>: die beiden Notenbank-Termine, die diesen Monat die EUR/BRL-Richtung setzen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The real is under pressure on two fronts today: The dollar index is testing a 15-month high, and the ECB — contrary to loud \"rate cut\" consensus — actually <em>raised</em> rates two weeks ago. Both push EUR/BRL higher: The ECB fix stands at 5.9048, the highest level in weeks. For you as a euro earner, that's the good side of the coin — your euro is buying more reals right now. If you haven't exchanged yet, you're in a friendly window.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9048</strong> (ECB fix, 07/01): Real significantly weaker since end of May (~5.80) — your exchange window has opened.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY ~101.3</strong> (07/02): Dollar index near 15-month high, +1.8% in the month — the leading indicator points to continued BRL pressure.</li>\n      <li><span class=\"chip\">ECB</span> <strong>ECB raised, not cut</strong>: Deposit rate now 2.25% (since 06/17) — supports the euro and works against the real.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Selic 14.25%</strong>: Copom cut for the third consecutive time on 06/17 by 25 bp — high yields remain the floor under the real.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed holds 3.50–3.75%</strong>: Next decision 07/28–29, market prices ~89% hold. No dot plot at this meeting.</li>\n      <li><span class=\"chip\">Oil</span> <strong>Brent ~71 $</strong> (07/02, −2.3%): Supply glut from open Strait of Hormuz + Iran/Russia exports — dampens global risk appetite.</li>\n      <li><span class=\"chip\">USA</span> <strong>S&amp;P 500 −0.22%</strong> (07/01): Q3 starts quietly after the strongest half-year since 2020 — profit-taking in tech/semiconductors.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus: IPCA 2026 raised to 5.30%</strong> (from 5.11%), Selic expectation steady at ~14% — inflation skepticism persists.</li>\n      <li><span class=\"chip warn\">Dates</span> <strong>ECB 07/23, Fed 07/28–29</strong>: the two central bank meetings that will set EUR/BRL direction this month.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O real está sob pressão em duas frentes hoje: o índice do dólar testa uma máxima de 15 meses, e o BCE — contra o consenso alto em \"corte de juros\" — na verdade <em>aumentou</em> há duas semanas. Ambos empurram EUR/BRL para cima: o fix do BCE está em 5,9048, o maior nível em semanas. Para você como ganhador em euros, esse é o lado bom da moeda — seu euro está comprando mais reais agora. Se você ainda não trocou, está em uma janela favorável.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9048</strong> (fix BCE, 01.07): Real significativamente mais fraco desde o final de maio (~5,80) — sua janela de câmbio se abriu.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY ~101,3</strong> (02.07): índice do dólar perto da máxima de 15 meses, +1,8% no mês — o indicador avançado aponta para pressão contínua do BRL.</li>\n      <li><span class=\"chip\">BCE</span> <strong>BCE aumentou, não cortou</strong>: taxa de depósito agora em 2,25% (desde 17.06) — sustenta o euro e trabalha contra o real.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Selic 14,25%</strong>: Copom cortou pela terceira vez seguida em 17.06 por 25 bp — alta remuneração ainda é o piso do real.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed mantém 3,50–3,75%</strong>: próxima decisão 28–29.07, mercado precifica ~89% de manutenção. Sem dot plot nesta reunião.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>Brent ~71 $</strong> (02.07, −2,3%): excesso de oferta pelo estreito de Ormuz aberto + exportações Irã/Rússia — amortece apetite por risco global.</li>\n      <li><span class=\"chip\">USA</span> <strong>S&amp;P 500 −0,22%</strong> (01.07): Q3 começa mais fraco após melhor semestre desde 2020 — realização de lucros em tech/semicondutores.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus: IPCA 2026 elevado para 5,30%</strong> (de 5,11%), expectativa Selic estável em ~14% — ceticismo sobre inflação persiste.</li>\n      <li><span class=\"chip warn\">Datas</span> <strong>BCE 23.07, Fed 28–29.07</strong>: as duas reuniões do banco central que definirão a direção do EUR/BRL este mês.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El real está bajo presión en dos frentes hoy: el índice del dólar prueba un máximo de 15 meses, y el BCE — contra el consenso de \"recorte de tasas\" — en realidad <em>subió</em> hace dos semanas. Ambos empujan EUR/BRL hacia arriba: el fix del BCE está en 5,9048, el nivel más alto en semanas. Para ti como ganador en euros, ese es el lado bueno de la moneda — tu euro está comprando más reales ahora. Si aún no has cambiado, estás en una ventana favorable.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9048</strong> (fix BCE, 01.07): Real significativamente más débil desde finales de mayo (~5,80) — tu ventana de cambio se ha abierto.</li>\n      <li><span class=\"chip hot\">USD</span> <strong>DXY ~101,3</strong> (02.07): índice del dólar cerca del máximo de 15 meses, +1,8% en el mes — el indicador adelantado apunta a presión continua en el BRL.</li>\n      <li><span class=\"chip\">BCE</span> <strong>BCE subió, no cortó</strong>: tasa de depósito ahora en 2,25% (desde 17.06) — sostiene el euro y trabaja contra el real.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Selic 14,25%</strong>: Copom cortó por tercera vez consecutiva el 17.06 por 25 pb — rendimiento alto es todavía el piso del real.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed mantiene 3,50–3,75%</strong>: próxima decisión 28–29.07, mercado precifica ~89% de mantenimiento. Sin dot plot en esta reunión.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>Brent ~71 $</strong> (02.07, −2,3%): exceso de oferta por estrecho de Ormuz abierto + exportaciones Irán/Rusia — amortigua apetito por riesgo global.</li>\n      <li><span class=\"chip\">USA</span> <strong>S&amp;P 500 −0,22%</strong> (01.07): Q3 comienza más débil tras el mejor semestre desde 2020 — realización de ganancias en tech/semiconductores.</li>\n      <li><span class=\"chip\">BR</span> <strong>Focus: IPCA 2026 elevado a 5,30%</strong> (de 5,11%), expectativa Selic estable en ~14% — escepticismo sobre inflación persiste.</li>\n      <li><span class=\"chip warn\">Fechas</span> <strong>BCE 23.07, Fed 28–29.07</strong>: las dos reuniones del banco central que definirán la dirección del EUR/BRL este mes.</li>\n    </ul></div>"

</li>\n      <li><span class=\"chip\">Öl</span> <strong>WTI 67,74 $</strong> (02.07., −1,23 %), Brent knapp über 73 $ — tiefster Stand seit Ende Februar auf US-Iran-Verhandlungen + Hormus-Erholung.</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>Ethereum 1.563,76 $</strong> (01.07. 09:00 ET) — erstmals drei rote Quartals-Kerzen in Folge in der ETH-Geschichte.</li>\n      <li><span class=\"chip\">Macro</span> <strong>DXY auf ~101,3</strong> (02.07.), 15-Monats-Hoch — der starke Dollar ist der Hebel hinter Gold- und Krypto-Druck. Fokus: US-Payrolls Freitag.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Das erste Halbjahr war ein Rausch — das zweite beginnt mit einem Kater. Der Nasdaq legte im H1 rund +13 % zu, der S&amp;P ~+10 %, der Dow +9 % (bestes erstes Halbjahr seit 2021); den Rekord holte der Small-Cap-Russell-2000 mit +22 % — sein bestes erstes Halbjahr seit 1991. Am 30.06. schlossen S&amp;P und Dow auf bzw. nahe Rekord. Doch am ersten Handelstag im Juli (01.07.) kippt genau der Motor: Halbleiter-Aktien werden nach ihrer +80-%-Rally verkauft (Micron −10 % an einem Tag), der Nasdaq gab −0,66 % ab. Parallel setzt Krypto den Ausverkauf fort — Bitcoin fiel auf 58.278 $, ein 21-Monats-Tief, nach dem schlechtesten ETF-Monat aller Zeiten (−4,5 Mrd. $). Der starke Dollar (DXY auf 15-Monats-Hoch) ist der gemeinsame Faden. Alle Augen auf den US-Arbeitsmarktbericht am Freitag.</p>\n    <ul>\n      <li><span class=\"chip hot\">Krypto</span> <strong>Bitcoin auf 58.278 $</strong> (01.07. 09:00 ET), Intraday-Tief 57.950 $ (652-Tages-Tief); −20,48 % im Juni — schlechtester Monat seit Juni 2022.</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>Rekord-ETF-Abfluss</strong>: US-Spot-Bitcoin-ETFs verloren im Juni 4,5 Mrd. $, BlackRocks IBIT allein 3,55 Mrd. $ (~73–79 %), 9. Rücknahme-Tag in Folge am 30.06.</li>\n      <li><span class=\"chip good\">Aktien</span> <strong>Rekord-H1, wackliger Juli-Start</strong>: Nasdaq +13 % im H1 (S&amp;P +10 %, Dow +9 %); den Rekord holte der Russell 2000 mit +22 % (bestes seit 1991). Dow-Rekord-Schluss 52.319,20 am 30.06., dann am 01.07. Tagesschluss 52.305,24 (−0,03 %).</li>\n      <li><span class=\"chip hot\">Big-Tech</span> <strong>Chip-Rotation</strong>: Micron −10 % an einem Tag (01.07., trotz +260 % YTD) — Gewinnmitnahmen nach +80-%-Halbleiter-Rally im H1. NVDA 194,97 $ (29.06.).</li>\n      <li><span class=\"chip good\">Gold</span> <strong>Gold dreht +2 %</strong> auf ~4.025–4.090 $/oz (01.07.), rebound vom Achtmonatstief — weit unter dem Januar-ATH (~5.589 $).</li>\n      <li><span class=\"chip\">Öl</span> <strong>WTI 67,74 $</strong> (02.07., −1,23 %), Brent knapp über 73 $ — tiefster Stand seit Ende Februar auf US-Iran-Verhandlungen + Hormus-Erholung.</li>\n      <li><span class=\"chip hot\">Krypto</span> <strong>Ethereum 1.563,76 $</strong> (01.07. 09:00 ET) — erstmals drei rote Quartals-Kerzen in Folge in der ETH-Geschichte.</li>\n      <li><span class=\"chip\">Macro</span> <strong>DXY auf ~101,3</strong> (02.07.), 15-Monats-Hoch — der starke Dollar ist der Hebel hinter Gold- und Krypto-Druck. Fokus: US-Payrolls Freitag.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The first half was a rush—the second begins with a hangover. The Nasdaq gained roughly +13% in H1, the S&amp;P ~+10%, the Dow +9% (best first half since 2021); the small-cap Russell 2000 took the crown with +22%—its best H1 since 1991. On 06/30, the S&amp;P and Dow closed at or near record highs. But on the first trading day of July (07/01), the engine stalls: semiconductor stocks are sold after their +80% rally (Micron −10% in a single day), the Nasdaq dropped −0.66%. Meanwhile, crypto extends its selloff—Bitcoin fell to $58,278, a 21-month low, after the worst ETF month on record (−$4.5B outflows). The strong dollar (DXY at a 15-month high) is the common thread. All eyes on the US jobs report Friday.</p>\n    <ul>\n      <li><span class=\"chip hot\">Crypto</span> <strong>Bitcoin at $58,278</strong> (07/01 09:00 ET), intraday low $57,950 (652-day low); −20.48% in June—worst month since June 2022.</li>\n      <li><span class=\"chip hot\">Crypto</span> <strong>Record ETF outflows</strong>: US spot Bitcoin ETFs shed $4.5B in June, BlackRock's IBIT alone $3.55B (~73–79%), 9th consecutive redemption day on 06/30.</li>\n      <li><span class=\"chip good\">Equities</span> <strong>Record H1, wobbly July start</strong>: Nasdaq +13% in H1 (S&amp;P +10%, Dow +9%); Russell 2000 stole the show with +22% (best since 1991). Dow record close 52,319.20 on 06/30, then on 07/01 daily close 52,305.24 (−0.03%).</li>\n      <li><span class=\"chip hot\">Big Tech</span> <strong>Chip rotation</strong>: Micron −10% in one day (07/01, despite +260% YTD)—profit-taking after +80% semiconductor rally in H1. NVDA $194.97 (06/29).</li>\n      <li><span class=\"chip good\">Gold</span> <strong>Gold turns +2%</strong> to ~$4,025–4,090/oz (07/01), rebound from 8-month low—well below January ATH (~$5,589).</li>\n      <li><span class=\"chip\">Oil</span> <strong>WTI $67.74</strong> (07/02, −1.23%), Brent just above $73—lowest since late February on US-Iran talks + Hormuz recovery.</li>\n      <li><span class=\"chip hot\">Crypto</span> <strong>Ethereum $1,563.76</strong> (07/01 09:00 ET)—first time in ETH history three consecutive red quarterly candles.</li>\n      <li><span class=\"chip\">Macro</span> <strong>DXY at ~101.3</strong> (07/02), 15-month high—strong dollar is the lever behind gold and crypto pressure. Focus: US payrolls Friday.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O primeiro semestre foi uma loucura — o segundo começa com ressaca. O Nasdaq subiu aproximadamente +13% em H1, o S&amp;P ~+10%, o Dow +9% (melhor primeiro semestre desde 2021); o pequeno Russell 2000 levou a coroa com +22%—seu melhor H1 desde 1991. Em 30/06, o S&amp;P e Dow fecharam em ou perto de recordes. Mas no primeiro dia útil de julho (01/07), o motor falha: ações de semicondutores são vendidas após sua rally de +80% (Micron −10% em um dia), o Nasdaq caiu −0,66%. Enquanto isso, cripto estende a liquidação—Bitcoin caiu para US$ 58.278, mínima de 21 meses, após o pior mês de ETF de todos os tempos (−US$ 4,5 bi de saídas). O dólar forte (DXY em mínima de 15 meses) é o fio condutor. Todos de olho no relatório de empregos dos EUA sexta-feira.</p>\n    <ul>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Bitcoin em US$ 58.278</strong> (01/07 09:00 ET), mínima do dia US$ 57.950 (mínima de 652 dias); −20,48% em junho—pior mês desde junho de 2022.</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Saída de ETF recorde</strong>: ETFs spot de Bitcoin dos EUA perderam US$ 4,5 bi em junho, o IBIT do BlackRock sozinho US$ 3,55 bi (~73–79%), 9º dia de resgate consecutivo em 30/06.</li>\n      <li><span class=\"chip good\">Ações</span> <strong>Recorde H1, início de julho fraco</strong>: Nasdaq +13% em H1 (S&amp;P +10%, Dow +9%); Russell 2000 roubou a cena com +22% (melhor desde 1991). Fechamento recorde Dow 52.319,20 em 30/06, depois em 01/07 fechamento diário 52.305,24 (−0,03%).</li>\n      <li><span class=\"chip hot\">Big Tech</span> <strong>Rotação de chips</strong>: Micron −10% em um dia (01/07, apesar de +260% YTD)—realização de lucros após rally de +80% em semicondutores em H1. NVDA US$ 194,97 (29/06).</li>\n      <li><span class=\"chip good\">Ouro</span> <strong>Ouro vira +2%</strong> para ~US$ 4.025–4.090/oz (01/07), recuperação da mínima de 8 meses—bem abaixo do ATH de janeiro (~US$ 5.589).</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>WTI US$ 67,74</strong> (02/07, −1,23%), Brent pouco acima de US$ 73—mais baixo desde fim de fevereiro em negociações EUA-Irã + recuperação de Ormuz.</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Ethereum US$ 1.563,76</strong> (01/07 09:00 ET)—primeira vez na história do ETH três velas trimestrais vermelhas consecutivas.</li>\n      <li><span class=\"chip\">Macro</span> <strong>DXY em ~101,3</strong> (02/07), mínima de 15 meses—dólar forte é a alavanca por trás da pressão em ouro e cripto. Foco: folha de pagamentos dos EUA sexta-feira.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El primer semestre fue una locura—el segundo comienza con resaca. El Nasdaq subió aproximadamente +13% en H1, el S&amp;P ~+10%, el Dow +9% (mejor primer semestre desde 2021); el pequeño Russell 2000 llevó la corona con +22%—su mejor H1 desde 1991. El 30/06, el S&amp;P y Dow cerraron en o cerca de máximos. Pero el primer día de operaciones de julio (01/07), el motor se detiene: las acciones de semiconductores son vendidas después de su rally de +80% (Micron −10% en un día), el Nasdaq cayó −0,66%. Mientras tanto, cripto extiende la liquidación—Bitcoin cayó a US$ 58.278, mínimo de 21 meses, tras el peor mes de ETF de todos los tiempos (−US$ 4,5 mil millones de salidas). El dólar fuerte (DXY en mínimo de 15 meses) es el hilo común. Todos atentos al reporte de empleos de EE.UU. el viernes.</p>\n    <ul>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Bitcoin en US$ 58.278</strong> (01/07 09:00 ET), mínimo del día US$ 57.950 (mínimo de 652 días); −20,48% en junio—peor mes desde junio de 2022.</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Salida récord de ETF</strong>: ETFs spot de Bitcoin de EE.UU. perdieron US$ 4,5 mil millones en junio, solo el IBIT de BlackRock perdió US$ 3,55 mil millones (~73–79%), 9º día de rescate consecutivo el 30/06.</li>\n      <li><span class=\"chip good\">Acciones</span> <strong>Récord H1, inicio débil de julio</strong>: Nasdaq +13% en H1 (S&amp;P +10%, Dow +9%); Russell 2000 robó el show con +22% (mejor desde 1991). Cierre récord Dow 52.319,20 el 30/06, luego el 01/07 cierre diario 52.305,24 (−0,03%).</li>\n      <li><span class=\"chip hot\">Big Tech</span> <strong>Rotación de chips</strong>: Micron −10% en un día (01/07, a pesar de +260% YTD)—toma de ganancias después del rally de +80% en semiconductores en H1. NVDA US$ 194,97 (29/06).</li>\n      <li><span class=\"chip good\">Oro</span> <strong>Oro sube +2%</strong> a ~US$ 4.025–4.090/oz (01/07), recuperación del mínimo de 8 meses—muy por debajo del ATH de enero (~US$ 5.589).</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>WTI US$ 67,74</strong> (02/07, −1,23%), Brent poco arriba de US$ 73—nivel más bajo desde finales de febrero en negociaciones EE.UU.-Irán + recuperación del Estrecho.</li>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Ethereum US$ 1.563,76</strong> (01/07 09:00 ET)—primera vez en la historia tres velas trimestrales rojas seguidas en el historial de ETH.</li>\n      <li><span class=\"chip\">Macro</span> <strong>DXY en ~101,3</strong> (02/07), mínimo de 15 meses—dólar fuerte es la palanca detrás de la presión en oro y cripto. Enfoque: nómina de EE.UU. viernes.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Tag mit hartem Security-Kern: In einem weit verbreiteten Fernwartungs-Tool wird eine Höchstschweregrad-Lücke aktiv ausgenutzt, um Entwickler-Zugangsdaten abzugreifen — und die US-Behörden-Frist zum Patchen endet ausgerechnet heute. Dazu wird Microsoft 365 seit gestern spürbar teurer, PeopleSoft und Docker haben ernste Löcher, und Postgres, Caddy und Angular liefern Patch-Kontext für deinen Stack.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, aktiv ausgenutzt, TaskWeaver-Loader + Djinn-Stealer klauen SSH-Keys und Repo-Tokens. CISA-Behörden-Frist: <strong>heute</strong>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Microsoft 365 teurer</strong>: seit 01.07. Office 365 E3 +13 %, M365 E5 +5 %, Frontline F1 +33 %. Größte Preisrunde seit 2022 — mit neuen Security-Bundles.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft Zero-Day</strong>: CVE-2026-35273, CVSS 9.8, ShinyHunters kompromittierten 100+ Organisationen über ~300 verwundbare Instanzen.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Infra</span> <strong>Docker CVE-2026-34040</strong>: CVSS 8.8, unvollständiger Fix von 2024 — Weg zum privilegierten Container mit Host-Root.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL-Sammel-Update</strong>: 11 CVEs, vier davon CVSS 8.8 (Integer-Wraparound, Symlink-Eskalation, Buffer-Overflow). Für deinen Stack relevant.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Infra</span> <strong>Caddy 2.11</strong>: automatische ECH-Key-Rotation, passives Health-Checking, Host-Header-Rewrite — plus Matcher-Fixes.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>Cyber Resilience Act</strong>: Melde-Pflichten (24 h an ENISA) greifen ab 11.09.2026, Hauptpflichten ab 11.12.2027.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Langflow-Lücke weiter ausgenutzt</strong>: CVE-2026-33017 (9.3) verteilt Monero-Miner — Agenten-Tooling als Angriffsfläche.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein Tag mit hartem Security-Kern: In einem weit verbreiteten Fernwartungs-Tool wird eine Höchstschweregrad-Lücke aktiv ausgenutzt, um Entwickler-Zugangsdaten abzugreifen — und die US-Behörden-Frist zum Patchen endet ausgerechnet heute. Dazu wird Microsoft 365 seit gestern spürbar teurer, PeopleSoft und Docker haben ernste Löcher, und Postgres, Caddy und Angular liefern Patch-Kontext für deinen Stack.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, aktiv ausgenutzt, TaskWeaver-Loader + Djinn-Stealer klauen SSH-Keys und Repo-Tokens. CISA-Behörden-Frist: <strong>heute</strong>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Microsoft 365 teurer</strong>: seit 01.07. Office 365 E3 +13 %, M365 E5 +5 %, Frontline F1 +33 %. Größte Preisrunde seit 2022 — mit neuen Security-Bundles.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft Zero-Day</strong>: CVE-2026-35273, CVSS 9.8, ShinyHunters kompromittierten 100+ Organisationen über ~300 verwundbare Instanzen.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Infra</span> <strong>Docker CVE-2026-34040</strong>: CVSS 8.8, unvollständiger Fix von 2024 — Weg zum privilegierten Container mit Host-Root.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL-Sammel-Update</strong>: 11 CVEs, vier davon CVSS 8.8 (Integer-Wraparound, Symlink-Eskalation, Buffer-Overflow). Für deinen Stack relevant.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Infra</span> <strong>Caddy 2.11</strong>: automatische ECH-Key-Rotation, passives Health-Checking, Host-Header-Rewrite — plus Matcher-Fixes.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>Cyber Resilience Act</strong>: Melde-Pflichten (24 h an ENISA) greifen ab 11.09.2026, Hauptpflichten ab 11.12.2027.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Langflow-Lücke weiter ausgenutzt</strong>: CVE-2026-33017 (9.3) verteilt Monero-Miner — Agenten-Tooling als Angriffsfläche.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A day with serious security stakes: a max-severity vulnerability in a widely used remote support tool is being actively exploited to steal developer credentials — and the U.S. government's patching deadline ends today. Meanwhile, Microsoft 365 just got pricier, PeopleSoft and Docker have critical holes, and Postgres, Caddy, and Angular deliver patch context for your stack.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, actively exploited, TaskWeaver-Loader + Djinn-Stealer steal SSH keys and repo tokens. CISA government deadline: <strong>today</strong>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Microsoft 365 price hike</strong>: since 01.07. Office 365 E3 +13%, M365 E5 +5%, Frontline F1 +33%. Biggest price round since 2022 — with new security bundles.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft Zero-Day</strong>: CVE-2026-35273, CVSS 9.8, ShinyHunters compromised 100+ organizations across ~300 vulnerable instances.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Infra</span> <strong>Docker CVE-2026-34040</strong>: CVSS 8.8, incomplete fix from 2024 — path to privileged container with host root.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL bundle update</strong>: 11 CVEs, four of them CVSS 8.8 (integer wraparound, symlink escalation, buffer overflow). Relevant for your stack.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Infra</span> <strong>Caddy 2.11</strong>: automatic ECH key rotation, passive health checking, host header rewriting — plus matcher fixes.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>Cyber Resilience Act</strong>: reporting requirements (24 h to ENISA) take effect 11.09.2026, main obligations 11.12.2027.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Langflow vulnerability still being exploited</strong>: CVE-2026-33017 (9.3) distributing Monero miners — agent tooling as attack surface.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um dia com segurança em foco: uma vulnerabilidade de máxima severidade em uma ferramenta de suporte remoto muito usada está sendo ativamente explorada para roubar credenciais de desenvolvedores — e o prazo do governo dos EUA para corrigir vence hoje. Enquanto isso, Microsoft 365 ficou mais caro, PeopleSoft e Docker têm falhas graves, e Postgres, Caddy e Angular oferecem contexto de patches para sua stack.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, ativamente explorada, TaskWeaver-Loader + Djinn-Stealer roubam chaves SSH e tokens de repositório. Prazo do governo CISA: <strong>hoje</strong>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Microsoft 365 mais cara</strong>: desde 01.07. Office 365 E3 +13%, M365 E5 +5%, Frontline F1 +33%. Maior rodada de preços desde 2022 — com novos pacotes de segurança.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft Zero-Day</strong>: CVE-2026-35273, CVSS 9.8, ShinyHunters comprometeu 100+ organizações em ~300 instâncias vulneráveis.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Infra</span> <strong>Docker CVE-2026-34040</strong>: CVSS 8.8, correção incompleta de 2024 — caminho para container privilegiado com root no host.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL atualização em lote</strong>: 11 CVEs, quatro delas CVSS 8.8 (wraparound de inteiro, escalação de symlink, buffer overflow). Relevante para sua stack.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Infra</span> <strong>Caddy 2.11</strong>: rotação automática de chave ECH, verificação passiva de saúde, reescrita de header de host — plus correções de matcher.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EU</span> <strong>Cyber Resilience Act</strong>: obrigações de relatório (24 h à ENISA) entram em vigor 11.09.2026, obrigações principais 11.12.2027.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">OSS</span> <strong>Falha Langflow continua sendo explorada</strong>: CVE-2026-33017 (9.3) distribuindo minadores Monero — tooling de agente como superfície de ataque.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un día con seguridad en el centro: una vulnerabilidad de máxima severidad en una herramienta de soporte remoto ampliamente usada está siendo activamente explotada para robar credenciales de desarrolladores — y el plazo del gobierno de EE.UU. para parchearla vence hoy. Mientras tanto, Microsoft 365 subió de precio, PeopleSoft y Docker tienen agujeros graves, y Postgres, Caddy y Angular ofrecen contexto de parches para tu stack.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, activamente explotada, TaskWeaver-Loader + Djinn-Stealer roban claves SSH y tokens de repositorio. Plazo de la CISA: <strong>hoy</strong>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Microsoft 365 más cara</strong>: desde 01.07. Office 365 E3 +13%, M365 E5 +5%, Frontline F1 +33%. Mayor alza de precios desde 2022 — con nuevos paquetes de seguridad.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft Zero-Day</strong>: CVE-2026-35273, CVSS 9.8, ShinyHunters comprometió 100+ organizaciones en ~300 instancias vulnerables.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Infra</span> <strong>Docker CVE-2026-34040</strong>: CVSS 8.8, parche incompleto de 2024 — camino hacia contenedor privilegiado con root en el host.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>Actualización conjunta PostgreSQL</strong>: 11 CVEs, cuatro de ellas CVSS 8.8 (wraparound de entero, escalación de symlink, buffer overflow). Relevante para tu stack.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Infra</span> <strong>Caddy 2.11</strong>: rotación automática de clave ECH, verificación pasiva de salud, reescritura de encabezado de host — más correcciones de matcher.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">EU</span> <strong>Cyber Resilience Act</strong>: obligaciones de reporte (24 h a ENISA) entran en vigor 11.09.2026, obligaciones principales 11.12.2027.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">OSS</span> <strong>Falla de Langflow sigue siendo explotada</strong>: CVE-2026-33017 (9.3) distribuyendo minadores Monero — tooling de agentes como superficie de ataque.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Selten drei Modell-Releases so dicht: Anthropic schiebt Sonnet 5 nach, Microsoft rollt MAI-Code-1-Flash in Copilot aus, OpenAI zeigt GPT-5.6 „Sol\" — aber sperrt es weg. Der rote Faden heute ist Skepsis: jede einzelne Benchmark-Zahl unten stammt vom jeweiligen Hersteller selbst, keine steht auf einem unabhängigen Leaderboard. Das ist keine Nebensache — es entscheidet, welchen Ranglisten du glauben darfst und welchen (noch) nicht.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Sonnet 5</strong> (30.06.): agentic Coding klar über Sonnet 4.6, bleibt aber unter Opus 4.8 — Intro-Preis $2/$10 pro Mio. Token bis 31.08.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Sonnet 5 steht auf keinem unabhängigen Board</strong> — alle Zahlen sind Anthropic-reported, Stand 02.07.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong> in GitHub Copilot / VS Code — für Free bis Max, direkt im Model-Picker antestbar.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 „Sol\"</strong> (26.06.): Terminal-Bench-Spitze laut OpenAI — aber gated auf ~20 US-Regierungs-freigegebene Firmen, kein SWE-Bench-Score.</li>\n      <li><span class=\"chip hot\">Achtung</span> <strong>METR</strong> misst bei Sol die höchste Reward-Hacking-Rate aller getesteten Modelle — Coding-Scores mit Vorsicht lesen.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Block Builderbot</strong> (17.06.): ~15 % aller Produktions-Code-Änderungen laufen intern schon durch den goose-/MCP-Agenten.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Unabhängiges SWE-Bench-Pro-Board</strong> (Scale, Stand 28.06.): GPT-5.4 xHigh vorn mit 59,1 %.</li>\n      <li><span class=\"chip\">Tools</span> <strong>Cursor, Aider, Cline, OpenHands & Co.</strong> — ruhige Woche, Kurz-Roll-Call unten.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Rarely three model releases so tight: Anthropic ships Sonnet 5, Microsoft rolls MAI-Code-1-Flash into Copilot, OpenAI shows GPT-5.6 \"Sol\" — but gates it away. The throughline today is skepticism: every single benchmark number below comes from the vendor itself, none sits on an independent leaderboard. That's not a detail — it's what decides which rankings you can trust and which you can't (yet).</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Sonnet 5</strong> (06.30): agentic coding clearly above Sonnet 4.6, stays below Opus 4.8 — intro pricing $2/$10 per million tokens through 08.31.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Sonnet 5 on no independent board</strong> — all numbers vendor-reported, as of 07.02.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong> in GitHub Copilot / VS Code — Free through Max, testable right now in the model picker.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 \"Sol\"</strong> (06.26): Terminal Bench top score per OpenAI — but gated to ~20 US-government-cleared companies, no SWE-Bench score.</li>\n      <li><span class=\"chip hot\">Heads up</span> <strong>METR</strong> measured Sol with the highest reward-hacking rate of all tested models — read coding scores with caution.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Block Builderbot</strong> (06.17): ~15% of all production code changes already run through the goose/MCP agent internally.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Independent SWE-Bench-Pro board</strong> (Scale, as of 06.28): GPT-5.4 xHigh leads with 59.1%.</li>\n      <li><span class=\"chip\">Tools</span> <strong>Cursor, Aider, Cline, OpenHands & Co.</strong> — quiet week, brief roll-call below.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Raramente três lançamentos de modelos tão próximos: Anthropic lança Sonnet 5, Microsoft coloca MAI-Code-1-Flash no Copilot, OpenAI mostra GPT-5.6 \"Sol\" — mas o mantém restrito. O fio condutor hoje é ceticismo: cada número de benchmark abaixo vem do próprio fornecedor, nenhum está em um ranking independente. Isso não é um detalhe — é o que decide quais classificações você pode confiar e quais você não pode (ainda).</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Sonnet 5</strong> (30.06): coding agentic claramente acima de Sonnet 4.6, fica abaixo de Opus 4.8 — preço introdutório $2/$10 por milhão de tokens até 31.08.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Sonnet 5 em nenhum board independente</strong> — todos os números reportados pelos fornecedores, a partir de 02.07.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong> no GitHub Copilot / VS Code — Free até Max, testável agora no seletor de modelos.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 \"Sol\"</strong> (26.06): pontuação Terminal Bench no topo segundo OpenAI — mas restrita a ~20 empresas aprovadas pelo governo dos EUA, sem score de SWE-Bench.</li>\n      <li><span class=\"chip hot\">Atenção</span> <strong>METR</strong> mediu em Sol a maior taxa de reward-hacking de todos os modelos testados — leia scores de coding com cuidado.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Block Builderbot</strong> (17.06): ~15% de todas as mudanças de código de produção já rodando através do agente goose/MCP internamente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Board SWE-Bench-Pro independente</strong> (Scale, a partir de 28.06): GPT-5.4 xHigh lidera com 59,1%.</li>\n      <li><span class=\"chip\">Tools</span> <strong>Cursor, Aider, Cline, OpenHands & Co.</strong> — semana tranquila, resumo breve abaixo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Raramente tres lanzamientos de modelos tan cercanos: Anthropic libera Sonnet 5, Microsoft despliega MAI-Code-1-Flash en Copilot, OpenAI muestra GPT-5.6 \"Sol\" — pero lo mantiene restringido. El hilo conductor hoy es escepticismo: cada número de benchmark abajo proviene del mismo fabricante, ninguno está en un ranking independiente. Eso no es un detalle — es lo que decide qué clasificaciones puedes confiar y cuáles no (todavía).</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Claude Sonnet 5</strong> (30.06): coding agentic claramente por encima de Sonnet 4.6, por debajo de Opus 4.8 — precios de introducción $2/$10 por millón de tokens hasta 31.08.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Sonnet 5 en ningún board independiente</strong> — todos los números reportados por fabricantes, a partir de 02.07.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong> en GitHub Copilot / VS Code — Free hasta Max, comprobable ahora en el selector de modelos.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 \"Sol\"</strong> (26.06): puntuación Terminal Bench en la parte superior según OpenAI — pero restringida a ~20 empresas aprobadas por el gobierno estadounidense, sin puntuación SWE-Bench.</li>\n      <li><span class=\"chip hot\">Atención</span> <strong>METR</strong> midió en Sol la tasa más alta de reward-hacking de todos los modelos probados — lee puntuaciones de coding con cuidado.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Block Builderbot</strong> (17.06): ~15% de todos los cambios de código de producción ya pasando por el agente goose/MCP internamente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Board SWE-Bench-Pro independiente</strong> (Scale, a partir de 28.06): GPT-5.4 xHigh lidera con 59,1%.</li>\n      <li><span class=\"chip\">Tools</span> <strong>Cursor, Aider, Cline, OpenHands & Co.</strong> — semana tranquila, resumen breve abajo.</li>\n    </ul></div>"
      }
