      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Drei Deals an einem Tag, ein roter Faden: KI-Anbieter kaufen sich nicht mehr Modelle, sondern <em>Vertrauen</em> — KI-Authentizität bei Superhuman, „gelerntes\" Firmenwissen bei Engram, OT-Expertise bei Dragos. Und Brüssel verschiebt die teure Hälfte des AI Act um sechzehn Monate — aber nur die teure Hälfte. Die Transparenz-Pflicht zum 2. August bleibt.</p>\n    <ul>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Superhuman (ex-Grammarly) kauft GPTZero</strong>: KI-Detektor mit 19 Mio. Nutzern wird zur Authentizitäts-Schicht in „Superhuman Go\".</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Engram startet</strong>: „gelerntes Gedächtnis\" statt RAG, getestet bei Microsoft 365, Notion, Harvey. Token-Claim mit Skepsis lesen.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Dragos EmberAI ist GA</strong>: KI-Assistent für die Sicherheit von Stromnetzen, Fabriken, Pipelines — Daten bleiben beim Kunden.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act Omnibus</strong>: Hochrisiko-Frist (Anhang III) rutscht auf <strong>Dez. 2027</strong> — aber nur <em>vorläufig</em> vereinbart, noch nicht beschlossen.</li>\n      <li><span class=\"chip\">Policy · EU</span> <strong>2. August 2026 steht</strong>: Die Transparenz-Pflicht für KI-Inhalte (Art. 50) wird <em>nicht</em> verschoben — Planung läuft weiter.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner doppelt</strong>: 40 % der Enterprise-Apps mit KI-Agenten bis Ende 2026 — und &gt;40 % der Agenten-Projekte gecancelt bis 2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Zwei Projekt-Ideen</strong>: KI-Authentizitäts-Audit für DE-Mittelständler + souveräne Org-Gedächtnis-Schicht on-prem.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Drei Deals an einem Tag, ein roter Faden: KI-Anbieter kaufen sich nicht mehr Modelle, sondern <em>Vertrauen</em> — KI-Authentizität bei Superhuman, „gelerntes\" Firmenwissen bei Engram, OT-Expertise bei Dragos. Und Brüssel verschiebt die teure Hälfte des AI Act um sechzehn Monate — aber nur die teure Hälfte. Die Transparenz-Pflicht zum 2. August bleibt.</p>\n    <ul>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Superhuman (ex-Grammarly) kauft GPTZero</strong>: KI-Detektor mit 19 Mio. Nutzern wird zur Authentizitäts-Schicht in „Superhuman Go\".</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Engram startet</strong>: „gelerntes Gedächtnis\" statt RAG, getestet bei Microsoft 365, Notion, Harvey. Token-Claim mit Skepsis lesen.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Dragos EmberAI ist GA</strong>: KI-Assistent für die Sicherheit von Stromnetzen, Fabriken, Pipelines — Daten bleiben beim Kunden.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act Omnibus</strong>: Hochrisiko-Frist (Anhang III) rutscht auf <strong>Dez. 2027</strong> — aber nur <em>vorläufig</em> vereinbart, noch nicht beschlossen.</li>\n      <li><span class=\"chip\">Policy · EU</span> <strong>2. August 2026 steht</strong>: Die Transparenz-Pflicht für KI-Inhalte (Art. 50) wird <em>nicht</em> verschoben — Planung läuft weiter.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner doppelt</strong>: 40 % der Enterprise-Apps mit KI-Agenten bis Ende 2026 — und &gt;40 % der Agenten-Projekte gecancelt bis 2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Zwei Projekt-Ideen</strong>: KI-Authentizitäts-Audit für DE-Mittelständler + souveräne Org-Gedächtnis-Schicht on-prem.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Three deals in one day, one thread: AI vendors are no longer buying models, but <em>trust</em> — AI authenticity at Superhuman, \"learned\" firm knowledge at Engram, OT expertise at Dragos. And Brussels is delaying the expensive half of the AI Act by sixteen months — but only the expensive half. The transparency mandate on August 2 stays.</p>\n    <ul>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Superhuman (formerly Grammarly) acquires GPTZero</strong>: AI detector with 19M users becomes an authenticity layer in \"Superhuman Go\".</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Engram launches</strong>: \"learned memory\" instead of RAG, tested at Microsoft 365, Notion, Harvey. Read token claims skeptically.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Dragos EmberAI reaches GA</strong>: AI assistant for grid, factory, and pipeline security — data stays with customer.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act Omnibus</strong>: High-risk deadline (Annex III) slips to <strong>Dec 2027</strong> — but only <em>provisionally</em> agreed, not yet enacted.</li>\n      <li><span class=\"chip\">Policy · EU</span> <strong>August 2, 2026 holds</strong>: The transparency mandate for AI content (Art. 50) is <em>not</em> postponed — planning continues.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner doubles</strong>: 40% of enterprise apps with AI agents by end of 2026 — and &gt;40% of agent projects canceled by 2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Two project ideas</strong>: AI authenticity audit for German mid-market + sovereign org-memory layer on-prem.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Três negócios em um dia, um fio condutor: provedores de IA não estão mais comprando modelos, mas <em>confiança</em> — autenticidade de IA na Superhuman, conhecimento \"aprendido\" da firma na Engram, experiência em OT na Dragos. E Bruxelas está adiando a metade cara da Lei de IA em dezesseis meses — mas apenas a metade cara. O mandato de transparência em 2 de agosto permanece.</p>\n    <ul>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Superhuman (ex-Grammarly) adquire GPTZero</strong>: detector de IA com 19 mi usuários vira camada de autenticidade no \"Superhuman Go\".</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Engram lança</strong>: \"memória aprendida\" em vez de RAG, testada em Microsoft 365, Notion, Harvey. Leia reivindicações de tokens com ceticismo.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Dragos EmberAI chega à GA</strong>: assistente de IA para segurança de redes, fábricas, oleodutos — dados ficam com cliente.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act Omnibus</strong>: prazo de alto risco (Anexo III) escorrega para <strong>dez 2027</strong> — mas apenas <em>provisoriamente</em> acordado, ainda não promulgado.</li>\n      <li><span class=\"chip\">Policy · EU</span> <strong>2 de agosto de 2026 permanece</strong>: O mandato de transparência para conteúdo de IA (art. 50) <em>não</em> é adiado — planejamento continua.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner dobra</strong>: 40% dos aplicativos empresariais com agentes de IA até final de 2026 — e &gt;40% dos projetos de agentes cancelados até 2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Duas ideias de projeto</strong>: auditoria de autenticidade de IA para médio alemão + camada de memória organizacional soberana on-prem.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Tres negocios en un día, un hilo conductor: los proveedores de IA ya no compran modelos, sino <em>confianza</em> — autenticidad de IA en Superhuman, conocimiento \"aprendido\" de la empresa en Engram, experiencia en OT en Dragos. Y Bruselas está aplazando la mitad cara de la Ley de IA en dieciséis meses — pero solo la mitad cara. El mandato de transparencia del 2 de agosto permanece.</p>\n    <ul>\n      <li><span class=\"chip\">M&amp;A · US</span> <strong>Superhuman (ex-Grammarly) adquiere GPTZero</strong>: detector de IA con 19 mi usuarios se convierte en capa de autenticidad en \"Superhuman Go\".</li>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Engram lanza</strong>: \"memoria aprendida\" en lugar de RAG, probada en Microsoft 365, Notion, Harvey. Lee reclamaciones de tokens con escepticismo.</li>\n      <li><span class=\"chip\">Deploy · US</span> <strong>Dragos EmberAI llega a GA</strong>: asistente de IA para seguridad de redes, fábricas, oleoductos — datos permanecen con el cliente.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>EU AI Act Omnibus</strong>: plazo de alto riesgo (Anexo III) se aplaza a <strong>dic 2027</strong> — pero solo <em>provisionalmente</em> acordado, aún no promulgado.</li>\n      <li><span class=\"chip\">Policy · EU</span> <strong>2 de agosto de 2026 permanece</strong>: El mandato de transparencia para contenido de IA (art. 50) <em>no</em> se aplaza — la planificación continúa.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner se duplica</strong>: 40% de aplicaciones empresariales con agentes de IA para finales de 2026 — y &gt;40% de proyectos de agentes cancelados para 2027.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Dos ideas de proyecto</strong>: auditoría de autenticidad de IA para medianas alemanas + capa de memoria organizacional soberana on-prem.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Markt, klare Signale: Das Board ist heute fast komplett Java/Spring/Angular-Remote mit ungewöhnlich langen Laufzeiten — und bei den öffentlichen Ausschreibungen liegen zwei stack-passende TED-Aufträge offen, beide aber über twiceDs Solo-Kapazität. Dazu der Markt-Tiefschlag des Tages: der DACH-Durchschnittssatz fällt erstmals seit Studienbeginn 2016.</p>\n    <ul>\n      <li><span class=\"chip\">twiceD</span> <strong>78 Listings, Spitze 90</strong>: Top-Cluster ist Java + Spring Boot + Angular, 100 % Remote — der iSAX-Auth-Fokus (OAuth2/FIDO2) führt mit Fit 90.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Python/Bundesverwaltung (371926-2026)</strong>: €22,16 Mio. Rahmen, Frist Do 02.07. Stack passt, aber 5 Pflicht-Kriterien sperren twiceD solo aus → Partner nötig.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>AWplus/PostGIS + Web-UI (399359-2026)</strong>: €670k, BAF Langen, Frist Di 21.07. Stack-adjazent — Partner-Gap bei Umsatz + Public-Sector-Referenzen.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Erster Knick seit 2016</strong>: DACH-Schnitt €103/h 2026 (von €104 in 2025) — laut Freelancer-Kompass die erste Stagnation/leichter Rückgang seit Studienstart.</li>\n      <li><span class=\"chip\">Markt</span> <strong>IT-Entwicklung €94/h</strong>: das ist der Sub-Schnitt für Web/Mobile/Software (Studie 2025) — nicht Java-spezifisch; Daniels Ziel (100 €/h+) liegt klar darüber.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Lange Bindungen</strong>: mehrere 41–47-Monats-Engagements im Board (iSAX 41 Mo, BridgingIT 45 Mo, 1st solution 46 Mo, Kinteo 47 Mo Angular).</li>\n      <li><span class=\"chip good\">Auto</span> <strong>OAuth2/Security als Premium</strong>: drei Listings (iSAX Auth, SINC JOSE-SDK, Camunda Identity) drehen sich um Daniels Security-Stärke — Verhandlungs-Hebel.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains ×5, Aleph Alpha, Camunda Agentic</strong>: Frontier-Dev-Tools und DACH-AI mischen sich nach Score ins Board.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Markt, klare Signale: Das Board ist heute fast komplett Java/Spring/Angular-Remote mit ungewöhnlich langen Laufzeiten — und bei den öffentlichen Ausschreibungen liegen zwei stack-passende TED-Aufträge offen, beide aber über twiceDs Solo-Kapazität. Dazu der Markt-Tiefschlag des Tages: der DACH-Durchschnittssatz fällt erstmals seit Studienbeginn 2016.</p>\n    <ul>\n      <li><span class=\"chip\">twiceD</span> <strong>78 Listings, Spitze 90</strong>: Top-Cluster ist Java + Spring Boot + Angular, 100 % Remote — der iSAX-Auth-Fokus (OAuth2/FIDO2) führt mit Fit 90.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Python/Bundesverwaltung (371926-2026)</strong>: €22,16 Mio. Rahmen, Frist Do 02.07. Stack passt, aber 5 Pflicht-Kriterien sperren twiceD solo aus → Partner nötig.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>AWplus/PostGIS + Web-UI (399359-2026)</strong>: €670k, BAF Langen, Frist Di 21.07. Stack-adjazent — Partner-Gap bei Umsatz + Public-Sector-Referenzen.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Erster Knick seit 2016</strong>: DACH-Schnitt €103/h 2026 (von €104 in 2025) — laut Freelancer-Kompass die erste Stagnation/leichter Rückgang seit Studienstart.</li>\n      <li><span class=\"chip\">Markt</span> <strong>IT-Entwicklung €94/h</strong>: das ist der Sub-Schnitt für Web/Mobile/Software (Studie 2025) — nicht Java-spezifisch; Daniels Ziel (100 €/h+) liegt klar darüber.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Lange Bindungen</strong>: mehrere 41–47-Monats-Engagements im Board (iSAX 41 Mo, BridgingIT 45 Mo, 1st solution 46 Mo, Kinteo 47 Mo Angular).</li>\n      <li><span class=\"chip good\">Auto</span> <strong>OAuth2/Security als Premium</strong>: drei Listings (iSAX Auth, SINC JOSE-SDK, Camunda Identity) drehen sich um Daniels Security-Stärke — Verhandlungs-Hebel.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains ×5, Aleph Alpha, Camunda Agentic</strong>: Frontier-Dev-Tools und DACH-AI mischen sich nach Score ins Board.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet market, clear signals: today's board is almost entirely Java/Spring/Angular remote with unusually long durations — and two stack-matching TED contracts are open in public procurement, but both exceed twiceD's solo capacity. Add the market headline of the day: the DACH average rate drops for the first time since the study began in 2016.</p>\n    <ul>\n      <li><span class=\"chip\">twiceD</span> <strong>78 listings, top fit 90</strong>: the leading cluster is Java + Spring Boot + Angular, 100% remote — the iSAX auth focus (OAuth2/FIDO2) leads with a fit of 90.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Python/Federal Administration (371926-2026)</strong>: €22.16M framework, deadline Thu 02.07. Stack fits, but 5 mandatory criteria rule out twiceD solo → partner required.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>AWplus/PostGIS + Web UI (399359-2026)</strong>: €670k, BAF Langen, deadline Tue 21.07. Stack-adjacent — partner gap on revenue + public-sector references.</li>\n      <li><span class=\"chip\">Market</span> <strong>First dip since 2016</strong>: DACH average €103/h in 2026 (down from €104 in 2025) — per the Freelancer Compass, the first stagnation/slight decline since the study started.</li>\n      <li><span class=\"chip\">Market</span> <strong>IT Development €94/h</strong>: that's the sub-average for Web/Mobile/Software (2025 study) — not Java-specific; Daniel's target (€100/h+) is clearly above this broad average.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Long commitments</strong>: several 41–47-month engagements on the board (iSAX 41 mo, BridgingIT 45 mo, 1st solution 46 mo, Kinteo 47 mo Angular).</li>\n      <li><span class=\"chip good\">Edge</span> <strong>OAuth2/Security as a premium</strong>: three listings (iSAX Auth, SINC JOSE-SDK, Camunda Identity) center on Daniel's security strength — negotiating leverage.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains ×5, Aleph Alpha, Camunda Agentic</strong>: frontier dev tools and DACH AI mix into the board by score.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Mercado tranquilo, sinais claros: o board de hoje é quase todo Java/Spring/Angular remoto com durações incomummente longas — e dois contratos TED compatíveis com o stack estão abertos em licitações públicas, mas ambos excedem a capacidade solo da twiceD. Além disso, a manchete do mercado: a taxa média DACH cai pela primeira vez desde o início do estudo em 2016.</p>\n    <ul>\n      <li><span class=\"chip\">twiceD</span> <strong>78 vagas, maior fit 90</strong>: o cluster principal é Java + Spring Boot + Angular, 100% remoto — o foco de autenticação da iSAX (OAuth2/FIDO2) lidera com fit 90.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Python/Administração Federal (371926-2026)</strong>: quadro de €22,16 M, prazo qui 02.07. Stack compatível, mas 5 critérios obrigatórios excluem a twiceD solo → parceiro necessário.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>AWplus/PostGIS + Web UI (399359-2026)</strong>: €670k, BAF Langen, prazo ter 21.07. Stack adjacente — lacuna de parceiro em receita + referências no setor público.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Primeira queda desde 2016</strong>: média DACH €103/h em 2026 (contra €104 em 2025) — segundo o Freelancer-Kompass, primeira estagnação/leve queda desde o início do estudo.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Desenvolvimento de TI €94/h</strong>: essa é a sub-média para Web/Mobile/Software (estudo 2025) — não é específico de Java; o objetivo de Daniel (€100/h+) está claramente acima dessa média ampla.</li>\n      <li><span class=\"chip\">Remoto</span> <strong>Compromissos longos</strong>: várias vagas de 41–47 meses no board (iSAX 41 m, BridgingIT 45 m, 1st solution 46 m, Kinteo 47 m Angular).</li>\n      <li><span class=\"chip good\">Diferencial</span> <strong>OAuth2/Segurança como prêmio</strong>: três vagas (iSAX Auth, SINC JOSE-SDK, Camunda Identity) giram em torno do ponto forte de Daniel em segurança — alavancagem de negociação.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>JetBrains ×5, Aleph Alpha, Camunda Agentic</strong>: ferramentas de desenvolvimento de fronteira e IA DACH se misturam ao board por pontuação.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Mercado tranquilo, señales claras: el board de hoy es casi todo Java/Spring/Angular remoto con duraciones inusualmente largas — y dos contratos TED compatibles con el stack están abiertos en licitaciones públicas, pero ambos superan la capacidad individual de twiceD. Además, el titular del mercado: la tasa promedio DACH cae por primera vez desde el inicio del estudio en 2016.</p>\n    <ul>\n      <li><span class=\"chip\">twiceD</span> <strong>78 vacantes, mayor fit 90</strong>: el clúster principal es Java + Spring Boot + Angular, 100% remoto — el enfoque de autenticación de iSAX (OAuth2/FIDO2) lidera con fit 90.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>Python/Administración Federal (371926-2026)</strong>: marco €22,16 M, plazo jue 02.07. Stack compatible, pero 5 criterios obligatorios excluyen a twiceD en solitario → se necesita socio.</li>\n      <li><span class=\"chip hot\">TED</span> <strong>AWplus/PostGIS + Web UI (399359-2026)</strong>: €670k, BAF Langen, plazo mar 21.07. Stack adyacente — brecha de socio en facturación + referencias en sector público.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Primera caída desde 2016</strong>: promedio DACH €103/h en 2026 (vs. €104 en 2025) — según el Freelancer-Kompass, primera estancación/leve caída desde el inicio del estudio.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Desarrollo de TI €94/h</strong>: ese es el subpromedio para Web/Mobile/Software (estudio 2025) — no es específico de Java; el objetivo de Daniel (€100/h+) está claramente por encima de ese promedio amplio.</li>\n      <li><span class=\"chip\">Remoto</span> <strong>Compromisos largos</strong>: varias vacantes de 41–47 meses en el board (iSAX 41 m, BridgingIT 45 m, 1st solution 46 m, Kinteo 47 m Angular).</li>\n      <li><span class=\"chip good\">Ventaja</span> <strong>OAuth2/Seguridad como diferencial</strong>: tres vacantes (iSAX Auth, SINC JOSE-SDK, Camunda Identity) giran en torno a la fortaleza de Daniel en seguridad — palanca de negociación.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>JetBrains ×5, Aleph Alpha, Camunda Agentic</strong>: herramientas de desarrollo de vanguardia e IA DACH se mezclan en el board por puntuación.</li>\n    </ul></div>"

g>: erstmals ein Sechzehntelfinale (Round of 32) — 16 Extra-Spiele vom 28.06.–03.07., weil 48 Teams dabei sind.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Thursday, June 25, 2026, World Cup group stage. For Daniel, it's a double day: tonight Germany plays its final group match — already as group winners, so without real pressure — and in parallel, the transfer window is running the arguably more important story: SC Freiburg is rebuilding significantly for 2026/27. Brazil has just swept its group. Heads up: the Ecuador–Germany result is still pending at deadline, so no invented numbers here.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Ecuador–Germany tonight 22:00 CEST / 17:00 BRT</strong> (MetLife, East Rutherford): DFB already group winners, 9 goals in 2 matches. Kickoff after deadline — result pending.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Round of 32</strong>: Germany on Mon 29.06. against a group third-place, 22:30 CEST / 17:30 BRT, Gillette Stadium Foxborough.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brazil 3:0 Scotland</strong>: Won Group C, Vinícius Júnior with a brace. Ro32 on Mon 29.06., 19:00 CEST / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg rebuilding</strong>: three arrivals (Backhaus, Goto, Yamamoto), Röhl secured for Everton for €25M. Net −€1.85M.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 season complete</strong>: Freiburg 7th (47 pts), Bayern champions (89 pts), Heidenheim + St. Pauli relegated.</li>\n      <li><span class=\"chip\">DFB</span> <strong>No Freiburg outfield player in World Cup squad</strong>: Günter, Ginter and goalkeeper Atubolu despite strong season not called up; Nagelsmann's left back is David Raum.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão paused</strong> since 11.06. due to World Cup. Palmeiras leading after 18 rounds (41 pts), restart ~July 22.</li>\n      <li><span class=\"chip\">WM</span> <strong>New round</strong>: first time a Round of 32 — 16 extra matches from 28.06–03.07, because 48 teams are competing.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Quinta-feira, 25 de junho de 2026, fase de grupos da Copa do Mundo. Para Daniel é um dia duplo: hoje à noite a Alemanha joga seu último jogo de grupo — já como líder do grupo, portanto sem pressão esportiva — e em paralelo a janela de transferências segue a história possivelmente mais importante: o SC Freiburg se reconstrói notavelmente para 2026/27. O Brasil acabou de varrer seu grupo. Atenção: o resultado Equador–Alemanha ainda está pendente no fechamento; não há números inventados aqui.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Equador–Alemanha hoje 22:00 MESZ / 17:00 BRT</strong> (MetLife, East Rutherford): DFB já líder do grupo, 9 gols em 2 jogos. Pontapé de saída após o fechamento — resultado pendente.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Round of 32</strong>: Alemanha na seg 29.06. contra um terceiro colocado do grupo, 22:30 MESZ / 17:30 BRT, Gillette Stadium Foxborough.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasil 3:0 Escócia</strong>: Grupo C conquistado, Vinícius Júnior com doblete. Ro32 na seg 29.06., 19:00 MESZ / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg se reconstrói</strong>: três reforços (Backhaus, Goto, Yamamoto), Röhl para Everton por 25 mi €. Saldo negativo −1,85 mi €.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada 2025/26 concluída</strong>: Freiburg 7º (47 pts), Bayern campeão (89 pts), Heidenheim + St. Pauli caem.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nenhum jogador de linha do Freiburg no elenco</strong>: Günter, Ginter e goleiro Atubolu apesar da boa temporada não foram convocados; lateral-esquerdo de Nagelsmann é David Raum.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão em pausa</strong> desde 11.06. por causa da Copa. Palmeiras lidera após 18 rodadas (41 pts), retorno ~22 de julho.</li>\n      <li><span class=\"chip\">WM</span> <strong>Nova rodada</strong>: pela primeira vez um mata-mata oitavas (Round of 32) — 16 jogos extras de 28.06.–03.07., porque 48 times participam.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Jueves, 25 de junio de 2026, fase de grupos de la Copa del Mundo. Para Daniel es un día doble: esta noche Alemania juega su último partido de grupo — ya como ganadores del grupo, sin presión deportiva — y en paralelo la ventana de transferencias corre el hilo posiblemente más importante: el SC Freiburg se reconstruye notablemente para 2026/27. Brasil acaba de arrollar su grupo. Atención: el resultado Ecuador–Alemania aún está pendiente en el cierre; no hay números inventados aquí.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Ecuador–Alemania hoy 22:00 MESZ / 17:00 BRT</strong> (MetLife, East Rutherford): DFB ya ganador del grupo, 9 goles en 2 partidos. Saque inicial después del cierre — resultado pendiente.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Round of 32</strong>: Alemania el lun 29.06. contra un tercero del grupo, 22:30 MESZ / 17:30 BRT, Gillette Stadium Foxborough.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasil 3:0 Escocia</strong>: Grupo C ganado, Vinícius Júnior con doblete. Ro32 el lun 29.06., 19:00 MESZ / 14:00 BRT, Houston.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg se reconstruye</strong>: tres refuerzos (Backhaus, Goto, Yamamoto), Röhl a Everton por 25 mi €. Saldo −1,85 mi €.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada 2025/26 concluida</strong>: Freiburg 7º (47 pts), Bayern campeón (89 pts), Heidenheim + St. Pauli descienden.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Ningún jugador de línea de Freiburg en plantel</strong>: Günter, Ginter y arquero Atubolu a pesar de buena temporada no fueron convocados; lateral izquierdo de Nagelsmann es David Raum.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão en pausa</strong> desde 11.06. por Copa del Mundo. Palmeiras lidera tras 18 jornadas (41 pts), reanudación ~22 de julio.</li>\n      <li><span class=\"chip\">WM</span> <strong>Nueva ronda</strong>: por primera vez dieciseisavos (Round of 32) — 16 partidos extra del 28.06.–03.07., porque 48 equipos participan.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Dieses Wochenende laufen <strong>zwei Titelkämpfe parallel</strong>: In der Formel&nbsp;1 steigt der <strong>Österreich-GP</strong> am Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22), wo <strong>Kimi Antonelli</strong> nach seinem Barcelona-Ausfall nur noch <strong>41&nbsp;Punkte</strong> vor Hamilton führt. Zeitgleich gastiert die <strong>MotoGP</strong> in Assen (Dutch TT, Lauf&nbsp;10/22) — und die ist gerade die heißere Geschichte: WM-Führer <strong>Marco Bezzecchi</strong> kehrt zurück, nachdem er in Brno für einen <strong>Schlag gegen einen Streckenposten</strong> vom Hauptrennen gesperrt war, während <strong>Marc Márquez</strong> mit dem Brno-Sieg von 102 auf 40&nbsp;Punkte Rückstand aufgeholt hat. Beide Rennen am Sonntag&nbsp;28.06.: MotoGP 14:00&nbsp;MESZ / 09:00&nbsp;BRT, F1 15:00&nbsp;MESZ / 10:00&nbsp;BRT. Alle Zeiten zweizonig: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">MotoGP · DRAMA</span> <strong>Bezzecchi war in Brno gesperrt</strong> — er traf nach einem Sprint-Sturz einen Streckenposten, die FIM-Stewards verbannten ihn aus dem Grand Prix, Aprilias Einspruch wurde abgelehnt. In Assen ist er wieder dabei.</li>\n      <li><span class=\"chip hot\">MotoGP-WM</span> <strong>Bezzecchi führt mit 180&nbsp;Pkt</strong> — nur noch <strong>8</strong> vor Martin (172) und 23 vor Di&nbsp;Giannantonio (157). <strong>Márquez (140, &minus;40)</strong> hat in zwei Wochenenden 62&nbsp;Punkte gutgemacht.</li>\n      <li><span class=\"chip good\">MotoGP · BRNO</span> <strong>Márquez gewann Brno</strong> (+0,421&nbsp;s vor Ogura), Bagnaia&nbsp;P3 — dritter Sieg in vier Rennen. Genau diese Serie will Bezzecchi in Assen stoppen.</li>\n      <li><span class=\"chip hot\">F1 · SPIELBERG</span> <strong>Österreich-GP, Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22)</strong> — 26.–28.06., kein Sprint. Antonelli führt mit 156&nbsp;Pkt, nur 41 vor Hamilton nach dessen Barcelona-Premiere.</li>\n      <li><span class=\"chip\">F1-Konstrukteure</span> <strong>Mercedes führt mit 262&nbsp;Pkt</strong> vor Ferrari (190, &minus;72) und McLaren (141). Verstappen (P7, 55&nbsp;Pkt) wartet auf seiner Heimstrecke noch auf den ersten Saisonsieg.</li>\n      <li><span class=\"chip\">DOPPEL-SONNTAG</span> <strong>Beide Hauptrennen am So 28.06.</strong> — MotoGP <strong>14:00&nbsp;MESZ / 09:00&nbsp;BRT</strong>, F1 <strong>15:00&nbsp;MESZ / 10:00&nbsp;BRT</strong>. MotoGP-Sprint schon am Sa 27.06. um 15:00&nbsp;MESZ / 10:00&nbsp;BRT.</li>\n      <li><span class=\"chip\">WEC · AUSBLICK</span> <strong>Kein Langstrecken-Lauf dieses Wochenende</strong> — Le Mans (13.–14.06.) ist gelaufen, nächster Halt ist Interlagos am 12.07., das Heimrennen vor Daniels Tür.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Dieses Wochenende laufen <strong>zwei Titelkämpfe parallel</strong>: In der Formel&nbsp;1 steigt der <strong>Österreich-GP</strong> am Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22), wo <strong>Kimi Antonelli</strong> nach seinem Barcelona-Ausfall nur noch <strong>41&nbsp;Punkte</strong> vor Hamilton führt. Zeitgleich gastiert die <strong>MotoGP</strong> in Assen (Dutch TT, Lauf&nbsp;10/22) — und die ist gerade die heißere Geschichte: WM-Führer <strong>Marco Bezzecchi</strong> kehrt zurück, nachdem er in Brno für einen <strong>Schlag gegen einen Streckenposten</strong> vom Hauptrennen gesperrt war, während <strong>Marc Márquez</strong> mit dem Brno-Sieg von 102 auf 40&nbsp;Punkte Rückstand aufgeholt hat. Beide Rennen am Sonntag&nbsp;28.06.: MotoGP 14:00&nbsp;MESZ / 09:00&nbsp;BRT, F1 15:00&nbsp;MESZ / 10:00&nbsp;BRT. Alle Zeiten zweizonig: <strong>MESZ · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">MotoGP · DRAMA</span> <strong>Bezzecchi war in Brno gesperrt</strong> — er traf nach einem Sprint-Sturz einen Streckenposten, die FIM-Stewards verbannten ihn aus dem Grand Prix, Aprilias Einspruch wurde abgelehnt. In Assen ist er wieder dabei.</li>\n      <li><span class=\"chip hot\">MotoGP-WM</span> <strong>Bezzecchi führt mit 180&nbsp;Pkt</strong> — nur noch <strong>8</strong> vor Martin (172) und 23 vor Di&nbsp;Giannantonio (157). <strong>Márquez (140, &minus;40)</strong> hat in zwei Wochenenden 62&nbsp;Punkte gutgemacht.</li>\n      <li><span class=\"chip good\">MotoGP · BRNO</span> <strong>Márquez gewann Brno</strong> (+0,421&nbsp;s vor Ogura), Bagnaia&nbsp;P3 — dritter Sieg in vier Rennen. Genau diese Serie will Bezzecchi in Assen stoppen.</li>\n      <li><span class=\"chip hot\">F1 · SPIELBERG</span> <strong>Österreich-GP, Red&nbsp;Bull&nbsp;Ring (Lauf&nbsp;8/22)</strong> — 26.–28.06., kein Sprint. Antonelli führt mit 156&nbsp;Pkt, nur 41 vor Hamilton nach dessen Barcelona-Premiere.</li>\n      <li><span class=\"chip\">F1-Konstrukteure</span> <strong>Mercedes führt mit 262&nbsp;Pkt</strong> vor Ferrari (190, &minus;72) und McLaren (141). Verstappen (P7, 55&nbsp;Pkt) wartet auf seiner Heimstrecke noch auf den ersten Saisonsieg.</li>\n      <li><span class=\"chip\">DOPPEL-SONNTAG</span> <strong>Beide Hauptrennen am So 28.06.</strong> — MotoGP <strong>14:00&nbsp;MESZ / 09:00&nbsp;BRT</strong>, F1 <strong>15:00&nbsp;MESZ / 10:00&nbsp;BRT</strong>. MotoGP-Sprint schon am Sa 27.06. um 15:00&nbsp;MESZ / 10:00&nbsp;BRT.</li>\n      <li><span class=\"chip\">WEC · AUSBLICK</span> <strong>Kein Langstrecken-Lauf dieses Wochenende</strong> — Le Mans (13.–14.06.) ist gelaufen, nächster Halt ist Interlagos am 12.07., das Heimrennen vor Daniels Tür.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This weekend, <strong>two championships run in parallel</strong>: In Formula 1, the <strong>Austrian GP</strong> takes place at Red Bull Ring (race 8/22), where <strong>Kimi Antonelli</strong> leads by just <strong>41 points</strong> over Hamilton following his Barcelona retirement. At the same time, <strong>MotoGP</strong> visits Assen (Dutch TT, race 10/22) — and this is the hotter story: championship leader <strong>Marco Bezzecchi</strong> returns after being banned from the main race at Brno for <strong>striking a marshal</strong>, while <strong>Marc Márquez</strong> has closed the gap from 102 down to <strong>40 points</strong> with his Brno win. Both main races on Sunday 28.06.: MotoGP 14:00 CEST / 09:00 BRT, F1 15:00 CEST / 10:00 BRT. All times in two zones: <strong>CEST · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">MotoGP · DRAMA</span> <strong>Bezzecchi was banned at Brno</strong> — he struck a marshal after a sprint crash, the FIM stewards excluded him from the Grand Prix, and Aprilia's appeal was rejected. He's back in Assen.</li>\n      <li><span class=\"chip hot\">MotoGP Championship</span> <strong>Bezzecchi leads with 180 pts</strong> — just <strong>8</strong> ahead of Martín (172) and 23 ahead of Di Giannantonio (157). <strong>Márquez (140, −40)</strong> has made up 62 points in two weekends.</li>\n      <li><span class=\"chip good\">MotoGP · BRNO</span> <strong>Márquez won Brno</strong> (+0.421 s over Ogura), Bagnaia took P3 — his third win in four races. That's exactly the streak Bezzecchi wants to stop in Assen.</li>\n      <li><span class=\"chip hot\">F1 · SPIELBERG</span> <strong>Austrian GP, Red Bull Ring (race 8/22)</strong> — 26–28.06., no sprint. Antonelli leads with 156 pts, just 41 ahead of Hamilton after his Barcelona maiden.</li>\n      <li><span class=\"chip\">F1 Constructors</span> <strong>Mercedes leads with 262 pts</strong> ahead of Ferrari (190, −72) and McLaren (141). Verstappen (P7, 55 pts) awaits his first season win on his home track.</li>\n      <li><span class=\"chip\">DOUBLE SUNDAY</span> <strong>Both main races on Sun 28.06.</strong> — MotoGP <strong>14:00 CEST / 09:00 BRT</strong>, F1 <strong>15:00 CEST / 10:00 BRT</strong>. MotoGP sprint already on Sat 27.06. at 15:00 CEST / 10:00 BRT.</li>\n      <li><span class=\"chip\">WEC · OUTLOOK</span> <strong>No long-distance race this weekend</strong> — Le Mans (13–14.06.) is done, next stop is Interlagos on 12.07., Daniel's home race.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Este fim de semana, <strong>dois campeonatos rodam em paralelo</strong>: Na Fórmula 1, o <strong>GP da Áustria</strong> acontece no Red Bull Ring (corrida 8/22), onde <strong>Kimi Antonelli</strong> lidera por apenas <strong>41 pontos</strong> sobre Hamilton após sua desistência em Barcelona. Ao mesmo tempo, a <strong>MotoGP</strong> visita Assen (Dutch TT, corrida 10/22) — e esta é a história mais quente: o líder do campeonato <strong>Marco Bezzecchi</strong> volta após ser banido da corrida principal em Brno por <strong>bater em um comissário</strong>, enquanto <strong>Marc Márquez</strong> fechou a diferença de 102 para <strong>40 pontos</strong> com sua vitória em Brno. Ambas as corridas principais no domingo 28.06.: MotoGP 14:00 CEST / 09:00 BRT, F1 15:00 CEST / 10:00 BRT. Todos os horários em dois fusos: <strong>CEST · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">MotoGP · DRAMA</span> <strong>Bezzecchi foi banido em Brno</strong> — ele atingiu um comissário após uma queda no sprint, os comissários da FIM o excluíram do Grand Prix, e o recurso da Aprilia foi rejeitado. Ele volta em Assen.</li>\n      <li><span class=\"chip hot\">Campeonato MotoGP</span> <strong>Bezzecchi lidera com 180 pts</strong> — apenas <strong>8</strong> à frente de Martín (172) e 23 à frente de Di Giannantonio (157). <strong>Márquez (140, −40)</strong> ganhou 62 pontos em dois fins de semana.</li>\n      <li><span class=\"chip good\">MotoGP · BRNO</span> <strong>Márquez venceu Brno</strong> (+0,421 s sobre Ogura), Bagnaia ficou em P3 — sua terceira vitória em quatro corridas. É exatamente essa sequência que Bezzecchi quer parar em Assen.</li>\n      <li><span class=\"chip hot\">F1 · SPIELBERG</span> <strong>GP da Áustria, Red Bull Ring (corrida 8/22)</strong> — 26–28.06., sem sprint. Antonelli lidera com 156 pts, apenas 41 à frente de Hamilton após sua estreia em Barcelona.</li>\n      <li><span class=\"chip\">Construtores F1</span> <strong>Mercedes lidera com 262 pts</strong> sobre Ferrari (190, −72) e McLaren (141). Verstappen (P7, 55 pts) aguarda sua primeira vitória da temporada em sua pista de casa.</li>\n      <li><span class=\"chip\">DOMINGO DOBRO</span> <strong>Ambas as corridas principais no dom 28.06.</strong> — MotoGP <strong>14:00 CEST / 09:00 BRT</strong>, F1 <strong>15:00 CEST / 10:00 BRT</strong>. Sprint da MotoGP já no sábado 27.06. às 15:00 CEST / 10:00 BRT.</li>\n      <li><span class=\"chip\">WEC · PERSPECTIVA</span> <strong>Nenhuma corrida de longa distância este fim de semana</strong> — Le Mans (13–14.06.) terminou, próxima parada é Interlagos em 12.07., a corrida de casa de Daniel.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Este fin de semana, <strong>dos campeonatos corren en paralelo</strong>: En la Fórmula 1, el <strong>Gran Premio de Austria</strong> se disputa en el Red Bull Ring (carrera 8/22), donde <strong>Kimi Antonelli</strong> lidera por apenas <strong>41 puntos</strong> sobre Hamilton tras su retiro en Barcelona. Al mismo tiempo, la <strong>MotoGP</strong> visita Assen (Dutch TT, carrera 10/22) — y esta es la historia más candente: el líder mundial <strong>Marco Bezzecchi</strong> regresa tras ser sancionado de la carrera principal en Brno por <strong>golpear a un comisario</strong>, mientras <strong>Marc Márquez</strong> ha cerrado la brecha de 102 a <strong>40 puntos</strong> con su victoria en Brno. Ambas carreras principales el domingo 28.06.: MotoGP 14:00 CEST / 09:00 BRT, F1 15:00 CEST / 10:00 BRT. Todos los horarios en dos zonas: <strong>CEST · BRT</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">MotoGP · DRAMA</span> <strong>Bezzecchi fue sancionado en Brno</strong> — golpeó a un comisario tras una caída en la carrera clasificatoria, los comisarios de la FIM lo excluyeron del Gran Premio, y el recurso de Aprilia fue rechazado. Vuelve en Assen.</li>\n      <li><span class=\"chip hot\">Campeonato MotoGP</span> <strong>Bezzecchi lidera con 180 pts</strong> — solo <strong>8</strong> puntos sobre Martín (172) y 23 sobre Di Giannantonio (157). <strong>Márquez (140, −40)</strong> ha ganado 62 puntos en dos fines de semana.</li>\n      <li><span class=\"chip good\">MotoGP · BRNO</span> <strong>Márquez ganó Brno</strong> (+0,421 s sobre Ogura), Bagnaia tercero — su tercera victoria en cuatro carreras. Es exactamente esa racha que Bezzecchi quiere detener en Assen.</li>\n      <li><span class=\"chip hot\">F1 · SPIELBERG</span> <strong>Gran Premio de Austria, Red Bull Ring (carrera 8/22)</strong> — 26–28.06., sin carrera clasificatoria. Antonelli lidera con 156 pts, solo 41 sobre Hamilton tras su debut en Barcelona.</li>\n      <li><span class=\"chip\">Constructores F1</span> <strong>Mercedes lidera con 262 pts</strong> sobre Ferrari (190, −72) y McLaren (141). Verstappen (P7, 55 pts) espera su primera victoria de la temporada en su circuito de casa.</li>\n      <li><span class=\"chip\">DOMINGO DOBLE</span> <strong>Ambas carreras principales el dom 28.06.</strong> — MotoGP <strong>14:00 CEST / 09:00 BRT</strong>, F1 <strong>15:00 CEST / 10:00 BRT</strong>. Carrera clasificatoria de MotoGP ya el sábado 27.06. a las 15:00 CEST / 10:00 BRT.</li>\n      <li><span class=\"chip\">WEC · PERSPECTIVA</span> <strong>Sin carrera de larga distancia este fin de semana</strong> — Le Mans (13–14.06.) ya terminó, próxima parada es Interlagos el 12.07., la carrera de casa de Daniel.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein klassischer trockener Paraná-Winter spannt sich übers Wochenende: sonnig-kühle Tage, viel Programm in Reichweite. In Londrina läuft das FILO-Theaterfestival mit kostenlosen Kindershows Sa/So aus, in Ribeirão Claro beginnt nächste Woche die FesCafé. Aber: die Atemwegsviren-Saison zieht an — mit einem einen Monat alten Baby im Haus ist das der wichtigste Punkt heute.</p>\n    <ul>\n      <li><span class=\"chip\">Wetter</span> <strong>Trocken &amp; mild</strong>: Do–Fr sonnig 16–21 °C, Sa kurze Nachmittagsschauer, So/Mo wieder trocken bis 26 °C. Gute Wochenend-Aussichten.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>VSR/SRAG steigt</strong>: Paraná unter den Alarm-Staaten (InfoGripe SE 22, Stand 11.06.2026). Bei Kleinkindern vor allem VSR. Mit Säugling: Vorsicht bei Menschenmengen.</li>\n      <li><span class=\"chip\">Event</span> <strong>FILO Londrina</strong> (~110 km): internationales Theaterfestival, Endwochenende — gratis Kindershows Sa 27. + So 28.06. auf Calçadão, Lago Igapó und Zirkusschule.</li>\n      <li><span class=\"chip good\">Event</span> <strong>FesCafé Ribeirão Claro</strong>: 28. Ausgabe, 02.–05.07. Rodeio, Vergnügungspark, Sonntag Kindershow „Sonhos e Magia\". 50.000 Besucher erwartet — direkt vor der Haustür.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue ruht</strong>: Paraná −96,1 % gegenüber 2025 (SE 1–14/2026). Winter = niedrige Aedes-Aktivität. Entwarnung, kein Alert.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien nahen</strong>: staatlicher Recesso 13.–24.07.2026 (SEED-PR) — 18 Tage Planungsfenster für einen größeren Ausflug.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein klassischer trockener Paraná-Winter spannt sich übers Wochenende: sonnig-kühle Tage, viel Programm in Reichweite. In Londrina läuft das FILO-Theaterfestival mit kostenlosen Kindershows Sa/So aus, in Ribeirão Claro beginnt nächste Woche die FesCafé. Aber: die Atemwegsviren-Saison zieht an — mit einem einen Monat alten Baby im Haus ist das der wichtigste Punkt heute.</p>\n    <ul>\n      <li><span class=\"chip\">Wetter</span> <strong>Trocken &amp; mild</strong>: Do–Fr sonnig 16–21 °C, Sa kurze Nachmittagsschauer, So/Mo wieder trocken bis 26 °C. Gute Wochenend-Aussichten.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>VSR/SRAG steigt</strong>: Paraná unter den Alarm-Staaten (InfoGripe SE 22, Stand 11.06.2026). Bei Kleinkindern vor allem VSR. Mit Säugling: Vorsicht bei Menschenmengen.</li>\n      <li><span class=\"chip\">Event</span> <strong>FILO Londrina</strong> (~110 km): internationales Theaterfestival, Endwochenende — gratis Kindershows Sa 27. + So 28.06. auf Calçadão, Lago Igapó und Zirkusschule.</li>\n      <li><span class=\"chip good\">Event</span> <strong>FesCafé Ribeirão Claro</strong>: 28. Ausgabe, 02.–05.07. Rodeio, Vergnügungspark, Sonntag Kindershow „Sonhos e Magia\". 50.000 Besucher erwartet — direkt vor der Haustür.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue ruht</strong>: Paraná −96,1 % gegenüber 2025 (SE 1–14/2026). Winter = niedrige Aedes-Aktivität. Entwarnung, kein Alert.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien nahen</strong>: staatlicher Recesso 13.–24.07.2026 (SEED-PR) — 18 Tage Planungsfenster für einen größeren Ausflug.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A classic dry Paraná winter is settling in over the weekend: sunny, cool days with plenty to do nearby. In Londrina, the FILO theater festival wraps up with free kids' shows Sat/Sun; Ribeirão Claro kicks off FesCafé next week. But the respiratory virus season is picking up — with a one-month-old baby at home, that's the headline today.</p>\n    <ul>\n      <li><span class=\"chip\">Weather</span> <strong>Dry &amp; mild</strong>: Thu–Fri sunny 16–21°C, Sat brief afternoon showers, Sun/Mon dry again to 26°C. Good weekend outlook.</li>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV/SRAG rising</strong>: Paraná among alarm states (InfoGripe SE 22, as of 06-11-2026). Toddlers hit hardest by RSV. With a newborn: watch crowds.</li>\n      <li><span class=\"chip\">Event</span> <strong>FILO Londrina</strong> (~110 km): international theater festival, final weekend — free kids' shows Sat 27 + Sun 28.06 on Calçadão, Lago Igapó, and circus school.</li>\n      <li><span class=\"chip good\">Event</span> <strong>FesCafé Ribeirão Claro</strong>: 28th edition, 07-02 through 07-05. Rodeo, amusement park, Sunday kids' show \"Sonhos e Magia\". Fifty thousand visitors expected — right at your doorstep.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue dormant</strong>: Paraná −96.1% vs. 2025 (SE 1–14/2026). Winter = low Aedes activity. All clear, no alert.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break approaching</strong>: state winter recess 07-13 through 07-24, 2026 (SEED-PR) — 18 days to plan a bigger trip.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um inverno paranaense clássico e seco se estende pelo fim de semana: dias ensolarados e frescos com bastante programação ao alcance. Em Londrina, o festival de teatro FILO termina com shows infantis grátis no sábado e domingo; Ribeirão Claro abre a FesCafé na semana que vem. Mas a temporada de vírus respiratórios está acelerada — com um bebê de um mês em casa, esse é o ponto mais importante hoje.</p>\n    <ul>\n      <li><span class=\"chip\">Clima</span> <strong>Seco &amp; ameno</strong>: quinta a sexta ensolarado 16–21 °C, sábado pancadas à tarde, domingo/segunda novamente seco até 26 °C. Boas perspectivas para o fim de semana.</li>\n      <li><span class=\"chip hot\">Saúde</span> <strong>VSR/SRAG em alta</strong>: Paraná entre os estados de alerta (InfoGripe SE 22, dados de 11.06.2026). Pequenas crianças principalmente com VSR. Com recém-nascido: cuidado com aglomerações.</li>\n      <li><span class=\"chip\">Evento</span> <strong>FILO Londrina</strong> (~110 km): festival internacional de teatro, último fim de semana — shows infantis grátis nos dias 27 e 28.06 no Calçadão, Lago Igapó e escola de circo.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>FesCafé Ribeirão Claro</strong>: 28ª edição, 02.–05.07. Rodeio, parque de diversões, shows; domingo show infantil \"Sonhos e Magia\". Esperados 50.000 visitantes — bem na sua porta.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue em repouso</strong>: Paraná −96,1% em relação a 2025 (SE 1–14/2026). Inverno = baixa atividade do Aedes. Sinal verde, sem alerta.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno se aproximam</strong>: recesso estadual 13.–24.07.2026 (SEED-PR) — 18 dias para planejar um passeio maior.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un invierno paranaense clásico y seco se extiende durante el fin de semana: días soleados y frescos con mucho que hacer al alcance. En Londrina, el festival internacional de teatro FILO termina con funciones infantiles gratuitas el sábado y domingo; Ribeirão Claro abre la FesCafé la próxima semana. Pero la temporada de virus respiratorios está acelerada — con un bebé de un mes en casa, ese es el punto más importante hoy.</p>\n    <ul>\n      <li><span class=\"chip\">Clima</span> <strong>Seco &amp; templado</strong>: jueves a viernes soleado 16–21 °C, sábado chaparrones por la tarde, domingo/lunes nuevamente seco hasta 26 °C. Buenas perspectivas para el fin de semana.</li>\n      <li><span class=\"chip hot\">Salud</span> <strong>VSR/SRAG en aumento</strong>: Paraná entre los estados de alerta (InfoGripe SE 22, datos de 11.06.2026). Niños pequeños principalmente con VSR. Con recién nacido: cuida las aglomeraciones.</li>\n      <li><span class=\"chip\">Evento</span> <strong>FILO Londrina</strong> (~110 km): festival internacional de teatro, último fin de semana — funciones infantiles gratis días 27 y 28.06 en Calçadão, Lago Igapó y escuela de circo.</li>\n      <li><span class=\"chip good\">Evento</span> <strong>FesCafé Ribeirão Claro</strong>: 28ª edición, 02.–05.07. Rodeo, parque de diversiones, funciones; domingo show infantil \"Sonhos e Magia\". Se esperan 50.000 visitantes — justo enfrente de tu casa.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue en descanso</strong>: Paraná −96,1% en relación con 2025 (SE 1–14/2026). Invierno = baja actividad del Aedes. Vía libre, sin alerta.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno se acercan</strong>: receso estatal 13.–24.07.2026 (SEED-PR) — 18 días para planificar un viaje más grande.</li>\n    </ul></div>"

(function () {

  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];

      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {

  const navGroups = $('#nav-groups');
