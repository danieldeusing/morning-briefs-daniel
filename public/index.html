      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Drei Tage nach dem Launch ist Schluss: Am 12. Juni hat die US-Regierung per Exportkontroll-Direktive den Zugang zu Claude Fable 5 und Mythos 5 untersagt — und Anthropic hat beide Modelle daraufhin <strong>für alle Kunden</strong> abgeschaltet. Das Modell, das am 9. Juni mit 95,0 % an die SWE-Bench-Spitze gesprungen war, ist seit Freitag weg; Claude Code fällt auf Opus 4.8 zurück. Für dich als Foreign National in Brasilien besonders relevant: Die Direktive sperrt den Zugang für jeden Nicht-US-Bürger — du könntest Fable 5 ohnehin nicht nutzen. Daneben: Googles Gemini-CLI/Code-Assist-Sunset (Stichtag in vier Tagen) und Moonshots offenes Kimi K2.7 Code.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 abgeschaltet</strong>: US-Exportkontroll-Direktive (12. Juni). Anthropic deaktiviert beide Modelle für <strong>alle</strong> Kunden; Begründung laut Anthropic ein vermuteter Jailbreak. Claude Code läuft jetzt wieder auf Opus 4.8.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Foreign-National-Sperre</strong>: Die Direktive verbietet den Zugang für jeden Nicht-US-Bürger, drinnen wie draußen — Daniel in Brasilien fällt darunter. Andere Anthropic-Modelle bleiben verfügbar.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Was gezogen wurde</strong>: Fable 5 stand auf SWE-Bench Verified bei 95,0 % (Stand vor der Abschaltung), 1M-Kontext, 10 $/50 $ pro 1M Input-/Output-Tokens. Jetzt nicht abrufbar.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini-Sunset</strong>: Gratis-, AI-Pro- und AI-Ultra-Zugang zu Gemini Code Assist + CLI endet am <strong>18. Juni</strong>. Migration: Antigravity CLI.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7 Code</strong> (12. Juni): 1T-Param-MoE, offene Gewichte (Modified MIT), 0,95 $/4,00 $ pro 1M Tokens. Bench-Zahlen bislang nur vom Hersteller. <span class=\"chip good\">try</span></li>\n      <li><span class=\"chip\">Bench</span> <strong>WebDev Arena</strong>: claude-opus-4-7-thinking führt (1567 Elo, Stand 24.05.); <strong>LiveCodeBench v6</strong>: Qwen3.7 Max vorn (~91,6 %, Stand 14.06.).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.172: verschachtelte Sub-Agenten bis 5 Ebenen tief, Plugin-Marketplace-Suche.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Skeptik-Reflex</strong>: Hersteller-Benchmarks bleiben Hersteller-Benchmarks — und ein 95-%-Spitzenmodell kann über Nacht regulatorisch verschwinden. Unabhängige Zahlen für Kimi K2.7 stehen noch aus.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Drei Tage nach dem Launch ist Schluss: Am 12. Juni hat die US-Regierung per Exportkontroll-Direktive den Zugang zu Claude Fable 5 und Mythos 5 untersagt — und Anthropic hat beide Modelle daraufhin <strong>für alle Kunden</strong> abgeschaltet. Das Modell, das am 9. Juni mit 95,0 % an die SWE-Bench-Spitze gesprungen war, ist seit Freitag weg; Claude Code fällt auf Opus 4.8 zurück. Für dich als Foreign National in Brasilien besonders relevant: Die Direktive sperrt den Zugang für jeden Nicht-US-Bürger — du könntest Fable 5 ohnehin nicht nutzen. Daneben: Googles Gemini-CLI/Code-Assist-Sunset (Stichtag in vier Tagen) und Moonshots offenes Kimi K2.7 Code.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 abgeschaltet</strong>: US-Exportkontroll-Direktive (12. Juni). Anthropic deaktiviert beide Modelle für <strong>alle</strong> Kunden; Begründung laut Anthropic ein vermuteter Jailbreak. Claude Code läuft jetzt wieder auf Opus 4.8.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Foreign-National-Sperre</strong>: Die Direktive verbietet den Zugang für jeden Nicht-US-Bürger, drinnen wie draußen — Daniel in Brasilien fällt darunter. Andere Anthropic-Modelle bleiben verfügbar.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Was gezogen wurde</strong>: Fable 5 stand auf SWE-Bench Verified bei 95,0 % (Stand vor der Abschaltung), 1M-Kontext, 10 $/50 $ pro 1M Input-/Output-Tokens. Jetzt nicht abrufbar.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini-Sunset</strong>: Gratis-, AI-Pro- und AI-Ultra-Zugang zu Gemini Code Assist + CLI endet am <strong>18. Juni</strong>. Migration: Antigravity CLI.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7 Code</strong> (12. Juni): 1T-Param-MoE, offene Gewichte (Modified MIT), 0,95 $/4,00 $ pro 1M Tokens. Bench-Zahlen bislang nur vom Hersteller. <span class=\"chip good\">try</span></li>\n      <li><span class=\"chip\">Bench</span> <strong>WebDev Arena</strong>: claude-opus-4-7-thinking führt (1567 Elo, Stand 24.05.); <strong>LiveCodeBench v6</strong>: Qwen3.7 Max vorn (~91,6 %, Stand 14.06.).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.172: verschachtelte Sub-Agenten bis 5 Ebenen tief, Plugin-Marketplace-Suche.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Skeptik-Reflex</strong>: Hersteller-Benchmarks bleiben Hersteller-Benchmarks — und ein 95-%-Spitzenmodell kann über Nacht regulatorisch verschwinden. Unabhängige Zahlen für Kimi K2.7 stehen noch aus.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Three days after launch, it's over: On June 12, the US government issued an export control directive prohibiting access to Claude Fable 5 and Mythos 5—and Anthropic immediately shut down both models <strong>for all customers</strong>. The model that hit the SWE-Bench summit at 95.0% on June 9 is gone as of Friday; Claude Code falls back to Opus 4.8. For you as a Foreign National in Brazil, this is especially relevant: the directive blocks access for every non-US citizen—you couldn't use Fable 5 anyway. Also on the radar: Google's Gemini CLI/Code-Assist sunset (deadline in four days) and Moonshot's open Kimi K2.7 Code.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 disabled</strong>: US export control directive (June 12). Anthropic shuts down both models for <strong>all</strong> customers; Anthropic cites a suspected jailbreak. Claude Code now runs on Opus 4.8 again.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Foreign-National lockout</strong>: The directive prohibits access for every non-US citizen, inside or outside the US—Daniel in Brazil falls under it. Other Anthropic models remain available.</li>\n      <li><span class=\"chip\">Claude</span> <strong>What was withdrawn</strong>: Fable 5 stood at 95.0% on SWE-Bench Verified (as of shutdown), 1M context, $10 / $50 per 1M input/output tokens. Now unavailable.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini sunset</strong>: Free, AI Pro, and AI Ultra access to Gemini Code Assist + CLI ends on <strong>June 18</strong>. Migration path: Antigravity CLI.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7 Code</strong> (June 12): 1T-param MoE, open weights (Modified MIT), $0.95 / $4.00 per 1M tokens. Benchmark figures so far vendor-reported. <span class=\"chip good\">try</span></li>\n      <li><span class=\"chip\">Bench</span> <strong>WebDev Arena</strong>: claude-opus-4-7-thinking leads (1567 Elo, snapshot 05-24); <strong>LiveCodeBench v6</strong>: Qwen3.7 Max out front (~91.6%, snapshot 06-14).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.172: nested sub-agents up to 5 levels deep, plugin marketplace search.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Skeptic reflex</strong>: Vendor benchmarks stay vendor benchmarks—and a 95%-leading model can vanish overnight on regulatory grounds. Independent figures for Kimi K2.7 are still pending.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Três dias após o lançamento, fim de papo: em 12 de junho, o governo dos EUA emitiu uma diretiva de controle de exportação proibindo acesso a Claude Fable 5 e Mythos 5 — e Anthropic imediatamente desativou ambos os modelos <strong>para todos os clientes</strong>. O modelo que atingiu o topo do SWE-Bench em 95,0% em 9 de junho se foi desde sexta; Claude Code recua para Opus 4.8. Para você como National Estrangeiro no Brasil, isto é especialmente relevante: a diretiva bloqueia acesso para todo cidadão não-americano — você não poderia usar Fable 5 de qualquer forma. Também em foco: o sunset do Gemini CLI/Code-Assist do Google (prazo em quatro dias) e o Kimi K2.7 Code aberto do Moonshot.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 desativados</strong>: diretiva de controle de exportação americano (12 de junho). Anthropic desativa ambos os modelos para <strong>todos</strong> os clientes; Anthropic cita suspeita de jailbreak. Claude Code agora roda em Opus 4.8 novamente.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Bloqueio para Nationals Estrangeiros</strong>: a diretiva proíbe acesso para todo cidadão não-americano, dentro ou fora dos EUA — Daniel no Brasil se enquadra nisso. Outros modelos Anthropic permanecem disponíveis.</li>\n      <li><span class=\"chip\">Claude</span> <strong>O que foi retirado</strong>: Fable 5 estava em 95,0% no SWE-Bench Verified (no momento do encerramento), contexto de 1M, $10 / $50 por 1M tokens de entrada/saída. Agora indisponível.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Sunset do Gemini</strong>: acesso gratuito, AI Pro e AI Ultra para Gemini Code Assist + CLI encerra em <strong>18 de junho</strong>. Caminho de migração: Antigravity CLI.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7 Code</strong> (12 de junho): MoE de 1T parâmetros, pesos abertos (MIT modificada), $0,95 / $4,00 por 1M tokens. Números de benchmark apenas do fornecedor por enquanto. <span class=\"chip good\">teste</span></li>\n      <li><span class=\"chip\">Bench</span> <strong>WebDev Arena</strong>: claude-opus-4-7-thinking lidera (1567 Elo, snapshot 24/05); <strong>LiveCodeBench v6</strong>: Qwen3.7 Max na frente (~91,6%, snapshot 14/06).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.172: sub-agentes aninhados até 5 níveis de profundidade, busca no marketplace de plugins.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Reflexo cético</strong>: benchmarks de fornecedor continuam sendo benchmarks de fornecedor — e um modelo liderando com 95% pode desaparecer da noite para o dia por motivos regulatórios. Números independentes para Kimi K2.7 ainda estão pendentes.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Tres días después del lanzamiento, se acabó: el 12 de junio, el gobierno estadounidense emitió una directiva de control de exportación prohibiendo acceso a Claude Fable 5 y Mythos 5 — y Anthropic inmediatamente desactivó ambos modelos <strong>para todos los clientes</strong>. El modelo que alcanzó la cumbre de SWE-Bench en 95.0% el 9 de junio se fue desde el viernes; Claude Code retrocede a Opus 4.8. Para ti como Nacional Extranjero en Brasil, esto es especialmente relevante: la directiva bloquea acceso para todo ciudadano no-estadounidense — no podrías usar Fable 5 de todas formas. También en el radar: el sunset de Gemini CLI/Code-Assist de Google (plazo en cuatro días) y el Kimi K2.7 Code abierto de Moonshot.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 + Mythos 5 desactivados</strong>: directiva de control de exportación estadounidense (12 de junio). Anthropic desactiva ambos modelos para <strong>todos</strong> los clientes; Anthropic cita sospecha de jailbreak. Claude Code ahora corre en Opus 4.8 nuevamente.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Bloqueo para Nacionales Extranjeros</strong>: la directiva prohíbe acceso para todo ciudadano no-estadounidense, dentro o fuera de EE.UU. — Daniel en Brasil se incluye. Otros modelos Anthropic permanecen disponibles.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Lo que se retiró</strong>: Fable 5 estaba en 95.0% en SWE-Bench Verified (al momento del cierre), contexto de 1M, $10 / $50 por 1M tokens de entrada/salida. Ahora no disponible.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Sunset de Gemini</strong>: acceso gratuito, AI Pro y AI Ultra a Gemini Code Assist + CLI termina el <strong>18 de junio</strong>. Ruta de migración: Antigravity CLI.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Kimi K2.7 Code</strong> (12 de junio): MoE de 1T parámetros, pesos abiertos (MIT Modificada), $0.95 / $4.00 por 1M tokens. Números de benchmark solo del proveedor por ahora. <span class=\"chip good\">prueba</span></li>\n      <li><span class=\"chip\">Bench</span> <strong>WebDev Arena</strong>: claude-opus-4-7-thinking lidera (1567 Elo, snapshot 24/05); <strong>LiveCodeBench v6</strong>: Qwen3.7 Max al frente (~91.6%, snapshot 14/06).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> v2.1.172: sub-agentes anidados hasta 5 niveles de profundidad, búsqueda en marketplace de plugins.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Escepticismo prudente</strong>: benchmarks de proveedor siguen siendo benchmarks de proveedor — y un modelo liderando con 95% puede desaparecer de la noche a la mañana por razones regulatorias. Números independientes para Kimi K2.7 aún están pendientes.</li>\n    </ul></div>"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der ruhige Sonntag täuscht: Das material Wichtigste der Woche ist eine Verschiebung, die noch keine ist. Brüssel hat sich auf den AI-Act-„Omnibus\" geeinigt — die harte Hochrisiko-Frist rutscht vom 2. August 2026 auf Ende 2027/2028. Nur: Rechtskraft bekommt das erst mit der Veröffentlichung im Amtsblatt, und die steht aus. Wer jetzt Compliance-Arbeit einstellt, plant auf einer Frist, die rechtlich noch nicht existiert — und die Transparenz-Pflichten aus Artikel 50 bleiben ohnehin auf dem 2. August 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>AI-Act-Omnibus geeinigt</strong>: Hochrisiko-Frist auf 2. Dez. 2027 (Standalone) / 2. Aug. 2028 (eingebettet) — <em>politisch beschlossen, rechtlich erst mit Amtsblatt-Publikation gültig</em>.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>Artikel 50 bleibt</strong>: Transparenz-Pflichten (KI muss sich als KI zu erkennen geben, Deepfakes kennzeichnen) gelten weiter ab 2. Aug. 2026 — nicht verschoben.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>78 %</strong> der Organisationen haben Stand April 2026 keine ernsthaften Compliance-Schritte unternommen.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Pilot-Friedhof</strong>: 86–89 % der Agenten-Pilotprojekte erreichen nie die Produktion; nur 13 % der Firmen haben adäquate KI-Governance.</li>\n      <li><span class=\"chip good\">Deploy · Travel</span> <strong>Virgin Voyages</strong>: 1.500+ AI-Agenten (von 50 im Okt. 2025, +2.900 %); Content-Produktionszeit −60 %, Insight-zu-Action −75 %.</li>\n      <li><span class=\"chip\">Deploy · B2B</span> <strong>SAP Business AI Platform</strong> (Sapphire, 19.–21. Mai): ein Stack aus BTP + Business Data Cloud + Business AI, 200+ Agenten, Claude integriert, EU-AI-Cloud mit Mistral/Cohere.</li>\n      <li><span class=\"chip\">Deploy · Data</span> <strong>Google Agentic Data Cloud</strong> (22. Apr.): Knowledge Catalog erdet Agenten über BigQuery, Snowflake, Databricks, SAP — BigQuery-Kosten −34 %.</li>\n      <li><span class=\"chip\">Policy · BR</span> <strong>Brasilien</strong>: PL 2338/2023 hängt in der Câmara, Bill 762/2026 will eine KI-Folgenabschätzung; Huawei-Cloud-MaaS in BR live, Dataprev fährt hybrid.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 Projekt-Ideen</strong>: AI-Act-Readiness für den Mittelstand & ein Pilot-zu-Produktion-Eval-Gate.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A quiet Sunday masks the week's biggest story: a postponement that isn't legally binding yet. Brussels has agreed on the AI Act \"Omnibus\" — the high-risk deadline shifts from August 2, 2026 to end of 2027/2028. But that only takes effect when published in the Official Journal, and that hasn't happened. Anyone halting compliance work is betting on a deadline that doesn't legally exist yet — and transparency obligations under Article 50 stay on August 2, 2026, regardless.</p>\n    <ul>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>AI Act Omnibus agreed</strong>: High-risk deadline to Dec. 2, 2027 (standalone) / Aug. 2, 2028 (embedded) — <em>politically decided, legally binding only upon Official Journal publication</em>.</li>\n      <li><span class=\"chip hot\">Reg · EU</span> <strong>Article 50 unchanged</strong>: Transparency obligations (AI must identify itself as AI, deepfakes must be marked) remain in force from Aug. 2, 2026 — not postponed.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>78 %</strong> of organizations took no serious compliance steps as of April 2026.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Pilot graveyard</strong>: 86–89 % of agent pilot projects never reach production; only 13 % of firms have adequate AI governance.</li>\n      <li><span class=\"chip good\">Deploy · Travel</span> <strong>Virgin Voyages</strong>: 1,500+ AI agents (from 50 in Oct. 2025, +2,900 %); content production time −60 %, insight-to-action −75 %.</li>\n      <li><span class=\"chip\">Deploy · B2B</span> <strong>SAP Business AI Platform</strong> (Sapphire, May 19–21): a stack of BTP + Business Data Cloud + Business AI, 200+ agents, Claude integrated, EU AI Cloud with Mistral/Cohere.</li>\n      <li><span class=\"chip\">Deploy · Data</span> <strong>Google Agentic Data Cloud</strong> (Apr. 22): Knowledge Catalog grounds agents over BigQuery, Snowflake, Databricks, SAP — BigQuery costs −34 %.</li>\n      <li><span class=\"chip\">Policy · BR</span> <strong>Brazil</strong>: PL 2338/2023 stalled in Câmara, Bill 762/2026 seeks AI impact assessment; Huawei Cloud MaaS live in BR, Dataprev running hybrid.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 project ideas</strong>: AI Act readiness for mid-market & a pilot-to-production eval gate.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O domingo tranquilo engana: o mais importante da semana é um adiamento que ainda não é um adiamento. Bruxelas acordou sobre o \"Omnibus\" da Lei de IA — o prazo rígido de alto risco sai de 2 de agosto de 2026 para fim de 2027/2028. Só que isso vira lei ao ser publicado no Diário Oficial, e isso ainda não aconteceu. Quem parar o trabalho de conformidade agora está apostando em um prazo que ainda não existe legalmente — e os deveres de transparência do Artigo 50 continuam vencendo em 2 de agosto de 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">Reg · UE</span> <strong>Omnibus da Lei de IA acordado</strong>: Prazo de alto risco para 2 de dez. de 2027 (Autônomo) / 2 de ago. de 2028 (incorporado) — <em>politicamente acordado, legalmente válido apenas após publicação no Diário Oficial</em>.</li>\n      <li><span class=\"chip hot\">Reg · UE</span> <strong>Artigo 50 permanece</strong>: Deveres de transparência (IA deve se identificar, deepfakes devem ser marcados) continuam vigentes a partir de 2 de ago. de 2026 — não adiados.</li>\n      <li><span class=\"chip\">Estudo · Global</span> <strong>78 %</strong> das organizações não realizaram passos sérios de conformidade até abril de 2026.</li>\n      <li><span class=\"chip\">Estudo · Global</span> <strong>Cemitério de pilotos</strong>: 86–89 % dos projetos piloto de agentes nunca chegam à produção; apenas 13 % das empresas têm governança de IA adequada.</li>\n      <li><span class=\"chip good\">Deploy · Viagem</span> <strong>Virgin Voyages</strong>: 1.500+ agentes de IA (de 50 em out. de 2025, +2.900 %); tempo de produção de conteúdo −60 %, insight-para-ação −75 %.</li>\n      <li><span class=\"chip\">Deploy · B2B</span> <strong>Plataforma SAP Business AI</strong> (Sapphire, 19–21 de maio): um pacote de BTP + Business Data Cloud + Business AI, 200+ agentes, Claude integrado, Nuvem de IA da UE com Mistral/Cohere.</li>\n      <li><span class=\"chip\">Deploy · Dados</span> <strong>Google Agentic Data Cloud</strong> (22 de abr.): Catálogo de Conhecimento ancora agentes sobre BigQuery, Snowflake, Databricks, SAP — custos do BigQuery −34 %.</li>\n      <li><span class=\"chip\">Política · BR</span> <strong>Brasil</strong>: PL 2338/2023 parada na Câmara, Bill 762/2026 quer uma avaliação de impacto de IA; Huawei Cloud MaaS ativa no BR, Dataprev funciona em híbrido.</li>\n      <li><span class=\"chip\">Ideia · twiceD</span> <strong>2 ideias de projetos</strong>: Preparação para Lei de IA para o mercado médio & um portão de avaliação de piloto para produção.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El domingo tranquilo engaña: lo más importante de la semana es una prórroga que aún no es una prórroga. Bruselas acordó sobre el \"Omnibus\" de la Ley de IA — el plazo duro de alto riesgo se mueve del 2 de agosto de 2026 a fin de 2027/2028. Solo que eso se convierte en ley al publicarse en el Diario Oficial, y eso aún no ha sucedido. Quien detenga el trabajo de cumplimiento ahora está apostando a un plazo que legalmente aún no existe — y los deberes de transparencia del Artículo 50 siguen venciendo el 2 de agosto de 2026.</p>\n    <ul>\n      <li><span class=\"chip hot\">Reg · UE</span> <strong>Omnibus de Ley de IA acordado</strong>: Plazo de alto riesgo al 2 de dic. de 2027 (Independiente) / 2 de ago. de 2028 (incorporado) — <em>políticamente acordado, legalmente válido solo tras publicación en Diario Oficial</em>.</li>\n      <li><span class=\"chip hot\">Reg · UE</span> <strong>Artículo 50 se mantiene</strong>: Deberes de transparencia (IA debe identificarse, deepfakes deben etiquetarse) siguen vigentes a partir del 2 de ago. de 2026 — no prorrogados.</li>\n      <li><span class=\"chip\">Estudio · Global</span> <strong>78 %</strong> de las organizaciones no han tomado medidas serias de cumplimiento hasta abril de 2026.</li>\n      <li><span class=\"chip\">Estudio · Global</span> <strong>Cementerio de pilotos</strong>: 86–89 % de proyectos piloto de agentes nunca llegan a producción; solo 13 % de las empresas tienen gobernanza de IA adecuada.</li>\n      <li><span class=\"chip good\">Deploy · Viajes</span> <strong>Virgin Voyages</strong>: 1.500+ agentes de IA (de 50 en oct. de 2025, +2.900 %); tiempo de producción de contenido −60 %, insight-a-acción −75 %.</li>\n      <li><span class=\"chip\">Deploy · B2B</span> <strong>Plataforma SAP Business AI</strong> (Sapphire, 19–21 de mayo): paquete de BTP + Business Data Cloud + Business AI, 200+ agentes, Claude integrado, Nube de IA de la UE con Mistral/Cohere.</li>\n      <li><span class=\"chip\">Deploy · Datos</span> <strong>Google Agentic Data Cloud</strong> (22 de abr.): Catálogo de Conocimiento ancla agentes sobre BigQuery, Snowflake, Databricks, SAP — costos de BigQuery −34 %.</li>\n      <li><span class=\"chip\">Política · BR</span> <strong>Brasil</strong>: PL 2338/2023 estancada en Cámara, Bill 762/2026 quiere evaluación de impacto de IA; Huawei Cloud MaaS activa en BR, Dataprev funciona híbrida.</li>\n      <li><span class=\"chip\">Idea · twiceD</span> <strong>2 ideas de proyectos</strong>: Preparación para Ley de IA para mercado medio & puerta de evaluación de piloto a producción.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der deutsche Freelance-Markt schrumpft messbar zum ersten Mal — und genau in dieser Schwäche zieht eine zweite Linie durch das Board: Wer AI in den Java-Stack integriert, sitzt im Premium-Band, der Rest im umkämpften Mittelfeld. 143 Listings heute, fast alle voll remote-tauglich für die BR-Zeitzone.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>103 €/h Durchschnitt</strong>: erste Stundensatz-Senkung seit Start des Freelancer-Kompass 2016 — von ~104 €/h. IT/Software liegt mit 95 €/h im Schnitt darunter.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>43 % der IT-Freelancer</strong> ohne gesicherte Projektauslastung; 67 % der Unternehmen kürzen Contractor-Budgets. Erholung „frühestens Ende 2026\".</li>\n      <li><span class=\"chip good\">AI-Integration</span> <strong>+530 %</strong> AI-Projektausschreibungen seit 2023. AI-Stack-Rollen 100–135 €/h vs. 90–115 €/h Standard-Java — das Premium ist der Hebel.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI-Engineer Java + GenAI/RAG/Kiro, Frankfurt 80 % remote, 110–135 €/h, 24 Monate. Top-Freelance-Fit heute.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nürnberg 90 % remote, 95–110 €/h, 6+ Monate.</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — bestes Employee-Offer im Filter. Personio AI-Team (86) daneben.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + KI, 100 % remote, Hamburg, 110–135 €/h — Nischen-Premium mit Daniels OEM-Referenzen.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Smart-Energy/IoT-Cluster</strong>: VARIUS Smart Metering (84), Amoria Bond IoT (78), A3Watt Cloud&amp;IoT (75) — alle remote, 100–125 €/h.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains-Cluster</strong>: 6 AI-nahe Rollen (IntelliJ/PyCharm/CLion AI, FDE), alle Remote-DE-fähig — der größte Intriguing-Block heute.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive −32 %</strong>: der am härtesten getroffene Sektor — Daniels OEM-Referenzen bleiben dort aber ein Differenzierer.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der deutsche Freelance-Markt schrumpft messbar zum ersten Mal — und genau in dieser Schwäche zieht eine zweite Linie durch das Board: Wer AI in den Java-Stack integriert, sitzt im Premium-Band, der Rest im umkämpften Mittelfeld. 143 Listings heute, fast alle voll remote-tauglich für die BR-Zeitzone.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>103 €/h Durchschnitt</strong>: erste Stundensatz-Senkung seit Start des Freelancer-Kompass 2016 — von ~104 €/h. IT/Software liegt mit 95 €/h im Schnitt darunter.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>43 % der IT-Freelancer</strong> ohne gesicherte Projektauslastung; 67 % der Unternehmen kürzen Contractor-Budgets. Erholung „frühestens Ende 2026\".</li>\n      <li><span class=\"chip good\">AI-Integration</span> <strong>+530 %</strong> AI-Projektausschreibungen seit 2023. AI-Stack-Rollen 100–135 €/h vs. 90–115 €/h Standard-Java — das Premium ist der Hebel.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI-Engineer Java + GenAI/RAG/Kiro, Frankfurt 80 % remote, 110–135 €/h, 24 Monate. Top-Freelance-Fit heute.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nürnberg 90 % remote, 95–110 €/h, 6+ Monate.</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — bestes Employee-Offer im Filter. Personio AI-Team (86) daneben.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + KI, 100 % remote, Hamburg, 110–135 €/h — Nischen-Premium mit Daniels OEM-Referenzen.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Smart-Energy/IoT-Cluster</strong>: VARIUS Smart Metering (84), Amoria Bond IoT (78), A3Watt Cloud&amp;IoT (75) — alle remote, 100–125 €/h.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains-Cluster</strong>: 6 AI-nahe Rollen (IntelliJ/PyCharm/CLion AI, FDE), alle Remote-DE-fähig — der größte Intriguing-Block heute.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive −32 %</strong>: der am härtesten getroffene Sektor — Daniels OEM-Referenzen bleiben dort aber ein Differenzierer.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The German freelance market is measurably contracting for the first time — and right in that weakness, a second line cuts through the board: developers who integrate AI into the Java stack sit in the premium band; everyone else is in a crowded middle field. 143 listings today, nearly all fully remote-compatible for the BR time zone.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>€103/h average</strong>: first hourly-rate drop since the Freelancer-Kompass launched in 2016 — down from ~€104/h. IT/Software averages €95/h, pulled down by junior and mid profiles.</li>\n      <li><span class=\"chip hot\">Market</span> <strong>43% of IT freelancers</strong> without secured project capacity; 67% of companies cutting contractor budgets. Recovery \"at the earliest by end of 2026.\"</li>\n      <li><span class=\"chip good\">AI Integration</span> <strong>+530%</strong> AI project postings since 2023. AI-stack roles at €100–135/h vs. €90–115/h for standard Java — the premium is the leverage.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Engineer Java + GenAI/RAG/Kiro, Frankfurt 80% remote, €110–135/h, 24 months. Top freelance fit today.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nuremberg 90% remote, €95–110/h, 6+ months.</li>\n      <li><span class=\"chip good\">Employee</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, €110–150k — best employee offer in the filter. Personio AI Team (86) alongside.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + AI, 100% remote, Hamburg, €110–135/h — niche premium with Daniel's OEM references.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Smart-Energy/IoT cluster</strong>: VARIUS Smart Metering (84), Amoria Bond IoT (78), A3Watt Cloud&amp;IoT (75) — all remote, €100–125/h.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains cluster</strong>: 6 AI-adjacent roles (IntelliJ/PyCharm/CLion AI, FDE), all Remote-DE-compatible — the largest Intriguing block today.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive −32%</strong>: the hardest-hit sector — Daniel's OEM references remain a differentiator there.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O mercado freelance alemão encolhe de forma mensurável pela primeira vez — e exatamente nessa fraqueza surge uma segunda linha no board: quem integra IA ao stack Java está na faixa premium; o restante compete num campo intermediário saturado. 143 vagas hoje, quase todas totalmente compatíveis com o fuso horário do Brasil.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Média de 103 €/h</strong>: primeira queda de taxa horária desde o lançamento do Freelancer-Kompass em 2016 — de ~104 €/h. TI/Software fica em 95 €/h na média.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>43% dos freelancers de TI</strong> sem capacidade de projeto garantida; 67% das empresas cortando orçamentos de contratados. Recuperação \"no mínimo para o final de 2026\".</li>\n      <li><span class=\"chip good\">Integração IA</span> <strong>+530%</strong> em projetos de IA desde 2023. Vagas com stack de IA pagam 100–135 €/h vs. 90–115 €/h para Java padrão — o prêmio é a alavanca.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Engineer Java + GenAI/RAG/Kiro, Frankfurt 80% remoto, 110–135 €/h, 24 meses. Melhor encaixe freelance hoje.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Nuremberg 90% remoto, 95–110 €/h, 6+ meses.</li>\n      <li><span class=\"chip good\">CLT/Efetivo</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — melhor oferta efetiva no filtro. Personio AI Team (86) ao lado.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + IA, 100% remoto, Hamburgo, 110–135 €/h — prêmio de nicho com as referências OEM de Daniel.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Cluster Smart-Energy/IoT</strong>: VARIUS Smart Metering (84), Amoria Bond IoT (78), A3Watt Cloud&amp;IoT (75) — todos remotos, 100–125 €/h.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Cluster JetBrains</strong>: 6 vagas próximas à IA (IntelliJ/PyCharm/CLion AI, FDE), todas compatíveis com remoto-DE — maior bloco Intriguing hoje.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive −32%</strong>: setor mais afetado — as referências OEM de Daniel continuam sendo um diferencial lá.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El mercado freelance alemán se contrae de forma medible por primera vez — y justo en esa debilidad aparece una segunda línea en el board: quien integra IA en el stack Java está en la banda premium; el resto compite en un campo intermedio saturado. 143 vacantes hoy, casi todas totalmente compatibles con la zona horaria de Brasil.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Promedio de 103 €/h</strong>: primera caída de tarifa horaria desde el lanzamiento del Freelancer-Kompass en 2016 — de ~104 €/h. TI/Software promedia 95 €/h.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>43% de los freelancers de TI</strong> sin capacidad de proyecto garantizada; 67% de las empresas recortando presupuestos de contratistas. Recuperación \"como mínimo a finales de 2026\".</li>\n      <li><span class=\"chip good\">Integración IA</span> <strong>+530%</strong> en proyectos de IA desde 2023. Roles con stack de IA pagan 100–135 €/h vs. 90–115 €/h para Java estándar — la prima es la palanca.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>KMG Advisory (87)</strong>: Fullstack/AI Engineer Java + GenAI/RAG/Kiro, Frankfurt 80% remoto, 110–135 €/h, 24 meses. Mejor encaje freelance hoy.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>infoteam (87)</strong>: Java 17/21 + Angular 17 + Kafka + K8s, Núremberg 90% remoto, 95–110 €/h, 6+ meses.</li>\n      <li><span class=\"chip good\">Empleado</span> <strong>Aleph Alpha (88)</strong>: Senior SWE Java Industrial, Heidelberg, 110–150 k€ — mejor oferta de empleo en el filtro. Personio AI Team (86) junto a ella.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (85)</strong>: Java/Spring + Automotive + IA, 100% remoto, Hamburgo, 110–135 €/h — prima de nicho con las referencias OEM de Daniel.</li>\n      <li><span class=\"chip\">IoT</span> <strong>Cluster Smart-Energy/IoT</strong>: VARIUS Smart Metering (84), Amoria Bond IoT (78), A3Watt Cloud&amp;IoT (75) — todos remotos, 100–125 €/h.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Cluster JetBrains</strong>: 6 roles cercanos a la IA (IntelliJ/PyCharm/CLion AI, FDE), todos compatibles con remoto-DE — el bloque Intriguing más grande hoy.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Automotive −32%</strong>: el sector más golpeado — las referencias OEM de Daniel siguen siendo un diferenciador ahí.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sonntag, 14. Juni — der Tag, auf den deutsche Fans seit Monaten warten. Um <strong>19:00 MESZ / 14:00 BRT</strong> bestreitet die DFB-Elf im NRG Stadium in Houston ihr erstes Gruppenspiel bei der WM 2026 gegen WM-Debütant Curaçao. Bei Redaktionsschluss war noch nicht angepfiffen — keine erfundenen Tore hier, sondern der ehrliche Blick auf den Anpfiff. Brasilien hat seinen Auftakt schon hinter sich und ließ Federn.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland – Curaçao heute</strong>: WM-Auftakt 19:00 MESZ / 14:00 BRT, NRG Stadium Houston. Gruppe E. Ergebnis bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 1:1 Marokko</strong>: Vinícius Jr. (32') gleicht aus, Saibari (21') hatte getroffen. Holpriger Seleção-Auftakt.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Curaçao = WM-Premiere</strong>: kleinste Nation (≈ 156.000 Einwohner), die je ein WM-Endrunden-Spiel bestreitet. Außenseiter, aber kein Selbstläufer.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Gruppe C wackelt</strong>: Schottland führt mit 3 Punkten nach 1:0 gegen Haiti — Brasiliens erstes Auftakt-Remis seit Jahren.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Gruppe-E-Nachtspiel</strong>: Elfenbeinküste – Ecuador heute 01:00 MESZ / 20:00 BRT (Philadelphia) — der direkte Deutschland-Gegner-Check.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>SC Freiburg rüstet auf</strong>: Rekord-Torwart Backhaus (12 Mio. €), Stürmer Goto (10 Mio. €) — netto −3,2 Mio. €, Röhl für 25 Mio. € weg und sofort zurück geliehen.</li>\n      <li><span class=\"chip\">WM</span> <strong>Weitere Auftakte</strong>: USA 4:1 Paraguay, Australien 2:0 Türkei, Mexiko & Südkorea siegen je 2:0/2:1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschlands Fahrplan</strong>: nach Curaçao folgt Elfenbeinküste (20.06.) und Ecuador (25.06.) — beides 22:00 MESZ / 17:00 BRT.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Sonntag, 14. Juni — der Tag, auf den deutsche Fans seit Monaten warten. Um <strong>19:00 MESZ / 14:00 BRT</strong> bestreitet die DFB-Elf im NRG Stadium in Houston ihr erstes Gruppenspiel bei der WM 2026 gegen WM-Debütant Curaçao. Bei Redaktionsschluss war noch nicht angepfiffen — keine erfundenen Tore hier, sondern der ehrliche Blick auf den Anpfiff. Brasilien hat seinen Auftakt schon hinter sich und ließ Federn.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland – Curaçao heute</strong>: WM-Auftakt 19:00 MESZ / 14:00 BRT, NRG Stadium Houston. Gruppe E. Ergebnis bei Redaktionsschluss offen.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 1:1 Marokko</strong>: Vinícius Jr. (32') gleicht aus, Saibari (21') hatte getroffen. Holpriger Seleção-Auftakt.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Curaçao = WM-Premiere</strong>: kleinste Nation (≈ 156.000 Einwohner), die je ein WM-Endrunden-Spiel bestreitet. Außenseiter, aber kein Selbstläufer.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Gruppe C wackelt</strong>: Schottland führt mit 3 Punkten nach 1:0 gegen Haiti — Brasiliens erstes Auftakt-Remis seit Jahren.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Gruppe-E-Nachtspiel</strong>: Elfenbeinküste – Ecuador heute 01:00 MESZ / 20:00 BRT (Philadelphia) — der direkte Deutschland-Gegner-Check.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>SC Freiburg rüstet auf</strong>: Rekord-Torwart Backhaus (12 Mio. €), Stürmer Goto (10 Mio. €) — netto −3,2 Mio. €, Röhl für 25 Mio. € weg und sofort zurück geliehen.</li>\n      <li><span class=\"chip\">WM</span> <strong>Weitere Auftakte</strong>: USA 4:1 Paraguay, Australien 2:0 Türkei, Mexiko & Südkorea siegen je 2:0/2:1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Deutschlands Fahrplan</strong>: nach Curaçao folgt Elfenbeinküste (20.06.) und Ecuador (25.06.) — beides 22:00 MESZ / 17:00 BRT.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Sunday, June 14 — the day German fans have been waiting for since spring. At <strong>19:00 MESZ / 14:00 BRT</strong>, the DFB side takes the field at NRG Stadium in Houston for its opening match of the 2026 World Cup against World Cup debutant Curaçao. At deadline, kickoff hadn't yet happened — no invented goals here, just an honest look at the moment before the whistle. Brazil has already played its opener and stumbled.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany – Curaçao today</strong>: World Cup opener 19:00 MESZ / 14:00 BRT, NRG Stadium Houston. Group E. Result still open at deadline.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil 1:1 Morocco</strong>: Vinícius Jr. (32') equalized; Saibari (21') had put Morocco ahead. Bumpy start for the Seleção.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Curaçao = World Cup debut</strong>: smallest nation (≈ 156,000 inhabitants) ever to play a World Cup finals match. Underdog, but no pushover.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Group C wobbles</strong>: Scotland leads with 3 points after 1:0 over Haiti — Brazil's first opening-day draw in years.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Group E late match</strong>: Côte d'Ivoire – Ecuador today 01:00 MESZ / 20:00 BRT (Philadelphia) — the direct check on Germany's rivals.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>SC Freiburg loads up</strong>: Record goalkeeper Backhaus (12 million €), striker Goto (10 million €) — net −3.2 million €; Röhl leaves for 25 million € but returns on loan immediately.</li>\n      <li><span class=\"chip\">WM</span> <strong>Other openings</strong>: USA 4:1 Paraguay, Australia 2:0 Turkey, Mexico & South Korea each win 2:0 / 2:1.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Germany's path</strong>: after Curaçao comes Côte d'Ivoire (20.06.) and Ecuador (25.06.) — both 22:00 MESZ / 17:00 BRT.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo, 14 de junho — o dia que torcedores alemães esperavam desde meses atrás. Às <strong>19:00 MESZ / 14:00 BRT</strong>, a seleção alemã enfrenta Curaçao no estádio NRG em Houston pelo primeiro jogo da Copa do Mundo 2026, em seu grupo. Curaçao é estreante em Copas. No fechamento desta edição, o jogo ainda não havia começado — sem gols inventados aqui, apenas a visão honesta antes do apito inicial. Brasil já completou sua estreia e vacilou.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha – Curaçao hoje</strong>: estreia na Copa 19:00 MESZ / 14:00 BRT, estádio NRG em Houston. Grupo E. Resultado em aberto no fechamento.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marrocos</strong>: Vinícius Jr. (32') empata; Saibari (21') tinha aberto o placar. Estreia irregular para a Seleção.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Curaçao = primeira Copa</strong>: menor nação (≈ 156 mil habitantes) a jogar uma partida de final de Copa do Mundo. Azarão, mas não inofensivo.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Grupo C balança</strong>: Escócia lidera com 3 pontos após 1:0 contra Haiti — primeiro empate de estreia do Brasil em anos.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Jogo noturno do Grupo E</strong>: Costa do Marfim – Equador hoje 01:00 MESZ / 20:00 BRT (Filadélfia) — o confronto direto dos rivais da Alemanha.</li>\n      <li><span class=\"chip good\">Transferência</span> <strong>SC Freiburg se reforça</strong>: goleiro recorde Backhaus (12 mi. €), atacante Goto (10 mi. €) — saldo −3,2 mi. €; Röhl sai por 25 mi. € e volta emprestado na hora.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Outras estreias</strong>: EUA 4:1 Paraguai, Austrália 2:0 Turquia, México e Coreia do Sul vencem 2:0/2:1 cada.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Caminho da Alemanha</strong>: depois de Curaçao vem Costa do Marfim (20.06.) e Equador (25.06.) — ambos 22:00 MESZ / 17:00 BRT.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo, 14 de junio — el día que aficionados alemanes esperaban desde hace meses. A las <strong>19:00 MESZ / 14:00 BRT</strong>, la selección alemana juega en el estadio NRG en Houston su primer partido de la Copa del Mundo 2026 contra Curaçao, debutante en Mundiales. En el cierre de esta edición, el partido aún no había empezado — sin goles inventados aquí, solo la vista honesta antes del silbatazo inicial. Brasil ya completó su estreia y tropezó.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania – Curaçao hoy</strong>: debut en el Mundial 19:00 MESZ / 14:00 BRT, estadio NRG en Houston. Grupo E. Resultado abierto al cierre.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marruecos</strong>: Vinícius Jr. (32') empató; Saibari (21') había abierto. Debut irregular para la Selecao.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Curaçao = primera Copa</strong>: nación más pequeña (≈ 156 mil habitantes) en jugar un partido de final de Copa del Mundo. Equipo de baraja baja, pero sin ser inofensivo.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Grupo C tambalea</strong>: Escocia lidera con 3 puntos tras 1:0 ante Haití — primer empate de debut de Brasil en años.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Partido nocturno Grupo E</strong>: Costa de Marfil – Ecuador hoy 01:00 MESZ / 20:00 BRT (Filadelfia) — el enfrentamiento directo de rivales de Alemania.</li>\n      <li><span class=\"chip good\">Traspaso</span> <strong>SC Freiburg se refuerza</strong>: arquero récord Backhaus (12 mln. €), delantero Goto (10 mln. €) — saldo −3,2 mln. €; Röhl se va por 25 mln. € y vuelve cedido de inmediato.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Otros debuts</strong>: EE.UU. 4:1 Paraguay, Australia 2:0 Turquía, México y Corea del Sur ganan 2:0/2:1 cada uno.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Camino de Alemania</strong>: tras Curaçao vienen Costa de Marfil (20.06.) y Ecuador (25.06.) — ambos 22:00 MESZ / 17:00 BRT.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute um 10:00 BRT rollt in Barcelona das siebte Saisonrennen der neuen 2026er-Formel-1 los — und ausnahmsweise startet nicht der WM-Spitzenreiter von ganz vorne. George Russell hat sich die Pole geschnappt, sein Teamkollege Kimi Antonelli (der die WM mit fünf Siegen aus sechs Rennen anführt) muss von Startplatz drei aufholen. Das Rennergebnis stand bei Redaktionsschluss noch nicht fest; unten findest du die verifizierte Startaufstellung und die Session-Zeiten, kein erfundenes Resultat. Dazu: Marc Márquez hat in Ungarn seinen 100. Sieg geholt — und trotzdem führt ein anderer die MotoGP-WM an.</p>\n    <ul>\n      <li><span class=\"chip hot\">HEUTE</span> <strong>F1 Spanien-GP (Lauf 7/24), Barcelona-Catalunya</strong>: Rennstart 15:00 MESZ / 10:00 BRT. Russell auf Pole, Hamilton P2, Antonelli P3, Leclerc nach Q3-Crash nur P10.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt klar</strong>: 156 Punkte vor Hamilton (90) und Russell (88) — Stand vor Barcelona, fünf Siege in sechs Rennen.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Márquez' 100. Sieg</strong>: Gewann am 7. Juni in Ungarn (Balaton Park), zog mit dem Erfolg in der WM auf Rang fünf vor.</li>\n      <li><span class=\"chip\">MOTOGP-WM</span> <strong>Bezzecchi führt mit 180 Punkten</strong> (Aprilia) — verlor in Ungarn aber 30 Zähler auf Márquez, als ihn Teamkollege Martín in der von Martín verschuldeten Turn-1-Karambolage abräumte.</li>\n      <li><span class=\"chip good\">REGELN 2026</span> <strong>Mercedes dominiert das Reset-Jahr</strong>: neue Chassis + Power Units, neue Teams Audi & Cadillac am Tabellenende.</li>\n      <li><span class=\"chip\">NÄCHSTE</span> <strong>MotoGP Brno 19.–21.06.</strong>, danach F1 Österreich-GP am 28.06. am Red Bull Ring.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute um 10:00 BRT rollt in Barcelona das siebte Saisonrennen der neuen 2026er-Formel-1 los — und ausnahmsweise startet nicht der WM-Spitzenreiter von ganz vorne. George Russell hat sich die Pole geschnappt, sein Teamkollege Kimi Antonelli (der die WM mit fünf Siegen aus sechs Rennen anführt) muss von Startplatz drei aufholen. Das Rennergebnis stand bei Redaktionsschluss noch nicht fest; unten findest du die verifizierte Startaufstellung und die Session-Zeiten, kein erfundenes Resultat. Dazu: Marc Márquez hat in Ungarn seinen 100. Sieg geholt — und trotzdem führt ein anderer die MotoGP-WM an.</p>\n    <ul>\n      <li><span class=\"chip hot\">HEUTE</span> <strong>F1 Spanien-GP (Lauf 7/24), Barcelona-Catalunya</strong>: Rennstart 15:00 MESZ / 10:00 BRT. Russell auf Pole, Hamilton P2, Antonelli P3, Leclerc nach Q3-Crash nur P10.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt klar</strong>: 156 Punkte vor Hamilton (90) und Russell (88) — Stand vor Barcelona, fünf Siege in sechs Rennen.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Márquez' 100. Sieg</strong>: Gewann am 7. Juni in Ungarn (Balaton Park), zog mit dem Erfolg in der WM auf Rang fünf vor.</li>\n      <li><span class=\"chip\">MOTOGP-WM</span> <strong>Bezzecchi führt mit 180 Punkten</strong> (Aprilia) — verlor in Ungarn aber 30 Zähler auf Márquez, als ihn Teamkollege Martín in der von Martín verschuldeten Turn-1-Karambolage abräumte.</li>\n      <li><span class=\"chip good\">REGELN 2026</span> <strong>Mercedes dominiert das Reset-Jahr</strong>: neue Chassis + Power Units, neue Teams Audi & Cadillac am Tabellenende.</li>\n      <li><span class=\"chip\">NÄCHSTE</span> <strong>MotoGP Brno 19.–21.06.</strong>, danach F1 Österreich-GP am 28.06. am Red Bull Ring.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today at 10:00 BRT, the seventh race of the new 2026 Formula 1 season kicks off in Barcelona — and for once, it's not the championship leader starting from pole position. George Russell grabbed pole, while his teammate Kimi Antonelli (who leads the championship with five wins from six races) must make up ground from third on the grid. The race result was not available at press time; below you'll find the verified starting grid and session times, not a fabricated result. Meanwhile: Marc Márquez scored his 100th win in Hungary — yet someone else leads the MotoGP championship.</p>\n    <ul>\n      <li><span class=\"chip hot\">TODAY</span> <strong>F1 Spanish Grand Prix (race 7/24), Barcelona-Catalunya</strong>: Race start 15:00 CEST / 10:00 BRT. Russell on pole, Hamilton P2, Antonelli P3, Leclerc only P10 after Q3 crash.</li>\n      <li><span class=\"chip\">F1 CHAMPIONSHIP</span> <strong>Antonelli leads decisively</strong>: 156 points ahead of Hamilton (90) and Russell (88) — standing before Barcelona, five wins in six races.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>Márquez' 100th win</strong>: Took the victory on June 7 in Hungary (Balaton Park), climbing to fifth in the championship standings with that win.</li>\n      <li><span class=\"chip\">MOTOGP CHAMPIONSHIP</span> <strong>Bezzecchi leads with 180 points</strong> (Aprilia) — but lost 30 points to Márquez in Hungary when his Aprilia teammate Martín took him out in a turn-1 pileup caused by Martín.</li>\n      <li><span class=\"chip good\">2026 RULES</span> <strong>Mercedes dominates the reset year</strong>: new chassis + power units, new teams Audi & Cadillac at the bottom of the standings.</li>\n      <li><span class=\"chip\">NEXT UP</span> <strong>MotoGP Brno June 19–21</strong>, then F1 Austrian GP on June 28 at Red Bull Ring.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje às 10:00 BRT, a sétima corrida da nova temporada 2026 de Fórmula 1 sai da garagem em Barcelona — e, excepcionalmente, não é o líder do campeonato que larga da primeira fila. George Russell conquistou a pole position, enquanto seu companheiro de equipe Kimi Antonelli (que lidera o campeonato com cinco vitórias em seis corridas) terá que reagir da terceira posição. No fechamento da edição, o resultado da corrida ainda não havia sido publicado; abaixo você encontra o grid de largada verificado e os tempos das sessões, sem resultado inventado. Além disso: Marc Márquez conquistou sua 100ª vitória na Hungria — e mesmo assim outro piloto lidera o campeonato de MotoGP.</p>\n    <ul>\n      <li><span class=\"chip hot\">HOJE</span> <strong>F1 Grande Prêmio da Espanha (corrida 7/24), Barcelona-Catalunya</strong>: Largada 15:00 CEST / 10:00 BRT. Russell na pole, Hamilton P2, Antonelli P3, Leclerc após acidente no Q3 apenas P10.</li>\n      <li><span class=\"chip\">F1-CAMPEONATO</span> <strong>Antonelli lidera com folga</strong>: 156 pontos à frente de Hamilton (90) e Russell (88) — classificação antes de Barcelona, cinco vitórias em seis corridas.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>100ª vitória de Márquez</strong>: Venceu no dia 7 de junho na Hungria (Balaton Park), subindo para o quinto lugar no campeonato com esse triunfo.</li>\n      <li><span class=\"chip\">MOTOGP-CAMPEONATO</span> <strong>Bezzecchi lidera com 180 pontos</strong> (Aprilia) — mas perdeu 30 pontos para Márquez na Hungria quando seu companheiro de equipe Martín o atingiu em uma colisão na primeira curva causada por Martín.</li>\n      <li><span class=\"chip good\">REGULAMENTO 2026</span> <strong>Mercedes domina o ano de reset</strong>: novo chassis + power units, novas equipes Audi & Cadillac no fundo da classificação.</li>\n      <li><span class=\"chip\">PRÓXIMO</span> <strong>MotoGP Brno 19.–21.06.</strong>, depois F1 Grande Prêmio da Áustria em 28.06. no Red Bull Ring.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy a las 10:00 BRT, la séptima carrera de la nueva temporada 2026 de Fórmula 1 sale de pits en Barcelona — y, excecionalmente, no es el líder del campeonato quien parte de la primera fila. George Russell se llevó la pole position, mientras que su compañero de equipo Kimi Antonelli (quien lidera el campeonato con cinco victorias en seis carreras) tendrá que remontar desde la tercera posición. Al cierre de edición, el resultado de la carrera aún no se había publicado; abajo encontrarás la parrilla de salida verificada y los tiempos de las sesiones, sin resultado inventado. Además: Marc Márquez logró su 100ª victoria en Hungría — y aun así otro piloto lidera el campeonato de MotoGP.</p>\n    <ul>\n      <li><span class=\"chip hot\">HOY</span> <strong>F1 Gran Premio de España (carrera 7/24), Barcelona-Catalunya</strong>: Salida 15:00 CEST / 10:00 BRT. Russell en la pole, Hamilton P2, Antonelli P3, Leclerc tras accidente en Q3 apenas P10.</li>\n      <li><span class=\"chip\">F1-CAMPEONATO</span> <strong>Antonelli lidera con ventaja</strong>: 156 puntos sobre Hamilton (90) y Russell (88) — posición antes de Barcelona, cinco victorias en seis carreras.</li>\n      <li><span class=\"chip\">MOTOGP</span> <strong>100ª victoria de Márquez</strong>: Ganó el 7 de junio en Hungría (Balaton Park), ascendiendo al quinto lugar en el campeonato con esa victoria.</li>\n      <li><span class=\"chip\">MOTOGP-CAMPEONATO</span> <strong>Bezzecchi lidera con 180 puntos</strong> (Aprilia) — pero perdió 30 puntos con Márquez en Hungría cuando su compañero de equipo Martín lo golpeó en una colisión en la primera curva causada por Martín.</li>\n      <li><span class=\"chip good\">REGLAMENTO 2026</span> <strong>Mercedes domina el año de reset</strong>: nuevos chasis + power units, nuevos equipos Audi & Cadillac al fondo de la tabla.</li>\n      <li><span class=\"chip\">PRÓXIMO</span> <strong>MotoGP Brno 19.–21.06.</strong>, luego F1 Gran Premio de Austria el 28.06. en Red Bull Ring.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Regen-Sonntag, kühl und nass — ein guter Tag, drinnen zu bleiben. Das passt diesmal sogar zur Gesundheitslage: Brasilien steckt mitten in der Winter-Welle von Atemwegsinfekten, das RSV-Virus treibt sie an, und Paraná zählt zu den Bundesstaaten mit steigender Tendenz. Mit einem vier Wochen alten Baby im Haus ist das diese Woche das wichtigste Thema — alles Weitere ist Vorfreude: Festa-Junina-Saison im Anflug, FesCafé Anfang Juli vor der Haustür.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-/SRAG-Welle</strong>: schwere Atemwegsinfekte steigen brasilienweit, VSR (RSV) ist Haupttreiber, Säuglinge unter 2 Jahren sind die Hochrisiko-Gruppe — Paraná in steigender Tendenz (InfoGripe SE 19/2026).</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Nass &amp; kühl</strong>: heute 18–22 °C, 95 % Regen; Montag genauso. Trockenes Fenster <strong>Mi–Do</strong> (15–23 °C, 0 % Regen) — der Moment für draußen.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue eingebrochen</strong>: Paraná 2026 nur 2.028 Fälle gegen 52.193 im Vorjahres-Zeitraum — minus 96,1 % (SE 1–14/2026). Eine seltene gute Nachricht.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina läuft an</strong>: ab 19. Juni Pfarr-Festas im Londrina-Ring (sechs+ Termine bis 12. Juli) — Quentão, Tanz, Pão de Queijo, Quadrilha.</li>\n      <li><span class=\"chip\">Event</span> <strong>Heute letzter Tag</strong>: Festa Junina Ibiporã, Praça Pio XII (6.–14. Juni) — bei dem Regen aber eher Glückssache.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>FesCafé vor der Tür</strong>: 28ª FesCafé Ribeirão Claro 2.–5. Juli, mit Kinder-Show „Sonhos e Magia\" am Sonntag, 5. Juli — Haus-Anker für die ganze Familie.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien</strong>: staatliche Schulen Paraná 13.–24. Juli — Planungs-Fenster für einen größeren Ausflug.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Regen-Sonntag, kühl und nass — ein guter Tag, drinnen zu bleiben. Das passt diesmal sogar zur Gesundheitslage: Brasilien steckt mitten in der Winter-Welle von Atemwegsinfekten, das RSV-Virus treibt sie an, und Paraná zählt zu den Bundesstaaten mit steigender Tendenz. Mit einem vier Wochen alten Baby im Haus ist das diese Woche das wichtigste Thema — alles Weitere ist Vorfreude: Festa-Junina-Saison im Anflug, FesCafé Anfang Juli vor der Haustür.</p>\n    <ul>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-/SRAG-Welle</strong>: schwere Atemwegsinfekte steigen brasilienweit, VSR (RSV) ist Haupttreiber, Säuglinge unter 2 Jahren sind die Hochrisiko-Gruppe — Paraná in steigender Tendenz (InfoGripe SE 19/2026).</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Nass &amp; kühl</strong>: heute 18–22 °C, 95 % Regen; Montag genauso. Trockenes Fenster <strong>Mi–Do</strong> (15–23 °C, 0 % Regen) — der Moment für draußen.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue eingebrochen</strong>: Paraná 2026 nur 2.028 Fälle gegen 52.193 im Vorjahres-Zeitraum — minus 96,1 % (SE 1–14/2026). Eine seltene gute Nachricht.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina läuft an</strong>: ab 19. Juni Pfarr-Festas im Londrina-Ring (sechs+ Termine bis 12. Juli) — Quentão, Tanz, Pão de Queijo, Quadrilha.</li>\n      <li><span class=\"chip\">Event</span> <strong>Heute letzter Tag</strong>: Festa Junina Ibiporã, Praça Pio XII (6.–14. Juni) — bei dem Regen aber eher Glückssache.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>FesCafé vor der Tür</strong>: 28ª FesCafé Ribeirão Claro 2.–5. Juli, mit Kinder-Show „Sonhos e Magia\" am Sonntag, 5. Juli — Haus-Anker für die ganze Familie.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien</strong>: staatliche Schulen Paraná 13.–24. Juli — Planungs-Fenster für einen größeren Ausflug.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Rainy Sunday, cool and wet — a good day to stay inside. For once, that actually matches the health situation: Brazil is in the middle of the winter wave of respiratory infections, the RSV virus is driving it, and Paraná is among the states showing an upward trend. With a four-week-old baby in the house, that's the main topic this week — everything else is anticipation: Festa season approaching, FesCafé in early July right on our doorstep.</p>\n    <ul>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV/SRAG wave</strong>: severe respiratory infections rising across Brazil, RSV is the main driver, infants under 2 years are the high-risk group — Paraná showing upward trend (InfoGripe SE 19/2026).</li>\n      <li><span class=\"chip\">Weather</span> <strong>Wet &amp; cool</strong>: today 18–22 °C, 95% rain; Monday the same. Dry window <strong>Wed–Thu</strong> (15–23 °C, 0% rain) — time to get outside.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue crashed</strong>: Paraná 2026 only 2,028 cases versus 52,193 in the same period last year — down 96.1% (SE 1–14/2026). A rare bit of good news.</li>\n      <li><span class=\"chip\">Event</span> <strong>Festa Junina starting</strong>: from June 19 parish festivals in the Londrina area (six+ events through July 12) — Quentão, dancing, Pão de Queijo, Quadrilha.</li>\n      <li><span class=\"chip\">Event</span> <strong>Today is the last day</strong>: Festa Junina in Ibiporã, Praça Pio XII (June 6–14) — though with 95% rain, more of a gamble.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>FesCafé right next door</strong>: 28th FesCafé Ribeirão Claro July 2–5, with kids' show \"Dreams and Magic\" on Sunday, July 5 — home anchor for the whole family.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break</strong>: Paraná state schools July 13–24 — planning window for a bigger outing.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Domingo chuvoso, fresco e molhado — um bom dia para ficar dentro de casa. Dessa vez combina até com a situação de saúde: o Brasil está no meio da onda de inverno de infecções respiratórias, o vírus VSR está impulsionando, e o Paraná está entre os estados com tendência ascendente. Com um bebê de quatro semanas em casa, esse é o tema principal da semana — o resto é antecipação: a estação de festas se aproximando, FesCafé no início de julho bem na porta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Onda VSR/SRAG</strong>: infecções respiratórias graves em alta em todo o Brasil, VSR é o principal impulsionador, bebês menores de 2 anos são o grupo de alto risco — Paraná com tendência ascendente (InfoGripe SE 19/2026).</li>\n      <li><span class=\"chip\">Clima</span> <strong>Molhado &amp; fresco</strong>: hoje 18–22 °C, 95% de chuva; segunda-feira igual. Janela seca <strong>qua–qui</strong> (15–23 °C, 0% de chuva) — hora de sair.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue desapareceu</strong>: Paraná 2026 apenas 2.028 casos contra 52.193 no mesmo período do ano anterior — queda de 96,1% (SE 1–14/2026). Uma notícia rara e boa.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Festa Junina começando</strong>: a partir de 19 de junho festas paroquiais na região de Londrina (seis+ eventos até 12 de julho) — Quentão, dança, Pão de Queijo, Quadrilha.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Hoje é o último dia</strong>: Festa Junina em Ibiporã, Praça Pio XII (6–14 de junho) — mas com 95% de chance de chuva, é mais uma aposta.</li>\n      <li><span class=\"chip good\">Passeio</span> <strong>FesCafé bem perto</strong>: 28ª FesCafé Ribeirão Claro 2–5 de julho, com show infantil \"Sonhos e Magia\" no domingo, 5 de julho — âncora do lar para toda a família.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno</strong>: escolas estaduais do Paraná 13–24 de julho — janela de planejamento para um passeio maior.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo lluvioso, fresco y mojado — un buen día para quedarse dentro. Esta vez hasta combina con la situación de salud: Brasil está en medio de la onda invernal de infecciones respiratorias, el virus VSR la está impulsando, y Paraná está entre los estados con tendencia ascendente. Con un bebé de cuatro semanas en casa, ese es el tema principal de la semana — todo lo demás es anticipación: la temporada de fiestas se aproxima, FesCafé a principios de julio justo a la puerta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Salud</span> <strong>Onda VSR/SRAG</strong>: infecciones respiratorias graves en aumento en todo Brasil, VSR es el impulsor principal, bebés menores de 2 años son el grupo de alto riesgo — Paraná con tendencia ascendente (InfoGripe SE 19/2026).</li>\n      <li><span class=\"chip\">Clima</span> <strong>Mojado &amp; fresco</strong>: hoy 18–22 °C, 95% de lluvia; lunes igual. Ventana seca <strong>mié–jue</strong> (15–23 °C, 0% lluvia) — hora de salir.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue desapareció</strong>: Paraná 2026 solo 2.028 casos contra 52.193 en el mismo período del año anterior — caída de 96,1% (SE 1–14/2026). Una noticia rara y buena.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Festa Junina comenzando</strong>: desde el 19 de junio fiestas parroquiales en el área de Londrina (seis+ eventos hasta el 12 de julio) — Quentão, baile, Pão de Queijo, Quadrilha.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Hoy es el último día</strong>: Festa Junina en Ibiporã, Praça Pio XII (6–14 de junio) — pero con 95% de probabilidad de lluvia, es más una apuesta.</li>\n      <li><span class=\"chip good\">Viaje</span> <strong>FesCafé bien cerca</strong>: 28ª FesCafé Ribeirão Claro 2–5 de julio, con show infantil \"Sonhos e Magia\" el domingo, 5 de julio — ancla del hogar para toda la familia.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno</strong>: escuelas estatales de Paraná 13–24 de julio — ventana de planeo para una salida mayor.</li>\n    </ul></div>"

(function () {
  const $ = (s, root) => (root || document).querySelector(s);
  const $$ = (s, root) => Array.from((root || document).querySelectorAll(s));
  const M = window.__MANIFESTS;
  const frame = $('#frame');
  const home = $('#home-view');
  const loading = $('#loading');
  const tldrGrid = $('#tldr-grid');

  // ── Language state ──────────────────────────────────────────────────
  // DE is the canonical language (always present). EN/PT/ES are produced
  // alongside by the nightly tasks; if a translation is missing for a
  // given date, urlFor() and the home/sidebar renderers transparently
  // fall back to the DE version so the dashboard keeps working as
  // translations roll out.
  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];
  const LANG_KEY = 'mb-lang';
  let currentLang = (function () {
    try {
      const v = localStorage.getItem(LANG_KEY);
      return SUPPORTED_LANGS.includes(v) ? v : 'de';
    } catch (_) { return 'de'; }
  })();

  function urlFor(catId, date, lang) {
    const cat = M.categories.find(c => c.id === catId);
    let useLang = 'de';
    if (cat) {
      const entry = cat.entries.find(e => e.date === date);
      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function headlineFor(entry, lang) {
    if (!entry) return '';
    if (entry.headlines && entry.headlines[lang]) return entry.headlines[lang];
    return entry.headline || '';
  }

  function tldrFor(cat, lang) {
    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {
      return cat.latestTldrHtmlByLang[lang];
    }
    return cat.latestTldrHtml || '';
  }
  const navGroups = $('#nav-groups');
  // Grouped nav config — drives BOTH the sidebar and the home tile grid so the
  // two never drift. Each group has a `header` (the .nav-label text, or null for
  // a standalone/unheadered group like jobs) and the ordered category ids it
  // contains. The flat order here must match build_manifest.CATEGORIES; a
  // category missing from every group would silently never render, so
  // renderSidebar/renderHome assert coverage against M.categories.
  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport
    { header: 'Sport',      cats: ['football', 'motorsport'] },
    { header: 'Freizeit',   cats: ['family'] },
    { header: 'Sprachen',   cats: ['learn-language'] }, // own trailing section
  ];
  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids
  // not present in M (defensive) and warns in the console about any manifest
  // category not placed in a group, so adding a category without updating
  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };
    }).filter(g => g.cats.length);
    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {
      console.warn('NAV_GROUPS missing categories (appended ungrouped):',
                   orphans.map(c => c.id));
      groups.push({ header: null, cats: orphans });
    }
    return groups;
  }

  function fmtDate(d) {
    const parts = d.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);
      }
    });
  }

  // Render the date dropdown for a category.
  // Pagination: show `limit` entries, then a "Mehr anzeigen" button for the rest.
  const INITIAL_LIMIT = 10;
  // Home-card TL;DR snapshot caps the bullet list at this many items — the
  // card is a scan teaser, the full set is one click away in the brief.
  const HOME_TLDR_BULLET_CAP = 5;
  function renderDates(container, cat, limit) {
    container.innerHTML = '';
    if (cat.entries.length === 0) {
      container.innerHTML = '<div class="cat-empty">Heute kein Brief</div>';
      return;
    }
    const visible = cat.entries.slice(0, limit);
    visible.forEach(entry => {
      const a = document.createElement('a');
      a.className = 'cat-date';
      a.dataset.cat = cat.id;
      a.dataset.date = entry.date;
      a.href = '#' + cat.id + '/' + entry.date;   // real anchor — focusable + middle-click works
      a.innerHTML = `
        <strong>${fmtDate(entry.date)}</strong>
        <span class="headline">${headlineFor(entry, currentLang)}</span>
      `;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(cat.id, entry.date);
      });
      container.appendChild(a);
    });
    const remaining = cat.entries.length - visible.length;
    if (remaining > 0) {
      const more = document.createElement('button');
      more.className = 'cat-more';
      more.type = 'button';
      more.setAttribute('aria-expanded', 'false');
      more.textContent = '📅 Älteren Brief wählen (' + remaining + ' weitere)';
      const cal = document.createElement('div');
      cal.className = 'cat-cal';
      cal.hidden = true;
      more.addEventListener('click', (e) => {
        e.stopPropagation();
        const show = cal.hidden;
        cal.hidden = !show;
        more.setAttribute('aria-expanded', String(show));
        if (show && !cal.dataset.init) {
          renderCalendar(cal, cat);
          cal.dataset.init = '1';
        }
      });
      container.appendChild(more);
      container.appendChild(cal);
    }
  }

  // Month-calendar archive picker: only days that actually have a brief are
