      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist ein Patch-Tag, wie er dichter kaum geht: Microsoft schließt mit <strong>206</strong> CVEs den größten Patch Tuesday seiner Geschichte, einer davon eine aktiv ausgenutzte Exchange-Lücke. Parallel kippt in der Nacht ein kompletter npm-Scope mit Millionen Wochen-Downloads — über eine Maintainer-Karte, die jahrelang niemand widerrufen hat. Und Oracle liefert in seinem zweiten Monats-CPU 245 Fixes, während eine PeopleSoft-9.8 schon zwei Wochen lang als Zero-Day lief. Heute ist außerdem die CISA-Frist für eine LiteSpeed-cPanel-Lücke fällig. Ein Tag, an dem die Lieferkette wieder das eigentliche Thema ist, nicht der einzelne CVE.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs — Rekord. 6 Zero-Days, davon <em>einer aktiv ausgenutzt</em> (CVE-2026-42897, Exchange/OWA), 33 als kritisch eingestuft.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>npm-Mastra-Kompromittierung</strong>: 142 @mastra/*-Pakete in 88 Minuten backdoored — über eine vergessene Contributor-Karte. BlueNoroff-Tradecraft, Wallet-Stealer.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8) lief 27.05.–09.06. als Zero-Day, ShinyHunters traf 100+ Organisationen — Uni Nottingham verlor 40 GB Daten.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Oracle Juni-CPU</strong>: 245 Patches, ~120 kritisch, 100 ohne Auth aus der Ferne ausnutzbar; Fusion Middleware allein 106.</li>\n      <li><span class=\"chip hot\">Sec · USA</span> <strong>CISA KEV — LiteSpeed cPanel</strong>: CVE-2026-54420 (CVSS 8,5, Root-Privesc). Behörden-Frist: <em>heute</em>.</li>\n      <li><span class=\"chip\">Sec · OSS</span> <strong>Red Hat „Miasma\"</strong>: @redhat-cloud-services-npm-Namespace über OIDC-Token gekapert — Credential-Wurm, aber für Kunden kein Handlungsbedarf.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>Spring Boot 4.1.0</strong>: gRPC-Support, SSRF-Schutz, OpenTelemetry. Und: 3.5 läuft am 30.06. aus dem OSS-Support.</li>\n      <li><span class=\"chip\">Release · Infra</span> <strong>Azure Linux 4.0</strong> in Public Preview: Fedora-basiert, erstes universelles Microsoft-Server-Linux, +12 % NGINX-Durchsatz vs. Ubuntu.</li>\n      <li><span class=\"chip\">Regulierung · EU/DE</span> <strong>BSI &amp; CRA</strong>: Benennungsrahmen für Konformitätsstellen veröffentlicht; Melde-Pflichten greifen ab 11.09.2026.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist ein Patch-Tag, wie er dichter kaum geht: Microsoft schließt mit <strong>206</strong> CVEs den größten Patch Tuesday seiner Geschichte, einer davon eine aktiv ausgenutzte Exchange-Lücke. Parallel kippt in der Nacht ein kompletter npm-Scope mit Millionen Wochen-Downloads — über eine Maintainer-Karte, die jahrelang niemand widerrufen hat. Und Oracle liefert in seinem zweiten Monats-CPU 245 Fixes, während eine PeopleSoft-9.8 schon zwei Wochen lang als Zero-Day lief. Heute ist außerdem die CISA-Frist für eine LiteSpeed-cPanel-Lücke fällig. Ein Tag, an dem die Lieferkette wieder das eigentliche Thema ist, nicht der einzelne CVE.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs — Rekord. 6 Zero-Days, davon <em>einer aktiv ausgenutzt</em> (CVE-2026-42897, Exchange/OWA), 33 als kritisch eingestuft.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>npm-Mastra-Kompromittierung</strong>: 142 @mastra/*-Pakete in 88 Minuten backdoored — über eine vergessene Contributor-Karte. BlueNoroff-Tradecraft, Wallet-Stealer.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8) lief 27.05.–09.06. als Zero-Day, ShinyHunters traf 100+ Organisationen — Uni Nottingham verlor 40 GB Daten.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Oracle Juni-CPU</strong>: 245 Patches, ~120 kritisch, 100 ohne Auth aus der Ferne ausnutzbar; Fusion Middleware allein 106.</li>\n      <li><span class=\"chip hot\">Sec · USA</span> <strong>CISA KEV — LiteSpeed cPanel</strong>: CVE-2026-54420 (CVSS 8,5, Root-Privesc). Behörden-Frist: <em>heute</em>.</li>\n      <li><span class=\"chip\">Sec · OSS</span> <strong>Red Hat „Miasma\"</strong>: @redhat-cloud-services-npm-Namespace über OIDC-Token gekapert — Credential-Wurm, aber für Kunden kein Handlungsbedarf.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>Spring Boot 4.1.0</strong>: gRPC-Support, SSRF-Schutz, OpenTelemetry. Und: 3.5 läuft am 30.06. aus dem OSS-Support.</li>\n      <li><span class=\"chip\">Release · Infra</span> <strong>Azure Linux 4.0</strong> in Public Preview: Fedora-basiert, erstes universelles Microsoft-Server-Linux, +12 % NGINX-Durchsatz vs. Ubuntu.</li>\n      <li><span class=\"chip\">Regulierung · EU/DE</span> <strong>BSI &amp; CRA</strong>: Benennungsrahmen für Konformitätsstellen veröffentlicht; Melde-Pflichten greifen ab 11.09.2026.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's a patch day unlike any before: Microsoft closes <strong>206</strong> CVEs — the largest Patch Tuesday in its history — and one is an actively exploited Exchange flaw. Simultaneously, an entire npm scope with millions of weekly downloads collapses overnight via a forgotten maintainer credential that nobody ever revoked. Oracle delivers 245 fixes in its second monthly CPU, while a PeopleSoft 9.8 vulnerability ran as a zero-day for two weeks. And today CISA's deadline arrives for a LiteSpeed-cPanel flaw. A day when the supply chain, not the individual CVE, is the real story.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs — a record. 6 zero-days, one <em>actively exploited</em> (CVE-2026-42897, Exchange/OWA), 33 critical.</li>\n      <li><span class=\"chip hot\">Sec · OSS</span> <strong>npm Mastra compromise</strong>: 142 @mastra/* packages backdoored in 88 minutes — via a forgotten contributor credential. BlueNoroff tradecraft, wallet stealer.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9.8) ran as zero-day May 27–June 9. ShinyHunters hit 100+ orgs — University of Nottingham lost 40 GB of data.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Oracle June CPU</strong>: 245 patches, ~120 critical, 100 remotely exploitable without auth; Fusion Middleware alone 106.</li>\n      <li><span class=\"chip hot\">Sec · USA</span> <strong>CISA KEV — LiteSpeed cPanel</strong>: CVE-2026-54420 (CVSS 8.5, root privesc). Government deadline: <em>today</em>.</li>\n      <li><span class=\"chip\">Sec · OSS</span> <strong>Red Hat \"Miasma\"</strong>: @redhat-cloud-services npm namespace hijacked via OIDC token — credential worm, but no action needed for customers.</li>\n      <li><span class=\"chip good\">Release · OSS</span> <strong>Spring Boot 4.1.0</strong>: gRPC support, SSRF mitigation, OpenTelemetry. And: 3.5 reaches OSS EOL on June 30.</li>\n      <li><span class=\"chip\">Release · Infra</span> <strong>Azure Linux 4.0</strong> in Public Preview: Fedora-based, Microsoft's first universal server Linux, +12% NGINX throughput vs. Ubuntu.</li>\n      <li><span class=\"chip\">Regulation · EU/DE</span> <strong>BSI &amp; CRA</strong>: published framework for conformity assessment bodies; reporting obligations begin 2026-09-11.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É um dia de patches como raramente se vê: Microsoft fecha <strong>206</strong> CVEs — o maior Patch Tuesday de sua história — e uma delas é uma falha de Exchange em exploração ativa. Simultaneamente, um escopo npm inteiro com milhões de downloads semanais desmorona à noite via uma credencial de mantenedor esquecida que ninguém jamais revogou. Oracle entrega 245 correções em seu segundo CPU mensal, enquanto uma vulnerabilidade PeopleSoft 9.8 funcionava como zero-day há duas semanas. E hoje vence o prazo da CISA para uma falha LiteSpeed-cPanel. Um dia em que a cadeia de suprimentos, não o CVE individual, é a história real.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs — recorde. 6 zero-days, um <em>em exploração ativa</em> (CVE-2026-42897, Exchange/OWA), 33 críticos.</li>\n      <li><span class=\"chip hot\">Seg · OSS</span> <strong>Comprometimento npm Mastra</strong>: 142 pacotes @mastra/* com backdoor em 88 minutos — via credencial de contribuidor esquecida. Tática BlueNoroff, roubo de carteira.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8) funcionava como zero-day 27 de maio–9 de junho. ShinyHunters atingiu 100+ organizações — Universidade de Nottingham perdeu 40 GB de dados.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Oracle CPU Junho</strong>: 245 patches, ~120 críticos, 100 exploráveis remotamente sem autenticação; Fusion Middleware sozinho 106.</li>\n      <li><span class=\"chip hot\">Seg · EUA</span> <strong>CISA KEV — LiteSpeed cPanel</strong>: CVE-2026-54420 (CVSS 8,5, escalonamento raiz). Prazo governo: <em>hoje</em>.</li>\n      <li><span class=\"chip\">Seg · OSS</span> <strong>Red Hat \"Miasma\"</strong>: espaço de nomes npm @redhat-cloud-services sequestrado via token OIDC — verme credencial, mas sem ação necessária para clientes.</li>\n      <li><span class=\"chip good\">Lançamento · OSS</span> <strong>Spring Boot 4.1.0</strong>: suporte gRPC, mitigação SSRF, OpenTelemetry. E: 3.5 atinge fim do suporte OSS em 30 de junho.</li>\n      <li><span class=\"chip\">Lançamento · Infra</span> <strong>Azure Linux 4.0</strong> em Visualização Pública: baseado em Fedora, primeiro Linux de servidor universal da Microsoft, +12% vazão NGINX vs. Ubuntu.</li>\n      <li><span class=\"chip\">Regulação · EU/DE</span> <strong>BSI &amp; CRA</strong>: publicado marco para órgãos de avaliação de conformidade; obrigações de notificação começam 11/09/2026.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es un día de parches como raramente se ve: Microsoft cierra <strong>206</strong> CVEs — el mayor Patch Tuesday de su historia — y una de ellas es una falla de Exchange en explotación activa. Simultáneamente, un ámbito npm completo con millones de descargas semanales se derrumba durante la noche vía una credencial de mantenedor olvidada que nadie jamás revocó. Oracle entrega 245 correcciones en su segundo CPU mensual, mientras una vulnerabilidad PeopleSoft 9.8 funcionaba como zero-day hace dos semanas. Y hoy vence el plazo de CISA para una falla LiteSpeed-cPanel. Un día en que la cadena de suministro, no el CVE individual, es la historia real.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Microsoft Patch Tuesday</strong>: 206 CVEs — récord. 6 zero-days, uno <em>en explotación activa</em> (CVE-2026-42897, Exchange/OWA), 33 críticos.</li>\n      <li><span class=\"chip hot\">Seg · OSS</span> <strong>Compromiso npm Mastra</strong>: 142 paquetes @mastra/* con backdoor en 88 minutos — vía credencial de colaborador olvidada. Procedimientos BlueNoroff, robo de monedero.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8) funcionaba como zero-day 27 de mayo–9 de junio. ShinyHunters golpeó 100+ organizaciones — Universidad de Nottingham perdió 40 GB de datos.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Oracle CPU Junio</strong>: 245 parches, ~120 críticos, 100 explotables remotamente sin autenticación; Fusion Middleware solo 106.</li>\n      <li><span class=\"chip hot\">Seg · EUA</span> <strong>CISA KEV — LiteSpeed cPanel</strong>: CVE-2026-54420 (CVSS 8,5, escalada raíz). Plazo gobierno: <em>hoy</em>.</li>\n      <li><span class=\"chip\">Seg · OSS</span> <strong>Red Hat \"Miasma\"</strong>: espacio de nombres npm @redhat-cloud-services secuestrado vía token OIDC — gusano credencial, pero sin acción necesaria para clientes.</li>\n      <li><span class=\"chip good\">Lanzamiento · OSS</span> <strong>Spring Boot 4.1.0</strong>: soporte gRPC, mitigación SSRF, OpenTelemetry. Y: 3.5 llega a fin de soporte OSS el 30 de junio.</li>\n      <li><span class=\"chip\">Lanzamiento · Infra</span> <strong>Azure Linux 4.0</strong> en Vista Previa Pública: basado en Fedora, primer Linux de servidor universal de Microsoft, +12% rendimiento NGINX vs. Ubuntu.</li>\n      <li><span class=\"chip\">Regulación · UE/DE</span> <strong>BSI &amp; CRA</strong>: publicado marco para órganos de evaluación de conformidad; obligaciones de notificación comienzan 11/09/2026.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei große Abschaltungen prägen den Tag: Google zieht heute der Gemini-CLI und dem Code-Assist für Privat- und Free-Tier-Entwickler den Stecker und schiebt alle Richtung der closed-source Antigravity-CLI — und Claude Fable 5, das auf den Leaderboards führende Coding-Modell, ist seit dem 12. Juni weltweit gesperrt und immer noch nicht zurück. Darunter läuft der normale Tool-Betrieb weiter: Cursor und Cline drücken Tempo, Copilot-CLI bekam ein Refresh, Aider schläft seit Februar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini-CLI &amp; Code Assist enden heute</strong> für AI-Pro/Ultra/Free-Tier — Migration zur closed-source Antigravity-CLI, ohne 1:1-Feature-Parität zum Start.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 seit 12.06. global gesperrt</strong> — US-Export-Control-Directive, kein Wiederherstellungs-Datum; Opus 4.8 und Sonnet 4.6 laufen normal weiter.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 führt SWE-bench Verified</strong> mit 95,00 % (vals.ai, 17.06.) — aber das Modell ist gerade nicht buchbar. GPT-5.5 auf Rang 3 mit 82,60 %.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong>: Cloud-Subagents per <code>/in-cloud</code> in separaten VMs; Bugbot jetzt ~90 s statt 5 min, 22 % günstiger pro Lauf.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cline v3.0.27</strong>: neuer <code>cline skill</code>-Befehl + MCP-Install-Wizard — tägliche Release-Kadenz, einen Blick wert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot CLI</strong>: Rubber-Duck-Plankritiker und Voice-Input (Space halten) jetzt GA; Usage-based Billing für alle live.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenHands v1.8.0</strong> (10.06.): LLM-Profile, Sub-Agent-Delegation, generische ACP-Agent-UI — ~77k Stars.</li>\n      <li><span class=\"chip\">Google</span> <strong>Android CLI 1.0</strong> lässt jeden Agenten (auch Claude Code, Codex) Android-Studio-Inspektionen ohne IDE aufrufen — angeblich 70 % weniger Tokens.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei große Abschaltungen prägen den Tag: Google zieht heute der Gemini-CLI und dem Code-Assist für Privat- und Free-Tier-Entwickler den Stecker und schiebt alle Richtung der closed-source Antigravity-CLI — und Claude Fable 5, das auf den Leaderboards führende Coding-Modell, ist seit dem 12. Juni weltweit gesperrt und immer noch nicht zurück. Darunter läuft der normale Tool-Betrieb weiter: Cursor und Cline drücken Tempo, Copilot-CLI bekam ein Refresh, Aider schläft seit Februar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini-CLI &amp; Code Assist enden heute</strong> für AI-Pro/Ultra/Free-Tier — Migration zur closed-source Antigravity-CLI, ohne 1:1-Feature-Parität zum Start.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 seit 12.06. global gesperrt</strong> — US-Export-Control-Directive, kein Wiederherstellungs-Datum; Opus 4.8 und Sonnet 4.6 laufen normal weiter.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 führt SWE-bench Verified</strong> mit 95,00 % (vals.ai, 17.06.) — aber das Modell ist gerade nicht buchbar. GPT-5.5 auf Rang 3 mit 82,60 %.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong>: Cloud-Subagents per <code>/in-cloud</code> in separaten VMs; Bugbot jetzt ~90 s statt 5 min, 22 % günstiger pro Lauf.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cline v3.0.27</strong>: neuer <code>cline skill</code>-Befehl + MCP-Install-Wizard — tägliche Release-Kadenz, einen Blick wert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot CLI</strong>: Rubber-Duck-Plankritiker und Voice-Input (Space halten) jetzt GA; Usage-based Billing für alle live.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenHands v1.8.0</strong> (10.06.): LLM-Profile, Sub-Agent-Delegation, generische ACP-Agent-UI — ~77k Stars.</li>\n      <li><span class=\"chip\">Google</span> <strong>Android CLI 1.0</strong> lässt jeden Agenten (auch Claude Code, Codex) Android-Studio-Inspektionen ohne IDE aufrufen — angeblich 70 % weniger Tokens.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two major shutdowns define the day: Google is pulling the plug on Gemini CLI and Code Assist for individual and free-tier developers today, pushing everyone toward the closed-source Antigravity CLI — and Claude Fable 5, the leading coding model on the leaderboards, has been locked down globally since June 12 and still hasn't returned. Underneath runs the normal tool business: Cursor and Cline are pressing the gas, Copilot CLI got a refresh, Aider has been asleep since February.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI &amp; Code Assist end today</strong> for AI-Pro/Ultra/Free-Tier — migration to closed-source Antigravity CLI, with no one-to-one feature parity at launch.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 globally locked since 06.12</strong> — US export-control directive, no restoration date; Opus 4.8 and Sonnet 4.6 running normally.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 leads SWE-bench Verified</strong> at 95.00% (vals.ai, 06.17) — but the model is not available for booking right now. GPT-5.5 at rank 3 with 82.60%.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong>: Cloud subagents via <code>/in-cloud</code> in separate VMs; Bugbot now ~90 s instead of 5 min, 22% cheaper per run.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cline v3.0.27</strong>: new <code>cline skill</code> command + MCP-Install Wizard — daily release cadence, worth a look.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot CLI</strong>: Rubber-Duck plan critic and Voice Input (hold Space) now GA; usage-based billing live for all.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenHands v1.8.0</strong> (06.10): LLM profiles, sub-agent delegation, generic ACP agent UI — ~77k stars.</li>\n      <li><span class=\"chip\">Google</span> <strong>Android CLI 1.0</strong> lets any agent (including Claude Code, Codex) call Android-Studio inspections without the IDE — allegedly 70% fewer tokens.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois grandes desligamentos marcam o dia: Google está encerrando o CLI Gemini e o Code Assist para desenvolvedores autônomos e de camada gratuita hoje, empurrando todos em direção ao CLI Antigravity de código fechado — e o Claude Fable 5, o modelo de codificação líder nos rankings, foi bloqueado globalmente desde 12 de junho e ainda não voltou. Por baixo, o negócio normal de ferramentas continua: Cursor e Cline estão acelerando, Copilot CLI ganhou uma renovação, Aider está dormindo desde fevereiro.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI &amp; Code Assist terminam hoje</strong> para AI-Pro/Ultra/Camada Gratuita — migração para CLI Antigravity de código fechado, sem paridade de recursos um-para-um no lançamento.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 bloqueado globalmente desde 12.06</strong> — diretiva de controle de exportação dos EUA, sem data de restauração; Opus 4.8 e Sonnet 4.6 funcionando normalmente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 lidera SWE-bench Verified</strong> com 95,00% (vals.ai, 17.06) — mas o modelo não está disponível para reserva agora. GPT-5.5 na posição 3 com 82,60%.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong>: subagentes em nuvem via <code>/in-cloud</code> em máquinas virtuais separadas; Bugbot agora ~90 s em vez de 5 min, 22% mais barato por execução.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cline v3.0.27</strong>: novo comando <code>cline skill</code> + assistente de instalação de MCP — cadência de lançamento diário, vale a pena conferir.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot CLI</strong>: crítico de plano Rubber-Duck e entrada de voz (mantenha espaço) agora em GA; faturamento baseado em uso ativo para todos.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenHands v1.8.0</strong> (10.06): perfis de LLM, delegação de subagentes, interface de agente ACP genérica — ~77k estrelas.</li>\n      <li><span class=\"chip\">Google</span> <strong>Android CLI 1.0</strong> permite que qualquer agente (incluindo Claude Code, Codex) chame inspeções do Android Studio sem a IDE — alegadamente 70% menos tokens.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos grandes apagones marcan el día: Google está cerrando la Gemini CLI y Code Assist para desarrolladores independientes y de capa gratuita hoy, empujando a todos hacia la Antigravity CLI de código cerrado — y Claude Fable 5, el modelo de codificación líder en los rankings, ha estado bloqueado globalmente desde el 12 de junio y aún no vuelve. Debajo, el negocio normal de herramientas continúa: Cursor y Cline están acelerando, Copilot CLI recibió una renovación, Aider está durmiendo desde febrero.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI &amp; Code Assist terminan hoy</strong> para AI-Pro/Ultra/capa gratuita — migración a Antigravity CLI de código cerrado, sin paridad de características uno a uno en el lanzamiento.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 bloqueado globalmente desde 12.06</strong> — directiva de control de exportación estadounidense, sin fecha de restauración; Opus 4.8 y Sonnet 4.6 funcionando normalmente.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Fable 5 lidera SWE-bench Verified</strong> con 95,00% (vals.ai, 17.06) — pero el modelo no está disponible para reservar ahora. GPT-5.5 en rango 3 con 82,60%.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor</strong>: subagentes en nube vía <code>/in-cloud</code> en máquinas virtuales separadas; Bugbot ahora ~90 s en lugar de 5 min, 22% más barato por ejecución.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cline v3.0.27</strong>: nuevo comando <code>cline skill</code> + asistente de instalación de MCP — cadencia de lanzamiento diario, vale la pena echarle un vistazo.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot CLI</strong>: crítico de plan Rubber-Duck e entrada de voz (mantén espacio) ahora GA; facturación basada en uso activa para todos.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>OpenHands v1.8.0</strong> (10.06): perfiles de LLM, delegación de subagentes, interfaz de agente ACP genérica — ~77k estrellas.</li>\n      <li><span class=\"chip\">Google</span> <strong>Android CLI 1.0</strong> permite que cualquier agente (incluido Claude Code, Codex) llame inspecciones de Android Studio sin el IDE — supuestamente 70% menos tokens.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Tag hat ein Thema, und es ist nicht „noch ein Modell\". Es ist Governance — wer behält die Aufsicht, wenn Firmen tausende KI-Agenten anstellen? KPMG hat gerade 276.000 Profis auf eine zentral verwaltete Agenten-Plattform gehoben (Microsofts Agent 365). Gleichzeitig halten sieben von zehn Führungskräften ihre KI-Aufsicht für „nicht zweckmäßig\", und nur 18 % wissen, welche Agenten überhaupt im Haus laufen. Dazwischen klafft eine Lücke — und in zwei Monaten zwingt der EU AI Act sie zu schließen. Genau das ist twiceDs Markt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft</strong>: 276.000 Profis in 138 Ländern auf Agent 365 + Copilot — der bisher größte benannte Agenten-Governance-Rollout (9. Juni).</li>\n      <li><span class=\"chip hot\">Deploy · Consumer</span> <strong>Meta Business Agent</strong>: global gestartet (3. Juni), 1 Mio.+ Firmen aktiv, 1 Mrd.+ B2C-Chats/Tag auf WhatsApp/Messenger/Instagram — Brasilien gehörte zu den frühen Testmärkten.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Governance-Lücke</strong>: 70 % der Führungskräfte halten ihre KI-Aufsicht für „nicht zweckmäßig\", nur 18 % haben ein vollständiges Agenten-Inventar (IBM, Think 2026).</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Deloitte</strong>: nur 21 % der Agenten-Anwender haben ein reifes Governance-Modell, 73 % wollen agentische KI in 2 Jahren einsetzen.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Pflichten greifen am <strong>2. August 2026</strong> — Pflicht-Logging (Art. 12), 15-Tage-Meldefrist (Art. 73), Strafen bis 15 Mio. € / 3 % Umsatz.</li>\n      <li><span class=\"chip good\">Study · Global</span> <strong>Databricks</strong>: Firmen <em>mit</em> Governance schieben 12× mehr Projekte in Produktion; Multi-Agent-Workflows +327 % in unter 4 Monaten.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner-Prognose</strong>: 40 % der Enterprise-Apps mit aufgabenspezifischen Agenten bis Ende 2026 (von &lt;5 % in 2025) — über 40 % der Agenten-Projekte gestrichen bis 2027 ohne Governance.</li>\n      <li><span class=\"chip good\">B2B-SaaS · Global</span> <strong>LLM-Observability</strong>: 2,69 Mrd. $ (2026), CAGR ~36,3 %; breiterer <strong>LLMOps</strong>-Markt 7,14 Mrd. $ (2026) → 15,59 Mrd. $ (2030), CAGR ~21,6 %.</li>\n      <li><span class=\"chip\">Note · ai-dev</span> Coding-Seite (GPT-5.5, Gemini CLI, Fable 5) liegt im <strong>ai-dev</strong>-Revier — hier nur die angewandte KI im Unternehmen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Tag hat ein Thema, und es ist nicht „noch ein Modell\". Es ist Governance — wer behält die Aufsicht, wenn Firmen tausende KI-Agenten anstellen? KPMG hat gerade 276.000 Profis auf eine zentral verwaltete Agenten-Plattform gehoben (Microsofts Agent 365). Gleichzeitig halten sieben von zehn Führungskräften ihre KI-Aufsicht für „nicht zweckmäßig\", und nur 18 % wissen, welche Agenten überhaupt im Haus laufen. Dazwischen klafft eine Lücke — und in zwei Monaten zwingt der EU AI Act sie zu schließen. Genau das ist twiceDs Markt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft</strong>: 276.000 Profis in 138 Ländern auf Agent 365 + Copilot — der bisher größte benannte Agenten-Governance-Rollout (9. Juni).</li>\n      <li><span class=\"chip hot\">Deploy · Consumer</span> <strong>Meta Business Agent</strong>: global gestartet (3. Juni), 1 Mio.+ Firmen aktiv, 1 Mrd.+ B2C-Chats/Tag auf WhatsApp/Messenger/Instagram — Brasilien gehörte zu den frühen Testmärkten.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Governance-Lücke</strong>: 70 % der Führungskräfte halten ihre KI-Aufsicht für „nicht zweckmäßig\", nur 18 % haben ein vollständiges Agenten-Inventar (IBM, Think 2026).</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Deloitte</strong>: nur 21 % der Agenten-Anwender haben ein reifes Governance-Modell, 73 % wollen agentische KI in 2 Jahren einsetzen.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Pflichten greifen am <strong>2. August 2026</strong> — Pflicht-Logging (Art. 12), 15-Tage-Meldefrist (Art. 73), Strafen bis 15 Mio. € / 3 % Umsatz.</li>\n      <li><span class=\"chip good\">Study · Global</span> <strong>Databricks</strong>: Firmen <em>mit</em> Governance schieben 12× mehr Projekte in Produktion; Multi-Agent-Workflows +327 % in unter 4 Monaten.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner-Prognose</strong>: 40 % der Enterprise-Apps mit aufgabenspezifischen Agenten bis Ende 2026 (von &lt;5 % in 2025) — über 40 % der Agenten-Projekte gestrichen bis 2027 ohne Governance.</li>\n      <li><span class=\"chip good\">B2B-SaaS · Global</span> <strong>LLM-Observability</strong>: 2,69 Mrd. $ (2026), CAGR ~36,3 %; breiterer <strong>LLMOps</strong>-Markt 7,14 Mrd. $ (2026) → 15,59 Mrd. $ (2030), CAGR ~21,6 %.</li>\n      <li><span class=\"chip\">Note · ai-dev</span> Coding-Seite (GPT-5.5, Gemini CLI, Fable 5) liegt im <strong>ai-dev</strong>-Revier — hier nur die angewandte KI im Unternehmen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today has one theme, and it's not \"another model.\" It's governance—who keeps the watch when companies deploy thousands of AI agents? KPMG just lifted 276,000 professionals onto a centrally managed agent platform (Microsoft Agent 365). At the same time, seven out of ten executives call their AI oversight \"not fit for purpose,\" and only 18% know which agents even run in their house. That's the gap—and in two months, the EU AI Act forces them to close it. That's exactly twiceD's market.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · Global</span> <strong>KPMG × Microsoft</strong>: 276,000 professionals across 138 countries on Agent 365 + Copilot—the largest named agent-governance rollout to date (June 9).</li>\n      <li><span class=\"chip hot\">Deploy · Consumer</span> <strong>Meta Business Agent</strong>: launched globally (June 3), 1M+ businesses active, 1B+ B2C chats/day across WhatsApp/Messenger/Instagram—Brazil was among the early test markets.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Governance gap</strong>: 70% of executives call their AI oversight \"not fit for purpose,\" only 18% have a complete agent inventory (IBM, Think 2026).</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Deloitte</strong>: only 21% of agentic-AI users have a mature governance model; 73% plan to deploy agentic AI within 2 years.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>EU AI Act</strong>: high-risk obligations take effect on <strong>August 2, 2026</strong>—mandatory logging (Art. 12), 15-day incident-reporting window (Art. 73), penalties up to 15M EUR / 3% revenue.</li>\n      <li><span class=\"chip good\">Study · Global</span> <strong>Databricks</strong>: companies <em>with</em> governance push 12× more projects to production; multi-agent workflows +327% in under 4 months.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Gartner forecast</strong>: 40% of enterprise apps with task-specific agents by end-2026 (up from &lt;5% in 2025)—over 40% of agentic-AI projects scrapped by 2027 without governance.</li>\n      <li><span class=\"chip good\">B2B-SaaS · Global</span> <strong>LLM-Observability</strong>: 2.69B USD (2026), CAGR ~36.3%; broader <strong>LLMOps</strong> market 7.14B USD (2026) → 15.59B USD (2030), CAGR ~21.6%.</li>\n      <li><span class=\"chip\">Note · ai-dev</span> Coding side (GPT-5.5, Gemini CLI, Fable 5) lives in the <strong>ai-dev</strong> beat—here, applied AI in the enterprise.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje tem um tema, e não é \"mais um modelo\". É governança — quem mantém a vigilância quando as empresas implantam milhares de agentes de IA? A KPMG acabou de elevar 276.000 profissionais para uma plataforma de agentes gerenciada centralmente (Microsoft Agent 365). Ao mesmo tempo, sete em cada dez executivos chamam sua supervisão de IA de \"inadequada\", e apenas 18% sabem quais agentes rodam em suas casas. É a brecha — e em dois meses, a Lei de IA da UE os força a fechá-la. Esse é exatamente o mercado da twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">Implementação · Global</span> <strong>KPMG × Microsoft</strong>: 276.000 profissionais em 138 países no Agent 365 + Copilot — o maior deployment de governança de agentes nomeado até agora (9 de junho).</li>\n      <li><span class=\"chip hot\">Implementação · Consumer</span> <strong>Meta Business Agent</strong>: lançado globalmente (3 de junho), 1 milhão+ de empresas ativas, 1 bilhão+ de chats B2C/dia em WhatsApp/Messenger/Instagram — Brasil estava entre os mercados-teste iniciais.</li>\n      <li><span class=\"chip\">Estudo · Global</span> <strong>Brecha de governança</strong>: 70% dos executivos chamam sua supervisão de IA de \"inadequada\", apenas 18% têm inventário completo de agentes (IBM, Think 2026).</li>\n      <li><span class=\"chip\">Estudo · Global</span> <strong>Deloitte</strong>: apenas 21% dos usuários de IA agentiva têm um modelo de governança maduro; 73% planejam implantar IA agentiva em 2 anos.</li>\n      <li><span class=\"chip\">Reg · UE</span> <strong>Lei de IA da UE</strong>: obrigações de alto risco entram em vigor em <strong>2 de agosto de 2026</strong> — logging obrigatório (Art. 12), janela de 15 dias para notificação (Art. 73), multas até 15 milhões EUR / 3% da receita.</li>\n      <li><span class=\"chip good\">Estudo · Global</span> <strong>Databricks</strong>: empresas <em>com</em> governança avançam 12× mais projetos para produção; workflows multi-agentes +327% em menos de 4 meses.</li>\n      <li><span class=\"chip\">Estudo · Global</span> <strong>Previsão Gartner</strong>: 40% dos aplicativos empresariais com agentes específicos de tarefas até final de 2026 (de &lt;5% em 2025) — mais de 40% dos projetos de IA agentiva cancelados até 2027 sem governança.</li>\n      <li><span class=\"chip good\">B2B-SaaS · Global</span> <strong>LLM-Observabilidade</strong>: 2,69 bilhões USD (2026), CAGR ~36,3%; mercado <strong>LLMOps</strong> mais amplo 7,14 bilhões USD (2026) → 15,59 bilhões USD (2030), CAGR ~21,6%.</li>\n      <li><span class=\"chip\">Nota · ai-dev</span> Lado de coding (GPT-5.5, Gemini CLI, Fable 5) fica na cobertura <strong>ai-dev</strong> — aqui, IA aplicada na empresa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy hay un tema, y no es \"otro modelo más\". Es gobernanza — ¿quién mantiene la vigilancia cuando las empresas desplegan miles de agentes de IA? KPMG acaba de elevar 276.000 profesionales a una plataforma de agentes gestionada centralmente (Microsoft Agent 365). Al mismo tiempo, siete de cada diez ejecutivos llaman a su supervisión de IA \"inadecuada\", y solo el 18% sabe qué agentes corren en sus casas. Esa es la brecha — y en dos meses, la Ley de IA de la UE los obliga a cerrarla. Ese es exactamente el mercado de twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">Implementación · Global</span> <strong>KPMG × Microsoft</strong>: 276.000 profesionales en 138 países en Agent 365 + Copilot — el mayor despliegue de gobernanza de agentes nombrado hasta ahora (9 de junio).</li>\n      <li><span class=\"chip hot\">Implementación · Consumer</span> <strong>Meta Business Agent</strong>: lanzado globalmente (3 de junio), 1 millón+ de negocios activos, 1 billón+ de chats B2C/día en WhatsApp/Messenger/Instagram — Brasil fue uno de los primeros mercados de prueba.</li>\n      <li><span class=\"chip\">Estudio · Global</span> <strong>Brecha de gobernanza</strong>: 70% de ejecutivos llaman a su supervisión de IA \"inadecuada\", solo 18% tiene inventario completo de agentes (IBM, Think 2026).</li>\n      <li><span class=\"chip\">Estudio · Global</span> <strong>Deloitte</strong>: solo 21% de los usuarios de IA agentiva tienen un modelo de gobernanza maduro; 73% planean desplegar IA agentiva en 2 años.</li>\n      <li><span class=\"chip\">Reg · UE</span> <strong>Ley de IA de la UE</strong>: las obligaciones de alto riesgo entran en vigor el <strong>2 de agosto de 2026</strong> — registro obligatorio (Art. 12), ventana de 15 días para notificación (Art. 73), multas hasta 15 millones EUR / 3% de ingresos.</li>\n      <li><span class=\"chip good\">Estudio · Global</span> <strong>Databricks</strong>: empresas <em>con</em> gobernanza avanzan 12× más proyectos a producción; flujos multi-agente +327% en menos de 4 meses.</li>\n      <li><span class=\"chip\">Estudio · Global</span> <strong>Pronóstico Gartner</strong>: 40% de aplicaciones empresariales con agentes específicos de tareas hasta finales de 2026 (de &lt;5% en 2025) — más de 40% de proyectos de IA agentiva cancelados hasta 2027 sin gobernanza.</li>\n      <li><span class=\"chip good\">B2B-SaaS · Global</span> <strong>LLM-Observability</strong>: 2,69B USD (2026), CAGR ~36,3%; mercado más amplio <strong>LLMOps</strong> 7,14B USD (2026) → 15,59B USD (2030), CAGR ~21,6%.</li>\n      <li><span class=\"chip\">Nota · ai-dev</span> Lado de coding (GPT-5.5, Gemini CLI, Fable 5) vive en el territorio <strong>ai-dev</strong> — aquí, IA aplicada en la empresa.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">109 gescorte Listings heute — 92 Freelance, vier Employee, elf Intriguing, dazu zwei EU-Ausschreibungen. Zwölf liegen bei Fit-Score 80+. Der Markthintergrund ist gemischt: der DACH-Freelance-Schnitt ist 2026 von 104 auf 103 €/h gerutscht und fast die Hälfte der Freelancer meldet eine schlechtere Auftragslage — aber genau Daniels Profil (Java/Spring plus angewandte KI und Kafka) trägt einen Aufschlag von 15–25 % über diesem Basiswert. Zwei TED-Fristen laufen nächste Woche aus.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha „Senior Java – Industrial IoT Platform\"</strong>: Fit 88, Top-Match des Tages. DACH-Frontier-AI plus Java+IoT-Stack (MQTT/Spring Boot/Z-Wave), remote-DE-freundlich, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dichtes Java-/Angular-Feld</strong>: 87 von 109 Listings tragen den twiceD-Tag — Computer-Futures-Backend (Fit 83, 100 % remote), BloomNow-Fullstack Java/Angular/Azure (Fit 81), joyIT-Energie-ÜNB (Fit 81).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Nischen-Premium aktiv</strong>: Smart-Home- und Automotive-Java-Contracts (Computer Futures) im Band 110–140 €/h — Daniels höchste Match-Stärke und das obere Marktband.</li>\n      <li><span class=\"chip warn\">Markt</span> <strong>Rate sinkt, Pipeline schwächer</strong>: Freelancer-Kompass 2026 pegt den DACH-Schnitt auf 103 €/h (von 104); 49 % melden eine schlechtere Auftragslage YoY, das Monatseinkommen fiel ~21 %. Java+KI/Kafka kontert das mit 15–25 % Aufschlag.</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Los 1 (373604-2026)</strong>: €320k-Budget, Java/Web/Open-Source — klein genug für twiceD allein. Frist lt. Eintrag Mo 29.06 (vor Bewerbung prüfen).</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: Schätzwert €13M, Stack passt, aber Umsatz-/Clearance-Schwelle → Partner nötig. Frist lt. Eintrag Di 30.06 (vor Bewerbung prüfen).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains streut sieben Dev-Tools-Rollen ein</strong>: Forward-Deployed-Engineer und AI-Lead-Stellen, Remote-DE, JVM/agentic-Tooling — Intrigue-getrieben im Board.</li>\n      <li><span class=\"chip\">Remote</span> <strong>90 von 109 sind remote</strong>: Deutschland bleibt trotz jüngster Layoffs (ServiceNow, Zalando, Amdocs) der am stärksten unterversorgte Senior-Dev-Markt Westeuropas — netto positiv für Senior-Contractor.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Sechs High-Stack-Rollen sichtbar, aber blockiert</strong>: vier SÜ2-Clearance (DE-Wohnsitz-Pflicht) und zwei CH-Onsite — Konflikt mit BR-Wohnsitz, im Board mit niedrigem Score geführt.</li>\n    </ul></div>",

i 30.06 (vor Bewerbung prüfen).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains streut sieben Dev-Tools-Rollen ein</strong>: Forward-Deployed-Engineer und AI-Lead-Stellen, Remote-DE, JVM/agentic-Tooling — Intrigue-getrieben im Board.</li>\n      <li><span class=\"chip\">Remote</span> <strong>90 von 109 sind remote</strong>: Deutschland bleibt trotz jüngster Layoffs (ServiceNow, Zalando, Amdocs) der am stärksten unterversorgte Senior-Dev-Markt Westeuropas — netto positiv für Senior-Contractor.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Sechs High-Stack-Rollen sichtbar, aber blockiert</strong>: vier SÜ2-Clearance (DE-Wohnsitz-Pflicht) und zwei CH-Onsite — Konflikt mit BR-Wohnsitz, im Board mit niedrigem Score geführt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">109 scored listings today — 92 freelance, four employee, eleven intriguing, plus two EU tenders. Twelve have a fit score of 80+. The market backdrop is mixed: the DACH freelance average slipped from 104 to 103 €/h in 2026 and nearly half of all freelancers report a weaker pipeline — but Daniel's exact profile (Java/Spring plus applied AI and Kafka) commands a 15–25 % premium over that baseline. Two TED deadlines expire next week.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha \"Senior Java – Industrial IoT Platform\"</strong>: Fit 88, top match of the day. DACH frontier AI plus Java+IoT stack (MQTT/Spring Boot/Z-Wave), remote-DE friendly, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dense Java/Angular field</strong>: 87 of 109 listings carry the twiceD tag — Computer Futures backend (Fit 83, 100 % remote), BloomNow fullstack Java/Angular/Azure (Fit 81), joyIT energy TSO (Fit 81).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Niche premium active</strong>: Smart-home and automotive Java contracts (Computer Futures) in the 110–140 €/h band — Daniel's strongest match and the upper market tier.</li>\n      <li><span class=\"chip warn\">Market</span> <strong>Rate falling, pipeline weaker</strong>: Freelancer-Kompass 2026 pegs the DACH average at 103 €/h (down from 104); 49 % report a worse pipeline YoY, monthly income fell ~21 %. Java+AI/Kafka counters that with a 15–25 % premium.</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Lot 1 (373604-2026)</strong>: €320k budget, Java/Web/Open-Source — small enough for twiceD solo. Deadline per listing Mon 29 Jun (verify on TED before applying).</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: Estimated value €13M, stack fits, but revenue/clearance threshold → partner required. Deadline per listing Tue 30 Jun (verify on TED before applying).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains scatters seven dev-tools roles</strong>: Forward-Deployed-Engineer and AI-Lead positions, Remote-DE, JVM/agentic tooling — intrigue-driven in the board.</li>\n      <li><span class=\"chip\">Remote</span> <strong>90 of 109 are remote</strong>: Germany remains, despite recent layoffs (ServiceNow, Zalando, Amdocs), the most undersupplied senior dev market in Western Europe — net positive for senior contractors.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Six high-stack roles visible but blocked</strong>: four SÜ2 security clearances (German residency required) and two CH on-site — conflict with BR residency, listed with low scores in the board.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">109 listagens pontuadas hoje — 92 freelance, quatro employee, onze intriguing, mais duas licitações da UE. Doze têm Fit-Score 80+. O cenário de mercado é misto: a média freelance DACH caiu de 104 para 103 €/h em 2026 e quase metade dos freelancers relata pipeline mais fraco — mas exatamente o perfil de Daniel (Java/Spring mais IA aplicada e Kafka) carrega um prêmio de 15–25 % acima dessa base. Dois prazos TED vencem na próxima semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha \"Senior Java – Industrial IoT Platform\"</strong>: Fit 88, melhor match do dia. IA de fronteira DACH com stack Java+IoT (MQTT/Spring Boot/Z-Wave), amigável a remote-DE, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Campo Java/Angular denso</strong>: 87 de 109 listagens carregam a tag twiceD — backend Computer Futures (Fit 83, 100 % remoto), fullstack BloomNow Java/Angular/Azure (Fit 81), joyIT operadora de transmissão de energia (Fit 81).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Prêmio de nicho ativo</strong>: contratos Java de smart home e automotivo (Computer Futures) na faixa de 110–140 €/h — maior força de match de Daniel e faixa superior do mercado.</li>\n      <li><span class=\"chip warn\">Mercado</span> <strong>Taxa cai, pipeline mais fraco</strong>: Freelancer-Kompass 2026 fixa a média DACH em 103 €/h (ante 104); 49 % relatam pipeline pior no comparativo anual, renda mensal caiu ~21 %. Java+IA/Kafka contraria isso com prêmio de 15–25 %.</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Lote 1 (373604-2026)</strong>: orçamento de €320k, Java/Web/Open-Source — pequeno o suficiente para twiceD sozinha. Prazo conforme cadastro: seg 29/06 (verificar antes de candidatar).</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: valor estimado €13M, stack adequado, mas limiar de faturamento/habilitação → parceiro necessário. Prazo conforme cadastro: ter 30/06 (verificar antes de candidatar).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains distribui sete vagas de dev-tools</strong>: posições de Forward-Deployed-Engineer e AI Lead, remote-DE, ferramentas JVM/agentic — movidas por intriguing no board.</li>\n      <li><span class=\"chip\">Remote</span> <strong>90 de 109 são remotas</strong>: a Alemanha permanece, apesar dos demissões recentes (ServiceNow, Zalando, Amdocs), o mercado de dev sênior mais carente da Europa Ocidental — saldo positivo para contractors sênior.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Seis vagas high-stack visíveis, mas bloqueadas</strong>: quatro exigem habilitação SÜ2 (residência na Alemanha obrigatória) e duas são presenciais na Suíça — conflito com residência no BR, listadas com score baixo no board.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">109 listados puntuados hoy — 92 freelance, cuatro employee, once intriguing, más dos licitaciones de la UE. Doce tienen Fit-Score 80+. El panorama de mercado es mixto: el promedio freelance DACH bajó de 104 a 103 €/h en 2026 y casi la mitad de los freelancers reporta un pipeline más débil — pero exactamente el perfil de Daniel (Java/Spring más IA aplicada y Kafka) lleva un premio del 15–25 % sobre esa base. Dos plazos TED vencen la próxima semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Employee</span> <strong>Aleph Alpha \"Senior Java – Industrial IoT Platform\"</strong>: Fit 88, mejor match del día. IA de frontera DACH con stack Java+IoT (MQTT/Spring Boot/Z-Wave), amigable con remote-DE, 110–150 k€.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Campo Java/Angular denso</strong>: 87 de 109 listados llevan la etiqueta twiceD — backend Computer Futures (Fit 83, 100 % remoto), fullstack BloomNow Java/Angular/Azure (Fit 81), joyIT operadora de transmisión de energía (Fit 81).</li>\n      <li><span class=\"chip\">IoT</span> <strong>Premio de nicho activo</strong>: contratos Java de smart home y automotriz (Computer Futures) en la banda de 110–140 €/h — mayor fortaleza de match de Daniel y banda alta del mercado.</li>\n      <li><span class=\"chip warn\">Mercado</span> <strong>Tarifa en caída, pipeline más débil</strong>: Freelancer-Kompass 2026 fija el promedio DACH en 103 €/h (desde 104); 49 % reportan peor pipeline interanual, los ingresos mensuales cayeron ~21 %. Java+IA/Kafka lo contrarresta con un premio del 15–25 %.</li>\n      <li><span class=\"chip good\">TED</span> <strong>SH-Navi Lote 1 (373604-2026)</strong>: presupuesto €320k, Java/Web/Open-Source — lo suficientemente pequeño para que twiceD concurse sola. Plazo según registro: lun 29/06 (verificar antes de postular).</li>\n      <li><span class=\"chip\">TED</span> <strong>Autobahn C-ITS (375613-2026)</strong>: valor estimado €13M, stack encaja, pero umbral de facturación/habilitación → se requiere socio. Plazo según registro: mar 30/06 (verificar antes de postular).</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>JetBrains distribuye siete roles de dev-tools</strong>: posiciones de Forward-Deployed-Engineer y AI Lead, remote-DE, herramientas JVM/agénticas — impulsadas por intriguing en el board.</li>\n      <li><span class=\"chip\">Remote</span> <strong>90 de 109 son remotas</strong>: Alemania sigue siendo, a pesar de los despidos recientes (ServiceNow, Zalando, Amdocs), el mercado de dev sénior más desabastecido de Europa Occidental — saldo positivo para contractors sénior.</li>\n      <li><span class=\"chip warn\">Gated</span> <strong>Seis roles high-stack visibles pero bloqueados</strong>: cuatro con habilitación SÜ2 (residencia en Alemania obligatoria) y dos presenciales en Suiza — conflicto con residencia en BR, listados con score bajo en el board.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die WM rollt, und für die DFB-Elf hätte sie kaum besser anlaufen können: 7:1 gegen Curaçao zum Auftakt, der höchste deutsche WM-Sieg seit dem 8:0 gegen Saudi-Arabien 2002. Heute gibt es vier Gruppenspiele zu sehen, am Freitag spielt Brasilien gegen Haiti, am Samstag ist Deutschland wieder dran — gegen die Elfenbeinküste. Daheim in Freiburg läuft derweil der teuerste Transfersommer der Vereinsgeschichte.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Deutschland 7:1 Curaçao</strong> (14.06., Houston): Havertz mit Doppelpack, dazu Musiala, Nmecha, Schlotterbeck, Brown, Undav. Nächstes Spiel Sa 20.06. gg. Elfenbeinküste, <strong>22:00 MESZ / 17:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute vier Spiele</strong>: Tschechien–Südafrika (18:00 MESZ / 13:00 BRT), Schweiz–Bosnien (21:00 / 16:00), Kanada–Katar (00:00 / 19:00), Mexiko–Südkorea (05:00 / 00:00 nachts).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 1:1 Marokko</strong> (13.06.) durch Vinícius Jr. — nur ein Punkt zum Start. Nächstes Spiel Fr 19.06. gg. Haiti, <strong>03:00 MESZ / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg rüstet auf</strong>: Torwart Mio Backhaus (~15 Mio. €, Vereinsrekord), Stürmer Keisuke Goto (~13 Mio.), Mittelfeld Rihito Yamamoto (~7 Mio.). Atubolu vor dem Abgang — aber noch ohne Käufer.</li>\n      <li><span class=\"chip\">WM</span> <strong>Messi egalisiert den Rekord</strong>: Hattrick beim 3:0 gegen Algerien, jetzt 16 WM-Tore — gleichauf mit Miroslav Klose.</li>\n      <li><span class=\"chip\">WM</span> <strong>England 4:2 Kroatien</strong>: Kane doppelt, dazu Bellingham und Rashford. Frankreich und Norwegen mit Mbappé- und Haaland-Doppelpacks ebenfalls siegreich.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison ist Geschichte</strong>: Bayern Meister (89 Pkt), Freiburg auf Platz 7. Volle Abschlusstabelle unten — bis August Sommerpause.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die WM rollt, und für die DFB-Elf hätte sie kaum besser anlaufen können: 7:1 gegen Curaçao zum Auftakt, der höchste deutsche WM-Sieg seit dem 8:0 gegen Saudi-Arabien 2002. Heute gibt es vier Gruppenspiele zu sehen, am Freitag spielt Brasilien gegen Haiti, am Samstag ist Deutschland wieder dran — gegen die Elfenbeinküste. Daheim in Freiburg läuft derweil der teuerste Transfersommer der Vereinsgeschichte.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Deutschland 7:1 Curaçao</strong> (14.06., Houston): Havertz mit Doppelpack, dazu Musiala, Nmecha, Schlotterbeck, Brown, Undav. Nächstes Spiel Sa 20.06. gg. Elfenbeinküste, <strong>22:00 MESZ / 17:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute vier Spiele</strong>: Tschechien–Südafrika (18:00 MESZ / 13:00 BRT), Schweiz–Bosnien (21:00 / 16:00), Kanada–Katar (00:00 / 19:00), Mexiko–Südkorea (05:00 / 00:00 nachts).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasilien 1:1 Marokko</strong> (13.06.) durch Vinícius Jr. — nur ein Punkt zum Start. Nächstes Spiel Fr 19.06. gg. Haiti, <strong>03:00 MESZ / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg rüstet auf</strong>: Torwart Mio Backhaus (~15 Mio. €, Vereinsrekord), Stürmer Keisuke Goto (~13 Mio.), Mittelfeld Rihito Yamamoto (~7 Mio.). Atubolu vor dem Abgang — aber noch ohne Käufer.</li>\n      <li><span class=\"chip\">WM</span> <strong>Messi egalisiert den Rekord</strong>: Hattrick beim 3:0 gegen Algerien, jetzt 16 WM-Tore — gleichauf mit Miroslav Klose.</li>\n      <li><span class=\"chip\">WM</span> <strong>England 4:2 Kroatien</strong>: Kane doppelt, dazu Bellingham und Rashford. Frankreich und Norwegen mit Mbappé- und Haaland-Doppelpacks ebenfalls siegreich.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison ist Geschichte</strong>: Bayern Meister (89 Pkt), Freiburg auf Platz 7. Volle Abschlusstabelle unten — bis August Sommerpause.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The World Cup is rolling, and for the German national team, it couldn't have started better: 7:1 against Curaçao in the opener, Germany's biggest World Cup win since the 8:0 against Saudi Arabia in 2002. Today there are four group matches to watch, on Friday Brazil plays Haiti, and on Saturday Germany is back — against Ivory Coast. Back home in Freiburg, meanwhile, the most expensive transfer summer in club history is underway.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Germany 7:1 Curaçao</strong> (June 14, Houston): Havertz with two goals, plus Musiala, Nmecha, Schlotterbeck, Brown, Undav. Next game Sat June 20 vs. Ivory Coast, <strong>10:00 p.m. CEST / 5:00 p.m. BRT</strong>.</li>\n      <li><span class=\"chip hot\">WC</span> <strong>Four games today</strong>: Czech Republic–South Africa (6:00 p.m. CEST / 1:00 p.m. BRT), Switzerland–Bosnia (9:00 p.m. / 4:00 p.m.), Canada–Qatar (midnight / 7:00 p.m.), Mexico–South Korea (5:00 a.m. / midnight overnight).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brazil 1:1 Morocco</strong> (June 13) via Vinícius Jr. — just one point at the start. Next game Fri June 19 vs. Haiti, <strong>3:00 a.m. CEST / 10:00 p.m. BRT</strong>.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>SC Freiburg strengthens</strong>: Goalkeeper Mio Backhaus (~€15M, club record), striker Keisuke Goto (~€13M), midfielder Rihito Yamamoto (~€7M). Atubolu facing exit — but still without a buyer.</li>\n      <li><span class=\"chip\">WC</span> <strong>Messi ties the record</strong>: Hat trick in 3:0 win vs. Algeria, now 16 World Cup goals — tied with Miroslav Klose.</li>\n      <li><span class=\"chip\">WC</span> <strong>England 4:2 Croatia</strong>: Kane double, plus Bellingham and Rashford. France and Norway also victorious with goals from Mbappé and Haaland.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season is history</strong>: Bayern champions (89 pts), Freiburg in 7th place. Full final table below — summer break until August.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Copa do Mundo está a todo vapor, e para a seleção alemã não podia ter começado melhor: 7:1 contra Curaçao na estreia, a maior vitória da Alemanha em Copas desde o 8:0 contra a Arábia Saudita em 2002. Hoje há quatro partidas de grupo para acompanhar, sexta-feira o Brasil enfrenta o Haiti, e sábado a Alemanha volta — contra a Costa do Marfim. Enquanto isso, em Freiburg, a pátria, o clube está vivendo o verão de transferências mais caro de sua história.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemanha 7:1 Curaçau</strong> (14.06., Houston): Havertz com duas bolas, além de Musiala, Nmecha, Schlotterbeck, Brown, Undav. Próximo jogo sáb. 20.06. contra Costa do Marfim, <strong>22:00 MESZ / 17:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Quatro partidas hoje</strong>: República Tcheca–África do Sul (18:00 MESZ / 13:00 BRT), Suíça–Bósnia (21:00 / 16:00), Canadá–Qatar (00:00 / 19:00), México–Coreia do Sul (05:00 / 00:00 à noite).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marrocos</strong> (13.06.) com gol de Vinícius Jr. — apenas um ponto no começo. Próximo jogo sex. 19.06. contra Haiti, <strong>03:00 MESZ / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>SC Freiburg se reforça</strong>: Goleiro Mio Backhaus (~15 mi. €, recorde do clube), atacante Keisuke Goto (~13 mi.), meia Rihito Yamamoto (~7 mi.). Atubolu de saída — mas ainda sem comprador.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Messi iguala o recorde</strong>: Hat-trick no 3:0 contra a Argélia, agora 16 gols em Copas — empatado com Miroslav Klose.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Inglaterra 4:2 Croácia</strong>: Kane duplamente, além de Bellingham e Rashford. França e Noruega também venceram, com dupletas de Mbappé e Haaland.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada é história</strong>: Bayern campeão (89 pts), Freiburg em 7º lugar. Tabela completa abaixo — pausa de verão até agosto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La Copa del Mundo está en pleno desarrollo, y para la selección alemana no pudo haber empezado mejor: 7:1 contra Curazao en la apertura, la mayor victoria de Alemania en Mundiales desde el 8:0 contra Arabia Saudita en 2002. Hoy hay cuatro partidos de grupo para ver, el viernes Brasil enfrenta a Haití, y el sábado Alemania regresa — contra Costa de Marfil. Mientras tanto, en casa en Freiburg, el verano de transferencias más caro de la historia del club está en marcha.</p>\n    <ul>\n      <li><span class=\"chip good\">DFB</span> <strong>Alemania 7:1 Curazao</strong> (14.06., Houston): Havertz con dos goles, más Musiala, Nmecha, Schlotterbeck, Brown, Undav. Próximo partido sáb. 20.06. contra Costa de Marfil, <strong>22:00 MESZ / 17:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Cuatro partidos hoy</strong>: República Checa–Sudáfrica (18:00 MESZ / 13:00 BRT), Suiza–Bosnia (21:00 / 16:00), Canadá–Qatar (00:00 / 19:00), México–Corea del Sur (05:00 / 00:00 de noche).</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasil 1:1 Marruecos</strong> (13.06.) por Vinícius Jr. — apenas un punto en el inicio. Próximo partido vie. 19.06. contra Haití, <strong>03:00 MESZ / 22:00 BRT</strong>.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>SC Freiburg se refuerza</strong>: Portero Mio Backhaus (~15 mio. €, récord del club), delantero Keisuke Goto (~13 mio.), mediocampista Rihito Yamamoto (~7 mio.). Atubolu en camino a salida — pero sin comprador aún.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Messi iguala el récord</strong>: Hat-trick en 3:0 contra Argelia, ahora 16 goles en Mundiales — empatado con Miroslav Klose.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Inglaterra 4:2 Croacia</strong>: Kane doblete, más Bellingham y Rashford. Francia y Noruega también vencieron con dobletes de Mbappé y Haaland.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>La temporada es historia</strong>: Bayern campeón (89 pts), Freiburg en 7º lugar. Tabla completa abajo — pausa de verano hasta agosto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Formel 1 ist in der Pause, aber die WM-Frage ist nach Barcelona offen wie lange nicht: <strong>Lewis Hamiltons</strong> erster Ferrari-Sieg und das Aus von Leader <strong>Kimi Antonelli</strong> haben die Tabelle durchgeschüttelt — der Vorsprung an der Spitze ist auf <strong>41&nbsp;Punkte</strong> geschrumpft (156 zu 115). Am übernächsten Wochenende geht es in <strong>Österreich</strong> (Red Bull Ring, 26.–28.06.) weiter — ein Heimspiel für Red Bull und eine Strecke, die in 71&nbsp;Runden alles entscheidet. Parallel hat die Langstrecke ihren Klassiker hinter sich: <strong>Toyota #7</strong> gewann die <strong>24h von Le Mans</strong> um 11&nbsp;Sekunden und führt die WEC-Hersteller-WM nun klar an. Alle F1-Session-Zeiten unten mit Streckenzeit, BRT und MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106). Nach Barcelona ist die Saison wieder offen — der Vorsprung war zuvor komfortabler.</li>\n      <li><span class=\"chip good\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong> in Barcelona (Lauf 7/22, So 14.06.). Russell P2, Norris P3 — erstes rein-britisches Podium seit 1968, Antonelli mit Defekt aus P2 raus.</li>\n      <li><span class=\"chip\">KONSTRUKTEURE</span> <strong>Mercedes 262</strong> vor Ferrari 190 und McLaren 141. Trotz Hamilton-Sieg bleibt der Mercedes-Vorsprung mit 72&nbsp;Punkten komfortabel.</li>\n      <li><span class=\"chip hot\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/22), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen <strong>So 28.06. 15:00 MESZ / 10:00 BRT</strong> — 71 Runden.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 gewinnt die 24h von Le Mans</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries, +11&nbsp;s vor BMW #20. Erster Toyota-Le-Mans-Sieg seit 2022.</li>\n      <li><span class=\"chip\">WEC</span> <strong>Toyota führt die Hersteller-WM</strong> mit 132&nbsp;Pkt vor BMW (96) und Ferrari (62) nach 3 von 8 Läufen. Nächster Lauf: <strong>6h Interlagos, So 12.07.</strong> — vor Daniels Haustür.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die Formel 1 ist in der Pause, aber die WM-Frage ist nach Barcelona offen wie lange nicht: <strong>Lewis Hamiltons</strong> erster Ferrari-Sieg und das Aus von Leader <strong>Kimi Antonelli</strong> haben die Tabelle durchgeschüttelt — der Vorsprung an der Spitze ist auf <strong>41&nbsp;Punkte</strong> geschrumpft (156 zu 115). Am übernächsten Wochenende geht es in <strong>Österreich</strong> (Red Bull Ring, 26.–28.06.) weiter — ein Heimspiel für Red Bull und eine Strecke, die in 71&nbsp;Runden alles entscheidet. Parallel hat die Langstrecke ihren Klassiker hinter sich: <strong>Toyota #7</strong> gewann die <strong>24h von Le Mans</strong> um 11&nbsp;Sekunden und führt die WEC-Hersteller-WM nun klar an. Alle F1-Session-Zeiten unten mit Streckenzeit, BRT und MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1-WM</span> <strong>Antonelli führt mit 156 Pkt</strong> vor Hamilton (115, −41) und Russell (106). Nach Barcelona ist die Saison wieder offen — der Vorsprung war zuvor komfortabler.</li>\n      <li><span class=\"chip good\">F1-SIEG</span> <strong>Hamiltons erster Ferrari-Sieg</strong> in Barcelona (Lauf 7/22, So 14.06.). Russell P2, Norris P3 — erstes rein-britisches Podium seit 1968, Antonelli mit Defekt aus P2 raus.</li>\n      <li><span class=\"chip\">KONSTRUKTEURE</span> <strong>Mercedes 262</strong> vor Ferrari 190 und McLaren 141. Trotz Hamilton-Sieg bleibt der Mercedes-Vorsprung mit 72&nbsp;Punkten komfortabel.</li>\n      <li><span class=\"chip hot\">NÄCHSTE F1</span> <strong>Österreich-GP (Lauf 8/22), Red Bull Ring</strong>, 26.–28.06., kein Sprint. Rennen <strong>So 28.06. 15:00 MESZ / 10:00 BRT</strong> — 71 Runden.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 gewinnt die 24h von Le Mans</strong> (13.–14.06.): Conway/Kobayashi/de&nbsp;Vries, +11&nbsp;s vor BMW #20. Erster Toyota-Le-Mans-Sieg seit 2022.</li>\n      <li><span class=\"chip\">WEC</span> <strong>Toyota führt die Hersteller-WM</strong> mit 132&nbsp;Pkt vor BMW (96) und Ferrari (62) nach 3 von 8 Läufen. Nächster Lauf: <strong>6h Interlagos, So 12.07.</strong> — vor Daniels Haustür.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Formula 1 is on break, but the championship question is as wide open as ever after Barcelona: <strong>Lewis Hamilton's</strong> first Ferrari win and the exit of leader <strong>Kimi Antonelli</strong> have shaken up the standings — the gap at the top has shrunk to just <strong>41&nbsp;points</strong> (156 to 115). The weekend after next, the action resumes in <strong>Austria</strong> (Red Bull Ring, 26–28 June) — a home race for Red Bull and a circuit that settles everything in 71&nbsp;laps. Meanwhile, endurance racing has wrapped its classic: <strong>Toyota #7</strong> won the <strong>24 Hours of Le Mans</strong> by 11&nbsp;seconds and now leads the WEC manufacturers' championship by a clear margin. All F1 session times below with track time, BRT, and MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 CHAMPIONSHIP</span> <strong>Antonelli leads with 156 pts</strong> ahead of Hamilton (115, −41) and Russell (106). After Barcelona the season is wide open again — the gap was more comfortable before.</li>\n      <li><span class=\"chip good\">F1 VICTORY</span> <strong>Hamilton's first Ferrari win</strong> in Barcelona (race 7/22, Sun 14 June). Russell P2, Norris P3 — first all-British podium since 1968, Antonelli retired from P2 with a technical fault.</li>\n      <li><span class=\"chip\">CONSTRUCTORS</span> <strong>Mercedes 262</strong> ahead of Ferrari 190 and McLaren 141. Despite Hamilton's win, Mercedes' lead remains comfortable at 72&nbsp;points.</li>\n      <li><span class=\"chip hot\">NEXT F1</span> <strong>Austria GP (race 8/22), Red Bull Ring</strong>, 26–28 June, no sprint. Race <strong>Sun 28 June 15:00 MESZ / 10:00 BRT</strong> — 71 laps.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 wins the 24 Hours of Le Mans</strong> (13–14 June): Conway/Kobayashi/de&nbsp;Vries, +11&nbsp;s ahead of BMW #20. Toyota's first Le Mans win since 2022.</li>\n      <li><span class=\"chip\">WEC</span> <strong>Toyota leads the manufacturers' championship</strong> with 132&nbsp;pts ahead of BMW (96) and Ferrari (62) after 3 of 8 races. Next race: <strong>6h Interlagos, Sun 12 July</strong> — on Daniel's doorstep.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Fórmula 1 está em pausa, mas a questão do campeonato está tão aberta quanto nunca depois de Barcelona: o <strong>primeiro triunfo em Ferrari de Lewis Hamilton</strong> e a saída do líder <strong>Kimi Antonelli</strong> mexeram na tabela — a diferença no topo encolheu para apenas <strong>41&nbsp;pontos</strong> (156 para 115). No fim de semana seguinte ao próximo, a ação volta em <strong>Áustria</strong> (Red Bull Ring, 26–28 de junho) — uma corrida em casa para a Red Bull e um circuito que decide tudo em 71&nbsp;voltas. Enquanto isso, a resistência fechou seu clássico: o <strong>Toyota #7</strong> venceu as <strong>24 Horas de Le Mans</strong> por 11&nbsp;segundos e agora lidera o campeonato de fabricantes da WEC com folga. Todos os horários das sessões de F1 abaixo com hora local, BRT e MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">CAMPEONATO F1</span> <strong>Antonelli lidera com 156 pts</strong> à frente de Hamilton (115, −41) e Russell (106). Depois de Barcelona o campeonato está aberto de novo — a diferença era mais confortável antes.</li>\n      <li><span class=\"chip good\">VITÓRIA F1</span> <strong>Primeira vitória de Hamilton na Ferrari</strong> em Barcelona (corrida 7/22, dom 14 de junho). Russell P2, Norris P3 — primeiro pódio 100% britânico desde 1968, Antonelli abandonou do P2 com defeito técnico.</li>\n      <li><span class=\"chip\">CONSTRUTORES</span> <strong>Mercedes 262</strong> à frente de Ferrari 190 e McLaren 141. Apesar da vitória de Hamilton, a liderança da Mercedes segue confortável em 72&nbsp;pontos.</li>\n      <li><span class=\"chip hot\">PRÓXIMA F1</span> <strong>GP da Áustria (corrida 8/22), Red Bull Ring</strong>, 26–28 de junho, sem sprint. Corrida <strong>dom 28 de junho 15:00 MESZ / 10:00 BRT</strong> — 71 voltas.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 vence as 24 Horas de Le Mans</strong> (13–14 de junho): Conway/Kobayashi/de&nbsp;Vries, +11&nbsp;s à frente do BMW #20. Primeira vitória de Toyota em Le Mans desde 2022.</li>\n      <li><span class=\"chip\">WEC</span> <strong>Toyota lidera o campeonato de fabricantes</strong> com 132&nbsp;pts à frente de BMW (96) e Ferrari (62) após 3 de 8 corridas. Próxima prova: <strong>6h de Interlagos, dom 12 de julho</strong> — na porta de casa de Daniel.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La Fórmula 1 está en pausa, pero la pregunta del campeonato está tan abierta como nunca después de Barcelona: la <strong>primera victoria en Ferrari de Lewis Hamilton</strong> y la salida del líder <strong>Kimi Antonelli</strong> han revuelto la tabla — la diferencia en la cima se ha reducido a apenas <strong>41&nbsp;puntos</strong> (156 a 115). El fin de semana siguiente al próximo, la acción regresa en <strong>Austria</strong> (Red Bull Ring, 26–28 de junio) — una carrera en casa para Red Bull y un circuito que lo decide todo en 71&nbsp;vueltas. Mientras tanto, la resistencia cerró su clásico: el <strong>Toyota #7</strong> ganó las <strong>24 Horas de Le Mans</strong> por 11&nbsp;segundos y ahora lidera el campeonato de fabricantes de la WEC con una ventaja clara. Todos los horarios de las sesiones de F1 debajo con hora local, BRT y MESZ.</p>\n    <ul>\n      <li><span class=\"chip hot\">CAMPEONATO F1</span> <strong>Antonelli lidera con 156 pts</strong> delante de Hamilton (115, −41) y Russell (106). Después de Barcelona el campeonato está abierto de nuevo — la ventaja era más cómoda antes.</li>\n      <li><span class=\"chip good\">VICTORIA F1</span> <strong>Primera victoria de Hamilton en Ferrari</strong> en Barcelona (carrera 7/22, dom 14 de junio). Russell P2, Norris P3 — primer podio 100% británico desde 1968, Antonelli se retiró desde P2 por falla técnica.</li>\n      <li><span class=\"chip\">CONSTRUCTORES</span> <strong>Mercedes 262</strong> adelante de Ferrari 190 y McLaren 141. A pesar de la victoria de Hamilton, la ventaja de Mercedes sigue siendo cómoda en 72&nbsp;puntos.</li>\n      <li><span class=\"chip hot\">PRÓXIMA F1</span> <strong>GP de Austria (carrera 8/22), Red Bull Ring</strong>, 26–28 de junio, sin sprint. Carrera <strong>dom 28 de junio 15:00 MESZ / 10:00 BRT</strong> — 71 vueltas.</li>\n      <li><span class=\"chip good\">LE MANS</span> <strong>Toyota #7 gana las 24 Horas de Le Mans</strong> (13–14 de junio): Conway/Kobayashi/de&nbsp;Vries, +11&nbsp;s adelante de BMW #20. Primera victoria de Toyota en Le Mans desde 2022.</li>\n      <li><span class=\"chip\">WEC</span> <strong>Toyota lidera el campeonato de fabricantes</strong> con 132&nbsp;pts adelante de BMW (96) y Ferrari (62) tras 3 de 8 carreras. Próxima carrera: <strong>6h de Interlagos, dom 12 de julio</strong> — en la puerta de la casa de Daniel.</li>\n    </ul></div>"
