<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {

  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

      <span class="cursor-block" aria-hidden="true"></span>

  </div>

  <div class="header-right">

            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">

    </div>

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red

             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <button class="status-btn lang-trigger" id="lang-trigger" type="button"

            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

        "en": "<div class=\"tldr\"><p class=\"lead\">The most compelling contradiction this week sits in Frankfurt: the ECB raised rates by 25 basis points on 06-11, citing Middle East war inflation pressure and an upward-revised 3.0% inflation forecast for 2026. Yet since then, Brent oil has fallen to ~$72, the lowest since February, because oil flows through the Strait of Hormuz have resumed. This erodes the very premise behind the ECB's hike — three weeks before the next meeting on 07-23. For you as a EUR earner, that means the strong euro rate holding EUR/BRL at <strong>5.9486</strong> rests on a foundation that's shifting.</p>\n    <ul>\n      <li><span class=\"chip hot\">ECB</span> <strong>+25 bp on 06-11</strong> (deposit rate 2.25%) against Middle East inflation — but Brent fell to ~$72 since, premise shaky before 07-23.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5.9486</strong> (ECB Fix, 07-03), cross-check clean (0.0% deviation, EUR/USD drawn independently).</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.196</strong>, <strong>DXY ~100.8</strong> (approximate, intraday noise) — dollar soft after weak US jobs report.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Jobs report disappoints</strong>: +57K vs. ~115K expected in June, unemployment rate 4.2% (only from falling participation). Sept hike odds ~50% (from ~67%) — CME FedWatch snapshot 07-02/03.</li>\n      <li><span class=\"chip\">USA</span> <strong>US market Fri 07-03 closed</strong> (July 4 falls on Sat) — US figures are Thu/Fri reads, no Saturday session.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> after third 25-bp cut on 06-17; IPCA-15 12-month at 4.80%, still above target.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal on edge</strong>: RARDP report (05-25) projects R$60.3 billion primary deficit 2026 pre-deductions; post-deductions R$4.1 billion surplus (target center R$34.3 billion) — spending         "pt": "<div class=\"tldr\"><p class=\"lead\">A contradição mais fascinante desta semana fica em Frankfurt: o Banco Central Europeu elevou as três taxas de política em 25 pontos-base em 11.06, fundamentado na pressão inflacionária da guerra no Oriente Médio e uma previsão de inflação de 3,0% para 2026 revisada para cima. Mas desde então, o Brent recuou para ~US$ 72, o menor patamar desde fevereiro, porque os fluxos de petróleo pelo Estreito de Ormuz retomaram. Isto corrói precisamente a premissa em que se assentou a alta do BCE — três semanas antes da próxima reunião em 23.07. Para você como ganho em EUR, isto significa que a taxa forte do euro mantendo EUR/BRL em <strong>5,9486</strong> descansa sobre um alicerce que está mudando.</p>\n    <ul>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 bp em 11.06</strong> (taxa de depósito 2,25%) contra inflação do Oriente Médio — mas Brent recuou para ~US$ 72 desde então, premissa abalada antes de 23.07.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,9486</strong> (Câmbio BCB, 03.07), verificação cruzada limpa (desvio 0,0%, EUR/USD traçado independentemente).</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,196</strong>, <strong>DXY ~100,8</strong> (aproximado, ruído intraday) — dólar fraco após relatório débil de empregos dos EUA.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Relatório de empregos decepciona</strong>: +57 mil versus ~115 mil esperados em junho, desemprego 4,2% (apenas por queda na taxa de participação). Probabilidade de alta em setembro ~50% (de ~67%) — CME FedWatch 02./03.07.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Mercados EUA fechados sex 03.07</strong> (4 de julho cai em sábado) — números dos EUA são leituras qui/sex, sem sessão de sábado.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> após terceiro corte de 25 bp em 17.06; IPCA-15 12 meses em 4,80%, ainda acima da meta.</li>\n      <li><span         "es": "<div class=\"tldr\"><p class=\"lead\">La contradicción más cautivadora de esta semana está en Frankfurt: el Banco Central Europeo elevó las tres tasas de política en 25 puntos base el 11.06, fundamentado en la presión inflacionaria de la guerra en Oriente Medio y una previsión de inflación del 3,0% para 2026 revisada al alza. Pero desde entonces, el Brent se ha desplomado a ~$72, el nivel más bajo desde febrero, porque los flujos de petróleo a través del Estrecho de Ormuz han reanudado. Esto erosiona precisamente la premisa en la que se basó la subida del BCE — tres semanas antes de la próxima reunión el 23.07. Para ti como ganador en EUR, esto significa que la tasa fuerte del euro manteniendo EUR/BRL en <strong>5,9486</strong> descansa en un cimiento que está cambiando.</p>\n    <ul>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 pb el 11.06</strong> (tasa de depósito 2,25%) contra inflación de Oriente Medio — pero Brent se desplomó a ~$72 desde entonces, premisa inestable antes del 23.07.</li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,9486</strong> (Fijo BCE, 03.07), verificación cruzada limpia (desviación 0,0%, EUR/USD trazado independientemente).</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,196</strong>, <strong>DXY ~100,8</strong> (aproximado, ruido intradiario) — dólar débil tras informe débil de empleos en EUA.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Informe de empleos decepciona</strong>: +57 mil versus ~115 mil esperados en junio, desempleo 4,2% (solo por caída en tasa de participación). Probabilidad de alza en septiembre ~50% (de ~67%) — snapshot CME FedWatch 02./03.07.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Mercado EUA viernes 03.07 cerrado</strong> (4 de julio cae en sábado) — cifras de EUA son lecturas jue/vie, sin sesión de sábado.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> después de tercer corte de 25 pb el 17.06; IPCA-15 12 meses en 4,80%, aún por encima de meta.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal en la cuerda floja</strong>: Reporte RARDP (25.05) proyecta R$ 60,3 mil millones de déficit primario en 2026 antes de deducciones; después de deducciones superávit de R$ 4,1 mil millones (centro de meta R$ 34,3 mil millones) — bloqueo de gastos elevado a R$ 23,7 mil millones (de R$ 1,6 mil millones).</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS 5 años 124,9 bp</strong> (03.07, sin cambios) — prima de riesgo tranquila, se mueve lentamente.</li>\n      <li><span class=\"chip good\">Timing</span> <strong>Visión de cambio</strong>: EUR/BRL es firme, pero la fortaleza del euro descansa en la historia del petróleo del BCE — si ella desaparece, el euro pierde un argumento. Corto plazo sin presión de compra, mediano plazo riesgo fiscal BR.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Über das lange US-Feiertagswochenende steht der Aktien-Tape still — die letzte Sitzung war Donnerstag, der 2. Juli, und die hatte eine klare Botschaft: Ein schwacher Juni-Jobs-Report (nur 57.000 neue Stellen) drückte die Zinsangst, der Dow schloss auf Rekord, während die Nasdaq fiel. Die frische Story kommt aber aus Krypto, das rund um die Uhr weiterläuft: Bitcoin klettert wieder über 62.000 $, und zum ersten Mal seit zehn Tagen kaufen die Bitcoin-ETFs netto zu (+222 Mio. $) — die Wende, auf die dieser Brief gestern noch warten wollte. Ethereum führt die Erholung mit +11,5 % über sieben Tage klar an. Bei den Einzelaktien war der 2. Juli ein Tag extremer Streuung: Tesla −7,5 % trotz Auslieferungs-Rekord, Meta −4,9 % nach Zuckerbergs KI-Eingeständnis, Apple als einsamer Gewinner +4,8 %.</p>\n    <ul>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~62.550 $</strong> (+1,8 % 24h, +4,0 % 7d) — und <strong>+222 Mio. $ ETF-Zufluss</strong> beendet eine 10-Tage-Abfluss-Serie. Die Flow-Wende ist da.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH ~1.756 $</strong> (+3,0 % 24h, <strong>+11,5 % 7d</strong>) — schlägt Bitcoin diese Woche deutlich, klare relative Stärke.</li>\n      <li><span class=\"chip hot\">AKTIEN</span> <strong>Dow-Rekord 52.900</strong> (+1,14 %), aber <strong>Nasdaq −0,80 %</strong>, S&amp;P punktgenau flach — Rotation raus aus Tech bleibt das Signal.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49 %</strong> auf 393,45 $ — Q2-Auslieferungen (480.126, +25 % YoY) schlagen die Erwartung um ~74.000 Stück, Kurs fällt trotzdem: „Sell the news\".</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90 %</strong> auf 582,90 $ — Zuckerberg räumt ein, KI-Agenten-Fortschritt sei „langsamer als erwartet\".</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84 %</strong> auf ~308,63 $ — einziger großer Gewinner, stützt fast im Alleingang den S&amp;P 500.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~4.176 $/oz</strong> — schwacher Arbeitsmarkt kühlt die Zinsangst, klassisches Gold-Umfeld.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~70,57 $</strong> (−0,83 %), WTI ~68,55 $ — bleibt weich; Rohstoff-Futures über den US-Feiertag dunkel.</li>\n      <li><span class=\"chip\">SEKTOREN</span> DOGE +4,1 %, SHIB +3,2 %, IMX +7,7 %, TAO 214 $ — folgen dem Core-Rebound nach oben.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Über das lange US-Feiertagswochenende steht der Aktien-Tape still — die letzte Sitzung war Donnerstag, der 2. Juli, und die hatte eine klare Botschaft: Ein schwacher Juni-Jobs-Report (nur 57.000 neue Stellen) drückte die Zinsangst, der Dow schloss auf Rekord, während die Nasdaq fiel. Die frische Story kommt aber aus Krypto, das rund um die Uhr weiterläuft: Bitcoin klettert wieder über 62.000 $, und zum ersten Mal seit zehn Tagen kaufen die Bitcoin-ETFs netto zu (+222 Mio. $) — die Wende, auf die dieser Brief gestern noch warten wollte. Ethereum führt die Erholung mit +11,5 % über sieben Tage klar an. Bei den Einzelaktien war der 2. Juli ein Tag extremer Streuung: Tesla −7,5 % trotz Auslieferungs-Rekord, Meta −4,9 % nach Zuckerbergs KI-Eingeständnis, Apple als einsamer Gewinner +4,8 %.</p>\n    <ul>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~62.550 $</strong> (+1,8 % 24h, +4,0 % 7d) — und <strong>+222 Mio. $ ETF-Zufluss</strong> beendet eine 10-Tage-Abfluss-Serie. Die Flow-Wende ist da.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH ~1.756 $</strong> (+3,0 % 24h, <strong>+11,5 % 7d</strong>) — schlägt Bitcoin diese Woche deutlich, klare relative Stärke.</li>\n      <li><span class=\"chip hot\">AKTIEN</span> <strong>Dow-Rekord 52.900</strong> (+1,14 %), aber <strong>Nasdaq −0,80 %</strong>, S&amp;P punktgenau flach — Rotation raus aus Tech bleibt das Signal.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49 %</strong> auf 393,45 $ — Q2-Auslieferungen (480.126, +25 % YoY) schlagen die Erwartung um ~74.000 Stück, Kurs fällt trotzdem: „Sell the news\".</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90 %</strong> auf 582,90 $ — Zuckerberg räumt ein, KI-Agenten-Fortschritt sei „langsamer als erwartet\".</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84 %</strong> auf ~308,63 $ — einziger großer Gewinner, stützt fast im Alleingang den S&amp;P 500.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~4.176 $/oz</strong> — schwacher Arbeitsmarkt kühlt die Zinsangst, klassisches Gold-Umfeld.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~70,57 $</strong> (−0,83 %), WTI ~68,55 $ — bleibt weich; Rohstoff-Futures über den US-Feiertag dunkel.</li>\n      <li><span class=\"chip\">SEKTOREN</span> DOGE +4,1 %, SHIB +3,2 %, IMX +7,7 %, TAO 214 $ — folgen dem Core-Rebound nach oben.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Over the long US holiday weekend, the equity tape stands still — last session was Thursday, July 2nd, and it sent a clear message: a weak June jobs report (only 57,000 new positions) pushed rate-cut anxiety, the Dow closed at record while the Nasdaq fell. The fresh story comes from crypto, which trades round the clock: Bitcoin climbs back above $62,000, and for the first time in ten days, Bitcoin ETFs are buying net (+$222M) — the turn this brief was waiting for yesterday. Ethereum leads the recovery clearly with +11.5% over seven days. On individual stocks, July 2nd was a day of extreme dispersion: Tesla −7.5% despite delivery record, Meta −4.9% after Zuckerberg's AI admission, Apple as sole winner +4.8%.</p>\n    <ul>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~$62,550</strong> (+1.8% 24h, +4.0% 7d) — and <strong>+$222M ETF inflow</strong> ends a 10-day outflow streak. The flow turn is here.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH ~$1,756</strong> (+3.0% 24h, <strong>+11.5% 7d</strong>) — beats Bitcoin this week clearly, obvious relative strength.</li>\n      <li><span class=\"chip hot\">STOCKS</span> <strong>Dow record 52,900</strong> (+1.14%), but <strong>Nasdaq −0.80%</strong>, S&amp;P dead flat — rotation out of tech remains the signal.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7.49%</strong> to $393.45 — Q2 deliveries (480,126, +25% YoY) beat guidance by ~74,000 units, price falls anyway: \"sell the news\".</li>\n      <li><span class=\"chip\">META</span> <strong>META −4.90%</strong> to $582.90 — Zuckerberg admits AI agent progress is \"slower than expected\".</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4.84%</strong> to ~$308.63 — only major winner, props up S&amp;P 500 almost single-handedly.</li>\n      <li><span class=\"chip good\">GOLD</span> <strong>Gold ~$4,176/oz</strong> — weak labor market cools rate anxiety, textbook gold environment.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$70.57</strong> (−0.83%), WTI ~$68.55 — stays soft; commodity futures dark over US holiday.</li>\n      <li><span class=\"chip\">SECTORS</span> DOGE +4.1%, SHIB +3.2%, IMX +7.7%, TAO $214 — follow core rebound upward.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sobre o longo fim de semana de feriado americano, a fita de ações fica parada — a última sessão foi quinta-feira, 2 de julho, e enviou uma mensagem clara: um relatório fraco de empregos em junho (apenas 57 mil novas posições) elevou a ansiedade de corte de juros, o Dow fechou em recorde enquanto o Nasdaq caiu. A história fresca vem da cripto, que negocia ininterruptamente: Bitcoin sobe acima de $62 mil novamente, e pela primeira vez em dez dias os ETFs de Bitcoin estão comprando líquido (+$222 mi) — a virada que este boletim esperava ontem. Ethereum lidera a recuperação com +11,5% em sete dias. Em ações individuais, 2 de julho foi um dia de dispersão extrema: Tesla −7,5% apesar do recorde de entregas, Meta −4,9% após confissão de IA de Zuckerberg, Apple como único vencedor +4,8%.</p>\n    <ul>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~$62.550</strong> (+1,8% 24h, +4,0% 7d) — e <strong>+$222 mi fluxo ETF</strong> encerra uma sequência de 10 dias de saída. A virada de fluxo chegou.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH ~$1.756</strong> (+3,0% 24h, <strong>+11,5% 7d</strong>) — supera Bitcoin esta semana claramente, força relativa óbvia.</li>\n      <li><span class=\"chip hot\">AÇÕES</span> <strong>Recorde Dow 52.900</strong> (+1,14%), mas <strong>Nasdaq −0,80%</strong>, S&amp;P em zero — rotação para fora de tech permanece o sinal.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7,49%</strong> para $393,45 — entregas Q2 (480.126, +25% ano a ano) superaram guidance em ~74 mil unidades, preço cai mesmo assim: \"vender a notícia\".</li>\n      <li><span class=\"chip\">META</span> <strong>META −4,90%</strong> para $582,90 — Zuckerberg admite progresso de IA em agentes é \"mais lento do que esperado\".</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4,84%</strong> para ~$308,63 — único grande vencedor, sustenta S&amp;P 500 quase sozinha.</li>\n      <li><span class=\"chip good\">OURO</span> <strong>Ouro ~$4.176/oz</strong> — mercado de trabalho fraco esfria ansiedade de juros, ambiente de ouro clássico.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~$70,57</strong> (−0,83%), WTI ~$68,55 — fica mole; futuros de commodities escuros durante feriado americano.</li>\n      <li><span class=\"chip\">SETORES</span> DOGE +4,1%, SHIB +3,2%, IMX +7,7%, TAO $214 — seguem recuperação do núcleo para cima.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Durante el largo fin de semana de feriado estadounidense, la cinta de acciones está parada — la última sesión fue jueves, 2 de julio, y envió un mensaje claro: un débil reporte de empleos de junio (apenas 57,000 nuevas posiciones) elevó la ansiedad por recortes de tasas, el Dow cerró en máximos mientras el Nasdaq cayó. La historia nueva viene de cripto, que cotiza ininterrumpidamente: Bitcoin sube de nuevo arriba de $62,000, y por primera vez en diez días los ETFs de Bitcoin están comprando neto (+$222 M) — el giro que este boletín esperaba ayer. Ethereum lidera la recuperación claramente con +11.5% en siete días. En acciones individuales, 2 de julio fue un día de dispersión extrema: Tesla −7.5% a pesar del récord de entregas, Meta −4.9% tras la confesión de IA de Zuckerberg, Apple como único ganador +4.8%.</p>\n    <ul>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC ~$62.550</strong> (+1.8% 24h, +4.0% 7d) — y <strong>+$222 M flujo ETF</strong> termina una racha de 10 días de salidas. El giro de flujo está aquí.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH ~$1.756</strong> (+3.0% 24h, <strong>+11.5% 7d</strong>) — supera Bitcoin esta semana claramente, fortaleza relativa obvia.</li>\n      <li><span class=\"chip hot\">ACCIONES</span> <strong>Récord Dow 52.900</strong> (+1.14%), pero <strong>Nasdaq −0.80%</strong>, S&amp;P en cero — rotación fuera de tech permanece la señal.</li>\n      <li><span class=\"chip hot\">TESLA</span> <strong>TSLA −7.49%</strong> a $393.45 — entregas Q2 (480.126, +25% año a año) superaron guía por ~74,000 unidades, precio cae de todas formas: \"vender la noticia\".</li>\n      <li><span class=\"chip\">META</span> <strong>META −4.90%</strong> a $582.90 — Zuckerberg admite progreso de IA en agentes es \"más lento de lo esperado\".</li>\n      <li><span class=\"chip good\">APPLE</span> <strong>AAPL +4.84%</strong> a ~$308.63 — único ganador mayor, sostiene S&amp;P 500 casi en solitario.</li>\n      <li><span class=\"chip good\">ORO</span> <strong>Oro ~$4.176/oz</strong> — mercado laboral débil enfría la ansiedad por tasas, ambiente clásico para oro.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~$70.57</strong> (−0.83%), WTI ~$68.55 — se mantiene suave; futuros de commodities oscuros durante feriado estadounidense.</li>\n      <li><span class=\"chip\">SECTORES</span> DOGE +4.1%, SHIB +3.2%, IMX +7.7%, TAO $214 — siguen la recuperación central hacia arriba.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Wochenende, drei Notfall-Patches und eine KEV-Frist, die heute abläuft: Adobe, Citrix und Microsoft haben binnen 96 Stunden je eine aktiv ausgenutzte Lücke geschlossen. Der rote Faden ist nicht der einzelne Bug, sondern das Tempo — bei ColdFusion vergingen zwischen „öffentlich\" und „im Feld angegriffen\" keine Stunden, sondern buchstäblich Stunden. Wenn du eine dieser drei Boxen im Netz hast, ist heute kein Newsletter-Tag, sondern ein Patch-Tag.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>ColdFusion CVSS 10,0</strong>: Adobe-Notfall-Bulletin APSB26-68 schließt CVE-2026-48282 (Path-Traversal → beliebiges Schreiben) — binnen Stunden nach Offenlegung ausgenutzt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Citrix „CitrixBleed\"-Neuauflage</strong>: CVE-2026-8451 (CVSS 8,8) leckt NetScaler-Speicher über den SAML-IdP — Patch am 30.06., Exploits &lt;24 h später.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint in der CISA-KEV</strong>: CVE-2026-45659 (RCE, 8,8) — die FCEB-Behörden-Frist läuft <em>heute</em> (04.07.) ab.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12 kommt im Juli</strong>: Install-Skripte, Git-Deps und Remote-Tarballs sind künftig standardmäßig aus — direkte Antwort auf die Lieferketten-Angriffe.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Let's Encrypt kappt <code>tlsclient</code></strong>: das ACME-Profil endet am 08.07., weil Chrome Client- und Server-Auth in getrennte PKIs zwingt.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> (01.07.) — Patch auf dem Juni-Major; nichts Dramatisches, aber die aktuelle Zeile.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA rückt näher</strong>: ab 11.09. gelten die Melde-Pflichten (24 h / 72 h / 14 Tage) — Hintergrund, kein Wochentermin.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">DE</span> <span class=\"chip\">BR</span> <strong>Ruhiger Tag regional</strong>: keine frische SAP-/DE-OSS- oder BR-Tech-Meldung — heute trägt die Security-Welle den Brief.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein Wochenende, drei Notfall-Patches und eine KEV-Frist, die heute abläuft: Adobe, Citrix und Microsoft haben binnen 96 Stunden je eine aktiv ausgenutzte Lücke geschlossen. Der rote Faden ist nicht der einzelne Bug, sondern das Tempo — bei ColdFusion vergingen zwischen „öffentlich\" und „im Feld angegriffen\" keine Stunden, sondern buchstäblich Stunden. Wenn du eine dieser drei Boxen im Netz hast, ist heute kein Newsletter-Tag, sondern ein Patch-Tag.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>ColdFusion CVSS 10,0</strong>: Adobe-Notfall-Bulletin APSB26-68 schließt CVE-2026-48282 (Path-Traversal → beliebiges Schreiben) — binnen Stunden nach Offenlegung ausgenutzt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Citrix „CitrixBleed\"-Neuauflage</strong>: CVE-2026-8451 (CVSS 8,8) leckt NetScaler-Speicher über den SAML-IdP — Patch am 30.06., Exploits &lt;24 h später.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint in der CISA-KEV</strong>: CVE-2026-45659 (RCE, 8,8) — die FCEB-Behörden-Frist läuft <em>heute</em> (04.07.) ab.</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12 kommt im Juli</strong>: Install-Skripte, Git-Deps und Remote-Tarballs sind künftig standardmäßig aus — direkte Antwort auf die Lieferketten-Angriffe.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Let's Encrypt kappt <code>tlsclient</code></strong>: das ACME-Profil endet am 08.07., weil Chrome Client- und Server-Auth in getrennte PKIs zwingt.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> (01.07.) — Patch auf dem Juni-Major; nichts Dramatisches, aber die aktuelle Zeile.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA rückt näher</strong>: ab 11.09. gelten die Melde-Pflichten (24 h / 72 h / 14 Tage) — Hintergrund, kein Wochentermin.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">DE</span> <span class=\"chip\">BR</span> <strong>Ruhiger Tag regional</strong>: keine frische SAP-/DE-OSS- oder BR-Tech-Meldung — heute trägt die Security-Welle den Brief.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">One weekend, three emergency patches, and a KEV deadline that expires today: Adobe, Citrix, and Microsoft closed one actively exploited hole each within 96 hours. The thread isn't the individual bug, but the speed — with ColdFusion, the window between \"public\" and \"under attack in the field\" wasn't hours, but literal hours. If you run one of these three boxes on the net, today isn't a newsletter day—it's a patch day.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>ColdFusion CVSS 10.0</strong>: Adobe emergency bulletin APSB26-68 closes CVE-2026-48282 (Path-Traversal → arbitrary write) — exploited within hours of disclosure.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Citrix \"CitrixBleed\" redux</strong>: CVE-2026-8451 (CVSS 8.8) leaks NetScaler memory via SAML IdP — patch on 06/30, exploits &lt;24 h later.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint in CISA KEV</strong>: CVE-2026-45659 (RCE, 8.8) — the FCEB agency deadline runs out <em>today</em> (07/04).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12 arrives in July</strong>: Install scripts, Git deps, and remote tarballs are off by default going forward — direct answer to supply-chain worms.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Let's Encrypt ends <code>tlsclient</code></strong>: the ACME profile sunsets on 07/08, because Chrome forces client and server auth into separate PKIs.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> (07/01) — patch on the June major; nothing dramatic, but the current line.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>CRA moves closer</strong>: as of 09/11, reporting mandates kick in (24 h / 72 h / 14 days) — background, not a week marker.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">DE</span> <span class=\"chip\">BR</span> <strong>Quiet day regionally</strong>: no fresh SAP/DE-OSS or BR-tech news — today the security wave carries the brief.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um fim de semana, três patches de emergência e um prazo do KEV que vence hoje: Adobe, Citrix e Microsoft fecharam cada uma uma brecha ativamente explorada em 96 horas. O fio condutor não é o bug individual, mas a velocidade — com ColdFusion, a janela entre \"público\" e \"sob ataque no campo\" não foi horas, mas literalmente horas. Se você executa uma dessas três caixas na rede, hoje não é um dia de boletim informativo — é um dia de patch.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>ColdFusion CVSS 10,0</strong>: boletim de emergência Adobe APSB26-68 fecha CVE-2026-48282 (Path-Traversal → escrita arbitrária) — explorada em horas após divulgação.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Citrix \"CitrixBleed\" redux</strong>: CVE-2026-8451 (CVSS 8,8) vazamento de memória NetScaler via SAML IdP — patch em 30/06, exploits &lt;24 h depois.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">USA</span> <strong>SharePoint no KEV CISA</strong>: CVE-2026-45659 (RCE, 8,8) — o prazo da agência FCEB termina <em>hoje</em> (04/07).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12 chega em julho</strong>: scripts de instalação, deps Git e tarballs remotos estão desativados por padrão — resposta direta aos worms da cadeia de suprimentos.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Let's Encrypt encerra <code>tlsclient</code></strong>: o perfil ACME termina em 08/07, porque Chrome força autenticação de cliente e servidor em PKIs separadas.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> (01/07) — patch na versão major de junho; nada dramático, mas a linha atual.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EU</span> <strong>CRA se aproxima</strong>: a partir de 11/09, os requisitos de relatório entram em vigor (24 h / 72 h / 14 dias) — contexto, não um marcador da semana.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">DE</span> <span class=\"chip\">BR</span> <strong>Dia tranquilo regionalmente</strong>: sem notícias frescas de SAP/OSS-DE ou tech-BR — hoje a onda de segurança carrega o boletim.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un fin de semana, tres parches de emergencia y un plazo de KEV que vence hoy: Adobe, Citrix y Microsoft cerraron cada una una brecha activamente explotada en 96 horas. El hilo conductor no es el error individual, sino la velocidad — con ColdFusion, la ventana entre \"público\" y \"bajo ataque en el campo\" no fue horas, sino literalmente horas. Si corres uno de estos tres equipos en la red, hoy no es un día de boletín — es un día de parche.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>ColdFusion CVSS 10,0</strong>: boletín de emergencia Adobe APSB26-68 cierra CVE-2026-48282 (Path-Traversal → escritura arbitraria) — explotada en horas tras divulgación.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Citrix \"CitrixBleed\" redux</strong>: CVE-2026-8451 (CVSS 8,8) filtra memoria NetScaler vía IdP SAML — parche el 30/06, exploits &lt;24 h después.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">USA</span> <strong>SharePoint en KEV CISA</strong>: CVE-2026-45659 (RCE, 8,8) — el plazo de agencia FCEB vence <em>hoy</em> (04/07).</li>\n      <li><span class=\"chip good\">OSS</span> <span class=\"chip\">Global</span> <strong>npm v12 llega en julio</strong>: scripts de instalación, dependencias Git y tarballs remotos están desactivados por defecto — respuesta directa a gusanos de cadena de suministro.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Let's Encrypt termina <code>tlsclient</code></strong>: el perfil ACME expira el 08/07, porque Chrome obliga autenticación de cliente y servidor en PKIs separadas.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.5</strong> (01/07) — parche en el major de junio; nada dramático, pero la línea actual.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">EU</span> <strong>CRA se acerca</strong>: a partir del 11/09, entran en vigor los mandatos de reporte (24 h / 72 h / 14 días) — contexto, no marcador de semana.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">DE</span> <span class=\"chip\">BR</span> <strong>Día tranquilo regionalmente</strong>: sin noticias frescas de SAP/OSS-DE o tech-BR — hoy la onda de seguridad lleva el boletín.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Geschichten prallen diese Woche aufeinander. Anthropic macht Claude Sonnet 5 zum Standardmodell für Free, Pro und Claude Code — agentisches Coding fast auf dem Niveau des alten Opus, zum halben Preis. Und GitLab legt Zahlen vor, die den ganzen Hype erden: 78–79 % der Entwickler tippen mit KI schneller, aber die Software wird deswegen nicht schneller ausgeliefert. Der Flaschenhals ist nur umgezogen — vom Schreiben zum Reviewen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 ist ab 30.06. der Default</strong> für Free/Pro und in jeder neuen Claude-Code-Session — agentisches Coding nahe altem Opus-Niveau, aber im Benchmark darunter.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Pro (Anbieter-Zahlen):</strong> Sonnet 5 63,2 % vs. Opus 4.8 69,2 % vs. Sonnet 4.6 58,1 %. Günstiger und schneller — nicht besser.</li>\n      <li><span class=\"chip good\">Preis</span> <strong>2 $/10 $ pro Mio. Token</strong> (In/Out) bis 31.08., danach 3 $/15 $. Der eigentliche Hebel für agentische Loops.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Der „AI-Paradox\"</strong> (GitLab): schneller tippen, aber nicht schneller liefern — der Engpass wanderte zum Review (85 %), Governance hinkt hinterher (80 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code „most loved\" bei Senioren</strong> (46 %), aber Arbeitsplatz-Adoption nur ~18 % — gleichauf mit Cursor, hinter Copilot (29 %). Kein sauberer Überhol-Vorgang.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Claude Code v2.1.196–197</strong> schließt eine MCP-Supply-Chain-Lücke: committete Configs spawnen keine MCP-Server mehr ohne Zustimmung.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 2.3 + iOS-Beta</strong>, Cline weiter tägliche Releases, OpenHands 1.0 auf neuem Agent-SDK. Bewegung überall — außer bei Aider.</li>\n      <li><span class=\"chip\">Local</span> <strong>Ruhig bei Open-Weights:</strong> keine notable Coding-Modell-Releases in den letzten 24 h — Qwen/DeepSeek/Codestral ohne frischen Tag.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Geschichten prallen diese Woche aufeinander. Anthropic macht Claude Sonnet 5 zum Standardmodell für Free, Pro und Claude Code — agentisches Coding fast auf dem Niveau des alten Opus, zum halben Preis. Und GitLab legt Zahlen vor, die den ganzen Hype erden: 78–79 % der Entwickler tippen mit KI schneller, aber die Software wird deswegen nicht schneller ausgeliefert. Der Flaschenhals ist nur umgezogen — vom Schreiben zum Reviewen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 ist ab 30.06. der Default</strong> für Free/Pro und in jeder neuen Claude-Code-Session — agentisches Coding nahe altem Opus-Niveau, aber im Benchmark darunter.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Pro (Anbieter-Zahlen):</strong> Sonnet 5 63,2 % vs. Opus 4.8 69,2 % vs. Sonnet 4.6 58,1 %. Günstiger und schneller — nicht besser.</li>\n      <li><span class=\"chip good\">Preis</span> <strong>2 $/10 $ pro Mio. Token</strong> (In/Out) bis 31.08., danach 3 $/15 $. Der eigentliche Hebel für agentische Loops.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Der „AI-Paradox\"</strong> (GitLab): schneller tippen, aber nicht schneller liefern — der Engpass wanderte zum Review (85 %), Governance hinkt hinterher (80 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code „most loved\" bei Senioren</strong> (46 %), aber Arbeitsplatz-Adoption nur ~18 % — gleichauf mit Cursor, hinter Copilot (29 %). Kein sauberer Überhol-Vorgang.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Claude Code v2.1.196–197</strong> schließt eine MCP-Supply-Chain-Lücke: committete Configs spawnen keine MCP-Server mehr ohne Zustimmung.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 2.3 + iOS-Beta</strong>, Cline weiter tägliche Releases, OpenHands 1.0 auf neuem Agent-SDK. Bewegung überall — außer bei Aider.</li>\n      <li><span class=\"chip\">Local</span> <strong>Ruhig bei Open-Weights:</strong> keine notable Coding-Modell-Releases in den letzten 24 h — Qwen/DeepSeek/Codestral ohne frischen Tag.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two stories collide this week. Anthropic is making Claude Sonnet 5 the default model for Free, Pro, and Claude Code — agentic coding at nearly the level of the old Opus, at half the price. And GitLab delivers numbers that ground all the hype: 78–79 % of developers type faster with AI, but software doesn't ship faster as a result. The bottleneck just moved — from writing to review.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 is the default from June 30</strong> for Free/Pro and every new Claude Code session — agentic coding near old Opus level, but below it in benchmark.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Pro (provider-reported):</strong> Sonnet 5 63.2 % vs. Opus 4.8 69.2 % vs. Sonnet 4.6 58.1 %. Cheaper and faster — not better.</li>\n      <li><span class=\"chip good\">Price</span> <strong>$2/$10 per million tokens</strong> (in/out) through August 31, then $3/$15. The real lever for agentic loops.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>The \"AI Paradox\"</strong> (GitLab): faster typing, but not faster shipping — the bottleneck moved to review (85 %), governance lagging (80 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code \"most loved\" among seniors</strong> (46 %), but workplace adoption only ~18 % — tied with Cursor, behind Copilot (29 %). No clean overtake.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Claude Code v2.1.196–197</strong> closes an MCP supply-chain gap: committed configs no longer spawn MCP servers without consent.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 2.3 + iOS beta</strong>, Cline shipping daily releases, OpenHands 1.0 on new Agent SDK. Motion everywhere — except Aider.</li>\n      <li><span class=\"chip\">Local</span> <strong>Quiet on open weights:</strong> no major coding-model releases in the last 24 h — Qwen/DeepSeek/Codestral with no fresh date.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas histórias colidem nesta semana. A Anthropic está tornando o Claude Sonnet 5 o modelo padrão para Free, Pro e Claude Code — codificação agnóstica quase no nível do antigo Opus, pela metade do preço. E o GitLab divulga números que fundamentam todo o hype: 78–79 % dos desenvolvedores digitam mais rápido com IA, mas o software não é entregue mais rápido como resultado. O gargalo apenas se deslocou — da escrita para a revisão.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 é o padrão a partir de 30 de junho</strong> para Free/Pro e cada nova sessão do Claude Code — codificação agnóstica perto do nível antigo de Opus, mas abaixo no benchmark.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Pro (informado pelo provedor):</strong> Sonnet 5 63,2 % versus Opus 4.8 69,2 % versus Sonnet 4.6 58,1 %. Mais barato e mais rápido — não melhor.</li>\n      <li><span class=\"chip good\">Preço</span> <strong>R$ 2/R$ 10 por milhão de tokens</strong> (entrada/saída) até 31 de agosto, depois R$ 3/R$ 15. O verdadeiro alavanca para loops agnósticos.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>O \"Paradoxo da IA\"</strong> (GitLab): digitação mais rápida, mas não entrega mais rápida — o gargalo deslocou para revisão (85 %), governança atrasando (80 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code \"mais amado\" entre seniores</strong> (46 %), mas adoção no local de trabalho apenas ~18 % — empatado com Cursor, atrás de Copilot (29 %). Nenhuma ultrapassagem limpa.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Claude Code v2.1.196–197</strong> fecha uma lacuna na cadeia de suprimentos de MCP: configurações confirmadas não geram mais servidores MCP sem consentimento.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 2.3 + beta iOS</strong>, Cline enviando lançamentos diários, OpenHands 1.0 no novo Agent SDK. Movimento em todos os lugares — exceto Aider.</li>\n      <li><span class=\"chip\">Local</span> <strong>Silencioso sobre pesos abertos:</strong> nenhuma versão de modelo de codificação importante nos últimos 24 h — Qwen/DeepSeek/Codestral sem data recente.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos historias chocan esta semana. Anthropic está haciendo que Claude Sonnet 5 sea el modelo predeterminado para Free, Pro y Claude Code — codificación agnóstica casi al nivel del antiguo Opus, al medio precio. Y GitLab presenta números que fundamentan todo el hype: 78–79 % de los desarrolladores escriben código más rápido con IA, pero el software no se entrega más rápido como resultado. El cuello de botella simplemente se movió — de escribir a revisar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 es el estándar a partir del 30 de junio</strong> para Free/Pro y cada nueva sesión de Claude Code — codificación agnóstica cerca del nivel antiguo de Opus, pero por debajo en el benchmark.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Pro (reportado por el proveedor):</strong> Sonnet 5 63,2 % vs. Opus 4.8 69,2 % vs. Sonnet 4.6 58,1 %. Más barato y más rápido — no mejor.</li>\n      <li><span class=\"chip good\">Precio</span> <strong>MX$ 2/MX$ 10 por millón de tokens</strong> (entrada/salida) hasta el 31 de agosto, luego MX$ 3/MX$ 15. La verdadera palanca para bucles agnósticos.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>La \"Paradoja de la IA\"</strong> (GitLab): escribir más rápido, pero no entregar más rápido — el cuello de botella se movió a revisión (85 %), gobernanza rezagada (80 %).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code \"más amado\" entre seniors</strong> (46 %), pero adopción en el lugar de trabajo solo ~18 % — empatado con Cursor, detrás de Copilot (29 %). Sin rebasamiento limpio.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Claude Code v2.1.196–197</strong> cierra una brecha en la cadena de suministro de MCP: las configuraciones confirmadas ya no generan servidores MCP sin consentimiento.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 2.3 + beta iOS</strong>, Cline enviando lanzamientos diarios, OpenHands 1.0 en nuevo Agent SDK. Movimiento en todos lados — excepto Aider.</li>\n      <li><span class=\"chip\">Local</span> <strong>Tranquilo en pesos abiertos:</strong> sin lanzamientos notables de modelos de codificación en las últimas 24 h — Qwen/DeepSeek/Codestral sin fecha reciente.</li>\n    </ul></div>"
