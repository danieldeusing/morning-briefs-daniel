<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;

  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;

  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;

  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;

    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }

  .tldr-card-body a[href^="http"]::after { content: none; }

     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above

  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }

  }

     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {

    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;

    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,

    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,

  }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">

    </button>
  </div>
</header>

       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">

        <span class="cat-color"></span>

           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

        aria-label="Navigation öffnen" title="Navigation">☰</button>

      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern stand hier, dass trotz Kriegs-Schlagzeilen niemand in den Dollar flüchtet. Das war zu glatt. Die vollständigen Daten zeigen: Es <em>gab</em> einen kurzen Safe-Haven-Sprung — der Dollar-Index kletterte auf den US-Schlägen gegen Iran auf ein Ein-Wochen-Hoch um <strong>101,18</strong> —, aber er hielt keinen Tag. Bis heute früh ist der DXY zurück auf <strong>~100,97</strong>. Netto stimmt die These also weiter: keine dauerhafte Flucht in den Dollar. Wichtiger für den Real ist eine Zahl, die <em>nicht</em> zurückkam: Brent steht bei <strong>78,90 $</strong>. Die Öl-Prämie bleibt im Preis — und das schreibt gerade Brasiliens Zins-Drehbuch um. Der akute Angriffstag-Pop des Real verblasst (ECB-Fix minimal von 5,8781 auf <strong>5,8802</strong>, Spot driftet auf ~5,90), doch der Boden unter dem Real wird härter, je länger das Öl oben bleibt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8802</strong> (ECB-Fix, Mi 08.07.) — <span class=\"stat\">−0,55 %</span> gegenüber dem Montags-Fix (5,9130), aber praktisch flach zum Vortag (5,8781). Der Real gibt den Angriffstag-Gewinn nur zögerlich zurück.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1611</strong> (Spot, Do 09.07. früh) — nahezu unverändert zur ECB-Basis von gestern (5,1563).</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,97</strong> (Do 09.07.), <span class=\"stat\">−0,10 %</span> zur Vorsitzung. Nach dem Kriegs-Sprung auf ~101,18 komplett zurückgelaufen — ein Ein-Tages-Round-Trip.</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check sauber</strong>: ECB-Fix 5,8802 vs. rechnerisch 5,8802 (0,001 %), EUR/USD unabhängig gezogen. Der heutige XE-Spot rechnet sich ebenso sauber (0,013 %).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent 78,90 $</strong> (+1,12 % zum Vortag) — die Öl-Prämie aus der Iran-Eskalation bleibt im Preis, statt wie sonst schnell zu verpuffen.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Öl → Copom-Pause</strong>: Meine Lesart — der sticky Ölpreis macht eine vierte Selic-Senkung im August unwahrscheinlicher. Selic steht bei <span class=\"stat\">14,25 %</span> (Beschluss 17.06.). Real-positiv, weil der Carry länger fett bleibt.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiskal-Loch jetzt in Hartdaten</strong>: Konsolidiertes Primärdefizit im Mai <span class=\"stat\">R$ 56,1 Mrd.</span> (vs. R$ 33,7 Mrd. Mai 2025), 12-Monats-Defizit 1,14 % des BIP; Bruttoschuld auf <span class=\"stat\">81,1 %</span> des BIP (+0,9 Pp. m/m).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Devisenfluss 2026 positiv</strong>: +US$ 16,8 Mrd. YTD (bis 03.07.) — Handels-Kanal +34,4 Mrd., Finanz-Kanal −17,6 Mrd. Die Dollar kommen aus Exporten, nicht aus Anleger-Vertrauen.</li>\n      <li><span class=\"chip\">BR</span> <strong>5J-CDS ~127 bp</strong> (Anfang Juli) — unverändert. Der Kreditmarkt preist weder Öl-Krieg noch Fiskal-Loch.</li>\n      <li><span class=\"chip\">Kalender-Korrektur</span> <strong>Notenbank-Woche neu sortiert</strong>: EZB 23.07., FOMC 28.–29.07., aber Copom erst am <strong>04.–05.08.</strong> (280. Sitzung) — nicht am 29.07. wie gestern hier stand.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday this brief said that despite the war headlines, nobody was fleeing into the dollar. That was too clean. The full data shows there <em>was</em> a brief safe-haven jump — the dollar index climbed to a one-week high near <strong>101.18</strong> on the US strikes against Iran — but it didn't hold for even a day. As of this morning the DXY is back to <strong>~100.97</strong>. Net-net, the thesis still stands: no lasting flight into the dollar. What matters more for the real is a number that <em>didn't</em> come back down: Brent sits at <strong>$78.90</strong>. The oil premium is staying in the price — and it's rewriting Brazil's rate-cut playbook. The real's sharp attack-day pop is fading (ECB fix edged from 5.8781 to <strong>5.8802</strong>, spot drifting toward ~5.90), but the floor under the real gets firmer the longer oil stays elevated.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8802</strong> (ECB fix, Wed 07/08) — <span class=\"stat\">−0.55%</span> vs. Monday's fix (5.9130), but essentially flat vs. the prior day (5.8781). The real is giving back the attack-day gain only grudgingly.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1611</strong> (spot, Thu 07/09 early) — nearly unchanged from yesterday's ECB base (5.1563).</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.97</strong> (Thu 07/09), <span class=\"stat\">−0.10%</span> vs. the prior session. Completely retraced from the war spike to ~101.18 — a one-day round trip.</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: ECB fix 5.8802 vs. computed 5.8802 (0.001%), EUR/USD pulled independently. Today's XE spot also checks out cleanly (0.013%).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $78.90</strong> (+1.12% vs. prior day) — the oil premium from the Iran escalation is staying in the price instead of the usual quick fade.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Oil → Copom pause</strong>: my read — the sticky oil price makes a fourth Selic cut in August less likely. Selic stands at <span class=\"stat\">14.25%</span> (decision 06/17). Real-positive, because the carry stays fat longer.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal hole now in hard data</strong>: consolidated primary deficit in May <span class=\"stat\">R$56.1bn</span> (vs. R$33.7bn in May 2025), 12-month deficit 1.14% of GDP; gross debt at <span class=\"stat\">81.1%</span> of GDP (+0.9pp m/m).</li>\n      <li><span class=\"chip good\">BR</span> <strong>2026 FX flow positive</strong>: +US$16.8bn YTD (through 07/03) — trade channel +34.4bn, financial channel −17.6bn. The dollars are coming from exports, not investor confidence.</li>\n      <li><span class=\"chip\">BR</span> <strong>5Y CDS ~127bp</strong> (early July) — unchanged. The credit market isn't pricing either the oil war or the fiscal hole.</li>\n      <li><span class=\"chip\">Calendar correction</span> <strong>Central-bank week re-sequenced</strong>: ECB 07/23, FOMC 07/28–29, but Copom not until <strong>08/04–05</strong> (280th meeting) — not 07/29 as stated here yesterday.</li>\n      <li><span class=\"chip\">Note</span> The forecast probabilities below are <strong>my confidence</strong>, not a market-implied number.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, este espaço dizia que, apesar das manchetes de guerra, ninguém fugia para o dólar. Isso era simplificado demais. Os dados completos mostram: <em>houve</em> sim um breve salto para o porto seguro — o índice do dólar subiu, nos ataques dos EUA contra o Irã, a uma máxima de uma semana em torno de <strong>101,18</strong> —, mas isso não durou nem um dia. Até esta manhã, o DXY já voltou para <strong>~100,97</strong>. No saldo, a tese continua válida: não há fuga duradoura para o dólar. Mais importante para o real é um número que <em>não</em> recuou: o Brent está em <strong>US$ 78,90</strong>. O prêmio do petróleo permanece no preço — e isso está reescrevendo agora o roteiro dos juros no Brasil. O salto agudo do real no dia do ataque está se dissipando (fixação do BCE praticamente estável, de 5,8781 para <strong>5,8802</strong>, e o spot driftando para ~5,90), mas o piso sob o real fica mais firme quanto mais tempo o petróleo permanecer nesse patamar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,8802</strong> (fixação do BCE, qua. 08/07) — <span class=\"stat\">−0,55%</span> em relação à fixação de segunda-feira (5,9130), mas praticamente estável frente ao dia anterior (5,8781). O real devolve o ganho do dia do ataque apenas lentamente.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>USD/BRL 5,1611</strong> (à vista, qui. 09/07 de manhã) — praticamente inalterado frente à base do BCE de ontem (5,1563).</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 100,97</strong> (qui. 09/07), <span class=\"stat\">−0,10%</span> frente ao pregão anterior. Depois do salto ligado à guerra para ~101,18, recuou por completo — uma ida e volta em um único dia.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>Checagem de câmbio cruzado limpa</strong>: fixação do BCE 5,8802 vs. cálculo de 5,8802 (0,001%), com EUR/USD obtido de forma independente. O spot de hoje da XE também fecha a conta de forma limpa (0,013%).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent US$ 78,90</strong> (+1,12% frente ao dia anterior) — o prêmio do petróleo gerado pela escalada com o Irã permanece no preço, em vez de se dissipar rápido como de costume.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Petróleo → pausa do Copom</strong>: minha leitura — o preço do petróleo \"grudado\" no alto torna menos provável um quarto corte da Selic em agosto. A Selic está em <span class=\"stat\">14,25%</span> (decisão de 17/06). Positivo para o real, porque o carry permanece gordo por mais tempo.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Buraco fiscal agora em dados concretos</strong>: déficit primário consolidado em maio de <span class=\"stat\">R$ 56,1 bilhões</span> (vs. R$ 33,7 bilhões em maio de 2025), déficit em 12 meses de 1,14% do PIB; dívida bruta em <span class=\"stat\">81,1%</span> do PIB (+0,9 p.p. m/m).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Fluxo cambial de 2026 positivo</strong>: +US$ 16,8 bilhões no acumulado do ano (até 03/07) — canal comercial +34,4 bilhões, canal financeiro −17,6 bilhões. Os dólares vêm das exportações, não da confiança dos investidores.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS de 5 anos ~127 pb</strong> (início de julho) — inalterado. O mercado de crédito não precifica nem a guerra do petróleo nem o buraco fiscal.</li>\n      <li><span class=\"chip\">Correção de calendário</span> <strong>Semana dos bancos centrais reordenada</strong>: BCE em 23/07, FOMC em 28–29/07, mas o Copom só em <strong>04–05/08</strong> (280ª reunião) — não em 29/07, como constava aqui ontem.</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades de projeção abaixo = <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer, este espacio decía que, pese a los titulares de guerra, nadie huía hacia el dólar. Eso era demasiado simple. Los datos completos muestran que sí <em>hubo</em> un breve salto hacia el refugio seguro — el índice del dólar trepó, tras los ataques de EE. UU. contra Irán, a un máximo de una semana de <strong>101.18</strong> —, pero no aguantó ni un día. Esta mañana el DXY ya está de vuelta en <strong>~100.97</strong>. En términos netos, la tesis sigue en pie: no hay una fuga duradera hacia el dólar. Más importante para el real es una cifra que <em>no</em> retrocedió: el Brent está en <strong>$78.90</strong>. La prima del petróleo se mantiene en el precio — y eso está reescribiendo el guion de tasas de Brasil. El repunte agudo del real del día del ataque se va desvaneciendo (la fijación del BCE subió apenas de 5.8781 a <strong>5.8802</strong>, el spot se acerca a ~5.90), pero el piso bajo el real se endurece cuanto más tiempo se mantenga arriba el petróleo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Divisas</span> <strong>EUR/BRL 5.8802</strong> (fijación del BCE, mié. 08/07) — <span class=\"stat\">−0.55%</span> frente a la fijación del lunes (5.9130), pero prácticamente plano frente al día anterior (5.8781). El real devuelve la ganancia del día del ataque solo poco a poco.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>USD/BRL 5.1611</strong> (spot, jue. 09/07 por la mañana) — casi sin cambios frente a la base del BCE de ayer (5.1563).</li>\n      <li><span class=\"chip\">Divisas</span> <strong>DXY 100.97</strong> (jue. 09/07), <span class=\"stat\">−0.10%</span> frente a la sesión anterior. Tras el salto por la guerra a ~101.18, retrocedió por completo — un ida y vuelta de un solo día.</li>\n      <li><span class=\"chip\">Divisas</span> <strong>Verificación de tipo cruzado limpia</strong>: fijación del BCE 5.8802 frente al cálculo de 5.8802 (0.001%), con EUR/USD obtenido de forma independiente. El spot de XE de hoy también cuadra con limpieza (0.013%).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent $78.90</strong> (+1.12% frente al día anterior) — la prima de petróleo por la escalada con Irán se mantiene en el precio, en lugar de disiparse rápido como suele ocurrir.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Petróleo → pausa del Copom</strong>: mi lectura — el precio del petróleo, pegajoso, hace menos probable un cuarto recorte de la Selic en agosto. La Selic está en <span class=\"stat\">14.25%</span> (decisión del 17/06). Positivo para el real, porque el carry se mantiene generoso por más tiempo.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>El agujero fiscal ya está en datos duros</strong>: el déficit primario consolidado de mayo fue de <span class=\"stat\">R$56.1 mil millones</span> (frente a R$33.7 mil millones en mayo de 2025), el déficit de 12 meses es de 1.14% del PIB; la deuda bruta subió a <span class=\"stat\">81.1%</span> del PIB (+0.9 pp m/m).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Flujo cambiario de 2026 en positivo</strong>: +US$16.8 mil millones en lo que va del año (hasta el 03/07) — el canal comercial aportó +34.4 mil millones, el canal financiero perdió −17.6 mil millones. Los dólares vienen de las exportaciones, no de la confianza de los inversionistas.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS a 5 años ~127 pb</strong> (principios de julio) — sin cambios. El mercado de crédito no está descontando ni la guerra del petróleo ni el agujero fiscal.</li>\n      <li><span class=\"chip\">Corrección de calendario</span> <strong>Semana de bancos centrales reordenada</strong>: BCE el 23/07, FOMC el 28–29/07, pero el Copom recién el <strong>04–05/08</strong> (reunión 280) — no el 29/07 como se dijo aquí ayer.</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades de pronóstico de abajo = <strong>mi nivel de confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern war es ein Öl-Schock. Heute ist es das Regime dahinter, das sich dreht. Wochenlang wettete der Markt darauf, dass die nächste Fed-Bewegung eine <em>Senkung</em> ist. Diese Woche wettet er auf eine <em>Erhöhung</em> — die Notenbank hält bei <strong>3,50–3,75 %</strong> still, und die Termingeld-Märkte preisen inzwischen rund <strong>zwei Drittel Wahrscheinlichkeit für mindestens eine Zinserhöhung bis Dezember</strong>, mit September und Oktober als heißen Sitzungen.<sup>[9][10]</sup> Diese Umkehr — befeuert vom teuren Iran-Öl, das die Inflation nach oben drückt — erklärt drei Dinge auf einmal, die auf den ersten Blick nicht zusammenpassen. Erstens: <strong>Gold fiel ~2 % auf ~4.072 $</strong> (09.07.) auf den tiefsten Stand seit dem 02.07. — <em>trotz</em> einer echten Militär-Eskalation. Wenn der sichere Hafen im Krieg nicht anspringt, sondern fällt, dann zieht der Zins-Faden stärker als der Angst-Faden. Zweitens: Der <strong>Dow verlor 576 Punkte (−1,09 %)</strong> auf 52.348 — zwei Handelstage nach seinem Rekordschluss. Drittens: <strong>Bitcoin</strong> kann trotz <strong>~510 Mio. $ ETF-Zuflüssen</strong> über drei Tage nicht steigen und notiert bei <strong>62.380 $</strong> (−2,6 % seit dem 07.07.). Der eine Ort, wo derselbe Inflations-Impuls <em>hilft</em>: Öl (Brent ~79 $, meine Kauf-These läuft). Und einer, der sich abkoppelt: <strong>Nvidia +3,65 %</strong> an einem sonst roten Tag — der Markt behandelt KI-Capex als säkulares Wachstum, immun gegen die Zinsangst, die die Software-Mag-7 traf.</p>\n    <ul>\n      <li><span class=\"chip hot\">ZINS-REGIME</span> <strong>Der Markt dreht von Senkung auf Erhöhung.</strong> Fed hält 3,50–3,75 %; ~2/3 Wahrscheinlichkeit einer Erhöhung bis Dezember, September/Oktober die Live-Sitzungen; Median-Projektion Jahresende 3,8 %. Das ist der Treiber unter allem heute.</li>\n      <li><span class=\"chip hot\">GOLD</span> <strong>Gold ~4.072 $/oz</strong> (−2,0 %, 09.07.), tiefster Stand seit 02.07., ~27 % unter dem Jan-Rekord (5.598 $). Fiel <em>trotz</em> Iran-Eskalation — die Information steckt in der schwachen Reaktion.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Dow −1,09 %</strong> (52.348), <strong>S&amp;P −0,28 %</strong> (7.483), aber <strong>Nasdaq +0,20 %</strong> (25.871). Zyklik/Old-Economy raus, Tech gehalten — der Riss läuft entlang der Zins-Empfindlichkeit.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia +3,65 %</strong> auf 204,12 $ — einziger Mag-7-Gewinner-Ausreißer. TSM +1,02 %, AMD +0,25 %: die AI-Hardware koppelt sich von der Software-Mag-7 ab (MSFT −1,41 %, META −2,02 %, GOOGL −1,39 %, AMZN −0,96 %).</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent ~78,9 $</strong> (09.07. Future) / 78,17 $ (Fortune, 08.07., +4,88 $/Tag), <strong>WTI ~74,4 $</strong>. Weiter aufwärts nach dem Widerruf der Iran-Öl-Lizenz — meine BUY-These vom 08.07. läuft.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 62.380 $</strong> (24h −0,63 %, 7d +2,33 %, 09.07. 05:06 UTC). ETF-Zuflüsse ~510 Mio. $ über 3 Tage — aber der Preis folgt <em>nicht</em>. Mein zweiter Kauf-Trigger ist damit nur zur Hälfte erfüllt.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.740 $</strong> (24h −0,94 %, 7d +6,69 %). Schlägt BTC über 7 Tage — aber das ist ~2,9× Hebel, keine relative Stärke. Halten, nicht aufstocken.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Long-Tail 24h flach bis rot, IMX (Gaming) +3,94 % der einzige Lichtblick; AI-Token hinken (TAO −1,97 %, FET −1,60 %). „AI-Token = KI-Wette\" bleibt falsch: NVDA +3,65 %, die Token rot.</li>\n      <li><span class=\"chip\">REVIERE</span> Modell- und Agent-Launches stehen im <em>ai-dev</em>-Brief, angewandte KI im <em>ai-usecases</em>-Brief. Hier zählt nur die Kursreaktion — und die ist heute vor allem eine Zins-Geschichte.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday it was an oil shock. Today it's the regime behind it that's flipping. For weeks the market was betting that the Fed's next move would be a <em>cut</em>. This week it's betting on a <em>hike</em> — the central bank is holding at <strong>3.50–3.75%</strong>, and the fed funds futures market is now pricing in roughly <strong>two-thirds odds of at least one rate hike by December</strong>, with September and October as the hot meetings.<sup>[9][10]</sup> This reversal — fueled by pricier Iran oil pushing inflation up — explains three things at once that don't obviously fit together. First: <strong>gold fell ~2% to ~$4,072</strong> (09.07.), the lowest level since 02.07. — <em>despite</em> a real military escalation. When the safe haven doesn't rally in wartime but falls instead, the rate thread is pulling harder than the fear thread. Second: the <strong>Dow lost 576 points (−1.09%)</strong> to 52,348 — two trading days after its record close. Third: <strong>Bitcoin</strong> can't rise despite <strong>~$510M in ETF inflows</strong> over three days and trades at <strong>$62,380</strong> (−2.6% since 07.07.). The one place where the same inflation impulse <em>helps</em>: oil (Brent ~$79, my buy thesis is playing out). And one that's decoupling: <strong>Nvidia +3.65%</strong> on an otherwise red day — the market is treating AI capex as secular growth, immune to the rate fear that hit the software Mag 7.</p>\n    <ul>\n      <li><span class=\"chip hot\">RATE REGIME</span> <strong>The market is flipping from cut to hike.</strong> Fed holds 3.50–3.75%; ~2/3 odds of a hike by December, September/October the live meetings; year-end median projection 3.8%. That's the driver underneath everything today.</li>\n      <li><span class=\"chip hot\">GOLD</span> <strong>Gold ~$4,072/oz</strong> (−2.0%, 09.07.), lowest level since 02.07., ~27% below the January record ($5,598). Fell <em>despite</em> the Iran escalation — the information is in the weak reaction.</li>\n      <li><span class=\"chip hot\">SPLIT</span> <strong>Dow −1.09%</strong> (52,348), <strong>S&amp;P −0.28%</strong> (7,483), but <strong>Nasdaq +0.20%</strong> (25,871). Cyclicals/old economy out, tech held — the crack runs along rate sensitivity.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia +3.65%</strong> to $204.12 — the only Mag 7 winner outlier. TSM +1.02%, AMD +0.25%: AI hardware is decoupling from the software Mag 7 (MSFT −1.41%, META −2.02%, GOOGL −1.39%, AMZN −0.96%).</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent ~$78.9</strong> (09.07. future) / $78.17 (Fortune, 08.07., +$4.88/day), <strong>WTI ~$74.4</strong>. Still climbing after the revocation of the Iran oil license — my BUY thesis from 08.07. is playing out.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC $62,380</strong> (24h −0.63%, 7d +2.33%, 09.07. 05:06 UTC). ETF inflows ~$510M over 3 days — but the price isn't <em>following</em>. That means my second buy trigger is only half met.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1,740</strong> (24h −0.94%, 7d +6.69%). Beats BTC over 7 days — but that's ~2.9× leverage, not relative strength. Hold, don't add.</li>\n      <li><span class=\"chip\">SECTORS</span> Long tail flat to red over 24h, IMX (Gaming) +3.94% the only bright spot; AI tokens lag (TAO −1.97%, FET −1.60%). \"AI tokens = AI bet\" remains wrong: NVDA +3.65%, the tokens red.</li>\n      <li><span class=\"chip\">TERRITORY</span> Model and agent launches belong in the <em>ai-dev</em> brief, applied AI in the <em>ai-usecases</em> brief. Here, only the price reaction counts — and today that's mostly a rate story.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem foi um choque de petróleo. Hoje é o regime por trás dele que está virando. Durante semanas, o mercado apostou que o próximo movimento do Fed seria um corte. Esta semana, ele aposta em uma <em>alta</em> — o banco central se mantém em <strong>3,50–3,75 %</strong>, e os mercados de juros futuros já precificam cerca de <strong>dois terços de probabilidade de pelo menos uma alta de juros até dezembro</strong>, com setembro e outubro como as reuniões mais quentes.<sup>[9][10]</sup> Essa reviravolta — impulsionada pelo petróleo iraniano caro, que empurra a inflação para cima — explica três coisas de uma vez que, à primeira vista, não combinam. Primeiro: <strong>o ouro caiu ~2 % para ~4.072 $</strong> (09.07.), o menor nível desde 02.07. — <em>apesar</em> de uma escalada militar real. Se o porto seguro não dispara na guerra, e sim cai, é porque o fio dos juros puxa mais forte que o fio do medo. Segundo: o <strong>Dow perdeu 576 pontos (−1,09 %)</strong>, fechando em 52.348 — dois pregões depois do seu fechamento recorde. Terceiro: o <strong>Bitcoin</strong> não consegue subir apesar de <strong>~510 mi $ em entradas de ETFs</strong> ao longo de três dias e é negociado a <strong>62.380 $</strong> (−2,6 % desde 07.07.). O único lugar onde o mesmo impulso inflacionário <em>ajuda</em>: o petróleo (Brent ~79 $, minha tese de compra segue de pé). E um que se descola: a <strong>Nvidia +3,65 %</strong> num dia, por outro lado, vermelho — o mercado trata o capex em IA como crescimento secular, imune ao medo de juros que atingiu as Mag-7 de software.</p>\n    <ul>\n      <li><span class=\"chip hot\">REGIME DE JUROS</span> <strong>O mercado vira de corte para alta.</strong> Fed se mantém em 3,50–3,75 %; ~2/3 de probabilidade de uma alta até dezembro, setembro/outubro as reuniões decisivas; projeção mediana de fim de ano em 3,8 %. Esse é o motor por trás de tudo hoje.</li>\n      <li><span class=\"chip hot\">OURO</span> <strong>Ouro ~4.072 $/oz</strong> (−2,0 %, 09.07.), menor nível desde 02.07., ~27 % abaixo do recorde de janeiro (5.598 $). Caiu <em>apesar</em> da escalada no Irã — a informação está na reação fraca.</li>\n      <li><span class=\"chip hot\">DIVISÃO</span> <strong>Dow −1,09 %</strong> (52.348), <strong>S&amp;P −0,28 %</strong> (7.483), mas <strong>Nasdaq +0,20 %</strong> (25.871). Cíclicas/velha economia fora, tecnologia se sustenta — a rachadura segue a sensibilidade a juros.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia +3,65 %</strong> para 204,12 $ — único destaque vencedor entre as Mag-7. TSM +1,02 %, AMD +0,25 %: o hardware de IA se descola do software das Mag-7 (MSFT −1,41 %, META −2,02 %, GOOGL −1,39 %, AMZN −0,96 %).</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~78,9 $</strong> (futuro de 09.07.) / 78,17 $ (Fortune, 08.07., +4,88 $/dia), <strong>WTI ~74,4 $</strong>. Segue em alta depois da revogação da licença de petróleo do Irã — minha tese de COMPRA de 08.07. segue de pé.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 62.380 $</strong> (24h −0,63 %, 7d +2,33 %, 09.07. 05:06 UTC). Entradas em ETFs ~510 mi $ ao longo de 3 dias — mas o preço <em>não</em> acompanha. Meu segundo gatilho de compra, portanto, só foi cumprido pela metade.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.740 $</strong> (24h −0,94 %, 7d +6,69 %). Supera o BTC em 7 dias — mas isso é alavancagem de ~2,9×, não força relativa. Manter, sem aumentar posição.</li>\n      <li><span class=\"chip\">SETORES</span> Cauda longa em 24h de estável a vermelha, IMX (games) +3,94 % o único ponto positivo; tokens de IA ficam para trás (TAO −1,97 %, FET −1,60 %). „Token de IA = aposta em IA\" continua falso: NVDA +3,65 %, os tokens no vermelho.</li>\n      <li><span class=\"chip\">TERRITÓRIOS</span> Lançamentos de modelos e agentes ficam no boletim <em>ai-dev</em>, IA aplicada no boletim <em>ai-usecases</em>. Aqui só conta a reação do preço — e hoje ela é, acima de tudo, uma história de juros.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer fue un shock petrolero. Hoy es el régimen detrás de él, que se está invirtiendo. Durante semanas el mercado apostó a que el próximo movimiento de la Fed sería un <em>recorte</em>. Esta semana apuesta por una <em>subida</em> — el banco central se mantiene en <strong>3,50–3,75 %</strong>, y los mercados de tasas a plazo ya descuentan cerca de <strong>dos tercios de probabilidad de al menos una subida de tasas para diciembre</strong>, con septiembre y octubre como las reuniones calientes.<sup>[9][10]</sup> Este giro — alimentado por el caro petróleo iraní, que empuja la inflación al alza — explica tres cosas a la vez que a primera vista no encajan. Primero: <strong>el oro cayó ~2 % hasta ~4.072 $</strong> (09.07.), su nivel más bajo desde el 02.07. — <em>a pesar de</em> una escalada militar real. Cuando el refugio seguro no reacciona ante la guerra, sino que cae, es porque el hilo de las tasas tira más fuerte que el hilo del miedo. Segundo: el <strong>Dow perdió 576 puntos (−1,09 %)</strong> hasta 52.348 — dos días de operaciones después de su cierre récord. Tercero: <strong>Bitcoin</strong>, a pesar de <strong>~510 millones de $ en entradas a los ETF</strong> en tres días, no logra subir y cotiza en <strong>62.380 $</strong> (−2,6 % desde el 07.07.). El único lugar donde el mismo impulso inflacionario <em>ayuda</em>: el petróleo (Brent ~79 $, mi tesis de compra sigue en pie). Y uno que se desacopla: <strong>Nvidia +3,65 %</strong> en un día por lo demás en rojo — el mercado trata el gasto de capital en IA como crecimiento secular, inmune al miedo a las tasas que golpeó a las Mag-7 de software.</p>\n    <ul>\n      <li><span class=\"chip hot\">RÉGIMEN DE TASAS</span> <strong>El mercado pasa de esperar un recorte a esperar una subida.</strong> La Fed se mantiene en 3,50–3,75 %; ~2/3 de probabilidad de una subida para diciembre, septiembre/octubre como las reuniones en vivo; proyección mediana de fin de año 3,8 %. Es el motor detrás de todo hoy.</li>\n      <li><span class=\"chip hot\">ORO</span> <strong>Oro ~4.072 $/oz</strong> (−2,0 %, 09.07.), su nivel más bajo desde el 02.07., ~27 % por debajo del récord de enero (5.598 $). Cayó <em>a pesar de</em> la escalada con Irán — la información está en la reacción débil.</li>\n      <li><span class=\"chip hot\">DIVISIÓN</span> <strong>Dow −1,09 %</strong> (52.348), <strong>S&amp;P −0,28 %</strong> (7.483), pero <strong>Nasdaq +0,20 %</strong> (25.871). Lo cíclico/la vieja economía sale, la tecnología se sostiene — la grieta corre a lo largo de la sensibilidad a las tasas.</li>\n      <li><span class=\"chip good\">NVDA</span> <strong>Nvidia +3,65 %</strong> hasta 204,12 $ — la única ganadora atípica entre las Mag-7. TSM +1,02 %, AMD +0,25 %: el hardware de IA se desacopla del software de las Mag-7 (MSFT −1,41 %, META −2,02 %, GOOGL −1,39 %, AMZN −0,96 %).</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~78,9 $</strong> (futuro del 09.07.) / 78,17 $ (Fortune, 08.07., +4,88 $/día), <strong>WTI ~74,4 $</strong>. Sigue al alza tras la revocación de la licencia petrolera de Irán — mi tesis de COMPRAR del 08.07. sigue en pie.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 62.380 $</strong> (24 h −0,63 %, 7 d +2,33 %, 09.07. 05:06 UTC). Entradas a los ETF ~510 millones de $ en 3 días — pero el precio <em>no</em> los sigue. Mi segundo disparador de compra solo se cumple a la mitad.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.740 $</strong> (24 h −0,94 %, 7 d +6,69 %). Supera a BTC en 7 días — pero es apalancamiento de ~2,9×, no fortaleza relativa. Mantener, no aumentar.</li>\n      <li><span class=\"chip\">SECTORES</span> La cola larga en 24 h está plana o en rojo, IMX (gaming) +3,94 % el único punto positivo; los tokens de IA se rezagan (TAO −1,97 %, FET −1,60 %). \"Token de IA = apuesta de IA\" sigue siendo falso: NVDA +3,65 %, los tokens en rojo.</li>\n      <li><span class=\"chip\">ÁMBITOS</span> Los lanzamientos de modelos y agentes se cubren en el boletín de <em>ai-dev</em>, la IA aplicada en el de <em>ai-usecases</em>. Aquí solo cuenta la reacción bursátil — y hoy es sobre todo una historia de tasas.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern ging es um die Frage, wer eure CI-Runner starten darf. Heute treibt sie dieselbe Woche einen Schritt weiter: Nicht mehr der selbst-gehostete Runner ist das Loch, sondern GitHubs <em>eigener</em> KI-Agent — ein freundlich formuliertes öffentliches Issue reicht, um private Repos derselben Organisation nach außen zu tragen. Dazu ein Downgrade-Bug im PostgreSQL-JDBC-Treiber, der ein Sicherheitsmerkmal klammheimlich abschaltet, und eine Passwort-Spray-Kampagne mit 81 Millionen Login-Versuchen gegen Microsoft 365. Das verbindende Muster: Die langweilige Infrastruktur — Auth-Handshakes, Login-Endpunkte, die Agenten-Schicht — ist diese Woche die eigentliche Angriffsfläche, nicht die glänzende Feature-Liste.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GitLost</strong>: Prompt-Injection in GitHubs Agentic Workflows — ein unauthentifiziertes Issue bringt den Agenten dazu, private-Repo-Inhalte als öffentlichen Kommentar zu posten. Das Wort „Additionally\" reichte, um die Schutzmaßnahmen auszuhebeln.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: 81 Mio. Login-Versuche in zwei Wochen (12.–26. Juni), 78 Konten in 64 Organisationen kompromittiert. Huntress' Abuse-Meldung blieb zunächst unbeantwortet — LSHIY sperrte den Nutzer aber am 02.07., das Spraying aus dem Bereich stoppte.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Release</span> <strong>PostgreSQL JDBC 42.7.12</strong>: CVE-2026-54291 — stiller Channel-Binding-Downgrade in der SCRAM-Anmeldung. Trifft <code>42.7.4</code>–<code>42.7.11</code>, aber nur mit gesetztem <code>channelBinding=require</code>. Genau dein Stack.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Node.js gegen den „AI-Slop\"</strong>: Bug-Bounty im April pausiert — allein wegen weggefallener IBB-Finanzierung, nicht wegen KI. Davon getrennt: KI-erfundene Fake-Meldungen belasten weiter die Security-WG-Triage; die erwogene Antwort ist KI-Vorsortieren.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL-Woche</strong>: CloudNativePG 1.30.0 mit neuem <code>DatabaseRole</code>, Barman 3.19, ODBC-Treiber auf OpenSSL 3.5.5, pg_ivm 1.15 — ein dichter Release-Reigen um den Kern herum.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>Fortsetzung</strong>: Langflow-Auth-Bypass steht seit 7. Juli auf CISAs KEV (Fix 1.9.2), npm v12 noch nicht auf der Registry, Januscape-Backports rollen weiter zu 5.15/5.10.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Kurz notiert</strong>: JupyterLab 4.6 mit Scratchpad-Konsole, openHAB 5.2 mit MCP-Server (KI-Teil gehört in den ai-Brief). BR-Dev heute leer.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern ging es um die Frage, wer eure CI-Runner starten darf. Heute treibt sie dieselbe Woche einen Schritt weiter: Nicht mehr der selbst-gehostete Runner ist das Loch, sondern GitHubs <em>eigener</em> KI-Agent — ein freundlich formuliertes öffentliches Issue reicht, um private Repos derselben Organisation nach außen zu tragen. Dazu ein Downgrade-Bug im PostgreSQL-JDBC-Treiber, der ein Sicherheitsmerkmal klammheimlich abschaltet, und eine Passwort-Spray-Kampagne mit 81 Millionen Login-Versuchen gegen Microsoft 365. Das verbindende Muster: Die langweilige Infrastruktur — Auth-Handshakes, Login-Endpunkte, die Agenten-Schicht — ist diese Woche die eigentliche Angriffsfläche, nicht die glänzende Feature-Liste.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GitLost</strong>: Prompt-Injection in GitHubs Agentic Workflows — ein unauthentifiziertes Issue bringt den Agenten dazu, private-Repo-Inhalte als öffentlichen Kommentar zu posten. Das Wort „Additionally\" reichte, um die Schutzmaßnahmen auszuhebeln.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: 81 Mio. Login-Versuche in zwei Wochen (12.–26. Juni), 78 Konten in 64 Organisationen kompromittiert. Huntress' Abuse-Meldung blieb zunächst unbeantwortet — LSHIY sperrte den Nutzer aber am 02.07., das Spraying aus dem Bereich stoppte.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Release</span> <strong>PostgreSQL JDBC 42.7.12</strong>: CVE-2026-54291 — stiller Channel-Binding-Downgrade in der SCRAM-Anmeldung. Trifft <code>42.7.4</code>–<code>42.7.11</code>, aber nur mit gesetztem <code>channelBinding=require</code>. Genau dein Stack.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Node.js gegen den „AI-Slop\"</strong>: Bug-Bounty im April pausiert — allein wegen weggefallener IBB-Finanzierung, nicht wegen KI. Davon getrennt: KI-erfundene Fake-Meldungen belasten weiter die Security-WG-Triage; die erwogene Antwort ist KI-Vorsortieren.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL-Woche</strong>: CloudNativePG 1.30.0 mit neuem <code>DatabaseRole</code>, Barman 3.19, ODBC-Treiber auf OpenSSL 3.5.5, pg_ivm 1.15 — ein dichter Release-Reigen um den Kern herum.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>Fortsetzung</strong>: Langflow-Auth-Bypass steht seit 7. Juli auf CISAs KEV (Fix 1.9.2), npm v12 noch nicht auf der Registry, Januscape-Backports rollen weiter zu 5.15/5.10.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Kurz notiert</strong>: JupyterLab 4.6 mit Scratchpad-Konsole, openHAB 5.2 mit MCP-Server (KI-Teil gehört in den ai-Brief). BR-Dev heute leer.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday's question was who gets to spin up your CI runners. Today pushes that same week one step further: this time the hole isn't a self-hosted runner, it's GitHub's <em>own</em> AI agent — a politely worded public issue is enough to carry private repos of the same organization out into the open. Add a downgrade bug in the PostgreSQL JDBC driver that quietly disables a security feature, and a password-spray campaign with 81 million login attempts against Microsoft 365. The connecting thread: the boring infrastructure — auth handshakes, login endpoints, the agent layer — is this week's real attack surface, not the shiny feature list.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GitLost</strong>: prompt injection in GitHub's Agentic Workflows — an unauthenticated issue tricks the agent into posting private-repo content as a public comment. The word \"Additionally\" was enough to bypass the safeguards.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: 81 million login attempts in two weeks (June 12–26), 78 accounts across 64 organizations compromised. Huntress' abuse report initially went unanswered — but LSHIY suspended the user on 07/02, and the spraying from that range stopped.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Release</span> <strong>PostgreSQL JDBC 42.7.12</strong>: CVE-2026-54291 — a silent channel-binding downgrade in the SCRAM login. Hits <code>42.7.4</code>–<code>42.7.11</code>, but only with <code>channelBinding=require</code> set. Exactly your stack.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Node.js versus the \"AI slop\"</strong>: bug bounty paused in April — solely due to lost IBB funding, not AI. Separately: AI-fabricated fake reports keep straining the Security WG's triage; the response under consideration is AI pre-sorting.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>PostgreSQL week</strong>: CloudNativePG 1.30.0 with a new <code>DatabaseRole</code>, Barman 3.19, the ODBC driver on OpenSSL 3.5.5, pg_ivm 1.15 — a dense round of releases around the core.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">USA</span> <strong>Follow-up</strong>: the Langflow auth bypass has been on CISA's KEV since July 7 (fix 1.9.2), npm v12 still not on the registry, Januscape backports keep rolling out to 5.15/5.10.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Briefly noted</strong>: JupyterLab 4.6 with a scratchpad console, openHAB 5.2 with an MCP server (the AI angle belongs in the ai-dev brief). Nothing from Brazil today.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem a pergunta era quem pode disparar seus runners de CI. Hoje o mesmo tema da semana avança mais um passo: o buraco não está mais no runner self-hosted, e sim no próprio agente de IA do GitHub — uma issue pública educadamente redigida já basta para levar repositórios privados da mesma organização para fora. Some a isso um bug de downgrade no driver JDBC do PostgreSQL que desativa silenciosamente um recurso de segurança, e uma campanha de password spray com 81 milhões de tentativas de login contra o Microsoft 365. O padrão em comum: a infraestrutura chata — handshakes de autenticação, endpoints de login, a camada de agentes — é a verdadeira superfície de ataque desta semana, não a lista de features vistosa.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>GitLost</strong>: prompt injection nos Agentic Workflows do GitHub — uma issue não autenticada faz o agente postar conteúdo de repositório privado como comentário público. A palavra \"Additionally\" bastou para driblar as proteções.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: 81 milhões de tentativas de login em duas semanas (12 a 26 de junho), 78 contas comprometidas em 64 organizações. O aviso de abuso da Huntress ficou inicialmente sem resposta — mas a LSHIY suspendeu o usuário em 02/07, e o spraying vindo dessa faixa parou.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Release</span> <strong>PostgreSQL JDBC 42.7.12</strong>: CVE-2026-54291 — downgrade silencioso do channel binding no login SCRAM. Atinge <code>42.7.4</code>–<code>42.7.11</code>, mas só com <code>channelBinding=require</code> definido. Exatamente a sua stack.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Node.js contra o \"AI slop\"</strong>: bug bounty suspenso em abril — só pela perda do financiamento do IBB, não por causa de IA. Separadamente: relatos falsos gerados por IA continuam sobrecarregando a triagem do grupo de segurança; a resposta cogitada é pré-triagem por IA.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>Semana do PostgreSQL</strong>: CloudNativePG 1.30.0 com novo <code>DatabaseRole</code>, Barman 3.19, driver ODBC no OpenSSL 3.5.5, pg_ivm 1.15 — uma leva densa de releases em torno do núcleo.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">EUA</span> <strong>Continuações</strong>: o auth bypass do Langflow está no KEV da CISA desde 7 de julho (correção 1.9.2), o npm v12 ainda não chegou ao registry, os backports do Januscape seguem rolando para 5.15/5.10.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Em resumo</strong>: JupyterLab 4.6 com console scratchpad, openHAB 5.2 com servidor MCP (o lado de IA fica para o brief de IA). Seção BR-Dev vazia hoje.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer la pregunta era quién puede disparar tus runners de CI. Hoy el mismo tema de la semana avanza un paso más: el hueco ya no está en el runner autoalojado, sino en el propio agente de IA de GitHub — un issue público redactado con amabilidad basta para sacar a la luz repositorios privados de la misma organización. A eso se suma un bug de downgrade en el driver JDBC de PostgreSQL que desactiva silenciosamente una función de seguridad, y una campaña de password spraying con 81 millones de intentos de inicio de sesión contra Microsoft 365. El patrón común: la infraestructura aburrida — los handshakes de autenticación, los endpoints de login, la capa de agentes — es la verdadera superficie de ataque esta semana, no la lista de funciones vistosa.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>GitLost</strong>: inyección de prompts en los Agentic Workflows de GitHub — un issue sin autenticar logra que el agente publique contenido de un repositorio privado como comentario público. La palabra \"Additionally\" bastó para burlar las protecciones.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Global</span> <strong>Microsoft 365</strong>: 81 millones de intentos de inicio de sesión en dos semanas (12 al 26 de junio), 78 cuentas comprometidas en 64 organizaciones. El reporte de abuso de Huntress quedó sin respuesta al principio — pero LSHIY bloqueó al usuario el 2 de julio, y el spraying desde ese rango cesó.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Release</span> <strong>PostgreSQL JDBC 42.7.12</strong>: CVE-2026-54291 — downgrade silencioso del channel binding en el login SCRAM. Afecta <code>42.7.4</code>–<code>42.7.11</code>, pero solo con <code>channelBinding=require</code> configurado. Justo tu stack.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Global</span> <strong>Node.js contra el \"AI slop\"</strong>: bug bounty pausado en abril — solo por la pérdida del financiamiento del IBB, no por la IA. Aparte de eso: reportes falsos generados por IA siguen sobrecargando la triage del grupo de seguridad; la respuesta que se evalúa es preclasificación con IA.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">OSS</span> <strong>Semana de PostgreSQL</strong>: CloudNativePG 1.30.0 con un nuevo <code>DatabaseRole</code>, Barman 3.19, el driver ODBC sobre OpenSSL 3.5.5, pg_ivm 1.15 — una ronda densa de lanzamientos alrededor del núcleo.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">EE. UU.</span> <strong>Seguimientos</strong>: el bypass de autenticación de Langflow está en el KEV de CISA desde el 7 de julio (corrección 1.9.2), npm v12 todavía no llega al registry, los backports de Januscape siguen avanzando hacia 5.15/5.10.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Breves</strong>: JupyterLab 4.6 con consola scratchpad, openHAB 5.2 con servidor MCP (el ángulo de IA va en el brief de IA). Sección BR-Dev vacía hoy.</li>\n    </ul></div>"
