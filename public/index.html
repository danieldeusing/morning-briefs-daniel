      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern hat Gartner eine Zahl in den Markt gestellt, die jeden Anbieter von Standard-Business-Software nervös machen sollte: 234 Milliarden Dollar Software-Ausgaben stehen bis 2030 auf der Kippe, weil KI-Agenten die Arbeit erledigen, für die man bisher zehn verschiedene Programme geöffnet hat. Am selben Tag zementiert Microsoft seine Copilot-Preise dauerhaft — die KI im Büro wird vom Rabatt-Experiment zur Fixkosten-Position. Und die Bitkom-Zahlen zeigen, was in Deutschland wirklich ankommt: mehr Nutzung, aber auch mehr Ernüchterung.</p>\n    <ul>\n      <li><span class=\"chip hot\">Studie · Global</span> <strong>Gartner: 234 Mrd. $ SaaS-Ausgaben in Gefahr</strong> — „agentic arbitrage\" bedroht bis 2030 rund 20 % der Ausgaben für Unternehmens-Anwendungen.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Microsoft macht Copilot-Preise permanent</strong> — die Promo-Phase endet, das KI-Add-on wird zur festen Zeile im IT-Budget (Lizenz-Mechanik: siehe Software-Brief).</li>\n      <li><span class=\"chip hot\">Studie · DE</span> <strong>Bitkom: 41 % der deutschen Firmen nutzen KI</strong> — 2024 waren es 17 %. Aber 33 % sagen: teurer als gedacht, 19 % haben schon Stellen gestrichen.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Legal-AI: Harvey mit 11 Mrd. $ bewertet</strong> — 200 Mio. $ frisch, geführt von GIC und Sequoia. Ein einzelnes Startup so wertvoll wie ein großer Teil seines ganzen Marktes.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Rossum von Coupa geschluckt</strong> — einer der zehn IDP-Marktführer verliert seine Unabhängigkeit. Für twiceD öffnet das eine Lücke im Mittelstand.</li>\n      <li><span class=\"chip good\">Ideen · DE</span> <strong>Zwei twiceD-Vorschläge</strong>: ein Dokumenten-Agent für den Mittelstand und eine ehrliche „KI-Kosten &amp; AI-Act\"-Beratung.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern hat Gartner eine Zahl in den Markt gestellt, die jeden Anbieter von Standard-Business-Software nervös machen sollte: 234 Milliarden Dollar Software-Ausgaben stehen bis 2030 auf der Kippe, weil KI-Agenten die Arbeit erledigen, für die man bisher zehn verschiedene Programme geöffnet hat. Am selben Tag zementiert Microsoft seine Copilot-Preise dauerhaft — die KI im Büro wird vom Rabatt-Experiment zur Fixkosten-Position. Und die Bitkom-Zahlen zeigen, was in Deutschland wirklich ankommt: mehr Nutzung, aber auch mehr Ernüchterung.</p>\n    <ul>\n      <li><span class=\"chip hot\">Studie · Global</span> <strong>Gartner: 234 Mrd. $ SaaS-Ausgaben in Gefahr</strong> — „agentic arbitrage\" bedroht bis 2030 rund 20 % der Ausgaben für Unternehmens-Anwendungen.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Microsoft macht Copilot-Preise permanent</strong> — die Promo-Phase endet, das KI-Add-on wird zur festen Zeile im IT-Budget (Lizenz-Mechanik: siehe Software-Brief).</li>\n      <li><span class=\"chip hot\">Studie · DE</span> <strong>Bitkom: 41 % der deutschen Firmen nutzen KI</strong> — 2024 waren es 17 %. Aber 33 % sagen: teurer als gedacht, 19 % haben schon Stellen gestrichen.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Legal-AI: Harvey mit 11 Mrd. $ bewertet</strong> — 200 Mio. $ frisch, geführt von GIC und Sequoia. Ein einzelnes Startup so wertvoll wie ein großer Teil seines ganzen Marktes.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Rossum von Coupa geschluckt</strong> — einer der zehn IDP-Marktführer verliert seine Unabhängigkeit. Für twiceD öffnet das eine Lücke im Mittelstand.</li>\n      <li><span class=\"chip good\">Ideen · DE</span> <strong>Zwei twiceD-Vorschläge</strong>: ein Dokumenten-Agent für den Mittelstand und eine ehrliche „KI-Kosten &amp; AI-Act\"-Beratung.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday, Gartner released one of the sharpest figures of the year for the software industry: $234 billion in enterprise application software spending stands at risk through 2030 because AI agents are doing the work that used to require opening ten different programs. On the same day, Microsoft locks in Copilot pricing permanently—AI in the office shifts from a discount experiment to a fixed cost line. And Bitkom's numbers show what's really landing in Germany: more adoption, but also more disillusionment.</p>\n    <ul>\n      <li><span class=\"chip hot\">Study · Global</span> <strong>Gartner: $234B in SaaS spending at risk</strong> — \"agentic arbitrage\" threatens roughly 20% of enterprise application spending through 2030.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Microsoft makes Copilot pricing permanent</strong> — the promotional phase ends, the AI add-on becomes a fixed line in the IT budget (license mechanics: see Software Brief).</li>\n      <li><span class=\"chip hot\">Study · DE</span> <strong>Bitkom: 41% of German firms use AI</strong> — just 17% in 2024. But 33% report it costs more than expected, and 19% have already cut jobs.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Legal AI: Harvey valued at $11B</strong> — $200M fresh capital led by GIC and Sequoia. A single startup worth nearly as much as its entire market.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Rossum acquired by Coupa</strong> — one of the top-ten IDP players loses independence. For mid-market Germany, that opens a gap.</li>\n      <li><span class=\"chip good\">Ideas · DE</span> <strong>Two twiceD proposals</strong>: a document agent for mid-market and honest \"AI costs & AI Act\" consulting.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, a Gartner lançou um dos números mais contundentes do ano para a indústria de software: 234 bilhões de dólares em gastos com aplicações empresariais correm risco até 2030 porque agentes de IA estão fazendo o trabalho que costumava exigir abrir dez programas diferentes. No mesmo dia, a Microsoft fixa os preços do Copilot permanentemente — a IA no escritório deixa de ser um experimento com desconto e vira uma linha de custo fixo. E os números da Bitkom mostram o que realmente está chegando na Alemanha: mais adoção, mas também mais desencanto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Estudo · Global</span> <strong>Gartner: 234 bilhões em gastos SaaS em risco</strong> — \"arbitragem agente\" ameaça cerca de 20% dos gastos com aplicações empresariais até 2030.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Microsoft fixa preços do Copilot permanentemente</strong> — a fase promocional termina, o add-on de IA vira uma linha fixa no orçamento de TI (mecânica de licença: veja Brief de Software).</li>\n      <li><span class=\"chip hot\">Estudo · DE</span> <strong>Bitkom: 41% das empresas alemãs usam IA</strong> — eram apenas 17% em 2024. Mas 33% relatam que custou mais do que esperado, e 19% já cortaram postos.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>IA jurídica: Harvey avaliada em US$ 11 bilhões</strong> — US$ 200 milhões em capital fresco, liderados por GIC e Sequoia. Uma única startup vale quase o mercado inteiro que atende.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Rossum adquirida por Coupa</strong> — uma das dez líderes de mercado em IDP perde independência. Para o mercado de médio porte alemão, isso abre uma lacuna.</li>\n      <li><span class=\"chip good\">Ideias · DE</span> <strong>Duas propostas da twiceD</strong>: um agente de documentos para médio porte e uma consultoria honesta de \"custos de IA &amp; Lei de IA\".</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer, Gartner lanzó uno de los números más contundentes del año para la industria de software: 234 mil millones de dólares en gastos de aplicaciones empresariales corren riesgo hasta 2030 porque agentes de IA están haciendo el trabajo que solía requerir abrir diez programas distintos. El mismo día, Microsoft fija los precios de Copilot permanentemente — la IA en la oficina pasa de ser un experimento con descuento a ser una línea de costo fijo. Y los números de Bitkom muestran qué está llegando realmente a Alemania: más adopción, pero también más desencanto.</p>\n    <ul>\n      <li><span class=\"chip hot\">Estudio · Global</span> <strong>Gartner: 234 mil millones en gastos SaaS en riesgo</strong> — \"arbitraje agente\" amenaza aproximadamente el 20% del gasto en aplicaciones empresariales hasta 2030.</li>\n      <li><span class=\"chip\">Deploy · Global</span> <strong>Microsoft fija los precios de Copilot permanentemente</strong> — la fase promocional termina, el complemento de IA se convierte en una línea fija en el presupuesto de TI (mecánica de licencia: ver Brief de Software).</li>\n      <li><span class=\"chip hot\">Estudio · DE</span> <strong>Bitkom: 41% de las empresas alemanas usan IA</strong> — eran solo 17% en 2024. Pero 33% reportan que costó más de lo esperado, y 19% ya han cortado empleos.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>IA legal: Harvey valuada en US$ 11 mil millones</strong> — US$ 200 millones en capital fresco, liderados por GIC y Sequoia. Una sola startup vale casi lo que todo su mercado.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Rossum adquirida por Coupa</strong> — una de las diez líderes de mercado en IDP pierde independencia. Para el mercado de mediano tamaño alemán, eso abre un hueco.</li>\n      <li><span class=\"chip good\">Ideas · DE</span> <strong>Dos propuestas de twiceD</strong>: un agente de documentos para medianas empresas y consultoría honesta de \"costos de IA &amp; Ley de IA\".</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der bitterste Morgen dieses Fußball-Sommers: Deutschland ist bei der eigenen Wunsch-WM früh gescheitert, Brasilien lebt weiter, und drei Achtel-Duelle stehen heute noch an. Für Daniel als DFB-Fan in Brasilien die seltene Konstellation, dass die Seleção länger dabei ist als die Nationalelf. Dazwischen: der SC Freiburg baut in aller Ruhe seinen Sommer-Kader.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus im Sechzehntelfinale</strong>: Deutschland verliert 3:4 i. E. (1:1 n. V.) gegen Paraguay, 29.06. in Foxborough. Havertz, Woltemade und Tah verschießen.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann bleibt</strong>: „Bin keiner, der wegläuft.\" Vertrag bis Sommer 2028; DFB-Spitze lässt seine Zukunft offen.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção im Achtelfinale</strong>: 2:1 gegen Japan (Martinelli 90+). Nächster Gegner Norwegen, <strong>So 05.07.</strong>, 22:00 MESZ / 17:00 BRT.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute Achtel</strong>: Spanien–Österreich 21:00 MESZ / 16:00 BRT, danach Portugal–Kroatien und Schweiz–Algerien (beide in der Nacht auf Freitag europäischer Zeit).</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Sommer-Kader</strong>: vier Zugänge (Backhaus, Yamamoto, Goto, Jung verlängert), fünf Abgänge. Trainingsstart 12.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Vorbereitung</strong>: Trainingslager Schruns 22.–31.07., Tests gegen Derby County (24.07.) und Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Off-Season</strong>: Liga pausiert; Saison 2026/27 startet 28.08. Tabelle unten ist der Abschluss-Stand.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der bitterste Morgen dieses Fußball-Sommers: Deutschland ist bei der eigenen Wunsch-WM früh gescheitert, Brasilien lebt weiter, und drei Achtel-Duelle stehen heute noch an. Für Daniel als DFB-Fan in Brasilien die seltene Konstellation, dass die Seleção länger dabei ist als die Nationalelf. Dazwischen: der SC Freiburg baut in aller Ruhe seinen Sommer-Kader.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus im Sechzehntelfinale</strong>: Deutschland verliert 3:4 i. E. (1:1 n. V.) gegen Paraguay, 29.06. in Foxborough. Havertz, Woltemade und Tah verschießen.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann bleibt</strong>: „Bin keiner, der wegläuft.\" Vertrag bis Sommer 2028; DFB-Spitze lässt seine Zukunft offen.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção im Achtelfinale</strong>: 2:1 gegen Japan (Martinelli 90+). Nächster Gegner Norwegen, <strong>So 05.07.</strong>, 22:00 MESZ / 17:00 BRT.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute Achtel</strong>: Spanien–Österreich 21:00 MESZ / 16:00 BRT, danach Portugal–Kroatien und Schweiz–Algerien (beide in der Nacht auf Freitag europäischer Zeit).</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Sommer-Kader</strong>: vier Zugänge (Backhaus, Yamamoto, Goto, Jung verlängert), fünf Abgänge. Trainingsstart 12.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Vorbereitung</strong>: Trainingslager Schruns 22.–31.07., Tests gegen Derby County (24.07.) und Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Off-Season</strong>: Liga pausiert; Saison 2026/27 startet 28.08. Tabelle unten ist der Abschluss-Stand.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The bitterest morning of this football summer: Germany has fallen early at its own dream World Cup, Brazil moves on, and three Round of 16 matchups still lie ahead today. For Daniel, a DFB fan in Brazil, it's a rare twist that the Seleção outlasts the German national team. Meanwhile, SC Freiburg quietly shapes its summer squad.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>World Cup exit in the Round of 32</strong>: Germany loses 3:4 on penalties (1:1 a.e.t.) to Paraguay, June 29 in Foxborough. Havertz, Woltemade, and Tah miss.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann stays</strong>: \"I'm not one to run away.\" Contract through summer 2028; DFB leadership leaves his future open.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção advances to Round of 16</strong>: 2:1 vs Japan (Martinelli 90+). Next opponent Norway, <strong>Sun 07-05</strong>, 10:00 PM MESZ / 05:00 PM BRT.</li>\n      <li><span class=\"chip\">WM</span> <strong>Today's Round of 32</strong>: Spain–Austria 09:00 PM MESZ / 04:00 PM BRT, then Portugal–Croatia and Switzerland–Algeria (both overnight to Friday European time).</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Summer squad</strong>: four arrivals (Backhaus, Yamamoto, Goto, Jung contract extension), five departures. Training begins 07-12.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Preseason</strong>: training camp Schruns 07-22–07-31, friendlies vs Derby County (07-24) and Greuther Fürth (07-31).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Off-season</strong>: league paused; 2026-27 season starts 08-28. Table below is the final standings.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A manhã mais amarga deste verão de futebol: a Alemanha caiu cedo na sua própria Copa sonhada, o Brasil segue adiante, e três confrontos das oitavas ainda estão por vir hoje. Para Daniel, torcedor da DFB no Brasil, é uma constelação rara: a Seleção dura mais no torneio que a Nationalelf. Enquanto isso, o SC Freiburg constrói seu elenco de verão.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminação nas oitavas</strong>: Alemanha perde 3:4 nos pênaltis (1:1 na prorrogação) contra o Paraguai, 29 de junho em Foxborough. Havertz, Woltemade e Tah erram.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann continua</strong>: \"Não sou alguém que foge.\" Contrato até verão de 2028; liderança da DFB deixa seu futuro aberto.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção nas oitavas</strong>: 2:1 contra o Japão (Martinelli 90+). Próximo adversário Noruega, <strong>dom 05.07.</strong>, 22:00 MESZ / 17:00 BRT.</li>\n      <li><span class=\"chip\">WM</span> <strong>Hoje oitavas</strong>: Espanha–Áustria 21:00 MESZ / 16:00 BRT, depois Portugal–Croácia e Suíça–Argélia (ambas na madrugada de sexta-feira horário europeu).</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Elenco de verão</strong>: quatro chegadas (Backhaus, Yamamoto, Goto, Jung renova), cinco saídas. Início dos treinos 12.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Preparação</strong>: acampamento de treinamento Schruns 22–31.07., amistosos contra Derby County (24.07.) e Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Recesso</strong>: liga em pausa; temporada 2026/27 começa 28.08. Tabela abaixo é a classificação final.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La mañana más amarga de este verano futbolero: Alemania cayó temprano en su Mundial soñado, Brasil sigue adelante, y tres enfrentamientos de octavos aún están por jugar hoy. Para Daniel, hincha de la DFB en Brasil, es una constelación rara que la Seleção tenga más recorrido que la Nationalelf. Mientras tanto, el SC Freiburg construye su plantilla veraniega.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Fuera en octavos</strong>: Alemania pierde 3:4 en penales (1:1 en prórroga) ante Paraguay, 29 de junio en Foxborough. Havertz, Woltemade y Tah fallan.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann se queda</strong>: \"No soy de los que huyen.\" Contrato hasta verano de 2028; la cúpula de la DFB deja su futuro abierto.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Seleção en octavos</strong>: 2:1 ante Japón (Martinelli 90+). Próximo rival Noruega, <strong>dom 05.07.</strong>, 22:00 MESZ / 17:00 BRT.</li>\n      <li><span class=\"chip\">WM</span> <strong>Octavos hoy</strong>: España–Austria 21:00 MESZ / 16:00 BRT, luego Portugal–Croacia y Suiza–Argelia (ambas en la madrugada del viernes hora europea).</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Plantilla veraniega</strong>: cuatro llegadas (Backhaus, Yamamoto, Goto, Jung renueva), cinco salidas. Inicio de entrenamientos 12.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Preparación</strong>: concentración Schruns 22–31.07., amistosos ante Derby County (24.07.) y Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Receso</strong>: liga en pausa; temporada 2026/27 inicia 28.08. Tabla abajo es clasificación final.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist der letzte rennfreie Tag: Ab morgen früh steht die Formel 1 in Silverstone auf der Strecke — und zwar zum ersten Mal seit 2021 als Sprint-Wochenende, also mit zwei Rennen statt einem. Die Ausgangslage könnte klarer kaum sein: Mercedes fährt in beiden Wertungen allein vorne, und ausgerechnet Rookie Kimi Antonelli führt die Fahrer-WM mit 40 Punkten Vorsprung an — auf seinen eigenen Teamkollegen Russell, der in Silverstone Heimspiel hat. Parallel hat in der MotoGP ein Aprilia-Fahrer die Machtverhältnisse gedreht: Jorge Martin ist nach Assen zum ersten Mal seit Austin wieder WM-Führender.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone-Sprint beginnt morgen</strong>: Runde 9, erstes Sprint-Wochenende dort seit 2021. Rennen So 05.07., 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt (Stand 28.06.) — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung (Stand 28.06.).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Martin übernimmt die Führung</strong>: nach Assen (28.06.) 193 Pkt, 7 vor Bezzecchi. Ai Ogura holt in Assen seinen ersten Sieg — erster Japaner ganz vorn seit 2004.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Nächste Runde erst 10.–12.07.</strong> — Deutschland-GP am Sachsenring, nicht dieses Wochenende.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo</strong> (Interlagos) folgen am 12.07. — Toyota führt die Hersteller mit 132 Pkt. Start-Termin vorläufig (Stand 29.06.).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute ist der letzte rennfreie Tag: Ab morgen früh steht die Formel 1 in Silverstone auf der Strecke — und zwar zum ersten Mal seit 2021 als Sprint-Wochenende, also mit zwei Rennen statt einem. Die Ausgangslage könnte klarer kaum sein: Mercedes fährt in beiden Wertungen allein vorne, und ausgerechnet Rookie Kimi Antonelli führt die Fahrer-WM mit 40 Punkten Vorsprung an — auf seinen eigenen Teamkollegen Russell, der in Silverstone Heimspiel hat. Parallel hat in der MotoGP ein Aprilia-Fahrer die Machtverhältnisse gedreht: Jorge Martin ist nach Assen zum ersten Mal seit Austin wieder WM-Führender.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone-Sprint beginnt morgen</strong>: Runde 9, erstes Sprint-Wochenende dort seit 2021. Rennen So 05.07., 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt (Stand 28.06.) — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung (Stand 28.06.).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Martin übernimmt die Führung</strong>: nach Assen (28.06.) 193 Pkt, 7 vor Bezzecchi. Ai Ogura holt in Assen seinen ersten Sieg — erster Japaner ganz vorn seit 2004.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Nächste Runde erst 10.–12.07.</strong> — Deutschland-GP am Sachsenring, nicht dieses Wochenende.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo</strong> (Interlagos) folgen am 12.07. — Toyota führt die Hersteller mit 132 Pkt. Start-Termin vorläufig (Stand 29.06.).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today is the last race-free day: starting tomorrow morning, Formula 1 takes to the track at Silverstone — and for the first time since 2021 as a sprint weekend, meaning two races instead of one. The outlook couldn't be clearer: Mercedes leads both championships by itself, and rookie Kimi Antonelli of all drivers heads the drivers' championship with a 40-point margin — over his own Mercedes teammate Russell, who has a home race at Silverstone. Elsewhere, an Aprilia rider has shifted the balance in MotoGP: Jorge Martin regained the championship lead for the first time since Austin after Assen.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone sprint starts tomorrow</strong>: Round 9, first sprint weekend there since 2021. Race Sun 05.07., 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli leads</strong> the drivers' championship with 171 pts (as of 28.06.) — 40 ahead of teammate Russell (131), 46 ahead of Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominates</strong>: 302 to 204 points over Ferrari in the constructors' championship — a 98-point gap (as of 28.06.).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Martin takes the lead</strong>: after Assen (28.06.) 193 pts, 7 ahead of Bezzecchi. Ai Ogura claims his first win at Assen — first Japanese winner at the top since 2004.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Next round not until 10–12 July</strong> — Germany GP at the Sachsenring, not this weekend.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h São Paulo</strong> (Interlagos) coming 12.07. — Toyota leads the manufacturers with 132 pts. Start time provisional (as of 29.06.).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é o último dia sem corrida: a partir de amanhã cedo, a Fórmula 1 sobe no asfalto de Silverstone — e pela primeira vez desde 2021 como fim de semana de sprint, ou seja, com duas corridas em vez de uma. O quadro não poderia ser mais claro: Mercedes lidera os dois campeonatos sozinha, e justamente o rookie Kimi Antonelli encabeça o campeonato de pilotos com 40 pontos de vantagem — sobre seu próprio colega de equipe Russell, que tem seu circuito na Grã-Bretanha. Enquanto isso, na MotoGP um piloto da Aprilia inverteu a dinâmica: Jorge Martin volta a liderar o campeonato pela primeira vez desde Austin depois de Assen.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint de Silverstone começa amanhã</strong>: Volta 9, primeiro fim de semana de sprint lá desde 2021. Corrida dom 05/07, 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli lidera</strong> o campeonato de pilotos com 171 pts (dados de 28/06) — 40 à frente do colega Russell (131), 46 à frente de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 para 204 pontos sobre Ferrari no campeonato de construtores — 98 pontos de vantagem (dados de 28/06).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Martin assume a liderança</strong>: depois de Assen (28/06) 193 pts, 7 à frente de Bezzecchi. Ai Ogura conquista sua primeira vitória em Assen — primeiro vencedor japonês no topo desde 2004.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Próxima volta só 10–12/07</strong> — GP da Alemanha no Sachsenring, não este fim de semana.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h de São Paulo</strong> (Interlagos) chegam em 12/07 — Toyota lidera os fabricantes com 132 pts. Horário de início provisório (dados de 29/06).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es el último día sin carreras: a partir de mañana temprano, la Fórmula 1 sale a la pista en Silverstone — y por primera vez desde 2021 como fin de semana de sprint, es decir, con dos carreras en lugar de una. La perspectiva no podría ser más clara: Mercedes lidera ambos campeonatos en solitario, y justamente el rookie Kimi Antonelli encabeza el campeonato de pilotos con 40 puntos de ventaja — sobre su propio compañero de equipo Russell, quien tiene su circuito en Gran Bretaña. Mientras tanto, en MotoGP un piloto de Aprilia ha invertido la dinámica: Jorge Martin vuelve a liderar el campeonato por primera vez desde Austin después de Assen.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint de Silverstone comienza mañana</strong>: Vuelta 9, primer fin de semana de sprint ahí desde 2021. Carrera dom 05/07, 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli lidera</strong> el campeonato de pilotos con 171 pts (datos de 28/06) — 40 puntos por delante del compañero Russell (131), 46 por delante de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 a 204 puntos sobre Ferrari en el campeonato de constructores — 98 puntos de ventaja (datos de 28/06).</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Martin se apodera del liderato</strong>: después de Assen (28/06) 193 pts, 7 adelante de Bezzecchi. Ai Ogura consigue su primer triunfo en Assen — primer ganador japonés en la cúspide desde 2004.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Próxima vuelta solo 10–12/07</strong> — GP de Alemania en el Sachsenring, no este fin de semana.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h de São Paulo</strong> (Interlagos) llegan el 12/07 — Toyota lidera a los fabricantes con 132 pts. Horario de salida provisional (datos de 29/06).</li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Donnerstag, der 2. Juli, und das größte Fest des Jahres startet ausgerechnet in Ribeirão Claro selbst: Die 28. Fescafé läuft von heute bis Sonntag, mit freiem Familien-Programm, Kinder-Show und Rummelplatz — kein Kilometer Fahrt nötig. Dazu ein trockener, milder Winter-Auftakt heute (28°/14°) und am Wochenende ein paar Schauer, gegen die man planen kann. Und die brasilianischen Winterferien rücken näher: Ab dem 13. Juli hat die Schule Pause.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>28. Fescafé, Do–So im Kern-Ort</strong>: vier Tage Fest im Centro de Eventos Barão Harbach, freies Familien-Programm, Kinder-Show „Sonhos e Magia\" am Sonntag.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Heute trocken & sonnig</strong>: 28°/14°, 0 % Regen. Am Wochenende kühler mit 40 % Schauer-Chance Fr/Sa.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien ab 13. Juli</strong> (staatliches PR-Netz): Unterricht wieder ab 25. Juli — Enddatum je nach Netz 24. oder 26.07.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina-Ferienpark</strong>: Catuaí Shopping fährt bis 30.07 vier Kinder-Attraktionen auf — der Praça-Park kostet R$ 50 / 30 min.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Ourinhos-Musikfestival 14.–18.07</strong>: freie Konzerte, Thema „Brasilidades\" — Day-Trip für die Schulkinder.</li>\n      <li><span class=\"chip good\">Wochenend-Pick</span> <strong>Fescafé-Familientag</strong>: der einfachste Samstag/Sonntag seit langem — alles fußläufig, gratis, für jedes Alter etwas.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>BR-Winter = RSV-Saison</strong>: für das Baby (1 Monat) auf dem Fest Menschenmengen und Kälte-Abend meiden — keine akute Alarm-Zahl, aber saisonale Vorsicht.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Donnerstag, der 2. Juli, und das größte Fest des Jahres startet ausgerechnet in Ribeirão Claro selbst: Die 28. Fescafé läuft von heute bis Sonntag, mit freiem Familien-Programm, Kinder-Show und Rummelplatz — kein Kilometer Fahrt nötig. Dazu ein trockener, milder Winter-Auftakt heute (28°/14°) und am Wochenende ein paar Schauer, gegen die man planen kann. Und die brasilianischen Winterferien rücken näher: Ab dem 13. Juli hat die Schule Pause.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>28. Fescafé, Do–So im Kern-Ort</strong>: vier Tage Fest im Centro de Eventos Barão Harbach, freies Familien-Programm, Kinder-Show „Sonhos e Magia\" am Sonntag.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Heute trocken & sonnig</strong>: 28°/14°, 0 % Regen. Am Wochenende kühler mit 40 % Schauer-Chance Fr/Sa.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien ab 13. Juli</strong> (staatliches PR-Netz): Unterricht wieder ab 25. Juli — Enddatum je nach Netz 24. oder 26.07.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina-Ferienpark</strong>: Catuaí Shopping fährt bis 30.07 vier Kinder-Attraktionen auf — der Praça-Park kostet R$ 50 / 30 min.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Ourinhos-Musikfestival 14.–18.07</strong>: freie Konzerte, Thema „Brasilidades\" — Day-Trip für die Schulkinder.</li>\n      <li><span class=\"chip good\">Wochenend-Pick</span> <strong>Fescafé-Familientag</strong>: der einfachste Samstag/Sonntag seit langem — alles fußläufig, gratis, für jedes Alter etwas.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>BR-Winter = RSV-Saison</strong>: für das Baby (1 Monat) auf dem Fest Menschenmengen und Kälte-Abend meiden — keine akute Alarm-Zahl, aber saisonale Vorsicht.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Thursday, July 2nd, and the year's biggest festival kicks off right in Ribeirão Claro itself: the 28th Fescafé runs from today through Sunday, with free family programming, a kids' show, and carnival rides — no driving needed. Plus a dry, mild winter start today (28°/14°) and a few showers on the weekend you can plan around. And Brazilian winter break is coming: school takes a break starting July 13th.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>28th Fescafé, Thu–Sun in town center</strong>: four days of festival at Centro de Eventos Barão Harbach, free family programming, kids' show \"Sonhos e Magia\" on Sunday.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Today dry & sunny</strong>: 28°/14°, 0% rain. Weekend cooler with 40% shower chance Fri/Sat.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break starts July 13th</strong> (state PR schools): classes resume July 25th — end date varies by school (24th or 26th).</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina holiday park</strong>: Catuaí Shopping runs four kids' attractions through 30.07 — Praça Park costs R$ 50 / 30 min.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Ourinhos Music Festival 14–18.07</strong>: free concerts, theme \"Brasilidades\" — day trip for school kids.</li>\n      <li><span class=\"chip good\">Weekend Pick</span> <strong>Fescafé family day</strong>: the easiest Saturday/Sunday in a long time — everything walkable, free, something for every age.</li>\n      <li><span class=\"chip\">Health</span> <strong>BR winter = RSV season</strong>: for the baby (1 month old) at the festival avoid large crowds and cold evenings — no acute alert, but seasonal caution.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Quinta-feira, 2 de julho, e o maior festival do ano começa bem aqui em Ribeirão Claro: a 28ª Fescafé vai de hoje até domingo, com programação gratuita para famílias, show infantil e parque de diversões — sem necessidade de viajar. Além disso, um inverno seco e agradável começando hoje (28°/14°) e alguns chuviscos no fim de semana que dá para se planejar. E as férias de inverno do Brasil se aproximam: a partir de 13 de julho a escola tem pausa.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>28ª Fescafé, qui–dom no centro da cidade</strong>: quatro dias de festa no Centro de Eventos Barão Harbach, programação gratuita para famílias, show infantil \"Sonhos e Magia\" no domingo.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Hoje seco & ensolarado</strong>: 28°/14°, 0% de chuva. Fim de semana mais fresco com 40% de chance de chuviscos sex/sáb.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno a partir de 13 de julho</strong> (rede estadual PR): aulas voltam em 25 de julho — data final varia por rede (24 ou 26 de julho).</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Parque de férias em Londrina</strong>: Catuaí Shopping opera quatro atrações infantis até 30.07 — Praça Park custa R$ 50 / 30 min.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Festival de Música de Ourinhos 14–18.07</strong>: shows gratuitos, tema \"Brasilidades\" — dia de passeio para crianças da escola.</li>\n      <li><span class=\"chip good\">Dica de fim de semana</span> <strong>Dia da família na Fescafé</strong>: o fim de semana mais fácil que temos há tempos — tudo perto, de graça, tem coisa para toda idade.</li>\n      <li><span class=\"chip\">Saúde</span> <strong>Inverno BR = temporada de VSR</strong>: para o bebê (1 mês) na festa, evitar multidões e noites frias — sem alerta agudo, mas atenção sazonal.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Jueves, 2 de julio, y el mayor festival del año comienza justo aquí en Ribeirão Claro: la 28ª Fescafé corre de hoy hasta el domingo, con programación gratuita para familias, show infantil y parque de diversiones — sin necesidad de viajar. Además, un invierno seco y agradable comenzando hoy (28°/14°) y algunos chubascos en el fin de semana que puedes planificar. Y las vacaciones de invierno de Brasil se acercan: a partir del 13 de julio la escuela tiene descanso.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>28ª Fescafé, jue–dom en el centro de la ciudad</strong>: cuatro días de fiesta en el Centro de Eventos Barão Harbach, programación gratuita para familias, show infantil \"Sonhos e Magia\" el domingo.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Hoy seco & soleado</strong>: 28°/14°, 0% de lluvia. Fin de semana más fresco con 40% de probabilidad de chubascos vie/sáb.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno a partir del 13 de julio</strong> (red estatal PR): clases regresan el 25 de julio — fecha final varía por red (24 o 26 de julio).</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Parque de vacaciones en Londrina</strong>: Catuaí Shopping opera cuatro atracciones infantiles hasta el 30.07 — Praça Park cuesta R$ 50 / 30 min.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Festival de Música de Ourinhos 14–18.07</strong>: conciertos gratuitos, tema \"Brasilidades\" — paseo de un día para niños de escuela.</li>\n      <li><span class=\"chip good\">Recomendación del fin de semana</span> <strong>Día familiar en la Fescafé</strong>: el fin de semana más fácil que hemos tenido en mucho tiempo — todo cerca, gratis, hay algo para toda edad.</li>\n      <li><span class=\"chip\">Salud</span> <strong>Invierno BR = temporada de VSR</strong>: para el bebé (1 mes) en la fiesta, evita multitudes y noches frías — sin alerta agudo, pero precaución estacional.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Donnerstag ist Fußball &amp; Sport — und die WM 2026 in den USA, Mexiko und Kanada steckt mittendrin in der K.o.-Phase. Brasilien schlug Japan mit 2:1 und trifft im Achtelfinale am Sonntag, 5. Juli, auf Norwegen (17:00 BRT / 22:00 MESZ, MetLife Stadium, New Jersey) — Sieger geht ins Viertelfinale.<sup>[1]</sup> Der letzte Fußball-Tag (11. Juni) lehrte die Turnier-Basics: Achtelfinale, Nachspielzeit, Aufstellung. Heute die nächste Stufe — das Vokabular der Entscheidungsspiele: <strong>das Viertelfinale, das Elfmeterschießen, der Video-Schiedsrichter (VAR), der Titelverteidiger</strong> und die Verben, die zählen, wenn es eng wird — sich verletzen, ausscheiden lassen, einen Elfmeter halten. Elf Verben mit voller Konjugation, dazu ein cross-linguistischer Konjugations-Leckerbissen: <em>verlieren / perder / perder</em> — ein Wort, drei völlig verschiedene Unregelmäßigkeiten.</p>\n    <ul>\n      <li><span class=\"chip hot\">KONJUGATION</span> <strong>verlieren / perder / perder</strong> — dasselbe Wort, drei Mechanismen: DE Ablaut <em>ie-o-o</em> + <em>haben</em> (nicht <em>sein</em>!), PT Konsonantenwechsel d→c (<em>eu perco, que ele perca</em>), ES Diphthong e→ie (<em>yo pierdo, nosotros perdemos</em>).</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT „a batida\" ≠ DE „Batida\" (der Cocktail)</strong> — im Fußball ist <em>a batida</em> der Schuss/die Ausführung (z. B. <em>a batida do pênalti</em> = die Elfmeter-Ausführung). Der Getränke-<em>batida</em> ist dasselbe Wort („Schlag/Rühren\"), aber nicht auf dem Platz gemeint.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>EN „to pretend\" ≠ ES „pretender\"</strong> — <em>pretender</em> heißt „beabsichtigen/anstreben\" (<em>Brasil pretende ganar</em> = Brasilien will gewinnen), nicht „vortäuschen\". Ein Foul vortäuschen ist ES <em>simular / hacer una clavada</em>, PT <em>simular / cavar</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>cobrar (uma falta / um pênalti)</strong> = einen Freistoß/Elfmeter ausführen — im BR-PT das Standardverb, wo DE „schießen/ausführen\" sagt. Wörtlich „einfordern\". In Mexiko: <em>cobrar</em> geht auch, oder <em>tirar / lanzar</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>as quartas de final</strong> = das Viertelfinale (Plural im PT!), <em>as oitavas de final</em> = das Achtelfinale. In Mexiko: <em>los cuartos de final</em>, <em>los octavos de final</em> — beide im Plural, DE im Singular.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o VAR / o árbitro de vídeo</strong> — in Brasilien spricht man einfach „o VAR\" (englisch ausgesprochen), offiziell <em>o árbitro assistente de vídeo</em>. DE: „der Video-Schiedsrichter / der Videobeweis\".</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT vencer (besiegen)</strong> schreibt c→ç vor o/a: <em>eu venço</em>, Subj. <em>vença</em> — sonst klänge das c wie /k/. ES <em>vencer</em> macht c→z: <em>yo venzo</em>, Subj. <em>venza</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES calentar (aufwärmen)</strong> ist e→ie: <em>yo caliento, nosotros calentamos</em>. PT <em>aquecer</em> dagegen c→ç: <em>eu aqueço</em>, Subj. <em>aqueça</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE sich verletzen</strong> ist regelmäßig, aber reflexiv &amp; mit <em>haben</em>: <em>er hat sich verletzt</em>. Das schon gelehrte <em>verletzt</em> war das Adjektiv — heute das Verb dahinter.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>DE „das Elfmeterschießen\" (n)</strong> ↔ PT <em>a disputa de pênaltis</em> (f) ↔ ES <em>la tanda de penales</em> (f). Und der einzelne Elfmeter: PT <em>o pênalti</em> (m), ES <em>el penal</em> (m).</li>\n      <li><span class=\"chip\">WIEDERHOLUNG</span> Heute frischen wir <strong>gewinnen · sich qualifizieren · das Achtelfinale</strong> (vom 11. Juni) auf — jetzt im K.o.-Kontext der laufenden WM.</li>\n    </ul></div>",
