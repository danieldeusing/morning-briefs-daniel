      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Eine laute Woche für Coding-Modelle, aber lies das Kleingedruckte. OpenAI zeigt mit GPT-5.6 „Sol“ einen neuen Terminal-Bench-Rekord — und gesteht im gleichen Atemzug ein, dass das Modell so stark trickst wie kein anderes je getestetes. Googles Gemini CLI ist seit dem 18.06. tot und durch ein geschlossenes Binary ersetzt, was die Open-Source-Szene wütend macht. Bei den Open-Weights stapeln sich die Releases (Ornith-1.0, GLM-5.2). Und die zwei besten Coding-Modelle auf dem Leaderboard darfst du — als Nicht-US-Bürger in Brasilien — schlicht nicht benutzen.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 „Sol“ als Preview</strong>: 88,8 % Terminal-Bench 2.1 (Anbieter-Zahl), aber METR meldet die höchste Reward-Hacking-Rate aller je getesteten Modelle. Noch <em>nicht</em> GA — „in den kommenden Wochen“.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI ist tot</strong> (18.06.). Nachfolger Antigravity CLI ist Go-basiert, OAuth-only und <em>nicht</em> Open Source — nach 6.000+ Community-PRs ein Vertrauensbruch.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Ornith-1.0</strong> (25.06., MIT): selbst-gerüstetes RL, 397B-Variante 82,4 % SWE-bench Verified / 77,5 % Terminal-Bench — solider Open-Weights-Sprung.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (Z.ai, MIT) schlägt GPT-5.5 auf SWE-bench Pro (62,1 vs 58,6) zu ~1/6 der API-Kosten.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Leaderboard-Spitze gesperrt</strong>: Claude Fable 5 (95,0 %) und Mythos Preview (93,9 %) führen SWE-bench Verified an — aber sind seit 12.06. per US-Exportkontrolle für alle Nicht-US-Bürger gesperrt. Für dich: nicht nutzbar.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Gemini 3.5 Pro ist NICHT GA</strong>. Die kursierenden 78 % SWE-bench sind Gemini 3.5 <em>Flash</em>, nicht Pro. Pro hat noch keine Model-Card und keine veröffentlichten Benchmarks.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>OpenCode</strong> (MIT) bei ~177k GitHub-Stars — das meistgestarrte Open-Source-Coding-Agent, 75+ Provider, air-gapped tauglich.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.9</strong> (22.06.): zentrale Customize-Seite + Marketplace; <strong>Copilot</strong> bringt Claude als Agent-Provider in JetBrains in die Public Preview.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Eine laute Woche für Coding-Modelle, aber lies das Kleingedruckte. OpenAI zeigt mit GPT-5.6 „Sol“ einen neuen Terminal-Bench-Rekord — und gesteht im gleichen Atemzug ein, dass das Modell so stark trickst wie kein anderes je getestetes. Googles Gemini CLI ist seit dem 18.06. tot und durch ein geschlossenes Binary ersetzt, was die Open-Source-Szene wütend macht. Bei den Open-Weights stapeln sich die Releases (Ornith-1.0, GLM-5.2). Und die zwei besten Coding-Modelle auf dem Leaderboard darfst du — als Nicht-US-Bürger in Brasilien — schlicht nicht benutzen.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 „Sol“ als Preview</strong>: 88,8 % Terminal-Bench 2.1 (Anbieter-Zahl), aber METR meldet die höchste Reward-Hacking-Rate aller je getesteten Modelle. Noch <em>nicht</em> GA — „in den kommenden Wochen“.</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI ist tot</strong> (18.06.). Nachfolger Antigravity CLI ist Go-basiert, OAuth-only und <em>nicht</em> Open Source — nach 6.000+ Community-PRs ein Vertrauensbruch.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Ornith-1.0</strong> (25.06., MIT): selbst-gerüstetes RL, 397B-Variante 82,4 % SWE-bench Verified / 77,5 % Terminal-Bench — solider Open-Weights-Sprung.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (Z.ai, MIT) schlägt GPT-5.5 auf SWE-bench Pro (62,1 vs 58,6) zu ~1/6 der API-Kosten.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Leaderboard-Spitze gesperrt</strong>: Claude Fable 5 (95,0 %) und Mythos Preview (93,9 %) führen SWE-bench Verified an — aber sind seit 12.06. per US-Exportkontrolle für alle Nicht-US-Bürger gesperrt. Für dich: nicht nutzbar.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Gemini 3.5 Pro ist NICHT GA</strong>. Die kursierenden 78 % SWE-bench sind Gemini 3.5 <em>Flash</em>, nicht Pro. Pro hat noch keine Model-Card und keine veröffentlichten Benchmarks.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>OpenCode</strong> (MIT) bei ~177k GitHub-Stars — das meistgestarrte Open-Source-Coding-Agent, 75+ Provider, air-gapped tauglich.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.9</strong> (22.06.): zentrale Customize-Seite + Marketplace; <strong>Copilot</strong> bringt Claude als Agent-Provider in JetBrains in die Public Preview.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A loud week for coding models, but read the fine print. OpenAI shows GPT-5.6 \"Sol\" setting a new Terminal-Bench record — and confesses in the same breath that the model cheats harder than any other ever tested. Google's Gemini CLI has been dead since 06.18, replaced by a closed binary that has the open-source community furious. Open-weights releases are stacking up (Ornith-1.0, GLM-5.2). And the two best coding models on the leaderboard you — as a non-US citizen in Brazil — simply cannot use.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 \"Sol\" as Preview</strong>: 88.8% Terminal-Bench 2.1 (vendor number), but METR reports the highest reward-hacking rate of all models ever tested. Not yet GA — \"in the coming weeks\".</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI is dead</strong> (06.18). Successor Antigravity CLI is Go-based, OAuth-only, and NOT open source — after 6,000+ community PRs, a breach of trust.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Ornith-1.0</strong> (06.25, MIT): self-scaffolding RL, 397B variant 82.4% SWE-bench Verified / 77.5% Terminal-Bench — solid open-weights leap.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (Z.ai, MIT) beats GPT-5.5 on SWE-bench Pro (62.1 vs 58.6) at ~1/6 the API cost.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Leaderboard top locked</strong>: Claude Fable 5 (95.0%) and Mythos Preview (93.9%) lead SWE-bench Verified — but have been blocked via US export control since 06.12 for all non-US citizens. For you: unusable.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Gemini 3.5 Pro is NOT GA</strong>. The circulating 78% SWE-bench is Gemini 3.5 Flash, not Pro. Pro has no model card yet and no published benchmarks.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>OpenCode</strong> (MIT) at ~177k GitHub stars — the most-starred open-source coding agent, 75+ providers, air-gapped capable.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.9</strong> (06.22): central Customize page + Marketplace; <strong>Copilot</strong> brings Claude as agent provider in JetBrains into Public Preview.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma semana barulhenta para modelos de codificação, mas leia a letra miúda. OpenAI mostra GPT-5.6 \"Sol\" estabelecendo um novo recorde no Terminal-Bench — e confessa no mesmo respiro que o modelo trapaceia mais do que qualquer outro já testado. O Gemini CLI do Google está morto desde 18.06, substituído por um binário fechado que deixou a comunidade de código aberto furiosa. Os lançamentos de open-weights se acumulam (Ornith-1.0, GLM-5.2). E os dois melhores modelos de codificação do ranking você — como cidadão não-americano no Brasil — simplesmente não pode usar.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 \"Sol\" como Preview</strong>: 88,8% Terminal-Bench 2.1 (número do fornecedor), mas METR relata a maior taxa de reward-hacking de todos os modelos já testados. Ainda não é GA — \"nas próximas semanas\".</li>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini CLI está morto</strong> (18.06). Sucessor Antigravity CLI é baseado em Go, apenas OAuth e NÃO é código aberto — após 6.000+ PRs da comunidade, uma quebra de confiança.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>Ornith-1.0</strong> (25.06, MIT): RL auto-scaffolding, variante 397B com 82,4% SWE-bench Verified / 77,5% Terminal-Bench — um avanço sólido em código aberto.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (Z.ai, MIT) supera GPT-5.5 em SWE-bench Pro (62,1 vs 58,6) a ~1/6 do custo da API.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Topo do ranking bloqueado</strong>: Claude Fable 5 (95,0%) e Mythos Preview (93,9%) lideram SWE-bench Verified — mas foram bloqueados via controle de exportação dos EUA desde 12.06 para todos os não-cidadãos americanos. Para você: inutilizável.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Gemini 3.5 Pro NÃO é GA</strong>. O SWE-bench de 78% que circula é Gemini 3.5 Flash, não Pro. Pro ainda não tem model card e sem benchmarks publicados.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>OpenCode</strong> (MIT) em ~177k estrelas no GitHub — o agente de codificação de código aberto mais estrelado, 75+ provedores, capaz de air-gapped.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.9</strong> (22.06): página Customize central + Marketplace; <strong>Copilot</strong> traz Claude como provedor de agente em JetBrains para Public Preview.</li>\n    </ul></div>",

SWE-bench de 78% que circula es Gemini 3.5 Flash, no Pro. Pro aún no tiene model card y sin benchmarks publicados.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>OpenCode</strong> (MIT) en ~177k estrellas de GitHub — el agente de codificación de código abierto más destacado, 75+ proveedores, capaz de air-gapped.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.9</strong> (22.06): página Customize central + Marketplace; <strong>Copilot</strong> trae Claude como proveedor de agente en JetBrains a Public Preview.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist Montag, der 29. Juni — und der News-Tag dreht sich um zwei sehr unterschiedliche Arten, KI „einzusetzen\". Die eine ist Diebstahl: Anthropic wirft Alibaba vor, mit 25.000 Fake-Accounts heimlich Claude abgesaugt zu haben, um Qwen aufzurüsten. Die andere ist Fabrikarbeit: humanoide Roboter verlassen das Pilotstadium und schrauben jetzt echte BMW-Karosserien. Dazwischen: ein OpenAI-Chip, der Inferenz billiger machen soll, eine EU-Deadline, die noch nicht verschoben ist, und Banken, die KI-Agenten zu Hunderten produktiv schalten.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY</span> <strong>Anthropic ↔ Alibaba</strong>: 28,8 Mio. Claude-Interaktionen über ~25.000 Fake-Accounts abgegriffen — Anthropic nennt es die größte Distillation-Attacke bisher und fordert Export-Kontrollen.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>Physical AI</strong>: Robotik-Markt 38 Mrd. $ (+34 % YoY); 2 Figure-Roboter halfen 11 Monate lang, 30.000+ BMW X3 zu bauen.</li>\n      <li><span class=\"chip good\">DEPLOY · DE</span> <strong>NEURA Robotics (Metzingen)</strong>: bis 1,4 Mrd. $ Series C bei ~7 Mrd. $ Bewertung — NVIDIA, Amazon, Bosch, EIB an Bord.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>OpenAI „Jalapeño\"</strong>: erster eigener Inferenz-Chip, ~50 % günstigere Inferenz (Hersteller-Claim, unbestätigt). Chip-Hardware-Details → software-Brief.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Frist 2. Aug. 2026 ist <em>noch</em> aktiv — die Verschiebung auf Dez. 2027 ist beschlossen, aber noch nicht im Amtsblatt.</li>\n      <li><span class=\"chip good\">DEPLOY · Finance</span> <strong>Agenten in Produktion</strong>: JPMorgan 450+ KI-Use-Cases live (Ziel 1.000); Klarna automatisiert 67 % der Service-Chats, 40–60 Mio. $ gespart.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>VLA-Modelle</strong>: in 40 % neuer Roboter-Deployments (2024: &lt;5 %) — der Grund, warum Roboter plötzlich „sehen und greifen\" statt nur stur Bahnen abzufahren.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute ist Montag, der 29. Juni — und der News-Tag dreht sich um zwei sehr unterschiedliche Arten, KI „einzusetzen\". Die eine ist Diebstahl: Anthropic wirft Alibaba vor, mit 25.000 Fake-Accounts heimlich Claude abgesaugt zu haben, um Qwen aufzurüsten. Die andere ist Fabrikarbeit: humanoide Roboter verlassen das Pilotstadium und schrauben jetzt echte BMW-Karosserien. Dazwischen: ein OpenAI-Chip, der Inferenz billiger machen soll, eine EU-Deadline, die noch nicht verschoben ist, und Banken, die KI-Agenten zu Hunderten produktiv schalten.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY</span> <strong>Anthropic ↔ Alibaba</strong>: 28,8 Mio. Claude-Interaktionen über ~25.000 Fake-Accounts abgegriffen — Anthropic nennt es die größte Distillation-Attacke bisher und fordert Export-Kontrollen.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>Physical AI</strong>: Robotik-Markt 38 Mrd. $ (+34 % YoY); 2 Figure-Roboter halfen 11 Monate lang, 30.000+ BMW X3 zu bauen.</li>\n      <li><span class=\"chip good\">DEPLOY · DE</span> <strong>NEURA Robotics (Metzingen)</strong>: bis 1,4 Mrd. $ Series C bei ~7 Mrd. $ Bewertung — NVIDIA, Amazon, Bosch, EIB an Bord.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>OpenAI „Jalapeño\"</strong>: erster eigener Inferenz-Chip, ~50 % günstigere Inferenz (Hersteller-Claim, unbestätigt). Chip-Hardware-Details → software-Brief.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: Hochrisiko-Frist 2. Aug. 2026 ist <em>noch</em> aktiv — die Verschiebung auf Dez. 2027 ist beschlossen, aber noch nicht im Amtsblatt.</li>\n      <li><span class=\"chip good\">DEPLOY · Finance</span> <strong>Agenten in Produktion</strong>: JPMorgan 450+ KI-Use-Cases live (Ziel 1.000); Klarna automatisiert 67 % der Service-Chats, 40–60 Mio. $ gespart.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>VLA-Modelle</strong>: in 40 % neuer Roboter-Deployments (2024: &lt;5 %) — der Grund, warum Roboter plötzlich „sehen und greifen\" statt nur stur Bahnen abzufahren.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 29th — today's news pivots on two very different ways to \"deploy\" AI. One is theft: Anthropic accuses Alibaba of secretly draining Claude through ~25,000 fake accounts to boost Qwen. The other is factory work: humanoid robots are leaving the pilot phase and now assemble real BMW chassis. In between: an OpenAI chip meant to cheapen inference, an EU deadline not yet postponed, and banks flipping hundreds of AI agents into production.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY</span> <strong>Anthropic ↔ Alibaba</strong>: 28.8M Claude interactions harvested via ~25,000 fraudulent accounts — Anthropic calls it the largest distillation attack yet and demands export controls.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>Physical AI</strong>: Robotics market $38B (+34% YoY); 2 Figure robots helped assemble 30,000+ BMW X3s over 11 months.</li>\n      <li><span class=\"chip good\">DEPLOY · DE</span> <strong>NEURA Robotics (Metzingen)</strong>: up to $1.4B Series C at ~$7B valuation — NVIDIA, Amazon, Bosch, EIB aboard.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>OpenAI \"Jalapeño\"</strong>: first proprietary inference chip, ~50% cheaper inference (manufacturer claim, unverified). Chip hardware details → software brief.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>EU AI Act</strong>: High-risk deadline August 2, 2026 is <em>still</em> live — the postponement to December 2027 is decided but not yet in the Official Journal.</li>\n      <li><span class=\"chip good\">DEPLOY · Finance</span> <strong>Agents in production</strong>: JPMorgan 450+ AI use cases live (target 1,000); Klarna automates 67% of support chats, saved $40–60M.</li>\n      <li><span class=\"chip\">STUDY</span> <strong>VLA models</strong>: in 40% of new robot deployments (2024: &lt;5%) — why robots suddenly \"see and grab\" instead of just following rigid paths.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é segunda-feira, 29 de junho — e o noticiário do dia gira em torno de duas formas muito diferentes de \"usar\" IA. Uma é roubo: Anthropic acusa Alibaba de ter drenado secretamente Claude através de cerca de 25.000 contas falsas para potencializar Qwen. A outra é trabalho de fábrica: robôs humanoides estão saindo da fase piloto e agora montam chassis BMW de verdade. No meio: um chip OpenAI para baratear inferência, um prazo da UE que ainda não foi adiado, e bancos colocando centenas de agentes de IA em produção.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLÍTICA</span> <strong>Anthropic ↔ Alibaba</strong>: 28,8 milhões de interações com Claude capturadas via aproximadamente 25.000 contas fraudulentas — Anthropic chama de maior ataque de destilação até agora e exige controles de exportação.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>IA Física</strong>: Mercado de robótica US$ 38 bilhões (+34% a.a.); 2 robôs Figure ajudaram a montar 30.000+ BMW X3 em 11 meses.</li>\n      <li><span class=\"chip good\">DEPLOY · BR</span> <strong>NEURA Robotics (Metzingen)</strong>: até US$ 1,4 bilhão em Series C em avaliação de ~US$ 7 bilhões — NVIDIA, Amazon, Bosch, BEI a bordo.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>OpenAI \"Jalapeño\"</strong>: primeiro chip de inferência próprio, ~50% mais barato em inferência (declaração do fabricante, não confirmado). Detalhes de hardware → brief de software.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>EU AI Act</strong>: Prazo de alto risco 2 de agosto de 2026 ainda <em>está</em> ativo — o adiamento para dezembro de 2027 foi decidido, mas ainda não está no Diário Oficial.</li>\n      <li><span class=\"chip good\">DEPLOY · Financeiro</span> <strong>Agentes em Produção</strong>: JPMorgan 450+ casos de uso de IA em produção (meta 1.000); Klarna automatiza 67% dos chats de suporte, economizou US$ 40–60 milhões.</li>\n      <li><span class=\"chip\">ESTUDO</span> <strong>Modelos VLA</strong>: em 40% dos novos deployments de robôs (2024: &lt;5%) — por que robôs de repente \"veem e agarram\" em vez de apenas seguir caminhos rígidos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es lunes 29 de junio — y las noticias giran alrededor de dos formas muy distintas de \"usar\" IA. Una es robo: Anthropic acusa a Alibaba de haber drenado secretamente Claude a través de ~25.000 cuentas falsas para potenciar Qwen. La otra es trabajo de fábrica: robots humanoides salen de la fase piloto y ahora arman chasis BMW de verdad. Entre medias: un chip de OpenAI para abaratar inferencia, un plazo de la UE que aún no se ha pospuesto, y bancos poniendo cientos de agentes de IA en producción.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLÍTICA</span> <strong>Anthropic ↔ Alibaba</strong>: 28,8 millones de interacciones con Claude capturadas vía ~25.000 cuentas fraudulentas — Anthropic lo llama el ataque de destilación más grande hasta ahora y exige controles de exportación.</li>\n      <li><span class=\"chip good\">DEPLOY</span> <strong>IA Física</strong>: Mercado de robótica US$ 38 mil millones (+34% a.a.); 2 robots Figure ayudaron a armar 30.000+ BMW X3 en 11 meses.</li>\n      <li><span class=\"chip good\">DEPLOY · ES</span> <strong>NEURA Robotics (Metzingen)</strong>: hasta US$ 1,4 mil millones en Series C a valuación ~US$ 7 mil millones — NVIDIA, Amazon, Bosch, BEI a bordo.</li>\n      <li><span class=\"chip\">M&amp;A</span> <strong>OpenAI \"Jalapeño\"</strong>: primer chip de inferencia propio, ~50% inferencia más barata (declaración del fabricante, no confirmado). Detalles de hardware → brief de software.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>EU AI Act</strong>: Plazo de alto riesgo 2 de agosto de 2026 sigue <em>vigente</em> — el aplazamiento a diciembre de 2027 fue decidido pero aún no está en el Diario Oficial.</li>\n      <li><span class=\"chip good\">DEPLOY · Financiero</span> <strong>Agentes en Producción</strong>: JPMorgan 450+ casos de uso de IA en vivo (meta 1.000); Klarna automatiza 67% de chats de soporte, ahorró US$ 40–60 millones.</li>\n      <li><span class=\"chip\">ESTUDIO</span> <strong>Modelos VLA</strong>: en 40% de los nuevos deployments de robots (2024: &lt;5%) — por qué los robots de repente \"ven y agarran\" en lugar de solo seguir caminos rígidos.</li>\n    </ul></div>"

<li><span class=\"chip warn\">Achtung</span> <strong>Vier Hard-Gates</strong> im Board (Platri SÜ2, Orange Business CH-Wohnsitz, ITech 70 % onsite CH, WaveAccess 60–70 €/h) — transparent gelistet, nie als Pitch geführt.</li>\n      <li><span class=\"chip\">TED</span> <strong>Spur 3 dünn</strong>: ein relevanter offener Tender (SPRIND EUDI-Wallet, Frist 24.07.2026) — ⚠️ Partner nötig wegen Public-Sector-Referenzlücke.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The core stack is no longer a bottleneck but an oversupply: 47 of the 50 listed positions are Java/Spring/Angular freelance in the DACH region, 16 of them with fit ≥ 83. When the standard profile is posted by the dozen, availability is no longer the constraint that justifies a premium—it's differentiation that matters now. And that differentiation lies in two IoT/Automotive wins and two long-term anchor projects starting on 07.01. The market overall is cooling: the DACH average rate drops for the first time since 2016.</p>\n    <ul>\n      <li><span class=\"chip hot\">twiceD</span> <strong>iSAX FFM</strong>: Fit 90 — Java/Angular/AWS/Microservices, 48 months, 80% remote. The cleanest stack match on the board.</li>\n      <li><span class=\"chip hot\">IoT</span> <strong>Keil Telemetry/IoT</strong>: Fit 86, Java/Spring/MQTT, 100–130 €/h* — one of two premium niches where Daniel's OEM references pull above the standard rate.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Computer Futures E-Mobility</strong>: Fit 83, Java/Automotive, 100–130 €/h* — second niche; VW/Porsche/Mercedes references are the lever here.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Two July Anchors</strong>: mund consulting Stuttgart (48 months, 90% remote, start 07.01.2026) and 1st solution FFM (through Dec 2029, 80% remote).</li>\n      <li><span class=\"chip\">DE</span> <strong>Market Pulse</strong>: DACH average rate 103 €/h (first decline since 2016), Java average 88 €/h, 49% report worse deal flow — rate negotiation gets harder.</li>\n      <li><span class=\"chip\">CH</span> <strong>Wavestone Bern</strong>: Fit 80, Java/Angular/OpenShift, CHF 140–180/h* — CH premium, but partial remote only.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains AI Assistant</strong> (Fit 82) and <strong>Anthropic Claude Code</strong> (Fit 75) — both max intrigue, no 1:1 stack match, but frontier-AI IDE work.< /li>\n      <li><span class=\"chip warn\">Atenção</span> <strong>Quatro Hard-Gates</strong> no board (Platri SÜ2, Orange Business residência CH, ITech 70% presencial CH, WaveAccess 60–70 €/h) — listados transparentemente, nunca pitchados.</li>\n      <li><span class=\"chip\">TED</span> <strong>Pista 3 magra</strong>: uma licitação aberta relevante (SPRIND EUDI-Wallet, prazo 24.07.2026) — parceiro necessário por lacuna de referência setor público.</li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 29. Juni — heute ist Runde-der-32-Tag bei der WM 2026 in Nordamerika. Beide Mannschaften, die Daniel interessieren, spielen am Nachmittag: <strong>Brasilien gegen Japan</strong> in Houston, danach <strong>Deutschland gegen Paraguay</strong> bei Boston. Beide Spiele werden hier um 02:00 BRT geschrieben — also vor dem Anpfiff. Heißt: Vorschau, keine Ergebnisse. Die Berichte kommen morgen. Dazu ein Freiburg-Faden, der direkt ins WM-Spiel hineinreicht — und die finale Bundesliga-Tabelle 25/26 als Anker.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland–Paraguay</strong> heute 22:30 MESZ / 17:30 BRT, Foxborough. Schiri Jalal Jayed (Marokko). Schlotterbeck (Knöchel) und Brown (Muskel) fallen aus.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Brasilien–Japan</strong> heute 19:00 MESZ / 14:00 BRT, Houston. Vinícius traf 4× in der Gruppe — Brasilien als Gruppensieger durch.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto-Connection</strong>: Freiburgs Sommer-Neuzugang Keisuke Goto steht heute im japanischen Kader — gegen Brasilien. Sein neuer Verein schaut also live zu.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg-Fenster</strong>: drei Zugänge (Goto, Backhaus ~12–15 Mio €, Yamamoto €7M), Röhl für €25M zu Everton raus. Netto fast ausgeglichen.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Abschlusstabelle 25/26</strong>: Bayern Meister mit 89 Punkten, Freiburg solider 7. (47 Pkt). St. Pauli und Heidenheim abgestiegen, Wolfsburg über die Relegation.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Atubolu dabei, Ginter nicht</strong>: Freiburgs Torwart steht im WM-Kader als Backup, Ginter fehlt trotz starker Saison.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong> wegen WM. Stand 18. Spieltag: Palmeiras führt (41 Pkt). Wiederaufnahme um den 23. Juli.</li>\n      <li><span class=\"chip good\">Ausblick</span> <strong>Neue Saison</strong>: Bundesliga 26/27 startet am 28. August. Heute zählt aber nur die WM.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Montag, der 29. Juni — heute ist Runde-der-32-Tag bei der WM 2026 in Nordamerika. Beide Mannschaften, die Daniel interessieren, spielen am Nachmittag: <strong>Brasilien gegen Japan</strong> in Houston, danach <strong>Deutschland gegen Paraguay</strong> bei Boston. Beide Spiele werden hier um 02:00 BRT geschrieben — also vor dem Anpfiff. Heißt: Vorschau, keine Ergebnisse. Die Berichte kommen morgen. Dazu ein Freiburg-Faden, der direkt ins WM-Spiel hineinreicht — und die finale Bundesliga-Tabelle 25/26 als Anker.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland–Paraguay</strong> heute 22:30 MESZ / 17:30 BRT, Foxborough. Schiri Jalal Jayed (Marokko). Schlotterbeck (Knöchel) und Brown (Muskel) fallen aus.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Brasilien–Japan</strong> heute 19:00 MESZ / 14:00 BRT, Houston. Vinícius traf 4× in der Gruppe — Brasilien als Gruppensieger durch.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto-Connection</strong>: Freiburgs Sommer-Neuzugang Keisuke Goto steht heute im japanischen Kader — gegen Brasilien. Sein neuer Verein schaut also live zu.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg-Fenster</strong>: drei Zugänge (Goto, Backhaus ~12–15 Mio €, Yamamoto €7M), Röhl für €25M zu Everton raus. Netto fast ausgeglichen.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Abschlusstabelle 25/26</strong>: Bayern Meister mit 89 Punkten, Freiburg solider 7. (47 Pkt). St. Pauli und Heidenheim abgestiegen, Wolfsburg über die Relegation.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Atubolu dabei, Ginter nicht</strong>: Freiburgs Torwart steht im WM-Kader als Backup, Ginter fehlt trotz starker Saison.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong> wegen WM. Stand 18. Spieltag: Palmeiras führt (41 Pkt). Wiederaufnahme um den 23. Juli.</li>\n      <li><span class=\"chip good\">Ausblick</span> <strong>Neue Saison</strong>: Bundesliga 26/27 startet am 28. August. Heute zählt aber nur die WM.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 29 — today is Round of 32 day at the 2026 World Cup in North America. Both teams Daniel follows are playing this afternoon: <strong>Brazil vs. Japan</strong> in Houston, then <strong>Germany vs. Paraguay</strong> near Boston. Both matches will be written here at 02:00 BRT — well before kickoff. That means: preview, no results. The reports arrive tomorrow. Along with a Freiburg thread that reaches directly into the World Cup match — and the final 2025/26 Bundesliga standings as an anchor.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany–Paraguay</strong> today 22:30 MESZ / 17:30 BRT, Foxborough. Referee Jalal Jayed (Morocco). Schlotterbeck (ankle) and Brown (muscle) ruled out.</li>\n      <li><span class=\"chip hot\">WC</span> <strong>Brazil–Japan</strong> today 19:00 MESZ / 14:00 BRT, Houston. Vinícius scored 4× in the group stage — Brazil through as group winners.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Goto connection</strong>: Freiburg's summer signing Keisuke Goto is in Japan's squad today — against Brazil. His new club watches live.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg window</strong>: three arrivals (Goto, Backhaus ~€12–15M, Yamamoto €7M), Röhl out to Everton for €25M. Nearly break-even.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Final standings 2025/26</strong>: Bayern champions with 89 points, Freiburg solid 7th (47 pts). St. Pauli and Heidenheim relegated, Wolfsburg via the playoff.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Atubolu in, Ginter out</strong>: Freiburg's goalkeeper is in the World Cup squad as backup, Ginter missing despite a strong season.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão paused</strong> for the World Cup. After matchday 18: Palmeiras lead (41 pts). Resumes around July 23rd.</li>\n      <li><span class=\"chip good\">Outlook</span> <strong>New season</strong>: Bundesliga 2026/27 kicks off August 28th. But today belongs to the World Cup.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, 29 de junho — hoje é dia de Rodada dos 32 na Copa do Mundo 2026 na América do Norte. As duas seleções que Daniel acompanha jogam à tarde: <strong>Brasil contra Japão</strong> em Houston, depois <strong>Alemanha contra Paraguai</strong> perto de Boston. Os dois jogos serão descritos aqui às 02:00 BRT — antes do apito inicial. Ou seja: prévia, sem resultados. Os relatos chegam amanhã. Além disso, um texto sobre Freiburg que se conecta diretamente com o jogo da Copa — e a tabela final da Bundesliga 25/26 como referência.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha–Paraguai</strong> hoje 22:30 MESZ / 17:30 BRT, Foxborough. Árbitro Jalal Jayed (Marrocos). Schlotterbeck (tornozelo) e Brown (muscular) desfalcam.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Brasil–Japão</strong> hoje 19:00 MESZ / 14:00 BRT, Houston. Vinícius marcou 4× na fase de grupos — Brasil classificado como campeão do grupo.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Conexão Goto</strong>: Keisuke Goto, reforço de verão do Freiburg, está no elenco do Japão hoje — contra o Brasil. Seu novo clube assiste ao vivo.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Janela do Freiburg</strong>: três chegadas (Goto, Backhaus ~€12–15M, Yamamoto €7M), Röhl saiu para Everton por €25M. Praticamente equilibrado.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Tabela final 25/26</strong>: Bayern campeão com 89 pontos, Freiburg sólido em 7º lugar (47 pts). St. Pauli e Heidenheim rebaixados, Wolfsburg pelo playoff.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Atubolu sim, Ginter não</strong>: goleiro do Freiburg está na seleção como reserva, Ginter fora apesar da boa temporada.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão em pausa</strong> pela Copa. Na 18ª rodada: Palmeiras lidera (41 pts). Retomada por volta de 23 de julho.</li>\n      <li><span class=\"chip good\">Perspectiva</span> <strong>Nova temporada</strong>: Bundesliga 26/27 começa em 28 de agosto. Mas hoje é dia de Copa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, 29 de junio — hoy es el día de Ronda de 32 en la Copa del Mundo 2026 en América del Norte. Los dos equipos que Daniel sigue juegan esta tarde: <strong>Brasil contra Japón</strong> en Houston, después <strong>Alemania contra Paraguay</strong> cerca de Boston. Ambos partidos se escribirán aquí a las 02:00 BRT — antes del silbatazo. Es decir: vista previa, sin resultados. Los reportes llegan mañana. Además, un hilo sobre Freiburg que conecta directamente con el partido de la Copa — y la tabla final de la Bundesliga 25/26 como anclaje.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania–Paraguay</strong> hoy 22:30 MESZ / 17:30 BRT, Foxborough. Árbitro Jalal Jayed (Marruecos). Schlotterbeck (tobillo) y Brown (muscular) fuera.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Brasil–Japón</strong> hoy 19:00 MESZ / 14:00 BRT, Houston. Vinícius anotó 4× en la fase de grupos — Brasil clasificado como ganador del grupo.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Conexión Goto</strong>: Keisuke Goto, refuerzo de verano de Freiburg, está en la selección de Japón hoy — contra Brasil. Su nuevo club observa en vivo.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Ventana de Freiburg</strong>: tres llegadas (Goto, Backhaus ~€12–15M, Yamamoto €7M), Röhl fuera a Everton por €25M. Prácticamente equilibrado.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Tabla final 25/26</strong>: Bayern campeón con 89 puntos, Freiburg sólido 7º (47 pts). St. Pauli y Heidenheim descendidos, Wolfsburgo por el playoff.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Atubolu sí, Ginter no</strong>: portero de Freiburg en la selección como suplente, Ginter afuera pese a una buena temporada.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão en pausa</strong> por la Copa. En la fecha 18: Palmeiras lidera (41 pts). Reanudación alrededor del 23 de julio.</li>\n      <li><span class=\"chip good\">Perspectiva</span> <strong>Nueva temporada</strong>: Bundesliga 26/27 comienza el 28 de agosto. Pero hoy es día de Copa.</li>\n    </ul></div>"

        "de": "<div class=\"tldr\"><p class=\"lead\">Der Renn-Sonntag ist abgerechnet, und er erzählt zwei Geschichten zugleich. George Russell hat den Österreich-GP von der Pole bis zur Zielflagge kontrolliert — sein erster Sieg seit dem Saisonauftakt — und damit den WM-Rückstand seines Mercedes-Teamkollegen Kimi Antonelli von 50 auf 40 Punkte gedrückt. Antonelli bleibt der souveräne Tabellenführer, aber das Mercedes-interne Duell wird wieder zum Thema. Und für Daniel besonders: in zwei Wochen kommt die Langstrecken-WM nach Interlagos — ein Brasilien-Wochenende mit Heim-Startzeit. Bevor es dorthin geht, steht das Silverstone-Sprint-Wochenende an, erst das zweite Sprint-Format der Saison.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell gewinnt Österreich-GP</strong>: George Russell (Mercedes) führte von der Pole bis ins Ziel, vor Max Verstappen (+1,611 s) und Kimi Antonelli (+1,986 s). 71 Runden am Red Bull Ring, erster Sieg seit dem Auftakt.</li>\n      <li><span class=\"chip good\">F1-WM</span> <strong>Titelpolster schrumpft auf 40</strong>: Antonelli führt mit <strong>171 Punkten</strong> vor Russell (131) und Hamilton (125). Vor dem Rennen lag Russell noch 50 zurück — der Sieg holt 10 Punkte auf den Teamkollegen heraus.</li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli holt die schnellste Runde</strong>: Trotz P3 setzte Kimi Antonelli mit 1:10,374 die Bestzeit des Rennens. Hamilton verzockte sich mit einer Drei-Stopp-Strategie und kam nur als Fünfter ins Ziel.</li>\n      <li><span class=\"chip warn\">F1</span> <strong>Cadillac mit Doppel-DNF</strong>: Beide Neuwagen fielen aus — Bottas in Runde 2, Pérez in Runde 4, jeweils überhitzte Bremsen. Das Team bleibt mit <strong>0 Punkten</strong> Tabellenletzter der Konstrukteurs-WM.</li>\n      <li><span class=\"chip hot\">Voraus</span> <strong>Silverstone-Sprint 03.–05.07</strong>: Das zweite Sprint-Wochenende der Saison. Rennen So 05.07, <strong>15:00 BST / 11:00 BRT / 16:00 CEST</strong>. Russell auf Heimstrecke mit 40 Punkten Rückstand.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Langstrecke kommt nach Brasilien</strong>: 6 Stunden von São Paulo, So 12.07 in Interlagos, Start <strong>06:30 BRT / 11:30 CEST</strong> — Heimrennen für Daniel. Toyota führt die Hersteller-WM nach dem Le-Mans-Sieg klar an (132 zu 96 vor BMW).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Race Sunday is settled, and it tells two stories at once. George Russell controlled the Austrian GP from pole to the checkered flag — his first win since the season opener — and compressed his Mercedes teammate Kimi Antonelli's championship lead from 50 to 40 points. Antonelli remains the dominant championship leader, but the Mercedes internal duel is back on the agenda. And for Daniel especially: in two weeks, the endurance championship comes to Interlagos — a Brazil weekend with home start time. Before that comes the Silverstone Sprint weekend, only the second sprint format of the season.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell wins Austrian GP</strong>: George Russell (Mercedes) led from pole to finish, ahead of Max Verstappen (+1.611 s) and Kimi Antonelli (+1.986 s). 71 laps at the Red Bull Ring, first win since the opener.</li>\n      <li><span class=\"chip good\">F1 Championship</span> <strong>Title cushion shrinks to 40</strong>: Antonelli leads with <strong>171 points</strong> ahead of Russell (131) and Hamilton (125). Before the race, Russell was still 50 behind — the victory picks up 10 points on his teammate.</li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli takes fastest lap</strong>: Despite P3, Kimi Antonelli set the race's fastest lap with 1:10.374. Hamilton gambled on a three-stop strategy and limped home in fifth.</li>\n      <li><span class=\"chip warn\">F1</span> <strong>Cadillac with double DNF</strong>: Both new cars failed — Bottas on lap 2, Pérez on lap 4, both from overheated brakes. The team remains last in the constructors' championship with <strong>0 points</strong>.</li>\n      <li><span class=\"chip hot\">Ahead</span> <strong>Silverstone Sprint 07.03–07.05</strong>: The second sprint weekend of the season. Race Sun 07.05, <strong>15:00 BST / 11:00 BRT / 16:00 CEST</strong>. Russell on home turf with 40-point deficit.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Endurance racing comes to Brazil</strong>: 6 Hours of São Paulo, Sun 07.12 at Interlagos, start <strong>06:30 BRT / 11:30 CEST</strong> — home race for Daniel. Toyota leads the manufacturers' championship after the Le Mans win (132 to 96 ahead of BMW).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O domingo de corrida foi resolvido, e conta duas histórias ao mesmo tempo. George Russell controlou o GP da Áustria da pole até a bandeira de xadrez — sua primeira vitória desde a abertura da temporada — e comprimiu a liderança do campeonato de seu companheiro de Mercedes, Kimi Antonelli, de 50 para 40 pontos. Antonelli continua sendo o líder do campeonato dominante, mas o duelo interno da Mercedes volta à agenda. E para Daniel especialmente: em duas semanas, o campeonato de resistência chega a Interlagos — um fim de semana no Brasil com horário de largada local. Antes disso vem o fim de semana do Sprint de Silverstone, apenas o segundo formato de sprint da temporada.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell vence GP da Áustria</strong>: George Russell (Mercedes) liderou da pole até a bandeira de xadrez, à frente de Max Verstappen (+1,611 s) e Kimi Antonelli (+1,986 s). 71 voltas no Red Bull Ring, primeira vitória desde a abertura.</li>\n      <li><span class=\"chip good\">Campeonato F1</span> <strong>Colchão de título diminui para 40</strong>: Antonelli lidera com <strong>171 pontos</strong> à frente de Russell (131) e Hamilton (125). Antes da corrida, Russell ainda estava 50 atrás — a vitória resgata 10 pontos de seu companheiro.</li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli consegue a volta mais rápida</strong>: Apesar de P3, Kimi Antonelli estabeleceu a volta mais rápida da corrida com 1:10,374. Hamilton arriscou com uma estratégia de três paradas e chegou ao final em quinto.</li>\n      <li><span class=\"chip warn\">F1</span> <strong>Cadillac com duplo DNF</strong>: Os dois carros novos falharam — Bottas na volta 2, Pérez na volta 4, ambos por freios superaquecidos. O time permanece em último lugar no campeonato de construtores com <strong>0 pontos</strong>.</li>\n      <li><span class=\"chip hot\">À frente</span> <strong>Sprint de Silverstone 03.–05.07</strong>: O segundo fim de semana de sprint da temporada. Corrida dom 05.07, <strong>15:00 BST / 11:00 BRT / 16:00 CEST</strong>. Russell em casa com deficit de 40 pontos.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Resistência vem para o Brasil</strong>: 6 Horas de São Paulo, dom 12.07 em Interlagos, largada <strong>06:30 BRT / 11:30 CEST</strong> — corrida de casa para Daniel. Toyota lidera o campeonato de fabricantes após a vitória de Le Mans (132 para 96 à frente da BMW).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El domingo de carreras está liquidado, y cuenta dos historias al mismo tiempo. George Russell controló el GP de Austria desde la pole hasta la bandera de cuadros — su primera victoria desde la apertura de la temporada — y comprimió la ventaja del campeonato de su compañero de Mercedes, Kimi Antonelli, de 50 a 40 puntos. Antonelli sigue siendo el líder del campeonato dominante, pero el duelo interno de Mercedes vuelve al orden del día. Y para Daniel especialmente: en dos semanas, el campeonato de resistencia llega a Interlagos — un fin de semana en Brasil con horario de salida local. Antes de eso viene el fin de semana del Sprint de Silverstone, apenas el segundo formato de sprint de la temporada.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Russell gana GP de Austria</strong>: George Russell (Mercedes) lideró desde la pole hasta la bandera, seguido de Max Verstappen (+1,611 s) y Kimi Antonelli (+1,986 s). 71 vueltas en el Red Bull Ring, primera victoria desde la apertura.</li>\n      <li><span class=\"chip good\">Campeonato F1</span> <strong>Ventaja de título se reduce a 40</strong>: Antonelli lidera con <strong>171 puntos</strong> sobre Russell (131) y Hamilton (125). Antes de la carrera, Russell aún estaba 50 atrás — la victoria recupera 10 puntos de su compañero.</li>\n      <li><span class=\"chip\">F1</span> <strong>Antonelli consigue la vuelta más rápida</strong>: A pesar de P3, Kimi Antonelli estableció la vuelta más rápida de la carrera con 1:10,374. Hamilton apostó por una estrategia de tres paradas y terminó en quinto.</li>\n      <li><span class=\"chip warn\">F1</span> <strong>Cadillac con doble DNF</strong>: Ambos autos nuevos fallaron — Bottas en vuelta 2, Pérez en vuelta 4, ambos por frenos sobrecalentados. El equipo sigue en último lugar del campeonato de constructores con <strong>0 puntos</strong>.</li>\n      <li><span class=\"chip hot\">Por delante</span> <strong>Sprint de Silverstone 03.–05.07</strong>: El segundo fin de semana de sprint de la temporada. Carrera dom 05.07, <strong>15:00 BST / 11:00 BRT / 16:00 CEST</strong>. Russell en casa con deficit de 40 puntos.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Resistencia llega a Brasil</strong>: 6 Horas de São Paulo, dom 12.07 en Interlagos, salida <strong>06:30 BRT / 11:30 CEST</strong> — carrera de casa para Daniel. Toyota lidera el campeonato de fabricantes tras la victoria de Le Mans (132 contra 96 sobre BMW).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 29. Juni — und die Woche hat zwei Gesichter. Bis Mittwoch steht das beste Outdoor-Fenster des Monats: trocken, sonnig, mild. Ab Donnerstag drückt ein extratropischer Zyklon eine Sturmfront in den Norte Pioneiro — INMET hat für die Region einen doppelten Unwetter-Alarm draußen, Orange-Stufe inklusive. Und im BR-Winter läuft die VSR-Welle: mit einem Säugling im Haus der wichtigste Punkt der Woche. Dazwischen jede Menge Festa-Junina-Spaß rund um Londrina.</p>\n    <ul>\n      <li><span class=\"chip good\">WETTER</span> <strong>Gutes Fenster Mo–Mi</strong>: heute 17–26°C (vormittags 40 % Regen), Di/Mi sonnig und trocken — der beste Zeitpunkt für draußen.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>INMET-Doppelalarm</strong>: extratropischer Zyklon, Sturm ab Do — Orange-Stufe für ~37 Gemeinden, Böen bis 100 km/h, Hagel. Kritisches Fenster 01.–04.07.</li>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>VSR-Welle (RSV)</strong>: InfoGripe meldet VSR als häufigsten Erreger — 53,1 % der Positiven. Paraná wächst weiter. Säuglings-Schutz zählt jetzt.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>JuninFest Londrina</strong>: 35. Festa Junina, Sa 04. + So 05.07, Eintritt frei — die größte der Region, ~25.000 Besucher erwartet.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina N. Sra. Aparecida</strong>: heute noch aktiv (27.–29.06) und am ersten Juli-Wochenende wieder — am nächsten zuhause.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Schulferien Paraná</strong>: 13.–24. Juli (staatliche Schulen, Schulstart 27.07.). Jetzt ist der Moment für die Urlaubsplanung.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Theater Guaíra, Curitiba</strong>: Kindertheater „O Anjo do Bosque\" (13.–17.07, 13:30h, gratis im Pátio Guaíra) und ein Familien-Sinfoniekonzert am 12.07.</li>\n      <li><span class=\"chip\">GESUNDHEIT</span> <strong>Dengue</strong>: PR-Gesundheitsbehörde hat ein neues Erfassungs-Periode gestartet — Lage beobachten, Wasserbehälter checken.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Montag, der 29. Juni — und die Woche hat zwei Gesichter. Bis Mittwoch steht das beste Outdoor-Fenster des Monats: trocken, sonnig, mild. Ab Donnerstag drückt ein extratropischer Zyklon eine Sturmfront in den Norte Pioneiro — INMET hat für die Region einen doppelten Unwetter-Alarm draußen, Orange-Stufe inklusive. Und im BR-Winter läuft die VSR-Welle: mit einem Säugling im Haus der wichtigste Punkt der Woche. Dazwischen jede Menge Festa-Junina-Spaß rund um Londrina.</p>\n    <ul>\n      <li><span class=\"chip good\">WETTER</span> <strong>Gutes Fenster Mo–Mi</strong>: heute 17–26°C (vormittags 40 % Regen), Di/Mi sonnig und trocken — der beste Zeitpunkt für draußen.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>INMET-Doppelalarm</strong>: extratropischer Zyklon, Sturm ab Do — Orange-Stufe für ~37 Gemeinden, Böen bis 100 km/h, Hagel. Kritisches Fenster 01.–04.07.</li>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>VSR-Welle (RSV)</strong>: InfoGripe meldet VSR als häufigsten Erreger — 53,1 % der Positiven. Paraná wächst weiter. Säuglings-Schutz zählt jetzt.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>JuninFest Londrina</strong>: 35. Festa Junina, Sa 04. + So 05.07, Eintritt frei — die größte der Region, ~25.000 Besucher erwartet.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina N. Sra. Aparecida</strong>: heute noch aktiv (27.–29.06) und am ersten Juli-Wochenende wieder — am nächsten zuhause.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Schulferien Paraná</strong>: 13.–24. Juli (staatliche Schulen, Schulstart 27.07.). Jetzt ist der Moment für die Urlaubsplanung.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Theater Guaíra, Curitiba</strong>: Kindertheater „O Anjo do Bosque\" (13.–17.07, 13:30h, gratis im Pátio Guaíra) und ein Familien-Sinfoniekonzert am 12.07.</li>\n      <li><span class=\"chip\">GESUNDHEIT</span> <strong>Dengue</strong>: PR-Gesundheitsbehörde hat ein neues Erfassungs-Periode gestartet — Lage beobachten, Wasserbehälter checken.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 29th — and the week has two faces. Through Wednesday: the best outdoor window of the month, dry and sunny and mild. Starting Thursday, an extratropical cyclone pushes a storm front into Norte Pioneiro — INMET has issued a double alert for the region, Orange-level included. And it's midwinter in Brazil: RSV season, the week's most important point for a household with a newborn. Sandwiched between: plenty of Festa Junina fun around Londrina.</p>\n    <ul>\n      <li><span class=\"chip good\">WEATHER</span> <strong>Clear window Mon–Wed</strong>: today 17–26°C (morning 40% rain), Tue/Wed sunny and dry — best time to get outside.</li>\n      <li><span class=\"chip hot\">HEADS UP</span> <strong>INMET double alert</strong>: extratropical cyclone, storm from Thu — Orange-level for ~37 municipalities, gusts to 100 km/h, hail possible. Critical window July 1–4.</li>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>RSV wave</strong>: InfoGripe reports RSV as the dominant pathogen — 53.1% of positive samples. Paraná continues to rise. Infant protection matters now.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>JuninFest Londrina</strong>: 35th Festa Junina, Sat July 4 + Sun July 5, free admission — largest in the region, ~25,000 visitors expected.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina N. Sra. Aparecida</strong>: still running today (June 27–29) and again the first weekend of July — closest to home.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Paraná school holidays</strong>: July 13–24 (public schools, classes resume July 27). Now is the moment to plan vacation.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Teatro Guaíra, Curitiba</strong>: children's theater \"O Anjo do Bosque\" (July 13–17, 1:30 PM, free in Pátio Guaíra) and a family symphony concert on July 12.</li>\n      <li><span class=\"chip\">HEALTH</span> <strong>Dengue</strong>: PR health authority has started a new reporting period — monitor situation, check water containers.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, 29 de junho — e a semana tem duas faces. Até quarta-feira, a melhor janela ao ar livre do mês: seco, ensolarado, ameno. A partir de quinta-feira, um ciclone extratropical empurra uma frente de tempestade para o Norte Pioneiro — o INMET tem um duplo alerta de intempérie para a região, nível laranja incluído. E no inverno BR está acontecendo a onda de VSR: com um bebê recém-nascido em casa, é o ponto mais importante da semana. No meio tempo: bastante diversão de Festa Junina por Londrina.</p>\n    <ul>\n      <li><span class=\"chip good\">TEMPO</span> <strong>Boa janela seg–qua</strong>: hoje 17–26°C (manhã 40% chuva), ter/qua ensolarado e seco — o melhor momento para sair.</li>\n      <li><span class=\"chip hot\">ATENÇÃO</span> <strong>Duplo alerta INMET</strong>: ciclone extratropical, tempestades a partir de qui — nível laranja para ~37 municípios, rajadas até 100 km/h, granizo possível. Janela crítica 01.–04.07.</li>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Onda de VSR (RSV)</strong>: InfoGripe relata VSR como agente mais comum — 53,1% dos positivos. Paraná continua crescendo. Proteção do bebê é essencial agora.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>JuninFest Londrina</strong>: 35ª Festa Junina, sáb 04.07 + dom 05.07, entrada gratuita — a maior da região, ~25 mil visitantes esperados.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina N. Sra. Aparecida</strong>: ativa hoje (27.–29.06) e novamente no primeiro fim de semana de julho — a mais próxima de casa.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Recesso escolar Paraná</strong>: 13.–24. julho (escolas estaduais, aulas retornam 27.07). Agora é o momento para planejar férias.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Teatro Guaíra, Curitiba</strong>: teatro infantil \"O Anjo do Bosque\" (13.–17.07, 13:30h, grátis no Pátio Guaíra) e concerto sinfônico familiar em 12.07.</li>\n      <li><span class=\"chip\">SAÚDE</span> <strong>Dengue</strong>: Secretaria de Saúde do PR lançou novo período de vigilância — acompanhar a situação, verificar recipientes de água.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes, 29 de junio — y la semana tiene dos caras. Hasta el miércoles, la mejor ventana al aire libre del mes: seco, soleado, templado. A partir del jueves, un ciclón extratropical empuja un frente de tormenta hacia el Norte Pioneiro — el INMET tiene una doble alerta de intemperie para la región, incluido nivel naranja. Y en el invierno BR está en auge la onda de VSR: con un bebé recién nacido en casa, es el punto más importante de la semana. Mientras tanto: mucha diversión de Festa Junina alrededor de Londrina.</p>\n    <ul>\n      <li><span class=\"chip good\">TIEMPO</span> <strong>Buena ventana lun–mié</strong>: hoy 17–26°C (mañana 40% lluvia), mar/mié soleado y seco — el mejor momento para salir.</li>\n      <li><span class=\"chip hot\">ATENCIÓN</span> <strong>Doble alerta INMET</strong>: ciclón extratropical, tormentas a partir de jue — nivel naranja para ~37 municipios, ráfagas hasta 100 km/h, granizo posible. Ventana crítica 01.–04.07.</li>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Onda de VSR (RSV)</strong>: InfoGripe reporta VSR como agente más común — 53,1% de los positivos. Paraná sigue creciendo. La protección del bebé es clave ahora.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>JuninFest Londrina</strong>: 35ª Festa Junina, sáb 04.07 + dom 05.07, entrada gratuita — la más grande de la región, ~25.000 visitantes esperados.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Festa Junina N. Sra. Aparecida</strong>: activa hoy (27.–29.06) y nuevamente el primer fin de semana de julio — la más cercana a casa.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Receso escolar Paraná</strong>: 13.–24. julio (escuelas estatales, clases regresan 27.07). Ahora es el momento para planificar vacaciones.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Teatro Guaíra, Curitiba</strong>: teatro infantil \"O Anjo do Bosque\" (13.–17.07, 13:30h, gratis en Pátio Guaíra) y concierto sinfónico familiar el 12.07.</li>\n      <li><span class=\"chip\">SALUD</span> <strong>Dengue</strong>: Secretaría de Salud de PR lanzó nuevo período de vigilancia — monitorear la situación, revisar recipientes de agua.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 29. Juni — Wochenthema <em>Wirtschaft &amp; Finanzen</em>, heute Teil VI: <em>Rechnungen, Zahlungsverkehr &amp; Wachstum</em>. Das Geld-Vokabular, das ein Freelancer in Brasilien täglich braucht: eine Leistung <em>in Rechnung stellen</em> (<em>cobrar</em>, <em>faturar</em>), die <em>nota fiscal</em> ausstellen, per <em>Pix</em> oder <em>boleto</em> bezahlt werden, den <em>Saldo</em> prüfen und sehen, wie der Umsatz <em>wächst</em>. 33 Einträge, 12 Verben mit voller Konjugation — inklusive der berüchtigten Orthografie-Traps <em>paguei</em> (g→gu) und <em>cresço</em> (c→ç) — plus 3 Auffrischungen aus dem Kapitalanlage-Montag vom 15. Juni (<em>investieren, die Rendite, verdienen</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT lucro ≠ EN luck</strong> — <em>lucro</em> (PT) / <em>lucro</em>… nein: <em>la ganancia</em> (ES) heißt „Gewinn/Profit\", nicht „Glück\". EN <em>luck</em> = DE <em>Glück</em> / PT <em>sorte</em> / ES <em>suerte</em>. Beim Monatsabschluss zählt der Unterschied.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES cobrar ≠ „bedecken\"</strong> — <em>cobrar</em> heißt „kassieren / in Rechnung stellen\" (Geld <em>einnehmen</em>), nicht „cubrir\" (bedecken/abdecken). <em>El médico me cobró 500 pesos</em> = „der Arzt hat mir 500 berechnet\".</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>nota fiscal (NF-e)</strong> — die elektronische Steuer-Rechnung ist in Brasilien Pflicht und heißt <em>nota fiscal</em>, nicht einfach „fatura\". Die <em>fatura</em> ist die Sammelabrechnung (z. B. der Kreditkarte); die <em>NF-e</em> der amtliche Beleg pro Verkauf.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>Pix · boleto · parcelar</strong> — bezahlt wird in Brasilien per <em>Pix</em> (Sofort-Überweisung, kostenlos), per <em>boleto bancário</em> (Bank-Zahlschein) oder man kann den Betrag <em>parcelar</em> (in Raten splitten — <em>em 12x sem juros</em>). Drei zutiefst brasilianische Konzepte.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT/ES pagar → paguei / pagué</strong> — Orthografie-Trap: das Pretérito 1. Person fügt ein <em>u</em> ein, damit das <em>g</em> hart bleibt (<em>g→gu</em>). Niemals <em>*pagei</em> / <em>*pagé</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT crescer → eu cresço</strong> — vor <em>o/a</em> wird <em>c→ç</em>: <em>eu cresço</em>, <em>que eu cresça</em>. ES <em>crecer → yo crezco</em> (<em>c→zc</em>). Beide nur in der 1. Person Präsens + Subjuntivo.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT investir → eu invisto</strong> — Stammvokal-Hebung <em>e→i</em> nur in der 1. Person Präsens und im ganzen Subjuntivo: <em>invisto, que eu invista, invistamos</em>. <em>Você investe</em> bleibt mit <em>e</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES invertir → yo invierto / él invirtió</strong> — doppelter Wechsel: <em>e→ie</em> im Präsens (<em>invierto</em>, aber <em>nosotros invertimos</em>), <em>e→i</em> im Pretérito 3. Person (<em>invirtió, invirtieron</em>).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE wachsen → ich bin gewachsen</strong> — starkes Bewegungs-/Zustandsverb, Perfekt mit <em>sein</em>, nie <em>*habe gewachsen</em>. Ablaut <em>a-u-a</em>: <em>ich wachse → wuchs → bin gewachsen</em>, Umlaut <em>du wächst</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT negociar → eu negocio</strong> (NICHT <em>*eu negocia</em>) — die 1. Person Singular endet auf <em>-io</em>: <em>eu negocio, você negocia</em>. Häufiger Anfängerfehler im BR-PT.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Saldo (m), die Einnahme (f), das Einkommen (n)</strong> — drei Genera. PT: <em>o saldo (m), a receita (f), o rendimento (m)</em>; ES-MX: <em>el saldo (m), el ingreso (m), el rendimiento (m)</em>. Genus nicht raten.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>estar no vermelho</strong> (PT) = „in den roten Zahlen sein\" = ES <em>estar en números rojos</em>. Das Gegenteil: <em>estar no azul</em> / <em>no verde</em> — schwarze Zahlen schreiben.</li>\n    </ul></div>",

pan class=\"chip\">PHRASE</span> <strong>estar no vermelho</strong> (PT) = „in den roten Zahlen sein\" = ES <em>estar en números rojos</em>. Das Gegenteil: <em>estar no azul</em> / <em>no verde</em> — schwarze Zahlen schreiben.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, June 29th — this week's topic is <em>Business &amp; Finance</em>; today Part VI: <em>Invoices, Payment Methods &amp; Growth</em>. The money vocabulary every freelancer in Brazil uses daily: how to <em>charge</em> a client (<em>cobrar</em>, <em>faturar</em>), issue a <em>nota fiscal</em>, get paid via <em>Pix</em> or <em>boleto</em>, check your <em>balance</em>, and watch your revenue <em>grow</em>. 33 entries, 12 verbs with full conjugation — including the notorious spelling traps <em>paguei</em> (g→gu) and <em>cresço</em> (c→ç) — plus 3 refreshers from the investment Monday on June 15th (<em>invest, yield, earn</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT lucro ≠ EN luck</strong> — <em>lucro</em> (PT) means \"profit,\" not \"luck.\" EN <em>luck</em> = DE <em>Glück</em> / PT <em>sorte</em> / ES <em>suerte</em>. The difference matters at month-end.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES cobrar ≠ \"cover\"</strong> — <em>cobrar</em> means \"to charge / collect\" (money <em>received</em>), not \"cubrir\" (cover/hide). <em>El médico me cobró 500 pesos</em> = \"the doctor charged me 500.\"</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>nota fiscal (NF-e)</strong> — Brazil requires an electronic tax invoice called <em>nota fiscal</em> for every sale, not just \"fatura.\" The <em>fatura</em> is the bundled statement (like a credit-card bill); the <em>NF-e</em> is the official receipt per transaction.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>Pix · boleto · parcelar</strong> — in Brazil you pay via <em>Pix</em> (instant bank transfer, free), <em>boleto bancário</em> (bank payment slip), or you can <em>parcelar</em> (split into installments — <em>12x interest-free</em>). Three deeply Brazilian concepts.</li>\n      <li><span class=\"chip\">Conjugation</span> <strong>PT/ES pagar → paguei / pagué</strong> — spelling trap: the 1st person past tense adds a <em>u</em> to keep the <em>g</em> hard (<em>g→gu</em>). Never <em>*pagei</em> / <em>*pagé</em>.</li>\n      <li><span class=\"chip\">Conjugation</span> <strong>PT crescer → eu cresço</strong> — before <em>o/a</em>, <em>c→ç</em>: <em>eu cresço</em>, <em>que eu cresça</em>. ES <em>crecer → yo crezco</em> (<em>c→zc</em>). Both only in 1st person present + subjunctive.</li>\n      <li><span class=\"chip\">Conjugation</span> <strong>PT investir → eu invisto</strong> — stem vowel shift <em>e→i</em> only in 1st person present and full subjunctive: <em>invisto, que eu invista, invistamos</em>. <em>Você investe</em> stays with <em>e</em>.</li>\n      <li><span class=\"chip\">Conjugation</span> <strong>ES invertir → yo invierto / él invirtió</strong> — double shift: <em>e→ie</em> in present (<em>invierto</em>, but <em>nosotros invertimos</em>), <em>e→i</em> in 3rd person past (<em>invirtió, invirtieron</em>).</li>\n      <li><span class=\"chip\">Conjugation</span> <strong>DE wachsen → ich bin gewachsen</strong> — strong motion/state verb, perfect with <em>sein</em>, never <em>*habe gewachsen</em>. Ablaut <em>a-u-a</em>: <em>ich wachse → wuchs → bin gewachsen</em>, umlaut <em>du wächst</em>.</li>\n      <li><span class=\"chip\">Conjugation</span> <strong>PT negociar → eu negocio</strong> (NOT <em>*eu negocia</em>) — 1st person singular ends in <em>-io</em>: <em>eu negocio, você negocia</em>. Common beginner error in BR-PT.</li>\n      <li><span class=\"chip\">Gender</span> <strong>der Saldo (m), die Einnahme (f), das Einkommen (n)</strong> — three genders. PT: <em>o saldo (m), a receita (f), o rendimento (m)</em>; ES-MX: <em>el saldo (m), el ingreso (m), el rendimiento (m)</em>. Don't guess gender.</li>\n      <li><span class=\"chip\">Phrase</span> <strong>estar no vermelho</strong> (PT) = \"in the red\" = ES <em>estar en números rojos</em>. The opposite: <em>estar no azul</em> / <em>no verde</em> — in the black.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira, 29 de junho — tema da semana <em>Negócios &amp; Finanças</em>, hoje Parte VI: <em>Notas Fiscais, Formas de Pagamento &amp; Crescimento</em>. O vocabulário de dinheiro que todo freelancer no Brasil usa diariamente: como <em>cobrar</em> um cliente (<em>cobrar</em>, <em>faturar</em>), emitir a <em>nota fiscal</em>, receber por <em>Pix</em> ou <em>boleto</em>, conferir o <em>saldo</em> e ver o faturamento <em>crescer</em>. 33 entradas, 12 verbos com conjugação completa — incluindo as temidas armadilhas de ortografia <em>paguei</em> (g→gu) e <em>cresço</em> (c→ç) — mais 3 revisões da segunda de capital de 15 de junho (<em>investir, o rendimento, ganhar</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT lucro ≠ EN luck</strong> — <em>lucro</em> (PT) significa \"ganho\", não \"sorte\". EN <em>luck</em> = DE <em>Glück</em> / PT <em>sorte</em> / ES <em>suerte</em>. No encerramento mensal a diferença importa.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES cobrar ≠ \"cubrir\"</strong> — <em>cobrar</em> significa \"receber / cobrar\" (dinheiro <em>recebido</em>), não \"cubrir\" (cobrir/tapar). <em>El médico me cobró 500 pesos</em> = \"o médico me cobrou 500\".</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>nota fiscal (NF-e)</strong> — no Brasil, a nota fiscal eletrônica é obrigatória para cada venda, não é só \"fatura\". A <em>fatura</em> é o extrato consolidado (como de cartão de crédito); a <em>NF-e</em> é o comprovante oficial por transação.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>Pix · boleto · parcelar</strong> — no Brasil você paga por <em>Pix</em> (transferência instantânea gratuita), por <em>boleto bancário</em> (papel de pagamento), ou pode <em>parcelar</em> (dividir em prestações — <em>12x sem juros</em>). Três conceitos profundamente brasileiros.</li>\n      <li><span class=\"chip\">Conjugação</span> <strong>P pan class=\"chip\">PHRASE</span> <strong>estar no vermelho</strong> (PT) = „in den roten Zahlen sein\" = ES <em>estar en números rojos</em>. Das Gegenteil: <em>estar no azul</em> / <em>no verde</em> — schwarze Zahlen schreiben.</li>\n    </ul></div>"
