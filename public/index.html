      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die WM ist seit gestern Abend Geschichte, und für Daniels zwei Mannschaften war sie kurz. Deutschland flog schon im Sechzehntelfinale gegen Paraguay raus, Brasilien im Achtelfinale gegen Norwegen — Weltmeister wurde Spanien. In Freiburg überlagert das ohnehin ein anderes Thema: Der Sport-Club kassiert die größte Ablöse seiner Geschichte, ausgerechnet von dem Klub, der ihm im Mai das Europa-League-Finale mit 0:3 um die Ohren gehauen hat. Ligabetrieb gibt es heute nirgends — Bundesliga ist tiefe Sommerpause, in Brasilien liegt der Montag zwischen zwei Spieltags-Hälften.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Aus im Sechzehntelfinale</strong>: 3:4 im Elfmeterschießen gegen Paraguay nach 1:1, Anstoß Mo 29.06., 22:30 MESZ. Havertz hatte in der 54. ausgeglichen.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann weg</strong>: Vertrag am 03.07. auf eigenen Wunsch aufgelöst. Ein Nachfolger ist nicht benannt — Klopp ist Gerücht, nicht Meldung.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi nach Birmingham</strong>: 59,5 Mio. £ (~70 Mio. €) von Aston Villa — Vereinsrekord bei Villa, Rekordeinnahme beim SC.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Trainingslager Schruns</strong> 22.–31.07., Test gegen Derby County am Fr 24.07., 16:00 MESZ / 11:00 BRT in Imst/Tirol.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien ist Weltmeister</strong>: 1:0 n. V. gegen Argentinien, Ferran Torres in der 106. Zweiter Titel nach 2010.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Seleção im Achtelfinale raus</strong>: 1:2 gegen Norwegen — 79 Minuten 0:0, dann Haaland-Doppelpack. Schlechteste WM seit 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison beendet, Freiburg Siebter</strong> mit 47 Punkten und Conference-League-Playoff. Neustart erst am Fr 28.08., 20:30 MESZ / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras führt</strong> die Série A mit 41 Punkten aus 18 Spielen an. Heute kein Spiel; als nächstes Atlético-MG – Bahia am Di 21.07.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Freiburg muss nach Düsseldorf</strong>: 1. DFB-Pokal-Runde bei Fortuna am So 23.08., 18:00 MESZ / 13:00 BRT, Merkur Spiel-Arena.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die WM ist seit gestern Abend Geschichte, und für Daniels zwei Mannschaften war sie kurz. Deutschland flog schon im Sechzehntelfinale gegen Paraguay raus, Brasilien im Achtelfinale gegen Norwegen — Weltmeister wurde Spanien. In Freiburg überlagert das ohnehin ein anderes Thema: Der Sport-Club kassiert die größte Ablöse seiner Geschichte, ausgerechnet von dem Klub, der ihm im Mai das Europa-League-Finale mit 0:3 um die Ohren gehauen hat. Ligabetrieb gibt es heute nirgends — Bundesliga ist tiefe Sommerpause, in Brasilien liegt der Montag zwischen zwei Spieltags-Hälften.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Aus im Sechzehntelfinale</strong>: 3:4 im Elfmeterschießen gegen Paraguay nach 1:1, Anstoß Mo 29.06., 22:30 MESZ. Havertz hatte in der 54. ausgeglichen.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann weg</strong>: Vertrag am 03.07. auf eigenen Wunsch aufgelöst. Ein Nachfolger ist nicht benannt — Klopp ist Gerücht, nicht Meldung.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi nach Birmingham</strong>: 59,5 Mio. £ (~70 Mio. €) von Aston Villa — Vereinsrekord bei Villa, Rekordeinnahme beim SC.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Trainingslager Schruns</strong> 22.–31.07., Test gegen Derby County am Fr 24.07., 16:00 MESZ / 11:00 BRT in Imst/Tirol.</li>\n      <li><span class=\"chip good\">WM</span> <strong>Spanien ist Weltmeister</strong>: 1:0 n. V. gegen Argentinien, Ferran Torres in der 106. Zweiter Titel nach 2010.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Seleção im Achtelfinale raus</strong>: 1:2 gegen Norwegen — 79 Minuten 0:0, dann Haaland-Doppelpack. Schlechteste WM seit 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison beendet, Freiburg Siebter</strong> mit 47 Punkten und Conference-League-Playoff. Neustart erst am Fr 28.08., 20:30 MESZ / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras führt</strong> die Série A mit 41 Punkten aus 18 Spielen an. Heute kein Spiel; als nächstes Atlético-MG – Bahia am Di 21.07.</li>\n      <li><span class=\"chip\">Pokal</span> <strong>Freiburg muss nach Düsseldorf</strong>: 1. DFB-Pokal-Runde bei Fortuna am So 23.08., 18:00 MESZ / 13:00 BRT, Merkur Spiel-Arena.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The World Cup has been history since last night, and for Daniel's two teams it was a short one. Germany was already out in the round of 32 against Paraguay, Brazil in the round of 16 against Norway — Spain became world champions. In Freiburg, that's overshadowed anyway by a different story: the club is banking the biggest transfer fee in its history, and of all buyers, it's the very club that put Freiburg to the sword 0-3 in May's Europa League final. There's no league football anywhere today — the Bundesliga is deep in its summer break, and in Brazil Monday falls between two halves of a split matchday.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Out in the round of 32</strong>: 3-4 on penalties against Paraguay after a 1-1 draw, kickoff Mon, June 29, 22:30 CEST. Havertz had equalized in the 54th minute.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann out</strong>: contract terminated on July 3 at his own request. No successor has been named — Klopp is a rumor, not a report.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Manzambi to Birmingham</strong>: £59.5m (~€70m) from Aston Villa — a club record for Villa, a record sale for SC.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Training camp in Schruns</strong> July 22–31, friendly against Derby County on Fri, July 24, 16:00 CEST / 11:00 BRT in Imst/Tirol.</li>\n      <li><span class=\"chip good\">World Cup</span> <strong>Spain are world champions</strong>: 1-0 after extra time against Argentina, Ferran Torres in the 106th minute. Second title since 2010.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Seleção out in the round of 16</strong>: 1-2 against Norway — 0-0 through 79 minutes, then a Haaland brace. Worst World Cup since 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season over, Freiburg finish seventh</strong> with 47 points and a Conference League playoff spot. Restart not until Fri, August 28, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras lead</strong> Série A with 41 points from 18 matches. No match today; next up is Atlético-MG – Bahia on Tue, July 21.</li>\n      <li><span class=\"chip\">Cup</span> <strong>Freiburg travel to Düsseldorf</strong>: 1st round DFB Cup away at Fortuna on Sun, August 23, 18:00 CEST / 13:00 BRT, Merkur Spiel-Arena.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Copa do Mundo é história desde ontem à noite, e para as duas seleções de Daniel ela foi curta. A Alemanha já caiu nos dezesseis avos de final contra o Paraguai, o Brasil nas oitavas de final contra a Noruega — campeã do mundo foi a Espanha. Em Freiburg, isso já fica em segundo plano diante de outro assunto: o Sport-Club recebe a maior venda de sua história, justamente do clube que o goleou por 3 a 0 na final da Liga Europa em maio. Hoje não há jogo em lugar nenhum — a Bundesliga está em plena pausa de verão, e no Brasil a segunda-feira cai entre as duas metades da rodada.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminada nos dezesseis avos de final</strong>: 3 a 4 nos pênaltis contra o Paraguai depois de 1 a 1, bola rolou seg. 29/06, 22:30 CEST. Havertz havia empatado aos 54.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann fora</strong>: contrato rescindido em 03/07 a pedido próprio. Nenhum sucessor foi anunciado — Klopp é rumor, não fato confirmado.</li>\n      <li><span class=\"chip\">Transferência</span> <strong>Manzambi vai para Birmingham</strong>: £ 59,5 milhões (~€ 70 milhões) do Aston Villa — recorde do clube para o Villa, maior venda da história para o SC.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Pré-temporada em Schruns</strong> de 22 a 31/07, amistoso contra o Derby County na sex. 24/07, 16:00 CEST / 11:00 BRT em Imst/Tirol.</li>\n      <li><span class=\"chip good\">Copa</span> <strong>Espanha é campeã do mundo</strong>: 1 a 0 na prorrogação contra a Argentina, gol de Ferran Torres aos 106. Segundo título depois de 2010.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Seleção cai nas oitavas de final</strong>: 1 a 2 para a Noruega — 79 minutos de 0 a 0, depois dobradinha de Haaland. Pior Copa desde 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada encerrada, Freiburg em 7º</strong> com 47 pontos e vaga no playoff da Conference League. Recomeço só na sex. 28/08, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras lidera</strong> a Série A com 41 pontos em 18 jogos. Hoje sem jogo; o próximo é Atlético-MG – Bahia na ter. 21/07.</li>\n      <li><span class=\"chip\">Copa da Alemanha</span> <strong>Freiburg vai a Düsseldorf</strong>: 1ª rodada da DFB-Pokal contra o Fortuna, dom. 23/08, 18:00 CEST / 13:00 BRT, Merkur Spiel-Arena.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El Mundial es historia desde anoche, y para los dos equipos de Daniel fue corto. Alemania quedó eliminada ya en dieciseisavos de final contra Paraguay, Brasil en octavos contra Noruega — el campeón del mundo fue España. En Friburgo, de todos modos, otro tema eclipsa todo esto: el Sport-Club cobra el traspaso más grande de su historia, precisamente del club que en mayo le propinó un 0-3 en la final de la Europa League. Hoy no hay actividad de liga en ningún lado — la Bundesliga está en pleno receso de verano, y en Brasil el lunes cae entre dos mitades de la jornada.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminación en dieciseisavos</strong>: 3-4 en penales contra Paraguay tras 1-1, inicio Lun 29/06, 22:30 CEST. Havertz había empatado en el minuto 54.</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann se va</strong>: contrato rescindido el 03/07 a petición propia. No hay sucesor designado — Klopp es un rumor, no una noticia confirmada.</li>\n      <li><span class=\"chip\">Fichajes</span> <strong>Manzambi a Birmingham</strong>: 59,5 millones de £ (~70 millones de €) del Aston Villa — récord del club para el Villa, mayor ingreso en la historia del SC.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Campamento de entrenamiento en Schruns</strong> 22–31/07, amistoso ante el Derby County el Vie 24/07, 16:00 CEST / 11:00 BRT en Imst/Tirol.</li>\n      <li><span class=\"chip good\">Mundial</span> <strong>España es campeona del mundo</strong>: 1-0 en la prórroga ante Argentina, Ferran Torres al minuto 106. Segundo título tras 2010.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>La Seleção cae en octavos</strong>: 1-2 ante Noruega — 79 minutos en 0-0, luego doblete de Haaland. El peor Mundial desde 1990.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada terminada, Freiburg séptimo</strong> con 47 puntos y playoff de la Conference League. El reinicio será hasta el Vie 28/08, 20:30 CEST / 15:30 BRT.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Palmeiras lidera</strong> la Serie A con 41 puntos en 18 partidos. Hoy no hay partido; el siguiente es Atlético-MG – Bahia el Mar 21/07.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Freiburg viaja a Düsseldorf</strong>: 1.ª ronda de la Copa de Alemania (DFB-Pokal) ante el Fortuna, Dom 23/08, 18:00 CEST / 13:00 BRT, Merkur Spiel-Arena.</li>\n    </ul></div>"
      }

ong> P7 mit 91 Punkten, ein Rennen bis zur Pause, maximal 116 möglich — Platz zwei steht bei 159.</li>\n      <li><span class=\"chip\">Nächster Lauf</span> <strong>GP Ungarn, Hungaroring, Fr–So 24.–26.07.</strong> Klassisches Format ohne Sprint, Rennen 70 Runden. Alle Sessionzeiten unten in drei Zonen.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — unverändert seit São Paulo (12.07.). Nächster Lauf erst Austin, 04.–06.09.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Sonst fährt gerade niemand.</strong> MotoGP kehrt am 07.–09.08. in Silverstone zurück, Formel E hat ihr Finale am 15.–16.08. in London.</li>\n      <li><span class=\"chip\">Quellenlage</span> <strong>Plätze 6–10 einfach belegt</strong> — durch die Punktedifferenz der Konstrukteurstabelle aber unabhängig nachgerechnet. Kasten in Spalte 1.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Montag, der 20. Juli — der Tag nach dem <strong>Großen Preis von Belgien</strong>. Spa ist gefahren, das Ergebnis steht, und es hat den Titelkampf spürbar verschoben: <strong>Kimi Antonelli</strong> gewann von der Pole vor Charles Leclerc (+1,952 s) und Max Verstappen. Wichtiger als der Sieg ist aber, was <strong>60 Sekunden nach dem Start</strong> passierte: George Russell — bis gestern Antonellis einziger ernsthafter Verfolger — schied in Runde 1 nach Kontakt mit Lewis Hamilton aus. Antonelli führt jetzt mit <strong>204 zu 159</strong>, Hamilton ist neuer Zweiter, Russell auf Rang drei zurückgefallen. Und für Verstappen hat der Sonntag eine Tür endgültig zugezogen: Seine leistungsabhängige Ausstiegsklausel verlangt Platz zwei bis zur Sommerpause — bei einem einzigen verbleibenden Rennen und 68 Punkten Rückstand ist das <strong>rechnerisch unmöglich</strong> geworden. Nächster und letzter Termin vor der Pause: <strong>Ungarn, 24.–26.07.</strong> Rennstart Sonntag <strong>10:00 BRT</strong> (15:00 MESZ).</p>\n    <ul>\n      <li><span class=\"chip hot\">Ergebnis</span> <strong>Antonelli gewinnt Spa</strong> — sechster Saisonsieg, erster seit Monaco. Leclerc +1,952 s, Verstappen +11,586 s.</li>\n      <li><span class=\"chip hot\">Runde 1</span> <strong>Russell raus.</strong> Kontakt mit Hamilton in Kurve 6, Kies, Safety Car. Hamilton: fünf Sekunden Strafe — und wurde trotzdem Vierter.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154.</strong> Aus 25 Punkten Vorsprung sind 45 geworden. Leclerc Vierter (126).</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73), McLaren 195. Ferrari hat gestern 30 Punkte geholt, Mercedes 25 — der Abstand schrumpft minimal.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Ausstiegsklausel: Schwelle rechnerisch nicht mehr erreichbar.</strong> P7 mit 91 Punkten, ein Rennen bis zur Pause, maximal 116 möglich — Platz zwei steht bei 159.</li>\n      <li><span class=\"chip\">Nächster Lauf</span> <strong>GP Ungarn, Hungaroring, Fr–So 24.–26.07.</strong> Klassisches Format ohne Sprint, Rennen 70 Runden. Alle Sessionzeiten unten in drei Zonen.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — unverändert seit São Paulo (12.07.). Nächster Lauf erst Austin, 04.–06.09.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Sonst fährt gerade niemand.</strong> MotoGP kehrt am 07.–09.08. in Silverstone zurück, Formel E hat ihr Finale am 15.–16.08. in London.</li>\n      <li><span class=\"chip\">Quellenlage</span> <strong>Plätze 6–10 einfach belegt</strong> — durch die Punktedifferenz der Konstrukteurstabelle aber unabhängig nachgerechnet. Kasten in Spalte 1.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Monday, July 20 — the day after the <strong>Belgian Grand Prix</strong>. Spa has been run, the result is in, and it has noticeably shifted the title fight: <strong>Kimi Antonelli</strong> won from pole ahead of Charles Leclerc (+1.952 s) and Max Verstappen. But more important than the win is what happened <strong>60 seconds after the start</strong>: George Russell — until yesterday Antonelli's only serious challenger — retired in Lap 1 after contact with Lewis Hamilton. Antonelli now leads <strong>204 to 159</strong>, Hamilton is the new runner-up, and Russell has dropped to third. And for Verstappen, Sunday closed a door for good: his performance-based exit clause requires second place by the summer break — with only one race remaining and a 68-point deficit, that has become <strong>mathematically impossible</strong>. The next and final round before the break: <strong>Hungary, 24.–26.07.</strong> Race start Sunday <strong>10:00 BRT</strong> (15:00 CEST).</p>\n    <ul>\n      <li><span class=\"chip hot\">Result</span> <strong>Antonelli wins Spa</strong> — sixth win of the season, first since Monaco. Leclerc +1.952 s, Verstappen +11.586 s.</li>\n      <li><span class=\"chip hot\">Lap 1</span> <strong>Russell out.</strong> Contact with Hamilton at Turn 6, gravel, safety car. Hamilton: five-second penalty — and still finished fourth.</li>\n      <li><span class=\"chip\">Drivers' standings</span> <strong>Antonelli 204, Hamilton 159, Russell 154.</strong> A 25-point lead has become 45. Leclerc fourth (126).</li>\n      <li><span class=\"chip\">Constructors</span> <strong>Mercedes 358 ahead of Ferrari 285</strong> (+73), McLaren 195. Ferrari picked up 30 points yesterday, Mercedes 25 — the gap shrinks slightly.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Exit clause: threshold now mathematically out of reach.</strong> P7 with 91 points, one race left before the break, 116 maximum possible — second place stands at 159.</li>\n      <li><span class=\"chip\">Next round</span> <strong>Hungarian GP, Hungaroring, Fri–Sun 24.–26.07.</strong> Classic format, no sprint, race distance 70 laps. All session times below in three zones.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — unchanged since São Paulo (12.07.). Next round not until Austin, 04.–06.09.</li>\n      <li><span class=\"chip\">Calendar</span> <strong>Otherwise, nobody's racing right now.</strong> MotoGP returns 07.–09.08. at Silverstone, Formula E has its finale 15.–16.08. in London.</li>\n      <li><span class=\"chip\">Sourcing</span> <strong>Positions 6–10 single-sourced</strong> — but independently cross-checked via the constructors' points delta. Box in column 1.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é segunda-feira, 20 de julho — o dia seguinte ao <strong>Grande Prêmio da Bélgica</strong>. Spa já foi disputado, o resultado está definido, e ele deslocou visivelmente a disputa pelo título: <strong>Kimi Antonelli</strong> venceu a partir da pole à frente de Charles Leclerc (+1,952 s) e Max Verstappen. Mais importante que a vitória, porém, foi o que aconteceu <strong>60 segundos após a largada</strong>: George Russell — até ontem o único perseguidor sério de Antonelli — abandonou na volta 1 após contato com Lewis Hamilton. Antonelli agora lidera com <strong>204 a 159</strong>, Hamilton é o novo segundo colocado, Russell caiu para o terceiro lugar. E para Verstappen, o domingo fechou uma porta definitivamente: sua cláusula de saída ligada a desempenho exige o segundo lugar até a pausa de verão — com apenas uma corrida restante e 68 pontos de desvantagem, isso se tornou <strong>matematicamente impossível</strong>. Próximo e último compromisso antes da pausa: <strong>Hungria, 24–26/07.</strong> Largada domingo às <strong>10h00 BRT</strong> (15h00 CEST).</p>\n    <ul>\n      <li><span class=\"chip hot\">Resultado</span> <strong>Antonelli vence em Spa</strong> — sexta vitória da temporada, primeira desde Mônaco. Leclerc +1,952 s, Verstappen +11,586 s.</li>\n      <li><span class=\"chip hot\">Volta 1</span> <strong>Russell fora.</strong> Contato com Hamilton na curva 6, brita, Safety Car. Hamilton: cinco segundos de penalização — e mesmo assim terminou em quarto.</li>\n      <li><span class=\"chip\">Classificação de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154.</strong> De 25 pontos de vantagem para 45. Leclerc em quarto (126).</li>\n      <li><span class=\"chip\">Construtores</span> <strong>Mercedes 358 à frente de Ferrari 285</strong> (+73), McLaren 195. A Ferrari somou 30 pontos ontem, a Mercedes 25 — a diferença encolhe pouco.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Cláusula de saída: limite matematicamente inalcançável.</strong> P7 com 91 pontos, uma corrida até a pausa, máximo de 116 possível — o segundo lugar está em 159.</li>\n      <li><span class=\"chip\">Próxima corrida</span> <strong>GP da Hungria, Hungaroring, sex–dom 24–26/07.</strong> Formato clássico sem sprint, corrida de 70 voltas. Todos os horários das sessões abaixo, em três fusos.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — sem mudanças desde São Paulo (12/07). Próxima etapa só em Austin, 04–06/09.</li>\n      <li><span class=\"chip\">Calendário</span> <strong>Fora isso, ninguém corre agora.</strong> A MotoGP volta em 07–09/08 em Silverstone, a Fórmula E tem seu final de temporada em 15–16/08 em Londres.</li>\n      <li><span class=\"chip\">Situação das fontes</span> <strong>Posições 6 a 10 apuradas em fonte única</strong> — mas conferidas de forma independente pela diferença de pontos na classificação de construtores. Quadro na coluna 1.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es lunes 20 de julio — el día después del <strong>Gran Premio de Bélgica</strong>. Spa ya se corrió, el resultado está confirmado, y desplazó de forma notable la lucha por el título: <strong>Kimi Antonelli</strong> ganó desde la pole por delante de Charles Leclerc (+1,952 s) y Max Verstappen. Pero más importante que la victoria es lo que pasó <strong>60 segundos después de la salida</strong>: George Russell — hasta ayer el único perseguidor serio de Antonelli — abandonó en la vuelta 1 tras el contacto con Lewis Hamilton. Antonelli lidera ahora <strong>204 a 159</strong>, Hamilton es el nuevo segundo, y Russell cayó al tercer puesto. Y para Verstappen, el domingo cerró definitivamente una puerta: su cláusula de salida ligada al rendimiento exige el segundo puesto antes del receso de verano — con una sola carrera restante y 68 puntos de rezago, eso se volvió <strong>matemáticamente imposible</strong>. Próxima y última cita antes de la pausa: <strong>Hungría, 24–26/07.</strong> Arranque de la carrera domingo <strong>10:00 BRT</strong> (15:00 CEST).</p>\n    <ul>\n      <li><span class=\"chip hot\">Resultado</span> <strong>Antonelli gana en Spa</strong> — sexto triunfo de la temporada, el primero desde Mónaco. Leclerc +1,952 s, Verstappen +11,586 s.</li>\n      <li><span class=\"chip hot\">Vuelta 1</span> <strong>Russell fuera.</strong> Contacto con Hamilton en la curva 6, grava, safety car. Hamilton: penalización de cinco segundos — y aun así terminó cuarto.</li>\n      <li><span class=\"chip\">Clasificación de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154.</strong> La ventaja de 25 puntos pasó a ser de 45. Leclerc, cuarto (126).</li>\n      <li><span class=\"chip\">Constructores</span> <strong>Mercedes 358 por delante de Ferrari 285</strong> (+73), McLaren 195. Ferrari sumó ayer 30 puntos, Mercedes 25 — la diferencia se reduce mínimamente.</li>\n      <li><span class=\"chip hot\">Verstappen</span> <strong>Cláusula de salida: el umbral ya no es matemáticamente alcanzable.</strong> P7 con 91 puntos, queda una carrera antes de la pausa, máximo 116 posibles — el segundo puesto está en 159.</li>\n      <li><span class=\"chip\">Próxima carrera</span> <strong>GP de Hungría, Hungaroring, vie–dom 24–26/07.</strong> Formato clásico sin sprint, carrera de 70 vueltas. Todos los horarios de sesión abajo, en tres zonas.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — sin cambios desde São Paulo (12/07). Próxima carrera recién en Austin, 04–06/09.</li>\n      <li><span class=\"chip\">Calendario</span> <strong>Por lo demás, ahora mismo no corre nadie.</strong> La MotoGP vuelve el 07–09/08 en Silverstone, la Fórmula E tiene su final el 15–16/08 en Londres.</li>\n      <li><span class=\"chip\">Fuentes</span> <strong>Puestos 6–10, de fuente única</strong> — pero verificados de forma independiente mediante la diferencia de puntos en la tabla de constructores. Recuadro en la columna 1.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute beginnt in Londrina ein kostenloses Ferienprogramm für Kinder — fünf Vormittage, mitten in der zweiten und letzten Recesso-Woche. Montag und Dienstag sind wettertechnisch sicher: beide geprüften Portale sagen null Prozent Regen. Ab Mittwoch wird es unangenehm — nicht weil Regen sicher wäre, sondern weil die Quellen sich so heftig widersprechen, dass jede Outdoor-Planung bis Sonntag auf wackligem Grund steht.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Ab heute, gratis</strong>: Biblioteca Infantil Londrina, Ferienprogramm 20.–24.07., täglich 10 Uhr, Anmeldung per Telefon.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Mo + Di trocken</strong>: 28°/15° und 29°/18°, beide Portale einig bei 0 % Regen.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>Regen-Prognose unzuverlässig</strong>: für 22.–26.07. sagt climatempo 0–44 %, theweather.com 80–90 %. Kein Mittelwert, keine Sicherheit.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: Ferien 13.–24.07., Unterricht in der rede estadual startet wieder am Mo 27.07.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue rückläufig</strong>: Londrina 1.292 bestätigte Fälle, 2 Todesfälle (Stand 15.07.2026) — drittes Jahr in Folge fallend.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV dominiert</strong>: 55,9 % aller positiven Atemwegs-Proben, Paraná auf Alarm-Niveau (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range</strong>: Hopi Arraiá bis 27.07. verlängert, Wet'n Wild „Super Férias\" bis 02.08.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern- und Day-Trip-Ring heute blind</strong>: die lokalen Veranstaltungs-Seiten waren nicht auslesbar — das heißt nicht, dass nichts läuft.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute beginnt in Londrina ein kostenloses Ferienprogramm für Kinder — fünf Vormittage, mitten in der zweiten und letzten Recesso-Woche. Montag und Dienstag sind wettertechnisch sicher: beide geprüften Portale sagen null Prozent Regen. Ab Mittwoch wird es unangenehm — nicht weil Regen sicher wäre, sondern weil die Quellen sich so heftig widersprechen, dass jede Outdoor-Planung bis Sonntag auf wackligem Grund steht.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Ab heute, gratis</strong>: Biblioteca Infantil Londrina, Ferienprogramm 20.–24.07., täglich 10 Uhr, Anmeldung per Telefon.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Mo + Di trocken</strong>: 28°/15° und 29°/18°, beide Portale einig bei 0 % Regen.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>Regen-Prognose unzuverlässig</strong>: für 22.–26.07. sagt climatempo 0–44 %, theweather.com 80–90 %. Kein Mittelwert, keine Sicherheit.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: Ferien 13.–24.07., Unterricht in der rede estadual startet wieder am Mo 27.07.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue rückläufig</strong>: Londrina 1.292 bestätigte Fälle, 2 Todesfälle (Stand 15.07.2026) — drittes Jahr in Folge fallend.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV dominiert</strong>: 55,9 % aller positiven Atemwegs-Proben, Paraná auf Alarm-Niveau (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP-Range</strong>: Hopi Arraiá bis 27.07. verlängert, Wet'n Wild „Super Férias\" bis 02.08.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern- und Day-Trip-Ring heute blind</strong>: die lokalen Veranstaltungs-Seiten waren nicht auslesbar — das heißt nicht, dass nichts läuft.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A free vacation program for kids starts today in Londrina — five mornings, right in the middle of the second and final recesso week. Monday and Tuesday are weather-safe: both portals checked agree on zero percent chance of rain. Starting Wednesday it gets uncomfortable — not because rain is certain, but because the sources disagree so sharply that any outdoor planning through Sunday stands on shaky ground.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENT</span> <strong>Starting today, free</strong>: Biblioteca Infantil Londrina, vacation program 07/20–24, daily 10 am, sign up by phone.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Mon + Tue dry</strong>: 28°/15° and 29°/18°, both portals agree on 0% rain.</li>\n      <li><span class=\"chip hot\">HEADS UP</span> <strong>Rain forecast unreliable</strong>: for 07/22–26, climatempo says 0–44%, theweather.com says 80–90%. No averaging, no certainty.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Recesso ends</strong>: break runs 07/13–24, classes in the rede estadual resume Mon 07/27.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue declining</strong>: Londrina 1,292 confirmed cases, 2 deaths (as of 07/15/2026) — third straight year of decline.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV dominates</strong>: 55.9% of all positive respiratory samples, Paraná at alert level (InfoGripe epi week 26/2026).</li>\n      <li><span class=\"chip\">TRIP</span> <strong>SP range</strong>: Hopi Arraiá extended through 07/27, Wet'n Wild \"Super Férias\" through 08/02.</li>\n      <li><span class=\"chip\">GAP</span> <strong>Core and day-trip ring blind today</strong>: the local event listing sites couldn't be retrieved — that does not mean nothing is happening.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje começa em Londrina uma programação gratuita de férias para crianças — cinco manhãs, bem no meio da segunda e última semana do recesso. Segunda e terça-feira são seguras do ponto de vista climático: os dois portais consultados indicam zero por cento de chance de chuva. A partir de quarta-feira a coisa fica desconfortável — não porque a chuva seja certa, mas porque as fontes discordam com tanta força que qualquer planejamento ao ar livre até domingo fica em terreno instável.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENTO</span> <strong>A partir de hoje, grátis</strong>: Biblioteca Infantil de Londrina, programação de férias 20–24/07, todos os dias às 10h, inscrição por telefone.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Seg + ter secos</strong>: 28°/15° e 29°/18°, os dois portais concordam em 0% de chance de chuva.</li>\n      <li><span class=\"chip hot\">ATENÇÃO</span> <strong>Previsão de chuva pouco confiável</strong>: para 22–26/07, o climatempo indica 0–44%, o theweather.com indica 80–90%. Sem média, sem certeza.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Recesso termina</strong>: férias de 13 a 24/07, as aulas da rede estadual voltam na segunda-feira, 27/07.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue em queda</strong>: Londrina soma 1.292 casos confirmados, 2 óbitos (dados de 15/07/2026) — terceiro ano seguido de queda.</li>\n      <li><span class=\"chip hot\">BEBÊ</span> <strong>VSR domina</strong>: 55,9% de todas as amostras respiratórias positivas, Paraná em nível de alerta (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>Raio de SP</strong>: Hopi Arraiá prorrogado até 27/07, Wet'n Wild \"Super Férias\" até 02/08.</li>\n      <li><span class=\"chip\">LACUNA</span> <strong>Anel central e de passeio de um dia sem dados hoje</strong>: as páginas locais de eventos não puderam ser acessadas — isso não significa que não há nada acontecendo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy comienza en Londrina un programa vacacional gratuito para niños — cinco mañanas, en plena segunda y última semana del recesso escolar. Lunes y martes son seguros en cuanto al clima: ambos portales consultados coinciden en cero por ciento de probabilidad de lluvia. A partir del miércoles la cosa se complica — no porque la lluvia sea segura, sino porque las fuentes se contradicen tan fuerte que cualquier plan al aire libre hasta el domingo está en terreno inestable.</p>\n    <ul>\n      <li><span class=\"chip hot\">EVENTO</span> <strong>Desde hoy, gratis</strong>: Biblioteca Infantil Londrina, programa vacacional 20–24/07, todos los días a las 10 h, inscripción por teléfono.</li>\n      <li><span class=\"chip\">CLIMA</span> <strong>Lun + mar secos</strong>: 28°/15° y 29°/18°, ambos portales coinciden en 0 % de lluvia.</li>\n      <li><span class=\"chip hot\">ATENCIÓN</span> <strong>Pronóstico de lluvia poco confiable</strong>: para el 22–26/07 climatempo indica 0–44 %, theweather.com 80–90 %. Sin promedio, sin certeza.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Termina el recesso escolar</strong>: vacaciones 13–24/07, las clases en la rede estadual retoman el lun 27/07.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue a la baja</strong>: Londrina 1.292 casos confirmados, 2 muertes (al 15/07/2026) — tercer año consecutivo en descenso.</li>\n      <li><span class=\"chip hot\">BEBÉ</span> <strong>El VSR domina</strong>: 55,9 % de todas las muestras respiratorias positivas, Paraná en nivel de alerta (InfoGripe SE 26/2026).</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Radio de SP</strong>: Hopi Arraiá prorrogado hasta el 27/07, Wet'n Wild «Super Férias» hasta el 02/08.</li>\n      <li><span class=\"chip\">VACÍO</span> <strong>Anillo cercano y de excursiones, hoy sin datos</strong>: no pudimos leer las páginas de eventos locales hoy — eso no significa que no haya nada programado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Montag, der 20. Juli — Wochenthema <em>Wirtschaft &amp; Finanzen</em>, heute Teil neun: <em>Zoll &amp; Außenhandel</em>. Der Anlass steht im Kalender: Am Mittwoch, dem 22. Juli, treten die neuen US-Zölle von 25 % auf die meisten brasilianischen Waren in Kraft — Kaffee, Rindfleisch und Avocados sind ausgenommen. Brasília antwortet nicht mit Gegenzöllen, sondern über das <em>Reziprozitätsgesetz</em> und eine WTO-Beschwerde. Das ist genau der Wortschatz, den man hier gerade in jeder Nachrichtensendung hört — und den man braucht, wenn ein Kunde in São Paulo fragt, was das für seine Lieferkette heißt. 35 Einträge, 12 Verben mit voller Konjugation (davon zwei Auffrischungen), dazu die fünf gemeinsten Konjugations-Fallen des Tages und zwei falsche Freunde, die genau in dieses Thema fallen.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>Tarif ≠ tariff</strong> — der englische <em>tariff</em> ist eine <strong>Einfuhrabgabe</strong>; der deutsche <em>Tarif</em> ist ein Preis- oder Lohnschema (Handytarif, Tarifverhandlung). Das deutsche Wort für <em>tariff</em> ist <strong>der Zoll</strong>. Im PT/ES stimmt die Familie wieder: <em>a tarifa</em> / <em>el arancel</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>kontrollieren ≠ to control</strong> — deutsch <em>kontrollieren</em> heißt <em>prüfen, nachsehen</em> (Zollkontrolle = Gepäck wird durchsucht). Englisch <em>to control</em> heißt <em>steuern, beherrschen</em>. „The customs officer controlled my luggage\" klingt für Englischsprachige, als hätte der Beamte den Koffer <em>ferngesteuert</em> — richtig ist <em>checked / inspected</em>.</li>\n      <li><span class=\"chip hot\">KONJUGATION</span> <strong>PT impor ist ein pôr-Verb</strong> — <em>eu imponho, você impõe, vocês impõem</em>, und im Perfekt <em>eu impus</em>. Wer es wie ein normales -or-Verb behandelt, sagt <em>*eu imporo</em> — das gibt es nicht. Dasselbe Muster im Spanischen: <em>imponer</em> folgt <em>poner</em> (<em>yo impongo, yo impuse, yo impondré</em>).</li>\n      <li><span class=\"chip hot\">KONJUGATION</span> <strong>PT reagir → eu reajo</strong> — vor <em>o</em> und <em>a</em> wird aus dem <em>g</em> ein <em>j</em>, damit der weiche Klang bleibt. Im ganzen Subjuntivo: <em>que eu reaja, que nós reajamos</em>. Gleiche Logik wie im spanischen <em>recoger → recojo</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>Rechtschreib-Wechsel vor „e\"</strong> — PT <em>ameaçar</em> verliert die Cedille: <em>eu ameacei</em>, Subjuntivo <em>ameace</em>. ES <em>amenazar</em> tauscht z gegen c: <em>yo amenacé</em>, Subjuntivo <em>amenace</em>. Der Klang bleibt gleich, nur die Schreibung folgt der Regel.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES transferir hat zwei Stammwechsel</strong> — <em>yo transfiero</em> (e→ie im Präsens), aber <em>él transfirió</em> (e→i im Indefinido) und <em>nosotros transferimos</em> ohne Diphthong. PT <em>transferir</em> macht nur die Hebung: <em>eu transfiro</em>, sonst <em>você transfere</em>.</li>\n      <li><span class=\"chip hot\">KONJUGATION</span> <strong>treten nimmt <em>sein</em>, aufheben und ausnehmen nehmen <em>haben</em></strong> — <em>das Gesetz ist in Kraft getreten</em>, aber <em>die Regierung hat den Zoll aufgehoben</em> und <em>hat Kaffee ausgenommen</em>. Alle drei sind starke Verben, das Hilfsverb ist trotzdem verschieden.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Zoll ist zweierlei</strong> — die <em>Abgabe</em> (25 % Zoll) und die <em>Behörde</em> (der Zoll hat das Paket einbehalten). PT und ES trennen das sauber: Abgabe = <em>a tarifa</em> / <em>el arancel</em>, Behörde = <em>a alfândega</em> / <em>la aduana</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o despachante aduaneiro</strong> — in Brasilien wickelt fast nie der Importeur selbst die Verzollung ab, sondern ein zugelassener Zollagent. Ein Beruf mit eigenem Namen, den es im deutschen Alltag so nicht gibt (am nächsten: der Zollagent oder Spediteur).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>Pix</strong> — Brasiliens Sofortüberweisung der Zentralbank, kostenlos und rund um die Uhr. Interessantes Detail am heutigen Anlass: die US-Beschwerdeliste nennt ausgerechnet <em>Pix</em> als einen der Kritikpunkte am brasilianischen Markt.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>mit gleicher Münze heimzahlen</strong> — PT <em>pagar na mesma moeda</em>, ES <em>pagar con la misma moneda</em>. Ausnahmsweise wörtlich identisch in allen drei Sprachen — und genau das, was Brasilien laut eigener Aussage <em>nicht</em> tut.</li>\n      <li><span class=\"chip\">WIEDERHOLUNG</span> <strong>überweisen · verhandeln · die Rechnung</strong> — aufgefrischt aus dem Banken-Tag (22.06.) und dem Vertrags-Tag (23.06.). Alle drei sind heute Kernvokabeln: den Zoll <em>überweisen</em>, Ausnahmen <em>verhandeln</em>, und die <em>nota fiscal</em> ist genau die Rechnung, die an der Grenze zählt.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Monday, July 20 — this week's theme is <em>Economy &amp; Finance</em>, today part nine: <em>Tariffs &amp; Foreign Trade</em>. The occasion is on the calendar: on Wednesday, July 22, the new US tariffs of 25% on most Brazilian goods take effect — coffee, beef, and avocados are exempt. Brasília isn't responding with countertariffs, but through the <em>Reciprocity Law</em> and a WTO complaint. This is exactly the vocabulary you hear on every newscast right now — and that you need when a client in São Paulo asks what it means for their supply chain. 35 entries, 12 verbs with full conjugation (two of them refreshers), plus the five most common conjugation traps of the day and two false friends that fall right into this topic.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>Tarif ≠ tariff</strong> — the English <em>tariff</em> is an <strong>import duty</strong>; the German <em>Tarif</em> is a price or wage schedule (Handytarif, Tarifverhandlung). The German word for <em>tariff</em> is <strong>der Zoll</strong>. In PT/ES the family lines up again: <em>a tarifa</em> / <em>el arancel</em>.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>kontrollieren ≠ to control</strong> — German <em>kontrollieren</em> means <em>to check, to inspect</em> (Zollkontrolle = your luggage gets searched). English <em>to control</em> means <em>to steer, to command</em>. \"The customs officer controlled my luggage\" sounds to English speakers as if the officer remote-controlled the suitcase — the right words are <em>checked / inspected</em>.</li>\n      <li><span class=\"chip hot\">CONJUGATION</span> <strong>PT impor is a pôr verb</strong> — <em>eu imponho, você impõe, vocês impõem</em>, and in the simple past <em>eu impus</em>. Treat it like a regular -or verb and you get <em>*eu imporo</em> — which doesn't exist. Same pattern in Spanish: <em>imponer</em> follows <em>poner</em> (<em>yo impongo, (function () {

  const M = window.__MANIFESTS;

  const tldrGrid = $('#tldr-grid');

  // ── Language state ──────────────────────────────────────────────────
  // DE is the canonical language (always present). EN/PT/ES are produced

  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];

  })();

  function urlFor(catId, date, lang) {
    const cat = M.categories.find(c => c.id === catId);
    let useLang = 'de';
    if (cat) {
      const entry = cat.entries.find(e => e.date === date);
      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function headlineFor(entry, lang) {
    if (!entry) return '';
    if (entry.headlines && entry.headlines[lang]) return entry.headlines[lang];
    return entry.headline || '';
  }

  function tldrFor(cat, lang) {
    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {
      return cat.latestTldrHtmlByLang[lang];
    }
    return cat.latestTldrHtml || '';
  }
  const navGroups = $('#nav-groups');
  // Grouped nav config — drives BOTH the sidebar and the home tile grid so the
  // two never drift. Each group has a `header` (the .nav-label text, or null for
  // a standalone/unheadered group like jobs) and the ordered category ids it
  // contains. The flat order here must match build_manifest.CATEGORIES; a
  // category missing from every group would silently never render, so
  // renderSidebar/renderHome assert coverage against M.categories.
  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport
    { header: 'Sport',      cats: ['football', 'motorsport'] },
    { header: 'Freizeit',   cats: ['family'] },
    { header: 'Sprachen',   cats: ['learn-language'] }, // own trailing section
  ];
  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids
  // not present in M (defensive) and warns in the console about any manifest
  // category not placed in a group, so adding a category without updating
  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };
    }).filter(g => g.cats.length);
    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {
      console.warn('NAV_GROUPS missing categories (appended ungrouped):',
                   orphans.map(c => c.id));
      groups.push({ header: null, cats: orphans });
    }
    return groups;
  }

  function fmtDate(d) {
    const parts = d.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);
      }
    });
  }

  // Home-card TL;DR snapshot caps the bullet list at this many items — the

  const HOME_TLDR_BULLET_CAP = 5;
  // The active route as {catId, date}, parsed from the hash (#cat/date).

  }

  // The category dropdown holds only the month-calendar archive picker — no

  function renderDates(container, cat, activeDate) {

  const CAL_WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
  const CAL_MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
    'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
  const pad2 = n => String(n).padStart(2, '0');
  const monthIndex = iso => {
    const [y, m] = iso.split('-').map(Number);
    return y * 12 + (m - 1);
  };

  function renderCalendar(calEl, cat, activeDate) {

        <button class="cal-nav" type="button" data-dir="-1" aria-label="Vorheriger Monat">‹</button>
        <span class="cal-title"></span>
        <button class="cal-nav" type="button" data-dir="1" aria-label="Nächster Monat">›</button>
      </div>
      <div class="cal-week">${CAL_WEEKDAYS.map(w => '<span>' + w + '</span>').join('')}</div>
      <div class="cal-grid"></div>
      <div class="cal-preview" aria-live="polite"></div>`;

    const title = calEl.querySelector('.cal-title');
    const grid = calEl.querySelector('.cal-grid');
    const preview = calEl.querySelector('.cal-preview');
    const prevBtn = calEl.querySelector('.cal-nav[data-dir="-1"]');
    const nextBtn = calEl.querySelector('.cal-nav[data-dir="1"]');

    function draw() {
      const year = Math.floor(cur / 12);
      const month = cur % 12;                                 // 0-based
      title.textContent = CAL_MONTHS[month] + ' ' + year;
      prevBtn.disabled = cur <= minMonth;
      nextBtn.disabled = cur >= maxMonth;
      grid.innerHTML = '';
      const startCol = (new Date(year, month, 1).getDay() + 6) % 7;   // shift so Monday = 0
      for (let i = 0; i < startCol; i++) {
        const blank = document.createElement('span');
        blank.className = 'cal-day blank';
        grid.appendChild(blank);
      }
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = year + '-' + pad2(month + 1) + '-' + pad2(d);
        const entry = byDate.get(iso);
        const cell = document.createElement(entry ? 'a' : 'span');
        cell.className = 'cal-day ' + (entry ? 'has' : 'none');
        cell.textContent = d;
        if (entry) {
          cell.href = '#' + cat.id + '/' + iso;
          if (iso === activeDate) cell.classList.add('current');
          const show = () => {
            preview.textContent = fmtDate(iso) + ' — ' + headlineFor(entry, currentLang);
          };
          cell.addEventListener('mouseenter', show);
          cell.addEventListener('focus', show);
          cell.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigate(cat.id, iso);
          });
        }
        grid.appendChild(cell);
      }
      // Seed the preview line with the selected day's title (else a prompt).
      preview.textContent = hasActive
        ? fmtDate(activeDate) + ' — ' + headlineFor(byDate.get(activeDate), currentLang)
        : 'Tag mit Brief wählen …';
    }

    [prevBtn, nextBtn].forEach(btn => btn.addEventListener('click', (e) => {
      e.stopPropagation();
      cur = Math.min(maxMonth, Math.max(minMonth, cur + Number(btn.dataset.dir)));
      draw();
    }));
    draw();
  }

  // Render one category row (head + collapsible dates list) and append
  // it to the given container. Extracted so both the Newsletter group
  // and the Sprachen group share identical row markup + behaviour.
  function renderCategoryRow(container, cat) {
    const wrap = document.createElement('div');
    wrap.className = 'cat';
    wrap.dataset.cat = cat.id;

    const head = document.createElement('div');
    head.className = 'cat-head';
    // Tooltip carries the label so it stays identifiable when the sidebar is collapsed.
    head.title = cat.label + (cat.entries.length ? ' · ' + fmtDate(cat.entries[0].date) : '');
    head.innerHTML = `
      <span class="cat-color"></span>
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <button class="cat-toggle" type="button" aria-label="Verlauf für ${cat.label} einblenden">▶</button>
    `;

    const dates = document.createElement('div');
    dates.className = 'cat-dates';

    // Row click: navigate to latest (or expand empty-state for empty categories).
    addClickAndKey(head, (e) => {
      if (e.target && e.target.closest && e.target.closest('.cat-toggle')) return;
      if (cat.entries.length === 0) {
        wrap.classList.toggle('open');
        renderDates(dates, cat);
        return;
      }
      navigate(cat.id, cat.entries[0].date);
    });

    // Chevron click: toggle the dropdown without navigating.
    const toggleBtn = head.querySelector('.cat-toggle');
    toggleBtn.setAttribute('aria-expanded', 'false');
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const willOpen = !wrap.classList.contains('open');
      wrap.classList.toggle('open');
      toggleBtn.setAttribute('aria-expanded', String(willOpen));
      if (willOpen) renderDates(dates, cat);
    });

    wrap.appendChild(head);
    wrap.appendChild(dates);
    container.appendChild(wrap);
  }

  // Render sidebar: one labelled section per NAV_GROUPS group, each holding its
  // category rows in order. A group with a null header renders its rows with no
  // label (the standalone jobs group); a group with a header gets a .nav-label
  // above its rows.
  function renderSidebar() {
    navGroups.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const label = document.createElement('div');
        label.className = 'nav-label';
        label.textContent = group.header;
        navGroups.appendChild(label);
      }
      group.cats.forEach(cat => renderCategoryRow(navGroups, cat));
    });
  }

  // Local date as YYYY-MM-DD (not toISOString — that's UTC and would flip the
  // "stale" check across midnight in BRT/CEST). Used to compare the manifest's
  // build date against "today" for the freshness banner.
  function todayLocalISO() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }

  // "Stand: DD.MM.YYYY" dateline above the home grid, from the manifest's
  // `generated` date. If the manifest wasn't rebuilt today the line goes to the
  // warn accent and appends a hint — so a silently-failed nightly task shows up
  // instead of stale cards masquerading as fresh.
  function renderFreshness() {
    const el = $('#home-stand');
    if (!el) return;
    const gen = M.generated;
    if (!gen || !/^\d{4}-\d{2}-\d{2}$/.test(gen)) { el.hidden = true; return; }
    const stale = gen < todayLocalISO();
    el.classList.toggle('stale', stale);
    const parts = gen.split('-');
    const long = parts[2] + '.' + parts[1] + '.' + parts[0];
    el.innerHTML = `Stand: <span class="stand-date">${long}</span>`
      + (stale ? ' <span class="stand-note">— heute noch nicht aktualisiert</span>' : '');
    el.hidden = false;
  }

  // Build one TL;DR card for a category (the actual TL;DR HTML embedded). Pulled
  // out of renderHome so the grid can interleave group headers between cards.
  function buildCard(cat) {
      const latest = cat.entries[0];
      const card = document.createElement('article');
      card.className = 'tldr-card';
      card.dataset.cat = cat.id;

      const dateStr = latest ? fmtDate(latest.date) : '— · —';
      const headline = headlineFor(latest, currentLang);
      const tldrHtml = tldrFor(cat, currentLang);

      // Fallback flag: the active language has no file for this date, so the
      // card is showing the DE original. Surface a small "DE" chip so the
      // reader knows the snapshot isn't in their chosen language.
      const usesFallback = currentLang !== 'de' && latest
        && Array.isArray(latest.langs) && !latest.langs.includes(currentLang);

      // Three states: full TL;DR loaded · entry exists but TL;DR not yet
      // extracted · no entry at all (the scheduled task hasn't produced one).
      // The third state gets dedicated "out-of-print" treatment.
      let bodyHtml;
      if (tldrHtml) {
        bodyHtml = `<div class="tldr-card-body">${tldrHtml}</div>`;
      } else if (latest) {
        bodyHtml = `<div class="tldr-empty">(TL;DR wird beim nächsten Dashboard-Update extrahiert — bis dahin Headline + Klick öffnet den Brief.)</div>`;
      } else {
        card.classList.add('tldr-card--empty');
        bodyHtml = `
          <div class="tldr-empty-block">
            <span class="tldr-empty-kicker">Heute kein Brief</span>
            <p class="tldr-empty-msg">Der geplante Task hat heute noch keine Ausgabe geliefert.
            Erscheint täglich — morgen wieder hier.</p>
          </div>`;
      }

      card.innerHTML = `
        <header class="tldr-card-head">
          <span class="tile-icon" aria-hidden="true">${cat.icon}</span>
          <span class="tile-name">${cat.label}</span>
          <span class="tile-date">${dateStr}</span>
          ${usesFallback ? '<span class="fallback-flag" title="Keine Übersetzung für diesen Tag — DE-Original">DE</span>' : ''}
        </header>
        ${headline ? `<div class="tldr-card-headline">${headline}</div>` : ''}
        ${bodyHtml}
        ${latest ? '<button class="tldr-read" type="button">Vollständiger Brief →</button>' : ''}
      `;
      // Cap the TL;DR snapshot bullets — long lists make the home grid hard to
      // scan, and the full set is one click away. Trim the overflow and leave a
      // muted "+N weitere" cue so the truncation is honest.
      const bulletList = card.querySelector('.tldr-card-body .tldr ul');
      if (bulletList) {
        const items = Array.from(bulletList.children).filter(el => el.tagName === 'LI');
        const overflow = items.length - HOME_TLDR_BULLET_CAP;
        if (overflow > 0) {
          items.slice(HOME_TLDR_BULLET_CAP).forEach(li => li.remove());
          const more = document.createElement('li');
          more.className = 'tldr-more';
          more.textContent = '+ ' + overflow + ' weitere im Brief';
          bulletList.appendChild(more);
        }
      }
      // Make the whole card keyboard-activatable. Skip non-newsletter cards
      // (empty categories) — they have no navigation target.
      if (latest) {
        card.setAttribute('aria-label', cat.label + ' · ' + dateStr + (headline ? ' · ' + headline : ''));
        addClickAndKey(card, (e) => {
          if (e.target && e.target.closest && e.target.closest('a')) return;
          navigate(cat.id, latest.date);
        });
      }

      // The embedded TL;DR HTML carries plain <a href="https://…"> source
      // links (no target). The dashboard has no <base target="_blank">, so
      // without forcing _blank a click would replace the dashboard window.
      card.querySelectorAll('.tldr-card-body a').forEach(a => {
        a.setAttribute('target', '_blank');
        if (!a.getAttribute('rel')) a.setAttribute('rel', 'noopener noreferrer');
      });

      return card;
  }

  // Render home view: the TL;DR cards, laid out in NAV_GROUPS order with a
  // full-width group header before each headed group (mirrors the sidebar). The
  // header is a grid item spanning all columns so the column flow restarts under
  // each group — same grouping the reader sees in the nav.
  function renderHome() {
    renderFreshness();
    tldrGrid.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const h = document.createElement('h3');
        h.className = 'tldr-group-head';
        h.textContent = group.header;
        tldrGrid.appendChild(h);
      }
      group.cats.forEach((cat, i) => {
        const card = buildCard(cat);
        // First card of each group starts a fresh visual run — clear its left
        // column rule so the group reads as its own block (the nth-child rules
        // can't track per-group position once headers are interspersed).
        if (i === 0) card.classList.add('group-first');
        tldrGrid.appendChild(card);
      });
    });
  }

  // Brand wordmark → back to the dashboard.
  const brandHome = $('#brand-home');
  if (brandHome) brandHome.addEventListener('click', (e) => { e.preventDefault(); showHome(); });

  // ── Breadcrumb / status path ─────────────────────────────────────────
  // Terminal path shown in the footer status line (`~` or `~/section[/date]`).
  const statusLoc = $('#status-loc');

  function updateBreadcrumb(catId, date) {
    if (!statusLoc) return;
    const cat = catId ? M.categories.find(c => c.id === catId) : null;
    let path = '~';
    if (cat) path += '/' + cat.label + (date ? '/' + fmtDate(date) : '');
    statusLoc.textContent = path;
  }

  // Navigate to a specific newsletter
  function navigate(catId, date) {
    home.classList.remove('show');
    frame.style.display = 'block';
    loading.classList.add('show');
    frame.src = urlFor(catId, date, currentLang);
    // Give the iframe a meaningful AT label so screen-reader users know what
    // they entered (the static title="Newsletter" on the element is generic).
    const cat = M.categories.find(c => c.id === catId);
    frame.title = cat ? cat.label + ' · ' + fmtDate(date) : 'Newsletter';
    frame.onload = () => { loading.classList.remove('show'); };
    frame.onerror = () => { loading.classList.remove('show'); };

    // Update active state in sidebar. Expansion stays user-controlled (the
    // chevron) — clicking a category just loads its latest brief, the list
    // stays hidden. But if the dropdown is already open, re-render it so the
    // calendar jumps to the selected day's month and marks it, and the list
    // keeps its expanded state.
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    $$('.cal-day.current').forEach(el => el.classList.remove('current'));
    const catEl = $('.cat[data-cat="' + catId + '"]');
    if (catEl) {
      catEl.classList.add('active');
      catEl.querySelector('.cat-head')?.setAttribute('aria-current', 'true');
      if (cat && cat.entries.length && catEl.classList.contains('open')) {
        renderDates(catEl.querySelector('.cat-dates'), cat, date);
      }
    }
    const hb = $('#home-btn');
    hb.classList.remove('active');
    hb.removeAttribute('aria-current');

    // Header title picks up the loaded newsletter's accent. The token names
    // line up: --c-economy / --c-economy-text, etc.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--c-' + catId + '-text)');

    updateBreadcrumb(catId, date);

    // Push a real history entry so the browser back button returns to the
    // previous view. Skip when we're already at this URL (handleHash got here
    // from a back/forward — re-pushing would clobber the stack).
    const targetHash = '#' + catId + '/' + date;
    if (location.hash !== targetHash) {
      history.pushState(null, '', targetHash);
    }
  }

  function showHome() {
    frame.style.display = 'none';
    home.classList.add('show');
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    const hb = $('#home-btn');
    hb.classList.add('active');
    hb.setAttribute('aria-current', 'page');
    // Dashboard's own "house" accent on the home view — black in light
     // mode, cream in dark mode (= var(--fg)). This keeps the header
     // title from defaulting to economy red when no newsletter is loaded;
     // home is its own thing, not a borrowed accent.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--fg)');
    updateBreadcrumb(null);
    // Same back-button logic as navigate(): only push when this is a fresh
    // transition, not when handleHash got here from back/forward.
    if (location.hash !== '#home' && location.hash !== '') {
      history.pushState(null, '', '#home');
    }
  }

  addClickAndKey($('#home-btn'), showHome);

  // Hash-based deep links
  function handleHash() {
    const hash = location.hash.replace(/^#/, '');
    if (!hash || hash === 'home') { showHome(); return; }
    const parts = hash.split('/');
    if (parts.length === 2) {
      const catId = parts[0];
      const date = parts[1];
      const cat = M.categories.find(c => c.id === catId);
      if (!cat) { showHome(); return; }
      if (date === 'latest' && cat.entries.length) {
        navigate(catId, cat.entries[0].date);
      } else {
        navigate(catId, date);
      }
    } else {
      showHome();
    }
  }

  // Animations toggle (footer) — default on; turning off adds html.anim-off
  // (components.css then kills every keyframe + the brand cursor blink) and
  // removes term-anim, persisting "anim"=off/on (read pre-paint in <head>).
  const animToggle = $('#anim-toggle');
  function syncAnim() {
    if (!animToggle) return;
    const on = !document.documentElement.classList.contains('anim-off');
    animToggle.setAttribute('aria-pressed', String(on));
    const box = animToggle.querySelector('.anim-box');
    if (box) box.textContent = on ? '[x]' : '[ ]';
  }
  if (animToggle) {
    syncAnim();
    animToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const turningOff = !html.classList.contains('anim-off');
      if (turningOff) {
        html.classList.add('anim-off');
        html.classList.remove('term-anim');
      } else {
        html.classList.remove('anim-off');
      }
      try { localStorage.setItem('anim', turningOff ? 'off' : 'on'); } catch (_) {}
      syncAnim();
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Language picker — single trigger button with flag + native short
     label, opens an upward dropdown menu with all four locales. The
     trigger updates its flag/label to mirror the active selection;
     menu options use aria-selected for active state.

     Switching re-renders the sidebar + home (so headlines + TL;DR HTML
     refresh) and, if a newsletter is currently loaded in the iframe,
     swaps to the matching language URL via urlFor() (falls back to DE
     when a translation is missing for that date).
     ────────────────────────────────────────────────────────────────── */
  const LANG_DISPLAY = {
    de: { short: 'DE', native: 'Deutsch' },
    en: { short: 'EN', native: 'English' },
    pt: { short: 'PT', native: 'Português' },
    es: { short: 'ES', native: 'Español' },
  };
  const langTrigger = $('#lang-trigger');
  const langMenu    = $('#lang-menu');
  const langOptions = $$('.lang-option');

  function setLangMenuOpen(open) {
    if (!langMenu || !langTrigger) return;
    langMenu.hidden = !open;
    langTrigger.setAttribute('aria-expanded', String(open));
  }

  function applyLang(lang) {
    if (!SUPPORTED_LANGS.includes(lang)) lang = 'de';
    currentLang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
    // Update trigger label + flag.
    if (langTrigger) {
      const d = LANG_DISPLAY[lang] || LANG_DISPLAY.de;
      const flagEl  = langTrigger.querySelector('.dd-flag');
      const labelEl = langTrigger.querySelector('.lang-label-short');
      if (flagEl)  flagEl.className    = 'dd-flag dd-flag-' + lang;
      if (labelEl) labelEl.textContent = d.short;
      langTrigger.title = 'Sprache: ' + d.native + ' (klicken zum Wechseln)';
    }
    // Update aria-selected on options.
    langOptions.forEach(opt => {
      opt.setAttribute('aria-selected', String(opt.dataset.lang === lang));
    });
    // Re-render so headlines + TL;DR pick up the chosen language.
    renderSidebar();
    renderHome();
    // If a specific newsletter is currently open, reload it in the new
    // language (handleHash re-enters navigate() which uses urlFor()).
    if (location.hash && location.hash !== '#home' && location.hash !== '') {
      handleHash();
    }
  }

  if (langTrigger && langMenu) {
    langTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      setLangMenuOpen(langMenu.hidden);
    });
    langOptions.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applyLang(opt.dataset.lang);
        setLangMenuOpen(false);
      });
    });
    // Click-outside + Escape close the menu.
    document.addEventListener('click', (e) => {
      if (!langMenu.hidden && !e.target.closest('.lang-picker')) setLangMenuOpen(false);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !langMenu.hidden) {
        setLangMenuOpen(false);
        langTrigger.focus();
      }
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Theme toggle — three states (auto / light / dark). Auto follows
     prefers-color-scheme; light and dark force the palette regardless
     of the system setting. Persisted in localStorage.
     ────────────────────────────────────────────────────────────────── */
  const THEME_KEY = 'mb-theme';
  const themeDropdown = $('#theme-dropdown');
  const themeOrder = ['warm', 'green', 'mono', 'paper'];
  const themeLabel = { warm: 'warm', green: 'grün', mono: 'mono', paper: 'paper' };
  function applyTheme(state) {
    document.documentElement.setAttribute('data-theme', state);
    if (themeDropdown) {
      const label = themeDropdown.querySelector('.theme-label');
      if (label) label.textContent = themeLabel[state];
      themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((item) => {
        item.setAttribute('aria-current', item.dataset.themeValue === state ? 'true' : 'false');
      });
    }
    try { localStorage.setItem(THEME_KEY, state); } catch (_) {}
    // Mirror into the iframed content page. Same-origin, so direct DOM
    // access works. The newsletter's lib/tokens.css already defines the
    // warm-dark + light overrides; we just toggle the data-theme attr.
    syncIframeTheme();
  }

  // Set/clear data-theme on the iframe's <html>. Called from applyTheme()
  // and from the iframe's load event so it sticks across navigation.
  function syncIframeTheme() {
    try {
      const doc = frame && frame.contentDocument;
      if (!doc || !doc.documentElement) return;
      const cur = document.documentElement.getAttribute('data-theme');
      if (cur) doc.documentElement.setAttribute('data-theme', cur);
      else     doc.documentElement.removeAttribute('data-theme');
    } catch (_) { /* cross-origin or not yet loaded — ignore */ }
  }
  // Re-apply on every iframe load (navigating between newsletters).
  if (frame) frame.addEventListener('load', syncIframeTheme);
  // Theme dropdown: pick a theme → apply + close. Click-away / Escape also close it.
  if (themeDropdown) {
    themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((btn) => {
      addClickAndKey(btn, () => {
        applyTheme(btn.dataset.themeValue);
        themeDropdown.removeAttribute('open');
      });
    });
    document.addEventListener('click', (e) => {
      if (themeDropdown.open && !themeDropdown.contains(e.target)) themeDropdown.removeAttribute('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && themeDropdown.open) themeDropdown.removeAttribute('open');
    });
  }
  try {
    const saved = localStorage.getItem(THEME_KEY);
    applyTheme(saved && themeOrder.includes(saved) ? saved : 'warm');
  } catch (_) { applyTheme('warm'); }

  // Re-render on hashchange (initial load + browser back/forward). Browser
  // back/forward still work via the hash URLs + pushState in navigate()/showHome().
  function handleHashAndSettle() { handleHash(); }

  /* ──────────────────────────────────────────────────────────────────
     Nav-rail minimize toggle. The chevron (#rail-toggle) collapses the rail
     to an icon-only strip on desktop; the FAB (#rail-fab) opens it as a drawer
     on mobile. Collapsed state persists in localStorage (mb-nav-rail).
     ────────────────────────────────────────────────────────────────── */
  const RAIL_KEY = 'mb-nav-rail';
  const appShell  = $('.app-shell');
  const railToggle = $('#rail-toggle');
  const railFab    = $('#rail-fab');

  function setRailCollapsed(collapsed) {
    if (!appShell) return;
    appShell.classList.toggle('rail-collapsed', collapsed);
    if (railToggle) {
      railToggle.setAttribute('aria-expanded', String(!collapsed));
      const glyph = railToggle.querySelector('.rail-toggle-glyph');
      if (glyph) glyph.textContent = collapsed ? '«' : '»';
    }
    try { localStorage.setItem(RAIL_KEY, collapsed ? 'collapsed' : 'expanded'); } catch (_) {}
  }

  if (railToggle) {
    railToggle.addEventListener('click', () => {
      setRailCollapsed(!appShell.classList.contains('rail-collapsed'));
    });
  }
  // Mobile FAB toggles the off-canvas drawer (a separate .rail-open state).
  if (railFab && appShell) {
    railFab.addEventListener('click', () => appShell.classList.toggle('rail-open'));
    // A nav click inside the drawer closes it; click-away closes it too.
    $('#nav-rail')?.addEventListener('click', (e) => {
      if (e.target.closest('.cat-head, .home-btn, .cat-date, .cal-day.has')) {
        appShell.classList.remove('rail-open');
      }
    });
    document.addEventListener('click', (e) => {
      if (appShell.classList.contains('rail-open')
          && !e.target.closest('#nav-rail') && !e.target.closest('#rail-fab')) {
        appShell.classList.remove('rail-open');
      }
    });
  }
  // Restore persisted collapsed state.
  try {
    setRailCollapsed(localStorage.getItem(RAIL_KEY) === 'collapsed');
  } catch (_) { setRailCollapsed(false); }

  // Init — set the lang button states from the restored currentLang (re-renders
  // sidebar/home implicitly), then resolve the initial hash.
  applyLang(currentLang);
  handleHash();
  window.addEventListener('hashchange', handleHashAndSettle);
})();
