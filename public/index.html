      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Freitag, der 17. Juli — Wochenthema <em>Reise &amp; Verkehr</em>, sechster Teil. Nach Buchen (22.05), Grenze (29.05), Unterkunft (12.06), Autofahren (03.07) und Fliegen (10.07) kommt heute das Verkehrsmittel, das in Brasilien wirklich zählt: der <strong>Fernbus</strong>. Von Ribeirão Claro nach Curitiba oder São Paulo fährt man nicht, man <em>nimmt den Bus</em> — und dafür gibt es ein Vokabular, das im Deutschen schlicht keine Entsprechung hat. Ein deutscher Fernbus hat einen Sitz; ein brasilianischer hat eine <strong>poltrona</strong>, und die gibt es als <em>semi-leito</em>, <em>leito</em> und <em>leito-cama</em> — Komfortstufen, für die Deutsch nur „Liegesitz\" kennt (<a href=\"https://www.aguiabranca.com.br/glossario/tipos-de-onibus/onibus-leito\">aguiabranca.com.br</a>). Der eigentliche Hammer des Tages ist aber ein falscher Freund, der Daniels beide Zielsprachen gegeneinander stellt: <strong>PT <em>caminhão</em> = LKW, ES-MX <em>camión</em> = Bus</strong>. Dieselbe lateinische Wurzel, zwei Nachbarländer im Wortsinn — und in Mexiko steigst du in genau das ein, was du in Brasilien überholst. Dazu drei Redewendungen, die alle auf Schienen laufen: <em>pegar o bonde andando</em>, <em>perder el tren</em> und <em>aufs Abstellgleis</em>. 32 Einträge, 10 Verben mit voller Konjugation, plus 3 Auffrischungen (<em>umsteigen</em>, <em>der Aufenthalt</em>, <em>die Mautstelle</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT caminhão ≠ ES-MX camión</strong> — <em>o caminhão</em> ist immer der <em>LKW</em>. <em>El camión</em> heißt laut RAE panhispanisch ebenfalls Lastwagen („vehículo de cuatro o más ruedas que se usa para transportar grandes cargas\"), <strong>in Mexiko aber schlicht <em>Bus</em></strong> — der RAE-Eintrag führt die Bedeutung mit der Marke „Méx. autobús\" (<a href=\"https://dle.rae.es/cami%C3%B3n\">dle.rae.es</a>, Seite direkt 403, Definition über den Such-Index belegt).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a poltrona</strong> — im Bus heißt der Sitz nicht <em>assento</em>, sondern <em>poltrona</em> („Sessel\"). Die Komfortleiter: <em>convencional/executivo</em> → <em>semi-leito</em> → <em>leito</em> → <em>leito-cama</em>, das laut Branchenquelle „eine echte Bett simuliert\" (<a href=\"https://motorshow.com.br/o-que-e-leito-em-viagem-de-onibus-veja-qual-a-diferenca-entre-cada-tipo-de-assento\">motorshow.com.br</a>). Deutsch hat dafür ein Wort: <em>Liegesitz</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o bagageiro</strong> = der <em>Gepäckraum unter dem Bus</em> — nicht zu verwechseln mit <em>a bagagem</em> (das Gepäck selbst). Faustregel der Betreiber: rund <strong>30 kg</strong> und bis <strong>1 m</strong> Kantenlänge pro Passagier (<a href=\"https://www.aguiabranca.com.br/glossario/transporte-no-brasil/bagageiro\">aguiabranca.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a baldeação ≠ a integração</strong> — <em>baldeação</em> ist nur der physische Umstieg von Fahrzeug zu Fahrzeug; <em>integração</em> ist das Tarif-Konzept, bei dem du innerhalb einer Frist umsteigst, <em>ohne</em> ein zweites Mal zu zahlen (<a href=\"https://gestaosat.com/blog/diferenca-entre-baldeacao-e-integracao/\">gestaosat.com</a>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>pegar o bonde andando</strong> (PT) — wörtlich „auf die fahrende Straßenbahn aufspringen\". Achtung, Bedeutungs-Lücke: brasilianisch heißt es „ein Gespräch zur Hälfte aufschnappen, ohne zu wissen, worum es geht\" — nicht das deutsche „auf den fahrenden Zug aufspringen\" im Trittbrettfahrer-Sinn (<a href=\"https://www.dicionarioinformal.com.br/significado/pegar%20o%20bonde%20andando/21313/\">dicionarioinformal.com.br</a>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>perder el tren</strong> (ES) / <strong>perder o bonde</strong> (PT) = eine einmalige Chance verstreichen lassen. Deutsch: <em>der Zug ist abgefahren</em>. Die Logik ist überall gleich — ein Zug hat noch nie auf jemanden gewartet.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>aufs Abstellgleis schieben</strong> (DE) — ein <em>Abstellgleis</em> ist laut Duden ein „totes Gleis, auf dem Eisenbahnwagen abgestellt werden\"; übertragen das berufliche Abseits (<a href=\"https://www.duden.de/rechtschreibung/Abstellgleis\">duden.de</a>). PT sagt dazu <em>jogar para escanteio</em> (aus dem Fußball!), ES <em>dejar en vía muerta</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT embarcar → eu embar<strong>qu</strong>ei</strong> — nie <em>*embarcei</em>. Das <em>c</em> wird vor <em>e</em> zu <em>qu</em>, damit der k-Laut bleibt. Gleicher Trick bei <em>trocar → troquei</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT descer → eu des<strong>ç</strong>o</strong> — nie <em>*desco</em>. Spiegelbild von <em>embarcar</em>: hier soll das <em>c</em> weich bleiben, also Cedilha. Und <strong>ES recargar → yo recar<strong>gu</strong>é</strong>, nie <em>*recargé</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT conferir → eu confiro</strong> — Stammhebung e→i in der <em>eu</em>-Form; <em>você confere</em> bleibt normal. <strong>ES dormitar ist dagegen brav regelmäßig</strong>: <em>yo dormito</em>, kein <em>*duermito</em> — obwohl <em>dormir → duermo</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>Bewegung nimmt <em>sein</em>, der Rest <em>haben</em></strong> — <em>ich <strong>bin</strong> eingestiegen / ausgestiegen / umgestiegen / losgefahren / eingenickt</em>, aber <em>ich <strong>habe</strong> aufgeladen / entwertet / kontrolliert / gedrängelt</em>. <em>einnicken</em> nimmt <em>sein</em>, weil es wie <em>einschlafen</em> eine Zustandsänderung ist.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>die Fahrkarte (f) ↔ a passagem (f) ↔ el boleto (m)</strong> — dieselbe Sache, im Spanischen männlich. Und die Station kippt komplett: <em>der Busbahnhof</em> (m) ↔ <em>a rodoviária</em> (f) ↔ <em>la central camionera</em> (f).</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Friday, July 17 — this week's theme <em>Travel &amp; Transportation</em>, part six. After booking (May 22), the border (May 29), lodging (June 12), driving (July 3) and flying (July 10), today it's the mode of transport that really matters in Brazil: the <strong>long-distance bus</strong>. You don't just \"drive\" from Ribeirão Claro to Curitiba or São Paulo — you <em>take the bus</em> — and there's a whole vocabulary for that which German simply has no equivalent for. A German long-distance coach has a seat; a Brazilian one has a <strong>poltrona</strong>, and it comes as <em>semi-leito</em>, <em>leito</em>, and <em>leito-cama</em> — comfort tiers for which German only has \"Liegesitz\" (reclining seat) (<a href=\"https://www.aguiabranca.com.br/glossario/tipos-de-onibus/onibus-leito\">aguiabranca.com.br</a>). But today's real showstopper is a false friend that pits Daniel's two target languages against each other: <strong>PT <em>caminhão</em> = truck, ES-MX <em>camión</em> = bus</strong>. Same Latin root, two neighboring countries in every sense — and in Mexico you climb into exactly the vehicle you'd overtake in Brazil. Plus three idioms that all run on rails: <em>pegar o bonde andando</em>, <em>perder el tren</em>, and <em>aufs Abstellgleis</em>. 32 entries, 10 verbs with full conjugation, plus 3 review items (<em>umsteigen</em>, <em>der Aufenthalt</em>, <em>die Mautstelle</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT caminhão ≠ ES-MX camión</strong> — <em>o caminhão</em> always means <em>truck</em>. Per the pan-Hispanic RAE, <em>el camión</em> likewise means truck (\"vehículo de cuatro o más ruedas que se usa para transportar grandes cargas\"), <strong>but in Mexico it simply means <em>bus</em></strong> — the RAE entry tags that sense with the label \"Méx. autobús\" (<a href=\"https://dle.rae.es/cami%C3%B3n\">dle.rae.es</a>, page itself 403s, definition evidenced via the search index).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a poltrona</strong> — on the bus, the seat isn't called <em>assento</em>, but <em>poltrona</em> (\"armchair\"). The comfort ladder: <em>convencional/executivo</em> → <em>semi-leito</em> → <em>leito</em> → <em>leito-cama</em>, which one industry source says \"simulates a real bed\" (<a href=\"https://motorshow.com.br/o-que-e-leito-em-viagem-de-onibus-veja-qual-a-diferenca-entre-cada-tipo-de-assento\">motorshow.com.br</a>). German has just one word for all of that: <em>Liegesitz</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o bagageiro</strong> = the <em>luggage hold under the bus</em> — not to be confused with <em>a bagagem</em> (the luggage itself). Operators' rule of thumb: roughly <strong>30 kg</strong> and up to <strong>1 m</strong> in length per passenger (<a href=\"https://www.aguiabranca.com.br/glossario/transporte-no-brasil/bagageiro\">aguiabranca.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a baldeação ≠ a integração</strong> — <em>baldeação</em> is only the physical transfer from one vehicle to another; <em>integração</em> is the fare concept that lets you transfer within a set window <em>without</em> paying a second time (<a href=\"https://gestaosat.com/blog/diferenca-entre-baldeacao-e-integracao/\">gestaosat.com</a>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>pegar o bonde andando</strong> (PT) — literally \"to hop on a moving streetcar.\" Watch out, there's a meaning gap: in Brazil it means \"to catch half a conversation without knowing what it's about\" — not the \"jump on the moving train\" freeloader sense the German equivalent implies (<a href=\"https://www.dicionarioinformal.com.br/significado/pegar%20o%20bonde%20andando/21313/\">dicionarioinformal.com.br</a>).</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>perder el tren</strong> (ES) / <strong>perder o bonde</strong> (PT) = to let a one-time chance slip by. German: <em>der Zug ist abgefahren</em> (\"the train has left\"). The logic is the same everywhere — a train has never once waited for anyone.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>aufs Abstellgleis schieben</strong> (DE) — an <em>Abstellgleis</em> is, per Duden, a \"dead-end track where railcars are parked\"; figuratively, professional sidelining (<a href=\"https://www.duden.de/rechtschreibung/Abstellgleis\">duden.de</a>). PT says <em>jogar para escanteio</em> (straight out of soccer!), ES <em>dejar en vía muerta</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT embarcar → eu embar<strong>qu</strong>ei</strong> — never <em>*embarcei</em>. The <em>c</em> turns into <em>qu</em> before <em>e</em> so the k-sound is preserved. Same trick with <em>trocar → troquei</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT descer → eu des<strong>ç</strong>o</strong> — never <em>*desco</em>. The mirror image of <em>embarcar</em>: here the <em>c</em> needs to stay soft, hence the cedilla. And <strong>ES recargar → yo recar<strong>gu</strong>é</strong>, never <em>*recargé</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT conferir → eu confiro</strong> — stem change e→i in the <em>eu</em> form; <em>você confere</em> stays regular. <strong>ES dormitar, by contrast, is perfectly regular</strong>: <em>yo dormito</em>, never <em>*duermito</em> — even though <em>dormir → duermo</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>Motion takes <em>sein</em>, everything else takes <em>haben</em></strong> — <em>ich <strong>bin</strong> eingestiegen / ausgestiegen / umgestiegen / losgefahren / eingenickt</em>, but <em>ich <strong>habe</strong> aufgeladen / entwertet / kontrolliert / gedrängelt</em>. <em>einnicken</em> takes <em>sein</em> because, like <em>einschlafen</em>, it's a change of state.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>die Fahrkarte (f) ↔ a passagem (f) ↔ el boleto (m)</strong> — same thing, masculine in Spanish. And the station flips entirely: <em>der Busbahnhof</em> (m) ↔ <em>a rodoviária</em> (f) ↔ <em>la central camionera</em> (f).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sexta-feira, 17 de julho — tema da semana <em>Viagem &amp; Trânsito</em>, sexta parte. Depois de Reservas (22.05), Fronteira (29.05), Hospedagem (12.06), Dirigir (03.07) e Voar (10.07), chega hoje o meio de transporte que realmente importa no Brasil: o <strong>ônibus interurbano</strong>. De Ribeirão Claro a Curitiba ou São Paulo ninguém dirige, <em>pega-se o ônibus</em> — e para isso existe um vocabulário que, em alemão, simplesmente não tem equivalente. Um ônibus interurbano alemão tem um assento; um brasileiro tem uma <strong>poltrona</strong>, que existe nas versões <em>semi-leito</em>, <em>leito</em> e <em>leito-cama</em> — graus de conforto para os quais o alemão só conhece „Liegesitz\" (<a href=\"https://www.aguiabranca.com.br/glossario/tipos-de-onibus/onibus-leito\">aguiabranca.com.br</a>). Mas o verdadeiro destaque do dia é um falso amigo que coloca as duas línguas-alvo de Daniel uma contra a outra: <strong>PT <em>caminhão</em> = LKW, ES-MX <em>camión</em> = Bus</strong>. Mesma raiz latina, dois países vizinhos em sentidos opostos — e no México você embarca em exatamente aquilo que no Brasil você ultrapassa. Além disso, três expressões que correm todas sobre trilhos: <em>pegar o bonde andando</em>, <em>perder el tren</em> e <em>aufs Abstellgleis</em>. 32 entradas, 10 verbos com conjugação completa, além de 3 revisões (<em>umsteigen</em>, <em>der Aufenthalt</em>, <em>die Mautstelle</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO AMIGO</span> <strong>PT caminhão ≠ ES-MX camión</strong> — <em>o caminhão</em> é sempre o <em>LKW</em>. <em>El camión</em>, segundo a RAE, também significa caminhão em todo o mundo hispânico („vehículo de cuatro o más ruedas que se usa para transportar grandes cargas\"), <strong>mas no México é simplesmente <em>Bus</em></strong> — o verbete da RAE traz esse sentido com a marcação „Méx. autobús\" (<a href=\"https://dle.rae.es/cami%C3%B3n\">dle.rae.es</a>, a página retorna 403 diretamente, definição comprovada via índice de busca).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a poltrona</strong> — no ônibus, o assento não se chama <em>assento</em>, e sim <em>poltrona</em> („Sessel\"). A escada de conforto: <em>convencional/executivo</em> → <em>semi-leito</em> → <em>leito</em> → <em>leito-cama</em>, que segundo a fonte do setor „eine echte Bett simuliert\" (<a href=\"https://motorshow.com.br/o-que-e-leito-em-viagem-de-onibus-veja-qual-a-diferenca-entre-cada-tipo-de-assento\">motorshow.com.br</a>). O alemão tem uma única palavra para isso: <em>Liegesitz</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o bagageiro</strong> = o <em>Gepäckraum unter dem Bus</em> — não confundir com <em>a bagagem</em> (a bagagem em si). Regra prática das empresas: cerca de <strong>30 kg</strong> e até <strong>1 m</strong> de aresta por passageiro (<a href=\"https://www.aguiabranca.com.br/glossario/transporte-no-brasil/bagageiro\">aguiabranca.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a baldeação ≠ a integração</strong> — <em>baldeação</em> é apenas a troca física de um veículo para outro; <em>integração</em> é o conceito tarifário no qual você troca de veículo dentro de um prazo <em>sem</em> pagar uma segunda vez (<a href=\"https://gestaosat.com/blog/diferenca-entre-baldeacao-e-integracao/\">gestaosat.com</a>).</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>pegar o bonde andando</strong> (PT) — literalmente „pular no bonde em movimento\". Atenção, há uma lacuna de sentido: no Brasil significa „captar um assunto pela metade, sem saber do que se trata\" — não o alemão „auf den fahrenden Zug aufspringen\" no sentido de pegar carona (<a href=\"https://www.dicionarioinformal.com.br/significado/pegar%20o%20bonde%20andando/21313/\">dicionarioinformal.com.br</a>).</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>perder el tren</strong> (ES) / <strong>perder o bonde</strong> (PT) = deixar passar uma chance única. Em alemão: <em>der Zug ist abgefahren</em>. A lógica é a mesma em todo lugar — um trem nunca esperou por ninguém.</li>\n      <li><span class=\"chip good\">EXPRESSÃO</span> <strong>aufs Abstellgleis schieben</strong> (DE) — segundo o Duden, um <em>Abstellgleis</em> é um „totes Gleis, auf dem Eisenbahnwagen abgestellt werden\"; em sentido figurado, o ostracismo profissional (<a href=\"https://www.duden.de/rechtschreibung/Abstellgleis\">duden.de</a>). Em PT diz-se <em>jogar para escanteio</em> (do futebol!), em ES <em>dejar en vía muerta</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT embarcar → eu embar<strong>qu</strong>ei</strong> — nunca <em>*embarcei</em>. O <em>c</em> vira <em>qu</em> antes de <em>e</em>, para manter o som de „k\". Mesmo truque em <em>trocar → troquei</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT descer → eu des<strong>ç</strong>o</strong> — nunca <em>*desco</em>. Espelho de <em>embarcar</em>: aqui o <em>c</em> deve continuar suave, por isso a cedilha. E <strong>ES recargar → yo recar<strong>gu</strong>é</strong>, nunca <em>*recargé</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT conferir → eu confiro</strong> — elevação da vogal do radical e→i na forma <em>eu</em>; <em>você confere</em> permanece normal. <strong>Já o ES dormitar é obedientemente regular</strong>: <em>yo dormito</em>, nunca <em>*duermito</em> — apesar de <em>dormir → duermo</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>Movimento usa <em>sein</em>, o resto usa <em>haben</em></strong> — <em>ich <strong>bin</strong> eingestiegen / ausgestiegen / umgestiegen / losgefahren / eingenickt</em>, mas <em>ich <strong>habe</strong> aufgeladen / entwertet / kontrolliert / gedrängelt</em>. <em>einnicken</em> usa <em>sein</em> porque, assim como <em>einschlafen</em>, é uma mudança de estado.</li>\n      <li><span class=\"chip\">GÊNERO</span> <strong>die Fahrkarte (f) ↔ a passagem (f) ↔ el boleto (m)</strong> — a mesma coisa, mas masculina em espanhol. E a estação vira de ponta-cabeça: <em>der Busbahnhof</em> (m) ↔ <em>a rodoviária</em> (f) ↔ <em>la central camionera</em> (f).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Viernes 17 de julio — tema de la semana <em>Viaje y Transporte</em>, sexta parte. Después de Reservar (22/05), Frontera (29/05), Alojamiento (12/06), Manejar (03/07) y Volar (10/07), hoy le toca al medio de transporte que de verdad importa en Brasil: el <strong>camión foráneo</strong>. De Ribeirão Claro a Curitiba o São Paulo no se maneja, se toma el camión — y para eso existe un vocabulario que en alemán simplemente no tiene equivalente. Un camión foráneo alemán tiene un asiento; uno brasileño tiene una <strong>poltrona</strong>, que existe como <em>semi-leito</em>, <em>leito</em> y <em>leito-cama</em> — niveles de confort para los que el alemán solo conoce la palabra «Liegesitz» (<a href=\"https://www.aguiabranca.com.br/glossario/tipos-de-onibus/onibus-leito\">aguiabranca.com.br</a>). Pero la verdadera bomba del día es un falso amigo que enfrenta entre sí los dos idiomas meta de Daniel: <strong>PT <em>caminhão</em> = camión de carga, ES-MX <em>camión</em> = autobús</strong>. Misma raíz latina, dos países vecinos en el sentido literal de la palabra — y en México te subes exactamente a aquello que en Brasil rebasas. A esto se suman tres modismos que corren sobre rieles: <em>pegar o bonde andando</em>, <em>perder el tren</em> y <em>aufs Abstellgleis</em>. 32 entradas, 10 verbos con conjugación completa, más 3 repasos (<em>umsteigen</em>, <em>der Aufenthalt</em>, <em>die Mautstelle</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO AMIGO</span> <strong>PT caminhão ≠ ES-MX camión</strong> — <em>o caminhão</em> siempre es el <em>camión de carga</em>. <em>El camión</em>, según la RAE, significa también panhispánicamente vehículo de carga („vehículo de cuatro o más ruedas que se usa para transportar grandes cargas\"), <strong>pero en México simplemente <em>autobús</em></strong> — la entrada de la RAE marca ese sentido con «Méx. autobús» (<a href=\"https://dle.rae.es/cami%C3%B3n\">dle.rae.es</a>, la página da directamente error 403, definición comprobada a través del índice de búsqueda).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a poltrona</strong> — en el camión, el asiento no se llama <em>assento</em>, sino <em>poltrona</em> („sillón\"). La escalera de confort: <em>convencional/executivo</em> → <em>semi-leito</em> → <em>leito</em> → <em>leito-cama</em>, que según una fuente del sector „simula una cama de verdad\" (<a href=\"https://motorshow.com.br/o-que-e-leito-em-viagem-de-onibus-veja-qual-a-diferenca-entre-cada-tipo-de-assento\">motorshow.com.br</a>). El alemán tiene una sola palabra para todo eso: <em>Liegesitz</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o bagageiro</strong> = el <em>compartimento de equipaje bajo el camión</em> — no debe confundirse con <em>a bagagem</em> (el equipaje en sí). Regla práctica de los operadores: alrededor de <strong>30 kg</strong> y hasta <strong>1 m</strong> de longitud por pasajero (<a href=\"https://www.aguiabranca.com.br/glossario/transporte-no-brasil/bagageiro\">aguiabranca.com.br</a>).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a baldeação ≠ a integração</strong> — <em>baldeação</em> es solo el cambio físico de un vehículo a otro; <em>integração</em> es el concepto tarifario según el cual, dentro de un plazo determinado, se hace transbordo <em>sin</em> pagar una segunda vez (<a href=\"https://gestaosat.com/blog/diferenca-entre-baldeacao-e-integracao/\">gestaosat.com</a>).</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>pegar o bonde andando</strong> (PT) — literalmente „subirse al tranvía en marcha\". Cuidado, hay una brecha de significado: en Brasil quiere decir „captar a medias una conversación sin saber de qué se trata\" — no el sentido alemán de „subirse al tren en marcha\" como polizón (<a href=\"https://www.dicionarioinformal.com.br/significado/pegar%20o%20bonde%20andando/21313/\">dicionarioinformal.com.br</a>).</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>perder el tren</strong> (ES) / <strong>perder o bonde</strong> (PT) = dejar pasar una oportunidad única. En alemán: <em>der Zug ist abgefahren</em>. La lógica es la misma en todas partes — un tren nunca ha esperado a nadie.</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>aufs Abstellgleis schieben</strong> (DE) — un <em>Abstellgleis</em> es, según el Duden, una „vía muerta en la que se estacionan vagones de tren\"; en sentido figurado, la marginación profesional (<a href=\"https://www.duden.de/rechtschreibung/Abstellgleis\">duden.de</a>). El PT dice <em>jogar para escanteio</em> (¡tomado del fútbol!), el ES <em>dejar en vía muerta</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>PT embarcar → eu embar<strong>qu</strong>ei</strong> — nunca <em>*embarcei</em>. La <em>c</em> se convierte en <em>qu</em> antes de <em>e</em>, para conservar el sonido de k. El mismo truco en <em>trocar → troquei</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>PT descer → eu des<strong>ç</strong>o</strong> — nunca <em>*desco</em>. Es el espejo de <em>embarcar</em>: aquí la <em>c</em> debe mantenerse suave, de ahí la cedilla. Y <strong>ES recargar → yo recar<strong>gu</strong>é</strong>, nunca <em>*recargé</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>PT conferir → eu confiro</strong> — elevación vocálica e→i en la forma <em>eu</em>; <em>você confere</em> se mantiene normal. <strong>En cambio, ES dormitar es tranquilamente regular</strong>: <em>yo dormito</em>, no <em>*duermito</em> — aunque <em>dormir → duermo</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>El movimiento lleva <em>sein</em>, el resto <em>haben</em></strong> — <em>ich <strong>bin</strong> eingestiegen / ausgestiegen / umgestiegen / losgefahren / eingenickt</em>, pero <em>ich <strong>habe</strong> aufgeladen / entwertet / kontrolliert / gedrängelt</em>. <em>einnicken</em> lleva <em>sein</em> porque, igual que <em>einschlafen</em>, implica un cambio de estado.</li>\n      <li><span class=\"chip\">GÉNERO</span> <strong>die Fahrkarte (f) ↔ a passagem (f) ↔ el boleto (m)</strong> — lo mismo, pero en español es masculino. Y la estación cambia por completo: <em>der Busbahnhof</em> (m) ↔ <em>a rodoviária</em> (f) ↔ <em>la central camionera</em> (f).</li>\n    </ul></div>"

// ============================================================
// Dashboard logic
// ============================================================
(function () {
  const $ = (s, root) => (root || document).querySelector(s);
  const $$ = (s, root) => Array.from((root || document).querySelectorAll(s));
  const M = window.__MANIFESTS;
  const frame = $('#frame');
  const home = $('#home-view');
  const loading = $('#loading');
  const tldrGrid = $('#tldr-grid');

  // ── Language state ──────────────────────────────────────────────────
  // DE is the canonical language (always present). EN/PT/ES are produced
  // alongside by the nightly tasks; if a translation is missing for a
  // given date, urlFor() and the home/sidebar renderers transparently
  // fall back to the DE version so the dashboard keeps working as
  // translations roll out.
  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];
  const LANG_KEY = 'mb-lang';
  let currentLang = (function () {
    try {
      const v = localStorage.getItem(LANG_KEY);
      return SUPPORTED_LANGS.includes(v) ? v : 'de';
    } catch (_) { return 'de'; }
  })();

  function urlFor(catId, date, lang) {
    const cat = M.categories.find(c => c.id === catId);
    let useLang = 'de';
    if (cat) {
      const entry = cat.entries.find(e => e.date === date);
      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function headlineFor(entry, lang) {
    if (!entry) return '';
    if (entry.headlines && entry.headlines[lang]) return entry.headlines[lang];
    return entry.headline || '';
  }

  function tldrFor(cat, lang) {
    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {
      return cat.latestTldrHtmlByLang[lang];
    }
    return cat.latestTldrHtml || '';
  }
  const navGroups = $('#nav-groups');
  // Grouped nav config — drives BOTH the sidebar and the home tile grid so the
  // two never drift. Each group has a `header` (the .nav-label text, or null for
  // a standalone/unheadered group like jobs) and the ordered category ids it
  // contains. The flat order here must match build_manifest.CATEGORIES; a
  // category missing from every group would silently never render, so
  // renderSidebar/renderHome assert coverage against M.categories.
  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport
    { header: 'Sport',      cats: ['football', 'motorsport'] },
    { header: 'Freizeit',   cats: ['family'] },
    { header: 'Sprachen',   cats: ['learn-language'] }, // own trailing section
  ];
  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids
  // not present in M (defensive) and warns in the console about any manifest
  // category not placed in a group, so adding a category without updating
  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };
    }).filter(g => g.cats.length);
    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {
      console.warn('NAV_GROUPS missing categories (appended ungrouped):',
                   orphans.map(c => c.id));
      groups.push({ header: null, cats: orphans });
    }
    return groups;
  }

  function fmtDate(d) {
    const parts = d.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);
      }
    });
  }

  // Home-card TL;DR snapshot caps the bullet list at this many items — the
  // card is a scan teaser, the full set is one click away in the brief.
  const HOME_TLDR_BULLET_CAP = 5;
  // The active route as {catId, date}, parsed from the hash (#cat/date).
  function currentRoute() {
    const parts = location.hash.replace(/^#/, '').split('/');
    return { catId: parts[0] || null, date: parts[1] || null };
  }

  // The category dropdown holds only the month-calendar archive picker — no
  // flat date list. The calendar marks the selected day, jumps to its month,
  // and previews titles on hover.
  function renderDates(container, cat, activeDate) {
    container.innerHTML = '';
    if (cat.entries.length === 0) {
      container.innerHTML = '<div class="cat-empty">Heute kein Brief</div>';
      return;
    }
    if (activeDate === undefined) {
      const r = currentRoute();
      activeDate = r.catId === cat.id ? r.date : null;
    }
    const cal = document.createElement('div');
    cal.className = 'cat-cal';
    container.appendChild(cal);
    renderCalendar(cal, cat, activeDate);
  }

  // Month-calendar archive picker: only days that actually have a brief are
  // clickable; hovering/focusing one previews its title, clicking opens it.
  // Replaces the unbounded "show everything" list so the picker stays usable
  // once a category has hundreds of back-issues.
  const CAL_WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
  const CAL_MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
    'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
  const pad2 = n => String(n).padStart(2, '0');
  const monthIndex = iso => {
    const [y, m] = iso.split('-').map(Number);
    return y * 12 + (m - 1);
  };

  function renderCalendar(calEl, cat, activeDate) {
    const byDate = new Map(cat.entries.map(e => [e.date, e]));
    const newest = cat.entries[0].date;                       // manifest is newest-first
    const oldest = cat.entries[cat.entries.length - 1].date;
    const minMonth = monthIndex(oldest);
    const maxMonth = monthIndex(newest);
    const hasActive = activeDate && byDate.has(activeDate);
    // Open on the selected day's month when one is selected, else the newest.
    let cur = Math.min(maxMonth, Math.max(minMonth,
      hasActive ? monthIndex(activeDate) : maxMonth));

    calEl.innerHTML = `
      <div class="cal-bar">
        <button class="cal-nav" type="button" data-dir="-1" aria-label="Vorheriger Monat">‹</button>
        <span class="cal-title"></span>
        <button class="cal-nav" type="button" data-dir="1" aria-label="Nächster Monat">›</button>
      </div>
      <div class="cal-week">${CAL_WEEKDAYS.map(w => '<span>' + w + '</span>').join('')}</div>
      <div class="cal-grid"></div>
      <div class="cal-preview" aria-live="polite"></div>`;

    const title = calEl.querySelector('.cal-title');
    const grid = calEl.querySelector('.cal-grid');
    const preview = calEl.querySelector('.cal-preview');
    const prevBtn = calEl.querySelector('.cal-nav[data-dir="-1"]');
    const nextBtn = calEl.querySelector('.cal-nav[data-dir="1"]');

    function draw() {
      const year = Math.floor(cur / 12);
      const month = cur % 12;                                 // 0-based
      title.textContent = CAL_MONTHS[month] + ' ' + year;
      prevBtn.disabled = cur <= minMonth;
      nextBtn.disabled = cur >= maxMonth;
      grid.innerHTML = '';
      const startCol = (new Date(year, month, 1).getDay() + 6) % 7;   // shift so Monday = 0
      for (let i = 0; i < startCol; i++) {
        const blank = document.createElement('span');
        blank.className = 'cal-day blank';
        grid.appendChild(blank);
      }
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = year + '-' + pad2(month + 1) + '-' + pad2(d);
        const entry = byDate.get(iso);
        const cell = document.createElement(entry ? 'a' : 'span');
        cell.className = 'cal-day ' + (entry ? 'has' : 'none');
        cell.textContent = d;
        if (entry) {
          cell.href = '#' + cat.id + '/' + iso;
          if (iso === activeDate) cell.classList.add('current');
          const show = () => {
            preview.textContent = fmtDate(iso) + ' — ' + headlineFor(entry, currentLang);
          };
          cell.addEventListener('mouseenter', show);
          cell.addEventListener('focus', show);
          cell.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigate(cat.id, iso);
          });
        }
        grid.appendChild(cell);
      }
      // Seed the preview line with the selected day's title (else a prompt).
      preview.textContent = hasActive
        ? fmtDate(activeDate) + ' — ' + headlineFor(byDate.get(activeDate), currentLang)
        : 'Tag mit Brief wählen …';
    }

    [prevBtn, nextBtn].forEach(btn => btn.addEventListener('click', (e) => {
      e.stopPropagation();
      cur = Math.min(maxMonth, Math.max(minMonth, cur + Number(btn.dataset.dir)));
      draw();
    }));
    draw();
  }

  // Render one category row (head + collapsible dates list) and append
  // it to the given container. Extracted so both the Newsletter group
  // and the Sprachen group share identical row markup + behaviour.
  function renderCategoryRow(container, cat) {
    const wrap = document.createElement('div');
    wrap.className = 'cat';
    wrap.dataset.cat = cat.id;

    const head = document.createElement('div');
    head.className = 'cat-head';
    // Tooltip carries the label so it stays identifiable when the sidebar is collapsed.
    head.title = cat.label + (cat.entries.length ? ' · ' + fmtDate(cat.entries[0].date) : '');
    head.innerHTML = `
      <span class="cat-color"></span>
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <button class="cat-toggle" type="button" aria-label="Verlauf für ${cat.label} einblenden">▶</button>
    `;

    const dates = document.createElement('div');
    dates.className = 'cat-dates';

    // Row click: navigate to latest (or expand empty-state for empty categories).
    addClickAndKey(head, (e) => {
      if (e.target && e.target.closest && e.target.closest('.cat-toggle')) return;
      if (cat.entries.length === 0) {
        wrap.classList.toggle('open');
        renderDates(dates, cat);
        return;
      }
      navigate(cat.id, cat.entries[0].date);
    });

    // Chevron click: toggle the dropdown without navigating.
    const toggleBtn = head.querySelector('.cat-toggle');
    toggleBtn.setAttribute('aria-expanded', 'false');
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const willOpen = !wrap.classList.contains('open');
      wrap.classList.toggle('open');
      toggleBtn.setAttribute('aria-expanded', String(willOpen));
      if (willOpen) renderDates(dates, cat);
    });

    wrap.appendChild(head);
    wrap.appendChild(dates);
    container.appendChild(wrap);
  }

  // Render sidebar: one labelled section per NAV_GROUPS group, each holding its
  // category rows in order. A group with a null header renders its rows with no
  // label (the standalone jobs group); a group with a header gets a .nav-label
  // above its rows.
  function renderSidebar() {
    navGroups.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const label = document.createElement('div');
        label.className = 'nav-label';
        label.textContent = group.header;
        navGroups.appendChild(label);
      }
      group.cats.forEach(cat => renderCategoryRow(navGroups, cat));
    });
  }

  // Local date as YYYY-MM-DD (not toISOString — that's UTC and would flip the
  // "stale" check across midnight in BRT/CEST). Used to compare the manifest's
  // build date against "today" for the freshness banner.
  function todayLocalISO() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }

  // "Stand: DD.MM.YYYY" dateline above the home grid, from the manifest's
  // `generated` date. If the manifest wasn't rebuilt today the line goes to the
  // warn accent and appends a hint — so a silently-failed nightly task shows up
  // instead of stale cards masquerading as fresh.
  function renderFreshness() {
    const el = $('#home-stand');
    if (!el) return;
    const gen = M.generated;
    if (!gen || !/^\d{4}-\d{2}-\d{2}$/.test(gen)) { el.hidden = true; return; }
    const stale = gen < todayLocalISO();
    el.classList.toggle('stale', stale);
    const parts = gen.split('-');
    const long = parts[2] + '.' + parts[1] + '.' + parts[0];
    el.innerHTML = `Stand: <span class="stand-date">${long}</span>`
      + (stale ? ' <span class="stand-note">— heute noch nicht aktualisiert</span>' : '');
    el.hidden = false;
  }

  // Build one TL;DR card for a category (the actual TL;DR HTML embedded). Pulled
  // out of renderHome so the grid can interleave group headers between cards.
  function buildCard(cat) {
      const latest = cat.entries[0];
      const card = document.createElement('article');
      card.className = 'tldr-card';
      card.dataset.cat = cat.id;

      const dateStr = latest ? fmtDate(latest.date) : '— · —';
      const headline = headlineFor(latest, currentLang);
      const tldrHtml = tldrFor(cat, currentLang);

      // Fallback flag: the active language has no file for this date, so the
      // card is showing the DE original. Surface a small "DE" chip so the
      // reader knows the snapshot isn't in their chosen language.
      const usesFallback = currentLang !== 'de' && latest
        && Array.isArray(latest.langs) && !latest.langs.includes(currentLang);

      // Three states: full TL;DR loaded · entry exists but TL;DR not yet
      // extracted · no entry at all (the scheduled task hasn't produced one).
      // The third state gets dedicated "out-of-print" treatment.
      let bodyHtml;
      if (tldrHtml) {
        bodyHtml = `<div class="tldr-card-body">${tldrHtml}</div>`;
      } else if (latest) {
        bodyHtml = `<div class="tldr-empty">(TL;DR wird beim nächsten Dashboard-Update extrahiert — bis dahin Headline + Klick öffnet den Brief.)</div>`;
      } else {
        card.classList.add('tldr-card--empty');
        bodyHtml = `
          <div class="tldr-empty-block">
            <span class="tldr-empty-kicker">Heute kein Brief</span>
            <p class="tldr-empty-msg">Der geplante Task hat heute noch keine Ausgabe geliefert.
            Erscheint täglich — morgen wieder hier.</p>
          </div>`;
      }

      card.innerHTML = `
        <header class="tldr-card-head">
          <span class="tile-icon" aria-hidden="true">${cat.icon}</span>
          <span class="tile-name">${cat.label}</span>
          <span class="tile-date">${dateStr}</span>
          ${usesFallback ? '<span class="fallback-flag" title="Keine Übersetzung für diesen Tag — DE-Original">DE</span>' : ''}
        </header>
        ${headline ? `<div class="tldr-card-headline">${headline}</div>` : ''}
        ${bodyHtml}
        ${latest ? '<button class="tldr-read" type="button">Vollständiger Brief →</button>' : ''}
      `;
      // Cap the TL;DR snapshot bullets — long lists make the home grid hard to
      // scan, and the full set is one click away. Trim the overflow and leave a
      // muted "+N weitere" cue so the truncation is honest.
      const bulletList = card.querySelector('.tldr-card-body .tldr ul');
      if (bulletList) {
        const items = Array.from(bulletList.children).filter(el => el.tagName === 'LI');
        const overflow = items.length - HOME_TLDR_BULLET_CAP;
        if (overflow > 0) {
          items.slice(HOME_TLDR_BULLET_CAP).forEach(li => li.remove());
          const more = document.createElement('li');
          more.className = 'tldr-more';
          more.textContent = '+ ' + overflow + ' weitere im Brief';
          bulletList.appendChild(more);
        }
      }
      // Make the whole card keyboard-activatable. Skip non-newsletter cards
      // (empty categories) — they have no navigation target.
      if (latest) {
        card.setAttribute('aria-label', cat.label + ' · ' + dateStr + (headline ? ' · ' + headline : ''));
        addClickAndKey(card, (e) => {
          if (e.target && e.target.closest && e.target.closest('a')) return;
          navigate(cat.id, latest.date);
        });
      }

      // The embedded TL;DR HTML carries plain <a href="https://…"> source
      // links (no target). The dashboard has no <base target="_blank">, so
      // without forcing _blank a click would replace the dashboard window.
      card.querySelectorAll('.tldr-card-body a').forEach(a => {
        a.setAttribute('target', '_blank');
        if (!a.getAttribute('rel')) a.setAttribute('rel', 'noopener noreferrer');
      });

      return card;
  }

  // Render home view: the TL;DR cards, laid out in NAV_GROUPS order with a
  // full-width group header before each headed group (mirrors the sidebar). The
  // header is a grid item spanning all columns so the column flow restarts under
  // each group — same grouping the reader sees in the nav.
  function renderHome() {
    renderFreshness();
    tldrGrid.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const h = document.createElement('h3');
        h.className = 'tldr-group-head';
        h.textContent = group.header;
        tldrGrid.appendChild(h);
      }
      group.cats.forEach((cat, i) => {
        const card = buildCard(cat);
        // First card of each group starts a fresh visual run — clear its left
        // column rule so the group reads as its own block (the nth-child rules
        // can't track per-group position once headers are interspersed).
        if (i === 0) card.classList.add('group-first');
        tldrGrid.appendChild(card);
      });
    });
  }

  // Brand wordmark → back to the dashboard.
  const brandHome = $('#brand-home');
  if (brandHome) brandHome.addEventListener('click', (e) => { e.preventDefault(); showHome(); });

  // ── Breadcrumb / status path ─────────────────────────────────────────
  // Terminal path shown in the footer status line (`~` or `~/section[/date]`).
  const statusLoc = $('#status-loc');

  function updateBreadcrumb(catId, date) {
    if (!statusLoc) return;
    const cat = catId ? M.categories.find(c => c.id === catId) : null;
    let path = '~';
    if (cat) path += '/' + cat.label + (date ? '/' + fmtDate(date) : '');
    statusLoc.textContent = path;
  }

  // Navigate to a specific newsletter
  function navigate(catId, date) {
    home.classList.remove('show');
    frame.style.display = 'block';
    loading.classList.add('show');
    frame.src = urlFor(catId, date, currentLang);
    // Give the iframe a meaningful AT label so screen-reader users know what
    // they entered (the static title="Newsletter" on the element is generic).
    const cat = M.categories.find(c => c.id === catId);
    frame.title = cat ? cat.label + ' · ' + fmtDate(date) : 'Newsletter';
    frame.onload = () => { loading.classList.remove('show'); };
    frame.onerror = () => { loading.classList.remove('show'); };

    // Update active state in sidebar. Expansion stays user-controlled (the
    // chevron) — clicking a category just loads its latest brief, the list
    // stays hidden. But if the dropdown is already open, re-render it so the
    // calendar jumps to the selected day's month and marks it, and the list
    // keeps its expanded state.
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    $$('.cal-day.current').forEach(el => el.classList.remove('current'));
    const catEl = $('.cat[data-cat="' + catId + '"]');
    if (catEl) {
      catEl.classList.add('active');
      catEl.querySelector('.cat-head')?.setAttribute('aria-current', 'true');
      if (cat && cat.entries.length && catEl.classList.contains('open')) {
        renderDates(catEl.querySelector('.cat-dates'), cat, date);
      }
    }
    const hb = $('#home-btn');
    hb.classList.remove('active');
    hb.removeAttribute('aria-current');

    // Header title picks up the loaded newsletter's accent. The token names
    // line up: --c-economy / --c-economy-text, etc.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--c-' + catId + '-text)');

    updateBreadcrumb(catId, date);

    // Push a real history entry so the browser back button returns to the
    // previous view. Skip when we're already at this URL (handleHash got here
    // from a back/forward — re-pushing would clobber the stack).
    const targetHash = '#' + catId + '/' + date;
    if (location.hash !== targetHash) {
      history.pushState(null, '', targetHash);
    }
  }

  function showHome() {
    frame.style.display = 'none';
    home.classList.add('show');
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    const hb = $('#home-btn');
    hb.classList.add('active');
    hb.setAttribute('aria-current', 'page');
    // Dashboard's own "house" accent on the home view — black in light
     // mode, cream in dark mode (= var(--fg)). This keeps the header
     // title from defaulting to economy red when no newsletter is loaded;
     // home is its own thing, not a borrowed accent.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--fg)');
    updateBreadcrumb(null);
    // Same back-button logic as navigate(): only push when this is a fresh
    // transition, not when handleHash got here from back/forward.
    if (location.hash !== '#home' && location.hash !== '') {
      history.pushState(null, '', '#home');
    }
  }

  addClickAndKey($('#home-btn'), showHome);

  // Hash-based deep links
  function handleHash() {
    const hash = location.hash.replace(/^#/, '');
    if (!hash || hash === 'home') { showHome(); return; }
    const parts = hash.split('/');
    if (parts.length === 2) {
      const catId = parts[0];
      const date = parts[1];
      const cat = M.categories.find(c => c.id === catId);
      if (!cat) { showHome(); return; }
      if (date === 'latest' && cat.entries.length) {
        navigate(catId, cat.entries[0].date);
      } else {
        navigate(catId, date);
      }
    } else {
      showHome();
    }
  }

  // Animations toggle (footer) — default on; turning off adds html.anim-off
  // (components.css then kills every keyframe + the brand cursor blink) and
  // removes term-anim, persisting "anim"=off/on (read pre-paint in <head>).
  const animToggle = $('#anim-toggle');
  function syncAnim() {
    if (!animToggle) return;
    const on = !document.documentElement.classList.contains('anim-off');
    animToggle.setAttribute('aria-pressed', String(on));
    const box = animToggle.querySelector('.anim-box');
    if (box) box.textContent = on ? '[x]' : '[ ]';
  }
  if (animToggle) {
    syncAnim();
    animToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const turningOff = !html.classList.contains('anim-off');
      if (turningOff) {
        html.classList.add('anim-off');
        html.classList.remove('term-anim');
      } else {
        html.classList.remove('anim-off');
      }
      try { localStorage.setItem('anim', turningOff ? 'off' : 'on'); } catch (_) {}
      syncAnim();
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Language picker — single trigger button with flag + native short
     label, opens an upward dropdown menu with all four locales. The
     trigger updates its flag/label to mirror the active selection;
     menu options use aria-selected for active state.

     Switching re-renders the sidebar + home (so headlines + TL;DR HTML
     refresh) and, if a newsletter is currently loaded in the iframe,
     swaps to the matching language URL via urlFor() (falls back to DE
     when a translation is missing for that date).
     ────────────────────────────────────────────────────────────────── */
  const LANG_DISPLAY = {
    de: { short: 'DE', native: 'Deutsch' },
    en: { short: 'EN', native: 'English' },
    pt: { short: 'PT', native: 'Português' },
    es: { short: 'ES', native: 'Español' },
  };
  const langTrigger = $('#lang-trigger');
  const langMenu    = $('#lang-menu');
  const langOptions = $$('.lang-option');

  function setLangMenuOpen(open) {
    if (!langMenu || !langTrigger) return;
    langMenu.hidden = !open;
    langTrigger.setAttribute('aria-expanded', String(open));
  }

  function applyLang(lang) {
    if (!SUPPORTED_LANGS.includes(lang)) lang = 'de';
    currentLang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
    // Update trigger label + flag.
    if (langTrigger) {
      const d = LANG_DISPLAY[lang] || LANG_DISPLAY.de;
      const flagEl  = langTrigger.querySelector('.dd-flag');
      const labelEl = langTrigger.querySelector('.lang-label-short');
      if (flagEl)  flagEl.className    = 'dd-flag dd-flag-' + lang;
      if (labelEl) labelEl.textContent = d.short;
      langTrigger.title = 'Sprache: ' + d.native + ' (klicken zum Wechseln)';
    }
    // Update aria-selected on options.
    langOptions.forEach(opt => {
      opt.setAttribute('aria-selected', String(opt.dataset.lang === lang));
    });
    // Re-render so headlines + TL;DR pick up the chosen language.
    renderSidebar();
    renderHome();
    // If a specific newsletter is currently open, reload it in the new
    // language (handleHash re-enters navigate() which uses urlFor()).
    if (location.hash && location.hash !== '#home' && location.hash !== '') {
      handleHash();
    }
  }

  if (langTrigger && langMenu) {
    langTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      setLangMenuOpen(langMenu.hidden);
    });
    langOptions.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applyLang(opt.dataset.lang);
        setLangMenuOpen(false);
      });
    });
    // Click-outside + Escape close the menu.
    document.addEventListener('click', (e) => {
      if (!langMenu.hidden && !e.target.closest('.lang-picker')) setLangMenuOpen(false);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !langMenu.hidden) {
        setLangMenuOpen(false);
        langTrigger.focus();
      }
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Theme toggle — three states (auto / light / dark). Auto follows
     prefers-color-scheme; light and dark force the palette regardless
     of the system setting. Persisted in localStorage.
     ────────────────────────────────────────────────────────────────── */
  const THEME_KEY = 'mb-theme';
  const themeDropdown = $('#theme-dropdown');
  const themeOrder = ['warm', 'green', 'mono', 'paper'];
  const themeLabel = { warm: 'warm', green: 'grün', mono: 'mono', paper: 'paper' };
  function applyTheme(state) {
    document.documentElement.setAttribute('data-theme', state);
    if (themeDropdown) {
      const label = themeDropdown.querySelector('.theme-label');
      if (label) label.textContent = themeLabel[state];
      themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((item) => {
        item.setAttribute('aria-current', item.dataset.themeValue === state ? 'true' : 'false');
      });
    }
    try { localStorage.setItem(THEME_KEY, state); } catch (_) {}
    // Mirror into the iframed content page. Same-origin, so direct DOM
    // access works. The newsletter's lib/tokens.css already defines the
    // warm-dark + light overrides; we just toggle the data-theme attr.
    syncIframeTheme();
  }

  // Set/clear data-theme on the iframe's <html>. Called from applyTheme()
  // and from the iframe's load event so it sticks across navigation.
  function syncIframeTheme() {
    try {
      const doc = frame && frame.contentDocument;
      if (!doc || !doc.documentElement) return;
      const cur = document.documentElement.getAttribute('data-theme');
      if (cur) doc.documentElement.setAttribute('data-theme', cur);
      else     doc.documentElement.removeAttribute('data-theme');
    } catch (_) { /* cross-origin or not yet loaded — ignore */ }
  }
  // Re-apply on every iframe load (navigating between newsletters).
  if (frame) frame.addEventListener('load', syncIframeTheme);
  // Theme dropdown: pick a theme → apply + close. Click-away / Escape also close it.
  if (themeDropdown) {
    themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((btn) => {
      addClickAndKey(btn, () => {
        applyTheme(btn.dataset.themeValue);
        themeDropdown.removeAttribute('open');
      });
    });
    document.addEventListener('click', (e) => {
      if (themeDropdown.open && !themeDropdown.contains(e.target)) themeDropdown.removeAttribute('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && themeDropdown.open) themeDropdown.removeAttribute('open');
    });
  }
  try {
    const saved = localStorage.getItem(THEME_KEY);
    applyTheme(saved && themeOrder.includes(saved) ? saved : 'warm');
  } catch (_) { applyTheme('warm'); }

  // Re-render on hashchange (initial load + browser back/forward). Browser
  // back/forward still work via the hash URLs + pushState in navigate()/showHome().
  function handleHashAndSettle() { handleHash(); }

  /* ──────────────────────────────────────────────────────────────────
     Nav-rail minimize toggle. The chevron (#rail-toggle) collapses the rail
     to an icon-only strip on desktop; the FAB (#rail-fab) opens it as a drawer
     on mobile. Collapsed state persists in localStorage (mb-nav-rail).
     ────────────────────────────────────────────────────────────────── */
  const RAIL_KEY = 'mb-nav-rail';
  const appShell  = $('.app-shell');
  const railToggle = $('#rail-toggle');
  const railFab    = $('#rail-fab');

  function setRailCollapsed(collapsed) {
    if (!appShell) return;
    appShell.classList.toggle('rail-collapsed', collapsed);
    if (railToggle) {
      railToggle.setAttribute('aria-expanded', String(!collapsed));
      const glyph = railToggle.querySelector('.rail-toggle-glyph');
      if (glyph) glyph.textContent = collapsed ? '«' : '»';
    }
    try { localStorage.setItem(RAIL_KEY, collapsed ? 'collapsed' : 'expanded'); } catch (_) {}
  }

  if (railToggle) {
    railToggle.addEventListener('click', () => {
      setRailCollapsed(!appShell.classList.contains('rail-collapsed'));
    });
  }
  // Mobile FAB toggles the off-canvas drawer (a separate .rail-open state).
  if (railFab && appShell) {
    railFab.addEventListener('click', () => appShell.classList.toggle('rail-open'));
    // A nav click inside the drawer closes it; click-away closes it too.
    $('#nav-rail')?.addEventListener('click', (e) => {
      if (e.target.closest('.cat-head, .home-btn, .cat-date, .cal-day.has')) {
        appShell.classList.remove('rail-open');
      }
    });
    document.addEventListener('click', (e) => {
      if (appShell.classList.contains('rail-open')
          && !e.target.closest('#nav-rail') && !e.target.closest('#rail-fab')) {
        appShell.classList.remove('rail-open');
      }
    });
  }
  // Restore persisted collapsed state.
  try {
    setRailCollapsed(localStorage.getItem(RAIL_KEY) === 'collapsed');
  } catch (_) { setRailCollapsed(false); }

  // Init — set the lang button states from the restored currentLang (re-renders
  // sidebar/home implicitly), then resolve the initial hash.
  applyLang(currentLang);
  handleHash();
  window.addEventListener('hashchange', handleHashAndSettle);
})();
</script>
</body>
</html>
