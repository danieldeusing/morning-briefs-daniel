<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);

  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

  <div class="header-right">

      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red

             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

   <li><span class=\"chip good\">BR</span> <strong>IPCA Juni +0,16 % m/m</strong>, 12 Monate 4,64 % (von 4,72 %) — Inflation kühlt schneller ab, als das Copom selbst prognostiziert (5,2 % für 2026).<sup>[8]</sup></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Primärdefizit R$ 56,1 Mrd im Mai</strong> (Vorjahr: R$ 33,7 Mrd), 12-Monats-Defizit 1,14 % des BIP, Zinslast R$ 107,5 Mrd im Monat. Das Fiskal-Risiko wächst, während die Inflation fällt.<sup>[9]</sup></li>\n      <li><span class=\"chip\">DXY</span> <strong>Dollar-Index 100,76</strong> (17.07.), praktisch unverändert (−0,01 %). Kein Dollar-Impuls in eine der beiden Richtungen.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Kalender</span> <strong>Do 23.07. EZB</strong> ist das einzige Ereignis der kommenden Woche mit echtem EUR/BRL-Hebel. Copom erst 04.–05.08.<sup>[7][10]</sup></li>\n      <li><span class=\"chip\">Lücke</span> <strong>Positionierungsdaten fehlen heute</strong>: BCB-Swap-Bestand, CFTC-COT, DI-Kurve und EWZ-Flows haben am Samstag keinen frischen Stand — nicht geschätzt, siehe Sektion unten.</li>\n    </ul></div>",

an class=\"chip good\">BR</span> <strong>IPCA Juni +0,16 % m/m</strong>, 12 Monate 4,64 % (von 4,72 %) — Inflation kühlt schneller ab, als das Copom selbst prognostiziert (5,2 % für 2026).<sup>[8]</sup></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Primärdefizit R$ 56,1 Mrd im Mai</strong> (Vorjahr: R$ 33,7 Mrd), 12-Monats-Defizit 1,14 % des BIP, Zinslast R$ 107,5 Mrd im Monat. Das Fiskal-Risiko wächst, während die Inflation fällt.<sup>[9]</sup></li>\n      <li><span class=\"chip\">DXY</span> <strong>Dollar-Index 100,76</strong> (17.07.), praktisch unverändert (−0,01 %). Kein Dollar-Impuls in eine der beiden Richtungen.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Kalender</span> <strong>Do 23.07. EZB</strong> ist das einzige Ereignis der kommenden Woche mit echtem EUR/BRL-Hebel. Copom erst 04.–05.08.<sup>[7][10]</sup></li>\n      <li><span class=\"chip\">Lücke</span> <strong>Positionierungsdaten fehlen heute</strong>: BCB-Swap-Bestand, CFTC-COT, DI-Kurve und EWZ-Flows haben am Samstag keinen frischen Stand — nicht geschätzt, siehe Sektion unten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The exchange rate that matters most to you has moved almost ten percent against you over twelve months: EUR/BRL stood at 6.4624 on 2025-07-17 and closed Friday at <strong>5.8499</strong> — <strong>−9.5%</strong>. The same euro amount buys about 613 fewer reais per €1,000 today than a year ago. The good news: the trend has eased off the gas. Over the past week the rate moved essentially nowhere (5.8505 → 5.8499). The reason isn't calm — it's a standoff: Brazil's central bank is cutting, the ECB is hiking — and an oil shock out of the Middle East is pushing both currencies up at the same time. Weekend, no fix, no trading: don't exchange today.</p>\n    <ul>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5.8499</strong> (ECB reference, Jul 17). Day +0.31%, week −0.01%, year −9.5%.<sup>[1]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: USD/BRL 5.1158 × EUR/USD 1.1435 = 5.8499 — <strong>0.0% deviation</strong> from the ECB fix. Both anchors agree.<sup>[1][2]</sup></li>\n      <li><span class=\"chip hot\">Oil</span> <strong>Brent +4.58% to $88.09</strong> (Jul 17) on escalating hostilities in the Middle East — the most important new driver in this brief.<sup>[4]</sup></li>\n      <li><span class=\"chip\">Rates</span> <strong>Selic 14.25%</strong> after the third straight cut (meeting Jun 16–17, statement Jun 17) — but Copom dropped its pledge to keep cutting from the statement.<sup>[7]</sup></li>\n      <li><span class=\"chip\">Rates</span> <strong>ECB deposit rate 2.25%</strong> after the June 11 hike. For Jul 23, ~93% \"no change\" is priced in, with another hike in September seen as the consensus.<sup>[5][10]</sup></li>\n      <li><span class=\"chip\">Rates</span> <strong>Fed holds at 3.50–3.75%</strong> (Jun 17), a split committee; next FOMC meeting Jul 28–29.<sup>[6][14]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>June IPCA +0.16% m/m</strong>, 12-month 4.64% (down from 4.72%) — inflation is cooling faster than Copom's own forecast (5.2% for 2026).<sup>[8]</sup></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Primary deficit of R$ 56.1 billion in May</strong> (prior year: R$ 33.7 billion), 12-month deficit at 1.14% of GDP, monthly interest burden R$ 107.5 billion. Fiscal risk is growing even as inflation falls.<sup>[9]</sup></li>\n      <li><span class=\"chip\">DXY</span> <strong>Dollar index 100.76</strong> (Jul 17), essentially unchanged (−0.01%). No dollar impulse in either direction.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Calendar</span> <strong>Thu Jul 23 ECB</strong> is the only event next week with real EUR/BRL leverage. Copom not until Aug 4–5.<sup>[7][10]</sup></li>\n      <li><span class=\"chip\">Gap</span> <strong>Positioning data is missing today</strong>: BCB swap book, CFTC COT, the DI curve, and EWZ flows have no fresh reading on a Saturday — not estimated, see section below.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A cotação mais importante para você se moveu quase dez por cento contra você em doze meses: o EUR/BRL estava em 6,4624 em 17/07/2025 e fechou na sexta-feira em <strong>5,8499</strong> — <strong>−9,5%</strong>. A mesma conta em euros rende hoje cerca de 613 reais a menos por 1.000 € do que há um ano. A boa notícia: a tendência tirou o pé do acelerador. Na última semana, a cotação praticamente não se moveu (5,8505 → 5,8499). O motivo não é calmaria, e sim um impasse: o Banco Central do Brasil corta juros, o BCE sobe — e um choque de petróleo no Oriente Médio puxa as duas moedas para cima ao mesmo tempo. Fim de semana, sem fixing, sem negociação: hoje não há câmbio.</p>\n    <ul>\n      <li><span class=\"chip\">Câmbio</span> <strong>EUR/BRL 5,8499</strong> (fixing do BCE, 17/07). Dia +0,31%, semana −0,01%, ano −9,5%.<sup>[1]</sup></li>\n      <li><span class=\"chip\">Câmbio</span> <strong>Checagem de taxa cruzada limpa</strong>: USD/BRL 5,1158 × EUR/USD 1,1435 = 5,8499 — <strong>0,0% de desvio</strong> em relação ao fixing do BCE. As duas âncoras coincidem.<sup>[1][2]</sup></li>\n      <li><span class=\"chip hot\">Petróleo</span> <strong>Brent +4,58%, para US$ 88,09</strong> (17/07) por causa da escalada de hostilidades no Oriente Médio — o principal motor novo deste boletim.<sup>[4]</sup></li>\n      <li><span class=\"chip\">Juros</span> <strong>Selic em 14,25%</strong> após o terceiro corte seguido (reunião de 16–17/06, comunicado de 17/06) — mas o Copom retirou do texto o compromisso de continuar cortando.<sup>[7]</sup></li>\n      <li><span class=\"chip\">Juros</span> <strong>Depósito do BCE em 2,25%</strong> após a alta de 11/06. Para 23/07, cerca de 93% de \"sem mudança\" está precificado, e uma nova alta em setembro é consenso.<sup>[5][10]</sup></li>\n      <li><span class=\"chip\">Juros</span> <strong>Fed mantém 3,50–3,75%</strong> (17/06), comitê dividido; próximo FOMC em 28–29/07.<sup>[6][14]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>IPCA de junho +0,16% m/m</strong>, 4,64% em 12 meses (ante 4,72%) — a inflação está esfriando mais rápido do que o próprio Copom projeta (5,2% para 2026).<sup>[8]</sup></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Déficit primário de R$ 56,1 bi em maio</strong> (ano anterior: R$ 33,7 bi), déficit de 12 meses em 1,14% do PIB, custo com juros de R$ 107,5 bi no mês. O risco fiscal cresce enquanto a inflação cai.<sup>[9]</sup></li>\n      <li><span class=\"chip\">DXY</span> <strong>Índice do dólar em 100,76</strong> (17/07), praticamente estável (−0,01%). Nenhum impulso do dólar em qualquer direção.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Calendário</span> <strong>Qui 23/07, BCE</strong> é o único evento da próxima semana com peso real sobre o EUR/BRL. Copom só em 04–05/08.<sup>[7][10]</sup></li>\n      <li><span class=\"chip\">Lacuna</span> <strong>Dados de posicionamento faltam hoje</strong>: estoque de swaps do BCB, COT da CFTC, curva DI e fluxos do EWZ não têm atualização de sábado — não foram estimados, veja a seção abaixo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El tipo de cambio más importante para ti se movió casi diez por ciento en tu contra en doce meses: el EUR/BRL estaba en 6,4624 el 17/07/2025 y cerró el viernes en <strong>5,8499</strong> — <strong>−9,5 %</strong>. El mismo monto en euros te da hoy unos 613 reales menos por cada 1.000 € que hace un año. La buena noticia: la tendencia soltó el acelerador. Durante la última semana el tipo de cambio prácticamente no se movió (5,8505 → 5,8499). El motivo no es calma, sino un empate técnico: el banco central de Brasil recorta, el BCE sube — y un shock petrolero en Medio Oriente empuja a ambas divisas hacia arriba al mismo tiempo. Fin de semana, sin fixing, sin operaciones: hoy no conviene cambiar dinero.</p>\n    <ul>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8499</strong> (referencia del BCE, 17/07). Día +0,31 %, semana −0,01 %, año −9,5 %.<sup>[1]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>Verificación de tipo cruzado limpia</strong>: USD/BRL 5,1158 × EUR/USD 1,1435 = 5,8499 — <strong>0,0 % de desviación</strong> respecto al fixing del BCE. Ambos anclajes coinciden.<sup>[1][2]</sup></li>\n      <li><span class=\"chip hot\">Petróleo</span> <strong>Brent +4,58 % a 88,09 $</strong> (17/07) por la escalada de hostilidades en Medio Oriente — el motor nuevo más importante de este boletín.<sup>[4]</sup></li>\n      <li><span class=\"chip\">Tasas</span> <strong>Selic en 14,25 %</strong> tras el tercer recorte consecutivo (reunión 16–17/06, comunicado 17/06) — pero el Copom eliminó de su comunicado la promesa de seguir bajando.<sup>[7]</sup></li>\n      <li><span class=\"chip\">Tasas</span> <strong>Tasa de depósito del BCE en 2,25 %</strong> tras el alza del 11/06. Para el 23/07 el mercado ya descuenta ~93 % de probabilidad de «sin cambios»; una nueva alza en septiembre es el consenso.<sup>[5][10]</sup></li>\n      <li><span class=\"chip\">Tasas</span> <strong>La Fed mantiene 3,50–3,75 %</strong> (17/06), comité dividido; próximo FOMC el 28–29/07.<sup>[6][14]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>IPCA de junio +0,16 % m/m</strong>, 4,64 % en 12 meses (desde 4,72 %) — la inflación se enfría más rápido de lo que el propio Copom pronostica (5,2 % para 2026).<sup>[8]</sup></li>\n      <li><span class=\"chip hot\">BR</span> <strong>Déficit primario de R$ 56,1 mil millones en mayo</strong> (año anterior: R$ 33,7 mil millones), déficit acumulado de 12 meses de 1,14 % del PIB, carga de intereses de R$ 107,5 mil millones al mes. El riesgo fiscal crece mientras la inflación cae.<sup>[9]</sup></li>\n      <li><span class=\"chip\">DXY</span> <strong>Índice del dólar en 100,76</strong> (17/07), prácticamente sin cambios (−0,01 %). Sin impulso del dólar en ninguna dirección.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Calendario</span> <strong>Jue 23/07, BCE</strong> es el único evento de la próxima semana con verdadero impacto sobre el EUR/BRL. El Copom recién el 04–05/08.<sup>[7][10]</sup></li>\n      <li><span class=\"chip\">Vacío</span> <strong>Hoy faltan datos de posicionamiento</strong>: el saldo de swaps del BCB, el COT de la CFTC, la curva DI y los flujos del EWZ no tienen datos frescos en sábado — no se estiman, ver sección abajo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Am Freitag ist der PHLX-Halbleiter-Index offiziell in den Bärenmarkt gerutscht — mehr als 20 % unter sein Rekordhoch vom 22.06. Der Auslöser ist bemerkenswert: kein Zinsentscheid, kein Auftragseinbruch, sondern ein <em>kostenloses</em> KI-Modell aus China. Wenn ein offenes Modell die teuersten Frontier-Systeme einholt, dann steht nicht die Nachfrage nach Rechenleistung infrage, sondern die <strong>Preismacht</strong> derer, die sie verkaufen. Genau so verhält sich der Markt auch: Nvidia hält sich, die zweite Reihe wird zerlegt. Parallel dazu kostet Öl wieder 88 $ — und die Hormuz-Geschichte ist deutlich komplizierter, als die Schlagzeile vermuten lässt.</p>\n    <ul>\n      <li><span class=\"chip hot\">BÄRENMARKT</span> <strong>PHLX-Halbleiter-Index (SOX)</strong>: Am Do 16.07. noch −19 % unter dem Rekordhoch vom 22.06., am Fr 17.07. unter die 20-%-Marke von 11.707,78 Punkten gefallen — Bärenmarkt bestätigt.</li>\n      <li><span class=\"chip hot\">AUSLÖSER</span> <strong>Kimi K3</strong>: Moonshot AI stellte ein offenes Modell vor, das laut Anbieter mit den westlichen Frontier-Modellen konkurriert. Der Markt liest das als Angriff auf die Rendite der KI-Investitionen. (Modell-Details: ai-dev-Brief.)</li>\n      <li><span class=\"chip\">DISPERSION</span> <strong>Nvidia hält, die zweite Reihe nicht</strong>: NVDA 202,81 $ / 203,31 $ (−2,0 bis −2,2 % am 17.07.). Marvell, ARM und Intel verloren über den Abschwung laut Bloomberg-Bericht über 30 % — von uns nicht unabhängig bestätigt.</li>\n      <li><span class=\"chip hot\">INDIZES</span> <strong>Breiter Abverkauf am 17.07.</strong>: S&amp;P 500 −1,01 % auf 7.457,69, Nasdaq Composite −1,40 % auf 25.520,24, Dow −0,77 % auf 52.146,42. Auf Wochensicht: S&amp;P über −1,5 %, Nasdaq −2,9 %.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 88,09 $ (+4,58 %), WTI 82,47 $ (+4,46 %)</strong> am 17.07. — Ein-Monats-Hoch. Treiber ist die eskalierte US-Iran-Konfrontation um die Straße von Hormuz.</li>\n      <li><span class=\"chip\">EINORDNUNG</span> <strong>Hormuz ist gedrosselt, nicht versiegelt</strong>: Iran erklärt die Meerenge seit dem 04.03.2026 für geschlossen, aktuell erneut „bis auf Weiteres\". Der Verkehr ist eingebrochen — aber unter US-Geleitschutz fließt Öl weiter. Das erklärt 88 $ statt 120 $.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>4.016,95 $/Unze (+1,03 %)</strong> am 17.07. — und trotzdem über 3 % Wochenverlust. Der Krieg treibt Öl, Öl treibt Inflationserwartungen, das kostet Gold die erhoffte Zinssenkung.</li>\n      <li><span class=\"chip\">KRYPTO</span> <strong>BTC ~63,9k $ (+0,8 bis +1,0 % 24h), ETH ~1.843 $ (+0,1 bis +0,3 %)</strong> per 18.07. 05:25 UTC. US-Spot-BTC-ETFs mit drei Zuflusstagen in Folge (~368 Mio. $, 14.–16.07.).</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>AI-Token halten, Memecoins bröckeln</strong>: TAO +0,93 %, FET +0,51 % — an genau dem Tag, an dem die KI-Aktien einbrachen. BONK −8,00 %, NEAR −3,00 %.</li>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>FOMC 28.–29.07.</strong> (Pressekonferenz 29.07., 20:30 MESZ / 15:30 BRT, ohne neue Projektionen). Alle sieben Urteile in diesem Brief hängen an diesem Datum.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">On Friday, the PHLX semiconductor index officially slid into a bear market — more than 20% below its all-time high from 06/22. The trigger is remarkable: not a rate decision, not a collapse in orders, but a <em>free</em> AI model out of China. When an open model catches up to the most expensive frontier systems, it's not demand for compute that's in question — it's the <strong>pricing power</strong> of the companies selling it. The market is behaving exactly that way: Nvidia is holding up, the second tier is getting taken apart. In parallel, oil is back at $88 — and the Hormuz story is considerably more complicated than the headline suggests.</p>\n    <ul>\n      <li><span class=\"chip hot\">BEAR MARKET</span> <strong>PHLX Semiconductor Index (SOX)</strong>: still −19% below its 06/22 record high on Thu 07/16, then broke below the 20% threshold of 11,707.78 points on Fri 07/17 — bear market confirmed.</li>\n      <li><span class=\"chip hot\">TRIGGER</span> <strong>Kimi K3</strong>: Moonshot AI unveiled an open model that, per the vendor, competes with Western frontier models. The market reads this as an attack on the return on AI investment. (Model details: ai-dev brief.)</li>\n      <li><span class=\"chip\">DISPERSION</span> <strong>Nvidia holds, the second tier doesn't</strong>: NVDA $202.81 / $203.31 (−2.0 to −2.2% on 07/17). Marvell, ARM, and Intel lost more than 30% over the downturn per a Bloomberg report — not independently confirmed by us.</li>\n      <li><span class=\"chip hot\">INDICES</span> <strong>Broad sell-off on 07/17</strong>: S&amp;P 500 −1.01% to 7,457.69, Nasdaq Composite −1.40% to 25,520.24, Dow −0.77% to 52,146.42. On the week: S&amp;P over −1.5%, Nasdaq −2.9%.</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $88.09 (+4.58%), WTI $82.47 (+4.46%)</strong> on 07/17 — one-month high. Driver is the escalated US-Iran confrontation over the Strait of Hormuz.</li>\n      <li><span class=\"chip\">CONTEXT</span> <strong>Hormuz is throttled, not sealed</strong>: Iran has declared the strait closed since 03/04/2026, currently reiterated \"until further notice.\" Traffic has collapsed — but under US escort, oil keeps flowing. That explains $88 instead of $120.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>$4,016.95/oz (+1.03%)</strong> on 07/17 — and still down over 3% on the week. War is pushing oil, oil is pushing inflation expectations, and that's costing gold its hoped-for rate cut.</li>\n      <li><span class=\"chip\">CRYPTO</span> <strong>BTC ~$63.9k (+0.8 to +1.0% 24h), ETH ~$1,843 (+0.1 to +0.3%)</strong> as of 07/18 05:25 UTC. US spot BTC ETFs with three straight inflow days (~$368M, 07/14–16).</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>AI tokens hold, memecoins crumble</strong>: TAO +0.93%, FET +0.51% — on the exact day AI stocks were sliding. BONK −8.00%, NEAR −3.00%.</li>\n      <li><span class=\"chip hot\">DATE</span> <strong>FOMC 07/28–29</strong> (press conference 07/29, 20:30 CEST / 15:30 BRT, no new projections). All seven calls in this brief hinge on this date.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Na sexta-feira, o índice de semicondutores PHLX entrou oficialmente em mercado de baixa — mais de 20 % abaixo de sua máxima histórica de 22/06. O gatilho é notável: nem uma decisão de juros, nem uma queda de pedidos, mas um modelo de IA <em>gratuito</em> vindo da China. Quando um modelo aberto alcança os sistemas de fronteira mais caros, não é a demanda por poder computacional que fica em xeque, mas o <strong>poder de precificação</strong> de quem o vende. É exatamente assim que o mercado está se comportando: a Nvidia se sustenta, a segunda linha é desmontada. Paralelamente, o petróleo volta a custar 88 $ — e a história do Estreito de Ormuz é bem mais complicada do que a manchete sugere.</p>\n    <ul>\n      <li><span class=\"chip hot\">MERCADO DE BAIXA</span> <strong>Índice de semicondutores PHLX (SOX)</strong>: na qui. 16/07 ainda −19 % abaixo da máxima histórica de 22/06, na sex. 17/07 caiu abaixo da marca de 20 % de 11.707,78 pontos — mercado de baixa confirmado.</li>\n      <li><span class=\"chip hot\">GATILHO</span> <strong>Kimi K3</strong>: a Moonshot AI apresentou um modelo aberto que, segundo a fornecedora, compete com os modelos ocidentais de fronteira. O mercado interpreta isso como um ataque ao retorno dos investimentos em IA. (Detalhes do modelo: brief de ai-dev.)</li>\n      <li><span class=\"chip\">DISPERSÃO</span> <strong>Nvidia se sustenta, a segunda linha não</strong>: NVDA 202,81 $ / 203,31 $ (−2,0 a −2,2 % em 17/07). Marvell, ARM e Intel perderam mais de 30 % durante a queda, segundo reportagem da Bloomberg — não confirmado de forma independente por nós.</li>\n      <li><span class=\"chip hot\">ÍNDICES</span> <strong>Venda generalizada em 17/07</strong>: S&amp;P 500 −1,01 % para 7.457,69, Nasdaq Composite −1,40 % para 25.520,24, Dow −0,77 % para 52.146,42. Na semana: S&amp;P acima de −1,5 %, Nasdaq −2,9 %.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 88,09 $ (+4,58 %), WTI 82,47 $ (+4,46 %)</strong> em 17/07 — máxima em um mês. O motor é o confronto EUA-Irã escalado em torno do Estreito de Ormuz.</li>\n      <li><span class=\"chip\">CONTEXTO</span> <strong>Ormuz está estrangulado, não vedado</strong>: o Irã declara o estreito fechado desde 04/03/2026, atualmente de novo \"até segunda ordem\". O tráfego despencou — mas sob escolta militar dos EUA o petróleo continua fluindo. Isso explica 88 $ em vez de 120 $.</li>\n      <li><span class=\"chip\">OURO</span> <strong>4.016,95 $/onça (+1,03 %)</strong> em 17/07 — e mesmo assim mais de 3 % de perda na semana. A guerra impulsiona o petróleo, o petróleo impulsiona as expectativas de inflação, isso custa ao ouro o corte de juros esperado.</li>\n      <li><span class=\"chip\">CRIPTO</span> <strong>BTC ~63,9k $ (+0,8 a +1,0 % em 24h), ETH ~1.843 $ (+0,1 a +0,3 %)</strong> em 18/07, 05h25 UTC. ETFs à vista de BTC dos EUA com três dias seguidos de entradas (~368 milhões $, 14–16/07).</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Tokens de IA se sustentam, memecoins desabam</strong>: TAO +0,93 %, FET +0,51 % — exatamente no dia em que as ações de IA despencaram. BONK −8,00 %, NEAR −3,00 %.</li>\n      <li><span class=\"chip hot\">DATA</span> <strong>FOMC 28–29/07</strong> (coletiva de imprensa 29/07, 20h30 CEST / 15h30 BRT, sem novas projeções). Todos os sete vereditos deste brief dependem dessa data.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El viernes, el índice de semiconductores PHLX cayó oficialmente en mercado bajista — más de 20 % por debajo de su máximo histórico del 22.06. El detonante es notable: ni una decisión de tasas ni un desplome de pedidos, sino un modelo de IA <em>gratuito</em> procedente de China. Cuando un modelo abierto alcanza a los sistemas frontier más caros, lo que se pone en duda no es la demanda de capacidad de cómputo, sino el <strong>poder de fijación de precios</strong> de quienes la venden. Y así se comporta exactamente el mercado: Nvidia se sostiene, la segunda fila se desmorona. En paralelo, el petróleo vuelve a costar 88 $ — y la historia de Ormuz es bastante más complicada de lo que sugiere el titular.</p>\n    <ul>\n      <li><span class=\"chip hot\">MERCADO BAJISTA</span> <strong>Índice de semiconductores PHLX (SOX)</strong>: el jue. 16.07. aún −19 % por debajo del máximo histórico del 22.06., el vie. 17.07. cayó por debajo del umbral del 20 % en 11.707,78 puntos — mercado bajista confirmado.</li>\n      <li><span class=\"chip hot\">DETONANTE</span> <strong>Kimi K3</strong>: Moonshot AI presentó un modelo abierto que, según el proveedor, compite con los modelos frontier occidentales. El mercado lo interpreta como un ataque al retorno de las inversiones en IA. (Detalles del modelo: brief de ai-dev.)</li>\n      <li><span class=\"chip\">DISPERSIÓN</span> <strong>Nvidia se sostiene, la segunda fila no</strong>: NVDA 202,81 $ / 203,31 $ (−2,0 a −2,2 % el 17.07.). Marvell, ARM e Intel perdieron más del 30 % a lo largo de la caída, según un reporte de Bloomberg — no confirmado de forma independiente por nosotros.</li>\n      <li><span class=\"chip hot\">ÍNDICES</span> <strong>Venta generalizada el 17.07.</strong>: S&amp;P 500 −1,01 % a 7.457,69, Nasdaq Composite −1,40 % a 25.520,24, Dow −0,77 % a 52.146,42. En la semana: S&amp;P por encima de −1,5 %, Nasdaq −2,9 %.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 88,09 $ (+4,58 %), WTI 82,47 $ (+4,46 %)</strong> el 17.07. — máximo de un mes. El motor es la confrontación escalada entre EE. UU. e Irán en torno al estrecho de Ormuz.</li>\n      <li><span class=\"chip\">CONTEXTO</span> <strong>Ormuz está reducido, no sellado</strong>: Irán declara el estrecho cerrado desde el 04.03.2026, y ahora de nuevo \"hasta nuevo aviso\". El tráfico se desplomó — pero bajo escolta de EE. UU. el petróleo sigue fluyendo. Eso explica 88 $ en vez de 120 $.</li>\n      <li><span class=\"chip\">ORO</span> <strong>4.016,95 $/onza (+1,03 %)</strong> el 17.07. — y aun así más de 3 % de pérdida semanal. La guerra impulsa el petróleo, el petróleo impulsa las expectativas de inflación, y eso le cuesta al oro el recorte de tasas esperado.</li>\n      <li><span class=\"chip\">CRIPTO</span> <strong>BTC ~63,9k $ (+0,8 a +1,0 % en 24h), ETH ~1.843 $ (+0,1 a +0,3 %)</strong> al 18.07. 05:25 UTC. Los ETF spot de BTC en EE. UU. suman tres días de entradas consecutivos (~368 millones de $, 14.–16.07.).</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Los tokens de IA resisten, los memecoins se derrumban</strong>: TAO +0,93 %, FET +0,51 % — justo el día en que las acciones de IA se desplomaron. BONK −8,00 %, NEAR −3,00 %.</li>\n      <li><span class=\"chip hot\">FECHA CLAVE</span> <strong>FOMC 28.–29.07.</strong> (rueda de prensa 29.07., 20:30 CEST / 15:30 BRT, sin nuevas proyecciones). Los siete veredictos de este brief dependen de esta fecha.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">WordPress hat am Freitag <strong>6.9.5 und 7.0.2</strong> ausgeliefert, gegen eine Pre-Auth-RCE im Core, die auf einer Standard-Installation ohne Plugin und ohne Login funktioniert. Rapid7 schrieb am selben Tag, ein öffentlicher Exploit sei „höchstwahrscheinlich in kurzer Zeit\" zu erwarten. Diese Vorhersage hielt genau <strong>sieben Stunden und einundvierzig Minuten</strong> — gemessen von Cloudflares WAF-Regeln um 17:03 UTC bis zum ersten öffentlichen PoC-Repository um 00:44 UTC heute Nacht. Der Patch selbst lag schon Stunden vorher vor; die eigentliche Nachricht ist also nicht die Lücke, sondern wie kurz das Fenster inzwischen ist, in dem „gepatcht, aber noch nicht ausgerollt\" ein akzeptabler Zustand war. Dazu: eine SharePoint-KEV-Frist, die morgen abläuft, ein 7-Zip-Advisory, das einen Patch von Ende Juni nachträglich wichtig macht, und die Nachlese zu zwei npm-Einbrüchen in einer Woche.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>wp2shell (CVE-2026-63030)</strong>: Pre-Auth-RCE im WordPress-Core über REST-API-Batch-Routen plus SQLi. Betroffen 6.9.0–6.9.4 und 7.0.0–7.0.1, gefixt in <strong>6.9.5 / 7.0.2</strong>. NVD führt zwei Scores nebeneinander: <strong>9,8 CRITICAL</strong> vom CNA (WPScan) und <strong>7,5 HIGH</strong> vom CISA-ADP — die Uneinigkeit ist genau der Punkt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>PoC ist öffentlich</strong>: Ein Detection-PoC für die Kette (63030 + 60137) liegt seit heute <strong>00:44 UTC</strong> auf GitHub. Ausnutzung in freier Wildbahn ist bislang <em>nicht</em> bestätigt — von Rapid7 nicht und von securityonline nicht.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>Cloudflare hat vorgelegt</strong>: zwei Managed-WAF-Regeln seit <strong>17:03 UTC am 17.07</strong>, Standard-Aktion <em>Block</em>, ausdrücklich auch für Free-Pläne. Nützlich als Puffer — kein Ersatz fürs Update.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Der zweite CVE trifft mehr Leute</strong>: <strong>CVE-2026-60137</strong> (SQL-Injection) reicht bis in die <strong>6.8er</strong>-Reihe zurück — gefixt in <strong>6.8.6</strong>. Wer auf 6.8 „stabil stehen geblieben\" ist, ist nicht raus.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>KEV-Frist morgen</strong>: <strong>CVE-2026-58644</strong> (SharePoint, Deserialisierungs-RCE, CVSS <strong>9,8</strong>) steht seit dem 16.07 im CISA-Katalog, US-Behörden müssen bis <strong>19.07</strong> gepatcht haben. Aktive Ausnutzung bestätigt.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>7-Zip nachreichen</strong>: <strong>CVE-2026-14266</strong>, Heap-Overflow beim Parsen von <code>xz</code>-Daten, CVSS <strong>7,0</strong> (ZDI-26-444). Gefixt schon in <strong>26.02</strong> vom 25.06 — das Advisory kam erst diese Woche hinterher.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>npm, Runde zwei</strong>: Nach AsyncAPI (14.07) jetzt die Nachlese zum <strong>jscrambler</strong>-Einbruch vom 11.07 — fünf vergiftete Versionen plus vier Plugin-Pakete. Die frühen (8.14.0/8.16.0/8.17.0) liefen über einen <code>preinstall</code>-Hook, die späten (8.18.0/8.20.0) hatten den Dropper im Paket-Hauptcode — <code>--ignore-scripts</code> half nur bei den frühen.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Docker Desktop 4.82.0</strong> (13.07) — Compose <strong>v5.3.0</strong>, Scout CLI 1.23.1, in den Release-Notes keine CVEs. Ruhige Runde.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Oracle-Quartals-CPU am Dienstag</strong> (21.07). Was drin ist, steht erst am Dienstag fest — heute kursierende „Java-Versionen für Juli\" sind Spekulation.</li>\n    </ul></div>",

ich auch für Free-Pläne. Nützlich als Puffer — kein Ersatz fürs Update.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Der zweite CVE trifft mehr Leute</strong>: <strong>CVE-2026-60137</strong> (SQL-Injection) reicht bis in die <strong>6.8er</strong>-Reihe zurück — gefixt in <strong>6.8.6</strong>. Wer auf 6.8 „stabil stehen geblieben\" ist, ist nicht raus.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>KEV-Frist morgen</strong>: <strong>CVE-2026-58644</strong> (SharePoint, Deserialisierungs-RCE, CVSS <strong>9,8</strong>) steht seit dem 16.07 im CISA-Katalog, US-Behörden müssen bis <strong>19.07</strong> gepatcht haben. Aktive Ausnutzung bestätigt.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>7-Zip nachreichen</strong>: <strong>CVE-2026-14266</strong>, Heap-Overflow beim Parsen von <code>xz</code>-Daten, CVSS <strong>7,0</strong> (ZDI-26-444). Gefixt schon in <strong>26.02</strong> vom 25.06 — das Advisory kam erst diese Woche hinterher.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>npm, Runde zwei</strong>: Nach AsyncAPI (14.07) jetzt die Nachlese zum <strong>jscrambler</strong>-Einbruch vom 11.07 — fünf vergiftete Versionen plus vier Plugin-Pakete. Die frühen (8.14.0/8.16.0/8.17.0) liefen über einen <code>preinstall</code>-Hook, die späten (8.18.0/8.20.0) hatten den Dropper im Paket-Hauptcode — <code>--ignore-scripts</code> half nur bei den frühen.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Docker Desktop 4.82.0</strong> (13.07) — Compose <strong>v5.3.0</strong>, Scout CLI 1.23.1, in den Release-Notes keine CVEs. Ruhige Runde.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Oracle-Quartals-CPU am Dienstag</strong> (21.07). Was drin ist, steht erst am Dienstag fest — heute kursierende „Java-Versionen für Juli\" sind Spekulation.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">WordPress shipped <strong>6.9.5 and 7.0.2</strong> on Friday, against a pre-auth RCE in core that works on a default installation with no plugin and no login. Rapid7 wrote the same day that a public exploit was \"highly likely […] in a short period of time.\" That prediction held for exactly <strong>seven hours and forty-one minutes</strong> — measured from Cloudflare's WAF rules at 17:03 UTC to the first public PoC repository at 00:44 UTC overnight. The patch itself had already been out for hours before that; so the real story here isn't the flaw, but how short the window has become in which \"patched, but not yet rolled out\" used to be an acceptable state. On top of that: a SharePoint KEV deadline expiring tomorrow, a 7-Zip advisory that retroactively makes a late-June patch urgent, and the follow-up on two npm breaches in one week.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>wp2shell (CVE-2026-63030)</strong>: pre-auth RCE in WordPress core via REST API batch routes plus SQLi. Affected 6.9.0–6.9.4 and 7.0.0–7.0.1, fixed in <strong>6.9.5 / 7.0.2</strong>. NVD lists two scores side by side: <strong>9.8 CRITICAL</strong> from the CNA (WPScan) and <strong>7.5 HIGH</strong> from the CISA ADP — the disagreement is exactly the point.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>PoC is public</strong>: a detection PoC for the chain (63030 + 60137) has been on GitHub since <strong>00:44 UTC</strong> today. In-the-wild exploitation is so far <em>not</em> confirmed — not by Rapid7, not by securityonline.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>Cloudflare got there first</strong>: two managed WAF rules since <strong>17:03 UTC on 17.07</strong>, default action <em>Block</em>, explicitly including free plans too. Useful as a buffer — not a substitute for the update.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>The second CVE hits more people</strong>: <strong>CVE-2026-60137</strong> (SQL injection) reaches back into the <strong>6.8.x</strong> line — fixed in <strong>6.8.6</strong>. Anyone who \"stayed put on 6.8 for stability\" isn't off the hook.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>KEV deadline tomorrow</strong>: <strong>CVE-2026-58644</strong> (SharePoint, deserialization RCE, CVSS <strong>9.8</strong>) has been in the CISA catalog since 16.07, US agencies must have it patched by <strong>19.07</strong>. Active exploitation confirmed.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>7-Zip catches up</strong>: <strong>CVE-2026-14266</strong>, heap overflow parsing <code>xz</code> data, CVSS <strong>7.0</strong> (ZDI-26-444). Already fixed in <strong>26.02</strong> back on 25.06 — the advisory only caught up this week.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>npm, round two</strong>: after AsyncAPI (14.07), now the follow-up on the <strong>jscrambler</strong> breach from 11.07 — five poisoned versions plus four plugin packages. The early ones (8.14.0/8.16.0/8.17.0) ran via a <code>preinstall</code> hook, the later ones (8.18.0/8.20.0) had the dropper in the package's main code — <code>--ignore-scripts</code> only helped with the early ones.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Docker Desktop 4.82.0</strong> (13.07) — Compose <strong>v5.3.0</strong>, Scout CLI 1.23.1, no CVEs in the release notes. A quiet round.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Oracle quarterly CPU on Tuesday</strong> (21.07). What's in it won't be known until Tuesday — today's circulating \"July Java versions\" are speculation.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O WordPress lançou na sexta-feira as versões <strong>6.9.5 e 7.0.2</strong>, corrigindo uma RCE pré-autenticação no core que funciona em uma instalação padrão, sem plugin e sem login. A Rapid7 escreveu no mesmo dia que um exploit público era \"altamente provável em pouco tempo\". Essa previsão durou exatamente <strong>sete horas e quarenta e um minutos</strong> — contados desde as regras de WAF da Cloudflare, às 17h03 UTC, até o primeiro repositório PoC público, às 00h44 UTC desta madrugada. O patch em si já estava disponível havia horas; a verdadeira notícia não é a falha, portanto, mas o quão curta ficou a janela em que \"corrigido, mas ainda não implantado\" era um estado aceitável. Além disso: um prazo KEV do SharePoint que vence amanhã, um aviso do 7-Zip que torna relevante, com atraso, um patch de fim de junho, e a retrospectiva de duas invasões ao npm em uma semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>wp2shell (CVE-2026-63030)</strong>: RCE pré-autenticação no core do WordPress via rotas em lote da REST API mais SQLi. Afeta 6.9.0–6.9.4 e 7.0.0–7.0.1, corrigido em <strong>6.9.5 / 7.0.2</strong>. A NVD lista dois scores lado a lado: <strong>9,8 CRÍTICO</strong> do CNA (WPScan) e <strong>7,5 ALTO</strong> do CISA-ADP — a discordância é justamente o ponto.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>PoC já é público</strong>: um PoC de detecção para a cadeia (63030 + 60137) está no GitHub desde hoje, <strong>00h44 UTC</strong>. Exploração em ambiente real ainda <em>não</em> foi confirmada — nem pela Rapid7, nem pela securityonline.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>A Cloudflare saiu na frente</strong>: duas regras de WAF gerenciadas desde as <strong>17h03 UTC do dia 17/07</strong>, ação padrão <em>Bloquear</em>, aplicada expressamente também aos planos gratuitos. Útil como amortecedor — não substitui a atualização.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>O segundo CVE atinge mais gente</strong>: <strong>CVE-2026-60137</strong> (injeção de SQL) remonta até a série <strong>6.8</strong> — corrigido em <strong>6.8.6</strong>. Quem \"ficou parado\" na 6.8 achando-se estável não está fora de risco.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>Prazo KEV vence amanhã</strong>: <strong>CVE-2026-58644</strong> (SharePoint, RCE por desserialização, CVSS <strong>9,8</strong>) está no catálogo da CISA desde 16/07, e órgãos federais dos EUA precisam ter corrigido até <strong>19/07</strong>. Exploração ativa confirmada.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>7-Zip, o aviso atrasado</strong>: <strong>CVE-2026-14266</strong>, estouro de buffer em heap ao processar dados <code>xz</code>, CVSS <strong>7,0</strong> (ZDI-26-444). Corrigido já na <strong>26.02</strong>, de 25/06 — o aviso só saiu esta semana.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>npm, segunda rodada</strong>: depois do AsyncAPI (14/07), agora o retrospecto da invasão ao <strong>jscrambler</strong> de 11/07 — cinco versões envenenadas mais quatro pacotes de plugins. As versões antigas (8.14.0/8.16.0/8.17.0) disparavam via hook <code>preinstall</code>, as mais novas (8.18.0/8.20.0) tinham o dropper no código principal do pacote — <code>--ignore-scripts</code> só ajudou nas antigas.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Docker Desktop 4.82.0</strong> (13/07) — Compose <strong>v5.3.0</strong>, Scout CLI 1.23.1, sem CVEs nas notas de versão. Rodada tranquila.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>CPU trimestral da Oracle na terça-feira</strong> (21/07). O que vem nela só se sabe na terça — as \"versões de Java para julho\" que circulam hoje são especulação.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El viernes, WordPress lanzó <strong>6.9.5 y 7.0.2</strong> contra una RCE pre-autenticación en el núcleo que funciona en una instalación estándar, sin plugins y sin inicio de sesión. Ese mismo día, Rapid7 escribió que era «muy probable que apareciera un exploit público en poco tiempo». Esa predicción se cumplió exactamente <strong>siete horas y cuarenta y un minutos</strong> después: contando desde las reglas de WAF de Cloudflare a las 17:03 UTC hasta el primer repositorio público de PoC a las 00:44 UTC de esta madrugada. El parche en sí ya estaba disponible horas antes; la verdadera noticia, entonces, no es la falla, sino lo corta que se ha vuelto la ventana en la que «ya está parcheado, pero aún no desplegado» era un estado aceptable. Además: un plazo KEV de SharePoint que vence mañana, un aviso de 7-Zip que hace relevante, a posteriori, un parche de finales de junio, y el resumen de dos intrusiones de npm en una semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>wp2shell (CVE-2026-63030)</strong>: RCE pre-autenticación en el núcleo de WordPress a través de rutas por lotes de la API REST más una SQLi. Afecta a 6.9.0–6.9.4 y 7.0.0–7.0.1, corregido en <strong>6.9.5 / 7.0.2</strong>. NVD presenta dos puntajes en paralelo: <strong>9,8 CRITICAL</strong> del CNA (WPScan) y <strong>7,5 HIGH</strong> del CISA-ADP — el desacuerdo es precisamente el punto.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>El PoC ya es público</strong>: un PoC de detección para la cadena (63030 + 60137) está en GitHub desde hoy a las <strong>00:44 UTC</strong>. La explotación activa <em>no</em> está confirmada hasta ahora — ni por Rapid7 ni por securityonline.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>Cloudflare se adelantó</strong>: dos reglas de WAF administradas desde las <strong>17:03 UTC del 17/07</strong>, acción predeterminada <em>Block</em>, explícitamente también para planes gratuitos. Útil como colchón — no sustituye la actualización.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>El segundo CVE afecta a más gente</strong>: <strong>CVE-2026-60137</strong> (inyección SQL) se remonta hasta la serie <strong>6.8</strong> — corregido en <strong>6.8.6</strong>. Quien se quedó «estable» en la 6.8 no está a salvo.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EE. UU.</span> <strong>Plazo del KEV mañana</strong>: <strong>CVE-2026-58644</strong> (SharePoint, RCE por deserialización, CVSS <strong>9,8</strong>) está en el catálogo de CISA desde el 16/07; las agencias de EE. UU. deben tenerlo corregido antes del <strong>19/07</strong>. Explotación activa confirmada.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>7-Zip, aviso tardío</strong>: <strong>CVE-2026-14266</strong>, desbordamiento de heap al analizar datos <code>xz</code>, CVSS <strong>7,0</strong> (ZDI-26-444). Ya corregido en la <strong>26.02</strong> del 25/06 — el aviso llegó recién esta semana.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>npm, segunda ronda</strong>: tras AsyncAPI (14/07), ahora el balance del incidente de <strong>jscrambler</strong> del 11/07 — cinco versiones envenenadas más cuatro paquetes de plugins. Las tempranas (8.14.0/8.16.0/8.17.0) se distribuyeron mediante un hook <code>preinstall</code>, las tardías (8.18.0/8.20.0) llevaban el dropper en el código principal del paquete — <code>--ignore-scripts</code> solo ayudó con las tempranas.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Docker Desktop 4.82.0</strong> (13/07) — Compose <strong>v5.3.0</strong>, Scout CLI 1.23.1, sin CVEs en las notas de la versión. Una ronda tranquila.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>CPU trimestral de Oracle el martes</strong> (21/07). Qué incluye se sabrá recién el martes — las «versiones de Java para julio» que circulan hoy son especulación.</li>\n    </ul></div>"
