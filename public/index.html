<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Markt-Montag, und das Bild dreht sich leicht: Der wackelige Hormus-Frieden drückt den Ölpreis nach unten — ein disinflationärer Rückenwind, der den Real eher stützt. Dagegen steht Brasiliens Fiskal-Problem, das im Wahljahr explodiert: über 700 Mrd. R$ Stimulus, Netto-Schulden auf dem höchsten Stand seit 25 Jahren. Für deinen EUR/BRL ziehen heute zwei Kräfte gegeneinander — und der Kurs hält sich erstaunlich stabil knapp unter 5,91.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5,907</strong> (XE-Spot, Mo 22.06. 06:08 BRT) gegen EZB-Fix 5,9173 (Fr 19.06.). Cross-Check sauber: USD/BRL × EUR/USD = 5,9173, 0,0 % Abweichung.</li>\n      <li><span class=\"chip good\">Öl</span> <strong>Brent ~79,2 $</strong> (22.06., −1,7 % von ~80,6 $ am Freitag) — der erwartete Hormus-Teil-Reopening nach dem 27.06. dämpft die Energie-Inflation. Disinflationär = real-stützend.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiskal-Blowout im Wahljahr</strong>: über 700 Mrd. R$ Stimulus 2026, ~96 % davon außerhalb der Schuldenbremse. Netto-Staatsschuld bei 67 % des BIP (April) — Höchststand seit Reihen-Beginn 2001.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic bei 14,25 %</strong> (Copom −25 Bp, 17.06.), aber die BCB hob ihre eigene 2026-Inflations­prognose auf 5,2 % (von 4,6 %) — sie senkt, obwohl ihr eigenes Modell mehr Inflation sieht.</li>\n      <li><span class=\"chip\">EZB</span> <strong>+25 Bp auf 2,25 %</strong> (11.06., erste Erhöhung seit drei Jahren) — Iran-Krieg treibt Energiepreise und Euro-Inflation. EUR fester ↗ EUR/BRL-Aufwärtsdruck.</li>\n      <li><span class=\"chip\">USA</span> <strong>DXY 100,94</strong> (22.06., +0,18 %), Fed hält 3,50–3,75 %. Falkenhafte Fed + starker Dollar = Gegenwind für den Real.</li>\n      <li><span class=\"chip\">Termin</span> <strong>US-PCE Mai am Do 25.06.</strong> — Fed-Lieblings-Inflationsmaß, der nächste echte Dollar-Date         "de": "<div class=\"tldr\"><p class=\"lead\">Markt-Montag, und das Bild dreht sich leicht: Der wackelige Hormus-Frieden drückt den Ölpreis nach unten — ein disinflationärer Rückenwind, der den Real eher stützt. Dagegen steht Brasiliens Fiskal-Problem, das im Wahljahr explodiert: über 700 Mrd. R$ Stimulus, Netto-Schulden auf dem höchsten Stand seit 25 Jahren. Für deinen EUR/BRL ziehen heute zwei Kräfte gegeneinander — und der Kurs hält sich erstaunlich stabil knapp unter 5,91.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5,907</strong> (XE-Spot, Mo 22.06. 06:08 BRT) gegen EZB-Fix 5,9173 (Fr 19.06.). Cross-Check sauber: USD/BRL × EUR/USD = 5,9173, 0,0 % Abweichung.</li>\n      <li><span class=\"chip good\">Öl</span> <strong>Brent ~79,2 $</strong> (22.06., −1,7 % von ~80,6 $ am Freitag) — der erwartete Hormus-Teil-Reopening nach dem 27.06. dämpft die Energie-Inflation. Disinflationär = real-stützend.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiskal-Blowout im Wahljahr</strong>: über 700 Mrd. R$ Stimulus 2026, ~96 % davon außerhalb der Schuldenbremse. Netto-Staatsschuld bei 67 % des BIP (April) — Höchststand seit Reihen-Beginn 2001.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic bei 14,25 %</strong> (Copom −25 Bp, 17.06.), aber die BCB hob ihre eigene 2026-Inflations­prognose auf 5,2 % (von 4,6 %) — sie senkt, obwohl ihr eigenes Modell mehr Inflation sieht.</li>\n      <li><span class=\"chip\">EZB</span> <strong>+25 Bp auf 2,25 %</strong> (11.06., erste Erhöhung seit drei Jahren) — Iran-Krieg treibt Energiepreise und Euro-Inflation. EUR fester ↗ EUR/BRL-Aufwärtsdruck.</li>\n      <li><span class=\"chip\">USA</span> <strong>DXY 100,94</strong> (22.06., +0,18 %), Fed hält 3,50–3,75 %. Falkenhafte Fed + starker Dollar = Gegenwind für den Real.</li>\n      <li><span class=\"chip\">Termin</span> <strong>US-PCE Mai am Do 25.06.</strong> — Fed-Lieblings-Inflationsmaß, der nächste echte Dollar-Datenpunkt. Hormus-Teilöffnung ab ~27.06. im Blick.</li>\n      <li><span class=\"chip\">BR</span> <strong>5J-CDS ~123–129 Bp</strong> (KW 23), Ibovespa 168.334 (Fr 19.06.) — Renten-Risiko erhöht, aber nicht panisch. Wochen-Range EUR/BRL (ECB): 5,8613–5,9173.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Market Monday, and the picture tilts slightly: the shaky Hormuz peace pushes oil lower — a disinflationary tailwind that props up the real. Against it stands Brazil's fiscal problem, exploding in election year: over 700 billion R$ stimulus, net debt at its highest in 25 years. Two forces pull at your EUR/BRL today — and the rate stays remarkably stable just under 5.91.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5.907</strong> (XE Spot, Mon 22.06. 06:08 BRT) vs. ECB fix 5.9173 (Fri 19.06.). Cross-check clean: USD/BRL × EUR/USD = 5.9173, 0.0% deviation.</li>\n      <li><span class=\"chip good\">Oil</span> <strong>Brent ~79.2 $</strong> (22.06., −1.7% from ~80.6 $ Friday) — the expected Hormuz partial reopening after 27.06. dampens energy inflation. Disinflationary = real-supporting.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal blowout in election year</strong>: over 700 billion R$ stimulus 2026, ~96% outside the debt ceiling. Net public debt at 67% of GDP (April) — highest level since records began in 2001.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic at 14.25%</strong> (Copom −25 bp, 17.06.), but the BCB raised its own 2026 inflation forecast to 5.2% (from 4.6%) — it cuts even as its own model sees more inflation.</li>\n      <li><span class=\"chip\">ECB</span> <strong>+25 bp to 2.25%</strong> (11.06., first hike in three years) — Iran war drives energy prices and euro inflation. EUR stronger ↗ EUR/BRL upward pressure.</li>\n      <li><span class=\"chip\">USA</span> <strong>DXY 100.94</strong> (22.06., +0.18%), Fed holds 3.50–3.75%. Hawkish Fed + strong dollar = headwind for the real.</li>\n      <li><span class=\"chip\">Term</span> <strong>US PCE May on Thu 25.06.</strong> — Fed's favorite inflation gauge, the next real dollar data point. Hormuz partial opening around ~27.06. in focus.</li>\n      <li><span class=\"chip\">BR</span> <strong>5Y CDS ~123–129 bp</strong> (KW 23), Ibovespa 168,334 (Fri 19.06.) — bond risk elevated, but not panic-mode. Week range EUR/BRL: 5.8613 (06/15) to 5.9173 (06/19).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Segunda-feira de mercado, e o quadro vira um pouco a seu favor: a paz vacilante no Hormuz empurra o petróleo para baixo — um vento de cauda desinflacionário que sustenta o real. Contra isso está o problema fiscal do Brasil, explodindo em ano eleitoral: mais de 700 bilhões de R$ em estímulos, dívida líquida no patamar mais alto em 25 anos. Duas forças puxam seu EUR/BRL hoje — e a taxa fica notavelmente estável logo abaixo de 5,91.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5,907</strong> (XE Spot, seg 22.06. 06:08 BRT) versus fixo ECB 5,9173 (sex 19.06.). Cross-check limpo: USD/BRL × EUR/USD = 5,9173, 0,0% de desvio.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent ~79,2 $</strong> (22.06., queda de −1,7% de ~80,6 $ na sexta) — a reabertura parcial esperada do Hormuz após 27.06. amortece a inflação de energia. Desinflacionário = sustentador do real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Débâcle fiscal em ano eleitoral</strong>: mais de 700 bilhões de R$ em estímulos 2026, ~96% fora do teto de dívida. Dívida pública líquida em 67% do PIB (abril) — nível mais alto desde o início da série em 2001.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic em 14,25%</strong> (Copom −25 bp, 17.06.), mas o BCB elevou sua própria projeção de inflação 2026 para 5,2% (de 4,6%) — reduz mesmo com seu próprio modelo vendo mais inflação.</li>\n      <li><span class=\"chip\">ECB</span> <strong>+25 bp para 2,25%</strong> (11.06., primeira alta em três anos) — guerra no Irã impulsiona preços de energia e inflação do euro. EUR mais forte ↗ pressão ascendente EUR/BRL.</li>\n      <li><span class=\"chip\">USA</span> <strong>DXY 100,94</strong> (22.06., +0,18%), Fed mantém 3,50–3,75%. Fed falcão + dólar forte = contravento para o real.</li>\n      <li><span class=\"chip\">Termo</span> <strong>PCE EUA maio na qui 25.06.</strong> — medida de inflação favorita do Fed, próximo ponto de dados real do dólar. Reabertura parcial do Hormuz por volta de 27.06. sob vigilância.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS 5 anos ~123–129 bp</strong> (KW 23), Ibovespa 168.334 (sex 19.06.) — risco em títulos elevado, mas não em pânico. Faixa semanal EUR/BRL: 5,8613 (15.06.) a 5,9173 (19.06.).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Lunes de mercado, y la imagen se inclina un poco a tu favor: la paz inestable en Hormuz empuja el petróleo hacia abajo — un viento en popa desinflacionario que sostiene el real. Contra eso está el problema fiscal de Brasil, explotando en año electoral: más de 700 mil millones de R$ en estímulos, deuda neta en el nivel más alto en 25 años. Dos fuerzas tiran de tu EUR/BRL hoy — y la tasa se mantiene notablemente estable justo por debajo de 5,91.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL ~5,907</strong> (XE Spot, lun 22.06. 06:08 BRT) vs. tipo fijo ECB 5,9173 (vie 19.06.). Verificación cruzada limpia: USD/BRL × EUR/USD = 5,9173, desviación 0,0%.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent ~79,2 $</strong> (22.06., caído de −1,7% de ~80,6 $ el viernes) — la reapertura parcial esperada del Hormuz después del 27.06. amortigua la inflación energética. Desinflacionario = que sostiene el real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Debacle fiscal en año electoral</strong>: más de 700 mil millones de R$ de estímulos 2026, ~96% fuera del techo de deuda. Deuda pública neta en 67% del PIB (abril) — nivel más alto desde el inicio de la serie en 2001.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic en 14,25%</strong> (Copom −25 pb, 17.06.), pero el BCB elevó su propia proyección de inflación 2026 a 5,2% (de 4,6%) — baja incluso cuando su propio modelo ve más inflación.</li>\n      <li><span class=\"chip\">ECB</span> <strong>+25 pb a 2,25%</strong> (11.06., primer alza en tres años) — la guerra en Irán impulsa los precios de la energía e inflación del euro. EUR más fuerte ↗ presión alcista EUR/BRL.</li>\n      <li><span class=\"chip\">USA</span> <strong>DXY 100,94</strong> (22.06., +0,18%), Fed mantiene 3,50–3,75%. Fed halcón + dólar fuerte = contraviento para el real.</li>\n      <li><span class=\"chip\">Plazo</span> <strong>PCE EUA mayo el jue 25.06.</strong> — medida de inflación favorita de la Fed, próximo punto de datos real del dólar. Reapertura parcial del Hormuz alrededor del 27.06. en vigilancia.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS 5 años ~123–129 pb</strong> (KW 23), Ibovespa 168.334 (vie 19.06.) — riesgo en bonos elevado, pero no pánico. Rango semanal EUR/BRL: 5,8613 (15.06.) a 5,9173 (19.06.).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Montag, der 22. Juni — der erste Handelstag nach dem hawkischen Fed-Schock vom 17.06. und der Juneteenth-Pause am Freitag. Die US-Märkte sind wieder offen, alle Zahlen hier sind der Donnerstag-Schluss (18.06.) plus Live-Pre-Market vom 22.06. Der Tag hat zwei Pole: Nvidias riesige, dreifach überzeichnete Anleihe als lautes Signal, dass der KI-Capex-Zyklus läuft — und darüber der Fed-Hawk plus ein Dollar über 100, der auf alles drückt. Donnerstag-Daten (PCE 25.06.) und die BTC-Optionsverfälle (26.06.) sind die nächsten harten Punkte.</p>\n    <ul>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>NVDA platziert 25 Mrd. $ Anleihe — 3-fach überzeichnet</strong>: Zeichnungen über 85 Mrd. $, erste Anleihe seit 2021. Pre-Market ~207,33 $ (Schluss 18.06. 210,69 $, +2,95 %), Markt-Kap 5,10 Bio. $. Lauter Beleg für den KI-Capex-Supercycle (Industrie-Capex 2026 &gt; 700 Mrd. $).</li>\n      <li><span class=\"chip hot\">FED</span> <strong>Hawkischer Hold am 17.06.</strong>: Leitzins bleibt 3,50–3,75 %, aber 9 von 18 Projektionen sehen ≥1 Zinserhöhung 2026, 6 sehen ≥2; PCE-Prognose hoch auf 3,6 %. Markt preist einen September-Hike. DXY über 100 (100,909, +0,15 %) — stärkster Dollar seit Mai 2025.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent 79,15 $ (−1,78 %), WTI 75,24 $ (−2,70 %)</strong> (22.06.): Eine US-Iran-60-Tage-Friedens-Roadmap öffnet die Straße von Hormus konditional und drückt den Preis — WTI −19,9 % im Monat, aber noch +9,8 % YoY.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>XAU/USD 4.196,73 $</strong> (22.06., Range 4.136,74–4.220,34 $): erholt sich Richtung 4.200 $, weil die Iran-Entspannung Risiko nimmt und Öl fällt — trotz des starken Dollars als Gegenwind.</li>\n      <li><span class=\"chip\">KRYPTO</span> <strong>BTC ~64.114 $</strong> (+0,05 % 24h, CoinDesk; Cross-Check CoinGecko 64.162 $). Markt-Kap 1,285 Bio. $. ETH 1.748 $ (+1,3 % 24h). Der ETF-Abflussstreak (~4,33 Mrd. $) brach am 12.06.; am 26.06. läuft ein &gt; 10-Mrd.-$-Optionsverfall (~80 % OTM).</li>\n      <li><span class=\"chip hot\">RECHT</span> <strong>MSFT Sammelklage</strong> (Copilot/Azure-Falschdarstellung; 10-%-Sturz am 28.01.): Lead-Plaintiff-Frist 11.08. Pre-Market 380,30 $. <strong>GOOGL −1,43 % Pre-Market (362,78 $)</strong> nach Talent-Abgängen (Shazeer → OpenAI, Jumper → Anthropic).</li>\n      <li><span class=\"chip good\">DIESE WOCHE</span> <strong>Mai-PCE am 25.06.</strong> (Do) — Fed-Lieblings-Inflationsmaß, erster harter Test des Hike-Bias. <strong>BTC-Optionsverfall 26.06.</strong> (Fr) &gt; 10 Mrd. $. Amazon Prime Day 23.–26.06.</li>\n    </ul></div>",

3 Mrd. $) brach am 12.06.; am 26.06. läuft ein &gt; 10-Mrd.-$-Optionsverfall (~80 % OTM).</li>\n      <li><span class=\"chip hot\">RECHT</span> <strong>MSFT Sammelklage</strong> (Copilot/Azure-Falschdarstellung; 10-%-Sturz am 28.01.): Lead-Plaintiff-Frist 11.08. Pre-Market 380,30 $. <strong>GOOGL −1,43 % Pre-Market (362,78 $)</strong> nach Talent-Abgängen (Shazeer → OpenAI, Jumper → Anthropic).</li>\n      <li><span class=\"chip good\">DIESE WOCHE</span> <strong>Mai-PCE am 25.06.</strong> (Do) — Fed-Lieblings-Inflationsmaß, erster harter Test des Hike-Bias. <strong>BTC-Optionsverfall 26.06.</strong> (Fr) &gt; 10 Mrd. $. Amazon Prime Day 23.–26.06.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Monday, June 22—the first trading day after the hawkish Fed shock on 06/17 and the Juneteenth break on Friday. US markets are back open; all figures here are the close from Thursday, 06/18, plus live pre-market from 06/22. The day has two poles: Nvidia's massive, three-times oversubscribed bond as a loud signal that the AI capex cycle is running—and above it all, the Fed hawk plus a dollar over 100, pressing down on everything. Thursday data (PCE 06/25) and BTC options expiry (06/26) are the next hard points.</p>\n    <ul>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>NVDA places $25B bond—3x oversubscribed</strong>: Subscriptions totaled $85B, first bond since 2021. Pre-market ~$207.33 (close 06/18 $210.69, +2.95%), market cap $5.10T. Clear evidence of the AI capex supercycle (industry capex 2026 &gt; $700B).</li>\n      <li><span class=\"chip hot\">FED</span> <strong>Hawkish hold on 06/17</strong>: Rates stay 3.50–3.75%, but 9 of 18 projections see ≥1 rate hike in 2026, 6 see ≥2; PCE forecast raised to 3.6%. Market prices a September hike. DXY over 100 (100.909, +0.15%)—strongest dollar since May 2025.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent $79.15 (−1.78%), WTI $75.24 (−2.70%)</strong> (06/22): A US-Iran 60-day peace roadmap conditionally opens the Strait of Hormuz and depresses the price—WTI −19.9% month-to-date, but +9.8% YoY.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>XAU/USD $4,196.73</strong> (06/22, range $4,136.74–$4,220.34): recovering toward $4,200 because Iran de-escalation removes risk and oil falls—despite the strong dollar as headwind.</li>\n      <li><span class=\"chip\">CRYPTO</span> <strong>BTC ~$64,114</strong> (+0.05% 24h, CoinDesk; cross-check CoinGecko $64,162). Market cap $1.285T. ETH $1,748 (+1.3% 24h). The ETF outflow streak (~$4.33B) broke on 06/12; on 06/26 a &gt; $10B options expiry (~80% OTM) runs.</li>\n      <li><span class=\"chip hot\">LEGAL</span> <strong>MSFT class action</strong> (Copilot/Azure misrepresentation; 10% drop on 01/28): lead plaintiff deadline 08/11. Pre-market $380.30. <strong>GOOGL −1.43% pre-market ($362.78)</strong> after talent departures (Shazeer → OpenAI, Jumper → Anthropic).</li>\n      <li><span class=\"chip good\">THIS WEEK</span> <strong>May PCE on 06/25</strong> (Thu)—Fed's favorite inflation measure, first hard test of the hike bias. <strong>BTC options expiry 06/26</strong> (Fri) &gt; $10B. Amazon Prime Day 06/23–06/26.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É segunda-feira, 22 de junho — o primeiro pregão após o choque hawkish do Fed em 17/06 e o recesso de Juneteenth na sexta. Os mercados norte-americanos reabriram; todos os números aqui são do fechamento de quinta, 18/06, mais pré-abertura ao vivo de 22/06. O dia tem dois pólos: o titânico título da Nvidia, três vezes subscrito, como sinal bem claro do ciclo de capex de IA em movimento — e acima de tudo, o Fed hawkish mais um dólar acima de 100, pressionando tudo. Dados de quinta (PCE 25/06) e vencimento de opções de BTC (26/06) são os próximos pontos duros.</p>\n    <ul>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>NVDA coloca 25 bilhões em título — 3 vezes subscrito</strong>: subscrições totalizaram 85 bilhões, primeiro título desde 2021. Pré-abertura ~207,33 $ (fechamento 18/06 210,69 $, +2,95 %), cap de mercado 5,10 tri $. Evidência clara do superciclo de capex de IA (capex setorial 2026 &gt; 700 bilhões $).</li>\n      <li><span class=\"chip hot\">FED</span> <strong>Hold hawkish em 17/06</strong>: taxa de juros permanece em 3,50–3,75 %, mas 9 de 18 projeções veem ≥1 aumento de taxa em 2026, 6 veem ≥2; previsão de PCE sobe para 3,6 %. Mercado precifica aumento em setembro. DXY acima de 100 (100,909, +0,15 %) — dólar mais forte desde maio de 2025.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent 79,15 $ (−1,78 %), WTI 75,24 $ (−2,70 %)</strong> (22/06): um roteiro de paz EUA-Irã de 60 dias abre condicionalmente o Estreito de Ormuz e deprime o preço — WTI −19,9 % no mês, mas ainda +9,8 % YoY.</li>\n      <li><span class=\"chip\">OURO</span> <strong>XAU/USD 4.196,73 $</strong> (22/06, amplitude 4.136,74–4.220,34 $): se recupera rumo a 4.200 $, porque o relaxamento Iran-leste remove risco e o petróleo cai — apesar do dólar forte como contravento.</li>\n      <li><span class=\"chip\">CRIPTO</span> <strong>BTC ~64.114 $</strong> (+0,05 % 24h, CoinDesk; verificação cruzada CoinGecko 64.162 $). Cap de mercado 1,285 tri $. ETH 1.748 $ (+1,3 % 24h). O fluxo ETF negativo (~4,33 bilhões $) quebrou em 12/06; em 26/06 roda vencimento &gt; 10 bilhões $ (~80 % OTM).</li>\n      <li><span class=\"chip hot\">JURÍDICO</span> <strong>Ação coletiva MSFT</strong> (má representação Copilot/Azure; queda de 10 % em 28/01): prazo lead plaintiff 11/08. Pré-abertura 380,30 $. <strong>GOOGL −1,43 % pré-abertura (362,78 $)</strong> após saídas de talentos (Shazeer → OpenAI, Jumper → Anthropic).</li>\n      <li><span class=\"chip good\">ESTA SEMANA</span> <strong>PCE de maio em 25/06</strong> (qui) — medida de inflação favorita do Fed, primeiro teste duro do viés de aumento. <strong>Vencimento de opções de BTC 26/06</strong> (sex) &gt; 10 bilhões $. Amazon Prime Day 23–26/06.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es lunes, 22 de junio — el primer día de negociación después del choque hawkish de la Fed del 17/06 y el receso de Juneteenth el viernes. Los mercados estadounidenses reabrieron; todos los números aquí son del cierre del jueves 18/06, más pre-apertura en vivo de 22/06. El día tiene dos polos: el masivo bono de Nvidia, suscrito tres veces, como una clara señal del ciclo de capex de IA en movimiento — y arriba de todo, el Fed hawkish más un dólar por encima de 100, presionando todo. Los datos del jueves (PCE 25/06) y el vencimiento de opciones de BTC (26/06) son los próximos puntos clave.</p>\n    <ul>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>NVDA coloca 25 mil millones en bonos — 3 veces suscrito</strong>: las suscripciones totalizaron 85 mil millones, primer bono desde 2021. Pre-apertura ~207,33 $ (cierre 18/06 210,69 $, +2,95 %), capitalización de mercado 5,10 billones $. Evidencia clara del superciclo de capex de IA (capex industrial 2026 &gt; 700 mil millones $).</li>\n      <li><span class=\"chip hot\">FED</span> <strong>Hold hawkish el 17/06</strong>: la tasa de interés se mantiene en 3,50–3,75 %, pero 9 de 18 proyecciones ven ≥1 aumento de tasa en 2026, 6 ven ≥2; previsión de PCE sube a 3,6 %. Mercado precifica un aumento en septiembre. DXY por encima de 100 (100,909, +0,15 %) — dólar más fuerte desde mayo de 2025.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent 79,15 $ (−1,78 %), WTI 75,24 $ (−2,70 %)</strong> (22/06): un plan de paz EUA-Irán de 60 días abre condicionalmente el Estrecho de Ormuz y deprime el precio — WTI −19,9 % en el mes, pero aún +9,8 % año a año.</li>\n      <li><span class=\"chip\">ORO</span> <strong>XAU/USD 4.196,73 $</strong> (22/06, rango 4.136,74–4.220,34 $): se recupera hacia 4.200 $ porque la de-escalada Irán quita riesgo y el petróleo cae — a pesar del dólar fuerte como contraviento.</li>\n      <li><span class=\"chip\">CRIPTO</span> <strong>BTC ~64.114 $</strong> (+0,05 % 24h, CoinDesk; verificación CoinGecko 64.162 $). Capitalización de mercado 1,285 billones $. ETH 1.748 $ (+1,3 % 24h). El flujo negativo de ETF (~4,33 mil millones $) se rompió el 12/06; el 26/06 corre un vencimiento &gt; 10 mil millones $ (~80 % OTM).</li>\n      <li><span class=\"chip hot\">LEGAL</span> <strong>Demanda colectiva MSFT</strong> (desinformación Copilot/Azure; caída del 10 % el 28/01): plazo lead plaintiff 11/08. Pre-apertura 380,30 $. <strong>GOOGL −1,43 % pre-apertura (362,78 $)</strong> tras salidas de talento (Shazeer → OpenAI, Jumper → Anthropic).</li>\n      <li><span class=\"chip good\">ESTA SEMANA</span> <strong>PCE de mayo el 25/06</strong> (jue) — medida de inflación favorita de la Fed, primera prueba dura del sesgo de aumento. <strong>Vencimiento de opciones de BTC 26/06</strong> (vie) &gt; 10 mil millones $. Amazon Prime Day 23–26/06.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist ein Security-Wochenende, wie man es nicht will: ein ungepatchter Oracle-Zero-Day, der zwei Wochen lang unbemerkt 100+ Organisationen aufriss; ein selbst-replizierender npm/PyPI-Wurm, der sogar gültige Lieferketten-Signaturen unterwandert hat; und ein CISA-Patch-Countdown, der morgen abläuft. Dazwischen ruhige, gute Nachrichten — Postgres 19 in der Beta, Android dreht an der Entwickler-Identität. Der Reihe nach.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8), zwei Wochen Zero-Day, ShinyHunters knackte 100+ Orgs — 68 % Hochschulen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Shai-Hulud-Wurm</strong>: 100+ npm/PyPI-Pakete kompromittiert, 32 Red-Hat-Pakete am 1. Juni — gültige SLSA-Signaturen ausgehebelt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CISA KEV +3</strong>: Chromium V8, Cisco SD-WAN, Arista EOS — Bundes-Frist morgen, 23. Juni. Arista patcht gar nicht.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Global</span> <strong>Android Developer Verification</strong>: System-Dienst rollt jetzt aus, Pflicht ab 30.09. in BR/ID/SG/TH.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">DE</span> <strong>NIS2/BSI</strong>: nur 18.500 von ~29.000 Pflicht-Stellen registriert — neue Frist 31. Juli, Bußgeld bis 500.000 €.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 1</strong>: paralleler Autovacuum, REPACK ohne Lock, SQL/PGQ-Property-Graphs. GA im Herbst.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Spring AI 1.0.9/1.1.8</strong>: CVE-2026-47835 (8,6) — Query-Injection in Vektor-Stores. Update einplanen.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Node.js 25 EOL</strong> seit 1. Juni — aktuelle Current-Release ist 26.3.1; aktive LTS-Linie bleibt 24.x.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist ein Security-Wochenende, wie man es nicht will: ein ungepatchter Oracle-Zero-Day, der zwei Wochen lang unbemerkt 100+ Organisationen aufriss; ein selbst-replizierender npm/PyPI-Wurm, der sogar gültige Lieferketten-Signaturen unterwandert hat; und ein CISA-Patch-Countdown, der morgen abläuft. Dazwischen ruhige, gute Nachrichten — Postgres 19 in der Beta, Android dreht an der Entwickler-Identität. Der Reihe nach.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8), zwei Wochen Zero-Day, ShinyHunters knackte 100+ Orgs — 68 % Hochschulen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Shai-Hulud-Wurm</strong>: 100+ npm/PyPI-Pakete kompromittiert, 32 Red-Hat-Pakete am 1. Juni — gültige SLSA-Signaturen ausgehebelt.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CISA KEV +3</strong>: Chromium V8, Cisco SD-WAN, Arista EOS — Bundes-Frist morgen, 23. Juni. Arista patcht gar nicht.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Global</span> <strong>Android Developer Verification</strong>: System-Dienst rollt jetzt aus, Pflicht ab 30.09. in BR/ID/SG/TH.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">DE</span> <strong>NIS2/BSI</strong>: nur 18.500 von ~29.000 Pflicht-Stellen registriert — neue Frist 31. Juli, Bußgeld bis 500.000 €.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 1</strong>: paralleler Autovacuum, REPACK ohne Lock, SQL/PGQ-Property-Graphs. GA im Herbst.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Spring AI 1.0.9/1.1.8</strong>: CVE-2026-47835 (8,6) — Query-Injection in Vektor-Stores. Update einplanen.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Node.js 25 EOL</strong> seit 1. Juni — aktuelle Current-Release ist 26.3.1; aktive LTS-Linie bleibt 24.x.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's the security weekend you don't want: an unpatched Oracle zero-day that flew under the radar for two weeks, hitting 100+ organizations; a self-replicating npm/PyPI worm that even spoofed legitimate supply chain signatures; and a CISA patch deadline expiring tomorrow. But there's quiet, good news in between—PostgreSQL 19 in beta, Android tightening developer identity. One by one.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9.8), two-week zero-day, ShinyHunters breached 100+ orgs — 68% universities.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Shai-Hulud Worm</strong>: 100+ npm/PyPI packages compromised, 32 Red Hat packages on June 1st — valid SLSA signatures subverted.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CISA KEV +3</strong>: Chromium V8, Cisco SD-WAN, Arista EOS — federal deadline tomorrow, June 23rd. Arista not patching.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Global</span> <strong>Android Developer Verification</strong>: System service rolling out now, mandatory from Sept 30 in BR/ID/SG/TH.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">DE</span> <strong>NIS2/BSI</strong>: only 18,500 of ~29,000 mandatory facilities registered — new deadline July 31, fines up to €500,000.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 1</strong>: parallel autovacuum, REPACK without lock, SQL/PGQ property graphs. GA this fall.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Spring AI 1.0.9/1.1.8</strong>: CVE-2026-47835 (8.6) — query injection in vector stores. Plan updates.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Node.js 25 EOL</strong> as of June 1st — current release is 26.3.1; the active LTS line remains 24.x.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É um fim de semana de segurança que ninguém quer: um zero-day da Oracle não-patchado que passou despercebido por duas semanas, atingindo 100+ organizações; um worm autorreplicável npm/PyPI que até falsificou assinaturas válidas da cadeia de suprimentos; e um cronômetro CISA de patches expirando amanhã. Mas há notícias tranquilas e boas no meio — PostgreSQL 19 em beta, Android apertar a identidade de desenvolvedores. Um por um.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8), zero-day de duas semanas, ShinyHunters invadiu 100+ orgs — 68% universidades.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Worm Shai-Hulud</strong>: 100+ pacotes npm/PyPI comprometidos, 32 pacotes Red Hat em 1º de junho — assinaturas SLSA válidas subvertidas.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CISA KEV +3</strong>: Chromium V8, Cisco SD-WAN, Arista EOS — prazo federal amanhã, 23 de junho. Arista não vai fazer patch.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Global</span> <strong>Verificação de Desenvolvedor Android</strong>: Serviço de sistema sendo implantado agora, obrigatório a partir de 30 de setembro em BR/ID/SG/TH.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">DE</span> <strong>NIS2/BSI</strong>: apenas 18.500 de ~29.000 entidades obrigatórias registradas — novo prazo 31 de julho, multas até €500.000.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 1</strong>: autovacuum paralelo, REPACK sem lock, gráficos de propriedade SQL/PGQ. GA no outono.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Spring AI 1.0.9/1.1.8</strong>: CVE-2026-47835 (8,6) — injeção de consulta em lojas vetoriais. Planeje atualizações.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Node.js 25 EOL</strong> desde 1º de junho — LTS atual é 26.3.1; a linha LTS ativa permanece 24.x.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es un fin de semana de seguridad que nadie quiere: un zero-day de Oracle sin parche que pasó desapercibido durante dos semanas, afectando a 100+ organizaciones; un gusano autorreplicable npm/PyPI que incluso falsificó firmas válidas de la cadena de suministro; y una cuenta regresiva del CISA que vence mañana. Pero hay noticias tranquilas y buenas en el medio — PostgreSQL 19 en beta, Android apretando la identidad de desarrolladores. Uno por uno.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Oracle PeopleSoft</strong>: CVE-2026-35273 (CVSS 9,8), zero-day de dos semanas, ShinyHunters comprometió 100+ orgs — 68% universidades.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>Gusano Shai-Hulud</strong>: 100+ paquetes npm/PyPI comprometidos, 32 paquetes Red Hat el 1º de junio — firmas SLSA válidas subvertidas.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>CISA KEV +3</strong>: Chromium V8, Cisco SD-WAN, Arista EOS — plazo federal mañana, 23 de junio. Arista no va a parchear.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Global</span> <strong>Verificación de Desarrollador Android</strong>: Servicio del sistema implementándose ahora, obligatorio a partir del 30 de septiembre en BR/ID/SG/TH.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">DE</span> <strong>NIS2/BSI</strong>: solo 18.500 de ~29.000 entidades obligatorias registradas — nuevo plazo 31 de julio, multas hasta 500.000 €.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 1</strong>: autovacuum paralelo, REPACK sin bloqueo, gráficos de propiedad SQL/PGQ. GA en otoño.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Spring AI 1.0.9/1.1.8</strong>: CVE-2026-47835 (8,6) — inyección de consultas en almacenes vectoriales. Planifica actualizaciones.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>Node.js 25 EOL</strong> desde el 1º de junio — LTS actual es 26.3.1; la línea LTS activa permanece 24.x.</li>\n    </ul></div>"
