      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Eine bewegte Woche für alle, die mit KI programmieren: Anthropic hat gleich zweimal geliefert. Claude Sonnet 5 ist seit Dienstag der neue Standard in Claude Code, GitHub Copilot und den Free/Pro-Plänen — und Fable 5 ist nach der Export-Kontroll-Episode am 1. Juli wieder global verfügbar (das schärfere Schwester-Modell Mythos 5 kehrte nur für ausgewählte US-Partner zurück) und führt SWE-Bench Verified an. Die anderen Labs sind entweder eingesperrt (GPT-5.6), verschoben (Gemini 3.5 Pro) oder im geschlossenen Beta (Grok 4.5). Und aus China kommt ein 1,6-Billionen-Parameter-Open-Weights-Modell.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 ist neuer Default</strong>: Free/Pro-Standard, in Claude Code (v2.1.197) und GitHub Copilot; Einführungspreis $2/$10 pro Mtok bis 31.08.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 wieder global</strong>: Export-Kontrollen am 30.06. aufgehoben, Redeploy am 01.07.; Mythos 5 nur für ausgewählte US-Partner. Führen SWE-Bench Verified mit 95,0 % / 95,5 %.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Mythos 5 95,5 % · Fable 5 95,0 % · Opus 4.8 88,6 % — skeptisch lesen (siehe unten).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 eingesperrt</strong>: Sol/Terra/Luna am 26.06. angekündigt, aber nur ~20 vorab-freigegebene Orgs, auf Bitte der US-Regierung.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro verschoben</strong>: GA von Juni auf Juli gerutscht, kein festes Datum (Stand 02.07.).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>LongCat-2.0</strong>: Meituan open-sourct 1,6-T-Parameter-MoE unter MIT, angeblich auf chinesischen Chips trainiert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash GA</strong> in Copilot Business/Enterprise; Cursor bringt iOS-Beta und Team-MCPs.</li>\n      <li><span class=\"chip\">Local</span> <strong>Grok 4.5</strong> nur Private-Beta bei SpaceX/Tesla, keine Benchmarks, kein System-Card — reine Behauptungen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Eine bewegte Woche für alle, die mit KI programmieren: Anthropic hat gleich zweimal geliefert. Claude Sonnet 5 ist seit Dienstag der neue Standard in Claude Code, GitHub Copilot und den Free/Pro-Plänen — und Fable 5 ist nach der Export-Kontroll-Episode am 1. Juli wieder global verfügbar (das schärfere Schwester-Modell Mythos 5 kehrte nur für ausgewählte US-Partner zurück) und führt SWE-Bench Verified an. Die anderen Labs sind entweder eingesperrt (GPT-5.6), verschoben (Gemini 3.5 Pro) oder im geschlossenen Beta (Grok 4.5). Und aus China kommt ein 1,6-Billionen-Parameter-Open-Weights-Modell.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 ist neuer Default</strong>: Free/Pro-Standard, in Claude Code (v2.1.197) und GitHub Copilot; Einführungspreis $2/$10 pro Mtok bis 31.08.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 wieder global</strong>: Export-Kontrollen am 30.06. aufgehoben, Redeploy am 01.07.; Mythos 5 nur für ausgewählte US-Partner. Führen SWE-Bench Verified mit 95,0 % / 95,5 %.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Mythos 5 95,5 % · Fable 5 95,0 % · Opus 4.8 88,6 % — skeptisch lesen (siehe unten).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 eingesperrt</strong>: Sol/Terra/Luna am 26.06. angekündigt, aber nur ~20 vorab-freigegebene Orgs, auf Bitte der US-Regierung.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro verschoben</strong>: GA von Juni auf Juli gerutscht, kein festes Datum (Stand 02.07.).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>LongCat-2.0</strong>: Meituan open-sourct 1,6-T-Parameter-MoE unter MIT, angeblich auf chinesischen Chips trainiert.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash GA</strong> in Copilot Business/Enterprise; Cursor bringt iOS-Beta und Team-MCPs.</li>\n      <li><span class=\"chip\">Local</span> <strong>Grok 4.5</strong> nur Private-Beta bei SpaceX/Tesla, keine Benchmarks, kein System-Card — reine Behauptungen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A busy week for everyone coding with AI: Anthropic shipped twice. Claude Sonnet 5 has been the new standard in Claude Code, GitHub Copilot, and the Free/Pro plans since Tuesday — and Fable 5 is globally available again after the export-control episode on July 1st (its sharper sibling Mythos 5 returned only for select US partners under Project Glasswing), now leading SWE-Bench Verified. The other labs are either locked down (GPT-5.6), delayed (Gemini 3.5 Pro), or in closed beta (Grok 4.5). And from China comes a 1.6-trillion-parameter open-weights model.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 is new default</strong>: Free/Pro standard, in Claude Code (v2.1.197) and GitHub Copilot; introductory pricing $2/$10 per Mtok through 08-31.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 back globally</strong>: Export controls lifted 06-30, redeployed 07-01; Mythos 5 for select US partners only. Lead SWE-Bench Verified at 95.0% / 95.5%.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Mythos 5 95.5% · Fable 5 95.0% · Opus 4.8 88.6% — read skeptically (see below).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 locked down</strong>: Sol/Terra/Luna announced 06-26, but only ~20 orgs with early access, at US government request.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro delayed</strong>: GA slipped from June to July, no firm date (as of 07-02).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>LongCat-2.0</strong>: Meituan open-sources 1.6-trillion-parameter MoE under MIT, reportedly trained on Chinese chips.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash GA</strong> in Copilot Business/Enterprise; Cursor brings iOS beta and Team MCPs.</li>\n      <li><span class=\"chip\">Local</span> <strong>Grok 4.5</strong> private beta only at SpaceX/Tesla, no benchmarks, no system card — pure claims.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma semana movimentada para quem programa com IA: a Anthropic entregou duas vezes. Claude Sonnet 5 é o novo padrão em Claude Code, GitHub Copilot e nos planos Free/Pro desde terça-feira — e Fable 5 está novamente disponível globalmente após o episódio de controle de exportação em 1º de julho (seu irmão mais afiado Mythos 5 voltou apenas para parceiros selecionados nos EUA sob o Project Glasswing), agora liderando SWE-Bench Verified. Os outros laboratórios estão ou bloqueados (GPT-5.6), atrasados (Gemini 3.5 Pro) ou em beta fechada (Grok 4.5). E da China vem um modelo aberto com 1,6 trilhões de parâmetros.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 é o novo padrão</strong>: padrão Free/Pro, em Claude Code (v2.1.197) e GitHub Copilot; preço introdutório R$ 2/R$ 10 por Mtok até 31-08.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 volta globalmente</strong>: controles de exportação removidos em 30-06, reimplantados em 01-07; Mythos 5 apenas para parceiros selecionados dos EUA. Lideram SWE-Bench Verified com 95,0% / 95,5%.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Mythos 5 95,5% · Fable 5 95,0% · Opus 4.8 88,6% — leia com ceticismo (veja abaixo).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 bloqueado</strong>: Sol/Terra/Luna anunciados em 26-06, mas apenas ~20 organizações com acesso antecipado, por solicitação do governo dos EUA.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro adiado</strong>: GA mudou de junho para julho, sem data fixa (em 02-07).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>LongCat-2.0</strong>: Meituan disponibiliza em código aberto 1,6 trilhão de parâmetros MoE sob MIT, supostamente treinado em chips chineses.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash GA</strong> em Copilot Business/Enterprise; Cursor traz beta iOS e Team MCPs.</li>\n      <li><span class=\"chip\">Local</span> <strong>Grok 4.5</strong> apenas beta privada em SpaceX/Tesla, sem benchmarks, sem system card — puro marketing.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una semana movida para quien programa con IA: Anthropic entregó dos veces. Claude Sonnet 5 es el nuevo estándar en Claude Code, GitHub Copilot y en los planes Free/Pro desde el martes — y Fable 5 está nuevamente disponible globalmente después del episodio de controles de exportación el 1 de julio (su hermano más afilado Mythos 5 regresó solo para socios selecionados en EE.UU. bajo Project Glasswing), ahora liderando SWE-Bench Verified. Los demás laboratorios están bloqueados (GPT-5.6), retrasados (Gemini 3.5 Pro) o en beta cerrada (Grok 4.5). Y de China viene un modelo abierto con 1,6 billones de parámetros.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5 es el nuevo estándar</strong>: estándar Free/Pro, en Claude Code (v2.1.197) y GitHub Copilot; precio introductorio $2/$10 por Mtok hasta 31-08.</li>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 regresa globalmente</strong>: controles de exportación levantados 30-06, reimplementados 01-07; Mythos 5 solo para socios selecionados de EE.UU. Lideran SWE-Bench Verified con 95,0% / 95,5%.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified</strong>: Mythos 5 95,5% · Fable 5 95,0% · Opus 4.8 88,6% — lee con escepticismo (ver abajo).</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 bloqueado</strong>: Sol/Terra/Luna anunciados 26-06, pero solo ~20 organizaciones con acceso anticipado, a solicitud del gobierno de EE.UU.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro retrasado</strong>: GA cambió de junio a julio, sin fecha fija (al 02-07).</li>\n      <li><span class=\"chip good\">OSS</span> <strong>LongCat-2.0</strong>: Meituan libera en código abierto 1,6 billones de parámetros MoE bajo MIT, supuestamente entrenado en chips chinos.</li>\n      <li><span class=\"chip\">Tool</span> <strong>MAI-Code-1-Flash GA</strong> en Copilot Business/Enterprise; Cursor trae beta iOS y Team MCPs.</li>\n      <li><span class=\"chip\">Local</span> <strong>Grok 4.5</strong> solo beta privada en SpaceX/Tesla, sin benchmarks, sin system card — puro marketing.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der teuerste Satz der Woche in der angewandten KI heißt „forward-deployed engineering\": Nach AWS, OpenAI und Anthropic gründet nun auch Microsoft eine eigene Firma, deren einziger Job es ist, KI beim Kunden tatsächlich zum Laufen zu bringen. Das ist das ehrlichste Eingeständnis der ganzen Branche — das Modell zu bauen war nie das Problem, es einzupassen schon. Dazu: der EU AI Act verschiebt seine Hochrisiko-Fristen, und die neue Bitkom-Zahl korrigiert einen kursierenden Mythos nach unten.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Microsoft „Frontier Company\"</strong>: 2,5 Mrd. $, 6.000 Experten, nur fürs Ausrollen von KI beim Kunden. AWS (1 Mrd. $) legte zwei Tage vorher vor.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI Act „Digital Omnibus\"</strong>: Hochrisiko-Frist von 2. Aug 2026 auf <strong>2. Dez 2027</strong> geschoben — aber die Chatbot-Transparenzpflicht (Art. 50) bleibt bei 2. Aug 2026.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Bitkom 2026</strong>: 36 % der deutschen Firmen setzen KI ein — eine Verdopplung ggü. 20 % (2024). Nicht die kursierenden 41 %.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Stanford HAI AI Index</strong>: 88 % der Firmen nutzen KI irgendwie, aber <strong>&lt;10 %</strong> haben sie in irgendeiner Funktion voll skaliert. Agenten: einstellig.</li>\n      <li><span class=\"chip good\">Deploy · Global</span> <strong>Salesforce Agentforce</strong>: Help Agent geht im Juli GA, 2 $ pro gelöstem Fall. Agenten-Adoption im Service angeblich 39 %→66 %.</li>\n      <li><span class=\"chip\">Finance · BR</span> <strong>Brasiliens Banken</strong>: geplant R$ 50,4 Mrd. Tech-Invest 2026 (+8 %), KI und Cloud als Prioritäten.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Projekt-Idee</strong>: AI-Act-Readiness-Check für den Mittelstand — 93 % der betroffenen Firmen erwarten hohen Umsetzungsaufwand.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der teuerste Satz der Woche in der angewandten KI heißt „forward-deployed engineering\": Nach AWS, OpenAI und Anthropic gründet nun auch Microsoft eine eigene Firma, deren einziger Job es ist, KI beim Kunden tatsächlich zum Laufen zu bringen. Das ist das ehrlichste Eingeständnis der ganzen Branche — das Modell zu bauen war nie das Problem, es einzupassen schon. Dazu: der EU AI Act verschiebt seine Hochrisiko-Fristen, und die neue Bitkom-Zahl korrigiert einen kursierenden Mythos nach unten.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Microsoft „Frontier Company\"</strong>: 2,5 Mrd. $, 6.000 Experten, nur fürs Ausrollen von KI beim Kunden. AWS (1 Mrd. $) legte zwei Tage vorher vor.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI Act „Digital Omnibus\"</strong>: Hochrisiko-Frist von 2. Aug 2026 auf <strong>2. Dez 2027</strong> geschoben — aber die Chatbot-Transparenzpflicht (Art. 50) bleibt bei 2. Aug 2026.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Bitkom 2026</strong>: 36 % der deutschen Firmen setzen KI ein — eine Verdopplung ggü. 20 % (2024). Nicht die kursierenden 41 %.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Stanford HAI AI Index</strong>: 88 % der Firmen nutzen KI irgendwie, aber <strong>&lt;10 %</strong> haben sie in irgendeiner Funktion voll skaliert. Agenten: einstellig.</li>\n      <li><span class=\"chip good\">Deploy · Global</span> <strong>Salesforce Agentforce</strong>: Help Agent geht im Juli GA, 2 $ pro gelöstem Fall. Agenten-Adoption im Service angeblich 39 %→66 %.</li>\n      <li><span class=\"chip\">Finance · BR</span> <strong>Brasiliens Banken</strong>: geplant R$ 50,4 Mrd. Tech-Invest 2026 (+8 %), KI und Cloud als Prioritäten.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Projekt-Idee</strong>: AI-Act-Readiness-Check für den Mittelstand — 93 % der betroffenen Firmen erwarten hohen Umsetzungsaufwand.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The most expensive phrase this week in applied AI is \"forward-deployed engineering\": After AWS, OpenAI, and Anthropic, Microsoft has now launched its own company whose sole job is to actually get AI running at the customer's site. This is the most honest confession the whole industry has made — building the model was never the problem, fitting it in was. Plus: the EU AI Act shifts its high-risk deadlines, and the new Bitkom number corrects a circulating myth downward.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Microsoft \"Frontier Company\"</strong>: $2.5 billion, 6,000 experts, purely for rolling out AI at customer sites. AWS ($1 billion) moved first two days earlier.</li>\n      <li><span class=\"chip\">Reg · EU</span> <strong>AI Act \"Digital Omnibus\"</strong>: High-risk deadline shifted from Aug 2, 2026 to <strong>Dec 2, 2027</strong> — but the chatbot transparency mandate (Art. 50) stays at Aug 2, 2026.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Bitkom 2026</strong>: 36% of German firms deploy AI — a doubling from 20% (2024). Not the circulating 41%.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Stanford HAI AI Index</strong>: 88% of firms use AI somehow, but <strong>&lt;10%</strong> have fully scaled it in any function. Agent adoption: single digits.</li>\n      <li><span class=\"chip good\">Deploy · Global</span> <strong>Salesforce Agentforce</strong>: Help Agent goes GA in July, $2 per resolved case. Agent adoption in service supposedly 39%→66%.</li>\n      <li><span class=\"chip\">Finance · BR</span> <strong>Brazil's banks</strong>: plan R$ 50.4 billion tech investment 2026 (+8%), AI and cloud as priorities.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Project idea</strong>: AI-Act readiness check for mid-market — 93% of affected firms expect high implementation effort.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A expressão mais cara da semana em IA aplicada é \"engenharia com implementação avançada\": depois de AWS, OpenAI e Anthropic, a Microsoft agora também fundou sua própria empresa, cujo único trabalho é realmente colocar a IA em funcionamento no cliente. É a confissão mais honesta de toda a indústria — construir o modelo nunca foi o problema, encaixá-lo é. Além disso: o AI Act da UE adia seus prazos de alto risco, e o novo número Bitkom corrige um mito circulante para baixo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Microsoft \"Frontier Company\"</strong>: US$ 2,5 bilhões, 6.000 especialistas, apenas para implementar IA com clientes. AWS (US$ 1 bilhão) saiu na frente dois dias antes.</li>\n      <li><span class=\"chip\">Reg · UE</span> <strong>AI Act \"Digital Omnibus\"</strong>: prazo de alto risco adiado de 2 de ago 2026 para <strong>2 de dez 2027</strong> — mas a obrigação de transparência para chatbots (Art. 50) permanece em 2 de ago 2026.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Bitkom 2026</strong>: 36% das empresas alemãs implementam IA — uma duplicação em relação a 20% (2024). Não os 41% circulantes.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Stanford HAI AI Index</strong>: 88% das empresas usam IA de alguma forma, mas <strong>&lt;10%</strong> a escalaram totalmente em qualquer função. Adoção de agentes: um dígito.</li>\n      <li><span class=\"chip good\">Deploy · Global</span> <strong>Salesforce Agentforce</strong>: Help Agent vai GA em julho, US$ 2 por caso resolvido. Adoção de agentes em serviço supostamente 39%→66%.</li>\n      <li><span class=\"chip\">Finance · BR</span> <strong>Bancos brasileiros</strong>: planejam R$ 50,4 bilhões em investimento de tecnologia 2026 (+8%), IA e nuvem como prioridades.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Ideia de projeto</strong>: verificação de prontidão do AI Act para o mercado intermediário — 93% das empresas afetadas esperam alto esforço de implementação.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La frase más cara de la semana en IA aplicada es \"ingeniería con implementación avanzada\": después de AWS, OpenAI y Anthropic, Microsoft ha fundado su propia empresa cuyo único trabajo es realmente hacer funcionar la IA en el cliente. Es la confesión más honesta de toda la industria — construir el modelo nunca fue el problema, hacerlo encajar lo es. Además: la Ley de IA de la UE pospone sus plazos de alto riesgo, y el nuevo número de Bitkom corrige un mito circulante hacia abajo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Deploy · US</span> <strong>Microsoft \"Frontier Company\"</strong>: US$ 2,5 mil millones, 6.000 expertos, solo para implementar IA en clientes. AWS (US$ 1 mil millones) se movió primero dos días antes.</li>\n      <li><span class=\"chip\">Reg · UE</span> <strong>Ley de IA \"Digital Omnibus\"</strong>: plazo de alto riesgo pospuesto de 2 de ago 2026 a <strong>2 de dic 2027</strong> — pero la obligación de transparencia para chatbots (Art. 50) permanece en 2 de ago 2026.</li>\n      <li><span class=\"chip\">Study · DE</span> <strong>Bitkom 2026</strong>: 36% de las empresas alemanas implementan IA — una duplicación desde 20% (2024). No el 41% circulante.</li>\n      <li><span class=\"chip\">Study · Global</span> <strong>Índice de IA Stanford HAI</strong>: 88% de las empresas usan IA de alguna forma, pero <strong>&lt;10%</strong> la han escalado completamente en cualquier función. Adopción de agentes: un dígito.</li>\n      <li><span class=\"chip good\">Deploy · Global</span> <strong>Salesforce Agentforce</strong>: Help Agent llega a GA en julio, US$ 2 por caso resuelto. Adopción de agentes en servicio supuestamente 39%→66%.</li>\n      <li><span class=\"chip\">Finance · BR</span> <strong>Bancos brasileños</strong>: planean R$ 50,4 mil millones en inversión en tecnología 2026 (+8%), IA y nube como prioridades.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Idea de proyecto</strong>: verificación de preparación de la Ley de IA para el mercado intermedio — 93% de empresas afectadas esperan alto esfuerzo de implementación.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der DACH-Freelance-Markt hat 2026 zum ersten Mal seit Studienbeginn nachgegeben — der Durchschnittssatz fiel auf 103 €/h, und fast jeder Zweite hat keine gesicherte Auslastung. Das Board bleibt trotzdem voll: 66 aggregierte Listings, klar Java/Spring-Boot-dominiert, mit teclift (Fit 89, Köln remote) an der Spitze. Dazu drei öffentliche EU-Ausschreibungen mit echten Eignungshürden.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit heute: teclift GmbH</strong> — Fullstack Java Spring Boot 3 / Angular / Kafka, Köln, 100 % remote, 12 Monate, 90–115 €/h*. Fit-Score 89, sauberer Kern-Match.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dichtes Java/Angular-Feld</strong>: iSAX, BridgingIT, RED SAP, EnCo alle bei Fit 87–88, alle high-remote, Bänder 90–135 €/h*.</li>\n      <li><span class=\"chip hot\">IoT/Auto</span> <strong>Nischen-Premium präsent</strong>: EnCo (Automotive+Safety, 87), Computer Futures (e-Mobility, 82), VARIUS Smart-Energy (85), ein KNX-Smart-Home-Projekt (74).</li>\n      <li><span class=\"chip\">Markt</span> <strong>Freelancer-Kompass 2026</strong>: Ø-Satz 103 €/h — <em>erster</em> Rückgang seit 2016. 43 % ohne gesicherte Auslastung.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Malt-Benchmark</strong>: Java-Tagessatz 700 €/Tag (8–15 J.), 720 €/Tag (15+ J.) — bei ~8 h heißt das grob 88–90 €/h.</li>\n      <li><span class=\"chip\">Employee</span> <strong>ELCA (Zürich)</strong>: Senior Java Engineer – Focus Agentic AI, CHF 140–190k*/Jahr, Fit 81 — top-tier CH-Angebot im Filter.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong> Principal Forward Deployed Engineer (AI-Native Dev, EU-Multi-City, Fit 82) &amp; <strong>Anthropic</strong> Claude-Code-Engineer ($320–560k, US, Fit 70).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>iBMS 3.0 (Polizei NRW)</strong>: Stack passt, aber ⚠️ Partner nötig — Umsatz ≥ 3 Mio. €, ISO 27001 + 9001, plus Polizei-Zuverlässigkeitsprüfung (VSA/OSiP).</li>\n      <li><span class=\"chip\">TED</span> <strong>2 weitere Tender</strong>: Berlin-Falldokumentationssoftware (⚠️ Partner) und BW-Rahmen „Projektdienstleistungen\" (Stack-Match schwächer). Fristen 13.–14.07.</li>\n      <li><span class=\"chip\">Signal</span> <strong>Skill-Frequenz im Board</strong>: Remote 53×, Java 48×, Spring Boot 40×, Angular 30×, Kubernetes 18×, Kafka 14×. Genau Daniels Kern.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der DACH-Freelance-Markt hat 2026 zum ersten Mal seit Studienbeginn nachgegeben — der Durchschnittssatz fiel auf 103 €/h, und fast jeder Zweite hat keine gesicherte Auslastung. Das Board bleibt trotzdem voll: 66 aggregierte Listings, klar Java/Spring-Boot-dominiert, mit teclift (Fit 89, Köln remote) an der Spitze. Dazu drei öffentliche EU-Ausschreibungen mit echten Eignungshürden.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit heute: teclift GmbH</strong> — Fullstack Java Spring Boot 3 / Angular / Kafka, Köln, 100 % remote, 12 Monate, 90–115 €/h*. Fit-Score 89, sauberer Kern-Match.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dichtes Java/Angular-Feld</strong>: iSAX, BridgingIT, RED SAP, EnCo alle bei Fit 87–88, alle high-remote, Bänder 90–135 €/h*.</li>\n      <li><span class=\"chip hot\">IoT/Auto</span> <strong>Nischen-Premium präsent</strong>: EnCo (Automotive+Safety, 87), Computer Futures (e-Mobility, 82), VARIUS Smart-Energy (85), ein KNX-Smart-Home-Projekt (74).</li>\n      <li><span class=\"chip\">Markt</span> <strong>Freelancer-Kompass 2026</strong>: Ø-Satz 103 €/h — <em>erster</em> Rückgang seit 2016. 43 % ohne gesicherte Auslastung.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Malt-Benchmark</strong>: Java-Tagessatz 700 €/Tag (8–15 J.), 720 €/Tag (15+ J.) — bei ~8 h heißt das grob 88–90 €/h.</li>\n      <li><span class=\"chip\">Employee</span> <strong>ELCA (Zürich)</strong>: Senior Java Engineer – Focus Agentic AI, CHF 140–190k*/Jahr, Fit 81 — top-tier CH-Angebot im Filter.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong> Principal Forward Deployed Engineer (AI-Native Dev, EU-Multi-City, Fit 82) &amp; <strong>Anthropic</strong> Claude-Code-Engineer ($320–560k, US, Fit 70).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>iBMS 3.0 (Polizei NRW)</strong>: Stack passt, aber ⚠️ Partner nötig — Umsatz ≥ 3 Mio. €, ISO 27001 + 9001, plus Polizei-Zuverlässigkeitsprüfung (VSA/OSiP).</li>\n      <li><span class=\"chip\">TED</span> <strong>2 weitere Tender</strong>: Berlin-Falldokumentationssoftware (⚠️ Partner) und BW-Rahmen „Projektdienstleistungen\" (Stack-Match schwächer). Fristen 13.–14.07.</li>\n      <li><span class=\"chip\">Signal</span> <strong>Skill-Frequenz im Board</strong>: Remote 53×, Java 48×, Spring Boot 40×, Angular 30×, Kubernetes 18×, Kafka 14×. Genau Daniels Kern.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The DACH freelance market has declined for the first time since the study began in 2016 — the average rate fell to €103/h, and nearly half have no confirmed workload. The board stays full: 66 aggregated listings, clearly Java/Spring Boot–dominated, with teclift (Fit 89, Cologne remote) at the top. Plus three public EU tenders with real qualification hurdles.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top fit today: teclift GmbH</strong> — Fullstack Java Spring Boot 3 / Angular / Kafka, Cologne, 100% remote, 12 months, €90–115/h*. Fit Score 89, clean core match.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Dense Java/Angular field</strong>: iSAX, BridgingIT, RED SAP, EnCo all at Fit 87–88, all high-remote, bands €90–135/h*.</li>\n      <li><span class=\"chip hot\">IoT/Auto</span> <strong>Niche premium present</strong>: EnCo (Automotive+Safety, 87), Computer Futures (e-Mobility, 82), VARIUS Smart Energy (85), one KNX Smart Home project (74).</li>\n      <li><span class=\"chip\">Market</span> <strong>Freelancer Compass 2026</strong>: Avg rate €103/h — <em>first</em> decline since 2016. 43% without confirmed workload.</li>\n      <li><span class=\"chip\">Market</span> <strong>Malt benchmark</strong>: Java day rate €700/day (8–15 yrs), €720/day (15+ yrs) — at ~8 h that's roughly €88–90/h.</li>\n      <li><span class=\"chip\">Employee</span> <strong>ELCA (Zurich)</strong>: Senior Java Engineer – Focus Agentic AI, CHF 140–190k*/year, Fit 81 — top-tier CH offer in the filter.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong> Principal Forward Deployed Engineer (AI-Native Dev, EU Multi-City, Fit 82) &amp; <strong>Anthropic</strong> Claude Code Engineer ($320–560k, US, Fit 70).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>iBMS 3.0 (NRW Police)</strong>: Stack fits, but ⚠️ partner needed — Revenue ≥€3M, ISO 27001 + 9001, plus police security vetting (VSA/OSiP).</li>\n      <li><span class=\"chip\">TED</span> <strong>2 more tenders</strong>: Berlin case documentation software (⚠️ partner) and BW framework \"Project Services\" (weaker stack match). Deadlines July 13–14.</li>\n      <li><span class=\"chip\">Signal</span> <strong>Skill frequency in board</strong>: Remote 53×, Java 48×, Spring Boot 40×, Angular 30×, Kubernetes 18×, Kafka 14×. Exactly Daniel's core.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O mercado freelancer DACH enfraqueceu em 2026 pela primeira vez desde o início dos estudos — a taxa média caiu para 103 €/h, e quase metade não tem carga de trabalho garantida. O painel permanece lotado: 66 anúncios agregados, claramente dominados por Java/Spring Boot, com teclift (Fit 89, Colônia remoto) no topo. Além disso, três editais públicos da UE com requisitos genuínos de elegibilidade.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit hoje: teclift GmbH</strong> — Fullstack Java Spring Boot 3 / Angular / Kafka, Colônia, 100% remoto, 12 meses, 90–115 €/h*. Fit-Score 89, correspondência direta perfeita.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Campo Java/Angular denso</strong>: iSAX, BridgingIT, RED SAP, EnCo todos com Fit 87–88, todos altamente remotos, faixas 90–135 €/h*.</li>\n      <li><span class=\"chip hot\">IoT/Auto</span> <strong>Nicho premium presente</strong>: EnCo (Automotivo+Segurança, 87), Computer Futures (e-Mobilidade, 82), VARIUS Smart-Energy (85), um projeto KNX-Smart Home (74).</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Freelancer Compass 2026</strong>: Taxa média 103 €/h — <em>primeiro</em> declínio desde 2016. 43% sem carga de trabalho garantida.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Benchmark Malt</strong>: Taxa diária Java 700 €/dia (8–15 anos), 720 €/dia (15+ anos) — em ~8 h, isso dá aproximadamente 88–90 €/h.</li>\n      <li><span class=\"chip\">Employee</span> <strong>ELCA (Zurique)</strong>: Senior Java Engineer – Foco em IA Agêntica, CHF 140–190 mil*/ano, Fit 81 — oferta CH de alto nível no filtro.</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains</strong> Principal Forward Deployed Engineer (Desenvolvimento Nativo em IA, Multi-Cidade EU, Fit 82) &amp; <strong>Anthropic</strong> Engenheiro Claude-Code ($320–560 mil, EUA, Fit 70).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>iBMS 3.0 (Polícia NRW)</strong>: Stack se encaixa, mas ⚠️ parceiro necessário — faturamento ≥ 3 milhões €, ISO 27001 + 9001, mais verificação de confiabilidade pela polícia (VSA/OSiP).</li>\n      <li><span class=\"chip\">TED</span> <strong>2 editais adicionais</strong>: Software de documentação de casos de Berlim (⚠️ parceiro) e marco \"Serviços de Projeto\" de BW (correspondência de Stack mais fraca). Prazos 13.–14.07.</li>\n      <li><span class=\"chip\">Signal</span> <strong>Frequência de habilidades no painel</strong>: Remoto 53×, Java 48×, Spring Boot 40×, Angular 30×, Kubernetes 18×, Kafka 14×. Exatamente o cerne de Daniel.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El mercado freelance DACH en 2026 cede por primera vez desde el comienzo del estudio — la tarifa promedio cae a 103 €/h, y casi uno de cada dos no tiene cargas de trabajo aseguradas. El board se mantiene lleno: 66 ofertas agregadas, claramente dominadas por Java/Spring Boot, con teclift (Fit 89, Colonia remoto) en primer lugar. Además, tres licitaciones públicas de la UE con verdaderas barreras de elegibilidad.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top Fit hoy: teclift GmbH</strong> — Fullstack Java Spring Boot 3 / Angular / Kafka, Colonia, 100 % remoto, 12 meses, 90–115 €/h*. Fit-Score 89, coincidencia de núcleo limpia.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Campo Java/Angular denso</strong>: iSAX, BridgingIT, RED SAP, EnCo todos con Fit 87–88, todos altamente remotos, bandas 90–135 €/h*.</li>\n      <li><span class=\"chip hot\">IoT/Auto</span> <strong>Nicho Premium presente</strong>: EnCo (Automoción+Seguridad, 87), Computer Futures (e-Movilidad, 82), VARIUS Smart-Energy (85), un proyecto KNX-Smart-Home (74).</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Brújula Freelancer 2026</strong>: Ø tarifa 103 €/h — <em>primer</em> descenso desde 2016. 43 % sin carga de trabajo asegurada.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Malt-Benchmark</strong>: Tarifa diaria Java 700 €/día (8–15 a.), 720 €/día (15+ a.) — con ~8 h eso es aproximadamente 88–90 €/h.</li>\n      <li><span class=\"chip\">Empleado</span> <strong>ELCA (Zúrich)</strong>: Senior Java Engineer – Enfoque Agentic AI, CHF 140–190k*/año, Fit 81 — oferta CH de primera categoría en el filtro.</li>\n      <li><span class=\"chip\">Intrigante</span> <strong>JetBrains</strong> Principal Forward Deployed Engineer (Desarrollo AI-Nativo, EU-Multi-Ciudad, Fit 82) &amp; <strong>Anthropic</strong> Claude-Code-Engineer ($320–560k, US, Fit 70).</li>\n      <li><span class=\"chip hot\">TED</span> <strong>iBMS 3.0 (Policía NRW)</strong>: Stack coincide, pero ⚠️ se requiere socio — Ingresos ≥ 3 Mio. €, ISO 27001 + 9001, más verificación de confiabilidad policial (VSA/OSiP).</li>\n      <li><span class=\"chip\">TED</span> <strong>2 licitaciones más</strong>: Software de documentación de casos de Berlín (⚠️ Socio) y marco BW \"Servicios de Proyectos\" (coincidencia de stack más débil). Plazos 13.–14.07.</li>\n      <li><span class=\"chip\">Señal</span> <strong>Frecuencia de habilidades en el board</strong>: Remoto 53×, Java 48×, Spring Boot 40×, Angular 30×, Kubernetes 18×, Kafka 14×. Exactamente el núcleo de Daniel.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Kein Bundesliga-Spiel, kein Freiburg-Anpfiff — und trotzdem der lauteste Fußball-Tag des Sommers. Die WM 2026 in USA/Kanada/Mexiko ist im K.o.-Modus: heute endet das Achtelfinale-der-32, morgen startet das Achtelfinale. Deutschland ist schon draußen — im Elfmeterschießen an Paraguay gescheitert, der Schock des Turniers. Brasilien dagegen steht in der Runde der letzten 16 und spielt am Sonntag gegen Norwegen. Dazwischen: Freiburg in der Sommer-Vorbereitung, die abgeschlossene Bundesliga-Saison und der pausierte Brasileirão als Referenz-Anker.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay n.V., 3:4 im Elfmeterschießen (29.06.). Tah verschießt den entscheidenden Elfer, sein VAR-aberkanntes Kopfballtor davor. Größter Schock der WM bisher.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção im Achtelfinale</strong>: 2:1-Comeback gegen Japan. Gegner Norwegen am So 05.07., <strong>22:00 MESZ / 17:00 BRT</strong>, MetLife Stadium, New Jersey. Trainer: Ancelotti.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute endet die Runde der 32</strong>: Argentinien–Kap Verde (00:00 MESZ Sa / 19:00 BRT), Kolumbien–Ghana (03:30 MESZ Sa / 22:30 BRT), Australien–Ägypten (20:00 MESZ / 15:00 BRT).</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale ab morgen</strong>: Paraguay–Frankreich Sa 04.07. (23:00 MESZ / 18:00 BRT) ist Deutschlands Bezwinger gegen den Titel-Mitfavoriten.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>SCF in der Vorbereitung</strong>: Testspiele gegen Racing Straßburg gespielt, erstes Mannschaftstraining So 12.07. (11:00 MESZ / 06:00 BRT), Trainingslager Schruns 22.–31.07. Neuzugang: Keisuke Goto (10 Mio. €).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison 2025/26 abgeschlossen</strong>: Bayern Meister (89 Pkt., 35. Titel + Pokal-Double), Freiburg 7. (47 Pkt., Conference-League-Quali). Wolfsburg über die Relegation abgestiegen. Volle Abschluss-Tabelle unten.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: nach dem 18. Spieltag für die WM unterbrochen. Palmeiras führt mit 41 Pkt. Wiederanpfiff Mi 22.07. (São Paulo–Athletico-PR, 21:30 BRT). Volle Tabelle unten.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Kein Bundesliga-Spiel, kein Freiburg-Anpfiff — und trotzdem der lauteste Fußball-Tag des Sommers. Die WM 2026 in USA/Kanada/Mexiko ist im K.o.-Modus: heute endet das Achtelfinale-der-32, morgen startet das Achtelfinale. Deutschland ist schon draußen — im Elfmeterschießen an Paraguay gescheitert, der Schock des Turniers. Brasilien dagegen steht in der Runde der letzten 16 und spielt am Sonntag gegen Norwegen. Dazwischen: Freiburg in der Sommer-Vorbereitung, die abgeschlossene Bundesliga-Saison und der pausierte Brasileirão als Referenz-Anker.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland raus</strong>: 1:1 gegen Paraguay n.V., 3:4 im Elfmeterschießen (29.06.). Tah verschießt den entscheidenden Elfer, sein VAR-aberkanntes Kopfballtor davor. Größter Schock der WM bisher.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção im Achtelfinale</strong>: 2:1-Comeback gegen Japan. Gegner Norwegen am So 05.07., <strong>22:00 MESZ / 17:00 BRT</strong>, MetLife Stadium, New Jersey. Trainer: Ancelotti.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute endet die Runde der 32</strong>: Argentinien–Kap Verde (00:00 MESZ Sa / 19:00 BRT), Kolumbien–Ghana (03:30 MESZ Sa / 22:30 BRT), Australien–Ägypten (20:00 MESZ / 15:00 BRT).</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale ab morgen</strong>: Paraguay–Frankreich Sa 04.07. (23:00 MESZ / 18:00 BRT) ist Deutschlands Bezwinger gegen den Titel-Mitfavoriten.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>SCF in der Vorbereitung</strong>: Testspiele gegen Racing Straßburg gespielt, erstes Mannschaftstraining So 12.07. (11:00 MESZ / 06:00 BRT), Trainingslager Schruns 22.–31.07. Neuzugang: Keisuke Goto (10 Mio. €).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saison 2025/26 abgeschlossen</strong>: Bayern Meister (89 Pkt., 35. Titel + Pokal-Double), Freiburg 7. (47 Pkt., Conference-League-Quali). Wolfsburg über die Relegation abgestiegen. Volle Abschluss-Tabelle unten.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: nach dem 18. Spieltag für die WM unterbrochen. Palmeiras führt mit 41 Pkt. Wiederanpfiff Mi 22.07. (São Paulo–Athletico-PR, 21:30 BRT). Volle Tabelle unten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">No Bundesliga match, no Freiburg kickoff — yet the loudest football day of the summer. The 2026 World Cup in the USA, Canada, and Mexico is in knockout mode: today the round of 32 ends, tomorrow the round of 16 begins. Germany is already out — eliminated by Paraguay in a penalty shootout, the shock of the tournament. Brazil, meanwhile, has made the last 16 and plays Norway on Sunday. In between: Freiburg in summer prep, the completed Bundesliga season, and the paused Brasileirão as reference anchors.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany out</strong>: 1-1 vs. Paraguay a.e.t., 3-4 on penalties (June 29). Tah misses the deciding penalty after his VAR-disallowed header moments before. Biggest shock of the World Cup so far.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção in round of 16</strong>: 2-1 comeback vs. Japan. Opponent Norway on Sun. 07/05, <strong>10:00 PM CEST / 5:00 PM BRT</strong>, MetLife Stadium, New Jersey. Coach: Ancelotti.</li>\n      <li><span class=\"chip\">WM</span> <strong>Round of 32 ends today</strong>: Argentina–Cape Verde (12:00 AM CEST Sat / 7:00 PM BRT), Colombia–Ghana (3:30 AM CEST Sat / 10:30 PM BRT), Australia–Egypt (8:00 PM CEST / 3:00 PM BRT).</li>\n      <li><span class=\"chip\">WM</span> <strong>Round of 16 begins tomorrow</strong>: Paraguay–France Sat 07/04 (11:00 PM CEST / 6:00 PM BRT) is Germany's conqueror vs. the title favorite.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>SCF in preparation</strong>: Friendlies vs. Racing Strasbourg played, first team training Sun. 07/12 (11:00 AM CEST / 6:00 AM BRT), training camp Schruns 07/22–07/31. New signing: Keisuke Goto (€10M).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>2025/26 season complete</strong>: Bayern champions (89 pts, 35th title + DFB-Pokal double), Freiburg 7th (47 pts, Conference League qualification). Wolfsburg relegated via playoffs. Full final table below.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão paused</strong>: since matchday 18 for the World Cup. Palmeiras lead with 41 pts. Resumption Wed. 07/22 (São Paulo–Athletico-PR, 9:30 PM BRT). Full table below.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sem jogo da Bundesliga, sem saída do Freiburg — mas mesmo assim o dia de futebol mais barulhento do verão. A Copa 2026 nos EUA, Canadá e México está em fase eliminatória: hoje termina a primeira rodada de eliminação (das 32 seleções), amanhã começa oitava de final. Alemanha já está de fora — eliminada pelo Paraguai nos pênaltis, o choque do torneio. Brasil, porém, avançou às últimas 16 e joga Noruega no domingo. No meio: Freiburg em preparação de verão, a temporada da Bundesliga encerrada e o Brasileirão pausado como referência.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha eliminada</strong>: 1 a 1 contra Paraguai na prorrogação, 3 a 4 nos pênaltis (29/06). Tah perde o pênalti decisivo após gol de cabeça anulado pelo VAR momentos antes. Maior choque da Copa até agora.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção na oitava de final</strong>: vitória de 2 a 1 sobre Japão. Adversário Noruega no dom 05/07, <strong>22:00 MESZ / 17:00 BRT</strong>, MetLife Stadium, Nova Jersey. Técnico: Ancelotti.</li>\n      <li><span class=\"chip\">WM</span> <strong>Primeira fase elimina hoje</strong>: Argentina–Cabo Verde (00:00 MESZ sáb / 19:00 BRT), Colômbia–Gana (03:30 MESZ sáb / 22:30 BRT), Austrália–Egito (20:00 MESZ / 15:00 BRT).</li>\n      <li><span class=\"chip\">WM</span> <strong>Oitava de final a partir de amanhã</strong>: Paraguai–França sáb 04/07 (23:00 MESZ / 18:00 BRT) é o vencedor da Alemanha versus o favorito para o título.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>SCF em preparação</strong>: jogos amistosos contra Racing Strasburgo, primeiro treino da equipe dom 12/07 (11:00 MESZ / 06:00 BRT), acampamento de treinamento Schruns 22–31/07. Reforço: Keisuke Goto (€10 mi).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada 2025/26 encerrada</strong>: Bayern campeão (89 pts, 35º título + dobradinha de Pokal), Freiburg 7º (47 pts, qualificação Conference League). Wolfsburg rebaixado. Tabela final completa abaixo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausado</strong>: desde a 18ª rodada para a Copa. Palmeiras lidera com 41 pts. Retomada qua 22/07 (São Paulo–Atlético-PR, 21:30 BRT). Tabela completa abaixo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Sin partido de Bundesliga, sin salida del Freiburg — pero aun así el día de fútbol más ruidoso del verano. La Copa 2026 en EUA, Canadá y México está en fase de eliminación directa: hoy termina la primera ronda de eliminación (de 32 selecciones), mañana comienzan los octavos. Alemania ya está fuera — eliminada por Paraguay en penales, el shock del torneo. Brasil, en cambio, avanzó a los últimos 16 y juega contra Noruega el domingo. En medio: Freiburg en preparación de verano, la temporada de Bundesliga terminada y el Brasileirão pausado como referencia.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania eliminada</strong>: 1-1 contra Paraguay en prórroga, 3-4 en penales (29/06). Tah falla el penal decisivo tras un gol de cabeza anulado por VAR momentos antes. El choque más grande de la Copa hasta ahora.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção en octavos</strong>: victoria 2-1 sobre Japón. Rival Noruega el dom 05/07, <strong>22:00 MESZ / 17:00 BRT</strong>, MetLife Stadium, Nueva Jersey. Entrenador: Ancelotti.</li>\n      <li><span class=\"chip\">WM</span> <strong>Primera ronda termina hoy</strong>: Argentina–Cabo Verde (00:00 MESZ sáb / 19:00 BRT), Colombia–Ghana (03:30 MESZ sáb / 22:30 BRT), Australia–Egipto (20:00 MESZ / 15:00 BRT).</li>\n      <li><span class=\"chip\">WM</span> <strong>Octavos desde mañana</strong>: Paraguay–Francia sáb 04/07 (23:00 MESZ / 18:00 BRT) es el vencedor de Alemania versus el favorito para el título.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>SCF en preparación</strong>: amistosos contra Racing Estrasburgo, primer entrenamiento del equipo dom 12/07 (11:00 MESZ / 06:00 BRT), campamento de entrenamiento Schruns 22–31/07. Refuerzo: Keisuke Goto (€10 mi).</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Temporada 2025/26 concluida</strong>: Bayern campeón (89 pts, 35º título + doblete de Pokal), Freiburg 7º (47 pts, calificación Conference League). Wolfsburg descendido. Tabla final completa abajo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausado</strong>: desde la jornada 18 para la Copa. Palmeiras lideran con 41 pts. Reanudación mié 22/07 (São Paulo–Atlético-PR, 21:30 BRT). Tabla completa abajo.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute geht es los: Die Formel 1 rollt in Silverstone auf die Strecke — Runde 9, und zum ersten Mal seit 2021 wieder als Sprint-Wochenende mit zwei Rennen statt einem. Schon heute Nachmittag fällt die erste Entscheidung mit der Sprint-Quali. Die Ausgangslage ist klar wie selten: Mercedes führt beide Wertungen, und ausgerechnet Rookie Kimi Antonelli geht mit 40 Punkten Vorsprung auf seinen eigenen Teamkollegen Russell in dessen Heimrennen. Neu heute: Der WEC-Termin in São Paulo ist jetzt <em>offiziell bestätigt</em> — die 6h von Interlagos starten am 12.07. um 11:30 Uhr Ortszeit.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone-Sprint startet heute</strong>: FP1 12:30 BST / 08:30 BRT / 13:30 MESZ, Sprint-Quali 16:30 BST / 12:30 BRT / 17:30 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Hauptrennen So 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — für Daniel günstig, kurz nach elf Uhr vormittags.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt (Stand 28.06.) — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung (Stand 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo jetzt bestätigt</strong>: 6h von Interlagos So 12.07., Start 11:30 BRT / 16:30 MESZ. Toyota führt die Hersteller mit 132 Pkt.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin ist WM-Führender</strong> (193 Pkt, 7 vor Bezzecchi) — nächste Runde aber erst 10.–12.07. am Sachsenring, nicht dieses Wochenende.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute geht es los: Die Formel 1 rollt in Silverstone auf die Strecke — Runde 9, und zum ersten Mal seit 2021 wieder als Sprint-Wochenende mit zwei Rennen statt einem. Schon heute Nachmittag fällt die erste Entscheidung mit der Sprint-Quali. Die Ausgangslage ist klar wie selten: Mercedes führt beide Wertungen, und ausgerechnet Rookie Kimi Antonelli geht mit 40 Punkten Vorsprung auf seinen eigenen Teamkollegen Russell in dessen Heimrennen. Neu heute: Der WEC-Termin in São Paulo ist jetzt <em>offiziell bestätigt</em> — die 6h von Interlagos starten am 12.07. um 11:30 Uhr Ortszeit.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone-Sprint startet heute</strong>: FP1 12:30 BST / 08:30 BRT / 13:30 MESZ, Sprint-Quali 16:30 BST / 12:30 BRT / 17:30 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Hauptrennen So 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — für Daniel günstig, kurz nach elf Uhr vormittags.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt (Stand 28.06.) — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung (Stand 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo jetzt bestätigt</strong>: 6h von Interlagos So 12.07., Start 11:30 BRT / 16:30 MESZ. Toyota führt die Hersteller mit 132 Pkt.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin ist WM-Führender</strong> (193 Pkt, 7 vor Bezzecchi) — nächste Runde aber erst 10.–12.07. am Sachsenring, nicht dieses Wochenende.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's happening today: Formula 1 takes the track at Silverstone — round 9, and for the first time since 2021 as a sprint weekend with two races instead of one. The first decision falls this afternoon with sprint qualifying. The picture is crystal clear: Mercedes leads both championships, and rookie Kimi Antonelli heads into his home race with a 40-point lead over his own teammate Russell. New today: the WEC round in São Paulo is now <em>officially confirmed</em> — the 6h of Interlagos starts on 12.07. at 11:30 local time.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone sprint kicks off today</strong>: FP1 12:30 BST / 08:30 BRT / 13:30 MESZ, sprint qualifying 16:30 BST / 12:30 BRT / 17:30 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Main race Sun 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — perfect for Daniel, shortly after eleven in the morning.</li>\n      <li><span class=\"chip\">F1 WC</span> <strong>Antonelli leads</strong> the drivers' championship with 171 pts (as of 28.06.) — 40 ahead of teammate Russell (131), 46 ahead of Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominates</strong>: 302 to 204 points over Ferrari in the constructors — 98-point lead (as of 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo now confirmed</strong>: 6h of Interlagos Sun 12.07., start 11:30 BRT / 16:30 MESZ. Toyota leads the manufacturers with 132 pts.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin is championship leader</strong> (193 pts, 7 ahead of Bezzecchi) — but the next round isn't until 10.–12.07. at the Sachsenring, not this weekend.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Está acontecendo hoje: a Fórmula 1 desce à pista em Silverstone — etapa 9, e pela primeira vez desde 2021 como um fim de semana de sprint com duas corridas em vez de uma. A primeira decisão cai à tarde com a classificação de sprint. O quadro está límpido como nunca: Mercedes lidera ambos os campeonatos, e o novato Kimi Antonelli entra em sua corrida em casa com 40 pontos à frente do próprio colega de equipe Russell. Novidade hoje: a etapa da WEC em São Paulo agora está <em>oficialmente confirmada</em> — as 6h de Interlagos começam no dia 12.07. às 11:30 horário local.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint de Silverstone sai do chão hoje</strong>: FP1 12:30 BST / 08:30 BRT / 13:30 MESZ, classificação de sprint 16:30 BST / 12:30 BRT / 17:30 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Corrida principal dom 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — perfeito para Daniel, logo após as onze da manhã.</li>\n      <li><span class=\"chip\">F1-WC</span> <strong>Antonelli lidera</strong> o campeonato de pilotos com 171 pts (em 28.06.) — 40 à frente do colega Russell (131), 46 à frente de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 contra 204 pontos sobre a Ferrari na constructors — liderança de 98 pontos (em 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo agora confirmado</strong>: 6h de Interlagos dom 12.07., saída 11:30 BRT / 16:30 MESZ. Toyota lidera os fabricantes com 132 pts.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin é líder do campeonato</strong> (193 pts, 7 à frente de Bezzecchi) — mas a próxima etapa é só no 10.–12.07. no Sachsenring, não este fim de semana.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Está pasando hoy: la Fórmula 1 rueda en Silverstone — ronda 9, y por primera vez desde 2021 como un fin de semana de sprint con dos carreras en lugar de una. La primera decisión cae esta tarde con la clasificación de sprint. El panorama está cristalino: Mercedes lidera ambos campeonatos, y el novato Kimi Antonelli entra en su carrera en casa con 40 puntos de ventaja sobre su compañero de equipo Russell. Novedad hoy: la ronda del WEC en São Paulo ahora está <em>oficialmente confirmada</em> — las 6h de Interlagos comienzan el 12.07. a las 11:30 hora local.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint de Silverstone arranca hoy</strong>: FP1 12:30 BST / 08:30 BRT / 13:30 MESZ, clasificación de sprint 16:30 BST / 12:30 BRT / 17:30 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Carrera principal dom 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — perfecto para Daniel, poco después de las once de la mañana.</li>\n      <li><span class=\"chip\">F1-WC</span> <strong>Antonelli lidera</strong> el campeonato de pilotos con 171 pts (al 28.06.) — 40 puntos adelante de Russell (131), 46 adelante de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 contra 204 puntos sobre Ferrari en constructores — ventaja de 98 puntos (al 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo ahora confirmado</strong>: 6h de Interlagos dom 12.07., salida 11:30 BRT / 16:30 MESZ. Toyota lidera fabricantes con 132 pts.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin es líder del campeonato</strong> (193 pts, 7 adelante de Bezzecchi) — pero la próxima ronda es hasta el 10.–12.07. en Sachsenring, no este fin de semana.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiges, kühl-trockenes Wochenende zum Aufwärmen — und dann rollt die Region ins Fest-Wochenende: Vom 09. bis 12. Juli läuft in Jacarezinho, keine 15 km von zu Hause, die 31. FETEXAS mit Rodeo, Vergnügungspark und großen Sertanejo-Shows. Für dieses Wochenende gibt es das Kinder-Theater „João e Maria\" in Londrina als sicheren Sonntags-Ausflug. Und eine richtig gute Nachricht bei der Gesundheit: Denguefälle in Paraná liegen aktuell 94 % unter dem Vorjahr.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENT</span> <strong>31. FETEXAS Jacarezinho</strong>: 09.–12.07., freier Eintritt, Rodeo + Vergnügungspark + Shows (Leonardo Sa, Sorriso Maroto So). Das Highlight nächste Woche — ~12 km von Ribeirão Claro.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Trocken & kühl</strong>: heute 15°/27°, 0 % Regen; Wochenende 12–15° morgens bis 22°. Sonnig, aber Winter-Morgen — warm anziehen. <em>Nur Climatempo, nicht gegengeprüft.</em></li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue −94 %</strong>: Paraná 5.251 bestätigte Fälle (KW 01–24/2026) vs. 87.896 im Vorjahr. Region Londrina & Jacarezinho weit ruhiger als 2025.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>„João e Maria\" in Londrina</strong>: sonntags 15:30 im Aurora Shopping, R$ 20 / R$ 10 (Kinder). Der Wochenend-Pick für So, 05.07.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Sesi Cultura in Londrina</strong>: kostenlose Familienshows 01.–05.07 — genauer Termin/Ort nur über Buchungsportal.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Winterferien</strong> starten <strong>Montag 13.07</strong>. Zweites Halbjahr ab 03.08. Enddatum unklar (24./26./31.07 — Quellen widersprechen sich).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ruhiges, kühl-trockenes Wochenende zum Aufwärmen — und dann rollt die Region ins Fest-Wochenende: Vom 09. bis 12. Juli läuft in Jacarezinho, keine 15 km von zu Hause, die 31. FETEXAS mit Rodeo, Vergnügungspark und großen Sertanejo-Shows. Für dieses Wochenende gibt es das Kinder-Theater „João e Maria\" in Londrina als sicheren Sonntags-Ausflug. Und eine richtig gute Nachricht bei der Gesundheit: Denguefälle in Paraná liegen aktuell 94 % unter dem Vorjahr.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENT</span> <strong>31. FETEXAS Jacarezinho</strong>: 09.–12.07., freier Eintritt, Rodeo + Vergnügungspark + Shows (Leonardo Sa, Sorriso Maroto So). Das Highlight nächste Woche — ~12 km von Ribeirão Claro.</li>\n      <li><span class=\"chip\">WETTER</span> <strong>Trocken & kühl</strong>: heute 15°/27°, 0 % Regen; Wochenende 12–15° morgens bis 22°. Sonnig, aber Winter-Morgen — warm anziehen. <em>Nur Climatempo, nicht gegengeprüft.</em></li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Dengue −94 %</strong>: Paraná 5.251 bestätigte Fälle (KW 01–24/2026) vs. 87.896 im Vorjahr. Region Londrina & Jacarezinho weit ruhiger als 2025.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>„João e Maria\" in Londrina</strong>: sonntags 15:30 im Aurora Shopping, R$ 20 / R$ 10 (Kinder). Der Wochenend-Pick für So, 05.07.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Sesi Cultura in Londrina</strong>: kostenlose Familienshows 01.–05.07 — genauer Termin/Ort nur über Buchungsportal.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Winterferien</strong> starten <strong>Montag 13.07</strong>. Zweites Halbjahr ab 03.08. Enddatum unklar (24./26./31.07 — Quellen widersprechen sich).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A calm, cool-and-dry weekend to warm up in — and then the region rolls into festival week: July 9–12, less than 15 km from home, the 31st FETEXAS in Jacarezinho brings a rodeo, amusement park, and major sertanejo concerts. This weekend, the children's theater \"João e Maria\" in Londrina is your sure Sunday outing. And great health news: dengue cases in Paraná are down 94% year-over-year.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENT</span> <strong>31st FETEXAS Jacarezinho</strong>: July 9–12, free entry, rodeo + amusement park + concerts (Leonardo Sa, Sorriso Maroto Sun). The highlight next week — ~12 km from Ribeirão Claro.</li>\n      <li><span class=\"chip\">WEATHER</span> <strong>Dry & cool</strong>: today 15°/27°, 0% rain; weekend 12–15° mornings to 22°. Sunny, but winter mornings — bundle up. <em>Climatempo only, not cross-checked.</em></li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue −94%</strong>: Paraná 5,251 confirmed cases (weeks 01–24/2026) vs. 87,896 last year. Londrina & Jacarezinho region far quieter than 2025.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>\"João e Maria\" in Londrina</strong>: Sundays 3:30 PM at Aurora Shopping, R$ 20 / R$ 10 (kids). This weekend's pick for Sun, July 5.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Sesi Cultura in Londrina</strong>: free family shows July 1–5 — exact time/location only via booking portal.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Winter break</strong> starts <strong>Monday, July 13</strong>. Classes resume Aug 3. End date unclear (July 24/26/31 — sources conflict).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um fim de semana tranquilo, fresco e seco para aquecer — e depois a região entra no fim de semana de festival: De 09 a 12 de julho, a 31ª FETEXAS funciona em Jacarezinho, a menos de 15 km de casa, com rodeio, parque de diversões e grandes shows de sertanejo. Para este fim de semana, há o teatro infantil \"João e Maria\" em Londrina como um passeio certo no domingo. E uma notícia bem boa na saúde: os casos de dengue no Paraná estão 94% abaixo do ano passado.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENTO</span> <strong>31ª FETEXAS Jacarezinho</strong>: 09–12/07, entrada gratuita, rodeio + parque de diversões + shows (Leonardo Sa, Sorriso Maroto dom). O destaque da próxima semana — ~12 km de Ribeirão Claro.</li>\n      <li><span class=\"chip\">TEMPO</span> <strong>Seco e fresco</strong>: hoje 15°/27°, 0% chuva; fim de semana 12–15° pela manhã até 22°. Ensolarado, mas manhãs de inverno — agasalhe bem. <em>Apenas Climatempo, não validado com outro serviço.</em></li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue −94%</strong>: Paraná 5.251 casos confirmados (sem 01–24/2026) vs. 87.896 no ano passado. Região de Londrina e Jacarezinho muito mais tranquila que 2025.</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>\"João e Maria\" em Londrina</strong>: domingos 15:30 no Aurora Shopping, R$ 20 / R$ 10 (crianças). O passeio de fim de semana para dom, 05/07.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Sesi Cultura em Londrina</strong>: shows gratuitos para famílias 01–05/07 — horário/local precisos apenas via portal de reservas.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Férias de inverno</strong> começam <strong>segunda 13/07</strong>. Segundo semestre a partir de 03/08. Data de término incerta (24/07, 26/07 ou 31/07 — as fontes discordam).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un fin de semana tranquilo, fresco y seco para abrigarse — y luego la región entra en el fin de semana del festival: Del 9 al 12 de julio, la 31ª FETEXAS funciona en Jacarezinho, a menos de 15 km de casa, con rodeo, parque de diversiones y grandes conciertos de sertanejo. Para este fin de semana, hay teatro infantil \"João e Maria\" en Londrina como un paseo seguro para el domingo. Y una noticia muy buena en salud: los casos de dengue en Paraná están 94% por debajo del año pasado.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENTO</span> <strong>31ª FETEXAS Jacarezinho</strong>: 09–12/07, entrada libre, rodeo + parque de diversiones + conciertos (Leonardo Sa, Sorriso Maroto dom). El punto culminante de la próxima semana — ~12 km de Ribeirão Claro.</li>\n      <li><span class=\"chip\">TIEMPO</span> <strong>Seco y fresco</strong>: hoy 15°/27°, 0% lluvia; fin de semana 12–15° por la mañana hasta 22°. Soleado, pero mañanas de invierno — abríguense bien. <em>Solo Climatempo, no validado con otro servicio.</em></li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue −94%</strong>: Paraná 5.251 casos confirmados (sem 01–24/2026) vs. 87.896 el año pasado. Región de Londrina y Jacarezinho mucho más tranquila que 2025.</li>\n      <li><span class=\"chip\">PASEO</span> <strong>\"João e Maria\" en Londrina</strong>: domingos 15:30 en Aurora Shopping, R$ 20 / R$ 10 (niños). El paseo de fin de semana para dom, 05/07.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Sesi Cultura en Londrina</strong>: funciones gratuitas para familias 01–05/07 — hora/lugar exactos solo a través del portal de reservas.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Vacaciones de invierno</strong> comienzan <strong>lunes 13/07</strong>. Segundo semestre a partir de 03/08. Fecha de término incierta (24/07, 26/07 o 31/07 — las fuentes no concuerdan).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Freitag, der 3. Juli — Wochenthema <em>Reise &amp; Verkehr</em>, heute mit dem Schwerpunkt <em>Autofahren, Auto mieten &amp; Panne unterwegs</em>. Die früheren Reise-Tage haben Flughafen, Grenze, Bus, Unterkunft und das Online-Buchen abgedeckt; heute sitzt du selbst am Steuer: einen <em>Mietwagen</em> bei der <em>Autovermietung</em> abholen, <em>tanken</em>, an der <em>Mautstelle</em> das <em>Pedágio</em> zahlen, sicher <em>überholen</em> — und wissen, was zu sagen ist, wenn du eine <em>Reifenpanne</em> hast oder das Auto <em>liegenbleibt</em>. 31 Einträge, 12 Verben mit voller Konjugation (davon 3 Auffrischungen aus dem Juni-Reisetag), plus die brasilianischen Pedágio-Wörter und der mexikanische Ausdruck für einen platten Reifen.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>EN to park ≠ DE parken, aber Vorsicht bei „das Parkett\"</strong> — und wichtiger: PT <em>estacionar</em> = parken, doch <em>a estação</em> heißt „Bahnhof/Station\", nicht „Parkplatz\". Der Parkplatz ist <em>o estacionamento</em> (BR) / <em>el estacionamiento</em> (ES-MX).</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES rebasar ≠ DE „rasen\"</strong> — <em>rebasar</em> heißt in Mexiko „überholen\", nicht „rasen\". Und <em>rebasar</em> ≠ <em>rebosar</em> („überlaufen\") — ein Buchstabe, zwei Welten.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o pedágio</strong> — in Brasilien heißt die Maut <em>pedágio</em> (EP: <em>portagem</em>). Auf Daniels Strecken (BR-153, BR-369, PR-151) betreibt EPR Litoral Pioneiro die <em>praças de pedágio</em>; die Kabinen nehmen PIX, Bargeld und Karte.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o estepe</strong> — das Reserverad heißt in Brasilien umgangssprachlich <em>estepe</em> (von engl. „stepney\"), nicht <em>pneu suplente</em> wie in Portugal. „Reifen wechseln\" = <em>trocar o pneu</em>, das Ersatzrad holen = <em>pegar o estepe</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>furar / se ponchó</strong> — „einen Platten haben\" ist BR <em>furar o pneu</em> (<em>o pneu furou</em>), ES-MX <em>poncharse la llanta</em> (<em>se ponchó la llanta</em>). In Mexiko ist <em>ponchar</em> Standard; <em>pinchar</em> ist eher Spanien/Südamerika.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE liegenbleiben → Perfekt mit „sein\"</strong> — wenn das Auto stehenbleibt: <em>ich bin liegengeblieben</em>, nicht <em>*habe liegengeblieben</em>. Aber <em>anhalten</em> (bewusst stoppen) nimmt <em>haben</em>: <em>ich habe angehalten</em>. Zwei ähnliche Verben, zwei Hilfsverben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE abbiegen → „sein\"</strong>, stark: <em>ich bog ab</em>, <em>ich bin abgebogen</em>. <strong>abschleppen → „haben\"</strong>, schwach: <em>ich habe abgeschleppt</em>. Bewegung mit Richtungswechsel = sein; ein Objekt schleppen = haben.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT alugar</strong> (mieten) hat den <em>g→gu</em>-Trap: 1. Person Perfekt <em>aluguei</em>, Subjuntivo <em>alugue</em> — das u hält das g hart. Genauso <em>verificar</em> mit <em>c→qu</em>: <em>verifiquei</em>, <em>verifique</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT abastecer</strong> (tanken) hat den <em>c→ç</em>-Trap vor a/o: <em>eu abasteço</em>, Subjuntivo <em>abasteça</em> — das ç hält den weichen s-Laut.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>der Mietwagen (m), die Reifenpanne (f), das Reserverad (n)</strong> — drei Genera. PT: <em>o carro alugado (m), o pneu furado (m), o estepe (m)</em>; ES-MX: <em>el carro rentado (m), la llanta ponchada (f), la llanta de refacción (f)</em>. Genus nicht raten.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Mein Auto ist liegengeblieben.</strong> = PT <em>Meu carro quebrou / deu pane.</em> = ES-MX <em>Mi carro se descompuso.</em> Der Satz, den du am Pannenrand brauchst.</li>\n    </ul></div>",

(function () {

  })();

  function urlFor(catId, date, lang) {
    const cat = M.categories.find(c => c.id === catId);
    let useLang = 'de';
    if (cat) {
      const entry = cat.entries.find(e => e.date === date);
      if (entry && Array.isArray(entry.langs) && entry.langs.includes(lang)) {
        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function headlineFor(entry, lang) {
    if (!entry) return '';
    if (entry.headlines && entry.headlines[lang]) return entry.headlines[lang];
    return entry.headline || '';
  }

  function tldrFor(cat, lang) {
    if (cat.latestTldrHtmlByLang && cat.latestTldrHtmlByLang[lang]) {
      return cat.latestTldrHtmlByLang[lang];
    }
    return cat.latestTldrHtml || '';
  }
  const navGroups = $('#nav-groups');
  // Grouped nav config — drives BOTH the sidebar and the home tile grid so the
  // two never drift. Each group has a `header` (the .nav-label text, or null for
  // a standalone/unheadered group like jobs) and the ordered category ids it
  // contains. The flat order here must match build_manifest.CATEGORIES; a
  // category missing from every group would silently never render, so
  // renderSidebar/renderHome assert coverage against M.categories.
  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport
    { header: 'Sport',      cats: ['football', 'motorsport'] },
    { header: 'Freizeit',   cats: ['family'] },
    { header: 'Sprachen',   cats: ['learn-language'] }, // own trailing section
  ];
  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids
  // not present in M (defensive) and warns in the console about any manifest
  // category not placed in a group, so adding a category without updating
  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };

    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {

  }

  function fmtDate(d) {

  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);

    });
  }

  // Home-card TL;DR snapshot caps the bullet list at this many items — the

  const HOME_TLDR_BULLET_CAP = 5;
  // The active route as {catId, date}, parsed from the hash (#cat/date).

  function renderDates(container, cat, activeDate) {
