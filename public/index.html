<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

      "latestTldrHtmlByLang": {

        "en": "<div class=\"tldr\"><p class=\"lead\">For the first time in years, the ECB <em>and</em> the Fed are tightening simultaneously — one has already raised rates, the other is threatening to. For you, that means: a stronger euro at your back, a stronger dollar as headwind for the real. EUR/BRL stands at <strong>5.8925</strong> on the ECB's June 23 close — about a cent firmer for the real than Monday, but the picture remains: the real is stuck between a record-breaking election-year stimulus and a globally stronger dollar.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8925</strong> (ECB fixing June 23) — vs Monday (5.9020) slightly real-stronger; USD/BRL 5.1725, intraday today towards 5.18. Cross-check clean (0.0% deviation).</li>\n      <li><span class=\"chip hot\">Central banks</span> <strong>ECB has hiked</strong> (+25 bps on June 11, deposit rate now 2.25%) — first hike in ~3 years, driven by war-related inflation. Euro tailwind for your invoices.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed holds at 3.50–3.75%</strong>, but the dot plot flips: median now 3.8% by year-end, market prices ~68% September hike odds. DXY at 13-month high (~101.4).</li>\n      <li><span class=\"chip\">Brazil</span> <strong>Selic at 14.25%</strong> after 3rd mini-cut — but IPCA 4.72% above target band, election-year fiscal R$700 billion, debt ratio toward 95% of GDP. Carry cushion yes, fiscal risk remains.</li>\n      <li><span class=\"chip good\">Commodities</span> <strong>Brent drops to 76.4 $</strong> (-0.8%) after US-Iran ceasefire — global disinflation tailwind, takes some pressure off central banks.</li>\n      <li><span class=\"chip\">Growth</span> Brazil Q1 +1.1% QoQ; BBVA raises 2026 GDP forecast to 2.1%. Economy supports — that props up the real from the real-side.</li>\n      <li><span class=\"chip\">Positioning</span> CFTC: speculators net +41.0K BRL contracts long (slightly unwound). EWZ at $34.27, but 5-day flows -$148 million — money leaving short-term.</li>\n      <li><span class=\"chip\">Confidence</span> The forecast odds below are <em>my conviction</em>, not market-implied probability. The spot anchors above are live and dated.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Pela primeira vez em anos, o BCE <em>e</em> o Fed estão apertando simultaneamente — um já aumentou, o outro está ameaçando. Para você, isso significa: euro mais forte te protegendo, dólar mais forte como contravento para o real. EUR/BRL está em <strong>5,8925</strong> no fechamento do BCE de 23.06 — cerca de um centavo mais firme para o real do que segunda-feira, mas o quadro permanece: o real está preso entre estímulo fiscal recorde em ano eleitoral e um dólar globalmente mais forte.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8925</strong> (Fixação BCE 23.06) — vs segunda-feira (5,9020) ligeiramente mais firme para o real; USD/BRL 5,1725, intraday hoje em direção a 5,18. Verificação de taxa cruzada limpa (desvio 0,0%).</li>\n      <li><span class=\"chip hot\">Bancos centrais</span> <strong>BCE levantou taxa</strong> (+25 bps em 11.06, taxa de depósito agora 2,25%) — primeira alta em ~3 anos, impulsionada por inflação de guerra. Proteção em euros para suas faturas.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Fed mantém 3,50–3,75%</strong>, mas o gráfico de pontos vira: mediana agora 3,8% ao final do ano, mercado precifica ~68% de probabilidade de alta em setembro. DXY em alta de 13 meses (~101,4).</li>\n      <li><span class=\"chip\">Brasil</span> <strong>Selic em 14,25%</strong> após 3º corte mini — mas IPCA 4,72% acima da meta, fiscal de ano eleitoral R$ 700 bilhões, relação dívida em direção a 95% do PIB. Proteção de carry sim, risco fiscal permanece.</li>\n      <li><span class=\"chip good\">Commodities</span> <strong>Brent cai para 76,4 $</strong> (-0,8%) após cessar-fogo EUA-Irã — proteção global de desinflação, alivia pressão dos bancos centrais.</li>\n      <li><span class=\"chip\">Crescimento</span> Brasil Q1 +1,1% trimestral; BBVA levanta previsão de PIB 2026 para 2,1%. Economia sustenta — isso apoia o real do lado real.</li>\n      <li><span class=\"chip\">Posicionamento</span> CFTC: especuladores net +41,0K contratos BRL comprados (ligeiramente reduzido). EWZ em 34,27 $, mas fluxos de 5 dias -148 milhões $ — dinheiro saindo no curto prazo.</li>\n      <li><span class=\"chip\">Confiança</span> As probabilidades de previsão abaixo são <em>minha convicção</em>, não probabilidade implícita no mercado. Os âncoras spot acima são ao vivo e datadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Por primera vez en años, el BCE <em>y</em> la Fed están apretando simultáneamente — uno ya subió, el otro está amenazando. Para ti, significa: euro más fuerte te protege, dólar más fuerte como viento en contra para el real. EUR/BRL está en <strong>5,8925</strong> en el cierre del BCE del 23.06 — aproximadamente un centavo más firme para el real que el lunes, pero la imagen permanece: el real está atrapado entre estímulo fiscal récord en año electoral y un dólar globalmente más fuerte.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8925</strong> (Fijación BCE 23.06) — vs lunes (5,9020) ligeramente más firme para el real; USD/BRL 5,1725, intraday hoy hacia 5,18. Verificación de tipo cruzado limpia (desviación 0,0%).</li>\n      <li><span class=\"chip hot\">Bancos centrales</span> <strong>BCE subió tasa</strong> (+25 puntos básicos el 11.06, tasa de depósito ahora 2,25%) — primera alza en ~3 años, impulsada por inflación por guerra. Protección en euros para tus facturas.</li>\n      <li><span class=\"chip hot\">EE.UU.</span> <strong>Fed mantiene 3,50–3,75%</strong>, pero el gráfico de puntos gira: mediana ahora 3,8% para fin de año, mercado valúa ~68% de probabilidad de alza en septiembre. DXY en máximo de 13 meses (~101,4).</li>\n      <li><span class=\"chip\">Brasil</span> <strong>Selic en 14,25%</strong> tras 3er mini corte — pero IPCA 4,72% arriba de meta, fiscal año electoral R$ 700 mil millones, ratio deuda hacia 95% del PIB. Colchón de carry sí, riesgo fiscal permanece.</li>\n      <li><span class=\"chip good\">Commodities</span> <strong>Brent cae a 76,4 $</strong> (-0,8%) tras cese del fuego EE.UU.-Irán — protección global de desinflación, alivia presión de bancos centrales.</li>\n      <li><span class=\"chip\">Crecimiento</span> Brasil Q1 +1,1% trimestral; BBVA eleva pronóstico PIB 2026 a 2,1%. Economía sostiene — eso respalda el real desde el lado real.</li>\n      <li><span c TH <strong>1.734 $</strong> (+0,17 %) — beide rund 17–40 % unter den jüngsten Hochs, BTC −17,4 % im Monat. Spot-ETF-Abflüsse 2026 summieren sich auf Milliarden.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~4.074 $</strong> (−0,96 %, 24.06.) Richtung 7-Monats-Tief — Fed-Zinserhöhungs-Erwartungen schlagen den Iran-Friedens-Optimismus.</li>\n      <li><span class=\"chip good\">ÖL</span> <strong>Brent 75,75 $ / WTI 71,98 $</strong> (je ~−1,7 %, 24.06.) — Iran darf wieder verkaufen (60-Tage-Lizenz, 30 Mio.+ Barrel verschifft), OPEC+ legt Angebot drauf.</li>\n      <li><span class=\"chip\">SEKTOR</span> <strong>Krypto-Sektoren rot</strong>: DOGE 0,0788 $ (−4,33 %), SOL 68,88 $ (−6,26 %), KI-Token TAO 216,65 $ / RENDER 1,59 $ / FET 0,1805 $ alle im Minus — High-Beta bricht im Risk-off zuerst.</li>\n    </ul></div>",

>1.734 $</strong> (+0,17 %) — beide rund 17–40 % unter den jüngsten Hochs, BTC −17,4 % im Monat. Spot-ETF-Abflüsse 2026 summieren sich auf Milliarden.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~4.074 $</strong> (−0,96 %, 24.06.) Richtung 7-Monats-Tief — Fed-Zinserhöhungs-Erwartungen schlagen den Iran-Friedens-Optimismus.</li>\n      <li><span class=\"chip good\">ÖL</span> <strong>Brent 75,75 $ / WTI 71,98 $</strong> (je ~−1,7 %, 24.06.) — Iran darf wieder verkaufen (60-Tage-Lizenz, 30 Mio.+ Barrel verschifft), OPEC+ legt Angebot drauf.</li>\n      <li><span class=\"chip\">SEKTOR</span> <strong>Krypto-Sektoren rot</strong>: DOGE 0,0788 $ (−4,33 %), SOL 68,88 $ (−6,26 %), KI-Token TAO 216,65 $ / RENDER 1,59 $ / FET 0,1805 $ alle im Minus — High-Beta bricht im Risk-off zuerst.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This brief is written before US market open (~06:00 BRT). The two biggest catalysts of the day still lie ahead: Nvidia's annual shareholder meeting at 9:00 PT (~13:00 BRT) and Micron's Q3 earnings after US close. All NVDA and MU values here are pre-market or forward-dated—not traded intraday results. The backdrop: a two-day AI infrastructure selloff pressured indexes yesterday. Futures are slightly positive early today, the market waiting for Micron as the next proof point. Crypto is deep and quiet; gold and oil continue falling.</p>\n    <ul>\n      <li><span class=\"chip\">NVDA</span> <strong>Today is shareholder meeting day</strong>: Closed 06-23 at <strong>$200.04 (−4.13 %)</strong> in the AI selloff; pre-market 06-24 <strong>+0.64 % at $201.27</strong>. Annual meeting virtual at 9:00 PT — historically the stock moves less than 2 % afterward (2024 and 2025).</li>\n      <li><span class=\"chip hot\">MICRON</span> <strong>Binary event tonight</strong>: MU crashed 06-23 <strong>−13.18 % to $1,051.77</strong> — from a record high $1,211.38 on 06-22 (+324 % YTD). Q3 earnings after US close (consensus $34.66B revenue, $19.95 EPS); pre-market <strong>+3.73 %</strong>. BofA raised price target to $1,500.</li>\n      <li><span class=\"chip hot\">HEADS UP</span> <strong>AI infrastructure selloff, day 2</strong>: Nasdaq <strong>−2.21 %</strong>, S&amp;P 500 <strong>−1.44 %</strong> on 06-23 — doubts on hyperscaler ROI plus a ~10-% crash in Korean chip stocks (20-min halt). Futures early today: Nasdaq-100 +0.52 %, S&amp;P +0.13 %.</li>\n      <li><span class=\"chip\">TSLA</span> <strong>Tesla −5.79 %</strong> to $381.61 on 06-23, weakest Mag-7 performer; pre-market +0.67 %. MSFT bucked the trend with +1.80 % ($373.94).</li>\n      <li><span class=\"chip hot\">CRYPTO</span> <strong>Deep and quiet</strong>: BTC <strong>$62,654</strong> (+0.57 % 24h, Yahoo 06-24 09:04 UTC), ETH <strong>$1,734</strong> (+0.17 %) — both 17–40 % below recent highs; BTC −17.4 % on the month. Spot ETF outflows in 2026 sum to billions.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~$4,074</strong> (−0.96 %, 06-24) heading toward a 7-month low — Fed rate-hike expectations override Iran peace optimism.</li>\n      <li><span class=\"chip good\">OIL</span> <strong>Brent $75.75 / WTI $71.98</strong> (each ~−1.7 %, 06-24) — Iran licensed to sell again (60-day license, 30M+ barrels shipped), OPEC+ adding supply.</li>\n      <li><span class=\"chip\">SECTOR</span> <strong>Crypto sectors red</strong>: DOGE $0.0788 (−4.33 %), SOL $68.88 (−6.26 %), AI tokens TAO $216.65 / RENDER $1.59 / FET $0.1805 all down — high-beta breaks first in risk-off.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Este boletim é escrito antes da abertura do mercado americano (~06:00 BRT). Os dois maiores catalisadores do dia ainda estão por vir: a assembleia geral anual da Nvidia às 9:00 PT (~13:00 BRT) e os resultados do Q3 da Micron após o fechamento americano. Todos os valores de NVDA e MU aqui são pré-mercado ou datados — não são resultados negociados intraday. O cenário: um sell-off de dois dias em infraestrutura de IA pressionou os índices ontem. Futuros estão ligeiramente positivos no início de hoje, o mercado esperando pela Micron como próximo ponto de prova. Cripto está profundo e silencioso; ouro e petróleo continuam caindo.</p>\n    <ul>\n      <li><span class=\"chip\">NVDA</span> <strong>Hoje é dia de assembleia</strong>: Fechou em 23/06 em <strong>US$ 200,04 (−4,13 %)</strong> no sell-off de IA; pré-mercado em 24/06 <strong>+0,64 % em US$ 201,27</strong>. Assembleia anual virtual às 9:00 PT — historicamente a ação sobe menos de 2 % depois (2024 e 2025).</li>\n      <li><span class=\"chip hot\">MICRON</span> <strong>Evento binário esta noite</strong>: MU desabou em 23/06 <strong>−13,18 % para US$ 1.051,77</strong> — a partir de uma máxima recorde de US$ 1.211,38 em 22/06 (+324 % no ano). Resultados do Q3 após fechamento americano (consenso US$ 34,66 bi de receita, US$ 19,95 de EPS); pré-mercado <strong>+3,73 %</strong>. BofA elevou o preço-alvo para US$ 1.500.</li>\n      <li><span class=\"chip hot\">ATENÇÃO</span> <strong>Sell-off de infraestrutura de IA, dia 2</strong>: Nasdaq <strong>−2,21 %</strong>, S&amp;P 500 <strong>−1,44 %</strong> em 23/06 — dúvidas sobre ROI dos hiperscalers mais um crash de ~10 % em ações de chips coreanas (parada de 20 minutos). Futuros no início de hoje: Nasdaq-100 +0,52 %, S&amp;P +0,13 %.</li>\n      <li><span class=\"chip\">TSLA</span> <strong>Tesla −5,79 %</strong> para US$ 381,61 em 23/06, o pior desempenho entre Mag-7; pré-mercado +0,67 %. MSFT foi contra a tendência com +1,80 % (US$ 373,94).</li>\n      <li><span class=\"chip hot\">CRIPTO</span> <strong>Profundo e silencioso</strong>: BTC <strong>US$ 62.654</strong> (+0,57 % em 24h, Yahoo 24/06 09:04 UTC), ETH <strong>US$ 1.734</strong> (+0,17 %) — ambos 17–40 % abaixo de máximas recentes; BTC −17,4 % no mês. Saídas de ETFs spot em 2026 somam bilhões.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro ~US$ 4.074</strong> (−0,96 %, 24/06) rumo a uma mínima de 7 meses — expectativas de aumento de taxa do Fed superam otimismo de paz no Irã.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Brent US$ 75,75 / WTI US$ 71,98</strong> (cada ~−1,7 %, 24/06) — Irã autorizado a vender novamente (licença de 60 dias, 30 mi+ barris enviados), OPEC+ adicionando oferta.</li>\n      <li><span class=\"chip\">SETOR</span> <strong>Setores de cripto em vermelho</strong>: DOGE US$ 0,0788 (−4,33 %), SOL US$ 68,88 (−6,26 %), tokens de IA TAO US$ 216,65 / RENDER US$ 1,59 / FET US$ 0,1805 todos em baixa — alta beta quebra primeiro em risk-off.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Este boletín se escribe antes de la apertura del mercado estadounidense (~06:00 BRT). Los dos catalizadores más grandes del día aún están por venir: la asamblea anual de Nvidia a las 9:00 PT (~13:00 BRT) y los resultados del Q3 de Micron después del cierre estadounidense. Todos los valores de NVDA y MU aquí son premarket o fechados — no son resultados negociados en el día. El telón de fondo: una liquidación de dos días en infraestructura de IA presionó los índices ayer. Los futuros están ligeramente positivos a primera hora de hoy, el mercado esperando a Micron como siguiente punto de prueba. Cripto está profundo y callado; oro y petróleo siguen cayendo.</p>\n    <ul>\n      <li><span class=\"chip\">NVDA</span> <strong>Hoy es día de asamblea</strong>: Cerró el 23/06 en <strong>$200,04 (−4,13 %)</strong> en la liquidación de IA; premarket el 24/06 <strong>+0,64 % en $201,27</strong>. Asamblea anual virtual a las 9:00 PT — históricamente la acción se mueve menos de 2 % después (2024 y 2025).</li>\n      <li><span class=\"chip hot\">MICRON</span> <strong>Evento binario esta noche</strong>: MU se desplomó el 23/06 <strong>−13,18 % a $1.051,77</strong> — desde un máximo récord de $1.211,38 el 22/06 (+324 % año a la fecha). Resultados del Q3 después del cierre estadounidense (consenso $34,66B en ingresos, $19,95 de EPS); premarket <strong>+3,73 %</strong>. BofA elevó el precio objetivo a $1.500.</li>\n      <li><span class=\"chip hot\">ATENCIÓN</span> <strong>Liquidación de infraestructura de IA, día 2</strong>: Nasdaq <strong>−2,21 %</strong>, S&amp;P 500 <strong>−1,44 %</strong> el 23/06 — dudas sobre retorno de inversión de hiperscalers más un crash de ~10 % en acciones de chips coreanas (parada de 20 minutos). Futuros a primera hora de hoy: Nasdaq-100 +0,52 %, S&amp;P +0,13 %.</li>\n      <li><span class=\"chip\">TSLA</span> <strong>Tesla −5,79 %</strong> a $381,61 el 23/06, el peor desempeño de Mag-7; premarket +0,67 %. MSFT fue contra la corriente con +1,80 % ($373,94).</li>\n      <li><span class=\"chip hot\">CRIPTO</span> <strong>Profundo y callado</strong>: BTC <strong>$62.654</strong> (+0,57 % 24h, Yahoo 24/06 09:04 UTC), ETH <strong>$1.734</strong> (+0,17 %) — ambos 17–40 % debajo de máximos recientes; BTC −17,4 % en el mes. Salidas de ETFs spot en 2026 suman miles de millones.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro ~$4.074</strong> (−0,96 %, 24/06) rumbo a mínimo de 7 meses — expectativas de aumento de tasa de la Fed superan optimismo de paz en Irán.</li>\n      <li><span class=\"chip good\">PETRÓLEO</span> <strong>Brent $75,75 / WTI $71,98</strong> (cada ~−1,7 %, 24/06) — Irán autorizado a vender nuevamente (licencia de 60 días, 30M+ barriles enviados), OPEP+ agregando oferta.</li>\n      <li><span class=\"chip\">SECTOR</span> <strong>Sectores de cripto en rojo</strong>: DOGE $0,0788 (−4,33 %), SOL $68,88 (−6,26 %), tokens de IA TAO $216,65 / RENDER $1,59 / FET $0,1805 todos en rojo — beta alta quiebra primero en risk-off.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist ein Sicherheits-Tag, kein Release-Tag. Eine perfekte 10.0 in einer Engineering-Plattform, ein Wurm in der npm-Lieferkette von Red Hat, ein KEV-Eintrag bei Splunk und eine 29 Jahre alte Wunde in Squid — die rote Spalte ist heute voll. Daneben Infra-News mit echtem Stack-Bezug: AWS Lambda darf endlich stundenlang laufen, und drei Browser plus Cloudflare wollen das CAPTCHA beerdigen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>PTC Windchill</strong>: CVE-2026-12569, CVSS 10.0, unauth RCE — das BSI rief Admins um 2:30 Uhr an, Backdoors werden aktiv platziert. Patch seit 15.06.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Supply-Chain</span> <strong>„Miasma\"</strong>: 32 trojanisierte <code>@redhat-cloud-services</code>-npm-Pakete, ~80k Downloads/Woche, selbstverbreitend, klaut Cloud-Credentials.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>Splunk</strong>: CVE-2026-20253, CVSS 9.8, unauth RCE — seit 18.06 im CISA-KEV-Katalog, PoC public, erste Exploit-Versuche ~17.06.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Release</span> <strong>Node.js</strong>: Sammel-Release am 18.06 — 2× HIGH (TLS-Bypass, WebCrypto-DoS) auf v22/v24/v26.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Squidbleed</strong>: CVE-2026-47729, 7,5 (laut squidbleed.xyz) — Squid leakt seit 1997 fremde Klartext-Auth-Header. One-Line-Fix.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>AWS Lambda MicroVMs</strong>: Firecracker-basiert, bis 8h Laufzeit statt 15 Minuten, VM-Isolation, ARM64.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Browser</span> <strong>PACT</strong>: Cloudflare + Chrome + Firefox + Edge an einem Anti-Bot-Token-Protokoll — Bots sind 58 % des HTTP-Traffics.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Release</span> <strong>Homebrew 6.0</strong>: Tap-Trust, <code>brew vulns</code> gegen OSV, Linux-Sandbox via Bubblewrap.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA</strong>: ab 11.09 greift die Meldepflicht (24h / 72h / 14 Tage) über die ENISA-Plattform.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">Global</span> <strong>Oracle</strong>: −21.000 Stellen in FY2026, CapEx +162 % auf 55,7 Mrd. $ für KI-Rechenzentren.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist ein Sicherheits-Tag, kein Release-Tag. Eine perfekte 10.0 in einer Engineering-Plattform, ein Wurm in der npm-Lieferkette von Red Hat, ein KEV-Eintrag bei Splunk und eine 29 Jahre alte Wunde in Squid — die rote Spalte ist heute voll. Daneben Infra-News mit echtem Stack-Bezug: AWS Lambda darf endlich stundenlang laufen, und drei Browser plus Cloudflare wollen das CAPTCHA beerdigen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>PTC Windchill</strong>: CVE-2026-12569, CVSS 10.0, unauth RCE — das BSI rief Admins um 2:30 Uhr an, Backdoors werden aktiv platziert. Patch seit 15.06.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Supply-Chain</span> <strong>„Miasma\"</strong>: 32 trojanisierte <code>@redhat-cloud-services</code>-npm-Pakete, ~80k Downloads/Woche, selbstverbreitend, klaut Cloud-Credentials.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>Splunk</strong>: CVE-2026-20253, CVSS 9.8, unauth RCE — seit 18.06 im CISA-KEV-Katalog, PoC public, erste Exploit-Versuche ~17.06.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Release</span> <strong>Node.js</strong>: Sammel-Release am 18.06 — 2× HIGH (TLS-Bypass, WebCrypto-DoS) auf v22/v24/v26.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Squidbleed</strong>: CVE-2026-47729, 7,5 (laut squidbleed.xyz) — Squid leakt seit 1997 fremde Klartext-Auth-Header. One-Line-Fix.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>AWS Lambda MicroVMs</strong>: Firecracker-basiert, bis 8h Laufzeit statt 15 Minuten, VM-Isolation, ARM64.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Browser</span> <strong>PACT</strong>: Cloudflare + Chrome + Firefox + Edge an einem Anti-Bot-Token-Protokoll — Bots sind 58 % des HTTP-Traffics.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Release</span> <strong>Homebrew 6.0</strong>: Tap-Trust, <code>brew vulns</code> gegen OSV, Linux-Sandbox via Bubblewrap.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA</strong>: ab 11.09 greift die Meldepflicht (24h / 72h / 14 Tage) über die ENISA-Plattform.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">Global</span> <strong>Oracle</strong>: −21.000 Stellen in FY2026, CapEx +162 % auf 55,7 Mrd. $ für KI-Rechenzentren.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's a security day, not a release day. A perfect 10.0 in an engineering platform, a worm in Red Hat's npm supply chain, a KEV entry for Splunk, and a 29-year-old wound in Squid — the red column is full today. Alongside, infra news with real stack impact: AWS Lambda finally gets to run for hours, and three browsers plus Cloudflare want to bury CAPTCHA.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">DE</span> <strong>PTC Windchill</strong>: CVE-2026-12569, CVSS 10.0, unauthenticated RCE — the BSI called admins at 2:30 a.m., backdoors are being actively placed. Patched since June 15.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Supply-Chain</span> <strong>\"Miasma\"</strong>: 32 trojanned <code>@redhat-cloud-services</code> npm packages, ~80k downloads/week, self-propagating, steals cloud credentials.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>Splunk</strong>: CVE-2026-20253, CVSS 9.8, unauthenticated RCE — in CISA's KEV catalog since June 18, PoC public, first exploit attempts ~June 17.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Release</span> <strong>Node.js</strong>: batch release on June 18 — 2× HIGH (TLS bypass, WebCrypto DoS) across v22/v24/v26.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">OSS</span> <strong>Squidbleed</strong>: CVE-2026-47729, 7.5 (per squidbleed.xyz) — Squid has leaked other users' plaintext auth headers since 1997. One-line fix.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>AWS Lambda MicroVMs</strong>: Firecracker-based, up to 8 hours runtime instead of 15 minutes, VM isolation, ARM64.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Browser</span> <strong>PACT</strong>: Cloudflare + Chrome + Firefox + Edge on an anti-bot token protocol — bots are 58% of HTTP traffic.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Release</span> <strong>Homebrew 6.0</strong>: Tap Trust, <code>brew vulns</code> against OSV, Linux sandbox via Bubblewrap.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>CRA</strong>: effective Sept 11, reporting requirements (24h / 72h / 14 days) via ENISA platform.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">Global</span> <strong>Oracle</strong>: −21,000 jobs in FY2026, CapEx +162% to $55.7 billion for AI datacenters.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É um dia de segurança, não de lançamento. Um perfeito 10.0 em uma plataforma de engenharia, um worm na cadeia de suprimentos npm da Red Hat, uma entrada no catálogo KEV da Splunk e uma ferida de 29 anos no Squid — a coluna vermelha está cheia hoje. Ao lado, notícias de infra com impacto real na pilha: AWS Lambda finalmente consegue rodar por horas, e três navegadores mais Cloudflare querem enterrar o CAPTCHA.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">DE</span> <strong>PTC Windchill</strong>: CVE-2026-12569, CVSS 10.0, RCE não autenticada — o BSI ligou para administradores às 2h30, portas traseiras estão sendo colocadas ativamente. Patch desde 15 de junho.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Cadeia-Suprimentos</span> <strong>\"Miasma\"</strong>: 32 pacotes npm <code>@redhat-cloud-services</code> trojanizados, ~80k downloads/semana, autopropagador, rouba credenciais da nuvem.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">USA</span> <strong>Splunk</strong>: CVE-2026-20253, CVSS 9.8, RCE não autenticada — no catálogo KEV da CISA desde 18 de junho, PoC público, primeiras tentativas de exploração ~17 de junho.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Lançamento</span> <strong>Node.js</strong>: lançamento em lote em 18 de junho — 2× ALTO (bypass TLS, WebCrypto DoS) nas versões v22/v24/v26.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">OSS</span> <strong>Squidbleed</strong>: CVE-2026-47729, 7,5 (segundo squidbleed.xyz) — Squid vaza credenciais de autenticação em texto claro alheias desde 1997. Correção de uma linha.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>AWS Lambda MicroVMs</strong>: baseado em Firecracker, até 8 horas de tempo de execução em vez de 15 minutos, isolamento VM, ARM64.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Navegador</span> <strong>PACT</strong>: Cloudflare + Chrome + Firefox + Edge em um protocolo de token anti-bot — bots são 58% do tráfego HTTP.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Lançamento</span> <strong>Homebrew 6.0</strong>: Tap Trust, <code>brew vulns</code> contra OSV, sandbox Linux via Bubblewrap.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">UE</span> <strong>CRA</strong>: efetivo 11 de setembro, requisitos de relatório (24h / 72h / 14 dias) via plataforma ENISA.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">Global</span> <strong>Oracle</strong>: −21.000 empregos no FY2026, CapEx +162% para 55,7 bilhões de dólares para datacenters de IA.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es un día de seguridad, no de lanzamiento. Un perfecto 10.0 en una plataforma de ingeniería, un gusano en la cadena de suministros npm de Red Hat, una entrada en el catálogo KEV de Splunk y una herida de 29 años en Squid — la columna roja está llena hoy. Al lado, noticias de infra con impacto real en la pila: AWS Lambda finalmente puede correr durante horas, y tres navegadores más Cloudflare quieren enterrar el CAPTCHA.</p>\n    <ul>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">DE</span> <strong>PTC Windchill</strong>: CVE-2026-12569, CVSS 10.0, RCE no autenticado — el BSI llamó a administradores a las 2:30 a.m., puertas traseras se están colocando activamente. Parche desde el 15 de junio.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">Cadena-Suministro</span> <strong>\"Miasma\"</strong>: 32 paquetes npm <code>@redhat-cloud-services</code> troyanizados, ~80k descargas/semana, autopropagador, roba credenciales en la nube.</li>\n      <li><span class=\"chip hot\">Seg</span> <span class=\"chip\">USA</span> <strong>Splunk</strong>: CVE-2026-20253, CVSS 9.8, RCE no autenticado — en catálogo KEV de CISA desde el 18 de junio, PoC público, primeros intentos de explotación ~17 de junio.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">Lanzamiento</span> <strong>Node.js</strong>: lanzamiento en lote el 18 de junio — 2× ALTO (evasión TLS, DoS WebCrypto) en v22/v24/v26.</li>\n      <li><span class=\"chip\">Seg</span> <span class=\"chip\">OSS</span> <strong>Squidbleed</strong>: CVE-2026-47729, 7.5 (según squidbleed.xyz) — Squid filtra credenciales de autenticación en texto plano ajenas desde 1997. Corrección de una línea.</li>\n      <li><span class=\"chip good\">Infra</span> <span class=\"chip\">Global</span> <strong>AWS Lambda MicroVMs</strong>: basado en Firecracker, hasta 8 horas de tiempo de ejecución en lugar de 15 minutos, aislamiento VM, ARM64.</li>\n      <li><span class=\"chip\">Web</span> <span class=\"chip\">Navegador</span> <strong>PACT</strong>: Cloudflare + Chrome + Firefox + Edge en un protocolo de token anti-bot — bots son 58% del tráfico HTTP.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">Lanzamiento</span> <strong>Homebrew 6.0</strong>: Tap Trust, <code>brew vulns</code> contra OSV, sandbox Linux vía Bubblewrap.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>CRA</strong>: efectivo 11 de septiembre, requisitos de reporte (24h / 72h / 14 días) vía plataforma ENISA.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">Global</span> <strong>Oracle</strong>: −21.000 empleos en FY2026, CapEx +162% a 55,7 mil millones de dólares para centros de datos de IA.</li>\n    </ul></div>"
