      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern stand an dieser Stelle das Gerücht, Google würde <em>heute</em> Gemini 3.5 Pro starten — und die Warnung, dass Google nichts davon bestätigt hat. Die Warnung war richtig. Bloomberg berichtete gestern, das Modell liege „Monate hinter dem Zeitplan\", und der Grund ist für diesen Newsletter der eigentliche Aufmacher: Google hat die Trainingsdaten nachgeschärft, um die <em>Coding</em>-Fähigkeiten zu verbessern, und die Ergebnisse waren enttäuschend. Wir haben Googles eigene Modell-Liste heute Morgen selbst geprüft: kein 3.5 Pro, nirgends. Derweil kam der Fortschritt aus einer anderen Richtung — Moonshot startete Kimi K3 mit 2,8 Billionen Parametern und legt die Gewichte am 27.07. offen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.5 Pro: verschoben, nicht gestartet.</strong> Bloomberg (16.07.): „Monate hinter dem Zeitplan\", weil die Coding-Ergebnisse enttäuschten. Von uns geprüft: Googles API-Modell-Liste kennt heute kein 3.5 Pro.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Aggregatoren, die „17.07. GA\" melden, liegen falsch</strong> — das Datum stammt aus der Gerüchteküche, nie von Google. Das ist selbst Teil der Geschichte.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3</strong> (Moonshot, 16.07.): 2,8-Bio.-Parameter-MoE, nur <strong>16 von 896 Experten</strong> pro Token aktiv, 1M-Kontext. Volle Gewichte angekündigt für <strong>27.07.</strong></li>\n      <li><span class=\"chip\">Bench</span> <strong>Kimi K3: Index 57, Platz 4 von 189</strong> (Artificial Analysis, unabhängig) — hinter Fable 5 (60) und GPT-5.6 Sol (59). Ein offenes Modell drei Punkte hinter der Spitze.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Kimi K2.7 Code</strong> ist das <em>erste offene Modell</em> im Modell-Picker von GitHub Copilot (GA 01.07.). Seit 07.07. auch Business/Enterprise — dort aber <strong>standardmäßig aus</strong>, Admin muss freischalten.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Klarstellung:</strong> GPT-5.6 ist <em>nicht</em> ChatGPTs Standardmodell. Das ist weiter GPT-5.5 Instant (seit 05.05.); Sol erreichst du nur über die Reasoning-Einstellung in Bezahlplänen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> Cline liefert im Tagestakt (CLI v3.0.44 heute), Cursor 3.11 (10.07.). Still: Aider (Board weiter kalt), Windsurf heißt seit 02.06. Devin Desktop.</li>\n      <li><span class=\"chip\">Markt</span> Alphabet fiel am Tag des Berichts <strong>4,4 %</strong> (~200 Mrd. $) — die Ticker-Seite steht im stocks-crypto-Brief.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern stand an dieser Stelle das Gerücht, Google würde <em>heute</em> Gemini 3.5 Pro starten — und die Warnung, dass Google nichts davon bestätigt hat. Die Warnung war richtig. Bloomberg berichtete gestern, das Modell liege „Monate hinter dem Zeitplan\", und der Grund ist für diesen Newsletter der eigentliche Aufmacher: Google hat die Trainingsdaten nachgeschärft, um die <em>Coding</em>-Fähigkeiten zu verbessern, und die Ergebnisse waren enttäuschend. Wir haben Googles eigene Modell-Liste heute Morgen selbst geprüft: kein 3.5 Pro, nirgends. Derweil kam der Fortschritt aus einer anderen Richtung — Moonshot startete Kimi K3 mit 2,8 Billionen Parametern und legt die Gewichte am 27.07. offen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.5 Pro: verschoben, nicht gestartet.</strong> Bloomberg (16.07.): „Monate hinter dem Zeitplan\", weil die Coding-Ergebnisse enttäuschten. Von uns geprüft: Googles API-Modell-Liste kennt heute kein 3.5 Pro.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Aggregatoren, die „17.07. GA\" melden, liegen falsch</strong> — das Datum stammt aus der Gerüchteküche, nie von Google. Das ist selbst Teil der Geschichte.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3</strong> (Moonshot, 16.07.): 2,8-Bio.-Parameter-MoE, nur <strong>16 von 896 Experten</strong> pro Token aktiv, 1M-Kontext. Volle Gewichte angekündigt für <strong>27.07.</strong></li>\n      <li><span class=\"chip\">Bench</span> <strong>Kimi K3: Index 57, Platz 4 von 189</strong> (Artificial Analysis, unabhängig) — hinter Fable 5 (60) und GPT-5.6 Sol (59). Ein offenes Modell drei Punkte hinter der Spitze.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Kimi K2.7 Code</strong> ist das <em>erste offene Modell</em> im Modell-Picker von GitHub Copilot (GA 01.07.). Seit 07.07. auch Business/Enterprise — dort aber <strong>standardmäßig aus</strong>, Admin muss freischalten.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Klarstellung:</strong> GPT-5.6 ist <em>nicht</em> ChatGPTs Standardmodell. Das ist weiter GPT-5.5 Instant (seit 05.05.); Sol erreichst du nur über die Reasoning-Einstellung in Bezahlplänen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> Cline liefert im Tagestakt (CLI v3.0.44 heute), Cursor 3.11 (10.07.). Still: Aider (Board weiter kalt), Windsurf heißt seit 02.06. Devin Desktop.</li>\n      <li><span class=\"chip\">Markt</span> Alphabet fiel am Tag des Berichts <strong>4,4 %</strong> (~200 Mrd. $) — die Ticker-Seite steht im stocks-crypto-Brief.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday this spot carried the rumor that Google would launch Gemini 3.5 Pro <em>today</em> — along with the warning that Google hadn't confirmed any of it. The warning was right. Bloomberg reported yesterday that the model is \"months behind schedule,\" and the reason is the real headline for this newsletter: Google resharpened the training data to improve <em>coding</em> ability, and the results were disappointing. We checked Google's own model list ourselves this morning: no 3.5 Pro, anywhere. Meanwhile, progress came from a different direction — Moonshot launched Kimi K3 with 2.8 trillion parameters and plans to open the weights on 07/27.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.5 Pro: delayed, not launched.</strong> Bloomberg (07/16): \"months behind schedule,\" because coding results disappointed. Checked by us: Google's API model list shows no 3.5 Pro today.</li>\n      <li><span class=\"chip\">Heads up</span> <strong>Aggregators reporting a \"07/17 GA\" are wrong</strong> — the date came from the rumor mill, never from Google. That's part of the story itself.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3</strong> (Moonshot, 07/16): 2.8T-parameter MoE, only <strong>16 of 896 experts</strong> active per token, 1M context. Full weights announced for <strong>07/27</strong>.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Kimi K3: Index 57, rank 4 of 189</strong> (Artificial Analysis, independent) — behind Fable 5 (60) and GPT-5.6 Sol (59). An open model three points behind the frontier.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Kimi K2.7 Code</strong> is the <em>first open model</em> in GitHub Copilot's model picker (GA 07/01). Since 07/07 also on Business/Enterprise — but <strong>off by default</strong> there, admins have to enable it.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Clarification:</strong> GPT-5.6 is <em>not</em> ChatGPT's default model. That's still GPT-5.5 Instant (since 05/05); you only reach Sol via the reasoning setting on paid plans.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll call:</strong> Cline ships daily (CLI v3.0.44 today), Cursor 3.11 (07/10). Quiet: Aider (board still cold), Windsurf has been called Devin Desktop since 06/02.</li>\n      <li><span class=\"chip\">Market</span> Alphabet fell <strong>4.4%</strong> (~$200B) on the day of the report — the ticker angle lives in the stocks-crypto brief.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, este espaço trazia o boato de que o Google lançaria <em>hoje</em> o Gemini 3.5 Pro — e o alerta de que o Google não confirmara nada disso. O alerta estava certo. A Bloomberg noticiou ontem que o modelo está \"meses atrás do cronograma\", e o motivo é a verdadeira manchete desta newsletter: o Google refinou os dados de treinamento para melhorar as capacidades de <em>código</em>, e os resultados foram decepcionantes. Nós mesmos conferimos hoje de manhã a lista oficial de modelos do Google: nenhum 3.5 Pro, em lugar nenhum. Enquanto isso, o avanço veio de outra direção — a Moonshot lançou o Kimi K3, com 2,8 trilhões de parâmetros, e vai abrir os pesos em 27/07.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.5 Pro: adiado, não lançado.</strong> Bloomberg (16/07): \"meses atrás do cronograma\", porque os resultados de código decepcionaram. Conferido por nós: a lista de modelos da API do Google hoje não conhece nenhum 3.5 Pro.</li>\n      <li><span class=\"chip\">Atenção</span> <strong>Agregadores que noticiam \"GA em 17/07\" estão errados</strong> — a data veio da boataria, nunca do Google. Isso, por si só, já é parte da história.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3</strong> (Moonshot, 16/07): MoE de 2,8 tri. de parâmetros, apenas <strong>16 de 896 especialistas</strong> ativos por token, contexto de 1M. Pesos completos anunciados para <strong>27/07</strong>.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Kimi K3: índice 57, 4º lugar entre 189</strong> (Artificial Analysis, independente) — atrás do Fable 5 (60) e do GPT-5.6 Sol (59). Um modelo aberto a três pontos do topo.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Kimi K2.7 Code</strong> é o <em>primeiro modelo aberto</em> no seletor de modelos do GitHub Copilot (GA em 01/07). Desde 07/07 também no Business/Enterprise — mas lá, <strong>desligado por padrão</strong>, o admin precisa ativar.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Esclarecimento:</strong> GPT-5.6 <em>não</em> é o modelo padrão do ChatGPT. O padrão continua sendo o GPT-5.5 Instant (desde 05/05); você só chega ao Sol pela configuração de raciocínio nos planos pagos.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> o Cline entrega no ritmo diário (CLI v3.0.44 hoje), Cursor 3.11 (10/07). Silêncio: Aider (quadro segue frio), Windsurf se chama Devin Desktop desde 02/06.</li>\n      <li><span class=\"chip\">Mercado</span> A Alphabet caiu <strong>4,4%</strong> (~US$ 200 bi) no dia da notícia — a página de tickers está no brief de stocks-crypto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer, en este mismo espacio, estaba el rumor de que Google lanzaría <em>hoy</em> Gemini 3.5 Pro — junto con la advertencia de que Google no había confirmado nada de eso. La advertencia era acertada. Bloomberg reportó ayer que el modelo va \"meses detrás del calendario\", y el motivo es, para este newsletter, la verdadera noticia principal: Google reforzó los datos de entrenamiento para mejorar las capacidades de <em>coding</em>, y los resultados fueron decepcionantes. Nosotros mismos revisamos esta mañana la propia lista de modelos de Google: ningún 3.5 Pro, en ningún lado. Mientras tanto, el avance llegó desde otra dirección — Moonshot lanzó Kimi K3 con 2,8 billones de parámetros y publicará los pesos el 27/07.</p>\n    <ul>\n      <li><span class=\"chip hot\">Google</span> <strong>Gemini 3.5 Pro: aplazado, no lanzado.</strong> Bloomberg (16/07): \"meses detrás del calendario\", porque los resultados de coding decepcionaron. Verificado por nosotros: la lista de modelos de la API de Google hoy no incluye ningún 3.5 Pro.</li>\n      <li><span class=\"chip\">Atención</span> <strong>Los agregadores que reportan \"GA el 17/07\" están equivocados</strong> — la fecha proviene de la cocina de rumores, nunca de Google. Eso, en sí mismo, es parte de la historia.</li>\n      <li><span class=\"chip hot\">OSS</span> <strong>Kimi K3</strong> (Moonshot, 16/07): MoE de 2,8 billones de parámetros, solo <strong>16 de 896 expertos</strong> activos por token, contexto de 1M. Pesos completos anunciados para el <strong>27/07</strong>.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Kimi K3: índice 57, puesto 4 de 189</strong> (Artificial Analysis, independiente) — detrás de Fable 5 (60) y GPT-5.6 Sol (59). Un modelo abierto a tres puntos de la cima.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Kimi K2.7 Code</strong> es el <em>primer modelo abierto</em> en el selector de modelos de GitHub Copilot (GA 01/07). Desde el 07/07 también en Business/Enterprise — pero ahí <strong>desactivado por defecto</strong>, el administrador debe habilitarlo.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Aclaración:</strong> GPT-5.6 <em>no</em> es el modelo predeterminado de ChatGPT. Ese sigue siendo GPT-5.5 Instant (desde el 05/05); a Sol solo se llega mediante el ajuste de razonamiento en los planes de pago.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Repaso rápido:</strong> Cline lanza al ritmo diario (CLI v3.0.44 hoy), Cursor 3.11 (10/07). En silencio: Aider (el board sigue frío), Windsurf se llama Devin Desktop desde el 02/06.</li>\n      <li><span class=\"chip\">Mercado</span> Alphabet cayó el día del reporte <strong>4,4 %</strong> (~$200 mil millones) — el ángulo bursátil está en el brief de stocks-crypto.</li>\n    </ul></div>"

        "en": "<div class=\"tldr\"><p class=\"lead\">Today's direct news cycle is thin — Google renaming a product is the headline. So this brief steps back to the thread that actually matters for twiceD: buyers have stopped looking for the <em>best</em> model and started looking for the <em>right</em> one. Citi, Atlassian, Adobe, and Amazon have all rationed internal AI access within weeks of each other. The paradox: AI is getting dramatically cheaper per token — and that's exactly why the bills are climbing. When everything is cheap, everyone uses everything. Meanwhile a clock is running: in <strong>16 days</strong> the Bundesnetzagentur becomes Germany's central AI oversight body, and the EU's transparency duties kick in — while the much-celebrated high-risk delay isn't even legally binding yet.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>The rationing wave</strong>: Citi temporarily blocked newer Anthropic/OpenAI models, Adobe ended unlimited use at the end of June, Amazon introduced token limits — and at <strong>Atlassian</strong> the AI bill jumped to <strong>$120 million/year</strong> (up from a $5 million baseline).</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Gartner</strong> (Mar 25): inference will cost <strong>over 90% less</strong> in 2030 than in 2025 — and yet <em>total</em> costs keep rising, because consumption is growing faster than the price is falling.</li>\n      <li><span class=\"chip hot\">REG · DE</span> <strong>Bundesnetzagentur</strong> becomes Germany's central AI market-surveillance authority from <strong>Aug 2, 2026</strong> (KI-MIG, Bundesrat approval Jul 10) — BaFin, BSI, BfDI, and BfArM keep their own turf.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Digital Omnibus</strong>: Annex III high-risk slips to <strong>Dec 2, 2027</strong> — <em>but</em> the relief doesn't bind until it's published in the Official Journal. Transparency + GPAI fines (up to <strong>€15 million</strong> / 3% of revenue) stay at Aug 2, 2026.</li>\n      <li><span class=\"chip\">DEPLOY · Global</span> <strong>Google</strong> renames <strong>NotebookLM → \"Gemini Notebook\"</strong> (Jul 16, a pure rebrand); Live Translate has been in the Translate app since Jun 9 (70+ languages), Meet notes opened to paying subscribers on Jul 1.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>The maturity paradox</strong>: Stanford HAI reports <strong>88%</strong> organizational adoption — but agent deployment stays in the <em>single digits</em> per function. Governance decides: 60% vs. 20% (n=551).</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>SAP/Oxford Economics</strong>: German firms expect <strong>24% ROI</strong> (up from 17%) — only <strong>4%</strong> consider themselves \"fully prepared\" for AI agents.</li>\n      <li><span class=\"chip\">DEPLOY · BR</span> <strong>Febraban</strong> (Jun 29): Brazilian banks plan an <strong>R$50.4 billion</strong> tech budget (+8%), with GenAI a top-3 priority for 84% — yet <strong>56%</strong> still call themselves \"in the early stages.\"</li>\n      <li><span class=\"chip good\">twiceD</span> The gap: a <strong>best-fit model router</strong> that picks the cheapest model good enough for each task — and <em>proves</em> the quality before switching over.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O noticiário direto do dia está fraco — o Google renomeia um produto, e essa é a manchete. Então este boletim recua para o fio que realmente importa para a twiceD: o lado comprador não busca mais o <em>melhor</em> modelo, e sim o <em>certo</em> para a tarefa. Citi, Atlassian, Adobe e Amazon racionaram o acesso interno à IA em questão de semanas. O paradoxo: por token, a IA fica dramaticamente mais barata — e é justamente por isso que as contas sobem. Quando tudo é barato, todo mundo usa tudo. Em paralelo, um relógio corre: em <strong>16 dias</strong> a Bundesnetzagentur se torna a fiscalização central de IA, e as obrigações de transparência da UE entram em vigor — enquanto o tão celebrado adiamento do alto risco ainda nem tem validade jurídica.</p>\n    <ul>\n      <li><span class=\"chip hot\">IMPLANTAÇÃO · Global</span> <strong>A onda de racionamento</strong>: Citi bloqueou temporariamente modelos mais novos da Anthropic/OpenAI, Adobe encerrou o uso ilimitado no fim de junho, Amazon introduziu limites de tokens — na <strong>Atlassian</strong> a conta de IA saltou para <strong>US$ 120 milhões/ano</strong> (base: US$ 5 milhões).</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>Gartner</strong> (25/03): inferência custa em 2030 <strong>mais de 90% menos</strong> do que em 2025 — e mesmo assim os custos <em>totais</em> sobem, porque o consumo cresce mais rápido do que o preço cai.</li>\n      <li><span class=\"chip hot\">REGULAÇÃO · DE</span> <strong>Bundesnetzagentur</strong> se torna, a partir de <strong>02/08/2026</strong>, a fiscalização central de mercado de IA (KI-MIG, Bundesrat 10/07) — BaFin, BSI, BfDI e BfArM mantêm suas áreas.</li>\n      <li><span class=\"chip hot\">REGULAÇÃO · UE</span> <strong>Digital Omnibus</strong>: alto risco do Anexo III desliza para <strong>02/12/2027</strong> — <em>mas</em> o alívio só vale com a publicação no Jornal Oficial. Transparência + multas de GPAI (até <strong>€ 15 milhões</strong> / 3% do faturamento) permanecem em 02/08/2026.</li>\n      <li><span class=\"chip\">IMPLANTAÇÃO · Global</span> <strong>Google</strong> renomeia <strong>NotebookLM → \"Gemini Notebook\"</strong> (16/07, puro rebranding); Live Translate desde 09/06 no app Translate (mais de 70 idiomas), notas do Meet desde 01/07 para assinantes pagos.</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>A contradição de maturidade</strong>: Stanford HAI reporta <strong>88%</strong> de adoção organizacional — mas o uso de agentes continua em <em>um dígito</em> por função. Governança decide: 60% vs. 20% (n=551).</li>\n      <li><span class=\"chip\">ESTUDO · DE</span> <strong>SAP/Oxford Economics</strong>: empresas alemãs esperam <strong>24% de ROI</strong> (ante 17%) — só <strong>4%</strong> se consideram \"totalmente preparadas\" para agentes de IA.</li>\n      <li><span class=\"chip\">IMPLANTAÇÃO · BR</span> <strong>Febraban</strong> (29/06): bancos brasileiros planejam <strong>R$ 50,4 bi</strong> de orçamento de tecnologia (+8%), GenAI é prioridade top 3 para 84% — <strong>56%</strong> mesmo assim dizem estar \"nos primeiros passos\".</li>\n      <li><span class=\"chip good\">twiceD</span> A lacuna: um <strong>roteador de modelo best-fit</strong> que escolhe, para cada tarefa, o modelo mais barato que ainda dá conta do recado — e <em>prova</em> a qualidade antes de trocar.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día de noticias directas está flojo — Google le cambia el nombre a un producto, y esa es la nota principal. Así que este brief retrocede hasta el hilo que de verdad le importa a twiceD: el lado comprador ya no busca el modelo <em>mejor</em>, sino el <em>adecuado</em>. Citi, Atlassian, Adobe y Amazon racionaron el acceso interno a la IA en cuestión de semanas. La paradoja: por token, la IA se abarata de forma dramática — y justo <em>por eso</em> suben las facturas. Cuando todo es barato, todos usan todo. En paralelo corre un reloj: en <strong>16 días</strong> la Bundesnetzagentur se vuelve la autoridad central de supervisión de IA, y entran en vigor las obligaciones de transparencia de la UE — mientras que el tan celebrado aplazamiento de alto riesgo todavía no es jurídicamente vinculante.</p>\n    <ul>\n      <li><span class=\"chip hot\">DESPLIEGUE · Global</span> <strong>La ola de racionamiento</strong>: Citi bloqueó temporalmente los modelos más nuevos de Anthropic y OpenAI, Adobe terminó a finales de junio el uso ilimitado, Amazon introdujo límites de tokens — en <strong>Atlassian</strong> la factura de IA saltó a <strong>120 millones de dólares al año</strong> (base: 5 millones de dólares).</li>\n      <li><span class=\"chip\">ESTUDIO · Global</span> <strong>Gartner</strong> (25/03): la inferencia costará en 2030 <strong>más del 90 % menos</strong> que en 2025 — y aun así suben los costos <em>totales</em>, porque el consumo crece más rápido de lo que cae el precio.</li>\n      <li><span class=\"chip hot\">REGULACIÓN · DE</span> La <strong>Bundesnetzagentur</strong> se convierte, a partir del <strong>02/08/2026</strong>, en la supervisión central de mercado de IA (KI-MIG, Bundesrat 10/07) — BaFin, BSI, BfDI y BfArM conservan sus competencias.</li>\n      <li><span class=\"chip hot\">REGULACIÓN · UE</span> <strong>Digital Omnibus</strong>: el alto riesgo de Annex III se traslada al <strong>02/12/2027</strong> — <em>pero</em> el alivio no es vinculante hasta su publicación en el Diario Oficial. La transparencia y las multas GPAI (hasta <strong>15 millones de euros</strong> / 3 % de la facturación) se mantienen en el 02/08/2026.</li>\n      <li><span class=\"chip\">DESPLIEGUE · Global</span> <strong>Google</strong> rebautiza <strong>NotebookLM → \"Gemini Notebook\"</strong> (16/07, puro cambio de nombre); Live Translate desde el 09/06 en la app Translate (70+ idiomas), notas de Meet desde el 01/07 para suscriptores de pago.</li>\n      <li><span class=\"chip\">ESTUDIO · Global</span> <strong>La contradicción de madurez</strong>: Stanford HAI reporta <strong>88 %</strong> de adopción organizacional — pero el uso de agentes se queda en <em>un dígito</em> por función. La gobernanza decide: 60 % contra 20 % (n=551).</li>\n      <li><span class=\"chip\">ESTUDIO · DE</span> <strong>SAP/Oxford Economics</strong>: las empresas alemanas esperan un <strong>ROI del 24 %</strong> (desde 17 %) — solo <strong>4 %</strong> se consideran \"totalmente preparadas\" para agentes de IA.</li>\n      <li><span class=\"chip\">DESPLIEGUE · BR</span> <strong>Febraban</strong> (29/06): los bancos brasileños planean un presupuesto tecnológico de <strong>R$ 50,4 mil millones</strong> (+8 %), la IA generativa es prioridad top 3 para el 84 % — aun así, <strong>56 %</strong> dice estar \"todavía en los primeros pasos\".</li>\n      <li><span class=\"chip good\">twiceD</span> El hueco: un <strong>enrutador de mejor modelo</strong> que elige, por tarea, el modelo más barato que basta — y <em>demuestra</em> la calidad antes de hacer el cambio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Zahlen widersprechen sich heute scheinbar. Der <strong>Freelancer-Kompass 2026</strong> sagt: <strong>43 %</strong> der DACH-Freelancer haben derzeit keine gesicherte Auslastung für die kommenden Monate, <strong>23 %</strong> im IT-/Software-Segment melden weniger Aufträge als im Vorjahr, und die Zahl registrierter Projektausschreibungen liegt mit rund <strong>90.000</strong> (2025) etwa ein Drittel unter dem Peak von <strong>132.000</strong> (2022) — zurück auf dem Niveau von 2020. Das Board sagt: <strong>104 verifizierte Listings</strong>, davon 91 Freelance, 17 mit Fit ≥ 80, Spitze recherchiert bei <strong>90–130 €/h*</strong>. Beides stimmt gleichzeitig — und die Auflösung ist der eigentliche Punkt des Tages: Wenn 43 % ohne Auslastung dastehen, während 91 Java/Spring/Angular-Projekte offen ausgeschrieben sind, dann sitzt der Engpass nicht bei der <em>Nachfrage</em>, sondern beim <em>Zuschlag</em>. Der Markt ist nicht leer — er ist voll von Bewerbern pro Projekt. Dazu drei DACH-Abbau-Meldungen als Kulisse und zwei TED-Ausschreibungen, beide Partner-Fälle, eine davon mit dem kleinsten Gap seit Tagen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Markt</span> <strong>Der Widerspruch des Tages</strong>: <strong>43 %</strong> ohne gesicherte Auslastung, <strong>23 %</strong> weniger IT-/Software-Aufträge gegenüber Vorjahr (Freelancer-Kompass 2026, erste Welle befragt 17.11.–03.12.2025) — und gleichzeitig <strong>91 offene Freelance-Projekte</strong> im heutigen Board. Das ist ein Wettbewerbs-, kein Nachfrageproblem.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board wächst auf 104</strong> (gestern 88): 91 Freelance / 8 Employee / 5 Intriguing, Ø Fit <strong>63,6</strong>, dieselbe Frankfurter Drei-Wege-Spitze bei Fit <strong>88</strong> (iSAX, BridgingIT, Keil). <strong>17</strong> Listings ≥ 80, <strong>36</strong> ≥ 70, 86 mit Remote-Tag.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Volumen-Plateau, kein Absturz</strong>: ~90.000 registrierte Projektausschreibungen 2025 = Niveau von 2020, nach dem Peak von 132.000 (2022). freelancermap selbst nennt das „stabilisiert sich\" — ein Drittel unter Spitze, aber ohne weiteren Rutsch.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Software ist die schwächste IT-Sparte</strong>: Median <strong>90 €/h</strong> für Software-/Webentwicklung — die niedrigste der vier getrackten IT-Spezialisierungen; DACH-IT-Median 95 €/h, Alle-Freelancer-Durchschnitt 103 €/h (nach 104 €). Die Board-Spitze liegt recherchiert bei 90–130 €/h*, also am oberen Rand des eigenen Sparten-Bands.</li>\n      <li><span class=\"chip\">Skills</span> <strong>Der Kompass bestätigt das Board von außen</strong>: „SAP, Java und DevOps dominieren die Freelancer-Suche 2025 im IT-Umfeld.\" Im Board heute: Java <strong>47×</strong>, Angular 39×, Spring Boot 37×, AWS 22×, Kubernetes 20×, TypeScript 19×, AI-Integration 15×.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>Abbau-Kulisse</strong>: VW bis zu <strong>100.000</strong> von rund 657.000 Konzernstellen, vier Werke vor dem Aus (26.06.); Commerzbank <strong>+3.000</strong> Vollzeitstellen als UniCredit-Abwehr (08.05.); Zalando Erfurt <strong>2.700</strong> Beschäftigte, Schließung Ende September. Alles Festanstellungs-Etage — nicht der Projektmarkt.</li>\n      <li><span class=\"chip\">CH</span> <strong>KI-Aufschlag, harter Floor</strong>: ELCA (Agentic AI, Zürich) CHF 140–190 k*, Fit <strong>81</strong>; AXA (Agentic-AI-Plattform) CHF 130–170 k*, 80; Camunda (Kubernetes, work-from-anywhere) $126.800–190.100, 80. Der CHF-150-k-Floor der Employee-Spur liegt am <em>oberen</em> Rand des typischen CH-Senior-Bands — die Spur ist per Konstruktion selektiv.</li>\n      <li><span class=\"chip\">TED</span> <strong>Zwei Partner-Fälle</strong>: BG Kliniken Los 1 (nur <strong>3 Vollzeit-Entwickler</strong> + 250.000 € Umsatz gefordert — kleinster Gap seit Tagen, Frist 07.08.) und Uniklinikum Magdeburg (Frist 31.07., verlangt Maximalversorger-Referenzen + drei ISO-Zertifikate). govdigital „gd.KI\" wäre inhaltlich der beste Match — und ist mit <strong>100-FTE-/5-Mio.-€-Schwelle</strong> klar Skip.</li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>Nur 9 von 104 datiert</strong>: 86 der 104 Listings kommen von freelancermap, das für die meisten Projekte kein Posting-Datum ausgibt („n/a\") — systemisch, kein Scrape-Fehler. Nur <strong>6</strong> Listings tragen eine ausgeschriebene Rate; jede andere €/h-Angabe ist recherchiert (<code>*</code>).</li>\n    </ul></div>",

 und Uniklinikum Magdeburg (Frist 31.07., verlangt Maximalversorger-Referenzen + drei ISO-Zertifikate). govdigital „gd.KI\" wäre inhaltlich der beste Match — und ist mit <strong>100-FTE-/5-Mio.-€-Schwelle</strong> klar Skip.</li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>Nur 9 von 104 datiert</strong>: 86 der 104 Listings kommen von freelancermap, das für die meisten Projekte kein Posting-Datum ausgibt („n/a\") — systemisch, kein Scrape-Fehler. Nur <strong>6</strong> Listings tragen eine ausgeschriebene Rate; jede andere €/h-Angabe ist recherchiert (<code>*</code>).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two numbers seem to contradict each other today. The <strong>Freelancer Compass 2026</strong> says: <strong>43%</strong> of DACH freelancers currently have no secured workload for the coming months, <strong>23%</strong> in the IT/software segment report fewer contracts than the previous year, and the number of registered project tenders sits at roughly <strong>90,000</strong> (2025) — about a third below the <strong>132,000</strong> (2022) peak — back at 2020 levels. The board says: <strong>104 verified listings</strong>, 91 of them freelance, 17 with a fit score ≥ 80, top rates researched at <strong>€90–130/h*</strong>. Both are true at once — and reconciling them is the actual point of the day: if 43% are sitting without workload while 91 Java/Spring/Angular projects are openly advertised, the bottleneck isn't <em>demand</em> — it's the <em>award</em>. The market isn't empty — it's full of applicants per project. Alongside that: three DACH layoff headlines as backdrop, and two TED tenders, both partner cases, one of them with the narrowest gap in days.</p>\n    <ul>\n      <li><span class=\"chip hot\">Market</span> <strong>Today's contradiction</strong>: <strong>43%</strong> without secured workload, <strong>23%</strong> fewer IT/software contracts year-over-year (Freelancer Compass 2026, first wave surveyed November 17 – December 3, 2025) — and at the same time <strong>91 open freelance projects</strong> on today's board. That's a competition problem, not a demand problem.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board grows to 104</strong> (yesterday 88): 91 freelance / 8 employee / 5 intriguing, avg. fit <strong>63.6</strong>, the same three-way Frankfurt tie at fit <strong>88</strong> (iSAX, BridgingIT, Keil). <strong>17</strong> listings ≥ 80, <strong>36</strong> ≥ 70, 86 tagged remote.</li>\n      <li><span class=\"chip\">Market</span> <strong>Volume plateau, not a collapse</strong>: ~90,000 registered project tenders in 2025 = 2020 levels, after the 132,000 peak (2022). freelancermap itself calls this \"stabilizing\" — a third below peak, but with no further slide.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Software is the weakest IT segment</strong>: median <strong>€90/h</strong> for software/web development — the lowest of the four tracked IT specializations; DACH IT median €95/h, all-freelancer average €103/h (down from €104). The board's top rate researches at 90–130 €/h*, i.e. the upper end of its own segment band.</li>\n      <li><span class=\"chip\">Skills</span> <strong>The Compass confirms the board from the outside</strong>: \"SAP, Java, and DevOps dominate the freelancer search in IT for 2025.\" On today's board: Java <strong>47×</strong>, Angular 39×, Spring Boot 37×, AWS 22×, Kubernetes 20×, TypeScript 19×, AI integration 15×.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>Layoff backdrop</strong>: VW up to <strong>100,000</strong> of roughly 657,000 group jobs, four plants facing closure (June 26); Commerzbank <strong>+3,000</strong> full-time positions as a UniCredit defense (May 8); Zalando Erfurt <strong>2,700</strong> employees, closing end of September. All full-time-employment tier — not the project market.</li>\n      <li><span class=\"chip\">CH</span> <strong>AI premium, hard floor</strong>: ELCA (agentic AI, Zurich) CHF 140–190k*, fit <strong>81</strong>; AXA (agentic-AI platform) CHF 130–170k*, 80; Camunda (Kubernetes, work-from-anywhere) $126,800–190,100, 80. The CHF-150k floor of the employee track sits at the <em>upper</em> end of the typical CH senior band — the track is selective by design.</li>\n      <li><span class=\"chip\">TED</span> <strong>Two partner cases</strong>: BG Kliniken Lot 1 (only <strong>3 full-time developers</strong> + €250,000 revenue required — narrowest gap in days, deadline August 7) and Magdeburg University Hospital (deadline July 31, requires maximum-care references + three ISO certifications). govdigital's \"gd.KI\" would be the best content match — and is a clear skip given the <strong>100-FTE/€5M threshold</strong>.</li>\n      <li><span class=\"chip\">Data Quality</span> <strong>Only 9 of 104 dated</strong>: 86 of the 104 listings come from freelancermap, which doesn't publish a posting date for most projects (\"n/a\") — systemic, not a scraping error. Only <strong>6</strong> listings carry a stated rate; every other €/h figure is researched (<code>*</code>).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois números parecem se contradizer hoje. O <strong>Freelancer-Kompass 2026</strong> diz: <strong>43%</strong> dos freelancers da região DACH não têm atualmente carga de trabalho garantida para os próximos meses, <strong>23%</strong> no segmento de TI/software relatam menos contratos do que no ano anterior, e o número de licitações de projeto registradas fica em torno de <strong>90.000</strong> (2025) — cerca de um terço abaixo do pico de <strong>132.000</strong> (2022) — de volta ao nível de 2020. O board diz: <strong>104 vagas verificadas</strong>, das quais 91 freelance, 17 com Fit ≥ 80, topo pesquisado em <strong>90–130 €/h*</strong>. As duas coisas são verdadeiras ao mesmo tempo — e a explicação é o ponto central do dia: se 43% estão sem carga garantida enquanto 91 projetos Java/Spring/Angular estão abertos, o gargalo não está na <em>demanda</em>, mas na <em>conquista do contrato</em>. O mercado não está vazio — está cheio de candidatos por projeto. Além disso, três notícias de corte de vagas na DACH como pano de fundo e duas licitações da TED, ambas casos de parceria, uma delas com o menor gap em dias.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>A contradição do dia</strong>: <strong>43%</strong> sem carga de trabalho garantida, <strong>23%</strong> menos contratos de TI/software em relação ao ano anterior (Freelancer-Kompass 2026, primeira onda, pesquisa entre 17/11–03/12/2025) — e, ao mesmo tempo, <strong>91 projetos freelance abertos</strong> no board de hoje. Isso é um problema de concorrência, não de demanda.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board cresce para 104</strong> (ontem 88): 91 freelance / 8 employee / 5 intriguing, Fit médio <strong>63,6</strong>, mesma liderança tripla de Frankfurt com Fit <strong>88</strong> (iSAX, BridgingIT, Keil). <strong>17</strong> vagas ≥ 80, <strong>36</strong> ≥ 70, 86 com a tag remoto.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Platô de volume, não colapso</strong>: ~90.000 licitações de projeto registradas em 2025 = nível de 2020, depois do pico de 132.000 (2022). A própria freelancermap chama isso de \"se estabiliza\" — um terço abaixo do pico, mas sem novo tombo.</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Software é o segmento de TI mais fraco</strong>: mediana de <strong>90 €/h</strong> para desenvolvimento de software/web — a mais baixa das quatro especializações de TI monitoradas; mediana de TI DACH 95 €/h, média de todos os freelancers 103 €/h (depois de 104 €). O topo do board fica pesquisado em 90–130 €/h*, ou seja, na faixa superior do próprio segmento.</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>O Kompass confirma o board de fora</strong>: \"SAP, Java e DevOps dominam a busca por freelancers em 2025 no ambiente de TI.\" No board hoje: Java 47×, Angular 39×, Spring Boot 37×, AWS 22×, Kubernetes 20×, TypeScript 19×, integração de IA 15×.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>Pano de fundo de cortes</strong>: VW corta até <strong>100.000</strong> de cerca de 657.000 vagas do grupo, quatro fábricas ameaçadas de fechamento (26/06); Commerzbank <strong>+3.000</strong> vagas em tempo integral como defesa contra a UniCredit (08/05); Zalando Erfurt <strong>2.700</strong> funcionários, fechamento no final de setembro. Tudo no nível de emprego formal — não no mercado de projetos.</li>\n      <li><span class=\"chip\">CH</span> <strong>Prêmio de IA, piso rígido</strong>: ELCA (Agentic AI, Zurique) CHF 140–190 mil*, Fit <strong>81</strong>; AXA (plataforma de IA agêntica) CHF 130–170 mil*, 80; Camunda (Kubernetes, work-from-anywhere) US$ 126.800–190.100, 80. O piso de CHF 150 mil da trilha Employee fica na faixa superior do band sênior típico na Suíça — a trilha é seletiva por construção.</li>\n      <li><span class=\"chip\">TED</span> <strong>Dois casos de parceria</strong>: BG Kliniken, Lote 1 (exige apenas <strong>3 desenvolvedores em tempo integral</strong> + 250.000 € de faturamento — menor gap em dias, prazo 07/08) e Universitätsklinikum Magdeburg (prazo 31/07, exige referências de hospital de atendimento máximo + três certificações ISO). govdigital \"gd.KI\" seria, em conteúdo, o melhor match — mas com o limiar de <strong>100 FTE/5 milhões de €</strong> é claramente classe skip.</li>\n      <li><span class=\"chip\">Qualidade de dados</span> <strong>Apenas 9 de 104 datadas</strong>: 86 das 104 vagas vêm da freelancermap, que não publica data de postagem para a maioria dos projetos (\"n/a\") — algo sistêmico, não erro de coleta. Apenas <strong>6</strong> vagas trazem uma taxa publicada; toda outra indicação de €/h é pesquisada (<code>*</code>).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy, dos cifras parecen contradecirse. El <strong>Freelancer-Kompass 2026</strong> dice: <strong>43 %</strong> de los freelancers en la región DACH no tienen actualmente ocupación garantizada para los próximos meses, <strong>23 %</strong> en el segmento de TI/software reportan menos contratos que el año anterior, y el número de licitaciones de proyectos registradas se ubica en alrededor de <strong>90,000</strong> (2025), casi un tercio por debajo del pico de <strong>132,000</strong> (2022) — de vuelta al nivel de 2020. El board dice: <strong>104 vacantes verificadas</strong>, de las cuales 91 son freelance, 17 con Fit ≥ 80, lo mejor investigado en <strong>90–130 €/h*</strong>. Ambas cosas son ciertas al mismo tiempo — y la resolución es el verdadero punto del día: si 43 % está sin ocupación mientras hay 91 proyectos Java/Spring/Angular abiertos, entonces el cuello de botella no está en la <em>demanda</em>, sino en la <em>adjudicación</em>. El mercado no está vacío — está lleno de candidatos por proyecto. A esto se suman tres noticias de recortes en DACH como telón de fondo y dos licitaciones de TED, ambas casos de socio, una de ellas con la brecha más pequeña en días.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>La contradicción del día</strong>: <strong>43 %</strong> sin ocupación garantizada, <strong>23 %</strong> menos contratos de TI/software frente al año anterior (Freelancer-Kompass 2026, primera ola encuestada del 17/11 al 03/12/2025) — y al mismo tiempo <strong>91 proyectos freelance abiertos</strong> en el board de hoy. Es un problema de competencia, no de demanda.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>El board crece a 104</strong> (ayer 88): 91 Freelance / 8 Employee / 5 Intriguing, Fit promedio <strong>63.6</strong>, el mismo trío líder de Fráncfort con Fit <strong>88</strong> (iSAX, BridgingIT, Keil). <strong>17</strong> vacantes ≥ 80, <strong>36</strong> ≥ 70, 86 con etiqueta remoto.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Meseta de volumen, no un desplome</strong>: ~90,000 licitaciones de proyectos registradas en 2025 = nivel de 2020, tras el pico de 132,000 (2022). La propia freelancermap lo llama \"se estabiliza\" — un tercio por debajo del pico, pero sin más caída.</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Software es la rama de TI más débil</strong>: mediana de <strong>90 €/h</strong> para desarrollo de software/web — la más baja de las cuatro especializaciones de TI rastreadas; mediana de TI en DACH 95 €/h, promedio de todos los freelancers 103 €/h (tras 104 €). Lo mejor del board se ubica, según lo investigado, en 90–130 €/h*, es decir, en el extremo superior de su propia rama.</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>El Kompass confirma el board desde afuera</strong>: \"SAP, Java y DevOps dominan la búsqueda de freelancers en 2025 en el entorno de TI.\" En el board de hoy: Java <strong>47×</strong>, Angular 39×, Spring Boot 37×, AWS 22×, Kubernetes 20×, TypeScript 19×, integración de IA 15×.</li>\n      <li><span class=\"chip hot\">DE</span> <strong>Telón de fondo de recortes</strong>: VW hasta <strong>100,000</strong> de unos 657,000 puestos corporativos, cuatro plantas al borde del cierre (26/06); Commerzbank <strong>+3,000</strong> puestos de tiempo completo como defensa ante UniCredit (08/05); Zalando Erfurt <strong>2,700</strong> empleados, cierre a fines de septiembre. Todo a nivel de empleo formal — no el mercado de proyectos.</li>\n      <li><span class=\"chip\">CH</span> <strong>Sobreprecio de IA, piso duro</strong>: ELCA (Agentic AI, Zúrich) CHF 140–190 mil*, Fit <strong>81</strong>; AXA (plataforma de IA agéntica) CHF 130–170 mil*, 80; Camunda (Kubernetes, work-from-anywhere) $126,800–190,100, 80. El piso de CHF 150 mil de la vía Employee se ubica en el extremo <em>superior</em> de la franja senior típica en Suiza — la vía es selectiva por diseño.</li>\n      <li><span class=\"chip\">TED</span> <strong>Dos casos de socio</strong>: BG Kliniken Lote 1 (solo <strong>3 desarrolladores de tiempo completo</strong> + 250,000 € de facturación exigidos — la brecha más pequeña en días, plazo 07/08) y el Hospital Universitario de Magdeburgo (plazo 31/07, exige referencias de un hospital de máxima atención + tres certificaciones ISO). govdigital \"gd.KI\" sería, en contenido, el mejor match — y con el <strong>umbral de 100 FTE / 5 millones de €</strong> es claramente clase skip.</li>\n      <li><span class=\"chip\">Calidad de datos</span> <strong>Solo 9 de 104 con fecha</strong>: 86 de las 104 vacantes provienen de freelancermap, que para la mayoría de los proyectos no publica fecha de publicación (\"n/a\") — es sistémico, no un error de scraping. Solo <strong>6</strong> vacantes llevan una tarifa publicada; cualquier otra cifra en €/h es investigada (<code>*</code>).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die WM läuft auf ihre letzten 210 Minuten zu, und keine der beiden Mannschaften, die dich interessieren, ist noch dabei. Deutschland ist seit dem 29. Juni raus — im Sechzehntelfinale, an Paraguay, im Elfmeterschießen. Brasilien seit dem 5. Juli, im Achtelfinale, an Norwegen. Übrig bleiben Spanien und Argentinien: Samstag das Spiel um Platz 3, Sonntag das Finale. Für dich in Ribeirão Claro liegen beide Anstöße bequem am Nachmittag bzw. frühen Abend. Und heute Abend geht direkt vor der Haustür der Brasileirão weiter: Fluminense gegen Bragantino im Maracanã.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Finale So 19.07.</strong>: Spanien–Argentinien, <strong>21:00 MESZ / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (New Jersey). Spanien kam über ein 2:0 gegen Frankreich, Argentinien über ein 2:1 gegen England.</li>\n      <li><span class=\"chip\">WM</span> <strong>Platz 3 Sa 18.07.</strong>: Frankreich–England, <strong>23:00 MESZ / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens — das Duell der beiden Halbfinal-Verlierer.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Maracanã heute</strong>: Fluminense (3.) gegen Red Bull Bragantino (5.), 20:00 BRT / 01:00 MESZ (Sa) — Nachholspiel der 19. Runde und für beide Klubs das erste Pflichtspiel nach der WM-Pause. Volle Tabelle im Body.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Röhl ist fest weg</strong>: Die Kaufpflicht bei Everton hat gezogen, ~25 Mio. € — laut transfermarkt der teuerste abgeschlossene Verkauf der Klubgeschichte.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi: Bericht, kein Vollzug</strong>: gut 60 Mio. € von Aston Villa, Medizincheck laut Berichten am Do 16.07. absolviert, Fünfjahresvertrag ausgehandelt — verkündet hat bis heute früh kein Klub etwas.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp weiter unbestätigt</strong>: Nagelsmann ging am 03.07. formal auf eigenen Wunsch — nahegelegt hatte ihm den Rücktritt der DFB. Klopp gilt laut Berichten als so gut wie sicher — offiziell bestätigt hat der DFB bis heute nichts.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção-Debakel</strong>: 1:2 gegen Norwegen, Haaland-Doppelpack, Neymar-Elfmeter in der 100. Minute — laut Sportschau das erste Achtelfinal-Aus seit 36 Jahren.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Noch Sommerpause</strong>: Auftakt erst am 28.08. (Bayern–Stuttgart). Endtabelle 2025/26 als Referenz-Anker im Body.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die WM läuft auf ihre letzten 210 Minuten zu, und keine der beiden Mannschaften, die dich interessieren, ist noch dabei. Deutschland ist seit dem 29. Juni raus — im Sechzehntelfinale, an Paraguay, im Elfmeterschießen. Brasilien seit dem 5. Juli, im Achtelfinale, an Norwegen. Übrig bleiben Spanien und Argentinien: Samstag das Spiel um Platz 3, Sonntag das Finale. Für dich in Ribeirão Claro liegen beide Anstöße bequem am Nachmittag bzw. frühen Abend. Und heute Abend geht direkt vor der Haustür der Brasileirão weiter: Fluminense gegen Bragantino im Maracanã.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Finale So 19.07.</strong>: Spanien–Argentinien, <strong>21:00 MESZ / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (New Jersey). Spanien kam über ein 2:0 gegen Frankreich, Argentinien über ein 2:1 gegen England.</li>\n      <li><span class=\"chip\">WM</span> <strong>Platz 3 Sa 18.07.</strong>: Frankreich–England, <strong>23:00 MESZ / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens — das Duell der beiden Halbfinal-Verlierer.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Maracanã heute</strong>: Fluminense (3.) gegen Red Bull Bragantino (5.), 20:00 BRT / 01:00 MESZ (Sa) — Nachholspiel der 19. Runde und für beide Klubs das erste Pflichtspiel nach der WM-Pause. Volle Tabelle im Body.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Röhl ist fest weg</strong>: Die Kaufpflicht bei Everton hat gezogen, ~25 Mio. € — laut transfermarkt der teuerste abgeschlossene Verkauf der Klubgeschichte.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi: Bericht, kein Vollzug</strong>: gut 60 Mio. € von Aston Villa, Medizincheck laut Berichten am Do 16.07. absolviert, Fünfjahresvertrag ausgehandelt — verkündet hat bis heute früh kein Klub etwas.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp weiter unbestätigt</strong>: Nagelsmann ging am 03.07. formal auf eigenen Wunsch — nahegelegt hatte ihm den Rücktritt der DFB. Klopp gilt laut Berichten als so gut wie sicher — offiziell bestätigt hat der DFB bis heute nichts.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção-Debakel</strong>: 1:2 gegen Norwegen, Haaland-Doppelpack, Neymar-Elfmeter in der 100. Minute — laut Sportschau das erste Achtelfinal-Aus seit 36 Jahren.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Noch Sommerpause</strong>: Auftakt erst am 28.08. (Bayern–Stuttgart). Endtabelle 2025/26 als Referenz-Anker im Body.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The World Cup is down to its final 210 minutes, and neither team you actually care about is still in it. Germany has been out since June 29 — in the round of 32, to Paraguay, on penalties. Brazil since July 5, in the round of 16, to Norway. What's left is Spain and Argentina: Saturday the third-place match, Sunday the final. For you in Ribeirão Claro, both kickoffs land comfortably in the afternoon or early evening. And tonight, right on your doorstep, the Brasileirão continues: Fluminense vs. Bragantino at the Maracanã.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Final Sun 07/19</strong>: Spain–Argentina, <strong>9:00 PM CEST / 4:00 PM BRT</strong>, MetLife Stadium, East Rutherford (New Jersey). Spain got there with a 2-0 win over France, Argentina with a 2-1 win over England.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Third-place match Sat 07/18</strong>: France–England, <strong>11:00 PM CEST / 6:00 PM BRT</strong>, Hard Rock Stadium, Miami Gardens — the two semifinal losers facing off.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Maracanã tonight</strong>: Fluminense (3rd) vs. Red Bull Bragantino (5th), 8:00 PM BRT / 1:00 AM CEST (Sat) — a makeup match from round 19, and the first competitive game after the World Cup break for both clubs. Full table in the body.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Röhl's move is permanent</strong>: the mandatory-purchase clause at Everton kicked in, ~€25m — per transfermarkt, the most expensive completed sale in club history.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Manzambi: reported, not done</strong>: just over €60m from Aston Villa, medical reportedly completed Thu 07/16, a five-year contract negotiated — as of this morning, no club has announced anything.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp still unconfirmed</strong>: Nagelsmann's 07/03 exit was formally at his own request — the DFB had urged him to resign. Klopp is reportedly all but certain — the DFB has confirmed nothing officially.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Seleção debacle</strong>: 1-2 against Norway, a Haaland brace, Neymar penalty in the 100th minute — per Sportschau, the first round-of-16 exit in 36 years.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Still on summer break</strong>: kickoff not until 08/28 (Bayern–Stuttgart). 2025/26 final standings as a reference anchor in the body.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A Copa do Mundo caminha para seus últimos 210 minutos, e nenhuma das duas seleções que interessam a você segue na disputa. A Alemanha está fora desde 29 de junho — na fase de 32, para o Paraguai, nos pênaltis. O Brasil, desde 5 de julho, nas oitavas de final, para a Noruega. Sobram Espanha e Argentina: sábado o jogo pelo terceiro lugar, domingo a final. Para você em Ribeirão Claro, os dois horários caem confortavelmente à tarde e no início da noite. E hoje à noite o Brasileirão continua bem na sua porta: Fluminense contra Bragantino, no Maracanã.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Final dom. 19/07</strong>: Espanha–Argentina, <strong>21h00 CEST / 16h00 BRT</strong>, MetLife Stadium, East Rutherford (Nova Jersey). A Espanha chegou com um 2 a 0 sobre a França, a Argentina com um 2 a 1 sobre a Inglaterra.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Terceiro lugar sáb. 18/07</strong>: França–Inglaterra, <strong>23h00 CEST / 18h00 BRT</strong>, Hard Rock Stadium, Miami Gardens — o duelo entre os dois perdedores das semifinais.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Maracanã hoje</strong>: Fluminense (3º) contra Red Bull Bragantino (5º), 20h00 BRT / 01h00 CEST (sáb.) — jogo adiado da 19ª rodada e, para os dois clubes, a primeira partida oficial após a pausa da Copa. Tabela completa no corpo do texto.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Röhl está de saída definitiva</strong>: a cláusula de compra obrigatória do Everton foi acionada, ~€25 milhões — segundo o transfermarkt, a venda mais cara já concluída na história do clube.</li>\n      <li><span class=\"chip hot\">Transferência</span> <strong>Manzambi: relato, não fechamento</strong>: pouco mais de €60 milhões do Aston Villa, exame médico realizado, segundo relatos, na qui. 16/07, contrato de cinco anos negociado — até esta manhã, nenhum clube anunciou nada.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp segue sem confirmação</strong>: Nagelsmann saiu em 03/07, formalmente a pedido próprio — mas foi a DFB quem lhe sugeriu a renúncia. Klopp é dado como praticamente certo pelos relatos — mas a DFB não confirmou nada oficialmente até hoje.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Fiasco da Seleção</strong>: 1 a 2 contra a Noruega, dobradinha de Haaland, pênalti de Neymar aos 100 minutos — segundo a Sportschau, a primeira eliminação já nas oitavas de final em 36 anos.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Ainda de férias</strong>: início só em 28/08 (Bayern–Stuttgart). Tabela final de 2025/26 como referência no corpo do texto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El Mundial entra en sus últimos 210 minutos, y ninguno de los dos equipos que te interesan sigue en carrera. Alemania quedó fuera desde el 29 de junio — en dieciseisavos de final, ante Paraguay, en la tanda de penales. Brasil, desde el 5 de julio, en octavos de final, ante Noruega. Quedan España y Argentina: el sábado, el partido por el tercer lugar; el domingo, la final. Para ti en Ribeirão Claro, ambos horarios caen cómodos, por la tarde y al inicio de la noche. Y esta noche, justo frente a tu puerta, sigue el Brasileirão: Fluminense contra Bragantino en el Maracanã.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Final Dom 19/07</strong>: España–Argentina, <strong>21:00 CEST / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (Nueva Jersey). España llegó con un 2-0 sobre Francia, Argentina con un 2-1 sobre Inglaterra.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Tercer lugar Sáb 18/07</strong>: Francia–Inglaterra, <strong>23:00 CEST / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens — el duelo entre los dos perdedores de semifinales.</li>\n      <li><span class=\"chip hot\">BRA</span> <strong>Maracanã hoy</strong>: Fluminense (3.º) contra Red Bull Bragantino (5.º), 20:00 BRT / 01:00 CEST (sáb.) — partido pendiente de la jornada 19 y, para ambos clubes, el primer compromiso oficial tras la pausa del Mundial. Tabla completa en el cuerpo del texto.</li>\n      <li><span class=\"chip good\">Freiburg</span> <strong>Röhl se va definitivo</strong>: se activó la cláusula de compra obligatoria con el Everton, ~€25 millones — según transfermarkt, la venta cerrada más cara en la historia del club.</li>\n      <li><span class=\"chip hot\">Transferencia</span> <strong>Manzambi: reporte, no un cierre</strong>: poco más de €60 millones del Aston Villa, revisión médica según reportes el jue. 16/07, contrato de cinco años ya negociado — hasta esta mañana, ningún club ha anunciado nada.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Klopp, aún sin confirmar</strong>: Nagelsmann se fue el 03/07 formalmente por decisión propia — pero fue la DFB quien le sugirió la renuncia. Según reportes, Klopp es prácticamente un hecho — pero la DFB no ha confirmado nada de forma oficial hasta hoy.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Debacle de la Seleção</strong>: 1-2 ante Noruega, doblete de Haaland, penal de Neymar en el minuto 100 — según Sportschau, la primera eliminación en octavos de final en 36 años.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Todavía de vacaciones</strong>: el arranque será hasta el 28/08 (Bayern–Stuttgart). Clasificación final 2025/26 como referencia en el cuerpo del texto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 17. Juli — in Spa rollt heute die erste Session des Belgien-Wochenendes, FP1 um <strong>08:30 BRT</strong>. Die frischeste Nachricht des Tages ist keine Fahrermarkt-Meldung, sondern eine <strong>Sicherheits-Entscheidung</strong>: Red Bull nimmt den experimentellen &bdquo;Macarena&ldquo;-Heckflügel zurück, mit dem Verstappen in Österreich und Silverstone zweimal bei hohem Tempo abflog. Seine Begründung ist ungewöhnlich direkt für einen Fahrer, der sonst wenig sagt: &bdquo;super gefährlich&ldquo;, er hätte sich &bdquo;zweimal ernsthaft verletzen können&ldquo;. Dazu, am selben Donnerstag und in genau entgegengesetzte Richtungen: sein Manager sagt, Max wolle seine Zeit bei Red Bull zu Ende bringen — Verstappen selbst antwortet auf jede Zukunftsfrage der FIA-Pressekonferenz mit &bdquo;Nein.&ldquo; und &bdquo;Nichts.&ldquo;. Und die Klausel-Rechnung ist seit heute endgültig: Die Tür ist offen, ob er hindurchgeht, sagt niemand.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · Technik &amp; Sicherheit</span> <strong>&bdquo;Macarena&ldquo;-Flügel abgesetzt</strong>: Red Bull fährt in Spa wieder den konventionellen Heckflügel, nachdem Verstappen das Bauteil nach zwei Hochgeschwindigkeits-Abflügen (Österreich, Silverstone) als &bdquo;super gefährlich&ldquo; bezeichnete (17.07.).</li>\n      <li><span class=\"chip hot\">Fahrermarkt · widersprüchlich</span> <strong>Zwei Signale, ein Donnerstag</strong>: Manager Vermeulen zu oe24 — &bdquo;Max will seine Zeit bei Red Bull zu Ende bringen&ldquo;. Verstappen bei der FIA-PK: &bdquo;Nichts zu sagen von meiner Seite.&ldquo; Nichts davon ist offiziell.</li>\n      <li><span class=\"chip\">Fahrermarkt · Mathe</span> <strong>Klausel-Bedingung endgültig erfüllt</strong>: 76 Punkte auf P7, Deckel 126 bis Ungarn (26.07.) — Russell steht schon bei 154, Hamilton bei 147. Top zwei sind rechnerisch unerreichbar.</li>\n      <li><span class=\"chip good\">F1 · heute</span> <strong>Spa startet</strong>: FP1 13:30 MESZ / 08:30 BRT, FP2 17:00 MESZ / 12:00 BRT. Rennen So 19.07. 15:00 MESZ / 10:00 BRT, 44 Runden, <strong>kein Sprint</strong>.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nur Formel 1 dieses Wochenende</strong>: WEC pausiert bis COTA, MotoGP ist bis Silverstone (07.–09.08.) in der Sommerpause. Kein WEC- oder MotoGP-Lauf am 17.–19.07.</li>\n      <li><span class=\"chip\">WEC · Stand</span> <strong>Toyota 132, BMW 127</strong> nach São Paulo (12.07.) — fünf Punkte, obwohl BMW das Rennen gewann. Noch fünf Rennen offen.</li>\n      <li><span class=\"chip\">MotoGP · Stand</span> <strong>Martín 208</strong> führt, Top fünf innerhalb von 24 Punkten. Achtung: motogp.com lieferte heute keine Tabelle — Stand beruht auf zwei unabhängigen Sekundärquellen (12.07.).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Freitag, der 17. Juli — in Spa rollt heute die erste Session des Belgien-Wochenendes, FP1 um <strong>08:30 BRT</strong>. Die frischeste Nachricht des Tages ist keine Fahrermarkt-Meldung, sondern eine <strong>Sicherheits-Entscheidung</strong>: Red Bull nimmt den experimentellen &bdquo;Macarena&ldquo;-Heckflügel zurück, mit dem Verstappen in Österreich und Silverstone zweimal bei hohem Tempo abflog. Seine Begründung ist ungewöhnlich direkt für einen Fahrer, der sonst wenig sagt: &bdquo;super gefährlich&ldquo;, er hätte sich &bdquo;zweimal ernsthaft verletzen können&ldquo;. Dazu, am selben Donnerstag und in genau entgegengesetzte Richtungen: sein Manager sagt, Max wolle seine Zeit bei Red Bull zu Ende bringen — Verstappen selbst antwortet auf jede Zukunftsfrage der FIA-Pressekonferenz mit &bdquo;Nein.&ldquo; und &bdquo;Nichts.&ldquo;. Und die Klausel-Rechnung ist seit heute endgültig: Die Tür ist offen, ob er hindurchgeht, sagt niemand.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · Technik &amp; Sicherheit</span> <strong>&bdquo;Macarena&ldquo;-Flügel abgesetzt</strong>: Red Bull fährt in Spa wieder den konventionellen Heckflügel, nachdem Verstappen das Bauteil nach zwei Hochgeschwindigkeits-Abflügen (Österreich, Silverstone) als &bdquo;super gefährlich&ldquo; bezeichnete (17.07.).</li>\n      <li><span class=\"chip hot\">Fahrermarkt · widersprüchlich</span> <strong>Zwei Signale, ein Donnerstag</strong>: Manager Vermeulen zu oe24 — &bdquo;Max will seine Zeit bei Red Bull zu Ende bringen&ldquo;. Verstappen bei der FIA-PK: &bdquo;Nichts zu sagen von meiner Seite.&ldquo; Nichts davon ist offiziell.</li>\n      <li><span class=\"chip\">Fahrermarkt · Mathe</span> <strong>Klausel-Bedingung endgültig erfüllt</strong>: 76 Punkte auf P7, Deckel 126 bis Ungarn (26.07.) — Russell steht schon bei 154, Hamilton bei 147. Top zwei sind rechnerisch unerreichbar.</li>\n      <li><span class=\"chip good\">F1 · heute</span> <strong>Spa startet</strong>: FP1 13:30 MESZ / 08:30 BRT, FP2 17:00 MESZ / 12:00 BRT. Rennen So 19.07. 15:00 MESZ / 10:00 BRT, 44 Runden, <strong>kein Sprint</strong>.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nur Formel 1 dieses Wochenende</strong>: WEC pausiert bis COTA, MotoGP ist bis Silverstone (07.–09.08.) in der Sommerpause. Kein WEC- oder MotoGP-Lauf am 17.–19.07.</li>\n      <li><span class=\"chip\">WEC · Stand</span> <strong>Toyota 132, BMW 127</strong> nach São Paulo (12.07.) — fünf Punkte, obwohl BMW das Rennen gewann. Noch fünf Rennen offen.</li>\n      <li><span class=\"chip\">MotoGP · Stand</span> <strong>Martín 208</strong> führt, Top fünf innerhalb von 24 Punkten. Achtung: motogp.com lieferte heute keine Tabelle — Stand beruht auf zwei unabhängigen Sekundärquellen (12.07.).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Friday, July 17 — in Spa, the first session of the Belgian weekend rolls out today, FP1 at <strong>08:30 BRT</strong>. Today's freshest news isn't a driver-market story but a safety decision: Red Bull is pulling back the experimental \"Macarena\" rear wing that sent Verstappen off at high speed twice, in Austria and at Silverstone. His explanation is unusually direct for a driver who otherwise says little: \"super dangerous,\" he says he \"could have really hurt myself twice.\" On top of that, from the same Thursday and pointing in exactly opposite directions: his manager says Max wants to finish his time at Red Bull — Verstappen himself answers every future question at the FIA press conference with \"No.\" and \"Nothing.\" And the clause math is final as of today: the door is open; whether he walks through it, nobody says.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · Technology &amp; Safety</span> <strong>\"Macarena\" wing scrapped</strong>: Red Bull reverts to the conventional rear wing in Spa after Verstappen called the part \"super dangerous\" following two high-speed crashes (Austria, Silverstone) (07/17).</li>\n      <li><span class=\"chip hot\">Driver market · contradictory</span> <strong>Two signals, one Thursday</strong>: Manager Vermeulen to oe24 — \"Max wants to finish his time at Red Bull.\" Verstappen at the FIA press conference: \"Nothing to say from my side.\" None of it is official.</li>\n      <li><span class=\"chip\">Driver market · the math</span> <strong>Clause condition finally locked in</strong>: 76 points in P7, cap of 126 by Hungary (07/26) — Russell already at 154, Hamilton at 147. The top two are mathematically unreachable.</li>\n      <li><span class=\"chip good\">F1 · today</span> <strong>Spa gets underway</strong>: FP1 13:30 CEST / 08:30 BRT, FP2 17:00 CEST / 12:00 BRT. Race Sun 07/19, 15:00 CEST / 10:00 BRT, 44 laps, <strong>no sprint</strong>.</li>\n      <li><span class=\"chip\">Calendar</span> <strong>Formula 1 only this weekend</strong>: WEC is on break until COTA, MotoGP is on its summer break until Silverstone (08/07–09). No WEC or MotoGP round on 07/17–19.</li>\n      <li><span class=\"chip\">WEC · standings</span> <strong>Toyota 132, BMW 127</strong> after São Paulo (07/12) — five points, even though BMW won the race. Five races still to go.</li>\n      <li><span class=\"chip\">MotoGP · standings</span> <strong>Martín leads with 208</strong>, top five within 24 points. Heads up: motogp.com didn't render a table today — the standings rest on two independent secondary sources (07/12).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é sexta-feira, 17 de julho — em Spa, a primeira sessão do fim de semana da Bélgica acontece hoje, o TL1 às <strong>08h30 BRT</strong>. A notícia mais recente do dia não vem do mercado de pilotos, e sim de uma <strong>decisão de segurança</strong>: a Red Bull retira a experimental asa traseira \"Macarena\", com a qual Verstappen saiu da pista em alta velocidade duas vezes, na Áustria e em Silverstone. Sua justificativa é incomumente direta para um piloto que costuma falar pouco: \"superperigosa\", ele \"poderia ter se machucado seriamente duas vezes\". Além disso, na mesma quinta-feira e em direções exatamente opostas: seu empresário diz que Max quer terminar seu tempo na Red Bull — o próprio Verstappen responde a toda pergunta sobre o futuro na entrevista coletiva da FIA com \"Não.\" e \"Nada.\". E a conta da cláusula está definitiva desde hoje: a porta está aberta, se ele vai atravessá-la, ninguém diz.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · Técnica &amp; Segurança</span> <strong>Asa \"Macarena\" aposentada</strong>: a Red Bull volta a usar a asa traseira convencional em Spa, depois que Verstappen classificou a peça como \"superperigosa\" após duas saídas de pista em alta velocidade (Áustria, Silverstone) (17/07).</li>\n      <li><span class=\"chip hot\">Mercado de pilotos · contraditório</span> <strong>Dois sinais, uma quinta-feira</strong>: o empresário Vermeulen à oe24 — \"Max quer terminar seu tempo na Red Bull\". Verstappen na entrevista coletiva da FIA: \"Nada a dizer da minha parte.\" Nada disso é oficial.</li>\n      <li><span class=\"chip\">Mercado de pilotos · matemática</span> <strong>Condição da cláusula definitivamente cumprida</strong>: 76 pontos em P7, teto de 126 até a Hungria (26/07) — Russell já está com 154, Hamilton com 147. O top 2 é matematicamente inalcançável.</li>\n      <li><span class=\"chip good\">F1 · hoje</span> <strong>Spa começa</strong>: TL1 13h30 CEST / 08h30 BRT, TL2 17h00 CEST / 12h00 BRT. Corrida dom 19/07, 15h00 CEST / 10h00 BRT, 44 voltas, <strong>sem sprint</strong>.</li>\n      <li><span class=\"chip\">Calendário</span> <strong>Só Fórmula 1 neste fim de semana</strong>: o WEC está de pausa até COTA, a MotoGP está de pausa de verão até Silverstone (07–09/08). Nenhuma etapa do WEC ou da MotoGP em 17–19/07.</li>\n      <li><span class=\"chip\">WEC · classificação</span> <strong>Toyota 132, BMW 127</strong> depois de São Paulo (12/07) — cinco pontos de diferença, mesmo com a vitória da BMW na corrida. Ainda restam cinco corridas.</li>\n      <li><span class=\"chip\">MotoGP · classificação</span> <strong>Martín lidera com 208</strong>, os cinco primeiros estão dentro de uma faixa de 24 pontos. Atenção: o motogp.com não trouxe tabela hoje — a classificação se baseia em duas fontes secundárias independentes (12/07).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es viernes 17 de julio — en Spa arranca hoy la primera sesión del fin de semana de Bélgica, la EL1 a las <strong>08:30 BRT</strong>. La noticia más reciente del día no es del mercado de pilotos, sino una <strong>decisión de seguridad</strong>: Red Bull retira el alerón trasero experimental \"Macarena\", con el que Verstappen se salió de pista dos veces a alta velocidad en Austria y Silverstone. Su explicación es inusualmente directa para un piloto que normalmente dice poco: \"súper peligroso\", podría haberse \"lastimado seriamente dos veces\". A eso se suma, el mismo jueves y en direcciones exactamente opuestas: su manager dice que Max quiere terminar su etapa en Red Bull — Verstappen mismo responde a cada pregunta sobre su futuro en la conferencia de prensa de la FIA con \"No.\" y \"Nada.\". Y la cuenta de la cláusula es definitiva desde hoy: la puerta está abierta, pero nadie dice si la cruzará.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · Técnica y seguridad</span> <strong>Alerón \"Macarena\" retirado</strong>: Red Bull vuelve a usar el alerón trasero convencional en Spa, después de que Verstappen calificara la pieza de \"súper peligrosa\" tras dos salidas de pista a alta velocidad (Austria, Silverstone) (17/07).</li>\n      <li><span class=\"chip hot\">Mercado de pilotos · contradictorio</span> <strong>Dos señales, un jueves</strong>: el manager Vermeulen a oe24 — \"Max quiere terminar su etapa en Red Bull\". Verstappen en la rueda de prensa de la FIA: \"No tengo nada que decir de mi parte.\" Nada de esto es oficial.</li>\n      <li><span class=\"chip\">Mercado de pilotos · matemáticas</span> <strong>Condición de la cláusula cumplida en definitiva</strong>: 76 puntos en P7, tope de 126 hasta Hungría (26/07) — Russell ya tiene 154, Hamilton 147. El top dos es matemáticamente inalcanzable.</li>\n      <li><span class=\"chip good\">F1 · hoy</span> <strong>Arranca Spa</strong>: EL1 13:30 CEST / 08:30 BRT, EL2 17:00 CEST / 12:00 BRT. Carrera dom 19.07, 15:00 CEST / 10:00 BRT, 44 vueltas, <strong>sin sprint</strong>.</li>\n      <li><span class=\"chip\">Calendario</span> <strong>Solo Fórmula 1 este fin de semana</strong>: la WEC está en pausa hasta COTA, la MotoGP está en pausa de verano hasta Silverstone (07.–09.08.). No hay carrera de WEC ni de MotoGP el 17.–19.07.</li>\n      <li><span class=\"chip\">WEC · clasificación</span> <strong>Toyota 132, BMW 127</strong> después de São Paulo (12.07) — cinco puntos de diferencia, aunque BMW ganó la carrera. Quedan cinco carreras.</li>\n      <li><span class=\"chip\">MotoGP · clasificación</span> <strong>Martín lidera con 208</strong>, los cinco primeros dentro de 24 puntos. Atención: motogp.com no entregó hoy una tabla — la clasificación se basa en dos fuentes secundarias independientes (12.07).</li>\n    </ul></div>"

e gefahren werden. Kein amtlicher Alert — aber ein Muster.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {

 werden. Kein amtlicher Alert — aber ein Muster.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Halfway through the school break — and the week delivers exactly the weekend you hope for in July: not a drop of rain from today through Monday, 26° on Sunday, motocross right in town, and a festival finale in Londrina. Add two health stories pointing the same way: the 2026 dengue season has practically failed to materialize, and severe RSV cases in babies under six months have collapsed by four-fifths in Paraná. For a household with a one-month-old girl, that's the headline of the day.</p>\n    <ul>\n      <li><span class=\"chip good\">WEATHER</span> <strong>Four dry days in a row</strong>: a straight 0% chance of rain from today through Monday, highs climbing from 26° to 27°. Two portals agree.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>Dengue nearly gone</strong>: Paraná counts 5,554 confirmed cases (weeks 01–26/2026) — <strong>−93.7%</strong> versus last year. Our region, Jacarezinho: 73 cases, zero deaths.</li>\n      <li><span class=\"chip good\">HEALTH</span> <strong>RSV in babies −81.1%</strong>: severe cases in under-six-month-olds fell in Paraná from 1,421 to 269 — the effect of the maternal vaccine rolled out since December 2025.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Break week 2 starts Monday</strong>: recess through Fri 07/24, classes resume Mon 07/27.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Motocross right in town</strong>: Velocross Camiloti on Sunday at the Centro de Eventos — start time and admission, however, not confirmed.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>FIML finale in Londrina</strong>: today a US youth orchestra (free), Sat \"Gatos — O Musical\" (from R$ 25), Sun 10:30 a.m. closing concert (free) — our Weekend Pick.</li>\n      <li><span class=\"chip hot\">SAFETY</span> <strong>PR-092 and BR-153</strong>: four serious crashes in five days on exactly the roads being driven this weekend. No official alert — but a pattern.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É a metade das férias — e a semana traz exatamente o fim de semana que se espera em julho: nem uma gota de chuva de hoje até segunda-feira, 26° no domingo, motocross no próprio município e um final de festival em Londrina. Some-se a isso duas notícias de saúde que apontam na mesma direção: a temporada de dengue de 2026 praticamente não aconteceu, e os casos graves de VSR em bebês com menos de seis meses despencaram quatro quintos no Paraná. Para uma casa com uma menina de um mês de vida, essa é a notícia do dia.</p>\n    <ul>\n      <li><span class=\"chip good\">CLIMA</span> <strong>Quatro dias secos seguidos</strong>: hoje até segunda-feira sempre 0% de chuva, as máximas sobem de 26° para 27°. Dois portais concordam.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>Dengue praticamente desaparecida</strong>: Paraná contabiliza 5.554 casos confirmados (SE 01–26/2026) — <strong>−93,7%</strong> em relação ao ano anterior. Nossa Regional Jacarezinho: 73 casos, zero mortes.</li>\n      <li><span class=\"chip good\">SAÚDE</span> <strong>VSR em bebês −81,1%</strong>: os casos graves em menores de seis meses caíram no PR de 1.421 para 269 — efeito da vacinação de gestantes desde dezembro de 2025.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Semana 2 de férias começa na segunda-feira</strong>: recesso até sex 24/07, aulas voltam a partir de seg 27/07.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Motocross no próprio município</strong>: Velocross Camiloti no domingo no Centro de Eventos — horário e valor da entrada, porém, não confirmados.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Final do FIML em Londrina</strong>: hoje orquestra jovem dos EUA (grátis), sáb \"Gatos — O Musical\" (a partir de R$ 25), dom 10h30 concerto de encerramento (grátis) — nossa pedida do fim de semana.</li>\n      <li><span class=\"chip hot\">SEGURANÇA</span> <strong>PR-092 e BR-153</strong>: quatro acidentes graves em cinco dias exatamente nas estradas que serão percorridas neste fim de semana. Sem alerta oficial — mas um padrão.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Medio tiempo de vacaciones — y la semana entrega justo el fin de semana que uno espera en julio: ni una gota de lluvia desde hoy hasta el lunes, 26° el domingo, motocross en el propio pueblo y el cierre de un festival en Londrina. A eso se suman dos noticias de salud que apuntan en la misma dirección: la temporada de dengue 2026 prácticamente no existió, y los casos graves de VSR en bebés menores de seis meses se desplomaron cuatro quintas partes en Paraná. Para un hogar con una niña de un mes, esa es la noticia del día.</p>\n    <ul>\n      <li><span class=\"chip good\">CLIMA</span> <strong>Cuatro días secos seguidos</strong>: de hoy al lunes, 0 % de lluvia sin interrupción, las máximas suben de 26° a 27°. Dos portales de acuerdo.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>Dengue casi desaparecido</strong>: Paraná registra 5.554 casos confirmados (SE 01–26/2026) — <strong>−93,7 %</strong> respecto al año anterior. Nuestra regional Jacarezinho: 73 casos, cero muertes.</li>\n      <li><span class=\"chip good\">SALUD</span> <strong>VSR en bebés −81,1 %</strong>: los casos graves en menores de seis meses cayeron en PR de 1.421 a 269 — efecto de la vacunación de embarazadas desde diciembre de 2025.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Semana 2 de vacaciones inicia el lunes</strong>: receso hasta el vie 24.07, clases de nuevo desde el lun 27.07.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Motocross en el propio pueblo</strong>: Velocross Camiloti el domingo en el Centro de Eventos — hora y entrada, sin embargo, no confirmadas.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Cierre del FIML en Londrina</strong>: hoy orquesta juvenil de EE. UU. (gratis), sáb \"Gatos — O Musical\" (desde R$ 25), dom 10h30 concierto de clausura (gratis) — nuestro pick del fin de semana.</li>\n      <li><span class=\"chip hot\">SEGURIDAD</span> <strong>PR-092 y BR-153</strong>: cuatro accidentes graves en cinco días, justo en las carreteras que se recorrerán este fin de semana. Sin alerta oficial — pero sí un patrón.</li>\n    </ul></div>"
