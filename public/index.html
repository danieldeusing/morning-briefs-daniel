<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }

     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {

    min-height: 2.1rem;

  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

  <div class="header-right">

      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">

      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">

        <span class="cat-color"></span>

           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

ge. Der Juni-ISM ist heute 16:00 MESZ fällig, bei Redaktionsschluss noch offen. Zölle + Energie im Preis.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 101,29</strong> (intraday, TradingEconomics), +2,1 % im Monat. Stärkerer Dollar = tendenziell Gegenwind für den BRL.</li>\n      <li><span class=\"chip\">BR</span> <strong>BR-Fertigung schrumpft</strong>: PMI Mai 49,1 (letzter Wert, unter 50 = Kontraktion); Juni-Wert Anfang Juli fällig. Binnen-Konjunktur bleibt lahm unter dem 14,25-%-Zins.</li>\n      <li><span class=\"chip\">Prognose</span> <strong>Heute seitwärts-fest</strong> 5,87–5,92; wahrscheinlichster Punkt 5,90. Meine Konfidenz, nicht Markt-implizit.</li>\n    </ul></div>",

ni-ISM ist heute 16:00 MESZ fällig, bei Redaktionsschluss noch offen. Zölle + Energie im Preis.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 101,29</strong> (intraday, TradingEconomics), +2,1 % im Monat. Stärkerer Dollar = tendenziell Gegenwind für den BRL.</li>\n      <li><span class=\"chip\">BR</span> <strong>BR-Fertigung schrumpft</strong>: PMI Mai 49,1 (letzter Wert, unter 50 = Kontraktion); Juni-Wert Anfang Juli fällig. Binnen-Konjunktur bleibt lahm unter dem 14,25-%-Zins.</li>\n      <li><span class=\"chip\">Prognose</span> <strong>Heute seitwärts-fest</strong> 5,87–5,92; wahrscheinlichster Punkt 5,90. Meine Konfidenz, nicht Markt-implizit.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two forces pull EUR/BRL in the same direction today — upward, against you. The euro is stronger because the ECB raised rates for the first time since 2023 in June; the real is weaker because Brazil's budget has flipped from surplus to deficit. Yesterday's ECB fix stands at 5.9003 — the upper end of the band we've been stuck in for weeks. For your EUR→BRL exchange, this is a window of opportunity; the hard question is whether it holds.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.9003</strong> (ECB fix, 30.06): upper band edge. Cross-check USD/BRL × EUR/USD = 5.9003 — variance ~0.00 %, practically identical, no flag.</li>\n      <li><span class=\"chip\">ECB</span> <strong>First rate hike since 2023</strong>: +25 bp on 11.06 to 2.25 % deposit rate. Middle East war drives energy inflation — EUR structurally firmer.</li>\n      <li><span class=\"chip hot\">DE/EZ</span> <strong>Eurozone inflation last above target</strong>: last confirmed Flash-HICP (May) 3.2 %, energy +10.9 % YoY. June Flash due today ~11:00 CEST, not yet published at deadline. ECB stays hawkish.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal flips</strong>: 5-month primary deficit R$24.9 bn — one year ago a surplus of R$69.1 bn. Gross debt 81.1 % of GDP, highest in five years.</li>\n      <li><span class=\"chip\">BR</span> <strong>Copom cuts further</strong>: Selic −25 bp to 14.25 % (17.06), third straight cut. Focus sees one more cut to 14.00 % by year-end.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Real rate ~9.5 %</strong> — among the world's highest — the carry anchor holding BRL despite fiscal concerns.</li>\n      <li><span class=\"chip\">USA</span> <strong>ISM Manufacturing May 54.0</strong> (last confirmed), Prices Paid 82.1 — input costs rising for 20th straight month. June ISM due today 16:00 CEST, still open at deadline. Tariffs + energy in the price.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 101.29</strong> (intraday, TradingEconomics), +2.1 % on the month. Stronger dollar = headwind for BRL → EUR/BRL upside. Single intraday read only.</li>\n      <li><span class=\"chip\">BR</span> <strong>BR Manufacturing shrinks</strong>: PMI May 49.1 (last value, below 50 = contraction); June due early July. Domestic growth stays weak under 14.25 % rate.</li>\n      <li><span class=\"chip\">Forecast</span> <strong>Today sideways-firm</strong> 5.87–5.92; most likely point 5.90. My confidence, not market-implied.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas forças puxam EUR/BRL na mesma direção hoje — para cima, contra você. O euro ficou forte desde que o BCE subiu juros em junho pela primeira vez desde 2023; o real está fraco porque o orçamento do Brasil saiu de um superávit para um déficit. O fix ECB de ontem fica em 5,9003 — o topo da faixa em que estamos presos há semanas. Para seu câmbio EUR→BRL é uma janela favorável; a pergunta difícil é se segura.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,9003</strong> (fix ECB, 30.06): topo da faixa. Cross-check USD/BRL × EUR/USD = 5,9003 — desvio ~0,00%, consistente, sem flag.</li>\n      <li><span class=\"chip\">BCE</span> <strong>Primeira alta desde 2023</strong>: +25 bp em 11.06 para 2,25% taxa de depósitos. Guerra no Oriente Médio pressiona inflação de energia — EUR estruturalmente mais forte.</li>\n      <li><span class=\"chip hot\">DE/EZ</span> <strong>Inflação da eurozona acima de meta</strong>: Flash HICP maio 3,2%, energia +10,9% ao ano. Flash junho saiu hoje ~11:00 CET, ainda não publicado na prensa. BCE mantém modo falcão.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Fiscal vira</strong>: déficit primário de 5 meses R$ 24,9 bi — um ano atrás ainda R$ 69,1 bi de superávit. Dívida bruta 81,1% do PIB, maior em cinco anos.</li>\n      <li><span class=\"chip\">BR</span> <strong>Copom corta mais</strong>: Selic −25 bp para 14,25% (17.06), terceiro corte seguido. Focus vê mais um corte a 14,00% até fim de ano.</li>\n      <li><span class=\"chip good\">BR</span> <strong>Taxa real ~9,5%</strong> uma das mais altas do mundo — o âncora do carry que sustenta BRL apesar do fiscal.</li>\n      <li><span class=\"chip\">USA</span> <strong>ISM Manufatura maio 54,0</strong> (último confirmado), Preços Pagos 82,1 — custos de entrada subindo 20º mês seguido. Tarifas e energia no preço.</li>\n      <li><span class=\"chip\">USD</span> <strong>DXY 101,29</strong> (intraday, TradingEconomics), +2,1% no mês. Dólar mais forte = headwind para BRL → EUR/BRL pressão para cima.</li>\n      <li><span class=\"chip\">BR</span> <strong>Manufatura BR encolhe</strong>: PMI maio 49,1 (abaixo de 50 = contração); valor junho devido início de julho. Economia interna morna sob 14,25% de juros.</li>\n      <li><span class=\"chip\">Projeção</span> <strong>Hoje lateral-firme</strong> 5,87–5,92; ponto mais provável 5,90. Confiança minha, não implícita de mercado.</li>\n    </ul></div>",

zweiter Monatsgewinn in Folge — der starke Dollar ist der Hebel hinter dem Gold-/Krypto-Abverkauf.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Das erste Halbjahr schließt zweigeteilt: US-Aktien stehen auf Allzeithochs (S&amp;P 500 +9,55 % YTD, Nasdaq +12,79 %), während die klassischen „sicheren Häfen\" zerbröseln. Der Grund ist ein einziger: Der Markt preist wieder Fed-<em>Erhöhungen</em> statt Senkungen ein — starke US-Daten treiben Realzinsen hoch, und das saugt Kapital aus Gold und Krypto ab. Gold fiel unter 4.000 $, Bitcoin unter 60.000 $, und die Bitcoin-ETFs erlebten den schlechtesten Monat ihrer Geschichte. Gleichzeitig warnt Michael Burry mit einer frischen NVDA-Short-Wette vor der „KI-Blase\" — die Mag-7 verloren im Juni ~2,3 Bio. $.</p>\n    <ul>\n      <li><span class=\"chip hot\">Krypto</span> <strong>Bitcoin unter 60.000 $</strong> (59.231 $, 01.07.): ETF-Abflüsse von 5,4 Mrd. $ über 4 Wochen, siebte negative Woche in Folge, Fear-&amp;-Greed-Index bei 11 (Extreme Angst).</li>\n      <li><span class=\"chip good\">Aktien</span> <strong>US-Indizes auf Rekord zum H1-Schluss</strong>: Dow schloss bei 52.319 (Rekord), Q2 war das stärkste Quartal (Nasdaq +20 %).</li>\n      <li><span class=\"chip hot\">Gold</span> <strong>Gold unter 4.000 $</strong> (3.983,97 $/oz, −11,4 % im Monat) — Achtmonatstief, weil der Markt Fed-Zinserhöhungen erwartet statt -senkungen.</li>\n      <li><span class=\"chip\">Öl</span> <strong>Brent 73,20 $, WTI 69,71 $</strong> — heute je +0,3 %, aber −24 %/−26 % im Monat: Hormus-Verschiffung normalisiert sich.</li>\n      <li><span class=\"chip hot\">Big-Tech</span> <strong>Burry shortet Nvidia</strong> und warnt vor „KI-Blase\"; die Mag-7 verloren im Juni ~2,3 Bio. $ wegen KI-Capex-Sorgen. NVDA trotzdem +2,6 % auf 200 $.</li>\n      <li><span class=\"chip good\">Auto</span> <strong>Tesla +2,1 % auf 420,60 $</strong>: erste Cybercab-Serientests in Austin (ohne Lenkrad/Pedale); Q2-Zahlen am 22.07.</li>\n      <li><span class=\"chip\">Macro</span> <strong>Dollar-Index (DXY) ~101,3</strong> (30.06.-Schluss, ungefähr): zweiter Monatsgewinn in Folge — der starke Dollar ist der Hebel hinter dem Gold-/Krypto-Abverkauf.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The first half closes split: US stocks hit all-time highs (S&amp;P 500 +9.55% YTD, Nasdaq +12.79%), while classic \"safe havens\" are collapsing. The reason is singular: the market is pricing in Fed <em>hikes</em> instead of cuts — strong US data pushes real rates higher, and that sucks capital out of gold and crypto. Gold fell below $4,000, Bitcoin below $60,000, and Bitcoin ETFs just saw their worst month ever. At the same time, Michael Burry just shorted Nvidia and warns of an \"AI bubble\" — the Mag-7 lost ~$2.3 trillion in June.</p>\n    <ul>\n      <li><span class=\"chip hot\">Crypto</span> <strong>Bitcoin below $60,000</strong> ($59,231, Jul 01): ETF outflows of $5.4B over 4 weeks, seventh consecutive down week, Fear &amp; Greed Index at 11 (Extreme Fear).</li>\n      <li><span class=\"chip good\">Stocks</span> <strong>US indexes at record at H1 close</strong>: Dow closed at 52,319 (record), Q2 was the strongest quarter (Nasdaq +20%).</li>\n      <li><span class=\"chip hot\">Gold</span> <strong>Gold below $4,000</strong> ($3,983.97/oz, −11.4% for the month) — eight-month low because the market expects Fed rate hikes instead of cuts.</li>\n      <li><span class=\"chip\">Oil</span> <strong>Brent $73.20, WTI $69.71</strong> — today each +0.3%, but −24%/−26% for the month: Strait of Hormuz shipping normalizing.</li>\n      <li><span class=\"chip hot\">Big Tech</span> <strong>Burry shorts Nvidia</strong> and warns of \"AI bubble\"; the Mag-7 lost ~$2.3 trillion in June due to AI capex fears. NVDA still +2.6% to $200.</li>\n      <li><span class=\"chip good\">Auto</span> <strong>Tesla +2.1% to $420.60</strong>: first Cybercab production tests in Austin (no steering wheel/pedals); Q2 numbers due Jul 22.</li>\n      <li><span class=\"chip\">Macro</span> <strong>Dollar Index (DXY) ~101.3</strong> (Jun 30 close, approximate): second monthly gain in a row — the strong dollar is the lever behind the gold/crypto selloff.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O primeiro semestre fecha dividido: ações americanas em máximas históricas (S&amp;P 500 +9,55% YTD, Nasdaq +12,79%), enquanto os \"portos seguros\" clássicos desabam. O motivo é singular: o mercado precifica <em>aumentos</em> de juros do Fed em vez de cortes — dados fortes dos EUA empurram as taxas reais para cima, e isso suga capital de ouro e cripto. Ouro caiu abaixo de 4 mil dólares, Bitcoin abaixo de 60 mil, e os ETFs de Bitcoin viveram seu pior mês da história. Enquanto isso, Michael Burry abriu uma nova aposta de queda contra Nvidia advertindo sobre a \"bolha de IA\" — as Mag-7 perderam ~2,3 trilhões em junho.</p>\n    <ul>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Bitcoin abaixo de 60 mil dólares</strong> (59.231 $, 01/07): saídas de ETF de 5,4 bilhões em 4 semanas, sétima semana negativa consecutiva, Índice de Medo &amp; Ganância em 11 (Medo Extremo).</li>\n      <li><span class=\"chip good\">Ações</span> <strong>Índices americanos em recorde no fechamento do semestre</strong>: Dow fechou em 52.319 (recorde), Q2 foi o trimestre mais forte (Nasdaq +20%).</li>\n      <li><span class=\"chip hot\">Ouro</span> <strong>Ouro abaixo de 4 mil dólares</strong> (3.983,97 $/oz, −11,4% no mês) — mínima de oito meses, porque o mercado espera aumentos de juros do Fed em vez de cortes.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>Brent 73,20 $, WTI 69,71 $</strong> — hoje +0,3% cada, mas −24%/−26% no mês: normalização do transporte pelo Estreito de Ormuz.</li>\n      <li><span class=\"chip hot\">Big Tech</span> <strong>Burry faz queda de Nvidia</strong> e alerta sobre \"bolha de IA\"; as Mag-7 perderam ~2,3 trilhões em junho por preocupações com gastos de IA. NVDA ainda assim +2,6% em 200 $.</li>\n      <li><span class=\"chip good\">Automóveis</span> <strong>Tesla +2,1% em 420,60 $</strong>: primeiros testes da Cybercab em série em Austin (sem volante/pedais); resultados Q2 em 22/07.</li>\n      <li><span class=\"chip\">Macro</span> <strong>Índice do Dólar (DXY) ~101,3</strong> (fechamento 30/06, aprox.): segundo ganho mensal consecutivo — dólar forte é a alavanca por trás da queda do ouro/cripto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El primer semestre cierra dividido: las acciones estadounidenses están en máximos históricos (S&amp;P 500 +9,55% YTD, Nasdaq +12,79%), mientras que los \"refugios seguros\" clásicos se desmoronan. La razón es singular: el mercado está cotizando <em>subidas</em> de tasas de la Fed en vez de cortes — datos fuertes de EE.UU. impulsan las tasas reales al alza, y eso succiona capital de oro y cripto. El oro cayó por debajo de 4 mil dólares, Bitcoin por debajo de 60 mil, y los ETFs de Bitcoin experimentaron su peor mes en la historia. Mientras tanto, Michael Burry colocó una nueva apuesta de corto contra Nvidia advirtiendo sobre la \"burbuja de IA\" — las Mag-7 perdieron ~2,3 billones en junio.</p>\n    <ul>\n      <li><span class=\"chip hot\">Cripto</span> <strong>Bitcoin por debajo de 60 mil dólares</strong> (59.231 $, 01/07): salidas de ETF de 5,4 mil millones en 4 semanas, séptima semana negativa consecutiva, Índice de Miedo &amp; Codicia en 11 (Miedo Extremo).</li>\n      <li><span class=\"chip good\">Acciones</span> <strong>Índices estadounidenses en récord para cierre del semestre</strong>: Dow cerró en 52.319 (récord), Q2 fue el trimestre más fuerte (Nasdaq +20%).</li>\n      <li><span class=\"chip hot\">Oro</span> <strong>Oro por debajo de 4 mil dólares</strong> (3.983,97 $/oz, −11,4% en el mes) — mínimo de ocho meses, porque el mercado espera subidas de tasas de la Fed en vez de cortes.</li>\n      <li><span class=\"chip\">Petróleo</span> <strong>Brent 73,20 $, WTI 69,71 $</strong> — hoy +0,3% cada, pero −24%/−26% en el mes: normalización del transporte a través del Estrecho de Ormuz.</li>\n      <li><span class=\"chip hot\">Big Tech</span> <strong>Burry abre corto de Nvidia</strong> y advierte de \"burbuja de IA\"; las Mag-7 perdieron ~2,3 billones en junio por preocupaciones sobre gastos de IA. NVDA aun así +2,6% a 200 $.</li>\n      <li><span class=\"chip good\">Autos</span> <strong>Tesla +2,1% a 420,60 $</strong>: primeras pruebas de la Cybercab en serie en Austin (sin volante/pedales); resultados Q2 el 22/07.</li>\n      <li><span class=\"chip\">Macro</span> <strong>Índice del Dólar (DXY) ~101,3</strong> (cierre 30/06, aprox.): segunda ganancia mensual consecutiva — dólar fuerte es la palanca detrás de la caída de oro/cripto.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Wochenanfang war das nicht. Eine SimpleHelp-Remote-Support-Lücke mit dem Maximalscore CVSS 10.0 wird aktiv ausgenutzt, um einen brandneuen Infostealer zu verteilen, der es gezielt auf Cloud- und Dev-Credentials abgesehen hat — genau die Sorte Zugangsdaten, mit denen man deinen Stack aufmacht. Parallel treten heute die Microsoft-365-Preiserhöhungen in Kraft, Europol hat die nächste Stealer-Infrastruktur zerlegt, und das FBI warnt: Russische Dienste greifen jetzt Signal-Backup-Schlüssel ab.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, ~1.000 exponierte RMM-Server, aktiv ausgenutzt für TaskWeaver + „Djinn Stealer\". CISA-KEV-Patchfrist für Bundesbehörden (BOD 26-04): 2. Juli. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft 365 Preise</strong>: seit heute teurer — Business Basic +16 %, Business Standard +12 %, Frontline F1 bis +43 %. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Sec</span> <strong>Operation Endgame Phase 3</strong>: 326 Server, 142 Domains beschlagnahmt, 41 Mio. € Krypto, 27 Mio. Credentials geborgen. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FBI-Warnung Signal</strong>: Russische Dienste (UNC5792/UNC4221) phishen jetzt „Secure-Backup\"-Schlüssel — Account-Reset hilft nicht. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow CVE-2026-33017</strong>: CVSS 9.3, unauth RCE über <code>exec()</code>, in 20 h ausgenutzt, Monero-Miner + SSH-Wurm. Patch: 1.9.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Windows 11 KB5095093</strong>: „Point-in-time Restore\" — 72-h-VSS-Snapshots als System-Rollback. Pflicht-Rollout 14. Juli. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Splunk & PostgreSQL</strong>: Splunk 9.8-RCE über Postgres-Sidecar (KEV), plus 11 PostgreSQL-CVEs vom Mai — relevant für deinen Stack. <span class=\"chip\">Global</span></li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein ruhiger Wochenanfang war das nicht. Eine SimpleHelp-Remote-Support-Lücke mit dem Maximalscore CVSS 10.0 wird aktiv ausgenutzt, um einen brandneuen Infostealer zu verteilen, der es gezielt auf Cloud- und Dev-Credentials abgesehen hat — genau die Sorte Zugangsdaten, mit denen man deinen Stack aufmacht. Parallel treten heute die Microsoft-365-Preiserhöhungen in Kraft, Europol hat die nächste Stealer-Infrastruktur zerlegt, und das FBI warnt: Russische Dienste greifen jetzt Signal-Backup-Schlüssel ab.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, ~1.000 exponierte RMM-Server, aktiv ausgenutzt für TaskWeaver + „Djinn Stealer\". CISA-KEV-Patchfrist für Bundesbehörden (BOD 26-04): 2. Juli. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft 365 Preise</strong>: seit heute teurer — Business Basic +16 %, Business Standard +12 %, Frontline F1 bis +43 %. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Sec</span> <strong>Operation Endgame Phase 3</strong>: 326 Server, 142 Domains beschlagnahmt, 41 Mio. € Krypto, 27 Mio. Credentials geborgen. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FBI-Warnung Signal</strong>: Russische Dienste (UNC5792/UNC4221) phishen jetzt „Secure-Backup\"-Schlüssel — Account-Reset hilft nicht. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow CVE-2026-33017</strong>: CVSS 9.3, unauth RCE über <code>exec()</code>, in 20 h ausgenutzt, Monero-Miner + SSH-Wurm. Patch: 1.9.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Windows 11 KB5095093</strong>: „Point-in-time Restore\" — 72-h-VSS-Snapshots als System-Rollback. Pflicht-Rollout 14. Juli. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Splunk & PostgreSQL</strong>: Splunk 9.8-RCE über Postgres-Sidecar (KEV), plus 11 PostgreSQL-CVEs vom Mai — relevant für deinen Stack. <span class=\"chip\">Global</span></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This hasn't been a quiet start to the week. A SimpleHelp remote-support flaw with a perfect CVSS 10.0 score is being actively exploited to distribute a brand-new infostealer that specifically targets cloud and dev credentials — the exact access keys that unlock your stack. Meanwhile, Microsoft 365 price hikes take effect today, Europol has dismantled the next stealer infrastructure ring, and the FBI warns: Russian intelligence services are now harvesting Signal backup keys.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10.0, ~1,000 exposed RMM servers, actively exploited for TaskWeaver + \"Djinn Stealer\". CISA KEV deadline for agencies: July 2. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft 365 Prices</strong>: effective today — Business Basic +16%, Business Standard +12%, Frontline F1 up to +43%. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Sec</span> <strong>Operation Endgame Phase 3</strong>: 326 servers, 142 domains seized, $47M in crypto frozen, 27M credentials recovered. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FBI Alert Signal</strong>: Russian agencies (UNC5792/UNC4221) now phishing \"Secure-Backup\" keys — account reset won't help. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow CVE-2026-33017</strong>: CVSS 9.3, unauthenticated RCE via <code>exec()</code>, exploited within 20 hours, Monero miner + SSH worm. Patch: 1.9.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Windows 11 KB5095093</strong>: \"Point-in-time Restore\" — 72-hour VSS snapshots as system rollback. Mandatory rollout July 14. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Splunk & PostgreSQL</strong>: Splunk 9.8 RCE via Postgres sidecar (KEV), plus 11 PostgreSQL CVEs from May — relevant for your stack. <span class=\"chip\">Global</span></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Esse não foi um início tranquilo de semana. Uma falha de suporte remoto no SimpleHelp com score CVSS perfeito de 10,0 está sendo explorada ativamente para distribuir um novo roubo de dados que ataca especificamente credenciais de nuvem e desenvolvedor — exatamente o tipo de acesso que abre seu stack. Enquanto isso, os aumentos de preço do Microsoft 365 entram em vigor hoje, a Europol desmantelou a próxima camada de infraestrutura de roubo, e o FBI avisa: serviços de inteligência russos agora estão roubando chaves de backup do Signal.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10,0, ~1.000 servidores RMM expostos, exploração ativa para TaskWeaver + \"Djinn Stealer\". Prazo CISA KEV para órgãos: 2 de julho. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft 365 Preços</strong>: a partir de hoje mais caros — Business Basic +16%, Business Standard +12%, Frontline F1 até +43%. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Sec</span> <strong>Operação Endgame Fase 3</strong>: 326 servidores, 142 domínios apreendidos, $47 mi em cripto, 27 mi de credenciais recuperadas. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Aviso FBI Signal</strong>: Serviços russos (UNC5792/UNC4221) agora fazem phishing de chaves \"Secure-Backup\" — reset de conta não ajuda. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow CVE-2026-33017</strong>: CVSS 9,3, RCE não-autenticado via <code>exec()</code>, explorado em 20 h, minerador Monero + worm SSH. Patch: 1.9.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Windows 11 KB5095093</strong>: \"Point-in-time Restore\" — snapshots VSS de 72 h como rollback de sistema. Rollout obrigatório 14 de julho. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Splunk & PostgreSQL</strong>: Splunk RCE 9.8 via sidecar Postgres (KEV), mais 11 CVEs PostgreSQL de maio — relevante para seu stack. <span class=\"chip\">Global</span></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Este no fue un comienzo tranquilo de semana. Una falla de soporte remoto en SimpleHelp con una puntuación CVSS perfecta de 10,0 está siendo explotada activamente para distribuir un nuevo robo de datos que apunta específicamente a credenciales de nube y desarrollador — exactamente el tipo de acceso que abre tu stack. Mientras tanto, los aumentos de precio de Microsoft 365 entran en vigencia hoy, Europol ha desmantelado la siguiente capa de infraestructura de robadores, y el FBI advierte: los servicios de inteligencia rusos ahora están robando claves de respaldo de Signal.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>SimpleHelp CVE-2026-48558</strong>: CVSS 10,0, ~1.000 servidores RMM expuestos, explotación activa para TaskWeaver + \"Djinn Stealer\". Plazo CISA KEV para agencias: 2 de julio. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Microsoft 365 Precios</strong>: a partir de hoy más caros — Business Basic +16%, Business Standard +12%, Frontline F1 hasta +43%. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Sec</span> <strong>Operación Endgame Fase 3</strong>: 326 servidores, 142 dominios confiscados, $47 millones, 27 millones de credenciales recuperadas. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Alerta FBI Signal</strong>: Servicios rusos (UNC5792/UNC4221) ahora phishing de claves \"Secure-Backup\" — reseteo de cuenta no ayuda. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Langflow CVE-2026-33017</strong>: CVSS 9,3, RCE no autenticado vía <code>exec()</code>, explotado en 20 h, minero Monero + worm SSH. Patch: 1.9.0. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip good\">Release</span> <strong>Windows 11 KB5095093</strong>: \"Point-in-time Restore\" — snapshots VSS de 72 h como rollback de sistema. Rollout obligatorio 14 de julio. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>Splunk & PostgreSQL</strong>: RCE Splunk 9.8 vía sidecar Postgres (KEV), más 11 CVEs PostgreSQL de mayo — relevante para tu stack. <span class=\"chip\">Global</span></li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein voller News-Tag: Anthropic dropt gestern <strong>Claude Sonnet 5</strong> und macht es heute per Claude Code v2.1.197 zum Default-Modell — mit 1M-Kontext und $2/$10 Einführungspreis. Parallel läuft OpenAIs <strong>GPT-5.6</strong>-Preview (Sol/Terra/Luna) an, aber nur für ~20 Partner und noch ohne einen einzigen öffentlichen Coding-Benchmark. Und aus dem Open-Weights-Lager führt <strong>GLM-5.2</strong> (MIT) das freie Feld auf SWE-bench Pro an. Drei Modell-Klassen bewegen sich gleichzeitig — hier ist, was davon in deiner Toolbox landen könnte.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5</strong>: 85,2 % SWE-bench Verified, 63,2 % SWE-bench Pro, 1M-Kontext, ab heute Default in Claude Code.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>$2/$10 pro Mtok</strong> als Einführungspreis bis 31.08. — danach $3/$15. Günstiger als Sonnet 4.6.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong> in Preview — ~20 Partner-Orgs, Sol (max) 88,76 % Terminal-Bench 2.1, <em>noch kein SWE-bench</em>.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (MIT, offene Gewichte): 62,1 % SWE-bench Pro — Nummer eins unter den freien Modellen. 1M-Kontext, 753B/40B-aktiv MoE.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong>-Sprint: Subagents 5 Ebenen tief, MCP-Freigabe-Gate für <code>.mcp.json</code>, <code>/rewind</code>, ~37 % weniger CPU.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Verified</strong>-Board (Stand 01.07.): Fable 5 95,0 %, Opus 4.8 88,6 %, Sonnet 5 85,2 % — Anbieter-Zahlen, skeptisch lesen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.7</strong>: <code>/in-cloud</code>-Subagents auf VMs, iOS-Beta für Remote-Agenten seit 29.06.</li>\n      <li><span class=\"chip\">Local</span> <strong>Roll-Call</strong>: Cline v3.85 (5M Installs), OpenHands v1.7, Aider hängt bei v0.86.2 (letztes Tag Feb 2026) — still im Schatten.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein voller News-Tag: Anthropic dropt gestern <strong>Claude Sonnet 5</strong> und macht es heute per Claude Code v2.1.197 zum Default-Modell — mit 1M-Kontext und $2/$10 Einführungspreis. Parallel läuft OpenAIs <strong>GPT-5.6</strong>-Preview (Sol/Terra/Luna) an, aber nur für ~20 Partner und noch ohne einen einzigen öffentlichen Coding-Benchmark. Und aus dem Open-Weights-Lager führt <strong>GLM-5.2</strong> (MIT) das freie Feld auf SWE-bench Pro an. Drei Modell-Klassen bewegen sich gleichzeitig — hier ist, was davon in deiner Toolbox landen könnte.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5</strong>: 85,2 % SWE-bench Verified, 63,2 % SWE-bench Pro, 1M-Kontext, ab heute Default in Claude Code.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>$2/$10 pro Mtok</strong> als Einführungspreis bis 31.08. — danach $3/$15. Günstiger als Sonnet 4.6.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong> in Preview — ~20 Partner-Orgs, Sol (max) 88,76 % Terminal-Bench 2.1, <em>noch kein SWE-bench</em>.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (MIT, offene Gewichte): 62,1 % SWE-bench Pro — Nummer eins unter den freien Modellen. 1M-Kontext, 753B/40B-aktiv MoE.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong>-Sprint: Subagents 5 Ebenen tief, MCP-Freigabe-Gate für <code>.mcp.json</code>, <code>/rewind</code>, ~37 % weniger CPU.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Verified</strong>-Board (Stand 01.07.): Fable 5 95,0 %, Opus 4.8 88,6 %, Sonnet 5 85,2 % — Anbieter-Zahlen, skeptisch lesen.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.7</strong>: <code>/in-cloud</code>-Subagents auf VMs, iOS-Beta für Remote-Agenten seit 29.06.</li>\n      <li><span class=\"chip\">Local</span> <strong>Roll-Call</strong>: Cline v3.85 (5M Installs), OpenHands v1.7, Aider hängt bei v0.86.2 (letztes Tag Feb 2026) — still im Schatten.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A news-packed day: Anthropic dropped <strong>Claude Sonnet 5</strong> yesterday and makes it today's default model in Claude Code v2.1.197 — with 1M context and introductory pricing at $2/$10. Meanwhile, OpenAI's <strong>GPT-5.6</strong>-Preview (Sol/Terra/Luna) is launching, but only for ~20 partners and without a single public coding benchmark yet. And from the open-weights camp, <strong>GLM-5.2</strong> (MIT) is leading the free field on SWE-bench Pro. Three model classes are moving at once — here's what could land in your toolbox.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5</strong>: 85.2% SWE-bench Verified, 63.2% SWE-bench Pro, 1M context, default in Claude Code as of today.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>$2/$10 per Mtok</strong> introductory pricing through 31.08. — then $3/$15. Cheaper than Sonnet 4.6.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong> in preview — ~20 partner orgs, Sol (max) 88.76% Terminal-Bench 2.1, <em>no SWE-bench yet</em>.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (MIT, open weights): 62.1% SWE-bench Pro — number one among open models. 1M context, 753B/40B-active MoE.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> sprint: Subagents 5 levels deep, MCP release gate for <code>.mcp.json</code>, <code>/rewind</code>, ~37% less CPU.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Verified</strong> board (as of Jul 01): Fable 5 95.0%, Opus 4.8 88.6%, Sonnet 5 85.2% — vendor numbers, read skeptically.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.7</strong>: <code>/in-cloud</code> subagents on VMs, iOS beta for remote agents since 06.29.</li>\n      <li><span class=\"chip\">Local</span> <strong>Roll call</strong>: Cline v3.85 (5M installs), OpenHands v1.7, Aider still on v0.86 (tag from Aug 2025) — quiet in the shadows.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Um dia cheio de notícias: Anthropic lançou <strong>Claude Sonnet 5</strong> ontem e faz dele o modelo padrão do Claude Code v2.1.197 hoje — com contexto de 1M e preço introdutório de $2/$10. Paralelamente, a preview de <strong>GPT-5.6</strong> da OpenAI (Sol/Terra/Luna) está sendo lançada, mas apenas para ~20 parceiros e ainda sem um único benchmark de programação público. E do acervo de pesos abertos, <strong>GLM-5.2</strong> (MIT) lidera o campo livre no SWE-bench Pro. Três classes de modelos se movem simultaneamente — aqui está o que pode chegar à sua caixa de ferramentas.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5</strong>: 85,2% SWE-bench Verified, 63,2% SWE-bench Pro, contexto de 1M, padrão no Claude Code a partir de hoje.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>$2/$10 por Mtok</strong> preço introdutório até 31.08 — depois $3/$15. Mais barato que Sonnet 4.6.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong> em preview — ~20 organizações parceiras, Sol (máx) 88,76% Terminal-Bench 2.1, <em>sem SWE-bench ainda</em>.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (MIT, pesos abertos): 62,1% SWE-bench Pro — número um entre modelos abertos. Contexto de 1M, 753B/40B-ativo MoE.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> sprint: Subagentes 5 níveis de profundidade, portão de liberação MCP para <code>.mcp.json</code>, <code>/rewind</code>, ~37% menos CPU.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Verified</strong> quadro (a partir de 01.07): Fable 5 95,0%, Opus 4.8 88,6%, Sonnet 5 85,2% — números de fornecedores, leia com ceticismo.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.7</strong>: subagentes <code>/in-cloud</code> em VMs, beta iOS para agentes remotos desde 29.06.</li>\n      <li><span class=\"chip\">Local</span> <strong>Revista</strong>: Cline v3.85 (5M instalações), OpenHands v1.7, Aider ainda em v0.86 (tag de ago 2025) — quieto nas sombras.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un día repleto de noticias: Anthropic lanzó <strong>Claude Sonnet 5</strong> ayer y lo convierte en el modelo predeterminado de Claude Code v2.1.197 hoy — con contexto de 1M y precio introductorio de $2/$10. En paralelo, la vista previa de <strong>GPT-5.6</strong> de OpenAI (Sol/Terra/Luna) se está lanzando, pero solo para ~20 socios y aún sin un solo benchmark de codificación público. Y del arsenal de pesos abiertos, <strong>GLM-5.2</strong> (MIT) lidera el campo libre en SWE-bench Pro. Tres clases de modelos se mueven simultáneamente — aquí está lo que podría llegar a tu caja de herramientas.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Sonnet 5</strong>: 85,2% SWE-bench Verified, 63,2% SWE-bench Pro, contexto de 1M, predeterminado en Claude Code a partir de hoy.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>$2/$10 por Mtok</strong> precio introductorio hasta el 31.08 — después $3/$15. Más barato que Sonnet 4.6.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6 Sol/Terra/Luna</strong> en vista previa — ~20 organizaciones socias, Sol (máx) 88,76% Terminal-Bench 2.1, <em>sin SWE-bench aún</em>.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>GLM-5.2</strong> (MIT, pesos abiertos): 62,1% SWE-bench Pro — número uno entre modelos abiertos. Contexto de 1M, 753B/40B-activo MoE.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Claude Code</strong> sprint: Subagentes 5 niveles de profundidad, compuerta de liberación MCP para <code>.mcp.json</code>, <code>/rewind</code>, ~37% menos CPU.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-bench Verified</strong> tablero (a partir del 01.07): Fable 5 95,0%, Opus 4.8 88,6%, Sonnet 5 85,2% — números de proveedores, lee con escepticismo.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Cursor 3.7</strong>: subagentes <code>/in-cloud</code> en máquinas virtuales, beta iOS para agentes remotos desde el 29.06.</li>\n      <li><span class=\"chip\">Local</span> <strong>Revista</strong>: Cline v3.85 (5M instalaciones), OpenHands v1.7, Aider aún en v0.86 (etiqueta de ago 2025) — silencioso en las sombras.</li>\n    </ul></div>"
