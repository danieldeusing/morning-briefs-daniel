<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Eine seltene Konstellation: In derselben Woche hat die brasilianische Notenbank gesenkt, die Fed gehalten und die EZB erhöht — und alle drei klingen restriktiver als ihre Zins-Entscheidung allein verrät. Für deine EUR/BRL-Belastung ist das ein gemischtes Bild: der Real bekommt Gegenwind vom erstarkten Dollar, aber der Euro selbst läuft nicht weg. Heute Samstag ist Handelsruhe — die Anker unten sind der Freitags-Stand vom 19.06.</p>\n    <ul>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL bei 5,9173</strong> (ECB-Fix, 19.06.): Cross-Check über USD/BRL × EUR/USD ergibt 5,9176 — 0,0 % Abweichung, voll konsistent.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom senkt Selic auf 14,25 %</strong> — aber hebt die eigene Inflations-Prognose auf 5,2 % und streicht den Hinweis aufs Weiter-Senken. Der Zyklus könnte bald pausieren.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed hält 3,50–3,75 %, Dot-Plot kippt:</strong> 9 von 18 Mitgliedern erwarten 2026 noch eine Erhöhung. Der Dollar springt auf ein Ein-Jahres-Hoch.</li>\n      <li><span class=\"chip\">EZB</span> <strong>EZB erhöht auf 2,25 % Einlagensatz</strong> (Nahost-Inflation) — der Euro fiel trotzdem, weil die Fed hawkisher klingt.</li>\n      <li><span class=\"chip\">DXY</span> <strong>Dollar-Index auf 100,79</strong> (19.06.), nahe Ein-Jahres-Hoch — der Frühindikator zeigt klar auf einen stärkeren USD.</li>\n      <li><span class=\"chip good\">Öl</span> <strong>Brent bei 80,58 $</strong>, ~31 % unter dem März-2026-Hoch von ~117 $ — disinflationärer Rückenwind, aber die US-Iran-Gespräche in der Schweiz wurden Freitag abgesagt.</li>\n      <li><span class=\"chip\">BR</span> <strong>IPCA-Inflation 4,72 % im Mai</strong> — höchster Stand seit September 2025; Focus-Markt sieht 5,11 % für 2026, 13. Anstieg über der 4,5-%-Decke in Folge.</li>\n      <li><span class=\"chip\">Sentiment</span> <strong>BR 10Y bei 14,82 %, CDS 124,7 b         "en": "<div class=\"tldr\"><p class=\"lead\">A rare constellation: in the same week, Brazil's central bank cut, the Fed held, and the ECB raised — and all three sound more restrictive than their rate decisions alone suggest. For your EUR/BRL exposure, it's a mixed picture: the real faces headwinds from a stronger dollar, but the euro itself isn't going anywhere. Today, Saturday, is a trading holiday — the anchors below are Friday's fix from 06-19.</p>\n    <ul>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL at 5.9173</strong> (ECB fix, 06-19): cross-check via USD/BRL × EUR/USD yields 5.9176 — 0.0% deviation, fully consistent.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom cuts Selic to 14.25%</strong> — but raises its own inflation forecast to 5.2% and drops the guidance on further cuts. The cycle could pause soon.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed holds 3.50–3.75%, dot plot shifts:</strong> 9 of 18 members expect another hike in 2026. The dollar jumps to a one-year high.</li>\n      <li><span class=\"chip\">ECB</span> <strong>ECB raises deposit rate to 2.25%</strong> (Middle East inflation) — the euro fell anyway, because the Fed sounds even more hawkish.</li>\n      <li><span class=\"chip\">DXY</span> <strong>Dollar index at 100.79</strong> (06-19), near one-year high — the leading indicator points clearly to a stronger USD.</li>\n      <li><span class=\"chip good\">Oil</span> <strong>Brent at $80.58</strong>, ~31% below the March 2026 high of ~$117 — disinflationary tailwind, but US-Iran talks in Switzerland were cancelled Friday.</li>\n      <li><span class=\"chip\">BR</span> <strong>IPCA inflation 4.72% in May</strong> — highest level since September 2025; Focus survey sees 5.11% for full-year 2026, 13th weekly breach of the 4.5% cap in a row.</li>\n      <li><span class=\"chip\">Sentiment</span> <strong>BR 10Y at 14.82%, CDS 124.7 bps</strong>, EWZ with −$450M outflows this month — foreign investors reducing Brazil exposure.</li>\n      <li><span class=\"chip\">Forecast</span> <strong>My base case:</strong> EUR/BRL sideways-firm, 5.85–5.98 this week. Dollar strength vs. real carry — the euro decides little.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma constelação rara: na mesma semana, o banco central brasileiro cortou, o Fed manteve e o BCE aumentou — e todos os três soam mais restritivos do que suas decisões de taxa sugerem sozinhas. Para sua exposição EUR/BRL, é um quadro misto: o real enfrenta ventos contrários de um dólar mais forte, mas o euro em si não sai correndo. Hoje, sábado, é feriado de negociação — os âncoras abaixo são o fix de sexta-feira de 19-06.</p>\n    <ul>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL em 5,9173</strong> (Fix ECB, 19-06): verificação cruzada via USD/BRL × EUR/USD resulta em 5,9176 — desvio de 0,0%, totalmente consistente.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom reduz Selic para 14,25%</strong> — mas eleva sua própria projeção de inflação para 5,2% e retira a orientação sobre novos cortes. O ciclo pode fazer uma pausa em breve.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed mantém 3,50–3,75%, dot plot muda:</strong> 9 de 18 membros esperam outro aumento em 2026. O dólar salta para uma máxima de um ano.</li>\n      <li><span class=\"chip\">ECB</span> <strong>BCE aumenta taxa de depósito para 2,25%</strong> (inflação Oriente Médio) — o euro caiu mesmo assim, porque o Fed soa ainda mais agressivo.</li>\n      <li><span class=\"chip\">DXY</span> <strong>Índice do dólar em 100,79</strong> (19-06), perto da máxima de um ano — o indicador antecedente aponta claramente para um USD mais forte.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent em US$ 80,58</strong>, ~31% abaixo da máxima de março de 2026 de ~US$ 117 — vento de cauda desinflacionário, mas conversas EUA-Irã na Suíça foram canceladas sexta-feira.</li>\n      <li><span class=\"chip\">BR</span> <strong>Inflação IPCA de 4,72% em maio</strong> — maior nível desde setembro de 2025; pesquisa Focus vê 5,11% para o ano completo de 2026, 13ª violação semanal do teto de 4,5% consecutiva.</li>\n      <li><span class=\"chip\">Sentimento</span> <strong>BR 10Y em 14,82%, CDS 124,7 bps</strong>, EWZ com −US$ 450 milhões em saídas este mês — investidores estrangeiros reduzindo exposição Brasil.</li>\n      <li><span class=\"chip\">Previsão</span> <strong>Meu cenário base:</strong> EUR/BRL lateral-firme, 5,85–5,98 esta semana. Força do dólar vs. carry do real — o euro decide pouco.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una constelación rara: en la misma semana, el banco central brasileño cortó, la Fed mantuvo y el BCE subió — y todos tres suenan más restrictivos de lo que sus decisiones de tasa sugieren por sí solas. Para tu exposición EUR/BRL, es un cuadro mixto: el real enfrenta vientos en contra de un dólar más fuerte, pero el euro en sí no se va a ningún lado. Hoy, sábado, es feriado de negociación — los anclajes abajo son el fix del viernes 19-06.</p>\n    <ul>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL en 5,9173</strong> (Fix ECB, 19-06): verificación cruzada vía USD/BRL × EUR/USD arroja 5,9176 — desviación de 0,0%, totalmente consistente.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Copom reduce Selic a 14,25%</strong> — pero eleva su propia proyección de inflación a 5,2% y retira la guía sobre futuros cortes. El ciclo podría hacer una pausa pronto.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed mantiene 3,50–3,75%, dot plot cambia:</strong> 9 de 18 miembros esperan otro aumento en 2026. El dólar salta a un máximo de un año.</li>\n      <li><span class=\"chip\">ECB</span> <strong>BCE sube tasa de depósito a 2,25%</strong> (inflación Oriente Medio) — el euro cayó de todas formas, porque la Fed suena aún más agresiva.</li>\n      <li><span class=\"chip\">DXY</span> <strong>Índice del dólar en 100,79</strong> (19-06), cerca del máximo de un año — el indicador adelantado apunta claramente a un USD más fuerte.</li>\n      <li><span class=\"chip good\">Petróleo</span> <strong>Brent en USD 80,58</strong>, ~31% por debajo del máximo de marzo de 2026 de ~USD 117 — viento de cola desinflacionario, pero conversaciones EUA-Irán en Suiza fueron canceladas el viernes.</li>\n      <li><span class=\"chip\">BR</span> <strong>Inflación IPCA de 4,72% en mayo</strong> — nivel más alto desde septiembre de 2025; encuesta Focus ve 5,11% para todo el año 2026, 13ª violación semanal consecutiva del techo de 4,5%.</li>\n      <li><span class=\"chip\">Sentimiento</span> <strong>BR 10Y en 14,82%, CDS 124,7 bps</strong>, EWZ con −USD 450 millones en salidas este mes — inversionistas extranjeros reduciendo exposición Brasil.</li>\n      <li><span class=\"chip\">Pronóstico</span> <strong>Mi escenario base:</strong> EUR/BRL lateral-firme, 5,85–5,98 esta semana. Fortaleza del dólar vs. carry del real — el euro decide poco.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es war eine Woche in zwei Akten. Mittwoch drehte die Fed unter Kevin Warsh den Schalter auf hawkisch und schickte den S&amp;P um 1,21 % nach unten. Donnerstag drehte alles ins Plus — ein US-Iran-Abkommen entspannte die Straße von Hormus, und die KI-Chip-Wette flammte wieder auf (Intel +10 % auf einen Apple-Deal). Dann schloss die Börse Freitag für Juneteenth. Heute ist Samstag: Aktien stehen seit Donnerstag still, nur Krypto handelt weiter — und zeigt eine zaghafte Erholung über einem brutalen Monats-Chart.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Hawkischer Hold am 17.06.</strong>: Leitzins bleibt 3,50–3,75 %, aber der Dot-Plot kippt — 9 von 18 Mitgliedern (Fed-Chef Warsh reichte keinen Dot ein) sehen 2026 noch <em>eine Zinserhöhung</em>, die PCE-Inflationsprognose steigt auf 3,6 % (von 2,7 %), Forward Guidance fällt weg. Der S&amp;P verlor am 17.06. 1,21 % auf 7.420,10.</li>\n      <li><span class=\"chip good\">RELIEF</span> <strong>Gegenbewegung am 18.06.</strong>: S&amp;P +1,08 % auf 7.500,58, Nasdaq +1,91 %, Dow +0,14 %. Treiber: US-Iran-MOU beendet die Hormus-Blockade, plus die KI-Chip-Rallye. Das war der letzte Handelstag der Woche.</li>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>Intel +~10–11 %</strong> auf einen Apple-Intel-Fertigungsdeal; <strong>NVDA +2,95 %</strong> auf 210,69 $. Die KI-Chip-Wette ist zurück — der eine grüne Faden durch die Risk-off-Woche.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent ~80,58 $</strong> (Wochen-Minus ~8 %, −23 % auf 30 Tage): die Hormus-Risiko-Prämie löst sich auf, ~10 Mio. bbl/Tag bewegen sich wieder durch die Straße, erste saudische Tanker seit Monaten.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>XAU/USD 4.151,74 $</strong> (−1,38 %, −8,52 % auf 30 Tage): doppelter Gegenwind — Fed-Hawk plus die wegfallende Geopolitik-Prämie. YoY aber weiter +~23 %.</li>\n      <li><span class=\"chip\">KRYPTO</span> <strong>BTC live ~63.491 $</strong> (+1,86 % 24h) — aber −18,3 % auf 30 Tage und −40 % auf 1 Jahr. Spot-ETFs sahen Anfang Juni einen Rekord-Wochenabfluss von 3,4 Mrd. $. ETH ~1.724 $ (+2,2 % 24h, −19,7 % 30d).</li>\n      <li><span class=\"chip good\">NÄCHSTE WOCHE</span> <strong>Micron-Zahlen am 24.06.</strong> (nach Schluss, fiskal Q3) — der HBM-Guidance-Test für die ganze Speicher-/KI-These. FedEx-Zahlen ebenfalls fällig.</li>\n    </ul></div>",

<strong>BTC live ~63.491 $</strong> (+1,86 % 24h) — aber −18,3 % auf 30 Tage und −40 % auf 1 Jahr. Spot-ETFs sahen Anfang Juni einen Rekord-Wochenabfluss von 3,4 Mrd. $. ETH ~1.724 $ (+2,2 % 24h, −19,7 % 30d).</li>\n      <li><span class=\"chip good\">NÄCHSTE WOCHE</span> <strong>Micron-Zahlen am 24.06.</strong> (nach Schluss, fiskal Q3) — der HBM-Guidance-Test für die ganze Speicher-/KI-These. FedEx-Zahlen ebenfalls fällig.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A week in two acts. Wednesday, the Fed under Kevin Warsh flipped hawkish and sent the S&amp;P down 1.21 %. Thursday everything turned positive — a US-Iran deal eased the Strait of Hormuz, and the AI-chip bet reignited (Intel +10 % on an Apple deal). Then the market closed Friday for Juneteenth. Today is Saturday: equities have held still since Thursday, only crypto trades on — showing cautious recovery over a brutal month chart.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Hawkish hold on 17.06.</strong>: Funds rate stays 3.50–3.75 %, but the Dot Plot tips — 9 of 18 members (Fed Chair Warsh submitted no dot) see <em>one rate hike</em> in 2026, the PCE inflation forecast rises to 3.6 % (from 2.7 %), forward guidance is dropped. The S&amp;P lost 1.21 % on 17.06. to 7,420.10.</li>\n      <li><span class=\"chip good\">RELIEF</span> <strong>Reversal on 18.06.</strong>: S&amp;P +1.08 % to 7,500.58, Nasdaq +1.91 %, Dow +0.14 %. Driver: US-Iran MOU ends Hormuz blockade, plus the AI-chip rally. That was the last trading day of the week.</li>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>Intel +~10–11 %</strong> on an Apple-Intel manufacturing deal; <strong>NVDA +2.95 %</strong> to $210.69. The AI-chip bet is back — the one bright thread through the risk-off week.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent ~$80.58</strong> (week −~8 %, −23 % over 30 days): the Hormuz risk premium unwinding, ~10 mm bbl/day flowing through the strait again, first Saudi tankers in months.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>XAU/USD $4,151.74</strong> (−1.38 %, −8.52 % over 30 days): double headwind — Fed hawk plus fading geopolitical premium. YoY still +~23 %.</li>\n      <li><span class=\"chip\">CRYPTO</span> <strong>BTC live ~$63,491</strong> (+1.86 % 24h) — but −18.3 % over 30 days and −40 % over 1 year. Spot ETFs saw early-June record weekly outflow of $3.4B. ETH ~$1,724 (+2.2 % 24h, −19.7 % 30d).</li>\n      <li><span class=\"chip good\">NEXT WEEK</span> <strong>Micron earnings on 24.06.</strong> (after close, fiscal Q3) — the HBM guidance test for the whole memory/AI thesis. FedEx earnings also due.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma semana em dois atos. Quarta-feira, o Fed sob Kevin Warsh virou hawkish e derrubou o S&amp;P em 1,21 %. Quinta-feira tudo voltou ao verde — um acordo EUA-Irã aliviou o Estreito de Hormuz, e a aposta de chips de IA reacendeu (Intel +10 % num acordo com a Apple). Depois o mercado fechou sexta-feira para Juneteenth. Hoje é sábado: ações estão quietas desde quinta, só cripto negocia — mostrando recuperação tímida sobre gráfico mensal brutal.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Hold hawkish em 17.06.</strong>: Taxa de juros fica 3,50–3,75 %, mas o Dot Plot vira — 9 de 18 membros (presidente do Fed Warsh não entregou ponto) veem <em>uma subida de juros</em> em 2026, previsão de inflação PCE sobe para 3,6 % (de 2,7 %), orientação prospectiva cai. O S&amp;P perdeu 1,21 % em 17.06. para 7.420,10.</li>\n      <li><span class=\"chip good\">ALÍVIO</span> <strong>Reversão em 18.06.</strong>: S&amp;P +1,08 % para 7.500,58, Nasdaq +1,91 %, Dow +0,14 %. Motor: MOU EUA-Irã encerra bloqueio de Hormuz, além da rali de chips de IA. Esse foi o último dia de negociação da semana.</li>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>Intel +~10–11 %</strong> num acordo de manufatura Apple-Intel; <strong>NVDA +2,95 %</strong> para R$ 210,69. A aposta de chips de IA voltou — o único fio verde pela semana de risk-off.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~R$ 80,58</strong> (semana −~8 %, −23 % em 30 dias): a prêmio de risco de Hormuz se desfazendo, ~10 mi barris/dia se movendo de novo pelo estreito, primeiros tanques sauditas em meses.</li>\n      <li><span class=\"chip\">OURO</span> <strong>XAU/USD R$ 4.151,74</strong> (−1,38 %, −8,52 % em 30 dias): duplo contravento — Fed hawkish mais prêmio geopolítico desaparecendo. Mas YoY ainda +~23 %.</li>\n      <li><span class=\"chip\">CRIPTO</span> <strong>BTC ao vivo ~R$ 63.491</strong> (+1,86 % 24h) — mas −18,3 % em 30 dias e −40 % em 1 ano. ETFs spot viram saída recorde de R$ 3,4 bi em início de junho. ETH ~R$ 1.724 (+2,2 % 24h, −19,7 % 30d).</li>\n      <li><span class=\"chip good\">PRÓXIMA SEMANA</span> <strong>Resultados Micron em 24.06.</strong> (após fechamento, Q3 fiscal) — o teste de orientação HBM para toda a tese de memória/IA. Resultados FedEx também previstos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una semana en dos actos. El miércoles, la Fed bajo Kevin Warsh giró alcista y mandó el S&amp;P a la baja 1,21 %. El jueves invirtió todo de vuelta al verde — un acuerdo EUA-Irán alivió el tráfico por el Estrecho de Ormuz, y la apuesta de chips de IA se reacinó (Intel +10 % en un acuerdo con Apple). Luego el mercado cerró viernes por Juneteenth. Hoy es sábado: las acciones estuvieron calladas desde jueves, solo cripto sigue negociando — mostrando recuperación tímida sobre un gráfico mensual brutal.</p>\n    <ul>\n      <li><span class=\"chip hot\">FED</span> <strong>Hold alcista en 17.06.</strong>: Tasa de interés queda en 3,50–3,75 %, pero el Dot Plot gira — 9 de 18 miembros (presidente de la Fed Warsh no entregó punto) ven <em>una subida de tasa</em> en 2026, pronóstico de inflación PCE sube a 3,6 % (de 2,7 %), orientación prospectiva cae. El S&amp;P perdió 1,21 % en 17.06. a 7.420,10.</li>\n      <li><span class=\"chip good\">ALIVIO</span> <strong>Reversión en 18.06.</strong>: S&amp;P +1,08 % a 7.500,58, Nasdaq +1,91 %, Dow +0,14 %. Impulsor: MOU EUA-Irán termina bloqueo de Ormuz, más el alza de chips de IA. Ese fue el último día de negociación de la semana.</li>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>Intel +~10–11 %</strong> en acuerdo de fabricación Apple-Intel; <strong>NVDA +2,95 %</strong> a $210,69. La apuesta de chips de IA está de vuelta — el único hilo verde por la semana de riesgo menor.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent ~$80,58</strong> (semana −~8 %, −23 % en 30 días): la prima de riesgo de Ormuz desapareciendo, ~10 mm bbl/día moviéndose de nuevo por el estrecho, primeros tanques saudíes en meses.</li>\n      <li><span class=\"chip\">ORO</span> <strong>XAU/USD $4.151,74</strong> (−1,38 %, −8,52 % en 30 días): doble contraviento — Fed alcista más prima geopolítica desapareciendo. Pero YoY aún +~23 %.</li>\n      <li><span class=\"chip\">CRIPTO</span> <strong>BTC en vivo ~$63.491</strong> (+1,86 % 24h) — pero −18,3 % en 30 días y −40 % en 1 año. ETFs spot vieron salida récord de $3,4B en principios de junio. ETH ~$1.724 (+2,2 % 24h, −19,7 % 30d).</li>\n      <li><span class=\"chip good\">PRÓXIMA SEMANA</span> <strong>Resultados Micron en 24.06.</strong> (después del cierre, Q3 fiscal) — la prueba de orientación HBM para toda la tesis de memoria/IA. Resultados FedEx también previstos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Woche war eine Aneinanderreihung von Lieferketten- und RCE-Schreckmomenten. Im Arch User Repository hat eine koordinierte Kampagne über 1.500 Pakete mit Infostealer plus Rootkit verseucht — Arch hat daraufhin die Neu-Registrierungen abgeschaltet. F5 schiebt zwei kritische NGINX-Lücken außer der Reihe nach, Node.js liefert seine Quartals-Sammlung mit zwei HIGH-CVEs, und Oracle räumt 243 Bugs ab. Gute Nachricht zum Ausgleich: TypeScript 7.0 ist im RC und kompiliert dank Go-Compiler rund zehnmal schneller.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>AUR „Atomic Arch\":</strong> 1.500+ Arch-Pakete mit Infostealer + eBPF-Rootkit kompromittiert; Arch sperrt seit 15.06. neue Accounts.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>NGINX:</strong> F5 patcht zwei kritische RCE-Lücken (CVSS v4 9,2) in HTTP/3 und HTTP/2+gRPC — out-of-band.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js:</strong> Quartals-Release am 18.06. mit 12 CVEs (2 HIGH) — TLS-Wildcard-Bypass und WebCrypto-Crash.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>TypeScript 7.0 RC:</strong> Go-Compiler, ~10× schneller (VS Code: 89 s → 8,74 s); GA im Juli erwartet.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EU</span> <strong>Spring:</strong> Statemachine-RCE (CVE-2026-41862, HIGH) + Cloud-Gateway-Header-Spoofing; 67 Spring-CVEs im Juni.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1:</strong> 200+ Änderungen — SQL/PGQ-Graphen, paralleles Autovacuum, 2× schnellere FK-Checks.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU:</strong> 243 CVEs in 11 Produktfamilien, fast die Hälfte kritisch — Java SE inklusive.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA:</strong> 11.06.-Meilenstein durch — als Nächstes greift am 11.09. die Melde­pflicht für aktiv ausgenutzte Lücken.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die Woche war eine Aneinanderreihung von Lieferketten- und RCE-Schreckmomenten. Im Arch User Repository hat eine koordinierte Kampagne über 1.500 Pakete mit Infostealer plus Rootkit verseucht — Arch hat daraufhin die Neu-Registrierungen abgeschaltet. F5 schiebt zwei kritische NGINX-Lücken außer der Reihe nach, Node.js liefert seine Quartals-Sammlung mit zwei HIGH-CVEs, und Oracle räumt 243 Bugs ab. Gute Nachricht zum Ausgleich: TypeScript 7.0 ist im RC und kompiliert dank Go-Compiler rund zehnmal schneller.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>AUR „Atomic Arch\":</strong> 1.500+ Arch-Pakete mit Infostealer + eBPF-Rootkit kompromittiert; Arch sperrt seit 15.06. neue Accounts.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>NGINX:</strong> F5 patcht zwei kritische RCE-Lücken (CVSS v4 9,2) in HTTP/3 und HTTP/2+gRPC — out-of-band.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js:</strong> Quartals-Release am 18.06. mit 12 CVEs (2 HIGH) — TLS-Wildcard-Bypass und WebCrypto-Crash.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>TypeScript 7.0 RC:</strong> Go-Compiler, ~10× schneller (VS Code: 89 s → 8,74 s); GA im Juli erwartet.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EU</span> <strong>Spring:</strong> Statemachine-RCE (CVE-2026-41862, HIGH) + Cloud-Gateway-Header-Spoofing; 67 Spring-CVEs im Juni.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1:</strong> 200+ Änderungen — SQL/PGQ-Graphen, paralleles Autovacuum, 2× schnellere FK-Checks.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU:</strong> 243 CVEs in 11 Produktfamilien, fast die Hälfte kritisch — Java SE inklusive.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>CRA:</strong> 11.06.-Meilenstein durch — als Nächstes greift am 11.09. die Melde­pflicht für aktiv ausgenutzte Lücken.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The week was a string of supply-chain and RCE scares. A coordinated campaign hit the Arch User Repository, poisoning over 1,500 packages with an infostealer plus rootkit — Arch has since shut down new registrations. F5 shipped two critical NGINX flaws out-of-band, Node.js delivered its quarterly batch with two HIGH CVEs, and Oracle patched 243 bugs. The silver lining: TypeScript 7.0 is in RC and, thanks to a Go compiler, runs roughly ten times faster.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>AUR \"Atomic Arch\":</strong> 1,500+ Arch packages compromised with infostealer + eBPF rootkit; Arch locked new account signups since 06-15.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>NGINX:</strong> F5 patches two critical RCE vulnerabilities (CVSS v4 9.2) in HTTP/3 and HTTP/2+gRPC — out-of-band.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js:</strong> Quarterly release on 06-18 with 12 CVEs (2 HIGH) — TLS wildcard bypass and WebCrypto crash.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>TypeScript 7.0 RC:</strong> Go compiler, ~10× faster (VS Code: 89s → 8.74s); GA expected in July.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EU</span> <strong>Spring:</strong> Statemachine RCE (CVE-2026-41862, HIGH) + Cloud Gateway header spoofing; 67 Spring CVEs in June.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1:</strong> 200+ changes — SQL/PGQ graphs, parallel autovacuum, 2× faster FK checks.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU:</strong> 243 CVEs across 11 product families, nearly half critical — Java SE included.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>CRA:</strong> 06-11 milestone passed — next, mandatory reporting of actively exploited vulnerabilities kicks in on 09-11.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A semana foi uma sucessão de sustos em cadeia de suprimentos e RCE. Uma campanha coordenada no Arch User Repository contaminou mais de 1.500 pacotes com infostealer e rootkits — o Arch desativou novas inscrições em resposta. F5 lançou duas falhas críticas do NGINX fora do cronograma, Node.js entregou seu pacote trimestral com dois CVEs HIGH, e Oracle corrigiu 243 bugs. Pelo lado positivo: TypeScript 7.0 está em RC e compila aproximadamente dez vezes mais rápido graças a um compilador em Go.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>AUR \"Atomic Arch\":</strong> mais de 1.500 pacotes do Arch comprometidos com infostealer e rootkits eBPF; Arch bloqueou novas inscrições desde 15/06.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>NGINX:</strong> F5 corrige duas falhas críticas de RCE (CVSS v4 9,2) em HTTP/3 e HTTP/2+gRPC — fora do cronograma.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js:</strong> lançamento trimestral em 18/06 com 12 CVEs (2 HIGH) — bypass de wildcard TLS e crash do WebCrypto.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>TypeScript 7.0 RC:</strong> compilador em Go, ~10× mais rápido (VS Code: 89 s → 8,74 s); GA esperado em julho.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EU</span> <strong>Spring:</strong> RCE de Statemachine (CVE-2026-41862, HIGH) e spoofing de header do Cloud Gateway; 67 CVEs do Spring em junho.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1:</strong> mais de 200 mudanças — grafos SQL/PGQ, autovacuum paralelo, verificações de FK 2× mais rápidas.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU:</strong> 243 CVEs em 11 famílias de produtos, quase metade crítica — Java SE incluído.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EU</span> <strong>CRA:</strong> marco de 11/06 ultrapassado — próximo, a obrigação de relatar falhas ativamente exploradas entra em vigor em 11/09.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La semana fue una sucesión de sustos en cadena de suministro y RCE. Una campaña coordinada en el Arch User Repository envenenó más de 1.500 paquetes con infostealers y rootkits — Arch desactivó los registros nuevos en respuesta. F5 lanzó dos fallos críticos de NGINX fuera de programa, Node.js entregó su paquete trimestral con dos CVEs HIGH, y Oracle parchó 243 bugs. Del lado positivo: TypeScript 7.0 está en RC y compila aproximadamente diez veces más rápido gracias a un compilador basado en Go.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">OSS</span> <strong>AUR \"Atomic Arch\":</strong> más de 1.500 paquetes de Arch comprometidos con infostealers y rootkits eBPF; Arch bloqueó registros nuevos desde 15/06.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Infra</span> <strong>NGINX:</strong> F5 parchea dos fallos críticos de RCE (CVSS v4 9,2) en HTTP/3 y HTTP/2+gRPC — fuera de programa.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Node.js:</strong> lanzamiento trimestral el 18/06 con 12 CVEs (2 HIGH) — bypass de comodín TLS y crash de WebCrypto.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Web</span> <strong>TypeScript 7.0 RC:</strong> compilador en Go, ~10× más rápido (VS Code: 89 s → 8,74 s); GA esperado en julio.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">EU</span> <strong>Spring:</strong> RCE de Statemachine (CVE-2026-41862, HIGH) y suplantación de encabezado de Cloud Gateway; 67 CVEs de Spring en junio.</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19 Beta 1:</strong> más de 200 cambios — grafos SQL/PGQ, autovacuum paralelo, controles de FK 2× más rápidos.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Oracle CPU:</strong> 243 CVEs en 11 familias de productos, casi la mitad crítica — Java SE incluido.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">EU</span> <strong>CRA:</strong> hito del 11/06 superado — próximo, la obligación de reportar fallos activamente explotados entra en vigor el 11/09.</li>\n    </ul></div>"
