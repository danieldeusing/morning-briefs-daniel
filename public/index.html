<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, print, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --cat-accent: var(--c-jobs);           --cat-accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); --cat-accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport);     --cat-accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto);  --cat-accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted-ink); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --cat-accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    margin: 0;
    border-radius: 0;
    cursor: pointer; font-weight: 600; font-size: 0.8rem;
    color: var(--foreground);
    transition: background 120ms, color 0.15s ease;
    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — hide the header + footer chrome and let the iframe content (or
     home grid) take the full page. Same-origin iframes print their content
     natively, so the visible newsletter prints with its own @media print
     rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, footer.status-bar, .loading, .print-dialog, .nav-rail, .rail-fab {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted-ink);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--cat-accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--cat-accent-text);
    color: var(--bg);
    border: 1px solid var(--cat-accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    <div class="home show" id="home-view">
      <p class="home-stand" id="home-stand" hidden><!-- populated by JS: "Stand: DD.MM.YYYY" --></p>
      <div class="tldr-grid" id="tldr-grid"><!-- populated by JS --></div>
    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
          <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
          <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
          <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
                font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, print, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">
      <span class="status-tag">[briefs]</span> <span class="status-host">reader@briefs:</span><span class="status-loc" id="status-loc">~</span>
    </span>
    <nav class="status-controls" aria-label="Einstellungen">
      <a class="status-btn status-link" href="/datenschutz.html">datenschutz</a>
      <a class="status-btn status-link" href="/impressum.html">impressum</a>
      <span class="status-sep" aria-hidden="true"></span>
      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-label="Sprache wählen" title="Sprache wählen">
          <span class="dd-flag" aria-hidden="true"><!-- dd-flag-<lang> set by JS --></span>
          <span class="lang-label-short">DE</span>
          <span class="lang-caret" aria-hidden="true">▾</span>
        </button>
        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="de" aria-selected="true">
            <span class="dd-flag dd-flag-de" aria-hidden="true"></span><span>Deutsch</span>
          </button>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="en" aria-selected="false">
            <span class="dd-flag dd-flag-en" aria-hidden="true"></span><span>English</span>
          </button>
          <button class="dropdown-item lang-option" type="button" role="option" data-lang="pt" aria-selected="false">
            <span class="dd-flag dd-flag-pt" aria-hidden="true"></span><span>Português</span>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein halbes Jahr lang trieb der Iran-Krieg den Ölpreis auf fast 120 Dollar und mit ihm die Inflation. Heute, am letzten Handelstag des ersten Halbjahres, ist Brent zurück bei 73,48 Dollar — der Waffenstillstand in der Schweiz hat die Straße von Hormus wieder geöffnet. Für dich heißt das: der Inflations-Treiber dreht sich, aber die drei großen Notenbanken laufen auseinander, und der Dollar bleibt fest. EUR/BRL klebt bei 5,89.</p>\n    <ul>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 73,48 $</strong>: −0,59 % zum Vortag, −22,6 % im Monat. WTI erstmals seit Kriegsbeginn unter 70 $. Vom ~120-$-Kriegshoch ist nichts mehr übrig. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">EZB</span> <strong>+25 bp auf 2,25 %</strong> (11.06.) — erste Zinserhöhung seit 2023, gegen die Kriegs-Inflation. Trotzdem fiel der Euro. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">FED</span> <strong>Hold bei 3,50–3,75 %</strong> (17.06.), aber der Dot-Plot zeigt jetzt 3,8 % zum Jahresende — der Markt preist eine Erhöhung schon im Oktober. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">BCB</span> <strong>Selic −25 bp auf 14,25 %</strong> (17.06.), dritte Senkung in Folge — aber die Forward Guidance ist weg, August ist offen. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip good\">FX</span> <strong>EUR/BRL 5,8899</strong> (EZB-Fix 29.06.); Kreuzkurs-Check sauber (Abweichung 0,001 %), Intraday-Spot ~5,8962. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">DXY</span> <strong>101,37</strong> (+2,19 % im Monat) — der Dollar-Index läuft auf den zweiten Monatsgewinn in Folge zu, das drückt strukturell auf den Real. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip hot\">BR-INFLATION</span> <strong>IPCA 4,72 %</strong> (Mai, im Jahr), BCB hob die 2026-Projektion auf 5,2 % — die Hormus-Energiekosten sitzen noch in den Zahlen. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">FOCUS</span> <strong>Markt sieht USD/BRL bei 5,20</strong> zum Jahresende, Selic bei 14,00 % — BNP zielt sogar auf 5,00 in 12 Monaten. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">WAHL</span> <strong>4. Oktober</strong>: ab H2 wird der brasilianische Wahlkampf zum Haupt-Risiko für den Real. <span class=\"chip\">BR</span></li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein halbes Jahr lang trieb der Iran-Krieg den Ölpreis auf fast 120 Dollar und mit ihm die Inflation. Heute, am letzten Handelstag des ersten Halbjahres, ist Brent zurück bei 73,48 Dollar — der Waffenstillstand in der Schweiz hat die Straße von Hormus wieder geöffnet. Für dich heißt das: der Inflations-Treiber dreht sich, aber die drei großen Notenbanken laufen auseinander, und der Dollar bleibt fest. EUR/BRL klebt bei 5,89.</p>\n    <ul>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 73,48 $</strong>: −0,59 % zum Vortag, −22,6 % im Monat. WTI erstmals seit Kriegsbeginn unter 70 $. Vom ~120-$-Kriegshoch ist nichts mehr übrig. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">EZB</span> <strong>+25 bp auf 2,25 %</strong> (11.06.) — erste Zinserhöhung seit 2023, gegen die Kriegs-Inflation. Trotzdem fiel der Euro. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">FED</span> <strong>Hold bei 3,50–3,75 %</strong> (17.06.), aber der Dot-Plot zeigt jetzt 3,8 % zum Jahresende — der Markt preist eine Erhöhung schon im Oktober. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">BCB</span> <strong>Selic −25 bp auf 14,25 %</strong> (17.06.), dritte Senkung in Folge — aber die Forward Guidance ist weg, August ist offen. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip good\">FX</span> <strong>EUR/BRL 5,8899</strong> (EZB-Fix 29.06.); Kreuzkurs-Check sauber (Abweichung 0,001 %), Intraday-Spot ~5,8962. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">DXY</span> <strong>101,37</strong> (+2,19 % im Monat) — der Dollar-Index läuft auf den zweiten Monatsgewinn in Folge zu, das drückt strukturell auf den Real. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip hot\">BR-INFLATION</span> <strong>IPCA 4,72 %</strong> (Mai, im Jahr), BCB hob die 2026-Projektion auf 5,2 % — die Hormus-Energiekosten sitzen noch in den Zahlen. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">FOCUS</span> <strong>Markt sieht USD/BRL bei 5,20</strong> zum Jahresende, Selic bei 14,00 % — BNP zielt sogar auf 5,00 in 12 Monaten. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">WAHL</span> <strong>4. Oktober</strong>: ab H2 wird der brasilianische Wahlkampf zum Haupt-Risiko für den Real. <span class=\"chip\">BR</span></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">For half a year, the Iran war drove oil prices to nearly $120 and inflation with it. Today, on the last trading day of the first half-year, Brent is back to $73.48 — the ceasefire in Switzerland has reopened the Strait of Hormuz. For you, that means: the inflation driver is shifting, but the three major central banks are pulling apart, and the dollar stays strong. EUR/BRL is stuck at 5.89.</p>\n    <ul>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $73.48</strong>: −0.59% day-on-day, −22.6% over the month. WTI for the first time since war's start below $70. Nothing left of the ~$120 war peak. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">ECB</span> <strong>+25 bp to 2.25%</strong> (11.06.) — first rate hike since 2023, against war-driven inflation. Yet the euro fell. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">FED</span> <strong>Hold at 3.50–3.75%</strong> (17.06.), but the Dot-Plot now shows 3.8% by year-end — the market is already pricing in a hike for October. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">BCB</span> <strong>Selic −25 bp to 14.25%</strong> (17.06.), third cut in a row — but forward guidance is gone, August is open. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip good\">FX</span> <strong>EUR/BRL 5.8899</strong> (ECB Fix 29.06.); cross-rate check clean (deviation 0.001%), intraday spot ~5.8962. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">DXY</span> <strong>101.37</strong> (+2.19% over the month) — the dollar index is running to its second monthly gain in a row, structurally pressing down on the real. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip hot\">BR-INFLATION</span> <strong>IPCA 4.72%</strong> (May, year-on-year), BCB raised its 2026 projection to 5.2% — Hormuz energy costs still sit in the figures. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">FOCUS</span> <strong>Market sees USD/BRL at 5.20</strong> by year-end, Selic at 14.00% — BNP even targets 5.00 in 12 months. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">ELECTION</span> <strong>Oct 4th</strong>: from H2 on, the Brazilian election campaign becomes the main risk for the real. <span class=\"chip\">BR</span></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Durante meio ano, a guerra do Irã empurrou o preço do petróleo para quase 120 dólares e a inflação com ele. Hoje, no último dia de pregão do primeiro semestre, o Brent está de volta a 73,48 dólares — o cessar-fogo na Suíça reabre o Estreito de Ormuz. Para você, isso significa: o motor da inflação está mudando, mas os três grandes bancos centrais estão se afastando, e o dólar permanece forte. EUR/BRL fica travado em 5,89.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 73,48 $</strong>: −0,59% ante ontem, −22,6% no mês. WTI abaixo de 70 dólares pela primeira vez desde o início da guerra. Nada sobrou do pico de ~120 dólares. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 bp para 2,25%</strong> (11/06) — primeira alta desde 2023, contra inflação causada pela guerra. Mesmo assim, o euro caiu. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">FED</span> <strong>Mantém em 3,50–3,75%</strong> (17/06), mas o dot-plot mostra 3,8% no final do ano — o mercado já precifica uma alta para outubro. <span class=\"chip\">EUA</span></li>\n      <li><span class=\"chip\">BCB</span> <strong>Selic −25 bp para 14,25%</strong> (17/06), terceira queda seguida — mas o forward guidance desapareceu, agosto está aberto. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip good\">CÂMBIO</span> <strong>EUR/BRL 5,8899</strong> (Fix BCE 29/06); verificação da taxa cruzada limpa (desvio 0,001%), spot intraday ~5,8962. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">DXY</span> <strong>101,37</strong> (+2,19% no mês) — o índice do dólar segue para seu segundo ganho mensal consecutivo, pressionando estruturalmente o real. <span class=\"chip\">EUA</span></li>\n      <li><span class=\"chip hot\">INFLAÇÃO-BR</span> <strong>IPCA 4,72%</strong> (Maio, no ano), BCB elevou projeção 2026 para 5,2% — custos de energia de Ormuz ainda aparecem nos números. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">FOCUS</span> <strong>Mercado vê USD/BRL em 5,20</strong> no final do ano, Selic em 14,00% — BNP aponta até 5,00 em 12 meses. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">ELEIÇÃO</span> <strong>4 de outubro</strong>: a partir do H2, a campanha eleitoral brasileira vira principal risco para o real. <span class=\"chip\">BR</span></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Durante medio año, la guerra de Irán empujó el precio del petróleo a casi 120 dólares e inflación junto con él. Hoy, en el último día de operaciones del primer semestre, Brent está de vuelta en 73,48 dólares — el alto el fuego en Suiza ha reabierto el Estrecho de Ormuz. Para ti, eso significa: el motor de la inflación está cambiando, pero los tres grandes bancos centrales se están separando, y el dólar permanece fuerte. EUR/BRL se mantiene en 5,89.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 73,48 $</strong>: −0,59% día a día, −22,6% en el mes. WTI por primera vez desde el inicio de la guerra por debajo de 70 $. Nada queda del pico de ~120 $. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">BCE</span> <strong>+25 pb a 2,25%</strong> (11/06) — primer alza desde 2023, contra inflación impulsada por la guerra. Aun así, el euro cayó. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">FED</span> <strong>Mantiene 3,50–3,75%</strong> (17/06), pero el dot-plot ahora muestra 3,8% a fin de año — el mercado ya está precificando una alza para octubre. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip\">BCB</span> <strong>Selic −25 pb a 14,25%</strong> (17/06), tercer corte seguido — pero la orientación futura desapareció, agosto está abierto. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip good\">DIVISAS</span> <strong>EUR/BRL 5,8899</strong> (Fix BCE 29/06); revisión de tipo cruzado limpia (desviación 0,001%), spot intraday ~5,8962. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">DXY</span> <strong>101,37</strong> (+2,19% en el mes) — el índice del dólar se encamina a su segundo ganancia mensual consecutiva, presionando estructuralmente al real. <span class=\"chip\">USA</span></li>\n      <li><span class=\"chip hot\">INFLACIÓN-BR</span> <strong>IPCA 4,72%</strong> (Mayo, anualizado), BCB elevó su proyección 2026 a 5,2% — costos energéticos de Ormuz aún están en los números. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">FOCUS</span> <strong>Mercado ve USD/BRL en 5,20</strong> a fin de año, Selic en 14,00% — BNP apunta incluso a 5,00 en 12 meses. <span class=\"chip\">BR</span></li>\n      <li><span class=\"chip\">ELECCIÓN</span> <strong>4 de octubre</strong>: a partir del H2, la campaña electoral brasileña se convierte en el riesgo principal para el real. <span class=\"chip\">BR</span></li>\n    </ul></div>"

.986 $</strong>/oz — erstmals seit 8 Monaten unter 4.000 $; −11,1 % im Juni, aber +19,4 % zum Vorjahr.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent 73,48 $</strong>/bbl (−22,6 % im Juni) — US-Iran-Gespräche in Doha, Hormuz wieder bei ~75 % der Vorkriegs-Flüsse; WTI 70,24 $.</li>\n      <li><span class=\"chip\">KRYPTO-SEKTOREN</span> <strong>Ränder rot</strong>: DOGE −27 % im Juni, SHIB ~0,0000041 $, Fear-&amp;-Greed 13 („Extreme Angst\") — TAO 206,43 $.</li>\n    </ul></div>",

rong>/oz — erstmals seit 8 Monaten unter 4.000 $; −11,1 % im Juni, aber +19,4 % zum Vorjahr.</li>\n      <li><span class=\"chip\">ÖL</span> <strong>Brent 73,48 $</strong>/bbl (−22,6 % im Juni) — US-Iran-Gespräche in Doha, Hormuz wieder bei ~75 % der Vorkriegs-Flüsse; WTI 70,24 $.</li>\n      <li><span class=\"chip\">KRYPTO-SEKTOREN</span> <strong>Ränder rot</strong>: DOGE −27 % im Juni, SHIB ~0,0000041 $, Fear-&amp;-Greed 13 („Extreme Angst\") — TAO 206,43 $.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Tuesday, the last trading day of June — and it has been a brutal month for nearly every risk asset. The headline is Microsoft: the stock lost roughly 21.6% in June, putting it on track for its worst month since the dot-com crash in December 2000. The market is suddenly questioning whether the massive AI investments will ever pay off — $190 billion in capex committed for 2026, while free cash flow falls. The counterpoint: Tesla jumped +8.46% on Monday to $411.84, driven by a new driver-assistance rollout and a raised delivery forecast; the real Q2 numbers come Wednesday. In crypto, Bitcoin fell −19.1% in June to around $59,700, driven by roughly $4.06 billion in ETF outflows (June monthly total, worst month since inception). And gold slipped below $4,000 for the first time in eight months. Today's question: does June close as weak as it ran?</p>\n    <ul>\n      <li><span class=\"chip hot\">MICROSOFT</span> <strong>MSFT −21.6% in June</strong>: worst month since December 2000; market cap at $2.65 trillion (vs. ~$4 trillion 12 months ago) — close $368.57 (06-29).</li>\n      <li><span class=\"chip good\">TESLA</span> <strong>TSLA +8.46% to $411.84</strong> (06-29): FSD V14 Lite on Hardware-3 vehicles; Morgan Stanley raises Q2 delivery estimate to 413k — numbers <strong>Wed 07-02</strong>.</li>\n      <li><span class=\"chip\">DOW</span> <strong>Alphabet joins the Dow Jones</strong>: GOOGL +4.82% to $353.65 on its first day as a Dow member (replaces Verizon, 06-29).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC ~$59,686</strong> (−19.1% in June, −44.6% from Oct-2025 high of $126,198) — roughly $4.06 billion in ETF outflows (June monthly total).</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~$1,587</strong> (+1.2% 24h, −21.8% 1M) — market cap $191.5 billion, rank 2.</li>\n      <li><span class=\"chip hot\">GOLD</span> <strong>Gold $3,986</strong>/oz — below $4,000 for the first time in 8 months; −11.1% in June, but +19.4% year-over-year.</li>\n      <li><span class=\"chip\">OIL</span> <strong>Brent $73.48</strong>/bbl (−22.6% in June) — US-Iran talks in Doha, Hormuz back at ~75% of pre-war flows; WTI $70.24.</li>\n      <li><span class=\"chip\">CRYPTO SECTORS</span> <strong>Edges bleeding</strong>: DOGE −27% in June, SHIB ~$0.0000041, Fear &amp; Greed 13 (\"Extreme Fear\") — TAO $206.43.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É terça-feira, o último pregão de junho — e foi um mês brutal para quase todos os ativos de risco. O destaque é a Microsoft: a ação perdeu cerca de 21,6% em junho, encaminhando-se para o pior mês desde a crise das pontocom em dezembro de 2000. O mercado questiona subitamente se os enormes investimentos em IA vão se pagar — US$ 190 bilhões em capex comprometidos para 2026, enquanto o fluxo de caixa livre cai. Do outro lado: a Tesla disparou +8,46% na segunda-feira para US$ 411,84, impulsionada por um novo assistente de condução e uma previsão de entregas revisada para cima; os números reais do 2º trimestre saem na quarta-feira. No mercado cripto, o Bitcoin caiu −19,1% em junho para cerca de US$ 59.700, pressionado por aproximadamente US$ 4,06 bilhões em saídas líquidas dos ETFs (total mensal de junho, pior mês desde o lançamento). E o ouro caiu abaixo de US$ 4.000 pela primeira vez em oito meses. A pergunta de hoje: junho vai fechar tão fraco quanto correu?</p>\n    <ul>\n      <li><span class=\"chip hot\">MICROSOFT</span> <strong>MSFT −21,6% em junho</strong>: pior mês desde dezembro de 2000; valor de mercado em US$ 2,65 trilhões (vs. ~US$ 4 trilhões há 12 meses) — fechamento US$ 368,57 (29/06).</li>\n      <li><span class=\"chip good\">TESLA</span> <strong>TSLA +8,46% para US$ 411,84</strong> (29/06): FSD V14 Lite em veículos Hardware-3; Morgan Stanley eleva estimativa de entregas do 2T para 413k — números <strong>Qua 02/07</strong>.</li>\n      <li><span class=\"chip\">DOW</span> <strong>Alphabet entra no Dow Jones</strong>: GOOGL +4,82% para US$ 353,65 no primeiro dia como membro do Dow (substitui Verizon, 29/06).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC ~US$ 59.686</strong> (−19,1% em junho, −44,6% em relação ao pico de out/2025 de US$ 126.198) — cerca de US$ 4,06 bilhões em saídas de ETFs (total mensal de junho).</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~US$ 1.587</strong> (+1,2% em 24h, −21,8% no mês) — valor de mercado US$ 191,5 bilhões, posição 2.</li>\n      <li><span class=\"chip hot\">OURO</span> <strong>Ouro US$ 3.986</strong>/oz — abaixo de US$ 4.000 pela primeira vez em 8 meses; −11,1% em junho, mas +19,4% ao ano.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent US$ 73,48</strong>/bbl (−22,6% em junho) — negociações EUA-Irã em Doha, Hormuz de volta a ~75% dos fluxos pré-guerra; WTI US$ 70,24.</li>\n      <li><span class=\"chip\">SETORES CRIPTO</span> <strong>Bordas sangrando</strong>: DOGE −27% em junho, SHIB ~US$ 0,0000041, Fear &amp; Greed 13 (\"Medo Extremo\") — TAO US$ 206,43.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es martes, el último día de operaciones de junio — y fue un mes brutal para casi todos los activos de riesgo. El titular es Microsoft: la acción perdió cerca del 21,6% en junio, encaminándose hacia su peor mes desde la crisis puntocom en diciembre del 2000. El mercado cuestiona de repente si las enormes inversiones en IA alguna vez valdrán la pena — US$ 190.000 millones en capex comprometidos para 2026, mientras el flujo de caja libre cae. La contraparte: Tesla saltó +8,46% el lunes a US$ 411,84, impulsada por un nuevo asistente de manejo y una previsión de entregas elevada; los números reales del 2T llegan el miércoles. En el mercado cripto, Bitcoin cayó −19,1% en junio hasta cerca de US$ 59.700, impulsado por aproximadamente US$ 4.060 millones en salidas netas de ETFs (total mensual de junio, el peor mes desde su lanzamiento). Y el oro cayó por debajo de US$ 4.000 por primera vez en ocho meses. La pregunta de hoy: ¿junio cierra tan débil como corrió?</p>\n    <ul>\n      <li><span class=\"chip hot\">MICROSOFT</span> <strong>MSFT −21,6% en junio</strong>: peor mes desde diciembre del 2000; capitalización de mercado en US$ 2,65 billones (vs. ~US$ 4 billones hace 12 meses) — cierre US$ 368,57 (29/06).</li>\n      <li><span class=\"chip good\">TESLA</span> <strong>TSLA +8,46% a US$ 411,84</strong> (29/06): FSD V14 Lite en vehículos Hardware-3; Morgan Stanley eleva estimado de entregas del 2T a 413k — números <strong>Mié 02/07</strong>.</li>\n      <li><span class=\"chip\">DOW</span> <strong>Alphabet entra al Dow Jones</strong>: GOOGL +4,82% a US$ 353,65 en su primer día como miembro del Dow (reemplaza a Verizon, 29/06).</li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>BTC ~US$ 59.686</strong> (−19,1% en junio, −44,6% desde el máximo de oct/2025 de US$ 126.198) — aproximadamente US$ 4.060 millones en salidas de ETFs (total mensual de junio).</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH ~US$ 1.587</strong> (+1,2% en 24h, −21,8% en 1M) — capitalización de mercado US$ 191.500 millones, posición 2.</li>\n      <li><span class=\"chip hot\">ORO</span> <strong>Oro US$ 3.986</strong>/oz — por debajo de US$ 4.000 por primera vez en 8 meses; −11,1% en junio, pero +19,4% interanual.</li>\n      <li><span class=\"chip\">PETRÓLEO</span> <strong>Brent US$ 73,48</strong>/bbl (−22,6% en junio) — negociaciones EE.UU.-Irán en Doha, Ormuz de vuelta a ~75% de los flujos previos a la guerra; WTI US$ 70,24.</li>\n      <li><span class=\"chip\">SECTORES CRIPTO</span> <strong>Los bordes sangran</strong>: DOGE −27% en junio, SHIB ~US$ 0,0000041, Fear &amp; Greed 13 (\"Miedo Extremo\") — TAO US$ 206,43.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Halbjahres-Wechsel — ein guter Tag, den Patch-Stand der Juni-KEV-Welle durchzugehen, und der Juni hat dafür reichlich Material geliefert: Splunk steht zum allerersten Mal mit einer 9,8er-RCE auf der CISA-KEV-Liste, Check Points VPN wird seit Mai per Ransomware abgegriffen, und die Five-Eyes-Dienste warnen so deutlich wie selten, dass KI-Modelle die Offensiv-Seite in „Monaten, nicht Jahren\" hochziehen. Im Hintergrund läuft die deutsche NIS2-Umsetzung an — mit einer Registrierungs-Lücke von 62 %. Ein Tag zum Patch-Stand prüfen — und zum Nachdenken, was die Agenten-Schicht eigentlich an Angriffsfläche aufmacht.</p>\n    <ul>\n      <li><span class=\"chip\">Sec · EU/DE</span> <strong>NIS2 in Deutschland</strong>: BSI-Registrierungsfrist (März, faktisch bis 31. Juli verlängert) von 62 % der ~29.500 Einrichtungen verpasst; BSI-Aufsichtsphase beginnt H2 2026. Bußgeld bis 10 Mio. € / 2 % Umsatz.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Splunk CVE-2026-20253</strong>: CVSS 9,8, pre-auth RCE über PostgreSQL-Sidecar. Erster Splunk-Bug überhaupt auf der CISA-KEV — seit 18. Juni aktiv ausgenutzt. Fix: 10.2.4 / 10.0.7.</li>\n      <li><span class=\"chip hot\">Sec · DE</span> <strong>Check Point VPN CVE-2026-50751</strong>: CVSS 9,3, IKEv1-Auth-Bypass, von Qilin-Ransomware seit 7. Mai genutzt. BSI-Warnung „hoch\" vom 9. Juni.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Ubiquiti UniFi OS</strong>: drei CVSS-10,0-Lücken, verkettet = unauthenticated Root-RCE. CISA-KEV am 23. Juni. Fix: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Five Eyes + CrowdStrike</strong>: „Prompts sind die neue Malware\" — Prompt-Injection traf 2025 über 90 Organisationen; 73 % der Produktions-KI-Deployments verwundbar (OWASP-Tracking / helpnetsecurity).</li>\n      <li><span class=\"chip\">Sec · USA</span> <strong>WordPress-Supply-Chain</strong>: 1,2 Mio. Sites über manipulierte CDN-Skripte (OptinMonster, TrustPulse, PushEngage) hintertürt — Rogue-Admin auto-angelegt.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring 7.0.8 / 6.2.19</strong>: 17 CVEs gepatcht — und 6.2.x ist „wohl das letzte OSS-Release\" der Generation. Migrations-Signal.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>PostgreSQL-Sammelrelease</strong>: 11 CVEs, vier davon CVSS 8,8. Postgres 14 EOL am 12.11.2026.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Microsoft Patch Tuesday</strong>: Rekord — 206 CVEs, rund 39 Critical (Zählung quellenabhängig), mindestens 3 Zero-Days inkl. HTTP/2-„Bomb\"-DoS.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Halbjahres-Wechsel — ein guter Tag, den Patch-Stand der Juni-KEV-Welle durchzugehen, und der Juni hat dafür reichlich Material geliefert: Splunk steht zum allerersten Mal mit einer 9,8er-RCE auf der CISA-KEV-Liste, Check Points VPN wird seit Mai per Ransomware abgegriffen, und die Five-Eyes-Dienste warnen so deutlich wie selten, dass KI-Modelle die Offensiv-Seite in „Monaten, nicht Jahren\" hochziehen. Im Hintergrund läuft die deutsche NIS2-Umsetzung an — mit einer Registrierungs-Lücke von 62 %. Ein Tag zum Patch-Stand prüfen — und zum Nachdenken, was die Agenten-Schicht eigentlich an Angriffsfläche aufmacht.</p>\n    <ul>\n      <li><span class=\"chip\">Sec · EU/DE</span> <strong>NIS2 in Deutschland</strong>: BSI-Registrierungsfrist (März, faktisch bis 31. Juli verlängert) von 62 % der ~29.500 Einrichtungen verpasst; BSI-Aufsichtsphase beginnt H2 2026. Bußgeld bis 10 Mio. € / 2 % Umsatz.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Splunk CVE-2026-20253</strong>: CVSS 9,8, pre-auth RCE über PostgreSQL-Sidecar. Erster Splunk-Bug überhaupt auf der CISA-KEV — seit 18. Juni aktiv ausgenutzt. Fix: 10.2.4 / 10.0.7.</li>\n      <li><span class=\"chip hot\">Sec · DE</span> <strong>Check Point VPN CVE-2026-50751</strong>: CVSS 9,3, IKEv1-Auth-Bypass, von Qilin-Ransomware seit 7. Mai genutzt. BSI-Warnung „hoch\" vom 9. Juni.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Ubiquiti UniFi OS</strong>: drei CVSS-10,0-Lücken, verkettet = unauthenticated Root-RCE. CISA-KEV am 23. Juni. Fix: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Five Eyes + CrowdStrike</strong>: „Prompts sind die neue Malware\" — Prompt-Injection traf 2025 über 90 Organisationen; 73 % der Produktions-KI-Deployments verwundbar (OWASP-Tracking / helpnetsecurity).</li>\n      <li><span class=\"chip\">Sec · USA</span> <strong>WordPress-Supply-Chain</strong>: 1,2 Mio. Sites über manipulierte CDN-Skripte (OptinMonster, TrustPulse, PushEngage) hintertürt — Rogue-Admin auto-angelegt.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring 7.0.8 / 6.2.19</strong>: 17 CVEs gepatcht — und 6.2.x ist „wohl das letzte OSS-Release\" der Generation. Migrations-Signal.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>PostgreSQL-Sammelrelease</strong>: 11 CVEs, vier davon CVSS 8,8. Postgres 14 EOL am 12.11.2026.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Microsoft Patch Tuesday</strong>: Rekord — 206 CVEs, rund 39 Critical (Zählung quellenabhängig), mindestens 3 Zero-Days inkl. HTTP/2-„Bomb\"-DoS.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Mid-year turnover — a good day to review the patch status of June's KEV wave, and June has supplied plenty of material: Splunk appears for the very first time with a 9.8 RCE on the CISA KEV list, Check Point's VPN has been targeted by ransomware since May, and the Five Eyes warn more plainly than usual that AI models will accelerate the offensive side in \"months, not years.\" In the background, Germany's NIS2 rollout is underway — with a registration gap of 62 %. A day to check your patch status — and to think about what the agent layer actually opens up as attack surface.</p>\n    <ul>\n      <li><span class=\"chip\">Sec · EU/DE</span> <strong>NIS2 in Germany</strong>: BSI registration deadline (March, extended through July 31 in practice) missed by 62 % of ~29,500 entities; BSI oversight phase begins H2 2026. Fines up to €10M / 2 % of revenue.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Splunk CVE-2026-20253</strong>: CVSS 9.8, pre-auth RCE via PostgreSQL sidecar. First Splunk bug ever on the CISA KEV list — actively exploited since June 18. Fix: 10.2.4 / 10.0.7.</li>\n      <li><span class=\"chip hot\">Sec · DE</span> <strong>Check Point VPN CVE-2026-50751</strong>: CVSS 9.3, IKEv1 auth bypass, exploited by Qilin ransomware since May 7. BSI warning \"high\" from June 9.</li>\n      <li><span class=\"chip hot\">Sec · Global</span> <strong>Ubiquiti UniFi OS</strong>: three CVSS-10.0 flaws, chained = unauthenticated root RCE. CISA KEV on June 23. Fix: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Five Eyes + CrowdStrike</strong>: \"Prompts are the new malware\" — prompt injection hit 90+ organizations in 2025; 73 % of production AI deployments vulnerable (OWASP tracking / helpnetsecurity).</li>\n      <li><span class=\"chip\">Sec · USA</span> <strong>WordPress supply chain</strong>: 1.2M sites backdoored via compromised CDN scripts (OptinMonster, TrustPulse, PushEngage) — rogue admin auto-created.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring 7.0.8 / 6.2.19</strong>: 17 CVEs patched — and 6.2.x is \"likely the last OSS release\" of that generation. Migration signal.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>PostgreSQL batch release</strong>: 11 CVEs, four of them CVSS 8.8. Postgres 14 EOL November 12, 2026.</li>\n      <li><span class=\"chip\">Sec · Global</span> <strong>Microsoft Patch Tuesday</strong>: record — 206 CVEs, roughly 39 critical (count varies by source), at least 3 zero-days including HTTP/2 \"bomb\" DoS.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Virada de meio de ano — um bom dia para revisar o status de patches da onda KEV de junho, e junho entregou bastante material: Splunk aparece pela primeira vez com um RCE 9,8 na lista CISA KEV, a VPN do Check Point está sendo alvo de ransomware desde maio, e os Cinco Olhos alertam mais claramente do que o usual que os modelos de IA acelerarão o lado ofensivo em \"meses, não anos.\" Em segundo plano, a implementação da NIS2 alemã está em andamento — com uma lacuna de registro de 62 %. Um dia para verificar seu status de patches — e pensar sobre que superfície de ataque a camada de agentes realmente abre.</p>\n    <ul>\n      <li><span class=\"chip\">Seg · UE/DE</span> <strong>NIS2 na Alemanha</strong>: prazo de registro da BSI (março, estendido até 31 de julho na prática) perdido por 62 % de ~29.500 entidades; fase de supervisão da BSI começa H2 2026. Multas até €10 Mi / 2 % da receita.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Splunk CVE-2026-20253</strong>: CVSS 9,8, RCE pré-autenticado via sidecar PostgreSQL. Primeiro bug Splunk na lista CISA KEV — explorado ativamente desde 18 de junho. Correção: 10.2.4 / 10.0.7.</li>\n      <li><span class=\"chip hot\">Seg · DE</span> <strong>Check Point VPN CVE-2026-50751</strong>: CVSS 9,3, bypass de autenticação IKEv1, explorado por ransomware Qilin desde 7 de maio. Aviso BSI \"alto\" de 9 de junho.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Ubiquiti UniFi OS</strong>: três falhas CVSS-10,0, encadeadas = RCE raiz não autenticado. CISA KEV em 23 de junho. Correção: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Cinco Olhos + CrowdStrike</strong>: \"Prompts são o novo malware\" — injeção de prompt atingiu 90+ organizações em 2025; 73 % dos despliegues de IA em produção vulneráveis (rastreamento OWASP / helpnetsecurity).</li>\n      <li><span class=\"chip\">Seg · EUA</span> <strong>Cadeia de suprimentos WordPress</strong>: 1,2 Mi de sites comprometidos via scripts CDN manipulados (OptinMonster, TrustPulse, PushEngage) — admin rogue criado automaticamente.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring 7.0.8 / 6.2.19</strong>: 17 CVEs corrigidas — e 6.2.x é \"provavelmente o último lançamento OSS\" da geração. Sinal de migração.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Lançamento em lote PostgreSQL</strong>: 11 CVEs, quatro delas CVSS 8,8. Postgres 14 EOL em 12 de novembro de 2026.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Microsoft Patch Tuesday</strong>: recorde — 206 CVEs, aproximadamente 39 críticas (contagem varia por fonte), pelo menos 3 zero-days incluindo DoS \"bomb\" HTTP/2.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Cierre de mitad de año — un buen día para revisar el estado de parches de la onda KEV de junio, y junio ha suministrado mucho material: Splunk aparece por primera vez con un RCE 9,8 en la lista CISA KEV, la VPN de Check Point ha sido objetivo del ransomware desde mayo, y los Cinco Ojos advierten más claramente que lo habitual que los modelos de IA acelerarán el lado ofensivo en \"meses, no años.\" En segundo plano, el despliegue de NIS2 alemán está en marcha — con una brecha de registro de 62 %. Un día para revisar tu estado de parches — y pensar en qué superficie de ataque la capa de agentes realmente está abriendo.</p>\n    <ul>\n      <li><span class=\"chip\">Seg · UE/DE</span> <strong>NIS2 en Alemania</strong>: plazo de registro de la BSI (marzo, extendido hasta el 31 de julio en la práctica) incumplido por 62 % de ~29.500 entidades; fase de supervisión de la BSI comienza H2 2026. Multas hasta €10 Mi / 2 % de ingresos.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Splunk CVE-2026-20253</strong>: CVSS 9,8, RCE preauthenticado vía sidecar PostgreSQL. Primer error de Splunk en la lista CISA KEV — explotado activamente desde 18 de junio. Corrección: 10.2.4 / 10.0.7.</li>\n      <li><span class=\"chip hot\">Seg · DE</span> <strong>Check Point VPN CVE-2026-50751</strong>: CVSS 9,3, omisión de autenticación IKEv1, explotado por ransomware Qilin desde 7 de mayo. Advertencia BSI \"alta\" del 9 de junio.</li>\n      <li><span class=\"chip hot\">Seg · Global</span> <strong>Ubiquiti UniFi OS</strong>: tres fallos CVSS-10,0, encadenados = RCE raíz no autenticado. CISA KEV el 23 de junio. Corrección: UniFi OS 5.0.8.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Cinco Ojos + CrowdStrike</strong>: \"Los prompts son el nuevo malware\" — inyección de prompts afectó a 90+ organizaciones en 2025; 73 % de los despliegues de IA en producción vulnerable (rastreo OWASP / helpnetsecurity).</li>\n      <li><span class=\"chip\">Seg · EUA</span> <strong>Cadena de suministro WordPress</strong>: 1,2 Mi de sitios comprometidos vía scripts CDN manipulados (OptinMonster, TrustPulse, PushEngage) — admin rogue creado automáticamente.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Spring 7.0.8 / 6.2.19</strong>: 17 CVEs parcheados — y 6.2.x es \"probablemente el último lanzamiento OSS\" de la generación. Señal de migración.</li>\n      <li><span class=\"chip\">Release · OSS</span> <strong>Lanzamiento en lote PostgreSQL</strong>: 11 CVEs, cuatro de ellas CVSS 8,8. Postgres 14 EOL 12 de noviembre de 2026.</li>\n      <li><span class=\"chip\">Seg · Global</span> <strong>Microsoft Patch Tuesday</strong>: récord — 206 CVEs, aproximadamente 39 críticas (el conteo varía por fuente), al menos 3 cero-días incluyendo DoS \"bomb\" HTTP/2.</li>\n    </ul></div>"
