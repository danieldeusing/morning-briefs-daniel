        "es": "<div class=\"tldr\"><p class=\"lead\">Domingo 12 de julio — tema semanal <em>Política, derecho y salud</em>, hoy la quinta parte: <em>elecciones y campaña electoral</em>. En poco más de tres meses Brasil vota: primera vuelta el <strong>4 de octubre de 2026</strong>, eventual segunda vuelta el 25 de octubre. Es el pretexto perfecto para el vocabulario electoral — desde <em>postularse</em>, <em>gobernar</em> y <em>reelegir</em>, pasando por la <em>urna eletrônica</em>, la <em>boleta electoral</em> y la <em>participación electoral</em>, hasta el <em>santinho</em> brasileño y el falso amigo <em>assistir</em>. 36 entradas, 13 verbos con conjugación completa (de los cuales 3 son repasos del día del tribunal), más las dos trampas de conjugación más difíciles del español (<em>gobernar</em>, <em>reelegir</em>) y dos recuadros de gramática.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO AMIGO</span> <strong>assistir (PT) ≠ to assist</strong> — <em>assistir</em> significa «ver / presenciar», no «ayudar». «Assisti ao debate» = yo <em>seguí</em> el debate, no <em>ayudé</em> en él.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a urna eletrônica</strong> — Brasil vota desde 1996 en máquinas electorales sin conexión a internet; según el TSE «não pode ser invadida ou hackeada» (no puede ser vulnerada ni hackeada). Una palabra sin equivalente exacto en español.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o santinho</strong> — el pequeño volante de campaña con foto y número del candidato, llamado así por las estampitas católicas de santos (<em>santinhos de santo</em>).</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>ES gobernar diptonga e→ie</strong> (<em>gobierno</em>, no <em>*goberno</em>) — pero PT <em>governar</em> se mantiene regular (<em>governo</em>). Y ojo: <em>gobernar</em> es e→ie, <strong>no</strong> o→ue.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>wiederwählen es separable</strong> — «hat <em>wiedergewählt</em>». PT <em>reeleger</em> → <em>eu reelejo</em>, ES <em>reelegir</em> → <em>yo reelijo</em> (ambos con g→j en la 1.ª persona).</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>beitreten / austreten con <em>sein</em></strong> (<em>ist beigetreten</em>), pero <strong>vertreten con <em>haben</em></strong> — misma raíz <em>treten</em>, dos verbos auxiliares, según se trate de movimiento o de abstracción.</li>\n      <li><span class=\"chip\">GÉNERO</span> <strong>der/die Abgeordnete &amp; Wahlberechtigte</strong> — adjetivos sustantivados: se declinan como un adjetivo (<em>ein neuer Abgeordneter</em>, <em>dem Abgeordneten</em>), no como un sustantivo fijo.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>die Stichwahl = segundo turno</strong> (Brasil) / <em>segunda vuelta</em> (México) — la segunda ronda electoral, cuando nadie supera el 50 %.</li>\n      <li><span class=\"chip hot\">ACTUAL</span> <strong>fecha electoral BR 2026</strong> — 1.ª vuelta el 04/10, segunda vuelta el 25/10; voto obligatorio para quienes tienen entre 18 y 70 años, multa de hasta <span class=\"stat\">R$ 3,51</span> (~0,90 €) por vuelta en caso de ausentarse sin justificación.</li>\n      <li><span class=\"chip\">REPASO</span> <strong>vertreten · die Verhandlung · strittig</strong> — repasados del día del tribunal del 05/07; los tres encajan en el contexto electoral (<em>representar</em> un distrito, <em>negociaciones</em> de coalición, un resultado electoral <em>disputado</em>).</li>\n    </ul></div>"

  const SUPPORTED_LANGS = ['de', 'en', 'pt', 'es'];

        useLang = lang;
      }
    }
    return catId + '/' + useLang + '/' + date + '.html';
  }

  function tldrFor(cat, lang) {

  const navGroups = $('#nav-groups');

  const NAV_GROUPS = [
    { header: 'Wirtschaft', cats: ['economy', 'stocks-crypto'] },
    { header: 'IT',         cats: ['software', 'ai-dev', 'ai-usecases'] },
    { header: null,         cats: ['jobs'] },          // standalone between IT and Sport

  // Ordered (group, cat) pairs, resolved against the live manifest. Skips ids

  // NAV_GROUPS is loud rather than silent.
  function groupedCategories() {
    const byId = new Map(M.categories.map(c => [c.id, c]));
    const placed = new Set();
    const groups = NAV_GROUPS.map(g => {
      const cats = g.cats.map(id => byId.get(id)).filter(Boolean);
      cats.forEach(c => placed.add(c.id));
      return { header: g.header, cats };
    }).filter(g => g.cats.length);
    const orphans = M.categories.filter(c => !placed.has(c.id));
    if (orphans.length) {
      console.warn('NAV_GROUPS missing categories (appended ungrouped):',
                   orphans.map(c => c.id));
      groups.push({ header: null, cats: orphans });
    }
    return groups;
  }

  function fmtDate(d) {
    const parts = d.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0].slice(2);
  }

  // Wire a click handler that also fires on Enter / Space for keyboard users.
  // For elements that aren't natively focusable (div, article, span), we set
  // tabindex=0 and a role so screen readers announce them correctly.
  function addClickAndKey(el, handler, opts = {}) {
    const role = opts.role || 'button';
    if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    if (!el.hasAttribute('role')) el.setAttribute('role', role);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handler(e);
      }
    });
  }

  // Home-card TL;DR snapshot caps the bullet list at this many items — the
  // card is a scan teaser, the full set is one click away in the brief.
  const HOME_TLDR_BULLET_CAP = 5;
  // The active route as {catId, date}, parsed from the hash (#cat/date).
  function currentRoute() {
    const parts = location.hash.replace(/^#/, '').split('/');
    return { catId: parts[0] || null, date: parts[1] || null };
  }

  // The category dropdown holds only the month-calendar archive picker — no
  // flat date list. The calendar marks the selected day, jumps to its month,
  // and previews titles on hover.
  function renderDates(container, cat, activeDate) {
    container.innerHTML = '';
    if (cat.entries.length === 0) {
      container.innerHTML = '<div class="cat-empty">Heute kein Brief</div>';
      return;
    }
    if (activeDate === undefined) {
      const r = currentRoute();
      activeDate = r.catId === cat.id ? r.date : null;
    }
    const cal = document.createElement('div');
    cal.className = 'cat-cal';
    container.appendChild(cal);
    renderCalendar(cal, cat, activeDate);
  }

  // Month-calendar archive picker: only days that actually have a brief are
  // clickable; hovering/focusing one previews its title, clicking opens it.
  // Replaces the unbounded "show everything" list so the picker stays usable
  // once a category has hundreds of back-issues.
  const CAL_WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
  const CAL_MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
    'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
  const pad2 = n => String(n).padStart(2, '0');
  const monthIndex = iso => {
    const [y, m] = iso.split('-').map(Number);
    return y * 12 + (m - 1);
  };

  function renderCalendar(calEl, cat, activeDate) {
    const byDate = new Map(cat.entries.map(e => [e.date, e]));
    const newest = cat.entries[0].date;                       // manifest is newest-first
    const oldest = cat.entries[cat.entries.length - 1].date;
    const minMonth = monthIndex(oldest);
    const maxMonth = monthIndex(newest);
    const hasActive = activeDate && byDate.has(activeDate);
    // Open on the selected day's month when one is selected, else the newest.
    let cur = Math.min(maxMonth, Math.max(minMonth,
      hasActive ? monthIndex(activeDate) : maxMonth));

    calEl.innerHTML = `
      <div class="cal-bar">
        <button class="cal-nav" type="button" data-dir="-1" aria-label="Vorheriger Monat">‹</button>
        <span class="cal-title"></span>
        <button class="cal-nav" type="button" data-dir="1" aria-label="Nächster Monat">›</button>
      </div>
      <div class="cal-week">${CAL_WEEKDAYS.map(w => '<span>' + w + '</span>').join('')}</div>
      <div class="cal-grid"></div>
      <div class="cal-preview" aria-live="polite"></div>`;

    const title = calEl.querySelector('.cal-title');
    const grid = calEl.querySelector('.cal-grid');
    const preview = calEl.querySelector('.cal-preview');
    const prevBtn = calEl.querySelector('.cal-nav[data-dir="-1"]');
    const nextBtn = calEl.querySelector('.cal-nav[data-dir="1"]');

    function draw() {
      const year = Math.floor(cur / 12);
      const month = cur % 12;                                 // 0-based
      title.textContent = CAL_MONTHS[month] + ' ' + year;
      prevBtn.disabled = cur <= minMonth;
      nextBtn.disabled = cur >= maxMonth;
      grid.innerHTML = '';
      const startCol = (new Date(year, month, 1).getDay() + 6) % 7;   // shift so Monday = 0
      for (let i = 0; i < startCol; i++) {
        const blank = document.createElement('span');
        blank.className = 'cal-day blank';
        grid.appendChild(blank);
      }
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = year + '-' + pad2(month + 1) + '-' + pad2(d);
        const entry = byDate.get(iso);
        const cell = document.createElement(entry ? 'a' : 'span');
        cell.className = 'cal-day ' + (entry ? 'has' : 'none');
        cell.textContent = d;
        if (entry) {
          cell.href = '#' + cat.id + '/' + iso;
          if (iso === activeDate) cell.classList.add('current');
          const show = () => {
            preview.textContent = fmtDate(iso) + ' — ' + headlineFor(entry, currentLang);
          };
          cell.addEventListener('mouseenter', show);
          cell.addEventListener('focus', show);
          cell.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigate(cat.id, iso);
          });
        }
        grid.appendChild(cell);
      }
      // Seed the preview line with the selected day's title (else a prompt).
      preview.textContent = hasActive
        ? fmtDate(activeDate) + ' — ' + headlineFor(byDate.get(activeDate), currentLang)
        : 'Tag mit Brief wählen …';
    }

    [prevBtn, nextBtn].forEach(btn => btn.addEventListener('click', (e) => {
      e.stopPropagation();
      cur = Math.min(maxMonth, Math.max(minMonth, cur + Number(btn.dataset.dir)));
      draw();
    }));
    draw();
  }

  // Render one category row (head + collapsible dates list) and append
  // it to the given container. Extracted so both the Newsletter group
  // and the Sprachen group share identical row markup + behaviour.
  function renderCategoryRow(container, cat) {
    const wrap = document.createElement('div');
    wrap.className = 'cat';
    wrap.dataset.cat = cat.id;

    const head = document.createElement('div');
    head.className = 'cat-head';
    // Tooltip carries the label so it stays identifiable when the sidebar is collapsed.
    head.title = cat.label + (cat.entries.length ? ' · ' + fmtDate(cat.entries[0].date) : '');
    head.innerHTML = `
      <span class="cat-color"></span>
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <button class="cat-toggle" type="button" aria-label="Verlauf für ${cat.label} einblenden">▶</button>
    `;

    const dates = document.createElement('div');
    dates.className = 'cat-dates';

    // Row click: navigate to latest (or expand empty-state for empty categories).
    addClickAndKey(head, (e) => {
      if (e.target && e.target.closest && e.target.closest('.cat-toggle')) return;
      if (cat.entries.length === 0) {
        wrap.classList.toggle('open');
        renderDates(dates, cat);
        return;
      }
      navigate(cat.id, cat.entries[0].date);
    });

    // Chevron click: toggle the dropdown without navigating.
    const toggleBtn = head.querySelector('.cat-toggle');
    toggleBtn.setAttribute('aria-expanded', 'false');
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const willOpen = !wrap.classList.contains('open');
      wrap.classList.toggle('open');
      toggleBtn.setAttribute('aria-expanded', String(willOpen));
      if (willOpen) renderDates(dates, cat);
    });

    wrap.appendChild(head);
    wrap.appendChild(dates);
    container.appendChild(wrap);
  }

  // Render sidebar: one labelled section per NAV_GROUPS group, each holding its
  // category rows in order. A group with a null header renders its rows with no
  // label (the standalone jobs group); a group with a header gets a .nav-label
  // above its rows.
  function renderSidebar() {
    navGroups.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const label = document.createElement('div');
        label.className = 'nav-label';
        label.textContent = group.header;
        navGroups.appendChild(label);
      }
      group.cats.forEach(cat => renderCategoryRow(navGroups, cat));
    });
  }

  // Local date as YYYY-MM-DD (not toISOString — that's UTC and would flip the
  // "stale" check across midnight in BRT/CEST). Used to compare the manifest's
  // build date against "today" for the freshness banner.
  function todayLocalISO() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }

  // "Stand: DD.MM.YYYY" dateline above the home grid, from the manifest's
  // `generated` date. If the manifest wasn't rebuilt today the line goes to the
  // warn accent and appends a hint — so a silently-failed nightly task shows up
  // instead of stale cards masquerading as fresh.
  function renderFreshness() {
    const el = $('#home-stand');
    if (!el) return;
    const gen = M.generated;
    if (!gen || !/^\d{4}-\d{2}-\d{2}$/.test(gen)) { el.hidden = true; return; }
    const stale = gen < todayLocalISO();
    el.classList.toggle('stale', stale);
    const parts = gen.split('-');
    const long = parts[2] + '.' + parts[1] + '.' + parts[0];
    el.innerHTML = `Stand: <span class="stand-date">${long}</span>`
      + (stale ? ' <span class="stand-note">— heute noch nicht aktualisiert</span>' : '');
    el.hidden = false;
  }

  // Build one TL;DR card for a category (the actual TL;DR HTML embedded). Pulled
  // out of renderHome so the grid can interleave group headers between cards.
  function buildCard(cat) {
      const latest = cat.entries[0];
      const card = document.createElement('article');
      card.className = 'tldr-card';
      card.dataset.cat = cat.id;

      const dateStr = latest ? fmtDate(latest.date) : '— · —';
      const headline = headlineFor(latest, currentLang);
      const tldrHtml = tldrFor(cat, currentLang);

      // Fallback flag: the active language has no file for this date, so the
      // card is showing the DE original. Surface a small "DE" chip so the
      // reader knows the snapshot isn't in their chosen language.
      const usesFallback = currentLang !== 'de' && latest
        && Array.isArray(latest.langs) && !latest.langs.includes(currentLang);

      // Three states: full TL;DR loaded · entry exists but TL;DR not yet
      // extracted · no entry at all (the scheduled task hasn't produced one).
      // The third state gets dedicated "out-of-print" treatment.
      let bodyHtml;
      if (tldrHtml) {
        bodyHtml = `<div class="tldr-card-body">${tldrHtml}</div>`;
      } else if (latest) {
        bodyHtml = `<div class="tldr-empty">(TL;DR wird beim nächsten Dashboard-Update extrahiert — bis dahin Headline + Klick öffnet den Brief.)</div>`;
      } else {
        card.classList.add('tldr-card--empty');
        bodyHtml = `
          <div class="tldr-empty-block">
            <span class="tldr-empty-kicker">Heute kein Brief</span>
            <p class="tldr-empty-msg">Der geplante Task hat heute noch keine Ausgabe geliefert.
            Erscheint täglich — morgen wieder hier.</p>
          </div>`;
      }

      card.innerHTML = `
        <header class="tldr-card-head">
          <span class="tile-icon" aria-hidden="true">${cat.icon}</span>
          <span class="tile-name">${cat.label}</span>
          <span class="tile-date">${dateStr}</span>
          ${usesFallback ? '<span class="fallback-flag" title="Keine Übersetzung für diesen Tag — DE-Original">DE</span>' : ''}
        </header>
        ${headline ? `<div class="tldr-card-headline">${headline}</div>` : ''}
        ${bodyHtml}
        ${latest ? '<button class="tldr-read" type="button">Vollständiger Brief →</button>' : ''}
      `;
      // Cap the TL;DR snapshot bullets — long lists make the home grid hard to
      // scan, and the full set is one click away. Trim the overflow and leave a
      // muted "+N weitere" cue so the truncation is honest.
      const bulletList = card.querySelector('.tldr-card-body .tldr ul');
      if (bulletList) {
        const items = Array.from(bulletList.children).filter(el => el.tagName === 'LI');
        const overflow = items.length - HOME_TLDR_BULLET_CAP;
        if (overflow > 0) {
          items.slice(HOME_TLDR_BULLET_CAP).forEach(li => li.remove());
          const more = document.createElement('li');
          more.className = 'tldr-more';
          more.textContent = '+ ' + overflow + ' weitere im Brief';
          bulletList.appendChild(more);
        }
      }
      // Make the whole card keyboard-activatable. Skip non-newsletter cards
      // (empty categories) — they have no navigation target.
      if (latest) {
        card.setAttribute('aria-label', cat.label + ' · ' + dateStr + (headline ? ' · ' + headline : ''));
        addClickAndKey(card, (e) => {
          if (e.target && e.target.closest && e.target.closest('a')) return;
          navigate(cat.id, latest.date);
        });
      }

      // The embedded TL;DR HTML carries plain <a href="https://…"> source
      // links (no target). The dashboard has no <base target="_blank">, so
      // without forcing _blank a click would replace the dashboard window.
      card.querySelectorAll('.tldr-card-body a').forEach(a => {
        a.setAttribute('target', '_blank');
        if (!a.getAttribute('rel')) a.setAttribute('rel', 'noopener noreferrer');
      });

      return card;
  }

  // Render home view: the TL;DR cards, laid out in NAV_GROUPS order with a
  // full-width group header before each headed group (mirrors the sidebar). The
  // header is a grid item spanning all columns so the column flow restarts under
  // each group — same grouping the reader sees in the nav.
  function renderHome() {
    renderFreshness();
    tldrGrid.innerHTML = '';
    groupedCategories().forEach(group => {
      if (group.header) {
        const h = document.createElement('h3');
        h.className = 'tldr-group-head';
        h.textContent = group.header;
        tldrGrid.appendChild(h);
      }
      group.cats.forEach((cat, i) => {
        const card = buildCard(cat);
        // First card of each group starts a fresh visual run — clear its left
        // column rule so the group reads as its own block (the nth-child rules
        // can't track per-group position once headers are interspersed).
        if (i === 0) card.classList.add('group-first');
        tldrGrid.appendChild(card);
      });
    });
  }

  // Brand wordmark → back to the dashboard.
  const brandHome = $('#brand-home');
  if (brandHome) brandHome.addEventListener('click', (e) => { e.preventDefault(); showHome(); });

  // ── Breadcrumb / status path ─────────────────────────────────────────
  // Terminal path shown in the footer status line (`~` or `~/section[/date]`).
  const statusLoc = $('#status-loc');

  function updateBreadcrumb(catId, date) {
    if (!statusLoc) return;
    const cat = catId ? M.categories.find(c => c.id === catId) : null;
    let path = '~';
    if (cat) path += '/' + cat.label + (date ? '/' + fmtDate(date) : '');
    statusLoc.textContent = path;
  }

  // Navigate to a specific newsletter
  function navigate(catId, date) {
    home.classList.remove('show');
    frame.style.display = 'block';
    loading.classList.add('show');
    frame.src = urlFor(catId, date, currentLang);
    // Give the iframe a meaningful AT label so screen-reader users know what
    // they entered (the static title="Newsletter" on the element is generic).
    const cat = M.categories.find(c => c.id === catId);
    frame.title = cat ? cat.label + ' · ' + fmtDate(date) : 'Newsletter';
    frame.onload = () => { loading.classList.remove('show'); };
    frame.onerror = () => { loading.classList.remove('show'); };

    // Update active state in sidebar. Expansion stays user-controlled (the
    // chevron) — clicking a category just loads its latest brief, the list
    // stays hidden. But if the dropdown is already open, re-render it so the
    // calendar jumps to the selected day's month and marks it, and the list
    // keeps its expanded state.
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    $$('.cal-day.current').forEach(el => el.classList.remove('current'));
    const catEl = $('.cat[data-cat="' + catId + '"]');
    if (catEl) {
      catEl.classList.add('active');
      catEl.querySelector('.cat-head')?.setAttribute('aria-current', 'true');
      if (cat && cat.entries.length && catEl.classList.contains('open')) {
        renderDates(catEl.querySelector('.cat-dates'), cat, date);
      }
    }
    const hb = $('#home-btn');
    hb.classList.remove('active');
    hb.removeAttribute('aria-current');

    // Header title picks up the loaded newsletter's accent. The token names
    // line up: --c-economy / --c-economy-text, etc.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--c-' + catId + '-text)');

    updateBreadcrumb(catId, date);

    // Push a real history entry so the browser back button returns to the
    // previous view. Skip when we're already at this URL (handleHash got here
    // from a back/forward — re-pushing would clobber the stack).
    const targetHash = '#' + catId + '/' + date;
    if (location.hash !== targetHash) {
      history.pushState(null, '', targetHash);
    }
  }

  function showHome() {
    frame.style.display = 'none';
    home.classList.add('show');
    $$('.cat').forEach(el => { el.classList.remove('active'); el.querySelector('.cat-head')?.removeAttribute('aria-current'); });
    $$('.cat-date').forEach(el => { el.classList.remove('current'); el.removeAttribute('aria-current'); });
    const hb = $('#home-btn');
    hb.classList.add('active');
    hb.setAttribute('aria-current', 'page');
    // Dashboard's own "house" accent on the home view — black in light
     // mode, cream in dark mode (= var(--fg)). This keeps the header
     // title from defaulting to economy red when no newsletter is loaded;
     // home is its own thing, not a borrowed accent.
    document.documentElement.style.setProperty('--current-accent-text', 'var(--fg)');
    updateBreadcrumb(null);
    // Same back-button logic as navigate(): only push when this is a fresh
    // transition, not when handleHash got here from back/forward.
    if (location.hash !== '#home' && location.hash !== '') {
      history.pushState(null, '', '#home');
    }
  }

  addClickAndKey($('#home-btn'), showHome);

  // Hash-based deep links
  function handleHash() {
    const hash = location.hash.replace(/^#/, '');
    if (!hash || hash === 'home') { showHome(); return; }
    const parts = hash.split('/');
    if (parts.length === 2) {
      const catId = parts[0];
      const date = parts[1];
      const cat = M.categories.find(c => c.id === catId);
      if (!cat) { showHome(); return; }
      if (date === 'latest' && cat.entries.length) {
        navigate(catId, cat.entries[0].date);
      } else {
        navigate(catId, date);
      }
    } else {
      showHome();
    }
  }

  // Animations toggle (footer) — default on; turning off adds html.anim-off
  // (components.css then kills every keyframe + the brand cursor blink) and
  // removes term-anim, persisting "anim"=off/on (read pre-paint in <head>).
  const animToggle = $('#anim-toggle');
  function syncAnim() {
    if (!animToggle) return;
    const on = !document.documentElement.classList.contains('anim-off');
    animToggle.setAttribute('aria-pressed', String(on));
    const box = animToggle.querySelector('.anim-box');
    if (box) box.textContent = on ? '[x]' : '[ ]';
  }
  if (animToggle) {
    syncAnim();
    animToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const turningOff = !html.classList.contains('anim-off');
      if (turningOff) {
        html.classList.add('anim-off');
        html.classList.remove('term-anim');
      } else {
        html.classList.remove('anim-off');
      }
      try { localStorage.setItem('anim', turningOff ? 'off' : 'on'); } catch (_) {}
      syncAnim();
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Language picker — single trigger button with flag + native short
     label, opens an upward dropdown menu with all four locales. The
     trigger updates its flag/label to mirror the active selection;
     menu options use aria-selected for active state.

     Switching re-renders the sidebar + home (so headlines + TL;DR HTML
     refresh) and, if a newsletter is currently loaded in the iframe,
     swaps to the matching language URL via urlFor() (falls back to DE
     when a translation is missing for that date).
     ────────────────────────────────────────────────────────────────── */
  const LANG_DISPLAY = {
    de: { short: 'DE', native: 'Deutsch' },
    en: { short: 'EN', native: 'English' },
    pt: { short: 'PT', native: 'Português' },
    es: { short: 'ES', native: 'Español' },
  };
  const langTrigger = $('#lang-trigger');
  const langMenu    = $('#lang-menu');
  const langOptions = $$('.lang-option');

  function setLangMenuOpen(open) {
    if (!langMenu || !langTrigger) return;
    langMenu.hidden = !open;
    langTrigger.setAttribute('aria-expanded', String(open));
  }

  function applyLang(lang) {
    if (!SUPPORTED_LANGS.includes(lang)) lang = 'de';
    currentLang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
    // Update trigger label + flag.
    if (langTrigger) {
      const d = LANG_DISPLAY[lang] || LANG_DISPLAY.de;
      const flagEl  = langTrigger.querySelector('.dd-flag');
      const labelEl = langTrigger.querySelector('.lang-label-short');
      if (flagEl)  flagEl.className    = 'dd-flag dd-flag-' + lang;
      if (labelEl) labelEl.textContent = d.short;
      langTrigger.title = 'Sprache: ' + d.native + ' (klicken zum Wechseln)';
    }
    // Update aria-selected on options.
    langOptions.forEach(opt => {
      opt.setAttribute('aria-selected', String(opt.dataset.lang === lang));
    });
    // Re-render so headlines + TL;DR pick up the chosen language.
    renderSidebar();
    renderHome();
    // If a specific newsletter is currently open, reload it in the new
    // language (handleHash re-enters navigate() which uses urlFor()).
    if (location.hash && location.hash !== '#home' && location.hash !== '') {
      handleHash();
    }
  }

  if (langTrigger && langMenu) {
    langTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      setLangMenuOpen(langMenu.hidden);
    });
    langOptions.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applyLang(opt.dataset.lang);
        setLangMenuOpen(false);
      });
    });
    // Click-outside + Escape close the menu.
    document.addEventListener('click', (e) => {
      if (!langMenu.hidden && !e.target.closest('.lang-picker')) setLangMenuOpen(false);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !langMenu.hidden) {
        setLangMenuOpen(false);
        langTrigger.focus();
      }
    });
  }

  /* ──────────────────────────────────────────────────────────────────
     Theme toggle — three states (auto / light / dark). Auto follows
     prefers-color-scheme; light and dark force the palette regardless
     of the system setting. Persisted in localStorage.
     ────────────────────────────────────────────────────────────────── */
  const THEME_KEY = 'mb-theme';
  const themeDropdown = $('#theme-dropdown');
  const themeOrder = ['warm', 'green', 'mono', 'paper'];
  const themeLabel = { warm: 'warm', green: 'grün', mono: 'mono', paper: 'paper' };
  function applyTheme(state) {
    document.documentElement.setAttribute('data-theme', state);
    if (themeDropdown) {
      const label = themeDropdown.querySelector('.theme-label');
      if (label) label.textContent = themeLabel[state];
      themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((item) => {
        item.setAttribute('aria-current', item.dataset.themeValue === state ? 'true' : 'false');
      });
    }
    try { localStorage.setItem(THEME_KEY, state); } catch (_) {}
    // Mirror into the iframed content page. Same-origin, so direct DOM
    // access works. The newsletter's lib/tokens.css already defines the
    // warm-dark + light overrides; we just toggle the data-theme attr.
    syncIframeTheme();
  }

  // Set/clear data-theme on the iframe's <html>. Called from applyTheme()
  // and from the iframe's load event so it sticks across navigation.
  function syncIframeTheme() {
    try {
      const doc = frame && frame.contentDocument;
      if (!doc || !doc.documentElement) return;
      const cur = document.documentElement.getAttribute('data-theme');
      if (cur) doc.documentElement.setAttribute('data-theme', cur);
      else     doc.documentElement.removeAttribute('data-theme');
    } catch (_) { /* cross-origin or not yet loaded — ignore */ }
  }
  // Re-apply on every iframe load (navigating between newsletters).
  if (frame) frame.addEventListener('load', syncIframeTheme);
  // Theme dropdown: pick a theme → apply + close. Click-away / Escape also close it.
  if (themeDropdown) {
    themeDropdown.querySelectorAll('.dropdown-item[data-theme-value]').forEach((btn) => {
      addClickAndKey(btn, () => {
        applyTheme(btn.dataset.themeValue);
        themeDropdown.removeAttribute('open');
      });
    });
    document.addEventListener('click', (e) => {
      if (themeDropdown.open && !themeDropdown.contains(e.target)) themeDropdown.removeAttribute('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && themeDropdown.open) themeDropdown.removeAttribute('open');
    });
  }
  try {
    const saved = localStorage.getItem(THEME_KEY);
    applyTheme(saved && themeOrder.includes(saved) ? saved : 'warm');
  } catch (_) { applyTheme('warm'); }

  // Re-render on hashchange (initial load + browser back/forward). Browser
  // back/forward still work via the hash URLs + pushState in navigate()/showHome().
  function handleHashAndSettle() { handleHash(); }

  /* ──────────────────────────────────────────────────────────────────
     Nav-rail minimize toggle. The chevron (#rail-toggle) collapses the rail
     to an icon-only strip on desktop; the FAB (#rail-fab) opens it as a drawer
     on mobile. Collapsed state persists in localStorage (mb-nav-rail).
     ────────────────────────────────────────────────────────────────── */
  const RAIL_KEY = 'mb-nav-rail';
  const appShell  = $('.app-shell');
  const railToggle = $('#rail-toggle');
  const railFab    = $('#rail-fab');

  function setRailCollapsed(collapsed) {
    if (!appShell) return;
    appShell.classList.toggle('rail-collapsed', collapsed);
    if (railToggle) {
      railToggle.setAttribute('aria-expanded', String(!collapsed));
      const glyph = railToggle.querySelector('.rail-toggle-glyph');
      if (glyph) glyph.textContent = collapsed ? '«' : '»';
    }
    try { localStorage.setItem(RAIL_KEY, collapsed ? 'collapsed' : 'expanded'); } catch (_) {}
  }

  if (railToggle) {
    railToggle.addEventListener('click', () => {
      setRailCollapsed(!appShell.classList.contains('rail-collapsed'));
    });
  }
  // Mobile FAB toggles the off-canvas drawer (a separate .rail-open state).
  if (railFab && appShell) {
    railFab.addEventListener('click', () => appShell.classList.toggle('rail-open'));
    // A nav click inside the drawer closes it; click-away closes it too.
    $('#nav-rail')?.addEventListener('click', (e) => {
      if (e.target.closest('.cat-head, .home-btn, .cat-date, .cal-day.has')) {
        appShell.classList.remove('rail-open');
      }
    });
    document.addEventListener('click', (e) => {
      if (appShell.classList.contains('rail-open')
          && !e.target.closest('#nav-rail') && !e.target.closest('#rail-fab')) {
        appShell.classList.remove('rail-open');
      }
    });
  }
  // Restore persisted collapsed state.
  try {
    setRailCollapsed(localStorage.getItem(RAIL_KEY) === 'collapsed');
  } catch (_) { setRailCollapsed(false); }

  // Init — set the lang button states from the restored currentLang (re-renders
  // sidebar/home implicitly), then resolve the initial hash.
  applyLang(currentLang);
  handleHash();
  window.addEventListener('hashchange', handleHashAndSettle);
})();
</script>
</body>
</html>
