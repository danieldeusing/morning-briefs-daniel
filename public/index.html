      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern stand an dieser Stelle ein Vorbehalt: Für ein Coding-Urteil über Kimi K3 fehlten die unabhängigen Zahlen, es gab nur Moonshots eigene Tabelle. Heute sind sie da — und sie fallen deutlicher aus, als ich erwartet hatte. Artificial Analysis misst K3 mit <strong>76,24 auf dem Coding-Index</strong>, dem höchsten Wert im Feld, während dasselbe Modell auf dem allgemeinen Intelligenz-Index nur auf <strong>57,11</strong> und Rang drei bis vier kommt. Das ist keine Rundungsdifferenz, das ist ein Profil: ein Modell, das beim Programmieren vorn liegt und beim Rest hinterherläuft. Ausgerechnet in der Woche, in der Google sein Flaggschiff <em>wegen</em> Coding zurückhält. Daneben: NVIDIA legt eine offene Embedding-Familie vor, und OpenAI verkauft eine Tastatur.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>Kimi K3, Coding-Index 76,24</strong> — führend im Feld, gemessen von Artificial Analysis, nicht von Moonshot. Auf dem allgemeinen Intelligenz-Index nur 57,11 (Rang 3–4). Die Schere ist die Nachricht.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Arena.ai, Frontend-Code: Platz 1</strong> für K3 — vorbei an Claude Fable 5, ein Sprung von Rang 18 (K2.6). Blind-Vergleich durch Nutzer, kein Anbieter-Score.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Moonshots eigene Coding-Zahlen bleiben Anbieter-Zahlen.</strong> DeepSWE 67,5, Terminal-Bench 88,3 — auf gemischten Harnesses erhoben, laut Auswerter selbst nicht direkt vergleichbar.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>NVIDIA Nemotron 3 Embed</strong> (16.07.): offene Embedding-Modelle, 8B auf <strong>Platz 1 der RTEB-Rangliste (78,46 NDCG@10)</strong>, 1B-Variante quantisiert für lokalen Betrieb. Für RAG und Code-Suche einen Test wert.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro: Tag zwei ohne Start.</strong> Eigener Abruf der Google-Modell-Liste heute Morgen — weiterhin kein Eintrag. Nichts Neues, aber die Abwesenheit ist selbst eine Meldung.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Micro</strong>: 230-$-Makropad mit 13 Tasten für Coding-Agenten, Bestellstart 15.07., am 16.07. ausverkauft. Erste Hardware — mitten in einem Rechtsstreit mit Apple.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code 2.1.212</strong> (17.07.): <code>/fork</code> läuft jetzt als Hintergrund-Session, der alte In-Session-Subagent heißt <code>/subtask</code>, und es gibt harte Obergrenzen für Websuchen und Subagenten.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> Copilot CLI seit dem 02.07. ohne datierten Changelog-Eintrag, Cline unverändert bei CLI v3.0.44, Aider weiter kalt. Ruhiges Wochenende bei den Werkzeugen.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern stand an dieser Stelle ein Vorbehalt: Für ein Coding-Urteil über Kimi K3 fehlten die unabhängigen Zahlen, es gab nur Moonshots eigene Tabelle. Heute sind sie da — und sie fallen deutlicher aus, als ich erwartet hatte. Artificial Analysis misst K3 mit <strong>76,24 auf dem Coding-Index</strong>, dem höchsten Wert im Feld, während dasselbe Modell auf dem allgemeinen Intelligenz-Index nur auf <strong>57,11</strong> und Rang drei bis vier kommt. Das ist keine Rundungsdifferenz, das ist ein Profil: ein Modell, das beim Programmieren vorn liegt und beim Rest hinterherläuft. Ausgerechnet in der Woche, in der Google sein Flaggschiff <em>wegen</em> Coding zurückhält. Daneben: NVIDIA legt eine offene Embedding-Familie vor, und OpenAI verkauft eine Tastatur.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>Kimi K3, Coding-Index 76,24</strong> — führend im Feld, gemessen von Artificial Analysis, nicht von Moonshot. Auf dem allgemeinen Intelligenz-Index nur 57,11 (Rang 3–4). Die Schere ist die Nachricht.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Arena.ai, Frontend-Code: Platz 1</strong> für K3 — vorbei an Claude Fable 5, ein Sprung von Rang 18 (K2.6). Blind-Vergleich durch Nutzer, kein Anbieter-Score.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Moonshots eigene Coding-Zahlen bleiben Anbieter-Zahlen.</strong> DeepSWE 67,5, Terminal-Bench 88,3 — auf gemischten Harnesses erhoben, laut Auswerter selbst nicht direkt vergleichbar.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>NVIDIA Nemotron 3 Embed</strong> (16.07.): offene Embedding-Modelle, 8B auf <strong>Platz 1 der RTEB-Rangliste (78,46 NDCG@10)</strong>, 1B-Variante quantisiert für lokalen Betrieb. Für RAG und Code-Suche einen Test wert.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro: Tag zwei ohne Start.</strong> Eigener Abruf der Google-Modell-Liste heute Morgen — weiterhin kein Eintrag. Nichts Neues, aber die Abwesenheit ist selbst eine Meldung.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Micro</strong>: 230-$-Makropad mit 13 Tasten für Coding-Agenten, Bestellstart 15.07., am 16.07. ausverkauft. Erste Hardware — mitten in einem Rechtsstreit mit Apple.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code 2.1.212</strong> (17.07.): <code>/fork</code> läuft jetzt als Hintergrund-Session, der alte In-Session-Subagent heißt <code>/subtask</code>, und es gibt harte Obergrenzen für Websuchen und Subagenten.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll-Call:</strong> Copilot CLI seit dem 02.07. ohne datierten Changelog-Eintrag, Cline unverändert bei CLI v3.0.44, Aider weiter kalt. Ruhiges Wochenende bei den Werkzeugen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday this spot carried a caveat: a coding verdict on Kimi K3 was missing independent numbers — all we had was Moonshot's own table. Today they're in, and they come out sharper than I expected. Artificial Analysis measures K3 at <strong>76.24 on the Coding Index</strong>, the highest score in the field, while the same model lands at only <strong>57.11</strong> on the general Intelligence Index — rank three to four. That's not a rounding difference, it's a profile: a model that leads at programming and lags at everything else. And this in the very week Google is holding back its flagship because of coding. Alongside that: NVIDIA rolls out an open embedding family, and OpenAI sells a keyboard.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>Kimi K3, Coding Index 76.24</strong> — leading the field, measured by Artificial Analysis, not by Moonshot. Only 57.11 on the general Intelligence Index (rank 3–4). The gap is the story.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Arena.ai, Frontend Code: #1</strong> for K3 — passing Claude Fable 5, a jump from rank 18 (K2.6). A blind user comparison, not a vendor score.</li>\n      <li><span class=\"chip\">Heads up</span> <strong>Moonshot's own coding numbers remain vendor numbers.</strong> DeepSWE 67.5, Terminal-Bench 88.3 — collected on mixed harnesses, and per the evaluator itself not directly comparable.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>NVIDIA Nemotron 3 Embed</strong> (Jul 16): open embedding models, the 8B ranks <strong>#1 on the RTEB leaderboard (78.46 NDCG@10)</strong>, with a 1B variant quantized for local use. Worth testing for RAG and code search.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro: day two with no launch.</strong> Our own pull of Google's model list this morning — still no entry. Nothing new, but the absence is itself the story.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Micro</strong>: a $230, 13-key macropad for coding agents, orders opened Jul 15, sold out by Jul 16. First hardware — in the middle of a legal fight with Apple.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Claude Code 2.1.212</strong> (Jul 17): <code>/fork</code> now runs as a background session, the old in-session subagent is now called <code>/subtask</code>, and there are hard caps on web searches and subagents.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Roll call:</strong> Copilot CLI has no dated changelog entry since Jul 2, Cline unchanged at CLI v3.0.44, Aider still cold. A quiet weekend for tooling.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, este espaço trazia uma ressalva: para um veredito sobre código do Kimi K3, faltavam os números independentes — só havia a tabela do próprio Moonshot. Hoje eles chegaram — e são mais nítidos do que eu esperava. A Artificial Analysis mede o K3 em <strong>76,24 no Coding Index</strong>, o valor mais alto do campo comparado, enquanto o mesmo modelo, no índice geral de inteligência, fica em apenas <strong>57,11</strong> e na posição três a quatro. Isso não é diferença de arredondamento, é um perfil: um modelo que lidera em programação e fica para trás no resto. Justo na semana em que o Google segura seu carro-chefe <em>por causa</em> de código. Além disso: a NVIDIA lança uma família aberta de embeddings, e a OpenAI vende um teclado.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>Kimi K3, Coding Index 76,24</strong> — líder do campo, medido pela Artificial Analysis, não pelo Moonshot. No índice geral de inteligência, apenas 57,11 (posição 3–4). A diferença é a notícia.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Arena.ai, Frontend Code: 1º lugar</strong> para o K3 — ultrapassando o Claude Fable 5, um salto a partir da posição 18 (K2.6). Comparação cega feita por usuários, não é score do fornecedor.</li>\n      <li><span class=\"chip\">Atenção</span> <strong>Os números de código do próprio Moonshot continuam sendo números do fornecedor.</strong> DeepSWE 67,5, Terminal-Bench 88,3 — obtidos em harnesses mistos, segundo o próprio avaliador não diretamente comparáveis.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>NVIDIA Nemotron 3 Embed</strong> (16/07): modelos de embedding abertos, o 8B em <strong>1º lugar no ranking RTEB (78,46 NDCG@10)</strong>, variante 1B quantizada para uso local. Vale testar para RAG e busca de código.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro: segundo dia sem lançamento.</strong> Consulta própria à lista de modelos do Google nesta manhã — ainda sem entrada. Nada de novo, mas a ausência já é, em si, uma notícia.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Micro</strong>: macropad de US$ 230 com 13 teclas para agentes de código, início das encomendas em 15/07, esgotado em 16/07. Primeiro hardware — em meio a um litígio com a Apple.</li>\n      <li><span class=\"chip good\">Ferramenta</span> <strong>Claude Code 2.1.212</strong> (17/07): o <code>/fork</code> agora roda como sessão em segundo plano, o antigo subagente na sessão passa a se chamar <code>/subtask</code>, e há novos limites máximos para buscas na web e subagentes.</li>\n      <li><span class=\"chip\">Ferramenta</span> <strong>Chamada de rol:</strong> Copilot CLI sem entrada datada no changelog desde 02/07, Cline segue inalterado na CLI v3.0.44, Aider continua parado. Fim de semana tranquilo entre as ferramentas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer quedó aquí una salvedad: para un veredicto de coding sobre Kimi K3 faltaban las cifras independientes, solo existía la propia tabla de Moonshot. Hoy ya están disponibles — y resultan más contundentes de lo que esperaba. Artificial Analysis mide a K3 con <strong>76,24 en el Coding Index</strong>, el valor más alto del campo comparado, mientras que ese mismo modelo llega apenas a <strong>57,11</strong> en el Intelligence Index general, en el puesto tres a cuatro. No es una diferencia de redondeo, es un perfil: un modelo que va a la cabeza en programación y se queda atrás en el resto. Justo en la semana en que Google retiene a su buque insignia <em>por</em> el coding. Además: NVIDIA presenta una familia abierta de embeddings, y OpenAI vende un teclado.</p>\n    <ul>\n      <li><span class=\"chip hot\">Bench</span> <strong>Kimi K3, Coding Index 76,24</strong> — a la cabeza del campo, medido por Artificial Analysis, no por Moonshot. En el Intelligence Index general, solo 57,11 (puesto 3–4). La brecha es la noticia.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Arena.ai, Frontend Code: puesto 1</strong> para K3 — por delante de Claude Fable 5, un salto desde el puesto 18 (K2.6). Comparación a ciegas por parte de usuarios, no un puntaje del proveedor.</li>\n      <li><span class=\"chip\">Atención</span> <strong>Las cifras de coding propias de Moonshot siguen siendo cifras del proveedor.</strong> DeepSWE 67,5, Terminal-Bench 88,3 — obtenidas con harnesses mixtos, según el propio evaluador no directamente comparables.</li>\n      <li><span class=\"chip good\">OSS</span> <strong>NVIDIA Nemotron 3 Embed</strong> (16/07): modelos de embedding abiertos, el de 8B en el <strong>puesto 1 del ranking RTEB (78,46 NDCG@10)</strong>, variante de 1B cuantizada para uso local. Vale la pena probarlo para RAG y búsqueda de código.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro: segundo día sin lanzamiento.</strong> Consulta propia de la lista de modelos de Google esta mañana — sigue sin aparecer. No hay novedades, pero la ausencia es en sí misma una noticia.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>Codex Micro</strong>: macropad de 230 $ con 13 teclas para agentes de coding, inicio de pedidos el 15/07, agotado el 16/07. Primer hardware — en plena disputa legal con Apple.</li>\n      <li><span class=\"chip good\">Herramienta</span> <strong>Claude Code 2.1.212</strong> (17/07): <code>/fork</code> ahora corre como sesión en segundo plano, el antiguo subagente dentro de la sesión ahora se llama <code>/subtask</code>, y hay límites máximos estrictos para búsquedas web y subagentes.</li>\n      <li><span class=\"chip\">Herramienta</span> <strong>Pase de lista:</strong> Copilot CLI sin entradas fechadas en el changelog desde el 02/07, Cline sigue igual en CLI v3.0.44, Aider sigue frío. Fin de semana tranquilo para las herramientas.</li>\n    </ul></div>"

kt: <strong>4,31 Mrd. $</strong> (2026), CAGR 33,68 %.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Nicht verschoben</strong>: Die neuen Verbote gegen KI-generiertes CSAM und nicht-einvernehmliche Intimbilder greifen am <strong>02.12.2026</strong> — Hochrisiko dagegen erst 02.12.2027.</li>\n      <li><span class=\"chip hot\">Achtung · Reg</span> <strong>Die „offizielle“ Fristen-Seite ist alt</strong>: artificialintelligenceact.eu trägt Stand <strong>01.08.2024</strong> und kennt die Verschiebung vom 16.06.2026 nicht.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>McKinsey</strong>: Reife bei verantwortlicher KI steigt auf <strong>2,3</strong> (von 2,0) — nur rund <strong>ein Drittel</strong> erreicht 3+. n≈500, Dez. 2025 – Jan. 2026.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: ein <strong>Lokalmodell-Tauglichkeits-Audit</strong> und ein <strong>souveräner Dokumenten-Agent</strong> für den Mittelstand nach der Rossum-Übernahme.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">This week's big AI announcements share one thing: what we know about them comes from the vendors themselves. For <strong>ChatGPT Work</strong> — nine days old — there is still not a single independent hands-on test. For <strong>Bonsai 27B</strong> there is one, and it's today's teaching moment: the headline \"retains 90% of performance\" holds up to re-measurement <em>almost</em> — but the average hides that exactly the capabilities you need for automation drop the most. Tool use falls to 82.5%, image understanding to 82.0%. Whoever buys the average buys the wrong number.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>Bonsai 27B re-measured</strong>: independently <strong>89.5%</strong> (1-bit) / <strong>94.6%</strong> (ternary) instead of the advertised 90 / 95% — and the real deployment weighs <strong>~7.2 GB</strong>, not 5.9 GB.</li>\n      <li><span class=\"chip hot\">DEPLOY · Global</span> <strong>The average lies</strong>: math holds at 96.2%, tool use only <strong>82.5%</strong>, vision <strong>82.0%</strong> — for agentic workflows that's the number that matters.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>ChatGPT Work</strong> (since 07/09, GPT-5.6) works across Slack, Teams, Gmail, Drive, SharePoint and Salesforce — still unreviewed by anyone outside OpenAI as of today.</li>\n      <li><span class=\"chip hot\">Heads up · Admin</span> <strong>Opt-out, not opt-in</strong>: for Enterprise/Edu, Work is off during a 2-week preview — after that it <strong>switches on automatically</strong> unless the admin objects. By the calendar: around <strong>07/23</strong>.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Coupa swallows Rossum</strong> (2026-05-12, terms undisclosed) — the best-known independent document-AI vendor is now part of a procurement suite. Market: <strong>$4.31B</strong> (2026), CAGR 33.68%.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>Not delayed</strong>: the new bans on AI-generated CSAM and non-consensual intimate images take effect <strong>2026-12-02</strong> — high-risk obligations, by contrast, only from 2027-12-02.</li>\n      <li><span class=\"chip hot\">Heads up · Reg</span> <strong>The \"official\" deadlines page is stale</strong>: artificialintelligenceact.eu carries a last-updated date of <strong>2024-08-01</strong> and doesn't know about the 2026-06-16 postponement.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>McKinsey</strong>: responsible-AI maturity rises to <strong>2.3</strong> (from 2.0) — only about <strong>one-third</strong> reach 3+. n≈500, Dec. 2025 – Jan. 2026.</li>\n      <li><span class=\"chip good\">twiceD</span> Two ideas: a <strong>local-model fitness audit</strong> and a <strong>sovereign document agent</strong> for mid-market firms, following the Rossum acquisition.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">As grandes novidades de IA desta semana têm algo em comum: tudo o que sabemos sobre elas vem dos próprios fabricantes. No caso do <strong>ChatGPT Work</strong> — com nove dias de vida — não existe até hoje um único teste prático independente. Já o <strong>Bonsai 27B</strong> tem um, e essa é a lição do dia: a manchete \"mantém 90% do desempenho\" resiste <em>quase</em> por completo à remedição — mas a média esconde que justamente as habilidades mais necessárias para automação são as que mais despencam. O uso de ferramentas cai para 82,5%, a compreensão de imagens para 82,0%. Quem compra a média, compra o número errado.</p>\n    <ul>\n      <li><span class=\"chip hot\">IMPLANTAÇÃO · Global</span> <strong>Bonsai 27B remedido</strong>: independente <strong>89,5%</strong> (1 bit) / <strong>94,6%</strong> (ternário) em vez dos 90/95% anunciados — e a implantação real pesa <strong>~7,2 GB</strong>, não 5,9 GB.</li>\n      <li><span class=\"chip hot\">IMPLANTAÇÃO · Global</span> <strong>A média mente</strong>: matemática se mantém em 96,2%, uso de ferramentas só <strong>82,5%</strong>, visão <strong>82,0%</strong> — para fluxos de agentes, esse é o número que importa.</li>\n      <li><span class=\"chip\">IMPLANTAÇÃO · EUA</span> <strong>ChatGPT Work</strong> (desde 09/07, GPT-5.6) opera integrado a Slack, Teams, Gmail, Drive, SharePoint e Salesforce — até hoje sem verificação de ninguém fora da OpenAI.</li>\n      <li><span class=\"chip hot\">Atenção · Admin</span> <strong>Opt-out em vez de opt-in</strong>: em contas Enterprise/Edu, o Work está desligado numa prévia de 2 semanas — depois disso, ele se <strong>ativa automaticamente</strong> se o admin não se opuser. Nas contas: por volta de <strong>23/07</strong>.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Coupa engole a Rossum</strong> (12/05/2026, condições não divulgadas) — a fornecedora independente de IA para documentos mais conhecida agora é parte de uma suíte de compras. Mercado: <strong>US$ 4,31 bi</strong> (2026), CAGR de 33,68%.</li>\n      <li><span class=\"chip\">REGULAÇÃO · UE</span> <strong>Não foi adiado</strong>: as novas proibições contra CSAM gerado por IA e imagens íntimas não consensuais entram em vigor em <strong>02/12/2026</strong> — já o alto risco só em 02/12/2027.</li>\n      <li><span class=\"chip hot\">Atenção · Regulação</span> <strong>A página \"oficial\" de prazos está desatualizada</strong>: artificialintelligenceact.eu traz data de <strong>01/08/2024</strong> e não conhece o adiamento de 16/06/2026.</li>\n      <li><span class=\"chip\">ESTUDO · Global</span> <strong>McKinsey</strong>: maturidade em IA responsável sobe para <strong>2,3</strong> (de 2,0) — só cerca de <strong>um terço</strong> chega a 3+. n≈500, dez/2025 – jan/2026.</li>\n      <li><span class=\"chip good\">twiceD</span> Duas ideias: uma <strong>auditoria de aptidão para modelos locais</strong> e um <strong>agente de documentos soberano</strong> para médias empresas depois da aquisição da Rossum.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Los grandes anuncios de IA de esta semana tienen algo en común: lo que sabemos de ellos viene de los propios fabricantes. Con <strong>ChatGPT Work</strong> — de nueve días de vida — hasta hoy no existe una sola prueba independiente en la práctica. Con <strong>Bonsai 27B</strong> sí hay una, y es la lección del día: el titular \"conserva el 90 % del rendimiento\" resiste <em>casi</em> la nueva medición — pero el promedio esconde que justo las capacidades que se necesitan para automatización son las que más se desploman. El uso de herramientas cae a 82,5 %, la comprensión de imágenes a 82,0 %. Quien compra el promedio, compra la cifra equivocada.</p>\n    <ul>\n      <li><span class=\"chip hot\">DESPLIEGUE · Global</span> <strong>Bonsai 27B, remedido</strong>: de forma independiente, <strong>89,5 %</strong> (1-bit) / <strong>94,6 %</strong> (ternario) en vez del 90 / 95 % anunciado — y el despliegue real pesa <strong>~7,2 GB</strong>, no 5,9 GB.</li>\n      <li><span class=\"chip hot\">DESPLIEGUE · Global</span> <strong>El promedio miente</strong>: matemáticas se mantiene en 96,2 %, uso de herramientas solo <strong>82,5 %</strong>, visión <strong>82,0 %</strong> — para flujos de trabajo con agentes, esa es la cifra que importa.</li>\n      <li><span class=\"chip\">DESPLIEGUE · EE. UU.</span> <strong>ChatGPT Work</strong> (desde el 09/07, GPT-5.6) opera a través de Slack, Teams, Gmail, Drive, SharePoint y Salesforce — hasta hoy sin revisión de nadie fuera de OpenAI.</li>\n      <li><span class=\"chip hot\">Atención · Admin</span> <strong>Exclusión en vez de inclusión voluntaria</strong>: en Enterprise/Edu, Work está apagado durante una vista previa de 2 semanas — después se <strong>activa automáticamente</strong> si el administrador no se opone. Cálculo: alrededor del <strong>23/07</strong>.</li>\n      <li><span class=\"chip\">M&amp;A · Global</span> <strong>Coupa se queda con Rossum</strong> (12/05/2026, condiciones no reveladas) — el proveedor independiente más conocido de IA documental ahora es parte de una suite de compras. Mercado: <strong>4,310 millones de dólares</strong> (2026), CAGR 33,68 %.</li>\n      <li><span class=\"chip\">REGULACIÓN · UE</span> <strong>No se aplazó</strong>: las nuevas prohibiciones contra material de abuso sexual infantil generado por IA e imágenes íntimas no consentidas entran en vigor el <strong>02/12/2026</strong> — el alto riesgo, en cambio, hasta el 02/12/2027.</li>\n      <li><span class=\"chip hot\">Atención · Regulación</span> <strong>La página \"oficial\" de plazos está desactualizada</strong>: artificialintelligenceact.eu tiene fecha de actualización del <strong>01/08/2024</strong> y no registra el aplazamiento del 16/06/2026.</li>\n      <li><span class=\"chip\">ESTUDIO · Global</span> <strong>McKinsey</strong>: la madurez en IA responsable sube a <strong>2,3</strong> (desde 2,0) — solo cerca de <strong>un tercio</strong> alcanza 3 o más. n≈500, dic. 2025 – ene. 2026.</li>\n      <li><span class=\"chip good\">twiceD</span> Dos ideas: una <strong>auditoría de aptitud para modelos locales</strong> y un <strong>agente documental soberano</strong> para la mediana empresa, tras la adquisición de Rossum.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist die Ausschreibungs-Seite der interessante Teil. Sechs offene, stack-passende TED-Ausschreibungen mit Frist zwischen dem 30. Juli und dem 11. August liegen vor — und weil bei allen sechs die Eignungskriterien im Volltext stehen, lässt sich der <strong>Partner-Gap zum ersten Mal als Leiter sortieren</strong>: von der DGUV mit <strong>250 Mitarbeitern im Dreijahresschnitt</strong> (nicht überbrückbar, nur Subunternehmer-Rolle) über zwei ITZBund-Rahmenverträge mit <strong>2,3 Mio. €</strong> bzw. <strong>1 Mio. €</strong> bereichsspezifischem Mindestumsatz und Rheinland-Pfalz mit einer Public-Sector-Referenz-Hürde bis zum CISPA, wo faktisch <em>ein einziges Zertifikat</em> (ISO/IEC 27001) zwischen twiceD und einem eigenständigen Angebot steht — und die Notiz selbst „vergleichbare Nachweise\" zulässt. Ganz unten steht das Leibniz-IWT, dessen gefetchte Eignungsklausel <em>nur drei Referenzen</em> fordert: der erste ✅-Direktfall seit Wochen, mit einem ehrlichen Sternchen. Dazu bestätigen sich zwei unabhängige 2026er-DACH-Rate-Studien gegenseitig bei <strong>90–102 €/h</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Sechs offene Ausschreibungen, nach Gap sortiert</strong>: Leibniz-IWT (3 Referenzen, ✅ tentativ) · CISPA (ISO 27001) · Rheinland-Pfalz (Public-Sector-Referenz) · ITZBund LIS (1 Mio. € + 3 FTE) · ITZBund KESS (2,3 Mio. €) · DGUV (250 FTE). Fristen 30.07. bis 11.08.</li>\n      <li><span class=\"chip good\">Chance</span> <strong>CISPA ist der beste Risiko-Ertrags-Punkt</strong>: Helmholtz-Zentrum für Informationssicherheit, Forschungsinformationssystem, Frist <strong>30.07., 10:00 CEST</strong>. Keine Umsatz-, keine FTE-Schwelle in der Notiz — die einzige harte Anforderung ist ISO/IEC 27001 „oder vergleichbare Nachweise\". Genau dieses „oder\" ist vor einem Angebot zu klären.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Zwei Studien, ein Band</strong>: Freelancer-Kompass 2026 (>5.400 Befragte, 02.07.2026) nennt <strong>95 €/h</strong> Median für IT und <strong>90 €/h</strong> für Software-/Webentwicklung; die freelance.de-Studie 2026 (>3.300 Befragte, Feldzeit 27.01.–02.03.2026) <strong>101,98 €/h</strong> IT-Durchschnitt. Zwei Erhebungen, ein Band: <strong>90–102 €/h</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board auf 127</strong> (gestern 104, <strong>23 neu</strong>): 112 Freelance / 10 Employee / 5 Intriguing, Ø Fit <strong>61,7</strong>, <strong>17</strong> ≥ 80, <strong>37</strong> ≥ 70. Spitze unverändert bei Fit <strong>88</strong> (iSAX, BridgingIT, Keil).</li>\n      <li><span class=\"chip\">Skills</span> <strong>Der Kern verschiebt sich nicht</strong>: Java <strong>55×</strong>, Angular 46×, Spring Boot 41×, AWS 26×, Kubernetes 25×, AI-Integration 19×; <strong>103</strong> von 127 mit Remote-Tag.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>VW-Warnsignal für die Premium-Nische</strong>: Am <strong>09.07.2026</strong> vorgelegtes Restrukturierungsprogramm über bis zu <strong>100.000</strong> von rund 657.000 Stellen und vier Werke. Elf Automotive-/IoT-Listings stehen bei 85–140 €/h* — die Rate hält, das Umfeld nicht.</li>\n      <li><span class=\"chip\">CH</span> <strong>Der eigene Floor liegt über dem CH-Markt</strong>: Die IT-Lohnstudie Schweiz 2026 (itjobs.ch, 21.01.2026) setzt Senior Software Engineer bei <strong>CHF 115.000–145.000</strong> — komplett <em>unter</em> dem ≥ CHF 150 k-Floor der Spur. Nur der KI-Aufschlag reißt ihn.</li>\n      <li><span class=\"chip\">Markt</span> <strong>Die Fachkräfte-Zahl ist älter als sie wirkt</strong>: bitkom führt „mehr als 100.000\" fehlende IT-Fachkräfte — Erhebung <strong>2025</strong>, die oft zitierten „109.000\" aus einer Mitteilung vom <strong>07.08.2025</strong>. Kein 2026er Zählstand.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Datenqualität</span> <strong>12 von 127 datiert, 8 mit echter Rate</strong>: freelancermap (107 der 127 Quellen) gibt für die meisten Projekte kein Posting-Datum aus; jede andere €/h-Angabe trägt ein <code>*</code>, ist also recherchiert. Dazu drei bereits <em>geschlossene</em> Zuschläge (ORF, AOK, Helaba) — nicht bietbar, aber ein Beleg, wo öffentliche Java-Budgets liegen.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Today the tender page is the interesting part. Six open, stack-matching TED tenders with deadlines between July 30 and August 11 are on the table — and because all six list their eligibility criteria in full, the <strong>partner gap can be ranked as a ladder for the first time</strong>: from DGUV with <strong>250 employees averaged over three years</strong> (not bridgeable, subcontractor role only), through two ITZBund framework contracts with <strong>€2.3 million</strong> and <strong>€1 million</strong> sector-specific minimum revenue respectively, and Rhineland-Palatinate with a public-sector-reference hurdle, down to CISPA, where effectively <em>a single certificate</em> (ISO/IEC 27001) stands between twiceD and a standalone bid — and the notice itself allows for \"comparable evidence.\" At the very bottom sits Leibniz-IWT, whose fetched eligibility clause requires <em>only three references</em>: the first ✅ direct case in weeks, with an honest asterisk. On top of that, two independent 2026 DACH rate studies confirm each other at <strong>€90–102/h</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Six open tenders, ranked by gap</strong>: Leibniz-IWT (3 references, ✅ tentative) · CISPA (ISO 27001) · Rhineland-Palatinate (public-sector reference) · ITZBund LIS (€1 million + 3 FTE) · ITZBund KESS (€2.3 million) · DGUV (250 FTE). Deadlines July 30 to August 11.</li>\n      <li><span class=\"chip good\">Opportunity</span> <strong>CISPA is today's best risk-reward point</strong>: Helmholtz Center for Information Security, research information system, deadline <strong>July 30, 10:00 CEST</strong>. No revenue threshold, no FTE threshold in the notice — the only hard requirement is ISO/IEC 27001 \"or comparable evidence.\" That exact \"or\" needs clarifying before any bid.</li>\n      <li><span class=\"chip\">Rate</span> <strong>Two studies, one band</strong>: Freelancer Compass 2026 (>5,400 respondents, July 2, 2026) puts the median at <strong>€95/h</strong> for IT and <strong>€90/h</strong> for software/web development; the freelance.de study 2026 (>3,300 respondents, fieldwork January 27 – March 2, 2026) puts the IT average at <strong>€101.98/h</strong>. Two surveys, one band: <strong>€90–102/h</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board at 127</strong> (yesterday 104, <strong>23 new</strong>): 112 freelance / 10 employee / 5 intriguing, avg. fit <strong>61.7</strong>, <strong>17</strong> ≥ 80, <strong>37</strong> ≥ 70. Top unchanged at fit <strong>88</strong> (iSAX, BridgingIT, Keil).</li>\n      <li><span class=\"chip\">Skills</span> <strong>The core doesn't shift</strong>: Java <strong>55×</strong>, Angular 46×, Spring Boot 41×, AWS 26×, Kubernetes 25×, AI integration 19×; <strong>103</strong> of 127 tagged remote.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>VW warning signal for the premium niche</strong>: A restructuring program presented on <strong>July 9, 2026</strong> covers up to <strong>100,000</strong> of roughly 657,000 jobs and four plants. Eleven automotive/IoT listings sit at €85–140/h* — the rate is holding, the environment isn't.</li>\n      <li><span class=\"chip\">CH</span> <strong>The track's own floor sits above the CH market</strong>: The IT Salary Study Switzerland 2026 (itjobs.ch, January 21, 2026) puts Senior Software Engineer at <strong>CHF 115,000–145,000</strong> — entirely <em>below</em> the track's ≥ CHF 150k floor. Only the AI premium clears it.</li>\n      <li><span class=\"chip\">Market</span> <strong>The skills-gap number is older than it looks</strong>: bitkom lists \"more than 100,000\" missing IT professionals — a <strong>2025</strong> survey; the widely cited \"109,000\" comes from a release dated <strong>August 7, 2025</strong>. Not a fresh 2026 count.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Data Quality</span> <strong>12 of 127 dated, 8 with a stated rate</strong>: freelancermap (107 of the 127 sources) doesn't publish a posting date for most projects; every other €/h figure carries a <code>*</code>, meaning it's researched. Plus three already-<em>closed</em> awards (ORF, AOK, Helaba) — not biddable, but evidence of where public Java budgets sit.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje o lado interessante é o das licitações. Há seis editais abertos da TED, compatíveis com o stack, com prazo entre 30 de julho e 11 de agosto — e, como nos seis os critérios de elegibilidade estão no texto completo, dá para ordenar o <strong>gap de parceria como uma escada</strong> pela primeira vez: da DGUV, com <strong>250 funcionários na média de três anos</strong> (não contornável, só papel de subcontratada), passando por dois contratos-quadro do ITZBund com faturamento mínimo setorial de <strong>2,3 milhões de €</strong> e <strong>1 milhão de €</strong> respectivamente, e Rheinland-Pfalz com uma barreira de referência do setor público, até o CISPA, onde na prática <em>um único certificado</em> (ISO/IEC 27001) separa a twiceD de uma proposta independente — e o próprio edital admite \"comprovações equivalentes\". Bem lá embaixo está o Leibniz-IWT, cuja cláusula de elegibilidade capturada exige <em>apenas três referências</em>: o primeiro caso de encaixe ✅-direto em semanas, com um asterisco honesto. Além disso, dois estudos independentes de taxas DACH para 2026 se confirmam mutuamente na faixa de <strong>90–102 €/h</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Seis licitações abertas, ordenadas por gap</strong>: Leibniz-IWT (3 referências, ✅ tentativo) · CISPA (ISO 27001) · Rheinland-Pfalz (referência do setor público) · ITZBund LIS (1 milhão de € + 3 FTEs) · ITZBund KESS (2,3 milhões de €) · DGUV (250 FTEs). Prazos de 30/07 a 11/08.</li>\n      <li><span class=\"chip good\">Oportunidade</span> <strong>CISPA é o melhor ponto de risco-retorno</strong>: Helmholtz-Zentrum für Informationssicherheit, sistema de informação de pesquisa, prazo <strong>30/07, 10:00 CEST</strong>. Nenhum limiar de faturamento nem de FTE no edital — a única exigência dura é ISO/IEC 27001 \"ou comprovações equivalentes\". É exatamente esse \"ou\" que precisa ser esclarecido antes de uma proposta.</li>\n      <li><span class=\"chip\">Taxa</span> <strong>Dois estudos, uma faixa</strong>: o Freelancer-Kompass 2026 (mais de 5.400 entrevistados, 02/07/2026) aponta mediana de <strong>95 €/h</strong> para TI e <strong>90 €/h</strong> para desenvolvimento de software/web; o estudo freelance.de 2026 (mais de 3.300 entrevistados, período de coleta 27/01–02/03/2026) traz <strong>101,98 €/h</strong> de média para TI. Dois levantamentos, uma faixa: <strong>90–102 €/h</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board cresce para 127</strong> (ontem 104, <strong>23 novas</strong>): 112 Freelance / 10 Employee / 5 Intriguing, Fit médio <strong>61,7</strong>, <strong>17</strong> ≥ 80, <strong>37</strong> ≥ 70. Topo inalterado em Fit <strong>88</strong> (iSAX, BridgingIT, Keil).</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>O núcleo não muda</strong>: Java <strong>55×</strong>, Angular 46×, Spring Boot 41×, AWS 26×, Kubernetes 25×, integração de IA 19×; <strong>103</strong> das 127 com tag remoto.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Sinal de alerta da VW para o nicho premium</strong>: Programa de reestruturação apresentado em <strong>09/07/2026</strong>, prevendo corte de até <strong>100.000</strong> dos cerca de 657.000 postos e quatro fábricas. Onze vagas automotivas/IoT estão na faixa de 85–140 €/h* — a taxa se mantém, o ambiente não.</li>\n      <li><span class=\"chip\">CH</span> <strong>O piso próprio fica acima do mercado suíço</strong>: o IT-Lohnstudie Schweiz 2026 (itjobs.ch, 21/01/2026) situa Senior Software Engineer em <strong>CHF 115.000–145.000</strong> — totalmente <em>abaixo</em> do piso ≥ CHF 150 mil da trilha. Só o adicional de IA rompe esse piso.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>O número de profissionais em falta é mais antigo do que parece</strong>: a bitkom fala em \"mais de 100.000\" profissionais de TI em falta — levantamento de <strong>2025</strong>, o número frequentemente citado de \"109.000\" vem de um comunicado de <strong>07/08/2025</strong>. Não é um dado atualizado de 2026.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Qualidade de dados</span> <strong>12 de 127 datadas, 8 com taxa real</strong>: a freelancermap (107 das 127 fontes) não publica data de postagem para a maioria dos projetos; toda outra indicação de €/h traz um <code>*</code>, ou seja, foi pesquisada. Além disso, três adjudicações já <em>encerradas</em> (ORF, AOK, Helaba) — não é possível concorrer, mas servem de indício de onde estão os orçamentos públicos de Java.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy, la parte interesante es la página de licitaciones. Hay seis licitaciones de TED abiertas y compatibles con el stack, con plazo entre el 30 de julio y el 11 de agosto — y como en las seis los criterios de aptitud están disponibles en texto completo, la <strong>brecha de socio se puede ordenar por primera vez como una escalera</strong>: desde la DGUV con <strong>250 empleados en promedio de tres años</strong> (imposible de salvar, solo como rol de subcontratista), pasando por dos contratos marco de ITZBund con <strong>2.3 millones de €</strong> y <strong>1 millón de €</strong> de facturación mínima específica del sector y Renania-Palatinado con un obstáculo de referencia del sector público, hasta el CISPA, donde de hecho <em>un solo certificado</em> (ISO/IEC 27001) es lo único que separa a twiceD de una oferta propia — y el propio aviso admite \"comprobantes comparables\". Hasta abajo está el Leibniz-IWT, cuya cláusula de aptitud obtenida solo exige <em>tres referencias</em>: el primer caso ✅ directo en semanas, con un asterisco honesto. Además, dos estudios independientes de tarifas DACH de 2026 se confirman mutuamente en <strong>90–102 €/h</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">TED</span> <strong>Seis licitaciones abiertas, ordenadas por brecha</strong>: Leibniz-IWT (3 referencias, ✅ tentativo) · CISPA (ISO 27001) · Renania-Palatinado (referencia del sector público) · ITZBund LIS (1 millón de € + 3 FTE) · ITZBund KESS (2.3 millones de €) · DGUV (250 FTE). Plazos del 30/07 al 11/08.</li>\n      <li><span class=\"chip good\">Oportunidad</span> <strong>El CISPA es el mejor punto de riesgo-beneficio</strong>: Helmholtz-Zentrum für Informationssicherheit, sistema de información de investigación, plazo <strong>30/07, 10:00 CEST</strong>. Sin umbral de facturación ni de FTE en el aviso — el único requisito duro es ISO/IEC 27001 \"o comprobantes comparables\". Justo ese \"o\" es lo que hay que aclarar antes de ofertar.</li>\n      <li><span class=\"chip\">Tarifa</span> <strong>Dos estudios, una franja</strong>: el Freelancer-Kompass 2026 (más de 5,400 encuestados, 02/07/2026) señala una mediana de <strong>95 €/h</strong> para TI y <strong>90 €/h</strong> para desarrollo de software/web; el estudio freelance.de 2026 (más de 3,300 encuestados, campo del 27/01 al 02/03/2026) mide <strong>101.98 €/h</strong> de promedio de TI. Dos encuestas, una sola franja: <strong>90–102 €/h</strong>.</li>\n      <li><span class=\"chip\">twiceD</span> <strong>Board en 127</strong> (ayer 104, <strong>23 nuevas</strong>): 112 Freelance / 10 Employee / 5 Intriguing, Fit promedio <strong>61.7</strong>, <strong>17</strong> ≥ 80, <strong>37</strong> ≥ 70. La cima sigue igual con Fit <strong>88</strong> (iSAX, BridgingIT, Keil).</li>\n      <li><span class=\"chip\">Habilidades</span> <strong>El núcleo no se mueve</strong>: Java <strong>55×</strong>, Angular 46×, Spring Boot 41×, AWS 26×, Kubernetes 25×, integración de IA 19×; <strong>103</strong> de 127 con etiqueta remoto.</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>Señal de alerta de VW para el nicho premium</strong>: programa de reestructuración presentado el <strong>09/07/2026</strong>, sobre hasta <strong>100,000</strong> de unos 657,000 puestos y cuatro plantas. Once vacantes de automotriz/IoT se ubican en 85–140 €/h* — la tarifa se sostiene, el entorno no.</li>\n      <li><span class=\"chip\">CH</span> <strong>El propio piso queda por encima del mercado suizo</strong>: la IT-Lohnstudie Schweiz 2026 (itjobs.ch, 21/01/2026) fija a Senior Software Engineer en <strong>CHF 115,000–145,000</strong> — totalmente <em>por debajo</em> del piso de ≥ CHF 150 mil de la vía. Solo el sobreprecio de IA lo rompe.</li>\n      <li><span class=\"chip\">Mercado</span> <strong>La cifra de escasez de talento es más vieja de lo que parece</strong>: bitkom reporta \"más de 100,000\" profesionales de TI faltantes — encuesta de <strong>2025</strong>, y el dato \"109,000\", tan citado, proviene de un comunicado del <strong>07/08/2025</strong>. No es un dato de conteo de 2026.<sup>[3]</sup></li>\n      <li><span class=\"chip\">Calidad de datos</span> <strong>12 de 127 con fecha, 8 con tarifa real</strong>: freelancermap (107 de las 127 fuentes) no publica fecha de publicación para la mayoría de los proyectos; cualquier otra cifra en €/h lleva un <code>*</code>, es decir, es investigada. A esto se suman tres adjudicaciones ya <em>cerradas</em> (ORF, AOK, Helaba) — no ofertables, pero un indicio de dónde están los presupuestos públicos de Java.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist das Wochenende, auf das vier Jahre zulaufen. Heute Abend spielen Frankreich und England um Platz 3 in Miami Gardens, morgen steigt im MetLife Stadium das Finale: Spanien — Europameister-Generation auf dem Höhepunkt — gegen ein Argentinien, das Messi noch einmal auf die größte Bühne getragen hat. Aus deutscher Sicht ist es ein Turnier zum Vergessen: Aus im Sechzehntelfinale gegen Paraguay, Nagelsmann weg, Klopp verhandelt. Und während Europa Finale schaut, läuft in Brasilien der Alltag schon wieder — der Brasileirão ist seit Donnerstag zurück, Palmeiras führt.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Finale morgen</strong>: Spanien – Argentinien, So. 19.07., <strong>21:00 MESZ / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (NJ).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Platz 3</strong>: Frankreich – England, Sa. 18.07., <strong>23:00 MESZ / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens.</li>\n      <li><span class=\"chip\">WM</span> <strong>Halbfinals</strong>: Spanien 2:0 Frankreich (14.07., Arlington/Dallas), Argentinien 2:1 England n.V. (15.07., Atlanta).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Aus am 29.06.</strong>: 1:1 n.V., 3:4 i.E. gegen Paraguay im Sechzehntelfinale — erstes verlorenes WM-Elfmeterschießen der DFB-Geschichte.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann-Vertrag am 03.07. aufgelöst</strong>, auf eigenen Wunsch. Klopp ist im Gespräch — <em>nicht</em> unterschrieben.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Manzambi für kolportierte 60 Mio. €</strong> fest zu Aston Villa (Vertrag bis 30.06.2030), verkündet 17.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Höfler beendet die Karriere</strong> und geht in die zweite Mannschaft; Rihito Yamamoto (24) kommt von St. Truiden.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart erst Fr. 28.08.</strong> (Bayern – Stuttgart, 20:30 MESZ / 15:30 BRT) — eine Woche später wegen der WM.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasileirão wieder da</strong>: Palmeiras führt mit 41 Punkten aus 18 Spielen, Flamengo lauert mit einem Spiel weniger.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist das Wochenende, auf das vier Jahre zulaufen. Heute Abend spielen Frankreich und England um Platz 3 in Miami Gardens, morgen steigt im MetLife Stadium das Finale: Spanien — Europameister-Generation auf dem Höhepunkt — gegen ein Argentinien, das Messi noch einmal auf die größte Bühne getragen hat. Aus deutscher Sicht ist es ein Turnier zum Vergessen: Aus im Sechzehntelfinale gegen Paraguay, Nagelsmann weg, Klopp verhandelt. Und während Europa Finale schaut, läuft in Brasilien der Alltag schon wieder — der Brasileirão ist seit Donnerstag zurück, Palmeiras führt.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Finale morgen</strong>: Spanien – Argentinien, So. 19.07., <strong>21:00 MESZ / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (NJ).</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Heute Platz 3</strong>: Frankreich – England, Sa. 18.07., <strong>23:00 MESZ / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens.</li>\n      <li><span class=\"chip\">WM</span> <strong>Halbfinals</strong>: Spanien 2:0 Frankreich (14.07., Arlington/Dallas), Argentinien 2:1 England n.V. (15.07., Atlanta).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Aus am 29.06.</strong>: 1:1 n.V., 3:4 i.E. gegen Paraguay im Sechzehntelfinale — erstes verlorenes WM-Elfmeterschießen der DFB-Geschichte.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann-Vertrag am 03.07. aufgelöst</strong>, auf eigenen Wunsch. Klopp ist im Gespräch — <em>nicht</em> unterschrieben.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Manzambi für kolportierte 60 Mio. €</strong> fest zu Aston Villa (Vertrag bis 30.06.2030), verkündet 17.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Höfler beendet die Karriere</strong> und geht in die zweite Mannschaft; Rihito Yamamoto (24) kommt von St. Truiden.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart erst Fr. 28.08.</strong> (Bayern – Stuttgart, 20:30 MESZ / 15:30 BRT) — eine Woche später wegen der WM.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasileirão wieder da</strong>: Palmeiras führt mit 41 Punkten aus 18 Spielen, Flamengo lauert mit einem Spiel weniger.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This is the weekend four years have been building toward. Tonight France and England play for third place in Miami Gardens, tomorrow the final kicks off at MetLife Stadium: Spain — a European-champion generation at its peak — against an Argentina that Messi has carried onto the biggest stage one more time. From a German perspective, it's a tournament to forget: eliminated in the round of 32 against Paraguay, Nagelsmann gone, Klopp in negotiations. And while Europe watches the final, everyday life is already back underway in Brazil — the Brasileirão has been back since Thursday, with Palmeiras in the lead.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Final tomorrow</strong>: Spain – Argentina, Sun. 19.07., <strong>21:00 CEST / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (NJ).</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Third place today</strong>: France – England, Sat. 18.07., <strong>23:00 CEST / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Semifinals</strong>: Spain 2-0 France (14.07., Arlington/Dallas), Argentina 2-1 England a.e.t. (15.07., Atlanta).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Out on 29.06.</strong>: 1-1 a.e.t., 3-4 on penalties against Paraguay in the round of 32 — the first World Cup penalty shootout Germany has ever lost.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Nagelsmann's contract terminated on 03.07.</strong>, at his own request. Klopp is in talks — <em>not</em> signed.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Manzambi permanently to Aston Villa for a reported €60m</strong> (contract until 30.06.2030), announced 17.07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Höfler retires</strong> and joins the second team; Rihito Yamamoto (24) arrives from St. Truiden.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season doesn't start until Fri. 28.08.</strong> (Bayern – Stuttgart, 20:30 CEST / 15:30 BRT) — a week later because of the World Cup.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasileirão back</strong>: Palmeiras leads with 41 points from 18 matches, Flamengo lurking with a game in hand.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É o fim de semana para o qual quatro anos de espera convergem. Hoje à noite, França e Inglaterra decidem o terceiro lugar em Miami Gardens; amanhã, no MetLife Stadium, acontece a final: a Espanha — geração campeã europeia em seu auge — contra uma Argentina que carregou Messi mais uma vez até o maior palco do futebol. Do ponto de vista alemão, é um torneio para esquecer: eliminação nos dezesseis avos de final contra o Paraguai, Nagelsmann fora, Klopp em negociação. E enquanto a Europa assiste à final, no Brasil a rotina já voltou — o Brasileirão está de volta desde quinta-feira, com o Palmeiras na ponta.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Final amanhã</strong>: Espanha x Argentina, dom. 19/07, <strong>21h00 (horário da Alemanha) / 16h00 (horário de Brasília)</strong>, MetLife Stadium, East Rutherford (NJ).</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Hoje, disputa do 3º lugar</strong>: França x Inglaterra, sáb. 18/07, <strong>23h00 (horário da Alemanha) / 18h00 (horário de Brasília)</strong>, Hard Rock Stadium, Miami Gardens.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Semifinais</strong>: Espanha 2x0 França (14/07, Arlington/Dallas), Argentina 2x1 Inglaterra (prorrogação, 15/07, Atlanta).</li>\n      <li><span class=\"chip hot\">Alemanha</span> <strong>Eliminação em 29/06</strong>: 1x1 na prorrogação, 3x4 nos pênaltis contra o Paraguai, nos dezesseis avos de final — primeira disputa de pênaltis perdida da história da seleção alemã em Copas.</li>\n      <li><span class=\"chip\">Alemanha</span> <strong>Contrato de Nagelsmann rescindido em 03/07</strong>, a pedido próprio. Klopp está nas conversas — <em>ainda não</em> assinou.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Manzambi vendido por 60 milhões de euros noticiados</strong> em definitivo ao Aston Villa (contrato até 30/06/2030), anunciado em 17/07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Höfler encerra a carreira</strong> e vai para o time B; Rihito Yamamoto (24) chega do St. Truiden.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Início da temporada só na sex. 28/08</strong> (Bayern x Stuttgart, 20h30 horário da Alemanha / 15h30 horário de Brasília) — uma semana mais tarde por causa da Copa.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Brasileirão de volta</strong>: Palmeiras lidera com 41 pontos em 18 jogos, Flamengo espreita com um jogo a menos.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es el fin de semana hacia el que han apuntado cuatro años. Esta noche, Francia e Inglaterra juegan por el tercer lugar en Miami Gardens; mañana llega la final en el MetLife Stadium: España —generación campeona de Europa en su punto más alto— contra una Argentina a la que Messi volvió a llevar al escenario más grande. Desde la óptica alemana es un torneo para olvidar: eliminación en dieciseisavos de final ante Paraguay, Nagelsmann fuera, Klopp en negociaciones. Y mientras Europa mira la final, en Brasil la rutina ya volvió — el Brasileirão está de vuelta desde el jueves, con Palmeiras al frente.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Final mañana</strong>: España – Argentina, dom. 19/07, <strong>21:00 CEST / 16:00 BRT</strong>, MetLife Stadium, East Rutherford (Nueva Jersey).</li>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Hoy, tercer lugar</strong>: Francia – Inglaterra, sáb. 18/07, <strong>23:00 CEST / 18:00 BRT</strong>, Hard Rock Stadium, Miami Gardens.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Semifinales</strong>: España 2-0 Francia (14/07, Arlington/Dallas), Argentina 2-1 Inglaterra tras tiempo extra (15/07, Atlanta).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Eliminados el 29/06</strong>: 1-1 tras tiempo extra, 3-4 en penales ante Paraguay en dieciseisavos de final — la primera tanda de penales que Alemania pierde en la historia de los Mundiales.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Contrato de Nagelsmann rescindido el 03/07</strong>, por decisión propia. Klopp está en conversaciones — <em>no</em> ha firmado.</li>\n      <li><span class=\"chip hot\">Freiburg</span> <strong>Manzambi, por unos reportados 60 millones de €</strong>, traspaso definitivo al Aston Villa (contrato hasta el 30/06/2030), anunciado el 17/07.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Höfler pone fin a su carrera</strong> y pasa al segundo equipo; Rihito Yamamoto (24) llega procedente del St. Truiden.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Arranque de temporada hasta el vie. 28/08</strong> (Bayern – Stuttgart, 20:30 CEST / 15:30 BRT) — una semana más tarde por el Mundial.</li>\n      <li><span class=\"chip good\">BRA</span> <strong>El Brasileirão está de vuelta</strong>: Palmeiras lidera con 41 puntos en 18 partidos, Flamengo acecha con un partido menos.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Samstag, der 18. Juli — <strong>Quali-Tag in Spa</strong>. Um <strong>11:00 BRT</strong> (16:00 MESZ) fällt die Startaufstellung für den Belgien-GP, davor läuft FP3 um 07:30 BRT. Die Nachricht des Tages kommt aber nicht von der Strecke, sondern aus einem ESPN-Stück von heute früh: Verstappens leistungsabhängige <strong>Ausstiegsklausel ist jetzt bestätigt auslösbar</strong> — Platz zwei bis zur Sommerpause ist rechnerisch nicht mehr erreichbar. Der neue, entscheidende Halbsatz darin: Er muss Red Bull seine Entscheidung <strong>erst im Oktober</strong> mitteilen. Die sportliche Frage ist damit beantwortet, die menschliche bleibt drei Monate lang offen — und in genau dieses Vakuum wird der Rest der Saison Gerüchte gießen. Daneben, weit weg von der Formel 1: Die Langstrecken-WM hat nach São Paulo ihre erste echte Titel-Spannung des Jahres, und die MotoGP geht mit dem engsten Fünfkampf ihrer modernen Geschichte in die Pause.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · heute</span> <strong>Qualifying Spa 16:00 MESZ / 11:00 BRT</strong>, davor FP3 12:30 MESZ / 07:30 BRT. Rennen morgen 15:00 MESZ / 10:00 BRT über <strong>44 Runden</strong>, kein Sprint.</li>\n      <li><span class=\"chip hot\">Fahrermarkt</span> <strong>Klausel bestätigt auslösbar</strong>: ESPN (heute, 18.07.) — P2 bis zur Sommerpause ist mathematisch unmöglich, die Bedingung ist damit erfüllt. <strong>Frist zur Mitteilung: Oktober.</strong></li>\n      <li><span class=\"chip\">Fahrermarkt · Grenze</span> <strong>Was das nicht heißt</strong>: Es gibt keine Aussage von Verstappen, Red Bull oder McLaren über 2027. „Darf aussteigen&ldquo; ist nicht „steigt aus&ldquo;.</li>\n      <li><span class=\"chip\">F1 · Tabellen</span> <strong>Antonelli 179</strong> vor Russell 154 und Hamilton 147 — Stand nach Runde 9 (Silverstone, 05.07.), Spa ist Runde 10 und läuft erst. Mercedes führt die Konstrukteure mit <strong>333</strong> vor Ferrari 255.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132, BMW 127</strong> nach dem BMW-Sieg in São Paulo (12.07.) — fünf Punkte bei <strong>vier</strong> verbleibenden Läufen (Austin, Fuji, Katar, Bahrain).</li>\n      <li><span class=\"chip\">Korrektur</span> <strong>Vier statt fünf Läufe</strong>: Wir schrieben gestern „fünf Rennen offen&ldquo;. fiawec.com nennt heute ausdrücklich vier und listet sie einzeln auf — wir korrigieren auf vier.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Fünf Fahrer, 24 Punkte</strong> — laut motogp.com (16.07.) der engste Fünfkampf der modernen Ära. Die Einzelwerte stehen unter Quellen-Vorbehalt, siehe Kasten.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nur Formel 1 dieses Wochenende</strong>: WEC pausiert bis Austin (04.–06.09.), MotoGP bis Silverstone im August. Formel-E-Finale in London am 15.–16.08.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Samstag, der 18. Juli — <strong>Quali-Tag in Spa</strong>. Um <strong>11:00 BRT</strong> (16:00 MESZ) fällt die Startaufstellung für den Belgien-GP, davor läuft FP3 um 07:30 BRT. Die Nachricht des Tages kommt aber nicht von der Strecke, sondern aus einem ESPN-Stück von heute früh: Verstappens leistungsabhängige <strong>Ausstiegsklausel ist jetzt bestätigt auslösbar</strong> — Platz zwei bis zur Sommerpause ist rechnerisch nicht mehr erreichbar. Der neue, entscheidende Halbsatz darin: Er muss Red Bull seine Entscheidung <strong>erst im Oktober</strong> mitteilen. Die sportliche Frage ist damit beantwortet, die menschliche bleibt drei Monate lang offen — und in genau dieses Vakuum wird der Rest der Saison Gerüchte gießen. Daneben, weit weg von der Formel 1: Die Langstrecken-WM hat nach São Paulo ihre erste echte Titel-Spannung des Jahres, und die MotoGP geht mit dem engsten Fünfkampf ihrer modernen Geschichte in die Pause.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · heute</span> <strong>Qualifying Spa 16:00 MESZ / 11:00 BRT</strong>, davor FP3 12:30 MESZ / 07:30 BRT. Rennen morgen 15:00 MESZ / 10:00 BRT über <strong>44 Runden</strong>, kein Sprint.</li>\n      <li><span class=\"chip hot\">Fahrermarkt</span> <strong>Klausel bestätigt auslösbar</strong>: ESPN (heute, 18.07.) — P2 bis zur Sommerpause ist mathematisch unmöglich, die Bedingung ist damit erfüllt. <strong>Frist zur Mitteilung: Oktober.</strong></li>\n      <li><span class=\"chip\">Fahrermarkt · Grenze</span> <strong>Was das nicht heißt</strong>: Es gibt keine Aussage von Verstappen, Red Bull oder McLaren über 2027. „Darf aussteigen&ldquo; ist nicht „steigt aus&ldquo;.</li>\n      <li><span class=\"chip\">F1 · Tabellen</span> <strong>Antonelli 179</strong> vor Russell 154 und Hamilton 147 — Stand nach Runde 9 (Silverstone, 05.07.), Spa ist Runde 10 und läuft erst. Mercedes führt die Konstrukteure mit <strong>333</strong> vor Ferrari 255.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132, BMW 127</strong> nach dem BMW-Sieg in São Paulo (12.07.) — fünf Punkte bei <strong>vier</strong> verbleibenden Läufen (Austin, Fuji, Katar, Bahrain).</li>\n      <li><span class=\"chip\">Korrektur</span> <strong>Vier statt fünf Läufe</strong>: Wir schrieben gestern „fünf Rennen offen&ldquo;. fiawec.com nennt heute ausdrücklich vier und listet sie einzeln auf — wir korrigieren auf vier.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Fünf Fahrer, 24 Punkte</strong> — laut motogp.com (16.07.) der engste Fünfkampf der modernen Ära. Die Einzelwerte stehen unter Quellen-Vorbehalt, siehe Kasten.</li>\n      <li><span class=\"chip\">Kalender</span> <strong>Nur Formel 1 dieses Wochenende</strong>: WEC pausiert bis Austin (04.–06.09.), MotoGP bis Silverstone im August. Formel-E-Finale in London am 15.–16.08.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Saturday, July 18 — <strong>qualifying day in Spa</strong>. The grid for the Belgian GP is set at <strong>11:00 BRT</strong> (16:00 CEST), with FP3 running beforehand at 07:30 BRT. But today's real news doesn't come from the track — it comes from an ESPN piece published early this morning: Verstappen's performance-based <strong>exit clause is now confirmed triggerable</strong> — finishing second by the summer break is mathematically out of reach. The new, decisive detail in the story: he doesn't have to tell Red Bull his decision <strong>until October</strong>. So the sporting question is answered, while the human one stays open for three more months — and the rest of the season will pour rumors straight into that vacuum. Elsewhere, far from Formula 1: the endurance world championship has its first real title tension of the year after São Paulo, and MotoGP heads into its break with the tightest five-way fight in its modern history.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · today</span> <strong>Qualifying in Spa 16:00 CEST / 11:00 BRT</strong>, with FP3 beforehand at 12:30 CEST / 07:30 BRT. Race tomorrow at 15:00 CEST / 10:00 BRT over <strong>44 laps</strong>, no sprint.</li>\n      <li><span class=\"chip hot\">Driver market</span> <strong>Clause confirmed triggerable</strong>: ESPN (today, 07/18) — P2 by the summer break is mathematically impossible, so the condition is met. <strong>Deadline to notify: October.</strong></li>\n      <li><span class=\"chip\">Driver market · caveat</span> <strong>What this doesn't mean</strong>: there is no statement from Verstappen, Red Bull, or McLaren about 2027. \"Allowed to leave\" is not \"is leaving.\"</li>\n      <li><span class=\"chip\">F1 · standings</span> <strong>Antonelli 179</strong> ahead of Russell 154 and Hamilton 147 — standings after round 9 (Silverstone, 07/05); Spa is round 10 and is only just underway. Mercedes leads the constructors with <strong>333</strong> ahead of Ferrari's 255.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132, BMW 127</strong> after BMW's win in São Paulo (07/12) — five points apart with <strong>four</strong> rounds remaining (Austin, Fuji, Qatar, Bahrain).</li>\n      <li><span class=\"chip\">Correction</span> <strong>Four races, not five</strong>: Yesterday we wrote \"five races remaining.\" fiawec.com today explicitly names four and lists them individually — we're correcting to four.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Five riders, 24 points</strong> — per motogp.com (07/16), the tightest five-way fight of the modern era. The individual point totals carry a source caveat, see box.</li>\n      <li><span class=\"chip\">Calendar</span> <strong>Formula 1 only this weekend</strong>: WEC is on break until Austin (09/04–06), MotoGP until Silverstone in August. Formula E's finale is in London on 08/15–16.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é sábado, 18 de julho — <strong>dia de classificação em Spa</strong>. Às <strong>11h00 BRT</strong> (16h00 CEST) sai o grid de largada para o GP da Bélgica; antes disso, o TL3 acontece às 07h30 BRT. Mas a notícia do dia não vem da pista, e sim de uma matéria da ESPN publicada hoje de manhã: a cláusula de saída de Verstappen, condicionada a desempenho, agora está <strong>confirmada como acionável</strong> — o segundo lugar até a pausa de verão já não é matematicamente alcançável. O trecho novo e decisivo: ele só precisa comunicar sua decisão à Red Bull <strong>em outubro</strong>. A questão esportiva está respondida; a humana segue em aberto por três meses — e é exatamente nesse vácuo que o resto da temporada vai despejar rumores. Ao lado, bem longe da Fórmula 1: o Mundial de Endurance tem, depois de São Paulo, sua primeira disputa real pelo título na temporada, e a MotoGP entra na pausa com a disputa mais acirrada entre cinco pilotos de sua história moderna.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · hoje</span> <strong>Classificação em Spa 16h00 CEST / 11h00 BRT</strong>, antes disso TL3 12h30 CEST / 07h30 BRT. Corrida amanhã 15h00 CEST / 10h00 BRT em <strong>44 voltas</strong>, sem sprint.</li>\n      <li><span class=\"chip hot\">Mercado de pilotos</span> <strong>Cláusula confirmada como acionável</strong>: ESPN (hoje, 18/07) — o P2 até a pausa de verão é matematicamente impossível, e a condição está, portanto, cumprida. <strong>Prazo para comunicar: outubro.</strong></li>\n      <li><span class=\"chip\">Mercado de pilotos · limite</span> <strong>O que isso não significa</strong>: não há nenhuma declaração de Verstappen, Red Bull ou McLaren sobre 2027. \"Pode sair\" não é o mesmo que \"vai sair\".</li>\n      <li><span class=\"chip\">F1 · classificações</span> <strong>Antonelli 179</strong> à frente de Russell (154) e Hamilton (147) — situação após a rodada 9 (Silverstone, 05/07), Spa é a rodada 10 e ainda está em andamento. A Mercedes lidera os construtores com <strong>333</strong>, à frente da Ferrari (255).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132, BMW 127</strong> depois da vitória da BMW em São Paulo (12/07) — cinco pontos de diferença, com <strong>quatro</strong> etapas restantes (Austin, Fuji, Catar, Barein).</li>\n      <li><span class=\"chip\">Correção</span> <strong>Quatro etapas, não cinco</strong>: ontem escrevemos \"cinco corridas restantes\". Hoje, o fiawec.com cita explicitamente quatro e as lista uma a uma — corrigimos para quatro.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Cinco pilotos, 24 pontos</strong> — segundo o motogp.com (16/07), a disputa mais acirrada entre cinco pilotos da era moderna. Os valores individuais têm ressalva de fonte, veja o quadro.</li>\n      <li><span class=\"chip\">Calendário</span> <strong>Só Fórmula 1 neste fim de semana</strong>: o WEC está de pausa até Austin (04–06/09), a MotoGP até Silverstone em agosto. Final da Fórmula E em Londres em 15–16/08.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es sábado 18 de julio — <strong>día de clasificación en Spa</strong>. A las <strong>11:00 BRT</strong> (16:00 CEST) se define la parrilla de salida para el GP de Bélgica; antes corre la FP3 a las 07:30 BRT. Pero la noticia del día no viene de la pista, sino de un artículo de ESPN publicado esta mañana: la cláusula de salida de Verstappen, condicionada al rendimiento, <strong>ya está confirmada como activable</strong> — el segundo puesto antes de la pausa de verano es matemáticamente inalcanzable. El dato nuevo y decisivo: no tiene que comunicarle su decisión a Red Bull <strong>sino hasta octubre</strong>. La pregunta deportiva ya tiene respuesta; la humana sigue abierta durante tres meses — y en ese vacío el resto de la temporada verterá rumores. Aparte, lejos de la Fórmula 1: el Mundial de Resistencia tiene, tras São Paulo, su primera verdadera tensión de título del año, y la MotoGP entra en su pausa con la pelea a cinco más cerrada de su historia moderna.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1 · hoy</span> <strong>Clasificación en Spa 16:00 CEST / 11:00 BRT</strong>, antes FP3 12:30 CEST / 07:30 BRT. Carrera mañana 15:00 CEST / 10:00 BRT, <strong>44 vueltas</strong>, sin sprint.</li>\n      <li><span class=\"chip hot\">Mercado de pilotos</span> <strong>Cláusula confirmada como activable</strong>: ESPN (hoy, 18.07.) — el P2 antes de la pausa de verano es matemáticamente imposible, así que se cumple la condición. <strong>Plazo para notificar: octubre.</strong></li>\n      <li><span class=\"chip\">Mercado de pilotos · límite</span> <strong>Lo que esto NO significa</strong>: no hay ninguna declaración de Verstappen, Red Bull ni McLaren sobre 2027. \"Poder salir\" no es lo mismo que \"va a salir\".</li>\n      <li><span class=\"chip\">F1 · clasificaciones</span> <strong>Antonelli 179</strong> por delante de Russell 154 y Hamilton 147 — estado tras la ronda 9 (Silverstone, 05.07.), Spa es la ronda 10 y recién comienza. Mercedes lidera constructores con <strong>333</strong> frente a Ferrari 255.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132, BMW 127</strong> tras la victoria de BMW en São Paulo (12.07.) — cinco puntos con <strong>cuatro</strong> carreras restantes (Austin, Fuji, Catar, Baréin).</li>\n      <li><span class=\"chip\">Corrección</span> <strong>Cuatro carreras, no cinco</strong>: ayer escribimos \"quedan cinco carreras\". fiawec.com hoy dice explícitamente cuatro y las enumera una por una — corregimos a cuatro.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Cinco pilotos, 24 puntos</strong> — según motogp.com (16.07.), la pelea a cinco más cerrada de la era moderna. Las cifras individuales llevan reserva de fuente, ver recuadro.</li>\n      <li><span class=\"chip\">Calendario</span> <strong>Solo Fórmula 1 este fin de semana</strong>: la WEC está en pausa hasta Austin (04.–06.09.), la MotoGP hasta Silverstone en agosto. Final de la Fórmula E en Londres el 15.–16.08.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist der Tag, auf den die Woche zulief. Das FIML in Londrina spielt seinen vorletzten Tag fast komplett draußen und gratis, und ausgerechnet an derselben Avenida steht zwischen 9 und 15 Uhr ein Grippeimpf-Drive-thru — Impfung aus dem Auto heraus, ohne Wartesaal, ohne Baby im Gedränge. Dazu vier trockene, sonnige Tage am Stück und morgen die Wahl zwischen Motocross vor der eigenen Haustür und dem Festival-Finale. Eine Sache müsst ihr euch dagegen aus dem Kopf schlagen: Das Musikfestival in Ourinhos, das Suchmaschinen für heute Abend ausspielen, hat 2025 stattgefunden.</p>\n    <ul>\n      <li><span class=\"chip good\">EVENT</span> <strong>FIML gratis und draußen</strong>: heute 10h Choro-&amp;-Samba-Workshop auf der Freitreppe des Teatro Ouro Verde, 11h Nachwuchs-Ensemble an der Av. Higienópolis, 14h Chöre im Teatro Crystal — alles ohne Eintritt.</li>\n      <li><span class=\"chip good\">GESUNDHEIT</span> <strong>Impfen ohne Aussteigen</strong>: Grippe-Drive-thru heute 9h–15h am Iate Clube, Av. Higienópolis 2135. Bei einem einen Monat alten Baby im Haushalt ist der Schutz der Eltern die eigentliche Schutzmaßnahme.</li>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>Paraná bleibt im Atemwegs-Alarm</strong>: InfoGripe SE 26/2026 führt PR unter den Bundesstaaten mit SRAG auf Alarm-, Risiko- oder Hochrisiko-Niveau; RSV stellt bundesweit <strong>55,9 %</strong> der positiven Fälle.</li>\n      <li><span class=\"chip good\">WETTER</span> <strong>Vier Tage null Regen</strong>: heute 16–26°, Sonntag 26°, Montag 27°, Dienstag 28° — zwei Portale einig, jeweils 0 % Regenwahrscheinlichkeit.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Sonntag zweigeteilt</strong>: Velocross Camiloti im Centro de Eventos hier im Ort (Uhrzeit und Eintritt unbestätigt) oder 10h30 das kostenlose FIML-Abschlusskonzert in Londrina.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Zwei Stadtteilfeste in Londrina</strong>: heute 15h–19h „Orgulho do Meu Bairro\" im Vista Bela, morgen 9h–15h Arraiá da Lourdes in Vila Siam — beide mit Impfstelle vor Ort.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Letzte Ferienwoche startet Montag</strong>: Recesso im Landesnetz noch bis Fr 24.07.</li>\n      <li><span class=\"chip hot\">ACHTUNG</span> <strong>Jahres-Falle</strong>: „XXIII Festival de Música de Ourinhos, 14.–18. Juli\" ist ein Artikel vom <strong>30.06.2025</strong>. Keine Fahrt in den Day-Trip-Ring planen.</li>\n      <li><span class=\"chip\">GESUNDHEIT</span> <strong>Dengue-Zahlen heute ohne Update</strong>: Das jüngste gelistete Informe Epidemiológico ist weiter Nr. 22 vom 07.07.2026; das Landes-Gesundheitsportal war heute nicht abrufbar. Deshalb heute bewusst keine Fallzahl.</li>\n    </ul></div>",
