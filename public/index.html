      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Eine Woche, die weniger von neuen Deployments als von neuen Torwächtern erzählt. Ein US-Spitzenmodell wird an rund zwanzig regierungsgeprüfte Partner ausgeliefert, ein anderer Anbieter bekommt seine Modelle nach neunzehn Tagen Export-Sperre zurück, die UN gründet eine KI-Kommission mit den halben Big-Tech-Vorständen — und die EU verschiebt ihre schärfste Compliance-Frist um über ein Jahr. Für Daniel und twiceD ist das kein Randthema: Wer KI in Europa produktiv einsetzt, plant plötzlich mit einem anderen Kalender.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · US</span> <strong>GPT-5.6 nur für ~20 regierungsgeprüfte Partner</strong>: OpenAI liefert seine neuen Modelle (Sol/Terra/Luna) zunächst nur an einen engen Kreis aus, auf Bitte der US-Regierung — und sagt offen, das solle „kein Dauerzustand\" werden.</li>\n      <li><span class=\"chip\">REG · US</span> <strong>Anthropic: Export-Sperre nach ~19 Tagen aufgehoben</strong>: Fable 5 + Mythos 5 sind seit 01.07. wieder global verfügbar; Anthropic widerspricht öffentlich der Jailbreak-Begründung der Behörde.</li>\n      <li><span class=\"chip\">POLICY · UN</span> <strong>„AI for Good Global Commission\" gestartet</strong>: UN/ITU, co-geführt von Benioff (Salesforce) + Kagame (Ruanda), 40+ Gründungsmitglieder inkl. Nvidia-, Amazon-, Microsoft-, Anthropic-, Cohere-Chefs. Erste Sitzung 08.07. in Genf.</li>\n      <li><span class=\"chip good\">REG · EU</span> <strong>EU AI Act: Hochrisiko-Frist verschoben</strong>: Der „Digital Omnibus\" (Rat final 29.06.) schiebt die 02.08.2026-Frist auf 02.12.2027 bzw. 02.08.2028 — mehr Luft für jedes EU-Deployment.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>54,5 % der deutschen Firmen nutzen KI</strong> (ifo, Mai 2026), nach 40,9 % ein Jahr zuvor — aber der Mittelstand hinkt: nur 47,2 % bei mittelgroßen Firmen gegen 67,2 % bei den Großen.</li>\n      <li><span class=\"chip good\">B2B · twiceD</span> <strong>twiceD-Idee</strong>: EU-AI-Act-Compliance-Werkzeug für den Mittelstand — ein 609-Mio.-$-Markt (2026) ohne benannten Mittelstands-Anbieter. Details unten.</li>\n      <li><span class=\"chip\">CTX · US</span> <strong>Modell-Preise als Signal</strong>: GPT-5.6 Sol kostet $5/$30 pro 1 Mio. Token — der „gute günstige\" Tier (Luna) liegt bei $1/$6. Wer kalkuliert, sollte den Sprung kennen.</li>\n      <li><span class=\"chip\">DEV · Verweis</span> <strong>Coding-Tools nicht hier</strong>: Claude Sonnet 5, Claude Code und das GitLab-„AI-Paradox\" laufen im <em>ai-dev</em>-Brief — dieser hier bleibt bei angewandter KI in Wirtschaft, Industrie und Staat.</li>\n    </ul></div>",

ong>twiceD-Idee</strong>: EU-AI-Act-Compliance-Werkzeug für den Mittelstand — ein 609-Mio.-$-Markt (2026) ohne benannten Mittelstands-Anbieter. Details unten.</li>\n      <li><span class=\"chip\">CTX · US</span> <strong>Modell-Preise als Signal</strong>: GPT-5.6 Sol kostet $5/$30 pro 1 Mio. Token — der „gute günstige\" Tier (Luna) liegt bei $1/$6. Wer kalkuliert, sollte den Sprung kennen.</li>\n      <li><span class=\"chip\">DEV · Verweis</span> <strong>Coding-Tools nicht hier</strong>: Claude Sonnet 5, Claude Code und das GitLab-„AI-Paradox\" laufen im <em>ai-dev</em>-Brief — dieser hier bleibt bei angewandter KI in Wirtschaft, Industrie und Staat.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A week defined less by new deployments than by new gatekeepers. A leading US model goes to roughly twenty government-vetted partners, another provider gets its models back after a nineteen-day export ban, the UN launches an AI commission with half of Big Tech's board—and the EU delays its toughest compliance deadline by over a year. For Daniel and twiceD, this is no sideshow: whoever deploys AI productively in Europe is suddenly planning on a different calendar.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · US</span> <strong>GPT-5.6 limited to ~20 government-vetted partners</strong>: OpenAI ships its new models (Sol/Terra/Luna) initially only to a narrow circle, at the US government's request—and openly states this should \"not be permanent.\"</li>\n      <li><span class=\"chip\">REG · US</span> <strong>Anthropic: Export ban lifted after ~19 days</strong>: Fable 5 + Mythos 5 are globally available again as of 07.01; Anthropic publicly disputes the agency's jailbreak rationale.</li>\n      <li><span class=\"chip\">POLICY · UN</span> <strong>\"AI for Good Global Commission\" launched</strong>: UN/ITU, co-led by Benioff (Salesforce) + Kagame (Rwanda), 40+ founding members including Nvidia, Amazon, Microsoft, Anthropic, Cohere CEOs. First meeting July 8 in Geneva.</li>\n      <li><span class=\"chip good\">REG · EU</span> <strong>EU AI Act: High-risk deadline delayed</strong>: The \"Digital Omnibus\" (Council final 06.29) pushes the 02.08.2026 deadline to 02.12.2027 or 02.08.2028—more breathing room for every EU deployment.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>54.5% of German firms use AI</strong> (ifo, May 2026), up from 40.9% a year prior—but SMEs lag: only 47.2% at mid-market firms versus 67.2% at large ones.</li>\n      <li><span class=\"chip good\">B2B · twiceD</span> <strong>twiceD idea</strong>: EU-AI-Act-compliance toolkit for SMEs—a $609 million market (2026) with no established mid-market vendor. Details below.</li>\n      <li><span class=\"chip\">CTX · US</span> <strong>Model pricing as signal</strong>: GPT-5.6 Sol costs $5/$30 per 1M tokens—the \"good cheap\" tier (Luna) runs $1/$6. Anyone calculating should know the jump.</li>\n      <li><span class=\"chip\">DEV · Note</span> <strong>Coding tools not here</strong>: Claude Sonnet 5, Claude Code and GitLab's \"AI Paradox\" run in the <em>ai-dev</em> brief—this one stays focused on applied AI in business, industry, and government.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma semana definida menos por novos deployments do que por novos guardiões. Um modelo líder dos EUA vai para aproximadamente vinte parceiros aprovados pelo governo, outro provedor recupera seus modelos após um banimento de exportação de dezenove dias, a ONU lança uma comissão de IA com metade do conselho da Big Tech—e a UE adia seu prazo de conformidade mais rigoroso em mais de um ano. Para Daniel e twiceD, isto não é um assunto secundário: quem implanta IA produtivamente na Europa está, de repente, planejando em um calendário diferente.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · US</span> <strong>GPT-5.6 limitado a ~20 parceiros aprovados pelo governo</strong>: OpenAI fornece seus novos modelos (Sol/Terra/Luna) inicialmente apenas a um círculo restrito, sob solicitação do governo dos EUA—e afirma abertamente que isto não deve ser \"permanente.\"</li>\n      <li><span class=\"chip\">REG · US</span> <strong>Anthropic: banimento de exportação levantado após ~19 dias</strong>: Fable 5 + Mythos 5 estão disponíveis globalmente novamente a partir de 01.07; Anthropic disputa publicamente a justificativa de jailbreak da agência.</li>\n      <li><span class=\"chip\">POLICY · UN</span> <strong>\"IA para Bem Global Commission\" iniciada</strong>: ONU/ITU, liderada conjuntamente por Benioff (Salesforce) + Kagame (Ruanda), 40+ membros fundadores incluindo CEOs da Nvidia, Amazon, Microsoft, Anthropic, Cohere. Primeira reunião 08.07 em Genebra.</li>\n      <li><span class=\"chip good\">REG · EU</span> <strong>EU AI Act: prazo de alto risco adiado</strong>: O \"Digital Omnibus\" (Conselho final 29.06) adia o prazo de 02.08.2026 para 02.12.2027 ou 02.08.2028—mais espaço para cada deployment na UE.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>54,5% das empresas alemãs usam IA</strong> (ifo, maio de 2026), acima de 40,9% um ano antes—mas PMEs ficam para trás: apenas 47,2% nas empresas de médio porte versus 67,2% nas grandes.</li>\n      <li><span class=\"chip good\">B2B · twiceD</span> <strong>ideia twiceD</strong>: Kit de conformidade EU AI Act para PMEs—um mercado de 609,4 milhões de dólares (2026) sem fornecedor estabelecido no segmento médio. Detalhes abaixo.</li>\n      <li><span class=\"chip\">CTX · US</span> <strong>Preço do modelo como sinal</strong>: GPT-5.6 Sol custa US$ 5/US$ 30 por 1M de tokens—o tier \"bom barato\" (Luna) custa US$ 1/US$ 6. Quem está calculando deve conhecer o salto.</li>\n      <li><span class=\"chip\">DEV · Nota</span> <strong>Ferramentas de codificação não estão aqui</strong>: Claude Sonnet 5, Claude Code e o \"Paradoxo de IA\" do GitLab rodam no brief <em>ai-dev</em>—este aqui mantém o foco em IA aplicada em negócios, indústria e governo.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Una semana definida menos por nuevos despliegues que por nuevos guardianes. Un modelo líder de EE.UU. va a aproximadamente veinte socios aprobados por el gobierno, otro proveedor recupera sus modelos tras diecinueve días de prohibición de exportación, la ONU lanza una comisión de IA con la mitad de las juntas de Big Tech—y la UE retrasa su plazo de cumplimiento más riguroso más de un año. Para Daniel y twiceD, esto no es un tema secundario: quien implanta IA productivamente en Europa está, de repente, planificando en un calendario diferente.</p>\n    <ul>\n      <li><span class=\"chip hot\">POLICY · US</span> <strong>GPT-5.6 limitado a ~20 socios aprobados por el gobierno</strong>: OpenAI envía sus nuevos modelos (Sol/Terra/Luna) inicialmente solo a un círculo reducido, a solicitud del gobierno de EE.UU.—y dice abiertamente que esto no debe ser \"permanente.\"</li>\n      <li><span class=\"chip\">REG · US</span> <strong>Anthropic: prohibición de exportación levantada tras ~19 días</strong>: Fable 5 + Mythos 5 están disponibles globalmente nuevamente a partir del 01.07; Anthropic cuestiona públicamente la justificación de jailbreak de la agencia.</li>\n      <li><span class=\"chip\">POLICY · UN</span> <strong>\"IA para Bien Comisión Global\" iniciada</strong>: ONU/ITU, co-liderada por Benioff (Salesforce) + Kagame (Ruanda), 40+ miembros fundadores incluyendo CEOs de Nvidia, Amazon, Microsoft, Anthropic, Cohere. Primera reunión 08.07 en Ginebra.</li>\n      <li><span class=\"chip good\">REG · EU</span> <strong>EU AI Act: plazo de alto riesgo retrasado</strong>: El \"Digital Omnibus\" (Consejo final 29.06) retrasa el plazo 02.08.2026 a 02.12.2027 o 02.08.2028—más espacio para cada despliegue en la UE.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>54,5% de empresas alemanas usan IA</strong> (ifo, mayo de 2026), arriba de 40,9% hace un año—pero las PYMES se quedan atrás: solo 47,2% en empresas medianas vs 67,2% en grandes.</li>\n      <li><span class=\"chip good\">B2B · twiceD</span> <strong>idea twiceD</strong>: Kit de cumplimiento EU AI Act para PYMES—un mercado de 609,4 millones de dólares (2026) sin proveedor establecido en el segmento medio. Detalles abajo.</li>\n      <li><span class=\"chip\">CTX · US</span> <strong>Precio del modelo como señal</strong>: GPT-5.6 Sol cuesta US$ 5/US$ 30 por 1M de tokens—el tier \"buen barato\" (Luna) cuesta US$ 1/US$ 6. Quien esté calculando debe conocer el salto.</li>\n      <li><span class=\"chip\">DEV · Nota</span> <strong>Herramientas de codificación no están aquí</strong>: Claude Sonnet 5, Claude Code y la \"Paradoja de IA\" de GitLab se ejecutan en el brief <em>ai-dev</em>—este aquí mantiene el enfoque en IA aplicada en negocios, industria y gobierno.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ruhiger Samstag mit dichtem Board: <strong>78 verifizierte Listings</strong> (69 Freelance, 6 Employee, 3 Intriguing), sortiert nach Fit. Ganz oben teilen sich drei Java/Spring-Contracts den Spitzenwert 88 — alle remote-lastig, alle im 90–120-€/h-Band. Der agentic-AI-Cluster wächst weiter: von Anthropics eigener Claude-Code-Rolle bis zu zwei Schweizer „Agentic-AI\"-Employee-Stellen. Bei den TED-Ausschreibungen bleiben nach Detail-Prüfung nur zwei echte, laufende Software-Aufträge übrig — beide brauchen einen Partner.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Drei 88er-Matches an der Spitze</strong>: iSAX (Java/Angular/AWS, FFM, 80% remote), BridgingIT (Spring Boot/K8s/Kafka, FFM, 100% remote), RED SAP Solutions (Java/Spring/Thymeleaf, Berlin, 100% remote, Start Juli).</li>\n      <li><span class=\"chip hot\">Auto</span> <strong>EnCo Software (Fit 87)</strong>: Java/Spring/EMF/React für Safety-&amp;-Security-Engineering im autonomen Fahren + KI-Fehleranalyse, 100% remote, 100–135 €/h* — die Nischen-Premium-Rolle des Tages.</li>\n      <li><span class=\"chip\">AI-Harness</span> <strong>Agentic-AI-Cluster</strong>: ELCA Zürich „Senior Java Engineer – Agentic AI\" (Fit 81, CHF 140–190k*, gepostet 09.06), AXA Zürich Python/AI (Fit 80), JetBrains „AI-Native Development\" EU-remote (Fit 82).</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Anthropic</strong> „Software Engineer – Claude Code\" (Fit 70): Daniels tägliches Werkzeug als Arbeitgeber — aber US-primär, kein EU-Remote.</li>\n      <li><span class=\"chip\">DE</span> <strong>Randstad Digital (Fit 84)</strong>: Senior Backend Java/Spring Boot mit explizitem <em>Agentic-Coding/Kiro</em>-Anspruch und MQTT/IoT-Tiefe — der Markt schreibt Agentic-Coding jetzt in die Freelance-Ausschreibung.</li>\n      <li><span class=\"chip\">TED</span> <strong>Zwei laufende EU-Aufträge</strong>: SPRIND EUDI-Wallet-Analytics (Frist 24.07) und Baden-Württemberg Verkehrsmanagement-Analyseplattform (Frist 04.08) — beide Stack-Match, beide <strong>⚠️ Partner nötig</strong> (Umsatz/FTE/ISO-27001).</li>\n      <li><span class=\"chip\">Markt</span> <strong>Rate-Anker bestätigt</strong>: Freelancer-Kompass 2026 (02.07) — DACH-IT-Median 95 €/h, Software &amp; Web Development 90 €/h; das Board-Band 90–120 €/h* liegt konsistent auf/leicht über Markt.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Signal</strong>: heute 32× Angular, 10× IoT/Automotive/Smart-Home-Premium, 8× AI-Integration in den Listings — der DACH-Java/Angular-Strom bleibt breit.</li>\n    </ul></div>",

ytics platform (deadline 08/04) — both stack matches, both <strong>⚠️ partner needed</strong> (revenue/FTE/ISO 27001).</li>\n      <li><span class=\"chip\">Market</span> <strong>Rate anchor confirmed</strong>: Freelancer Compass 2026 (07/02) — DACH IT median €95/h, Software &amp; Web Development €90/h; the board's 90–120 €/h* band sits consistently at or slightly above market.</li>\n      <li><span class=\"chip\">Remote</span> <strong>Signal</strong>: today 32× Angular, 10× IoT/automotive/smart-home premium, 8× AI integration among the listings — the DACH Java/Angular stream stays broad.</li>\n    </ul></div>",

ce.</li>\n      <li><span class=\"chip\">TED</span> <strong>Dos contratos abiertos en la UE</strong>: analítica de la EUDI Wallet de SPRIND (plazo 24/07) y plataforma de análisis de gestión de tráfico de Baden-Württemberg (plazo 04/08) — ambos con stack compatible, ambos <strong>⚠️ necesitan socio</strong> (facturación/FTE/ISO 27001).</li>\n      <li><span class=\"chip\">Mercado</span> <strong>Ancla de tarifa confirmada</strong>: Freelancer-Kompass 2026 (02/07) — mediana de TI en la región DACH de 95 €/h, Software &amp; Web Development 90 €/h; la banda del tablero de 90–120 €/h* se mantiene consistentemente en o ligeramente por encima del mercado.</li>\n      <li><span class=\"chip\">Remoto</span> <strong>Señal</strong>: hoy 32× Angular, 10× IoT/automotriz/smart-home premium, 8× integración de IA entre las vacantes — el flujo de Java/Angular de la región DACH se mantiene amplio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Das Turnier läuft jetzt in K.-o.-Modus, und Deutschland schaut zu. Seit dem Elfmeter-Aus gegen Paraguay am Montag ist die DFB-Elf raus — und ausgerechnet Paraguay steht heute Abend gegen Frankreich in Philadelphia. Zeitgleich rüstet der SC Freiburg für die neue Saison auf: Rekord-Transfer im Tor, ein Japaner für den Sturm. In Deutschland liegt der Ball still bis Ende August, das Turnier trägt die nächsten Tage allein.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Achtelfinale startet heute</strong>: Kanada–Marokko (19:00 MESZ / 14:00 BRT, Houston) und Frankreich–Paraguay (23:00 MESZ / 18:00 BRT, Philadelphia).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland ausgeschieden</strong>: 1:1 n. V., 3:4 i. E. gegen Paraguay am 29.06. in Boston — das erste WM-Elfmeter-Aus der DFB-Geschichte.</li>\n      <li><span class=\"chip\">WM</span> <strong>Brasilien am Sonntag</strong>: gegen Norwegen (22:00 MESZ / 17:00 BRT, New York) — hier in Brasilien der Termin des Wochenendes.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg-Rekord</strong>: Torwart Mio Backhaus kommt für rund 12 Mio. € aus Bremen — teuerster Zugang der Vereinsgeschichte.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Stürmer aus Belgien</strong>: Keisuke Goto (21) von Anderlecht, kolportiert rund 10 Mio. €.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg-Abgänge</strong>: Junior Adamu zu Schalke 04, Yann Sturm zu Eintracht Braunschweig.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Spielplan steht</strong>: Auftakt Bayern–Stuttgart am 28.08. — eine Woche später als sonst, wegen der WM.</li>\n      <li><span class=\"chip\">WM</span> <strong>Kracher der Woche</strong>: Portugal–Spanien am Montag (21:00 MESZ / 16:00 BRT, Dallas).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Das Turnier läuft jetzt in K.-o.-Modus, und Deutschland schaut zu. Seit dem Elfmeter-Aus gegen Paraguay am Montag ist die DFB-Elf raus — und ausgerechnet Paraguay steht heute Abend gegen Frankreich in Philadelphia. Zeitgleich rüstet der SC Freiburg für die neue Saison auf: Rekord-Transfer im Tor, ein Japaner für den Sturm. In Deutschland liegt der Ball still bis Ende August, das Turnier trägt die nächsten Tage allein.</p>\n    <ul>\n      <li><span class=\"chip hot\">WM</span> <strong>Achtelfinale startet heute</strong>: Kanada–Marokko (19:00 MESZ / 14:00 BRT, Houston) und Frankreich–Paraguay (23:00 MESZ / 18:00 BRT, Philadelphia).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Deutschland ausgeschieden</strong>: 1:1 n. V., 3:4 i. E. gegen Paraguay am 29.06. in Boston — das erste WM-Elfmeter-Aus der DFB-Geschichte.</li>\n      <li><span class=\"chip\">WM</span> <strong>Brasilien am Sonntag</strong>: gegen Norwegen (22:00 MESZ / 17:00 BRT, New York) — hier in Brasilien der Termin des Wochenendes.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg-Rekord</strong>: Torwart Mio Backhaus kommt für rund 12 Mio. € aus Bremen — teuerster Zugang der Vereinsgeschichte.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Stürmer aus Belgien</strong>: Keisuke Goto (21) von Anderlecht, kolportiert rund 10 Mio. €.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg-Abgänge</strong>: Junior Adamu zu Schalke 04, Yann Sturm zu Eintracht Braunschweig.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Spielplan steht</strong>: Auftakt Bayern–Stuttgart am 28.08. — eine Woche später als sonst, wegen der WM.</li>\n      <li><span class=\"chip\">WM</span> <strong>Kracher der Woche</strong>: Portugal–Spanien am Montag (21:00 MESZ / 16:00 BRT, Dallas).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The tournament is now in knockout mode, and Germany watches from the sidelines. Since the penalty loss to Paraguay on Monday, the DFB squad is out — and of all teams, Paraguay faces France in Philadelphia tonight. Meanwhile, SC Freiburg is gearing up for the new season: record transfer at goalkeeper, a Japanese striker for attack. German football sits quiet until late August; the tournament carries on alone over the next few days.</p>\n    <ul>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Round of 16 starts today</strong>: Canada–Morocco (7:00 PM CEST / 2:00 PM BRT, Houston) and France–Paraguay (11:00 PM CEST / 6:00 PM BRT, Philadelphia).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany eliminated</strong>: 1-1 a.e.t., 3-4 on penalties vs. Paraguay on 06/29 in Boston — the first World Cup penalty shootout loss in DFB history.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Brazil on Sunday</strong>: vs. Norway (10:00 PM CEST / 5:00 PM BRT, New York) — the weekend highlight here in Brazil.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Freiburg record</strong>: Goalkeeper Mio Backhaus joins from Bremen for around €12M — the club's most expensive signing ever.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Striker from Belgium</strong>: Keisuke Goto (21) from Anderlecht, reported fee around €10M.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Freiburg departures</strong>: Junior Adamu to Schalke 04, Yann Sturm to Eintracht Braunschweig.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Schedule set</strong>: Opener Bayern–Stuttgart on 08/28 — one week later than usual, due to the World Cup.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Game of the week</strong>: Portugal–Spain on Monday (9:00 PM CEST / 4:00 PM BRT, Dallas).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O torneio entra em fase eliminatória agora, e a Alemanha assiste de longe. Desde o pênalti perdido contra o Paraguai na segunda, a seleção alemã está fora — e justamente o Paraguai enfrenta a França em Filadélfia hoje à noite. Enquanto isso, o SC Freiburg se prepara para a nova temporada: recorde de transferência no gol, um japonês para o ataque. O futebol alemão fica em silêncio até fim de agosto; o torneio segue sozinho pelos próximos dias.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Oitavas de final começam hoje</strong>: Canadá–Marrocos (19:00 MESZ / 14:00 BRT, Houston) e França–Paraguai (23:00 MESZ / 18:00 BRT, Filadélfia).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha eliminada</strong>: 1 a 1 na prorrogação, 3 a 4 nos pênaltis contra Paraguai em 29/06 em Boston — a primeira eliminação por pênaltis em história de Copa do Mundo da Alemanha.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Brasil no domingo</strong>: contra Noruega (22:00 MESZ / 17:00 BRT, Nova York) — o compromisso do fim de semana aqui no Brasil.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Recorde Freiburg</strong>: Goleiro Mio Backhaus vem de Bremen por cerca de 12 mi € — a contratação mais cara da história do clube.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Atacante da Bélgica</strong>: Keisuke Goto (21) da Anderlecht, reportado cerca de 10 mi €.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Saídas Freiburg</strong>: Junior Adamu para Schalke 04, Yann Sturm para Eintracht Braunschweig.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Calendário definido</strong>: Abertura Bayern–Stuttgart em 28/08 — uma semana depois do normal, por causa da Copa.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Jogo da semana</strong>: Portugal–Espanha na segunda (21:00 MESZ / 16:00 BRT, Dallas).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El torneo entra ahora en fase de eliminación directa, y Alemania observa desde afuera. Desde la pérdida por penales contra Paraguay el lunes, la selección alemana está fuera — y precisamente Paraguay enfrenta a Francia en Filadelfia esta noche. Mientras tanto, el SC Freiburg se prepara para la nueva temporada: un récord de transferencia en portería, un japonés para el ataque. El fútbol alemán estará en pausa hasta finales de agosto; el torneo sigue solo durante los próximos días.</p>\n    <ul>\n      <li><span class=\"chip hot\">Copa</span> <strong>Octavos de final inician hoy</strong>: Canadá–Marruecos (19:00 MESZ / 14:00 BRT, Houston) y Francia–Paraguay (23:00 MESZ / 18:00 BRT, Filadelfia).</li>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania eliminada</strong>: 1-1 en prórroga, 3-4 en penales contra Paraguay el 29/06 en Boston — la primera eliminación por penales en la historia de Copas Mundiales de Alemania.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Brasil el domingo</strong>: contra Noruega (22:00 MESZ / 17:00 BRT, Nueva York) — el compromiso de fin de semana aquí en Brasil.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Récord Freiburg</strong>: Portero Mio Backhaus llega de Bremen por alrededor de 12 mi € — la contratación más cara en la historia del club.</li>\n      <li><span class=\"chip good\">Transfer</span> <strong>Delantero de Bélgica</strong>: Keisuke Goto (21) de Anderlecht, reportado alrededor de 10 mi €.</li>\n      <li><span class=\"chip\">Transfer</span> <strong>Salidas Freiburg</strong>: Junior Adamu a Schalke 04, Yann Sturm a Eintracht Braunschweig.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Calendario confirmado</strong>: Apertura Bayern–Stuttgart el 28/08 — una semana después de lo normal, por la Copa.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Choque de la semana</strong>: Portugal–España el lunes (21:00 MESZ / 16:00 BRT, Dallas).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sprint-Samstag in Silverstone: Gestern hat Lewis Hamilton die Sprint-Quali gewonnen und sich die Pole für das kurze Rennen geschnappt — hauchdünn, nur elf Tausendstel vor WM-Führer Antonelli. Heute Mittag fällt das erste Rennen des Wochenendes (Start 12:00 BST / 08:00 BRT), am Nachmittag folgt schon die Quali fürs Hauptrennen. Für Daniel liegt der Sprint früh am Morgen brasilianischer Zeit; das Hauptrennen morgen kommt bequem kurz nach elf. Die WM-Stände sind noch die von Österreich (28.06.) — in Silverstone können sie sich zum ersten Mal seit einer Woche wieder bewegen.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Hamilton holt Sprint-Pole</strong>: 1:28,376 — nur +0,011 s vor Antonelli, Verstappen Dritter (+0,321 s). Ferrari zeigt in Silverstone plötzlich Tempo.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint heute 12:00 BST</strong> / 08:00 BRT / 13:00 MESZ — 17 Runden, Punkte für die Top 8. Danach Quali 16:00 BST / 12:00 BRT / 17:00 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Hauptrennen So 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — für Daniel günstig, kurz nach elf Uhr vormittags.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt (Stand 28.06.) — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung (Stand 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo in acht Tagen</strong>: 6h von Interlagos So 12.07., Start 11:30 BRT / 16:30 MESZ. Toyota führt die Hersteller mit 132 Pkt.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin ist WM-Führender</strong> (193 Pkt, 7 vor Bezzecchi) — nächste Runde aber erst 10.–12.07. am Sachsenring, nicht dieses Wochenende.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Sprint-Samstag in Silverstone: Gestern hat Lewis Hamilton die Sprint-Quali gewonnen und sich die Pole für das kurze Rennen geschnappt — hauchdünn, nur elf Tausendstel vor WM-Führer Antonelli. Heute Mittag fällt das erste Rennen des Wochenendes (Start 12:00 BST / 08:00 BRT), am Nachmittag folgt schon die Quali fürs Hauptrennen. Für Daniel liegt der Sprint früh am Morgen brasilianischer Zeit; das Hauptrennen morgen kommt bequem kurz nach elf. Die WM-Stände sind noch die von Österreich (28.06.) — in Silverstone können sie sich zum ersten Mal seit einer Woche wieder bewegen.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Hamilton holt Sprint-Pole</strong>: 1:28,376 — nur +0,011 s vor Antonelli, Verstappen Dritter (+0,321 s). Ferrari zeigt in Silverstone plötzlich Tempo.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint heute 12:00 BST</strong> / 08:00 BRT / 13:00 MESZ — 17 Runden, Punkte für die Top 8. Danach Quali 16:00 BST / 12:00 BRT / 17:00 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Hauptrennen So 05.07.</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — für Daniel günstig, kurz nach elf Uhr vormittags.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt (Stand 28.06.) — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung (Stand 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo in acht Tagen</strong>: 6h von Interlagos So 12.07., Start 11:30 BRT / 16:30 MESZ. Toyota führt die Hersteller mit 132 Pkt.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin ist WM-Führender</strong> (193 Pkt, 7 vor Bezzecchi) — nächste Runde aber erst 10.–12.07. am Sachsenring, nicht dieses Wochenende.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Sprint Saturday at Silverstone: Yesterday, Lewis Hamilton won the sprint qualifying and grabbed pole position for the short race — incredibly close, just eleven hundredths of a second ahead of championship leader Antonelli. Today at noon the first race of the weekend kicks off (start 12:00 BST / 08:00 BRT), followed by qualifying for the main race in the afternoon. For Daniel, the sprint is early morning Brazilian time; tomorrow's main race is conveniently just after eleven a.m. The championship standings are still from Austria (06.28) — Silverstone is where they can move for the first time in a week.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Hamilton claims sprint pole</strong>: 1:28,376 — only +0.011 s ahead of Antonelli, Verstappen third (+0.321 s). Ferrari suddenly shows pace at Silverstone.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint today 12:00 BST</strong> / 08:00 BRT / 13:00 MESZ — 17 laps, points for top 8. Then qualifying 16:00 BST / 12:00 BRT / 17:00 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Main race Sun 07.05</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — perfect timing for Daniel, just after eleven in the morning.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli leads</strong> the drivers' championship with 171 pts (as of 06.28) — 40 ahead of teammate Russell (131), 46 ahead of Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominates</strong>: 302 to 204 points against Ferrari in constructors — 98-point lead (as of 06.28).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo in eight days</strong>: 6h of Interlagos Sun 07.12, start 11:30 BRT / 16:30 MESZ. Toyota leads manufacturers with 132 pts.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin holds championship lead</strong> (193 pts, 7 ahead of Bezzecchi) — but next race not until 07.10–12 at Sachsenring, not this weekend.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado de sprint em Silverstone: ontem, Lewis Hamilton venceu a qualificação do sprint e garantiu a pole para a corrida curta — foi apertado, apenas onze milésimos à frente do líder do campeonato Antonelli. Hoje ao meio-dia começa a primeira corrida do fim de semana (largada 12:00 BST / 08:00 BRT), à tarde segue a qualificação para a prova principal. Para Daniel, o sprint sai cedo pela manhã horário de Brasília; a corrida de amanhã sai tranquilamente pouco depois das onze. Os pontos do campeonato ainda são de Áustria (28.06.) — em Silverstone podem se mexer pela primeira vez em uma semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Hamilton conquista pole do sprint</strong>: 1:28,376 — apenas +0,011 s à frente de Antonelli, Verstappen terceiro (+0,321 s). Ferrari de repente mostra ritmo em Silverstone.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint hoje 12:00 BST</strong> / 08:00 BRT / 13:00 MESZ — 17 voltas, pontos para top 8. Depois qualificação 16:00 BST / 12:00 BRT / 17:00 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Corrida principal dom 05.07</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — ideal para Daniel, pouco depois das onze da manhã.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli lidera</strong> o campeonato de pilotos com 171 pts (situação 28.06.) — 40 à frente do colega Russell (131), 46 à frente de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 a 204 pontos contra Ferrari entre os construtores — 98 pontos de vantagem (situação 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo em oito dias</strong>: 6h de Interlagos dom 12.07., largada 11:30 BRT / 16:30 MESZ. Toyota lidera os fabricantes com 132 pts.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin lidera o campeonato</strong> (193 pts, 7 à frente de Bezzecchi) — próxima rodada só 10–12.07. no Sachsenring, não neste fim de semana.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Sábado de sprint en Silverstone: ayer, Lewis Hamilton ganó la clasificación del sprint y se llevó la pole para la carrera corta — muy apretado, apenas once milésimas por delante del líder del campeonato Antonelli. Hoy al mediodía arranca la primera carrera del fin de semana (salida 12:00 BST / 08:00 BRT), por la tarde sigue la clasificación para la carrera principal. Para Daniel, el sprint es tempranísimo por la mañana hora brasileña; la carrera de mañana sale cómodamente poco después de las once. Los puntos del campeonato siguen siendo de Austria (28.06.) — en Silverstone pueden moverse por primera vez en una semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Hamilton conquista pole del sprint</strong>: 1:28,376 — apenas +0,011 s por delante de Antonelli, Verstappen tercero (+0,321 s). Ferrari de repente muestra ritmo en Silverstone.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Sprint hoy 12:00 BST</strong> / 08:00 BRT / 13:00 MESZ — 17 vueltas, puntos para top 8. Luego clasificación 16:00 BST / 12:00 BRT / 17:00 MESZ.</li>\n      <li><span class=\"chip hot\">F1</span> <strong>Carrera principal dom 05.07</strong>: 15:00 BST / 11:00 BRT / 16:00 MESZ — perfecto para Daniel, poco después de las once de la mañana.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli lidera</strong> el campeonato de pilotos con 171 pts (situación 28.06.) — 40 por delante de su compañero Russell (131), 46 por delante de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 contra 204 puntos ante Ferrari en constructores — 98 puntos de ventaja (situación 28.06.).</li>\n      <li><span class=\"chip good\">WEC</span> <strong>São Paulo en ocho días</strong>: 6h de Interlagos dom 12.07., salida 11:30 BRT / 16:30 MESZ. Toyota lidera fabricantes con 132 pts.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Martin lidera el campeonato</strong> (193 pts, 7 por delante de Bezzecchi) — próxima ronda recién 10–12.07. en Sachsenring, no este fin de semana.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Feste, null Regen und ein sonniges Wochenende — Ribeirão Claro feiert gerade das 28. Fescafé direkt im Ort, nächstes Wochenende folgt die 31. FETEXAS in Jacarezinho. Ab 13. Juli sind Schulferien. Der einzige Wermutstropfen ist unsichtbar: Paraná ist im RSV-Winterpeak, und mit einem einen Monat alten Baby im Haus lohnt sich etwas Vorsicht — kein Grund zur Sorge, nur zum Händewaschen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>28. Fescafé läuft JETZT</strong> in Ribeirão Claro (0 km) — noch heute &amp; morgen, Sonntag mit gratis Kinder-Show „Sonhos e Magia\" + Cavalgada.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Trocken &amp; sonnig</strong> bis Montag: heute 15–24 °C, 0 % Regen. Perfektes Fest-Wochenende.</li>\n      <li><span class=\"chip\">Event</span> <strong>31. FETEXAS</strong> in Jacarezinho (~30 km), 09.–12.07., <em>Eintritt frei</em> — Rodeo + Rummelplatz, mitten in den Ferien.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien 13.–24.07.</strong> (Rückkehr Mo 27.07.) — Zeit für den Londrina-/SP-Ausflug.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Hochsaison in Paraná</strong> (SRAG-Alarm, VSR ~48–51 % der Fälle) — mit Neugeborenem: Hände waschen, Menschenmengen dosieren.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Londrina in den Ferien</strong>: SESC „Brincando nas Férias\" (4–12 J.) + Kinder-Neon-Park im Catuaí bis 30.07.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue am Boden</strong>: –96 % gegenüber 2025 im Jahresverlauf — die eine gute Zahl der Woche.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Feste, null Regen und ein sonniges Wochenende — Ribeirão Claro feiert gerade das 28. Fescafé direkt im Ort, nächstes Wochenende folgt die 31. FETEXAS in Jacarezinho. Ab 13. Juli sind Schulferien. Der einzige Wermutstropfen ist unsichtbar: Paraná ist im RSV-Winterpeak, und mit einem einen Monat alten Baby im Haus lohnt sich etwas Vorsicht — kein Grund zur Sorge, nur zum Händewaschen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>28. Fescafé läuft JETZT</strong> in Ribeirão Claro (0 km) — noch heute &amp; morgen, Sonntag mit gratis Kinder-Show „Sonhos e Magia\" + Cavalgada.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Trocken &amp; sonnig</strong> bis Montag: heute 15–24 °C, 0 % Regen. Perfektes Fest-Wochenende.</li>\n      <li><span class=\"chip\">Event</span> <strong>31. FETEXAS</strong> in Jacarezinho (~30 km), 09.–12.07., <em>Eintritt frei</em> — Rodeo + Rummelplatz, mitten in den Ferien.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien 13.–24.07.</strong> (Rückkehr Mo 27.07.) — Zeit für den Londrina-/SP-Ausflug.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>RSV-Hochsaison in Paraná</strong> (SRAG-Alarm, VSR ~48–51 % der Fälle) — mit Neugeborenem: Hände waschen, Menschenmengen dosieren.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Londrina in den Ferien</strong>: SESC „Brincando nas Férias\" (4–12 J.) + Kinder-Neon-Park im Catuaí bis 30.07.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue am Boden</strong>: –96 % gegenüber 2025 im Jahresverlauf — die eine gute Zahl der Woche.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Two festivals, zero rain and a sunny weekend — Ribeirão Claro is celebrating its 28th Fescafé right in town, and next weekend brings the 31st FETEXAS in Jacarezinho. School break starts July 13. The only shadow is invisible: Paraná is in its RSV winter peak, and with a one-month-old baby in the house, a little caution makes sense — no cause for alarm, just reason for handwashing.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>28th Fescafé running NOW</strong> in Ribeirão Claro (0 km) — today and tomorrow, Sunday features free kids show \"Sonhos e Magia\" + horse parade.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Dry & sunny</strong> through Monday: today 59–75°F, 0% rain. Perfect festival weather.</li>\n      <li><span class=\"chip\">Event</span> <strong>31st FETEXAS</strong> in Jacarezinho (~30 km), 07-09–07-12, <em>free admission</em> — rodeo + amusement park, right in the school break.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break 07-13–07-24.</strong> (return Mon 07-27) — time for the Londrina/SP trip.</li>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV peak season in Paraná</strong> (SRAG alert, RSV ~48–51% of cases) — with newborn: handwash, limit crowds.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Londrina during break</strong>: SESC \"Brincando nas Férias\" (ages 4–12) + Kids Neon Park at Catuaí through 07-30.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue crashed</strong>: –96% vs 2025 year-to-date — the week's bright number.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Dois festivais, zero chuva e um fim de semana ensolarado — Ribeirão Claro celebra agora sua 28ª Fescafé direto na cidade, e no próximo fim de semana vem a 31ª FETEXAS em Jacarezinho. Férias escolares começam em 13 de julho. A única sombra é invisível: Paraná está no pico de inverno do VRS, e com um bebê de um mês de idade em casa, um pouco de cuidado faz sentido — sem razão para alarme, apenas para lavar as mãos.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>28ª Fescafé acontecendo AGORA</strong> em Ribeirão Claro (0 km) — hoje e amanhã, domingo com show infantil grátis \"Sonhos e Magia\" + cavalgada.</li>\n      <li><span class=\"chip\">Tempo</span> <strong>Seco &amp; ensolarado</strong> até segunda: hoje 15–24 °C, 0% de chuva. Tempo perfeito para festival.</li>\n      <li><span class=\"chip\">Evento</span> <strong>31ª FETEXAS</strong> em Jacarezinho (~30 km), 09–12/07, <em>entrada grátis</em> — rodeio + parque de diversões, bem nas férias.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Férias de inverno 13–24/07.</strong> (retorno seg 27/07) — tempo para viagem a Londrina/SP.</li>\n      <li><span class=\"chip hot\">Saúde</span> <strong>Pico de VRS em Paraná</strong> (alerta SRAG, VRS ~48–51% dos casos) — com recém-nascido: lavar mãos, controlar multidões.</li>\n      <li><span class=\"chip good\">Viagem</span> <strong>Londrina nas férias</strong>: SESC \"Brincando nas Férias\" (4–12 anos) + Parque Neon Infantil no Catuaí até 30/07.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue em queda</strong>: –96% em relação a 2025 no acumulado — o bom número da semana.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Dos festivales, cero lluvia y un fin de semana soleado — Ribeirão Claro celebra su 28ª Fescafé directamente en la ciudad, y el próximo fin de semana llega la 31ª FETEXAS en Jacarezinho. Las vacaciones escolares comienzan el 13 de julio. La única sombra es invisible: Paraná está en el pico invernal de VRS, y con un bebé de un mes en la casa, un poco de cuidado tiene sentido — sin razón de alarma, solo para lavarse las manos.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>28ª Fescafé en vivo AHORA</strong> en Ribeirão Claro (0 km) — hoy y mañana, domingo con show infantil gratis \"Sonhos e Magia\" + desfile a caballo.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Seco &amp; soleado</strong> hasta el lunes: hoy 15–24 °C, 0% lluvia. Clima perfecto para festival.</li>\n      <li><span class=\"chip\">Evento</span> <strong>31ª FETEXAS</strong> en Jacarezinho (~30 km), 09–12/07, <em>entrada gratis</em> — rodeo + parque de diversiones, en vacaciones escolares.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Vacaciones de invierno 13–24/07.</strong> (regreso lun 27/07) — tiempo para viaje a Londrina/SP.</li>\n      <li><span class=\"chip hot\">Salud</span> <strong>Pico de VRS en Paraná</strong> (alerta SRAG, VRS ~48–51% de casos) — con recién nacido: lavarse manos, controlar multitudes.</li>\n      <li><span class=\"chip good\">Viaje</span> <strong>Londrina en vacaciones</strong>: SESC \"Brincando nas Férias\" (4–12 años) + Parque Neon Infantil en Catuaí hasta 30/07.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue en picada</strong>: –96% vs 2025 acumulado — el número positivo de la semana.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstag, der 4. Juli — Wochenthema <em>Essen, Kochen, Restaurant</em>, heute mit dem Schwerpunkt <em>Kochen zuhause: Küchentechniken, Vorratshaltung &amp; Frühstück</em>. Die früheren Essens-Tage haben den Restaurant-Service und die Festa-Junina-Gerichte abgedeckt; heute stehst du selbst am Herd: Fleisch <em>marinieren</em> und <em>braten</em>, Zwiebeln als Basis <em>refogar</em>, mit dem <em>Schneebesen verrühren</em>, <em>abschmecken</em>, Reste <em>einfrieren</em> und wieder <em>auftauen</em> — und die Wörter für <em>Vorratskammer</em>, <em>Pfanne</em>, <em>Topf</em> und das brasilianische Frühstück beherrschen. 33 Einträge, 10 Verben mit voller Konjugation (davon 2 Auffrischungen), plus der große Doppel-False-Friend <em>panela</em> und zwei BR-Kochtechniken, für die es im Deutschen kein einziges Wort gibt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>panela (PT) ≠ panela (ES)</strong> — im Portugiesischen ist <em>a panela</em> der ganz normale <em>Topf/die Pfanne</em>. Im Spanischen ist <em>la panela</em> dagegen <em>unraffinierter Rohrzucker</em> (in Mexiko <em>piloncillo</em>). Gleiches Wort, völlig andere Küche.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>panela — der mexikanische Dreh</strong> — in Mexiko meint <em>panela</em> meistens <em>queso panela</em>, einen frischen weißen Käse, der beim Erhitzen nicht schmilzt. Ein dritter Sinn, den nicht mal die anderen spanischsprachigen Länder teilen.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>refogar</strong> — Zwiebel und Knoblauch kurz in wenig Fett anschwitzen, als Geschmacksbasis fürs Gericht. Es gibt kein deutsches Ein-Wort-Äquivalent; im Spanischen am nächsten ist <em>sofreír</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>escaldar</strong> — mit kochendem Wasser überbrühen, um Häute zu lösen oder etwas zu blanchieren/keimarm zu machen. Nicht dasselbe wie <em>branquear</em> (echtes Blanchieren mit Eiswasser-Stopp).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES freír ist unregelmäßig</strong> — im Präsens diphthongiert es e→í: <em>frío, fríes, fríe, freímos, fríen</em>. Die 3. Person Singular im Indefinido ist <em>frio</em> (ohne Akzent). Und es hat <em>zwei</em> Partizipien: <em>freído</em> und <em>frito</em> — heute klar häufiger <em>frito</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE auftauen</strong> — zwei Hilfsverben je nach Bedeutung: „ich <em>habe</em> die Suppe aufgetaut\" (transitiv, du tust es), aber „die Suppe <em>ist</em> aufgetaut\" (intransitiv, sie wird von selbst weich). Genauso <em>einfrieren</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT descaroçar</strong> hat den <em>ç→c</em>-Trap vor e: 1. Person Perfekt <em>descarocei</em>, Subjuntivo <em>descaroce</em>. Und <em>refogar</em> den <em>g→gu</em>-Trap: <em>refoguei</em>, <em>refogue</em> — das u hält das g hart.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE empfehlen</strong> ist stark: <em>er empfiehlt</em> (e→ie), Präteritum <em>empfahl</em>, Partizip <em>empfohlen</em>, Konjunktiv II <em>empföhle</em>. Nicht raten.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>die Pfanne (f), der Topf (m), das Sieb (n)</strong> — drei Genera. PT: <em>a frigideira (f), a panela (f), a peneira (f)</em>; ES-MX: <em>la sartén (f — trotz „el sartén\" umgangssprachlich), la olla (f), el colador (m)</em>. Genus nicht raten.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o café da manhã</strong> — das Frühstück heißt in Brasilien wörtlich „Morgenkaffee\" (EP: <em>pequeno-almoço</em>). Der Gefrierschrank ist BR <em>o freezer</em> (Lehnwort), nicht <em>congelador</em> wie in Portugal.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>engolir sapo</strong> (PT-BR) — wörtlich „eine Kröte schlucken\" = etwas Unangenehmes zähneknirschend hinnehmen. DE-Bild: „in den sauren Apfel beißen\".</li>\n    </ul></div>",

n den sauren Apfel beißen\".</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Saturday, July 4th — this week's theme is <em>Food, Cooking, Restaurants</em>, today with a focus on <em>cooking at home: kitchen techniques, pantry basics &amp; breakfast</em>. Earlier food days covered restaurant service and Festa Junina dishes; today you're at the stove yourself: <em>marinating</em> and <em>frying</em> meat, <em>sautéing</em> onions as a base (<em>refogar</em>), <em>whisking</em> things together, <em>seasoning to taste</em>, <em>freezing</em> leftovers and <em>thawing</em> them again — plus mastering the words for <em>pantry</em>, <em>frying pan</em>, <em>pot</em>, and Brazilian breakfast. 33 entries, 10 verbs with full conjugation (2 of them reviews), plus the big double false friend <em>panela</em> and two BR cooking techniques that have no single-word German equivalent.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>panela (PT) ≠ panela (ES)</strong> — in Portuguese, <em>a panela</em> is just the everyday <em>pot/pan</em>. In Spanish, <em>la panela</em> instead means <em>unrefined cane sugar</em> (in Mexico, <em>piloncillo</em>). Same word, completely different kitchen.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>panela — the Mexican twist</strong> — in Mexico, <em>panela</em> usually means <em>queso panela</em>, a fresh white cheese that doesn't melt when heated. A third meaning that not even other Spanish-speaking countries share.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>refogar</strong> — briefly sautéing onion and garlic in a little fat as a flavor base for a dish. There's no single-word German equivalent; the closest in Spanish is <em>sofreír</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>escaldar</strong> — scalding something with boiling water to loosen skins or lightly blanch/sanitize it. Not the same as <em>branquear</em> (true blanching with an ice-water stop).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES freír is irregular</strong> — in the present it diphthongizes e→í: <em>frío, fríes, fríe, freímos, fríen</em>. The third-person singular preterite is <em>frio</em> (no accent). And it has <em>two</em> past participles: <em>freído</em> and <em>frito</em> — today <em>frito</em> is clearly more common.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE auftauen</strong> — takes two different auxiliary verbs depending on meaning: \"I <em>have</em> thawed the soup\" (transitive, you do it), but \"the soup <em>is</em> thawed\" (intransitive, it softens on its own). Same for <em>einfrieren</em> (to freeze).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT descaroçar</strong> has the <em>ç→c</em> trap before e: first-person preterite <em>descarocei</em>, subjunctive <em>descaroce</em>. And <em>refogar</em> has the <em>g→gu</em> trap: <em>refoguei</em>, <em>refogue</em> — the u keeps the g hard.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE empfehlen</strong> is strong: <em>er empfiehlt</em> (e→ie), simple past <em>empfahl</em>, past participle <em>empfohlen</em>, subjunctive II <em>empföhle</em>. Not to be confused with \"raten\" (to guess/advise).</li>\n      <li><span class=\"chip\">GENDER</span> <strong>die Pfanne (f), der Topf (m), das Sieb (n)</strong> — three genders. PT: <em>a frigideira (f), a panela (f), a peneira (f)</em>; ES-MX: <em>la sartén (f — despite the colloquial \"el sartén\"), la olla (f), el colador (m)</em>. Don't guess the gender.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o café da manhã</strong> — breakfast in Brazil literally means \"morning coffee\" (EP: <em>pequeno-almoço</em>). The freezer is BR <em>o freezer</em> (a loanword), not <em>congelador</em> as in Portugal.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>engolir sapo</strong> (PT-BR) — literally \"to swallow a toad\" = to grudgingly put up with something unpleasant. German image: \"to bite into the sour apple.\"</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Sábado, 4 de julho — tema da semana <em>Comida, Culinária, Restaurante</em>, hoje com foco em <em>cozinhar em casa: técnicas de cozinha, estoque de despensa &amp; café da manhã</em>. Os dias anteriores sobre comida cobriram o atendimento em restaurantes e os pratos de Festa Junina; hoje você mesmo vai para o fogão: <em>marinar</em> e <em>fritar</em> carne, <em>refogar</em> cebola como base, <em>misturar</em> com o <em>batedor de arame</em>, <em>temperar a gosto</em>, <em>congelar</em> sobras e <em>descongelar</em> de novo — e dominar as palavras para <em>despensa</em>, <em>frigideira</em>, <em>panela</em> e o café da manhã brasileiro. 33 entradas, 10 verbos com conjugação completa (2 delas revisões), além do grande false friend duplo <em>panela</em> e duas técnicas culinárias BR para as quais o alemão não tem uma única palavra.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>panela (PT) ≠ panela (ES)</strong> — em português, <em>a panela</em> é o utensílio comum de cozinhar. Em espanhol, <em>la panela</em> significa <em>açúcar mascavo não refinado</em> (no México, <em>piloncillo</em>). Mesma palavra, cozinha completamente diferente.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>panela — a versão mexicana</strong> — no México, <em>panela</em> normalmente se refere a <em>queso panela</em>, um queijo branco fresco que não derrete ao ser aquecido. Um terceiro sentido que nem os outros países de língua espanhola compartilham.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>refogar</strong> — dourar rapidamente cebola e alho em pouca gordura, como base de sabor para o prato. Não existe equivalente de uma palavra só em alemão; o mais próximo em espanhol é <em>sofreír</em>.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>escaldar</strong> — jogar água fervente para soltar peles ou branquear/higienizar levemente. Não é o mesmo que <em>branquear</em> (o branqueamento de verdade, com parada em água gelada).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES freír é irregular</strong> — no presente ditongua e→í: <em>frío, fríes, fríe, freímos, fríen</em>. A terceira pessoa do singular no pretérito é <em>frio</em> (sem acento). E tem <em>dois</em> particípios: <em>freído</em> e <em>frito</em> — hoje claramente mais comum é <em>frito</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>DE auftauen</strong> — dois verbos auxiliares dependendo do sentido: \"eu <em>tenho</em> descongelado a sopa\" (transitivo, você faz isso), mas \"a sopa <em>está</em> descongelada\" (intransitivo, ela amolece sozinha). O mesmo vale para <em>einfrieren</em> (congelar).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT descaroçar</strong> tem a pegadinha <em>ç→c</em> antes de e: primeira pessoa do pretérito perfeito <em>descarocei</em>, subjuntivo <em>descaroce</em>. E <em>refogar</em> tem a pegadinha <em>g→gu</em>: <em>refoguei</em>, <em>refogue</em> — o u mantém o g com som forte.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>DE empfehlen</strong> é forte: <em>er empfiehlt</em> (e→ie), pretérito <em>empfahl</em>, particípio <em>empfohlen</em>, subjuntivo II <em>empföhle</em>. Não confundir com \"adivinhar\".</li>\n      <li><span class=\"chip\">GÊNERO</span> <strong>die Pfanne (f), der Topf (m), das Sieb (n)</strong> — três gêneros. PT: <em>a frigideira (f), a panela (f), a peneira (f)</em>; ES-MX: <em>la sartén (f — apesar do coloquial \"el sartén\"), la olla (f), el colador (m)</em>. Não chute o gênero.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o café da manhã</strong> — o café da manhã no Brasil significa literalmente isso mesmo (EP: <em>pequeno-almoço</em>). O freezer é BR <em>o freezer</em> (empréstimo do inglês), não <em>congelador</em> como em Portugal.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>engolir sapo</strong> (PT-BR) — literalmente \"engolir um sapo\" = aceitar algo desagradável a contragosto. Imagem em alemão: \"morder a maçã azeda\".</li>\n    </ul></div>",
