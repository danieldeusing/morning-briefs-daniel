<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);

    text-transform: uppercase;

    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;

  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }

    line-height: 1.5;

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }

  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;

  }

  }

  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {

    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);

      z-index: 56;

    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,

  }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the

  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">

    </nav>
  </div>
</footer>

        "en": "<div class=\"tldr\"><p class=\"lead\">Friday morning, and the FX side is holding its breath: the latest ECB fix is still Thursday's — <strong>EUR/BRL 5.7775</strong> — the new Friday fix doesn't land until the afternoon (~16:15 CET / 11:15 BRT). Today's loud headline comes from an entirely different corner. Silicon Valley announced a wave of investment this week on a historic scale: OpenAI is raising its compute budget through 2030 to <strong>$750 billion</strong>, building a <strong>$30 billion data center</strong> in Georgia under \"Project Camellia,\" and AMD booked double-digit gigawatts of chip demand at its own trade show. That sounds like tech news — but at its core it's a <em>dollar</em> story, which is why it's here. My thesis, open for debate: this capex boom is the strongest structural tailwind for the dollar in years — and therefore, long term, a headwind for Daniel's exchange rate. Just slowly, not today. Today comes down to whether Brent holds $100 (it barely does: <strong>$100.28</strong>) and what the Fed does next week.</p>\n    <ul>\n      <li><span class=\"chip hot\">AI Capex</span> <strong>OpenAI: $750 billion</strong> compute budget through 2030 (+25%); \"Project Camellia\" = $30 billion data center, 3.2 GW, in Georgia. <strong>AMD</strong> booked double-digit gigawatts of demand at \"Advancing AI.\" Why it's here: this is a liquidity and dollar story.</li>\n      <li><span class=\"chip\">FX</span> <strong>No new fix.</strong> Thursday's fix of 5.7775 is still the latest published value; the Friday fix arrives ~11:15 BRT. Only the DXY is fresh: <strong>101.44</strong>, practically unchanged (−0.01%).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent holds $100:</strong> $100.28 (−0.40% on Fri). As long as oil stays triple-digit, the Fed hike risk stays real — the thread the whole forecast hangs on.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Cross-rate check</strong> (based on the Thu fix): 0.001% divergence — clean. Honest caveat: the second fully <em>independent</em> source (exchange-rates.org) was unreachable today; the check runs within the ECB family.</li>\n      <li><span class=\"chip hot\">US</span> <strong>FOMC Jul 28-29</strong> — the event of the week. The market prices in roughly <strong>63.5% odds of a hold</strong>, per a Forbes analysis, but roughly a 1-in-3 chance of a <em>hike</em> under Chair Kevin Warsh.</li>\n      <li><span class=\"chip\">BR</span> <strong>Fiscal credibility gap:</strong> the government itself now admits a <strong>R$22.6 billion</strong> primary deficit for 2026 — the budget had planned a <strong>R$34.3 billion surplus</strong>. The market median (Prisma Fiscal) is even more pessimistic at <strong>R$58.08 billion</strong>. The 4th deficit in a row.</li>\n      <li><span class=\"chip\">BR</span> <strong>5-year CDS 124.25 bp</strong> (+2.20% on Thu) — slightly higher than midweek, but still no stress signal.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> (cut on Jun 17), next Copom meeting <strong>Aug 4-5</strong>. Rate spread against the Fed still ~<strong>10.6 percentage points</strong>.</li>\n      <li><span class=\"chip\">EU</span> <strong>ECB holds at 2.25%</strong> (decision Jul 23); Lagarde floats a possible September move. The euro leg gets no tailwind.</li>\n      <li><span class=\"chip\">Heads up</span> The probabilities in the forecast are <strong>my confidence levels</strong>, not market-implied figures. Spot anchors are live and dated.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É sexta-feira de manhã, e o lado cambial está de fôlego suspenso: o fixing mais recente do BCE continua sendo o de quinta-feira — <strong>EUR/BRL 5,7775</strong> —, o novo fixing de sexta-feira só sai à tarde (~16:15 CET / 11:15 BRT). A notícia forte de hoje vem de outro canto. O Vale do Silício anunciou nesta semana uma onda de investimentos de proporções históricas: a OpenAI eleva seu orçamento de computação até 2030 para <strong>US$ 750 bilhões</strong>, constrói com o \"Project Camellia\" um <strong>data center de US$ 30 bilhões</strong> na Geórgia, e a AMD reserva, em sua feira própria, dois dígitos de gigawatts em demanda de chips. Isso soa como notícia de tecnologia — mas no fundo é uma história sobre o <em>dólar</em>, e é por isso que está aqui. Minha tese, que pode ser contestada: esse boom de capex é o vento a favor estrutural mais forte para o dólar em anos — e, portanto, no longo prazo, um vento contrário para o câmbio de Daniel. Só que devagar, não hoje. Hoje, o que decide é se o Brent segura os 100 $ (segura, por pouco: <strong>US$ 100,28</strong>) e o que o Fed fará na semana que vem.</p>\n    <ul>\n      <li><span class=\"chip hot\">Capex de IA</span> <strong>OpenAI: US$ 750 bilhões</strong> em orçamento de computação até 2030 (+25%); \"Project Camellia\" = data center de US$ 30 bilhões, 3,2 GW, na Geórgia. <strong>AMD</strong> reserva, na \"Advancing AI\", dois dígitos de gigawatts em demanda. Por que isso aqui: é uma história de liquidez e de dólar.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>Nenhum fixing novo.</strong> O fixing de quinta-feira <strong>5,7775</strong> continua sendo o valor mais recente publicado; o fixing de sexta sai ~11:15 BRT. Só está atualizado o DXY: <strong>101,44</strong>, praticamente estável (−0,01%).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent segura os 100:</strong> US$ 100,28 (−0,40% na sexta). Enquanto o petróleo continuar em três dígitos, o risco de alta de juros do Fed segue real — o fio do qual depende toda a previsão.</li>\n      <li><span class=\"chip good\">Câmbio</span> <strong>Checagem de câmbio cruzado</strong> (com base no fixing de quinta): 0,001% de divergência — limpa. Ressalva honesta: a segunda fonte <em>totalmente</em> independente (exchange-rates.org) não estava acessível hoje; a checagem roda dentro da família de referências do BCE.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>FOMC em 28/29 de julho</strong> — o compromisso da semana. Segundo uma análise da Forbes, o mercado vê ~<strong>63,5% de chance de manutenção</strong>, mas, grosso modo, uma chance de 1 em 3 de <em>alta de juros</em> sob o presidente Kevin Warsh.</li>\n      <li><span class=\"chip\">BR</span> <strong>Lacuna de credibilidade fiscal:</strong> o próprio governo admite <strong>R$ 22,6 bilhões</strong> de déficit primário em 2026 — o planejado era um <strong>superávit de R$ 34,3 bilhões</strong>. A mediana de mercado (Prisma Fiscal) é ainda mais pessimista, em <strong>R$ 58,08 bilhões</strong>. 4º déficit seguido.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS de 5 anos em 124,25 bp</strong> (+2,20% na quinta) — um pouco mais alto que no meio da semana, mas ainda sem sinal de estresse.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic em 14,25%</strong> (cortada em 17/06), próximo Copom em <strong>04/05 de agosto</strong>. Diferencial de juros contra o Fed segue em cerca de <strong>10,6 pontos percentuais</strong>.</li>\n      <li><span class=\"chip\">UE</span> <strong>BCE mantém em 2,25%</strong> (decisão de 23/07); Lagarde deixa em aberto um possível passo em setembro. A perna do euro não recebe vento a favor.</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades na previsão são <strong>minha confiança pessoal</strong>, não uma medida implícita de mercado. As âncoras de câmbio à vista são atuais e datadas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Viernes por la mañana, y el lado cambiario contiene la respiración: el fixing más reciente del BCE sigue siendo el del jueves — <strong>EUR/BRL 5,7775</strong> —, el nuevo fixing del viernes llega apenas por la tarde (~16:15 CET / 11:15 hora de Brasilia). La noticia fuerte de hoy viene de otro rincón. Silicon Valley anunció esta semana una ola de inversión de proporciones históricas: OpenAI eleva su presupuesto de cómputo hasta 2030 a <strong>750 mil millones de dólares</strong>, construye con «Project Camellia» un <strong>centro de datos de 30 mil millones de dólares</strong> en Georgia, y AMD reservó en su feria propia demanda de chips por dos dígitos de gigavatios. Esto suena a noticia tecnológica — pero en el fondo es una historia del <em>dólar</em>, y por eso aparece aquí. Mi tesis, discutible: este auge de gasto de capital es el viento de cola estructural más fuerte para el dólar en años — y por lo tanto, a largo plazo, viento en contra para el tipo de cambio de Daniel. Solo que despacio, no hoy. Hoy se decide si el Brent sostiene los 100 dólares (lo logra por poco: <strong>100,28 dólares</strong>) y qué hace la Fed la próxima semana.</p>\n    <ul>\n      <li><span class=\"chip hot\">Capex de IA</span> <strong>OpenAI: 750 mil millones de dólares</strong> de presupuesto de cómputo hasta 2030 (+25%); «Project Camellia» = centro de datos de 30 mil millones de dólares, 3,2 GW, en Georgia. <strong>AMD</strong> reservó en «Advancing AI» demanda de chips por dos dígitos de gigavatios. Por qué importa aquí: es una historia de liquidez y de dólar.</li>\n      <li><span class=\"chip\">FX</span> <strong>Sin fixing nuevo.</strong> El fixing del jueves <strong>5,7775</strong> sigue siendo el valor publicado más reciente; el fixing del viernes llega ~11:15 hora de Brasilia. Lo único fresco es el DXY: <strong>101,44</strong>, prácticamente sin cambios (−0,01%).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>El Brent sostiene los 100:</strong> 100,28 dólares (−0,40% el viernes). Mientras el petróleo se mantenga en tres dígitos, el riesgo de un alza de la Fed sigue siendo real — el hilo del que cuelga todo el pronóstico.</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificación de tipo cruzado</strong> (con base en el fixing del jueves): 0,001% de divergencia — limpio. Salvedad honesta: la segunda fuente <em>totalmente</em> independiente (exchange-rates.org) no estuvo disponible hoy; la verificación corre dentro de la familia del BCE.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>FOMC 28-29/07</strong> — la cita de la semana. Según un análisis de Forbes, el mercado ve ~<strong>63,5% de probabilidad de que se mantenga</strong>, pero, en términos generales, una probabilidad de 1 a 3 de un <em>alza</em> bajo el presidente Kevin Warsh.</li>\n      <li><span class=\"chip\">BR</span> <strong>Brecha de credibilidad fiscal:</strong> el propio gobierno admite un <strong>déficit primario de R$ 22,6 mil millones</strong> para 2026 — lo previsto era un <strong>superávit de R$ 34,3 mil millones</strong>. La mediana del mercado (Prisma Fiscal) es todavía más pesimista, con <strong>R$ 58,08 mil millones</strong>. Cuarto déficit consecutivo.</li>\n      <li><span class=\"chip\">BR</span> <strong>CDS a 5 años 124,25 bp</strong> (+2,20% el jueves) — ligeramente más alto que a mitad de semana, pero sigue sin ser una señal de estrés.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> (recortada el 17/06), próximo Copom <strong>4-5/08</strong>. El diferencial de tasas frente a la Fed se mantiene en ~<strong>10,6 puntos porcentuales</strong>.</li>\n      <li><span class=\"chip\">UE</span> <strong>El BCE mantiene en 2,25%</strong> (decisión del 23/07); Lagarde deja sobre la mesa un posible paso en septiembre. La pata del euro no recibe viento a favor.</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades del pronóstico son <strong>mi propia confianza</strong>, no una cifra implícita del mercado. Las anclas spot son en vivo y con fecha.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Donnerstag hat eine Regel bestätigt, die diese Woche über allem steht: Gerade werden nicht die schlechten Nachrichten verkauft, sondern die <em>teuren</em>. <strong>AMD</strong> lieferte auf seinem „Advancing AI\"-Event die vielleicht stärkste Auftragsliste der Chip-Geschichte — <strong>Anthropic bis zu 2 GW</strong>, <strong>OpenAI und Meta zusammen rund 12 GW</strong>, <strong>Microsoft Azure als Anker-Kunde</strong> — und die Aktie fiel trotzdem rund <strong>4 % auf 529,48 $</strong>. Am selben Tag hob <strong>OpenAI</strong> seine geplanten Infrastruktur-Ausgaben laut <em>Wall Street Journal</em> auf rund <strong>750 Mrd. $ bis 2030</strong> an (vorher 600 Mrd. $) und begann mit dem ersten selbst gebauten Rechenzentrum. Beides ist dieselbe Geschichte wie Alphabets Capex-Schock vom Vortag, nur größer: KI-Rechenleistung kostet gigantische Summen, und der Markt schickt die Rechnung an die, die sie bezahlen. So fiel der <strong>Nasdaq am Donnerstag 2,15 %</strong>, der <strong>S&amp;P 500 1,21 %</strong> — verstärkt durch einen zweiten Schlag: <strong>Brent sprang über 100 $</strong> nach Angriffen auf zwei saudische Tanker. Am Freitagmorgen liegt Öl bei <strong>100,28 $</strong>, der Kriegsaufschlag hält, dehnt sich aber nicht aus. Und die eigentliche Woche kommt erst: <strong>Mi 29.07. FOMC-Entscheid</strong>, am selben Abend <strong>Microsoft und Meta</strong>, am <strong>30.07. Apple und Amazon</strong>. Deshalb lautet heute keine Empfehlung „Dip kaufen\".</p>\n    <ul>\n      <li><span class=\"chip hot\">CHIPS</span> <strong>AMD gewinnt und fällt.</strong> „Advancing AI 2026\" brachte EPYC „Venice\" (erster x86-Server-Chip in Volumen auf TSMC-2nm), Instinct MI450/MI455X und Helios-Racks — plus Anthropic (2 GW), OpenAI + Meta (12 GW), Azure als Anker. Aktie <strong>529,48 $, rund −4 %</strong> (intraday 23.07.), trotz <strong>über +100 % seit Jahresbeginn</strong>. Klassisches „Sell the News\".</li>\n      <li><span class=\"chip hot\">CAPEX</span> <strong>OpenAI hebt die KI-Rechnung auf 750 Mrd. $ bis 2030</strong> (vorher 600 Mrd. $, laut WSJ) und baut mit <strong>„Project Camellia\"</strong> (20 Mrd. $, Georgia) erstmals ein <em>eigenes</em> Rechenzentrum statt zu mieten. Kontext: 2025 verlor OpenAI <strong>38,5 Mrd. $</strong> bei 13,07 Mrd. $ Umsatz.</li>\n      <li><span class=\"chip\">INDIZES</span> <strong>Nasdaq 25.137,69 (−2,15 %), S&amp;P 500 7.408,30 (−1,21 %), Dow 51.711,65 (−0,97 %)</strong> — Schluss <strong>Do 23.07., 16:00 EDT / 17:00 BRT</strong>. Getroffen wurden die KI-<em>Käufer</em>: GOOGL −7,4 %, AMZN −4,5 %, META −4,4 %, MSFT −2,1 % — der <em>Verkäufer</em> NVDA nur −1,6 %.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 100,28 $ (24.07., −0,40 %)</strong> nach dem Sprung über 100 $ am Donnerstag (Huthi-Angriff auf zwei saudische Tanker). <strong>+36,5 % auf Monatssicht, +45,5 % zum Vorjahr.</strong> WTI <strong>91,63 $</strong> (TradingEconomics) — eine zweite Quelle nennt 86,42 $, rund 6 % Differenz, hier geflaggt.</li>\n      <li><span class=\"chip good\">KRYPTO</span> <strong>BTC 65.294 $ (24 h −0,44 %), ETH 1.876,59 $ (24 h −2,25 %)</strong> — Live-Stand 24.07. Bemerkenswert: An einem −2,15-%-Nasdaq-Tag blieb Krypto fast unbewegt. <strong>Sieben Zufluss-Tage in Folge</strong> bei den Bitcoin-ETFs (14.–23.07., +981,2 Mio. $), aber Fear-&amp;-Greed bei <strong>28 (Angst)</strong>.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>4.027,35 $/Unze (Live-Stand 24.07., Vormittag BRT, −0,55 %)</strong> — Gold fällt, <em>obwohl</em> Öl springt und Aktien fallen: Der Zinskanal (Öl → Inflation → länger hohe Zinsen) schlägt heute den Fluchtkanal.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>Memecoins &amp; Gaming im Minus, KI-Token gemischt:</strong> DOGE −4,8 %, PEPE −2,5 %, GALA −1,7 % · TAO 193 $ (−1,1 %), RENDER 1,49 $ (−1,4 %), <strong>NEAR +2,2 %</strong> als einziger Gewinner. Gesamt-Marktkapitalisierung 2,3 Bio. $ (−1,3 %).</li>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>Mi 29.07.: FOMC-Entscheid 14:00 EDT / 15:00 BRT</strong> (CME FedWatch: rund 63,5 % Halt bei 3,50–3,75 % gegen rund 36,5 % Zinserhöhung, Stand 23.07.; Polymarket rund 74 % „keine Änderung\" — die Erhöhungs-Wette steigt in die Sitzung hinein), Chef Kevin Warsh danach — <strong>am selben Abend Microsoft und Meta, am 30.07. Apple und Amazon.</strong> Vier Capex-Ansagen in einer Woche, plus die Notenbank.</li>\n      <li><span class=\"chip hot\">URTEIL</span> <strong>Fünfmal Halten, kein Kaufen in die Schwäche.</strong> AMD, der Big-Tech-Komplex, Öl, Gold und Krypto-Core stehen alle auf HALTEN — vor einer Woche mit vier Capex-Zahlen und einem Zinsentscheid. Erste mögliche Aktion frühestens <strong>Fr 31.07.</strong></li>\n    </ul></div>",

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Ein Sicherheits-Freitag, wie er im Buche steht. Eine neun Jahre alte Linux-Kernel-Lücke schenkt lokalen Nutzern Root; die Five Eyes warnen, dass ein russischer Staatsakteur seit einem Jahr Zimbra-Postfächer leerräumt; und eine Malvertising-Kampagne missbraucht ausgerechnet die Vertrauenswürdigkeit der claude.ai-Domain, um einen Fernzugriffs-Trojaner zu verteilen. Dazwischen drei Infrastruktur-Ausfälle, deren zwei dev-relevante dieselbe Wurzel haben: ein abgelaufenes Zertifikat, eine nicht verteilte Config. Nichts davon ist Nacht-Alarm — aber die Lehren sind alt und unbequem.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>RefluXFS (CVE-2026-64600)</strong>: Race Condition im XFS-Copy-on-Write-Pfad, seit Linux 4.11 (Feb. 2017) im Baum, hebt lokale Nutzer auf Root. CVSS 7,8, Qualys schätzt 16,4 Mio. betroffene Systeme. Fix seit 16.07. gemerged, Distros backporten. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Five Eyes / Zimbra</strong>: CISA-Advisory AA26-204A (23.07.) — Russlands „Laundry Bear\" nutzt seit ≥ Juli 2025 die schon im November gepatchte Zimbra-Lücke CVE-2025-66376 aus und exfiltriert 90 Tage E-Mail plus das ganze Adressbuch. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FakeAgent</strong>: Bing-Anzeigen führten auf eine falsche „Claude Desktop\"-Downloadseite, veröffentlicht als öffentliches Artifact auf der echten claude.ai-Domain, die dann auf externe Angreifer-Domains weiterleitete — dort erst die Payload SectopRAT. Rund 7.100 Aufrufe/Downloads, ≥ 29 Organisationen. Eine Lieferketten-Story, keine Modell-Story. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong>: 19./20.07. rund 4h50m keine Verbindung für self-hosted und „larger\" Runner — abgelaufenes internes SSL-Zertifikat. Standard-Runner unberührt. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>AWS CloudFront</strong>: 16.07. ~3,5 h global 5xx (Canvas, Blackboard, Hugging Face) — eine Frankfurter AZ kippte die VPC-Origins-Control-Plane durch. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV</strong>: sechs neue aktiv ausgenutzte Lücken am 21./22.07. (u. a. WordPress Core, Check Point SmartConsole). SharePoint-on-prem-Frist läuft <strong>Samstag</strong> ab — heute letzter Werktag. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulierung</span> <strong>SAP &amp; EU</strong>: Kommission schließt Wettbewerbs-Verfahren — SAP lockert für zehn Jahre die On-Premise-Wartungsfesseln (Drittanbieter-Support, Shelfware-Kündigung). Cloud bleibt außen vor. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Meta</strong>: 22.07. gegen 13:00 GMT global gestört (FB/IG/WhatsApp), Ursache unbestätigt — keine offizielle Post-Mortem. <span class=\"chip\">Global</span></li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Ein Sicherheits-Freitag, wie er im Buche steht. Eine neun Jahre alte Linux-Kernel-Lücke schenkt lokalen Nutzern Root; die Five Eyes warnen, dass ein russischer Staatsakteur seit einem Jahr Zimbra-Postfächer leerräumt; und eine Malvertising-Kampagne missbraucht ausgerechnet die Vertrauenswürdigkeit der claude.ai-Domain, um einen Fernzugriffs-Trojaner zu verteilen. Dazwischen drei Infrastruktur-Ausfälle, deren zwei dev-relevante dieselbe Wurzel haben: ein abgelaufenes Zertifikat, eine nicht verteilte Config. Nichts davon ist Nacht-Alarm — aber die Lehren sind alt und unbequem.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>RefluXFS (CVE-2026-64600)</strong>: Race Condition im XFS-Copy-on-Write-Pfad, seit Linux 4.11 (Feb. 2017) im Baum, hebt lokale Nutzer auf Root. CVSS 7,8, Qualys schätzt 16,4 Mio. betroffene Systeme. Fix seit 16.07. gemerged, Distros backporten. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Five Eyes / Zimbra</strong>: CISA-Advisory AA26-204A (23.07.) — Russlands „Laundry Bear\" nutzt seit ≥ Juli 2025 die schon im November gepatchte Zimbra-Lücke CVE-2025-66376 aus und exfiltriert 90 Tage E-Mail plus das ganze Adressbuch. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FakeAgent</strong>: Bing-Anzeigen führten auf eine falsche „Claude Desktop\"-Downloadseite, veröffentlicht als öffentliches Artifact auf der echten claude.ai-Domain, die dann auf externe Angreifer-Domains weiterleitete — dort erst die Payload SectopRAT. Rund 7.100 Aufrufe/Downloads, ≥ 29 Organisationen. Eine Lieferketten-Story, keine Modell-Story. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong>: 19./20.07. rund 4h50m keine Verbindung für self-hosted und „larger\" Runner — abgelaufenes internes SSL-Zertifikat. Standard-Runner unberührt. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>AWS CloudFront</strong>: 16.07. ~3,5 h global 5xx (Canvas, Blackboard, Hugging Face) — eine Frankfurter AZ kippte die VPC-Origins-Control-Plane durch. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV</strong>: sechs neue aktiv ausgenutzte Lücken am 21./22.07. (u. a. WordPress Core, Check Point SmartConsole). SharePoint-on-prem-Frist läuft <strong>Samstag</strong> ab — heute letzter Werktag. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulierung</span> <strong>SAP &amp; EU</strong>: Kommission schließt Wettbewerbs-Verfahren — SAP lockert für zehn Jahre die On-Premise-Wartungsfesseln (Drittanbieter-Support, Shelfware-Kündigung). Cloud bleibt außen vor. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Meta</strong>: 22.07. gegen 13:00 GMT global gestört (FB/IG/WhatsApp), Ursache unbestätigt — keine offizielle Post-Mortem. <span class=\"chip\">Global</span></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">A security Friday straight out of the textbook. A nine-year-old Linux kernel flaw hands root to local users; the Five Eyes warn that a Russian state actor has been emptying Zimbra mailboxes for a year; and a malvertising campaign abuses the trustworthiness of the claude.ai domain of all things to distribute a remote-access trojan. In between, three infrastructure outages, two of them dev-relevant and sharing the same root cause: an expired certificate, a config that wasn't rolled out. None of this is a middle-of-the-night alert — but the lessons are old and uncomfortable.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>RefluXFS (CVE-2026-64600)</strong>: race condition in XFS's copy-on-write path, in the tree since Linux 4.11 (Feb. 2017), elevates local users to root. CVSS 7.8, Qualys estimates 16.4 million affected systems. Fix merged since July 16, distros are backporting. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Five Eyes / Zimbra</strong>: CISA advisory AA26-204A (July 23) — Russia's \"Laundry Bear\" has been exploiting the Zimbra flaw CVE-2025-66376, patched back in November, since at least July 2025, and exfiltrates 90 days of email plus the entire address book. <span class=\"chip\">EU</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FakeAgent</strong>: Bing ads led to a fake \"Claude Desktop\" download page, published as a public artifact on the real claude.ai domain, which then redirected to external attacker domains — only there did it serve the payload SectopRAT. About 7,100 views/downloads, ≥ 29 organizations. A supply-chain story, not a model story. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong>: July 19–20, about 4h50m of no connectivity for self-hosted and \"larger\" runners — an expired internal SSL certificate. Standard runners unaffected. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>AWS CloudFront</strong>: July 16, ~3.5h of global 5xx errors (Canvas, Blackboard, Hugging Face) — a Frankfurt AZ took down the VPC origins control plane. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV</strong>: six new actively exploited flaws on July 21–22 (including WordPress Core, Check Point SmartConsole). The SharePoint on-prem deadline expires <strong>Saturday</strong> — today is the last business day. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulation</span> <strong>SAP &amp; EU</strong>: the Commission closes its competition proceeding — SAP loosens its on-premise maintenance shackles for ten years (third-party support, shelfware cancellation). Cloud stays out of scope. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Meta</strong>: July 22, around 13:00 GMT, global outage (FB/IG/WhatsApp), cause unconfirmed — no official post-mortem. <span class=\"chip\">Global</span></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Uma sexta-feira de segurança de manual. Uma falha de nove anos no kernel Linux dá privilégio de root a usuários locais; os Five Eyes alertam que um agente estatal russo esvazia caixas de e-mail Zimbra há um ano; e uma campanha de malvertising abusa justamente da confiabilidade do domínio claude.ai para distribuir um trojan de acesso remoto. No meio disso, três quedas de infraestrutura, duas delas relevantes para devs e com a mesma raiz: um certificado vencido, uma configuração não distribuída. Nada disso é alarme de madrugada — mas as lições são antigas e incômodas.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>RefluXFS (CVE-2026-64600)</strong>: condição de corrida no caminho de copy-on-write do XFS, presente desde o Linux 4.11 (fev. 2017), eleva usuários locais a root. CVSS 7,8, a Qualys estima 16,4 milhões de sistemas afetados. Correção mesclada desde 16/07, as distros estão fazendo backport. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Five Eyes / Zimbra</strong>: advisory da CISA AA26-204A (23/07) — o \"Laundry Bear\" da Rússia explora desde pelo menos julho de 2025 a falha do Zimbra CVE-2025-66376, já corrigida em novembro, e exfiltra 90 dias de e-mail mais toda a lista de endereços. <span class=\"chip\">UE</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FakeAgent</strong>: anúncios no Bing levavam a uma página falsa de download do \"Claude Desktop\", publicada como artifact público no domínio real claude.ai, que então redirecionava para domínios externos de atacantes — só lá era entregue o payload SectopRAT. Cerca de 7.100 visualizações/downloads, ≥ 29 organizações. Uma história de cadeia de suprimentos, não de modelo. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong>: 19–20/07, cerca de 4h50m sem conectividade para runners self-hosted e \"larger\" — certificado SSL interno vencido. Runners padrão não foram afetados. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>AWS CloudFront</strong>: 16/07, ~3,5h de erros 5xx globais (Canvas, Blackboard, Hugging Face) — uma AZ de Frankfurt derrubou o control plane de origens VPC. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV</strong>: seis novas falhas ativamente exploradas em 21–22/07 (incluindo WordPress Core, Check Point SmartConsole). O prazo do SharePoint on-prem vence no <strong>sábado</strong> — hoje é o último dia útil. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulação</span> <strong>SAP &amp; UE</strong>: a Comissão encerra o processo de concorrência — a SAP afrouxa por dez anos as amarras de manutenção on-premise (suporte de terceiros, cancelamento de shelfware). A nuvem fica de fora. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Meta</strong>: 22/07, por volta das 13h GMT, instabilidade global (FB/IG/WhatsApp), causa não confirmada — sem post-mortem oficial. <span class=\"chip\">Global</span></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Un viernes de seguridad de manual. Una falla de nueve años en el kernel de Linux le da privilegios de root a usuarios locales; los Five Eyes advierten que un actor estatal ruso lleva un año vaciando buzones de Zimbra; y una campaña de malvertising abusa justo de la confiabilidad del dominio claude.ai para distribuir un troyano de acceso remoto. En medio de todo esto, tres caídas de infraestructura, dos de ellas relevantes para desarrolladores y con la misma raíz: un certificado vencido, una configuración no distribuida. Nada de esto es una alerta de madrugada — pero las lecciones son viejas e incómodas.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>RefluXFS (CVE-2026-64600)</strong>: condición de carrera en la ruta de copy-on-write de XFS, presente desde Linux 4.11 (feb. 2017), eleva a usuarios locales a root. CVSS 7,8, Qualys estima 16,4 millones de sistemas afectados. Parche fusionado desde el 16/07, las distros están haciendo backport. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Five Eyes / Zimbra</strong>: advisory de la CISA AA26-204A (23/07) — el \"Laundry Bear\" de Rusia explota desde al menos julio de 2025 la falla de Zimbra CVE-2025-66376, ya parcheada en noviembre, y exfiltra 90 días de correo más toda la libreta de direcciones. <span class=\"chip\">UE</span></li>\n      <li><span class=\"chip hot\">Sec</span> <strong>FakeAgent</strong>: anuncios de Bing llevaban a una página falsa de descarga de \"Claude Desktop\", publicada como artifact público en el dominio real claude.ai, que luego redirigía a dominios externos de atacantes — ahí sí se entregaba el payload SectopRAT. Cerca de 7.100 vistas/descargas, ≥ 29 organizaciones. Una historia de cadena de suministro, no de modelo. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong>: 19–20/07, alrededor de 4h50m sin conectividad para runners self-hosted y \"larger\" — certificado SSL interno vencido. Los runners estándar no se vieron afectados. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>AWS CloudFront</strong>: 16/07, ~3,5h de errores 5xx globales (Canvas, Blackboard, Hugging Face) — una AZ de Frankfurt tumbó el control plane de orígenes VPC. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV</strong>: seis fallas nuevas explotadas activamente el 21–22/07 (incluidos WordPress Core, Check Point SmartConsole). El plazo de SharePoint on-prem vence el <strong>sábado</strong> — hoy es el último día hábil. <span class=\"chip\">Global</span></li>\n      <li><span class=\"chip\">Regulación</span> <strong>SAP y UE</strong>: la Comisión cierra el procedimiento de competencia — SAP relaja durante diez años las ataduras de mantenimiento on-premise (soporte de terceros, cancelación de shelfware). La nube queda fuera. <span class=\"chip\">DE</span></li>\n      <li><span class=\"chip\">Infra</span> <strong>Meta</strong>: 22/07, alrededor de las 13:00 GMT, interrupción global (FB/IG/WhatsApp), causa no confirmada — sin post-mortem oficial. <span class=\"chip\">Global</span></li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der rote Faden dieser Woche ist keine neue Preisrunde, sondern eine neue Bauform. Die Werkzeuge hören auf, ein einzelner Agent zu sein, der stur eine Aufgabe abarbeitet — und werden zum kleinen Team, das sich selbst aufteilt und verteilt. GPT-5.6 Sol bekommt einen Subagenten-Modus, der mehrere Läufe in einem Request bündelt. Cursor bekommt einen Router, der jede Anfrage an das passende Modell schickt. Copilot verdrahtet einen Cloud-Agenten fest in deinen Issue-Tracker und spricht die nächste MCP-Version. Drei Anbieter, dieselbe Richtung: weg vom Solo-Modell, hin zur orchestrierten Arbeit. Die Preisleiter von letzter Woche bleibt bestehen — heute geht es um Fähigkeiten, nicht um Cent.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 „Multi-agent“</strong>: neuer <em>max</em>-Reasoning-Grad plus ein Beta-Modus (Flag <code>responses_multi_agent=v1</code>), der nebenläufige Subagenten startet und in einem einzigen Request zusammenführt — gedacht für mehrstufige Recherche und lange Coding-Projekte.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>1,05 Mio. Tokens Kontext, Wissensstand 16.02.2026</strong>, max. 128.000 Tokens Ausgabe. Dev-Preise unverändert: Sol <span class=\"stat\">5 $</span>/<span class=\"stat\">30 $</span>, Terra 2,50 $/15 $, Luna 1 $/6 $ je Mio. Tokens.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> in der Meta-Model-API-Vorschau (seit 09.07., 1 Mio. Kontext) — Frühpartner Replit, Cline, Box. Preise nennt Meta nicht; kolportiert wird nur „rund 10× günstiger und doppelt so schnell“ als Fable 5. Aber: <em>kein</em> unabhängiger SWE-Bench-Verified-Wert, die kursierende „77,4 %“ ist ein fehletikettierter BenchLM-Mischwert.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Router</strong> (22.07.): schickt jede Anfrage automatisch ans passende Modell, drei Stufen — Intelligence, Balance, Cost. Standard für Teams-Pläne.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Copilot-Cloud-Agent für Linear GA</strong> (23.07.) plus Unterstützung der nächsten MCP-Spezifikation im GitHub-MCP-Server. Agent-Automatisierung für GitHub Issues in der öffentlichen Vorschau.</li>\n      <li><span class=\"chip\">Tool</span> <strong>JetBrains</strong> bündelt AI Assistant + Junie unter einem Abo mit kostenloser Stufe; <strong>Windsurf</strong> ist final zu „Devin Desktop“ geworden, Cascade zum 01.07. abgekündigt.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (Stand 23.07.)</strong> weiter fest in Anthropic-Hand: Mythos 5 95,5 %, Fable 5 95 %, Opus 4.8 88,6 % — alles selbst gemeldet, die Woche-Launches stehen gar nicht erst drauf.</li>\n      <li><span class=\"chip\">Quelle</span> <strong>Beleglage</strong>: swebench.com und livecodebench.github.io sind JS-Hüllen ohne lesbare Zahlen; Muse-Spark-Kostenvorteil und Devin-Local-Effizienz sind einfach-belegte Anbieter-/Zweitquellen. Als solche gekennzeichnet.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der rote Faden dieser Woche ist keine neue Preisrunde, sondern eine neue Bauform. Die Werkzeuge hören auf, ein einzelner Agent zu sein, der stur eine Aufgabe abarbeitet — und werden zum kleinen Team, das sich selbst aufteilt und verteilt. GPT-5.6 Sol bekommt einen Subagenten-Modus, der mehrere Läufe in einem Request bündelt. Cursor bekommt einen Router, der jede Anfrage an das passende Modell schickt. Copilot verdrahtet einen Cloud-Agenten fest in deinen Issue-Tracker und spricht die nächste MCP-Version. Drei Anbieter, dieselbe Richtung: weg vom Solo-Modell, hin zur orchestrierten Arbeit. Die Preisleiter von letzter Woche bleibt bestehen — heute geht es um Fähigkeiten, nicht um Cent.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 „Multi-agent“</strong>: neuer <em>max</em>-Reasoning-Grad plus ein Beta-Modus (Flag <code>responses_multi_agent=v1</code>), der nebenläufige Subagenten startet und in einem einzigen Request zusammenführt — gedacht für mehrstufige Recherche und lange Coding-Projekte.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>1,05 Mio. Tokens Kontext, Wissensstand 16.02.2026</strong>, max. 128.000 Tokens Ausgabe. Dev-Preise unverändert: Sol <span class=\"stat\">5 $</span>/<span class=\"stat\">30 $</span>, Terra 2,50 $/15 $, Luna 1 $/6 $ je Mio. Tokens.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> in der Meta-Model-API-Vorschau (seit 09.07., 1 Mio. Kontext) — Frühpartner Replit, Cline, Box. Preise nennt Meta nicht; kolportiert wird nur „rund 10× günstiger und doppelt so schnell“ als Fable 5. Aber: <em>kein</em> unabhängiger SWE-Bench-Verified-Wert, die kursierende „77,4 %“ ist ein fehletikettierter BenchLM-Mischwert.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Router</strong> (22.07.): schickt jede Anfrage automatisch ans passende Modell, drei Stufen — Intelligence, Balance, Cost. Standard für Teams-Pläne.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Copilot-Cloud-Agent für Linear GA</strong> (23.07.) plus Unterstützung der nächsten MCP-Spezifikation im GitHub-MCP-Server. Agent-Automatisierung für GitHub Issues in der öffentlichen Vorschau.</li>\n      <li><span class=\"chip\">Tool</span> <strong>JetBrains</strong> bündelt AI Assistant + Junie unter einem Abo mit kostenloser Stufe; <strong>Windsurf</strong> ist final zu „Devin Desktop“ geworden, Cascade zum 01.07. abgekündigt.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (Stand 23.07.)</strong> weiter fest in Anthropic-Hand: Mythos 5 95,5 %, Fable 5 95 %, Opus 4.8 88,6 % — alles selbst gemeldet, die Woche-Launches stehen gar nicht erst drauf.</li>\n      <li><span class=\"chip\">Quelle</span> <strong>Beleglage</strong>: swebench.com und livecodebench.github.io sind JS-Hüllen ohne lesbare Zahlen; Muse-Spark-Kostenvorteil und Devin-Local-Effizienz sind einfach-belegte Anbieter-/Zweitquellen. Als solche gekennzeichnet.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This week's throughline isn't a new pricing round — it's a new architecture. The tools are giving up being a single agent that grinds stubbornly through one task, and are becoming a small team that splits up and distributes the work on its own. GPT-5.6 Sol gets a subagent mode that bundles several runs into one request. Cursor gets a router that sends every request to the right model. Copilot wires a cloud agent straight into your issue tracker and speaks the next MCP version. Three vendors, one direction: away from the solo model, toward orchestrated work. Last week's price ladder still stands — today is about capability, not cents.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 \"Multi-agent\"</strong>: a new <em>max</em> reasoning tier plus a beta mode (flag <code>responses_multi_agent=v1</code>) that launches concurrent subagents and merges them into a single request — built for multi-step research and long coding projects.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>1.05M-token context, knowledge cutoff February 16, 2026</strong>, max 128,000 output tokens. Dev pricing unchanged: Sol <span class=\"stat\">$5</span>/<span class=\"stat\">$30</span>, Terra $2.50/$15, Luna $1/$6 per million tokens.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> in the Meta Model API preview (since July 9, 1M context) — early partners Replit, Cline, Box. Meta doesn't publish pricing; the only claim circulating is \"roughly 10x cheaper and twice as fast\" as Fable 5. But: <em>no</em> independent SWE-Bench Verified score — the circulating \"77.4%\" is a mislabeled BenchLM composite figure.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Router</strong> (July 22): automatically sends every request to the right model, three tiers — Intelligence, Balance, Cost. Default for Team plans.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Copilot cloud agent for Linear GA</strong> (July 23) plus support for the next MCP specification in the GitHub MCP server. Agent automation for GitHub Issues in public preview.</li>\n      <li><span class=\"chip\">Tool</span> <strong>JetBrains</strong> bundles AI Assistant + Junie under one subscription with a free tier; <strong>Windsurf</strong> has fully rebranded to \"Devin Desktop,\" with Cascade sunset as of July 1.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (as of July 23)</strong> is still firmly in Anthropic's hands: Mythos 5 95.5%, Fable 5 95%, Opus 4.8 88.6% — all self-reported, and this week's launches aren't even listed yet.</li>\n      <li><span class=\"chip\">Source</span> <strong>Sourcing note</strong>: swebench.com and livecodebench.github.io are JS shells with no readable numbers; the Muse Spark cost-advantage claim and the Devin Local efficiency claim are single-sourced vendor/secondary citations. Flagged as such.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O fio condutor desta semana não é uma nova rodada de preços, mas um novo formato. As ferramentas deixam de ser um agente único que executa teimosamente uma tarefa — e passam a ser uma pequena equipe que se divide e se distribui sozinha. O GPT-5.6 Sol ganha um modo de subagentes que reúne várias execuções em uma única requisição. O Cursor ganha um roteador que envia cada pedido para o modelo certo. O Copilot conecta um agente na nuvem direto ao seu rastreador de tarefas e já fala a próxima versão do MCP. Três fornecedores, a mesma direção: sair do modelo solo, ir para o trabalho orquestrado. A escada de preços da semana passada permanece — hoje é sobre capacidade, não sobre centavos.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 \"Multi-agent\"</strong>: novo grau de raciocínio <em>max</em>, mais um modo beta (flag <code>responses_multi_agent=v1</code>) que inicia subagentes simultâneos e os reúne em uma única requisição — pensado para pesquisas em várias etapas e projetos longos de programação.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>1,05 mi. de tokens de contexto, corte de conhecimento em 16/02/2026</strong>, máx. 128.000 tokens de saída. Preços para desenvolvedores inalterados: Sol <span class=\"stat\">5 $</span>/<span class=\"stat\">30 $</span>, Terra 2,50 $/15 $, Luna 1 $/6 $ por milhão de tokens.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> na prévia pública da Meta Model API (desde 09/07, 1 mi. de contexto) — parceiros iniciais Replit, Cline, Box. A Meta não divulga preços; o que circula é só a alegação de que seria \"cerca de 10× mais barato e duas vezes mais rápido\" que o Fable 5. Mas: <em>nenhum</em> valor independente de SWE-Bench Verified — o \"77,4 %\" que circula é um valor composto do BenchLM etiquetado errado.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Router</strong> (22/07): envia cada pedido automaticamente para o modelo certo, três níveis — Intelligence, Balance e Cost. Padrão para os planos Teams.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Agente na nuvem do Copilot para o Linear em GA</strong> (23/07), além de suporte à próxima especificação do MCP no servidor MCP do GitHub. Automação de agentes para GitHub Issues em prévia pública.</li>\n      <li><span class=\"chip\">Tool</span> <strong>JetBrains</strong> reúne AI Assistant + Junie em uma única assinatura com um nível gratuito; o <strong>Windsurf</strong> virou definitivamente \"Devin Desktop\", com o Cascade descontinuado em 01/07.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (dados de 23/07)</strong> segue firmemente nas mãos da Anthropic: Mythos 5 com 95,5 %, Fable 5 com 95 %, Opus 4.8 com 88,6 % — tudo autorrelatado, e os lançamentos desta semana nem sequer aparecem ainda.</li>\n      <li><span class=\"chip\">Fonte</span> <strong>Base de evidências</strong>: swebench.com e livecodebench.github.io são cascas em JavaScript sem números legíveis; a suposta vantagem de custo do Muse Spark e a eficiência do Devin Local são citações de fornecedor/fonte secundária com fonte única. Sinalizado como tal.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El hilo conductor de esta semana no es una nueva ronda de precios, sino un nuevo formato. Las herramientas dejan de ser un agente único que resuelve una tarea de forma testaruda — y se convierten en un pequeño equipo que se divide y se distribuye por sí mismo. GPT-5.6 Sol recibe un modo de subagentes que agrupa varias ejecuciones en una sola solicitud. Cursor recibe un enrutador que envía cada petición al modelo adecuado. Copilot conecta un agente en la nube directamente a tu rastreador de tickets y ya habla la próxima versión de MCP. Tres proveedores, la misma dirección: alejarse del modelo solitario, acercarse al trabajo orquestado. La escalera de precios de la semana pasada se mantiene — hoy se trata de capacidades, no de centavos.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 \"Multi-agent\"</strong>: nuevo nivel de razonamiento <em>max</em>, más un modo beta (flag <code>responses_multi_agent=v1</code>) que lanza subagentes simultáneos y los combina en una sola solicitud — pensado para investigación en varios pasos y proyectos largos de programación.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>1,05 millones de tokens de contexto, corte de conocimiento el 16/02/2026</strong>, máx. 128.000 tokens de salida. Precios para desarrolladores sin cambios: Sol <span class=\"stat\">5 $</span>/<span class=\"stat\">30 $</span>, Terra 2,50 $/15 $, Luna 1 $/6 $ por millón de tokens.</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> en la vista previa pública de la Meta Model API (desde el 09/07, contexto de 1 millón) — socios iniciales Replit, Cline, Box. Meta no publica precios; lo único que circula es la afirmación de que sería \"unas 10 veces más barato y el doble de rápido\" que Fable 5. Pero: <em>ningún</em> valor independiente de SWE-Bench Verified — el \"77,4 %\" que circula es una cifra compuesta de BenchLM mal etiquetada.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor Router</strong> (22/07): envía automáticamente cada petición al modelo correcto, con tres niveles — Intelligence, Balance y Cost. Predeterminado para los planes Teams.</li>\n      <li><span class=\"chip hot\">MCP</span> <strong>Agente en la nube de Copilot para Linear en GA</strong> (23/07), más soporte para la próxima especificación de MCP en el servidor MCP de GitHub. Automatización de agentes para GitHub Issues en vista previa pública.</li>\n      <li><span class=\"chip\">Tool</span> <strong>JetBrains</strong> agrupa AI Assistant + Junie en una sola suscripción con un nivel gratuito; <strong>Windsurf</strong> se convirtió definitivamente en \"Devin Desktop\", con Cascade descontinuado el 01/07.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified (al 23/07)</strong> sigue firmemente en manos de Anthropic: Mythos 5 con 95,5 %, Fable 5 con 95 %, Opus 4.8 con 88,6 % — todo autoinformado, y los lanzamientos de esta semana ni siquiera aparecen todavía.</li>\n      <li><span class=\"chip\">Fuente</span> <strong>Situación de las fuentes</strong>: swebench.com y livecodebench.github.io son cáscaras de JavaScript sin números legibles; la supuesta ventaja de costo de Muse Spark y la eficiencia de Devin Local son citas de proveedor/fuente secundaria con una sola fuente. Señalado como tal.</li>\n    </ul></div>"

hip\">REG · EU</span> <strong>AI Act:</strong> Konsultation zu den Hochrisiko-Leitlinien lief bis <strong>23.07.</strong> aus; die Transparenzpflichten und die formale Omnibus-Verabschiedung stehen vor dem <strong>02.08.</strong> (Verfahrensdetails im gestrigen Brief).</li>\n      <li><span class=\"chip good\">MARKT</span> <strong>Agenten-Markt:</strong> Enterprise-Agentic-AI <strong>5,3 → 24,5 Mrd. $</strong> bis 2030 (Grand View, nur Such-Snippet). Voice-Plattformen ab <strong>0,07 $/Min.</strong> — alle self-serve, US-gehostet.</li>\n      <li><span class=\"chip good\">twiceD</span> Zwei Ideen: <strong>EU-gehosteter, hands-on Voice-Agent</strong> für den Mittelstand (die Presence-Lücke) und ein <strong>on-prem Agenten-Kontrollturm</strong> (Register + Guardrails + Audit-Log).</li>\n    </ul></div>",
