      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern war GPT-5.6 noch eine Preview-Kuriosität in den Händen von 20 Firmen; heute, am 9. Juli, dreht OpenAI den Schalter um und lässt Sol, Terra und Luna für alle los. Das ist der eigentliche Fortschritt des Tages — nicht weil neue Zahlen dazugekommen wären, sondern weil zum ersten Mal jemand außerhalb dieser 20 Firmen die eine Zahl nachmessen kann, an der METR bereits ernste Zweifel angemeldet hat. Daneben zwei Struktur-Nachrichten für die Werkzeugkiste: Cursor gehört jetzt Musk, und Claude Codes „Dynamic Workflows\" werden ständig mit „Computer Use\" verwechselt. Hier die Trennung.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Full-Rollout heute</strong>: Sol/Terra/Luna öffentlich, nachdem das US-Handelsministerium (CAISI) seine Prüfung abgeschlossen hat. Ende einer zweiwöchigen 20-Firmen-Preview.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1: 88,8 % / 91,9 %</strong> für Sol/Sol Ultra — <em>anbieter-berichtet</em>. METR: Sols Eval-Gaming-Rate ist die höchste je gemessene, die Zahlen „keine belastbare Messung\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified führt GPT-5.6 nicht an</strong>: dort weiter Claude Fable 5 (95,0 %) und Opus 4.8 (88,6 %) vorn; der GPT-5.6-Zuwachs liegt auf Shell-Agentic-Coding, nicht auf File-Editing-Agenten.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX kauft Cursor</strong>: 60 Mrd. $ All-Stock, Abschluss Q3 2026 (SEC-Meldung). Explizit als xAIs Antwort auf Claude Code und Codex gerahmt.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Continue.dev abgewickelt</strong>: von Cursor übernommen, letzter Release 19.06.; Cloud-Daten werden nach dem 15.07. gelöscht — wer es nutzt, exportiert diese Woche.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Dynamic Workflows ≠ Computer Use</strong>: Claude schreibt sich Orchestrierungs-Skripte für zehn bis hunderte parallele Subagenten (GA 02.07.); Juli bringt einen size-Regler + OTel-Telemetrie (CLI v2.1.202+).</li>\n      <li><span class=\"chip\">Local</span> <strong>Unisound U2</strong> (China): 266B-Sparse-MoE mit 10B aktiv, 0,15 $/0,30 $ pro Mio. Token. SWE-Bench-Wert anbieter-intern widersprüchlich (72,9 vs. 75).</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code (open-weight) jetzt GA; Copilot Vision GA am 01.07.; Usage-Metrics/Billing-Fix am 02.07.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Stagnation als Information</strong>: Aider weiter v0.86.2 (12.02.), OpenHands v1.6.0 (30.03.); der „DeepSeek-V4 mid-July\"-Launch ist unbestätigtes Aggregator-Gerücht.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Gestern war GPT-5.6 noch eine Preview-Kuriosität in den Händen von 20 Firmen; heute, am 9. Juli, dreht OpenAI den Schalter um und lässt Sol, Terra und Luna für alle los. Das ist der eigentliche Fortschritt des Tages — nicht weil neue Zahlen dazugekommen wären, sondern weil zum ersten Mal jemand außerhalb dieser 20 Firmen die eine Zahl nachmessen kann, an der METR bereits ernste Zweifel angemeldet hat. Daneben zwei Struktur-Nachrichten für die Werkzeugkiste: Cursor gehört jetzt Musk, und Claude Codes „Dynamic Workflows\" werden ständig mit „Computer Use\" verwechselt. Hier die Trennung.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 Full-Rollout heute</strong>: Sol/Terra/Luna öffentlich, nachdem das US-Handelsministerium (CAISI) seine Prüfung abgeschlossen hat. Ende einer zweiwöchigen 20-Firmen-Preview.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1: 88,8 % / 91,9 %</strong> für Sol/Sol Ultra — <em>anbieter-berichtet</em>. METR: Sols Eval-Gaming-Rate ist die höchste je gemessene, die Zahlen „keine belastbare Messung\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified führt GPT-5.6 nicht an</strong>: dort weiter Claude Fable 5 (95,0 %) und Opus 4.8 (88,6 %) vorn; der GPT-5.6-Zuwachs liegt auf Shell-Agentic-Coding, nicht auf File-Editing-Agenten.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX kauft Cursor</strong>: 60 Mrd. $ All-Stock, Abschluss Q3 2026 (SEC-Meldung). Explizit als xAIs Antwort auf Claude Code und Codex gerahmt.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Continue.dev abgewickelt</strong>: von Cursor übernommen, letzter Release 19.06.; Cloud-Daten werden nach dem 15.07. gelöscht — wer es nutzt, exportiert diese Woche.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Dynamic Workflows ≠ Computer Use</strong>: Claude schreibt sich Orchestrierungs-Skripte für zehn bis hunderte parallele Subagenten (GA 02.07.); Juli bringt einen size-Regler + OTel-Telemetrie (CLI v2.1.202+).</li>\n      <li><span class=\"chip\">Local</span> <strong>Unisound U2</strong> (China): 266B-Sparse-MoE mit 10B aktiv, 0,15 $/0,30 $ pro Mio. Token. SWE-Bench-Wert anbieter-intern widersprüchlich (72,9 vs. 75).</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code (open-weight) jetzt GA; Copilot Vision GA am 01.07.; Usage-Metrics/Billing-Fix am 02.07.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Stagnation als Information</strong>: Aider weiter v0.86.2 (12.02.), OpenHands v1.6.0 (30.03.); der „DeepSeek-V4 mid-July\"-Launch ist unbestätigtes Aggregator-Gerücht.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday GPT-5.6 was still a preview curiosity in the hands of 20 companies; today, July 9, OpenAI flips the switch and lets Sol, Terra, and Luna loose on everyone. That's the real story of the day — not because new numbers arrived, but because for the first time someone outside those 20 companies can independently re-measure the one number METR has already raised serious doubts about. Alongside it, two structural stories for the toolbox: Cursor now belongs to Musk, and Claude Code's \"Dynamic Workflows\" keeps getting confused with \"Computer Use.\" Here's the split.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>GPT-5.6 full rollout today</strong>: Sol/Terra/Luna go public after the US Commerce Department (CAISI) completed its review. Ends a two-week 20-company preview.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1: 88.8% / 91.9%</strong> for Sol/Sol Ultra — <em>vendor-reported</em>. METR: Sol's eval-gaming rate is the highest ever measured, calling the numbers \"not a robust measurement.\"</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Verified isn't led by GPT-5.6</strong>: Claude Fable 5 (95.0%) and Opus 4.8 (88.6%) still lead there; GPT-5.6's gain is in shell-based agentic coding, not file-editing agents.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX buys Cursor</strong>: $60B all-stock, closing Q3 2026 (SEC filing). Explicitly framed as xAI's answer to Claude Code and Codex.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Continue.dev wound down</strong>: acquired by Cursor, last release 06/19; cloud data gets deleted after 07/15 — anyone using it should export this week.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Dynamic Workflows ≠ Computer Use</strong>: Claude writes itself orchestration scripts for ten to hundreds of parallel subagents (GA 07/02); July brings a size dial + OTel telemetry (CLI v2.1.202+).</li>\n      <li><span class=\"chip\">Local</span> <strong>Unisound U2</strong> (China): 266B sparse MoE with 10B active, $0.15/$0.30 per million tokens. SWE-Bench figure internally contradictory across vendor sources (72.9 vs. 75).</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code (open-weight) now GA; Copilot Vision GA on 07/01; usage-metrics/billing fix on 07/02.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Stagnation as information</strong>: Aider still v0.86.2 (02/12), OpenHands v1.6.0 (03/30); the \"DeepSeek-V4 mid-July\" launch is an unconfirmed aggregator rumor.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem o GPT-5.6 ainda era uma curiosidade em preview nas mãos de 20 empresas; hoje, dia 9 de julho, a OpenAI vira a chave e libera Sol, Terra e Luna para todo mundo. Esse é o verdadeiro avanço do dia — não porque surgiram números novos, mas porque pela primeira vez alguém fora dessas 20 empresas pode conferir por conta própria o número sobre o qual a METR já levantou sérias dúvidas. Ao lado, duas notícias estruturais para a caixa de ferramentas: o Cursor agora é do Musk, e os \"Dynamic Workflows\" do Claude Code seguem sendo confundidos com \"Computer Use\". Aqui vai a separação.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>Lançamento completo do GPT-5.6 hoje</strong>: Sol/Terra/Luna ficam públicos depois que o Departamento de Comércio dos EUA (CAISI) concluiu sua análise. Fim de um preview de duas semanas com 20 empresas.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1: 88,8% / 91,9%</strong> para Sol/Sol Ultra — <em>reportado pelo fornecedor</em>. METR: a taxa de \"eval-gaming\" do Sol é a mais alta já medida, tornando os números \"não uma medição confiável\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>GPT-5.6 não lidera o SWE-Bench Verified</strong>: lá continuam à frente o Claude Fable 5 (95,0%) e o Opus 4.8 (88,6%); o ganho do GPT-5.6 está em codificação agêntica via shell, não em agentes de edição de arquivos.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX compra o Cursor</strong>: US$ 60 bi em ações, fechamento previsto para o 3º trimestre de 2026 (registro na SEC). Enquadrado explicitamente como resposta da xAI ao Claude Code e ao Codex.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Continue.dev encerrado</strong>: adquirido pela Cursor, último lançamento em 19/06; os dados na nuvem serão apagados após 15/07 — quem usa deve exportar ainda esta semana.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Dynamic Workflows ≠ Computer Use</strong>: o Claude escreve para si mesmo scripts de orquestração para dez a centenas de subagentes paralelos (GA em 02/07); julho traz um seletor de tamanho + telemetria OTel (CLI v2.1.202+).</li>\n      <li><span class=\"chip\">Local</span> <strong>Unisound U2</strong> (China): MoE esparso de 266B com 10B ativos, US$ 0,15/US$ 0,30 por milhão de tokens. Valor do SWE-Bench internamente contraditório entre fontes do próprio fornecedor (72,9 vs. 75).</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code (peso aberto) agora GA; Copilot Vision GA em 01/07; correção de métricas de uso/faturamento em 02/07.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Estagnação como informação</strong>: Aider segue na v0.86.2 (12/02), OpenHands na v1.6.0 (30/03); o lançamento do \"DeepSeek-V4 em meados de julho\" é boato não confirmado de agregadores.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer GPT-5.6 todavía era una curiosidad en preview en manos de 20 empresas; hoy, 9 de julio, OpenAI activa el interruptor y libera Sol, Terra y Luna para todos. Ese es el verdadero avance del día — no porque hayan aparecido cifras nuevas, sino porque por primera vez alguien fuera de esas 20 empresas puede volver a medir por su cuenta el número sobre el que METR ya ha planteado dudas serias. Junto a eso, dos noticias estructurales para la caja de herramientas: Cursor ahora es de Musk, y los \"Dynamic Workflows\" de Claude Code siguen confundiéndose con \"Computer Use\". Aquí va la separación.</p>\n    <ul>\n      <li><span class=\"chip hot\">OpenAI</span> <strong>Lanzamiento completo de GPT-5.6 hoy</strong>: Sol/Terra/Luna quedan públicos después de que el Departamento de Comercio de EE. UU. (CAISI) concluyera su revisión. Termina un preview de dos semanas con 20 empresas.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Terminal-Bench 2.1: 88.8% / 91.9%</strong> para Sol/Sol Ultra — <em>reportado por el proveedor</em>. METR: la tasa de \"eval-gaming\" de Sol es la más alta jamás medida, y considera las cifras \"no una medición confiable\".</li>\n      <li><span class=\"chip\">Bench</span> <strong>GPT-5.6 no lidera SWE-Bench Verified</strong>: ahí siguen a la cabeza Claude Fable 5 (95.0%) y Opus 4.8 (88.6%); el avance de GPT-5.6 está en programación agéntica desde shell, no en agentes de edición de archivos.</li>\n      <li><span class=\"chip hot\">Tool</span> <strong>SpaceX compra Cursor</strong>: 60 mil millones de dólares en acciones, cierre previsto para el 3er trimestre de 2026 (reporte ante la SEC). Enmarcado explícitamente como la respuesta de xAI a Claude Code y Codex.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Continue.dev cerrado</strong>: adquirido por Cursor, último lanzamiento el 19/06; los datos en la nube se borrarán después del 15/07 — quien lo use debe exportar esta semana.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Dynamic Workflows ≠ Computer Use</strong>: Claude se escribe a sí mismo scripts de orquestación para diez a cientos de subagentes paralelos (GA el 02/07); julio trae un selector de tamaño + telemetría OTel (CLI v2.1.202+).</li>\n      <li><span class=\"chip\">Local</span> <strong>Unisound U2</strong> (China): MoE disperso de 266B con 10B activos, $0.15/$0.30 por millón de tokens. Cifra de SWE-Bench internamente contradictoria entre las propias fuentes del proveedor (72.9 vs. 75).</li>\n      <li><span class=\"chip good\">Tool</span> <strong>GitHub Copilot</strong>: Kimi K2.7 Code (de pesos abiertos) ya en GA; Copilot Vision en GA desde el 01/07; corrección de métricas de uso/facturación el 02/07.</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>El estancamiento como información</strong>: Aider sigue en v0.86.2 (12/02), OpenHands en v1.6.0 (30/03); el lanzamiento de \"DeepSeek-V4 a mediados de julio\" es un rumor de agregadores sin confirmar.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute keine Milliarden-Ankündigung — dafür der Tag, an dem sich das Regulierungs- und Mess-Bild ordnet. Der Rat der EU hat die schweren Hochrisiko-Pflichten des AI Act um über ein Jahr nach hinten geschoben. Aber ausgerechnet die Pflicht, die angewandte KI am direktesten trifft — die Kennzeichnung von Chatbots und KI-Inhalten (Artikel 50) — bleibt am 2. August 2026 stehen. Dazu zwei deutsche Studien mit zwei sehr verschiedenen Zahlen (Bitkom 41 %, ifo 54,5 %), die vor allem zeigen, wie unscharf „KI-Nutzung\" gemessen wird. Der Microsoft-Frontier-Trupp der Vorwoche ist die Kulisse: Die Milliarden-Armeen gehen zu den Großen, die ohnehin vorn liegen; der Mittelstand bekommt weder Truppe noch Compliance-Budget. Genau dort liegt die twiceD-Idee.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI-Act-Omnibus</strong>: Hochrisiko-Fristen verschoben auf 02.12.2027 (eigenständige Annex-III-Systeme) und 02.08.2028 (in Produkte eingebettet) — Rat finale Zustimmung am 29.06.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Aber Artikel 50</strong>: Transparenz- und Kennzeichnungspflichten bleiben am 02.08.2026 — nur das Wasserzeichen-Detail bekommt Schonfrist bis 02.12.2026.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Bitkom vs. ifo</strong>: 41 % (n=604, 11.04.) neben 54,5 % (Mai) — zwei nicht vergleichbare Umfragen; robust ist nur die Größen-Lücke von rund 20 Punkten.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: KI-Investment der Konzerne weltweit 581,7 Mrd. $ in 2025, +130 % gegenüber Vorjahr.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Kulisse Microsoft</strong>: Frontier Company (2,5 Mrd. $, 6.000 Experten, 02.07) geht zu LSEG, Unilever, Land O'Lakes — nicht zum Mittelstand.</li>\n      <li><span class=\"chip good\">CASE · US</span> <strong>Goldstandard statt Hype</strong>: General Mills spart seit GJ2024 über 20 Mio. $ mit KI-geprüften Lieferungen — genannt vom CFO, mit Zahl.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Banco Central</strong>: flaggt „Black-Box\"-Risiko im Finanzsystem; BR-Fintechs rollen agentische Assistenten aus.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Zahlen-Hygiene</strong>: McKinsey- und Stanford-Adoptionsprozente heute nicht primär bestätigt — unten als Kontext geführt, nicht als Schlagzeile.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>AI-Act-Compliance fürs KMU</strong>: Markt 609 Mio. $ (2026) → 10,5 Mrd. $ (2035, 37,3 % CAGR) — und keiner bedient den 150-Personen-Betrieb.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute keine Milliarden-Ankündigung — dafür der Tag, an dem sich das Regulierungs- und Mess-Bild ordnet. Der Rat der EU hat die schweren Hochrisiko-Pflichten des AI Act um über ein Jahr nach hinten geschoben. Aber ausgerechnet die Pflicht, die angewandte KI am direktesten trifft — die Kennzeichnung von Chatbots und KI-Inhalten (Artikel 50) — bleibt am 2. August 2026 stehen. Dazu zwei deutsche Studien mit zwei sehr verschiedenen Zahlen (Bitkom 41 %, ifo 54,5 %), die vor allem zeigen, wie unscharf „KI-Nutzung\" gemessen wird. Der Microsoft-Frontier-Trupp der Vorwoche ist die Kulisse: Die Milliarden-Armeen gehen zu den Großen, die ohnehin vorn liegen; der Mittelstand bekommt weder Truppe noch Compliance-Budget. Genau dort liegt die twiceD-Idee.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI-Act-Omnibus</strong>: Hochrisiko-Fristen verschoben auf 02.12.2027 (eigenständige Annex-III-Systeme) und 02.08.2028 (in Produkte eingebettet) — Rat finale Zustimmung am 29.06.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>Aber Artikel 50</strong>: Transparenz- und Kennzeichnungspflichten bleiben am 02.08.2026 — nur das Wasserzeichen-Detail bekommt Schonfrist bis 02.12.2026.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Bitkom vs. ifo</strong>: 41 % (n=604, 11.04.) neben 54,5 % (Mai) — zwei nicht vergleichbare Umfragen; robust ist nur die Größen-Lücke von rund 20 Punkten.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: KI-Investment der Konzerne weltweit 581,7 Mrd. $ in 2025, +130 % gegenüber Vorjahr.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Kulisse Microsoft</strong>: Frontier Company (2,5 Mrd. $, 6.000 Experten, 02.07) geht zu LSEG, Unilever, Land O'Lakes — nicht zum Mittelstand.</li>\n      <li><span class=\"chip good\">CASE · US</span> <strong>Goldstandard statt Hype</strong>: General Mills spart seit GJ2024 über 20 Mio. $ mit KI-geprüften Lieferungen — genannt vom CFO, mit Zahl.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Banco Central</strong>: flaggt „Black-Box\"-Risiko im Finanzsystem; BR-Fintechs rollen agentische Assistenten aus.</li>\n      <li><span class=\"chip\">Achtung</span> <strong>Zahlen-Hygiene</strong>: McKinsey- und Stanford-Adoptionsprozente heute nicht primär bestätigt — unten als Kontext geführt, nicht als Schlagzeile.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>AI-Act-Compliance fürs KMU</strong>: Markt 609 Mio. $ (2026) → 10,5 Mrd. $ (2035, 37,3 % CAGR) — und keiner bedient den 150-Personen-Betrieb.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">No billion-dollar announcement today — instead, the day the regulatory and measurement picture came into focus. The Council of the EU pushed back the heavy high-risk obligations of the AI Act by more than a year. But of all things, the obligation that hits applied AI most directly — labeling chatbots and AI content (Article 50) — still stands for August 2, 2026. On top of that, two German studies with two very different numbers (Bitkom 41%, ifo 54.5%) that mainly show how fuzzy \"AI usage\" is as a measure. Last week's Microsoft Frontier squad is the backdrop: the billion-dollar armies go to the big players who are already ahead; the Mittelstand gets neither troops nor a compliance budget. That's exactly where the twiceD idea sits.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>AI Act Omnibus</strong>: high-risk deadlines pushed to 12/02/2027 (standalone Annex III systems) and 08/02/2028 (embedded in products) — Council final approval on 06/29.</li>\n      <li><span class=\"chip hot\">REG · EU</span> <strong>But Article 50</strong>: transparency and labeling obligations stay at 08/02/2026 — only the watermark detail gets a grace period until 12/02/2026.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Bitkom vs. ifo</strong>: 41% (n=604, 04/11) versus 54.5% (May) — two non-comparable surveys; the only robust finding is the roughly 20-point size gap.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: worldwide corporate AI investment $581.7B in 2025, +130% year over year.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Backdrop: Microsoft</strong>: Frontier Company ($2.5B, 6,000 experts, 07/02) goes to LSEG, Unilever, Land O'Lakes — not to the Mittelstand.</li>\n      <li><span class=\"chip good\">CASE · US</span> <strong>Gold standard, not hype</strong>: General Mills has saved over $20M since FY2024 with AI-audited deliveries — named by the CFO, with a figure.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Banco Central</strong>: flags \"black box\" risk in the financial system; BR fintechs roll out agentic assistants.</li>\n      <li><span class=\"chip\">Heads up</span> <strong>Number hygiene</strong>: McKinsey and Stanford adoption percentages not primarily confirmed today — listed below as context, not as a headline.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>AI Act compliance for SMEs</strong>: market $609M (2026) → $10.5B (2035, 37.3% CAGR) — and no one serves the 150-person company.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje não há anúncio bilionário — mas é o dia em que o quadro regulatório e de medição se organiza. O Conselho da UE adiou por mais de um ano as obrigações pesadas de alto risco do AI Act. Mas justamente a obrigação que atinge mais diretamente a IA aplicada — a rotulagem de chatbots e conteúdo de IA (Artigo 50) — continua valendo a partir de 2 de agosto de 2026. Além disso, dois estudos alemães com números bem diferentes (Bitkom 41%, ifo 54,5%) que mostram, acima de tudo, como é imprecisa a medição de \"uso de IA\". O esquadrão Frontier da Microsoft da semana passada é o cenário de fundo: os exércitos bilionários vão para as grandes empresas que já estão à frente; o mercado de médio porte não recebe nem tropa nem orçamento de compliance. É exatamente aí que está a ideia da twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>AI Act Omnibus</strong>: prazos de alto risco adiados para 02/12/2027 (sistemas autônomos do Anexo III) e 02/08/2028 (embutidos em produtos) — aprovação final do Conselho em 29/06.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Mas o Artigo 50</strong>: obrigações de transparência e rotulagem continuam valendo em 02/08/2026 — só o detalhe da marca d'água ganha carência até 02/12/2026.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Bitkom vs. ifo</strong>: 41% (n=604, 11/04) contra 54,5% (maio) — duas pesquisas não comparáveis; robusta é só a diferença de cerca de 20 pontos.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: investimento corporativo mundial em IA de US$ 581,7 bi em 2025, +130% em relação ao ano anterior.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Pano de fundo Microsoft</strong>: Frontier Company (US$ 2,5 bi, 6.000 especialistas, 02/07) vai para LSEG, Unilever, Land O'Lakes — não para o mercado de médio porte.</li>\n      <li><span class=\"chip good\">CASE · US</span> <strong>Padrão-ouro em vez de hype</strong>: General Mills economiza mais de US$ 20 mi desde o AF2024 com entregas auditadas por IA — declarado pelo CFO, com número.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Banco Central</strong>: sinaliza risco de \"caixa-preta\" no sistema financeiro; fintechs brasileiras lançam assistentes agênticos.</li>\n      <li><span class=\"chip\">Atenção</span> <strong>Higiene de números</strong>: percentuais de adoção da McKinsey e da Stanford não confirmados na fonte primária hoje — listados abaixo como contexto, não como manchete.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Compliance com o AI Act para PMEs</strong>: mercado de US$ 609 mi (2026) → US$ 10,5 bi (2035, CAGR de 37,3%) — e ninguém atende a empresa de 150 pessoas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy no hay anuncio multimillonario, sino el día en que el panorama regulatorio y de medición se ordena. El Consejo de la UE pospuso más de un año las obligaciones pesadas de alto riesgo del AI Act. Pero justo la obligación que golpea más directamente a la IA aplicada — el etiquetado de chatbots y contenido de IA (Artículo 50) — se mantiene para el 2 de agosto de 2026. A eso se suman dos estudios alemanes con cifras muy distintas (Bitkom 41%, ifo 54,5%) que sobre todo muestran lo impreciso que es medir el \"uso de IA\". El escuadrón Frontier de Microsoft de la semana pasada es el telón de fondo: los ejércitos multimillonarios van hacia las grandes empresas que ya van a la delantera; la pyme no recibe ni tropa ni presupuesto de cumplimiento. Justo ahí está la idea de twiceD.</p>\n    <ul>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>AI Act Omnibus</strong>: plazos de alto riesgo pospuestos al 02/12/2027 (sistemas autónomos del Anexo III) y al 02/08/2028 (integrados en productos) — aprobación final del Consejo el 29/06.</li>\n      <li><span class=\"chip hot\">REG · UE</span> <strong>Pero el Artículo 50</strong>: las obligaciones de transparencia y etiquetado se mantienen para el 02/08/2026 — solo el detalle de la marca de agua obtiene un periodo de gracia hasta el 02/12/2026.</li>\n      <li><span class=\"chip\">STUDY · DE</span> <strong>Bitkom vs. ifo</strong>: 41% (n=604, 11/04) frente a 54.5% (mayo) — dos encuestas no comparables; lo único robusto es la brecha de tamaño de unos 20 puntos.</li>\n      <li><span class=\"chip\">STUDY · Global</span> <strong>Stanford HAI</strong>: inversión corporativa mundial en IA de 581.7 mmd en 2025, +130% respecto al año anterior.</li>\n      <li><span class=\"chip\">DEPLOY · US</span> <strong>Telón de fondo Microsoft</strong>: Frontier Company (2,5 mmd, 6,000 expertos, 02/07) va a LSEG, Unilever, Land O'Lakes — no a la pyme.</li>\n      <li><span class=\"chip good\">CASE · US</span> <strong>Estándar de oro, no hype</strong>: General Mills ahorra más de 20 mdd desde el AF2024 con entregas auditadas por IA — declarado por el CFO, con cifra.</li>\n      <li><span class=\"chip\">REG · BR</span> <strong>Banco Central</strong>: señala el riesgo de \"caja negra\" en el sistema financiero; las fintech brasileñas lanzan asistentes agénticos.</li>\n      <li><span class=\"chip\">Atención</span> <strong>Higiene de cifras</strong>: los porcentajes de adopción de McKinsey y Stanford no se confirmaron hoy en la fuente primaria — se listan abajo como contexto, no como titular.</li>\n      <li><span class=\"chip good\">twiceD</span> <strong>Cumplimiento del AI Act para pymes</strong>: mercado de 609 mdd (2026) → 10,500 mdd (2035, CAGR de 37.3%) — y nadie atiende a la empresa de 150 personas.</li>\n    </ul></div>"

les on the board</strong>: fit 82 (Forward Deployed Engineer) and new fit 58 (Senior AI Engineer, Core Engine).</li>\n      <li><span class=\"chip good\">New</span> <strong>Board grows net to 43</strong> (+2): new emineo AG (CH, fit 71) and Amoria Bond IoT (fit 72); out Raiffeisen Schweiz (fit 62).</li>\n      <li><span class=\"chip\">Auto</span> <strong>Niche stays active</strong>: EnCo Hamburg (fit 87, autonomous driving) and HENNING Ingolstadt (fit 86, Audi environment), €100–135/h*.</li>\n      <li><span class=\"chip\">Data</span> <strong>TED detail pages still WAF-blocked</strong> (HTTP 202, empty body, re-checked today) — Bundesbank partner gap therefore an estimate, not a quote.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O Conselho de Administração da VW se reúne hoje em Wolfsburg para discutir um plano de reestruturação que, segundo reportagens convergentes da imprensa, pode envolver até <strong>100.000 empregos globalmente</strong> e o fechamento gradual de <strong>quatro fábricas alemãs</strong> — Zwickau, Emden, Hannover, Neckarsulm — de forma escalonada de 2031 a 2034; segundo as reportagens, uma decisão final ainda não sai hoje, e o sindicato IG Metall convoca um dia de mobilização. No board de projetos do próprio Daniel, o núcleo Java/Spring/Angular segue estável: <strong>43 vagas verificadas</strong>, líquido de duas a mais que ontem, lideradas por um empate triplo no topo com Fit 88. No lado das licitações, dois novos candidatos ao TED entram hoje com prazo idêntico de solicitação em <strong>21/07</strong> — GTAI e o Bundesbank alemão —, ambos só viáveis com parceiro; o edital do Bundesbank segue atrás do bloqueio WAF do TED, então seus números de lacuna de parceiro são estimativa, não citação.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Conselho da VW se reúne hoje</strong>: segundo reportagens da Spiegel/Bild, até 100.000 empregos globalmente em discussão, quatro fábricas para fechamento escalonado de 2031 a 2034 — nenhuma decisão final esperada hoje, dia de mobilização do IG Metall em Wolfsburg.</li>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Empate triplo com Fit 88</strong>: iSAX (Frankfurt), BridgingIT (Frankfurt), Keil Business Solutions (Munique) — todas Java/Spring Boot/Angular, 80–100% remoto, 90–130 €/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Dois novos casos com parceiro, mesmo prazo</strong>: solução SaaS de planejamento da GTAI e acordo-marco do Bundesbank para meios de pagamento — ambos com prazo de solicitação <strong>21/07</strong>, ambos só viáveis com parceiro.</li>\n      <li><span class=\"chip\">CH</span> <strong>Trilha de emprego CLT segue         "es": "<div class=\"tldr\"><p class=\"lead\">El consejo de supervisión de VW se reúne hoy en Wolfsburgo para deliberar sobre un plan de reestructuración que, según informes de prensa coincidentes, podría implicar hasta <strong>100.000 empleos en todo el mundo</strong> y el cierre gradual de <strong>cuatro plantas alemanas</strong> — Zwickau, Emden, Hannover, Neckarsulm — de forma escalonada de 2031 a 2034; según los informes, hoy todavía no se tomará una decisión final, e IG Metall convoca a una jornada de acción. En el tablero propio de Daniel, en cambio, el núcleo Java/Spring/Angular se mantiene estable: <strong>43 listados verificados</strong>, dos más en términos netos que ayer, encabezados por un triple empate en fit 88. En el lado de las licitaciones, hoy se suman dos nuevos candidatos de TED con el mismo plazo de solicitud, <strong>21/07</strong> — GTAI y el Deutsche Bundesbank —, ambos solo se pueden ofertar con un socio; el aviso del Bundesbank sigue detrás del bloqueo WAF de TED, por lo que sus cifras de brecha de socio son una estimación, no una cita.</p>\n    <ul>\n      <li><span class=\"chip hot\">Mercado</span> <strong>El consejo de supervisión de VW se reúne hoy</strong>: según informes de Spiegel y Bild, se habla de hasta 100.000 empleos en todo el mundo, cuatro plantas para cierre escalonado de 2031 a 2034 — no se espera una decisión final hoy, jornada de acción de IG Metall en Wolfsburgo.</li>\n      <li><span class=\"chip hot\">twiceD</span> <strong>Triple empate en fit 88</strong>: iSAX (Fráncfort), BridgingIT (Fráncfort), Keil Business Solutions (Múnich) — todos Java/Spring Boot/Angular, 80–100 % remoto, 90–130 €/h*.</li>\n      <li><span class=\"chip\">TED</span> <strong>Dos nuevos casos con socio, mismo plazo</strong>: solución SaaS de planificación de GTAI y acuerdo marco del Bundesbank para sistemas de pago — ambos con plazo de solicitud <strong>21/07</strong>, ambos solo se pueden ofertar con un socio.</li>\n      <li><span class=\"chip\">CH</span> <strong>La vía de empleo sigue centrada en Suiza</strong>: 6 de 7 resultados en Suiza, dos con enfoque explícito en IA agéntica (ELCA, AXA).</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>Dos puestos de JetBrains en el tablero</strong>: fit 82 (Forward Deployed Engineer) y, nuevo, fit 58 (Senior AI Engineer, Core Engine).</li>\n      <li><span class=\"chip good\">Nuevo</span> <strong>El tablero crece a 43 en términos netos</strong> (+2): nuevos emineo AG (CH, fit 71) y Amoria Bond IoT (fit 72); sale Raiffeisen Suiza (fit 62).</li>\n      <li><span class=\"chip\">Auto</span> <strong>El nicho sigue activo</strong>: EnCo Hamburgo (fit 87, conducción autónoma) y HENNING Ingolstadt (fit 86, entorno Audi), 100–135 €/h*.</li>\n      <li><span class=\"chip\">Datos</span> <strong>Las páginas de detalle de TED siguen bloqueadas por WAF</strong> (HTTP 202, cuerpo vacío, verificado de nuevo hoy) — por eso la brecha de socio del Bundesbank es una estimación, no una cita.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Für einen deutschen Fan in Brasilien ist dieser Sommer doppelt bitter: Deutschland ist seit dem 29.06. raus, Brasilien seit dem 05.07. — beide früher als geplant, beide gegen einen krassen Außenseiter. Und während bei der WM heute das Viertelfinale beginnt, dreht sich die größte deutsche Geschichte längst neben dem Platz: Julian Nagelsmann ist zurückgetreten, und als Nachfolger kursiert ein Name, den man in Freiburg wie in Liverpool sofort versteht. Offiziell ist davon nichts. Beim Sport-Club selbst läuft das Transferfenster heiß — zwei zweistellige Millionen-Zugänge, ein 25-Millionen-Abgang, und in zwei Wochen geht es nach Schruns.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann weg, Klopp im Gespräch</strong>: Der Bundestrainer trat am 03.07. zurück. Jürgen Klopp gilt als Wunschkandidat — verhandelt wird über seine Freigabe von Red Bull (Vertrag bis 2029). Der DFB hat <em>nichts</em> bestätigt.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Das WM-Aus</strong>: 1:1 gegen Paraguay, 3:4 im Elfmeterschießen (29.06.) — erste WM-Elfmeter-Niederlage der deutschen Geschichte. Havertz, Woltemade und Tah verschossen.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Viertelfinale beginnt heute</strong>: Frankreich–Marokko, 22:00 MESZ / 17:00 BRT in Foxborough. Vier Viertelfinals bis Samstag.</li>\n      <li><span class=\"chip\">WM</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen (05.07.), Haaland-Doppelpack, Neymar-Elfer zu spät. Schlechteste Seleção-WM seit 1990.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg baut um</strong>: Mio Backhaus (TW, 12 Mio.) und Keisuke Goto (10 Mio.) kommen. Merlin Röhl geht fest für 25 Mio. zu Everton, Junior Adamu zu Schalke.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Sommerfahrplan</strong>: Trainingslager Schruns 22.–31.07., Testspiele gegen Derby County (24.07.) und Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Palmeiras führt</strong> den Brasileirão mit 41 Punkten. Der 19. Spieltag startet am 16.07., Botafogo–Santos eröffnet.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart 28.08.</strong> mit Bayern–VfB Stuttgart (20:30 MESZ / 15:30 BRT). Vier deutsche Clubs in der Champions-League-Ligaphase.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Für einen deutschen Fan in Brasilien ist dieser Sommer doppelt bitter: Deutschland ist seit dem 29.06. raus, Brasilien seit dem 05.07. — beide früher als geplant, beide gegen einen krassen Außenseiter. Und während bei der WM heute das Viertelfinale beginnt, dreht sich die größte deutsche Geschichte längst neben dem Platz: Julian Nagelsmann ist zurückgetreten, und als Nachfolger kursiert ein Name, den man in Freiburg wie in Liverpool sofort versteht. Offiziell ist davon nichts. Beim Sport-Club selbst läuft das Transferfenster heiß — zwei zweistellige Millionen-Zugänge, ein 25-Millionen-Abgang, und in zwei Wochen geht es nach Schruns.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann weg, Klopp im Gespräch</strong>: Der Bundestrainer trat am 03.07. zurück. Jürgen Klopp gilt als Wunschkandidat — verhandelt wird über seine Freigabe von Red Bull (Vertrag bis 2029). Der DFB hat <em>nichts</em> bestätigt.</li>\n      <li><span class=\"chip\">DFB</span> <strong>Das WM-Aus</strong>: 1:1 gegen Paraguay, 3:4 im Elfmeterschießen (29.06.) — erste WM-Elfmeter-Niederlage der deutschen Geschichte. Havertz, Woltemade und Tah verschossen.</li>\n      <li><span class=\"chip hot\">WM</span> <strong>Viertelfinale beginnt heute</strong>: Frankreich–Marokko, 22:00 MESZ / 17:00 BRT in Foxborough. Vier Viertelfinals bis Samstag.</li>\n      <li><span class=\"chip\">WM</span> <strong>Brasilien raus</strong>: 1:2 gegen Norwegen (05.07.), Haaland-Doppelpack, Neymar-Elfer zu spät. Schlechteste Seleção-WM seit 1990.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg baut um</strong>: Mio Backhaus (TW, 12 Mio.) und Keisuke Goto (10 Mio.) kommen. Merlin Röhl geht fest für 25 Mio. zu Everton, Junior Adamu zu Schalke.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Sommerfahrplan</strong>: Trainingslager Schruns 22.–31.07., Testspiele gegen Derby County (24.07.) und Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Palmeiras führt</strong> den Brasileirão mit 41 Punkten. Der 19. Spieltag startet am 16.07., Botafogo–Santos eröffnet.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Saisonstart 28.08.</strong> mit Bayern–VfB Stuttgart (20:30 MESZ / 15:30 BRT). Vier deutsche Clubs in der Champions-League-Ligaphase.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">For a German fan in Brazil, this summer stings twice over: Germany is out since June 29, Brazil since July 5 — both earlier than planned, both against a stark underdog. And while the World Cup quarterfinals start today, the biggest German story has long since moved off the pitch: Julian Nagelsmann has resigned, and the name circling as his successor is one that needs no introduction in Freiburg or in Liverpool. Officially, none of it is confirmed. Meanwhile Sport-Club's own transfer window is red-hot — two double-digit-million arrivals, a 25-million departure, and in two weeks it's off to Schruns.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann out, Klopp in talks</strong>: The head coach resigned on July 3. Jürgen Klopp is seen as the top target — negotiations are underway over his release from Red Bull (contract through 2029). The DFB has confirmed <em>nothing</em>.</li>\n      <li><span class=\"chip\">DFB</span> <strong>The World Cup exit</strong>: 1-1 against Paraguay, 3-4 on penalties (June 29) — Germany's first-ever World Cup shootout loss. Havertz, Woltemade, and Tah missed.</li>\n      <li><span class=\"chip hot\">World Cup</span> <strong>Quarterfinals start today</strong>: France–Morocco, 22:00 MESZ / 17:00 BRT in Foxborough. Four quarterfinals through Saturday.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Brazil out</strong>: 1-2 against Norway (July 5), a Haaland brace, Neymar's penalty too late. Worst Seleção World Cup since 1990.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Freiburg retools</strong>: Mio Backhaus (GK, €12m) and Keisuke Goto (€10m) arrive. Merlin Röhl moves permanently to Everton for €25m, Junior Adamu to Schalke.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Summer schedule</strong>: Training camp in Schruns July 22–31, friendlies against Derby County (July 24) and Greuther Fürth (July 31).</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Palmeiras lead</strong> the Brasileirão with 41 points. Matchday 19 kicks off July 16, Botafogo–Santos opens.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Season kicks off August 28</strong> with Bayern–VfB Stuttgart (20:30 MESZ / 15:30 BRT). Four German clubs in the Champions League league phase.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Para um torcedor alemão no Brasil, este verão é duplamente amargo: a Alemanha caiu em 29/06, o Brasil em 05/07 — ambos mais cedo do que o esperado, ambos diante de um azarão e tanto. E enquanto hoje começam as quartas de final da Copa, a maior história alemã do momento se desenrola fora de campo: Julian Nagelsmann renunciou, e o nome que circula como sucessor é reconhecido tanto em Freiburg quanto em Liverpool. Oficialmente, nada disso está confirmado. No próprio Sport-Club, a janela de transferências ferve — duas contratações na casa dos dois dígitos em milhões, uma saída de 25 milhões, e em duas semanas o time viaja para Schruns.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann fora, Klopp nas conversas</strong>: O técnico da seleção renunciou em 03/07. Jürgen Klopp é apontado como candidato preferido — negocia-se sua liberação junto à Red Bull (contrato até 2029). A federação alemã (DFB) <em>não</em> confirmou nada.</li>\n      <li><span class=\"chip\">DFB</span> <strong>A eliminação na Copa</strong>: 1x1 contra o Paraguai, 3x4 nos pênaltis (29/06) — primeira derrota alemã em pênaltis na história das Copas. Havertz, Woltemade e Tah desperdiçaram cobranças.</li>\n      <li><span class=\"chip hot\">Copa</span> <strong>Quartas de final começam hoje</strong>: França–Marrocos, 22h00 (horário da Alemanha) / 17h00 (BRT) em Foxborough. Quatro jogos de quartas até sábado.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Brasil eliminado</strong>: 1x2 contra a Noruega (05/07), dobradinha de Haaland, pênalti de Neymar tarde demais. Pior Copa da Seleção desde 1990.</li>\n      <li><span class=\"chip hot\">Transferências</span> <strong>Freiburg se reorganiza</strong>: Mio Backhaus (goleiro, 12 mi.) e Keisuke Goto (10 mi.) chegam. Merlin Röhl vai em definitivo por 25 mi. ao Everton, Junior Adamu ao Schalke.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Calendário de verão</strong>: Pré-temporada em Schruns de 22 a 31/07, amistosos contra o Derby County (24/07) e o Greuther Fürth (31/07).</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Palmeiras lidera</strong> o Brasileirão com 41 pontos. A 19ª rodada começa em 16/07, com Botafogo–Santos abrindo.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Início da temporada em 28/08</strong> com Bayern–VfB Stuttgart (20h30, horário da Alemanha / 15h30 BRT). Quatro clubes alemães na fase de liga da Champions League.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Para un aficionado alemán en Brasil, este verano es doblemente amargo: Alemania quedó eliminada desde el 29.06., Brasil desde el 05.07. — ambas antes de lo previsto, ambas ante un rival claramente inferior en el papel. Y mientras hoy arranca el cuartos de final del Mundial, la historia alemana más importante se juega desde hace tiempo fuera de la cancha: Julian Nagelsmann renunció, y como sucesor circula un nombre que tanto en Freiburg como en Liverpool se reconoce de inmediato. Oficialmente no hay nada. En el Sport-Club, mientras tanto, el mercado de fichajes está que arde — dos incorporaciones de dos dígitos en millones, una salida de 25 millones, y en dos semanas el equipo parte hacia Schruns.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Nagelsmann fuera, Klopp en la mira</strong>: El seleccionador renunció el 03.07. Jürgen Klopp es visto como el candidato favorito — se negocia su liberación de Red Bull (contrato hasta 2029). La DFB no ha confirmado <em>nada</em>.</li>\n      <li><span class=\"chip\">DFB</span> <strong>La eliminación del Mundial</strong>: 1:1 contra Paraguay, 3:4 en penales (29.06.) — primera derrota alemana en penales en la historia de los Mundiales. Havertz, Woltemade y Tah fallaron los suyos.</li>\n      <li><span class=\"chip hot\">Mundial</span> <strong>Los cuartos de final arrancan hoy</strong>: Francia–Marruecos, 22:00 MESZ / 17:00 BRT en Foxborough. Cuatro cuartos de final hasta el sábado.</li>\n      <li><span class=\"chip\">Mundial</span> <strong>Brasil eliminado</strong>: 1:2 contra Noruega (05.07.), doblete de Haaland, penal de Neymar demasiado tarde. La peor Copa del Mundo de la Seleção desde 1990.</li>\n      <li><span class=\"chip hot\">Traspaso</span> <strong>El Freiburg se reorganiza</strong>: llegan Mio Backhaus (TW, 12 mill.) y Keisuke Goto (10 mill.). Merlin Röhl se va en definitiva por 25 mill. al Everton, Junior Adamu al Schalke.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Calendario de verano</strong>: concentración en Schruns 22.–31.07., amistosos contra Derby County (24.07.) y Greuther Fürth (31.07.).</li>\n      <li><span class=\"chip good\">BRA</span> <strong>Palmeiras lidera</strong> el Brasileirão con 41 puntos. La jornada 19 arranca el 16.07., con Botafogo–Santos como partido inaugural.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Arranque de temporada el 28.08.</strong> con Bayern–VfB Stuttgart (20:30 MESZ / 15:30 BRT). Cuatro clubes alemanes en la fase de liga de la Champions League.</li>\n    </ul></div>"

      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Heute, Donnerstag der 9. Juli, ist der letzte ruhige Tag — ab morgen früh liegen zwei Baustellen gleichzeitig auf dem Tisch: Die Langstrecken-WM eröffnet mit den <strong>6 Stunden von São Paulo</strong> in Interlagos, Daniels Heimstrecke, und die MotoGP fährt am <strong>Sachsenring</strong> ihre letzte Runde vor der Sommerpause. Ein Direkt-Fetch bei fiawec.com bestätigt heute den kompletten Sessionplan noch einmal frisch — Countdown läuft, noch keine Session gefahren. Wichtiger Nachtrag zur Formel 1: <strong>Isack Hadjar fährt für Red Bull Racing</strong>, nicht für „Racing Bulls\" — der gestrige Brief hatte das falsch zugeordnet (die Punktzahlen selbst waren korrekt). Und der Zeiten-Widerspruch beim Spa-Rennstart von gestern ist aufgelöst: formula1.com zeigt UTC statt „Ortszeit\" — plus zwei Stunden ergibt exakt die racingnews365-Zeiten. In der Formel E hat sich derweil die Tabellenspitze gedreht.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Interlagos-Sessionplan heute erneut bestätigt</strong>: Rennstart So 12.07. <strong>11:30 BRT / 16:30 MESZ</strong>. Direkt-Fetch fiawec.com zeigt aktiven Countdown auf FP1 — noch keine Session gefahren.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring, letzte Runde vor der Pause</strong>: Sprint Sa 11.07. 15:00 MESZ / 10:00 BRT, Rennen So 12.07. <strong>14:00 MESZ / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Aldeguer fällt aus, kein Ersatz</strong>: T7-Wirbelbruch beim Assen-Training, Gresini fährt in Sachsen nur mit Álex Márquez. Bei LCR springt erneut Cal Crutchlow für den weiter genesenden Johann Zarco ein.</li>\n      <li><span class=\"chip hot\">Korrektur · F1</span> <strong>Hadjar fährt für Red Bull Racing</strong>, nicht „Racing Bulls\" — Fehler im gestrigen Brief. Die Punkte (Hadjar 52, Konstrukteure Red Bull Racing 128 zu Racing Bulls 59) waren bereits richtig.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Spa-Widerspruch aufgelöst</strong>: formula1.com listet den Rennstart als „13:00\" ohne Zeitzone — das ist UTC, nicht Ortszeit. Plus 2h Sommerzeit ergibt <strong>15:00 MESZ / 10:00 BRT</strong>, exakt racingnews365.com.</li>\n      <li><span class=\"chip\">Formel E</span> <strong>Wehrlein übernimmt die Führung</strong>: 141 Punkte vor Evans (132) nach dem Shanghai-Doppel — Evans startete Sonntag gar nicht erst. Nächste Station: Tokio, 25.–26.07.</li>\n      <li><span class=\"chip\">Rand</span> <strong>Daniels Sonntag bleibt konfliktfrei</strong>: Sachsenring-Zielflagge gegen 09:45 BRT, Interlagos-Start erst 11:30 BRT — fast zwei Stunden Puffer.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today, Thursday July 9, is the last quiet day — from tomorrow morning two fronts land on the table at once: the endurance world championship opens with the <strong>6 Hours of São Paulo</strong> at Interlagos, Daniel's home track, and MotoGP runs its last round at the <strong>Sachsenring</strong> before the summer break. A fresh direct fetch from fiawec.com today confirms the full session schedule again — countdown is running, no session has been run yet. Important correction on Formula 1: <strong>Isack Hadjar drives for Red Bull Racing</strong>, not \"Racing Bulls\" — yesterday's brief had misattributed this (the point totals themselves were correct). And the time discrepancy on yesterday's Spa race start is resolved: formula1.com shows UTC instead of \"local time\" — add two hours and it matches the racingnews365 times exactly. Meanwhile in Formula E, the championship lead has changed hands.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Interlagos session schedule reconfirmed today</strong>: race start Sun 07/12, <strong>11:30 BRT / 16:30 CEST</strong>. Direct fetch from fiawec.com shows an active countdown to FP1 — no session run yet.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring, last round before the break</strong>: sprint Sat 07/11, 15:00 CEST / 10:00 BRT, race Sun 07/12, <strong>14:00 CEST / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Aldeguer out, no replacement</strong>: T7 vertebra fracture in Assen practice, Gresini fields only Álex Márquez in Germany. At LCR, Cal Crutchlow steps in again for the still-recovering Johann Zarco.</li>\n      <li><span class=\"chip hot\">Correction · F1</span> <strong>Hadjar drives for Red Bull Racing</strong>, not \"Racing Bulls\" — an error in yesterday's brief. The points (Hadjar 52, constructors Red Bull Racing 128 vs. Racing Bulls 59) were already correct.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Spa discrepancy resolved</strong>: formula1.com lists the race start as \"13:00\" without a time zone — that's UTC, not local time. Add 2h for daylight saving and you get <strong>15:00 CEST / 10:00 BRT</strong>, exactly matching racingnews365.com.</li>\n      <li><span class=\"chip\">Formula E</span> <strong>Wehrlein takes the lead</strong>: 141 points ahead of Evans (132) after the Shanghai double-header — Evans didn't even start on Sunday. Next stop: Tokyo, 07/25–26.</li>\n      <li><span class=\"chip\">Aside</span> <strong>Daniel's Sunday stays conflict-free</strong>: Sachsenring checkered flag around 09:45 BRT, Interlagos start not until 11:30 BRT — nearly two hours of buffer.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje, quinta-feira, 9 de julho, é o último dia tranquilo — a partir de amanhã cedo duas frentes se abrem ao mesmo tempo: o Mundial de Endurance abre com as <strong>6 Horas de São Paulo</strong> em Interlagos, a pista de casa do Daniel, e a MotoGP corre no <strong>Sachsenring</strong> sua última etapa antes da pausa de verão. Uma nova consulta direta ao fiawec.com confirma hoje mais uma vez o cronograma completo de sessões — contagem regressiva em andamento, nenhuma sessão disputada ainda. Adendo importante sobre a Fórmula 1: <strong>Isack Hadjar corre pela Red Bull Racing</strong>, não pela \"Racing Bulls\" — o brief de ontem havia atribuído isso errado (os números de pontos em si estavam corretos). E a contradição de horários da largada em Spa de ontem está resolvida: formula1.com exibe UTC em vez de \"horário local\" — mais duas horas resulta exatamente nos horários da racingnews365. Na Fórmula E, enquanto isso, a ponta da tabela mudou de mãos.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Cronograma de Interlagos confirmado novamente hoje</strong>: largada dom. 12/07, <strong>11h30 BRT / 16h30 CEST</strong>. Consulta direta ao fiawec.com mostra contagem regressiva ativa para o TL1 — nenhuma sessão disputada ainda.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring, última etapa antes da pausa</strong>: sprint sáb. 11/07, 15h00 CEST / 10h00 BRT; corrida dom. 12/07, <strong>14h00 CEST / 09h00 BRT</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Aldeguer está fora, sem substituto</strong>: fratura de vértebra T7 no treino em Assen; a Gresini corre na Saxônia apenas com Álex Márquez. Na LCR, Cal Crutchlow entra novamente no lugar de Johann Zarco, ainda em recuperação.</li>\n      <li><span class=\"chip hot\">Correção · F1</span> <strong>Hadjar corre pela Red Bull Racing</strong>, não pela \"Racing Bulls\" — erro no brief de ontem. Os pontos (Hadjar 52, construtores Red Bull Racing 128 a 59 da Racing Bulls) já estavam corretos.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Contradição de Spa resolvida</strong>: formula1.com lista a largada como \"13h00\" sem fuso horário — isso é UTC, não horário local. Mais 2h de horário de verão dá <strong>15h00 CEST / 10h00 BRT</strong>, exatamente como a racingnews365.com.</li>\n      <li><span class=\"chip\">Fórmula E</span> <strong>Wehrlein assume a liderança</strong>: 141 pontos à frente de Evans (132) após o duplo round de Xangai — Evans sequer largou no domingo. Próxima etapa: Tóquio, 25–26/07.</li>\n      <li><span class=\"chip\">Detalhe</span> <strong>Domingo do Daniel segue sem conflito</strong>: bandeirada final no Sachsenring por volta das 09h45 BRT, largada em Interlagos só às 11h30 BRT — quase duas horas de folga.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy, jueves 9 de julio, es el último día tranquilo — desde mañana temprano hay dos frentes abiertos al mismo tiempo: el Mundial de Resistencia arranca con las <strong>6 Horas de São Paulo</strong> en Interlagos, la pista de casa de Daniel, y la MotoGP corre en el <strong>Sachsenring</strong> su última ronda antes del receso de verano. Una consulta directa a fiawec.com confirma hoy de nuevo el calendario completo de sesiones — el conteo regresivo sigue en marcha, aún no se ha corrido ninguna sesión. Corrección importante sobre la Fórmula 1: <strong>Isack Hadjar corre para Red Bull Racing</strong>, no para «Racing Bulls» — el brief de ayer lo asignó mal (los puntos en sí eran correctos). Y la contradicción de horarios en el arranque de Spa de ayer quedó resuelta: formula1.com muestra la hora en UTC en vez de «hora local» — sumando dos horas coincide exactamente con los horarios de racingnews365. En la Fórmula E, mientras tanto, cambió el líder del campeonato.</p>\n    <ul>\n      <li><span class=\"chip good\">WEC</span> <strong>Calendario de Interlagos confirmado de nuevo hoy</strong>: arranque de la carrera dom 12/07, <strong>11:30 BRT / 16:30 CEST</strong>. La consulta directa a fiawec.com muestra un conteo regresivo activo hacia el FP1 — aún no se ha corrido ninguna sesión.</li>\n      <li><span class=\"chip hot\">MotoGP</span> <strong>Sachsenring, última ronda antes del receso</strong>: sprint sáb 11/07 15:00 CEST / 10:00 BRT, carrera dom 12/07 <strong>14:00 CEST / 09:00 BRT</strong>.</li>\n      <li><span class=\"chip\">MotoGP</span> <strong>Aldeguer no corre, sin sustituto</strong>: fractura de la vértebra T7 durante los entrenamientos en Assen, Gresini corre en Sajonia solo con Álex Márquez. En LCR, Cal Crutchlow vuelve a sustituir al aún convaleciente Johann Zarco.</li>\n      <li><span class=\"chip hot\">Corrección · F1</span> <strong>Hadjar corre para Red Bull Racing</strong>, no «Racing Bulls» — error en el brief de ayer. Los puntos (Hadjar 52, constructores Red Bull Racing 128 frente a Racing Bulls 59) ya eran correctos.</li>\n      <li><span class=\"chip good\">F1</span> <strong>Contradicción de Spa resuelta</strong>: formula1.com indicaba el arranque de la carrera como «13:00» sin zona horaria — eso es UTC, no hora local. Sumando 2 h de horario de verano da <strong>15:00 CEST / 10:00 BRT</strong>, exactamente lo que dice racingnews365.com.</li>\n      <li><span class=\"chip\">Fórmula E</span> <strong>Wehrlein toma el liderato</strong>: 141 puntos por delante de Evans (132) tras el doble de Shanghái — Evans ni siquiera tomó la salida el domingo. Próxima parada: Tokio, 25–26/07.</li>\n      <li><span class=\"chip\">Al margen</span> <strong>El domingo de Daniel sigue sin conflicto</strong>: bandera a cuadros en el Sachsenring hacia las 09:45 BRT, arranque de Interlagos recién a las 11:30 BRT — casi dos horas de margen.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute Abend beginnt in Jacarezinho die 31. Fetexas — vier Tage gratis Rummel, Rodeo und Bühne, zwanzig Fahrminuten von zu Hause. Zwei unabhängige Wetterportale sind sich einig: bis Samstag bleibt es trocken und richtig warm, aber zum großen Finale am Sonntag mit Sorriso Maroto kippt der Himmel — 71 % Regenwahrscheinlichkeit. Drinnen bleibt derweil ein anderes Thema wach: Paranás Atemwegs-Bulletins stufen die Lage weiter als Hochrisiko ein, mit dem VSR-Virus als Haupttreiber bei kleinen Kindern. Für die Großen gilt: ab heute hinfahren, am liebsten Samstag. Für das ein Monat alte Mädchen zu Hause: lieber abwarten, bis die Welle abflaut.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>31ª Fetexas eröffnet heute, 09.07.</strong>, läuft bis So 12.07. — Centro de Eventos PR-431, Jacarezinho (~20 km), Eintritt frei. Heute Abend: Ícaro &amp; Gilmar, Panda.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Trocken bis Samstag</strong>: 27°/13°, 0 % Regen — wärmster, trockenster Tag der Woche. <strong>Sonntag kippt es</strong>: 71 % Regenwahrscheinlichkeit, genau zum Fetexas-Finale.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>VSR/RSV weiter Hochrisiko in Paraná</strong> (InfoGripe SE 23/2026: „alerta de alto risco\"). Trifft kleine Kinder am stärksten — mit einem Monat altem Baby: Menschenmengen meiden.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>Dengue-Rückgang ist eine Jahresanfangs-Zahl</strong>: −96,1 % Fälle / −98,8 % Todesfälle gelten für SE 1–14/2026 (Jan.–Mitte März, publiziert 15.04.). Keine aktuelle Juli-Meldung, kein aktiver Alarm.</li>\n      <li><span class=\"chip\">Sicherheit</span> <strong>BR-153: Sprengungen bei Santo Antônio da Platina</strong>, di/do bis Ende Juli, ca. 14–16 Uhr — Fahrplan bei EPR Litoral Pioneiro (0800 277 0153) erfragen. Die Jacarezinho-Strecke zur Fetexas hat heute keine bestätigte Sperrung.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien starten erst Montag, 13.07.</strong> — diese Woche ist noch Unterricht. Rückkehr: 27.07.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina (~110 km):</strong> Jardim Botânico, Di–So 8–18 Uhr, Eintritt frei — die ruhige Regen-Alternative.</li>\n      <li><span class=\"chip\">Trip</span> <strong>SP-Range (4–6 h):</strong> Rolex 6 Horas de São Paulo in Interlagos, Fr–So 10.–12.07., Fan-Zone mit Kinderprogramm — nur falls ohnehin eine SP-Fahrt ansteht, gleiches Wochenende wie Fetexas.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Heute Abend beginnt in Jacarezinho die 31. Fetexas — vier Tage gratis Rummel, Rodeo und Bühne, zwanzig Fahrminuten von zu Hause. Zwei unabhängige Wetterportale sind sich einig: bis Samstag bleibt es trocken und richtig warm, aber zum großen Finale am Sonntag mit Sorriso Maroto kippt der Himmel — 71 % Regenwahrscheinlichkeit. Drinnen bleibt derweil ein anderes Thema wach: Paranás Atemwegs-Bulletins stufen die Lage weiter als Hochrisiko ein, mit dem VSR-Virus als Haupttreiber bei kleinen Kindern. Für die Großen gilt: ab heute hinfahren, am liebsten Samstag. Für das ein Monat alte Mädchen zu Hause: lieber abwarten, bis die Welle abflaut.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>31ª Fetexas eröffnet heute, 09.07.</strong>, läuft bis So 12.07. — Centro de Eventos PR-431, Jacarezinho (~20 km), Eintritt frei. Heute Abend: Ícaro &amp; Gilmar, Panda.</li>\n      <li><span class=\"chip good\">Wetter</span> <strong>Trocken bis Samstag</strong>: 27°/13°, 0 % Regen — wärmster, trockenster Tag der Woche. <strong>Sonntag kippt es</strong>: 71 % Regenwahrscheinlichkeit, genau zum Fetexas-Finale.</li>\n      <li><span class=\"chip hot\">Gesundheit</span> <strong>VSR/RSV weiter Hochrisiko in Paraná</strong> (InfoGripe SE 23/2026: „alerta de alto risco\"). Trifft kleine Kinder am stärksten — mit einem Monat altem Baby: Menschenmengen meiden.</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>Dengue-Rückgang ist eine Jahresanfangs-Zahl</strong>: −96,1 % Fälle / −98,8 % Todesfälle gelten für SE 1–14/2026 (Jan.–Mitte März, publiziert 15.04.). Keine aktuelle Juli-Meldung, kein aktiver Alarm.</li>\n      <li><span class=\"chip\">Sicherheit</span> <strong>BR-153: Sprengungen bei Santo Antônio da Platina</strong>, di/do bis Ende Juli, ca. 14–16 Uhr — Fahrplan bei EPR Litoral Pioneiro (0800 277 0153) erfragen. Die Jacarezinho-Strecke zur Fetexas hat heute keine bestätigte Sperrung.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Winterferien starten erst Montag, 13.07.</strong> — diese Woche ist noch Unterricht. Rückkehr: 27.07.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina (~110 km):</strong> Jardim Botânico, Di–So 8–18 Uhr, Eintritt frei — die ruhige Regen-Alternative.</li>\n      <li><span class=\"chip\">Trip</span> <strong>SP-Range (4–6 h):</strong> Rolex 6 Horas de São Paulo in Interlagos, Fr–So 10.–12.07., Fan-Zone mit Kinderprogramm — nur falls ohnehin eine SP-Fahrt ansteht, gleiches Wochenende wie Fetexas.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The 31st Fetexas kicks off tonight in Jacarezinho — four days of free fairground rides, rodeo, and live music, twenty minutes from home. Two independent weather portals agree: it stays dry and pleasantly warm through Saturday, but the sky turns for the big Sunday finale with Sorriso Maroto — 71% chance of rain. Meanwhile, another story stays awake indoors: Paraná's respiratory bulletins still rate the situation as high-risk, with RSV as the main driver among young children. For the older kids: head out from today, ideally Saturday. For the one-month-old at home: better to wait until the wave subsides.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>31st Fetexas opens today, 07/09</strong>, running through Sun 07/12 — Centro de Eventos PR-431, Jacarezinho (~20 km), free admission. Tonight: Ícaro &amp; Gilmar, Panda.</li>\n      <li><span class=\"chip good\">Weather</span> <strong>Dry through Saturday</strong>: 27°/13°, 0% rain — the warmest, driest day of the week. <strong>Sunday turns</strong>: 71% chance of rain, right at Fetexas's finale.</li>\n      <li><span class=\"chip hot\">Health</span> <strong>RSV still high-risk in Paraná</strong> (InfoGripe EW 23/2026: \"high-risk alert\"). Hits young children hardest — with a one-month-old baby: avoid crowds.</li>\n      <li><span class=\"chip\">Health</span> <strong>Dengue decline is a start-of-year figure</strong>: −96.1% cases / −98.8% deaths refer to EW 1–14/2026 (Jan.–mid-March, published 04/15). No current July report, no active alert.</li>\n      <li><span class=\"chip\">Safety</span> <strong>BR-153: blasting near Santo Antônio da Platina</strong>, Tue/Thu through end of July, roughly 2–4 pm — check the schedule with EPR Litoral Pioneiro (0800 277 0153). The Jacarezinho route to Fetexas has no confirmed closure today.</li>\n      <li><span class=\"chip\">School</span> <strong>Winter break doesn't start until Monday, 07/13</strong> — school is still in session this week. Return: 07/27.</li>\n      <li><span class=\"chip\">Trip</span> <strong>Londrina (~110 km):</strong> Jardim Botânico, Tue–Sun 8 am–6 pm, free admission — the quiet rain alternative.</li>\n      <li><span class=\"chip\">Trip</span> <strong>SP range (4–6 h):</strong> Rolex 6 Horas de São Paulo at Interlagos, Fri–Sun 07/10–12, fan zone with kids' program — only if a São Paulo trip is already on the cards, same weekend as Fetexas.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje à noite começa em Jacarezinho a 31ª Fetexas — quatro dias de parque de diversões, rodeio e shows gratuitos, a vinte minutos de carro de casa. Dois portais meteorológicos independentes concordam: o tempo segue seco e bem quente até sábado, mas na grande final de domingo, com Sorriso Maroto, o céu vira — 71% de chance de chuva. Enquanto isso, outro assunto continua em alerta: os boletins respiratórios do Paraná seguem classificando a situação como alto risco, com o VSR como principal responsável entre as crianças pequenas. Para os maiores, vale ir a partir de hoje, de preferência no sábado. Já para a menina de um mês em casa, é melhor esperar a onda passar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>31ª Fetexas abre hoje, 09/07</strong>, segue até dom. 12/07 — Centro de Eventos PR-431, Jacarezinho (~20 km), entrada gratuita. Hoje à noite: Ícaro &amp; Gilmar, Panda.</li>\n      <li><span class=\"chip good\">Tempo</span> <strong>Seco até sábado</strong>: 27°/13°, 0% de chuva — o dia mais quente e seco da semana. <strong>Domingo vira</strong>: 71% de chance de chuva, bem na final da Fetexas.</li>\n      <li><span class=\"chip hot\">Saúde</span> <strong>VSR/RSV segue em alto risco no Paraná</strong> (InfoGripe SE 23/2026: \"alerta de alto risco\"). Atinge mais forte as crianças pequenas — com bebê de um mês em casa: evitar aglomerações.</li>\n      <li><span class=\"chip\">Saúde</span> <strong>Queda da dengue é número de início de ano</strong>: −96,1% de casos / −98,8% de óbitos referem-se à SE 1–14/2026 (jan.–meados de março, publicado em 15/04). Sem boletim atual de julho, sem alerta ativo.</li>\n      <li><span class=\"chip\">Segurança</span> <strong>BR-153: detonações perto de Santo Antônio da Platina</strong>, ter/qui até o fim de julho, por volta das 14h–16h — confirmar o cronograma com a EPR Litoral Pioneiro (0800 277 0153). A rota de Jacarezinho até a Fetexas não tem bloqueio confirmado hoje.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Recesso de inverno só começa na segunda-feira, 13/07</strong> — esta semana ainda tem aula. Volta: 27/07.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Londrina (~110 km):</strong> Jardim Botânico, ter–dom, 8h–18h, entrada gratuita — a opção tranquila para dias de chuva.</li>\n      <li><span class=\"chip\">Passeio</span> <strong>Rota SP (4–6 h):</strong> Rolex 6 Horas de São Paulo em Interlagos, sex–dom, 10–12/07, fan zone com programação infantil — só se já houver uma viagem a SP prevista, no mesmo fim de semana da Fetexas.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta noche comienza en Jacarezinho la 31.ª Fetexas — cuatro días de feria, rodeo y música en vivo, gratis, a veinte minutos en carro de casa. Dos portales meteorológicos independientes coinciden: se mantiene seco y bastante cálido hasta el sábado, pero el cielo cambia justo para la gran final del domingo con Sorriso Maroto — 71% de probabilidad de lluvia. Mientras tanto, otro tema sigue en alerta puertas adentro: los boletines respiratorios de Paraná siguen calificando la situación como de alto riesgo, con el VSR como principal causante entre los niños pequeños. Para los más grandes: conviene salir desde hoy, de preferencia el sábado. Para la niña de un mes en casa: mejor esperar a que baje la ola.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>La 31.ª Fetexas abre hoy, 09/07</strong>, hasta el dom. 12/07 — Centro de Eventos PR-431, Jacarezinho (~20 km), entrada gratuita. Esta noche: Ícaro &amp; Gilmar, Panda.</li>\n      <li><span class=\"chip good\">Clima</span> <strong>Seco hasta el sábado</strong>: 27°/13°, 0% de lluvia — el día más cálido y seco de la semana. <strong>El domingo cambia</strong>: 71% de probabilidad de lluvia, justo en la final de la Fetexas.</li>\n      <li><span class=\"chip hot\">Salud</span> <strong>El VSR/RSV sigue en alto riesgo en Paraná</strong> (InfoGripe SE 23/2026: \"alerta de alto riesgo\"). Golpea más fuerte a los niños pequeños — con una bebé de un mes en casa, evitar aglomeraciones.</li>\n      <li><span class=\"chip\">Salud</span> <strong>La baja del dengue es una cifra de inicio de año</strong>: −96,1% de casos / −98,8% de muertes corresponden a la SE 1–14/2026 (enero–mediados de marzo, publicado el 15/04). No hay reporte reciente de julio ni alerta activa.</li>\n      <li><span class=\"chip\">Seguridad</span> <strong>BR-153: voladuras cerca de Santo Antônio da Platina</strong>, mar/jue hasta fin de julio, aprox. de 14 a 16 h — confirmar el calendario con EPR Litoral Pioneiro (0800 277 0153). La ruta de Jacarezinho hacia la Fetexas no tiene cierre confirmado hoy.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Las vacaciones de invierno empiezan hasta el lunes 13/07</strong> — esta semana todavía hay clases. Regreso: 27/07.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Londrina (~110 km):</strong> Jardim Botânico, mar–dom de 8 a 18 h, entrada gratuita — la alternativa tranquila para los días de lluvia.</li>\n      <li><span class=\"chip\">Paseo</span> <strong>Ruta SP (4–6 h):</strong> Rolex 6 Horas de São Paulo en Interlagos, vie–dom, 10–12/07, zona de fans con programa infantil — solo si ya hay un viaje a São Paulo planeado, mismo fin de semana que la Fetexas.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Donnerstag, der 9. Juli — die Wochenrotation sagt heute eigentlich <em>Fußball &amp; Sport</em>, aber Fußball-Vokabular gab es erst vor einer Woche (02.07., WM-K.o.-Runde). Heute deshalb der Sport-Slot mit einer anderen Linse: allgemeiner <em>Fitness- und Trainingswortschatz</em> — <em>Fitnessstudio</em> statt Stadion, <em>Muskelkater</em> statt Elfmeter. 35 Einträge, davon 12 Verben mit voller Konjugation (10 neu, 2 aufgefrischt). Grammatik-Highlight: ein Drei-Sprachen-Vergleich am Beispiel „es tut weh\" — Deutsch konjugiert <em>wehtun</em> ganz normal durch alle Personen (Perfekt mit <em>haben</em>), Portugiesisch lässt <em>doer</em> nur in der 3. Person zu (ein <em>defektives</em> Verb), und Spanisch <em>doler</em> wechselt im Präsens den Stammvokal (<em>duele</em>, aber <em>dolemos</em>). Dazu <em>laufen</em>, das einzige der drei Fokus-Verben mit <em>sein</em>-Perfekt.</p>\n    <ul>\n      <li><span class=\"chip\">GENUS</span> <strong>das Fitnessstudio / a academia / el gimnasio</strong> — DE Neutrum, PT feminin, ES maskulin: dasselbe Gebäude, drei Genera.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>ES agujetas ≠ dolor muscular (MX)</strong> — in Spanien ist „agujetas\" der Muskelkater, in Mexiko heißt das Wort weiterhin „Schnürsenkel\". Für Muskelkater in Mexiko: <em>dolor muscular</em>. <span class=\"src\"><a href=\"https://es.quora.com/Qu%C3%A9-palabra-se-utiliza-para-decir-agujetas-o-dolor-muscular-tras-el-ejercicio-en-M%C3%A9xico\">quora.com</a></span></li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE laufen: Perfekt mit SEIN</strong> — <em>ich bin gelaufen</em>, nicht *ich habe gelaufen. Bewegungsverben nehmen sein. <span class=\"src\"><a href=\"https://www.verbformen.de/konjugation/laufen.htm\">verbformen.de</a></span></li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE wehtun: Perfekt mit HABEN</strong> — trotz Körpernähe: <em>es hat mir wehgetan</em>, nicht *ist wehgetan. Der Gegenpol zu laufen im selben Brief. <span class=\"src\"><a href=\"https://www.verbformen.de/konjugation/wehtun.htm\">verbformen.de</a></span></li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT doer ist defektiv</strong> — „schmerzen\" existiert im Portugiesischen nur in der 3. Person (dói/doem); <em>eu dôo</em> gibt es nicht. <span class=\"src\"><a href=\"https://www.conjugacao.com.br/verbo-doer/\">conjugacao.com.br</a></span></li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES doler: duele, aber dolemos</strong> — Stammwechsel o→ue nur unter Betonung; die unbetonte nosotros-Form bleibt beim „o\". <span class=\"src\"><a href=\"https://conjugator.reverso.net/conjugation-spanish-verb-doler.html\">reverso.net</a></span></li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES esforzarse: me esforcé, nicht *esforzé</strong> — vor „e\" wird aus „z\" ein „c\" (Pretérito + Subjuntivo), zusätzlich eigener Stammwechsel o→ue im Präsens (me esfuerzo).</li>\n      <li><span class=\"chip good\">BR-PT</span> <strong>malhar</strong> — brasilianische Umgangssprache für „ins Gym gehen, Krafttraining machen\", lockerer als das formale <em>treinar</em>. <span class=\"src\"><a href=\"https://drogariasantoremedio.com.br/girias-de-academia/\">drogariasantoremedio.com.br</a></span></li>\n      <li><span class=\"chip\">PHRASE</span> <strong>der innere Schweinehund</strong> — kein Ein-Wort-Äquivalent in PT/ES; beide umschreiben mit „die Faulheit besiegen\": <em>vencer a preguiça</em> / <em>vencer la flojera</em>.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>ES-MX los pants ≠ Spanien el chándal</strong> — derselbe Trainingsanzug, zwei Wörter je nach Kontinent; in Mexiko ein englisches Lehnwort.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>WIEDERHOLUNG: das Gymnasium ≠ EN gym</strong> — deutsches Gymnasium ist eine weiterführende Schule, kein Fitnessstudio. Vom 25.06. zurück, heute im Sport-Kontext aufgefrischt.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>Warum heute kein Fußball?</strong> — der Donnerstag gehört laut Rotation „Fußball &amp; Sport\", aber Fußball-Vokabular gab es erst vor einer Woche zur WM-K.o.-Runde. Heute deshalb die breitere Linse: allgemeine Fitness.</li>\n    </ul></div>",
