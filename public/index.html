<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);

    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;

    font-family: var(--font-body);

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,

  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));

  }

    font-family: var(--font-body);
    font-size: 0.88rem;

    line-height: 1.5;
    font-style: italic;

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }

  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,

  }

     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }

    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;

    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,

      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;

  }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">

    </button>
  </div>
</header>

       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">

        <span class="cat-color"></span>

           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

        aria-label="Navigation öffnen" title="Navigation">☰</button>

        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Real ist so fest wie lange nicht: Der ECB-Fix von Freitag steht bei <strong>5,8505</strong> — gut ein Prozent unter dem Montag. Der Treiber ist heute noch ein weicher Dollar (DXY nahe Jahres-Tief) — genau dieser Treiber wird aber gerade angezählt. In der Straße von Hormuz hat Iran diese Woche drei Handelsschiffe beschossen, die USA haben Irans Öl-Verkaufslizenz widerrufen, Brent sprang auf ~76 $. Ein Öl-Schock heißt mehr US-Inflation — und der Markt preist deshalb erstmals wieder eine <em>Zins-Erhöhung</em> der Fed im September statt der erwarteten Senkung. Das ist die eigentliche Nachricht der Woche: Eine hawkishe Fed macht den Dollar stark — und die weiche-Dollar-Stütze, die den Real heute trägt, kann sich damit umkehren. Nebendran läuft der US-Zoll-Countdown: In vier Tagen, am <strong>15.07.</strong>, endet die Frist für den 25-%-Zoll auf brasilianische Waren. Der Real steht fest — aber auf einem Bein, das wackelt.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (ECB-Fix, Fr 10.07.) — <span class=\"stat\">−0,56 %</span> zum Do-Fix, <span class=\"stat\">−1,06 %</span> zum Montags-Fix (5,9130). Der Real ist über die Woche klar fester geworden.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1185</strong> (10.07.) — Real rund <span class=\"stat\">0,5 %</span> fester am Tag. Der Dollar ist global weich.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,85</strong> (10.07., Intraday 100,60–100,85) — nahe dem Jahres-Tief. Heute die Haupt-Stütze des Real; zugleich das <em>wackligste</em> Bein, wenn die Fed dreht.</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check sauber</strong>: gleicher Tag (10.07.) 5,8505 vs. rechnerisch 5,8504 (0,001 %), EUR/USD unabhängig gezogen. Kein Datenfehler heute.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Hormuz-Eskalation</strong>: Iran beschoss Mo/Di drei Handelsschiffe, die USA widerriefen Irans Öl-Lizenz, Brent <span class=\"stat\">+5,6 % auf ~76 $</span>. Ein MoU von vor drei Wochen (Iran hält Angriffe an) ist gebrochen. ~20 % des Welt-Öl/Gas-Handels laufen durch die Enge.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed-Wende</strong>: Die Wahrscheinlichkeit einer September-<em>Erhöhung</em> sprang laut CME FedWatch von ~27 % auf 49 % (07.07.) und wurde bis 10.07. mit bis zu 70 % zitiert — vor einem Monat ~33 %. Auslöser: Mai-CPI bei <span class=\"stat\">4,2 %</span> (3-Jahres-Hoch), Energie +23,5 %, plus der frische Öl-Schock.</li>\n      <li><span class=\"chip\">BR</span> <strong>Copom-Signal</strong>: Selic am 17.06. auf <span class=\"stat\">14,25 %</span> gesenkt, aber das Senkungs-Versprechen fallengelassen. Nächste Sitzung 04.–05.08. ist ein echtes Pause/Senkung-Wackeln. Die BCB hob ihre eigene 2026-Inflationsprognose auf <span class=\"stat\">5,2 %</span> (Ziel-Obergrenze 4,5 %).</li>\n      <li><span class=\"chip hot\">USA/BR</span> <strong>Zoll-Stichtag 15.07.</strong> — USTR Section 301, 25 % auf BR-Waren, in <strong>4 Tagen</strong>. Der zweite Binär-Trigger dieser Woche.</li>\n      <li><span class=\"chip\">BR</span> <strong>FX-Swaps schrumpfen</strong>: Die BCB fuhr ihren Swap-Bestand Richtung unter US$ 100 Mrd. (erstmals seit Mai 2022) — ein weiches Signal, dass sie mit dem Real-Niveau zufrieden ist. (Bericht von Feb. 2026, für Juli nicht neu bestätigt.)</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The real is stronger than it's been in a while: Friday's ECB fix stands at <strong>5.8505</strong> — a good one percent below Monday. Today's driver is still a soft dollar (DXY near its yearly low) — but that very driver is now being counted out. In the Strait of Hormuz, Iran fired on three merchant ships this week, the US revoked Iran's oil-export license, and Brent jumped to ~$76. An oil shock means more US inflation — and the market is therefore pricing in a Fed <em>rate hike</em> in September again for the first time, instead of the expected cut. That's the real story of the week: a hawkish Fed makes the dollar strong — and the soft-dollar prop currently holding up the real could flip. Alongside that, the US tariff countdown keeps running: in four days, on <strong>Jul 15</strong>, the deadline expires for the 25% tariff on Brazilian goods. The real stands firm — but on a leg that's shaking.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8505</strong> (ECB fix, Fri Jul 10) — <span class=\"stat\">−0.56%</span> vs. Thursday's fix, <span class=\"stat\">−1.06%</span> vs. Monday's fix (5.9130). The real has clearly firmed over the week.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1185</strong> (Jul 10) — real about <span class=\"stat\">0.5%</span> firmer on the day. The dollar is globally soft.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.85</strong> (Jul 10, intraday 100.60–100.85) — near the yearly low. Today it's the real's main prop; also the shakiest leg if the Fed turns.</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: same day (Jul 10) 5.8505 vs. a computed 5.8504 (0.001%), EUR/USD pulled independently. No data error today.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Hormuz escalation</strong>: Iran fired on three merchant ships Mon/Tue, the US revoked Iran's oil license, Brent <span class=\"stat\">+5.6% to ~$76</span>. An MoU from three weeks ago (Iran halts attacks) has been broken. ~20% of world oil/gas trade passes through the strait.</li>\n      <li><span class=\"chip hot\">USA</span> <strong>Fed pivot</strong>: the odds of a September hike jumped from <span class=\"stat\">~27% to 49%</span> (Jul 7) per CME FedWatch and were quoted as high as 70% by Jul 10 — versus ~33% a month ago. Trigger: May CPI at <span class=\"stat\">4.2%</span> (3-year high), energy +23.5%, plus the fresh oil shock.</li>\n      <li><span class=\"chip\">BR</span> <strong>Copom signal</strong>: Selic cut to <span class=\"stat\">14.25%</span> on Jun 17, but the pledge to keep cutting was dropped. The next meeting (Aug 4–5) is a genuine pause-vs-cut toss-up. The BCB raised its own 2026 inflation forecast to <span class=\"stat\">5.2%</span> (target ceiling 4.5%).</li>\n      <li><span class=\"chip hot\">US/BR</span> <strong>Tariff deadline Jul 15</strong> — USTR Section 301, 25% on BR goods, in <strong>4 days</strong>. This week's second binary trigger.</li>\n      <li><span class=\"chip\">BR</span> <strong>FX swaps shrinking</strong>: the BCB was running its swap book down toward below US$100 billion (for the first time since May 2022) — a soft signal that it's comfortable with the real's level. (Reported Feb 2026, not re-confirmed for July.)</li>\n      <li><span class=\"chip\">Note</span> The forecast probabilities below = <strong>my confidence level</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O real está mais forte do que há muito tempo: o fix do BCE de sexta-feira está em <strong>5,8505</strong> — bem um por cento abaixo de segunda-feira. O motor de hoje ainda é um dólar fraco (DXY perto da mínima do ano) — mas é justamente esse motor que agora está sendo contestado. No Estreito de Ormuz, o Irã atacou três navios mercantes esta semana, os EUA revogaram a licença iraniana de venda de petróleo, e o Brent saltou para ~76 dólares. Um choque no petróleo significa mais inflação nos EUA — e por isso o mercado volta a precificar, pela primeira vez, uma <em>alta de juros</em> do Fed em setembro, em vez do corte esperado. Essa é a verdadeira notícia da semana: um Fed hawkish fortalece o dólar — e o suporte do dólar fraco que hoje sustenta o real pode se inverter. Paralelamente, segue a contagem regressiva tarifária dos EUA: em quatro dias, no dia <strong>15/07</strong>, vence o prazo para a tarifa de 25% sobre produtos brasileiros. O real está firme — mas apoiado em uma perna que balança.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (fix do BCE, sex 10/07) — <span class=\"stat\">−0,56%</span> em relação ao fix de quinta, <span class=\"stat\">−1,06%</span> em relação ao fix de segunda-feira (5,9130). O real se fortaleceu claramente ao longo da semana.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1185</strong> (10/07) — real cerca de <span class=\"stat\">0,5%</span> mais forte no dia. O dólar está fraco globalmente.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,85</strong> (10/07, intradiário 100,60–100,85) — perto da mínima do ano. Hoje é o principal suporte do real; ao mesmo tempo, a perna mais instável se o Fed virar.</li>\n      <li><span class=\"chip\">FX</span> <strong>Checagem de câmbio cruzado limpa</strong>: mesmo dia (10/07) 5,8505 vs. cálculo 5,8504 (0,001%), com o EUR/USD extraído de forma independente. Nenhum erro de dado hoje.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Escalada em Ormuz</strong>: o Irã atacou seg/ter três navios mercantes, os EUA revogaram a licença de petróleo do Irã, Brent <span class=\"stat\">+5,6% para ~76 dólares</span>. Um memorando de três semanas atrás (o Irã se comprometia a parar os ataques) foi rompido. ~20% do comércio mundial de petróleo e gás passa por esse estreito.</li>\n      <li><span class=\"chip hot\">EUA</span> <strong>Virada do Fed</strong>: a probabilidade de uma alta em setembro saltou, segundo o CME FedWatch, de <span class=\"stat\">~27% para 49%</span> (07/07) e chegou a ser citada em até 70% até 10/07 — há um mês estava em ~33%. Gatilho: o CPI de maio veio em <span class=\"stat\">4,2%</span> (máxima em 3 anos), energia +23,5%, mais o novo choque do petróleo.</li>\n      <li><span class=\"chip\">BR</span> <strong>Sinal do Copom</strong>: a Selic foi cortada para <span class=\"stat\">14,25%</span> em 17/06, mas a promessa de novos cortes foi abandonada. A próxima reunião, em 04–05/08, é uma verdadeira indefinição entre pausa e corte. O BC elevou sua própria projeção de inflação para 2026 para <span class=\"stat\">5,2%</span> (teto da meta de 4,5%).</li>\n      <li><span class=\"chip hot\">EUA/BR</span> <strong>Prazo tarifário 15/07</strong> — Seção 301 do USTR, 25% sobre produtos do BR, em <strong>4 dias</strong>. O segundo gatilho binário da semana.</li>\n      <li><span class=\"chip\">BR</span> <strong>Swaps cambiais encolhem</strong>: o BC vinha levando seu estoque de swaps para abaixo de US$ 100 bilhões (pela primeira vez desde maio de 2022) — um sinal discreto de que está satisfeito com o nível do real. (Reportado em fev. 2026, não reconfirmado para julho.)</li>\n      <li><span class=\"chip\">Nota</span> As probabilidades de previsão abaixo = <strong>minha confiança pessoal</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El real está más fuerte de lo que ha estado en mucho tiempo: el fix del BCE del viernes se ubica en <strong>5,8505</strong> — casi un uno por ciento por debajo del lunes. El motor de hoy sigue siendo un dólar débil (DXY cerca del mínimo del año) — pero es justo ese motor el que ahora está en entredicho. En el Estrecho de Ormuz, Irán atacó esta semana a tres buques mercantes, Estados Unidos revocó la licencia de Irán para vender petróleo, y el Brent saltó a ~76 dólares. Un choque petrolero implica más inflación en Estados Unidos — y por eso el mercado vuelve a descontar, por primera vez, un <em>alza de tasas</em> de la Fed en septiembre en lugar del recorte que se esperaba. Esa es la verdadera noticia de la semana: una Fed hawkish fortalece al dólar — y el soporte del dólar débil que hoy sostiene al real podría revertirse. En paralelo, sigue la cuenta regresiva arancelaria de Estados Unidos: en cuatro días, el <strong>15/07</strong>, vence el plazo para el arancel del 25% a los productos brasileños. El real está firme — pero apoyado en una pata que tiembla.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (fix del BCE, vie 10/07) — <span class=\"stat\">−0,56%</span> respecto al fix del jueves, <span class=\"stat\">−1,06%</span> respecto al fix del lunes (5,9130). El real se ha fortalecido claramente a lo largo de la semana.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1185</strong> (10/07) — real alrededor de <span class=\"stat\">0,5%</span> más firme en el día. El dólar está débil a nivel global.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100,85</strong> (10/07, intradía 100,60–100,85) — cerca del mínimo del año. Hoy es el principal soporte del real; al mismo tiempo, la pata más inestable si la Fed da un giro.</li>\n      <li><span class=\"chip\">FX</span> <strong>Revisión del tipo de cambio cruzado limpia</strong>: mismo día (10/07) 5,8505 frente al cálculo 5,8504 (0,001%), con el EUR/USD tomado de forma independiente. Sin error de datos hoy.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Escalada en Ormuz</strong>: Irán atacó lun/mar a tres buques mercantes, Estados Unidos revocó la licencia petrolera de Irán, Brent <span class=\"stat\">+5,6% a ~76 dólares</span>. Se rompió un memorando de hace tres semanas (Irán se comprometía a detener los ataques). ~20% del comercio mundial de petróleo y gas pasa por ese estrecho.</li>\n      <li><span class=\"chip hot\">EE. UU.</span> <strong>Giro de la Fed</strong>: la probabilidad de un alza en septiembre saltó, según el CME FedWatch, de <span class=\"stat\">~27% a 49%</span> (07/07) y llegó a citarse hasta en 70% para el 10/07 — hace un mes estaba en ~33%. Detonante: el CPI de mayo llegó a <span class=\"stat\">4,2%</span> (máximo en 3 años), energía +23,5%, más el nuevo choque petrolero.</li>\n      <li><span class=\"chip\">BR</span> <strong>Señal del Copom</strong>: la Selic se recortó a <span class=\"stat\">14,25%</span> el 17/06, pero se abandonó la promesa de seguir bajándola. La próxima reunión, el 04–05/08, es una verdadera indefinición entre pausa y recorte. El banco central elevó su propio pronóstico de inflación para 2026 a <span class=\"stat\">5,2%</span> (techo de la meta en 4,5%).</li>\n      <li><span class=\"chip hot\">EE. UU./BR</span> <strong>Plazo arancelario 15/07</strong> — Sección 301 del USTR, 25% sobre productos brasileños, en <strong>4 días</strong>. El segundo detonante binario de la semana.</li>\n      <li><span class=\"chip\">BR</span> <strong>Los swaps cambiarios se reducen</strong>: el banco central venía llevando su cartera de swaps hacia menos de US$ 100 mil millones (por primera vez desde mayo de 2022) — una señal discreta de que está conforme con el nivel del real. (Reportado en feb. 2026, no reconfirmado para julio.)</li>\n      <li><span class=\"chip\">Nota</span> Las probabilidades de pronóstico de abajo = <strong>mi confianza personal</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

-Bein wird grün — aber die Quellen sind uneinig, YTD noch ~5,4 Mrd. $ im Minus.</li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent ~76 $</strong> (−0,39 % Fr, +~5 % Woche), <strong>WTI ~71 $</strong>. Die Kriegsprämie vom Ceasefire-Bruch (08.07.: Brent +5,43 % auf 78,19 $) atmet, hält aber die Wochenbilanz. Hormuz bleibt der Dauer-Katalysator.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~4.104–4.111 $/oz</strong> (−0,30 %, Spanne 4.094–4.135 $, 10.07.), stabil knapp über 4.100 $, unterm Strich ruhige Woche. DXY driftet bei <strong>~100,9</strong> (weich belegt, 09.07.).</li>\n      <li><span class=\"chip good\">INDIZES</span> Grüner Wochenschluss: <strong>S&amp;P 500 7.575,39</strong> (+0,42 %), <strong>Dow 52.637,01</strong> (+0,29 %), <strong>Nasdaq 26.281,61</strong> (+0,29 %), alle 10.07.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.794,99 $</strong> (+1,26 % 24h). ETH-ETFs in der 8. Abfluss-Woche in Folge — schwächer als BTC. Gleichschritt-Beta, kein eigener Trigger. Halten.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Heute <em>gemischtes</em> Tape: PEPE (+3,34 %) führt die Memes, aber TAO (−0,51 %), NEAR (−2,08 %) und IMX (−4,10 %) rot. Genau der Beweis: kein kohärenter Sektor, nur BTC-Beta mit Etikett.</li>\n      <li><span class=\"chip\">REVIERE</span> KI-Modell- und Agent-Launches stehen im <em>ai-dev</em>-Brief, angewandte KI im <em>ai-usecases</em>-Brief. Hier zählt allein die Kursreaktion.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The week closes green — and two stories carry it. First: memory giant <strong>SK Hynix</strong>, Nvidia's most important HBM supplier, went public in the US, popped over <strong>14%</strong> on its first day, and raised <strong>$26.5 billion</strong> — the largest US IPO of a foreign company ever. <strong>Nvidia rode along, up 4.03% to $210.96</strong>; the market is pricing in years of AI-memory demand.<sup>[2][4]</sup> Second, quieter but more important for my crypto book: after the <em>worst month since launch</em> (June –$4.5 billion, an eight-week outflow streak topping $8.2 billion), the US spot Bitcoin ETFs are showing the first real inflow signal — a <strong>$510 million run over three sessions (Jul 7–9)</strong>.<sup>[14][15]</sup> Bitcoin sits at <strong>$64,109</strong>, roughly 10% above its 21-month low. That's exactly the flow leg my BTC trigger has been waiting for — with one honest caveat: the ETF flow numbers remain contested depending on the source. At the commodities table, the Iran war premium is breathing: <strong>Brent closes the week around $76</strong> (Friday −0.39%, but +~5% for the week) after the ceasefire breakdown on 08.07.<sup>[6][8]</sup> <strong>Gold trades sideways just above $4,100</strong> — barely changed for the week.<sup>[9][10]</sup></p>\n    <ul>\n      <li><span class=\"chip hot\">AI MEMORY</span> <strong>SK Hynix breaks the IPO record.</strong> Opened at $170/share, +14% pop, $26.5 billion raised — the largest-ever US IPO by a foreign company. Nvidia (HBM customer) +4.03% to $210.96. The \"AI memory is the bottleneck\" thesis gets priced in.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC $64,109</strong> (+0.28% 24h, CoinGecko 11.07. 05:06 UTC; cross-check Fortune $64,340.78, 10.07.). For the first time, a real inflow signal in the spot ETFs: a $510 million run over Jul 7–9 after June's $4.5 billion outflow. My flow leg turns green — but sources disagree, and YTD is still ~$5.4 billion in the red.</li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent ~$76</strong> (−0.39% Fri, +~5% week), <strong>WTI ~$71</strong>. The war premium from the ceasefire breakdown (08.07.: Brent +5.43% to $78.19) is breathing, but the weekly tally holds. Hormuz remains the standing catalyst.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold ~$4,104–$4,111/oz</strong> (−0.30%, range $4,094–$4,135, 10.07.), steady just above $4,100, a quiet week on balance. DXY drifts around <strong>~100.9</strong> (softly sourced, 09.07.).</li>\n      <li><span class=\"chip good\">INDEXES</span> A green close to the week: <strong>S&amp;P 500 7,575.39</strong> (+0.42%), <strong>Dow 52,637.01</strong> (+0.29%), <strong>Nasdaq 26,281.61</strong> (+0.29%), all 10.07.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1,794.99</strong> (+1.26% 24h). ETH ETFs in their 8th consecutive outflow week — weaker than BTC. Lockstep beta, no catalyst of its own. Hold.</li>\n      <li><span class=\"chip\">SECTORS</span> Today's tape is <em>mixed</em>: PEPE (+3.34%) leads the memes, but TAO (−0.51%), NEAR (−2.08%) and IMX (−4.10%) are red. Exactly the proof: no coherent sector, just BTC beta with a label.</li>\n      <li><span class=\"chip\">TERRITORY</span> AI model and agent launches belong in the <em>ai-dev</em> brief, applied AI in the <em>ai-usecases</em> brief. Here, only the price reaction counts.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A semana fecha no verde — e duas histórias sustentam esse resultado. Primeiro: a gigante de memória <strong>SK Hynix</strong>, principal fornecedora de HBM da Nvidia, abriu capital nos EUA, disparou mais de <strong>14%</strong> no primeiro dia e captou <strong>26,5 bi $</strong> — o maior IPO nos EUA de uma empresa estrangeira da história. <strong>A Nvidia acompanhou, subindo 4,03% para 210,96 $</strong>; o mercado está precificando anos de demanda por memória de IA.<sup>[2][4]</sup> Segundo, mais discreto, mas mais importante para minha carteira cripto: depois do <em>pior mês desde o lançamento</em> (junho −4,5 bi $, sequência de oito semanas de saídas somando mais de 8,2 bi $), os ETFs spot de Bitcoin dos EUA mostram o primeiro sinal real de entrada de recursos — um <strong>fluxo de 510 mi $ ao longo de três pregões (7–9/07)</strong>.<sup>[14][15]</sup> O Bitcoin está em <strong>64.109 $</strong>, cerca de 10% acima de sua mínima de 21 meses. É exatamente a perna de fluxo que meu gatilho de BTC esperava — com uma ressalva honesta: os números de fluxo dos ETFs seguem contestados conforme a fonte. Na mesa de commodities, o prêmio de guerra do Irã respira: o <strong>Brent fecha a semana perto de 76 $</strong> (sexta −0,39%, mas +~5% na semana) após a quebra do cessar-fogo em 08.07.<sup>[6][8]</sup> <strong>O ouro opera de lado, logo acima de 4.100 $</strong> — praticamente sem mudança na semana.<sup>[9][10]</sup></p>\n    <ul>\n      <li><span class=\"chip hot\">MEMÓRIA IA</span> <strong>SK Hynix quebra o recorde de IPO.</strong> Abertura a 170 $/ação, pop de +14%, 26,5 bi $ captados — maior IPO nos EUA de uma empresa estrangeira já registrado. Nvidia (cliente de HBM) +4,03% para 210,96 $. A tese \"memória de IA é o gargalo\" está sendo precificada.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.109 $</strong> (+0,28% em 24h, CoinGecko 11.07. 05:06 UTC; contraprova Fortune 64.340,78 $, 10.07.). Pela primeira vez, um sinal real de entrada nos ETFs spot: fluxo de 510 mi $ entre 7–9/07 depois da saída de 4,5 bi $ em junho. Minha perna de fluxo fica verde — mas as fontes divergem, e o acumulado do ano ainda está negativo em ~5,4 bi $.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~76 $</strong> (−0,39% sex., +~5% na semana), <strong>WTI ~71 $</strong>. O prêmio de guerra da quebra do cessar-fogo (08.07.: Brent +5,43% para 78,19 $) respira, mas o saldo da semana se mantém. Ormuz segue como catalisador permanente.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro ~4.104–4.111 $/oz</strong> (−0,30%, faixa 4.094–4.135 $, 10.07.), estável logo acima de 4.100 $, semana tranquila no balanço. DXY oscila em <strong>~100,9</strong> (respaldo fraco, 09.07.).</li>\n      <li><span class=\"chip good\">ÍNDICES</span> Fechamento semanal no verde: <strong>S&amp;P 500 7.575,39</strong> (+0,42%), <strong>Dow 52.637,01</strong> (+0,29%), <strong>Nasdaq 26.281,61</strong> (+0,29%), todos de 10.07.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.794,99 $</strong> (+1,26% em 24h). ETFs de ETH na 8ª semana seguida de saídas — mais fraco que o BTC. Beta em compasso, sem gatilho próprio. Manter.</li>\n      <li><span class=\"chip\">SETORES</span> Painel <em>misto</em> hoje: PEPE (+3,34%) lidera os memes, mas TAO (−0,51%), NEAR (−2,08%) e IMX (−4,10%) no vermelho. Exatamente a prova: nenhum setor coerente, apenas beta do BTC com etiqueta.</li>\n      <li><span class=\"chip\">TERRITÓRIO</span> Lançamentos de modelos e agentes de IA ficam no boletim <em>ai-dev</em>, IA aplicada no boletim <em>ai-usecases</em>. Aqui, só conta a reação de preço.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La semana cierra en verde — y dos historias la sostienen. Primero: la gigante de memoria <strong>SK Hynix</strong>, el proveedor más importante de HBM de Nvidia, salió a bolsa en Estados Unidos, saltó más de <strong>14%</strong> el primer día y recaudó <strong>26,5 mil millones de $</strong> — la mayor oferta pública inicial en EE. UU. de una empresa extranjera de la historia. <strong>Nvidia se sumó al movimiento, subiendo 4,03% hasta 210,96 $</strong>; el mercado está anticipando años de demanda de memoria para IA.<sup>[2][4]</sup> Segundo, más discreto, pero más importante para mi cartera cripto: tras el <em>peor mes desde su lanzamiento</em> (junio −4,5 mil millones de $, racha de ocho semanas de salidas que superó los 8,2 mil millones), los ETF spot de Bitcoin en EE. UU. muestran la primera señal real de entradas — una <strong>racha de 510 millones de $ a lo largo de tres sesiones (7–9/07)</strong>.<sup>[14][15]</sup> Bitcoin cotiza en <strong>64.109 $</strong>, alrededor de 10% por encima de su mínimo de 21 meses. Es justo la pata de flujo que mi disparador de BTC estaba esperando — con una salvedad honesta: las cifras de flujo de los ETF siguen siendo controvertidas según la fuente. En la mesa de materias primas, la prima de guerra de Irán respira: el <strong>Brent cierra la semana cerca de 76 $</strong> (viernes −0,39%, pero +~5% en la semana) tras la ruptura del alto el fuego el 08.07.<sup>[6][8]</sup> <strong>El oro se mueve de lado, justo por encima de 4.100 $</strong> — prácticamente sin cambios en la semana.<sup>[9][10]</sup></p>\n    <ul>\n      <li><span class=\"chip hot\">MEMORIA IA</span> <strong>SK Hynix rompe el récord de OPI.</strong> Apertura a 170 $/acción, salto de +14%, 26,5 mil millones de $ recaudados — la mayor OPI en EE. UU. de una empresa extranjera hasta ahora. Nvidia (cliente de HBM) +4,03% hasta 210,96 $. La tesis \"la memoria de IA es el cuello de botella\" se está poniendo en precio.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.109 $</strong> (+0,28% en 24 h, CoinGecko 11.07. 05:06 UTC; verificación cruzada de Fortune 64.340,78 $, 10.07.). Por primera vez, una señal real de entradas en los ETF spot: racha de 510 millones de $ entre el 7 y el 9 de julio, después de la salida de 4,5 mil millones de $ en junio. Mi pata de flujo se pone en verde — pero las fuentes no coinciden, y en lo que va del año el saldo aún es negativo en ~5,4 mil millones de $.</li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent ~76 $</strong> (−0,39% el viernes, +~5% en la semana), <strong>WTI ~71 $</strong>. La prima de guerra por la ruptura del alto el fuego (08.07.: Brent +5,43% hasta 78,19 $) respira, pero el saldo semanal se sostiene. Ormuz sigue siendo el catalizador permanente.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro ~4.104–4.111 $/oz</strong> (−0,30%, rango 4.094–4.135 $, 10.07.), estable justo por encima de 4.100 $, semana tranquila en general. El DXY ronda los <strong>~100,9</strong> (respaldo débil, 09.07.).</li>\n      <li><span class=\"chip good\">ÍNDICES</span> Cierre semanal en verde: <strong>S&amp;P 500 7.575,39</strong> (+0,42%), <strong>Dow 52.637,01</strong> (+0,29%), <strong>Nasdaq 26.281,61</strong> (+0,29%), todos del 10.07.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.794,99 $</strong> (+1,26% en 24 h). Los ETF de ETH van en la 8ª semana consecutiva de salidas — más débil que el BTC. Beta al mismo ritmo, sin disparador propio. Mantener.</li>\n      <li><span class=\"chip\">SECTORES</span> Panorama <em>mixto</em> hoy: PEPE (+3,34%) lidera los memes, pero TAO (−0,51%), NEAR (−2,08%) e IMX (−4,10%) están en rojo. Justo la prueba: ningún sector coherente, solo beta de BTC con etiqueta.</li>\n      <li><span class=\"chip\">TERRITORIO</span> Los lanzamientos de modelos y agentes de IA van en el boletín <em>ai-dev</em>, la IA aplicada en el boletín <em>ai-usecases</em>. Aquí solo cuenta la reacción de precio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Nach einer schweren Sicherheits-Woche nimmt heute die Toolchain die Schlagzeile: TypeScript 7.0 ist final — der Compiler ist von TypeScript nach Go umgeschrieben, das bringt real das Zehnfache an Tempo. Ruhen darf die Security-Front trotzdem nicht. Ein Gitea-Docker-Image vertraut per Default jeder IP als eingeloggtem Nutzer (CVSS 9,8), Chrome stopft eine kritische Views-Lücke, zwei frische CISA-KEV-Nachträge laufen am Montag ab — und Europa schaltet bei KI-Sicherheit einen Gang hoch. Samstag, viel Substanz, kein Alarm.</p>\n    <ul>\n      <li><span class=\"chip good\">Release</span> <strong>TypeScript 7.0 GA</strong>: nativer Go-Compiler, 8- bis 12-fach schnellere Full-Builds; im VS-Code-Repo fiel „Datei öffnen bis erster Fehler\" von 17,5 s auf 1,3 s.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Gitea-Docker CVE-2026-20896</strong> (CVSS 9,8): das Image traut per Default <em>jeder</em> IP den Auth-Header <code>X-WEBAUTH-USER</code> — komplette Nutzer-Impersonation.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome 150.0.7871.114/.115</strong>: kritischer Use-after-free in der Views-Komponente (CVE-2026-15129), RCE-Potenzial — kein Exploit in der Wildnis bekannt.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV +2</strong> (10.07): Balbooa Forms (CVE-2026-56291) und iCagenda (CVE-2026-48939) — Upload-Lücken, Frist Montag 13.07.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU-Aktionsplan Cybersicherheit &amp; KI</strong> (07.07): neun Maßnahmen, ENISA/JRC-Testplattform bis Q4 2026; AI-Act-Durchsetzung gegen Systemrisiko-Modelle ab 02.08.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>BSI A5</strong> „Community Draft\": modularer Audit-Katalog für vertrauenswürdige KI, in OSCAL — Kommentare bis 31.08.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (im Juli) sperrt Install-Scripts, Git- und Remote-Deps per Default — gestern ausführlich, heute nur die Erinnerung.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Tailscale</strong>: Nested-Group-Sync für Entra ID und Google Workspace, plus Self-Service-IdP-Wechsel aus der Admin-Konsole.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Caddy CVE-2026-45692</strong> (23.06, Fix in 2.11.3): <code>/config</code>-Autorisierung und Path-Traversal sind sich uneins — Scores uneinheitlich (NVD 3,8 / GitHub 5,4).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Nach einer schweren Sicherheits-Woche nimmt heute die Toolchain die Schlagzeile: TypeScript 7.0 ist final — der Compiler ist von TypeScript nach Go umgeschrieben, das bringt real das Zehnfache an Tempo. Ruhen darf die Security-Front trotzdem nicht. Ein Gitea-Docker-Image vertraut per Default jeder IP als eingeloggtem Nutzer (CVSS 9,8), Chrome stopft eine kritische Views-Lücke, zwei frische CISA-KEV-Nachträge laufen am Montag ab — und Europa schaltet bei KI-Sicherheit einen Gang hoch. Samstag, viel Substanz, kein Alarm.</p>\n    <ul>\n      <li><span class=\"chip good\">Release</span> <strong>TypeScript 7.0 GA</strong>: nativer Go-Compiler, 8- bis 12-fach schnellere Full-Builds; im VS-Code-Repo fiel „Datei öffnen bis erster Fehler\" von 17,5 s auf 1,3 s.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Gitea-Docker CVE-2026-20896</strong> (CVSS 9,8): das Image traut per Default <em>jeder</em> IP den Auth-Header <code>X-WEBAUTH-USER</code> — komplette Nutzer-Impersonation.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome 150.0.7871.114/.115</strong>: kritischer Use-after-free in der Views-Komponente (CVE-2026-15129), RCE-Potenzial — kein Exploit in der Wildnis bekannt.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV +2</strong> (10.07): Balbooa Forms (CVE-2026-56291) und iCagenda (CVE-2026-48939) — Upload-Lücken, Frist Montag 13.07.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>EU-Aktionsplan Cybersicherheit &amp; KI</strong> (07.07): neun Maßnahmen, ENISA/JRC-Testplattform bis Q4 2026; AI-Act-Durchsetzung gegen Systemrisiko-Modelle ab 02.08.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>BSI A5</strong> „Community Draft\": modularer Audit-Katalog für vertrauenswürdige KI, in OSCAL — Kommentare bis 31.08.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (im Juli) sperrt Install-Scripts, Git- und Remote-Deps per Default — gestern ausführlich, heute nur die Erinnerung.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Tailscale</strong>: Nested-Group-Sync für Entra ID und Google Workspace, plus Self-Service-IdP-Wechsel aus der Admin-Konsole.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Caddy CVE-2026-45692</strong> (23.06, Fix in 2.11.3): <code>/config</code>-Autorisierung und Path-Traversal sind sich uneins — Scores uneinheitlich (NVD 3,8 / GitHub 5,4).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">After a heavy security week, the toolchain takes the headline today: TypeScript 7.0 is final — the compiler has been rewritten from TypeScript to Go, delivering a real tenfold speedup. Still, the security front doesn't get to rest. A Gitea Docker image trusts any IP as a logged-in user by default (CVSS 9.8), Chrome patches a critical Views flaw, two fresh CISA KEV additions expire Monday — and Europe shifts up a gear on AI security. Saturday, plenty of substance, no alarm.</p>\n    <ul>\n      <li><span class=\"chip good\">Release</span> <strong>TypeScript 7.0 GA</strong>: native Go compiler, 8x to 12x faster full builds; in the VS Code repo, \"open file to first error\" dropped from 17.5s to 1.3s.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Gitea Docker CVE-2026-20896</strong> (CVSS 9.8): the image trusts the auth header <code>X-WEBAUTH-USER</code> from <em>any</em> IP by default — complete user impersonation.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome 150.0.7871.114/.115</strong>: critical use-after-free in the Views component (CVE-2026-15129), RCE potential — no known exploit in the wild.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV +2</strong> (Jul 10): Balbooa Forms (CVE-2026-56291) and iCagenda (CVE-2026-48939) — upload flaws, deadline Monday, Jul 13.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>EU action plan on cybersecurity &amp; AI</strong> (Jul 7): nine measures, ENISA/JRC test platform by Q4 2026; AI Act enforcement against systemic-risk models starts Aug 2.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>BSI A5</strong> \"Community Draft\": a modular audit catalog for trustworthy AI, in OSCAL — comments open until Aug 31.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (in July) locks down install scripts, git and remote deps by default — covered in depth yesterday, today just the reminder.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Tailscale</strong>: nested group sync for Entra ID and Google Workspace, plus self-service IdP switching from the admin console.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Caddy CVE-2026-45692</strong> (Jun 23, fixed in 2.11.3): <code>/config</code> authorization and path traversal disagree on the target — scores diverge (NVD 3.8 / GitHub 5.4).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Depois de uma semana pesada de segurança, hoje é a toolchain que vira manchete: o TypeScript 7.0 é final — o compilador foi reescrito de TypeScript para Go, o que traz um ganho real de dez vezes em velocidade. Mesmo assim, a frente de segurança não pode descansar. Uma imagem Docker do Gitea confia, por padrão, em qualquer IP como se fosse um usuário logado (CVSS 9,8), o Chrome corrige uma falha crítica na Views, dois novos acréscimos ao KEV da CISA vencem na segunda-feira — e a Europa acelera na segurança de IA. Sábado, muita substância, sem alarme.</p>\n    <ul>\n      <li><span class=\"chip good\">Release</span> <strong>TypeScript 7.0 GA</strong>: compilador nativo em Go, builds completos de 8 a 12 vezes mais rápidos; no repositório do VS Code, \"abrir arquivo até o primeiro erro\" caiu de 17,5 s para 1,3 s.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Gitea Docker CVE-2026-20896</strong> (CVSS 9,8): a imagem confia, por padrão, no cabeçalho de autenticação <code>X-WEBAUTH-USER</code> vindo de <em>qualquer</em> IP — personificação completa de usuário.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome 150.0.7871.114/.115</strong>: use-after-free crítico no componente Views (CVE-2026-15129), com potencial de RCE — nenhum exploit conhecido em uso real.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV +2</strong> (10.07): Balbooa Forms (CVE-2026-56291) e iCagenda (CVE-2026-48939) — falhas de upload, prazo segunda-feira, 13.07.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>Plano de ação da UE para cibersegurança e IA</strong> (07.07): nove medidas, plataforma de testes ENISA/JRC até o 4º trimestre de 2026; aplicação do AI Act contra modelos de risco sistêmico a partir de 02.08.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>BSI A5</strong> \"Community Draft\": catálogo de auditoria modular para IA confiável, em OSCAL — comentários até 31.08.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (em julho) passa a bloquear scripts de instalação, dependências git e remotas por padrão — detalhado ontem, hoje só o lembrete.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Tailscale</strong>: sincronização de grupos aninhados para Entra ID e Google Workspace, além de troca self-service de IdP direto no console de administração.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Caddy CVE-2026-45692</strong> (23.06, correção na 2.11.3): a autorização de <code>/config</code> e o path traversal não concordam entre si — notas divergentes (NVD 3,8 / GitHub 5,4).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Después de una semana pesada en seguridad, hoy la toolchain se lleva el titular: TypeScript 7.0 es final — el compilador fue reescrito de TypeScript a Go, lo que trae una ganancia real de diez veces en velocidad. Aun así, el frente de seguridad no puede descansar. Una imagen Docker de Gitea confía por defecto en cualquier IP como si fuera un usuario ya logueado (CVSS 9,8), Chrome corrige una falla crítica en Views, dos nuevas incorporaciones al KEV de la CISA vencen el lunes — y Europa acelera en seguridad de IA. Sábado, mucha sustancia, sin alarma.</p>\n    <ul>\n      <li><span class=\"chip good\">Release</span> <strong>TypeScript 7.0 GA</strong>: compilador nativo en Go, compilaciones completas de 8 a 12 veces más rápidas; en el repositorio de VS Code, \"abrir archivo hasta el primer error\" bajó de 17,5 s a 1,3 s.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Gitea Docker CVE-2026-20896</strong> (CVSS 9,8): la imagen confía por defecto en el encabezado de autenticación <code>X-WEBAUTH-USER</code> venga de <em>cualquier</em> IP — suplantación completa de usuario.</li>\n      <li><span class=\"chip hot\">Browser</span> <strong>Chrome 150.0.7871.114/.115</strong>: use-after-free crítico en el componente Views (CVE-2026-15129), con potencial de RCE — sin exploit conocido en circulación.</li>\n      <li><span class=\"chip\">Sec</span> <strong>CISA KEV +2</strong> (10.07): Balbooa Forms (CVE-2026-56291) e iCagenda (CVE-2026-48939) — fallas de upload, plazo lunes 13.07.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>Plan de acción de la UE para ciberseguridad e IA</strong> (07.07): nueve medidas, plataforma de pruebas de ENISA/JRC para el cuarto trimestre de 2026; aplicación de la AI Act contra modelos de riesgo sistémico a partir del 02.08.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>BSI A5</strong> \"Community Draft\": catálogo de auditoría modular para IA confiable, en OSCAL — comentarios hasta el 31.08.</li>\n      <li><span class=\"chip\">Infra</span> <strong>npm v12</strong> (en julio) bloquea por defecto los scripts de instalación y las dependencias de git y remotas — se detalló ayer, hoy solo el recordatorio.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Tailscale</strong>: sincronización de grupos anidados para Entra ID y Google Workspace, más cambio de IdP self-service desde la consola de administración.</li>\n      <li><span class=\"chip\">Infra</span> <strong>Caddy CVE-2026-45692</strong> (23.06, corregido en 2.11.3): la autorización de <code>/config</code> y el path traversal no coinciden — puntajes divergentes (NVD 3,8 / GitHub 5,4).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Samstag, ruhiger Nachrichtentag nach einer lauten Modell-Woche. Gestern versprach dieser Brief die Wochenend-Nachmessungen auf SWE-Bench Pro — sie sind noch nicht da: Epoch AIs unabhängige Pro-Auswertung von Fable 5 steht weiter aus. Was stattdessen vorliegt, ist lehrreicher. Claude Fable 5 ist seit dem 01.07. nach einer Export-Kontroll-Sperre wieder verfügbar und führt das (kontaminierte) Verified-Board mit 95 %. Seine Schlagzeilen-Zahl auf dem eigentlich fälschungsresistenten SWE-Bench Pro — <strong>80,3 %</strong> — stammt aber aus Anthropics eigenem Harness, nicht aus einem neutralen. Die Lektion des Tages: Auch der Benchmark, auf den alle umgestiegen sind, wird schon gespielt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 zurück in GA seit 01.07.</strong> (nach Export-Kontroll-Sperre 12.–30.06.). Neuer Safety-Classifier blockt die gemeldete Jailbreak-Technik in &gt;99 % der Fälle; geblockte Requests gehen an Opus 4.8.</li>\n      <li><span class=\"chip hot\">Bench</span> <strong>Fable 5s 80,3 % auf SWE-Bench <em>Pro</em></strong> = Anthropics eigenes Scaffolding, kein neutraler Harness. Epoch AIs unabhängige Pro-Auswertung steht aus — die Zahl ist bis dahin faktisch anbieter-berichtet.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench <em>Verified</em></strong> (vals.ai, Stand 09.07., <em>anderer</em> Benchmark): Fable 5 95,00 %, Opus 4.8 88,60 %, Grok 4.5 86,60 %, GPT-5.5 82,60 %. Nicht mit den Pro-Zahlen verwechseln.</li>\n      <li><span class=\"chip\">Bench</span> <strong>Mythos 5 (reales Claude-Modell) tauscht mit Fable 5 tageweise die #1</strong> auf Verified (95,5 % vs 95,0 %) — das Board ist von Tag zu Tag in Bewegung.</li>\n      <li><span class=\"chip\">xAI</span> <strong>Grok 4.5s CursorBench-Vorsprung ist kontaminiert</strong>: ein alter Cursor-Codebase-Snapshot lag im Training. Kein sauberes Coding-Signal (Modell vom 08.07., gestern im Detail).</li>\n      <li><span class=\"chip\">Meta</span> <strong>Muse Spark 1.1</strong> (09.07.): die Zahlen MCP Atlas 88,1 / JobBench 54,7 / HLE 62,1 sind Meta-eigen — kein unabhängiger Coding-Bench.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor v3.11 (10.07.)</strong>: Side-Chats, Suche über Agent-Transkripte, Grok-4.5-Zugang. JetBrains AI v262 (08.07.): Claude Agent + Codex als wählbare Agenten; Copilot bekommt Kimi K2.7 Code (erstes Open-Weight).</li>\n      <li><span class=\"chip\">Roll-Call</span> <strong>Still im Schatten</strong>: Continue.dev-Löschdeadline 15.07. (in 4 Tagen), OpenHands (1.11.0, 09.07.), Cline (~v4.0), Plandex (v2.2.1, dormant), DeepSeek (V4-Preview, kein Juli-Move).</li>\n    </ul></div>",
