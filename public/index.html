hnipsel nennt.</li>\n      <li><span class=\"chip hot\">Technik</span> <strong>„Macarena&ldquo;-Heckflügel kehrt zurück.</strong> Nach Dreher in Österreich und Silverstone in Spa ausgebaut; Red Bull nennt zwei mechanische Ursachen und bringt die revidierte Version nach Budapest.</li>\n      <li><span class=\"chip\">Zeitplan</span> <strong>Qualifying Sa 16:00 MESZ / 11:00 BRT, Rennen So 15:00 MESZ / 10:00 BRT</strong>, 70 Runden. Budapest liegt in derselben Sommerzeit wie Deutschland — Ortszeit = MESZ.</li>\n      <li><span class=\"chip\">Fahrerwertung</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unverändert seit dem Belgien-GP, heute gegengeprüft. Verstappen Siebter (91).</li>\n      <li><span class=\"chip\">Konstrukteure</span> <strong>Mercedes 358 vor Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — eingefroren seit São Paulo (12.07.), vier Läufe offen, nächster in Austin (04.–06.09.).</li>\n      <li><span class=\"chip\">Andere Serien</span> <strong>MotoGP Silverstone 07.–09.08.</strong> (zwei offizielle Quellen; ein Ticket-Reseller nennt falsch den 1.–3.08.), <strong>Formel-E-Finale London 15.–16.08.</strong></li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Thursday, July 23 — tomorrow at <strong>13:30 CEST / 08:30 BRT</strong> the first car rolls out at the Hungaroring for Free Practice. The <strong>Hungarian Grand Prix</strong> (Fri–Sun, 24.–26.07.) is the <strong>last round before the summer break</strong>, and that's exactly what this weekend's story hinges on: Max Verstappen's contract through 2028 contains a clause allowing him to exit for 2027 <em>if he isn't in the top two</em> of the drivers' standings by the summer break. He's <strong>seventh with 91 points</strong>, <strong>113 behind Antonelli</strong> — even a win on Sunday would bring him to at most 116, while second place stands at 159. So the condition is met before a wheel turns in Budapest. In an interview published <strong>today</strong>, Verstappen says nothing definitive about 2027 — and describes his RB22 as \"at best the fourth-fastest package on the grid.\" On top of that comes the second Red Bull thread: the rotating <strong>rear wing</strong> withdrawn after Verstappen's \"super dangerous\" criticism is back on the plan for Hungary, with a claimed fix. Nothing has happened on track since Spa (19.07.) — all the standings below are unchanged, refetched again today.</p>\n    <ul>\n      <li><span class=\"chip hot\">Headline</span> <strong>Clause condition met as of Sunday.</strong> Exit for 2027 possible if Verstappen isn't top&nbsp;2 by the break — mathematically impossible to prevent.</li>\n      <li><span class=\"chip hot\">Verstappen today</span> <strong>\"Nothing to say, because nothing's going on.\"</strong> No commitment to Red Bull for 2027; the team is \"like a second family,\" the car merely the fourth-fastest package.</li>\n      <li><span class=\"chip\">The math</span> <strong>91 + max. 25 = 116 &lt; 159.</strong> The gap to the top is <strong>113</strong> points (204 − 91) — not the 101 cited in an older ESPN snippet.</li>\n      <li><span class=\"chip hot\">Tech</span> <strong>\"Macarena\" rear wing returns.</strong> Removed for Spa after spins in Austria and Silverstone; Red Bull cites two mechanical causes and brings the revised version to Budapest.</li>\n      <li><span class=\"chip\">Schedule</span> <strong>Qualifying Sat 16:00 CEST / 11:00 BRT, race Sun 15:00 CEST / 10:00 BRT</strong>, 70 laps. Budapest is on the same summer time as Germany — local time = CEST.</li>\n      <li><span class=\"chip\">Drivers' standings</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — unchanged since the Belgian GP, cross-checked today. Verstappen seventh (91).</li>\n      <li><span class=\"chip\">Constructors</span> <strong>Mercedes 358 ahead of Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — frozen since São Paulo (12.07.), four rounds remain, next up is Austin (04.–06.09.).</li>\n      <li><span class=\"chip\">Other series</span> <strong>MotoGP Silverstone 07.–09.08.</strong> (two official sources; one ticket reseller incorrectly lists 1.–3.08.), <strong>Formula E finale London 15.–16.08.</strong></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje é quinta-feira, 23 de julho — amanhã, às <strong>13h30 CEST / 08h30 BRT</strong>, o primeiro carro entra na pista para o treino livre no Hungaroring. O <strong>Grande Prêmio da Hungria</strong> (sex–dom, 24–26/07) é a <strong>última etapa antes da pausa de verão</strong>, e é exatamente disso que trata a história do fim de semana: o contrato de Max Verstappen, válido até 2028, contém uma cláusula que lhe permite sair para 2027 caso <em>ele não esteja entre os dois primeiros</em> da classificação de pilotos até a pausa de verão. Ele é <strong>sétimo, com 91 pontos</strong>, <strong>113 atrás de Antonelli</strong> — mesmo uma vitória no domingo o levaria no máximo a 116, enquanto o segundo lugar está em 159. A condição, portanto, já está cumprida antes de qualquer roda girar em Budapeste. Em uma entrevista publicada <strong>hoje</strong>, Verstappen não afirma nada de concreto sobre 2027 — e descreve seu RB22 como \"na melhor das hipóteses, o quarto pacote mais rápido do grid\". Soma-se a isso o segundo fio condutor da Red Bull: a <strong>asa traseira rotativa</strong>, retirada após a crítica de Verstappen de que era \"super perigosa\", está de volta aos planos para a Hungria, com um reparo alegado. Na pista, nada aconteceu desde Spa (19/07) — todas as classificações abaixo permanecem inalteradas, reconferidas hoje.</p>\n    <ul>\n      <li><span class=\"chip hot\">Manchete</span> <strong>Condição da cláusula cumprida a partir de domingo.</strong> Saída para 2027 possível se Verstappen não estiver entre os dois primeiros até a pausa — matematicamente impossível de evitar.</li>\n      <li><span class=\"chip hot\">Verstappen hoje</span> <strong>\"Nada a dizer, porque não está acontecendo nada.\"</strong> Nenhum compromisso com a Red Bull para 2027; o time seria \"como uma segunda família\", o carro apenas o quarto pacote mais rápido.</li>\n      <li><span class=\"chip\">A conta</span> <strong>91 + máx. 25 = 116 &lt; 159.</strong> A distância para a liderança é de <strong>113</strong> pontos (204 − 91) — não os 101 citados por um trecho antigo da ESPN.</li>\n      <li><span class=\"chip hot\">Tecnologia</span> <strong>Asa traseira \"Macarena\" está de volta.</strong> Retirada em Spa após giros na Áustria e em Silverstone; a Red Bull aponta duas causas mecânicas e traz a versão revisada para Budapeste.</li>\n      <li><span class=\"chip\">Cronograma</span> <strong>Classificação sáb 16h00 CEST / 11h00 BRT, corrida dom 15h00 CEST / 10h00 BRT</strong>, 70 voltas. Budapeste está no mesmo horário de verão que a Alemanha — horário local = CEST.</li>\n      <li><span class=\"chip\">Classificação de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — inalterado desde o GP da Bélgica, reconferido hoje. Verstappen em sétimo (91).</li>\n      <li><span class=\"chip\">Construtores</span> <strong>Mercedes 358 à frente da Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07), quatro etapas em aberto, próxima em Austin (04–06/09).</li>\n      <li><span class=\"chip\">Outras séries</span> <strong>MotoGP em Silverstone, 07–09/08</strong> (duas fontes oficiais; um revendedor de ingressos indica erroneamente 1–3/08), <strong>final da Fórmula E em Londres, 15–16/08</strong>.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es jueves 23 de julio — mañana a las <strong>13:30 CEST / 08:30 BRT</strong> rueda el primer auto en el Hungaroring para el primer entrenamiento libre. El <strong>Gran Premio de Hungría</strong> (vie–dom, 24–26/07) es la <strong>última carrera antes del receso de verano</strong>, y de ahí cuelga precisamente la historia del fin de semana: el contrato de Max Verstappen hasta 2028 contiene una cláusula que le permite salir para 2027 <em>si, al llegar el receso de verano, no está entre los dos primeros</em> de la clasificación de pilotos. Está <strong>séptimo con 91 puntos</strong>, <strong>113 detrás de Antonelli</strong> — incluso una victoria el domingo lo llevaría, como máximo, a 116, y el segundo puesto está en 159. La condición se cumple, entonces, antes de que gire una sola rueda en Budapest. En una entrevista publicada <strong>hoy</strong>, Verstappen no dice nada concluyente sobre 2027 — y describe su RB22 como &bdquo;en el mejor de los casos, el cuarto paquete más rápido del campo&ldquo;. A esto se suma el segundo hilo de Red Bull: el <strong>alerón trasero rotativo</strong>, retirado tras la crítica de Verstappen de que era &bdquo;súper peligroso&ldquo;, vuelve a estar previsto para Hungría, con una reparación que el equipo asegura haber hecho. En la pista no ha pasado nada desde Spa (19/07) — todas las clasificaciones de abajo están sin cambios, y hoy se volvieron a consultar.</p>\n    <ul>\n      <li><span class=\"chip hot\">Titular</span> <strong>La condición de la cláusula se cumple desde el domingo.</strong> Salida para 2027 posible si Verstappen no está entre los dos primeros al llegar el receso — matemáticamente imposible de evitar.</li>\n      <li><span class=\"chip hot\">Verstappen hoy</span> <strong>&bdquo;No hay nada que decir, porque no pasa nada.&ldquo;</strong> Sin compromiso con Red Bull para 2027; el equipo es &bdquo;como una segunda familia&ldquo;, el auto solo el cuarto paquete más rápido.</li>\n      <li><span class=\"chip\">Cálculo</span> <strong>91 + máx. 25 = 116 &lt; 159.</strong> La distancia hasta el líder es de <strong>113</strong> puntos (204 − 91) — no los 101 que menciona un fragmento más antiguo de ESPN.</li>\n      <li><span class=\"chip hot\">Técnica</span> <strong>Vuelve el alerón trasero &bdquo;Macarena&ldquo;.</strong> Tras los trompos en Austria y Silverstone, fue retirado en Spa; Red Bull señala dos causas mecánicas y lleva la versión revisada a Budapest.</li>\n      <li><span class=\"chip\">Horarios</span> <strong>Clasificación sáb 16:00 CEST / 11:00 BRT, carrera dom 15:00 CEST / 10:00 BRT</strong>, 70 vueltas. Budapest está en el mismo horario de verano que Alemania — hora local = CEST.</li>\n      <li><span class=\"chip\">Clasificación de pilotos</span> <strong>Antonelli 204, Hamilton 159, Russell 154</strong> — sin cambios desde el GP de Bélgica, verificado hoy. Verstappen, séptimo (91).</li>\n      <li><span class=\"chip\">Constructores</span> <strong>Mercedes 358 por delante de Ferrari 285</strong> (+73), McLaren 195, Red Bull 151.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>Toyota 132 : 127 BMW</strong> — congelado desde São Paulo (12/07), cuatro carreras pendientes, la siguiente en Austin (04–06/09).</li>\n      <li><span class=\"chip\">Otras series</span> <strong>MotoGP en Silverstone, 07–09/08</strong> (dos fuentes oficiales; un revendedor de boletos indica erróneamente el 1–3/08), <strong>final de la Fórmula E en Londres, 15–16/08</strong>.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Donnerstag, der 23. Juli — morgen letzter Ferientag, danach das letzte freie Wochenende vor dem Schulstart. Es hätte ein reiner Ausflugs-Brief werden können. Der wichtigste Punkt des Tages steht aber im Gesundheitsbulletin: Die Fiocruz hat heute ihr neues InfoGripe veröffentlicht, Paraná bleibt einer von fünf Bundesstaaten mit schweren Atemwegsinfekten auf Risiko- bis Hochrisiko-Niveau, und bundesweit gehen <strong>58,5 %</strong> der positiven Proben auf das RS-Virus zurück. Mit einem vier Wochen alten Baby im Haus ist das die Zahl des Tages — sie färbt auf jeden Wochenendplan ab. Dazu: Samstag Regen, da sind beide Wetterportale einig; beim Sonntag widersprechen sie sich so deutlich, dass ein Plan B dazugehört.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>Fiocruz-Bulletin von heute (23.07.)</strong>: Paraná weiter unter den fünf Bundesstaaten mit SRAG auf Risiko-/Hochrisiko-Niveau (mit Acre, Maranhão, RS, SC). Bundesweit 120.920 SRAG-Fälle in 2026, davon 63.698 labormäßig bestätigt.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV bei 58,5 % der positiven Proben</strong> — und der Anteil steigt weiter: 55,2 % (06.07.) → 55,9 % (09.07.) → 58,5 % (heute). Kontakt dosieren, volle Innenräume meiden.</li>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Sonntag ist ein Streitfall</strong>: Climatempo sagt 0 % Regen und Sonne, o tempo sagt „Tempestades\" — dieselbe Stadt, derselbe Tag. Samstag dagegen einig: Regen, 15–23 °C.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: letzter Ferientag Fr 24.07., Unterricht der <em>rede estadual</em> ab Mo 27.07. — 25./26.07. ist das letzte Ferienwochenende.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Família no Parque</strong>, Parque Villa-Lobos SP: Eintritt gratis, Fahrten ab R$ 10, Wochenenden 10–18 Uhr, bis 02.08. — der einzige sauber bestätigte Wochenend-Anker.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Londrina, nächste Woche</strong>: Claudio Duarte „Fases da Vida\", Ginásio Moringão, Fr 31.07. — Adresse bestätigt, Preis nicht.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern-Ring ohne Fund</strong>: für Ribeirão Claro und Jacarezinho kein datiertes Familien-Event bestätigt — Fescafé, FETEXAS und Velocross liegen alle schon hinter uns.</li>\n      <li><span class=\"chip good\">DENGUE</span> <strong>Informe nº 23 (21.07.) erschienen</strong>, Zahlen dahinter nicht abrufbar. Letzter verifizierter Stand bleibt <strong>SE 1–14/2026</strong>: 2.028 Fälle, 1 Todesfall (−96,1 % bzw. −98,8 % ggü. 2025).</li>\n      <li><span class=\"chip\">VERKEHR</span> <strong>BR-153 Jacarezinho–Santo Antônio da Platina</strong>: Viadukt-Arbeiten laufen weiter — Fahrzeit-Puffer einplanen.</li>\n    </ul></div>",

        "de": "<div class=\"tldr\"><p class=\"lead\">Es ist Donnerstag, der 23. Juli — morgen letzter Ferientag, danach das letzte freie Wochenende vor dem Schulstart. Es hätte ein reiner Ausflugs-Brief werden können. Der wichtigste Punkt des Tages steht aber im Gesundheitsbulletin: Die Fiocruz hat heute ihr neues InfoGripe veröffentlicht, Paraná bleibt einer von fünf Bundesstaaten mit schweren Atemwegsinfekten auf Risiko- bis Hochrisiko-Niveau, und bundesweit gehen <strong>58,5 %</strong> der positiven Proben auf das RS-Virus zurück. Mit einem vier Wochen alten Baby im Haus ist das die Zahl des Tages — sie färbt auf jeden Wochenendplan ab. Dazu: Samstag Regen, da sind beide Wetterportale einig; beim Sonntag widersprechen sie sich so deutlich, dass ein Plan B dazugehört.</p>\n    <ul>\n      <li><span class=\"chip hot\">GESUNDHEIT</span> <strong>Fiocruz-Bulletin von heute (23.07.)</strong>: Paraná weiter unter den fünf Bundesstaaten mit SRAG auf Risiko-/Hochrisiko-Niveau (mit Acre, Maranhão, RS, SC). Bundesweit 120.920 SRAG-Fälle in 2026, davon 63.698 labormäßig bestätigt.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV bei 58,5 % der positiven Proben</strong> — und der Anteil steigt weiter: 55,2 % (06.07.) → 55,9 % (09.07.) → 58,5 % (heute). Kontakt dosieren, volle Innenräume meiden.</li>\n      <li><span class=\"chip hot\">WETTER</span> <strong>Sonntag ist ein Streitfall</strong>: Climatempo sagt 0 % Regen und Sonne, o tempo sagt „Tempestades\" — dieselbe Stadt, derselbe Tag. Samstag dagegen einig: Regen, 15–23 °C.</li>\n      <li><span class=\"chip\">SCHULE</span> <strong>Recesso endet</strong>: letzter Ferientag Fr 24.07., Unterricht der <em>rede estadual</em> ab Mo 27.07. — 25./26.07. ist das letzte Ferienwochenende.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Família no Parque</strong>, Parque Villa-Lobos SP: Eintritt gratis, Fahrten ab R$ 10, Wochenenden 10–18 Uhr, bis 02.08. — der einzige sauber bestätigte Wochenend-Anker.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Londrina, nächste Woche</strong>: Claudio Duarte „Fases da Vida\", Ginásio Moringão, Fr 31.07. — Adresse bestätigt, Preis nicht.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Kern-Ring ohne Fund</strong>: für Ribeirão Claro und Jacarezinho kein datiertes Familien-Event bestätigt — Fescafé, FETEXAS und Velocross liegen alle schon hinter uns.</li>\n      <li><span class=\"chip good\">DENGUE</span> <strong>Informe nº 23 (21.07.) erschienen</strong>, Zahlen dahinter nicht abrufbar. Letzter verifizierter Stand bleibt <strong>SE 1–14/2026</strong>: 2.028 Fälle, 1 Todesfall (−96,1 % bzw. −98,8 % ggü. 2025).</li>\n      <li><span class=\"chip\">VERKEHR</span> <strong>BR-153 Jacarezinho–Santo Antônio da Platina</strong>: Viadukt-Arbeiten laufen weiter — Fahrzeit-Puffer einplanen.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">It's Thursday, July 23 — tomorrow is the last day of break, then the last free weekend before school starts. This could have been a pure day-trip brief. But the most important point of the day sits in the health bulletin: Fiocruz released its new InfoGripe report today, Paraná remains one of five states with severe respiratory infections at risk to high-risk level, and nationwide 58.5% of positive samples trace back to RSV. With a one-month-old baby in the house, that's the number of the day — it colors every weekend plan. On top of that: Saturday brings rain, both weather portals agree on that; for Sunday they disagree so sharply that a plan B is in order.</p>\n    <ul>\n      <li><span class=\"chip hot\">HEALTH</span> <strong>Fiocruz bulletin from today (07/23)</strong>: Paraná still among the five states with SRAG at risk/high-risk level (with Acre, Maranhão, RS, SC). Nationwide 120,920 SRAG cases in 2026, of which 63,698 laboratory-confirmed.</li>\n      <li><span class=\"chip hot\">BABY</span> <strong>RSV at 58.5% of positive samples</strong> — and the share keeps rising: 55.2% (07/06) → 55.9% (07/09) → 58.5% (today). Ration contact, avoid crowded indoor spaces.</li>\n      <li><span class=\"chip hot\">WEATHER</span> <strong>Sunday is a toss-up</strong>: Climatempo calls for 0% rain and sun, o tempo says \"Tempestades\" — same city, same day. Saturday, on the other hand, both agree: rain, 15–23°C.</li>\n      <li><span class=\"chip\">SCHOOL</span> <strong>Recesso ends</strong>: last day of break Fri 07/24, rede estadual classes resume Mon 07/27 — 07/25–26 is the last vacation weekend.</li>\n      <li><span class=\"chip\">TRIP</span> <strong>Família no Parque</strong>, Parque Villa-Lobos, SP: free admission, rides from R$ 10, weekends 10 am–6 pm, through 08/02 — the only cleanly confirmed weekend anchor.</li>\n      <li><span class=\"chip\">EVENT</span> <strong>Londrina, next week</strong>: Claudio Duarte's \"Fases da Vida,\" Ginásio Moringão, Fri 07/31 — address confirmed, price not.</li>\n      <li><span class=\"chip\">GAP</span> <strong>Core ring comes up empty</strong>: no dated family event confirmed for Ribeirão Claro and Jacarezinho — Fescafé, FETEXAS, and Velocross are all already behind us.</li>\n      <li><span class=\"chip good\">DENGUE</span> <strong>Informe no. 23 (07/21) released</strong>, figures behind it not retrievable. Last verified status remains SE 1–14/2026: 2,028 cases, 1 death (−96.1% and −98.8% vs. 2025 respectively).</li>\n      <li><span class=\"chip\">TRAFFIC</span> <strong>BR-153 Jacarezinho–Santo Antônio da Platina</strong>: overpass work continues — plan a travel-time buffer.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É quinta-feira, 23 de julho — amanhã é o último dia de férias, e depois vem o último fim de semana livre antes da volta às aulas. Poderia ter sido um informativo só sobre passeios. Mas o ponto mais importante do dia está no boletim de saúde: a Fiocruz divulgou hoje seu novo InfoGripe, o Paraná segue como um dos cinco estados com infecções respiratórias graves em nível de risco a alto risco, e em todo o país 58,5% das amostras positivas são do VSR. Com um bebê de quatro semanas em casa, esse é o número do dia — e ele afeta qualquer plano de fim de semana. Além disso: chuva no sábado, nisso os dois portais de clima concordam; já no domingo eles se contradizem tanto que é preciso ter um plano B.</p>\n    <ul>\n      <li><span class=\"chip hot\">SAÚDE</span> <strong>Boletim da Fiocruz de hoje (23/07)</strong>: Paraná segue entre os cinco estados com SRAG em nível de risco/alto risco (com Acre, Maranhão, RS, SC). Em todo o país, 120.920 casos de SRAG em 2026, dos quais 63.698 confirmados laboratorialmente.</li>\n      <li><span class=\"chip hot\">BEBÊ</span> <strong>VSR em 58,5% das amostras positivas</strong> — e a participação segue subindo: 55,2% (06/07) → 55,9% (09/07) → 58,5% (hoje). Dosar o contato, evitar ambientes fechados lotados.</li>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>Domingo é motivo de discórdia</strong>: o Climatempo prevê 0% de chuva e sol, o tempo prevê \"Tempestades\" — mesma cidade, mesmo dia. Já o sábado tem consenso: chuva, 15–23 °C.</li>\n      <li><span class=\"chip\">ESCOLA</span> <strong>Recesso termina</strong>: último dia de férias sex 24/07, aulas da <em>rede estadual</em> retomam seg 27/07 — 25/26 de julho é o último fim de semana de férias.</li>\n      <li><span class=\"chip\">PASSEIO</span> <strong>Família no Parque</strong>, Parque Villa-Lobos SP: entrada grátis, brinquedos a partir de R$ 10, fins de semana das 10h às 18h, até 02/08 — a única grande opção de fim de semana totalmente confirmada.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Londrina, semana que vem</strong>: Claudio Duarte \"Fases da Vida\", Ginásio Moringão, sex 31/07 — endereço confirmado, preço não.</li>\n      <li><span class=\"chip\">LACUNA</span> <strong>Anel central sem achados</strong>: para Ribeirão Claro e Jacarezinho, nenhum evento familiar com data confirmado — Fescafé, FETEXAS e Velocross já ficaram para trás.</li>\n      <li><span class=\"chip good\">DENGUE</span> <strong>Informe nº 23 (21/07) divulgado</strong>, números por trás dele não acessíveis. Último dado verificado segue sendo <strong>SE 1–14/2026</strong>: 2.028 casos, 1 óbito (−96,1% e −98,8% frente a 2025).</li>\n      <li><span class=\"chip\">TRÂNSITO</span> <strong>BR-153 Jacarezinho–Santo Antônio da Platina</strong>: obras nos viadutos continuam — reservar tempo extra no trajeto.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy es jueves 23 de julio — mañana es el último día de vacaciones, y después llega el último fin de semana libre antes de que empiecen las clases. Pudo haber sido un brief puramente de excursiones. Pero el punto más importante del día está en el boletín de salud: la Fiocruz publicó hoy su nuevo InfoGripe, Paraná sigue siendo uno de los cinco estados con infecciones respiratorias graves en nivel de riesgo o alto riesgo, y a nivel nacional el <strong>58,5 %</strong> de las muestras positivas corresponde al virus respiratorio sincitial (VRS). Con un bebé de cuatro semanas en casa, ese es el dato del día — y tiñe cualquier plan de fin de semana. Además: el sábado hay lluvia, en eso coinciden ambos portales meteorológicos; para el domingo se contradicen tan claramente que hace falta un plan B.</p>\n    <ul>\n      <li><span class=\"chip hot\">SALUD</span> <strong>Boletín de la Fiocruz de hoy (23/07)</strong>: Paraná sigue entre los cinco estados con SRAG en nivel de riesgo/alto riesgo (junto con Acre, Maranhão, RS, SC). A nivel nacional, 120.920 casos de SRAG en 2026, de los cuales 63.698 confirmados por laboratorio.</li>\n      <li><span class=\"chip hot\">BEBÉ</span> <strong>VRS en el 58,5 % de las muestras positivas</strong> — y la proporción sigue subiendo: 55,2 % (06/07) → 55,9 % (09/07) → 58,5 % (hoy). Dosificar el contacto, evitar espacios cerrados llenos de gente.</li>\n      <li><span class=\"chip hot\">CLIMA</span> <strong>El domingo es un caso de disputa</strong>: Climatempo dice 0 % de lluvia y sol, o tempo dice «Tempestades» — la misma ciudad, el mismo día. El sábado, en cambio, coinciden: lluvia, 15–23 °C.</li>\n      <li><span class=\"chip\">ESCUELA</span> <strong>Termina el receso</strong>: último día de vacaciones vie 24/07, clases de la <em>rede estadual</em> a partir del lun 27/07 — el 25 y 26 de julio es el último fin de semana de vacaciones.</li>\n      <li><span class=\"chip\">VIAJE</span> <strong>Família no Parque</strong>, Parque Villa-Lobos SP: entrada gratis, juegos desde R$ 10, fines de semana de 10 a 18 h, hasta el 02/08 — la única opción de fin de semana totalmente confirmada.</li>\n      <li><span class=\"chip\">EVENTO</span> <strong>Londrina, la próxima semana</strong>: Claudio Duarte «Fases da Vida», Ginásio Moringão, vie 31/07 — dirección confirmada, precio no.</li>\n      <li><span class=\"chip\">VACÍO</span> <strong>Anillo central sin hallazgos</strong>: para Ribeirão Claro y Jacarezinho no se confirmó ningún evento familiar con fecha — Fescafé, FETEXAS y Velocross ya quedaron atrás.</li>\n      <li><span class=\"chip good\">DENGUE</span> <strong>Informe nº 23 (21/07) publicado</strong>, las cifras detrás no están disponibles. El último dato verificado sigue siendo <strong>SE 1–14/2026</strong>: 2.028 casos, 1 muerte (−96,1 % y −98,8 % frente a 2025, respectivamente).</li>\n      <li><span class=\"chip\">TRÁNSITO</span> <strong>BR-153 Jacarezinho–Santo Antônio da Platina</strong>: las obras en los viaductos continúan — considerar tiempo extra de viaje.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Donnerstag, der 23. Juli — Wochenthema <em>Fußball &amp; Sport</em>. Die WM ist durch, das Turnier-Vokabular hatten wir am 16.07. Was jetzt kommt, ist die zweite Fußball-Saison des Jahres: die <em>Personal</em>-Saison. Beim DFB wird morgen, <strong>Freitag, 24.07.2026, um 11:00 Uhr in der Verbandszentrale in Frankfurt</strong>, Jürgen Klopp als Nachfolger von Julian Nagelsmann vorgestellt (<a href=\"https://www.sportschau.de/fussball/nationalmannschaft/klopp-soll-morgen-als-bundestrainer-vorgestellt-werden,klopp-dfb-bundestrainer-100.html\">sportschau.de</a>, 23.07.); Nagelsmann war am <strong>03.07.</strong> nach dem Achtelfinal-Aus zurückgetreten. Parallel läuft das Transferfenster heiß — Johan Manzambi wechselt vom SC Freiburg für einen Vereinsrekord von <strong>59,5 Mio. £</strong> zu Aston Villa (<a href=\"https://www.skysports.com/football/news/11677/13564492/johan-manzambi-aston-villa-sign-newcastle-target-from-freiburg-in-club-record-lb59-5m-deal\">skysports.com</a>, 17.07.) — und der Brasileirão läuft seit dem 19.07. wieder, mit Palmeiras an der Tabellenspitze. Das ist exakt der Wortschatz, den man beim <em>Globo Esporte</em> abends braucht: <em>renunciar</em>, <em>o sucessor</em>, <em>a coletiva</em>, <em>o reforço</em>, <em>fichar</em>. <strong>35 Einträge, davon 12 Verben mit voller Konjugation</strong> — inklusive der <em>sein</em>-Perfekt-Falle bei <em>zurücktreten</em>, dem gemischten <em>ernennen–ernannte–ernannt</em>, dem ES-Stammwechsel <em>volver → vuelvo/vuelto</em> und dem PT <em>-ear</em>-Muster <em>nomear → eu nomeio</em> — plus 3 Auffrischungen (<em>der Trainer</em>, <em>der Favorit</em>, <em>der Gegner</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>der Manager ≠ EN <em>the manager</em></strong> — im deutschen Fußball ist der <em>Manager</em> der Mann fürs Kaufmännische (Kader, Transfers, Verträge — heute meist <em>Sportdirektor</em>). Im britischen Englisch ist <em>the manager</em> dagegen genau der Cheftrainer: „Klopp was Liverpool's manager.\" Wer das verwechselt, verkauft den Trainer als Buchhalter.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o técnico</strong> — in Brasilien heißt der Cheftrainer auf allen Ebenen <em>o técnico</em> (Klub <em>und</em> Nationalelf). Das europäisch-portugiesische <em>o treinador</em> versteht man, klingt aber im Norte-Pioneiro nach Zeitungsdeutsch.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a coletiva (de imprensa)</strong> = die Pressekonferenz — die kurze brasilianische Alltagsform. Europäisches PT sagt <em>conferência de imprensa</em>, es-MX <em>la conferencia de prensa</em> (das iberische <em>rueda de prensa</em> hört man in Mexiko selten).</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>zurücktreten braucht <em>sein</em></strong> — „Nagelsmann <em>ist</em> zurückgetreten\", nie <em>*hat zurückgetreten</em>. Gleiches gilt für <em>nachfolgen</em> („ist nachgefolgt\") und <em>zurückkehren</em> („ist zurückgekehrt\"). Und: <em>du tritt<strong>st</strong> zurück</em>, <em>er tritt zurück</em> — starkes e→i.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ernennen–ernannte–ernannt</strong> — ein gemischtes Verb wie <em>nennen/kennen/brennen</em>: die Endungen sind schwach, der Stammvokal springt trotzdem e→a. Also <em>der DFB ernannte ihn</em>, nie <em>*ernennte</em> im Präteritum.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>unterschreiben &amp; unterbrechen sind untrennbar</strong> — deshalb <em>kein</em> ge- im Partizip: <em>hat unterschrieben</em>, <em>hat unterbrochen</em> (nicht <em>*geunterschrieben</em>). <em>unterbrechen</em> ist zusätzlich stark: <em>du unterbrichst</em>, <em>er unterbrach</em>, <em>hat unterbrochen</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES <em>volver</em> (zurückkehren): o→ue + Partizip <em>vuelto</em></strong> — <em>yo vuelvo, tú vuelves, él vuelve</em>, aber <em>nosotros volvemos</em> (Betonung weg, Diphthong weg). Das Partizip ist unregelmäßig: <em>ha vuelto</em>, nie <em>*volvido</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT <em>nomear</em> (ernennen): eu <em>nomeio</em>, eles <em>nomeiam</em></strong> — die <em>-ear</em>-Verben schieben unter Betonung ein <em>i</em> ein, in der wir-Form nicht: <em>nós nomeamos</em>. Perfekt: <em>eu nomeei</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>PT <em>trocar</em> (wechseln): eu <em>troquei</em></strong> — c→qu vor -e, damit der /k/-Laut bleibt. Nie <em>*troquei</em> falsch herum denken: Präsens <em>eu troco</em>, Perfekt <em>eu troquei</em>, Subjunktiv <em>que eu troque</em>.</li>\n      <li><span class=\"chip good\">1:1 GEHT NICHT</span> <strong>wechseln ↔ verpflichten ↔ ES <em>fichar</em></strong> — Deutsch trennt die Perspektive (der Spieler <em>wechselt</em> zu X ↔ der Klub <em>verpflichtet</em> Y). Spanisch nutzt <em>ein</em> Verb in beide Richtungen: <em>el jugador fichó por el Aston Villa</em> <em>und</em> <em>el Aston Villa fichó a Manzambi</em>. Erzwinge im ES also nicht denselben Satzbau wie im DE.</li>\n      <li><span class=\"chip good\">1:1 GEHT NICHT</span> <strong>der Bundestrainer</strong> hat in PT/ES kein Ein-Wort-Äquivalent — es braucht immer eine Umschreibung: <em>o técnico da seleção (alemã)</em> / <em>el director técnico (DT) de la selección</em>. Das iberische <em>el seleccionador</em> ist in Mexiko unüblich.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>in jemandes Fußstapfen treten</strong> = das Erbe eines Vorgängers antreten. PT <em>seguir os passos de alguém</em>, ES <em>seguir los pasos de alguien</em> — dreimal dasselbe Bild, dreimal mit anderem Verb (<em>treten</em> ↔ <em>seguir</em>).</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Thursday, July 23 — this week's theme is <em>Football &amp; Sports</em>. The World Cup is done and dusted; we covered the tournament vocabulary on July 16. What's up now is the year's second football season: the <em>personnel</em> season. Tomorrow, <strong>Friday, July 24, 2026, at 11:00, at DFB headquarters in Frankfurt</strong>, Jürgen Klopp will be unveiled as Julian Nagelsmann's successor (<a href=\"https://www.sportschau.de/fussball/nationalmannschaft/klopp-soll-morgen-als-bundestrainer-vorgestellt-werden,klopp-dfb-bundestrainer-100.html\">sportschau.de</a>, July 23); Nagelsmann had resigned on <strong>July 3</strong> after the round-of-16 exit. In parallel, the transfer window is red hot — Johan Manzambi is moving from SC Freiburg to Aston Villa for a club-record <strong>£59.5 million</strong> (<a href=\"https://www.skysports.com/football/news/11677/13564492/johan-manzambi-aston-villa-sign-newcastle-target-from-freiburg-in-club-record-lb59-5m-deal\">skysports.com</a>, July 17) — and the Brasileirão has been back underway since July 19, with Palmeiras topping the table. That's exactly the vocabulary you need for <em>Globo Esporte</em> in the evening: <em>renunciar</em>, <em>o sucessor</em>, <em>a coletiva</em>, <em>o reforço</em>, <em>fichar</em>. <strong>35 entries, 12 of them verbs with full conjugation</strong> — including the <em>sein</em>-perfect trap in <em>zurücktreten</em>, the mixed <em>ernennen–ernannte–ernannt</em>, the ES stem change <em>volver → vuelvo/vuelto</em>, and the PT <em>-ear</em> pattern <em>nomear → eu nomeio</em> — plus 3 refreshers (<em>der Trainer</em>, <em>der Favorit</em>, <em>der Gegner</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>der Manager ≠ EN <em>the manager</em></strong> — in German football, the <em>Manager</em> is the person in charge of the business side (squad, transfers, contracts — today usually titled <em>Sportdirektor</em>, sporting director). In British English, by contrast, <em>the manager</em> is exactly the head coach: \"Klopp was Liverpool's manager.\" Mix the two up, and you've turned the coach into an accountant.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o técnico</strong> — in Brazil, the head coach is called <em>o técnico</em> at every level, club and national team alike. European Portuguese's <em>o treinador</em> is understood, but in the Norte-Pioneiro region it sounds like stiff newspaper prose.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a coletiva (de imprensa)</strong> = the press conference — the short, everyday Brazilian form. European PT says <em>conferência de imprensa</em>, es-MX <em>la conferencia de prensa</em> (the Iberian <em>rueda de prensa</em> is rarely heard in Mexico).</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>zurücktreten needs <em>sein</em></strong> — \"Nagelsmann <em>ist</em> zurückgetreten\" (has resigned), never <em>*hat zurückgetreten</em>. The same holds for <em>nachfolgen</em> (\"ist nachgefolgt\") and <em>zurückkehren</em> (\"ist zurückgekehrt\"). And: <em>du tritt<strong>st</strong> zurück</em>, <em>er tritt zurück</em> — a strong e→i shift.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ernennen–ernannte–ernannt</strong> — a mixed verb like <em>nennen/kennen/brennen</em>: the endings are weak, but the stem vowel still jumps e→a. So <em>der DFB ernannte ihn</em> (the DFB appointed him), never <em>*ernennte</em> in the simple past.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>unterschreiben &amp; unterbrechen are inseparable</strong> — which is why there's <em>no</em> ge- in the participle: <em>hat unterschrieben</em>, <em>hat unterbrochen</em> (not <em>*geunterschrieben</em>). <em>unterbrechen</em> is also strong: <em>du unterbrichst</em>, <em>er unterbrach</em>, <em>hat unterbrochen</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES <em>volver</em> (to return): o→ue + irregular participle <em>vuelto</em></strong> — <em>yo vuelvo, tú vuelves, él vuelve</em>, but <em>nosotros volvemos</em> (stress shifts away, diphthong disappears). The participle is irregular: <em>ha vuelto</em>, never <em>*volvido</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT <em>nomear</em> (to appoint): eu <em>nomeio</em>, eles <em>nomeiam</em></strong> — <em>-ear</em> verbs insert an <em>i</em> when the stem is stressed, but not in the \"we\" form: <em>nós nomeamos</em>. Simple past: <em>eu nomeei</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>PT <em>trocar</em> (to switch): eu <em>troquei</em></strong> — c→qu before -e, so the /k/ sound stays put. Don't get <em>*troquei</em> backwards: present <em>eu troco</em>, simple past <em>eu troquei</em>, subjunctive <em>que eu troque</em>.</li>\n      <li><span class=\"chip good\">NO 1:1 MATCH</span> <strong>wechseln ↔ verpflichten ↔ ES <em>fichar</em></strong> — German splits the perspective (the player <em>wechselt</em> [moves] to X ↔ the club <em>verpflichtet</em> [signs] Y). Spanish uses <em>one</em> verb for both directions: <em>el jugador fichó por el Aston Villa</em> <em>and</em> <em>el Aston Villa fichó a Manzambi</em>. So don't force the same sentence structure in ES that you'd use in DE.</li>\n      <li><span class=\"chip good\">NO 1:1 MATCH</span> <strong>der Bundestrainer</strong> has no one-word equivalent in PT/ES — it always needs a paraphrase: <em>o técnico da seleção (alemã)</em> / <em>el director técnico (DT) de la selección</em>. The Iberian <em>el seleccionador</em> is uncommon in Mexico.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>in jemandes Fußstapfen treten</strong> = to step into a predecessor's shoes. PT <em>seguir os passos de alguém</em>, ES <em>seguir los pasos de alguien</em> — the same image three times, with a different verb each time (<em>treten</em> ↔ <em>seguir</em>).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Quinta-feira, 23 de julho — tema da semana <em>Futebol &amp; Esporte</em>. A Copa do Mundo já acabou, o vocabulário do torneio nós vimos em 16/07. O que vem agora é a segunda temporada de futebol do ano: a temporada de comissão técnica e contratações. Na DFB, amanhã, <strong>sexta-feira, 24/07/2026, às 11:00, na sede da entidade em Frankfurt</strong>, Jürgen Klopp será apresentado como sucessor de Julian Nagelsmann (<a href=\"https://www.sportschau.de/fussball/nationalmannschaft/klopp-soll-morgen-als-bundestrainer-vorgestellt-werden,klopp-dfb-bundestrainer-100.html\">sportschau.de</a>, 23/07); Nagelsmann havia renunciado em <strong>03/07</strong> depois da eliminação nas oitavas de final. Paralelamente, a janela de transferências está fervendo — Johan Manzambi sai do SC Freiburg rumo ao Aston Villa por um recorde do clube de <strong>59,5 milhões de libras</strong> (<a href=\"https://www.skysports.com/football/news/11677/13564492/johan-manzambi-aston-villa-sign-newcastle-target-from-freiburg-in-club-record-lb59-5m-deal\">skysports.com</a>, 17/07) — e o Brasileirão está de volta desde 19/07, com o Palmeiras na ponta da tabela. Esse é exatamente o vocabulário que se precisa à noite, no <em>Globo Esporte</em>: <em>renunciar</em>, <em>o sucessor</em>, <em>a coletiva</em>, <em>o reforço</em>, <em>fichar</em>. <strong>35 verbetes, sendo 12 verbos com conjugação completa</strong> — incluindo a pegadinha do perfeito com <em>sein</em> em <em>zurücktreten</em>, o verbo misto <em>ernennen–ernannte–ernannt</em>, a mudança de radical do ES <em>volver → vuelvo/vuelto</em> e o padrão -ear do PT <em>nomear → eu nomeio</em> — além de 3 revisões (<em>der Trainer</em>, <em>der Favorit</em>, <em>der Gegner</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO COGNATO</span> <strong>der Manager ≠ EN <em>the manager</em></strong> — no futebol alemão, o <em>Manager</em> é o responsável pela parte administrativa (elenco, transferências, contratos — hoje normalmente chamado de <em>Sportdirektor</em>). Já no inglês britânico, <em>the manager</em> é justamente o técnico principal: „Klopp was Liverpool's manager.\" Quem confunde os dois acaba transformando o técnico em contador.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o técnico</strong> — no Brasil, o técnico principal é chamado de <em>o técnico</em> em todos os níveis (clube e seleção). O português europeu <em>o treinador</em> é compreendido, mas no Norte-Pioneiro soa como português de jornal.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a coletiva (de imprensa)</strong> = die Pressekonferenz — a forma coloquial e curta usada no Brasil no dia a dia. O português europeu usa <em>conferência de imprensa</em>, o es-MX <em>la conferencia de prensa</em> (o ibérico <em>rueda de prensa</em> raramente se ouve no México).</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>zurücktreten precisa de <em>sein</em></strong> — „Nagelsmann <em>ist</em> zurückgetreten\", nunca <em>*hat zurückgetreten</em>. O mesmo vale para <em>nachfolgen</em> („ist nachgefolgt\") e <em>zurückkehren</em> („ist zurückgekehrt\"). E: <em>du tritt<strong>st</strong> zurück</em>, <em>er tritt zurück</em> — mudança forte e→i.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ernennen–ernannte–ernannt</strong> — um verbo misto como <em>nennen/kennen/brennen</em>: as terminações são fracas, mas a vogal do radical muda mesmo assim de e→a. Ou seja, <em>der DFB ernannte ihn</em>, nunca <em>*ernennte</em> no pretérito.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>unterschreiben &amp; unterbrechen são inseparáveis</strong> — por isso <em>nenhum</em> ge- no particípio: <em>hat unterschrieben</em>, <em>hat unterbrochen</em> (e não <em>*geunterschrieben</em>). <em>unterbrechen</em> também é forte: <em>du unterbrichst</em>, <em>er unterbrach</em>, <em>hat unterbrochen</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES <em>volver</em> (zurückkehren): o→ue + particípio <em>vuelto</em></strong> — <em>yo vuelvo, tú vuelves, él vuelve</em>, mas <em>nosotros volvemos</em> (sem acento tônico, sem ditongo). O particípio é irregular: <em>ha vuelto</em>, nunca <em>*volvido</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT <em>nomear</em> (ernennen): eu <em>nomeio</em>, eles <em>nomeiam</em></strong> — os verbos em <em>-ear</em> inserem um <em>i</em> quando a sílaba é tônica, mas não na forma nós: <em>nós nomeamos</em>. Pretérito perfeito: <em>eu nomeei</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>PT <em>trocar</em> (wechseln): eu <em>troquei</em></strong> — c→qu antes de -e, para manter o som /k/. Não inverta a lógica: presente <em>eu troco</em>, pretérito perfeito <em>eu troquei</em>, subjuntivo <em>que eu troque</em>.</li>\n      <li><span class=\"chip good\">NÃO HÁ 1:1</span> <strong>wechseln ↔ verpflichten ↔ ES <em>fichar</em></strong> — o alemão separa a perspectiva (o jogador <em>wechselt</em> para X ↔ o clube <em>verpflichtet</em> Y). O espanhol usa <em>um único</em> verbo nas duas direções: <em>el jugador fichó por el Aston Villa</em> <em>e</em> <em>el Aston Villa fichó a Manzambi</em>. Por isso, não force a mesma estrutura de frase do alemão no ES.</li>\n      <li><span class=\"chip good\">NÃO HÁ 1:1</span> <strong>der Bundestrainer</strong> não tem equivalente de uma palavra só em PT/ES — é sempre preciso uma descrição: <em>o técnico da seleção (alemã)</em> / <em>el director técnico (DT) de la selección</em>. O ibérico <em>el seleccionador</em> é incomum no México.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>in jemandes Fußstapfen treten</strong> = assumir o legado de um antecessor. PT <em>seguir os passos de alguém</em>, ES <em>seguir los pasos de alguien</em> — a mesma imagem nas três línguas, mas com um verbo diferente em cada uma (<em>treten</em> ↔ <em>seguir</em>).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Jueves 23 de julio — tema de la semana <em>fútbol y deporte</em>. El Mundial ya terminó, el vocabulario del torneo lo vimos el 16/07. Lo que llega ahora es la segunda temporada futbolística del año: la temporada del <em>personal</em>. Mañana, <strong>viernes 24/07/2026, a las 11:00 horas en la sede de la federación en Fráncfort</strong>, la DFB presentará a Jürgen Klopp como sucesor de Julian Nagelsmann (<a href=\"https://www.sportschau.de/fussball/nationalmannschaft/klopp-soll-morgen-als-bundestrainer-vorgestellt-werden,klopp-dfb-bundestrainer-100.html\">sportschau.de</a>, 23/07); Nagelsmann había renunciado el <strong>03/07</strong> tras la eliminación en octavos de final. En paralelo, el mercado de fichajes está al rojo vivo — Johan Manzambi se va del SC Freiburg al Aston Villa por un récord de club de <strong>59,5 millones de libras</strong> (<a href=\"https://www.skysports.com/football/news/11677/13564492/johan-manzambi-aston-villa-sign-newcastle-target-from-freiburg-in-club-record-lb59-5m-deal\">skysports.com</a>, 17/07) — y el Brasileirão volvió a jugarse desde el 19/07, con Palmeiras en la cima de la tabla. Ese es exactamente el vocabulario que se necesita para leer <em>Globo Esporte</em> por la noche: <em>renunciar</em>, <em>o sucessor</em>, <em>a coletiva</em>, <em>o reforço</em>, <em>fichar</em>. <strong>35 entradas, 12 de ellas verbos con conjugación completa</strong> — incluida la trampa del perfecto con <em>sein</em> en <em>zurücktreten</em>, el verbo mixto <em>ernennen–ernannte–ernannt</em>, el cambio de raíz en español <em>volver → vuelvo/vuelto</em> y el patrón <em>-ear</em> del portugués <em>nomear → eu nomeio</em> — más 3 repasos (<em>der Trainer</em>, <em>der Favorit</em>, <em>der Gegner</em>).</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSO AMIGO</span> <strong>der Manager ≠ EN <em>the manager</em></strong> — en el fútbol alemán, el <em>Manager</em> es la persona a cargo de lo administrativo (plantilla, traspasos, contratos — hoy suele llamarse <em>Sportdirektor</em>, director deportivo). En el inglés británico, en cambio, <em>the manager</em> es justamente el entrenador principal: «Klopp was Liverpool's manager». Quien confunde esto convierte al entrenador en contador.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>o técnico</strong> — en Brasil, der Cheftrainer se llama <em>o técnico</em> en todos los niveles (club <em>y</em> selección nacional). El portugués europeo <em>o treinador</em> se entiende, pero en el Norte-Pioneiro suena a alemán traducido para el periódico.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a coletiva (de imprensa)</strong> = die Pressekonferenz — la forma breve y coloquial brasileña. El portugués europeo dice <em>conferência de imprensa</em>, y en es-MX se dice <em>la conferencia de prensa</em> (el ibérico <em>rueda de prensa</em> casi no se usa en México).</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>zurücktreten necesita <em>sein</em></strong> — „Nagelsmann <em>ist</em> zurückgetreten\", nunca <em>*hat zurückgetreten</em>. Lo mismo aplica a <em>nachfolgen</em> („ist nachgefolgt\") y a <em>zurückkehren</em> („ist zurückgekehrt\"). Y: <em>du tritt<strong>st</strong> zurück</em>, <em>er tritt zurück</em> — fuerte e→i.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>ernennen–ernannte–ernannt</strong> — un verbo mixto como <em>nennen/kennen/brennen</em>: las terminaciones son débiles, pero la vocal de la raíz cambia igual de e→a. Entonces <em>der DFB ernannte ihn</em>, nunca <em>*ernennte</em> en pretérito.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>unterschreiben &amp; unterbrechen sind untrennbar</strong> — por eso <em>no</em> llevan ge- en el participio: <em>hat unterschrieben</em>, <em>hat unterbrochen</em> (no <em>*geunterschrieben</em>). <em>unterbrechen</em> además es fuerte: <em>du unterbrichst</em>, <em>er unterbrach</em>, <em>hat unterbrochen</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>ES <em>volver</em> (zurückkehren): o→ue + participio <em>vuelto</em></strong> — <em>yo vuelvo, tú vuelves, él vuelve</em>, pero <em>nosotros volvemos</em> (sin acento tónico, sin diptongo). El participio es irregular: <em>ha vuelto</em>, nunca <em>*volvido</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>PT <em>nomear</em> (ernennen): eu <em>nomeio</em>, eles <em>nomeiam</em></strong> — los verbos en <em>-ear</em> insertan una <em>i</em> cuando llevan el acento tónico, pero no en la forma de \"nosotros\": <em>nós nomeamos</em>. Pretérito: <em>eu nomeei</em>.</li>\n      <li><span class=\"chip\">CONJUGACIÓN</span> <strong>PT <em>trocar</em> (wechseln): eu <em>troquei</em></strong> — c→qu antes de -e, para conservar el sonido /k/. Nunca pienses <em>*troquei</em> al revés: presente <em>eu troco</em>, pretérito <em>eu troquei</em>, subjuntivo <em>que eu troque</em>.</li>\n      <li><span class=\"chip good\">NO HAY 1:1</span> <strong>wechseln ↔ verpflichten ↔ ES <em>fichar</em></strong> — el alemán separa la perspectiva (el jugador <em>wechselt</em> a X ↔ el club <em>verpflichtet</em> a Y). El español usa <em>un</em> solo verbo en ambas direcciones: <em>el jugador fichó por el Aston Villa</em> <em>y</em> <em>el Aston Villa fichó a Manzambi</em>. Así que no fuerces en español la misma estructura de oración que en alemán.</li>\n      <li><span class=\"chip good\">NO HAY 1:1</span> <strong>der Bundestrainer</strong> no tiene un equivalente de una sola palabra en PT/ES — siempre requiere una perífrasis: <em>o técnico da seleção (alemã)</em> / <em>el director técnico (DT) de la selección</em>. El ibérico <em>el seleccionador</em> es poco usual en México.</li>\n      <li><span class=\"chip good\">MODISMO</span> <strong>in jemandes Fußstapfen treten</strong> = asumir el legado de un predecesor. PT <em>seguir os passos de alguém</em>, ES <em>seguir los pasos de alguien</em> — la misma imagen en los tres idiomas, pero con un verbo distinto cada vez (<em>treten</em> ↔ <em>seguir</em>).</li>\n    </ul></div>"
      }
    }
  ]
