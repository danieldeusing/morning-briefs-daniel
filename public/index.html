<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }

  .loading {

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }

  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }

     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

  <div class="header-right">

      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>

             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">

        <span class="nav-label-text">Übersicht</span>

           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

xport) <em>und</em> hält die EZB hawkish (Euro fest) — beides zieht an EUR/BRL, gegenläufig.</li>\n      <li><span class=\"chip\">EZB</span> <strong>EZB hob am 17.06. alle drei Leitzinsen um 25 bp</strong> (Einlage 2,25 %) — erster Hike seit 2023, ausdrücklich wegen Nahost-Energie-Inflation. Nächste Sitzung 22.–23.07.</li>\n      <li><span class=\"chip hot\">USA/BR</span> <strong>Zoll-Frist HEUTE 15.07.</strong> (USTR 301, +25 %) — gesetzlicher Stichtag. <em>Ausgang bei Redaktionsschluss nicht bestätigt</em>; kein frischer Beleg diese Runde.</li>\n      <li><span class=\"chip good\">FX</span> <strong>DXY 100,82</strong> (−0,11 %, 15.07.) — Dollar gibt weiter nach (von 101,19 am 14.07.). Kleiner Rückenwind für den Real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1233</strong> (Frankfurter/ECB, 14.07.); Spot-Schluss davor R$ 5,1314 (+0,46 %, 13.07.).</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check sauber</strong>: ECB-Fix 5,8431 vs. rechnerisch 5,1233 × 1,1405 = 5,8431 (0,0 %).</li>\n      <li><span class=\"chip good\">BR</span> <strong>BR-Assets halten</strong>: 5J-CDS 123,57 bp (14.07., enger von 123,90 am 10.07.); EWZ +1,81 % (14.07.). Ibovespa 175.739 (−1,2 %, 13.07.-Schluss).</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25 %</strong> (seit 17.06.); nächster Copom 04.–05.08. Fed hielt 3,50–3,75 % (17.06.), nächste Sitzung 28.–29.07.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The oil shock enters round three. Brent stands at roughly <strong>$85.50</strong> — the highest since June 15 and about 10% above last week —, after fighting between the US and Iran reportedly ran into a third straight day on July 14. Only <strong>57 ships</strong> transited the Strait of Hormuz from Friday to Sunday, over half fewer than the prior week; Trump announced on July 13 that he would blockade the strait and impose a 20% toll on cargo passing through. And yet: the Real is holding. The last published ECB fix remains <strong>5.8431</strong> (Tue, July 14) — today's fix (~16:00 CET) hasn't dropped yet. The key to understanding today is that this exact oil shock moves <em>two</em> legs of Daniel's exchange rate — not just the Real, but also the euro: it keeps the Real firm (Brazil exports oil) <em>and</em> keeps the ECB hawkish (it raised rates on June 17 for the first time since 2023, explicitly citing war-driven energy inflation). Two forces pulling EUR/BRL in opposite directions. On top of that sits today's binary deadline: the US tariff deadline expires <strong>today</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8431</strong> (ECB fix, Tue July 14) — last published anchor, the Real holds. Today's fix (July 15) not out yet (~16:00 CET).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent ~$85.50</strong> (July 15, +0.91% on the day) — highest since June 15, ~+10% on the week. Second source: $85.92 (Sept futures, July 14).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Hormuz half-closed</strong>: only 57 transits Fri–Sun (>50% drop w/w). Trump announced (July 13) a blockade + 20% cargo toll.</li>\n      <li><span class=\"chip hot\">FX/ECB</span> <strong>The oil shock has two legs</strong>: it props up the Real (oil exports) <em>and</em> keeps the ECB hawkish (firm euro) — both pull on EUR/BRL, in opposite directions.</li>\n      <li><span class=\"chip\">ECB</span> <strong>ECB raised all three key rates by 25 bp on June 17</strong> (deposit rate 2.25%) — first hike since 2023, explicitly due to Middle East energy inflation. Next meeting July 22–23.</li>\n      <li><span class=\"chip hot\">US/BR</span> <strong>Tariff deadline TODAY July 15</strong> (USTR 301, +25%) — statutory deadline. <em>Outcome not confirmed at press time</em>; no fresh evidence this round.</li>\n      <li><span class=\"chip good\">FX</span> <strong>DXY 100.82</strong> (−0.11%, July 15) — the dollar keeps easing (from 101.19 on July 14). Small tailwind for the Real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1233</strong> (Frankfurter/ECB, July 14); prior spot close R$5.1314 (+0.46%, July 13).</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: ECB fix 5.8431 vs. computed 5.1233 × 1.1405 = 5.8431 (0.0%).</li>\n      <li><span class=\"chip good\">BR</span> <strong>BR assets holding</strong>: 5Y CDS 123.57 bp (July 14, tighter from 123.90 on July 10); EWZ +1.81% (July 14). Ibovespa 175,739 (−1.2%, July 13 close).</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> (since June 17); next Copom Aug 4–5. Fed held 3.50–3.75% (June 17), next meeting July 28–29.</li>\n      <li><span class=\"chip\">Heads up</span> Forecast probabilities below = <strong>my confidence</strong>, not a market-implied number.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O choque do petróleo entra na terceira rodada. O Brent está em torno de <strong>US$ 85,50</strong> — o maior nível desde 15 de junho e cerca de 10% acima da semana anterior —, depois que os combates entre EUA e Irã, segundo relatos, chegaram ao terceiro dia consecutivo em 14/07. Pelo Estreito de Ormuz passaram apenas <strong>57 navios</strong> de sexta a domingo, mais da metade a menos que na semana anterior; Trump anunciou em 13/07 que vai bloquear o estreito e cobrar um pedágio de 20% sobre a carga. E, mesmo assim: o real resiste. O último fixing publicado pelo BCE permanece em <strong>5,8431</strong> (ter., 14/07) — o fixing de hoje (~16h CET) ainda não saiu. A chave para entender o dia de hoje é que esse mesmo choque do petróleo movimenta <em>duas</em> pernas do câmbio de Daniel — não só o real, mas também o euro: ele mantém o real firme (o Brasil exporta petróleo) <em>e</em> mantém o BCE hawkish (que elevou os juros em 17/06 pela primeira vez desde 2023, explicitamente por causa da inflação de energia impulsionada pela guerra). Duas forças puxando o EUR/BRL em direções opostas. Por cima de tudo isso ainda paira o prazo binário de hoje: o prazo da tarifa dos EUA vence <strong>hoje</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,8431</strong> (fixing BCE, ter. 14/07) — última âncora publicada, o real resiste. Fixing de hoje (15/07) ainda não saiu (~16h CET).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent ~US$ 85,50</strong> (15/07, +0,91% no dia) — maior desde 15 de junho, ~+10% na semana. Segunda fonte: US$ 85,92 (futuros de setembro, 14/07).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Ormuz meio fechado</strong>: apenas 57 trânsitos de sex. a dom. (queda de >50% na semana). Trump anunciou (13/07) bloqueio + pedágio de 20% sobre a carga.</li>\n      <li><span class=\"chip hot\">Câmbio/BCE</span> <strong>O choque do petróleo tem duas pernas</strong>: sustenta o real (exportação de petróleo) <em>e</em> mantém o BCE hawkish (euro firme) — ambos puxam o EUR/BRL, em direções opostas.</li>\n      <li><span class=\"chip\">BCE</span> <strong>BCE elevou as três taxas básicas em 25 pb em 17/06</strong> (depósito 2,25%) — primeira alta desde 2023, explicitamente por causa da inflação de energia no Oriente Médio. Próxima reunião 22–23/07.</li>\n      <li><span class=\"chip hot\">EUA/BR</span> <strong>Prazo da tarifa HOJE 15/07</strong> (USTR 301, +25%) — prazo legal. <em>Desfecho não confirmado no fechamento desta edição</em>; sem evidência nova nesta rodada.</li>\n      <li><span class=\"chip good\">Câmbio</span> <strong>DXY 100,82</strong> (−0,11%, 15/07) — o dólar continua cedendo (de 101,19 em 14/07). Pequeno vento favorável para o real.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>USD/BRL 5,1233</strong> (Frankfurter/BCE, 14/07); fechamento à vista anterior R$ 5,1314 (+0,46%, 13/07).</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>Checagem de câmbio cruzado limpa</strong>: fixing do BCE 5,8431 vs. calculado 5,1233 × 1,1405 = 5,8431 (0,0%).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Ativos brasileiros resistem</strong>: CDS de 5 anos 123,57 pb (14/07, mais apertado que 123,90 em 10/07); EWZ +1,81% (14/07). Ibovespa 175.739 (−1,2%, fechamento de 13/07).</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> (desde 17/06); próximo Copom 04–05/08. Fed manteve 3,50–3,75% (17/06), próxima reunião 28–29/07.</li>\n      <li><span class=\"chip\">Atenção</span> As probabilidades de projeção abaixo são <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El choque petrolero entra en su tercera ronda. El Brent se ubica en unos <strong>85.50 dólares</strong> — el nivel más alto desde el 15 de junio y cerca de 10% por encima de la semana anterior —, después de que los combates entre Estados Unidos e Irán, según reportes, llegaran a un tercer día consecutivo el 14/07. Por el Estrecho de Ormuz solo transitaron <strong>57 barcos</strong> de viernes a domingo, más de la mitad menos que la semana anterior; Trump anunció el 13/07 que bloqueará el estrecho y cobrará un peaje del 20% sobre la carga. Y aun así: el real resiste. El último fixing publicado por el BCE se mantiene en <strong>5.8431</strong> (mar. 14/07) — el fixing de hoy (~16:00 CET) todavía no sale. La clave para entender el día de hoy es que este mismo choque petrolero mueve <em>dos</em> tramos del tipo de cambio de Daniel — no solo el real, sino también el euro: mantiene firme al real (Brasil exporta petróleo) <em>y</em> mantiene al BCE en tono hawkish (subió las tasas el 17/06 por primera vez desde 2023, explícitamente por la inflación de energía impulsada por la guerra). Dos fuerzas que jalan al EUR/BRL en direcciones opuestas. Encima de todo eso está hoy el plazo binario: el plazo del arancel de Estados Unidos vence <strong>hoy</strong>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8431</strong> (fixing BCE, mar. 14/07) — última ancla publicada, el real resiste. El fixing de hoy (15/07) todavía no sale (~16:00 CET).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Brent ~85.50 $</strong> (15/07, +0.91% en el día) — el más alto desde el 15 de junio, ~+10% en la semana. Segunda fuente: 85.92 $ (futuros de septiembre, 14/07).</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Ormuz a media capacidad</strong>: solo 57 tránsitos de vie. a dom. (caída de >50% semana a semana). Trump anunció (13/07) bloqueo + peaje del 20% sobre la carga.</li>\n      <li><span class=\"chip hot\">FX/BCE</span> <strong>El choque petrolero tiene dos tramos</strong>: sostiene al real (exportación de petróleo) <em>y</em> mantiene al BCE hawkish (euro firme) — ambos jalan al EUR/BRL, en direcciones opuestas.</li>\n      <li><span class=\"chip\">BCE</span> <strong>El BCE subió las tres tasas clave 25 pb el 17/06</strong> (depósito 2.25%) — primera alza desde 2023, explícitamente por la inflación de energía en Medio Oriente. Próxima reunión 22–23/07.</li>\n      <li><span class=\"chip hot\">EE. UU./BR</span> <strong>Plazo del arancel HOY 15/07</strong> (USTR 301, +25%) — plazo legal. <em>Resultado no confirmado al cierre de esta edición</em>; sin evidencia nueva en esta ronda.</li>\n      <li><span class=\"chip good\">FX</span> <strong>DXY 100.82</strong> (−0.11%, 15/07) — el dólar sigue cediendo (venía de 101.19 el 14/07). Pequeño viento a favor para el real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1233</strong> (Frankfurter/BCE, 14/07); cierre spot previo R$ 5.1314 (+0.46%, 13/07).</li>\n      <li><span class=\"chip\">FX</span> <strong>Verificación de tipo cruzado limpia</strong>: fixing BCE 5.8431 vs. calculado 5.1233 × 1.1405 = 5.8431 (0.0%).</li>\n      <li><span class=\"chip good\">BR</span> <strong>Los activos brasileños resisten</strong>: CDS a 5 años 123.57 pb (14/07, más ajustado que 123.90 el 10/07); EWZ +1.81% (14/07). Ibovespa 175,739 (−1.2%, cierre del 13/07).</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> (desde el 17/06); próximo Copom 04–05/08. La Fed mantuvo 3.50–3.75% (17/06), próxima reunión 28–29/07.</li>\n      <li><span class=\"chip\">Atención</span> Las probabilidades de pronóstico de abajo son <strong>mi nivel de confianza</strong>, no una cifra implícita de mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern war es der Risk-off, heute die Erleichterung. Der <strong>Juni-CPI kam kühl herein — 3,5 % Schlagzeilen-Inflation</strong> (Konsens 3,8 %, von 4,2 % im Mai), die Monatsrate sogar <strong>−0,4 %</strong>, der größte Ein-Monats-Rückgang seit April 2020.<sup>[1]</sup> Der Dienstag wurde damit zum Spiegelbild des Montags: Getroffen hatte der Risk-off ausgerechnet die überfüllteste Wette — KI und Halbleiter; die Erleichterungs-Rally hob genau diese Namen wieder an. <strong>Nvidia +4,06 % auf 211,80 $</strong> machte den gesamten Montags-Absturz wett, Alphabet +1,99 % auf 359,51 $.<sup>[2][3]</sup> Und die Gegenbewegung lief symmetrisch: Montags Qualitäts-Gewinner gaben ihren Hafen-Aufschlag wieder ab — <strong>Apple −0,77 %, Microsoft −1,55 %</strong>. Der Nasdaq führte mit <strong>+0,9 % auf 26.107</strong>, der S&amp;P +0,4 % auf 7.543,59, der Dow praktisch flach.<sup>[3]</sup> Der Joker im Hintergrund bleibt Hormuz: <strong>Brent 85,63 $, WTI 79,86 $</strong> halten die Kriegs-Prämie nach dem +9,59-%-Montags-Sprung — Öl ist der eine Long, der von einem Inflations-Impuls <em>profitiert</em>.<sup>[4][5]</sup> Krypto sprang im Risk-on mit (<strong>BTC 64.634 $ +3,0 %, ETH 1.873 $ +4,7 %</strong>), doch das Nachfrage-Signal widerspricht: Die Spot-BTC-ETFs drehten am Montag mit <strong>−424,66 Mio. $</strong> wieder klar ins Minus.<sup>[7][8]</sup> Und morgen öffnet die Berichtssaison: <strong>TSMC + Netflix (Do 16.07.)</strong>, TSMC der KI-Capex-Kronzeuge nach +68 % Juni-Umsatz.<sup>[11][12]</sup></p>\n    <ul>\n      <li><span class=\"chip good\">BIG-TECH</span> <strong>Nvidia 211,80 $ (+4,06 %)</strong> holte den kompletten Montags-Selloff zurück, Alphabet +1,99 % auf 359,51 $. Die Rotation kehrte um: <strong>Apple −0,77 %, Microsoft −1,55 %</strong> gaben ihren Hafen-Aufschlag ab. Kühler CPI + KI-Nachfrage trugen die Chips. HOLD — nachlegen erst nach dem TSMC-Beleg (Do 16.07.), nicht in den +4-%-Sprung.</li>\n      <li><span class=\"chip\">MAKRO</span> <strong>Juni-CPI 3,5 % YoY</strong> (Konsens 3,8 %, von 4,2 % Mai), Monatsrate <strong>−0,4 %</strong> (größter Rückgang seit April 2020), Kern 2,6 %. Der kühlste Print seit Monaten — Rückenwind für Zins-sensitive Assets. DXY <strong>~100,8</strong>, weicher.<sup>[1][6]</sup></li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 85,63 $ (+1,06 %), WTI 79,86 $ (+0,65 %)</strong> — die Hormuz-Prämie hält. US-Blockade iranischer Küste + 20-%-Fracht-Maut seit 14.07. live; ~230 beladene Tanker im Golf gestrandet, Durchfahrten auf 6 pro 12-h-Fenster eingebrochen. HOLD, dem Sprung nicht nachjagen.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>~4.030–4.070 $/oz</strong> (Tracker streuen ~1 %, −0,4 bis −0,6 % d/d) — gab den 1-%-Pop wieder ab, weil der kühle CPI die Hike-Hedge-Nachfrage nahm. Zwischen Hormuz-Bid und schwindender Inflations-Angst eingeklemmt. HOLD als Versicherung.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.634 $ (+3,0 % 24h)</strong> — sprang im Risk-on, aber die ETF-Nachfrage bestätigt nicht: Mo 13.07. <strong>−424,66 Mio. $</strong> Abfluss (FBTC −245,62, IBIT −185,50), YTD ~−5,8 Mrd. $. Preis-Bounce ist Makro-Beta, kein Boden. HOLD.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH 1.873 $ (+4,74 % 24h)</strong> — schlägt BTC am Tag, aber das ist Beta in der Erholung, keine Entkopplung. Halten; ein echter Zukauf-Grund bräuchte Stärke auch an einem roten Tag.</li>\n      <li><span class=\"chip good\">SEKTOREN</span> Überwiegend grün im Risk-on. <strong>VIRTUAL +6,65 %</strong>, NEAR +2,58 %, DOGE +2,50 %, RENDER +2,47 %; Nachzügler GALA −0,45 %, TAO −0,94 %. Die „AI-Token\" laufen wieder verstreut — Krypto-Beta mit KI-Etikett, kein KI-Investment. Kein Neu-Einstieg.</li>\n      <li><span class=\"chip\">KALENDER</span> <strong>Do 16.07.: TSMC + Netflix</strong>; Mi 22.07.: Tesla + Alphabet; Mi 29.07.: Microsoft + Meta + <strong>FOMC</strong> (~89 % Hold 3,50–3,75 %); Do 30.07.: Apple + Amazon; Nvidia am 26.08. Jeder Timeframe unten hängt an einem dieser Termine.<sup>[12][13]</sup></li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday it was risk-off; today it's relief. <strong>June CPI came in cool — 3.5% headline inflation</strong> (consensus 3.8%, down from 4.2% in May), with the monthly rate at <strong>−0.4%</strong>, the largest one-month drop since April 2020.<sup>[1]</sup> Tuesday became the mirror image of Monday: the risk-off had hit the single most crowded trade — AI and semiconductors; the relief rally lifted exactly those names back up. <strong>Nvidia +4.06% to $211.80</strong> erased the entire Monday selloff, Alphabet +1.99% to $359.51.<sup>[2][3]</sup> And the countermove ran symmetrically: Monday's quality winners gave back their safe-haven premium — <strong>Apple −0.77%, Microsoft −1.55%</strong>. The Nasdaq led with <strong>+0.9% to 26,107</strong>, the S&amp;P +0.4% to 7,543.59, the Dow essentially flat.<sup>[3]</sup> The wildcard in the background remains Hormuz: <strong>Brent $85.63, WTI $79.86</strong> hold the war premium after Monday's +9.59% jump — oil is the one long idea that <em>benefits</em> from an inflation impulse.<sup>[4][5]</sup> Crypto jumped along with the risk-on (<strong>BTC $64,634 +3.0%, ETH $1,873 +4.7%</strong>), but the demand signal disagrees: spot BTC ETFs turned clearly negative again on Monday with <strong>−$424.66M</strong>.<sup>[7][8]</sup> And tomorrow earnings season opens: <strong>TSMC + Netflix (Thu 07-16)</strong>, with TSMC the star witness on AI capex after +68% June revenue growth.<sup>[11][12]</sup></p>\n    <ul>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>Nvidia $211.80 (+4.06%)</strong> clawed back the entire Monday selloff, Alphabet +1.99% to $359.51. The rotation reversed: <strong>Apple −0.77%, Microsoft −1.55%</strong> gave up their safe-haven premium. A cool CPI plus AI demand carried the chips. HOLD — add only after the TSMC evidence (Thu 07-16), not into the +4% jump.</li>\n      <li><span class=\"chip\">MACRO</span> <strong>June CPI 3.5% YoY</strong> (consensus 3.8%, down from 4.2% in May), monthly rate <strong>−0.4%</strong> (largest drop since April 2020), core 2.6%. The coolest print in months — a tailwind for rate-sensitive assets. DXY <strong>~100.8</strong>, softer.<sup>[1][6]</sup></li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $85.63 (+1.06%), WTI $79.86 (+0.65%)</strong> — the Hormuz premium holds. The US blockade of the Iranian coast plus a 20% cargo toll went live 07-14; ~230 loaded tankers stranded in the Gulf, transits collapsed to 6 per 12-hour window. HOLD, don't chase the spike.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>~$4,030–4,070/oz</strong> (trackers spread ~1%, −0.4 to −0.6% d/d) — gave back the 1% pop as the cool CPI drained hike-hedge demand. Squeezed between the Hormuz bid and fading inflation fear. HOLD as insurance.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC $64,634 (+3.0% 24h)</strong> — jumped with the risk-on, but ETF demand doesn't confirm it: Mon 07-13 saw <strong>−$424.66M</strong> outflows (FBTC −$245.62M, IBIT −$185.50M), YTD ~−$5.8B. The price bounce is macro beta, not a bottom. HOLD.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH $1,873 (+4.74% 24h)</strong> — beats BTC on the day, but that's beta in the recovery, not decoupling. Hold; a real add-on case would need strength on a red day too.</li>\n      <li><span class=\"chip good\">SECTORS</span> Mostly green in the risk-on. <strong>VIRTUAL +6.65%</strong>, NEAR +2.58%, DOGE +2.50%, RENDER +2.47%; laggards GALA −0.45%, TAO −0.94%. The \"AI tokens\" are scattered again — crypto beta with an AI label, not an AI investment. No new entries.</li>\n      <li><span class=\"chip\">CALENDAR</span> <strong>Thu 07-16: TSMC + Netflix</strong>; Wed 07-22: Tesla + Alphabet; Wed 07-29: Microsoft + Meta + <strong>FOMC</strong> (~89% hold at 3.50–3.75%); Thu 07-30: Apple + Amazon; Nvidia on 08-26. Every timeframe below hangs on one of these dates.<sup>[12][13]</sup></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem foi o \"risk-off\", hoje é o alívio. O <strong>CPI de junho veio frio — 3,5 % de inflação cheia</strong> (consenso 3,8 %, vindo de 4,2 % em maio), com a taxa mensal em <strong>−0,4 %</strong>, a maior queda em um mês desde abril de 2020.<sup>[1]</sup> Terça-feira virou o espelho de segunda-feira: o \"risk-off\" havia atingido justamente a aposta mais lotada — IA e semicondutores; o rali de alívio ergueu de volta exatamente esses nomes. <strong>Nvidia +4,06 % para 211,80 $</strong> recuperou toda a queda de segunda-feira, Alphabet +1,99 % para 359,51 $.<sup>[2][3]</sup> E o movimento contrário foi simétrico: os vencedores de qualidade de segunda-feira devolveram seu prêmio de porto seguro — <strong>Apple −0,77 %, Microsoft −1,55 %</strong>. O Nasdaq liderou com <strong>+0,9 % para 26.107</strong>, o S&amp;P +0,4 % para 7.543,59, o Dow praticamente estável.<sup>[3]</sup> O curinga no fundo continua sendo Hormuz: <strong>Brent 85,63 $, WTI 79,86 $</strong> sustentam o prêmio de guerra depois do salto de +9,59 % de segunda-feira — o petróleo é a única aposta comprada que <em>se beneficia</em> de um impulso inflacionário.<sup>[4][5]</sup> A cripto saltou junto no \"risk-on\" (<strong>BTC 64.634 $ +3,0 %, ETH 1.873 $ +4,7 %</strong>), mas o sinal de demanda contradiz isso: os ETFs de BTC à vista voltaram a ficar claramente negativos na segunda-feira, com <strong>−424,66 milhões $</strong>.<sup>[7][8]</sup> E amanhã abre a temporada de resultados: <strong>TSMC + Netflix (qui. 16.07.)</strong>, com a TSMC como testemunha-chave do capex de IA depois de +68 % na receita de junho.<sup>[11][12]</sup></p>\n    <ul>\n      <li><span class=\"chip good\">BIG-TECH</span> <strong>Nvidia 211,80 $ (+4,06 %)</strong> recuperou toda a liquidação de segunda-feira, Alphabet +1,99 % para 359,51 $. A rotação se inverteu: <strong>Apple −0,77 %, Microsoft −1,55 %</strong> devolveram seu prêmio de porto seguro. CPI frio + demanda por IA sustentaram os chips. MANTER — só aumentar posição depois da prova da TSMC (qui. 16.07.), não em cima do salto de +4 %.</li>\n      <li><span class=\"chip\">MACRO</span> <strong>CPI de junho 3,5 % a/a</strong> (consenso 3,8 %, vindo de 4,2 % em maio), taxa mensal <strong>−0,4 %</strong> (maior queda desde abril de 2020), núcleo 2,6 %. O número mais frio em meses — vento a favor para ativos sensíveis a juros. DXY <strong>~100,8</strong>, mais fraco.<sup>[1][6]</sup></li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 85,63 $ (+1,06 %), WTI 79,86 $ (+0,65 %)</strong> — o prêmio de Hormuz se sustenta. O bloqueio naval dos EUA à costa iraniana + pedágio de 20 % sobre a carga entrou em vigor em 14.07.; ~230 petroleiros carregados presos no Golfo, travessias despencaram para 6 a cada janela de 12 h. MANTER, sem perseguir o salto.</li>\n      <li><span class=\"chip\">OURO</span> <strong>~4.030–4.070 $/oz</strong> (rastreadores variam ~1 %, −0,4 a −0,6 % d/d) — devolveu o pop de 1 % porque o CPI frio tirou a demanda por proteção contra alta de juros. Espremido entre o suporte de Hormuz e o medo de inflação minguante. MANTER como seguro.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.634 $ (+3,0 % em 24h)</strong> — saltou no \"risk-on\", mas a demanda de ETFs não confirma: seg. 13.07. teve <strong>−424,66 milhões $</strong> em saídas (FBTC −245,62, IBIT −185,50), YTD ~−5,8 bi $. O salto de preço é beta macro, não um fundo. MANTER.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH 1.873 $ (+4,74 % em 24h)</strong> — supera o BTC no dia, mas isso é beta na recuperação, não descolamento. Manter; um motivo real para aumentar exigiria força também em um dia no vermelho.</li>\n      <li><span class=\"chip good\">SETORES</span> Majoritariamente no verde no \"risk-on\". <strong>VIRTUAL +6,65 %</strong>, NEAR +2,58 %, DOGE +2,50 %, RENDER +2,47 %; atrasados GALA −0,45 %, TAO −0,94 %. Os \"tokens de IA\" voltam a andar dispersos — beta cripto com etiqueta de IA, não investimento em IA. Sem nova entrada.</li>\n      <li><span class=\"chip\">CALENDÁRIO</span> <strong>Qui. 16.07.: TSMC + Netflix</strong>; qua. 22.07.: Tesla + Alphabet; qua. 29.07.: Microsoft + Meta + <strong>FOMC</strong> (~89 % de chance de manutenção em 3,50–3,75 %); qui. 30.07.: Apple + Amazon; Nvidia em 26.08. Cada horizonte abaixo está atrelado a uma dessas datas.<sup>[12][13]</sup></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer fue el \"risk-off\", hoy es el alivio. El <strong>CPI de junio salió frío — 3,5 % de inflación general</strong> (consenso 3,8 %, desde 4,2 % en mayo), con la tasa mensual en <strong>−0,4 %</strong>, la mayor caída en un mes desde abril de 2020.<sup>[1]</sup> El martes se convirtió en el espejo del lunes: el \"risk-off\" había golpeado justo la apuesta más saturada — IA y semiconductores; el rally de alivio levantó de nuevo exactamente esos nombres. <strong>Nvidia +4,06 % a 211,80 $</strong> recuperó toda la caída del lunes, Alphabet +1,99 % a 359,51 $.<sup>[2][3]</sup> Y el contramovimiento fue simétrico: los ganadores de calidad del lunes devolvieron su prima de refugio — <strong>Apple −0,77 %, Microsoft −1,55 %</strong>. El Nasdaq lideró con <strong>+0,9 % a 26.107</strong>, el S&amp;P +0,4 % a 7.543,59, el Dow prácticamente plano.<sup>[3]</sup> El comodín de fondo sigue siendo Ormuz: <strong>Brent 85,63 $, WTI 79,86 $</strong> sostienen la prima de guerra tras el salto de +9,59 % del lunes — el petróleo es la única idea larga que <em>se beneficia</em> de un impulso inflacionario.<sup>[4][5]</sup> La cripto saltó junto con el \"risk-on\" (<strong>BTC 64.634 $ +3,0 %, ETH 1.873 $ +4,7 %</strong>), pero la señal de demanda contradice eso: los ETF spot de BTC volvieron a caer claramente en negativo el lunes, con <strong>−424,66 millones $</strong>.<sup>[7][8]</sup> Y mañana arranca la temporada de resultados: <strong>TSMC + Netflix (jue. 16.07.)</strong>, con TSMC como testigo clave del capex de IA tras un +68 % en ingresos de junio.<sup>[11][12]</sup></p>\n    <ul>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>Nvidia 211,80 $ (+4,06 %)</strong> recuperó toda la venta masiva del lunes, Alphabet +1,99 % a 359,51 $. La rotación se revirtió: <strong>Apple −0,77 %, Microsoft −1,55 %</strong> devolvieron su prima de refugio. El CPI frío más la demanda de IA sostuvieron a los chips. MANTENER — aumentar posición solo después de la prueba de TSMC (jue. 16.07.), no sobre el salto de +4 %.</li>\n      <li><span class=\"chip\">MACRO</span> <strong>CPI de junio 3,5 % interanual</strong> (consenso 3,8 %, desde 4,2 % en mayo), tasa mensual <strong>−0,4 %</strong> (mayor caída desde abril de 2020), núcleo 2,6 %. El dato más frío en meses — viento a favor para los activos sensibles a tasas. DXY <strong>~100,8</strong>, más débil.<sup>[1][6]</sup></li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 85,63 $ (+1,06 %), WTI 79,86 $ (+0,65 %)</strong> — la prima de Ormuz se sostiene. El bloqueo naval de EE. UU. a la costa iraní + una tarifa de carga del 20 % entraron en vigor desde el 14.07.; ~230 petroleros cargados varados en el Golfo, los tránsitos cayeron a 6 por cada ventana de 12 h. MANTENER, sin perseguir el salto.</li>\n      <li><span class=\"chip\">ORO</span> <strong>~4.030–4.070 $/oz</strong> (los rastreadores varían ~1 %, −0,4 a −0,6 % d/d) — devolvió el repunte del 1 % porque el CPI frío quitó la demanda de cobertura contra alzas de tasas. Atrapado entre el respaldo de Ormuz y el miedo a la inflación que se desvanece. MANTENER como seguro.</li>\n      <li><span class=\"chip good\">BITCOIN</span> <strong>BTC 64.634 $ (+3,0 % en 24h)</strong> — saltó con el \"risk-on\", pero la demanda de ETF no lo confirma: el lun. 13.07. hubo <strong>−424,66 millones $</strong> en salidas (FBTC −245,62, IBIT −185,50), YTD ~−5.800 millones $. El rebote de precio es beta macro, no un piso. MANTENER.</li>\n      <li><span class=\"chip good\">ETHEREUM</span> <strong>ETH 1.873 $ (+4,74 % en 24h)</strong> — supera al BTC en el día, pero eso es beta en la recuperación, no desacople. Mantener; un motivo real para aumentar posición necesitaría fortaleza también en un día rojo.</li>\n      <li><span class=\"chip good\">SECTORES</span> Mayormente en verde en el \"risk-on\". <strong>VIRTUAL +6,65 %</strong>, NEAR +2,58 %, DOGE +2,50 %, RENDER +2,47 %; rezagados GALA −0,45 %, TAO −0,94 %. Los \"tokens de IA\" vuelven a moverse dispersos — beta cripto con etiqueta de IA, no inversión en IA. Sin nueva entrada.</li>\n      <li><span class=\"chip\">CALENDARIO</span> <strong>Jue. 16.07.: TSMC + Netflix</strong>; mié. 22.07.: Tesla + Alphabet; mié. 29.07.: Microsoft + Meta + <strong>FOMC</strong> (~89 % de probabilidad de mantener en 3,50–3,75 %); jue. 30.07.: Apple + Amazon; Nvidia el 26.08. Cada plazo de abajo depende de una de estas fechas.<sup>[12][13]</sup></li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Zwei Wochen in Folge blutet die npm-Lieferkette — und der frischeste Treffer entlarvt eine unbequeme Wahrheit. Keine 48 Stunden nachdem der jscrambler-Vorfall durch war (Faden im Brief vom 12.07), wurde am 14.07 der AsyncAPI-Generator gekapert: nicht über ein Install-Skript, sondern über eine kaputte GitHub-Actions-Pipeline und einen geklauten Bot-Token. Heißt: npms neue Skript-Sperre in v12 hätte genau das <em>nicht</em> verhindert. Dazu SAP mit einem 9,9er-Loch, Langflow als erste KI-Agent-Plattform im CISA-Exploit-Katalog und eine zehnstündige Actions-Störung. Kein Alarm — nur die Einordnung, wo die Verteidigungslinie gerade wirklich verläuft.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI gekapert</strong>: eine „pwn request\" in GitHub Actions klaute den <code>asyncapi-bot</code>-PAT, damit wurden 4 bösartige <code>@asyncapi</code>-Pakete publiziert (~3 Mio Downloads/Woche). Zweiter npm-Treffer binnen einer Woche.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Der Haken</strong>: npms Install-Skript-Sperre (v12, Brief vom 12.07) hätte das nicht gestoppt — der Angriff lief publish-seitig über gestohlene CI-Credentials, nicht über <code>postinstall</code>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>SAP Juli-Patchday</strong> (14.07): 16 Security Notes, NetWeaver-ABAP-Loch <strong>CVE-2026-44747</strong> mit CVSS 9,9; dazu Approuter und Commerce Cloud je 9,1.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Langflow im KEV</strong>: <strong>CVE-2026-55255</strong> — erste KI-Agent-Plattform im CISA-Katalog. Plus zwei Joomla-Page-Builder-RCEs mit je CVSS 10,0.</li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong> lag am 09.07 rund zehn Stunden schief: ~8 % der Runs &gt;5 min verzögert, ~2 % gar nicht gestartet (Zahlen via Statuspage, sekundär).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19</strong> steht in Beta 1, GA im September. Nachtrag: CloudNativePG-RCE <strong>CVE-2026-44477</strong> (9,4) — kein neuer Vorfall, aber der Mai-Patch gehört nachgeholt.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">EU</span> <strong>Bambu vs. OrcaSlicer-Fork</strong>: AGPLv3-Streit aus dem Mai — Rossmann bot 10.000 $ Verteidigung, Prusa kritisierte öffentlich. Kein bestätigtes neues Juli-Update.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Zwei Wochen in Folge blutet die npm-Lieferkette — und der frischeste Treffer entlarvt eine unbequeme Wahrheit. Keine 48 Stunden nachdem der jscrambler-Vorfall durch war (Faden im Brief vom 12.07), wurde am 14.07 der AsyncAPI-Generator gekapert: nicht über ein Install-Skript, sondern über eine kaputte GitHub-Actions-Pipeline und einen geklauten Bot-Token. Heißt: npms neue Skript-Sperre in v12 hätte genau das <em>nicht</em> verhindert. Dazu SAP mit einem 9,9er-Loch, Langflow als erste KI-Agent-Plattform im CISA-Exploit-Katalog und eine zehnstündige Actions-Störung. Kein Alarm — nur die Einordnung, wo die Verteidigungslinie gerade wirklich verläuft.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI gekapert</strong>: eine „pwn request\" in GitHub Actions klaute den <code>asyncapi-bot</code>-PAT, damit wurden 4 bösartige <code>@asyncapi</code>-Pakete publiziert (~3 Mio Downloads/Woche). Zweiter npm-Treffer binnen einer Woche.</li>\n      <li><span class=\"chip\">Sec</span> <strong>Der Haken</strong>: npms Install-Skript-Sperre (v12, Brief vom 12.07) hätte das nicht gestoppt — der Angriff lief publish-seitig über gestohlene CI-Credentials, nicht über <code>postinstall</code>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>SAP Juli-Patchday</strong> (14.07): 16 Security Notes, NetWeaver-ABAP-Loch <strong>CVE-2026-44747</strong> mit CVSS 9,9; dazu Approuter und Commerce Cloud je 9,1.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Langflow im KEV</strong>: <strong>CVE-2026-55255</strong> — erste KI-Agent-Plattform im CISA-Katalog. Plus zwei Joomla-Page-Builder-RCEs mit je CVSS 10,0.</li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong> lag am 09.07 rund zehn Stunden schief: ~8 % der Runs &gt;5 min verzögert, ~2 % gar nicht gestartet (Zahlen via Statuspage, sekundär).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19</strong> steht in Beta 1, GA im September. Nachtrag: CloudNativePG-RCE <strong>CVE-2026-44477</strong> (9,4) — kein neuer Vorfall, aber der Mai-Patch gehört nachgeholt.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">EU</span> <strong>Bambu vs. OrcaSlicer-Fork</strong>: AGPLv3-Streit aus dem Mai — Rossmann bot 10.000 $ Verteidigung, Prusa kritisierte öffentlich. Kein bestätigtes neues Juli-Update.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">For two weeks running, the npm supply chain has been bleeding — and the freshest hit exposes an uncomfortable truth. Less than 48 hours after the jscrambler incident wrapped up (thread in the Jul 12 brief), the AsyncAPI generator was hijacked on Jul 14: not via an install script, but through a broken GitHub Actions pipeline and a stolen bot token. Meaning: npm's new script lockdown in v12 wouldn't have stopped this one. On top of that, SAP with a 9.9 hole, Langflow as the first AI agent platform in CISA's exploit catalog, and a ten-hour Actions outage. No alarm bell — just a read on where the real line of defense currently sits.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI hijacked</strong>: a \"pwn request\" in GitHub Actions stole the <code>asyncapi-bot</code> PAT, which was used to publish 4 malicious <code>@asyncapi</code> packages (~3M downloads/week). Second npm hit within a week.</li>\n      <li><span class=\"chip\">Sec</span> <strong>The catch</strong>: npm's install-script lockdown (v12, Jul 12 brief) wouldn't have stopped this — the attack ran on the publish side via stolen CI credentials, not through <code>postinstall</code>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>SAP July Patch Day</strong> (Jul 14): 16 security notes, NetWeaver ABAP hole <strong>CVE-2026-44747</strong> at CVSS 9.9; plus Approuter and Commerce Cloud at 9.1 each.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Langflow in the KEV</strong>: <strong>CVE-2026-55255</strong> — first AI agent platform in CISA's catalog. Plus two Joomla page-builder RCEs at CVSS 10.0 each.</li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong> was down for about ten hours on Jul 9: ~8% of runs delayed by more than 5 minutes, ~2% never started (figures via status page, secondary source).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19</strong> is in Beta 1, GA in September. Addendum: CloudNativePG RCE <strong>CVE-2026-44477</strong> (9.4) — not a new incident, but the May patch is worth catching up on.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">EU</span> <strong>Bambu vs. OrcaSlicer fork</strong>: AGPLv3 dispute from May — Rossmann offered $10,000 for the defense, Prusa criticized publicly. No confirmed new development this week.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Duas semanas seguidas com a cadeia de suprimentos do npm sangrando — e o golpe mais recente escancara uma verdade incômoda. Menos de 48 horas depois de encerrado o incidente do jscrambler (linha aberta no brief de 12/07), o gerador do AsyncAPI foi sequestrado em 14/07: não por um script de instalação, mas por um pipeline quebrado do GitHub Actions e um token de bot roubado. Ou seja: o novo bloqueio de scripts do npm na v12 não teria impedido isso. Some-se a isso a SAP com um buraco 9,9, o Langflow como primeira plataforma de agentes de IA no catálogo de exploração ativa da CISA e uma instabilidade de dez horas no Actions. Sem alarme — só o enquadramento de onde a linha de defesa realmente está agora.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI sequestrado</strong>: um \"pwn request\" no GitHub Actions roubou o PAT do <code>asyncapi-bot</code>, usado para publicar 4 pacotes maliciosos <code>@asyncapi</code> (~3 milhões de downloads/semana). Segundo ataque à npm em uma semana.</li>\n      <li><span class=\"chip\">Sec</span> <strong>A pegadinha</strong>: o bloqueio de scripts de instalação do npm (v12, brief de 12/07) não teria parado isso — o ataque ocorreu do lado da publicação, via credenciais de CI roubadas, não pelo <code>postinstall</code>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>SAP Patch Day de julho</strong> (14/07): 16 notas de segurança, buraco no NetWeaver ABAP <strong>CVE-2026-44747</strong> com CVSS 9,9; além de Approuter e Commerce Cloud com 9,1 cada.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Langflow no KEV</strong>: <strong>CVE-2026-55255</strong> — primeira plataforma de agentes de IA no catálogo da CISA. Mais dois RCEs em page builders do Joomla, com CVSS 10,0 cada.</li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong> ficou instável por cerca de dez horas em 09/07: ~8% das execuções com atraso &gt;5 min, ~2% sequer iniciaram (números via status page, fonte secundária).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19</strong> está na Beta 1, com GA prevista para setembro. Adendo: RCE no CloudNativePG <strong>CVE-2026-44477</strong> (9,4) — não é incidente novo, mas o patch de maio ainda precisa ser aplicado por quem ficou para trás.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">EU</span> <strong>Bambu vs. fork OrcaSlicer</strong>: disputa AGPLv3 de maio — Rossmann ofereceu US$ 10.000 para a defesa, Prusa criticou publicamente. Sem novidade confirmada nesta semana.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Van dos semanas seguidas en que la cadena de suministro de npm sangra — y el golpe más reciente destapa una verdad incómoda. Menos de 48 horas después de que se cerrara el incidente de jscrambler (hilo en el brief del 12/07), el generador de AsyncAPI fue secuestrado el 14/07: no mediante un script de instalación, sino a través de un pipeline roto de GitHub Actions y un token de bot robado. Es decir: el nuevo bloqueo de scripts de npm en la v12 no habría evitado esto. A eso se suma SAP con un agujero de 9.9, Langflow como la primera plataforma de agentes de IA en el catálogo de explotación activa de CISA, y una interrupción de diez horas en Actions. Sin alarma — solo el contexto de dónde está realmente la línea de defensa ahora mismo.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI secuestrado</strong>: un \"pwn request\" en GitHub Actions robó el PAT del <code>asyncapi-bot</code>, con el que se publicaron 4 paquetes maliciosos <code>@asyncapi</code> (~3 millones de descargas/semana). Segundo golpe a npm en una semana.</li>\n      <li><span class=\"chip\">Sec</span> <strong>El detalle</strong>: el bloqueo de scripts de instalación de npm (v12, brief del 12/07) no habría detenido esto — el ataque ocurrió del lado de la publicación, vía credenciales de CI robadas, no mediante <code>postinstall</code>.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">DE</span> <strong>SAP Patch Day de julio</strong> (14/07): 16 notas de seguridad, agujero en NetWeaver ABAP <strong>CVE-2026-44747</strong> con CVSS 9.9; además Approuter y Commerce Cloud con 9.1 cada uno.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Langflow en el KEV</strong>: <strong>CVE-2026-55255</strong> — primera plataforma de agentes de IA en el catálogo de CISA. Más dos RCE en page builders de Joomla con CVSS 10.0 cada uno.</li>\n      <li><span class=\"chip\">Infra</span> <strong>GitHub Actions</strong> estuvo caído cerca de diez horas el 09/07: ~8% de las ejecuciones con más de 5 min de retraso, ~2% que ni siquiera arrancaron (cifras vía status page, fuente secundaria).</li>\n      <li><span class=\"chip good\">Release</span> <strong>PostgreSQL 19</strong> va en Beta 1, con GA prevista para septiembre. Adenda: RCE en CloudNativePG <strong>CVE-2026-44477</strong> (9.4) — no es un incidente nuevo, pero conviene ponerse al día con el parche de mayo.</li>\n      <li><span class=\"chip\">OSS</span> <span class=\"chip\">EU</span> <strong>Bambu vs. el fork OrcaSlicer</strong>: la disputa AGPLv3 de mayo — Rossmann ofreció 10,000 dólares para la defensa, Prusa criticó públicamente. Sin novedad confirmada esta semana.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Heute ist der Tag, an dem Continues gehostete Cloud-Daten endgültig gelöscht werden — ein handfester, datierter Tool-Balance-Moment. Dahinter läuft die eigentliche Woche: GPT-5.6 ist seit dem 09.07. allgemein verfügbar, Meta Muse Spark 1.1 ging am selben Tag in öffentliche Vorschau (API, vorerst nur US) — doch auf den reinen Coding-Benchmarks stößt keiner der beiden Anthropics neuesten Claude-Tier (Fable 5) vom Thron. Und sowohl Claude Code als auch GitHub Copilot haben in derselben Woche Browser-Werkzeuge in die IDE geschoben.</p>\n    <ul>\n      <li><span class=\"chip hot\">Tool</span> <strong>Continue.dev</strong>: von Cursor übernommen, gehostete Cloud-Daten (Chatverlauf, Configs, Team-Settings) werden <strong>nach heute, 15.07.</strong>, gelöscht — wer die Plattform nutzte, exportiert jetzt.</li>\n      <li><span class=\"chip\">OpenAI</span> <strong>GPT-5.6</strong> (Sol/Terra/Luna) seit 09.07. GA; führt den Artificial-Analysis-Coding-Index (80 Pkt), veröffentlicht aber <em>keinen</em> SWE-Bench-Verified-Wert.</li>\n      <li><span class=\"chip\">Bench</span> Auf <strong>SWE-Bench Pro</strong> schlägt Claude Fable 5 (~80 %) GPT-5.6 Sol (64,6 %) — worauf OpenAI das Benchmark selbst als „~30 % kaputt\" abtat.</li>\n      <li><span class=\"chip good\">Claude</span> <strong>Claude Code</strong> hat jetzt einen eingebauten Sandbox-Browser (Cmd/Ctrl+Shift+B); CLI ist bei v2.1.210 (14.07.).</li>\n      <li><span class=\"chip\">Tool</span> <strong>Meta Muse Spark 1.1</strong> (1M Kontext, MCP+Skills) — öffentliche Vorschau (API, vorerst nur US); führt bei Tool-Use (MCP Atlas 88,1), verliert aber jeden reinen Coding-Bench gegen Opus 4.8 / GPT-5.5.</li>\n      <li><span class=\"chip\">Tool</span> <strong>GitHub Copilot</strong>: agentische Browser-Tools GA (01.07.), <code>/security-review</code> in Preview (14.07.), JetBrains-BYOK erweitert.</li>\n      <li><span class=\"chip\">OSS</span> <strong>DeepSeek V4</strong> GA „Mitte Juli\" angekündigt (kein exaktes Kalenderdatum bestätigt) — mit neuem Peak/Off-Peak-Pricing.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>Cursor 3.11</strong>: Side-Chats (<code>/side</code>, <code>/btw</code>) und Agent-Transkript-Suche.</li>\n    </ul></div>",
