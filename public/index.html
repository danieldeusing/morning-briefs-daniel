<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--cat-accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--cat-accent, var(--muted-ink));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted-ink);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases);    --cat-accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --cat-accent: var(--c-football);       --cat-accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --cat-accent: var(--c-family);         --cat-accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --cat-accent: var(--c-jobs);           --cat-accent-text: var(--c-jobs-text); }

  .tldr-card .tldr-read { color: var(--cat-accent-text); }

  .loading {

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }

  /* Sidebar rows scope their own --cat-accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }
  .cat[data-cat="software"]       { --cat-accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --cat-accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --cat-accent: var(--c-football); }
  .cat[data-cat="family"]         { --cat-accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --cat-accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --cat-accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --cat-accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --cat-accent: var(--c-stocks-crypto); }

  /* Home button — the "Übersicht" control at the top of the nav dropdown
     panel. Black accent bar (the dashboard's "house" colour) + favicon-style
     M brand mark + label, styled like a terminal .dropdown-item row. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    margin: 0;
    border-radius: 0;

    min-height: 2.1rem;
  }
  .home-btn:hover { background: var(--muted); color: var(--primary); }
  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */
  .home-btn .brand-mark {
    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible {
    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }
    .header-brand .brand-word { font-size: 0.92rem; }
    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;
    }
    /* The header chevron toggle is meaningless on mobile (drawer uses the FAB). */
    .rail-toggle--header { display: none; }
    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

<body>

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">
  <div class="header-left">
    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">
      <span class="glow brand-word">Daniels Morning Briefs</span>
      <span class="cursor-block" aria-hidden="true"></span>
    </a>
  </div>

  <div class="header-right">
    <button class="rail-toggle rail-toggle--header" id="rail-toggle" type="button"
            aria-controls="nav-rail" aria-expanded="true" aria-label="Navigation ein-/ausblenden"
            title="Navigation ein-/ausblenden">
      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">
  <main class="main">
    <div class="loading" id="loading">lädt…</div>

    </div>

    <iframe class="iframe-host" id="frame" style="display:none;" title="Newsletter"></iframe>
  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>
        <!-- Full favicon design inline: dark frame + cream page + red
             double-rule + serif M. Identical SVG to favicon.svg so the
             browser tab and the home control read as the same "house" mark. -->
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <rect width="64" height="64" rx="9" fill="#221a13"/>
          <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>

        </svg>
        <span class="nav-label-text">Übersicht</span>
      </div>
      <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<!-- Mobile: floating button re-opens the nav-rail drawer (≤720px it overlays). -->
<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

<!-- Fixed footer status bar: status path (left), relocated controls + anim
     toggle (right). Controls keep their original ids so the existing handlers
     (theme cycle, language switch) work unchanged. -->
<footer class="status-bar">
  <div class="status-inner">
    <span class="status-path" id="status-path">

      <div class="lang-picker">
        <button class="status-btn lang-trigger" id="lang-trigger" type="button"

        <div class="lang-menu dropdown-panel" id="lang-menu" role="listbox" hidden>

          <button class="dropdown-item lang-option" type="button" role="option" data-lang="es" aria-selected="false">
            <span class="dd-flag dd-flag-es" aria-hidden="true"></span><span>Español</span>

        </div>
      </div>
      <details class="dropdown theme-dropdown" id="theme-dropdown">

          <span class="dd-dot" aria-hidden="true"></span>

          <li><button type="button" class="dropdown-item" data-theme-value="mono">mono</button></li>

        </ul>
      </details>
      <button class="status-btn anim-toggle" id="anim-toggle" type="button"

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die USA verzollen ab Mittwoch brasilianische Importe mit 25 % — und die Ausnahmeliste erklärt, warum der Real darauf bisher nur mit einem Achselzucken reagiert hat: Rindfleisch, Orangensaft, Energie und Luftfahrtteile, also genau die Zeilen, die Devisen ins Land bringen, sind ausgenommen. Gleichzeitig ist Brent in einer Woche um über 14 % gestiegen, weil der US-Iran-Konflikt eskaliert. Für dich heißt das: zwei gegenläufige Kräfte auf denselben Kurs, und ein Freitags-Fix von 5,8499, der bis Montagmorgen eingefroren ist.</p>\n    <ul>\n      <li><span class=\"chip hot\">ZOLL</span> <strong>25 % Section 301 ab 22.07.</strong>: USTR-Verfügung vom 15.07., in Kraft Mittwoch. Ausgenommen u. a. Rindfleisch, Orangensaft, Flugzeuge und Teile, Energieprodukte.<sup>[8]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8499</strong> (EZB-Fix Fr 17.07.). Gegenprobe über USD/BRL × EUR/USD: 0,0 % Abweichung — die Anker sind sauber.<sup>[1][2]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1158</strong>, +0,59 % gegen Donnerstag. Der Real gab auf die Zoll-Nachricht nur rund ein halbes Prozent ab.<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 88,10 $</strong> (+4,59 % am Freitag, über 14 % auf Wochensicht) nach dem sechsten CENTCOM-Angriffsnacht auf Iran und einem Treffer auf ein kuwaitisches Entsalzungswerk.<sup>[6][7]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −1,24 % auf 173.825</strong> (Schluss Do 16.07.), Vale −2,1 %, Petrobras −1,7 % — Aktien nahmen den Zoll ernster als der Devisenmarkt.<sup>[5]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Brasília bereitet Vergeltung vor</strong>: Reziprozitätsgesetz plus WTO-Klage, erwogen werden Patent- und Audiovisual-Maßnahmen statt Gegenzöllen.<sup>[9]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>IPCA Juni +0,16 % m/m, 4,56 % auf 12 Monate</strong> — runter von 4,72 % im Mai. Der Disinflations-Pfad hält.<sup>[13]</sup></li>\n      <li><span class=\"chip\">ZINS</span> <strong>Selic 14,25 %</strong> gegen Fed 3,50–3,75 % — rund 10,6 Punkte Zinsvorsprung, der Grund, warum der Real Schläge einsteckt und stehen bleibt.<sup>[10][11]</sup></li>\n      <li><span class=\"chip\">TERMIN</span> <strong>EZB Do 23.07.</strong>, FOMC 28.–29.07. (Halten klar eingepreist), Copom 04.–05.08.<sup>[14][10]</sup></li>\n      <li><span class=\"chip\">KONSENS</span> <strong>Focus-Umfrage 13.07.</strong>: IPCA 2026 auf 5,16 % gesenkt, Selic-Jahresende 14 %, USD/BRL-Jahresende ~5,20 — das entspricht EUR/BRL ≈ 5,95.<sup>[12]</sup></li>\n      <li><span class=\"chip\">HEUTE</span> <strong>Nicht tauschen</strong>: Sonntag, kein Fix, keine Liquidität. Jeder Wochenend-Kurs ist ein Aufschlag auf den Freitags-Anker.</li>\n    </ul></div>",

g> — runter von 4,72 % im Mai. Der Disinflations-Pfad hält.<sup>[13]</sup></li>\n      <li><span class=\"chip\">ZINS</span> <strong>Selic 14,25 %</strong> gegen Fed 3,50–3,75 % — rund 10,6 Punkte Zinsvorsprung, der Grund, warum der Real Schläge einsteckt und stehen bleibt.<sup>[10][11]</sup></li>\n      <li><span class=\"chip\">TERMIN</span> <strong>EZB Do 23.07.</strong>, FOMC 28.–29.07. (Halten klar eingepreist), Copom 04.–05.08.<sup>[14][10]</sup></li>\n      <li><span class=\"chip\">KONSENS</span> <strong>Focus-Umfrage 13.07.</strong>: IPCA 2026 auf 5,16 % gesenkt, Selic-Jahresende 14 %, USD/BRL-Jahresende ~5,20 — das entspricht EUR/BRL ≈ 5,95.<sup>[12]</sup></li>\n      <li><span class=\"chip\">HEUTE</span> <strong>Nicht tauschen</strong>: Sonntag, kein Fix, keine Liquidität. Jeder Wochenend-Kurs ist ein Aufschlag auf den Freitags-Anker.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Starting Wednesday, the US will slap a 25% tariff on Brazilian imports — and the exemption list explains why the real has so far greeted it with little more than a shrug: beef, orange juice, energy and aircraft parts, exactly the lines that bring foreign currency into the country, are excluded. At the same time, Brent has jumped more than 14% in a week as the US-Iran conflict escalates. For you, that means two opposing forces acting on the same rate, and a Friday fix of 5.8499 that's frozen until Monday morning.</p>\n    <ul>\n      <li><span class=\"chip hot\">TARIFF</span> <strong>25% Section 301 as of Jul 22</strong>: USTR order dated Jul 15, effective Wednesday. Exempted are, among others, beef, orange juice, aircraft and parts, energy products.<sup>[8]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5.8499</strong> (ECB fix Fri, Jul 17). Cross-check via USD/BRL × EUR/USD: 0.0% deviation — the anchors are clean.<sup>[1][2]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5.1158</strong>, +0.59% versus Thursday. The real gave up only about half a percent on the tariff news.<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $88.10</strong> (+4.59% on Friday, over 14% for the week) after CENTCOM's sixth straight night of strikes on Iran and a hit on a Kuwaiti desalination plant.<sup>[6][7]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −1.24% to 173,825</strong> (close Thu, Jul 16), Vale −2.1%, Petrobras −1.7% — equities took the tariff more seriously than the FX market.<sup>[5]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Brasília prepares retaliation</strong>: reciprocity law plus a WTO complaint, with patent and audiovisual measures being considered instead of counter-tariffs.<sup>[9]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>IPCA June +0.16% m/m, 4.56% over 12 months</strong> — down from 4.72% in May. The disinflation path holds.<sup>[13]</sup></li>\n      <li><span class=\"chip\">RATES</span> <strong>Selic 14.25%</strong> versus Fed 3.50–3.75% — about 10.6 points of rate advantage, the reason the real absorbs blows and holds its ground.<sup>[10][11]</sup></li>\n      <li><span class=\"chip\">CALENDAR</span> <strong>ECB Thu, Jul 23</strong>, FOMC Jul 28–29 (hold clearly priced in), Copom Aug 4–5<sup>[14][10]</sup></li>\n      <li><span class=\"chip\">CONSENSUS</span> <strong>Focus survey Jul 13</strong>: 2026 IPCA lowered to 5.16%, year-end Selic 14%, year-end USD/BRL ~5.20 — equivalent to EUR/BRL ≈ 5.95.<sup>[12]</sup></li>\n      <li><span class=\"chip\">TODAY</span> <strong>Don't exchange</strong>: Sunday, no fix, no liquidity. Any weekend rate is a markup on the Friday anchor.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A partir de quarta-feira, os EUA vão taxar as importações brasileiras com uma tarifa de 25% — e a lista de exceções explica por que o real reagiu a isso, até agora, apenas com um dar de ombros: carne bovina, suco de laranja, energia e peças aeronáuticas, ou seja, exatamente as linhas que trazem divisas para o país, estão isentas. Ao mesmo tempo, o Brent subiu mais de 14% em uma semana, por causa da escalada do conflito entre EUA e Irã. Para você, isso significa: duas forças opostas atuando sobre a mesma cotação, e um fixing de sexta-feira de 5,8499, que fica congelado até a manhã de segunda-feira.</p>\n    <ul>\n      <li><span class=\"chip hot\">TARIFA</span> <strong>25% da Seção 301 a partir de 22/07</strong>: determinação do USTR de 15/07, em vigor na quarta-feira. Isentos, entre outros, carne bovina, suco de laranja, aviões e peças, produtos energéticos.<sup>[8]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8499</strong> (fixing do BCE, sex. 17/07). Verificação cruzada via USD/BRL × EUR/USD: 0,0% de desvio — as âncoras estão consistentes.<sup>[1][2]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1158</strong>, +0,59% em relação a quinta-feira. O real cedeu apenas cerca de meio ponto percentual diante da notícia da tarifa.<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 88,10 $</strong> (+4,59% na sexta-feira, mais de 14% na semana) depois da sexta noite seguida de ataques do CENTCOM ao Irã e de um ataque a uma usina de dessalinização no Kuwait.<sup>[6][7]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −1,24% para 173.825</strong> (fechamento de qui. 16/07), Vale −2,1%, Petrobras −1,7% — as ações levaram a tarifa mais a sério do que o mercado cambial.<sup>[5]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Brasília prepara retaliação</strong>: Lei da Reciprocidade mais uma ação na OMC; cogitam-se medidas sobre patentes e audiovisual em vez de tarifas espelhadas.<sup>[9]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>IPCA de junho +0,16% m/m, 4,56% em 12 meses</strong> — abaixo dos 4,72% de maio. A trajetória de desinflação se mantém.<sup>[13]</sup></li>\n      <li><span class=\"chip\">JUROS</span> <strong>Selic 14,25%</strong> contra o Fed em 3,50–3,75% — cerca de 10,6 pontos de vantagem de juros, a razão pela qual o real apanha e continua de pé.<sup>[10][11]</sup></li>\n      <li><span class=\"chip\">AGENDA</span> <strong>BCE qui. 23/07</strong>, FOMC 28–29/07 (manutenção claramente precificada), Copom 04–05/08<sup>[14][10]</sup></li>\n      <li><span class=\"chip\">CONSENSO</span> <strong>Pesquisa Focus de 13/07</strong>: projeção do IPCA para 2026 reduzida para 5,16%, Selic de fim de ano em 14%, USD/BRL de fim de ano ~5,20 — o que equivale a EUR/BRL ≈ 5,95.<sup>[12]</sup></li>\n      <li><span class=\"chip\">HOJE</span> <strong>Não troque</strong>: domingo, sem fixing, sem liquidez. Qualquer cotação de fim de semana é uma sobretaxa em cima da âncora de sexta-feira.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Estados Unidos aplicará desde el miércoles un arancel del 25 % a las importaciones brasileñas — y la lista de excepciones explica por qué el real apenas ha reaccionado con un encogimiento de hombros: carne de res, jugo de naranja, energía y piezas aeronáuticas, es decir, justo los renglones que traen divisas al país, quedan exentos. Al mismo tiempo, el Brent subió más del 14 % en una semana porque el conflicto entre EE. UU. e Irán se intensifica. Para ti eso significa: dos fuerzas contrarias sobre el mismo tipo de cambio, y un fix del viernes de 5,8499 que queda congelado hasta el lunes por la mañana.</p>\n    <ul>\n      <li><span class=\"chip hot\">ARANCEL</span> <strong>25 % Sección 301 desde el 22/07</strong>: orden del USTR del 15/07, vigente el miércoles. Exentos, entre otros, carne de res, jugo de naranja, aviones y piezas, productos energéticos.<sup>[8]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>EUR/BRL 5,8499</strong> (fix del BCE, vie. 17/07). Verificación cruzada vía USD/BRL × EUR/USD: 0,0 % de desviación — las referencias son consistentes.<sup>[1][2]</sup></li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL 5,1158</strong>, +0,59 % frente al jueves. El real solo cedió alrededor de medio punto porcentual ante la noticia arancelaria.<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 88,10 $</strong> (+4,59 % el viernes, más del 14 % en la semana) tras la sexta noche de ataques de CENTCOM contra Irán y un impacto en una planta desalinizadora kuwaití.<sup>[6][7]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Ibovespa −1,24 % a 173.825</strong> (cierre jue. 16/07), Vale −2,1 %, Petrobras −1,7 % — las acciones se tomaron el arancel más en serio que el mercado cambiario.<sup>[5]</sup></li>\n      <li><span class=\"chip\">BR</span> <strong>Brasilia prepara represalias</strong>: ley de reciprocidad más demanda ante la OMC; se contemplan medidas sobre patentes y contenido audiovisual en lugar de aranceles espejo.<sup>[9]</sup></li>\n      <li><span class=\"chip good\">BR</span> <strong>IPCA de junio +0,16 % m/m, 4,56 % en 12 meses</strong> — bajó desde 4,72 % en mayo. La trayectoria desinflacionaria se mantiene.<sup>[13]</sup></li>\n      <li><span class=\"chip\">TASAS</span> <strong>Selic 14,25 %</strong> frente a la Fed 3,50–3,75 % — cerca de 10,6 puntos de diferencial, la razón por la que el real encaja golpes y se mantiene firme.<sup>[10][11]</sup></li>\n      <li><span class=\"chip\">AGENDA</span> <strong>BCE jue. 23/07</strong>, FOMC 28–29/07 (mantener claramente descontado), Copom 04–05/08<sup>[14][10]</sup></li>\n      <li><span class=\"chip\">CONSENSO</span> <strong>Encuesta Focus del 13/07</strong>: IPCA 2026 recortado a 5,16 %, Selic a fin de año en 14 %, USD/BRL a fin de año ~5,20 — equivalente a un EUR/BRL ≈ 5,95.<sup>[12]</sup></li>\n      <li><span class=\"chip\">HOY</span> <strong>No cambiar</strong>: domingo, sin fix, sin liquidez. Cualquier tipo de cambio de fin de semana es un recargo sobre la referencia del viernes.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Es ist Sonntag, und dieser Brief trägt <strong>zwei verschiedene Uhrzeiten</strong>. Alles, was mit Aktien, Öl und Gold zu tun hat, ist seit <strong>Freitag, 17.07., 22:00 Uhr MESZ</strong> eingefroren — das war der Schlussglocke-Kurs. Krypto dagegen handelt seit Freitagabend ununterbrochen weiter, und die Bitcoin-Zahl unten ist von heute Nacht. Das ist keine Formalie: Zwischen dem letzten Aktienkurs und diesem Brief liegen <strong>über 30 Stunden Krieg</strong>, die kein Aktienkurs verarbeiten konnte. Öl hat sie am Freitag noch mitbekommen und sprang <strong>4,6 %</strong>. Krypto hatte das ganze Wochenende Zeit, darauf zu reagieren — und ging <em>hoch</em>. Diese Diskrepanz ist die interessanteste Information des Wochenendes, und sie wird am Montagmorgen aufgelöst.</p>\n    <ul>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 88,10 $ (+4,59 %), WTI 82,44–82,49 $ (+4,4 bis +4,5 %)</strong> — Stand: Freitagsschluss 17.07. Auslöser: die sechste Nacht US-Angriffe auf iranische Ziele in Folge. Auf Wochensicht rund <strong>+12 bis +16 %</strong>.</li>\n      <li><span class=\"chip hot\">HORMUZ</span> <strong>Bestätigter Öl-Durchfluss −62 % auf 4,1 Mio. Barrel/Tag</strong> durch die Straße von Hormuz. Das ist die Zahl, die den Ölpreis erklärt — nicht die Schlagzeile.</li>\n      <li><span class=\"chip hot\">AKTIEN</span> <strong>S&amp;P 500 −1,01 % auf 7.457,69</strong> — Stand: Freitagsschluss. Big Tech überwiegend im Minus: META −2,79 %, TSLA −2,61 %, NVDA −2,21 %, GOOGL −2,17 %.</li>\n      <li><span class=\"chip\">AUSREISSER</span> <strong>Apple +0,14 % auf 333,74 $</strong> — der einzige grüne Mag-7-Wert am Freitag. Die Reihenfolge des Tages liest sich fast exakt als Rangliste der KI-Investitions-Abhängigkeit.</li>\n      <li><span class=\"chip good\">KRYPTO LIVE</span> <strong>BTC 64.706 $ (+1,23 % / 24 h), ETH 1.867,50 $ (+1,32 %)</strong> — live per <strong>heute 19.07., 05:08 UTC</strong> (02:08 BRT), zwei Quellen stimmen auf 0,03 % überein. Krypto ist grün, während das Aktien-Tape rot eingefroren ist.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>4.016,95 $/Unze (+1,03 %)</strong> — Stand: Freitagsschluss. Bemerkenswert schwach für einen Kriegstag: Öl-getriebene Inflation nimmt Gold genau die Zinssenkung weg, auf die es wartet.</li>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>Mi 22.07.: Alphabet und Tesla berichten</strong> (nach US-Börsenschluss). Damit beginnt eine Neun-Tage-Strecke, in der praktisch die gesamte Big-Tech-Bewertung neu verhandelt wird.</li>\n      <li><span class=\"chip hot\">TERMIN</span> <strong>Mi 29.07.: FOMC-Entscheid</strong> (20:00 MESZ / 15:00 BRT) — am selben Tag berichten Microsoft und Meta. Leitzins steht seit dem 17.06. bei <strong>3,50–3,75 %</strong>.</li>\n      <li><span class=\"chip\">SEKTOREN</span> <strong>AI-Token halten, Memecoins bröckeln</strong>: TAO +1,88 % auf 197,06 $ — aber BONK −7,65 %, FLOKI −2,82 %, GALA −2,80 %. Das gleiche Muster wie am Freitag am Aktienmarkt, eine Etage tiefer.</li>\n      <li><span class=\"chip\">LÜCKE</span> <strong>Keine aktuellen BTC-ETF-Flüsse.</strong> Die letzte unabhängig belegbare Zahl ist die Woche bis 10.07. (+197 Mio. $) — <strong>neun Tage alt</strong>. Dieser Brief führt sie ausdrücklich als historisch, nicht als aktuell.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">It's Sunday, and this brief carries <strong>two different clocks</strong>. Everything related to stocks, oil, and gold has been frozen since <strong>Friday, Jul 17, 22:00 CEST</strong> — that was the closing-bell price. Crypto, by contrast, has kept trading uninterrupted since Friday evening, and the bitcoin figure below is from overnight tonight. That's not a formality: between the last stock price and this brief lie <strong>over 30 hours of war</strong> that no stock price could process. Oil still caught it on Friday and jumped <strong>4.59%</strong>. Crypto had the entire weekend to react to it — and went <em>up</em>. This discrepancy is the most interesting piece of information from the weekend, and it will resolve on Monday morning.</p>\n    <ul>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $88.10 (+4.59%), WTI $82.44–82.49 (+4.4 to +4.5%)</strong> — as of: Friday's close Jul 17. Trigger: the sixth straight night of US strikes on Iranian targets. On the week, roughly <strong>+12 to +16%</strong>.</li>\n      <li><span class=\"chip hot\">HORMUZ</span> <strong>Confirmed oil throughput down 62% to 4.1 million barrels/day</strong> through the Strait of Hormuz. That's the number that explains the oil price — not the headline.</li>\n      <li><span class=\"chip hot\">STOCKS</span> <strong>S&amp;P 500 −1.01% to 7,457.69</strong> — as of: Friday's close. Big Tech mostly in the red: META −2.79%, TSLA −2.61%, NVDA −2.21%, GOOGL −2.17%.</li>\n      <li><span class=\"chip\">OUTLIER</span> <strong>Apple +0.14% to $333.74</strong> — the only Mag-7 stock in the green on Friday. The day's order reads almost exactly like a ranking of AI-investment dependence.</li>\n      <li><span class=\"chip good\">CRYPTO LIVE</span> <strong>BTC $64,706 (+1.23% / 24h), ETH $1,867.50 (+1.32%)</strong> — live as of <strong>today, Jul 19, 05:08 UTC</strong> (02:08 BRT), two sources agree within 0.03%. Crypto is green while the equity tape sits frozen in red.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>$4,016.95/oz (+1.03%)</strong> — as of: Friday's close. Notably weak for a war day: oil-driven inflation takes away from gold exactly the rate cut it's waiting for.</li>\n      <li><span class=\"chip hot\">DATE</span> <strong>Wed Jul 22: Alphabet and Tesla report</strong> (after the US close). That kicks off a nine-day stretch in which practically all of Big Tech's valuation gets renegotiated.</li>\n      <li><span class=\"chip hot\">DATE</span> <strong>Wed Jul 29: FOMC decision</strong> (20:00 CEST / 15:00 BRT) — Microsoft and Meta report the same day. The policy rate has stood at <strong>3.50–3.75%</strong> since Jun 17.</li>\n      <li><span class=\"chip\">SECTORS</span> <strong>AI tokens hold, memecoins crumble</strong>: TAO +1.88% to $197.06 — but BONK −7.65%, FLOKI −2.82%, GALA −2.80%. Same pattern as Friday's equity market, one level down.</li>\n      <li><span class=\"chip\">GAP</span> <strong>No current BTC ETF flows.</strong> The last independently verifiable figure is the week through Jul 10 (+$197 million) — <strong>nine days old</strong>. This brief carries it explicitly as historical, not current.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">É domingo, e esta edição carrega <strong>dois horários diferentes</strong>. Tudo relacionado a ações, petróleo e ouro está congelado desde <strong>sexta-feira, 17/07, 22h00 (horário de Berlim)</strong> — foi o fechamento do pregão. Cripto, por outro lado, negocia ininterruptamente desde a noite de sexta, e o número do bitcoin abaixo é desta madrugada. Isso não é um detalhe formal: entre o último preço das ações e esta edição há <strong>mais de 30 horas de guerra</strong> que nenhum preço de ação conseguiu processar. O petróleo ainda captou parte disso na sexta e saltou <strong>4,6%</strong>. As criptomoedas tiveram o fim de semana inteiro para reagir — e <em>subiram</em>. Essa discrepância é a informação mais interessante do fim de semana, e ela será resolvida na manhã de segunda-feira.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 88,10 $ (+4,59%), WTI 82,44–82,49 $ (+4,4 a +4,5%)</strong> — dado de: fechamento de sexta-feira 17/07. Gatilho: a sexta noite consecutiva de ataques dos EUA a alvos iranianos. Na semana, cerca de <strong>+12 a +16%</strong>.</li>\n      <li><span class=\"chip hot\">HORMUZ</span> <strong>Fluxo confirmado de petróleo −62%, para 4,1 milhões de barris/dia</strong> pelo Estreito de Ormuz. Esse é o número que explica o preço do petróleo — não a manchete.</li>\n      <li><span class=\"chip hot\">AÇÕES</span> <strong>S&amp;P 500 −1,01%, em 7.457,69</strong> — dado de: fechamento de sexta. Big techs majoritariamente no negativo: META −2,79%, TSLA −2,61%, NVDA −2,21%, GOOGL −2,17%.</li>\n      <li><span class=\"chip\">EXCEÇÃO</span> <strong>Apple +0,14%, em 333,74 $</strong> — a única das Mag-7 no positivo na sexta. A ordem do dia se lê quase exatamente como um ranking de dependência de investimento em IA.</li>\n      <li><span class=\"chip good\">CRIPTO AO VIVO</span> <strong>BTC 64.706 $ (+1,23% / 24h), ETH 1.867,50 $ (+1,32%)</strong> — ao vivo, hoje, 19/07, 05h08 UTC (02h08 BRT), duas fontes convergindo com 0,03% de diferença. Cripto está no verde enquanto o painel de ações está congelado no vermelho.</li>\n      <li><span class=\"chip\">OURO</span> <strong>4.016,95 $/onça (+1,03%)</strong> — dado de: fechamento de sexta. Notavelmente fraco para um dia de guerra: a inflação puxada pelo petróleo tira do ouro exatamente o corte de juros que ele espera.</li>\n      <li><span class=\"chip hot\">AGENDA</span> <strong>Qua 22/07: Alphabet e Tesla divulgam resultados</strong> (após o fechamento nos EUA). Começa aí um trecho de nove dias em que praticamente toda a avaliação das big techs é renegociada.</li>\n      <li><span class=\"chip hot\">AGENDA</span> <strong>Qua 29/07: decisão do FOMC</strong> (20h00 horário de Berlim / 15h00 BRT) — no mesmo dia divulgam Microsoft e Meta. A taxa básica está em <strong>3,50–3,75%</strong> desde 17/06.</li>\n      <li><span class=\"chip\">SETORES</span> <strong>Tokens de IA seguram, memecoins recuam</strong>: TAO +1,88%, em 197,06 $ — mas BONK −7,65%, FLOKI −2,82%, GALA −2,80%. O mesmo padrão de sexta no mercado de ações, um andar abaixo.</li>\n      <li><span class=\"chip\">LACUNA</span> <strong>Sem fluxos atuais dos ETFs de BTC.</strong> O último número comprovável de forma independente é da semana até 10/07 (+197 milhões $) — <strong>com nove dias de defasagem</strong>. Esta edição o trata explicitamente como histórico, não como atual.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Es domingo, y este boletín tiene <strong>dos horarios distintos</strong>. Todo lo relacionado con acciones, petróleo y oro está congelado desde el <strong>viernes 17/07, 22:00 CEST</strong> — ese fue el precio de cierre de campana. Las criptomonedas, en cambio, siguen operando sin interrupción desde el viernes por la noche, y la cifra de Bitcoin de abajo es de esta madrugada. Esto no es un formalismo: entre el último precio bursátil y este boletín hay <strong>más de 30 horas de guerra</strong> que ningún precio accionario pudo procesar. El petróleo alcanzó a registrarlas el viernes y saltó <strong>4,6 %</strong>. Las criptomonedas tuvieron todo el fin de semana para reaccionar — y <em>subieron</em>. Esta discrepancia es la información más interesante del fin de semana, y se resolverá el lunes por la mañana.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 88,10 $ (+4,59 %), WTI 82,44–82,49 $ (+4,4 a +4,5 %)</strong> — dato: cierre del viernes 17/07. Detonante: la sexta noche consecutiva de ataques de EU contra objetivos iraníes. En la semana, alrededor de <strong>+12 a +16 %</strong>.</li>\n      <li><span class=\"chip hot\">HORMUZ</span> <strong>Flujo confirmado de petróleo −62 % a 4,1 millones de barriles/día</strong> por el Estrecho de Ormuz. Esta es la cifra que explica el precio del petróleo — no el titular.</li>\n      <li><span class=\"chip hot\">ACCIONES</span> <strong>S&amp;P 500 −1,01 % a 7.457,69</strong> — dato: cierre del viernes. Big Tech mayoritariamente en rojo: META −2,79 %, TSLA −2,61 %, NVDA −2,21 %, GOOGL −2,17 %.</li>\n      <li><span class=\"chip\">EXCEPCIÓN</span> <strong>Apple +0,14 % a 333,74 $</strong> — el único valor de las Mag-7 en verde el viernes. El orden del día se lee casi exactamente como un ranking de dependencia de la inversión en IA.</li>\n      <li><span class=\"chip good\">CRIPTO EN VIVO</span> <strong>BTC 64.706 $ (+1,23 % / 24 h), ETH 1.867,50 $ (+1,32 %)</strong> — en vivo al <strong>19/07 de hoy, 05:08 UTC</strong> (02:08 hora de Brasilia), dos fuentes coinciden con 0,03 % de diferencia. Las criptomonedas están en verde mientras el tape accionario está congelado en rojo.</li>\n      <li><span class=\"chip\">ORO</span> <strong>4.016,95 $/onza (+1,03 %)</strong> — dato: cierre del viernes. Notablemente débil para un día de guerra: la inflación impulsada por el petróleo le quita al oro justo el recorte de tasas que estaba esperando.</li>\n      <li><span class=\"chip hot\">FECHA</span> <strong>Mié 22/07: reportan Alphabet y Tesla</strong> (después del cierre de EU). Con esto comienza un tramo de nueve días en el que se renegocia prácticamente toda la valuación de Big Tech.</li>\n      <li><span class=\"chip hot\">FECHA</span> <strong>Mié 29/07: decisión del FOMC</strong> (20:00 CEST / 15:00 hora de Brasilia) — el mismo día reportan Microsoft y Meta. La tasa de referencia está desde el 17/06 en <strong>3,50–3,75 %</strong>.</li>\n      <li><span class=\"chip\">SECTORES</span> <strong>Los tokens de IA se sostienen, las memecoins se desmoronan</strong>: TAO +1,88 % a 197,06 $ — pero BONK −7,65 %, FLOKI −2,82 %, GALA −2,80 %. El mismo patrón que el viernes en el mercado accionario, un piso más abajo.</li>\n      <li><span class=\"chip\">HUECO</span> <strong>Sin flujos actuales de ETF de BTC.</strong> La última cifra verificable de forma independiente es la semana hasta el 10/07 (+197 millones $) — <strong>nueve días de antigüedad</strong>. Este boletín la presenta explícitamente como histórica, no como actual.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Sonntag, kein frisches Advisory in den beobachteten Quellen — also die Bilanz einer Woche, die es in sich hatte. In elf Tagen wurden drei npm-Pakete gekapert: <strong>@injectivelabs/sdk-ts</strong> (08.07), <strong>jscrambler</strong> (11.07), <strong>@asyncapi/*</strong> (14.07). Einzeln liefen die hier schon durch. Zusammen ergeben sie ein Muster, das mir wichtiger erscheint als jeder Einzelfall: <strong>jeder benutzte einen anderen Ausführungs-Pfad</strong>. Und ausgerechnet am 08.07, dem Tag des ersten Einbruchs, hat npm v12 <code>allowScripts</code> standardmäßig abgeschaltet — eine Abwehr, die genau einen der drei Wege blockiert hätte. Kein Argument gegen die Änderung; eines dagegen, sie für erledigt zu halten. Dazu: warum der „Rekord-Patchday\" zu rund drei Vierteln aus Chromium besteht, ein SharePoint-Score, bei dem Microsoft <strong>5,3</strong> und die NVD <strong>9,8</strong> sagen, und die NIS-2-Registrierung in zwölf Tagen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Drei Einbrüche, drei Mechaniken</strong>: Injective (<strong>Laufzeit — Hook auf die Key-Ableitung</strong> <code>PrivateKey.fromMnemonic()</code>/<code>fromHex()</code>, feuert erst beim Laden einer Wallet; Keys per <code>X-Request-Id</code>-Header exfiltriert)<sup>[24]</sup>, jscrambler (erst <code>preinstall</code>-Hook, dann Umstieg auf Paket-Hauptcode), AsyncAPI (Import-Zeit, Payload über einen <strong>CI-Pwn-Request</strong> — GitHub Actions <code>pull_request_target</code>)<sup>[25]</sup>.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">Global</span> <strong>npm v12 ist seit 08.07 draußen</strong>: <code>allowScripts</code> standardmäßig aus, <code>--allow-git</code> und <code>--allow-remote</code> auf none. Blockiert Install-Skripte — nicht Code, der beim <code>import</code> läuft.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>Reaktionszeit ist die eigentliche Verteidigung</strong>: Injective nach ~49 Minuten gefixt, jscrambler nach 6 Minuten entdeckt, AsyncAPI nach 19 Minuten erstmals nachgeladen.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>SharePoint-Score, zwei Meinungen</strong>: <strong>CVE-2026-56164</strong> — Microsoft rechnet CVSS <strong>5,3</strong> (Medium), die NVD <strong>9,8</strong> (Critical). Gleicher Angriffsvektor, komplett andere Wirkungs-Annahme. Steht seit 14.07 im CISA-KEV.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Der Rekord ist zum Teil Buchhaltung</strong>: Von den <strong>621</strong> CVEs im Juli-Patchday entfallen laut ZDI rund <strong>480</strong> auf Chromium/Edge. Bleiben ~141 echte Microsoft-Bugs, davon <strong>63 Critical</strong>. Outlets melden 569, 570, 621 und 622 — alle rechnen anders.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Browser</span> <strong>Firefox 152.0.6</strong> (MFSA 2026-67, 14.07): zwei Critical-CVEs mit öffentlichem Exploit-Code, laut Mozilla keine bestätigte Ausnutzung. <strong>Chrome 150.0.7871.124/.125</strong> (16.07): 15 Fixes, zwei kritische Use-after-free in Ozone.</li>\n      <li><span class=\"chip hot\">Regulierung</span> <span class=\"chip\">DE</span> <strong>NIS-2: noch zwölf Tage</strong> — Nachfrist bis <strong>31.07.2026</strong>. Von ~29.500 erwarteten Einrichtungen waren Ende Mai erst ~18.500 registriert. Und juristisch ist das keine Fristverlängerung, sondern eine Duldung.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16.07) räumt bei den zwei großen Neuerungen auf: SQL/PGQ-Property-Graphs und <code>FOR PORTION OF</code>. GA ist für Sept./Okt. angepeilt.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Web</span> <strong>Angular 22.0.7</strong> (16.07) mit einem ReDoS-Fix in der Sourcemap-URL-Prüfung; <strong>Tailscale 1.98.9</strong> (14.07) schließt sechs Punkte, TS-2026-004 bis -009.</li>\n    </ul></div>",
