<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);

    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;

  .tldr-empty {
    font-family: var(--font-body);

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,

  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));

    line-height: 1.5;

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --cat-accent: var(--c-ai-dev);         --cat-accent-text: var(--c-ai-dev-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }

    width: 6px; height: 18px; border-radius: 0; flex: none;

  }
  .home-btn:focus-visible,

  }

     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }

    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;

    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,

  }

    header.app { padding: 0 0.6rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">

    <a class="header-brand" id="brand-home" href="#home" title="Übersicht">

      <span class="rail-toggle-glyph" aria-hidden="true">»</span>
    </button>
  </div>
</header>

<div class="app-shell">

  </main>

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">
    <div class="nav-rail-head">
      <span class="nav-rail-title">~/briefs</span>
    </div>
    <div class="nav-rail-body">
      <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
        <span class="cat-color"></span>

           nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

<button class="rail-fab" id="rail-fab" type="button" aria-controls="nav-rail"
        aria-label="Navigation öffnen" title="Navigation">☰</button>

        <span class="anim-box" aria-hidden="true">[x]</span>
        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

derung\" eingepreist. Depo 2,25 % nach der ersten Erhöhung seit fast drei Jahren (17.06.).</li>\n      <li><span class=\"chip\">USA</span> <strong>FOMC 28.–29.07.</strong>, Halten bei 3,50–3,75 % erwartet. Carry gegen die Selic (14,25 %) bleibt <strong>~10,5–10,75 pp</strong>.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent 84,68 $</strong> (Abgriff 17.07., 07:49 UTC, +0,53 %) — US-Iran-Eskalation. Öl stützt den Real (Export), belastet die Inflation.</li>\n      <li><span class=\"chip\">BR</span> <strong>Positionierung kühlt:</strong> CFTC-BRL-Netto-Longs 30,8K Kontrakte (07.07., von 44,7K). 5J-CDS ruhig bei <strong>122,92 bp</strong> (16.07.); EWZ 35,33 $ (−1,53 %).</li>\n      <li><span class=\"chip good\">FX</span> <strong>Kreuzkurs-Check sauber:</strong> 5,0857 × 1,1467 = 5,8318 — exakt der ECB-Fix, <strong>0,0 %</strong> Abweichung.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Starting <strong>Wednesday, 07/22</strong>, the US is imposing a <strong>25% tariff</strong> on Brazilian goods — and the market reaction is instructive, because it's <em>selective</em>. The Ibovespa lost <strong>1.24%</strong> on Thursday, the Real only 0.40%. EUR/BRL did rise to <strong>5.8318</strong> (+0.63%) — but <strong>0.53 percentage points of that came from the euro leg</strong>, only 0.09 from the Real. The tariff hit Brazilian <em>stocks</em>, not the <em>currency</em>; the reason is in the fine print (beef and coffee are exempt — precisely the forex earners). And the Real is on an uptrend anyway: EUR/BRL sits about 2% below the high from 07/03. For Daniel's exchange, that means: the window has narrowed over the past two weeks, and of all things, a 25% tariff didn't reopen it.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8318</strong> (ECB fix, Thu 07/16), +0.63% vs. Wed — but <strong>0.53 pp of that is euro leg</strong> (EUR/USD 1.1406 → 1.1467), only 0.09 pp Real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>25% US tariff (Section 301)</strong>: announced 07/15, <strong>effective Wed 07/22.</strong> Beef, coffee, and others exempt. Lula administration \"reviewing reciprocal measures.\"</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Ibovespa −1.24% to 173,825</strong> (07/16) — stocks took the hit; the spot dollar closed at just <strong>R$5.098</strong> (+0.40%).</li>\n      <li><span class=\"chip good\">FX</span> <strong>Month view:</strong> EUR/BRL from 5.9486 (07/03) to 5.8318 = <strong>−2.0%</strong>. The Real's trend is firm — tariff or no tariff.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.7829</strong> (today 07/17, +0.07%) — dollar marginally firmer, no clear direction.</li>\n      <li><span class=\"chip hot\">EU</span> <strong>ECB decides Thu 07/23</strong> (13:45 CET) — 93% \"no change\" priced in. Deposit rate 2.25% after the first hike in almost three years (06/17).</li>\n      <li><span class=\"chip\">USA</span> <strong>FOMC 07/28–29</strong>, hold at 3.50–3.75% expected. Carry vs. the Selic (14.25%) stays <strong>~10.5–10.75 pp</strong>.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent $84.68</strong> (capture 07/17, 07:49 UTC, +0.53%) — US-Iran escalation. Oil supports the Real (exports), weighs on inflation.</li>\n      <li><span class=\"chip\">BR</span> <strong>Positioning cools:</strong> CFTC BRL net longs 30.8K contracts (07/07, down from 44.7K). 5Y CDS calm at <strong>122.92 bp</strong> (07/16); EWZ $35.33 (−1.53%).</li>\n      <li><span class=\"chip good\">FX</span> <strong>Cross-rate check clean:</strong> 5.0857 × 1.1467 = 5.8318 — an exact match to the ECB fix, <strong>0.0%</strong> deviation.</li>\n      <li><span class=\"chip\">Note</span> Forecast probabilities below = <strong>my confidence</strong>, not a market-implied figure.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A partir de <strong>quarta-feira, 22/07</strong>, os EUA vão aplicar uma <strong>tarifa de 25%</strong> sobre produtos brasileiros — e a reação do mercado é reveladora, porque foi <em>seletiva</em>. O Ibovespa perdeu <strong>1,24%</strong> na quinta-feira, o real recuou apenas 0,40%. O EUR/BRL até subiu para <strong>5,8318</strong> (+0,63%) — mas <strong>0,53 p.p. disso vem da perna do euro</strong>, e só 0,09 do real. A tarifa atingiu as <em>ações</em> brasileiras, não a <em>moeda</em>; o motivo está nas letras miúdas (boi e café ficam de fora — justamente os que trazem dólares). E o real já vinha em alta por conta própria: o EUR/BRL está cerca de 2% abaixo da máxima de 03/07. Para a troca do Daniel, isso significa: a janela ficou mais apertada nas últimas duas semanas, e justamente uma tarifa de 25% não a reabriu.</p>\n    <ul>\n      <li><span class=\"chip hot\">Câmbio</span> <strong>EUR/BRL 5,8318</strong> (fixing do BCE, qui 16/07), +0,63% ante quarta — mas <strong>0,53 p.p. disso é perna do euro</strong> (EUR/USD 1,1406 → 1,1467), só 0,09 p.p. do real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Tarifa dos EUA de 25% (Section 301)</strong>: anunciada em 15/07, <strong>em vigor a partir de qua 22/07</strong>. Boi, café e outros ficam de fora. Governo Lula \"avalia medidas recíprocas\".</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Ibovespa −1,24% para 173.825</strong> (16/07) — a bolsa levou o golpe; o dólar à vista fechou em apenas <strong>R$ 5,098</strong> (+0,40%).</li>\n      <li><span class=\"chip good\">Câmbio</span> <strong>Quadro do mês:</strong> EUR/BRL de 5,9486 (03/07) para 5,8318 = <strong>−2,0%</strong>. O real segue firme na tendência — tarifa ou não.</li>\n      <li><span class=\"chip\">Câmbio</span> <strong>DXY 100,7829</strong> (hoje 17/07, +0,07%) — dólar minimamente mais firme, sem direção definida.</li>\n      <li><span class=\"chip hot\">UE</span> <strong>BCE decide qui 23/07</strong> (13h45 CET) — 93% de \"sem mudança\" precificado. Depósito em 2,25% após a primeira alta em quase três anos (17/06).</li>\n      <li><span class=\"chip\">EUA</span> <strong>FOMC 28–29/07</strong>, manutenção em 3,50–3,75% esperada. O carry frente à Selic (14,25%) segue em <strong>~10,5–10,75 p.p.</strong></li>\n      <li><span class=\"chip\">Global</span> <strong>Brent US$ 84,68</strong> (capturado em 17/07, 07h49 UTC, +0,53%) — escalada EUA-Irã. O petróleo sustenta o real (exportação), mas pesa sobre a inflação.</li>\n      <li><span class=\"chip\">BR</span> <strong>Posicionamento esfria:</strong> posições líquidas compradas em BRL na CFTC em 30,8K contratos (07/07, ante 44,7K). CDS de 5 anos tranquilo em <strong>122,92 bp</strong> (16/07); EWZ US$ 35,33 (−1,53%).</li>\n      <li><span class=\"chip good\">Câmbio</span> <strong>Checagem de taxa cruzada limpa:</strong> 5,0857 × 1,1467 = 5,8318 — exatamente o fixing do BCE, <strong>0,0%</strong> de desvio.</li>\n      <li><span class=\"chip\">Aviso</span> As probabilidades de projeção abaixo = <strong>minha confiança</strong>, não um número implícito de mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">A partir del <strong>miércoles 22/07</strong>, Estados Unidos impone un <strong>arancel del 25%</strong> a los productos brasileños — y la reacción del mercado resulta reveladora, porque es <em>selectiva</em>. El Ibovespa perdió el jueves <strong>1.24%</strong>, el real solo 0.40%. El EUR/BRL sí subió a <strong>5.8318</strong> (+0.63%) — pero <strong>0.53 puntos porcentuales de eso vienen de la pata del euro</strong>, solo 0.09 del real. El arancel golpeó a las <em>acciones</em> brasileñas, no a la <em>divisa</em>; la razón está en la letra pequeña (la carne de res y el café están exentos — justo los que generan divisas). Y el real de todos modos va al alza: el EUR/BRL se ubica cerca de 2% por debajo del máximo del 03/07. Para el intercambio de Daniel eso significa: la ventana se ha estrechado desde hace dos semanas, y precisamente un arancel del 25% no volvió a abrirla.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8318</strong> (fixing del BCE, jue 16/07), +0.63% frente al miércoles — pero <strong>0.53 pp de eso son de la pata del euro</strong> (EUR/USD 1.1406 → 1.1467), solo 0.09 pp del real.</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Arancel de EE. UU. del 25% (Sección 301)</strong>: anunciado el 15/07, <strong>vigente el miér. 22/07.</strong> Carne de res, café y otros exentos. El gobierno de Lula \"evalúa medidas recíprocas\".</li>\n      <li><span class=\"chip hot\">BR</span> <strong>Ibovespa −1.24% a 173,825</strong> (16/07) — la bolsa absorbió el golpe; el dólar spot cerró en apenas <strong>R$ 5.098</strong> (+0.40%).</li>\n      <li><span class=\"chip good\">FX</span> <strong>Panorama del mes:</strong> EUR/BRL de 5.9486 (03/07) a 5.8318 = <strong>−2.0%</strong>. El real está firme en la tendencia — con o sin arancel.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 100.7829</strong> (hoy 17/07, +0.07%) — dólar mínimamente más firme, sin dirección clara.</li>\n      <li><span class=\"chip hot\">EU</span> <strong>El BCE decide el jue 23/07</strong> (13:45 CET) — 93% \"sin cambios\" descontado. Tasa de depósito en 2.25% tras la primera alza en casi tres años (17/06).</li>\n      <li><span class=\"chip\">EE. UU.</span> <strong>FOMC 28–29/07</strong>, se espera que mantenga en 3.50–3.75%. El carry frente a la Selic (14.25%) se mantiene en <strong>~10.5–10.75 pp</strong>.</li>\n      <li><span class=\"chip\">Global</span> <strong>Brent 84.68 USD</strong> (captura 17/07, 07:49 UTC, +0.53%) — escalada EE. UU.-Irán. El petróleo respalda al real (exportaciones), presiona la inflación.</li>\n      <li><span class=\"chip\">BR</span> <strong>El posicionamiento se enfría:</strong> posiciones netas largas en BRL de la CFTC en 30.8K contratos (07/07, desde 44.7K). CDS a 5 años tranquilo en <strong>122.92 pb</strong> (16/07); EWZ 35.33 USD (−1.53%).</li>\n      <li><span class=\"chip good\">FX</span> <strong>Verificación de tipo cruzado limpia:</strong> 5.0857 × 1.1467 = 5.8318 — exactamente el fixing del BCE, <strong>0.0%</strong> de desviación.</li>\n      <li><span class=\"chip\">Aviso</span> Las probabilidades de pronóstico de abajo son <strong>mi confianza personal</strong>, no una cifra implícita de mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern rotierte die Erleichterungs-Rally in die bilanzstarken Mega-Caps. Heute ist sie gebrochen — und der Bruch hat eine sehr bestimmte Form. <strong>TSMC hob seine Jahres-Investitionsplanung auf 60–64 Mrd. $ an (von 52–56 Mrd. $)</strong>. Der Lehrbuch-Reflex darauf lautet: mehr Fabriken = bestätigte KI-Nachfrage = Chips kaufen. Der Markt tat das Gegenteil — <strong>Nasdaq −1,47 % auf 25.881,95, Nvidia −2,40 % auf 207,40 $</strong>.<sup>[1][2][3]</sup> Und das ist die zweite Sitzung, in der KI-nachfrage-positive Nachrichten die Halbleiter nicht <em>tragen</em>: Am 14.07. sprang Nvidia auf die bestätigten H200-China-Lieferungen noch +4,1 % auf 211,80 $ — davon war schon am Folgetag nichts mehr übrig (+0,33 %), und heute fällt sie auf ein <em>starkes</em> Capex-Signal. Dazu <strong>Alphabet −4,44 % auf 354,46 $</strong>: rund 200 Mrd. $ Marktwert für einen verschobenen Liefertermin.<sup>[2][5]</sup> Und in den Rohstoffen das aussagekräftigere Nicht-Ereignis: US-Schläge gegen iranische Militäranlagen treiben <strong>Brent auf ein Ein-Monats-Hoch (84,68 $)</strong> — doch <strong>Gold fällt unter 4.000 $</strong>, und zwar in einer Woche, in der auch der <em>Dollar</em> nachgibt.<sup>[8][10][12][13]</sup> Beide Häfen bieten nicht mit. Wer heute etwas lernen will, schaut nicht auf das, was stieg, sondern auf das, was <em>nicht</em> stieg.</p>\n    <ul>\n      <li><span class=\"chip hot\">HALBLEITER</span> <strong>TSMC hebt das Capex auf 60–64 Mrd. $ an</strong> (von 52–56 Mrd. $) — und die Chips fallen. <strong>NVDA −2,40 % auf 207,40 $</strong> (Marktwert 5,02 Bio. $), <strong>Nasdaq −1,47 % auf 25.881,95</strong>, S&amp;P −0,51 % auf 7.533,77, Dow −0,20 % auf 52.552,97. VIX +6,76 % auf 16,73. HOLD — kein frisches Geld in die Chips.<sup>[1][2][3][4]</sup></li>\n      <li><span class=\"chip hot\">ALPHABET</span> <strong>GOOGL −4,44 % auf 354,46 $</strong> nach einem Bloomberg-Bericht, Google liege bei der Auslieferung von Gemini 3.5 Pro hinter dem Zeitplan. Rund <strong>200 Mrd. $ Marktwert</strong> — der zweite ~5-%-Zweifels-Tag binnen eines Monats. Q2-Zahlen am <strong>Mi 22.07.</strong> (Die Produkt-Story ist Revier des <em>ai-dev</em>-Briefs; hier zählt nur der Ticker.)<sup>[2][5][7]</sup></li>\n      <li><span class=\"chip good\">BIG-TECH</span> <strong>AAPL +1,76 % auf 333,26 $</strong> — ein weiteres Hoch über dem gestrigen Rekord-Schluss — und <strong>MSFT +1,38 % auf 401,10 $</strong>. Kapital flieht <em>nicht</em> aus Big-Tech. Es rotiert aus den Halbleitern heraus. Das ist eine andere Diagnose als „Risk-off\".<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 84,68 $ (+0,53 %), WTI 79,75 $ (+1,02 %)</strong> (Abruf 17.07., 07:50 UTC) auf einem Ein-Monats-Hoch, nachdem die USA am Mi 15.07. eine neue Schlag-Welle gegen iranische Militäranlagen begannen. Aber: Brent stand am 02.07. noch <em>unter 71 $</em>. <strong>+20 % in 15 Tagen</strong> — dem läuft man nicht hinterher. HOLD.<sup>[8][9][10]</sup></li>\n      <li><span class=\"chip\">GOLD</span> <strong>3.996,85 $/oz</strong> (Abruf 07:50 UTC) — unter 4.000 $ und auf Kurs für <strong>über −3 % auf die Woche</strong>, mitten in einer Eskalation. Und der Dollar erklärt es <em>nicht</em>: <strong>DXY 100,6930 (−0,07 %)</strong>, nahe einem Ein-Monats-Tief und selbst auf Wochenverlust, nachdem weiche US-Inflationsdaten die Zinserhöhungs-Wetten gestutzt haben. Gold fiel also, obwohl der Dollar <em>nachgab</em> — der klassische Kriegs-Hedge bietet gegen einen Rückenwind nicht mit. HOLD als Versicherung, aber unter Beobachtung.<sup>[12][13]</sup></li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>63,3k–64,5k $</strong> (Quellen-Range). Der <strong>13.07. brachte −424,66 Mio. $ ETF-Abfluss an einem einzigen Tag</strong> — mehr als das Doppelte der ganzen +197-Mio.-Zufluss-Woche davor. Meine gestrige Zeile „eine grüne Woche ist kein Trend\" ist heute keine Vorsicht mehr, sondern Datenlage. HOLD.<sup>[14][15][16]</sup></li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>1,85k–1,92k $</strong> — zwei Quellen widersprechen sich heute sogar in der <em>Richtung</em> der 24h-Bewegung (+3,20 % vs. −4,10 %). Ich stufe die gestrige „stärkste Kauf-Nähe im Brief\" deshalb <strong>nicht</strong> hoch: nicht weil die These falsch wäre, sondern weil die Daten sie heute nicht tragen.<sup>[14]</sup></li>\n      <li><span class=\"chip\">KALENDER</span> <strong>Heute</strong> ist die Gemini-3.5-Pro-Freigabe anvisiert (von Google unbestätigt); <strong>Mi 22.07.</strong> Alphabet + Tesla; <strong>Mi 29.07. FOMC</strong> + Microsoft + Meta; <strong>Do 30.07.</strong> Apple + Amazon (erwartet); <strong>So 02.08.</strong> OPEC+. Nvidias eigener Termin erst Ende August. Jeder Timeframe unten hängt an einem dieser Daten.<sup>[6][7][11][19][23]</sup></li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Yesterday's relief rally rotated into the balance-sheet-strong mega-caps. Today it broke — and the break has a very specific shape. <strong>TSMC raised its full-year capex plan to $60–64B (from $52–56B).</strong> The textbook reflex to that is: more fabs = confirmed AI demand = buy chips. The market did the opposite — <strong>Nasdaq −1.47% to 25,881.95, Nvidia −2.40% to $207.40</strong>.<sup>[1][2][3]</sup> And this is the second session in which AI-demand-positive news fails to <em>lift</em> semiconductors: on 07-14, Nvidia jumped +4.1% to $211.80 on the confirmed H200-to-China shipments — none of that held into the next day (+0.33%), and today it falls on a <em>strong</em> capex signal. On top of that, <strong>Alphabet −4.44% to $354.46</strong>: roughly $200B in market value for a delayed delivery date.<sup>[2][5]</sup> And in commodities, the more telling non-event: US strikes on Iranian military installations push <strong>Brent to a one-month high ($84.68)</strong> — yet <strong>gold falls below $4,000</strong>, and in a week when the <em>dollar</em> is giving ground too.<sup>[8][10][12][13]</sup> Neither haven is showing up. Anyone looking to learn something today shouldn't watch what rose — they should watch what <em>didn't</em>.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEMICONDUCTORS</span> <strong>TSMC raises capex to $60–64B</strong> (from $52–56B) — and the chips fall. <strong>NVDA −2.40% to $207.40</strong> (market cap $5.02T), <strong>Nasdaq −1.47% to 25,881.95</strong>, S&amp;P −0.51% to 7,533.77, Dow −0.20% to 52,552.97. VIX +6.76% to 16.73. HOLD — no fresh money into chips.<sup>[1][2][3][4]</sup></li>\n      <li><span class=\"chip hot\">ALPHABET</span> <strong>GOOGL −4.44% to $354.46</strong> after a Bloomberg report that Google is behind schedule delivering Gemini 3.5 Pro. Roughly <strong>$200B in market value</strong> — the second ~5% doubt-day within a month. Q2 earnings on <strong>Wed 07-22</strong>. (The product story belongs to the <em>ai-dev</em> brief; here only the ticker counts.)<sup>[2][5][7]</sup></li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>AAPL +1.76% to $333.26</strong> — another high above yesterday's record close — and <strong>MSFT +1.38% to $401.10</strong>. Capital is <em>not</em> fleeing Big Tech. It's rotating out of semiconductors. That's a different diagnosis than \"risk-off.\"<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $84.68 (+0.53%), WTI $79.75 (+1.02%)</strong> (captured 07-17, 07:50 UTC) at a one-month high, after the US began a new wave of strikes on Iranian military installations on Wed 07-15. But: Brent was still <em>under $71</em> on 07-02. <strong>+20% in 15 days</strong> — that's not something to chase. HOLD.<sup>[8][9][10]</sup></li>\n      <li><span class=\"chip\">GOLD</span> <strong>$3,996.85/oz</strong> (captured 07:50 UTC) — below $4,000 and on track for <strong>more than −3% on the week</strong>, in the middle of an escalation. And the dollar doesn't explain it: <strong>DXY 100.6930 (−0.07%)</strong>, near a one-month low and itself down on the week, after soft US inflation data cut rate-hike bets. So gold fell even though the dollar <em>weakened</em> — the classic war hedge isn't showing up despite a tailwind. HOLD as insurance, but watch closely.<sup>[12][13]</sup></li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>$63.3k–64.5k</strong> (source range). <strong>07-13 brought a $424.66M ETF outflow in a single day</strong> — more than double the entire +$197M inflow week before it. My line from yesterday — \"a green week isn't a trend\" — is no longer caution today, it's the data. HOLD.<sup>[14][15][16]</sup></li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>$1.85k–1.92k</strong> — two sources disagree today even on the <em>direction</em> of the 24h move (+3.20% vs. −4.10%). I'm therefore <strong>not</strong> upgrading yesterday's \"strongest buy case in the brief\": not because the thesis is wrong, but because today's data doesn't support it.<sup>[14]</sup></li>\n      <li><span class=\"chip\">CALENDAR</span> <strong>Today</strong> is the targeted Gemini 3.5 Pro release (unconfirmed by Google); <strong>Wed 07-22</strong> Alphabet + Tesla; <strong>Wed 07-29 FOMC</strong> + Microsoft + Meta; <strong>Thu 07-30</strong> Apple + Amazon (expected); <strong>Sun 08-02</strong> OPEC+. Nvidia's own date isn't until late August. Every timeframe below hangs on one of these dates.<sup>[6][7][11][19][23]</sup></li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Ontem, o rali de alívio rotacionou para as mega-caps com balanços sólidos. Hoje ele se rompeu — e a ruptura tem um formato bem específico. <strong>A TSMC elevou seu plano de investimento anual para 60–64 bi $</strong> (de 52–56 bi $). O reflexo de livro-texto para isso é: mais fábricas = demanda de IA confirmada = comprar chips. O mercado fez o contrário — <strong>Nasdaq −1,47 % para 25.881,95, Nvidia −2,40 % para 207,40 $</strong>.<sup>[1][2][3]</sup> E esta é a segunda sessão em que notícias positivas para a demanda de IA não sustentam os semicondutores: em 14.07. a Nvidia saltou +4,1 % para 211,80 $ diante das entregas confirmadas de H200 para a China — no dia seguinte já não sobrava quase nada disso (+0,33 %), e hoje ela cai diante de um sinal de capex <em>forte</em>. Some-se a isso <strong>a Alphabet −4,44 % para 354,46 $</strong>: cerca de 200 bi $ em valor de mercado por um prazo de entrega adiado.<sup>[2][5]</sup> E, nas commodities, o não-evento mais revelador: ataques dos EUA a instalações militares iranianas empurram o <strong>Brent para uma máxima de um mês (84,68 $)</strong> — mas o <strong>ouro cai abaixo de 4.000 $</strong>, e isso numa semana em que o <em>dólar</em> também recua.<sup>[8][10][12][13]</sup> Nenhum dos dois portos-seguros acompanha. Quem quiser aprender algo hoje não deve olhar para o que subiu, mas para o que <em>não</em> subiu.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEMICONDUTORES</span> <strong>TSMC eleva o capex para 60–64 bi $</strong> (de 52–56 bi $) — e os chips caem. <strong>NVDA −2,40 % para 207,40 $</strong> (valor de mercado 5,02 tri. $), <strong>Nasdaq −1,47 % para 25.881,95</strong>, S&amp;P −0,51 % para 7.533,77, Dow −0,20 % para 52.552,97. VIX +6,76 % para 16,73. HOLD — sem dinheiro novo em chips.<sup>[1][2][3][4]</sup></li>\n      <li><span class=\"chip hot\">ALPHABET</span> <strong>GOOGL −4,44 % para 354,46 $</strong> após reportagem da Bloomberg de que o Google está atrasado na entrega do Gemini 3.5 Pro. Cerca de <strong>200 bi $ em valor de mercado</strong> — o segundo dia de dúvida de ~5 % em um mês. Números do 2º tri em <strong>qua. 22.07.</strong> (A história do produto é território do brief <em>ai-dev</em>; aqui só importa o ticker.)<sup>[2][5][7]</sup></li>\n      <li><span class=\"chip good\">BIG-TECH</span> <strong>AAPL +1,76 % para 333,26 $</strong> — mais uma máxima acima do fechamento recorde de ontem — e <strong>MSFT +1,38 % para 401,10 $</strong>. O capital <em>não</em> está fugindo da Big-Tech. Está rotacionando para fora dos semicondutores. Esse é um diagnóstico diferente de \"risk-off\".<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 84,68 $ (+0,53 %), WTI 79,75 $ (+1,02 %)</strong> (coleta 17.07., 07:50 UTC) em máxima de um mês, depois que os EUA iniciaram na qua. 15.07. uma nova onda de ataques contra instalações militares iranianas. Mas: em 02.07. o Brent ainda estava <em>abaixo de 71 $</em>. <strong>+20 % em 15 dias</strong> — isso não se persegue. HOLD.<sup>[8][9][10]</sup></li>\n      <li><span class=\"chip\">OURO</span> <strong>3.996,85 $/oz</strong> (coleta 07:50 UTC) — abaixo de 4.000 $ e a caminho de <strong>mais de −3 % na semana</strong>, em plena escalada. E o dólar <em>não</em> explica isso: <strong>DXY 100,6930 (−0,07 %)</strong>, perto de uma mínima de um mês e também no vermelho na semana, depois que dados de inflação dos EUA mais brandos cortaram as apostas de alta de juros. O ouro caiu, portanto, mesmo com o dólar <em>recuando</em> — o clássico hedge de guerra não acompanha nem com um vento a favor. HOLD como seguro, mas sob observação.<sup>[12][13]</sup></li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>63,3 mil–64,5 mil $</strong> (faixa de fontes). O <strong>13.07. trouxe uma saída de 424,66 milhões $ em ETFs em um único dia</strong> — mais do que o dobro de toda a semana anterior de entradas de +197 milhões $. Minha frase de ontem, \"uma semana verde não é tendência\", hoje não é mais cautela, é constatação dos dados. HOLD.<sup>[14][15][16]</sup></li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>1,85 mil–1,92 mil $</strong> — hoje, duas fontes se contradizem até na <em>direção</em> do movimento de 24h (+3,20 % vs. −4,10 %). Por isso, <strong>não</strong> promovo a \"candidata de compra mais forte do brief\" de ontem: não porque a tese esteja errada, mas porque os dados não a sustentam hoje.<sup>[14]</sup></li>\n      <li><span class=\"chip\">CALENDÁRIO</span> <strong>Hoje</strong> é a data-alvo do lançamento do Gemini 3.5 Pro (não confirmado pelo Google); <strong>qua. 22.07.</strong> Alphabet + Tesla; <strong>qua. 29.07. FOMC</strong> + Microsoft + Meta; <strong>qui. 30.07.</strong> Apple + Amazon (esperado); <strong>dom. 02.08.</strong> OPEP+. A própria data da Nvidia só no fim de agosto. Cada horizonte abaixo depende de uma dessas datas.<sup>[6][7][11][19][23]</sup></li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Ayer, el rally de alivio rotó hacia las mega-caps con balances sólidos. Hoy se rompió — y la ruptura tiene una forma muy precisa. <strong>TSMC elevó su plan de inversión anual a 60–64 mil millones de $</strong> (desde 52–56 mil millones de $). El reflejo de libro de texto dice: más fábricas = demanda de IA confirmada = comprar chips. El mercado hizo lo contrario — <strong>Nasdaq −1,47 % a 25.881,95, Nvidia −2,40 % a 207,40 $</strong>.<sup>[1][2][3]</sup> Y esta es la segunda sesión en la que noticias positivas para la demanda de IA no <em>sostienen</em> a los semiconductores: el 14.07. Nvidia todavía saltó +4,1 % a 211,80 $ ante los envíos confirmados de H200 a China — de eso ya no quedaba nada al día siguiente (+0,33 %), y hoy cae ante una señal de capex fuerte. A esto se suma <strong>Alphabet −4,44 % a 354,46 $</strong>: cerca de 200 mil millones de $ de valor de mercado por un lanzamiento retrasado.<sup>[2][5]</sup> Y en las materias primas está el no evento más revelador: los ataques de EE. UU. contra instalaciones militares iraníes impulsan al <strong>Brent a un máximo de un mes (84,68 $)</strong> — pero <strong>el oro cae por debajo de 4.000 $</strong>, y además en una semana en la que el <em>dólar</em> también cede.<sup>[8][10][12][13]</sup> Ninguno de los dos refugios acompaña. Quien quiera aprender algo hoy no debe mirar lo que subió, sino lo que no subió.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEMICONDUCTORES</span> <strong>TSMC eleva el capex a 60–64 mil millones de $</strong> (desde 52–56 mil millones de $) — y los chips caen. <strong>NVDA −2,40 % a 207,40 $</strong> (valor de mercado 5,02 billones de $), <strong>Nasdaq −1,47 % a 25.881,95</strong>, S&amp;P −0,51 % a 7.533,77, Dow −0,20 % a 52.552,97. VIX +6,76 % a 16,73. HOLD — sin dinero fresco para los chips.<sup>[1][2][3][4]</sup></li>\n      <li><span class=\"chip hot\">ALPHABET</span> <strong>GOOGL −4,44 % a 354,46 $</strong> tras un reporte de Bloomberg de que Google va retrasado en la entrega de Gemini 3.5 Pro. Cerca de <strong>200 mil millones de $ de valor de mercado</strong> — el segundo día de dudas de ~5 % en un mes. Resultados del Q2 el <strong>mié. 22.07.</strong> (La historia de producto es territorio del brief de <em>ai-dev</em>; aquí solo cuenta el ticker.)<sup>[2][5][7]</sup></li>\n      <li><span class=\"chip good\">BIG TECH</span> <strong>AAPL +1,76 % a 333,26 $</strong> — otro máximo por encima del cierre récord de ayer — y <strong>MSFT +1,38 % a 401,10 $</strong>. El capital <em>no</em> huye de Big Tech. Rota fuera de los semiconductores. Es un diagnóstico distinto al de \"risk-off\".<sup>[2]</sup></li>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 84,68 $ (+0,53 %), WTI 79,75 $ (+1,02 %)</strong> (captura 17.07., 07:50 UTC) en un máximo de un mes, después de que EE. UU. iniciara el mié. 15.07. una nueva ola de ataques contra instalaciones militares iraníes. Pero: el Brent estaba el 02.07. todavía por debajo de 71 $. <strong>+20 % en 15 días</strong> — a eso no hay que perseguirlo. HOLD.<sup>[8][9][10]</sup></li>\n      <li><span class=\"chip\">ORO</span> <strong>3.996,85 $/oz</strong> (captura 07:50 UTC) — por debajo de 4.000 $ y en camino a <strong>más de −3 % en la semana</strong>, en plena escalada. Y el dólar <em>no</em> lo explica: <strong>DXY 100,6930 (−0,07 %)</strong>, cerca de un mínimo de un mes y en pérdida semanal él mismo, después de que datos de inflación de EE. UU. más suaves recortaran las apuestas de subida de tasas. El oro cayó, entonces, aunque el dólar <em>cedía</em> — el clásico refugio de guerra no responde ante un viento a favor. HOLD como seguro, pero bajo observación.<sup>[12][13]</sup></li>\n      <li><span class=\"chip hot\">BITCOIN</span> <strong>63,3k–64,5k $</strong> (rango de fuentes). El <strong>13.07. trajo −424,66 millones de $ de salida de ETF en un solo día</strong> — más del doble de toda la semana anterior de +197 millones de $ de entrada. Mi frase de ayer, \"una semana verde no es una tendencia\", ya no es hoy precaución, sino la realidad de los datos. HOLD.<sup>[14][15][16]</sup></li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>1,85k–1,92k $</strong> — hoy dos fuentes se contradicen incluso en la <em>dirección</em> del movimiento de 24h (+3,20 % frente a −4,10 %). Por eso <strong>no</strong> elevo la \"señal de compra más cercana del brief\" de ayer: no porque la tesis sea falsa, sino porque los datos no la respaldan hoy.<sup>[14]</sup></li>\n      <li><span class=\"chip\">CALENDARIO</span> <strong>Hoy</strong> se apunta al lanzamiento de Gemini 3.5 Pro (no confirmado por Google); <strong>mié. 22.07.</strong> Alphabet + Tesla; <strong>mié. 29.07. FOMC</strong> + Microsoft + Meta; <strong>jue. 30.07.</strong> Apple + Amazon (esperado); <strong>dom. 02.08.</strong> OPEP+. La fecha propia de Nvidia recién a fines de agosto. Cada horizonte de abajo depende de una de estas fechas.<sup>[6][7][11][19][23]</sup></li>\n    </ul></div>"
      }

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die letzten Tage waren eine Parade aktiv ausgenutzter Appliance-Löcher (SonicWall, Oracle, AD FS — alles im gestrigen Brief). Heute liegt die interessantere Geschichte tiefer: <strong>GhostLock</strong>, ein fünfzehn Jahre alter Use-after-free im Linux-Kernel, gibt jedem eingeloggten Nutzer Root — <em>und</em> bricht aus Docker- und Kubernetes-Containern aus. Der öffentliche Exploit ist zu 97 % zuverlässig. Der Fix ist seit dem <strong>20.04.2026 im Mainline</strong> (Commit <code>3bfdc63936dd</code>), Backports ab <strong>04.05</strong>, die RHEL-Familie lieferte am 09.07 — aber wer heute auf <strong>Ubuntu LTS</strong> nachschaut, liest dort immer noch „vulnerable\". Das ist die eigentliche Nachricht: nicht die Lücke, sondern die fast drei Monate Distributions-Lücke dahinter. Dazu die Forensik zum AsyncAPI-Einbruch, die zeigt, warum <code>--ignore-scripts</code> hier nichts gerettet hätte.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GhostLock (CVE-2026-43499)</strong>: Use-after-free in der Priority-Inheritance-Logik des Kernels, seit 2011 (Linux 2.6.39) drin, CVSS 7,8. Lokaler Nutzer → Root, <strong>inklusive Container-Ausbruch</strong>. Öffentlicher Exploit, 97 % Trefferquote.</li>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>Ubuntu LTS hinkt hinterher</strong>: 24.04 steht heute auf „vulnerable, work in progress\", 22.04 und 20.04 schlicht auf „vulnerable\" — zehn Tage nach Disclosure (07.07) und fast drei Monate nach dem Mainline-Fix. AlmaLinux hatte gepatchte Kernel schon am 09.07.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Der Fix hat einen Fix gebraucht</strong>: Der ursprüngliche Kernel-Patch schleppte einen neuen Absturz-Bug ein (<strong>CVE-2026-53166</strong>) — upstream im Juni zurückgenommen, also lange vor der Offenlegung.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI, die Forensik</strong>: Microsoft Threat Intelligence hat den Einbruch vom 14.07 auseinandergenommen. Der Schadcode zündet beim <em>Import</em>, nicht beim Install — <code>npm install --ignore-scripts</code> läuft ins Leere. Nachgeladen wird ein ~8,2 MB großes, verschlüsseltes Bundle über IPFS.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>KEV-Frist heute</strong>: Die beiden SonicWall-SMA1000-Lücken (<strong>CVE-2026-15409</strong>, CVSS 10,0) müssen bei US-Behörden heute zu sein. Oracle E-Business Suite folgt morgen.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16.07) — eine Aufräum-Beta, keine Feature-Beta. GA weiterhin „um September/Oktober 2026\". Dazu <strong>Angular 22.0.7</strong>, ebenfalls gestern.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Python 3.15.0b4 morgen</strong> (18.07), danach rc1 am 04.08 — GA steht auf dem 01.10.2026.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>Google: was final ist und was nicht</strong>. Das Android-Urteil (4,125 Mrd. €) ist seit dem 02.07 rechtskräftig. Die <em>neue</em> DMA-Strafe ist trotz kursierender Schlagzeilen <strong>noch nicht verhängt</strong> — erwartet vor der Sommerpause, ohne festes Datum.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Die letzten Tage waren eine Parade aktiv ausgenutzter Appliance-Löcher (SonicWall, Oracle, AD FS — alles im gestrigen Brief). Heute liegt die interessantere Geschichte tiefer: <strong>GhostLock</strong>, ein fünfzehn Jahre alter Use-after-free im Linux-Kernel, gibt jedem eingeloggten Nutzer Root — <em>und</em> bricht aus Docker- und Kubernetes-Containern aus. Der öffentliche Exploit ist zu 97 % zuverlässig. Der Fix ist seit dem <strong>20.04.2026 im Mainline</strong> (Commit <code>3bfdc63936dd</code>), Backports ab <strong>04.05</strong>, die RHEL-Familie lieferte am 09.07 — aber wer heute auf <strong>Ubuntu LTS</strong> nachschaut, liest dort immer noch „vulnerable\". Das ist die eigentliche Nachricht: nicht die Lücke, sondern die fast drei Monate Distributions-Lücke dahinter. Dazu die Forensik zum AsyncAPI-Einbruch, die zeigt, warum <code>--ignore-scripts</code> hier nichts gerettet hätte.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GhostLock (CVE-2026-43499)</strong>: Use-after-free in der Priority-Inheritance-Logik des Kernels, seit 2011 (Linux 2.6.39) drin, CVSS 7,8. Lokaler Nutzer → Root, <strong>inklusive Container-Ausbruch</strong>. Öffentlicher Exploit, 97 % Trefferquote.</li>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>Ubuntu LTS hinkt hinterher</strong>: 24.04 steht heute auf „vulnerable, work in progress\", 22.04 und 20.04 schlicht auf „vulnerable\" — zehn Tage nach Disclosure (07.07) und fast drei Monate nach dem Mainline-Fix. AlmaLinux hatte gepatchte Kernel schon am 09.07.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>Der Fix hat einen Fix gebraucht</strong>: Der ursprüngliche Kernel-Patch schleppte einen neuen Absturz-Bug ein (<strong>CVE-2026-53166</strong>) — upstream im Juni zurückgenommen, also lange vor der Offenlegung.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI, die Forensik</strong>: Microsoft Threat Intelligence hat den Einbruch vom 14.07 auseinandergenommen. Der Schadcode zündet beim <em>Import</em>, nicht beim Install — <code>npm install --ignore-scripts</code> läuft ins Leere. Nachgeladen wird ein ~8,2 MB großes, verschlüsseltes Bundle über IPFS.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>KEV-Frist heute</strong>: Die beiden SonicWall-SMA1000-Lücken (<strong>CVE-2026-15409</strong>, CVSS 10,0) müssen bei US-Behörden heute zu sein. Oracle E-Business Suite folgt morgen.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16.07) — eine Aufräum-Beta, keine Feature-Beta. GA weiterhin „um September/Oktober 2026\". Dazu <strong>Angular 22.0.7</strong>, ebenfalls gestern.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Python 3.15.0b4 morgen</strong> (18.07), danach rc1 am 04.08 — GA steht auf dem 01.10.2026.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>Google: was final ist und was nicht</strong>. Das Android-Urteil (4,125 Mrd. €) ist seit dem 02.07 rechtskräftig. Die <em>neue</em> DMA-Strafe ist trotz kursierender Schlagzeilen <strong>noch nicht verhängt</strong> — erwartet vor der Sommerpause, ohne festes Datum.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The last few days were a parade of actively exploited appliance holes (SonicWall, Oracle, AD FS — all in yesterday's brief). Today the more interesting story sits deeper: <strong>GhostLock</strong>, a fifteen-year-old use-after-free in the Linux kernel that hands root to any logged-in user — <em>and</em> breaks out of Docker and Kubernetes containers. The public exploit is 97% reliable. The fix has been <strong>in mainline since 20.04.2026</strong> (commit <code>3bfdc63936dd</code>), with backports from <strong>04.05</strong>, and the RHEL family shipped on 09.07 — but anyone checking <strong>Ubuntu LTS</strong> today still reads \"vulnerable.\" That's the real story: not the hole itself, but the almost three months of distro gap behind it. Plus the forensics on the AsyncAPI breach, which show why <code>--ignore-scripts</code> would have saved nothing here.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GhostLock (CVE-2026-43499)</strong>: a use-after-free in the kernel's priority-inheritance logic, present since 2011 (Linux 2.6.39), CVSS 7.8. Local user → root, <strong>including container breakout</strong>. Public exploit, 97% hit rate.</li>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>Ubuntu LTS is lagging</strong>: 24.04 is listed today as \"vulnerable, work in progress,\" 22.04 and 20.04 simply as \"vulnerable\" — ten days after disclosure (07.07) and almost three months after the mainline fix. AlmaLinux already had patched kernels by 09.07.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>The fix needed a fix</strong>: the original kernel patch introduced a new crash bug (<strong>CVE-2026-53166</strong>) — reverted upstream in June, well before disclosure.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI, the forensics</strong>: Microsoft Threat Intelligence took apart the 14.07 breach. The malicious code fires on <em>import</em>, not on install — <code>npm install --ignore-scripts</code> runs into a dead end. It fetches a roughly 8.2 MB encrypted bundle over IPFS.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">USA</span> <strong>KEV deadline today</strong>: the two SonicWall SMA1000 flaws (<strong>CVE-2026-15409</strong>, CVSS 10.0) must be remediated at US federal agencies today. Oracle E-Business Suite follows tomorrow.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16.07) — a cleanup beta, not a feature beta. GA still slated for \"around September/October 2026.\" Also <strong>Angular 22.0.7</strong>, released the same day.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Python 3.15.0b4 tomorrow</strong> (18.07), followed by rc1 on 04.08 — GA is scheduled for 01.10.2026.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>Google: what's final and what isn't</strong>. The Android ruling (€4.125 billion) became final on 02.07. Despite circulating headlines, the <em>new</em> DMA fine has <strong>not yet been imposed</strong> — expected before the summer recess, with no fixed date.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Os últimos dias foram um desfile de brechas em appliances ativamente exploradas (SonicWall, Oracle, AD FS — tudo no brief de ontem). Hoje a história mais interessante está mais no fundo: <strong>GhostLock</strong>, um use-after-free de quinze anos no kernel Linux, dá root a qualquer usuário logado — <em>e</em> escapa de containers Docker e Kubernetes. O exploit público é 97% confiável. A correção está no mainline desde <strong>20/04/2026</strong> (commit <code>3bfdc63936dd</code>), com backports a partir de <strong>04/05</strong>, e a família RHEL entregou em 09/07 — mas quem consulta hoje o <strong>Ubuntu LTS</strong> ainda lê \"vulnerable\" ali. Essa é a notícia de verdade: não a brecha, mas os quase três meses de atraso das distribuições por trás dela. Além disso, a perícia sobre a invasão do AsyncAPI, que mostra por que o <code>--ignore-scripts</code> não teria salvado nada aqui.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GhostLock (CVE-2026-43499)</strong>: use-after-free na lógica de priority inheritance do kernel, presente desde 2011 (Linux 2.6.39), CVSS 7,8. Usuário local → root, <strong>incluindo escape de container</strong>. Exploit público, 97% de taxa de acerto.</li>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>Ubuntu LTS fica para trás</strong>: o 24.04 está hoje como \"vulnerable, work in progress\", o 22.04 e o 20.04 simplesmente como \"vulnerable\" — dez dias após a divulgação (07/07) e quase três meses após a correção no mainline. A AlmaLinux já tinha kernels corrigidos em 09/07.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>A correção precisou de outra correção</strong>: o patch original do kernel trouxe consigo um novo bug de travamento (<strong>CVE-2026-53166</strong>) — revertido no upstream em junho, portanto bem antes da divulgação.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI, a perícia</strong>: a Microsoft Threat Intelligence desmontou a invasão de 14/07. O código malicioso dispara na <em>importação</em>, não na instalação — o <code>npm install --ignore-scripts</code> passa batido. É baixado um pacote criptografado de ~8,2 MB via IPFS.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EUA</span> <strong>Prazo do KEV hoje</strong>: as duas brechas do SonicWall SMA1000 (<strong>CVE-2026-15409</strong>, CVSS 10,0) precisam estar corrigidas em órgãos dos EUA hoje. O Oracle E-Business Suite segue amanhã.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16/07) — uma beta de faxina, não uma beta de recursos. O GA continua \"por volta de setembro/outubro de 2026\". Além do <strong>Angular 22.0.7</strong>, também ontem.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Python 3.15.0b4 amanhã</strong> (18/07), depois o rc1 em 04/08 — o GA está previsto para 01/10/2026.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">UE</span> <strong>Google: o que já é definitivo e o que não é</strong>. A sentença do Android (€ 4,125 bilhões) transitou em julgado desde 02/07. A <em>nova</em> multa do DMA, apesar das manchetes circulando, <strong>ainda não foi aplicada</strong> — esperada antes do recesso de verão, sem data fixa.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Los últimos días fueron un desfile de fallas en appliances explotadas activamente (SonicWall, Oracle, AD FS — todo en el brief de ayer). Hoy la historia más interesante está más abajo: <strong>GhostLock</strong>, un use-after-free de quince años en el kernel de Linux, le da root a cualquier usuario con sesión iniciada — <em>y</em> escapa de los contenedores de Docker y Kubernetes. El exploit público es confiable en un 97 %. La corrección está en la rama mainline desde el <strong>20/04/2026</strong> (commit <code>3bfdc63936dd</code>), con backports desde el <strong>04/05</strong>, la familia RHEL la entregó el 09/07 — pero quien revise hoy <strong>Ubuntu LTS</strong> todavía lee ahí «vulnerable». Esa es la noticia real: no la falla, sino los <strong>casi tres meses</strong> de brecha de distribución detrás de ella. A eso se suma la forense del ataque a AsyncAPI, que muestra por qué <code>--ignore-scripts</code> no habría salvado nada aquí.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>GhostLock (CVE-2026-43499)</strong>: use-after-free en la lógica de priority inheritance del kernel, presente desde 2011 (Linux 2.6.39), CVSS 7,8. Usuario local → root, <strong>incluyendo escape de contenedores</strong>. Exploit público, 97 % de efectividad.</li>\n      <li><span class=\"chip hot\">Infra</span> <span class=\"chip\">Global</span> <strong>Ubuntu LTS va rezagado</strong>: 24.04 está hoy marcado como «vulnerable, work in progress», 22.04 y 20.04 simplemente como «vulnerable» — diez días después de la divulgación (07/07) y casi tres meses después de la corrección en mainline. AlmaLinux ya tenía kernels parchados desde el 09/07.</li>\n      <li><span class=\"chip\">Sec</span> <span class=\"chip\">Global</span> <strong>La corrección necesitó otra corrección</strong>: el parche original del kernel arrastró consigo un nuevo bug de crash (<strong>CVE-2026-53166</strong>) — revertido en la rama upstream en junio, es decir, mucho antes de la divulgación.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">Global</span> <strong>AsyncAPI, la forense</strong>: Microsoft Threat Intelligence desmenuzó el ataque del 14/07. El código malicioso se dispara al <em>importar</em>, no al instalar — <code>npm install --ignore-scripts</code> no sirve de nada aquí. Se descarga un paquete cifrado de unos 8,2 MB vía IPFS.</li>\n      <li><span class=\"chip hot\">Sec</span> <span class=\"chip\">EE. UU.</span> <strong>Plazo del KEV hoy</strong>: las dos fallas de SonicWall SMA1000 (<strong>CVE-2026-15409</strong>, CVSS 10,0) deben estar corregidas hoy en las agencias de EE. UU. Oracle E-Business Suite sigue mañana.</li>\n      <li><span class=\"chip good\">Release</span> <span class=\"chip\">Global</span> <strong>PostgreSQL 19 Beta 2</strong> (16/07) — una beta de limpieza, no una beta de funciones nuevas. El GA sigue apuntando a «septiembre/octubre de 2026». Además <strong>Angular 22.0.7</strong>, también ayer.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">Global</span> <strong>Python 3.15.0b4 mañana</strong> (18/07), luego rc1 el 04/08 — el GA está fijado para el 01/10/2026.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">UE</span> <strong>Google: qué es firme y qué no</strong>. El fallo de Android (4,125 mil millones de euros) es firme desde el 02/07. La <em>nueva</em> multa de la DMA, pese a los titulares que circulan, <strong>todavía no se ha impuesto</strong> — se espera antes del receso de verano, sin fecha fija.</li>\n    </ul></div>"
