<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.45 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  /* .app-shell must NOT create a stacking context — otherwise its fixed-
     positioned .sidebar (z-index: 100) is trapped inside that context and
     gets covered on mobile by .mobile-backdrop (z-index: 99 at body level).
     Sidebar must compete directly with the backdrop at the root level, so
     z-index: auto here keeps app-shell positioned (for grid layout +
     responsive padding) but transparent to stacking. */
  .app-shell { z-index: auto; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Top masthead — broadsheet flag. The title colour follows whichever
     newsletter is currently loaded: navigate() sets --current-accent-text
     to the right --c-X-text token; showHome() unsets it so the title
     reverts to the :root default (economy red, the house colour). */
  header.app {
    border-top: 3px double var(--fg);
    border-bottom: 1px solid var(--fg);
    padding: 0.85rem 1.5rem;
    display: flex; align-items: baseline; justify-content: center; gap: 1rem;
    text-align: center;
    /* Header shares the sidebar's panel tint so chrome (header + sidebar)
       reads as one surface, distinct from the content surface in .main /
       iframe (which uses --bg). */
    background: var(--panel);
  }
  header.app .title {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 60, "SOFT" 50;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--current-accent-text, var(--accent-text));
    transition: color 220ms ease;
  }

  /* Layout: sidebar + main.
     --sidebar-w is the variable the grid reads. Toggling body.sidebar-collapsed
     swaps it to the narrow width (icons + accent bar only). */
  :root { --sidebar-w: 320px; }
  body.sidebar-collapsed { --sidebar-w: 60px; }
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: calc(100vh - 56px);
    transition: grid-template-columns 220ms ease;
  }
  /* While the user is actively dragging the resize handle, kill the grid transition
     so the sidebar tracks the cursor 1:1 instead of lagging by 220ms.
     Also disable pointer-events on the iframe so mousemove keeps reaching the document
     while the cursor crosses it, and pause the paper-grain background pseudo-element so
     it doesn't have to re-composite on every frame. */
  body.sidebar-resizing .app-shell { transition: none; }
  body.sidebar-resizing { cursor: col-resize; user-select: none; }
  body.sidebar-resizing .iframe-host { pointer-events: none; }
  body.sidebar-resizing html::before { display: none; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - 70px); }
    .sidebar { border-right: none !important; border-bottom: 1px solid var(--rule); max-height: 220px; }
  }

  .sidebar {
    position: relative;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0.8rem 0.5rem 1rem;
  }

  /* Drag-to-resize handle on the sidebar's right edge. Desktop only.
     Hidden when the sidebar is collapsed (60px icon strip) or on mobile (drawer mode).
     Hover and active states tint with the accent so it's discoverable on first hover. */
  .sidebar-resize {
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    z-index: 50;
    transition: background 120ms;
  }
  .sidebar-resize:hover {
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.sidebar-resizing .sidebar-resize {
    background: color-mix(in srgb, var(--accent) 65%, transparent);
  }
  @media (max-width: 720px)   { .sidebar-resize { display: none; } }
  body.sidebar-collapsed .sidebar-resize { display: none; }

  /* Sidebar collapse toggle — small pill button pinned to the top of the sidebar.
     Click to fold the sidebar to icon-only (60px) or unfold back to full width. */
  .sidebar-toggle-row {
    display: flex;
    justify-content: flex-end;
    padding: 0 0.2rem 0.4rem;
    margin-bottom: 0.2rem;
    position: sticky;
    top: -0.8rem;
    background: var(--panel);
    z-index: 2;
    padding-top: 0.2rem;
  }
  body.sidebar-collapsed .sidebar-toggle-row { justify-content: center; }
  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--soft);
    width: 2.25rem; height: 2.25rem;
    min-width: 2.25rem;
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms, transform 200ms ease;
  }
  .sidebar-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  @media (max-width: 720px) { .sidebar-toggle-row { display: none; } }

  /* Collapsed-state visibility rules — desktop only. */
  @media (min-width: 721px) {
    body.sidebar-collapsed .nav-label { display: none; }
    body.sidebar-collapsed .home-btn {
      justify-content: center;
      padding: 0.55rem 0.3rem;
      gap: 0;
    }
    body.sidebar-collapsed .home-btn > span:not(.icon) { display: none; }
    body.sidebar-collapsed .cat { margin: 0.2rem 0.25rem; }
    body.sidebar-collapsed .cat-head {
      padding: 0.45rem 0.3rem;
      justify-content: center;
      gap: 0.4rem;
    }
    body.sidebar-collapsed .cat-name,
    body.sidebar-collapsed .cat-latest,
    body.sidebar-collapsed .cat-toggle { display: none; }
    body.sidebar-collapsed .cat-dates,
    body.sidebar-collapsed .cat.open .cat-dates { display: none; }
    body.sidebar-collapsed .cat-color { height: 20px; }
  }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--soft); padding: 0.4rem 0.8rem 0.2rem; font-weight: 600;
  }

  .cat {
    margin: 0.2rem 0.4rem;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 0.7rem;
    cursor: pointer;
    border-radius: 7px;
    transition: background 120ms;
    min-height: 2.5rem;
  }
  .cat-head:hover { background: var(--rule-soft); }
  .cat.active .cat-head { background: var(--rule-soft); }
  .cat-color { width: 6px; height: 22px; border-radius: 2px; flex: none; }
  .cat-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted); line-height: 1.35; min-height: 1.7rem;
  }
  /* Settings cluster at the bottom of the sidebar — single horizontal row
     with theme toggle and language picker side-by-side. Pinned via its own
     margin-top:auto so it always floats to the foot of the sidebar, while
     the category groups (Newsletter, Lernen, …) stack flush from the top. */
  .settings-row {
    margin: auto 0.4rem 0;   /* auto = push to bottom of flex column */
    padding: 0.6rem 0;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.6rem;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-height: 2.1rem;
    transition: background 120ms, border-color 120ms;
  }
  .settings-btn:hover { background: var(--rule-soft); border-color: var(--soft); }
  .settings-btn:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .theme-toggle { flex: 1 1 auto; }
  .theme-icon { font-size: 1rem; line-height: 1; }

  /* Language picker — single trigger button showing the current flag
     (and short label). Click opens an upward-anchored dropdown with all
     four locale options. Each option carries its flag + native name. */
  .lang-picker { position: relative; flex: 0 0 auto; }
  .lang-trigger { padding: 0.45rem 0.55rem; }
  .lang-flag { font-size: 1.05rem; line-height: 1; }
  .lang-caret { font-size: 0.6rem; color: var(--soft); margin-left: 0.1rem; }
  .lang-menu {
    position: absolute;
    bottom: calc(100% + 0.35rem);
    right: 0;
    min-width: 9.5rem;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 7px;
    box-shadow: var(--shadow-lift);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    z-index: 50;
  }
  .lang-menu[hidden] { display: none; }
  .lang-option {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.45rem 0.55rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    transition: background 120ms, color 120ms;
  }
  .lang-option:hover { background: var(--rule-soft); }
  .lang-option:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }
  .lang-option[aria-selected="true"] {
    background: var(--accent-text);
    color: var(--bg);
  }
  .lang-option .lang-flag { font-size: 1.15rem; }

  /* Collapsed sidebar: hide the text labels, keep icons + flag visible. */
  body.sidebar-collapsed .theme-label,
  body.sidebar-collapsed .lang-label-short,
  body.sidebar-collapsed .lang-caret { display: none; }
  body.sidebar-collapsed .settings-row { flex-direction: column; gap: 0.25rem; }
  body.sidebar-collapsed .settings-btn { width: 100%; justify-content: center; padding: 0.45rem 0.3rem; }
  body.sidebar-collapsed .lang-menu { right: auto; left: calc(100% + 0.35rem); bottom: 0; }

  .sidebar { display: flex; flex-direction: column; }
  /* Category groups (Newsletter, Lernen, future ones) stack flush from
     the top — no flex-grow on the lists. .settings-row has margin-top:auto,
     so it consumes the leftover space and stays pinned to the foot. */

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;
  }
  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }
  /* Suppress the external-link arrow inside TL;DR snippets — too noisy. */
  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);
    border: 1px solid var(--rule);
    border-radius: var(--radius-inline);
    padding: 0.02rem 0.3rem;
    text-transform: uppercase;
    flex: none;
  }

  .tldr-read {
    background: transparent; border: none; color: var(--fg);
    font-family: var(--font-mono);
    font-weight: 600; cursor: pointer;
    font-size: 0.78rem; text-align: left;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;
    min-height: 2.25rem;
    border-radius: var(--radius-inline);
  }
  .tldr-read:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tldr-read:hover { text-decoration: underline; }
  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;
  }

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,
     and self-evidently dormant. Not clickable. */
  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;
    box-shadow: none;
  }
  .tldr-card--empty .tile-date {
    color: var(--rule);
  }
  .tldr-empty-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 1.2rem 0.4rem 0.8rem;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
    margin: 0.4rem 0 0;
  }
  .tldr-empty-kicker {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    color: var(--accent, var(--muted));
    font-weight: 600;
  }
  .tldr-empty-msg {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    margin: 0;
  }

  /* Per-category accents — each card scopes its own --accent and
     --accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --accent: var(--c-economy);        --accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --accent: var(--c-software);       --accent-text: var(--c-software-text); }
  .tldr-card[data-cat="ai-dev"]         { --accent: var(--c-ai-dev);         --accent-text: var(--c-ai-dev-text); }
  .tldr-card[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases);    --accent-text: var(--c-ai-usecases-text); }
  .tldr-card[data-cat="football"]       { --accent: var(--c-football);       --accent-text: var(--c-football-text); }
  .tldr-card[data-cat="family"]         { --accent: var(--c-family);         --accent-text: var(--c-family-text); }
  .tldr-card[data-cat="jobs"]           { --accent: var(--c-jobs);           --accent-text: var(--c-jobs-text); }
  .tldr-card[data-cat="learn-language"] { --accent: var(--c-learn-language); --accent-text: var(--c-learn-language-text); }
  .tldr-card[data-cat="motorsport"]     { --accent: var(--c-motorsport);     --accent-text: var(--c-motorsport-text); }
  .tldr-card[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto);  --accent-text: var(--c-stocks-crypto-text); }

  .tldr-card .tldr-read { color: var(--accent-text); }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); pointer-events: none; opacity: 0;
    transition: opacity 150ms;
    color: var(--muted); font-size: 0.85rem;
  }
  .loading.show { opacity: 1; }

  /* Color helpers per category */
  [data-cat="economy"]        .cat-color { background: var(--c-economy); }
  [data-cat="software"]       .cat-color { background: var(--c-software); }
  [data-cat="ai-dev"]         .cat-color { background: var(--c-ai-dev); }
  [data-cat="ai-usecases"]    .cat-color { background: var(--c-ai-usecases); }
  [data-cat="football"]       .cat-color { background: var(--c-football); }
  [data-cat="family"]         .cat-color { background: var(--c-family); }
  [data-cat="jobs"]           .cat-color { background: var(--c-jobs); }
  [data-cat="learn-language"] .cat-color { background: var(--c-learn-language); }
  [data-cat="motorsport"]     .cat-color { background: var(--c-motorsport); }
  [data-cat="stocks-crypto"]  .cat-color { background: var(--c-stocks-crypto); }

  /* Sidebar rows scope their own --accent so the archive calendar's border,
     day rings and selected-day fill match the category colour. */
  .cat[data-cat="economy"]        { --accent: var(--c-economy); }
  .cat[data-cat="software"]       { --accent: var(--c-software); }
  .cat[data-cat="ai-dev"]         { --accent: var(--c-ai-dev); }
  .cat[data-cat="ai-usecases"]    { --accent: var(--c-ai-usecases); }
  .cat[data-cat="football"]       { --accent: var(--c-football); }
  .cat[data-cat="family"]         { --accent: var(--c-family); }
  .cat[data-cat="jobs"]           { --accent: var(--c-jobs); }
  .cat[data-cat="learn-language"] { --accent: var(--c-learn-language); }
  .cat[data-cat="motorsport"]     { --accent: var(--c-motorsport); }
  .cat[data-cat="stocks-crypto"]  { --accent: var(--c-stocks-crypto); }

  /* Home button — mirrors the .cat-head structure below: black accent bar
     on the left (the dashboard's "house" colour, equivalent to the
     coloured bars on categories), then a small favicon-style M brand
     mark in the icon slot, then "Übersicht" label. Same baseline grid as
     the categories, just with the dashboard's own identity. */
  .home-btn {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.55rem 0.75rem;
    margin: 0 0.4rem 0.5rem; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    color: var(--fg);
    transition: background 120ms;
    min-height: 2.25rem;
  }
  .home-btn:hover { background: var(--rule-soft); }
  .home-btn.active { background: var(--quote); }
  .home-btn .cat-color { background: var(--fg); }   /* dashboard's "black accent" */
  /* Brand mark = the favicon design at category-icon size: dark frame,
     cream page, red double-rule masthead, dark serif M. Reads as the
     "house newspaper" tile next to the label. Same width as .cat-icon
     emojis so all sidebar rows align on identical icon footprints. */
  .home-btn .brand-mark {
    width: 1.15rem;
    height: 1.15rem;
    flex: none;
  }
  .home-btn:focus-visible,
  .cat-head:focus-visible,
  .cat-toggle:focus-visible,
  .cat-date:focus-visible,
  .sidebar-toggle:focus-visible {
    outline: 2px solid var(--accent, var(--fg));
    outline-offset: 2px;
  }

  /* Mobile breadcrumb bar — only visible under 720px. Replaces the full sidebar
     with a compact "where am I" indicator plus a hamburger to open the drawer. */
  .mobile-nav-bar { display: none; }
  .mobile-backdrop { display: none; }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / tablet responsiveness for the dashboard chrome itself
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app {
      padding: 0.55rem 1rem;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    header.app .title { font-size: 1.2rem; }
    header.app .sub { font-size: 0.7rem; }

    /* Sticky breadcrumb — pinned to the top of the viewport so the user
       always knows which section + date they're in, even after scrolling
       into a long brief. Translucent + backdrop-blur for a native feel. */
    .mobile-nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    /* Fall back to opaque background for browsers without backdrop-filter
       (mainly older Firefox builds) so the breadcrumb never sits over
       unreadable content. */
    @supports not (backdrop-filter: blur(2px)) {
      .mobile-nav-bar { background: var(--panel); }
    }
    .mobile-nav-burger {
      background: transparent;
      border: 1px solid var(--rule);
      width: 2.4rem; height: 2.4rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
    }
    .mobile-nav-burger:hover { background: var(--rule-soft); }
    .mobile-nav-burger:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
    .mobile-breadcrumb {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-display);
      font-variation-settings: "opsz" 24, "SOFT" 50;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .crumb {
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      flex-shrink: 0;
    }
    .mobile-breadcrumb .crumb.muted { color: var(--soft); }
    .mobile-breadcrumb .crumb.current {
      font-weight: 700;
      flex-shrink: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mobile-breadcrumb .sep {
      color: var(--rule);
      flex: none;
    }

    .app-shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      /* dvh = dynamic viewport height — shrinks when mobile browser chrome
         appears so content + iframe never hide behind the URL/toolbar.
         Static `100vh` fallback for browsers without dvh support. */
      height: calc(100vh - 96px);
      height: calc(100dvh - 96px);
    }

    /* Sidebar becomes an overlay drawer.
       Height: 100dvh (dynamic viewport height) so the drawer shrinks when
       mobile browser chrome (URL bar, bottom toolbar) appears — otherwise
       `100vh` (largest viewport) puts the settings-row below the browser
       toolbar and the user can't reach it. `100vh` is the fallback for
       browsers that don't yet support dvh.
       Padding-bottom: env(safe-area-inset-bottom) leaves room for the iOS
       home-indicator gesture area on iPhones without a hardware button.
       overflow-y: auto: when content (e.g., many categories + Lernen group
       + settings) exceeds the available height, the sidebar scrolls. */
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      left: -88%;
      z-index: 100;
      width: 84%;
      max-width: 320px;
      max-height: none;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-right: 1px solid var(--rule) !important;
      border-bottom: none !important;
      transition: left 220ms ease;
      box-shadow: none;
      padding-top: 0.85rem;
    }
    .sidebar.open {
      left: 0;
      box-shadow: 8px 0 30px rgba(0,0,0,.35);
    }

    .mobile-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    .mobile-backdrop.show {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    .home { padding: 1rem 1rem 1.5rem; }
    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0.5rem 0.75rem; }
    header.app .title { font-size: 1.05rem; }
    header.app .sub { font-size: 0.66rem; }
    .mobile-nav-bar { padding: 0.45rem 0.7rem; }
    .mobile-breadcrumb { font-size: 0.85rem; }
    .sidebar { padding: 0.6rem 0.4rem 0.7rem; }
    .home { padding: 0.85rem 0.85rem 1.2rem; }
    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }
    .tldr-card-body .tldr li { font-size: 0.8rem; }
  }

  /* ────────────────────────────────────────────────────────────────────
     Print — when the user prints the dashboard, hide all chrome (top
     bar, sidebar, mobile drawer) and let the iframe content (or home
     grid) take the full page. Same-origin iframes print their content
     natively in Chromium/Firefox/Safari, so the visible newsletter
     prints with its own @media print rules from lib/styles.css.
     ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Print styling now lives in lib/styles.css (no-cache), loaded on demand by
       the Drucken flow before window.print(). This fallback only hides chrome
       for a stray browser-menu print before lib has loaded. */
    header.app, .mobile-nav-bar, .mobile-backdrop, .sidebar, .loading, .print-dialog {
      display: none !important;
    }
    /* Let body grow past the viewport so a long print isn't clipped to one
       page (screen layout pins html/body to 100% with overflow:hidden). */
    html, body { height: auto !important; overflow: visible !important; }
    .app-shell { display: block !important; height: auto !important; grid-template-columns: none !important; }
  }

  /* ──────────────────────────────────────────────────────────────────
     Print dialog (screen) — native <dialog> styled to match the
     dashboard chrome. The actual print-rendering rules sit further
     below in the @media print block.
     ────────────────────────────────────────────────────────────────── */
  .print-dialog {
    padding: 1.3rem 1.5rem 1.1rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    min-width: min(420px, calc(100vw - 2rem));
    max-width: 540px;
    box-shadow: var(--shadow-lift);
    font-family: var(--font-body);
  }
  .print-dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  .print-dialog h2 {
    margin: 0 0 0.3rem;
    font-family: var(--font-display);
    font-size: 1.35rem;
    color: var(--fg);
  }
  .print-dialog-lead {
    margin: 0 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .print-options {
    list-style: none;
    padding: 0;
    margin: 0 0 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .print-options li { margin: 0; }
  .print-options label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0.5rem;
    cursor: pointer;
    border-radius: 5px;
    transition: background 120ms;
  }
  .print-options label:hover { background: var(--rule-soft); }
  .print-options input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .print-options .opt-icon { font-size: 1.1rem; flex: none; width: 1.4rem; text-align: center; }
  .print-options .opt-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--soft);
  }
  .print-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.55rem;
    border-top: 1px solid var(--rule);
    padding-top: 0.9rem;
  }
  .print-cancel, .print-run {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .print-cancel {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rule);
  }
  .print-cancel:hover { background: var(--rule-soft); }
  .print-run {
    background: var(--accent-text);
    color: var(--bg);
    border: 1px solid var(--accent-text);
  }
  .print-run:hover { filter: brightness(1.05); }
  .print-run:disabled { opacity: 0.5; cursor: progress; }

  /* Print-root is invisible on screen. */
  .print-root[hidden] { display: none !important; }

  /* ──────────────────────────────────────────────────────────────────
     PRINT MODE — A4 portrait, broadsheet feel. Activated by adding
     body.printing before window.print() runs.
     ────────────────────────────────────────────────────────────────── */
  /* Dashboard + print-root print styling moved to lib/styles.css (no-cache). */
</style>
</head>
<body>

<header class="app">
  <span class="title">Daniels Morning Briefs</span>
</header>

<!-- Mobile-only nav bar with hamburger + breadcrumb. Hidden on desktop. -->
<nav class="mobile-nav-bar" aria-label="Mobile-Navigation">
  <button class="mobile-nav-burger" id="mobile-burger" type="button" aria-label="Menü öffnen">☰</button>
  <div class="mobile-breadcrumb" id="mobile-breadcrumb">
    <span class="crumb current">🏠 Übersicht</span>
  </div>
</nav>

<div class="mobile-backdrop" id="mobile-backdrop"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button"
              aria-label="Seitenleiste einklappen" title="Seitenleiste einklappen">«</button>
    </div>
    <div class="home-btn active" id="home-btn" role="button" tabindex="0" title="Übersicht">
      <span class="cat-color"></span>
      <!-- Full favicon design inline: dark frame + cream page + red
           double-rule + serif M. Identical SVG to favicon.svg so the
           browser tab and the home button read as the same "house" mark. -->
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="9" fill="#221a13"/>
        <rect x="2.5" y="2.5" width="59" height="59" rx="7" fill="#f1e7d3"/>
        <rect x="9" y="12" width="46" height="2.5" fill="#b9462a"/>
        <rect x="9" y="17" width="46" height="2" fill="#b9462a"/>
        <text x="32" y="52" font-family="Georgia, 'Times New Roman', serif"
              font-weight="800" font-size="38" text-anchor="middle" fill="#1f1812">M</text>
      </svg>
      <span>Übersicht</span>
    </div>
    <div id="nav-groups"><!-- populated by JS from NAV_GROUPS: grouped category
         nav (Wirtschaft / IT / jobs / Sport / Freizeit / Sprachen), each group
         with its own .nav-label header (standalone groups render headerless). --></div>

    <div class="settings-row">
      <button class="settings-btn theme-toggle" id="theme-toggle" type="button"
              aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten"
              data-theme-state="auto">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Auto</span>
      </button>
      <button class="settings-btn print-btn" id="print-btn" type="button"
              aria-label="Drucken" title="Drucken">
        <span aria-hidden="true">🖨</span>
      </button>
      <div class="lang-picker">
        <button class="settings-btn lang-trigger" id="lang-trigger" type="button"
                aria-haspopup="listbox" aria-expanded="false"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Gestern Abend lieferte Micron die Antwort, auf die der Markt seit zwei Sell-off-Tagen wartete — und es war ein klarer Beat: 41,5 Mrd. $ Umsatz, EPS 25,11 $ statt erwarteter 20,20 $, Q4 auf 50 Mrd. $ guided. Die Aktie steht vorbörslich +16,8 % bei 1.224 $, Nasdaq-100-Futures +1,8 %. Das KI-Memory-Narrativ ist (vorerst) gerettet. Im Kontrast dazu die andere Welt: Gold kracht erstmals seit November 2025 unter 4.000 $, der Dollar-Index steht auf 13-Monats-Hoch, und die Märkte preisen plötzlich eine Fed-<em>Erhöhung</em> im September ein. Heute 8:30 EDT kommen die Mai-PCE-Inflationsdaten — der eigentliche Makro-Test. Dieser Brief entsteht <strong>vor</strong> US-Börsenöffnung und <strong>vor</strong> dem PCE-Print: Aktien-Werte sind vorbörslich, PCE ist noch nicht da.</p>\n    <ul>\n      <li><span class=\"chip good\">MICRON</span> <strong>Blowout-Quartal</strong>: Q3 FY2026 mit <strong>41,5 Mrd. $</strong> Umsatz (+346 % YoY), EPS <strong>25,11 $</strong> vs. 20,20 $ erwartet (+24 % Beat); Q4 auf <strong>50 Mrd. $</strong> guided (~14,5 % über Konsens). Vorbörslich <strong>+16,8 % auf 1.224 $</strong> (Schluss 24.06.: 1.048,51 $).</li>\n      <li><span class=\"chip good\">FUTURES</span> <strong>Markt dreht ins Plus</strong>: Nasdaq-100-Futures <strong>+1,8 %</strong>, S&amp;P-500-Futures +0,5 %, Dow flat (25.06. vor Open) — Micron zieht den ganzen KI-Infra-Komplex mit.</li>\n      <li><span class=\"chip hot\">ANTHROPIC</span> <strong>Diese Kategorie besitzt es</strong>: Series H über <strong>65 Mrd. $</strong> bei <strong>965 Mrd. $</strong> Post-Money (Closing 28.05.); vertrauliche S-1 am 01.06. eingereicht, Nasdaq-IPO im Oktober 2026 angepeilt. ARR über <strong>47 Mrd. $</strong>. Anthropic führt damit OpenAI (852 Mrd. $) in der privaten Bewertung an.</li>\n      <li><span class=\"chip\">SPACEX</span> <strong>SPCX im Live-Handel</strong>: IPO am 12.06. zu 135 $, Schluss 24.06. <strong>154,54 $ (−1,0 %)</strong>, vorbörslich +1,5 %. Mit xAI fusioniert; Google zahlt 920 Mio. $/Monat, Anthropic 1,25 Mrd. $/Monat für Compute.</li>\n      <li><span class=\"chip hot\">GOLD</span> <strong>Unter 4.000 $</strong>: Spot <strong>3.989 $</strong> (−0,26 %), tiefster Stand seit Nov 2025, −20 % vom Januar-Hoch. Treiber: DXY auf <strong>~101,6</strong> (13-Monats-Hoch) und 68 % Wahrscheinlichkeit für eine Fed-Erhöhung im September (vor einer Woche: 29 %).</li>\n      <li><span class=\"chip hot\">MAKRO</span> <strong>PCE heute 8:30 EDT</strong>: Mai-Inflationsdaten <em>noch nicht erschienen</em>. Konsens: Kern-PCE +3,3 % YoY, Headline +4,1 %. Bei einem Wert über Konsens droht ein Risk-off-Schub — heute der entscheidende Makro-Trigger.</li>\n      <li><span class=\"chip\">KRYPTO</span> <strong>Schwach</strong>: BTC <strong>61.641 $</strong> (−4,2 % 7d), ETH <strong>1.652 $</strong> (−5,4 % 7d); Spot-ETFs bluteten 3,4 Mrd. $ in einer Woche (IBIT −980 Mio. $, schlechteste Woche je). Treiber ist die 10-J-Rendite bei 4,42 %, nicht ein Krypto-Bruch.</li>\n      <li><span class=\"chip good\">ÖL</span> <strong>Brent 72,32 $ / WTI 69,17 $</strong> (je ~−1,8 %, 25.06.) — mehr Tanker durch Hormuz, US-Iran-Gespräche dämpfen die Angebots-Angst.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Last night, Micron delivered the answer the market had been waiting for after two days of selling — and it was a clear beat: $41.5B revenue, EPS $25.11 vs. expected $20.20, Q4 guided to $50B. The stock is up 16.8% pre-market at $1,224, Nasdaq-100 futures +1.8%. The AI-memory narrative is (for now) saved. In stark contrast: gold crashes below $4,000 for the first time since November 2025, the Dollar Index hits a 13-month high, and markets are suddenly pricing in a Fed <em>rate hike</em> in September. Today at 8:30 EDT comes May PCE inflation data — the real macro test. This brief is written <strong>before</strong> US market open and <strong>before</strong> the PCE print: stock values are pre-market, PCE is not yet published.</p>\n    <ul>\n      <li><span class=\"chip good\">MICRON</span> <strong>Blowout quarter</strong>: Q3 FY2026 with <strong>41.5B revenue</strong> (+346% YoY), EPS <strong>$25.11</strong> vs. $20.20 expected (+24% beat); Q4 guided to <strong>$50B</strong> (~14.5% above consensus). Pre-market <strong>+16.8% at $1,224</strong> (close 6/24: $1,048.51).</li>\n      <li><span class=\"chip good\">FUTURES</span> <strong>Market turns positive</strong>: Nasdaq-100 futures <strong>+1.8%</strong>, S&amp;P-500 futures +0.5%, Dow flat (6/25 pre-open) — Micron pulls the entire AI-infrastructure complex with it.</li>\n      <li><span class=\"chip hot\">ANTHROPIC</span> <strong>This category owns it</strong>: Series H of <strong>$65B</strong> at <strong>$965B</strong> post-money (closed 5/28); confidential S-1 filed 6/1, Nasdaq IPO targeted for October 2026. ARR over <strong>$47B</strong>. Anthropic now leads OpenAI ($852B) in private valuation.</li>\n      <li><span class=\"chip\">SPACEX</span> <strong>SPCX in live trading</strong>: IPO on 6/12 at $135, close 6/24 <strong>$154.54 (−1.0%)</strong>, pre-market +1.5%. Merged with xAI; Google pays $920M/month, Anthropic $1.25B/month for compute.</li>\n      <li><sp       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Tag gehört der Lieferkette: ein selbst-replizierender Wurm steckt sich in die Hook-Schicht von KI-Coding-Tools und hat über 100 npm- und PyPI-Pakete vergiftet — derselbe Mechanismus, mit dem du jeden Morgen <code>npm install</code> tippst. Drumherum: zwei Chip-Deals, die Nvidias Burggraben angreifen, ein Microsoft-Patch-Tuesday in Rekordgröße und eine UniFi-Lücke mit der höchsten denkbaren Kerbe.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Miasma/Shai-Hulud</strong>: 100+ npm/PyPI-Pakete, 471 bösartige Artefakte; injiziert sich in die SessionStart-Hooks von 13 KI-Coding-Tools, fälscht SLSA-Provenance, kein CVE.</li>\n      <li><span class=\"chip\">INFRA</span> <span class=\"chip\">USA</span> <strong>OpenAI × Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-ASIC, laut Berichten reticle-sized auf TSMC N3; Ziel ~50 % günstigere Inferenz vs. Nvidia, Roll-out Ende 2026.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm kauft Modular</strong> für 3,92 Mrd. $ (all-stock) — Mojo + MAX als hardware-agnostische CUDA-Alternative; Closing 2. HJ 2026.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">USA</span> <strong>Patch Tuesday Juni</strong>: 208 CVEs (Rekord), 37 Critical, 3 Zero-Days; zwei wormable RCEs mit CVSS 9.8 im Windows-Kernel und HTTP.sys.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Ubiquiti UniFi</strong>: drei CVSS-10.0-Lücken, verkettbar zur Voll-Übernahme, aktiv ausgenutzt, seit 23.06 in der CISA-KEV-Liste.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Splunk &amp; Cisco</strong>: Splunk-RCE (CVSS 9.8) aktiv ausgenutzt; Cisco loggt seinen 7. SD-WAN-Zero-Day des Jahres.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">Global</span> <strong>KDDI Japan</strong>: 14,22 Mio. E-Mail-Zugangsdaten über sechs Provider geleakt — Drittsoftware-Lücke.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Spring Boot 3.5 EOL am 30.06</strong>; 4.1.0 ist seit 10.06 draußen. Docker Engine 29.6.0 mit zwei Security-Fixes.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU CRA</strong>: BSI hat die Konformitäts-Stellen notifiziert — ab 11.09 wird Meldepflicht für vernetzte Produkte scharf.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">USA</span> <strong>SpaceX als GPU-Vermieter</strong>: Google zahlt 920 Mio. $/Monat, dazu 6,3 Mrd. $ von Reflection AI — Colossus wird zur Compute-Bank.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Tag gehört der Lieferkette: ein selbst-replizierender Wurm steckt sich in die Hook-Schicht von KI-Coding-Tools und hat über 100 npm- und PyPI-Pakete vergiftet — derselbe Mechanismus, mit dem du jeden Morgen <code>npm install</code> tippst. Drumherum: zwei Chip-Deals, die Nvidias Burggraben angreifen, ein Microsoft-Patch-Tuesday in Rekordgröße und eine UniFi-Lücke mit der höchsten denkbaren Kerbe.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Miasma/Shai-Hulud</strong>: 100+ npm/PyPI-Pakete, 471 bösartige Artefakte; injiziert sich in die SessionStart-Hooks von 13 KI-Coding-Tools, fälscht SLSA-Provenance, kein CVE.</li>\n      <li><span class=\"chip\">INFRA</span> <span class=\"chip\">USA</span> <strong>OpenAI × Broadcom „Jalapeño\"</strong>: erster eigener Inferenz-ASIC, laut Berichten reticle-sized auf TSMC N3; Ziel ~50 % günstigere Inferenz vs. Nvidia, Roll-out Ende 2026.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm kauft Modular</strong> für 3,92 Mrd. $ (all-stock) — Mojo + MAX als hardware-agnostische CUDA-Alternative; Closing 2. HJ 2026.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">USA</span> <strong>Patch Tuesday Juni</strong>: 208 CVEs (Rekord), 37 Critical, 3 Zero-Days; zwei wormable RCEs mit CVSS 9.8 im Windows-Kernel und HTTP.sys.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Ubiquiti UniFi</strong>: drei CVSS-10.0-Lücken, verkettbar zur Voll-Übernahme, aktiv ausgenutzt, seit 23.06 in der CISA-KEV-Liste.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Splunk &amp; Cisco</strong>: Splunk-RCE (CVSS 9.8) aktiv ausgenutzt; Cisco loggt seinen 7. SD-WAN-Zero-Day des Jahres.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">Global</span> <strong>KDDI Japan</strong>: 14,22 Mio. E-Mail-Zugangsdaten über sechs Provider geleakt — Drittsoftware-Lücke.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Spring Boot 3.5 EOL am 30.06</strong>; 4.1.0 ist seit 10.06 draußen. Docker Engine 29.6.0 mit zwei Security-Fixes.</li>\n      <li><span class=\"chip\">Regulierung</span> <span class=\"chip\">EU</span> <strong>EU CRA</strong>: BSI hat die Konformitäts-Stellen notifiziert — ab 11.09 wird Meldepflicht für vernetzte Produkte scharf.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">USA</span> <strong>SpaceX als GPU-Vermieter</strong>: Google zahlt 920 Mio. $/Monat, dazu 6,3 Mrd. $ von Reflection AI — Colossus wird zur Compute-Bank.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today belongs to supply chain: a self-replicating worm burrowed into the hook layer of AI coding tools and has poisoned over 100 npm and PyPI packages — the same mechanism you type <code>npm install</code> with every morning. Around it: two chip deals taking aim at Nvidia's moat, a Microsoft Patch Tuesday of record size, and a UniFi vulnerability with the highest possible score.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Miasma/Shai-Hulud</strong>: 100+ npm/PyPI packages, 471 malicious artifacts; injects itself into SessionStart hooks of 13 AI coding tools, forges SLSA provenance, no CVE.</li>\n      <li><span class=\"chip\">INFRA</span> <span class=\"chip\">USA</span> <strong>OpenAI × Broadcom \"Jalapeño\"</strong>: first custom inference ASIC, reportedly reticle-sized on TSMC N3; target ~50% cheaper inference vs. Nvidia, rollout end of 2026.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm acquires Modular</strong> for $3.92B (all-stock) — Mojo + MAX as hardware-agnostic CUDA alternative; closing H2 2026.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">USA</span> <strong>Patch Tuesday June</strong>: 208 CVEs (record), 37 Critical, 3 Zero-Days; two wormable RCEs scoring 9.8 in Windows kernel and HTTP.sys.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Ubiquiti UniFi</strong>: three CVSS-10.0 flaws, chainable to full takeover, actively exploited, in CISA KEV list since 06-23.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Splunk &amp; Cisco</strong>: Splunk RCE (CVSS 9.8) actively exploited; Cisco logs its 7th SD-WAN zero-day of the year.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">Global</span> <strong>KDDI Japan</strong>: 14.22M email credentials leaked across six ISPs — third-party software flaw.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Spring Boot 3.5 EOL 06-30</strong>; 4.1.0 out since 06-10. Docker Engine 29.6.0 with two security fixes.</li>\n      <li><span class=\"chip\">Regulation</span> <span class=\"chip\">EU</span> <strong>EU CRA</strong>: BSI notified conformity bodies — starting 09-11, reporting requirement active for networked products.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">USA</span> <strong>SpaceX as GPU landlord</strong>: Google pays $920M/month, plus $6.3B from Reflection AI — Colossus becomes a compute bank.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Hoje pertence à cadeia de suprimentos: um worm auto-replicante se infiltrou na camada de hooks de ferramentas de codificação com IA e envenenou mais de 100 pacotes npm e PyPI — o mesmo mecanismo com o qual você digita <code>npm install</code> toda manhã. Ao redor: dois negócios de chips que miram no fosso da Nvidia, um Patch Tuesday da Microsoft com tamanho recorde e uma vulnerabilidade UniFi com a pontuação mais alta possível.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Miasma/Shai-Hulud</strong>: 100+ pacotes npm/PyPI, 471 artefatos maliciosos; injeta-se nos hooks SessionStart de 13 ferramentas de codificação com IA, falsifica proveniência SLSA, sem CVE.</li>\n      <li><span class=\"chip\">INFRA</span> <span class=\"chip\">USA</span> <strong>OpenAI × Broadcom \"Jalapeño\"</strong>: primeiro ASIC de inferência customizado, segundo relatos dimensionado para reticle na TSMC N3; objetivo ~50% de inferência mais barata vs. Nvidia, lançamento fim de 2026.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm adquire Modular</strong> por R$ 19,6 bilhões (todas as ações) — Mojo + MAX como alternativa CUDA agnóstica a hardware; encerramento 2º semestre 2026.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">USA</span> <strong>Patch Tuesday junho</strong>: 208 CVEs (recorde), 37 críticas, 3 zero-days; dois RCEs capazes de worm com pontuação 9,8 no kernel Windows e HTTP.sys.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Ubiquiti UniFi</strong>: três falhas CVSS-10,0, encadeáveis para controle total, exploradas ativamente, em lista CISA KEV desde 23-06.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Splunk &amp; Cisco</strong>: Splunk RCE (CVSS 9,8) explorada ativamente; Cisco registra seu 7º zero-day SD-WAN do ano.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">Global</span> <strong>KDDI Japan</strong>: 14,22 milhões de credenciais de e-mail vazadas em seis provedores — falha de software terceirizado.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Spring Boot 3,5 EOL em 30-06</strong>; 4.1.0 saiu em 10-06. Docker Engine 29.6.0 com dois consertos de segurança.</li>\n      <li><span class=\"chip\">Regulação</span> <span class=\"chip\">EU</span> <strong>EU CRA</strong>: BSI notificou órgãos de conformidade — a partir de 11-09, obrigação de reporte para produtos conectados.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">USA</span> <strong>SpaceX como locador de GPU</strong>: Google paga R$ 4,6 bilhões/mês, mais R$ 31,5 bilhões de Reflection AI — Colossus vira banco de compute.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Hoy pertenece a la cadena de suministros: un gusano autorreplicante se infiltró en la capa de hooks de herramientas de codificación con IA y envenenó más de 100 paquetes npm y PyPI — el mismo mecanismo con el que escribes <code>npm install</code> cada mañana. Alrededor: dos negocios de chips apuntando al foso de Nvidia, un Patch Tuesday de Microsoft de tamaño récord y una vulnerabilidad UniFi con la puntuación más alta posible.</p>\n    <ul>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Miasma/Shai-Hulud</strong>: 100+ paquetes npm/PyPI, 471 artefactos maliciosos; se inyecta en los hooks SessionStart de 13 herramientas de codificación con IA, falsifica proveniencia SLSA, sin CVE.</li>\n      <li><span class=\"chip\">INFRA</span> <span class=\"chip\">USA</span> <strong>OpenAI × Broadcom \"Jalapeño\"</strong>: primer ASIC de inferencia personalizado, según relatos tamaño reticle en TSMC N3; objetivo ~50% de inferencia más barata vs. Nvidia, lanzamiento fin de 2026.</li>\n      <li><span class=\"chip\">M&amp;A</span> <span class=\"chip\">USA</span> <strong>Qualcomm adquiere Modular</strong> por US$ 3,92 mil millones (todas las acciones) — Mojo + MAX como alternativa CUDA agnóstica de hardware; cierre 2º semestre 2026.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">USA</span> <strong>Patch Tuesday junio</strong>: 208 CVEs (récord), 37 críticas, 3 zero-days; dos RCEs capaces de gusano con puntuación 9,8 en kernel Windows y HTTP.sys.</li>\n      <li><span class=\"chip hot\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Ubiquiti UniFi</strong>: tres fallos CVSS-10,0, encadenables a control total, explotados activamente, en lista CISA KEV desde 23-06.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">GLOBAL</span> <strong>Splunk &amp; Cisco</strong>: Splunk RCE (CVSS 9,8) explotada activamente; Cisco registra su séptimo zero-day SD-WAN del año.</li>\n      <li><span class=\"chip\">SEC</span> <span class=\"chip\">Global</span> <strong>KDDI Japan</strong>: 14,22 millones de credenciales de correo electrónico filtradas en seis proveedores — fallo de software de terceros.</li>\n      <li><span class=\"chip\">Release</span> <span class=\"chip\">OSS</span> <strong>Spring Boot 3,5 EOL 30-06</strong>; 4.1.0 salió 10-06. Docker Engine 29.6.0 con dos correcciones de seguridad.</li>\n      <li><span class=\"chip\">Regulación</span> <span class=\"chip\">EU</span> <strong>EU CRA</strong>: BSI notificó organismos de conformidad — a partir de 11-09, obligación de reporte para productos conectados.</li>\n      <li><span class=\"chip\">Infra</span> <span class=\"chip\">USA</span> <strong>SpaceX como arrendador de GPU</strong>: Google paga US$ 920 millones/mes, más US$ 6,3 mil millones de Reflection AI — Colossus se convierte en banco de compute.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Claude Fable 5 führt jedes Coding-Leaderboard an — und ist seit dem 12. Juni für jeden Nicht-US-Bürger gesperrt, also auch für dich. Eine Export-Kontroll-Anordnung der US-Regierung zwingt Anthropic, das Modell weltweit für alle „foreign nationals\" abzuschalten. Der Rest der Werkzeugkiste rückt damit praktisch nach oben: Microsofts winziges MAI-Code-1-Flash, das weiter laufende Opus 4.8, Gemini 3.5 Flash. Ansonsten ein voller News-Tag — Anthropic kauft den SDK-Generator hinter den meisten APIs, und die IDEs drehen ihre Wochen-Updates.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 für dich gesperrt</strong>: US-Export-Direktive sperrt das Top-Coding-Modell für alle Nicht-US-Bürger weltweit — seit 12.06., bis heute nicht aufgehoben.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Pro</strong>: Fable 5 80,3 % vs. Opus 4.8 69,2 %, GPT-5.5 58,6 %, Gemini 3.1 Pro 54,2 % — Anbieter-Zahl, einordnen.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsofts 5B-Copilot-Modell schlägt Claude Haiku 4.5 (51,2 % vs. 35,2 % SWE-Bench Pro) bei ~60 % weniger Tokens — und ist erreichbar.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Anthropic kauft Stainless</strong>: der SDK-/MCP-Generator hinter OpenAI, Google, Cloudflare — &gt;300 Mio. $ berichtet, Mitte Mai.</li>\n      <li><span class=\"chip\">Tool</span> <strong>IDE-Wochen-Updates</strong>: Cursor 3.9 (Customize-Page), GitHub-Copilot-App GA mit BYOK, Cline-CLI lernt Skills, Claude Code 2.1.187.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro noch nicht GA</strong>: weiter nur Vertex-Preview, kein Termin. Öffentlich verfügbar ist nur 3.5 Flash.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Karpathy bei Anthropic</strong>: OpenAI-Mitgründer wechselte ins Pre-Training-Team, will Claude selbst fürs Training nutzen.</li>\n      <li><span class=\"chip\">Local</span> <strong>Cline + Fable 5</strong>: Cline hat schon Fable-5-Support gemerged — der dich, ironischerweise, ins Leere laufen lässt.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Claude Fable 5 führt jedes Coding-Leaderboard an — und ist seit dem 12. Juni für jeden Nicht-US-Bürger gesperrt, also auch für dich. Eine Export-Kontroll-Anordnung der US-Regierung zwingt Anthropic, das Modell weltweit für alle „foreign nationals\" abzuschalten. Der Rest der Werkzeugkiste rückt damit praktisch nach oben: Microsofts winziges MAI-Code-1-Flash, das weiter laufende Opus 4.8, Gemini 3.5 Flash. Ansonsten ein voller News-Tag — Anthropic kauft den SDK-Generator hinter den meisten APIs, und die IDEs drehen ihre Wochen-Updates.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 für dich gesperrt</strong>: US-Export-Direktive sperrt das Top-Coding-Modell für alle Nicht-US-Bürger weltweit — seit 12.06., bis heute nicht aufgehoben.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Pro</strong>: Fable 5 80,3 % vs. Opus 4.8 69,2 %, GPT-5.5 58,6 %, Gemini 3.1 Pro 54,2 % — Anbieter-Zahl, einordnen.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsofts 5B-Copilot-Modell schlägt Claude Haiku 4.5 (51,2 % vs. 35,2 % SWE-Bench Pro) bei ~60 % weniger Tokens — und ist erreichbar.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Anthropic kauft Stainless</strong>: der SDK-/MCP-Generator hinter OpenAI, Google, Cloudflare — &gt;300 Mio. $ berichtet, Mitte Mai.</li>\n      <li><span class=\"chip\">Tool</span> <strong>IDE-Wochen-Updates</strong>: Cursor 3.9 (Customize-Page), GitHub-Copilot-App GA mit BYOK, Cline-CLI lernt Skills, Claude Code 2.1.187.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro noch nicht GA</strong>: weiter nur Vertex-Preview, kein Termin. Öffentlich verfügbar ist nur 3.5 Flash.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Karpathy bei Anthropic</strong>: OpenAI-Mitgründer wechselte ins Pre-Training-Team, will Claude selbst fürs Training nutzen.</li>\n      <li><span class=\"chip\">Local</span> <strong>Cline + Fable 5</strong>: Cline hat schon Fable-5-Support gemerged — der dich, ironischerweise, ins Leere laufen lässt.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Claude Fable 5 tops every coding leaderboard — and has been locked out for every non-US citizen since June 12, including you. A US government export-control order forces Anthropic to disable the model worldwide for all \"foreign nationals\". The rest of the toolkit moves up in the rankings: Microsoft's tiny MAI-Code-1-Flash, Opus 4.8 still running, Gemini 3.5 Flash. Otherwise a packed news day — Anthropic acquires the SDK generator behind most APIs, and IDEs are rolling weekly updates.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 locked out for you</strong>: US export directive blocks top coding model for all non-US citizens worldwide — since 06/12, not yet lifted.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Pro</strong>: Fable 5 80.3% vs. Opus 4.8 69.2%, GPT-5.5 58.6%, Gemini 3.1 Pro 54.2% — vendor-reported, caveat emptor.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Microsoft's 5B Copilot model beats Claude Haiku 4.5 (51.2% vs. 35.2% SWE-Bench Pro) with ~60% fewer tokens — and it's accessible.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Anthropic acquires Stainless</strong>: the SDK/MCP generator behind OpenAI, Google, Cloudflare — >$300M reported, mid-May.</li>\n      <li><span class=\"chip\">Tool</span> <strong>IDE weekly updates</strong>: Cursor 3.9 (Customize Page), GitHub Copilot App GA with BYOK, Cline CLI learns Skills, Claude Code 2.1.187.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro not yet GA</strong>: still Vertex-Preview only, no ETA. Publicly available is only Gemini 3.5 Flash.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Karpathy joins Anthropic</strong>: OpenAI co-founder moves to Pre-Training team, wants Claude itself for training research.</li>\n      <li><span class=\"chip\">Local</span> <strong>Cline + Fable 5</strong>: Cline already merged Fable-5 support — which, ironically, leads you nowhere.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Claude Fable 5 lidera todos os rankings de codificação — e está bloqueado para todo não-cidadão dos EUA desde 12 de junho, incluindo você. Uma ordem de controle de exportação do governo dos EUA força a Anthropic a desativar o modelo globalmente para todos os \"nacionais estrangeiros\". O resto do kit de ferramentas sobe na classificação: o minúsculo MAI-Code-1-Flash da Microsoft, Opus 4.8 continuando, Gemini 3.5 Flash. Caso contrário, um dia de notícias cheio — Anthropic adquire o gerador de SDK por trás da maioria das APIs, e as IDEs estão fazendo atualizações semanais.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 bloqueado para você</strong>: Diretiva de exportação dos EUA bloqueia o melhor modelo de codificação para todos os não-cidadãos dos EUA em todo o mundo — desde 12/06, ainda não removido.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Pro</strong>: Fable 5 80,3% vs. Opus 4.8 69,2%, GPT-5.5 58,6%, Gemini 3.1 Pro 54,2% — informado pelo fornecedor, com ressalvas.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Modelo Copilot de 5B da Microsoft supera Claude Haiku 4.5 (51,2% vs. 35,2% SWE-Bench Pro) com ~60% menos tokens — e está acessível.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Anthropic adquire Stainless</strong>: o gerador de SDK/MCP por trás da OpenAI, Google, Cloudflare — >300 milhões de dólares relatados, meados de maio.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Atualizações semanais de IDE</strong>: Cursor 3.9 (Customize Page), GitHub Copilot App GA com BYOK, Cline CLI aprende Skills, Claude Code 2.1.187.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro ainda não é GA</strong>: ainda apenas Vertex Preview, sem ETA. Disponível publicamente apenas Gemini 3.5 Flash.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Karpathy se junta à Anthropic</strong>: Co-fundador da OpenAI passa para o time de Pré-Treinamento, quer Claude mesmo para pesquisa de treinamento.</li>\n      <li><span class=\"chip\">Local</span> <strong>Cline + Fable 5</strong>: Cline já mesclou suporte Fable-5 — que, ironicamente, leva você a lugar nenhum.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Claude Fable 5 encabeza todos los rankings de codificación — y está bloqueado para todo no-ciudadano estadounidense desde el 12 de junio, incluyéndote. Una orden de control de exportación del gobierno de EE.UU. obliga a Anthropic a desactivar el modelo globalmente para todos los \"ciudadanos extranjeros\". El resto del kit de herramientas sube en el ranking: el diminuto MAI-Code-1-Flash de Microsoft, Opus 4.8 continuando, Gemini 3.5 Flash. Caso contrario, un día de noticias repleto — Anthropic adquiere el generador de SDK detrás de la mayoría de APIs, e IDEs están lanzando actualizaciones semanales.</p>\n    <ul>\n      <li><span class=\"chip hot\">Claude</span> <strong>Fable 5 bloqueado para ti</strong>: Directiva de exportación de EE.UU. bloquea el mejor modelo de codificación para todos los no-ciudadanos estadounidenses en todo el mundo — desde el 12/06, aún no levantada.</li>\n      <li><span class=\"chip\">Bench</span> <strong>SWE-Bench Pro</strong>: Fable 5 80,3% vs. Opus 4.8 69,2%, GPT-5.5 58,6%, Gemini 3.1 Pro 54,2% — reportado por proveedor, toma con reservas.</li>\n      <li><span class=\"chip good\">Tool</span> <strong>MAI-Code-1-Flash</strong>: Modelo Copilot de 5B de Microsoft supera Claude Haiku 4.5 (51,2% vs. 35,2% SWE-Bench Pro) con ~60% menos tokens — y es accesible.</li>\n      <li><span class=\"chip\">MCP</span> <strong>Anthropic adquiere Stainless</strong>: el generador de SDK/MCP detrás de OpenAI, Google, Cloudflare — >300 millones de dólares reportados, mediados de mayo.</li>\n      <li><span class=\"chip\">Tool</span> <strong>Actualizaciones semanales de IDE</strong>: Cursor 3.9 (Customize Page), GitHub Copilot App GA con BYOK, Cline CLI aprende Skills, Claude Code 2.1.187.</li>\n      <li><span class=\"chip\">Google</span> <strong>Gemini 3.5 Pro aún no es GA</strong>: aún solo Vertex Preview, sin ETA. Disponible públicamente solo Gemini 3.5 Flash.</li>\n      <li><span class=\"chip\">Claude</span> <strong>Karpathy se une a Anthropic</strong>: Co-fundador de OpenAI se pasa al equipo de Pre-Training, quiere Claude mismo para investigación de entrenamiento.</li>\n      <li><span class=\"chip\">Local</span> <strong>Cline + Fable 5</strong>: Cline ya fusionó el soporte de Fable-5 — que, irónicamente, te lleva a ningún lado.</li>\n    </ul></div>"
