      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Tag hat einen klaren Aufhänger: die 19-Tage-Sperre über Anthropics stärkste Modelle ist heute aufgehoben. Das ist keine reine KI-Story, sondern ein Präzedenzfall dafür, wie eng Frontier-KI inzwischen an Exportkontrolle und nationaler Sicherheit hängt — genau die Frage, die jeden trifft, der ein US-Modell in einen Produktivbetrieb stellt. Daneben: ein neuer Biologie-Benchmark, der zeigt, wo die Grenze der Modelle real liegt, der weltgrößte Healthcare-KI-Rollout, und ein EU-Gesetz, das seinen härtesten Termin um 16 Monate verschiebt.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · GLOBAL</span> <strong>Fable 5 wieder online</strong>: Nach 19 Tagen Zwangs-Abschaltung ist Fable 5 heute global zurück, mit einem neuen Sicherheits-Klassifikator, der laut Anthropic in über 99 % der Fälle greift.</li>\n      <li><span class=\"chip\">POLICY · US</span> <strong>Mythos 5 nur US, „Project Glasswing\"</strong>: Das stärkere Cyber-Modell darf nur an US-Betreiber kritischer Infrastruktur — die Politik entscheidet mit, wer welches Modell bekommt.</li>\n      <li><span class=\"chip\">STUDY · GLOBAL</span> <strong>GeneBench-Pro: KI scheitert an ~70 %</strong>: OpenAIs neuer Biologie-Benchmark. Bestes Modell (GPT-5.6 Sol Pro) schafft nur 31,5 %. Ein ehrliches Grenz-Signal.</li>\n      <li><span class=\"chip good\">DEPLOY · UK · Health</span> <strong>NHS: 505.000 Klinik-Mitarbeiter auf Copilot</strong>: Der weltgrößte Healthcare-KI-Rollout. Pilot sparte 43 Min./Tag pro Person. Welle 1 startet diesen Monat.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>EU AI Act: Hochrisiko-Frist rutscht auf Dez 2027</strong>: Der „Digital Omnibus\" ist final beschlossen — der 2.-Aug-2026-Termin ist vom Tisch, 16 Monate mehr Luft.</li>\n      <li><span class=\"chip\">STUDY · GLOBAL</span> <strong>Deloitte: nur 25 % bringen Pilots in Produktion</strong>: Und nur 21 % haben eine reife Agent-Governance — bei ~75 %, die Agentic AI in zwei Jahren wollen. Die Lücke ist das Geschäft.</li>\n      <li><span class=\"chip\">CONTEXT · EU/DE</span> <strong>Souveränität rangiert oben</strong>: 83 % der Firmen halten „souveräne KI\" für strategisch wichtig, 77 % achten aufs Herkunftsland des Anbieters. Genau twiceDs Hebel.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Tag hat einen klaren Aufhänger: die 19-Tage-Sperre über Anthropics stärkste Modelle ist heute aufgehoben. Das ist keine reine KI-Story, sondern ein Präzedenzfall dafür, wie eng Frontier-KI inzwischen an Exportkontrolle und nationaler Sicherheit hängt — genau die Frage, die jeden trifft, der ein US-Modell in einen Produktivbetrieb stellt. Daneben: ein neuer Biologie-Benchmark, der zeigt, wo die Grenze der Modelle real liegt, der weltgrößte Healthcare-KI-Rollout, und ein EU-Gesetz, das seinen härtesten Termin um 16 Monate verschiebt.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · GLOBAL</span> <strong>Fable 5 wieder online</strong>: Nach 19 Tagen Zwangs-Abschaltung ist Fable 5 heute global zurück, mit einem neuen Sicherheits-Klassifikator, der laut Anthropic in über 99 % der Fälle greift.</li>\n      <li><span class=\"chip\">POLICY · US</span> <strong>Mythos 5 nur US, „Project Glasswing\"</strong>: Das stärkere Cyber-Modell darf nur an US-Betreiber kritischer Infrastruktur — die Politik entscheidet mit, wer welches Modell bekommt.</li>\n      <li><span class=\"chip\">STUDY · GLOBAL</span> <strong>GeneBench-Pro: KI scheitert an ~70 %</strong>: OpenAIs neuer Biologie-Benchmark. Bestes Modell (GPT-5.6 Sol Pro) schafft nur 31,5 %. Ein ehrliches Grenz-Signal.</li>\n      <li><span class=\"chip good\">DEPLOY · UK · Health</span> <strong>NHS: 505.000 Klinik-Mitarbeiter auf Copilot</strong>: Der weltgrößte Healthcare-KI-Rollout. Pilot sparte 43 Min./Tag pro Person. Welle 1 startet diesen Monat.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>EU AI Act: Hochrisiko-Frist rutscht auf Dez 2027</strong>: Der „Digital Omnibus\" ist final beschlossen — der 2.-Aug-2026-Termin ist vom Tisch, 16 Monate mehr Luft.</li>\n      <li><span class=\"chip\">STUDY · GLOBAL</span> <strong>Deloitte: nur 25 % bringen Pilots in Produktion</strong>: Und nur 21 % haben eine reife Agent-Governance — bei ~75 %, die Agentic AI in zwei Jahren wollen. Die Lücke ist das Geschäft.</li>\n      <li><span class=\"chip\">CONTEXT · EU/DE</span> <strong>Souveränität rangiert oben</strong>: 83 % der Firmen halten „souveräne KI\" für strategisch wichtig, 77 % achten aufs Herkunftsland des Anbieters. Genau twiceDs Hebel.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Today has a clear angle: the 19-day freeze on Anthropic's most powerful models is lifted. This is not a pure AI story, but a precedent for how tightly frontier AI is now bound to export control and national security—the exact question that hits anyone who plugs a US model into production. Alongside: a new biology benchmark showing where models really hit their limit, the world's largest healthcare AI rollout, and an EU law that pushed its hardest deadline out by 16 months.</p>\n    <ul>\n      <li><span class=\"chip hot\">DEPLOY · GLOBAL</span> <strong>Fable 5 back online</strong>: After 19 days of forced shutdown, Fable 5 is back globally today, with a new safety classifier that Anthropic says triggers over 99% of the time.</li>\n      <li><span class=\"chip\">POLICY · US</span> <strong>Mythos 5 US only, \"Project Glasswing\"</strong>: The stronger cyber model is only for US operators of critical infrastructure—policy decides who gets which model.</li>\n      <li><span class=\"chip\">STUDY · GLOBAL</span> <strong>GeneBench-Pro: AI fails at ~70%</strong>: OpenAI's new biology benchmark. Best model (GPT-5.6 Sol Pro) reaches only 31.5%. A honest limit signal.</li>\n      <li><span class=\"chip good\">DEPLOY · UK · Health</span> <strong>NHS: 505,000 clinic staff on Copilot</strong>: The world's largest healthcare AI rollout. Pilot saved 43 min/day per person. Wave 1 starts this month.</li>\n      <li><span class=\"chip\">REG · EU</span> <strong>EU AI Act: high-risk deadline pushed to Dec 2027</strong>: The \"Digital Omnibus\" is finalized—the Aug 2, 2026 deadline is off the table, 16 months breathing room.</li>\n      <li><span class=\"chip\">STUDY · GLOBAL</span> <strong>Deloitte: only 25% move pilots to production</strong>: And only 21% have mature agent governance—among ~75% who want agentic AI within two years. The gap is the business.</li>\n      <li><span class=\"chip\">CONTEXT · EU/DE</span> <strong>Sovereignty ranks high</strong>: 83% of firms view \"sovereign AI\" as strategically important, 77% factor in the provider's home country. Exactly twiceD's lever.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O dia tem um gancho claro: o bloqueio de 19 dias sobre os modelos mais fortes da Anthropic é levantado hoje. Não é apenas uma história de IA, é um precedente de como a IA de fronteira está agora tão vinculada a controles de exportação e segurança nacional — uma questão que afeta qualquer um que execute um modelo dos EUA em produção. Além disso: um novo benchmark de biologia mostrando onde estão os limites reais dos modelos, o maior lançamento de IA em saúde do mundo, e uma lei da UE que atrasa seu prazo mais rigoroso em 16 meses.</p>\n    <ul>\n      <li><span class=\"chip hot\">LANÇAMENTO · GLOBAL</span> <strong>Fable 5 de volta online</strong>: Após 19 dias de bloqueio forçado, Fable 5 retorna globalmente hoje com um novo classificador de segurança que a Anthropic diz funcionar em mais de 99% dos casos.</li>\n      <li><span class=\"chip\">POLÍTICA · EUA</span> <strong>Mythos 5 apenas EUA, \"Project Glasswing\"</strong>: O modelo de cibersegurança mais forte é restrito a operadores dos EUA de infraestrutura crítica — os formuladores de política agora decidem quem recebe qual modelo.</li>\n      <li><span class=\"chip\">ESTUDO · GLOBAL</span> <strong>GeneBench-Pro: IA falha em ~70%</strong>: Novo benchmark de biologia da OpenAI. O melhor modelo (GPT-5.6 Sol Pro) atinge apenas 31,5%. Um sinal de limite honesto.</li>\n      <li><span class=\"chip good\">LANÇAMENTO · UK · Saúde</span> <strong>NHS: 505.000 funcionários de clínica no Copilot</strong>: Maior lançamento de IA em saúde do mundo. O piloto economizou 43 min/dia por pessoa. A onda 1 é lançada neste mês.</li>\n      <li><span class=\"chip\">REG · UE</span> <strong>Lei de IA da UE: prazo de alto risco move para dez 2027</strong>: O \"Digital Omnibus\" é final — o prazo de 2 de agosto de 2026 saiu da mesa, 16 meses de espaço para respirar.</li>\n      <li><span class=\"chip\">ESTUDO · GLOBAL</span> <strong>Deloitte: apenas 25% movem pilotos para produção</strong>: E apenas 21% têm governança de agentes madura — quando ~75% querem IA agêntica em dois anos. Essa lacuna é o negócio.</li>\n      <li><span class=\"chip\">CONTEXTO · UE/DE</span> <strong>Soberania ocupa o topo</strong>: 83% das empresas veem \"IA soberana\" como estrategicamente importante, 77% consideram a origem do fornecedor. Exatamente a alavanca do twiceD.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El día tiene un gancho claro: el bloqueo de 19 días sobre los modelos más fuertes de Anthropic se levanta hoy. No es solo una historia de IA, es un precedente de qué tan estrechamente la IA de frontera está ahora vinculada a controles de exportación y seguridad nacional — una pregunta que afecta a cualquiera que ejecute un modelo estadounidense en producción. Además: un nuevo benchmark de biología que muestra dónde están los límites reales de los modelos, el lanzamiento de IA en salud más grande del mundo, y una ley de la UE que retrasa su fecha límite más dura 16 meses.</p>\n    <ul>\n      <li><span class=\"chip hot\">LANZAMIENTO · GLOBAL</span> <strong>Fable 5 de vuelta en línea</strong>: Después de 19 días de bloqueo forzado, Fable 5 regresa globalmente hoy con un nuevo clasificador de seguridad que Anthropic dice funciona en más del 99% de los casos.</li>\n      <li><span class=\"chip\">POLÍTICA · EE.UU.</span> <strong>Mythos 5 solo EE.UU., \"Project Glasswing\"</strong>: El modelo de ciberseguridad más fuerte está restringido a operadores estadounidenses de infraestructura crítica — los formuladores de política ahora deciden quién recibe qué modelo.</li>\n      <li><span class=\"chip\">ESTUDIO · GLOBAL</span> <strong>GeneBench-Pro: IA falla en ~70%</strong>: Nuevo benchmark de biología de OpenAI. El mejor modelo (GPT-5.6 Sol Pro) alcanza solo 31,5%. Una señal de límite honesta.</li>\n      <li><span class=\"chip good\">LANZAMIENTO · UK · Salud</span> <strong>NHS: 505.000 empleados de clínica en Copilot</strong>: Lanzamiento de IA en salud más grande del mundo. El piloto ahorró 43 min/día por persona. La onda 1 se lanza este mes.</li>\n      <li><span class=\"chip\">REG · UE</span> <strong>Ley de IA de la UE: límite de alto riesgo se mueve a dic 2027</strong>: El \"Digital Omnibus\" es final — la fecha límite del 2 de agosto de 2026 está fuera de la mesa, 16 meses de respiro.</li>\n      <li><span class=\"chip\">ESTUDIO · GLOBAL</span> <strong>Deloitte: solo 25% mueven pilotos a producción</strong>: Y solo 21% tienen gobernanza de agentes madura — cuando ~75% quieren IA agéntica en dos años. Esa brecha es el negocio.</li>\n      <li><span class=\"chip\">CONTEXTO · UE/DE</span> <strong>La soberanía ocupa el primer lugar</strong>: 83% de las empresas ven \"IA soberana\" como estratégicamente importante, 77% consideran el origen del proveedor. Exactamente la palanca de twiceD.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der DACH-Freelance-Markt zieht sich zusammen — Schnitt 103 €/h, Monatseinkommen minus 21 % zum Vorjahr, Projektvolumen seit 2022 halbiert. Und trotzdem: der heutige Radar liefert den gesündesten Batch des Zyklus. 20 Listings ≥ 80, neun Langläufer ≥ 12 Monate, ein 90er an der Spitze. Der Markt ist eng, aber die richtigen Projekte sind da.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit 90</strong>: iSAX Senior-Fullstack Java 21/Angular/AWS/K8s/Kafka, FFM 80 % remote, 48 Monate, 90–120 €/h*.</li>\n      <li><span class=\"chip\">Batch</span> <strong>20 Listings ≥ 80</strong>, davon 6 ≥ 87 — die dichteste Java/Angular-Woche seit Wochen.</li>\n      <li><span class=\"chip\">Langläufer</span> <strong>9 Projekte ≥ 12 Monate</strong> unter den Top-Fits: iSAX 48m/28m, BridgingIT 45m, RED SAP 24m, SPS 36m, 1st Solution 46m, Kinteo 47m, Amoria/mund 12m.</li>\n      <li><span class=\"chip hot\">Markt</span> <strong>Käufermarkt</strong>: Schnitt 103 €/h (−1 €/h YoY), Monatseinkommen 8.432 € → 6.653 € (−21 %), 68 % erwarten ein hartes 2026.</li>\n      <li><span class=\"chip\">TED</span> <strong>DFS Deutsche Flugsicherung</strong>: IT-Rahmenvereinbarung, 9 Lose, Frist 13.07.2026 — ⚠️ Partner nötig (FTE-Volumen + ATC-Referenzen + mögliche Sicherheitsüberprüfung).</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains Principal FDE</strong> (AI-Native Dev, EU-Städte inkl. Berlin/München) — der spannendste Employee-Fund der Woche.</li>\n      <li><span class=\"chip\">Auto</span> <strong>e-Mobility-Nische</strong>: Computer Futures Java/MQTT/CAN/SAP S/4HANA, 100–130 €/h* — passt zu Daniels OEM-Referenzen.</li>\n      <li><span class=\"chip warn\">Filter</span> <strong>3 ANÜ · 3 Below-Rate · 2 harte Gates</strong> (SÜ2 / CH-Wohnsitz) bleiben im Board, aber nie als Pitch.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {

        "en": "<div class=\"tldr\"><p class=\"lead\">The DACH freelance market is tightening — average 103 €/h, monthly income down 21% YoY, project volume halved since 2022. And yet: today's radar delivers the healthiest batch of the cycle. 20 listings ≥ 80, nine long-term ≥ 12 months, a 90 at the top. The market is tight, but the right projects are there.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Top-Fit 90</strong>: iSAX Senior-Fullstack Java 21/Angular/AWS/K8s/Kafka, FFM 80% remote, 48 months, 90–120 €/h*.</li>\n      <li><span class=\"chip\">Batch</span> <strong>20 listings ≥ 80</strong>, 6 of them ≥ 87 — the densest Java/Angular week in weeks.</li>\n      <li><span class=\"chip\">Long-term</span> <strong>9 projects ≥ 12 months</strong> among the top-fits: iSAX 48m/28m, BridgingIT 45m, RED SAP 24m, SPS 36m, 1st Solution 46m, Kinteo 47m, Amoria/mund 12m.</li>\n      <li><span class=\"chip hot\">Market</span> <strong>Buyer's market</strong>: average 103 €/h (−1 €/h YoY), monthly income 8,432 € → 6,653 € (−21%), 68% expect a tough 2026.</li>\n      <li><span class=\"chip\">TED</span> <strong>DFS Deutsche Flugsicherung</strong>: IT framework agreement, 9 lots, deadline 13.07.2026 — ⚠️ Partner required (FTE volume + ATC references + possible security review).</li>\n      <li><span class=\"chip\">Intriguing</span> <strong>JetBrains Principal FDE</strong> (AI-Native Dev, EU cities incl. Berlin/Munich) — the most compelling employee opportunity of the week.</li>\n      <li><span class=\"chip\">Auto</span> <strong>e-Mobility niche</strong>: Computer Futures Java/MQTT/CAN/SAP S/4HANA, 100–130 €/h* — aligns with Daniel's OEM references.</li>\n      <li><span class=\"chip warn\">Filter</span> <strong>3 temp staffing · 3 below-rate · 2 hard gates</strong> (security review required / CH residency) remain on the board, but never as a pitch.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O mercado freelance DACH está se contraindo — média de 103 €/h, receita mensal com queda de 21 % em relação ao ano anterior, volume de projetos reduzido à metade desde 2022. E mesmo assim: o radar de hoje entrega a rodada mais saudável do ciclo. 20 listings ≥ 80, nove projetos longos ≥ 12 meses, um score 90 no topo. O mercado está apertado, mas os projetos certos estão aqui.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Melhor fit 90</strong>: iSAX Senior Fullstack Java 21/Angular/AWS/K8s/Kafka, FFM 80 % remoto, 48 meses, 90–120 €/h*.</li>\n      <li><span class=\"chip\">Rodada</span> <strong>20 listings ≥ 80</strong>, sendo 6 ≥ 87 — a semana mais densa em Java/Angular das últimas semanas.</li>\n      <li><span class=\"chip\">Longevidade</span> <strong>9 projetos ≥ 12 meses</strong> entre os melhores fits: iSAX 48m/28m, BridgingIT 45m, RED SAP 24m, SPS 36m, 1st Solution 46m, Kinteo 47m, Amoria/mund 12m.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>Favorável ao cliente</strong>: média 103 €/h (−1 €/h ano a ano), receita mensal 8.432 € → 6.653 € (−21 %), 68 % esperam um 2026 difícil.</li>\n      <li><span class=\"chip\">TED</span> <strong>DFS Deutsche Flugsicherung</strong>: acordo-quadro de TI, 9 lotes, prazo 13/07/2026 — ⚠️ Parceiro necessário (volume FTE + referências ATC + possível verificação de segurança).</li>\n      <li><span class=\"chip\">Destaque</span> <strong>JetBrains Principal FDE</strong> (Desenvolvimento AI-Nativo, cidades da UE incl. Berlim/Munique) — o achado de emprego mais instigante da semana.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Nicho e-Mobility</strong>: Computer Futures Java/MQTT/CAN/SAP S/4HANA, 100–130 €/h* — alinha com as referências OEM de Daniel.</li>\n      <li><span class=\"chip warn\">Filtro</span> <strong>3 ANÜ · 3 abaixo da taxa · 2 bloqueios rígidos</strong> (SÜ2 / residência CH) ficam no board, mas nunca como pitch.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El mercado freelance DACH se está contrayendo — promedio de 103 €/h, ingresos mensuales con caída del 21 % respecto al año anterior, volumen de proyectos reducido a la mitad desde 2022. Y aun así: el radar de hoy entrega la tanda más saludable del ciclo. 20 listings ≥ 80, nueve proyectos largos ≥ 12 meses, un score 90 en la cima. El mercado está estrecho, pero los proyectos correctos están aquí.</p>\n    <ul>\n      <li><span class=\"chip good\">twiceD</span> <strong>Mejor fit 90</strong>: iSAX Senior Fullstack Java 21/Angular/AWS/K8s/Kafka, FFM 80 % remoto, 48 meses, 90–120 €/h*.</li>\n      <li><span class=\"chip\">Tanda</span> <strong>20 listings ≥ 80</strong>, de los cuales 6 ≥ 87 — la semana más densa en Java/Angular de las últimas semanas.</li>\n      <li><span class=\"chip\">Longevidad</span> <strong>9 proyectos ≥ 12 meses</strong> entre los mejores fits: iSAX 48m/28m, BridgingIT 45m, RED SAP 24m, SPS 36m, 1st Solution 46m, Kinteo 47m, Amoria/mund 12m.</li>\n      <li><span class=\"chip hot\">Mercado</span> <strong>A favor del cliente</strong>: promedio 103 €/h (−1 €/h año contra año), ingresos mensuales 8.432 € → 6.653 € (−21 %), 68 % esperan un 2026 difícil.</li>\n      <li><span class=\"chip\">TED</span> <strong>DFS Deutsche Flugsicherung</strong>: acuerdo marco de TI, 9 lotes, plazo 13/07/2026 — ⚠️ Se necesita socio (volumen FTE + referencias ATC + posible verificación de seguridad).</li>\n      <li><span class=\"chip\">Destacado</span> <strong>JetBrains Principal FDE</strong> (Desarrollo AI-Nativo, ciudades de la UE incl. Berlín/Múnich) — el hallazgo de empleo más intrigante de la semana.</li>\n      <li><span class=\"chip\">Auto</span> <strong>Nicho e-Mobility</strong>: Computer Futures Java/MQTT/CAN/SAP S/4HANA, 100–130 €/h* — encaja con las referencias OEM de Daniel.</li>\n      <li><span class=\"chip warn\">Filtro</span> <strong>3 ANÜ · 3 por debajo de la tarifa · 2 bloqueos rígidos</strong> (SÜ2 /       "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Mittwoch, der 1. Juli — ein bitterer WM-Morgen und ein Neuanfang am selben Tag. Deutschland ist bei der eigenen Erwartung gescheitert: 1:1 nach Verlängerung, 3:4 im Elfmeterschießen gegen Paraguay, das erste WM-Elferaus der DFB-Geschichte. Während die Nationalelf abreist, öffnet für Freiburg und die Bundesliga das Sommer-Transferfenster. Der Spielplan 2026/27 kommt morgen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus für Deutschland</strong>: 1:1 n.V. gegen Paraguay, 3:4 im Elfmeterschießen (29.06.) — erstes Elferaus bei einer WM überhaupt.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Fenster offen</strong>: seit heute (01.07.) bis 31.08. dürfen die Bundesligisten kaufen und verkaufen.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Goto ist da</strong>: Japan-WM-Stürmer Keisuke Goto (21) von Anderlecht, rund 10 Mio. € laut Medienberichten.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Atubolu-Gerücht</strong>: der Torhüter will offenbar weg — aber kein bestätigter Deal, Stand 01.07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Spielplan morgen</strong>: die DFL veröffentlicht die Ansetzungen 2026/27 am 02.07.; Saisonstart ist der 28.08.</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale</strong>: Brasilien trifft am 05.07. auf Norwegen — Paquetá nach Oberschenkelblessur fraglich.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: eingefroren nach Runde 18, Palmeiras führt mit 41 Punkten; Wiederbeginn Ende Juli.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute im Achtelfinale</strong>: England–DR Kongo (18:00 MESZ / 13:00 BRT), Belgien–Senegal (22:00/17:00), USA–Bosnien (02:00/21:00).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Mittwoch, der 1. Juli — ein bitterer WM-Morgen und ein Neuanfang am selben Tag. Deutschland ist bei der eigenen Erwartung gescheitert: 1:1 nach Verlängerung, 3:4 im Elfmeterschießen gegen Paraguay, das erste WM-Elferaus der DFB-Geschichte. Während die Nationalelf abreist, öffnet für Freiburg und die Bundesliga das Sommer-Transferfenster. Der Spielplan 2026/27 kommt morgen.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>WM-Aus für Deutschland</strong>: 1:1 n.V. gegen Paraguay, 3:4 im Elfmeterschießen (29.06.) — erstes Elferaus bei einer WM überhaupt.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Fenster offen</strong>: seit heute (01.07.) bis 31.08. dürfen die Bundesligisten kaufen und verkaufen.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Goto ist da</strong>: Japan-WM-Stürmer Keisuke Goto (21) von Anderlecht, rund 10 Mio. € laut Medienberichten.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Atubolu-Gerücht</strong>: der Torhüter will offenbar weg — aber kein bestätigter Deal, Stand 01.07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Spielplan morgen</strong>: die DFL veröffentlicht die Ansetzungen 2026/27 am 02.07.; Saisonstart ist der 28.08.</li>\n      <li><span class=\"chip\">WM</span> <strong>Achtelfinale</strong>: Brasilien trifft am 05.07. auf Norwegen — Paquetá nach Oberschenkelblessur fraglich.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausiert</strong>: eingefroren nach Runde 18, Palmeiras führt mit 41 Punkten; Wiederbeginn Ende Juli.</li>\n      <li><span class=\"chip\">WM</span> <strong>Heute im Achtelfinale</strong>: England–DR Kongo (18:00 MESZ / 13:00 BRT), Belgien–Senegal (22:00/17:00), USA–Bosnien (02:00/21:00).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Wednesday, July 1 — a bitter World Cup morning and a fresh start the same day. Germany has fallen short of its own expectations: 1–1 after extra time, 3–4 on penalties against Paraguay, the first World Cup penalty exit in DFB history. While the national team packs its bags, the transfer window opens for Freiburg and the Bundesliga. The 2026/27 fixture list arrives tomorrow.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Germany's World Cup exit</strong>: 1–1 a.e.t. against Paraguay, 3–4 on penalties (June 29) — first penalty-shootout exit in World Cup history.</li>\n      <li><span class=\"chip hot\">Transfer</span> <strong>Window open</strong>: from today (July 1) through August 31, Bundesliga clubs can buy and sell.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Goto has arrived</strong>: Japanese World Cup striker Keisuke Goto (21) from Anderlecht, around €10 million per media reports.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Atubolu rumor</strong>: the goalkeeper reportedly wants out — but no confirmed deal yet as of July 1.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Fixture list tomorrow</strong>: the DFL announces the 2026/27 schedule on July 2; season kicks off Aug 28.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Round of 16</strong>: Brazil faces Norway on July 5 — Paquetá uncertain after thigh injury.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão paused</strong>: frozen after round 18, Palmeiras leading with 41 points; resumes late July.</li>\n      <li><span class=\"chip\">World Cup</span> <strong>Today's Round of 16</strong>: England–DR Congo (18:00 CEST / 13:00 BRT), Belgium–Senegal (22:00/17:00), USA–Bosnia (02:00/21:00).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Quarta-feira, 1º de julho — uma manhã amarga na Copa do Mundo e um recomeço no mesmo dia. A Alemanha ficou aquém das expectativas: 1 a 1 após prorrogação, 3 a 4 nos pênaltis contra o Paraguai, a primeira eliminação da Alemanha por pênalti em Copa do Mundo. Enquanto a seleção alemã se retira, a janela de verão abre para o Freiburg e a Bundesliga. O calendário 2026/27 chega amanhã.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemanha eliminada da Copa</strong>: 1 a 1 após prorrogação contra o Paraguai, 3 a 4 nos pênaltis (29.06.) — primeira eliminação por pênalti em Copa do Mundo.</li>\n      <li><span class=\"chip hot\">Transferência</span> <strong>Janela aberta</strong>: desde hoje (01.07.) até 31.08., os clubes da Bundesliga podem comprar e vender.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Goto chegou</strong>: atacante da Copa Keisuke Goto (21), do Anderlecht, cerca de 10 milhões de euros, segundo relatos.</li>\n      <li><span class=\"chip\">Freiburg</span> <strong>Boato sobre Atubolu</strong>: o goleiro aparentemente quer sair — mas sem transferência confirmada em 01.07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Calendário amanhã</strong>: a DFL publica os compromissos de 2026/27 em 02.07.; a temporada começa em 28.08.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Oitavas</strong>: Brasil enfrenta Noruega em 05.07. — Paquetá questionável após lesão na coxa.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausado</strong>: congelado após a rodada 18, Palmeiras lidera com 41 pontos; retorno fim de julho.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Hoje nas oitavas</strong>: Inglaterra–RD Congo (18:00 CEST / 13:00 BRT), Bélgica–Senegal (22:00/17:00), EUA–Bósnia (02:00/21:00).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Miércoles, 1 de julio — una mañana amarga en la Copa del Mundo y un nuevo comienzo el mismo día. Alemania no estuvo a la altura de las expectativas: 1-1 tras prórroga, 3-4 en penales contra Paraguay, la primera eliminación por penales de Alemania en una Copa del Mundo. Mientras la selección alemana se retira, la ventana de transferencias de verano se abre para Friburgo y la Bundesliga. El calendario 2026/27 llega mañana.</p>\n    <ul>\n      <li><span class=\"chip hot\">DFB</span> <strong>Alemania eliminada de la Copa</strong>: 1-1 tras prórroga contra Paraguay, 3-4 en penales (29.06.) — primera eliminación por penales de la DFB en una Copa Mundial.</li>\n      <li><span class=\"chip hot\">Transferencia</span> <strong>Ventana abierta</strong>: desde hoy (01.07.) hasta 31.08., los clubes de la Bundesliga pueden comprar y vender.</li>\n      <li><span class=\"chip\">Friburgo</span> <strong>Goto llega</strong>: delantero de la Copa Keisuke Goto (21), del Anderlecht, aproximadamente 10 millones de euros según reportes.</li>\n      <li><span class=\"chip\">Friburgo</span> <strong>Rumor sobre Atubolu</strong>: el portero aparentemente quiere salir — pero sin transferencia confirmada en 01.07.</li>\n      <li><span class=\"chip\">Bundesliga</span> <strong>Calendario mañana</strong>: la DFL publica los compromisos 2026/27 en 02.07.; la temporada comienza el 28.08.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Octavos</strong>: Brasil enfrenta a Noruega el 05.07. — Paquetá cuestionable tras lesión en muslo.</li>\n      <li><span class=\"chip\">BRA</span> <strong>Brasileirão pausado</strong>: congelado tras la jornada 18, Palmeiras lidera con 41 puntos; reanuda finales de julio.</li>\n      <li><span class=\"chip\">Copa</span> <strong>Hoy en octavos</strong>: Inglaterra–RD Congo (18:00 CEST / 13:00 BRT), Bélgica–Senegal (22:00/17:00), EUA–Bosnia (02:00/21:00).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der F1-Tross zieht nach Großbritannien, und Silverstone macht sein Rennen zum Ereignis: Erstmals seit 2021 läuft dort wieder ein Sprint-Wochenende (3.–5. Juli), also zwei Rennen statt eines. Sportlich ist die Lage klarer denn je — Mercedes dominiert beide Wertungen, und ausgerechnet Rookie Kimi Antonelli führt die Fahrer-WM mit 40 Punkten Vorsprung auf seinen eigenen Teamkollegen Russell an. Und für Daniel wird die Woche danach zum Heimspiel: Die Langstrecken-WM kommt mit den 6 Stunden von São Paulo nach Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone bringt den Sprint zurück</strong>: Runde 9, erstes Sprint-Wochenende dort seit 2021. Rennen So 5.7., 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt an — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung.</li>\n      <li><span class=\"chip\">F1</span> <strong>Rückblick Österreich</strong> (28.6.): Russell siegt vor Verstappen (+1,6 s) und Antonelli (+1,9 s); Ferrari verpatzt das Safety-Car-Timing.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo</strong> (10.–12. Juli, Interlagos): Toyota führt die Hersteller mit 132 Pkt. Start So 12.7., 06:30 BRT / 11:30 MESZ (fiawec.com bestätigt).</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der F1-Tross zieht nach Großbritannien, und Silverstone macht sein Rennen zum Ereignis: Erstmals seit 2021 läuft dort wieder ein Sprint-Wochenende (3.–5. Juli), also zwei Rennen statt eines. Sportlich ist die Lage klarer denn je — Mercedes dominiert beide Wertungen, und ausgerechnet Rookie Kimi Antonelli führt die Fahrer-WM mit 40 Punkten Vorsprung auf seinen eigenen Teamkollegen Russell an. Und für Daniel wird die Woche danach zum Heimspiel: Die Langstrecken-WM kommt mit den 6 Stunden von São Paulo nach Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone bringt den Sprint zurück</strong>: Runde 9, erstes Sprint-Wochenende dort seit 2021. Rennen So 5.7., 15:00 BST / 11:00 BRT / 16:00 MESZ.</li>\n      <li><span class=\"chip\">F1-WM</span> <strong>Antonelli führt</strong> die Fahrer-WM mit 171 Pkt an — 40 vor Teamkollege Russell (131), 46 vor Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominiert</strong>: 302 zu 204 Punkte auf Ferrari bei den Konstrukteuren — 98 Punkte Vorsprung.</li>\n      <li><span class=\"chip\">F1</span> <strong>Rückblick Österreich</strong> (28.6.): Russell siegt vor Verstappen (+1,6 s) und Antonelli (+1,9 s); Ferrari verpatzt das Safety-Car-Timing.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h von São Paulo</strong> (10.–12. Juli, Interlagos): Toyota führt die Hersteller mit 132 Pkt. Start So 12.7., 06:30 BRT / 11:30 MESZ (fiawec.com bestätigt).</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">The F1 grid heads to Great Britain, and Silverstone is turning its race into an event: For the first time since 2021, a sprint weekend returns there (July 3–5), meaning two races instead of one. The championship picture is clearer than ever — Mercedes is dominating both standings, and rookie Kimi Antonelli leads the drivers' championship by 40 points over his own teammate Russell. And for Daniel, the week that follows becomes a home race: the World Endurance Championship brings the 6 Hours of São Paulo to Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone brings the sprint back</strong>: Round 9, first sprint weekend there since 2021. Race Sun 7/5, 15:00 BST / 11:00 BRT / 16:00 CEST.</li>\n      <li><span class=\"chip\">F1-WC</span> <strong>Antonelli leads</strong> the drivers' championship with 171 pts — 40 ahead of teammate Russell (131), 46 ahead of Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes dominates</strong>: 302 to 204 points over Ferrari in the constructors — 98-point lead.</li>\n      <li><span class=\"chip\">F1</span> <strong>Austria recap</strong> (6/28): Russell wins ahead of Verstappen (+1.6 s) and Antonelli (+1.9 s); Ferrari botches the safety-car pit stop.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h São Paulo</strong> (July 10–12, Interlagos): Toyota leads the manufacturers with 132 pts. Start Sun 7/12, 06:30 BRT / 11:30 CEST (fiawec.com confirmed).</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">O grid da F1 segue para a Grã-Bretanha, e Silverstone está transformando sua corrida em um evento: Pela primeira vez desde 2021, um fim de semana sprint retorna lá (3 a 5 de julho), significando duas corridas em vez de uma. O quadro do campeonato está mais claro do que nunca — Mercedes está dominando ambas as classificações, e o estreante Kimi Antonelli lidera o campeonato de pilotos por 40 pontos sobre seu próprio companheiro de equipe Russell. E para Daniel, a semana seguinte se torna uma corrida em casa: o Campeonato Mundial de Resistência traz as 6 Horas de São Paulo para Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone traz de volta o sprint</strong>: Rodada 9, primeiro fim de semana sprint ali desde 2021. Corrida dom 5/7, 15:00 BST / 11:00 BRT / 16:00 CEST.</li>\n      <li><span class=\"chip\">F1-CM</span> <strong>Antonelli lidera</strong> o campeonato de pilotos com 171 pts — 40 à frente do companheiro Russell (131), 46 à frente de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 para 204 pontos sobre Ferrari nos construtores — 98 pontos de vantagem.</li>\n      <li><span class=\"chip\">F1</span> <strong>Recapitulação Áustria</strong> (28/6): Russell vence à frente de Verstappen (+1,6 s) e Antonelli (+1,9 s); Ferrari falha no pit stop de safety car.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h São Paulo</strong> (10 a 12 de julho, Interlagos): Toyota lidera os fabricantes com 132 pts. Saída dom 12/7, 06:30 BRT / 11:30 CEST (fiawec.com confirmado).</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La parrilla de F1 se dirige a Gran Bretaña, y Silverstone está transformando su carrera en un evento: Por primera vez desde 2021, un fin de semana sprint regresa ahí (3 al 5 de julio), significando dos carreras en lugar de una. El panorama del campeonato está más claro que nunca — Mercedes está dominando ambas clasificaciones, y el novato Kimi Antonelli lidera el campeonato de pilotos por 40 puntos sobre su propio compañero de equipo Russell. Y para Daniel, la semana siguiente se convierte en una carrera en casa: el Campeonato Mundial de Resistencia trae las 6 Horas de São Paulo a Interlagos.</p>\n    <ul>\n      <li><span class=\"chip hot\">F1</span> <strong>Silverstone trae de vuelta el sprint</strong>: Ronda 9, primer fin de semana sprint ahí desde 2021. Carrera dom 5/7, 15:00 BST / 11:00 BRT / 16:00 CEST.</li>\n      <li><span class=\"chip\">F1-CM</span> <strong>Antonelli lidera</strong> el campeonato de pilotos con 171 pts — 40 puntos delante de su compañero Russell (131), 46 delante de Hamilton (125).</li>\n      <li><span class=\"chip good\">F1</span> <strong>Mercedes domina</strong>: 302 vs 204 puntos sobre Ferrari en constructores — 98 puntos de ventaja.</li>\n      <li><span class=\"chip\">F1</span> <strong>Resumen Austria</strong> (28/6): Russell gana delante de Verstappen (+1,6 s) y Antonelli (+1,9 s); Ferrari falla la parada en boxes con safety car.</li>\n      <li><span class=\"chip good\">WEC</span> <strong>6h São Paulo</strong> (10 al 12 de julio, Interlagos): Toyota lidera a los fabricantes con 132 pts. Salida dom 12/7, 06:30 BRT / 11:30 CEST (fiawec.com confirmado).</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Diese Woche ist noch Schule — aber ab morgen dreht sich Ribeirão Claro vier Tage lang um die 28. FESCAFÉ. Das größte Fest des Jahres findet direkt bei euch statt, mit Vergnügungspark, Rodeio und am Sonntag einer Kinder-Show. Dazu ein ruhiges, sonniges Wochenende — und ein Gesundheits-Hinweis, den wir wegen des Babys ernst, aber gelassen einordnen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>FESCAFÉ 2026 (28. Ed.)</strong>: Do–So 02.–05.07 in Ribeirão Claro. Vergnügungspark, Rodeio indoor, Kinder-Show „Sonhos e Magia\" am Sonntag.</li>\n      <li><span class=\"chip\">Event</span> <strong>Preis-Hinweis</strong>: FESCAFÉ war historisch „entrada franca\" (gratis) — für 2026 aber noch nicht bestätigt. Vor Ort prüfen.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Sonnig heute + morgen</strong>: 15–27 °C, kein Regen. Freitag Nachmittag-Schauer möglich, Wochenende kühler (Sa 12–20 °C).</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>RSV-/Grippe-Winter</strong>: Paraná auf Alarmstufe (InfoGripe SE 22/2026, ~3 Wochen alt). RSV häufigste Klinik-Ursache bei Kindern bis zu vier Jahren — für das Baby relevant, ruhig einzuordnen.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Noch Unterricht</strong>: Staatliche Schulferien in PR erst ab 10.07. Diese Woche (bis 07.07) regulärer Schulbetrieb.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Disney On Ice</strong>: Do–So in São Paulo (Vibra SP), ab R$ 300 — die große Wochenend-Option, wenn's weiter weg sein darf.</li>\n      <li><span class=\"chip\">Event</span> <strong>Londrina-Ferienprogramm</strong>: SESC-Ausstellung + Gratis-Kino laufen; Garden-Kids-Ferienkolonie ab 08.07.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue entspannt</strong>: PR −96 % gegenüber 2025 (SE 1–14/2026). Trotzdem Wasserstellen leeren.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Diese Woche ist noch Schule — aber ab morgen dreht sich Ribeirão Claro vier Tage lang um die 28. FESCAFÉ. Das größte Fest des Jahres findet direkt bei euch statt, mit Vergnügungspark, Rodeio und am Sonntag einer Kinder-Show. Dazu ein ruhiges, sonniges Wochenende — und ein Gesundheits-Hinweis, den wir wegen des Babys ernst, aber gelassen einordnen.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>FESCAFÉ 2026 (28. Ed.)</strong>: Do–So 02.–05.07 in Ribeirão Claro. Vergnügungspark, Rodeio indoor, Kinder-Show „Sonhos e Magia\" am Sonntag.</li>\n      <li><span class=\"chip\">Event</span> <strong>Preis-Hinweis</strong>: FESCAFÉ war historisch „entrada franca\" (gratis) — für 2026 aber noch nicht bestätigt. Vor Ort prüfen.</li>\n      <li><span class=\"chip\">Wetter</span> <strong>Sonnig heute + morgen</strong>: 15–27 °C, kein Regen. Freitag Nachmittag-Schauer möglich, Wochenende kühler (Sa 12–20 °C).</li>\n      <li><span class=\"chip\">Gesundheit</span> <strong>RSV-/Grippe-Winter</strong>: Paraná auf Alarmstufe (InfoGripe SE 22/2026, ~3 Wochen alt). RSV häufigste Klinik-Ursache bei Kindern bis zu vier Jahren — für das Baby relevant, ruhig einzuordnen.</li>\n      <li><span class=\"chip\">Schule</span> <strong>Noch Unterricht</strong>: Staatliche Schulferien in PR erst ab 10.07. Diese Woche (bis 07.07) regulärer Schulbetrieb.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Disney On Ice</strong>: Do–So in São Paulo (Vibra SP), ab R$ 300 — die große Wochenend-Option, wenn's weiter weg sein darf.</li>\n      <li><span class=\"chip\">Event</span> <strong>Londrina-Ferienprogramm</strong>: SESC-Ausstellung + Gratis-Kino laufen; Garden-Kids-Ferienkolonie ab 08.07.</li>\n      <li><span class=\"chip good\">Gesundheit</span> <strong>Dengue entspannt</strong>: PR −96 % gegenüber 2025 (SE 1–14/2026). Trotzdem Wasserstellen leeren.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">This week is still school — but starting tomorrow, Ribeirão Claro spends four days celebrating the 28th FESCAFÉ. The biggest festival of the year is happening right in your backyard, with an amusement park, a rodeo, and a kids' show on Sunday. Add a calm, sunny weekend to that, plus a health note we're taking seriously but keeping in perspective because of the baby.</p>\n    <ul>\n      <li><span class=\"chip hot\">Event</span> <strong>FESCAFÉ 2026 (28th Edition)</strong>: Thu–Sun 07/02–05 in Ribeirão Claro. Amusement park, indoor rodeo, kids' show \"Sonhos e Magia\" on Sunday.</li>\n      <li><span class=\"chip\">Event</span> <strong>Price note</strong>: FESCAFÉ has historically been \"entrada franca\" (free admission) — unconfirmed for 2026. Check on-site.</li>\n      <li><span class=\"chip\">Weather</span> <strong>Sunny today and tomorrow</strong>: 15–27 °C, no rain. Friday afternoon showers possible, weekend cooler (Sat 12–20 °C).</li>\n      <li><span class=\"chip\">Health</span> <strong>RSV/flu season</strong>: Paraná at alert level (InfoGripe week 22/2026, ~3 weeks old). RSV most common reason for clinic visits in children up to 4 years — relevant for the baby, manageable.</li>\n      <li><span class=\"chip\">School</span> <strong>Still classes this week</strong>: State school breaks in PR don't start until 07/10. This week (through 07/07) is regular school.</li>\n      <li><span class=\"chip good\">Trip</span> <strong>Disney On Ice</strong>: Thu–Sun in São Paulo (Vibra SP), from R$ 300 — the big weekend option if you want to go farther.</li>\n      <li><span class=\"chip\">Event</span> <strong>Londrina holiday programs</strong>: SESC exhibition + free cinema running; Garden Kids summer camp starts 07/08.</li>\n      <li><span class=\"chip good\">Health</span> <strong>Dengue easing</strong>: PR down 96% vs. 2025 (week 1–14/2026). Still empty standing water anyway.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Esta semana ainda tem aula — mas a partir de amanhã, Ribeirão Claro vive quatro dias da 28ª FESCAFÉ. O maior festejo do ano acontece bem ali perto de vocês, com parque de diversões, rodeio e uma apresentação infantil no domingo. Soma-se a isso um fim de semana tranquilo e ensolarado — e uma orientação de saúde que a gente leva a sério, mas com serenidade, por causa do bebê.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>FESCAFÉ 2026 (28ª Edição)</strong>: qui–dom 02–05.07 em Ribeirão Claro. Parque de diversões, rodeio coberto, show infantil \"Sonhos e Magia\" no domingo.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Aviso de preço</strong>: FESCAFÉ era historicamente \"entrada franca\" (grátis) — para 2026 não está confirmado. Verificar no local.</li>\n      <li><span class=\"chip\">Tempo</span> <strong>Ensolarado hoje e amanhã</strong>: 15–27 °C, sem chuva. Possível chuva localizada sexta à tarde; fim de semana mais frio (sáb 12–20 °C).</li>\n      <li><span class=\"chip\">Saúde</span> <strong>Inverno de RSV/gripe</strong>: Paraná em nível de alerta (InfoGripe SE 22/2026, ~3 semanas atrás). RSV é a causa mais comum de internação em crianças até aos quatro anos — relevante pro bebê, mas tranquilo.</li>\n      <li><span class=\"chip\">Escola</span> <strong>Ainda tem aula</strong>: férias estaduais no PR só começam 10.07. Esta semana (até 07.07) aula normal.</li>\n      <li><span class=\"chip good\">Passeio</span> <strong>Disney On Ice</strong>: qui–dom em São Paulo (Vibra SP), a partir de R$ 300 — a opção grande se quiserem ir mais longe.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Programação de férias Londrina</strong>: exposição SESC + cinema grátis rodando; colônia de férias Garden Kids começa 08.07.</li>\n      <li><span class=\"chip good\">Saúde</span> <strong>Dengue tranquila</strong>: PR −96% ante 2025 (SE 1–14/2026). Mesmo assim esvaziar água parada.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Esta semana aún hay clases — pero a partir de mañana, Ribeirão Claro vive cuatro días de la 28ª FESCAFÉ. La fiesta más grande del año sucede justo cerca de ustedes, con parque de diversiones, rodeo y un show infantil el domingo. Suma un fin de semana tranquilo y soleado — y una orientación de salud que tomamos en serio, pero con serenidad, por el bebé.</p>\n    <ul>\n      <li><span class=\"chip hot\">Evento</span> <strong>FESCAFÉ 2026 (28ª Edición)</strong>: jue–dom 02–05.07 en Ribeirão Claro. Parque de diversiones, rodeo cubierto, show infantil \"Sonhos e Magia\" el domingo.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Nota de precio</strong>: FESCAFÉ era históricamente \"entrada franca\" (gratis) — para 2026 no confirmado. Verificar en el sitio.</li>\n      <li><span class=\"chip\">Clima</span> <strong>Soleado hoy y mañana</strong>: 15–27 °C, sin lluvia. Posible lluvia dispersa el viernes por la tarde; fin de semana más frío (sáb 12–20 °C).</li>\n      <li><span class=\"chip\">Salud</span> <strong>Invierno de RSV/gripe</strong>: Paraná en nivel de alerta (InfoGripe semana 22/2026, ~3 semanas atrás). RSV es la causa más común de hospitalización en menores de 4 años — relevante para el bebé, pero manejable.</li>\n      <li><span class=\"chip\">Escuela</span> <strong>Aún hay clases</strong>: las vacaciones estatales en PR comienzan el 10.07. Esta semana (hasta 07.07) clases normales.</li>\n      <li><span class=\"chip good\">Paseo</span> <strong>Disney On Ice</strong>: jue–dom en São Paulo (Vibra SP), desde R$ 300 — la opción grande si quieren ir más lejos.</li>\n      <li><span class=\"chip\">Evento</span> <strong>Programación de vacaciones Londrina</strong>: exposición SESC + cine gratis funcionando; campamento de vacaciones Garden Kids comienza 08.07.</li>\n      <li><span class=\"chip good\">Salud</span> <strong>Dengue tranquila</strong>: PR −96% vs. 2025 (semana 1–14/2026). Aun así vaciar agua estancada.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Dienstag, der 1. Juli — Wochenthema <em>Software &amp; Technologie</em>, heute Teil VI: <em>Datenbanken, APIs &amp; Cloud-Infrastruktur</em>. Das Vokabular, mit dem man Daten <em>abfragt</em> (<em>consultar</em>), Dienste <em>synchronisiert</em>, ein System <em>überwacht</em>, eine Datenbank in die <em>Cloud migriert</em> und alles <em>skaliert</em>. 32 neue Einträge, 12 Verben mit voller Konjugation — inklusive des berüchtigten Spanisch-Traps <em>yo sincronicé</em> (z→c) — plus 3 Auffrischungen aus dem KI-Tools-Dienstag (<em>automatisieren, konfigurieren, debuggen</em>). Grammatik-Fokus: trennbar (<em>ich frage ab</em>) vs. untrennbar (<em>ich überwache</em>), und warum -ieren-Verben nie ein <em>ge-</em> bekommen.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Anfrage ≠ EN inquiry</strong> — im Tech-Kontext ist eine <em>Anfrage</em> ein <em>request</em> (HTTP-Request, API-Aufruf), nicht bloß eine förmliche Erkundigung. PT <em>a requisição / a solicitação</em>, ES <em>la solicitud / la petición</em>. EN <em>request</em> trifft es am besten.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT/ES implementar ≠ DE implantieren</strong> — <em>etwas in Software implementieren</em> heißt PT/ES <em>implementar</em>. DE <em>implantieren</em> ist enger (Chirurgie, Hardware einpflanzen). In allen drei Sprachen für Software: <em>implementieren / implementar</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>ES sincronizar → yo sincronicé</strong> — Orthografie-Trap: -zar-Verben schreiben vor <em>e</em> ein <em>c</em> statt <em>z</em>. Pretérito 1. Person <em>sincronicé</em> (nie <em>*sincronizé</em>), ganzer Subjuntivo <em>sincronice</em>. PT hat den Trap nicht: <em>eu sincronizei</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE abfragen → ich frage ab</strong> — trennbares Verb: das Präfix <em>ab-</em> löst sich im Hauptsatz ab (<em>ich frage die Daten ab</em>). Partizip <em>abgefragt</em> — das <em>ge-</em> steht zwischen Präfix und Stamm.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE überwachen → ich überwache</strong> — untrennbares Verb: <em>über-</em> bleibt fest am Stamm. Partizip <em>überwacht</em> — <strong>ohne</strong> <em>ge-</em>, weil untrennbar. Vergleich zum trennbaren <em>abfragen → abgefragt</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>DE -ieren → kein „ge-\"</strong> — <em>synchronisieren, migrieren, implementieren, skalieren, replizieren, indexieren, archivieren</em> bilden das Partizip II ohne <em>ge-</em>: <em>synchronisiert</em> (nicht <em>*gesynchronisiert</em>), <em>migriert</em>, <em>skaliert</em>.</li>\n      <li><span class=\"chip\">KONJUGATION</span> <strong>Anglizismen: cachen &amp; deployen</strong> — beides regelmäßig schwach: <em>ich cache, du cachst, habe gecacht</em>; <em>ich deploye, du deployst, habe deployt/deployed</em>. Keine feste Norm — im Alltag üblich, Partizip mit Variantenschreibung.</li>\n      <li><span class=\"chip\">GENUS</span> <strong>die Datenbank (f), der Datensatz (m), das Schema (n)</strong> — drei Genera direkt nebeneinander. PT <em>o banco de dados (m), o registro (m), o esquema (m)</em>; ES <em>la base de datos (f), el registro (m), el esquema (m)</em>. Genus nicht raten.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>banco de dados vs. base de dados</strong> — „Datenbank\" ist im BR-PT <em>o banco de dados</em> (universell in Brasilien); das europäische PT sagt <em>a base de dados</em>. ES immer <em>la base de datos</em>. Auch: <em>o contêiner</em> (BR) vs. <em>o contentor</em> (PT-EU).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a nuvem vs. a cloud</strong> — „die Cloud\" ist im formalen BR-PT <em>a nuvem</em>; <em>a cloud</em> ist der umgangssprachliche Anglizismus, in der brasilianischen Tech-Szene weit verbreitet. Beides verständlich, <em>a nuvem</em> im geschriebenen Text vorziehen.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>Die Datenbank ist down.</strong> = PT <em>O banco de dados está fora do ar.</em> = ES <em>La base de datos está caída.</em> — „down / fora do ar / caída\" ist die idiomatische Art zu sagen, dass ein System nicht erreichbar ist.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>etwas in der Cloud hosten</strong> = PT <em>hospedar algo na nuvem</em> = ES <em>alojar algo en la nube</em>. „Das System skaliert automatisch\" = <em>O sistema escala automaticamente</em> = <em>El sistema escala automáticamente</em>.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Tuesday, July 1 — Weekly theme <em>Software &amp; Technology</em>, today Part VI: <em>Databases, APIs &amp; Cloud Infrastructure</em>. The vocabulary for <em>querying</em> data (<em>consultar</em>), <em>synchronizing</em> services, <em>monitoring</em> a system, <em>migrating</em> a database to the cloud, and <em>scaling</em> everything. 32 new entries, 12 verbs with full conjugation — including the notorious Spanish trap <em>yo sincronicé</em> (z→c) — plus 3 reviews from last Tuesday's AI-tools session (<em>automatisieren, konfigurieren, debuggen</em>). Grammar focus: separable (<em>ich frage ab</em>) vs. inseparable (<em>ich überwache</em>), and why -ieren verbs never take a <em>ge-</em> prefix.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Anfrage ≠ EN inquiry</strong> — in a tech context, an <em>Anfrage</em> is a <em>request</em> (HTTP request, API call), not merely a formal inquiry. PT <em>a requisição / a solicitação</em>, ES <em>la solicitud / la petición</em>. EN <em>request</em> is the best match.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT/ES implementar ≠ DE implantieren</strong> — <em>to implement something in software</em> is PT/ES <em>implementar</em>. DE <em>implantieren</em> is narrower (surgery, implanting hardware). For software in all three languages: <em>implementieren / implementar</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>ES sincronizar → yo sincronicé</strong> — Spelling trap: -zar verbs write <em>c</em> instead of <em>z</em> before <em>e</em>. Preterite 1st person <em>sincronicé</em> (never <em>*sincronizé</em>), full subjunctive <em>sincronice</em>. PT has no such trap: <em>eu sincronizei</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE abfragen → ich frage ab</strong> — separable verb: the prefix <em>ab-</em> splits off in the main clause (<em>ich frage die Daten ab</em>). Past participle <em>abgefragt</em> — the <em>ge-</em> sits between prefix and stem.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE überwachen → ich überwache</strong> — inseparable verb: <em>über-</em> stays fixed to the stem. Past participle <em>überwacht</em> — <strong>no</strong> <em>ge-</em>, because inseparable. Compare to the separable <em>abfragen → abgefragt</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>DE -ieren → no \"ge-\"</strong> — <em>synchronisieren, migrieren, implementieren, skalieren, replizieren, indexieren, archivieren</em> all form the past participle without <em>ge-</em>: <em>synchronisiert</em> (not <em>*gesynchronisiert</em>), <em>migriert</em>, <em>skaliert</em>.</li>\n      <li><span class=\"chip\">CONJUGATION</span> <strong>Anglicisms: cachen &amp; deployen</strong> — both weak and regular: <em>ich cache, du cachst, habe gecacht</em>; <em>ich deploye, du deployst, habe deployt/deployed</em>. No fixed standard — common in everyday use, participle has variant spellings.</li>\n      <li><span class=\"chip\">GENDER</span> <strong>die Datenbank (f), der Datensatz (m), das Schema (n)</strong> — three genders side by side. PT <em>o banco de dados (m), o registro (m), o esquema (m)</em>; ES <em>la base de datos (f), el registro (m), el esquema (m)</em>. Never guess the gender.</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>banco de dados vs. base de dados</strong> — \"database\" in Brazilian PT is <em>o banco de dados</em> (universal in Brazil); European PT says <em>a base de dados</em>. ES always <em>la base de datos</em>. Also: <em>o contêiner</em> (BR) vs. <em>o contentor</em> (PT-EU).</li>\n      <li><span class=\"chip\">BR-PT</span> <strong>a nuvem vs. a cloud</strong> — \"the cloud\" in formal Brazilian PT is <em>a nuvem</em>; <em>a cloud</em> is the colloquial anglicism, widely used in Brazil's tech scene. Both are understood; prefer <em>a nuvem</em> in written text.</li>\n      <li><span class=\"chip good\">IDIOM</span> <strong>Die Datenbank ist down.</strong> = PT <em>O banco de dados está fora do ar.</em> = ES <em>La base de datos está caída.</em> — \"down / fora do ar / caída\" is the idiomatic way to say a system is unreachable.</li>\n      <li><span class=\"chip\">PHRASE</span> <strong>etwas in der Cloud hosten</strong> = PT <em>hospedar algo na nuvem</em> = ES <em>alojar algo en la nube</em>. \"Das System skaliert automatisch\" = <em>O sistema escala automaticamente</em> = <em>El sistema escala automáticamente</em>.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Terça-feira, 1º de julho — Tema da semana <em>Software &amp; Tecnologia</em>, hoje Parte VI: <em>Bancos de Dados, APIs &amp; Infraestrutura em Nuvem</em>. O vocabulário para <em>consultar</em> dados, <em>sincronizar</em> serviços, <em>monitorar</em> um sistema, <em>migrar</em> um banco de dados para a nuvem e <em>escalar</em> tudo. 32 novas entradas, 12 verbos com conjugação completa — incluindo a famosa armadilha do espanhol <em>yo sincronicé</em> (z→c) — mais 3 revisões da terça de ferramentas de IA (<em>automatisieren, konfigurieren, debuggen</em>). Foco gramatical: separável (<em>ich frage ab</em>) vs. inseparável (<em>ich überwache</em>), e por que verbos em -ieren nunca levam <em>ge-</em>.</p>\n    <ul>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>DE Anfrage ≠ EN inquiry</strong> — em contexto de tecnologia, <em>Anfrage</em> é um <em>request</em> (requisição HTTP, chamada de API), não apenas uma consulta formal. PT <em>a requisição / a solicitação</em>, ES <em>la solicitud / la petición</em>. EN <em>request</em> é a melhor tradução.</li>\n      <li><span class=\"chip hot\">FALSE FRIEND</span> <strong>PT/ES implementar ≠ DE implantieren</strong> — <em>implementar algo em software</em> é PT/ES <em>implementar</em>. DE <em>implantieren</em> é mais restrito (cirurgia, implantar hardware). Nos três idiomas para software: <em>implementieren / implementar</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>ES sincronizar → yo sincronicé</strong> — Armadilha ortográfica: verbos em -zar escrevem <em>c</em> em vez de <em>z</em> antes de <em>e</em>. Pretérito 1ª pessoa <em>sincronicé</em> (nunca <em>*sincronizé</em>), todo o subjuntivo <em>sincronice</em>. O PT não tem essa armadilha: <em>eu sincronizei</em>.</li>\n      <li><span class=\"chip\">CONJUGAÇÃO</span> <strong>DE abfragen → ich frage ab</strong> — verbo separável: o prefixo <em>ab-</em> se desprende na oração principal (<e > <strong>Die Datenbank ist down.</strong> = PT <em>O banco de dados está fora do ar.</em> = ES <em>La base de datos está caída.</em> — \"down / fora do ar / caída\" é o modo idiomático de dizer que um sistema está inacessível.</li>\n      <li><span class=\"chip\">FRASE</span> <strong>etwas in der Cloud hosten</strong> = PT <em>hospedar algo na nuvem</em> = ES <em>alojar algo en la nube</em>. \"Das System skaliert automatisch\" = <em>O sistema escala automaticamente</em> = <em>El sistema escala automáticamente</em>.</li>\n    </ul></div>",

// ============================================================
