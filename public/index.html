<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniels Morning Briefs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="lib/tokens.css">
<script>
  // Pre-paint animation policy (mirrors the terminal core / pagr): an explicit
  // "off" in localStorage — or no pick while the OS prefers reduced motion —
  // marks html.anim-off so components.css kills keyframes (incl. the brand
  // cursor blink) with no flash. The footer anim toggle persists "on"/"off".
  (function () {
    let pref = null;
    try { pref = localStorage.getItem('anim'); } catch (_) {}
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (pref === 'off' || (pref === null && reduced)) {
      document.documentElement.classList.add('anim-off');
    }
  })();
  // Resolution-independent zoom (mirrors pagr): lay out at a 1920px reference, then
  // scale the whole view up on wider screens — a true zoom of everything, never below
  // 1×. Pre-paint to avoid a flash.
  (function () {
    var applyZoom = function () {
      document.documentElement.style.zoom = String(Math.max(1, window.innerWidth / 1920));
    };
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();
</script>
<style>
  /* Dashboard chrome styles. Design tokens (colours, shadow, typography vars)
     come from lib/tokens.css — keep them there so the dashboard and the
     newsletter content stay in sync. */
  * { box-sizing: border-box; }
  /* Lock the outer document — only inner scroll containers (the .home view
     and the iframe) handle scrolling. Without this, a tiny mismatch between
     header.app + .app-shell heights and 100vh adds a few pixels of overflow
     to <html>, producing a second outer scrollbar alongside the one inside
     .home. overflow: hidden on both html and body kills that outer track. */
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  html { position: relative; }

  /* Paper-grain noise overlay — same texture as the newsletter pages.
     Imperceptible up close, breaks LCD flatness at distance. Disabled under
     reduced-motion / high-contrast preferences. */
  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce), (prefers-contrast: more) {
    html::before { display: none; }
  }
  body > *, header.app { position: relative; z-index: 1; }
  body {
    font-family: var(--font-body);
    line-height: 1.5;
    font-size: 15px;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal header bar — mirrors the pagr/seedr chrome: a single row on a
     --card surface with a --border bottom rule. LEFT: the brand wordmark
     (mono + .glow) and a blinking .cursor-block. RIGHT: the nav-rail minimize
     toggle. */
  header.app {
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono; the content stays serif */
    /* Lift the header above the content, which is also a positioned body child
       at z-index 1 and would otherwise paint over it. */
    z-index: 50;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 3rem;
  }
  /* LEFT zone — brand only. */
  .header-left {
    display: flex;
    align-items: center;
    flex: none;
    min-width: 0;
  }
  .header-brand {
    display: inline-flex;
    align-items: center;
    flex: none;
    text-decoration: none;
    cursor: pointer;
  }
  .header-brand .brand-word {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  /* RIGHT zone — the nav-rail minimize toggle, pushed to the far right
     (the header has no center zone). */
  .header-right {
    flex: none;
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  /* Layout: two columns — flexible main + a fixed-width nav-rail on the right.
     The fixed footer is 2rem tall, so the shell is the viewport minus the
     header (3rem) and the footer (2rem). When the rail is collapsed the
     --rail-w track narrows to the icon-only strip. */
  .app-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) var(--rail-w, 16rem);
    height: calc(100vh - 3rem - 2rem);
    height: calc(100dvh - 3rem - 2rem);
  }
  .app-shell.rail-collapsed { --rail-w: 3rem; }

  /* The nav lives in the sticky right sidebar (.nav-rail). It holds the
     Übersicht control (#home-btn) and #nav-groups (the grouped category nav,
     populated by JS). */
  .nav-label {
    font-family: var(--font-mono);
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted-foreground); padding: 0.5rem 0.85rem 0.2rem; font-weight: 600;
  }
  #nav-groups { padding-bottom: 0.2rem; }

  .cat {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    border: 0;
  }
  .cat-head {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms;
    min-height: 2.1rem;
  }
  .cat-head:hover { background: var(--muted); }
  .cat-head:hover .cat-name { color: var(--primary); }
  .cat.active .cat-head { background: var(--muted); }
  .cat.active .cat-name { color: var(--primary); }
  .cat-color { width: 6px; height: 18px; border-radius: 0; flex: none; }
  .cat-name {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--foreground);
    transition: color 0.15s ease;
    flex: 1;
    /* Single-line; ellipsise rather than wrap to two lines. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cat-icon { font-size: 1.05rem; }
  .cat-latest {
    font-family: var(--font-mono);
    font-size: 0.68rem; color: var(--soft);
    font-feature-settings: "tnum"; font-weight: 500;
  }
  .cat-toggle {
    background: transparent; border: none;
    color: var(--soft); cursor: pointer;
    transition: transform 150ms ease, background 120ms, color 120ms;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.55rem 0.7rem;
    border-radius: var(--radius-inline);
    line-height: 1;
    min-height: 2.25rem; min-width: 2.25rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cat-toggle:hover { background: var(--rule-soft); color: var(--fg); }
  .cat.open > .cat-head .cat-toggle { transform: rotate(90deg); }

  .cat-dates { display: none; padding: 0.15rem 0.7rem 0.4rem 1.45rem; }

  .cat.open .cat-dates { display: block; }
  /* The category dropdown holds only the archive month-picker: days with a
     brief are clickable (ringed in the category accent), the selected day is
     filled, hovering one previews its title. Border + marks use the
     per-category --cat-accent scoped on the .cat row. */
  .cat-cal {
    margin: 0.2rem 0;
    padding: 0.5rem;
    border: 1px solid var(--cat-accent);
    border-radius: 6px;
    background: var(--rule-soft);
  }
  .cal-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.45rem;
  }
  .cal-title {
    font-family: var(--font-mono); font-size: 0.74rem;
    font-weight: 600; color: var(--fg);
  }
  .cal-nav {
    width: 1.7rem; height: 1.7rem; line-height: 1;
    background: transparent; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--muted-ink); font-size: 0.95rem; cursor: pointer;
    transition: color 120ms, border-color 120ms;
  }
  .cal-nav:hover:not(:disabled) { color: var(--fg); border-color: var(--soft); }
  .cal-nav:focus-visible { outline: 2px solid var(--cat-accent, var(--fg)); outline-offset: 2px; }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-week, .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-week { margin-bottom: 3px; }
  .cal-week span {
    text-align: center; font-family: var(--font-mono);
    font-size: 0.58rem; color: var(--muted-ink);
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.7rem;
    border-radius: 4px; color: var(--soft);
    font-feature-settings: "tnum";
  }
  .cal-day.none { color: var(--rule); }
  .cal-day.blank { visibility: hidden; }
  .cal-day.has {
    color: var(--fg); font-weight: 600; cursor: pointer; text-decoration: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--cat-accent);
    transition: background 100ms, color 100ms;
  }
  .cal-day.has:hover, .cal-day.has:focus-visible,
  .cal-day.has.current {
    background: var(--cat-accent); color: #fff; outline: none;
  }
  .cal-preview {
    margin-top: 0.5rem; padding-top: 0.45rem;
    border-top: 1px solid var(--rule);
    font-family: var(--font-body); font-size: 0.72rem;
    color: var(--muted-ink); line-height: 1.35; min-height: 1.7rem;
  }
  /* ────────────────────────────────────────────────────────────────────
     Fixed footer status bar — mirrors the pagr/seedr StatusBar: a 2rem bar
     pinned to the viewport bottom on a --card surface with a --border top
     rule. LEFT: `[briefs] reader@briefs:~/path` status line. RIGHT: the
     relocated controls (theme menu, language menu) + an anim toggle.
     ──────────────────────────────────────────────────────────────────── */
  footer.status-bar {
    position: fixed;
    inset-inline: 0;
    bottom: 0;
    z-index: 60;
    height: 2rem;
    border-top: 1px solid var(--border);
    background: var(--card);
    font-family: var(--font-mono); /* chrome is terminal mono */
    font-size: 11px;
  }
  .status-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 100%;
    padding: 0 0.85rem;
  }
  .status-path {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--muted-foreground);
  }
  .status-path .status-tag { color: var(--primary); }
  .status-path .status-loc { color: var(--foreground); }
  .status-controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex: none;
  }
  .status-sep { height: 0.9rem; width: 1px; background: var(--border); flex: none; }

  /* Footer control buttons — flat, muted, warm to --primary on hover. No
     boxes, no shadows; terminal-plain. */
  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font: inherit;
    line-height: 1;
    color: var(--muted-foreground);
    text-decoration: none;
    background: none;
    border: 0;
    border-radius: 0;
    padding: 0;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .status-btn:hover { color: var(--primary); }

  /* Theme + language dropdowns reuse the core .dropdown / .dropdown-panel /
     .dropdown-item primitives. The summary mirrors .status-btn. */
  .status-controls .dropdown > summary { font: inherit; }
  /* Settings icons (.dd-dot theme indicator, .dd-flag language flags) come from
     the shared @danieldeusing/design components.css — no local copy here. */

  /* Anim toggle — `[x] anim` / `[ ] anim`, mirroring pagr's footer toggle. */
  .anim-toggle { white-space: nowrap; }
  .anim-toggle[aria-pressed="true"] .anim-box { color: var(--primary); }

  /* Language picker — the trigger anchors the upward dropdown menu. The menu
     reuses the core .dropdown-panel (absolute, opens above, right-aligned),
     toggled open/closed via the [hidden] attribute by the existing JS. */
  .lang-picker { position: relative; }
  .lang-caret { font-size: 0.6rem; margin-left: 0.1rem; }
  .lang-menu[hidden] { display: none; }
  .lang-option[aria-selected="true"] {
    color: var(--primary);
    text-shadow: 0 0 8px var(--glow);
  }

  .cat-empty {
    font-family: var(--font-mono);
    font-size: 0.7rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.5rem 0.6rem;
  }

  /* Main area — full width, fills the shell (viewport minus header + footer). */
  .main {
    overflow: hidden;
    background: var(--bg);
    position: relative;
    height: 100%;
  }
  .iframe-host { width: 100%; height: 100%; border: none; background: var(--bg); }

  /* ────────────────────────────────────────────────────────────────────
     Sticky right sidebar (.nav-rail) — terminal mono, --card surface with a
     --border left rule, full shell height with its own scroll. Holds the
     Übersicht control + the grouped category nav. Collapses to a 3rem icon-
     only strip; the width animates via the grid track on .app-shell.
     ──────────────────────────────────────────────────────────────────── */
  .nav-rail {
    grid-column: 2;
    font-family: var(--font-mono);
    background: var(--card);
    border-left: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  .nav-rail-head {
    display: flex;
    align-items: center;
    min-height: 2.1rem;
    padding: 0.4rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .nav-rail-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--muted-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-rail-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0.3rem 0 0.4rem;
  }

  /* Minimize toggle — the `»`/`«` chevron in the header right zone. Flat, muted,
     warm to --primary on hover (terminal-plain, no box). */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex: none;
    background: none;
    border: 0;
    border-radius: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .rail-toggle:hover { color: var(--primary); }
  /* Expanded → `»` (collapse-to-right); collapsed → `«` (re-open). The button's
     aria-expanded drives the glyph; JS rewrites the text content too as a fallback. */
  .rail-toggle[aria-expanded="false"] .rail-toggle-glyph::before { content: "«"; }
  .rail-toggle[aria-expanded="true"]  .rail-toggle-glyph::before { content: "»"; }
  .rail-toggle-glyph { font-size: 0; }
  .rail-toggle-glyph::before { font-size: 1rem; }

  /* Collapsed strip — keep only the per-category accent bar + icon, hide labels,
     calendars and the home wordmark. The 3rem track clips the rest. */
  .app-shell.rail-collapsed .nav-rail-title,
  .app-shell.rail-collapsed .nav-label,
  .app-shell.rail-collapsed .cat-name,
  .app-shell.rail-collapsed .cat-latest,
  .app-shell.rail-collapsed .cat-toggle,
  .app-shell.rail-collapsed .cat-dates,
  .app-shell.rail-collapsed .home-btn .nav-label-text,
  .app-shell.rail-collapsed .home-btn .brand-mark {
    display: none;
  }
  .app-shell.rail-collapsed .nav-rail-head { justify-content: center; padding: 0.4rem 0; }
  .app-shell.rail-collapsed .cat-head,
  .app-shell.rail-collapsed .home-btn {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
    gap: 0;
  }
  .app-shell.rail-collapsed .cat-color,
  .app-shell.rail-collapsed .home-btn .cat-color { margin-right: 0.4rem; }

  /* The width transition reads off the grid track; animate it. */
  .app-shell { transition: grid-template-columns 0.18s ease; }
  @media (prefers-reduced-motion: reduce) {
    .app-shell { transition: none; }
  }

  /* Mobile re-open button (a floating ☰); shown only when the rail is an
     off-canvas drawer (≤720px). Hidden on desktop. */
  .rail-fab {
    display: none;
    position: fixed;
    right: 0.75rem;
    bottom: 2.6rem;
    z-index: 55;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--foreground);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 18px var(--glow-soft);
  }

  /* Home view */
  .home {
    display: none;
    padding: 1.5rem 1.8rem;
    overflow-y: auto; height: 100%;
    /* Container for the responsive .tldr-grid below — column-count tracks
       the actual available width, not the viewport (which changes with
       sidebar collapsed/expanded state). */
    container-type: inline-size;
    container-name: home;
  }
  .home.show { display: block; }
  .home h2 {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 48;
    font-size: 1.55rem; font-weight: 600;
    margin: 0 0 0.5rem; letter-spacing: -0.005em;
  }
  .home .lead { color: var(--muted-ink); margin-bottom: 1.4rem; font-family: var(--font-body); }

  /* Freshness line — "Stand: DD.MM.YYYY" from the manifest's `generated`
     date. Mono-caps to read as a dateline, not body copy. When the manifest
     wasn't rebuilt today (a silently-failed nightly task), .stale flips it to
     the warn accent and appends a hint, so a missed run is visible at a glance
     instead of looking like fresh content. */
  .home-stand {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-feature-settings: "tnum";
    margin: 0 0 1.2rem;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .home-stand .stand-date { font-weight: 600; color: var(--muted-ink); }
  .home-stand.stale { color: var(--warn); }
  .home-stand.stale .stand-date { color: var(--warn); }
  .home-stand .stand-note { text-transform: none; letter-spacing: 0.02em; font-style: italic; }

  /* Newsprint column grid — the dashboard reads like one paper folded into
     seven adjacent columns. No card chrome: backgrounds, borders, shadows
     and radii are stripped. Adjacent columns are separated only by a
     hairline column rule, the same way the body-grid inside a newsletter
     uses column-rule between deep-dive sections. */
  /* Responsive column grid — caps at 3 wide so the columns stay readable
     on huge screens instead of shrinking to 5-6 narrow strips. The min
     width per column is the larger of 320 px (floor for readability) or
     1/3 of the container (so no more than 3 fit). Single declaration —
     no media or container queries needed.

     The column-rule + row-rule logic uses container queries against .home
     so the layout responds to actual available width (which changes with
     sidebar collapsed/expanded), not viewport. */
  .tldr-grid {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(min(100%, max(320px, calc((100% - 2px) / 3))), 1fr));
    gap: 0;
    margin-top: 0.5rem;
  }
  .tldr-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    box-shadow: none;
    cursor: pointer;
    transition: background 150ms;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    border-left: 1px solid var(--rule);
  }

  /* Grouped layout: a full-width header band (Wirtschaft / IT / Sport / …)
     precedes each group's cards. The header spans every grid column so the
     column flow restarts beneath it — each group reads as its own newsprint
     block, matching the sidebar's grouping. */
  .tldr-group-head {
    grid-column: 1 / -1;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--soft);
    margin: var(--space-5) 0 0;
    padding: var(--space-3) 0 var(--space-2);
    border-top: 1px solid var(--rule);
  }
  /* The first group header sits right under the "Stand:" line — no big top gap
     or top rule, so the grid doesn't open with a stray divider. */
  .tldr-group-head:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  /* The leading card of each group clears its left column rule so the group's
     first column starts clean (JS marks it; nth-child can't track per-group
     position once headers are interspersed). */
  .tldr-card.group-first { border-left: none; padding-left: 0; }

  /* Single-column band (narrow): no column rules at all; cards in the same
     group separate by a dashed row rule. The group header already divides
     groups, so only same-group siblings (a card directly after another card)
     get the dashed top. */
  @container home (max-width: 639px) {
    .tldr-card { border-left: none; padding-left: 0; }
    .tldr-card + .tldr-card {
      margin-top: var(--space-3);
      padding-top: var(--space-5);
      border-top: 1px dashed var(--rule);
    }
  }
  /* Subtle tinted-paper feedback on hover — no transform, no shadow swap,
     so adjacent columns never visually shift. */
  .tldr-card:hover {
    background: color-mix(in srgb, var(--cat-accent) 4%, transparent);
  }
  .tldr-card:focus-visible {
    outline: 2px solid var(--cat-accent, var(--fg));
    outline-offset: 4px;
  }
  .crumb:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
    border-radius: var(--radius-inline);
  }

  /* Kicker line — same mono-caps treatment as the newsletter masthead-issue.
     Icon left, date right, category name in the middle. */
  .tldr-card-head {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.68rem;
    color: var(--muted-ink);
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
  .tldr-card-head .tile-icon {
    font-size: 1rem;
    letter-spacing: normal;
    text-transform: none;
  }
  .tldr-card-head .tile-name {
    font-family: inherit;
    font-variation-settings: normal;
    font-weight: 600;
    font-size: inherit;
    color: var(--cat-accent-text, var(--fg));
    flex: 1;
  }
  .tldr-card-head .tile-date {
    font-family: inherit;
    font-size: inherit;
    color: var(--muted-ink);
    font-weight: 500;
    font-feature-settings: "tnum";
    letter-spacing: 0.1em;
  }

  /* Section title — the actual newsletter headline, rendered as a section
     dek in Fraunces with the same accent-bar treatment as .col h2 inside
     a newsletter. Acts as the "front-page headline" for that category. */
  .tldr-card-headline {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 36, "SOFT" 60;
    font-size: 1.18rem;
    font-weight: 600;
    font-style: normal;
    line-height: 1.18;
    color: var(--fg);
    margin: var(--space-2) 0 var(--space-3);
    letter-spacing: -0.005em;
  }
  .tldr-card-headline::before {
    content: "";
    display: block;
    width: 2rem;
    height: 2px;
    background: var(--cat-accent);
    margin-bottom: var(--space-2);
  }

  /* Strip the embedded TL;DR section's own chrome — it inherits the column
     instead. The lead keeps its drop-cap treatment but at a smaller scale
     suited to the narrower column width. */
  .tldr-card-body .tldr {
    background: transparent; border: none; padding: 0; margin: 0; border-radius: 0;
    display: block;       /* override the .tldr:has(.lead) grid from styles.css */
    column-gap: 0;
  }
  .tldr-card-body .tldr > .lead {
    font-family: var(--font-body);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 var(--space-3);
    max-width: none;
  }
  .tldr-card-body .tldr > .lead::first-letter {
    font-family: var(--font-display);
    font-variation-settings: "opsz" 144, "SOFT" 100;
    font-size: 2.7rem;
    float: left;
    line-height: 0.85;
    padding: 0.25rem 0.45rem 0 0;
    color: var(--cat-accent);
    font-weight: 700;
  }
  .tldr-card-body .tldr ul {
    padding-left: 1rem;
    margin: 0;
    column-count: 1;       /* override 2-col bullet layout in narrow card */
  }
  .tldr-card-body .tldr li { font-size: 0.86rem; margin: 0.4rem 0; line-height: 1.5; }
  .tldr-card-body strong { color: var(--fg); font-weight: 700; }
  .tldr-card-body em { color: var(--muted-ink); font-style: italic; }
  .tldr-card-body a { color: inherit; text-decoration: underline; }
  /* Chips inside TL;DR bullets — tinted by the card's accent. */
  .tldr-card-body .chip {
    display: inline-block;
    font-family: var(--font-mono);
    background: color-mix(in srgb, var(--cat-accent, var(--rule-soft)) 14%, transparent);
    color: var(--fg);
    font-size: 0.6rem; font-weight: 600; padding: 0.05rem 0.45rem;
    border-radius: var(--radius-inline); letter-spacing: 0.04em; margin-right: 0.2rem;
    text-transform: uppercase; vertical-align: middle;

  .tldr-card-body .chip.hot  { background: rgba(182, 64, 47, 0.18); color: #b6402f; }
  .tldr-card-body .chip.good { background: rgba(63, 122, 79, 0.18); color: #3f7a4f; }

  .tldr-card-body a[href^="http"]::after { content: none; }
  /* "+N weitere" overflow marker — the home snapshot caps the TL;DR at a few
     bullets (the full set is one click away). Reads as a muted continuation
     cue, list-style stripped so it doesn't get its own bullet dot. */
  .tldr-card-body .tldr li.tldr-more {
    list-style: none;
    margin-left: -1rem;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    font-style: normal;
  }

  /* DE-fallback chip — shown in a card's kicker when the active language has
     no translation for this date and the card is showing the DE original.
     Understated outline so it informs without competing with the accent. */
  .tldr-card-head .fallback-flag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--soft);

    text-transform: uppercase;

    padding: 0.7rem 0.2rem 0.4rem 0; margin-top: auto;

  .tldr-empty {
    font-family: var(--font-body);
    font-size: 0.88rem; color: var(--soft); font-style: italic; padding: 0.4rem 0;

  /* Empty-state card — "Heute kein Brief". Same per-category accent stripe
     so the category identity is preserved, but the body is muted, dashed,

  .tldr-card--empty {
    cursor: default;
    background: color-mix(in srgb, var(--bg) 50%, var(--panel));
    box-shadow: none;
  }
  .tldr-card--empty:hover {
    transform: none;

  .tldr-empty-block {

    font-family: var(--font-body);
    font-size: 0.88rem;

    line-height: 1.5;
    font-style: italic;

  /* Per-category accents — each card scopes its own --cat-accent and
     --cat-accent-text so descendant rules (kicker tile-name, accent bar above
     the headline, drop cap, chips, CTA) all pick up the right colour. */
  .tldr-card[data-cat="economy"]        { --cat-accent: var(--c-economy);        --cat-accent-text: var(--c-economy-text); }
  .tldr-card[data-cat="software"]       { --cat-accent: var(--c-software);       --cat-accent-text: var(--c-software-text); }

  .cat[data-cat="economy"]        { --cat-accent: var(--c-economy); }

  .home-btn {

  .home-btn.active { background: var(--muted); color: var(--primary); }
  .home-btn .cat-color {
    width: 6px; height: 18px; border-radius: 0; flex: none;
    background: var(--foreground);
  }
  /* Brand mark = the favicon design at category-icon size. */

    width: 1.1rem;
    height: 1.1rem;
    flex: none;
  }
  .home-btn:focus-visible,

    outline: 2px solid var(--ring, var(--primary));
    outline-offset: -2px;
  }

  /* ────────────────────────────────────────────────────────────────────
     Mobile / narrow responsiveness — the nav-rail becomes an off-canvas
     drawer (the .app-shell collapses to a single main column), toggled by
     the floating .rail-fab. The header keeps brand + history controls.
     ──────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    header.app { padding: 0 0.75rem; gap: 0.6rem; }

    .tldr-grid { grid-template-columns: 1fr; gap: 0.85rem; }
    .home h2 { font-size: 1.2rem; }
    .status-controls { gap: 0.9rem; }

    /* Single main column; the rail floats as an off-canvas drawer pinned
       under the header / above the footer, slid off to the right until opened. */
    .app-shell,
    .app-shell.rail-collapsed { grid-template-columns: 1fr; }
    .nav-rail {
      position: fixed;
      top: 3rem;
      right: 0;
      bottom: 2rem;
      width: min(80vw, 18rem);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 56;
      box-shadow: -8px 0 24px var(--glow-soft);
    }
    .app-shell.rail-open .nav-rail { transform: translateX(0); }
    /* On mobile the drawer always shows full labels — never the icon strip. */
    .app-shell.rail-collapsed .nav-rail-title,
    .app-shell.rail-collapsed .nav-label,
    .app-shell.rail-collapsed .cat-name,
    .app-shell.rail-collapsed .cat-latest,
    .app-shell.rail-collapsed .cat-toggle,
    .app-shell.rail-collapsed .cat-dates,
    .app-shell.rail-collapsed .home-btn .nav-label-text,
    .app-shell.rail-collapsed .home-btn .brand-mark { display: revert; }
    .app-shell.rail-collapsed .nav-rail-head { justify-content: flex-start; padding: 0.4rem 0.85rem; }
    .app-shell.rail-collapsed .cat-head,
    .app-shell.rail-collapsed .home-btn {
      justify-content: flex-start; padding-left: 0.85rem; padding-right: 0.85rem; gap: 0.55rem;

    .rail-fab { display: inline-flex; align-items: center; justify-content: center; }
  }
  @media (max-width: 400px) {
    header.app { padding: 0 0.6rem; }
    .header-brand .brand-word { font-size: 0.85rem; }

    .tldr-card { padding: 0.8rem 0.9rem 0.7rem; }

<!-- Terminal header bar (mirrors pagr): LEFT brand wordmark + cursor; RIGHT the
     nav-rail minimize toggle. The grouped category nav lives in the sticky right
     sidebar (.nav-rail). -->
<header class="app">

    </button>
  </div>
</header>

<div class="app-shell">

  <!-- Sticky right sidebar: the relocated Übersicht control (#home-btn) and the
       grouped category nav (#nav-groups, populated by JS from NAV_GROUPS). Can be
       minimized to an icon-only strip; collapsed state persists in localStorage. -->
  <aside class="nav-rail" id="nav-rail" aria-label="Navigation">

      <span class="nav-rail-title">~/briefs</span>
    </div>

           with its own .nav-label header (standalone groups render headerless). --></div>
    </div>
  </aside>
</div>

        aria-label="Navigation öffnen" title="Navigation">☰</button>

        <span>anim</span>
      </button>
    </nav>
  </div>
</footer>

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Die Woche startet mit zwei Risiken, die sich auf denselben Kurs stapeln. Übers Wochenende eskalierte der US-Iran-Konflikt weiter — eine neue US-Angriffswelle (~140 Ziele am 11.07.), und am <strong>12.07.</strong> erklärte Irans Revolutionsgarde die Straße von Hormuz förmlich für geschlossen. Das US-Zentralkommando bestreitet das (die Straße sei „für alle Schiffe offen\"), doch der reale Verkehr brach ein — rund <strong>21</strong> Durchfahrten am 11.07. gegen sonst ~140/Tag. Dazu ein gestrichener US-Waiver für iranisches Öl ab dem <strong>17.07.</strong> Die Folge heute Morgen: Brent springt um <strong>+4,32 %</strong> auf <strong>79,29 $</strong>, der Dollar-Index zieht leicht an. Und mitten in diese Nervosität fällt am <strong>Mittwoch, 15.07.</strong>, die gesetzliche US-Entscheidungsfrist über einen zusätzlichen <strong>25-%-Zoll</strong> auf brasilianische Waren. Trotzdem hielt sich der Real erstaunlich gut: Der letzte harte Anker ist der ECB-Fix vom Freitag bei <strong>5,8505</strong>, ein dünner Montags-Asia-Tick lag sogar leicht tiefer bei <strong>5,8241</strong>. Der Grund ist ein Detail, das viele übersehen — Brasilien <em>exportiert</em> Öl, ein Öl-Schock ist für den Real also zweischneidig. Fester Boden unter dem Kurs, aber ein binärer Mittwoch und ein live laufender Öl-Schock darüber.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (ECB-Fix, Fr 10.07.) — letzter harter Anker; heutiger Fix noch nicht veröffentlicht (~16:00 CET). Indikativer Montags-Asia-Tick <span class=\"stat\">5,8241</span> (dünn), Real leicht fester übers Wochenende.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Öl-Schock: Brent 79,29 $</strong> (+4,32 % am Tag, heute 13.07.) — neue US-Angriffswelle; Iran erklärte Hormuz am 12.07. für geschlossen (US/CENTCOM bestreitet), realer Verkehr ~21 vs. ~140/Tag; US-Iran-Öl-Waiver endet 17.07.</li>\n      <li><span class=\"chip hot\">USA/BR</span> <strong>Zoll-Frist Mi 15.07.</strong> — USTR Section 301, zusätzliche 25 % auf BR-Waren, gesetzliche Entscheidungsfrist in <strong>2 Tagen</strong>.</li>\n      <li><span class=\"chip\">USA/BR</span> <strong>Zoll-Nuance</strong>: Der frühere 50-%-IEEPA-Zoll wurde im Februar vom US-Supreme-Court gekippt (Basis jetzt ~10 %, Section 122); ob die 25 % obendraufkommen oder sich gegenseitig ausschließen, ist bis <strong>24.07.</strong> selbst offen.</li>\n      <li><span class=\"chip\">BR</span> <strong>Exponierung</strong>: CNI schätzt ~<span class=\"stat\">4.200 Produkte</span> / ~<span class=\"stat\">15 Mrd. $</span> betroffen; parallele Zwangsarbeits-Untersuchung mit möglichen weiteren <strong>12,5 %</strong>, fällig 24.07.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101,07</strong> (+0,12 %, heute 13.07.) — Dollar leicht fester im Risk-off, weg vom Jahres-Tief. Kleiner Gegenwind für den Real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: kein Live-Montagswert (Quelle blockiert). Letzter harter Schluss <span class=\"stat\">5,1185</span> (Frankfurter/ECB-gestützt) bzw. 5,1095 (investing.com) — beide 10.07. Ehrlich geflaggt.</li>\n      <li><span class=\"chip\">FX</span> <strong>Kreuzkurs-Check sauber</strong>: ECB-Fix 5,8505 vs. rechnerisch 5,8504 (0,001 %); gegen unabhängigen Marktschluss 5,8317 = 0,32 % (Zeitversatz, unter der Flag-Linie).</li>\n      <li><span class=\"chip good\">BR</span> <strong>5J-CDS 123,90 bp</strong> (−1,06 %, 10.07.) — die Ausfall-Risikoprämie fiel leicht, ein stiller Gegenpol zum Zoll-/Öl-Lärm.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25 %</strong> (seit 17.06., 3. Senkung in Folge); nächster Copom 04.–05.08. Der Markt preist nach der weichen Juni-Inflation eine August-Senkung ein.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed hält 3,50–3,75 %</strong> (17.06., Warshs erste Sitzung); nächstes FOMC 28.–29.07., Konsens Halten.</li>\n      <li><span class=\"chip\">Hinweis</span> Prognose-Wahrscheinlichkeiten unten = <strong>meine Konfidenz</strong>, keine markt-implizite Zahl.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">The week opens with two risks stacked on the same exchange rate. Over the weekend the US-Iran conflict escalated further — a new wave of American strikes (~140 targets on Jul 11) — and on Jul 12 Iran's Revolutionary Guard formally declared the Strait of Hormuz closed. US Central Command disputes that (the strait is \"open to all vessels\"), yet real traffic collapsed — around 21 transits on Jul 11 versus the usual ~140/day. On top of that, a US waiver for Iranian oil lapses effective <strong>Jul 17</strong>. The result this morning: Brent jumps <strong>+4.32%</strong> to <strong>$79.29</strong>, and the dollar index ticks up slightly. And right in the middle of this nervousness, <strong>Wednesday, Jul 15</strong>, brings the statutory US deadline to decide on an additional <strong>25% tariff</strong> on Brazilian goods. Despite all that, the Real held up remarkably well: the last hard anchor is Friday's ECB fix at <strong>5.8505</strong>, and a thin Monday Asia tick even sat slightly lower at <strong>5.8241</strong>. The reason is a detail many overlook — Brazil <em>exports</em> oil, so an oil shock is a double-edged sword for the Real. Solid ground under the rate, but a binary Wednesday and a live oil shock hang over it.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5.8505</strong> (ECB fix, Fri Jul 10) — last hard anchor; today's fix not yet published (~16:00 CET). Indicative Monday Asia tick <span class=\"stat\">5.8241</span> (thin), Real slightly firmer over the weekend.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Oil shock: Brent $79.29</strong> (+4.32% on the day, today Jul 13) — new wave of US strikes; Iran declared Hormuz closed on Jul 12 (US/CENTCOM disputes it), real traffic ~21 vs. ~140/day; US-Iran oil waiver ends Jul 17.</li>\n      <li><span class=\"chip hot\">USA/BR</span> <strong>Tariff deadline Wed Jul 15</strong> — USTR Section 301, additional 25% on BR goods, statutory decision deadline in <strong>2 days</strong>.</li>\n      <li><span class=\"chip\">USA/BR</span> <strong>Tariff nuance</strong>: The earlier 50% IEEPA tariff was struck down by the US Supreme Court in February (base now ~10%, Section 122); whether the 25% stacks on top or is mutually exclusive remains open until <strong>Jul 24</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Exposure</strong>: CNI estimates ~<span class=\"stat\">4,200 products</span> / ~<span class=\"stat\">$15B</span> affected; parallel forced-labor investigation with a possible additional <strong>12.5%</strong>, due Jul 24.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101.07</strong> (+0.12%, today Jul 13) — dollar slightly firmer in the risk-off move, away from its yearly low. A small headwind for the Real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: no live Monday value (source blocked). Last hard close <span class=\"stat\">5.1185</span> (Frankfurter/ECB-backed) or 5.1095 (investing.com) — both Jul 10. Flagged honestly.</li>\n      <li><span class=\"chip\">FX</span> <strong>Cross-rate check clean</strong>: ECB fix 5.8505 vs. calculated 5.8504 (0.001%); against an independent market close 5.8317 = 0.32% (time lag, below the flag line).</li>\n      <li><span class=\"chip good\">BR</span> <strong>5Y CDS 123.90 bp</strong> (−1.06%, Jul 10) — the default-risk premium eased slightly, a quiet counterweight to the tariff/oil noise.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14.25%</strong> (since Jun 17, 3rd cut in a row); next Copom meeting Aug 4–5. The market is pricing in an August cut after soft June inflation.</li>\n      <li><span class=\"chip\">USA</span> <strong>Fed holds at 3.50–3.75%</strong> (Jun 17, Warsh's first meeting); next FOMC Jul 28–29, consensus hold.</li>\n      <li><span class=\"chip\">Heads up</span> Forecast probabilities below = <strong>my confidence</strong>, not a market-implied number.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A semana começa com dois riscos empilhados sobre a mesma cotação. Durante o fim de semana, o conflito entre EUA e Irã voltou a escalar — uma nova onda de ataques americanos (~140 alvos em 11/07) — e, em 12/07, a Guarda Revolucionária do Irã declarou formalmente o Estreito de Ormuz fechado. O Comando Central dos EUA contesta isso (o estreito estaria \"aberto a todos os navios\"), mas o tráfego real despencou — cerca de 21 travessias em 11/07, contra as ~140/dia habituais. Além disso, uma isenção americana para o petróleo iraniano expira a partir de <strong>17/07</strong>. O resultado hoje de manhã: o Brent salta <strong>+4,32%</strong> para <strong>US$ 79,29</strong>, e o índice do dólar sobe levemente. E bem no meio dessa nervosidade cai, na <strong>quarta-feira, 15/07</strong>, o prazo legal americano para decidir sobre uma tarifa adicional de <strong>25%</strong> sobre produtos brasileiros. Mesmo assim, o real se manteve surpreendentemente firme: a última âncora sólida é o fixing do BCE de sexta-feira, em <strong>5,8505</strong>; um tick fino de segunda-feira na Ásia ficou até um pouco mais baixo, em <strong>5,8241</strong>. O motivo é um detalhe que muitos ignoram — o Brasil <em>exporta</em> petróleo, então um choque do petróleo é uma faca de dois gumes para o real. Terreno firme sob a cotação, mas uma quarta-feira binária e um choque do petróleo em andamento pairam sobre ela.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (fixing do BCE, sex 10/07) — última âncora sólida; fixing de hoje ainda não publicado (~16h CET). Tick indicativo de segunda na Ásia <span class=\"stat\">5,8241</span> (fino), real levemente mais firme no fim de semana.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Choque do petróleo: Brent US$ 79,29</strong> (+4,32% no dia, hoje 13/07) — nova onda de ataques dos EUA; Irã declarou Ormuz fechado em 12/07 (EUA/CENTCOM contesta), tráfego real ~21 vs. ~140/dia; isenção de petróleo EUA-Irã termina em 17/07.</li>\n      <li><span class=\"chip hot\">EUA/BR</span> <strong>Prazo do tarifaço qua 15/07</strong> — USTR Seção 301, 25% adicionais sobre produtos brasileiros, prazo legal de decisão em <strong>2 dias</strong>.</li>\n      <li><span class=\"chip\">EUA/BR</span> <strong>Nuance tarifária</strong>: a antiga tarifa de 50% do IEEPA foi derrubada pela Suprema Corte dos EUA em fevereiro (base agora ~10%, Seção 122); se os 25% se somam ou se excluem mutuamente ainda está em aberto até <strong>24/07</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Exposição</strong>: a CNI estima ~<span class=\"stat\">4.200 produtos</span> / ~<span class=\"stat\">US$ 15 bi</span> afetados; investigação paralela sobre trabalho forçado com possíveis <strong>12,5%</strong> adicionais, com prazo em 24/07.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101,07</strong> (+0,12%, hoje 13/07) — dólar levemente mais firme no movimento de aversão a risco, longe da mínima do ano. Um pequeno vento contrário para o real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: sem valor ao vivo de segunda (fonte bloqueada). Último fechamento sólido <span class=\"stat\">5,1185</span> (respaldado por Frankfurter/BCE) ou 5,1095 (investing.com) — ambos de 10/07. Sinalizado com honestidade.</li>\n      <li><span class=\"chip\">FX</span> <strong>Checagem de câmbio cruzado limpa</strong>: fixing do BCE 5,8505 vs. cálculo 5,8504 (0,001%); contra fechamento de mercado independente 5,8317 = 0,32% (defasagem de horário, abaixo da linha de alerta).</li>\n      <li><span class=\"chip good\">BR</span> <strong>CDS de 5 anos 123,90 bp</strong> (−1,06%, 10/07) — o prêmio de risco de calote caiu levemente, um contraponto silencioso ao barulho de tarifas/petróleo.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> (desde 17/06, 3ª queda seguida); próximo Copom em 04–05/08. O mercado precifica um corte em agosto após a inflação branda de junho.</li>\n      <li><span class=\"chip\">EUA</span> <strong>Fed mantém 3,50–3,75%</strong> (17/06, primeira reunião de Warsh); próximo FOMC 28–29/07, consenso de manutenção.</li>\n      <li><span class=\"chip\">Atenção</span> As probabilidades de previsão abaixo são <strong>minha confiança</strong>, não um número implícito do mercado.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">La semana arranca con dos riesgos apilados sobre el mismo tipo de cambio. Durante el fin de semana, el conflicto entre Estados Unidos e Irán volvió a escalar — una nueva oleada de ataques estadounidenses (~140 objetivos el 11/07) — y, el 12/07, la Guardia Revolucionaria de Irán declaró formalmente cerrado el Estrecho de Ormuz. El Comando Central de EE. UU. lo desmiente (el estrecho estaría \"abierto a todos los buques\"), pero el tráfico real se desplomó — alrededor de 21 tránsitos el 11/07 frente a los ~140/día habituales. A esto se suma una exención estadounidense para el petróleo iraní que vence a partir del <strong>17/07</strong>. El resultado esta mañana: el Brent salta <strong>+4,32%</strong> hasta los <strong>US$ 79,29</strong>, y el índice del dólar sube ligeramente. Y justo en medio de este nerviosismo cae, el <strong>miércoles 15/07</strong>, el plazo legal estadounidense para decidir sobre un arancel adicional del <strong>25%</strong> a los productos brasileños. Aun así, el real se mantuvo sorprendentemente firme: el último ancla sólida es el fixing del BCE del viernes en <strong>5,8505</strong>; un tick delgado de la sesión asiática del lunes se ubicó incluso un poco más bajo, en <strong>5,8241</strong>. La razón es un detalle que muchos pasan por alto — Brasil <em>exporta</em> petróleo, así que un choque petrolero es un arma de doble filo para el real. Terreno firme bajo el tipo de cambio, pero un miércoles binario y un choque petrolero en curso penden sobre él.</p>\n    <ul>\n      <li><span class=\"chip hot\">FX</span> <strong>EUR/BRL 5,8505</strong> (fixing del BCE, vie 10/07) — último ancla sólida; el fixing de hoy aún no se publica (~16:00 CET). Tick indicativo del lunes en Asia <span class=\"stat\">5,8241</span> (delgado), real ligeramente más firme durante el fin de semana.</li>\n      <li><span class=\"chip hot\">Global</span> <strong>Choque petrolero: Brent US$ 79,29</strong> (+4,32% en el día, hoy 13/07) — nueva oleada de ataques de EE. UU.; Irán declaró cerrado Ormuz el 12/07 (EE. UU./CENTCOM lo desmiente), tráfico real ~21 vs. ~140/día; la exención petrolera EE. UU.-Irán termina el 17/07.</li>\n      <li><span class=\"chip hot\">EE. UU./BR</span> <strong>Plazo arancelario mié 15/07</strong> — USTR Sección 301, 25% adicional sobre productos brasileños, plazo legal de decisión en <strong>2 días</strong>.</li>\n      <li><span class=\"chip\">EE. UU./BR</span> <strong>Matiz arancelario</strong>: el antiguo arancel del 50% del IEEPA fue anulado por la Suprema Corte de EE. UU. en febrero (base ahora ~10%, Sección 122); si el 25% se suma o se excluye mutuamente sigue abierto hasta el <strong>24/07</strong>.</li>\n      <li><span class=\"chip\">BR</span> <strong>Exposición</strong>: la CNI estima ~<span class=\"stat\">4.200 productos</span> / ~<span class=\"stat\">US$ 15 mil millones</span> afectados; investigación paralela de trabajo forzado con un posible <strong>12,5%</strong> adicional, con vencimiento el 24/07.</li>\n      <li><span class=\"chip\">FX</span> <strong>DXY 101,07</strong> (+0,12%, hoy 13/07) — dólar ligeramente más firme en el movimiento de aversión al riesgo, lejos de su mínimo anual. Un pequeño viento en contra para el real.</li>\n      <li><span class=\"chip\">FX</span> <strong>USD/BRL</strong>: sin valor en vivo del lunes (fuente bloqueada). Último cierre sólido <span class=\"stat\">5,1185</span> (respaldado por Frankfurter/BCE) o 5,1095 (investing.com) — ambos del 10/07. Señalado con honestidad.</li>\n      <li><span class=\"chip\">FX</span> <strong>Verificación de tipo cruzado, limpia</strong>: fixing del BCE 5,8505 vs. cálculo 5,8504 (0,001%); contra un cierre de mercado independiente de 5,8317 = 0,32% (desfase de horario, por debajo de la línea de alerta).</li>\n      <li><span class=\"chip good\">BR</span> <strong>CDS a 5 años 123,90 pb</strong> (−1,06%, 10/07) — la prima de riesgo de impago bajó ligeramente, un contrapeso silencioso al ruido arancelario y petrolero.</li>\n      <li><span class=\"chip\">BR</span> <strong>Selic 14,25%</strong> (desde el 17/06, 3er recorte consecutivo); próximo Copom 04–05/08. El mercado descuenta un recorte en agosto tras la inflación suave de junio.</li>\n      <li><span class=\"chip\">EE. UU.</span> <strong>La Fed mantiene 3,50–3,75%</strong> (17/06, primera reunión de Warsh); próximo FOMC 28–29/07, consenso de mantener.</li>\n      <li><span class=\"chip\">Atención</span> Las probabilidades de pronóstico de abajo son <strong>mi confianza</strong>, no una cifra implícita del mercado.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Genau das, worauf der Markt Freitag <em>nicht</em> gewettet hatte, ist übers Wochenende passiert. Am Freitag stand Brent noch bei 76 $, obwohl in Hormuz eine echte Golf-Krise tobte — der Markt bepreiste einen begrenzten Konflikt. Über das Wochenende eskalierte es: Nach erneuten US-Schlägen erklärte Irans Revolutionsgarde am 12.07. die Straße von Hormuz für „bis auf Weiteres geschlossen\" (Vergeltung für einen iranischen Angriff auf einen zypriotisch-geflaggten Containerfrachter am 11.07.) — das US-CENTCOM bestreitet die Sperre, doch die realen Durchfahrten brachen laut Windward auf ~21 gegenüber ~140/Tag vor dem Krieg ein. Montagfrüh springt <strong>Brent +4,3 % auf 79,28 $</strong>, <strong>WTI +4,4 % auf 74,52 $</strong>.<sup>[5][6]</sup> Die dünne Kriegsprämie ist schlagartig zurück. Die Aktien sind derweil eingefroren auf Freitags grünen Schlusskursen — <strong>Nvidia 210,96 $ (+4,0 %)</strong>, <strong>META 669,21 $ (+6,0 %)</strong> auf seiner neuen „Meta-Compute\"-Cloud —, während im Hintergrund die ungelöste Frage nach der Nachhaltigkeit des KI-Ausbaus schwelt.<sup>[1][2]</sup> Und im einzigen Markt, der durchlief, bröckelt es: <strong>Bitcoin 62.709 $</strong> — unter der Kostenbasis von MicroStrategy/Strategy, das erstmals seit 2022 zum <em>Netto-Verkäufer</em> geworden ist.<sup>[10][11]</sup> Kurios nur Gold: Es fiel trotz der Golf-Eskalation um 1,25 %.</p>\n    <ul>\n      <li><span class=\"chip hot\">ÖL</span> <strong>Brent 79,28 $ (+4,31 %), WTI 74,52 $ (+4,36 %)</strong> (Futures, 13.07. ~05:00 UTC). Iran erklärte die Straße von Hormuz am 12.07. für „bis auf Weiteres geschlossen\" — das US-CENTCOM bestreitet es („der Verkehr fließt\"), doch die Durchfahrten brachen laut Windward auf ~21 (11.07.) statt ~140/Tag vor dem Krieg ein. Die Prämie, die Freitag fehlte, ist zurück. Gegenwind: OPEC+ hebt die August-Förderung um +188.000 bpd. Die spannendste Zwei-Seiten-Wette des Tapes.</li>\n      <li><span class=\"chip hot\">AI-INFRA</span> <strong>Nvidia 210,96 $ (+4,0 %), META 669,21 $ (+6,0 %)</strong> (Schluss Fr 10.07.). METAs Treiber: die Vorstellung des KI-Cloud-Geschäfts „Meta Compute\" plus eines eigenen „Iris\"-Chips. Dahinter die eigentliche Debatte: Anfang Juli verloren Samsung + SK Hynix an <em>einem</em> Tag rund 290 Mrd. $ auf Sorgen um die KI-Capex-Nachhaltigkeit — Freitag schloss die Woche trotzdem grün. Ungelöst.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC 62.709 $ (−1,96 % 24h)</strong> (CoinGecko 13.07. 05:07 UTC). Von &gt;93.000 $ zu Jahresbeginn, Ende Juni kurz unter 60.000 $. Strategy verkaufte 3.588 BTC (~216 Mio. $) Ende Juni/Anfang Juli — der größte Verkauf seit 2022 — und liegt bei einer Kostenbasis von ~75.476 $ nun rund 17 % unter Wasser. Der größte Firmen-Halter verkauft. Struktureller Überhang.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold 4.069 $/oz (−1,25 % d/d)</strong> (TradingEconomics 13.07.), −5,6 % auf den Monat. Der kuriose Kontrast: Gold fiel <em>trotz</em> der Golf-Eskalation, die Öl hebt. Grund: Der Dollar hält fest (DXY 101,07), und ein Metall ohne Zins verliert gegen feste Realzinsen. Versicherung halten, nicht aufstocken.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.782 $ (−1,25 % 24h)</strong>. Gleichschritt-Beta zu BTC, kein eigener Trigger; ETH-ETF-Zuflüsse schwächer als BTCs. Halten.</li>\n      <li><span class=\"chip\">SEKTOREN</span> Alles 1–8 % rot auf 24h im Sog eines flachen BTC. Am schwersten <strong>VIRTUAL −7,35 %</strong>. Gesamt-Krypto-Cap 2,249 Bio. $ (−1,31 %), BTC-Dominanz 56,0 % — das Kapital flieht aus den Alts in Bitcoin. Kein Neu-Einstieg.</li>\n      <li><span class=\"chip\">MAKRO</span> Alle Timeframes laufen auf den <strong>FOMC 28.–29.07.</strong> zu. Die Fed hielt im Juni bei <strong>3,50–3,75 %</strong> mit hawkishem Ton. Davor der erste Einzel-Test: <strong>Tesla-Q2-Zahlen Mi 22.07.</strong> (Rekord-Auslieferungen, aber die Aktie fiel trotzdem).</li>\n      <li><span class=\"chip\">REVIERE</span> KI-Produkt- und Chip-Details (Meta Compute, Iris) stehen im <em>ai-dev</em>-/<em>ai-usecases</em>-Brief. Hier zählt allein die Kursreaktion.</li>\n    </ul></div>",

        "en": "<div class=\"tldr\"><p class=\"lead\">Exactly what the market wasn't betting on Friday happened over the weekend. On Friday, Brent was still sitting at $76, even as a real Gulf crisis raged around Hormuz — the market was pricing a contained conflict. Over the weekend it escalated: after renewed US strikes, Iran's Revolutionary Guard declared the Strait of Hormuz \"closed until further notice\" on 07-12 (retaliation for an Iranian attack on a Cyprus-flagged container ship on 07-11) — the US CENTCOM disputes the closure, yet actual transits collapsed to roughly 21, versus roughly 140/day before the war, according to Windward. Monday morning <strong>Brent jumps +4.3% to $79.28</strong>, <strong>WTI +4.4% to $74.52</strong>.<sup>[5][6]</sup> The thin war premium is suddenly back. Stocks, meanwhile, are frozen on Friday's green closes — <strong>Nvidia $210.96 (+4.0%)</strong>, <strong>META $669.21 (+6.0%)</strong> on its new \"Meta Compute\" cloud —, while in the background the unresolved question of AI buildout sustainability keeps simmering.<sup>[1][2]</sup> And in the one market that kept trading through the weekend, cracks are showing: <strong>Bitcoin $62,709</strong> — below MicroStrategy/Strategy's cost basis, which has turned <em>net seller</em> for the first time since 2022.<sup>[10][11]</sup> The one oddity is gold: it fell 1.25% despite the Gulf escalation.</p>\n    <ul>\n      <li><span class=\"chip hot\">OIL</span> <strong>Brent $79.28 (+4.31%), WTI $74.52 (+4.36%)</strong> (futures, 07-13 ~05:00 UTC). Iran declared the Strait of Hormuz \"closed until further notice\" on 07-12 — the US CENTCOM disputes it (\"traffic is flowing\"), yet transits collapsed to ~21 (07-11), versus ~140/day before the war, according to Windward. The premium missing on Friday is back. Headwind: OPEC+ raises August output by +188,000 bpd. The most interesting two-sided bet on the tape today.</li>\n      <li><span class=\"chip hot\">AI INFRA</span> <strong>Nvidia $210.96 (+4.0%), META $669.21 (+6.0%)</strong> (close Fri 07-10). META's driver: the unveiling of its AI cloud business \"Meta Compute\" plus an in-house \"Iris\" chip. Behind it, the real debate: in early July, Samsung + SK Hynix lost about $290B in value in a <em>single</em> day on worries about AI capex sustainability — yet Friday still closed the week green. Unresolved.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC $62,709 (−1.96% 24h)</strong> (CoinGecko 07-13 05:07 UTC). Down from &gt;$93,000 at the start of the year, briefly under $60,000 in late June. Strategy sold 3,588 BTC (~$216M) in late June/early July — its largest sale since 2022 — and at a cost basis of ~$75,476 is now roughly 17% underwater. The largest corporate holder is selling. A structural overhang.</li>\n      <li><span class=\"chip\">GOLD</span> <strong>Gold $4,069/oz (−1.25% d/d)</strong> (TradingEconomics 07-13), −5.6% on the month. The odd contrast: gold fell <em>despite</em> the Gulf escalation that's lifting oil. Reason: the dollar is holding firm (DXY 101.07), and a metal that pays no yield loses out against firm real rates. Hold the insurance, don't add.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH $1,782 (−1.25% 24h)</strong>. Lockstep beta to BTC, no catalyst of its own; ETH ETF inflows weaker than BTC's. Hold.</li>\n      <li><span class=\"chip\">SECTORS</span> Everything is 1–8% red on 24h, dragged down by a flat BTC. Hardest hit: <strong>VIRTUAL −7.35%</strong>. Total crypto cap $2.249T (−1.31%), BTC dominance 56.0% — capital is fleeing alts into Bitcoin. No new entries.</li>\n      <li><span class=\"chip\">MACRO</span> Every timeframe converges on the <strong>FOMC meeting on July 28–29</strong>. The Fed held in June at <strong>3.50–3.75%</strong> with a hawkish tone. Before that, the first single-name test: <strong>Tesla Q2 earnings Wed 07-22</strong> (record deliveries, yet the stock fell anyway).</li>\n      <li><span class=\"chip\">TERRITORY</span> AI product and chip details (Meta Compute, Iris) belong in the <em>ai-dev</em>/<em>ai-usecases</em> brief. Here only the price reaction counts.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">Exatamente aquilo em que o mercado <em>não</em> tinha apostado na sexta-feira aconteceu no fim de semana. Na sexta, o Brent ainda estava em 76 $, apesar de uma crise real do Golfo em Hormuz — o mercado precificava um conflito limitado. Durante o fim de semana a coisa escalou: após novos ataques dos EUA, a Guarda Revolucionária do Irã declarou em 12/07 o Estreito de Hormuz \"fechado até segunda ordem\" (retaliação a um ataque iraniano contra um navio porta-contêineres com bandeira cipriota em 11/07) — o CENTCOM dos EUA contesta o fechamento, mas as travessias reais despencaram, segundo a Windward, para ~21 ante ~140/dia antes da guerra. Nesta segunda de manhã, <strong>Brent salta +4,3% para 79,28 $</strong>, <strong>WTI +4,4% para 74,52 $</strong>.<sup>[5][6]</sup> O tênue prêmio de guerra está de volta de repente. As ações, por sua vez, seguem congeladas nos fechamentos verdes de sexta — <strong>Nvidia 210,96 $ (+4,0%)</strong>, <strong>META 669,21 $ (+6,0%)</strong> com sua nova nuvem \"Meta Compute\" —, enquanto no pano de fundo persiste a questão não resolvida sobre a sustentabilidade da expansão de IA.<sup>[1][2]</sup> E no único mercado que operou continuamente, há rachaduras: <strong>Bitcoin 62.709 $</strong> — abaixo do custo médio da MicroStrategy/Strategy, que se tornou <em>vendedora líquida</em> pela primeira vez desde 2022.<sup>[10][11]</sup> Curioso apenas o ouro: caiu 1,25% apesar da escalada no Golfo.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 79,28 $ (+4,31%), WTI 74,52 $ (+4,36%)</strong> (futuros, 13/07 ~05h00 UTC). O Irã declarou o Estreito de Hormuz \"fechado até segunda ordem\" em 12/07 — o CENTCOM dos EUA contesta (\"o tráfego flui\"), mas as travessias despencaram, segundo a Windward, para ~21 (11/07) ante ~140/dia antes da guerra. O prêmio que faltava na sexta está de volta. Contrapeso: a OPEP+ eleva a produção de agosto em +188.000 bpd. A aposta de dois lados mais interessante do dia.</li>\n      <li><span class=\"chip hot\">IA-INFRA</span> <strong>Nvidia 210,96 $ (+4,0%), META 669,21 $ (+6,0%)</strong> (fechamento sex 10/07). Motor da META: o anúncio do negócio de nuvem de IA \"Meta Compute\" mais um chip próprio, o \"Iris\". Por trás, o verdadeiro debate: no início de julho, Samsung + SK Hynix perderam cerca de US$ 290 bilhões em <em>um único</em> dia por temores sobre a sustentabilidade do capex de IA — mesmo assim, a semana fechou em alta na sexta. Sem resolução.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC 62.709 $ (−1,96% em 24h)</strong> (CoinGecko 13/07, 05h07 UTC). Vindo de &gt;93.000 $ no início do ano, com uma mínima abaixo de 60.000 $ no fim de junho. A Strategy vendeu 3.588 BTC (~216 milhões $) entre fim de junho e início de julho — a maior venda desde 2022 — e, com um custo médio de ~75.476 $, está agora cerca de 17% no vermelho. O maior detentor corporativo está vendendo. Excesso estrutural de oferta.</li>\n      <li><span class=\"chip\">OURO</span> <strong>Ouro 4.069 $/oz (−1,25% d/d)</strong> (TradingEconomics 13/07), −5,6% no mês. O contraste curioso: o ouro caiu <em>apesar</em> da escalada no Golfo, que impulsiona o petróleo. Motivo: o dólar se mantém firme (DXY 101,07), e um metal sem juros perde para juros reais firmes. Manter o seguro, não aumentar posição.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.782 $ (−1,25% em 24h)</strong>. Beta em sincronia com o BTC, sem gatilho próprio; entradas em ETFs de ETH mais fracas que as de BTC. Manter.</li>\n      <li><span class=\"chip\">SETORES</span> Tudo entre 1 e 8% no vermelho em 24h, arrastado por um BTC estagnado. O mais castigado: <strong>VIRTUAL −7,35%</strong>. Capitalização total de cripto em 2,249 trilhões $ (−1,31%), dominância do BTC em 56,0% — o capital foge das altcoins para o Bitcoin. Sem novas entradas.</li>\n      <li><span class=\"chip\">MACRO</span> Todos os prazos convergem para o <strong>FOMC de 28-29/07</strong>. O Fed manteve em junho a taxa em <strong>3,50–3,75%</strong> com tom hawkish. Antes disso, o primeiro teste isolado: <strong>resultados do 2º tri da Tesla, qua 22/07</strong> (entregas recordes, mas a ação caiu mesmo assim).</li>\n      <li><span class=\"chip\">TERRITÓRIOS</span> Detalhes de produtos e chips de IA (Meta Compute, Iris) ficam no brief de <em>ai-dev</em>/<em>ai-usecases</em>. Aqui, o que conta é só a reação do preço.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">Exactamente lo que el mercado no había apostado el viernes ocurrió durante el fin de semana. El viernes, Brent seguía en 76 $, pese a que en Ormuz se libraba una crisis real del Golfo — el mercado descontaba un conflicto limitado. Durante el fin de semana la situación escaló: tras nuevos ataques estadounidenses, la Guardia Revolucionaria de Irán declaró el 12.07. el estrecho de Ormuz \"cerrado hasta nuevo aviso\" (represalia por un ataque iraní del 11.07. contra un buque portacontenedores de bandera chipriota) — el CENTCOM de EE. UU. niega el cierre, pero los tránsitos reales, según Windward, se desplomaron a ~21 frente a ~140/día antes de la guerra. En la madrugada del lunes, <strong>Brent salta +4,3 % a 79,28 $</strong>, <strong>WTI +4,4 % a 74,52 $</strong>.<sup>[5][6]</sup> La delgada prima de guerra está de vuelta de golpe. Las acciones, mientras tanto, siguen congeladas en los cierres verdes del viernes — <strong>Nvidia 210,96 $ (+4,0 %)</strong>, <strong>META 669,21 $ (+6,0 %)</strong> por su nueva nube \"Meta Compute\" —, mientras en el trasfondo persiste sin resolverse la pregunta sobre la sostenibilidad del gasto en IA.<sup>[1][2]</sup> Y en el único mercado que operó sin interrupción, hay grietas: <strong>Bitcoin 62.709 $</strong> — por debajo de la base de costo de MicroStrategy/Strategy, que por primera vez desde 2022 se convirtió en <em>vendedor neto</em>.<sup>[10][11]</sup> Lo curioso es el oro: cayó pese a la escalada del Golfo, un 1,25 %.</p>\n    <ul>\n      <li><span class=\"chip hot\">PETRÓLEO</span> <strong>Brent 79,28 $ (+4,31 %), WTI 74,52 $ (+4,36 %)</strong> (futuros, 13.07. ~05:00 UTC). Irán declaró el estrecho de Ormuz \"cerrado hasta nuevo aviso\" el 12.07. — el CENTCOM de EE. UU. lo niega (\"el tráfico fluye\"), pero los tránsitos se desplomaron, según Windward, a ~21 (11.07.) frente a ~140/día antes de la guerra. La prima que faltaba el viernes está de vuelta. Viento en contra: la OPEP+ eleva la producción de agosto en +188.000 bpd. La apuesta a dos bandas más interesante del día.</li>\n      <li><span class=\"chip hot\">IA-INFRA</span> <strong>Nvidia 210,96 $ (+4,0 %), META 669,21 $ (+6,0 %)</strong> (cierre vie. 10.07.). El motor de META: la presentación del negocio de nube de IA \"Meta Compute\" más un chip propio, \"Iris\". Detrás está el verdadero debate: a comienzos de julio, Samsung + SK Hynix perdieron en un solo día cerca de 290 mil millones $ por temores sobre la sostenibilidad del gasto de capital en IA — el viernes, aun así, la semana cerró en verde. Sin resolver.</li>\n      <li><span class=\"chip\">BITCOIN</span> <strong>BTC 62.709 $ (−1,96 % 24h)</strong> (CoinGecko 13.07. 05:07 UTC). De &gt;93.000 $ a inicios de año, a fines de junio brevemente por debajo de 60.000 $. Strategy vendió 3.588 BTC (~216 millones $) entre fines de junio e inicios de julio — la mayor venta desde 2022 — y con una base de costo de ~75.476 $ ahora está cerca de 17 % en números rojos. El mayor tenedor corporativo vende. Sobreoferta estructural.</li>\n      <li><span class=\"chip\">ORO</span> <strong>Oro 4.069 $/oz (−1,25 % d/d)</strong> (TradingEconomics 13.07.), −5,6 % en el mes. El contraste curioso: el oro cayó <em>pese</em> a la escalada del Golfo que impulsa al petróleo. Razón: el dólar se mantiene firme (DXY 101,07), y un metal sin interés pierde frente a tasas reales sólidas. Mantener como seguro, no aumentar.</li>\n      <li><span class=\"chip\">ETHEREUM</span> <strong>ETH 1.782 $ (−1,25 % 24h)</strong>. Beta en sincronía con BTC, sin disparador propio; los flujos de ETF de ETH son más débiles que los de BTC. Mantener.</li>\n      <li><span class=\"chip\">SECTORES</span> Todo entre 1–8 % en rojo en 24h, arrastrado por un BTC plano. El más golpeado, <strong>VIRTUAL −7,35 %</strong>. Capitalización total cripto 2,249 billones $ (−1,31 %), dominancia de BTC 56,0 % — el capital huye de las altcoins hacia Bitcoin. Sin nueva entrada.</li>\n      <li><span class=\"chip\">MACRO</span> Todos los plazos convergen en el <strong>FOMC del 28 al 29.07.</strong> La Fed mantuvo en junio la tasa en <strong>3,50–3,75 %</strong> con tono restrictivo. Antes, la primera prueba individual: <strong>resultados del Q2 de Tesla el mié. 22.07.</strong> (entregas récord, pero la acción cayó de todos modos).</li>\n      <li><span class=\"chip\">ÁMBITOS</span> Los detalles de producto y chips de IA (Meta Compute, Iris) están en el brief de <em>ai-dev</em>/<em>ai-usecases</em>. Aquí solo cuenta la reacción del precio.</li>\n    </ul></div>"

      "latestTldrHtml": "<div class=\"tldr\"><p class=\"lead\">Der Montag steht im Zeichen der Netzwerk-Hardware: Ubiquiti hat in einem einzigen Rundumschlag 25 Schwachstellen über das gesamte UniFi-Ökosystem offengelegt — sieben davon kritisch, eine mit dem theoretisch nicht überbietbaren CVSS-Wert 10,0. Und weil rund 100.000 UniFi-Boxen offen im Internet hängen, ist das keine Labornachricht. Daneben zwei Dinge, die Daniels eigene Infrastruktur berühren: OpenSSH 10.4 räumt zwei stille Pfad-Fallen in sftp und scp aus und tastet sich an Post-Quantum-Schlüssel heran, und Microsoft legt in seinem Security-Zwischenbericht Zahlen vor, die zeigen, wie ein Konzern seine eigene Angriffsfläche wirklich schrumpft. Kein „patch tonight\"-Alarm — nur die Einordnung, was gerade zählt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ubiquiti UniFi — 25 CVEs (Bulletin 066)</strong>: 7 kritisch, 18 hoch; Spitzenreiter CVE-2026-50746 (CVSS 10,0, unauthentifizierte Command Injection in UniFi Connect). ~100.000 UniFi-OS-Instanzen offen im Netz, ~50.000 in den USA.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Vier weitere 9,9er</strong>: UniFi OS, Protect, Talk (SQLi) und Access (Command Injection) — Patches liegen für die ganze Produktlinie bereit, kein aktiver Exploit bekannt.</li>\n      <li><span class=\"chip good\">Release</span> <strong>OpenSSH 10.4</strong> (06.07): Fix gegen sftp-Download in falschen Ordner und scp-Directory-Escape bei Remote-zu-Remote; experimentelle Post-Quantum-Signatur (ML-DSA 44 + Ed25519), nicht Default.</li>\n      <li><span class=\"chip\">Sec</span> <strong>ModSecurity 3.0.16</strong>: CVE-2026-52747 (CVSS 8,6) hebelt WAF-Regeln per Parser-Differential aus — die Firewall sieht andere Daten als die App dahinter.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CISA KEV</strong>: SharePoint-RCE CVE-2026-45659 (Deserialisierung) seit 01.07 aktiv ausgenutzt im Katalog; dazu eine Serie von CMS-Plugin-Upload-Lücken.</li>\n      <li><span class=\"chip good\">Infra</span> <strong>Microsoft SFI-Juli-Report</strong> (10.07): 99,97 % phishing-resistente MFA intern, 732.000+ Ressourcen von öffentlichem Zugriff getrennt, 1,4 Mio. ungenutzte Apps abgeschaltet; Quantum-safe „bis 2029\".</li>\n      <li><span class=\"chip\">Infra</span> <strong>Azure Defender for Cloud</strong>: Container-Security, Kubernetes-Fehlkonfig-Enforcement und Serverless-Posture allesamt seit 01.07 GA.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>Am Rand</strong>: Apigee diese Woche ohne neue CVE; die CRA-Meldepflicht (11.09) rückt näher; Accenture räumt einen isolierten Vorfall ein, bestreitet aber den behaupteten 35-GB-Umfang.</li>\n    </ul></div>",
      "latestTldrHtmlByLang": {
        "de": "<div class=\"tldr\"><p class=\"lead\">Der Montag steht im Zeichen der Netzwerk-Hardware: Ubiquiti hat in einem einzigen Rundumschlag 25 Schwachstellen über das gesamte UniFi-Ökosystem offengelegt — sieben davon kritisch, eine mit dem theoretisch nicht überbietbaren CVSS-Wert 10,0. Und weil rund 100.000 UniFi-Boxen offen im Internet hängen, ist das keine Labornachricht. Daneben zwei Dinge, die Daniels eigene Infrastruktur berühren: OpenSSH 10.4 räumt zwei stille Pfad-Fallen in sftp und scp aus und tastet sich an Post-Quantum-Schlüssel heran, und Microsoft legt in seinem Security-Zwischenbericht Zahlen vor, die zeigen, wie ein Konzern seine eigene Angriffsfläche wirklich schrumpft. Kein „patch tonight\"-Alarm — nur die Einordnung, was gerade zählt.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ubiquiti UniFi — 25 CVEs (Bulletin 066)</strong>: 7 kritisch, 18 hoch; Spitzenreiter CVE-2026-50746 (CVSS 10,0, unauthentifizierte Command Injection in UniFi Connect). ~100.000 UniFi-OS-Instanzen offen im Netz, ~50.000 in den USA.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Vier weitere 9,9er</strong>: UniFi OS, Protect, Talk (SQLi) und Access (Command Injection) — Patches liegen für die ganze Produktlinie bereit, kein aktiver Exploit bekannt.</li>\n      <li><span class=\"chip good\">Release</span> <strong>OpenSSH 10.4</strong> (06.07): Fix gegen sftp-Download in falschen Ordner und scp-Directory-Escape bei Remote-zu-Remote; experimentelle Post-Quantum-Signatur (ML-DSA 44 + Ed25519), nicht Default.</li>\n      <li><span class=\"chip\">Sec</span> <strong>ModSecurity 3.0.16</strong>: CVE-2026-52747 (CVSS 8,6) hebelt WAF-Regeln per Parser-Differential aus — die Firewall sieht andere Daten als die App dahinter.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CISA KEV</strong>: SharePoint-RCE CVE-2026-45659 (Deserialisierung) seit 01.07 aktiv ausgenutzt im Katalog; dazu eine Serie von CMS-Plugin-Upload-Lücken.</li>\n      <li><span class=\"chip good\">Infra</span> <strong>Microsoft SFI-Juli-Report</strong> (10.07): 99,97 % phishing-resistente MFA intern, 732.000+ Ressourcen von öffentlichem Zugriff getrennt, 1,4 Mio. ungenutzte Apps abgeschaltet; Quantum-safe „bis 2029\".</li>\n      <li><span class=\"chip\">Infra</span> <strong>Azure Defender for Cloud</strong>: Container-Security, Kubernetes-Fehlkonfig-Enforcement und Serverless-Posture allesamt seit 01.07 GA.</li>\n      <li><span class=\"chip\">Regulierung</span> <strong>Am Rand</strong>: Apigee diese Woche ohne neue CVE; die CRA-Meldepflicht (11.09) rückt näher; Accenture räumt einen isolierten Vorfall ein, bestreitet aber den behaupteten 35-GB-Umfang.</li>\n    </ul></div>",
        "en": "<div class=\"tldr\"><p class=\"lead\">Monday belongs to network hardware: Ubiquiti disclosed 25 vulnerabilities across the entire UniFi ecosystem in a single sweep — seven of them critical, one carrying the theoretically unbeatable CVSS score of 10.0. And since roughly 100,000 UniFi boxes sit exposed on the open internet, this isn't a lab-only story. Alongside that, two items touch Daniel's own infrastructure directly: OpenSSH 10.4 closes two silent path traps in sftp and scp and takes a first tentative step toward post-quantum keys, and Microsoft's security progress report lays out numbers showing how a corporation actually shrinks its own attack surface. No \"patch tonight\" alarm — just the context on what matters right now.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ubiquiti UniFi — 25 CVEs (Bulletin 066)</strong>: 7 critical, 18 high; topping the list is CVE-2026-50746 (CVSS 10.0, unauthenticated command injection in UniFi Connect). ~100,000 UniFi OS instances exposed on the network, ~50,000 in the US.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Four more at 9.9</strong>: UniFi OS, Protect, Talk (SQLi), and Access (command injection) — patches are ready across the entire product line, no active exploit known.</li>\n      <li><span class=\"chip good\">Release</span> <strong>OpenSSH 10.4</strong> (Jul 6): fixes an sftp download-to-wrong-folder bug and an scp remote-to-remote directory escape; experimental post-quantum signature (ML-DSA 44 + Ed25519), not the default.</li>\n      <li><span class=\"chip\">Sec</span> <strong>ModSecurity 3.0.16</strong>: CVE-2026-52747 (CVSS 8.6) bypasses WAF rules via a parser differential — the firewall sees different data than the app behind it.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CISA KEV</strong>: SharePoint RCE CVE-2026-45659 (deserialization) actively exploited in the catalog since Jul 1; plus a run of CMS plugin upload flaws.</li>\n      <li><span class=\"chip good\">Infra</span> <strong>Microsoft SFI July report</strong> (Jul 10): 99.97% phishing-resistant MFA internally, 732,000+ resources disconnected from public access, 1.4M unused apps decommissioned; quantum-safe target \"by 2029\".</li>\n      <li><span class=\"chip\">Infra</span> <strong>Azure Defender for Cloud</strong>: container security, Kubernetes misconfiguration enforcement, and serverless posture all GA since Jul 1.</li>\n      <li><span class=\"chip\">Regulation</span> <strong>On the sidelines</strong>: no new Apigee CVE this week; the CRA reporting deadline (Sep 11) draws closer; Accenture acknowledges an isolated incident but disputes the claimed 35 GB scope.</li>\n    </ul></div>",
        "pt": "<div class=\"tldr\"><p class=\"lead\">A segunda-feira é marcada pelo hardware de rede: a Ubiquiti divulgou de uma só vez 25 vulnerabilidades em todo o ecossistema UniFi — sete delas críticas, uma com a nota CVSS teoricamente insuperável de 10,0. E como cerca de 100 mil dispositivos UniFi estão expostos abertamente na internet, isso não é notícia de laboratório. Além disso, duas coisas que tocam diretamente a infraestrutura do próprio Daniel: o OpenSSH 10.4 elimina duas armadilhas silenciosas de caminho no sftp e no scp e dá os primeiros passos em direção a chaves pós-quânticas, e a Microsoft apresenta em seu relatório de segurança números que mostram como uma grande empresa realmente reduz sua própria superfície de ataque. Sem alarme de \"corrija hoje à noite\" — só o contexto do que importa agora.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ubiquiti UniFi — 25 CVEs (Boletim 066)</strong>: 7 críticas, 18 altas; a líder é o CVE-2026-50746 (CVSS 10,0, injeção de comando não autenticada no UniFi Connect). ~100 mil instâncias UniFi OS expostas na rede, ~50 mil nos EUA.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Mais quatro com nota 9,9</strong>: UniFi OS, Protect, Talk (SQLi) e Access (injeção de comando) — patches disponíveis para toda a linha de produtos, sem exploração ativa conhecida.</li>\n      <li><span class=\"chip good\">Release</span> <strong>OpenSSH 10.4</strong> (06/07): corrige download de sftp indo para a pasta errada e escape de diretório no scp remoto-para-remoto; assinatura pós-quântica experimental (ML-DSA 44 + Ed25519), não é padrão.</li>\n      <li><span class=\"chip\">Sec</span> <strong>ModSecurity 3.0.16</strong>: CVE-2026-52747 (CVSS 8,6) contorna regras de WAF via diferencial de parser — o firewall enxerga dados diferentes dos que a aplicação por trás dele processa.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CISA KEV</strong>: RCE do SharePoint CVE-2026-45659 (desserialização) explorado ativamente no catálogo desde 01/07; além de uma série de falhas de upload em plugins de CMS.</li>\n      <li><span class=\"chip good\">Infra</span> <strong>Relatório SFI de julho da Microsoft</strong> (10/07): 99,97% de MFA resistente a phishing internamente, mais de 732 mil recursos desconectados de acesso público, 1,4 milhão de apps não utilizados desligados; meta de segurança quântica \"até 2029\".</li>\n      <li><span class=\"chip\">Infra</span> <strong>Azure Defender for Cloud</strong>: segurança de contêineres, aplicação de más configurações no Kubernetes e postura serverless, todos em disponibilidade geral desde 01/07.</li>\n      <li><span class=\"chip\">Regulação</span> <strong>À margem</strong>: Apigee sem novo CVE esta semana; a obrigação de notificação do CRA (11/09) se aproxima; a Accenture admite um incidente isolado, mas contesta o alegado volume de 35 GB.</li>\n    </ul></div>",
        "es": "<div class=\"tldr\"><p class=\"lead\">El lunes está marcado por el hardware de red: Ubiquiti reveló de un solo golpe 25 vulnerabilidades en todo el ecosistema UniFi — siete de ellas críticas, una con el puntaje CVSS teóricamente insuperable de 10.0. Y como cerca de 100,000 equipos UniFi están expuestos abiertamente en internet, esto no es noticia de laboratorio. Junto a esto, dos cosas que tocan directamente la infraestructura del propio Daniel: OpenSSH 10.4 elimina dos trampas silenciosas de rutas en sftp y scp y da un primer paso hacia claves poscuánticas, y Microsoft presenta en su reporte de avance de seguridad cifras que muestran cómo una empresa realmente reduce su propia superficie de ataque. Sin alarma de \"parcha esta noche\" — solo el contexto de lo que importa ahora.</p>\n    <ul>\n      <li><span class=\"chip hot\">Sec</span> <strong>Ubiquiti UniFi — 25 CVEs (Boletín 066)</strong>: 7 críticas, 18 altas; la más grave es CVE-2026-50746 (CVSS 10.0, inyección de comandos no autenticada en UniFi Connect). ~100,000 instancias de UniFi OS expuestas en la red, ~50,000 en Estados Unidos.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>Cuatro más con 9.9</strong>: UniFi OS, Protect, Talk (SQLi) y Access (inyección de comandos) — hay parches listos para toda la línea de productos, sin explotación activa conocida.</li>\n      <li><span class=\"chip good\">Release</span> <strong>OpenSSH 10.4</strong> (06/07): corrige descarga de sftp a la carpeta equivocada y un escape de directorio en scp remoto-a-remoto; firma poscuántica experimental (ML-DSA 44 + Ed25519), no es la opción por defecto.</li>\n      <li><span class=\"chip\">Sec</span> <strong>ModSecurity 3.0.16</strong>: CVE-2026-52747 (CVSS 8.6) evade reglas de WAF mediante un diferencial de parser — el firewall ve datos distintos a los que procesa la aplicación detrás.</li>\n      <li><span class=\"chip hot\">Sec</span> <strong>CISA KEV</strong>: RCE de SharePoint CVE-2026-45659 (deserialización) explotado activamente en el catálogo desde el 01/07; además de una serie de fallas de carga de archivos en plugins de CMS.</li>\n      <li><span class=\"chip good\">Infra</span> <strong>Reporte SFI de julio de Microsoft</strong> (10/07): 99.97% de MFA resistente a phishing internamente, más de 732,000 recursos desconectados del acceso público, 1.4 millones de apps sin uso dadas de baja; meta de seguridad cuántica \"para 2029\".</li>\n      <li><span class=\"chip\">Infra</span> <strong>Azure Defender for Cloud</strong>: seguridad de contenedores, aplicación de configuraciones erróneas de Kubernetes y postura serverless, todo en disponibilidad general desde el 01/07.</li>\n      <li><span class=\"chip\">Regulación</span> <strong>Al margen</strong>: Apigee sin CVE nuevo esta semana; se acerca la obligación de notificación del CRA (11/09); Accenture admite un incidente aislado, pero cuestiona el supuesto volumen de 35 GB.</li>\n    </ul></div>"
