<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Inline brand mark — no frame, transparent background.
       Lives on the dashboard masthead where the cream page already
       provides the surface. The frameless favicon (favicon.svg) is used
       for browser tabs where the surface is unknown. -->

  <!-- Signature double-rule masthead. Uses currentColor so it picks up
       the header's --current-accent-text (whichever category is active),
       not a baked-in red. -->
  <rect x="6" y="10" width="52" height="3"   fill="currentColor"/>
  <rect x="6" y="16" width="52" height="2.5" fill="currentColor"/>

  <!-- Bold serif M. Kept dark (matches body text) so it reads at any
       accent colour without clashing. -->
  <text x="32" y="55"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="800"
        font-size="42"
        text-anchor="middle"
        fill="#1f1812">M</text>
</svg>
